body:
  text: 欽定四庫全書御製佩文齋廣羣芳譜序粤自神農氏嘗草辨榖民始知樹藝醫藥伊耆氏命羲和推歩定歴以授時民始知耕穫之不愆而百工績熈偉哉開物成務啟牖来兹聖帝之功與天地並矣朕聴政之暇披閲典籍留意農桑繪耕織之圗製永言之什時廵所至親歴田間其稼穡之艱難作勞之辛苦既周知而洞悉矣每思䆒百昌生殖之理極萬變消長之情著為成編以佑吾民嘗謂爾雅具其名物而郭璞陸佃孫炎之流䟽注埤翼又加詳焉其明備者莫如本草自本經以迄陶𢎞景蘇頌而下數十種凡採治之法無不該核他如齊民要術月令廣義諸書其蒔植之宜為更晰矣遐稽往牘擷其英華歸於簡括良匪易也比見近人所纂羣芳譜蒐輯衆長義類可取但惜尚多踈漏因命儒臣即祕府藏帙攟摭薈萃刪其支冗補其闕遺上原六經旁据子史洎夫稗官野乗之言才士之所歌吟田夫之所傳述皆著於篇而竒花瑞草之産於名山貢自逺徼絶塞為前代所未見聞者亦咸列焉復允廷臣之請益以朕所賦詠依類分載總一百卷命名曰佩文齋廣羣芳譜冠以天時尊嵗令也次糓次桑麻崇民事也次蔬茶果木花卉資厚生溥利用也終以藥物重民命也其諸天時蚤晚之候人事種溉之方地力彼此之殊物性良楛之異罔弗條舉縷析燦然可觀焉是書也攬品彚之蕃滋想羣生之率育一展卷間化機洋溢於兹畢呈固不惟矜淹洽侈藻麗也以是刋布天下垂之久逺使吾民優㳺於農圃之中家室盈寜樂其業而不憚其勤而大夫士以及民之秀者因以區别物宜審其淑慝凛嗜好之常慎莭宣之度於以躋仁夀而享泰平亦不為無所裨助也哉康熙四十七年五月初十日御定佩文齋廣羣芳譜刋成進呈表原任掌河南道事河南道監察御史加七級臣劉灝㳟承勅㫖校刋佩文齋廣羣芳譜今已成書謹奉表上進者臣灝誠惶誠恐稽首頓首上言伏以三才並建資参賛以成能庶物芸生賴神靈而利用神農首出先嘗草木之滋后稷誕生即識方苞之種蓋將開物以成務必先辨類而知名是以東作西成人時敬授荔生葽秀月令必書考比興於風詩方名悉載溯權輿於釋詁爾雅兼綜史列農家者流術是齊民之要降而本草代有專家異産竒名各徴風土含華落實别著春秋言以人人而殊物亦生生而廣更有場師田老家傳種樹之方墨客詩人藻結風花之思見聞各異篇帙紛綸自非刋録為一書誰識源流於萬類欽惟皇帝陛下德茂生成休徴蕃廡光昭千古普同若木之華化鼓八方直被扶桑之國聰明卓絶格物靡遺稼穡艱難居心無逸田疇景物盡歸耕織之圖車轍廵行徧省桑麻之務乃有道旁異草徼外竒花郭璞未詳孫炎不識一經聖覽便悉嘉名仰窺莫測所自來博學盡驚為天授品題所及逺過箋疏睹記不忘何湏載籍乃猶時勤薈萃下逮芻蕘特命編修臣汪灝臣張逸少臣汪漋臣黄龍睂仰遵指授敬事編摩繙内府之藏書廣羣芳之舊譜農書花歴藥品茶經指掌可求分條並載一編在手疑四序之皆春百物羅前如萬方之並貢至若一花一木曽被宸章若賦若詩久登御集莫不轉鴻鈞於一氣揚藻采於千秋分冠簡端尤光册府筆如垂露灑五色於芳菲文似慶雲映三光於碧落既成篇帙更錫序文天語輝皇融六經之津液奎文焜燿徹十襲之縹緗臣灝澗谷庸材山林小草早蒙收採便得敷榮竊負栽培自貽傾覆叨𢎞恩於使過不棄菲葑效末技以校書日親棃棗身是久枯之木忽訝春囘心如已折之葵猶承日照剞劂告竣少竭力於涓埃豕亥傳訛猶驚心於詿誤乃蒙口勅許列頭銜對玉簡以悚惶瞻彤墀而踴躍伏願光輝炳照化育遐宣澤及臣鄰收杞梓楩柟之用功施田野成布帛菽粟之風則龍木鳯芝呈祥於連理之樹一莖䨇穗獻瑞於大有之年矣謹按天時譜六卷榖譜四卷桑麻譜二卷蔬譜五卷茶譜四卷花譜三十二卷果譜十四卷木譜十四卷竹譜五卷卉譜六卷藥譜八卷校刋告成臣灝無任瞻天仰聖激切屏營之至謹奉表隨進以聞康熈四十七年六月初一日原任掌河南道事河南道監察御史加七級臣劉灝謹上表附録羣芳譜原叙王象晉著尼父有言吾不如老農不如老圃世之耳食者遂譁然曰農與圃小人事也大人者當劑調二氣冶鑄萬有烏用是齪齪者為果爾則陳豳風者不必聖愛菊愛蓮者不必賢税桑田樹榛栗者不必稱塞淵侈詠歌哉予性喜種植斗室傍羅盆草數事瓦鉢内蓄文魚數頭薄田百畮足供饘粥郭門外有園一區題以渉趣中為亭顔以二如雜藝蔬茹數十色樹松竹棗杏數十株植雜草野花數十器種不必竒異第取其生意欝勃可覘化機美實陸離可充口食較晴雨時澆灌可助天工培根核屏菑翳可驗人事暇則抽架上農經花史手錄一二則以補咨詢之所未備每花明柳媚日麗風和攜斗酒摘畦蔬偕一二老友話十餘年前陳事醉則偃仰於花茵莎榻淺紅濃緑間聴松濤醻鳥語一切升沉寵辱直付之花開花落因取平日所渉歴咨詢者類而著之於編而又冠以天時嵗令以便從事歴十餘寒暑始克就緒題之曰二如亭羣芳譜與同志者共焉相與怡情相與育物相與阜財用而厚民生即不敢謂調二氣冶萬有其於天地之大生廣生未必無小補云因思尼父所言盖恐石隐者流果於忘世而非厭薄農圃以為瑣事不足為也請以質諸世之所謂大人者凡例一羣芳譜原本大抵託興衆芳寄情花木可為風雅之助然或摭拾舊聞或獨攄己見採擇未遍不免登載疎漏今將榖桑麻蔬茶花果木竹卉藥諸譜皆捜羅羣編依類増補俾讀者咸知重農貴榖為率育羣生之本下及庶草繁殖𢎞茂對之化機藥果資生登人民於壽域是書所關舉世共頼一原本以羣芳命名而冠以天譜嵗譜今改嵗譜為天時記四時長養之理萬彚榮枯之候冠於諸譜之前若天譜中歴數災祥及泛言日月風雲星辰雨露等類并嵗譜中泛言節序者俱與羣芳不甚貼切㮣不復録一原本各譜中分題名目條欵不一今每一物詳釋名狀列於其首次徴据事實統標曰彚考傳記序辨題䟦雜著騷賦詩詞綂標曰集藻其製用移植等目統標曰别録庶分條簡要編次畫一至若原本首簡總論雜説中有可採者並行附載泛者略之一原本花木卉藥諸譜按之經史傳記方書地志文集及今耳目所見闕漏者頗多若金蓮花夜亮木及塞外諸竒花海内諸名山所産山花前人不經見者今皆採補以廣後人見聞一原本梅杏桃李之類俱載入花中今分見於花果兩處更使開卷瞭然一葛木棉以類相從附入桑麻譜他如香附莎草卉藥各見芸香山礬别為二物蘭簡澤蘭析作數種俱各註明本條之下以便觀覽一原本中藥譜僅五十有四種為數甚少今照本草綱目廣採補入凡見於詩經爾雅楚辭及唐宋歴代詩文者増註其下一原本諸譜中多有療治一條今按醫療自有專書如本草綱目證治凖繩之類可備詳考纂入譜内反多闕略且恐叅䆒未精泥方貽悞寕闕之以致愼一原本終以鶴魚一譜今按禽魚既與羣芳命名不符且類族衆多禽中不得專舉一鶴魚中不得專舉金魚復於本類不備槩不復存一原本所載事實或闕書名賦詠或闕人名又或書官書號書地書爵書諡今於其可考證者悉為標明餘仍其舊以示存疑御定佩文齋廣羣芳譜編校官翰林院編修臣汪灝翰林院編修臣張逸少翰林院編修臣汪漋翰林院編修臣黄龍睂校録人員舉人臣李同聲舉人臣胡期恒貢生臣張育徽監生臣潘葆光監生臣胡宸基監生臣周鼎監生臣周旋監生臣吳從龍生員臣錢阿瑛生員臣張宏敏生員臣張位生員臣方覲生員臣趙侗斆生員臣許懋德生員臣邱起元欽定四庫全書卷子部九御定佩文齋廣羣芳譜總目譜錄類三草木禽魚之屬天時譜六卷穀譜四卷桑麻譜二卷蔬譜五卷茶譜四卷花譜三十二卷果譜十四卷木譜十四卷竹譜五卷卉譜六卷藥譜八卷臣等謹案御定廣羣芳譜一百卷康熙四十七年聖祖仁皇帝御定葢因明王象晋羣芳譜而廣之也凡改正其門目者三以天譜嵗譜併為天時記惟述物候榮枯而天譜之雜述災祥嵗譜之汎陳節序者俱刪不録其鶴魚一譜無闗種植亦無闗民用則竟全刪改正其體例者四原本分條標目前後㕘差今每物先釋其名狀次徴據事實統標曰彚考詩文題詠統褾曰集藻製用移植諸法統標曰别録其療治一條恐㕘校未精泥方貽悮亦竟刋除至象晉生於明季不及見太平王㑹之盛今則流沙蟠木盡入版圖航海梯山咸通職貢凡殊方絶域之産古所未聞者俱一一詳載以昭聖朝之隆軌又象晉以田居閒適偶爾著述不能窺天禄石渠之秘考證頗踈其所載者又多稗販於花鏡圃史諸書或迷其出處或舛其姓名訛漏不可殫數今則紬東觀之藏開西崑之府並溯委窮源詳為補正以成博物之鴻編賜名廣羣芳譜特聖人褒纎介之善不没創始之功耳實則新輯者十之八九象晉舊文僅存十之一二也乾隆四十七年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
