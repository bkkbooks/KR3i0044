body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜目録上卷一天時譜一春卷二天時譜二正月二月卷三天時譜三三月卷四天時譜四夏四月五月六月卷五天時譜五秋七月八月九月卷六天時譜六冬十月十一月十二月卷七榖譜一麥瑞麥雀麥蕎麥苦蕎麥瞿麥卷八榖譜二稻卷九榖譜三黍稷蜀黍玉蜀黍粟粱秫􅭜子粱禾稊稗蒒草稂禾菵草禾蒯草禾東牆禾感楊火木嘉禾卷十榖譜四大豆穭豆赤小豆緑豆白豆豌豆蠶豆豇豆黎豆馬豆藊豆刀豆大靈豆木豆靈光豆佛豆脂麻青蘘亞麻卷十一桑麻譜一桑桑椹桑寄生桑花柘奴柘卷十二桑麻譜二苧麻大麻檾麻疏麻葛鐡葛木棉花卷十三蔬譜一薑椒川椒崖椒蔓椒地椒胡椒番椒茴香八角茴香蒔蘿韭孝文韭諸葛韭水韭蔥水蔥蒜水晶蔥薤蒝荽以上辛葷卷十四蔬譜二苜蓿蔓菁菲同蒿蔞蒿牡蒿藾蒿邪蒿𦾰蒿白菜芥菠菜莧馬齒莧水馬齒葵龍葵蔠葵卷十五蔬譜三生菜苦菜菾菜蕹菜蕓薹菜蔊菜以上園蔬巢菜薇蕨迷蕨水蕨薺藜蔏藋野灰藋以上蔬蓴芹紫芹紫菜龍鬚菜鹿角菜以上水蔬卷十六蔬譜四山藥芋香芋甘露子土芋甘薯蘿蔔水蘿蔔胡蘿蔔野葡蔔萵苣以上食根卷十七蔬譜五菜瓜稍瓜黃瓜南瓜絲瓜冬瓜壺盧瓠子茄子苦茄緬茄以上食實土菌木耳石耳地耳以上菌屬嘉樹菜雞候菜優殿葙買菜專蹄菜藝薇冬風菜榖菜荶菜菹菜􅀢菜繤菜藒菜葟菜蓶菜􅀢菜羞菜以上竒蔬佛土菜孟娘菜真珠菜雪裏蕻白鼓釘剪刀股豬殃殃絲蕎蕎牛塘利浮薔水菜看麥娘狗腳迹破破衲燕子不來香猢猻腳迹眼子菜貓耳朵籓籬頭鴈腸子野籬落羊耳秃黃花菜油灼灼燈蛾兒芽兒拳板蕎蕎天藕兒老鸛筋鵝觀草牛尾瘟兔絲根草鞋片抓抓兒雀舌草羅漢菜根子菜龍芽菜杏葉菜歪脖菜龍巔菜高河菜蓮花菜以上雜蔬卷十八茶譜一茶卷十九茶譜二茶卷二十茶譜三茶卷二十一茶譜四茶茶花臯盧卷二十二花譜一梅花卷二十三花譜二梅花卷二十四花譜三梅花紅梅茶梅卷二十五花譜四杏花桃花卷二十六花譜五桃花夾竹桃金絲桃卷二十七花譜六李花梨花卷二十八花譜七棠梨花常棣花櫻桃花石榴花卷二十九花譜八荷花卷三十花譜九荷花卷三十一花譜十荷花山蓮實西番蓮以上見果譜鐵線蓮朝日蓮卷三十二花譜十一牡丹卷三十三花譜十二牡丹卷三十四花譜十三牡丹魚兒牡丹纒枝牡丹秋牡丹卷三十五花譜十四海棠卷三十六花譜十五海棠秋海棠卷三十七花譜十六玉蘂瓊花山礬卷三十八花譜十七木蘭辛夷玉蘭繡毬楝花紫荆紫薇巵子卷三十九花譜十八杜鵑黃杜鵑山枇杷木槿扶桑合歡有情樹木芙蓉卷四十花譜十九巖桂卷四十一花譜二十山茶蠟梅瑞香結香木本以上卷四十二花譜二十一迎春金雀酴醿金沙薔薇卷四十三花譜二十二玫瑰刺䕷月季四季木香棣棠茉莉雪瓣紫茉莉素馨含笑指甲花凌霄以上蔓本卷四十四花譜二十三蘭蕙蘭草風蘭蕙草朱蘭澤蘭箬蘭真珠蘭馬蘭伊蘭卷四十五花譜二十四芍藥卷四十六花譜二十五金燈金盞側金盞翦春羅翦秋羅翦羅花翦金羅翦紅紗石竹罌粟麗春虞美人萱花鹿蔥水蔥蜀葵錦葵天葵旌節花西番葵卷四十七花譜二十六百合花山丹鳯仙金錢滴滴金玉簮秋葵曼陀羅蓼花卷四十八花譜二十七菊花卷四十九花譜二十八菊花卷五十花譜二十九菊花卷五十一花譜三十菊花繡線菊翠菊藍菊雙鸞菊丈菊七月菊卷五十二花譜三十一雞冠水仙􅼡祗草水仙樹以上本卷五十三花譜三十二萬年花金蓮茈碧九花樹萬連金䔲花紅綬花優鉢曇迎輦花金步搖靈壽花都勝花無憂花瘴川花那伽花提羅迦拘尼陀繫白象樹花簇蝶花俱郍衛木蓮石蓮洛如花太平瑞聖花七寶花鵝毛玉鳯花蟬花石蟬花錦𢃄花青囊花旱金花上元紅泡花枸那花水西花象蹄花白鶴花望仙花金莖花白菱花百日紅閩山丹金鉢盂繅絲花笑靨花紫羅襴紫花兒紅麥花米篩花蕾䔒花悶頭花蝎子花龍女花和山花優曇花金梅青鸞花金縷梅撚蠟春桂黃山旌節花瓔珞花紫雲花蕡桃海罽花蕊珠花玉鈴花瑣瑣花仙都花四照花覆杯花查葡花紫鐸花傲雲花山叉花絳頴花蠟瓣花疊雪花囊環花美人菊醉春花鵝羣花海瓊花寶網花紫霞杯黃花馬蹄蘭地椹花鸞枝長樂花優鉢羅花戎王子冬瑰花海紅燕蓊花玉燭花杏香花萬蝶花真珠花鷹爪花闍提花御𢃄花玉手爐花小黃蕖花繭漆花滿堂春御仙花夀春花散水花孩兒花練春紅長十八波羅花疉羅花藍雀花翠蛾睂以上異花卷五十四果譜一梅海梅杏桃羊桃卷五十五果譜二李梨檖樝榅桲棠梨沙棠棣以上花見花譜卷五十六果譜三櫻桃山櫻桃楊梅枇杷卷五十七果譜四奈林檎蘋果橄欖木威餘甘子山樝枳椇葡萄野葡萄卷五十八果譜五棗天棗棗糯棗萬嵗酸棗波斯棗千年棗柿椑柿軟柿蕃柿木瓜榠樝膚果以上卷五十九果譜六安石榴花見花譜栗石栗天師栗棐榛胡榛子松子核桃山胡桃蔓胡桃銀杏卷六十果譜七荔支卷六十一果譜八荔支卷六十二果譜九荔支卷六十三果譜十荔支隈枝錦荔支龍眼山龍眼龍荔卷六十四果譜十一橘橘皮卷六十五果譜十二柑佛手柑橙香櫞金橘金豆柚枳枸橘殼果以上卷六十六果譜十三蓮花見花譜藕蔗菱芡葧臍慈姑以上水果卷六十七果譜十四甜瓜西瓜北瓜石瓜劉子不周山果如何樹實繫彌子留求子都咸子千嵗子人面子夫編子五斂子都昆子椰子青田核嚴樹州樹子國樹子前樹子都桷子㯆樹子韶子五子白緣子多感子蔗子彌子梅桃楊搖子冬熟猴闥子關桃子士翁子枸槽子猴總子多南子王壇子棎子都念子侯騷仙樹實蠡齊子無石子婆羅婆磐砮穡樹齊暾那核