body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜目録下卷八十二竹譜一竹卷八十三竹譜二竹卷八十四竹譜三竹卷八十五竹譜四竹卷八十六竹譜五竹筍竹竹實萊越王竹淡竹葉錦竹篇竹卷八十七卉譜一芝卷八十八卉譜二蓍荓蓂莢華平萐莆朱草屈軼延嘉紫達吉祥草菖蒲以上靈草書𢃄草鴛鴦草翠雲草老少年以上芳草藝牛藝草杜若蘼蕪根為芎藭見藥譜白芷茅香白茅香草排草以上香瓶香耕香卷八十九卉譜三紅花胭脂茜草藍擘藍染鼠尾草以上草狼把草芭蕉莎根為香附子見藥譜茅盂蓬青蒿荻蒿隰馬先蒿以上草黃花蒿角蒿茵陳蒿卷九十卉譜四菰蒲香蒲蘱蘆箬荇蘋卷九十一卉譜五萍藻海藻海𢃄綸蔛草以上水草苔水苔垣衣屋遊瓦松仙人縚羅漢絛屬以上苔卷九十二卉譜六祝餘條黃雚蓇蓉無條薲草籜植楮鬼草榮草荀草葶䔭薰草風條焉酸䔄草嘉榮􅞒草梨草􅚄草髙梁山草雞榖苕饒虉莫葍芑藬結縷蔖搖車綿馬瓝雞腸草蕕藒車􅀢蒘玉紅草留夷不死草明莖草吉雲草神精香草夢草却睡草瑤琨碧草地日草鳯葵草躡空草壽榮草迷迭龍鬚草龍常草虹草宵明草黃渠草聞遐草合歡草濡姧草娑羅草遙香草莽煌草藝苖草藝蓬草銅鼓草珊瑚鞭紅席草鹹草千步香草睡草龍芻席具草相思草活人草麝香草懸腸草宫人草護門草金光草玄鹿草鶴子草醒醉草變晝草迎涼草左行草青草槐野狐絲望舒草蜜草老鴉瓜籬鴨舌草銅匙草水耐冬天芊油點草三賴草金盤草蕪荑息雞草千金草金星草石長生紅茂草通泉草女香以上異草鼠麴草馬鞭草蛇含石帆佛甲草虎耳草離鬲草仙人草宜南草仙人掌萍蓬草雞足草知風草扁擔草嬌草馬房星星草黃背草塔子頭水稗草鳳尾草稠粳琉璃草蝎子草特勒蘇草恆春草煙草雜草以上卷九十三藥譜一甘草黃耆人參沙參薺苨桔梗長松黃精黃獨葳蕤知母肉蓯蓉列當鎖陽天麻术狗脊貫衆巴戟天逺志百脈根淫羊藿卷九十四藥譜二仙茅玄參地榆丹參紫參王孫紫草白頭翁白及三七黃連胡黃連黃芩秦芄柴胡前胡防風獨活土當歸都管草升麻苦參白鮮延胡索貝母石蒜龍膽細辛木細辛及已鬼督郵徐長卿白微白前草犀叉子股吉利草良耀草硃砂根辟虺雷錦地羅紫金牛拳參鐵線草金絲草以上山草卷九十五藥譜三當歸芎藭蛇牀藁本徐黃蜘蛛香木香甘松香山奈亷薑山薑豆蔲縮砂蔤益智蓽茇蒟醬肉豆蔲補骨脂薑黃鬱金蓬莪茂荆三稜香附子苖為莎草别見卉譜艾納香兜納香藿香藿山草麻伯相鳥天雄草益妳草香薷爵牀赤車使者假蘇薄荷地錢紫蘇水蘇薺薴石薺薴草以上芳菴䕡對廬艾千年艾隂地厥九牛草益母草鏨菜薇銜夏枯草劉寄奴草曲節草麗春草青葙桃朱術天靈草思蓂子大薊卷九十六藥譜四續斷鉤芙漏盧飛廉大青小青胡盧巴蠡實牛蒡菤耳地菘豨蘞蘘荷麻黃木賊燈心草地黃牛膝紫菀女菀麥門冬酸漿蜀羊泉鹿蹄草敗醬欵冬決明地膚王不留行葶藶車前狗舌草鱧腸連翹蒴藋水英海根火炭母草三白草蠶繭草蛇繭草虎杖蒺藜沙苑蒺藜榖精草海金沙地楊梅水楊梅地蜈蚣草半邉蓮紫花地丁鬼針草獨用將軍留軍待見腫消攀倒甑水甘草卷九十七藥譜五大黃商陸狼毒防葵狼牙䕡茹大戟澤漆甘遂續隨子莨菪雲實萞麻博落回黑天赤利子常山杜莖山土紅山藜蘆山慈石參果根馬腸根水藜蘆附子烏頭白附子天南星虎掌草蒟蒻菩薩草半夏蚤休鬼臼射干坐拏草押不蘆芫花蕘花醉魚草莽草茵芋苦堇毛莨海薑隂命牛扁虱建草蕁麻格注草海芋鉤吻透山根以上毒草卷九十八藥譜六兔絲五味子覆盆子蓬藟懸鈎子蛇莓使君子木鱉子番木鱉馬兜鈴預知子牽牛栝樓王瓜黃環天門冬百部何首烏萆薢菝葜土茯苓白斂女萎赭魁鵝抱伏雞子仰盆人肝藤九仙子山豆根黃藥子解毒子奴會子海藥實白藥子陳家白藥突甘家白藥衝洞根厥白會州白藥威靈仙翦草防己木通通脫木天壽根金銀藤鈎藤倒挂藤白兔藿白英芄蘭赤地利紫葛烏蘝莓葎草澤㵼羊蹄酸模龍舌草麕舌苦草以上水草石斛骨碎補石韋石莧石垂景天石胡荽螺厴草酢漿草酸草三葉地錦金瘡小草崖棕雞翁藤半天回野蘭根紫背金盤醋筒草白龍鬚以上石草馬勃苔部卷九十九藥譜七屈草别羇離樓草黃護草雀醫草木甘草益決草九熟草兑草異草灌草䒻草莘草英草華封華㥏華節草讓實羊實桑莖實可聚實滿隂實馬顚馬逢兔棗鹿良雞涅犀洛雀梅燕齒土齒金莖白背青雌白辛赤舉赤涅赤赫黃秫黃辨紫給紫藍糞藍巴朱柴紫文石路石曠石敗石石劇石藝竹付祕惡盧精唐夷知杖河煎區余王明師系并苦索千良達戈共船虹姑活白女腸白扇根黃白支父陛根疥拍腹五母麻五色符救赦人者常吏之生載慶腂芥鴆鳥漿吉祥草雞腳草兔肝草斷罐草千金䥶土落草倚待草藥王草筋子根廅藥無風獨搖草陀得花建水草百藥祖催風使刺虎石逍遙黃寮郎黃花了百兩金地茄子田母草田麻芥心草苦芥子布里草茆質汙胡堇草小兒羣獨腳仙撮石合草露筋草九龍草荔支草水銀草透骨草蛇眼草鵝項草蛇魚草九里香草白筵草環腸草劄耳草雲花草野芕草纖霞草牛脂艻鴨腳青天仙蓮雙頭蓮豬藍子天芥萊佛掌花郭公刺籩箕柴碎米柴羊屎柴山枇杷柴三角風葉下紅滿江紅隔山消石見穿墓頭回羊茅阿兒只阿息兒奴哥撒兒以上雜草薏苡榖部檳榔山檳榔大腹子馬檳榔茱茰以上果部桂卷一百藥譜八丁香烏藥研藥乳香沒藥騏驎竭阿魏盧會黃蘗小蘗厚朴杜仲秦皮皂角波斯皂莢鬼皂莢肥皂莢酸角訶黎勒婆羅得巴豆大風子海紅豆相思子豬腰子金櫻子衛茅五加枸杞溲疏楊櫨木天蓼放杖木接骨木新雉木合新木俳蒲木遂陽木學木核栒核木核荻皮柵木乾陀木馬瘍木角落木芺樹白馬骨慈母黃屑大木皮以上木部茯苓茯神神木豬苓以上寓木御定佩文齋廣羣芳譜目録下
