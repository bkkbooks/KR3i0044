水春風無浪春天半雨半晴紅粉相隨南浦晚幾含情宋張槃浣溪沙習習輕風破海棠鞦韆移影上廽廊晝長蝴蝶為誰忙度柳早鶯分暖緑過花小蝶𢃄春香滿庭芳草又斜陽髙觀國菩薩蠻春風吹緑湖邉草春光依舊湖邉道玉勒錦障泥少年遊冶時煙明花似繡且醉旗亭酒斜日照花西歸鴉花外啼程垓菩薩蠻畫橋泊泊春江緑行人正在春江曲花潤接平川有人花底眠東風原自好只怕催花老安得萬垂楊繫教春日長周密謁金門芳事晚數點杏鈿香淺惻惻輕寒風翦翦錦屏春夢逺稚栁拖煙嬌軟花影暗藏深院初試輕衫并畫扇牡丹紅未展李之儀好事近春到雨初晴正在小樓時節栁眼向人微笑傍闌干堪折暮山濃淡瑣煙霏梅杏半明滅玉斚莫辭沉醉判歸時斜月唐歐陽炯清平樂春來階砌春雨如絲細春徑滿飄紅杏蒂春燕舞隨風勢春幡細縷春繒春閨一點春燈自是春心撩亂非關春夢無憑宋王安國清平樂留春不住費盡鶯兒語滿地殘紅宫錦汚昨夜南園風雨小憐初上琵琶曉來思繞天涯不肯畫堂朱戶春風自在楊花王安中清平樂花時微雨未減春分數占取簾疏花密處把酒聽歌金縷斜風輕度濃香間情正與春長向晚紅燈入坐嘗新青杏隨觴盧祖臯西江月燕掠晴絲裊裊魚吹水葉𥻘𥻘禁街微雨灑芳塵寒食清明相近謾著宫羅試暖間呼社酒酬春晚風簾幕悄無人二十四番花信毛滂西江月煙雨半藏楊柳風花初著桃花玉人細細酌流霞醉裏將春留下柳外鴛鴦作伴花邉蝴蝶為家醉翁醉也且由他月在栁橋花下周密西江月波影暖浮玉甃柳隂深鎖金鋪湘桃花褪燕調雛又是一番春暮碧桂情深鳯怨雲屏夢淺鶯呼繡忩人倦冷薰爐簾影搖搖亭午吳潛南柯子池水凝新碧欄花駐老紅有人獨倚橋東手把一枝楊桞繫春風鵲伴遊絲墮蜂黏落蕊空秋千庭院小簾櫳多少間情間緒雨聲中楊無咎於中好墻頭艷杏花初試繞珍叢細挼紅蕊欲知占盡春明媚悄無意看桃李持杯準擬花間醉一葉兩葉飛墮晚來旋旋深無地更聽得東風起毛滂踏莎行階影紅遲柳苞黃遍纎雲弄日隂晴半重簾不捲篆香橫小花初破春叢淺鳳繡猶重鴨爐長暖屛山翠入江南逺醉輕夢短枕間欹緑忩窈窕風光轉元何可視蝶戀花金井啼鴉深院曉揚盡東風柳絮吹難了燕子多情相識早杏梁依舊雙雙到一縷沉煙簾幕悄滿眼飛花祗攪人懷抱十二玉樓春樹杪天涯不斷青青草宋俞國寶風入松一春長費買花錢日日醉湖邉玉驄慣識西湖路驕嘶過沽酒樓前紅杏香中歌舞緑楊影裏秋千暖風十里麗人天花壓鬢雲偏畫船載得春歸去餘情付湖水湖煙明日重扶殘醉來尋陌上花鈿栁永木蘭花慢坼桐花爛熳乍疏雨洗清明正豔杏燒林緗桃繡野芳景如屛傾城盡尋勝賞驟雕鞍紺􅚫出郊坰風暖繁絃脆管萬家競奏新聲盈盈鬪草踏青人艷冶遞逢迎向路旁往往遺簮墜珥珠翠縱橫歡情對佳麗地任金罍罄竭玉山傾􅍆却明朝永日畫堂一枕春酲黃機喜遷鶯平湖百畝種滿湖蓮葉繞堤楊栁冉冉波光輝輝煙影空翠濕霑襟袖靜愜鄰雞啼午暖逼沙鷗眠晝西園路更紅塵不斷蝶酣蜂瘦知否堪畫處野薺蕪菁罥地鋪茵繡桃李隂邉桑麻叢裏斜矗酒簾誇酒竹寺小依山趾茅店平窺津口春又晚正香風有客倚闌搔首别録增汜勝之書栽樹正月為上時二月為中時三月為下時然棗雞口槐兔目桑蝦蟇眼榆負瘤散其餘雜木鼠耳􅀢趄各其時凡種栽并插皆用此等形象本草凡採根物多以春月採者謂春初津潤始萌未衝枝葉勢力淳濃也春月移栽各樹宜上半月前則茂而結實移栽松柏槐柳桑柘橙橘各色樹皆可御定佩文齋廣羣芳譜卷一
