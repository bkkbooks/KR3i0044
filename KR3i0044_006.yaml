body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷四天時譜夏增禮記鄉飲酒義南方者夏夏之為言假也養之長之假之仁也爾雅夏為朱明註氣赤而光明夏為長嬴尸子南方為夏夏興也南任也萬物莫不任興蕃殖充盈也原梁元帝纂要夏曰朱夏炎夏三夏九夏天曰昊天風曰炎風節曰炎節草曰茂草雜草木曰蔚林茂林宻樹茂樹彚考增禮記王制夏薦麥周禮秋官薙氏掌殺草春始生而萌之夏日至而夷之原晉書嵇康傳康性絶巧而好鍜宅有一栁樹甚茂乃激水環之夏月居其上以鍜山海經朱提郡堂狼山多毒草盛夏之月飛鳥過之亦不得去淮南子武王䕃暍人于栁下而天下懷增淮南子夏取果蓏注有核曰果無核曰蓏薺麥夏死而人曰夏生生者衆尚書考靈曜夏火星昏中可以種黍原括地圗天毒國最熱夏則草木皆乾語林陸機在洛夏月忽思東頭竹篠飲語劉寳曰吾思鄉轉深矣增敘聞錄嵇昌蓄採星盆夏月漬果則倍冷原杜陽雜編李輔國夏月堂中設迎凉草其色碧榦似苦竹葉細於杉刺之牕户間舉室皆涼增熙朝樂事西湖夏夜觀荷最宜風露舒涼清香徐細傍花淺酌如對美人倩笑欵語也清閒供夏時晨起芰荷為衣傍花枝吸露午後刳椰子杯浮瓜沉李搗蓮花飲碧芳酒日晡浴罷掉小舟垂釣於古藤曲水邊薄暮籜冠蒲扇立層岡看火雲變現林下盟暑月晚涼浴罷杖履逍遥臨池觀月乘高取風採蓮剥芡剖瓜雪藕白醪三杯取醉而適其為樂殆未可以一二數也集藻文賦散句增梁江淹四時賦炎雲峯起芳樹未移臯蘭生坂朱荷出池憶上國之綺樹想金陵之蕙枝唐王勃夏日登韓城門樓序驚花亂下戲鳥平飛荷葉滋而曉露繁竹院静而炎氣息宋王炎夏日郊行賦麥穟穟而餅餌桑隂隂而繭絲麻斾斾而没人秧芃芃而布畦五言古詩增梁江總夏日還山庭獨於幽棲地山庭暗女蘿澗漬長低篠池開半卷荷野花朝暝落盤根嵗月多停尊無賞慰狎鳥自經過梁簡文帝納凉斜日晚駸駸池塘生半隂避暑高梧側輕風時入襟落花還就影驚蟬乍失林遊魚吹水沫神蔡上荷心翠竹垂秋采丹棗映疎碪無勞夜遊曲寄此託微吟隋薛道衡梅夏應教長廊連紫殿細雨應黄梅浮雲半空上清吹隔池來集鳳桐花散騰龜蓮葉開幸逢為善樂頻降濟時才唐韋應物園亭覽物積雨時物變夏綠滿園新殘花已落實高笋半成筠守此幽棲地自是忘機人宋秦觀田居入夏桑柘稠隂隂翳墟落新麥已登塲餘蠶猶占箔隆曦破層隂霽靄收逺壑雌霓卧淪漪鮮飇泛叢薄林深鳥更鳴水漫魚知樂羸老厭煩歊解衣屢磅礴䕃樹濯涼颸起行遺帶索冡婦餉初還丁男耘有託倒筒備青錢鹽茗恐垂槖明日輸絹租鄰兒入城郭七言古詩增宋歐陽修歸田樂南風原頭吹百草草木叢叢茅舍小麥穗初齊稚子嬌桑葉正肥蠶食飽老翁但喜嵗年熟餉婦安知時節好野棠梨宻啼晚鶯海石榴紅囀山鳥田家此樂知者誰我獨知之歸不早乞身當及强健時顧我蹉跎已衰老原梅堯臣夏熱六龍銜火燒寰宇魏王氷井若湯煮松枝桂葉凝若癡喘殺溪頭嘯風虎北冥融却萬丈氷千觔凍鼠忙如蒸我聞北土長飛雪此時日㬠地皮裂仙芝瑶草不敢茁湘川竹焦琅玕折西郊雲好雨不垂堆青疊碧徒爾為增元薩都刺新夏曲紅泣香枯怨流水夜放籜龍千尺尾風生宫樹曉層層凉綠一簾收不起煙乾寳鴨白晝清祝融緩轡行且停薔薇花深霧冥冥碧牕睡起香滿肱何中山中樂隄栁綠揺新罨畵石榴紅摺嬌裙衩蓮蕩風閒翡翠欹菱塘雨定鴛鴦下溪女浣紗朝出村行官飲水暮歸舎瓦瓶手挈隔年醅石下坐圍明月夜山中之樂誰得知我獨知之來何為空裏烏蟾飛影過桑麻課效勝書帷原鄭奎妻夏月詞芭蕉葉展青鸞尾萱草花含金鳳嘴一䨇乳燕出雕梁數㸃新荷浮綠水困人天氣日長時鍼線慵拈午漏遲起向石榴隂畔立戲將梅子打鶯兒五言律詩增唐駱賔王夏日遊目暫屏塵囂累言尋物外情致逸心逾黙神幽體自輕浦夏荷香滿田秋麥氣清詎假滄浪上將濯楚臣纓夏日遊山家返照下層岑物外狎招尋蘭徑薰幽佩槐庭落暗金谷静風聲徹山空月色深一遣樊籠累唯餘松桂心杜審言夏日過鄭七山齋共有樽中好言尋谷口來薜蘿山徑入荷芰水亭開日氣含殘雨雲隂送晚雷洛陽鐘鼓至車馬繫遲囘韋應物夏花明夏條綠已宻朱萼綴明鮮炎炎日正午灼灼火俱燃翻風適自亂照水復成妍歸視窓間字熒煌滿眼前許渾長興里夏日南鄰避暑侯家大道傍蟬噪樹蒼蒼開鏁洞門逺下簾賔舘涼欄圍紅藥盛架引綠蘿長永日一欹枕故山雲水鄉宋韓琦夏景即事槐耳籠前檻雲峯透曲櫺涼風即崑閬煩思入滄溟荷弱翻青蓋榴新倒綠缾晚來收驟雨一枕夢魂醒邵雍春盡後園閒歩綠樹成隂日黄鶯對語時小渠初瀲灧新竹正參差倚杖閒吟乆擕童引步遲好風知我意故故向人吹張耒夏日過雨芰荷亂繁隂竹樹多雛聲知鳥哺萍動見魚過細徑饒苔蘚隂墻引薜蘿角巾從倒側踈懶欲如何蚓壤排晴圃蝸涎印雨階花鬚嬌帶粉樹角老封苔問字病多忘過鄰慵却廻晚涼還盥櫛對竹引清杯細徑依原僻茅蓬四五家山田來雉兔溪雨熟桑麻竹籠晨收果茅菴夜守瓜頗知農事樂從此問生涯金龎鑄喜夏小暑不足畏深居如退藏青奴初薦枕黄妳亦升堂鳥語竹隂宻雨聲荷葉香晚涼無一事歩屧到西厢明仁宗池亭納涼夏日多炎熱臨池憩午涼雨滋槐葉翠風過藕花香舞燕來青𤨏流鶯出建章援琴彈野操民物樂時康七言律詩增唐錢起避暑納涼木槿花開畏日長時揺輕扇倚繩牀初晴草蔓縁新筍頻雨苔衣染舊墻十旬河朔應虚醉八柱天台好納涼無事始知禪静勝深垂紗帳詠滄浪宋陸游逃暑小飲熟睡至暮桑落香浮槲葉杯甘瓜綠李亦佳哉虚堂頓解汗揮雨高枕俄成鼻殷雷静聽風聲生檻竹徐㸔日影轉庭槐晩涼更動扁舟興北渚紅蕖已半開槐影桐隂欲滿廊綸巾羽扇自生涼新篘玉瀣陳䨇榼平展風漪可一牀馳騎逺分丹荔到大盆寒浸碧瓜香湖邊誰謂幽居陋也愛迢迢夏日長原明王象晉夏日祝融司令繼芳春四望郊原樂事均翠浪翻池荷蓋綠黄雲布壠麥痕新榴花焰焰紅噴火葵葉翩翩影應辰偃仰茂林逃酷暑呼朋酌酒莫辭頻五言排律增唐楊巨源夏日裴尹員外西齋看花笑向東來客看花枉在前始知清夏月更勝艷陽天露濕呈妝汗風吹畏火燃葱蘢和葉盛爛熳壓枝鮮紅綵當鈴閣清香到玉筵蝶棲驚曙色鶯語滯晴煙得地殊堪賞過時倍覺妍芳菲遲最好唯是謝家憐五言絶句御製橋望郊原浮麥氣池沼漾青蘋夏日臨橋望薰風處處新增金宇文虚中廻文翠宻圍窓竹青圓貼水荷睡多嫌晝永醒少得風和草徑迷深綠蓮池浴膩紅早蟬鳴樹曲鮮鯉躍潭東七言絶句增唐皮日休藥名離合夏日即事桂葉似茸含露紫葛花如綬蘸溪黄連雲更入幽深地骨錄閒擕相蠟郎高駢山亭夏日綠樹隂濃夏日長樓臺倒影入池塘水精簾動微風起滿架薔薇一院香宋司馬光夏日西齋書事榴花映葉未全開槐影沉沉雨勢來小院地偏人不到滿庭鳥迹印蒼苔范成大夏日田園雜興梅子金黄杏子肥麥花雪白菜花稀日長籬落無人過惟有蜻蜓蛺蝶飛五月呉江麥秀寒移秧披絮尚衣單稲根科斗行如塊田水今年一尺寛二麥俱秋斗百錢田家喚作小豐年餅爐飯甑無饑色接到西風熟稻天晝出耘田夜績麻村莊児女各當家童孫未解供耕織也傍桑隂學種瓜槐葉初勻日氣涼葱葱鼠耳翠成䨇三公只得三株看閒客清隂滿北窓千頃芙蕖放棹嬉花深迷路晚忘歸家人暗識船行處時有驚忙小鴨飛采菱辛苦廢犁鉏血指流丹鬼質枯無力買田聊種水近來湖靣亦收租楊萬里夏日不但春妍夏亦佳隨縁花草是生涯鹿葱解插纖長柄金鳳仍開最小花戴昺夏晝小雨小牀蘄簟展琉璃窓外新篁一尺圍正午雲橋陣雨過冬青花上蜜蜂歸元僧善住夏日中庭日午橘花開蜂蝶何知故故來一陣南薰生殿角亂飄香雪㸃蒼苔原明呉寛夏日綠䕃松蘿暑氣涼清泉瀉入小池塘人間晝永無聊頼一朶荷花滿院香增黄氏幼藻夏日深院塵消散午炎篆煙如夢晝淹淹輕風似與荷花約為送香來自捲簾詩散句增周庾信槐庭垂綠穗蓮浦落紅衣陳徐陵嫩竹猶含粉初荷未聚塵隋李徳林桐枝覆玉檻荷葉滿銀塘唐杜甫公子調冰水佳人雪藕絲嚴維蕙風清水殿荷氣雜天香張籍竹月泛涼影萱露澹幽叢原宋邵雍夏木無重數叢隂翠樹低秦觀新麥已登塲餘蠶猶占箔增唐方干樹影興賒侵枕簟荷香坐乆著衣巾巖溜噴空晴似雨林蘿礙日夏多寒宋陸游池塘瀲瀲荷浮葉門巷隂隂筍放梢元方䕫楝花零落魚初發梅子青黄雨不乾早麥熟随芹菜餉晚茶香和樹芽蒸原蘇澹林塘乍迸翁孫竹籬落齊開姊妹花增晉謝朓夏木轉成帷周庾信夏餘花欲盡唐韓偓暑退松篁健李顒垂藤引夏涼李咸用雲水沉沉夏亦寒宋陸游簷前桐影偏宜夏詞原宋秦觀如夢令門外綠隂千頃两兩黄鸝相應睡起不勝情行到碧梧金井人静人静風弄一枝花影增明陳繼儒攤破浣溪紗梓樹花香月半明棹歌歸去蟪蛄鳴曲曲栁灣茅屋矮挂魚罾笑指吾廬何處是一池荷葉小橋横燈火紙窓修竹裏讀書聲原宋蘇庠臨江仙獵獵風蒲初暑過瀟然庭户秋清野航渡口帶煙横晚山千萬疊别鶴兩三聲秋水芙蓉聊蕩槳一樽同破愁城蓼花灘上白鷗明暮雲連極浦急雨暗長汀明文徴明青玉案庭下石榴花亂吐滿地綠隂亭午午睡覺來時自語悠揚魂夢黯然情緒蝴蝶過墻去駸駸嬌眼開仍殢悄無人欲出還凝竚團扇不揺風自舉盈盈翠竹纖纖白苧不受些兒暑别錄原芸窓類記凡收藏書畵於未梅雨前曬極燥頓匣櫃中厚以紙糊門及小縫令不通風即不黴古人藏書多用芸香即今之七里香也匣櫃須用楸梓杉桫之類忌油松内不用漆占候夏氷嵗饑五穀不成製用夏月凡制一切果蔬俱用臘雪水㝡佳四月立夏小滿附見增禮記月令孟夏之月日在畢昏翼中旦婺女中註日月會於實沈而斗建巳之辰也王瓜生苦菜秀命野虞出行田原為天子勞農勸民毋或失時農乃登麥天子乃以彘嘗麥先薦寝廟聚畜百藥靡草死麥秋至原梁元帝纂要是月曰孟夏亦曰首夏增花月令是月也杜鵑翔木香升新篁敷粉罌粟滿芍藥相木筆書空瓶史月表花盟主芍藥薝蔔夜合花客卿石巖鸎粟玫瑰花使令刺牡丹粉團龍爪垂絲海棠虞美人楝花彚考原詩豳風四月秀葽增夏小正四月囿有見杏王萯莠取荼傳荼也者以為君薦蒋也晉書樂志四月之管名為仲呂者呂助也謂陽氣盛長隂助成功也四月之辰謂為己巳者起也物至此時畢盡而起也四月官田其樹桃孟夏之月以熟穀禾律受夾鍾夾鍾者種始莢也四民月令四月可種黍謂之上時禮斗威儀孟夏驅獸無害五穀秦中嵗時記長安四月已後自堂厨至百司厨通謂之櫻笋厨高僧傳摩歌利頭四月八日浴佛以都梁香為青色水鬱金香為赤色水丘隆香為白色水附子香為黄色水安息香為黑色水以灌佛頂也景龍文館記四年四月上幸司農少卿王光輔荘駕還朝後中書侍郎南陽岑羲設茗飲葡萄漿與學士等討論經史東坡詩註成都太守自正月十日至四月十九日浣花乃止水衡記麥黄水四月水名賞心樂事四月芳草亭鬭草芙蓉池新荷蕋珠洞荼䕷滿霜亭菊芽玉照堂青梅艷香館長春花安閒堂紫笑羣仙繪幅樓前玫瑰餐霞軒櫻桃詩禪堂盤子山丹花南湖雜花鷗渚亭五色鸎粟花清閒供四月十四菖蒲誕史纂馬珏居華陽亭墻外有來禽一株枯已乆矣師四月十四日汲水沃之曰純陽來年是日生於此樹之下帝京景物畧四月八日捨豆兒曰結緣十八日亦捨先是拈豆念佛一豆佛號一聲有念豆至石者至日熟豆人徧捨之其人亦一念佛啖一豆也是月榆初錢麺和糖蒸食之曰榆錢糕立夏增禮記月令是月也以立夏先立夏三日太史謁之天子曰某日立夏盛徳在火天子乃齋立夏之日天子親帥三公九卿大夫以迎夏於南郊三禮義宗四月立夏為節夏大也至此之時物已長大故以為名説林立夏日俗尚啖李時人語曰立夏得食李能令顔色美故是日婦女作李會取李汁和酒飲之謂之駐色酒一曰是日啖李令不疰夏熙朝樂事立夏之日人家各烹新茶配以諸色細果餽送親戚比鄰謂之七家茶富室競侈果皆雕刻飾以金箔而香茶名目若茉莉林檎桂蕋薔薇丁檀蘇杏盛以哥汝瓷甌僅供一啜而已嘉呉記俗於立夏日噉青梅云令人終嵗神清不惛睡小滿增孝經緯立夏後十五日斗指已為小滿物類相感志青梅過小滿黄蜀葵過小滿則長集藻文賦散句原晉夏𤣥述夏賦四月惟夏運臻正陽和氣穆而扇物麥含露而飛芒清徴泛於琴瑟朱鳥感於炎荒鹿角解於中野草木蔚其條長梁昭明太子錦帶書節届朱明晷鍾丹陸依依聳蓋俱臨帝女之桑鬱鬱丹城並掛陶潜之栁梅風拂户牖之内麥氣擁宫闕之前唐許敬宗麥秋賦葉幄垂秀條帷泛光鶯傳枝而嬝娜蜂散蕋而芬芳對銀縚而偶穟並金縷而分芒改炎炎之鑠石若懔懔之懷霜五言古詩原晉陶潜讀山海經孟夏草木長遶屋樹扶踈衆鳥欣有託吾亦愛吾廬既耕亦已種時還讀我書窮巷隔深轍頗廻故人車歡言酌春酒摘我園中蔬微雨從東來好風與之俱泛覽周王傳流觀山海圗俯仰終宇宙不樂復何如增梁簡文帝和湘東王首夏冷風雜細雨垂雲助麥涼竹水俱蔥翠花蝶两飛翔燕泥含復落鶗吟斂更揚卧石藤為纜山橋樹作梁欲待華池上明月吐清光唐劉禹錫初夏曲時節過繁華隂隂千萬家巢禽命子戲園果墜枝斜寂寞孤飛蝶窺叢覓晚花白居易首夏南池獨酌春盡雜英歇夏初芳草深薰風自南至吹我池上林綠蘋散還合頳鯉跳復沈新葉有佳色殘鶯猶好音依然謝家物池酌對風琴慙無康樂作秉筆思沈吟境勝才思劣詩成不稱心宋梅堯臣孟夏二日通判太博惠庭花前日已春盡夏卉抽嫩青唯君所植花餘紅猶滿庭常惜畏景逼贈未及飄零欲插為之醉但慙髪星星七言古詩原唐李賀四月樂詞曉涼暮涼樹如蓋千山濃綠生雲外依微香雨青氛氳膩葉蟠花照曲門金塘閑水揺碧漪老景沈重無驚飛墜紅殘萼暗參差五言律詩御製夏日迎薰亭苑啓時初夏亭隂午未䦨雨過池藻碧日綻海榴丹水木含清景禽魚得静觀薰風能解慍試取玉琴彈夏日郊行節變春方去清和助麥秋蔚林乘早夏茂草接新流栁絮隄邊起荷錢水上浮風光殊舊日此意未曾休初夏玉泉山二首别舘依丹麓疎簾映碧莎泉聲當檻出花氣入垣多路轉溪橋接舟沿石竇過薰風能阜物藻景已清和山翠引鳴鑣湖光漾畵橈野雲低隔寺沙栁暗藏橋百囀黄鸝近䨇飛白鷺遥今年農事早時雨足新苖增唐韋應物始夏南園思舊里夏首雲物變雨餘草木繁池荷初貼水林花已掃園縈叢蝶尚亂依閣鳥猶喧對此殘芳月憶在漢陵原白居易早夏遊平泉廻夏早日初長南風草木香肩輿頗平稳澗路甚清涼紫蕨行㸔探青梅旋摘嘗療饑兼解渇一盞冷雲漿宋司馬光首夏呈諸鄰首夏木隂薄清和自一時筍抽八九尺荷生三四枝新服裁蟬翼舊扇拂蛛絲莎徑熱未劇晨昏來徃宜陸游幽居初夏梅塢青黄子草陂紅紫花䨇鵞朝戲浦羣鴨暮還家赤脚挑殘筍蒼頭摘晚茶出門逢野老滿意説桑麻元白珽餘杭四月四月餘杭道一晴生意繁朱櫻青豆酒綠草白鵞村水滿船頭滑風輕袖影翻㡬家蠶事動寂寂晝門關明陳憲章四月四月隂晴裏山花落漸稀雨聲寒月桂日色煖酴醿病起初持酒春歸尚掩扉午風吹蛺蝶低趁乳禽飛生意日無涯乾坤自不知受風荷柄曲擎雨柏枝垂静坐觀羣妙聊行覓小詩臨階愛新竹抽作碧參差七言律詩原唐皮日休四月十五日和陸龜蒙道室書事望朝齋戒是尋常静啓金根第㡬章竹葉飲為甘露色蓮花鮓作肉芝香松膏背日凝雲磴丹粉經年染石牀剰欲與君終此志頑仙惟恐鬢成霜宋蔡襄四月池上風下平池水暈開池邊露坐水風來草香苒苒生吟席雲影飛飛度酒杯荷葉偶成䨇翠蓋荔枝纔似小青梅人閑物静两相得月色蒼涼始肻廻陸游初夏閒居城上朱旗夏令初溪頭綠水蘸菰蒲花貪結子無遺萼燕接飛蟲正哺雛簫鼓賽蠶人盡醉陂塘移稻客相呼長安青蓋金羈馬也有農家此樂無戴昺四月即景茶歌纔了又田歌節物真成一鳥過蒼竹颭風涼意足碧梧留雨夜聲多瓜緣茅屋抽長蔓藕過蔬畦出矮荷㝡喜白鷗相狎乆對人自在浴清波真山民初夏一葉薰風帶暑囬雨天濃翠與庭槐不随春去鶯猶在好競時妝榴又開剪尺旋裁新白苧杯盤聊薦舊青梅篋中敝扇投閒乆依舊團團入手來五言排律增唐太宗賦得夏首啓節北闕三春晩南榮九夏初黄鶯弄漸變翠林花落餘瀑流還響谷猿啼自應虛早荷向心卷長楊就影舒此時歡不極調軫坐相於白居易春末夏初閒遊江郭二首閒出乗輕屐徐行蹋軟沙觀魚傍湓浦看竹入楊家林迸穿籬笋藤飄落水花雨埋釣舟小風颺酒旗斜嫩剝青菱角濃煎白茗荼淹留不知夕城樹欲棲鴉栁影繁初合鶯聲澀漸稀早梅迎夏結殘絮送春飛西日韶光盡南風暑氣微展張新小簟熨帖舊生衣緑蟻杯香嫩紅絲鱠縷肥故園無此味何必苦思歸首夏猶清和聨句記得謝家詩清和即此時白居易餘花數種在宻葉㡬重垂裴度芳謝人人惜隂成處處宜劉禹錫水萍争㸃綴梁燕共追隨白行式亂蝶憐踈蕋殘鶯戀好枝張籍草香殊未歇雲勢漸多竒白居易單服初寧體新篁已出籬裴度與春為别近覺日轉行遲劉禹錫繞樹風光少侵階苔蘚滋白行式唯思奉歡樂長得在西池張籍七言絶句御製夏日閒坐雲斂風微紫燕飛春光已去夏初歸清襟贏得天然處暗覺花香到玉扉增宋司馬光初夏首夏清和新雨晴緑莎細軟不妨行園夫遮道白何事梔子花開班笋生王安石初夏即事石梁茅屋有彎碕流水濺濺度兩陂晴日煖風生麥氣綠隂幽草勝花時東陂荷葉初開筍漸抽東陂南蕩正堪遊無端隴上翛翛麥横起寒風占作秋陳造早夏安石榴花猩血鮮涼荷高葉碧田田鰣魚入市河豚罷已是江南打麥天范成大初夏四首清晨出郭更登臺不見餘春只麽囘桑葉露枝蠶向老菜花成莢蝶猶來晴絲千尺挽韶光百舌無聲燕子忙永日屋頭槐影暗微風扇裏麥花香東君不解惜芳菲料峭寒中一夢非翦盡牡丹梅子綻何須風雨送春歸一簾芳樹緑葱葱蝴蝶飛來覓綺叢雪白荼䕷紅寳相尚擕春色見薰風陸游初夏紛紛紅紫已成塵布穀聲中夏令新夾路桑麻行不盡始知身是太平人槐栁成隂雨洗塵櫻桃酪乳併嘗新古來江左多佳句夏淺勝春㝡可人楊萬里初夏麥黄秧碧百家衣已熱猶寒四月時雨後覓春無一寸薔薇花發釅燕脂手種琅玕劣十年今年新笋不勝繁不知明早添多少日暮閒來數一番戴敏遊張園乳鴨池塘水淺深熟梅天氣半晴隂東園載酒西園醉摘盡枇杷一樹金詩散句增晉謝靈運首夏猶清和芳草亦未歇原謝朓麥候始清和涼雨消炎燠唐太宗一朝春夏改隔夜鳥花遷增張説庭栁餘春駐宫櫻早夏催原杜甫摘荷纔首夏驄馬尚餘春錢起花萼敗春多寂寞葉隂迎夏巳清和宋謝伯初園林換葉梅初熟池舘無人燕學飛蘇軾呉國晩蠶初斷葉占城早稻欲移秧陸游采茶歌裏春光老煮繭香中夏景長風和栁岸吹綿後雨足瓜畦引蔓時梅子生仁已帶酸楝花堕地尚微寒詞原明陳繼儒攤破浣溪沙蜂欲分衙燕補巢清和天氣綠隂嬌一陣窓前風雨到打芭蕉驚起幽人初睡午茶煙繚繞出花梢有箇客來琴在背度紅橋葉夢得黄金縷睡起流鶯語掩蒼苔房櫳向曉亂紅無數吹盡殘花無人問惟有垂楊自舞漸煖靄初囘輕暑寳扇重尋明月影暗塵侵尚有乗鸞女驚舊恨鎮如許江南夢斷衡臯渚㸔黏天蒲菰漲綠半空煙雨無限樓前滄波意誰採蘋花寄取空惆悵蘭舟容與萬里雲帆何時到送孤鴻目斷千山阻誰為我唱金縷别錄原占候月内有三夘宜麻無則麥不收月内寒主旱諺云黄梅寒井底乾諺云有穀無穀且㸔四月十六立一丈竿量月影月當中時影過竿雨水多没田夏旱人饑長九尺主三時雨水八尺七尺主雨水六尺低田大熟高田半收五尺主夏旱四尺蝗三尺人饑增農政全書分龍之日農家於是日早以米篩盛灰藉之紙至晩視之若有雨㸃迹則秋不熟穀價高人多閉糶諺云二麥不怕神共鬼只怕四月八日雨大抵立夏後雨多便損麥蓋麥花夜吐雨多花損種植秋王瓜麥門冬芝麻蘿蔔扁豆粟紫蘇菱莧小豆絲瓜枇杷葱瑞香芡移植石菖蒲櫻桃茄秋海棠茉莉梔子秋牡丹枇杷葱翠雲草菊芋壓揷玉繡毬木樨梔子錦葵玉蝴蝶木香荼䕷芙蓉收採豨薟草白蘚根菜子析冥子桃杏仁蠶豆柴胡笋乾楮實黄葵花蒼耳子紅花㽔仁桑椹整頓防露傷麥翦菖蒲鋤葱素馨斫楮皮埋蠶沙伐樹絡麻田忌天火酉九焦未地火未糞忌寅荒蕪申五月芒種夏至端午附見增禮記月令仲夏之月日在東井昏亢中旦危中註日月會於鶉首而斗建午之辰也農乃登黍天子乃以雛嘗黍羞以含桃先薦寝廟令民毋艾藍以染半夏生木堇榮原梁元帝纂要五月曰仲夏亦曰暑月臯月花月令是月也葵赤紫薇葩薝蔔始馨夜合交榴花照眼紫椹降於桑增瓶史月表五月花盟主石榴番萱夾竹桃花客卿蜀葵洛陽花午時紅花使令川荔枝梔子花火石榴孩兒菊一丈紅石竹花彚考增周禮秋官仲夏斬隂木註隂木秋冬生者若松柏之屬夏小正五月乃衣瓜傳瓜者急瓜之辭也瓜者始食瓜也初昏大火中種黍菽糜煮梅蓄蘭傳大火者心也心中種黍菽糜時也煮梅為豆實也蓄蘭為沐浴也晉書樂志五月之辰謂為午午者長也大也言物皆長大也五月之管名為㽔賔葳㽔垂下貎也賔敬也謂時陽氣下降隂氣始起相賔敬也風俗通五月落梅風江淮以為信風風土記五月有霖霪號為梅雨霑衣皆敗謂之送梅雨嵗時雜記仲夏多大雨名濯枝雨水衡記五月瓜蔓水五月瓜延蔓故以名夢溪筆談五月草木茂盛逾於初生故曰勝先賞心樂事五月聽鶯堂摘瓜重午節泛蒲煙波觀碧蘆南湖萱花綺互亭火笑花水北書院采蘋鷗渚亭五色蜀葵清夏堂楊梅叢奎閣榴花艷香舘林檎摘星軒枇杷清閒供五月十三竹醉日芒種增嬾真子錄陜州夏縣士人樂舉明逺嘗云二十四氣其名皆可解獨小滿芒種説者不一僕因問之明逺曰皆為麥也小滿四月中謂麥之氣至此方小滿而未熟也芒種五月節種該數類之種謂種之有芒者麥也至是當熟矣僕因記周禮稻人澤草所生種之芒種註云澤草之所生其地可種芒種芒種稻麥也僕近為老農始知過五月節則稻不可種所謂芒種五月節者謂麥至是而始可收稻過是而不可種也古人名節之意所以告農候之早晚深哉夏至增周禮秋官柞氏掌攻草木及林麓夏日至令刋陽木而火之疏夏日至謂五月夏至之日為之也令刋陽木而火之謂先削以去其皮乃燒之管子夏至而麥熟天子祀太宗其盛以麥穀之始也荆楚嵗時記夏至日食糭取菊為灰以止小麥槖按干寳變化論云朽稻為蠶朽麥為蛺蝶此其騐乎風土記夏至前芒種後雨為黄梅雨田家初插秧謂之發黄梅端午增玉燭寳典洛陽人家端午造术羮艾酒以花絲作樓閣插鬢贈遺辟瘟扇荆楚嵗時記五月五日四民並蹋百草又有鬬百草之戲採艾為人懸門户以禳毒氣按宗則嘗以五月五日鷄未鳴時採艾見似人處攬而取之用灸有騐是日競渡採雜藥風土記端午烹鶩進筒糭一名角黍以菰葉裹黏米栗棗以灰煮令熟蓋取隂陽包裹未散之象千金月令端午以菖蒲或鏤或屑以泛酒採蘭雜志杜羔妻趙氏每嵗端午午時取夜合花置枕中羔稍不樂輙取少許入酒令婢送飲羔即歡然當時婦人争效之酉陽雜爼五月進五時圗五時花施帳之上嵗時雜記端午刻菖艾為小人子或葫蘆形帶之辟邪呉中嵗時記端午簮艾葉榴花以辟邪乾淳嵗時記端午禁中插食盤架設天師艾虎意思山子數十座五色蒲絲百草霜以大盒三層飾以珠翠葵榴艾花蜈蚣蛇蝎蜥蜴等謂之毒蟲又以大金瓶數十遍插葵榴梔子花環繞殿閣及分賜后妃諸閣大璫近侍翠葉五色葵榴金絲翠扇真珠百索釵符經筒香囊軟香龍涎佩帶及紫練白葛紅蕉之類大臣貴邸均被細葛香羅蒲絲艾朶彩團巧粽之賜而外邸節物大率效尤焉熙朝樂事端午為天中節家家買葵榴蒲艾植之堂中或採百草以治藥品東京夢華錄端午節物百索艾花銀樣鼓兒花花巧畵扇香糖果子糭子白團紫蘇菖蒲木瓜並皆葺切以香藥相和用梅紅匣子盛裹自五月一日及端午前一日賣桃栁蒲葉葵花佛道艾次日家家鋪陳於門首與糭子五色水團茶酒供養又釘艾人於門上士庶迎相宴賞嵗華紀麗譜五月五日宴大慈寺設㕔醫人鬻艾道人賣符朱索綵縷長命辟災之物筒飯角黍莫不咸在遼志五月五日午時採艾葉與綿相和絮衣七事國主著之臣僚各賜艾衣三事國主及臣僚飲宴渤海厨子進艾糕各㸃大黄湯下北呼此時為討賽離又以雜絲或綠結合歡索纒於臂膊婦人進長命縷宛轉皆為人像帶之集藻文散句原魏文帝與呉質書㽔賔紀時景風扇物天氣和煖衆果具繁梁昭明太子錦帶書麥隴移秋桑律漸暮蓮花泛水豔如越女之顋蘋葉漂風影亂秦臺之鏡炎風以之扇户暑氣於是盈樓凍雨洗梅樹之中火雲燒桂林之上五言古詩增周庾信奉和夏日應令朱簾捲麗日翠幕蔽重陽五月炎氣蒸三時刻漏長麥随風裏熟梅逐雨中黄開冰帶井水和粉雜生香衫含蕉葉氣扇動竹花涼早菱生軟角初蓮開細房願陪仙鶴舉洛浦聽笙簧宋陸游時雨時雨及芒種四野皆插秧家家麥飯羮處處菱歌長老我成惰農永日付竹牀衰髪短不櫛愛此一雨涼庭木集竒聲架藤發幽香鸎衣濕不去勸我持一觴即今幸無事海際皆農桑野老固不竆擊壤歌虞唐七言古詩增宋陸游怡齋東湖仲夏草樹荒屋古無人亭午涼萱房微呀不見日笋籜自解時吹香野藤蟠屋入窓罅濕菌扶踈生屋梁跨溝數椽㝡幽翳漲水及檻雨敗墻静涵青蘋舞藻荇閒立白鷺浮鴛鴦芙蕖雖瘦亦瀰漫照眼翠蓋遮紅妝水紋珍簟欲卷却團團素扇嬾復將天風忽送塔鈴語喚覺清夢遊瀟湘五言律詩御製午日令序當重午南臺日正中玉階鳴瀑水瑶軫奏薰風菖葉浮杯綠榴花照檻紅臨流㸔競渡轉憶濟川功途次端午㽔賔逢夏律午日俯澄流黄鳥林中變新蒲岸外稠宫筵傳綵糭仙酒泛丹榴遥憶蓬萊上垂楊䕃御溝增宋陸游重五重五山村好榴花忽已繁糭包分两髻艾束著危冠舊俗方儲藥羸軀亦㸃丹日斜吾事畢一笑向杯盤七言律詩原唐李徳裕嶺南道中嶺水争分路轉迷桄榔椰葉暗蠻溪愁衝毒霧逢蛇草畏落沙蟲避燕泥五月畬田收火米三更津吏報潮雞不堪腸斷思鄉處紅槿花中越鳥啼增元成廷珪夏日過萬蓬菴愛汝東菴暑氣薄解衣盤礴坐莓苔一林綠竹盡可數五月白蓮猶未開捉麈談禪知獨徃買魚沽酒待重來滄江日落山更好且放輕舟緩緩廻明虞堪午日訪沈元圭席上次韻一簾葵錦爛晴霞五色絲虹映臂紗𤣥藥自消頭上雪絳榴誰插鬢邊花茶烹石鼎從施禁詩寫蠻箋學破邪不是西山黄石叟難逄東老地仙家原何景明午日五月五日天氣鮮艾葉榴花對眼前鄉土嵗時殊不惡閭閻風俗自堪憐鄰人角黍能相送野老蒲觴得共傳囘首十年車馬地每逢佳節淚澘然文徴明仲夏有懷五月江南櫻笋殘踈花吹盡綠漫漫雨來却及梅黄候春去猶餘麥秀寒白日幽深茒屋静野情蕭散苧袍寛美人何處經時别滿耳新蟬獨倚䦨五言絶句增宋蘇軾端午皇帝閤帖子詞採秀擷羣芳争儲百藥良太醫初薦艾庻草騐蕃昌皇太妃閤端午帖子詞雨細方梅夏風高已麥秋應憐百花盡綠葉暗紅榴太皇太后閤端午帖子詞日永蠶收簇風高麥上塲朝來藉田令菰黍獻時芳夫人閣端午帖子詞肅肅槐庭午沈沈玉漏稀皇恩樂佳節鬬草得珠璣六言絶句增宋鼂補之仲夏即事紅葵有雨長穗青棗無風壓枝濕礎人霑汗際蒸林禪烈號時七言絶句增宋王安石五月與和叔同遊齊安繅成白雪桑重綠割盡黄雲稻正青他日玉堂揮翰手芳時同此賦林坰蘇軾皇太后閤端午帖子詞祕殿扶踈夏木深雨餘初有一蟬吟應將嬴女乘鸞扇更助南風長棘心上林珍木暗池臺蜀産呉包萬里來不獨盤中見盧橘時於糭裏得楊梅皇太妃閤端午帖子詞玉盆沈李灧清泉金鴨嘘空裊細煙自有梧楸障畏日仍欣麥黍報豐年陸游重午葉底榴花蹙絳繒街頭初賣苑池冰世間各自有時節蕭艾著冠稱道陵原僧道潜臨平道中春蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲增金趙秉文夏至玉堂睡起苦思茶别院銅輪碾露芽紅日轉階簾影薄一䨇蝴蝶上葵花馬定國村居五月南風化蟪蛄野塘晩筍未成蒲檉花落盡紅英細沙渚鴛鴦半引雛元廼賢月湖竹枝詞五月荷花紅滿湖團團荷葉綠雲扶女郎把釣水邊立折得栁條穿白魚詩散句原唐李白大火五月中景風從南來數枝石榴發一丈荷花開五月梅始黄蠶稠桑柘空山花異人間五月雪中白增宋李邦直艾葉成人後榴花結子初唐陳羽池上樓臺五月涼百花開罷水芝香方干長潭五月來冰氣孤檜中宵學雨聲宋章得象五日㸔花憐並蔕今朝鬬草正宜男花隂轉午清風細玉燕釵頭艾虎輕陸游瓜蔓水生初抹岸梅黄雨細欲遮樓戴復古海榴花上雨蕭蕭自切菖蒲泛濁醪元周權人家綠艾端陽節天氣黄梅雨細時顧瑛梧竹一庭涼欲雨池臺五月氣涵秋明唐順之榴吐千花承雨蓋蓂開五葉拂瑶墀唐韓翃寒水浮瓜五月時薛能槐栁隂隂五月天宋王珪瑶墀九御薦菖華秦觀菡蓞吹風五月秋章得象菖蒲泛酒堯樽綠元馬士熙曲䦨五月櫻桃紅詞原宋蘇軾阮郎歸綠槐高栁咽新蟬薰風初入絃碧紗窓下水沈煙碁聲驚晝眠微雨過小荷翻榴花開欲然玉盆纖手弄清泉瓊珠碎又圓呉禮之喜遷鶯梅霖初歇正絳色海榴争開佳節角黍包金香蒲切玉是處玳筵羅列鬬巧已輸年少玉腕綵絲䨇結艤畵舫見龍舟兩兩波心齊發竒絶難畵處激起浪花翻作湖間雪畵鼓轟雷紅旗掣電奪罷錦標方徹望中水天日暮猶自珠簾高掲棹歸晚載荷香十里一鈎新月增劉克莊賀新郎思逺樓前路望平隄十里湖光畵船無數綠蓋盈盈紅粉靣葉底荷花解語鬬巧結同心䨇縷尚有經年離别恨一絲絲總是相思處相見也又重午清江舊事傳荆楚歎人情千載如新尚沈菰黍且盡樽前今日醉誰肻獨醒弔古泛㡬盞菖蒲綠醑兩兩龍舟争競渡奈珠簾暮捲西山雨㸔未足怎歸去别錄原占候博雅月内有三夘宜稻及大小豆無則宜早豆五月大種瓜不下五月小種秧必須早五月小瓜果吃不了田家五行志夏至在月初主雨水調諺云夏至端午前坐了種田年夏至在月中耽閣糶米翁夏至值甲寅丁夘粟貴朔日值芒種六畜災值夏至冬米大貴十日得辰早禾半收十一日得辰五穀不收嵗時記夏至在初二三主米麥貴初五米貴諺云夏至連端午家家賣兒女初七八米麥平二十大饑上旬米賤中旬大豐米大賤末旬大歉米大貴便民圗纂五月暴熱之時㸔窠草忽自枯死主有水種植晩大豆夏蘿蔔黑豆黄豆晚菘菜赤豆菉豆瓜移植枇杷月季荼䕷薔薇木香櫻桃石榴錦帶棠棣玉堂春西河栁橘瑞香寳香素馨剪春羅竹橙收採菖蒲蒜臺麥諸菜子馬齒莧青箱子卷栢藤花莧天茄苖白花菜大小薊旋覆花紅花萱花杜仲蛇牀子馬蘭子酸漿草黄柏槐花浮萍蒲公英益母草車前子金銀花天麻艾水仙根豨薟草罌粟子蔴黄澤瀉整頓割苧麻斫桑枝糞桑採練葛製用金門嵗節重午日午時有雨則急砍一竹竹節中必有神水瀝取和獺肝為圓治心塊腹聚等病田忌天火子地火酉荒蕪巳九焦夘糞忌午六月伏附見增禮記月令季夏之月日在栁昏火中旦奎中註日月會於鶉火而斗建未之辰也溫風始至命澤人納材葦樹木方盛命虞人入山行木毋有斬伐原花月令是月也萱宜男鳯仙來儀菡蓞百子凌霄登茉莉來賔玉簮搔頭增瓶史月表六月花盟主蓮花玉簮茉莉花客卿百合山丹山礬水木樨花使令錦葵錦燈籠長雞冠仙人掌赬桐鳳仙花彚考原詩豳風六月食鬱及薁增夏小正六月煮桃傳桃也者拖桃也拖桃也者山桃也煮以為豆實也晉書樂志六月之辰謂之未未者味也言時萬物向成有滋味也六月之管名為林鍾林者林茂也謂時物茂盛於野也雲仙雜記房夀六月召客坐湘竹簟凭狐文几編香藤為爼刳椰子為杯搗蓮花製碧芳酒調羊酪造含風酢皆涼物也内觀日疏六月廿四日為觀蓮節鼂采與其夫各以蓮子饋遺為歡夢溪筆談六月萬物小盛故曰小吉暇日記六月山礬水賞心樂事六月蒼寒堂後碧蓮碧宇竹林避暑芙蓉池賞荷花約齋夏菊清夏堂新荔枝霞川食桃呉郡記荷花蕩在葑門之外每年六月廿四日遊人最盛畵舫雲集露幃則千花競笑舉袂則亂雲出峽揮扇則星流月映聞歌則雷輥濤趨蘇人遊冶之盛至是日而極矣伏原四民月令初伏薦麥瓜於祖禰東京夢華錄都人㝡重三伏蓋六月中别無時節徃風亭水榭峻宇髙樓雪檻氷盤沈李浮瓜流杯曲沼苞鮓新荷逺邇笙歌通夕始罷增清閒供六月初伏薦麥瓜中伏碧筒勸竹篠飲二十四日蓮誕集藻文散句原梁昭明太子錦帶書三伏漸終九夏將謝螢飛腐草光浮帳裏之書蟬噪繁柯影入機中之鬢濯枝遷潦溢芳槿茂而發榮山土焦流金海水沸而漂爍五言古詩增宋鼂補之夏季夏季百果繁葵亦成實獨有野石榴幽花時熠熠熠熠非獨好芳榮頼午日翩翩彼白蜨髣髴麤采挹睡餘起對此嘉興亦蕭瑟良非阡陌麗敢競陽春出無言以成蹊上愧桃李質幸當飽霜餘萬顆富君室七言古詩增宋蔡襄甲辰初伏快雨涼風晝眠初覺庭前小欄花木各有意氣效栢梁體閏夏天氣熱熖烘崇朝快雨隨清風晝軒夢覺開前櫳畵欄花草意氣雄側枕遥聞數異同如此微物煩化工盍各言爾之所從繁葩富豔生朱紅川海棠枯條大蕋千萬重緋桃修榦㸃綴赤日中蜀葵蠲去憂忿誰與功萱草採摘烹煮袪煩胸百合秋霜巨實垂如甕木瓜横柯逺引交加叢紅玫瑰葉抽綠劍端黄茸山薑直立開披泉貨通金錢疊繞翠羽翻虯龍薜荔誤入畦町非余公䔛麻助滌渇肺思匪躬麥門冬物物自名詞不竆願當我意乃汝容負汝不飲慙衰翁歐陽修初伏日招王㡬道小飲北園數畆宫墻下嗟我官居如傳舍滹沱北渡馬踏氷西山病歸花已謝落英不見空繞樹細草初長猶可藉空園一鎻不復窺不覺芳蹊繁早夏隔墻時時聞好鳥如得嘉客聽清話今朝試去繞園尋綠李横枝礙行馬蒲萄憶見初引蔓翠葉隂隂還滿架紅榴㝡晚子已繁猶有殘花藏葉罅人生有酒復何求官事無了須偷暇古云伏日當早歸况今著令許休假能來解帶相就飲為子埽月開風榭七言律詩原唐王維積雨輞川荘作積雨空林煙火遲蒸棃炊黍餉東菑漠漠水田飛白鷺隂隂夏木囀黄鸝山中習静觀朝槿松下清齋折露葵野老與人争席罷海鷗何事更相疑增宋韓琦六月六日雨後過嶽廟遊從封寺觀稼暑雨頻經信宿休近郊方出釋潜憂雖妨麥始二停獲且見苖知一半收神嶽怖民藏電雹老松憑寺偃蛟虬佳遊况遇從豐讖好飾千倉待有秋七言絶句原宋蘇軾西湖畢竟西湖六月中風光不與四時同接天蓮葉無竆碧映日荷花别樣紅詩散句增宋蘇軾遶郭荷花一千頃誰知六月下塘春元龔璛六月涼如冰熨齒枇杷移隂碧書几梁庾信六月蟬鳴稻詞原明陳繼儒浪淘沙風雨霎時晴荷葉青青䨇鬟捧著小紅燈報道綠紗廊底下蕉月分明枕簟嫩涼生茉莉香清蘭花新吐百餘莖撲得流螢飛去也團扇多情别錄原占候六月無蠅主米價平諺云六月無蠅新舊相登三伏宜熱諺云六月不熱五穀不結蓋當槁稻之時又當下壅晴熱則苖旺涼雨則苖没立秋在晦旱稻遲種植秋赤豆秋菉豆豇豆蘿蔔胡蘿蔔素馨芥菜晩瓜蔓青小蒜壅培麥冬橙芋韭橘灌溉菊牡丹芍藥茉莉收採花椒苧竹青箱子紫草槐花藕天仙子蓮鬚蓮花松香杜仲鳳仙花莖菱科苜蓿蓮房茅根乾漆藿香白芷葛莧菜葦草菌郁李根野白薺地踏菜燈草旋覆花眼子菜澤瀉整頓鋤竹園漚麻耕麥地製用洽聞記日濟國西南海中有三島各相去數十里其島出黄漆似中夏漆樹彼土六月破樹腹取汁以漆器物若黄金其光奪目田忌天火夘九焦子糞忌子地火己荒蕪辰御定佩文齋廣羣芳譜卷四
