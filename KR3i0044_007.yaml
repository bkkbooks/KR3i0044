body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五天時譜秋增禮記鄉飲酒義西方者秋秋之為言愁也爾雅秋為白藏注氣白而收藏秋為收成尸子西方為秋秋肅也萬物莫不禮肅也原梁元帝纂要秋曰三秋九秋素秋素商髙商天曰旻天風曰商風素風凄風髙風涼風激風悲風景曰朗景澄景清景時曰凄辰霜辰節曰素節商節草曰荒草木曰疏木衰林霜柯霜條彚考原易兌卦兌正秋也萬物之所説也詩小雅秋日凄凄百卉具腓增管子秋至而禾熟天子用祀於大惢淮南子秋風下霜倒生挫傷注草木首地而生故曰倒生挫傷者凋落也秋畜疏食注菜蔬曰疏榖食曰食三統歷説秋為隂中萬物以成原羯鼓録明皇製秋風髙曲每奏之則清風徐來夜葉交墜增清間供秋時晌午用蓮房洗硯理茶具拭梧竹午後戴白接㒿著隱士衫望紅樹葉落得句題其上薄暮焚香壅菊集藻文賦散句原楚屈原九歌嫋嫋兮秋風洞庭波兮木葉下宋玉九辨悲哉秋之為氣也蕭瑟兮草木搖落而變衰憭栗兮若在逺行登山臨水兮送將歸泬漻兮天髙而氣清寂寥兮收潦而水清皇天平分四時兮竊獨悲此凛秋白露既下降百草兮奄離披此梧楸漢東方朔七諫秋草榮其將實兮微霜下而夜降商風肅而害生兮百草育而不長晉潘嶽秋興賦耕東臯之沃壤兮輸黍稷之餘稅泉涌湍于石間兮菊揚芳乎崖涘湛方生秋夜賦悲九秋之為節物凋悴而無榮嶺頽鮮而隕緑木傾柯而落英宋沈勃秋羈賦菊圖縟于園沼橘倒飾于池側草改貌而傾蕡林伐狀而搖蒂潭斂氣而威荷露危光而嚴蕙梁元帝秋興賦洞庭之葉初下塞外之草前衰秋風搖落辭秋風起兮寒鴈歸寒蟬鳴兮秋草腓萍青兮水徹葉落兮林稀翠為蓋兮玳為席蘭為室兮金作扉水周兮曲堂花交兮洞房樹參差兮密稍紫荷紛披兮疏且黃唐王勃秋夜山亭宴集序紅蘋緑荇亘渚連翹玉帶瑤華分欄間植池簾夕敞香牽十步之風岫幌宵搴氣襲三危之露李白悲清秋賦荷花落兮江色秋風嫋嫋兮夜悠悠臨窮溟以有羡思釣鰲于滄洲劉禹錫秋聲賦松竹含韻梧楸早脫驚綺疏之晚吹墜碧砌之涼月黃滔秋色賦踆烏減赫顧兔添明池上落紅蕖之態煙中吟玉笛之聲泰華峰髙染蓮花而翠活湘川樹老換楓葉以丹生愈碧髙山偏清漢水松柏風髙兮嵗寒出梧桐蟬急兮煙翠死五言古詩原晉江逌詠秋祝融解炎轡蓐收起涼駕髙風催節變凝露督物化長林悲素秋茂草思朱夏鳴鴈薄雲嶺蟋蟀吟深榭寒蟬向夕號驚飈激中夜感物增人懷悽然無欣暇宋劉鑠秋歌旻天清且髙秋風發初涼白露下微津明月流素光凝煙泛城闕凄風入軒房朱華先零落緑草就藝黃纎羅還笥篋輕紈改衣裳鮑照詠秋秋蘭徒晚緑流風漸不親飇我垂罳幕驚此梁上塵沉隂安可久豐景將遂淪何由忽靈化暫見别離人增周庾信秋日蒼茫望落景羇旅對窮秋賴有南園菊殘花足解愁原庾信逰昆明池秋光麗晚天鷁舸泛中川密菱障浴鳥髙荷沒釣船碎珠縈斷菊殘絲繞折蓮落花摧十酒栖鳥送一絃唐太宗度秋夏律昨留灰秋箭今移晷峩嵋岫初出洞庭波漸起桂白發幽巖菊黃開灞涘運流方可歎含毫屬微理增李白秋思春陽如昨日碧樹鳴黃鸝蕪然蕙草暮颯爾涼風吹天秋木葉下月冷莎雞悲坐愁羣芳歇白露凋華滋王昌齡秋興日暮西北堂涼風洗修木著書在南窗門館常肅肅苔草延古意視聽轉幽獨或問余所營刈黍就寒谷白居易早秋曲江感懷離離暑雲散嫋嫋涼風起池上秋又來荷花半成子朱顔易銷歇白日無窮已人夀不如山年光急于水青蕪與紅蓼嵗嵗秋相似去嵗此悲秋今我復來此新秋西風飄一葉庭前颯已涼風池明月水衰蓮白露房其奈江南夜綿綿自此長溫庭筠秋日爽氣變昏旦神臯遍原隰煙華久蕩搖石澗仍清急柳暗山犬吠蒲流水禽立菊花明欲迷棗葉光如濕天籟思林嶺車塵倦都邑譸張夙所違悔吝何由入芳草秋可藉幽泉曉堪汲牧羊燒外鳴林果雨中拾復此遂間曠翛然脫羈縶田收鳥雀喧氣肅龍蛇蟄佳節足豐穰良朋阻逰集沉機日寂寥葆素常呼吸投迹倦攸往放懷志所執良時有東災吾將事蓑笠宋歐陽修秋晚凝翠亭黃葉落空城青山繞官廨風雲凄已髙嵗月驚何邁陂田寒未收野水淺生派晴林紫榴折霜日紅梨曬蕭踈喜竹徑寂寞傷蘭敗叢菊如有情幽芳慰孤介嘉客日可攜寒醅美新醡登臨無厭頻氷雪行即屆司馬光秋意三首槐花滿庭除籍籍不可掃稍疏邵平瓜漸熟王陽棗失時團扇棄新進夾衣好日暮益愁思寒螿起幽草忽聞秋興篇歎賞幾絶倒端居倦煩暑園圃久不窺雨餘秋氣新紅葉生紫梨形骸得蕭散不知環堵卑何能效流俗把酒須菊枝登髙已可醉四野青雲垂弱植生川澤托根北堂後昔時青春姿扶疏映軒牖風霜日消落憔悴復何有蠧穿枯節斷雨漬虛心朽幸不夭天年猶得勝凡柳陸遊秋花歎秋花如義士榮悴相與同豈比輕薄花四散隨春風黃菊抱殘枝寂寞卧寒雨拒霜更可憐和蒂浮煙浦古來結交意正要共死生讀我秋花詩可代丹雞盟原明馮琦秋夜簡敬承公亮秋色遽如許客心鬱未安微微日影薄肅肅天宇寬髙風下木葉零露被崇蘭四氣自斡運誰為衰盛端朱華曾幾何素萼忽已殘楚楚松柏姿凌風以自完願言附髙節與君同嵗寒七言古詩原唐無名氏秋月色驅秋下穹昊梁間燕語辭巢蚤古苔凝紫貼瑶階露槿啼紅墮江草越客羇魂挂長道西風欲揭南山倒粉娥恨骨不勝衣映門楚碧蟬聲老增宋邵雍秋日飲後晚歸水竹園林秋更好忍把芳樽容易倒重陽已過菊方開多情不學年光老雲隂不動柳條低風遞輕寒梧葉稿無涯逸興不可收馬蹄慢踏天街草元何中山中樂空山一夜生新雨涼起賞心千萬緒扇團自守不依人桐葉知幾尋脫路隔隴笑談雜樵牧臨流賔從惟鷗鷺旋庖蘆蔔美勝酥精淅新粳香滿戶山中之樂誰得知我獨知之來何為青林紅樹人煙濕護得金橙密處垂五言律詩御製禁園秋霽樹冷催蟬咽荷疏表影長深秋殘暑氣微爽待髙陽戶外逺塵迹園中多蕙香溶溶新雨霽吟乏愧成章增唐太宗秋日翠微宫秋光凝翠嶺涼吹肅離宫荷疏一蓋缺樹冷半帷空側陳移鴻影圓花釘菊叢攄懷俗塵外髙眺白雲中秋日二首菊散金風起荷疏玉露圓將秋數行鴈離夏幾林蟬雲凝愁半嶺霞碎纈髙天還似成都望直見峩睂前爽氣澄蘭沼秋風動桂林露凝千片玉菊散一叢金日岫髙低影雲空點綴隂蓬瀛不可望泉石且娛心王維山居秋暝空山新雨後天氣晚來秋明月松間照清泉石上流竹喧歸浣女蓮動下漁舟隨意春芳歇王孫自可留原李白秋登宣城謝朓北樓江城如畫裏山曉望晴空兩水夾明鏡雙橋落彩虹人煙寒橘柚秋色老梧桐誰念北樓上臨風懷謝公包佶秋日過徐氏園林回塘分越水古樹積吳煙掃竹催鋪席垂蘿待繫船鳥窺新罅栗龜上半欹蓮屢入忘歸地長嗟俗事牽增白居易答劉戒之早秋别墅見寄涼風木槿籬暮雨槐花枝併起新秋思為得故人詩避地鳥擇木入朝魚在池城中與山下喧靜暗相思許渾早秋遙夜泛清瑟西風生翠蘿殘螢委玉露早鴈拂金河髙樹曉還密逺山晴更多淮南一葉下自覺老煙波雍陶和劉補闕秋園寓興水木多隂冷池塘秋意多庭風吹故葉階露淨寒莎愁鴈窺燈語情人見月過砧聲聽已别蟲響復相和閉門無事後此地即山中但覺鳥聲異不知人境同晚花開為雨殘果落因風獨坐還吟酌詩成酒已空秋色庭蕪上清朝見露華疏篁抽晚笋幽藥吐寒芽引水新渠淨登臺小徑斜人來多愛此蕭爽似仙家禁掖朝回後林園勝賞時野人來辨藥庭鶴往看碁晚日明丹棗朝霜潤紫梨還因重風景猶自有秋詩鄭谷郊野蓼水菊籬邊新晴有亂蟬秋光終寂寞晚醉自留連野濕禾中露村間社後天題詩滿紅葉何必浣花箋宋邵雍秋夜浮雲一消散星斗粲長天碧蘚墜丹果清香生白蓮體涼猶衣葛耳靜已無蟬坐久羣動息秋空唯寂然歐陽修秋郊曉行寒郊桑柘稀秋色曉依依野燒侵河斷山鴉向日飛行歌採樵去荷鍤刈田歸秫酒家家熟相邀白竹扉陸遊新秋秋氣入清笳旗亭酒可賒長歌穿小市短帽插幽花溪女留新蟹園公餉晚瓜誰知間老子解作醉生涯金趙渢秋郊晚望桃竹猶堪杖幽尋興頗嘉池荷能幾葉籬菊不多花地坼成龜兆林枯出犬牙村農慶豐嵗社鼓已三撾師拓曲江秋望山逺嶂重出野平天四圍涼風芡實坼久雨藕花肥水濶漁舟小天長去鳥微紫蒲行處有采采莫盈衣元德明山中秋夕黃卷存餘習青燈共晚涼只知書味永不覺鬢絲長老檜千年物幽蘭一國香平生陶靖節此夕邈相望明仁宗江樓秋望逺碧接天涯登臨景自佳蘋洲晴亦雪楓岸晝常霞落鴈過前浦浮鷗傍淺沙竹籬髙曬網茅屋是漁家秋風玉律轉清商金飇送晚涼輕飄梧葉墜暗度桂花香月下生林籟天邊展鴈行吹噓禾黍熟萬頃似雲黃原張祥鳶秋望快閣臨飛鳥遙天入斷峰白雲山面面紅葉樹重重空翠當杯落晴光刺眼濃願言隨楚客木末採芙蓉七言律詩增唐溫庭筠郊居秋日稻田鳬鴈滿晴沙釣渚歸來一徑斜門帶果林招邑吏井分蔬圃屬鄰家臯原寂歷垂禾穗桑竹參差映豆花自笑謾懷經世策不將心事許煙霞原趙嘏長安秋夕雲物凄涼拂曙流漢家宫闕動髙秋殘星幾點鴈橫塞長笛一聲人倚樓紫豔半開籬菊靜紅衣落盡渚蓮愁鱸魚正美不歸去空戴南冠學楚囚韋莊秋日早行上馬蕭蕭襟袖涼路穿禾黍繞宫牆半山殘月露華冷兩岸野風蓮萼香煙外驛樓紅隱隱渚邊雲樹暗蒼蒼行人自是心如火兔走烏飛不覺長增元何中秋懷采采蘋花可佩香依依橘柚未全黃人行塞北非征戍鴈過江南有稻粱短笛疏鐘來别浦亂鴉飛鶩過斜陽西風擾擾知何似看見黃花滿地霜明陸樹聲獨憐秋色倍清幽花月娟娟夜氣浮滿院風飄香欲散一天雲淨影交流光搖皓魄庭如水寒染霜葩玉作毬把酒啜英誇二美賞心還以繼前修五言排律增唐太宗秋日即事爽氣浮丹闕秋光淡紫宫衣碎荷疏影花明菊點叢袍輕低草露蓋側舞松風散岫飄雲葉迷路飛煙鴻砌冷蘭凋佩閨寒樹殞桐别鶴棲琴裏離猿啼峽中野落飛星箭弦虛半月弓芳菲夕霧起暮色滿房櫳盧照鄰山林休日田家歸休乘暇日饁稼返秋場徑草疏王篲巖枝落帝桑耕田虞訟寢鑿井漢機忘戎葵朝委露齊棗夜含霜南澗泉初冽東籬菊正芳還思北窗下髙卧偃羲皇五言絶句增唐王績秋夜喜遇王處士北場藝藿罷東臯刈黍歸相逢秋月滿更值夜螢飛原李白緑水曲緑水明秋月南湖採白蘋荷花嬌欲語愁殺蕩舟人錢珝江行萬木已清霜江邊村事忙故溪黃稻熟一夜夢中香七言絶句原唐吳融涼思松間小檻接波平月淡煙沉暑氣清半夜水禽棲不定緑荷風動露珠傾增李商隱到秋扇風淅瀝簟流離萬里南雲滯所思守到清秋還寂寞葉丹苔碧閉門時宋秦觀秋辭二首雲惹低空不更飛班班紅葉欲辭枝秋光未老仍微暖恰似梅花結子時無數青莎繞玉階夕陽紅淺過牆來西風莫道無情思未放芙蓉取次開范成大秋日碧蘆青柳不宜霜染作滄洲一帶黃莫把江山誇北客冷雲寒水更荒涼陸遊秋懷園丁傍架摘黃瓜村女沿籬采碧花城市尚餘三伏熱秋光先到野人家金髙士談楊休烈村居籬落牽牛放晚花西風吹落滿人家閉門久雨青苔滑時見鴛鴦下白沙柿葉經霜菊在溪天寒落日見雞棲西家有客篘新酒紅葉蕭蕭蓋芋畦趙元秋日禾穗纍纍豆角稠嵩前村落太平秋熙熙多少豐年意都在農家社案頭元郭鈺秋辭鶴認琪花欲下遲蓬萊仙客遣催詩情深寫到相思處秋露芙蓉開滿池明世宗秋日即事