十枚寄葛勃勃啖未竟墜一子於盆水中有喜鵲過惡汙其上勃遂棄之明早有並蒂花開於水面如梅花大取置几頭數日始謝房亦漸長剖之各得實五枚如豐來數自是鄉人改雙星節為雙蓮節原東京夢華録七月七夕以小板傳土旋種粟令生苖置小茅屋花木作田舍家小人物皆村落之態謂之榖板又以瓜雕刻成花樣謂之花瓜又以菉豆小豆小麥於磁器內以水浸之生芽數寸以紅藍綵縷束之謂之種生皆於街心設綵羃帳貨賣前三五日車馬盈市羅綺滿街旋折未開荷花都人善做假雙頭蓮取玩一時提攜而歸又小兒須買新荷葉執之蓋效顰磨喝樂至初六日七日晚貴家多結綵樓於庭鋪陳磨喝樂花瓜酒焚香列拜謂之乞巧五色線仙子云天寶六載侍輦驪山七夕夜張錦繒樹瓜花陳飲食焚香於庭拜縷針絍線致虛閣雜俎薛瑤英於七月七日令諸婢共翦輕綵作連理花千餘朵以陽起石染之當午散於亭中隨風而上遍空中如五色雲霞久之方沒謂之渡河吉慶花藉以乞巧七夕徐媫妤雕鏤菱藕作竒花異鳥攢於水晶盤中以進上極其精巧上大稱賞賜以珍寶無數上對之竟日喜不可言至定昏時上自散置宫中几上令宫人暗中摸取以多寡精粗為勝負謂之鬬巧以為歡笑誠齋雜記蔡州丁氏女精於女紅每七夕禱以酒果忽見流星墜筵中明日瓜上有金梭自是巧思益進常氏日録七日將午時酒服菖蒲一二寸飲酒不醉集藻文賦散句增晉盧湛感運賦氣瀲瀲而浸冷霜微微而日華翠葉紛以朝落朱華慘以夕捐原梁昭明太子錦帶書桂吐花于小山之上梨翻葉于大谷之中唐王勃七夕賦玉繩湛色金漢斜光煙凄碧樹露濕銀塘視蓮潭之變彩見松院之生涼引驚蟬于寶瑟宿蘭燕于瑤筐宋田錫早秋賦桐葉潛零下玉欄兮金井桂花增麗鑒珠簾兮綺疏四言古詩原晉潘尼七月七日侍皇太子宴商風初授辰火微流朱明送夏少昊迎秋嘉禾茂園芳草被疇于時秋遊以豫以休五言古詩原北周庾信奉和初秋落星初伏火秋霜正動鐘北閣連橫漢南宫應鑿龍祥鸞棲竹實靈蔡上芙蓉自有南風曲還來吹九重唐李賀七月樂辭星依雲渚冷露滴盤中圓好花生木未衰黃愁空園夜天如玉砌池葉極青錢僅厭舞衫薄稍知花簟寒曉風何拂拂北斗光闌干五言律詩御製早秋新霽卷幔過新雨披襟納好風餘霞明逺岫倒景射晴虹稼穡豐年足乾坤爽氣同髙天雲斷處歷歷見初鴻增唐太宗儀鸞殿早秋寒驚薊門葉秋發小山枝松隂背日轉竹影避風移提壺菊花岸髙興芙蓉池欲知涼氣早巢空燕不窺宋邵雍和李文思早秋一雨洗觚稜三川氣象清林風傳皓氣木葉送商聲忽忽蓮生菂看看菊吐英太平時裏老何以報虛生池畔拖垂栁闌邊笑晚霞敗荷傾敝蓋老檜露枯槎嵗暮驚時態年髙惜物華東陵風未替解憶故園瓜陸遊初秋藉草沾衣露沿溪掠面風桐凋無茂緑蓮老有疏紅小彴欹危度鄰園曲折通新秋得強健一笑莫匆匆七言律詩御製立秋前一日晚同左右間坐進鮮果偶作初到金風天氣晚微涼雨後畫簾垂九重迥出白雲逺三殿髙臨北斗移珍果滿盤新獻節碧梧一葉報秋時漏深不寐題詩句月色輝煌照鳳墀增唐韋莊早秋夜作翠簟初清暑半銷撇簾松韻送輕飇莎庭露永琴書潤山郭月明砧杵遙傍砌緑苔鳴蟋蟀繞簾紅樹織蠨蛸不須更作悲秋賦王粲辭家鬢已凋明景氏翩翩七夕樓前蕭史憶吹簫鴈足西風倍寂寥望斷支機應化石愁填烏鵲未成橋素毫月冷吟梧葉紈扇秋回識栁條姊妹東鄰如乞巧莫教瓜果浪相招七言絶句增宋范成大七月十六日石湖路中書事白葛烏紗稱老農溪南溪北水車風稻頭的皪黏朝露步入明珠翠網中立秋後二日泛舟越來溪西風初入小溪帆旋織波紋皺淺藍行入閙荷無水面紅蓮沉醉白蓮酣元趙雍初秋夜坐夜深庭院寂無聲明月流空萬影橫坐對荷花三兩朵紅衣落盡秋風生詩散句增唐鄭槩江南孟秋天稻花白如氊白居易清風水蘋葉白露木蘭枝韋莊柿葉添紅影槐柯減緑隂李商隱桂含爽氣三秋首蓂吐中旬一葉新宋陸遊風生細葛無三伏月上疏林正四更詞原宋歐陽修漁家傲七月新秋風露早渚蓮未折庭梧老是處瓜花時節好金樽倒人間綵縷爭祈巧萬葉敲聲涼乍到百蟲啼晚煙如掃漏箭初長天杳杳人語悄那堪夜雨催清曉别録原占候有三卯田禾熟無則旱種麥種植蘿蔔白菜蕪菁芥菜秋黃瓜甜菜萵苣芫荽水仙根苦蕒晚紅花牛膝蔥烏菘臘梅子蜀葵韭澆灌桂樹忌澆橙橘糞收採胡桃乾薑蘑菰斑貓浮萍楮實瞿麥刈藍卷柏海棠覆盆子使君子畢澄茄麻子藕蔓荆子麻黃莖白薔薇刈苧芋石硫黃馬鞭草露蜂房石龍芮皮鼠尾草甜瓜蒂天門冬眼子菜旋覆花白蒺藜荷葉槐實藿香五加皮菱芡石韋蒺藜漆整頓漚晚麻翻麥地伐木斫竹製用醬鳳仙莖製瓜虀曬葫蘆茄瓜乾田忌天火午地火辰荒蕪亥九焦酉糞忌酉八月秋分中秋附見增禮記月令仲秋之月日在角昏牽牛中旦觜觿中注日月會于夀星而斗建酉之辰也天子乃難以逹秋氣以犬嘗麻先薦寢廟乃命有司趣民收斂務蓄菜多積聚乃勸種麥毋或失時其有失時行罪無疑原花月令是月也槐黃蘋笑芝草奏功桂香秋葵髙掇金錢及第增瓶史月表八月花盟主丹桂木樨芙蓉花客卿寶頭雞冠楊妃槿花使令水葒花翦秋羅牡丹花山茶花彚考原詩豳風八月萑葦八月其穫八月斷壺八月剝棗增夏小正八月剝瓜傳剝瓜也者畜瓜之時也剝棗栗零傳剝也者取也零也者降零而後取之故不言剝也晉書樂志八月之辰謂為酉酉者緧也謂時物皆緧縮也八月之管名為南吕南吕任也謂時物皆秀有懷任之象也續齊諧記鄧紹八月旦入華山採藥見一童子執五綵囊盛柏葉上露如珠滿囊紹問用此何為答曰赤松先生取以明眼言終便失所在荆楚嵗時記八月十四日以錦綵為眼明囊遞相餉遺注按述征記云八月一日作五明囊盛取百草頭露洗眼令眼明也風土記里俗以八月雨為豆花雨夢溪筆談八月枝條堅剛故曰天罡賞心樂事八月湖山尋桂現樂堂秋花衆妙峰山木犀霞川野菊綺互亭千葉木犀桂隱攀桂杏花莊雞冠黃葵成都古今記八月有桂市山家清事八月八日為竹醉曰種竹易活筍譜竹八月謂之小春熱欲去寒欲來故曰小春秋分增宋書律志秋分而禾秒定秒定而禾熟律之數十二故十二秒而當一粟一粟而當一寸中秋增瑣碎録中秋無月則兔不孕蚌不胎蕎麥不實乾淳嵗時記中秋夕禁中賞月延桂通考八月十五為移花日禪林備覽有梵僧從天竺鷲山飛來云八月十五日夜桂子落清間供八月十五日牡丹誕集藻文賦散句原梁昭明太子錦帶書黃花笑冷白羽悲秋既傳蘇子之書更泛陶公之酒增元王柏長嘯山遊記辛卯秋八月與客遊於北山於時丹楓纈林香桂染袖金粟垂潁翠莢吐英芙蓉靚冶籬菊敷茂紫蘭兮抗莖濯蕊於深幽香稻兮春玉簸珠於踐蹂懸顆苞于棗栗粲青黃于橘柚日暄而不熇雨寒而不驟正一年之佳景候也五言古詩原晉孫綽秋日蕭瑟中秋日鴈唳風雲髙山居感時變逺客興長謠疏林積涼風虛岫結凝霄湛露灑庭樹密葉亂縈條撫葉悲先落攀松羡後凋垂綸在林野交情逺市朝淡然懷古心濠上豈伊遙增唐白居易南湖晚秋八月白露降湖中水方老旦夕秋風多衰荷半傾倒手攀青楓樹足踏黃蘆草慘淡老容顔零落秋懷抱有兄在淮楚有弟在蜀道萬里何時來煙波白浩浩七言古詩增宋徐積八月十四夜有人望月吟太虛半夜秋風吹碧蘆碧蘆風起吹老桂吟聲入月驚蟾蜍明夜中秋更好吟兔肥蟾大桂成林桂兔之外有何物玉池水到中秋溢秋風刮水如霜滴五言律詩增唐廖凝中秋月九十日秋色今宵已平分孤光含列宿四面絶纎雲衆木排疏影寒流疊細紋遙遙望丹桂心緒正紛紛七言律詩原明蔡羽秋思清秋山色淨簾櫳八月芙蓉滿鏡中醉任嶺雲連海緑愁禁楓葉接天紅養魚好伴鴟夷子飲水如無桑苧翁江上美人期不到吹簫獨自向虛空七言絶句原宋韓琦仲秋八日雲臺觀羣花盛開春早凡花百種榮秋芳能得幾多名仙家八月靈葩發不與尋常俗艷爭别録原占候有三卯三庚低田麥稻吉三庚二卯麥宜髙田無三卯不宜麥諺云三卯三庚麥出低坑三庚二卯麥出坳巧月大盡有水災少菜月令通考秋分諺曰分社同一日低田盡呌屈秋分在社前斗米換斗錢秋分在社後斗米換斗豆朔日值白露果榖不實值秋分主物價貴十一日卜來年水旱侵晨或隔夜于水邊無風浪處作一水則子至晚看之若沒主水露主旱平主小水又主本年好種麥名曰橫港增農政全書八月朔日風雨宜麥麻子貴十倍又云凡朔要晴惟此日要雨好種麥諺曰白露前是雨白露後是鬼其時之雨片雲來便雨稻花見日吐出隂雨則收正吐之時暴雨忽來卒不能收遂致白颯之患若連朝雨反不為災種植箭幹菜豌豆蠶豆萵苣麥水晶蔥蘿蔔芥菜蔓菁蒜春菜菠菜油菜白菜藠紅花烏菘胡荽胡麻雞頭蔥木瓜罌粟黃矮菜芍藥菱移植櫻桃橘李柚枇杷柑杏梅銀杏桃梔子芍藥枸杞木犀梧桐橙牡丹玫瑰丁香木筆石菊百合水仙山丹壓插玫瑰薔薇貼接牡丹緑萼梅海棠澆灌牡丹瑞香芍藥並宜豬糞收採割榖蓍實根豇豆石楠實大棗狼毒牛膝韭花金毛狗脊人參酸棗山藥桔梗牡丹皮根薏苡草龍膽白斂當歸白蒺藜升麻芍藥根柴胡黃芩烏藥根秦艽生地澤瀉巴戟天白蘚皮甘草白术黃連萱草根香附子百合知母玄參天門冬山豆根地榆防己前胡茅香苖胡黃連萆薢桂皮茯神苧根蜀椒花椒甘松茯苓丁香豬苓雷丸王不留行根苖花子藍種秦皮虎杖巴豆角蒿整頓修牡丹芟芍藥菊加土放芋根鋤竹園蘭換盆刈苧忌澆橙橘田忌天火酉地火卯九焦午糞忌申荒蕪卯九月九日附見增禮記月令季秋之月日在房昏虛中旦栁中注日月會于大火而斗建戍之辰也鞠有黃華命百官貴賤無不務內以會天地之藏無有宣出乃命冡宰農事備收舉五榖之要是月也草木黃落乃伐薪為炭是月也天子以犬嘗稻先薦寢廟原梁元帝纂要九月曰季秋亦曰暮秋末秋暮商季商杪商又曰玄月增花月令是月也菊有英巴竹筍芙蓉綻山藥乳橙橘登老荷化為衣瓶史月表九月花盟主菊花花客卿月桂花使令老來紅葉下紅彚考原詩豳風九月叔苴夏小正九月榮鞠樹麥傳榮鞠鞠草也鞠榮而樹麥時之急也晉書樂志九月之辰謂之戌戌者滅也謂時物皆衰滅也九月之管名曰無射射者出也言時陽氣上升萬物收藏無復出也夢溪筆談九月木可為枝幹故曰太衡九日增西京雜記戚夫人侍兒賈佩蘭後出為扶風人假儒妻説在宫內時九月九日佩茱萸食蓬餌飲菊花酒令人長夀菊花舒時并採莖葉雜黍米釀之至來年九月九日始熟就飲焉故謂之菊花酒玉燭寶典九日食蓬餌飲菊花酒者其時黍秫并收因以黏米嘉味觸類嘗新遂成積習太清記九月九日採菊花與茯苓松脂久服之令人不老原風土記九月九日律中無射而數九俗尚此日折茱萸房以插頭言辟除惡氣為禦初寒漢俗九日飲菊花酒以袚除不祥續齊諧記汝南桓景隨費長房遊學纍年長房謂曰九月九日汝家中當有災宜急去令家人各作絳囊盛茱萸以繫臂登髙飲菊花酒此禍可除景如言舉家登山夕還見雞犬牛羊一時暴死長房聞之曰此可代也今世人九日登髙飲酒婦人帶茱萸囊蓋始于此續晉陽秋陶潛九月九日無酒於宅邊菊叢中摘盈把坐其側望見白衣人乃王𢎞送酒即便就酌而後歸增千金月令重陽之日必以肴酒登髙眺逺為時宴之逰賞以暢秋志酒必採茱茰甘菊以泛之既醉而還原嵗時雜記二社重陽以棗為糕或加以栗以肉洛陽風土記九日以花糕法酒賜近臣增賞心樂事重九登城把萸把菊亭采菊蘇堤看芙蓉珍林嘗時果景全亭金橘芙蓉池三色拒霜東京夢華録九月重陽都下貴菊有數種其黃白色蕊若蓮房曰萬齡菊粉紅色曰桃花菊白而檀心曰木香菊黃色而圓者曰金鈴菊純白而大者曰喜容菊無處無之酒家皆以菊花縛成洞户都人出郊外登髙宴聚前一二日各以粉麵蒸糕遺送摻飣果實如石榴子栗黃銀杏松子之類熙朝樂事重九日登髙飲燕者必簮菊泛萸猶古人之遺俗也又以蘇子微漬梅滷雜和蔗霜梨橙玉榴小顆名曰春蘭秋菊集藻書原魏文帝與鍾繇九日送菊書嵗往月來忽復九月九日九為陽數而日月並應俗嘉其名以為宜於長久故以宴享髙會是月律中無射言羣木庶草無有射地而生惟芳菊紛然獨榮非夫含乾坤之純和體芬芳之淑氣孰能如此故屈平悲冉冉之將老思餐秋菊之落英輔體延年莫斯之貴謹奉一束以助彭祖之術文賦散句原宋傅亮九月九日登凌囂館賦何物慘而節哀又雲悠而風厲悴緑蘩于寒渚隕豐雚于荒澨玩中原之芬菊惜蘭圃之凋蕙旌竹柏之徑心謝梧楸之零脆梁昭明太子錦帶書重陽變序節景窮秋霜抱樹而擁柯風拂林而下葉金堤翠栁帶星采而均調紫塞蒼鴻追風光而結陳五言古詩原晉陶潛九日間居世短意常多斯人樂久生日月依辰至舉俗愛其名露凄暄風息氣徹天象明往燕無遺影來鴈有餘聲酒能袪百慮菊解制頽齡如何蓬廬士空視時運傾塵爵耻虛罍寒華徒自榮斂襟獨間謠緬焉起深情棲遲固多娛淹留豈無成乙酉嵗九月九日靡靡秋已夕凄凄風露交蔓草不復榮園木空自凋清氣澄餘滓杳然天界髙哀蟬無留響叢鴈鳴雲霄萬化相尋繹人生豈不勞從古皆有沒念之中心焦何以稱我情濁酒且自陶千載非所知聊以永今朝增梁庾肩吾九日侍宴轍迹光周頌巡逰盛夏功鈎陳萬騎轉閶闔九門通秋暉逐行漏朔氣繞桐風獻夀重陽節回鑾上苑中疏山開輦道間樹出離宫玉醴吹巖菊銀牀落井桐御梨寒更紫仙桃秋轉紅飲羽山西射浮雲冀北驄塵飛金埓滿葉破栁條空騰猿疑矯箭驚鴈避虛弓雕材濫杞梓花綬接鵷鴻愧乏天庭藻徒參文雅雄陳江總於長安歸還揚州九月九日行至薇山亭賦韻心逐南雲逝形隨北鴈來故鄉籬下菊今日幾花開唐太宗山閣晚秋山亭秋色滿巖牖涼風度疏蘭尚染煙殘菊猶承露古石依新苔新巢封古樹歷覽情無極咫尺輪光暮原宋梅堯臣九日永叔長文原甫景仁鄰幾持國過飲秋堂雨更靜粲粲佳菊芳置酒延羣公掇英浮新黃心猶慕淵明歸來醉柴桑莫問車馬之去迹亂康莊蘇軾九日間居和陶詩九日獨何日欣然愜平生四時靡不佳樂此古所名龍山憶孟子栗里懷淵明鮮鮮霜菊豔溜溜糟牀聲間居知令節樂事滿餘齡登髙望雲海醉覺三山傾長歌振履商起舞帶索榮坎軻識天意淹留見人情但願飽粳稌年年樂秋成五言律詩御製九日幸景山登髙秋色淨樓臺登高紫禁隈千門鳴雁度萬井霽煙開翠拂鑾輿上雲隨豹尾來佳辰欣宴賞滿泛菊花杯原唐中宗九月九日幸臨渭亭登髙九日正乘秋三杯興已周泛桂迎樽滿吹花向酒浮長房萸早熟彭澤菊初收何藉龍沙上方得恣淹留增王績九月九日野人迷節候端坐隔塵埃忽見黃花吐方知素節回映巖千假發臨浦萬株開香氣徒盈把無人送酒來崔善為答王無功九日秋來菊花氣深山客重尋露葉疑涵玉風花似散金摘來還泛酒獨坐即徐斟王𢎞貪自醉無復覔楊林原沈佺期九日侍宴應制御氣幸金方憑高薦羽觴魏文頒菊蕊漢武賜萸囊去鶴留笙吹歸鴻識舞行年年重九慶日日奉天長杜甫九日舊日重陽日傳杯不放杯即今蓬鬢改但愧菊花開北闕心長戀西江首獨回茱萸賜朝士難得一枝來九日曲江綴席茱茰好浮舟菡萏衰季秋時欲半九日意兼悲江水清源曲荆門此路疑晚來髙興盡搖蕩菊花期七言律詩原唐張諤九日秋天林下不知春一種佳逰事也均綘葉從朝飛著夜黃花開日未成旬將橫陌樹頻驚馬半醉歸途數問人城逺登髙併九日茱萸凡作幾年新杜甫九日藍田崔氏莊老去悲秋強自寬興來今日盡君歡羞將短髮還吹帽笑倩傍人為整冠藍水逺從千澗落玉山髙並兩峰寒明年此會知誰健醉把茱萸仔細看嚴維九日登髙詩家九日憐芳菊逐客髙齋瞰浙江漁浦浪花搖素壁西陵樹色入秋窗木奴向熟懸金實桑落新開瀉玉缸四子醉時爭講德笑論黃霸屈為邦增宋韓琦壬子重九菊有黃花氣候移重陽香萼已乾枝金鈴後坼孤芳在玉液輕浮一醉宜煙渚去來鴻自適霜叢飛繞蝶何知風前客帽從吹落且伴山翁倒接㒿邵雍秋暮西軒繞欄種菊一齊芳户牖軒窗總是香得意不能無興詠樂時况復遇豐穰深秋景物隨宜好向老筋骸粗且康飲罷何妨更登眺爛霞堆裏有斜陽楊萬里九日即事呈尤延之昨日茱萸未苦香今朝籬菊頓然黃浮英泛蕊多多著舊酒新醅細細嘗節裏且追千載事鬢邊管得幾莖霜正冠落帽多兒態自笑狂夫老不狂金姚孝錫重九天邊今日又重陽隴樹紅飛鴈信霜且插茱萸慰衰鬢莫將詩句撓回腸歌勤皓齒人俱醉舞戀晴暉蝶也忙來日預期扶宿酒未應籬菊減秋香五言排律原唐髙宗九月九日端居臨玉扆初律啓金商鳳闕澄秋色龍闈引夕涼野靜山氣斂林疏風露長砌蘭窺半影巖桂發全香滿蓋荷凋翠圓花菊散黃揮鞭爭電烈飛羽亂星光栁空穿石碎弦虛側月張怯猿啼落岫驚鴈斷分行斜輪低夕景歸斾擁通莊沈佺期白蓮花亭侍宴應制九日陪天仗三秋幸禁林霜威變緑樹雲氣落青岑水殿黃花合山亭絳葉深朱旗夾小徑寶馬駐青潯花吏收寒果饔人膳野禽承歡不覺暝遙響素秋砧增王維奉和聖製重陽節宰臣及羣官上夀應制四海方無事三秋大有年百生逢此日萬夀願齊天芍藥和金鼎茱萸插玳筵玉堂開右個天樂動宫懸御栁疏秋景城鴉拂曙煙無窮菊花節長奉柏梁篇五言絶句增唐王勃九日九日重陽節開門有菊花不知來送酒若箇是陶家原李白九日龍山飲九日龍山飲黃花笑逐臣醉看風落帽舞愛月留人九月十日即事昨日登髙罷今朝更舉觴菊花何太苦遭此兩重陽杜甫復愁每恨陶彭澤無錢對菊花如今九日至自覺酒須賖增金宇文虛中回文詩短葦低殘雨虛舟帶晚潮斷鴻歸暗浦疏葉墮寒梢戚戚蛩吟苦茫茫水驛孤日銜山色暮霜帶菊叢枯明馬氏間卿暮秋野色滿園中間情立晚風菊花含雨豔楓葉醉霜紅七言絶句原唐張諤九日宴秋葉風吹黃颯颯晴雲日照白鱗鱗歸來特問茱萸女今日登髙醉幾人增王維九月九日憶山東兄弟獨在異鄉為異客每逢佳節倍思親遙知兄弟登髙處遍插茱萸少一人宋韓琦重九會光化二園誰言秋色不如春及到重陽景自新隨分笙歌行樂處菊花萸子更宜人王安石九日九日無歡可得追飄然隨意歷山陂蔣陵西曲風煙慘也有黃花一兩枝陸遊九月晦日作菊枝傾倒不成叢桐葉凋零已半空自是老來多感慨不須蕭瑟為秋風炊煙漠漠衡門寂寒日昏昏倦易還數樹丹楓映蒼檜天工解作范寬山秋晚新築場如鏡面平家家歡喜賀秋成老來懶惰慚丁壯美睡中聞打稻聲秋晚雜興汀樹猶青未著霜壠間稗穗已先黃放翁皓首歸民籍爛醉狂歌坐簀牀冷落秋風把酒杯半酣直欲挽春回今年菰菜嘗新晚正與鱸魚一味來金張本九日月中對菊花上清光花下隂素娥惜此萬黃金一杯寒露三更後誰信幽人更苦心詩散句原齊王儉寥寥清景靄靄微霜草木搖落幽蘭獨芳梁沈約暮芝始緑年桂初丹上林葉下滄池水寒葉浮楚水草折梁園凄涼霜野惆悵晨鵾丘遲雲物遊揚光景髙麗枯葉未落寒花委砌唐李白今日雲景好水緑秋山明攜壺酌流霞搴菊泛寒榮白居易黍香酒初熟菊暖花未開間聽竹枝曲淺酌茱萸杯陳江總園菊把黃花庭榴割朱實原隋賀敳寒花低岸菊涼葉下庭梧增唐張錫菊彩揚堯日萸香繞舜風蕭至忠寵極萸房遍恩深菊酎餘樊忱插萸登鷲嶺把菊坐蜂臺趙彥伯簮挂丹萸蕊杯浮紫菊花原宋之問時菊芳仙醞秋蘭動睿篇蘇瓌菊氣先薰酒萸香更襲衣孫佺應節萸房滿初寒菊圃新髙適綘葉擁虛砌黃花隨濁醪隂行先山棠紅葉下岸菊紫花開蔣山卿嵗熟村多釀秋深菊始華韋莊水館紅蘭合山城紫菊深白居易江南九月未搖落栁青蒲緑稻穟香司空圖重陽未到已登臨探得黃花且獨斟增宋周必大遙知九日平山會笑插茱萸滿鬢紅陸遊但憶社醅挼菊蕊敢希朝士賜萸枝金周昻猶賴多情數枝菊肻留金蕊待重陽原元耶律楚材鴈門九日西風髙綿梨萬樹垂金綃增曺伯啓蕎花不識秋光老猶向桑隂密處開唐嚴維菊度重陽少殷璠重陽開滿菊花金杜荀鶴重陽酒熟茱萸紫詞原明陳繼儒昭君怨記得東坡老叟莫負清明重九今日正重陽菊花黃花插滿頭歸去落日前村楓樹樹裏唱歌聲釣漁人增金李俊民點絳唇秋樹風髙可憐憔悴門前栁白衣去後間却持杯手一笑相逢落帽年時友君知否南山如舊人比黃花瘦宋蘇軾浣溪沙珠檜絲杉冷欲霜山城歌舞助凄涼且餐山色飲湖光共挽朱轓留半日強揉青蕊作重陽不知明日為誰黃黃機清平樂西風獵獵又是登髙節一片情懷無處説秋滿江頭紅葉誰憐鬢影凄涼新來更點吳霜辜負萸囊菊盞年年客裏重陽原李易安醉花隂薄霧濃雲愁永晝瑞腦噴香獸時節又重陽玉枕紗厨半夜涼初透東籬把酒黃昏後有暗香盈袖莫道不消魂簾捲西風人似黃花瘦黃庭堅鷓鴣天黃菊枝頭破曉寒人生莫放酒杯乾風前橫笛斜吹雨醉裏簮花倒著冠身健在且加飱舞裙歌板盡清歡黃花白雪相牽挽付與時人冷眼看蘇軾南鄉子霜降水痕收淺碧粼粼露逺洲酒力漸消風力軟颼颼破帽多情却戀頭詩酒若為儔但把清樽斷送秋萬事到頭都是夢休休明日黃花蝶也愁歐陽修漁家傲九日歡逰何處好黃花萬蕊雕欄繞通體清香無俗調天氣好煙滋露結功多少日腳清寒髙下照寶釘密綴圓斜小落葉西園風嫋嫋催秋老叢邊莫厭金樽倒又九月霜秋秋已盡烘林敗葉紅相映惟有東籬黃菊盛遺金粉人家簾幕重陽近曉日隂隂晴未定授衣時節輕寒嫩新鴈一聲風又徑雲欲凝鴈來應有吾鄉信别録原種植大小麥油菜豌豆水仙春菜芫荽萵苣白菜冬瓜蒜芥菜罌粟移植牡丹芍藥萱草山茶臘梅麗春玫瑰竹諸果木收採五倍子五榖種菊花薔薇子芝麻稈木瓜乾薑兔絲子大豆杜仲白术粟厚朴芎藭橄欖茱萸梔子皂莢皂角茶子豆秸茄種松節㧓㧓兒整頓採菊花鋤席草掘薑糞麥門冬刈紫草收子刈苕帚掘芋收苧麻子去荷葉缸水製用本草凡棗用九月採日乾補中益氣久服神仙以其月採太乙餘糧久服耐寒暑不飢輕身可醃諸色菜及造茭白藕蘿蔔萌蘆諸生鮓作香茄蒜茄蒜東瓜芥虀田忌天火子地火寅糞忌巳九焦寅荒蕪未御定佩文齋廣羣芳譜卷五
