body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷六天時譜冬增禮記鄉飲酒義北方者冬冬之為言中也中者藏也爾雅冬為玄英注氣黑而清英冬為安寧蔡雍月令章句冬終也萬物於是終也梁元帝纂要冬日玄冬三冬九冬天曰上天風曰寒風徑風嚴風厲風哀風隂風景曰冬景寒景時曰寒辰節曰嚴節草曰寒卉黃草木曰寒木寒柯素木寒條彚考原詩弼風我有旨蓄亦以禦冬增禮記王制冬薦稻原漢書魯恭傳易曰潛龍勿用言十一月十二月陽氣藏未得用事育噓萬物養其根荄而猶盛隂在上地凍水氷陽氣否隔閉而成冬晉書孝義傳劉殷祖母王氏冬月思堇殷時年九嵗乃於澤中慟哭聲不絶者半日忽若有人云止止殷收淚視地有堇生焉因得斛餘以供母增唐書五行志長慶二年冬少雪水不氷凍草木萌荑如正月管子北方曰月其時曰冬其氣曰寒其德淳起溫怒周密斷刑致罰以符隂氣大寒乃至五榖乃熟此謂月德韓非子周公曰冬日之閉凍也不固則春夏之長草木也不茂原鶡冠子斗柄指北而天下皆冬吕氏春秋冬之德寒寒不信其地不成剛地不成剛則凍閉不固增淮南子冬伐薪蒸注大曰薪小曰蒸尚書大傳北方伏方也萬物之方伏也冬中也物方藏於中也陽盛則吁荼萬物而養之外隂盛則呼吸萬物而藏之內故曰呼吸者隂陽之交接萬物之始終新論冬木可折原魏略顔斐為京兆尹課民當輸租時以車牛各致薪兩束為冬月寒氷炙筆硯之用增拾遺記漢明帝霜林園皆植寒果積氷之節百果方盛俗謂之相陵霜林之聲訛也神仙傳葛玄冬日能為客設生瓜竹書帝舜四十七年冬隕霜不殺草木原杜陽雜編李輔國遇嚴寒置鳳首木於堂和煦如二三月又别名常春草運行論注凝慘氷雪寒之化凛冽霜電寒之用柔耎之物遇寒則堅寒之致太虛澄淨黑氣浮空天色黯然髙空之寒氣也氣如散麻本末皆黑川澤之寒氣也太虛清白空明雪映遐邇一色山谷之寒氣也太虛白昏大明不翳如霧雨氣遐邇肅然北望色玄凝氛夜落此水氣所生寒之化也太虛微黑白埃昏翳天地一色逺視不分此寒溫凝結雪之將至也地裂水氷河流乾涸枯澤浮鹹木斂土堅是土勝水水不得自清水所生寒之用也增嵗華紀麗羽律才移乾風更肅霜樹盡摧於枯葉玉壺漸結於輕氷松秀寒姿桂榮貞質星斗旋臨亥位金烏迭次房星北户墐扉之日東臯穫稻之辰原清間供冬時午後攜籠向古松懸崖間敲氷煮建茗日晡布衣皮帽䇿蹇驢問寒梅消息薄暮圍爐促膝煨芋魁説無上偈集藻文賦散句增楚屈原逺遊嘉南州之炎德兮麗桂樹之冬榮晉陸機感時賦寒冽冽而感興風謖謖而妄作鳴枯條之泠泠飛落葉之漠漠唐趙自厲寒賦幽林風掃時物霜殘柔條危徑奧室凄寒有美人兮心恍惚情怵悼而靡安伊鮮物之皆瘁獨霜松之常青縱寒苦之飄激淬堅明而自寧五言古詩增晉曺毗詠冬綿邈冬夕永凜厲寒氣升離葉向晨落長風振條興夜靜輕響起天清月輝澄寒氷盈渠結素霜竟櫩凝今載忽已暮來紀奄復仍原梁簡文帝玄圃冬夕洞門扉未掩金壺漏已催曛煙生澗曲暗色起林隈雪花無有蒂氷鏡不安臺階楊始倒插浦桂半新栽陳根委落蕙細葉發香梅雁去銜蘆止猿戲繞枝來七言古詩增宋陸遊冬夜吟昨夜凝霜皎如月碧瓦鱗鱗凍將裂今夜明月却如霜竹影橫窗更清絶造物有意娛詩人供與詩材次第新飢鴻病鶴自無寐山窮水絶誰為鄰西村梅花消息動唧唧寒醅漸鳴甕儘將醉帽插幽香此生莫作長安夢元何中山中樂千花重作陽春節野杏山桃隨處發莫思前度看花誰已見荒原芳草歇穆山山下數灣月華山山崖千丈雪幽人獨在雪月中要與梅花成四絶山中之樂誰得知我獨知之來何為除却山家新臘醖世間無事可相宜原鄭奎妻冬月詞山茶未開梅先吐風動簾旌雪花舞金盤冒冷塑狻猊繡幕圍春護鸚鵡倩人呵筆畫雙眉脂水凝寒上臉遲妝罷扶頭重照鏡鳳叉斜壓瑞香枝五言律詩增唐太宗冬日臨昆明池石鯨分玉溜劫燼隱平沙柳影氷無葉梅心凍有花寒野凝朝霧霜天散夕霞歡情猶未極落景遽西斜張蠙次韻和友人冬日書齋四季多花木窮冬亦不凋薄氷行處斷殘大睡來消象版簽書帙蠻藤絡酒瓢公卿有知己時得一相招宋張耒冬日雜興水落橋痕在沙乾岸草枯霜餘槐老壯風際竹清疏啄木髙逾響鶺鴒飛且呼二年親友絶惟有對禽魚空山身欲老徂嵗臘還來愁怯年年柳傷心處處梅緑蔬挑甲短紅蠟點花開氷雪如何有東風日夜回唐庚立冬後作啖蔗入佳境冬來幽興長瘴鄉得好語昨夜有飛霜籬下重陽在醅中小至香西鄰蕉向熟時致一梳黃陸遊冬日吳中寒氣薄嵗暮亦和風移樹來村北尋僧渡港東露葵收半緑霜稻杵微紅一飽無餘念吾生正不窮朱子冬日蕭條時序晚已復度髙秋回澗白波起通川絳樹稠晨風散清露嘉稻卷平疇獨懷志士感嵗事幸將休清霜染澗樹蕭索向嚴冬密雨有時集寒雲無定容波明橫瀨出風急逺林空一極窗間眺髙旻矗亂峰七言律詩增唐韓偓冬日蕭條古木銜斜日戚瀝晴寒滯早梅愁處雪煙連野起靜時風竹過牆來故人每憶心先見新酒偷嘗手自開景狀入詩兼入畫言情不盡恨無才宋真山民初冬林葉新經數夜霜地爐獨擁山房塵書邀我共髙閣濁酒勸人歸醉鄉費省家貧還似富身間日短亦如長梅花苦欲催詩興又破梢頭半點香原明文徴明煙鎖凝塵四壁空青燈欲燼夜溶溶涼聲度竹風如雨碎影搖窗月在松病枕蕭條聞永漏草堂搖落已深冬不堪酒醒淒然地撫景懷人意萬重王象晉蠟祭喧喧土鼓搓紛紛髦稚擁如渡詠豳恍際周王世布令行宣青帝和氷筯迎陽辭碧瓦梅珠散彩耀繁柯春光積漸來茅舍對酒能忘鼓腹歌孟淑卿默坐深閨思有餘霜威漸覺襲衣裾青綾被冷無鴛夢紫塞天寒斷雁書竹葉舞風侵户響梅花和月上窗虛雙蛾爭似庭前柳臘盡春來忽又舒五言絶句增唐王勃冬郊行望桂密巖花白梨疏林葉紅江臯寒望盡歸念斷征篷金宇文虛中回文鶻健呼風急烏啼促景殘窟深宜兔蟄蒲折蔭魚寒七言絶句增唐元稹西歸寒花𢃄雪滿山腰著栁氷珠滿碧條天色漸明回望玉塵隨馬度藍橋元王惲蘭溪道中豫樟蔽日無黃落竹筍經霜更碧鮮記取江南光景異暖煙晴日是冬天郭珏冬詞疏林晴旭散啼鴉髙閣朱簾窣地遮為問王孫歸也未玉梅開到北枝花詩散句增唐劉孝孫凍栁含風落寒梅照日鮮郎士元髙松殘子落寒井凍痕生李頻藝細書中氣松疏雪後隂宋陸遊藤疏不覆架桐落欲平溝唐張籍梅花蠻草連冬有行處無家不滿園十月立冬小雪附見增禮記月令孟冬之月日在尾昏危中旦七星中注日月會於析木之津而斗建亥之辰也原梁元帝纂要冬曰孟冬亦曰上冬曰陽月花月令是月也蘆傳冬菜蒔木葉避霜芳草斂漢宫秋老苧麻護其根增瓶史月表十月花盟主白寶珠茶梅花客卿山茶花甘菊花花使令野菊寒菊芭蕉彚考增詩豳風十月穫稻為此春酒以介眉夀十月納禾稼黍稷重穋禾麻菽麥晉書樂志十月之辰謂為亥亥者刻也言時隂氣刻殺萬物也十月之管名為應鐘應者和也謂嵗功皆成應和陽功收而聚之也唐書西域傳東女國巫者以十月詣山中布糟麥呪呼羣鳥俄有鳥來如雞狀剖視之有榖者豐嵗名曰鳥卜淮南子孟冬之月招搖指亥㸑松燧火荆楚嵗時記十月朔日黍臛俗謂之秦嵗首注未詳黍臛之義今北人此日設麻羮豆飯當為其始熟嘗新耳禰衡别傳云十月朝黃祖在艨艟上會設黍臛是也原化記崔希真十月一日雪遇老父於門獻松花酒老父曰此酒無味乃於懷中取丸藥置酒中味極美後問天師師曰此真人葛洪第三子其藥乃千嵗松膠也夢溪筆談十月萬物登成可以會計故曰功曺賞心樂事十月滿霜亭蜜橘賞小春花杏花莊挑薺東坡詩注嶺南氣候不常菊花開時即重陽涼天佳月即中秋十月九日菊始開乃與客作重陽立冬原禮記月令是月也以立冬先立冬三日太史謁之天子曰某日立冬盛德在水天子乃齋立冬之日天子親率三公九卿大夫以迎冬於北郊三禮義宗十月立冬為節者冬終也立冬之時萬物終成故為節名東京夢華録立冬前五日西御園進冬菜京師地寒冬月無蔬菜上至宫禁下及民間一時收藏以充一冬食用熙朝樂事立冬日以各色香草及菊花金銀花煎湯沐浴謂之掃疥小雪增三禮義宗十月小雪為中者氣序轉寒雨變成雪故以小雪為中集藻謠增晉夏矦湛苦寒謠惟立冬之初夜天慘懍以降寒霜皚皚以被庭氷溏瀩于井幹草槭槭以疏葉木蕭蕭以零殘松隕葉於翠條竹摧柯於緑竿五言古詩原梁簡文帝大同十年十月戊寅詩喧塵是時息靜坐對重巒冬深栁條落雪後桂枝殘星明露色盡天白雁行單雲飛乍想閣氷結逺疑紈晚橘隱重屏枯藤𢃄回竿荻隂連水氣山峰染月寒增唐白居易湓浦早冬潯陽孟冬月草木未全衰秪抵長安陌涼風八月時日西湓水曲獨行吟舊詩蓼花始零落蒲葉稍離披但作城中想何異曲江池七言古詩增宋陸遊初冬步至東村八月風吹粳稻香九月蕎熟天始霜男耕女饁常滿野宿麥覆塊皆蒼蒼豐年比屋喜迎客花底何曽酒杯迮家人但覔浩歌聲不在東阡在南陌五言律詩原唐杜甫孟冬殊俗還多事方冬變所為破柑霜落爪嘗稻雪翻匙巫峽寒都薄烏蠻瘴逺隨終然減灘瀨暫喜息蛟螭增元僧方潤初冬作泬寥蕭瑟後霽色却怡人霜已千林曙天猶十月春黃花蝶過晚白葦雁銜新野性自夷曠非關絶世塵七言律詩原唐陸龜蒙小雪後書事時候頻過小雪天江南寒色未全偏楓汀尚憶逢人别麥隴惟應欠雉眠更擬結茅臨水次偶因行藥到村前鄰翁意緒相安慰多説明年是稔年增宋鄭俠次孟堅初冬晴和見梨桃二花作十月南天尚暑襟幽花何怪動清吟半扉素蘂呈修徑幾朵夭紅出茂林地借小春回暖氣日勻疏影轉輕隂惟應幕府多才俊不負行臺醉客心陸遊初冬鉏犁滿野及冬耕時聼兒童叱犢聲逐客固宜安散地間民何幸樂升平雪花漫漫蕎初熟緑葉離離薺可烹飯飽身間書有課西窗來趂夕陽明志士逢秋已自傷老人况復惜年光正看溪碓舂粳滑又見山坡下麥忙桐落井牀多稿葉菊殘衫袖尚餘香讀書有課真當勉􅀈貯明膏伴夜長七言絶句御製塞外初冬隂山南去雁行多渺渺沙原六御過報是初冬新律改依然霜曉氣暄和增唐樊晃十月南中感懷南路蹉蛇客未回常嗟物候暗相催四時不變江頭草十月先開嶺上梅張登小雪日戲題甲子徒推小雪天刺桐猶緑槿花然陽和長養無時歇却是炎洲雨露偏原宋蘇軾初冬荷盡已無擎雨蓋菊殘猶有傲霜枝一年好景君須記正是橙黃橘緑時增鄭思肖小春花天地無情正北風飛鴻哀咽亂雲中此時縱使開千樹不及東皇一點紅元僧善住十月清霜欲重小春天楊栁蕭踈𢃄曉煙無奈東皇苦多事又傳春信到梅邊詩散句增唐杜甫漢源十月交天氣涼如秋草木未黃落况聞山水幽栗亭名更佳下有良田疇充腸多薯蕷崖蜜亦易求密竹復冬筍清池可方舟雖傷旅寓逺庶遂平生遊詞原宋歐陽修漁家傲十月小春梅蘂綻紅爐暖閣新妝遍錦帳美人貪睡暖羞起懶玉壺一夜氷澌滿樓上四垂簾不捲天寒山色偏宜逺風急雁行吹字斷紅日晚江天雪意雲撩亂别録原占候家孰事親十月有三卯糴平無則榖貴立冬日先立一丈竿占影得一尺大疫大旱大暑大飢二尺赤地千里三尺大旱四尺五尺低田收六尺髙低田熟七尺髙田收八尺潦九尺大水一丈水入城郭朔日值立冬主災異值小雪有東風春米賤西風春米貴其日用斗量米若綴在斗來春陡貴甚驗種藝豌豆油菜葵菜冬芥菜麥菠菜烏菘萱草冬白菜黃茋防風移植五味子黃精梅柑五加皮菊橙橘收採枸杞枳殼山茱萸芎藭五加皮根梔子皂莢麥門冬苦參白豆蔲貝母牛膝女貞葉桑葉決明子陳皮地黃山藥子槐實芙蓉花苧根冬瓜栝蔞根蕨根甘蔗山芋澆培橙橘諸果包褁諸畏寒花果墩諸畏寒花木根上土壅苧麻壅茴香根整頓窖茱莉芙蓉蘭菊菖蒲夾竹桃虎刺養蘿蔔種莙薘菜耘麥田忌天火卯地火丑糞忌亥九焦亥荒蕪寅十一月冬至附見增禮記月令仲冬之月日在斗昏東辟中旦軫中注日月會於星紀而斗建子之辰也是月也日短至隂陽爭諸生蕩藝始生荔挺出原梁元帝纂要是月曰玄明天又曰廣寒月花月令是月也藝生楓丹蕉紅巖桂馥枇杷綴金松柏後凋增瓶史月表花盟主紅梅花客卿楊妃茶花花使令金盞花彚考增周禮地官仲冬斬陽木注鄭司農云陽木春夏生者玄謂陽木生山南者原前漢書律厯志十一月乾之初九陽氣伏於地下始著為一萬物萌動鍾於太隂增淮南子見一葉之落知嵗之暮覩瓶中之氷知天下之寒原列仙傳仙人馬湘在刺史馬植坐上仲冬月以酒杯盛土種瓜子須臾蔓引生實食其味甚美玉燭寶典月晦煮赤豆作糜以祭門禳疫也增荆楚嵗時記仲冬之月采擷霜燕菁葵等雜菜乾之並為鹹葅賞心樂事十一月摘星軒枇杷花味空亭臘梅蒼寒堂南天竺花院水仙成都古今記十一月有梅市一統志雷陽界稻十一月下種揚雪耕耘次年四月熟與他地逈異冬至原周禮秋官柞氏掌攻草木及林麓冬日至令剝隂木而水之增周禮秋官剃氏掌殺草冬日至而耜之漢書律厯志候氣之法為室三重户閉塗釁周密布緹幔室中以木為琯每律各如之內卑外髙從其方位加律其上以葭莩灰抑其兩端案厯而候之氣至者灰去魏相傳冬至則八風之序立萬物之性成吕氏春秋冬至後五旬十日菖蒲生菖者百卉之先生者也淮南子冬至日則陽乘隂是以萬物仰而生原易通卦驗十一月廣漠風至則蘭射干生增孝經緯斗指子為冬至至有三義一者隂極之至二者陽氣始生三者日行南至故謂之至玉燭寶典十一月建子周之正月冬至日極南影長隂陽日月萬物之始當黃鍾律其管最長故有履長之賀原西域志天竺國以十月二十六日為冬至冬至則麥秀帝京景物略冬至日畫素梅一枝為瓣八十有一日染一瓣瓣盡而九九畢則春深矣曰九九消寒圖集藻五言古詩原晉傅亮冬至星昴殷仲冬短晷窮南陸柔荔迎時萋芳藝應節馥北齊蕭慤冬至應教天宫初動磬緹室已飛灰暮風吹竹起陽雲覆户來折氷開荔色除雪出蘭栽慚無宋玉辨濫吹楚王臺五言律詩原唐杜甫草堂即事荒村建子月獨樹老夫家雪裏江船渡風前竹徑斜寒魚依密藻宿鷺起圓沙濁酒禁愁得無錢何處賖宋邵雍冬至冬至子之半天心無改移一陽初動處萬物未生時玄酒味方淡太音聲正希此言如不信更請問庖羲增范成大長至日與同舍遊北山嵗晚山同色湖平霧不收寒雲低閣雪佳節靜供愁竹柏森嚴立蒲荷索莫休瘦笻知腳力政爾耐清遊七言律詩原唐杜甫小至天時人事日相催冬至陽生春又來刺繡五紋添弱線吹葭六管動飛灰岸容待臘將舒栁山意衝寒欲放梅雲物不殊鄉國異教兒且覆掌中杯韓偓冬至夜作中宵忽見動葭灰料得南枝有早梅四海便應枯草緑九重先覺凍雲開隂氛莫向河源塞陽氣今從地底回不道慘舒無定分却憂蚊響又成雷明李夢陽冬至感懷奉天門下玉欄橋此日催班侍早朝占史奏雲歡萬國大官傳宴散層霄苑梅應律春先動宫栁迎風色欲搖一出忽驚今十載百年勳業有漁樵七言絶句御製途中長至關塞經時蹕未回律逢葭琯暗飛灰遙知日晷添宫線暖閣前頭放早梅原宋蘇軾冬至日獨遊吉祥寺井底微陽回未回蕭蕭寒雨濕枯荄何人更似蘇夫子不是花時肻獨來冬至後十餘日復至吉祥寺東君意淺著寒梅千朵深紅未暇裁安得道人殷七七不論時節遣花開明董其昌長安冬至子月風光雪後看新陽一縷動長安禁鐘乍應雲門曲寶樹先驅黍谷寒詩散句原宋楊萬里禽翻竹葉霜初下人立梅花月正髙僧洪惠夜久雪猿啼嶽嶺夢回清月上梅花詞原宋曽實軒小重山薄雪初銷銀月端疏疏浮竹影紅闌梅花夢事落孤山禁人處霜重鼓聲寒留取曉來看斑簾低小閣燭花殘一帆明月去蒼灣空相憶雪浪月痕翻增李肩吾風入松霜風連夜做冬晴曉日千門香葭暖透黃鐘管正玉臺彩筆書雲竹外南枝意早數花開對清樽香閨女伴笑輕盈倦繡停針花磚一線添紅景看從今迤邐新春寒食相逢何處百單五箇黃昏别録原占候四時纂要冬至日數至元旦五十日者民食足若不滿五十日者一日減一升有餘日益一升最驗至前米價長至後必賤落則反貴寒不降五月雷電朔日值冬至主年荒嵗凶古占書以朔日冬至為令辰田家五行志得壬一日主旱二日小旱三日赤旱四日五榖大熟五日小水六日大水七日河決八日海翻九日大熟十日少收十一十二日五榖不成厯法冬至日中竪八尺表其晷如度者其嵗美人和不則嵗惡人惑晷進則水晷退則旱進一尺則日食退一尺則月食厯家推朔旦冬至夜半甲子謂之厯元最難得禁忌千金方勿食經霜菜令人面無光澤增居家宜忌十一月勿食生菜發宿疾勿食生韭多涕唾原種藝松檜春菜箭幹菜茼蒿杉柏菠菜黃矮菜萵苣移植松臘梅檜壅培石榴牡丹椒瑞香麥冬芙蓉木香竹芍藥收採冬葵子陳皮欵冬花鬼箭整頓澆海棠芟薔薇修荼䕷芟木香鋤油菜田忌天火午地火子糞忌丑九焦申荒蕪午十二月小寒大寒臘日除夕附見增禮記月令季冬之月日在婺女昏婁中旦氐中注日月會於玄枵而斗建丑之辰也氷以入令告民出五種注氷既入而令田官出五種以明大寒氣過農事將起也是月也日窮於次月窮於紀星回於天數將幾終嵗且更始専而農民毋有所使原梁元帝纂要季冬亦曰暮冬杪冬除月暮節暮嵗窮稔窮紀花月令是月也梅蘂吐山茶麗水仙凌波茗有花瑞香郁烈山礬鬯發增瓶史月表十二月花盟主蠟梅獨頭蘭花花客卿茗花漳茶花花使令枇杷花彚考增禮記王制冡宰制國用必於嵗之抄五榖皆入然後制國用夏小正十有二月納卵蒜傳卵蒜也者夲如卵者也韓非子魯哀公問於仲尼曰冬十二月霣霜不殺菽何為記此對曰此言可以殺而不殺也宜殺而不殺梅李冬實天失道草木猶犯干之而况人君乎荆州記淮陽郡十二月一日種榖至明年三月新榖便登賞心樂事十二月綺互亭檀香蠟梅湖山探梅花院蘭花玉照堂看早梅榕城隨筆漳於八閩為極南得氣最暖其人生不識霜雪之狀隆冬不禦裘絮桃李以臘月華大寒之候桂香襲人特為可愛小寒原孝經緯冬至後十五日斗指癸為小寒陽極隂生乃為寒今日初寒尚小也詩含神霧小寒為節者亦形於大寒故謂之小言時寒氣猶未極也大寒增孝經緯小寒後十五日斗指丑為大寒至此栗烈極也詩含神霧大寒者上形於小寒故謂之大十一月一陽爻初起至此始徹隂氣出地方盡寒氣併在上寒氣之逆極故謂大寒臘原禮記郊特牲天子大蠟八伊耆氏始為蠟蠟也者索也嵗十二月合聚萬物而索饗之也增郊特牲蠟之祭也主先嗇而祭司嗇也祭百種以報嗇也原風俗通夏曰嘉平殷曰清祀周曰大蠟漢改曰臘臘者獵也因獵取獸以祭先祖或曰新故交接大祭以報功也增荆楚嵗時記十二月八日為臘日諺語臘鼓鳴春草生村人並擊細腰鼓戴胡頭及作金剛力士以逐疫原卓異記天授二年臘卿相詐稱上苑花開請幸則天許之乃遣使宣詔曰明朝遊上苑火急報春知花須連夜發莫待曉風吹於是明晨名花瑞草皆發羣臣咸服其異養生要論十二月臘夜令人持椒卧井旁無與人言納椒井中可除瘟病杜氏通典蠟之義自伊耆氏之代而有其禮古之君子便之是報田之祭也其神農初為田事故以報也風土記東京作浴佛會以諸果品煮粥謂之臘八粥農政全書冬至後第三戍為臘臘前兩三畨雪謂之臘前三白大宜菜麥諺云若要麥見三白除夕增吳中風俗記吳中風俗除夜村落間以秃帚若麻秸竹枝等燃火炬縛於長竿之梢以照田蠶爛然遍野以祈絲榖除夜宜焚辟瘟丹或蒼术皂角楓藝諸香以辟邪袪濕宣鬱氣助陽德即閟室虛堂亦無不到集藻文賦散句增晉傅玄大寒賦百川咽而不流兮氷凍合于四海扶木憔悴于暘谷若華零落于濛汜陸雲嵗暮賦時凛冽其可悲兮氣蕭條以傷心悽風愴其鳴條兮落葉翻而灑林唐王勃守嵗序槐火滅而寒氣消蘆灰用而春風起魚鱗布葉爛五色而翻光鳳腦吐花燦百枝而引照柏葉為銘影泛新年之酒椒花入頌先開獻嵗之詞張九齡嵗除登逍遙臺序南土融和覺寒氣之向盡東郊物暖愛春色之方來四言古詩原晉裴秀大蠟詩日躔星紀大吕司辰玄象改次庶衆更新嵗事告成八蠟報勤告成伊何年豐物阜豐禋孝祀介兹萬祜報勤伊何農功是歸穆穆我后務兹蒸黎宣力災畝沾體暴肌飲饗清祀四方來綏充牣郊甸鱗集京師交錯貿遷紛葩相追反袂成幕連袵成帷有肉如丘有酒如泉有殽如林有貨如山和氣來臻率土同歡祥風協順降祉自天方隅清謐嘉祚日延與民優遊享夀萬年五言古詩原梁庾肩吾嵗盡應令嵗序已云殫春心不自安聊開柏葉酒試奠五辛盤金薄圖神燕朱泥印鬼丸梅花應可折倩為雪中看五言律詩原唐太宗除夜暮景斜芳殿年華麗綺宫寒辭去冬雪暖𢃄入春風階馥舒梅素盤花捲燭紅共歡新故嵗迎送一宵中嵗隂窮暮紀獻節啓新芳冬盡今宵促年開明日長氷消出鏡水梅散入風香對此歡終宴傾壺待曙光沈佺期嵗夜安樂公主滿月侍宴應制除夜子星回天孫滿月杯詠歌麟趾合簫管鳳凰來嵗炬常燃桂春盤預折梅聖皇千萬夀垂曉御樓開史育除夜今嵗今宵盡明年明日來寒隨一夜去春逐五更回氣色空中改容顔暗裏催風光人不覺已著後園梅杜甫杜位宅守嵗守嵗阿戎家椒盤已頌花盍簪喧櫪馬列炬散林鴉四十明朝過飛騰暮景斜誰能更拘束爛醉是生涯韋莊嵗除對王秀才作我惜今夜促君愁玉漏頻豈知新嵗酒猶作異鄉身雪向寅前凍花從子後春到明追此會俱是隔年人增宋陸遊臘月今冬少霜雪臘月厭重裘漸動園林興頓寬薪炭憂山陂泉脈活村市栁枝柔春餅吾何患嘉蔬日可求七言律詩御製賦得爆竹聲中一嵗除是日微雪爆竹連宵不夜城占年積素即豐盈維新四始全仁政修省三朝冀太平拂曙和風臨上日通晨淑氣擁華清願將柏葉芳尊酒賜與臣鄰共大羮增唐杜審言守嵗侍宴季冬除夜接新年帝子王孫捧御筵宫闕星河低拂樹殿前燈燭上薰天彈弦奏節梅風入對局探鉤柏酒傳欲向正元歌萬夀暫留歡賞寄春前原杜甫臘日臘日常年暖尚遙今年臘日凍全消侵陵雪色還萱草漏泄春光有栁條縱酒欲謀良夜醉還家初散紫宸朝口脂面藥隨恩澤翠管銀罌下九霄十二月初一日作今朝臘月春意動雲安縣前江可憐一聲何處送書雁百丈誰家上瀨船未將梅蘂驚愁眼更取椒花媚逺天明光起草人所羡病廢幾時朝日邊增宋宋郊十二月望日禁中作閏厯先春破臘寒綵花金勝寵千官氷從太液池邊動栁向靈和殿裏看瑞氣因風飄禁仗暖暉依日上仙盤須知聖運隨生殖萬國年年共此歡陸遊嵗未盡前數日偶題長句老向人間迹轉孤參差煙火出菰蒲數畦緑菜寒猶茁一勺清泉手自㪺榖賤窺籬無狗盜夜長暖足有貍奴嵗闌更喜人強健小草書成鬱壘符風號四野雲如墨徂嵗消磨不滿旬瑞雪便應平地尺野梅又報一年春長河斷渡氷將合古寺題詩手為皴僵卧閉門行路絶安知當代獨無人原明文徴明雲霞駘蕩曉光和手折梅花對酒歌暮齒不嫌來日短霜髭較似去年多東風漸屬青陽候流水微生緑玉波鳥弄新音晴晝永相看不飲奈春何五言絶句原唐太宗太原召侍臣守嵗四時運灰琯一夕變冬春送寒餘雪盡迎嵗早梅新七言絶句原宋韓絳新陽氣候未全佳尚縱寒威壓嵗華賴有椒湯共卯酒不妨和雪看梅花增范成大除夕前二日夜雨雪不成花夜雨來隴頭一洗定無埃小童却怕溪橋滑明日先生合探梅楊萬里臘裏立春嫩日催青出凍荄小風吹白落疏梅殘冬未放春交割早有黃蜂紫蝶來詩散句增唐殷璠雪冷江空嵗暮時竹隂梅影月參差宋韓琦一箭尚留終在臘萬花發欲驚春楊萬里臘月潮州見桃李元來不作好春看明王韋好記流年收柏葉乍消殘雪見梅枝詞增宋汪莘行香子野店殘冬緑酒春濃念如今此意誰同溪光不盡山翠無窮有幾枝梅幾竿竹幾株松籃輿乘興薄暮疏鐘望孤村斜日匆匆夜窗雪障曉枕雲峰便擁漁蓑頂漁笠作漁翁别録原負暄雜録二十四日五更取井花水平旦第一汲者盛淨器中量人口多少浸乳香至嵗旦五更暖令溫從小至大每人以乳香一小塊飲水三吸一年不患時疾法天生意大寒冷早出噙真麻油則耐寒勿食經霜菜果減人顔色占候栁眼青來年夏秋米賤月內萌類不見六月五榖不實二十四日田夫牧豎候昏時爭立竿燎火於野名曰照田蠶看火色占來年水旱白主水紅主旱猛烈主豐衰微主歉東北風吉臘盡火光及燒籸盆爆竹看火色大率與田蠶火同種藝檾麻茼蒿菠菜栽桑移植山茶玉梅海棠栁壓插石榴薔薇月季木香十姊妹收採大戟根節欵冬花木蘭皮鬼箭榖樹皮冬葵子蒲公英菖蒲忍冬藤壅培橘桑苧麻韭竹芍藥整頓墾秧田燒荒修杞栁修桑浴蠶種伐竹木磨桑葉造農具挑溝塘乾蒿砍榖樹刈茅草葺園籬酵河泥貯雪水貯麻油田忌天火酉地火子糞忌卯九焦巳荒蕪戍御定佩文齋廣羣芳譜卷六
