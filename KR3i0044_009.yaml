body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷七榖譜麥按大麥小麥統名曰麥原譜專以小麥為麥而另列大麥于後今從齊民要術併合為一增説文麥芒榖秋種厚埋故謂之麥麥屬金金王而生火王而死原小麥一名來又作䅘爾雅云小麥䅘廣雅云來小麥也夲草云麥字從來從夊來象其實夊象其根苗生如韭成似稻髙二三尺實居殼中芒生殼上生青熟黃秋種夏熟具四時中和之氣兼寒熱溫涼之性繼絶續乏為利甚普故為五榖之貴亦可春種至夏便收然不及秋種者性有南北之異北地燥冬多雪春少雨麥晝花薄皮多麵食之宜人南方卑濕冬無雪春多雨麥受卑濕之氣又夜花食之生熱腹痛難消亦地氣使然也北麥固佳陳者更良增廣志鹵水麥其實大麥形有縫稅麥似大麥出涼州旋麥三月種八月熟出西方赤小麥赤而肥稀熟出鄭縣山提小麥至黏弱以貢御半夏小麥秃芒麥齊民要術云按今世有落麥者禿芒是也原大麥一名牟又作牟爾雅云大麥牟廣雅云牟大麥也本草云麥之苖粒皆大於來故得大名牟亦大也或又作􅓿班固典引云玄秬黃􅓿之事是也莖葉與小麥相似但莖微粗葉微大色深青而外如白粉芒長殼與粒相黏未易脫小麥磨麵作餅餌食大麥止堪碾米作粥飯及喂馬用此其所異也性平涼滑膩作飯寬中下氣煮粥甚滑磨麵作醬甚甘美春秋皆可種他如穬麥本草李時珍云穬麥有二種一種類小麥而大一種類大麥而大又云是大麥中一種皮厚而色青者也唐蕭炳云西川人種食之山東河北人正月種之名曰春穬形狀與大麥相似陳承云作麵脆硬食多脹人汴洛河北之間又呼為黃稞赤麥廣志云有赤麥赤色而肥青稞麥本草陳藏器云青稞似大麥天生皮肉相離泰隴巴西種之王禎農書云青稞有大小二種似大小麥而粒大皮薄多麵無麩西人種之黑穬麥見廣志大抵與大麥一類而異種增廣志麥出涼州似大麥本草糯麥大麥有黏者名糯麥可以釀酒彚考增詩鄘風爰采麥矣沫之北矣原鄘風我行其野芃芃其麥增周頌貽我來牟帝命率育箋武王渡孟津白魚躍入舟出涘以燎後五日火流為烏五至以榖俱來此謂貽我來牟疏榖蓋牟麥也原周頌於皇來牟將受厥明明昭上帝迄用康年增禮記王制夏薦麥月令孟春之月雪霜大摯首種不入蔡雍章句太隂干陽雨雪而霜故大傷首種首種謂宿麥也麥以秋種故謂之首種季春之月天子乃為麥祈實注於含秀求其成也孟夏之月農乃登麥天子乃以彘嘗麥先薦寢廟注麥之新氣尤盛以彘食之散其熱也麥秋至仲秋之月乃勸種麥無或失時注麥者接絶續乏之榖尤重之疏前年秋榖至夏絶盡後年秋榖夏時未登是其絶也夏時人民糧食闕短是其乏也麥乃夏時而熟是接其絶續其乏也內則麥食脯羮雞羮疏謂以麥為飯析脯為羮又以雞為羮三者味相宜也周禮天官雁宜麥疏雁宜麥者雁味甘平大麥味酸而溫小麥味甘微寒氣味相成故云雁宜麥原左傳隱公三年夏四月鄭祭足帥師取溫之麥孟子今夫牟麥播種而耰之其地同樹之時又同浡然而生至於日至之時皆熟矣家語宓子賤為單父宰齊攻魯道由單父單父父老請曰麥已熟矣今齊寇至不及人人自收其麥請放民皆使出穫麥可以益糧且不資寇三請而宓子賤不聼俄而齊寇逮乎麥季孫聞之怒使人讓曰民寒耕熱藝曾不得食可不哀哉猶可有告而不聼非所以也宓子賤蹴然曰今兹無麥明年可樹若使不耕者得穫是使民樂有寇也且單父得一嵗之麥於魯不加強喪之不加弱使民有自取之心其創必數世不息季孫聞之赧然愧曰地若可入吾豈忍見宓子哉增前漢書食貨志董仲舒説上曰春秋他榖不書至於麥禾不成則書之以此見聖人於五榖最重麥與禾也今關中俗不好種麥是嵗失春秋之所重而損生民之具也願陛下幸詔大司農使關中民益種宿麥令毋後時注師古曰宿麥謂其苖經冬後漢書光武本紀詔曰久旱傷麥秋種未下朕甚憂之原後漢書馮異傳光武至南宫大風雨引車入道傍空舍馮異抱薪鄧禹爇火光武對竈燎衣異進麥飯逸民傳髙鳳少為書生家以農畝為業専精誦讀晝夜不息妻嘗之田曝麥於庭令鳳護雞時天暴雨鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之後遂為名儒增晉書孝友傳王裒家貧躬耕計口而田度身而蠶或有助之者不聼諸生密為刈麥裒遂棄之庾衮母終服喪居于墓側嵗大飢藜羮不糝門人欲進飯者而衮每曰已食莫敢為設及麥熟穫者已畢而採捃尚多衮乃引其羣子以退曰待其間及其捃也不曲行不旁掇跪而把之則亦大獲魏書樊子鵠傳子鵠除殷州刺史屬嵗旱儉子鵠恐民流亡乃勒有粟之家分貸貧者并遣人牛易力多種二麥州內以此獲安釋老志東萊人王道翼少有絶俗之志隱韓信山四十餘年斷粟食麥隋書隱逸傳張文詡河東人也每以德化人鄉黨頗移風俗嘗有人夜中竊刈其麥者見而避之盜因感悟棄麥而謝文詡慰諭之自誓不言因令持去經數年盜者向鄉人説之始為逺近所悉南史吳明徹傳明徹有粟麥三千餘斛而鄰里飢餒乃白諸兄與鄉里計口平分同其豐儉賴以存者甚衆孝義傳沈崇傃母卒葬後更行服三年久食麥屑不噉鹽酢舊唐書髙宗本紀儀鳳三年五月幸九成宫秋七月宴近臣諸親於咸亨殿上謂霍王元軌曰去冬無雪今春少雨自避暑此宫甘雨頻降夏麥豐熟秋稼滋榮玄宗本紀上自於苑中種麥率皇太子已下躬自收穫謂太子等曰此將薦宗廟是以躬親亦欲令汝等知稼穡之難也因分賜侍臣謂曰比嵗令人巡撿苖稼所對多不實故自種植以觀其成且春秋書麥禾豈非古人所重也五代史回鶻傳回鶻地宜白麥青麥􅀈麥宋史仁宗本紀天聖三年四月癸巳幸御莊觀刈麥聞民舍機杼聲賜織婦茶帛禮志太宗景祐三年禮官宗正請每嵗夏孟月嘗麥配以彘皇祐五年後苑寶政殿刈麥謂輔臣曰朕新作此殿不欲植花嵗以種麥庶知穡事不易也自是幸觀榖麥惟就後苑汲冡周書維四年孟夏王初祈禱於宗廟乃嘗麥於太祖穆天子傳天子西征至于赤烏之人獻穄麥百載天子西征至于􅜑韓氏爰有樂野溫和穄麥之所草黑水之阿爰有野麥師曠禽經澤雉啼而麥齊原莊子青青之麥生於陵陂增吕氏春秋今兹美菜來兹美麥孟夏之昔殺三葉而穫大麥注昔終也三葉薺苨也葶藶也菥蓂也見三葉之死則大麥可穫之候也淮南子濟水通和而宜麥春秋佐助期麥神名福習春秋説題辭麥之為言殖也寢生觸凍而不息精射刺直故麥含芒事且立也説文牟周所受來牟也一麥二牟象其芒刺之形天所來也獨斷老扈氏農正趣民收麥原曺瞞傳太祖嘗出車行經麥中令士卒無敗麥犯者死騎士皆下馬付麥相持於時太祖馬騰入麥中敕主簿議罪主簿對以春秋之義罰不加於尊太祖曰制法而自犯之何以帥下然孤為軍帥不可殺請自刑因拔劍割髮以置地諸葛恪别傳孫權饗蜀使費禕禕停食餅索筆作麥賦恪亦請筆作磨賦咸稱善焉增秦子孔文舉為北海相有母病思食新麥家無乃盜鄰熟麥而進之文舉聞之特賞曰不必來謝但勿盜也盜而不罪者以為勤於母也博物志漢武帝時廣陽縣雨麥五土所宜黑墳宜麥黍玄晏春秋衛倫過豫言及於味稱魏故侍中劉子陽食餅知鹽生精味之至也豫曰師曠識勞薪易牙别淄澠子陽今之妙也定之何難倫因命僕取糧糗以進豫曰麥也有杏李奈味三果之熟也不同子焉得兼之倫笑而不答退告人曰士安之識過劉氏吾將來家實多故杏時將發糅以杏汁李奈將發又糅以李奈汁故兼三味陳留耆舊傳髙式至孝永平中蝝蝗為災獨不食式麥西域諸國志天竺十一月六日為冬至則麥禾十二月十六日為臘則麥熟拾遺記樂浪之東有背明之國其國昏昏常暗宜種百榖名曰融澤方三千里五榖皆良食之後天而死有延精麥延夀益氣有昆和麥調暢六府有輕心麥食者體輕有醇和麥為麴以釀酒一醉纍月食之凌冬可袒有含露麥穟中有露味甘如飴張華為九醖酒以三薇漬麯蘖蘖出西羌麴出北方北方有指星麥四月火星出麥熟而穫之蘖用水漬麥三夕而萌芽平旦雞鳴而用之俗人呼為雞鳴麥以之釀酒醇美久含令人齒動若大醉不呌笑搖蕩令人肝腸消爛俗人謂為消腸酒晉中興書苻健洪第三子健隂圖關中陽使其徒種麥示無西意水經注汶水入萊蕪谷出谷有平丘面山傍水土人悉以種麥云此丘不宜植稷黍而宜麥齊人相承以植之國史補竇氏子言家方盛時有奴厚斂羣從數宅之資供白麥麵醫云白麵性平由是恣食不疑凡數嵗未嘗生疾其後有奴告其謬妄所輸麵乃常麥非白麥也羣從諸宅一時暴熱皆發原杜陽雜編元和八年大軫國貢碧麥形大於中華之麥表裏皆碧香氣如粳米食之體輕可以禦風增孔帖同昌公主出降賜金麥銀米共數斛此皆條枝國獻髙昌土沃麥皆再熟東坡集江湖間有鳥鳴於四五月其聲若云麥熟即快今年二麥如雲此鳥不妄言也原東坡詩注今大內當麥熟時以黃羅帕封賜百官其外題曰麨或云以蜜漬食尤佳增朱子詩注小説人有中麥毒者夢紅裳娘子悲歌有一丸蘆蔔火吾宫之句空同子麥種之秋而焦於夏火尅金也麥穗直而芒有兵象焉湧幢小品洪武初一儒赴召太祖問曰習何經曰業農太祖曰汝知麥禾之節不同乎對曰禾三節麥四節禾播種於春至秋而穫凡厯三時故三節麥則厯四時始成故四節太祖曰是能知稼穡者即擢某州知州木蘭國有三寸之麥原梧潯雜佩南方四月雨後尚有餘寒土人謂之麥秀寒按王勃採蓮賦麥雨微涼又徐陵集亦有麥冷之語集藻傳原宋蘇軾溫陶君傳石中美字信美中牟人也夲姓麥氏隨母羅氏去其夫而適石因冒其姓始中美之生也其父太卜氏以連山筮之遇師之爻是謂師之革曰生乎土成乎水而變乎火坎以輮之坤以布之釡以熟之口以內之腹以藏之美在其中而暢於四支能者樂之以為大腹不能者傷之以為心病衆所説也善莫大焉故因以名字之中美幼輕躁踈散與物不合得其鄉人儲子之意因使從滏水湯先生遊既熟遂陶而成之為人白晳而長溫厚柔忍在諸石中最有名儲子因秦故司馬錯李斯子由趙髙閻樂並薦於秦王得與甫田蔡甲肥鄉羊奭內黃韓音子俱召見是時王方省覽文書日昃未食見之甚喜曰卿等向者安在何相見之晚耶未見君子惄如調飢卿等之謂也自是皆得進見充上心腹賜爵土更上食典御旦夕召對所獻納時或粗踈上未嘗不盡善也秦王以嫪毒事出文信侯而遷太后怒恚數日不食中美乘機進諫上説賜爵徹侯食溫定陶二縣號溫陶君中美既被任用凡有造作自丞相以下莫不是之其為人柔和有以塞讒人之口故也他日秦王坐朝日旰意有所思亟召中美將虛以納之中美不熟計以進其説頗剛鯁志不快之者纍日有博士單軫説上曰為其所傷矣宜有以下之即無患因進其弟子已升元華於上上意稍平然自是遂踈中美不得為尚食矣中美曰吾為尚食日夕自謂不素餐者今吾與羊生輩皆不得進縱復有用者將誅辱乎昔也得充心腹而今也遽不信是有不善我之心雖使時或思我彼將不盡矣遂稱疾以侯就第其後子孫生郡郭者散居四方自號渾氏扈氏索氏石氏為四族云文賦散句原殷箕子麥秀歌麥秀漸漸兮彼黍離離漢枚乘七發麥秀􅀢兮雉朝飛增魏黃觀疏今年麥苖雖好臨熟多雨而悉復偃壞小麥略盡惟穬麥大麥頗得半收耳原晉潘嶽射雉賦麥漸漸以擢芒五言古詩增唐白居易觀刈麥田家少間月五月人倍忙夜來南風起小麥覆隴黃婦姑荷簞食童稚攜壺漿相隨餉田去丁壯在南岡足蒸暑土氣背灼炎天光力盡不知熱但惜夏日長復有貧婦人抱子在其傍右手秉遺穗左臂懸弊筐聼其相顧言聞者為悲傷家田輸稅盡拾此充飢腸今我何功德曽不事農桑吏祿三百石嵗晏有餘糧念此私自愧盡日不能忘宋蘇轍遲往泉店殺麥罷民不耕穫豈利有攸往古人為我言許此亦無妄一冬免鋤犁二麥盈甕盎火老金尚伏雨過築場壤鄰家助伯亞蒼耳割榛莽朝陽得終日經嵗可無恙老夫終病慵長子幸可仗劬勞慎勿厭餅餌家共享秋田雨初足已作豐熟想歸來報好音相對開臘釀七言古詩增宋蘇軾鴉種麥行霜林老鴉間無用畦東拾麥畦西種畦西種得青猗猗畦東已作牛尾稀明年麥熟芒攢槊農夫未食鴉先啄徐行俯仰若自矜鼓翅跳踉上牛角憶昔舜耕厯山鳥為耘如今老鴉種麥更辛勤農夫羅拜鴉飛起勸農使者來行水五禽言去年麥不熟挾彈規我肉今年麥上場處處有殘粟豐年無象何處尋聼取林間快活吟蘇轍遜往泉城穫麥少年食稻不食粟老居潁川稻不足人言小麥勝西川雪花水磨煮成玉泠淘槐葉氷上齒湯餅羊羮火入腹五年隨俗粗得飽晨朝稻米才供粥兒曺知我老且饞觸熱泉城正三伏田家有信呼即來亭午驅牛汗如浴吾兒生來讀書史不慣田家爭斗斛今年久旱麥粒細及半罷休饒老宿歸來爛熳晒蒼耳來嵗未知還爾熟百口且留終嵗儲貧交強半倉無榖外孫文九伏中入村晒麥春田不雨憂無麥入囷得半猶足食伏中一晒不得緩旱田倉耳猶難得人言春旱夏當潦入伏未保天日好老農經事言不虛防風防雨如防盜外孫讀書舊有功五言七字傳祖風旋投詩筆到田舍知我老來饞且慵秋田正急車難起汗滴肩頳愧鄰里磨聲細轉雪花飛舉家百口磨牙齒食前方丈我所無蒸餅十家或有諸孫歸何用慰勤苦烹雞亦有蒸葫蘆張舜民打麥打麥打麥彭彭魄魄聲在山南應山北四月太陽出東北才離海嶠麥尚青轉到天心麥已熟鶡旦催人夜不眠打雞呼雨雲如墨大婦腰鐮出小婦具筐逐上壠先捋青下壠已成束田家以苦乃為樂敢憚頭枯面焦黑貴人薦廟已嘗新酒醴雍容會所親曲終厭飫勞僮僕豈信田家未入唇盡將精好輸公賦次把升斗求市人麥秋正急又秧禾豐嵗自少凶嵗多田家辛苦可奈何將此打麥詞兼作插禾歌范成大刈麥行梅花開時我種麥桃李花飛麥叢碧多病經旬不出門東坡已作黃雲色腰鐮刈熟趁晴歸明朝雨來麥沾泥犁田待雨插晚稻朝來移秧夜食麨陸遊屢雪二麥可望喜而作歌苦寒勿怨天雨雪雪來遺我明年麥三月翠浪舞東風四月黃雲暗南陌坐看比屋騰歡聲已覺有司寬吏責腰鐮丁壯傾閭里拾穗兒童動千百玉塵出磨飛屋梁銀絲入釡須寬湯寒醅發劑炊餅裂新麻壓油寒具香大婦下機廢晨織小姑佐庖忘晚妝老翁飽食笑捫腹林下擊壤歌時康張孝祥大麥半枯自浮沉小麥刺水鋪緑針山邊老農望麥熟出門見水放聲哭去年泠泠七月雨秋苖不收一粒榖只今米價貴如玉併日舉家才食粥小兒索飯門前啼大兒雖瘦把鋤犁晴時種麥耕荒壠正好下秧無稻種戴復古刈麥行腰鐮上壠刈黃雲東家西家麥滿門前村寡婦拾滯穟饘粥有餘炊餅餌我聞淮南麥最多麥田今嵗屯干戈飽飯不知征戰苦生長此方真樂土王炎麥苖已有生意掘烏糯者未止兒童飯犢女採桑水滿東臯耕事忙稻秧半緑麥半黃天許食新饘粥香田父咨嗟仍笑語赤地一年今得雨紫蕨有根妻子喜免填溝壑棄閭里元王禎芟麥歌田家食力不食智牟夾夕年年勤種蒔老農八十諳地利暑夏呼兒先暵地再耕再耨土華膩手把耬犁知已試土沃不妨投種穊今年已報春澤被夏壠苖深如櫛比薰風長養見天意獵獵青旗催稚穗才結稃胞花雪墜赫赫曦輪熾鑽燧儘著精華輸至味粒飽芒森密如篲頓失前時浪翻翠豈知真宰調元氣化作黃雲表嘉瑞老農眼飽雖自慰旦夕却憂風雨至子婦奔忙事芟器釤綽翩翩轉雙臂曵籠腰間盈復棄急載牛箱夜無寐轉首登場簇髙積風翻日碾半猶未已向公門奉新餽麴材和糴凡幾次年餉巡門仍語誶夏稅有程今反易自餘宿負如取寄指此有秋爭蟻萃一得豈能償百費終嵗勤勞一歔欷昨日公堂宴賓貴樽爼橫陳混肴胾檀板珠繩按歌吹萬錢不值供一醉庖人搓揉出精粹尚喜食新誇餅餌物不天來皆力致飽食何人知所自春祈夏薦禮所記報夲從來追古義但願斯民不畏吏吏不擾民民自遂凡在牧民遵此治坐見兩岐歌政異日富囷倉均被賜不使老農憂嵗事明髙啓打麥詞雉雛髙飛夏風暖行割黃雲隨手斷疏莖短若牛毛垂去冬無雪不相宜場頭負歸日色白穗落連枷聲拍拍呼兒打曬當及晴雨來怕有飛蛾生臥驅鳥雀非愛惜明年好收供爾食五言律詩增宋蘇轍殺麥二首麥幸十分熟雨過三日霪初晴尚未伏半夜卷重隂細築場無隙輕推磨有音驚聞諸縣水一晒直千金雨後麥多病庾中蛾欲飛不辭終日暑幸脫半年飢潦水來何暴秋田望已微農夫愚可念此報定誰非陸遊種麥墾地播宿麥飯牛臨野池未能貪佛日正恐失農時矻矻鋤耰力勤勤祝史辭嘉平得三白吾飽豈無期七言律詩增宋朱子次韻秀野滄波館刈麥貽牟夙昔但聲歌今見郊園樂事多且喜甌簍符善禱未須蘆蔔顰妖娥霞觴正自誇真一香鉢何須問畢羅我欲賣刀來學稼不知還許受㕓麼原明申時行麥浪芃芃秀色挺來牟片片黃雲似水流風作跳波時隱見雨添新漲乍沉浮晴畦錦漾千層縠寒隴濤生四月秋却怪狂瀾頻起陸漫教文偉賦中收董其昌太廟薦麥閟宫朝啓肅精禋御苑來牟及薦新九葉靈光開大厯雙岐瑞穎獻昌辰風回玉几馨先稷露裛金莖潔似蘋一自寢園祈報後於皇清頌遍周民七言絶句御製見途中夏麥將熟志喜江滸淮壖道已周歸看東省麥盈疇雨滋膏潤苗多秀早慶今年大有秋清明麥秀清明前後麥花香遍野氤氲映驌驦須認秋成春雨密隔溪村落飲斜陽增宋王圭宫詞六龍觀稼奉宸遊齊賀豐年薦麥秋後苑宴回卿相出內官金合送來牟王安石陂麥陂麥連雲慘淡黃緑隂門巷不多涼更無一片桃花在借問春歸有底忙范成大出東郊觀麥苖去嵗秋霖麥下遲臘殘一雪潤無泥相將飽喫滹沱飯來聼林間快活啼刈麥麥頭熟顆已如珠小厄惟憂積雨餘丐我一晴天易耳十分終惠莫乘除田園雜興髙田二麥接山青傍水低田緑未耕桃杏滿村春似錦踏歌椎鼓過清明楊萬里江山道中麥熟黃雲剖露幾肩歸紫玉炊香一飯肥却破麥田秧晚稻未教水牯臥斜暉麥無邊緑錦織雲機全幅青羅作地衣個是農家真富貴雪花消盡麥苖肥方嶽農謡春雨初晴水拍堤村南村北鵓鴣啼含風宿麥青相接刺水柔秧緑未齊小麥青青大麥黃護田沙徑繞羊腸秧畦岸岸水初飽塵甑家家飯已香原談知榮麥隴風來翠浪浮霏微小雨似深秋野庭終日捲簾坐青樾對啼黃栗留詩散句原唐杜甫崆洞小麥熟增杜甫白屋花開裏孤城麥秀邊山田麥無隴春氣晚更生韓愈南陽郭門外桑下麥青青白居易四月未全熟麥涼江風秋元稹年年四五月繭實麥小秋原司空圖緑樹連村暗黃花入麥稀宋蘇軾登城望牟麥緑浪風掀舞增陸遊但見古河東壠麥如鋪雪金麻九疇野黃麥初割畦緑蔬才灌王元粹青青道邊麥知是誰家田宋石介使麥長熟人不飢敢告吾君不須赦王安石無端隴上翛翛麥橫起風寒占作秋范純仁潤催隴麥將黃節寒阻春蠶趁早眠唐庚睡外莫聼泥活活想中已賭麥含含陸遊京塵日念家山樂况值腰鎌割麥初雨畏禾頭蒸耳出潤憂麥粒化蛾飛已過西成賽廟期家家下麥不容遲壓車麥穗黃雲卷食葉蠶聲白雨來山村處處晴收麥鄰曲家家午曬絲楊萬里紅紅白白花臨水碧碧黃黃麥際天危禎麥風翻隴潑濃緑花露滴枝黏老紅吳潛吳波亭下繫扁舟輕雨輕寒又麥秋盧贊元麥秋天氣朝朝變蠶月人家處處忙宋謝朓麥候始清和齊王僧逹麥壠多秀色邢邵風輕麥候初周庾信麥隨風裏熟陳江總麥氣涼昏曉唐盧從願蘅臯起麥涼張謂秋風麥穗黃蕭穎士麥秋田野喧王維雉雊麥苗秀杜甫徼麥早向熟原杜甫細麥落輕花青熒陵陂麥涼州白麥枯增韓愈暖風抽宿麥孟郊麥風清冷吹李賀麥雨漲溪田張蠙甸麥深藏雉宋王安石麥漲一溪雲蘇軾夏旱臞麥人唐庚雀飛田有麥汪藻麥隴如人深范成大麥裏緑叢髙戴復古梯山畦麥秀黃公度晴添麥隴黃金吳激風雨麥秋寒元方夔山田麥苗肥袁桷土沃村村麥原唐李白荆州麥熟繭成蛾麥隴青青三月時增儲光羲麥涼浮壠雉媒低栁宗元麥芒際天搖青波李賀野家麥畦上新壠朱慶餘麥風吹雨正徘徊薛逢晚麥芒乾風似秋薛能鄰驚麥野聞雛雉杜荀鶴髙下麥田新雨後分開野色收新麥宋石介麥宜過社猶催種原歐陽修四月田家麥穗稠王安石晴日暖風生麥氣增蘇軾麥熟旋供湯餅新王阮麗日借黃催麥壠范成大麥雨一犁隨處緑青黃麥隴平平去陸遊水面秧青麥半黃雪花漫漫麥將熟土膏動後麥苗長戴復古煆磨鳴時大麥黃黃公度乍寒乍暖麥秋天金王渥榖雨連朝沒麥場宇文虛中彌壠連天麥浪寒麻九疇笋輿歸路麥花香元好問一犁春雨麥青青灔灔蒼波麥已勻元方回夏前十日嘗新麥耶律楚材萬頃青青麥浪平馬祖常滋麥春膏覆壠齊謝應芳天假春晴養麥苗别録增尚書大傳秋昏虛星中可以種麥原種麥農政全書八月白露節後逢上戊為上時中戊為中時下戊為下時種須簡成實者棉子油拌過則無蟲而耐旱大約杏多則不蛀宜肥地有雨佳諺云無雨莫種麥又云麥怕胎裏旱又云要喫麵泥裏纒春雨更宜諺云麥收三月雨春間鋤一遍收子多若三春有雨入夏時有微風此大有之年也諺云麥秀風搖初種忌戌日諺云無灰不種麥雨經社日佳以灰糞拌種妙增雜隂陽書大麥生於杏二百日秀秀後五十日成麥生於亥壯於卯長於辰老於已死於午惡於戌忌於子丑小麥生於桃二百一十日秀秀後六十日成忌與大麥同蟲食杏者麥貴齊民要術崔實曰凡種大小麥得白露節可種薄田秋分種中田後十日種美田惟穬早晚無常正月可種春麥豍豆盡二月止汜勝之書曰凡田有六道麥為首種種麥得時無不善夏至後七十日可種宿麥早種則蟲而有節晚種則穗小而少實當種麥若天旱無雨澤則薄漬麥種以酢漿并蠶矢夜半漬向晨速投之令與白露俱下酢漿令麥耐旱蠶矢令麥忍寒麥生黃色傷於太稠稠者鋤而稀之秋鋤以棘柴耬之以壅麥根故諺云子欲富黃金覆黃金覆者謂秋鋤麥曵柴壅麥根也至春凍解棘柴曵之突絶其乾葉須麥生復鋤之到榆莢時注雨止候土白背復鋤如此則收必倍冬雨雪止以物輒藺麥上掩其雪勿令從風飛去後雪復如此則麥耐旱多實春凍解耕如土種旋麥麥生根茂盛莽鋤如宿麥區麥種區大小如中農夫區禾收區種凡種一畝用子二升覆土厚二寸以足踐之令種土相親麥生根成鋤區間秋草緣以棘柴律土壅麥根秋旱則以桑落曉澆之秋雨澤適勿澆之麥凍解棘柴律之突絶去其枯葉區間草生鋤之大男大女治十畝至五月收區一畝得百石以上十畝得千石以上大小麥皆須五月六月暵地不暵地而種者其收倍薄種大小麥先埒逐犁㽢種者佳其山田及剛強之地則耬下之凡耬種者匪直土淺易生於鋒鋤亦便穬麥非良地則不須種八月中戊社前種者為上時擲者畝用子二升半下戊前為中時用子三升八月末九月初為下時用子三四升八月上戊社前為上時擲者用子一升半中戊前為中時用子二升下戊前為下時用子二升半正月二月勞而鋤之三月四月鋒而更鋤小麥宜下種歌曰髙田種小麥稴糝不成穗吳下田家志種麥宜庚午辛未辛己辛卯庚子庚戌種樹書小麥不過冬大麥不過年麥最宜雪諺云冬無雪麥不結種麥之法土欲細溝欲深耙欲輕撒欲勻曬麥之法宜烈日之中乘熱而收仍用蒼耳葉或麻葉碎雜其中則免化蛾臘日種麥及豆來年必熟麥苖盛時須使人縱牧於其間令稍實則其收倍多麥屬陽故宜乾原稻屬隂故宜水澤士農必用相傳農語云彭祖夀年八百不可忘了植蠶植麥又云社後種麥爭回耬又云社前種麥爭回牛言奪時之急如此之甚也原種塌麥法天生意六月初旬五更時乘露未乾陽氣在下耕地牛得其涼耕過稀種菉豆候七月間豆有花犁翻豆秧入地麥苖易茂護麥農桑撮要防露傷麥但有沙霧將檾麻散拴長繩上侵晨令兩人對持其繩於麥上牽拽抹去沙霧則不傷麥刈麥農政全書凡農家所種宿麥早熟最宜早收故韓氏直説云五六月麥熟𢃄青收一半合熟收一半若候齊熟恐被暴風急雨所摧必至拋費每日至晚即便載麥上場堆積用苫密覆以防雨作如搬載不及即於地內苫積天晴乘夜載上場即攤一二車薄則易乾碾後一遍翻過又碾一遍起秸下場揚子收起雖未淨直待所收麥都碾盡然後將未淨秸稗再碾如此可一日一場比至麥收盡已碾訖三之一矣大抵農家之忙無似蠶麥古語云收麥如救火增齊民要術麥倒刈薄布順風放火火既著即以掃帚撲滅仍打之如此者夏蟲不生原貯麥太平御覽麥之為蝶繇濕也萬物之變皆有化也止麥之化區之以灰法於伏天曬極乾乘熱覆以石灰則不生蟲又以蠶沙和之辟蠧蒼耳或艾曝乾銼碎同收亦不蛀若稍濕必生蟲增齊民要術立秋前治訖蒿艾簟盛之良以蒿艾閉窖埋之亦佳窖麥法必須日曝令乾及熱埋之多種久居供食者宜作劁清異録積麥以十辛良下子不得過三辛收潑不得過三辛上場入倉亦用辛日農家諺雲行北好曬麥瑞麥原説文天降瑞麥一來二牟彚考原後漢書張堪傳堪拜漁陽太守百姓歌曰桑無附枝麥秀兩岐張公為政樂不可支增舊唐書玄宗夲紀天寶三載三月武威郡上言番禾縣天寶山有醴泉湧出嶺石化為瑞牟逺近貧乏者取以給食改番禾為天寶縣宋書符瑞志晉武帝太康十年六月嘉麥生扶風郡一莖九穗是嵗收三倍北齊書孟業傳業遷東郡守以寬惠著其年麥一莖五穗其餘三穗四穗共一莖合郡人以為政化所感宋史樂志端拱初諸州麥兩穗三穗者連嵗來上有司請以為瑞麥之曲薦於朝會用之五行志皇祐三年五月彭山縣上瑞麥圖凡一莖五穗者數夲帝曰朕嘗禁四方獻瑞今得西川秀麥圖可謂真瑞矣其賜田夫束帛以勸之遼史聖宗本紀統和二十年十二月南京平州麥秀兩岐金史五行志宣宗興定元年四月陳州商水縣進瑞麥一莖四穗開封府進瑞麥一莖三穗二莖四穗原前涼録永嘉三年嘉麥一莖九穗生於姑臧增孔帖梁宋州節度使友諒進瑞麥一莖三穗太祖怒曰宋州大水何用此為原西安志宣德中嘉麥生茂陵一莖九穗新城志天啓四年嘉麥生王氏田中一莖五穗集藻表增唐崔融為皇太子賀嘉麥表伏見雍州司馬徐慶稱所部有嘉麥一莖六穗纎芒濯露疑因黑壤之宜香稼搖風若吐黃金之色豈非靈心昭應睿德感通降之自天何必來牟之詠嘗之於廟先符孟夏之時凡在含生相趨動色臣謬當居守肅奉宗祧一穗兩岐徒説張君之詠十畝千石方輕汜氏之書仰天意而增歡顧人心而載躍無任嘉忭之至狀增宋秦觀代蔡州進麥瑞圖狀勘會夲州自春已來屢得雨澤已於某月日具狀奏聞訖今來二麥並已成熟地無髙下所收斗斛數倍當年及諸縣節次申送致麥苖有一莖二穗或三穗其多有至五穗者甚多父老等皆云數十年無此豐熟亦未嘗見有麥苖一莖至數穗者以此見臨御以來功化日新利興害去善氣充塞致此嘉應臣待罪郡守目睹其事不敢隱默謹畫成圖子一夲隨狀上進以聞頌增明李東陽瑞麥頌並序瑞麥頌豐年也和氣旁逹嘉麥效祥頌聲作焉以麥上德昭農事也維田有麥載被其隴既堅既實岐岐總總我場我隴其積如踊皇德斯播於植於動維此瑞麥曰帝之寵維麥在田載耕載􅵲胝我手足劬我耜銚以夕以朝中心孔怊載抃而謳於嵗之秋曰兹豐年維我民勞天監帝德亦念民阻噓以和風渥以甘雨貽我嘉麥及我榖黍維年之祥祈不我拒以遍率土於天之下於天之下永荷皇嘏賦增唐任瑗瑞麥賦建極惟皇昭鑠於光出豫考卜乘時省方西自酆鎬東巡洛陽順天遊而有慶緬日晷之云長徴賢宣室布政明堂風雨時序黎庶其康盡物稱瑞窮靈委祥明含日月則階蓂恆秀澤及草木而隴麥登芳於是闢離宫通禁苑覩兹瑞之所應實皇恩之燭逺朝任得人時唯賢相九流分職三旗協亮稱堯舜之允敷同益贊而為唱曰珍瑞麥生我皇國凌寒而秀彰聖之德願載東觀之書以歌南薰之則既而帝曰欽哉天符聿來俾豫光於四表惟爾翼於中台念幽芳之遂性知棫朴之當材且夫麥之為瑞其德至矣居寒自生當暑薦美含實珠淨耀芒鋒起既標詠於詩人亦稱竒於縑史當其芃芃於野漸漸其秀將嗣榖以登年豈凌霜而不茂在昔唐叔嘉禾伊育昭彼周王天人斯穆今惟聖帝此焉攸淑涵之如春也及晝而繁榮就之如日也來牟而紛郁則有小儒怡然鼓腹照水鏡之光鑒參厯選之題目未登髙而賦成庶陳美於金竹者也髙敡庭瑞麥賦聖人順動文思欽明天地貞觀品物咸亨去憑虛而就安處面周洛而背咸京雲旗電發霜戟林行太隂用事其日在斗萬國來庭百神奔走泉潛動而荄落水益壯而氷厚冠異氣於繚垣吐嘉牟於寒藪不忌風雪全抽兩穗逼日月之光華得雲雨之攸利芒纎纎而擢隴葉青青而聳翠同黍谷之移暄類榆林之因地瑞紀增焕嘉禾異植出天苑之稱竒訪人寰而未識凌玉霜而表徑挺金莖而孤植顧耀穎於年和望生成於地力倬彼藩翰其代天工即漢庭之相國類晉室之清通拜殊祥而北首列圖史於南宫紆粹容於有穆冠鴻業而無窮實穎實栗是崇是奉可以為瑚璉之資可以為穜稑之種偉長至之馭序同少陽之在候成粒貴於鳥銜覆苗期於雉雊夫瑞也百王之珍事其生也二儀之大德道泰則稱物呈形政乖則羣方皆忒伊小草之何幸逢大人之允塞願均照於離明祈作禎於王國樂章增宋史朝會樂章芃芃嘉麥擢秀分岐甘露夕灑惠風晨吹良農告瑞循吏稱竒歸美英主折而貢之七言律詩增范成大次韻袁起巖瑞麥此麥兩岐已黃熟其間又出一青枝亦已秀實傳記所未載也民和神福固其宜况有仁先四者施吳稻即看收再熟周牟先已秀雙岐薰風半老黃金穗梅雨重春緑玉枝樂不可支聊發詠田間日日是芳時五言排律原唐鄭畋詠麥穗兩岐聖慮憂千畝嘉苖薦兩岐如雲方表盛成穗忽標竒瑞露縱橫滴祥風左右吹謳謡連上苑化日遍平陂史册書堪重丹青畫更宜願依連理樹俱作萬年枝張聿詠瑞麥瑞麥生堯日芃芃雨露偏兩岐分更合異畝穎仍連冀獲明王慶寧惟太守賢仁風吹靡靡甘雨長芊芊聖德應多稔皇家配有年已聞天下泰誰為濟西田詩散句增宋夏竦似法隂爻呈六穗或符陽數效三岐唐李嶠瑞麥兩岐秀白居易岐秀麥分花雀麥增爾雅蘥雀麥注即燕麥也本草雀麥一名杜姥草一名牛星草李時珍曰此野麥也燕雀所食故名日華夲草謂此為瞿麥非矣蘇恭曰在處有之生故墟野林下苗葉似小麥而弱其實似穬麥而細周憲王曰燕麥穗極細每穗又分小又十數個子亦細小彚考增唐書劉禹錫傳禹錫由和州刺史入為主客郎中復作遊玄都觀詩且言始謫十年還京師道士植桃其盛若霞又十四年過之無復一存唯兔葵燕麥動搖春風耳以詆權近博物志食燕麥令人骨節斷解丹鉛録范文正公安撫江淮進民間所食烏昧草乞宣示六宫傳諸戚里以抑奢侈烏昧草即今之野燕麥淮南謂麥曰昧故史從音為文燕麥滇南霑益一路有之土人以為朝夕常食非虛名也蕎麥原蕎麥一名荍麥一名烏麥一名花蕎莖弱而翹然易長易收磨麵如麥故曰蕎曰荍而與麥同名也俗亦呼甜蕎以别䒷蕎南北皆有之立秋前後下種密種則實多稀則少八九月熟性最畏霜宜早種遲則少收苖髙一二尺莖空而赤葉緑如烏臼樹葉開小白花甚繁密花落結實三稜嫩青老則烏黑性甘寒無毒降氣寬中氣盛有濕熱者宜之若脾胃虛弱者不宜多食難消煮熟日中曝開口舂取米可作飯磨為麵滑膩亞於麥麵北人作煎餅及餅餌日用以供常食農人以為禦冬之具南人但作粉餌食和豬羊肉熱食不過十餘頓即患熱風忌同黃魚食彚考增宋史禮志太宗景祐三年禮官宗正請每嵗秋季月嘗豆嘗蕎麥後山談叢穎諺曰黃􅀈口噤蕎麥斗夏中候黃􅀈不鳴則蕎麥可廣種也水南翰記蕎麥字韻書無之道藏有藥石爾雅唐元和間梅彪所集諸藥隱名以粟黍蕎麥豆為五弟髙昌行紀髙昌地産五榖惟無蕎麥集藻七言古詩增宋陸遊蕎麥熟刈者滿野喜而有作城南城北如鋪雪原頭家家種蕎麥霜晴收斂少在家餅餌今冬不憂窄胡麻壓油油更香油新餅美爭先嘗獵歸熾火燎雉兔相呼置酒喜欲狂陌上行歌忘惡嵗小婦紅妝穗簪髻詔書寬大與天通逐熟淮南幾誤計詩散句增唐溫庭筠日暮鳥飛散滿山蕎麥花宋戴敏頗動詩人興滿園蕎麥花唐白居易獨出門前望野田月明蕎麥花如雪宋范成大落日青山都好在山間蕎麥滿芳洲陸遊􅘹熟山僧分餺飥船來溪友餉薪樗唐白居易蕎麥鋪花白宋韓琦雲鋪蕎麥花漫野陸遊滿村蕎麥正離離暖日暉暉秀蕎麥未收蕎麥怯新霜金王良臣蕎花冉冉蜜脾香元貢奎路轉滿川蕎麥花别録增齊民要術凡蕎麥五月耕經三十五日草爛得轉并種耕三遍立秋前後皆十日內種之耕地三遍即三重著子下兩重子黑上一重子白皆是白汁滿飽如濃即須收刈之但對稍搭鋪之其白者日漸盡變為黑如待上頭總黑半已下黑子盡落矣附録苦蕎麥原苦蕎麥出南方春社前後種之莖青多枝葉似蕎麥而尖花𢃄緑色實亦似蕎麥而稜角不峭味苦磨為粉蒸使氣饀滴去黃汁乃可為糕餌色如豬肝榖之下品瞿麥增爾雅大菊蘧麥注一名麥句薑即瞿麥廣雅茈萎麥句薑蘧麥本草瞿麥一名巨句麥一名大蘭一名地麵陶𢎞景云今出近道一莖生細葉花紅紫赤可愛子頗似麥故名瞿麥别録增齊民要術種瞿麥法以伏為時一名地麵良地一畝用子五升薄田三四升畝收十石渾蒸曝乾舂去皮米全不碎炊作餐甚滑細磨下絹篩作餅亦滑美然為性多穢一種此物數年不絶耘鋤之功更益劬勞御定佩文齋廣羣芳譜卷七
