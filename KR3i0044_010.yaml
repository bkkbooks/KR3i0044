body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜巻八榖譜稻原稻一名稌有稉與秔同有穤與稬同爾雅云稌稻註云今沛國呼稌疏云案説文云沛國謂稻為糯秔稻屬也字林云穤黏稻也秔稻不黏者夲草以稉米稻米為二物秔古稉字然秔穤甚相類黏不黏為異耳夲草云黏者為穤不黏者為稉穤者懦也稉者硬也又云稻稌者秔穤之通稱夲草則專指糯以為稻也其性黏軟故謂之穤堪作飯作粥南方以為常食北方以為佳品禮記祭宗廟之禮謂稻為嘉蔬周禮地官有稻人漢有稻田使者盖通稉糯而言也稉之熟也晚謂之晚稻稉之小者謂之秈秈熟早謂之早稻有早中晚三熟水旱二類南方土下泥塗多宜水稻北方地平惟澤土宜旱稻種類甚多増本草孟詵曰淮泗之間㝡多襄洛土稉米亦堅實而香南方多收火稻李時珍曰西南夷有燒山地為畬田種旱稻者謂之火米真臘有水稻髙丈許隨水而長原其榖之紅白大小不同芒之有無長短不同米之堅鬆赤白紫烏不同味之香否軟硬不同性之温涼寒熱不同大要北粳涼南粳温赤粳熱白粳涼晚白粳寒新粳熱陳粳涼葉與梗似小麥穗似大麥稃與實不相黏温中益氣止煩渴和腸胃合芡實作粥益精強志聰耳明目其類為香􅀈一名香子粒小色斑以三五十粒入他米數升炊之芬芳香羙小香稻赤芒白粒其色如玉食之香美凡享奠延賔以為上品出閩中雪裏揀粒大色白稈軟而有芒三穗子一穗三百餘粒出湖州箭子粒細長而白味甘香九月熟稻之上品臙脂赤香柔而甘舂煮之作純赤色晚稻上品有一種性不畏鹵可當鹹湖近海口之田不得不種蓋下白正月種五月刈其莖根復生九月再熟理生玉鏡云一名再熟稻又謂之再撩麥爭塲三月種六月熟此種早熟農人甚賴其利食新者爭市之價倍貴青芋稻六月熟累子稻白漠稻七月熟此三種出益州大而長米半寸亦嘉種也木香秔粒小而性柔七月熟有紅芒白芒之等虎掌稻赤穬稻蟬鳴稻俱七月熟早白稻一名小白一名細白粒赤而稃芒白五月初種八月熟九月熟者謂之晚白一名蘆花白一名大白中秋稻粒白而大四月種八月熟八月望熟者謂之早中秋又謂之閃西風一丈紅五月種八月收能水水深三四尺漫撒之能抽芽出水勝紅蓮粒長色斑擺栁稻性硬皮莖俱白紫芒稻粒白殻紫紅蓮粒大芒紅皮赤三朝齊一名下馬看秀㝡易矮白又名師姑粒白無芒稈矮俱五月種九月熟摭稻春種夏穫七月再插十月熟金城種粒尖色紅而性硬四月種七月熟髙仰所種松江謂之赤米下品也烏口稻一名冷水結再蒔而晚熟色黒而耐水與寒稻之下品他如黄稻黄陸稻豫章青赤芒白米青甲等稻未可枚舉増本草秈稻一名占稻種出占城國故名似稉而粒小各處有之品類亦多有赤白二色與稉大同小異理生玉鏡自占城来作飯差硬宋氏使占城珍寳易之以給於民者六旬稻一名拖犂歸粒小色白四月種六月熟又有八十日稻百日赤毘陵亦有六十日秈八十日秈百日秈之品百日赤百日秈俱白稃而無芒七八月熟其味白淡而紅甘烏秈粒大而芒長秸柔而韌可織履飯之香美浙中以供賔客及老疾孕婦三月種七月收其田以蒔晚稻可再熟廣志稉有烏稉黒穬青幽白夏之名齊民要術案今世有尾紫稻青杖稻飛青稻赤甲稻烏陵稻白地稻孤灰稻原糯稻一名秫稻苖葉莖穗與粳稻同増本草宋馬志曰秫稻米即糯米也其粒大小似秔米宋宼宗奭曰今造酒糯米也其性温故可為酒明李時珍曰南方水田多種之其性黏榖殻有紅白二色或有毛或無毛米亦有赤白二色原米可炒食可釀酒可熬餳可作粢可煮糕可蒸糕水稻赤色者酒多糟少一種粒白如霜長三四分性黏滯難化多食令人身軟擁諸經絡氣發癰疽瘡癤中痛合酒食醉難醒小兒及病人㝡忌孕婦雜肉食之令子不利小猫犬食之脚屈不能行馬食之足重其類為蘆黄糯一名泥裏變言不待日曬也粒大色白芒長熟㝡早其色易變釀酒㝡佳金釵糯粒長而釀酒倍多烏香糯色烏氣香秈糯一名趕陳糯一名趕不著粒㝡長白稃有芒四月種七月熟小娘糯不耐風水四月種八月熟青稈糯稃黄芒赤已熟而桿㣲青㝡宜良田四月種九月熟矮糯一名矮兒糯尖大而色白四月種九月熟硃砂糯一名臙脂糯芒長而榖多白斑五月種九月熟羊脂糯色白性軟五月種十月熟虎皮糯白斑五月種十月熟鐵梗糯稈挺而堅馬騌糯芒如馬騌色赤秋風糯一名瞞官糯一名冷粒糯粒圓白而稃黄大暑可刈易種多收農人喜種之飯則糯釀則粳糶則減價多以代粳輸租増齊民要術秫稻有九格秫雉木秫大黄秫常秫馬身秫長江秫惠成秫黄滿秫方滿秫虎皮秫薈奈秫彚考原詩豳風十月穫稻増周頌豐年多黍多稌傳稌稻也禮記王制冬薦稻月令季秋之月天子乃以犬甞稻先薦寢廟周禮地官稻人掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮瀉水以涉揚其芟作田凡稼澤夏以水殄草而芟荑之澤草所生種之芒種旱暵共其雩歛註澤草之所生其地可種芒種芒種稻麥也稻人共雩歛稻急水者也疏以下田種稻麥故曰稼下地但水鍾曰澤有水及鹹鹵皆不生草即不得芒種故曰草所生餘官不言共雩歛于此官特言共者以稻是水榖急須水故旱時特使共雩之發歛也夏官東南曰揚州其榖宜稻正南曰荆州其榖宜稻左傳鄅人藉稻註其君自出藉稻蓋履行之疏服䖍云藉耕種於藉田也戰國䇿東周欲為稻西周不下水東周患之蘇子謂東周君曰臣請使西周下水可乎乃徃見西周之君曰君之謀過矣今不下水所以富東周也今其民皆種麥無他種矣君若欲害之不若一為下水以病其所種下水東周必復種稻種稻而復奪之若是則東周之民可令一仰西周而受命於君矣西周君曰善史記夏本紀令益與衆庶稻可種卑濕後漢書郡國志廣陵郡有長洲澤吴王濞太倉在此注縣多麋博物記曰千百為羣掘食草根其處成泥名曰麋畯民人随此畯種稻不耕而穫其收百倍張堪傳堪拜漁陽太守開稻田八千餘頃勸民耕種以致殷富魏志夏侯惇傳惇復領陳留濟隂太守時大旱蝗蟲起惇乃斷太夀水作陂身自負土率將士勸種稻民頼其利呉志鍾離牧傳牧少居永興躬自墾田種稻二十餘畝臨熟縣民有識認之牧曰夲以田荒故墾之爾遂以稻與縣人縣長聞之召民繫獄欲䋲以法牧為之請長曰君慕承宫自行義事僕為民主當以法率下何得寢公憲而從君耶牧曰此是郡界縁君意顧故来蹔住今以少稻而殺此民何心復留遂出裝還山隂長自往止之為釋繫民民慙懼率妻子舂取稻得六十斛米送還牧牧閉門不受民輸置道旁莫有取者牧由此發名晉書陶侃傳侃甞出遊見人持一把未熟稻侃問用此何為人云行道所見聊取之爾侃大怒曰汝既不佃而戲賊人稻執而鞭之是以百姓勸於農殖家給人足原晉書孝友傳孫晷吳國富春人年饑榖貴人有生刈其稻者晷見而避之須去而出既而自刈送與之隐逸傳郭翻居貧無業欲墾荒田先立表題經年無主然後乃作稻將熟有認之者悉推與之縣令聞而詰之以稻還翻翻遂不受増晉書藝術傳幸靈者豫章建昌人父母常使守稻羣牛食之靈見而不驅待牛去乃往理其殘亂者其父母見而怒之靈曰夫萬物生天地之間各欲得食牛方食奈何驅之父愈怒曰即如汝言復用理壊者何為靈曰此稻又欲得終其性南齊書孔琇之傳琇之補吳令有小兒年十嵗偷刈鄰家稻一束琇之付獄治罪或諌之琇之曰十嵗便能為盗長大何所不為縣中皆震肅南史范雲傳文惠太子甞幸東田觀穫稻雲時從文惠顧雲曰此刈甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之宴逸也陳伯之傳伯之年十三四好著獺皮冠𢃄刺刀候鄰里稻熟輙偷刈之常為田主所見呵之曰楚子莫動伯之曰君稻幸多取一擔何苦田主收執之因拔刀而進曰楚子定何如田主皆反走徐擔稻而歸原南史隐逸傳晉陶潛為彭澤令公田悉令種秫稻妻子固請種粳乃使二百五十畝種秫五十畝種粳顧歡家貧父使田中驅雀歡作黄雀賦而歸雀食稻過半父怒欲撻之見賦乃止増新唐書郭元振傳元振為涼州都督遣甘州刺史李漢通闢屯田盡水陸之利稻收豐衍于頔傳頔為湖州刺史部有湖陂異時溉田三千頃久廞廢頔行縣命修復隄閼嵗獲秔稻蒲魚無慮萬計李百藥傳百藥七嵗能屬文父友陸乂等共讀徐陵文有刈琅邪之稻之語歎不得其事百藥進曰春秋鄅子藉稻杜預謂在琅邪客大驚號竒童南蠻傳環王稻嵗再熟牂牁無城郭土熱多霖雨稻粟再熟堕婆登在環王南種稻月一熟宋史仁宗本紀慶厯四年五月幸玉津園觀種稻禮志紹興七年七月張浚等言雨澤稍愆乞禱上曰朕患不知四方水旱之實宫中種稻两區其一地下其一地髙髙者其苗有槁意矣須精加祈禱以救旱暵景徳四年十月二十九日詔皇太子宗室近臣諸帥赴玉宸殿翠芳亭觀稻賜宴仍以稻分賜之食貨志言者謂江北之民雜植諸榖江南専種秔稻雖土風各有所宜至於参植以防水旱亦古之制於是詔江南两浙荆湖嶺南福建諸州長吏勸民益種諸榖江北諸州亦令就水廣種秔稻並免其租江南两浙荆湖嶺南福建土多秔稻湏霜降成實自十月一日始收租大中祥符四年帝以江淮两淛稍旱即水田不登遣使就福建取占城稻三萬斛分給三路為種擇民田髙仰者蒔之蓋旱稻也内出種法命轉運使揭榜示民後又種於玉宸殿帝與近臣同觀畢刈又遣内使持於朝堂示百官稻比中國者穗長而無芒粒差小不擇地而生山海經箕尾之山其神狀皆鳥身而龍首其祀之禮糈用稌米註稌稌稻也廣漠之都后稷葬焉爰有膏稻註言味好滑如膏淮南子江水肥仁而宜稻稻生於水而不能生於湍瀨之流伏䖍古今注惠帝三年桂宫陽翟俱雨稻米春秋説題辭稻之為言藉也稻冬含水盛其德也故稻太隂精含水漸洳乃能化也江旁多稻固其宜也原孝經援神契汙田宜稻蔡邕月令十月穫稻人君甞其先熟故在季秋九月熟者謂之半夏稻増括地志自崑崙山以南多是平地而下濕土肥良多種稻嵗四熟留役駞馬米粒亦極大㑹稽典録夏香有盗刈稻者香助收之盗慙送以還香香不受博物志下泉宜稻華陽國志江州縣北有稻田出御米風土記稴稻之青穟米皆青白也原抱朴子南海晉安有九熟之稻増拾遺記樂浪之東有背明之國在扶桑之東見日出於西方其國昏昏常暗宜種百榖名曰融澤方三千里五榖皆良食之後天而老有浹日之稻種之十旬而熟有翻形稻言食者没而更生夭而有夀有明清稻食者延年也清腸稻食一粒厯年不饑原異物志交趾稻夏熟農者一嵗再種安成記安成郡毛亭田疇膏腴厥稻馨香飯若凝脂淵明别傳淵明甞聞田水聲倚杖久聼歎曰秫稻已秀翠色染人時剖胸襟一洗荆棘此水過吾師丈人矣増世説簡文見田稻不識問是何草左右荅是稻簡文還三日不出云寧有頼其末而不識其夲水經注九真太守任延始教耕犂俗化交土風行象林知耕以来六百餘年火耕水耨法與華同名白田種白榖七月大作十月登熟名赤田種赤榖十二月作四月登熟所謂两熟之稻也述異記大禹時天雨稻古詩云安得天雨稻飼我天下民廣雅稻穗謂之禾稻已割而復抽曰稻孫原西域記天竺國土溽熱稻嵗四熟摩揭陀有異稻巨粒號供大人米増唐厯開元十九年揚州奏穭生稻二百一十五頃再熟稻一千八百頃其粒與常稻無異酉陽雜俎酆都稻名重思其米如石榴子粒稍大味如菱杜瓊作重思賦曰霏霏春暮翠矣重思雲氣交被嘉榖應時原偽越外紀稻一年再熟今浙江温州稻一嵗两種廣東又有三種田地氣暖故也續仙傳唐謝𤣥卿遇神仙設龍睛稻増東坡雜記黎子雲言海南秫稻率三五嵗一變頃嵗儋人㝡重鐵脚糯今嵗乃變為馬眼糯草木性理有不可知者中呉紀聞紅蓮早稻自古有之陸魯望詩云遙為曉風吟白菊近炊早稻識紅蓮三桞軒雜識五榖以稻為貴古人各以其類配之如以殺雞配為黍謂野人之餐也以啜菽配飲水謂貧者之孝也以蔬食對菜羮謂貶降之食也惟食稻則對衣錦又祭祀以稻為嘉蔬公享大夫則以為吉饎是五榖以稻為貴也椒宫舊事成穆貴妃孫氏参政孫英之妹甞與上登香雲閣觀後苑刈稻上命宫人取酒来為賞豐飲令妃誦詩侑酒妃為歌李紳憫農詩上大悦賜予有加戒菴漫筆稻花白而瓣少者米賤多而色黄則貴俗云銀花賤金花貴也奎瀛勝覽舊港土沃人稠地宜稼穡諺云一季種田三季收稻言收穫廣也海槎餘録黎俗四五月必集衆斫山木縱火燒盡土下尺餘亦且熱透徐徐鋤轉種旱稻曰山禾米粒大而香可食連收三四熟湧幢小品暹羅國稻其粒盈寸燕山叢録房山縣有石窩稻色白味香羙以為飯雖盛暑經數宿不餲原一統志雷陽界稻十一月下種揚雪耕耘次年四月熟與他地迥異稻花午開暮合開合皆於日中香甚有至七開七合者集藻啓増梁庾肩吾荅湘東王賚稉米啓竊以農夫力耕時逢儉嵗疎賤時澤必取豐年㭬斛瀉珠嘉聞陶量翻庭委玉欣見馬圖又出梁國之闕一字租兼水陸之殊品伊尹説而不至石崇豪所未及遇處黙之得賔同苻朗之舉箸長河可塞上徳無酬又味重新城香踰澇水連舟入浦似彦伯之南歸積地為山疑馬援之西至不待候沙同新渝之再熟無勞拜石均遼倉之重滿前恩未逺次渥仍流墨翟假以故書裴楷慙其國賜謝東宫賚稉米啓􅓳水鳴蟬香聞七里瓊山合穎租歸十縣肩吾人慙振藻徒降人間之松職濫更繁空撤家丞之俸成珠委地事重逢仙游玉為糧珍踰入楚雖復激水滄流不待監河之説春風掃地方誚文學之篇書増魏文帝與朝臣論秔稻書江表惟長沙名有好米何得比新城秔稻耶上風吹之五里聞香宋蘇軾與弟子由書或為予言草木之長常在昧明間早起伺之乃見其拔起數寸竹筍尤甚夏秋之交稻方含秀黄昏月出露珠起於其根纍纍然忽自騰上若推之者或綴於莖心或綴於葉端稻乃秀實驗之信然此二事與子由養生之説契故以此為寄贊增晉湛方生庭前植稻苗贊蒨蒨嘉苖離離階側弱葉繁蔚圓株疎植清流津根輕露濯色文賦散句増漢張衡南都賦若其厨膳則有華薌重秬􅓳臯香秔鄭𤣥婚禮謁文秔稻馥芬婚禮之珍袁淮觀殊俗河内青稉新成白稉晉左思吴都賦國税再熟之稻宋蘇軾與李公擇書軾見在東坡作陂種稻勞苦之中亦自有樂事五言古詩御製秋日出郊觀稼秋氣日寥迥萬象皆蒼蒼朝暾被渥露草木含晶光西成方届候農事將築塲於焉省歛穫令典重百王輕軒屏前置夙駕無嚴裝郊原一以眺煙樹紛成行微風散深樾清流抱迴塘土脈秀且沃篝車鬱相望新䥥粲如月刈此溪雲黄捃拾復何幸遺秉滿道旁鳥雀互翔集婦子咸悦康行將吹葦籥報爾千斯箱眷言三時勤艱難詎可忘茫茫視九壤豈盡歌豐穰二鬴茍不充予飢惄如傷幸兹樂有年時若雨與暘朂哉慎所麗田功庶無荒増晉陶潛庚戌歲九月中于西田穫稻人生歸有道衣食固其端熟是都不營而以求自安開春理常業嵗功聊可觀晨出肆微勤日入負禾還山中饒霜露風氣亦先寒田家豈不苦弗獲辭此難四體誠乃疲庶無異患干盥濯息簷下斗酒散襟顔遙遙沮溺心千載乃相關但願常如此躬耕非所歎原唐杜甫行官張望補稻畦水歸東屯大江北百頃平若桉六月青稻多千畦碧泉亂插秧適云已引溜加溉灌更僕徃方塘决渠當斷岸公私各地著浸潤無天旱主守問家臣分明見溪伴芊芊炯翠羽剡剡生銀漢鷗鳥鏡裏来關山雪邊㸔秋菰成黒米精鑿傳白粲玉粒足晨炊紅鮮任霞散終然添旅食作苦期壯觀遺穗及衆多我倉戒滋蔓秋行官張望督促東渚刈稻向畢清晨遣女奴阿稽竪子阿叚徃問東渚雨今足佇聞稉稻香上天無偏頗蒲稗各自長人情見非類田家戒其荒功夫競搰搰除草置岸傍榖者命之夲客居安可忘青春具所務勤墾免亂常吳牛力容易並驅動莫當豐苖亦已穊雲水照方塘有生固蔓延靜一資隄防督領不無人提攜頗在綱荆揚風土暖肅肅候微霜尚恐主守疎用心未甚臧清朝遣婢僕寄語踰崇岡西成聚必散不獨陵我倉豈要仁里譽感此時世忙北風吹蒹葭蟋蟀近中堂荏苒百工休鬱紆遲暮傷增李覯穫稻朝陽過山来下田猶露濕餉婦念兒啼逢人不敢立青黄先後收斷折傴僂拾鳥䑕盈官倉新租喜復入陸游稻陂白水滿稻陂投種未三宿新秧出水面已作纎纎綠年来殘俸絶所望在一熟見之喜欲舞不復憂半菽想當西成時載重壓車軸病齒幸已勞往矣分社肉代鄉鄰作插秧歌浸種二月初挿秧四月中小舟載秧把往来疾于鴻吳鹽雪花白村酒粥面濃長歌相贈荅宛轉含豳風日暮飛漿歸小市鼓鼕鼕起居問尊老勤儉教兒童何人采此語為我告相公不必賜民租但願年屢豐元趙孟頫題耕圖正月田家重元日置酒會鄰里小大易新衣相戒未明起老翁年已邁含笑弄孫子老嫗惠且慈白髪被兩耳杯盤且羅列飲食致甘㫖相呼團欒坐聊慰衰莫齒田磽藉人力糞壤要鋤理新嵗不敢閑農事自兹始二月東風吹原野地凍亦已消早覺農事動荷鋤過相招遲遲朝日上炊煙出林梢土膏脈既起良耜利若刀髙低徧翻墾宿草不待燒幼婦頗能家井臼常自操散灰緣舊俗門逕環周遭所冀嵗有成殷勤在今朝三月良農知土性肥瘠有不同時至萬物生芽蘖由地中秉耒向畎畝忽徧西與東舉家往于田勞瘁在爾農春雨及時降被野何濛濛乗兹各布種庶望西成功培根利秋實仰天望年豐但使隂陽和自然倉廩充四月孟夏土加潤苖生無近逺漫漫冐淺陂芃芃被長阪嘉榖雖已殖惡草亦滋蔓君子與小人並處必為患朝朝荷鋤往薅耨忘疲倦旦随鳥雀起歸與牛羊晚有婦念將飢過午可無飯一飽不易得念此獨長歎五月仲夏苦雨乾二麥先後熟南風吹隴畝惠氣散清淑是為農夫慶所望實其腹酤酒醉比鄰笑語聲滿屋紛然收穫罷髙廩起相屬有周成王業后稷播百榖皇天貽来牟長世自兹卜願言仍嵗稔四海盡䝉福六月當暑耘水田農夫亦良苦赤日背欲裂白汗灑如雨匍匐行水中泥淖及腰膂新苗抽利劍割膚何痛楚夫耘婦當饁奔走及亭午無時暫休息不得避炎暑誰憐萬民食粒粒非易取願陳知稼穡無逸傳自古七月大火既西流凉風日凄厲古人重稼穡力田在匪懈郊行省農事禾黍何斾斾碾以他山石玉粒使人愛大祀湏粢盛一一稽古制是為五榖長異彼稊與稗炊之香且羙可用享上帝豈惟足食人一飽有所待八月白露下百草莖葉日紛委是時禾黍登充積徧都鄙在郊既千庾入邑復萬軌人言田家樂此樂誰可比租賦以輸官所餘足儲峙不然風雪至凍餒及妻子優游茅簷下庶可以卒嵗太平元有象治世乃如此九月大家饒米麫何啻百室盈縱復人力多舂磨常不停激水轉大輪磑碾亦易成古人有機智用之可厚生朝出連百車莫入還滿庭勾稽數多寡必假布算精小人好争利晝夜心營營君子貴知足知足萬慮輕十月孟冬農事畢榖粟既已蔵彌望四野空藳秸亦在塲朝廷政方理庶事和隂陽所以頻嵗登不憂旱與蝗置酒燕鄉里尊老列上行肴羞不厭多炰羔復烹羊縱酒窮日夕為樂殊未央禱天祝聖人萬年長夀昌十一月農家值豐年樂事日熙熙黒黍可釀酒在牢羊豕肥東鄰有一女西鄰有一兒兒年十五六女大亦可笄財禮不求備多少取随宜冬前與冬後昏嫁利此時但願子孫多門户可扶持女當力蠶桑男當力耘耔十二月一日不力作一日食不足惨淡嵗云莫風雪入破屋老農氣力衰傴僂腰背曲索綯民事急晝夜互相續飯牛欲牛肥茭藳亦預蓄蹇驢雖力弱挽車致百斛農家極勞苦嵗豈恒稔熟能知稼穡艱天下自䝉福明高啓看刈禾農工亦云勞此日始告成往穫安可後相催及秋晴父子俱在田札札䥥有聲黄雲漸收盡曠望空郊平日入負擔歸謳歌道中行鳥雀亦羣喜下啄飛且鳴今年幸稍豐私廩各已盈如何有貧婦拾穗猶􅑏􅑏京師嘗吴稉新秔粲如玊逺漕来中吳初甞愛精鑿想出官田租我夲東臯民少年習耕鋤霜天萬穗熟恣啄從飢烏日暮刈穫歸妻孥共歡呼茅屋夜舂急風雨江村孤晨炊滿家香薦以出網鱸如今幸䝉恩遨遊在南都門前半區田别来想已蕪長年盜寸廩補報一事無投匕忽歎息飽食慙農夫七言古詩增唐張籍江村行南塘水深蘆筍齊下田種稻不作畦耕塲磷磷在水底短衣半染蘆中泥田頭刈莎結為屋歸来繫牛還獨宿水淹手足盡為瘡山䖟繞衣飛撲撲桑村椹黒蠶再眠小姑採桑不餉田江南熱旱天氣毒雨中移秧顔色鮮一年耕種長苦辛田熟家家將賽神宋陸游農家秋晩戲詠鞭地如鏡築我塲破礱玉粒輸官倉九月野空天欲霜甑中初喜新稉香舍邊蕭蕭落葉多野蠶出繭飛黄蛾寒蔬種罷醉且歌隻雞短紙賽園婆楊萬里插秧歌田夫抛秧田婦接小兒拔秧大兒插笠是兜鍪蓑是甲雨從頭上濕到胛喚渠朝餐歇半霎低頭折腰只不荅秧根未牢蒔未匝照管鵞兒與雛鴨五言律詩御製觀苗無意到潭柘詠時景晝永薫風至清泉決決長芳年添景色遲日換流光舊竹随隄發新花滿澗香觀苖不覺晚㣲雨㸃衣裳原唐杜甫茅堂檢校收稻二首香稻三秋末平田百頃間喜無多屋宇幸不礙雲山御裌侵寒氣甞新破旅顔紅鮮終日有玊粒未吾慳稻米炊能白秋葵煮復新誰云滑易飽老藉軟俱匀種幸房州熟苖同伊闕春無勞映渠盎自有色如銀蹔往白帝復還東屯復作歸田去猶殘穫稻功築塲憐穴蟻拾穗許村童落杵光輝白除芒子粒紅加餐可扶老倉庾慰飄蓬宋陸游統分稻晚歸出裹一簞飯歸收百把禾勤勞解堪忍餘暇更吟哦嵗惡増吾困家貧賴汝多村醪莫辭醉羮芋學岷峨眀石沆觀稻稻水千區暎村煙㡬處斜冷風低樹起輕浪細浮花鳥雀深深圃鳬鷖淺淺沙社歌聲不絶於此見年華七言律詩御製入關見雨膏潤澤禾苗茂遂喜而有作甘雨時霖為洗兵恰逢戰勝武功成軍容萬隊初旋凱婦子千村正饁耕天意要荒同職貢人歡閭井共昇平征途每憶民生事喜見桑麻惬此情増唐唐彦謙西眀寺威公盆池新稻為笑江南種稻時露蟬鳴後雨霏霏蓮盆積潤分畦小藻井垂隂擢秀稀得地又生金粟界結根仍對水田衣支公尚有三吴思更使幽人憶釣磯宋唐庚端孺糴米龍川得稉穤數十斛以歸作詩調之倒拔孤舟入瘴煙歸来百斛瀉豐年炊香未數神江白釀滑偏宜佛跡泉飽去定知頻夢與醉中何至便妨禪憑君為比長安米㸔直公車牘㡬千楊萬里種秧田底泥中跡尚深折花和葉插畦心晩秧初撚金絨線先種輸他綠玉鍼雲壠霧疇俱水響絲風毛雨政春深莫聼布榖相煎急且為提壺強勸斟朱子次秀野泛滄波館至赤石觀刈早稻韻綠雲黄半武夷鄉碧水縈紆一𢃄長聞道放船飛皁蓋定知行酒載紅裳櫂謳如賀豐年信樂飲閒酬此日涼禾黍誰言不陽艶晚炊流詠有餘香眀顧清穫稻用分秧韻負郭園池𢃄宅田老晴天氣太平年穫来禾稻叢髙廩散出牛羊滿近川饋啓甑山騰霧靄蟻香醅甕起淪漣斜陽一枕西牕夢縱有丹青不與傳五言排律増宋歐陽修和劉原父從幸後苑觀稻呈講筵諸公禁籞皇居接香畦鏤檻邊分渠自靈沼種稻滿滮田六榖名居首三農政所先擢莖䝉德茂養實以時堅曉謁龍池罷行瞻鳳蓋翩粹容知喜色嘉瑞奏豐年衰病慙經學陪遊與俊賢安知帝力及但樂嵗功全拜賜秋風裏分行黼座前自憐臺笠叟来綴侍臣篇五言絶句増唐韓愈和虢州劉使君稻畦罫布畦堪數枝分水莫尋魚肥知已秀鶴没覺初深宋梅堯臣稻畦淺淺碧水平青青稻苗長偏知楚客愛白鷺飛下上七言絶句御製題耕圖浸種暄和節候肇農功自此勤勞處處同早辨東田穜稑種褰裳渉水浸筠籠耕土膏初動正春晴野老支笻早課耕辛苦田家惟穡事隴邊時聼叱牛聲耙耨每當旰食念民依南畝三時願不違已見深耕還易耨綠蓑青笠雨霏霏耖東阡西陌水潺湲扶耖泥塗未得閒為念饔飱由力作敢辭竭蹷向田間碌碡老農力穡慮偏周早夜扶犂未肯休更駕烏犍施碌碡好教春水滿平疇布秧農家布種避春寒甲坼初萌最可觀自昔虞書傳播榖民間莫作等閒㸔初秧一年農事在春深無限田家望嵗心最愛清和天氣好綠疇千頃露秧鍼淤䕃從来土沃藉農勤豐歉皆由用力分薙草灑灰滋地利心期千畝稼如雲拔秧青蔥刺水滿平川移植西疇更勃然節序驚心芒種迫分秧須及夏初天插秧千畦水澤正瀰瀰競插新秧恐後時亞旅同心欣力作月明歸去莫嫌遲一耘豐苗翼翼出清波荑稗叢生可若何非種自應芟薙盡莫敎稂莠敗嘉禾二耘曽為耘苖結隊行更憂宿草去還生隴間餽饁頻来往勞勩田家婦子情三耘䆉稏盈畦日正長復勤穮蓘下方塘堪憐曝背炎蒸下惟冀青疇發紫芒灌漑塍田六月水泉微引溜通渠迅若飛轉盡桔橰筋力瘁斜陽西下未言歸收刈滿目黄雲曉露晞腰鎌穫稻喜晴暉兒童處處收遺穗村舍家家荷擔歸登塲年榖豐穰萬寳成築塲納稼積如京廻思望杏瞻蒲日多少辛勤感倍生持穗南畝秋来慶阜成瞿瞿未釋老農情霜天曉起呼鄰里遍聼村村打稻聲舂碓秋林茆屋晚風吹杵臼相依近短籬比舍舂聲如和荅家家篝火夜深時籭謾言嘉榖可登盤穅秕還憂欲去難粒粒皆從辛苦得農家真作雨珠㸔簸揚作苦三時用力深簸揚偏愛近風林須知白粲流匙滑費盡農夫百種心礱經營阡陌苦胼胝艱食由来念阻饑且喜稼成登石磑從兹鼓腹樂雍熙入倉倉箱頓滿各欣然補葺牛牢雨雪天􅀈到蓋蔵休暇日從前拮据已經年祭神東疇舉趾祝年豐喜見盈寧百室同粒我烝民遺澤逺吹豳擊鼓報難窮暢春園觀稻時七月十一日也七月紫芒五里香近園遺種祝禎祥炎方塞北皆稱瑞稼穡天工樂嵗穰増唐韋荘稻田綠波春浪滿前陂極目連雲𥝧稏肥更被鷺鷥千㸃雪破煙来入畫屏飛宋滕白觀稻稻穗登塲榖滿車家家雞犬更桑麻漫栽木槿成籬落已得清隂又得花週遭圩岸繚山城一眼圩田翠不分行到秋苗初熟處翠茸錦上織黄雲范成大插秧種密移疎綠毯平行間清淺縠紋生誰知細細青青草中有豐年擊壤聲東門外觀刈熟潮到靈橋綠繞船海邊力穡屢豐年淡青山色深黄稻恰是胥門九月天陸游秋晩新築塲如鏡面平家家歡喜賀秋成老来懶惰慙丁壯羙睡中聞打稻聲夜聞鄰家治稻二頃春蕪廢不耕半生名宦竟何成歸来每羡鄰家樂月下風傳打稻聲稻飯買得烏犍遇嵗穰此身永免屬官倉塘南塘北九千頃八月村村稻飯香劉詵秧老歌三月四月江南村村村插秧無朝昏紅妝少婦荷飰出白頭老人驅犢奔詩散句増漢茅山父老歌佳雨灌畦稻陸田亦復周唐李邕負郭喜秔稻安時歌吉祥杜甫荆扉臨野碓半濕搗香秔雲帆轉遼海粳稻来東吳白居易稻飯紅似花調沃新酪漿元稹年年十月暮珠稻欲垂新李賀昌谷五月稻細青滿平水杜牧罷亞百頃稻西風吹半黄宋蘇軾共㸔山下稻涼葉晚翻翻郭祥正選種随土宜播植穤與秔陸游穫稻黄雲巻舂稉玉粒新新蔬經雨綠晚稻得霜紅白稻雨中熟黄鵶桑下鳴戴復古稻田秋後雀茅舍午時雞張伯玉䆉稏西成稻逍遥北海尊元李孝光日氣常蒸稻天香喜釀花原唐杜甫東屯稻畦一百頃北有澗水通青苖稻米流脂粟米白公私倉廪俱豐實宋蘇軾翠浪舞翻紅䆉稏白雲穿破碧玲瓏君家稻田冠西蜀𢷬玊揚珠三萬斛増張耒裹飯送君吾豈敢黄雲䆉稏連東臯原毛滂百里飽㸔紅䆉稏一杯輕愧黒蜿蜒何扶良田膴膴無西東䆉稏卧畦雲滿叢十里稻香新綠野一聲歌斷舊青樓増陸游未論蓴羮與羊酪新秔要勝太倉紅氷魚可釣羮材足霜稻方登糴價平春雨乍晴霜吐葉秋風初冷稻吹花築陂處處移新稻乗屋家家補破茆春粳入甑香炊玉壓酒鳴槽滴碎珠萬里秋風菰菜老一川明月稻花香泥融無塊水初渾雨細有痕秧正綠僧惠洪想見龍城山下路一川秋色稻花風元李孝光梅月逢庚江雨歇稻花迎午水風涼梁庾肩吾青花出稻苗原周庾信六月蟬鳴稻増唐王維鄖國稻苖秀杜甫秔稻共比屋稻穫空雲水甞稻雪翻匙秔稻熟天風李頎白甌貯香稉李嘉祐時雨稻秔齊桞宗元霜稻侵山平韓愈刈稻擔肩頳張籍野氣稻苖風孟郊種稻耕白水淅玉炊香稉白居易綠科秧早稻紅粒綠渾稻鹿米麞牙稻朱慶餘雨色稻苖深許渾霜秔野碓舂方干香稉倩水舂鄭谷開懐江稻熟韋荘稻熟渚禽肥田深黍稻低錢珝晚晴貪穫稻宋梅堯臣清風生稻花王安石黄焦下澤稻范成大稻穗黄欲臥陸游雲碓舂秔白園丁刈霜稻露下稻花香金完顔璹禾短新村墅元劉因脈脈稻分溝方夔移秧趁芒種李孝光城裏鑑湖稻原唐杜甫香稻啄殘鸚鵡粒增李嘉祐萬畦新稻傍山村李賀荒畦九月稻乂芽李郢小田微雨稻苖香皮日休處處路傍千頃稻殷璠千里稻花應秀色韋莊稻花香澤水千畦南畝秋風白稻肥秋雨㡬家紅稻熟滿畦秋水稻苖平杜荀鶴稻苖平入水雲間宋梅堯臣霜前稻熟舂紅稃王安石畦稻新春滑欲流稻畦蔵水綠秧齊蘇軾烏程霜稻襲人香紅稻白魚飽兒女黄庭堅禾舂玉粒送官倉王炎稻如馬尾覆溝塍范成大江頭一尺稻花雨陸游稻陂雨細豐年候壓塍霜稻報豐年稻壠青秧漫漫平雨足人畦千頃稻楊萬里早黄稻穗已長鬚元馬祖常江田稻花露始零李孝光稻盡秋田孕更青詞増宋曹文龍㸃絳唇霜落吳江萬畦香稻来塲圃夜村舂處茅屋寒燈雨玊粒長腰沉水温温注相留住共抄雲子更聼歌聲駐别錄原田家五行雨水節燒乾鑊以糯稻爆之謂之孛婁花占稻色自早禾至晚稻皆爆一握各以器列比並分數斷髙下以番白多為勝卜人口亦如之種稻甲子戊辰己巳庚午辛未壬申癸酉甲戌丙子丁丑戊寅己卯癸未甲申戊子己丑庚寅辛卯甲午庚子辛丑壬寅甲辰丙午丁未戊申己酉壬子癸丑庚申辛酉壬戌癸亥成收開日忌平閉丑日犂田須犁耙三四遍青草或糞穰灰土厚鋪於内􅝛爛打平方可撒種則肥而發旺浸種宜甲戌壬午壬辰成開日早稻清明節前浸晚稻榖雨前後浸用稻草包裹一斗或二三斗投於池塘水内缸内亦可晝浸夜收不用長流水難得生芽若未出用草􅝛之浸三四日微見白芽如鍼尖大取出於隂處隂乾密撒田内候八九日秧青放水浸之糯稻出芽較遲浸八九日如前微見白芽方可種撒時必晴明則苖易𥪡亦湏㸔潮候二三日復撒稻草灰於上易生根插秧庚午辛未癸酉丙子己卯壬午癸未甲申甲午己亥庚子癸卯甲辰丙午戊申己酉己未辛酉成收開日芒種前後插之早稻宜上旬㧞秧時輕手㧞出就水洗根去泥約八九十根作一小束却於犁熟水田内插栽每四五根為一叢約離六七寸插一叢脚不宜頻那舒手只插六叢却那一遍再插六叢再那一遍逐漸插去務要整直摥稻稻初發時用揚耙于稞行中摥去稗草易耘搜鬆稻根則易旺耘稻摥稻後將灰糞或麻豆餅屑撒田内用水耘去草盡淨近秋放水將田泥塗光謂之熇稻待土裂車水浸灌之謂之還水榖成熟方可去水或遇天少雨急鋤一遍弗令開裂俟天興雲則澆肥糞待雨弗致缺水則稻發不遏水稻稻之名不一然非水則無以生種藝之法宜選上流出水便其性也種稻者蓄陂塘以瀦之置隄閘以止之種時先放水十日後曵碌碡十遍地既熟浄然後下種候苗生五六寸拔而秧之髙七八寸則耘之耘畢放水熇之欲秀復用水浸之苖既長茂復薅拔以去莨莠農家收穫尤當及時江南上雨下水收稻必用喬杆笎架乃不遺失旱稻宜用下田齊民要術曰凡下田停水處燥則堅垎濕則汙泥難治而易荒墝埆而殺種春耕者殺種尤甚故宜五六月暵之以擬大麥如水澇不得種九月一轉至春種稻萬不失一凡種下田不問秋夏候水盡地白背時速耕耙耮頻翻令熟二月半種稻為上時三月為中時四月初及半為下時漬種令開口耬耩掩種之即再遍耮苗長三寸耙耮而鋤之鋤欲速每經一雨輙耙耮苖髙尺許則冐雨薅之科大如穊者五六月中霖雨時拔而栽之入七月不復任栽今閩中有占城種即黄秈也性耐旱髙仰處皆宜種謂之旱占其米粒大而且甘早種早熟六十日即可穫為旱稻佳種北方水源頗少惟陸地霑濕處種稻其耕鋤薅拔一如前法増齊民要術治旱稻赤米令飯白法莫問冬夏常以熟湯浸米一食久然後以手挼之湯令瀉去即以冷水淘沃挼去白乃止飯色潔白無異清流之米又􅀈赤稻一臼米裏著蒿葉一把白鹽一把白之即絶白御定佩文齋廣羣芳譜巻八
