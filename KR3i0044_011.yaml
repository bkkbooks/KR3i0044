地者存乎誠通神眀者極乎孝蘊而為精粹發而為禎祥上玄與之獻酬后土為之泄露故使騰芳髙隴擢穎清秋冠九榖之英英增大田之藹藹此皆陛下聖德茂鴻化洽名教生人之內有淳孝靈瑞之下有嘉禾邁風烈于前王煥丹青于唐史不然何幽贊玄答其若是乎臣猥以鈍劣祗守風土宣陛下之恩澤撫陛下之庶氓覩茲盛美光榮耳目不勝歡忭踊躍之至權德輿嘉禾合穗表伏見武俊所奏恆州鼓城縣生嘉禾一本合穗又盧徵奏華州鄭縣獲嘉禾一穗者謹按孫氏瑞應圖曰嘉禾者五榖之長王者德茂則生伏惟陛下德叶玄功仁育生類同穎擢秀殊祥並時昔周道既昌唐叔以獻表天下和平之兆為隂陽欣合之符五榖登成百嘉儲祉發于厚載集是休徴况嶽鎮之方表章繼至感通昭晰莫甚于斯臣等忝列台司喜倍恆品桞宗元賀嘉禾表今月某日宰臣以幽州所進嘉禾圖各一軸示百寮者伏以嘉榖順成靈貺昭格天人合應遐邇同心伏惟皇帝陛下睿謀廣運神化旁行植物知仁祥圖應聖靈嶽不愆于贊佑燕谷用遂于生成豐稔隨均知朔南之被澤休嘉克叶見天地之同和六穗慚稱于漢臣異畝恥書于周典自中形外均慶同歡臣謬職憲司獲覩嘉瑞無任抃躍之至禮部賀嘉禾及芝草表伏見今月某日內出劍南所進嘉禾圖及陕州所進紫芝草示百寮者珍圖煥開瑞彩交映遐邇偕至福應攸同伏惟皇帝陛下緝熙至道保合太和天惟發祥地不愛寶嘉禾擢質靈草抽英獻于王庭唐叔慚同穎之異薦諸郊廟班史謝連葉之竒既呈薿薿之祥更覩煌煌之秀豐年斯著聖夀用彰飲和之人歡忭無極臣等優遊至化披玩殊姿慶忭之誠倍百恆品張仲素賀嘉禾表伏見鄆州東平縣官莊地內有禾異壠雙本合成一穗畫圖奏進傳示百寮者謹按瑞應圖曰王者德茂而太平君臣和則嘉禾朱草以甲萌言不得中和之氣即不生也伏惟陛下鼓和風茂休應泰階平于上下大中建于人臣神眀是若徵見必報通彼殊壠總其雙莖滋大澤以冥造成嘉穗而薦和合為一彰至化之會同堅而好表資生之豐實推物類以得天意觀繪事而擬靈篇凡在班行咸同慶幸狀增唐韓愈奏汴州得嘉禾嘉瓜狀謹按符瑞圖王者德至于地則嘉禾生伏惟皇帝陛下道合天地恩霑動植邇無不協逺無不賓神人以和風雨咸若前件嘉禾等或兩根並植一穗連房或延蔓敷榮異實共蒂既叶和同之慶又標豐稔之祥感自皇恩微莖何極于造化親逢嘉瑞小臣喜遇于休眀謳增魏曹植榖謳於穆聖皇仁暢惠渥辭獻減膳以服鰥獨和氣致祥時雨灑沃野草萌芽變化嘉榖猗猗嘉禾惟榖之精其洪盈箱協穗殊莖昔生周朝今植魏廷獻之廟堂以昭祖靈頌增宋劉義恭嘉禾頌并表臣聞居髙聽卑上帝之功天且弗違聖王之德故能影響二儀甄陶萬有鑒觀今古採驗圖緯未有道闕化虧而禎物著眀者也自皇運受終辰曜交和是以卉木表靈山淵效寶伏惟陛下體乾統極休符襲逮若乃鳳儀西郊龍見東邑海酋獻改緇之羽河祗開俟清之源三代象德不能過也有幽必闡無逺弗屆重譯嵗至休瑞日臻前者躬籍南畝嘉榖乃植神眀之應在斯尤盛四海既穆五民樂業思述汾陽經始靈囿蘭林甫樹嘉露頻流板築初就祥穟如積太平之符于是乎在臣以寡立承乏槐鉉浴沭芳津預睹冥慶不勝忭舞之情謹上嘉禾甘露頌一篇不足稱揚美烈追用悚汗頌曰二象攸分三靈樂主齊應合從在今猶古天道誰親惟仁斯輔皇功帝績理冠區宇四民均極我后體茲惟機惟神敬昭文思九族既睦萬邦允釐德以位敘道致雍熙於穆不已顯允東儲生知夙睿嶽茂淵虛因心則哲令問𢎞敷繼徽下武儷景辰居軒制合宫漢興未央矧伊聖朝九有巳康率由舊典思燭前王乃造陵霄遂作景陽有藹景陽天淵之涘清暑爽立雲堂特起植類斯育動類斯止極望江波遍對嶽峙化德惟逹休瑞惟懋誕降嘉種呈祚初構甘露春凝禎穟秋秀于今匪烈嗣嵗仍富昔在放勳歷莢數朝降及重華倚扇清庖鑠矣皇慶比物競昭倫彼典策被此風謠資臣六蔽任兼兩司既恧仲衮又慚鄭緇豈忘衡泌樂道眀時敢述休祉愧闕令辭沈演之嘉禾頌煥炳禎圗昭晰瑞典運傾方閟時亨始顯綈狀既章鳥文斯辨於皇聖辟承物紀逺明兩辰麗昌輝天衍理妙位崇事神業盛淵渥德澤虛寂道政協化安心調樂移性玉衡從體瑤光得正臣星垂采景雲立慶極仁所被罔幽不攘至和所感靡况弗彰鴛出丹穴鸚起西廂白鹿踰海素鳥越江結響穹隂儀形鐘陽治人奉天乃勤乃格黛耜俶載髙廪已積嘉禾重穋甘露流液擢秀辰畦揚穎角澤離穟合豪榮區蔭斥盈箱徵殷貫桑表周今我大宋靈貺綢繆帝終撝謙繹思勿休躬薦宗廟溫恭率由降福以誠孝享虔羞頒祉推功登徽睿詔恩覃隱顯賞延荒徼河溓海夷山華嶽耀憬琛敻賮兼澤委效日表地外改服請教茂對盛時綏萬屢豐厭厭歸素秩秩大同上藏諸用下知所從仰式王度俯歌南風鴻名稱首永保無窮贊增漢鄭玄婚禮謁文贊嘉禾為榖班祿是宜吐秀五七乃名為嘉賦增唐潘炎嘉禾合穗賦并序景龍二年秋八月屬縣長子有嘉禾合穗瑞不虛月侯其偉而乃賦曰天祚眀德兮降之嘉生案彼靈篇兮莫之與京脈震土膏且分苗于南畝駟臨天漢爰合穗以西成當元后之厯試表休徵于太平不莠不稂實堅實皂引薰風于和氣承湛露于蒼昊生非百里驗管仲之虛辭出異崑山自我皇之所寶在瑞圖之右為曠代之祥唐叔得之而合穎周成得之以充箱雙米一稃稱之表異孤莖六穗頌以非常今也尤盛居然允臧轉風而屢騰佳氣就日而交見祥光獨天不生託厚載于富媼非聖不感效元符於我皇我皇得之熾而昌風之起兮雲之揚嘉禾之瑞未可量天子億載臨萬方張真祥嘉禾合穎賦南山之下兮無人之境力穡此中兮均夫躁靜勞則不憚既寒耕而熱耘慶有所歸忽異畝而同穎莖駢惜芃芃之色秀合垂䔿䔿之影此焉觀瑞亦祗以異比於木乃連理之祥在于人蓋同心之義稃已聞于二米莖乃殊於九穗豈非德之能及實聖朝之所致爰考休徵豐年是憑麥兩岐而能匹茅三脊而徒稱固神倉之可貯期郊廟之以升欲薦堯階且聞秷秷之穫將登神膳遂入烰烰之蒸天道玄默瑞以表德豈無沃土而光于我家豈無異方而祚此王國不有嘉生孰謂賓榮友朋之心因取興于連茹兄弟之樂遂作戒於分荆佇聞唐叔之獻頌我后之升平趙蕃甸人獻嘉禾賦聖上崇國本致時康動玄象之昭鑒産嘉禾而應祥甸人于是具畚鍤修封疆啓芳穎于修畛薦靈姿于我皇懿夫挺拔自分連拳相接始穰穰而齊實終矯矯而異葉殊其本均二氣以發生同乎心表一德之和協不然者寧擢秀于墳衍載具美于圖牒徵其瑞質稽彼大同見芬敷而共貫信縈結以交通則知符乎帝道發自天功合穗之珍方將效祉于今日異畝之美豈獨標竒于古風于是野老歡心田夫盡力宛移根于沃壤之際俄發耀于丹墀之側祥煙近拂乍疑連理之形喜氣傍臨更辨合歡之色彌彰執契之道載助惟馨之德爾其天鑒非逺神珍是呈始苕亭而間出終夭矯而曲成豈比躬稼之時盡化晉君之草挺生之嵗克符漢帝之名向令質委離披孤生苯䔿安得臨玉砌邇龍衮設穜稑之萌芽為理化之根本是知六府惟序萬邦式孚茅三脊而非偶獸共抵而自殊未若耀青芳于近甸垂嘉貺于靈圖况復聖慮彌深皇猷思永梯山航海未足契其休光菲食卑宫將欲示其豐省斯所謂騰茂實于厚地故薦穗于重穎眀沈鯉嘉禾賦惟帝籍之千畝接宸極之宫牆翕垓埏之瑞煒穆元辰于孟陽萃坤靈而厚載孕扶輿以發祥錯龍鱗於原隰布鏤刻于塍疆沁玉河之沃潤浥金露之膏瀼拓周臺之靈囿陋漢苑之朱堂感華胥于禁宇闢融澤于扶桑禱農祥于地后震疸憤于天房蓋聖朝之所以先稼穡備蒸嘗展一人之孝思而關社稷之靈長者也粵惟我皇踐祚闡坤握乾仁亶義濊聖思廣淵契七月之精蘊領無逸之真詮振天眀而育德躬豐服于眀禋履桑林而簡器望三素以祈年當東作之平秩舉大典于籍田親秉耒以三推御蔥轄于青氊命后稷以播榖簡伯禹以疏泉班保介而終畝勞百辟于肆筵布陽和於九有暢聖澤于八埏爾乃精忱上達協氣旁通瑞祉迸臻靈貺雲從沴氛神禦寶露時融宜暑宜寒十雨五風將及我私先急我公我黍翼翼我稷芃芃既庭且碩實大以豐乃有嘉禾秀擢蒙茸或一本而多岐或數穗而同莖引瑤風以幻質濯玉瀣而凝精陸離離以綴蕾曄采采以含英溶丹椹之芳潔燦瓊蘂之晶熒秉五七之恆德挺九穗之竒禎纍連珠而合穎一金玉而本生霈休符于甘雨銜滋液于璇星育祥柯以五變耀泰運于九莖天施雨而匪瑞日淪地而有徵譬禮義之多富獵龍鳳之異名軼幽谷之蘭􅉅掩玄圃之松苓彼紫麻緑苣豈嘉禾之與埓而碧麥靈苗詎並蔚而爭榮若夫粟雨炎帝瑞發軒轅陶虞異穱魯史書年成周合穗唐叔命篇字成雨于蒼頡穎頌著于鄭玄拳野産之而名邑赤烏因之以改元外此而朱蓂厯于堯陛紫蕙茁于太原秀騰濟隂之境旅生建武之年稻孫揚蕤于金斗祥麟集食於武川敬仲乃啓封禪之所致汾陽極稱天瑞之可傳此皆帝不貴乎金玉而寶夫衣食之源故其政必調于函夏而時省斂于秋田之所致也乃有連叢合隴七穗五岐三苗四熟珍綺紛披或北里之稱盛或玄山之讓竒不周或呈其異種帝庭或獻自外夷或光照九阿之謠或香聞五里之滋是以繁瓌侈稱于前代而昌符踵應于來茲孰若聖世之休禎炳靈淑于神祗實皇衷之淵塞特示象于疇災既登八極于安和仍躋萬國于咸熙允阜澤之潛通羌宏化之寵綏于是田畯至喜穡夫載欣僉曰異哉世所希聞薄言采之以獻吾君於惟皇上勳華淑軌方且秉沖自下遜美弗居謂嘉榖之呈象豈涼德之克符實先聖之顯烈膺上帝之瑤圗也于是降眀詔蠲吉辰徵太師之九奏舉宗伯之十倫飭豆登而並薦毖尊俎以俱陳信曽孫之有道企皇祖之居歆于是大禮告成億兆歡欣東漸海隅西暨沙壖具瞻上瑞雷動風傳凡在廷之臣工咸稽首以揚言謂聖王治天下以孝而五榖為王政之先茲者聖德廣運格于重玄一人有慶兆民賴焉將使至治刑於萬國嘉祥載于普天皇風皥皥王道平平端冕垂旒四海晏然眀眀天子夀考萬年許國嘉禾賦勾吳文學躡屩之燕會天子藻潤太平四方瑞應日奏闕下既聞有獻嘉禾者羣公畢賀乃盱衡濯慮而往觀之遘徇華子與好古先生辨論金門之左揖而聽其語徇華子曰吾聞太和之氣醞釀堪輿蓄極而發竒珍乃攄祥風之所披拂膏露之所沾濡神不能闡其粹天不能表其符沕潏逢涌溢為嘉禾蓋冥搜于玉䇲茲快覿于皇都夫其陸海廣輪神臯沃衍龍首通渠魚鱗疊畹蔚封畛兮縱橫倬阡陌兮宛轉三推既倡兮九扈作勞黃茂聿滋兮玄功斯顯則有玉山異種北里仙英濟陽九穗崑崙五尋挹光華于日月凝沆瀣于太清卿雲照爛以垂覆景星煒煜而流晶育非常之元化挺秀質于金莖爾乃穎擢丹霞顆抱眀月豐枝苯䔿瑋幹芳潔或珠聨于異畝或琪映于同畷或兩儀分于混沌或五氣散于轇轕或參乎乾畫之精或象乎洛疇之列其生也后稷降靈厲山遺烈種美璧于藍田萃商金於清樾其用也含哺萬國芬芳九闥頤天顔于五位肇王基于七月猗寰中之上瑞羌閲世而昭揭昔蒼姬之受命兮爰抽祕于唐叔逮白水之真人兮值虹流而載育曰悠悠其厯劫兮嗟未聞乎芳躅匪至寶之不可恆兮何寂寥于圖籙聖皇建極兮超赫胥而軼大庭黃輿獻琛兮嘉禾乃登邇葳蕤兮千畝逺璀璨兮八紘由顧命越于今茲兮果何方兮弗獲亦何嵗兮弗生保介紛綸而奏御竒祥雜遝于汗青蓋千萬年之希睹而鴻濛剖判所未有之庥禎也謂宜陟岱嶽告成功勒蒼崕樹穹窿跨蓂莢于堯除掩蟠桃于漢宫何為乎僅升太廟之几聊陳尚膳之饔蔑洪朗而弗耀抑崇峻以謙沖意者聖人之盛德兮慮非所以章眀賜而承昊穹于是好古先生拂然色厲正襟諤諤而復之曰異乎子言所謂見一斑之文豹蔽豐蔀而測星躔者也吾聞之柔桑暮拱殷道以興芝房協律漢業幾傾蒼麟駟于羯乘黃龍炫于吳京謂變者未必為咎疑祥者未必為禎其休其否此焉足憑嗟大鈞之寥闊兮二五交蒸神竒臭腐兮靡詭弗呈勘一抹一擠之榮亦造化之偶然兮夫何與于朝廷是故眀王馭世不貴異物有兢兢而思慎曷顓顓于黼黻稽六府之重輕察三才之秒忽故以豐年為寶民食為天遊神稼穡雅意甫田躬黛耜御紺轅廑穆清之宵旰祗求裕乎元元如其耕耘不擾疆理盡力多黍多稌時萬時億百室開兮婦子寧百禮洽兮神人懌即大化之神眀知協氣之融液雖無嘉禾奚損至德如其疆理蕪溝遂廢鳴條不時濯枝愆序田畯失其咨茹亞旅闕其樹藝黔黎艱食風教刓敝雖有嘉禾奚益世故今天子逺覽陶鈞之上庶幾歸禾之旨視厥方貢讓而弗處有事寢園薦馨而已蓋俯徇乎百辟非則效乎夸詡子大夫不究本原矜竒説異殊謬乎春秋之義語未卒勾吳文學攝齊而進曰長卿有言楚既失矣齊亦未為得也且皇天樹后以長世豈漠然其無情有錫羡以純佑或降威以宣懲伊災祥之大致固在昔其眀徵然而天道遠人道邇驗善惡之幾先視后德何如耳有禾芉芉眀盛之年飛紫芒于堯陌垂金粟于舜田氣緣感而後應治有開而必先以此為瑞瑞何疑焉若夫帝澤未流嘉禾聿穟搖盲飈以扶疏潤怪雨而薆薱雖併穗之可觀實隂陽之多戾出非其時是奚足貴名之曰妖又豈非類故夫麟一也遊郊者軒以之光西狩者周以之亡鳳一也岐山鳴而德茂穎川集而道荒彼四靈其畢爾豈茲禾之比方蓋以瑞稱之兮瑞未可必以妖視之兮妖亦非常亮神霄之有意非臧否其茫茫維觀物而考德兮乃天人之並彰噫嘻為妖為瑞以昏以聖則大聖之握符必降康之綦盛方今巢燧當陽夔龍布令步玉斗懸金鏡匹夫軫于宸衷三農重于八政春臺若登寒暑皆應是以震聲日景霅煜九玄貢華喬嶽輸英大川極薰蒸而旁魄乃茁暢于天田所謂以和召和兮洵神理之自然豈比夫赤烏與泰始空詫説于民間昔我髙皇帝之紹天也虎旅戢而化成龍門獻其嘉穗肆賁天章用歌敬畏不侈大以自矜爰貽謀而錫類誠天寵其德而靈承其瑞于今觀之維上克配而先生不考于此一以為希覩一以為偶然弗原天而盡人得無立言之少偏伊欲照金簡重瑤編表熙朝之鴻鑠邁周烈于千年務昭眀乎聖德乃論治之真詮文學語既從容而却先生斂容唯唯諾諾顧謂徇華子曰此嘉禾之讜議也足勸賢而警虐庶幾風人用備著作樂章增宋史朝會樂章彼美嘉禾莖九穗農疇告祥史牒書瑞擊壤歡歌如京委積留獻春種昭錫善類嘉彼合穎致貢升平異標南畝瑞應西成德至于地皇祗效靈和同之象煥發祥經五言排律原唐孟簡咏嘉禾合穎玉燭將成歲封人亦自歌八方霑聖澤異畝發嘉禾共秀芳何遠連莖瑞且多穎低甘露滴影亂惠風過表稔由神化為祥識氣和因知興嗣嵗王道舊無頗增無名氏嘉禾合穎天祚皇王德神呈瑞榖嘉感時苗自秀證道葉方華氣轉騰佳色雲披映早霞薰風浮合穎湛露淨祥花六穗垂兼倒孤莖嫋復斜應同唐叔獻稱慶比周家詩散句增周庾信嘉禾雙合穎稻熟再含胎唐張籍田有嘉榖隴數畝穗亦同宋夏竦眉山逺地蜀山西九穗嘉禾忽效竒元王惲嘉禾嵗芉芉御定佩文齋廣羣芳譜卷九
