body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九榖譜黍原黍汜勝之書云黍者暑也待暑而生暑後乃成也説文云黍可為酒從禾入水為意六書精藴云禾下從氽象細粒散垂之形古今注云禾之黏者為黍一名秬爾雅云秬黑黍一名秠爾雅云秠一稃二米注云此亦黑黍但中米異耳有黃白黎三色米皆黃比粟微大北人呼為黃米屬火南方之榖性溫益氣補中久食令人多熱小兒忌食他如牛黍燕頷馬革驢皮稻尾大黑黍秀成赤黍皆黍之異名也增廣志有濕屯黃黍有田黍塸云鶯鴿之名齊民要術今俗有鶯闕一字黍半夏黍博雅黍穰謂之䅀原苗穗與稷同宜肥地多收刈後乘濕即打則稃易脫遲則稃著粒上難脫彚考原詩王風彼黍離離曹風芃芃黍苗隂雨膏之小雅我黍與與大雅誕降嘉種維秬維秠恆之秬秠是穫是畝周頌豐年多黍多稌增詩小序華黍時和嵗豐宜黍稷也禮記曲禮黍曰薌合疏黍曰薌合者夫榖秫者曰黍秫既軟而相合氣息又香故曰薌合也原王制秋薦黍月令仲夏之月農乃登黍天子乃以雛嘗黍羞以含桃先薦寢廟注必以黍者黍火榖氣之主也增周禮天官羊宜黍疏羊宜黍者羊味甘熱黍味苦溫甘苦相成故云羊宜黍左傳其藏之也黑牡秬黍以享司寒國語黍而不黍不能蕃庶原史記封禪書管仲説威公曰古之封禪鄗上之黍北里之禾所以為盛增漢書律厯志度者分寸尺丈引也所以度長短也本起黃鐘之長以子榖秬黍中者一黍之廣度之九十分黃鐘之長注師古曰子榖猶言榖子秬即黑黍中者不大不小也言取黑黍榖子大小中者率為分寸也原宋書符瑞志黃帝時南夷乘白鹿來獻秬鬯增隋書隱逸傳李士謙字子約趙郡平棘人也李氏宗黨豪盛每至春秋二社必髙會極歡無不沉醉喧亂嘗集士謙所盛饌盈前而先為設黍謂羣從曰孔子稱黍五榖之長荀卿亦云食先黍稷古人所尚容可違乎少長肅然不敢弛惰退而相謂曰既見君子方覺吾徒之不德也唐書王績傳績有奴婢數人種黍春秋釀酒養鳧雁蒔藥草自供山海經廣都之野后稷葬焉爰有膏黍膏稷注言味好滑如膏歡頭之國維宜芑苣樛楊是食注苣黑黍今字從禾原家語孔子侍坐于魯哀公設桃具黍公曰以黍雪桃也孔子對曰夫黍五榖之長也祭先王以為上盛果有六而桃為下祭先王不得入于廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五榖之長雪瓜蓏之下是侵上忽下也增列子鄒衍在燕有谷地美而寒不生五榖鄒子吹律而溫氣至今傳名曰黍谷原韓子吳起欲攻秦小亭置一石赤黍于東門外令人能徙於西門外者賜之上田宅人爭徙之乃下令曰眀日攻秦能先登者與之大夫賜之上田宅于是攻之一朝而拔增韓子韓昭侯之時黍種嘗貴鮮有昭侯令人覆廩廩吏果竊黍種而糶之淮南子渭水多力而宜黍焦氏易林中田髙黍以享王母受福千億所求大得下田種黍芳華當齒大雨淋集紛榮滿壅春秋佐助期黍神名侜佞姓蘭郝春秋説題辭精移火轉生黍夏出秋改黍者縮也故其立字木入米為黍酒以扶老東觀漢紀承宫字少子琅琊人嘗將妻子入華蓋蒙隂山谷耕種禾黍臨熟人就認之宫便推與而去由是發名古今注和帝元興元年黑黍穗一禾二實或三四實生任城得粟二斛八斗以薦宗廟博物志黑墳宜麥黍紀年書惠成王八年雨黍文中子藝黍登場嵗不過數石以供祭祀賔客之酒也談藪王元景大醉楊遵彥曰何大低昻元景曰黍熟頭低麥熟頭昻黍麥俱有所以低昻農桑通訣秬鬯一卣此言黍之為酒尚矣今有赤黍米黃而黏可蒸食白黍釀酒亞于糯秫又北地逺處惟黍可生其莖穗低小可以釀酒又可作饌粥黏滑而甘凡祭祀以為上盛貴其色味之美也原成化元年天雨黑黍于襄陽集藻賦增晉嵇含孤黍賦余慎終屋之南榮有孤黍生焉因泥之濕遭土之潤宿昔芽蘖滋茂甚速塗燥根淺忽然萎隕深感此黍不韜種以待時貪榮棄本寄身非所自取凋枯不亦宜乎文賦散句原漢張協七命大梁之黍瓊山之禾唐稷播其根農帝嘗其華增劉穎魯都賦禾黍油油粳族垂芒殘穗滿握一穎盈箱魏王粲登樓賦華實蔽野禾黍盈疇四言古詩原晉束晳華黍黮黮重雲習習和風黍華陵巔麥秀丘中靡田不播九榖斯豐奕奕玄霄濛濛甘霤黍發稠華亦挺其秀靡田不植九榖斯茂無髙不播無下不植芒芒其稼參參其穡稸我王委充我民食玉燭陽眀顯猷翼翼詩𣪚句增唐李白東臯春事起種黍早歸田杜甫耕田秋雨足禾黍已映道賴知禾黍收已覺糟床注原耿湋古道無人行秋風動禾黍宋蘇軾今年秋應熟過從飽雞黍金趙元還思釀新黍甕面挹秋江唐曹鄴黑黍春來釀酒飲青禾刈了驅牛載增韋應物禾黍積東災宋邵雍黃黍秋正熟陸遊種黍踏麴糵唐白居易陶令有田唯種黍韋莊主人饋餉炊紅黍宋王安石連山沒雲皆種黍陸遊黍酒新成壓小槽别録增齊民要術凡黍穄田新開荒為上大豆底為次榖底為下地必欲熟再轉乃佳若春夏耕者下種後再勞為良一畝用子四升三月上旬種者為上時四月上旬為中時五月上旬為下時夏種黍穄與植榖同時非夏者大率以椹赤為候諺曰椹離離種黍時燥濕候黃場種訖不曵撻常記十月十一月十二月凍樹日種之萬不失一凍樹者凝霜封著木條也假令月三日凍樹還以月三日種黍他皆倣此十月凍樹宜早黍十一月凍樹宜中黍十二月凍樹宜晚黍若從十月至正月皆凍樹者早晚黍悉宜也苖生隴平即宜杷勞鋤三遍乃止鋒而不耩苖晚耩即多折也刈穄欲早刈黍欲晚穄晚多零落黍早米不成皆即濕踐之穄踐訖即蒸而裛之不蒸者難舂米碎蒸則易舂米堅香氣經夏不歇黍宜曬之令燥濕聚則鬱凡黍黏者收薄穄味美者亦收薄難舂雜隂陽書曰黍生于榆六十日秀秀後四十日成黍生于巳壯于酉長于戌老于亥死于丑惡于丙午忌於丑寅卯穄忌于未寅孝經援神契云黑墳宜黍麥尚書考靈曜云夏火星昏中可以種黍菽汜勝之書曰種黍必待暑先夏至二十日此時有雨疆土可種黍一畝三升黍心未生雨灌其心心傷無實黍心初生畏露令人對持長索槩去其露日出乃止凡種黍覆土鋤治皆如禾法欲疏于禾按疏黍雖科而米黃又多減及空令穊雖不科而米白且均熟不減更勝踈者汜氏云欲疏于禾其義未聞崔氏曰四月蠶入簇時雨降可種黍禾夏至先後各二日可種黍蟲食李者黍貴也原製用三月三日取黍麵和菜作羮能避時氣黍米性黏可釀酒可作餳可蒸煮為糕糜五月五日俗以菰葉裹成糭名角黍祭三閭大夫遺製也合葵菜食成痼疾合牛肉白酒食生寸白蠱穰及根煮汁解苦瓠毒浴去浮腫醉臥黍穰令人生厲落眉髮稷原稷一名穄六書故云稷穄同聲實一字也本草云稷從畟畟進力治稼也種稷者必畟畟進力也南人承北音呼稷為穄謂可供祭也一名粢爾雅云粢稷疏云粢者稷也關西謂之􅓱音靡見唐本草冀北謂之䵖音牽去聲廣雅云䵖穄也苖似蘆莖髙三四尺有毛結子成枝而疏散外有薄殼粒如粟而光滑色紅黃米似粟米而稍大色黃鮮麥後先諸米熟炊飯疏爽香美故以供祭食之益氣安中宜脾利胃涼血解暑壓丹石毒屬土脾之榖也脾病宜食多食發冷病增本草稷與黍一類二種也黏者為黍不黏者為稷稷可作飯黍可釀酒猶稻之有粳與糯也其色有赤白黃黑數種黑者禾稍髙俗通呼為黍子不復呼為稷矣北邊地寒種之有補河西出者顆粒尤硬廣志穄有赤白黑青黃鶯鴿凡五種破減稷逼麥稷此二者以四月熟齊民要術按今俗有驢皮穄博雅稷穰謂之䅳彚考原詩王風彼稷之苖小雅我稷翼翼增禮記曲禮稷曰眀粢疏稷曰眀粢者稷粟也眀白也言此祭祀眀白粢也月令孟秋之月農乃登榖注榖謂稷也周禮天官豕宜稷疏豕宜稷者牝豬味酸牝豬味苦稷米味甘甘苦相成故曰豕宜稷隋書天文志稷五星稷農正也取乎百榖之長以為號也穆天子傳天子西征至于赤烏之人獻穄麥百載天子北征入于曹奴之人獻穄米百車天子西征至于􅜑韓氏爰有樂野溫和穄麥之所草天子東南翔行馳驅千里至于巨搜之人奴獻秋麥千車膜稷三十車原吕氏春秋飯之美者有陽山之穄增風俗通米之神為稷故以癸未日祠稷于西南水勝火為金相也孝經説稷者五榖之長五榖衆多不可遍祭故立稷而祭之尚書考靈曜春鳥星昏中以種稷秋虛星昏中以收斂白虎通稷者得隂陽中和之氣而用尤多故為長也獨斷稷神蓋厲山氏之子柱也柱能植百榖帝顓頊之世舉以為田正天下賴其功周棄亦播植百榖以稷五榖之長也因以稷名其神也齊民要術榖者總名非止為粟也然今人専以稷為榖俗名之耳爾雅翼稷者五榖之長以其中央之榖月令中央土食稷與牛五行土為尊故五榖稷為長兼眀書或問曰稷既百榖之神不言榖而云稷者何也答曰稷屬土而為諸榖之長故月令謂之首種首種者種最在前也諸榖不可遍舉故舉其長而為言之以等之也若直以榖言則為人所褻慢也别録增兩鈔摘腴毛詩傳注先集維霰曰霰稷雪也或謂之米雪謂其粒若稷米然本草衍義穄米其香可愛故取以供祭祀然發故疾只堪作飯不黏其味淡原稷三月種耘四遍七月熟四五月亦可種但收少遲耳刈稷欲早八九月熟便刈少遲遇風即落忌與瓠子附子同食蜀黍原蜀黍一名蜀秫種自蜀來故以蜀為名農政全書云其黏者近秫故借名為秫一名蘆穄一名蘆粟一名髙粱形類黍稷而髙大如蘆荻故有諸名一名木稷一名荻粱廣雅云荻粱木稷也種宜卑下地春月早種得子多秋收莖粗髙丈餘狀似蘆荻而內實葉亦似蘆穗大如帚粒大如椒紅黑色米性堅實黃赤色熟時先刈其穗秸成束攢而立之方得乾米有二種黏者可和糯秫釀酒作餌不黏者可作糕煮粥可濟飢亦可養畜莖可織箔編席夾籬供㸑梢可作筅帚殼浸水色紅可以紅酒有利于民者最博性溫澀溫中澀腸胃止泄㵼彚考增博物志三年種蜀黍其後七年多蛇别録增農政全書玄扈先生曰蜀秫在北方地不宜麥禾者乃種此尤宜下地立秋後五日雖水潦至一丈深不能壞之立秋前水至即壞故北土築堤二三尺以禦暴水附録玉蜀黍原作御麥附麥後按御麥乃別名實蜀黍類也今移入此原玉蜀黍一名玉髙粱一名戎菽一名御麥以其曾經進御故名御麥出西番舊名番麥按農政全書又作玉米玄扈先生曰玉米或稱玉麥或稱玉蜀秫從他方得種其曰米麥秫皆借名之幹葉類蜀黍而肥矮亦似薏苡苖髙三四尺六七月開花成穗如秕麥狀苖心别出一苞如棕魚形苞上出鬚如紅絨垂垂久則苞拆子出顆顆攢簇子粒如芡實大而瑩白花開于頂實結于節粟原粟古作栗象穗在禾上之形説文云粟之為言續也續于榖也粱屬也蓋梁之細者本草云穗大而毛長粒粗者為粱穗小而毛短粒細者為粟北方直名之曰榖脫殼則謂之小米增本草粟一名秈粟古以粟為黍稷粱秫之總稱而今之粟在古但呼為粱後人乃專以粱之細者名粟大扺黏者為秫不黏者為粟故呼此為秈粟以别秫而配秈原稈髙三四尺似蜀秫稈中空有節細而矮葉似蘆小而有毛穗似蒲有毛顆粒成簇性鹹淡養脾胃補虛損益丹田利小便解熱毒陳者尤良北人日用不可缺者諺云榖三千一穗之實至三千顆言多也其名或因姓氏地里或因形似時令早則有趕麥黃百日糧六十日還倉之類中則有八月黃老軍頭之類晚則有鴈頭青寒露粟鐡鞭頭之類又有粱榖滑榖白榖白榖黃米黃榖白米之類增廣志有赤粟白莖有黑格雀粟有張公斑有含黃有蒼背稷有雪白粟亦名白粟又有白藍下竹頭青白逯麥擢石精狗蹯之名種云齊民要術朱榖髙居黃劉豬獬道愍黃聒榖黃雀懊黃續命黃百日糧有起婦黃辱稻糧奴子場音加支榖焦金黃䳺殦合履今一名麥爭場此十四種早熟耐旱免蟲聒榖黃辱稻糧二種味美今墮車下馬看白羣羊懸蛇赤尾龍虎黃雀民溱馬泄韁劉豬赤李谷黃河摩糧東海黃石䮑嵗青莖青黑好黃陌南木隈隄黃宋􅀢癡指張黃兔胠青惠日黃寫風赤一睍黃山鹺頓黨黃此二十四種穗皆有毛耐風免雀暴寶珠黃俗得白張鄰黃白鹺榖鈞于黃張蟻白耿虎黃都奴赤茄蘆黃薰豬赤魏爽黃白莖青竹根黃調母粱磊碨黃劉沙白憎延黃赤粱榖靈忽黃獺尾青續得黃得容青孫延黃豬矢青煙熏黃樂婢青平夀黃鹿橛白鹺折作黃􅀈􅭜阿居黃赤巴粱鹿蹄黃鉞狗倉可憐黃米谷鹿橛青阿返此三十八種中粗大榖白鹺榖調母粱二種味美擇谷青阿居黃豬矢青有二種味惡黃􅀈􅭜樂婢青二種易舂石栁閲竹葉青一名胡谷水黑榖忽泥青衝天棒雉子青鴟腳榖雁頭青攬堆黃青子規此十種晚熟耐蟲災則盡矣彚考原左傳襄公二十九年鄭子展卒子皮即位于是鄭飢而未及麥民病子皮以子展之命餼國人粟户一鍾晉書孝友傳劉殷夢人曰西籬下有粟寤而掘之果得粟十五鍾銘曰七年粟賜孝子劉殷宋書符瑞志文帝元嘉二十二年醴湖屯生瑞粟一莖九穗增宋史食貨志初農時太宗嘗令取畿內青苖觀之聽政之次出示近臣是嵗畿內菽粟苖皆長數尺帝顧謂左右曰朕每念耕稼之勤茍非兵食所資固當盡復其租稅管子桓公觀于野曰何物可比君子之德隰朋曰粟可比君子之德管仲曰苖始出生也眴眴乎似孺子安之則安不得則危命之曰禾可比君子桓公曰善原韓非子鄒穆公有令食鳧雁者必以秕無敢以粟鳧雁無食而以一石粟易一石秕其費甚矣請以粟食之公曰非爾所知也夫百姓餉牛而耕曝背而耘勤而不敢惰者豈為鳥獸食哉粟米人之上食也奈何以養鳥汝知小計而不知大害矣淮南子昔者倉頡作書而天雨粟增風俗通燕太子丹仰天歎天為雨粟焦氏易林新田宜粟上農得榖君子懷德以千百福春秋説題辭粟助陽扶性粟之為言續也粟五變一變而以陽生為苖二變而秀為禾三變而祭然謂之粟四變入臼米出甲五變而蒸飯可食陽以一立為法故粟積大一分穗長一尺文以七列精以五六立故其字為粟西者金所立米者陽精故西字合米而為粟博物志雁食粟則翼重不能飛古今注武帝建元四年天雨粟宣帝地節三年長安雨黑粟元帝竟寧元年山都縣雨粟色青黑味苦大者如小豆小者如麻子拾遺記樂浪之東有背眀之國宜種百榖有搖枝粟其枝長而弱無風常搖食之益髓有鳳冠粟似鳳鳥之冠食者多力有遊龍粟葉屈曲似遊龍也有瓊膏粟白如銀食此二粟令人骨輕員嶠山一名環丘上有方湖周回千里多大鵲髙一丈銜不周之粟粟穗髙三丈粒皎如玉鵲銜粟飛于中國故世俗間往往有之其粟食之厯月不飢故吕氏春秋云粟之美者有不周之粟焉述異記宋文帝即位而江表二千餘里野粟生焉原唐紀宣宗大中二年福建進瑞粟十五莖莖五六穗增全唐詩話李紳初以古風求知于吕溫溫見齊煦誦憫農詩曰春種一粒粟秋收萬顆子四海無間田農夫猶餓死鋤禾日當午汗滴禾下土誰知盤中飱粒粒皆辛苦曰此人必為卿相果如其言泉州志紫帽山有金粟洞宋李邴云唐時泉人客洛陽邂逅一羽衣寄書紫帽隱者既歸授書遺以粟米半升還家視之金粟也宋寧宗御書金粟之洞四字刻于石集藻七言律詩增宋朱子次秀野種粟韻阿香一笑走豐隆雨遍平疇萬頃中舊喜樊遲知學圃今看許子快論功遙憐鬱鬱翻秋隴預想垂垂弄晚風珍重詩翁且強健東阡南陌興無窮詩𣪚句增唐李白雖有數斗玉不如一盤粟韓愈囷倉榖粟滿未有旦夕憂杜甫瘦地翻宜粟方干舂粟引髙泉宋陸遊雲嶼鋤畬粟唐杜甫鳥雀苦肥秋粟菽粱按粱與粟一類二種原譜于粟部內獨載青粱一種者非今從本草增入又按爾雅虋赤苗注云今之赤粱粟芑白苗注云今之白粱粟虋同穈詩大雅維穈維芑傳用爾雅疏亦引郭注以解之自蘇頌圖經夲草列于黍部李時珍本草綱目因之而遂辨郭注為非誤矣增本草粱粱者良也榖之良者也即粟也周禮九榖六榖之名有粱無粟自漢以後始以大而毛長者為粱細而毛短者為粟今則通呼為粟而粱之名反隱矣今世俗稱粟中之大穗長芒粗粒而有紅毛白毛黃毛之品者即粱也蘇恭曰黃粱出蜀漢商浙間穗大毛長榖米俱粗于白粱而收子少不耐水旱食之香美勝于諸粱人號竹根黃白粱穗大多毛且長而榖粗扁長不似粟圎也米亦白而大食之香美亞于黃粱青粱殼穗有毛而粒青米亦微青而細于黃白粱粒似青稞而少粗早熟而收薄夏月食之極為清涼但味短色惡不如黃白粱北人少種之作餳清白勝于餘米廣志有具粱解粱有遼東赤粱魏武帝常以作粥彚考增禮記曲禮粱曰薌萁疏粱曰薌萁者粱謂白粱黃粱也萁語助也周禮天官犬宜粱疏犬宜粱者犬味酸而溫粱米味甘而微寒氣味相成故云犬宜粱集藻五言律詩原唐杜甫佐還山後寄一首白露黃粱熟分張素有期已應舂得細頗覺寄來遲味豈同金菊香宜配緑葵老人他日愛正想滑流匙詩散句增唐杜甫新炊間黃粱别録原種榖地欲肥耕欲細欲深秋耕更佳種欲成實不秕用臘雪水浸過耐旱辟蟲時欲仲春得雨為妙小雨欲接濕大雨須俟少乾先耙後種種後旋以石砘砘令土堅則苗出旺相如遇天旱苗出土仍砘春種欲深夏種欲淺早禾晚禾欲兼種防嵗有所宜一云閏月年宜晚田然大率宜早早田收多于晚早田淨而易治晚者蕪穢難治且早榖米實而多晚榖皮厚米少而虛行欲稀諺云稀榖大穗來年好麥鋤榖鋤以三遍四遍為度第一遍曰撮苗留苗欲密第二遍曰定科留其壯者去其密者弱者第三遍曰擁本鋤欲深擁其土以護根則耐旱第四遍曰復壟俗名添米五榖惟小鋤為良苗出壟則深鋤鋤不厭數周而復始勿以無草而怠功鋤者非止去草蓋地熟而實多粳薄而米美鋤得十遍可得八米春鋤起地夏鋤除草春鋤不用觸濕六月以後雖濕亦無嫌刈榖食貨志云力耕數耘收穫如盜賊之至故熟速刈乾速積刈早則傷鎌刈晚則折穗遇風則收減濕積則藁爛積晚則粒耗連雨則生耳所以收穫不可緩也收穫者農事之終務本者可怠焉而自棄其前功乎積榖周禮地官曰舍人掌粟入之藏注曰九榖俱藏以粟為主神農之教曰有石城十仞湯池百步帶甲百萬而無粟弗能守也北方水土深厚窖地而藏可數十年不壞秫按秫與粟同類異種原譜言粟而不及秫今從本草增入增爾雅衆音終秫注謂黏粟也疏與榖相似其莖桿似禾而粗大者是也本草秫一名糯秫一名糯粟一名黃糯秫字篆文象其禾體柔弱之形俗呼糯粟北人呼為黃糯亦曰黃米釀酒劣于糯也蘇恭曰凡黍稷粟秫粳糯三榖皆有秈糯也李時珍曰秫即粱米粟米之黏者有赤白黃三色皆可釀酒圖經謂秫為黍之黏者説文謂秫為稷之黏者古今注謂秫為稻之黏者皆誤也惟蘇恭以粟秫分秈糯孫炎注爾雅謂秫為黏粟者得之廣志有胡秫早熟及麥齊民要術按今世有黃粱榖秫桑根秫櫶天培秫也彚考增晉書孔羣傳羣性嗜酒嘗與親友書云今年田得七百石秫米不足了麴糵事燕翼貽謀録宋种放有别墅在終南山聚徒講學性嗜酒種秫自釀林泉之景頗為幽勝真宗聞之欲幸其家而不果咸平六年遣使畫圖以進澄懷録种眀逸嗜酒嘗種秫自釀曰空山清寂聊以養和自號雲溪醉侯聞竒録徐庭實巡官説乾符中武義縣有人入山掘地二尺忽陷丈餘深數尺收得秫百斛莫知其由將醞酒其味濃厚詩散句增晉陶潛春秫作美酒酒熟吾自斟宋陸遊供秫借留客元方夔種秫田多早帶秋附録穇子原穇子一名龍爪粟一名鴨爪稗本草云穇乃不黏之稱亦不實之貌龍爪鴨爪象其形也北地荒坡處種之苗葉似榖至頂抽莖有三稜開細花簇簇結穗如粟穗而分數岐如鷹爪之狀內有細子如黍粒而細褐色味澀稃甚薄碾米煮粥炊飯磨麵蒸食皆宜可救荒附録稊稗增爾雅蕛苵注蕛似稗布地生穢草疏似稗之穢草也爾雅翼稊與稗二物也皆有米而細小本草稗乃禾之卑賤者也故字從卑陳藏器曰有二種一黃白色一紫黑色紫黑者似芑有毛北人呼為烏禾原稗野生苗葉似穇子色深緑根下葉蒂紫色梢頭出扁穗結子如黍粒茶褐色味微苦用與􅭜子同食之益氣宜脾故曹植有芳菰精稗之稱苗根治金瘡及損傷血出不已搗敷即止甚驗每一斗得米三升稊苗似稗而穗如粟有紫毛即烏禾也可救荒又可殺蟲煮以沃地螻蚓皆死彚考增孟子五榖者種之美者也茍為不熟不如荑稗莊子道在稊稗原淮南子離先稻熟而農夫薅之不以小利傷大穫也注離與稻相似增江表傳吳五鳳元年交趾稗草化為稻三峽考峽內隙地沙土宜黍稷菽麥獨不宜粳秫耳又一種自滇中來者曰雲南稗一曰雁爪稗以形似名亦播種畦植與五榖爭價東南所無也集藻七言古詩增元方回種稗歎農田插秧秧緑時稻中有稗農未知稻苗欲秀稗先出拔稗飼牛惟恐遲今年浙西田沒水却向浙東糴稗子一斗稗子價幾何已值去年三斗米天災使然􅎓勝真焉得世間無稗人别録增汜勝之書稗既堪水旱種無不熟之時又特滋茂良田畝得二三十斛魏武使典農種之頃收二千斛斛得米三四斗釀酒甚美釅炊食不減粟米可備荒稗稈一畝則當稻稈二畝宜擇其秸長而粒大種之倘遇水旱便可多種亦救荒之一助附録稂增爾雅稂童粱注稂莠類也疏今人謂之宿田翁或謂之守田也説文稂禾秀之穗生而不成者謂之蕫蓈爾雅翼稂惡草與禾相雜本草一名狼尾草爾雅云盂狼尾注云似茅可以覆屋本草拾遺謂即此物按爾雅已釋稂曰童粱果為一物不當重出也姑存之以備考陳藏器曰生澤地似茅作穗廣志云子可作黍食李時珍曰莖葉穗粒並如粟而穗色紫黃有毛荒年亦可采食彚考增詩曹風冽彼下泉浸彼苞稂小雅不稂不莠韓詩外傳馬不過稂莠附録菵草增爾雅皇守田注似燕麥子如雕胡米可食生廢田中一名守氣爾雅翼菵米可為飯生水田中苖子似小麥而小四月熟久食不飢爾雅所謂皇守田也附録蒯草增爾雅翼蒯草子堪食如粳米附録東牆增廣志東牆色青黑粒如葵子似蓬草色青黑十一月熟出幽涼并烏丸地魏書烏丸地宜東牆似穄可作白酒本草東牆生河西河西人語云貸我東牆償爾田粱附録粱禾增本草李時珍曰廣志云粱禾蔓生其子如葵子其米粉白如麵可作饘粥六月種九月收牛食之尤肥此亦一榖似東牆者也附録蒒草增本草蒒草一名自然榖一名禹餘糧言禹治水棄其餘糧化而為此詳見後博物志寇珣曰蒒實如毬子八月收之海上民常食中國未嘗見也李時珍曰方孝孺有海米行亦蒒草之類也彚考增博物志扶海洲上有草名曰蒒其實如大麥從七月熟民斂穫至冬乃訖名曰自然榖或曰禹餘糧集藻七言古詩增眀方孝孺海米行海邉有草名海米大非蓬蒿小非薺婦女攜籃書作羣采摘聊于海中洗歸來滌釜燒松枝煮米為飯充朝飢莫辭苦澀咽不下性命聊假須臾時附録感禾增齊民要術感禾扶疏生實似大麥附録楊禾增齊民要術楊禾似藋粒細左折右炊停則牙生附録火禾增齊民要術火禾髙丈餘子如小豆出粟特國附録木禾增山海經崑崙墟上有木禾長五尋大五圍彚考增穆天子傳天子東征至于重氏黑水之阿爰有野麥爰有答堇西膜之所謂木禾重氏之所食嘉禾按詩注黍稷稻粱皆名