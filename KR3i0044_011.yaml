body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九榖譜黍原黍汜勝之書云黍者暑也待暑而生暑後乃成也説文云黍可為酒従禾入水為意六書精藴云禾下從氽象細粒㪚垂之形古今注云禾之黏者為黍一名秬爾雅云秬黒黍一名秠爾雅云秠一稃二米注云此亦黒黍但中米異耳有黄白黎三色米皆黄比粟㣲大北人呼為黄米屬火南方之榖性溫益氣補中久食令人多熱小兒忌食他如牛黍燕頷馬革驢皮稻尾大黒黍秀成赤黍皆黍之異名也増廣志有濕屯黄黍有田黍塸云鶯鴿之名齊民要術今俗有鶯闕一字黍半夏黍博雅黍穰謂之䅀原苗穂與稷同宜肥地多収刈後乗濕即打則稃易脫遲則稃著粒上難脫彚考原詩王風彼黍離離曹風芃芃黍苗隂雨膏之小雅我黍與與大雅誕降嘉種維秬維秠恒之秬秠是穫是畝周頌豐年多黍多稌増詩小序華黍時和嵗豐宜黍稷也禮記曲禮黍曰薌合疏黍曰薌合者夫榖秫者曰黍秫既輭而相合氣息又香故曰薌合也原王制秋薦黍月令仲夏之月農乃登黍天子乃以雛嘗黍羞以含桃先薦寢廟注必以黍者黍火榖氣之主也増周禮天官羊宜黍疏羊宜黍者羊味甘熱黍味苦溫甘苦相成故云羊宜黍左傳其蔵之也黒牡秬黍以享司寒國語黍而不黍不能蕃庶原史記封禪書管仲說威公曰古之封禪鄗上之黍北里之禾所以為盛増漢書律厯志度者分寸尺丈引也所以度長短也本起黄鐘之長以子榖秬黍中者一黍之廣度之九十分黄鐘之長注師古曰子榖猶言榖子秬即黒黍中者不大不小也言取黒黍榖子大小中者率為分寸也原宋書符瑞志黄帝時南夷乗白鹿来獻秬鬯増隋書隠逸傳李士謙字子約趙郡平棘人也李氏宗黨豪盛每至春秋二社必髙㑹極歡無不沉醉喧亂嘗集士謙所盛饌盈前而先為設黍謂羣從曰孔子稱黍五榖之長荀卿亦云食先黍稷古人所尚容可違乎少長肅然不敢弛惰退而相謂曰既見君子方覺吾徒之不徳也唐書王績傳績有奴婢數人種黍春秋釀酒養鳧雁蒔藥草自供山海經廣都之野后稷葬焉爰有膏黍膏稷註言味好滑如膏驩頭之國維宜芑苣樛楊是食註苣黒黍今字從禾原家語孔子侍坐扵魯哀公設桃具黍公曰以黍雪桃也孔子對曰夫黍五榖之長也祭先王以為上盛果有六而桃為下祭先王不得入扵廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五榖之長雪𤓰蓏之下是侵上忽下也増列子鄒衍在燕有谷地美而寒不生五榖鄒子吹律而溫氣至今傳名曰黍谷原韓子呉起欲攻秦小亭置一石赤黍扵東門外令人能徙於西門外者賜之上田宅人爭徙之乃下令曰眀日攻秦能先登者與之大夫賜之上田宅扵是攻之一朝而㧞増韓子韓昭侯之時黍種嘗貴尠有昭侯令人覆廩廩吏果竊黍種而糶之淮南子渭水多力而宜黍焦氏易林中田髙黍以享王母受福千億所求大得下田種黍芳華當齒大雨淋集紛榮滿壅春秋佐助期黍神名侜佞姓蘭郝春秋說題辭精移火轉生黍夏出秋改黍者縮也故其立字木入米為黍酒以扶老東觀漢紀承宫字少子瑯琊人嘗將妻子入華盖蒙隂山谷耕種禾黍臨熟人就認之宫便推與而去由是發名古今注和帝元興元年黒黍穂一禾二實或三四實生任城得粟二斛八斗以薦宗廟博物志黒墳宜麥黍紀年書恵成王八年雨黍文中子藝黍登場嵗不過數石以供祭祀賔客之酒也談藪王元景大醉楊遵彦曰何大低昻元景曰黍熟頭低麥熟頭昻黍麥俱有所以低昻農桑通訣秬鬯一卣此言黍之為酒尚矣今有赤黍米黄而黏可蒸食白黍釀酒亞扵糯秫又北地逺處惟黍可生其莖穂低小可以釀酒又可作饌粥黏滑而甘凡祭祀以為上盛貴其色味之美也原成化元年天雨黒黍扵襄陽集藻賦増晋嵇含孤黍賦余慎終屋之南榮有孤黍生焉因泥之濕遭土之潤宿昔芽蘖滋茂甚速塗燥根淺忽然萎隕深感此黍不韜種以待時貪榮棄本寄身非所自取凋枯不亦宜乎文賦散句原漢張恊七命大梁之黍瓊山之禾唐稷播其根農帝嘗其華増劉穎魯都賦禾黍油油秔族垂芒殘穂滿握一穎盈箱魏王粲登樓賦華實蔽野禾黍盈疇四言古詩原晋束晳華黍黮黮重雲習習和風黍華陵巔麥秀丘中靡田不播九榖斯豐奕奕𤣥霄濛濛甘霤黍發稠華亦挺其秀靡田不植九榖斯茂無髙不播無下不植芒芒其稼參參其穡稸我王委充我民食玉燭陽眀顯猷翼翼詩𣪚句増唐李白東臯春事起種黍早歸田杜甫耕田秋雨足禾黍已映道頼知禾黍収已覺糟床注原耿湋古道無人行秋風動禾黍宋蘇軾今年秋應熟過従飽雞黍金趙元還思釀新黍甕面挹秋江唐曹鄴黒黍春来釀酒飲青禾刈了驅牛載増韋應物禾黍積東菑宋邵雍黄黍秋正熟陸游種黍蹋麴糵唐白居易陶令有田唯種黍韋莊主人饋餉炊紅黍宋王安石連山沒雲皆種黍陸游黍酒新成壓小槽别錄増齊民要術凡黍穄田新開荒為上大豆底為次榖底為下地必欲熟再轉乃佳若春夏耕者下種後再勞為良一畝用子四升三月上旬種者為上時四月上旬為中時五月上旬為下時夏種黍穄與植榖同時非夏者大率以椹赤為候諺曰椹離離種黍時燥濕候黄塲種訖不曵撻常記十月十一月十二月凍樹日種之萬不失一凍樹者凝霜封著木條也假令月三日凍樹還以月三日種黍他皆倣此十月凍樹宜早黍十一月凍樹宜中黍十二月凍樹宜晩黍若従十月至正月皆凍樹者早晚黍悉宜也苖生隴平即宜杷勞鋤三遍乃止鋒而不耩苖晚耩即多折也刈穄欲早刈黍欲晩穄晩多零落黍早米不成皆即濕踐之穄踐訖即蒸而裛之不蒸者難舂米碎蒸則易舂米堅香氣經夏不歇黍宜曬之令燥濕聚則鬱凡黍黏者収薄穄味美者亦収薄難舂雜隂陽書曰黍生扵榆六十日秀秀後四十日成黍生扵巳壮扵酉長扵戌老扵亥死扵丑惡扵丙午忌於丑寅卯穄忌扵未寅孝經援神契云黒墳宜黍麥尚書考靈曜云夏火星昬中可以種黍菽汜勝之書曰種黍必待暑先夏至二十日此時有雨疆土可種黍一畝三升黍心未生雨灌其心心傷無實黍心初生畏露令人對持長索槩去其露日出乃止凢種黍覆土鋤治皆如禾法欲疎扵禾按疎黍雖科而米黄又多减及空令穊雖不科而米白且均熟不减更勝踈者汜氏云欲疎扵禾其義未聞崔氏曰四月蠶入簇時雨降可種黍禾夏至先後各二日可種黍蟲食李者黍貴也原製用三月三日取黍麪和菜作羮能避時氣黍米性黏可釀酒可作餳可蒸煮為糕糜五月五日俗以菰葉裹成糭名角黍祭三閭大夫遺製也合葵菜食成痼疾合牛肉白酒食生寸白蠱穰及根煑汁解苦瓠毒浴去浮腫醉臥黍穰令人生厲落眉髮稷原稷一名穄六書故云稷穄同聲實一字也本草云稷従畟畟進力治稼也種稷者必畟畟進力也南人承北音呼稷為穄謂可供祭也一名粢爾雅云粢稷疏云粢者稷也闗西謂之􅓱音靡見唐本草冀北謂之䵖音牽去聲廣雅云䵖穄也苖似蘆莖髙三四尺有毛結子成枝而疎散外有薄殻粒如粟而光滑色紅黄米似粟米而稍大色黄鮮麥後先諸米熟炊飯疎爽香美故以供祭食之益氣安中宜脾利胃凉血解暑壓丹石毒屬土脾之榖也脾病宜食多食發冷病増本草稷與黍一類二種也黏者為黍不黏者為稷稷可作飯黍可釀酒猶稻之有稉與糯也其色有赤白黄黒數種黒者禾稍髙俗通呼為黍子不復呼為稷矣北邊地寒種之有補河西出者顆粒尤硬廣志穄有赤白黒青黄鶯鴿凡五種破减稷逼麥稷此二者以四月熟齊民要術按今俗有驢皮穄博雅稷穰謂之䅳彚考原詩王風彼稷之苖小雅我稷翼翼増禮記曲禮稷曰眀粢疏稷曰眀粢者稷粟也眀白也言此祭祀眀白粢也月令孟秋之月農乃登榖註榖謂稷也周禮天官豕宜稷疏豕宜稷者牝豬味酸牝豬味苦稷米味甘甘苦相成故曰豕宜稷隋書天文志稷五星稷農正也取乎百榖之長以為號也穆天子傳天子西征至于赤烏之人獻穄麥百載天子北征入于曹奴之人獻穄米百車天子西征至于􅜑韓氏爰有樂野溫和穄麥之所草天子東南翔行馳驅千里至扵巨蒐之人奴獻秋麥千車膜稷三十車原吕氏春秋飯之美者有陽山之穄増風俗通米之神為稷故以癸未日祠稷扵西南水勝火為金相也孝經說稷者五榖之長五榖衆多不可徧祭故立稷而祭之尚書考靈曜春鳥星昏中以種稷秋虚星昬中以収歛白虎通稷者得隂陽中和之氣而用尤多故為長也獨斷稷神盖厲山氏之子柱也柱能植百榖帝顓頊之世舉以為田正天下頼其功周棄亦播植百榖以稷五榖之長也因以稷名其神也齊民要術榖者總名非止為粟也然今人専以稷為榖俗名之耳爾雅翼稷者五榖之長以其中央之榖月令中央土食稷與牛五行土為尊故五榖稷為長兼眀書或問曰稷既百榖之神不言榖而云稷者何也答曰稷屬土而為諸榖之長故月令謂之首種首種者種最在前也諸榖不可徧舉故舉其長而為言之以等之也若直以榖言則為人所䙝慢也别録増兩鈔摘腴毛詩傳注先集維霰曰霰稷雪也或謂之米雪謂其粒若稷米然本草衍義穄米其香可愛故取以供祭祀然發故疾只堪作飯不黏其味淡原稷三月種耘四遍七月熟四五月亦可種但収少遲耳刈稷欲早八九月熟便刈少遲遇風即落忌與瓠子附子同食蜀黍原蜀黍一名蜀秫種自蜀来故以蜀為名農政全書云其黏者近秫故借名為秫一名蘆穄一名蘆粟一名髙粱形類黍稷而髙大如蘆荻故有諸名一名木稷一名荻粱廣雅云荻粱木稷也種宜卑下地春月早種得子多秋収莖麤髙丈餘状似蘆荻而内實葉亦似蘆穂大如帚粒大如椒紅黒色米性堅實黄赤色熟時先刈其穂稭成束攢而立之方得乾米有二種黏者可和糯秫釀酒作餌不黏者可作糕煮粥可濟飢亦可養畜莖可織箔編席夹籬供㸑梢可作筅帚殻浸水色紅可以紅酒有利扵民者最博性溫澀溫中澀腸胃止泄㵼彚考増博物志三年種蜀黍其後七年多虵别録增農政全書𤣥扈先生曰蜀秫在北方地不宜麥禾者乃種此尤宜下地立秋後五日雖水潦至一丈深不能壊之立秋前水至即壊故北土築堤二三尺以禦暴水附録玉蜀黍原作御麥附麥後按御麥乃別名實蜀黍類也今移入此原玉蜀黍一名玉髙粱一名戎菽一名御麥以其曾經進御故名御麥出西番舊名番麥按農政全書又作玉米𤣥扈先生曰玉米或稱玉麥或稱玉蜀秫従他方得種其曰米麥秫皆借名之幹葉類蜀黍而肥矮亦似薏苡苖髙三四尺六七月開花成穂如秕麥状苖心别出一苞如㯶魚形苞上出鬚如紅絨垂垂久則苞拆子出顆顆攢簇子粒如芡實大而瑩白花開扵頂實結扵節粟原粟古作㮚象穂在禾上之形說文云粟之為言續也續扵榖也粱屬也盖梁之細者本草云穂大而毛長粒麤者為粱穂小而毛短粒細者為粟北方直名之曰榖脫殻則謂之小米増本草粟一名秈粟古以粟為黍稷粱秫之總稱而今之粟在古但呼為粱後人乃專以粱之細者名粟大扺黏者為秫不黏者為粟故呼此為秈粟以别秫而配秈原稈髙三四尺似蜀秫稈中空有節細而矮葉似蘆小而有毛穂似蒲有毛顆粒成簇性鹹淡養脾胃補虚損益丹田利小便解熱毒陳者尤良北人日用不可缺者諺云榖三千一穂之實至三千顆言多也其名或因姓氏地里或因形似時令早則有趕麥黄百日糧六十日還倉之類中則有八月黄老軍頭之類晩則有鴈頭青寒露粟鐡鞭頭之類又有粱榖滑榖白榖白榖黄米黄榖白米之類増廣志有赤粟白莖有黑格雀粟有張公斑有含黄有蒼背稷有雪白粟亦名白粟又有白藍下竹頭青白逯麥擢石精狗蹯之名種云齊民要術朱榖髙居黄劉猪獬道愍黄聒榖黄雀懊黄續命黄百日糧有起婦黄辱稻糧奴子塲音加支榖焦金黄䳺殦合履今一名麥爭塲此十四種早熟耐旱免蟲聒榖黄辱稻糧二種味美今墮車下馬看白羣羊懸蛇赤尾龍虎黄雀民溱馬洩韁劉猪赤李谷黄河摩糧東海黄石䮑嵗青莖青黒好黄陌南木隈隄黄宋􅀢癡指張黄兎胠青恵日黄寫風赤一睍黄山鹺頓黨黄此二十四種穂皆有毛耐風免雀暴寶珠黄俗得白張鄰黄白鹺榖銁扵黄張蟻白耿虎黄都奴赤茄蘆黄薫猪赤魏爽黄白莖青竹根黄調母粱磊碨黄劉沙白憎延黄赤粱榖靈忽黄獺尾青續得黄得容青孫延黄猪矢青烟熏黄樂婢青平夀黄鹿橛白鹺折作黄􅀈􅭜阿居黄赤巴粱鹿蹄黄鉞狗倉可憐黄米谷鹿橛青阿返此三十八種中麤大榖白鹺榖調母粱二種味美擇谷青阿居黄猪矢青有二種味惡黄􅀈􅭜樂婢青二種易舂石栁閱竹葉青一名胡谷水黒榖忽泥青衝天棒雉子青鴟脚榖雁頭青攬堆黄青子規此十種晚熟耐蟲災則盡矣彚考原左傳襄公二十九年鄭子展卒子皮即位扵是鄭饑而未及麥民病子皮以子展之命餼國人粟户一鍾晋書孝友傳劉殷夢人曰西籬下有粟寤而掘之果得粟十五鍾銘曰七年粟賜孝子劉殷宋書符瑞志文帝元嘉二十二年醴湖屯生瑞粟一莖九穂増宋史食貨志初農時太宗嘗令取畿内青苖觀之聽政之次出示近臣是嵗畿内菽粟苖皆長數尺帝顧謂左右曰朕每念耕稼之勤茍非兵食所資固當盡復其租稅管子桓公觀扵野曰何物可比君子之徳隰朋曰粟可比君子之徳管仲曰苖始出生也眴眴乎似孺子安之則安不得則危命之曰禾可比君子桓公曰善原韓非子鄒穆公有令食鳧雁者必以秕無敢以粟鳧雁無食而以一石粟易一石秕其費甚矣請以粟食之公曰非爾所知也夫百姓餉牛而耕曝背而耘勤而不敢惰者豈為鳥獸食哉粟米人之上食也奈何以養鳥汝知小計而不知大害矣淮南子昔者倉頡作書而天雨粟増風俗通燕太子丹仰天歎天為雨粟焦氏易林新田宜粟上農得榖君子懐徳以千百福春秋說題辭粟助陽扶性粟之為言續也粟五變一變而以陽生為苖二變而秀為禾三變而祭然謂之粟四變入臼米出甲五變而蒸飯可食陽以一立為法故粟積大一分穂長一尺文以七列精以五六立故其字為粟西者金所立米者陽精故西字合米而為粟博物志雁食粟則翼重不能飛古今注武帝建元四年天雨粟宣帝地節三年長安雨黒粟元帝竟寧元年山都縣雨粟色青黒味苦大者如小豆小者如麻子拾遺記樂浪之東有背眀之國宜種百榖有搖枝粟其枝長而弱無風常搖食之益髓有鳳冠粟似鳳鳥之冠食者多力有㳺龍粟葉屈曲似游龍也有瓊膏粟白如銀食此二粟令人骨輕員嶠山一名環丘上有方湖周廻千里多大鵲髙一丈銜不周之粟粟穂髙三丈粒皎如玉鵲銜粟飛扵中國故世俗間往往有之其粟食之厯月不饑故吕氏春秋云粟之美者有不周之粟焉述異記宋文帝即位而江表二千餘里野粟生焉原唐紀宣宗大中二年福建進瑞粟十五莖莖五六穂増全唐詩話李紳初以古風求知扵吕溫溫見齊煦誦憫農詩曰春種一粒粟秋収萬顆子四海無閒田農夫猶餓死鋤禾日當午汗滴禾下土誰知盤中飱粒粒皆辛苦曰此人必為卿相果如其言泉州志紫㡌山有金粟洞宋李邴云唐時泉人客洛陽邂逅一羽衣寄書紫㡌隠者既歸授書遺以粟米半升還家視之金粟也宋寧宗御書金粟之洞四字刻扵石集藻七言律詩増宋朱子次秀野種粟韻阿香一笑走豐隆雨徧平疇萬頃中舊喜樊遲知學圃今看許子快論功遙憐鬱鬱翻秋隴預想垂垂弄晩風珍重詩翁且强健東阡南陌興無窮詩𣪚句増唐李白雖有數斗玉不如一盤粟韓愈囷倉榖粟滿未有旦夕憂杜甫瘦地翻宜粟方干舂粟引髙泉宋陸㳺雲嶼鋤畬粟唐杜甫鳥雀苦肥秋粟菽粱按粱與粟一類二種原譜扵粟部内獨載青粱一種者非今従本草増入又按爾雅虋赤苗註云今之赤粱粟芑白苗註云今之白粱粟虋同穈詩大雅維穈維芑傳用爾雅疏亦引郭註以解之自蘓頌圖經夲草列扵黍部李時珍本草綱目因之而遂辨郭註為非誤矣増本草粱粱者良也榖之良者也即粟也周禮九榖六榖之名有粱無粟自漢以後始以大而毛長者為粱細而毛短者為粟今則通呼為粟而粱之名反隠矣今世俗稱粟中之大穂長芒麤粒而有紅毛白毛黄毛之品者即粱也蘇恭曰黄粱出蜀漢商浙間穂大毛長榖米俱麤于白粱而収子少不耐水旱食之香美勝于諸粱人號竹根黄白粱穂大多毛且長而榖麤扁長不似粟圎也米亦白而大食之香美亞于黄粱青粱殻穂有毛而粒青米亦㣲青而細于黄白粱粒似青稞而少麤早熟而收薄夏月食之極為清凉但味短色惡不如黄白粱北人少種之作餳清白勝于餘米廣志有具粱解粱有遼東赤粱魏武帝常以作粥彚考増禮記曲禮粱曰薌萁疏粱曰薌萁者粱謂白粱黄粱也萁語助也周禮天官犬宜粱疏犬宜粱者犬味酸而溫粱米味甘而㣲寒氣味相成故云犬宜粱集藻五言律詩原唐杜甫佐還山後寄一首白露黄粱熟分張素有期已應舂得細頗覺寄来遲味豈同金菊香宜配綠葵老人他日愛正想滑流匙詩散句増唐杜甫新炊間黄粱别錄原種榖地欲肥耕欲細欲深秋耕更佳種欲成實不秕用臘雪水浸過耐旱辟蟲時欲仲春得雨為妙小雨欲接濕大雨須俟少乾先耙後種種後旋以石砘砘令土堅則苗出旺相如遇天旱苗出土仍砘春種欲深夏種欲淺早禾晩禾欲兼種防嵗有所宜一云閏月年宜晩田然大率宜早早田収多扵晩早田淨而易治晚者蕪穢難治且早榖米實而多晚榖皮厚米少而虚行欲稀諺云稀榖大穂来年好麥鋤榖鋤以三遍四遍為度第一遍曰撮苗留苗欲密第二遍曰定科留其壮者去其密者弱者第三遍曰擁本鋤欲深擁其土以䕶根則耐旱第四遍曰復壟俗名添米五榖惟小鋤為良苗出壟則深鋤鋤不厭數周而復始勿以無草而怠功鋤者非止去草盖地熟而實多糠薄而米美鋤得十遍可得八米春鋤起地夏鋤除草春鋤不用觸濕六月以後雖濕亦無嫌刈榖食貨志云力耕數耘収穫如盗賊之至故熟速刈乾速積刈早則傷鎌刈晩則折穂遇風則収減濕積則藁爛積晩則粒耗連雨則生耳所以収穫不可緩也収穫者農事之終務本者可怠焉而自棄其前功乎積榖周禮地官曰舍人掌粟入之蔵註曰九榖俱蔵以粟為主神農之教曰有石城十仞湯池百歩帶甲百萬而無粟弗能守也北方水土深厚窖地而藏可數十年不壊秫按秫與粟同類異種原譜言粟而不及秫今従本草増入増爾雅衆音終秫注謂黏粟也疏與榖相似其莖桿似禾而麤大者是也本草秫一名糯秫一名糯粟一名黄糯秫字篆文象其禾體柔弱之形俗呼糯粟北人呼為黄糯亦曰黄米釀酒劣扵糯也蘇恭曰凢黍稷粟秫稉糯三榖皆有秈糯也李時珍曰秫即粱米粟米之黏者有赤白黄三色皆可釀酒圖經謂秫為黍之黏者說文謂秫為稷之黏者古今注謂秫為稻之黏者皆誤也惟蘇恭以粟秫分秈糯孫炎注爾雅謂秫為黏粟者得之廣志有胡秫早熟及麥齊民要術按今世有黄粱榖秫桑根秫櫶天培秫也彚考増晋書孔羣傳羣性嗜酒嘗與親友書云今年田得七百石秫米不足了麴糵事燕翼貽謀錄宋种放有别墅在終南山聚徒講學性嗜酒種秫自釀林泉之景頗為幽勝真宗聞之欲幸其家而不果咸平六年遣使畫圖以進澄懐錄种眀逸嗜酒嘗種秫自釀曰空山清寂聊以養和自號雲溪醉侯聞竒録徐庭實廵官説乾符中武義縣有人入山掘地二尺忽䧟丈餘深數尺収得秫百斛莫知其由将醞酒其味濃厚詩散句増晋陶潛春秫作羙酒酒熟吾自斟宋陸游供秫借留客元方夔種秫田多早帯秋附録穇子原穇子一名龍爪粟一名鴨爪稗本草云穇乃不黏之稱亦不實之貌龍爪鴨爪象其形也北地荒坡處種之苗葉似榖至頂抽莖有三稜開細花簇簇結穂如粟穂而分數岐如鷹爪之状内有細子如黍粒而細褐色味澀稃甚薄碾米煮粥炊飯磨麪蒸食皆宜可救荒附録稊稗増爾雅蕛苵注蕛似稗布地生穢草疏似稗之穢草也爾雅翼稊與稗二物也皆有米而細小本草稗乃禾之卑賤者也故字従卑陳藏噐曰有二種一黄白色一紫黒色紫黒者似芑有毛北人呼為烏禾原稗野生苗葉似穇子色深綠根下葉蔕紫色梢頭出扁穂結子如黍粒茶褐色味㣲苦用與􅭜子同食之益氣宜脾故曹植有芳菰精稗之稱苗根治金瘡及損傷血出不已搗敷即止甚騐每一斗得米三升稊苗似稗而穂如粟有紫毛即烏禾也可救荒又可殺蟲煮以沃地螻蚓皆死彚考増孟子五榖者種之美者也茍為不熟不如荑稗荘子道在稊稗原淮南子離先稻熟而農夫薅之不以小利傷大穫也注離與稻相似増江表傳吴五鳳元年交趾稗草化為稻三峡考峡内隙地沙土宜黍稷菽麥獨不宜秔秫耳又一種自滇中来者曰雲南稗一曰雁爪稗以形似名亦播種畦植與五榖争價東南所無也集藻七言古詩増元方回種稗歎農田插秧秧綠時稻中有稗農未知稻苗欲秀稗先出㧞稗飼牛惟恐遲今年淛西田沒水却向淛東糴稗子一斗稗子價㡬何已值去年三斗米天災使然􅎓勝真焉得世間無稗人别録増汜勝之書稗既堪水旱種無不熟之時又特滋茂良田畝得二三十斛魏武使典農種之頃収二千斛斛得米三四斗釀酒甚美釅炊食不减粟米可備荒稗稈一畝則當稻稈二畝宜擇其秸長而粒大種之倘遇水旱便可多種亦救荒之一助附録稂増爾雅稂童粱注稂莠類也疏今人謂之宿田翁或謂之守田也說文稂禾秀之穂生而不成者謂之蕫蓈爾雅翼稂惡草與禾相雜本草一名狼尾草爾雅云盂狼尾註云似茅可以覆屋本草拾遺謂即此物按爾雅已釋稂曰童粱果為一物不當重出也姑存之以備考陳藏噐曰生澤地似茅作穂廣志云子可作黍食李時珍曰莖葉穂粒並如粟而穂色紫黄有毛荒年亦可采食彚考増詩曹風冽彼下泉浸彼苞稂小雅不稂不莠韓詩外傳馬不過稂莠附録菵草増爾雅皇守田注似燕麥子如雕胡米可食生廢田中一名守氣爾雅翼菵米可為飯生水田中苖子似小麥而小四月熟久食不饑爾雅所謂皇守田也附録蒯草増爾雅翼蒯草子堪食如秔米附錄東廧増廣志東廧色青黒粒如葵子似蓬草色青黒十一月熟出幽凉并烏丸地魏書烏丸地宜東廧似穄可作白酒本草東廧生河西河西人語云貸我東廧償爾田粱附錄粱禾増本草李時珍曰廣志云粱禾蔓生其子如葵子其米粉白如麪可作饘粥六月種九月収牛食之尤肥此亦一榖似東廧者也附録蒒草増本草蒒草一名自然榖一名禹餘糧言禹治水棄其餘糧化而為此詳見後博物志㓂珣曰蒒實如毬子八月収之海上民常食中國未嘗見也李時珍曰方孝孺有海米行亦蒒草之類也彚考増博物志扶海洲上有草名曰蒒其實如大麥從七月熟民歛穫至冬乃訖名曰自然榖或曰禹餘糧集藻七言古詩増眀方孝孺海米行海邉有草名海米大非蓬蒿小非薺婦女攜籃書作羣采摘聊扵海中洗歸来滌釜燒松枝煮米為飯充朝饑莫辭苦澁咽不下性命聊假須臾時附録感禾増齊民要術感禾扶疎生實似大麥附録楊禾増齊民要術楊禾似藋粒細左折右炊停則牙生附録火禾増齊民要術火禾髙丈餘子如小豆出粟特國附録木禾増山海經崑崙墟上有木禾長五㝷大五圍彚考増穆天子傳天子東征至扵重氏黒水之阿爰有野麥爰有荅堇西膜之所謂木禾重氏之所食嘉禾按詩注黍稷稲粱皆名