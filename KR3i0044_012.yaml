body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷十榖譜大豆按黑豆黃豆皆名大豆原譜分而為二今從齊民要術併合為一原豆者莢榖之總名也大者謂之菽增本草大豆有黑白黃褐青斑數色原黑豆處處有之苗髙三四尺蔓生莖葉蔓延葉團有尖色青帶黑上有小白毛秋開小白花成叢結莢長寸餘多者五六粒亦有一二粒者經霜乃熟緊小者為雄豆入藥良大者止堪食用作䜴及喂牲畜味生則平炒則熱煮則寒作豉主發散造醬及生黃卷平牛食之溫馬食之冷一體之中用之數變小兒以炒豆同豬肉食多壅氣致死十嵗以上則無妨服蓽麻子及厚朴者並忌炒豆犯之脹滿致死黃豆亦有小大二種種耘收穫苗葉莢萁與黑豆無異惟葉之色稍淡結角比黑豆稍肥其豆可食可醬可豉可油可腐腐之滓可喂豬荒年人亦可充飢油之滓可糞地萁可然火葉名藿嫩時可為茹增廣志有黃落豆有御豆其豆角長有場豆葉可食有青有黃者齊民要術今世大豆有黑白二種及長梢牛踐之名又有黑髙麗豆燕豆大豆類也彚考增詩豳風七月亨葵及菽小雅中原有菽庶民采之采菽采菽筐之筥之傳菽所以芼太牢而待君子也箋采之者采其葉以為藿三牲牛羊豖芼以藿王饗賓客有生爼乃用鉶羮故使采之原大雅藝之荏菽荏菽斾斾增禮記檀弓啜菽飲水盡其歡月令孟夏之月天子食菽與雞注菽實孚甲堅合屬水雞木畜時熱食之亦以安性也原左傳周子有兄而無慧不能辨菽麥注菽大豆也豆麥殊形易别故以為癡者之候增戰國䇿張儀為秦連橫説韓王曰韓地險惡山居五榖所生非麥而豆民之所食大抵豆飯藿羮注藿菽之少者姚云史記後語作非菽而麥下文亦作菽古語只稱菽漢以後方呼豆史記周后稷本紀棄為兒時屹如巨人之志其遊戲好種樹麻菽麻菽美前漢書鮑宣傳漿酒藿肉注師古曰藿豆葉也楊惲傳惲報孫會宗書詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時後漢書馮異傳王郎起光武自薊東南馳晨夜草舍至饒陽蕪蔞亭時天寒烈衆皆飢疲異上豆粥眀旦光武謂諸將曰昨得公孫豆粥飢寒俱解後帝即位使中黃門賜以珍寶詔曰倉卒蕪蔞亭豆粥滹沱河麥飯厚意久不報晉書良吏傳吳隱之介立有清操雖日晏啜菽不饗非其粟隱逸傳翟莊端居篳門啜菽飲水州府禮命及公車徵並不就北齊書厙狄伏連傳冬至之日親表稱賀其妻為設豆餅伏連問此豆因何而得妻對向于食馬豆中分減充用伏連大怒典馬掌食之人並加杖罰唐書韋貫之傳貫之居貧噉豆糜自給揚子子有含菽縕絮而致滋美其親將以求孝也列子周諺曰晨出夜入自以性之恆啜菽茹藿自以味之極呂氏春秋得時之豆長莖短足其莢二七為族多枝數節競葉蕃實淮南子河水中濁而宜菽焦氏易林中原有菽以待饔食飲御諸友所求大得旦樹菽豆暮成藿羮心之所樂志快心歡孝經援神契赤土宜菽春秋佐助期豆神名靈殖姓樂長七尺大目通于時節原東觀漢紀劉平嘗為餓賊所劫叩頭曰老母飢少氣力待平為命願得還飯食母馳來就死涕泣發于肝膽賊即遣去乃托三斗豆以謝賊恩閔貢字仲叔太原人也與周黨相友黨每過仲叔共啜菽飲水無菜茹古今注宣帝元康四年南陽雨豆世説石崇為客作豆粥咄嗟便辦恆冬天得韭萍虀王愷為扼腕乃密貨崇帳下都督問所以都督曰豆至難煮唯預作熟末客至作白粥以投之韭萍虀是搗韭根雜以麥苗爾增鶡冠子兩葉蔽目不見泰山雙豆塞耳不聞雷霆拾遺記樂浪之東有背眀之國宜種百榖有繞眀豆其莖弱自相縈纒有傾離豆言其豆見日葉垂覆地食者不老不疾益都耆舊傳朱倉字卿雲之蜀從處士張寧受春秋糴豆十斛屑之為糧閉戶精誦寧矜之斂得米二十石倉不受一粒爾雅翼八月雨為豆花雨原雙槐嵗抄溫陵人家中元前數日以水浸黑豆暴之及芽以粳皮置盆內鋪沙植豆用板壓長則覆以桶曉則曬之欲其齊而不為風日損也中元則陳于祖宗之前越三日出之洗焯漬以油鹽苦酒香料可為茹捲以麻餅尤佳色淺黃名鵝黃豆生𢎞治乙卯六月黟歙雨豆隆慶六年四月陕西西寧衛天降黑豆遍地人食之則氣閉集藻賦增晉張華豆羮賦乃有孟秋嘉菽垂枝挺英是刈是穫充簞盈篋香鑠和調周疾赴急時御一杯下咽三嘆時在下邑頗多艱難空匱之厄固不輟歡追念昔日啜菽永安頌增宋蘇軾食豆粥頌道人親煮豆粥大衆齊念般若老夫試挑一口已覺西家作馬五言古詩原魏曹植應詔作煮豆然豆萁豆在釜中泣本是同根生相煎何太急晉陶潛歸園田居種豆南山下草盛豆苗稀晨興理荒穢帶月荷鋤歸道狹草木長夕露沾我衣衣沾不足惜但使願無違七言古詩增宋蘇軾豆粥君不見滹沱流澌車折軸公孫倉皇奉豆粥濕薪破竈自燎衣飢寒頓解劉文叔又不見金谷敲氷草木春帳下烹煎皆美人萍虀豆粥不傳法咄嗟而辦石季倫干戈未解身如寄聲色相纒心已醉身心顛倒自不知更識人間有真味豈如江頭千頃雪色蘆茅簷出沒晨煙孤地碓舂粳光似玉沙瓶煮豆軟如酥我老此身無著處賣書來問東家住卧聽雞鳴粥熟時蓬頭曵履君家去方嶽豆苗江南之筍天下竒春風匆匆催上籬秦郵之薑肥勝肉逺莫逹之長負腹先生一鉢同僧居别有方法供齋蔬山房掃地布豆粒不煩勤荷煙中鋤手分瀑泉灑作雨覆以老瓦如穹廬平眀發視玉髯磔一夜怒長堪冰菹自親火候瀹魚眼帶生芼入晴雲碗碧絲髙壓涎滑蓴脆響平欺辛螫蔊晚菘早韭各一時非時不到詩人脾何如此雋咄嗟辦庾郎處貧未為慣詩散句原唐杜甫相㩦行豆田秋花靄霏霏增宋楊萬里道邉籬落半遮眼白白紅紅遍豆花唐張九齡場藿已成嵗杜甫豆子雨已熟宋蘇軾秋霖暗豆莢陸遊宿雨飽豆莢豆莢雨中肥林景熙蟲響豆花秋原唐杜甫南山豆苗早荒穢增許渾童子遙迎種豆歸溫庭筠桑竹參差映豆花宋陸遊籩實傍籬收豆莢楊萬里晚紫豆花初總角元李孝光豆遺晨壠茅齊白眀髙啓白豆花開片雨餘原孟淑卿豆花雨過晚生涼别録原種植槐無蟲宜豆夏至前後下種上旬種則花密莢多宜甲子丙子戊寅壬午及六月三卯日忌西南風及申卯日肥地宜稀薄地宜密才出便鋤草淨為佳使葉蔽其根不畏旱穫宜晚莢赤莖蒼葉微黃方穫增崔實月令二月可種大豆又二月昏參夕杏花盛桑椹赤可種大豆謂之上時四月時雨降可種大小豆雜隂陽書大豆生于槐九十日秀秀後七十日熟豆生于申壯于子長于壬老于丑死于寅惡于甲乙忌于卯午丙丁齊民要術春大豆次植榖之後二月中旬為上時一畝用子八升三月上旬為中時用子一斗四月上旬為下時用子一斗二升嵗宜晚者五六月亦得然稍晚稍加種子地不求熟秋鋒之地即摘種地過熟者苗茂而實少收刈欲晚此不零落刈早損實必須耬下種欲深故豆性強苗深則及澤鋒耩各一鋤不過再葉落盡然後刈葉不盡則難治刈訖則速耕大豆怕雨秋不耕則無澤種茭者用麥底一畝用子三升先漫散訖犁細淺埒而勞之旱則糞堅葉落稀則苗莖不髙深則土厚不生若澤多者先深耕訖逆垈擲豆然後勞之澤少則否為其浥鬱不生九月中候近地葉有黃落者速刈之葉少不黃必浥鬱刈不速逢風則葉落盡遇雨澤爛不成汜勝之書曰大豆保嵗易為宜古之所以備凶年也謹計家口數種大豆率人五畝此田之本也三月榆莢時有雨髙田可種大豆土和無塊畝五升土不和則益之種大豆夏至後二十日尚可種戴甲而生不用深耕大豆須勻而稀豆花憎見日見日則黃爛而根焦也穫豆之法莢黑而莖蒼輒收無疑其實將落反失之故曰豆熟于場于場穫豆即青莢在上黑莢在下泛勝之區種大豆法坎方深各六寸相去二尺一畝得千六百八十坎其坎成取美糞一升合坎中土攪和以內坎中臨種沃之坎三升水坎內豆三粒覆上土勿厚以掌抑之令種與土相親一畝用種一升用糞十六石八斗豆生五六葉鋤之旱者溉之坎三升水丁夫一人可治五畝至秋收一畝中十六石農政全書種大豆鋤成行壠舂穴下種早者二月種四月可食名曰梅豆吳下田家志種豆宜甲子乙丑壬申丙子戊寅壬午壬寅原服食博物志人食豆三年則身重行動難左慈荒年法用大豆粒細調勻者生熟挼之令有光暖徹豆心內先日不食以冷水頓服訖一切魚肉菜果不得復食渴飲冷水初小困十日後體力壯健不思食抱朴子相國張文蔚莊內有鼠狼穴養四子為蛇所吞鼠狼雌雄情切乃于穴外坌土壅穴俟蛇出頭度其回轉不便當腰咬斷而劈腹銜出四子尚有氣置于穴外銜豆葉嚼而敷之皆活後人以豆葉治蛇咬蓋本于此延年祕録服大豆令人長肌膚益顔色填骨髓加氣力補虛能食不過兩劑大豆五升如作醬法取黃搗末以豬肪煉膏和丸梧子大每服五十丸至百丸溫酒下神驗祕方也肥人忌服輟耕録黃山谷煮豆帖云煮黑豆法確豆一升挼莎極淨用貫衆一斤細銼如骰子同豆斟酌水多少慢火煮豆香熟日乾之翻覆令展盡餘汁簸取黑豆去貫衆空心日啖五七粒食百草木枝葉皆有味可飽也荆湖近事陶華以鹽煮黑豆常食之云能補腎蓋豆乃腎之榖其形類腎黑色通腎引之以鹽所以妙也李守愚侵晨井華水吞黑豆五七粒謂之五臟榖至老視聽不衰製用六月六日以洗淨大黃豆煮熟取出候冷以麵為衣攤于席上以衣蓋之又用青蒿㷈一七取出曬乾搓去麵黃入缸煎紫蘇鹽湯候冷浸豆與水平每豆一斤用鹽六兩浸過一夜取出和食香拌勻裝淨罈內令日曬四五日從新搜過一次再曬再搜四五次用附録穭豆原穭豆本草云穭乃自生稻名此豆野生故名一名䝁豆一名䝁菽一名治䝁一名鹿豆一名驢豆黑豆中最細者即黑小豆也野生今下地亦種之小科細粒葉如葛霜後熟可蒸食甘溫無毒炒焦黑熱投酒中治産後冷血赤小豆按廣雅云小豆答也統而名之也齊民要術云小豆有緑赤白三種豆豌豆𧖟豆留豆亦其類也今照本草分列于後原赤小豆一名赤豆一名紅豆處處種之夏至後下種苖髙尺許葉本大末尖至秋開花淡銀褐色有腐氣莢長二三寸比緑豆莢稍大色微白帶紅三青二黃時即收之可煮可炒可粥飯可作麵食饀並良久服則津血滲泄令人肌瘦身重合魚鮓食成消渴其稍大而鮮紅淡紅者止可食用色赤黯而粒緊小者入藥甘酸平無毒心之榖也性下行能入隂分行津液利小便消脹除腫止吐治下痢腸澼解酒病除寒熱排膿散血通乳汁下胞衣利産難水氣腳氣最為急需花名赤腐婢解酒毒眀目下水治小兒丹毒葉去煩熱煮食眀目彚考原吳志趙達傳達治九宫一算之術使人取小豆數升播之席上立處其數驗覆果信晉書郭璞傳璞至廬江愛主人婢無由而得乃取小豆三升繞主人舍散之主人晨見赤衣人數千圍其家就視則滅甚惡之請璞為卦璞曰君家不宜畜此婢可于東南三十里賣之慎勿爭價則此祟可除主人從之嵗時雜記共工氏有不才子以冬至日死為疫鬼畏赤豆故是日作赤豆粥厭之田家五行十二月二十五日夜煮赤豆粥大小人口皆食之在外之人亦留分以俟其歸謂之口數粥亦驅瘟鬼之意别録增齊民要術赤豆三月種六月旋摘遲者四月種亦可宜稀稠得所太密不實緑豆原緑豆本草云緑以色名也舊作菉非圓小者佳大者名植豆功用頗同四月下種苗髙尺許葉小而有毛至秋開小白花莢長二三寸比赤豆莢微小有二種粒粗而色鮮者為官緑又名眀緑皮薄粉多粒小而色暗者為油緑又名灰緑皮厚粉少早種者名摘緑可頻摘也遲種者名拔緑一拔而已其用甚廣可作豆粥豆飯豆酒煼食炒食水泡磨為粉澄濾作餌蒸糕蕩皮壓索為食中要物亦可喂牲畜真濟世良榖也性甘寒無毒肉平皮寒用宜連皮解金石砒霜草木一切諸毒生研新汲水服反棐子殼害人合鯉魚鮓食久則令人肝黃成渴病花及芽解酒毒莢治赤痢彚考增湘山野録真宗深念稼穡聞占城稻耐旱西天菉豆子多而粒大各遣使以珍貨求其種占城得種二十石至今在處播之西天中印土得菉豆種二石不知今之菉豆是否始植于後苑秋成日宣近臣嘗之仍賜占稻及西天菉豆御詩孫公談圃張文定嘗苦腳疾無藥可療一日逰相國寺有賣藥者得菉豆兩粒服之遂愈原唐公之夔號抱一西粵人也言其地無緑豆每承舍入京包中止帶斗餘多則至某江輒遇風浪不能渡到彼中比于藥物凡患時疾者用等稱買一家煮豆香味四達兩鄰對門患病人聞其氣輒愈别録原種植緑豆宜刈了麻地上種之太早不生莢若其年李不蛀則豆有收忌卯日下種增種樹書種菉豆地宜瘦四月種六月收子再種八月又收原製用豆虀先取濕沙納瓷器中以緑豆勻撒其上如種藝法深桶覆藏室中勿令見風日一次掬水灑透俟其苗長可尺許摘取蟹眼湯綽過以料虀供之赤豆亦可然不如緑豆之佳白豆原白豆一名飯豆小豆之白者也亦有土黃色者大如緑豆而差長粥飯皆可用四五月種苗葉似赤小豆而微尖嫩者可作菜亦可生食味甘平調中補五臟暖腸胃腎之榖也腎病宜食浙東一種味更勝作醬作腐極佳北方水白豆相似而不及增本草一種蔉豆葉如大豆亦其類也豌豆原豌豆本草綱目云其苗柔弱宛宛故得豌名豌舊作登音剜一名胡豆本草經云張騫使外國得胡豆種一名戎菽爾雅云戎菽謂之荏菽注云即胡豆管子云桓公伐山戎以戎菽遍布於天下一名畢豆崔實月令作豍豆廣雅作豍豆又名曰留豆一名青小豆一名青斑豆一名麻纍本草綱目云嫩時青色老則斑麻故有諸名一名回鶻唐書云畢豆出回鶻地飲膳正要作回回豆即回鶻也一名淮豆農書云俗呼豌豆大者為淮豆一名國豆鄴中記云石勒改為國豆種出西戎北土甚多八九月下種亦有春種者蔓生有鬚葉似蒺藜葉兩兩相對嫩時可食三四月開小花如蛾形淡紫色結莢形圎長寸許子圎如藥丸嫩時可煮食老則可炒食可作麵食饀磨粉麵甚白而細膩出西戎者大如杏仁百榖之中最為先熟又耐久藏宜多種可和醬作澡豆去皯􅍍令面光澤亦可喂馬性甘平無毒調營衛平氣益中治消渴淡煮食之良煮食殺鬼毒心病下乳汁研末塗癰腫痘瘡集藻狀增唐陸贄請依京兆所請折納事狀京兆府先奏當管蟲食豌豆全然不收請據數折納大豆奉敕宜依度支續奏稱據時估豌豆每斗七十價已上大豆每斗三十價已下京兆府所請將大豆替豌豆望令各據估計錢數折納則冀免損官司者求瘼救災國之令典求瘼在知其所患救災在恤其所無只如螟蜮為殃豌豆全損檢覆若非虛謬地稅固合免徵直道而行大體斯在司府折納充數已為尅下從權度支凖估計錢乃是幸災規利所得無幾其傷實多傷風得財非謂理道且豌豆為物入用甚微舊例所支唯充畜料凖數回給大豆諸司誰曰不然計價剩徵義將安在理無所據事不可從望依前敕處分未審可否别録增農政全書玄扈先生曰豌豆與𧖟豆各種𧖟豆之利倍于豌十倍其耐陳則一也𧖟豆以下四種原列蔬譜今從本草移入于此原𧖟豆一名胡豆本草綱目云豆莢狀如老𧖟故名王禎農書謂其𧖟時始熟故名亦通吳瑞本草以此為豌豆誤矣此種豆亦自西胡來雖與豌豆同名同時種而形性逈别太平御覽云張騫使外國得胡豆種歸指此也今蜀人呼此為胡豆而豌豆不復名胡豆矣南北皆有蜀中尤多八月下種冬生嫩苗可茹莖方而肥中空葉狀如匙頭圓而下尖面緑背白柔厚一枝三葉二月開花如蛾狀紫白色結莢連綴蜀人收其子備荒性甘微辛平無毒快胃和臟腑解酒毒誤吞金銀等物者用之皆效集藻七言律詩增宋楊萬里招陳益之李兼濟二主管小酌益之指𧖟豆云未有賦者戲作七言翠莢中排淺碧珠甘欺崖蜜軟欺酥沙瓶新熟西湖水漆櫑分嘗曉露腴味與櫻梅三益友名因𧖟繭一絲絇老夫稼圃方雙學譜入詩中當稼書别録增農桑通訣𧖟豆百榖之中最為先登農政全書玄扈先生曰𧖟豆種花田中冬天不拔花秸用以拒霜至清眀後拔之𧖟豆八月初種臘月宜厚壅之此種極救農家之急且蝗所不食豇豆原豇豆一名豇􅭾音絳雙本草綱目云此豆紅色居多莢必雙生故有豇豇􅭾之名廣雅指為胡豆誤矣處處有之榖雨前後下種者六月子便可種一年可兩收四月種者七八月收一種蔓長丈餘一種蔓短懸架則蕃鋪地則不甚旺宜灰壅其葉俱本大末尖嫩時可茹其花有紅白二色莢有白紅紫赤斑駁數色長者至二尺生必兩兩並垂有習坎之義子微曲如人腎形所謂豆為腎榖者宜以此當之性甘鹹無毒理中益氣補腎健胃和五臟調營衛生精髓止消渴吐逆泄痢小便數與諸疾無禁但水腫忌補腎不宜多食此豆嫩時充菜老則收子可榖可果可菜取用最多豆中上品也别録原本草昔盧廉夫教人補腎氣每日空心煮豇豆入少鹽食之大有益袖珍方中鼠莽毒者以豇豆汁飲即解欲試者先刈鼠莽苗以汁潑之便根爛不生此則物理然也附録黎豆原黎豆一名貍豆一名黎沙一名獵沙見古今注其大者名虎豆亦名虎沙爾雅云欇虎櫐注云今虎豆江東呼為㯿欇夲草綱目云爾雅虎櫐即貍豆也古人謂藤為櫐後人訛櫐為貍矣又云黎黑色也此豆莢老則黑色有毛露筋如虎貍指爪其子亦有點如虎貍之斑煮之汁黑故有諸名野生山中人亦有種之者三月下種生蔓葉如豇豆但文理偏斜六七月開花成簇紫色狀如扁豆花一枝結莢十餘長三四寸大如拇指有白茸毛老則黑而露筋宛如乾㷱指爪之狀其子大如刀豆淡紫色有斑點如貍文煮去黑汁同豬雞肉再煮食味乃佳附録馬豆增古今注馬豆一名馬沙似虎豆而小實大如指亦可食也彚考增雲仙散録品物類聚曰白馬豆食之齒醉虢國夫人厨吏鄧連以洗豆皮作靈沙臛供翠鴛堂藊豆原藊豆一名沿籬豆一名蛾眉豆本草云藊夲作扁莢形扁也沿籬蔓延也蛾眉象豆脊白路之形也二月種蔓生人家多種之籬邉或以竹木架起每乂三枝一居頂二對生一枝三葉亦一居頂二對生葉大如杯圓而有尖花有紫白二色狀如小蛾有翅尾形莢生花下花缷而莢現及老長寸餘有青白二色形凡十餘樣或長或團或如龍爪虎爪或如豬耳刀鎌種種不同皆纍纍成枝一枝十餘莢成穗白露後實更繁衍子有黑白赤斑四色圗經本草云黑者名鵲豆蓋以其黑間有白道如鵲羽也每莢子或一或二三一種莢硬不堪食惟豆子粗圓而色白者可入藥微炒用氣味甘微溫無毒和中下氣消暑暖脾胃除濕熱止消渴解酒毒河豚魚毒一切草木毒集藻增眀王伯稠涼生豆花豆花初放晚涼淒碧葉隂中絡緯啼貪與鄰翁棚底話不知新月照清溪别録原月令廣義芒種前扁豆開花主水種植清眀下種以草灰蓋之不用土覆芽長分栽搭棚引上增農政全書玄扈先生曰以口向上種之粒粒出若扁種十不出一蓋豆瓣重頂土不起故爛刀豆原刀豆一名挾劍豆拾遺記云樂浪之東有融澤有挾劎豆其莢形似人挾劍橫斜而生即此人家多種之蔓引一二丈葉如豇豆葉而稍長大五六七月開紫花結莢長者近尺微似皂莢扁而劍脊三稜嫩青煮食醬醃蜜煎皆佳老則微黑子大如拇指頂淡紅色同雞豬肉煮食甚美氣味甘平無毒溫中下氣利腸止䬣逆益腎補元别録原本草綱目一人病後䬣逆不止聲聞鄰家或令取刀豆燒存性白湯調服二錢即止此亦取其下氣歸元而逆自止也種植將地鋤鬆深半尺熟糞拌勻清眀時先用布濕微水潤豆令脹將見芽鋤前土作穴每穴一粒側放入不可深此豆體重深則難出上用鋸末拌土薄蓋一層一云用草灰日日澆令濕俟生蔓竹木架起大靈豆增貴耳録大靈豆華山陳摶有靈豆服一粒四十九日不飢筋力如故顔色若嬰兒世罕得服之者木豆增交州記木豆出徐僮間子美似烏頭大葉似栁一年種數年採靈光豆增杜陽雜編大厯中日林國獻靈光豆大小類中國之菉豆其色紅而光芒長數尺本國人呼為詰多珠和石上菖蒲葉煮之即大如鵝卵其中純紫稱之可重一斤已上啖之香美無比數日不復言飢渴佛豆增益部方物略記佛豆粒甚大而堅農夫不甚種唯圃中蒔以為利以鹽漬食之小兒所嗜集藻贊增宋宋祁佛豆贊豐粒茂苗豆别一類秋種春斂農不常蒔脂麻原脂麻俗作芝麻者非一名油麻一名胡麻夢溪筆談云胡麻直是今油麻張騫始自大宛得油麻之種故名胡麻以别中國之大麻也本草云油麻脂麻謂其多脂油也一名巨勝夲草云巨勝即胡麻之角巨如方勝者一名方莖以莖名一名狗蝨以形名一名藤𢎞見廣雅夲草云藤𢎞者𢎞亦巨也一名交麻杜寶拾遺記云隋大業中改為交麻陶𢎞景曰胡麻八榖之中惟此為良李時珍曰脂麻有早晚二種黑白赤三色莖皆方髙者三四尺葉光澤有本團而末鋭者有本團而末分三了如鴨掌形者葛洪謂一葉兩尖為巨勝蓋不知烏麻白麻皆有二種葉也秋開白花似牽牛花而微小亦有帶紫艷者節節生枝結角長者寸許四稜六稜者房小而子少七稜八稜者房大而子多皆隨地肥瘠蘇恭謂四稜為胡麻八稜為巨勝謂其房大勝諸麻也其枝四散者角繁子多一莖獨上者角稀子少取油以白者為勝可以烹煎可以然點服食以黑者為良胡地者子肥大其紋鵲其色紫黑取油亦多尤妙其色黑入腎能潤燥也赤者狀如老茄子錢乙治痘瘡變黑歸腎用赤脂麻煎湯送百祥丸取其解毒耳彚考增拾遺記樂浪之東有背眀之國宜種百榖有通眀麻食者夜行不持燭是苣蕂也食之延夀後天而老原神仙傳魯女生長樂人初餌胡麻及术絶榖八十餘年日少壯色如桃花日能行三百里走及麞鹿增雞肋篇胡麻俗呼芝麻言其性有八拗謂雨暘時薄收大旱方大熟開花向下結子向上炒焦壓榨才得生油膏車則滑鑽針乃澀也本草俗傳胡麻須夫婦同種則茂盛故本事詩云胡麻好種無人種合是歸時底不歸原天台志劉晨阮肇入天台採藥失道食盡見桃實食之覺身輕行數里至溪滸持杯取水見一杯流出有胡麻飯溪邉二女子笑曰劉阮二郎捉向所失流杯來便迎歸作食既出無復相識至家子孫已七世矣集藻賦增宋蘇軾服胡麻賦并序始余嘗服伏苓久之良有益也夢道士謂余伏苓燥當雜胡麻食之夢中問道士何者為胡麻道士言脂麻是也既而讀本草云胡麻一名狗蝨一名方莖黑者為巨勝其油正可作食則胡麻之為脂麻信矣又云性與伏苓相宜于是始異斯夢方將以其説食之而子由賦伏苓以示余乃作服胡麻賦以答之世間人聞服脂麻以致神仙必大笑求胡麻而不可得則必求山苗野草之實以當之此古所謂道在邇而求諸逺者歟其詞曰我夢羽人頎而長兮惠而告我藥之良兮喬松千尺老不僵兮流膏入土龜蛇藏兮得而食之夀莫量兮于此有草衆所嘗兮狀如狗蝨其莖方兮夜炊晝曝久乃臧兮伏苓為君此其相兮我興發書若合符兮乃瀹乃蒸甘且腴兮補填骨髓流髮膚兮是身如雲我何居兮長生不死道之餘兮神藥如蓬生爾廬兮世人不信空自劬兮搜抉異物出怪迂兮稿死空山固其所兮至陽赫赫發自坤兮至隂肅肅躋于乾兮寂然反照珠在淵兮沃之不滅又不燔兮長虹流電光燭天兮嗟此區區何與于其間兮譬之膏油火之所傳而已耶元戴表元胡麻賦六月亢旱百稼稿乾有物沃然秀于中田是為胡麻外白中玄嘻微心之良苦徵日御而周旋朝舒翹以東嚮夕偃媚而西遷若餞迎之有節閲旦旦而不愆有一儒者睹而異之曰是物其有識可比義于戎葵惟太陽之委照疇一物之得遺彼芃然以自遂有得氣而不知獨輸勤于畎畝致展轉于遐暉迹其華粲粲以淡成幹亭亭而直致隂回翔以蓋屬膏湛渟而珠媚疑本質之過清常凝溫而抱粹庸遇暵以不傷表孤妍于衆悴且其芘本近仁嚮眀近智蹈約而不移近信在困而能恭近義故論胡麻者以為君子之道四宜乎以爾登良醫之篋衍依飛仙之服餌也詩散句原唐王維御羮和石髓香飯進胡麻增宋梅堯臣傍枝延扶疏修莢繁槖韜胡麻養氣血種以督兒曹原眀馮琦居然在玄圃不必飯胡麻增唐曹唐白羊成隊難收拾吃盡溪邉巨勝花宋陸遊胡麻刈罷下􅘹初引水家家灌晚蔬欲曬胡麻愁屢雨别録原種植須肥地荒地亦可但多加糞二三月為上時四月上旬為中時五月上旬為下時望前種實多而成望後種子少多粃每畝二升取沙土中拌和之則入地勻須多種宜甲子壬申丙子壬午及六月三卯日忌南風及辛亥寅未日收割鋤三四遍逾多逾妙頻鋤草淨簡熟者先穫束欲小大則難乾五六束一攢斜倚之使風得入候口開以小杖微打令子出仍攢之三日一打四五遍乃淨曬乾收藏服食抱朴子云用上黨胡麻三斗淘淨甑蒸令氣遍日乾以水淘去沫再蒸如此九度以湯脫去皮簸淨炒香為末白蜜棗膏丸彈子大每服溫酒化下一丸日三忌毒魚狗肉生菜服至百日除一切痼疾一年身面光澤不飢二年白髮返黑三年齒落更生四年水火不能害五年行及奔馬若欲下之飲葵菜汁孫真人云用胡麻三升去黃褐者蒸三十遍微炒香為末入白蜜三升杵三百下丸桐子大每旦服五十丸人過四十以上久服眀目洞視腸柔如筋取用漬汁和麵至韌滑人身生肉丁者擦之即愈七月七日采烏麻花最上頭者隂乾為末烏麻油漬之眉毛不生者日塗之即生又生秃髮秸入米倉內米不蛀燒灰入點痣及去惡肉方中用除夜撒之房臥內外云可避邪又生脂麻單條者名霸王鞭𥪡卧房前亦云可祛鬼葉湯浸良久涎出稠黃色婦人用梳頭沐髮去風家孰事親油生笮者良有潤燥解毒止痛消腫之功蒸炒者止可食用及然點不堪入藥入藥以烏麻油為上白麻油次之須自笮者可用市者恐偽臘月油久放不壞點燈照蠶辟蟲熬膏藥極效搽婦人頭髮黑光不臭不生蟣虱麻餅笮去油麻滓也亦名麻籸可食荒嵗人以救飢入鹽作醬甚滑膩又可飬魚肥田周禮堅強用蕡亦此義也增好事集以胡麻麵啖犬則光黑而駿使獵必大獲又可得三十嵗物類相感志芝麻萁燒煙熏紙被不作聲附録青蘘原青蘘一名夢神一名胡麻巨勝苗也一作葉服食家作菜用其法秋間取巨勝子種肥地畦中如種菜法苗出鋤令無草乾即灌水采食滑美如葵附録亞麻增本草亞麻一名鴉麻一名壁虱胡麻蘇頌曰出兖州威勝軍苗葉俱青花白色李時珍曰陕西人亦種之其實亦可榨油然燈氣惡不堪食御定佩文齋廣羣芳譜卷十
