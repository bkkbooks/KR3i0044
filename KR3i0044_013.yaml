body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷十一桑麻譜桑原桑東方自然神木之名其字象形蠶所食也見徐鍇説文通釋皮裂幹疏葉面深緑光澤多刻缺方書稱桑之功最神在人資用尤衆其種類甚多不可遍舉世所名者荆與魯也荆桑多椹葉薄而尖邉有瓣凡枝幹條葉堅徑者皆荆類也魯桑少椹葉圓厚而多津凡枝幹條葉豐腴者皆魯類也荆類根固而心實能久宜為樹魯類根不固心虛不能久宜為地桑荆葉不如魯之盛當以魯接荆則久而又茂魯為地桑有壓條法傳轉無窮是亦可以久逺者也荆桑飼𧖟其絲堅韌中紗羅用魯桑宜飼大蠶荆桑宜飼小蠶見王禎農桑通訣此外又有桋桑爾雅云女桑桋桑注云今俗桑樹小而條長者曰女桑樹疏云女桑一名桋桑檿桑爾雅云檿桑山桑注云似桑材中作弓及車轅疏云山桑一名檿桑禹貢厥篚檿絲是也增本草李時珍曰桑有數種有白桑葉大如掌而厚雞桑葉花而薄子桑先椹而後葉山桑葉尖而長以子種者不若壓條而分者原桑生黃衣謂之金桑木將稿蠶食必病樹下每年耕用糞則葉肥嫩構接則葉大桑白皮利小水肺中有水氣及肺火有餘者用之葉多積荒年可濟飢亦可喂豬羊馬蠶事畢令人採取曬乾收貯備用彚考增易否卦繫于苞桑疏苞本也凡物繫于桑之苞本則牢固也又桑之為物其根衆也衆則牢固之義書禹貢桑土既蠶是降丘宅土傳大水去民下丘居平土就桑蠶集傳桑土宜桑之土既蠶者可以養蠶也蠶性惡濕故水退而後可蠶然九州皆賴其利而獨于兖言之者兖地宜桑後世之濮上桑間猶可驗也厥貢漆絲傳地宜漆林又宜桑蠶厥篚檿絲傳檿桑蠶絲中琴瑟絃疏檿絲是蠶食檿桑所得絲韌中琴瑟弦也書傳成王之時有三苗貫桑葉而生同為一穗其大盈車長幾充箱民得而上諸成王詩鄘風降觀于桑傳地勢宜蠶可以居民靈雨既零命彼倌人星言夙駕稅于桑田集傳言方春時雨既降而農桑之務作文公于是命主駕者晨起駕車急往而勞勸之衛風桑之未落其葉沃若傳桑女功之所起沃若猶沃沃然桑之落矣其黃而隕魏風彼汾一方言采其桑箋采桑親蠶事也原唐風肅肅鴇行集于苞桑曹風鳲鳩在桑其子七兮增豳風女執懿筐遵彼微行爰求柔桑疏柔桑稚桑也蠶始生宜稚桑蠶月條桑取彼斧斨以伐遠揚猗彼女桑傳逺枝逺也揚條揚也角而束之曰猗女桑柔桑也疏條其桑而采之謂斬條于地就地采之也猗束彼女桑而采之謂柔稚之桑不枝落者以繩猗束而采之也小雅隰桑有阿其葉有難傳阿然美貌難然盛貌有以利人也疏言隰中之桑枝條甚阿然而長美其葉則甚難然而茂盛其下可以庇蔭人往息者得其涼也隰桑有阿其葉有沃傳沃柔也隰桑有阿其葉有幽傳幽黑也疏阿那是枝葉條垂之狀故為美貌難為葉之茂沃言葉之柔幽是葉之色言桑葉茂盛而柔軟則其色純黑故三章各言其一也樵彼桑薪卬烘于煁傳卬我也烘燎也煁烓竈也桑薪宜以養人者也疏有人樵取于彼桑木之薪不以炊㸑云我用之燎于煁竈照物而已桑薪薪之善者也宜以炊㸑而養人今不以炊㸑反燎于煁竈失其所也大雅菀彼桑柔其下侯旬傳菀茂貌旬言隂均也箋桑之柔濡其葉菀然茂盛謂蠶始生時也人庇蔭其下者均得其所疏菀然而茂者彼桑也其葉稚而柔濡故菀然茂盛于此之時人息其下維均得蔭皆無暑熱之患禮記月令季春之月命野虞毋伐桑柘注愛蠶食也野虞謂主田及山林之官鳴鳩拂其羽戴勝降于桑蠶將生之候也戴勝織紝之鳥是時恆在桑具曲植蘧筐注時所以飬𧖟器也曲簿也植槌也后妃齋戒親東鄉躬桑禁婦女母觀省婦使以勸蠶事注后妃親採桑示帥先天下也東鄉者鄉時氣也是眀其不常留養蠶也留養者所卜夫人與世婦婦謂世婦及諸臣之妻也內宰職曰仲春詔后帥內外命婦始𧖟于北郊女外內子女也夏小正曰妾子始蠶執養宫事母觀去容飾也婦使縫線組紃之事蠶事既登兮繭稱絲效功以共郊廟之服毋有敢惰注登成也敕往蠶者蠶畢將課功以勸戒之季夏之月蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服疏后妃獻繭者謂后妃受內命婦之獻繭乃收繭稅者謂既受內命婦獻繭及收外命婦繭之賦稅以桑為均者言收稅之時以受桑多少為賦之均齊桑多則賦多桑少則賦少貴賤長幼如一者貴謂公卿大夫之妻賤謂士之妻長幼謂婦老幼無問貴賤長少出之時齊同如一皆以近郊之稅十而稅一也所稅之物以供給天子郊廟之服內則射人以桑弧蓬矢六射天地四方疏桑衆木之本祭義古者天子諸侯必有公桑𧖟室近川而為之築宫仞有三尺棘墻而外閉之及大昕之朝君皮辨素積卜三宫之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之疏公桑蠶室者謂官家之桑于處而築養蠶之室近川而為之者取其浴蠶種便也風戾以食之者戾乾也凌早采桑必帶露而濕蠶性惡濕故乾而食之左傳宣子田于首山舍于翳桑注翳桑桑之多蔭翳者原孟子五畝之宅樹墻下以桑增戰國策昔者堯見舜于草茅之中席隴畝而蔭庇桑隂桑隂移而受天下史記殷本紀帝太戊立伊陟為相亳有祥桑榖共生于朝一暮大拱帝太戊懼問伊陟伊陟曰臣聞妖不勝德帝之政其有闕歟帝其修德太戊從之而祥桑枯死貨殖傳齊魯千畝桑麻與千户侯等原漢書文帝紀十三年春二月甲寅詔曰朕親率天下農耕以供粢盛皇后親桑以奉祭服其具禮儀注師古曰令立耕桑之禮制也景帝紀二年夏四月詔曰朕親耕后親桑以奉宗廟粢盛祭服為天下先增漢書食貨志還廬樹桑元后傳太后幸繭館率皇后及列夫人桑後漢書禮儀志皇后帥公卿諸侯夫人蠶祠先蠶禮以少牢注漢舊儀曰春桑生而皇后親桑于苑中蠶室養蠶千簿以上祠以中牢羊豕羣臣妾從桑還獻于繭觀皆賜從桑者樂襄楷傅楷上書曰聞宫中立黃老浮屠之祠浮屠不三宿桑下不欲久生恩愛精之至也注言浮屠之人寄桑下者不經三宿便即移去示無愛戀之心也原後漢書張堪傳張堪拜漁陽太守百姓歌之曰桑無附枝麥秀兩岐張君為政樂不可支申屠蟠傳蟠絶迹于梁碭之間因樹為屋自同傭人注謝承書曰居蓬萊之室依桑樹以為棟也增謝承後漢書汝南伊昆為隂縣功曹令新到官問曰園中有桑以食蠶何如昆曰非初至所當務原蜀志先主傳先主舍東南角籬下有桑樹生髙五丈餘遙望童童如小車蓋往來者皆怪其非凡或謂當出貴人先主少時與宗中諸小兒戲于樹下戲言吾必當乘此葆羽車蓋增蜀志諸葛亮傳亮自表後主曰成都有桑八百株薄田十五頃子弟衣食自有餘饒龎統傳穎川司馬徽清雅有知人鑒龎統弱冠往見徽徽采桑于樹上坐統在樹下共語自晝至夜徽甚異之稱統當為南州士人之冠冕由是漸顯晉書禮志武帝太康六年使侍中成粲草定親蠶儀先蠶壇髙一丈方二丈為四出陛陛廣五尺在皇后採桑壇東南帷宫外門之外而東南去帷宫十丈在蠶室西南桑林在其東取列侯妻六人為蠶母蠶將生擇吉日皇后著十二笄步搖依漢魏故事衣青衣乘油畫雲母安車駕六騩馬女尚書著貂蟬佩璽陪乘載筐鈎公主三夫人九嬪世婦諸太妃太夫人及縣鄉君郡公侯特進夫人外世婦命婦皆步搖衣青各載筐鈎從蠶先桑二日蠶宫生蠶著薄上桑日皇后未到太祝令質眀以一太牢告祠謁者一人監祠祠畢徹饌班餘胙于從桑及奉祠者皇后至西郊升壇公主以下陪列壇東皇后東面躬桑採三條諸妃公主各採五條縣鄉君以下各採九條悉以桑條授蠶母還蠶室藝術傳淳于智有思義能易筮善厭勝之術上黨鮑瑗家多喪病貧苦智為卦成謂瑗曰君安宅失宜故令君困君舍東北有大桑樹君徑至市入門數十步當有一人持荆馬鞭者便就買以懸此樹三年當暴得財瑗承言詣市果得馬鞭懸之三年後井得錢數十萬銅鐵器復二十餘萬于是致贍疾者亦愈辰韓國傳辰韓俗饒蠶桑善作縑布馮跋載記跋勵意農桑勤心政事下書曰桑柘之益有生之本此土少桑人未見其利可令百姓人植桑一百根柘二十根原宋書禮志孝武立觀后親桑循晉禮也增南齊書祥瑞志永眀二年護軍府門外桑樹一株並有蠶絲綿被枝莖史臣按漢光武時有野蠶成繭百姓得以成衣服今則浮波幕樹其亦此之類乎原南齊書孝義傳韓係伯襄陽人也襄陽土俗鄰居種桑界上為志係伯以桑枝蔭妨他地遷界上開數尺鄰畔隨復侵之係伯輒更改種久之鄰人慚愧還所侵地躬往謝之增魏書食貨志諸初受田者男夫一人給田二十畝課蒔餘種桑五十樹棗五株榆三根非桑之土一夫給一畝依法課蒔榆棗奴各依良限三年種畢不畢奪其不畢之地于桑榆地分雜蒔餘果及多種桑榆者不禁諸應還之田不得種桑榆棗果種者以違令論原南史齊本紀髙帝舊宅在武進宅南有一桑樹擢本三丈橫出四枝狀似華蓋帝年數嵗好戲其下從兄敬宗曰此樹為汝生也增南史羅研傳研為信安令故事置觀農謁者圍桑度田勞擾百姓研請除其弊帝從之新羅國傅新羅土地肥美多桑麻作縑布隋書禮儀志後齊皇后親桑于桑壇備法駕服鞠衣乘重翟帥六宮升桑壇東陛即御座女尚書執筐女主衣執鈎立壇下皇后降自東陛執筐者處右執鈎者處左蠶母在後乃躬桑三條訖升壇即御座內命婦以次就桑鞠衣五條展衣七條褖衣九條以授蠶母還蠶室皇后采桑則服鳪衣皇后之車三曰翟輅以採桑命婦采桑齋及采桑還則黃衣食貨志河清三年每丁給永業二十畝為桑田其中種桑五十根榆三根棗五根不在還受之限非此田者悉入還受之分唐書憲宗本紀元和七年四月詔民田畝樹桑禮樂志皇后嵗祀一季春吉已享先蠶遂以親桑賈循傳循母將葬宅有枯桑一夕再生芝出北墉人以為瑞南蠻傳永昌之西野桑生石上其材上屈兩向而下植取以為弓不筋漆而利名曰暝弓宋史禮志元祐八年宰臣奏積雨傷蠶上曰朕宫中自蠶一簿欲知農桑之候久雨葉濕豈不有損乃命往天竺祈晴食貨志太祖建隆時詔所在長吏諭民有能廣植桑棗墾闢荒田者止輸舊租民伐桑棗為薪者罪之熙寧元年中書議勸民栽桑帝曰農桑衣食之本民不敢自力者正以州縣約以為資升其户等耳宜申條禁于是司農寺請立法先行之開封視可行頒于天下民種桑柘毋得增賦安肅廣信順安軍保州令民即其地植桑榆或所宜木因可限閡戎馬官計其活茂多寡得差減在户租數活不及數者罰責之補種金史食貨志世宗大定十九年二月上如春水見民桑多為牧畜囓毁詔親王公主及勢要家牧畜有犯民桑者許所屬縣官立加懲斷山海經宣山上有桑大五十尺其枝四衢葉大尺赤理青華名之曰帝女之桑衡山多桑東北海外赤水在圎丘南有三桑木而無枝皆髙百仞穆天子傳甲寅天子作居范宮以觀桑者乃飲于桑中天子命桑虞出闕一字桑者用禁暴民注不得令􅀈犯桑木尚書考靈曜桑木者箕星之精神木蟲食葉為文章人食之老翁為小童原春秋孔演圖孔子母徵在遊于大塜之陂睡夢黑帝使請往交語曰汝乳必于空桑覺則若有所感後生孔子於空桑之中韓非子子産相鄭開畝樹桑鄭人謗訾增呂氏春秋伊尹之母居伊水之上孕夢有神告之曰臼出水而東走無顧眀日視臼出水其鄰東走十里而顧其邑盡為水身因化為空桑有莘氏女子採桑得嬰兒空桑之中獻之于君君令乳之命曰伊尹淮南子螈蠶一嵗再收非不利也然而王法禁之者為其殘桑也括地圖化民食桑三十七年化而自裹九年生翼十年而死神異經東方有桑樹焉髙八十丈敷張自輔其葉長一丈廣六七尺其上自有蠶作繭長三尺繅一繭得絲一斤原漢舊儀皇后躬桑始捋一條執筐受桑捋三條女尚書跪曰可止執筐者以桑授蠶母以桑適金室增列女傳魯秋胡子納妻五日而官于陳後歸未至家見路傍有美婦方採桑秋胡恱之下車願托桑隂下婦人採桑不顧胡曰力田不如逢年採桑不如見郎今吾有金願與夫人而婦人不受胡乃歸母呼其婦乃即採桑者也數胡之罪而自投于河齊宿瘤女東鄰採桑女也項有大瘤閔王遊至東都百姓盡觀宿瘤女採桑不顧王怪問之對曰受父母教採桑不受教觀王王曰此竒女恱而聘迎之陳辨女者陳國採桑之女也晉大夫解君甫使于宋過陳遇之止而戲之曰女為吾歌吾將舍女女乃歌曰墓門有棘斧以斯之夫也不良國人知之崔豹古今注邯鄲有美女姓秦名羅敷為邑人王仁妻仁後為趙王家令羅敷出採桑于陌趙王登臺見而悅之因飲酒欲奪焉羅敷善彈箏作陌上桑之歌以自眀原神仙傳麻姑語王方平云接侍以來已見東海三為桑田增搜神記有人逺征家有一女馬一匹女思父乃戲馬曰爾能為我迎得父歸吾將嫁汝馬乃頓韁而去迎得父來後馬見女輒怒父乃殺馬曝皮于庭女之皮所皮忽卷女而行父後于大桑樹枝間得女及皮盡化為蠶績樹上其繭厚大異常鄰婦取養之其收亦倍今世謂蠶為女兒古之遺語也拾遺記少昊以金德王母曰皇娥處璇宫而夜織或乘桴木而晝遊經歷窮桑滄茫之浦時有神童容色絶俗稱為白帝之子即太白之精降乎水際與皇娥宴戲奏㛹娟之樂遊漾忘歸窮桑者西海之濵有孤桑之樹直上千尋葉紅椹紫萬嵗一實食之後天而老帝子與皇娥並坐撫桐峰梓瑟皇娥倚瑟而清歌曰天清地曠浩茫茫萬象回薄化無方浛天蕩蕩望滄滄乘桴輕漾著日傍當其何所至窮桑心知和樂恱未央白帝子答歌四維八埏眇難極驅光逐影窮水域璇宫夜靜當軒織桐峰文梓千尋直伐梓作器成琴瑟清歌流暢樂難極滄湄海浦來栖息及皇娥生少昊號曰窮桑氏亦曰桑丘氏至六國時桑邱子著隂陽書即其餘裔也原後燕録遼初無桑慕容廆通于晉求種江南平川之桑悉繇吳來增述異記空桑生大野山中為琴瑟之最者空桑也桓仲為江州刺史遣人周行廬山冀覩靈異既陟崇巘有一湖周生桑樹有敗艑赤鱗魚使者渴極欲往飲水赤鱗張鰭向之使者不敢飲稽神録廬州軍吏蔡彥卿為拓臯鎮將暑夜坐鎮門外納涼忽見道南桑林中有白衣婦人獨舞就視即滅眀夜彥卿扶杖先往伏草間久之婦人復出而舞即擊之墜地乃白金一餅復掘地獲銀數千兩遂致富裕云録異記李太尉德裕一旦有老叟謁門引五六輩舁巨木請謁焉閽者不能拒之公異而見之叟曰某家藏此桑寶三世矣某已耋矣感公之好竒搜異是以獻爾木中有竒寶若能者斫之必有所得洛邑有匠計其年齒且老或身已沒子孫亦當得其旨訣非洛匠無能斫之者也公如其言訪于洛下匠已殂矣其子應召而來睨而視之曰此可徐而斫之矣因解為二琵琶槽自然有白鴿羽翼爪足巨細畢備匠料之微失厚薄不中一鴿少其翼公以形羽全者進之自留其一今猶在民間洛陽伽藍記昭儀寺佛堂前有桑樹一株直上五尺枝條橫繞柯葉傍布形如羽蓋覆髙五尺又葉凡為五重每重葉生椹各異京師道俗謂之神桑廣異記南方赤帝女學道得仙居髙陽崿山桑樹上正月一日銜柴作巢至十五日成赤帝誘之不得以火焚之女即升天因名帝女桑鄴郡名録杜勝宅以軟漆纏桑枝編為籬障雨一過黑光照四面時通甫愛之欲以銅官第取不應常新録裴休得桑木根曰若作沉香想之更無異相雖對沉水香反作桑根想終不聞香氣諸相從心起通鑑外紀西陵氏之女嫘祖為黃帝元妃始教民蠶桑治絲繭以供衣服而天下無瘃之患後世祀為先蠶兼眀書今三四月間採桑之時見有小鳥灰色眼下正白俗呼白鵊鳥是也以其採桑時來故謂之桑鳸俗呼小録湖州以桑葉二十斤為一箇湧幢小品湖州有章姓者豫占桑價占賤即畜至百餘斤二十年無爽白手厚獲生計遂饒鼓樂賽謝以為常一日賽畢有一婦人矮而肥求齋卧地下不去其家內外醉飽厭之叱使去婦人曰我與汝曽祖母有舊連嵗為汝應卜助生計一齋何吝匍匐入門蹴之忽不見且駭且疑佛堂忽有聲曽祖母牌已裂為二蓋祖母每好善見裸蟲必致暖處護其生俟生翼飛去乃已矮婦之祥或在於此以後卜吉而畜其價必相左家道耗云燕山叢録漢昭烈宅在涿州樓桑村昭烈在民間所居有桑層蔭如樓因曰樓桑今尚在其下留題甚多五雜俎涿州之淶水道中有大桑樹髙十餘丈蔭百畝云即昭烈舍前之桑也自漢及今千五百年矣而扶疏如故且其椹視常桑倍大土人珍之以相餽遺云集藻贊增晉郭璞帝女桑贊爰有洪桑生濱淪潭厥圍五丈枝相交參園客是採帝女所蠶原元王禎躬桑贊有星天駟象匹神龍惟蠶辰生厥精冥通孕卵而出寓食桑中惟君立后育德中宫既正母儀普師婦工建茲繭館桑必以躬爰制祭祀郊廟是供賦增魏繁欽桑賦上似華蓋紫極比形下象鳳闕萬桷楹叢枝互出乃錯乃并曄曄隆暑涼風自生微條纖繞隨風浮沉陽蜩鳴其南枝寒蟬噪其北隂秋氣忽其將來咸感節而悲吟玩庇蔭之厚惠情眷眷而愛深晉陸機桑賦并序皇太子便坐蓋本將軍直廬也初世祖武皇帝為中壘將軍植桑株世更二代年漸三紀扶疏豐衍抑有瑰異焉賦曰夫何佳樹之洪麗超托居乎紫庭羅萬根以下洞矯千條而上征豈民黎之能植乃世武之所營故其形瑰族類體艷衆木黃中爽理滋榮煩縟緑葉興而盈尺崇條蔓而層尋希太極以延峙映承眀而廣臨革飛梟之流響想鳴鳥之遺音惟厯數之有紀恆依物以表德豈神眀之所相將我皇之先識誇百世而勿翦超長年以永植傅咸桑樹賦并序世祖昔為中壘將軍于直廬種桑一株迄今三十餘年甚茂盛不衰皇太子入朝以此廬為便坐賦曰伊茲樹之僥幸蒙生生之渥惠降皇躬以斯植遂𢎞茂于聖世厥茂伊何其大連尋修柯逺揚洪條梢槮布繁枝之沃若播密葉以垂隂蔭華宇而作涼清隆暑之難任以厥樹之巨偉登九日於朝陽且積小以髙大生合抱於毫芒猶帝道之將升亦纍德以彌光湯躬禱于斯林用獲雨而興商惟皇晉之基命爰于斯而發祥從皇儲於斯館物無改于平生心惻切以興思思有感于聖眀步倣徨以周覽庶髣佛于儀刑潘尼桑樹賦從眀儲以省膳憩便房以偃息觀茲樹之特瑋感先皇之攸植蔚蕭森以四射邈洪榮而端直爾乃徘佪周覽俯仰逍遙俯睍靈根上眺修條洞芳泉於九壤含溢露于清霄倚增城之飛觀拂綺忩之疏寮下迢遞以極望上扶疏而參差匪衆鳥之攸萃相凰鸞之羽儀理有微而至顯道有隱而應期豈皇晉之禎瑞兆先見而啓茲起尋抱于纖毫崇萬簣于始基原王禎親蠶賦惟蠶有功萬世歸美廣物産之貨資作人生之衣被仲春之月天子詔后以躬桑大昕之朝內宰告期而命祀于是詣靈壇降寶殿翠障夾乎道周鳳輦翔于畿甸順春氣于東方朝先蠶于北面具夫青縹之服侑以芳馨之薦當其疊承寵命適對韶光擇世婦于卜吉受鞠衣于眀堂崇開禁館始入公桑援條有三聽女尚書之勸止執筐不再受宫夫人之是將體之以坤儀之柔順視之以母道之慈良破蟻以來庶養至于千簿獻繭之後諒化被于多方五言古詩增漢樂府陌上桑日出東南隅照我秦氏樓秦氏有好女自名為羅敷羅敷善採桑採桑城南隅青絲為籠系桂枝為籠鈎頭上倭墮髻耳中眀月珠緗綺為下裙紫綺為上襦行者見羅敷下擔捋髭鬚少年見羅敷脫帽著帩頭耕者忘其犂鋤者忘其鋤來歸相怒怨但坐觀羅敷使君從南來五馬立踟蹰使君遣吏往問是誰家姝秦氏有好女自名為羅敷羅敷年幾何二十尚不足十五頗有餘使君謝羅敷寧可共載不羅敷前致辭使君一何愚使君自有婦羅敷自有夫東方千餘騎夫壻居上頭何用識夫壻白馬從驪駒青絲繫馬尾黃金絡馬頭腰中鹿盧劒可直千萬餘十五府小史二十朝大夫三十侍中郎四十専城居為人潔白晳鬑鬑頗有鬚盈盈公府步冉冉府中趨坐中數千人皆言夫壻殊晉樂府採桑度蠶生春三月春桑正含緑女兒採春桑歌吹當春曲繫條採春桑採葉何紛紛採桑不裝鈎牽壞紫羅裙採桑盛陽月緑葉何翩翩攀條上樹表牽壞紫羅􅳭陶潛擬古種桑長江邉三年望當採枝條始欲茂忽值山河改柯葉自摧折根枝浮滄海春蠶既無食寒衣欲誰待本不植髙原今日復何悔原陶潛歸田園居野外罕人事窮巷寡輪鞅白日掩荆扉虛室絶塵想時復墟曲中披草共來往相見無雜言但道桑麻長桑麻日已長吾土日已廣常恐霜霰至零落同草莽增宋謝靈運種桑詩人陳條柯亦有美攘剔前修為誰故後事資紡績常佩知方誡愧微富教益浮陽騖嘉月藝桑逮間隙疏欄發近郛長行達廣域壙流始毖泉湎塗猶跬迹俾此將長成慰我海外役梁吳均採桑賤妾思不堪採桑渭城南帶減連枝繡髮亂鳳凰篸花舞依長薄蛾飛愛緑潭無由報君信流涕向春蠶陌上桑嫋嫋陌上桑蔭陌復垂塘長條映白日細葉隱鸝黃蠶飢妾復思拭淚且提筐故人寧知此離恨煎人腸劉邈萬山見採桑人倡妾不勝愁結束下青樓逐伴西城路相攜南陌頭葉盡時移樹枝髙乍易鈎絲繩挂且脫金籠寫復收蠶飢日已暝詎為使君留王臺卿陌上桑令月開和景處處動春心挂筐須葉滿息倦重枝隂沈君攸採桑南陌落花移蠶妾畏桑萎逐便牽低葉爭多避小枝摘駛籠行滿攀髙腕易疲看金怯舉意求心自可知北周王褒陌上桑人傳陌上桑未曉已含光重重相蔭映軟弱自芬芳秋胡未住馬羅敷未滿筐春蠶朝已老安得久倣徨陳傅縡採桑羅敷試採桑出入城南傍綺裙映珠珥絲繩提玉筐度身攀葉聚聳腕及枝長空勞使君問自有侍中郎賀徹採桑蠶妾出房櫳結伴類花叢度水春衫緑映日晚妝紅釧聲時動樹衣香自入風鈎長嫩枝曲葉盡細條空競採須盈手爭歸欲滿籠自憐公府步誰與少年同唐劉希夷採桑楊栁送人行青青西入秦誰家採桑女樓上不勝春盈盈灞水曲步步春芳緑紅臉耀眀珠絳唇含白玉回首渭橋東遙憐春色同青絲嬌落日緗綺弄春風攜籠長嘆息逶迤戀春色看花若有情倚樹疑無力薄暮思悠悠使君南陌頭相逢不相識歸去夢青樓原李白陌上桑美女渭橋東春還事蠶作五馬如飛龍青絲結金絡不知誰家子調笑來相謔妾本秦羅敷玉顔艷名都緑條映素手採桑向城隅使君且不顧况復論秋胡寒螀愛碧草鳴鳳栖青梧託心自有處但怪旁人愚徒令白日暮髙駕空踟蹰子夜吳歌秦地羅敷女採桑緑水邊素手緑條上紅妝白日鮮蠶飢妾欲去五馬莫留連常建陌上桑翳翳陌上桑南枝交北堂美人金梯出素手自提筐非但畏蠶飢盈盈嬌路傍增李彥逺採桑採桑畏日髙不待春眠足攀條有餘愁那矜貌如玉千金豈不贈五馬空躑躅何以變貞性幽篁雪中緑王建採桑鳥鳴桑葉間緑條復柔柔攀看去手近散作長長鈎黃花蓋野田白馬少年遊所念豈回顧良人在髙樓劉駕桑婦墻下桑葉盡春蠶半未老城南路迢迢今日起更早四鄰無去伴醉臥青樓曉妾顔不如誰所貴守婦道一春常在樹自覺身如鳥歸來見小姑新妝弄百草于濆田翁歎桑手植千樹桑文杏作中梁頻年徭役重盡屬富家郎富家田業廣用此買金章昨日門前過軒車滿垂楊歸來説向家兒孫竟咨嗟不見千樹桑一浦芙蓉花元趙孟俯題織圖正月正月新獻嵗最先理農器女功並時興蠶室臨期治初陽力未勝早春尚寒氣忩户當奧密勿