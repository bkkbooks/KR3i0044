大桑上接梨脆美而甘撒子種桑不若壓條而分根莖浙間植桑斬其葉而植之謂之稼桑却以螺殼覆其頂恐梅雨侵損其皮故也二年即盛農政全書玄扈先生曰接桑莫如當年條為妙三年之説不然也且接時必待月暗自下弦至上弦皆可晦尤妙自上弦至下弦皆忌望尤險取椹與雞鴨食之糞中淘出種者更不生椹本新書曰地桑本出魯桑須以魯桑萌條如法栽培㨂肥旺者約留四五條鋤治添糞條有定數葉不繁多衆葉脂膏聚於一葉其葉自大即是地桑王禎曰齊民要術栽取椹之黑者翦去兩頭惟取中間一截蓋兩頭者其子差細種則成雞桑花桑中間一截其子堅栗則枝幹堅強而葉肥厚將種之時先以柴灰淹揉次日水淘去輕秕不實者曬令水脈才乾種乃易生士農必用地桑之功惟在治之如法不致荒燥桑者易生之物除十一月不生活餘月皆可仍須于園內稀種檾或麻黍為蔭斫樹法自移栽時便割去梢既不留中心其條自向外長科條法有四等一瀝水條向下垂者一刺身條向裏生者一駢指條相併生者一冗脞條雖順生却稠冗臘月為上正月次之博聞録白桑少子壓枝種之若有子可便種須用地隂處其葉厚大得繭重實絲每倍常原採桑髙者用梯摘庶不傷枝逺出強枝當用闊刃鋒利扁斧轉腕回刃向上斫之枝查既順津脈不出葉必復茂諺曰斧頭自有一倍葉此善用斧之效也柔桑髙枝不勝梯須置桑几如髙凳下列二桄作登級斯易摘葉又不傷樹培桑凡耕桑田不用逅樹犁不著處斸土令起斫去浮根以蠶矢糞之根下埋龜甲則茂盛而不蛀生黃衣亦以此治之修桑削其小枝則葉茂去其枯枝則不荒蠶事畢將枝髠去但髠時不可留嘴角及夏至開掘根下用糞或蠶沙培壅則生意鬱積來年嫩枝之葉更覺茂盛且皮可製紙枝可當柴兼有餘利附録桑椹增説文椹桑實也本草桑子曰椹椹與椹通集韻一作􅀈一作黮李時珍曰椹有烏白二種彚考增詩衛風吁嗟鳩兮無食桑椹傳鳩鶻鳩也食桑椹過則醉而傷其性魯頌翩彼飛梟集于泮林食我桑黮懷我好音傳黮桑實也爾雅桑辨有椹梔注辨半也疏桑樹一半有椹半無椹為梔晉書張天錫傳會稽王道子問西土所出天錫應聲曰桑椹甘香鴟梟革響乳酪養性人無妒心隋書循吏傳趙軌少好學有行檢東鄰有桑椹落其家軌遣人悉拾還其主誡其諸子曰吾非以此求名意者非機杼之物不願侵人汝等宜以為誡北史崔逞傳道武攻中山未尅六軍乏糧問計于逞逞曰飛梟食椹而改音詩稱其事可取以助糧帝乃聽人以椹當租神異經東方有桑焉椹長三尺五寸圍如長東觀漢記蔡君仲汝南人至孝王莽亂人相食君仲取桑椹赤黑異器賊問仲仲答曰黑者供母赤者自食賊異之遺鹽二斗漢武帝內傳神仙上藥有扶桑丹椹魏略楊沛為新鄭長興平末人多飢窮沛課民益畜乾椹收䝁豆閲其有餘以補不足如此積得千餘斛藏在小倉會太祖為兖州刺史西迎天子所將千餘人皆無糧過新鄭沛謁見乃皆進乾椹太祖甚喜後賜生口十人絹百匹以報乾椹也魏書袁紹之在河北軍人仰給桑椹神仙傳班孟者不如何許人或云女子也人家有桑果數千株皆聚之成積如山如此十餘日吹之各還本處異苑北方有白桑椹長數寸食之甘美漢興平元年九月桑再椹時劉玄德軍小沛年荒榖貴士衆皆飢仰以為糧晉武帝大元中太原王戎為鬱林太守泊船新亭眠夢有人以七枚椹子與之著衣襟中既寤得椹如夢中發蒙記鳩以桑椹為酒謂飲之即醉也拾遺記員嶠山有木名猗桑煎椹以為蜜原金樓子始皇聞鬼谷先生言故遣徐福入海求金菜玉蔬并一寸椹集藻表增唐李嶠為鳳閣侍郎李元素進冬椹表臣某言聞京兆萬年縣大寧坊有桑一株暮秋生子初冬椹熟今謹取得専輒進奉伏惟陛下惠覃區宇仁洎草木故得神蠶之樹發秀于寒露之辰帝女之林結實于繁霜之下出于萬年之界彰一人萬嵗之符生自大寧之坊表羣生大安之慶鴟梟已革見蠻貊之懷音絲繭行豐知府藏之逾實殊禎洊委絶貺仍臻凡在含生孰不欣慶無任忭躍之至賦增晉傅玄桑椹賦繁實離離含甘吐液翠朱三變或玄或白嘉味殊滋食之無斁七言絶句增宋陸遊詠園中草木日高未辦續晨炊一碗村醅且療飢槃箸索然君勿笑桑間紫椹正纍纍詩散句增唐羅隱紫飽垂新椹宋司馬光桑蔭青青紫椹垂張耒桑間椹熟麥齊腰陸遊鬱鬱林間桑椹紫桑林紫椹纍纍熟桑間椹紫蠶齊老别録增本草衍義夲經言桑甚詳然獨遺烏椹桑之精英盡在于此采摘微研以布濾汁石器熬成稀膏入蜜熬稠貯瓷器中滚湯點服消熱止渴其性微涼故也仙方日乾為末蜜和為丸酒服亦良本草綱目楊氏産乳云孩子不得與桑椹食令兒心寒四時月令云四月宜飲桑椹酒能理百種風熱其法用椹汁三斗重湯煮至一斗半入白蜜二合酥油一兩生薑一合煮令得所瓶收每服一合和酒飲之亦可以汁熬燒酒藏之經年味力愈佳史言魏武帝年乏食得乾椹以濟飢金末大荒民皆食椹獲活者不可勝計則椹之乾濕皆可救荒平時不可不收採也原收椹農桑撮要子熟時摘取以水淘過略曬乾便掘深坑種之或畦種之便生即時多收椹子以待來春種尤佳收貯勿近濕壁墻邉則浥損不生學山蠶經五月也收桑椹而水淘少曬焉畦而種之至冬而焚其梢及眀年而分種之附録桑寄生增本草别録曰桑上寄生生𢎞農川谷桑樹上三月三日采莖葉隂乾韓保升曰諸樹多有寄生莖葉並相似云是鳥食物子糞落樹上感氣而生葉如橘而厚軟莖如槐而肥脆處處雖有須桑土者佳非自采即難以别可斷莖視之色深黃者為驗朱震亨曰桑寄生藥之要品而人不諳其的近海州邑及海外之境其地暖而不蠶桑無採捋之苦氣濃意厚自然生出也李時珍曰寄生髙者二三尺其葉圓而微尖厚而柔面青而光澤背淡紫而有茸川蜀桑多時有生者他處鮮得須自采或連桑採者乃可用别録原梧潯雜佩桑寄生酒出梧州色白味頗清冽晉張華詩蒼梧竹葉清陳張正見詩浮蟻擅蒼梧皆謂此苐釀者必和以燒酒以氣候炎蒸恐酒味易敗故耳飲勿過多附録桑花增本草桑花一名桑蘚一名桑錢生桑樹上白蘚如地錢花樣不是桑椹花也能健脾澀腸止血柘增古今注柘實曰隹音錐言隹鳥所食也本草按陸佃埤雅云柘宜山石柘之從石取此義冦宗奭曰柘木裏有紋亦可旋為器葉可飼蠶曰柘蠶然葉硬不及桑葉李時珍曰處處山中有之喜叢生幹疏而直葉豐而厚團而有尖其葉飼蠶取絲作琴瑟絃清響勝常爾雅所謂棘繭即此蠶也其實狀如桑子而圎粒如椒其木染黃赤色謂之柘黃彚考增詩大雅攘之剔之其檿其柘疏攘去之剔翦之者其為檿木其為柘木之材也集傳檿山桑也與柘皆美材可為弓幹又可蠶也禮記投壺投壺矢以柘若棘母去其皮注取其堅且重也考工記弓人為弓取幹之道七柘為上唐書南蠻傳自曲靖州至滇池食蠶以柘蠶生閲二旬而繭織錦縑精緻新論楚柘質徑必資榜檠以成弴弓清異録張曲江里第之側有古柘嘗因狂風發其一根解為器具花紋甚竒人又以公之手筆冠世目之曰文章樹羣碎録古史考曰柘樹枝長而徑烏集之將飛柘樹反起彈烏烏乃號呼此枝為弓快而有力因名烏號之弓博聞録柘葉豐而厚春蠶餐之其絲以冷水繅之謂之冷水絲别録增齊民要術種柘法耕地令熟耬耩作壠柘子熟時多收以水淘汰令淨曝乾散訖勞之草生拔却勿令荒沒三年間劚去堪作渾心扶老杖十年中四破為杖任為馬鞭胡床十五年任為弓材亦堪作屐裁截碎木中作錐刀靶二十年好作犢車材欲作鞍橋者生枝長三尺許以繩縳旁枝木橛釘著地中令曲如橋十年之後便是渾成柘橋欲作快弓材者宜于山石之間北隂種之附録奴柘增本草陳藏器云奴柘生江南山野似柘節有刺冬不凋李時珍曰此樹似柘而小有刺葉亦如柞葉而小可飼蠶御定佩文齋廣羣芳譜卷十一
