簇祭神桑喜得絲成願已償自是西陵功徳盛萬年衣被澤無疆緯綠隂揜映野人家每到蠶時静不譁一自夏初成繭後籬邉新聽響繅車織従来蠶績女功多當念勤勞惜綺羅織婦絲絲經手作夜寒猶自未停梭絡緯無衣卒嵗早闗情寒氣催人蟋蟀聲茅屋疎籬秋夜永短檠相對絡絲成經織紝精勤有季蘭牽絲分理製羅紈鳴機来往桑隂裏已作吳綃匹練看染色凝膏比潔絡新絲傳得仙方色陸離一代文眀資賁飾須教五采備彰施攀花巧様争傳濯錦紋堪憐織女最殷勤雲章霞綵娛人意自著㝷常縞布裙翦帛手把齊紈冰雪清秋衣欲製重含情逡廵莫漫施刀尺萬縷千絲織得成成衣已成束帛又縫紉始得衣裳可庇身自昔宫庭多澣濯總憐蠶織重勞人増唐来鵬蠶婦曉夕採桑多苦辛好花時節不閑身若教觧愛繁華事凍殺黄金屋裏人汪遵採桑婦為報躊蹰陌上郎蠶飢日晩妾心忙夲来若愛黄金好不肯携籠更採桑宋楊修蠶室摘繭抽絲女在機茅檐葦箔舊堂扉年年桑柘如雲緑翻織誰家錦地衣陸㳺示客桑柘成隂百草香繅車聲裏午風凉客来莫說人間事且共山林夏日長范成大科桑斧斤留得萬枯株獨速槎牙立暝途飽盡春蠶収罷繭更殫餘力付樵蘇楊萬里桑疇夹㟁瀕河種穉桑春風吹出萬條長船行老眼渾多忘喚作西湖插拒霜方岳農謠雨過一村桑柘煙林梢日暮鳥聲妍青裙老姥遙相語今嵗春寒蠶未眠金劉瞻春郊桑芽粒粒破春青小葉迎風未展成寒食歸寜紅䄂女外家紙上看蠶生原眀陳繼儒女桑新綠映宫槐三月春風戴勝来織就鴛鴦錦千疋金刀先取合歡裁増沈天孫採桑曲青溪女児愛羅裙提筐陌上蹋春雲蠶飢日暮思歸去不敢回頭看使君詩散句増魏曹植羙女妖且閒采桑岐路間柔條紛冉冉落葉何翩翩出自薊北門遙望湖池桑枝枝自相值葉葉自相當宋鮑照季春梅始落女工事蠶作采桑淇洧間還戲上宫閣梁簡文帝寄語採桑伴訝今春日短枝髙攀不及葉細籠難滿原江淹但願桑麻成蠶月得紡績増唐儲光羲碓喧春澗滿梯倚緑桑斜李白吳地桑葉綠吳蠶已三眠燕草如碧絲秦桑低綠枝及此桑葉綠春蠶起中閨杜甫桑柘葉如雨飛藿共徘徊聶夷中勸爾毋伐桑減爾身上服宋梅堯臣二月起蠶事伐桑又阻饑王安石澗谷芳菲少春風著野桑唐杜牧深處會容髙尚者水苗三頃百株桑韓偓萬里清江萬里天一村桑柘一村煙宋唐庚魚陂舊種千頭鱠桑徑新窠十畝繒張舜民洲中未種千頭橘宅畔先栽百本桑唐王維蠶眠桑葉稀李白日出眀桑枝桑柘綠如雲岑參桑葉隠村户張謂夏雨桑條緑孟郊野桑無直柯張籍桑柘羅平蕪溫庭筠沃田桑葉晚李嘉祐清眀桑葉小于濆青春滿桑柘宋蘇軾萬樹桑柘羙唐庚蠶罷野無桑金史肅平林半是桑唐上官儀葉密鶯啼帝女桑杜甫舍西柔桑葉可拈李頻桑林蠶後盡空條朱慶餘桑柘成村百畝間曹唐桑葉扶疎閉日華宋司馬光滿川濃綠土宜桑王安石柔桑採盡緑隂稀陸游桑眼綻来蠶事興霜清南陌課劙桑蠶飢衝雨采青桑金秦畧柔青初散壠頭桑元好問童童翠葢桑初合眀楊基黄梅雨晴桑重綠詞原眀王世貞浣溪沙一夜春波釀作藍曉桑柔葉緑鬖鬖丫鬟十五太嬌憨織作䨇魚成比目偷将百草鬬宜男更無心緒餵春蠶増宋賀鑄憶秦娥著春衫玉鞭鞭馬南城南南城南柔桑嫩草留住金銜粉娥采葉供新蠶蠶飢畧許携纖纖携纎纎湔裙淇上更待初三錦纏道雨過園林觸處落紅凝綠正桑葉齊如沃嬌羞只恐人偷看背立墻隂慢展纖纖玉聽啼鳩㡬聲耳邉相促念蠶飢四眠初熟勸路傍立馬莫踟躇是那裏唱道秋胡曲别録増種樹書畜蠶者常以三月三日雨卜桑葉之貴賤諺云雨打石頭徧桑葉三錢片或曰四日尤甚杭州人云三日尚可四日殺我言四日雨尤貴午日不得鋤桑園桑濕不可飼蠶雨中採至必拭令乾恐有傷也湧幢小品湖州畜蠶者多自栽桑否則預租别姓之桑俗曰秒桑凡蠶一斤用葉百六十斤諺云仙人難斷葉價故栽與秒為最稳否則謂之看空頭蠶有天幸者往往趣之原桑葉炙熟可代茶嫩桑枝炒香煎飲久服不患偏風種植便民纂要取黒椹中叚子収貯勿令浥濕将種時先以柴灰淹揉次日淘淨取沉水者曬令纔去水氣種乃易生宜肥地有草鋤浄冬月燒去苗至春去冗苗留旺者俟至指大移栽五歩一株大約種子不如壓條初芽時擇指大枝條旺相肥澤者就馬蹏處劈下潤土内開溝尺許埋實自然生根布葉壓後遇旱扵傍開溝灌之但取水氣到忌多著水農桑要㫖云平原淤壤土地肥虛荆桑魯桑俱可種若山地土脈赤硬止宜荆士民必用云種藝在審時又合地宜使不失其中春分前十日為上時當發生也十月小春木氣長生也亦可壓桑有三宜時宜和包宜固壅宜厚大抵天氣晴眀己午時借其陽和如栽子已出忽變天氣即以熱湯調泥培之暑月必待晩凉仍預扵園中稀種麻麥為䕃惟十一月不生農桑撮要云十二月内掘坑深闊約二小尺却扵坑畔取土糞和成泥漿桑根埋定糞土培壅與地平次日築實切不可動搖其桑加倍榮旺勝如春栽又法将桑根浸糞水一宿掘坑栽之栽宜淺種以芽稀者為上諺云臘月栽桑桑不知増汜勝之書種桑法每畝以黍椹子各三升合種之黍桑當俱生鋤之桑令稀疎調適黍熟穫之桑生正與黍髙平因以利鎌摩地刈之曝令燥後有風調放火燒之常逆風起火桑至春生一畝食三箔蠶齊民要術桑柘熟時収黒魯椹即日以水淘取子曬燥仍畦種常薅令淨眀年正月移而栽之率五尺一根其下常掘種小荳綠荳栽後二年慎勿採沐大如臂許正月中移之率十歩一樹行欲小犄角不用正相當湏取栽者正月二月中以鈎弋壓下枝令著地條葉生髙數寸仍以燥土壅之眀年正月中截取而種之種樹書榖樹上接桑其葉肥大桑上接棃脆美而甘撒子種桑不若壓條而分根莖淛間植桑斬其葉而植之謂之稼桑却以螺殻覆其頂恐梅雨侵損其皮故也二年即盛農政全書𤣥扈先生曰接桑莫如當年條為妙三年之說不然也且接時必待月暗自下弦至上弦皆可晦尤妙自上弦至下弦皆忌望尤險取葚與雞鴨食之糞中淘出種者更不生葚本新書曰地桑本出魯桑須以魯桑萌條如法栽培㨂肥旺者約留四五條鋤治添糞條有定數葉不繁多衆葉脂膏聚於一葉其葉自大即是地桑王禎曰齊民要術栽取椹之黒者翦去兩頭惟取中間一截盖兩頭者其子差細種則成雞桑花桑中間一截其子堅栗則枝榦堅強而葉肥厚将種之時先以柴灰淹揉次日水淘去輕秕不實者曬令水脈才乾種乃易生士農必用地桑之功惟在治之如法不致荒燥桑者易生之物除十一月不生活餘月皆可仍須扵園内稀種檾或麻黍為䕃斫樹法自移栽時便割去梢既不留中心其條自向外長科條法有四等一瀝水條向下垂者一刺身條向裏生者一駢指條相併生者一冗脞條雖順生却稠冗臘月為上正月次之博聞録白桑少子壓枝種之若有子可便種湏用地隂處其葉厚大得繭重實絲每倍常原採桑髙者用梯摘庶不傷枝逺出强枝當用闊刃鋒利扁斧轉腕囘刃向上斫之枝查既順津脈不出葉必復茂諺曰斧頭自有一倍葉此善用斧之效也柔桑髙枝不勝梯湏置桑几如髙櫈下列二桄作登級斯易摘葉又不傷樹培桑凡耕桑田不用逅樹犁不著處斸土令起斫去浮根以蠶矢糞之根下埋龜甲則茂盛而不蛀生黄衣亦以此治之修桑削其小枝則葉茂去其枯枝則不荒蠶事畢将枝髠去但髠時不可留嘴角及夏至開掘根下用糞或蠶沙培壅則生意鬱積来年嫩枝之葉更覺茂盛且皮可製紙枝可當柴兼有餘利附録桑椹増說文葚桑實也本草桑子曰椹椹與葚通集韻一作􅀈一作黮李時珍曰椹有烏白二種彚考増詩衛風吁嗟鳩兮無食桑葚傳鳩鶻鳩也食桑葚過則醉而傷其性魯頌翩彼飛鴞集于泮林食我桑黮懐我好音傳黮桑實也爾雅桑㸤有葚梔注㸤半也疏桑樹一半有葚半無葚為梔晉書張天錫傳㑹稽王道子問西土所出天錫應聲曰桑葚甘香鴟鴞革響乳酪養性人無妒心隋書循吏傳趙軌少好學有行檢東鄰有桑葚落其家軌遣人悉拾還其主誡其諸子曰吾非以此求名意者非機杼之物不願侵人汝等宜以為誡北史崔逞傳道武攻中山未尅六軍乏糧問計扵逞逞曰飛鴞食葚而改音詩稱其事可取以助糧帝乃聽人以葚當租神異經東方有桑焉椹長三尺五寸圍如長東觀漢記蔡君仲汝南人至孝王莽亂人相食君仲取桑椹赤黒異器賊問仲仲答曰黒者供母赤者自食賊異之遺鹽二斗漢武帝内傳神仙上藥有扶桑丹椹魏畧楊沛為新鄭長興平末人多飢窮沛課民益畜乾椹収䝁豆閱其有餘以補不足如此積得千餘斛蔵在小倉㑹太祖為兖州刺史西迎天子所将千餘人皆無糧過新鄭沛謁見乃皆進乾椹太祖甚喜後賜生口十人絹百疋以報乾椹也魏書袁紹之在河北軍人仰給桑椹神仙傳班孟者不如何許人或云女子也人家有桑果數千株皆聚之成積如山如此十餘日吹之各還本處異苑北方有白桑椹長數寸食之甘羙漢興平元年九月桑再椹時劉𤣥徳軍小沛年荒榖貴士衆皆飢仰以為糧晉武帝大元中太原王戎為鬱林太守泊船新亭眠夢有人以七枚椹子與之著衣襟中既寤得椹如夢中發䝉記鳩以桑椹為酒謂飲之即醉也拾遺記員嶠山有木名猗桑煎椹以為蜜原金樓子始皇聞鬼谷先生言故遣徐福入海求金菜玉蔬并一寸椹集藻表増唐李嶠為鳳閣侍郎李元素進冬椹表臣某言聞京兆萬年縣大寜坊有桑一株暮秋生子初冬椹熟今謹取得専輙進奉伏惟陛下恵覃區㝢仁洎草木故得神蠶之樹發秀扵寒露之辰帝女之林結實扵繁霜之下出扵萬年之界彰一人萬嵗之符生自大寜之坊表羣生大安之慶鴟鴞已革見蠻貊之懐音絲繭行豐知府蔵之逾實殊禎洊委絶貺仍臻凡在含生孰不忻慶無任忭躍之至賦増晉傅𤣥桑椹賦繁實離離含甘吐液翠朱三變或𤣥或白嘉味殊滋食之無斁七言絶句増宋陸㳺詠園中草木日高未辦續晨炊一椀村醅且療飢槃箸索然君勿笑桑間紫椹正纍纍詩散句増唐羅隠紫飽垂新椹宋司馬光桑䕃青青紫椹垂張耒桑間椹熟麥齊腰陸游鬱鬱林間桑椹紫桑林紫葚纍纍熟桑間椹紫蠶齊老别錄増本草衍義夲經言桑甚詳然獨遺烏椹桑之精英盡在扵此采摘㣲研以布濾汁石器熬成稀膏入蜜熬稠貯瓷器中滚湯㸃服消熱止渇其性微凉故也仙方日乾為末蜜和為丸酒服亦良本草綱目楊氏産乳云孩子不得與桑椹食令児心寒四時月令云四月宜飲桑椹酒能理百種風熱其法用椹汁三斗重湯煮至一斗半入白蜜二合酥油一兩生薑一合煮令得所瓶収每服一合和酒飲之亦可以汁熬燒酒蔵之經年味力愈佳史言魏武帝年乏食得乾椹以濟飢金末大荒民皆食椹獲活者不可勝計則椹之乾濕皆可救荒平時不可不收採也原収椹農桑撮要子熟時摘取以水淘過畧曬乾便掘深坑種之或畦種之便生即時多収椹子以待来春種尤佳収貯勿近濕壁墻邉則浥損不生學山蠶經五月也収桑椹而水淘少曬焉畦而種之至冬而焚其梢及眀年而分種之附録桑寄生増本草别録曰桑上寄生生𢎞農川谷桑樹上三月三日采莖葉隂乾韓保昇曰諸樹多有寄生莖葉並相似云是鳥食物子糞落樹上感氣而生葉如橘而厚輭莖如槐而肥脆處處雖有湏桑土者佳非自采即難以别可斷莖視之色深黄者為騐朱震亨曰桑寄生藥之要品而人不諳其的近海州邑及海外之境其地暖而不蠶桑無採捋之苦氣濃意厚自然生出也李時珍曰寄生髙者二三尺其葉圓而微尖厚而柔面青而光澤背淡紫而有茸川蜀桑多時有生者他處鮮得須自采或連桑採者乃可用别録原梧潯雜佩桑寄生酒出梧州色白味頗清冽晉張華詩蒼梧竹葉清陳張正見詩浮蟻擅蒼梧皆謂此苐釀者必和以燒酒以氣候炎蒸恐酒味易敗故耳飲勿過多附録桑花増本草桑花一名桑蘚一名桑錢生桑樹上白蘚如地錢花様不是桑椹花也能健脾澀腸止血柘増古今注柘實曰隹音錐言隹鳥所食也本草按陸佃埤雅云柘宜山石柘之從石取此義冦宗奭曰柘木裏有紋亦可旋為器葉可飼蠶曰柘蠶然葉硬不及桑葉李時珍曰處處山中有之喜叢生幹疎而直葉豐而厚團而有尖其葉飼蠶取絲作琴瑟絃清響勝常爾雅所謂棘繭即此蠶也其實状如桑子而圎粒如椒其木染黄赤色謂之柘黄彚考増詩大雅攘之剔之其檿其柘疏攘去之剔翦之者其為檿木其為柘木之材也集傳檿山桑也與柘皆美材可為弓幹又可蠶也禮記投壺投壺矢以柘若棘母去其皮注取其堅且重也考工記弓人為弓取幹之道七柘為上唐書南蠻傳自曲靖州至滇池食蠶以柘蠶生閲二旬而繭織錦縑精緻新論楚柘質勁必資榜檠以成弴弓清異録張曲江里第之側有古柘嘗因狂風發其一根解為器具花紋甚竒人又以公之手筆冠世目之曰文章樹羣碎録古史考曰柘樹枝長而勁烏集之將飛柘樹反起彈烏烏乃號呼此枝為弓快而有力因名烏號之弓博聞録柘葉豐而厚春蠶餐之其絲以冷水繰之謂之冷水絲别録増齊民要術種柘法耕地令熟耬耩作壠柘子熟時多収以水淘汰令淨曝乾散訖勞之草生㧞却勿令荒沒三年間劚去堪作渾心扶老杖十年中四破為杖任為馬鞭胡床十五年任為弓材亦堪作屐裁截碎木中作錐刀靶二十年好作犢車材欲作鞍橋者生枝長三尺許以䋲縳旁枝木橛釘著地中令曲如橋十年之後便是渾成柘橋欲作快弓材者宜扵山石之間北隂種之附録奴柘増本草陳蔵噐云奴柘生江南山野似柘節有刺冬不凋李時珍曰此樹似柘而小有刺葉亦如柞葉而小可飼蠶御定佩文齋廣羣芳譜卷十一
