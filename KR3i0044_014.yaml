body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷十二桑麻譜苧麻增廣雅苧三稜也説文麻草也可以為繩本草苧麻作紵可以績紵故謂之紵凡麻絲之細者為絟粗者為紵原苧績麻也有二種一種紫麻一種白苧出荆揚閩蜀江浙今中州亦有之皮可績布苗髙七八尺葉如楮葉而無義面或青或紫背白有短毛花青如白楊而長夏秋間著細穗一朵數千穗白色子熟茶褐色根黃白而輕虗一科數十莖宿根在土中到春自生不須栽種荆揚間每歲三刈每畝得麻三十斤少亦不下二十斤每斤三百文過常麻數倍又有一種山苧頗相似蠶最惡麻凡麻枲之屬近蠶種則不生戒之本草李時珍曰苧家苧也又有山苧野苧也有紫苧葉面紫白苧葉面青其背皆白可刮洗煮食味甘美九月收子二月可種宿根六月生根葉氣味甘寒無毒彚考原詩王風丘中有麻彼留子嗟增齊風藝麻如之何衡從其畝陳風東門之池可以漚紵傳紵麻屬周禮地官凡宅不毛者有里布注謂不植桑麻也欲令宅植桑麻則無稅賦以勸之不植桑麻之毛者則罰以二十五家之稅布左傳詩曰雖有絲麻無棄菅蒯後漢書崔實傳實出為五原太守五原土宜麻枲而俗不知績織民冬月無衣積細草而臥其中見吏則衣草而出實至官斥賣儲偫為作紡績織紝綀縕之具以教之民得以免寒苦魏書食貨志諸麻布之土男夫及課别給麻田十畝婦人五畝隋書食貨志河清三年每丁給永業二十畝為桑田不宜桑者給麻田南史甄法崇傳法崇孫彬嘗以一束苧就長沙寺庫質錢後贖苧還于苧束中得五兩金送還寺庫道人以金半仰酬往復十餘彬堅然不受因謂曰五月披羊裘而負薪豈拾遺金者耶伏暅傳暅徙新安太守在郡清恪郡多麻苧家人乃至無以為繩其勵志如此唐書食貨志丁隨鄉所出嵗輸絹二匹綾絁二丈布加五之綿三兩麻三斤非蠶鄉則輸銀十四兩謂之調越絶書麻林山勾踐欲伐吳種麻以為弓絃故曰麻林墨子婦人夙興夜寐紡績織紝多治麻絲葛緒細布縿此其分事也荀子麻葛繭絲鳥獸之羽毛齒革也固有餘足以衣人矣淮南子汾水濛濁而宜麻風俗通蓬生麻中不扶自植廬陵記成芳隱麥林山剝苧織布為短襴寬袖之衣著以酤酒自稱隱士衫集藻贊增晉郭璞麻贊草皮之良莫貴於麻用無不給服無不加至物在邇求之好遐詩散句原唐杜甫青青屋東麻散亂牀上書增劉禹錫暖分煨芋火眀借緝麻燈晉謝靈運折麻心莫展宋戴復古蔽門麻菶菶别録原苧根味甘刮洗去皮切片浸去惡水煮極熟食之甜美稚頭中有綿芼之和粉食可救荒移栽苧已盛時宜于周圍掘取新科如法移栽則本科長茂新栽又多或如代園種竹法于四五年後將根科最盛者間一畦移栽一畦截根分栽或壓條滋生此畦既盛又掘彼畦如此更代滋植無窮將欲移栽預選秋耕熟肥地更用細糞糞過來春移栽地氣動為上時萌芽為中時苗長為下時周圍離一尺五寸作區移栽擁土畢以水淹之若夏秋須趂雨後地濕連土于近地栽亦可苗髙數寸即用大糞和半水澆之最忌豬糞或曰苧月月可栽但須地濕一云苧根忌見星月堂屋內收藏若露地須用苫蓋使見星月即變野苧栽根用刀將根截作三四指長栽時四圍各離一尺五寸作區每區臥栽二三根擁土畢方澆水三五日再澆苗高勤鋤旱則澆之第二年方堪再刈至年久根科盤結不旺掘根分栽若欲致逺須少帶原土裹以蒲包外用席包掩合勿透風日數百里外亦可活種子三四月下種園圃有井及臨河處俱可沙地為上兩和地次之劚地一二遍作畦濶半步長四步再劚一遍用杴背浮按稍實再耙平隔宿用水飲畦眀旦細齒耙浮耬起再耙平隨用潤土半升子一合勻撒一合子可種六七畦撒畢苕帚輕輕掃合用覆土則不出搭棚三尺髙加細箔遮蓋五六月炎熱時箔上加苫重蓋不則曬死未生芽或苗初出不可澆水用炊帚細灑水於棚上常令濕潤每夜及天陰去箔以受露氣苗出有草即拔去苗高三指不須用棚如地稍乾用水輕澆約長三寸擇稍壯地作畦移栽隔宿飲苗眀旦將空畦澆過帶土撅苗移栽相離四寸頻鋤三五日一澆二十日後十餘日一澆十月後用牛馬糞蓋厚一尺庶不凍死二月後耙去糞令苗出以後嵗嵗如此若北土春月亦不必去糞即以作壅可也凡蓋用糞壤諸雜草穢敝席舊薦俱可子種者三四年之後方堪刈切忌太早刈麻每嵗可割三鐮頭次見根旁小芽高五六分大麻即可割大麻既割小芽便盛即二次麻若小芽過高大麻不割不惟芽不旺又損大麻大約五月初割一鐮六月半或七月初割二鐮八月半或九月初割三鐮諺曰頭苧見秧二苧見粳三苧見霜唯二鐮長疾麻亦最好割後即以細糞壅之旋用水澆必以夜或陰天若日下澆則皮有繡䀶剝麻刈倒時隨用竹刀或鐡刀從梢分開剝下皮即以刀刮其白瓤其浮上皴皮自脫得其裏如筋者煮之剝麻春夏和暖時與常法同若冬月用溫水潤濕易為分劈首苧粗徑堪為粗布二苧稍柔細惟三苧甚佳堪為細布刮苧之刀煆鐡為之長三寸許捲成小槽內插短柄兩刃向上以繩為用仰置手中將所割苧皮橫覆刃上以大指就按刮之苧膚即脫漚麻縛作小束搭房上夜露晝曬五七日自然潔白若值陰雨於屋底風道搭晾經雨即黑一云績既成纒作纓子于水盆內浸一宿紡訖用桑柴灰淋水浸一宿撈出每纑五兩用淨水一盞細石灰拌勻停一宿至來日擇去石灰却用黍秸灰淋水煮過自然白軟曬乾再用清水煮一度别用水擺極淨曬乾逗成纒鋪經織造與常法同一云紡成纑用乾石灰拌和夏三冬五春秋酌中抖去别用石灰煮熟待冷於清水中濯淨然後用蘆簾平鋪水面攤纑於上半浸半曬遇夜收起瀝乾次日如前候纑極白方可織布此池漚之法須假水浴日曝而成善績者麻皮一斤得績一斤織布一匹次者斤半又次二斤三斤其布柔韌潔白比常布價高一二倍又曰漚麻者但如法漚訖方績作纑經緯成布非先績後漚也亦有用本色績纑者夜露晝曬數日便績成纑待成布後方練白若如治葛者刈後即蒸熟剝之不復練矣用此作布更柔而且韌收種收子作種須頭苧者佳九月霜降後收子曬乾以濕沙土拌勻盛筐內以草蓋覆若凍損則不生二苧三苧子皆不成不堪作種種時以水試之取沈者用大麻原大麻一名火麻一名黃麻一名漢麻雄者名枲麻爾雅云枲麻疏云麻一名枲牡麻雌者名苴麻爾雅云莩麻母疏苴麻之盛子者也一名莩一名麻母荸麻早春種為春麻晚春種為秋麻莖高五六尺技葉扶疏葉狹而長狀如益母草葉一枝七葉或九葉五六月開細黃花成穗隨即結實似蘇子而大剝去皮作麻績之可為布其秸白而有稜細者可為燭心花名麻勃子之連殼者名麻蕡爾雅云黂枲實疏云即麻子名也蕡與黂通陶𢎞景以為麻花蘇恭以為麻子蘇頌謂蕡子花為三物李時珍云麻勃是花麻蕡是實麻仁是實中仁也一名麻藍一名青葛彚考增書禹貢岱畎絲枲鉛松怪石傳岱山之谷出此五物皆貢之疏枲麻也詩陳風不績其麻市也婆娑箋績麻者婦人之事也疾其今不為東門之池可以漚麻傳池城池也漚柔也箋於池中柔麻使可緝績作衣服疏考工記㡆氏以涗水漚其絲注云漚漸也楚人曰漚齊人曰涹然則漚是漸漬之名此云漚柔者謂漸漬使之柔韌也豳風八月載績傳載績絲事畢而麻事起矣疏績緝麻之名八月絲事畢而麻事起故始績也九月叔苴疏苴麻子也禾麻菽麥大雅麻麥幪幪傳幪幪然盛茂也禮記月令仲秋之月天子食麻與犬以犬嘗麻先薦寢廟注麻始熟也周禮天官籩人朝事之籩其實麷蕡注蕡枲實也鄭司農云熬麥曰麷麻曰蕡疏注云蕡枲實也者案喪服云苴絰子夏傳云苴麻之有蕡蕡是麻之子實也又案疏衰裳齊牡麻絰子夏傳云牡麻者枲麻也則枲麻謂雄麻也若然枲麻無實而解蕡為枲實者舉其類耳典枲掌布緦縷紵之麻草之物以待時頒功而授齎疏曰掌布緦縷紵之麻草之物者欲見布緦縷用麻之物紵用草之物布中可以兼用葛檾之草為之及獻功受苦功以其賈楬而藏之以待時頒注鄭司農云苦功謂麻功布紵疏苦功謂麻功為盬粗之功原孟子麻縷絲絮輕重同則價相若增史記周本紀周后稷名棄棄為兒時屹如巨人之志其遊戲好種樹麻菽麻菽美隋書孝義傳紐回字孝政性至孝父母喪廬於墓側廬前生麻一株高丈許圍之合拱枝葉鬱茂冬夏恆青時人異之周武帝表其閭南史劉峻傳峻好學寄人廡下自課讀書常燎麻炬從夕達旦時或昏睡爇其鬚髮及覺復讀其精力如此列子昔人有美戎菽甘枲莖芹萍子者對鄉豪稱之鄉豪取而嘗之蜇於口糝於腹衆哂而怨之其人大慚注枲胡枲也原紀異録鄭珏與李愚同為學士鄭閣下一麻生李曰承旨入相矣霜降成實乃白麻也是夜制出拜相拜相用白麻崑山縣志嘉祐中崑山海上有一船桅折風飄泊岸船中三十餘人衣冠如唐人繫紅鞓角帶著短皂衫見人慟哭語言書字皆不可曉行則相綴如鴈行久之自出一書示人乃唐天寶中屯羅島首領陪戎副尉又有一書乃上髙麗表亦稱屯羅島皆用漢字蓋東夷之臣屬髙麗者時贊善大夫韓正彥為令召其人犒以酒食且使人為治桅教以起仆之法其人喜各捧首謝而去船中有麻子大如蓮的土人求種之初嵗亦如蓮的次年漸小數年後與中國麻子無異集藻七言絶句增宋陸遊聞鄰村守麻樂事新年憶錦城城南麻市試春行如今老病茅簷底臥聽兒童嚇雀聲詩散句增梁吳均麻生滿城頭麻葉落城溝麻莖左右披溝水東西流别録原種植取斑黑麻子種地須耕二遍一畝用子二升三月種者為上時四月初為中時五月初為下時大率二尺留一科密則不成鋤須淨荒則少實五榖地近道處種之六畜不犯豆地種則兩損六月中可於空處種蔓菁子泛勝之書曰高一尺加蠶矢糞之樹三升無蠶矢以熟糞糞之天旱以流水澆之樹五升井水須少曝以殺其寒氣雨澤適時勿澆澆不欲數霜後實成速斫種宜己亥辛巳壬申庚申戊申及正月三卯日忌寅未日辛亥日種駱麻地宜肥濕早者四月遲者六月繁密處芟去則長刈麻稈上生白膩時即刈攤宜薄束宜少漚宜清水生熟要相宜麻一斤可取皮四兩齊民要術凡種麻用白麻子白麻子為雄麻崔實曰牡麻青白無實兩頭鋭而輕浮麻欲得良田不用故墟地薄者糞之崔實曰正月糞疇疇麻田也耕不厭熟田欲歲易良田一畝用子三升薄田二升夏至前十日為上時至日為中時至後十日為下時麥黃種麻麻黃種麥亦良候也澤多者先漬麻子令芽生待他白背耬耩漫擲子空曵勞澤少者暫浸即出不待芽生耬頭中下之麻生數日中常驅雀布葉而鋤勃如灰便刈束欲小縳欲薄一宿輒翻之穫欲淨漚欲清水生熟合宜汜勝之書曰種枲太早則剛堅厚皮多節晚則不堅寧失于早不失于晚穫麻之法穗勃勃如灰拔之夏至後二十日漚枲枲和如絲檾麻唐本草作􅔾麻原檾麻説文云枲屬從林不從林爾雅翼云檾或作檾種必連頃故謂之檾周禮典枲麻草注草葛檾也增本草􅔾麻一名白麻原苗髙四五尺或六七尺葉似苧而薄種與麻同法葉圓如蓋花黃結子如橡斗而面平中有隔外各有尖子如大麻子而黑有微毛與黃麻子同時熟刈作小束池內漚之爛去青皮取其麻片潔白如雪耐水爛可織為毯被及作汲綆牛索或作牛衣雨衣草覆等具農家嵗嵗不可無者實味苦平無毒治痢疾及生眼翳瘀肉起倒睫拳毛附録疏麻增南越志疏麻大二圍髙數丈四時結實無衰落彚考增丹鉛録楚辭采疏麻兮瑶華注以疏麻即麻也觀南越志所載疏麻則自有此一種木也葛原葛一名黃斤一名鹿藿鹿食九草此其一種故名一名雞齊處處有之江浙尤多有野生有家種春生苗引藤蔓長一二丈紫色取治可作絺綌其根外紫內白大如臂長者七八尺葉有三尖如楓葉而長面青背淡七月著花紅紫色纍纍成穗曬乾可煠食其莢如小黃豆莢有毛子緑色形扁如鹽梅子核生嚼腥七八月採根味甘辛花實味甘平皆無毒增唐本草葛根入土五六寸以上者名葛脰脰者頸也服之令人吐以有微毒也本經葛穀即是其實也彚考增易困卦困于葛藟疏葛藟引蔓纒繞之草詩周南葛之覃兮施于中谷維葉萋萋傳覃延也葛所以為絺綌女功之事煩縟者施移也中谷谷中也萋萋茂盛貌葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁傳莫莫成就貌濩煮之也精曰絺粗曰綌斁厭也南有樛木葛藟纍之傳南南土也本下曲曰樛南土之葛藟茂盛弼風旄丘之葛兮何誕之節兮箋土氣緩則葛生濶節王風綿綿葛藟在河之滸傳綿綿長不絶之貌水崖曰滸正義綿綿然枝葉長而不絶者乃是葛藟之草所以得然者由其在河之滸得河之潤故也彼采葛兮一日不見如三月兮原唐風葛生蒙楚蘞蔓于野增周禮地官掌葛以時征絺綌之材于山農疏所以徴絺綌于山農者以其葛出于山也左傳葛藟猶能庇其本根注葛之能藟蔓繁滋者以本枝廕庥之多汲冡周書礫石不可榖樹之葛越絶書葛山者勾踐種葛使越女織治葛布獻于吳王夫差去縣七里吳越春秋吳王得葛布之獻乃復增越之封賜羽毛之飾几杖諸侯之服越國大恱采葛之婦傷越王用心之苦乃作苦之詩曰葛不連蔓􅀢台台我君心苦命更之嘗膽不苦甘如飴令我采葛以作絲女工織兮不敢遲弱于羅兮輕霏霏號絺素兮將獻之越王恱兮忘罪除吳王歡兮飛尺書增封益地賜羽竒几杖茵褥諸侯儀羣臣拜舞天顔舒我王何憂不能移淮南子於越生葛絺輟耕録臨海章安鎮有蔡木匠夕手持斧斤自外歸由東山殯葬處蔡沈醉寢棺上夜半天黑忽聞一人高叫棺中云某家女病損症蓋其後園葛大哥淫之耳却請法師捉鬼我二人同行一觀何如棺中云我有客至不可去蔡眀日詣某家曰娘子之疾我能愈之因問屋後曽種葛否曰然乃掘地得一根甚巨斫之有血煮啖女子病即除集藻文散句原漢劉向九歎葛藟纍于桂樹兮鴟鳲集于木蘭五言古詩增晉樂府前溪歌黃葛結蒙籠生在洛溪邊花落逐水去何當順流還還亦不復鮮原唐李白黃葛篇黃葛生洛溪黃花自綿羃青煙蔓長條繚繞幾百尺閨人費素手採緝作絺綌縫為絶國衣逺寄日南客蒼梧大火落暑服莫輕擲此物雖過時是妾手中迹增眀張時徹采葛篇種葛南山下春風吹葛長二月吹葛緑八月吹葛黃腰鐮逝采掇織作君衣裳經以長相憶緯以思不忘出入君篋笥長得近輝光層氷布河水中夜皓凝霜吳羅五文采蜀錦雙鴛鴦君恩當斷絶歎息摧中腸中腸日以摧葛葉日以衰願留枯根株化作萱草枝七言古詩增唐鮑溶采葛行春溪幾回葛花黃黃麝引子山山香蠻女不惜手足損鈎刀一一率利長葛絲茸茸春雪體深澗擇泉清處洗殷勤十指蠶吐絲當窗嫋嫋聲高機織成一匹無一兩供進天子五月衣五言律詩增唐戎昱和李尹種葛弱質人皆棄唯君手自栽藟含霜後竹香惹臘前梅擬托凌雲勢須憑接引材緑陰如可惜黃鳥定飛來七言絶句原唐曹唐小逰仙詩方士飛軒駐碧霞酒香風冷月初斜不知誰唱春歸曲落盡溪頭白葛花詩散句增魏曹植種葛南山下葛藟自成陰唐孟郊葛花零落風項斯螢歸葛葉垂韓􅀈葛花滿把能消酒羅鄴石井晴垂青葛葉别録原梁書任昉傳昉素清貧卒後其子西華冬日著葛帔練裙道逢劉孝標孝標泫然矜之乃著廣絶交論蓋譏其舊交也增南史隱逸傳吳苞濮陽鄄城人宋太始中過江聚徒教學冠黃葛巾竹麈尾蔬食二十餘年原葛根端陽午時採破之曬乾入藥解酒毒治消渴傷寒壯熱敷蟲蛇傷殺百藥毒壓丹石發瘡疹又可蒸及作粉食甚益人生者墮胎多食傷胃花同小豆花乾為末酒服飲酒不醉金瘡出血挼葉傅之燒蔓研水服治卒然喉痺採葛夏月葛成嫩而短者留之一丈上下者連根取謂之頭葛如太長看近根有白點者不堪用無白點者可截七八尺謂之二葛練葛採後即挽成網緊火煮爛熟指甲剝看麻白不黏青即剝下長流水邊捶洗淨風乾露一二宿尤白安陰處忌日色紡之以織洗葛衣清水揉梅葉洗經夏不脆或用梅葉搗碎泡湯入磁盆內洗之忌用木器則黑附録鐵葛增本草拾遺鐵葛生山南峽中葉似枸杞根如葛黑色味甘溫無毒主一切風血氣羸弱令人性健久服治風緩偏風木棉花按斑枝花與木棉同類異種原附録于後今從本草併合為一其諸家辨論不一具載彚考中以備參考增本草木棉一名古貝似木者名古貝或作吉貝乃古字之訛一名古終似草者名古終梵書謂之啖婆又曰迦羅婆劫李時珍曰木棉有草木二種交廣木棉樹大如抱其枝似桐葉大如胡桃葉入秋開花紅如山茶花蘂花片極厚為房甚繁短側相比結實大如拳實中白棉棉中有子今人謂之斑枝花訛為攀枝花南史所謂林邑國出古貝花中如鵝毳吳録所謂永昌木棉樹髙過屋皆指似木之木棉也江南淮北所種木棉四月下種莖弱如蔓髙者四五尺葉有三尖如楓葉入秋開花黃色如葵花而小亦有紅紫者結實大如桃中有白棉棉中有子大如梧子亦有紫棉者八月採謂之綿花南史所謂髙昌國有草實如繭中絲為細纑名曰白疊南越志謂桂州出古終藤結實如鵝毳皆指似草之木棉也此種出南番宋末始入江南今遍及江北與中州矣原春月以子種秸似木葉緑似牡丹而小花黃如秋葵而葉單幹不貴髙長枝最喜繁茂結實三稜青皮尖頂纍纍如桃北人呼為花桃熟則桃裂而絨現其絨如鵝毳用以絮衣甚輕暖子如珠可以打油油之滓可以糞地秸甚堅堪燒葉堪飼牛其為利益甚溥種類甚多江花出楚中棉不甚重二十而得五性強緊北花出畿輔山東柔細中紡織綿稍輕二十而得四或得五浙花出餘姚中紡織綿最重二十而得七吳下種大都類此更有數種稍異者一曰黃蒂穰蒂有黃色如粟米大棉重一曰青核核青細于他種棉重一曰黑核核亦細純黑色棉重一曰寬大衣核白而穰浮棉重此四種皆二十而得九黃蒂稍強緊餘皆柔細中紡織又一種紫花浮細而核大棉輕二十而得四其布製衣甚朴雅士紳多尚之又有深青色者亦竒種其傳不廣擇種須用青核等為佳彚考增書禹貢島夷卉服厥篚織貝集傳卉草也葛及木綿之屬今南夷木棉之精好者亦謂之吉貝海島之夷以卉服來貢而吉貝之精者則入篚焉南史高昌國傳有草實如繭中絲為細纑名曰白疊取以為帛甚軟白林邑國傳出古貝古貝者樹名也其花成時如鵝毳抽其緒紡之以作布與紵布不殊亦染成五色織為斑布呵羅單國傳都闍婆洲元嘉七年遣使獻古貝葉波國古貝等物丹丹國傳梁中大通二年遣使奉表獻古貝雜香藥唐書南蠻傳婆利以古貝橫一幅繚於腰古貝草也緝其花為布粗曰貝精曰􅂒吳録交址安定縣有木棉樹髙丈實如酒杯口有綿如蠶之綿也又可作布名曰白緤一名毛布南越志桂州出古終藤結實如鵝毳核如珠治出其核紡如絲綿染為斑布南州異物志木棉吉貝所生熟時如鵝毳細過絲綿中有核如珠珣用之則治出其核昔用輾軸今用攬車尤便其為布曰斑布繁縟多巧曰城次粗者曰文縟又次粗者曰烏驎諸番雜志木棉吉貝木所生占城闍婆諸國皆有之今已為中國珍貨但不自本土所産不能足用演繁露唐環王傳出古貝古貝草也緝其花為布粗曰貝精曰㲲按今吉貝亦緝花為之而古吉二字不同豈訛名耶抑兩物也遁齋間覽閩嶺以南多木棉土人競植之有至數千株者采其花為布號吉貝布余後因讀南史海南諸國傳言林邑等國出吉貝木正此種也泊宅編閩廣多種木棉紡績為布名曰吉貝海南蠻人織為巾上出細字雜花卉尤工巧即古所謂白疊布李琮詩有腥味魚中墨衣成木上綿之句原解醒語元至元間馬八兒國入貢二十二年遣使至其國求竒寶得吉貝衣十襲吉貝樹名其花成時如鵝毳抽其緒紡之以作布亦染成五色織為斑布增丹鉛總録唐李商隱詩木棉花發鷓鴣飛又王睿詩紙錢飛出木棉花南中木棉樹大如抱花紅似山茶而蘂黃花片極厚非江南所藝者張勃吳録云交趾安定縣有木棉樹實如酒杯口有綿可作布按此即今之斑枝花雲南阿迷州有之嶺南尤多汪廣洋有斑枝花曲閩部疏昔聞長老言廣人種棉花髙六七尺有四五年不易者余初未之信過泉州至同安龍溪間扶搖道傍狀若榛荆迫而視之即棉花也時方清秋老幹已著黃花矣然不可呼為木棉木棉花者高樹丹花若茶吐實蓬蓬吳中所謂攀枝花也楊用修具載丹鉛以為異曰雲南阿迷州有之聞嶺廣猶多不知惠安志已載此樹名為攀桂花楊乃曰斑枝花與吳中攀枝花蓋三名一物也原梧潯雜佩吾松以棉布衣被天下而棉花之來莫詳其始相傳為種出西番元時始入中國按通鑑梁武帝送木棉皂帳史照釋文云木棉江南多有之以春二三月下種既生須一月三薅至秋生黃花結實及熟時其皮四裂其中綻出如棉土人以鐵鋋碾去其核取如棉者以竹為小弓長尺四五寸許牽弦以彈綿令其勻細卷為筒就車紡之自然抽緒如繅絲狀織以為布按史照所言即今之綿花無疑矣但今制彈綿之弓以木為之長六尺餘則與古稍異耳謂起自元時非也苐史照以此解木棉亦未為當木棉出交廣其樹盈抱其實如酒杯其口有綿可作布見張勃吳録即今之斑枝花楊用修辨之是矣木綿一名瓊枝其高數丈樹類梧桐葉類桃而稍大花色深紅類山茶春夏花開滿樹望之爛然如綴錦花謝結子大如酒杯絮吐于口茸茸如細毳舊云海南蠻人織為布名曰吉貝今第以充裀褥取其軟而溫未有治以為布者潯梧間亦多有之但土人未嘗採取隨風飄墜而已農政全書玄扈先生曰吉貝之名獨昉于南史相傳至今不知其義意是海外方言也小説家所謂木棉其所為布曰城曰文縟曰烏驎曰斑布曰白㲲白緤曰屈珣者皆此故是草本而吳録稱木棉者南中地暖一種後開花結實以數嵗計頗似木芙蓉不若中土之嵗一下種也故曰十餘年不換眀非木本矣吉貝之稱木即禹貢之言卉取别于蠶綿耳閩廣不稱木棉者彼中稱攀枝花為木棉也攀枝花中作裀褥雖柔滑而不韌絶不能牽引豈堪作布或疑木棉是此謂可為布而其法不傳非也吳録所言木棉亦即是吉貝或疑其云樹高丈當是攀枝不知攀枝高十數丈南方吉貝數年不凋其高丈許亦不足怪蓋南史所謂林邑吉貝吳録所謂永昌木棉皆指草本之木棉可為布意即娑羅木然與斑枝花絶不類又中土所織棉布及西洋布精粗不等絶無光澤而余見曹溪釋惠能所傳衣曰屈珣布即白㲲布云是西域木棉心所織者其色澤如蠶絲豈即娑羅籠假耶抑西土吉貝尚有他種邪又嘗疑洋布之細非此中吉貝可作及見榜葛刺吉貝其核絶細綿亦絶軟與中國種大不類乃知向來所傳亦非其佳者集藻序增元王禎木棉圗譜序中國自桑土既蠶之後惟以繭纊為務殊不知木棉之為用夫木棉産自海南諸種藝制作之法駸駸北來江淮川蜀既獲其利至南北混一之後商販于此服被漸廣名曰吉布又曰綿布其幅匹之制特為長濶茸密輕暖可抵繒帛又為毳服毯假足代本物按裴淵廣州記云蠻彞不蠶採木棉為絮又諸番雜志云木棉吉貝木所生占城闍婆諸國皆有之今已為中國珍貨但不自本土所産不能足用且比之蠶桑無採養之勞有必收之效將之枲苧免績緝之工得禦寒之益可謂不麻而布不繭而絮雖曰南産言其通用則北方多寒或繭纊不足而裘褐之費此最省便列製造之具于此廣逺近滋習農務助桑麻之用華夏兼蠻彝之利將自此始矣眀王象晉木棉譜序禹貢島夷卉服厥篚織貝蔡氏謂棉之精好者為吉貝徐子先吉貝一疏載棉之利最詳興美利前民用仁人之言夫今棉之利遍宇內且功力視苧葛甚省績苧葛日以錢計紡綿四日而得一斤信其利逺出麻枲上也今北土廣樹藝而昧于織南土精織紝而寡於藝若以北之棉學松之織利當更倍顧棉則方舟而鬻諸南布則方舟而鬻諸北此子先所為歎也豫故撮其旨要俾務本者得覽焉賦御製木棉賦并序木棉之為利於人溥矣衣被禦寒實有賴焉夫既紡以為布復擘以為絖卒嵗之謀出之隴畝功不在五榖下嘗稽之載籍島夷卉服注以為吉貝即其種也然止以充逺方之貢而未嘗遍植于中土故周禮婦功惟治蠶枲唐徴庸調但及絲麻至木棉之種後世由外蕃始入于關陜閩粵今則逺邇貴賤咸資其利而昔人篇什罕有及之者故為之賦曰考吉貝之佳種披丘索以窮源道伽毗而逺來由秦粵而衍蕃倣崖州之紡織製七襄而無䀶效宋人之洴澼比八綿而同溫先麥秋而播種齊壺棗而登原宿黃雲于萬蘂墮白雪于千村落秋實于露晞軋機柚于星昏暖佐耆年之帛陽回寒女之門幸卒嵗之可娛乃民力之普存若應鐘之司律正薄寒之中人月照牛衣之夜霜侵葛屨之辰家挾千箱之纊路絶百結之鶉曝茅簷而歌愛日賽田祖而洽比鄰謝履絲之靡麗免于貉之艱辛故夫八口之家九土之氓無沍寒之膚裂罕疾風之條鳴時和年豐水耨火耕嵗落三鍾之棉場登百畝之粳同彼婦子樂此太平奚羡纂組之巧與夫縞紵之輕慨風詩之未録省方問俗將以補豳什而續授衣之經五言古詩增宋謝枋得謝劉純父惠木棉布嘉樹種木棉天何厚八閩厥土不宜桑蠶事殊艱辛木棉收千株八口不憂貧江東易此種亦可致富殷奈何來瘴癘或者畏蒼旻吾知饒信間蠶月如岐邠兒童皆衣帛豈但奉老親婦女賤羅綺賣絲買金銀角齒不兼與天道斯平均所以木棉利不畀江東人避秦衣木葉矧肯羞懸鶉天下有元德孔融願卜鄰綈袍望不及共裘志自仁贈我以兩端物意皆可珍潔白如雪積麗密過錦純羔縫不足貴狐腋難擬倫絺纊皆作貢此物不薦陳豈非神禹意隱匿遺小民詩多草木名箋疏欲諄諄國家無楚越欲識固無因翦裁為大裘窮冬勝三春詩散句原唐張籍蜀客南行祭碧雞木棉花發錦江西增宋劉克莊幾樹半天紅似染居人云是木棉花楊萬里却是南中春色别滿城都是木棉花元方夔木棉白茸茸别録原種植種花之地以白沙土為上兩和土次之喜髙亢惡下濕拾花畢即剗去秸遍地上糞隨深耕之令陽和之氣掩入土內有力耕三遍隨撈平不致風乾如秋耕二遍正月地氣透或時雨過再耕一遍大約糞多則先糞而後耕糞少則隨種而用糞此其槩也須用熟糞麻餅亦佳增農政全書花性忌燥燥則濕蒸而桃易脫落花忌苖並並則直起而無旁枝中下少桃種不宜晚晚則秋寒早則桃多不成實即成亦不甚大而花軟無絨玄扈先生曰秋耕為良穫稻後即用人耕又不宜耙細須大墢岸起令其凝沍來年凍釋土脈細潤正月初轉耕二月初再轉此二轉必撈蓋令細清明前作畦畛土欲絶細畦欲濶溝欲深既作畦便于白地上鋤三四次雨後鋤為良則土細而草除原棉田于清眀前先下壅或糞或灰或豆餅或生泥多寡量田肥瘠銼豆餅勿委地仍分定畦畛均布之吾鄉密種者不得過十餅以上糞不過十石以上懼大肥虗長不實實亦生蟲若依古法苗間三尺不妨一再倍也有種晚棉用黃花苕饒草底壅者田擬種棉秋則種草來年刈草壅稻留草根田中耕轉之若草不甚盛加别壅欲厚壅即並草掩覆之或種大麥蠶豆等並掩覆之皆草壅法也草壅之收有倍他壅者惟生泥棉所最急不論何物壅必須之擇種農桑通訣云花種初收者未實近霜者不生惟中間收者為上老農云棉種必冬月碾取經日曬燥冬月生意斂藏曬曝不傷萌芽春間生意茁發不宜大曬總之陳者粃者油者濕蒸者經火焙者皆不堪作種將種時用水浥濕過半刻淘出其不堪者皆浮出水面而堅實不損者必沈取而種之苗必茂又一法浸用雪水能旱鰻魚汁浸過不蛀下種種不宜蚤恐春霜傷苗又不宜晚恐秋霜傷桃大約在清眀榖雨間此時霜止也種法有三漫撒者用種多更難耘耬耩者易鋤而用種亦多惟穴種者用種頗少但多費人工法將耕過熟地仍用犁耕過就于溝內隔一尺作一穴澆水一二碗俟水入地下種四五粒熟糞一碗覆土一二指用腳踏實大約一人持種二人攜糞若漫撒及耬耩者須用石砘砘實若虛浮則芽不能出出亦易萎耘苗鋤棉者一去草穢二令浮土附苗根則根入地深三令土虗浮根苗得逺行功須極細密鋤必七遍以上又當在夏至前諺曰鋤花要趂黃梅信鋤頭落地長三寸大抵苗宜稀鋤宜密此要訣也初頂兩葉止剗去草宜密留以備傷再鋤宜稍密三鋤則定苗科一穴止留粗旺者一株斷不可兩株並留並則直起而無旁枝桃少苗長後有幹粗葉大衆中特壯異者名曰雄花大而不結實然又不可無間留一二株多則去之地中不可種别物恐分地力又不宜密種如肥田密種即青酣不實又易生蟲稀種則能肥肥則實繁而多收亢倉子曰立苗有行故速長強弱不相害故速大正其行通其中疏為冷風則有收而多功又云樹肥無使扶疏樹磽不欲専生而獨居夫苗其弱也欲孤其長也欲相與俱其熟也欲相與扶扶疏且不可况逼迫耶若數寸一株長枝布葉株百餘子畝二三百斤豈不力省而利倍哉打心苗髙七八寸打去衝天心令四旁生枝旁枝半尺以上亦打去心勿令交枝相揉如此則花多實密葉葉不空大約打心當在伏中三伏各打一次不宜雨暗恐聾灌而多空條最宜晴眀庶旺相而生旁枝如有未長大者又當隨時打去不必例拘增農政全書打心視苗遲早早者大暑前後摘遲者立秋摘秋後勢定勿摘矣摘亦不復生枝簡别之法老農云一二次鋤去大葉者此大核少棉種也三鋤後去小葉者此秕不實種也或實而油浥病種也苐此為雜種言耳若純用墨核等佳種精擇之自無大核雜種即全去小者原拾花花既結桃待桃開絨露為熟旋熟旋摘攤放箔上日曝夜露待子粒既乾方可收貯則絨不浥而子不腐紡績花既曝乾碾去種子彈使熟細便可紡線農桑通訣所載紡車容三繀若倣其製而效之尤易為力或曰北地風高細紡不易今肅寧之布幾同松之中品聞其鄉多穿地窖深數尺作屋其上簷高地二尺許作窗以通日光人居其中就濕地紡績便得緊細與南土無異若陰雨蒸濕不妨移就平地而南人寓都下者多朝夕就露下紡日中陰雨亦紡則安在北地風高不便細紡也織布布之名不一曰城曰文縟曰烏驎曰屈珣曰白㲲白緤曰貝布斑布總之皆棉布也海南所織上出細字雜花名吉貝布松布之巧者有折枝團鳳碁局字樣等製而一切桿彈紡織綜線挈花法皆始于黃媼其布之麗密他方莫並焉南中用糊先將棉繀入紝車成紝次入糊盆度過竹木作架兩端用繂急維竹帚痛刷候乾上機謂之刷紗南布之佳者皆刷紗也北地則風塵易起若依肅寧作窖冒以修廊循簷作窗令可開闔以避就風日於中經刷織紝遇輕陰無風纎塵不起不妨移之平地成布當不減吳下矣御定佩文齋廣羣芳譜卷十二
