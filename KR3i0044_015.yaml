body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷十三蔬譜薑原薑説文作薑禦濕之菜也苗髙二三尺葉似箭竹葉而長兩兩相對苗青根嫩白老黃無實處處有之漢溫池州者良三月種五月生苗如初生嫩蘆而葉稍濶葉亦辛香秋社前後新芽頓長如列指狀采食無筋尖微紫名紫芽薑又名子薑秋分後者次之霜後則老性惡濕畏日秋熱則無薑氣味辛微溫無毒通神明辟邪氣益脾胃散風寒除壯熱治脹滿去胸中臭氣解菌菌諸毒生用發熱熟用和中留皮則涼去皮則熱八九月多食春多患眼孕婦忌食令兒盈積彚考原論語不撤薑食增史記貨殖傳千畦薑韭其人與千戶侯等後漢書方術傳左慈少有神道嘗在司空曹操坐求銅盤貯水以竹竿餌釣於盤中引出鱸魚操又謂曰既已得魚恨無蜀中生薑耳慈曰亦可得也操恐其近即所取因曰吾前遣人到蜀買錦可過敕使者增市二端語頃即得薑還并獲操使報命南齊書良政傳孔琇之為臨海太守在任清約罷郡還獻乾薑二十斤世祖嫌少及知琇之清乃歎息原南史周捨傳捨占對辨捷嘗居直廬語及嗜好裴子野言從來不嘗食薑捨應聲曰孔稱不撤裴乃不嘗一坐皆悅呂氏春秋和之美者蜀郡楊朴之薑春秋運斗樞璇星散為薑風土失得逆時則薑有翼辛而不臭神仙傳介象垂綸塪水得鯔魚使厨下切之吳主曰聞蜀使來得蜀薑作韲甚好恨爾時無此象曰蜀薑豈不易得願差所使者可付值吳主指左右一人以錢五十付之象書一符以著青竹杖中使行人閉目騎杖杖止便買薑訖復閉目此人承其言騎杖須臾止已至成都不知是何處問人人言是蜀市中乃買薑於時吳使張溫先在蜀既於市中相識甚驚便作書寄其家此人買薑畢捉書負薑騎杖閉目須臾已還吳厨下切鱠適了酉陽雜俎山上有薑下有銅錫李先生傳郎中喬翻於洋渚遇神人意欲啖薑而市無之神人以絹數匹并書一牒付信入市門南下任意所之須臾得薑數斗還以問神人神人曰問李先生當知我東坡雜記王介甫多思而喜鑿時出一新説既而悟其非也則又出一言而解釋之是以其學多説嘗與劉貢父食輟箸而問曰孔子不撤薑食何也貢父曰本草生薑多食損智道非明民將以愚之孔子以道教人者也故不撤薑食將以愚之也介甫欣然而笑久之乃悟其戲已也貢父雖戲言然王氏之學實大類此庚辰二月十一日食薑粥甚美歎曰無怪吾愚吾食薑多矣因并貢父言記之以為後世君子一笑集藻賦散句增漢司馬相如子虛賦茈薑蘘荷張衡南都賦蘇蔱紫薑拂徹羶腥晉潘嶽間居賦青筍紫薑左思蜀都賦甘蔗辛薑陽蓲隂敷魏都賦薑芋充茂五言古詩原宋梅堯臣謝劉原父寄糟薑名園萬家城千畦等封侯斸當燕去前醃芽費糟丘無筋偃王笑有味三閭羞寄入翰林席聖以不撤優又寄蓬門下作賦誰肯休惟我廣文舍免為韲鹽仇劉公漢家裔才學歆向儔胸中飽經史辨論出九州曽不奉權貴但與故人投贈辛非贈甘此意當自求五言絶句原宋劉子翬詠子薑新芽肌理細映日瑩如空恰似勻妝指柔尖帶淺紅朱子子薑薑云能損心此謗誰與雪請論去穢功神明看朝徹詩散句增唐李商隱蜀薑供煮陸機蓴宋蘇軾先社薑芽肥勝肉故人兼致白芽薑别録增韓詩外傳宋玉因其友見楚相楚相待之無以異讓其友其友曰夫薑桂因地而生不因地而辛女因媒而嫁不因媒而親原長編秦檜欲晏敦復附已使人諭之晏答曰為我謝秦公薑桂之性到老愈辣種植宜白沙地小與糞和種熟耕縱橫七八遍佳清明後三日種濶一步作畦長短隨地橫作壠壠相去一尺深五六寸壠中安薑一尺一科帶芽大三指蓋土三寸覆以蠶沙無則用熟糞雞糞尤妙芽出後有草即耘漸漸以土蓋之已後壠中却令高不得去土為其芽向上長也芽長後從旁揠去老薑耘鋤不厭數五六月覆以柴棚或插蘆蔽日不耐寒熱八月收取九月置暖窖中寒甚作深窖以粳粃和埋暖處勿凍壞來年作種吳下田家志種薑宜甲子乙丑辛未壬申壬午製用生熟醋醬糟鹽蜜煎皆宜早行山中含之不犯霜霧蒸濕及山嵐之瘴氣法製伏薑薑四斤刮去粗皮洗淨曬乾放磁盆入白糖一斤醬油二斤官桂大茴香陳皮紫蘇葉各二兩切細拌勻初伏曬起至三伏終收貯曬時用紗或夏布罩住勿令蠅蟲飛入此薑神妙能治百病伏月以老薑切片稱一斤重為率曬乾先用官桂茴香丁香川椒各一兩為末浸鏡面牽燒酒二斤俟藥氣化溶閉罐蒸待冷將曬乾生薑浸酒內曬乾又浸又曬以酒盡為度磁罐收貯如冬月大寒侵晨噙薑一片通身和暖蜜煎薑秋社前取嫩芽二斤洗淨控乾不用鹽醃以沸湯瀝乾用白礬一兩半湯泡化一宿澄清浸薑十餘日方以蜜煎磁罐貯留經年須常換蜜脆薑以嫩者去皮甘草白芷零陵香少許同煮熟切片食法製薑煎沸湯八升入鹽三斤打勻次早别取清水以白梅半斤捶碎和浸同前鹽水和合貯頓逐日採牽牛花去白蒂投水中候水深濃去花取嫩薑十斤拭去紅衣隨意切片用白鹽五兩白礬五兩沸湯五碗化開澄清浸薑微向日影中曬二日撈出晾乾再入少鹽拌勻曬烈日中待薑上白鹽凝燥為度入器收貯醋薑嫩薑不拘多少炒鹽醃一宿取出滷同米醋煮數沸候冷入薑及沙糖隨多少箬扎泥封固糟薑嫩薑天晴時收隂乾五日以麻布拭去紅皮每一斤用鹽二兩糟三斤醃七日取出拭淨别用鹽二兩法糟五斤拌勻入新磁罐先以核桃二枚捶碎安罐底則薑不辣然後入薑平糟面以小熟栗末摻上則薑無渣如常法泥封固如要色紅入釅牛花拌糟糟薑取嫩薑用酒拌糟勻入磁罈上用沙糖一塊箬扎口泥封七日可食醋薑炒鹽醃一宿以原滷入釅醋同煎五味薑嫩薑一斤切薄片用白梅半斤打碎去仁入炒鹽二兩拌勻曬三日取出用甘草半兩檀香二錢為末拌勻曬三日磁器收貯九月二十八日食薑損目增南方草木狀冬葉乃薑葉也苞苴物交廣皆用之南方地熱物易腐敗惟冬葉藏之乃可持久齊民要術生薑一斤淨洗刮去皮笇子切不患長大如細漆箸以水二升煮令沸去沫與蜜二升煮復令沸更去沫碗子盛合汁減半奠用箸二人共無生薑用乾薑法如前唯切欲極細蜜薑法用生薑淨洗削治十月酒糟中藏之泥頭十日熟出水洗內蜜中大者中解小者渾用竪奠四又云卒作削治蜜中煮之亦可用東坡雜記豫昔監郡錢塘遊淨慈寺衆中有僧號聰藥王年八十餘顔如渥丹目光炯然問其所能蓋診脈知吉凶如智緣者自言服生薑四十年故不老云薑能健脾溫腎活血益氣其法取生薑之無筋滓者然不用子薑錯之并皮裂取汁貯器中久之澄去其上黃而清者取其下白而濃者隂乾刮取如麵謂之薑乳以蒸餅或飰搜和丸如桐子以酒或鹽米湯吞數十粒或取末置酒食茶飲中食之皆可聰曰山僧孤貧無力治此正爾和皮嚼爛以溫水咽之耳初固辣稍久則否今但覺甘美而已椒原椒一名花椒一名大椒一名檓爾雅云檓大椒注云實大者名為檓一名秦椒以産自秦地故名今北方秦椒另有一種生秦嶺泰山琅琊間今處處有之椒稟五行之精葉青皮紅花黃膜白子黑氣香最易蕃衍枝間有刺扁而大葉對生形尖有刺堅而滑澤蜀吳製作茶四月開細花五月結子生青熟紅大於蜀椒其目亦不及蜀椒光黑出隴西天水粒細者善今成臯諸山有竹葉椒小毒熱不堪入藥東海諸山上亦有椒枝葉亦相似子長而不圓甚香味似橘皮椒閉口者殺人五月食損氣傷心令人多忘中毒者涼水麻仁漿解之彚考原詩唐風椒聊之實蕃衍盈升彼其之子碩大無朋椒聊且逺條且陳風貽我握椒周頌有椒其馨增史記禮書椒蘭芬茝所以養鼻也晉書石崇傳崇與貴戚王愷羊琇之徒以奢靡相尚崇塗屋以椒愷用赤石脂宋史地理志黎州貢紅椒山海經景山其草多秦椒琴鼓之山其木多椒荀子民之親我歡若父母其好我芬若椒蘭淮南子申椒杜茝美人之所懷服也及漸之於􅎵則不能保其芳矣漢官儀皇后稱椒房取其實蔓延盈升以椒塗室亦取其溫暖春秋運斗樞玉衡星散為椒孝經援神契椒薑禦濕菖蒲益聰原四民月令正月之旦進酒降神畢室家無大小次坐先祖之前子孫各上椒酒於其家長稱舉白增燉煌新録蘇割剌答魯之右大渾中高百尋然無草木石皆赩色山産椒椒大如彈丸然之香聞數里每然椒則有鳥自雲際蹁躚五色名赭爾鳥蓋鳯凰種也漢武帝遣將軍趙破奴逐之得其椒不能解詔問東方朔朔曰此天仙椒也塞外千里有之能致鳯武帝植之太液池至元帝時椒生果有異鳥翔集下黃私記鍾繇嬖庶子會之母黜其夫人文帝命繇復之繇恚忿餐椒致噤帝乃止東坡詩注吳真君服椒法并歌曰其椒應五行其仁通五義服之半年內腳心汗如水瀛崖勝覽蘇門答剌者即古須文逹那國其地依山則種椒園蔓生如中國甜菜狀花黃子白其實初青老則紅半老則采之曝乾每百斤直白金一兩集藻銘增晉成公綏椒華銘嘉哉芳椒載繁其實厥味惟珍蠲除百疾肇惟歲始月正元日永介睂壽以祈初吉頌增晉劉臻妻元日獻椒花頌美哉靈葩爰采爰獻聖容映之永壽於萬贊增晉郭璞椒贊椒之灌植實繁有倫薰林烈薄馞其芬辛服之不已洞見通神文賦散句增楚屈原離騷雜申椒與菌桂兮巫陽將夕降兮懷椒醑以要之九歌奠桂酒兮椒漿播芳椒兮盈堂九章惟佳人之獨懷兮折芳椒以自處漢司馬相如子虛賦椒桂木蘭劉向九歎懷椒聊之蔎蔎兮魏曹植七啓紫蘭丹椒施和必節晉左思蜀都賦或蕃丹椒七言律詩增明僧宗林花椒欣欣笑口向西風噴出玄珠顆顆同采處倒含秋露白曬時嬌映夕陽紅調漿美著騷經上塗壁香凝漢殿中鼎餗也應加此味莫教薑桂獨成功五言絶句原唐王維椒園桂尊迎帝子杜若贈佳人椒漿奠瑶席欲下雲中君裴迪椒園丹刺罥人衣芳香留過客幸堪調鼎用願君垂採摘詩散句原唐杜甫守歲阿戎家椒盤已頌花增白居易聞道雲南有瀘水椒花落時瘴煙起周庾信椒花逐頌來紅椒艷復殊原唐杜甫椒實雨新紅增孟浩然石上攢椒樹李賀椒花墜紅濕雲間元馬祖常椒花染紫風雨香别録增酉陽雜俎椒可以來水銀椒氣好下物類相感志用鹽擂椒椒味好原養生要論十二月臘夜令人持椒臥井旁無與人言內椒井中除瘟病枝山前聞盛起東寅嘗夜夢有人寄椒於家久矣忽欲椒遂私發而用之既覺深自咎曰豈吾平日義心不明以致此耶迄不能寐坐以待旦種植先將肥潤地耕熟二月內取子種之以灰糞和細土覆蓋則易生此物乃陽中之物不耐寒冬月草苫免致凍死來年分栽離七八尺用麻籸灰糞和細土栽忌水浸根又宜焦土乾糞壅培遇旱用水澆灌三年後換嫩枝方結實以髮纒樹根或種香白芷或種生菜皆辟蛇食椒收摘中伏後晴天帶露收忌手捻隂一日曬三日則紅而裂遇雨薄攤當風處頻翻若㷈則黑不香若收作種用乾土拌和埋於避雨水地內深一尺勿令水浸生芽製用去目及閉口者炒熱隔紙鋪地上以碗覆待冷碾紅入藥附録川椒增本草川椒一名巴椒一名蜀椒一名南椒一名蓎藙一名點椒一名含丸使者見陶榖清異録蘇頌云木髙四五尺似茱萸而小有針刺葉堅而滑可煮飲食四月結子無花但生於枝葉間顆如小豆而圓皮紫赤色李時珍曰蜀椒子光黑如人之瞳人故謂之椒目原川椒肉厚皮皺粒小子黑外紅裏白入藥以此為良他椒不及也增四川志各州縣俱出椒惟茂州出者最佳其殼開合者最妙附録崖椒增本草崖椒一名野椒不甚香子灰色不黑無光附録蔓椒增本草蔓椒一名豬椒一名豕椒一名彘椒一名豨椒一名狗椒一名金椒野生林箐間枝軟如蔓子葉皆似椒山人亦食之附録地椒增本草地椒出上黨郡其苗覆地蔓生莖葉甚細花作小朵色紫白因舊莖而生即蔓椒之小者集藻五言律詩增元許有壬地椒凍雨催花紫輕風散野香刺沙尖葉細敷地亂條長楚客收成裹奚童擷滿筐行厨供草具調鼎爾非良附録胡椒增本草胡椒一名昧履支向隂生者名澄茄向陽生者名胡椒原酉陽雜俎胡椒生西戎摩伽陀國今南番諸國滇南海南交趾諸地皆有之其苗蔓生莖極柔弱葉長寸半有細條與葉齊條上結子兩兩對其葉晨開暮合合則裹其子於葉中子形似漢椒至芳辣六月採今作胡盤肉皆用之彚考增宋史地理志廣州貢胡椒尚書故實元載家籍財貨諸物得胡椒八百石瀛崖勝覽阿枝國産胡椒往往種於圃四百斤直金錢百文銀直五兩珠以分論古俚國産胡椒亦以圃種十月熟别録原本草李時珍云自少嗜胡椒每歲病目後痛絶之目病亦愈後略食一二目便昏澀蓋辛走氣熱助火也病咽喉口齒者亦宜忌之附録番椒增草花譜番椒叢生白花子儼似秃筆頭味辣色紅甚可觀子種茴香原茴香一名蘹香本草云俚俗多懷之襟袵咀嚼蘹香之名或以此增本草茴香一名八月珠原宿根深冬生苗作叢肥莖緑葉五六月開花如蛇牀花而色黃子如麥粒輕而有細稜俗呼為大茴香近道人家園圃種者甚多以寧夏者為第一其他處小者名小茴香辛平無毒理氣開胃夏月袪蠅辟臭煮臭肉下少許即不臭臭醬入末少許亦香故曰茴香别録原種植收時隂乾宜向陽地以糞土和子種之仍種麻一窠以避日色十月斫去枯梢以糞土壅根下附録八角茴香原茴香自番舶來者實大如柏實裂成八瓣一瓣一核大如豆黃褐色有仁味更甜俗呼舶茴香又曰八角茴香廣西左右江洞中亦有之形色與中國茴香迥别但氣味同耳桂海果志八角茴香北人得之以薦酒少許咀嚼甚芳香附録蒔蘿增本草蒔蘿一名慈謀敕一名小茴香原蒔蘿初生佛誓國今嶺南及近道皆有之三四月生苗開花其子簇生狀如蛇牀子而短微黑芳辛不及茴香善滋食味多食無損健脾開胃下氣利膈溫腸殺魚肉毒補水臟治腎氣壯筋骨治小兒氣脹霍亂嘔逆腹冷不下食兩肋痞滿忌同阿魏食奪其味也韭原韭説文云一種而久者故謂之韭象形在一之上一地也一名豐本曲禮云韭曰豐本一名起陽草一名草鍾乳本草拾遺云言其溫補也一名懶人菜爾雅翼曰諺云韭者懶人菜以其不須歲種也莖名韭白根名韭黃花名韭菁叢生豐本長葉青翠八月開小白花成叢醃作茹益人增爾雅藿山韭疏韭生山中者名藿本草山韭一名韱音纖形性與家韭相類但根白葉如燈心苗山中往往有之彚考原詩豳風四之日其蚤獻羔祭韭增禮記王制庶人春薦韭內則豚春用韭秋用蓼原周禮天官朝事之豆其實韭菹醓醢漢書循吏傳龔遂為渤海太守勸民務農桑令口種一樹榆百本薤五十本蔥一畦韭增晉書石崇傳崇每冬得韭䓑韲王愷密貨崇帳下問其所以答云韭䓑韲是搗韭根雜以麥苗耳原南齊書庾杲之傳杲之清貧自業食惟有韭葅􅀢韭生韭雜菜或戲之曰誰謂庾郎貧食鮭常有二十七種言三九也周顒傳顒清貧寡欲終日長蔬食雖有妻子獨處山舍文惠太子問顒菜食何味最勝顒曰春初早韭秋末晚菘增宋史禮志太宗景祐三年禮官宗正請每歲春孟月薦蔬以韭以菘配以卵食貨志男女十歲以上種韭一畦濶一步長十步乏井者鄰伍為鑿之易稽覽圖政道得則隂物變為陽注若蔥變為韭是也山海經丹熏之山其草多韭薤視山其上多韭原夏小正正月囿有韭莊子徐無鬼見魏武侯武侯曰先生居山林食芧栗厭蔥韭以賓寡人久矣今老耶其欲干酒食之味耶其寡人亦有社稷之福耶增説苑衛有五丈夫俱負缶而入井灌韭終日一區鄧析過下車為教之曰為機重其後輕其前命曰橋終日溉韭百區不倦五丈夫曰吾師言曰有機智之巧必有機智之敗我非不知不欲為也漢武內傳西王母曰仙之次藥有八阮赤韭典術聖王之世功濟天下者堯也天星降精於庭為韭感而為菖蒲焉原郭林宗别傳林宗有友人夜冒雨至翦韭作炊餅食之水經注從平樂山順流五六里山甚高峻上合下空中有石林甚整頓旁生野韭人往乞者神許則風吹别分隨偃而拔不得過越不偃而拔輒凶洛陽伽藍記陳留侯李崇為尚書令儀同三司富傾天下而性多儉吝惡衣粗食常無肉味止有韭薤崇客李元祐語人云李令公一食十八種人問其故元祐曰二韭一十八聞者大笑增三國世略北齊太上後宫無限衣皆珠玉一女歲費萬金寒月盡皆食韭芽天台山記赤城山有洗腸井昔曇猷禮石橋應真怪其腹中有韭氣猷出腸洗之至今韭尚叢生焉清異録杜頤食不可無韭人惡其噉候其僕市還潛取棄之怒罵曰奴狗奴狗安得去此一束金也張耒詩注俗言八月韭佛開口爾雅翼物久必變故老韭為莧五色線韭多補泄子甚溫俗間呼草鍾乳真誥云務光服韭煎以入清泠之淵也北征録北邊雲臺戎地多野韭沙蔥人皆采而食之集藻傳原明王肅豐本傳豐本蓋古仙人一號久視先生相傳伊耆氏之世澗居學道得不死術後出仕於周其職為醢人屬與昌氏菁氏茆氏共掌俎豆凡祭祀燕享王及后世子之內羞咸取給焉故周公天官書列其職戴氏禮記載其名豳七月詩亦歌其仲春薦廟事周亡不知所之或云隱畦町間與農圃者伍人多怪之或執而髠其首或戕其支體尋復生完衆始知先生為仙人也漢時與處士郭林宗友林宗館於家客至輒命與同食晉衛尉石崇豪侈擅一世知先生賢咄嗟召之先生亦不拒往就然策崇必敗曰不去將纍我我固不憂為彼纍也遽逸去南齊侍中庾杲之家貧好清士每延先生共飯人皆曰庾郎得豐本為不貧矣唐隱者衛賓與拾遺杜甫善甫嘗過賓宿先生亦冒雨至相與酣飲甚適甫有詩美之載甫集中先生貌蒼古緑髮白趾常被翠羽衣所栖止人望之恆有氣鬱蔥然即之咀嚼其言論有至味令人灑然忘俗壽莫知其幾也今遊會稽巖壑中時時過山人韓氏亭上吟翁錬士多有見之者云賦散句增漢張衡南都賦秋韭冬菁梁元帝玄覽賦金鹽玉豉堯韭舜榮五言律詩增元許有壬韭花西風吹野韭花發滿沙陀氣較葷蔬媚功於肉食多濃香跨薑桂餘味及瓜茄我欲收其實歸山種澗阿五言絶句原宋劉子翬詠韭肉食嘲三九終憐氣韻清一畦春雨足翠髮翦還生增明高啓韭芽抽冒餘濕掩冉煙中縷幾夜故人來尋畦翦春雨七言絶句增宋方嶽種韭下秧已覺齒生津坐想堆盤夜雨春政恐厨人無變饌庾郎貧不似吾貧詩散句原宋張耒荒園秋露瘦韭葉色茂春菘甘勝蕨人言佛見為下筯芼炙烹羮更滋滑陸遊舍東種早韭生計似庾郎蘇軾漸覺東風料峭寒青蒿黃韭試春盤增方嶽却喜庾郎貧到骨韭畦時一摘煙苗蔣竹隱見説周顒誇早韭斸煙鋤雨幸時分宋沈約時韭日離離原唐杜甫夜雨翦春韭增韓愈畦肥翦韭薤原白居易秋韭花初白宋蘇軾辛盤得青韭增陸遊雨足韭頭白金元好問韭早春先緑元周權早韭緑且纖宋蘇軾韭芽戴土拳如蕨别録原韭根多年交結則不茂秋月掘出去老根分栽壅以雞豬糞亦可子種可生可熟可淹可久菜之最有益者是處有之葉髙三寸便翦翦過糞土壅培之翦忌日中一年四五翦留子者止一翦子黑而扁九月熟收子風中隂乾勿令浥鬱韭葉熱根溫功用同生則辛而散痰散血熟則甘而補中補腎除熱下氣益陽止㵼子甘溫暖腰膝春食香夏食臭多食昏神暗目不可與蜜及牛肉同食熱病後十日食之即發冬月多食動宿飲吐水酒後尤忌宿韭忌食五月食韭損人北人冬月移根窖中養以火炕培以馬糞葉長尺許不見風日色黃嫩謂之韭黃味甚美但不益人多食滯氣發病收子如收蔥子法如市賣者以銅鐺盛水於火上微煮須臾生芽者可種如不生是裛鬱者不堪作種種植土欲熟糞欲勻畦欲深二月七月種先將地掘作坎取碗覆土上從碗外落子以韭性向內生不向外生也常薅令淨四時類要云收韭子種韭第一畨割棄之主人勿食事類書云韭畦用雞糞尤佳至五年根必滿蟠虯而不長擇高腴地分種之正月上辛日掃去畦中陳葉以鐵杷摟起下水加熟糞高三寸便翦用凡近城郭有園圃者種三十餘畦貿易足供家費秋後又可採韭花供蔬茹至冬養韭黃比常韭易利數倍或只就畦中覆以馬糞北面竪籬障以禦北風至春其芽早出長二三寸便可賣較之他菜為利甚溥增吳下田家志種韭宜甲子辛未己卯辛巳甲申辛卯原製用糟韭肥嫩者赤日曝至將乾以甕鋪熟糟一層排韭一層相間如此壓緊收用鹽韭霜後肥韭淨洗控乾收磁鉢內鋪韭一層撒鹽一層醃二三宿翻數次裝入罐用元滷少加香油浸之醃韭花韭花半結子時收摘去蒂梗一斤用鹽三兩同搗爛入罐中或就中醃小茄小黃瓜先别用鹽醃去水晾三日入韭花中拌勻用銅錢三四文著瓶底却入韭花妙附録孝文韭增本草孝文韭生塞北山谷狀如韭人多食之云是魏孝文帝所種附録諸葛韭增本草諸葛韭諸葛亮所種韭更長彼人食之李時珍曰此亦山韭也但因人命名耳附録水韭增北户録水韭生於池塘中葉似韭得非龍爪韭乎字林云蘞音嚴水中野韭也原有二三尺者五六月堪食不葷而脆蔥原蔥一名芤本草云草中有孔故字從孔一名菜伯一名和事草清異録云蔥和羮衆味若藥劑必用甘草也所以文言曰和事草一名鹿胎初生曰蔥針葉曰蔥青衣曰蔥袍莖曰蔥白葉中泲曰蔥苒葉溫白與鬚平味辛無毒有數種一種凍蔥即冬蔥夏衰冬盛莖葉氣味俱軟美食用入藥最善分莖栽蒔而無子人稱慈蔥又稱大官蔥謂宜上供也一種漢蔥本草云一名木蔥其莖粗硬故有木名春末開花成叢青白色冬即葉枯亦供食品胡蔥生蜀郡山谷狀似大蒜而小形圓皮赤葉似蔥根似蒜味似薤不甚臭八月種五月收一名蒜蔥又名回回蔥莖葉粗硬茖蔥山蔥也生於山谷似蔥而小細莖大葉爾雅云茖山蔥疏云蔥生山中者名茖生沙地者名沙蔥又有一種樓蔥亦冬蔥之類江南人呼為龍角蔥龍爪蔥羊角蔥皮赤莖上生根移下種之每莖上葉出岐如八角故名蔥白辛葉溫根鬚平主發散是處皆有生熟皆可食更宜冬月戒多食四月每朝空心服蔥頭酒調血氣正月忌食令人面起遊風生同蜜食作下利燒同蜜食壅氣殺人生合棗食令人病合犬雉肉食多令人病血服地黃常山人忌用彚考增禮記曲禮蔥泄處末注泄蒸蔥也內則膾春用蔥秋用芥脂用蔥切蔥若薤實諸醯以柔之原漢書循吏傳大官園種冬生蔥韭菜茹覆以屋廡晝夜㸐藴火待溫氣乃生信臣以為此皆不時之物有傷於人不宜以奉供養後漢書逸民傳井丹性清高未嘗修刺候人建武末五王皆好賓客更遣請丹不能致信陽侯隂就以外戚貴盛乃詭説五王求錢千萬約能致丹而别使人要劫之丹不得已既至就故為設麥飯蔥葉之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更置盛饌乃食增後漢書獨行傳陸續詣洛陽詔獄母至京師作饋食付門卒以進續對食悲泣不能自勝使者怪而問其故續曰母來不得相見故泣耳使者大怒以為獄門吏卒通傳意氣召將案之續曰因食餉羮識母所自調和故知來耳非人告也使者問何以知母所作乎續曰母常截肉未嘗不方斷蔥以寸為度是以知之晉書藝術傳佛圖澄誡石勒曰今年蔥中有蟲食必害人可令百姓無食蔥也勒班告境內慎無食蔥俄而石蔥果走原梁書呂僧珍傳僧珍去家久表求拜墓髙祖欲榮之使為本州刺史從父兄子宏以販蔥為業僧珍既至乃棄業欲求州官僧珍曰吾荷國重恩無以報效汝等自有常分豈可妄求叨越但當速反蔥肆耳增唐書屈突通傳通蒞官徑正有犯法者雖親無所回縱其弟蓋為長安令亦以方嚴顯時為語曰寧食三斗艾不見屈突蓋寧食三斗蔥不逢屈突通西域傳泥婆羅遣使入獻波稜酢菜渾提蔥山海經邊春之山多蔥葵韭北單之山無草木多蔥韭管子齊桓公五年北征山戎出冬蔥與戎菽布之天下莊子春月飲酒茹蔥以通五臟淮南子君子之於善也猶采薪者見青蔥則拔之列仙傳阮丘蛆山上種蔥百餘年乃去漢武內傳西王母曰仙人上藥有玄都綺蔥春秋元命苞天門山上有蔥所種畦隴悉著行人拔取者悉絶若請神而求即不拔自出竒異辛香四民月令三月别小蔥六月别大蔥夏蔥曰小冬蔥曰大東觀漢記孔奮字君魚為姑臧長前長居官數月輒致資産奮在姑臧四歲財物不增唯老母極膳妻子但食蔥菜或嘲奮曰置脂膏中不能自潤晉令居洛陽內園菜欲以當課者聽其引長流灌紫蔥可各三畝廣志休循國居蔥嶺東其山多大蔥華陽國志曹公既與先主語失言會天震雷先主曰聖人言迅雷風烈必變良有以也曹公亦悔失言使人窺之見其拔蔥公曰大耳公未覺也其夜先主急去西河舊事蔥嶺在燉煌西八十里其山髙大上生蔥故曰蔥嶺續搜神記新野趙真家園中所種蔥未經抽拔忽一日盡縮入地後經歲餘真之兄弟自相分散酉陽雜俎山上有蔥下有銀清異録盤盞蔥趙魏間有之幾如拄杖粗但盈尺耳集藻賦散句增宋謝靈運撰征賦寒蔥摽倩以凌隂七言絶句原宋陸遊蔥瓦盆麥飯伴鄰翁黃菌青蔬放筯空一事尚非貧賤分芼羮僭用大官蔥詩散句增宋蘇軾總角黎家三小童口吹蔥葉送迎翁章淳井丹已厭嘗蔥葉庾亮何勞惜薤根唐曹唐隴上沙蔥葉正齊原宋陳師道已辦煮餅澆油蔥增元耶律楚材勻和豌豆揉蔥白别録原種植子味辛色黑作三瓣狀有皺紋收取隂乾若令浥濕則不生留春月調畦種良地三翦薄地再翦翦宜平旦避熱宜與地平勿太深太髙八月止不止則無袍而損白凡栽蔥曬稍蔫將冗鬚去淨疏行密排豬雞鴨糞和粗粳壅之不拘時冬蔥暑種則茂吳下田家志種蔥宜甲子甲申己卯辛未辛巳辛卯千金月令冬至日取葫蘆盛蔥根莖汁埋於庭中夏至發開盡為水以漬金玉銀石青各三分自消曝乾如飴可休糧久服神仙名曰金液漿附録水蔥增丹鉛總録水蔥生水中如蔥而中空又名翠菅此草可為席集藻詩散句增唐王維水驚波兮翠菅靡蒜原蒜一名葫以來自蕃中又稱胡蒜一名大蒜一名葷菜葉如蘭莖如蔥根如水仙味辛處處有之而北土以為常食八月分瓣種之當年便成獨顆及熟每瓤五七瓣或十餘瓣亦有獨顆者苖嫩時可生食夏初食薹秋月食種乾者可食至次年春盡花中有實亦作蒜瓣而小可食孫愐唐韻云張騫使西域始得大蒜初時中國止有小蒜一名茆蒜一名薍一名蒚爾雅云蒚山蒜一名澤蒜為其生於野澤也又名山蒜石蒜為其生於山或石邊也本草云山蒜澤蒜石蒜同一物也但分生於山澤石間不同呂忱字林云􅀈音吟水中蒜然則蒜不特生於平原及山石而又生於水矣本草云别有山慈姑老鴉蒜石蒜之類根葉皆似蒜而不可食性辛溫有小毒其氣薰烈能通五臟逹諸竅去寒濕辟邪惡消癰腫化癥積肉食解暑毒嵐瘴苐辛能散氣熱能助火傷肺損目伐性昏神有荏苒受之而不知者鍊形家以小蒜大蒜韭藝薹胡荽為五葷道家以韭薤蒜藝薹胡荽為五葷佛家以大蒜小蒜興渠慈蔥茖蔥為五葷雖品各不同然皆辛薰之物生食增恚熟食發淫有損性靈故絶之云獨顆者切片炙癰疽腫毒最效月令三月勿食蒜亦忌常食彚考原爾雅孫炎正義黃帝登蒚山遭蕕芋草毒得蒜嚙食乃解遂收植之能殺腥羶蟲魚之毒增夏小正戴氏傳卵蒜也者本如卵者也南史張融傳豫章王大會賓僚張融食炙始行畢行炙人便去融欲求鹽蒜口終不言方搖食指半日乃息唐書宗楚客傳楚客諷趙延禧陳符命以媚帝曰去六月九日內出瑞蒜也東觀漢記李恂為兖州刺史所種園小麥胡蒜悉付從事無所留崔豹古今注蒜卵蒜也俗人謂之小蒜外國有蒜十許子共為一株籜幕裹之尤辛於小蒜俗人呼之為大蒜原髙士傳閔貢字仲叔世稱節士雖周黨之潔清自以弗及也黨見仲叔食無菜遺以生蒜仲叔曰我欲省煩耳今更作煩耶受而不食增袁子正書袁子曰吾嘗與陳子息於鄴東門外見一父老方坐而食其子投之蒜食必有餘欲棄則惜欲持去則暑遂盡食於是太辛螫其腸胃兩目盡赤陳子笑之吾謂曰子之家中牛羊數千而不敢食天暑有暍死者而後食之病子之軀亦猶是也蓮社髙賢傳曇翼入秦望山誦法華經十二年感普賢大士化女子身披采服攜筠籠一白豕大蒜兩根至師前託宿夜半呼腹疼告師摩按師辭以持戒不應手觸乃布裹錫杖遙為按之翌日女以采服化祥雲豕變白象蒜化雙蓮凌空而上謂師曰我普賢菩薩特來相試異苑越王餘蒜生南海水中如竹算子長尺許白者似骨黑者如角古云越王曾於舟中作籌有餘者棄之水中而生鄴侯外傳泌為兒童時身輕能於屏風上立薰籠上行道者云十五歲必白日升天至其年八月十五日笙歌在室時有綵雲挂於庭樹李氏之親愛乃多貯蒜韲至數斛伺其異音竒香之至潛令人登屋以巨杓揚濃蒜潑之香樂遂散自此更不復至清異録蒜五代宫中呼麝香草因話録裴晉公不喜服食每語人曰雞豬魚蒜遇著即食圖經京口有蒜山多生大蒜集藻五言律詩增宋范成大頃在嶠南其人好食檳榔合蠣灰蔞藤食之輒昏然已而醒快三物合和唾如膿血可厭今來蜀道又為食蒜者所薰戲題旅食諳殊俗堆盤駭異聞南餐灰薦蠣巴饌菜先葷幸脫蔞藤醉還遭胡蒜薰絲蓴鄉味好歸夢水連雲詩散句原明馮琦再刖誰明玉羣言竟破葫别録增顔氏家訓三輔決録云前隊大夫范仲公鹽豉蒜果共一筒果當作魏顆之顆北士通呼物一由改為一顆蒜顆是俗間常語耳故陳思王鷂雀賦云頭如顆蒜目似花椒江南但呼為蒜符不知謂為顆學士相承讀為裹結之裹言鹽與蒜共苞一裹內筒中耳正史削繁音義又音蒜顆為苦戈反皆失也原種植多能鄙事熟耕地一二次爬成溝二寸一窠種一瓣苗出髙尺餘頻鋤鬆根旁頻以糞水澆之拔去薹則瓣肥大不則瘦小澤潞種蒜初出如翦韭二三次愈肥美一説九月初於菜畦中稠栽蒜瓣候來年春二月先將地熟鋤數次每畝上糞數十擔再鋤耙勻持木槊插一竅栽一株栽遍或無雨常以水澆至五月大如拳極佳四民月令布榖鳴收小蒜六月七月可種小蒜八月可種大蒜爾雅翼種蒜宜良軟地三遍熟耕之五寸一株諺曰左右通鋤一萬餘株收條中種者一年為獨瓣二年成大蒜科皆如拳今并州無大蒜朝歌取種一歲之後還成百子蒜其瓣粗細正與條中子同原吳下田家志種蒜宜戊辰辛未戊申丙子壬辰癸巳辛丑製用醋蒜淨蒜瓣一斤用石灰湯焯過晾乾用鹽三錢醃一宿漉出再晾乾用鹽七錢炒乾以頭醋投入炒鹽內煎一二沸候冷入罐泥封經年不壞糟蒜每一斤石灰湯煠過晾去水乾鹽兩半糟一斤半拌勻入罐內泥封兩月後可食乾蒜薹鹽醃三日曬乾元滷煎滚煠過又曬乾蒸熟磁罐盛之久留不壞九月勿食蒜傷神損壽魂魄不安增物類相感志食蒜令口中不臭同生薑棗子同食附録水晶蔥原水晶蔥葉似蔥而實蒜不臭宜鬆土鋤溝擺於內用牛馬糞粳粃拌土蓋之仍以芝麻秸蓋於上八月種來年五七月收宜薑醋浸薤原薤一名藠子藠音叫或作蕎者非一名蓧子蓧音釣因其根白呼為藠子江南人訛為蓧字一名火蔥收種宜火薰一名菜芝爾雅翼云夫物英華之美者莫如芝故薤曰菜芝一名鴻薈爾雅云薤鴻薈注云即薤菜也增酉陽雜俎蔬薤白華一名守宅一名家芝原本文作薤韭類也爾雅翼云薤似韭而無實亦不甚葷葉中空似細蔥葉而有稜氣亦如蔥體光華露難佇古人所以歌薤露也八月栽根正月分蒔宜肥壤數枝一本則茂而根大二月開細花紫白色根如小蒜一本數顆相依而生五月葉青則掘之否則肉不滿其根煮食芼酒糟藏醋浸皆宜故內則云切蔥薤實諸醯以柔之增本草蘇恭云有赤白二種白者補而美赤者苦而無味原味辛苦溫滑無毒王禎農書云生則氣辛熟則甘美種之不蠧食之有益故學道人資之老人宜之增爾雅葝山薤本草蘇頌曰山薤莖葉與家薤相類而根差長葉差大僅若鹿蔥體性亦與家薤同農書野薤俗名天薤生麥原中葉似薤而小味益辛亦可供食但不多有彚考增禮記內則膏用薤原少儀為君子擇蔥薤則絶其本末增後漢書龎參傳參為漢陽太守郡人任棠者有竒節隱居教授參到先候之棠不與言但以薤一大本水一盂置戶屏前自抱孫兒伏於户下主簿白以為倨參思其微意良久曰棠是欲曉太守也水者欲吾清也拔大本薤者欲吾擊強宗也抱兒當户欲吾開門恤孤也於是歎息而還晉書庾亮傳亮噉薤因留白陶侃問曰安用此為亮曰故可以種侃於是尤相稱歎云非惟風流兼有為政之實山海經峽山其草多薤韭列仙傳務光服蒲薤根洞冥記鳥哀國有龍瓜薤長九尺色如玉煎之有膏以和紫桂為丸服一粒千歲不飢故語曰薤和膏自生毛魏略李孚字子憲巨鹿人也興平中本郡人民飢困孚為諸生嘗種薤欲以成計有從索者亦不與一莖亦不自食故時人謂能行意世説桓公座有參軍掎蒸薤不時解共食者又不助而掎終不放舉座皆笑酉陽雜俎仙藥有八天赤薤山上有薤下有金太平廣記唐李生與客謁華隂令客能知人之飲食客曰明日必食椒薤酒果然爾雅翼務光翦薤以入清冷之淵今有薤葉篆傳者以為務光所作集藻賦散句增宋謝靈運撰征賦白薤感時而負霜五言律詩原唐杜甫秋日阮隱居致薤三十束隱者柴門內畦蔬繞舍秋盈筐承露薤不待致書求束比青芻色圓齊玉筯頭衰年關鬲冷味暖并無憂詩散句原魏甄后莫以魚肉賤捐棄蔥與薤唐杜甫甚聞霜薤白重惠意如何增宋張耒輕身強骨幹却老衛正氣蘇軾細思種薤五十本大勝取禾三百㕓拔薤已觀賢守政折蔬聊慰故人心唐于鵠澆薤亦同渠李商隱薤白羅朝饌羅隱科圓早薤齊姚合種薤栽莎斸古坡方干薤葉平鋪合遝花宋楊萬里薤本新痕割復齊别録增爾雅翼今人種薤皆以大蒜置硫黃其中久則種分為薤原安陸郭坦兄得天行病後遂能大餐每日食至一斛五年家貧行乞一日大飢至一園食薤一畦大蒜一畦便悶極臥地吐一物如籠漸縮小有人撮飯於上即消成水而病尋瘳此薤散結蒜消癥之一驗也蒝荽原蒝荽荽許氏説文作葰云薑屬可以香口一名香荽一名胡荽一作胡枲一名胡菜處處種之莖青而柔葉細有花岐立夏後開細花成簇如芹菜花淡紫色五月收子如大麻子亦辛香子葉俱可用生熟俱可食甚有益於世者根軟而白多鬚綏綏然故謂之荽張騫得種於西域故名胡荽後因石勒諱胡改作香荽又以莖葉布散呼為蒝荽味辛氣溫消榖止頭痛治五臟補不足利大小腸通心脾竅及小腹氣拔四肢熱治腸風合諸菜食氣香令人口爽辟飛尸鬼疰蠱毒冬春采之香美可食亦可作葅道家五葷之一伏石鍾乳久食損精神令人多忘凡腋氣口臭𧈟齒腳氣金瘡久病人不可食同斜蒿食令人汗臭難産服補藥及藥中有白术牡丹皮者忌彚考增湘山録園荽即胡荽世傳布種時口誦褻則滋茂故士大夫以穢談為撒園荽集藻雜者增明屠本畯野菜箋相彼莞荽化胡攜來臭如葷草脆比菘薹肉食者喜藿食者諧惟吾佛子致謹於齋或言西域興渠别有種使我罷食而疑猜别録原種植宜肥濕地先將子捍開四五月晦日晚種以灰糞覆之水澆則易長六七月布種者可竟冬食春月挼子沃水生芽者小小供食而已都下火炕鬱蒸者莖葉鵝黃色甚香美脆嫩苐非出自然恐不益人御定佩文齋廣羣芳譜卷十三
