body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷十四蔬譜苜蓿原苜蓿一名木粟爾雅翼作木粟言其米可炊飯也一名懷風一名光風草西京雜記云風在其間常蕭蕭然日照其花有光彩故名懷風又名光風一名連枝草西京雜記云茂陵人謂之連枝草増本草苜蓿一名牧宿郭璞作牧宿謂其宿根自生可飼牧牛馬也一名塞鼻力迦見金光明經原張騫自大宛帶種歸今處處有之苗髙尺餘細莖分义而生葉似豌豆頗小每三葉攢生一處稍間開紫花結彎角角中有子黍米大狀如腰子三晉為盛秦齊魯次之燕趙又次之江南人不識也味苦平無毒安中利五臟洗脾胃閒諸惡熱毒彚考原史記大宛傳宛左右以蒲萄為酒富人藏酒至萬餘石久者數十歲不敗俗嗜酒馬嗜苜蓿漢使取其實來於是天子始種苜蓿蒲萄肥饒地及天馬多外國使來衆則離宮别觀傍盡種蒲萄苜蓿極望増漢書西域傳罽賓地平温和有目宿雜草唐書百官志凡驛馬給地四頃蒔以苜蓿原元史食貨志至元七年頒農桑之制令各社布種苜蓿以防飢年西京雜記樂遊苑自生玫瑰樹樹下多苜蓿増述異記張騫苜蓿園今在洛中苜蓿本塞外菜也西使記納商城草皆苜蓿藩籬以柏集藻五言古詩原唐薛令之自悼朝日上團團照見先生盤盤中何所有苜蓿長䦨干飯澀匙難綰羮稀筯易寛無以謀朝夕何由保歲寒五言律詩増宋梅堯臣詠苜蓿苜蓿來西域蒲萄亦既隨蕃人初未惜漢使始能持宛馬當求日離宮舊種時黄花今自發撩亂牧牛陂詩散句増宋唐庚絳紗諒無有苜蓿聊可嚼原唐杜甫宛馬總肥秦苜蓿將軍只數漢嫖姚王維苜蓿隨天馬杜甫秋山苜蓿多宋司馬光苜蓿花猶短陸游秋風枯苜蓿唐李白天馬常銜苜蓿花宋王安石苜蓿䦨干放晩花陸游苜蓿堆盤莫笑貧元郭鈺沙苑晴煙苜蓿肥别錄増妝樓記姑園戲作翦刀以苜蓿根粉養之裁衣則畫成墨界不用人手而自行東坡詩注閩川長溪縣薛令之登第開元中為東宮侍讀官作苜蓿詩以自嘆太宗至東宮見其詩舉筆續之啄木嘴距長鳯凰毛羽短苦嫌松桂寒任逐桑榆暖遂謝病歸原種植夏月取子和蕎麥種刈蕎時苜蓿生根明年自生止可一刈三年後便盛每歲三刈欲留種者止一刈六七年後墾去根别用子種若傚兩浙種竹法每一畝今年半去其根至第三年去另一半如此更換可得長生不煩更種若墾後次年種榖必倍收為數年積葉壊爛墾地復深故今三晉人刈草三年即墾作田亟欲肥地種榖也製用葉嫩時煠作菜可食亦可作羮忌同蜜食令人下利採其葉依薔薇露法蒸取餾水甚芬香開花時刈取喂馬牛易肥健食不盡者曬乾冬月剉喂蔓菁原蔓菁名蕪菁北人名蔓菁并汾河朔間燒食其根呼為蕪根蕪菁南北之通稱一名葑一名湏一名薞蕪一名蕘一名芥爾雅云湏薞蕪疏云陳宋之間謂之葑幽州人謂之芥陳楚謂之蘴齊魯謂之蕘闗西謂之蕪菁趙魏謂之大芥七者一物也一名九英菘塞北河西種者名九英蔓菁亦曰九英菘一名諸葛菜蜀人呼為諸葛菜增本草蔓菁一名馬王菜苖猺獠狫地方産菜味澀多刺即諸葛菜也相傳為馬殷所遺故名一名雞毛菜夏月則枯蔬圃復謂之雞毛菜苖名蘴孫愐云蘴蕪菁苖也根為沙吉木兒䝉古人呼其根云原根長而白形如胡蘿蔔霜後特軟美蒸煮煨任用梢似芋魁含有膏潤頗近穀氣莖麤葉大而厚濶夏初起薹開黄花四出如芥結角亦如芥子勻圓似芥子紫赤色莖葉稍遜于根亦柔膩不類他菜人久食蔬菜無榖氣即有菜色食蔓菁者獨否蔓菁四時皆有四時皆可食春食苖初夏食心亦謂之薹秋食莖冬食根數口之家能蒔數百本亦可終歲足蔬子可打油然燈甚明每畝根葉可得五十石每三石可當米一石是一畝可得米十五六石則三人卒歲之需也此菜北方甚多河東太原所出其根極大又出西番吐谷渾地氣味苦温無毒常食通中下氣利五臟止消渴去心腹冷痛解麪毒入丸藥服令人肥健尤宜婦人彚考増書禹貢包匭菁茅注菁菜也可以為葅詩弼風采葑采菲無以下體注下體根也葑菲根莖皆可食而其根則有時而美惡鄘風爰采葑矣沬之東矣唐風采葑采葑首陽之東原後漢書桓帝紀永興二年詔司𨽻校尉部刺史曰蝗災為害水變仍至五榖不登人無宿儲其令所傷郡國種蕪菁以助人食北史孟信傳信為趙平太守政尚寛和權豪無犯山中老人曽以㹠酒饋之信和顔接引殷勤勞問乃自出酒以鐵鐺温之素木盤盛蕪菁葅惟此而已呂氏春秋菜之羙者具區之菁增急就章老菁蘘荷冬日藏吳歴曹公數遣親近密覘諸將有賓客酒食者輙因事害之備時閉門將入種蕪菁曹公使人闚門既去備謂張飛闗羽曰吾豈種菜者乎曹公必有疑意不可復留南方草木狀蕪菁嶺嶠以南俱無之偶有士人因官攜種就彼種之出地則變為芥亦橘種江北為枳之義也原劉賓客嘉話錄公曰諸葛所止令兵士獨種蔓菁者何絢曰莫不是取其纔出甲者生啗一也葉舒可煮食二也久居隨以滋長三也棄去不惜四也囘則易尋而採之五也冬有根可劚食六也比諸蔬屬其利不亦溥乎曰信矣三蜀之人亦呼蔓菁為諸葛菜江陵亦然增兼明書今人呼菘為蔓菁云北地生者為蔓菁江南生者為菘其大同而小異耳食療本草所論亦然明曰此蓋習俗之非也余少時亦謂菘為蔓菁常見醫方用蔓菁子為辟榖藥又為塗頭油又用之消毒腫每訝菘子有此諸功殊不知其所謂近讀齊民要術乃知蔓菁是蘿蔔苖平生之疑渙然冰釋即醫方所用蔓菁子皆蘿菔苖也漢桓帝時年飢勸人種蔓菁以充飢諸葛亮征蠻令軍人種蘿菔則蘿菔蔓菁為一物無所疑也然則北人呼菘為蔓菁與南人不同者亦有由也蓋鼎峙之世文軌不同魏武之父諱嵩故北人呼蔓菁而江南不為之諱也亦猶吳主之女名二十而江南呼二十為念而北人不為之避也由此言之蔓菁本為蘿菔苖亦已明矣或曰根苗一物何名之異乎答曰按地骨苗名枸杞芎藭苗名蘼蕪藕苗名蓮荷亦其類也斯例實繁不可勝紀何獨蔓菁蘿菔不可異名乎又曰今北人呼為蔓菁者其形狀與江南菘菜不同何也答曰凡藥草果實蔬菜踰境則形狀小異而况江南北地乎爾雅翼今蔓菁園中無蜘蛛是其所畏也雲南記巂州界緣山野間有菜大葉而麤莖其根若大蘿菔土人蒸煮其根葉而食之可以療飢名之為諸葛菜云武侯南征用此菜蒔于山中以濟軍食亦猶廣都縣山櫟木謂之諸葛木也原五臺山深谷中居人每人歲種三百六十本日食一本不妨絶粒集藻五言古詩増唐韓愈感春黃黃蕪菁花桃李事已退狂風簸枯榆狼籍九衢内春序一如此汝顔安足賴誰能駕飛車相從觀海外宋蘇軾狄韶州煮蔓菁蘆菔羮我昔在田間寒庖有珍烹常支折脚鼎自煮花蔓菁中年失此味想像如隔生誰知南岳老解作東坡羮中有蘆菔根尚含曉露清勿語貴公子從渠嗜羶腥七言古詩増宋張耒郭圃送蕪菁感成長句蕪菁至南皆變菘菘羙在上根不食瑶簪玉筍不可見使我每食思故國西鄰老翁知我意盈筐走送如雪白蒸烹氣味元不改今晨一餐如南北孔明用蜀最艱窘百計捃拾無遺䇿當時此物助軍行渭上襃中有遺植英雄臨事究瑣屑終服竒才屈强敵想見躬耕自灌畦當時有意誰能測七言絶句原宋陸游蕪菁往日蕪菁不到吳如今幽圃手親鋤憑誰為向曹瞞道徹底無能合種蔬詩散句増宋朱弁手摘諸葛菜自煮東坡羮原唐温庭筠劉公春盡蕪菁色華廐愁深苜蓿花増韓偓厭聞趨競喜閒居自種蕪菁亦自鋤宋唐庚兎葵燕麥渾閒事只有蕪菁到處生楊萬里花葉蔓菁非蔓菁喫來自是甜底冰金秦畧一叚蕪菁渾著角葉間猶有幾花黄原唐杜甫冬菁飯之半増宋張耒蕪菁苖過茁韓琦黛抹蔓菁花滿畦蘇軾蔓菁宿根已生葉楊萬里早覺蔓菁撲鼻香别録増荆楚歲時記仲冬采擷蕪菁葵等雜菜乾之並為鹹葅有得其和者並作金釵色原酉陽雜俎婺州僧清簡家園蔓菁忽變為蓮夢溪筆談菜品中蕪菁菘芥之類遇旱其標多結成花或如蓮花或作龍蛇之形此常性無足怪者熙寧中李賓客及之知潤州園中菜花悉成荷花仍各有一佛坐于花中形如雕刻莫知其數暴乾之其相依然或云李氏之家奉佛甚謹故有此異種植耕地欲熟七月初種一畝用子三升種法先薙草雨過即耕不雨先一日灌地使透次日熟耕作畦或耬種或漫撒覆土厚一指五六日内有雨不湏灌無雨戽水灌溝中遥潤之勿澆土令地實以沙土高者為上故墟壞墻尤佳宜厚壅之擇子下種出甲後即耘出小者為茹若不欲移植取次耘出存其大者令相去尺許若欲移植俟苖長五七寸擇其大者移之先耕熟地作畦深七八寸起土作壟藝苖其上壟土虚浮根大倍常一法子欲陳用鰻鱺汁浸之曝乾種可無蟲取子者當六七月種來年四月收若中春種亦即生薹與秋種者同熟但根小莖矮子少耳供食者正月至八月皆可種凡遇水旱他榖已晩但有隙地即可種此以濟口食一法地方一尺五寸植一本一步十六本一畝三千六百本每本子一合可得三石六斗比菜子可多三四倍利製用十月終犁出蔓菁根數曬過冬月蒸食甜而有味和羊肉煮食甚美春生薹苖亦菜中上品四月收子打油比脂麻易種收多臨用熬動少摻脂麻煉熟與小油無異子九蒸九曝搗為粉可塗帛菜割訖尋手擇而瓣之挂屋隂風凉處勿令煙熏使味苦燥則候天隂潤苫之不候隂則碎折久不苫則澀作鹹葅法擇好菜捆作小束用極鹹鹽水洗過納瓮中莖葉顛倒安置之勿用淡水洗易爛洗菜鹽水澄清入瓮没菜即止不必調和色仍青用時水洗去醎汁煮為茹與生菜無異作湯葅法好菜擇訖即入熱湯中煠出冷水濯過鹽醋中熬胡麻油香而且脆多作可留至春若菜已萎水洗漉出經宿生之然後煠乾葉屑之和榖作粥食附錄菲増爾雅菲芴注即土瓜也疏菲似葍莖麤葉厚而長有毛三月中蒸鬻為茹甘美可作羮幽州人謂之芴今河内人謂之宿菜菲蒠菜注菲草生下濕地似蕪菁華赤色可食同蒿増本草同蒿一名蓬蒿形氣同蓬蒿故名原同蒿莖肥葉綠有刻缺微似白蒿甘脆滑膩四月起薹髙二尺餘開花深黄色狀如單瓣菊花一花結子近百成毬如地菘及苦蕒子最易繁茂以佐日用最為佳品主安氣養脾胃消水飲多食動風氣熏心令氣滿别錄原種植肥地治畦如種他菜法二月下種可為常食秋社前十日種可為秋菜如欲存種留春菜收子蔞蒿原蔞蒿一名白蒿一名蘩爾雅云蘩皤蒿注云白蒿也一名蔏爾雅云購蔏蔞注云蔞蒿也生下田初出可啖一名由一作游胡爾雅云繁由胡一名旁勃爾雅云北海人謂之旁勃有水陸二種爾雅通謂之蘩曰蘩皤蒿即今陸生艾蒿也辛熏不美曰蘩由胡即今水生蔞蒿也又曰蘩之醜秋為蒿則通指水陸二種而言謂其春時各有種名至秋老則皆呼為蒿矣形狀相似但水生者辛香而羙生陂澤中二月發苗葉似嫩艾而岐細面青背白其葉或赤或白其根白脆采其根莖生熟葅曝皆可食蓋嘉蔬也彚考原詩周南翹翹錯薪言刈其蔞召南于以采蘩于沼于沚増豳風春日遲遲采蘩祁祁傳采蘩所以生蠶也原左傳蘋蘩蕰藻之菜可薦於鬼神可羞於王公増左傳夫人執蘩菜以助祭神仙服食經十一月采旁勃勃白蒿也白兎食之壽八百歲集藻文散句増楚屈原大招吳酸蒿蔞不沾薄只詩散句増宋蘇軾蔞蒿滿地蘆芽短正是河豚欲上時澗蔬煮蒿節碎㸃青蒿凉餅滑黄庭堅蔞蒿數節玉簪横蔞蒿芽甜草頭辣方岳蔞蒿苗肥㸃寒綠元戴帥初水味野栽蒿白瘦耶律楚材細煎蔞蒿㸃韭黄别錄原製用蔞蒿根莖白熟葅曝皆可食生挼醋醃為葅食之甚益人採蔞蒿莖微用鹽醃曝乾味甚美可以寄逺嫩苖以沸湯瀹過浸于漿水則成虀如以清水或石灰水礬水拔之去其猛氣曬乾可留製食醃焙乾極香美附錄牡蒿増爾雅蔚牡菣注無子者疏一名馬新蒿本草一名齊頭蒿諸蒿葉尖此獨奓而禿故有齊頭之名三四月生苗其葉扁而本狹末奓有禿岐嫩時可茹秋開細黄花結實大如車前實而内子微細不可見故人以為無子也彚考増詩小雅蓼蓼者莪匪莪伊蔚疏蔚牡蒿也附錄藾蒿増爾雅苹藾蕭注今藾蒿也初生亦可食疏葉青白色莖似箸而輕肥始生香可生食又可蒸食本草苹即陸生皤蒿俗呼艾蒿彚考増詩小雅呦呦鹿鳴食野之苹全唐詩話唐文宗聽政暇博覽羣書一日延英顧問宰相詩云呦呦鹿鳴食野之苹苹是何草宰相李珏楊嗣復陳夷行相顧未對珏曰臣按爾雅苹是藾蕭上曰朕看毛詩疏葉圓而花白叢生野中似非藾蕭附錄邪蒿増本草邪蒿葉紋皆邪根莖似青蒿而細軟色淺不臭三四月生苗根葉皆可茹彚考増北史儒林傳邢峙以經入授皇太子厨宰進太子食菜有邪蒿峙令去之曰此菜有不正之名非殿下宜食文宣聞而嘉之賜以被褥縑纊附録䕲蒿増爾雅莪蘿注今莪蒿也亦曰䕲蒿疏一名蘿蒿生澤田漸洳之處葉似邪蒿而細科生三月中莖可生食又可蒸香美味頗似蔞蒿本草一名抱娘蒿似小薊宿蒿先於百草彚考増詩小雅菁菁者莪注即莪蒿也白菜原白菜一名菘埤雅云菘性凌冬不彫四時長有有松之操故其字㑹意諸菜中最堪常食増本草最肥大者名牛肚菘菜譜有春菘有晩菘原有二種一種莖圓厚微青一種莖扁薄而白葉皆淡青白色子如蕓薹子而灰黒八月種二月開黄花四瓣如芥花三月結角亦如芥燕趙遼陽淮揚所種者最肥大而厚一本有重十餘斤者南方者畦内過冬北方多入窖内燕京圃人又以馬糞入窖壅培不見風日長出苗葉皆嫩黄色脆美無滓謂之黄芽菜乃白菜别種莖葉皆扁味甘温無毒利腸胃除胸煩解酒渴利大小便和中止𠻳冬汁尤佳夏至前菘菜食發皮膚風癢動氣發病又有春不老一名八斤菜葉似白菜而大甚脆嫩四時可種醃食甚美彚考原後漢書崔瑗傳瑗愛士好賓客盛修餚膳殫極滋味不問餘産居常蔬食菜羮而已晉書桓温傳温性儉每讌唯下七奠柈菜果而已良吏傳吳隱之為廣州刺史清操踰勵常食不過菜及乾魚増南齊書武陵昭王傳尚書令王儉詣曄曄留儉設食柈中菘菜䱒魚而已周顒傳顒清貧寡欲終日長蔬食文惠太子問顒菜食何味最勝顒曰春初早韭秋末晩菘原南齊書孝義傳江泌食菜不食心以其有生意也増南史隱逸傳范元琰家貧唯以園蔬為業嘗出行見人盜其菘元琰遽退走母問其故具以實答母問盜者為誰答曰向所以退畏其愧耻今啓其名願不洩也于是母子祕之吳錄陸遜諸葛瑾攻襄陽遜遣親人韓扁賫表奉報扁還遇抄瑾聞之欲急去遜方催人種荳菘與諸將圍碁以示閒暇原藝文類聚范宣挑菜傷指大啼曰身體髪膚不敢毁傷故啼増清異錄江右多菘菜粥筍者惡之罵曰心子菜蓋筍奴菌妾也原邵氏聞見錄汪信民常言人常咬得菜根則百事可做胡康侯聞之擊節嘆賞増輟耕錄揚州至正丙申丁酉間兵燹之餘城中屋址徧生白菜大者重十五斤小者亦不下八九斤有膂力人所負纔四五窠耳集藻啓増梁簡文帝謝勅賚大菘啓吳愧千里之蓴蜀慚七菜之賦是知泮宮採芹空入魯詩流火烹葵徒傳豳曲五言古詩増宋韓駒食煮菜簡呂居仁曉謁呂公子解帶浮屠宮留我具朝餐喚奴求晩菘洗箸㸃鹽豉鳴刀芼薑葱俄頃香馥坐雨聲傳鼎中方觀翠浪涌忽變黄雲濃爭貪歙鉢暖不覺定盌空憶登金山頂僧飯與此同還家不能學空費烹調功硬恐動牙頰冷愁傷肺胸君獨得其妙堪持餉衰翁異時聞豪氣愛客行庖豐殷勤故煮菜知我林下風人生各有道旨蓄用禦冬今我無所營枵腹何由充豈惟臺無餽菜把尚不蒙念當勤致此亦足慰途窮七言古詩増元吳鎮墨菜畫卷菘根脱地翠毛濕雪花翻匙玉肪泣蕪蔞金谷暗塵土美人壯士何顔色山人久刮龜毛氊囊空不貯揶揄錢屠門大嚼知流涎淡中滋味吾所便元脩元脩今幾年一笑不直東坡前五言律詩増元許有壬白菜土膏新且嫩筐筥薦紛披可作青精飯仍攜玉版師清風牙頰響真味士夫知南土稱秋末投簪要及時五言絶句原唐髙適同羣公題張處士菜園耕地桑柘間地肥菜常熟為問葵藿資何如廟堂肉七言絶句原宋范成大田園雜興桑下春蔬綠滿畦菘心青嫩芥薹肥溪頭洗擇店頭賣日暮裹鹽沽酒歸撥雪挑來蹋地菘味如蜜藕更肥醲朱門肉食無風味只作尋常菜把供陸游菘雨送寒聲滿背蓬如今真是荷鋤翁可憐遇事常遲鈍九月區區種晩菘増方岳種菘老圃相傳秋後菘磚爐石銚一年冬寧知遲種遲於我又見南薫上番風明李東陽畫菜誰寫西園數葉菘露華清曉濕蒙茸玉堂夜半蘇郎渴此味無因獻九重詩散句原宋劉子翬周郎愛晩菘對客素稱賞今晨喜薦新小嚼氷霜響増蘇軾白菘類羔豚冐土出熊蹯陸游身在有餘真妙語杯羮何地欠秋菘唐杜甫奴肥為種菘羅隱葉長春菘濶金元好問菘肥秋未黄别錄原製用糟菜法先將隔年壓過酒糟未出小酒者罈封每一斤鹽四兩拌匀好肥箭榦白菜洗淨去葉搭於隂處晾乾水氣每菜二斤糟一斤一層菜一層糟隔日一翻騰待熟挽定入罈上澆糟菜水汁取用味美晻菜法白菜揀肥者去心洗淨一百斤用鹽五斤一層菜一層鹽石壓兩日可用又白菜一百斤曬乾抖搜去土先用鹽二斤醃三四日就滷内洗淨每柯窩起純用鹽三斤入罈内可長久又法白菜削去根及黃老葉洗淨控乾每菜十斤鹽十兩用甘草數莖放在潔淨瓮盛將鹽撒入菜了内排頓瓮中入蒔蘿少許以手實捺至半瓮再入甘草數莖候滿瓮用石壓定三日後將菜倒過抝出滷水於乾淨器内另放忌生水却將滷水澆菜内候七日依前法再倒用新汲水渰浸仍用磚石壓之其菜味美香脆若至春間食不盡者於沸湯淖過曬乾收貯夏間將菜温水浸過壓水盡出香油匀拌以磁碗盛頓飯上蒸之其味尤佳美黑醃虀白菜如法醃透取出挂於桁上曬極乾上甑蒸熟再曬乾收之極耐久藏夏月以此虀和肉炒可以久留不臭甑不便者徑以水煮虀曬乾亦可但不如蒸者佳芥菜同乾菜大科菘菜芥菜洗淨畧曬沸湯内煠五六分熟曬乾用鹽醬蒔蘿茴香花椒陳皮砂糖同煮熟曬乾再蒸少時菜虀大菘菜叢採十字劈裂萊菔取𦂳小者破作兩半同向日中曬去水脚二件薄切作方片如錢眼子大入淨罐中以馬芹茴香雜酒醋水等令得所調淨鹽澆之隨手舉罐撼觸五七十次密蓋罐口置竈上温處仍日一次如前法撼觸三日後可供菜色青白間錯鮮潔可愛增齊民要術菘淨洗徧體湏長切方如算子長三寸許束菘根入沸湯小停出及熱與鹽酢細縷切橘皮和之料理半奠之作菘鹹葅法水四斗鹽三升攪之令殺菜又法菘一斤女麴間之芥原芥名辣菜一名臘菜其氣味辛辣有介然之義又可過冬也本草云冬月食者俗呼臘菜春月食者俗呼春菜四月食者謂之夏菜增本草芥葅一名水蘇一名勞祖原性辛温無毒温中下氣豁痰利膈處處有之種類不一有青芥又名刺芥葉大子麤葉似菘有柔毛味極辣可生食其子可藏冬𤓰紫芥莖葉純紫可愛作虀最美白芥一名胡芥一名蜀芥來自戎中而盛於蜀八九月種至春深莖髙二三尺葉如花芥葉青白色為茹甚美莖易起而中空性脆最畏狂風大雪湏謹䕶之三月開黄花結角子如粱米黄白色又有一種莖大而中實者尤髙子亦大白芥子堪入藥味極辛美利九竅明耳目通中他如南芥刺芥按此即青芥旋芥馬芥葉如青芥花芥葉多缺刻如蘿蔔英石芥低小者皺葉芥大芥一名皺葉芥大葉皺紋色尤深綠味更辛辣入藥用之類皆菜之美者芥極多心嫩者為芥藍極脆李時珍曰芥性辛熱而散久食耗真元昬眼目發瘡痔劉恂嶺南異物志云南土芥髙五六尺子大如雞子此又芥之尤異者也彚考増禮記内則膾秋用芥劉向别錄尹都尉書有種芥葵蓼韭葱諸篇嶺表錄異廣州地熱種麥則苗而不實北人將蔓菁子就彼種者出土即變為芥酉陽雜俎掌中芥末多國出也取其子置掌中吹之一吹一長長三尺乃植於地金城記黎舉常云欲以芥嫁筍但恨時不同耳集藻傳原明沈周疏介夫傳介夫姓疏名介介夫字也其先居趙魏之郊從樹藝以生子孫甚繁衍至介始徙於宋久之由司城子罕薦以見宋王王問曰若居宋之土地幾葉於茲矣久必有相賴者若賴宋乎宋賴若乎對曰介竊居王之土地覃及雨露欣榮不已顧有寸長敢不敷露於左右以求知也臣本一介之微視之甚草草然可以禦國之饉歳可以資王之儉徳可以勵民之苦心王能味臣言享臣用則臣不為無利與宋王曰周人聚疏之財寡人何敢失之遂命從事於陽門兼修俎豆事王日昵有燕必偕居常服綠間錫之紫茸裘以旌其勞辛之功介為人貌直幹濯秀可愛羣居秩然不紊有介然於世者因名但平生口刺刺抉人是非不少假借被其中者或至流淚出涕發汗衆曰介有薑桂之性愈老愈辣其族有大小之異有曰蕪菁曰幽者皆澹泊於世味雅與僧齋寒士交其後介子推又徙晉晉以其先人之聞納之公子重耳出奔推從焉適遭絶食推將割股肉芼羮以進公子止曰亡人之在逺也以有先生為禦猶有旨蓄而弗知其冬也今先生軫之念亡人之口腹傷己以飽人亡人弗以為飽願先生自愛毋易下體也推卒割之後公子歸伯第賞有功而不及推推之客歌於宮門曰茅之拔兮茹亦及之吐其茹矣忘徃之飢公子悔追賞推推逃之綿山上曰吾非賣菜而求益也誓不出公子筮而求之得鼎曰木㢲火烹飪之象且傅說以調伊尹以烹我將獲賢者之輔遂火其山以脇之推就焚而死人謂其介有跨竈風五言古詩増明吳寛紫芥惟芥本菜類秋深掇而藏此種乃野生已向春初長紫花布滿地葉嫩亦堪嘗氣味既不辛却與芥同行北人無不食木枿與草芒入盤以油和齒頰流肥香五言律詩増唐錢起藍上採石芥寄前李明府淵明遺愛處山芥綠芳初翫此春隂色猶滋夜雨餘隔溪煙葉小覆石雪花舒采采還相贈瑶華信不如七言律詩増宋楊萬里芥虀茈薑馨辣最佳蔬蓀芥芳心不讓渠蟹眼嫩湯微熟了鵞兒新酒未醒初棖香醋釅作三友露葉霜芽知幾鋤自笑枯腸成破瓮一生只解貯寒葅明吳寛紫芥滿目斕斑布地來春風幾見錦灰堆菜根作苦終嫌咬茗葉浮香為撥開何處兎葵嗟競掇昨朝馬藺悔多栽傳聞此種番邦致用向中華亦楚材五言絶句増宋朱子南芥黄龍記昔遊園客有佳遺不謂洛生吟輟餐時擁鼻七言絶句増宋陸游以石芥送劉韶美禮部劉比釀酒勁甚因以為戲古人重改陽城驛吾輩欣聞石芥名風味可人終骨骾尊前真見魯諸生長安官酒甜如蜜風月雖佳嬾舉觴持送盤蔬還㑹否與公新釀鬭端方詩散句原宋蘇軾芥藍如菌蕈脆美牙齒響増劉子翬葉實挹芳草氣烈消煩滯朱潛山蔚然蒼石底有此紫玉釵僧北磵淡金生色染宮黄只作坡羮亦擅塲别錄増左傳季郈之雞鬬季氏介其雞郈氏為之金距注搗芥子播其羽也莊子覆杯水於㘭堂之上則芥為之舟置杯焉則膠神農本草經琥珀拾芥嶺南異物志唐孟館嘗入嶺表買芥菜置壁下忘食數日皆生四足有首尾能行走大如螳螂但腰細身長物類相感志收芥菜子宜隔年者則辣原種植地用糞耕畝用子一升秋月種者三月開黄花結莢一二寸子大如蘇子色紫味辛收子者即不摘心白芥取子者二月乘雨後種性不耐寒經冬即死故湏春種五月熟而收子苐地有南北寒暖異宜種植早晩又當隨其俗也製用葉可生食又可醃以為葅可釀以為虀子研末泡為芥醬和菜侑肉辛香可啖根煮熟閉之罈罐中上蓋以蘿蔔片一二日内食之甚美冬菜經春長心嫩湯微熟菜中佳品菜脯鹽虀菜去梗用葉鋪開如薄餅大用料物糝之料用陳皮杏仁砂仁甘草蒔蘿茴香川椒炒同為細末撒菜上更鋪菜一重又撒物料如此鋪撒五重以平石壓之用甑蒸過切作小塊調豆粉稠水蘸之入油煠熟冷定磁器收之秋間嫩春不老芥菜隂半乾擇去黃葉老梗將根劈為數瓣每斤用炒鹽三兩五錢將鹽陸續揉入菜内每清晨即用鹽揉一次先著力揉根次稍揉梗葉一次至日西又照上法揉一次至七日即中矣湏要細揉用細鹽每根用花椒茴香入中心窩起入罈内仍取原汁澆入用泥固封至立春即移房内架起芥菜虀九月十月取青紫白芥菜切細於沸湯内焯過帶湯撈於盆内與生萵苣同熟油芥花或芝蔴白鹽約量拌匀按於瓮内三二日變黃可食至春不變味乾虀菜大芥菜每一百斤用鹽二十二兩操撈得匀以盆或缸疊疊放定上用大石壓醃數日出水浸過石撈起曬乾後以本汁滷煮滚半熟再曬乾收貯若復蒸過則黑而軟置淨乾瓮中藏封任留數年不壞出路作菜極便六月伏天用炒過乾肉復同虀菜炒放旬日不腐凡六月天熱饌不堪留只以乾虀同炒不要入湯水放冷再收起可放經旬不氣息極妙若醃芥鹽汁煮黃豆極乾蘿蔔丁曬乾收貯經年可食研芥子入細辛少許白蜜好醋一處研爛再以淡醋去滓極辣一法芥子同石龍芮子同研其辣異常菠菜原一名菠薐一名波斯草一名赤根菜詢蒭録云南人呼菠菜北人呼赤根菜一名鸚鵡菜出西域頗陵國今訛為菠薐蓋頗陵之轉聲也見劉賓客嘉話錄莖柔脆中空葉綠膩柔厚直出一尖傍出兩尖似鼓子花葉之狀而稍長大根長數寸狀如桔梗色赤味甘美四月起薹尺許開碎白花叢簇不顯有雌雄雌者結實有刺狀如蒺藜子葉與根味甘冷滑無毒利五臟通腸胃熱開胸膈下氣調中止渴潤燥解酒毒服丹石人最宜麻油炒食甚美北人以為常食春月出薹嫩而且美春暮薹漸老沸湯晾過曬乾備用甚佳可久食誠四時可用之菜也八九月種者可備冬食正二月種者可備春蔬南人食魚稻多食則冷大小腸忌與䱉魚同食發霍亂彚考原唐㑹要太宗時尼波羅國獻菠薐菜類紅藍實如蒺藜火熟之能益食味集藻五言絶句原宋劉子翬詠菠薐金簇因形製臨畦發永嘆時危思擷佩楚客莫紉蘭詩散句原宋蘇軾北方苦寒今未巳雪底菠薐如鐵甲豈知吾蜀富冬蔬霜葉露芽寒更茁别錄原種植正二月内將子水浸一二日候脹撈出控乾盆覆地上俟芽出擇肥鬆地作畦於每月下旬下種勤澆灌可逐旋食用秋社後二十日種者至將霜時馬糞培之以避霜雪十月内沃以水備冬蔬此菜必過月朔乃生即晦日下種與十餘日前種者同出亦一異也春種多蟲不如秋種者佳莧原莧凡五種赤莧一名簣爾雅云蕢赤莧注云今莧菜之赤莖者本草云一名花莧莖葉深赤白莧人莧俱大寒又名糠莧胡莧二莧味勝他莧但大者為白莧小者為人莧或謂之細莧其實一也其子霜後方熟細而黒色又細莧俗名野莧猪好食之亦名猪莧紫莧莖葉皆紫無毒不寒吳人用以染𤓰者五色莧今稀有諸莧皆三月種葉如藍莖葉皆高大易見故名莧或曰莧從見諧聲也開細花成穗穗中細子扁而光黒與青箱子雞冠子無别老則抽莖甚髙六月以後不堪食子霜後始熟九月收五莧俱氣味甘冷利無毒並利大小腸治初痢滑胎通竅明目除邪去寒熱白莧補氣除熱赤莧主赤痢射工沙虱紫莧殺蟲毒治氣痢彚考増易夬卦莧陸夬夬疏董遇云莧人莧也南齊書王智深傳智深家貧無人事嘗餓五日不得食掘莧根食之南史蔡樽傳樽在吳興不飲郡井齋前自種白莧紫茄以為常餌詔褒其清詢蒭錄南人呼莧菜北人呼荇乃人莧音誤也集藻七言律詩増宋方岳羮莧琉璃蒸乳壓㹠膏未抵齋厨格調髙脱粟飯香供野莧荷鋤人飽撚霜毛斷無文伯可相累比似何曽母太豪見説能醫射工毒人間此物正騷騷詩散句増唐杜甫莧也無所施何顔入筐篚宋王安石紫莧凌風怯金史肅迎風紫莧因循老别錄増物類相感志紅莧菜煮生麻布則色白如苧爾雅翼青泥殺鱉得莧復生學圃餘疏莧有紅白二種素食者便之肉食者忌與鱉共食原製用赤莧根莖可糟藏食之甚美味辛取鱉肉切豆大以莧菜裹置土中一宿即變小鱉試之屡驗附錄馬齒莧原馬齒莧一名馬莧一名五行草以其葉青梗赤花黄根白子黒也一名五方草亦五行之義一名長命菜其性耐久難燥一名九頭獅子草増本草馬齒莧一名馬齒龍牙原處處有之柔莖布地葉對生比並圓整如馬齒故名六七月開細花結小尖實實中細子如葶藶子狀苗煑熟曬乾可為蔬有二種葉大者名㹠耳草不堪用小葉者又名䑕齒莧節葉間有水銀每十觔可得八兩或十兩氣味酸寒無毒散血消腫利腸滑胎解毒通淋治産後虚汗集藻詩散句原唐杜甫又如馬齒盛氣擁葵荏昏増杜甫馬齒葉亦繁别録増顔氏家訓月令云荔挺出鄭𤣥注云荔挺馬薤也說文云似蒲而小根可為刷廣雅云馬薤荔也通俗文亦云馬藺易統通卦驗𤣥圖云荔挺不出則國多火災蔡邕月令章句云荔似挺高誘注呂氏春秋云荔草挺出也然則月令注荔挺為草名誤矣河北平澤率生之江東頗有此物人或種於階庭但呼為旱蒲故不識馬薤議禮者乃以為馬莧堪食亦名豚耳俗曰馬齒江陵嘗有一僧面形上廣下狹劉緩㓜子民譽年始數歲俊悟善體物見此僧云面似馬莧其伯父劉縚因呼為荔挺法師縚親講禮名儒尚誤如此原李絳兵部手集唐武相元衡苦脛瘡焮癢不可堪百醫無效㕔吏上一方馬齒莧搗爛敷上兩三遍即愈多年惡瘡百方不瘥或痛焮不已並治附錄水馬齒增野菜譜水馬齒生水中與旱馬齒相類熟食葵葵與蜀葵二種原譜誤合為一今分葵入蔬譜蜀葵等另入花譜増廣雅蘬丘葵也農書葵陽草也天有十日葵與終始故葵從癸齊民要術葵有紫莖白莖二種種别復有大小之殊又有鴨脚葵本草一名露葵古人採葵必待露解一名滑菜言其性也一名衛足爾雅翼云葵揆也葵葉傾日不使照其足李時珍曰古人種為常食今種之者頗鮮其實大如指頂皮薄而扁實内子輕虚如榆莢仁六七月種者為秋葵八九月種者為冬葵正月復種者為春葵然宿根至春亦生農桑通訣葵為百菜之主備四時之饌本豐而耐旱味甘而無毒供食之餘可為葅腊枯枿之遺可為榜簇咸無棄材誠蔬茹之上品也彚考原詩豳風七月烹葵及菽左傳仲尼曰鮑莊子之智不如葵葵猶能衛其足南齊書周顒傳顒清貧寡欲終日長蔬食衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽綠葵紫蓼增北史盧觀傳觀弟叔彪在朝通貴魏收常來詣之訪以洛京舊事不待食而起云難為子費叔彪留之良久食至但有粟飱葵菜木椀盛之片脯而已所將僕從亦盡設食一與此同管子桓公北伐山戎出冬葵布之天下桓公憂北郭民貧管子請禁去市三百步者不得樹葵菜此則亦有以相及也原列女傳魯漆室之女見魯君老太子㓜倚柱而歎隣婦問之曰昔有客馬逸踐園葵使吾終歲不飽葵吾聞河潤九里漸濡三百里魯國有患君臣父子被其辱婦女獨安所避異苑苻堅欲南師夢葵生城南以問婦曰若軍逺出難為將列仙傳丁次都為丁氏作奴丁氏常使求葵冬得生葵問從何得此云從日南來集藻賦増宋鮑照園葵賦風煖凌開土昌泉動游塵曝日鳴雉依隴主人拂黃冠拭藜杖布蔬種平圻壤通畔修直膏畝夷敞白莖紫蔕豚耳鴨掌溝東陌西行三畦兩既區既鉏乃露乃映勾萌欲伸藂牙將放爾乃晨露夕隂霏雲四委沈雷逺震飛雨輕灑徐未及晞疾而不靡柔莩爰秀剛甲以解稚葉萍布弱隂競抽萋萋翼翼沃沃油油下葳蕤而被逕上參差而覆疇承朝陽之麗景得傾柯之所投仕非魯相有不㧞之利賓非二仲無逸馬之憂顧堇荼而莫偶豈蘋藻之薦羞若乃鄰老談稼女嫗歸桑拂此葦席炊彼穄粱秋壺援醢曲瓢卷漿乃羮乃瀹堆鼎盈筐甘旨蒨脆柔滑芬芳消淋逐水潤胃調腸於是既飫徹盤投筯囘小人之腹為君子之慮近觀物運逺訪師聖聲數後彰律理前定烏非黔黒鶴豈浴淨彼圓行而方止固得之於天性伊冬箑而夏裘無雙功而並盛蕩然任心樂道安命春風夕來秋日晨映獨酌南軒擁琴孤聽篇章間作以歌以詠魚深沈而鳥高飛孰知美色之為正文賦散句原漢董仲舒賢良策公儀子相魯食於舍而茹葵愠而㧞其葵曰吾已食祿又奪園夫利乎魏曹植求通親親表若葵藿之傾葉太陽雖不為之廻光然終向之者誠也晉潘岳閒居賦綠葵含露白薤負霜五言古詩増晉陸機園葵詩二首種葵北園中葵生鬱萋萋朝榮東北傾夕穎西南晞零露垂鮮澤朗月耀其煇時逝柔風戢歲暮啇飈飛層雲無温液嚴霜有凝威幸蒙髙墉徳𤣥景䕃素𬎼豐條並春盛落葉後秋衰慶彼晩彫福忘此孤生悲翩翩晩彫葵孤生寄北籓被蒙覆露惠微軀後時殘庇足周一智生理各萬端不若聞道易但傷知命難原唐白居易烹葵昨臥不夕食今起乃朝饑貧厨何所有炊稻烹秋葵紅粒香復軟綠英滑且肥饑來止於飽飽後復何思思憶榮遇日迨今窮退時今亦不凍餒昔亦無餘資口既不减食身又不减衣撫心私自問何者是榮衰勿學常人意其間分是非五言絶句原唐李白題葵葉慙君能衛足歎我逺游根白日如分照還歸守故園七言絶句増宋楊萬里都將葵葉葢亭中樹似桄榔葉似㯶欲向天公覔微雪妝成急響打船篷篛笠端能直幾錢騎奴不擬雨連天葢頭旋折山葵菜擘破青青傘半邊明徐賁答楊署令送菜隙地知君手自栽紺芽紅甲雨中開閒居我亦清齋久肯折新葵為送來詩散句原古詩採葵莫傷根傷根葵不生晉陸機無以肉食資取笑葵與藿陶潛流目視西園曄曄榮紫葵増梁沈約青青園中葵朝露待日晞劉孝綽園葵亦何幸傾葉奉離光原唐杜甫刈葵莫放手放手傷葵根増白居易中園何所有滿地青青葵原宋蘇軾爛煑葵羮斟桂醑風流可惜在蠻村西崦人家應最樂煑葵燒筍餉春耕増唐張九齡園葵亦向陽衛足感葵隂李白園蔬烹露葵王維烹葵邀上客原杜甫秋露接園葵増杜甫香宜配碧葵葵荒欲自鋤傾陽逐露葵白居易晨露園葵鮮宋陸游葵羮出鬴香唐王維松下清齋折露葵宋陸游雨慳葵葉未吐甲别錄原博物志陳葵子微火炒令爆咤撒熟地遍蹋之朝種暮生遲不過經宿耳増博物志陳葵子秋種覆葢令經冬不死春有子也齊民要術世人作葵菹不好皆由葵太脆故也菹菘以社前二十日種之葵社前三十日種之使葵至藏皆欲生花乃佳耳葵經十朝苦霜乃采之秫米為飯令冷取葵著甕中以向飯沃之欲令色黃煑小麥時時粣之崔寔曰九月作葵葅其歲温即待十月食經作葵葅法擇燥葵五斛鹽二斗水五斗大麥乾飯四升合瀨案葵一行鹽飯一行清水澆滿七日黃便成矣原製用食葵當乗其葉嫩時湏用蒜無蒜勿食久病大便澀滯者宜食孕婦宜食易産作菜茹甚甘美但性太滑利不益人熱食令人熱悶三月食生葵動風氣發宿疾飲食不消四月食之發風疾天行病後食之令人失明霜後生食動五種留飲吐水心有毒服藥人忌食被犬咬者終身勿食食之即發黃背紫莖者勿食同鯉魚黍米酢食害人同猪肉食令人無顔色葵甚易生地不論肥瘠宜於不堪作田之地多種以防荒年採瀹曬乾收貯附錄龍葵增本草一名苦葵一名苦菜益州有苦菜乃是苦蘵即龍葵也一名天茄子一名水茄一名天泡草一名老鴉酸漿草與酸漿相類故加老鴉以别之一名老鴉眼睛草五爪龍亦名老鴉眼睛草同名異物也李時珍曰龍葵龍珠一類二種也皆處處有之四月生苖高二三尺莖大如筯似燈籠草而無毛葉似茄葉而小五月以後開小白花五出黃蕋結子正圓大如五味子上有小蔕數顆同綴其味酸中有細子亦如茄子之子但生青熟黒者為龍葵生青熟赤者為龍珠附錄蔠葵增爾雅蔠葵蘩露注承露也大莖小葉華紫黃色本草一名落葵一名藤葵一名天葵一名繁葵一名御菜一名臙脂菜坡詩注云豐湖有燕脂藤生菜滑美勝蓴蔓生葉似杏葉而肥厚軟滑可茹八九月開細紫花累累結實如五味子熟則紫黒色揉取汁紅如臙脂女人飾面㸃唇及染布物謂之胡臙脂亦曰染絳子但色易變耳其葉最能承露其子垂垂亦如綴露故得露名御定佩文齋廣羣芳譜卷十四
