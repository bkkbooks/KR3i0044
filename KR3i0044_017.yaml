body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷十五蔬譜生菜原生菜一名白苣一名石苣増陸璣詩疏青州謂之芭原似萵苣而葉色白斷之有白汁正二月下種四月開黄花如苦蕒結子亦同八月十月可再種以糞水頻澆則肥大諺云生菜不離園宜生食又生挼鹽醋拌食故名生菜色紫者名紫苣一云紫苣和土作器火煆如銅集藻詩散句増唐杜甫脆添生菜美陰益食單凉别錄原種植作畦下種如菠薐法先用水浸種一日於濕地上襯布置子以盆合之候芽出種畦中宜肥地苦菜原苦菜一名苦苣一名苦蕒一名褊苣一名游冬博雅云游冬苦菜也埤雅云此草凌冬不凋故名一名天香菜増爾雅荼苦菜疏一名荼草一名選陸璣詩疏生山田及澤中得霜甜脆而美本草春初生苗有赤莖白莖二種葉似花蘿蔔葉上葉抱莖梢菜似鸛嘴每葉分义攛挺如穿葉狀原葉狭而綠帶碧莖空斷之有白汁花黄如初綻野菊花春夏皆旋開一花結子一叢如同蒿子花罷則萼斂子上有白毛茸茸隨風飄揚落處即生今處處有之但在北方者至冬而凋在南方者冬夏常青為少異耳味苦寒無毒夏天宜食能益心和血通氣主治腸澼渇熱中疾惡瘡霍亂後胃氣煩逆忌與蜜同食作肉痔脾胃虚寒人不可多食彚考原詩弼風誰謂荼苦其甘如薺唐風采苦采苦首陽之下大雅堇荼如飴禮記月令孟夏之月苦菜秀増禮記内則濡豚包苦實蓼疏言濡豚之時包裹豚肉以苦菜殺其惡氣又實之以蓼水經注若城東得苦菜夏浦浦東有苦菜夏江逕其北故浦有苦菜之名焉顔氏家訓詩云誰謂荼苦爾雅毛傳並以荼苦菜也又禮云苦菜秀案易統通卦驗𤣥圖曰苦菜生於寒秋更冬歴春得夏乃成今中原苦菜則如此也一名游冬葉似苦苣而細摘斷有白汁花黄似菊江南别有苦菜葉似酸漿其花或紫或白子大如珠熟時或赤或黒此菜可以釋勞案郭璞註爾雅此乃蘵黄蒢也今河北謂之龍葵梁世講禮者以此當苦菜既無宿根至春子方生耳亦大誤也又髙誘注吕氏春秋曰榮而不實曰英苦菜當言英益知非龍葵也兼明書月令孟夏苦菜秀孔頴達曰菜似馬薤而花白其味極苦明曰按夏小正四月王萯秀月令用小正為本改王萯為苦菜也詩豳風四月秀葽鄭康成疑葽為王萯今驗四月秀者野人呼為苦葽春初取煮去苦味和米粉作餅食之四月中莖如蓬艾花如牛蒡花四月秋氣生故苦葽秀則一歳物成自苦葽始月令所書皆應時之物其言苦菜即苦葽也頴達所見别是一物不可引以解此真珠船唐景龍二年郿縣民王上賓家有苦蕒菜髙三尺餘上廣尺餘厚二分集藻七言律詩原眀黄正色但得菜根俱可啖況於苦蕒亦奇逢初嘗不解囘甘味慣醉方知醒酒功茹素無緣葷未斷禪宗有約障難空北窻入夏稀盤餖莫厭頻頻餉阿儂盤餐落落對瓜畦杜撰人間苦蕒虀嫩綠浮羮蓴讓滑微酸入口舌應迷野人生計誰云薄藿食家風未是低為報青蠅莫相㸃欲隨芹曝獻金閨詩散句原唐杜甫苦苣刺如針菾菜原菾菜一名莙薘菜苗髙三四尺莖若蒴􅀢有細稜夏潤冬枯葉青白色似白菘菜葉而短莖亦相類但差小耳正二月下種宿根亦自生四月開細白花結實狀如茱萸毬而輕虚土黄色内有細子根白色味甘苦大寒滑無毒開胃通心膈利五臟理脾氣去頭風補中下氣宜婦人冷氣人不可多食動氣患腹冷人食之必破腹十月以後宜於暖處窖藏别錄原製用醋浸揩面去粉滓潤澤有光莙薘莖燒灰淋汁洗衣色如白玉蕹菜原蕹菜蕹與壅同此菜惟以壅成故謂之蕹榦柔如蔓中空葉似菠薐及鏨頭開白花堪茹南人編葦為筏作小孔浮水上種子於水中長成莖葉皆出葦孔中随水上下南方之奇蔬也陸種者宜濕地畏霜雪九月蔵土窖中三四月取出壅以糞土節節生芽一本可成一畦生嶺南今江夏金陵多蒔之别錄增南方草木狀野葛有大毒以􅀢菜汁滴其苗當時萎死世傳魏武能噉野葛至一尺云先食此菜北戸錄􅀢菜葉如柳三月生陳藏器云主解胡蔓草毒胡蔓草即野葛也原製用味短須猪肉同煮俟肉色紫乃堪食蕓薹菜增本草蕓薹菜塞外有雲臺戌始種此菜故名一名寒菜一名胡菜一名薹菜一名薹芥一名油菜原單莖圓肥淡青色葉附莖上形如白菜嫩時可炒食既老莖端開花如蘿蔔花結角中有子增本草九月十月下種生葉冬春採薹心為茹三月則老不可食開小黄花四瓣子灰赤色炒過榨油黄色燃燈甚眀原味温無毒主風游丹腫乳癰煮食主腰脚痺破癥瘕結血多食損陽氣發瘡口齒痛又生腹中諸蟲集藻七言絶句増宋范成大田家雜興桑下春蔬綠滿畦菘心青嫩芥薹肥溪頭選擇店頭賣日暮裹鹽沽酒歸詩散句増宋楊萬里薹菘正自有風味杯盤底用専腴豐别錄原製用曬薹菜以春分後摘薹菜花不拘多少沸湯焯過控乾少用鹽拌勻良久曬乾以紙袋收貯臨用湯浸油鹽薑醋拌食蔊菜增本草蔊菜一名􅀢音罩菜一名辣米菜生南方田園小草也冬月布地叢生長二三寸柔梗細葉三月開細花黄色結細角長一二分角内有細子味極辛辣沙地生者尤伶仃彚考増山家清供考亭先生每飲後則以蔊莁供一出於旴江分於逢陽一生於嚴灘石上公所供盖建陽種集有蔊詩可考山谷縣孫崿以沙卧蔊食其苗云集藻七言古詩増宋楊萬里羅仲憲送蔊菜謝以長句學琴自有譜相鶴自有經蔬經我繙盡不見蔊菜名金華詩札初相識玉友尊前毎相憶坐令芥蓀姜子牙一見風流俱避席取士取名多失真向来許靖亦誤人君不見鄭花不得半山句却參魯直稱門生五言律詩増宋朱子次韻公濟恵蔊靈草生何許風泉古澗旁褰裳勤采擷枝筯嚏芳香冷入𤣥根閟春歸翠穎長遥知拈起處全體露真常五言絶句增宋朱子蔊菜小草有真性托根寒澗幽懦夫曾一嘬感憤不能休七言絶句増宋楊萬里虀臼文辭粲受辛子牙為祖芥為孫勸君莫謁獨醒客只謁髙陽社裏人巢菜增四川志巢菜州縣俱出葉似槐而小其子如小豆夏時種以糞田其苗可食集藻五言古詩增宋蘇軾元修菜并引菜之美者有吾鄉之巢故人巢元修嗜之余亦嗜之元修云使孔北海見當復云吾家菜耶因謂之元修菜余去郷十有五年思而不可得元修適自蜀来見余於黄乃作是詩使歸致其子而種之東坡之下云彼美君家菜鋪田綠茸茸豆莢圓且小槐芽細而豐種之秋雨餘擢秀繁霜中欲花而未萼一一如青蟲是時青裙女採擷何匆匆烝之復湘之香色蔚其饛㸃酒下鹽豉縷橙芼薑蔥那知雞與豚但恐放筯空春盡苗葉老耕翻煙雨叢潤随甘澤化暖作青泥融始終不我負力與糞壤同我老忘家舍楚音變兒童此物獨嫵媚終年繫余胸君歸致其子囊盛勿函封張騫移苜蓿適用如葵菘馬援載薏苡羅生等蒿蓬懸知東坡下塉鹵化千鍾長使齊安民指此說兩翁七言絶句原宋陸游巢菜昏昏霧雨暗衡茅兒女隨宜治酒殽便覺此身如在蜀一盤籠餅是豌巢巢菜竝序蜀蔬有兩巢大巢豌豆之不實者小巢生稻畦中東坡所賦元修菜是也吳中絶多名漂揺草一名野蠶豆但人不知取食耳予小舟過梅市得之始以作羮風味宛然在醴泉蟇頥時也冷落無人佐客庖庾郎三九困飢嘲此行忽似蟇津路自候風爐煮小巢薇原薇字說云微賤所食因謂之薇一名野豌豆一名大巢菜本草項氏曰巢菜有大小二種大者即薇乃野豌豆之不實者小者即東坡所謂元修菜也增爾雅薇垂水註生于水邊疏草生于水濱而枝葉垂于水者曰薇說文薇似藿陸璣詩疏薇山菜也今官園種之以供宗廟祭祀通志薇生水旁葉如萍原生麥田及原隰中本草云非水草也莖葉氣味皆似豌豆其藿作蔬入羮皆宜彚考原詩召南陟彼南山言采其薇小雅采薇采薇薇亦作止山有蕨薇增史記伯夷傳武王巳平殷亂天下宗周而伯夷叔齊恥之義不食周粟隱于首陽山采薇而食之作歌曰登彼西山兮采其薇矣以暴易暴兮不知其非矣神農虞夏忽焉沒兮我安適歸矣于嗟徂兮命之衰矣三秦記夷齊食薇三年顔色不異武王誡之不食而死集藻文散句增楚屈原天問驚女采薇鹿何祐五言古詩原唐白居易續古詩朝采山上薇暮采山上薇歳晏薇亦盡飢来何所為坐飲白石水手把青松枝擊節獨長歌其聲清且悲櫪馬非不肥所苦長縶維豢豕非不飽所憂竟為犧行行歌此曲以慰常苦飢詩散句原唐杜甫繋書無浪語愁寂故山薇增李頻家住東臯下好採舊山薇原明馮琦圖南吾豈敢願托北山薇增唐張九齡採薇南山岑杜甫山中疾採薇許渾白雲空長越山薇蕨原蕨一名虌爾雅云蕨虌註云廣雅云紫藄非也江西謂之虌陸璣詩疏云山菜也周秦曰蕨齊魯曰虌埤雅云狀如大雀拳足又如其足之蹷也故謂之蕨俗云初生亦類鱉脚故曰虌也增齊民要術二月中髙八九寸老有葉瀹為茹滑美如葵三月中其端散為三枝枝有數葉葉似青蒿長麄堅長不可食用原處處山中有之二三月生芽拳曲狀如小兒拳長則展寛如鳳尾髙三四尺莖嫩時無葉採取以灰湯煮去涎滑曬乾作蔬味甘滑肉煮甚美薑醋拌食亦佳荒年可救饑根紫色皮内有白粉搗爛洗澄取粉名蕨粉可蒸食亦可盪皮作線色淡紫味滑美陸璣謂可供祭祀故周詩采之增爾雅翼蕨紫色而肥野人今歳焚山則來歳蕨菜繁生其舊生蕨之處蕨葉老硬敷披人誌之謂之蕨基原氣味甘寒滑無毒去暴熱利水道令人睡焙為末米飲下二錢治腸風熱毒根燒灰油調傳蛇蠨傷彚考原詩召南陟彼南山言采其蕨增晉書文苑傳張翰為大司馬東曹掾謂同郡顧榮曰吾本山林間人無望于時子善以明防前以智慮後榮執其手愴然曰吾亦與子採南山蕨飲三江水耳洞冥記帝起俯月臺眺月亦曰眺蟾臺酌雲菹酒菹以𤣥草黒蕨金蒲甜蓼捜神後記太尉郗鑒字道徽鎮丹徒曾出獵時二月中蕨始生有一甲士折食一莖即覺欲吐因歸乃成心腹疼痛經半年許忽大吐吐出一赤蛇長尺餘尚活動揺乃挂著屋簷前汁稍稍出蛇漸焦小經一宿視之乃是一莖蕨猶昔之所食病遂除差清異志王鯨逢賣蕨姥黄衣破結有饑色憫之乃以千錢買蕨姥謝而去及歸蒸於烏頭甑盡成金釵盖姥非常人也窮幽記猿啼之地蕨乃多有每一聲遽出萬莖本草蕨根如紫草多生山間人作茹食之四皓食之而夀夷齊食之而夭固非良物集藻五言古詩增宋朱子次韻公濟恵蕨西山採蕨人蓬首尚傾國懐哉逺莫致引脰氣已塞頃筐忽堕前此意豈易得良遇不可遲枯笻有餘力七言律詩增宋朱松次韻李堯端見嘲食蕨真人官府未夤縁且向龍山作散仙春入燒痕催採蕨雨翻泥隴憶歸田蔬腸我若枵蟬腹詩格君如擊鶻拳筯下萬錢謀更鄙諸公飽煞大官羶方岳采蕨野燒初肥紫玉圓枯松瀑布煮春煙偃王妙處原無骨鈎弋生來已作拳早韭不甘同臭味秋蓴雖滑帶腥涎食經豈為兒曹設弱脚寒中恐未然詩散句增唐李白昔在南陽城唯飡獨山蕨原杜甫食蕨不願餘茅茨眼中見增杜甫秋風吹几杖不厭北山蕨石間採蕨女鬻菜輸官曹宋謝靈運野蕨漸紫苞唐張九齡採蕨南山岑李白初拳幾枝蕨石壁老野蕨杜甫石暄蕨芽紫王維繞籬生野蕨采蕨輕軒冕白居易飢捉采蕨筐李賀紫蕨生石雲鄭谷山蕨止春飢宋梅堯臣蕨肥巖向日唐杜甫今日東湖採蕨薇白居易蕨芽已作小兒拳宋陸游山童新採蕨芽肥楊萬里食蕨食臂莫食拳金元好問中林春雨蕨芽肥元郭鈺紫芽初長粉如脂别錄原製用嫩蕨沸湯煠熟曬乾用時以滚湯浸軟料物拌食任調葷素增齊民要術食經曰藏蕨法先洗蕨肥著器中蕨一行鹽一行薄粥沃之一法以薄灰淹之一宿出蟹眼湯瀹之出熇内糟中可至蕨時附錄迷蕨增爾雅藄月爾注即紫藄也似蕨可食本草李時珍曰紫藄似蕨有花而味苦謂之迷蕨初生亦可食三蒼謂之紫蕨附錄水蕨增本草水蕨似蕨生水中吕氏春秋云菜之美者有雲夢之䔇即此菜也薺原薺一名䕶生草本草云薺生濟濟故謂之薺釋家取其莖作挑燈杖可避蚊蛾謂之䕶生草野生有大小數種小薺花葉莖扁味美最細者名沙薺大薺科葉皆大而味不及小薺莖硬有毛者名菥蓂爾雅云菥蓂大薺疏云又名蔑菥一名太蕺一名馬辛味欠佳冬至後生苗二三月起莖五六寸開細白花結莢如小萍有三角莢内細子名蒫爾雅云蒫薺實疏云薺子味甘人取其葉作葅及羮四月收師曠所謂歳欲豐甘草先生即此增野菜譜江薺生臘月生熟皆可食花時不可食但可作虀用倒灌薺生旱田采之熟食亦可作虀蒿柴薺其葉可食其稭可燃掃帚薺春采熟食碎米薺三月采皆可作虀彚考增詩弼風誰謂荼苦其甘如薺禮記月令孟夏之月靡草死注靡草薺葶藶之屬周禮地官以土㑹之法辨五地之物生四曰墳衍其動物宜介物其植物宜莢物注莢物薺莢王棘之屬淮南子薺夌冬生而夏死春秋繁露薺以美冬水氣也薺甘味也乗於水氣故美者甘勝寒也薺之言濟所以濟大水也抱朴子薺夌大䔉仲夏而枯眀皇雜錄髙力士逐於巫山山谷多薺而人不之食因為詩寄意云兩京作斤賣五溪無人採夷夏雖有殊氣味終不改集藻尺牘原宋蘇軾與徐十二今日食薺極美念君卧病麫酒醋皆不可近惟有天然之珍雖不甘扵五味而有味外之美本草薺和肝氣眀目凡人夜則血歸扵肝肝為宿血之臟過三更不睡則朝旦面色黄燥意思荒浪以血不得歸故也若肝氣和則血脈通流津液暢潤瘡疥於何有君今患瘡故宜食薺其法取薺一二升許淨擇入淘了米三合冷水三升生薑不去皮搥兩指大同入釡中澆生油一蜆殻當於羮面上不得觸觸則生油氣不可食不得入鹽醋君若知此味則陸海八珍皆可鄙厭也天生此物以為幽人山居之祿輙以奉傳不可忽也賦增晉夏侯湛薺賦寒冬之日余登乎城跬步乎北園覩衆草之萎悴覽林果之零殘悲纎條之槁摧慜枯葉之飄殫見芳薺之時生被畦疇而獨繁鑽重氷而挺茂蒙嚴霜以發鮮舍盛陽而弗萌在太隂而斯育永安性於猛寒差無寧乎暖燠齊精氣於欵冬均貞固乎松竹文賦散句增楚屈原九章荼薺不同畝兮原齊卞伯玉薺賦終風掃於暮節霜露交於杪秋有凄凄之綠薺方滋繁於中疇四言古詩原眀陳繼儒十畝之郊菜葉薺花抱甕灌之樂哉農家五言古詩原宋陸游食薺十韻舍東種早韭生計似庾郎舍西種小果戲學蠶叢郷惟薺天所賜青青被陵岡珍美屏鹽酪耿介凌雪霜采擷無闕日烹餁有祕方候火地爐暖加糝沙鉢香尚嫌雜筍蕨而況汙膏粱炊秔及鬻䴵得此生輝光吾饞實易足捫腹喜欲狂一掃萬錢食終老稽山旁五言律詩増宋徐似道萋萋牆根薺采掇盈襜破白半浮糝殺青微下鹽長貧歎亦苦積悟覺尤甘緬想㧞葵老吾今已傷㢘七言律詩增宋陸游食薺糝甚美盖蜀人所謂東坡羮也薺糝芳甘妙絶倫啜来恍若在峨岷蓴羮下豉知難敵牛乳抨酥亦未珍異味頗思修淨供祕方當惜授㕑人午窓自撫膨脝腹好住煙村莫厭貧七言絶句原宋陸游食薺小著鹽醯和滋味微加薑桂助精神風爐歙鉢窮家活妙訣何曾肯授人日日思歸飽蕨薇春来薺美忽忘歸傳誇真欲嫌荼苦自笑何時得瓠肥采采珍蔬不待畦中原正味壓蓴絲挑根擇葉無虚日直到開花如雪時詩散句增唐白居易滿庭田地濕薺葉生牆根宋陳與義薄飯不能羮牆陰老春薺程俱薺花雖未繁著地爛於纈金李獻能曉雪沒寒薺無物充朝饑宋司馬光後檐數户地荒穢不翦欲令生薺花原蘇軾時遶麥田求野薺强為僧舍煮山羮增劉克莊薺花滿地無人見惟有山蜂度短牆唐孟郊食薺腸亦苦朱慶餘迎寒薺葉稠宋王安石薫風洲渚薺花繁陸游寒薺繞牆甘若飴金叚繼昌凍隴蘇来白薺添别錄原製用清明日未出採薺莖候乾夏作燈杖蚊蛾不敢近藜原作藋按本草作藜原譜以藜為地葵又以為王彗皆誤也今正之原藜一名萊一名紅心灰藋一名臙脂菜一名鶴頂草一名落藜生不擇地處處有之即灰藋之紅心者莖葉稍大嫩時亦可食故昔人謂藜藿與膏粱不同老則莖可為杖氣味甘平微毒殺蟲煎湯洗蟲瘡潄齒䘌搗爛塗諸蟲傷彚考増詩小雅北山有萊疏草名其葉可食今兖州人烝以為茹謂之萊烝晉書山濤傳魏帝以濤母老贈藜杖一枚淮南子藜藿之生蝡蝡然日加數寸不可以為櫨棟楩柟笠澤叢書讀古聖人書每涵咀義味獨坐日昃案上一杯藜藿如五鼎太牢饋於左右詢蒭錄古稱藜即灰莧老可為杖盖藜杖也集藻文散句增漢司馬遷自序糲粱之食藜藿之羮王褒聖主得賢臣頌羮藜含糗者不足與論太牢之滋味五言絶句增眀李東陽詠藜藜新尚可蒸藜老亦堪煮眀年幸强健拄杖看秋雨詩散句增晉陶潛敝襟不掩肘藜羮常乏斟原唐杜甫吾安藜不糝汝貴玉為琛試問甘藜藿未肯羨輕肥增韓愈藜羮尚如此肉食安可嘗三年國子師腸肚集藜莧童穉頻書札盤飡詎糝藜宋蘇軾寄語故山友慎無厭藜羮陳克顧我從来貧到骨經營藜藿亦艱辛蘇軾藜羮對書史陸游藜羮自美何待糝别錄原製用嫩時採葉滚水煠熟香油拌為茹頗益人能滌腸胃加蒜亦可啖煠出曬乾可備冬月之用其苗既老可束為帚直榦之麤而長者可為拄杖附錄蔏藋增爾雅拜蔏藋注蔏藋亦似藜疏此亦似藜而葉大者名拜一名蔏藋附錄灰藋原灰藋一名灰滌菜一名金鎖天今訛為灰條菜處處原野有之四月生苗莖有紫紅線稜葉尖有刻缺面青背白莖心嫩葉皆有細白灰如沙為蔬亦佳氣味甘平無毒治惡瘡蟲咬面䵟等疾忌著肉作瘡五月漸老髙者數尺七八月開細白花結實成簇如毬中有細子蒸曝取仁可炊飯及磨粉食救荒本草云結子成穂者味甘散者味苦生牆下樹下者忌用白者謂之蛇灰有毒蓴原蓴一作蒓一名茆詩傳云茆鳧葵也又陸璣疏云茆與荇菜相似江東人謂之蓴菜一名錦帶一名水葵陸璣疏云江東或謂之水葵一名露葵詳見顔氏家訓一名馬蹄草一名缺盆草增毛詩音義干寳云茆今之􅝶蹗草江東有之鄭小同云或名水戾一云今之浮菜即猪蓴也原生南方湖澤中最易生種以水淺深為候水深則莖肥而葉少水淺則莖痩而葉多其性逐水而滑惟吳越人喜食之葉如荇菜而差圓形似馬蹄莖紫色大如筯柔滑可羮夏月開黄花結實青紫色大如棠梨中有細子三四月嫩莖未葉細如釵股黄赤色名穉蓴穉小也又名雉尾蓴體軟味甜五月葉稍舒長者名絲蓴細莖如絲也九月萌在泥中漸麤硬名瑰蓴或作葵蓴十月十一月名猪蓴謂可喂猪也又名龜蓴酉陽雜俎云江東謂之蓴龜味苦體澀不堪食取汁作羮猶勝他菜味甘寒無毒治消渇熱痺厚腸胃安下焦逐水解百藥毒竝蠱氣彚考原詩魯頌思樂泮水薄采其茆增晉書陸機傳機入洛嘗詣侍中王濟濟指羊酪謂機曰卿吳中何以敵此答云千里蓴羮未下鹽䜴時人稱為名對原晉書文苑傅張翰有清才善屬文齊王冏辟為大司馬東曹掾因見秋風起思吳中菰菜蓴羮鱸魚膾曰人生貴適志何能羈宦數千里外以要名爵乎遂命駕而歸増南史沈顗傳顗素不事家産逢齊末兵荒與家人并日而食或有饋其梁肉者閉門不受惟採蓴荇根供食以樵採自資怡怡然恒不改其樂孝義傳陶子鏘母嗜蓴母沒後恒以供奠梁武義師初至此年冬營蓴不得子鏘痛恨慟哭遂長斷蓴味岳陽風土記岳陽雖水郷絶難得蓴菜惟臨湘東蓴湖間有之顔氏家訓梁世有蔡朗父諱純既不涉學遂呼蓴為露葵面牆之徒逓相倣傚承聖中遣一士大夫聘齊齊主客郎李恕問梁使曰江南有露葵否荅曰露葵是蓴水郷所出卿今食者綠葵菜耳幽眀錄河東常有醜奴將一小兒湖邊拔蒲暮宿空田舍中時日向瞑見一少女子姿容極美乗小船載蓴逕前投醜奴舍寄住因卧覺有臊氣女已知人意便求出户變而為獺寓簡齊髙帝設蓴膾崔祖思曰此味故為南北所推墨莊漫錄杜子美祭房相國九月用茶藕蓴鯽之奠蓴生於春至秋則不可食不知何謂而晉張翰亦以秋風動而思菰菜蓴羮鱸鱠鱸固秋物而蓴不可曉也陸游詩注蓴菜最宜鹽䜴所謂未下鹽䜴者言下鹽豉則非羊酪可敵盖盛言蓴羮之美耳因話錄千里蓴羮未下鹽豉世多以淡煮蓴羮未用鹽與豉相調和非也盖末字悞書為未末下乃地名此二處産此物耳其地今屬江干花史蕭山湘湖産絲蓴最美四川志綿竹縣武都山上出白蓴菜甚美集藻記增眀袁宏道湘湖記蕭山櫻桃􅀢鳥蓴菜皆知名而蓴尤美蓴採自西湖浸湘湖一宿然後佳若浸他湖便無味浸處亦無多地方圓僅得數十丈許其根如荇其葉微類初出水荷錢其枝丫如珊瑚而細又如鹿角菜其凍如氷如白膠附枝葉間清液泠泠欲滴其味香粹滑柔略如魚髄蟹脂而清輕逺勝半日而味變一日而味盡比之荔枝尤覺嬌脆矣其品可以寵蓮嬖藕無得當者惟花中之蘭果中之楊梅可異類作配耳惜乎此物東不踰紹西不過錢塘江不能逺去以故世無知者余往仕吳問吳人張翰蓴作何狀吳人無以對果若爾季鷹棄官不為折本矣然蓴以春暮生入夏數日而盡秋風鱸魚將無非是抑千里湖中别有一種蓴耶雜著增眀李流芳題西湖卧遊册辛亥四月在西湖值蓴菜方盛時以采擷作羮飽噉有蓴羮歌長不能載大意謂西湖蓴菜自吾友數人而外無能知其味者袁石公盛稱湘湖蓴羮不知湘湖無蓴皆從西湖采去又謂非湘湖水浸不佳不知蓴初摘時必浸之經宿乃愈肥凡泉水湖水皆可不必湘湖也然西湖人竟無知之者圖中人舟縱横皆蕭山賣菜翁也可與吾歌竝存以發好事者一笑原張七澤蓴菜生松江華亭谷郡志載之甚詳吾家步兵所為寄思於秋風者也然武林西湖亦有之袁中郎狀其味之美云香脆滑柔略如魚髓蟹脂而輕清逺勝其品無得當者惟花中之蘭果中之楊梅可以異類作配余謂花中之蘭是矣果中楊梅豈堪敵蓴何不以荔枝易之中郎又謂問吳人無知者盖蓴惟出於吾郡所産既少又其味易變不能逺致故耳五言律詩增眀鄒斯盛太湖采蓴并引辛酉秋汎太湖見紫蓴雜出蘋荇間詢諸旁人不識也衍棹求之得數里許太湖向無蓴采自余始因賦詩紀之春暖氷芽茁秋深味更清有花開水底是葉貼湖平野客分雲種山㕑帶露烹橘黄霜白後對酒奈何情風靜綠生煙煙中蕩小船香絲縈手滑清供得秋鮮荇葉分圓缺鱸魚相後先誰云是千里采采自今年七言律詩增宋楊萬里詠蓴鮫人直下白龍潭割得龍公滑碧髯曉起相傳蘂珠闕夜来失却水晶簾一杯淡煮宜醒酒千里何須下豉鹽可是士衡殺風景却將羶膩比清纎徐似道蓴羮堆盤縷縷又秋風客俎虀鹽一洗空羮膾疑居舵樓底杯螯如堕酒船中蓴羮本是詩人事尊爼那容俗子同不日挽君来快問請分一箸供涪翁五言絶句增眀髙啓蓴菜紫絲浮半滑波上老秋風憶共香菰薦吳江葉艇中七言絶句增宋張孝祥我夢扁舟震澤風蓴羮晩筯落盤空那知嶺表炎蒸地也有青絲滿碧籠方岳羮蓴煙雨中間幾白鷗藕花菱葉小亭幽紫蓴共煮香涎滑吐出新詩字字秋徐似道千里蓴絲未下鹽北遊誰復話江南可憐一筯秋風味錯被旁人舌本參眀陸樹聲陸瑁湖邊水慢流洛陽城外問漁舟鱸魚正美蓴絲熟不到秋風已倦游徐茂吳波心未吐心如結水葉初齊葉尚含脂自凝膚柔繞指轉敎風味憶江南鮫杼紛紛散作絲龍涎宛宛滑流匙詩人采茆元從水莫悞嘉蔬喚露葵平湖倒影南山綠中滙三潭靈怪潛蕩槳忽驚雲霧氣驪龍頷下割龍髯誰握氷絲摘露叢水晶簾展玉璁瓏魚鬚細細龍油滑道是鮫人織錦宫兔絲自是難勝織試比蓴絲總不任聞說西陵蘇小小當年戲采結同心蓴絲不似藕絲輕傍腕纒綿入手縈漫詠東人空杼軸西湖經緯自縱横沈眀臣西湖采蓴曲西湖蓴菜勝東吳三月春波綠滿湖新樣越羅裁窄袖著来人說似羅敷詩散句原唐杜甫豉化蓴絲熟刀鳴膾縷飛嚴維江南季春天蓴菜細如弦增宋司馬光蓴羮紫絲滑鱸膾雪花肥陸游勿言蓴菜老檥棹醉湘湖唐皮日休雨来蓴菜流船滑春後鱸魚墜釣肥宋陸游石帆山路頻囘首箭茁蓴絲正滿盤秋來便有欣然處新種蓴絲已滿塘文天祥賴有蒓風堪斫膾便無花月亦飛觴元謝宗可氷縠冷纒青縷滑翠鈿細綴玉絲香原唐杜甫君思千里蓴絲繁煮細蓴增杜甫羮煮秋蓴滑白居易蓴絲滑且柔賀知章鏡湖蓴菜亂如絲羅隱盤擎紫線蓴初熟皮日休買得蓴絲待陸機宋黄庭堅醉煮白魚羮紫蓴眀陳繼儒蓴絲翠滴蓴氷紫詞增宋王易簡摸魚兒怪鮫宫水晶簾捲氷痕初斷香縷柔波蕩槳人難到三十六陂煙雨春又去伴㸃㸃荷錢隠約吳中路相思日暮恨洛浦娉婷芳鈿翠翦奩影照凄楚功名夢消得西風一度髙人今在何許鱸香菰冷斜陽裏多少天涯意緒誰記取但枯䜴紅鹽溜玉凝秋筯尊前起舞算惟有淵眀黄花歳晚此興共千古又遇湘臯碧龍驚起氷涎猶䕶髯影春洲未有菱歌伴獨占暮煙千頃呼短艇試翦取纎條玉溜青絲瑩樽前細認似水面新荷波心半卷㸃㸃翠鈿淨凄凉味酪乳那堪比竝吳鹽一箸秋冷當時不為鱸魚去聊爾動渠歸興還記省是幾度西風幾處吹愁醒鷗昏鷺暝謾換得霜痕蕭蕭兩鬢羞與共秋鏡唐珏摸魚兒漸滄浪凍痕銷盡瓊絲初漾眀鏡鮫人夜翦龍涎滑織就水晶簾冷鳧葉淨最好似嫩荷半捲浮晴影玉流翠凝早枯豉融香紅鹽和雪醉齒嚼清瑩功名夢曽被秋風喚醒故人應動髙興悠然世味渾如水千里舊懐誰省空對景奈囘首姑蘇臺畔愁波暝煙寒夜靜但只有芳洲蘋花與老何日泛歸艇别錄増爾雅翼今吳人嗜蓴菜鱸魚盖魚之美者復因水菜以芼之兩物相宜獨為珍味原製用内景經云四月食蓴菜鯽魚羮開胃禁忌雞跖集蓴入七八月不可食中有蝸蟲故也至十月氷凍蟲死雖老猶可食蓴性雖冷熱食及多食擁氣損人胃及齒令人顔色惡損毛髪和醋食令人骨痿發痔關節急嗜睡脚氣論中冷人食此誤人極深芹原芹古作蘄本草作蘄從􅋄從蘄諧聲也後省作芹楚有蘄州蘄縣俱音淇羅願云地多産芹故字從芹蘄亦音芹徐鍇註說文蘄字从屮蘄諸書無蘄字據此則蘄字亦當从靳作蘄字也一名水英一名楚葵爾雅云芹楚葵注云今水中芹菜有水芹旱芹水芹生江湖陂澤之涯旱芹生平地有赤白二種爾雅翼云白芹舒蘄多有之土人呼為白芷二月生苗其葉對節而生似芎藭其莖有節稜而中空其氣芬芳五月開細白花如蛇床花蘇恭云白芹取根赤芹莖葉竝堪作葅味甘無毒止血養精益氣止煩去伏熱殺藥毒令人肥健置酒醤香美和醋食滋人但損齒又有一種馬芹爾雅謂之茭又名牛蘄若野茴香葉細銳可食亦芹類也本草李時珍云一名胡芹一名野茴香以其氣味子形微似也金光明經謂之葉婆你與芹同類而異種一種黄花者毛芹也有毒殺人此旱芹之一種彚考增詩小雅觱沸檻泉言采其芹箋芹菜也可以為葅亦所用待君子也我使采其水中芹者尚潔清也魯頌思樂泮水薄采其芹周禮天官加豆之實芹葅醢原吕氏春秋菜之美者雲夢之芹列子昔人有美戎菽甘枲莖芹萍子者對郷豪稱之郷豪取而嘗之蜇於口慘於腹衆哂而怨之其人大慚四時寳鏡東晉李鄂立春日命以蘆菔芹菜為菜盤相餽貺增龍城錄魏左相忠言讜論贊襄萬機誠社稷臣有日退朝太宗笑謂侍臣曰此羊鼻公不知遺何好而能動其情侍臣曰魏徴好嗜醋芹毎食之欣然稱快此見其真態也眀日召賜食有醋芹三盃公見之欣喜翼然食未竟而芹已盡太宗笑曰卿謂無所好今朕見之矣公拜謝曰君無為故無所好臣執作從事獨僻此收斂物太宗黙而感之公退太宗仰睨而三歎之二老堂詩話蜀人縷鳩為膾配以芹菜或為詩云本欲將芹補那知弄巧成爾雅翼釋菜以菜為摰即采水中三品之水草以薦之采菽詩次章采檻泉中之水芹微物也而古人不以微薄廢禮猶愈於無禮也今釋奠先聖猶用之昌平山水記芹城在州東三十里有橋橋下有水出芹山家清供芹二月三月作英時采之入湯取出以苦酒硏子入鹽與茴香漬之可作葅帷瀹而羮之既清而馨猶碧澗然故杜甫有香芹碧澗羮之句集藻四言古詩原眀陳繼儒春水漸寛青青者芹君且留此彈余素琴五言律詩增宋朱子次韻公濟恵芹晚食寧論肉知君薄世榮瓊田何日種玉本一時生白鶴今休誤青泥舊得名收單還炙背北闕儻關情五言絶句增明髙啓芹飯煮憶青泥羮炊思碧澗無路獻君門對案増三歎詩散句原唐杜甫獻芹則小小薦藻眀區區韓愈食芹雖云美獻御固已癡杜甫風吹青井芹増白居易飯稻茹芹英元倪瓚香芹渾滿澗原唐杜甫飯煮青泥坊底芹增杜甫美芹由来知野人盤剝白鴉烏觜芹温庭筠潔白芹芽入燕泥宋陸游盤蔬臨水采芹芽詞増宋髙觀國生查子野香春吐芽泥濕隨飛燕碧澗一杯羮夜照無人翦玉釵和露香鵞管随香軟野意重殷勤持以君王獻别錄原禁忌三月八月二時龍帶精入芹菜中人誤食之為病面青手青腹滿如妊痛不可忍服硬餳三四升日三吐出蜥蜴便瘥一說亦虺蛇蜥蜴之毒耳非龍也春夏之交遺精於此且蛇喜食芹尤為可證附錄紫芹增本草紫芹一名蜀芹亦名楚葵一名苔菜一名水萄菜原紫芹即赤芹生陰崖陂池近水石邊狀類赤芍藥葉深綠背甚赤莖似蕎麥花紅可喜結實亦似粃蕎麥味苦澀其汁可以煮雌制汞伏砂擒黄號起貧草他方頗少太行王屋諸山最多紫菜増魏王花木志吳郡邊海諸山悉生紫菜吳都賦注紫菜生海水中正青附石生取乾之則紫色臨海常獻之集藻增宋黄庭堅綠菜贊蔡蒙之下彼江一曲有茹生之可以為䔩蛙蠙之衣采采盈掬吉蠲洗澤不溷沙礫芼以辛鹹宜酒宜餗在吳則紫在蜀則綠其臭味同逺故不錄誰其發之班我旨蓄維女博士史君炎玉龍鬚菜增盛京志龍鬚菜生扵東南海邊石上叢生狀如柳根長者至尺餘白色以醋浸食亦佳蔬也土人呼為麒麟菜出金州海邊鹿角菜增南越志猴葵色赤生石上南越謂之鹿角盛京志鹿角菜生東南海中大如鐵線分丫如鹿角紫黄色乾之為海錯水洗醋拌則如新味今金州海邊有之御定佩文齋廣羣芳譜卷十五
