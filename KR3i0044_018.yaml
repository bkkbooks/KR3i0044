body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷十六蔬譜山藥原山藥原名薯蕷負暄雜錄云山藥本名薯蕷避唐代宗諱改名薯藥宋英宗諱曙改名山藥一名山藷一名土藷一名玉延廣雅云玉延署預也吳普云齊楚名玉延一名修脆増本草山藥一名藷藇一名山芋一名藷薯一名兒草江閩人單呼為藷原處處有之南京者最大而羙蜀道尤良入藥以懐慶者為佳春間生苗蔓延莖紫葉青有三尖似白牽牛葉更厚而光澤五六月開細花成穟淡紅色大類棗花秋生實扵葉間青黄八月熟落根下外薄皮土黄色狀似雷丸大小不一肉白色煮食甘滑與根同冬春採根皮亦土黄色薄而有毛其肉白色者為上青黒者不堪用南中一種生山中者根細如指極𦂳實刮磨入湯煮之作塊味更佳食之尤益人江湖閩中一種根如薑芋而皮紫大者切數片去皮煎煮食俱羙但性冷於北地者彼土人呼為藷入藥以野生者為勝性甘溫平無毒鎮心神安魂魄止腰痛治虛羸健脾胃益腎氣止洩痢化痰涎久服耳目聰眀輕身不老彚考増山海經景山其草多藷藇升山其草多藷藇搜神記漢時有杜蘭香者自稱南康人氏以建業四年春數詣張碩碩年十七望見其車在門外婢通言阿母所生遣授配君可不敬從碩呼女前視可十六七說事邈然久逺有婢子二人大者萱支小者松支鈿車青牛上飲食皆備出薯蕷子三枚大如雞子云食此令君不畏風波辟寒溫碩食二枚欲留一不肯令碩食盡言本為君作妻情無曠逺以年命未合且小乖太嵗東方卯當還求君湘中記永和初有採藥衡山者道迷糧盡過息巖下見一老公四五年少對執書告之以飢與其食物如薯蕷指教所去六日至家而不復飢異苑薯蕷入藥又復可食野人謂之土藷若欲掘取嘿然而獲唱名者便不可得人有植者随所種之物而像之也清異錄蜀孟昶月旦必素飱性喜薯藥左右因呼薯藥為月一盤集藻頌増梁江淹薯蕷頌華不可炫葉不足憐微根儻餌棄劍為仙黄金共夀丹雘争年君謂无妄我驗衡山賦原宋陳與義玉延賦吾聞陽公之田不懇不耕爰播盈斗可獲連城資陰陽之淑氣孕天地之至精蜿蜒赤埴之腴煌扈白虹之英驚山木之潤發冒朝采之餘榮逮百嘉之澤盡候此玉之豐成王公大人方以不貪為寳辭秦玉而陋楚珩雖三獻其奚售乃舉贄扵老生老生囊中之法未試腹内之雷久鳴搴石鼎以自濯搘豕腹之彭亨春江浩其波濤逺壑颯以松聲俄白雲之漲谷亂雙眼於晦眀擅人間之三絶色味勝而香清捧杯盂而笑領映戶牖之新晴斥去懶殘之芋盡棄接輿之菁收竒勲扵景刻七未落而體輕凌厲八仙掃除三彭見蓬莱之夷路接閶闔於初程彼狥華之大夫含三生之宿酲汙以蜂蜜辱以羊羮合嘗逸少之炙同傳孝儀之鯖嘆超然之至味乃陸沈於聾盲豈能扵我乎遇亦或卿而或烹起援筆以三叫馳蛇蚓以縱横吾何與大夫之迷疾蓋以慰此玉之不平也五言古詩増宋司馬光荅昌言求薯蕷苗冬實散肥壤春苖動新葉雅意非遺人野情聊自惬何言好事者求訪来相疊㑹種十畝餘坐取詩盈箧陳與義同楊運幹黄秀才村西買山藥潦縮田路寛委蛇散腰脚勝日三枝杖村西買山藥岡巒相吞吐逺水互前却天陰野水眀嵗暮竹籬薄田翁領客意發筐堆磊落玉質緗色裘用世乃見縛屠門幾許快夜語尋幽約石鼎看雲翻門前北風惡七言古詩増宋文同子平寄恵希夷陳先生服唐福山藥方因戯作雜言謝之蜀江之東山色盡如赭有道人云此是丹砂伏其下煙雲光潤若洗濯澗谷玲瓏如刻畫我聞神仙草藥不在凡土生是中當有靈苗異卉之根莖果然人言所出山芋為第一西南諸郡有者皆虚名就中唐福衆稱賞肥實甘香天所養有時巖頭倒垂三尺壯士臂忽然洞口直舉一合仙人掌土人入冬農事閑千篝萬鍤来此山可憐所鬻不甚貴著價即售曽不慳往年子瞻為余說言君所部之内此物尤竒絶後復寄書勸我當餌之滿紙親提華嶽先生訣予因購之不惜錢依方服餌將二年其功神聖久乃覺牙牢體溢支節堅自問丹霄㡬時上早生兩翅教髙颺塵世如帑不可居待看鴻濛對雲將元龔璛掘山藥歌綠薜紫藤緗色子種玉綿延春透髄晴虹嵗晚寒不起託命長鑱山谷裏小隠牆東塹藥䦨劚土政得方槃槃服食相傳養生訣茂陵劉郎和露啜五言律詩増眀劉崧嘗山藥誰種山中玉修圓故自勻野人尋得慣帶雨劚来新味益丹田暖香凝石髄春商芝亦何事空負白頭人七言律詩増宋王安石次韻奉和蔡樞宻南京種山藥法區種抛来六七年春風條蔓想宛延難追老圃莓苔徑空對珍盤玳瑁筵嘉種忽傳河右壤靈苗更長闕西偏故畦穿劚知何日南望鍾山一慨然原黄庭堅山蕷湯厨人清曉獻瓊糜正是相如酒渇時能解饑寒勝湯餅略無風味笑蹲鴟打窓急雨知然鼎亂眼晴雲看上匙已覺塵生雙井椀濁醪從此不須持朱子和秀野山藥怪来朽壤耀瓊英小劚頃筐可代耕豢豹于人儘無分蹲鴟從此不須生雪鑱但使身長健石鼎何妨手自烹欲賦玉延無好語羞論蜂蜜與羊羮詩散句増宋王珪鳳池春晚綠生煙曾見高枝蔓玉延常伴兎絲留我箧㡬随竹葉泛君筵唐韓愈僧還相訪来山藥煮可掘宋張舜民如何山芋輩天下稱朱魏唐杜甫充膓多薯蕷宋蘇軾淇上白玉延詞増宋張鎡南柯子積雪迷松徑圍爐掩竹扉牀頭一味有蹲鴟軟火深聞香熟已多時自得陶朱法休教嬾瓉知浪傳黄獨正甘肥紫玉嬰兒盈尺更新竒又種玉能延命居山易學仙青青一畝自鉏煙露孕雲蒸肌骨更凝堅熟染蜂房蜜清添石鼎泉雲香酥膩老来便煨芋爐深却笑祖師禪别錄原種植春社日取宿根多毛有白瘤者竹刀截作二寸長塊先將地開作二尺寛溝深三四尺長短任意先填亂糞柴一半上實以土將截斷山藥竪埋扵中上仍以糞土覆與溝平時澆灌之苗生以竹或樹枝架作楥髙三四尺當年可食三四年者根大尤羙夏月宜頻澆最宜肥地每年易人而種宜牛糞麻籸忌人糞修治以布裹手竹刀刮去皮竹篩盛置簷風處不得見日至夕乾五分侯全乾收或微火烘乾亦可又法去皮以水浸之糝白礬末少許入水中經宿洗淨則涎自去芋原芋一名土芝一名蹲鴟史記注云芋頭形類鴟鳥之蹲一名莒說文云齊謂芋為莒増說文大芋實根駭人故謂之芋廣雅渠芋也其葉謂之􅀈葃爾雅翼芋之大者前漢謂之芋魁後漢書謂之芋渠種芋法吳郡所産大者謂之芋頭嘉定名之博羅旁生小者謂之芋妳原在在有之蜀漢為最京洛者差圓小葉如荷長而不圓莖微紫乾之亦中食根白亦有紫者南方之芋子大如斗旁生子甚多皮上有微毛如鱗次裹之拔之則連茹而起味甘蒸煮任意濕紙包火煨過熟乗熱噉之則鬆而膩益氣充饑亦可為羮臛若和皮水煮冷啖堅頑少味最不易消廣志所載十數種君子芋大如斗魁淡原作談誤善芋魁大如瓶少子葉如繖蓋紺色而紫莖其長丈餘易熟長味是芋之最善者百果芋魁大子繁畝收百斛雞子芋色黄車轂芋鉅一作銀子芋旁原作勞誤巨芋青浥邉芋四種皆多子可乾腊亦可藏至夏皆種之羙者長味芋味羙莖亦可食九面芋大而不羙青芋曹芋一作素芋象芋一作象空芋大而弱使人易饑皆不可食又有蔓芋縁枝生大者如二三升博士芋出新鄭蔓生而根如鵞鴨卵百子芋出葉俞縣有魁芋無旁子増酉陽雜俎天芋生終南山中葉如荷而厚雀芋狀如雀頭置乾地反濕置濕地反乾飛鳥觸之堕走獸遇之僵益部方物畧記赤鸇芋俗號赤顫頭芋形長而圓但子不繁衍味最羙蠻芋味亦羙其形則圓子繁衍人多蒔之摶果芋品最下摶接也言可接果山中人多食之本草芋種雖多有水旱二種旱芋山地可種水芋水田蒔之葉皆相似但水芋味勝莖亦可食芋不開花時或七八月間有開者抽莖生花黄色旁有一長萼䕶之如半邊蓮花之狀原芋味平除煩止渇可以療饑可以備荒小兒戒食滯胃氣難尅化有風疾服風藥者最忌多致殺人備荒論曰蝗之所至凡草木葉無有遺者獨不食芋桑與水中菱芡宜廣種之彚考原史記貨殖傳蜀卓氏之先趙人也秦破趙遷卓氏曰吾聞岷山之下沃野下有蹲鴟至死不饑乃求逺遷致之臨卭漢書翟方進傳初汝南有鴻隙陂郡以為饒翟方進為相奏罷之王莽時常枯旱郡中追怨方進童謡曰壊陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰云者兩黄鵠増晉書李雄載記雄尅成都軍饑甚乃率衆就榖扵郪掘野芋而食之南史孝義傳鮮于文宗漁陽人年七嵗䘮父父以種芋時亡至眀年芋時對芋嗚咽如此終身孝經援神契仲冬日昴星中收莒芋原列仙傳酒客為梁丞使民益種芋三年當大饑衆如其言後果大饑梁民得不死増汝南先賢傳薛直歸先人冡側種稻芋稻以祭祀芋以充饑耽道說禮𤣥虗無為袁安除隂平長時年饑民皆菜食租入不畢安聽使輸芋曰百姓饑困長何得食榖先自引芋吏皆從之華陽國志何随字季業蜀郡郫人也除安漢令蜀亡去官時巴土饑荒所在無榖送吏行乏輙取道側民芋随以緜繫其處使足所取直民視芋見緜相語曰聞何安漢清㢘行過從者無糧必能爾耳持緜追還之終不受因為語曰安漢吏取糧令為之償原鄴侯外傳泌嘗於衡嶽寺讀書嬾殘所謂嬾殘經音先悽愴而后喜恱必謫堕之人中夜潜往謁焉嬾殘命坐發火出芋以啖之謂泌曰慎勿多言領取十年宰相増雲仙雜記李華燒三城絶品炭以龍腦裹芋魁煨之擊爐曰芋魁遭遇矣青棠集張九齡知蕭炅不學故相調謔一日送芋書稱蹲鴟蕭荅曰損芋拜嘉帷蹲鴟未至然僕家多怪亦不願見此惡鳥焉九齡以書示客滿座大笑物類相感志今浙東生土芋狀磊磈自實若天雷頻則多生若耕種欲取不得名之若呼芋字則逡巡不見矣玉堂閒話閤皁山一寺僧甚専力種芋嵗收極多杵之如泥造壍為牆後遇大饑獨此寺四十餘僧食芋壍以度凶嵗爾雅翼唐開元中蕭嵩奏請注文選東宫衛佐馮光進解蹲鴟云今之芋子即是著毛蘿蔔嵩聞大笑原影燈記洛陽人家上元各造芋郎君食之宜男女増澄懐錄有人收得虞永興與圓機書一紙翦開字字賣之房村二字得芋千頭原閩清上有巖曰盤谷下有橋曰渡仙産竒花異果嘗有二人入山適一叟後至袖中出芋數枚相啖忽不見但見木葉盈尺題詩其上曰偶與雲水㑹不與雲水通雲散水流後杳然天地空集藻賛増宋宋祁芋賛芋種不一鸇芋則貴民儲于田可用終嵗文賦散句増漢東方朔七諫拔搴𤣥芝兮列樹芋荷晉左思吳都賦徇蹲鴟之沃則以為世濟陽九蜀都賦𤓰疇芋區五言絶句増宋朱子芋魁沃野無凶年正得蹲鴟力區種萬葉青深煨奉朝食七言絶句増宋韓琦中書東㕔山芋随竹縈囘翠蔓延土藷名異出前編㑹須霜晚餐珠實可挹浮丘作地仙原蘓軾過子忽出新意以山芋作玉糝羮色香味皆竒絶天上酥􅋳則不可知人間决無此味也香似龍涎仍釅白味如牛乳更全清莫將南海金虀膾輕比東坡玉糝羮陸㳺芋陸生晝臥腹便便歎息何時食萬錢莫誚蹲鴟少風味賴渠撐拄過凶年詩散句増宋孫覿蹲鴟勸加餐風味亦可人原劉子翬曉煩黏玉糝深椀啖糢糊増陸㳺風爐歙鉢生涯在且試新寒芋糝羮葑火正紅煨芋羙不妨乗炬雪中歸梁沈約綠芋鬱參差周庾信白石香新芋唐王維巴人訟芋田新秋綠芋肥岑參葉葉藏山徑原杜甫紫收岷嶺芋増軒轅彌眀凍芋強抽萌張籍沙田紫芋肥薛能野色生肥芋宋陸㳺羙啜芋魁羮元李孝光芋熟騎童分王逢新霜芋長孫唐張籍水店晴看芋葉黄韋莊木甑朝蒸紫芋香宋蘇軾土人頓頓食藷芋芋魁徑尺誰能盡陸㳺芋肥一本可専車地爐枯葉夜煨芋元戴帥初山毛人摘芋紅多馬臻飽霜紫芋細凝酥别錄増神仙傳焦先常食白石以分與人熟煮如芋種芋法陶隠居曰生則有毒性滑尤為服餌家之所忌劉禹錫云十月後曬乾收之冬月食他時月不可食久食則虗勞無力圗經曰食之過多則有損傷唐本草云多食動宿冷原擇種十月㨂根圎長尖白者就屋南簷下掘坑以礱糠鋪底將種放下稻草盖之勿使凍爛至三月間取出埋肥地待早苗發三四葉於五月間擇近水肥地移栽其科行與種稻同或用河泥或用灰糞爛草壅培旱則澆之有草則去之若種旱芋亦宜肥地栽種正二月將耕過地先鋤一徧以新黄土覆盖三月中擇壬申壬午壬戌辛巳戊申庚子辛卯日將芋芽向上種候生三四葉髙四五寸五月移栽大抵芋畏旱宜近水軟沙地區深可三尺許行欲寛寛則過風本欲深深則根大春宜種夏種不生秋宜壅失壅則瘦鋤宜頻澆宜數霜降宜捩其葉鋤開根邉土上肥泥壅根使力囘於根則愈大而愈肥汜勝之書云區方深各三尺下實豆萁尺有五寸以糞著萁上如萁厚一區種五本要勻再以糞土覆之芋成萁爛皆長三尺南方多水芋北方多旱芋總之地皆宜肥水芋二尺一科畆為科二千一百六十科收魁若子二斤畆為斤二千三百二十以備荒救饑已數倍於作田矣種芋之地衆人往来眼目多見及聞刷鍋聲多不孶生鋤芋宜晨露未乾及雨後耘鋤令根旁虗則芋大子多若日中耘大熱則蔫以灰糞培則茂水芋不必耘但亦宜肥地七月乃塘法在芋四角掘土壅根則土暖結子圓大霜後起之芋荄繁宜剝取淖曬乾煮食味極甘羙製用芋餺飥煮熟去皮擂爛以細布紐去查和麪豆粉為􅀈捍切麤細任意初煮二十沸如鐵至百沸軟滑汁食之和鯽魚鱧魚作臛食良微糝以鹽則煮不糢糊霜後芋子上芋白擘下以液漿煠過曬乾冬月炒食味勝蒲筍聞山中人取大芋曝極乾和土築牆經乆不壊荒年取用或去皮搗爛塗壁嵗嵗加之亦經久不壊苐芋多惡種無論野生即田園所植亦須擇種厚壅不然有青色多斑駁者味最劣青芋多毒先以灰汁煮薑亦可次易水煮熟乃堪食博物志云野芋狀小于家芋有大毒家芋種之三年不採成稆芋形葉俱相似根並殺人悮食者土漿及大豆汁糞汁灌之良煮芋汁洗膩衣潔白如玉増東坡雜記岷山之下凶年以蹲鴟為糧不復疫癘知此物之宜人也本草謂芋土芝云益氣充饑恵州富此物然人食者不免瘴吳逺㳺曰此非芋之罪也芋當去皮濕紙包煨之火過熟乃噉之則鬆而膩乃能益氣充饑今恵人皆和皮水煮冷淡堅頑少味其發瘴固宜丙子除夜前兩日夜饑甚逺逰煨芋兩枚見啖羙甚乃為書此帖蜀中人接花果皆用芋膠合其罅予少時頗能之嘗與子由戯用苦楝木接李既實不可嚮口無復李味傳云一薫一蕕十年尚猶有臭非虗語也芋自是一種不甚堪食名接果夢溪筆談處士劉湯隠居王屋山常于齋中見一大蜂罥于蛛綱蛛縛之為蜂所螫墜地俄頃蛛鼓腹欲裂徐徐行入草嚙芋梗微破以瘡就嚙處磨之良久腹漸消輕躁如故自後人有為蜂螫者挼芋梗傅之則愈附錄香芋原香芋形如土豆而味甘羙煮熟可下茶増種芋法香芋皮黄肉白莖葉如扁豆而細又有引蔓開花花落即生名之曰落花生皆嘉定有之附錄甘露子増本草甘露子以根味而名一名地蠶原譜誤作環一名土蛹一名草石蠶皆以根形而名蘇頌云草根之似蠶者亦名石蠶一名滴露一名地𤓰兒荆湘江淮以南野中有之人亦栽蒔二月生苗長者近尺方莖對節狹葉有齒並如雞蘓但葉皺有毛四月開小花成穂一如紫蘓花穂結子如荆芥子其根聨珠狀如老蠶掘根蒸煮食之味如百合原二三月鋤宜沃土宜沾濕凡種宜于園圃近陰處或樹蔭下疎種之至秋乃收生熟皆可食又可蜜煎可醬漬可作豉雨中以灰雜鬆土覆掩根鋤草浄則生繁至冬鋤取一云葉上露滴地即滋𦙍是以有滴露之名集藻七言古詩増宋楊萬里甘露子甘露子甘露子喚作地蠶亦良似不食柘葉不食桑何須走入地底藏不能作繭不上簇如何也蒙賜沐浴呼我果謂之果呼我䔩謂之䔩唐臨鼂錯莫逢他髙陽酒徒咀爾不搖牙附錄土芋原本草土芋一名土豆一名土卵一名黄獨蔓生葉如豆根圓如卵肉白皮黄可灰汁煮食亦可蒸食解諸藥毒生研水服吐出惡物甘藷原甘藷一名朱藷一名番藷大者名玉枕藷稗史類編云嶺外多藷有發深山邃谷而得者重數十斤名玉枕藷形圎而長本末皆銳肉紫皮白質理膩潤氣味甘平無毒補虗乏益氣力健脾胃強腎陰與薯蕷同功久食益人與芋及薯蕷自是各種巨者如杯如拳亦有大如甌者氣香生時似桂花熟者似薔薇露撲地傅生一莖蔓延至數十百莖節節生根一畆種數十石勝種榖二十倍閩廣人以當米榖有謂性冷者非三二月及七八月俱可種但卵有大小耳卵八九月始生冬至乃止始生便可食若未須者勿頓掘令居土中日漸大到冬至須盡掘出不則敗爛徐𤣥扈云昔人謂蔓菁有六利柿有七絶予謂甘藷有十二勝收入多一也色白味甘諸土種中特為夐絶二也益人與薯蕷同功三也徧地傅生翦莖作種今嵗一莖次年便可種數十畆四也枝葉附地随節生根風雨不能侵損五也可當米榖凶年不能災六也可充籩實七也可釀酒八也乾久收藏屑之旋作餅餌勝用餳蜜九也生熟皆可食十也用地少易於灌溉十一也春夏種初冬收入枝葉極盛草穢不容但須壅土不用鋤耘不妨農工十二也南方草木狀甘藷盖薯蕷之類或曰芋之類根葉不如芋皮紫而肉白蒸鬻食之産珠崖之地海中之人皆不業耕稼惟掘地種甘藷秋熟收之蒸㬠切如米粒倉圌貯之以充糧糗是名藷糧大抵南人二毛者百無一二惟海中之人夀百餘嵗者由不食五榖食甘藷故耳異物志甘藷出交廣南方民家以二月種十月收之其根似芋亦有巨魁大者如鵞卵小者如雞鴨卵剝去紫皮肌肉正白如肪南人當米榖果食灸皆香羙初時甚甜經乆得風稍淡甘藷疏閩廣藷有二種一名山藷彼中故有之一名番藷有人自海外得此種海外人亦禁不令出境此人取藷絞入汲水繩中因得渡海分種移植遂開閩廣之境兩種莖葉多相類但山藷植援附樹乃生番藷蔓地生山藷形魁壘番藷形圎而長其味則番藷甚甘山藷稍劣江南田圩下者不宜藷若髙仰之地平時種藍種豆者易以種藷有數倍之獲大江以北土更高地更廣即其利百倍不啻矣倘慮天旱則此種畆收數十石數口之家止種一畆縱災甚而汲井灌溉一至成熟終嵗足食又何不可集藻序原眀徐𤣥扈甘藷疏序方輿之内山陬海澨麗土之毛足以活人者多矣或隠弗章即章矣近之人習用之以為澤居之魚鱉山居之麋鹿也逺之人逖聞之以為踰汶之貉踰淮之橘也坐是兩者弗獲相通焉余不佞獨持迂論以為能相通者什九不者什一人人務相通即世可無聚不足民可無道殣或嗤笑之固陋之心終不能移每聞他方之産可以利濟人者往往欲得而藝之同志者或不逺千里而致耕穫菑畬時時利頼其用以此持論頗益堅嵗戊申江以南大無麥禾欲以樹藝佐其急且備異日也有言閩越之利甘藷者客莆田徐生為予三致其種種之生且蕃畧無異彼土庶㡬哉橘踰淮弗為枳矣余不敢以麋鹿自封也欲徧布之恐不可戶說輙以是疏先焉别錄増物類相感志手植如手鋤鍬等物植随本物形狀原種植種藷宜高地沙地起脊尺餘種在脊上遇旱可汲井澆灌即遇澇年若水退在七月中氣候既不及藝五榖即可翦藤種藷至於蝗蝻為害草木蕩盡惟藷根在地薦食不及縱令莖葉皆盡尚能發生若蝗信到時急令人發土徧壅蝗去之後滋生更易是天災物害皆不能為之損人家凡有隙地但只數尺仰天見日便可種得石許此救荒第一義也須嵗前深耕以大糞壅之春分後下種若非沙土先用柴灰或牛馬糞和土中使土脈散緩與沙土同庶可行根重耕起要極深將藷根每叚截三四寸長覆土深半寸許每株相去縱七八尺横二三尺俟蔓生既盛苗長一丈留二尺作老根餘翦三葉為一段插入土中每栽苗相去一尺大約二分入土一分在外即又生藷隨長随翦随種随生蔓延與原種者不異凡栽須順栽倒栽則不生節在土上即生枝在土下即生卵約各節生根即從其連綴處斷之令各成根苗每節可得卵三五枚製用可生食可蒸食可煮食可煨食可切米曬乾收作粥飯可曬乾磨粉作餅餌其粉可作粳子炒煤子食取粉可作丸似珍珠沙谷米可造酒但忌與醋同用一造粳將糯米水浸五七日以米酸為度淘淨曬乾搗成細粉看晴天將糯粉入生水和作團子如杯口大即將藷根拭去皮洗浄沙石上徐徐磨作漿要極細勿攙水將糯團煮熟撈入瓶中用木杖盡力攪作糜候冷熱得所大約以可入手為度將藷漿傾入每糯粉三斗入藷漿一斤攪極勻先將乾小粉篩平板上次將糜置粉上又著乾粉捍薄曬半乾切如骰子様曬極乾收藏用時慢火燒鍋令熱下二合許慢火炒少刻漸軟漸發成團毬子次下白糖芝蔴或更加香料炒勻候冷極浮脆每粳二升可炒一斗芋漿山藥漿亦可作造粉取藷根麤布拭去皮水洗淨和水磨細入水中淘去浮渣取澄下細粉曬乾同豆粉灑水作丸與珍珠沙谷米無異造酒藷根不拘多少寸截斷曬半乾甑炊熟取出揉爛入甑中用酒藥研細搜和按實中作小坎候漿到看老嫩如法下水用絹袋濾過或生或煮熟任用其入甑寒暖酒藥分兩下水升斗或用麯蘗或加藥物悉與米酒同法若造燒酒即用藷酒入鍋如法滴糟成頭子燒酒或用藷糟造常用燒酒亦與酒糟造燒酒同藏種九月十月間掘藷卵揀近根先生者勿令損傷用軟草包裹挂通風處陰乾一法扵八月中揀近根老藤翦七八寸長每七八根作一小束耕地作畦將藤束栽畦内如栽韭法過月餘每條下生小卵如蒜頭狀冬月畏寒稍用草盖覆至来春分種若老條原卵在土中無不壊爛一法霜降前取近根卵稍堅實者陰乾以軟草各襯另以軟草裹之置無風和暖不近霜雪不受氷凍處一法霜降前收取根藤曝令乾於竈下掘窖約深一尺五六寸先下稻糠三四寸次置種其上更加稻糠三四寸以土盖之一法七八月取老藤種入木筩或磁瓦器中至霜降前置草篅中以稻糠襯置向陽近火處至春分後依前法種収蔓枝節已徧地不能容者即為㳺藤宜翦去之及掘根時捲去藤蔓俱可飼牛羊猪或曬乾冬月喂皆能令肥腯用地凡藷二三月種者每株用地方二歩有半而卵徧焉每官畆約用藷三十六株四五月種者地方二歩而卵徧焉畆約六十株六月種者方一歩有半而卵徧焉畆約一百六株有竒七月種者地方一歩而卵徧焉畆約二百四十株八月種者地方三尺以内得卵細小矣畆約九百六十株種之疎宻畧以此準之九月畦種生卵如箸如棗擬作種此松江法也北方早寒宜早一月算又在視天氣寒暖臨時斟酌耳蘿蔔原蘿蔔一名萊菔菘乃莱名莱菔乃根名後世訛為蘿蔔南人呼為蘿瓝或云性能制麥毒故名来服言来麰之所服也一名蘆菔一名雹葖爾雅云葖蘆萉注云萉宜為菔蘆菔蕪菁屬紫花大根俗呼雹葖一名紫花菘一名溫菘紫花菘温菘皆南人所呼吳人呼楚菘廣南人呼秦菘廣韵云魯人呼為菈一名土酥農書云北人蘿蔔一種四名春曰破地錐夏曰夏生秋曰蘿蔔冬曰土酥謂其潔白如酥也一名薺根處處有之北土尤多其狀有長圓二類根有紅白二色莖髙尺餘苗稠則小随時取食令稀則根肥大葉大者如蕪菁細者如花芥皆有細柔毛春末抽髙薹開小花紫碧色夏初結英子大如麻子黄赤色圎而微扁生河朔者頗大而江南安州洪州信陽者尤大有重至五六斤者大抵生沙壤者脆而甘生瘠地者堅而辣根葉皆可生可熟可葅可虀可醬可豉可醋可糖可腊可飯乃蔬中之最有益者氣味辛甘無毒下氣消榖去痰癖止咳𠻳利膈寛中肥健人令肌膚細白同猪羊肉鯽魚煮食更補益熟者多食滯膈中成溢飲服地黄何首烏者食之髪白以蘿蔔多食滲血性相反也彚考増北史張威傳威遷青州總管頗事産業遣家奴於人間鬻蘆菔根其奴縁此侵擾百姓原清異錄王奭善營度子弟不許仕宦每年止種火田玉乳蘿蔔壺城馬面菘可致千緡増談苑江東居民言種芋三十畆計省米三十斛種蘿蔔三十畆計益米三十斛爾雅翼昔有婆羅門僧東来見食麥麵者曰此大熱何以食之及見蘿菔曰賴有此以解之耳自此相傳食麪必食蘿菔國老談苑宼凖年三十餘太宗欲大用尚難其少準知之遂服地黄兼餌蘆菔以反之未㡬髭髮皓白原五色線王旻好勸人食蘆菔根葉云冬食功多力甚養生之物也集藻傳原眀髙應經羅伯英傳先生姓羅名伯英字陽和上世出蔡仲之後周季國亡蔡之孫子自以王者後恥臣列國分布天下雖族類蕃蕪然皆隠約原野與農圃老人結無情之交扵勢利泊如也春秋間齊魯交惡猶以野無厥族卜其無恃為當時貴重尚如此漢初陳平欲薦士間楚竟不能致厥族之良惟以惡子弟進故用其讒卒以亡楚後平掠其功封侯惡子弟卒不顯是以此族益務韜晦蜀諸葛武侯嘗用其别子蔓青氏督餉道行伍中既䇿功當進爵以非其好故弗就也先生與蔓青同逺祖生而孤特自殖克邁種徳學有根本閒居自負其才曰吾進可以備鼎鼐退可以賁丘園進退不違乎時吾事畢矣豪貴之家聞先生風聲争設大烹以享之先生心事潔白啓口皆可咀嚼故貴人不甚相知平生惟與學士雅好尤篤凡親嗜先生之久者天下事無不可做晩年所養既久中益充實雖雜處塵土間物竟莫得而湼自有一種幽人潜徳風味上自宫府下至兒童走卒室婦少女莫不知有先生然欲用之者非強㧞起之不能致終不效毛遂輩沾沾喜自薦也老辣之性與日俱盛尤以名為累嘆其不得深根固蔕于下乃學逃名于漆園之徒㳺心物初委順造化深欲秘本根以緒餘啟世之不知道者故嘗著論曰天下無道則言有枝葉所惡于言者為其無用也吾言可無用也與哉世殆未知吾枝葉之正味矣一夕偶過白水真人舍坐客有誚之者附耳話言謂先生今日雖無食肉相虀酸氣吾知免耳先生若罔聞知據爐危坐少焉清談時出爽氣襲人客不覺前席舉手願與餘瀝以沃渇懐先生傾倒肺腑粹然一出于正絶無世俗溷濁之味客與接談者皆嘖嘖不容口如入太古室酌𤣥酒而啜太羮恨相知之晚也乃復相顧而嘆曰先生盖有道之士也清不絶俗淡不累物吾儕久與至人處乃今則知之耳圗所以易其名者遂私號曰清淡先生云五言律詩増元許有壬蘆菔性質宜沙地栽培屬夏畦熟登甘似芋生薦脆如棃老病消凝滯竒功直品題故園長尺許青葉更堪虀五言絶句原宋黄庭堅蘿菔宻壤深根蔕風霜已飽經如何純白質近蔕染微青朱子蘿蔔紛敷翦翠叢津潤擢玉本寂寞病文園吟餘得深齦詩散句増宋蘇軾中有蘆菔根尚含曉露清原唐杜甫長安冬葅酸且綠金城土酥浄如練宋蘇軾秋来霜雪滿東園蘆菔生兒芥有孫楊萬里雪白蘆菔非蘆菔喫来自是辣底玉増僧北磵安得脆瓊蘆菔子蘋洲南畔種殘雲楊萬里金城土酥玉雪容蘆菔削氷寒脫齒方岳莱菔根鬆鏤氷玉别錄原種植頭伏下種宜沙地地欲生則無蟲耕地欲熟則草少治畦長一丈濶四尺每子一升可種二十畦子陳更佳先用熟糞勻布畦内水飲透次日用大糞拌子令勻撒畦内細土覆之苗出三四指便可食擇其宻者去之疎則根大尺地只可留三四窠厚壅頻澆其利自倍月月可種月月可食欲收種于九月十月擇其良者去鬚帶葉移栽之澆灌以時至春收子可備種蒔鋤不厭頻忌帶露鋤恐生蟲増種樹書種蘿蔔宜沙壖地五月犂五六徧六月六日種鋤不厭多稠即少種原製用香蘿蔔白蘿蔔堅實者切小塊晾二日每一斤鹽一兩醃過布揉去水再晾又揉又晾又揉乾濕得宜每一斤用白沙糖四兩醋一椀小茴香花椒砂仁陳皮各一錢搗細拌勻磁礶收貯青瓜丁亦可照此法做蘿蔔虀蘿蔔切作片萵苣條或嫩蔓菁白菜切大小同各以鹽醃良久沸湯煠過入新水中次煎酸漿泡之以椀盖入瓶中浸冷蘿蔔乾以蘿蔔切作骰子大曬乾收候醃芥菜滷水煮加川椒蒔蘿拌勻曬乾收貯久留不壊味極羙又法切過鹽醃一宿日中曬乾用水醃蘿蔔蘿蔔削去根鬚洗浄以鹽擦放瓮内五六日下水時復攪勻一月後可食加以一二鵞棃則香脆若食不盡者就以滷水煮蘿蔔透控乾入醬或切細條曬乾收臨食時熱湯泡透炒食聽用増齊民要術蘿蔔菹法淨洗通體細切長縷束為把大如十張紙卷暫經沸湯即出多與鹽二升暖湯合把手按之又細縷切暫經沸湯與橘皮和及暖興則黄壊料理滿奠原洞微志齊州有人病狂云夢中見紅裳少女引入宫殿中其小姑令歌遂歌云五靈樓閣曉玲瓏天府由来是此中惆悵悶懐言不盡一丸蘿蔔火吾宫一道士解之云少女心神小姑脾神火毁也醫經言蘿蔔制麪毒故曰火吾宫此犯大麥毒也以藥並蘿蔔治果愈清異錄鄭居易計部言其家自先世多留帶莖蘿蔔懸之簷下有至十餘年者每至夏秋有病痢者煮水服之即止愈久者愈妙増東坡雜記裕陵傳王荆公偏頭疼方云是禁中秘方用生蘿蔔汁一蜆殻注鼻中左痛注右右痛注左或兩鼻皆注亦可雖數十年患皆一注而愈荆公與僕言之已愈數人矣原延夀書李師逃難入石窟中賊以煙薰之垂死摸得蘿蔔菜一束嚥其汁獲甦張杲醫說饒民李七病鼻衂甚危醫以蘿蔔自然汁和無灰酒飲之即止盖血随氣運氣滯則血妄行蘿蔔下氣故也有人好食豆腐中毒醫治不效偶聞人云其妻誤以蘿蔔湯入豆腐鍋中遂不成其人遽飲蘿蔔湯遂愈范濟畧代巡述中州一代巡病𠻳久不愈甚危徴醫各府歸徳僅一老醫年七十餘病𠻳亦劇府官不得已以之應命行至一村渇甚叩民家求飲其家以熱水一盂飲之覺𠻳似少止再求一杯又覺少愈因詢此何水其人荅曰村野無茶適煮蘿蔔乾遂以奉用醫曰吾生平最喜食此偶途中用盡敢求少許其家餽以數升醫食數日𠻳全愈及見代巡病與已同診脈後出一方因向代巡云藥須醫人自煎恐他人煎不得法藥難取效及煎時潜以蘿蔔乾加入數日代巡病愈大神其技給冠帶作興千金遂成富室附錄水蘿蔔原形白而細長根葉俱淡脆無辛辣氣可生食亦有大如臂長七八寸者則土地之異也出山東夀光縣者尤鬆脆附錄胡蘿蔔原有黄赤二種長五六寸宜伏内畦種肥地亦可漫種大者盈握冬初掘取生熟皆可啖可果可蔬莖髙二三尺有白毛氣如蒿不可生食貧人曬乾冬月亦可拌腐充饑三伏内治地㸃種地肥則漫種頻澆則肥大欲收種者留至次年開碎白花攅簇如傘子如蛇牀子稍長而有毛褐色又如蒔蘿子元時始自邊塞中来故名甘辛無毒下氣補中利胸膈安五臟令人健食有益無損子治久痢一種野胡蘿蔔根細小用亦同金幼孜北征錄云交河北有沙蘿蔔根長二尺許大者徑寸下支生小者如筯色黄白氣味辛而微苦氣似胡蘿蔔想亦胡蘿蔔之類但地利人力之不同耳别錄原製用胡蘿蔔鮮者切片畧煠控乾入葱丁蒔蘿茴香川椒紅豆研爛並鹽拌勻醃一時食附錄野葡蔔増野菜譜野葡蔔葉似葡蔔故名可熟食萵苣原本草一名萵菜墨客揮犀云萵菜自咼國来故名一名千金菜清異錄云咼國使者来漢隋人求得菜種酬之甚厚因名千金菜葉似白苣而尖嫩多皺色稍青折之有白汁四月抽薹髙三四尺剝皮生食味清脆糟食亦佳江東人鹽曬壓實以備方物謂之苣筍彚考増蓼花洲閒錄五代時有僧某卓庵道邊藝蔬丏錢一日晝寢夢一金色龍食所藝萵苣數畦僧寤驚且曰必有異人至已而見一偉丈夫於所夢之處取萵苣食之僧視其狀貌凛然遂攝衣延之餽食甚勤頃刻告去僧屬之曰富貴無相忘因以所夢告且曰公他日得志願為老僧于此地建一大寺偉丈夫乃藝祖也既即位求其僧尚存遂命建寺賜名普安集藻五言古詩増唐杜甫種萵苣并序既雨已秋堂下理小畦隔種一兩席許萵苣向二旬矣而苣不甲坼獨野莧青青傷時君子或晚得微祿轗軻不進因作此詩陰陽一錯亂驕蹇不復理枯旱於其中炎方慘如燬植物半蹉跎嘉生將已矣雲雷歘奔命師伯集所使指揮赤白日澒洞青光起雨聲先已風散足盡西靡山泉落滄江霹靂猶在耳終朝紆颯沓信宿罷瀟灑堂下可以畦呼童對經始苣兮蔬之常随事藝其子破塊數席間荷鋤功易止兩旬不甲坼空惜埋泥滓野莧迷汝来宗生實於此此輩豈無秋亦蒙寒露委翻然出地速滋蔓戶庭毁因知邪干正掩抑至沒齒賢良雖得祿守道不封已壅塞敗蘭芝衆多盛荆杞中園陷蕭艾老圃永為恥登於白玉盤藉以如霞綺莧也無所施胡顔入筐篚别錄増野䔩品萵苣菜采取去葉去皮寸切以滚湯泡之加薑油糖醋拌之學圃餘疏萵苣絶盛于京口鹹食脆羙即旋摘烹之亦佳原本草彭乗云萵苣有毒百蟲不敢近蛇虺觸之則目瞑不見物人中其毒薑汁解之御定佩文齋廣羣芳譜卷十六
