body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷十七蔬譜菜瓜原菜瓜北方名苦瓜蔓葉俱如甜瓜生時色青質脆可生食間有苦者亦可作豉醃葅故名菜瓜熟亦微甜生秋月大小不一止可醃以備冬月之用彚考增詩豳風七月食瓜小雅疆場有瓜是剝是菹傳剝瓜為葅也夏小正八月剝瓜注畜瓜之時也别録原製用十香菜黃豆一斗煮爛去湯撈起用麵四斤拌勻醬二寸厚用乾蘆席上蒲包蓋密二七候冷取出曬乾聽用菜瓜出時用草一斤切丁鹽二斤醃一宿取出朗乾加薑絲二三斤陳皮絲半斤去皮杏仁三升每黃豉一升醃瓜水三碗加好酒一瓶拌勻再加花椒四兩大小茴香各二兩甘松三奈白芷蒔蘿各半兩拌勻以淨罈盛滿箬扎口泥封外寫東西南北四字每日曬一面三七後可用十香瓜切碁子塊每斤用鹽八錢諸料物同瓜拌勻缸醃一二日控乾日曬晚復入滷如此三次勿令太乾裝罈醬瓜醬黃一斤鹽四兩先將青瓜剖開去子用石灰白礬不拘多少為末和取清水將瓜泡一日一夜取出洗淨量用鹽醃一日滚湯一掠晾乾不可日曬每瓜一斤醬麵一斤鹽四兩拌入甕中一月後醬透取瓜少帶醬入罈收貯用甚青脆甘美其醬或食或再醬蔬菜糖醋瓜生菜瓜一片切小塊鹽一兩五錢醃一宿撈起以汁煎滚候冷入瓜拌透又曬再用糖四兩醋一碗磁器浸入小茴香砂仁花椒紫蘇薑少許香瓜將瓜用鹽滷浸一宿漉起用滷煎滚過曬乾用好醋煎滚候冷調砂糖薑絲紫蘇蒔蘿茴香拌勻用磁器貯用糟瓜菜瓜以石灰白礬煎滚冷浸一伏時用煮酒泡糟鹽入銅錢百餘文拌勻醃十日取出控乾别用好糟入鹽適中煮酒泡再拌入罈收貯箬扎口泥封瓜虀揀未熟瓜每斤隨瓣切開去瓤不用就百沸湯焯過以鹽五兩勻擦翻轉豆豉半斤釅醋半升麵醬斤半馬芹川椒乾薑陳皮甘草茴香各半兩蕪荑二兩並為細末同瓜一處拌勻入磁甕內醃壓于冷處頓之經半月後則熟瓜色眀透絶類琥珀味甚香美又取生瓜用竹簽穿透每瓜十枚用鹽四兩醃一宿瀝去瓜水令乾用醬十兩拌勻烈日曬翻轉又曬乾入新磁器內收用稍瓜增本草稍瓜一名越瓜一名菜瓜南北皆有二三月下種生苖就地生蔓青葉黃花並如冬瓜花葉而小夏秋之間結瓜有青白二色大如瓠子一種長者至二尺許俗呼羊角瓜子狀如胡瓜子大如麥粒原稍瓜蔓生較黃瓜頗粗色緑而黑縱有白紋界之微凹體光而滑膚實而韌味甘寒利腸去煩熱止渴利小便解酒熱宣泄熱氣不益小兒不可與乳酥鮓同食宜忌大略與黃瓜同别録增倦逰雜録韓龍圖贄山東人鄉里食味好以醬漬瓜啖謂之瓜虀韓為河北都漕廨宇在大名眀府府中諸軍營多鬻此物韓嘗曰某營者最佳某營者次之趙説歎曰歐陽永叔嘗撰花譜蔡君謨亦著荔枝譜今須請韓龍圖贄撰瓜虀譜矣原製用糖醋瓜稍瓜分二片又橫切作薄片淡曬薑絲糖醋拌勻納淨罈內十數日即可用盤醬瓜細白麵不拘多少伏中新汲水和軟硬得法用模踏堅實切二指厚片放席上排勻以黃蒿覆之三七後遍生黃衣取出曬極乾入水略濕刷去黃衣淨碾為細末名曰醬黃每醬黃一斤用瓜一斤炒鹽四兩七月間稍瓜熟時檢嫩全者不須去瓤先將數內鹽醃瓜一宿次日將鹽與醬麵拌勻一層醬一層瓜盛甕中每層瓜內間茄一個每日清晨盤一次日夕盤一次盤在盆內十數日即成收貯任用糟瓜稍瓜每五斤用鹽七兩和糟勻醃用古錢五十文逐層頓十餘日取出去錢并舊糟換好糟依前醃之入甕收貯待用增齊民要術食經藏越瓜法糟一斗鹽三升醃瓜三宿出以布拭之復醃如此凡瓜欲得完慎勿傷傷便爛以布囊就取之佳豫章郡人晚種越瓜所以味亦異學圃餘疏瓜之不堪生噉而堪醬食者曰菜瓜圎者如甜瓜長者如王瓜皆一類也以甜醬漬之為蔬中佳味黃瓜原黃瓜一名胡瓜本草云張騫使西域得種故名拾遺録云大業四年避諱改為黃瓜俗又呼為王瓜蔓生葉如木芙蓉葉五尖而澀有細白刺如針芒莖五稜亦有細白刺開黃花結實青白二色質脆嫩多汁有長數寸者有長一二尺者遍體生刺如小粟粒多謊花其結瓜者即隨花並出味清涼解煩止渴可生食種陽地暖則易生行陳宜整兩行微相近用樹枝棚起如人胸髙附蔓于上兩行外相逺以通人行喜糞壅頻鋤勿令生草瓜生至初花鋤三四次鋤勿著根令瓜苦亦有隨地蔓生者摘瓜時宜引手摘勿踏瓜蔓亦勿翻覆之此瓜可生食亦可醃以為菹性甘寒小兒不宜多食彚考增述異記南康樗都縣西沿江有石室名夢口穴嘗有船人遇一人通身黃衣擔兩籠黃瓜求寄載過至岸下此人徑下崖直入石穴中學圃餘疏王瓜出燕京者最佳其地人種之火室中逼生花葉二月初即結小實中官取以上供唐人詩云二月中旬已進瓜不足為竒矣又一種秋生者亦佳吾土俱宜閩中二三月間食入夏枯矣集藻七言絶句原宋陸遊白苣黃瓜上市稀盤中頓覺有光輝時清閭里俱安業殊勝周人詠采薇别録原種植下種宜甲子庚子壬寅辛巳黃道開成日二月上旬為上時三月上旬為中時四月上旬為下時至五六月止可種藏瓜耳藏瓜皮厚可收藏者預先將畦劚數遍以土熟為度加熟糞一層又翻轉以耙耬平水飲足將子用軟布包裹水濕生芽出天晴日中種子於內掩以浮土二指厚每晨以清糞水灌澆俟苗長茂帶土移栽苗大發旺用竹刀開其根跗間納大麥一粒結瓜碩大而久栽苗之畦修治與上同糞要熟而細一切草根須去盡收子取生數葉即結瓜者謂之本母子留至極熟摘下截去兩頭取中央者洗淨晾乾置乾燥處勿令浥濕浥濕則難生衛瓜瓜生蟻用羊骨引至旁棄去瓜中黃甲小蟲喜食瓜葉宜以綿兜罥去瓜忌香尤忌麝香一觸之輒痿死一法瓜旁種蔥蒜能辟麝藏瓜淋過灰曬乾藏瓜茄至冬如新製用新摘瓜開作兩片將子與瓤去淨鹽醃二三日晾乾入滷醬掩十餘日滚水候冷洗淨晾乾入好麵醬醃極嫩黃瓜整醃之尤肥美茄同此又法黃瓜茄不拘多少先用醬黃鋪在缸內次以鮮瓜茄鋪一層鹽一層又下醬黃一層瓜茄一層鹽一層如此層層相醃五七宿烈日曬之欲作乾瓜取出曝之不必用水南瓜原南瓜附地蔓生莖粗而空有毛葉大而緑亦有毛開黃花結實形橫圓而竪扁色黃有白紋界之微凹煮熟食味麵而膩亦可和肉作羮又有畨南瓜實之紋如南瓜而色黑緑蒂頗尖形似葫蘆二瓜皆不可生食增本草南瓜四月生苗引蔓甚繁一蔓可延十餘丈節節有根近地即著葉狀如蜀葵大如荷葉花如西瓜花結瓜正圎大如西瓜上有稜如甜瓜一本可結數十顆其色或緑或黃或紅子如冬瓜子肉厚色黃農桑通訣浙中一種隂瓜宜隂地種之秋熟色黃如金皮膚稍厚可藏至春食之如新疑即南瓜也絲瓜原絲瓜一名蠻瓜一名布瓜一名天羅絮一名天絲瓜蔓生莖緑色有稜而光葉如黃瓜葉而大無刺深緑色宜高架喜背陽向陰開大黃花五出微似胡瓜花蘂瓣俱黃少以鹽清可點茶結實狀如瓜有短而肥者有長而瘠者瓜大寸許長一二尺或三四尺深緑色有皺點瓜首如鱉首嫩者煮熟加薑醋食同雞鴨豬肉炒食佳不可生食性冷解毒多食敗陽九月將老者取子留作種瓤絲如網可滌器集藻七言絶句增宋杜北山詠絲瓜寂寥籬戶入泉聲不見山容亦自清數日雨晴秋草長絲瓜沿上瓦牆生趙梅隱詠絲瓜黃花褪束緑身長白結絲包困曉霜虛瘦得來成一捻剛偎人面染脂香冬瓜呼東瓜者非原冬瓜一名白瓜一名水芝一名地芝見廣雅一名蔬在處蒔之附地蔓生莖粗如指有毛中空葉大而青有白毛如刺開白花實生蔓下長者如枕圎者如斗皮厚有毛初生青緑經霜則青皮上白如塗粉肉及子亦白八月斷其梢簡實小者摘去止留大者五六枚經霜乃熟十月足收之味甘微寒性急善走除小腹水脹利小便止渴益氣除滿耐老去頭靣熱鍊五臟有熱病者宜食陰虛及患寒疾人久病人忌之霜降後方可食不然成反胃病增本草其瓤謂之瓜練白虛如絮可以浣練衣服其子謂之瓜犀在瓤中成列彚考增清異録果中子繁者惟夏瓜冬瓜石榴故嗜果者目瓜為百子甕瀛崖勝覽蘇門答刺國東瓜久留不敗學圃餘疏天下結實大者無若冬瓜味雖不甚佳而性溫可食廣東志崑􅀈山冬瓜延蔓蒼藤徑寸實長三四丈大踰圍集藻七言絶句增宋鄭安曉詠冬瓜翦翦黃花秋復春霜皮露葉護長身生來籠統君休笑腹裏能容數百人别録原種植齊民要術種冬瓜法傍墻陰地作區圍二尺深五寸以熟糞及土相和正月晦日種既生以柴木倚牆令其緣上旱則澆之冬瓜十月區種如區種瓜法冬則推雪著區上為堆潤澤肥好乃勝春種收藏宜髙燥處忌近鹽醋及掃帚雞大觸犯與芥子同安置可經年不壞收子瓜蒂灣曲貼肉者雌瓜也俟極老取子收高燥處勿浥濕留作種製用荆楚嵗時記七月採瓜犀為面脂瓤亦可作澡豆齊民要術冬瓜削去皮子于芥子醬中或美豆醬中藏之佳增齊民要術瓜芥菹用冬瓜切長三寸廣一寸厚二分芥子少與胡芹子合熟研去滓與好酢鹽之下瓜唯久益佳也食經藏梅瓜法先取霜下老白冬瓜削去皮取肉方正薄切如手版細施灰羅瓜著上復以灰覆之煮􅀈皮烏皮梅汁器中細切瓜令方三分長二寸熟煠之以投梅汁數月可食以醋石榴子著中並佳也物類相感志夏月衣蒸以冬瓜汁浸洗其迹自去原多能鄙事蜜煎經霜老冬瓜去皮及近瓤者用近皮肉切片沸湯焯過放冷以石灰湯浸一宿去灰水以蜜放銀石器內熬熟下瓜片微煎漉出别用蜜煎候瓜色微黃傾出待冷以磁罐收煉蜜養之蒜冬瓜以老者去皮瓤切作一指濶白礬石灰煎湯焯過溫水泡去灰氣控乾每斤用鹽二兩蒜瓣三兩同搗碎拌冬瓜裝入磁器添熬過好醋浸之冬瓜仁七升絹袋盛投三沸湯中須臾取出曝乾如此三度清苦酒漬一宿曝乾為末日服方寸匕能令人肥恱眀目延年不老又法取子三五升去皮為丸空心日服三十丸令人白淨如玉又能補肝眀目治男子五勞七傷恱澤面容白瓜仁五兩桃花四兩白楊皮二兩為末食後白湯服方寸匕日三服欲白加瓜仁欲紅加桃花三十日面白五十日手足俱白一方有橘皮無楊皮跌撲傷損用乾冬瓜皮一兩真牛皮膠一兩銼入鍋內炒存性研末每服五錢好酒熱服仍飲酒一甌厚蓋取微汗其痛即止損傷腰痛冬瓜皮燒研酒服一錢壺盧本草云壺酒器盧飲器此物各象其形故名俗作葫蘆增本草壺盧一名瓠瓜一名匏瓜圓者曰匏亦曰瓢原葫蘆匏也一名藈姑蔓生莖長須架起則結實圎正亦有就地生者大小數種有大如盆盎者有小如拳者有柄長數尺者有中作亞腰者莖韌有絲如筋葉圓有小白毛面青背白開白花有甘苦二種甘者性冷無毒利水道止消渴苦者有毒不可食惟可佩以渡水陸農師曰項短大腹曰瓠長如越瓜首尾如一者細而合上曰匏無柄而圓大形扁者似匏而肥圓者曰壺匏之有短柄大腹者增本草李時珍曰長瓠懸瓠瓠之一頭有腹長柄者仐人以為茶酒瓢壺盧瓠瓜蒲盧細腰者今之藥壺盧廣志謂之約腹壺亦有大小二種名狀不一其實一類各色也處處有之但有遲早之殊並以正月下種生苗引蔓延緣其葉似冬瓜葉而稍團有柔毛嫩時可食五六月開白花結實白色大小長短各有種色瓤中之子齒列而長謂之瓠犀爾雅云瓠棲瓣注云瓠中瓣也彚考增詩弼風匏有苦葉疏匏葉少時可為羮今河南及揚州人恆食之八月中堅強不可食故云苦葉原豳風八月斷壺小雅南有樛木甘瓠纍之幡幡瓠葉采之亨之大雅酌之用匏增禮記月令仲冬行秋令則瓜瓠不成郊特牲器用陶匏以象天地之性也周禮地官場人掌國之場圃而樹之果蓏珍異之物注蓏瓜瓠之屬原論語吾豈匏瓜也哉焉能繫而不食增晉書杜預傳預初攻江陵吳人知預病癭憚其智計以瓠繫狗頸示之南齊書卞彬傳彬性飲酒以瓠壺瓢勺杬皮為肴著帛冠十二年不改易以大瓠為火籠什物多諸詭異自稱卞田居婦為傅蠶室梁書蕭琛傳始琛在宣城有北僧南度惟齎一葫蘆中有漢書序傳僧曰三輔舊老相傳以為班固真本琛固求得之北齊書武成胡后傳后母范陽盧道約女初懷孕有胡僧詣門曰此宅瓠盧中有月既而生后唐書柳玭傳玭嘗述家訓以戒子孫曰余舊府髙公先君兄弟三人俱居清列非速客不二羮胾夕食齕蔔瓠而已皆保重名于世管子六畜育于家瓜瓠葷菜百果備具國之富也原莊子惠子謂莊子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉也剖之以為瓢則瓠落無所容非不呺然大也吾為其無用而掊之莊子曰夫子固拙于用大矣子有五石之瓠何不慮以為大樽而浮乎江湖而憂其瓠落無所容則夫子猶有蓬之心也夫增韓非子齊有居士田仲者宋人屈榖見之曰榖聞先生之義不恃仰人而食今穀有樹瓠之道堅如石厚而無竅願獻之仲曰夫瓠所貴者謂其可以盛也今厚而無竅則不可剖以盛物而任重如堅石則不可以剖而以斟吾無以瓠為也曰然榖將以欲棄之今田仲不恃仰人而食亦無益人之國亦堅瓠之類也鶡冠子賤生于無所用中河失船一壺千金淮南子百人抗浮不若一人挈而趨注浮瓠也新序魏文侯見箕季牆壞不治問其故曰不時又進瓠羮文侯曰牆壞不築教我無奪民農功貽我瓠羮教我無多斂百姓太康地記朱崖儋耳無水唯種大瓠藤斷其汁用之亦足世説陸士衡初入洛咨張公所宜詣曰劉道真是其一既往劉尚在哀制中性嗜酒禮畢初無他言唯問東吳有長柄壺盧卿得種來否陸兄弟殊失望乃悔往記事珠王筠好弄葫蘆每吟詠則注水于葫蘆傾已復注若擲之于地則詩成矣酉陽雜俎儋崖種瓠成實率皆石餘盧氏雜説鄭餘慶清儉有重德一日忽召親朋官數人會食衆皆驚朝僚以故相望重皆凌晨詣之至日髙餘慶方出間話移時諸人皆枵然餘慶呼左右曰處分厨家爛蒸去毛莫拗折項諸人相顧以為必蒸鵝鴨之類逡巡舁臺盤出醬醋亦極香新良久就餐每人前下粟米飯一碗蒸葫蘆一枚相國餐美諸人強進而罷清異録瓠少味無韻葷素俱不相宜俗呼淨街槌埤雅瓠葉庶人之菜也菜無微於瓠葉原婦人歸外家外舅姨皆以新葫蘆兒贈之俗云宜長外甥集藻五言律詩原唐杜甫除架束薪已零落瓠葉轉蕭疏幸結白花了寧辭青蔓除秋蟲聲不去暮雀意何如寒事今牢落人生亦有初鄭審酒席賦得匏瓢華閣與賢開仙瓢自逺來幽林常伴許陋巷亦隨回挂影憐紅壁傾心向緑杯何曽斟酌處不使玉山頽增元范梈種瓠或言種瓠蔓長必翦其標乃實余齊所種因樹為架蔓緣不已果多虗花欲去之慮傷其凌霄之意因賦五言為之解嘲云豈是階庭物支離亦自竒已殊凡草蔓綴得好花枝帶雨寧無實凌霄必有為啾啾羣鳥雀從汝踏多時秋後瓠果成一實輪囷可愛余嘉其晚成而不羣答賦云嘉瓠吾所愛孤髙更可人不虛種植意終繫發生神有葉誠藏用無容豈識真眀年應見汝衆子亦輪囷七言律詩增金麻九疇三弟手植瓢材且有詩豫亦戲作為愛胡盧手自栽弱條柔蔓漸縈回素花飄後初成實碧蔭濃時可數枚試問老禪藤繳去何如遊子杖挑來早知瓠落終無用只合江湖養不才五言絶句增眀髙啓摘瓠輪囷卧霜露秋曉摘初歸自笑詩人骨何由似爾肥七言絶句增宋楊萬里笑殺桑根甘瓠苗亂他桑葉上他條向人更逞廋藏巧却到桑梢挂一瓢詩散句增宋孝武帝匏漿調秋葉唐李白魯叟悲匏瓜朱慶餘荒蔓露青匏宋陸遊家園瓜瓠漸輪囷元王逢籬落緣雲瓠子肥眀僧道衍嫩瓠肥白才燖豝别録增國語諸侯伐秦及涇莫濟叔向見叔孫穆子穆子曰豹之業及匏有苦葉矣不知其他叔向退召舟虞與司馬曰夫苦匏不材與人共濟而已是行也魯人以莒子先濟諸侯從之蜀志張裔傳裔為益州太守雍闓曰張府君如瓠壺外雖澤而內實粗唐書禮樂志有葫蘆笙簫博物志庭州灞水以金銀鐵器盛之皆漏唯瓠葉不漏酉陽雜俎瓠牛踐苗則子苦爾雅翼天之匏瓜星一名天雞在河鼓東曹植洛神賦歎匏瓜之無匹兮詠牽牛之獨處阮瑀止欲賦曰傷匏瓜之無偶悲織女之獨勤則古稱匏瓜皆謂星爾原種植葫蘆冬瓜茄瓠瓠子黃瓜菜瓜俱宜天晴日中下種每晨以清糞水澆之二月下旬栽則五月中旬結實若三月種則太遲矣種法正月預以糞和灰土實填作一坑候土發過熱篩過以盆盛土種諸子常灑水日曬暖夜收暖處候生甲時分種于肥地常以清糞水灌澆上用低柵蓋之待長帶土移栽俟引蔓結子子外之條掐去之凡留子初生二三子不佳取第四五者留之每科留三枚即足餘旋食之種大葫蘆正月中掘地作坑深數尺或至一丈填實油麻菉豆爛草葉一層糞土一層如此數重向上一尺餘糞土填之坑方四五尺每坑只種十餘顆二月下子待生長尺許㨂擇肥好者四莖每兩莖相縛著一處仍以竹刀刮去半邉以物纒住以牛糞黃泥封之一如接樹法裹待生做處只留一頭取此兩莖亦如前法四根合作一根長大只留一根待結葫蘆只揀取兩箇周正好大者餘俱去之依此葫蘆極大每箇可盛一石長頸葫蘆如前法如欲將長頭打結待葫蘆生成趁嫩時將其根下土挖去一邊却輕擘開根頭掗入巴豆肉一粒在根裏仍將土罨其根俟二三日通根藤葉俱軟敝欲死却任意將葫蘆結成或縧環等式仍取去根中巴豆照舊培澆過數日復鮮如故俟老收之增物類相感志葫蘆照水種自正原製用崔豹古今注匏瓠也壺盧瓠之無柄者也瓠有柄者懸瓠可以為笙曲沃者尤善秋乃可用之則漆其裏瓢亦瓠也瓠其總瓢其别也增嶺表録異胡盧笙交趾人多取無柄之瓠割而為笙上安十三簧吹之音韻清響雅合律吕記事珠唐世風俗貴重葫蘆醬桃花醋逢原記李適之酒器有瓠子巵原埤雅匏苦瓠甘酌酒冬盛則暖夏盛則寒增埤雅壺性善浮要之可以涉水南人謂之要舟爾雅翼河汾之寶有曲沃之懸匏焉良工取以為笙瀛崖勝覽古俚國以葫蘆為樂器原王氏農書匏之為用甚廣大者可煮作素羮可和肉煮作葷羮可蜜煎作果可削條作乾小者可作盒盞長柄者可作噴壺亞腰者可盛藥餌苦者可治病瓠之為物也纍然而生食之無窮烹飪咸宜最為佳蔬種得其法則其實碩大小之為瓠杓大之為盆盎膚瓤可以喂豬犀瓣可以灌燭舉無棄材濟世之功大矣農桑撮要做葫蘆茄乾茄削片葫蘆匏子削條曬乾收依做乾菜法千金月令冬至日取葫蘆盛蔥根莖汁埋于庭中夏至發開盡為水以漬金玊銀石青各三分自消曝乾如飴可休糧久服神仙名曰金液漿瓠子原瓠子江南名扁蒲就地蔓生處處有之苗葉花俱如葫蘆結子長一二尺夏熟亦有短者粗如人肘中有瓤兩頭相似味淡可煮食不可生噉夏月為日用常食至秋則盡不堪久留性冷無毒除煩止渴治心熱利水道調心肺治石淋吐蛔蟲壓丹石毒茄子原茄子一名落蘇酉陽雜俎云錢王有子跛足以聲相近故呼落蘇一名小菰見晉書先蠶儀注一名崑崙瓜見大業拾遺録云改呼茄子為崑崙紫瓜清異録云人間但名崑味有紫青白三種老則黃如金來自暹羅紫者又名紫膨脝説本黃庭堅白者又名銀茄又一種白者名渤海茄形圓有蒂有蕚大者如甌又一種白花青色稍扁一種白而扁謂之番茄此物宜水勤澆多糞則味鮮嫩自小至大生熟皆可食又可曬乾冬月用如地瘠少水者生食之刺人喉一種水茄形稍長亦有紫青白三色根細末大甘而多津可止渴此種尤不可缺水與糞此數種在在有之味甘寒丹溪謂茄屬土甘而降火莖粗如指紫黑有刺葉如蜀葵葉亦紫黑有刺開花時摘其葉布通衢規以灰令人物踐踏之則子繁俗名嫁茄熟者食之厚腸胃火炙食之甚美北方以為常食南人不敢生食云動氣發瘡及痼痰患冷氣人忌用秋後茄發眼疾增本草株髙三四尺葉大如掌自夏至秋開紫花五瓣相連五稜如縷黃蘂緑蒂蒂包其茄茄中有瓤瓤中有子子如脂麻有團如栝樓者有長四五寸者彚考增南史蔡樽傳樽為吳興太守不飲郡井齋前自種白莧紫茄以為常餌詔褒其清嶺表録異交嶺茄樹經冬不凋有二三年漸成大樹者其實如瓜也拾遺記淇漳之鱧脯以青茄原水經注石頭對西蔡浦長百里上有大荻浦下有茄子浦酉陽雜俎有新羅種色稍白形如雞卵西眀寺僧造玄院中有其種增酉陽雜俎茄子本蓮莖名革遐反今呼茄未知所自成式因就節下食有茄子數蒂偶問張周封故事張云一名落蘇事具本草嶺南茄子宿根成樹高五六尺姚向曽為南選使親見之真臘風土記蔬菜有蔥芥韭茄瓜西瓜王瓜瓜茄正月間即有之茄樹有經數年不除者容齋隨筆浙西常茄皆皮紫其白者為水茄江西常茄皆皮白其紫為水茄亦一異也集藻頌原宋張舜民茄子頌身纍百贅頸附千疣採之不勤茹之頗柔五言律詩增明董其昌詠紫茄五首何物崑崙種曽經御苑題似葵能衛足非李亦成蹊落實尋常味攀條徑寸低玉盤如可薦寧復悵雲泥欲辨嘉蔬種應同藿食人纍垂貪結子低矮巧藏身被壠千苞赤連畦萬顆勻清齋頻擷取老圃未生嗔纂纂稱天茁芊芊見土毛知非豐嵗寶聊佐腐儒叨落處寧為瓠投來頗似桃米家圗矮樹怪爾矗雲高卑棲性所便尺五即為天每帶胭脂色來登玳瑁筵江蓴下豉美蒟醬點庖鮮能誤青鞋客忙趨過邵田不敢怨無詩秋當詠菊時封關丸可弄覆餗印何纍槐國分陰近僬僥假蓋遲誰知謙吉意更好助觀頤五言絶句增眀吳寬題畫茄種茄糞壤中地力亦易竭厥狀雖不同難將味分别七言絶句原宋黃庭堅謝楊履道送銀茄四首藜藿盤中生精神珍蔬長蒂色勝銀朝來鹽醯飽滋味已覺瓜瓠謾輪囷君家水茄白銀色殊勝埧裏紫彭亨蜀人生疏不下著君與北人俱眼眀白金作顆非椎成中有萬粟嚼輕氷戎州夏畦少蔬供感君來飯在家僧畦丁收盡垂露實葉底猶藏十二三待得銀包已成榖更當乞種過江南增鄭安曉青紫皮膚類宰官光圎頭腦作僧看如何緇俗偏同嗜入口原來總一般元錢選題秋茄圗憶昔毗山愛寫生瓜茄任我筆縱橫自憐老去翻成拙學圃今猶學不成眀陳憲章答送茄瓜兩頭肥緑壓肩斜五月江園始送瓜童子近前與翁語小籃瓜底是新茄同將形色委人間竊比髙松一鶴間口腹纍人都未免茄瓜籃裏又詩還詩散句增梁沈約紫茄紛爛熳唐栁宗元珍蔬折五茄元方回茄藤宜硬地宋張耒映葉乳茄濃黛抹别録增白獺髓趙希倉倅紹興日令庖人造燥子茄子欲書判食單問廳吏茄字吏曰草頭下著加即援筆書草下用家字乃蒙字郡人目曰燥子蒙原種植二月下子須肥熟地常澆灌之俟四五葉帶土移栽相離尺許根宜築實虗則風入難活區土不宜有浮土恐雨濺泥汚葉則萎而不茂宜天晴栽鋤治培壅功不可缺王氏農書茄視他菜最耐久供膳之餘糟鹽豉醋無所不宜須廣種之務本新書茄開花斟酌窠數削去枝葉再長晚茄老圃常談種茄二十科糞壅得所可供一人食增種樹書種茄子時初見根處擘開納硫黃一星以泥培之結子倍多其大如盞味甘而益人茄著五葉因雨栽之原收種九月黃熟時摘取擘四瓣或六瓣曬極乾懸之房內或向陽處勿浥濕臨種時水泡取子淘淨去其浮者製用糖醋茄新嫩茄切三角沸湯煠過粗布包壓乾鹽醋醃一宿曬乾薑陳皮蒔蘿茴香紫蘇為末拌勻煎滚糖醋澆曬乾收貯用時以湯泡過香油煠用糟茄天晴日停午摘嫩茄去蒂用沸湯焯過候冷以軟帛拭乾每十斤用鹽二十兩飛過白礬末稱一兩酒糟十斤拌勻入罈泥封久而茄色愈黃透不黑食香茄切小塊每斤用鹽四兩以食香同茄拌勻醃一二日控乾日曬晚復入滷水如此三五次收貯醬茄九月間將好嫩茄去蒂酌量用鹽醃五日去水别用市醬醃五七日其水盡去揩乾曬一日方可入好醬內蒜茄深秋摘下茄去蒂揩淨用常醋一碗水一碗合煎微沸將茄煠過控乾搗蒜并鹽和冷定醋水拌勻納磁罈蝙蝠茄嫩茄切四瓣滚湯煮將熟拓好醬上俟稍鹹取出加椒末麻油入籠蒸香籠內托以厚麵餅盛油芥末茄嫩茄切條不洗曬乾多著油鍋內加鹽炒熟入磁盆內攤冷用乾芥末拌和磁罐收燒茄乾鍋內每油三兩擺去蒂茄十箇盆蓋燒候軟如泥入鹽醬料物麻杏泥拌入蒜尤佳鵪鶉茄嫩者切細縷焯過控乾以鹽醬椒蒔茴橘杏甘草紅豆研細末拌曬蒸收用時以湯泡蘸香油煠用茄大切三片小二片用河水浸半時撈入鍋內加鹽用水煮一滚取出曬至晚仍入原湯再煮一滚留鍋內眀早後煮一滚再曬至晚如前再煮以湯盡為度曬至極乾入罈內收增物類相感志茄子以爐灰藏之可至四五月靈苑方腸風下血用經霜茄連蒂燒存性為末每日空心溫酒服二錢圗經本草腰腳風血積冷筋急拘攣疼痛者取茄子五十斤切洗以水五斗煮取濃汁濾去滓更入小鐺中煎至一升以來即入生粟粉同煎令稀稠得所取出搜和更入麝香硃砂末同丸如梧子大每日用秫米酒送下三十丸近暮再服一月乃瘥附録苦茄增本草陳藏器曰苦茄野生嶺南樹小有刺子塗癰腫根亦可作湯浴主治瘴氣緬茄原滇南雜記緬茄出緬甸大而色紫蒂圎整蠟色者佳今會城絶不可得多以小者於蒂上刻人物鳥獸之形殊殺風景過滇中者多市之而滇中人亦以此贈逺集藻五言絶句增宋劉子翬緬甸實如瓜垂金粲秋色誰刻紫瓊瑶玲瓏投逺客土菌增爾雅中馗菌注地菌也似蓋今江東名為土菌亦曰馗厨可啖本草李時珍曰中馗神名又槌名也此菌若繖其狀如槌及中馗之帽故以名之土菌一名杜菌一名地菌一名菰子一名地雞一名獐頭氣味甘寒陳藏器曰地生者為菌木生者為檽江東人呼為菌凡菌從地中出者皆主瘡疥牛糞上黑菌尤佳若燒灰地上經秋雨生菌重臺者名仙人帽大主血病菌冬春無毒夏秋有毒有蛇蟲從下過也夜中有光者欲爛無蟲者煮之不熟者煮訖照人無影者上有毛下無紋者仰卷赤色者並有毒孟詵曰菌子槐樹上者良野田中者有毒汪頴曰凡煮菌投以薑屑飯粒若色黑者殺人否則無毒又鬼蓋叢生垣墻下旦生暮死一名地蓋一名朝生即今鬼繖一名鬼屋地芩生腐木積草處大雨生蓋黃白色四月采之鬼筆生糞穢處頭如筆紫色名朝生暮落花陳仁玉菌譜合菌生韋羌山寒極雪收春氣欲動土鬆芽活此菌候也菌質外褐色肌理玉潔芳薌韻味一發釜鬵聞百步外蓋菌多種例柔美皆無香獨合菌香與味稱合菌始名舊傅昔嘗上進標以台菌上遙見誤讀因承誤云孟溪山中亦同時産惟菌柄髙無香氣土人以是别于韋羌焉稠膏菌生孟溪山秋中霏雨零露浸釀山膏木腴䔒為菌花戢戢多生山絶頂髙樹杪初如蕊珠圓瑩類輕酥滴乳淺黃白色味尤甘勝已乃傘張大幾掌味頓渝矣春時亦間生不能多稠膏得名土人謂稠木膏液所生耳合菌他邦猶或有之此菌獨此山所産故尤可貴煮法當徐下鼎瀋伺涫沸漉起謹勿七撓撓則涎腥不可食性參和衆味而特全于酒烹齊既調溫厚滑甘或欲致逺則復湯蒸熟貯之瓶罌然其味去出山逺也栗殼菌寒氣至稠膏將盡栗殼色者則其續也松菌生松陰採無時竹菌生竹根味極甘麥菌多生溪邉沙壤鬆土中俗名麥丹菌未詳味殊美絶類北方摩姑玉菌生山中初寒時色潔晳可愛故名玉然作羮微韌俗名寒蒲菌黃菌叢生山中梔鬱黃色俗名黃纘又有名黃豚者性峭硬有味紫菌頳紫色亦山中産俗名紫富菌品為下四季菌生林木中味甘而肌理粗峭不入品鵝膏菌生高山狀類鵝子久乃繖開味殊甘滑不謝稠膏然與杜菌相亂杜菌者生土中俗言毒蜇氣所成食之殺人甚美有惡宜在所黜凡中其毒者必笑解之宜以苦茗雜白礬勻新水併咽之無不立愈潘之恆廣菌譜杉菌出宜州生積年杉木上狀若菌採無時皂角菌生皂樹上不可食香菌香菌生桐栁枳椇木上紫色者名香菌字從草從覃覃延也菌味雋永有覃延之意天花菌即天花菜出五臺山形如松花而大于斗香氣如菌白色食之甚美麻菰菌出東淮北山間埋桑楮本于土中澆以米泔待菰生采之長二三寸本小末大白色柔軟其中空虗狀如未開玉簮花俗名雞足麻菰謂其味狀相似也一種狀如羊肚有蜂窠眼者名羊肚菜雞㙡菌出雲南生沙地間丁菌也髙腳繖頭土人采烘以充方物按通雅作雞堫雲南志謂之雞葼雞以形言葼者飛而斂足之貌説本楊慎或作蟻㙡以其産處下皆蟻穴貴州志云下有蟻若蜂房狀又名蟻奪雷菌出廣西橫州遇雷過即生須疾采之稍遲則腐或老不堪用矣作羮甚美亦如雞㙡之屬其價並珍舵菜即海舶舵上所生菌也亦不多得竹蓐即竹菰也草更生曰蓐得溽濕之氣而成本草作竹肉因其味也生慈竹林夏月逢雨滴汁著地涌出如鹿角白色者可食生苦竹枝上如雞子如肉臠者有大毒又曰竹菰生朽竹根節上狀如木耳或紅白色酉陽雜俎云江淮有竹肉大如彈丸味如白雞即此物也惟苦竹生者有毒雚菌雚當作萑乃蘆葦之屬讀如桓若音觀乃鳥名或以為鸛屎所化非也今渤海蘆葦澤中鹹鹵地往往有之其菌色白輕虛表裏相似與衆菌不同出滄洲秋雨以時乃有之若天旱久霖即稀日乾者良彚考增莊子樂出虗蒸成菌列子朽壤之上有菌芝者生于朝死于晦吕氏春秋和之美者越駱之菌潛夫論中堂生負苞山野生蘭芷負苞朽木菌也博物志江南諸山郡中大樹斷倒者經春夏生菌謂之椹食之有味而忽毒殺人云此物往往自有毒者或云蛇所著之楓樹生者啖之令人笑而不止治之飲水漿即愈酉陽雜俎宋州莆田縣破岡山武宗二年巨石上生菌大如合簣莖及蓋黃白色其下淺紅盡為過僧所食云美倍諸菌開成元年春成式修竹里私第書齋前有枯紫荆數枝蠧折因伐之餘尺許至三年秋枯根上生一菌大如斗下布五足頂黃白兩暈緑垂裙如鵝鞴高尺餘至午色變黑而死焚之氣如麻香成式嘗置香爐於枿臺每念經門生以為善徴後覽諸志怪南齊吳郡褚思莊素奉釋氏眠于渠下短柱是柟木去地四尺餘有節大眀中忽有一物如芝生于節上黃色鮮眀漸漸長數尺數日遂成千佛狀面目爪指及光相衣服莫不完具如金鍱隱起摩之殊軟常以春末生秋末落落時佛形如故但色褐耳至落時其家貯之箱中積五年思莊不復住其下亦無他顯盛闔門夀考思莊父終九十七兄年七十健如壯年雲仙雜記齊文宣帝凌虗宴取香菌以供品味有銅釘菌分絲菌清異録菌菌有一種食之令人得乾笑疾士人戲呼為笑矣乎茅亭夜話淳化中有民支氏于昭覺寺設齋寺僧市野椹有黑而斑者或黃白而赤者為齋食衆僧食訖悉皆吐瀉亦有死者時有醫人急告之曰但掘地作坑以新汲水投坑中攪之澄清名曰地漿每服一小盞不過再三其毒即解當時甚救得人夫菌菌之物皆是草木變化生樹者曰菌生于地者曰菌皆濕氣鬱蒸而生又有生于腐骸毒蛇之上者大而光眀人誤以為靈芝食而速死故書之以警其誤墨客揮犀有菌生于朽木或糞壤上其形如瑞芝潔白可愛夜則有光可以鑑物內觀日疏謝幼貞嗜菌庭中忽生一菌狀如飛鳥沈子玉曰此謂禽芝以處女中單覆之則活煮而食之可數百嵗謝入取中單有鄰女乞火跨之翩然飛去謝但歎恨而已五臺山記山盡豫章之材居僧苦其荒塞斧斤不力在在付之一炬樹故名柴木得雨之後精氣怒生菌如斗壯所云天花者也牧兒得一本輒易一縑居山雜志山中雨後多生菌其一名曰菌凡有數種惟春末最多八月雖有而不時其小者可食山人饜之而城居不多得也樵童得者負以筠籠多售于楓橋市郭人爭買之與珍異等以其非植而有故也荆溪疏竹茹菌也小如錢赤如丹砂生以二月山中所在有之不獨竹下風味極佳當為伊蒲第一集藻序增宋陳仁玉菌譜序芝菌皆氣茁也靈華三秀稱瑞尚矣朝菌晦朔莊生訕之至若儔其食品古則未聞自商山茹芝而五臺天花亦甲羣彚仙居界台栝叢山峻拔仙靈所宫爰産異菌林居巖栖者左右芼之固藜莧之至腴蓴葵之上瑞比或以羞王公登玉食自有此山即有此菌未有此遇也遇不遇無與菌事繄欲盡菌性而究其用第其品作菌譜文賦散句增漢張衡思玄賦咀石菌之流英魏嵇康答難養生論金丹石菌周庾信小園賦連珠細菌長柄寒匏七言古詩增宋楊萬里菌子空山一雨山溜急漂流桂子松花汁土膏鬆暖都滲入蒸出菌花團戢戢戴穿落葉忽起立撥開落葉百數十蠟面黃紫光欲濕酥莖嬌脆手輕拾色如鵝掌味如蜜滑似蓴絲無點澀傘不如笠釘勝笠香留齒牙麝莫及菘羔楮雞避席揖餐玉茹芝當却粒作羮不可疏一日作臘仍堪貯盈笈金朱辨謝崔致君餉天花三年北饌飽羶葷佳蔬頗憶南州味地菜方為九夏珍天花忽從五臺至崔侯胸中散千卷金甌名相傳雲裔愛山亦如謝康樂得此㩦歸豈容易應憐使館久寂寥分餉眀眀見深意堆盤初見瑶草瘦鳴齒稍覺瓊枝脆樹雞濕爛慚叩門桑蛾青黃漫趨市赤城菌子立萬釘今日因君不知貴乖龍耳僅免一割沙門業已通三世偃戈息民未有術雖復加餐祗增愧雲山去此縱不逺口腹何容更相纍報君此詩永為好捧腹一笑萬事置眀史遷菌子詩追和楊廷秀韻松花岡頭雷雨急坡陀流膏漬香汁新泥日蒸氣深入穿苔破蘚釘戢戢如蓋如芝萬玉立紫黃百餘紅間十燕支微勻滑更濕頃筐盛之行且拾天隨杞菊漫苦澀采歸芼之脫巾笠桑蛾楮雞皆不及嫫姑天花當拱揖鹽豉作羮炊玉粒先生飽飯踏曉日更遣樵青行負笈五言律詩增元許有壬沙菌牛羊膏潤足物産借英華帳腳駢遮地釘頭怒戴沙齋厨供玉食毳索出氊車莫作垂涎想家園有莫邪七言律詩增宋蘇軾與參寥師行園中得黃耳菌遣化何時取衆香法筵齋鉢久凄涼寒蔬病甲誰能采落葉空畦半已荒老楮忽生黃耳菌故人兼致白芽薑蕭然放筯東南去又入春山筍蕨鄉五言絶句增宋朱子紫菌誰將紫芝苗種此槎上土便學商山翁風餐謝肥羜白菌聞説閬風苑瓊田産玉芝不收雲表露烹瀹詎相宜七言絶句御製天花靈山過雨萬松青朵朵緗雲摘翠屏玉笈重緘敇飛騎先調六膳進慈寧增眀楊慎沐五華送雞㙡海上天風吹玉芝樵童睡熟不曽知仙人住近華陽洞分得瓊英一兩枝詩散句增宋汪藻戢戢寸玉嫩纍纍萬釘繁中涵煙霞氣外絶沙土䀶下筯極雋永加餐亦平溫程俱驚雷發蒸菌自可當夏鱉蘇軾筍如玉筯椹如簮強飲且為山作主黃庭堅驚雷菌子出萬釘白鵝折掌鱉解甲僧北澗香風薰陶紫芝秀陸地挺特荷錢圓唐王維顧乏釘頭菌劉禹錫橋柱黏黃菌張籍掃窗秋菌落朱慶餘深籬藏白菌皮日休頽簷倒菌黃宋范成大栁菌黏枝住唐元稹菌生香案正當衙韋莊幾處籬懸白菌肥宋王安石濕濕嶺雲生竹菌陸遊黃耳菌生齋鉢富方嶽雷樹生釘肥勝肉元馬祖常九秋雷隱菌收釘别録增三餘贅筆菌生皆陰濕地風味殊美然間有毒食之往往殺人近傳一法煮時和燈心草或以銀簮淬之若燈心草與簮色黑即有毒棄之勿食野􅉡品用朽桑木樟木楠木截成一尺長假臘月掃爛葉擇肥陰地和木埋于深畦如種菜法春月用米泔水澆灌不時菌出逐日灌以三次即大如拳采同素菜炒食作脯俱美木上生者不傷人木耳增本草木耳一名木檽一名木菌一名木㙡一名樹雞一名木蛾曰耳曰蛾象形也曰檽以軟濕者佳也曰雞曰㙡因味似也南楚人謂雞為㙡曰菌猶蜠也亦象形也蜠乃貝子之名或曰地生為菌木生為蛾生朽木之上無枝葉乃濕熱餘氣所生其良毒亦隨木性今貨者亦多雜木惟桑栁楮榆之耳為多桑耳一名桑檽一名桑蛾一名桑雞一名桑黃一名桑臣一名桑上寄生桑檽以下皆軟耳之名桑黃以下皆硬菰之名槐耳一名槐檽一名槐菌一名槐雞一名赤雞一名槐蛾此槐樹上菌也當取堅如桑耳者煮漿粥安槐木上草覆之即生菌榆耳八月采之令人不飢按藜床瀋餘云榆肉榆菌也腴脆無比大者數斤即指此種柘耳一名柘黃楊櫨耳出南山集藻五言絶句增宋朱子木耳蔬腸久自安異味非所誇樹耳黑垂𥅆登盤今亦乍詩散句增宋汪藻溪邊卧枯栁雨餘忽生耳别録增齊民要術作木耳菹法取棗桑榆栁樹邊生尤軟濕者煮五沸去腥汁出置冷水中淨洮又著酢漿水中洗出細縷切訖胡荽蔥白下豉汁漿清及酢調和適口下薑椒末甚滑美附録石耳增本草石耳一名靈芝生天台四眀河南宣州黃山巴西邊徼諸山石崖土逺望如煙廬山亦有之狀如地耳山僧采曝餽逺洗去沙土作茹勝于木耳集藻七言古詩增宋黃庭堅答永新宗令寄石耳飢欲食首山薇渴欲飲潁川水嘉禾令尹清如氷寄我南山石上耳筠籠動浮煙雨姿瀹湯磨沙光陸離竹萌粉餌相發揮芥薑作辛和味宜公庭退食飽下筯杞菊避席遺萍虀鴈門天花不復憶况及桑鵝與楮雞小人藜羮亦易足嘉蔬遣餉荷眷私吾聞石耳之生常在蒼崖之絶壁苔衣石腴風日炙捫蘿挽葛探萬仞側足委骨豺虎宅佩刀買犢劒買牛作民父母今得職閔仲叔不以口腹纍安邑我其敢用鮭菜煩嘉禾願公不復甘此鼎免使射利登嵳峩附録地耳增本草地耳一名地踏菰亦石耳之屬生于地者狀如木耳春夏生雨中雨後亟采之見日即不堪味甘寒無毒主眀目益氣野菜譜地踏菜一名地耳雨後采熟食見日則枯沒化為水嘉樹菜增呂氏春秋餘瞀之南南極之崖有菜其名曰嘉樹其色若碧雞候菜增廣州記生嶺南似艾二月生苗宜雞羮食之故名味辛溫無毒溫中益氣優殿增南方草木狀合浦有菜名優殿以豆醬汁茹食之甚香美可食葙增廣志葙根以為菹香辛買菜增吳志孫皓傳天紀三年有買菜生工人吳平家高四尺厚三分如枇杷形上廣尺八寸下莖廣五寸兩邊生菜緑色東觀按圖名買菜作平慮草遂以平為平慮郎専蹄菜增吳書趙咨使魏魏人曰聞江東有専蹄菜作若為食咨曰當得倉鰷以作羮藝薇增拾遺記咸寧四年立芳蔬園于金墉城東多種異菜有菜名曰藝薇類有三種紫色者最繁味辛其根爛熳春夏葉密秋蘂冬馥其實若珠五色隨時而盛一名藝芝其色紫為上蔬其味辛色黃為中蔬其味甘色青者為下蔬其味醎常以三蔬充御膳其葉可藉飲食以供宗廟祭祀亦止人飢渴宫人採帶其莖葉香氣歷日不歇冬風菜增廣州記冬風菜陸生宜配肉作羮榖菜增字林榖菜生水中荶菜增齊民要術荶菜似蒜生水中菹菜增齊民要術菹菜紫色有藤􅀢菜增齊民要術􅀢菜葉似竹生水旁菜增齊民要術繤菜似蕨藒菜增齊民要術藒菜似蕨生水中葟菜增齊民要術葟菜似蒜生水邉蓶菜增齊民要術蓶菜似烏韭而黃䓠菜增齊民要術䓠菜生水中大葉羞菜增異物志安南有羞菜蔓生水上甘美可食人過池中以手指曰爾羞否即時憔悴待其人去漸青如初佛土菜增唐書西域傳貞觀二十一年有健達王獻佛土菜莖五葉赤華紫鬚孟娘菜增酉陽雜俎江淮有孟娘菜益肉食真珠菜增益部方物略記真珠菜戎瀘等州有之生水中石上翠縷纎曼首貫珠蜀人以蜜熬食之或以醯煮可致數千里不壞也黃山志真珠菜藤本蔓生暮春發芽每芽端綴一二蘂圓白如珠葉脆緑如茶連蘂葉臘之香甘鮮滑他蔬讓美集藻贊增宋宋祁真珠菜贊植根水中端若串珠皿而瀹之可以代蔬雪裏蕻增野菜箋四眀有菜名雪裏蕻雪深諸菜凍損此菜獨青白鼓釘增野菜譜白鼓釘一名蒲公英一名耩耨草一名金簮草一名黃花地丁四時皆有惟極寒天小而可用採之熟食翦刀股增野菜譜翦刀股春採生食兼可作虀豬殃殃增野菜譜豬殃殃豬食之則病故名春採熟食絲蕎蕎增野菜譜絲蕎蕎二三月採熟食四月結角不用牛塘利增野菜譜牛塘利二三月採熟食亦可作虀浮薔增野菜譜浮薔入夏生水中六七月採生熟皆可食水菜增野菜譜水菜秋生水田狀類白菜熟食看麥娘增野菜譜看麥娘隨麥生隴上因名春採可熟食狗腳迹增野菜譜狗腳迹生霜降時葉如狗印故名熟食破破衲增野菜譜破破衲臘月便生正二月採熟食三月老不堪用燕子不來香增野菜譜燕子不來香早春採可熟食燕來時則腥不堪食故名猢猻腳迹增野菜譜猢猻腳迹以形似名三月採之熟食眼子菜增野菜譜眼子菜六七月採生水澤中青葉背紫色莖柔滑而細長可數尺熟食貓耳朵增野菜譜貓耳朵正二月採搗爛和粉麵作餅蒸食之籓籬頭增野菜譜籓籬頭臘月採熟食入春不宜用鴈腸子增野菜譜二月生如豆牙菜熟食之生亦可食野籬落增野菜譜野籬落正二月採頭湯焯過可食羊耳禿增野菜譜羊耳禿二三月採熟食黃花菜增野菜譜黃花菜一名黃瓜菜正二月採熟食油灼灼增野菜譜油灼灼生水邊葉光澤生熟皆可食又可作乾菜食燈蛾兒增野菜譜燈蛾兒二月採熟食芽兒拳增野菜譜芽兒拳正二月採熟食板蕎蕎增野菜譜板蕎蕎正二月和根採之炊食三四月結角不堪用天藕兒增野菜譜天藕兒根如藕而小熟食秸葉不可食老鸛筋增野菜譜老鸛筋二月採之熟食亦可作虀鵝觀草增野菜譜鵝觀草正二月如麥青炊食牛尾瘟增野菜譜牛尾瘟牛食之則病生深水中葉如髮莖如藻冬月和魚煮食夏秋亦可食之兔絲根與藥譜絲名同物異增野菜譜絲根一名絲苗春採苗葉秋冬採根蒸食味甘多食令人眩暈草鞋片增野菜譜草鞋片二三月採熟食抓抓兒增野菜譜抓抓兒秋深採之日乾和榖煮食如粉清香可愛雀舌草增野菜譜雀舌草以形似得名初生時採熟食羅漢菜增一統志羅漢菜出江西南昌府西山葉如豆苗因靈觀尊者自西山持至故名湖廣蘄州二角山亦有之舊傳有異僧所種若雜葷物即無味根子菜增一統志根子菜根似蔓青而大似蘿蔔俗呼根子菜他處皆無惟湖廣安陸縣有之龍芽菜增盛京志龍芽菜有二種樹龍芽葉似椿而大採其初生者可食有地龍芽葉亦相似杏葉菜增盛京志杏葉菜葉似杏山蔬之可食者歪脖菜增盛京志歪脖菜似杏葉菜而大葉圓其梗至頂稍彎故名亦山蔬之美者龍巔菜增峩睂山志龍巔菜似椿樹頭有刺似白芥菜滿山自生九老洞者尤佳髙河菜增雲南志高河菜出大理府點蒼山高河中莖紅葉緑味甚辛辣五六月採之若髙聲則雲霧驟起風雨卒至蓋髙河乃龍湫也蓮花菜增雲南志蓮花菜出大理府洱河東上滄湖相傳蒙詔時觀音大士化箭鏃所成御定佩文齋廣羣芳譜卷十七
