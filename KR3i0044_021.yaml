body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷十九茶譜茶二集藻表增唐栁宗元為武中丞謝賜新茶表臣某言中使竇某至奉宣旨賜臣新茶一斤者天眷忽臨時珍俯及捧戴驚抃以喜以惶臣以無能謬司邦憲大眀首出得親仰於雲霄渥澤遂行忽先霑於草木况兹靈味成自遐方照臨而甲拆惟新煦嫗而芬芳可襲調六氣而成美扶萬夀以效珍豈可賤微膺此殊錫銜恩敢同於嘗酒滌慮方切於飲冰撫事循涯隕越無地劉禹錫代武中丞謝新茶表臣某言中使某奉宣聖旨賜臣新茶一斤猥沐深恩再霑殊賜承旨慶抃省躬慚惶伏以貢自外方珍殊衆品效參藥石芳越椒蘭出自仙厨俯頒私室義同推食空荷於曲成責在素餐實慙於虛受又臣某言中使竇國晏奉宣聖旨賜臣新茶一斤猥降王人光臨私室恭承慶賜跪啓緘封伏以方隅入貢採擷至珍自逺奉來以新為貴捧而觀妙飲以滌煩顧蘭露而慙芳豈柘漿而齊味既榮凡口倍切丹心韓翃為田神玉謝茶表臣某言中使至伏奉手詔賜臣茶一千五百串令臣分給將士以下聖慈曲被戴荷無階臣智謝理戎功慙蕩冦前恩未報厚賜仍加念以炎蒸恤其暴露榮分紫笋寵降朱宫味足蠲邪助其正直香堪愈病沃以勤勞飲德相歡撫心是荷前朝饗士往典犒軍皆是循常非關特達顧惟何幸忽被殊私吳主禮賢方聞置茗晉臣愛客才有分茶豈如澤被三軍仁加千乘以欣以忭感戴無階宋丁謂進新茶表右件物産異金沙名非紫筍江邊地暖方呈彼茁之形闕下春寒已發其甘之味有以少為貴者焉敢韞而藏諸見謂新茶蓋遵舊例啓增宋楊萬里謝傅尚書惠茶啓逺餉新茗當自擕大瓢走汲溪泉束澗底之散薪燃折腳之石鼎烹玉塵啜香乳以享天上故人之意愧無胸中之書傳但一味攪破茶園耳序增唐吕溫三月三日茶宴序三月三日上已禊飲之日也諸子議以茶酌而代焉乃撥花砌愛庭隂清風逐人日色留興卧借青靄坐攀香枝間鶯近席而未飛紅蘂拂衣而不散乃命酌香沫浮素杯殷凝琥珀之色不令人醉微覺清思雖五雲仙漿無復加也皮日休茶中雜詠序按周禮酒正之職辨四飲之物其三曰漿又漿人之職供王之六飲水漿醴涼醫酏入於酒府鄭司農云以水和酒也蓋當時人率以酒醴為飲謂乎六漿酒之醨者也何得姬公製爾雅云檟苦荼即不擷而飲之豈聖人之純於用乎亦草木之濟人取舍有時也自周以降及於國朝茶事竟陵子陸季疵言之詳矣然季疵以前稱茗飲者必渾以烹之與夫瀹蔬而啜者無異也季疵始為經三卷由是分其源制其具教其造設其器命其煮飲之者除痟而去癘雖疾醫之不若也其為利也於人豈小哉余始得季疵書以為備矣後又獲其顧渚山記二篇其中多茶事後又太原溫從雲武威段􅀈之各補茶事十數節並存於方册茶之事由周至今竟無纖遺矣昔晉杜育有荈賦季疵有茶歌余缺然於懷者謂有其具而不形於詩亦季疵之餘恨也遂為十詠寄天隨子宋徽宗大觀茶論序嘗謂首地而倒生所以供人求者其類不一穀粟之於飢絲枲之於寒雖庸人孺子皆知常須而日用不以時歲之舒迫而可以廢興也至若茶之為物擅甌閩之秀氣鍾山川之靈稟袪襟滌滯致清導和則非庸人孺子可得而知矣沖淡間潔韻髙致靜則非皇遽之時可得而好尚矣本朝之興歲修建溪之貢龍團鳯餅名冠天下而壑源之品亦自此而盛延及於今百廢俱舉海內晏然垂拱密勿幸致無為縉紳之士韋布之流沐浴膏澤薰陶德化以雅尚相推從事茗飲故近歲以來采擇之精製作之工品第之勝烹點之妙莫不咸造其極且物之興廢固自有時然亦係乎時之汙隆時或皇遽人懷勞瘁則向所謂常須而日用猶且汲汲營求惟恐不獲飲茶何暇議哉世既纍洽人恬物熙則常須而日用者固久厭飫狼籍而天下之士勵志清白競為間暇修索之玩莫不碎玉鏘金啜英咀華較筐篋之精爭鑒裁之别雖下士於此時不以蓄茶為羞可謂盛世之清尚也嗚呼至治之世豈惟人得以盡其材而草木之靈者亦得以盡其用矣偶因暇日研究精微所得之妙後人有不自知為利害者敘本末列於二十篇號曰茶論蔡襄進茶録序臣前因奏事伏蒙陛下諭臣先任福建轉運使日所進上品龍茶最為精好臣退念草木之微首辱陛下知鑒若處之得地則能盡其材昔陸羽茶經不第建安之品丁謂茶圖獨論採造之本至於烹試曾未聞有臣輒條數事簡而易眀勒成二篇名曰茶録伏惟清間之晏或賜觀採臣不勝惶懼榮幸之至謹序原歐陽修龍茶録後序茶為物之至精而小團又其精者録序所謂上品龍茶者是也蓋自君謨始造而歲貢焉仁宗尤所珍惜雖輔相之臣未嘗輒賜惟南郊大禮致齋之夕中書樞密院各四人共賜一餅宫人翦金為龍鳯花草貼其上兩府八家分割以歸不敢碾試相家藏以為寶時有佳客出而傳玩爾至嘉祐七年親享眀堂齋夕始人賜一餅余亦忝預至今藏之余自以諫官供奉仗內至登二府二十餘年才一獲賜因君謨著録輒附於後庶知小團自君謨始而可貴如此增朱子安東溪試茶録序隄首七閩山川特異峻極回環勢絶如甌其陽多銀銅其隂孕鉛鐵厥土赤墳厥植惟茶會建而上羣峰益秀迎抱相向草木叢條水多黃金茶生其間氣味殊美豈非山川重復土地秀粹之氣鍾於是而物得以宜歟北苑西距建安之洄溪二十里而近東至東宮百里而遙過洄溪踰東宮則僅能成餅耳獨北苑連屬諸山者最勝北苑前枕溪流北涉數里茶皆氣弇然色濁味尤薄惡况其逺者乎亦猶橘過淮為枳也近蔡公作茶録亦云隔溪諸山雖及時加意製造色味皆重矣今北苑焙風氣亦殊先春朝隮常雨霽則霧露昏蒸晝午猶寒故茶宜之茶宜髙山之隂而喜日陽之早自北苑鳯山南直苦竹園頭東南屬張坑頭皆髙逺先陽處歲發常早芽極肥乳非民間所比次出壑源嶺髙土沃地茶味甲於諸焙丁謂亦云鳯山髙不百丈無危峰絶崦而岡阜環抱氣勢柔秀宜乎嘉植靈卉之所發也又以建安茶品甲於天下疑山川至靈之卉天地始和之氣盡此茶矣又論石乳出壑嶺斷崖缺石之間蓋草木之仙骨丁謂之記録建溪茶事詳備矣至於品載止云北苑壑源嶺及總記官私諸焙千三百三十六耳近蔡公亦云唯北苑鳯凰山連屬諸焙所産者味佳故四方以建茶為目皆曰北苑建人以近山所得故謂之壑源好者亦取壑源口南諸葉皆云彌珍絶傳致之間識者以色味品第反以壑源為疑今書所異者從二公紀土地勝絶之目具疏園隴百名之異香味精粗之别庶知茶於草木為靈最矣去畝步之間别移其性又以佛嶺葉源沙溪附見以質二焙之美故曰東溪試茶録自東宮西溪南焙北苑皆不足品第今略而不論黃儒品茶要録序説者常怪陸羽茶經不第建安之品蓋前此茶事未甚興靈芽真笋往往委翳消腐而人不知惜自國初以來士大夫沐浴膏澤詠歌升平之日久矣夫身世灑落神觀沖淡惟兹茗飲為可喜園林亦相與摘英誇異制棬鬻新而趨時之好故殊異之品始得自出於蓁莽之間而其名遂冠天下借使陸羽復起閲其金餅味其雲腴當爽然自失矣因念草木之材一有負瓌偉詭特者未嘗不遇時而後興况於人乎然士大夫間為珍藏精試之具非尚雅好真未嘗輒出其好事者又常論其采制之出入器用之宜否較試之湯火圖於縑素傳玩於時獨未有補於賞鑒之眀耳蓋園民射利膏油其面色品味易辨而難詳豫因閲收之暇為原采造之得失較試之低昂次為十説以中其病題曰品茶要録云葉清臣煮茶小品序夫渭黍汾麻泉源之異稟江橘淮枳土地之或遷誠物類之有宜亦臭味之相感也若乃擷華掇秀多識草木之名激濁揚清能辨淄澠之品斯固好事之嘉尚博識之精鑒自非笑傲塵表逍遙林下樂追王濛之約不讓陸納之風其孰能與於此乎吳楚山谷間氣清地靈草木穎挺多孕茶荈為人採拾大率右於武夷者為白乳甲於吳興者為紫筍産禹穴者以天章顯茂錢塘者以徑山稀至於桐廬之巖雲衡之麓鴉山著於吳歙蒙頂傳於岷蜀角立差勝毛舉實繁然而天賦尤異性靡俗諳茍制非其妙烹失於術雖先雷而籯未雨而簷蒸焙以圖造作以經而泉不香水不甘㸑之揚之若淤若滓豫少得溫氏所著茶説嘗識其水泉之目有二十焉會西走巴峽經蝦蟇窟憩蕪城汲蜀岡井東遊故郡經揚子江留丹陽酌觀音泉過無錫㪺慧山水粉槍牙旗蘇蘭薪桂且鼎且缶以飲以啜莫不瀹氣滌慮蠲病析酲袪鄙吝之生心招神眀而達觀信乎物類之宜得臭味之所感幽人之佳尚前賢之精鑒不可及已噫紫華緑英均一水也皆忘情於庶彚或求伸於知己不然者叢薄之莽溝瀆之流亦奚以異哉逰鹿故宮依蓮盛府一命受職再期服勞而虎丘之觱沸松江之清泚復在在封畛居然挹注是嘗所得於鴻漸之目二十而七也昔酈元善於水經而未嘗知茶王肅癖於茗飲而言不及水表是二美吾無愧焉凡泉二十列於右幅且使盡神方之四兩遂成其功代酒限於七升無忘真賞云傳原宋蘇軾葉嘉傳葉嘉閩人也其先處上谷曽祖茂先養髙不仕好遊名山至武夷恱之遂家焉嘗曰吾植功種德不為時採然遺香後世吾子孫必盛於中土當飲其惠矣茂先葬郝源子孫遂為郝源民至嘉少植節操或勸之業武曰吾當為天下英武之精一槍一旗豈吾事哉因而遊見陸先生先生竒之為著其行録傳於世方漢帝嗜閲經史時建安人為謁者侍上上讀其行録而善之曰吾獨不得與此人同時哉曰臣邑人葉嘉風味恬淡清白可愛頗負其名有濟世之才雖羽知猶未詳也上驚敕建安太守召嘉給傳遣詣京師郡守始令採訪嘉所在命齎書示之嘉未就遣使臣督促郡守曰葉先生方閉門制作研味經史志圖挺立必不屑進未可促之親至山中為之勸駕始行登車遇相者揖之曰先生容質異常矯然有龍鳯之姿後當大貴嘉以皂囊上封事天子見之曰吾久飫卿名但未知其實耳我其試哉因顧謂侍臣曰視嘉容貌如鐵資質剛徑難以遽用必槌提頓挫之乃可遂以言恐嘉曰砧斧在前鼎鑊在後將以烹子子視之如何嘉勃然吐氣曰臣山藪猥士幸惟陛下採擇至此可以利主雖粉身碎骨臣不辭也上笑命以名曹處之又加樞要之務焉因誡小黃門監之有頃報曰嘉之所為猶若粗疏然上曰吾知其才苐以獨學未經師耳嘉為之屑屑就師頃刻就事已精熟矣上乃敕御史歐陽髙金紫光祿大夫鄭當時甘泉侯陳平三人與之同事歐陽嫉嘉初進有寵曰吾屬且為之下矣計欲傾之會天子御延英促召四人歐但熱中而已當時以足擊嘉而平亦以口侵凌之嘉雖見侮為之起立顔色不變歐陽悔曰陛下以葉嘉見托吾輩亦不可忽之也因同見帝陽稱嘉美而隂以輕浮訿之嘉亦訴於上上為責歐陽憐嘉視其顔色久之曰葉嘉真清白之士也其氣飄然若浮雲矣遂引而宴之少選間上鼓舌欣然曰始吾見嘉未甚好也久味之殊令人愛朕之精魄不覺灑然而醒書曰啓乃心沃朕心嘉之謂也於是封嘉為巨合侯位尚書曰尚書朕喉舌之任也由是寵愛日加朝廷賓客遇會宴享未始不推於嘉上日引對至於再三後因侍宴苑中上飲踰度嘉輒苦諫上不恱曰卿司朕喉舌而以苦辭逆我我豈堪哉遂唾之命左右仆於地嘉正色曰陛下必欲甘辭利口然後愛耶臣言雖苦久則有效陛下亦嘗試之豈不知乎上顧左右曰始吾言嘉剛徑難用今果見矣因含容之然亦以是疏嘉嘉既不得志退去閩中既而曰吾末如之何也已矣上以不見嘉月餘勞於萬幾神薾思困頗思嘉因命召至喜甚以手撫嘉曰吾渴見卿久也遂恩遇如故上方欲以兵革為事而大司農奏計國用不足上深患之以問嘉嘉為進三策其一曰𣙜天下之利山海之資一切籍於縣官行之一年財用豐贍上大恱兵興有功而還上利其財故𣙜法不罷管山海之利自嘉始也居一年嘉告老上曰巨合侯其忠可謂盡矣遂得爵其子又令郡守擇其宗支之良者每歲貢焉嘉子二人長曰摶有父風襲爵次曰挺抱黃白之術比於摶其志尤淡泊也嘗散其資拯鄉閭之困人皆德之故鄉人以春伐鼓大會山中求之以為常贊曰今葉氏散居天下皆不喜城邑惟樂山居氏於閩中者蓋嘉之苗裔也天下葉氏雖夥然風味德馨為世所貴皆不及閩閩之居者又多而郝源之族為甲嘉以布衣遇天子爵徹侯位八座可謂榮矣然其正色苦諫竭力許國不為身計蓋有以取之夫先王用於國有節取於民有制至於山林川澤之利一切與民嘉為策以𣙜之雖救一時之急非先王之舉也君子譏之或云管山海之利始於鹽鐵丞孔僅桑𢎞羊之謀也嘉之策未行於時至唐趙贊始舉而用之記增宋唐庚鬭茶記政和二年三月壬戌二三君子相與鬬茶於寄傲齋豫為取龍塘水烹之而第其品以某為上某次之某閩人其所賫宜尤髙而又次之然大較皆精絶蓋嘗以為天下之物有宜得而不得不宜得而得之者富貴有力之人或有所不能致而貧賤窮厄流離遷徙之中或偶然獲焉所謂尺有所短寸有所長良不虛也唐相李衛公好飲惠山泉置驛傳送不逺數千里而近世歐陽少師作龍茶録序稱嘉祐七年親享眀堂致齋之夕始以小團分賜二府人給一餅不敢碾試至今藏之時熙寧元年也吾聞茶不問團銙要之貴新水不問江井要之貴活千里致水真偽固不可知就令識真已非活水自嘉祐七年壬寅至熙寧元年戊申首尾七年更閲三朝而賜茶猶在此豈復有茶也哉今吾提瓶支龍塘無數十步此水宜茶昔人以為不減清逺峽而海道趨建安不數日可至故每歲新茶不過三月至矣罪戾之餘上寬不誅得與諸公從容談笑於此汲泉煮茗取一時之適雖在田野孰與烹數千里之泉澆七年之賜茗也哉此非我君之力歟夫耕鑿食息終日蒙福而不知為之者直愚民耳豈我輩謂耶是宜有所紀述以無忘在上者之澤云元楊維楨煮茶夢記鐵龍道人卧石牀移二更月微眀及紙帳梅影亦及半窗鶴孤立不鳴命小藝童汲白蓮泉燃稿湘竹授以凌霄芽為飲供道人乃逰心太虛雍雍涼涼若鴻濛若皇芒會天地之未生適隂陽之若亡恍兮不知入夢遂坐清真銀暉之堂堂上香雲簾拂地中著紫桂榻緑璚几看太初易一集集內悉星斗文煥曄爚熠金流玉錯莫列爻畫若煙雲日月交麗乎中天歘玉露涼月冷如氷入齒者易刻因作太虛吟吟曰道無形兮兆無聲妙無心兮一以貞百象斯融兮太虛以清歌已光飇起林末激華氛郁郁霏霏絢爛淫艷乃有扈緑衣若仙子者從容來謁云名淡香小字緑花乃捧太玄杯酌太清神眀之醴以夀豫侑以詞曰心不行神不行無為而萬化清夀畢紓徐而退復令小玉環侍筆牘遂書歌遺之曰道可受兮不可傳天無形兮四時以言妙乎天兮天之先天天之先復何仙移間白雲微消緑衣化煙月反眀豫內間豫亦寤矣遂冥神合玄月光尚隱隱於梅花間小藝呼曰凌霄芽熟矣賦增晉杜育荈賦靈山維嶽竒産所鍾厥生荈草彌谷被岡承豐壤之滋潤受甘霖之霄降月惟初秋農功少休結偶同旅是采是求水則氓方之注挹彼清流器澤陶簡出自東隅酌之以匏取式公劉惟兹初成沫沈華浮煥如積雪曄若春敷唐顧况茶賦稽天地之不平兮蘭何為兮早秀菊何為兮遲榮皇天既孕此靈物兮厚地復糅之而萌惜下國之偏多嗟上林之不志如羅玳筵展瑶席凝藻思開靈液賜名臣留上客谷鶯囀宮女嚬泛濃華潄芳津出恆品先衆珍君門九重聖夀萬春此茶上逹於天子也滋飯蔬之精素攻肉食之羶膩發當暑之清吟滌通宵之昏寐杏樹桃花之深洞竹林草堂之古寺乘槎海上來飛錫雲中至此茶下被於幽人也雅曰不知我者謂我何求可憐翠澗隂中有泉流舒鐵如金之鼎越泥似玉之甌輕煙細珠靄然浮爽氣淡淡風雨秋夢裏還錢懷中贈橘雖神祕而焉求宋吳淑茶賦夫其滌煩療渴換骨輕身茶荈之利其功若神則有渠江薄片西山白露雲垂緑腳香浮碧乳挹此霜華却兹煩暑清文既傳於杜育精思亦聞於陸羽若夫擷此臯盧烹兹苦荼桐君之録尤重仙人之掌難踰豫章之嘉甘露王肅之貪酪奴待槍旗而採摘對鼎䥶以吹噓則有療彼斛瘕困兹水厄擢彼隂林得於爛石先火而造乘雷以摘吳主之憂韋曜先沐殊恩陸納之待謝安誠彰儉德别有産於玉壘造彼金沙三等為號五出成花早春之來賔化橫紋之出陽坡復聞灉湖含膏之作龍安騎火之名柏巖兮鶴嶺鳩坑兮鳯亭嘉雀舌之纎嫩玩蟬翼之輕盈冬芽早秀麥顆先成或重西園之價或侔團月之形並眀目而益思豈瘠氣而侵精又有蜀岡牛嶺洪雅烏程碧澗紀號紫筍為稱陟仙崖而花墜服丹丘而翼生至於飛自獄中煎於竹裏效在不眠功存恱志或言詩為報或以錢見遺復云葉如梔子花若薔薇輕飇浮雲之美霜笴竹籜之差唯芳茗之為用蓋飲食之所資梅堯臣南有嘉茗賦南有山原兮不鑿不營乃産嘉茗兮囂此衆氓土膏脈動兮雷始發聲萬木之氣未通兮此已吐乎纎萌一之日雀舌露掇而製之以奉乎王庭二之日烏喙長擷而焙之以備乎公卿三之日槍旗聳搴而炕之將求乎利嬴四之日嫩莖茂團而範之來充乎賦征當此時也女廢蠶織男廢農耕夜不得息晝不得停取之由一葉而至一掬輸之若百谷之赴巨溟華夷蠻貊固日飲而無厭富貴貧賤不時啜而不寧所以小民冒險而競鬻孰謂峻法之與嚴刑嗚呼古者聖人為之絲枲絺綌而民始衣播之禾牟菽粟而民不飢畜之牛羊犬豕而甘脆不遺調之辛酸醎苦而五味適宜造之酒醴而宴饗之樹之果蔬而薦羞之於兹可謂備矣何彼茗無一勝焉而競進於今之時抑非近世之人體惰不勤飽食粱肉坐以生疾藉以靈荈而消腑胃之宿陳若然則斯茗也不得不謂之無益於爾身無功於爾民也哉原黃庭堅煎茶賦洶洶乎如澗松之發清吹皓皓乎如春空之行白雲賓主欲眠而同味水茗相投而不渾苦口利病解膠滌昏未嘗一日不放箸而策茗碗之勳者也豫嘗為嗣直瀹茗因録其滌煩破睡之功為之甲乙建溪如割雙井如􅂒日注如絶其餘苦則辛螫甘則底滯嘔酸寒胃令人失睡亦未足與議或曰無甚髙論敢問其次涪翁曰味江之羅山嚴道之蒙頂黔陽之都濡髙洙瀘川之納溪梅嶺夷陵之壓磚臨卬之火井不得已而去於三則六者亦可以酌兔褐之甌瀹魚眼之鼎者也或者又曰寒中瘠氣莫甚於茶或濟之鹽勾賊破家滑竅走水又况雞蘇之與胡麻涪翁於是酌岐雷之醪醴參伊聖之湯液斫附子如博投以熬葛仙之堊去藙而用鹽去橘而用薑不奪茗味而佐以草石之良所以固太倉而堅作強於是有胡桃松實菴摩鴨腳勃賀蘼蕪水蘇甘蘜既加臭味亦厚賔客前四後四各用其一少則美多則惡發揮其精神又益於咀嚼蓋大匠無可棄之材太平非一士之略厥初貪味雋永速化湯餅乃至中夜不眠耿耿既作溫劑殊可屢歃如以六經濟三尺法雖有除治與人安樂賔至則煎去則就榻不逰軒后之華胥則化莊周之蝴蝶四言古詩原眀陳繼儒試茶綺隂攢蓋靈草試竒竹爐幽討松火怒飛水交以淡茗戰而肥緑香滿路永日忘歸五言古詩增唐李白答族姪僧中孚贈玉泉仙人掌茶并序余聞荆州玉泉寺近清溪諸山山洞往往有乳窟窟中多玉泉交流其中有白蝙蝠大如鴉按仙經蝙蝠一名仙鼠千歲之後體白如雪栖則倒懸蓋飲乳水而長生也其水邊處處有茗草羅生枝葉如碧玉唯玉泉真公常采而飲之年八十餘歲顔色如桃花而此茗清香滑熟異於他者所以能還童振枯扶人夀也余逰金陵見宗僧中孚示余茶數十片拳然重疊其狀如手號為仙人掌茶蓋新出乎玉泉之山曠古未覿因持之見遺兼贈詩要余答之遂有此作後有髙僧大隱知仙人掌茶發乎中孚禪子及青蓮居士李白也嘗聞玉泉山山洞多乳窟仙鼠如白鴉倒懸清溪月茗生此中石玉泉流不歇根柯灑芳津採服潤肌骨叢老卷緑葉枝枝相接連曝成仙人掌似拍洪崖肩舉世未見之其名定誰傳宗英乃禪伯投贈有佳篇清鏡燭無鹽顧慙西子姸朝坐有餘興長吟播諸天韋應物喜園中茶生潔性不可汚為飲滌塵煩此物信靈味本自出山原聊因理郡餘率爾植荒園喜隨衆草長得與幽人言栁宗元巽上人以竹間自採新茶見贈酬之以詩芳叢翳湘竹零露凝清華復見雪山客晨朝掇靈芽蒸煙俯石瀨咫尺凌丹崖圎方麗竒色圭璧無纎瑕呼兒㸑金鼎餘馥延幽遐滌慮發真照還原蕩昏邪猶同甘露飯佛事薰毗耶咄此蓬瀛侶無乃貴流霞孟郊慿周况先輩於朝賢乞茶道意勿乏味心緒病無悰蒙茗玉花盡越甌荷葉空錦水有鮮色蜀山饒芳叢雲根才翦緑印縫已霏紅曽向貴人得最將詩叟同幸為乞寄來救此病劣躬劉言史與孟郊洛北野泉上煎茶粉細越筍芽野煎寒溪濵恐乖靈草性觴事皆手親敲石取鮮火撇泉避腥鱗熒熒㸑風鐺拾得墜巢薪潔色既爽别浮氲亦殷勤以兹委曲靜求得正味真宛如摘山時自啜指下春湘瓷泛輕花滌盡昏渴神此逰愜醒趣可以話髙人白居易睡後茶興憶楊同州昨晚飲太多嵬峩連宵醉今朝餐又飽爛熳移時睡睡足摩挲眼眼前無一事信腳繞池行偶然得幽致婆娑緑隂樹斑駁青苔地此處置繩牀傍邉洗茶器白瓷甌甚潔紅爐炭方熾沫下麴塵香花浮魚眼沸盛來有佳色咽罷餘芳氣不見楊慕巢誰人知此味李羣玉龍山人惠石廩茶客有衡嶽隱遺豫石廪茶自云凌煙露採掇春山芽圭璧相壓疊積芳莫能加碾成黃金粉輕嫩如松花紅爐㸑霜枝越兒斟丹華灘聲起魚眼滿鼎漂清霞凝澄坐曉燈痛眼如蒙紗甌拂昏寐襟鬲開煩拿顧渚與方山誰人留品差持甌默吟詠搖膝空咨嗟皮日休茶塢間尋堯氏山遂入深深塢種荈已成園栽葭寧計畝石窪泉似掬巖罅雲如縷好是夏初時白花滿煙雨茶人生於顧渚山老在漫石塢語氣為茶荈衣香是煙霧庭從􅬎子遮果任獳師虜日晚相笑歸腰間佩輕簍茶笋褎然三五寸生必依巖洞寒恐結紅鉛暖疑銷紫汞圎如玉軸光脆似瓊英凍每為遇之疏南山挂幽夢茶籝筤篣曉攜去驀箇山桑塢開時送紫茗負處沾清露歇把傍雲泉歸將挂煙樹滿此是生涯黃金何足數茶舍陽崖枕白屋幾口嬉嬉活棚上汲紅泉焙前蒸紫蕨乃翁研茗後中婦拍茶歇相向掩柴扉清香滿山月茶竈南山茶事動竈起巖根傍水煮石髮氣薪然杉脂香青瓊蒸後凝緑髓炊來光如何重辛苦一一輸膏粱茶焙鑿彼碧巖下恰應深二尺泥易帶雲根燒難礙石脈初能燥金餅漸見乾瓊液九里共杉林相望在山側茶鼎龍舒有良匠鑄此佳樣成立作菌蠢勢煎為潺湲聲草堂暮雲隂松窗殘雪眀此時勺復茗野語知逾清茶甌邢客與越人皆能造兹器圎似月魂墮輕如雲魄起棗花勢旋眼蘋沫香沾齒松下時一看支公亦如此煮茶香泉一合乳煎作連珠沸時看蟹目濺乍見魚鱗起聲疑松帶雨餑恐煙生翠儻把瀝中山必無千日醉陸龜蒙茶塢茗地曲隈回野行多繚繞向陽就中密背澗差還少遙盤雲髻慢亂簇香篝小何處好幽期滿巖春露曉茶人天賦識靈草自然鍾野姿間來北山下似與東風期雨後探芳去雲間幽路危唯應報春鳥得共斯人知茶笋所孕和氣深時抽玉笤短輕煙漸結華嫩蘂初成管尋來青靄曙欲去紅雲暖秀色自難逢傾筐不曽滿茶籝金刀劈翠筠織似波紋斜製作自野老攜持伴山娃昨日鬬煙粒今朝貯緑華爭歌調笑曲日暮方還家茶舍旋取山上材架為山下屋門因水勢斜壁任巖隈曲朝隨鳥俱散暮與雲同宿不憚採掇勞祇憂官未足茶竈無突抱輕嵐有煙映初旭盈鍋玉泉沸滿甑雲芽熟竒香襲春桂嫩色凌秋菊煬者若吾徒年年看不足茶焙左右搗凝膏朝昏布煙縷方圎隨樣拍次第依層取山謡縱髙下火候還文武見説焙前人時時炙花脯茶鼎新泉氣味良古鐵形狀醜那堪風雪夜更值煙霞友曽過赬石下又住清溪口且共薦臯盧何勞傾斗酒茶甌昔人謝塸埞徒為妍詞飾豈如圭璧姿又有煙嵐色光參筠席上韻雅金罍側直使于闐君從來未嘗識煮茶間來松間坐看煮松上雪時於浪花裏併下藍英末傾餘精爽健忽似氛埃滅不合别觀書但宜窺玉札宋梅堯臣答建州沈屯田寄新茶春芽研白膏夜火焙紫餅價與黃金齊包開青篛整碾為玉色塵逺及蘆底井一啜同醉翁思君聊引領王仲儀寄鬬茶白乳葉家春銖兩直錢萬資之石泉味特以陽芽嫩宜言難購多串片大可寸謬為識别人豫生固無恨答宣城張主簿遺鴉山茶次其韻昔觀唐人詩茶韻鴉山嘉鴉銜茶子生遂同山名鴉重以初槍旗采之穿煙霞江南雖盛産處處無此茶纖嫩如雀舌煎烹比露芽競收青篛焙不重漉酒紗顧渚亦頗近蒙頂來以遐雙井鷹掇爪建溪春剝葩日鑄㺯香美天目猶稻麻吳人與越人各各相鬬夸傳買費金帛愛貪無夷華甘苦不一致精粗還有差至珍非貴多為贈勿言些如何煩縣僚忽遺及我家雪貯雙砂罌詩琢無玉瑕文字搜怪竒難於抱長蛇眀珠滿紙上剩畜不為奢玩久手生胝窺久眼生花嘗聞茗消肉應亦可破瘕飲啜氣覺清賞重歎復嗟歎嗟既不足吟誦又豈加我今實強為君莫笑我耶李仲求寄建溪洪井茶七品云愈少愈佳未知嘗何如耳因條而答之忽有西山使始遺七品茶末品無水暈六品無沉柤五品散雲腳四品浮粟花三品若瓊乳二品罕所加絶品不可議甘香焉等差一日嘗一甌六腑無昏邪夜枕不得寐月樹聞啼鴉憂來唯覺衰可驗唯齒牙動搖有三四妨咀連左車髮亦足驚竦疏疏點霜華乃思平生逰但恨江路賒安得一見之煮泉相與誇呂晉叔遺新茶四葉及王遊共家原坂嶺歲摘建溪春爭先取晴景大窠有壯液所發必竒穎一朝團焙成價與黃金逞呂侯得鄉人分贈我已幸其贈幾何多六色十五餅每餅包青篛紅籤纒素檾屑之雲雪輕啜已神魂惺會待嘉客來侑談當晝永蔡襄北苑蒼山走千里斗落分兩騎靈泉出地清嘉卉得天味入門脫世氛官曹真傲吏茶壠造化曾無私亦有意所嘉夜雨作春力朝雲護日車千萬碧玉枝戢戢抽靈芽採茶春衫逐紅旗散入青林下隂崖喜先至新苗漸盈把競攜筠籠歸更帶山雲瀉造茶糜玉寸隂間摶金新範裏規呈月正圎勢動龍初起出焙香花全爭誇火候是試茶兔毫紫甌新蟹眼清泉煮雪凍作成花雲間未垂蘂願爾池中波去作人間雨原蘇軾種茶松間旅生茶已與松俱瘦茨棘尚未容蒙翳爭交構天公所遺棄百歲仍稚幼紫筍雖不長孤根乃獨夀移栽白鶴嶺土軟春雨後彌旬得連隂似許晚遂茂能忘流轉苦戢戢出鳥咮未任供臼磨且可資摘嗅千團輸大官百餅衒私鬬何如此一啜有味出吾囿增蘇軾遊惠山敲火發山泉烹茶避林樾眀窗傾紫盞色味兩竒絶吾生眠食耳一飽萬想滅頗笑玉川子飢弄三百月豈如山中人睡起山花發一甌誰與共門外無來轍問大冶長老乞桃花茶栽東坡周詩記苦荼茗飲出近世初緣厭粱肉假此雪昏滯嗟我五畝園桑麥苦蒙翳不令寸地間更乞茶子藝飢寒未知免已作太飽計庶將通有無農末不相戾春來凍地裂紫笋森已鋭牛羊煩呵叱筐筥未敢睨江南老道人齒髮日夜逝他年雪堂品尚記桃花裔寄周安孺茶大哉天宇內植物知幾族靈品獨標竒迥超凡草木名從姬旦始漸播桐君録賦詠誰最先厥傳惟杜育唐人未知好論著始於陸常李亦清流當年慕髙躅遂使天下士嗜此偶於俗豈但中土珍兼之異邦鬻鹿門有佳士博覽無不矚邂逅天隨翁篇章互賡續開園頤山下屏迹松江曲有興即揮毫燦然存簡牘伊余素寡愛嗜好本不篤粵自少年時低回客京轂雖非曵裾者庇蔭或華屋頗見綺紈中齒牙厭粱肉小龍得屢試糞土視珠玉團鳯與葵花碔砆雜魚目貴人自矜惜捧玩且緘櫝未數日注卑定知雙井辱於兹自研討至味識五六自爾入江湖尋僧訪幽獨髙人固多暇探究亦頗熟聞道早春時攜籯赴初旭驚雷未破蕾采采不盈掬旋洗玉泉蒸芳馨豈停宿須臾布輕縷火候謹盈縮不憚頃間勞經時廢藏蓄髹筒淨無染箬籠勻且復苦畏梅潤侵暖須人氣燠有如剛耿性不受纎芥觸又若廉夫心難將微穢瀆晴天敞虛府石碾破輕緑永日遇間賓乳泉發新馥香濃奪蘭露色嫩欺秋菊閩俗競傳誇豐腴面如粥自云葉家白頗勝中山醁好是一杯深午窗春睡足清風擊兩腋去欲凌鴻鵠嗟我樂何深水經亦屢讀子吒中泠泉次乃康王谷蟆培頃曽嘗瓶罌走僮僕如今老且懶細事百不欲美惡兩俱忘誰能強追逐薑鹽拌白土稍稍從吾蜀尚欲外形體安能徇心腹由來薄滋味日飯止脫粟外慕既已矣胡為此羇束昨日散幽步偶上天峰麓山圃正春風蒙茸萬旗簇呼兒為佳客采製聊亦復地僻誰我從包藏置厨簏何嘗較優劣但喜破睡速况此夏日長人間正炎毒幽人無一事午飯飽蔬菽困卧北窗風風微動窗竹乳甌十分滿人世真局促意爽飄欲仙頭輕快如沐昔人固多癖我癖良可贖為問劉伯倫胡然枕糟麴秦觀茶茶實嘉木英其香乃天育芳不愧杜蘅清堪掩椒菊上客集堂葵圎月探奩盝玉鼎注漫流金碾響丈竹侵尋發美鬯旖旎生乳粟經時不銷歇衣袂帶紛郁幸蒙巾笥藏苦厭龍蘭續願君斥異類使我全芬馥茶臼幽人耽茗飲刳木事搗撞巧制合臼形雅音伴柷椌虛室困亭午松然眀鼎窗呼奴碎圎月搔首聞錚鏦茶仙賴君得睡魔資爾降所宜玉兔搗不必力士扛願偕黃金碾自比白玉缸彼美制作妙俗物難與雙朝補之次韻蘇翰林五日揚州石塔寺烹茶唐來木蘭寺遺迹今未滅僧鐘嘲飰後語出飢客舌今公食方丈玉茗攄噫噎當今卧江湖不泣逐臣玦中和似此茗受水不易節輕塵散羅麴亂乳發甌雪佳辰雜蘭艾共弔楚纍潔老謙三昧手心得非口訣誰知此間妙我欲希超絶持誇淮北士湯餅供朝啜孫覿飲修仁茶煙雲吐長崖風雨暗古縣竹輿赬兩肩弛擔息微倦茗飲初一嘗老父有芹獻幽姿絶媚嫵著齒得瞑眩昏昏嗜睡翁喚起風灑面亦有不平心盡從毛孔散陸遊夜汲井水煮茶病起罷觀書袖手清夜永四鄰悄無語燈火正淒冷山童亦睡熟汲水自煎茗鏘然轆轤聲百尺鳴古井肺腑凜清寒毛骨亦蘇省歸來月滿廊惜踏疏梅影眀髙啓茶軒摘芳試新泉手滌林下器一榻鬢絲傍輕煙散遙吹不用醒吟魂幽人自無睡御定佩文齋廣羣芳譜卷十九
