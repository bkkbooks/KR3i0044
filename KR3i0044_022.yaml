body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷二十茶譜茶三集藻七言古詩增唐劉禹錫西山蘭若試茶歌山僧後簷茶數叢春來映竹抽新茸宛然為客振衣起自傍芳叢摘鷹嘴斯須炒成滿室香便酌砌下金沙水驟雨松聲入鼎來白雲滿碗花徘徊悠揚噴鼻宿酲散清峭徹骨煩襟開陽崖隂嶺各殊氣未若竹下莓苔地炎帝雖嘗未辨煎桐君有録那知味新芽連拳半未舒自摘至煎俄頃餘木蘭墜露香微似瑶草臨波色不如僧言靈味宜幽寂采采翹英為嘉客不辭緘封寄郡齋甎井銅爐損標格何况蒙山顧渚春白泥赤印走風塵欲知花乳清泠味須是眠雲跂石人原盧同走筆謝孟諫議寄新茶日髙丈五睡正濃軍將打門驚周公口云諫議送書信白絹斜封三道印開緘宛見諫議面手閲月團三百片聞道新年入山裏蟄蟲驚動春風起天子須嘗陽羡茶百草不敢先開花仁風暗結珠琲瓃先春抽出黃金芽摘鮮焙芳旋封裹至精至好且不奢至尊之餘合王公何事便到山人家柴門反關無俗客紗帽籠頭自煎喫碧雲引風吹不斷白花浮光凝碗面一碗喉吻潤兩碗破孤悶三碗搜枯腸惟有文字五千卷四碗發輕汗平生不平事盡向毛孔散五碗肌骨清六碗通仙靈七碗喫不得也唯覺兩腋習習清風生增溫庭筠西嶺道士茶歌乳竇濺濺通石脈緑塵愁草春江色澗花入井水味香山月當人松影直仙翁白扇霜鳥翎拂壇夜讀黃庭經疏香皓齒有餘味更覺鶴心通杳冥李郢茶山貢焙歌使君愛客情無已客在金臺價難比春風三月貢茶時盡逐紅旌到山裏焙中清曉朱門開筐箱漸見新芽來陵煙觸露不停采官家赤印連帖催朝飢暮匐誰興哀喧闐競納不盈掬一時一餉還成堆蒸之馥之香勝梅研膏架動轟如雷茶成拜表貢天子萬人爭噉春山摧驛騎鞭聲砉流電半夜驅夫誰復見十日王程路四千到時須及清眀宴吾君可謂納諫君諫官不諫何由聞九重城裏雖旰食天涯吏役長紛紛使君憂民慘容色就焙嘗茶坐諸客幾回到口重咨嗟嫩緑鮮芳出何力山中有酒亦有歌樂營房户皆仙家仙家十隊酒百斛金絲宴饌隨經過使君是日憂思多客亦無言徵綺羅殷勤繞焙復長歎官府例成期如何吳民吳民莫憔悴使君作相期蘇爾秦韜玉採茶歌天柱香芽露香發爛研瑟瑟穿荻篾太守憐才寄野人山童碾破團團月倚雲便酌泉聲煮獸炭潛然蚌珠吐看著晴天早日眀鼎中颯颯篩風雨老翠香塵下才熟攪時繞筯秋雲緑耽書病酒兩多情坐對閩甌睡先足洗我胸中幽思清鬼神應愁歌欲成李咸用謝僧寄茶空門少年初地堅摘芳為藥除睡眠匡山茗樹朝陽偏暖萌如爪拏飛鳶枝枝膏露凝滴圎參差失向兜羅綿傾筐短甑蒸新鮮白苧眼細勻于研甎排古砌春苔乾殷勤寄我清眀前金槽無聲飛碧煙赤獸呵氷急鐵喧林風夕和真珠泉半匙青粉攪潺湲緑雲輕綰湘娥鬟嘗來縱使重支枕蝴蝶寂寥空掩關僧皎然飲茶歌送鄭容丹丘羽人輕玉食採茶飲之生羽翼名藏仙府世空知骨化雲宫人不識雪山童子調金鐺楚人茶經虛得名霜天半夜芳草折爛熳緗華啜久生賞君茶味祛我疾使人胸中蕩憂栗日上香爐情未畢亂踏虎溪雲髙歌送君出宋歐陽修嘗新茶呈聖俞建安三千里京師三月嘗新茶人情好先務取勝百物貴早相矜誇年窮臘盡春欲動蟄雷未起驅龍蛇夜聞擊鼓滿山谷千人助呌聲喊呀萬木寒癡睡不醒唯有此樹先萌芽乃知此為最靈物宜其獨得天地之英華終朝採摘不盈掬通犀銙小圎復窊鄙哉穀雨槍與旗多不足貴如刈麻建安太守急寄我香篛包裹封題斜泉甘器潔天色好坐中揀擇客亦嘉新香嫩色如始造不似來逺從天涯停匙側盞試水路拭目向空看乳花可憐俗夫把金錠猛火炙背如蝦蟆由來真物有真賞坐逢詩老頻咨嗟須臾共起索酒飲何異奏雅終淫哇次韻再作吾年向老世味薄所好未衰惟飲茶建溪苦逺雖不到自少嘗見閩人誇每嗤江浙凡茗草叢生狼籍惟藏蛇豈如含膏入香作金餅蜿蜒兩龍戲以呀其餘品第亦竒絶愈小愈精皆露芽泛之白花如粉乳乍見紫面生光華手持心愛不欲碾有類弄印幾成窊論功可以療百疾輕身久服勝胡麻我謂斯言頗過矣其實最能祛睡邪茶官貢餘偶分寄地逺物新來意嘉親烹屢酌不知厭自謂此樂真無涯未言久食成手顫已覺疾飢生眼花客遭水厄疲捧碗口吻無異蝕月蟇僮奴傍視疑復笑嗜好乖僻誠堪嗟更蒙酬句怪可駭兒曹助噪聲哇哇雙井茶西江水清江石老石上生茶如鳯爪窮臘不寒春氣早雙井茅生先百草白毛囊以紅碧紗十斤茶養一兩芽長安富貴五侯家一啜猶須三日誇寶雲日注非不精爭新棄舊世人情豈知君子有常德至寶不隨時變易君不見建溪龍鳯團不改舊時香味色送龍茶與許道人潁陽道士青霞客來似浮雲去無迹夜朝北斗太清壇不道姓名人不識我有龍團古蒼璧九龍泉深一百尺慿君汲井試烹之不是人間香味色鬬茶歌年年春自東南來建溪先暖水微開溪邊竒茗冠天下武夷仙人從古栽新雷昨夜發何處家家嬉笑穿雲去露芽錯落一畨榮綴玉含珠散嘉樹終朝采掇未盈襜唯求精粹不敢貪研膏焙乳有誰製方中圭兮圎中蟾北苑將期獻天子林下雄豪先鬬美鼎磨雲外首山銅瓶攜江上中􅍽水黃金碾畔緑塵飛碧玉甌中翠濤起鬬茶味兮輕醍醐鬬茶香兮薄蘭芷其間品第胡能欺十目視而十手指勝若登仙不可攀輸同降將無窮耻吁嗟天産石上英論功不愧階前蓂衆人之濁我可清千日之醉我可醒屈原試與招魂魄劉伶却得聞雷霆盧同敢不歌陸羽須作經森然萬象中焉知無茶星商山丈人休茹芝首陽先生休采薇長安酒價減千萬成都藥市無光輝不如仙山一啜好泠然便欲乘風飛君莫羡花間女郎只鬬草贏得珠璣滿斗歸梅堯臣次韻永叔嘗新茶自從陸羽生人間人間相學事新茶當時採摘未甚盛或有髙士燒竹煮泉為世誇入山乘露掇嫩嘴林下不畏虎與蛇近年建安所出勝天下貴賤求呀呀東溪北苑供御餘王家葉家長白芽造成小餅若帶銙鬬浮鬬色矜夷華味久回甘竟日在不比苦硬令舌窊此等莫與北俗道只解白土和脂麻歐陽翰林最别識品第髙下無欹斜晴眀開軒碾雪末衆客共賞皆稱嘉建安太守置書角青篛包封來海涯清眀才過已到此正是洛陽人寄花兔毛紫盞自相稱清泉不必求蝦蟇石瓶煎湯銀梗打粟粒鋪面人驚嗟詩腸久飢不禁力一啜入腹鳴咿哇和次韻再作建溪茗株成大樹頗殊楚越所種茶先春喊山搯白萼亦異鳥嘴蜀客誇烹新鬬硬要咬盞不同飲酒爭畫蛇從揉至碾用盡力只取勝負相笑呀雖傳雙井與日注終是品格稱草芽歐陽翰林百事得精妙官職况已登清華昔得隴西大銅碾碾多歲久深且窊昨日寄來新臠片包以􅀢篛纒以麻唯能賸啜任腹冷幸免酩酊冠辨斜人言飲多頭顫挑自欲清醒氣味嘉此病雖得優醉者醉來顛踣禍莫涯不願清風生兩腋但願對竹兼對花還思退之在南方嘗説稍稍能啖蟇古之賢人尚若此我今貧陋休相嗟公不遺舊許頻往何必絲管喧咬哇黃庶家童來持雙井芽數數飲之輒成詩以示同舍我疑醇醲千古味寂寞散在山茶枝雙井名入天下耳建溪春色無光輝吾鄉茶友若敵國糞土尺璧珍刀圭嗟豫奔走車馬迹塵埃荆棘生喉頤煮雲為腴不可見青泉緑樹應相嗤長鬚前日千里至百芽包裹林巖姿開緘春風若滿手喜氣收拾人恐知江南陽和夜欲試小齋獨與清風期汲得泉甘火亦得混沌不死詩書肥詩書坐對為主客一啜已見沆􅒭醨通宵安穩睡物外家夢欲遣不肯歸不信試來與君飲洗出正性還肝脾蘇軾試院煎茶蟹眼已過魚眼生颼颼欲作松風鳴蒙茸出磨細珠落眩轉繞甌飛雪輕銀瓶瀉湯誇第二未識古人煎水意君不見昔時李生好客手自煎貴從活火發新泉又不見今時潞公煎茶學西蜀定州花瓷琢紅玉我今貧病長苦飢分無玉碗捧蛾眉且學公家作茗飲磚爐石銚行相隨不用撑腸拄腹文字五千卷但願一甌常及睡足日髙時月兔茶環非環玦非玦中有迷離玉兔兒一似佳人裙上月月圎還缺缺還圎此月一缺圎何年君不見鬬茶公子不忍鬬小團上有雙銜綬帶雙飛鸞和錢安道寄惠建茶我官於南今幾時嘗盡溪茶與山茗胸中似記故人面口不能言心自省為君細説我未暇試評其略差可聽建溪所産雖不同一一天與君子性森然可愛不可慢骨清肉膩和且正雪花雨腳何足道啜過始知真味永縱復苦硬終可録汲黯少戇寬饒猛草茶無賴空有名髙者妖邪次頑懭體輕雖復強浮泛性滯偏工嘔酸冷其間絶品豈不佳張禹縱賢非骨鯁葵花玉􅙧不易致道路幽嶮隔雲嶺誰知使者來自西開緘磊落收百餅嗅香嚼味本非别透紙自覺光炯炯粃粳團鳯友小龍奴𨽻日注臣雙井收藏愛惜待佳客不敢包裹鑽權幸此詩有味君勿傳空使時人怒生癭和蔣夔寄茶我生百事常隨緣四方水陸無不便扁舟渡江適吳越三年飲食窮芳鮮金虀玉膾飯炊雪海螯江柱初脫泉臨風飽食甘寢罷一甌花乳浮輕圎自從捨舟入東武沃野便到桑麻川翦毛胡羊大如馬誰記鹿角腥槃筵厨中蒸粟埋飯甕大杓更取酸生涎柘羅銅碾棄不用脂麻白土須盆研故人猶作舊眼看謂我好尚如當年沙溪北苑強分别水腳一線爭誰先清詩兩幅寄千里紫金百餅費萬錢吟哦烹噍兩竒絶只恐偷乞煩封纒老妻稚子不知愛一半已入薑鹽煎人生所遇無不可南北嗜好知誰賢死生禍福久不擇更論甘苦爭媸妍知君窮旅不自釋因詩寄謝聊相鐫魯直以詩饋雙井茶次其韻為謝江夏無雙種竒茗汝隂六一誇新書磨成不敢付僮僕自看雪湯生璣珠列仙之儒瘠不腴只有病渴同相如眀年我欲東南去畫舫何妨宿太湖蘇轍和子瞻煎茶年來病懶百不堪未廢飲食求芳甘煎茶舊法出西蜀水聲火候猶能諳相傳煎茶只煎水茶性仍存偏有味君不見閩中茶品天下髙傾身事茶不知勞又不見北方茗飲無不有鹽酪椒薑誇滿口我今倦逰思故鄉不學南方與北方銅鐺得火蚯蚓呌匙腳旋轉秋螢光何時茅簷歸去炙背讀文字遣兒折取枯竹女煎湯陳襄古靈山試茶歌乳源淺淺交寒石松花墮粉愁無色眀皇玉女跨神雲鬬翦輕羅縷殘碧我聞巒山二月春方歸苦霧迷天新雪飛仙鼠潭邊蘭草齊霧芽吸盡香龍脂轆轤繩細井花暖香塵散碧琉璃碗玉川氷骨照人寒瑟瑟祥風滿眼前紫屏冷落沈水煙山月堂軒金鴨眠麻姑癡煮丹井泉不識人間有上仙原黃庭堅以雙井茶送子瞻人間風日不到處天上玉堂森寶書想見東坡舊居士揮毫百斛瀉眀珠我家江南摘雲腴落磑霏霏雪不如為君喚起黃州夢獨載扁舟向五湖增黃庭堅謝送碾賜壑源揀芽矞雲從龍小蒼璧元豐至今人未識壑源包貢第一春緗奩碾香供玉食睿思殿東金井欄甘露薦碗天開顔橋山事嚴庀百局補衮諸公省中宿中人傳賜夜未央雨露恩光照宮燭左丞似是李元禮好事風流有涇渭肯憐天祿校書郎親敕家庭遣分似春風飽識大官羊不慣腐儒湯餅腸搜攪十年燈火讀令我胸中書傳香已戒應門老馬走客來問字莫載酒以小龍團及半挺贈無咎并詩用前韻為戲我持玄圭與蒼璧以暗投人渠不識城南窮巷有佳人不索檳榔常晏食赤銅茗碗兩斑斑銀粟翻光解破顔上有龍文下棋局探囊贈君諾已宿此物已是元豐春先皇聖功調玉燭朝子胸中開典禮平生自期莘與渭故用澆君磊塊胸莫令鬢毛雪相似曲几蒲團聽煮湯煎成車聲繞羊腸雞蘇胡麻留渴羌不應亂我官焙香肥如瓠壺鼻雷吼幸君飲此勿飲酒以雙井茶送孔常父校經同省並門居無日不聞公讀書故持茗碗澆舌本要聽六經如貫珠心知韻勝舌知腴何似寶雲與真如湯餅作魔應午寢慰公渴夢吞江湖博士王揚休碾密雲龍同事十三人飲之戲作矞雲蒼璧小盤龍貢包新樣出元豐王郎坦腹飯牀東大官分物來婦翁棘圍深鎖武成宮談天進士雕虛空鳴鳩欲雨喚雌雄南嶺北嶺宮徵同午窗欲眠視濛濛喜君開包碾春風注湯官焙香出籠非君灌頂甘露碗幾為談天乾舌本答黃冕仲索煎雙井并簡揚休江夏無雙乃吾宗同舍頗似王安豐能澆茗碗湔祓我風袂欲挹浮丘翁吾宗落筆賞幽事秋月下照澄江空家山鷹爪是小草敢與好賜雲龍同不嫌水厄幸來辱寒泉湯鼎聽松風夜堂朱墨小燈籠惜無纎纎來捧碗唯倚新詩可傳本謝劉景文送團茶劉侯惠我大玄璧上有雌雄雙鳯迹鵝溪水練落春雪粟面一杯增目力劉侯惠我小玄璧自裁半璧煮瓊糜收藏殘月惜未碾直待匡衡來説詩綘囊團團餘幾璧因來送我公莫惜箇中渴羌飽湯餅雞蘇胡麻煮同喫朝補之次韻魯直謝李左丞送茶都城米貴斗論璧長飢茗碗無從識道和何暇索檳榔慚愧雲龍羞肉食壑源萬畝不作欄上春伐鼓驚山顔題封進御官有局夜行初不更驛宿氷融太液俱未知寒食新苞隨賜燭建安一水去兩水易較豈如涇與渭左丞分送天上餘我試比方良有似月團清潤珍豢羊葵花瑣細胃與腸可憐賦罷羣玉晚寧憶睡餘雙井香大勝膠西蘇太守茶湯不美誇薄酒魯直復以詩送茶云願君飲此勿飲酒次韻相茶真似石韞璧至精那可皮膚識溪芽不給萬口須往往山毛俱入食雲龍正用餉近班乞與粗官誠靦顔崇朝一碗坐官局申旦形清不成宿平生樂此臭味同故人貽我情相燭黃侯發軔日千里天育收駒自汧渭車聲出鼎細九盤如此佳句誰能似遣試齊民蟹眼湯扶起醉頭湔腐腸頗類他時玉川子破鼻竹林風送香吾儕幽事動不朽但讀離騷可無酒朝沖之陸元鈞宰寄日注茶我昔不知風雅頌草木獨遺茶比諷陋哉徐鉉説茶苦欲與淇園竹同種又疑禹漏稅九州橘柚當年錯包貢腐儒妄測聖人意逺物勞民亦安用含桃熟薦當在盤荔子生來枉飛鞚羊葅異好亦何有蚶菜殊珍要非奉君家季疵真禍首毁論徒勞世仍重爭新鬬試誇擊拂風俗移人可深痛老夫病渴手自煎嗜好悠悠亦從衆更煩小陸分日注密封細字蠻奴送槍旗却憶採擷初雪花似是雲溪動更期遺我但敲門玉川無復周公夢簡江子之求茶政和密雲不作團小銙寸許蒼龍蟠金花絳囊如截玉緑面倣佛松溪寒人間此品那可得三年聞有終未識老夫于此百不忙飽食但苦夏日長北窗無風睡不解齒頰苦澀思清涼故人新除協律郎交遊多在白玉堂揀芽鬬銙皆飫嘗幸為傳聲李太府煩渠折簡買頭綱楊萬里淡菴坐上觀顯上人分茶分茶何似煎茶好煎茶不似分茶巧蒸水老禪弄泉手隆興元春新玉爪二者相遭兔甌面怪怪竒竒真善幻紛如擘絮行太空影落寒江能萬變銀瓶首下仍尻髙注湯作字勢嫖姚不須更師屋漏法只問此瓶當響答紫微仙人烏角巾喚我起看清風生京塵滿袖思一洗病眼生花得再眀漢鼎難調要公理策勳茗碗非公事不如回施與寒儒歸讀茶經傳衲子謝木韞之舍人送講筵賜茶吳綾縫囊染菊水蠻砂塗印題進字淳熙錫貢新水芽天珍誤落黃茅地故人鸞渚紫微郎金華講徹花草香宣賜龍焙第一綱殿上走趨眀月璫御前啜罷三危露滿袖香煙懷璧去歸來拈出兩蜿蜒雷電晦冥驚破柱北苑龍芽內樣新銅圍銀範鑄瓊塵九天寶月霏五雲玉龍雙舞黃金鱗老夫平生愛煮茗十年燒穿折腳鼎下山汲井得甘冷上山摘芽得苦梗何曽夢到龍逰窠何曽夢喫龍芽茶故人分送玉川子春風來自玉皇家煆圭椎璧調氷水烹龍炮鳯搜肝髓石花紫笋可衙官赤印白泥牛走爾故人氣味茶樣清故人風骨茶樣眀開緘不但似見面叩之咳唾金玉聲麴生勸人墮巾幘睡魔遣我拋書册老夫七碗病未能一啜猶堪坐秋夕葛長庚茶歌栁眼偷看梅花飛百花頭上東風吹壑源春到不知時霹靂一聲驚曉枝枝頭未敢展槍旗吐玉綴金先獻竒雀舌含春不解語只有曉露晨煙知帶露和煙摘歸去蒸來細搗幾千杵揑作月團三百片火候調勻文與武碾邊飛絮捲玊塵磨下落珠散金縷首山黃銅鑄小鐺活火新泉自烹煮蟹眼已沒魚眼浮􅂒􅂒松聲送風雨定州紅玉琢花瓷瑞雪滿甌浮白乳緑雲入口生香風滿口蘭芷香無窮兩腋颼颼毛竅通洗盡枯腸萬事空君不見孟諫議送茶驚起盧同睡又不見白居易餽茶喚醒禹錫醉陸羽作茶經曹暉作茶銘文正范公對茶笑紗帽籠頭煎石銚素虛見雨如丹砂點作滿盞菖蒲花東坡深得煎水法酒闌往往覓一呷趙州夢裏見南泉愛結焚香瀹茗緣吾儕烹茶有滋味華池神水先調試丹田一畝自栽培金翁姹女採歸來天爐地鼎依時節煉作黃芽烹白雪味如甘露勝醍醐服之頓覺沉疴蘇身輕便欲登天衢不知天上有茶無元洪希文煮土茶歌論茶自古稱壑源品水無出中􅍽泉莆中苦茶出土産鄉味自汲井水煎器新火活清味永且從平地休登仙王侯第宅鬬絶品揣分不到山翁前臨風一啜心自省此意莫與他人傳謝應芳陽羡茶南山茶樹化劫灰白蛇無復銜子來頻年雨露飬遺植先春粟粒珠含胎待看茶焙春煙起篛籠封春貢天子誰能遺我小團月煙火肺肝令一洗眀髙啓采茶詞雷過溪山碧雲暖幽叢半吐槍旗短銀叉女兒相應歌筐中摘得誰最多歸來清香猶在手髙品先將呈太守竹爐新焙未得嘗籠盛販與湖南商山家不解種禾黍衣食年年在春雨原王世貞試虎丘茶洪都鶴嶺太麓生北苑鳯團先一鳴虎丘晚出穀雨候百草鬬品皆為輕慧水不肯甘第二擬借春芽冠春意陸郎為我手自煎松飇寫出真珠泉君不見蒙頂空勞薦巴蜀定紅輸却宣瓷玉氊根麥粉填調飢碧紗捧出雙蛾眉搊筝炙管且未要隱囊筠榻須相隨最宜纖指就一吸半醉倦讀離騷時于若瀛龍井茶西湖之西開龍井煙霞近接南峰嶺飛流蜜汨寫幽壑石磴紆曲片雲冷拄杖尋源到上方松枝半落澄潭靜銅瓶試取烹新茶濤起龍團沸穀芽中頂無須憂獸迹湖州豈懼涸金沙漫道白芽雙井嫩未必紅泥方印嘉世人品茶未嘗見但説天池與陽羡豈知新茗煮新泉團黃分洌浮甌面二槍浪白附三萹一串應輸錢五萬五言律詩增唐皇甫冉送陸鴻漸棲霞寺採茶採茶非採菉逺逺上層崖布葉春風暖盈筐白日斜舊知山寺路時宿野人家借問王孫草何時泛碗花送陸鴻漸山人採茶千峰待逋客香茗復叢生採摘知深處煙霞羡獨行幽期山寺逺野飯石泉清寂寂燃燈夜相思一磬聲錢起過長孫宅與郎上人茶會偶與息心侣忘歸才子家玄談兼藻思緑茗代榴花岸幘看雲卷含毫任景斜松喬若逢此不復醉流霞宋梅堯臣穎公遺碧霄峰茗到山春已晚何更有新茶峰頂應多雨天寒始發芽採時林狖靜蒸處石泉嘉持作衣囊祕分來五栁家蘇軾怡然以垂雲新茶見餉報以大龍團仍戲作小詩妙供來香積珍烹具大官揀芽分雀舌賜茗出龍團曉日雲菴暖春風浴殿寒聊將試道眼莫作兩般看黃庭堅寄新茶與南禪師筠焙熟香茶能醫病眼花因甘野夫食聊寄法王家石鉢收雲液銅瓶煮露華一甌資舌本吾欲問三車曾幾謝人送壑源絶品云九重所賜也三伏汗如雨終朝霑我裳誰分金掌露來作玉溪涼别甑軟炊飯小爐深炷香麯生何等物不與汝同鄉述姪餉日注茶寶銙自不乏山芽安可無子能來日注吾得具風爐夏木囀黃鳥僧窗行白駒談多喚坐睡此味政時須陸遊北巖採新茶用忘懷録中法煎飲槐火初鑽燧松風自候湯攜籃苔徑逺落爪雪芽長細啜襟靈爽微吟齒頰香歸時更清絶竹影踏斜陽徐照謝徐璣惠茶建山惟上貢采擷極艱辛不擬分竒品遙將寄野人角開秋月滿香入井泉新靜室無來客碑黏陸羽真七言律詩增唐白居易謝李六郎中寄新蜀茶故情周匝向交親新茗分張及病身紅紙一封書後信緑芽十片火前春湯添勺水煎魚眼末下刀圭攪麴塵不寄他人先寄我應緣我是别茶人李郢酬友人春暮寄枳花茶昨日東風吹枳花酒醒春晚一甌茶如雲正護幽人塹似雪才分野老家金餅拍成和雨露玉塵煎出照煙霞相如病渴今全校不羡生臺白頸鴉薛能謝劉相公寄天柱茶兩串春團敵夜光名題天柱印維揚偷嫌曼倩桃無味搗覺嫦娥藥不香惜恐被分緣利市盡應難覓為供堂粗官寄與真拋却賴有詩情合得嘗原鄭谷峽中嘗茶簇簇新英摘露光小江園裏火煎嘗吳僧漫説鴉山好蜀叟休誇鳥嘴香入座半甌輕泛緑開緘數片淺含黃鹿門病客不歸去酒渴更知春味長增徐夤尚書惠蠟面茶武夷春暖月初圎採摘新芽獻地仙飛鵲印成香蠟片啼猿溪走木蘭船金槽和碾沉香末氷碗輕涵翠縷煙分贈恩深知最異晚鐺宜煮北山泉劉兼從弟舍人惠茶曽求芳茗貢蕪詞果沐頒霑味甚竒龜背起紋輕炙處雲頭翻液乍烹時老丞倦悶偏宜矣舊客過從别有之珍重宗親相寄惠水亭山閣自攜持宋王禹稱龍鳯茶樣標龍鳯號題新賜得還因作近臣烹處豈期商嶺水碾時空想建溪春香于九畹芳蘭氣圎似三秋皓月輪愛惜不嘗惟恐盡除將供養白頭親趙抃次謝許少卿寄卧龍山茶越芽逺寄入都時酬唱珍誇互見詩紫玉叢中觀雨腳翠峰頂上摘雲旗啜多思爽都忘寐吟苦更長了不知想到眀年公進用卧龍春色自遲遲歐陽修和梅公儀嘗建茶溪山擊鼓助雷驚逗曉靈芽發翠莖摘處兩旗香可愛貢來雙鳯品尤精寒侵病骨惟思睡花落春愁未解酲喜共紫甌吟且酌羡君瀟灑有餘清梅堯臣和杜相公謝蔡君謨寄茶天子歲嘗龍焙茶茶官催摘雨前芽團香已入中都府鬬品爭傳太傅家小石冷泉留早味紫泥新品泛春華吳中內史才多少從此蓴羮不足誇嘗茶和公儀都藍攜具上都堂碾破雲團北焙香湯嫩水輕花不散口甘神爽味偏長莫誇李白仙人掌且作盧同走筆章亦欲清風生兩腋從教吹去月輪傍蔡襄和孫之翰謝寄茶北苑靈芽天下精要須寒過入春生故人偏愛雲腴白佳句遙傳玉律清衰病萬緣皆絶慮甘香一事未忘情封題盡是山家寶晝日虛堂試品程和杜相公謝寄茶破春龍焙走新茶盡是西溪近社芽才拆緘封思退傅為留甘旨減藏家鮮眀香色凝雲液清徹神情敵露華却笑虛名陸鴻漸曾無賢相作詩誇蘇軾新茶送簽判程朝奉以饋其母有詩相謝次韻答之縫衣送與溧陽尉舍肉懷歸潁谷封聞道平反供一笑會須難老待千鍾火前試焙分新銙雪裏頭綱輟賜龍從此升堂是兄弟一甌林下記相逢次韻曹輔寄壑源試焙新芽仙山靈草濕行雲洗遍香肌粉未勻眀月來投玉川子清風吹破武林春要知玉雪心腸好不是膏油首面新戲作小詩君勿笑從來佳茗似佳人汲江煎茶活水還須活火煎自臨釣石取深清大瓢貯月歸春甕小杓分江入夜瓶雪乳已翻煎處腳松風忽作瀉時聲枯腸未易禁三碗坐聽荒城長短更蘇轍次韻李公擇以惠泉答章子厚新茶無錫銅瓶手自持新芽顧渚近相思故人贈答無千里好事安排巧一時蟹眼煎成聲未老兔毛傾看色尤宜槍旗攜到齊西境更試城南金線竒新詩態度靄春雲肯把篇章枉與人性似好茶常自養交如泉水久彌親睡濃正想羅聲發食飽尤便粥面勻底處翰林長外補眀年誰送霅溪春宋城宰韓秉文惠日鑄茶君家日鑄山前住冬後茶芽麥粒粗磨轉春雷飛白雪甌傾錫水散凝酥溪山去眼塵生面簿領埋頭汗匝膚一啜更能分幕府定應知我俗人無次前韻龍鸞僅比閩團釅鹽酪應嫌比俗粗採愧吳僧身似臘點須越女手如酥舌根遺味輕浮齒腋下清風稍襲膚七碗未容留客試瓶中數問有餘無王令謝張和仲惠寶雲茶故人有意真憐我靈荈封題寄蓽門與療文園消渴病還招楚客獨醒魂烹來似帶吳雲腳摘處應無穀雨痕果肯同嘗竹林下寒泉猶有惠山存秦觀次韻謝李安上惠茶故人早歲佩飛霞故遣長鬚致茗芽寒槖遽收諸品玉午甌初試一團花著書懶復追鴻漸辨水猶能效易牙從此道山春困少黃書剩校兩三家朱松答卓民表送茶攪雲飛雪一畨新誰念幽人尚食陳髣佛三生玊川子破除千餅建溪春喚回窈窈清都夢洗盡蓬蓬渴肺塵便欲乘風渡芹水却愁狡獪得君嗔周必大次韻王少府送蕉坑茶昏然午枕困漳濵醒以清風賴子真初似參禪逢硬語久如味諫得端人王程不趂清眀宴野老先分浩蕩春敢向柘羅評緑玉待君同碾試飛塵胡邦衡生日以詩送北苑八銙日注二瓶賀客稱觴集冠霞懸知酒渴正思茶尚書八餅分閩焙主簿雙瓶揀越芽妙手合調金鼎鉉清風穩到玉皇家眀年敕使宣臺餽莫忘幽人賦葉嘉尚長道見和次韻鍾山處士映髙霞止酒惟親睡起茶逺向溪邊尋活水間于竹裏試陽芽一甌休問帝前席七碗且同僧在家所愧叔孫無五善若為重拜晉君嘉陸遊試茶蒼爪初驚鷹脫韝得湯已見玉花浮睡魔何止避三舍歡伯直知輸一籌日鑄焙香懷舊隱谷簾試水憶西逰銀瓶銅碾俱官樣恨欠纖纖為捧甌喜得建茶玉食何由到草萊重奩初喜坼封開雪霏庾嶺紅絲磑乳泛閩溪緑地材舌本常留甘盡日鼻端無復鼾如雷故應不負朋逰意手挈風爐竹下來效蜀人煎茶戲作長句午枕初回夢蝶牀紅絲小磑破旗槍正須山石龍頭鼎一試風爐蟹眼湯巖電已能開倦眼春雷不許殷枯腸飯囊酒甕紛紛是誰賞蒙山紫筍香楊萬里以六一泉煮雙井茶鷹爪新茶蟹眼湯松風鳴雪兔毫霜細參六一泉中味故有涪翁句子香日注建溪當近舍落霞秋水夢還鄉何時歸上滕王閣自看風爐自煮嘗陳蹇叔郎中出閩漕别送新茶李聖俞郎中出手分似頭綱别樣建溪春小璧蒼龍浪得名細瀉谷簾珠顆露打成寒食杏花餳鷓鴣碗面雲縈字兔褐甌心雪作泓不待清風生兩腋清風先向舌端生方嶽趙龍學寄陽羡茶為汲蜀井對瓊花烹之三印誰分陽羡茶自煎蜀井瀹瓊花數間眀月玉川屋兩腋清風銀漢槎團鳯烹來奴僕等老龍畢竟當行家相思幾夢山隂雪搜攪平生書五車釋惠洪與客啜茶戲成道人要我煮溫山似識相如病裏顔金鼎浪翻螃蟹眼玉甌絞刷鷓鴣斑津津白乳衝眉上拂拂清風産腋間喚起晴窗春晝夢絶憐佳味少人攀元劉秉忠嘗雲芝茶鐵色皴皮帶老霜含英咀美入詩腸舌根未得天真味鼻觀先通聖妙香海上精華難品第江南草木屬尋常待將膚湊浸微汗毛骨生風六月涼耶律楚材西域從王君玉乞茶因其韻七首積年不啜建溪茶心竅黃塵塞五車碧玉甌中思雪浪黃金碾畔憶雷芽盧同七碗詩難得諗老三甌夢亦賒敢乞君侯分數餅暫教清興繞煙霞厚意江洪絶品茶先生分出滿輪車雪花灎灎浮金蘂玉屑紛紛碎白芽破夢一杯非易得搜腸三碗不能賖瓊甌啜罷酬平昔飽看西山插翠霞髙人惠我嶺南茶爛賞飛花雪沒車玉屑三甌烹嫩蘂青旗一葉碾新芽頓令衰叟詩魂爽便覺紅塵客夢賖兩腋清風生坐榻幽歡逺勝泛流霞酒仙飄逸不知茶可笑流涎見麴車玉杵和雲舂素月金刀帶雨剪黃芽試將綺語求茶飲特勝春衫把酒賖啜罷神清淡無寐塵囂身世便雲霞長笑劉伶不識茶胡為買鍤漫隨車蕭蕭暮雨雲千頃􅥀􅥀春雷玉一芽建郡深甌吳地逺金山佳水楚江賖紅爐石鼎烹團月一碗和香吸碧霞枯腸搜盡數杯茶千卷胸中到幾車湯響松風三昧手雪香雷震一槍芽滿囊垂賜情何厚萬里攜來路更賖清興無涯騰八表騎鯨踏破赤城霞啜罷江南一碗茶枯腸歷歷走雷車黃金小碾飛瓊屑碧玉深甌點雪芽筆陳陳兵詩思勇睡魔卷甲夢魂賖精神爽逸無餘事卧看殘陽補斷霞謝宗可茶筅此君一節瑩無瑕夜聽松聲潄玊華萬縷引風歸蟹眼半瓶飛雪起龍牙香凝翠髮雲生腳溼滿蒼髯浪捲花到手纎毫皆盡力多因不負玉川家謝應芳寄題無錫錢仲毅煮茗軒聚蚊金谷任葷羶煮茗留人也自賢三百小團陽羡月尋常新汲惠山泉星飛白石童敲火煙出青林鶴上天午夢覺來湯欲沸松風吹響竹爐邊原眀文徵眀煎茶嫩湯自候魚生眼新茗還誇翠展旗穀雨江南佳節近惠山泉下小船歸山人紗帽籠頭處禪榻風花繞鬢飛酒客不通塵夢醒卧看春日下松扉增徐渭某伯子惠虎丘茗謝之虎丘春茗妙烘蒸七碗何愁不上升青箬舊封題穀雨紫砂新罐買宜興却從梅月橫三弄細攪松風灺一燈合向吳儂彤管説好將書上玉壺氷潘允哲謝人惠茶長日燕臺正憶家故人新惠故園茶茸分玉碾聞蘭氣火暖金鐺見雪花漫道玉川陽羡蘂還如鴻漸建溪芽泠然一啜煩襟滌欲御天風弄紫霞陳繼儒山中日日試新泉君合前身老玉川石枕月侵蕉葉夢竹爐風軟落花煙點來直是窺三昧醒後翻能賦百篇却笑當年醉鄉子一生虛擲杖頭錢五言排律增唐姚合寄楊工部聞毗陵舍弟自罨溪入茶山采茶溪路好花影半浮沉畫舸僧同上春山客共尋芳新生石際幽嫩在山隂色是春光染香驚日色侵試嘗應酒醒封進定恩深芳貽千里外怡怡太府吟杜牧題宜興茶山山實東吳秀茶稱瑞草魁剖符雖俗吏修貢亦仙才溪盡停蠻棹旗張卓翠苔栁村穿窈窕松澗渡喧豗等級雲峰峻寬平洞府開拂天聞笑語特地見樓臺泉嫩黃金湧牙香紫璧裁拜章期沃日輕騎疾奔雷舞袖嵐侵潤歌聲谷答回磬音藏葉鳥雪艷照潭梅好是全家到兼為奉詔來樹隂香作帳花徑落成堆景物殘三月登臨愴一杯重逰難自尅俯首入塵埃原曹鄴故人寄茶劔外九華英緘題下玉京開時微月上碾處亂泉聲半夜招僧至孤吟對月烹碧沉霞腳碎香泛乳花輕六腑睡神去數朝詩思清用餘不敢費留伴肘書行薛能蜀州鄭使君寄鳥嘴茶鳥觜擷渾芽精靈勝鏌鋣烹嘗方帶酒滋味更無茶拒碾乾聲細撑封利穎斜銜蘆齊徑實啄木聚菁華鹽損添常誡薑宜著更誇得來拋道藥攜去就僧家旋覺前甌淺還愁後信賖千慙故人意此惠敵丹砂增宋王禹稱茶園十二韻勤王修歲貢晚駕過郊原蔽芾餘千本青蔥共一園芽新撑老葉土軟迸新根舌小侔黃雀毛獰摘緑猿出蒸香更别入焙火微溫採近桐華節生無穀雨痕緘縢防逺道進獻趂頭番待破華胥夢先經閶闔門汲泉鳴玉甃開宴壓瑶樽茂育知天意甄收荷主恩沃心同直諫苦口類嘉言未復金鑾召年年奉至尊丁謂北苑茶北苑龍茶著甘鮮的是珍四方惟數此萬物更無新才吐微茫緑初沾少許春散尋縈樹遍急採上山頻宿葉寒猶在芳芽冷未伸茅茨溪上焙藍籠雨中民長疾勾萌拆開齊分兩勻帶煙蒸雀舌和露疊龍鱗作貢勝諸道先嘗祇一人緘封瞻闕下郵傳渡江濵特旨留丹禁殊恩賜近臣啜將靈藥助用與上尊親投進英華盡初烹氣味真細香勝却麝淺色過於筠顧渚慙投木宜都愧積薪年年號供御天産壯甌閩七言排律增宋余靖和伯恭自造新茶郡庭無事即仙家野圃栽成紫笋茶疏雨半晴回暖氣輕雷初過得新芽烘褫精謹松齋靜採擷縈迂澗路斜江水薄煎萍髣佛越甌新試雪交加一槍試焙春尤早三盞搜腸句更嘉多謝彩箋貽雅貺想資詩筆思無涯五言絶句增唐張籍和韋開州盛山茶嶺紫芽連白蘂初向嶺頭生自看家人摘尋常觸露行白居易山泉煎茶有懷坐酌泠泠水看煎瑟瑟塵無由持一碗寄與愛茶人宋蘇軾贈包安靜先生皓色生甌面堪稱雪見羞東坡調詩腹今夜睡應休建茶三十片不審味如何奉贈包居士僧房戰睡魔朱子茶坂攜籯北嶺西采擷供茗飲一啜夜窗寒跏趺謝衾枕七言絶句增唐錢起與趙莒茶宴竹下忘言對紫茶全勝羽客醉流霞塵心洗盡興難盡一樹蟬聲片影斜盧綸新茶詠寄上西川相公二十三舅大夫二十舅三獻蓬萊始一嘗日調金鼎閲芳香貯之玉合寸半餅寄與阿連題數行劉禹錫嘗茶生拍芳叢鷹嘴芽老郎封寄謫仙家今宵更有湘江月照出霏霏滿碗花白居易蕭員外寄新蜀茶蜀茶寄到但驚新渭水煎來始覺珍滿甌似乳堪持玩况是春深酒渴人施肩吾蜀茗詞越碗初盛蜀茗新薄雲輕處攪來勻山僧問我將何比欲道瓊漿却畏嗔姚合乞新茶嫩緑微黃碧澗春采時聞道斷葷辛不將錢買將詩乞借問山翁有幾人李羣玉答友寄新茗滿火芳香碾麴塵吳甌湘水緑花新愧君千里分滋味寄與春風酒渴人陸希聲茗坡二月山家穀雨天半坡芳茗露華鮮春酲酒病兼消渴惜取新芽旋摘煎成彥雄煎茶嶽寺春深睡起時虎跑泉畔思遲遲蜀茶倩箇雲僧碾自拾枯松三四枝崔道融謝朱韋侍寄貺蜀茶瑟瑟香塵瑟瑟泉驚風驟雨起爐煙一甌解却山中醉便覺身輕欲上天僧靈一與亢居士青山潭飲茶野泉煙火白雲間坐飲香茶愛此山巖下維舟不忍去青溪流水暮潺潺宋林逋烹北苑茶有懷石碾輕飛瑟瑟塵乳花烹出建溪春人間絶品應難識間對茶經憶故人歐陽修和原父揚州時會堂憶昔嘗修守臣職先春自探兩旗開誰知白首來辭禁得與金鑾賜一杯梅堯臣七寶茶七物甘香雜蘂茶浮花泛緑亂於霞啜之始覺君恩重休作尋常一等誇曾鞏閏正月十一日呂殿丞寄新茶偏得朝陽借力催千金一銙過溪來曾坑貢後春猶早海上先嘗第一杯寄獻新茶種處地靈偏得日摘時春早未聞雷京師萬里爭先到應得慈親手自開蹇磻翁寄新茶二首龍焙嘗茶第一人最憐溪岸兩旗新肯分方銙醒衰思應恐慵眠過一春貢時天上雙龍去鬬處人間一水爭分得餘甘慰憔悴碾嘗終夜骨毛清嘗新茶麥粒收來品絶倫葵花製出樣爭新一杯永日醒雙眼草木英華信有神王安石寄茶與和甫綵絳縫囊海上舟月團蒼潤紫煙浮集英殿裏春風晚分到并門想麥秋寄茶與平甫碧月團團墮九天封題寄與洛中仙石樓試水宜頻啜金谷看花莫漫煎黃庭堅戲答荆州王克道烹茶二首茗碗難加酒碗醇暫時扶起藉糟人何須忍垢不濯足苦學梁州隂子春龍焙東風魚眼湯箇中即是白雲鄉更煎雙井蒼鷹爪始耐落花春日長謝公擇舊分賜茶三首外家新賜蒼龍璧北焙風煙天上來眀日蓬山破寒月先甘和夢聽春雷文書滿案惟生睡夢裏鳴鳩喚雨來乞與降魔大圎鏡真成破柱作驚雷細題葉字包青箬割取丘郎春信來拚洗一春湯餅睡亦知清夜有蚊雷以潞公所惠揀芽送公擇次舊韻慶雲十六升龍樣國老元年密賜來披拂龍文射牛斗外家英鑒似張雷奉同公擇作揀芽詠赤囊歲上雙龍璧曾見前朝盛事來想得天香隨御所延春閣道囀輕雷今歲官茶極妙難為賞音者戲作兩詩用前韻雞酥狗蝨難同味懷取君恩歸去來青蒻湖邉尋顧陸白蓮社裏覓宗雷乳花翻碗正眉開時若渴羌衝熱來知味者誰心已許維摩雖默語如雷奉同六舅尚書詠茶碾煎烹三首要及新香碾一杯不應傳寶到雲來碎身粉骨方餘味莫厭聲喧萬壑雷風爐小鼎不須催魚眼長隨蟹眼來深注寒泉收第一亦防枵腹爆乾雷乳粥瓊糜露腳回色香味觸映根來睡魔有耳不及掩直拂繩牀過疾雷謝人惠茶一規蒼玉琢蜿蜒藉有佳人錦假鮮莫笑持歸淮海去為君重試大眀泉朝補之和答曾敬之祕書見招能賦堂烹茶玉泉吟鼎月隳輪姑射風標兩絶塵只欠何郎窗畔雪戎葵為我作餘春一碗分來百越春玉溪小暑却宜人紅塵他日同回首能賦堂中偶坐身次韻提刑毅甫送茶炮羔煮餅漸宜秦愁絶江南一味真健步逺梅安用插鷓鴣金盞有餘春孫覿李茂嘉寄茶蠻珍分到謫仙家斷璧殘璋裹絳紗擬把金叉候湯眼不將白玉伴脂麻周必大送陸務觀赴七閩提舉常平茶事暮年桑苧毁茶經應為征行不到閩今有雲孫持使節好因貢焙祀茶人陸遊同何元立蔡肩吾至東丁院汲泉煮茶雲芽近自峩睂得不減紅囊顧渚春旋置風爐清樾下他年竒事屬三人飯罷碾茶戲書江風吹雨暗衡門手碾新茶破睡昏小餅龍團供玉食今年也到浣花村試茶北窗髙卧鼾如雷誰遣香茶挽夢回緑地毫甌雪花乳不妨也道入閩來晝卧聞碾茶小醉初消日未晡幽窗催破紫雲腴玉川七碗何須爾銅碾聲中睡已無戴昺嘗茶自汲香泉帶落花漫燒石鼎試新茶緑隂天氣間庭院卧聽黃蜂報晚衙徐意一北苑茶詞官焙春綱入貢時擔頭獵獵小黃旗甘香不羡嘗陽羡密待天顔喜可知金劉著伯堅惠新茶建溪玉餅號無雙雙井為奴日鑄降忽聽松風翻蟹眼却疑春雪落寒江馮璧東坡海南烹茶圖講筵分賜密雲龍春夢分眀覺亦空地惡九鑽黎洞火天遊兩腋玉川風眀施漸贈歐道士賣茶靜守黃庭不煉丹因貧却得一身間自看火候蒸茶熟野鹿銜筐送下山陸容送茶僧江南風致説僧家石上清香竹裏茶法藏名僧知更好香煙茶暈滿袈裟原王德操謝人送茶穀雨年年僧送茶近來無復及貧家伏龍手製能分餉活火新泉試落霞御定佩文齋廣羣芳譜卷二十
