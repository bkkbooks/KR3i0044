body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷二十一茶譜茶四集藻詩散句増宋沈遼新陽一日至東風方獵獵百草尚勾萌靈芽已先㨗所採僅毛髪厥工巧烹爕甘泉列盎􅚚熾炭浩旁疊修竹為之規黄金為之挾形摹各臻妙製作易妥帖至尊所虛佇守臣方惕懾其上為虬龍蜿蜒奮鱗鬛稍降乃交鳯文翼相盤貼函封趨北道驛使互防挟四方老金玉議論誰敢輙徐璣臘餘春未新素質藴芳菲千夫喏登壠呌嘯風雷隨雪芽細若針一夕吐清竒天地發寳秘鬼神不敢知舊制尊御膳授職各有司分綱製品目簿尉監視之雖有領督官安敢専所為初綱七七銙次綱數弗差一以薦郊廟二以瀹賓夷天子且謙受他人奚可希唐鄭遇嫩芽香且靈吾謂草中英夜月和烟擣寒爐對雪烹宋梅堯臣十片建溪春乾雲碾作塵天王初受貢楚客已烹新張商英壑源山勢上連雲全占南州第一春自有化工鍾粹氣特生靈葉奉嚴宸楊萬里白錦秋鷹微露𤓰青瑶曉樹未成芽松梢鼔吹濤翻鼎甌面雲烟乳作花鄭清之一杯春露暫留客兩腋清風幾欲仙可但喚回槐國夢不妨更舉趙州禪戴翼騷客醉眠腸正苦睡魔退聽骨先寒未堪八餅供龍焙且遣一旗登虎壇増晋張載芳茶冠六情溢味播九區唐杜甫落日平臺上春風啜茗時張籍藥看辰日合茶過卯時煎原白居易留餳和冷粥出火煑新茶増于鵠鹿裘長酒氣茅屋有茶烟溫庭筠採茶溪樹緑煑藥石泉清許渾曬藥竹齋暖擣茶松院深宋錢惟演春茶泛雪液曉飯薦蘭蒸宋庠香濃烟穗直色嫩乳花圓宋祁甌潔凝芳乳羅纖撼縹塵梅堯臣湯嫩乳花浮香新舌甘永歐陽修共約試新茶槍旗幾時綠王安石酒醪猶羙好茶荈正芳新原蘇軾赤泥開方印紫餅截圓玉黄庭堅建溪有靈草能脫詩人骨増陸游兎甌泛玉塵香雪兩超勝張舜民玉尺鋒稜聳銀槽様度窊戴復古開甕嘗春酒租山摘早茶陳與義何以同嵗暮共此晴雲椀原眀陸樹聲風鼎翻雲液春芽熟乳花増唐李嘉祐幸有香茶留釋子不堪秋草送王孫白居易閒吟工部新來句渇飲毘陵逺到茶春風小榼三升酒寒食深爐一椀茶李渉山中朅來採新茗新花亂發前山頂崔珏銀甌貯浪水一掬松雨聲来乳花熟宋宋祁初笋一槍知採候亂花三沸記烹時文彦博舊譜最稱蒙頂味露芽雲液勝醍醐余靖僧来便學嘗茶訣白乳旗槍帶露收梅堯臣㨂芽㡬日始能就碾月一罌初霽来王珪雲疊亂花爭一水鳳團雙影貢先春黄夷簡宿雨一番蔬甲嫩春山幾倍茗旗香蘇軾獨攜天上小團月来試人間第二泉紅焙淺甌新活火龍團小碾鬭晴窗何湏魏帝一丸藥且盡盧仝七椀茶上人問我遲留意待賜頭綱八餅茶張舜民官園老兵朝入城報道新芽已堪摘香如桃蕊色如麯蟹眼松聲浮艾葉黄庭堅香苞解盡寳帶銙墨面碾出明窗塵眺補之閭侯貢璧琢蒼玉中有掉尾寒潭龍陳師道得諾向来輕季子打門何日走周公洪芻松鳴湯鼎茶初熟雪壓爐灰水漸低王庭珪玉局偶然留妙語焦坑從此貴新茶周必大商嶺烹來思舊漾洛泉煎處歎新芽陸游茶分正焙新開箬水浥中泠自候湯戴復古午枕不成春草夢落花風静煑茶香戴昺磚爐春煑兎毫玉石鼎月翻魚眼湯元張翥茶香夜煑苓泉活琴思秋翻鶴帳清唐王維石脣安茶臼李嘉祐綠茗盖春山孟郊茗啜綠净花于鵠擣茶書院静白居易陽叢抽茗芽籠暖焙茶煙茶香飄紫筍破睡見茶功朱慶餘綠茗香醒酒許渾秋茶垂露細露茗山厨焙薛能茶羙夢初驚皮日休煎茶拾野巢鄭谷茶香紫笋露李中茶美睡心爽泉美茶香異僧修睦茶碾去年春宋林逋閣掩茶烟晩余靖茶圃一旗春王安石浮荈白雲香水甘茶串香陸游村女賣秋茶懐茶就井煎元黄庚茶煎榖雨春李孝光茶香鄰屋借郭鈺紅雨長茶芽唐白居易渇嘗一椀綠昌明酒渇春深一椀茶李洞顧渚香浮瀹茗花張蠙籠開鸚鵡報煎茶韓偓一甌香沫火前茶盧延讓茶香時潑澗中泉宋楊億茗粥露芽銷晝夢林逋霏霏茶靄出松梢宋祁採憶春山露滿旗蘇軾細雨足時茶户喜晁補之破睡槍旗引興長陸游日鑄珍芽開小缶睡起何妨自磑茶北苑茶新帶銙方長毫甌小聚茶香戴復古入峽先租榖雨茶金王元節又将新火試新茶劉鐸新詩吟罷自煎茶元袁桷側岸採茶􅒱石火倪瓚人語烟中始焙茶春茶已放仙人掌山中茶焙隔林烟竹林烟幕煑茶香明王世貞隠囊匡坐自煎茶窗前竹色分茶盌何景眀茗葉松花進晩餐徐渭䨇棗沉茶紫繭微詞増金蔡伯堅好事近天上賜金奩不减壑源三月午椀春風纖手看一時如雪幽人只慣茂林前松風聴清絶無奈十年黄卷向枯腸搜徹髙士談好事近誰扣玉川門白絹斜封團月晴日小窗活火響一壺春雪可憐桑苧一生顛文字更清絶真擬駕風歸去把三山登徹宋黄庭堅阮郎歸摘山初製小龍團色和香味全碾聲初㫁夜将䦨烹時鶴避烟消滯思解塵煩金甌雪浪翻只愁啜罷月流天餘清攪夜眠又烹茶留客駐雕鞍有人愁逺山别郎容易見郎難月斜窗外山歸去後憶前歡畫屏金博山一杯春露莫留殘與郎扶玉山又歌停檀板舞停鸞髙陽飲興闌獸烟噴盡玉壺乾香分小鳳團雪浪淺露花圓捧甌春笋寒絳紗籠下躍金鞍歸時人倚欄又黔中桃李可尋芳摘茶人自忙月團犀胯鬭圓方研膏入焙香青箬裹絳紗囊品髙聞外江酒闌傳盌舞紅裳都濡春味長原謝逸武陵春畫燭籠紗紅影亂門外紫騮嘶分破雲團月影虧雪浪皺清漪捧盌纖纖春笋瘦乳霧泛氷甆兩腋清風拂袖飛歸去酒醒時増蘇軾西江月龍焙今年絶品谷簾自古珍泉雪芽䨇井散神仙苖裔来從北苑湯發雲膄釅白盞浮花乳輕圓人間誰敢更争妍鬭取紅窗白面黄庭堅西江月龍焙頭綱春草谷簾第一泉香已醺浮蟻嫩鵝黄想見翻匙雪浪兎褐金絲寳盌松風蟹眼新湯無因更發次公狂甘露來從仙掌踏莎行畫皷催春蠻歌走向火前一焙争春長低株摘盡到髙株髙株别是閩溪様碾破春風香凝午帳銀瓶雪滚翻輕浪今宵無睡酒醒時摩圍影在秋江上蘇軾行香子綺席纔終歡意猶濃酒䦨時髙興無窮共誇君賜初拆臣封看分香餅黄金縷密雲龍鬬贏一水功敵千鍾覺凉生兩腋清風暫留紅䄂少却紗籠放笙歌散庭館静畧從容黄庭堅品令鳳舞團團餅恨分破教孤另金渠體淨隻輪慢碾玉塵光瑩湯響松風早减了二分酒病味濃香永醉鄉路成佳境恰如燈下故人萬里歸來對影口不能言心下快活自省党懐英青玉案紅莎綠蒻春風餅趁梅驛來雲嶺紫柱崖空瓊竇冷佳人却恨等閒分破縹緲䨇鸞影一甌月露心魂醒更送清歌助幽興痛飲休辭今夕永與君洗盡滿襟煩暑别作髙寒境米芾滿庭芳雅燕飛觴清談揮麈使君髙會羣賢密雲䨇鳳初破縷金團窗外爐烟自動開缾試二品香泉輕濤起香生玉麈雪濺紫甌圓嬌鬟宜美盻䨇擎翠䄂稳歩紅蓮坐中客翻愁酒醒歌䦨㸃上紗籠畫燭花驄弄月影當軒頻相顧餘歡未盡欲去且留連黄庭堅滿庭芳北苑龍團江南鷹爪萬里名動京關碾深羅細瓊蕊暖生烟一種風流氣味如甘露不染塵凡纖纖捧水甆瑩玉金縷鷓鴣斑相如方病酒銀瓶蟹眼波怒濤翻為扶起樽前醉玉頽山飲罷風生兩腋醒魂到明月輪邉歸來晩文君未寢相對小窗前蘇軾水調歌頭已過幾番雨前夜一聲雷槍旗爭戰建溪春色占先魁採取枝頭雀舌帶露和烟擣碎結就紫雲堆輕動黄金碾飛起綠塵埃老龍團真鳳髓㸃将來兎毫盞裏霎時滋味舌頭回喚醒青州從事戰退睡魔百萬夢不到陽臺兩腋清風起我欲上蓬萊黄庭堅看花回夜永蘭堂醺飲半倚頹玉爛漫墜鈿墮履是醉時風景花暗殘燭歡意未䦨舞燕歌珠成㫁續催茗飲旋煑寒泉露井缾竇響飛瀑纖指緩連環動觸漸泛起滿甌銀粟香引春風在手似粤嶺閩溪初采盈掬暗想當時探春連雲尋篁竹怎歸得鬢将老付與杯中緑别錄原世説簡文云劉尹茗柯有實理注謂如茗之枝柯雖小中有實理非外博而中虚也増顧渚山茶記顧渚山中有鳥如鸜鵒而色蒼每至正二月作聲曰春起也三四月云春去也採茶人呼為喚春鳥原東坡雜記茶欲其白常患其黒墨則反是然墨磨隔宿則色暗茶碾過日則香減頗相似也茶以新為貴墨以古為佳又相反矣茶可于口墨可于目蔡君謨老病不能飲則烹而玩之呂行甫好藏墨而不能書則時磨而小啜之此又可以發來者之一笑也温公與子瞻論茶墨云茶與墨二者正相反茶欲白墨欲黒茶欲重墨欲輕茶欲新墨欲陳子瞻云上茶妙墨俱香是其徳同也皆堅是其操同也譬如賢人君子黔晳美惡之不同其徳操一也温公以為然山谷集相茶瓢與相卭竹同法不欲肥而欲瘦但湏飽風霜耳増演繁露東坡後集二從駕景靈宮詩云病貪賜茗浮銅葉按今御前賜茶皆不用建盞用大湯􅜔色正白但其制様似銅葉湯􅜔耳銅葉色黄褐色也資暇錄始建中蜀相崔寜之女以茶杯無襯病其熨指取楪子承之既啜而杯傾乃以蠟環楪子之央其杯遂定即命匠以漆環代蠟進於蜀相蜀相竒之為製名而話於賔親人人為便用於代是後傳者更環其底愈新其製以至百狀焉貞元初青鄆油繪為荷葉形以襯茶椀别為一家之楪今人云杔子始此非也蜀相即今昇平崔家茶史劉曄字子儀嘗與劉筠飲茶問左右湯滚也未衆曰已滚筠曰僉曰鯀哉燁應聲曰吾與㸃也原種植茶性惡水宜肥地斜坡隂地走水處用糠與焦土種之每一圈可用六七十粒覆土厚一寸出時勿耘草旱以米泔水澆常以小便糞水或蠶沙壅之水浸根必死三年後可採茶凡種相離二尺一叢増大觀茶論植産之地崖必陽圃必隂盖石之性寒其葉抑以瘠其味疎以薄必資陽和以發之土之性敷其葉疏以暴其味強以肆必資隂䕃以節之隂陽相濟則茶之滋長得其宜茶解茶地南向為佳向隂者遂劣故一山之中美惡大相懸也茶固不宜加以惡木惟桂梅辛夷玉蘭玫瑰蒼松翠竹與之間植足以蔽覆霜雪掩映秋陽其下可植芳蘭幽菊清芬之物最忌菜畦相逼不免渗漉滓厥清真原採造採茶以榖雨前者佳製茶擇淨微蒸候變色攤開扇去氣揉做畢火氣焙乾以箬葉包之語曰善蒸不若善炒善曬不如善焙盖茶以炒而焙者佳耳増西溪叢語建州龍焙面北謂之北苑有一泉極清澹謂之御泉用其池水造茶即壊茶味唯龍團勝雪白茶二種謂之水芽先蒸後揀每一芽先去外兩小葉謂之烏帶又次取兩嫩葉謂之白合留小心芽置於水中呼為水芽聚之稍多即研焙為二品即龍團勝雪白茶也大觀茶論茶工作於驚蟄尤以得天時為急輕寒英華漸長條逹而不廹茶工從容致力故其色味兩全若或時暘鬱燠芽甲奮暴促工暴力隨槁晷刻所廹有蒸而未及壓壓而未及研研而未及製茶黄留積其色味所失已半故焙人得茶天為慶擷茶以黎明見日則止用爪㫁芽不以指揉慮氣汙熏漬茶不鮮㓗故茶工多以新汲水自隨得芽則投諸水凡芽如雀舌榖粒者為鬭品一鎗一旗為揀芽二鎗二旗為次之餘斯為下茶之始芽萌則有白合既擷則有烏帶白合不去害茶味烏帶不去害茶色茶之美惡尤係于蒸芽壓黄之得失蒸太生則芽滑故色清而味烈過熟則芽爛故茶色赤而不膠壓乆則氣竭味漓不及則色暗味澁蒸芽欲及熟而香壓黄欲膏盡亟止如此則製造之功十已得七八矣滌芽惟潔濯器惟淨蒸壓惟其宜研膏惟熱焙火惟良飲而有少砂者滌濯之不精也文理燥赤者焙火之過熟也夫造茶先度日晷之短長均工力之衆寡㑹采擇之多少使一日造成恐茶過宿則害色味北苑别録采茶之法湏是侵晨不可見日晨則夜露未晞茶芽肥潤見日則為陽氣所薄使芽之膏腴内耗至受水而不鮮明故每日常以五更撾鼔集羣夫于鳳凰山監采官人給一牌入山至辰刻則復鳴鑼以聚之恐其踰時貪多務得也茶錄茶有真香而入貢者微以龍腦和膏欲助其香建安民間試茶皆不入香恐奪其真若烹㸃之際又雜珍菜香草其奪益甚正當不用茶味主於甘滑惟北苑鳳凰山連属諸焙所産者味佳隔溪諸山雖及時加意製作色味皆重莫能及也又有水泉不甘能損茶味前世之論水品者以此煑泉小品茶之團者片者皆出于碾磑之末既損真味復加油垢即非佳品總不若今之芽茶也葢天然者自勝耳曽茶山日鑄茶詩寳銙自不乏山芽安可無蘇子瞻壑源試焙新茶詩要知玉雪心腸好不是膏油首面新是也且末茶瀹之有屑滯而不爽知味者當自辨之芽茶以火作者為次生曬者為上亦更近自然且斷烟火氣耳况作人手器不㓗火候失宜皆能損其香色也生曬茶瀹之瓶中則槍旗舒暢清翠鮮明尤為可愛茶疏清明榖雨摘茶之候也清明太早立夏太遲榖雨前後其時適中若肎再遲一二日期待其氣力完足香烈尤倍易于收藏雖稍長大故是嫩枝柔葉也生茶初摘香氣未透必借火力以發其香然性不耐勞炒不宜乆多取入鐺則手不匀乆于鐺中過熟而香散矣甚且枯焦何堪烹㸃炒茶之器最忌新鐡鐡腥一入不復有香尤忌脂膩害甚于鐡湏豫取一鐺耑用炊飯無得别作他用炒茶之薪僅可樹枝不用幹葉幹則火力猛熾葉則易燄易滅鐺必磨瑩旋摘旋炒一鐺之内僅容四兩先用文火次用武火催之手加木指急急鈔轉以半熟為度微俟香發是其候矣􅔩茶不炒甑中蒸熟然後烘焙緣其摘遲枝葉微老炒亦不能使軟徒枯碎耳亦有一種極細炒􅔩乃采之他山炒焙以欺好竒者彼中甚愛惜茶决不忍乘嫩摘採以傷樹本􅔩茶箋採茶雨前則精神未足夏後則梗葉太麤然茶以細嫩為妙湏當交夏時看風日晴和月露初收親自監採入籃烈日之下又防籃内鬱蒸須傘葢至舍速傾淨􅀢薄攤細揀枯枝病葉蛸絲青牛之類一一剔去方為精潔也蒸茶須看葉之老嫩定蒸之遲速以皮梗碎而色帶赤為度若太熟則失鮮其鍋内須頻換水葢熟湯能奪茶味也茶焙每年一修修時雜以濕土便有土氣先将乾柴隔宿薫燒令焙内外乾透先用麤茶入焙次日然後以上品焙之焙上之簾又不可用新竹恐惹竹氣又湏匀攤不可厚薄如焙中用炭有烟者急剔去又宜輕搖大扇使火氣旋轉竹簾上下更換若火太烈恐黏焦氣大煖色澤不佳不易簾又恐乾濕不匀須要看到茶葉梗骨處俱已乾透方可并作一簾或兩簾寘在焙中最髙處過一夜仍将焙中炭留數莖于灰燼中微烘之至眀早可收藏矣屠隆茶箋採茶不必太細細則芽初萌而味欠足不必太青青則茶已老而味欠嫩湏在榖雨前後覓成梗帶葉微綠色而團且厚者為上聞龍茶箋茶初摘時湏揀去枝梗老葉惟取嫩葉又湏去尖與柄恐其易焦此松蘿法也炒時湏一人從傍扇之以祛熱氣否則黄色香味俱減炒起出鐺時置大磁盤中仍湏急扇令熱氣稍退以手重揉之再散入鐺文火炒乾入焙葢揉則其津上浮㸃時香味易出田子藝以生曬不炒不揉者為佳亦未之試耳原貯茶茶之味清而性易移藏法喜温燥而惡冷濕喜清凉而惡蒸鬱喜清獨而忌香臭藏用火焙不可曬入磁瓶密封口毋令濕氣得侵又勿令洩氣安頓湏在坐臥之處逼近人氣則常温不寒必在板房則燥土室則蒸又要透風勿置幽隐之處尤易蒸濕兼恐有失㸃檢世人多用竹器貯茶雖復多用箬䕶然箬性峭勁不甚伏帖風濕易侵至于地爐中頓萬萬不可人有以竹器盛茶置被籠中用火即黄除火即潤忌之忌之茶性畏紙紙成于水中受水氣多也紙裹一夕隨紙作氣茶味盡矣雖火中焙出少頃即潤日用所湏貯小罌中箬包苧紥亦勿見風時用火焙不可曬宜置之案頭勿近有氣味物若茶多者藏宜用磁甕大容一二十觔四圍厚箬中貯茶湏極燥極新專供此事乆乃愈佳不必嵗易茶湏築實仍用厚箬填𦂳甕中加以箬以真皮紙包之苧麻𦂳紥壓以大新磚勿令微風得入可以接新其閣庋之方宜磚底數層四圍磚砌形若火爐愈大愈善勿近土墻頓甕其上隨時取竈下火灰候冷簇于甕傍半尺以外仍隨時取火灰簇之令裏灰常燥以避風濕却忌火氣入甕則能黄茶増茶錄藏茶宜蒻葉而畏香藥喜温燥而忌濕冷故收藏之家以蒻葉封裹入焙中兩三日一次用火常如人體温温則禦濕潤快雪堂漫錄徐茂吳云藏茶法實茶大甕底置箬封固倒放則過夏不黄以其氣不外泄也子晋云當倒放有葢缸内缸宜砂底則不生水而常燥時常封固不宜見日見日則生翳損茶色矣藏又不宜熱處新茶不宜驟用過黄梅其味始足茶箋藏茶新淨磁罈週廻用乾箬葉密砌将茶漸漸装進揺實不可用手掯上覆乾箬數層又以火炙乾炭鋪罈口紥固近有以夾口錫器貯茶者更燥更密葢磁罈猶有微罅透風不如錫者堅固也原烹茶世人情性嗜好各殊而茶事則十人而九竹爐火候茗椀清緣煑引風之碧雲傾浮花之雪乳非藉湯勲何昭茶徳畧而言之其法有五一擇水水泉不羙茶味頓失山泉為上江水次之如用井水湏多汲者佳若混濁醎苦切忌不可用二簡器砂䂪煑水磁壺注湯白甌供酌咸為上品然湏㸃簡淨潔若近腥羶油膩等物則茶之真味俱敗三曰忌混茶性最嬌易惹諸味若以一切香辣鹹甜之物㸃茶則茶味槩被混擾四曰慎烹煮李約性能辨茶嘗曰茶湏緩火炙活火煎活火謂炭之有㷔者當使湯無妄沸庶可養茶始則魚目散布微微有聲中則四邉泉湧纍纍連珠終則騰波皷浪水氣全消謂之老湯取起待沸止湯清用以㸃茶冲美清快茶味始全三沸之法非活火不可若柴薪濃烟最損茶味顧况云文火細烟小鼎長泉蘇子瞻云活水仍湏活火烹自臨釣石汲深清文衡山云瓦瓶新汲山泉水紗㡌籠頭手自煎又東坡煎茶歌蟹眼已過魚眼生颼颼欲作松風鳴蒙茸出磨細珠落眩轉遶甌飛雪輕又謝宗論茶候蟾背之芳香觀蝦目之沸湧皆可謂深于茶者五曰辨色未㸃之先湏以温湯洗茶去其塵土冷氣壺甌亦宜泡淨拭乾然後酌茶則碧綠清香色味俱全如茶潔淨勿洗増茶經其火用炭次用勁薪其炭曽經燔炙為膻膩所及及膏木敗器不用之古人有勞薪之味信哉其水用山水上江水中井水下其山水揀乳泉石池漫流者上其瀑湧湍潄勿食之乆食令人有頸疾又多别流於山谷者澄浸不洩自火天至霜郊以前或潜龍蓄毒於其間飲者可决之以流其惡使新泉涓涓然酌之其江水取去人逺者井取汲多者其沸如魚目微有聲為一沸縁邉如湧泉連珠為二沸騰波皷浪為三沸已上水老不可食也初沸則水合量調之以鹽味謂棄其啜餘無廼􅷮􅲃而鍾其一味乎第二沸出水一瓢以竹筴環激湯心則量未當中心而下有頃勢若奔濤濺沫以所出水止之而育其華也凡酌置諸椀令沫餑匀沫餑湯之華也華之薄者曰沫厚者曰餑細輕者曰花如棗花漂漂然於環池之上又如廻潭曲渚青萍之始生又如晴天爽朗有浮雲鱗然其沫者若綠錢浮于水湄又如菊英墮于樽俎之中餑者以滓煑之及沸則重華累沫皤皤然若積雪耳荈賦所謂煥如積雪曄若春敷有之第一煑水沸而棄其沫之上有水膜如黒雲母飲之則其味不正其第一者為雋永或留熟以貯之以傋育華救沸之用諸第一與第二第三盌次之第四第五盌外非渇甚莫之飲凡煑水一升酌分五盌乘熱連飲之以重濁凝其下精英浮其上如冷則精英隨氣而竭飲啜不消亦然矣茶性儉不宜廣則其味黯淡且如一滿盌啜半而味寡况其廣乎其色縮也其罄􅸆也其味甘檟也不甘而苦荈也啜苦咽甘茶也採茶錄代宗朝李季卿刺湖州至維揚逄陸鴻漸抵楊子驛将食李曰陸君别茶聞揚子南􅍽水又殊絶今者二妙千載一遇命軍士謹慎者深入南􅍽陸利器以俟俄而水至陸以杓揚水曰江則江矣非南􅍽似臨岸者使者曰某棹舟深入見者累百敢有紿乎陸不言既而傾諸盆至半陸遽止之又以杓揚之曰自此南􅍽者矣使者蹶然馳白某自南􅍽賫至岸舟蕩覆過半懼其尠挹岸水増之處士之鍳神鍳也某其敢隐焉原清異錄沙門福全能注湯幻茶成詩一句並㸃四甌泛乎湯表檀越日造門求觀湯戲全自咏詩曰生成􅀢裏水丹青巧畫工夫學不成却笑當年陸鴻漸煎茶贏得好名聲増清異録茶至唐始盛近世有下湯運七别施妙訣使茶紋水脉成物象者禽獸蟲魚花草之屬纖巧如畫但湏臾即就散滅此茶之變也時人謂之茶百戲潘子真詩話葉濤詩極不工而喜賦詠嘗有試茶詩云碾成天上龍兼鳳煑出人間蟹與蝦好事者戲云此非試茶乃碾玉匠人嘗南食也澄懐錄蔡君謨湯取嫩而不取老為團餅茶發耳今旗芽槍甲湯不足則茶神不透茶色不明故茗戰之㨗尤在五沸聞雁齋筆談茶既就筐其性必發於日而遇知己於水然非煑之茶竈茶爐則亦不佳故曰飲茶富貴之事也趙長白自言吾生平無他幸但不曽飲井水耳此老于茶可謂能盡其性者今亦老矣甚窮大都不能如曩時猶摩挲萬卷中作茶史故是天壤間多情人也茶箋茶壺以小為貴每一客壺一把任其自斟自飲方為得趣何也壺小則香不渙散味不躭閣况茶中香味不先不後只有一時太早則未足太遲則已過見得恰好一㵼而盡化而裁之存乎其人茶解烹茶宜甘泉次梅水梅雨如膏萬物頼以滋飬其味獨甘梅後便不堪飲羅􅔩茶記烹茶水之功居六無泉則用天水秋雨為上梅雨次之秋雨冽而白梅雨醇而白雪水五谷之精也色不能白茶説湯者茶之司命故候湯最難未熟則茶浮于上謂之嬰兒湯而香則不能出過熟則茶沉于下謂之百夀湯而味則多滯善候湯者必活火急扇水面若乳珠其聲如松濤此正湯候也器具精潔茶愈為之生色今時姑蘇之錫注時大彬之沙壺汴梁之湯銚湘妃竹之茶竈宣成窰之茶盞髙人詞客賢士大夫莫不為之珍重即唐宋以来茶具之精未必有如斯之雅致原用茶神農食經茶茗乆服令人有力悅志博物志飲真茶令人少眠華陀食論茶乆服益意思壺居士食忌苦茶乆食羽化與韮同食令人體重陶𢎞景雜錄芳茶輕身換骨昔丹丘子黄山君服之東坡集除煩去膩世固不可以無茶然暗中損人殆謂不少増廣雅荆巴間採葉作餅葉老者餅成以米膏出之欲煑茗飲先炙令赤色搗末置瓷器中以湯澆覆之用葱薑橘子芼之其飲醒酒原拌茶鄴侯家傳唐徳宗好茶加酥椒之類李泌戲為詩旋沫翻成碧玉池添酥散作琉璃眼茶譜木樨茉莉玫瑰薔薇蕙蘭蓮橘梔子木香梅花皆可作茶諸花開時摘其半含半放蕊之香氣全者量其茶葉多少摘花為茶三停茶一停花用磁礶一層茶一層花相間至滿紙箬縶固入鍋重湯煑之取出待冷用紙封裹火上焙乾收用増茶譜蓮花茶于日未出時将半含蓮花撥開放細茶一撮納滿蕊中以麻皮畧縶令其經宿次早摘花傾出茶葉用建紙包茶焙乾再如前法又将茶葉入别蕊中如此者數次取出焙乾收用不勝香美清異錄漏影春法用鏤紙貼盞糝茶而去紙偽為花身别以荔肉為葉松實鴨脚之類為蕊沸湯㸃攪原東坡雜記唐人煎茶用薑故薛能詩云鹽損添常戒薑宜著更誇據此則又有用鹽者矣近世有用此二物者輙大笑之然茶之中等者用薑煎信佳也鹽則不可増乾淳嵗時記禁中大慶會用大鍍金􅜔以五色果簇飣龍鳳謂之繡茶雲林遺事倪元鎮素好飲茶在惠山中用核桃松子肉和真粉成小塊如石状置茶中名曰清泉白石茶有趙行恕者宋宗室也慕元鎮清致訪之坐定童子供茶行恕連啖如常元鎮艴然曰吾以子為王孫故出此品乃畧不知風味真俗物也自是交絶原鬭茶茶錄建安鬭茶以水㾗先沒者為負耐乆者為勝相去一水兩水耳増茶錄茶色貴白而餅茶多以珍膏油其面故有青黄紫黒之異善别茶者正如相工之眎人氣色也隐然察之於内以肉理潤者為上既已末之黄白者受水昬重青白者受水詳明故建安人鬭試以青白勝黄白原収子寒露収茶子曬乾以濕沙土拌勻盛筐内附見論水洞庭張山人云山頂泉清而輕山下泉清而重石中泉清而甘沙中泉清而冽土中泉清而厚流動者良於安静負隂者勝于向陽山削者泉寡山秀者有神真源無味真水無香惠山寺東為觀泉亭堂曰漪瀾泉在亭中二井石甃相去只尺方圓異形汲者多由圓井葢方動圓静静清而動濁也流過漪瀾從石龍口中出下赴大池者有土氣不可汲泉流冬夏不涸張又新品為天下第二泉食物本草梅雨時置大缸收水煎茶甚美經宿不變色易味貯瓶中可經乆梅雨水洗癬疥滅瘢㾗入醤令易熟沾衣便腐澣垢如灰汁有異它水孫真人云凡遇山水塢中出泉者不可乆居常食作癭病凡隂地冷水不可飲飲之必作疾瘧歐陽修大明水記世傳陸羽茶經其論水云山水上江水次井水下又云山水乳泉石池漫流者上瀑湧湍潄勿食食乆令人有頸疾江水取去人逺者井水取汲多者其説止于此而未嘗品第天下之水味也至張又新為煎茶水記始云劉伯蒭謂水之宜茶者有七等又載羽為李季卿論水次第有二十種今考二説與羽茶經皆不合羽謂山水上而乳泉石池又上江水次而井水下伯蒭以楊子江為第一惠山石泉為第二虎邱石井為第三丹陽寺井為第四揚州大明寺井水為第五而松江第六淮水第七與羽説相反季卿所説二十水廬山康王谷水第一無錫惠山石泉第二蘄州蘭谿石下水第三扇子峽蝦􅂒口水第四虎邱寺井水第五廬山招賢寺下方橋潭水第六楊子江南零水第七洪州西山瀑布泉第八桐柏淮源第九廬州龍池山頂水第十丹陽寺井水第十一揚州大眀寺井第十二漢江南零水第十三玉虚洞香谿水第十四武關西水第十五松江水第十六天台千丈瀑布水第十七桞州圓泉第十八嚴陵灘水第十九雪水第二十如蝦􅂒口水西山瀑布天台千丈瀑布皆羽戒人勿食食之生疾其餘江水居山水上井水居江水上皆與茶經相反疑羽不當二説以自異使誠羽説何足信也得非又新妄附益之耶其述羽辯南零岸水特怪誕甚妄也水味有美惡而已欲舉天下之水一一而次第之者妄説也故其為説前後不同如此羽之論水惡渟浸而喜泉源故井取多汲者江雖長流然衆水雜聚故次山水惟此説近物理云浮槎山水記浮槎山在慎縣南三十五里或曰浮闍山或曰浮巢二山其事出于浮圖老子之徒荒怪誕妄之説其上有泉自前世論水者皆弗道予嘗讀茶經愛陸羽善言水後得張又新水記載劉伯蒭李季卿所列次第以為得之于羽然以茶經考之皆不合又新狂妄險譎之士其言難信頗疑非羽之説及得浮槎山水然後益知羽為知水者浮槎與龍池山皆在廬州界中較其味不及浮槎逺甚而又新所記以龍池為第十浮槎之水棄而不錄以此知其所失多矣羽則不然其説曰山水上江次之井為下山水乳泉石池漫流者上其言雖簡而於論水盡矣浮槎之水發自李侯嘉祐二年李侯以鎮東軍留後出守廬州因遊金陵登蔣山飲其水又登浮槎至其山上有石池涓涓可愛葢羽所謂乳泉漫流者也飲之而甘乃考圖記問故老得其事迹因以其水遺予於京師故予為誌其事俾世知其泉發自李侯始也東坡集予頃自汴入淮泛江沂峽歸蜀飲江淮水葢彌年既至覺井水腥澀百餘日然後安之以此知江水之甘于井也審矣今來嶺外自楊子始飲江水及至南康江益清駛水益甘則又知南江賢于北江也近度嶺入清逺峽水色如碧玉味益勝今游羅浮酌泰禪師錫杖泉則清逺峽水又在其下矣嶺外惟惠人喜鬭茶此水不虚出也附録茶花増草花譜茗花即食茶之花色月白而黄心清香隠然瓶之髙齋可為清供佳品且蕊在枝條無不開遍集藻五言古詩増元朱徳潤題白茶花屏秋髙銀河㵼碧宇浄如洗飛仙自天來幻作白茶蕊清香不自媚迥出山谷底盈盈䨇玉環婉立庭户裏風霜非故林雨露結新意七言律詩増宋蘇轍茶花二首黄蘖春芽大麥麤傾山倒谷採無餘只疑殘枿陽和盡尚有幽花霰雪初耿耿清香崖菊淡依依秀色嶺梅如經冬結子猶堪種一畝荒園試為鉏細嚼花鬚味亦長新芽一粟葉間藏稍經臘雪侵肌瘦旋得春雷發地狂開落空山誰比數蒸烹來嵗最先嘗枝枯葉硬天真在踏遍牛羊未改香七言絶句増陳與義初識茶花伊軋籃輿不受催湖南秋色更佳哉青裙玉面初相識九月茶花滿路開附錄臯盧増本草臯盧一名瓜蘆一名苦䔲𢎞景苦菜註曰南方有瓜蘆亦似茗李珣曰按此木即臯盧也生南海諸山中葉似茗而大味苦澀出新平縣南人取作茗飲極重之如蜀人飲茶也李時珍曰臯盧葉状如茗而大如手掌挼碎泡飲最苦而色濁風味比茶不及逺矣彚考増廣記西平縣出臯盧茶之别名葉大而澀南人以為飲南越志龍州縣有臯盧葉似茗土人謂之過羅或曰物羅皆夷語也御定佩文齋廣羣芳譜卷二十一
