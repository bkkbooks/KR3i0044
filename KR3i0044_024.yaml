body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷二十二花譜梅花一梅實别見果譜原梅先衆木花花似杏甚香杏逺不及老幹如杏嫩條緑色葉似杏有長尖樹最耐乆性潔喜曬澆以塘水則茂忌肥水種類不一白者有緑萼梅凡梅花跗蒂皆絳紫色惟此純緑枝梗亦青特為清髙好事者比之九嶷仙人萼緑華吳下又有一種萼亦微緑四邉猶淺絳亦自難得重葉梅花頭甚豊葉重數層盛開如小白蓮梅中竒品也消梅花與江梅官城梅相似玉蝶梅花頭大而微紅色甚妍可愛時梅冬梅異品有墨梅花黒如墨或云以苦棟樹接者他如侯梅紫梅同心梅紫蒂梅尚多而重葉緑萼玉蝶尤今人所尚也増范成大梅譜江梅遺核野生不經栽接者又名直脚梅或謂之野梅凡山澗水濵荒寒清絶之趣皆此本也花穗小而疎瘦有韻香最清早梅花勝直脚梅吳中春晩二月始爛漫獨此品于冬至前已開故得早名錢塘湖上亦有一種開尤早余嘗重陽日親折之有横枝對菊開之句官城梅吳下圃人以直脚梅擇他本花肥者接之花遂敷腴唐人所稱官梅止謂在官府園圃中非此官城梅也百葉緗梅亦名黄香梅亦名千葉香梅花葉至二十餘瓣心色微黄花頭差小而繁密别有一種芳香比常梅尤穠美不結實花鏡照水梅花開皆向下而香甚濃竒品也品字梅一花三實麗枝梅花繁而蒂紫九英梅此花為杜子美白樂天所賞鍳臺閣梅花開後心中復有一蕊心放出原賈思勰曰梅花早而白杏花晩而紅乃知天下之美有不得兼者梅花優於香桃花優於色若荔枝無好花牡丹無美實亦其類也彚考増詩曹風鳲鳩在桑其子在梅小雅山有嘉卉侯栗侯梅宋史隠逸傳林逋結廬西湖孤山不娶無子多植梅畜鶴因謂妻梅子鶴説苑越使執一枝梅遺梁王梁王之臣曰韓子顧左右曰惡有一枝梅乃遺列國之君乎山海經靈山有木多梅原西京雜記漢上林苑有侯梅紫花梅同心梅紫蒂梅麗友梅荆州記陸覬與范曄相善自江南寄梅花一枝詣長安與曄因贈以詩折梅逄驛使寄與隴頭人江南無所有聊贈一枝春金陵志宋武帝女夀陽公主人日臥于含章殿簷下梅花落于額上成五出花拂之不去號梅花妆宮人皆效之増江陵記洪亭村下有梅迥村舊云是梅槐合生成樹是以名之今音訛謂之梅廻原杜甫詩注何遜為揚州法曹廨舍有梅樹一株時吟詠其下後居洛思梅請再徃從之抵揚花方盛開對花傍偟終日増梅妃傳梅妃姓江氏名采蘋開元中侍明皇大見寵幸性喜梅所居欄檻悉植數株上榜曰梅亭梅開賦賞至夜分尚顧戀花下不能去上以其所好戲名曰梅妃妃有梅花賦雲仙雜記李白遊慈恩寺寺僧乞詩白為題訖僧獻緑英梅檀香筆格蘭縑袴紫瓊霜原龍城録隋開皇中趙師雄遷羅浮一日天寒日暮于松林間酒肆傍舍見美人淡妆素服出迎時已昬黒殘雪未消月色微明師雄與語言極清麗芳香襲人因與扣酒家門共飲少頃一緑衣童子笑歌戲舞師雄醉寐但覺風寒相襲乆之東方已白起視大梅花樹上有翠羽刺嘈相顧月落參横惆悵而已常朝錄元稹為翰林承㫖朝退行至廊下時初日映九英梅隙光射稹有氣勃勃然百僚望之曰豈腸胃文章映日可見乎白帖大庾嶺上梅花南枝已落北枝方開増倦遊錄大庾嶺上有佛塔廟有婦人題云妾㓜年侍父任英州司㓂既代歸父以大庾本有梅嶺之名而反無梅遂植三十株于道之右因題詩于壁今隨夫之任端溪復至此寺前詩已汚漫矣因再書之云英江今日掌刑囘上得梅山不見梅輟俸買将三十本清香留與雪中開好事者因以夾道植梅矣談苑王曽布衣時以梅花詩獻呂䝉正云而今未問和羮事且向百花頭上開䝉正曰此生已安排状元宰相也程氏遺書早梅冬至已前發方一陽未生然則發生者何也其榮其枯此萬物一個隂陽升降大節也然逐枝自有一個榮枯分限不齊此各有一乾坤也各自有個消長只是個消息惟其消息此所以不窮至如松柏亦不是不凋只是後凋凋得不覺怎少得消息方夏生長時却有夏枯者則冬寒之際有發生之物何足怪也談撰卉木皆感春氣而生獨梅開以冬葢東方動以風風生木故曲直作酸則酸者木之性惟梅之味最酸乃得氣之正北方水為之母以生之則易感故梅先衆木而華邵氏聞見錄呂文穆大隠荘梅葢早梅也香甚烈而大云從大庾嶺移其本至此癸辛雜識梅花無仰開者葢亦自能巧避風雪耳騐之信然宜興西地名石庭十餘里皆古梅苔蘚蒼翠宛如虬龍皆數百年物也有小梅僅半寸許叢生苔間著花極晚祖秀華陽宮記政和初作艮嶽于禁城之東鑿池為溪澗因其餘土積而為山曰飛來峰腰徑百尺植梅萬本曰梅嶺原張鎡梅品花宜稱二十六條為淡雲為曉日為薄寒為細雨為輕烟為佳月為夕陽為微雪為晩霞為珍禽為孤鶴為清溪為小橋為竹邉為松下為明忩為疎籬為蒼厓為綠苔為銅瓶為紙帳為林間吹笛為膝上横琴為石枰下碁為掃雪煎茶為美人澹妆篸戴増梅品花榮寵六條為烟塵不染為鈴索䕶持為除地徑浄落瓣不緇為王公旦夕留盻為詩人閣筆評量為妙妓淡妆雅歌十二月燕遊次序正月玉照堂賞梅湖山尋梅二月玉照堂西緗梅堂東紅梅十二月湖山探梅玉照堂看早梅萬花谷曽端伯以梅花為清友金城記黎舉常云以梅聘海棠但恨時不同耳劒南詩注成都合江園葢故蜀别苑梅最盛自初開監官日報府報至開五分則府主來宴遊人亦競集曲洧舊聞許洛中有江梅椒萼梅綠萼梅千葉黄香梅四種原范成大梅譜古梅會稽最多四明吳興亦間有之其枝樛曲萬状蒼蘚鱗皴封滿花身又有苔鬚埀于枝間或長數寸風至緑絲飄飄可翫初謂古木歴乆風日致然詳考會稽所産雖小株亦有苔㾗葢别是一種非必古木余嘗從會稽移植十本一年後花雖盛發苔皆剝落殆盡其自湖之武康得者即不變移風土不相宜㑹稽隔一江湖蘓接壤故土宜或異同也凡古梅多苔者封固花葉之眼惟罅隙間始能發花花雖稀而氣之所鍾豊腴妙絶苔剥落者則花發仍多與常梅同去成都二十里有臥梅偃蹇十餘丈相傳唐物也謂之梅龍好事者載酒徃游清江酒家有大梅如數間屋傍枝四垂周遭可羅坐數十人任子嚴運使買得作凌風閣臨之因遂築大圃謂之盤園余生平所見梅之竒古者惟此兩處為冠洛都賣花者爭先為竒初冬折未開枝置浴室中薫蒸令坼強名早梅終瑣碎無香余頃守桂林立春梅已過元夕則嘗青子皆非風土之正杜子美詩云梅蕊臘前破梅花年後多惟冬春之交正是花時耳項里出古梅老幹竒怪苔蘚封枝疎花㸃綴夭矯如畫殊令人愛翫不忍捨増誠齋江湖集詩註余既得麾臨漳朝士餞余髙會于西湖上釗寺滿谷皆梅花一望無際絶頂有亭榜曰錦屏余獨倚一株醉極摘梅花嚼之同舍張監簿蜀人名珖字君玉相顧曰清勝如許謂非謫仙可乎輟耕錄紹興行宫中有玉質亭梅繞之由繹已堂過錦臙廊百八十楹直通御前廊外即後苑梅花千樹曰梅崗亭曰冰梅亭道士張雨字伯雨號句曲外史嘗從王溪月真人入京初燕地未有梅花吳閒閒宗師全節新從江南移至䕶以穹廬匾曰潄芳亭伯雨偶造其所恍若與西湖故人遇徘徊既乆不覺熟寝于中伯雨覺日已暮矣閒閒笑曰伯雨素有詩名宜作詩以贖過雨遂賦詩有風沙不憚五千里将身跳入仙人壺之句閒閒大喜送翰林集賢嘗所徃來者袁學士伯長謝博士敬徳馬御史伯庸吳助教飬浩虞修撰伯生俱和之廣客談龍廣寒江湖異人也事母至孝六月一日其母壽旦方啟北牖舉夀觴忽梅花一枝入牖香色絶佳人遂以孝梅稱之士大夫贈詩者甚多惟張存菊一絶最為人膾炙其詩曰南風吹南枝一白照萬綠嵗寒誰知心孟宗林下竹厥後孝梅年百有五嵗猶童顔綠髪人以為孝感所致韻府張景修以梅花為清客原玉壺冰王冕隐九里山樹梅花千株桃桞居其半結茅廬三間自題為梅花屋學圃餘䟽京師許千户家見盆中一綠萼玉蝶梅梅之極品不知種在何處當詢而覓之余薋園中一綠萼梅偃葢婆娑下可坐數十人今特作髙樓賞之子孫當加意培壅増事詞類竒水陸草木之花香而可愛者甚衆梅獨先天下而春故首及之潛確類書梅具四徳初生蕊為元開花為亨結子為利成熟為貞梅有四貴貴稀不貴繁貴老不貴嫩貴瘦不貴肥貴含不貴開袁宏道吳郡諸山記光福一名鄧尉與元墓銅坑諸山相連屬山中梅最盛花時香雪三十里具區志梅花莫盛於洞庭山之後堡下鎮東山之長圻豐圻舟輿壺觴纍纍不絶西湖志永興寺庭前有綠萼二樹古幹扶疎為河渚西溪之冠西溪居民數百家聚為村市姚安春日游西溪詩梅花引我入溪深半繞青松半翠林已耐嵗寒成好友還将春色伴幽岑蒼煙踏破鞋無跡明月挑來杖有心贏得清芬盈客䄂莫愁歸路暮雲侵西湖志餘淳熈五年二月初一日孝宗過徳夀宮起居太上留坐冷泉堂至石橋亭子看古梅太上曰苔梅有二種一種出張公洞者苔蘚甚厚花極香一種出越上苔如緑絲長尺餘今嵗二種同時著花留此少觀復命内史宣史浩至賜坐用内人動樂進酒君臣皆沾醉而退淳熈八年正月二日孝宗遣太子恭迎二殿至南内初就凌虚閣排當三盞後至萼緑華堂看梅是日大雪太上大喜盡歡而罷孤山梅花以和靖著名然白樂天去郡有憶杭州梅花因叙舊寄蕭協律詩三年悶悶在餘杭曽與梅花醉幾塲伍相廟邉繁似雪孤山園裏麗如妆云云則自唐時已賞鑒于名公矣原桂林志袁豐宅後有六株梅開時曽為鄰屋煙氣所爍乃團泥塞竈張幕蔽風乆而又拆其屋曰氷姿玉骨世外佳人但恨無傾城笑耳花史唐梅仙祖師學道於白雲山篤戒行夏月偶坐化於梅下數里聞梅花香經旬不息逺近異之宋憲聖后每治生菜必於梅下取落花雜之宋趙必連刻苦讀書開慶間以文䕃當補官辭不就晩植梅數百株名其居曰梅花荘與弟若槸日吟咏其中鐡脚道人常愛赤脚走雪中興發則朗誦南華秋水篇嚼梅花滿口和雪嚥之曰吾欲寒香沁入肺腑陳英隠居江南種梅千株花時落英繽紛恍如積雪廣西桂林府滿山皆梅開時作梅瘴易染人増花史嘉魚人陳從龍少嗜學每夜讀書至曙能詩環居栽梅倚樹而臥孤山放鶴亭林逋隠此蓄二鶴每泛舟湖中客至童子縱鶴飛報即歸後人題句云種梅花處伴林逋西湖志至元間儒學提舉余謙復補植梅數百本於山構梅亭于其下湖州府志烟霞塢武康劉穎士别業谷口梅花十餘里紫梅溪在歸安縣東北三十里上多生梅毎嵗或開紫花一枝故名開封府志梅花堂在許州治北蘇軾建饒州府志餘干縣藏山上趙汝愚嘗讀書于此理宗為題梅巖二字黄州府志春風嶺多梅花成都府志成都府東閣即杜甫招裴廸登東亭觀梅處泉州府志南安縣梅花山下多梅樹建寜府志崇安縣梅亭趙抃作令時手植梅于後圃因名興化府志城東南榖城山舊有梅隠松隠竹隠三精舍南雄府志大庾嶺即五嶺之一漢武帝擊南粤楊僕遣部将庾勝屯兵于此因名大庾其初險峻行者苦之自張九齡開鑿始可通車馬其上多植梅又名梅嶺惠州府志梅花村羅浮飛雲峰側趙師雄遇美人即此平樂府志城東梅花園宋鄒浩記羅浮山志冲虚觀殿階古梅傳是葛洪手種芳烈異于凡梅鐡幹虬枝堅瘦如削真千餘年物也嶺南嘉樹惟此與智藥所植訶子樹並傳原長干之南七里許曰華嚴寺寺僧蒔花為業而梅尤富白與紅植相若惟綠萼玊蝶植倍之率以絲縛虬枝盤曲可愛桃本者三四年輙膠矣不善縛則抽條蔓引不如不縛者為佳以故收藏難每嵗開時但取一二本落後則歸之又靈谷之左偏曰梅花塢約五十餘株萬松在西香雪滿林最為竒絶集藻序原宋楊萬里和梅詩序梅肇於炎帝之經著於説命之書召南之詩然以滋不以象以寔不以華也豈古之人皆質而不尚其華歟然華如桃李顔如舜華不尚華哉而獨遺梅之華何也至楚之騷人飲芳而食菲佩芳馨而食葩藻盡掇天下之香草嘉木以苾芬其四體而金玉其言語文章盡逺取江籬杜若而近捨梅豈偶遺之歟抑梅之未遭歟南北諸子如隂鏗何遜蘇子卿詩人之風流至此極矣梅于是時始以花聞天下及唐之李杜本朝之蘇黄崛起千載之下而躪藉千載之上遂主風月花草之夏盟而於其間始出桃李蘭蕙而居客之左葢梅之有遭未有盛于此時者也然色彌章用彌晦花彌利實彌鈍也梅之初服豈其端使之然哉前之遺今之遭信然歟余友洮湖陳晞顔盖造次必於梅顛沛必於梅者也嘉愛之不足而吟咏之吟咏之不足則盡取古人賦梅之作而賡和之寄一編以遺予曰從古此詩已八百篇矣不盈千篇吾未止也予讀之而驚曰抑何豐耶豐而不竒則亦常耳抑何竒耶余嘗愛隂鏗詩云花舒雪尚飄照日不俱銷蘇子卿云祗言花是雪不悟有香來唐人崔道融詩云香中别有韻清極不知寒是三家者豈畏疎影暗香之句哉晞顔之詩同梅而清清在梅前同梅而馨馨在梅後其於三家所謂未聞以千里畏人者也増張鎡梅品序梅花為天下神竒而詩人尤所酷好淳熈嵗乙巳予得曹氏荒圃於南湖之濵有古梅數十爰輟地十畝移種成列增取西湖北山别圃紅梅合三百餘本築堂數間以臨之又夾以兩室東植千葉緗梅西植紅梅各一二十章前為軒楹如堂之數花時居宿其中環潔輝映夜如對月因名曰玉照復開澗環繞小舟徃來未始半月捨去自是客有遊桂隠者必求觀焉頃者太保周益公秉鈞予嘗造東閣坐定首顧予曰一棹徑穿花十里滿城無此好風光葢予舊詩尾句衆客相與歆豔于是游玉照者又必求觀焉值春凝寒又能留花過孟月始盛名人才士題詠層委亦可謂不負此花矣但花豔並秀非天時清美不宜又標韻孤特若三閭首陽二子寜槁山澤終不肯頫首屏氣受世俗湔拂間有身親貌悅而此心落落不相領會甚至于汚䙝附近畧不自揆者花雖眷客然我輩胸中空洞幾為花呼呌稱寃不特三歎而足也因審其性情思所以為奨䕶之䇿凡數月乃得之今疏花宜稱憎嫉榮寵屈辱四事總五十八條掲之堂上使來者有所警省且示人徒知梅花之貴而不能愛敬也使與予之言傳布流誦亦将有愧色云范成大梅譜前序梅天下之尤物無問智愚賢不肖莫敢有異議學圃之士必先種梅且不厭多他花有無多少皆不係重輕余于石湖玉雪坡既有梅數百本比年又於舍南買王氏僦舍七十楹盡拆除之治為范村以其地三分之一與梅吳下栽梅特盛其品不一今始盡得之隨所得為之譜以遺好事者梅譜後序梅以韻勝以格髙故以斜横疎瘦與老枝怪竒者為貴其新接穉木一嵗抽嫩枝直上或三四尺如酴醿薔薇輩者吳下謂之氣條此直宜取實規利無所謂韻與格矣又有一種於條上茁短横枝状如棘針花宻綴之亦非髙品近世始畫墨梅江西有楊補之者尤有名其徒倣之者實繁觀楊氏畫大畧皆氣條耳雖筆法竒峭去梅實逺唯廉宣仲所作差有風致世鮮有評之者余故附之譜後云原明張鼐孤山種梅序夫人標物異物借人靈古徃而今自來風光無盡景遷而人不改興㑹常新是知有補斯完無虧不滿誰非造化轉水光山色于眼前繄彼人功留雪月風花于本地維昔孤山逸老曽于嬴嶼栽梅偃伏千枝淡蕩寒嵐之月崚嶒數樹留連野水之烟自鶴去而人不還乃山空而種亦少庾嶺之春乆寂羅浮之夢不來雖走馬征輿閙前堤之景色奈暗香踈影辜此夜之清光是以同社諸君子㸃綴冰花補苴玉樹種不移於海外勝已集乎山中灌巖隙而長玉龍紛披偃仰礨澗湄而棲白鳳布置横斜幽心扶瘦骨同妍冷趣植寒枝共逺西泠橋畔重開𤣥圃印清波六一泉邉載起瓊樓邀皓月非惟借風霜之伴與岸花江桞鬭風光亦将留山澤之臞令溪飲巖居生氣色倘髙人扶笻掃石正堪讀易説詩若韻士載酒飛觥亦足吟風弄月使千古勝塲不渝寂寞将六堤佳境盡入包羅豈獨處士之功臣抑亦坡仙之勝友余薄游湖上緬想孤踪䇿月下之驢為問山中誰是主指雲間之鶴來看亭畔幾枝花爰快述其良圖用同貽于好事云爾説原宋楊東山梅花説易曰乾為天前輩論乾與天異謂天者乾之形體乾者天之性情某因觸類而思之不但乾與天異而已事事物物莫不皆有形體性情林和靖咏梅疎影横斜水清淺二句此為梅寫真之句也梅之形體也雪後園林纔半樹二句此為梅傳神之句也梅之性情也冩梅形體是謂寫真傳梅性情是為傳神文原周之翰爇梅文寒勒銅瓶凍未開南枝春斷不歸來這回勿入梨雲夢却把芳心作死灰恭惟地壚中處士梅先生生自羅浮沠分庾嶺形如枯木稜稜山澤之臞膚若凝脂凛凛氷霜之操春魁占百花頭上嵗寒居三友圖中玉堂茆舍本無心金鼎啇羮期結果不料道人見挽便離有色之根夫何冰氏相凌遽返華胥之國玉骨擁爐烘不醒深魂剪紙竟難招紙帳夜長猶作尋香之夢筠忩月淡尚疑弄影之時雖宋廣平鐡石心腸忘情未得使華光老丹青手叚摸索未真却怨零落一枝春好與茶毗三昧火惜花君子還道這一㸃香魂今在何處咦烱然不逐東風散只在孤山水月中傳原元王冕梅華傳先生姓梅名華字魁不知何許人或謂出炎帝其先有以滋味干商髙宗乃召與語大悦曰若作和羮爾惟鹽梅因食采於梅賜以為氏梅之有姓自此始至紂時梅伯以直言諫妲己事被醢族遂隠迨周有摽有者始出仕其寔行著于詩垂三十餘世當漢成帝時梅福以文學補南昌尉上書言朝廷事不納亦隠去變姓名為吳市門卒云自是子孫散處不甚顯漢末緑林盗起避地大林大将軍曹操行師失道軍士渇甚願見梅氏梅聚族謀曰老瞞埀涎漢鼎人不韙之吾家世清白慎勿與語竟匿不出厥後絫生葉葉生萼萼生蕊蕊生華是為先生先生為人修潔灑落秀外瑩中玉立風塵之表飄飄然真神仙中人所居環堵竹籬茅舍灑如也行者過其處必徘徊指顧曰是梅先生居也勿翦勿伐谿山風月其與之俱先生雅與髙人韻士游徂徠十八公山隂此君輩皆嵗寒友何遜為揚州法曹掾虚東閣待先生先生遇之甚厚相對移日留數詩而歸先生南北兩支世傳南煖北寒先生葢居于南者也先生諸子甚多長云寔操行堅固人謂其有廼父風味居南京犀浦者為黄氏其餘别族具載石湖譜太史公曰梅先生翩翩濁世之髙士也觀其清標雅韻有古君子之風焉彼華腴綺麗烏能辱之哉以故天下人士景仰愛慕豈虚也耶明何喬新梅伯華傳梅伯華字汝芳世居大江之南其先本若木氏之裔食采于梅春秋時復屬於楚秦始皇遣將軍王翦滅楚遂移兵伐梅滅之子孫散處江南以國氏其家杭之西湖粤之大庾者宗枝尤蕃衍伯華自幼好修丰姿芳潔翛然埃壒之表好居山澤每與騷人處士徜徉泉石雲壑之間終日忘返不識者疑為仙云性剛介士無賢不肖皆知敬重好事者或冩其像于屏見者肅然起敬不覺鄙吝自消楚令尹子蘭申公子椒以清修自負願托交于伯華伯華曰若等無寔而外飾終将委厥美以從俗耳非吾友也凌波仙子洛迦樊生亦以雅素絶俗願與伯華為異姓兄弟伯華笑曰若等得我一體非可與共度嵗寒者也丞相廣平宋公貞心勁質于人少許可獨敬重伯華嘗作賦以誦其美伯華覧之不樂曰知人信不易哉吾嘗以宋公鐡石心腸顧乃輕吐綺語至以文君綠珠况我噫知徳者鮮矣當陽春和煦時羣葩競榮紅香翠蔓燦如也而伯華恬然于荒寒之野或以後時誚之者曰大丈夫盍乘時取紅紫自苦于寂寞誰復知之伯華曰榮悴命也然有性焉吾知安吾命盡吾性而已且子未睹其終耳狂飈振蕩彼将飄泊何所戾耶言者慚而退石湖范公與伯華交莫逆買地于所居之范村招伯華聚族居之且為作譜辨其韻格之異而歎寫真者不察也由是伯華益有聞于天下云洪璐白知春傳白知春大庾人也初不詳其得姓之由或曰太昊氏廷臣有貌晳而傅粉者帝呼為白郎遂以為姓至商髙宗時有善調鼎羮者同傅説為相大著勲業天下始重其名自後族類繁衍徧處海内漢末有族子居鄧襄間最繁盛曹瞞師過渴甚獲濟歸而勒其功于史後世稱之西晋時曰華魁者為江南亭長遇陸正平于傳舍遂為通使長安故人為薦拜秘書省伴讀二世至飛英落魄不拘専事放蕩其友薦為上林内史得入宮禁為劉宋夀陽公主飾妝公主甚喜宫中爭效慕之梁何遜官揚州與清江盛開者為僚宷日共賡吟情誼甚宻唐宋璟未相時于從父東川官舍見郡人一本性姿素樸儀容古雅請為忘年交作文美之其後有名九英者與白樂天元稹杜甫輩相友善京師謂之連璧九英女瓊姬居羅浮擇壻名士趙師雄月夜遇之遂定婚媾世傳為竒過宋有竒男子同林和靖隠孤山甘淡泊忘勢利和靖為詩美其行今載集中再傳曰墨始䇿為吏除守衡州宣徳澤及於民有甘棠之思卒繪其像民間多奉祀之白有逺族因秦俗家貧子壮分贅楊氏厥類尤蕃生子雖状貎不類白而氣味相似故亦見珍于世知春字儒華衡州十世孫生而骨格清癯丰神灑落雖邉幅不修而天然標格自出風塵之表性慧善推歩星數每嵗天子将頒春厯輙先以消息吐白人間世以其知春候故名之為人孤潔不交塵俗惟與蜀人葉恒盛衛人管若虚為耐乆朋嘗曰吾雖不見用於治朝亦當魁芳譽於天下一日恒盛若虚聞之曰吾聞智者不失時勇者不失勢陽徳方亨皆爭憐角寵而子若不聞迨夫肅殺逞衆芳謝子顧抗顔獨出此何以故曰竊聞之有赫赫之譽者發必淺無彰彰之名者飬必深與其揚金石於鄭衛交奏之時孰若援舜琴而獨鳴播徳馨於桃李暄妍之塲孰若藴蘭芳而獨寫是故使避秦皆商山則孰為漢廷之蕭曹不仕隋皆河汾則誰為唐室之房杜當時聞其名者多跨蹇踏雪尋訪至有取其連枝令奚童肩負館之華堂静室禮對閣筆平章不踰日則歛容而去知春惟林居簡出謝絶紛華日以甘酸醖釀成就諸子之徳寔思以宏先人調鼎之業云記増明劉基友梅軒記臯亭之山有隠者焉以友梅字其軒環其居皆梅也或曰友者人倫之名也君子以友輔仁人求其友必于人焉可也梅卉木也人得而友之乎生于世為人焉舍斯人弗友而卉木乎取之斯人也不既怪矣乎劉子曰否彼固有所激而云也夫彼所謂隠者也不同乎人而隠彼固自絶于世之人而卉木之為徒也彼固以斯世為不足乎已而隠以為髙彼固謂人不足與友而卉木良我友也彼誠有所激哉世之如管鮑者鮮矣刺于谷風嗟于桑柔臏于涓賣于寄累于灌夫蠅營狗茍于拜塵之人友之而不為損者鮮矣哉人不可以無友彼将何所取哉梅卉木也有嵗寒之操焉取諸人弗得矣舍卉木何取哉且此物非徒取也凌霜雪而獨秀守潔白而不汚人而象之亦可以為人矣原姚淶梅花記洪崖仙尉隐于大庾之嶠長子孫者累數百祀跨躡南北綿邈逺近夏曄冬蒨日衍以蕃客有過之者始見之若聚焉繼見之若邑焉滋茂弗已宋守趙孟藡氏見而稱之曰若是其稠乎是可國也于是建國號曰梅奄一方而有之封域視古宋衛然其國與諸國異有父子兄弟而無君長有疆圉山川而無城郭有榮瘁盛衰而無征伐有風雨霜露而無耕穰有大小短長縱横曲直而無妍􅑦其居結瑶而搆瓊其俗擷芳而嚅馥其服被縞而曳素徃徃搜㝠寄逺埃壒之地弗處世慕其潔至假氷玉神仙以為喻國于南州而性獨耐寒雖加以嚴霜暴霰不能虐也自肇國以來輒𨽻于職方嵗遣子修貢于廷累代嘉之聽梅氏自為治弗奪其土于是國益庻且大初梅氏以鼎味薦于商商道頼以復興周人得其名于謠以列于司樂者由是聲重天下華寔既符今古同賞或謂其風韻獨勝或謂其神形俱清或謂其標格秀雅或謂其節操凝固如宋廣平杜少陵林和靖諸名賢皆與梅氏為方外友類形諸篇什以摹冩情状然其所得不過一村一圃一林一木之勝而未有以國名者自梅氏有國而其散處于海内者咸列于附庸罔或先焉立國既乆梅氏之英庾山之靈相與求其主劉先生挺生南服出而臨之而國于是乎有主先生猶不敢當曰我梅花國人也或請于先生敢問宅是國何義也先生曰吾之所取于梅氏者有五善焉博于濟物仁也不撓于時義也生不相陵禮也審于擇友智也出不愆其期信也此吾之所以獨樂于梅不徒臭味之合而已若夫桑梓之所詔鞶帶之所佩朝夕之所玩几案之所味皆取足于是而梅也無役不供亦惟求吾適耳奚其主問者曰梅生數千年乃有國復數百年乃有主主是邦者非先生其誰天下不被梅之澤者乆矣今世所頼於梅者微先生孰能盡其用乎幸矣先生之主斯國也且昔人有所謂烏衣槐安者徒托諸寓言皆齊諧之流非所以語于道也先生之國以寔不以名以道不以物吾益嘉先生之善為斯國主也先生笑而不答因書以為記増陳繼儒梅花樓記王元美嘗謂余市居之迹于喧也山居之迹于寂也唯園居在季孟間耳然王氏之弇山枕城中朝暾映門遊屐麏集即主人亦徃徃支門謝客欲放而之于曠野無人之鄉而不可得余然後知園之與衆也寜獨與其謀于市也寜謀于野吾友范象先有園在横澇野塘之南去城十里而近喧寂半之四面榆桞隂翳小池上梅花兩樹婆娑相對蒼枝老骨縱横屈曲排簷而上其榦可抱其葉可䕃一畝其子可得五石范子謂吾見梅多矣未有如此君之老而竒者乃結髙樓以臨之獨與一二老衲攤虎皮爇猊鼎倚樓而歌之曰雪滿山中髙士臥月明林下美人來已復笑曰如季廸詩不過得花之幽韻閒淡而已吾家老梅政如碧眼西僧修睂露額又若毒龍怒虬紛挐搆鬭于廣莫之野攫爪迸鱗鬼怪萬状度他木詎足與此君爭勝庻幾鍾賈山之嘉樹四賢祠之紫藤差鼎足耳范子樓既成於是廣蒔霞桃芙蓉來禽之屬以映帶之池加闢竹加徙梅之為觀日閑以敞而陳子適來陳子曰吾嘗聞徃年探梅者過壽安寺中寺僧為游客所困至析而為薪而其次惟光福元墓之傍薄雪輕雲漠漠數里一快平生然村人率以種梅為業不復有品題䕶持與梅花兩相韻者古今梅花之知已僅得林逋君復三百年而有范子范子于此中塊然野處白板赤欄朱簾碧幄依微獨立于暗香踈影之外何異處士孤山所少者童子開門放鶴耳他日抱鶴上扁舟送之花下烟沙星渚短笛悠悠有巍然破輕浪而出者則陳先生至也子其報梅花吐一枝以候我頌増明劉基梅頌吳興章仲文築室花溪之上環植梅焉命之曰梅花之莊頌曰朱方之秀梅實碩兮含章而貞受命獨兮扶疎蕭森清以直兮元冰沍寒不撓其節兮玉之潔兮夷之特兮閉而發兮芳郁烈兮黄中絳跗美而完兮麗而不淫物莫能干兮冬榮夏實含隂陽兮青黄纍離以和羮兮文質彬彬徳之儀兮君子之象君子之宜兮賦原梁簡文帝梅花賦層城之宮靈苑之中竒木萬品庻草千叢光分影雜條繁榦通寒圭變節冬灰徙筩並皆枯悴色落摧風年歸氣新揺芸動塵梅花特早偏能識春或乘陽而發金乍雜雪而被銀吐艶四照之林舒榮五衢之路既玉綴而珠離且冰懸而雹布葉嫩出而未成枝抽心而挿故標半落而飛空香隨風而逺度掛靡靡之游絲雜霏霏之晨霧爭樓上之落粉奪機中之織素乍開花而傍巘或含影而臨池向玉堦而結采拂網户而低枝于是重閨佳麗貎婉心嫻憐早花之驚節訝春光之遣寒裌衣始薄羅袖初單折此芳華舉兹輕袖或挿鬢而問人或殘枝而相授恨鬟前之太空嫌金鈿之轉舊顧影丹墀弄此嬌姿洞開春牖四卷羅帷東風吹梅畏落盡賤妾為此歛蛾眉花色持相比恒愁恐失時唐宋璟梅花賦埀拱三年予春秋二十有五戰藝再北從父之東川授館官舍有梅一本敷􅀈于榛莽中喟然嘆曰嗚呼斯梅托根非其所出羣之姿何以别乎若其貞心不改是則可取也已感而成興遂作賦曰髙齋寥閴嵗晏山深景翳翳以斜度風悄悄而亂吟坐窮簷以無朋進一觴而孤斟歩前除以彳亍倚藜杖于墻隂蔚有寒梅誰其封植未綠葉而先葩抽青枝于宿枿光分影布冰玉一色胡雜遝乎衆草又蕪没乎叢棘匪王孫之見幻羌潔白其何極若夫瓊英綴雪絳萼著霜儼如傅粉是謂何郎清香潛襲疎蕊暗齅又如竊香是謂韓夀凍雨晩濕宿露朝滋又如英皇泣於九嶷愛日烘晴眀蟾照夜又如神人來從姑射烟晦晨昏隂霾晝閉又如通徳掩袖擁髻狂颷捲沙飄素摧柔又如綠珠輕身墜樓半開半含非黙非言温伯雪子目擊道存或俯或仰匪笑匪怒東朝順子正容物悟或憔悴若靈均或欹傲若曼倩或嫵媚若文君或輕盈若飛燕口吻雌黄擬議殆徧彼其藝蘭兮九畹采蕙兮五柞緝之以芙蓉贈之以芍藥玩小山之叢桂掇芳洲之杜若是皆物出于地産之竒名著于風人之托然而艶于春者望秋先悴盛于夏者未冬而萎或朝𬎼而速謝或夕秀而遂衰曷若茲卉嵗寒特妍氷凝涸沍擅美專權相彼百花孰敢爭先鸎語方澀蜂房未喧獨歩早春自全其天至若措跡隠深寓形幽絶恥隣市廛甘遁巖穴江僕射之孤燈向壁不可悽迷陶彭澤之二徑投閑曽無悁結貴不移于本性方有儷于君子之節聊染翰以寄懐用垂示于來哲從父見而朂之曰萬木僵仆梅英載吐玉立冰姿不易厥素子善體物永保貞固増宋朱子梅花賦并序楚襄王遊乎雲夢之野觀梅之始華者愛之徘徊而不能舍焉驂乘宋玉進曰美則美矣臣恨其生寂寞之濵而榮此嵗寒之時也大王誠有意好之則何若移之渚宮之囿而終觀其寔哉宋玉之意葢以屈原之放微悟王而王不能用於是退而獻賦曰夫何嘉卉而信竒兮厲嵗寒而方華潔清姱而不滛兮專精皎其無瑕既笑蘭蕙而易誅兮復異乎松栢之不華屏山谷以自娱兮命氷雪而為家謂后皇賦予命兮生南國而不遷雖瘴癘非所托兮尚幽獨之可願嵗序徂以崢嶸兮物皆舍故而就新披宿莽而横出兮廓獨立而増妍𤣥霧滃而四起兮川谷沍而冰堅澹容與而不衒兮象姑射而無鄰夕同雲之繽紛兮林莽雜其葳蕤曽予質之無加兮專皎潔而未衰方酷烈而誾誾兮信横發而不可摧紛旖旎亦何好兮静窈窕而自持徂清夜之湛湛兮玉繩耿而未低方娉婷而自喜兮友明月以為儀歘浮雲之來蔽兮四顧莽而無人悵寂寞其凄凉兮泣回風之無辭立何乆乎山阿兮歩何躊蹰于水濵忽舉目而有見兮恍顧盻之足疑謂彼漢之廣兮羌何為乎人間既竒服之眩耀兮又綽約而可觀欲一聽白雲之歌兮歎揚音之不可聞将結軫乎瑤池兮懼佳期之非真願借陽春之白日兮及芳菲之未虧與遲暮而零落兮曷若充夫佩幃渚宮矧未有此兮紛草棘之縱横椒蘭後乎霜雪兮亦何有乎芳馨俟桃李于載陽兮倉庚寂而未鳴私顧影而自憐兮淡愁思之不可更君性好而弗取兮亦吾命其何傷辭曰后皇貞樹艶以姱兮潔誠諒清有嘉寔兮江南之人羌無以異兮㷀獨處廓豈不可召兮層臺累榭靜而可樂兮王孫兮歸來無使哀江南兮明徐渭梅賦孤禀矜競妙英雋發肌理冰凝幹膚曲屈留連野水之烟淡蕩寒山之月蕊一攢而集霞葩五出而爭雪側披㫁磧委朔風其将吹忽上髙空助凍雲之欲結杪數英之半掬中萬斛之一摶古幹横肱玉龍游而張甲編條聚腦白鳳戢以流翰珮玦繽紛何啻凌波之子肌膚綽約無言姑射之仙趣将幽而見取艶以冷而為妍緼香氣于空表弄皎色于霄端瘦影横忩臞然山澤素魂麗壁忽爾嬋娟托使将傳寄江南之遐信隨風暗度報塞北以春天羌笛一聲韻全飄于纖指素琴三弄神屢托于冰絃乃有巖居之徒溪飲之老䄈褐黄冠龎睂夀考跨蹇䇿笻熱漿烹藻望谷口以窮搜坐石頭而拂掃亦有遊心道徳之儒含思風雅之伯讀易説詩于其下咏騷作記當其處景得人而益増人因景而標致斯風格之雅幽而韻調之殊異亦足以快心暢神洗鬱破滯又何羨乎羅浮之竒而東嶽之麗五言古詩増梁簡文帝雪裏梅花絶訝梅花晩爭來雪裏窺下枝低可見髙處逺難知俱羞惜腕露相讓到腰羸定湏還剪綵學作两三枝梁元帝詠梅梅含今春樹還臨先日池人懐前嵗意花發故年枝鮑泉詠梅花可惜階下梅飄蕩逐風廻度簾拂羅幌縈忩落梳臺乍隨纖手去還因挿鬢來客心屢看此愁睂歛詎開王筠和孔中丞雪裏梅花水泉猶未動庭樹已先知翻光同雪舞落素混冰池今春競時發猶是昔年枝惟有長顦顇對鏡不能窺庾肩吾同蕭左丞詠摘梅花忩梅朝始發庭雪晩初消折花牽短樹幽叢入細條垂冰溜玉手含刺罥春腰逺道終難寄馨香徒自饒周庾信咏梅花常年臘月半已覺梅花䦨不信今春晩俱來雪裏看樹凍懸冰落枝髙出手寒早知覓不見真悔著衣單陳隂鏗咏雪裏梅春近寒雖轉梅舒雪尚飄因風還共落照日不俱銷葉開隨足影花多助重條今來漸異昨向晩判勝朝謝爕早梅迎春故早發獨自不疑寒畏落衆花後無人别意看徐陵梅花對户一株梅新花落故栽燕拾還蓮井風吹上鏡臺倡家怨思妾樓上獨裵徊啼看竹葉錦簪罷未能裁唐桞宗元早梅早梅發髙樹廻映楚天碧朔吹飄夜香繁霜滋曉白欲為萬里贈杳杳山水隔寒英坐消落何用慰逺客宋梅堯臣讀吳正仲重臺梅花詩楚梅何多葉縹蔕攢瓊瑰常惜嵗景盡每先春風開龍沙雪為友青女霜作媒託根邇廟堂結子助鼎鼒吳侯本吳人筆力髙崔嵬但詠同姓木子非梁棟材陸游古梅梅花吐幽香百卉皆可屛一朝見古梅梅亦墮凡境重疊碧蘚暈夭矯蒼虬枝誰吸古磵水飬此塵外姿魏了翁西郊訪梅荒烟散牛羊落日尚城市天寒萬木脫嵗晏羣動弭西郊有孤芳獨喚春事起幽光耿參月清灔明野水欲開未開時似語不語意或疑春較遲的皪下霜蕊誰知春風心渾在阿堵裏洞霄逍遙公九隴花月使領客居上頭蹇予亦婪尾頗懐去年遊嵗月如許駛悠悠竟何成總被物化使元程鉅夫家園見梅有懐疇昔同僚諸君子因成廿六韻奉寄徃時姑射仙夜墮江南村江南富嘉植梅花衆中尊九地閟𤣥凝先天占春暄的皪冰雪姿不受風塵昬孤清愜幽意賸馥醒吟魂愛之玩不斁㝠契終無言羅浮本幻境前夢覺已諼蹇蹄滯亰華倦翼棲淮垣後先青雲士表裏白玉温我形自覺穢交道乆逾敦貞節保松栢芳心共蘭蓀信知嵗寒友何異連枝昆獨賢天所矜家山問鷄豚歸來適仲冬平旦窺荒園依依故人面竟日對傾罇清池疎蕊影淡月新梢㾗泠然絶埃壒恍若遊崑崙忽憶如花人高談霏露繁眼中不可見思纛風翩翻頗慚標致似逺近殊託根洪鈞轉嚴令青皇畀新恩坐看佳實長適口塞衆喧徧遺實中仁生意彌乾坤平生識賞心皎潔明朝暾凌寒折一枝殷勤寄王孫又恐逺莫致作詩當重論馬祖常移梅植爾當庭隅豈復資鼎味遷爾自谷中豈復相嫵媚冽冽𤣥㝠候衆植各浮脆髙標自凌寒孤尚獨冠嵗么禽何處來飛下䨇羽翠幽屏逐魚鳥沈跡儔隠淪所欣在林藪嘉植日以親眷言江介品紛葩號南珍遇我好竒服移根得良因井井十畝園菁茆䕃澗濱縞裳擢玉質宜此空山春傅若金題墨梅二首老樹亞晴空疎花帶寒野風流不自惜澹泊從人寫嵗晏孰能娱空山少來者孤花何婉娩玉立含幽素短短時出橋疎疎或臨路生疑簷下月半照墻西樹黄清老題竹外一枝梅花仙標何處來一枝倚寒玉晴忩見疎林座上春可掬山隂帶殘雪水影兼逺綠珍重孤竹君嵗寒伴幽獨七言古詩増陳江總梅花落臘月正月早驚春衆花未發梅花新可憐芬芳臨玉臺朝攀晩折還復開長安少年多輕薄兩兩常唱梅花落滿酌金巵催玉柱落梅樹下宜歌舞金谷萬株連綺甍梅花宻處藏嬌鶯桃李佳人欲相照摘葉牽花來並笑楊桞條青樓上輕梅花色白雪中明横笛短簫悽復咽誰知栢梁聲不絶宋蘇軾松風亭下梅花盛開春風嶺上淮南村昔年梅花曽㫁魂豈知流落復相見蠻風蜑雨愁黄昬長條半落荔支浦臥樹獨秀桄榔園豈惟幽光留夜色直恐冷艶排冬温松風亭下荆棘裏兩株玉蕊明朝暾海南仙雲嬌墮砌月下縞衣來叩門酒醒夢覺起繞樹妙意有在終無言先生獨飲勿歎息幸有落月窺清樽再用前韻羅浮山下梅花村玉雪為骨冰為魂紛紛初疑月掛樹耿耿獨與參横昬先生索居江海上悄如病鶴棲荒園天香國艶肯相顧知我酒熟詩清温蓬萊宫中花鳥使綠衣倒掛扶桑暾抱叢窺我方醉臥故遣啄木先敲門麻姑過君急灑掃鳥能歌舞花能言酒醒人散山寂寂惟有落蕊粘空樽和秦太虚梅花西湖處士骨應槁只有此詩君壓倒東坡先生心已灰為愛君詩被花惱多情立馬待黄昏殘雪消遲月出早江頭千樹春欲闇竹外一枝斜更好孤山山下醉眠處㸃綴裙腰紛不掃萬里春隨逐客來十年花送佳人老去年花開我已病今年對花還草草不如風雨卷春歸收拾餘香還畀昊再和潛師花工未議蘇羣槁先向寒梅一傾倒江南無雪春瘴生為散冰花除熱惱風清月落無人見洗妆自趁霜鐘早惟有飛來䨇白鷺玉羽瓊枝鬭清好吳山道人心似水眼淨塵空無可掃故将妙語寄多情横機欲試東坡老東坡習氣除未盡時復長篇書小草且撼長條餐落英忍饑未忍窮呼昊沈與求溪上見梅晴溪漲渌如隂苔晴日挿影相瀠洄畫船疊鼔順流下波光浩蕩征㠶開灘縈岸繚柁牙轉水石互激如奔雷湏臾已復過絶壁歸路漸近嚴陵臺山重溪複境彌迥暗香忽自空中來日斜正見叢棘外炯炯疎片飄寒梅槎牙一種獨愁絶含情不語明巖隈凌波疑是水仙出縞衣素質行徘徊下窺深淺一笑粲半使凡卉俱塵埃山谷之儒已臞甚龜膓鶴骨世所咍相逄頓覺百憂釋不嫁春風誰與媒舟行易逺空回首角聲吹夢心悠哉唐庚劒州道中見桃李盛開而梅花猶有存者桃花能紅李能白春深無處無春色不應尚有數株梅可是東君苦留客向來開處當嚴冬李花未白桃未紅即今已是大人行勿與年少爭春風朱子用東坡韻北風日日霾江村歸夢政爾勞營魂忽聞梅蕊臘前破楚客不愛蘭佩昬尋幽舊識此堂古曵杖偶集仙家園嵐隂春物未全到邂逅只有南枝温冷光自照眼色界雪艶未怯扶桑暾遥知雲臺溪上路玉樹千里藏山門自憐塵覊不得去坐想佳處知難言但對君詩慰岑寂已似共倒花前樽羅浮山下黄茅村蘇仙仙去餘詩魂梅花自入三疊曲至今不受蠻烟昬佳名一旦異凡木絶艶千古髙名園却憐冰質不自暖雖有歩障難為温羞同桃李媚春色敢與葵藿爭朝暾歸來只有修竹伴寂歴自掩疎籬門亦知真意還有在未覺浩氣終難言一杯勸汝吾不淺要汝共保山林樽江梅欲破江南村無人觧與招芳魂朔雲為㫁蜂蝶信凍雨一洗烟塵昬天憐絶艶世無匹故遣寂寞依山園自吹羌笛娱夜永未要鄒律回春温連娟窺水墮殘月的皪泣露晞晨暾海上清游記上界衰病此日空柴門相逄不敢話疇昔能賦豈必皆成言雕鐫肝腎竟何益况復制酒哦空樽次張彦輔賞梅韻朔風萬里開雲屏清霜夜墜朝景晴南枝浩蕩正春色凍蕊的皪含空明花邉偶對青銅鏡槁項不堪冰雪映擁爐獨坐只悲吟振䇿出遊舒逺興暗香何處時一飄行行復值最長條傾頭欲折𣺌誰贈滿意相思那得邀極知異縣淹行李心賞未甘輕付畀石雄賦罷不相聞秀墅書來因舉似兩翁句法爭新竒畫出疎影沉寒漪幽探自出塵境外勝概未許兒曹知祗今嚼蕊攀條處他日重來記前度風臺月觀悄無言玉笛冰灘索同賦嗟予衰懶倦将迎過眼紛紛無復情尚喜疎英窺水白更憐落片㸃苔青興來亂挿飛蓬首擬向君家醉君酒酒酣耳熱莫狂歌布皷雷門湏縮手楊萬里瓶中梅花長句幽人蚤作月滿堦月隨幽人登船齋推門欲開猶未開猛香排門撲我懐徑從鼻孔上濯頂拂拂吹盡髪底埃恍然墮我衆香國欲問何祥無處覓𡨕搜一室一物無瓶裏一枝梅的皪平生為梅到斷腸何曽知渠有許香夜來偶忘掛南忩貯此幽馥萬斛強却憶去年西湖上錦屏下瞰千青嶂谷深梅盛一萬株千頃雪波浮欲漲是時雨後初開前日光烘花香作煙政如新火炷博山蒸出沉水和龍涎醉登絶頂撼疎影掇葉餐花照氷井蜀人老張同舍郎喚作謫仙儂笑領如今茅屋臥山村更無載酒來叩門一尊孤斟懶論文猶有梅花是故人梅花下遇小雨偶來花下聊散䇿落英滿地珠為席繞花百匝不忍歸生怕幽芳怨孤寂仰頭欲折一枝斜自挿白髩明烏紗傍人勸我不用許道我滿頭都是花初來也覺香破鼻頃之無香亦無味虚疑黄昬花欲睡不知被花薫得醉忽然細雨濕我頭雨落未落花先愁三㸃兩㸃亦不惡未要打空花片休郡泊燕堂庭中梅花林中梅花如隠士只多野氣無塵氣庭中梅花如貴人也無野氣也無塵不疎不宻隨宜了旋落旋開無不好珠簾遣風細為吹畫簷䕶霜寒更微詩翁繞堦未得句先送詩材與翁語有酒如澠誰伴翁玉雪對飲惟渠儂翁欲還家即明發更為梅兄留一月雨後曉起問訊梅花前日看梅風吹倒昨日看梅雨霑㡌近梅一日或再來逺梅隔年纔一到夜來為梅愁雨聲挑燈起坐至天明不知消息平安否早來問訊還疾走横枝雨後轉清妍玉容洗妆晨更鮮絶似孤山半峰雪不羡玉井十丈蓮十事八九不如意人生巧墮天公計簿書海底白人頭孤負江南風月秋憶昔少年命同社月裏傳觴梅影下一片花飛落酒中十分便罰琉璃鐘如今老病不飲酒梅花也合憐衰翁雪夜尋梅去年看梅南溪北月作主人梅作客今年看梅荆溪西玉為風骨雪為衣臘前欲雪竟未雪梅花不慣人間熱横枝憔悴涴晴埃端令羞面不肯開縞裙夜訴玉皇殿乞得天花來作伴三更滕六駕海神先遣東風吹玉塵梅仙曉沐銀浦水冰膚别放瑤林春詩人莫作雪前看雪後精神添一半金李俊民籌堂尋梅蕭疎籬落誰家圃尋芳信逐遊蜂去眼前荆棘少人行馬蹄直到香來處怕愁貪睡獨開遲瘦損春寒鶴膝枝可是東君苦留客斜風細雨不堪詩元朱徳潤登道山亭觀梅用東坡韻道山亭下梅花村坡仙作詩為招魂明姿照人隔寒水瘦影帶月欺黄昬先生頗厭郡齋冷持書晚約窺山園松風吹香清人骨地爐烟消酒初温孤標已出羣卉上故遣雪意迷晴暾和羮結子時較晩先傳春色來衡門天寒谷幽翠䄂薄豈知青鳥能傳言明晨看花重有約呼童掃石羅清樽劉詵竹外梅梢誰家修篁千萬竿短墻流水朱䦨干孤芳託根得春早一枝斜出行路看遥擬青林炯初霽一㸃兩㸃雪未殘小忩月落霜角動誰與伴此空山寒王冕題月下梅花平生愛梅頗成癖踏雪行穿一䨇屐六花散漫飛滿空千里萬里同一色衝寒不畏朔風吹乘興來此江之湄繁花滿樹梅欲放彷彿羅浮曽見時南枝横斜北枝好北枝看過南枝老中有一枝致竒絶萬蕊千葩弄天巧老夫見此喜欲顛載酒大酌梅花仙仙人怪我來何晩一别已是三千年醉來仰面臥深雪夢扶飛瓊上天闕酒醒起視夜何其饑烏啼殘半江月題墨梅圖朔風吹寒冰作壘梅花枝上春如海清香散作天下春草木無名藉光彩長林大谷月色新枝南枝北清無塵廣平心事誰與論徒以鐡石磨乾坤嵗晩燕山雲渺渺居庸古北無人到白草黄沙羊馬羣瓊樓玉殿烟花繞凡桃俗李爭芬芳只有老梅心自常貞姿燦燦眩冰玉正色凜凜欺風霜轉身西泠隔烟霧欲問逋仙杳無所夜深湖上酒船歸長嘯一聲䨇鶴舞梅花二首江南十月天雨霜人間草木不敢芳獨有谿頭老梅樹面皮如鐡生光芒朔風吹寒珠蕾裂千花萬花開白雪髣髴蓬莱羣玉妃夜深下踏瑤臺月銀鐺泠泠動清韻海煙不隔羅浮信相逄共説嵗寒盟笑我飄流霜滿鬢君家秋露白滿缸放懐飲我千百觴興酣脫㡌恣盤薄拍手大呌梅花王五更忩前博山冷么鳳飛鳴酒初醒起來笑抱石丈人門外白雲三萬頃昔年曽踏西湖路巢居閣上春無數雪晴月白最精神瑪瑙坡前第三樹虬枝屈鐡交碧苔疎花􅀈迸珍珠胎初擬羣仙下寥廓瓊璫玉佩行瑤臺又疑幽人在空谷滿面清霜鬢華緑迎風冷笑桃杏花紅紫紛紛太麤俗今年來看秦淮水路隔西湖一千里草堂上是白雲窩夜半松風喚予起青山隔世無游塵雲根粉壁光如銀長嘯一聲月入户孤山處士來相親江南梅花自有主休問當年何水部山僧對我黙無語栢子無風墮青雨明沈周竹堂寺探梅竹堂梅花一千樹晴雪塞門無入處秋官黄門兩詩客珂馬西來為花駐老翁攜酒亦偶同花不留人人自住滿身毛骨沁冰影嚼蕊含香各搜句酒酣塗紙作横斜筆下珠花濕春露只愁此紙捲春去明日重來花在地原王世貞梅花瑤臺仙姝畏桃妬化作君庭䨇玉樹大庾萬條看更俗隴頭一闋吹不墮張果齯齒如編銀要與此樹爭丰神飛觴三雅媚殘月握筆片語開新春有子移根奉温室皎皎冰姿射霜日莫言子作書生酸要與君王調鼎實于若瀛題畫梅花錢君手出畫梅卷零風㸃雪寒芳歛老榦横生色如鐡空山月抹孤根逺古今誰得傳梅神開卷瓊英寒逼人漫誇范致能為譜長老華光差得真一幅一枝不為少逐毫亂落奪天巧影滅香消破碧虚含飈出霧何縹緲逋翁湖山詩思清揚州東閣最含情瘦花數㸃應難謝不受江南笛裏聲御定佩文齋廣羣芳譜卷二十二
