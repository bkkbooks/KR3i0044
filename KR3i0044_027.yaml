不變可謂得其性矣增十洲記東海有山名度索山有大桃樹屈盤數千里曰蟠桃拾遺記扶桑東五萬里有磅磄山上有桃樹百圍其花色青黑萬嵗一實原神仙傳樊夫人與夫劉剛俱學道術各自言勝中庭有兩大桃樹夫妻各咒其一桃便相鬭擊良久剛所咒者樹走出籬外增晉宮閣名華林園桃七百三十八株白桃三株侯桃三株妬記武厯陽女嫁阮宣武絶忌家有一桃樹華葉灼耀宣歎美之即便大怒使婢取刀斫樹摧折其華原史略北齊盧士深妻崔林義之女有才學春日以桃花和雪靧兒面咒曰取紅花取白雪與兒洗面作光悅取白雪取紅花與兒洗面作妍華取花紅取雪白與兒洗面作光澤取雪白取花紅與兒洗面作華容增景龍文館記景龍四年春上宴於桃花園羣臣畢從學士李嶠等各獻桃花詩上令宮女歌之辭既清婉歌仍妙絶獻詩者舞蹈稱萬嵗上敕太常簡二十篇入樂府號曰桃花行原開元天寶遺事御苑新有千葉桃花帝親折一枝插於妃子寶冠上曰此箇花尤能助嬌態也明皇禁苑中初有千葉桃盛開帝與貴妃日宴於樹下帝曰不獨萱草忘憂此花亦能銷恨增北户録桑苧翁謂李復云天寶末有韋長史虗舟寓于廬山瀑布泉時夏月多雨見瀑布之中流出一桃葉濶五寸長一尺二寸原劇談録武宗朝術士王瓊妙於化物無所不能方冬以藥栽培桃杏數株一夕繁英盡發芳蕊濃艷月餘方謝夲事詩唐崔護舉進士不第清明獨遊都城南得村居花木叢萃叩門久之有女子自門隙問對曰尋春獨行酒渴求飲女子啓關以盂水至獨倚小桃柯佇立而屬意殊厚崔辭起送至門如不勝情而入後絶不復至及來嵗清明徑往尋之門庭如故而扃矣因題詩於左扉云去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風後數日復往聞其中哭聲護叩門有老父出曰君非崔護耶曰然曰君殺我女吾女笄年未嫁自去年以來常恍惚如有所失比日與之出歸見左扉字入門遂病絶食數日而死崔大感慟請入哭之尚儼然在牀崔舉女首枕以股大呼曰護在斯護在斯須臾開目半日復活老父大喜以女歸之增清異録江南後主同氣宜春王從謙嘗春日與妃侍遊宮中後圃妃侍覩桃花爛開意欲折而條髙小黃門取綵梯獻時從謙正乘駿馬擊毬乃引鞚至花底痛採芳菲顧謂嬪妾曰吾之緑耳梯何如外史檮杌蜀孟知祥僭位召百官宴芳林園賞紅桃花其葉六出彥周詩話春時穠麗無過桃栁桃之夭夭楊栁依依詩人言之也老杜云顛狂栁絮隨風舞輕薄桃花逐水流不知緣誰而波及桃花與楊栁矣原埤雅桃性早華又華於仲春故周南以興女之年時俱富也雞肋編范純仁女孫病狂嘗閉於室中窗外有大桃樹一株花適盛開一夕斷櫺登木食桃花幾盡自是遂愈孫公談圃石曼卿通判海州以山嶺髙峻人路不通略無花卉點綴照映使人以泥裹桃核拋擲于山嶺上不數年間花發滿山爛如錦繡增老學庵筆記歐陽公梅宛陵王文恭集皆有小桃詩歐詩云雪裏花開人未知摘來相顧共驚疑便須索酒花前醉初見今年第一枝初但謂桃花有一種早開者耳及遊成都始識所謂小桃者上元前後即著花狀如垂絲海棠曽子固雜識云正月二十開天章閣賞小桃正謂此也全唐詩話劉禹錫元和十年自朗州召至京戲贈看花君子云紫陌紅塵拂面來無人不道看花回玄都觀裏桃千樹盡是劉郎去後栽再遊玄都觀絶句并序云余貞元二十一年為屯田郎時此觀未有花是嵗出牧連州貶朗州司馬居十年召至京師人人皆言有道士手植仙桃滿觀如紅霞遂有前篇以志一時之事旋又出牧今十有四年復為主客郎中重遊玄都蕩然無復一樹惟兔葵燕麥動搖春風耳因再題二十八字以俟後遊時太和二年三月也詩云百畝庭中半是苔桃花淨盡菜花開種桃道士歸何處前度劉郎今又來鄭志道劉阮洞記鳴玉澗之東有塢植桃數畦花光射目落英繽紛點綴芳草流紅縹眇隨水而下此昔人食桃輕舉之地也遂名曰桃花塢六朝事迹桃花塢在蔣山寶公塔之西北舊有桃花甚盛今不復存霹靂溝在城東五里王荆公詩云霹靂溝西路柴荆四五家憶曽騎欵假隨意入桃花花經碧桃千葉桃三品七命緋桃花五品五命王維楨遊石城山記茅公嘗與余遊石城山中其時三月矣而桃尚未華茅公訝之而問故余謂草木期雖至猶須日曝之乃發耳今四面連峰雲霧恆發其上見日最難桃華能乎故得日茍先梅常侵臘得日茍後桃乃失春斯未足訝也王叔承茅山記夜次毗陵桃花園桃花數十畝映月如朝霞忽忽身在華陽夢中也聞鴈齋筆談桃之品無慮數十絳碧夭緋總堪極目然夭者故是正色耶至于人面桃則桃之變極矣瑩白如雪光浮白外素者故艷不艷于此方之梅花則今古雅俗正復迥然藉使敷花一時堪作梅嬖夭夭者雲從可也香宇詩談今花始開曰試花張司業新桃行植之三年餘今夏初試花月令桃始華亦讀如試王立程天台山記桃源洞即漢永平中劉晨阮肇遇仙處澗之東塢有桃數畦春時花光射目紅雨點綴芳草如踏錦茵江郎山志山多緋桃華而不實黃山志桃花峰下有桃花源桃花溪處處皆桃花武夷雜記春山霽時滿鼻皆新緑香訪鼓樓坑十里桃花杖䇿獨行隨流折步春意尤間西湖志包家山多桃花宋時有匾曰蒸霞二月遊人最盛號小桃源董嗣杲詩綺霞蒸日透林梢一簇南山尚姓包冷水峪邉苔色老沖雲樓下樹隂髙園鄰古道傳耕籍臺倚青城想拜郊欲趁桃花尋隱去關門無鎖不須敲西湖棲霞嶺以嶺上桃花爛漫色如凝霞故名原玄中記寧波府城東舊傳劉阮采藥於此春月桃花萬樹儼若桃源花史茅山乾元觀道士薑麻子閻蓬頭弟子也從揚州乞爛桃核數石空山月明中種之不避豺虎自茶庵至觀中有桃花五里餘志勤禪師在溈山因桃花悟道偈曰自從一見桃花後三十年來更不疑簡州天水一碧放目無際春月桃花甚繁潘嶽為河陽令栽桃李號河陽滿縣花劉公幹居鄴下一日桃李爛漫值諸公子延賞久之方去公幹問僕曰損花乎僕曰無但愛賞而已公幹曰珍重輕薄子不損折使老夫酒興不空也遂飲花下錢伸仲于錫山所居作芳美亭種桃數千百株蔡載作詩曰髙人不惜地自種無邉春莫隨流水去恐汙世間塵古田縣黃蘖山多桃樹下有桃塢桃湖桃洲春月不減武陵桃溪在黃蘖山下春風微和夭桃夾岸亦勝境也漵浦一名華蓋山昔人嘗種桃千樹至今呼桃花圃增一統志平樂府仙巖富州口多桃花旁有碧潭遊魚可掬集藻記原晉陶潛桃花源記晉太元中武陵人捕魚為業緣溪行忘路之逺近忽逢桃花林夾岸數百步中無雜樹芳草鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源便得一山山有小口髣佛若有光便舍船從口入初極狹才通人復行數十步豁然開朗土地平曠屋舍儼然有良田美池桑竹之屬阡陌交通雞犬相聞其中往來種作男女衣著悉如外人黃髮垂髫並怡然自樂見漁人乃大驚問所從來具答之便要還家設酒殺雞作食村中聞有此人咸來問訊自云先世避秦時亂率妻子邑人來此絶境不復出焉遂與外人間隔問今是何世乃不知有漢毋論魏晉此人一一為具言所聞皆歎惋餘人各復延至其家皆出酒食停數日辭去此中人語云不足為外人道也既出得其船便扶向路處處志之及郡下詣太守説如此太守即遣人隨其往尋向所志遂迷不復得路南陽劉子驥髙尚士也聞之欣然規往未果尋病終後遂無問津者增明王衡東門觀桃花記蓋今人多偽為雅而吾吳尤甚蘭菊幾家置一譜焉次則君竹而友松第而至桃花極矣乃余性獨深愛桃花每春未嘗不遊遊必遍今年二月之十七日余與汝增約使人往探城四隅問花之所止而之焉具報東門好則步出東門踏菜花行望見一村居小有花栁可觀則酒鎗與蒲席已次第設矣其居在小溪中桃花左右溪約有三四十株甚嫩美既又移至吳氏莊莊宅與池相繞略同前而廣五倍之花碩大且繁中一緋色據水上者特異長楊數章立池外如偉丈夫衣冠拱手而護少女于內桃花亦醉面垂垂傍水洗妝不輕見頭額也飲樹下留連久之顧日尚未晡乃復信步尋花其在水濵者墻角橋畔者菜花栁樹叢中者輒灑水施茵曰與而延客或遇之矮簷下及坑塹竈突之間則含酒滿舌噀之曰為汝浣衣席暖更移酒盡復買忘其去城之遂逺也汝增曰夫桃價不堪與牡丹作奴人且以市娼辱之子何好之甚余笑曰子品花乎品價乎夫價則百十桃者有之然皆如口脂面粉不粘人意刻畫綵繢人能盜天夫桃也逺而睇之光浮浮然近而即之若有暖暈然蓋頌桃德者夭夭近之灼灼則已下矣擬之于春殆巽女乎陽出震而得梅桃與梅其得氣獨完故於香味色中具有别韻即刻畫綵繢者巧愈不似似愈不真子舍是而貴夫盆盎拳握之觀何歟且夫天下之貴賤失所久矣餖飣貴而梁肉賤土偶貴而人物賤品題貴而考課賤桃之賤于子無惑也汝增無以對遂以筆志其語頌增梁江淹桃頌惟園有桃惟山有叢丹葩擎露紫葉繞風引霧如電映煙成虹伊春之秀乃華之宗賦增陳張正見衰桃賦巖巖秀峰吐桂榮松獨夭桃之灼灼輕擢采於寒蹤爾乃萬株成錦千林似翼苔畫波文花然樹色發秦源而逸氣飄漢綬而流芳譬蘭釭之夜炷似明鏡之朝妝成蹊列徑光崖豔泛間真定之蒼梨雜房陵之縹李紛芳難歇照曜無儔舒若霞光欲起散似電采將收既而風落新枝霜飛故葉歎垂釣之妖童怨傾城之麗妾原唐皮日休桃花賦并序余嘗慕宋廣平之為相貞姿徑質剛態毅狀疑其鐵腸與石心不解吐婉媚辭然覩其文而有梅花賦清便富艷得南朝徐庾體殊不類其為人也後蘇相味道得而稱之廣平之名遂振嗚呼夫廣平之才未為是賦則蘇公果暇知其人哉將廣平困于窮厄于躓強為是文耶日休于文尚矣狀花卉體風物非有所諷輒抑而不發因感廣平之所作復為桃花賦其辭曰伊祁氏之作春也有豔外之豔華中之華衆木不得融為桃花厥花伊何其美實多臺𨽻衆芳緣飾陽和開破嫩萼壓低柔柯其色則不淡不深若素練輕茜玉顔半酡若夫美景姸時春含曉滋密如不幹繁若蕪枝妦妦婉婉夭夭怡怡或俯者若想或閉者如癡或向者如步或倚者如疲或溫黁而可薰或婑媠而莫持或幽柔而旁午或扯冶而倒披或翹矣如望或凝然若思或奕偞以作態或窈窕而騁姿日將明兮似喜天將慘兮若悲近榆錢兮妝翠靨映楊栁兮顰愁眉輕紅拖裳動則裊香宛若鄭袖初見楚王夜景皎潔閧然秀發又若嫦娥欲奔明月蝶散蜂寂當閨脈脈又若妲已未聞裂帛或開故楚豔豔春曙又若息媯含情不語或臨金塘或交綺井又若西子浣紗見影玉露厭浥妖紅墜濕又若驪姬將譛而泣或在水濵或臨江浦又若神女見鄭交甫或臨廣筵或當髙會又若韓娥將歌斂態微動輕風婆娑暖紅又若飛燕舞于掌中半霑斜吹或動或止又若文姬將賦而思丰茸旖旎互交遞倚又若麗華侍宴初醉狂風猛雨一陳紅去又若褒姒初隨戎虜滿地春色階前砌側又若戚姬死于鞫域花品之中此花最異以衆為繁以多見鄙自是物情非關春意若氏族之斥素流品秩之卑寒士他目則目他耳則耳或以昵而稱珍或以疏而見貴或有實而花乖或有花而實悴其花可以暢君之心目其實可以充君之口腹匪乎兹花他則碌碌我欲修花品以此花為第一懼俗情之橫議我曰不然為之則已我目吾目我耳吾耳姸媸決于心取舍斷于志豈惟草木之品獨然信為國兮如此御定佩文齋廣羣芳譜卷二十五
