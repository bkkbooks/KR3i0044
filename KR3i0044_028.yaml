處水瀠回可惜一枝如畫向誰開輕寒細雨情何限不道春難管為君沉醉一何妨只怕酒醒時候斷人腸陳與義虞美人十年花底承朝露看到江南樹洛陽城裏又東風未必桃花得似舊時紅胭脂睡起春才好應恨人空老心情雖只在吟詩白髮劉郎孤負可憐枝聶大年臨江仙記得武陵門外路雨餘芳草蒙茸杏花深巷酒旗風紫騮嘶過處隨意數殘紅有約玉人同載酒夕陽歸路西東舞衫歌扇繡簾櫳昔遊成一夢試問賣花翁王道輔蝶戀花穠艷嬌春春晼晚雨借風饒學得宫妝淺愛把緑眉都不展無言脈脈情何限花下當時紅粉面凖擬新年都向花前見爭奈武陵人易散丹青傳得閨中怨增賀鑄定風波墻上夭桃簇簇紅巧隨飛絮入簾櫳自是芳心貪結子翻使惜花人恨五更風露萼鮮濃妝臉靚相映隔年情事此門中粉面不知何處在無奈武陵流水卷春空原鄭履齋滿江紅栁帶榆錢又還是清明寒食正滿園羅綺滿城簫笛花樹得晴紅欲染逺山過雨青如滴問江南池館有誰來江南客烏衣巷今猶昔烏衣事今難覓但年年燕子晚煙斜日抖擻一春塵土債悲涼萬古英雄迹且芳樽隨分趁芳時休虛擲增陶宗儀露華武陵夜寂記露影璇空一笑曾識素臉暈鉛巧把黛螺輕羃莫是歌渡煙江浣却舊家顔色還又訝深宫紺袖唾花猶􅊜問他阿母消息甚落寞梨雲青鳥難覓不比錦紅輕薄容易狼籍嫩緑護出溪頭誰顧采香仙客春晚也頻溫玉笙是得王沂孫露華紺葩乍坼笑爛漫嬌紅不是春色換了素妝重把青螺輕拂舊歌共渡煙江却占玉奴標格風霜峭瑶臺種時付與仙骨間門晝掩凄惻似淡月梨花重化清魄尚帶唾痕香凝怎忍攀摘嫩緑漸暖溪隂簌簌粉雲飛出芳艷冷劉郎未應認得原黃庭堅水調歌頭瑶草一何碧春入武陵溪溪上夭桃無數花上有黃鸝我欲穿花尋路直入白雲深處浩氣展虹霓祇恐花深處紅露􅊜人衣坐白石倚玉枕拂金徽謫仙何處無人伴我白螺杯我為靈芝仙草不為朱唇丹臉長嘯亦何為醉舞下山去明月逐人歸朝端禮水龍吟嶺梅香雪飄零盡繁杏枝頭猶未小桃一種夭嬈偏占春工用意微噴丹砂半含朝露粉墻低倚是誰家小女嬌癡怨别空凝睇東風裏好是佳人半醉近橫波一枝爭媚玄都觀裏武陵溪上空隨流水悵恨如紅雨風不定五更天氣念當年門裏如今陌上灑離人淚增馮取洽摸魚兒歎劉郎那回輕别霏霏三落紅雨玄都觀裏應遺恨一扶淡煙殘縷愁望處想霧暗雲深忘却來時路新花舊主把刻羽流商裁紅翦翠山徑日將暮空枝上時有幽禽對語聲聲如問來否人生行樂須間健衰老念誰免此吾所與在溪上深深錦繡花千塢何時定去但對酒思君呼兒為我頻唱小桃句别録增左傳其出之也桃弧棘矢以除其災疏服虔云桃所以逃凶也前漢書溝洫志注師古曰桃方華時即有雨水川谷冰泮衆流猥集波瀾盛長故謂之桃花水耳唐書方技傳明崇儼以竒技自名髙宗召見甚悅試為窟室使官人奏樂其中召崇儼問何祥耶為我止之崇儼書桃木為二符剚室上樂即止曰向見怪龍怖而止原戰國策孟嘗君將入秦蘇秦往見孟嘗君曰人事者吾已知之所未聞者鬼事耳秦曰臣之來固且以鬼事見君矣臣來過淄水上有土偶人焉與桃梗相與語桃梗謂土偶人曰子西岸之土也埏子以為人至嵗八月降雨下淄水至則子殘矣土偶人曰不然吾西岸之土殘則復西岸耳子東園之桃梗也刻削子以為人降雨下淄水至流子而去則子漂漂者將如何今秦四塞之國譬如虎口而君入之則臣不知君所如矣孟嘗君乃止莊子插桃枝于户連灰其下童子入而不畏而鬼畏之是鬼智不如童子也淮南畢萬術孤桃枝之劵令雞夜鳴注取孤桃南北行枝長三尺折以為劵塗以三嵗雄雞血安棲下則雞夜鳴典術桃之精生在鬼門以制百鬼故今作桃梗人著門以厭邪增漢官儀二千石綬青地桃花縹三彩原風俗通按黃帝書上古之時有神荼鬱壘昆弟二人性能執鬼度索山上桃樹下簡閲百鬼妄禍害則縛以葦索執以食虎於是縣官常以臘除夕飾桃人垂葦索畫虎於門皆追效前事以衛凶也神仙傳髙丘公服桃膠而得仙抱朴子桃膠用桑木灰漬過服之愈百病久服體有光能絶榖侯鯖録桃茢以除不祥今人以桃枝灑地辟惡神農本草經服桃花三樹盡則靣如桃花太清方三月三日採桃花酒浸服之除百病好顔色一云桃李花服之可却老酉陽雜爼安期生以醉墨灑石上皆成桃花增物類相感志桃花飯做飯了以梅紅紙盛之􅊜後去紙和勻則紅白相間畫史徐熙大小折枝吾家亦有士人家往往見之翎毛之倫非雅玩故不録桃一大枝謂之滿堂春色在余家原東坡志林世人見古德有見桃花悟道者爭頌桃花便將桃花作飯五十年轉沒交涉正如張長史見擔夫與公主爭路而得草書之氣欲學長史書日就擔夫求之豈可得哉增紀談録陶淵明所記桃花源人謂桃花觀即是其處不知公蓋寓言也話腴桃杏雙仁者必殺人其花本五出有六出必雙仁而殺人矣反常故也彥周詩話荆公桃花詩云晴溝漲春緑周遭俯視紅影移魚舠皆觀其影也其後云攀條弄芳畏晼晚已見黍雪盤中毛事見家語齊東野語天台營妓嚴蕊字幼芳色藝冠一時唐與正守台日酒邊嘗命賦紅白桃花即成如夢令云道是梨花不是道是杏花不是白白與紅紅别是東風情味曾記曾記人在武陵微醉與正賞之雙縑全唐詩話沈存中云唐人以詩主人物故雖小詩莫不極工而後已所謂旬煆月錬者信非虛言小説崔護題城南詩其始云去年今日此門中人面桃花相映紅人靣不知何處去桃花依舊笑春風後以其意未全語未工改第三句曰人面祗今何處去至今所傳有此兩本惟本事詩作祗今何處在唐人詩大都如此雖有兩今字不恤也取語意為主耳後人以其有兩今字故多行前篇夢書桃為守禦辟不祥夢見桃者守禦官紙箋譜楊炎在中書後閣用桃花紙糊窗原青州雜記桃花有一種盛開時垂絲一二尺者採之煉以松脂纒織成履甚輕金門嵗節録洛陽人家寒食食桃花粥增郎瑛顔洞記普安進山四十里有玲瓏石樹二株一則緑幹紅花之桃一則青幹白花之李非若繪畫於壁者也原花史天寶時宫中下紅雨如桃花太真用染衣裙蔡君謨水晶枕中有桃一枝宛如新折會寧桃花山土石赤似桃花桃花洞産硃砂四季洞門若桃花色家孰事親三月三日取桃花隂乾為末收至七月七日取烏雞血和塗面光白潤色如玉三月三日取桃葉搗取汁七升以醋一升同煎至五六分服之蟲俱下根亦可收東向桃枝於五月五日正午東向斫成三寸木人著衣帶中能補心虛健忘令人耳目聰明又云戊子日取東引者二寸枕之兼用尤妙附録夾竹桃原夾竹桃花五瓣長筒瓣微尖淡紅嬌艷類桃花葉狹長類竹故名夾竹桃自春及秋逐旋繼開嫵媚堪賞何無咎云溫台有叢生者一本至二百餘幹晨起掃落花盈斗最為竒品學圃餘疏夾竹桃與五色佛桑俱是嶺南北來貨夾竹桃花不甚佳而堪久藏佛桑即謹護必無存者集藻五言古詩增宋李覯弋陽縣學北堂見夾竹桃花有感而書暖碧覆晴殷依依近水欄異類偶相合徑節何能安同時盡妖艷無地容檀欒移根既不可潔心誠為難外貌任春色中心期嵗寒正聲尚可聼誰是伶倫官五言律詩原明王世懋詠夾竹桃名花踰嶺至婀娜自成隂不分芳春色猶餘晚嵗心絳分疏翠小青入嫩紅深本識仙源種無妨共入林何來武陵色移植向深閨葉不迎秋墮花仍入夏齊菲菲能拂石冉冉更成蹊尚挾風霜氣流鶯未敢棲寂寞誰相問清齋隔市囂忽遺芳樹至應識雅情髙布葉踈疑竹分花嫩似桃野人看不厭常此對村醪别録原種植性喜肥宜肥土盆栽肥水澆之則茂又惡􅊜而畏寒九月初宜置向陽處十月入窖忌見霜雪冬天亦不宜太燥和暖時微以水潤之但不可多恐凍來年三月出窖五六月時可配白茉莉婦人簮髻嬌裊可挹四月中以大竹管分兩瓣合嫩枝實以肥泥朝夕灌水一月後便生白根兩月後即可翦下另栽初時用竹幫扶恐搖動一二月後新根扎土便不須用此物極易變化附録金絲桃原金絲桃花如桃而心有黃鬚鋪散花外若金絲然以根下劈開分種易活增金絲桃南中多有之塞外遍地叢生六七月花開尤為絢爛花五瓣如桃而長色鵝黃心微緑莖起處一苞有緑盤盤出五花開則五花俱開如黃金然御定佩文齋廣羣芳譜卷二十六
