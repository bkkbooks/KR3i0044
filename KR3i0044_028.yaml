body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷二十六花譜桃花二集藻五言古詩原晉陶潛桃花源詩嬴氏亂天紀賢者避其世黃綺之商山伊人亦云逝往迹􅒓復湮來徑遂蕪廢相命肄農耕日入從所憩桑竹垂餘蔭菽稷隨時藝春蠶取長絲秋熟靡王稅荒路曖交通雞犬互鳴吠爼豆猶古法衣裳無新製童孺縱行歌斑白歡遊詣草榮識節和木衰知風厲雖無紀歷志四時自成嵗怡然有餘樂于何勞智慧竒蹤隱五百一朝敞神界淳薄既異源旋復還幽蔽借問遊方士焉測塵囂外願言躡輕風髙舉尋吾契梁簡文帝詠桃初桃麗新彩照地吐其芳枝間留紫燕葉底發輕香飛花入露井交幹拂華堂若映窗前栁端疑紅粉妝增沈約詠桃風來吹葉動風去畏花傷紅英已照灼况復含日光歌童暗理曲遊女夜縫裳詎減當春淚能斷思人腸任昉詠池邉桃已謝西王苑復揖綏山枝聊逢賞者愛棲趾傍蓮池開紅春灼灼結實夏離離隋蕭慤奉和詠龍門桃花舊聞開露井今見植龍門樹少知非塞花髙異小園論時應未發故欲影歸軒祇言經摘罷猶勝逐風翻唐孔紹安應詔詠夭桃結葉還臨影飛香欲遍空不意餘花落翻沉露井中原李白古風桃花閛東園含笑誇白日偶蒙東風榮生此艷陽質豈無佳人色但恐花不實宛轉龍火飛零落早相失詎知南山松獨立自蕭瑟寄東魯二稚子吳地桑葉緑吳蠶已三眠我家寄東魯誰種龜隂田春事已不及江行復茫然南風吹歸心飛墮酒樓前樓東一株桃枝葉拂青煙此樹我所種别來向三年桃今與樓齊我行尚未旋嬌女字平陽折花倚桃邉折花不見我淚下如流泉小兒名伯禽與姊亦齊肩雙行桃樹下撫背復誰憐念此失次第肝腸日憂煎裂素寫逺意因之汶陽川增張籍新桃桃生葉婆娑枝葉四面多髙未出墻顛蒿莧相凌摩植之三年餘今年初試花秋來未成實其隂良已嘉青蟬不來鳴安得迅羽過常恐牽絲蟲蒙羃成網羅顧託戲童兒勿折吾柔柯明年結甘實磊磊充汝家白居易種桃歌食桃種其核一年核生芽二年長枝葉三年桃有花憶昨五六嵗灼灼盛芬華逮兹八九載有減而無加去春已稀少今春漸無多明年後年後芳意當如何命酒樹下飲停杯拾餘葩因桃忽自感悲吒成狂歌宋梅堯臣通判桃花廳種桃西庭下有意延東風東風與雨至染出枝上紅花底有小鳥其字曰桃蟲既於桃得名為桃言女工剪羅作舞衣奉君歡莫窮舉杯無愧者避世武陵翁蘇軾次韻表兄程正輔江行見桃花曲士賦懷沙草木傷莽莽德人無荆棘坐失嶺嶠阻我兄瑚璉姿流落漳江浦淨眼見桃花紛紛墮紅雨蕭然振衣裓笑問散花女我觀解語花粉色如黃土一言破千偈况爾初不語可憐一轉話他日如何舉故復此微吟聊和嘔啞櫓江邊間草木間客當為主邇來子美瘦正坐作詩苦袖手焚筆研清篇真漫與願君理北轅六轡去如組上林桃花開水暖鴻北翥元劉詵和羅昌逢千葉桃閏贏首增春朔霽久連望梅殘不留玉桃盛忽成障異姿奪衆妍姝萼同一狀重緋雜裼襲疊綵迷下上淚明露借光影墮日分漾紛披競年華翦刻費天匠先生被花惱書罷時亦訪亭空晝無人山鳥立幽桁橫波繞碧帶老樹入古像同遊無前度得句有孤倡仙源誰與期微風起衣浪明仁宗桃園春曉曙光猶未分芳園露華炫碧桃千萬樹鮮妍如錦絢隔林鶯語滑兩兩間關囀掖垣將啓扉漏箭傳聲逺花底候宫車更覺東風軟袁凱桃溪繁花亦何言人至迹愈顯因石自髙下緑源屢回轉鶯啼隂久匝雨霽苔猶淺漁父欲問津煙中聞雞犬七言古詩原唐王維桃花源行漁舟逐水愛山春兩岸桃花夾去津坐看紅樹不知逺行盡青溪不見人山口潛行始隈隩山開曠望旋平陸遙看一處攢雲樹近入千家散花竹樵客初傳漢姓名居人未改秦衣服居人共住武陵源還從物外起田園月明松下房櫳靜日出雲中雞犬喧驚聞俗客爭來集競引還家問都邑平明閭巷掃花開薄暮漁樵乘水入初因避地去人間及至成仙遂不還峽裏誰知有人事世中遙望空雲山不疑靈境難聞見塵心未盡思鄉縣出洞無論隔山水辭家終擬長遊衍自謂經過舊不迷安知峰壑今來變當時只記入山深青溪幾曲到雲林春來遍是桃花水不辨仙源何處尋李白寄逺憶昨東園桃李紅碧枝與君此時初别離金瓶落井無消息令人行歎復坐思坐思行歎成楚越春風玉顔畏銷歇碧窗紛紛下落花青樓寂寂空明月兩不見但相思空留錦字表心素至今緘愁不忍窺杜甫風雨看舟前落花戲為新句江上人家桃樹枝春寒細雨入踈籬影遭碧水潛勾引風妬紅花却倒吹吹花困癲旁舟楫水光風力俱相怯赤憎輕薄遮人懷珍重分明不來接濕久飛遲半欲髙縈沙惹草細于毛蜜蜂蝴蝶生情性偷眼蜻蜓避百勞韓愈桃源圖神仙有無何渺茫桃源之説誠荒唐流水盤回山百轉生綃數幅垂中堂武陵太守好事者題緘逺寄南宫下南宫先生欣得之波濤入筆驅文辭文工畫妙各臻極異境恍忽移于斯架巖鑿谷開宫室接屋連墻千萬日嬴顛劉蹶了不聞地圻天分非所恤種桃處處惟閛花川源逺近蒸紅霞初來猶自念鄉邑嵗久此地還成家漁舟之子來何所物色相猜更同語大蛇中斷喪前王羣馬南渡開新主聼終詞絶共凄然自説今經六百年當時萬事皆眼見不知幾許猶流傳爭持酒食來相饋禮數不同樽爼異月明半宿玉堂空骨冷魂清無夢寐夜半金雞啁唽鳴火輪飛出客心驚人間有纍不可住依然離别難為情船開棹進一回顧萬里蒼蒼煙水暮世俗寧知偽與真至今傳者武陵人增元稹南家桃南家桃樹深紅色日照露光看不得樹小花狂風易吹一夜風吹滿墻北離人自有經時别眼前落花心歎息更待明年花滿枝一年迢遞空相憶李咸用緋桃花歌上帝春官思麗絶夭桃變態求新悅便是花中傾國容牡丹泫露長門月野樹滴殘鵑呌血曦車碾下朝霞屑惆悵東風未解狂爭教此物芳菲歇宋歐陽修四月九日幽谷見緋桃盛開經年種花滿幽谷花開不暇把一巵人生此事尚難必况欲功名書鼎彛深紅淺紫看雖好顔色不耐東風吹緋桃一樹獨後發意若待我留芳菲清香嫩蕊含不吐日日怪我來何遲無情草木不解語向我有意偏依依羣芳落盡始爛漫榮枯不與衆艷隨念花意厚何以報唯有醉倒花東西盛開比落猶數日清樽尚可三四擕王安石移桃花示俞秀老舍南舍北皆種桃東風一吹數尺髙枝柯蔫綿花爛漫美錦千兩敷亭臯晴溝漲春緑周遭俯視紅影移漁舠山前邂逅武陵客水際髣佛秦人逃攀條弄芳畏晼晚已見黍雪盤中毛仙人愛杏令虎守百年終屬樵蘇手我衰此果復易朽蟲來食根那得久瑶池紺絶誰見有更植花時且進酒君能酩酊相隨否元吾丘衍桃花雨樂府一章寄翼之秦源春夢陽臺晚風散驚紅作秋苑間隂碧樹搖暖雲茸苔羅水香氤氲蝶飛不􅊜煙綿路吳娥怨澀鸞階步參差海羽雙燕來依微石舞瀟湘回明楊基千葉桃花江花先好還先落一月芳菲已蕭索掖垣一樹獨閛遲嫩葉蘢蓯抱香萼朝來小雨浥輕紅春色千重與萬重點注定知煩曉露剪裁寧不費春工春來到處尋桃李不道東闌花自美傷心世事總如花何用勞勞行萬里憶左掖千葉桃花穠李積皓雪繁桃炫朝霞江邊日日見春色盡是尋常兒女花東闌一樹能傾國千瓣玲瓏誰剪刻半吐疑紅却勝紅全開似白元非白旁雖淺淡正復穠雅麗稱月間宜風隂時晴午各異態嗔喜笑顰無不工嗟我匆匆簿書急時復微吟對花立白苧猶沾夕露香青鞋不怕蒼苔􅊜而今漂泊楚江濵想像丰儀一愴神惆悵當時看花客對花還説去年人寫生碧桃花歌少年慣作看花客陌上桃花總相識春風似向此中偏一種花開百般色只愛深紅更淺紅君家此夲更不同枝上白雲吹不散階前明月照疑空一縱一橫根各别香上斜封愁欲折畫筵紅燭人半醉忽見此花驚是雪武陵秦人那得知河陽滿縣徒爾為當時東風千樹錦未比君家璚樹枝翠禽飛來嗟易見粉蝶棲時難可辨紅妝美女嬌如花著向花間應掩面花今正開鶯亂啼酒醒拈筆為君題羡君兄弟如虹霓豪飲不愁花下迷玉壺清酒金偏提秦筝琵琶羌管齊走覔橋西舊酒伴莫待風雨花成泥王弼戲題窗前小桃小桃甚小能芬芳乃在主人廳柱旁忽然見此婉清揚使我廢書典衣裳去年柔弱風中狂樊姬癡小未解妝緑羅衫袂紅錦襠一笑伴我窗風涼一春寂寞臥桁楊花氣撲簾聞晝香水飄竹格小匡床主人乃是江左王小桃小桃弗爾傷坐看明年廳柱長原王世貞閩中喬木俱成林林家主人饒隱心時篘竹葉千斛酒來坐桃花萬樹隂淡日輕煙釀芳暝翠羽黃鸝喚妝醒開處疑蒸紫帽霞澆時欲涸栴檀井祝君度索三千春有子仍為金母珍漢帝方徴上林植可容長作武陵人馮琦無棣城邊春欲暮臥龍岡上花如霧年年醉徹武陵煙至今記得桃源路桃源遍地桃花水翠屏髙傍層城起寧可餘姿點緑蕪肯將浮艷誇穠李始看一徑盤空曲漸入千枝散朝旭滿樹殘霞爛不收一天香雨飛紅玉白雲深鎖揚子居青山自愛陶公廬平蕪十里間看鳥春水一竿不羡魚大隱何須分出處賞心豈必長林莽桃李濃滋華省隂公門自是韶華主綏山一顆憶仙家絶勝河陽萬樹花嵗嵗願公懸水鏡長將秋實代春華趙福元神仙擁出蓬萊宫羅幃繡幕圍香風雲鬟繞繞梳翡翠頳顔滴滴勻猩紅千嬌百媚粲相逐爛醉芳春逞芬馥朝陽影裏燦紅瓊晨霞香中咽寒玉承恩侍宴青帝前錦衣半脫酣晝眠鶯鶯燕燕扶不起巧呼苦喚殊可憐傍欄無力嬌欲語花羣本是桃源女幾年流水飯胡麻今在武陵溪上住五言律詩御製和唐太宗詠桃花即用原韻苑裏韶華滿春工試綺妝霞輕籠樹影日暖散林光倚檻千叢錦開簾百和香東風自駘宕長護萬年芳增唐太宗詠桃禁苑春暉麗花蹊綺樹妝綴條深淺色點露參差光向日分千笑迎風共一香如何仙嶺側獨秀隱遙芳李嶠詠桃獨有成蹊處穠華發井傍山風凝笑臉朝露泫啼妝隱士顔應改仙人路漸長還欣上林苑千嵗奉君王劉長卿晚桃四月深澗底桃花方欲然寧知地勢下遂使春風偏此意頗堪惜無言誰為傳過時君未賞空媚幽林前溫庭筠敷水小桃盛開敷水小橋東娟娟照露叢所嗟非勝地堪恨是春風二月艷陽節一枝惆悵紅定知留不住吹落路塵中李商隱桃園竟日小桃園休寒亦未暄坐鶯當酒重送客出墻繁啼久艷粉薄舞多香雪翻猶憐未圓月先出照黃昏宋韓琦百井路山桃漫嶺夭桃樹無人亦自開雲霞深隱洞錦繡逺成堆生意驚樵斧芳情謝宴杯莫迷行客路不似武陵回明髙啓桃花春色東家出相窺似有心曲垣遮自短别院閉還深影動疑人折香搖妬蝶尋好風時解意吹片拂羅襟原申時行桃溪分得元都種依然玉洞春逶迤成曲徑爛漫及芳辰錦疊溪邊浪紅銷雨後塵武陵差可擬吾豈避秦人方九功一曲桃園樹平沙十里春落花紅勝錦藉草緑如茵野興邀詩伴村沽覓酒鄰怕逢漁父問疑是避秦人陸卿子一覩傾城貌千山斂夕霏露桃差比艷汀月借生輝躡磴雲迎襪凌波水濺衣餘芳吹不散常繞渚煙飛七言律詩原唐杜甫題桃樹小徑升堂舊不斜五株桃樹亦從遮髙秋總餧貧人實來嵗還舒滿眼花簾户每宜通乳燕兒童莫信打慈鴉寡妻羣盜非今日天下車書正一家增白居易晚桃花一樹紅桃亞拂池竹遮松蔭晚開時非因斜日無由見不是間人豈得知寒地生材遺較易貧家飬女嫁常遲春深欲落誰憐惜白侍郎來折一枝溫庭筠反生桃花發因題病眼相逢四壁空夜來山雪破東風未知王母千年熟且共劉郎一笑同已落又開橫晚翠似無如有帶朝紅僧虔蠟炬髙三尺莫惜連宵照露叢唐彥謙緋桃短墻荒圃四無鄰烈火緋桃照地春坐久好風休掩袂夜來細雨已沾巾敢同俗態期青眼似有微辭動綘唇盡日更無鄉井念此時何必見秦人李咸用緋桃花茫茫天意為誰留深染夭桃備勝遊未醉已知醒後憶欲開先為落時愁癡蛾亂撲燈難滅躍鯉傍驚電不收何事梨花空似雪也稱春色是悠悠李中詠桃花祗應紅杏是知音灼灼偏宜間竹隂幾樹半開金谷曉一溪齊綻武陵深艷舒百葉時皆重子熟千年事莫尋誰步宋墻明月下好香和影上衣襟韋莊詠庭前桃曾向桃源爛漫遊也同漁父泛仙舟皆言洞裏千株好未勝庭前一樹幽帶露似垂湘女淚無言如伴息媯愁五陵公子饒春恨莫引香風上酒樓宋梅堯臣和江鄰幾省中賞小桃年年二月賣花天唯有小桃偏占先初見嫩紅無不喜終知俗艷幾多妍鄰翁已折郊園裏貴客爭誇粉署邊可惜工夫吟向此會須重醉牡丹前次韻和王舍人憶省中小桃寄江學士淺綻胭脂紫蠟芳深斟吳酎白瓊觴鳳池人憶去年艷雉省客無今日狂髣佛物華先上苑依稀歌吹下昭陽平明社雨莫催促應玩移牀欲近傍蔡襄過楊樂道宅西桃花盛開城隈繞舍似山家舍下新桃已放花無限幽香風正好不勝狂艷日初斜自憐馬上空愁望誰向樽前與醉誇京國難逢春氣味莫隨塵事度年華孔武仲館中桃花蓬壺深絶鎖芳菲初出仙桃第一枝天近自應風景别春長莫恨化工遲相從朱户人稀到半掩香苞蝶未知想像江南今盛發亦經頻雨稍離披陸遊連日至梅仙塢及花涇觀桃花千載桃源信不通鏡湖西塢擅春風舟行十里畫屏上身在兩山紅雨中俗事挽人常故故夕陽歸棹莫匆匆豪華無復當年樂爛醉狂歌亦足雄桃花塢近釣魚磯不比劉郎萬里歸水底紅雲迷醉眼樽前絳雪點春衣病依几杖猶能出老愛風光未忍違天借清遊每窮日夜深炬火候柴扉原張虛菴笑披初服返林臯小築精廬榜慕陶已買扁舟浮緑水更依疏栁插紅桃春風荏苒來三徑嵗月侵尋入二毛却笑文章緣業在篋書重簡課兒曹增金王寂桃花應嗔國色朝酣酒賜與羽衣如太真道士厭看千樹老令君别換一城新緗梅拂額更不俗栗玉削肌殊可人想得乞漿尋舊約春風不似去年春元楊載碧桃一枝如玉照芳春幾度憑闌欲殢人翠被夜寒愁灑淚珠簾月冷怕傷神劉郎陌上栽仍舊王母池邊賞又新不是梨花飄雪樹望中淸絶更無倫曹文晦桃源春曉數點殘星挂緑蘿看桃行入舊山阿洞門花霧紅成陳沙麓巖前翠作渦天外曙光驚鶴夢水邊啼鳥和漁歌劉郎去後無人到吟倚東風草色多馬臻桃花淺碧繁紅又滿枝化工消息本無機艷滋曉露鶯搖落香漬春泥燕掠歸金谷園中芳草在玄都觀裏昔人非自從雲隔天台路劉阮如今夢亦稀黃可玉碧桃洗盡嬌紅出翠帷玉人無語背斜暉緑華前度通仙譜天水何年染素衣宴罷瑶池春夢斷影寒姑射夜深歸禁煙時莭多風雨莫遣繁英一片飛明楊基桃花深深翠竹映嬋娟湘女梳妝立曉煙流水落花成悵望舞裙歌袖是因緣也無人折休相妬才有鶯啼更可憐却憶東闌碧千葉暖風香雨為誰妍陳鴻詠紅白桃花雙艷如從露井看妝分濃淡映雕欄玉膚中酒冰綃薄粉面窺人錦帳寒杏雨並隨窗外度梨雲同入帳中殘膽瓶不是餘香在定訝珊瑚間木難原申時行山中看桃花萬山回合似天台二月桃花已遍閛映水却疑乘浪暖緣崖故是倚雲栽亂紅飛雨沾衣袂碎錦分霞入酒杯謾道武陵仙路逺探竒有客問津來方廣德露井花時露未晞紫文丹萼鬭芳菲佳人南國還嬌艷仙種西池定是非浥雨别含濃淡態籠煙怯逗淺深暉祇緣瓊貌難為侣獨傍房陵片玉飛曹大章竹徑寥寥空碧苔雙星忽漫照髙臺唾飛白玉風前落舄度青雲江上來螭尾清班原帝侍虎頭詞客總仙才相逢莫問年來事惟有桃花似舊開增胡師閔粉紅桃花溫情膩質可憐生浥浥輕韶入粉勻新暖透肌紅沁玉曉風吹酒淡生春窺墻有態如含笑對面無言故惱人莫作尋常輕薄看楊家姊妹是前身五言排律增唐章孝標玄都觀栽桃十韻驅使鬼神功攢栽萬樹紅薰香丹鳳闕妝點紫瓊宫寶帳重遮日妖金遍纍空色燃燒藥火影舞步虛風粉撲青牛過枝驚白鶴沖拜星春錦上服食曉霞中碁局隂長合簫聲祕不通艷陽迷俗客幽邃失壺公根柢終盤石桑麻自轉蓬求師飽靈藥他日訪遼東薛能桃花秀氣自天鍾千年豈易逢開齊全未落繁極欲相重冷濕朝如淡晴乾午更濃風光新社燕時莭舊春鴻籬落欹臨竹亭臺盡間松亂緣堪羡蟻深入不如蜂有影宜暄煦無言自冶容洞連非俗世蹊靜接仙蹤子熟河應變根盤土已封西王潛愛惜東朔盜過從醉席眠英好題詩戀景慵芳菲聊一望何必在臨邛五言絶句增唐李商隱嘲桃無賴夭桃面明露井東春風為開了却擬笑春風原鄭谷感興禾黍不陽艷競栽桃李春翻令力耕者半作賣花人宋崔鷃殘夜迷春曉夭桃怯夜寒何人未妝洗先傍玉欄干增蘇軾和子由岐下桃花爭閛不待葉密綴欲無條傍沼人窺鑑驚魚水濺橋原王十朋桃花在處飄紅雨臨窗照夕陽何時清禁裏一醉伴仙郎增明陳道復題桃花春光何爛漫桃花發滿溪武陵香萬樹寧不放人題楊基壺中二色桃花素頰映紅腮西園共折來憐渠竟先落知是最先開李東陽桃花種樹乘春雨開花待曉風一年還一樹隨意滿園紅七言絶句御製雨後見桃花新雨濛濛宜五沃蒸霞始放見錢江初春錦繡鋪千樹落日微吟坐北窗增唐李嶠從宴桃花園詠桃花應制嵗去無言忽憔悴時來含笑吐氛氲不能擁路迷仙客故欲開蹊待聖君趙彥伯從宴桃花園詠桃花應制紅萼競然春苑曙丰茸新色御筵開長年願奉西王宴近侍慚無東朔才蘇頲從宴桃花園詠桃花應制桃花灼灼有光輝無數成蹊點更飛為見芳林含笑待遂同溫樹不言歸李乂侍宴桃花園詠桃花應