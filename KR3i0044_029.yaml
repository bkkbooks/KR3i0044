body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷二十七花譜李花李實别見果譜原李樹大者髙丈許樹之枝榦如桃葉緑而多花小而繁色白増格物叢話桃李二花同時竝開而李之淡泊纎穠香雅潔宻兼可夜盼有非桃之所得而埒者彚考原詩召南何彼穠矣花如桃李増宋書符瑞志晉武帝太元十九年正月丁亥華林園延賢堂西北李樹連理宋文帝元嘉十四年南郡江陵光褘之園甘李二連理南齊書祥瑞志永明四年二月秣陵縣髙天明園中李樹連理生髙三尺五寸兩枝别生復髙三尺合為一榦七年江寜縣李樹二株連理兩根相去一丈五尺原東方朔外傳東方朔與弟子俱行朔渇令弟子叩道傍人家門不知室主姓名呼之不應朔復往見博勞飛集其家李木上謂弟子曰主人當姓李名博汝呼當應室中人果有姓李名博者出與朔相見即入取飲與之樞要録伍貫卿居沅陵家有李花一株月夜奴婢遥見花作數團如飛仙狀上天去花上露水倐然作雨數千㸃花亡矣叙聞録憲宗以鳯李花釀換骨膠賜裴度承平舊纂蕭瑀陳叔達於龍昌寺㸔李花相與論李有九標謂香雅細淡潔宻宜月夜宜緑鬢宜白酒髙隠外書元微之白樂天兩不相下一日同詠李花微之先成葦綃之句樂天乃服盖葦綃白而輕一時所尚增耕桑偶記終南及廬岳出好李花兩京貴侯富民以千金買種終廬有致富者三栁軒雜識余嘗評花以為李如東郭貧女花經千葉李五品五命瓶花譜千葉李七品三命灌園史語云桃李不言下自成蹊予謂桃花如麗姝歌舞塲中定不可少李花如女道士煙霞泉石間獨可無一乎集藻五言古詩増宋雞鳴髙樹顚古詞桃生露井上李樹生桃傍蟲来嚙桃根李樹代桃僵陳江總詠李嘉樹春風早春風花落新但見成蹊處幾得正冠人當知露井側復與夭桃鄰唐太宗賦得李玉衡流桂圃成蹊正可尋鶯啼宻葉外蝶戯脆花心麗景光朝彩輕烟散夕隂暫顧暉章側還眺靈山林元劉詵閑居燕坐望城隅李花春晴滿天地我獨了一室得欣或暫時積念動彌日遥花洗宿潤姝靜耿獨立日光照素服玉氣起數尺紛紛㸔花人車馬共朝夕幽意當誰言微風㫁城笛七言古詩原唐韓愈李花贈張十一署江陵城西二月尾花不見桃惟見李風揉雨練雪羞比波濤翻空杳無涘君知此處花何似白花倒燭天夜明羣雞驚鳴官吏起金烏海底初飛来朱輝散射青霞開迷䰟亂眼㸔不得照耀萬樹繁如堆念昔少年著遊燕對花豈省曽辭杯自從流落憂感集欲去未到先思迴祗今四十已如此後日更老誰論哉力攜一樽獨就醉不忍虚擲委黄埃李花二首平旦入西園梨花數株若矜夸旁有一株李顔色慘慘似含嗟問之不肯道所以獨繞百匝至日斜忽憶前時經此樹正見芳意初萌芽奈何趁酒不省錄不見玉枝攢霜葩泫然為汝下雨淚無由返斾羲和車東風来吹不解顔蒼茫夜氣生相遮氷盤夏薦碧實脆斥去不御慙其花當春天地争奢華洛陽園苑尤紛拏誰将平地萬堆雪翦刻作此連天花日光赤色照未好明月暫入都交加夜領張徹投盧仝乗雲共至玉皇家長姬香御四羅列縞裙練帨無等差静濯明妝有所奉顧我未肯置齒牙清寒瑩骨肝膽醒一生思慮無由邪宋歐陽修感李花昨日摘花初見桃今日摘花還見李晴風暖日苦相催春物所餘知有㡬中年多病壯心衰對酒思歸未及歸不及牆根花與草春来隨處自芳菲五言律詩増唐李商隐李花李徑獨来數愁情相與懸自明無月夜强笑欲風天減粉與園籜分香沾渚蓮徐妃乆已嫁猶自玉為鈿子直晉昌李花吴館何時熨秦䑓幾夜熏綃輕誰解卷香異自先聞月裏誰無姊雲中亦有君樽前見飄蕩愁極客襟分原宋司馬光李花嘉李繁相倚園林淡泊春齊紈翦衣薄吴紵下機新色與晴光亂和露氣勻望中皆玉樹環堵不為貧范屏麓李花麗日風和暖漫山李正開盈林銀綴簇滿樹雪成堆清馥勝秋菊芳姿比臘梅杖藜遊侠子攀折晩歸来七言律詩原宋陳與義望燕公樓下李花燕公樓下繁華樹一日遥㸔一百囘羽葢夢餘當晝立縞衣風急過墻来洛陽路不容春到南國花應為客開今日豈堪簮短髮感時傷舊意難裁増楊萬里丙戌上元後和昌英叔李花春暖何縁雪壓山香来初認李花繁露酣月蘂蒼茫外梅與山礬伯仲間剰雨殘風底無賴明朝後日不堪看泥深小忍春遊腳猶遣青童去一攀明楊基李花憶與盧仝共㸔来花光月色兩徘徊江村逺䖏長相識風雨寒時已早開霽雪玲瓏愁易濕春氷輕薄笑難裁江城二月城西路誰惜柔香滿翠苔五言絶句原唐太宗探得李盤根直盈渚交榦横倚天舒華光四海卷葉䕃三川増宋蘓軾和子由岐下李不及梨英輭應慙梅蕚紅西園有千葉澹佇更纎穠明李東陽詠李名果出吾家移栽自海涯要看花勝雪先放雨催花七言絶句増宋蔡㐮玉臺驛見晩李花有感玉京仙子愛春芳弄徧瓊枝嗅盡香祗有此花知舊意又隨風色過東墻原楊萬里讀退之李花詩并序桃李嵗嵗同時並開而退之有花不見桃惟見李之句殊不可解因晩登碧落堂望隔江桃皆暗而李獨明乃悟其妙盖炫晝縞夜云近紅暮㸔失臙脂逺白宵明雪色竒花不見桃惟見李一生不曉退之詩李花山荘又報李花穠火急来㸔細雨中除却㫁膓千樹雪别無春恨訴東風李花宜逺更宜繁惟逺惟繁更足㸔莫學江梅作踈影家風各自一般般劉克荘李花為愛橋邊半樹斜觧衣貰酒隔橋家唐人苦死無標致只識𤣥都觀裏花詩散句原宋司馬光碎錦不飛蒙樹合素雲欹本亞枝難増梅堯臣重門深鎻春風入先折桃花與李花唐張九齡成蹊謝李徑李白託隂當樹李原杜甫仙李盤根大元稹葦綃開萬朶詞原万俟雅言尉遲杯慢碎雲薄向碧玉枝頭綴萬萼如将汞粉勻開疑似柏麝薫却雪魄未應若况天賦標艶仍綽約當暄風暖日佳處戲蝶游蜂粘著重重繡帟珠箔障濃艶霏霏異香漠漠見説徐妃當年嫁了信任玉鈿零落無言自啼露蕭索夜深待月上䦨干角廣寒宫要與姮娥素妝一夜相學別錄増神仙傳老子之母適至李樹下而生老子生而能言指李樹曰以此為我姓本草李根可治瘡服其花令人好顔色棃花梨實别見果譜原梨樹似杏髙二三丈葉亦似杏微厚大而硬色青光膩有細齒老則斑㸃二月間開白花如雪六出増格物叢話春二三月百花開盡始見梨花靚艶寒香罕見賞識又一種千葉花賦姿迥别花木考梨花有二種瓣舒者佳彚考増宋書符瑞志文帝元嘉十四年二月宫内螽斯堂前梨樹連理原唐書杜景佺傳武后嘗季秋出梨花示羣臣宰相皆賀景佺獨曰隂陽不相奪倫凟則為災故曰冬無愆陽夏無伏隂春無淒風秋無苦雨今草木黄落而梨復花凟隂陽也祥雲志梁緒梨花時折花簪之􅐦損帽簷至頭不能舉金鑾宻記九仙殿銀井有梨二株枝葉交接宫中呼為雌雄樹唐餘録洛陽梨花時人多㩦酒其下曰為梨花洗妝或至買樹増清異録司空圗菩薩蠻謂梨花為瀛洲玉雨雲齋廣錄汝陽侯穆清叔因寒食縦歩郊外㑹數年少同飲梨花下各賦棃花詩清叔得愁字詩曰共飲棃花下梨花挿滿頭清香来玉樹白蟻泛金甌妝靚青娥妒光凝粉蝶羞年年寒食夜吟繞不勝愁衆客閣茟原花經棃花五品五命瓶花譜棃花四品六命蜀都雜抄黎州安撫司内小㕔東有棃樹一株髙九丈圍九尺州人取其枝以接果豈黎以梨名耶州人呼為三藏梨相傳為唐僧西遊植黎杖于此曰他日州治在此恐非實事古稱黎杖黎即苜蓿養之歴霜雪經一二嵗木本修直生鬼面可杖取其徑而堅非梨木也洞庭山記山陽樹棃數十千華甚盛憑髙一盼夫非白雲鄊耶惜相過晩耳滇雲紀勝書棃花處䖏有之或擁山巔或列山腳或滿人村望之如濤如雪僕自曲靖還省時有乍疑洱海濤初起忽憶蒼山雪未消之句學圃餘䟽余性愛棃花而㣲恨其氣不可嗅吾地酷少此種溶溶院落何可無此君終當致之増横山草堂記空藴庵庭植梨樹一株春時弄色於細雨㣲煙恍玉人之初沐也集藻贊増宋孝武帝棃花贊沃瘠異壌舒惨殊時惟氣在春具物含滋嘉樹之生于彼山基開榮布采不離塵緇賦増唐盧照鄰病棃樹賦并序癸酉之嵗余卧病于長安光徳坊之官舎閴寂無人伏枕十旬閉門三月庭無衆木惟有病梨一樹圍纔數握髙僅盈尺花實憔悴似不任乎嵗寒枝葉零丁絶有意乎朝暮嗟乎同托根于膏壌俱稟氣于太和而修短不均榮枯殊貫豈賦命之理得之自然將資生之化有所偏及樹猶如此人何以堪有感扵懐賦之云爾天象平運方祇廣植挺芳桂于月輪横扶桑于日域建木聳靈丘之上蟠桃生巨海之側細枝葉連洪柯條直齊天地之一指任烏兔之棲息或垂隂萬畞㦯結子千年何偏施之雨露何獨厚之風煙愍兹珍木離離幽獨飛茂實于河陽傳芳名于金谷紫澗稱其殊㫖𤣥光表其仙族爾生何為零丁若斯無輪桷之可用無棟梁之可施進無違于斤斧退無競于班倕無庭槐之生意有巖桐之死枝爾其髙纔數仭圍僅盈尺修榦罕雙枯條每隻葉病多紫花凋少白夕鳥怨其巣危秋蟾悲其翳窄怯衝飇之揺落忌炎景之臨迫既而地歇蒸霧天收耀靈西秦明月東井流星顦顇孤影徘徊直形状金莖之的的疑石柱之亭亭若夫西海夸父之林南海蚩尤之樹莫不摩霄拂日藏雲吐霧別有橋邉朽柱天上靈查年年嵗嵗無葉無花榮辱兩齊吉凶同軌寧守雌以外䘮不修襮而内否亦猶縦酒髙賢佯狂君子為其脗合置其憂喜生非我生物謂之生死非我死谷神不死混彭殤于一觀庶筌蹏于兹理宋陳藻棃花賦絪緼無涯孕精産荂九旬流華四月孔奢有匪浮誇花外之花爾其姢静閒暇以窈窕兮敷舒幽貞其清皦兮恬淡瀟灑委蛇淳雅羙不邇麗素不鄰野若帝厭爾衆芳之滛冶我宜錫其純嘏者邪濯濯春雨皓皓蕐月彼質而静彼淡而悦或依于葛我所執兮或俯于藻我所拾兮祠庭閴寂樹英繁宻祁祁僮僮如出而入奚素絢以比容徴彤管而名實夫大竅闔闢冶至靈甄無識盖有暌性而合質者邪于何后妃兮似欣欣乎晴光余将歸寜兮眡滌濯乎衣裳流水之陽古公胥宇乃㩦乃姜不容不妝后脱簪珥露諌宣王煙之蒼蒼青障于張解圍小郎三三兩兩寒牕之傍恍兮文徳散帙于中宫左嬪摛思于椒房函如六齡之鄧衰若大家之班或乃暴風滛雨赴死無懼生兮貞女殁兮烈婦于嗟牡丹彼羙芍藥胡為顔色可與娱樂丰丰褒姒豔􅝰麗姬君以為妍人以為媸花百其試予兹懿哉亂曰匪冬而雪匪夜而月香山何人題我太真江之永兮不可泳思漢之廣矣不可方思晁補之北京官舍後棃花賦梨於經無記而舎後棃人所不賞故賦之其辭曰攬察草木本原所起李梅紀于隕霜兮橘柚隨乎織筐木𤓰足贈而詠詩含桃可羞而記禮雖信微而有托兮亦不委夫厥羙惟兹棃之俊茂兮羌獨逺而未揚含温潤之秀質兮皎若和璧榮其光澹暗惬其無偶兮厯年嵗之已長暮春者陽癉憤盈羣木解膚似夸者似鬬者似辴者似頩者色非一色同嫵殊嫮兹棃姢然獨見其素繄過時兮不省滋脉脉兮後户亦何必耀榮華兮朝日顧恩私兮泣露然而中唐之樗枝大扶踈以其近人人以縶駒則磨則齧則折則泄孰與夫朽壌幽薄厥植維弱履屐不蹈根乃磅礴五言古詩御製詠畫梨花最愛棃花白又惜同春老唯此畫圗中冬夏長羙好不令風雨催且無蜂蝶繞靚妝伴月容盡在紙間造惡紫嫌奪朱素體物難攪三品運胸中六法生卉草増齊王融詠池上棃花翻階沒細草集水間踈萍芳春照流雪深夕映繁星劉繪和池上棃花露庭晩飜積風閨夜入多縈樷似亂蝶拂燭状聨蛾梁沈約西地棃列茂河陽苑蓄紫濫觴隈翻黄秋沃若落素春徘徊原劉孝綽於座應令