body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷二十七花譜李花李實别見果譜原李樹大者髙丈許樹之枝幹如桃葉緑而多花小而繁色白增格物叢話桃李二花同時並開而李之淡泊纎穠香雅潔密兼可夜盼有非桃之所得而埒者彚考原詩召南何彼穠矣花如桃李增宋書符瑞志晉武帝太元十九年正月丁亥華林園延賢堂西北李樹連理宋文帝元嘉十四年南郡江陵光褘之園甘李二連理南齊書祥瑞志永明四年二月秣陵縣髙天明園中李樹連理生髙三尺五寸兩枝别生復髙三尺合為一幹七年江寧縣李樹二株連理兩根相去一丈五尺原東方朔外傳東方朔與弟子俱行朔渴令弟子叩道傍人家門不知室主姓名呼之不應朔復往見博勞飛集其家李木上謂弟子曰主人當姓李名博汝呼當應室中人果有姓李名博者出與朔相見即入取飲與之樞要録伍貫卿居沅陵家有李花一株月夜奴婢遙見花作數團如飛仙狀上天去花上露水倐然作雨數千點花亡矣敘聞録憲宗以鳯李花釀換骨膠賜裴度承平舊纂蕭瑀陳叔達於龍昌寺看李花相與論李有九標謂香雅細淡潔密宜月夜宜緑鬢宜白酒髙隱外書元微之白樂天兩不相下一日同詠李花微之先成葦綃之句樂天乃服蓋葦綃白而輕一時所尚增耕桑偶記終南及廬嶽出好李花兩京貴侯富民以千金買種終廬有致富者三栁軒雜識余嘗評花以為李如東郭貧女花經千葉李五品五命瓶花譜千葉李七品三命灌園史語云桃李不言下自成蹊豫謂桃花如麗姝歌舞場中定不可少李花如女道士煙霞泉石間獨可無一乎集藻五言古詩增宋雞鳴髙樹顚古詞桃生露井上李樹生桃傍蟲來嚙桃根李樹代桃僵陳江總詠李嘉樹春風早春風花落新但見成蹊處幾得正冠人當知露井側復與夭桃鄰唐太宗賦得李玉衡流桂圃成蹊正可尋鶯啼密葉外蝶戲脆花心麗景光朝彩輕煙散夕隂暫顧暉章側還眺靈山林元劉詵間居燕坐望城隅李花春晴滿天地我獨了一室得欣或暫時積念動彌日遙花洗宿潤姝靜耿獨立日光照素服玉氣起數尺紛紛看花人車馬共朝夕幽意當誰言微風斷城笛七言古詩原唐韓愈李花贈張十一署江陵城西二月尾花不見桃惟見李風揉雨練雪羞比波濤翻空杳無涘君知此處花何似白花倒燭天夜明羣雞驚鳴官吏起金烏海底初飛來朱輝散射青霞開迷魂亂眼看不得照耀萬樹繁如堆念昔少年著遊燕對花豈省曽辭杯自從流落憂感集欲去未到先思回祗今四十已如此後日更老誰論哉力攜一樽獨就醉不忍虛擲委黃埃李花二首平旦入西園梨花數株若矜夸旁有一株李顔色慘慘似含嗟問之不肯道所以獨繞百匝至日斜忽憶前時經此樹正見芳意初萌芽奈何趁酒不省録不見玉枝攢霜葩泫然為汝下雨淚無由返斾羲和車東風來吹不解顔蒼茫夜氣生相遮氷盤夏薦碧實脆斥去不御慙其花當春天地爭奢華洛陽園苑尤紛拏誰將平地萬堆雪翦刻作此連天花日光赤色照未好明月暫入都交加夜領張徹投盧同乘雲共至玉皇家長姬香御四羅列縞裙練帨無等差靜濯明妝有所奉顧我未肯置齒牙清寒瑩骨肝膽醒一生思慮無由邪宋歐陽修感李花昨日摘花初見桃今日摘花還見李晴風暖日苦相催春物所餘知有幾中年多病壯心衰對酒思歸未及歸不及牆根花與草春來隨處自芳菲五言律詩增唐李商隱李花李徑獨來數愁情相與懸自明無月夜強笑欲風天減粉與園籜分香沾渚蓮徐妃久已嫁猶自玉為鈿子直晉昌李花吳館何時尉秦臺幾夜熏綃輕誰解卷香異自先聞月裏誰無姊雲中亦有君樽前見飄蕩愁極客襟分原宋司馬光李花嘉李繁相倚園林淡泊春齊紈翦衣薄吳紵下機新色與晴光亂和露氣勻望中皆玉樹環堵不為貧范屏麓李花麗日風和暖漫山李正開盈林銀綴簇滿樹雪成堆清馥勝秋菊芳姿比臘梅杖藜遊俠子攀折晚歸來七言律詩原宋陳與義望燕公樓下李花燕公樓下繁華樹一日遙看一百回羽蓋夢餘當晝立縞衣風急過墻來洛陽路不容春到南國花應為客開今日豈堪簮短髮感時傷舊意難裁增楊萬里丙戌上元後和昌英叔李花春暖何緣雪壓山香來初認李花繁露酣月蘂蒼茫外梅與山礬伯仲間剩雨殘風底無賴明朝後日不堪看泥深小忍春遊腳猶遣青童去一攀明楊基李花憶與盧同共看來花光月色兩徘徊江村逺處長相識風雨寒時已早開霽雪玲瓏愁易濕春氷輕薄笑難裁江城二月城西路誰惜柔香滿翠苔五言絶句原唐太宗探得李盤根直盈渚交幹橫倚天舒華光四海卷葉蔭三川增宋蘇軾和子由岐下李不及梨英軟應慙梅蕚紅西園有千葉淡佇更纎穠明李東陽詠李名果出吾家移栽自海涯要看花勝雪先放雨催花七言絶句增宋蔡襄玉臺驛見晚李花有感玉京仙子愛春芳弄遍瓊枝嗅盡香祗有此花知舊意又隨風色過東墻原楊萬里讀退之李花詩并序桃李嵗嵗同時並開而退之有花不見桃惟見李之句殊不可解因晚登碧落堂望隔江桃皆暗而李獨明乃悟其妙蓋炫晝縞夜云近紅暮看失胭脂逺白宵明雪色竒花不見桃惟見李一生不曉退之詩李花山莊又報李花穠火急來看細雨中除却斷腸千樹雪别無春恨訴東風李花宜逺更宜繁惟逺惟繁更足看莫學江梅作踈影家風各自一般般劉克莊李花為愛橋邊半樹斜解衣貰酒隔橋家唐人苦死無標致只識玄都觀裏花詩散句原宋司馬光碎錦不飛蒙樹合素雲欹本亞枝難增梅堯臣重門深鎖春風入先折桃花與李花唐張九齡成蹊謝李徑李白託隂當樹李原杜甫仙李盤根大元稹葦綃開萬朵詞原万俟雅言尉遲杯慢碎雲薄向碧玉枝頭綴萬萼如將汞粉勻開疑似柏麝薰却雪魄未應若况天賦標艷仍綽約當暄風暖日佳處戲蝶遊蜂粘著重重繡帟珠箔障濃艷霏霏異香漠漠見説徐妃當年嫁了信任玉鈿零落無言自啼露蕭索夜深待月上闌干角廣寒宫要與姮娥素妝一夜相學別録增神仙傳老子之母適至李樹下而生老子生而能言指李樹曰以此為我姓本草李根可治瘡服其花令人好顔色梨花梨實别見果譜原梨樹似杏髙二三丈葉亦似杏微厚大而硬色青光膩有細齒老則斑點二月間開白花如雪六出增格物叢話春二三月百花開盡始見梨花靚艷寒香罕見賞識又一種千葉花賦姿迥别花木考梨花有二種瓣舒者佳彚考增宋書符瑞志文帝元嘉十四年二月宫內螽斯堂前梨樹連理原唐書杜景佺傳武后嘗季秋出梨花示羣臣宰相皆賀景佺獨曰隂陽不相奪倫瀆則為災故曰冬無愆陽夏無伏隂春無淒風秋無苦雨今草木黃落而梨復花瀆隂陽也祥雲志梁緒梨花時折花簪之􅐦損帽簷至頭不能舉金鑾密記九仙殿銀井有梨二株枝葉交接宫中呼為雌雄樹唐餘録洛陽梨花時人多㩦酒其下曰為梨花洗妝或至買樹增清異録司空圗菩薩蠻謂梨花為瀛洲玉雨雲齋廣録汝陽侯穆清叔因寒食縱步郊外會數年少同飲梨花下各賦梨花詩清叔得愁字詩曰共飲梨花下梨花插滿頭清香來玉樹白蟻泛金甌妝靚青娥妒光凝粉蝶羞年年寒食夜吟繞不勝愁衆客閣茟原花經梨花五品五命瓶花譜梨花四品六命蜀都雜抄黎州安撫司內小廳東有梨樹一株髙九丈圍九尺州人取其枝以接果豈黎以梨名耶州人呼為三藏梨相傳為唐僧西遊植黎杖于此曰他日州治在此恐非實事古稱黎杖黎即苜蓿養之歷霜雪經一二嵗木本修直生鬼面可杖取其徑而堅非梨木也洞庭山記山陽樹梨數十千華甚盛憑髙一盼夫非白雲鄊耶惜相過晚耳滇雲紀勝書梨花處處有之或擁山巔或列山腳或滿人村望之如濤如雪僕自曲靖還省時有乍疑洱海濤初起忽憶蒼山雪未消之句學圃餘疏余性愛梨花而微恨其氣不可嗅吾地酷少此種溶溶院落何可無此君終當致之增橫山草堂記空藴庵庭植梨樹一株春時弄色於細雨微煙恍玉人之初沐也集藻贊增宋孝武帝梨花贊沃瘠異壤舒慘殊時惟氣在春具物含滋嘉樹之生于彼山基開榮布采不離塵緇賦增唐盧照鄰病梨樹賦并序癸酉之嵗余卧病于長安光德坊之官舍閴寂無人伏枕十旬閉門三月庭無衆木惟有病梨一樹圍才數握髙僅盈尺花實憔悴似不任乎嵗寒枝葉零丁絶有意乎朝暮嗟乎同托根于膏壤俱稟氣于太和而修短不均榮枯殊貫豈賦命之理得之自然將資生之化有所偏及樹猶如此人何以堪有感于懷賦之云爾天象平運方祇廣植挺芳桂于月輪橫扶桑于日域建木聳靈丘之上蟠桃生巨海之側細枝葉連洪柯條直齊天地之一指任烏兔之棲息或垂隂萬畞或結子千年何偏施之雨露何獨厚之風煙愍兹珍木離離幽獨飛茂實于河陽傳芳名于金谷紫澗稱其殊旨玄光表其仙族爾生何為零丁若斯無輪桷之可用無棟梁之可施進無違于斤斧退無競于班倕無庭槐之生意有巖桐之死枝爾其髙才數仭圍僅盈尺修幹罕雙枯條每隻葉病多紫花凋少白夕鳥怨其巢危秋蟾悲其翳窄怯衝飇之搖落忌炎景之臨迫既而地歇蒸霧天收耀靈西秦明月東井流星憔悴孤影徘徊直形狀金莖之的的疑石柱之亭亭若夫西海夸父之林南海蚩尤之樹莫不摩霄拂日藏雲吐霧別有橋邉朽柱天上靈查年年嵗嵗無葉無花榮辱兩齊吉凶同軌寧守雌以外喪不修襮而內否亦猶縱酒髙賢佯狂君子為其吻合置其憂喜生非我生物謂之生死非我死谷神不死混彭殤于一觀庶筌蹄于兹理宋陳藻梨花賦絪緼無涯孕精産荂九旬流華四月孔奢有匪浮誇花外之花爾其姢靜間暇以窈窕兮敷舒幽貞其清皎兮恬淡瀟灑委蛇淳雅美不邇麗素不鄰野若帝厭爾衆芳之淫冶我宜錫其純嘏者邪濯濯春雨皓皓華月彼質而靜彼淡而悅或依于葛我所執兮或俯于藻我所拾兮祠庭閴寂樹英繁密祁祁僮僮如出而入奚素絢以比容徴彤管而名實夫大竅闔闢冶至靈甄無識蓋有暌性而合質者邪于何后妃兮似欣欣乎晴光余將歸寧兮視滌濯乎衣裳流水之陽古公胥宇乃㩦乃薑不容不妝后脫簪珥露諌宣王煙之蒼蒼青障于張解圍小郎三三兩兩寒窗之傍恍兮文德散帙于中宫左嬪摛思于椒房函如六齡之鄧衰若大家之班或乃暴風淫雨赴死無懼生兮貞女殁兮烈婦于嗟牡丹彼美芍藥胡為顔色可與娛樂丰丰褒姒豔􅝰麗姬君以為妍人以為媸花百其試豫兹懿哉亂曰匪冬而雪匪夜而月香山何人題我太真江之永兮不可泳思漢之廣矣不可方思朝補之北京官舍後梨花賦梨於經無記而舍後梨人所不賞故賦之其辭曰攬察草木本原所起李梅紀于隕霜兮橘柚隨乎織筐木瓜足贈而詠詩含桃可羞而記禮雖信微而有托兮亦不委夫厥美惟兹梨之俊茂兮羌獨逺而未揚含溫潤之秀質兮皎若和璧榮其光淡暗愜其無偶兮厯年嵗之已長暮春者陽疸憤盈羣木解膚似夸者似鬬者似辴者似頩者色非一色同嫵殊嫮兹梨姢然獨見其素繄過時兮不省滋脈脈兮後户亦何必耀榮華兮朝日顧恩私兮泣露然而中唐之樗枝大扶踈以其近人人以縶駒則磨則齧則折則泄孰與夫朽壤幽薄厥植維弱履屐不蹈根乃磅礴五言古詩御製詠畫梨花最愛梨花白又惜同春老唯此畫圗中冬夏長美好不令風雨催且無蜂蝶繞靚妝伴月容盡在紙間造惡紫嫌奪朱素體物難攪三品運胸中六法生卉草增齊王融詠池上梨花翻階沒細草集水間踈萍芳春照流雪深夕映繁星劉繪和池上梨花露庭晚翻積風閨夜入多縈叢似亂蝶拂燭狀聨蛾梁沈約西地梨列茂河陽苑蓄紫濫觴隈翻黃秋沃若落素春徘徊原劉孝綽於座應令詠梨花玉壘稱津潤金谷詠芳菲詎匹龍樓下素蕊映華扉雜雨疑霰落風似蝶飛豈不憐飄墜願入九重闈增唐元稹遣興始見梨花房坐對梨花白行看梨葉青已復梨葉赤嚴霜九月半危蒂幾時客况有髙髙原秋風四來迫原宋黃庭堅賞壓沙寺梨花沙頭十日春當年誰手種風飄香未改雪壓枝自重看花思食實知味少人共霜降百工休把酒約寬縱增金髙士談梨花中原莭物正梨花配寒食黃昏一雨過滿地嗟狼籍塞垣春已深花事猶寂寂朝來三月半初見一枝白爛漫雪有香瓏鬆玉仍刻芳心點深紫嫩葉裁輕碧懶慢不出門雙瓶貯春色殷勤遮老眼邂逅慰愁夕一樽對花飲况有風流客酒闌思故鄊相顧空歎息元好問梨花梨花如靜女寂寞出春暮春工惜天真玉頰洗風露素月淡相映蕭然見風度恨無塵外人為續雪香句孤芳忌太潔莫遣凡卉妒元程巨夫次韻肯堂學士冬日紅梨花黃菊卧階雨六花舞天風壁凍室生白手僵肉作紅秀句忽墮前光怪侵簾櫳主人宴坐處元氣含沖融無情及枯株嫣然為修容坐令玉華君來從蘂珠宫麗妝凝祥雲明眸轉驚鴻豈非散花手試君情所鍾老我嗜好淡空詩亦雷同祗願酌花時毋忘比鄰翁虞集憶三十年前與元復初參政同賦秋日梨花元有句云朝食葉底梨暮看枝上花而忘其後句因續之云朝食葉底梨暮看枝上花花開食實後霜風振長柯逺水良可鑒彩雲亦易過念爾白于雪日暮當如何七言古詩增宋歐陽修千葉紅梨花并序峽州署中舊有此花前無賞者知郡朱郎中始加闌檻命坐客賦之紅梨千葉愛者誰白髮郎官心好竒徘徊繞樹不忍折一日千匝看無時夷陵寂寞千山裡地逺氣偏時莭異愁煙苦霧少芳菲野卉蠻花鬬紅紫可憐此樹生此處髙枝絶艷無人顧春風吹落復吹開山鳥飛來自飛去根盤樹老幾經春真賞今才遇使君風輕綘雲樽前舞日暖繁香露下聞從來奇物産天涯安得移根植帝家猶勝張騫為漢使辛勤西域徙榴花元趙孟俯題錢舜舉著色梨花東風吹日花冥冥繁枝壓雪凌風塵素羅衣裳照青春眼中若有梨園人攀條弄芳畏日夕只今紙上空顔色顔色好愁轉多與君酤酒花前歌明楊基北山梨花并序余卜居金川去北山無十里每清明時梨花盛開輒動洗粧之想鄰友薛起宗邀余看者再俱以猥俗所繫不能如約昨又期出郭風雨泥濘弗良于行起宗為折一枝相贈喜而賦此北山梨花千樹栽年年清明花正開薛君好事兩邀我騎馬看花㩦酒來看花出郭我所愛况是梨花最多態我牽塵俗不得赴花本無情花亦怪君今折花馬上歸索我細詠梨花詩氷肌玉骨未受飾敢以粉墨圗西施東坡先生心似鐵惆悵東闌一枝雪重門晚掩沉沉雨踈簾夜捲溶溶月月宜淺淡雨宜濃淡非浪白濃非紅閨房秀麗林下趣富貴標格神仙風一枝寂寞開逾遍朵朵玲瓏看應眩皓腕輕籠素練衣蛾眉淡掃春風面自須玉堂承露華何事種向山人家不愁占斷天下白正恐壓盡人間花江梅正好憐清椘桃杏紛紛何足數只有銀鐙照海棠海棠亦是嬌兒女憶北山梨花去年清明花正發騎馬曉出神䇿門千桃萬李看未了小徑更入梨花村低枝初開帶宿雨髙樹爛日迷朝暾柔膚凝脂暖欲滴香髓入面春無痕青霞玲瓏翠羽亂白雲照耀瓊瑶溫折花對酒藉草坐花氣暗撲黃金尊薛君起舞為我夀勸我一曲招花魂須臾明月忽到樹主人送客惟留髠羅巾欹斜烏帽落醉眼况復知清渾村中至今為故事笑我自是劉伶孫我慚不答竊自慶大抵此樂皆君恩今年清明坐西省雷雨兩日如翻盆羣花削迹淨如掃衆緑既暗不可捫豈無青錢換斗酒案牘雜沓窮晨昏伻來督責至呵詈面微發紅氣每吞未能搏搖跨雕鶚詎免束縳同雞豚人生屈辱乃淬礪百錬正欲逢盤根自知力不舉一羽強欲扛鼎追烏賁晚晴汲井試新火紫笋緑薤供盤飱歸來飽飯對妻子萬事反復何足論湘隂廟梨花平生厭看桃與李惟有梨花心獨喜海雪樓前雪一株嵗嵗清明醉花底北山岡下花最盛千樹􅌑瓏圍緑水前年騎馬賞花處我與河東兩人耳青苔滿地芳草合只有黃鸝映花蘂當時美人三閣上寶髻慵梳初睡起鏡裏爭先試一枝真態欲將春色比樓空燕去花自落細雨黃昏淚如洗踈籬蕭蕭茅屋破况復臨春開結綺我自賞花仍弔古花亦粲然為露齒歸來婆娑簪滿帽十日羅衣香不止去年相憶豫章城咫尺春江如萬里今年邂逅洞庭曲細蕚含愁照清泚人至魂銷椘雨中花應腸斷湘煙裏三年勝遊不再得百歲歡娛能有幾吉祥牡丹非舊夢元都桃花亦如此更約明年載酒來莫笑花前人老矣五言律詩原唐溫憲梨花緑陰寒食晚猶自滿空園雨歇芳菲白蜂稀寂寞繁一枝橫野路數樹出江村悵望頻回首何人共酒尊宋梅堯臣梨花處處梨花發看看燕子歸園思前法部淚溼舊宫妃月白鞦韆地風吹蛺蝶衣強傾寒食酒漸老覺歡微增金龎鑄梨花孤潔本無匹誰令先衆芳花能紅處白月共冷時香縞袂清無染氷姿淡不妝夜來清露底萬顆玉毫灮元張伯淳次韻安野內翰梨花玄景窮隂候春林早著花素妝臨曉鏡紅粉涴輕紗勝賞懷亰洛吟情軼永嘉泥中妨載酒咫尺路頭賒馬祖常崇真宫西梨花春日梨花下相逢把臂行香痕憐粉白酒暈惜紅輕影動簾穿燕聲來樹度鶯共當拚一醉莫待鬢華生七言律詩增唐羊士諤成都從事蕭員外寄海梨花詩珠履行臺擁附蟬外郎髙步似神仙陳詩今見唐風盛從事遙瞻衛國賢擲地好辭凌彩茟浣花春水膩魚箋東山芳意須同賞子著囊盛幾日傳宋韓琦會壓沙寺觀梨花同賞梨花過淨坊壓沙幽闃面平岡孤園不治黃金界醉茟徒誇白雪香風急幾翻雲影亂殿深全掩玉毫光朝來經雨低含淚競寫真妃寂寞妝賞梨花興福梨珍號素封千株花發此欣逢風開笑臉輕桃艷雨𢃄啼痕自玉容蝶舞只疑殘