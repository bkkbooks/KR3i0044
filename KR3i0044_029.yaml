靨墜月明惟覺異香濃尋春已恨来時晩莫厭頻揮瀲灔鍾寒食西藍賞素英白毫光裏亂雲騰荘嚴金地三千界顔色瑤䑓十二層后土瓊花慚我寡唐昌玉蘂豈吾朋雪香預約為亭號修創終逢好事僧周必大重九竹園見棃花懐子中兄春花著雨即塵埃何似深秋耐乆開菊尚無多饒瑞質霜如有意䕶香腮也知林下風光早不為山中厯日催望㫁行人思折寄却疑呼作嶺頭梅原朱淑真棃花朝来𢃄雨一枝春薄薄香羅蹙葉勻冷艶未饒梅共色靚妝長與月為鄰許同蝶夢還如似替人愁却笑人須到年年寒食夜情懷為爾倍傷神増金雷淵棃花雪作肌膚玉作容不将妖艶嫁東風梅魂何物三春在桃臉真成一笑空雨細無情添寂寞月明有意助豐融相如病渇妨文賦想像甘寒結小紅原張建棃花蠧樹枝髙茁朶稠嫩苞開破雪搓毬碎粘粉紫鬚齊吐潤卷丹黄葉半抽月影曉忩留好夢雨聲深院鎻清愁瓊苞已實香猶在散入長安賣酒樓増元鮮于樞清明日宴集賢宋學士園時棃花盛開諸老屬僕同賦琪樹吹香蕩夕暉華簪人對雪霏霏漢宫新火初傳燭楚女行雲乍濕衣一片花疑蝴蝶化滿枝春想玉釵肥蛾眉不用梨園曲唱徹瑶䑓醉未歸張養浩秋日棃花雪香吹盡樹頭春誰遣西風為返魂月影已非前日夢雨容獨𢃄舊時痕只知秋色千林老爭信陽和一脈存莫訝殷韓太多事仙家元不計寒暄鄭洪嚴希徳請賞棃花命妓行酒瀟灑東䦨一樹春雪膚氷骨月精神朝雲著處迷詩夢暮雨来時想玉人華屋洗妝歌小小銀缾推枕喚真真紫薇閣下繁華處芍藥荼䕷總後塵明吴寛棃花名果先從張谷来紛紛碎雪欲成堆淡妝自把蛾眉掃巧笑誰将瓠齒開園子豈求他種接主人能使及時栽夭桃灼灼驚凡目縞素應甘自不才原文徴明棃花翦水凝霜妒蝶羣曲䦨風味玉清温粉痕浥露春含淚夜色籠烟月㫁魂十里香雲迷短夢誰家細雨鎻重門洗妝見説清明近旋典春衣置酒樽増程嘉燧周家清明植棃花六月盛開邀客賦詩清明院落夜溶溶籠栁嬌黄譲雪樷亂攪三眠飛絮白浪攙百子石榴紅燒殘髙燭東風後掩却重門細雨中聞向花間歌法曲應憐江海白頭翁五言絶句増唐王維左掖棃花閑灑階邉草輕隨箔外風黄鶯弄不足銜入未央宫丘為左掖棃花冷豔全欺雪餘香乍入衣春風且莫定吹向玉階飛原皇甫冉禁省棃花巧解迎人意還能亂蝶飛春風時入户㡬片落朝衣錢起棃花艶静如籠月香寒未逐風桃花徒照地終被笑妖紅宋王十朋棃花淡客逢寒食煙村爛漫芳謫仙天上去白雪世間香増明楊基西園棃花春晚開一枝明日是清明孤花雪闘輕不須開滿樹春少更多情七言絶句原唐韓愈聞棃花發贈劉師命桃蹊惆悵不能過紅艶紛紛落地多聞道郭西千樹雪欲将君去醉如何棃花下贈劉師命洛陽城外清明節百花寥落棃花發今日相逢瘴海頭共驚爛熳開正月元稹雜思詩尋常百種花齊發偏摘棃花與白人今日江頭兩三樹可憐和葉度殘春増白居易江岸梨梨花有思縁和葉一樹江頭惱煞君最似孀閨少年婦白妝素袖碧紗裙殷璠棃花雲滿衣裳月滿身輕盈歸歩過流塵五更無限留連意常恐風花又一春徐凝翫花一樹棃花春向暮雪枝殘處怨風来明朝漸校無多去看到黄昏不欲囘原温庭筠鄠杜郊居槿籬芳援近樵家壠麥青青一徑斜寂寞遊人寒食後夜来風雨送棃花増宋韓琦棃花花下延賔啓宴杯回頭香雪即成堆主人自挈宜城醸不為青旗趁爾来司馬光和道矩紅梨花二首繁枝細葉互低昻香敵荼䕷艶海棠應為窮邉太寥落併将春色付穠芳蜀江新錦濯朝陽椘國纎腰傅薄妝何事白花零落早同時不敢闘芬芳王安石紅梨紅棃無葉庇花身黄菊芬香委路塵嵗晚蒼官纔自保日髙青女尚横陳原蘇軾東欄梨花棃花淡白栁深青栁絮飛時花滿城惆悵東欄一株雪人生看得㡬清明増晁補之和王拱辰觀梨花二首海棠丰韵詫芬芳慙愧棃花冷似霜賴有樂天春雨句寂寥從此亦馨香壓沙寺裡萬株芳一道清流照雪霜銀闕森森廣寒曉仙人玉仗有天香原張舜民梨花青女朝来冷透肌殘春小雨更霏㣲流鶯怪底争来往為擲金梭織玉衣謝逸梨花二首冷香銷盡晩風吹脉脉無言對落暉舊日郊西千樹雪今隨蝴蝶作團飛翦翦輕風漠漠寒玉肌蕭索粉香殘一枝𢃄雨牆頭去不用行人著眼看陸游梨花開向春殘不恨遲綠楊窣地最相宜征西幕府煎茶地一幅邉鸞畫折枝粉淡香清自一家未容桃李占年華常思南鄭清明路醉袖迎風雪一杈嘉陵江色嫩如藍鳯集山光照馬銜楊栁棃花迎客䖏至今時夢到城南趙福元梨花玉作精神雪作膚雨中嬌韻越清癯若人㑹得嫣然態寫作楊妃出浴圖何菊潭二月春風楊栁青知郎繫馬在長亭相思情味如中酒折盡棃花嗅不醒増金史旭梨花少年㩦酒日尋花老去花前欲飲茶今日傳觴似年少一枝香雪上烏紗原吕中孚梨花等待清明得得芳團枝晴雪暖生香洗妝自有風流態却笑紅深映海棠段繼昌梨花一林輕素媚春光透骨濃薫百和香消得太真吹玉笛小庭人散月如霜増元王惲題錢舜舉畫棃花掖西千樹閙春華莫把芳容𢃄雨誇㸔取一枝横絶處洗妝還是漢宫娃朱徳潤題梨花折枝玉壓帽簷花底春惜無花下洗妝人阿嬌一掬東風淚聊仗丹青為寫真郯韶梨花渚宫花落雨霏霏春盡江南客未歸多少東家蝴蝶夢相思并逐彩雲飛原明文徴明物華無賴酒初醒奕奕梨花照晩晴恠的山禽啼不歇十分春色近清明増張鳳翼梨花重門寂寂鎻香雲雨滴空階坐夜分老去㣲之風調在折来何䖏與雙文原張新梨花粉翅還嫌蝶太輕雪衣偏喜燕多情寕王玉笛知何處寂寞黄昬伴月明詩散句原宋文同寒食北園春已深棃花滿枝雪圍徧青春每向風外得秀艶應難雪中見阮南溪繽紛紫雪浮鬚細冷淡清姿奪玉光剛笑何郎曽傅粉絶憐荀令愛薫香増唐白居易四鄰棃花時二月伊水色獨孤及爾来大谷梨白花再成雪宋梅堯臣前日是清明驟雨沾棃花蘓軾紅梨驚合抱映島孤雲馥原蘇軾尚記棃花樹依依聞暗香陳三嶼棃花春二月杜宇月三更増唐劉方平寂寞空庭春欲晩棃花滿地不開門李賀曲水飄香去不歸梨花落盡成秋苑原吕温獨卧郡齋寥落意隔簾㣲雨濕梨花杜牧閒吹玉殿昭華琯醉折梨園縹蔕花増宋曽幾一片朝容粉面寒雨餘仍𢃄淚䦨干范成大㸃檢棃花成一夢蘸紅新綠滿枝頭陸游棃花堆雪栁吹緜常記梁州古驛前金蕭貢香惹夢魂雲漠漠光揺溪館月溶溶元王惲風簷數㸃催妝雨辦與棃花作好春原顧瑛忽見棃花㸃綴開蕭然冷浸姮娥影増唐王維棃花夕鳥藏原李白梨花白雪香増李白棃花千樹雪原杜甫色好梨勝頬増韓愈露亦染梨腮原杜牧棃花獨送春温庭筠棃花雪壓枝周朴臨風千㸃雪增韋莊棃花雪又催宋楊億棃花飛白雪原黄庭堅月黒見棃花増陳思道倚墻棃頬紅金元好問梨花淡丰容原唐白居易風寒露重棃花濕棃花一枝春𢃄雨増白居易手把棃花寒食心曹唐棃花新折東風輭羅鄴梨花滿地東風急原宋劉筠亂飄棃雪曉来天増韓琦共藉棃花作寒食孔方平砌下棃花一堆雪雨暗棃花春自光陸游溪口赤梨丹染腮金趙元梨葉霜如酒力濃張建玉棃花底月三更吕中孚半庭寒影在棃花元戴帥初粉墻風細欲梨花尹廷髙落盡梨花春不多劉秉忠梨花亂舞白霓裳王惲已開棃蘂雪為團趙孟頫棃花淡白栁花香袁桷梨花的的疑蝴蝶梨花亂逐沙鷗起黄庚滿堦香雪落梨花原宋旡棃花明白夜来風増周權香浮夜月棃飄雪陳髙棃花沐雨𢃄嬌羞詞原宋史逹祖玉樓春玉容寂寞誰為主寒食心情愁㡬許前身清淡似梅妝遥夜依微留月住香迷蝴蝶飛時路雪在秋千来往處黄昏著了素衣裳深閉重門聼夜雨王采蝶戀花鏤雪成花檀作蘂愛伴秋千摇曳春風裏翠袖年年寒食淚為伊牽惹愁無際幽艶偏宜春雨細紅粉䦨干有个人相似鈿合金釵誰與寄丹青傳得凄凉意曽覿驀山溪減翠凋紅正是青春杪深院嫋香風看棃花一枝開早瓏璁映面依約認嬌顰天淡淡月溶溶春意知多少清明池館芳信年年好更向五侯家把江梅風光占了休教寂寞孤負向人心檀板響寳杯傾潘鬢從他老増周邦彦水龍吟素肌應怯餘寒艶陽占盡青蕪地樊川照日靈關遮路殘紅歛避傳火樓臺妬花風雨長門深閉亞簾櫳半濕一枝在手偏勾引黄昬淚别有風前月底布繁英滿園歌吹朱鉛退盡潘妃却酒昭君乍起雪浪翻空粉裳縞夜不成春思恨玉容不見瓊英漫好與何人比樓扶水龍吟素娥洗盡繁妝夜深歩月秋千地輕腮暈玉柔肌籠粉緇塵斂避霽雪留香曉雲同夢昭陽空閉悵仙園路杳曲欄人寂踈雨濕盈盈淚未放游蜂葉底怕春歸不禁狂吹象牀困倚氷魄微醒鶯聲喚起愁對黄昬恨催寒食滿襟離思想千紅過盡一枝獨冷把梅花比元王惲水龍吟纖包淡貯幽香玲瓏輕鎻秋陽麗仙根借暖定應不待荆王翠被瀟灑輕盈玉容渾是金莖露氣甚西風宛轉東欄暮雨空㸃綴真妃淚誰遣司花妙手又一畨角奇争異使君髙卧竹亭閒寂故来相慰燕几螺屏一枝披拂繡簾風細約洗妝快瀉玉屏芳酒枕秋蟾醉别録原明皇雜録天寳中上命宫中女子數百人為棃園弟子白居易詩注杭俗醸酒趁梨花時熟號為梨花春増米芾畫史范大珪有富公家折枝梨花古筆非江南蜀畫御定佩文齋廣羣芳譜卷二十七
