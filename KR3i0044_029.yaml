冷淡清姿奪玉光剛笑何郎曽傅粉絶憐荀令愛薰香增唐白居易四鄰梨花時二月伊水色獨孤及爾來大谷梨白花再成雪宋梅堯臣前日是清明驟雨沾梨花蘇軾紅梨驚合抱映島孤雲馥原蘇軾尚記梨花樹依依聞暗香陳三嶼梨花春二月杜宇月三更增唐劉方平寂寞空庭春欲晚梨花滿地不開門李賀曲水飄香去不歸梨花落盡成秋苑原吕溫獨卧郡齋寥落意隔簾微雨濕梨花杜牧間吹玉殿昭華琯醉折梨園縹蒂花增宋曽幾一片朝容粉面寒雨餘仍𢃄淚闌干范成大點檢梨花成一夢蘸紅新緑滿枝頭陸遊梨花堆雪栁吹綿常記梁州古驛前金蕭貢香惹夢魂雲漠漠光搖溪館月溶溶元王惲風簷數點催妝雨辦與梨花作好春原顧瑛忽見梨花點綴開蕭然冷浸姮娥影增唐王維梨花夕鳥藏原李白梨花白雪香增李白梨花千樹雪原杜甫色好梨勝頰增韓愈露亦染梨腮原杜牧梨花獨送春溫庭筠梨花雪壓枝周朴臨風千點雪增韋莊梨花雪又催宋楊億梨花飛白雪原黃庭堅月黑見梨花增陳思道倚墻梨頰紅金元好問梨花淡丰容原唐白居易風寒露重梨花濕梨花一枝春𢃄雨增白居易手把梨花寒食心曹唐梨花新折東風軟羅鄴梨花滿地東風急原宋劉筠亂飄梨雪曉來天增韓琦共藉梨花作寒食孔方平砌下梨花一堆雪雨暗梨花春自光陸遊溪口赤梨丹染腮金趙元梨葉霜如酒力濃張建玉梨花底月三更吕中孚半庭寒影在梨花元戴帥初粉墻風細欲梨花尹廷髙落盡梨花春不多劉秉忠梨花亂舞白霓裳王惲已開梨蘂雪為團趙孟俯梨花淡白栁花香袁桷梨花的的疑蝴蝶梨花亂逐沙鷗起黃庚滿階香雪落梨花原宋旡梨花明白夜來風增周權香浮夜月梨飄雪陳髙梨花沐雨𢃄嬌羞詞原宋史逹祖玉樓春玉容寂寞誰為主寒食心情愁幾許前身清淡似梅妝遙夜依微留月住香迷蝴蝶飛時路雪在秋千來往處黃昏著了素衣裳深閉重門聼夜雨王采蝶戀花鏤雪成花檀作蘂愛伴秋千搖曳春風裏翠袖年年寒食淚為伊牽惹愁無際幽艷偏宜春雨細紅粉闌干有個人相似鈿合金叉誰與寄丹青傳得凄涼意曽覿驀山溪減翠凋紅正是青春杪深院嫋香風看梨花一枝開早瓏璁映面依約認嬌顰天淡淡月溶溶春意知多少清明池館芳信年年好更向五侯家把江梅風光占了休教寂寞孤負向人心檀板響寶杯傾潘鬢從他老增周邦彥水龍吟素肌應怯餘寒艷陽占盡青蕪地樊川照日靈關遮路殘紅斂避傳火樓臺妬花風雨長門深閉亞簾櫳半濕一枝在手偏勾引黃昏淚别有風前月底布繁英滿園歌吹朱鉛退盡潘妃却酒昭君乍起雪浪翻空粉裳縞夜不成春思恨玉容不見瓊英漫好與何人比樓扶水龍吟素娥洗盡繁妝夜深步月秋千地輕腮暈玉柔肌籠粉緇塵斂避霽雪留香曉雲同夢昭陽空閉悵仙園路杳曲欄人寂踈雨濕盈盈淚未放遊蜂葉底怕春歸不禁狂吹象牀困倚氷魄微醒鶯聲喚起愁對黃昏恨催寒食滿襟離思想千紅過盡一枝獨冷把梅花比元王惲水龍吟纖包淡貯幽香玲瓏輕鎖秋陽麗仙根借暖定應不待荆王翠被瀟灑輕盈玉容渾是金莖露氣甚西風宛轉東欄暮雨空點綴真妃淚誰遣司花妙手又一畨角奇爭異使君髙卧竹亭間寂故來相慰燕几螺屏一枝披拂繡簾風細約洗妝快瀉玉屏芳酒枕秋蟾醉别録原明皇雜録天寶中上命宫中女子數百人為梨園弟子白居易詩注杭俗釀酒趁梨花時熟號為梨花春增米芾畫史范大圭有富公家折枝梨花古筆非江南蜀畫御定佩文齋廣羣芳譜卷二十七
