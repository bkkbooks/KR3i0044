body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷二十九花譜荷花一原荷為芙蕖花爾雅云荷芙蕖詩箋云芙蕖之莖曰荷一名水芙蓉古今注云芙蓉一名荷花杜詩注云産于陸者曰木芙蓉産于水者曰草芙蓉一名水芝一名水藝一名澤芝一名水旦一名水華增三餘帖一名玉環原花已發為芙蕖未發為菡萏詩正義云菡一作莟萏一作其莖茄其葉蕸其本蔤葉清明後生圓如蓋色青翠五六月開花有數色惟紅白二色為多花心有黃蕊長寸餘大者花至百葉增本草花白者香紅者艷千葉者不結實以蓮子種者生遲藕芽種者易發湖澤陂池皆有之而名亦異原花生池澤中最秀凡物先華而後實獨此華實齊生百節疏通萬竅玲瓏亭亭物表出淤泥而不染花中之君子也有重臺蓮一花既開從蓮房內又生花不結子並頭蓮晉泰和間生于玄圃謂之嘉蓮今所在有之最易生能傷别蓮宜獨種一品蓮一本生三蕚四面蓮周圍共四蕚灑金蓮瓣上有黃點金邉蓮瓣周圍一線色微黃衣鉢蓮花盤千葉蕊分三色産滇池千葉蓮華山頂有池産千葉蓮花服之羽化今人家亦有之然頭重易萎多難開完黃蓮王韶之神鏡記云九疑山過半路皆行竹松下狹路有清澗澗中有黃色蓮芳氣竟谷金蓮金池方數十里水石泥沙皆如金色其中有四足魚金蓮花洲人研之如泥以之彩繪光輝煥爛無異真金分香蓮三堂往事云三堂使宅中有釣仙池一種蓮一嵗再結每實子十隻花時香兼桃菊梅英分枝荷拾遺記云漢昭帝穿琳池植分枝荷一莖四葉狀如駢蓋日照則葉低蔭根若葵之衛足名曰低光荷實如玄珠可以飾珮花葉雖萎芬芳之氣徹十餘里食之令人口氣常香益人肌理夜舒荷拾遺記云靈帝西園渠中植蓮大如蓋長一丈其葉夜舒晝卷一莖有四蓮叢生名曰夜舒荷亦云月出則舒也故曰望舒荷紅蓮麻姑壇記云壇東南池有紅蓮忽變碧今又白矣睡蓮北户録云葉如荇而大沈于水面其花布葉數重凡五種色當夏晝開夜入水底次日復出生南海四季蓮儋州清水池其中四季荷花不絶臘月尤盛他如佛座蓮金鑲玉印蓮斗大紫蓮碧蓮錦邉蓮諸品尤為絶勝王敬美曰蓮花種最多惟蘇州府學前者葉如􅏛蓋莖長丈許花大而紅結房曰百子蓮此最宜種大池中舊又見黃白二種黃名佳却微淡黃耳千葉白蓮亦未為竒有一種碧臺蓮大佳花白而瓣上恆滴一翠點房之上復抽緑葉似花非花余嘗種之摘取瓶中以為西方供近於南都李鴻臚所復得一種曰錦邉蓮蒂緑花白作蕊時緑苞已微界一線紅矣開時千葉每葉俱似胭脂染邉真竒種也余將以配碧臺蓮甃二池對種亦可置大缸中為几前之玩彚考原詩鄭風隰有荷華陳風彼澤之陂有蒲與荷彼澤之陂有蒲菡蓞史記龜策傳龜千嵗乃遊蓮葉之上晉書藝術傳石勒召佛圗澄試以智術澄即取鉢盛水燒香咒之須臾鉢中生青蓮花光色曜日勒由此信之宋書符瑞志文帝元嘉中蓮生建康額簷湖一莖兩花增宋書符瑞志元嘉十年七月華林天淵池芙蓉異花同蒂元嘉十七年十月尋陽𢎞農祐幾湖芙蓉連理梁書武帝本紀天監十年五月乙酉嘉蓮一莖三花生樂遊苑原陳書孫瑒傳瑒出鎮郢州乃合十餘船為大舫於中立亭池植荷芰每良辰美景賔僚並集泛長江而置酒亦一時之勝賞焉增魏書釋老志明帝曽欲壞宫西佛圖外國沙門乃金盤盛水置於殿前以佛舍利投之於水乃有五色光起於是帝嘆曰自非靈異安得爾乎遂徙於道東為作周閣百間佛圖故處鑿為濛泛池種芙蓉於中原南史晉安王子懋傳子𢡟年七嵗時母阮淑媛嘗病危篤請僧行道有獻蓮花供佛者衆僧以銅罌盛水漬其莖欲花不萎子懋流涕禮佛曰若使阿姨因此和勝願諸佛令花竟齋不萎七日齋畢花更鮮紅視罌中稍有根鬚當世稱其孝感增南史徐勉傳勉戒子嵩書云瀆中並饒荷䓈湖裏殊富芰蓮宋史五行志紹興二十一年民家竈鼎生金色蓮花萬州虔州放生池生蓮皆同蒂異蕚二十三年六月汀州生蓮同蒂異蕚者十有二樂志女弟子隊舞六曰採蓮隊衣紅羅生色綽子繫暈裙戴雲鬟髻乘綵船執蓮花淮南子海閭生屈龍屈龍生容華注海閭浮草之先也屈龍遊龍容華芙蓉草花三輔黃圖漢昭帝琳池中植分枝荷宫人貴之每遊燕出入必皆含嚼或翦以為衣或折以障日以為戲弄洞冥記北極玄坂去崆洞十七萬里日月不至其地自明有紫河萬里流沫千丈中有寒荷霜下方香茂也枕中書玉京七寶山芝沼中蓮花徑度十丈鄱陽記弋陽嶺上多密巗宋元嘉中有人見其巖內三鐵鑊鑊各容百斛中生蓮花他人往尋不知所在原關令尹喜內傳關令尹喜生時其家陸地生蓮花光色鮮盛拾遺記漢武時海中有人義角面如玉色美髭髯腰蔽槲葉乘一葉紅蓮約長丈餘偃卧其中手持一書自東海浮來俄為霧所迷不知所之東方朔曰此太乙星也漢昭帝遊栁池有芙蓉紫色大如斗花素葉甘香氣襲人其實如珠增拾遺記周穆王三十六年王東巡大騎之谷指春宵宫集諸方士仙術之要有冰荷者出氷壑之中取此花以覆燈不欲使光明逺也原蓮社髙賢傳謝靈運一見逺公肅然心服乃即寺築臺翻涅槃經鑿池植白蓮時逺公諸賢同修淨土之業因號白蓮社元嘉起居注泰始二年八月嘉蓮一雙駢花並實合跗同莖生豫章鱧湖六年雙蓮一蒂生東宫元圃池增幽明録晉末黃祖至孝母病篤庭中稽顙俄頃天漢開明有一老翁以兩丸藥賜母服之衆患頓消翁曰汝入三月可泛河而來依期行見門題曰善福門內有水曰湎源池有芙蓉如車輪洛陽伽籃記準財里內有開善寺入其後園見朱荷出池緑萍浮水飛梁跨樹層閣出雲咸皆嘖嘖三國典略齊主還鄴髙麗新羅並遣使來朝貢先是徐州産蓮花一莖兩蒂占云異木連枝逺人入欵斯其應也萬嵗歷齊太和二年烏程縣閣下生蓮花靈異記貞觀二十年渝州相恩寺側泉內忽出紅蓮花面廣三尺旅遊往來無不歎訝經月不滅原開元天寶遺事太液池千葉白蓮開帝與妃子共賞指妃謂左右曰何如此解語花增平泉草木記水物之美者荷有蘋洲之重臺蓮芙蓉湖之白蓮金陵芙蓉池記金陵城西有白芙蓉素萼盈尺皎如霜雪江南梅雨麥秋後風景甚清漾舟緑潭不覺隆暑與嘉客泛玩終夕忘疲原酉陽雜俎厯城北二里有蓮子湖周環二十里湖中多蓮花紅緑間眀乍疑濯錦又漁船掩映罟罾疏布逺望之者若蛛網浮杯也厯城北有使君林魏正始中鄭公慤三伏之際每率賔僚避暑於此取大蓮葉置硯格上盛酒二升以簮刺葉令與柄通屈莖上輪囷如象鼻傳吸之名為碧筒杯厯下學之言酒味雜蓮氣香冷勝於水霍光園中鑿大池植五色睡蓮養鴛鴦三十六對望之爛若披錦增慧山寺記梁大同中有青蓮花育於此山因以古華山精舍為慧山寺尚書故實宣平太傅相國盧公應舉時寄居夀州安豐縣别墅嘗出遊芍陂見里人負薪者持碧蓮花一朵已傷器創矣云陂中得之盧公後從事浙西因使淮服話於太尉衛公公令搜訪芍陂則無有矣又遍尋於江渚間亦終不能得乃知向者一朵蓋神異焉原北夢瑣言元和中蘇昌逺居吳中有女郎素衣紅臉相與狎贈以玉環一日見檻前白蓮花開花蕊中有物乃玉環也折之乃絶增稽神録婺源尉朱慶源罷任方還家在豫章之豐城庭中地甚爽塏忽生蓮一枝其家駭懼多方以禳之蓮生不已乃築堤堰水以沼之遂成大池芡荷甚茂其年慶源授南豐令後三嵗入為大理評事原字説藕藏於水其自處卑無所加焉其所與汙潔白自若中有孔焉不偶不生若此可以偶物矣茄無附枝泥不能汙水不能沒挺出而立若此可以加物矣蓮既有以自白又會而屬焉若此可以連物矣􅣿實若舀隨昏昕闔闢焉蕸假根以立而不如藕之有所偶假莖以出而不如茄之有所加假華以生而不如蓮之有所連􅣿之有也若此可謂遐矣夫物者終必吐連物者終於散偶物者或析之加物亦不可謂常故遐在此不在彼也蔤退藏於無用而可用可見者本焉若此可以密矣合此衆美則可以荷物可以為芙可以為蕖故曰荷芙蕖也荷以荷物為義故通於負荷之字縉紳脞説雍熙中張君房寓泊廬山開先寺望黃石崖瀑布水中一大紅葉泛而下令僧行急取之乃紅蓮一葉長三尺餘濶一尺三寸嘗觀廬山記説沛水出雙劍峯頂有池濶數百尺其深莫測又有清源池生蓮花大如車輪今可信矣君房因分此花葉遺好事者磨湯飲之其蓮香經宿不散增能改齋漫録政和癸巳大晟樂成蔡元長以次膺薦詔乘驛赴闕次膺至都會禁中嘉蓮生遂屬辭以進名並蒂芙蓉上覽之稱善除大晟府協律郎原避暑録話歐陽文忠公在揚州作平山堂壯麗為淮南第一堂據蜀岡下臨江南數百里真潤金陵三州隱隱若可見公每暑時輒凌晨携客往遊遣人走邵伯取荷花千餘朵以畫盆分插百許盆與客相間遇酒行即遣妓取一花傳客以次摘其葉盡處則飲酒往往侵夜載月而歸余紹聖初始登第嘗以六七月之間館於此堂者幾月寺有一僧年八十餘及見公猶能道公時事甚詳邇來幾四十年念之猶在目今余小池植蓮雖不多來嵗花開當與山中一二客修此故事增彥周詩話世間花卉無踰蓮花者蓋諸花皆藉暄風暖日獨蓮花得意於水月其香清涼雖荷葉無花時亦自香也梁江從簡為採荷調云欲持荷作柱荷弱不勝梁欲持荷作鏡荷暗本無光此語嘲何敬容而波及蓮荷矣繼古叢編韓昌黎古意詩太華峰頭玉井蓮開花十丈藕如船始意退之自為豪偉之辭後見真人關令尹喜傳老子曰天涯之洲真人遊時各坐蓮花之上花輒徑十丈有返香生蓮逆水聞三千里又北齊修文御覽有花生香一門專載此事諸家集注韓詩皆遺而不收特表出之花經蓮三品七命演繁露洛陽無白蓮花白樂天自吳中帶種歸乃始有之有白蓮池泛舟詩曰白藕新花照水開紅忩小舫信風回誰教一片江南興逐我殷勤萬里來又種白蓮詩曰吳中白藕洛中栽莫戀江南花懶開萬里㩦歸爾知否紅蕉朱槿不將來五色線河南志寶林禪院有雲錦二溪溪生雙荷花色香異於常者吳興園林記蓮花莊在月河之西四面咸水荷花盛開時錦雲百頃亦城中之所無也乾淳起居注太上同上至飛來峰看放水簾時荷花盛開太上指池心云此種五花同幹近伯圭自湖州進來前此未見也濟南行記水西亭之下湖曰大眀其源出於舜泉其大占府城三之一秋荷方盛紅緑如繡令人渺然有吳兒舟渚之想繡江發源長白山下周圍三四十里府參佐輩觴豫繡江亭漾舟荷花中十餘里劇談豪飲抵暮乃罷原談撰宋召宣用臣卓有幹才元豐間掖庭水殿落成嘉致既偹偶失種蓮宋即購于都城得器缶所植者百餘本連缶沉水底再夕視之則蓮已開盈沼矣其幹辦可謂精敏增真臘風土記草花甚多且香而艷水中之花更有多品其中正月亦有荷花原輟耕録至正庚子秋七月九日飲松江泗濵夏氏清樾堂上酒半折正開荷花置小金巵于其中命歌姬捧以行酒客就姬取花左手執枝右手分開花瓣以口就飲其風致過碧筒逺甚余因名為解語杯增輟耕録亰師城外萬栁堂亦一宴遊處也野雲廉公一日於中置酒招疏齋盧公松雪趙公同飲時歌兒劉氏名解語花者左手執荷花右手執杯歌小聖樂云緑葉隂濃遍池亭水閣偏趁涼多海榴初綻朵朵蹙紅羅乳燕雛鶯弄語對髙栁鳴蟬相和驟雨過似瓊珠亂撒打遍新荷人生百年有幾念良辰美景休放虛過富貴前定何用苦張羅命友邀賔宴賞飲芳醑淺酌低歌且酩酊從教二輪來往如梭既而行酒趙公喜即席賦詩曰萬栁堂前數畝池平鋪雲錦蓋漣漪主人自有滄洲趣遊女仍歌白雪詞手把荷花來勸酒步隨芳草去尋詩誰知咫尺亰城外便有無窮萬里思此詩集中無小聖樂乃小石調曲元遺山先生所製而名姬多歌之俗以為驟雨打新荷者是也江郎山記江郎山在江山縣南五十里山有池産碧蓮金陵諸園記杞園傍一池有金邉白蓮花甚竒瓶史蓮花以山礬玉簮為婢客越志西湖藕花雲錦燦爛香氣十里明月編蓮花渡青葉田田花髙於葉如紅妝美人立翠盤中舞林水録肥水東側有一湖三春九夏紅荷覆水唐城西北隅有湖俗謂之唐池蓮荷被水勝遊多萃其上三餘贅筆曽端伯以荷花為浮友張敏叔以蓮為靜客原花史宋元嘉六年賈道子行荆上見芙蓉方發取還家聞花有聲尋得舍利白如真珠焰照梁棟宋太平興國時內出玉津園瑞蓮一盆示輔臣花與葉悉似合歡而生宋孝宗於池中種紅白荷花萬柄以瓦盆别種分列水底時易新者以為美觀國初金箔張嘗於臘月索乾石蓮子亂撒池中頃刻花開滿池香艷可愛剪紙為舫置水中踏而登焉鼓棹放歌往來花叢俄失所在自百里芳至平陽峙一百里皆荷花王羲之自南門登舟賞荷花即此地也華山志韓愈登華山蓮華峰歸謂僧曰峯頂有池菡蓞盛開可愛其中又有破鐡舟焉蘇州府志府城西華山老子枕中記云此地可度難山半有池曰天池産千葉蓮昔人嘗服之羽化正統戊午吳縣學池中蓮一莖三花眀年縣學施公槃狀元及第成化辛卯蘇州府學池中蓮一莖二花眀年吳公寬狀元及第增湖州府志芙蓉池在府城東白蘋洲上其中多千葉蓮花原處州府志仙都山在縉雲縣東二十三里一名縉雲山一名丹峯山道書謂玄都洞天上有鼎湖産異蓮贑州府志興國縣放生池上蓮花彌望夾堤皆垂栁羣山環列有浮圖突兀在雲煙紫翠間記稱江山之勝頗似西湖盤古山在會昌縣東南一百二十里四面皆石壁有池廣一畝産瑞蓮增贑州府志瑞蓮池在雩都縣治西池産異蓮其葉曰雙捲劍脊其花曰雙頭義髻三蕚二十四葉其實曰覆鍾金鋌移之他處輒類常種俗傳雩山倒影所致原黃州府志馮茂山在黃梅縣東北三十里即五祖大滿禪師道場山頂有池生白蓮花又名蓮峯雲南志滇池在雲南府城南周廣五百餘里産千葉蓮集藻表增唐崔融為百官賀千葉瑞蓮表伏奉恩旨垂示臣等千葉瑞蓮觀其緑裏紅葩緗莖素蕚露搖珠點霞坼金鬚百星交映羽蓋張而一色萬目齊明車輪合而千狀謂鸞翔之欲舞若羣鵷之並飛峯形聳而半天石勢蹲而臨海沖氣積其下惠風流其上服之可以登仙採之可以駐夀雖復釋梵天王之國千影離婁善住天子之地雙輝燦爛校之今日未可同年臣等謹按華嚴經云蓮花世界是廬舍郍佛成道之國一蓮花有百億國無量清淨經云無量清淨佛七寶池中生蓮花上夫蓮花者出塵離染清淨無瑕有以見如來之心有以察如來之法道之行也曽不徒然伏惟天册寶金輪聖神皇帝現此妙身當兹巨瑞符契冥合影響不差非常之貺曠古未聞殊特之珍厯代一見手舞足蹈倍百常情無任慶躍之至權德輿中書門下賀神龍寺渠中瑞蓮表今日中書某至奉宣進止示臣等神龍寺殿前渠中瑞蓮花圖其花一莖兩房者伏惟陛下仁聖感通𢎞被生植宥萬方之暇必順天心於九重之中别開佛剎絪縕降祉菡蓞敷榮瑞兹灼灼之花迥出田田之葉吉祥殿外芳馥殊常功德池中光華交映扶疏發越並秀相鮮玄功嘉應超冠圖牒彼芝稱三秀麥有兩岐雖驗休祥豈階妙法觀雙芙之挺茂荷一雨之均霑隂隲生成發輝嚴淨臣等沗居樞近倍萬歡心無任欣忭悅懌之至張仲素賀西內嘉蓮表臣伏見令月九日中書門下宣示百官西內池中嘉蓮圖其蓮一本兩花者臣聞明聖有作天人合應既彰化本必降祥符即事而推昭昭可見伏惟陛下儲精要道憂濟羣方致理大同猶懼不至所以恢𢎞聖教資福生靈玄造感通嘉瑞屢降况兹菡蓞儒釋同稱經文但喻乎淤泥詩人特歌於彼澤豈比夫躍銅池煥靈沼傳芳丹禁濯影清流特聳孤莖以表清淨之源一致對敷雙蕚是明內外之教齊興天雖不言假物明意臣仰披圖牒逖覽古先豈無禎祥莫此昭著望雲就日徒深抃躍之誠舞德歌功何報恩私之重無任忭賀慶躍之至栁宗元為王京兆賀嘉蓮表今日某時中使某奉宣聖旨出西內神龍寺前水渠內合歡蓮花圖一軸示百僚者祥圖煥開異彩交映贊天地之合德表神人以同歡臣某誠歡誠慶稽首頓首伏惟皇帝陛下道協重華慶傳種德調隂陽之粹美孕造化之精英吉慶每見於天心發祥必自於禁掖是使雙華擢秀蓮蒂垂芳香激大王之風影耀天泉之水煥開宫沼旁映給園靈貺應期天龍護聖寶厯羣超於小劫神功允洽于大千臣某獲覩升平濫居榮寵聞瑞應而稱慶仰繢事而增歡無任抃蹈喜躍之至説原宋周子愛蓮説水陸草木之花可愛者甚蕃晉陶淵明愛菊自李唐以來世人甚愛牡丹豫獨愛蓮出淤泥而不染濯漣漪而不妖中通外直不蔓不枝香逺益清亭亭淨植可逺觀而不可褻玩焉豫謂菊花之隱逸者也牡丹花之富貴者也蓮花之君子者也噫菊之愛陶後鮮有聞蓮之愛同豫者何人牡丹之愛宜乎衆矣傳原明葉受君子傳君子諱蓮或又謂諱菡蓞字芙蓉相傳為神仙家流世居太華山玉井中始祖有諱碧藕者夀千嵗成周時因西王母進見穆天子陪宴瑶池上子孫散處其根𣲖世襲其名亦曰藕咸潔白聰明意氣清虛自以仙流弗與生民伍隱遁不見於世茍可蔽身雖汚泥重淵沒齒不怨時人為之謠曰平生水雲姿七星羅心胸豈無絲毫益上裨天子聰而不自薦逹胡為乎泥中藕聞亦不介意世有好而訪之者輒強與歸竟不辭謝第求澡雪以往任其指使或療渴治病養老慈幼娛賔客供祭祀靡不順承雖刳股臠體不憚藕生茄茄端楷離立屹然有出塵之志茄生荷荷為人圓渾能紉緝為衣與楚畹蘭氏齊名見稱於三閭大夫又嘗為杯棬屈體輪囷如象鼻狀授客吸酒號碧筒杯東坡見其遺製酌酒試之歎曰碧碗既作象鼻彎白酒猶𢃄荷心苦藝絶當時後人無能效之者傳十葉至君子君子質羸氣盈心芳貌溢內視欿然不足外觀佩服鮮整光曄可愛盡得羽化之術飄然有髙世之志因辟榖於人間世無所好惟日引清漣以自娛濯古有東昏侯寵貴嬪愛君子姿色令與潘妃進履君子愀然侯範金肖像代焉唐明皇鑿太液池與楊貴妃遊宴其中近臣將相或不得時至君子侍從其間不少刻舍左右會祿山之亂遂引去釋有金仙氏雅知君子齋潔留參侍世尊君子惡其異已不果留釋剡木勒像遣之自是流落江湖甘同草芥不希薦逹畨禺程九齡遇諸巷望見驚喜亟拜曰吾先夫子從周先生遊周先生友愛君子君子吾先夫子師友也敢不拜時薰風徐來君子欣然起舞笑媚相迎恨相見之晚九齡固請以歸下榻佇壺汲清漣以奉顧諸子姓曰君子吾方外友也可善事之日鉤簾去屏蔽灑掃左右惟恐失君子歡君子不時見每盛夏東日方興振衣起立吟風灑露逍遙欣躍已而徘徊顧望移午斂體握固噤不露半唇數日缷服委其心而蛻去至時復來來去皆在壺中人莫能窺其迹九齡益竒之謂曰昔費長房遇壺公能答鬼使社今吾其為長房乎因自號小壺公神仙家自希夷之後不傳世無能知者君子知之亦欲傳世顧非其人雖傳不解嘗以其略示九齡不盡解因俟其去而視其遺玉蛹纍纍私啖之瓊液滿咽兩臉駸駸君子之色君子歸九齡有異人過而相曰何物老媪生此寧馨兒神清骨潤往來人世夀未可量也昔見其浴漢昭帝栁池中芳氣襲人又見其在華山頂上人得其丹服之輒羽化今已數百年顧在此九齡聞之愈敬信服之不少怠頌增宋顔延之碧芙蓉頌澤芝芳艷擅竒水屬練氣紅荷比符縹玉擢麗滄池飛映雲屋實紀仙方名書靈躅贊增晉郭璞芙蓉贊芙蓉麗草一曰澤芝泛葉雲布映波赮熙伯陽是食饗比靈期賦御製西苑芙蕖賦惟澤芝志於爾雅菡蓞詠於風詩繄金塘之麗草允栁沼之朱儀夫其的爍輕莎翩躚清瀨玉節蟠根翠羽襞蓋縷黃作鬚跗紫成蒂蔭太液之漣漪蕩昆明之霧靄爾乃幽房晨折芳葩夜舒前迎丹殿後匝瑶除髙披直道斜裊周廬萋萋川碧渺渺天虛光留錦騖隂唼文魚葉漾珠而錯落影翻月而軒渠若夫黛罨如煙華濃似綺藻采橫洲霱雲被沚或雪沁瓊英螺含碧花桃倩紅􅞉菊分金蕊競秀揚輝爛兮出水如仰如俯似低復昂亭亭交倚田田並將宛若瑶林之四映矯如朱鷺之載翔至於萍合橋䀶蒲牽波縠溪靜禽喧臺髙樹復梅雨滳而浮馨麥飈扇而散馥氤氲於講席之書郁烈乎侍臣之服間命沙棠之楫駕芙蓉之舟似搴華峰之種無待汾水之謳宴羣工於在鎬聊悅豫以凝庥蓋其濯素挺生拔泥不滓外直中通花榮實旨潔比髙人清同君子是以廬山則淵明屆焉濂溪則惇頤樂只余願賢士之釋荷裳乃眷幽姿而不自已增漢閔鴻芙蓉賦乃有芙蓉靈草載育中川竦修幹以凌波建緑葉之規圓灼若夜光之在玄岫赤若太陽之映朝雲乃有陽文修嫮傾城之色揚桂枻而來遊玩英華於水側納嘉賔兮傾筐珥紅葩以為飾感夭桃而歌詩申關雎以自敕嗟留夷與蘭芷聽鶗鴂而不鳴嘉芙蓉之殊偉託皇居以發英魏曺植芙蓉賦覽百卉之英茂無斯華之獨靈結修根於重壤泛清流而擢莖其始榮也皎若夜光尋扶桑其揚暉也晃若九陽出暘谷芙蓉蹇産菡萏星屬絲條垂珠丹榮吐緑焜焜韡韡爛若龍燭觀者終朝情猶未足於是狡童媛女相與同遊擢素手於羅袖接紅葩於中流晉孫楚蓮花賦有自然之麗草育靈沼之清瀨結根繫於重壤森蔓延以騰邁爾乃紅花電發暉光曄曄仰曜朝霞俯照緑水潛緗房之奧密兮含珍藕之甘腴攢聚星列纖離相扶微若玄黎披幽夜粲若鄧林飛鵷雛潘嶽蓮花賦偉玄澤之普衍嘉植物之並敷遊莫美於春臺華莫盛於芙蕖於是惠風動沖氣和眄清池玩蓮花舒緑葉挺纖柯結緑房列紅葩仰含清液俯濯素波修柯婀娜柔莖苒弱流風徐轉回波微激其望之也曄若皎日燭崑山其即之也晃若盈尺映藍田芙蓉賦蔭蘭池之豐沼育沃野之上腴課衆榮而比觀煥卓犖而獨殊狎獵雲布窋吒星羅光擬燭龍色奪朝霞丹輝揮紅飛鬚垂的紛披赩赫散煥熠爚流芬賦采風靡雲旋布濩磊落蔓衍夭間發清陽而增媚潤白玉而加鮮夏侯湛芙蓉賦臨清池以遊覽觀芙蓉之麗華潛靈藕於玄泉擢修莖乎清波煥然蔭沼灼爾星羅若乃回縈外散菡萏內離的出艷發葉恢花披緑房翠蒂紫飾紅敷黃螺圓出垂蕤散舒纓以金牙點以素珠固陂池之麗觀尊終世之特殊爾乃採淳葩摘圓質析碧皮食素實味甘滋而清美同嘉異乎橙橘參嘉果以作珍長充御乎口實宋傅亮芙蓉賦考庶卉之珍麗實總美於芙蕖潛幽泉以育藕披翠蓮而挺敷泛輕荷以冒沼列紅葩而曜除徼旭露以滋采靡朝風而肆芳表麗觀於中沚播郁烈於蘭堂在龍見而萌秀於火中而結房豈呈芬於芷蕙將越味於沙棠詠三閭之被服美蘭佩而荷裳伊玄匠之有瞻悅嘉卉於中渠既輝映於丹墀亦納芳於綺疏原鮑照芙蓉賦感衣裳於楚賦詠憂思於陳詩訪羣英之艷絶標髙名於澤芝會春陂乎夕張搴芙蓉而水嬉抽我襟之桂蘭點子吻之瑜辭選羣芳之徽號美斯花之郁烈抱兹性之清芬稟若華之驚絶單蓲陽之妙手測淲池之光潔爍彤輝之明媚粲雕霞之繁悅顧椒丘而非偶豈圓桃而能埓彪炳以蒨藻翠莖而紅葩青房兮規接紫的兮圓羅樹妖淫之弱幹散菡萏之輕荷上星光而倒景下龍鱗而隱波戲錦鱗而夕映曜繡羽以晨過結遊童之湘吹起榜妾之江歌備日月之溫麗非盛明而謂何若乃當融風之暄蕩承暑雨之平渥被瑶塘之周流繞金渠之屈曲排積霧而揚芳鏡洞泉而含緑葉折水以為珠條集露而成玉潤蓬山之瓊膏輝蔥河之銀燭冠五華於仙草超四照於靈木雜衆姿於開卷閲羣貌於昏明無長袖之容止信一笑之空城森紫葉以上擢紛緗蕊而不傾根雖割而琯徹柯既解而絲縈感盛衰之可懷質始終而常清故其為芳也綢繆其為媚也奔發對妝則色殊比蘭則香越泛明彩於宵波飛澄華於曉月陋荆姬之朱顔笑夏女之光髮恨狎世而貽賤徒愛存而賞沒雖凌羣以擅竒終從嵗而零歇增梁簡文帝採蓮賦望江南兮清且空對荷華兮丹復紅卧蓮葉而覆水亂髙房而出叢楚王暇日之歡麗人妖艷之質且棄垂釣之魚未論芳䓑之實惟欲回渡輕船共採新蓮傍斜山而屢轉乘橫流而不前於是素腕舉紅袖長回巧笑墮鳴璫荷稠刺密亟牽衣而綰裳人喧水濺惜虧朱而壞妝物色雖晚徘徊未返畏風多而榜危驚舟移而花逺歌曰嘗聞蕖可愛採擷欲為裙葉滑不留綎心忙無暇薰千春誰與樂惟有妾隨君元帝採蓮賦紫莖兮文波紅蓮兮芰荷緑房兮翠蓋紫實兮黃螺於時妖童媛女蕩舟心許鷁首徐回兼傳羽杯棹將移而藻挂船欲動而萍開爾其纎腰束素遷延顧步夏始春餘葉嫩花初恐沾裳而淺笑畏傾船而斂裾故以水濺蘭橈蘆侵羅􅳭菊澤未反梧臺逈見荇濕霑衫菱長繞釧泛柏舟而容與歌採蓮於江渚歌曰碧玉小家女來嫁汝南王蓮花亂臉色荷葉雜衣香因持薦君子願襲芙蓉裳昭明太子芙蓉賦色兼列彩體繁衆號初榮夏芬晚花秋曜興澤陂之徽章結江南之流調江淹蓮花賦檢水陸之具品閲山海之異名珍爾秀之不定乃天地之精英殖東國之流詠出西極而擅名方翠羽而結葉比碧玉而為莖蕊金光而赩色藕氷折而玉清載紅蓮以吐秀披絳葉以舒英故香氛感俗淑氣參靈躑躅人世茵蒀祇冥青桂羞烈沉水慚馨於是生乎澤陂出乎江隂見彩霞之夕照覿雕雲之晝臨既翕赩於洲漲亦映曖於川潯奪夜月及熒光掩朝日與赩火出金沙而延曜被淥波而覃拖冠百草而絶羣出異類之衆夥故仙聖傳圖英隱留記一為道珍二為世瑞發青蓮於王宫驗竒花於陸地若其江淡澤芬則照電爍日池光沼緑則明璧洞室曜長洲而瓊文映青崖而火質或憑大淵之清峭或殖疏圃之蒙密故河北棹歌之姝江南採菱之女春水厲兮楫潺湲秋風駛兮舟容與著縹芰兮出波攬湘蓮兮映渚迎佳人兮北燕送上客兮南楚知荷華之將晏惜玉手之空佇乃為謡曰秋雁度兮芳草殘琴柱急兮江上寒願一見兮道我意千里逺兮長路難若其花實各名根葉異辭既號芙蕖亦曰澤芝麗詠楚賦艷歌陳詩非獨瑞草爰兼上藥味靈丹砂氣驗青艧乃可劍棄海岫龍舉雲崿畫臺殿兮霞蔚圖縑縞兮炳爍永含靈於洲渚長不絶兮川壑原唐王勃採蓮賦非登髙可以賦者惟採蓮而已矣况洞庭兮紫波復瀟湘兮緑水或暑雨兮朝霽乍涼飈兮暮起黛葉青跗煙周五湖紅葩絳花電爍千里尤見重於幽客信作謡於君子爾其珍族廣茂淑類博傳藻河渭之空曲被沮漳之淪漣燭澄灣而爛爛亘修漲之田田豈直水區澤國江漘海壖是以吳娃越艷鄭婉秦妍感靈翹於上節悅瑞色於中年錦帆映浦羅衣塞川飛木蘭之畫楫駕芙蓉之綺船問子何去幽潭採蓮已矣哉誠不知其所以然賞由物召興以情遷故其遊泳一致悲欣萬緒至若金室麗妃璇宫佚女傷鳳臺之寂寞厭鸞扃之間處侍飲南津陪歡北渚見磯岸之紆直覿旌旄之低舉上苑神池芳林御陂樓隂架沚殿彩乘漪張拜洛之容衛備橫汾之羽儀簫鼓發兮龍文動鱗羽喧兮鷁首移咸靚妝而麗服各分騖而並馳蘋縈漿礙荇觸船危視雲霞之沃蕩望林泉之蔽虧洪川泱泱兮菡萏積緑水湛湛兮芙蕖披惜嵗時兮易晚傷君王兮未知折紺房與湘菂攬紅葩及碧枝回綃裙兮竊獨歎步羅襪兮私自竒莫不驚香悼色畏别傷離復有濯宫年少期門公子翠髮蛾眉頳唇皓齒傅粉蘭堂之上偷香椒屋之裏亦復銜恩激誓佩寵緘愁承好賜之珍席奉嬉遊之彩斿繡楝曛兮翠羽帳瑶塘曙兮青翰舟搴條拾蕊沿波泝流池心寬而藻薄浦口窄而萍稠和橈姬之衛吹接榜女之齊謳去復去兮水色夕採復採兮荷葉秋願承歡而卒嵗長接席而寡仇於是薊北無事關西始樂霧盡江垠氣恬海寞消怪氣於沅澧照榮光於河洛殊方異類舞詠相錯王公卿士歌吹並作則有侯家瑣第戚里芳園穿池壩岸之曲蓄水河陽之源隄防谷口島嶼轘轅嘉木畢植靈草具繁沉桂北之丹藕濯荆南之紫根鬱凄凄而霧合燦曄曄而霞翻洎乎氣徹都鄙景華川陸麥雨微涼梅飈淺燠命妖侣於石城嘯娛朋於金谷乃使緑珠捧棹青琴理舳樽芳醪藉珍餗泛玉潭之瀰漫繞金渠之隈隩石近水而苔濃岸連山而樹復排芰末而爭逺託蘆間而競逐赴汨凌波飛袿振羅風低緑幹水濺黃螺上客喧兮樂未已美人醉兮顔將酡畏蓮色之如臉願衣香兮勝荷徘徊郢調悽慘燕歌念窮歡於水涘誓畢賞於川阿結漢女邀湘娥北溪蕊尚密南汀花更多恨光景兮不駐指芳馨兮謂何若乃南楚義妻東吳信婦結䄜整佩承筐奉帚忽君子兮有行復良人兮逺征南討九真百粵北戍雞田雁城念去魂駭相視骨驚臨春渚兮一送見秋潭兮四平與子之别煙波望絶念子之寒江山路難水淡淡兮蓮葉紫風颯颯兮荷花丹翦瑤帶而猶欷折瓊英而不歡既而緣隈逗浦還栧歸櫓眷芳草兮已殘憶離居兮方苦延素頸於極漲攘皓腕於神滸惜佳期兮末由徒增思兮何補又若倡姬蕩媵命侣招羣淇上洛表湘臯汝墳望洲草兮翡翠色動浦水兮驪龍文願解佩以邀子思搴裳而從君悲時暮愁日曛鳴鐶釧兮響窈窕艷珠翠兮光繽紛憐曙野之絳氣愛晴天之碧雲棹巡汀而栁拂船向渚而菱分掇翠莖以翳景襲朱蕚以為裙梃楫凌亂風流雨散鳴榔絡繹霧罷煙釋狀飛虯之蜿蜿若驚鴻之奕奕艇怯奔潮篙憎淺石絲著手而偏繞刺牽衣而屢襞乃有貴子王孫乘間縱觀何平叔之符彩潘安仁之藻翰稅龍馬於金堤命鳧舟于石岸錦纜翻灑銀檣照爛日側光沉風驚浪深紆北渚之新贈恣東溪之密尋鴛鴦繡彩之文履玳瑁瓊華之寶琴扣舷擊榜吳歈越吟溱與洧兮葉覆水淮與濟兮花冒潯值明月之夕出逢丹霞之夜臨茱茰歌兮軫妾思芍藥曲兮傷人心伊採蓮之賤事信忘情之蓋寡雖迹兆於水鄉遂風行於天下感極哀樂聲參鄭雅是以緬察谷底窮覽地維北盡豐鎬潦潏南究巴沱越沂莫不候期應節沿濤泛湄薄言採之興言服之發文扃之麗什動幽幌之情詩使人結眷令人相思宜其色震百草香奪九芝棲碧羽之神雀負青􅀈之寶龜紫秩流記丹經祕詞豈徒加繡柱之光彩曄文井之華滋已矣哉向使時無其族代乏厥類獨秀上清之境不生中國之地學鸞鳳而時來與鶼鶼而間至必能使衆瑞彩沒羣貺色沮湯武齋戒伊臯延佇豈俾夫秦童趙僕倡姬艷女狎而玩之擷而採之乎時有東鄙幽人西園舊客常陪帝子之輿經侍天人之籍詠緑竹於風曉賦彤管於日夕暑往寒來忽矣悠哉蓬飄梗逝天涯海際似還卬之寥廓同適越之淫滯蕭索窮途飄颻一隅昔聞七澤今過五湖聼菱歌兮幾曲視蓮房兮幾株非鄴地之宴語異睢苑之歡娛况復殊方别域重瀛復嶂虞翻則故鄉寥落許靖則生涯惆悵感芳草之及時懼修名之或喪誓剗迹潁上棲影渭陽枕箕岫之孤石泛磻溪之小塘餐素實兮吸絳芳荷為衣兮芰為裳永潔已於丘壑長寄心於君王且為歌曰芳華兮修名竒秀兮異植紅光兮碧色稟天地之淑麗承雨露之霑飾蓮有藕兮藕有枝才有用兮用有時何當娜婀華實移為君含香藻鳳池宋之問秋蓮賦并序天授元年勑學士楊炯與之問分日於洛城西入閣每雞鳴後至羽林仗閽人奏名請龜契佇命拱立於御橋之西玉池清冷紅蕖菡萏謬履扃闥自春徂秋見其生視其長覩其盛惜其衰得終天年而無夭折者良以隔礙仙禁人莫由見向若生於瀟湘洞庭溱洧淇澳即有吳姬越客鄭女衛童芳心未成採擷都盡今委以白露順以涼風榮落有期秋分畢矣斐然願歌其事久之乃為秋蓮賦焉若夫西城祕掖北禁仙流見白露之先降悲紅蕖之已秋昔之菡萏齊秀芬敷競發君門閟兮九重兵衛儼兮千列緑葉青枝緣溝覆池映連旗兮搖艷揮長劍兮陸離疏瀍兮裂榖交流兮相沃四繞兮丹禁三匝兮承明曉而望之若霓裳宛轉朝玉京夕而察之若霞標灼爍散赤城既如秦女艷日兮鳳鳴又似洛妃拾翠兮鴻驚足使瑶草罷色芳樹無情復道兮詰曲離宫兮相屬飛閣兮周廬金鋪兮璧除君之駕兮旖旎蓮之葉兮扶疏萬乘顧兮駐綵騎六宫喜兮停羅裾仰仙遊而德澤縱幽覽而神虛豈與夫溪澗兮沼沚自生兮自死海泝兮江沱萬里兮煙波泛漢女遊湘娥佩鳴玉戲清波中流欲渡兮木蘭楫幽泉一曲兮採蓮歌江南兮峴北汀洲兮不極既有芳兮莎城長無艷兮水國豈知移植天泉香飄列仙嬌紫臺之月露含玉宇之風煙雜葩兮照燭衆彩兮相宣鳥翡翠兮丹青翰樹珊瑚兮林碧鮮夫其生也春風晝蕩爍日相煎夭桃盡兮穠李滅出大堤兮艷欲燃夫其謝也秋灰度管金氣騰天宫槐疏兮井桐變搖寒波兮風颯然歸根息艷兮八九月乘化無窮兮千萬年越人望兮已長久鄭女採兮無由緣何深蒂之能固何穠香之獨全别有待制揚雄悲秋宋玉夏之來兮玩早紅秋之暮兮悲餘緑禮盛燕臺人非楚材雲霧圖兮蘭為閣金銀酒兮蓮作杯落英兮徘徊風轉兮哀哀入黃扉兮灑錦石縈白蘋兮覆緑苔寒暑忙忙兮代謝故葉新花兮往來何秋日之可表托芙蓉以為媒增白居易荷珠賦迸水所集輕荷正敷引修莖而出葉凝玉液以成珠淨緑田田神龜之巢處斯在虛眀皎皎靈鵲之銜來豈殊既羅列其青蓋又昭章於白榆亂點的爍分規青瑩仰虛無以上出掩晶熒而外映灑之不著湛兮逾淨時寄寓於傾欹每因依於平正可止則止必荷之中央在圓而圓得水之本性飄飈既息而常凝魚鳥頻衝而不定爾乃一氣暗後初陽照前宿雨霽而猶在曉露裛而正鮮熠熠有光映空水而煥若纍纍無數遍池塘而炯然宛轉而魚目回視沖融而蚌胎未堅因霑濡而大小隨散合以虧全輕彩蕩漾芳濃厭浥眀璣而夜月爭光丹粟而晨霞散入其息也與波俱停其動也與風皆急若轉於掌乃是江妃之珠如凝於盤遂成泉客之泣冰壺捧玉而殊倫水鏡沈精而莫及則知氣有相假物有相資惟雨露之留處當芙蓉之茂時雖賦象而無準必成形而在兹喻於人則寄之生也擬於道則沖而用之自契玄珠之妙何求赤水之遺宋歐陽修荷花賦步蘭塘以清暑兮颯蘋風以中人擷杜若之春榮兮搴芙蓉於水濵嘉丹葩之耀質出緑水而含新蔭曲池之清泚漾波紋之淵淪披紅衣而耀彩寄清流而託根挺無華之淺艷靡競麗乎先春抱生意以自得兮及薰時之嘉辰若夫夏畹蘭衰夢池草密慘羣芳之已銷獨斯蓮之迥出可以嗅清香而折酲可以玩芳華而自逸况其晚浦煙霞水亭風日投文竿而餌垂泳萍莖而波溢絲縈藕以全折杯卷荷以半側墜紫菂以欹煙斂紅芳而向夕可憐影兮相顧列金葩而返植清風遏以似起碧露合而乍失或兩兩以相扶漸亭亭而獨出發胭脂於北土生異香於西域匪江妃之小腰即廣陵之清骨爾乃曲沼微陽橫塘細雨逐橋上之歸鞍笑堤邉之遊女墮虹梁而窺影倚風臺而欲舞覆翠被以薰香然犀燈而照浦雙心並根千株泣露湛月白而風清杳池平而樹古送艇子於西州聞棹謳於北渚迎桃根而待楫逢宓妃而未渡迫而視之靚若星妃臨水而脈脈盈盈逺而望之杳如峽女行雲而朝朝暮暮其妖麗也其間雅也香荃橈兮木蘭舟淡容與兮悵夷猶東西隨葉隱上下逐波浮已見雙魚能比目應笑鴛鴦會白頭昔聞妃子貴東鄰池上金花不染塵空留此日田田葉不見當時步步人明申時行瑞蓮賦并序惟聖皇御歷十有四年道化滂流和氣翔洽於時崇慈寧之新構備尊飬之上儀大孝潛孚靈貺昭答乃有嘉蓮獻異重臺發祥萬乘臨觀六宫燕喜信熙時之上瑞馨德之貞符爰付丹青用垂琬琰命臣等賦之臣謹拜手稽首而作賦曰若夫璇宫壯麗紫殿巍峩接蓬萊之仙苑環太液之恩波渟泓玄澤醖釀醇和欣嘉生之咸鬯紛靈瑞其何多宛彼芙蕖嫣然沼沚載以文罌陳之金戺覆碧葉兮田田漾清漣兮泚泚被茝紉蘭抽黃曵紫既冉冉以流馨復重重而結綺爾其艷外生艷華中吐華剖碧房兮敷絳蕚幻珠實兮成丹葩粲英英其疉起芬郁郁其交加乃若旭日方升卿雲有爛初抱赤兮若傾忽飛丹兮若煉如盤如蓋臨金掌以曈曨非霧非煙照虹梁而璀璨又若桂輪乍滿蕙露初零凝清輝兮湛湛潄芳潤兮盈盈紺宇層樓接銀潢而瀲灔雲鬟髙髻開寶鏡以晶熒又若涼雨才收薰風徐送濯雲錦兮澄鮮舞霓裳兮飛動凌波綽約宛洛浦之驚鴻􅞪羽翩躚恍秦臺之儀鳳至於星敷電發霧變霞蒸觸景而生態隨物而賦形縱他卉之穠麗未若茲花之最靈觀其托體慈闈敷榮祕殿映藻井以生妍傍綺疏而呈倩煒煌三秀之庭搖曳五明之扇載色載笑如承長樂之歡來遊來觀每荷重瞳之眷詫神物之有知信人寰之僅見豈比夫駢花并實連理分枝望舒生於漢圃合歡産於唐池太華峯頭徒咏如船之異麻姑壇上虛傳變碧之竒斯蓋重申之佑命特顯象於昌期猗歟我皇德如虞聖時業業以憂勤日夔夔而祇敬承顔順志極尊飬之隆解慍阜財布寬仁之令故珍貺駢􅀈而竒祥疉應繩繩繼繼用彰纍葉之休赫赫眀眀式表重華之盛尚增修於玄德庶永承乎天慶原申時行後瑞蓮賦有韡者華婉如清揚菡萏為簮芙蓉為裳出五沃之上腴兮苞九疑之竒芳繄中通而外直兮洵篤實而輝光德可比於君子兮又奚遜夫國香羌託種於靈沼兮載移根於長樂挺翠蓋之團團兮冒朱華之灼灼枝承㽔以婀娜兮何揚翹之磊落揉珠菂以成葩兮煥重英之出蕚森濯潁於芝房兮儼敷榮於菌閣朝晞髮於扶桑兮若葵赤之常傾夕弄影於望舒兮象桂輪之載盈峩星冠於絳闕兮散霞標於赤城鳳羽矯其翩翻兮蜃樓起而崢嶸恣意態之橫出兮紛可炳於丹青彼新宫之嶻嶪兮固神靈之所宅薰風扇其淳和兮甘雨滋其薌澤卿雲助其爛漫兮膏露增其的皪夫惟孕粹而鍾祥兮肆焜煌而舄奕乃其含芬桂掖流曄椒塗承恩輝於黼幄兮分繡采於翟䄖映畫堂之甲帳兮迎紫罽之金輿燦榮光於華渚兮鬱佳氣於蓬壺宫伯欣欣而告瑞慈顔穆穆其歡愈何司花之特巧殆坤元之出符天子乃考祥圖披靈契徴素蓮於王母遡石蕖於炎帝或一房而百子或一花而千嵗兆多夀而多男允卜年而卜世於是羣臣效三呼之祝薦萬嵗之觴陳瓜瓞椒聊之什詠竹苞松茂之章曰文子與文孫兮俾熾而昌曰聖母及聖皇兮俾夀而康如重臺之積纍共乾坤而久長臣拜手而作頌庸昭示於無疆頌曰瞻彼璇宫臨紫極兮仙籞神池滙靈澤兮煜煜竒葩産禁掖兮緑葉朱華苞翠菂兮重英疉蕚何赩赫兮地符山川帝申錫兮百世本支兆蕃碩兮慈齡聖算齊箕翼兮小臣獻頌揚休德兮福祿萬年子孫千億兮文散句增楚屈原離騷製芰荷以為衣兮雧芙蓉以為裳九歌搴芙蓉兮木末築室兮水中葺之兮荷蓋芷葺兮荷屋荷衣兮蕙𢃄倏而來兮忽而逝宋玉九辨被荷裯之晏晏兮然潢洋而不可𢃄招魂坐堂伏檻臨曲池些芙蓉始發雜芰荷些漢王褒九懷抽蒲兮為坐援芙蓉兮為蓋劉向九歎芙蓉蓋而菱華車兮紫貝闕而玉堂御定佩文齋廣羣芳譜卷二十九
