body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷三十花譜荷花二集藻四言古詩增晉傅玄芙蕖煌煌芙蕖從風芬葩照以皎日灌以清波隂結其實陽發其花金房緑葉素株翠柯五言古詩增漢樂府相和曲江南可採蓮蓮葉何田田魚戲蓮葉東魚戲蓮葉西魚戲蓮葉南魚戲蓮葉北晉張華詠荷荷生緑泉中碧葉齊如規回蕩流霧珠映水逐條垂照灼此金塘藻曜君王池不愁世嘗絶但畏盛明移陸雲芙蕖緑房含青實金條懸白璆俯仰隨風傾煒曄照清流梁簡文帝採蓮曲晚日照空磯採蓮承晚暉風起湖難度蓮多摘未稀棹動芙蓉落船移白鷺飛荷絲傍繞腕菱角逺牽衣同庾肩吾詠蓮舟買荷度採蓮前岸隈舟子屢徘徊荷披衣可識風踈香不來欲知船度處當看荷葉開詠芙蓉圎花一蒂卷交葉半心開影前光照曜香裏蝶徘徊欣隨玉露點不逐秋風催元帝賦得涉江採芙蓉江風當夜清桂楫逐流縈初疑京兆劒復似漢冠名荷香𢃄風逺蓮影向根生葉捲珠難溜花舒紅易傾日暮鳬舟滿歸來度錦城昭眀太子詠同心蓮江南採蓮處照灼本足觀况等連枝樹俱耀紫莖端同踰並根草雙異獨鳴鸞以茲代萱草必使愁人歡沈約詠芙蓉微風搖紫葉輕露拂朱房中池所以緑待我泛紅光詠新荷應詔勿言草卉賤幸宅天池中微根才出浪短幹未搖風寧知寸心裏蓄紫復含紅吳均採蓮錦𢃄雜花鈿羅衣垂緑川問子今何去出採江南蓮遼西三千里欲寄無因緣願君早旋反及此荷花鮮劉孝威採蓮曲金槳木蘭船戲採江南蓮蓮香隔浦渡荷葉滿江鮮房垂易入手柄曲自臨盤露花時濕釧風莖乍拂鈿劉緩詠江南可採蓮春初北岸涸夏月南湖通卷荷舒欲倚芙蓉生即紅楫小宜回徑船輕好入叢叉光逐影亂衣香隨逆風江南少許地年年情不窮朱超詠同心芙蓉青山麗朝景玄峰朗夜光未及清池上紅蕖並出房日分雙蒂影風合兩花香魚驚畏蓮折龜上礙荷長雲雨留輕潤草木應嘉祥徒歌涉江曲誰見緝為裳江洪詠荷澤陂有微草能花復能實碧葉喜翻風紅英宜照日移居玉池上託根庶非失如何霜露交應與飛蓬匹陳祖孫登詠城塹中荷白水麗金扉青荷承日暉葉似環城蓋香亂上橋衣岸髙知水落影合見菱稀猶疑涉江處空望採蓮歸賦得涉江採芙蓉浮照滿川漲芙蓉承落光人來間花影衣度得荷香桂舟輕不定菱歌引更長采采嗟離别無暇緝為裳周庾信賦得荷秋衣行欲製風蓋漸應欹若有千年蔡須巢但見隨隋辛德源芙蓉花洛神挺凝素文君拂艷紅麗質徒相比鮮彩兩難同光臨照波日香隨出岸風涉江良自逺託意在無窮原杜公瞻詠同心芙蓉灼灼荷花瑞亭亭出水中一莖孤引緑雙影共分紅色奪歌人臉香亂舞衣風名蓮自可念况復兩心同增宏執恭秋池一株蓮秋至皆空落凌波獨吐紅託根方得所未肯即從風殷英童採蓮曲蕩舟無數伴解纜自相催汗粉無庸拭風裙隨意開棹移浮荇亂船進倚荷來藕絲牽作縷蓮葉捧成杯唐太宗採芙蓉結伴戲方塘携手上雕航船移分細浪風散動浮香逰鶯無定曲驚鳬有亂行蓮稀釧聲斷水廣棹歌長栖烏還密樹泛流歸建章鄭愔採蓮曲錦筰沙棠艦羅𢃄石榴裙緑潭采荷芰清江日稍曛魚鳥爭唼喋花葉相芬氲不覺芳洲暮棹歌處處聞原王昌齡越女越女作桂舟還將桂為楫湖上水渺漫清江不可涉摘取芙蓉花莫摘芙蓉葉將歸問夫壻顔色何如妾李白折荷有贈涉江玩秋水愛此紅蕖鮮攀荷弄其珠蕩漾不成圎佳期綵雲裏欲贈隔逺天相思無由見悵望涼風前古風碧荷生幽泉朝日艷且鮮秋花冒緑水密葉羅青煙秀色空絶世馨香竟誰傳坐看飛霜滿凋此紅芳年結根未得所願託華池邉感興芙蓉嬌緑波桃李誇白日偶蒙春風榮生此艷陽質豈無佳人色但恐花不實宛轉龍火飛零落互相失誰知凌寒松千載長守一增李白子夜吳歌鏡湖三百里菡蓞發荷花五月西施採人看隘若耶回舟不待月歸去越王家戎昱採蓮曲雖聽採蓮曲詎識採蓮心漾楫愛花逺回船愁浪深煙生極浦色日落半江隂同侶憐波靜看妝墮玉簮楊衡採蓮凝鮮霧渚夕揚艷緑波風魚逰乍散藻露重稍欹紅椘客傷暮節吳娃泣敗叢促令芳本固寧望雪霜中李德裕重臺芙蓉芙蓉含露時秀色波中溢玉女攏朱裳重重映皓質晨霞輝丹景片片眀秋月蘭澤多衆芳妍姿不相匹白居易東林寺白蓮東林北塘水湛湛見底清中生白芙蓉菡蓞三百莖白日發光彩清飇散芳馨泄香銀囊破瀉露玉盤傾我慙塵垢眼見此瓊瑶英乃知紅蓮花虛得清淨名夏蕚敷未歇秋房結才成夜深衆僧寢獨起繞池行欲收一顆子寄向長安城但恐出山去人間種不生京兆府新栽蓮汚溝貯濁水水上葉田田我來一長歎知是東溪蓮下有清泥汚馨香無復全上有紅塵撲顔色不得鮮物性猶如此人事亦宜然託根非其所不如遭棄捐昔在溪中日花葉媚清漣今年不得地憔悴府門前姚合蓮塘方塘菡蓞髙繁艷相照耀幽人夜眠起忽疑野中燒曉尋不知休白石岸亦峭宋范仲淹渚蓮武陵誰家子波面雙雙渡空積心中絲未成機上素似共織女期秋宵苦霜露梅堯臣起居退聞宣三館諸公觀瑞蓮來朝十二旒將出未央殿微聞嘉蓮開獨許侍臣見嘉蓮其如何層樓擁霞片玉輦下天泉日昃不知倦恩魚應亦喜跳沫珠欲濺誰憐與衆歸博士臣疏賤蘇軾與王郎昆仲及兒子邁繞城觀荷昨夜雨鳴渠曉來風襲月蕭然欲秋意溪水清可啜環城三十里處處皆佳絶浦蓮浩如海時見舟一葉此間真避世青蒻低白髮相逢欲相問已逐驚鷗沒蘇轍盆池白蓮白蓮生淤泥清濁不相干道人無室家心迹兩蕭然我住西湖濵蒲蓮若雲屯幽居常閉户時聽逰人言色香世所共眼鼻我亦存鄰父閔我獨遺我數寸根潩水不入園庭有三尺盆兒童汲甘井日晏泥水溫及秋尚百日花葉隨風翻舉目得秀色引息收清芬此心湛不起六塵空過門誰家白蓮花不受風霜殘千葉白蓮蓮花生淤泥淨色比天女臨池見千葉謫墮問何故空眀世無匹銀瓶送佛所清泉養芳潔為我三日住蔫然落寶牀應返梵天去秦觀荷花方塘收雨腳落日半遙岑芙蕖淨姢姢麗服撫翠衾無言意自逺欲渡秋水深緬懷平生人對此詎可尋弄芳惜晼晚酒至誰與斟天涯有歸雲聊寄相思心心開獲清賞芙蕖一何綺美人艷新妝斂𬒮照秋水端如蕩子妻顧自良家子黃金選燕趙搖落對江沚薄暮風雨來獨立淚如洗望君君詎知傾宮定誰似范成大萬州西山湖亭秋荷叢薈忽眀眼山腰灔湖光列岫繞雲錦深林護風香西山即太華玉井餘新芳隔江招岑仙共擘雙蓮房楊萬里玉井亭觀荷蕖仙初出波照日稚猶怯密排碧羅蓋低護紅玉頰館之水精宮環以琉璃堞珠眀浮盤戲酒漾流杯曄青筆尖欲試緑箋皺還摺老龜大于錢辛勤上團葉忽聞人履聲入水一何捷金蕭貢古採蓮曲洋洋長江水渺渺漲平湖田田青茄荷艷艷紅芙蕖酣酣斜日外冉冉涼風餘蒨蒨誰家子裊裊二八初兩兩並輕舟笑笑相招呼悠悠波上鴛潑潑蒲中魚采采不盈手依依欲何如元龔璛飲府庠荷花池上又自韓園至鄧覺非家飲觀蓮清樽如有期初涼意俱適肯來寂寞濵菡蓞亦浮植陶然轉乘興徑度一圃碧遙指城南家臨水更展席酒狂易為仙風便香堪食空宇無能塵物我皆醉色誰言鬢已秋始得痛飲力願將花上露為洗坐中客程巨夫至洪王肯堂治書見示芙蓉詩次韻春風歇桃李秋雨深莓苔蕭然公館間得此竒種栽九天清露零一道紅雲開勾牽緑衣隊酣宴瑶池杯穠妝月鑑懸麗服霜刀裁瑞蓮湧平地妙色分五臺暫陪飛仙遊偏稱幽人懷終疑閬苑去嘉會何時諧此日眼雙眀臨風首低徊長當歌離騷招得花神來李孝光采蓮曲采蓮復采蓮蓮生隔江水不愁無舟楫但愁波浪起夏日荷亭即事辟暑何所適南亭俯中渚鷗鷺了不驚况復涼入髓水華露未晞香氣紛旖旎美人美無度嬋姢照江水􅀈􅀈玉雪姿何能畏袢暑南風從天來入我懷袖裏髙氣行青雲且置吾白羽邇來不飲酒煮藥咽香蕊羣賢政自佳有作動盈紙但恐清興闌遭此催詩雨胡天遊觀蓮清池瑩人心俯見荷葉背南塘非不佳無此青錢蓋沈沈古鏡淨濯濯眀妝對涼風似留人幽賞心獨會天公亦解事一雨不破塊小呼巫陽雲浣此傾國態髙盤捧跳珠錯落無小大恍疑逢二妃迎笑爭解佩低昂巧簸弄明月聚還碎馮夷不相容轉盻何所在人生總虛幻佇立增嘆慨聊將一餉間了我看花債濓翁不我待誰復同此愛長嘯歸去來餘芳滿襟𢃄倪瓉池蓮詠回翔波間風的歷葉上露清池結素彩華月映微步雲隂花房斂雨歇芳氣度欲去拾明璫踟蹰惜遲莫薛元曦次韻歐陽檢閲濠池觀荷行行濠池上亭亭見長荷瓊葩耀初日碧芰卷輕波深浦曉色亂微雨晚香多方舟時自移髙軒或來過豈無河朔飲那復發商歌商歌一慷慨此物奈君何原明申時行晨起觀荷花水榭臨文漪晨曦出暘谷宛彼芙蕖花嫣然媚初旭焕若丹霞敷曄如錦雲簇穠艷復芬馡可以娛心目須臾日漸中斂華閟清馥匪乏傾陽姿將無避炎燠舒卷固有時昕晡遞相續努力愛朝暉寸隂如尺玉七言古詩原唐王勃採蓮曲採蓮歸緑水芙蓉衣秋風起浪鳬鴈飛桂棹蘭橈下長浦羅裙玉腕輕搖櫓葉嶼花潭極望平江謳越吹相思苦相思苦佳期不可駐塞外征夫猶未還江南採蓮今已暮採蓮花渠今那必盡娼家官道城南把桑葉何如江上採蓮花蓮花復蓮花花葉何稠疊翠葉本羞睂花紅強似頰佳人不在茲悵望别離時牽花憐共蒂折藕愛連絲故情無處所新物徒華滋不惜西津交珮解還羞北海鴈書遲采蓮歌有節采蓮夜未歇正逢浩蕩江上風又值徘徊江上月徘徊蓮浦夜相逢吳姬越女何丰茸共問寒江千里外征客關山路幾重李白採蓮曲若耶溪傍採蓮女笑摘荷花共人語日照新妝水底明風飄香袂空中舉岸上誰家逰冶郎三三五五映垂楊紫騮嘶入落花去見此踟蹰空斷腸增韓愈奉酬盧給事雲夫四兄曲江荷花行見寄并呈上錢七兄閣老張十八助教曲江千頃秋波淨平鋪紅雲蓋眀鏡大眀宮中給事歸走馬來看立不正遺我明珠九十六寒光映骨睡驪目我今官間得婆娑問言何處芙蓉多撑舟昆明度雲錦腳敲兩舷呌吳歌太白山髙三百里負雪嵬嵬插花裏玉山前却不復來曲江汀瀅水平杯我時相思不覺一回首天門九扇相當開上界真人足官府豈如散仙鞭笞鸞鳯終日相追陪李商隱贈荷花世間花葉不相倫花入金盆葉作塵惟有緑荷紅菡蓞卷舒開合任天真此花此葉長相映翠減紅衰愁殺人原溫庭筠張靜婉采蓮曲蘭膏墜髮紅玉春燕叉拖頸拋盤雲城西楊栁向嬌晚門前溝水波粼粼麒麟公子朝天客珂馬璫璫度春陌掌中無力舞衣輕剪斷鮫綃破春碧抱月飄煙一尺腰麝臍龍髓憐嬌嬈秋羅拂水碎光動露重花多香不銷鸂鶒交交塘水滿緑萍金粟蓮莖短一夜西風送雨來粉痕零落愁紅淺船頭折藕絲暗牽藕根蓮子相留連郎心似月月易缺十五十六清光圎增溫庭筠蓮浦謡鳴橈軋軋溪溶溶廢緑平煙吳苑東水清蓮媚兩相向鏡裏見愁愁更紅白馬金鞭大堤上西江日夕多風浪荷心有露似驪珠不是真圎亦搖蕩鮑溶採蓮曲二首弄舟朅來南塘水蓮葉映身摘蓮子暑衣鮮淨鴛鴦喜作浪舞花驚不起殷勤護惜纎纎指水菱初熟多新刺採蓮朅來水無風蓮潭如鏡松如龍夏衫短袖交斜紅艷歌笑鬬新芙蓉戲魚住聽蓮花東宋梅堯臣南軒盆植重臺蓮移種池彤雲赤霧生緑房朝霞變蕊朱粉光白玉入泥不滿盎羽蓋裛露明月璫濁水一石亂蛙黽鑿池五丈如斗方萍根科斗得自在荷芰眀年出水央徐積芰荷歌孔雀團花翡翠鈿青皇拋盡買花錢渌魚飛膽大如拳琉璃瓦墜紫微天湘妃曲譜誰可傳彩毫不動斜卷箋我家食客常三千杯盤一樣青瑤圎麻姑下來尋水仙不見波瀾只見煙昨夜秋風吹洞房起來先著碧霞裳半含笑面齊鬭妝家家院落紺為牆不道採花人在傍貪看飛來白紵郎亦有美人貞且良獨在碧綃幃下藏秦觀採蓮若耶溪邉天氣秋採蓮女兒溪岸頭笑隔荷花共人語煙波渺渺蕩輕舟數聲水調紅橋晚棹轉舟回笑人逺腸斷誰家遊冶郎盡日踟蹰臨栁岸林景熙荷珠霞衣蔥珮來珊珊水晶之宮緑玉盤誰與馮夷作戲劇貝闕驅入神瓢翻又疑罷織鮫人泣碧窪融作水銀汁圎或為璧方為圭寒光滉漾不可拾古來欹器戒覆傾真宰之柄常惡盈季倫買笑輕百斛金谷轉首迷荆榛紛紛魚目爭貴惜道眼獨懸諸幻息須臾海霽山日髙緑雲萬柄淨如拭元薩都刺芙蓉曲秋江渺渺芙蓉芳秋江女兒將斷腸絳袍春淺護雲暖翠袖日暮迎風涼鯉魚吹浪江波白霜落洞庭飛木葉蕩舟何處採蓮人愛惜芙蓉好顔色許楨瑞蓮歌太行山下溪名洹洹溪主人今得賢石渠分溜入方沼種出萬柄紅白蓮就中一茄發挺特艷妝雙出雲髻鬈有如二女降溈汭翠裙紅袖相牽連岐分駭目未信宿里巷傳耳何喧闐波神有為獻嘉瑞要並太史書豐年主人謙德不敢有福善自是天行權亭亭植立萬花表可人適在亭之前日酣欲語轉嬌婉風動似舞尤輕便一時圗寫溢紈素十日車馬空市廛昔聞蓂莢曽表異乃因土階與采椽景星鳯鳥豈常有考信前史真宜傳醴湖蕪塞不復見而今乃濯圭塘泉禎祥奕葉定不斷藕絲萬縷相纒綿幽人到此自怡恱膏盲泉石尤難痊要須紀録入郡乘千年增重吾山川于石西湖荷花我昔扁舟泛湖去回望荷花浩無數誰家畫舫倚紅妝笑聲迥入花深處笙歌凄咽水雲寒花色似嫌脂粉汙夜深人靜月明中方識荷花有真趣水天倒浸碧琉璃淨質芳姿淡相顧亭亭翠蓋擁羣仙輕風微顫凌波步酒暈潮紅淺渥唇膚如凝脂腰束素一捻香骨薄裁冰半破芳心嬌泣露湖光花氣滿衣襟月落波寒浸香霧恍然人在蘂珠宮便欲移家臨水住回首落日低黃塵十年不到湖山路花開花落幾秋風湖上青山自如故張昱蓮塘曲青蘋風起栁塘水波聲夜聒鴛鴦睡一點芳心不自持露荷又作璚珠碎藕絲織錦香滿機裁成衣裳將遺誰只愁賤妾夢魂短不恨蕩子歸來遲花間鶗鴂依芳草等間緑遍邯鄲道還應憶念蕩舟人滿架芙蓉鏡中老吾丘衍古採蓮濕風吹花生冷香馮夷為舞冰絲裳霏霏粉金飄晚塘浮蘭舟鼓桂楫歌采蓮為君發遲遲歸來弄明月明王彛徐兩山寄蓮花秋風吹皺銀塘水小雨芙蓉不勝洗誰揀新船折得來不怕緑芒傷玉指煙絲有恨自悠揚相惹相牽短復長雙頭並作幽修語一夜露痕黃粉香我有銀瓶秋水滿君心不似蓮心短緑房結子為君收種向明年應未晚原任思庵荷花翠蓋佳人臨水立寂寞雨中相對泣溫泉洗出玉肌寒檀粉不施香汗濕一陳風來碧浪翻珍珠零落難收拾五言律詩御製初秋幸西苑觀荷命小船採蓮命駕臨西苑初秋向晚天芰荷池沼滿鷗鷺夕陽邊頻使移輕舫時來獻採蓮離宮闌檻外風動碧翩翩增唐李嶠詠荷新溜滿澄陂圎荷影若規風來香氣逺日落蓋隂移魚戲排緗葉龜浮見緑池魏朝難接採楚服但同披李商隱荷花都無色可並不奈此香何瑶席乘涼設金羇落晚過回衾燈照綺渡襪水沾羅預想前秋别離居夢棹歌溫庭筠芙蓉刺莖淡蕩緑花片參差紅吳歌秋水冷湘廟夜雲空濃艷香露裏美人清鏡中南樓未歸客一夕練塘東李羣玉新荷田田八九葉散點緑池初嫩碧才平水圎隂已蔽魚浮萍遮不合弱荇繞猶踈半在春波底芳心卷未舒晚蓮露冷芳意盡稀疏空碧荷殘香隨暮雨枯蕊墮寒波楚客罷竒服吳姬停棹歌涉江無可寄幽恨竟如何韓偓荷花鈿扇相欹緑香囊獨立紅浸淫因重露狂暴是秋風逸調無人唱秋塘每夜空何由見周昉移入畫屏中王貞白宮池産瑞蓮雨露及萬物嘉祥有瑞蓮香飄雞樹近榮占鳯池先聖日臨雙麗恩波照並妍願同指佞草生向帝堯前原宋豐稷荷花桃杏二三月此花泥滓中人心正畏暑水面獨搖風淨剎如金涌嘉賔照幕紅誰歌采菱曲舟在晚霞東增朱子奉酬圭父白蓮之作忽傳夔府句并送逺公蓮翠蓋臨風迥冰花浥露鮮舞衣清縞袂倒景爛珠躔想像芙蓉闕冥冥絶世緣嶽珂荷花盛開以病旬餘不至亭上偶成病襟慵策杖天鏡恰開奩青蓋迷前浦紅妝間曲櫩藻窺知鷺下萍破識魚潛會看吳公陳官蛙奏曉嚴林景熙荷錢盈盈新疉碧難借栁條穿鑄景菰蒲外買鄰鷗鷺邉炎官初掌柄水國不書年漸長薰風價折筒供酒船元劉永之詠荷葉圎緘初出水規蓋已迎風色迷青鳥度蔭密戲魚通裁衣偏覺爽酌酒乍如空向曉珠搖蕩時瀉玉盤中眀髙啓荷葉楚服新裁得吳筒舊製成圎應間荇菜密欲翳蓮莖聲中亂雨至陰下一魚行桂棹還思折江南日暮情新荷如蓋復如鈿初生雨後天葉低浮水上莖弱裊風前乍覆逰魚戲難藏宿鷺眠佳人休便折留蔭採蓮船楊基荷葉圎的破蓬包孤莖上藕梢雨撑栖鷺屋風捲蔭龜巢溪友裁巾幘墟人作飯包小娃曽已折新月裏湖坳陳憲章盆池栽蓮至秋始花栽種已後時花發秋將遲雖無女伴采亦有山蜂知葉稀因地力香逺是天資安得三閭手臨軒賦楚詞秋露開炎萼非時不遣誇盆中玉井水溪上舂陵家酒醒涼風發詩成缺月斜願為若耶叟種水作生涯原張祥鳶蓮花日氣沉山紫荷花照水眀香含風細細影浸月盈盈妃子華清浴神君洛浦行向人嬌欲語解語恐傾城申時行蓮花碧沼渟寒玉紅蕖映緑波妝凝朝日麗香逐晚風多遊戲金鱗出驚飛翠羽過納涼依水榭還續採蓮歌增薛蕙陳真人館中賞荷花作别館瀛洲麗新花菡蓞杳紅衣迷日色翠蓋寫波光雨過金塘濕風生石檻涼客來修竹下回首見瀟湘原馮琦秋蓮坐對芙蓉沼行歌棠棣吟相依香漠漠獨立影沉沉人自憐芳艷誰當識苦心秋風漸蕭索結子已如今七言律詩御製千葉蓮池夜聞雨滴之聲田田荷蓋雨聲齊樓蕊繽紛向晚迷樹葉不愁點翠幄秧針豈憶灌青畦密林有意通宵響茂草無知遍地萋偶爾喜吟今嵗好漫將詩句入新題千葉蓮禁苑初秋玉殿涼緑荷經瀨遞清商千英水面重重艷幾度風前柄柄香宮女移船搖紺葉近臣載筆詠紅芳定心坐對西山靜不管穠纎映夕陽原唐李紳重臺蓮緑荷舒卷涼風曉紅萼開縈紫菂重雙女漢臯爭笑臉二妃湘浦並愁容自含秋露貞姿潔不曉春妖艷態穠終恐玉京仙子識却持歸種碧池中增白居易題白蓮素房含露玉冠鮮紺葉搖風鈿扇圎本是吳州供進藕今為伊水寄生蓮移根到此三千里結子經今六七年不獨池中花故舊兼乘舊日採花船􅊶何闕下芙蓉一人理國致升平萬物呈祥助聖眀天上河從闕下過江南花向殿前生慶雲垂蔭開難落湛露為珠滿不傾更對樂懸張簨簴歌工欲奏採蓮聲原姚合詠南池嘉蓮芙蓉池裏葉田田一本雙花照碧泉濃淡共妍香各散東西分艷蒂相連自知政術無他異縱是禎祥亦偶然四野人聞知盡喜爭來入郭看嘉蓮增溫庭筠和太常杜少卿東都修行里有嘉蓮春秋罷注直銅龍舊宅嘉蓮照水紅兩處龜巢清露裏一時魚躍翠莖東同心表瑞荀池上半面分粧樂鏡中應為臨川多麗句故持重艷向西風吳融髙侍御話及皮博士池中白蓮因成一章寄博士兼呈侍御白玉花開緑錦池風流御史報人知看來應是雲中墮偷去須從月下移已被亂蟬催晼晚更驚涼雨動褵褷習家秋色堪圗畫只欠山公倒接㒿雍陶永樂殷堯藩明府縣池嘉蓮詠青蘋白石匝蓮塘水裏蓮開𢃄瑞光露濕紅芳雙朵重風搖緑蒂一枝長同心梔子徒誇艷合穗嘉禾豈解香不獨豐祥先有應更宜花縣對潘郎李建勳重臺蓮斜倚秋風絶比倫千英和露染難勻自為祥瑞生南國誰把丹青寄北人眀月幾宵同緑水牡丹無路出紅塵憐伊不算多時立贏得馨香暗上身劉兼蓮塘霽望新秋菡蓞發紅英向晚風飄滿郡馨萬疊水紋羅乍展一雙鸂鶒繡初成採蓮女散吳歌關拾翠人歸楚雨晴逺岸牧童吹短笛蓼花深處信牛行宋楊億賦荷花翠幄飄香映綺襦鈿盤清曉露成珠休啼為近鮫人室欲笑誰投玉女壺雲氣乍回巫峽夢水嬉猶記曲池圗金花却薦何人步枉遣凌波襪縷濡錢惟演賦荷花欲網珊瑚碧浪深橫塘斜日𢃄秋隂漢宮此地留金餅洛浦何人遺錦衾舞學西城回雅態歌傳南國有餘音韓慿恨魄如長在青骨香銷亦見尋韓琦七夕會關亭觀蓮逃暑娛賔次水西滿塘蓮艷馥軒墀荷坳似學傘飛去房曲如將盞倒垂肯把風流欺儉幕且慿歌調擬吳姬從來拙宦老難巧任過靈光醉不知榮歸堂觀蓮戲成風捲蓮香不斷頭田田荷影動清流紅苞密障魚鷹坐緑蓋低容水馬逰時折嫩梢供玉箸更裁圎葉代金甌何如滿艦傾醇酎醉向花前打拍浮王安石鍾山西菴白蓮亭山亭新破一方苔白帝留花滿四隈野艷輕眀非傅粉秋光清淺不慿材鄉窮自作幽人伴嵗晚誰為靜女媒可笑逺公池上客却因松菊賦歸來周必大次韻白蓮汀溝濁水葉田田又見新栽京府蓮玉井漫傳青壁水雪膚如在射山前泛紅入幕王家俗種白開池陸子賢不用若耶溪畔女蘭橈夜採月姢姢次韻紅白蓮間生間花不遣倚門墻獨挹芙蕖冉冉香艷質施朱窺宋玉冰姿傅粉試何郎青莖翠蓋原相映縞袂霞裾各自芳聞道金鑾行豹直炬蓮先已兆嘉祥范成大州宅堂前荷花凌波仙子靜中芳也𢃄酣紅學醉妝有意十分開曉露無情一餉斂斜陽泥根玉雪元無染風葉青蔥亦自香想得石湖花正好接天雲錦畫船涼楊萬里西府直舍盆池種蓮飛空天鏡墮莓苔玉井移蓮旋旋栽坐看一花隨手長挨開半葉出頭來稍添菱荇相縈𢃄便有龜魚數往回剩欲繞池三兩匝數聲排馬苦相催西府寒泉汲十尋深澆淺灑碧森森髙花已照紅妝鏡小莟新抽紫玉簮鈿破尚餘新雨恨繖疏才作半池隂西湖瘦得如盆大更伴詩人恐不禁嶽珂新荷出水貼水初翻紫玉團忽驚矗立傍闌干瑶池七日來青鳥玉鏡孤奩舞翠鸞曉露走盤珠顆瑩晚風揚蓋雪衣寒從今十丈開花面太華峰頭更一看金趙渢盆池荷花一泓寒碧甃波光雨後妖紅獨自芳不許纎塵汙秀質政須清吹發幽香洛神初試凌波襪妃子來從礜石湯休笑埋盆等兒戲要令引夢水雲鄉元劉因秋蓮瘦影亭亭不自容淡香杳杳欲誰通不堪翠減紅銷際更在江清月冷中擬欲青房全晚節豈知白露已秋風盛衰老眼依然在莫放扁舟酒易空蒲道源覺和尚庵賞白蓮冰雪肌膚出淤泥伶俜寒影照漣漪曉風浮冷夢初醒夜月嬋姢清更宜未要露濃垂别淚先看水滑洗凝脂陶詩近體驚兒女大笑廬山逺法師原薩都刺三益堂芙蓉斑簾十二捲輕碧秋水芙蓉隔畫欄綵扇搖風霞透影錦袍弄月酒生寒湘魂翠袖留江浦仙掌紅雲濕露盤只恐淮南霜信早綘紗籠燭夜深看增宋無觀沈氏盆開雙頭蓮花一枝傾國又傾城笑並香腮百媚生湘浦二妃窺寶鏡星宮雙女下銀泓金波影儷嬋姢巧玉露心分沆瀣清曽向鴛鴦屏上看野花空得合歡名謝宗可藕花風舞落紅衣起未休水雲鄉裏正颼颼五更清逼銀塘露六月涼生玉井秋颭浪低翻霞影亂凌波輕弄錦香浮莫教吹醒鴛鴦夢好送真人一葉舟王士熙白蓮昆吾纎刃刻芳菲玉女新拋織錦機無質易隨清露滴有情應化素雲飛青腰霜下蟾房冷皓首天邉鳥使稀最憶齊州舊逰處日斜雙槳折花歸胡天遊雙頭蓮一枝瑤柄倚風清兩面紅妝鬬日眀張孔斷魂埋玉井尹邢妖魄寄金莖雙鸞俯鏡東西照百子分房向背榮若使此花還解語好將蘭臭與誰平陳基白芙蓉帝子西