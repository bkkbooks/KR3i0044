稱王者雨筆露箋勻彩畫日爐風炭熏蘭麝天與多情絲一把誰厮惹千條萬縷縈心下又粉蘂丹青描不得金針線線功難敵誰傍暗香輕採摘風淅淅船頭觸散雙鸂鶒夜雨染成天水碧朝陽借出胭脂色欲落又開人共惜秋氣逼盤中已見新荷菂又幽鷺漫來窺品格雙魚豈解傳消息緑柄嫩香頻採摘心似織條條不斷誰牽役珠淚暗和清露滴羅衣染盡秋江色對面不言情脈脈煙水隔無人説似長相憶又楚國細腰元自瘦文君膩臉誰描就日夜鼓聲催箭漏昏復晝紅顔豈得長如舊醉折嫩房紅蘂嗅夭絲不斷清香透郤傍小欄凝望久風滿袖西池月上人歸後髙觀國祝英臺近擁紅粧翻翠蓋花影暗南浦波面澄霞蘭艇採香去有人水濺湘裙相招晚醉正月上涼生風露兩凝佇别後歌斷雲間嬌姿黯無語魂夢西風端的此心苦遙想芳臉輕顰凌波微步鎮輸與沙邉鷗鷺原朝補之新荷葉雨過回塘圎荷嫩緑新抽越女輕盈畫橈穩送蘭舟波光艷粉紅相間脈脈嬌羞菱歌隱隱漸遙依約凝眸堤上郎心波間妝影遲留不覺歸時暮天碧月如鈎風蟬噪晚餘霞映幾點沙鷗漁歌不到有人獨倚危樓增鄭斗焕新荷葉乳鴨池塘晴波漾緑鱗鱗宿藕根香夏來生意還新蚨錢小鈿花貼翠相間萍星一畨雨過一畨暗展圎青魚戲龜遊看來猶未勝情因憶年時垂釣曽約輕盈玉人何處關情是半捲芳心簾風一棹鴛鴦催起歌聲金趙可驀山溪雲房西下天共滄波逺走馬記狂逰正芙蕖平鋪鏡面浮空欄檻招我倒芳尊看花醉把花歸扶路清香滿水楓舊曲應逐歌塵散時節又新涼料開遍橫湖清淺冰姿好在莫道總無情殘月下曉風前有恨何人見原宋劉光祖洞仙歌晚風收暑小池塘荷淨獨倚胡牀酒初醒起徘徊時有香氣吹來雲藻亂葉底遊魚動影空擎承露蓋不見冰容惆悵眀妝曉鸞鏡後夜月涼時月淡花低幽夢覺欲慿誰省且應記臨流憑欄干便遙想江南紅酣千頃康與之洞仙歌若耶溪路别岸花無數欲斂嬌紅向人語與緑荷相倚恨回首西風波渺渺三十六陂煙雨新妝眀照水汀渚生香不嫁東風被誰誤遣踟蹰騷客意千里綿綿仙浪逺何處凌波微步想南浦潮生畫橈歸正月曉風清斷腸凝佇增薑夔惜紅衣枕簟邀涼琴書换日睡餘無力細灑冰泉并刀破甘碧墻頭喚酒誰問訊城南詩客岑寂髙樹晚蟬説西風消息虹梁水陌魚浪吹香紅衣半狼籍維舟試望故國渺天北可惜渚邉沙外不共美人逰厯問甚時同賦三十六陂秋色張炎紅情無邉香色記涉江自採錦亭雲密翦翦紅衣學舞波心舊曽識一見依然自語流水逺幾回空憶動倒影取次窺妝玉潤露痕濕間立翠屏側愛向人弄芳背酣斜日料應太液三十六宮土花碧清興凌風更爽正無數滿汀如昔泛片葉煙波裏卧橫紫笛周密緑蓋舞風輕玉立照新妝翠蓋亭亭凌波步秋漪真色生香明璫搖淡月舞袖斜倚耿耿芳心奈千縷晴絲縈繫恨開遲不嫁東風顰怨嬌蘂花底漫卜幽期素手採珠房粉艷初洗雨濕鉛腮碧雲深暗聚軟綃清淚訪藕尋蓮楚江逺相思誰寄棹歌回衣露滿身花氣原薑夔念奴嬌閙紅一舸記年時常與鴛鴦為侶三十六陂人未到水佩風裳無數翠葉吹涼玉容銷酒更灑菰蒲雨嫣然搖動冷香飛上詩句日暮青蓋亭亭情人不見爭忍凌波去只恐舞衣寒易落愁入西風南浦髙栁垂隂老魚吹浪留我花間住田田多少幾回沙際歸路僧仲殊念奴嬌水楓葉下乍湖光清淺涼生商素西帝宸逰羅翠蓋擁出三千宮女絳采嬌春鉛華掩晝占斷鴛鴦浦歌聲搖曵浣紗人在何處應笑桂蘂一枝廣寒宮殿冷落凄愁苦雪艷冰肌羞淡泊偷把胭脂勻注媚臉籠霞芳心泣露不肯為雲雨金波影裏為誰長恁凝佇增趙以夫憶舊逰望紅蕖影裏冉冉斜陽十里沙平喚起江湖夢向沙鷗住處細説前盟水鄉六月無暑寒玉散青冰笑老去心情也將醉眼鎮為花青亭亭步明鏡似月浸華清人在秋庭照夜銀河落想粉香濕露恩澤初承十洲縹眇何許風引綵舟行尚憶得西施餘情裊裊煙水汀呂同老水龍吟冰肌不汚天真曉來玉立瑶池裏亭亭翠蓋盈盈素靨時妝淨洗太液波翻霓裳舞罷斷魂流水甚依然舊日濃香淡粉花不似人憔悴欲喚凌波仙子泛扁舟浩波十里只愁回首冰奩半掩眀璫亂墜月影淒迷露華零落小欄誰倚共芳盟猶有雙栖雪鷺夜寒驚起張炎水龍吟仙人掌上芙蓉涓涓猶滴金盤露輕妝照水纎裳玉立飄颻似舞幾度消凝滿湖煙月一汀鷗鷺記小舟夜悄波眀香逺渾不見花開處應是浣紗人妬褪紅衣被誰輕誤間情雅淡冶姿清潤慿嬌待語隔浦相逢偶然傾蓋似傳心素怕湘臯珮解緑雲十里卷西風去李居仁水龍吟蘂仙羣擁宸逰素肌似怯波心冷霜裳縞夜冰壺凝露紅塵洗盡弄玉輕盈飛瓊綽約淡妝臨鏡更多情一片碧雲不捲籠嬌面回清影菱唱數聲乍聽載名娃藕絲縈艇雪鷗沙鷺夜來同夢曉風吹醒酒暈全消粉痕微漬色眀香瑩問此花曷貯瑶池應未許繁紅並趙汝鈉水龍吟露華洗盡凡妝玉妃來侍瑶池宴風裳水佩冰肌雪艷清涼不汗解語情多凌波步穩酒容消散想溫泉浴罷天然真態渾疑是宮妝淺暗想淒愁别岸粉痕消香腮凝腕雪空水冷此情誰許鷺知鷗見羽扇微搖翠帷低擁清涼亭院待夜深月上闌干更邀取姮娥伴周密水龍吟素鸞飛下青冥舞衣半惹涼雲碎藍田種玉緑房迎曉一奩秋意擎露盤深憶君涼夜暗傾鉛水想鴛鴦正結梨雲好夢西風冷還驚起應是飛瓊仙會倚涼飇碧簮斜墜輕妝鬬白眀璫照影紅衣羞避霽月三更粉香千點靜聞十里聽湘絃奏徹冰綃偷翦聚相思淚練恕可水龍吟素姬初宴瑶池珮環誤落雲深處分香華井洗妝湘渚天姿淡濘碧蓋吹涼玉冠迎曉盈盈笑語記當時乍識江眀夜淨只愁被嬋娟誤幾點沙邉飛鷺舊盟寒逺迷煙雨相思未盡纎羅曵水清鉛泣露玉鏡臺空銀瓶綆絶斷魂何許待今宵試採中流一葉共凌波去王易簡水龍吟翠裳微護冰肌夜深暗濕瑶臺露芳容淡濘風神蕭散凌波晚步西子殘妝環兒初起未須勻注看眀璫素襪相逢憔悴當應被薰風誤十里雲愁雪妬抱淒涼盻嬌無語當時姊妹朱顔褪酒紅衣按舞别浦重尋舊盟惟有一行鷗鷺伴玉顔月曉盈盈冷艷洗人間暑唐鈺水龍吟淡妝人更嬋娟晚奩淨洗鉛華膩泠泠月色蕭蕭風度嬌紅欲避太液池空霓裳舞倦不堪重記歎冰魂猶在翠輿難駐玉簮為誰輕墜别有凌空一葉泛清寒素波千里珠房淚濕眀璫恨逺舊逰夢裏羽扇生秋瓊樓不夜尚遺仙意奈香雲易散綃衣半脫露涼如水無名氏緑意碧圎自潔向淺洲逺浦亭亭清絶猶有遺簮不展秋心能卷幾多炎熱鴛鴦密語同傾蓋且莫與浣紗人説怨歌忽斷花風碎却翠雲千疊回首當年漢舞怕飛去漫皺留仙裙褶戀戀青衫猶染枯香還笑鬢絲飄雪盤心清露如鉛水又一夜西風聽折喜淨看匹練秋光倒瀉半湖眀月劉辰翁沁園春淺碧芙蓉素艷亭亭前身阿嬌記湘浦露冷酥容倍潔華清水滑酒暈全消瑶翦豐肌雲翻碎萼白羽鮮眀時自搖風流處是古香幽韻時度鮮飇瓊枝璧月清標對千朵嬋娟傾翠瓢况水晶臺榭低迷淨渌冰霜詞調隱約輕橈細認金房種竒朵秀已覺青襟橫素腰西風晚看花開十丈玉井非遙元張翥摸魚兒問西湖舊家兒女香魂還又連理多情欲賦雙蕖怨間却滿奩秋意嬌旖旎愛照影紅妝一樣新梳洗王孫正擬喚翠袖輕歌玉筝低按涼夜為花醉鴛鴦浦淒斷凌波夢裏空憐心苦絲脆吳娃小艇應偷採一道緑萍猶碎君試記還怕是西風吹作行雲起闌干漫倚待載酒重來尋芳已晚餘恨渺煙水别録增南史羊侃傳侃性豪侈善音律自造採蓮棹歌兩曲甚有新致原庾杲之傳庾杲之字景行王儉用為衛將軍長史安陸侯蕭緬與儉書曰盛府元僚實難其選庾景行泛渌水依芙蓉何其麗也時人以入儉府為蓮花池增周書薛憕傳魏文帝造一欹器為二荷同處一盤相去盈尺中有蓮下垂器上以水注荷則出於蓮而盈乎器為鳬鴈蟾蜍以飾之謂之水芝欹器唐書令狐綯傳綯為翰林承旨夜對禁中燭盡帝以乘輿金蓮華炬送還院西京雜記卓文君臉際常若芙蓉拾遺記洹流如沙塵足踐則陷其深難測大風吹沙如霧有石蕖青色堅而甚輕從風靡靡覆其波上一莖百葉千年一花荆州記衡山有三峰極秀一峰名芙蓉峰最為竦桀自非清霽素朝不可望見世説顔延之嘗問鮑眀逺已詩與謝康樂優劣鮑曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡亦雕繪滿眼蓮社髙賢傳釋惠安患山中無刻漏乃於水上立十二葉芙蓉因波隨轉分定晝夜以為行道之節謂之蓮花漏原搜神記王敦在武昌鈴下儀仗生蓮華五六日而落增九華山記青陽縣有九子山髙數千丈上九峰如蓮花北山録徐陵浴佛以蓮葉露清異録郭進家能作蓮花餅饀有十五隔者每隔有一折枝蓮花作十五色隋宦者劉繼銓得芙蓉鷗二十四隻以獻毛色如芙蓉原成都記唐玄宗以芙蓉花汁調香粉作御墨曰龍香劑增畫品菡蓞圗趙昌作昌善畫花設色明潤筆迹柔美有名于蜀士大夫舊云徐熙畫花傳花神趙昌畫花寫花形然比之徐熙則差劣其後鐔宏王友之輩皆弗逮也荷花生泥汙之中出于水而不著水昌此花標韻清逺能識此意爾緯略顔延之碧芙蓉頌曰澤芝芳艷擅竒水屬水屬二字全未見人用劉孝威謝藕啓曰凡厥水羞莫敢相輩水羞二字亦新續骫骳説參寥子嘗在臨平道中作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數亂汀洲東坡一見為寫而刻諸石宗婦曹夫人善丹青作臨平藕花圗人爭影寫蓋不獨寶其畫也陳輔之詩話唐人牡丹詩云紅開西子妝樓曉翠揭麻姑水殿春改春作秋全是蓮花詩老學庵筆記吳幾先嘗言參寥詩云五月臨平山下路藕花無數滿汀洲五月非荷花盛時不當云無數滿汀洲廉宣仲云此但取句美若云六月臨平山下路便不佳矣幾先云只是君記得熟故以五月為勝不然只云六月亦豈不佳哉五色線劉交居若耶溪忽聞有人採蓮喧笑聲交以溪左右無人居甚訝之乃斷栁枝蔽身視之忽見十餘女子從一華林而出皆衣青緑年十六七入叢蓮相對而歌交乃棹舟以逼之諸女皆化為龜入水致虛雜爼六月草有四日謝文君獨處無侶命沈君攸製采蓮之曲以解其悲愁之思援筆便成曰平川映晚霞蓮舟泛浪花衣香隨岸逺荷影向流斜度手牽長柄轉楫避踈花還船不畏滿歸路詎嫌賖謝贊嘆久之圗繪寶鑑于青年毗陵人嘉定間專畫荷花草蟲世號于荷馮大有自號怡齋寓居吳門専畫蓮荷精巧入格僧希白善白描荷花丹鉛雜録左傳注楚有茄人城張楫音茄曰荷古樂府鷺何食食茄下西京賦蒂倒茄于藻井披紅葩之狎獵注茄藕莖也異林𢎞治乙卯苦蕒菜開蓮花七日而謝又嵗丙辰三月敘州楠樹生蓮花五十餘朵避暑漫抄有神降于鄭絳家吟詩曰忽然湖上片雲飛不覺舟中雨濕衣折得蓮花渾忘却空將荷葉蓋頭歸林泉隨筆周子愛蓮説一篇僅百餘字形容蓮之可愛宛然如在目前蓋不必求太極於梅枝而全體呈露矣原叉小志歐公知潁州有官妓盧媚兒姿貌端秀口中常作芙蕖花香有蜀僧云此人前身為尼誦法華經二十年花史唐冀國夫人任氏女少奉釋教一日有僧持衣求浣女欣然濯之溪邉每一漂衣蓮花應手而出驚異求僧不知所在因識其處為百花潭房夀六月召客搗蓮花製碧芳酒賈似道在揚州時有道人求見問其所能曰善畫蓮秋壑館之于小金山放鶴亭索絹四幅閉門不容觀者逾五六日似道自往觀之僅畫一葉傾露珠滴滴流下滴於石上復散滴於地秋壑見精妙令了之道人辭去約再來秋壑挂於壁上每風起則荷葉動露珠傾盡已而復然道人不可復索方知神仙也升元閣梁朝故物髙二百四十尺今名瓦棺寺西晉時地産青蓮兩朵聞之所司掘得瓦棺開見一老僧花從舌根頂顱出詢及父老曰昔有僧誦法華經萬餘卷臨卒遺言以瓦棺葬之此地法華山樵夫得青蓮一枝掘地有石匣藏一童子舌根不壞花自舌出西湖志仙姥餘杭人嫁於西湖農家能釀百花酒王方平常沽飲是後羣仙時降因授藥一丸以償酒價姥服化去後十餘年有人見姥於洞庭仍賣百花酒云今杭州北山有仙姥墩王安石詩云緑漪堂前湖水緑歸來正復有荷花花前若見餘杭姥為道仙人憶酒家增黃山志雲谷禪院因營造伐木登擲鉢峰見半壁有龕牖間生石蓮花一朵以斧截斷視之色若琥珀紅光耀目原贑州府志大龍山在信豐縣南一百二十里層巒疊嶂遇夜或紅光燭天産異花如白蓮增泉州府志蓮花峰在南安縣西北其山聳峙上開八石若蓮花然台州府志芙蓉山在府城東二百里出海口望之如紅蓮始開原栽種春分前栽則花出葉上先將好壯河泥乾者少半甕築實隔以蘆席上用河泥半尺築平有雨蓋之俟泥曬微裂方種蓋藕根上行遇實始生花也次將藕壯大三節無損者順鋪在上大者一枝小者二枝頭向南芽朝上用硫黃研碎紙撚簮柄粗纒藕節一二道再用翦碎豬毛少許安在藕節再用肥河泥次第填四寸厚藕芽勿露日中灑淤泥迸裂方可少加河水先加水止可四指深候擎荷大發再加河水交夏水方可深如此種當年有花且茂盛管子曰五沃之土生蓮故栽宜壯土然不可多加壯糞反至發熱壞藕插瓶瓶注溫湯蓋以紙削尖花桿隨手急插或去根少許封以蠟或亂髮密纒折處仍以泥封固其竅先插瓶中後注水或將竹釘十字扦蘂使出白汁方插瓶如此則耐久製用常氏日録七月七日采蓮花七分八月八日采藕根八分九月九日采蓮實九分隂乾搗細煉蜜為九服之令人不老長生蓮華服之鎮心輕身駐顔附録山蓮原百丈山有草花如蓮花附録西番蓮原西番蓮花淡雅似菊之月下西施自春至秋相繼不絶亦花中佳品春間將藤壓地自生根隔年鑿斷分栽附録鐵線蓮原鐵線蓮花葉俱似西畨花心黑如鐵線附録朝日蓮增益部方物略記朝日蓮花色或黃或白葉浮水上翠厚而澤形如菱花差大開則隨日所在日入輒斂而自藏於葉下若葵藿傾太陽之比集藻贊增宋宋祁朝日蓮贊素花碧葉浮秀波面日中則向日入還斂御定佩文齋廣羣芳譜卷三十一
