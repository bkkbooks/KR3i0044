body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷三十一花譜荷花三集藻五言絶句增唐盧照鄰曲池荷浮香繞曲岸圎影覆華池常恐秋風早飄零君不知原王維臨湖亭輕舸迎上客悠悠湖上來當軒對樽酒四面芙蓉開增王維題蓮花塢日日採蓮去洲長多暮歸弄篙莫濺水畏濕紅蓮衣郭恭秋池一枝蓮秋至皆零落凌波獨吐紅托根方得所未肯即隨風原劉方平採蓮歌落日晴江裏荆歌艷楚腰採蓮從小慣十五即乘潮增韓愈荷池風雨秋池上髙荷蓋水繁未諳鳴摵摵那似卷翻翻李羣玉蓮葉根是泥中玉心承露下珠在君塘下種埋沒任春蒲朱景玄望蓮臺秋臺好登望菡蓞發清池半似紅顔醉凌波欲暮時陸龜蒙芙蓉間吟鮑昭賦更起屈平愁莫引西風動紅衣不耐秋宋楊億白蓮昨夜三更裏嫦娥墮玉簮馮夷不敢受捧出碧波心梅堯臣蓮塘不畏塘雨急鈿葉自相遮文禽忽驚去衝落波上霞蘇軾和子由岐下荷花田田抗朝陽節節卧春水平鋪亂萍葉屢動報魚子蘇轍和文與可菡蓞軒開花濁水中抱性一何潔朱檻月眀時清香為誰發原曹修古荷葉罩芙蓉圜青映嫩紅佳人南陌上翠蓋立春風增元吳師道蓮藕花葉圗玉雪竅玲瓏紛披緑映紅生生無限意只在苦心中楊維楨采蓮曲東湖採蓮葉西湖採蓮花一花與一葉持寄阿侯家鄭氏允端詠蓮本無塵土氣自在水雲鄉楚楚淨如拭亭亭生妙香眀陳憲章題茂叔蓮船入荷花內船衝荷葉開先生歸去後誰坐此船來原常倫採蓮曲棹發千花動風傳一水香傍人持並蒂含笑打鴛鴦屠隆與歡逰池上荷生滿緑池朱花似歡面素藕似歡肌增熊卓採蓮曲採蓮復採蓮盈盈水中路鴛鴦觸葉飛卸下團團露原于若瀛採蓮曲入港采芙蓉芙蓉動㴸淰遊魚聚蜂房吹作波心錦七言絶句御製日講畢同翰林張英髙士竒勵杜訥看荷千隊芙蓉太液池迎薰初散講筵時螭頭絶勝金蓮燭自有清香送曉颸夏燕新蓮紫燕雙雙到案前天教霖雨足禾田臨窗斜掠蓮花影雲與波光皆渺然七夕觀千葉蓮玉露初分水殿涼滿池紅白雜芬芳香飄隨座皆秋色細月朧朧挂未央原唐王昌齡採蓮曲荷葉羅裙一色裁芙蓉向臉兩邉開亂入池中看不見聞歌始覺有人來增陳去疾採蓮曲粉光花色葉中開荷氣衣香水上來棹響清潭見斜影雙鴛何事亦相猜白居易看採蓮小桃間上採蓮船半採紅蓮半白蓮不似江南惡風浪芙蓉池在卧牀前階下蓮葉展影翻當砌月花開香散入簾風不如種在天池上猶勝生於野水中劉商詠雙開蓮花菡蓞新花曉並開濃妝美笑面相偎西方采畫嘉陵鳥早晚雙飛池上來溫庭筠蓮花緑塘搖灔接星津軋軋蘭橈入白蘋應為洛神波上襪至今蓮蘂有香塵皮日休重臺蓮花欹紅婑媠力難任每葉頭邉半米金可得教他水妃見兩重元是一重心白蓮但恐醍醐難並潔秖應薝蔔可齊香半垂金粉知何似靜婉臨溪照額黃原陸龜蒙白蓮素花多蒙别艷欺此花真合在瑶池還應有恨無人覺月曉風清欲墮時增陸龜蒙重臺蓮花水國煙鄉足芰荷就中芳瑞此難過風情為與吳王近紅萼常教一倍多白芙蓉淡然相對却成勞月染風裁箇箇髙似説玉皇親謫墮至今猶著水霜袍原鄭谷蓮葉移舟水濺差差緑倚檻風搖柄柄香多謝浣溪人未折雨中留得蓋鴛鴦增孫光憲採蓮菡蓞香蓮十頃陂小姑貪戲採蓮遲晚來弄水船頭濕更脫紅裙裹鴨兒宋楊億荷花瑤水霓旌綺宴陳漢宮渠怨露華新誰然百炬金花燭波襪歌梁暗落塵錢惟演荷花唾露金銷月似霜雲屏玉輦剩秋光不知惟有髙唐夢翠被華鐙徹曙香丁謂荷花夢散髙唐夜正遙楚天何處不無憀秋風似會荆王意露渚煙汀養細腰原杜衍荷花鑿破蒼苔漲作池芰荷分得緑參差曉開一朵煙波上似畫真妃出浴時增杜衍紅白蓮芙蓉照水弄嬌斜白白紅紅各一家近日新花出新巧一枝能著兩般花雨中荷花翠蓋佳人臨水立檀粉不勻香汗濕一陳風來碧浪翻珍珠零落難收拾原韓琦栁溪嘲蓮清香竒色匝芳洲只得公餘一見休道是好花堪謔問幾時曽上美人頭歐陽修荷葉池面風來波灔灔陂間露下葉田田誰于水上張青蓋罩却紅妝唱採蓮增蔡襄泉州北藏院見初荷花初花才過小荷身曉露霑紅點點勻莫為愁心偏倚望清江元有未歸人原邵雍並蒂蓮漢室嬋姢雙姊妹天台縹眇兩神仙當時儘有風流過謫向人間作瑞蓮增王安石芙蕖芙蕖耐夏復宜秋一種今年便滿溝南蕩東陂無此物但隨深淺見逰鯈荷花亭亭風露擁川坻天放嬌嬈豈自知一舸超然他日事故應將爾當西施原蘇軾橫湖貪看翠蓋擁紅妝不覺湖邉一夜霜卷却天機雲錦假從教匹練寫秋光增蘇軾和文與可洋州園池菡蓞亭日日移牀趁下風清香不盡思何窮若為化作龜千嵗巢向田田萬葉中沈諫議召遊湖不赴眀日得雙蓮於北山下作一絶持獻沈既見和又别作一首因用其韻湖上棠隂手自栽問公更得幾回來水仙亦恐公歸去故遣雙蓮一夜開詔書行捧縷金箋樂府應歌相府蓮莫忘今年花發處西湖西畔北山前同景文詠蓮塘堂上鈎簾對晚香不知斜日已侵牀江妃自惜凌波襪長在髙荷扇影涼蘇轍梁山泊見荷花憶吳興南國家家漾綵􅫲芙蕖逺近日微明梁山泊裏逢花發却憶吳興十里行終日舟行花尚多清香無奈著人何更須月出波尤淨卧聽漁家蕩槳歌徐積白蓮花水一重重玉一重更無妖色媚西風雖然物外能為素又恐人間只愛紅原趙鼎臣嬌紅婭姹不勝姿只許行人半面窺恰似姑蘇眀月夜水晶宮殿貯西施增范成大荷池方池留水勝埋盆露入蓮腮沁粉痕鈴索無聲人不到小禽飛入閙荷根再賦郡沼雙蓮三絶館娃魂散碧雲沉化作雙蓮寄恨深千載不償連理願一枝空有合歡心池光欄檻倚斜暉把酒看花醉不歸但許鴛鴦相對浴休驚翡翠一雙飛兩岐秀罷已蒿萊春意還從菡蓞回不是使君和氣勝此花應向别人開陸遊荷花二首風露青冥水面涼旋移野艇受清香猶嫌翠蓋紅妝句何况人言似六郎南浦清秋露冷時凋紅片片已堪悲若教巨眼髙人看風折霜枯似更竒暑中久不把酒盆池千葉白蓮忽開一枝欣然小酌因賦絶句千葉芙蕖白玉膚一樽沆瀣碧琳腴極知俱出氛埃外我亦秋風山澤癯我讀淵眀止酒篇知渠未識玉池仙誰言見面無多子髙壓天魔萬二千原楊萬里紅白蓮紅白蓮花開共塘兩般顔色一般香恰如漢殿三千女半是濃妝半淡妝司花手法我能知説破當知未大竒亂翦素羅裝一樹略將數朵蘸胭脂增楊萬里過臨平蓮蕩人家星散水中央十里芹羮菰飯香想得薰風端午後荷花世界栁絲鄉瓶中紅白二蓮紅白蓮花共玉瓶紅蓮韻絶白蓮清空齋不是無秋暑暑被花銷斷不生揀得新開便折將忽然到晚斂花房只愁花斂香還減來早重開别是香白蓮半莟未開時看作紅蓮更不疑到得欲開渾别了玉膚洗退淡胭脂曉坐荷橋四葉青蘋照緑池千重翠蓋護紅衣蜻蜓空裏元無見只見波間仰面飛朱子次呂季克東堂愛蓮詠聞道移根玉井旁開花十丈是尋常月眀露冷無人見獨為先生引興長原劉宰水邉舟子競招招陌上車塵晚更囂只有幽人無個事荷花深處弄輕橈鄭清之一樣娉婷絶代無水宮魚貫出瓊鋪緣何買得凌波女為有荷盤萬斛珠增林景熙荷花淨根元不競芳菲萬柄亭亭出碧漪乘露醉肌渾欲洗無風清氣自相吹孔山萱草軒窗處處幽酒中不著客中愁芭蕉葉上無多雨分與池荷一半秋原江萬里結亭臨水似舟中夜雨瀟瀟亂打篷荷葉曉看元不濕却疑悮聽五更風吳菊潭吳姬一曲採蓮歌回首秋風卷碧波翠蓋不能擎雨露鴛鴦應怨夜寒多虞可齋晚來一棹鑑湖東隊隊峰巒入短蓬一色藕花三十里淡妝濃抹錦雲紅王月浦雨餘無事倚闌干媚水荷花粉未乾十萬瓊珠天不惜緑盤擎出與人看陳古澗扇颭宮羅衣浸牀湘妃晚浴試紅妝闌干月滿難成夢風露侵人徹首涼楊巽齋翠蓋紅幢耀日鮮西湖佳麗會羣仙波平十里鋪雲錦風度清香趁畫船增朱淑真新荷平波浮動洛妃鈿翠色嬌圎小更鮮蕩漾湖光三十頃未知葉底是誰蓮金趙渢荷花誰開玉鑑瀉天光占斷人間六月涼日落沙禽猶未散也知受用藕花香完顔璹池蓮輕輕姿質淡姢姢點綴圎池亦可憐數點飛來荷葉雨暮香分得小江天假克巳荷葉露仗下華清賜浴時溫泉香膩洗凝脂團花翠壁琉璃滑狼籍珠璣醉不知假成已荷葉露泉客將歸返故淵西風渺渺碧波寒主人情厚無他贈一把真珠泣翠盤元何中荷花曲沼芙蓉映竹嘉緑紅相倚擁雲霞生來不得東風力終作薰風第一花貢性之畫蓮吳王宮殿水流香步屧廊深暑氣涼長日香風吹不斷藕花多處浴鴛鴦顧瑛觀荷值雨湖山堂上看荷花亂舞紅妝萬髻丫細雨霑衣涼似水畫船五月客思家眀陳憲章茂叔愛蓮不枝不蔓體本具外直中通用乃神我即蓮花花即我如公方是愛蓮人李東陽蓮花不見峰頭十丈紅别將芳思寫江風翠翹金鈿眀鸞鏡疑是湘妃出水中原徐階盆蓮四面花開玉露滋曉風翻雨葉垂垂淵眀酒思濓溪癖慿仗盆池借一枝申時行應制題黃臺蓮二首九疑山下分竒種百子房中吐瑞姿朵朵黃雲團羽蓋為迎金母下瑤池芙蓉為𢃄菊為裳髙結重臺散異香見説君王頻問寢名花長映御袍黃于若瀛羣英的厯點蒼苔朵朵芙蓉並蒂開只恐西風易零落殿芳故寫嶺頭梅丘雲霄輕雲疏雨一時來忽見荷花並蒂開睡起南薰情思懶夢深遙過楚王臺丁眀登朝來急雨湧山泉洗出芙蓉意態妍裊裊數莖欹竹嶼美人和露入淇園馬德灃朵朵紅蓮映緑池微風吹動影參差深閨寂寞嫌長晝一點芳心只自知鄭德眀曲曲闌干水殿涼紅綃扇底芰荷香按歌誤觸鴛鴦起宮漏今宵分外長沈眀臣晚涼風度玉池香看盡歸鴉入建章妾貌不如蓮樣好莫將眀月比寒塘許成名藕花塘上雨霏霏無數蓮房著水垂羞見鴛鴦交頸卧却將荷葉蓋頭歸陶安絶艷蓮花水面浮緑雲香濕一沙鷗何時摘取池中葉駕作中流太乙舟詩散句增古詩涉江採芙蓉蘭澤多芳草采之欲遺誰所思在逺道唐上官儀密樹風煙積回塘荷芰新徐彥伯折藕絲能脆開花葉正圎張九齡荷葉生幽渚芳華信在兹原李白素手把芙蓉虛步躡太清增杜甫全紅開似鏡半緑卷如杯城晚通雲霧亭深到芰荷韓愈蜂蟬碎錦纈緑池披菡萏白居易雇人栽菡蓞買石造潺湲冷碧新秋水殘紅半破蓮元稹晚荷猶展卷早蟬遽蕭嘹錢珝晚荷人不折留取作秋香杜荀鶴年年越溪上相憶採芙蓉宋楊億急雨度前軒池荷相對翻梅堯臣嘉蓮如笑迎照水呈丹腮髙城浸湖光面面當紅蕖原劉敞交隂分擢秀並葉爛齊芳亂香清宿醉濃艷破狂愁蘇軾荷背風翻白蓮腮雨褪紅增金劉昻霄何物媚逰人微風動池荷元李孝光樹湧中流碧蓮生隔浦香唐韓愈曲江荷花蓋十里江湖生目思莫緘來鵬一夜緑荷霜翦破賺他秋雨不成珠韓偓卷荷忽被微風觸瀉下清香露一杯宋趙抃江瀆荷花開似錦且同歸去採蓮舟文彥博為愛霜瑩寬白簡得隨津閣看紅蓮秦觀斜吹疏雨濕秋江霜風暗引芙蕖香髙翥膩玉肌膚碧玉房纍纍波面襯紅妝金元好問長白山前繡江水展放荷花三十里元張翥虹影連蜷山外雨荷香淡蕩晚來風李孝光兩行雲樹忽逺近十里荷花能白紅原明丁眀登輕霜約水淡無痕竹裏芙蓉意態新魏曹植朱華冒緑池增宋謝朓紅蓮搖弱荇梁庾肩吾緑荷生綺葉周庾信初蓮開細房蓮花類洗杯蓮開長倒垂陳徐陵荷開水殿香隋薛道衡荷心宜露泫唐上官儀荷銷裛露香趙冬曦夏近未舒蓮王維紅蓮落故衣孟浩然荷風送香氣原李白荷花嬌欲語芙蓉老秋霜杜甫江