body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷三十四花譜牡丹三集藻五言排律增唐王建牡丹此花名價别開艷益皇都香逼苓菱萎紅燒躑躅枯軟光籠細脈妖色暖鮮膚滿蕊攢黃粉含稜鏤絳蘇好和薰御扆堪畫入宫圗晚態愁新婦殘妝望病夫教人知箇數留客賞斯須一夜輕風起千金買亦無同于汝錫賞白牡丹曉日花初吐春寒白未凝月光裁不得蘇合點難勝柔膩於雲葉新鮮掩鶴膺統心黃倒暈側莖紫重稜乍斂看如睡初開問欲譍並香幽蕙死比艷美人憎價數千金貴形相兩眼疼自知顔色好愁被彩光凌白居易牡丹絶代祗西子衆芳惟牡丹月中虗有桂天上漫誇蘭夜濯金波滿朝傾玊露殘性應輕菡蓞根夲是琅玕奪目霞千片凌風綺一端稍宜經宿雨偏覺耐春寒見説開元嵗初令植御欄貴妃嬌欲比侍女妒羞看巧類鴛機織光攢麝月團暫移公子第還種杏花壇豪士傾囊買貧儒假乘觀葉藏梧際鳳枝動鏡中鸞似笑賔初至如愁酒欲闌詩人忘芍藥釋子愧栴檀酷烈宜名夀姿容想姓潘素光翻鷺羽丹艷赩雞冠燕拂驚還語蜂貪困未安倘令紅臉笑兼解翠眉攢少長呈連萼驕矜寄合歡息肩移九軌無脛到千官日曜香房拆風披蕊粉乾好酬青玊案稱貯碧氷盤璧要連城與珠堪十斛判更思初甲坼那得異泥蟠騷詠應遺恨農經祗略刋魯般雕不得延夀筆將殫醉客同攀折佳人惜犯干始知來苑囿全勝在林巒泥滓常澆灑庭除又綽寬若將桃李並方覺效顰難姚合和王郎中召看牡丹葩疉萼相重燒欄復照空姸姿朝景裏醉艷晚煙中乍怪霞臨砌還疑燭出籠繞行驚地赤移坐覺衣紅殷麗開繁朵香濃發幾叢裁綃樣豈似染茜色寧同嫩畏人看損鮮愁日炙融嬋娟涵宿露爛熳抵春風縱賞襟情合間吟景思通客來歸盡懶鶯戀語無窮萬物珍那比千金買不充如今難更有縱有在仙宫薛能牡丹異色稟陶甄常疑主者偏衆芳殊不類一笑獨奢姸顆拆羞含嫩叢虛隱陷圎亞心堆勝被美色艷于蓮品格如寒食精光似少年種堪收子子價合易賢賢迥秀應無妒竒香稱有仙深隂冝映幕富貴助開筵蜀水爭能染巫山未可憐數難忘次第立困戀傍邉逐日愁風雨和星祝夜天且從留盡賞離此便歸田萬朵照初筵狂遊憶少年曉光如曲水顔色似西川白向庚􅉝受朱從造化研衆開成伴侣相笑極神仙見焰寧勞火聞香不帶煙自髙輕月桂非偶賤池蓮影接雕盤動叢遭惡草偏招歡憂事阻就卧覺情牽四面冝綈錦當頭稱管絃泊來鶯定憶紛擾蝶何顛蘇息承朝露滋榮仰霽天壓闌多盡好敵國貴宜然未落須迷醉因兹任病纒人誰知極物空負感麟篇宋王禹稱牡丹艷絶百花慙花中合面南賦詩情莫倦中酒病先甘國色渾無對天香亦不堪遮須施錦帳戴好上瑶簮苞拆深擎露枝拖翠出藍半傾留粉蝶微亞摘宜男鄰妓臨妝妒胡蜂得蕊貪忽行晴吹動濃睡曉煙含話别年經一相逢月又三遣誰撏白髮為爾換新衫池館邀賔看衙庭放吏參仙娥喧道院魔女逼禪庵亂拆窠難惜分題韻更探歌歡殊未厭零落痛曾諳榖雨供湯沐黃鸝助笑談顔生如見此未免也醺酣蘇軾謝郡人田賀二生獻花城裏田員外城西賀秀才不愁家四壁自有錦千堆珍重尤竒品艱難最後開芳心困落日薄艷戰輕雷老守仍多病壯懷先已灰殷勤此粲者攀折為誰哉玊腕揎紅袖金樽瀉白醅何當鑷霜鬢強插滿頭回元貢奎賦牡丹曲檻春如錦晴開曉日姸樹搖風影亂枝滴露光圎玊珮停湘女金盤拱漢仙翠填宫鬢巧黃染御袍鮮力費青工造名隨綺語傳細翎層擁鶴弱翅獨迎蟬倚竹成雙立留華任衆先久看心已倦欲折意還憐洛譜今存幾吳園路憶千可應頻載酒相與醉華年五言絶句原唐王維紅牡丹緑艷間且淨紅衣淺復深花心愁欲斷春色豈知心劉禹錫唐郎中宅與諸公飲酒看牡丹今日花前飲甘心醉數杯但愁花有語不為老人開增劉禹錫渾侍中宅牡丹徑尺千餘朵人間有此花今朝見顔色更不問諸家元稹牡丹二首簇蕊風頻壞裁紅雨更新眼看吹落地便别一年春繁緑隂全合衰紅展漸難風光一擡舉猶得暫時看司空圗牡丹得地牡丹盛曉添龍麝香主人猶自惜錦幕護春霜原無名氏傾國姿容别多開富貴家臨軒一賞後輕薄萬千花增蘇軾三萼牡丹風雨何年别留真向此邦至今遺恨在巧過不成雙和子由岐下牡丹花好常患稀花多信佳否未有四十枝枝枝大如斗范成大題張希賢紙夲牡丹洛花紅肉姿蜀筆丹砂染生綃多俗格紙夲有真艷楊萬里牡丹排日上牙牌記花先後開看花不仔細過了却重回六言絶句御製憶暢春園牡丹曉雨疏疏薄灑午風習習輕吹忽念暢春花事正當萬朵開時增宋范成大單葉御衣黃舟前鵝羽映酒塞上駝酥截肪春工若與多葉應入姚家鴈行水晶毬縹眇醉魂夢物嬌嬈輕素輕紅若非風細日薄直恐雲消雪融夀安紅豐肌弱骨自喜醉暈妝光總宜獨立風前雨裏嫣然不要人持疉羅紅襞積翦裁千疉深藏愛惜孤芳若要韶華展盡東風細細商量崇寧紅勻染十分艷絶當年欲占春風曉起妝光沁粉晚來醉面潮紅鞓紅猩唇鶴頂太赤榴萼梅腮弄黃帶眼一般官樣祗愁瘦損東陽紫中貴沉沉色與露滳泥泥香隨日烘滿眼艷妝紅袖紫綃終是仙風七言絶句御製暢春園衆花盛開最為可觀惟緑牡丹清雅迥常世所罕有賦七言絶以記之碧蕊青霞壓衆芳檀心逐朵韞真香花殘又是一年事莫遣春光放日長原唐李益牡丹紫蕊叢開未到家却教遊客賞繁華始知年少求名處滿眼空中别有花增陳標僧院牡丹琉璃地上開紅艷碧落天頭散晚霞應是向西無地種不然爭肯重蓮花令狐楚赴東都别牡丹十年不見小庭花紫萼臨開又别家上馬出門回首望何時更得到京華原劉禹錫和令狐相公别牡丹平章宅裏一欄花臨到開時不在家莫道兩京非逺别春眀門外即天涯增劉禹錫賞牡丹二首庭前芍藥妖無格池上芙蕖淨少情惟有牡丹真國色花開時節動京城偶然相遇人間世合在層臺阿姥家有此傾城好顔色天教晚發賽諸花原白居易白牡丹白花冷淡無人愛亦占芳名道牡丹應似東宫白贊善被人還喚作朝官增白居易看惲家牡丹戲贈李二十香勝燒蘭紅勝霞城中最數令公家人人散後君須看歸到江南無此花移牡丹栽金錢買得牡丹栽何處辭叢别主來紅芳堪惜還堪恨百處移將百處開惜牡丹花二首惆悵階前紅牡丹晚來惟有兩枝殘明朝風起應吹盡夜惜衰紅把火看寂寞萎紅低向雨離披破艷散隨風晴明落地猶惆悵何况飄零泥土中微之宅殘牡丹殘紅零落無人賞雨打風摧花不全諸處見時猶悵望况當元九小庭前原元稹西明寺牡丹花向琉璃地上生光風炫轉紫雲英自從天女盤中見直至今朝眼更明增元稹酬胡三憑人問牡丹竊見胡三問牡丹為言依舊滿西欄花時何處偏相憶寥落衰紅雨後看贈李十二牡丹花片因以餞行鶯澀餘聲絮墮風牡丹花盡葉成叢可憐顔色經年别收取朱欄一片紅徐凝牡丹何人不愛牡丹花占斷城中好物華疑是洛川神女作千嬌萬態破朝霞張祜杭州開元寺牡丹花穠艷初開小藥欄人人惆悵出長安風流却是錢塘寺不踏紅塵見牡丹周賁題牡丹萬葉紅綃翦盡春丹青任寫不如真風光九十無多日難惜樽前折贈人假成式牛尊師宅看牡丹洞裏仙春日更長翠叢風翦紫霞芳若為蕭史通家客情願扛壺入醉鄉溫庭筠夜看牡丹髙低深淺一欄紅把火殷勤繞露叢希逸近來成懶病不能容易向春風周繇看牡丹贈假柯古金蕊霞英疉彩香初疑少女出蘭房逡巡又是一年别寄語集仙呼索郎唐彥謙牡丹青帝于君事分偏穠堆浮艷倚朱門雖然占得笙歌地將甚酬他雨露恩吳融和僧詠牡丹萬緣消盡夲無心何事看花恨却深都是支郎足情調墮香殘蕊亦成吟韋莊白牡丹閨中莫妒新妝婦陌上須慚傅粉郎昨夜月明渾似水入門惟覺一庭香宋王禹稱山僧送牡丹數枝香帶雨霏霏雨裏携來叩竹扉擬戴却休成惆望御園曽插滿頭歸原韓琦詠錦被堆不管鶯聲向曉催錦衾春晚尚成堆香紅若解知人意睡取東君不放回增石延年牡丹春風晴晝起浮光玊作氷膚羅作裳獨步世無吳苑艷渾身天與漢宫香西園春色才桃李綘已成圍雪作團更欲開花比京洛故將姚魏接山丹原歐陽修白牡丹蟾精雪魄孕雲荄春入香腴一夜開宿露枝頭藏玊塊暖風庭面倒銀杯增蔡襄李閣使新種洛花堂下朱欄小魏紅一枝穠艷占春風新聞洛下傳佳種未必開時勝舊叢司馬光雨中聞姚黃開呈子駿堯夫小雨留春春未歸好花雖有恐行稀勸君披取漁蓑去走看姚黃拚濕衣王圭宫詞洛陽新進牡丹叢種在蓬萊第幾峰壓曉看花傳駕入露苞先拆御袍紅沈遼奉陪頴叔賦鎖院牡丹昔年曽到洛城中玊碗金盤深淺紅行上荆溪溪畔寺愧將白髮對東風原邵雍謝君實端明惠牡丹霜臺何處得竒葩分送天津小隱家初訝山妻忽驚走尋常只慣插葵花蘇軾雨中賞牡丹霏霏雨露作清姸爍爍明燈照欲然明日春隂花未老故應未忍著酥煎堂後白牡丹城西千葉豈不好笑舞春風醉臉丹何似後堂氷玊潔遊蜂非意不相干和述古冬日牡丹一朵妖紅翠欲流春光回照雪霜羞化工只欲呈新巧不放間花得少休花開時節雨連風却向霜餘染爛紅滿地春光私一物此心未信出天工當時只道鶴林仙能遣春光發杜鵑誰信詩能回造化直教霜枿發春姸不分清霜入小園故將詩律變寒暄使君欲見藍關詠更倩韓郎為染根增蘇軾吉祥寺花將落而陳述古期不至今嵗東風巧翦裁含情只待使君來對花無語花應恨直恐明年花不開述古聞之明日即來坐上復用前韻仙衣不用翦刀裁國色初含卯酒來太守問花花有語為君零落為君開春光冉冉歸何處更向樽前把一杯盡日問花花不語為誰零落為誰開遊太平寺淨土院看牡丹中有淡黃一朵特竒醉中眼纈自斕斑天雨曼陀照玊盤一朵官黃微拂掠鞓紅魏紫不須看小檻徘徊日自斜只愁春盡委泥沙丹青欲寫傾城色世上今無楊子華常州太平寺觀牡丹武林千葉照觀空别後湖山幾信風自笑眼花紅緑眩還將白首看鞓紅黃庭堅效王仲玊少監詠姚花用其韻映日低風整復斜緑玊眉心黃袖遮大梁城裏雖罕見心知不是牛家花九嶷山中緑萼華黃雲承襪到羊家真詮蟲蝕詩句斷猶託餘情開此花仙衣襞積駕黃鵠草木無光一笑開人間風日不可耐故待成隂葉下來湯沐氷肌照春色海牛押簾風不開直言紅塵無路入猶傍蜂鬚蝶翅來原張耒移宛丘牡丹植圭竇齋前千里相逢如故人故栽庭下要相親明年一笑東風裏山杏江桃不當春增張商英落日賔朋醉帽斜笙歌一曲上雲車頗知春色隨軒去不見東庵滿眼花范成大戲題牡丹主人細意惜芳春寶帳籠階護紫雲風日等間猶不到外間蜂蝶莫紛紛蜀花以狀元紅為第一金陵東御園紫繡毬為最西樓第一紅多葉東苑無雙紫壓枝夢裏東風忙裏過蒲團藥鼎鬢成絲題徐熙風牡丹蕊珠仙馭曉驂鸞道服朝元露未乾天半罡風如激箭緑綃飄蕩紫綃寒寒入仙裙粟玊肌舞餘全不耐風吹從教旅拒春無力細看腰肢嫋嫋時簡畢叔滋覓牡丹冷落韶光榖雨寒一年辜負倚闌干欲知春色偏濃處須向香風徑裏看再賦簡養正南北梅枝噤雪寒玊梨皴雨淚闌干一年春色催殘盡更覓姚黃魏紫看楊萬里和彭仲莊對牡丹上酒病身無伴卧空山石友相從慰眼寒呼酒撚花談舊事牡丹正似夢中看催看黃氏南園牡丹愁雨留花花已闌作晴猶喜兩朝寒山城春事無多子可緩黃園看牡丹方嶽次韻牡丹嬌紅深倚翠雲團髣佛三生吳彩鸞詩眼頓驚春富貴