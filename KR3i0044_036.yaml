衣猶濕國色朝酣酒未蘓嬌欲語巧相扶不妨老幹自扶踈恰如翠幙髙堂上來㸔紅衫百子圗增李廷忠鷓鴣天洛浦風光爛漫時千金開晏醉為期花方著雨猶含笑蝶不禁寒總是癡檀暈吐玉華滋不隨桃李競春菲東君自有回天力㸔把花枝帶月歸原張掄臨江仙玊宇暖浮清禁曉丹葩色照晴空珊瑚敲碎玊玲瓏人間無此種來自廣寒宫雕玊䦨干深院静嫣然頻笑東風曲屏湏占一枝紅且圗欹醉枕香到夢魂中王采蝶戀花燕子來時春未老紅蠟團枝費盡東君巧煙雨弄晴芳意惱雨餘特地殘妝好斜倚青樓臨逺道不管傍人宻共東君笑都見嬌多情不少丹青傳得傾城貌增毛滂蝶戀花三疉闌干鋪碧甃小雨新晴纔過清明候初見花王披衮繡嬌雲瑞日明春晝彩女朝真天質秀寳髻微偏風卷霞衣皺莫道東君情最厚韶華半在東堂手曽覿定風波上苑穠芳初雨晴香風嫋嫋泛軒楹猶記洛陽開小晏嬌面粉光依約認傾城流落江南重此㑹相對金蕉蘸甲十分傾怕見人間春更好問道如今老去尚多情方岳江神子窓綃深掩䕶芳塵翠眉顰越精神㡬雨㡬晴做得這些春切莫近前輕著語題品錯怕花嗔碧壺難貯玉粼粼碎苔殷晩風頻吹得酒痕如洗一畨新只恨謫仙渾懶事辜負却倚欄人楊纉八六子怨殘紅夜來無頼雨催春去匆匆但暗水新流芳恨蝶淒蜂慘千林嫩緑迷空那知國色還逢柔弱華清扶倦輕盈洛浦臨風細認得凝妝㸃脂匀粉露蟬聳翠蕊金團玊成叢㡬許愁隨笑解一聲歌轉春融眼䑃朧憑欄半醒醉中吴文英漢宫春花姥來時帶天香國艶羞掩名姝日長半嬌半困宿酒微蘇沉香檻北比人間風異煙殊春恨重盤雲隊髻碧花畨吐瓊盂洛苑舊移仙譜向吴姝深館曽奉清娱猩唇露紅未洗客髩霜鋪蘭詞沁壁過西園重載雙壺休漫道花扶人醉醉花却要人扶晁補之夜合花百紫千紅占春多少共推絶世花王西都萬家俱好不為姚黄漫膓斷巫陽對沉香亭北新妝記清平調詞成進了一夢仙鄉天葩秀出無雙倚朝暉半如酣酒成狂無言自有檀心一㸃偷芳念徃事情傷又新艶曽說滁陽縦歸來晩君王醒後别是風光王沂孫水龍吟曉寒慵掲珠簾牡丹院落花開未玊䦨干畔栁絲一把和風半倚國色微酣天香乍染扶春不起自眞妃舞罷謫仙賦後繁華夢如流水池館家家芳事記當時買栽無地争如一朶幽人獨對水邉竹際把酒花前剰拚醉了醒來還醉怕洛中春色匆匆又入杜鵑聲裏紫姑瑞鶴仙覩嬌紅細捻是西子當日留心千葉西都競栽接好園林臺榭何妨日渉輕羅慢褶費多少陽和調爕向曉來露浥芳苞一㸃醉紅潮頬雙靨姚黄國艶魏紫天香倚風羞怯雲鬟試插都引動狂蜂蝶况東君開宴賞心樂事莫惜獻酬頻疊㸔相将紅藥翻階尚餘媵妾趙以夫大酺正綠隂濃鶯聲嬾庭院寒輕煙薄天然花富貴逞妖紅殷紫疉葩重萼醉艶酣春姸姿挹露翠羽輕明如削檀心鵞黄嫩似離情愁緒萬絲交錯更銀燭交輝玊瓶微浸宛然京洛朝來風雨惡怕僝僽低張青油幕便好倩佳人插㡌貴客傳箋趁良辰賞心行樂四美難并也湏拚醉莫辭盃酌被花惱情無著長笛何䖏一笑江頭髙閣極目水雲漠漠原劉克荘六州歌頭維摩病起兀坐䒭枯株清晨裏誰來問是文殊遣名姝奪盡羣花色浴纔出酲初觧千萬態嬌無力困相扶絶代佳人不入金張室却訪吾廬對茶鐺禪榻笑殺此翁癯瑶砌金壺始消渠憶昇平日繁華事修成譜寫成圗竒絶甚歐公記蔡公書古來無一自京華隔問姚魏竟何如多應是彩雲散刼灰餘野鹿銜将花去休回首河洛丘墟漫傷春吊古夢繞漢唐都歌罷欷歔别錄增雲仙雜記宋旻語常帶華藻李儒安曰時方三月坐間生無數牡丹花矣清異錄吴越有一種玲瓏牡丹鮓以魚葉鬭成牡丹状既熟出盎中微紅如初開牡丹畫史徐熙風牡丹圗葉㡬千餘片花只三朶一在正面一在右一在衆枝亂葉之背墨客揮犀歐公甞得一古畫牡丹叢其下有一猫永叔未知其精妙丞相正肅吴公與歐公家相近一見曰此正午牡丹叢何以明之其花敷姸而色燥此日中時花猫眼黑睛如線此正午猫眼也有帶露花則房斂而色澤猫眼早暮則睛圎正千則如一線耳此亦善求古人之意也漁隠叢話裴璘白牡丹詩時稱絶唱以余觀之語句凡近不若胡武平咏白牡丹詩云璧堂月冷難成寐翠幄風多不耐寒其語意清逺過裴璘逺矣如皮日休咏白蓮詩云無情有恨何人見月冷風清欲墮時若移作白牡丹詩有何不可覺更清切耳升庵詞品朝天紫夲蜀牡丹花名其色正紫如金紫大夫之服色故名後人以為曲名今以紫作子非也花木考花石在慈和縣武口寨石上有花如堆心牡丹枝葉繚繞雖精於畫者不能及或以物擊碎其花拂拭復見重疊非一花史唐末劉訓者京師富人京師春遊以牡丹為勝賞訓邀客賞花乃繫水牛累百於門人指曰此劉家黒牡丹也原移植移牡丹宜秋分後如天氣尚熱或遇隂雨九月亦可湏全根寛掘以漸至近勿損細根将宿土洗浄再用酒洗每窠用熟糞土一斗白蘞末一斤拌勻再下小麥數十粒于窠底然後植于窠中以細土覆滿将牡丹提與地平使其根直易生土湏與幹上舊痕平不可太低太髙勿築實勿腳踏隨以河水或雨水澆之窠滿即止待土微乾略添細土覆葢過三四日冄澆封培根土冝成小堆以手拍實免風入吹壊花根每夲約離三尺使葉相接而枝不相擦風通氣透而日色不入乃佳不可太宻防枝相磨致損花芽不可太稀恐日曬土熱致傷嫩根小雪前後用草薦遮障勿使透風若欲逺移将根用水洗净取紅淤土羅細末趁濕勻粘花根隨用軟棉花自細根尖纒至老根冄用麻紕纒定以水灑之枝上紅芽用香油紙或礬綿紙包扎籠住不得損動即萬里可致也或曰中秋為牡丹生日移栽必旺分花揀長成大顆茂盛者一叢七八枝或十數枝持作一把摔去土細視有根者劈開或一二枝或三四枝作一窠用輕粉加硫黄少許碾為末加黄土成泥将根上劈破䖏擦勻方置窠内栽如前法種花六月中㸔枝間角微開露見黑子收置向風處曬一日以濕土拌収瓦器中至秋分前後三五日擇善地調畦土要極細畦中滿澆水候乾以水試子擇其沉者用細土拌白蘞末種之隔五寸一枚下子畢上加細土一寸冬時葢以落葉來春二月内用水澆常令潤濕三月生苗最宜愛䕶六月中以箔遮日勿致曬損夜則露之至次年八月移栽若待角乾收子出者甚少即出亦不旺以子乾而津脉少耳接花花不接不佳接花湏秋社後重陽前過此不宜将單葉花夲如指大者離地二三寸許斜削一半取千葉牡丹新嫩旺條亦用利刀斜削一半上留二三眼貼于小牡丹削䖏合如一株麻紕𦂳扎泥封嚴宻兩瓦合之壅以軟土罩以蒻葉勿令見風日向南留一小戶以達氣至來春驚蟄後去瓦土隨以草薦圍之仍樹棘數枝以禦霜茂者當年有花是謂貼接或将小牡丹新苗旺盛者離地二三寸用利刀截斷以尖刀劐一小口取上品牡丹枝上有一二芽者截二三寸長一叚兩邉斜削插于劐䖏比量􅝉合麻紕扎𦂳細濕土壅髙一尺瓦盆葢頂待二七開視茂者其芽紅白鮮麗長及一寸此極旺者若未發再培之三七開㸔活者即發否則腐斃活者仍用土培盆合至春分去土恐有烈風仍用盆葢時常檢㸃至三月中方放開全見風日又恐茂者長髙被風吹折仍以草罩罩之接頭枝如及時截取者藏新簍潤土十餘日行數百里亦可接活立春若是子日茄根上接之不出一月花即爛熳二三月間取芍藥根大如蘿蔔者削尖如馬耳将牡丹枝劈開如燕尾插下縛𦂳以肥泥培之即活當年有花一二年牡丹生根割去芍藥根成眞牡丹矣又椿樹接者髙丈餘可於樓上賞玩唐人所謂樓子牡丹也牡丹一接便活者逐年有花若初接不活削去再接只當年有花王敬美云牡丹夲出中州江隂人能以芍藥根接之今遂繁滋百種幻出余澹圃中絶盛遂冠一州其中如綠蝴蝶大紅獅頭舞青猊尺素最難得開南都牡丹讓江隂獨西𤓰瓤為絶品余亦致之矣後當于中州購得黄樓子一生便無餘憾人言牡丹性瘦不喜糞又言夏時冝頻澆水亦殊不然余圃中亦用糞乃佳又中州土燥故宜澆水吾地濕安可頻澆大都此物宜於沙土耳南都人言分牡丹種時湏直其根屈之則死深其坑以竹虚插培土後㧞去之此種法宜知澆花尋常澆灌或日未出或夜既静最要有常正月一次湏天氣和暖如凍未解切不可澆二月三次三月五次四月花開不必澆澆則花開不齊如有雨任之亦不宜聚水于根旁花卸後宜養花一日一次十餘日後暫止視該澆方澆六月暑中忌澆恐損其根鬚來春花不茂雖旱亦不澆七月後七八日一澆八月翦枯枝並葉上炕土五六日一澆九月三五日一澆澆頻恐發秋葉來春不茂如天氣寒則澆更宜稀此時枝上橐芽漸出可見澆灌之功也十月十一月一次或二次湏天氣和暖日上時方澆適可即止勿傷水或以宰猪湯連餘垢候冷透澆一二次則肥壯宜花十二月地凍不可澆春間開凍時去炕土澆時緩緩為妙不可濕其榦雨水河水為上甜水次之醎水不宜最忌犬糞養花凡打搯牡丹在花缷後五月間止留當頂一芽傍枝餘朶摘去則花大欲存二枝留二紅芽存三枝留三紅芽其餘盡用竹鍼挑去芽上二層葉枝為花棚芽下䕶枝名花牀養命䕶胎尤宜愛惜花自有紅芽至開時正十箇月故曰花胎培養正在八九月時隔二年一次取角屑硫黄碾如麵拌細土粉挑動花根壅入土一寸外用土培約髙二三寸地氣既暖入春漸有花蕾多則懼分其脉俟如彈子大時捻之不實者摘去止留中心大者二三朶氣聚則花肥開時甚大色亦鮮艶開時必用髙幕遮日則耐乆花纔落便翦其蒂恐結子則奪來春之氣翦勿太長恐損花芽伏中仍要遮䕶花芽勿令曬損候日不甚炎方撤去八月望後翦去葉留梗寸許存其津脉不上溢以養槖芽其花棚花牀愼不可翦九月初培以細土使下另生芽冬至北面竪草薦以障風寒冬至日研鍾乳粉和硫黄少許置根下土中不茂者亦茂每掐一枝湏用泥封紙固否則乆必成孔蜂入水灌連身皆枯愼之衛花牡丹根甜多引蟲食栽時置白蘞末于根下蟲不敢近花開漸小由蠧蟲害之尋其穴鍼以硫黄末其旁枝葉有小孔乃蟲所藏䖏或鍼入硫黄或以百部塞之則蟲死而花復盛又有一種小蜂能蛀枝梗秋冬即藏枝梗中又有紅色蠧蟲能蛀木心尋其穴塡硫黄末或杉木釘釘之花生白蟻以真麻油從有孔䖏澆之則蟻死而花愈茂又法于秋冬葉落時㸔有穴枯枝拆開捉盡其蟲亦妙又五月五日用好眀雄黄研細水調每根下澆一小鍾不生蟲桂及烏賊魚骨刺入花梗必死又最忌麝香桐油生漆一著其氣味即時萎落汴中種花者園旁種辟麝數株枝葉類冬青花時辟麝正發新葉氣味臭辣能辟麝凡花為麝傷焚艾及雄黄末上風薰之能解其毒忌用熱手摩撫揺撼忌栽木斛不耐乆花旁勿令長草奪土脉不可踏實地氣不升初開時勿令穢人僧尼及有體氣者採折使花不茂變花周日用曰愚聞熟地栯生菜蘭持硫黄末篩于其上盆覆之即時可待用以變白牡丹為五色皆以沃其根紫草汁則變紫紅花汁則變紅又根下放白术末諸般顔色皆變腰金又白花初開用筆蘸白礬水描過待乾以螣黄和粉調淡黄色描之即成黄牡丹恐為雨濕再描清礬水一次翦花花宜就觀不可輕翦欲翦亦湏短其枝庶不傷榦又湏急翦庶不傷根既翦旋以蠟封其枝翦下花先燒斷䖏亦以蠟封其蒂置瓶中可供數日玩或養以蜂蜜芍藥亦然如已萎者翦去下截爛處用竹架之水缸中盡浸枝梗一夕復鮮若欲寄逺蠟封後每朶裹以菜葉安竹籠中勿致揺動馬上急逓可致數百里煎花牡丹花煎法與玊蘭同可食可蜜浸附錄魚兒牡丹集藻七言律詩增宋周必大詠魚兒牡丹并序魚兒牡丹得之湘中花紅而蕊白状類雙魚纍纍相比枝不勝壓而下垂若俯首然鼻目良可辨葉與牡丹無異亦以二月開因是得名其榦則芍藥也余命曰花嬪而賦是詩聞江東山谷間甚多天教姚魏主芳菲合有宫嬪次列妃玊頸圎瑳冝粉面霞裙深染學翬衣枝頭窈窕魚雙貫風裏蹁躚鳳對飛莫把根苗方芍藥留春不似送将歸太守趙山甫示和篇次韻為謝阿嬌金屋聚芳菲當御連環聚妾妃龍女墜天頩素頬鮫人出水織纁衣袖垂户外瞻雙引燕在宫中苐一飛不用蟲魚箋爾雅使君行合左符歸李子權時中坐上示及和花妃詩即席次韻姚皇去後㡬菲菲湘水依然從二妃雙淚一時紅作鬛連枝千載綠為衣檻前斑竹應同伴波面文鴛欲共飛吟徧世間閑草木何如江月咏沂歸楊廷秀秘監萬花川谷中洛花甚冨乃用野人韻為魚兒牡丹賦詩光榮多矣悪語敘謝萬花川谷第春菲也許湘靈媵伏妃翠葉迎風牽荇帶紅綃浴日濕宫衣共船不姤龍陽釣警乗猶疑洛渚飛誰把荒園一魚目換将五十六珠歸附錄纒枝牡丹增本草纒枝牡丹一名旋葍一名筋根其根似筋一名續筋根言其根主續筋一名㹠腸草象其形也一名美草一名天斂草一名鼓子花其花不作瓣状如軍中所吹鼓子保昇云所在川澤皆有蔓生葉似薯蕷而狹長花紅色根無毛節李時珍曰秋開花如白牽牛花粉紅色亦有千葉者色似粉紅牡丹原花木譜柔枝倚附而生花有牡丹態度甚小纒縛小屏花開爛然亦有雅趣花史芒種時開芽萌長出方可分種附錄秋牡丹原秋牡丹草夲徧地蔓延葉似牡丹差小花似菊之紫鶴翎黄心秋色寂寥花間植數枝足壯秋容分種易活肥土為佳御定佩文齋廣羣芳譜卷三十四
