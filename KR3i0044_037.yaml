body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷三十五花譜海棠一增沈立海棠記海棠根色黃而盤徑木堅而多節外白而中赤其枝柔密而修暢其葉縹緑色小者淺紫色其香清酷不蘭不麝原海棠有四種皆木夲貼梗海棠叢生單葉枝作花磬口深紅無香不結子新正即開亦有四季花者花五出初極紅如胭脂點點然及開則漸成纈暈至落則若宿妝殘粉矣垂絲海棠樹生柔枝長蒂花色淺紅蓋由櫻桃接之而成故花梗細長似櫻桃其瓣叢密而色嬌媚重英向下有若小蓮西府海棠枝梗略堅花色稍紅木瓜海棠生子如木瓜可食海棠盛於蜀而秦中次之其株翛然出塵俯視衆芳有超羣絶類之勢而其花甚豐其葉甚茂其枝甚柔望之綽約如處女非若他花冶容不正者比蓋色之美者惟海棠視之如淺絳外英英數點如深胭脂此詩家所以難為狀也以其有色無香故唐相賈耽著花譜以為花中神仙花木録曰南海海棠枝多屈曲有刺如杜梨花繁盛開稍早四季花灌生花紅如胭脂無大木即貼梗又祝家桃花同西府跗微堅瑣碎録曰一種黃者木性類海棠青葉微圎而色深光滑不相類花半開鵝黃色盛開漸淺紅矣葉間或三或五蕊如金粟鬚如紫絲實如梨大如櫻桃至秋熟可食其味甘而微酸增本草李時珍曰飲膳正要果類有海紅不知出處此即海棠梨之實也狀如木瓜而小二月開紅花實至八月乃熟鄭樵通志云海棠子名海紅即爾雅赤棠也彚考增平泉草木記凡花木以海為名者悉從海外來如海棠之類是也原王禹稱詩話石崇見海棠歎曰汝若能香當以金屋貯汝增東坡雜記海棠似絹花原復齋漫録仁宗朝張冕學士賦蜀中海棠詩沈立取以載海棠記中云山木瓜開千顆顆水林檎發一攢攢注云大約木瓜林檎初開皆與海棠相類若冕言則江西人正謂棠梨花耳惟紫綿色者謂之海棠似木瓜林檎六出者非真海棠也晏元獻云已定復搖春水色似紅如白海棠花亦與張冕同意紺珠集徐儉樂道隱於藥肆中家植海棠結巢其上引客登木而飲冷齋夜話少遊在黃州飲於海棠橋老書生家海棠叢開少遊醉卧宿於此明日題其柱曰喚起一聲人悄衾暖夢寒窗曉瘴雨過海棠開春色又添多少社甕釀成微笑半破癯瓢共舀覺健倒急投牀醉鄉廣大人間小東坡甚愛之范石湖每嵗移家泛湖賞海棠閲耕餘録宋淳熙間秦中有雙株海棠其髙數丈翛然在衆花之上與江淮所産絶不類荆南官舍亦有兩株略如之姿艷柔婉豐富之極昌州海棠獨香其木合抱每樹或二十餘葉號海棠香國太守於郡前建香霏閣每至花時延客賦賞蜀嘉定州海棠有香獨異他處增古今詩話東坡謫黃州居於定惠院之東雜花滿山而獨海棠一株土人不知貴東坡為作長篇平生喜為人寫人間刻石者自有五六夲云吾平生最得意詩也石林詩話韓持國雖剛果特立風節凛然而情致風流絶出時輩許昌崔象之侍郎舊第今為杜君章所有廳後小亭僅丈餘舊有海棠二株持國每花開時輒載酒日飲其下竟謝而去嵗以為常至今故老猶能言之余嘗於小亭柱間得公二絶句其一云濯錦江頭千萬枝當年未解惜芳菲而今得向君家見不怕春寒雨濕衣尚可想見當時氣味韓忠憲嘗帥蜀持國兄弟皆侍行尚少故前二句云爾其二云長條無風亦自動柔艷著雨更相宜漫其後句曽存之家池島上亦有海棠十餘株余為守時嵗亦與王幼安諸人席地屢飲然此公勝處不能繼也陳思海棠譜閩中曺宇修貢堂下海棠極盛三面共二十四叢長條修幹頃所未見每春著花真錦繡假其間有如紫綿揉色者亦有不如此者蓋其種類不同不可一概而論也至其花落則皆若宿妝淡粉矣余三春對此觀之至熟大率富沙多此官舍人家往往皆種之並是帚子海棠正與蜀中者相類斯可貴耳今江浙間别有一種柔枝長蒂顔色淺紅垂英向下如日蔫者謂之垂絲海棠全與此不相類蓋強名耳金城記黎舉嘗曰欲以梅聘海棠但恨時不同耳牡丹榮辱志重葉海棠曰花命婦花經海棠六品四命垂絲海棠三品七命詞話曾覿取友於十花海棠名友也三栁軒雜識海棠為蜀客原學圃餘疏海棠品類甚多曰垂絲曰西府曰棠梨曰木瓜曰貼梗就中西府最佳而西府之名紫綿者尤佳以其色重而瓣多也此花特盛於南都余所見徐氏西園樹皆參天花時至不見葉西園木瓜尤異定是土産所宜耳垂絲以櫻桃木接開久甚可厭苐最先花與玊蘭同時植之傍掩映不可廢也貼梗草夲郡城中種之極髙大當訪求種法以備一種紫綿宋苕溪漁隱叢話備載之增滇中記垂絲海棠髙數丈每當春時鮮媚殊常真人間尤物自大理至永昌沿山厯澗往往而是瓶史浴海棠宜韻致客海棠以蘋婆林檎丁香為婢原花木考錢塘縣舊有吳越時羅江東隱手植海棠一夲王黃州元之嘗題詩云江東遺迹在錢塘手植庭花滿院香若使當年居顯位海棠今日是甘棠觀此杭州海棠亦香不獨昌州然也增徐渭遊紀春日與友人携觴俎探禹穴就十峰山人馬丈飲於小園林卉雲繁索得海棠秧二本穿籬過别畦又掘竹母數根而去因紀一詩云春來擕酒醉春蘿乞得春花一兩窠不若取將松竹去成隂留待主人過燕都遊覽志回龍觀舊多海棠旁有六角亭每嵗花發時上臨幸焉兩堤桃桞議望湖亭前有西府海棠一株所謂漢宫三千趙姊第一良非虛語饒州志蜀錦亭在府治慶朔堂右宋范仲淹植海棠二株其後鄒柯築亭題曰蜀錦王十朋詩亭廢名猶在春來花自芳猶餘蜀中錦愛惜比甘棠南寧府志海棠橋在橫州西橋南北皆植海棠有書生祝姓者居此宋秦觀嘗醉宿其家順慶府志海棠川在西充縣環繞縣治上多海棠因名黎州志海棠池在城西北五里環池皆植海棠為郡守賔僚逰宴之地保寧府志海棠溪在府治南因上多海棠故名原敘州府志長寧縣有海棠洞昔郡人王氏環植海棠每春花時郡守宴寮友於其下嘉定州志海棠山在州西山多海棠為郡守宴賞之地集藻序增宋沈立海棠記序蜀花稱美者有海棠焉然記牒多所不録蓋恐近代有之嘗聞真宗皇帝御製後苑雜花十題以海棠為首章賜近臣唱和則知海棠足與牡丹抗衡而可獨步於西州矣因搜擇前志惟唐相賈元靖耽著百花譜以海棠為花中神仙誠不虛美耳近世名儒巨賢發於歌詠清辭麗句往往而得立慶歷中為縣洪雅春多暇日地富海棠幸得為東道主惜其繁艷為一隅之滯卉為作海棠記敘其大概及編次諸公詩句於右復率蕪拙作五言百韻詩一章四韻詩一章附於卷末好事者幸無誚焉陳思海棠譜序世之花卉種類不一或以色而艷或以香而姸是皆鍾天地之秀為人所欽羡也梅花占於春前牡丹殿於春後騷人墨客特注意焉獨海棠一種豐姿艷質固不在二花下自杜陵入蜀絶吟於是花世因以此薄之其後都官鄭谷已為舉似夲朝列聖品題雲章奎畫烜耀千古此花始得顯聞於時盛傳於世矣今採取諸家雜録及彚次唐以來諸人詩句以為一編目曰海棠譜雖纂集未能詳盡聊預諸譜之列云開慶改元長至日敘明宋濓春日看海棠花詩序春氣和煦海棠名花競放浦陽鄭太常仲開宴觴客於衆芳園時日已西沒乃列燭花枝上花既娟好而燭光映之愈致其姸於是衆咸恱銜杯詠詩亹亹不自休酒半酣金華宋濓乃揚言曰李格非書洛陽名園記謂園圃之興廢為天下盛衰之候今者衣冠雍容酬倡於俎豆間花雖不解言亦散影婆娑若相與為娛樂者不知何自而致之亦曰聖天子在上廓清四海化呻吟為謳歌所以有斯樂耳帝力所被如天開日眀萬物熙熙皆有春意世道之盛兆見于此茍不能詩則止能則烏可已也雖然經有之無已太康職思其居吾儕今夕無乃過於太康矣乎宜知好樂之無荒而為良士之瞿瞿可也所賦詩自太常君而下凡三十人其三則賔客餘皆其昆弟子姓云贊增宋宋祁重葉海棠贊修柯柔蔓濃淺繁總盛則重花不常厥種五言古詩增宋歐陽修折海棠戲贈聖俞二首搖搖墻頭花笑笑弄顔色荒涼衆草間露此紅的皪草木本無情及時如自得青春不可恃白日忽已昃繞之重吟哦歸坐成歎息人生浪自苦得酒且開釋不見宛陵翁作詩頭早白搖搖墻頭花艷艷爭青蛾朝見開尚少暮看繁已多不惜花開繁所惜時節過昨日枝上紅今日隨流波物理固如此古來知奈何達人但飲酒壯士徒悲歌梅堯臣依韻答永叔海棠二首搖搖墻頭花蒨蒨有好色髙枝笑粲粲低枝明皪皪但與風相撩不與風相得風吹莫苦急逰子歎日昃彭祖與顔回相去猶瞬息每觀形影篇曷在神所釋不可廢我吟畢竟焉免白搖搖墻頭花一一如舞蛾春風買艷逸艷逸此何多不為遊蜂撓即為狂蝶過日光苦給給魯叟白波波人生若朝菌不飲奈老何揚雄寂寞居豈若阮生歌劉子翬海棠洲煌煌海棠洲錦樹臨清灣常恨灣頭風吹花走潺湲潺湲去不息花亦無由還朱子山館觀海棠景暄林氣深雨罷寒塘緑置酒此佳晨尋幽慕前躅芳樹麗煙華紫錦散清馥當由懷别恨寂寞向空谷陸遊張園觀海棠朝陽照城樓春容極明媚走馬蜀錦園名花動人意嚴妝漢宫曉一笑初破睡定知夜宴歡酒入妖骨醉低鬟羞不語困頓嬌欲閉雖艷無俗姿太息真富貴結束吾方歸此别知幾嵗黃昏亷纎雨千點裛紅淚海棠今日春已半風雨停出遊瓶中海棠花數酌相獻酬尚想錦官城花時樂事稠金鞭過南市紅燭宴西樓千林誇盛麗一枝賞纎柔狂吟恨未工酩酊醉不休那知茅簷底白髮見花愁花亦如病姝掩抑向客羞尤物終動人要非桃杏儔東風萬里恨浩蕩不可收金元好問海棠姸花紅粉妝意態工媚嫵窈窕春風前霞衣欲輕舉金盤渺華屋國艷徒自許依依如有意脈脈不得語詩人太冷落愁絶殘春雨元郝經儀真館後園海棠兩花於秋因為小酌賦詩二年海棠秋幽姸對寥索霜後輒著花枯株吐纎弱化工為詩人故令造物錯木落出竒芬風度亦不惡尖黃簇短葉膩翠光欲鑠蹙縮苞紅粟殷濃入深萼稀踈生意怯靜麗尤綽約飛絲照青蟲蠨蛸共連絡深閨養春嬌霜華滿珠箔賴得西風輕微薰小隂作盈盈出宫妝新寒翠綃薄空庭自顔色含恨誰附著息入楚無言意婉心不樂琵琶怨昭陽所遇非所托獨有未歸人相看慰孤酌却似海南時坡仙政漂泊有酒仍有花世事且髙閣後時亦何遲適遇今猶昨香霧沾新橙傾酒兩螯嚼銀燭更髙燒秋花易零落七言古詩原宋蘇軾寓居定惠院之東雜花滿山有海棠一株土人不知貴也江城地瘴蕃草木只有名花苦幽獨嫣然一笑竹籬間桃李滿山總粗俗也知造物有深意故遣佳人在空谷自然富貴出天姿不待金盤薦華屋朱唇得酒暈生臉翠袖捲紗紅映肉林深霧暗曉光遲日暖風輕春睡足雨中有淚亦悽愴月下無人更清淑先生食飽無一事散步逍遙自捫腹不問人家與僧舍挂杖敲門看修竹忽逢絶艷照衰朽歎息無言揩病目陋邦何處得此花無乃好事移西蜀寸根千里不易到銜子飛來定鴻鵠天涯流落俱可念為飲一樽歌此曲明朝酒醒還獨來雪落紛紛那忍觸增趙次公和東坡定惠院海棠化工妙手開羣木酷向海棠私意獨殊姿艷艷雜花裏端覺神仙在流俗睡起胭脂懶未勻天然膩理還豐肉繁華增麗態度逺婀娜含嬌風韻足豈惟婉孌彤管姝真同窈窕關雎淑未能奔往白玉樓要當貯以黃金屋顧雖風暖欲黃昏脈脈難禁倚修竹可憐俗眼不知貴空把容光照山谷此花夲出西南地李杜無詩恨遺蜀髙才沒世孰雕龍後輩補亡難刻鵠貂裘季子客齊安相逢忽慰羈人目當年甫白君可繼為花重賦陽春曲把酒因澆礨磈胸搜句輒傾空洞腹多情恐作深雲收兒童莫信來輕觸原陸