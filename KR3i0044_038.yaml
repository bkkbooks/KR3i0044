body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷三十六花譜海棠二集藻五言排律增唐薛能海棠酷烈復離披元功莫我知青苔浮落處暮栁間開時帶醉游人插連隂被叟移晨前清露濕宴後惡風吹香少傳何計姸多畫半遺島蘇漣水脉庭綻粒松枝偶泛因沉硯閒飄欲亂碁遶山生玉壘和郡徧坤維負賞慙休飲牽吟分失饑明年應不見留此贈巴兒宋王禹偁商山海棠錦里名雖盛商山艶更繁别疑天與態不類土生根淺著紅蘭染深於絳雪噴待開先釀酒怕落預呼魂香裏無勍敵花中是至尊桂須辭月窟桃合避仙源浮動冠頻側霓裳袖忽翻望夫臨水石窺客出墻垣贈别難饒栁忘憂肯讓萱輕輕飛燕舞脉脉息媯言蕙陋虚侵徑梨凡浪占園論心留蝶宿低面厭鶯喧不沗神仙品何辜造化恩自期栽御苑誰使擲山村綺季荒祠畔仙娥古洞門烟愁思舊夢雨泣怨新㛰畫恐明妃恨移同卓氏奔祇教三月見不得四時存繡被堆籠勢臙脂浥淚痕貳車春未去應得伴芳樽石延年和樞密侍郎因看海棠憶禁苑此花最盛君看海棠格羣花品詎同嬌嬈情自富蕭散艶非窮舊縠斑吳苑梅羅碎蜀宫錦窠杯裏影繡叚隟前烘心亂香無數莖柔動滿叢意分巫峡雨腰細漢臺風盛若霞藏日鮮於血灑空髙低千㸃赤深淺半開紅妝指朱纔布膏唇檀更融色焦無可壓體瘦不成豐枝重輕浮外苞疎密閙中難勝蜂不定易入蝶能通宋祁蜀海棠蜀國天餘煦珍葩地所宜濃芳不隱葉併艶欲燃枝襞影分羣萼均霞㸃萬蕤囘文錦成後夾煎燎烘時蜂蕊迎銜密鶯梢向坐危淺深䨇絶態啼笑兩妍姿絳節排烟竦丹釭落蒂垂童容障畏薄便面到憂遲媚日能徐照暄風肯遽吹惜歡當晼晩留恨付離披麗極都無比繁多僅自持損香饒麝柏照影欠瑤池畫要精侔色歌須巧騁辭舉樽頻語客細摘玩芳期海棠西域流根遠中都屬賞偏初無可並色竟不許勝妍薄暝霞烘爛平明露濯鮮長衾繡作地密帳錦為天淺影才欹檻橫柯欲照筵愁心隨落處醉眼著繁邊的的誇妝靚番番恃笑嘕何嘗間蘭媚要是掩櫻然艶足非他譽香輕且近傳所嗟名後出遺載楚臣篇楊諤和燕龍圖海棠西漢欺盧橘東陽愛野棠許昌竒此遇子美欠先揚杜宇三春艶蠶叢一國香臙脂㸃亂雨生色麗斜陽富艶東君節暄妍白帝方錦樓祈水色玉壘換山光風格林檎細腰肢郁李長天生笑容質時樣舞衣裳少吐深深染全開淡淡妝烟媒䕶綠蒂風陣損朱房旋失因臨水閒飄弗過墻佩亡愁殺甫簪脱即連姜蝶舞菱花照鶯啼罨畫堂仙如弄玉少墜似綠珠常不見還成悔相思幾欲狂春深濯錦水日晩浣紗方卧對移簾柙吟看近筆牀池清滿園倒鳥起一枝昂紫燕銜泥急黃蜂趁蜜忙化工真用意銷得與攜觴沈立海棠百韻岷蜀地千里海棠花獨姸萬株佳麗國二月艶陽天叢萼勻如布修蕤巧似編彤雲輕㸃綴赤玉碎雕鐫瑟瑟光輸瑩猩猩血借鮮淺深相向背疎密逓勾牽輕舊重重染丹砂細細研蕊纖金粟拱鬚嫩紫絲拳紅蠟隨英滴明璣著顆穿初莖爭裊娜翹榦共蹁躚絶代知無價生香不減􅀢分靈應桂苑鍾粹定星躔木帝經邦相花王入室賢祥飈如翦拂卿靄共陶甄真宰隂推轂勾芒與著鞭不湏憂薄命好為惜流年贊翼施生柄扶持煦嫗權主張韶令正調爕淑威宣和氣高低洽芳心次第還金釵人十二珠履客三千雲雨迷巫峡風波怨洛川娉婷宜住楚妖冶合居燕繡被通宵展華燈徹曙燃橫披前檻外半出假山巔暗羡遊蜂採偷輸蟻穴沿瘦嫌蛛網織柔怯女蘿纒蓄恨慿誰訊無言只自憐文君酒壚畔揚子草堂前品格生来别風流到老全繁中生悵望衆裏見喧闐暄暖精神出晴明意態便關關鶯對語兩兩燕髙騫天上宜封殖人間偶竚延共櫻圍别館與杏擁斜阡清暖簾爭卷黃昬幕尚褰低籠金轣􅣗髙映畫鞦韆忽認梁園妓深疑閬苑仙怱怱来蕙圃遠遠别芝田羞隱暝濛霧輕如淡蕩烟乍逢開羽扇初喜下雲駢髣髴向星靨依稀帶翠鈿五銖衣宛轉七寳帳翩翾獨立挨霓節成行列彩旃困宜欹虎枕歩好襯金蓮舞定休囘袖妝濃不傅鉛蓋張松鬱鬱茵藉草芊芊馥郁蘭供夢扶蘇栁伴眠軀輕彌綽約腰細更便嬛婭姹常顒若幽柔自灑然侍兒羅白芷婢子列芳荃口口濃檀注腮腮薄粉填觧圍施葉幄買笑有榆錢旖旎環瑤席婆娑匝玳筵嬌依屏曲曲泣對露涓涓南陌輕埃蔽東郊夕照連幾時休縹緲從此識嬋娟是處遺簪珥誰家不管絃妬姬貪恐失戲稚惜何顛折閃搔頭褪擎摐約腕揎戴遮鬟上鳳裝壓鬢邊蟬汲引新懽聚消磨宿忿蠲縱觀須倒載命宴必加籩翻曲教歌媛更詞送酒船鄉心須暫觧病眼當時痊迢逓来油壁從容住錦韉雅宜交讓比穠與棣華聫不憤參朱槿寧甘混木棉酴醿潛失色躑躅敢差肩素奈思投迹夭桃恥備員梧桐愧金井芍藥濫花磚併壓辛夷俗潛排寳馬蔫天恩無久恃人寵莫長專布影交三徑敷榮徧一廛凝眸方曄曄囘首旋翩翩可忍驚飈挫胡煩急景煎珊瑚隨手碎綘雪繞枝旋拂漢霞初散當樓月自圓飄零隨蠛蠓散亂逐漪漣灼灼龜城外亭亭錦水邊抱愁應慘蹙有淚即潺湲午影迷蝴蝶朝寒怨杜鵑物情元倚伏人意莫拘攣擢秀髙羣木稱珍極八埏未開獨脉脉憂落固悁悁别著新文紀重尋舊譜箋共知紅艶好誰辨赤心堅實似陪朱李根宜灌醴泉栽須鄰竹柏樹莫繞烏鳶恥託膏腴茂當隨富貴遷為多猶底滯因遠尙迍邅客思易成亂心期未省愆畫思摩詰筆吟稱薛濤牋醉目休頻送詩情豈易縁薛能誇麗句鄭谷賞佳篇止感芳姿美那憐託地偏山經猶罕記方志未多傳巧詠憂才竭㝠搜得意詮遐陬寡真賞僻境忍輕捐抽祕慚非據探竒敢讓先援毫叙名卉聊用放懐焉程敦厚和冬曦海棠花中名品異人重比甘棠苞嫩相思密紅深琥珀光好風傳馥郁凡卉愧芬芳爛熳雲成瑞葳蕤女有嬙生来先蜀國開處始朝陽賞即笙歌地題稱翰墨塲烟霞容易散蜂蝶等閒忙誰是多情侶欄邊重舉觴七言排律增宋張洎内署書閣前海棠花盛開率爾七言八韻寄長卿諫議去嵗海棠花發日曾將詩句詠芳妍今来花發春依舊君已雄飛玉案前驟隔清塵樞要地獨攀紅蕊艶陽天疎枝髙映銀臺月嫩葉低含綺閣烟花落花開懐勝賞春来春去感流年清辭早綴巴人唱妙翰猶緘蜀國箋共仰芳圖方赫爾自嗟衰鬢轉皤然因慿鶯蝶傳消息莫忘蓬莱有病仙張冕海棠海棠栽植徧塵寰未必成都欲詠難山木𤓰開千顆顆水林檎發一攢攢初疑紅豆爭頭綴忽覺臙脂衆手丸西蜀僧家根撥小南荆官舍樹枝寛髙穿羣木無因蔽平倚危樓最好看十畝園林渾似火數方池面悉如丹錦袍萬丈仍連袂珠被齊光更合歡風嫋細腰妝正罷露晞銅雀淚新乾晨曦逺借彤雲暖秋魄㣲侵甲帳寒㑹讌豈勞供幄幙採香應見費龍檀穠燒游女青絲髮殷染妖姬白玉冠賔席半移隈茜綬使車多熱簇雕鞍層層排朶縈飛蝶密密交柯宿翠翰詩客早慙矜鏤管畫工誰敢衒霜紈本期相伴千塲醉可忍輕邀百卉殘川路尚移隨迅瀨蕃船猶折出長瀾飄零絳雪深盈尺收拾晴霞散結團時去獨應賢者識色空潛有達人觀譜為仙子終須美實作寒梅况不酸五六年来離别恨春宵頻夢石臺盤元馬祖常畫海棠圖石家五尺珊瑚樹海國千房火齊珠風雨春寒圍錦䕶艶陽天暖倚欄扶浣時應貯芙蓉水香處重熏翡翠爐紅膩不隨蜂觜蝕粉勻終為蝶身敷葳蕤綵結盤仙綬襞積雲羅落舞𥜗青帝化成非幻有杜陵吟老却知無催開每頼斟鸚鵡吹落還因唱鷓鴣曾見赤城花亞蕊丹鉛此去不須圖五言絶句增宋晏殊海棠濯錦江頭樹移根藥砌中只應春有意偏與半妝紅陳與義海棠花葉兩分明春隂耿簾幕東風吹不斷日暮臙脂薄洪适黃海棠漢宫嬌半額雅澹稱花仙天與温柔態妝成取次妍垂絲海棠脉脉似崔徽朝朝長著地誰能觧倒懸扶起雲鬟墜楊萬里海棠艶翠春鋪骨妖紅醉入肌花仙别無訣一味惱臙脂七言絶句原唐賈島海棠二首名園對植幾經春露蕊烟梢畫不真多謝許昌傳雅什蜀都曾未遇詩人昔聞遊客話芳菲濯錦江頭幾萬枝縱使許昌持健筆可憐終古媿幽姿増鄭谷蜀中賞海棠濃淡芳春滿蜀鄉半隨風雨斷鶯腸浣花溪上空惆悵子美無心為發揚原吳融海棠雪綻霞鋪錦水頭占春顔色最風流若教更近天街種馬上多逄醉五侯增宋光宗會僚屬賞海棠偶有題詠濃淡名花産蜀鄉半含風露浥新妝嬌嬈不減舊時態誰與丹青為發揚王禹偁别堂後海棠一堆紅雪媚青春惜别須教淚滿巾好在明年莫憔悴校書兼是愛花人郭震海棠又隨桃李一時榮不逐東風處處生疑是四方嫌不種教於蜀地獨垂名宋祁海棠萬萼霞乾照曙空向来心賞已多同未知此日家園樂數徧繁枝衮衮紅趙抃答贑縣錢顗著作移花令尹憐花意思勤海棠多種郡園新自從西蜀年年見今日欄邊似故人韓維展江亭海棠四首占盡人間麗與華白頭判得醉流霞誰將法錦翻新樣紅綠装成徧地花昔年曾到蜀江頭絶艶牽心幾十秋今日欄邊見顔色夢魂不復過西州紅糝装條嫋嫋長人間不合有天香千觴未足酬佳麗囘首東風更斷腸又避寒風與暖曦年年長此探花期如今太守尤珍愛只許宫娥戴一枝王安石海棠綠嬌隱約睂輕掃紅嫩妖嬈臉薄妝巧筆冩傳功未盡清才吟詠興何長文同和何靖山人海棠為愛香苞照地紅倚欄終日對芳叢夜深忽憶南枝好把酒更来明月中原蘇軾海棠東風嫋嫋汎崇光香霧霏霏月轉廊只恐夜深花睡去髙燒銀燭照紅妝增趙次公和東坡海棠露氣熹㣲帶曉光枝邊燦煥映廻廊細看素臉原無玉初㸃臙脂駐靚妝張舜民移岳州去房陵道中見海棠馬息山頭見海棠羣仙㑹處錦屏張天寒日晩行人絶自落自開還自香張耒晁二家海棠去嵗花開呼杜卿家小娃歌舞花下今春花復開而杜已出守戲以詩調之頗疑蜂蝶過隣家知是東墻去嵗花駿馬無因迎小妾鴟夷何用强隨車原崔鷃海棠渾是華清出浴初碧綃斜掩見紅膚便教桃李能言語要比嬌妍比得無增陳與義海棠三首海棠㸃㸃要詩催日暮紫綿無數開欲識此花竒絶處明朝有雨試重来紅妝翠袖一番新久向園林作好春却笑華清誇睡足只今羅韈久無塵深院無人春日長遊蜂来往燕飛忙海棠嬌甚成羞澀慿仗東風催曉妝周必大次韻楊廷秀并序萬花川谷主人為海棠賦二首妙絶古今斷章有平生不帶看花福不是愁中即病中之歎代花次韻江國羣芳自有餘詩才酒興不愁無却憐西蜀移根遠醉向東風落筆初傅粉施朱淡復濃不辭沐雨更梳風豈知命似佳人薄不在吾公樂事中范成大垂絲海棠春工葉葉與絲絲怕日嫌風不自持曉鏡為誰妝未辦沁痕猶有淚臙脂賞海棠三絶芳春隨分到貧家兒女多情惜嵗華聊為海棠修故事去年燈燭去年花燭光花影兩相宜占斷風光二月時但得常如妃子醉何妨獨欠少陵詩憶向宣華夜倚欄花光妍暖月光寒如今蹋颯嫌風露且只銅瓶滿插看聞石湖海棠盛開亟攜家過之東風花信十分開細意留連待我来開過十分風不動更無一片㸃蒼苔家人扶上錦城頭蜂蝶團中爛熳遊報答春光須小醉紅雲洞裏按伊州低花妨帽小攜笻深淺臙脂一萬重不用髙燒銀燭照暖雲烘日正春濃陸游海棠二首十里迢迢望碧雞一城晴雨不曾齊今朝未得平安報便恐飛紅已作泥蜀地名花擅古今一枝氣可壓千林譏彈更到無香處常恨人言太刻深楊萬里張功父南湖海棠杖藜走筆看盡都城種海棠只將一徑引教長約齋妙出春風手人在中央花四傍天公信手灑明霞若遣停勻未必佳却得數株多葉底殷勤襯出密邊花垂絲海棠無波可照底須窺與栁爭嬌也學垂破