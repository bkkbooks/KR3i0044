春風得意笙歌逐欵門不問誰家竹只揀紅妝高處燒銀燭碧雞坊裏花如屋燕王宫下花成谷不須悔唱關山曲只為海棠也合来西蜀增京松坡醉落魄芳塵休撲名花喚我相隨逐淺妝不比梅欺竹深注朱唇妝面稱紅燭阿嬌合貯黃金屋是誰却遣来空谷酡顔徧倚闌干曲一叚風流不枉到西蜀王道輔蝶戀花濯錦江頭春欲暮枝上繁紅著意留春住祇恐東君嫌面素新妝勝把臙脂傅曉夢驚寒初過雨寂寞珠簾問有餘花否悵望草堂無一語丹青傳得凝情處張材甫蝶戀花前日海棠猶未破㸃㸃臙脂染就真珠顆今日重来花下坐亂鋪宫錦春無那勝摘繁枝簪幾朶痛惜深憐只恐芳菲過醉倒何妨花底臥不須紅䄂来扶我明仁宗蝶戀花烟抺霜林秋欲困吹破臙脂便覺西風潤翠袖怯寒愁一寸誰家庭院黄昬信明月修容生遠恨旋摘餘嬌簪滿佳人鬢醉倚小欄花影近不應先有春風分宋張奕殢人嬌多少臙脂匀成㸃就千枝亂攢紅堆繡花無長好更光隂去後對景憶良朋故應招手曾記年時花開把酒枉淋淋春衫濕透文園今病問速能来否却道有荼䕷牡丹時候張孝祥感皇恩常歲海棠時偷閑須到多病尋芳懶春老偶来恰值半謝妖嬈猶好便呼詩酒伴同顛倒繁枝高䕃疎枝低繞紅底杯盤花影照多情一片怪我歸来不早斷腸銷碎錦門前道陳濟翁踏青游濯錦江頭羞殺艶桃穠李縱趙昌丹青難比暈輕紅留淺素千嬌百媚照綠水恰如下臨鸞鏡妃子弄妝猶醉詩筆因循不曉少陵深意但滿眼傷春珠淚燕来時鶯啼處年年憔悴便除是秉燭凭欄吟賞莫教夜深花睡晁補之洞仙歌羣芳未盡是海棠時候雨過寒輕好晴晝最妖嬈一樹全是初開雲鬟小塗粉施朱未就全開還自好駘宕春餘百樣宫羅鬭繁繡縱無語也應心恨我来遲恰栁絮將春歸後醉猶倚柔枝恰黃昬一㸃愁須共花同瘦劉克莊滿江紅老子年来頗自許心腸鐵石尚一㸃銷磨未盡愛花成癖懊惱每嫌寒勒住丁寧莫被晴烘拆柰暄風烈日太無情如何得張畫燭頻頻惜慿素手輕輕摘更幾番雨過彩雲無迹今日不来花下飲明朝空向枝頭覓對殘紅滿院杜鵑啼添愁寂劉處靜燭影搖紅蜀錦華堂寳箏頻送花前酒妖嬈全在半開時人試單衣後花面圍春競秀如紅潮玉顋㣲透欲甦還睡淺酒扶頭朦朧晴晝金屋名姝恨情空貯閒睂岫世間還有此娉婷拚盡珠量斗真艶可令消受倩鶯催天香共袖冷烟庭院淡月梨花空教春瘦劉儗木蘭花慢漸秋空向晚被風雨趲重陽正木落疎林海棠枝上忽見紅妝料應妬他蘭菊任年年獨自占秋光故把春風嬌面向人逞艶呈芳看来畢竟此花强祇是欠些香悄一似五陵公子却厭膏粱肯来水邊竹下與幽人相對説淒凉只恐夜深花睡五更㣲有清霜謝薖念奴嬌綠雲影裏把明霞織就千重文繡紫膩紅嬌扶不起好是未開時候半怯新寒半宜晴色養得臙脂透小亭人靜嫩鶯啼破清晝猶記攜手芳隂一枝觧帶嬌艶波䨇秀小語輕憐花總見爭得似花長久醉淺休歸夜深同睡明月還相守免教春去斷腸空嘆詩瘦馬莊父水龍吟東君直是多情好花一夜都開盡杏梢零落藥欄遲暮不教寧靜風度秋千日移簾幕翠紅交映正太真浴罷西施濃抺都沉醉嬌相稱磨徧綠牕銅鏡挽春衫不堪比並暮雲空谷佳人何處碧苔侵徑睡裏相看酒邊凝想許多風韻問因何却欠一些香味惹旁人恨方岳水龍吟晝長庭院深深春柔一枕流霞睡朦朧欲醒嬌羞還困錦屏圍翠豆蔲初肥櫻桃微綻玉欄同倚記華清欲起渭水流波暖紅漲棄脂水燕子来時天氣儘韶風與他為地芳叢雨歇霞痕日釅英英仙意莫恨無香最憐有韻天然情致待問春能幾五更猶是拚今宵醉王十朋二郎神深深庭院夜雨過簾櫳髙捲正滿檻海棠開欲半仍朶朶紅深紅淺遙認三千宫女面勻㸃㸃臙脂未徧更微帶春醪宿醉裊娜香肌嬌嬾日暖芳心暗吐含羞輕顫笑繁杏夭桃爭爛熳愛容易出墻臨岸子美當年游蜀苑又豈是無心眷戀都只為天然體態難把詩工裁翦劉克莊摸魚兒甚春来冷烟淒雨朝朝遲了芳信驀然乍暖晴三日又覺萬株嬌困霜㸃鬢潘令老年年不帶看花分才情減盡悵玉局飛仙石湖絶筆辜負這春韻傾城色懊恨佳人薄命墻頭岑寂誰問東風日暮無聊歎吹得臙脂成粉君試認花共酒古来二事天尤吝年光去迅謾綠葉成隂青苔徧地做取異時恨别錄原王禹偁詩話杜子美避地蜀中未嘗有一詩説著海棠以其生母名海棠也增韻語陽秋杜子美居蜀累年吟咏殆徧海棠竒艶而詩章獨不及何耶鄭谷詩云浣花溪上空惆悵子美無心為發揚是已本朝名士賦海棠甚多往往皆用此為實事如石延年云杜甫句作畧薛能詩未工錢易詩云子美無情甚都官著意頻李定詩云不霑工部風騷力猶占勾芒造化權獨王荆公用此作梅花詩最為有意所謂少陵為爾牽詩興可是無心賦海棠也墨客揮犀李丹大夫客都下一年無差遣及授昌州倅議者以去家遠乃改授鄂州彭淵材聞之吐飯大歩往謁李曰誰為大夫謀昌佳郡也柰何去之李驚曰供給豐乎曰非也民訟簡乎曰非也曰然則何以知其佳淵材曰海棠無香昌州海棠獨香非佳郡乎聞者傳以為笑原蜀檮杌潘炕有嬖妾觧愁姓趙氏其母夢吞海棠花蕊而生頗有國色善為新聲冷齋夜話彭淵材曰平生所恨者五事人問其故淵材不言久之曰吾論不入時聽恐汝曹輕易之問者力請乃答曰第一恨鰣魚多骨二恨金橘太酸三恨蓴菜性冷四恨海棠無香五恨曾子固不能詩聞者大笑淵材瞠目答曰諸子果輕易吾論也東坡海棠詩曰只恐夜深花睡去故燒銀燭照紅妝事見太真外傳明皇登沉香亭召太真妃於時卯醉未醒命力士使侍兒扶掖而至妃子醉顔殘妝髩亂釵橫不能再拜明皇笑曰豈妃子醉直海棠睡未足耳增冷齋夜話前輩作花詩多用美女比其狀如曰若教觧語應傾國任是無情也動人誠然哉山谷作酴醿詩曰露濕何郎試湯餅日烘荀令炷爐香乃用美丈夫比之特若出類而吾叔淵材作海棠詩又不然曰雨過温泉浴妃子露濃湯餅試何郎意尤工也詩話總龜東坡謫居齊安時以文筆游戲三昧齊安樂籍中李宜者色藝不下他妓他妓因讌席中往往得詩宜獨以語訥不能請及坡將移臨汝於飲餞處宜奉觴再拜取領巾乞書公顧視久之令宜磨硯墨濃取筆大書東坡五歲黃州住何事無言及李宜即擲筆袖手與客笑談坐客相謂語似凡易又不終篇何也至將徹具宜復拜請坡大笑曰幾忘出場繼書云恰似西川杜工部海棠雖好不留詩一座擊節盡歡而散就印錄張寳用鴨卵殻以金絲鏤海棠花名鮫胎盞雲蕉館紀談明昇在重慶取浮江青䗫石為茶磨令宫人以武隆雪錦茶碾之焙以大足縣香霏亭海棠花味倍於常海棠無香獨此地有香焙茶尤妙原栽接海棠性多類棃核生者十數年方有花都下接上多以嫩枝附棃而贅之則易茂種宜壚壤膏沃之地貼梗海棠臘月於根傍開小溝攀枝著地以肥土壅之自能生根来年十月截斷二月移栽櫻桃接貼梗則成垂絲棃樹接貼梗則成西府又春月取根側小本種之亦易活或云以西河栁接亦可海棠色紅接以木𤓰則色白亦可以枝插不花取已花之木納於根跗間卽花花謝結子翦去来年花盛而無葉澆灌瑣碎錄云海棠花欲鮮而盛於冬至日早以糟水澆根下或肥水澆或盫過麻屑糞土壅培根下使之厚密纔到春暖則枝葉自然大發著花亦繁密矣一云此花無香而畏臭故不宜灌糞一云惟貼梗忌糞西府垂絲亦不甚忌止惡純濃者耳插瓶薄荷包根或以薄荷水養之則花開耐久附錄秋海棠原一名八月春草本花色粉紅甚嬌艶葉綠如翠羽此花有二種葉下紅筋者為常品綠筋者開花更有雅趣彚考原採蘭雜志昔有婦人懐人不見恒灑淚於北墻之下後灑處生草其花甚媚色如婦面其葉正綠反紅秋開名曰斷腸花即今秋海棠也于若瀛曰秋海棠喜隂生又宜卑濕莖岐處作淺綘色綠葉文似朱絲婉媚可人不獨花也增學圃餘疏秋海棠嬌好宜于幽砌北牕下種之傍以古拙一峰菖蒲翠筠草皆其益友也荆溪疏善卷後洞秋時海棠千本并著花一壑皆丹瓶史秋海棠嬌然有酸態鄭康成崔秀才之侍兒也瓶花譜秋海棠四品六命集藻五言律詩原明王士騏題秋海棠是花偏灼灼開處幾叢叢弱質不禁露幽懐欲訴風空庭聊取媚傍石若為容黃菊紛相應餐英未許同鍾惺詠秋海棠墻壁固吾分烟霜亦是恩光輕偏到蒂命薄幸餘根笑泣誰能喻榮衰不敢論年年秋色下幽獨自相存七言絶句原明俞琬綸詠秋海棠薄羅初試怯風淒小樣紅妝著雨低一叚妖嬈描不就非關子美不能詩春色先應到海棠獨留此種占秋芳稀疎㸃綴猩紅小堪佐黃花薦客觴别錄原性好隂而惡日一見日即瘁喜淨而惡糞宜盆栽寘南墻下時灌之枝上有種落地明年自生根夏便開花四圍用碎瓦鋪之則根不爛老根過冬者花更茂浸花水飲之害人御定佩文齋廣羣芳譜卷三十六
