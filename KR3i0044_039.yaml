body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷三十七花譜玉蘂按宋祁曰維揚州后土廟有花正白曰玉蘂王禹稱愛賞之更稱曰瓊花曾慥曰今瑒花即玉蘂花魯直更其名為山礬皆非也今以周必大玉蘂辨證為據分為三譜諸説詳載於後以備參考原周必大玉蘂辨證條蔓如荼䕷冬凋春茂柘葉紫莖玉蘂花苞初甚微經月漸大暮春方八出鬚如氷絲上綴金粟花心復有碧筒狀類膽瓶其中别抽一英出衆鬚上散為十餘蘂猶刻玉然增全芳備祖玉蘂枝條髣佛葡萄葉類柘葉之尖圓梅葉之厚薄花類梅而萼瓣縮小心微黃類小淨瓶暮春初夏盛開葉獨後凋其花白玉色其香殊異其髙丈餘是名玉蘂彚考原劇談録上都安業坊唐昌觀舊有玉蘂花甚繁每發若瑤林瓊樹元和中春物方盛車馬尋玩者相繼忽一日有女子年可十七八衣繡緑衣乘馬峩髻雙鬟無簪珥之飾容色婉約迥出於衆從以二女冠三女僕僕者皆丱頭黃衫端麗無比既下馬以白角扇障面直造花所異香芬馥聞於數十步之外觀者以為出自宫掖莫敢逼而視之佇立良久令小僕取花數枝而出將乘馬回謂黃冠者曰曩者玉峰之約自此可以行矣時觀者如堵咸覺煙霏鶴唳景物輝煥舉轡百步有輕風擁塵隨之而去須臾塵滅望之已在半天方悟神仙之遊餘香不散者經月餘日時嚴給事休復元相國劉賓客白醉吟俱有聞玉蘂院真人降詩增李德裕招隱山觀玉蘂樹詩注內署沈大夫所居閣前有此樹每花落空中回旋久之方集庭際大夫草詔之夕皆邀豫同玩原蔡寬夫詩話李衛公玉蘂花詩云玉蘂天中樹金鑾昔共窺注以為禁林有此木吳人不識自文饒賞玩始得名此為潤州招隱山作也碑今裂為四假在通判廳中而招隱無復有此花矣詢之土人皆莫知為何物或云即今揚州后土祠瓊花是已自王元之始易其名晏元獻常以李善文選注質之曰瓊乃赤玉與此花不類也漁隱叢話沈傅師奉酬浙西尚書九丈招隱山觀玉蘂戲書即事見懷之作丹徒令書其後云招隱玉蘂花以二公詩著名纍經兵燬花偶存而刻本久失好事尋訪每不滿意住持置弗問者幾人矣普覺來主法席求用治刻本礲石重鐫遊客玩花讀詩頓還三百年舊觀良足嘉美自晉宋招隱名甲京口古松修竹清泉幽洞播在談詠誇詡勝絶邇者採伐童赭實不副名覺師培植掃剔立志弗倦加以年序蒼翠環合景物增邃師與此寺此詞同永其傳尚勉之哉增髙齋詩話唐人題唐昌玉蘂詩云一樹瓏鬆玉刻成飄廊點地色輕輕女冠夜覓香來處惟有階前碎月明今瑒花即玉蘂花也介甫以比瑒謂當用此瑒字蓋瑒玉名取其白耳魯直又更其名為山礬謂可以染也廬陵假謙叔多聞士也家藏異書古刻至多有楊汝士與假二十二帖云唐昌玉蘂以少故見貴耳自來江南山山有之土人取以供染事不甚惜也則知瑒花之為玉蘂斷無疑矣傅子容見此帖乃作絶句云比瑒更礬總未佳要須博物似張華因觀異代前賢帖知是唐昌玉蘂花余放浪林泉之日久矣屢從樵夫野叟聞所謂鄭花者指其木謂余曰此鄭木也其葉如凍青髙二三丈或有小者亦丈餘暮春開花如凍青花雖香而甚烈全不旖旎但山谷云江南野中有一種小白花木高數尺春開極香與余所見全不類韻語陽秋江南野中有小白花木高數尺春間極香土人呼為瑒花瑒玉名取其白也魯直云荆公欲作傳而陋其名豫謂名曰山礬野人取其葉以染黃不借礬而成色故以名爾嘗有絶句云髙節亭邊竹已空山礬獨自倚春風是也近見曾端伯髙齋詩話云此花即唐昌玉蘂花也所謂一樹瓏鬆玉刻成飄廊點地色輕輕者以余觀之恐未必然玉蘂佳名也此花自唐流傳至今當以玉蘂得名不應舍玉蘂而呼瑒魯直亦不應舍玉蘂而呼山礬也豈端伯别有所據耶容齋隨筆物以希見為珍不必異種也長安唐昌觀玉蘂乃今瑒花又名米囊黃魯直易山礬者在江東彌山亘野殆與榛莽相似而唐昌所産至於神女下遊折花而去以踐玉峰之期不特俗士罕見雖神仙亦不識也玉蘂辨證唐人甚重玉蘂故唐昌觀有之集賢院有之翰林院亦有之皆非凡境也豫往因親舊自鎮江招隱來遠致一本種之軒檻再歲始著花不久當成樹花蘂猶刻玉然花名玉蘂乃在於此宋子京劉原父宋次道博洽無比不知何故疑為瓊花王元之知揚州但言未詳何木俗呼為瓊花子京何故以誣元之蔡君又引晏同叔之言以為證甚無謂也劉夢得雪蘂瓊絲之句最為中的何必拘李善赤玉為之注耶􅙢音陳南史劉杳傳所謂􅙢酒者豫嘗得醖法芳烈異常山谷似不必以杳傳為據循俗訛􅙢作鄭而江南鄉音又呼鄭為瑒復疑未安於是創山礬之名然二詩并序初未嘗及玉蘂止因好事者偽作唐人帖故曾端伯洪景盧皆信之其實諸公猶未見此花所謂信耳而不信目也以玉蘂為瑒起於曾端伯豫與假謙叔之子元愷同里巷往還至熟其父初無楊汝士帖小説難信類此原全芳備祖戴顒字仲若捨宅為招隱寺寺在京口放鶴門外古竹院相望數里孤處於萬山荒涼之顛所由山徑石卵纍纍不絶如線是名招隱寺有米元章𨽻碑以紀仲若之出處方丈有閣號招華梁昭明選文於中閣之左有亭名虎跑其泉清泛閣之右有亭名玉蘂巍扁其上亭之下有玉蘂二株對峙一架土人僉言此花自唐迄今天下只二株亦猶瓊花之於維揚千餘年間凡幾遭兵燬幸存今唐長安白玉等觀及御史所居閣前往往不可稽考而僅餘此寺雖然李德裕沈傅師詩句可以究其終始欲天下皆知此花非山礬非瓊花其敻出鮮儔而自成一家也故詳紀其本末云長安志安業坊唐昌觀舊有玉蘂花乃唐昌公主所植集藻五言古詩原唐王琪玉蘂花玉蘂生禁林地崇姿亦貴散漫溪谷中蓬茨復何異清芬信幽遠素彩非妖麗蒼煙蔽山日瓊瑤為之晦歲久自扶疏巖深愈幽邃請觀唐相吟俗眼無輕視唐昌觀中樹曾降九天人鑾駕久何許雪英如舊春豈無遺佩者來效捧以顰七言古詩增宋徐積玉女花二首并序部使者林公作玉蘂二詩同使趙公屬和亦以見命因吟之為玉女焉楊花可與名玉妃楚花可與名玉女天上瑤臺是本居人在月宫合同處一點難容赤水霞平生冷笑巫山雨此女持身色太嚴玉璧如盤求不許國艷雖殊情太少蛾睂不畫雙瞳瞭新就明河洗面來更佩明珠踏瑤草不用朱鸞與紫霞玉麒麟駕白雲車君看面上都無邪更看身上都無瑕越王國女金可邀卓王孫女琴可招更有秦王家弄玉嫁人只被愛吹簫原鄭域維揚后土廟瓊花安業唐昌宮玉蘂判然二物本不同喚作一般良未是瓊花雪白輕壓枝大率形模八仙耳山溪行路多見之樵夫摧殘如獮剃比之玉蘂似實非金粟氷絲那有此花鬚中有碧膽瓶别出瓏璁高半指清馨靜夜衝九天招引瑤臺玉仙子乘風躍馬汗漫遊偷折繁香分月姊紫莖柘葉荼䕷條少到尋常人眼底翰林內苑集賢閣雨露承天近尺咫後人不識天上花又把山礬輕擬比葉酸而澀供染黃不著霜縑偏入紙江鄉老少知此名鄭􅙢瑒音無正字方言土諺隨舌訛鳥馬成焉固應爾五言律詩原唐李德裕招隱山觀玉蘂樹戲書即事奉寄江西沈大夫閣老玉蘂天中樹金閨昔共窺落英間舞雪密葉乍低帷舊賞煙霄遠前歡歲月移今來想顔色還似憶瓊枝沈傅師奉酬浙西尚書九丈招隱山觀玉蘂樹戲書即事見懷之作曾對金鑾直同依玉樹隂雪英飛舞近煙葉動搖深素萼年年密衰容日日侵勞君想華髮僅欲不勝簪增羊士諤故蕭尚書癭柏齋前玉蘂樹與王起居吏部孟員外同賞柏寢閉何時瑤華自滿枝天清凝積素風暖動芬絲留步蒼苔暗停觴白日遲因吟茂陵草幽賞待妍詞七言律詩增宋徐積瑤真詩二首有序淮南轉運林公次中所居之府有花一株舊名玉蘂公改曰瑤真即瓊花之别本也瓊赤玉也名其花者蓋誤矣楊楚二花同為一物而楚花獨得瑤名也真者天下之良貴也故因物而寓之則存乎其心者不問可知蓋未嘗不在乎其真也既名其花遂名其館謂山陽學官曰子能賦之否乎於是得律詩二章其亦庶乎述而賦之也此花所在宜開館彼玉維瑤合比君每到黃昏成淡月却臨曉後作團雲人間偽采何如質物裏孤芳自勝羣應笑馬嵬坡下女太真為號繫黃裙不知記得瑤林否故國曾陪閬苑春色貌易分渾是正性情雖辨總歸真紅塵世上無雙物白雪宮中第幾人若問誰何名玉女一般嚴靜敵霜神原楊東山題玉蘂花才入平園便有聲唐昌觀裏久知名已堆玉盞分金粟更插銀花入翠罌蘿蔓春風滕薛長山礬香氣晉齊盟世間百卉應無限不遇王公枉一生增周必大去夏孫從之示玉蘂佳篇時過未敢賡和今年此花盛開輒次嚴韻并以新刻辨證為獻食菜曾叨三百囷種花重看一番新洞仙舊賞淪無迹工部高吟必有神疉雪雅宜歌白雪送春仍欲買青春向來偽帖今氷釋從此佳名編廣輪次韻廷秀待制玉蘂姑射山前雪照人長安水畔態尤真步搖翹玉中心整瓔珞塗金四面勻常笑荼䕷藏琅藥獨陪芍藥殿餘春自從唐氏來天女直到平園見後陳趙正則彥法司户沿檄而歸玉蘂已過追賦車字韻詩奉答春深遊客競繁華寶馬香輪帶麴車不為來看招隱樹有誰肯顧野人家飛飛粉蝶鬚相映皎皎銀蟾色共誇今得審言詩勝畫傳神何必趙昌花五言絶句增唐鄭谷中臺題玉蘂唐昌樹已荒天意眷文昌日晚微風起春時雪滿墻七言絶句原唐嚴休復聞玉蘂院真人降二首味道齋心禱玉宸魂銷冷眼未逢真不如滿樹瓊瑤蘂笑對藏花洞裏人羽車潛下玉龜山塵界何由覩蕣顔惟有無情枝上雪好風吹綴緑雲鬟武元衡唐昌觀玉蘂花琪樹年年玉蘂新洞中長閉彩霞春日暮落英鋪地雪獻花無復九天人張籍同嚴給事聞唐昌觀玉蘂院近有仙過因成絶句二首千枝花裏玉塵飛阿母宮中見亦稀應共諸仙鬬百草獨來偷折一枝歸五色雲中紫鳳車尋仙來到洞仙家飛輪回處無蹤迹惟有斑斑落地花劉禹錫和嚴給事聞唐昌觀玉蘂花下有遊仙二首玉女來看玉樹花異香先引七香車攀枝弄雪時回首驚怪人間日易斜雪蘂瓊絲滿院春羽衣輕步不生塵君平簾下徒相問長記吹簫别有人白居易酬嚴給事聞玉蘂花下有遊仙嬴女偷乘鳳下時洞中潛歇弄瓊枝不緣啼鳥春饒舌青瑣仙郎可得知惜玉蘂花有懷集賢王校書起芳意將闌風又吹白雲離葉雪辭枝集賢讐校無間日落盡瑤華君不知增元稹酬嚴給事聞玉蘂花下有遊仙弄玉潛過玉樹時不教青鳥出花枝的應未有諸人覺只是嚴郎卜得知原楊巨源唐昌玉蘂花晴空素艷照霞新香灑天風不到塵持贈昔聞將白雪蘂珠宫上玉華春楊凝唐昌觀玉蘂花瑤花玉蘂種何年蕭史秦嬴向紫煙時控綵鸞過舊邸摘花持獻玉皇前增宋徐鉉和賈員外戬見贈玉蘂花栽瓊瑤一簇帶花來便劚蒼苔手自栽喜見唐昌舊顔色為君判病酌金罍詩散句增宋楊萬里團酥刻玉比未暇雅靜居然不塵汙須信掇之天上竒細吐冰絲説心愫劉允叔江南春晚經行地賸有唐昌玉蘂花露彩煙絺無限態氷清玉潤白成葩劉克莊玉蘂春隂密琅玕晚暑清原唐劉禹錫鳳池西畔圖書府玉樹玲瓏景氣間宋趙清臣正是清燈深雨夜空傳玉蘂發春晴唐鄭畋小閣涼添玉蘂風瓊花聚八仙花附見譜內增澠水燕談揚州后土廟有瓊花一株潔白可愛歲久木大而花繁俗目為瓊花不知實何木也齊東野語揚州后土祠瓊花天下無二本絶類聚八仙色微黃而有香仁宗慶厯中嘗分植禁苑明年輒枯遂復載還祠中敷榮如故淳熙中壽皇亦嘗移植南內逾年憔悴無花仍送還之其後宦者陳源命園丁取孫枝移接聚八仙根上遂活然其香色則大減矣今后土之花已薪而人間所有者特當時接本髣佛似之耳彚考增聞見雜録揚州后土廟有瓊花一株宋丞相郊構亭花側榜曰無雙謂天下無别株也廣陵志后土廟瓊花本大而花繁天下無之孫冕過維揚使人訪之謂山中甚多但歲苦樵斧野燒故木不能大而花不能盛遂不為人所貴復傷之以詩曰可憐遐僻地常化燎原灰其説蓋誤以聚八仙為此花耳聚八仙花雖類瓊花而瓊花之異者其香如蓮花清馥可愛雖翦折之餘韻亦不減此聚八仙之所無也韻語陽秋瓊花惟揚州后土祠中有之其他皆聚八仙近似而非鮮于子駿詩云百花天下多瓊花天上希結根托靈祠地著不可移八蔀冠羣芳一株攢萬枝而宋次道春明退朝録云瓊花一名玉蘂按唐朝唐昌觀有玉蘂花王建詩所謂女冠夜覓香來處惟有階前碎月明是也長安觀亦有玉蘂花劉禹錫所謂玉女來看玉樹花異香先引七香車是也唐內苑亦有玉蘂花李德裕與沈傅師草詔之夕屢同玩賞故德裕詩云玉蘂天中樹金閨昔共窺傅師和云曾對金鑾直同依玉樹隂是也招隱山亦有玉蘂花李德裕所謂吳人初不識因余玩賞乃得此名是也由是論之則玉蘂花豈一處有哉其非瓊花明也東坡瑞香詞有后土祠中玉蘂花之句者非謂玉蘂花止謂瓊花如玉蘂之白耳西溪叢語唐昌觀玉蘂花今之散水花揚州瓊花今之聚八仙但木老耳花經瓊花二品八命聚八仙六品四命山房隨筆揚州瓊花天下祇一本士大夫愛重作亭花側扁曰無雙德祐乙亥北師至花遂不榮趙棠國炎有絶句弔曰名擅無雙氣色雄忍將一死報東風他年我若修花史合傳瓊妃烈女中代醉編傳記所載揚州瓊花天下祇一本及觀西吳里語復云宋時德清嶽祠廡下有瓊花一本春時盛放每告朔設會特開數朵時號月旦花則彼時此花已有二本矣花史景定間濠州曾主簿入廣西宿某驛傍民舍主人邀坐丰儀甚雅庭有竒花數盆曾曰曾見廣陵瓊花否主人曰有即入折一枝以授曾持入驛回顧民舍無有矣視瓊花茅也集藻辨增宋鄭興裔瓊花辨瓊花天下無雙昨因北騎侵軼或謂所存非舊疑黃冠以聚八仙補種其處未知然否屬自合肥易鎮來此所覩郡圃中聚八仙若驟然過目大率相類及細觀熟玩不同者有三瓊花大而瓣厚其色淡黃聚八仙花小而瓣薄其色漸青不同者一也瓊花葉柔而瑩澤聚八仙葉粗而有芒不同者二也瓊花蘂與花平不結子而香聚八仙蘂低於花結子而不香不同者三也余尚未敢自信嘗取花雜示兒輩皆能識而别之始乃無疑適后土祠宇頽敝鳩工撤舊鼎為增建時當季夏非花放之日忽一枝敻然特開於其杪郡人競觀莫不嘉歎余生罕信竒詭倘非目擊則謂好事者誇誕今觀此靈豈非司花之神鑒豫之信心乎故為之辨以驗來者明郎瑛瓊花辨雍録辨梔子花即玉蘂花改之為山礬者王荆公以其花葉可以染黃不借礬而成色之故野客叢書又載揚州后土廟玉蘂花序文序文以玉蘂即瓊花也改之為瓊花者宋王元之之更也豫意瓊花在宋極名之勝今作詩與序者又皆宋人必不差矣使果一種則梔子江南到處有之胡為至貴而揚州者名傳千古耶及考揚志謂瓊花或云唐植今雍録亦以玉蘂唐惟長安一株元白等賦詩貴重又曰花白心黃三四月間開開時芬芳滿野高可數丈意即今之梔子千葉者耶但花大樹高如粉團耳不然何二書相符後世不傳惜江南未能收護使高大也况生于陕移于揚汴在彼亦自為竒矣但齊東野語以色微黃似與雍録一樹瓏鬆玉刻成小有間也昨見宋畫瓊花真似野八仙但多一頭九朵簇成者然亦未知孰是記增宋杜斿瓊花記余自京口過揚州尋訪舊事知世所傳后土瓊花在今城之蕃釐觀亟往謁蕃釐觀瓊花猶在然余聞紹興辛巳之交金人入揚州已揭其本而去何從復得此種也觀壁有諸公所紀載直排世俗偽謂道士以聚八仙嗣其名聚八仙葉瓣色香皆不類余曾不及見二花開時類不類不得知獨怪金人既揭其本復何從得此種也有老道士出鬚髮皓然自言生於崇寧間今八十有六載矣能敘今花本末余與對坐於花之亭西改容而問道士指花之根幹而言曰此某手所培護而至此者也指觀之大門而言曰此向之殿廬處也指所坐之亭曰此向之無雙亭處也花舊在無雙亭下殿西之北自紹興十五年向龍圖子諲以殿廬面勢狹小徙置轉後則花當殿西之南更三十一年知郡事劉澤復命移花於殿之前即今之花處乃是歲八月十五日也初二十四年時直花之東南離三四尺許倏然一小根枝葉日茂其下大徑寸至其放時鄉疏背密移之不敢易又十一月金人渡淮趨揚州直入觀揭花本去其小者翦而誅之于時某方避亂奔走初亦不知也寇既退某始以十二月來舊地是時訓練官成平領兵馬依觀屯寨其軍人接某曰觀主至耶瓊花已壞鹵手旁有一小根微見地面可識認非其種乎某心知之難以口舌定惟告以瓊花若剔其根皮投之火則臭達于鼻于是剔其根皮投之火果臭達于鼻軍人皆喜歎某即默禱后土移植之花處日往護之越明年二月既望夜中天大雷雨某詰朝起視兩廡蚯蚓布地皆滿往所植根旁則勃然三蘖從根出矣自是遂條達不已至于今三十年之久見其婆娑偃蓋常不忘斷根時也道士既言余為之竦然曰盛衰感應之理豈可不知其故哉夫他日不生小根而倏然起于二十四年兆先見也去辛巳八年者以養稚也離離且三四尺許者不併揭也翦而復萌者終盛也天大雷雨蚯蚓布地而三蘖勃然者蚯蚓伏深壤陽氣驟趣之則動植俱奮也以人事言之不知趙孤漢孤之不亡何以異是自微而存存而有力扶植成就以至後日則程嬰丙吉之功道士宜獲其報今之享上壽倘有相之者余恐道士亡後來者無以知今花本末而其疑不解也故序而書之其間歲月事故之參錯煩委有可附見者悉不敢略以知其不誣若其他靈異甚多未暇及也道士姓唐名大寧余實金華杜斿紹興二年記賦增宋張問瓊花賦揚州后土祠瓊花經兵火後枯而復生今歲尤盛邦人喜之以為和平之證也乃賦之賦曰偉赤社之會都滋黑壤之饒沃萃溫潤之秀氣發英華于地軸是為瓊花異于凡木香凝媚服之蘭色瑩光明之玉托根后土之祠擢幹蜀岡之麓曾不知其歲年亦弗紀于圖録欲問司花之女但注詩人之目謂天下之一株冠羣葩之芬馥豈唐昌之餘芳載後庭之遺曲者乎當其風入琳宮春歸華屋萼拆青綃色凝寒緑枝珊瑚兮鏤雪氷蘂珠璣兮爛金粟真庭靜兮朝曦麗其纖穠仙籞深兮瑞露滋其芬郁瑤林瑰艷之蔥蒨閬苑琪英之耀煜若蓋而繡似璧而縠如黃琮瑚璉璀燦于禋壇而文珠珮環玲瓏乎衣鞠桂娥競爽借月影于冰蟾阿母來觀下雲軿于皓鵠儷靚容于茉莉抗素馨于薝蔔笑玫瑰于塵凡鄙荼䕷于淺俗惟水仙可並其幽間而江梅似同其清淑真絶代之無雙久彌芬于幽谷若乃聚八仙之殊種玉蝴蝶之别族葉扶疏而韻不勝色近似而香不足猶瑾瑜琬琰之粹溫豈碔砆堅珉之碌碌蓋艷冶爭妍者衆之所同而蠲潔尚白者我之所獨是以兵火不能焚邊塵不能辱根常移而復還本已枯而再續疑神明之護持偏化工之茂育抑將薦瑞于太平而致祥于玉燭元郝經瓊花賦并序中統二年春三月制使李公致瓊花數枝是年冬十月而夢二客相邀至維揚之后土祠飲於花下嘯歌為樂既醉而覺乃作賦焉辭曰江風吹雲枕壓霜月神不棲目軼思超越栩栩曵曵境與世别天宇闢凡蹤絶歷蘭路開桂闕飄飄乎馮高御空不知身之幾何而造乎虛白已而扶搖頡頏恍惚莫量疑在鈞天亦如巫陽孤鶴飛來縞衣玄裳翩然負豫背風翺翔下視淮海雉堞相望貝錯珠瑩接屋連牆繡簾雕櫳綺疏緑房十里一市金紗煌煌混灝海之魚龍駭飛埃而陸梁忽丹霄之二仙翥青鳥以相將指仙花以為言可釂月而飛觴是閬苑之仙根來瑞世而呈芳拆膩雪以搖碧刻春氷而帶黃噴蘂蝶於花心引輕絲而不狂天風收其落英不委地而飄揚彼衆卉則俗死漫紅妖而緑倡玉隂婆娑徙倚徜徉清香忽來莫知其方乃誦明月之曲歌窈窕之章倚歌橫簫鏘鳳鳴凰挹芳瀾之浩渺傾墜露之淋浪卷瓊瑤於杯盤吸霜露於肺腸欲折枝而不敢懼真宰之或傷且對花而舉酒澆遁世之茫茫倐焉玉女隔花而語髣佛花神是為花主謫自瑤華以臨后土翦氷綃以為裳染麝塵於金縷拂白霓而下征曵秋霞而輕舉現仙姿於塵寰寓風神於月府且曰有妹其字飛瓊適來瑤池善為新聲與君佐酒以薦豫誠遽作穿雲振搖瓊英説仙家之幽杳詠蓬壺與赤城閲花朝以逍遙駐芳姿以輕盈嗟胡為乎斯世而沉冥於此生也時豫既醉二仙亦去花落尊空歌殘玉樹斗轉參橫脫兔驚寤餘香冉冉月滿窗戶乃為記夢之歌歌曰玉宇春兮花始開與二仙兮飄然而來花亦喜兮搖搖乎瓊瑰掇飛英兮泛酒杯飛仙為我兮歌以纍纍亦既醉兮胡不歸花滿袖兮香滿幃謂豫是夢兮余不疑嗟時之人兮孰非夢之為五言古詩增宋韓琦后土廟瓊花維揚一株花四海無同類年年后土祠獨此瓊瑤貴中含散水芳外圍蝴蝶戲酴醿不見香芍藥暫多媚扶疏翠蓋圓散亂真珠綴不從衆格繁自守幽姿粹嘗聞好事家欲移京轂地既違孤潔情終誤栽培意洛陽紅牡丹適時名轉異新榮托舊枝萬狀呈妖麗天工借顔色深淺隨人智三春愛賞時車馬喧如市草木稟賦殊得失豈輕議我來首見花對花聊自醉七言古詩增宋徐積瓊花歌春皇自厭花多紅欲得花顔如玉容春皇青女深相得先教斂與秋霜色乃有雪月供光星榆獻白斗量銀漢琉璃濕人間美玉搗作灰荆山崑山鬼神泣天上有人名玉女投壺之外能為素姑射神人解種花先須此物為根芽天罅地竅掬精粹蟾身驪頷偷光華其時正值天地交二氣上下隂陽調此花孕育得其正其間邪氣無纖毫所以其色為正色出乎其類拔乎萃一如君子有諸內睟然其色見於外三月將盡四月前百花開盡春蕭然揚州日暖花開未春香不動花房閉仙掌秋高玉露濃鮫人泣下珠璣碎黃鸝本是花中客啼盡好聲求不得春皇費盡養花心春風使盡開花力春歸鶯去花始開誰人放出深閨來唐家天子太平時太真浴罷華清池紅裳繡𬒮厭君眼更作地仙披羽衣麻姑睡起蓬萊島風吹玉面秋天曉洛川女子能長生水中肌骨成瑤瓊褒姒不見諸侯兵盡日不笑如無情宋玉移家安在哉東鄰不畫胭脂腮卓文君去成都速錦衣金翠慵裝束吹簫容貌果何如見説其人名弄玉若比此花俱不足淫妖怪艷文之纍一如婦人有賢德不為邪色亂正色孀居之女能自持終身惟著大練衣又如正色立朝者不以柔媚為姦欺以此論之乃可重人之不正將胡為論德乃是花之傑論色乃是花之絶洛陽花名古云好看花須向揚州道君不見去年花下吹黑風霹靂閃電搜玉龍此時半夜花光中不覺屈曲蟠長虹又不聞天上琳琅樹種在煙霞最深處白雲枝葉白玉英此花莫是琳琅精此花愛圓不愛缺一樹花開似明月襄王半夜指為雲謝女黃昏吟作雪杏花俗艷梨花粗栁花細碎梅花疏桃花不正其容冶牡丹不謹其體舒如此之類無足竒此花之外更有誰世非紅紫不入眼此花何用求人知詩人自與花相期長告年年乞一枝方嶽非瓊花舊聞瓊花無與雙專竒擅美名此邦江南清夢入詩府安得一念令心降去年騎鶴揚州住斗酒屢眠雲霧窗月寒雪冷花未吐正爾俗葉凡株樁心期妙處在真實不假羽節青霓幢今春訪花吾第一自折繁枝盛翠缸橫看倒睨掉頭語前詩後賦何其哤真珠碎簇玉蝴蝶直與八仙同一腔聞名見面足笑莞強為花辨幾愚憃有如巨賢雜羣小望而可識為竒厖陳餘張耳信相似一等人耳無純尨忠耶佞耶豈難别祝鮀不類關龍逢試持此論訊后土謂豫不信如長江再用韻酬朱行甫夢中翠鳳飛來雙駕言后土遊名邦手持玉簡判紅紫斂祍欲以詩城降粹容喜動日月角揖我入對玲瓏窗為言瓊花返蓬閬下界久矣無根樁乃今存者贋本耳補亡以紿青油幢人間識真蓋亦寡載酒嘉賔寧論缸黃冠誕譎謹勿信傳訛聽舛其言哤為花作辨誰氏子謬妄譜入黃鐘腔耳庸目陋惑世俗其罪不能三赦憃朱雲之孫亦竒士文有氣骨豐而厖謂瓊赤玉匪為白不比俗論紛茸尨詩筒往來捷于響夜發嚴鼓聲逄逄咨爾嶽為謝此老壯哉寸管飛濤江元趙文瓊花上天歌朔風吹沙堆浪白二十四橋沈冷月顛風夜半撼蕪城雪萼瓊絲破空碧金瓶歲歲獻君王玉罌泛酒連花香明光殿暗沙漠逺人自無情花斷腸落蘂飛天識天路何如拔樹飛升去唐昌遊女再歸來城中只有瓊花露江南俘客吟如呌想像裁辭不成調天宮夜半按霓裳玉女擎花紫皇笑謝應芳瓊花行送盛克明教授歸維揚揚州好花非不多奈爾絶品無雙何水沈香漬素玉蘂琉璃滑葉青瑤柯東風二月花時節二十四橋香浸月小山叢桂避芳塵東閣官梅褪殘雪向來名士多品題括香御史今亦知何日移春獻天子不負此花天下竒七言律詩增宋劉敞無雙亭觀瓊花贈聖民東方萬木競紛華天下無雙獨此花那有雪英凌暖日不為琪樹隔流沙祠城寂寞春空老江雨冥濛日易斜仙品國香俱妙絶少傾髙興盡流霞方嶽約黃成之觀瓊花豫不及從以詩代簡杜宇聲中鬢欲華春風將緑又天涯欠隨江夏無雙士共看揚州第一花想像煙雲人跨鶴淋漓詩句字棲鴉蹇驢不管唐衫濕醉兀歸鞍暮雨斜王洋瓊花愛竒造物翦瓊瑰為鎮靈祠特地栽事紀揚州千古勝名居天下萬花魁何人斫却依然在甚處移來不肯開浪説八仙模樣似八仙安得有香來鄭良嗣和王洋瓊花玉立祠庭久不衰俄經翦伐重能栽端知妙護有神力更喜當時殲厥魁種不他傳焉得子年將豐稔輒多開天生異物初無伴只許翻階近侍來徐意一謝瓊花瓊㽔走送寶瓶花愧乏詩情洊拜嘉一種清香來月殿十分雅態出仙家細看后土春氷薄未覺劉郎日影斜擬跨胎禽塵幾隔珠簾十里自繁華賈似道瓊花寂寂蕃釐觀裏花伊誰封殖得名嘉應知天下無他本惟有揚州是爾家種雪春溫團影密攢冰香重壓枝斜倚闌莫問榮枯事付與東風管物華王月浦瓊花蕃釐觀裏瓊花樹天地中間第一花此種從何探原委東風無處著繁華千鬚簇蝶團清馥九萼聯珠異衆葩幾見朱衣和露翦金瓶先進帝王家五言絶句增宋俞清老瓊花因此瓊花發維揚勝洛陽若無三月雨占斷一春香七言絶句增宋王禹稱后土廟瓊花詩二首并序揚州后土廟有花一株潔白可愛且其樹大而花繁不知實何木也俗謂之瓊花因賦詩以狀其態云誰移琪樹下仙鄉二月輕冰八月霜若使壽陽公主在自當羞見落梅妝春冰薄薄壓枝柯分與清香是月娥忽似暑天深澗底老松擎雪白婆娑劉敞移瓊花詩并序自淮南遷東平移后土廟瓊花植於濯纓亭此花天下只一株耳永叔為揚州作無雙亭以賞之彼土人别號八仙花或云李衛公玉蘂花即此種淮海無雙玉蘂花異時來自八仙家魯人未覩天中樹乞與春風賞物華秦觀瓊花無雙亭上傳觴處最惜人歸月上時相見異鄉心欲絶可憐花與月應知呂本中謝人送瓊花凝煙欲滿讀書窗忽有瓊花樹小缸更喜風流好名字百金一朵號無雙斷腸風味久難尋尚有名花寄此心折盡春枝春已晚只宜良月不宜隂趙師秀瓊花香得坤靈秀氣全蘂珠團外蝶翩翩親曾后土祠中看不是人間聚八仙顔芝宿瓊花后土祠中三月暮瓊花放後有蜂來東君不怕春歸去留待詩人一夜開元尹廷髙瓊花無雙亭下萬人看欲覓殘英一片難夜靜月明猿鶴唳誤翻玉雪墮闌干舒頔蕃釐觀天上竒花玉色浮祇留一種在揚州如今后土無根蒂蜂蝶紛紛各自愁楊維楨宮詞后土璚仙屬內家揚州從此絶名花君王題品容誰並萼緑宮中萼緑華詩散句增元宋無雪讓玲瓏巧冰銷刻鏤瑕人間惟獨爾地上更何加萬花殊寥落羣芳避艷邪玫瑰誠執御芍藥等泥沙宋韓琦千點真珠擎素蘂一環明玉破香葩陳傅良且將書寄南來雁為問瓊花果是非唐曹唐雲隴瓊花滿地香元郝經東風吹落瓊花雨詞增宋劉克莊昭君怨后土祠中標韻天上人間一夲道號玉真妃字瓊姬我與花曾半面流落花前重見莫把玉簫吹怕驚飛向子諲醜奴兒無雙亭下瓊花樹玉骨雲腴傾國稱姝除却揚州是處無天教紅藥來驂乘桃李先驅總作花奴翠擁紅遮到玉都又虞美人去年不到瓊花底蝶夢空相倚今年特地趂花來却欲不教同醉過花開花知此恨年年有也伴人俱瘦一枝和淚寄東風應把舊愁新恨入睂峯又去年雪滿長安樹望斷揚州路今年看雪在揚州人望蓬萊深處若為愁而今不恨伊相誤自恨來何暮平山堂下舊嬉遊只有舞春楊栁似風流朝補之下水船百紫千紅翠惟有瓊花特異便是當年唐昌觀中玉蘂尚記得月裏仙人來賞明日喧傳都市甚時又分與揚州本一朵氷姿難比曾向無雙亭下半酣獨倚似夢覺曉出瑤臺十里猶憶飛瓊標致馬莊父滿庭芳共慶春時滿庭芳思一枝玉蘂非常少年遊冶何但折垂楊曾向瑤臺月下逢解佩玉女翻香風光好真珠簾捲都勝早梅芳人間無比並蝴蝶樹爭敢相方既春歸後此意難忘夜夢揚州萬玉飛魂共紫燕歸梁須行樂馬家花圃不肯醉紅妝鄭覺齋揚州慢弄玉輕盈飛瓊淡濘襪塵步下迷樓試新妝才了注沉水香毬記曉翦春冰馳送金瓶露濕緹綺新流甚中天月色被風吹夢南州樽前相見似羞人蹤迹萍浮問弄雪飄枝無雙亭上何日重遊我欲纒腰騎鶴煙霄遠舊事悠悠但憑闌無語煙花三月春愁趙以夫揚州慢十里春風二分明月蘂仙飛下瓊樓看氷花翦翦擁砌玉成毬想長日雲階佇立太真肌骨飛燕風流斂羣芳清麗精神初付揚州雨窗數朵夢驚回天外香浮似閬苑花神憐人冷落騎鶴來遊為問江淮風景長空淡煙水悠悠又黃昏羌笛孤城吹起新愁周密瑤花朱鈿寶玦天上飛瓊比人間春别江南江北曾未見謾擬梨雲梅雪淮山春晚問誰識芳心髙潔消幾番花落花開老了玉關豪傑金壺翦送瓊枝看一騎紅塵香度瑤闕韶華正好應自喜初識長安蜂蝶杜郎老矣想舊事花須能説記少年一夢揚州二十四橋明月張翥喜遷鶯東風吹盡但一片緑隂空留春恨后土祠荒飛瓊謫久還喜玉容堪認二十四橋夜月二十四番花信便載酒怕芳菲易老陰晴難穩嬌困羞起晚佇立畫闌淨洗間脂粉沉水濃薰蜂黃淡染自有絶塵香韻也知世間無對肯許浮花相近鳳簫遠待數枝折與玉峰人問劉克莊賀新郎辜負東風約憶曾將淮南草木筆端籠絡后土祠中明月夜忽有瑤姬跨鶴迥不比水仙低弱天上人間惟一本倒千鍾瓊露花前酌追往事怎忘却移根應費仙家藥謾回頭關山信斷堡城笳作問訊而今平安否莫遣玉簫驚落但畫卷依稀描著白髮愧無渡江曲與君家子敬相酬酢新舊恨兩交錯馬莊父賀新郎客裏傷春淺問今年梅蘂因甚化工不管陌上芳塵行處滿可計天涯近遠見説道迷樓左畔一似江南先得暖向何郎庭下都尋遍辜負了看花眼古來好物難為伴只瓊花一種傳來仙苑獨許揚州作珍産便勝了千千萬萬又却待東風吹綻自昔聞名今見面數歸期屈指家山晚歸去説也稀罕施藝隱摸魚兒栁蒙茸暗凌波路煙霏慘淡平楚七香車駐猊璚掩遙認翠華雲母芳景暮鴛甃悄銖衣來按飛瓊舞凄涼洛浦漸玉漏沉沉清隂滿地乘月步虛去銷凝處誰説三生小杜翔螭聲斷簫鼓情知禁苑酥塵涴羞與倡紅同譜春幾度想依舊苔痕長印唐昌土風流千古人在小紅樓珠簾半捲香注玉壺露山礬花原作藝香入卉譜按山礬木本非古所謂藝草自沈括筆談以為七里香而李時珍本草綱目遂以為藝香不知藝草與山礬或皆有七里香之名而反疑藝香之非一種也誤矣今分山礬别見卉譜花譜藝草即海桐原山礬一名􅙢花一名瑒花周必大云􅙢音陳出南史荆俗訛􅙢為鄭呼為鄭礬江南又訛鄭為瑒也瑒音暢一名春桂一名七里香黃庭堅易其名為山礬增學圃餘疏山礬一名海桐樹婆娑可觀花碎白而香宋人灰其葉造黝紫色本草生江淮湖蜀野中樹大者株髙丈許其葉似巵子葉生不對節光澤堅強略有齒凌冬不雕三月開花繁白如雪六出黃蘂甚芬芳結子大如椒青黑色熟則黃色可食其葉味澀人取以染黃及收豆腐或雜入茗中彚考增三栁軒雜識山礬為幽客瓶花譜山礬四品六命瓶史山礬潔而逸有林下風魚玄機之緑翹也原春風堂隨筆辛丑南歸訪舊至南浦見堂下盆中有樹婆娑鬱茂問之曰此海桐花即山礬也因憶山谷賦水仙花云山礬是弟梅是兄但白花爾却有歲寒之意四川志卭縣出山礬花色白如雪香氣極遠集藻七言古詩增宋清非居士黃龍山中春事晚山谷道人上山坂鼻端山礬花氣濃怪底經行衆芳苑一種風姿極可人幽姿正色相鮮新素馨籍甚不足意黃淡羞澀終非真明許伯旅題林周民山礬圖山礬入畫古所少我昔見之倪瓚家問君何處得此本水屋十月來春花東風著樹香滿雪長鬚露滴金粟結一枝獨立霜霰餘已覺江梅是同列惜哉此物知者稀深林大谷多所遺牧堅樵童爾何苦翦伐每同荆棘歸林君本是鰲頭客髙卧雲間人莫識酒酣揮袖卷新圖一笑西山眼中碧五言律詩增宋薛季宣􅧕花唐玉蘂花介甫謂之瑒花魯直謂之山礬武昌山中多有之其葉可供染事土人用之釀酒􅧕緑吐瑤琨冷然郭外村仙人來玉蘂文士立山礬芳澤留絲素風流付酒樽莫言瑒酷似香處不勝繁五言絶句增宋趙汝鐩山礬七里香風遠山礬滿嶺開野生人所賤移動却難栽七言絶句原宋黃庭堅題髙節亭邊山礬花并序江南野中有一種小白花本高數尺春開極香野人謂之鄭花王荆公嘗欲作詩而陋其名豫請名曰山礬野人采鄭花葉以染黃必借礬而成色故名山礬海岸孤絶處補陀山譯者謂小白花山豫疑即此花爾不然何以觀音老人端坐不去耶髙節亭邊竹已空山礬獨自倚春風二三名士開顔笑把斷花光水不通北嶺山礬取次開輕風正用此時來生平習氣難料理愛著幽香未擬回增曾幾山礬青雲葉底雪花繁只與田家插鬢鬟不枉涪翁初著句能令大士久開顔謝薖山礬一樹山礬宫樣妝曉風微送雨中香鼻端空寂誰知許莫怪狂風取次狂方嶽山礬只有江梅合是兄水仙終似虢夫人季方正爾難為弟每恨詩評未逼真原張季靈山礬漫山白蘂殿春華多貯清香野老家須向風前招蝶使祕通家籍省梅花鄒艮山山礬折來隨意插銅壺能白能香雪不如匹似梅花輸一著枝肥葉密欠清癯祝穆山礬玲瓏葉底雪光寒春盡香熏草木間移植小軒共燕坐恍疑身在普陀山詩散句原宋曾幾可惜不當梅蘂破幽香合在弟兄間增楊萬里玉花小朵是山礬香殺行人只欲顛原明孫蕡山礬花落春風起詞原宋徐俯南柯子細葉黃金嫩繁花白雪香共誰連璧向河陽自是不須湯餅試何郎婀娜璁瓏髻輕盈淡薄妝莫令韓壽在伊傍便逐遊蜂驚蝶過東牆别録原種植此物最易生春月分而壓之俟生根移種御定佩文齋廣羣芳譜卷三十七
