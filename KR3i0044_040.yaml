皮梗花氣味功用並同能活血消腫利小便解毒彚考增齊諧記京兆田真兄弟三人共議分財生資皆平均惟堂前一株紫荆樹共議欲破三片明日就截之其樹即枯狀如火然真往見之大驚謂諸弟曰樹本同株聞將分斫所以憔悴是人不如木也因悲不自勝不復解樹樹應聲榮茂兄弟相感合財寶遂為孝門真仕至大中大夫老學菴筆記僧行持明州人有高行而喜滑稽嘗在餘姚貧甚有頌曰大樹大皮裹小樹小皮纒庭前紫荆樹無皮也過年天台山記寒巖下有通海池植鐵色紫荆樹集藻五言絶句增唐韋應物見紫荆花雜英粉已積含芳獨暮春還如故園樹忽憶故園人七言絶句增唐元稹紅荆庭中栽得紅荆樹十月花開不待春直到孩提盡驚怪一家同是北來人詩散句增唐杜甫風吹紫荆樹色與春庭暮晉陸機三荆歡同株别録原種植冬取其莢種肥地春即生又春初取其根傍小條栽之即活性喜肥惡水製用花未開時採之滚湯中焯過鹽漬少時點茶頗佳或云花入魚羮中食之殺人增廣州志紫荆可以作床紫薇增湧幢小品紫薇一名滿堂紅原紫薇一名百日紅四五月始花開謝接續可至八九月故名一名怕癢花人以手爪其膚徹頂動搖故名一名猴刺脫樹身光滑花六瓣色微紅紫皺蒂長一二分每瓣又各一蒂長分許蠟跗茸萼赤莖葉對生一枝數穎一穎數花每微風至妖嬌顫動舞燕驚鴻未足為喻唐時省中多植此花取其耐久且爛漫可愛也紫色之外又有紅白二色其紫帶藍熖者名翠薇于若瀛曰花攢枝杪若翦輕縠盛開時爛熳如火幹無皮愈大愈光瑩枝葉亦柔媚可愛彚考原唐書百官志開元元年改中書省曰紫薇省中書令曰紫薇令增宋史五行志政和四年荆門軍紫薇木連理酉陽雜俎紫薇北人呼為猴郎達樹謂其無皮猿不能捷也北地其樹絶大有環數夫臂者原東坡詩注虛白臺前有紫薇兩株俗傳樂天所種增湘山野録咸平中翰林李昌武宗諤初知制誥至西掖追故事獨無紫薇自别野移植聞今庭中者院老吏相傳猶是昌武手植晏元獻寫賦於壁曰得自羊野來從召園有昔日之絳老無當時之仲文觀茂悅以懷舊指蔽芾以思人三栁軒雜識紫薇為高調客花經紫薇六品四命原學圃餘疏紫薇有四種紅紫淡紅白紫却是正色閩花獨紫薇作淡紅色最醜本野花種也白薇近來有之示異可耳殊無足貴集藻五言古詩增唐楊於陵郡齋有紫薇雙本自朱明接於徂暑其花芳馥庭宇之內迥無其倫豫嘉其美而能久因詩紀述晏朝受明命維夏走天衢逮兹三伏候息駕萬里途省躬既局蹐結思多煩紆簿領幸無事宴休誰與娛內齋有嘉樹雙植分庭隅緑葉下成幄紫花紛若鋪摛霞晚舒艷凝露朝垂珠炎沴晝方鑠幽姿間且都夭桃固難匹芍藥寧為徒懿此時節久詎同光景驅陶甄誠一致品彚乃散殊濯質非受彩無心那奪朱粵豫負羈縶留賞益踟蹰通夕靡云倦西南山月孤劉禹錫奉和郴州楊侍郎二丈玩郡齋紫薇花十四韻幾年丹霄上出入金華省暫别萬年枝看花桂陽嶺南方足竒樹公府成佳境緑隂交廣除明艷透蕭屏雨餘人吏散燕語簾櫳靜懿此含晚芳翛然忘簿領紫茸垂組綬金縷攢鋒穎露溽暗傳香風輕徐弄影苒弱多意思從容占時景得地在侯家移根近仙井開尊好凝睇倚瑟仍回頸遊蜂駐綵冠舞鶴迷煙頂興生紅藥後愛與甘棠並不學夭桃姿浮榮在俄頃宋歐陽修聚星堂前紫薇花亭亭紫薇花向我如有意高煙晚溟濛清露晨點綴豈無陽春月所得時節異靜女不爭寵幽姿如自喜音戲將期誰顧盻獨伴我憔悴而我不強飲繁英行亦墜相看兩寂寞孤詠聊自慰程俱秋花無幾尚有紫薇相對晚花如寒女不識時世妝幽然草間秀紅紫相低昂榮木事已休重隂閟深蒼尚有紫薇花亭亭表秋芳扶疏綴繁柔無復粉艷光空庭一飄委已覺巾裾涼手中蒲葵箑雖復未可忘仰視白日永凄其感冰霜七言古詩增明皇甫涍紫薇花行並序叔氏虞部貽余梧亭懷舊詩未遑報章秋日散步亭隅薇花爛目徘徊久之亭故余讀書處也昔嘗眷戀此花為之賦有曰清風時動明月微娟悠悠我心誰與晤言悲春華之不實絢紫閣而空傳履間庭以載歎時徙倚而屢遷垂貞嘉於餘藻永封殖於兹軒後余屢遊京臺纍踐華省淪飄河魏返迹敝廬顧瞻此花宛焉如昨而余白髮被鬢凄其改容春華之句永矣悼心貞嘉餘藻竟何徵耳因作紫薇花行以泄懷舊之思并以報叔氏云英菲窈窕緑窗前艷影扶疏翠戺連玉衡含照妍華夕金風弄彩泬寥天流風逝水驚離索十載幽棲對花萼無情羈宦却歸來有客傷秋歎榮落蘭宮桂殿鳳凰樓帝臺仙客恣攀遊可堪殘月鱸江夢不奈連雲騎省秋言追漁父賦歸歟寂寞蓬蒿掩敝廬旖旎繁英重入賦婆娑生意最愁余人情感物多惆悵白髮紅顔兩相向東籬併就菊松姿北山豈孤猿鶴望青蔥摛藻記甘泉潘陸春華此棄捐未忘溫室瓊瑤樹虛擬湘源杜若篇五言律詩原唐劉禹錫和令狐相公郡齋對紫薇花明麗碧天霞丰茸紫綬花香聞荀令宅艷入孝王家幾歲自榮落髙情方歎嗟有人移上苑猶足占年華增明薛蕙紫薇紫薇開最久爛漫十旬期夏日逾秋序新花續故枝楚雲輕掩冉蜀錦碎參差卧對山窗下猶堪比鳳池原潘允哲紫薇種自金華省分來竹素堂蟠枝凝瑞露接葉逗清光不向仙郎伴還移野老傍三秋花爛漫相遲一飛觴七言律詩原唐白居易紫薇花紫薇花對紫薇翁名目雖同貌不同獨占芳菲當夏景不將顔色托春風潯陽官舍雙高樹興善僧庭一大叢何似蘇州安置處花堂欄下月明中增李商隱臨發崇讓宅紫薇一樹穠姿獨看來秋庭暮雨類輕埃不先搖落應為有已欲别離休更開桃綬含情依露井栁綿相憶隔章臺天涯地角同榮謝豈要移根上苑栽李太舍池上玩紅薇花低池小水泙泙花落池心片片輕酩酊不能羞白鬢顛狂猶自眷紅英乍為旅客顔常厚每見同人眼暫明京洛園林歸未得天涯相顧一含情韓偓甲子歲夏五月自長沙抵醴陵入南小江村籬之次忽見紫薇花因思玉堂及西掖廳前皆植是花遂賦詩四韻聊寄知心職在內庭宮闕下廳前皆種紫薇花眼明忽傍漁家見魂斷方驚鳳闕賒淺色暈成宮裏錦濃香染著洞中霞此行若遇支機石又被君平驗海槎原宋梅堯臣閣後紫薇花盛開禁中五月紫薇樹閣後近聞都著花薄薄嫩膚搔鳥爪離離碎葉翦晨霞鳳凰浴去池波響鳷鵲隂來日影斜六十無名空執筆顛毛應笑映簪花增梅堯臣次韻和韓子華內翰於李右丞家移紅薇子種學士院紅薇花樹小扶疏春種秋芳賞愛餘丞相舊園移帶土侍臣清署看臨除薄膚癢不勝輕爪嫩幹生宜近禁廬此地結根千萬歲聫華榮莫比茅茹蔡襄過真慧素上人院見紅薇盛開因思西閣後軒數枝遂成短章寄翰林院原叔八丈禹玉閣長八月吳天覺早涼翠叢初折碎朱房繁枝欲卧不勝力落片將飛猶自香西閣二年臨晝夢金刀一夕掩春芳欄邊想像頻回首漸覺星垣迥漢傍五言絶句原宋王十朋紫薇盛夏緑遮眼此花紅滿堂自慚終日對不是紫薇郎七言絶句原唐白居易紫薇花絲綸閣下文章靜鐘鼓樓中刻漏長獨坐黃昏誰是伴紫薇花對紫薇郎見紫薇花憶微之一叢暗淡將何比淺碧籠裙襯紫巾除却微之見應愛人間少有别花人杜牧紫薇花曉迎秋露一枝新不占園中最上春桃李無言又何在向風偏笑艷陽人宋蘇軾次韻錢穆父紫薇二首虛白堂前合抱花秋風落日照橫斜閲人此地知多少物化無涯生有涯折得芳㽔兩眼花題詩相報字傾斜篋中尚有絲綸句坐覺天光照海涯陶弼紫薇人言清禁紫薇郎草詔紫薇花影傍山木不知官况别也隨紅日上東廊楊萬里紫薇晴霞艷艷覆簷牙綘雪霏霏點砌沙莫管身非香案吏也移床對紫薇花增楊萬里凝露堂前紫薇花兩株每自五月盛開九月乃衰似癡如醉弱還佳露壓風欺分外斜誰道花無紅百日紫薇長放半年花陸遊廳前紫薇花二本甚盛戲題絶句紅藥紫薇西省春從來惟慣對詞臣問囚自是粗官分無奈名花解笑人紫薇鐘鼓樓前官樣花誰令流落到天涯少年妄想今除盡但愛清樽浸晚霞原劉克莊紫薇風標雅合對詞臣映砌窺窗伴演綸忽發一枝深谷裏似知茅屋有詩人詩散句增唐杜牧山鳥飛紅帶亭薇拆紫花明張祥鳶紫薇低覆砌冉冉露花團宋周必大歸到玉堂清不寐月鈎初上紫薇花洪平齋唱徹五更天未曉一池月浸紫薇花原唐白居易紅薇花尚薰溫庭筠濃隂似帳紅薇晚宋王安石紫薇花點緑苔斑詞原宋陳景泝點絳唇今古凡花詞人尚作詞稱慶紫薇名盛似得花之聖為底時人一曲希流詠花端正花無節病似亦歸之命祝穆賀新郎此木生林野自唐家絲綸置閣托根其下常伴詞臣揮帝制因號紫薇堪詫常縹眇紫薇仙駕料想紫薇躔降種紫薇郎况是名同者兼二美作佳話一株乃肯臨茅舍肌膚薄長身挺立扶疏瀟灑定怯麻姑爬癢爪只許素商陶冶擎絳雪柔枝低亞我意香山東坡老只小詩便為增聲價後當有繼風雅别録原栽種以二瓦或竹二片當義處套其枝實以土俟生根分植又春月根傍分小本種之最易生此花易植易養可作耐久交巵子增本草巵子李時珍云巵酒器也巵子象之故名今俗加木作梔一名木丹格物總論一種花葉差大者謝靈運目為林蘭原梔子一名越桃見陶𢎞景别録一名鮮支見上林賦有兩三種處處有之一種木高七八尺葉似兔耳厚而深緑春榮秋瘁入夏開小白花大如酒杯皆六出中有黃蕊甚芬芳結實如訶子狀生青熟黃中仁深紅可染繒帛入藥用山梔子皮薄圓小如鵲腦房七稜至九稜者佳一種花小而重臺者園圃中品一種徽州梔子小枝小葉小花高不盈尺可作盆景山谷詩話云染梔子花六出雖香不濃郁山梔子花八出一株可香一圃酉陽雜俎云相傳即西域薝蔔花或曰薝蔔金色花小而香西方甚多非梔也此花喜肥宜糞澆然太多又生白虱宜酌之彚考原史記貨殖傳千畝巵茜其人與千戶侯等晉宮閣名華林園梔子五株晉令諸宮有秩梔子守護者置吏一人藝文類聚漢有梔茜園遊名山記樓石山多梔子地境圖望氣占人家黃氣者梔子樹也萬花谷蜀孟昶十月宴芳林園賞紅梔子花其花六出而紅清香如梅增野人間話蜀主升平嘗理園苑異花草畢集其間一日有青城山申天師入內進花兩栽曰紅梔子種賤臣知聖上理苑囿輒取名花兩樹以助佳趣賜與束帛皆至朝市散於貧人遂不知去處宣令內園子種之不覺成樹兩株其葉婆娑則梔子花矣其花斑花六出其香襲人蜀主甚愛重之或令圖寫於團扇或繡入於衣服或以絹素鵝毛做作首飾謂之紅梔子花及結實成梔子則異於常者用染素則成赭紅色甚妍翠其時大為貴重三栁軒雜識梔子為禪客三餘贅筆曾端伯以梔子為禪友花經薝蔔三品七命澄懷録韓熙載云對花焚香薝蔔宜檀長物志薝蔔清芬佛家所重古稱禪友殆非虛言昔宰相杜悰建薝蔔館形亦六出器用之屬皆象之四川志白上坪在銅梁縣東北六十里地宜梔子家至萬株望如積雪香聞十里集藻賦散句增宋謝靈運山居賦林蘭近雪而揚猗五言古詩增齊謝朓詠墻北梔子有美當階樹霜露未能移金蕡發朱采映日以離離幸賴夕陽下餘景及西枝還思照緑水君階無曲池餘榮未能已晚實猶見竒復留傾筐德君恩信未資原梁簡文帝詠梔子花素花偏可喜的的半臨池疑為霜裹葉復類雪封枝日斜光隱見風還影合離增宋梅堯臣種梔子舉世多植蘖而我學種梔顔色固不别良楛誠異宜團團緑階下豈畏秋風吹同心誰可贈為詠昔人詩原曾肇梔子林蘭擅孤芳性與凡木異不受霜霰侵自足中和氣欲知清淨身即此林蘭是增明黃朝薦詠梔子花蘭葉春以榮桂華秋露滋何如炎炎天挺此冰雪姿松柏有至性豈必歲寒時幽香無斷續偏於靜者私解酲試新茗夢回理殘碁寧肯媚晚涼清風匝地隨五言律詩原唐杜甫梔子梔子比衆木人間誠未多於身色有用與道氣相和紅取風霜實青看雨露柯無情移得汝貴在映江波增劉禹錫和令狐相公詠梔子花蜀國花已盡越桃今又開色疑瓊樹倚香似玉京來且賞同心處那憂别葉催佳人如擬詠何必待寒梅宋楊萬里梔子花樹恰人來短花將雪樣看孤姿妍外淨幽馥暑中寒有朵篸瓶子無風忽鼻端如何山谷老只為賦山礬五言絶句原宋王十朋梔子禪友何時到遠從毗舍園妙香通鼻觀應悟佛根源僧北澗詠梔子一花分六出十葉是重臺玉潔渾無玷金黃漫奪胎增明陳淳梔子薝蔔花開日園林香霧濃要從花裏去雨後自扶笻薝蔔含妙香來自天竺國笑殺葵與榴空斯好顔色王穀祥薝蔔六出吐竒葩風清香自遠樹如天竺林人在瑤華館七言絶句增宋朱子劉平甫分惠水梔小詩為謝二首年來衰懶罷書淫偶向盆山寄此心何事涼隂老居士便分幽賞助清吟何處飛來薝蔔林老枝樛屈更蕭槮凄涼杜老江頭句坐對行吟得自針楊巽齋薝蔔標名自寶坊薰風開遍一庭霜間來掃地跏趺坐受用此花無盡香原蔣梅邊清淨法身如雪瑩肯來林下現孤芳對花六月無炎暑省爇銅匜幾炷香潘鄭臺未説司花刻玉工已知名與佛相同可憐結了薰風子依舊身歸色界中朱淑真梔子一根曾寄小峯巒薝蔔香清水影寒玉質自然無暑意更宜移就月中看增李東陽梔子花抽黃嫓白總稱才誰遣山梔入畫來似為詩家少知己杜陵吟罷不曾開沈周薝蔔雪魄冰花涼氣清曲闌深處艷精神一鉤新月風牽影暗送嬌香入畫庭陳淳梔子竹籬新結度濃香香處盈盈雪色妝知是異方天竺種能來詩社攪新腸詩散句增宋顔彥濯雨時摛素當飈獨含芳陸遊落日桐隂轉微風梔子香明沈周薰風吹結子白玉銜新花原唐杜甫桃蹊李徑年雖古梔子紅椒艷復殊宋蘇軾六花薝蔔林間佛增陸遊清芬六出水梔子金蔡松年薝蔔花中碧霧鬟原明于若瀛冷香亂墮水晶毬詞原宋王十朋點絳唇毗舍遙遙異香一炷馳名久妙馨希有鼻觀深參透問訊東來知是誰先後稱仙友十花為偶近有西江守張鎡風入松芳叢簇簇水濵生勾引午風清六花大似天邊雪又幾時雪有三層明艷射回蜂翅淨香薰透蟬聲晚簷人共月同行疏影動銀屛指尖輕撚都如玉聽畫欄嬌囀流鶯道是花枝比得不成花也多情馬莊父最髙樓花解笑冷淡不求知長是殿衆芳時鮮鮮秀頸磋圓玉洛陽翠珮翦琉璃向人前迎茉莉送荼䕷幾欲把清香換春色費多少黃金酬不得梅雨妬麥風欺細腰空戀當時蕊同心猶結舊年枝謝家娘將逺寄待憑誰别録原栽種帶花移易活芒種時穿腐木板為穴塗以泥汚翦其枝插板穴中浮水面候根生破板密種之或梅雨時以沃壤一團插嫩枝其中置鬆畦內常灌糞水候生根移種亦可荼䕷素馨皆同千葉者用土壓其傍小枝逾年自生根十月內選子淘淨來春作畦種之覆以糞土如種茄法製用大朵重臺者梅醬糖蜜製之可作羮果折枝捶碎其根實以白鹽則花色久而不改可插瓶增野䔩品採花洗淨水漂去腥用麵入糖鹽作糊花拖油煠食採半開花礬水焯過入細蔥絲大小茴香花椒紅麯黃米飯研爛同鹽拌勻醃壓半日食之用礬焯過用蜜煎之其味亦美御定佩文齋廣羣芳譜卷三十八
