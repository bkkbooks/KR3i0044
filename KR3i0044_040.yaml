body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷三十八花譜木蘭原木蘭一名木蓮一名黃心一名林蘭一名杜蘭其香如蘭其花如蓮其心黄色一名廣心樹見白氏長慶集似楠髙五六丈枝葉扶疎葉似菌桂厚大無脊有三道縱紋皮似板桂有縱橫紋花似辛夷内白外紫四月初開二十日即謝不結實亦有四季開者又有紅黃白數色其木肌理細膩梓人所重十一二月採皮隂乾出蜀韶春州者各異彚考增述異記木蘭洲在潯陽江中多木蘭樹昔吳王闔閭植木蘭於此用構宫殿也七里洲中有魯班刻木蘭為舟舟至今在洲中詩家云木蘭舟出於此酉陽雜俎東都敦化坊百姓家太和中有木蘭一樹色深紅後桂州觀察使李勃看宅人以五千買之宅在水北經年花紫色原太真外傳上宴諸王於木蘭殿時木蘭花發皇情不悦妃醉中舞霓裳羽衣一曲天顔大悦續神仙傳北海于君病癩見市有賣藥姓公孫名帛者問之曰明日木蘭樹下當授卿明日于君往授素書二卷以之消災治病無不愈者嵐齋錄張搏為蘇州刺史植木蘭花於堂前嘗盛開燕客命即席賦之陸龜蒙後至張連酌浮之徑醉强索筆題兩句云洞庭波浪𣺌無津日日征㠶送遠人頽然醉倒客欲續之皆莫詳其意既而龜蒙稍醒續曰幾度木蘭船上望不知元是此花身遂為絶唱增西溪叢語洞庭春水綠於雲日日征帆送遠人曾向木蘭舟上過不知元是此花身一小説唐末舘閣數公泛舟以木蘭為題忽一貧士登舟作此諸公覽詩大驚物色之乃李義山之魄時義山下世久矣又嵐齋集載此詩陸龜蒙於蘇守張搏座上賦此木蘭堂詩未知孰是全唐詩話王播少孤貧嘗客揚州慧照寺木蘭院隨僧齋餐僧厭怠乃齋罷而後擊鐘後二紀播自重位出鎮是邦因訪舊游向之題者皆以碧紗幙其詩播繼以二絶句二十年前此院遊木蘭花發院新修如今再到經行處樹老無花僧白頭又上堂已了各西東慚愧闍黎飯後鐘二十年来塵撲面而今始得碧紗籠集藻賦原晉成公綏木蘭賦并序許昌西園中木蘭樹余往觀之遂為賦曰覽衆樹之列植嘉木蘭之殊觀至於𤣥㝠授節猛寒嚴烈峩峩堅氷霏霏白雪木應霜而枯零草隨風而摧折蓊青翠之茂葉繁旖旎之弱條諒抗節而矯時獨滋茂而不凋增唐李華木蘭賦并序華容石門山有木蘭樹鄉人不識伐以為薪餘一本方操柯未下縣令李韶行春見之息馬其隂喟然歎曰功列桐君之書名載騷人之詞生於遐深委於薪燎天地之産珍物將焉用之爰戒虞衡禁其翦伐按本草木蘭似桂而香去風熱明耳目在木部上篇乃採斫而歸理疾多驗由是逺近從而採之榦剖枝分殆枯槁矣士之生世出處語黙難乎哉韶余從子也嘗為余言感而為賦云沂長江以遐覽愛楚山之寂寥山有嘉樹兮名木蘭鬱森森以苕苕當聖政之文明降元和於九霄祛祲沴之為虐貫冬夏而不凋白波潤其根柢𤣥雪暢其枝條沐春雨之濯濯鳴秋風以蕭蕭素膚紫肌綠葉緗蔕疎密聳附高卑隂蔽華如霜雪實若星麗節勁松竹香濃蘭桂宜不植於人間聊獨立於天際徒翳薈兮為隣挺堅芳兮此身嘉名列於道書墜露飲乎騷人至若靈山霧歇藹藹林樾當楚澤之晨霞耿洞庭之夜月發清明於視聽洗煩濁於心骨韻衆壑之空峒潛微雲之滅沒露草白兮山凄凄鶴既唳兮猿復啼窅深林以㝠㝠覆百仞之𤣥谿彼逸人兮有所思戀芳隂兮歩遲遲悵幽獨兮人莫知懐馨香兮將為誰惋樵夫之無惠混衆木而皆盡指畫類而揮斤遇仁人之不忍方甘心而勦絶俄固抵於傾殞憐春華而搴芳顧落日而廻軫逹者有言巧勞智憂養命蠲疫人胡不求枝殘體剝澤盡枯留顦顇空山離披素秋鳥避弋而高翔魚畏網而深游不材則終其天年能鳴則免於俎羞奚此木之不終獨隱見而離憂自昔淪芳於朝市墜實於林丘徒鬱咽而無聲可勝言而計籌者哉吾聞曰人助者信神聽者直則臧倉譛言宣尼失職出處語黙與時消息則子雲投閣方囘受殛故知天地無心死生同域紜紜品物物有其極至人者委性循於自然不任夫智之與力也雖賢愚各全其好草木不夭其生植已而已而繄不可得徐鉉木蘭賦有序頃歲鉉左宦江陵官舍數畝委之而去庭樹木蘭因移植於宗兄之家及鉉徵還席不遑暖又竄於舒庸吾兄感春物之載華擬古詩而見寄吟翫感歎謹賦以和焉雖不足繼體物之作庶幾申騷客之情爾伊庭中之竒樹有木蘭之可悦外爛爛以凝紫内英英而積雪芬芳兮謝客之囊旖旎兮仙童之節許蒲茸之竊比聽蘭芽之並列於是辭下土之卑濕歴上京之繁華恥衒價於豪門乃托根於貧家資幽人之賞豫有好事之稱嗟一旦逐客程遠君門路賒削閨籍與印組豈獨留乎此花噫人屢遐棄花猶得地分兎苑之餘䕃向藩房而吐媚授簡多暇攀條屬思持香草以予比效騷辭而我寄感此生之百憂何斯物之足貴悲夫客館長吟山城夕隂想馨香之不改歎歡晏之難尋憑歸夢於飛翼寫商歌於素琴歌曰光景兮愁暮别離兮易久真宰兮無黨貞心兮不朽誠知異日重滋田氏之荆但恐相逢共歎桓公之栁文賦散句增楚屈原離騷朝搴阰之木蘭兮夕攬洲之宿莽九章擣木蘭以矯蕙兮鑿申椒以為糧漢司馬相如子虛賦椒桂木蘭七言古詩原宋劉儗木蘭曉来隨手抺新妝半額娥睂宮樣黃銖衣洗就薔薇露觸處聞香不炷香君不見同時素馨與茉莉究竟帶些脂粉氣又不見錢塘欲語嬌荷花麤枝大葉忒鉛華何如個樣隱君子色香不俗真有味根苗在處傲炎凉敢與松栢爭雪霜椒桂荑蕕君雜處小窓相對無相忘五言律詩增唐方千陳秀才亭際木蘭昔見初栽日今逢成樹時存思心更感遶看歩還遲蝶舞搖風蕊鶯啼含露枝徘徊不忍去應與醉相宜五言排律增唐劉長卿題靈祐上人法華院木蘭花庭種南中樹年華幾度新已依初地長獨發舊園春映日成華葢搖風散錦茵色空榮落處香醉往来人菡蓞千燈遍芳菲一雨均髙柯倘為楫渡海有良因原李商隱木蘭二月二十二木蘭開拆初初當新病酒復自久離居愁絶更傾國驚新聞逺書紫絲何日障油壁幾時車弄粉知傷重調紅或有餘波痕空映襪烟態不勝裾桂嶺含芳逺蓮塘屬意疎瑤姬與神女長短定何如七言絶句原唐白居易戲題木蘭花紫房日照臙脂拆素艶風吹膩粉開怪得獨饒脂粉態木蘭曾作女郎来題令狐家木蘭花膩如玉指塗朱粉光似金刀翦紫霞從此時時春夢裏應添一樹女郎花詩散句原宋鄭獬未識春風面先聞樂府名洗妝儂出塞進艇客登瀛唐鄭畋浴殿晴秋倘中謝殘英猶可醉瓊杯裴廷裕㣲風㣲雨寒食節半開半合木蘭花徐殷木蘭花謝可憐條逺道音書轉寂寥明王應鳳庭草黃昬隨意綠子規啼上木蘭花辛夷原辛夷一名辛雉一名侯桃一名木筆一名迎春本草云夷荑也其苞初生如荑而味辛也雉與夷聲相近也未發時苞如小桃子有毛故名侯桃初發如筆頭北人呼為木筆其花最早南人呼為迎春一名房木生漢中魏興梁州川谷樹似杜仲髙丈餘大連合抱葉似柿葉而微長花落始出正二月花開初出枝頭苞長半寸而尖鋭儼如筆頭重重有青黃茸毛順鋪長半分許及開似蓮花而小如盞紫苞紅熖作蓮及蘭花香有桃紅及紫二色又有鮮紅似杜鵑俗稱紅石蕎是也入藥用紫者須未開收已開不佳用須去毛毛射人肺令人欬花落無實夏杪復著花如小筆宋掌禹錫云苑中有樹髙三四丈枝葉繁茂係興元府進初僅三四尺有花無實經二十餘年方結實葢年淺者不實非二種也至花開早晚各隨方土節氣苞治鼻淵鼻􅍠鼻塞鼻瘡及痘後鼻瘡並研末入麝少許葱白蘸入數次甚良分根傍小株插肥濕地即活本可接玉蘭彚考增唐書文藝傳王維别墅在輞川有辛夷塢苕溪漁隱叢話木筆迎春自是兩種木筆色紫叢生二月方開迎春白色髙樹立春已開花經辛夷四品六命集藻文賦散句增楚屈原九歌辛夷楣兮葯房辛夷車兮結桂旗漢東方朔七諫列新夷與椒楨王褒九懐辛夷兮擠臧楊雄甘泉賦列辛雉於林薄五言古詩原宋韓琦題辛夷花辛夷吐髙花衞公曾手植根洗今已非不改舊時色平泉幾易主况乃刺史宅七言古詩增唐韓愈感春辛夷花房忽全開將衰正盛須頻来清晨輝輝燭霞日薄暮耿耿和烟埃朝明夕暗已足歎况乃滿地成摧頽迎繁送謝别有意誰肯留念少環廻原元稹辛夷花問韓員外問君辛夷花君言已斑駁不畏辛夷不爛開顧我筋骸官束縛縛遣推囚名御史狼籍囚徒滿田地明日不推緣國忌依然不得花前醉韓員外家好辛夷開時乞取三兩枝折枝為贈君莫惜縱君不折風亦吹增明朱曰藩辛夷花曲昨日辛夷開今日辛夷落辛夷花房髙刺天却共芙蓉亂紅萼小山桂樹猶連卷五湖荷花空綽約連巻綽約宜秋日端居獨養徵君疾髙枝朶朶艶木蓮密葉層層賽盧橘山鬼已見駕香車文人應是夢綵筆辛夷辛夷何離竒照水偏宜姑射姿蕭晨東海霞光爛𤣥夜西園露氣滋檀心倒巻情無限玉面低囘力不支見説東都便露坐惟應御史殢風吹此花愛逐東風暖故人逸韻嵇中散山陽聞有合歡齋石湖亦築辛夷館嫋嫋巖櫳碧樹圓紛紛磵户香花滿塢裏王孫舊路長巻中裴廸新詩短新詩已舊不堪聞江南荒館隔秋雲多情不改年年色千古芳心持贈君五言律詩原唐李德裕憶平泉辛夷昔年將出谷幾日對辛夷倚樹憐芳意攀條惜歲滋清隂須暫憇秀色正堪思只待揮金日殷勤泛羽巵增宋朱長文辛夷楚客㑹留詠吳都獨擅竒風霆存老幹桃李避芳時名入文房夢功資妙手醫紫薇顔色好先占鳳凰池七言律詩增唐皮日休揚州看辛夷花臘前千朶亞芳叢細膩偏勝素柰功螓首不言披曉雪麝臍無主任春風一枝拂地成瑤圃數樹參庭是蕊宮應為當時天女服至今猶未放全紅陸龜䝉奉和皮襲美揚州看辛夷花次韻栁疎梅墮少春叢天遣花神别致功高處朶稀難避日動時枝弱易為風堪將亂蕊添雲肆若得千株便雪宮不待羣芳應有意等閒桃杏即爭紅宋徐鉉遊蔣山題辛夷花寄陳奉禮今歲遊山已恨遲山中獨喜見辛夷簪纓且免全為累桃李猶堪别作期晴後日髙偏照灼晚来風急漸離披山郎不作同行伴折得何由寄所思五言絶句增唐王維辛夷塢木末芙蓉花山中發紅萼澗户寂無人紛紛開且落原裴廸辛夷塢綠堤春草合王孫自流翫况有辛夷花色與芙蓉亂增明陳淳題辛夷花東風日夜發桃李不禁吹檢㸃濃華事辛夷落較遲原陳繼儒辛夷春雨濕窓紗辛夷弄影斜曾窺江夢彩筆筆忽生花七言絶句原唐白居易題靈隱寺紅辛夷花戲酬光上人紫粉筆含尖火燄紅臙脂染小蓮花芳情香思知多少惱得山僧悔出家增吳融木筆花嫩如新竹管初齊粉膩紅輕樣可攜誰與詩人偎檻看好於牋墨併分題李羣玉二辛夷狂吟亂舞䨇白鶴霜翎玉羽紛紛落空庭向晚春雨微却歛寒香抱瑤萼原歐陽烱辛夷花含鋒新吐嫩紅芽勢欲書空映早霞應是玉皇曾擲筆落来地上長成花增明李東陽木筆泚露和烟曉未乾多情獨自倚欄干春風為報真消息不是江郎夢裏看原張新木筆花夢中曾見筆生花錦字還將氣象誇誰信花中原有筆毫端方欲吐春霞馮文度木筆花木筆花名映碧欄詞臣相對動毫端曉来似惹松烟濕擬向春風詠牡丹詩散句增宋陸游粲粲女郎花忽滿庭前枝繁華雖少减髙雅亦足竒金髙士談今年清明飲髙花見辛夷原元宋无乙鳥歸来社辛夷開過春唐杜甫辛夷始花亦已落况我與子非壯年錢起谷口春殘黄鳥稀辛夷花發杏花飛增韓愈辛夷髙花最先開青天露坐始此廻李商隱簾外辛夷定已開開時莫放艶陽廻宋王安石試問春風何處好辛夷如雪柘岡西元成廷