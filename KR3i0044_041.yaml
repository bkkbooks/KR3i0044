body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷三十九花譜杜鵑增本草杜鵑花一名紅躑躅一名山石榴一名映山紅一名山躑躅處處山谷有之高者四五尺低者一二尺春生苗葉淺緑色枝少而花繁一枝數萼二月始開花如羊躑躅而蒂如石榴花有紅者紫者五出者千葉者小兒食其花味酸無毒湧幢小品杜鵑花以二三月杜鵑鳴時開有二種其一先敷葉後著花者色丹如血其一先著花後敷葉者色差淡人多結縛為盤盂翔鳳之狀嘉泰志云近時又謂先敷葉後著花者為石巖以别之然前人但謂之紅躑躅不知石巖之名起于何時今江南在在皆稱石巖學圃餘疏花之紅者曰杜鵑葉細花小色鮮瓣密者曰石巖草花譜杜鵑花出蜀中者佳謂之川鵑花內十數層色紅甚出四明者花可二三層色淡雲南志杜鵑有五色雙瓣者永昌蒙化多至二十餘種彚考增續仙傳鶴林寺在潤州有杜鵑花高丈餘每至春月爛漫僧相傳云貞元中有僧自天台移栽之其後有殷七七字文祥周寶舊識之及移鎮浙西營飾其花院鎖閉時或窺見有二女子共遊林下俗傳花神也寶一日謂七七曰鶴林之花天下竒絶嘗聞能作非時花今重九將近能開此花以副此日乎七七乃前一日往鶴林焉中夜女子來謂七七曰妾為上帝所命司此花今與道者開之然此花不久歸閬苑矣于是女子瞥然不見及九日爛漫如春寶驚異遊賞纍日俄不見其後兵火焚寺樹失根株信歸閬苑矣平泉草木記已未嵗得稽山之四時杜鵑容齋隨筆物以希見者為珍不必異種也潤州鶴林寺杜鵑乃今映山紅又名紅躑躅在江東彌山亘野殆與榛莽相似而鶴林之花至以為外國僧鉢盂中所移上帝命玉女下司之已踰百年終歸閬苑是不特土俗罕見雖神仙亦不識也王建宮詞云大儀前日暖房來囑向昭陽乞藥栽勑賜一窠紅躑躅謝恩未了奏花開其重如此則宫禁中亦鮮之三桞軒雜識杜鵑為仙客花經杜鵑八品二命躑躅七品三命閩部疏閩中大都氣暖春花皆先時放方二月下旬已見躑躅越中雜記五泄多穠花異草紅白青緑燦爛如錦映山紅有高七八尺者與他山絶異草花譜映山紅若生滿山頂其年豐稔人競採之黃山志雲外峯上有杜鵑花繞峯而生集藻五言古詩增宋梅堯臣九月十八日山中見杜鵑花復開山中泉壑暖幽木寒更華春鳥各噤口遊子未還家云誰未及還對此重興嗟何必因啼血顔色勝曙霞七言古詩增唐元稹紫躑躅紫躑躅滅紫櫳裙倚山腹文君新寡乍歸來羞怨春風不能哭我從相識便相憐但是花叢不回目去年春别湘水頭今年夏見青山曲迢迢逺在青山上山高水濶難容足願為朝日早相暾願作輕風暗相觸紫躑躅我向通川爾幽獨可憐今夜宿青山何年却向青山宿山花漸暗月漸明月照空山滿山緑山空月午夜無人何處知我顔如玉白居易山石榴寄元九山石榴一名山躑躅一名杜鵑花杜鵑啼時花撲撲九江三月杜鵑來一聲催得一枝開江城上佐間無事山下斸得廳前栽爛漫一欄十八樹根株有數花無數千房萬葉一時新嫩紫殷紅鮮麴塵淚痕裛損胭脂臉翦刀裁破紅綃巾謫仙初墮愁在世姹女新嫁嬌泥春日射血珠將滴地風翻焰火欲燒人間折兩枝持在手細看不似人間有花中此物是西施芙蓉芍藥皆嫫母竒芳絶艷别者誰通州遷客元拾遺拾遺初貶江陵去去時正值青春暮商山秦嶺愁殺人山石榴花紅夾路題詩報我何所云若云色似石榴裙當時叢畔唯思我今日欄前只憶君憶君不見坐銷落日西風起紅紛紛五言律詩增唐孟郊酬鄭毗躑躅詠不似人手致豈關地勢偏孤光裊餘翠獨影舞多妍迸火燒間地紅星墮逺天忽驚物表物嘉客為留連方干杜鵑花未問移栽日先愁落地時疏中從間葉密處莫燒枝郢客教誰探胡蜂見自知周回兩三步常有醉鄉期成彥雄杜鵑花杜鵑花與鳥怨艷兩何賒疑是口中血滴成枝上花一聲寒食夜數朵野僧家謝豹出不出日遲遲又斜七言律詩增唐白居易喜山石榴花開忠州州裏今日花廬山山頭去年樹已憐根損斬新栽還喜花開依舊數赤玉何人少琴軫紅纈誰家合羅袴但知爛漫恣情開莫怕南賔桃李妬題山石榴花一叢千朵壓欄干翦碎紅綃却作團風嫋舞腰香不盡露消妝臉淚新乾薔薇帶刺攀應懶菡蓞生泥玩亦難爭及此花簷户下任人採弄盡人看玉泉寺南三里澗下多深紅躑躅繁艷殊常感惜題詩以示遊者玉泉南澗花竒怪不似花叢似火堆今日多情唯我到每年無故為誰開寧辭辛苦行三里更與留連飲兩杯猶有一般辜負事不將歌舞管絃來李咸用題僧院杜鵑花若比衆芳應有在難同上品是中春牡丹為性疏南國朱槿操心不滿旬留得却緣真達者見來寧作獨醒人鶴林太盛今空地莫放枝條出四鄰宋真山民杜鵑花愁鎖巴雲往事空只將遺恨寄芳叢歸心千古終難白啼血萬山都是紅枝帶翠煙深夜月魂飛錦水舊東風至今染出懷鄉恨長挂行人望眼中七言小律增唐白居易題孤山寺山石榴花山榴花似結紅巾容艷新妍占斷春色相故關行道地香塵擬觸坐禪人瞿曇弟子君知否恐是天魔女化身五言排律增唐白居易山石榴花曄曄復煌煌花中無比方艷夭宜小院條短稱低廊本是山頭物今為砌下芳千叢相向背萬朵互低昂照灼連朱檻玲瓏映粉墻風來添意態日出助晶光漸綻燕支萼猶含琴軫房離披亂翦綵斑駁未勻妝絳熖燈千炷紅裙妓一行此時逢國色何處覓天香恐合栽金闕思將獻玉皇好差青鳥使封作百花王五言絶句增唐曹松寒食日題杜鵑花一朵復一朵併開寒食時誰家不禁火總在此花枝七言絶句御製詠杜鵑花賜高士竒石巖如火本天台秀質丹心日月催移根禁苑清詩句朱夏山林惜茂才增唐李白宣城見杜鵑花蜀國曽聞子規鳥宣城還見杜鵑花一呌一回腸一斷三春三月憶三巴張籍寄李渤五度溪頭躑躅紅嵩陽寺裏講時鐘春山處處行應好一月看花到幾峰白居易戲問山石榴小樹山榴近砌栽半含紅萼帶花來爭知司馬夫人妬移到庭前便不開杜牧山石榴似火山榴映小山繁中能薄艷中間一朵佳人玉叉上祗疑燒却翠雲鬟雍陶歎靈鷲寺山石榴水蝶巖蜂俱不知露桃凝艷數千枝山深春晚無人賞即是杜鵑催落時吳融送杜鵑花春紅始謝又秋紅息國亡來入楚宫應是蜀寃啼不盡更憑顔色訴西風韓偓淨興寺杜鵑花一園紅艷醉坡陀自地連梢簇蒨羅蜀魄未歸長滴血祗應偏滴此叢多宋劉敞杜鵑花嫩紅輕紫仙姿貴合是山中寂寞開九陌風塵肯相顧可憐空使下山來蘇軾趙昌躑躅楓林翠壁楚江邊躑躅千層不忍看開卷便知歸客路劔南樵叟為施丹楊萬里杜鵑花二首泣露啼紅作麼生開時偏值杜鵑聲杜鵑口血能多少恐是征人滴淚成何須名苑看春風一路山花不負儂日日錦江呈錦樣清溪倒照映山紅趙成德白杜鵑花三首雲樹重重和淚冷故宫遺廟有知音秦吳萬里皆芳草染到山花恨最深春山未有杜鵑啼花發杜鵑知不知寄語催歸儘哀怨莫將啼血汚仙姿冰肌玉骨擅無雙不與山花鬭艷妝欲染啼紅寃杜宇爭如傅粉伴何郎楊巽齋杜鵑花鮮紅滴滴映霞明盡是寃禽血染成羈客有家歸未得對花無語兩含情易寓言杜鵑花輕翦梢頭薄薄羅子規湔血恨難磨園林莫道香飛盡嫩緑枝頭不用多僧北澗杜鵑花露凝丹臉粲芳肌不御鉛華亦自竒強學海棠春睡足如何學得未醒時元郯韶李雲山畫杜鵑花金井西頭萼緑仙霞裾風帔影翩翩隴西才子多清思漫把春雲染杜鵑明張獻翼杜鵑花花花葉葉正含芳麗景朝朝夜夜長何事江南春去盡子規聲裏駐年光詩散句增宋張俞夏園無雜英灼灼山榴開落日杜鵑苦花仍萎蒼苔唐韓愈三月嵩少步躑躅紅千層李白杜鵑花開春已闌歸向陵陽釣魚晚李紳澗底紅花奪火然搖風有毒愁行客韓愈前年嶺隅鄉思發躑躅成山開不算山榴躑躅少意思照耀黃紫徒為叢司空圖莫怪行人頻悵望杜鵑不是故鄉花宋蘇軾當時只道鶴林仙能遣秋光放杜鵑南漪杜鵑天下無披香殿上紅氍毺王十朋造物私我小園林此花大勝金腰帶徐似道牧童出捲烏鹽角越女歸簪謝豹花陳錦山一聲杜宇啼春風明朝緋挂千山叢吳仲孚梨花瘦盡東風懶商略平生到杜鵑唐白居易杜鵑花落杜鵑啼晚葉尚開紅躑躅韋莊杜鵑花發鷓鴣啼宋寇凖杜鵑啼處花成血王安石躑躅江頭挽醉紅躑躅萬樹紅相圍詞增宋高觀國浪淘沙啼魄一天涯怨入芳華可憐零血染煙霞記得西風秋露冷曽凂司花明月滿窗紗倦客思家故宫春事與愁賒冉冉斷魂招不得翠冷紅斜辛棄疾定風波百紫千紅過了春杜鵑聲苦不堪聞却解啼教春小住風雨空山招得海棠魂一似蜀宫當日女無數猩猩血染赭羅巾畢竟花開誰作主記取大都花屬惜花人别録增花鏡杜鵑性最喜隂而惡肥每早以河水澆置之樹隂之下則葉青翠可觀亦有黃白二色者春鵑亦有長丈餘者須種以山黃泥澆以羊糞水方茂若用映山紅接者花不甚佳切忌糞水宜豆汁澆附録黃杜鵑增本草黃杜鵑一名黃躑躅一名老虎花一名驚羊花一名羊不食草一名玉枝一名羊躑躅一名閙羊花陶𢎞景曰羊食其葉躑躅而死故名閙當作惱惱亂也韓保升曰小樹高二尺葉似桃葉花黃似瓜花蘇頌曰所在有之春生苗似鹿蔥葉似紅花莖高三四尺夏開花似凌霄花山石榴輩正黃色李時珍曰其花五出蕊瓣皆黃氣味皆惡有毒附録山枇杷增李紳文集駱谷多山枇杷毒能殺人其花明艷與杜鵑花相似樵者識之集藻七言古詩原唐元稹山枇杷山枇杷花似牡丹殷潑血往年乘傳過青山正值山花好時節壓枝凝艷已全開映葉香苞才半裂緊摶紅袖欲支頤慢解絳囊初破結金線叢飄繁蕊亂珊瑚朵重纖莖折因風旋落裙片飛帶日斜看目精熱亞水依巖半傾側籠雲隱霧多愁絶緑珠語盡身欲投漢武眼穿神漸滅穠姿秀色人皆愛怨媚羞容我偏别説向間人人不聼曽向樂天時一説昨來谷口先相問及到山前已消歇左降通州十日遲又與幽花一年别山枇杷爾託深山何太拙天高萬里看不精帝在九重聲不徹園中杏樹良人醉陌上桞枝年少折因爾幽芳喻昔賢磻溪冷坐權門咽七言律詩增唐白居易山枇杷深山老去惜年華况對東溪野枇杷火樹風來翻絳焰瓊枝日出曬紅紗回看桃李都無色映得芙蓉不是花爭奈結根深石底無因移得到人家七言絶句增唐白居易山枇杷花二首萬重青嶂蜀門口一樹紅花山頂頭春盡憶家歸未得低紅如解替君愁葉如裙色碧綃淺花似芙蓉紅粉輕若使此花兼解語推囚御史定違程木槿原木槿一名椵一名櫬白曰椵紅曰櫬一名日及一名王蒸爾雅云椵木槿櫬木槿注云别二名也或呼日及亦曰王蒸一名蕣本作舜取僅榮一瞬之義一名朝菌見莊子一名朱槿一名赤槿一名朝開暮落花木如李高五六尺多岐枝色微白可種可插葉繁密如桑葉光而厚末尖而有丫齒花小而艷有深紅粉紅白色單葉千葉之殊五月始開朝開暮落結實輕虛大如指頂秋深自裂其中子如榆莢馬兜鈴之仁嫩葉可茹作飲代茶味平滑無毒潤燥活血除濕熱小兒忌弄令病瘧俗名瘧子花增酉陽雜俎那提槿花紫色兩重葉外重葉卷心心中抽莖高寸餘葉端分五瓣如蒂瓣中紫蕊莖上黃葉彚考原詩鄭風有女同車顔如舜華有女同行顔如舜英傳英猶華也禮記月令仲夏之月木槿榮增宋書樂志雨水方降木槿榮莊子朝菌不知晦朔注朝菌亦名日及淮南子莊生貴支離悲木槿原抱朴子木槿楊桞斷殖之更生倒之亦生橫之亦生生之易者莫過斯木然埋之既淺又未得久乍刻乍剝或搖或拔雖壅以高壤浸以春澤猶不脫於枯瘁者以其根荄不固不暇吐其萌芽津液不得遂結其生氣也增晉宮閣名華林園有木槿三株外國圖君子之國多木槿之花人民食之去琅琊三萬里原羯鼓録汝陽王璡寧王子也姿容妍美秀出藩邸嘗戴砑絹帽打曲上自摘紅槿花一朵置於帽上笡處二物皆極滑久之方安遂奏舞山香一曲而花不墜落上大喜笑賜璡金器一厨因誇曰花奴資質明瑩肌髮光細非人間人必神仙謫墮也埤雅詩曰顔如舜華又曰顔如舜英顔如舜華則言不可與久也顔如舜英則愈不可與久矣蓋榮而不實者謂之英增爾雅翼木槿仲夏夜隂而榮月令取之以為候詩云有女同車顔如舜華舜乃華之甚茂者又枝葉相當有同車之象花經木槿九品一命三桞軒雜識姚氏殘語以木槿為時客今改為莊客集藻序原晉潘尼朝菌賦序朝菌者蓋朝華而暮落世謂之木槿或謂之日及詩人以為舜華莊周以為朝菌其物向晨而結建明而布見陽而盛終日而殞不亦異乎何名之多也稽含朝生暮落樹賦序草木春榮秋悴此樹朝生暮落增蘇彥舜華詩序其為花也色甚鮮麗迎晨而榮日中則衰至夕而零莊周載朝菌不知晦朔况此朝不及夕者乎苟映采於一朝耀穎於當時焉識夭夀之所在哉余既玩其葩而歎其榮不終日成公綏日及賦序日及者華甚鮮茂榮於仲夏訖於孟秋頌增宋顏延之赤槿頌日御北至夏德南宣玉蒸榮心氣動上玄華繅間物受色朱天是謂珍樹含艷丹間賦原晉盧諶朝華賦覽庭隅之嘉木慕朝華之可玩俯浸潤之泉壤仰晞影於雲漢增羊徽木槿賦有木槿之初榮藻衆林而間色在青春而資氣逮中夏以呈飾挹宵露以舒采暉神景而吸赩夏侯湛朝華賦咨神樹之修異實積陽之純精蜿潛根以誕節據川壤以擢莖皎日升而朝華玄景逝而夕零逮明晨而繁沸若靜夜之衆星長莖攢起柔條列布擢靈柯於時雨滋逸采於豐露灼煌煌以煒煒獨崇朝而達暮於是茂樹蒼蒼纖枝翩翩潛光玉朗緑葉翠鮮傅咸舜華賦覽中唐之竒樹稟沖粹之至清應青春而敷櫱逮朱夏而誕英布夭夭之纖枝發灼灼之殊榮紅葩紫蒂翠葉素莖含暉吐曜爛若列星朝陽照灼以舒暉逸藻采粲而光明罄天壤而莫儷何菱華之足榮原陳江總南越木槿賦日及多名㽔賔肇生東方記乎夕死郭璞贊以朝榮潘文體其夏盛稽賦閔其秋零此則京華之麗木非干越之舜英南中羣草衆花之寶雅什未名騷人失藻雨來翠潤露歇紅燥疊萼疑擎低莖若倒朝霞映日殊未妍珊瑚照水定非鮮千葉芙蓉詎相似百枝燈花復羞然暫欲寄根對滄海大願移華厠綺錢井上桃蟲難可雜庭中桂蠧豈見憐乃為歌曰啼眉梁冀婦紅妝蕩子家若持花並笑宜笑不勝花趙女垂金珥燕姬插寶珈誰知紅槿艷無因寄狹邪徒令萬里道攀折自咨嗟文散句增漢東方朔與公孫𢎞借車馬書木槿夕死朝榮士亦不長貧也晉傅玄朝華賦序朝華麗木也五言古詩增唐李白詠槿一首園花笑芳年池草艷春色猶不如槿花嬋娟玉階側芬榮何夭促零落在瞬息豈若瓊樹枝終嵗長翕赩白居易秋槿風露颯已冷天色亦黃昏中庭有槿花榮落同一晨秋開已寂寞夕隕何紛紜正憐少顔色復歎不逡巡感此因念彼懷哉聊一陳男兒老富貴女子晚婚姻頭白始得志色衰方事人後時不獲已安得如青春元劉詵白木槿數花出籬楥耿耿照夜闌月寒客獨起恍若山雪殘天風泠然來坐久身欲翰夢酌瓊宫漿薦以雕玉盤羣妃霓裳冷夭姣環青鸞世言朝暮落耐此十日看始知潔白姿頗勝施朱丹大鈞縱萬物爾本羞蕙蘭同類偶自别亦復得賞歎朂哉勵貞節相期在嵗寒舒頔白槿花素質不自媚開花向秋前淡然超羣芳不與春爭妍涼夜弄清影縞衣照嬋娟佳人分寂寞零落祗自憐鮮鮮碧雲樹皎皎萬玉懸朝開暮還落物理乃自然嗤彼擁腫木徒爾全天年木槿愛花朝朝開憐花暮即落顔色雖可人賦質無乃薄亭亭映清池風動亦綽約倣佛芙蓉花依稀木芍藥炎天衆芳雕而此獨凌鑠慰目聊娛情蒼松在巖壑明吳寬槿南方遍短籬木槿每當路北地少為貴翻編短籬護要知一物耳貴賤以地故夏末蕊纍纍生意含曉露花開亦可觀别種更相妬獨憐一夕間顔色已非素蕊多固應爾此理真自悟不見萱草花開落只朝暮五言律詩原唐楊凌詠槿花羣玉開雙槿丹榮對絳紗含煙疑出火隔雨怪舒霞向晚爭辭蕊迎朝鬭發花非關後桃李為欲繼年華增羊士諤玩槿花何乃詩人興妍詞屬舜華風流感異代窈窕比同車凝艷垂清露驚秋隔絳紗蟬鳴復蟲思惆悵竹隂斜李商隱槿花二首燕體傷風力雞香積露文殷鮮一相雜啼笑兩難分月裏寧無姊雲中亦有君三清與仙島何事亦離羣珠館熏然久玉房梳掃餘燒蘭才作燭襞錦不成書本以亭亭逺翻嫌脈脈疏回頭問殘照殘照更空虛朱槿花蓮後紅何患梅先白莫誇才飛建章火又落赤城霞不卷錦步障未登油壁車日西相對罷休浣向天涯勇多侵露去恨有礙燈還嗅自微微白看成沓沓殷坐忘疑物外歸去有簾間君問傷春句千詞不可刪宋楊億槿花宿霧初披縠晨霞暫照梁千金輕換笑七駕未成章塵暗神妃襪衣殘侍史香深情傳寶瑟終古怨清湘錢惟演槿花綺霞初結處珠露未晞時寶樹寧三尺華燈更九枝亭亭方自喜黯黯却成悲欲作非煙散猶憐反照遲劉隲槿花虢國妝初罷高唐夢始回霓裳猶未解繡被已成堆赤帝宫簾捲華陽洞户開神仙有良會清唱在瑶臺謝翺槿樹白犬吠行人西風杵臼新洗香澄宿水曝髮向秋鄰野草依溝盡宫花入帽頻人家小門徑憐爾獨相親七言律詩原宋楊萬里木槿夾路疏籬錦作堆朝開暮落復朝開抽苞粔籹輕拖糝近蒂胭脂釅抹腮占破半年猶道少何曽一日不芳來花中却是渠長命換舊添新底用催明陸深白木槿曾聞鄭女詠同車更愛丰標淡有華欲傍莓苔橫野渡似將鉛粉鬭朝霞品題從此添高價物色仍煩築短沙漫道春來李能白秋風一種玉無瑕五言絶句增唐劉庭琦詠木槿樹題武進文明府廳物情良可見人事不勝悲莫恃朝榮好君看暮落時原楊凌槿花緑樹競扶疏紅姿相照灼不學桃李花亂向春風落增崔道融槿花槿花不見夕一日一回新東風吹桃李須到明年春白居易和微之歎槿花朝榮殊可惜暮落實堪嗟若向花中比猶應勝眼花元劉詵白木槿潔比何郎白淨如寶兒憨秋風竹籬徑日暮道人菴明張以寧木槿花朝昏看開落一笑小窗中别種蟠桃子千年一度紅七言絶句增唐戎昱題槿花自用金錢買槿栽二年方始得花開鮮紅未許佳人見蝴蝶爭知早到來紅槿花花自深紅葉麴塵不將桃李共爭春今日驚秋自憐客折來持贈少年人原白居易白槿花秋蕣晚英無艷色何因栽種在人家使君自别羅敷面爭解回頭愛白花李商隱槿花風露凄凄秋景繁可憐榮落任朝昏未央宫裏三千女但保紅顔莫保恩宋張俞木槿朝菌一生迷晦朔靈蓂千嵗換春秋如何槿艷無終日獨倚闌干為爾羞張登甲子雖推小雪天刺桐猶緑槿花然陽和長飬無時歇却是炎州雨露偏陸壑野槿扶疏當縳籬山深不用掩山扉客來踏破松梢月鶴向主人頭上飛僧紹隆朱槿朱槿移栽釋梵中老僧非是愛花紅朝開暮落關何事祗要人知色是空詩散句增宋楊萬里曉艷欲開孫武陳晚風爭墜緑珠樓來如急電無因駐去似驚鴻不可收唐楊炯緑琪千嵗樹黃槿四時花韓偓插槿作籓籬叢生覆小池宋劉筠紫霧函燈檠彤霞逼綺寮原黃庭堅吾聞調羮槿異味及枌榆唐竇鞏籬外涓涓澗水流槿花半照夕陽愁宋秦觀槿籬護藥紅遮徑竹筧通泉白遍村增晉阮籍木槿耀采華唐上官儀槿散凌風縟凌敬日槿落青跗于鵠槿籬生白花原白居易蕭條槿花風槿枝無宿花增杜牧槿墮初開艷皮日休籬疏從緑槿宋王安石薄槿胭脂染范成大槿花紅未落槿心傾穠露元龔璛花繞槿籬秋唐王維山中習靜觀朝槿原白居易槿花一日自為榮增張籍紅槿開當宴客亭蟬聲滿樹槿花疏金張庭玉蝴蝶穿花木槿開别録原扞插二三月間新芽初發時截作假長一二尺如插木芙蓉法即活若欲插籬須一連插去若少住手便不相接取用湖南北多植為籬障花與枝兩用皮及根甘平滑無毒作飲服令人能睡花作湯飲治風皮治瘡癬川中者色紅氣厚力優尤效扶桑增本草扶桑一名佛桑一名朱槿一名赤槿一名日及東海日出處有扶桑樹此花光艷照日其葉如桑因以比之後人訛為佛桑乃木槿别種故日及諸名亦與之同原高四五尺産南方枝葉婆娑葉深緑色光而厚微澀如桑花有紅黃白三色紅者尤貴呼為朱槿葉及花性甘平無毒增稽含草木狀扶桑出南涼郡花深紅色五出大如蜀葵重敷柔澤有蕊一條長如花葉上綴金屑日光所爍疑若熖生一叢之上日開數百朵朝開暮落自五月始至中冬乃歇插樹即活清漳志佛桑比朱槿頗耐久蓋二種也臨漳志花似槿四時常開婦人簪帶之集藻七言律詩原宋蔡襄耕園驛佛桑花詩并序明道中豫為漳州軍事判官晚秋嘗至州西耕園驛驛庭有佛桑數十株開花繁盛念其寒月窮山方自媚好乃作耕園驛佛桑花詩一首既而乘桴東下又作溪行一首慶厯七年豫使本路明年夏四月自汀來漳復至是驛花尚仍舊追感昔遊因紀前事併載舊篇龕於西壁云溪館初寒似早春寒花相倚媚行人可憐萬木凋零盡獨見繁枝爛漫新清艷夜沾雲表露幽香時過轍中塵名園不肯爭顔色灼灼夭桃野水濵使軺迢遞到天涯候館遷延感嵗華白髮却攀臨砌樹青條猶放過墻花悲來惟有金城桞醉後曽乘海客槎欲問昔遊無處所晚煙生水日沉沙明桑悅詠佛桑南無麗卉鬭猩紅淨土門傳到此中欲供如來嫌色重謂藏宣聖訝枝同葉深似有慈雲擁蕊坼偏驚慧日烘賞玩何妨三宿戀只愁燒破太虛空詩散句原宋蔡襄野人家家熖燒紅有扶桑蘇軾熖熖燒空紅佛桑增楊萬里佛桑解吐四時艷别録增荔支譜荔支以鹽梅滷浸佛桑花為紅漿漬之曝乾色紅而甘酸合歡原合歡一名合昏一名夜合一名青棠或作裳增本草合歡一名萌葛一名烏賴樹金光明經名為尸利灑樹俗呼馬纓花原處處有之枝甚柔弱葉纖密圓而緑似槐而小相對生至暮而合枝葉互相交結風來輒改不相牽綴五月開花色如蘸暈線下半白上半肉紅散垂如絲至秋而實作莢子極薄細花中異品也根側分條藝之子亦可種主安和五臟利心志令人歡樂于若瀛曰夜合生宛朐及荆山花俯垂有姿鬚端紫點手拈之即脫才破萼香氣襲人金陵盆植者無根而花花後不堪留即留亦無能再花彚考增崔豹古今注欲蠲人之忿則贈之青棠青棠一名合歡合歡則忘忿合歡樹之階庭使人不忿稽康種之舍前原晉宫閣名晉華林園有合歡四株女紅餘志杜羔妻趙氏每端午取夜合花置枕中羔稍不樂輒取少許入酒令婢送飲便覺歡然增稿簡贅筆間花野草亦隨時輕重唐人詩中多言夜合石竹如遼陽春盡無消息夜合花前日又西山花插寶髻石竹繡羅衣是也至今唐畫宫殿池臺多作二花自然有富貴氣今人絶不知重矣花經夜合七品三命瓶花譜夜合四品六命集藻文賦散句原晉嵇康養生論合歡蠲忿萱草忘憂宋陸倕刻漏銘合昏暮捲蓂莢朝開五言古詩原晉楊芳合歡詩南鄰有竒樹乘春挺素華豐翹被長條緑葉蔽朱柯因風吐徽音芳氣入紫霞我心羡此木願徙著余家夕得遊其下朝得弄其葩爾根深且固余宅淺且汙移植良無期歎息將如何宋韓琦夜合俗人之愛花重色不重香吾今得真賞似矯時之常所愛夜合花清芬踰衆芳葉葉自相對開斂隨隂陽不慙厯草滋獨擅堯階祥得此合歡名憂忿誠可忘茸茸紅白姿百和從風揚沉水燎庭檻薰陸紛纓裳彌月固未歇况兹夏景長凡目不我貴馥烈徒自將仲尼失滅明史遷疑子房以貌不以行舉世同悲傷豫欲先馨德羣艷孰可方直饒妖牡丹須遜花中王增元吳師道合歡木合歡愛嘉名矧復知昏旦淮土産特多蔥蘢蔭溝岸離離青葉解冉冉紅茸散靜和宿露卷動與微風戀物意豈悅人和樂自堪玩蹇豫寡所諧觸事多忿悁亦擬學稽生植根向庭畔五言律詩原唐白居易對晚開夜合花贈皇甫郎中移晚校一月花遲過半年紅開杪秋日翠合欲昏天白露滴未死涼風吹更鮮後時誰肯顧惟我與君憐元稹夜合綺樹滿朝陽融融有露光雨多疑濯錦風散似分妝葉密煙蒙火枝低繡拂墻更憐當暑見留詠日偏長增元稹感小株夜合纖幹未盈把高條才過眉不禁風苦動偏受露先萎不分秋同盡深嗟小便衰傷心落殘葉猶識合昏期七言律詩增元袁桷題玉堂合歡花初開一樹高花冠玉堂知時舒卷欲雲翔馬嘶不動遊纓聳雉尾初開翠扇張舊渴未須餐玉屑嘉名端合紀青裳雲窗霧冷文書靜留取餘清散逺香五言小律增唐李頎題合歡開花復卷葉艷眼又驚心蝶繞西枝露風披東幹隂黃衫漂細蕊時拂女郎砧五言絶句原明于若瀛夜合花一莖兩三花低垂泫朝露開簾弄幽色時有香風度七言絶句增唐白居易東墻夜合樹去秋為風雨所摧今年花時悵然有感碧荑紅縷今何在風雨飄將去不回惆悵去年墻下地今春惟有薺花開原宋韓琦中書東廳夜合合昏枝老拂簷牙紅白開成蘸暈花最是清香合蠲忿纍旬風送入窗紗增明李東陽夜合花二絶夜合枝頭别有春坐含風露入清晨任他明月能相照斂盡芳心不向人袂掩芳塵欲避春羞將月夕換風晨向來花品看應熟不待開時已可人陸師道題夜合花夜合花開香滿庭翠枝拂檻玉娉婷詩人賸有高陽興相對泠然宿酒醒原王野逺遊消息斷天涯燕子空能到妾家春色不知人獨自庭前開遍合歡花陳繼儒梅雨晴時處處蛙尋常家釀不須賒老親醉後盤餐散瓶裏初開夜合花詩散句原唐杜甫合歡尚知時鴛鴦不獨宿增宋蘇軾可憐夜合花青枝散紅茸原明申時行隙地不栽無果樹中庭那有合歡花王誼碧紗籠裏銀缸影照見深宫夜合花古詩消忿贈合歡增梁沈約合歡葉暮卷宋韓琦合歡香影拂西齋别録增詩話心胸填錯取合歡掌大一枝水煮服之故後山詩云探囊一試合昏湯普濟方髮落不生合歡木灰二合墻衣五合鐵精一合水萍末二合生油調塗百一選方撲損折骨取合歡皮去粗皮炒黑色四兩芥菜子炒一兩為末每服二錢溫酒卧時服以滓傅之接骨甚妙子母祕録小兒撮口夜合花枝濃煎汁拭口中并洗之附録有情樹原花史遜頓國有樹晝開夜合名曰夜合亦云有情樹若各自種則無花木芙蓉原木芙蓉一名木蓮一名華木一名拒霜花一名杹木一名地芙蓉本草云此花艷如荷花故有芙蓉木蓮之名八九月始開故名拒霜俗呼為杹皮樹相如賦謂之華木注云皮可為索也有數種惟大紅千瓣白千瓣半白半桃紅千瓣醉芙蓉朝白午桃紅晚大紅者佳甚黃色者種貴難得又有四靣花轉觀花紅白相間八九月間次第開謝深淺敷榮最耐寒而不落不結子總之此花清姿雅質獨殿衆芳秋江寂寞不怨東風可稱俟命之君子矣欲染别色以水調靛紙蘸花蕊上仍裹其尖開花碧色五色皆可染種池塘邊映水益妍氣味辛平無毒清肺涼血散熱解毒消腫毒惡瘡排膿止痛有殊效俗傳葉能爛獺毛彚考增平泉草木記己未嵗得會稽之百葉木芙蓉又得鍾陵之同心木芙蓉清異録錢俶以弟信鎮湖州後圃芙蓉枝上穿一黃玉玦枝梢交雜不知從何而穿也信截幹取玦以獻人謂真仙來遊留此以驚世耳益部方物略記添色拒霜花生彭漢蜀州花常多葉始開白色明日稍紅又明日則若桃花然原歸田録石曼卿去世後其故人有見之者云我今為仙主芙蓉城欲呼故人共遊不諾忿然騎一素驢而去石林燕語慶厯中有朝士將曉赴朝見美女三十餘人靚妝麗服兩兩並馬而行觀文丁度按轡於其後朝士驚曰丁素儉約何姬之衆耶有一人最後行朝士問曰觀文將宅眷何往曰非也諸女御迎芙蓉館主耳俄聞丁卒增東坡集九月十日君猷置酒秋香亭有拒霜獨向君猷開坐客喜笑以為非使君莫可當此故作詩詞以記之原成都記孟後主於成都城上遍種芙蓉每至秋四十里如錦繡高下相照因名錦城以花染繒為帳名芙蓉帳增二老堂詩話唐人裒劉禹錫嘉話云進士陳標詠黃蜀葵詩云能共牡丹爭幾許得人憎處只緣多豫嘗語客花多固取輕於人何憎嫌之有因論木芙蓉全似芍藥但患無兩平字易牡丹字欲改此句作得人輕處只緣多衆以為善且謂移芍藥二字在句首則可矣豫以失全句為疑或云本草芍藥一名餘容因綴一絶云花如人靣映秋波拒傲清霜色更和能共餘容爭幾許得人輕處只緣多白樂天和錢學士白牡丹詩云唐昌玉蕊花攀玩衆所爭折來比顔色一樹如瑶瓊彼因稀見貴此以多為輕固知輕字為勝吳興園林記端肅和王家後臨顔魯公池依城曲折亂植拒霜號芙蓉城見聞後録李太白詩云昔作芙蓉花今為斷腸草按陶𢎞景仙方注云斷腸草不可食其花美好名芙蓉錦里新聞錦城因錦江之水濯錦而名人又謂蜀王衍命蜀城遍栽芙蓉花得名亦新花經芙蓉九品一命瓶花譜芙蓉六品四命蜀都雜抄蜀城謂之芙蓉城傳自孟氏今城上聞栽有數株兩嵗著花豫適閲視見之皆淺紅一色花亦凋瘵殊不若吳中之爛然數色也泉南雜志芙蓉有産於山者余廨後手插一枝未半載扶疏出墻名曰木芙蓉花最繁盛不下數百大如甌其色有朝紅暮白者此則惟粉紅一色耳弇山園記蓮池東西可七丈許南北半之長夏醉而臨池不茗而醒遊客每徙倚其地輒詫謂豫此何必減王衛軍芙蓉池也余謝不敢當而會吾鄉有從廢圃下得一石刻曰芙蓉渚是開元古𨽻或云范石湖家物因樹之池右池從南得小溝宛轉與後溪合傍皆紅白木芙蓉環之蓋亦不偶云原學圃餘疏芙蓉特宜水際種類不同先後開故當雜植之大紅最貴最先開次淺紅常種也白最後開有曰三醉者一日間凡三換色亦竒客言曽見有黃者芙蓉入江西俱成大樹人從樓上觀吾地如榛荆狀故須三年一斫却花史溫州江心寺文丞相祠中有木芙蓉盛開其本高二丈幹圍四尺花幾萬餘暢茂散漫芙蓉有二種出於水者謂之草芙蓉出於陸者謂之木芙蓉又名木蓮樂天詩曰水蓮開盡木蓮開謂此邛州有弄色木芙蓉一日白二日淺紅三日黃四日深紅比落色紫人號為文官花許智老為長沙有木芙蓉二株可庇畝餘一日盛開賔客盈溢坐中有王子懷者言花朵不踰萬數若過之願受罰智老許之子懷因指所攜妓賈三英胡錦鼎文帔以酬直智老乃命厮僕羣採凡一萬三千餘朵子懷褫帔納主人而遁集藻頌增梁江淹木蓮頌迸采泉壑騰光淵丘緗麗碧巘紅艷桂洲山人結侣靈俗共遊時至不採為子淹留贊增宋宋祁添色拒霜花贊自濃而淡花之常態今顧反之亦不之怪五言古詩增唐桞宗元湘岸移木芙蓉植龍興精舍有美不自蔽安能守孤根盈盈湘西岸秋至風露繁麗影别寒水穠芳委前軒芰荷諒難雜反此生高原巽公院芙蓉亭新亭俯朱檻嘉木開芙蓉清香晨風逺縟彩寒露濃瀟灑出人世低昂多異容嘗聞色空喻造物誰為工流連秋月晏迢遞來山鐘原宋歐陽修拒霜花芳菲能幾時顔色如自愛鮮鮮弄霜曉裊裊含風態蕙蘭殞秋香桃李媚春醉時節雖不同盛衰終一致莫笑黃菊花籬根守憔悴增司馬光未開木芙蓉木末采芙蓉騷人歌所無何言霜花艷不與水芝殊香苞麝臍結茂葉桐隂敷豈若龜巢類飄零老五湖蘇軾王伯敡所藏趙昌芙蓉清飈已拂林積水漸收潦溪邊野芙蓉花木相媚好坐看池蓮盡獨伴霜菊稿幽姿強一笑暮景迫摧倒凄涼似貧女嫁晚驚衰早誰寫少年容樵人劔南老陳與義拒霜拒霜花已吐吾宇不凄涼天地雖肅殺草木有芬芳道人宴坐處侍女古時妝濃露濕丹臉西風吹緑裳范成大羔羊齋小池兩涘木芙蓉盛開有懷故園洞户掩秋深畫橋橫晚靜嫋嫋芙蓉風池光弄花影懷我白鷗邊錦障繚千頃明湖拍岸平紅緑染天鏡釣船無畔岸收拾入簿領牆籓束院落寒窘令人癭楊萬里山寺觀木芙蓉初約山寺遊端為怪竒石那知雲水鄉化作錦繡國入門徑深深過眼秋寂寂隔竹小亭明稠紅滿疏碧山僧引幽踐絶巘恣往陟三步綺為障十步霞作壁四圍盡芙蓉山僧所手植秋英例臞淡此花獨腴澤却憶補外時朝士作祖席是間萬株梅冷射千崖白舊遊不可尋雪枝半榛棘金黨懷英西湖芙蓉林飈振危柯野露委荒蔓孤芳為誰妍一笑聊自獻明妝炫朝麗醉態羞晚困脈脈懷春情悄悄驚秋怨豈無桃李媒不嫁惜嬋媛悠哉清霜暮共抱蘭菊恨元朱德潤題芙蓉花屏夾城遺芳栽搖落及千年芙蓉發靚妝絶艷秋江邊臨風拂羅幃紅裳擁三千素抱拒霜質亭亭赤城仙曽攜一枝去生綃記餘妍五言律詩原唐韓愈木芙蓉新開寒露叢逺比水間紅艷色寧相妬嘉名偶自同採江官渡晚搴木古祠空須得勤來看無令便逐風增宋梅堯臣詠王宗説園黃木芙蓉水中兼木末相擬有嘉花玉蕊坼蒸粟金房落晚霞涉江從楚女采菊聼陶家事與離騷異吾將搴以誇陶弼木芙蓉孤芳託寒木一曉一番新春色不為主天香勤動人丹楓見流落黃菊坐因循莫訝偏相愛衰遲似我身原明申時行芙蓉沜羣芳搖落後秋色在林塘艷態偏臨水幽姿獨拒霜漢臯霞作佩湘曲錦為裳白首滄江上相看醉夕陽七言律詩增唐劉兼詠木芙蓉素靈失律詐風流強把芳菲半載偷是葉葳㽔霜照夜此花爛漫火燒秋謝蓮色淡爭堪種陶菊香濃亦合羞誰道金風能肅物因何厚薄不相侔宋徐鉉題殷舍人宅木芙蓉憐君庭下木芙蓉嫋嫋纖枝淡淡紅曉吐芳心零宿露晚搖嬌影媚清風似含情態悲秋雨暗減馨香借菊叢默飲數杯應未稱不知歌管與誰同范成大攜家石湖賞拒霜水上晴雲綵蝀橫許多蜂蝶趁船行漁樵引入新花塢兒女扶登小錦城艷粉發妝朝日麗濕紅浮影晚波清誰知搖落霜林畔一假韶光畫不成原楊萬里拒霜花木蕖何似水芙蕖同個聲名各自都風露商量借膏沐胭脂深淺入肌膚喚回春色秋光裏饒得紅妝翠蓋無字曰拒霜渾不惡却愁霜重要人扶方嶽木芙蓉緑裳丹臉水仙容不謂佳名偶自同一朵方酣初日色千枝應發去年叢莫驚墜露添新紫更待微霜暈淺紅却笑牡丹猶淺俗但將濃艷醉春風增元蒲道源紅芙蓉豐肌弱骨與秋宜宿酒酣來不自持豈為嚴霜成稿質要憑初日發妍姿燕姬入畫猶嫌陋蜀錦團窠未足竒獨對芳叢寄幽興子高真是遇仙時轉觀芙蓉露涼風冷見溫柔誰挽春還九月秋午醉未醒全帶艷晨妝初罷尚含羞未甘白紵居寒素也著緋衣入品流若信牡丹南靣貴此花應自合封侯明袁凱浦上木芙蓉盛開約黃鶴山人共觀江浦芙蓉色正深青霜點染更沉沉孤舟向日曽親見短褐於今欲逺尋已擬攜尊同野客不妨展席對沙禽明年臂痛應全愈移遍東園野木隂原申時行小園看芙蓉西園試詠鄴中詞正及朱華冒緑池綽約偏多臨水態逍遙獨抱拒霜姿吳姬曉鏡臨妝早楚客霞裳集錦遲最愛秋江留晚色儘教白首醉瓊巵五言絶句原宋宋祁木芙蓉皓露侵緗蕊尖風獵絳英繁霜不可拒切弗受空名江南江北樹秋至僅成叢向晚誰爭艷酡顔淺作紅增梅堯臣拒霜木杪芙蓉花開非紅艷早常畏晚霜寒朱華競衰草原石延年木芙蓉深淺霜前後應同舊渚紅羣芳坐衰歇聊自舞秋風朱子木芙蓉紅芳曉露濃緑樹秋風冷共喜巧回春不妨間弄影楊萬里木芙蓉染露金風裏宜霜玉水濵莫嫌開最晚元自不爭春七言絶句增唐李嘉祐秋朝木芙蓉水面芙蓉秋已衰繁條倒是著花時平明露滴垂紅臉似有朝開暮落悲白居易木芙蓉下招客飲晚涼思飲兩三杯召得江頭酒客來莫怕秋無伴醉物水蓮花盡木蓮開黃滔木芙蓉三首黃鳥啼煙二月朝若教開即牡丹饒天嫌青帝恩光盛留與秋風雪寂寥却假青腰女翦成緑羅囊綻綵霞呈誰憐不及黃花菊只遇陶潛便得名須到露寒方有態為經霜裛稍無香移根若在秦宫裏多少佳人泣曉妝原宋歐陽修木芙蓉種處雪消春始動開時霜落雁初過誰栽金菊叢相近織出新番蜀錦窠增司馬光和秉國芙蓉五章清曉霜華漫自濃獨憑佳日養殘紅勸君秉燭須勤賞閶闔難禁一夜風北方稀見誠竒物筆界輕絲指捻紅楚蜀可憐人不賞牆根屋角數無窮平昔低頭避桃李英華今發嵗云秋盛時已過渾如我醉舞狂歌插滿頭後時獨立誠難事猶賴階庭有菊叢綽約霜前弄姿態非如羣木萬林紅但見涉江求水際豈知緣木采霜中微紅未肯全衰歇正似􅋳顔鶴髮翁原王安石木芙蓉水邊無數木芙蓉露染胭脂色未濃正似美人初醉著強擡青鏡欲妝慵拒霜花落盡羣花獨自芳紅英渾欲拒嚴霜開元天子千秋節戚里人家承露囊增文同芙蓉蜀國芙蓉名二色重陽前後始盈枝畫調粉筆分班處繡引金針間刺時原蘇軾和述古拒霜花千林掃作一番黃只有芙蓉獨自芳喚作拒霜知未稱細思却是最宜霜增張耒芙蓉今年古寺摘芙蓉憔悴真成澤畔翁聊把一枝間照水明年何處對霜紅范成大窗前木芙蓉辛苦孤花破小寒花心應似客心酸更憑青女留連得未必愁紅怨緑看題羔羊齋外木芙蓉慵妝酣酒夕陽濃洗盡霜痕看綺叢緑地團花紅錦障不知庭院有西風陸遊拒霜滿庭黃葉舞西風天地方收肅殺功何事獨蒙青女力牆頭催放數苞紅原劉珵木芙蓉翠幄臨流結絳囊多情常伴菊花芳誰憐冷落清秋後能把柔姿獨拒霜劉克莊芙蓉二絶湖上秋風起棹歌萬株映桞更依荷老來不作繁華夢一樹池邊已覺多池上秋開一兩叢未妨冷淡伴詩翁而今縱有看花意不愛深紅愛淺紅增劉圻父木芙蓉曉妝如玉暮如霞濃淡分秋染此花終日獨酲干底事晚知爛醉是生涯陳經國木芙蓉紫茸排萼露微紅不比春花對日烘冷落半秋誰是侣可憐妖艷嫁西風原鄭域木芙蓉妖紅弄色絢池臺不作匆匆一夜開若遇春時占春榜牡丹未必作花魁增元虞集木芙蓉九月襄王宴渚宫霓旍翠羽度雲中滿汀山雨衣裳濕宋玉愁多賦未工宋褧長安驛道中觀芙蓉寄嘲伯循玉溪橋畔淡朝霞照景紅妝泫露華説似分司才御史水邉花勝驛中花盧琦題錢舜舉木芙蓉紅妝初映酒杯酣斜倚西風轉不堪霜後池塘秋欲盡令人惆悵憶江南明徐賁雨後慰池上芙蓉池上新晴偶獨過芙蓉寂寞照寒波相看莫厭秋情薄若在春風怨更多原謝遷芙蓉傍水施朱意自真幽棲非是避芳塵已呼晚菊為兄弟更為秋江作主人增吳孔嘉木芙蓉半臨秋水照新妝淡靜丰神冷艷裳堪與菊英稱晚節愛他含雨拒清霜僧文湛題畫芙蓉江邉誰種木芙蓉寂寞芳姿照水紅莫怪秋來更多怨年年不得見春風詩散句原宋歐陽修湖上野芙蓉含思秋脈脈娟娟如靜女不肯傍阡陌詩人杳未來幽艷冷難宅李覯甚疑牡丹叢但病皮骨老不宜入水看只可隔水眺增唐韓愈四隅芙蓉樹擢艷皆猗猗原宋宋祁麴塵輕抱蕊宫纈巧裝叢梅堯臣託根地雖卑凌霜花亦茂增文同何人露秋纈不管著秋霜許棐霜樹不知醜葉與花爭紅明沈周秋風吹冷艷晨露濕新妝原唐高幨芙蓉生在秋江上不向東風怨未開增宋宋祁情知邊地風霜惡不肯將花剩占秋文同落晚自憐窺露沼忍寒誰念倚霜籬秦觀芙蓉露濃紅壓枝幽禽感秋花畔啼黃庭堅霜花留得紅妝面酌盡齋中竹葉瓶客興不辜春竹葉年華全屬拒霜叢原韓駒舊時憶在延真館玉作芙蓉院院明增楊萬里亂翦素羅妝一樹略將敗朵點胭脂徐似道一帶拒霜三十里又催簫鼓作秋聲張俞待教滿地妖紅落獨與秋風作主人原戴復古就中一種芙蓉别只染鵝黃學道妝翁卷芙蓉不分秋蕭索鬭拆繁紅滿樹頭詞增葉夢得卜算子曉雨洗新妝艷艷驚衰眼不趁東風取次開待得清霜晚曲港照回流影亂微波淺作態低昂好自持江濶煙村逺原范成大菩薩蠻冰明玉潤天然色凄涼拚作西風客不肯嫁東風殷勤霜露中緑窗梳洗晚笑把琉璃盞斜日上妝臺酒紅和困來高觀國菩薩蠻紅雲半壓秋波急艷妝泣露嬌啼色佳夢入仙城風流石曼卿宫袍呼醉醒休捲西風錦明日粉香殘六橋煙水寒晏殊少年遊霜華滿樹蘭凋蕙慘秋艷入芙蓉胭脂嫩臉黃金輕蕊猶自怨春風前歡往事當歌對酒無限到心中更憑朱檻憶芳容腸斷一枝紅增蘇軾定風波兩兩輕紅半暈腮依依獨為使君回若道使君無此意何為雙花不向别人開但看低昂煙雨裏不已勸君休訴十分杯更問尊前狂副使來嵗花開時節與誰來别録原種植十月花謝後截老條長尺許卧置窖內無風處覆以乾壤及土候來春有萌芽時先以硬棒打洞入糞及河泥漿水灌滿然後插入上露寸餘遮以爛草即活當年即花若不先打洞傷其皮即死製用皮柔韌連條風戾之至春漚于池以糾綆索甚能勝水多種之嵗可髠用御定佩文齋廣羣芳譜卷三十九
