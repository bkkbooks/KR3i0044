折來好似年時小窗能有髙低無頓許多香處只消三兩枝兒朱淑真菩薩蠻也無梅桞新標格也無桃李妖嬈色一味惱人香羣花爭敢當情知天上種飄落深巖洞不管月宫寒將枝比並看增趙與仁柳梢青露冷仙梯霓裳散舞記曲人歸月度層宵雨連深夜誰管花飛金鋪滿地苔衣似一片斜陽未移生怕清香又隨涼信吹過東籬原李易安鷓鴣天暗淡輕黃體性柔情疏迹逺只香留何須淺碧深紅色自是花中第一流梅定妒菊應羞詩書間處冠中秋騷人可煞無情思何事當年不見收向子諲蝶戀花巖桂秋風南埭路墻外行人十里香隨步此是薌林遊戲處誰知不向塵根住今日對花非浪語憶昨明光早荷君王顧生怕青蠅輕點汚思鱸何似思花去張掄臨江仙玉宇涼生清禁曉丹葩色照晴空珊瑚敲碎小玲瓏人間無此種來自廣寒宫雕玉欄干深院靜嫣然凝笑西風曲屏須占一枝紅且圗欹醉枕香到夢魂中增鄭域驀山溪嫣然一笑風味人間沒來自廣寒宫直偷得天香入骨軟金縷屑點綴碧瓊枝花藏葉葉籠花剛被風吹拂道人衾帳不用沉煙尉插滿枕屏山覺身在藍橋仙窟一觴一詠消得九秋愁籬邉菊畹中蘭甘避芳塵不吳文英古香幔怨蛾墜柳離佩搖葓霜訊南浦謾掩橋扉倚竹袖寒日暮還問月中遊夢飛過金風翠羽把殘雲剩木萬頃暗薰冷麝凄苦漸浩渺凌山髙處秋淡無光殘照誰主露粟侵肌夜約羽林輕誤翦碎惜秋心更腸斷珠塵蘚路怕重陽又催近滿城風雨原向子諲滿庭芳月窟盤根雲巖分種絶知不是塵凡琉璃翦葉金粟綴花繁黃菊周旋避舍友蘭蕙羞殺山礬清香逺秋風十里鼻觀已先參酒闌聼我語平生半世江北江南經行處無窮緑水青山常被此花相惱思共老結屋中間不知爾薌林底事遊戲到人寰增劉子翬滿庭芳秋入微隂涼生平逺小山愁絶天南似聞還斷飛策遍千巖葉底輕黃纂纂惱人是微裂方緘倐然勝清真冷淡無艷寄塵凡澄潭欹兩岸波光搖動碧影相參任西風十里吹度松杉我自寒灰稿木凝神處不覺醺酣歸來晚飛花無迹明月滿空涵元顧瑛水調歌頭金粟綴仙樹玉露浣人愁誰道買花載酒不似少年遊最是宫黃一點散下天香萬斛來自廣寒秋蝴蝶逐人去雙立鳳叉頭向樽前風滿袖月盈鉤縹眇羽衣天上遺響遏雲流二十五聲秋點三十六宫夜月橫笛按伊州同躡彩鸞背飛過小紅樓宋僧仲殊金菊對芙蓉花則一名種分三色嫩紅妖白嬌黃正清秋佳景雨霽風涼郊墟十里飄蘭麝瀟灑處旖旎非常自然風韻開時不惹蝶亂蜂狂攜酒獨挹蟾光問花神何屬離兌中央引騷人乘興廣賦詩章許多才子爭攀折嫦娥道三種清香狀元紅是黃為榜眼白探花郎原陳亮桂枝香天髙氣肅正月色分明秋容新沐桂子初收三十六宫都足不辭散落人間去怕羣花自嫌嫌俗向他秋晚喚回春意幾曽幽獨是天上餘香賸馥怪一樹香風十里相續坐對花傍但見色浮金粟芙蓉只解添愁思况東籬凄涼黃菊入時太淺背時太逺愛尋髙躅增朝補之水龍吟智瓊嬌額塗黃為誰種作秋風蕊寒香半露緑幃深護猶聞十里山麝生臍水沉削蠟一時羞避向錢塘江上中秋月下有人暗尋遺子不奈書生習氣對羣花領略風味騷人已去欲紉幽佩重為湘酎天賦風流友梅兄蕙輿桃奴李向明窗棐几纖枝未老眼明如水别録原晉書郤詵傳詵遷雍州刺史武帝於東堂會送問詵曰卿自以為何如詵對曰臣舉賢良對策為天下第一猶桂林之一枝崑山之片玉帝笑增世説客有問陳季方足下家君太丘有何功德而荷天下重名季方曰吾家君譬如桂樹生泰山之阿上有萬仭之髙下有不測之深上為甘露所霑下為淵泉所潤當斯之時桂樹焉知泰山之髙淵泉之深不知有功德與無也原翰林雜事鈔武帝謂東方朔孔顔之道德何勝方朔曰顔淵如桂馨一山孔子如春風至則萬物生詩話竇禹鈞有五子俱登科馮道贈之詩曰靈椿一株老丹桂五枝芳增率真筆記關關贈俞本明以青華酒杯酌酒輒有異香在內或有桂花或梅或蘭視之宛然取之若影酒乾亦不見矣俞寶之原石桂英似桂樹而實石生巖穴中製用談苑桂漿殆今之桂花釀酒法魏有頻斯國人來朝壺中有漿如脂乃桂漿也飲之夀千嵗便民圗纂花開時擇枝繁處帶花刪下連葉隂乾收貯來年伏中將葉泡湯服溫腹去暑桂花點茶香生一室菊英次之入茶為清供之最有甘菊種更宜茶二花相為先後可備四時之用增清供録天香湯白木犀盛開時清晨帶露用杖打下花以布被盛之揀去蒂萼頓在淨磁器內候聚積多然後用新砂盆擂爛如泥木犀一斤炒鹽四兩炙粉草二兩拌勻置磁瓶中密封曝七日每用沸湯點服一名山桂湯一名木犀湯原移種花時移栽髙阜半日半隂處臘雪髙擁於根則來年不灌自發忌人糞宜豬糞冬月以撏豬湯澆一次妙又麻糝久浸候水清澆亦佳蠶沙壅根澆以清水來年愈盛北方地寒九月十月間將樹以土培根髙尺許外苫蓋周密嚴塗以泥半腰向南留一小牖暖日開之以透太陽之氣寒則塞之春分後去其塞清明後去其苫無有不活插接種樹書接宜冬青又春月攀枝著地土壓之五月生根逾年截斷含蕊移栽木犀接石榴花必紅防患物類相感志木犀蛀者用芝麻梗帶殼束懸樹上御定佩文齋廣羣芳譜卷四十
