body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷四十一花譜山茶原山茶一名曼陀羅樹髙者丈餘低者二三尺枝幹交加葉似木樨硬有稜稍厚中濶寸餘兩頭尖長三寸許面深緑光滑背淺緑經冬不脫以葉類茶又可作飲故得茶名花有數種十月開至二月有鶴頂茶大如蓮紅如血中心塞滿如鶴頂來自雲南曰滇茶瑪瑙茶紅黃白粉為心大紅為盤産自溫州寶珠茶千葉攢簇色深少態楊妃茶單葉花開早桃紅色焦萼白寶珠似寶珠而蘂白九月開花清香可愛正宫粉賽宫粉皆粉紅色石榴茶中有碎花海榴茶青蒂而小菜榴茶躑躅茶類山躑躅真珠茶串珠茶粉紅色又有雲茶磬口茶茉莉茶一捻紅照殿紅郝經詩注云山茶大者曰月丹又大者曰照殿紅千葉紅千葉白之類葉各不同或云亦有黃者不可勝數就中寶珠為佳蜀茶更勝虞衡志云廣州有南山茶花大倍中州色微淡葉薄有毛結實如梨大如拳有數核如肥皂子大于若瀛云寶珠山茶千葉含苞歷幾月而放殷紅若丹最可愛聞滇南有二三丈者開至千朵大于牡丹皆下垂稱絶艷矣增雲南志土産山茶花謝肇浙謂其品七十有二趙璧作譜近百種大抵以深紅軟枝分心卷瓣者為上原紅花為末入薑汁童便酒調服治吐血衄血下血可代鬱金研末麻油調塗湯火傷灼彚考增劔南詩注成都海雲寺山茶一樹千苞特為繁麗海雲寺山茶開故事宴集甚盛花經山茶七品三命瓶花譜黃白山茶二品八命蜀茶三品七命光福山記海雲院有連理山茶原學圃餘疏潯陽陶狄祠山茶一株幹大盈抱枝蔭滿庭二月三日祭時花特盛好事者分種之竟無一活紹興曹娥廟亦有之止如拱把之半土人云千年外物也黃山茶白山茶紅白茶梅皆九月開二山茶花大而多韻亦茶中之貴品楊妃山茶稍後與白菱同時開楊妃是淡紅殊不為佳為是冬初花當具一種耳吾地山茶重寶珠有一種花大而心繁者以蜀茶稱然其色類殷紅嘗聞人言滇中絶勝余官莆中見士大夫家皆種蜀茶花數千朵色鮮紅作密瓣其大如杯云種自林中丞蜀中得來性特畏寒又不喜盆栽余得一株長七八尺舁歸植淡園中作屋幕于隆冬春時拆去蘂多輒摘却僅留二三花更大增閩部疏滇茶不寶珠而色鮮好嬌于寶珠茶其大如碗瓣有重臺交覆可當芍藥莆人林大輅中丞宦彼帶一株歸今傳種家有之開時千朵艷發緑葉掩映大是佳卉瓶史山茶鮮妍石氏之翾風羊家之靜婉也黃白山茶韻勝其姿郭冠軍之春風也滇中茶花記茶花最甲海內種類七十有二冬末春初盛開大於牡丹一望若火齊雲錦爍日蒸霞南城鄧直指有茶花百韻詩言茶有數絶一壽經三四百年尚如新植一枝幹髙竦四五丈大可合抱一膚紋蒼潤黯若古雲氣樽罍一枝條黝紏狀如麈尾龍形一蟠根輪囷離竒可憑而兒可藉而枕一豐葉森沉如幄一性耐霜雪四時常青一次第開放歷二三月一水養瓶中十餘日顔色不變滇雲紀勝書山茶花在會城者以沐氏西園為最西園有樓名簇錦茶花四面簇之凡數十樹樹可三丈花簇其上樹以萬計紫者朱者紅者紅白兼者映日如錦落英鋪地如坐錦茵此一竒也僕嘗以花時登簇錦賞之有十丈錦屏開緑野兩行紅粉擁朱樓之句及登太華則山茶數十樹羅殿前樹愈髙花愈繁色色可念不數西園矣滇南太華山記兩墀山茶樹八本皆髙二丈餘枝葉團扶萬花如錦集藻賦增宋黃庭堅白山茶賦并序姨母文城君作白山茶賦興寄髙逺蓋以自况類楚人之橘頌感之作後白山茶賦孔子曰嵗寒然後知松柏之後凋也麗紫妖紅爭春而取寵然後知白山茶之韻勝也此木産于臨川之崔嵬是為麻源第三谷仙聖所廬金堂瓊榭故是花也稟金天之正氣非木果之匹亞乃得骨于崑閬非乞靈于施夏造物之手執丹青而無所用析薪之斤雖睥睨而幸見赦髙潔皓白清修間暇裴回冰雪之晨偃蹇霜月之夜彼細腰之子孫與莊生之物化方培户以思溫故無得而陵跨蓋將與日月爭光何苦與洛陽爭價惟是當時而見尊顯處于瑶臺玉墀之上是以閉藏而無悶淡然于乾楓枯桞之下江北則上徐庾江南則數鮑謝蓋不能刻畫嫦娥藩飾姑射諒無地以寄言故莫傳于膾炙况乎見素抱朴難乎郢人故徐熙趙昌舐筆和鉛而不敢畫或謂山丹之皓質足以爭長而更霸知我如此不幾乎罵雖瓊華明后土之祠白蓮秀逺公之社皆聲名籍甚俗態不捨挾脂粉之氣而蘊蘭麝與君周旋其避三舍五言古詩增宋梅堯臣山茶花樹子贈李廷老南國有嘉樹華若赤玉杯曾無冬春改常冒霰雪開客從天目來移比瓊與瑰贈我居大梁蓬門方塵埃舉武尚有礙何地可以栽每遊平棘侯大第夾青槐朱欄植竒卉磨碧為壅臺於此豈不宜亟致勿徘徊將看榮茂時莫嗤寒園梅和普公賦東園山茶紅花勝朱槿越丹看更大臘月冒寒開楚梅猶不奈曽非中土有流落思江外蘇軾王伯敡所藏趙昌山茶蕭蕭南山松黃葉隕徑風誰憐兒女花散火冰雪中能傳嵗寒姿古來惟丘翁趙叟得其妙一洗膠粉空掌中調丹砂染此鶴頂紅何須誇落墨獨賞江南工原徐致中山茶山茶本晚出舊不聞圗經花深嫌少態曾入蘇公評邇來亦變怪紛然著名稱黃香開最早與菊為輩朋粉紅更妖嬈玉環帶春酲偉哉紅百葉花重枝不勝尤愛南山茶花開一尺盈月丹又其亞不減紅帶鞓吐絲心抽鬚鋸齒葉翦稜白茶亦數品玉磬尤晶明桃葉何處來𣲖别疑武陵愈出愈竒怪一見一歎驚增明釋道衍茶軒為陳惟寅賦千苞凛冰雪一樹當窗几晴旭曉微烘遊蜂掠芳蘂淡香勻密露繁艷照煙水幽人賞詠遲每恨殘紅委七言古詩增宋曽鞏山茶花山茶花開春未歸春歸正值花盛時蒼然老樹皆誰種照耀萬朵紅相圍蜂藏鳥伏不得見東風用力先吹噓追思前者葉蓋地萬木慘慘攢空枝寒梅數綻小顔色霰雪滿眼常相迷豈如此花開此日絳艷獨出凌朝曦為憐徑意似松柏欲攀更惜長依依山榴淺薄豈足比五月霧露空芳菲明蘇伯衡中丞劉先生齋閣前山茶一枝並蒂因效柏梁體朔風翦冰雨雪雱萬木蕭條凍且僵青藜丈人鈴閣傍山茶作花紅錦妝中有一枝並蒂香符彩爛若雙鴛鴦嫣然占盡三春光皇英來自雲中央赤旗翠節兩作行阿母笑執瑶池觴仙童雙雙吹鳳凰綵女齊綰珊瑚璫麗色照耀青霞裳芳氣氤氲滿中堂大君尺劔空八荒牛歸桃林馬華陽百度既貞四維張禮樂誰云謙未遑制作直欲追虞唐丈人今之杜與房主臣合德真明良朝夕左右扶維綱餘子議論安敢當一朝嘉惠錫后皇乃是人文發禎祥玉局仙子喜欲狂更祝人文夀而康黼黻鴻猷煥天章嘉樹呈瑞垂無疆五言律詩增宋朱長文次韻司封使君和練推官再詠山茶珍木何年種繁英滿舊枝開從殘雪裏盛過牡丹時對日心全展凌風幹不欹藥階如賦詠欠此尚相思七言律詩增宋曾鞏以白山茶寄吳仲庶山茶純白是天真筠籠封題摘尚新秀色未饒三谷雪清香先得五峰春瓊花散漫情終蕩玉蘂蕭條迹更塵逺寄一枝隨驛使欲分芳種更無因原蘇軾和子由開元寺山茶舊無花今嵗盛開長明燈下石闌干長共松杉鬭嵗寒葉厚有稜犀甲健花深少態鶴頭丹久陪方丈曼陀雨羞對先生苜蓿盤雪裏盛開知有意明年歸後更誰看增蘇轍宛丘開元寺殿下山茶一株數年不開頃從子瞻遊此每以為恨今二月中山茶開千餘朵因作詩奉寄古殿山花叢百圍故園曽見色依依凌寒強比松筠秀吐艷空驚嵗月非冰雪紛紜真性在根株老大衆緣稀山中草木誰攜種潦倒塵埃不復歸謝薖玉茗花佳園昨夜變春容清曉驚開玉一叢素質定欺雲液白淺妝羞退鶴翎紅似聞金谷初無種欲畫鵝溪恐未工底事餘花避三舍孤髙元有使君風騷人漫説麻源谷本在風流刺史家直與瑶林共髙徹可須梅影鬭橫斜芳尊莫待紅妝賞幽艷長令烈士嗟憑仗邉鸞折枝手應宜展障玉鴉乂范成大十二月十八日海雲賞山茶追趁新晴管物華馬蹄鬆快帽簷斜天南臘盡風晞雪冰下春來水潄沙已報主林催市桞仍從掌故問山茶豐年自是歡聲沸更著牙前畫鼓撾十一月十日海雲賞山茶門巷歡呼十里村臘前風物已知春兩年池上經行處萬里天邉未去人客鬢花身俱嵗晚妝光酒色且時新海雲橋下溪如鏡休把冠巾照路塵原楊萬里山茶樹子團團映碧岑初看喚作木犀林誰將金粟銀絲膾簇飣朱紅菜碗心春早橫招桃李妬嵗寒不受雪霜侵題詩畢竟輸坡老葉厚有稜花色深王十朋族兄文通贈山茶野性無端喜種花吾兄得得贈山茶鶯聲老後移雖晚鶴頂丹時看始佳雨葉鱗鱗成小蓋春枝艷艷首羣葩自慙欲報無瓊玖來往同看本一家劉克莊山茶青女行霜下曉空山茶獨殿衆花叢不知户外千林縞且看盆中一本紅性晚每經寒始拆色深却愛日微烘人言此樹尤難飬暮溉晨澆自課童增元郝經月丹小艇移來江漲橋盤盤矮矮格仍嬌丹霞皺月雕紅玉香霧凝春翦絳綃一種是花偏富貴三冬無物比妖嬈廣寒記憶曽攀折滿殿光搖照紫霄五言絶句原明于若瀛山茶丹砂點雕蘂經月獨含苞既足風前態還宜雪裏嬌增陳淳山茶丹葩間碧葉雪中自重疊山人倚醉時奈可映赬頰窮冬多雪霰柔脆已先摧不是丹砂質寧能醉後開七言絶句原宋陶弼山茶淺為玉茗深都勝大白山茶小海紅名譽漫多朋援少年年身在雪霜中江南池館厭深紅零落空山煙雨中却是北人偏愛惜數枝和雪上屏風蘇軾邵伯梵行寺山茶山茶相對阿誰栽細雨無人我獨來説似與君君不會爛紅如火雪中開趙昌山茶遊蜂掠盡粉絲黃落蘂猶收蜜露香待得春風幾枝在年來殺菽有飛霜增范成大玉茗花折得瑶華付與誰人間鉛粉弄妝遲直須逺寄驂鸞客鬢腳飄飄可一枝陸遊山茶一樹自冬至清明後著花不已東園三日雨兼風桃李飄零掃地空惟有小茶偏耐久緑叢又放數枝紅山茶雪裏開花到春晚世間耐久孰如君慿闌歎息無人會三十年前宴海雲原俞國寶花近東溪居士家好携樽酒欵攜茶玉皇收拾還天上便恐筠陽無此花玉潔冰寒自一家地偏驚對此山茶歸來不負西遊眼曽識人間未見花增金假克已山茶雪娘子宫中儀體新八姨羞把舊妝勻畫羅瑞錦難相稱故著龍香簇絳巾元馬祖常趙中丞折枝山茶火齊珠紅拂翠翹石家步障曉寒消千枝蠟炬燒春夜羯鼓催花打六么薩都剌阻風南露筋過羅漢寺看山茶野寺尋春酒未醒不知幾日過清明小闌干外東風急一樹山茶落晚晴明沈周白山茶犀甲凌寒碧葉重玉杯擎處露華濃何當借夀長生酒只恐茶仙未肯容紅山茶老葉經寒壯嵗華猩紅點點雪中葩願希葵藿傾忠膽豈是爭妍富貴家原張新寶珠茶胭脂染就絳裙襴琥珀裝成赤玉盤似共東風解相識一枝先已破春寒楊妃茶曽將傾國比名花别有輕紅暈臉霞自是太真多異色品題兼得重山茶詩散句原宋張舜民葉硬經霜緑花肥映雪紅增僧惠洪千朵鶴頂紅染此叢間緑明沈周雪後無顔色凌寒見此花原宋王十朋道人贈我嵗寒種不是尋常兒女花曽季貍惟有山茶殊耐久獨能深月占春風無名氏徑節不摧岷嶺雪芳姿偏受建溪風元郝經秦女怨離拋翡翠漢宫愁絶冷胭脂别録增藥圃同春蜀茶紅白二色清而喜腴秋時用烏豆水灌之其花益妍原栽接春間臘月皆可移栽四季花寄枝宜用本體黃花香寄枝宜用茶體若用山茶體花仍紅色白花寄枝同上一種玉茗如山茶而色白黃心緑萼磬口花鬯口花宜子種以單葉接千葉者則花盛樹久以冬青接十不活一蠟梅增本草蠟梅一名黃梅花黃庭堅詩序云香氣似梅類女工撚蠟所成京洛人因謂蠟梅范成大梅譜云本非梅類以其與梅同時而香又相近色酷似蜜脾故名蠟梅王世懋學圃餘疏云考蠟梅原名黃梅故王安國熙寧間尚詠黃梅至元祐間蘇黃命為蠟梅人言臘時開故名臘梅非也為色正似黃蠟耳原蠟梅小樹叢枝尖葉木身與葉類桃而濶大尖硬花亦五出色欠晶明以子種出經接過花疏雖盛開常半含名磬口梅梅譜云言似僧磬之口也學圃餘疏云出河南花史云楚中荆襄者最佳色深黃圎瓣如白梅若瓶一枝香可盈室次曰荷花學圃餘疏云出松江花史云瓣有微尖形似荷花又次曰九英梅譜云子種不經接花小香淡其品最下謂之狗蠅後訛為九英又有開最先色深黃如紫檀花密香濃名檀香梅此品最佳此花多宿葉結實如垂鈴尖長寸餘子在其中彚考增王直方詩話蠟梅山谷初見之戲作二絶緣此盛於京師原梅譜蠟梅香極清香殆過於梅初不以形狀貴也故難題詠山谷簡齋但作五言小詩而已增賔朋宴話王直方父家多侍兒而小鬟素兒尢妍麗王嘗以蠟梅花送朝無咎無咎以詩謝之有云芳菲意淺姿容淡憶得素兒如此梅竹坡詩話東南有蠟梅蓋自近時始余童時猶未之見元祐間魯直諸公方有詩前此未嘗有賦此詩者政和間李端叔在姑溪元夕見之僧舍中嘗作兩絶其後篇云程氏園當尺五天千金爭賞憑朱欄莫因今日家家有便作尋常兩等看觀端叔此詩可以知前日之未嘗有也梅溪詩注東南臘梅葉落始開峽中地暖花開而葉不落三桞軒雜識姚氏殘語以蠟梅為寒客今改為久客花經蠟梅一品九命瓶史浴蠟梅宜清瘦僧然寒花性不耐浴當以輕綃護之蠟梅以水仙為婢京口諸山記焦山觀音閣蠟梅一株輕風翩反若傳隱士神者集藻七言古詩原宋蘇軾蠟梅一首贈趙景貺天工點酥作梅花此有蠟梅禪老家蜜蜂採花作黃蠟取蠟為花亦其物天工變化誰得知我亦兒嬉作小詩君不見萬松嶺上黃千葉玉蘂檀心兩竒絶醉中不覺度千山夜聞梅香失醉眠歸來却夢尋花去夢裏花仙覓竒句此間風物屬詩人我老不飲當付君君行適吳我適越笑指西湖作衣鉢陳師道和蘇公蠟梅化人巧作緗樣花何年落子空王家羽衣霓裳涴香蠟從此人間識尤物青瑣朱郎却未知天公下取仙翁詩烏丸雞距寫玉葉却怪寒花未清絶北風驅雪度關山把燭看花夜不眠明朝詩成公亦去長使詩仙誦佳句湖山信美更須人已覺西湖屬此君坐想明年吳與越行酒賦詩聼擊鉢陳與義蠟梅智瓊額黃且勿誇回眼視此風前葩家家融蠟作杏蒂嵗嵗逢梅是蠟花世間真偽非兩法映日細看真是蠟我今嚼蠟已甘腴况此有韻蠟不如只愁繁香欺定力薰我欲醉須人扶不辭花前醉倒卧經月是酒是香君試别增周必大次韻王龜齡省中黃梅化工未約酴醿菊先放緗梅伴羣玉幽姿著意慕鉛黃正色何心輕萼緑妝成自淺風味深對此寧辭食無肉可憐涪翁被渠惱中嵗梅屏杯杓醁楊萬里蠟梅次坡公韻梅花已自不是花冰魂謫墮玉皇家不餐煙火更餐蠟化作黃姑瞞造物後山未覺坡先知東坡勾引後山詩金花勸飲金荷葉兩公醉吟許孤絶人間姚魏漫如山令人眼暗只欲眠此花寒香來又去惱損詩人難覓句月兼花影却三人欠箇文同作墨君吾詩無復古清越萬水千山一瓶鉢劉詵和羅昌逢蠟梅梅兄不見今幾時黃塵盡涴冰玉姿却疑來從金仙國已覺顔貌俱近之水邉林下恍如昨都非都似驚相嬉額黃萬斛塗未了頩怒半落宮簷枝縹裾下壓紺裙裼緗袖醉枕紅膚脂天寒鵝兒凍凝酒日明蜂户光分脾暗香著人欲襲骨妙意未必和靖知小窗靜晝膽瓶古長廊微雪珠簾垂一枝几案誰所置便覺春意生睫眉勿嫌吟詩苦不似酒觴更倒黃金巵五言律詩增宋尤袤蠟梅破臘驚春意凌寒試曉妝應嫌脂粉白故染麴塵黃綴樹蜂懸室排筝鴈著行團酥與凝蠟難學是生香原楊萬里蠟梅栗玉圓雕蕾金鐘細著行來從真臘國自號小黃香夕吹撩寒馥晨曦透暖光南枝本同姓喚我作他楊增朱子蠟梅風雪催殘臘南枝一夜空誰知荒草裏却有暗香同姿瑩輕黃外芳騰淺絳中不遭岑寂侣何以媚芳叢七言律詩增宋王安國黃梅花庾嶺時開媚雪霜梁園春色占中央莫教鶯過毛無色已覺蜂歸蠟有香㺯月似浮金屑水飄風如舞麯塵場何人剩著栽培力太液池邉想菊裳陸遊荀秀才送蠟梅與梅同譜又同時我為評香似更竒痛飲便判千日醉清狂頓減十年衰色疑初割蜂脾蜜影欲平欺鶴膝枝插向寶壺猶未稱合將金屋貯幽姿王十朋蠟梅天工著意點駝酥不與江梅鬭雪膚露滴蜂房釀崖蜜日烘龍腦噴金爐萬松張蓋黃尤好三峽藏春緑不枯題品倘非坡與谷世人應作小蟲呼原樓鑰詠蠟梅水仙二姝巧笑出蘭房玉質檀姿各自芳品格雅稱仙子態精神疑著道家黃宓妃漫詫凌波步漢殿徒翻半額糚一味真香清且絶明窗相對古冠裳增金趙秉文古瓶蠟梅石冷銅腥苦未清瓦壺溫水照輕明土花暈碧龍紋澀燭淚痕疏鴈字橫未許功名歸鼎鼐且收風月入瓶罌嬌黃喚醒朝陽夢漢苑荒涼草棘生元耶律楚材蠟梅越嶺仙姿迥異常洞庭春染六銖裳枝橫碧玉天然瘦蕾破黃金分外香反笑素英渾淡抹却嫌紅艷太濃糚臨風浥此薔薇露醉墨淋漓寄渺茫五言絶句原宋黃庭堅戲詠蠟梅二首金蓓鎖春寒惱人香未展雖無桃李顔風味極不淺體熏山麝臍色染薔薇露披拂不滿襟時有暗香度陳師道蠟梅異色深宜晚生香故觸人不施千點白别作一家春增陳師道和豫章公黃梅寒裏一枝春白間千點黃道人不好色行處若為香色輕花更艷體弱香自永玉質金作裳山明風㺯影舊鬢千絲白新梅百葉黃留花如有待迷國更煩香冉冉梢頭緑婷婷花下人欲傳千里信暗折一枝春黃裏含真意春容帶薄寒欲知誰稱靣偏插一枝看花裏重重葉叉頭點點黃祗應報春信故作著人香原陳與義蠟梅黃羅作廣袂絳帳作中單人間誰敢著留得護春寒一花香十里更值滿枝開承恩不在貌誰敢鬭香來增陳與義蠟梅朱朱與白白著意待春開那知洞房裏已傍額黃來花房小如許銅砌黃金塗中有萬斛香與君細細輸來從底處所黃露滿衣濕緣憨翻得憐亭亭倚風立奕奕金仙靣排行立曉晴殷勤夜來雪小住作珠纓亭亭金步搖朝日明漢宫當時好光景一似此園中韻勝誰能舍色莊那得親朝陽一映樹到骨不留塵王十朋蠟梅蝶採花成蠟還將蠟染花一經坡谷眼名字壓羣葩七言絶句原宋黃庭堅從張仲謀乞蠟梅聞君寺後野梅發香蜜染成官樣黃不擬折來遮老眼欲知春色到池塘天工戲翦百花房奪盡人工更有香埋玉地中成故物折枝鏡裏憶新妝卧雲莊上梅花發香似早梅開不遲淺色春衫弄風日遺來當為作新詩增朝補之謝王立之送蠟梅五首未教落素混冰池且看輕黃綴雪枝越使可因千里致春風元自未曽知恐是凝酥染得黃月中清露滴來香定知何遜牽詩興借與穿簾一點光上林初就召羣臣紫蒂同心各自新誰見小園春雪裏破春一萼更驚人詩報蠟梅開最先小奩分寄雪中妍水村映竹家家有天漢橋邉絶可憐去年不見蠟梅開凖擬新年恰恰來芳菲意淺姿容淡憶得素兒如此梅朝沖之和王立之蠟梅茅簷竹塢兩幽竒岸幘尋花醉亦知崖蜜已成蜂去盡夜寒惟有露房垂老去攀翻興益竒招携風月作新知但令春釀常如此百罰深杯亦倒垂荼䕷架倒花仍發薜荔墻摧石亦移此地與君凡幾醉年年同賦蠟梅詩步屧穿花醉晚風翻枝摘葉興何窮他年上苑求佳種越白江紅掃地空原韓駒蠟梅路入君家百步香隔簾初試漢宫妝只疑夢到昭陽殿一簇輕紅繞淡黃增張孝祥蠟梅滿面宫妝淡淡黃絳紗封蠟貯幽香遙憐未識花消息乞與一枝收斷腸周必大蠟梅繭黃織就費天機付與園林晚出枝詩老品題猶誤在紅梅未是獨開遲范成大從巨濟乞蠟梅寂寥人在曉雞窗苦憶花前續斷腸全樹折來應不惜君家真色自生香次韻漢卿舅蠟梅垂垂瘦萼泫微霜翦翦纖英鎖暗香金雀叉頭金蛺蝶春風傳得舊宫妝湘袂朝天紫錦裳光風微度絳霄香夀陽信美無仙骨空把心情學淡妝楊萬里蠟梅江梅珍重雪衣裳薄相紅梅學杏裝渠獨小參黃靣老額間艷艷發金光蜜蜂底物是生涯花作餱糧蠟作家嵗晚略無花可採却將香蠟吐成花天向梅梢别出竒國香未許世人知殷勤滴蠟緘封却偷被霜風折一枝香蜜栽葩分外工疏枝數點綴雛蜂嬌黃染就宫妝樣香暖猶宜愛日烘王十朋蠟梅劉郎不獨種桃花蠟蘂柔香更可佳臭味相同林下友從今花木亦通家謝翺蠟梅冷艷清香受雪知雨中誰把蠟為衣蜜房做就花枝色留得寒蜂宿不歸吳永齋蠟梅惹得西湖處士疑如何顔色到鵝兒清香全與江梅似只欠橫斜照水枝原金趙伯成蠟梅二首凍蕾含香蠟點勻古來幽谷有佳人詩家只怨和羮晚不道紅梅别是春冷艷疏香寂寞濵欲持何物向時人東風自是清狂手辦作竹籬茅舍春增元耶律楚材謝王巨川惠蠟梅雪裏冰枝破冷金前村籬落暗香侵令人多謝王公子分惠幽芳寄好音馮子振蠟梅洗却鉛膏飾道裝檀心淺露紫香囊從今宫額翻新樣變作眉間一點黃詩散句增宋曾肇紫蒂黃苞破臘寒清香旋逐角聲殘李豸底處嬌黃蠟樣梅幽香解向北寒開蘇伯業花鬚醖蜜共稱美蜜脾翦花噴沉水周必大東觀竒童承詔後南昌故尉欲仙時詞原宋王十朋點絳唇蠟換梅姿天然香韻初非俗蝶馳蜂逐蜜在花梢熟巖壑深藏幾載甘幽獨因坡谷一標題目髙價掀蘭菊李藝子卜算子蜜葉蠟蜂房花下頻來往不知辛苦為誰甜山月梅花上玉質紫金衣香雪隨風蕩人間喚作返魂梅仍是蜂兒樣韓元吉菩薩蠻江南雪裏花如玉風流越樣新裝束恰恰縷金裳濃薰百和香分明籬菊艷却作梅妝面無處奈君何一枝春已多趙彥端好事近一種嵗前春誰辨額黃腮白風意只吟羣木與此花全别此花佳處似佳人髙韻帶詩格君子嵗寒相許有芳心難結馬莊父浪淘沙嬌額尚塗黃不入時妝十分輕脆奈風霜幾度細腰尋得蜜錯認蜂房東閣久淒涼江路悠長休將顔色較芬芳無奈世間真若偽賴有幽香毛滂踏莎行粟玉玲瓏甕酥浮動芳跗染得胭脂重風前蘭麝作香寒枝頭煙雪和春凍蜂翅初開蜜房香㺯佳人寒睡愁如夢鵝黃衫子茜羅裙風流不與紅梅共馬莊父破陳子點綴莫窺天巧名稱却道人為香醖蜜脾分幾點色映烏雲倚一枝遙看倒透遲映水不嫌疏影嬌春也自同時紅樹落殘風乍暖塞管聲長曉更催此花知不知葉夢得千秋嵗曉煙溪畔曽記東風靣化工與重裁翦額黃明艷粉不共妖紅軟凝露臉多情正似當時見誰向滄波岸特地移間館情一縷愁千點煩君搜妙語為我催清燕須細看紛紛亂蘂空凡艷吳文英天香蟬葉粘霜蠅苞綴凍生香逺帶風峭嶺上寒多溪頭月冷枝北瘦枝南小玉奴有姊先占立墻隂春蚤初試宫黃淡泊偷分夀陽纖巧銀燭淚珠未曉酒鍾慳貯愁多少記得短亭歸馬暮衙蜂閙豆䓻叉頭恨裊但悵望天涯嵗華老逺信難封吳雲鴈杳增張翥水龍吟玉人梔貌堪憐曉妝一洗鉛華盡此花應是菊分顔色梅分風韻萼點駝酥口攢金磬心凝檀粉甚女貞染就仙衣絶勝蜂兒重鵝兒嫩説與玉龍莫品怕宫波一般流恨故人堪寄折枝代取江南春信沉水全薰蘖絲密綴額黃深暈乍燕姬未識是花是蠟笑偎人問别録原取用物類相感志蠟梅樹皮浸水磨墨發光彩本草花氣味辛溫解暑生津禁忌花史蠟梅人多愛其香但可逺聞不可近嗅嗅之頭痛屢試不爽種植子既成試沉水者種之秋間發萌放葉澆灌得宜四五年可見花一法取根旁自出者分栽易成樹瑞香原瑞香一名露甲一名蓬萊紫一名風流樹髙者三四尺許枝幹婆娑柔條厚葉四時長青葉深緑色有楊梅葉枇杷葉荷葉攣枝冬春之交開花成簇長三四分如丁香狀共數種有黃花紫花白花粉紅花二色花梅子花串子花皆有香惟攣枝花紫者更香烈枇杷葉者結子其始出於廬山宋時人家種之始著名攣枝者其節攣曲如斷折之狀其根綿軟而香葉光潤似橘葉邉有黃色者名金邉瑞香枝頭甚繁體幹柔韌性畏寒冬月須收暖室或窖內夏月置之隂處勿見日此花名麝囊能損花宜另種彚考原清異録廬山瑞香花始緣一比丘晝寢盤石上夢中聞花香酷烈及覺求得之因名睡香四方竒之謂為花中祥瑞遂名瑞香增花經紫風流一品九命三餘贅筆曾端伯以瑞香為殊友張敏叔以瑞香為佳客灌園史瑞香名始於廬山比丘則似前此未之有矣乃楚辭所載露甲或復以瑞香當之是時佛教未東豈得先有比丘耶意此花本名露甲至有廬山一事始易今名耳集藻序原宋吕大防瑞香圗序瑞香芳草也其木髙才數尺生山坡間花如丁香而有黃紫二種冬春之交其花始發植之庭檻則芳馨出於户外野人不以為貴宋景文亦闕而不載豫令舂城後二十年守成都公庭僧圃靡不有也豫恐其沒於草一日見知於時殆與人事無異感而圗之因為之序五言古詩原宋蘇軾次韻曹子方龍山真覺院瑞香花幽香結淺紫來自孤雲岑骨香不自知色淺意殊深移栽青蓮宇遂冠薝蔔林紉為楚臣佩散落天女襟君持風霜節耳聆歌笑音一逢蘭蕙質稍回鐵石心置酒要妍暖養花須晏隂及此隂晴間恐致慳嗇霖綵雲知易散鷤鵙憂先吟明朝便陳迹試著丹青臨增葉適新移瑞香舊曽作文忘之因今追憶云一株當三春名花不易得百年等尋丈不博千乘國野人三十本強賣青銅百應憐跗花具苦為薪米迫移栽向明陽妃媛儼行列土膏合根性功用成夙昔除香出淺紫泣露輕脈脈含愁欲誰訴折去情更惜方求蔽芾隂未受搔擢厄嗟余自羈旅何以慰新客殷勤深夜來少待山月白七言古詩增宋范成大瑞香花萬粒叢芳破雪殘曲房深院閉春寒紫紫青青雲錦被百疊薰籠晚不翻酒惡休拈花蘂嗅花氣醉人醲勝酒大將香供惱幽禪恰在蘭枯梅落後明宣宗瑞香花瑞香花葉如織其葉非一狀花開亦殊色或如碼瑙之殷紅或如玉雪之姿容或含淺絳或深紫細蕤疊萼芬玲瓏臘後春前花未放先春獨占梅花上繞枝芳意露毰毸萬卉千葩總相讓曈曨旭日照階墀淡蕩香風拂面時初疑沉檀爇寶鼎亦似蘭麝薰人衣瑞香花樹髙三尺強山桃野杏動踰丈得以幽叢約馥香五言律詩原宋楊萬里詠瑞香外著明霞綺中裁淡玉紗森森千萬筍旋旋兩三花小霽迎風喜輕寒索幕遮香中真上瑞蘭麝敢名家短短薰籠小團團錦帕圍浮陽烘酒思沉水著人衣茉莉通家逺椒花具體微春愁渾瘦盡别有瘦中肥增僧惠洪次韻真覺大師瑞香花淺色映華堂清寒熏夜香應持燕尾翦破此麝臍囊有恨成春睡無人見洗妝故山煙雨裏寂寞為誰芳七言律詩原宋蘇軾刁景純賞瑞香花憶先朝侍宴次韻上苑夭桃自作行劉郎去後幾回芳厭從年少追新賞間對宫花識舊香欲贈佳人非泛洧好紉幽佩弔沉湘鶴林神女無消息為問何年返帝鄉增周必大次韻楊廷秀待制瑞香花灞橋忍凍兩相攢漢殿含春别一般粉面固宜垂紫袖錦裳何必著中禪禁庭侍史今同宿宫帽花枝故自欒咀嚼新詩懷舊直刺貪寧不愧河檀原楊萬里瑞香花侵雪開花雪不侵開時色淺未開深碧團圞裏筍成束紫蓓蕾中香滿襟别𣲖近傳廬阜頂孤芳元是洞庭心詩人自有薰籠錦不用衣篝炷水沉瑞香花盛開呈周益公二首近看丁香萬粒攢逺看却與紫毬般誰將玉膽薔薇水新濯瓊膚錦繡禪淨界薰修爾芳馥無人翦剔自檀欒下元前至上元後省得龍沉與麝蘭針來大筍束仍攢作麼開時色兩般荀令金爐炷沉水昭容紫袖襯中襌同花異葉株株異一種欒枝節節欒雪裏寒香得三友溪邉梅與雪邉蘭增方嶽種瑞香花自種幽香傍短櫺荷鋤正用雨冥冥山家安得瑞龍腦春事不専紅鶴翎持向東風論甲乙與遮西日費丁寧何年得似熏籠錦茗碗時時為乞靈原劉克莊謝太守送瑞香花一樹婆娑整復斜使君輟贈到田家自慙甕牖繩樞子不稱香囊錦傘花小借暖風為破萼旋澆新水待抽芽丁寧兒子勤封植留與甘棠一樣誇朱淑真詠瑞香玲瓏巧蹙紫羅裳令得東君著意妝帶露欲開宜暖日臨風微困怯春霜發揮名字來廬阜彈壓芳菲入醉鄉最是午窗初睡醒熏籠贏得夢魂香增元郝經孟少保後園瑞香羽葆層層擁細花甲梅斜映隔山茶兩三叢裏氤氲氣數百年來富貴家雕玉香濃團瑞雪翠翹春暖插輕霞主人一去無消息庭户蕭疏落晚鴉明陳憲章次韻張廷實瑞香花開有懷三徑歸來闢草萊偶逢名士乞花栽莫愁冷艷無人愛正遞寒香别圃開年光暗逐東流水春信才通半樹梅必有比鄰髙二仲手捫花樹共徘徊五言絶句增宋陳造瑞香花鈎窗玩孤芳殘月衣上明紫囊拆蘭麝小風㺯初晴范成大瑞香三首小檻移秀色端來媚禪房道人不解飲醺然醉天香紫雲蹙繡被團圞覆衣篝濃薰百和韻香極却成愁一叢三百朵細細拆濃檀簾幕護花氣不知窗外寒原王十朋瑞香花真是花中瑞本朝名始聞江南一夢後天下仰清芬增明陳淳題瑞香花穠香拆麝臍細蘂秀鶴頂東風故飄蕩薰人醉不醒七言絶句原宋楊萬里瑞香花織錦天孫矮作機紫茸翻了白花枝更將沉水濃薰却日淡風微欲午時移瑞香花斛夜綴香窠沐露華晝移翠斛馥窗紗將身扶起簾帷看生怕簾帷挨著花鄭清之瑞香粉靣芳心碧玉裳持來宛作故山香征途不覺春如許更問蘭芽幾寸長白氏集詠紫瑞香廬阜當年春睡濃花名從此擅春工紫葩四迸呈鮮粉如爇仙香透錦籠白瑞香繁花簇粉烘晴日藹有濃香透暖風六曲闌干凝睇處錦籠爭似玉為籠增元楊維楨瑞香花一團華蓋翠亭亭萬箇丁香露欲零日炙錦薰眠不得玉人扶起酒初醒詩散句增宋蘇籕芳蕤何蒨絢尤物真旖旎五葉映雕闌三丫駢粉蘂妍分春月魂香徹肌骨髓原樵隱居士衆妙與春競紛紛持所長此花最幽逺如以禮自將猗蘭敢回步薝蔔亦退藏韓駒著葉團青蓋開花炷寶薰楊萬里紫袖染難透瓊膚曬轉香曾肇風雨離披枝葉瘦可憐終不減清香張舜民檻中紫艷才盈握天上花香暗襲人陳克沉香殿裏春風早紅錦薰籠二月時沁枝清露濯幽葩醉質斕斑襯曉霞楊萬里齊開忽作欒枝錦未拆猶疑紫素馨王十朋世人競重薰籠錦子素何曽怯瑞香劉克莊便覺麝囊無逺韻頻挑蟻蠧有新芽陳古澗曉露染成雞舌紫東風吹作麝臍香陶弼玉英金實碧琳枝詞原宋趙彥端點絳唇護雨烘晴紫雲縹眇來深院晚寒誰見紅杏枝頭怨絶代佳人萬里沉香殿光風轉夢餘千片猶恨相逢淺王十朋點絳唇欄檻隂沉紫雲呈瑞餘寒凛捲簾欹枕香逼幽人寢入夢何年廬阜聞名稔風流甚阿誰題品喚作薰籠錦張孝祥浣溪沙臘後春前别一般梅花枯淡水仙寒翠雲裘裏紫霞冠妙品只今推第一寶香元不是人間為君更酌小龍團蘇軾西江月公子眼花亂發老夫鼻觀先通領巾飄下瑞香風驚起謫仙春夢后土祠中玉蘂蓬萊殿裏鞓紅此花清絶更纖穠把酒何人心動增張掄西江月翦就碧雲鬭蘂刻成紫玉芳心淺春不怕峭寒侵暖徹薰籠瑞錦花裏清芬獨步尊前勝韻難禁飛香直到玉杯深消得厭厭夜飲原程垓瑞鷓鴣東風冷落舊梅臺猶喜仙花拂面開紺色染衣春意淨水沉薰骨晚風來柔條不學丁香結矮樹仍參茉莉栽安得方盆載幽植道人隨處作香材方嶽水龍吟當年睡裏聞香阿誰喚作花間瑞巾飄沉水籠薰古錦擁青綾被初日酣晴和風送暖十分清致掩窗紗待香凝酒醒儘消受這春思縱把萬紅排比想較伊更爭些子詩仙老手春風妙筆要題教似十里揚州三生杜牧可曽知此趁紫脣微綻芳心半透與騷人醉增金蔡松年江城子慢紫雲點楓葉巖樹小婆娑嵗寒節占髙潔纖苞暖釀出梅魂蘭魄照濃碧茗碗添春花氣重藝窗晚濛濛浮霽月小眠鼻觀先通廬山夢舊清絶蕭間平生淡泊獨芳溫一念猶未衰歇種種陳迹而今老但覓茶煙禪榻寄間寂風外天花無夢也鴛鴦債從渠千萬劫夜寒回施幽香與愁客别録原栽種梅雨時折其枝插肥隂之地自能生根一云左手折下旋即扞插勿換手無不活者一云芒種時就老枝上翦其嫩枝破其根入大麥一粒纒以亂髮插土中即活一説帶花插于背日處或初秋插於水稻側俟生根移種之移時不得露根露根則不榮澆灌瑞香惡太濕又畏日曬以撏豬湯或宰雞鵝毛水從根澆之甚肥蚯蚓喜食其根覺葉少萎以小便澆之令出即尋逐之須河水多澆之以解其醎以頭垢擁根則葉緑大槩香花怕糞瑞香為最尤忌人糞犯之輒死附録結香原結香幹葉如瑞香而枝甚柔韌可綰結花色鵝黃比瑞香稍長開與瑞香同時花落始生葉御定佩文齋廣羣芳譜卷四十一
