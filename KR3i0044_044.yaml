body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷四十二花譜迎春花原迎春花一名金腰𢃄人家園圃多種之叢生髙數尺有一丈者方莖厚葉如初生小椒葉而無齒面青背淡對節生小枝一枝三葉春前有花如瑞香花黃色不結實葉苦澀平無毒雖草花最先點綴春色亦不可廢花時移栽土肥則茂燖牲水灌之則花蕃二月中可分彚考增三栁軒雜識迎春花為僭客花經迎春花七品三命瓶花譜迎春花六品四命學圃餘疏余一迎春花盆景結屈老幹天然得之嘉定唐少谷人以為寶集藻七言絶句增唐白居易代迎春花招劉郎中幸與松筠相近栽不隨桃李一時開杏園豈敢妨君去未有花時且看來玩迎春花贈楊郎中金英翠萼𢃄春寒黃色花中有幾般憑君語向遊人道莫作蔓菁花眼看宋韓琦中書東廳迎春覆闌纖弱緑條長帶雪衝寒折嫩黃迎得春來非自足百花千卉共芬芳迎得新春入舊科獨先嘉卉占陽和今年頓被寒摧折應為尖頭送暖多劉敞閣前迎春花穠李繁桃刮眼明東風先入九重城黃花翠蔓無人顧浪得迎春世上名沉沉華省鎖紅塵忽地花枝覺歲新為問名園最深處不知迎得幾多春華省當時緑鬢郎金樽美酒醉紅芳今日對花不成飲春愁已與草俱長詩散句增宋晏殊淺艷侔鶯羽纖條結兔絲偏凌早春發應誚衆芳遲詞原宋趙師俠清平樂纖穠嬌小也解爭春早占得中央顔色好粧點枝枝新巧東皇初到江城殷勤先去迎春乞與黃金腰𢃄壓持紅紫紛紛金雀花原金雀花叢生莖褐色髙數尺有柔刺一簇數葉花生葉傍色黃形尖旁開兩瓣勢如飛雀甚可愛春初即開采之滚湯入少鹽微焯可作茶品清供春間分栽最易繁衍集藻七言絶句原宋翁元廣金雀花管領東風知幾春也將俗態染香塵有人不具看花眼惱殺飄蓬老病身酴醿原酴醿一名獨步春一名百宜枝杖一名瓊綬帶一名雪纓絡一名沉香蜜友藤身灌生靑莖多刺一穎三葉如品字形面光緑背翠色多缺刻花靑跗紅萼及開時變白帶淺碧大朵千瓣香微而清盤作髙架二三月間爛熳可觀盛開時折置書册中冬取插鬢猶有餘香本名荼䕷一種色黃似酒故加酉字增益部方物略記蜀酴醿多白而黃者時時有之但香減於白花四川志成都縣出酴醿花有三種曰白玊碗曰出爐銀曰雲南紅色香俱美彚考增清異録酴醿木香事事稱宜故賣插枝云百宜枝杖此洛社故事也花經酴醿一品九命澄懷録韓熙載云對花焚香酴醿宜沉水原誠齋雜記范蜀公居許下造大堂名以長嘯前有酴醿架髙廣可容十客每春季花繁燕客其下約曰有飛花墮酒中者嚼一大白或笑語喧譁之際微風過之滿座無遺時號飛英會增三餘贅筆曾端伯以荼䕷為韻友張敏叔以荼䕷為雅客花木考酴醿色作淺紅香氣不足閲唐宋詩詞多用粉面額黃香瓊香雪等字心竊疑之及考此花本作荼䕷以酒號酴醿花色似之遂復從酉則花作白色似無可疑矣王敬美學圃雜疏乃疑酴醿為白木香不知陶學士穀云洛社故事賣酴醿木香插枝者均謂百宜枝杖二花並列豈能無别耶廣東志酴醿海國所産為盛出大西洋國者花大如中國之牡丹蠻中遇天氣凄寒零露凝結他草木乃冰澌葉萎殊無香韻惟酴醿花上瓊瑤清瑩芬芳襲人若甘露焉夷女以澤體膩髮香經月不滅國人貯以鉛瓶行販他國集藻記增宋張耒咸平縣丞廳酴醿記咸平五年詔以陳留之通許鎮為咸平縣先是章聖皇帝幸亳祠老子道通許築宫以待幸既為縣即以宫為令治所主簿居中書府而樞密府為尉舍熙寧某年始置丞於是遷縣尉於外而丞居焉丞居之堂庭有酴醿問之邑之老人則其為樞密府時所種也既老而益蕃延蔓庇覆占庭之大半其花特大於其類邑之酴醿皆出其下蓋當時築室種植以待天子之所必有珍麗可喜之物而後敢陳是以獨秀於一邑而莫能及也贊增宋宋祁酴醿贊人情尚竒賤白貴黃厥英略同實寡於香五言古詩原宋蘇軾杜沂遊武昌以酴醿花見餉酴醿不爭春寂寞開最晚青蛟走玊骨羽蓋蒙珠幰不妝艷已絶無風香自逺淒涼吳宫闕紅粉埋故苑至今微月夜笙簫來翠巘餘妍入此花千載尚清婉怪君呼不歸定為花所挽昨宵雷雨惡花盡君應返增崔鷃酴醿依柏引蔓上冒其顚春風亦已老自厭丹采媚獨留白雪花灑此千尺翠嵯峨珠籠冠縹眇冒佛髻幽香勿襲人恐為真色纍但願保明姿終日奉清對要之萬物夥汙潔自有類元貢奎茶䕷架西園檢春事積雨斷餘紅荼䕷壓髙架皎皎晚日烘翠蔓點殘雪清香度微風幽人對之坐瑩然此心同徘徊不忍去片月來髙空宛如萬玊娥素袖舞雲中珠璣露顆綴翠珮煙光籠愛花不受折枝柔刺盈叢攜酒醉其下慰此良夜終明吳寬酴醿酴醿發長條叢生類蓍草每記衆花開此種開獨早南方色多紅黃色見者少但嫌易零落蜂蝶食不飽曲闌強遮護童子日必掃花落當復開豈似主人老往昔詩客來覓句步頻繞載誦成感傷誰來慰幽抱七言古詩增宋司馬光修酴醿架貧家不辦構堅木縛竹立架擎酴醿風搖雨漬不耐久未及三載俱離披往來遂復廢此徑舉頭礙冠行挂衣呼奴改作豈得已抽新換故拆四籬來春席地還可飲日色不到香風吹蘇轍次韻詠酴醿蜀中酴醿生如積開落春風山寂寂已憐正發香暗曖猶愛未開光的皪半垂野水弱如墜直上長松勇無敵風中娜娜應數丈月下煌煌真一色故園聞道開愈繁老人自恨歸無日百花已過春欲暮燕坐繩牀空歎息朝來滿把得幽香案頭亂插銅瓶濕一番花蘂轉頭空誰能往問天台拾原楊萬里和羅武岡荼䕷長句花飛十不啻五六靑子團枝朱紫簇江南桃李總成隂不論少城與韋曲荼䕷珍重不浪開晚堆緑雲點水玊體熏山麝非一臍水洗銀河費千斛滴成小蓓密於糝亂走長條柔可束醉眸須及月下來破鼻試從風裏觸先生未必被花惱偶與門人暮春浴為憐壓架十萬枝小立旁邉領新馥剩拚好語寵瓊蕤更掇清英付􅌬醁先生何得便杜門霜鬢猶須玊堂宿增楊萬里走筆謝張功父送酴醿西湖野僧夸藏冰半年化作真水精南湖詩人笑渠拙不知儂家解乾雪藏氷窨子山之幽鑱透九地山鬼愁儂家藏雪有妙手分明曬在翡翠樓向來巽二拉滕六玉妃夜投玉川屋翦冰作花吹朔風揉雲為粉散寒空醉揮兩袖拂銀漢梢頭萬斛冷不融瓊田挈月拾翠羽砌成重樓天半許盤作青蛟吐緑霧亂飄六出熏沉炷人間雪脆那可藏天上雪落何曾香三月盡頭四月首南湖香雪今誰有分似誠齋老詩叟碎挼玉花泛春酒一飲一石更五斗王十朋次韻程泰之酴醿靑春果作堂堂去啼鳥喚春春不住明珠萬顆玊為錢欲買風光嗟已暮蓬山地冷花木稀祇有寒梅已先吐誰遣虯枝上髙架稍覺雲隂覆行路雨餘景物猶未佳葉底精神不多露鼻觀疑聞班馬香姿比何郎更風度平生惜春如惜别老眼待花如待哺幽芳相對止三人草草杯盤為花具元華幼武荼䕷歌丹葩醉染猩猩血素萼便娟比霜雪呈妖逞艷豈足貴含芳嗜潔誇清絶荼䕷飽浥春雨膏玲瓏翦刻英瓊瑶千金腦麝和淑質萬箇玉蝶瑩柔條坐看明月花梢上便應題作清虛榜醉眠花底不須歸狼籍苔茵空撫掌先生愛花何太濃對花一飲揮千鍾昔逢端伯稱韻友我欲結好慚衰容莫教搖落西風後賈島留題傳不朽憐君為作荼䕷歌多情又釀荼䕷酒五言律詩增宋梅堯臣有折景福殿後酴醿花至者有鳥銜花出清香不畏風初從上林發來過未央中簇簇霜苞密層層玉葉同誰將作美酒醉看月生東原陳與義酴醿雨過無桃李唯餘雪覆墻青天映妙質白日照繁香影動春微透花寒韻更長風流到尊酒猶足助詩狂明王象晉酴醿皓齒舞霓裳飄飄翠𢃄長何郎初傅粉荀令乍薰香玊蘂休誇白金沙敢並芳可憐蜂與蝶早晚引風狂七言律詩原宋黃庭堅觀主簿家酴醿肌膚冰雪熏沉水百草千花莫比芳露濕何郎試湯餅日烘荀令炷爐香風流徹骨成春酒夢寐宜人入枕囊輸與能詩王主簿瑶臺影裏據胡牀增朝補之次韻李秬酴醿夭紅瑣碎競春嬌後出何妨便奪標雲鶴嬉晴來萬隻玉龍驚震上千條蓐收晃蕩風前仗萼緑飄翩月下綃曾向瓊林亭畔見天涯相遇一魂銷原劉子翬次韻張守酴醿榮華休羡黑頭公且對芳晨賞麗叢十萬青條寒挂雨三千粉面笑臨風莫將擬雪才情賦盍與觀梅况味同只恐春歸有遺恨典刑猶在濁醪中增劉子翬酴醿顛風急雨退花晨翠葉銀苞照眼新髙架攀緣雖得地長條盤屈總由人橫叉數朵開猶小撲酒餘香韻絶倫惟有金沙顔色好年年相伴殿殘春原劉克莊酴醿青蛟蛻骨萬條長玊架盤雲護曉窗外面看來些子葉中間著得許多香一枝縞色分明好百卉含羞不敢芳飛殺銜花雙海燕被渠勾引一春忙朱淑真詠酴醿花神未許春歸去故遣仙姿殿衆芳白玉體輕蟾魄瑩素紗囊薄麝臍香夢思洛浦嬋娟態愁記瑶臺淡淨妝勾引詩人清絶處一枝和雨在東墻增金劉仲尹酴醿相看絶似好交友著眼江梅季孟中海窟笙簫來鶴背月林氷雪繞春風滿前玉蘂名尤重特地梨花夢不同安得涪翁香一瓣種成聊供小南豐五言排律增宋蘇轍次韻孔文仲酴醿蒼蛇凍不死輕素暖仍歸落蘂時吹面繁香自撲幃光凝真照夜枝軟或牽衣似厭風霾苦應思霧雨霏開樽迎最盛掃地見初稀賴有清隂在金波肯彂揮原黃庭堅見諸人倡和酴醿詩輒次韻戲詠梅殘紅藥遲此物共春暉名字因壺酒風流付枕幃墜鈿香徑草飄雪淨垣衣玉氣晴虹發沉材鋸屑霏直知多可厭何忍摘令稀常恨金沙學顰時正可揮五言絶句增宋蘇軾和文與可洋州園池荼䕷洞猗猗翠蔓長藹藹繁香足綺席墮殘英芳樽漬餘馥朱子荼䕷結楥遂芳植覆墻擁深翠還當具春酒與客花下醉明李東陽荼䕷買種已經年貪看亦云久未惜雨沾衣應防刺傷手七言絶句原宋韓維酴醿平生為愛此香濃仰面常迎落架風每至春歸有遺恨典刑猶在酒杯中增韓維酴醿細蓓繁英次第開攀條盡日未能回不如醉卧春風底時使清香拂面來惜荼䕷天意再三珍雅艷花中最後吐竒香狂風莫掃殘英盡留與佳人貯絳囊原歐陽修酴醿清明時節散天香輕染鵝兒一抹黃最是風流堪賞處美人取作浥羅裳劉攽荼䕷明紅暗紫競芬菲送盡東風不自知占得餘香慰愁眼百芳無得似荼䕷蘇軾和文與可洋州園池酴醿洞長憶故山寒食夜野荼䕷發暗香來分無素手簪羅髻且折霜蕤浸玊醅蘇轍和王晉卿都尉荼䕷後圃荼䕷手自栽清於芍藥釅於梅舊來酒客今無幾三嗅馨香懶舉杯張舜民酴醿冰肌雪艷映殘春燠日薰風入四鄰任是主人能愛惜也拚一半與遊人黃庭堅酴醿漢宮嬌額半塗黃入骨濃薰賈女香日色漸遲風力細倚闌偷舞白霓裳張仲謀家堂前酴醿委地沉水衣籠白玉苖不蒙湔拂苦無聊煩君斫取西莊栁扶起春風十萬條增秦觀賞荼䕷有感春來百物不入眼惟見此花堪斷腸借問斷腸緣底事羅衣曾似此花香原王庭圭酴醿東皇收拾春歸去獨遣荼䕷殿後塵憐我寒窗賦愁寂時看玉面送殘春增楊萬里坡仙閣上觀荼䕷仰架遙看時見些登樓下瞰脫然佳酴醿蝴蝶渾無辨飛去方知不是花酴醿約我早來看及至來看花已殘動地寒風君莫怯亂吹香雪灑闌干陸遊東陽觀酴醿福州正月把離杯已見酴醿壓架開吳地春寒花漸晚北歸一路摘香來薛季宣酴醿花謝有感當初曾醉浣花春席地棠梨當錦茵今日酴醿飄似雪間忙不比舊時人原盧祖臯酴醿雪幹雲條一架春酒中風度夢中聞東風不是無顔色過了梅花便是君徐似道酴醿紛紛紅紫落莓苔𢃄月和煙特地開疑是玉妃新浴出翠雲梯上舞風臺戴復古酴醿東風滿架索春饒三月梁園雪未消賸馥何人炷蘭麝柔絛無力𢃄瓊瑶增方嶽荼䕷山徑隂隂雨未乾春風已暖却成寒不緣天氣渾無準要護荼䕷繼牡丹手插春風十萬條野香落架玉搖搖黃鸝莫誤看花眼等得南薰雪未消陳三嶼布葉敷條翠作圍自生芒刺護裳衣莫嫌野興難拘束只伴春風亦見幾原謝幼謙酴醿香雪支離半墜風柔條無奈不成叢阿蠻如許風流骨打困秋千細雨中任拙齋一年春事到荼䕷香雪紛紛又撲衣盡把檀心好看取與留春住莫教歸周方泉荼䕷架倒無人架全似老夫狂醉時昨夜一番溪雨橫又添苔蘚到花枝湛道山雨後溪流半沒沙粉墻賣酒是誰家客中不覺春深淺開了荼䕷一架花一春多雨少晴光眼底青春去意忙已恨點衣紅作陳絶憐滿架雪生香無名氏穠華先占早春芳色别仙容五樣妝步屧東郊風力軟吹來只是一般香增金元好問荼䕷枕幃餘韻最清真夢裏猶來著莫人擬借濃隂作羅幕玉纓多處臥殘春元葉顒酴醿一點檀心氣味長向人無語舞霓裳千紅萬紫消磨盡猶有風吹不斷香詩散句原宋謝堯仁下騰赤蛟身上抽碧龍頭千枝蟠一蓋一蓋簪萬毬花要𢃄月看香要和露收一點落衣袂經月氣未休一摘入釀甕經歲味尚留宋祁來自蠶叢國香傳弱水神析酲疑破鼻併艷欲留春王十朋風枝張雨蓋露臉汗何郎收拾歸􅌬醁芳姿韻更香梅堯臣京師三月荼䕷開髙架交垂自為洞素蘂層層紫蘂香釀歸光祿春生甕增石􅐂獨清合作諸蘭佩深白未數楊花綿春風爛熳倚墻角一月不復燒龍涎原劉攽瓊林殿側玊鈎欄雪覆新花四月闌密影可容千客坐柔條何處萬龍蟠程敦厚獨嫌朱臉花顔俗全學瑶臺玉女妝素月共成中夜色好風分散四鄰香增种放緑葉排圎翠靑苞蓄異香原宋祁無華真國色有韻自天香晏殊玊女雕瓊蘂仙禽借菊衣增蔡襄側月光艷薄餘芳香氣微蘇轍光凝真照夜枝軟或牽衣張舜民青春逐流水素質獨輕微原曾肇國艷寧施粉天香自染衣增張耒臨風難自持為舞白霓裳陸遊桃李擅春事酴醿為之殿戴復古林塘飛翡翠籬落帶酴醿原徐致中叢葉扶金蘂微風動弱枝增宋祁媚條無力倚風長架作圎隂覆坐涼原晏殊喚將梅蘂要同韻羞殺梨花不敢香劉攽強挽春風留一醉露香還可析朝酲增張耒風霜老枯蹙龍蛇中有靑春白玊葩原王庭圭殘春鈴閣無公事來就酴醿放晚衙增范成大不用忙催銀燭上酴醿如雪照黃昏快晴似為酴醿計急雨還妨燕子飛原楊萬里走上松梢繞却好為他滿插一頭花白玉梢頭千點韻緑雲堆裏一枝斜張栻玉立春深雪不如生香透骨雪應無增劉克莊還將廬舍全身面換却何郎粉色姿原吳潛可堪收拾歸屏枕頗欲浮沉付酒杯徐致中靑蛟暖霽拏雲上白雪深春壓架香鄭子聃玉斧無人解修月珠裙有意欲留仙盧元贊姑射真人玉骨香淡月微風惜良夜楊元素髙唐神女蘭供澤姑射仙人雪瑩肌司馬光酴醿雪擁簷春老酴醿香范成大酴醿乃天香元方回酴醿縋緑長宋張耒酴醿輕盈飛燕身周必大滿架冰肌含碧雲金張藥酴醿架小縱橫春詞原宋無名氏如夢令今夜荼䕷風起須是玉消瓊碎淡蕩滿城春惱破愁人春睡須醉須醉莫待黃梅雨細王十朋點絳唇羽蓋垂垂玊英亂簇春光滿韻清香逺暖日烘庭院露浥瓊枝暈透何郎臉情何限古人不見誰與花評點又野態芳姿枝頭占得春長久怕鈎衣袖不放攀花手試問東山花似當時否還依舊謫仙去後風月今誰有向子諲浣溪沙翠羽衣裳白玊人不將朱粉汚天真清風為伴月為鄰枕上解隨良夜夢壺中别是一家春同心少綰更尖新增朱子浣溪沙壓架年來雪作堆珍叢也是近移栽肯令容易放春回却恐隂晴無定度從教紅白一時開多情蜂蝶早飛來原趙師俠栁梢青紅紫凋零化工特地翦玊裁瓊碧葉叢芳檀心點素香雪團英柔風喚起娉婷似無力斜欹翠屏細細吹香盈盈浥露花裏傾城向子諲西江月紅退小園桃杏緑生芳草池塘誰家芍藥殿春光不似荼䕷宫樣翠蓋更蒙朱幰熏爐剩尉沉香娟娟風露滿衣裳獨步瑶臺月上少年遊去年同醉荼䕷下健筆賦新詞今年君去荼䕷欲破誰與醉為期舊曲重歌斟别酒風露泣花枝漳水能長湘水逺流不盡兩相思朝端禮鷓鴣天紅紫飄零緑滿城春風於此獨留情誰將十幅紅綾被撲向熏籠一夜明風不定雨初晴曉來苔上拾殘英速教貯向鴛鴦枕猶有餘香入夢清張元幹臨江仙鶯喚屏山驚睡覺嬌羞須倩郎扶荼䕷斗帳冷薰爐翠穿金落索香泛玊流蘇長記枕䀶消醉色日髙猶倦妝梳一枝春瘦想如初夢迷芳草路望斷素鱗書韓元吉臨江仙不恨緑隂桃李過荼䕷正向人開一樽清夜月徘徊花如人意好月為此花來未信人間香有許却疑同住瑶臺紛紛殘雪度深杯直教攀折盡猶勝酒醒回劉克莊最高樓司春有序排次到荼䕷預報在庭知蘂珠宫裏晨妝罷披香殿下曉班齊探花正驅使問賞花期元不遜梅花浮月影也不妬梨花𢃄雨枝偏恨栁緑條垂與其向晚包團絮不如對酒折芳蕤謝東君收拾在牡丹時增元假𢎞章洞仙歌一庭晴雪了東風孤注睡起濃香占窗尸對翠蛟盤雨白鳯迎風知誰見愁與飛紅流處想飛英弄玊共駕蒼煙欲向人間挽春住清淚滿檀心如此江山都付與斜陽杜宇是曾約梅花𢃄春來又自趁梨花送春歸去宋趙彥端滿江紅千種繁香香已去翩然無迹誰信道荼䕷枝上靜中收得曉鏡洗妝非粉白晚衣弄舞餘衫碧粲寶鈿珠珥不勝持濃隂夕金翦度還堪惜霜葉墜無從覔知多少好詞清夢釀成冰骨天女散花無聖酒仙人種玊慚香德悵攀條記得鬢絲青東風客史可堂聲聲慢羞朱妬粉染霧裁雲淡然蒼佩仙裳半額蜂妝莫道梳洗家常碧羅亂縈小帶翠虯寒一架清香春思苦倚晴嬌無力如待韓郎密幄籠芳吟夜任露沾輕袖月轉空梁弱骨柔姿偏解勾引詩狂遺鈿碎金滿地恨無情風送韶光間書永看靑靑垂蔓過墻曹邍玲瓏四犯一架幽芳自過了梅花猶占清絶露葉檀心香滿萬條晴雪肌素靜洗鉛華似弄玉乍離瑶闕看翠虯白鳯飛舞不管暮煙啼鴂酒中風格天然别記唐宮賜尊芳冽玉蕤喚得餘春住猶醉迷飛蝶天氣乍雨乍晴長是伴牡丹時節夜散瓊樓宴金鋪深掩一庭春月盧祖臯水龍吟蕩紅流水無聲暮煙細草粘天逺低徊倦蝶往來忙燕芳期頓懶緑霧迷墻翠虯騰架雪明香暖笑依依欲挽春風教住還疑是相逢晚不似梅妝瘦減占人間丰神蕭散攀條弄蘂天涯猶記曲欄小院老去情懷酒邉風味有時重見對枕幃空想東窗舊夢𢃄將離恨原劉克莊賀新郎曾與瑶姬約恍相逢翠裳搖曳珠瓔聯絡風露青冥非人世攬結玊龍驂鶴怕不奈千條輕弱禱祝花神憐惜取到開時晴雨須斟酌枝上雪莫消却惱人還似中狂藥憑危欄燭光交映樂聲遙作身上春衫香重透看到參橫月落算茉莉猶低一著坐有緱山王郎子倚玉簫度曲難為酢君不顧鑄成錯又想赴瑶池約向東風名姬駿馬翠韉金絡太液池邊鵠羣下又似南樓呼鶴畫不就濃纖嬌弱羅帕封香來天上瀉銅盤沆瀣供清酌春去也被留却芳魂再返應無藥似詩吟緑衣黃裏感傷而作愛惜尚嫌蜂採去何况流鶯蹙落且放下珠簾遮著除却江南黃九外有何人敢與花酬酢君認取莫教錯又淺把宮黃約細端相普陀巖裏金身珠絡萼緑華輕羅襪小飛下祥雲彩鶴朵朵賽蜂腰纖弱已被色香撩病思儘鵝兒酒美無多酌看不足怕殘却人間難得傷春藥更枝頭流鶯喚起少年狂作留取姚家花相伴羞與萬紅同落未肯讓臘梅先著樂府今無黃絹手問斯人清唱何人酢休草草認題錯劉過賀新郎院宇重重掩醉沉沉庭隂正午繡簾髙捲金鴨香濃薰寶篆驚起雕梁語燕正架上荼䕷開遍嫩萼梢頭舒素態似嫦娥初試宮籹淺風力嫩異香軟佳人無意拈針線繞朱欄徘徊六曲為他留戀試把花心輕輕數暗卜歸期近逺奈數了依然重怨把酒問春春不管枉教人只憑空腸斷腸斷處合消遣别録原景龍文館記唐制召侍臣學士食櫻桃飲酴醿酒盛以琉璃盤和以香酪增春渚紀聞蔣子有家藏東坡先生於吳箋上手書一詞是為餘杭通守時字云紅杏了天桃盡獨自占春芳不比人間蘭麝自然透骨生香對酒莫相忘似佳人兼合明光只憂長笛吹花落除是寧王既不知曲名常以問先生門下士及伯達與仲虎叔平諸孫皆云未之見也又不知兼合明光是何等事或云是酴醿也原舒雅作靑紗連二枕滿貯酴醿木犀瑞香散蘂甚益鼻根蜀人取酴醿造酒味甚芳烈附録金沙原金沙羅似酴醿花單瓣紅艷奪目彚考增玉堂雜記東閣窗下甃小池傍植金沙月桂之屬花經金沙花六品四命集藻五言律詩增宋梅堯臣金沙花金有披沙得花應不可多栽培由地力艷色與天和玊座君王賞朱欄將相羅稱觴千萬壽繁葉奈香何七言律詩增宋楊萬里金沙花金沙道是殿羣芳不道荼䕷輸一場十里紅妝踏青出一張錦被灑晴香只須舊蔭已無暑更走新條如許長若恨昨朝來草草夜來風雨更禁當五言絶句原宋王安石池上看金沙花數枝過酴醿架盛開故作酴醿架金沙祇謾栽似矜顔色好飛度雪前開七言絶句增宋王安石池上看金沙花午隂寬占一方苔映水前年坐看栽紅蘂似嫌塵染汚青條飛上别枝開酴醿一架最先來夾水金沙次第栽濃緑扶疏雲對起醉紅撩亂雪爭開海棠開後數金沙髙架層層吐絳葩咫尺西城無力到不知誰賞魏家花黃庭堅以金沙酴醿送公夀天遣酴醿玉作花紫綿揉色染金沙慿君著意樽前看便與春工立等差周必大閣前金沙花滿架冰肌合碧雲翻階碧袖助紅裙玊堂只有金沙在伴直明年又屬君楊萬里金沙花獨種荼䕷冷却伊金沙作伴暖相依荼䕷枯了來年補且看金沙也自竒雙松樹子碧圑圞紅錦纒頭白錦冠儘放花枝過墻去不妨分與路人看薔薇原薔薇本草經作墻蘼李時珍曰草蔓柔靡依墻援而生故名一名刺紅本草作刺花一名山棘一名牛勒一名牛棘本草云其莖多刺勒人牛喜食之故有諸名一名買笑藤身叢生莖青多刺喜肥但不可多花單而白者更香結子名營實堪入藥其類有朱千薔薇赤色多葉花大葉粗最先開荷花薔薇千葉花紅狀似荷花刺梅堆千葉色大紅如刺繡所成開最後五色薔薇花亦多葉而小一枝五六朵有深紅淺紅之别黃薔薇色蜜花大韻雅態嬌紫莖修條繁夥可愛薔薇上品也淡黃薔薇鵝黃薔薇易盛難久白薔薇類玫瑰又有紫者黑者肉紅者粉紅者名粉團四出者重瓣厚疊者長沙千葉者開時連春接夏清馥可人結屏甚佳别有野薔薇號野客雪白粉紅香更郁烈法於花卸時摘去其蒂花發無已如生莠蟲以魚腥水澆之傾銀爐灰撒之蟲自死他如寶相金鉢盂佛見笑七姊妹十姊妹體態相類種法亦同又有月桂一種花應月圎缺彚考原賈氏説林武帝與麗娟看花時薔薇始開態若含笑帝曰此花絶勝佳人笑也麗娟戲曰笑可買乎帝曰可麗娟遂取黃金百斤作買笑錢奉帝為一日之歡薔薇名買笑自麗娟始寰字記梁元帝竹林堂中多種薔薇康家四出薔薇白馬寺黑薔薇長沙千葉薔薇並以長格校其上花葉相連其下有十間花屋枝葉交映芬芳襲人增平泉草木記已未歲得會稽之百葉薔薇又得嵇山之重臺薔薇益部方物記錦被堆花出彭州其色一似薔薇有刺不可玩俗謂薔薇為錦被堆花花經薔薇七品三命三餘贅筆張敏叔以薔薇為野客原花史徐知誥會客令賦薔薇詩先成者賜以錦袍陳濬先得之東平城南許司馬後圃薔薇花太繁欲分於别地栽插忽花根下掘得一石如雞五色燦然遂呼薔薇為玉雞苖湖廣志鴻軒在景陵縣張耒謫居日建亭其側植薔薇臨别題詩云他年若問鴻軒人堂下薔薇應解語增浙江志薔薇洞在上虞縣東山之半李白詩不到東山久薔薇幾度花白雲他自散明月落誰家集藻贊增宋宋祁錦被堆贊花跗芬侈叢刺於根不可把玩艷以妍整賦增明俞允文黃薔薇賦有序周于舜得斯卉一莖植於園亭迄今七載矣顧見兩花始驗其異意甚玩之遂作斯賦有中園之嘉卉兮體天質之純清陋衆芳之穠豔兮昭粹色之竒英羌移根而永託兮遂挺栽乎前庭含內美以俟時兮越七祀而始榮解輕黃於緑苞兮乃夭矯乎朱明潤瓊膏於夕露兮潄金芽於朝陽綴雨絲之霏微兮淡浮靄而委傾送遙芬於柔飈兮斂綽態於弱莖枝裊長而施散兮葉鱗次而繁興乍纚縰以鈎帶兮忽飄逺其若驚合厚隂於階墀兮育翠景於軒櫺匹芳蘺而慚烈兮比崇蘭而匪馨彼美人之採捋兮奚逺涉乎江濆顧斯種之獨珍兮宜象德而肖形豈絶處而遵晦兮闕故記於幽經肆豫情而流詠兮庶蘄顯夫修名五言古詩增宋謝朓詠薔薇低枝詎勝葉輕香幸自通發萼初攢紫餘采尚霏紅新花對白日故蘂逐行風參差不俱曜誰肯盻微叢梁簡文帝咏薔薇燕來枝益軟風飄花轉光氤氲不肯去還來階上香原元帝看摘薔薇倡女倦春閨迎風戲玉除近叢香影密隔樹望叉疏橫枝斜綰袖嫩葉下牽裾墻髙攀不及花新摘未舒莫疑插鬢少分人猶有餘栁惲詠薔薇當戶種薔薇枝葉太葳蕤不搖香已亂無風花自飛春閨不能靜開匣理明妃曲池浮采采斜岸列依依或聞好音度時見銜泥歸且對清酤湛其餘任是非劉緩看美人摘薔薇新花臨曲池佳麗復相隨鮮紅同映水輕香共逐吹繞架尋多處窺叢見好枝矜新猶恨少將故復嫌萎叉邊爛熳插無處不相宜鮑泉詠薔薇經植宜春館靃靡上蘭宫片舒猶帶紫半捲未全紅葉疏難蔽日花密易傷風佳麗新妝罷含笑折芳叢增唐孟郊邀人賞薔薇花蜀色庶可比楚叢亦應無醉紅不自力狂艷如索扶麗蘂惜未掃宛枝長更紆何人是花侯詩老強相呼宋梅堯臣依韻和中道寶相花嘉卉得所託植君之寢陽開榮同此春淡艷自生光不為露益色不為風盡香節換葉已密尚可見餘芳明顧璘薔薇洞百丈薔薇枝繚繞成洞房密葉翠幄重穠花紅錦張對著玊局碁遣此朱夏長香雲落衣袂一月留餘芳七言古詩增唐儲光羲薔薇歌裊裊長數尋靑靑不作林一莖獨秀當庭心數枝分作滿庭隂春日遲遲欲將半庭影離離正堪玩枝上嬌鶯不畏人葉底飛蛾自相亂秦家女兒愛芳菲畫睂相伴採葳蕤髙處紅鬚欲就手低邊緑刺已牽衣葡萄架上朝光滿楊栁園中暝鳥飛連袂踏歌從此去風吹香氣逐人歸孟郊和薔薇歌仙機札札織鳳凰花開七十有二行天霞落地攢紅光風枝嫋嫋時一揚飛散葩馥繞空王忽驚錦浪洗新色又似宫娃逞妝飾終當一使移花根還比葡萄天上植韓偓自撫州往南城縣舟行見拂水薔薇因有是作江中春雨波浪肥石上野花枝葉瘦枝低波髙如有情浪去枝留如力鬭緑刺紅房戰裊時吳娃越艷醺酣後且將濁酒伴清吟酒逸吟狂輕宇宙原無名氏紅薔薇九天碎霞明澤國造化功夫潛翦刻淺碧睂長約細枝深紅刺短鈎春色晴日當樓曉香歇錦帶盤空欲成結謝豹聲催麥隴秋春風吹落猩猩血增宋梅堯臣宋次道家摘寶相花歸清平里往歲見此花開遲手擷羣芳因醉嗅今來須約爛漫看及過風雨又已後主人為我特殷勤架底深深掇孤秀密枝隂蔓不爭開薄紅細葉尖相鬭先時已落已掃除最晚堪憐子所厚呼童歸遺不可緩金盤付與急奔驟暮還已見雪映髻初拈尚覺香在袖官橋夜市正沽酒沽酒共賞莫待晝明楊基詠七姊妹花紅羅鬬結同心小七蘂參差弄春曉盡是東風兒女魂蛾眉一樣青螺掃三姊娉婷四妹嬌緑窗虗度可憐宵八姨秦國休相妒腸斷江東大小喬五言律詩原唐朱慶餘題薔薇花四面垂條密浮隂入夏清緑攢傷手刺紅墮斷腸英粉著蜂鬚膩光凝蝶翅明雨中看亦好况復值初晴增李羣玊臨水薔薇堪愛復堪傷無情不久長浪搖千臉淚風舞一叢芳似濯文君錦如啼漢女妝所思雲雨外何處寄馨香李咸用僧院薔薇客引擎茶看離披曬錦紅不緣開淨域爭忍負春風小片當吟落清香入定空何人來此植應故惱休公原宋楊萬里謝薔薇及酒海外薔薇水中州未得方旋偷金掌露淺染玉羅裳已換桃花骨何須賈氏香更煩麯生輩同訪墨池楊增薑特立野薔薇擬花無品格在野有光輝香薄當初夏濃隂蔽夕暉籬根堆素錦樹杪挂明璣萬物生天地時來無細微原高應冕美人芳樹下笑語出薔薇細草軟侵步香風輕拂衣情隨遊蝶去意逐彩雲飛無限傷春思花前未忍歸七言律詩增唐白居易薔薇正開春酒初熟因招劉十九張大夫崔二十四同飲甕頭竹葉經春熟階底薔薇入夏開似火淺深紅壓架如餳氣味緑粘臺試將詩句相招去倘有風情或可來明日早花應更好心期同醉卯時杯原方干朱秀才庭階薔薇繡難相似畫難真明媚鮮妍絶比倫露壓盤條方到地風吹艷色欲燒春斷霞轉影侵西壁濃麝分香入四鄰看取後時歸故里庭花應讓錦衣新增陸龜蒙薔薇倚墻當户自橫陳致得貧家不似貧外布芳菲雖笑日中含芒刺欲傷人清香往往生遙吹狂蔓看看及四鄰遇有客來堪玩處一端晴綺照煙新皮日休和薔薇次韻誰繡連延滿户陳暫應遮得陸郎貧紅芳掩斂將迷蝶翠蔓飄飄欲挂人低拂地時如墜馬髙臨墻處似窺鄰祗應是董雙成戲翦得神霞寸寸新李建勳薔薇二首萬蘂爭開照檻光詩家何物可相方錦江風撼雲霞碎仙子衣飄黼黻香裛露早英濃壓架背人狂蔓暗穿墻綵箋蠻榼旬休日欲召親賔看一場拂簷拖地對前墀蝶影蜂聲爛熳時萬倍馨香勝玉蘂一生顔色笑西施忘歸醉客臨髙架恃寵佳人索好枝將並舞腰誰得及惹衣傷手盡從伊宋徐積錦被堆春風蕭索為誰張日暖仍熏百和香遮處好將羅作帳襯來堪用玉為牀風吹亂展文君宅月下還鋪宋玉墻好向謝家池上種緑波深處蓋鴛鴦原劉克莊薔薇浥露含風匝樹開呼童淨掃架邊苔湘紅染就髙張起蜀錦機成乍翦裁公子但貪桃夾道貴人自愛藥翻階寧知野老茅茨下亦有繁英送一杯增明王韋李少卿宅薔薇柔香弱蔓不勝寒十二圍屏錦繡攢秦殿曉妝俱窈窕習家春事未闌珊憐將清奏愁中聼競折髙枝醉後看好待詩成酬勝賞東風休遣露華乾五言排律原唐劉禹錫薔薇花聨句似錦如霞色連春接夏開劉禹錫波紅分影入風好𢃄香來裴度得地依東閣當階奉上台白行式淺深皆有態次第暗相催禹錫滿地愁英落緣堤惜棹回度芳濃濡雨露明麗隔塵埃行式似著胭脂染如經巧婦裁白居易奈花無别計只有酒殘杯張籍增白居易裴常侍以題薔薇架十八韻見示因廣為三十韻以和之托質依高架攢華對小堂晚開春去後獨秀院中央霽景朱明早芳時白晝長穠因天與色麗共日爭光翦碧排千萼研朱染萬房煙條塗石緑粉蘂撲雌黃根動彤雲湧枝搖赤羽翔九微燈炫轉七寶帳熒煌淑氣熏行徑清隂接步廊照梁迷藻棁耀壁變雕墻爛若叢然火殷於葉得霜胭脂含臉笑蘇合裛衣香浹洽濡晨露玲瓏漏夕陽合羅排勘纈醉暈淺深妝乍見疑廽面遙看誤斷腸風朝舞飛燕雨夜泣蕭娘桃李慚無語藝蘭讓不芳山榴何細碎石竹苦尋常蕙慘偎欄避蓮羞映浦藏怯教蕉葉戰妬得栁花狂豈可輕嘲詠應須痛比方畫幈風自展繡繖蓋誰張翠錦挑成字丹砂印著行猩猩凝血點瑟瑟蹙金匡散亂萎紅片尖纖嫩紫芒觸僧飄毳褐留妓罥羅裳寡和陽春曲多情騎省郎緣誇美顔色引出好文章東顧辭仁里西歸入帝鄉假如君愛殺留著莫移將韓偓寒食日沙縣雨中看薔薇何處遇薔薇殊鄉冷節時雨聲籠錦帳風勢偃羅帷通體全無力酡顔不自持緑疏微露刺紅密欲藏枝愜意憑欄久貪吟放盞遲傍人應見訝自醉自題詩宋徐鉉依韻和薔薇緑樹成隂後羣芳稍歇時誰將新濯錦挂向最長枝卷箔香先入憑欄影任移賞頻嫌酒渴吟苦怕霜髭架迥籠雲幄庭虛展繡帷有情縈舞袖無力罥遊絲嫩蘂鶯偷采柔條栁伴垂荀池波自照梁苑客嘗窺玊李尋皆謝金桃亦暗衰花中應獨貴庭下故開遲委艷裝苔砌分華借槿籬仰昂勻灼爍濃淡疊參差幸植王宫裏仍逢宰府知芳心向誰許醉態不能支芍藥天教避玫瑰衆共嗤光明烘晝景潤膩裛輕𩅰麗似期神女珍如重衛姬君王偏屬詠士子盡搜竒七言排律增唐徐夤尚書會仙亭詠薔薇結緑根株翡翠莖勾芒中夜刺猩猩景陽妝赴嚴鐘出楚峽神教暮雨情躑躅豈能同日語玫瑰方可一時呈風吹嫩帶香苞展露灑啼腮淚點輕阿母蘂宫期索去昭君榆塞闕齎行叢高恐礙含光燕架穩宜栖報曙鶯鬬日只憂燒密葉映階疑欲讓雙旌含煙散纈佳人惜落地遺鈿少妓爭丹渥不因輸繡假錢圎誰把買花聲海棠若要分流品秋菊春蘭兩恰平五言絶句增唐吳融薔薇萬卉春風度繁花夏景長館娃人盡醉西子始新妝宋王十朋佛見笑學得酴醿白更能相繼芳金仙粲然笑鼻觀不多香明魯鐸飲薔薇下獨酌薔薇下花隂亂午風有時殘露滴剛著酒杯中七言絶句增唐白居易戲題新栽薔薇移根易地莫憔悴野外庭前一種春少府無妻春寂寞花開將爾當夫人和王十八薔薇澗花時有懷蕭侍御兼見贈霄漢風塵俱是繫薔薇花委故山深憐君獨向澗中立一把紅芳三處心戲題盧祕書新移薔薇風動翠條腰嫋娜露垂紅萼淚闌干移他到此須為主不愛花人莫使看原張祐薔薇花曉風抹盡胭脂顆夜雨催成蜀錦機當晝開時正明媚故鄉疑是買臣歸賈島題興化園亭破却千家作一池不栽桃李種薔薇薔薇花落秋風起荆棘滿庭君始知杜牧薔薇朵朵精神葉葉柔雨晴香拂醉人頭石家錦障依然在間倚狂風夜不收皮日休重題薔薇濃似猩猩初染素輕于燕燕欲凌空可勝細麗難勝日照得深紅作淺紅陸龜蒙重題薔薇穠華自古不得久况是倚春春已空更被夜來風雨惡滿階狼籍許多紅裴説薔薇一架長條萬朵春深紅嫩緑小窠勻只因根下千年土曽葬西川織錦人增牛嶠紅薔薇曉啼珠露渾無力繡簇羅襦不著行若綴夀陽公主額六宫爭肯學梅妝徐夤薔薇朝露灑時如濯錦晚風飄處似遺鈿重門剩著黃金鎖莫被飛瓊摘上天宋韓琦錦被堆碎翦紅綃間緑叢風流疑在列仙宫朝真更欲薰香去爭擲霓裳上寶籠不管鶯聲向曉催錦衾春晚尚成堆香紅若解知人意睡取東君不放回鄭剛中薔薇一架薔薇四面垂花工不肯費胭脂淡紅點染輕隨粉浥遍幽香清露知范成大寶相花誰把柔條夾砌栽壓枝萬朵一時開為君也著詩收拾題作西樓錦被堆原楊萬里野薔薇紅殘緑暗已多時路上山花也則稀䖃苴餘春還子細燕支濃抹野薔薇增楊巽齋詠佛見笑芳葩豐美折輕紅想是祗園秀氣鍾解使金仙猶動色窺欄誰不解愁容僧如璧薔薇薔薇作架髙一丈凖擬春風如許長可憐條間一寸葉中有嫩色三月香原僧北澗薔薇紫透紅殷態度陳露葵生色借芳新春風便是黃金屋羞殺黃金屋裏人增元錢惟善粉團花下夜飲萬花碎翦玊團團晴雪飛香夜不寒恰似玉人相對立酒尊移月近前看原明張新黃薔薇並占東風一種香為嫌脂粉學姚黃饒他姊妹多相妒總是輸君淺淡妝王象晉薔薇滿架青龍爭鼓奮幾行紅粉競輝光倐然一陳微颸起大地氤氲灑異香爭愛濃香一抹紅壅培締架費人工何如吉貝東臯上冬底猶能禦凛風詩散句原梁簡文帝石榴珊瑚蘂木槿懸星葩豈如兹草麗逢春始發花回風舒紫萼照日吐新芽增唐孟郊忽驚紅琉璃千艷萬艷開佛火不燒物淨香空徘徊元劉因色染女真黃露凝天水碧明潘之恆淺紅疑中酒微靨似窺人原宋王禹稱紅萼似嫌塵點汚青枝飛上别林開夏竦攀折若無花底刺豈教桃李獨成蹊劉敞解向人間占五色風流不盡是荼䕷增王安石暗香一陳連風起知有薔薇澗底花盧琦等間點檢春多少墻角薔薇幾樹花陳水崖好把膽瓶收露水亦須南渡貶薔薇張谷山可惜荼䕷都過了繞籬猶自有薔薇趙蔗境薔薇野性難拘束過了鄰家屋上紅唐沈佺期幽葉吐薔薇李白石道生薔薇煙窗引薔薇徐晶薔薇一架紫李商隱一丈紅薔擁翠筠碧鸚鵡對紅薔薇金吳激滿池春水照薔薇元方夔薔薇幾度老春風詞原宋李廷忠生查子玊女翠帷薰香粉開妝面不是占春遲羞被羣花見纖手折柔條絳雪飛千片流入紫金巵未許停歌扇增周邦彥六醜正單衣試酒悵客裏光隂虗擲願春暫留春歸如過翼一去無迹為問家何在夜來風雨葬楚宫傾國叉鈿墮處遺香澤亂點桃蹊輕翻栁陌多情更誰追惜但蜂媒蝶使時叩忩槅東園岑寂漸蒙籠暗碧靜繞珍叢底成歎息長條故惹行客似牽衣待話别情無極殘英小強簪巾幘終不似一朵叉頭顫裊向人欹側漂流處莫趁潮汐恐斷鴻尚有相思字何由見得别録增妝樓記周顯德五年昆明國獻薔薇水十五瓶云得自西域以灑衣衣敝而香不滅陳輔之詩話林和靖梅花詩云疏影橫斜水清淺暗香浮動月黃昏近似野薔薇也原薔薇露出大食國占城國瓜哇國回回國番名阿剌吉灑衣經歲其香不歇能療人心疾不獨調粉為婦人面飾而已種植立春折當年枝連榾桗插隂肥地築實其傍勿傷皮外留寸許長則易瘁或云芒種及三八月皆可插黃薔薇春初將發芽時取長條卧置土內兩頭各留三四寸即活須見天不見日處一云芒種日插之亦活御定佩文齋廣羣芳譜卷四十二
