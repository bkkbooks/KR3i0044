body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷四十四花譜蘭蕙按蘭花蕙花一類二種黄庭堅之説最明然皆非古之所謂蘭草蕙草也蘭草今之都梁香蕙草今之零陵香唐宋本草載之甚詳朱子楚辭證可為確據今以蘭花蕙花合為一譜蘭草蕙草附錄於後以備叅考増爾雅翼蘭之葉如莎首春則茁其芽長五六寸其杪作一花花甚芬香大抵生深林之中微風過之其香靄然逹於外故曰芝蘭生於深林不以無人而不芳又曰株穢除兮蘭芷覩以其生深林之下似慎獨也故稱幽蘭江南蘭只在春芳荆楚及閩中者秋復再芳蘭與蕙甚相類其一榦一花而香有餘者蘭一榦五六花而香不足者蕙説本黄庭堅今人稱蘭為幽蘭蕙為蕙蘭蕙大抵似蘭花亦春開蘭先而蕙繼之皆柔荑其端作花蘭一荑一花蕙一荑五六花香次於蘭本草宼宗奭曰蘭葉濶且勒長及一二尺四時常青花黄綠色中間瓣上有細紫㸃春芳者為春蘭色深秋芳者為秋蘭色淡李時珍曰生近處者葉如麥門冬而春花生福建者葉如菅茅而秋花原蘭幽香清逺馥郁襲衣彌旬不歇常開於春初雖冰霜之後高深自如故江南以蘭為香祖又云蘭無偶稱為第一香紫梗青花為上青梗青花次之紫梗紫花又次之餘不入品趙時庚金漳蘭譜云紫蘭有陳夢良色紫每幹十二萼花頭極大為紫花之冠至若朝暉微照曉露暗濕則灼然騰秀亭然露竒歛膚傍幹團圓四向婉媚嬌綽竚立凝思如不勝情花三片尾如𢃄微青葉三尺頗覺弱黯然而綠背雖似劎脊至尾稜則輭薄斜撒粒許帶緇最為難種故人稀得其真者種用黄浄無泥瘦沙忌肥恐致腐爛吳蘭色深紫有十五萼幹紫莢紅得所養則岐而生至有二十萼花頭差大色映人目如翔鸞翥鳯千態萬狀葉髙大剛毅勁節蒼然可愛不堪受肥須以清茶沃之冀得其本生土地之性潘花色深紫有十五萼幹紫圓匝齊整疎密得宜疎不露幹宻不簇枝綽約作態窈窕逞姿真所謂艶中之艶華中之華也愈久愈見精神使人不能捨去花中近心處色如吳紫艶麗過於衆花葉則差小於吳峭直雄健衆莫能及其氣特深未能受肥清茶沃之二種用赤沙泥趙師博色紫十五萼初萌甚紅開時若晚霞燦目色更晶明葉勁直肥聳超出羣品金稜邊色深紫十二萼出於長泰陳家色如吳蘭片則差小葉亦勁健所可貴者葉自尖處分二邊各一線許映日如金線紫花品外之竒用黄色麤沙和泥少添赤沙泥妙半月一用肥白蘭有濟老色白有十二萼標致不凡如淡妝西子素裳縞衣不染一塵葉似施花更髙一二尺得所養則岐而生亦號一線紅白花之冠宜溝中黒沙泥和糞種愛肥一任澆灌竈山一名綠衣郎有十五萼色碧玉花枝開體膚鬆美顒顒昻昻雅特閑麗真蘭中之魁品也毎生並蔕花幹最碧葉綠而瘦薄如苦蕒菜山下流聚沙泥種亦可肥戒多黄殿講一名碧玉幹西施花色微黄有十五萼並幹而生計二十五萼或迸於根葉細最綠肥厚花頭似開不開苐幹雖高而實痩葉雖勁而實柔且朶不起稭根有萎葉是其所短者耳李通判色白十五萼峭特雅淡追風浥露如泣如訴人多愛之以較鄭花則減一頭地用泥同竈山葉大施葉劎脊最長惜不甚勁直惠知客色白有十五萼賦質清癯團簇齊整嬌柔痩潤花英淡紫片尾凝黃葉雖綠茂但頗柔弱用泥同濟老馬大同色碧而綠有十二萼花頭微大間有向上者中多紅暈葉則髙聳蒼然肥厚花幹勁直及其葉之半一名五暈絲以上俱上品鄭少舉色白十四萼瑩然孤潔極為可愛葉脩長散亂所謂蓬頭少舉也有數種花有多少葉有輭硬之别白花之能生者無出於此其花之資質可愛為羣花翹楚用糞壤泥及河沙内用草鞵屑鋪四圍種之累試甚佳大凡用輕鬆泥皆可黄八兄色白有十二萼善於抽幹頗似鄭花葉綠而直惜幹弱不能支持耳用泥同濟老周染色白十二萼與鄭花無異但幹短弱用泥同鄭少舉以上俱中品夕陽紅花八萼花片微尖色則凝紅如夕陽返照肥瘦任意當視沙之燥濕蓄雨水沃之令色綠為妙觀堂主名弟亦同觀堂主花白有七萼花聚如簇葉不甚髙可供婦女時妝名弟色白有五六萼花似鄭葉最柔輭如新長葉則舊葉墮換人多不種弱腳色綠大如鷹爪一幹一花比葉髙二三寸葉痩髙二三尺入臘方花香馥可愛外有雲嶠朱花青蒲玉小娘之類以上俱下品魚魫蘭又名趙花十二萼花片澄澈如魚魫沉水中無影葉勁綠此白花品外之竒山下流聚沙泥種戒肥膩增王貴學蘭譜陳夢良有二種一紫幹一白幹花色淡紫大似鷹爪排釘甚疎趙十使即師博色淡壯者十四五萼葉色深綠花似仙霞葉之脩勁不及也何蘭壯者十四五萼繁而低壓冶而倒披花色淺紫似陳蘭苐花幹壯而何則瘦陳葉尾焦而何則否或名潘蘭有紅酣香醉之狀經雨露則嬌困號醉楊妃不常發似仙霞大張青色深紫壯者十三萼花有二種大張花多小張花少大張幹花俱紫葉亦肥痩勝小張慳於發花蒲統領色紫壯者十數萼淳熙間蒲統領引兵逐冦忽見一所似非人世四周幽蘭欲摘而歸一老叟前曰此蘭有神主之不可多摘取數頴而歸陳八斜色深紫壯者十餘萼發則盈盆花類大張青幹紫過之葉綠而尾蒲下垂間有一葉䨇花淳監粮色深紫多者十萼叢生並葉幹曲葉髙三尺厚而且直其色尤紫大紫壯者十四萼出於長泰以上俱紫色中品許景初十二萼者花色鮮紅葉頗散垂綠亦不深石門紅其色紅壯者十二萼花肥而促色紅而淺葉雖麤亦不甚髙滿盆則生亦云趙蘭小張青色紅多有八萼淡於石門紅花幹甚短蕭仲紅色如褪紫多者十二萼葉綠如芳茅其餘幹纖長花亦離疎時人呼為花梯何首座色淡紫壯者九萼林仲禮色淡紫壯者九萼花半開而下視葉勁而黄一云仲美粉妝成色輕紫多者八萼類陳八斜花與葉亦不甚都茅蘭其色紫長四寸有餘壯者十六七萼結實其破如線夏至抽箆春前花開以上俱紫色下品鄭白羊色碧多者十五萼岐生過之其跗尤碧交秋乃花或又謂大鄭仙霞九十蘂色白鮮者如濯含者如潤得之泰邑朱蘭得於朱僉判色黄多者十一萼花頭似開倒向一隅若蟲之蠧幹葉長而痩雲嶠色白壯者七萼花大紅心鄰於小張以所得地名葉深厚於小張雲嶠海島之精寺也林郡馬其色綠出長泰壯者十三萼葉厚而壯青蒲色白七萼挺肩露頴似碧玉而葉低小僅尺有五寸花尤白葉綠而小直而脩獨頭蘭色綠一花大如鷹爪幹髙二寸葉類麥門冬入臘方薰馥可愛建浙間謂之獻歲正山鄉有之間有䨇頭碧蘭始出於興化龜山院花有十四五萼與葉齊以上皆白色原建蘭莖葉肥大蒼翠可愛其葉獨濶今時多尚之葉短而花露者尤佳若非原盆須用火燒山土栽根甚甜招蟻以水奩隔之水須日換恐起皮則蟻易度頻分則根舒花開不絶此已試妙法也澆洗須如法又有按月培植之方乃閩中士紳所傳宜照行之杭蘭惟杭城有之花如建蘭香甚一枝一花葉較建蘭稍濶有紫花黄心色若臙脂有白花黄心白若羊脂花甚可愛取大本根内無竹釘者用横山黄土揀去石塊種之見天不見日澆以羊鹿糞水花茂盛雞鵞毛水亦可若澆灌得宜来歳花發其香勝新栽者逺甚一説用水浮炭種之上盖青苔花茂頻灑水花香花紫白者名蓀出法華山其類有春蘭夏蘭秋蘭素蘭石蘭竹蘭鳳尾蘭玉梗蘭春蘭花生葉下素蘭花生葉上至其綠葉紫莖則如今所見大抵林愈深而莖愈紫爾劉次莊樂府集云沅澧所産花在春則黄在秋則紫然春黄不如秋紫之芳馥也凡蘭皆有一滴露珠在花蘂間謂之蘭膏不啻沆瀣多取則損花彚考原易繫辭同心之言其臭如蘭禮記内則婦或賜之茝蘭則受而獻諸舅姑左傳鄭文公有賤妾曰燕姞夢天使與已蘭曰余為伯鯈余而祖也以是為而子以蘭有國香人服而媚之如是既而文公與之蘭而御之辭曰妾不才幸而有子將不信敢徴蘭乎公曰諾生穆公名之曰蘭增史記禮志椒蘭芬茝所以養鼻也原晉書文苑傳羅含字君章桂陽耒陽人也致仕還家階庭忽蘭菊叢生人以為德行之感焉增易通卦驗十一月廣莫風至則蘭射干生原家語孔子曰與善人處如入芝蘭之室久而不聞其香則與之俱化芝蘭生於深谷不以無人而不芳君子修道立德不為困窮而改節増列子薦以梁肉蘭橘荀子民之好我芬若椒蘭也原文子日月欲明浮雲盖之叢蘭欲發秋風敗之增淮南子蘭芝以芳未嘗見霜原説苑十歩之内必有芳蘭風俗通漢尚書郎每進朝時懐香握蘭口含雞舌香增洛陽伽藍記大覺寺廣平王環捨宅林池飛閣比之景明至於春風動樹則蘭開紫葉秋霜降草則菊吐黄華採蘭雜志蘭待女子同種則香故名待女原汗漫錄王摩詰貯蘭用黄磁斗養以綺石累年彌盛曲江春宴錄霍定與友生遊曲江以千金募人竊貴侯亭榭中蘭花插帽兼自持往羅綺叢中賣之士女争買抛擲金錢增清異錄唐保大二年國主幸飲香亭賞新蘭詔苑令取滬溪美土為馨烈侯擁培之具致虚閣雜爼晁采閣中蘭花始發其姑命目之應聲目曰隱於谷裏顯於澧潯貴比於白玉重匹於黄金既入燕姬之夢還鳴宋玉之琴其慧敏如此臥龍行記寺有崇蘭數百本秀發巖石間㣲風透香所至芬郁三餘贅筆張敏叔以十二花為十二客蘭為幽客花經蘭一品九命蕙二品八命澄懐録韓熙載云對花焚香蘭宜四絶佩楚軒客談高疎仙玉峰山四畔皆幽蘭日採數十花酌明水箋離騷自謂靈均有知當領吾意也雞足山記静雲庵僧寮盆蘭敷華皓潔如雪泉南雜志九節蘭花易植不若吳中所欽静宇中雖若棋列亦不甚香閩部疏蘭以建名而福興四郡尤甚民家無大小皆傳種之然絶不生山間不知種所自来大都以玉魫為最四季開者為珍原學圃餘疏建蘭盛於五月畏風畏寒畏䑕畏蚓畏蟻其根甜為蟻所逐養者常以水奩隔不令得入予作一屋於竹林南外施兩重草蓆坎地令稍深貯蘭於其上無風有好日開門暴之所畜二三十盆無不盛花者其種亦多玉魫為第一白幹而花上出者是也次四季次金邊名曰蘭其實皆蕙也閩産為佳贑州蘭花不長勁價常減半一莖一花者曰蘭宜興山中特多南京杭州俱有雖不足貴香自可愛宜多種盆中今日絶重建蘭却只是蕙見古人畫蘭殊不爾虎邱戈生曾致一盆葉稀而長稍麤於興蘭出數蘂正春初開花特大於常蘭香亦倍之經月不凋酷似馬逺所畫戈云得之他方今尚活花時當廣求此種以備春蘭之絶品增荆溪疏蘭出荆溪者葉柔花弱比閩浙産不同又易致龍池銅官之間彌坂盈谷山人杖挑藤束筐筥登市每歳正二月之交負而入郭者價賤於土人行市中衣袂皆馥珍珠船世稱三友竹有節而嗇花梅有花而嗇葉松有葉而嗇香惟蘭獨並有之花史宋羅畸元祐四年為滁州刺史明年治廨宇於堂前植蘭數十本為之記曰予之於蘭猶賢朋友朝襲其馨暮擷其英攜書就觀引酒對酌吳孺子藏蘭百本静開一室良適幽情一統志浙江蘭谿縣蘭隂山多蘭蕙武義菊妃山多蘭菊南昌府寧州内有石室北多蘭茝福建志福安縣白雲山上有庵庵前兩池産蘭玉色向午開浮水面過時即沉人呼為午時蘭四川志慶符縣南石門山一名蘭山其林薄中多蘭原勾踐種蘭渚山王右軍蘭亭是也今會稽山甚盛餘姚縣西南並江有浦亦産蘭其地曰蘭墅洲自建蘭盛行不復齒及移入吳越輙凋有善藏者售之輙得髙價而香終少減蜂採百花俱置股間惟蘭則拱背入房以獻於王物亦知蘭之貴如此集藻序原明王世貞續蘭譜序閩多蘭趙時庚王貴學氏皆閩人故後先能譜蘭諸所以為蘭之事盡矣而吾老友張應文氏顧又能為續蘭譜其所以為蘭之事又大出於二譜之外而又能為歌詩古今體幾百篇以侈之若杲禪師悟後雋語百出而百不窮張君吾吳人也酈道元髙陽注江南水經歐陽永叔廬陵譜洛中牡丹不是過也予不能從嵇含曉南中花木意亦不大好之顧獨好蘭而不甚曉其事與所以滋培之理友人有見貽者至冬輙萎敗亦任之而已今從張君譜稍得其事與理而圜居力不能致今者似别得䇿第手靖節栗里譜與其詩各一編陸羽張又新水譜各一編蔡君謨茶綠一編以佐張君之二譜而日與之徜徉於峭蒨青蔥之下閒歌陶詩渴則拈茶水譜隨意讀之覺此身如入陽羡吸中泠已徐翻張君所纂譜詠其得意句鼻觀習習芬馥兩腋風舉作天際真人想又何必左擁陳良紫右侍魚魫白而後快哉或曰蘭之傳自屈子騷始也子何以不騷而靖節之是援且不虞彼蘜忌哉曰不然蘭君子也貴而大國賤而幽谷所為香不改也屈子才大於蘭而志趣不一吾故取陶氏焉今之蘜麗矣非陶氏蘜也以故不能與蘭偕蘭亦不受妒不爾寧無東籬數枝以伴我九畹哉吾取蘭而陶之取陶而蘭之即屈子所不能妒而况蘜也張君善吾言識而弁於簡端題跋增宋黄庭堅書幽芳亭士之才德蓋一國則曰國士女之色蓋一國則曰國色蘭之香蓋一國則曰國香自古人知貴蘭不待楚之逐臣而後貴之也蘭甚似乎君子生於深山叢薄之中不為無人而不芳雪霜凌厲而見殺來歲不改其性也是所謂遯世無悶不見是而無悶者也蘭雖含香體潔平居與蕭艾不殊清風過之其香藹然在室滿室在堂滿堂是所謂含章以時發者也然蘭蕙之才德不同世罕能别之予放浪江湖之日久乃盡知其族蓋蘭似君子蕙似士夫大槩山林中十蕙而一蘭也離騷曰予既滋蘭之九畹又樹蕙之百畝招魂曰光風轉蕙泛崇蘭是以知楚人賤蕙而貴蘭久矣蘭蕙叢出蒔以沙石則茂沃以湯茗則芳是所同也至其發華一榦一華而香有餘者蘭一榦五七華而香不足者蕙蕙雖不若蘭其視椒榝則逺矣世論以為國香矣乃曰當門不得不鋤山林之士所以徃而不返者耶周必大跋楊无咎畫秋蘭鄉人徐丙示予楊无咎手畫香草題曰秋蘭後有兵部侍郎章茂獻國子博士湯君實跋語其説特未定也予老而學圃問諸園丁則曰春蘭夏芷秋蕙冬蓀葉莖花色徃徃多寡不同予異其説徧以古書考之屈原離騷經紉秋蘭以為佩張衡東京賦秋蘭被涯又思𤣥賦幽蘭可喻潘尼贈河陽詩流聲秋蘭之類言蘭以秋而花也屈原九歌春蘭秋菊陸機庭中竒樹詩勸友蘭時徃注春時也梁元帝詩春蘭本無絶唐太宗詩春暉開紫苑淑氣媚蘭湯之類此言蘭以春而花也宋玉招魂賦光風轉蕙泛崇蘭抱朴子春蕙秋蘭陸機悲歌行春芳傷客心蕙草饒淑景是蕙亦可言春矣本草圖經蕙七月中旬開花至香是蕙亦可言秋矣故騷經曰蘭芷變而不芳荃蕙化而為茅蓋合四者而言之湘君歌亦云薜荔拍兮蕙綢蓀橈兮蘭旌湘夫人則並言荃壁蘭橑蕙櫋芷葺司馬相如長門賦摶芬若以為枕席荃蘭而茝香乃知四時香草同出異名葉常青而花隨時自屈宋至漢唐皆於蘭蕙互言春秋豈邵伯温見聞錄證黄氏之誤而已然則園丁之説未為無據所謂禮失求之野歟辨原宋朱子楚辭辨證蘭蕙二物本草言之甚詳劉次莊云今沅澧所生花在春則黄不若秋紫之芬馥又黄魯直云一幹一花而香有餘者蘭一幹數花而香不足者蕙今按本草所言之蘭雖未之識然而云似澤蘭則今處處有之蕙則自為零陵香尤不難識其與人家所種葉類茅而花有兩種如黄説者皆不相似大扺古之所謂香草必其花葉皆香而燥濕不變故可刈而為佩若今之所謂蘭蕙則其花雖香而葉乃無氣其香雖美而質弱易萎皆非可刈而佩者也明王象晉正譌蘭之為世重尚矣今世重建蘭北方尤為難致間得一本置之書屋愛惜鄭重即拱璧不啻也及詳閲載集如遯齋閑覽楚辭辨證本草綱目草木疏諸書乃知今所崇尚皆非靈均九畹故物至有謂春花為蘭秋花為蕙者其視紉秋蘭為佩之語不刺謬乎傳原明方宇蘭馨傳友姓蘭名馨字汝清號無知子始祖國香草姓也鄭文公妾燕姞夢天與國香倚䦨寤而生子公異之物色求香得之幽谷賜姓蘭志倚䦨也加草不忘本也香後獨茂修德芬芳隱居深山雖困窮未嘗改節仲尼稱為善人君子又傷其老草莽遺琴操以彰其美識者亦曰使際風動時香名豈終泯乎自是子孫蕃衍布散諸國楚屈原延之九畹每飯不忘忠憤不平之氣頼之以洩原感其德佩服終身晉有鄰玉樹者謝安處之庭堦視如子弟至今詠蘭氏必曰謝庭歴唐而宋曰猗曰皐猗受知韓愈亦困窮愈曰揚揚其香不採何傷盖美之也皐為朱元晦友後病歸元晦思之有願托孤根歳晏為期之句其冒姓者楚有枻漢有臺晉有亭又有善釀者武帝飲之甘呼蘭生而不名枻與桂櫂同舟事君有濟川功臺於章帝時遊太學與崔駰私論武帝善惡事聞下有司臺自訟獲免拜令史亭好山水家有峻嶺茂林曲水之景名賢王羲之庾藴輩上已日就亭觴詠暢叙幽情以姓為名者有馬氏澤氏賽氏馬澤俱精醫善療腫毒疼痛賽家廣積珠如粟人有求之散而不惜又有茝芸蕙蓀皆近族也馨始生異香滿室人稱香孩兒皆曰何物老嫗生寧馨兒流芳百世必斯人也既長聞木徂徠梅華竹直同道相交徃師之三人曰子幽真雅淡和氣襲人予輩友也敢曰師乎遂深相得號為四友時有嚴雪者攻申韓術草莽之士畏而靡者萬計惟四友正色不動雪多方摧折之自如也明年春天子布陽和之德靡者皆起四友名益重後木為大夫梅居鼎鼐竹以笙簧才官翰林馨獨潛修不出復與金利締交同心相規時人語曰膠漆雖謂堅不如金與蘭馨性剛鯁每秋風起怒髪衝冠若聞雞起舞狀文華一吐芳馨逺播人採其善不戴之首則佩之身奉以羞祀苾苾芬芬神明来格凡大夫處士聞其名無不愛慕思友里有蕕生性惡使氣人不之近疾馨異已面斥曰人生當使人畏子之得人親媚無乃務為容悦乎馨笑而不答性惡汚穢有㧞茹者必淨沙為地時進潔湯斯暢舒自遂不爾則形容就悴無他歸潔其身也祕書省有蠧魚為害上召馨拜掌書記害遂息因名其省曰蘭省功成身退優游林泉或登髙山或臨深崖或掃青苔坐白石意泊如也閔子廣於取邀馨語曰聞子香譽願效同心分香吐懐惟子之需敢不搆莊禮子期與俱化賦增陳周𢎞讓山蘭賦爰有竒特之草産於空崖之地仰鳥路而裁通眎行蹤而莫至挺自然之髙介豈衆情之服媚寧紉結之可求非延佇之能洎禀造化之均育與卉木而齊致入坦道而銷聲屏山幽而静異獨見識於琴臺竊逢知於綺季唐楊炯幽蘭賦惟幽蘭之芳草禀天地之純精抱青紫之竒色挺龍虎之嘉名不起林而獨秀必固本而叢生爾乃丰茸十歩綿連九畹莖受露而將低香從風而自逺當此之時叢蘭正滋美庭幃之孝子循南陔而采之楚襄王蘭臺之宫零落無叢漢武帝猗蘭之殿荒凉幾變聞昔日之芳菲恨今人之不見至若桃花水上佩蘭若而續魂竹箭山隂坐蘭亭而開宴江南則蘭澤為洲東海則蘭陵為縣隰有蘭兮蘭有枝贈逺别兮交新知氣如蘭兮長不改心若蘭兮終不移及夫東山月出西軒日晚受燕女於春闈􅑙陳王於秋坂乃有送客金谷林塘坐曛鶴琴未罷龍劒將分蘭缸燭燿蘭麝氛氲舞袖廻雪歌聲遏雲度清夜之未艾酌蘭英以奉君若夫靈均放逐離羣散侣亂鄢郢之南都下瀟湘之北渚歩遲遲而適越心鬱鬱而懐楚徒眷戀於君王斂精神於帝女汀洲兮極目芳菲兮襲予思公子兮不言結芳蘭兮延佇借如君章有德通神感靈懸車舊館請老山庭白露下而鶴警秋風髙而虯縈循階除而下望見秋蘭之青青重曰若有人兮山之阿紉秋蘭兮歳月多思握之兮猶未得空佩之兮欲如何抽琴命操為幽蘭之歌歌曰幽蘭生矣於彼朝陽含雨露之津潤吸日月之休光美人愁思兮採芙蓉於南浦公子忘憂兮樹萱草於北堂雖處幽林與窮谷不以無人而不芳趙元淑聞而歎曰昔聞蘭葉據龍圖復道蘭林引鳳雛鴻歸燕去紫莖歇露徃霜来綠葉枯悲秋風之一敗與蒿草而為芻顔師古幽蘭賦惟竒卉之靈德禀國香於自然灑嘉言而擅美擬貞操以稱賢詠秀質於楚賦騰芳聲於漢篇冠庶卉而超絶歴終古而彌傳若乃浮雲卷岫明月澄天光風細轉清露微懸紫莖膏潤綠葉水鮮若翠羽之羣集譬彤霞之競然感羇旅之招恨狎寓客之流連既不遇於擥採信無憂乎翦伐魚始陟以先萌鶗雖鳴而未歇願擢頴於金陛思結䕃乎玉池泛㫖酒之十醖耀華燈於百枝喬彝幽蘭賦蘭之生矣不以無人而不芳被廣澤森囘塘和寡調髙未儷郢中之曲神符夢叶終傳鄭國之香贈靈修於南浦襲嘉慶於北堂於是芊眠茂苑靡迤秋坂紉而為佩騷人之意已深間以在衿楚客之情何逺薄秋風而香盈十歩汎皓露則花飛九畹豈衆草之敢陵幸移根之未晚若乃昊露清兮天氣新湘水碧兮楓岸春煙轉綠蕙波搖白蘋榮曲沼之初蓮遺天涯之美人離别經時歎孤芳於秀質艶陽可惜悵獨立於良辰復有映金砌羅玉户分竹宫疏蕙圃因風而起不隨彼茁之蓬擇地以生能殊有枤之杜宜其比同心於先哲冠美名於前古蘭之在幽兮其芳滿叢士守業兮其道未通入提攜固在於髙賞播酷烈當跋於下風寧使凋急景於散地迫嚴凝於歲終况復光隂慘烈冰霰淒切静而處順不得近於階墀長未當門獨遣冒於霜雪艶歇紅暗莖萎紫折懼鶗鳺之先鳴掩氛氳而頓絶於戲蘭與艾兮異味薰與蕕兮殊途一室之人誰當執我之契十年之臭尚可攘公之羭囂然此道何有何無嗟乎蘭無薰兮搴擷之所不及士無文兮聲華之所不立倘一借於韶光庶餘香之可襲陳有章幽蘭賦翹翹嘉卉獨成國香在深林以挺秀向無人而見芳幽之可居逹萌芽於隂壑時不可失吐芬香於春陽所以紫翹十歩名轉九畹自下并髙結根聳榦布葉逾宻重陽未晚開緗蘂而乍合擢丹穎而何逺好遵正直生匪臨於斜徑不向嶮巇質寧被於長坂獨茂幽壑厭若錯薪幾霑雨露猶苦風塵采掇兮有日芳菲兮度春得臨刈楚之地曷異修詞之人燕妃夢中榮何名而不遂蜀琴曲裏奏何聲而不新况衆英聚集傳香氣而相襲佳色蔥蘢帶煙翠而攢叢固已歎夫貞潔期見賞於始終幽處斯久照臨忽通喜㑹無私之日深繄有力之風幽莫過於芳蘭誠匪同諸草莽充佩而靈均不棄入握而仙都必取詎比夫山上蘼蕪泥中蘅杜將虚名以共播竟無善而足數焉知夫光善才於左思能成賦於師古而已哉知我者謂我如碩儒不知我者謂我如生芻此幽人之未已亦何代而云無幸逢昭代得遇良哲雖偕薰蕕固有分别勿以卉賤不顧幽芬勿以地寒不軫孤絶倘折英而入用庶有光於優劣者也韓伯庸幽蘭賦陽和布氣兮動植齊光惟彼幽蘭兮偏含國香吐秀喬林之下盤根衆草之旁雖無人而見賞且得地而含芳於是嫩葉旁開浮香外襲既生成而有分何掇採之莫及入握稱美未遭時主之恩納佩為華空載騷人之什光隂向晚歲月將終芬芳十歩之内繁華九畹之中亂羣峰兮上下雜百卉兮横叢况荏苒於光隂將衰敗於秋風豈不處地稍幽受氣仍别蕭艾之新苗漸長桃李之舊蹊將絶空牽戲蝶拂花蘂之翩翾未遇来人尋芳春而採折既生幽徑且任榮枯羃輕煙而蔥翠𢃄淑氣而紛敷冀雨露之溥及何見知之久無及夫日徃月来時占歲覩遇逹人之囘盼披荒榛而見取橫琴寫操夫子傳之而至今入夢為徵燕姞聞之於前古生雖失處用乃有因枝條嫩而既麗光色發而猶新雖見辭於下土幸因遇於仁人則知夫生理未衰採掇何晚幽名得而不朽佳氣流而自遠既徵之而見寄願移根於上苑仲子陵幽蘭賦蘭惟國香生彼幽荒貞正内積芬華外揚和氣所資不擇地而長精英自得不因人而芳况乃崖斷坂折蹊分石裂山有木而轉深徑無人而自絶柔條獨秀芳心潛結翡翠戲而相鮮蘼蕪生而共悦然後衆草之中迥為一叢卑以自牧和而不同揚翹布葉舒翠錯紅宵承結露曉汎光風傾於陽希所照無隱託其地知其道有終且求之昔人徵以邃古宛成章於楚客爰命操於尼父佩之衆匪蘭不紉曲之多匪蘭奚鼓夫以薰蕕之喻臭味斯殊同之則十年猶有異之則一日而無乃清以為露滋而為畹比德者以之守真贈離者以之傷逺宜其出幽谷之濵為階除之珍羅堂未晩被徑知春依瑶池而自庇與玉樹之為鄰杜若芳芷香辛白蘋俱受生於大塊獨取象於同人是故蘭也之采伊人所急篇章間起比興俱入道之廢可鋤而去道之興可俯而拾為君灑微芳於素衿希見寳於重襲李公進幽蘭賦幽有寂兮蘭有香香者取其服媚寂者契其韜光是以綠葉紫莖偶貞士而必佩深林絶壑挺竒質而獨芳觀其異彩特秀結根自逺靡生於門寧滋於畹朝陽照而雜花不得間其榮光風轉而衆草無以齊其偃杳杳深處芬芬絶倫保貞操以擅美發英華以藻春葉凝露以珠綴花含煙而色新移於友也則斷金之利樹之庭也則如玉之珍豈比夫協夢呈祥表嘉名於鄭國循陔見采流雅詠於詩人而已哉蘭之幽兮芳可折幽無人兮芳不絶蘭之生兮美自豐生得地兮美無終故雖敗於凉飈諒有嘉於前古方比契於松筠詎齊名於蘅杜且夫麗白雪之綺靡被長坂之芬敷激餘芳以孤映極幽致而自殊則在握者何居擇者何無蘭處幽而轉芳芳無逺而不襲賢尚晦而必著著何道而不入伊哲人之素履盍徵蘭以自執茍馨香之發聞越江山而採拾原李農夫幽蘭賦蘭之漪漪窅窅其香遁世無悶抱道深藏不以無人而遂廢其芳磅礴冰霜之際虚徐蕭艾之塲揭之揚之於古有光不采而佩於蘭無傷豈膏黍之為用也必焚必割珠犀之畢通也必剖必絶雖佩玉而垂紳亦吐哺而握髮文賦散句原楚屈原離騷扈江蘺與辟芷兮紉秋蘭以為佩余既滋蘭之九畹兮又樹蕙之百畮時曖曖其將罷兮結幽蘭而延佇戸服艾以盈要兮謂幽蘭其不可佩蘭芷變而不芳兮荃蕙化而為茅余以蘭為可恃兮羌無實而容長九歌蕙肴蒸兮蘭藉浴蘭湯兮沐芳薜荔拍兮蕙綢承蓀橈兮蘭旌桂櫂兮蘭枻沅有芷兮澧有蘭桂棟兮蘭橑擗蕙櫋兮既張疏石蘭兮為芳秋蘭兮蘼蕪羅生兮堂下綠葉兮素枝芳菲菲兮襲予秋蘭兮青青綠葉兮紫莖被石蘭兮帶杜蘅折芳馨兮遺所思春蘭兮秋菊長無絶兮終古九章悲囘風之搖蕙兮蘭茝幽而獨芳宋玉九辨竊悲夫蕙華之曾敷兮紛旖旎乎都房招魂光風轉蕙汜崇蘭些臯蘭被徑兮斯路漸景差大招茝蘭桂樹鬱彌路只漢東方朔七諫聨蕙芷以為佩兮過鮑肆而失香王褒九懐季春兮陽陽列草兮成行余悲兮蘭生委積兮縱横株穢除兮蘭芷覩劉向九歎懐蘭蕙與蘅芷兮行中野而散之懐芬香而挾蕙兮佩江籬之菲菲遊蘭臯與蕙林兮睨玉石之㠁嵯懐蘭芷之芬芳兮妒被離而折之王逸九思懐蘭英兮把瓊若四言古詩增漢張衡怨篇猗猗秋蘭植彼中阿有馥其芳有黄其葩雖曰幽深厥美彌嘉之子云逺我勞如何晉嵇康酒㑹詩猗猗蘭藹植彼中原綠葉幽茂麗蘂濃繁馥馥惠芳順風而宣將御椒房吐薰龍軒瞻彼秋草悵矣惟騫五言古詩御製秋蘭并序殿前盆卉芳蘭獨秀昔人稱為王者香又以方之君子因題四韻猗猗秋蘭色布葉何蔥青愛此王者香著花秀中庭幽芬散緗帙靜影依疎櫺豈必九畹多侈彼離騷經增梁武帝紫蘭始萌種蘭玉臺下氣暖蘭始萌芬芳與時發婉轉迎節生獨使金翠嬌偏動紅綺情二遊何足懐一顧非傾城羞將芩芝侶豈畏鶗鴂鳴元帝賦得蘭澤多芳草春蘭本無艶春澤最葳蕤燕姬得夢罷尚書奏事歸臨池影入浪從風香拂衣當門已芬馥入室更芳菲蘭生不擇徑十歩豈難稀宣帝詠蘭折莖聊可佩入室自成芳開花不競節含秀委微霜陳張正見賦新題得蘭生野徑披襟出蘭畹命酌動幽心鋤罷還開路歌喧自動琴華燈共影落芳杜雜花深莫言閒徑裏遂不斷黄金原唐李白贈友蘭生不當户别是閒庭草夙被霜雪欺紅榮已先老謬接瑶華枝結根君王池顧無馨香美叨沐春風吹餘芳若可佩卒歲長相隨古風孤蘭生幽園衆草共蕪没雖照陽春暉復悲高秋月飛霜早淅瀝綠艶恐休歇若無清風吹香氣為誰發賀蘭進明古意崇蘭生澗底香氣滿幽林采采欲為贈何人是同心日暮徒盈把徘徊憂思深慨然紉雜佩重奏丘中琴增温庭筠余昔自西濱得蘭數本移藝於庭亦既逾歲而芃然蕃殖自余遊者未始以芳草為遇矣因悲夫物有厭常而返不若混然者有之焉遂寄情於此寓賞本殊致意幽非我情吾常有疎淺外物無重輕各言藝幽深彼美香素莖豈為賞者設自保孤根生易地無赤株麗土亦同榮賞際林壑近泛餘煙露清余懐既鬱陶爾類徒縱橫姸媸茍不信寵辱何為驚真隱諒無迹激時猶簡名幽叢靄綠畹豈必懐歸耕陳陶種蘭種蘭幽谷底四逺聞馨香春風長養深枝葉趁人長智水潤其根仁鋤䕶其芳蒿藜不生地惡鳥弓已藏椒桂夾四隅茅茨居中央左鄰桃花塢右接蓮子塘一月薰手足兩月薰衣裳三月薰肌骨四月薰心腸幽人饑如何採蘭充餱粮幽人渴如何醖蘭為酒漿地無青苗租白日如羲皇不嘗仙人藥端坐紅霞房日夕望美人佩花正煌煌美人久不来佩花徒生光刈穫及葳蕤無令見雪霜清芬信神鬼一葉豈可忘舉頭愧青天鼓腹詠時康下有賢公卿上有聖明王無階答風雨願獻蘭一筐宋蘇軾題楊次公春蘭春蘭如美人不採羞自獻時聞風露香蓬艾深不見丹青寫真色欲補離騷傳對之如靈均冠佩不敢燕范成大次韻温伯種蘭靈均墮荒寒采采紉蘭手九畹不留客髙丘一囘首崢嶸路孔棘悽愴肘生栁遂令此粲者永與窮愁友不如湯子逺情事只詩酒但知愛國香此外付烏有栽培帶苔蘚披拂䕶塵垢孤芳亦有遇灑濯居座右君看深林下埋沒隨藜莠陸游蘭南巖路最近飯已時散䇿香来知有蘭遽求乃弗獲生世本幽谷豈願為世娛無心託階庭當門任君鋤楊萬里題蕙花初開幽人非愛山出山將何之山居種蘭蕙歲寒久當知初藝止百畝餘地惜奚為先生無廣居千巖一茅茨四面祇藝蕙中間纔置錐鋭綠分宿叢脩紫擢幼枝孤榦八九花一花破初蕤西風淡無味微度成香吹燈夢得幽馥月寫傳静姿我欲掇芳英和露充晨炊眷然惻不忍環翫自忘饑豈無衆花草不願秋不遲種時亂不擇歲晩悔可追薛季宣種蘭蘭生林樾間清芬倍幽遠野人坐官曹兹意極不淺西窓蔽斜日松釵架春晚墻隂蒔花木顦顇根日損植此山國香坐與前事反扶疎可紉佩心緒端有本芽生僅盈壇高風成九畹羣芳顔色好祗自誇園苑何如淡嚼蠟草莽曾誰混對我靜無言忘形如莽􅀢刈蘭東畹刈真香靜院篸瓶水髙逺不勝情時逐微風起和雨翦閑庭誰作騷人語記得舊家山香来無覓處朱子謝人送蘭二首幽獨塵事屏晼晚秋蘭滋芬馨不自媚掩抑空相思晤對日方永披叢露未晞翛然發孤詠九畹陳悲詩淹留閲歳序契濶心懐憂獨卧寄僧閭一室空山秋徘徊起顧望俯仰誰為儔伊人逺贈問孤根亦綢繆芳馨不我遺三載娛清幽愧無瓊琚報厚意竟莫酬瞻彼南陔詩使我心悠悠秋蘭已悴以其根歸學古秋至百草晦寂寞寒露滋蘭臯一以悴蕪穢不能治端居念離索無以遺所思願言託孤根歳晏以為期原周竹坡藝蘭當九畹蘭生香滿路紉君身上衣光明奪縑素孤芳一衰歇凋零濕秋露佩服得君子亦足慰遲暮增元岑安卿盆蘭猗猗紫蘭花素秉巖穴趣移栽碧盆中似為香所誤吐舌終不言畏此塵垢汚豈無髙節士幽深共情素俛首若有思清風颯庭戶明宋濓蘭花篇陽和煦九畹晴芬溢青蘭潛姿發𤣥麝幽蘤凝紫檀綠蘿托芳鄰白谷挹髙寒𤣥聖未成調湘纍久長歎菉葹雖外蔽貞潔終能完豈知生平心卒獲君子觀雜以青瑶芝承以白玉槃靈風曉方薦清露夜初漙此時不見知駢羅混荒菅春風桃杏華爛若霞綺攢徒媚夸毗子千金買歌歡棄之不彼即要使中心安願結媺人佩把玩日忘餐七言古詩增元薩都刺蘭臯曲溪水長涵幽草芳春溪露滴蘭葉光美人日暮采蘭去風吹露濕芙蓉裳芙蓉為裳蘭結佩玉立亭亭臨水際天寒袖薄人不知疎雨蘭苕鳴翡翠幽蘭日日吹古香美人不来溪水長王冕明上人畫蘭圖吳興二趙俱已矣雪窓因以專其美不須百畝樹芳菲霜毫掃􅏒光風起大花哆唇如笑人小花歛眉如羞春翠影飄飄舞輕浪正色不染湘江塵湘江雨冷暮煙寂欲問三閭杳無迹愾慷不忍讀離騷目極飛雲楚天碧明李東陽觀畫蘭有感春風吹香出芳林叢蘭開傍西巖隂幾囘欲采意不適路轉溪廻山更深虚堂披圖對幽襟忽如攬衣度﨑嶔杏壇尼父去已逺湘江屈原空獨沉我方揮絃坐微吟微吟未成日將晚冰霜欲来侵九畹蘭兮蘭兮竟誰管五言律詩御製雲栖竹樹甚茂幽蘭滿山山徑紆徐合溪聲到處聞竹深隂戞日木古勢干雲倚檻聽嗁鳥攀崖採異芬韶華春已半萬物各欣欣增唐太宗芳蘭春暉開紫苑淑景媚蘭塲映庭含淺色凝露泫浮光日麗參差影風傳輕重香會須君子折佩裏作芬芳李嶠蘭虚室重招尋忘言契斷金英浮漢家酒雪灑楚王琴廣殿輕風發高臺逺吹吟河汾應擢秀誰肯訪山隂張九齡園中時蔬盡皆鋤理唯秋蘭數本委而不顧彼雖一物有足悲者遂賦二章場藿已成歲園葵亦向陽蘭時獨不偶露節漸無芳㫖異菁為蓄甘非蔗有漿人多利一飽誰復惜馨香幸得不鋤去孤苗守舊根無心羨㫖蓄豈欲近名園遇賞寧充佩為生莫礙門幽林芳意在非是為人論崔塗幽蘭幽植衆寧知芬芳只暗持自無君子佩未見國香衰白露沾長早春風到每遲不如當路草芬馥欲何為釋無可詠蘭蘭色結春光氛氳掩衆芳過門堦露葉尋澤徑連香畹靜風吹亂亭秋雨引長靈均曾採擷紉珮挂荷裳原宋蘇軾題次公蕙蕙本蘭之族依然臭味同曾為水仙佩相識楚辭中幻色雖非實真香亦竟空云何起微馥鼻觀已先通朱子去歲蒙學古分惠蘭花清賞既歇復以根叢歸之故畹而學古預有今歲之約近聞頗已著花輙賦小詩以尋前約秋蘭遞初馥芳意滿冲襟想子空齋裏淒凉楚客心夕風生逺思晨露灑中林頗憶孤根在幽期得重尋增王柏蘭早受樵人貢春蘭訪舊盟謝庭誇瑞物楚澤擷芳名蒼玉裁圭影紫檀含露英奚奴培䕶巧苔蘚日菁菁七言律詩增宋蘇轍種蘭蘭生幽谷無人識客種東軒遺我香知有清芬能觧穢更憐細葉巧凌霜根便密石秋芳早叢倚修筠午䕃凉欲遣蘼蕪共堂下眼前長見楚詞章原楊萬里蘭花雪徑偷開淺碧花冰根亂吐小紅芽生無桃李春風面名在山林處士家政坐國香到朝市不容霜節老雲霞江蘺圃蕙非吾耦付與騷人定等差劉克莊深林不語抱幽貞頼有微風遞逺馨開處何妨依蘚砌折来未肯戀金瓶孤髙可把供詩卷素淡堪移入卧屏莫笑門無佳子弟數枝濯濯映階庭兩盆去歲共移来一置雕闌一委苔我拙扶持令葉瘦君能調䕶遣花開𨽻人挑蠧廵千匝稚子澆泉走幾囘亦欲效顰耘小圃地荒終恐費栽培明文徵明建蘭靈根珍重自甌東紺碧吹香玉兩叢和露紉為湘水佩臨風如到蘂珠宫誰言别有幽貞在我已相忘臭味中老去相如才思減臨窓欲賦不能工五言排律增唐劉禹錫令狐相公見示新栽蕙蘭二草之什兼命同作上國庭前草移来漢水潯朱門雖易地玉樹有餘隂艶彩凝還泛清香絶復尋光華童子佩柔輭美人心惜晚含逺思賞幽空獨吟寄言知音者一奏風中琴五言絶句增唐唐彦謙詠蘭清風搖翠環凉露滴蒼玉美人胡不紉幽香藹空谷謝庭漫芳草楚畹多綠莎於焉忽相見歳晏將如何宋王安石朱朝議移法雲蘭幽蘭有佳氣千載閟山阿不出阿蘭若豈遭乾闥婆原楊萬里詠蘭健碧繽繽葉斑紅淺淺芳幽香空自祕風肯祕幽香朱子詠蕙今花得古名旖旎香㬰好適意欲忘言塵編詎能老蘭澗光風浮碧澗蘭杜日猗猗竟歲無人採含薰只自知增元揭傒斯春蘭深谷暖雲飛重巖花發時非因采樵者那得外人知秋蕙出叢不盈尺空谷為誰芳一徑寒雲色滿林秋露香陳旅題畫蘭九畹光風轉重巖墜露香紫宫祠太乙瑶席薦瓊芳張羽詠蘭花能白更兼黄無人亦自芳寸心原不大容得許多香詠蘭葉泣露光偏亂含風影自斜俗人那觧此看葉勝看花鄭氏允端詠蘭並石疎花瘦臨風細葉長靈均清夢逺遺佩滿沅湘七言絶句御製詠幽蘭婀娜花姿碧葉長風来難隱谷中香不因紉取堪為佩縱使無人亦自芳增唐杜牧蘭溪蘭溪春盡碧泱泱映水蘭花兩發香楚國大夫顦顇日應尋此路去瀟湘宋梅堯臣蘭楚澤多蘭人未辯盡以清香為比擬蕭茅杜若亦莫分唯取芳馨襲衣美蘇轍幽蘭花二首李徑桃蹊次第開穠香百和襲人来春風欲擅秋風巧催出幽蘭繼落梅珍重幽蘭開一枝清香耿耿聽猶疑定應欲較香髙下故取羣芳競發時次韻答人幽蘭幽花耿耿意羞春紉佩何人香滿身一寸芳心須自保長松百尺有為薪答琳長老寄幽蘭谷深不見蘭生處追逐微風偶得之觧脱清香本無染更因一嗅識真如原朱子蘭謾種秋蘭四五莖疎簾㡳事太關情可能不作凉風計䕶得幽香到晚清增劉克莊詠蘭蕭艾榮枯各有時深藏芳潔欲奚為世間鼻孔無憑托且伴幽忩讀楚詞原趙以夫詠蘭一朶俄生几案光尚如逸士氣昂藏秋風試與平章看何事當時林下香增方岳買蘭幾人曾識離騷面説與蘭花枉自開却是樵夫生鼻孔擔頭帶得入城来元韓性題趙子固墨蘭鏤瓊為佩翠為裳冷落遊蜂試采香煙雨館寒春寂寂不知清夢到沅湘明陸治畫了蘭玉㦸稜稜應節分枝枝柔玉紉香雲凝妝擬待三更月露染生綃六幅裙文嘉蘭花奕奕幽蘭傍砌栽紫莖綠葉向春開晚晴庭院微風發忽送清香度竹来原余同麓詠蘭手培蘭蘂兩三栽日暖風和次第開坐久不知香在室推窓時有蝶飛来百草千花日夜新此君竹下始知春雖無艶色如嬌女自有幽香似德人何處幽香撲酒樽洲中杜若畹中蓀紉来為佩裁為服不許薋葹挂蓽門詩散句原宋僧道潛陽崖月窟得芳叢滿握歸来誇所逢淨掃幽徑植蘚墀紫莖綠葉弄竒姿疎簾風暖日華薄芳馥滿懐君自知增唐韓愈蘭之猗猗揚揚其香不採而佩於蘭何傷晉陶潛幽蘭生前庭含薰待清風清風脱然至見别蕭艾叢漢酈炎秋蘭榮何晚嚴霜悴其柯原晉張華蘭蕙緣清渠繁華䕃綠渚增傅𤣥秋蘭䕃玉池池水清且芳郭璞蘭生蓬苞間榮曜常幽翳唐太宗水光翻照樹堤蘭倒插波陳子昂蘭若生春夏芊蔚何青青張九齡紫蘭秀空蹊皓露奪幽色原李白寄君青蘭花惠好庶不絶增錢起蘭生霽後日花發夜来風宋陳與義苗分鄭七穆香發謝諸郎元馬臻細葉舒冷翠貞葩結青陽宋錢惟演紅蘭受露銷晨渴綠蕙翻風析夜酲文彦博燕姞夢魂誰是見謝家庭户本来多劉敞深林幽寂秋雨晦叢蘭猗猗無所佩原魏文帝秋蘭被幽壑增曹植秋蘭被長坂嵇康時下息蘭池原阮籍清露被蘭臯增晉潘尼添馥馨秋蘭陶潛榮榮窓下蘭宋謝靈運清露灑蘭藻梁劉孝綽蘭芽隱陳葉唐李嶠蘭氣襲囘風陳子昂朱蕤冒紫莖蘇頲御杯蘭薦葉張九齡蘭葉春葳蕤蘭林覽餘滋王丘蘭露滋香澤原李白蘭幽香風逺增李白清風灑蘭雪原杜甫猗蘭奕葉光夢蘭他日應增儲光羲叢蘭秋蝶多錢起種蘭入山翠萌蕙暖初吐白居易掃徑避蘭芽韋應物紫蘭含幽色孟郊蘭葉露華浮張籍翦草出幽蘭杜牧幽蘭思楚澤鄭谷蘭洲晚泊香許渾露曉紅蘭重宋劉筠渚蘭薰露夕邵雍紅蘭靜自披孫覿搴秀紉春蘭元陳旅雨暖蘭抽筍原唐李白煙開蘭葉香風暖增劉禹錫蘭在幽林亦自芳原白居易春風新長紫蘭芽李賀光風催蘭吹小殿李商隱風聲偏獵紫蘭叢王建荒郊逺處有芳蘭增韋莊蘭惹春風緑映𫀆原宋張耒更許光風為泛香增戴復古室有蘭花不炷香詞原宋向子諲浣溪沙綠玉叢中紫玉條幽花疎淡更香饒不將紅粉汚髙標空谷佳人宜作伴貴游公子不能招小窓相對誦離騷增釋仲殊浣溪沙楚客才華為發揚深林著意不相忘夢成燕國正芬芳莫把品名閑擬議且看青鳳羽毛長十分領取面前香又醉花隂輕紅夢引絲多少翦青蘭葉巧人向月中歸留下星鈿彈破真珠小管絃不管春知道著繡簾圍繞只空被東風偷得餘香付與閑花草别錄原蜀志先主常銜張裕不遜下獄將誅之諸葛亮表請其罪先主答曰芳蘭生門不得不鋤晉書謝𤣥傳安嘗戒約子姪因曰子弟亦何預人事而正欲使其佳諸人莫有言者𤣥答曰譬如芝蘭玉樹欲使其生於庭階耳增圖繪寳鑑鄭思肖字所南福州人工畫墨蘭嘗自畫蘭卷長丈餘髙可五寸許天真爛漫超出物表題云純是君子絶無小人原養蘭口訣正月安排在坎方離明相對向陽光晨昏日曬都休管要使蒼顔不改常二月栽培其實難須防葉作鷓鴣斑四圍插竹防風折惜葉猶如惜玉環三月新條出舊叢花盆切忌向西風隄防濕處多生虱根下猶嫌太糞濃四月中庭日乍炎盆間泥土立時乾新鮮井水休澆灌膩水時傾味最甜五月新芽滿舊窠緑隂深處最平和此時葉退從他性翦了之時愈見多六月驕陽暑氣加芬芳枝葉正生花凉亭水閣堪安頓或向簷前作架遮七月雖然暑漸消只宜三日一番澆最嫌蚯蚓傷根本苦皁煎湯尿汁調八月天時稍覺凉任他風日也無妨經年汚水今須換却用雞毛浸水漿九月時中有薄霜堦前簷下慎行藏若生蟻螘妨黄腫葉灑油茶庶不傷十月陽春暖氣囘年来花筍又胚胎幽根不露真竒法盆滿尤須急換栽十一月天宜向陽夜間須要慎收藏常教土面微生濕乾燥之時葉便黄臘月風寒雪又飛嚴收暖處保孫枝直教凍觧春司令移向庭前對日暉種植性喜隂其莖葉柔細生幽谷竹林中者宿根移植膩土多不活即活亦不多開花莖葉肥大而翠勁可愛者率自閩廣移来種法九月終將舊盆輕擊碎緩緩挑起舊本刪去老根勿傷細根取有竅新盆用麤椀覆竅以皮屑尿缸瓦片鋪盆底仍用泥沙半填取三季者三箆作一盆互相枕藉新箆在外分種之糝土壅培勿用手捺實使根不舒暢長滿復分大約以三歲為度盆須架起仍不可著泥地恐蚯蚓螻蟻入孔傷根令風從孔進透氣為佳十月時花已胎孕不可分若見霜雪大寒尤不可分否則必至損花分之次年不可發花恐洩其氣則葉不長凡善於養花切須愛其葉葉聳則不慮花不茂也位置蘭性好通風臺不可太髙髙則衝陽亦不可太低低則隱風地不必曠曠則有日亦不可太狹狹則蔽氣前宜南面後宜背北蓋欲通南薰而障北吹也右宜近林左宜近野欲引東日而被西陽也夏遇炎烈則䕃之冬逢沍寒則曝之下沙欲疏疏則連雨不能滛上沙欲濡濡則酷日不能燥至於插引葉之架平䕶根之沙防蚯蚓之傷禁螻蟻之穴去其莠草除其絲網助其新箆翦其敗葉尤當一一留意者也修整花時若枝上蘂多留其壯大者去其瘦小若留之開盡則奪来年花信性畏寒暑尤忌塵埃葉上有塵即當滌去蘭有四戒春不出夏不日秋不乾冬不濕養蘭者不可不知澆灌春三二月無霜雪時放盆在露天四面皆得澆水澆用雨水河水皮屑水魚腥水雞毛水浴湯夏用皁角水豆汁水秋用爐灰清水最忌井水須四面勻灌勿得灑下致令葉黄黄則清茶滌之日曬不妨逢十分大雨恐墜其葉用小繩束起如連雨三五日須移避雨通風處四月至七月須用疎宻得所竹籃遮䕶置見日色通風處澆須五更或日未出一番黄昬一番又須看乾濕濕則勿澆梅天忽逢大雨須移盆向背日處若雨過即曬盆内水熱則蕩葉傷根七八月時驕陽方熾失水則黄當以腥水或腐穢澆之以防秋風肅殺之患九月盆乾用水澆濕則不澆十月至正月不澆不妨最怕雪霜更怕春雪一㸃著葉一葉即斃用宻籃遮䕶安朝陽日照處南窓簷下須兩三日一番旋轉使日曬勻則四面皆花用肥之時當俟沙土乾燥遇晚方始灌溉候晚以清水椀許澆之使肥膩之物得以下漬其根自無勾蔓逆上散亂盤盆之患更能預以甕缸之屬儲蓄雨水積久色綠者間或灌之其葉浡然挺秀濯然爭茂盈臺簇檻列翠羅青縱無花開亦見雅潔收藏冬作草囤比蘭髙二三寸上編草蓋寒時將蘭頓在中覆以蓋十餘日河水微澆一次待春分後去囤只在屋内勿見風如上有枯葉翦去待大暖方可出外見風春寒時亦要進屋常以洗鮮魚血水并積雨水或皮屑浸水苦茶灌之衛䕶忽然葉生白㸃謂之蘭虱用竹鍼輕輕剔去如不盡用魚腥水或煑蚌湯頻灑之即滅或研蒜和水新羊毛筆蘸洗去珍珠蘭法同盆須安頓樹隂下如盆内有蚓用小便澆出移蚓他處旋以清水觧之如有蟻用腥骨或肉引而棄之釀土用泥不拘大要先於梅雨後取溝内肥泥曝乾羅細備用或取山上有火燒處水衝浮泥再尋蕨菜待枯以前泥薄覆草上再鋪草再加泥如此三四層以火燒之澆入糞乾則再加再燒數次待乾取用一云將山土用水和勻摶茶甌大猛火煆紅火煆者恐蟻蚓傷根也捶碎拌雞糞待用如此蓄土何患花之不茂附錄蘭草增毛詩傳蕳蘭也埤雅蘭香草也爾雅翼蓋今之蘭草都梁香也盛𢎞之荆州記曰都梁縣有山山下有水清淺其中生蘭草因名都梁本草蕳一名水香一名香水蘭時人煑水以浴風故名一名燕尾香其葉有岐一名大澤蘭一名蘭澤草生澤畔婦人和油澤頭一名煎澤草一名省頭草夏月采置髪中令頭不䐈一名女蘭一名孩兒菊女子小兒喜佩之一名千金草李時珍曰二月宿根生苗成叢紫莖素枝赤節綠葉葉對節生有細齒嫩時可挼而佩之八九月漸老高者三四尺開花成穗如雞蘇花中有細子萎􅀢或即此類彚考原詩鄭風士與女方秉蕳兮增夏小正五月畜蘭為沐浴也新論蘭可燔而不可滅其馨束晳補亡詩循彼南陔言采其蘭注以為佩也埤雅德芬芳者佩蘭古之佩者各象其德爾雅翼其物可殺蟲毒除不祥故鄭人方春三月於溱洧之上女士相與秉蕳而祓除草木疏蘭為王者香草其莖葉皆似澤蘭廣而長節節中赤高四五尺漢諸池苑及許昌宫中皆種之可著粉中藏衣著書中辟白魚集藻五言古詩增明楊慎采蘭引并序廣通縣東響水關産蘭綠葉紫莖春華秋馥蓋楚騷所稱紉佩之蘭也人家盆植如蒲萱者蓋蘭之别種曰蓀與芷耳時川姜子見而采之以贈予知九畹之受誣千載矣一旦而雪作采蘭引秋風衆草歇叢蘭揚其香綠葉與紫莖猗猗山之陽結根不當户無人自芬芳宻林交翳翳鳴泉何湯湯欲采徃無路跼歩愁褰裳美人馳目成要予以昬黃山谷歳復晚修佩為誰長采芳者何人蓀芷共升堂徒令楚老惜坐使宣尼傷感此興中懐絃琴不成章附錄蕙草原蕙草一名薰草廣雅云薰草蕙草也又云菌薰也其葉謂之蕙一名香草埤雅云薰香草也一名燕草一名黄零香即今零陵香也爾雅翼云南越名燕草邵氏集云唐人名零子香以其花倒懸如零也零陵地名舊治在今全州湘水發源出此草今人所謂廣零陵香乃真薰草今鎮江丹陽皆蒔而刈之以酒灑制芬香更烈生下濕地方莖葉如麻相對生七月中旬開赤花甚香黑實江淮亦有但不及湖嶺者更芬郁耳彚考增拾遺記須彌山第九層山形漸小狹下有芝田蕙圃羣仙種耨焉博雅天子祭以鬯諸侯以薰埤雅凡氣薰則惠和暴則酷烈故於文惠草為蕙詩云南風之薰兮可以觧吾民之愠兮薰惠和也故可以觧民之愠莊子曰薰然慈仁謂之君子亦取諸此廣雅蕙草綠葉紫花魏武帝以為香燒之桂海虞衡志零陵香融宜等州甚多土人以編席薦性暖宜人集藻五言古詩原漢樊欽詠蕙蕙草生山北託身失所依植根䕃崖側夙夜懼危頹寒泉浸我根淒風常徘徊三光照八極獨不蒙餘暉葩葉非彫瘁凝露不暇晞百卉皆含榮已獨失時姿比我英芳發鶗鴂鳴已哀七言絶句增唐杜牧和令狐侍御賞蕙草尋常詩思巧如春又喜幽亭蕙草新本是馨香比君子遶闌今更為何人詩散句原晉趙壹被褐懐珠玉蘭蕙化為芻增唐張九齡庭前攬芳蕙江上託微波原楊巨源清潤潘郎玉不如中庭蕙草雪消初李白春蕙忽秋草蕙草留芳根杜甫蕙葉亦難留增李嘉祐白露沾蕙草杜牧鬬草憐香蕙密蕙媚幽圃羅隱風引蕙心斜楊億蕙草吐青煙原杜甫寵光蕙葉與多碧增白居易閒從蕙草侵堦綠李維蕙草煙微度綺疏附錄澤蘭增廣雅虎蕳澤蘭也本草澤蘭一名虎蒲一名龍棗一名風藥根名地筍吳普云二月生苗赤節四葉相值支節間蘇頌云根紫黑色如粟根二月生苗高二三尺莖幹青紫色作四稜葉生相對如薄荷微香七月開花帶紫白色萼通紫色亦似薄荷花此與蘭草大抵相類但蘭草生水旁葉光潤根小紫五六月盛而澤蘭生水澤中及下濕地葉微尖有毛不光潤方莖紫節七八月初採此為異爾彚考原遯齋閒覽楚辭所詠之蘭或以為都梁香或以為澤蘭或以為猗蘭草今當以澤蘭為正山中又有一種如大葉麥門冬春開花極香此則名幽蘭非真蘭也附録真珠蘭原真珠蘭一名魚子蘭色紫蓓虆如珠花開成穗其香甚濃四月内節邊斷二寸插之即活喜肥忌糞以魚腥水澆之則茂十月半收無風處以盆覆土封之水澆勿令乾来年愈茂花戴之髻香聞甚逺以蒸牙香棒香名蘭香非此不可廣中甚盛葉能斷腸附錄伊蘭原伊蘭出蜀中名賽蘭樹如茉莉花小如金粟香特馥烈戴之香聞十歩經日不散集藻賦增明楊慎伊蘭賦并序江陽有花名賽蘭香不足於艶而有餘於香戴之䰂紒經旬猶馨意古者紉佩之用頮浴之具必此物也西域有伊蘭以為佛供即此漢書所謂伊蒲之供也從而為之賦曰英英有蘭猗猗其美謚以伊蘭實自卬始維蘭之品粤繁有叢曰蕙曰蓀錯丰茸曰芷曰􅉅名殊物同形如蒲萱盆盝是薦謠俗攸珍乃蘭之贗可佩可紉服之媚人昔號國香今茲曷湮宜湯宜浴陳除新沃昔聞其語今茲則􅀈先正𧦬蘭謂識之艱山谷致疑晦翁屢歎懿若卉之挺生兮何珵美而琦絶既葳蕤以晞暘兮亦扆岑而帶岊友射干而偕生兮朋荔挺而俱發潄𤣥英之朝澤兮應復至之陽月秉棻蒕之旉榮兮擅芳菲之酷烈開以景風之俶辰兮貫乎星囘之火節潄沆瀣之芳潤兮全朱明之炎德匪直十歩之有芳兮曾譣經旬之未歇乃有娥媌掩嫮靡曼嫈眳歩歩移艶笑笑傾城子夫興於鬒髮昭儀寵於體馨曵歩揺之馥郁映角犀之豐盈若蘭機囘文之錦季蘭琴綠綺之聲爰色授而魂與且目眩而心縈倭梁家之髻浮渲韋娘之纓咸纖指兮爭掇並巧粲兮相迎都梁蟾蜍兮閼爾而減價虎蒲龍棗兮瞠乎其亡菁超旃檀於雪域壓迷迭於雲清星芒當晝而弗隱金粟未秋而先成埓瑶華兮玉蘂叶綠葉兮紫莖堪納凉於𤣥圃思御風兮蓬瀛詎數秋紅之蕳子豈顧晚翠之長卿爰感子兮體物遂錫子以嘉名重為系曰肇允嘉卉兮昉自炎皇媺人之佩兮王者之香深谷逶迤兮無人自芳宣尼息鄹兮屈平纍湘晨月秋風兮屬國之堂洪波霜晚兮謫仙之鄉紉遺佩捐兮庸亦何傷體物瀏亮兮聊以相羊五言古詩增明陳憲章賽蘭南有賽蘭香名花人未識光風散微馨甘露洗新碧一月薰蒸来氤氳在肝膈乃知方寸根中禀天地塞誰為續騷手俯仰空悽惻窓户悄無人圖書共昕夕七言絶句增明陳憲章賽蘭花開晴光三日轉花枝坐對微醺忽有詩涓滴未嘗花上露南風莫只報人知曲欄砌下少人窺戲蝶遊蜂忽滿枝君欲尋花須早計只今猶是未開時微風巾袂細氤氳楚畹叢中别有春啜茗亦嫌風景殺明朝載酒是何人山花艶艶綴旒傍君愛深紅愛淺黃楚客見之揮不去向人説是賽蘭香附錄風蘭原風蘭産温台山隂谷中懸根而生幹短勁花黄白似蘭而細不用土栽取大窠者盛以竹籃或束以婦人頭髻銅鐵絲頭髪襯之懸見天不見日處朝夕噀以冷茶清水或時取下水中浸濕又挂至春底自花即不開花而隨風飄揚冬夏長青可稱仙草亦竒品也最怕煙燼一云此蘭能催生將産挂房中最妙附錄朱蘭原朱蘭花開似蘭色如渥丹葉濶而柔粤種也附錄箬蘭原箬蘭葉似箬花紫形似蘭而無香四月開與石榴紅同時大都産海島隂谷中羊山馬跡諸山亦有性喜隂春雨時種附錄馬蘭增本草馬蘭一名紫菊其葉似蘭而大其花似菊而紫俗謂物之大者為馬也李時珍曰二月生苗赤莖白根長葉有刻齒狀似澤蘭但不香爾入夏高二三尺開紫花花罷有細子御定佩文齋廣羣芳譜卷四十四
