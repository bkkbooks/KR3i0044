body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷四十五花譜芍藥原一名餘容一名鋋一名犁食一名將離一名婪尾春一名黑牽夷廣雅作攣夷本草曰芍藥猶婥約也美好貌此草花容婥約故以為名處處有之揚州為上謂得風土之正猶牡丹以洛陽為最也白山蔣山茅山者俱好宿根在土十月生芽至春出土紅鮮可愛叢生髙一二尺莖上三枝五葉似牡丹而狹長初夏開花有紅白紫數色世傳以黃者為佳有千葉單葉樓子數種結子似牡丹子而小增本草一名白􅙥一名解倉白者名金芍藥赤者名木芍藥鄭虔胡本草芍藥一名沒骨花原黃者有御衣黃淺黃色葉疏蕊差深散出于葉間其葉端色又微碧髙廣類黃樓子此種宜升絶品黃花之冠黃樓子盛者五七層間以金線其香尤甚袁黃冠子宛如髻子間以金線色比鮑黃峽石黃冠子如金線冠子其色深如鮑黃鮑黃冠子大抵與大旋心同而葉差不同色類鵝黃道妝成黃樓子也大葉中深黃小葉數重又上展淡黃大葉枝條硬而絶黃緑葉扶疏而柔與紅紫稍異此品非今日之黃樓子乃黃絲頭中盛則或出四五大葉類黃樓子耳妬鵝黃黃絲頭也于大葉中一簇細葉雜以金線條髙緑葉疏柔紅者有冠群芳大旋心冠子也深紅堆葉頂分四五旋其英密簇廣可半尺髙可六寸艷色絶妙紅花之冠枝條硬葉疏大賽羣芳小旋心冠子也漸添紅而緊小枝條及緑葉並與大旋心同凡品中言大葉小葉堆葉者皆花瓣也言緑葉者謂枝葉也盡天工栁浦青心紅冠子也于大葉中小葉密直妖媚出衆枝硬而緑葉青薄點妝紅紅纈子也色紅而小並與白纈子同緑葉微瘦長積嬌紅紅樓子也色淡紅與紫樓子無異醉西施大軟條冠子也色淡紅惟大葉有類大旋心狀枝條細軟須以物扶助之緑葉色深厚疏長而柔湖纈紅色淺深相雜類湖纈黽池紅開須並萼或三頭者大抵花類軟條素妝殘退紅茅山冠子也初開粉紅即漸退白青心而素淡稍若大軟條冠子緑葉短厚而硬淺妝勻粉紅冠子也紅纈中無點纈者也醉嬌紅深紅楚州冠子也亦若小旋心狀中心則堆大葉葉下亦有一重金線枝條髙緑葉疏而柔擬香英紫寶相冠子也紫樓子心中細葉上不堆大葉者妬嬌紅紅寶相冠子也紅樓子心中細葉上不堆大葉者縷金囊金線冠子也稍似細條深紅者于大葉中細葉下抽金線細細相雜條葉並同深紅冠子怨春紅硬條冠子也色絶淡甚類金線冠子而堆葉條硬緑葉疏平稍若柔試濃妝緋多葉也緋葉五七重皆平頭條赤而緑葉硬背紫色簇紅絲紅絲頭也大葉中一簇紅絲細細枝葉同紫者取次妝淡紅多葉也色絶淡條葉正類緋多葉亦平頭效殷紅小矮多葉也與紫髙多葉一同而枝條低隨燥濕而出有三頭者雙頭者鞍子者銀絲者俱同根因土地肥瘠而異合歡芳雙頭並蒂而開二朵相背會三英三頭聚一萼而開擬繡韀鞍子也兩邊垂下如所乘鞍子狀地絶肥而生紫者有寶妝成冠子也色微紫于上十二大葉中密生曲葉回環裹抱團圓其髙八九寸廣半尺餘每一小葉上絡以金線綴以玉珠香欺蘭麝奇不可紀枝條硬而葉平為紫花之冠疊香英紫樓子也廣五寸髙盈尺于大葉中細葉二三十重上又聳大葉如樓閣狀枝條硬而髙緑葉疏大而尖柔蘸金香蘸金蕊紫單葉也是髻子開不成者于大葉中生小葉小葉尖蘸一線金色是也宿妝殷紫髙多葉也葉條花並類緋多葉而枝葉絶髙平頭凡檻中雖多無先後開並齊整聚香絲紫絲頭也大葉中一叢紫絲細細枝條髙緑葉疏而柔白者有楊花冠子多葉白心色黃漸拂淺紅至葉端則色深紅間以金線白花之冠掬香瓊青心玉板冠子也本自茅山來白英團掬堅密平頭枝條硬緑葉短且光曉妝新白纈子也如小旋心狀頂上四向葉端點小殷紅色一朵上或三點或四五點象衣巾之點纈緑葉柔而厚條硬而低試梅妝白冠子也白纈中無點纈者是也銀含稜銀緣也葉端一稜白色以上俱出宋王觀芍藥譜彚考原詩鄭風維士與女伊其相謔贈之以芍藥增山海經條谷之草多芍藥洞庭之上多芍藥范子芍藥出三輔韓詩外傳芍藥離草也原崔豹古今注芍藥有二種有草芍藥有木芍藥木者花大而色深俗呼為牡丹非也牛亨問曰將離相贈以芍藥何也董子答曰芍藥一名可離將别故贈之亦猶相招贈之以文無故文無名當歸增晉宫閣名暉章殿前芍藥花六畦建康記建康出芍藥極精好原清異録胡嵩詩曰瓶裏數枝婪尾春時人莫喻桑維翰曰唐宋文人謂芍藥為婪尾春者婪尾乃最後之杯芍藥殿春故有是名劉攽芍藥譜花有紅葉黃腰者號金帶圍有時而生則城中當出宰相韓魏公守維揚日郡圃芍藥盛開得金帶圍四公選客具樂以賞之時王圭為郡倅王安石為幕官皆在選中而缺其一花開已盛公謂今日有過客即使當之及暮報陳太傅升之來明日遂開宴折花插賞後四人皆為首相昔有獵於中條山見白犬入地中掘得一草根攜歸植之明年花開乃芍藥也故謂芍藥為白犬增通志略芍藥著於三代之際風雅所流詠也今人貴牡丹而賤芍藥不知牡丹初無名依芍藥得名故其初曰木芍藥亦如木芙蓉之依芙蓉以為名也牡丹晚出唐始有聞貴遊競趨遂使芍藥為落譜衰宗云符瑞志大中祥符四年四月江陵府刑部郎中袁煒家圃芍藥雙華並萼原漁隱叢話東坡云揚州芍藥為天下冠蔡繁卿為守始作萬花會用花千萬餘枝既殘諸園又吏因緣為姦民大病之余始至問民疾苦以此為首遂罷之增埤雅芍藥榮於仲春華於孟夏傳曰驚蟄之節後二十有五日芍藥榮是也華有至千葉者俗呼小牡丹東軒筆録四枝正紫重跗纍萼中有金蕊繞之號腰金紫三栁軒雜識芍藥為嬌客中吳紀聞張敏叔以芍藥為近客古琴疏帝相時條谷貢桐芍藥帝命羿植桐於雲和命武羅伯植芍藥於後苑楊允孚灤京雜詠詩注內園芍藥迷望亭亭直上數尺許花大如斗揚州芍藥稱第一終不及上京也吳寬詩注往時小南城梁氏芍藥盛開號梁家園人多攜酒賞之原學圃餘疏余以牡丹天香國色而不能無綵雲易散之恨因復創一亭周遭悉種芍藥名其亭曰續芳芍藥本出揚州故南都極佳一種蓮香白初淡紅後純白香如蓮花故以名其性尤喜糞豫課僮溉之其大反勝於南都即元馭所愛也其他如墨紫硃砂之類皆妙甚已致數種歸開時客皆蟻集真堪續芳矣明宣宗幸文淵閣命于閣右築石臺植淡紅芍藥一本景泰初增植二本左純白右深紅後學士李賢命之曰醉仙顔淡紅也曰玉帶白純白也曰宫錦紅深紅也與衆賦詩名曰玉堂賞花集瓶史芍藥花以鶯粟蜀葵為婢增花史文淵閣芍藥三本天順二年盛開八花李賢遂設燕邀吕原劉定之等八學士共賞惟黃諫以足疾不赴明日復開一花衆謂諫足以當之賢賦詩官僚咸和以為盛事析津日記芍藥之盛舊數揚州劉貢父譜三十一品孔常父譜三十三品王通叟譜三十九品亦云瑰麗之觀矣今揚州遺種絶少而京師豐臺連畦接畛倚擔市者日萬餘莖惜無好事者圖而譜之集藻序原宋劉攽芍藥譜序天下名花洛陽牡丹廣陵芍藥為相侔埓禹貢記揚州草木夭喬聖人之言然未見其為夭喬也廣陵芍藥有自他方移來種之者經歲則盛至有十倍其初而勝廣陵所出逺甚地氣所宜信其為夭乎然則醫書本草所載雖小物方土所出山川原野氣力不同或相倍蓰十百如此花矣不可不察也然芍藥之盛環廣陵四十五里之間為然外是則薄劣不及洛陽牡丹由人力接種故歲歲變更日新而芍藥自以種傳獨得於天然非翦剔培壅灌溉以時亦不能全盛又有風雨寒暄氣節不齊故其名花絶品有至十四五年得一見者其開不能成或變為他品此天地尤物不與凡品同待其地利人力天時參併具美然後一出意其造物亦自珍惜之爾芍藥始開時可留七八日自廣陵南至姑蘇北入射陽東至通州海上西止滁和州數百里間人人厭觀矣廣陵至京師千五百里駿馬疾走可六七日至也上不以耳目之玩勤逺人而富商大賈逐利纎嗇不顧又無好事有力者招致之故芍藥不得至京師而洛陽牡丹獨擅其名其移根北方者六年以往則不及初年自是歲加劣矣故北方之見芍藥者皆其下者也然種芍藥為生者猶得厚價重利云熙寧六年攽罷海陵至廣陵正四月花時會友傅欽之孫莘老偕行相與歷覽人家園圃及佛舍所種凡三萬餘株芍藥嫩好及雖好而不至者盡具矣扶風馬玿府大尹給事公子也博物好竒為余道芍藥本末及取廣陵人所第名品示余余按唐氏藩鎮之盛揚州號為第一萬商千賈珍貨之所叢集百氏小説尚多記之而莫有言芍藥之美者非天地生物無聞於古而特隆於今也殆時所好尚不齊而古人未必能知正色爾白樂天詩言牡丹取叢大花繁者為佳此最洛人所卑下者古人之不知芍藥何疑然當時無記録故後世莫知其詳今此復無傳説使後勝今猶不足恨或人情好尚更變駸駸日久則名花竒品遂將泯默無傳來者莫知有此不亦惜哉故因次序為譜三十一種皆使畫工圖寫而示未嘗見者使知之其嘗見者固以吾言為信矣增孔武仲芍藥譜序揚州芍藥名於天下與洛陽牡丹俱貴於時四方之人盡皆齎攜金帛市種以歸者多矣吾見其一歲而小變三歲而大變卒與常花無異由此芍藥之美益專推於揚州焉大抵粗者先開佳者後發髙至尺餘廣至盈手其色以黃為最貴所謂緋紅千葉乃其下者鄭詩引芍藥以明土風説者曰香草也司馬長卿子虛賦曰芍藥之和具而後御之説者曰芍藥主和五臟又辟毒氣也謝省中詩曰紅藥當階翻説者曰草色紅者也其義皆與今所謂芍藥者合俱未有專言揚州者唐之詩人最以摹寫風物自喜如盧同杜牧張祜之徒皆居揚日久亦未有一語及之是花品未有若今日之盛也余官於揚學講習之暇常裁而定之蓋可紀者三十有三種乃具列其名從而釋之原王觀揚州芍藥譜序天地之功至大而神非人力所能竊勝惟聖人為能體法其神以成天下之化其功蓋出其下而曽不少加以力不然天地固亦有間而可窮其用矣余嘗論天下之物悉受天地之氣以生其小大長短辛酸甘苦與夫顔色之異計非人力之可容致巧於其間也今洛陽之牡丹維揚之芍藥受天地之氣以生而小大淺深一隨人力之工拙而移其天地所生之性故竒容異色間出於人間以人而盜天地之功而成之良可怪也然而天地之間事物紛紜出乎其前不得而曉者此其一也洛陽風土之詳已見於歐陽公之記此不復論維揚大抵土壤肥膩於草木為宜禹貢曰厥草惟夭是也居人以治花相尚方九月十月時悉出其根滌以甘泉然後剝削老硬病腐之處揉調沙糞以培之易其故土凡花大約三年或二年一分不分則舊根老硬而侵蝕新芽故花不成就分之數則小而不舒不分與分之太數皆花之病也花顔色之淺深與葉蕊之繁盛皆出於培壅剝削之力花既萎落亟翦去其子屈盤枝條使不離散脈理不上行而皆歸於根明年新花繁而色潤雜花根窠多不能致逺惟芍藥及時取根盡去本土貯以竹席之器雖數千里之逺一人可負數百本而不勞至於他州則壅以沙糞雖不及維揚之盛而顔色亦非他州所有者比也亦有踰年即變而不成者此亦繫土地之宜不宜而人力之至不至也花品舊傳龍興寺山子羅漢觀音彌陀之四院冠於此州其後民間稍稍厚賂以丐其本培壅治蒔遂過於龍興之四院今則有朱氏之園最為冠絶南北二圃所種幾於五六萬株意其自古種花之盛未之有也朱氏當其花之盛開飾亭宇以待來遊者逾月不絶而朱氏未嘗厭也揚之人與西洛不異無貴賤皆喜戴花故開明橋之間方春之月拂旦有花市焉州宅舊有芍藥廳在都廳之後聚一州絶品於其中不下龍興朱氏之盛往歲郡將召移新守未至監護不密悉為人盜去易以凡品自是芍藥廳徒有其名爾今芍藥有三十四品舊譜只取三十一種如緋單葉白單葉紅單葉不入名品之內其花皆六出維揚之人甚賤之余自熙寧八年季冬守官江都所見與夫所聞莫不詳熟又得八品焉非平日三十一品之比此皆世之所難得今悉列於左舊譜三十一品分上中下七等此前人所定今更不易增元嶽榆芍藥詩序至正庚子孟夏黃鶴山人嶽榆與相臺翟君文中自吳城拏舟至海虞復過崑山訪顧君仲瑛草堂值春暉樓前芍藥盛開仲瑛重置酒樓上是日雷雨新霽風日淡蕩趙善長折金帶圍一朵插瓶中及以紅白花擎繞攢簇朱伯盛督行酒同集者七人天基道士于方外暨伯盛善長先醉仲瑛謂人事惟艱天時自適友朋盍簪寧無一語以紀其行樂乎遂以紅藥當階翻一句分韻賦詩者文中仲瑛子英并榆得藥字詩成為序其首實四月十一日也論原宋王觀芍藥譜後論維揚東南一都會也自古號為繁盛唐末亂離羣雄據有數經戰焚故遺基廢迹往往蕪沒而不可見今天下一統井邑田野雖不及古之繁盛而人皆安生樂業不知有兵革之患民間及春之月惟以治花木飾亭榭以往來遊樂為事其幸矣哉揚之芍藥甲天下其盛不知起於何代觀其今日之盛古想亦不減於此矣或者以謂自有唐若張祜杜牧盧同崔涯章孝標李嶸王播皆一時名士而工於詩者也或官于此或遊于此不為不久而略無一言一句以及芍藥意其古未有之始盛於今未為通論也海棠之盛莫甚於西蜀而杜子美詩名又重於張祜諸公在蜀日久其詩數千篇而未嘗一言海棠之盛張祜輩詩之不及芍藥不足疑也芍藥三十一品及前人之所次余不敢輒易後八品乃得於民間而最佳者然花之名品時或變易又安知止此八品而已哉後將有出兹八品之外者余不得而知當俟來者以補之也題跋增宋周必大題楊謹仲芍藥詩後淳熙甲午會同年楊謹仲周孟覺賞芍藥嘗櫻桃謹仲有詩豫次韻今二十有三年彭君仲識攜謹仲帖相過且索舊詩為之悵然此花最盛於太和而以紅都勝黃樓子為冠如牡丹之姚魏也黃樓或得之都勝者邑中一二家有種惜不與人去年余答鄉貢進士陳恂二小詩云芍藥名先記鄭風那因加木辨雌雄姚黃後出今王矣合把黃樓列上公六一先生舊帥揚分寧太史尹西昌只緣未識紅都勝如杜詩中缺海棠蓋許元寄歐陽公詩云芍藥瓊花應有恨維揚新什獨無名公答云偶不題詩便怨人山谷宰太和詩篇詠甚多亦未嘗及此花今謹仲云花出語與古事相類併録惡語於後頌增傅統妻芍藥花頌曄曄芍藥植此前庭晨潤甘露晝晞陽靈五言古詩原齊謝朓直中書省紫殿肅隂隂彤庭赫𢎞敞風動萬年枝日華承露掌玲瓏結綺錢深沉映朱網紅藥當階翻蒼苔依砌上兹言翔鳯池鳴珮多清響信美非吾室中園思偃仰朋情以鬱陶春物方駘蕩安得凌風翰聊恣山泉賞唐栁宗元題階前芍藥凡卉與時謝妍華麗兹晨欹紅醉濃露窈窕留餘春孤賞白日暮暄風動搖頻夜窗藹芳氣幽臥知相親願致溱洧贈悠悠南國人增元稹紅芍藥芍藥綻紅綃笆籬織青瑣繁絲蹙金蕊髙熖當爐火翦刻彤雲片開張赤霞裹煙輕琉璃葉風亞珊瑚朵受露色低迷向人嬌婀娜酡顔醉後泣小女妝成坐艷艷錦不如夭夭桃未可晴霞畏欲散晚日愁將墮結根本為誰賞心期在我採之諒所思幽贈何由果宋梅堯臣楊樂道留飲席上客置黃紅絲頭芍藥洛陽賣牡丹江都買芍藥賣與富人歡買為遊子樂萬絲必同心千葉必同萼五色相淺深百金相厚薄栽培動經年風雨便成昨蕭條洛陽城索寞江都郭賴有一春花能無十千酌朝看門擁車暮見門羅雀嘗聞月底人欲把月桂所要使清光多四海意開廓我亦愛明月常滿不願落上弦過楊侯乃值寒雨作共飲三四人不覺傳鳴柝持葩金谷豪朱黃何灼爍還思溱洧上士與女相謔實此香草芳請我賦其略酒闌為追詠思拙筆屢閣蔡襄和王學士芍藥粲爾芳草葉孤根當砌植違春已自分薰風猶借力艷艷朝日光紛披照顔色持之遺佳人歲久香不息原蘇軾送芍藥與公擇今日忽不樂折盡園中花園中亦何有芍藥裊殘葩久旱復遭雨紛披亂泥沙不折亦安用折去還可嗟棄擲諒未能送與謫仙家還將一枝春插向兩髻丫增謝堯仁詠芍藥花蓓大如拳花面或徑尺紫者棲紫鸞黃者落黃鵠或似扶桑枝推上一輪赤或似玻璃盆稍久擎無力又有似平叔愛矜素粉白又有似蜀人喜染天水碧或似包緑錦未放丹砂拆或似浴青囊未放沉麝發應須和露翦莫使見顔色庶使精神全免笑花無骨元顧瑛春暉樓賞芍藥靈雨沐霽景初暾散朝暄林鶯哢餘春砌藥開當軒泫妝露泥泥舞袂風翻翻流光不我邁久懷遲君論於以樂樽罍於焉傾笑言七言古詩增唐韓愈芍藥歌丈人庭中開好花更無凡木爭春華翠莖紅蕊天力與此恩不屬黃鍾家溫馨熟美鮮香起似笑無言習君子霜刀翦汝天女勞何事低頭學桃李嬌癡婢子無靈性競挽春衫來比並欲將雙頰一睎紅緑窗磨遍青銅鏡一樽春酒甘若飴丈人此樂無人知花前醉倒歌者誰楚狂小子韓退之宋韓琦和袁陟節推龍興寺芍藥廣陵芍藥真竒美名與洛花相上下洛花年來品格卑所在隨人趁髙價接頭著處騁新妍輕去本根無顧藉不論姚花與魏花只供俗目陪妖姹廣陵之花性絶髙得地不移歸造化大豪大力或強遷費盡擁培無艷冶東君固是花之主千苞萬萼從榮謝似矯東君泛愛心枉殺春風不肯嫁遂令天下走香名髣佛丹青競誇詫以此揚花較洛花自合維揚推定霸其間絶色可粗陳天工著意誠堪訝仙家冠子鏤紅雲金線妝治無匹亞旋心體弱不勝枝寶髻欹斜猶墮馬氷雪肌膚一纈斑新試守宫明似赭雙頭兩兩最多情象物更呈鞍面窊樓子亭亭欠姿媚特有怪狀堪圖寫見者方知畫不真未見直疑傳者詐前賢大欲巧賦詠片言未出心先怕天上人間少其比不似餘芳資假借我來淮海陟三春三訪龍興舊僧舍問得龍興好事僧每歲看承不敢暇後園栽植雖甚蕃及見花成由取捨出羣標致必驚人方徙矮壇臨大厦客來只見軒楹前國艷天姿相照射因知靈種本自然須憑精識能陶冶君子果有育材心請視維揚種花者原陳與義微雨濕清曉老夫門未開煌煌玉仙子並擁翠蕤來胭脂洗盡不自惜為雨歸來更無力老夫五十尚兒癡憑軒一賦會真詩增楊萬里芍藥何以築花宅筆直松枝子何以蓋花房雪白清江紙紙將碧油透松竹畫棟峙鋪紙便作瓦瓦色水晶似金鴨暖未熖銀竹響無水汗容漬不濕晴態嬌非醉盡將香世界關作間天地風日幾曽來蜂蝶獨得至勸春入宅莫歸休勸花住宅且少留昨日花開開一半今日花飛飛數片留花不住春徑歸不如折插瓶中看元袁桷新安芍藥歌洛陽花枝如美人點點不受塵土嗔輕朱深白鑄顔色髙亞緑樹爭精神那如新安紅芍藥透日千層紅閃爍碧雲迸出紫琉璃風動霓裳凝綽約我聞種花如種玉盡日隂晴看不足微雲淡蕩增寵光細雨輕濛賜湯沐何人看花不解理香雪紛紛手中毁酒酣跌蕩空低昻得意須臾竟如此翩翩驌驦雲中君愛花直欲留青春青春如流欲歸去明年看花君合住明徐賁次韻楊孟載觀芍藥作輕隂釀緑寒猶薄龜甲疏簾映朱閣美人偏有惜花心新水銀瓶送紅藥當階惟恐流塵汚纎手籠春為花護一捻芳容飽弄嬌胭脂細結玲瓏露綵貼單屏襯碧綃微風才動見花搖香凝膩粉肌全濕影艷方諸臉半潮髙枝開滿低枝捲翠檻移來隨步輦濃染如分織女機巧裁似出宫娥翦花情最重是何人應有鴛鴦帳裏身不用傳心題綺字踏歌當為喚真真陸粲賦內閣芍藥金門栁色縈深緑上苑春餘雜花撲夭桃已歇穠李衰紅藥翻階正芬郁此花初種自宣皇百曲雕欄七寶妝融風窈窕昭陽殿暖日輕盈白玉堂玉堂學士看花早賦成藝閣留詩草卷幔頻看碧霧流揮毫正耐紅雲繞憶昨宣皇居法宫太平樂事君臣同宸遊每出濯龍裏曲宴偏臨翔鳯中是時南苑飛霓旌爛熳仙葩綺繡明臨風宛轉如矜妬俯者如愁仰如訴半沾微雨妖紅濕太真泣憑欄干立至尊一顧六宫回茜裙霞帔俱羞澀華萼樓頭雨露偏芳容贏得美人憐君恩為與分春色詔許移來種閣前閣前復道連金谷翠輦經過幾回矚內家敕進賞花詞昭容傳制黃門促沉吟此事六十載當日繁華宛然在紺幰金輿稀幸臨黃扉紫禁留風采不羡揚州寶帶圍長安紅紫競芳菲五侯七貴同邀賞寶馬香車疾若飛爭似名花出天上霧閣雲窗儼相向浪蝶遊蜂未許窺酒徒詞客空惆悵江南三月足豪華繡幕圍香富貴家亦有幽姿在空谷風雨憔悴天之涯燕山遊子江南客獨對名花感今昔草木何知人自憐逢時亦復升沉隔世間榮辱偶然事不獨此花何歎息五言律詩增唐張九齡紫薇庭芍藥仙禁生紅藥微芳不自持幸因清切地還遇艷陽時名見桐君録香聞鄭國詩孤根若可用非直愛華滋宋梅堯臣七里灣得朱表臣寄千葉樓子髻子芍藥誰稱為近侍宜與牡丹尊霞綷千千葉香撩黯黯魂紅樓思俠少寶髻奉王孫勝插不堪照顔衰汴水渾原眭石春色今方滿名花爾較遲含芳如有意呈彩亦當時調鼎需仙液揮毫待鳯池天工知不淺一夜露華滋明蔡羽毛督經浣亭官舍芍藥晝靜緑隂匝微風滿院芬紅欄昨夜雨碧館見朝雲春杳鳥空怨暖多花易熏須煩紫絲帳遮護到斜曛七言律詩增唐張泌芍藥香清粉淡怨殘春蝶翅蜂鬚戀蕊塵間倚晚風生悵望靜留遲日學因循休將薜荔為青瑣好與玫瑰作近鄰零落若教隨暮雨又應愁煞别離人宋王禹稱芍藥詩并序芍藥之義見之鄭詩百花之中其名最古謝公直中書省詩云紅藥當階翻自後詞臣引為故事白少傅知制誥有草詞畢詠芍藥詩詞采甚為該偹然自天后以來牡丹始盛而芍藥之艷衰矣考其實牡丹初號木芍藥蓋本同而末異也牡丹落盡正凄涼紅藥開時醉一場羽客暗傳尸解術仙家重爇返魂香蜂尋檀口論前事露濕紅英試曉妝曽忝掖垣真舊物多情應認紫薇郎東君留著占殘春得得遲開亦有因曽與掖垣留故事又來淮海伴詞臣日燒紅艷排千朵風遞清香滿四鄰更愛緑頭弄金縷異時相對掌絲綸滿院勻開似赤城帝鄉齊點上元燈感傷綸閣多情客珍重維揚好事僧酌處酒杯深蘸甲折來花朵細含稜老郎為郡辜朝寄除却吟詩百不能韓琦北第同賞芍藥芍藥名髙致亦難此觀妖艷滿雕欄酒酣誰欲張珠網金細偏宜間寶冠露裛更深雲髻重蝶棲長苦玉樓寒鄭詩已取相酬贈不見諸經載牡丹蔡襄和運使學士芍藥篇密葉隂沉夏景新朱欄紅藥自為春香餘蘭芷偏饒艷畫入縑綃未逼真已恨芳華難駐景可堪愁臥動經旬三年想愛須留戀不為江頭酒味醇蘇軾玉盤盂詩並序東武舊俗每歲四月大會於南禪資福兩寺以芍藥供佛而今歲最盛凡七千餘朵皆重跗纍萼繁麗豐碩中有白花正圓如覆盂其下十餘葉稍大承之如槃姿格絶異獨出于七千朵之上云得之於城北蘇氏園中周宰相莒公之别業也而其名俚甚乃為易之雜花狼籍占春餘芍藥開時掃地無兩寺妝成寶瓔珞一枝爭看玉盤盂佳名會作新翻曲絶品難尋舊畫圖從此定知年穀熟姑山親見雪肌膚花不能言意可知令君痛飲更無疑但持白酒勸嘉客直待瓊舟覆玉彞負郭相君初擇地看羊屬國首吟詩吾家豈與花相厚更問殘芳有幾枝蘇轍和子瞻玉盤盂二首千葉團團一尺餘揚州絶品舊應無賞傳莒國遷鐘簴移憶胡僧置鉢盂叢底留連傾鑿落瓶中捧擁照浮屠強將絳蠟封紅萼憔悴無言損玉膚故相林亭父老知出羣草木尚何疑無多産業殘花藥幾許功名舊鼎彞豐艷不知人世别佳名新換使君詩明年會看花尤好剝盡浮苞飬一枝周必大彭孝求送芍藥數種鄙句為謝占斷春光及夏初琉璃翦葉朵珊瑚休論花品同而異且詠詩人樂且訏北地莫辭金鑿落南禪爭看玉盤盂彭宣微恙何妨醉自有嬌癡婢子扶楊萬里多稼堂前兩檻芍藥紅白對開二百朵紅紅白白定誰先嫋嫋娉娉各自妍最是倚欄嬌分外却緣經雨意酲然晚春早夏渾無伴暖艷晴香正可憐好為花王作花相不應只遣侍甘泉旁招近侍自江都兩歲何曽見國姝看盡滿欄紅芍藥只消一朵玉盤盂水晶淡白非真色珠碧空明得似無欲比此花無可比且云冰骨玉肌膚芙蓉渡酒店前金沙芍藥盛開山店春光也自妍芙蓉渡口數家村笋輿低過金沙架籬落疏圈芍藥軒孤客倦遊殊寂寞雨花著意與溫存可憐經眼匆匆去不折紅香到緑尊賈似道又是揚州芍藥時花應笑我賦歸遲滿堂留客春如畫對酒何妨鬢似絲玉立黃塵那可到錦幃紅蠟最相宜買山若就當移種此際誰能杖履隨溫溫玉立緑隂中不把芳菲逐萬紅折盡長淮多暇日簪聯四坐足春風應如慶厯梅花瑞况有昌黎屬句工問得君王乞身去移根栽傍曲欄東上了甘泉三捷書長淮萬里一塵無清和時節如春在紅藥精神與昔殊叢玉生香歌可譜圍金有客瑞重圖公堂且盡今朝醉已問君王乞鑑湖元郝經芍藥夜來風雨洗殘春芍藥還開春又新入座忽驚持酒客舉杯先酌送花人煙輕雪膩丰容質露重霞香婀娜身鐵石肝腸總銷鑠都將軟語説風神馬祖常芍藥鶯粉分奩艷有光天工巧製殿春陽霞繒襞積雲千疊寶盝凝脂蜜半香並蒂當階盤綬帶金苞向日剖珠囊詩人莫詠揚州紫便與花王可頡頏張昱陪宴相府得芍藥花有感醉吐車茵愧不才馬前蝴蝶趁花回玉瓶盛露扶春起錦帳圍燈照夜開垂白敢思溱洧贈欹紅還是廟廊栽揚州何遜空才思惟對髙寒詠閣梅明李東陽內閣賞芍藥一春風日幾晴隂數種名花競淺深禁苑栽培真得地化工雕刻本何心叢疑月下留鸞宿香到人間許蝶尋臺閣風流前輩逺綵毫重和玉堂吟次第紅芳又緑隂好花留向玉堂深多從雨過看生色不為春遲負賞心清露著衣香易濕綵雲迷眼夢難尋杯餘幸接韓公宴詞罷先𢋫白傅吟曉聞花底佩聲歸萬葉枝頭露未稀力盡丹青空藻繪眼看紅紫漫芬菲裁雲直傍瑤池起避日須將錦障圍願向人間分此種莫教春祗在彤扉春逐長安擔上歸此花真覺眼中稀新題翰苑圖猶在舊事揚州草自菲索賞向人心已醉試開經日手頻圍欲知近侍承恩地長共西垣與北扉吳寬秦公邀賞芍藥妙手何人簇絳紗平臺驚見數枝斜梁家園裏無遺種吏部庭前得好花量淺莫將深盞酌眼昏猶用密簾遮詩中近侍非公論誰説唐人是作家品髙真自廣陵來舊譜空憐壁角堆千葉連雲如並擁兩枝迎日忽齊開詩中相謔何須贈擔上能賒也用栽記取今時才看起醉吟多藉麴生材儲巏賞紅藥三歲歸來始一看捲簾深坐傍欄干數枝帶雨開何晚此日憐春别更難封殖喜留嘉種在低回如語舊盟寒裁詩為喚東君轉酒盞花前正爾寬莫怪多情盡日看春殘花謝總相干遲開已待花神入真賞能逢地主難翠幄微香吹漸逺玉盤承露㵼初寒三年擬試沉香筆却算行期為爾寬文徴明禁中芍藥仙姿綽約絳羅紳何日移根傍紫宸月露冷團金帶重天風香泛玉堂春千年想見翻階詠一笑羞稱近侍臣不似人間易零落上方元自隔凡塵黃姬水石佛院看芍藥山繞吳宫舊館娃清江曲曲緑楊斜偶移畫鷁同杯酒不道空門有艷花白日簾櫳堪羃霧夕陽欄檻更添霞美人不見偏惆悵欲折瓊枝感歲華息園賞芍藥淺白深紅鬭合歡絲絲香雨晝難乾直須一日三百盞無那東風十二欄水上新傳錦字艷樓頭長怨玉簫寒可憐春色隨花盡留興還應帶月看王渙昭慶寺看芍藥一半春光過牡丹又開芍藥遍禪關久辜往約違蓮社今續清歡到寶欄垂露幾團花面濕東風一陳燕泥寒酒邊何味呈竒供緑笋朱櫻正滿盤七言小律原唐白居易感芍藥花寄正一上人今日階前紅芍藥幾花欲老幾花新開時不解比色相落後始知如幻身空門此去幾多地欲把殘花問主人五言排律原唐白居易草詞畢遇芍藥初開偶成十六韻罷草紫泥詔起吟紅藥詩詞頭封送後花口拆開時坐對鈎簾久行觀步履遲兩三叢爛熳十二葉參差背日房微斂當階朵旋欹叉葶抽碧股粉蕊撲黃絲動蕩情無限低斜力不支周回看未足比諭語難為勾漏丹砂裹僬僥火熖旗彤雲賸根蒂絳幘欠纓緌况有晴風度仍兼宿露垂疑香熏罨畫似淚著胭脂有意留連我無言怨思誰應愁明月落如恨隔年期菡蓞泥連萼玫瑰刺繞枝等量無勝者惟眼與心知五言絶句增唐孟郊看花芍藥誰為壻人人不敢來惟應待詩老日日殷勤開原宋王十朋芍藥千葉揚州種春深霸衆芳無言比君子窈窕有溫香已過花王候才開近侍香來遊禁酒地免作退之狂增金姚孝錫詠芍藥緑萼披風瘦紅苞浥露肥只愁春夢斷化作彩雲飛明李東陽芍藥秀色春前發濃隂雨後看持杯賀花相先我得休官七言絶句原唐韓愈芍藥浩態狂香昔未逢紅燈爍爍緑盤龍覺來獨對情驚恐身在仙宫第幾重增宋蔡襄華嚴院西軒見芍藥吉祥亭下萬千枝看盡將開欲落時却是雙紅有深意故留春色綴人思烘簾微照自生光吹面輕風與送香誰把金刀收絶艷醉紅深淺上叉梁的的名花對酒樽欄邊沉醉月黃昏今朝關外尋蘭若忽見孤芳欲斷魂原邵雍白芍藥阿姨天上舞霓裳姊妹庭前翦雪霜要與牡丹為近侍鉛華不御學梅妝含露仙姿近玉堂翻階美態醉紅妝對花未免須酣舞到底昌黎是楚狂蘇軾題趙昌芍藥倚竹佳人翠袖長天寒猶著薄羅裳揚州近日紅千葉自是風流時世妝增蘇轍馬上見賣芍藥戲贈張厚之春風欲畫無尋處盡向南園芍藥中過盡此花真盡也此身應與此花同春來便有南園約過盡春風約尚賒緑樹成隂花結子便須攜客到君家原黃庭堅廣陵早春春風十里珠簾捲倣佛三生杜牧之紅藥梢頭初繭栗揚州風物鬢成絲增陳師道謝趙生惠芍藥從微至老走風塵喜見鄰家第四春獨舞東風對西子政緣無語却宜人九十風光次第分天憐獨得殿殘春一枝剩欲簪雙鬢未有人間第一人張栻一年春事雨聲裏十里揚州夢想邊眼底花明煩折贈君家風物自嫣然元馬祖常五月芍藥芍藥花開端午時江南遊客苦相疑上京不是春光晚自是天家日景遲楊允孚灤京雜詠時雨初肥芍藥苖脆肥香壓酒腸消揚州簾卷春風裏曽惜名花第一嬌明僧德祥玉階宜有此花開金鼎調香宰相才莫謂人間無綵筆寫將濃艷入雲臺詩散句原唐孟郊月娥雙雙下楚艷枝枝浮洞裏逢故人婥約清宵遊宋李覯斜月正當樓花霧壓城重起傍藥欄行花亦方在夢劉敞跗萼晴相照芳香暖競飄波翻蜀地錦霞萃赤城標唐陳良父凝脂新賜浴半面更啼紅宋穆修油壁車中同載女菱花鏡裏並妝人韓琦丹砂纈妙深難染白玉冠巍瑩絶瑕紅玉斫成樓突兀白雲爭簇髻巍峩嬌紅閙密輕多葉醉粉欹斜奈軟條粉妝瑞玉千叢密冠縷真金半尺圍增劉敞眼前隋苑多佳麗未覺吳宫久寂寥蘇轍共驚春去已多日爭看花開最後番原曽鞏小碧欄干四月天露紅煙紫不勝妍張舜民西掖階前辭御傘瓊林殿後媚春衣陳傅良玉龍十二蓬山頂寶髻三千漢殿中密葉自成金罽飾亂英誰緝紫茸香半妝宫面迎風笑間色仙衣帶露收楊東山不濃不淡勻脂粉非醉非醒媚雨風過眼一春春又夏開殘芍藥更無花趙師秀自洗銅瓶插欹側要令書卷識奢華增元吳澄淺潮半醉流霞暈清印初昏淡月痕楊允孚若較內園紅芍藥洛陽輸却牡丹花原唐杜甫傍砌看紅藥白居易夾砌紅藥欄增李商隱紅藥綻香苞宋戴復古翻階芍藥遲元方回芍藥抽紅鋭唐李商隱欄藥日髙紅髲􅫭元周伯琦一瓶芍藥當荷花詞原宋王十朋點絳唇間日盈盈向人自笑還無語牡丹飄雨開作羣花主柔美溫香翦染勞天女青春士花間歌舞學個狂韓愈韓元吉浪淘沙鶗鴂怨花殘誰道春闌多情紅藥待君看濃淡曉妝新意態獨占西園風葉萬枝繁猶記平山五雲樓映玉成盤二十四橋明月下誰憑朱闌張孝祥踏莎行洛下根株江南栽種天香國色千金重花邊三閣建康春風前十里揚州夢油壁輕車青絲短鞚看花日日催賓從而今何許定王城一枝且為鄰翁送陳從古蝶戀花日借輕黃珠綴露困倚東風無限嬌春處看盡夭紅渾謾語淡妝偏稱泥金縷不共鉛黃爭勝負殿後開時故欲尋春去去似朝霞無定所那堪更著催花雨薑夔側犯恨春易去甚春却向揚州住微雨正繭栗稍頭弄詩句虹橋二十四總是行雲處無語漸半脫宫衣笑相顧金荷細葉千朵圍歌舞誰念我髮成絲來此共樽俎後日西園緑隂無數寂寞劉郎自修花譜陳濟翁驀山溪薰風時候芍藥披晴晝天上玉欄干展一枰天家錦繡漢宫唐殿嬪御逞妖嬈飛燕女太真妃一樣新妝就黃金撚線色與紅芳鬭誰把絳綃衣誤將他胭脂漬透晚風生處襟袖捲濃香持玉斚秉紗籠倚醉聽更漏盧祖臯水龍吟杜鵑啼老春紅翠隂滿眼愁無奈飛來何處鳯軿鸞馭霞琚雲珮風檻嬌憑露梢慵嚲酒痕微退念洛陽人去香魂又返依然是風流在十年一覺揚州春夢離愁似海浩態難留暗香吹散幾時重會向樽前笑折一枝紅玉帽簷斜戴劉圻父醉蓬萊訪鶯花陳迹姚魏遺風緑隂成幄尚有餘香付寶階紅藥淮海維揚物華天産未覺輸京洛時世新妝施朱傅粉依然相若束素腰纖捻紅唇小鄣袖嬌羞倚欄柔弱玉佩瓊琚勸王孫行樂况是韶華為伊挽駐未放離情薄顧盻歌前留連醉裏莫教零落曽覿念奴嬌人生行樂算一春歡賞都來幾日緑暗紅稀春已去贏得星星鬢白醉裏狂歌花前起舞拚罰金杯百淋漓宫錦忍辜妖艷姿色須信殿得韶光只愁花謝又作經年别嫩紫嬌紅邀客語應為主人留客月落烏啼酒闌燭暗離緒傷吳越竹西歌吹不堪老去重憶朝補之望海潮人間花老天涯春去揚州别是風光紅藥萬株佳名十種天然浩態狂香尊貴御衣黃未便教西洛獨占花王困倚東風漢宫誰敢鬭新妝年年髙會維揚看家誇絶艷人詫竒芳結萼當屏聯葩就幄紅遮緑繞華堂花面映交相更秉蕑觀洧幽意難忘罷酒風亭夢魂驚恐在仙鄉方嶽沁園春把酒問花繭栗稍頭春今幾何笑身居近侍翻階萬玉面勻菩薩髻擁千螺一一牙籖英英碧字占定花間甲乙科歸來也傍紫薇吟處揉作陽和祗今花事無多看幾許風煙付與他待圍將翡翠怕蜂粘粉織成雲錦遣鳯銜梭誰翦并刀贈之燕玉莫負雙娥嬌溜波花應道儘花強人面底用能歌劉克莊賀新郎一夢揚州事畫堂深金瓶萬朵元戎髙會座上祥雲層臺起不減洛中姚魏歎别後關山迢遞國色天香何處在想東風猶憶狂書記驚歲月一彈指數枝清曉煩馳騎向小窗依稀重見蕪城妖麗料得花憐儂消瘦儂亦憐花憔悴謾悵望竹西歌吹老矣應無騎鶴日但春衫點點當時淚那更有舊情味别録增南史王筠傳筠幼而警悟七歲能屬文年十六為芍藥賦其詞甚美圖畫見聞志李少保端願有圖一面畫芍藥五本其畫皆無筆墨用五彩布成為徐崇嗣沒骨圖以其無筆墨骨氣而名之夢溪筆談元豐末秀州人家屋瓦上冰盡成花每瓦一枝正如畫家所為折枝有大花如牡丹芍藥者氣象生動雖巧筆不能為之以墨拓之無異石刻原分植芍藥大約三年或二年一分分花自八月至十二月其津脈在根可移栽春月不宜諺云春分分芍藥到老不開花以其津脈發散在外也栽向陽則根長枝榮發生繁盛相離約二三尺一如栽牡丹法不可太逺太近穴欲深土欲肥根欲直將土鉏虛以壯河泥拌豬糞或牛羊糞栽深尺餘尤妙不可少屈其根梢只以水注實勿踏築覆以細土髙舊土痕一指自驚蟄至清明逐日澆水則根深枝髙花開大而且久不茂者亦茂矣以雞矢和土培花叢下渥以黃酒淡紅者悉成深紅增種樹書菜圃中種芍藥最盛原修整春間止留正蕊去其小苞則花肥大新栽者止留一二蕊一二年後得地氣可留四五然亦不可太多開時扶以竹則花不傾倒有雨遮以箔則耐久花既落亟翦其蒂盤屈枝條以線縛之使不離散則脈下歸於根冬間頻澆大糞明年花繁而色潤處暑前後平土翦去來年必茂冬日宜護忌澆水服食安期生服鍊法云芍藥有二種治病用金芍藥色白多脂肉色紫者不用凡採得淨洗去皮東流水煮百沸隂乾三日木甑內上覆淨黃土蒸一日夜取出隂乾搗末麥飯或酒服三錢七日三服滿三百可登嶺絶粒春採芽或花瓣以麵煎之味脆美可以久留制食之毒莫良于芍藥故獨得藥之名所謂芍藥之和具而後食之者此也採製根入藥味酸寒赤白視花色白者益脾能于木中㵼木赤者散邪能行血中之滯氣秋時採單葉者氣味全厚用竹刀刮去皮並頭上土蜜水拌蒸從已至未曬乾收貯中寒者酒炒女人血藥醋炒御定佩文齋廣羣芳譜卷四十五
