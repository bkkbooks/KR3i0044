body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷四十六花譜金燈花増本草金燈花一名鬼燈檠一名朱姑一名鹿蹄草一名無義草酉陽雜俎云金燈之花與葉不相見人惡種之謂之無義草根名山慈姑根狀如慈姑花狀如燈籠而朱色故有諸名李時珍曰處處有之冬月生葉如水仙花之葉而狹二月中抽一莖如箭簳髙尺許莖端開花白色亦有紅色黄色者上有黑㸃草花譜云金燈色紅銀燈色白衆花簇成一朶如絲紐成三月結子有三稜四月初苖枯即掘取其根遲則苖腐難尋根苖與老鴉蒜極相類但有毛殻包裹為異耳彚考増園林草木疏金燈隰生花開纍纍明艶垂條不自支俗惡人家種之花經金燈七品三命荆溪游記善權洞秋晩徧壑皆金燈花綺錯如繡集藻七言絶句増宋晏殊金燈花蘭膏爇處光猶淺銀燭燒時熖不馨好向書生窓下種免教辛苦更囊螢詩散句増宋晏殊煌煌五枝燈下有玉蟠螭楊巽齋如龍乍化青藜熖寧用窓前設短檠金盞花増宛陵集詩注金盞花一名醒酒花原金盞花一名長春花金盞其花形也長春言耐久也一名杏葉草髙四五寸嫩時頗肥澤葉似栁葉厚而狹抱莖而生甚柔脆花大如指頂金黄色瓣狹長而頂圓開時團團狀如盞子生莖端相續不絶結實在蕚内色黑如小蟲蟠屈之狀味酸寒無毒彚考増學圃雜疏花之四季開者蘭桂之外有長春菊即金盞花也集藻五言律詩増宋梅堯臣金盞子鍾令昔醒酒豫章留此花黄金盞何小白玉椀無瑕始入何郎宅還歸楚客家從兹不能醉只恐賣流霞附錄側金盞花増桂海虞衡志側金盞花如小黄葵葉似槿歲暮開與梅同時翦春羅増花史翦春羅一名碎翦羅原翦春羅一名翦紅羅蔓生二月生苖髙尺餘柔莖綠葉似冬青而小對生抱莖入夏開深紅花如錢大凡六出周廻如翦成茸茸可愛結實大如豆内有細子人家多種之盆盎中每盆數株竪小竹葦縛作圓架如筒花附其上開如火樹亦雅翫也味甘寒無毒集藻七言絶句原宋翁元廣翦春羅誰把風刀翦薄羅極知造化著功多飄零易逐春光老公子樽前奈若何附錄翦秋羅原翦秋羅一名漢宫秋色深紅花瓣分數岐尖峭可愛八月間開春時待芽出土寸許分其根種之種子亦可喜隂地清水灌之用竹圈作架扶之可翫春夏秋冬以時名也附錄翦羅花原翦羅花色紅出南越性畏寒壅以雞糞澆以燖猪湯退雞鵝水則茂冬入窖中附錄翦金羅原翦金羅金黄色花甚美艶附録翦紅紗原翦紅紗莖髙三尺葉旋覆夏秋開花狀如石竹花而稍大四圍如翦瓣鮮紅可愛結穗亦如石竹穗中有細子石竹原石竹草品纖細而青翠花有五色單葉千葉又有翦絨嬌艶奪目㛹娟動人一云千瓣者名洛陽花草花中佳品也増洛陽花木記鵝毛石竹一名繡竹原王敬美曰石竹雖草花厚培之能作重臺異態與夜落金錢鳯仙花之類俱籬落間物彚考増酉陽雜俎衛公言蜀中石竹有碧花花經石竹九品一命集藻五言古詩増唐王績石竹詠萋萋結綠枝煜煜垂朱英常恐零露降不得全其生歎息聊自思此生豈我情昔我未生時誰者令我萌棄置勿重陳委化何足驚原宋張耒石竹花真竹乃不花爾獨艶暮春何妨兒女眼謂爾勝霜筠世無王子猷豈有知竹人粲粲好自持時來稱此君五言律詩増唐獨孤及荅李滁州題庭前石竹花見寄殷疑曙霞染巧類匣刀裁不怕南風熱能迎小暑開遊蜂憐色好思婦感年催覽贈添離恨愁腸日幾廻原司空曙雲陽寺石竹花一自幽山别相逢此寺中髙低俱出葉深淺不分叢野蝶難爭白庭榴暗讓紅誰憐芳最久春露到秋風七言律詩增宋王安石石竹花退公詩酒樂華年欲取幽芳近綺筵種玉亂抽青節瘦刻繒輕㸃絳花圓風霜不放飄零早雨露應從愛惜偏已向美人衣上繡更留佳客賦嬋娟元虞集賦石竹積雪初消蕚綠華東風吹動絳綃霞龍嘘石氣千年潤鶴過林隂一徑斜刻字欲尋金錯落析旌如織翠交加綺窓坐對吹笙暖未覺人間歲月賒五言排律増唐李頎魏倉曹宅各賦一物得當軒石竹羅生殊衆色獨為表華滋雖雜蘭蕙處無爭桃李時同人趨府暇落日後庭期密葉散紅㸃靈條驚紫蕤芳菲看不厭采摘願來兹五言絶句増唐皇甫冉病中對石竹花散㸃空堦下閒凝細雨中那能久相伴嗟爾滯秋風宋文同石竹蜂齧紅蕊爛蟲啼碧叢短秋風掠地起只有蒼苔管七言絶句増唐陸龜䝉石竹花詠曽看南朝畫國娃古蘿衣上碎明霞而今莫共金錢鬭買斷春風是此花宋王安石石竹花春歸幽谷始成叢地面芬敷淺淺紅車馬不臨誰見賞可憐亦解度春風原楊監丞長夏幽居景不窮花開芳砌翠成叢窓南髙臥追凉際時有微香逗晩風増元蒲道源賦石竹短籬新見出梢梢葱蒨都無尺許髙茜色芳葩工㸃綴莫教容易混蓬蒿詩散句原宋林逋所重晩芳聊在目可關秋色易為花深枝苒苒裝溪翠碎片英英翦海霞王安石麝香眠後露檀勻繡在羅衣色未真斜倚細叢如有恨冷搖數朶欲無春唐李白石竹繡羅衣杜甫麝香眠石竹増徐晶石竹數重青詞原宋晏殊採桑子古蘿衣上金針様繡出芳妍玉砌朱闌紫艶紅英照日鮮佳人畫閣新妝了對立叢邊試摘嬋娟貼向睂心學翠鈿别録原花史石竹花須每年起根分種則茂但枝蔓柔弱易至散漫須用小竹扶之用細竹或小葦圍縛則不摧折罌粟花原罌粟一名米囊花一名御米花一名米殻花増本草罌粟一名象榖其實狀如罌子其米如粟乃象乎榖可以供御故有諸名原青莖髙一二尺葉如茼蒿花有大紅桃紅紅紫純紫純白一種而具數色又有千葉單葉一花而具二類艶麗可翫實如蓮房其子囊數千粒大小如葶藶子増本草蘇頌曰九月布子渉冬至春始生苖極繁茂李時珍曰三四月抽薹結青苞花開則苞脫大如仰盞罌在花中鬚蕊裹之花開三日即謝而罌在莖頭長一二尺大如馬兠鈴上有蓋下有蔕宛然如酒罌中有白米極細彚考増花經米囊七品三命原學圃雜疏芍藥之後罌粟花最繁華其物能變加意灌植妍好千態曽有作黄色綠色者逺視佳甚近頗不堪聞瓶史罌粟蜀葵妍於籬落司空圖之鸞臺也増聞雁齋筆談罌粟花之無香韻者也朱宓侯種之盈畝萬朶爛然亦足奪目鮑我生問余此堪作何比余昔過盧溝橋一莊院僧驅騾百許頭縱食櫪下其色相錯如繡始知昔人雲錦之比殆非虚妄今日所見頗為似之二生皆絶倒集藻四言古詩原宋蘇轍種藥苖詩築室城西中有圖書窓户之餘松竹扶疎拔棘開畦以毓嘉蔬畦夫告予罌粟可儲罌小如罌粟細如粟與麥皆種與穄皆熟苖堪春菜實比秋榖研作牛乳烹為佛粥老人氣衰飲食無幾食肉不消食菜寡味栁槌石鉢煎以蜜水便口利喉調肺飬胃三年杜門莫適往還幽人衲僧相對忘言飲之一杯失笑欣然我來潁川如遊廬山七言律詩増明呉幼培罌粟花庭院深沉白晝長堦前仙卉吐羣芳含煙帶雨呈嬌態傅粉凝脂逞艶妝種自中秋須隔歲開於初夏伴傾陽更誇結子纍纍碩何必汙邪滿稻粱七言絶句原宋謝薖罌粟花鉛膏細細㸃花梢道是春深雪未消一斛千囊蒼玉粟東風吹作米長腰茶粒齊圜剖罌子作湯和蜜味尤宜中年强飯却丹石安用咄嗟成淖糜楊萬里米囊花鳥語蜂喧蝶亦忙爭傳天詔詔花王東君羽衛無供給探借春風十日糧詩散句原唐雍陶萬里客愁今日散馬前初見米囊花别錄原種藝八月中秋夜或重陽月下子下畢以掃帚掃勻花乃千葉兩手交換撒子則花重臺或云以墨汁拌撒免蟻食須先糞地極肥鬆用冷飲湯并鍋底灰和細乾土拌勻下訖仍以土蓋出後澆清糞刪其繁以稀為貴長即以竹籬扶之若土瘦種遲則變為單葉然單葉者粟必滿千葉者粟多空増本草罌中米可煑粥和飯食水研濾漿同菉豆粉作腐食亦可取油麗春原麗春罌粟别種也本草云其花變態不常艶麗可愛故曰麗春又曰賽牡丹又曰錦被花叢生柔幹多葉有刺根苖止一類而具數色有紅者白者紫者傅粉之紅者間青之黄者而紅復數品有微紅者半紅者白膚絳唇者丹衣而素純者殷紅如染茜者姿狀葱秀色澤鮮明頗堪娯目草花中妙品也江浙皆有金陵更佳增游黙齋花譜紫二品深者鬚青淡者鬚黄白亦二品葉大者微碧葉細者竊黄而竊黄尤竒素衣黄裏芳秀茸茸若新鵝之毳竊紅似芍藥中粉紅樓特差小視凡花之粉紅十倍集藻五言古詩増唐杜甫麗春百草競春華麗春應最勝少須好顔色多漫枝條剰紛紛桃李枝處處總能移如何貴重此却怕有人知宋張先麗春蓬蒿眼已熟收拾到阿麗從分色紅白未害格奴婢爭妍知不足出刺以自衛上有寒梅枝春霜正憔悴五言律詩増宋潘檉麗春梁苑花銷去黄臺早自熏不同罌子粟别是石榴裙婀娜纔勝掌參差莫夢雲王郎尋水竹駐履幾殷勤詩散句増宋徐致中照眼妝新就扶頭酒半醒並肩罌粟多含態具體牡丹惟欠香虞美人増學圃餘疏虞美人一名滿園春千葉者佳原虞美人草獨莖三葉葉如决明一葉在莖端兩葉在莖之半相對而生人或近之抵掌謳曲葉動如舞故又名舞草出雅州見酉陽雜俎増花鏡江浙最多叢生花葉類罌粟而小一本有數十花莖細而有毛發蕊頭朝下花開始直單瓣叢心五色俱備姿態葱秀因風飛舞儼如蝶翅扇動亦花中妙品彚考増益州草木記雅州名山縣出虞美人草花葉兩相對人或近之即向人而俯如為唱虞美人曲則此草相應而舞他曲則否賈氏談錄褒斜山谷中有虞美人草狀如雞冠大葉相對歌唱虞美人曲則兩葉如人拊掌之狀頗中節益部方物畧記蜀中傳虞美人草予以虞作娯意其草柔纖為歌氣所動故其葉至小者或動搖美人以為娯樂耳筆談髙郵桑景舒性知音舊聞虞美人草逢人作虞美人曲枝葉皆動他曲不然試之如所傳詳其曲皆呉音也他日取琴試用呉音製一曲對草鼓之枝葉皆動乃因曰虞美人操其聲調與舊曲始末不相近而草輒應之者律法同管也東齋記事虞美人草唱他曲亦動傳者誤矣錦里新聞虞美人草父老云曽有人於和夷埧見此草偶歌之叶虞韻遂舞動如醉者然因是登之志碧雞漫志虞美人脞説稱起於項籍虞兮之歌余謂後世以此命名可也曲起於當時非也曽子宣夫人魏氏作虞美人草行有云芳魂寂寞寄寒枝舊曲聞來似歛睂又云當年遺事久成空慷慨尊前為誰舞亦有就曲誌其事者世以為工其詞云帳前草草軍情變月下旌旗亂褫衣推枕愴離情逺風吹下楚歌聲月三更撫騅欲上重相顧艶態花無主手中蓮鍔凛秋霜九泉歸去是仙鄉恨茫茫黄載萬追和之壓倒前軰矣其詞有云世間離恨何時了不為英雄少楚歌聲起霸圖休却似一江春水向東流蔓葛荒葵城隴暮玉貌知何處至今芳草解婆娑只有當時魂魄未消磨按益州草木記賈氏談錄酉陽雜俎益州方物圖贊筆談呉東齋記事六家説各有異同方物圖贊最穿鑿無所稽據聞蜀中數處有此草予皆未之見恐種族不類則所感歌亦異然舊曲三其一屬中吕調其一中吕宫近世轉入黄鐘宫此草應拍而舞應舊曲乎新曲乎桑氏呉音合舊曲乎新曲乎恨無可問者又不知呉草與蜀産有異同否耶四川志潼川西三十里紫葢山産虞美人草集藻贊増宋宋祁虞美人草贊翠莖纖柔穉葉相當逼而歌之或合或張五言古詩増宋姜䕫賦虞美人草夜闌浩歌起玉帳生悲風江東可千里棄妾蓬蒿中化石那解語作草猶可舞陌上望騅來翻然不相顧七言古詩原宋魏夫人虞美人草行鴻門玉斗紛如雪十萬降兵夜流血咸陽宫殿三月紅霸業已隨烟燼滅剛强必死仁義王隂陵失道非天亡英雄本學萬人敵何用屑屑悲紅妝三軍敗盡旌旗倒玉帳佳人坐中老香魂夜逐劍光飛清血化為原上草芳心寂寞寄寒枝舊曲聞來似歛睂哀怨徘徊愁不語恰如初聽楚歌時滔滔逝水流今古楚漢興亡兩邱土當年遺事總成空慷慨尊前為誰舞增僧北磵詠虞美人草君恩似海海不深妾意如鐵利斷金舎生取義我所欲忍死織室羞同心春姿忽作秋蓮委一寸剛明曽不死明年原上野花繁一枝自托華風起裊裊娉娉不成艶能度淺深生色染向人欲訴却無言寂寞千年恨難掩芳郊遊女宛轉歌停車拍手看婆娑五言律詩増宋陳師道詠虞美人草幽草黙通神舊題虞美人長言方度曲應節若翻身律吕聲相召雲龍氣自親無情猶感㑹不獨在君臣七言律詩原明孫齊之詠虞美人草楚宫花態至今存傾國傾城總莫論夜帳一歌身易殞春風千載恨難吞臙脂臉上啼痕在粉黛光中血淚新誰道漢宫花似錦也隨荒草任朝昬徐茂呉詠虞美人草楚宫人去霸圖移賸有芳名寄一枝浥露晩妝餘涕淚臨風夜舞憶腰肢乍翻尚自疑紅藥欲刈終難混綠葵若使靈均當日見不將哀怨託江蘺紅顔一日盡江湄芳草能傳易代姿尚想施朱留片蕚翻疑化碧有單枝迎風似逐歌聲起宿雨那經舞袖垂微艶莫教輕委地徘徊猶似美人貽七言絶句増宋蕭海藻詠虞美人草魯公死後一坏荒誰與竿頭薦一觴妾願得生墳土上日翻舞袖向君王易幼學詠虞美人草霸業將衰漢業興佳人玉帳醉難醒可憐血染原頭草直至如今舞不停許野雪詠虞美人草合歡枝葉想腰身不共長安草木春若聽楚歌能楚舞未央空有戚夫人五言排律原明孫齊之題虞美人草君王誠慷慨為妾總銷魂伏劍酬君貺留花弔楚人風翻紅袖舞露泫翠睂顰呉㑹依春樹烏江伴渚蘋浮雲隨代變芳草逐年新空使英雄淚感慨欲沾巾詩散句原明孫齊之夜月空懸漢宫鏡幽姿猶帶楚雲妝詞增宋辛棄疾浪陶沙不肎過江東玉帳匆匆至今草木憶英雄唱著虞兮當日曲便舞春風兒女此情同往事朦朧湘娥竹上淚痕濃舜目重瞳堪最恨羽亦重瞳虞美人當年得意如芳草日日春風好拔山力盡忽悲歌飲罷虞兮從此奈君何人間不識精誠苦貪看青春舞驀然歛袵却無言怕是曲中猶帶楚歌聲無名氏虞美人歌唇乍啟塵飛處翠葉輕輕舉似呈舞態逞嬌容嫩條纖麗玉玲瓏怯秋風虞姬珠翠兵戈裏莫認埋魂地只因遺恨寄芳叢露和清淚濕輕紅古今同萱花原萱本作藼又通作諼蘐蕿萲一名忘憂説文云萱忘憂草也一名療愁述異記云呉中呼為療愁花一名宜男風土記云懷妊婦人佩其花則生男故名宜男増本草一名丹棘古今注云欲忘人之憂則贈之丹棘丹棘一名忘憂故也一名鹿劒一名妓女原苞生莖無附枝繁萼攢連葉四垂花初發如黄鵠嘴開則六出時有春花夏花秋花冬花四季色有黄白紅紫麝香重葉單葉數種與鹿葱相似惟黄如蜜色者清香増格物叢話一種名鳯頭者尤佳學圃餘疏一種小而絶黄者曰金臺原春食苖夏食花其穉芽花跗皆可食性冷能下氣不可多食彚考原博物志神農經曰中藥飬性謂合歡蠲忿萱草忘憂増清異錄孟昶時每臘日内官各獻羅體圏金花樹子梁守珍獻忘憂花縷金於花上曰獨立仙花經忘憂四品六命三栁軒雜識萱草花為歡客西溪叢語毛詩伯兮篇云焉得諼草言樹之背注云諼草令人忘憂背北堂也今人多用北堂萱堂於鰥居之人然伯之暫出未嘗死也但其花未嘗䨇開故有北堂之義説文藼萱蕿萲皆一字也令人忘憂通作諼據爾雅諼訓忘也因其忘故古用諼草字嵇康飬生論云合歡蠲忿萱草忘憂本草云利心志令人懽喜忘憂風土記云婦人有妊佩之生男子故謂之宜男草陸士衡詩云焉得忘歸草言樹背與襟忘歸之義未詳集藻頌原魏曹植宜男花頌草號宜男既煜且貞其貞伊何惟乾之嘉其煜伊何綠葉丹華光采晃曜配彼朝日君子躭樂好合琴瑟固作螽斯惟物孔臧福齊太姒永世克昌賦原晉夏侯湛忘憂草賦淑大邦之竒草兮應則百之休祥禀至貞之靈氣兮顯嘉名以自彰冠衆卉而挺生兮承木徳於少陽體柔性剛蕙潔蘭芳結纖根以立本分嘘靈渥於青雲順隂陽以滋茂兮笑含章之有文逺而望之燭若丹霞照青天近而觀之曄若芙蓉鑒綠泉萋萋翠葉灼灼朱華煒若珠玉之樹煥如景宿之羅充后妃之盛飾兮登紫微之内庭囘日月之暉光兮隨天運以虛盈傅𤣥宜男花賦猗猗令草生於中方花曰宜男號應禎祥逺而望之煥若三辰之麗天近而察之明若芙蓉之鑒泉於是姣童媛女以時來征結九秋之永思含春風以娯情增梁徐勉萱草花賦覽詩人之比興寄卉木以命辭惟平章之萱草欲忘憂而樹之爰有幽憂庭閑志靜髙木列其隂蘭芳糅其影翫叢蘤之爭芬悦羣根之競穎或開紅而散紫或􅀢蒀於上春信茲華之獨秀投金質於炎辰既耀色以祛痗亦含香而可均不待合歡之木無俟孫枝之筠同芰荷於闌暑及蟬露乎首旻其葉四垂其跗六出亦曰宜男加名斯吉華而不艶雅而不質隨晦明而舒卷與風霜而榮悴笑杜蘅與掲車何衆彚之能匹文散句原魏王朗與魏太子書惠書不遺慰沃奉讀歡笑以籍饑渇雖萱草忘憂臯蘇釋勞無以加也増應瑒報龎惠公書雖萱草在背臯蘇在側悒憤不逞祗以増毒梁元帝與劉智藏書鵠望還信以代萱蘇何遜為衡山侯與婦書始知萋萋萱草忘憂之言不實團團輕扇合歡之用為虚五言古詩原梁元帝宜男草可愛宜男草垂采映倡家何時如此葉結實復含花增北齊陽休之詠萱草開跗幽澗底散采曲堂垂優柔清露濕微穆惠風吹朝朝含麗景夜夜對華池隋魏澹詠堦前萱草綠草正含芳靃靡映前堂帶心花欲發依籠葉已長雲度時無影風來乍有香横得忘憂號余憂遂不忘唐韋應物對萱草何人樹萱草對此郡齋幽本是忘憂物今夕重生憂叢疎露始滴芳餘蝶尚留還思杜陵圃離披風雨秋宋司馬光萱草葉濯宿露翠花迎朝日黄昔誰封殖此儼列侍髙堂達士隠於吏孰為行與藏逍遙玩永日自無憂可忘明髙啟萱草不見堂上親空樹堂下草夏來風雨繁離披數叢老日暮欲忘憂搴芳轉傷抱五言律詩増唐陳子昻魏氏園亭人賦一物得秋亭萱草昔時幽徑裏榮耀雜春叢今來玉墀上銷歇畏秋風細葉猶含綠鮮花未吐紅忘憂誰見賞空此北堂中李嶠萱草屣歩尋芳草忘憂自結叢黄英開飬性綠葉正依籠色湛仙人露香傳少女風還依北堂下曹植動文雄李咸用萱草芳草比君子詩人情有由祗應憐雅態未必解忘憂積雨莎庭小微風蘚砌幽莫言開太晩猶勝菊花秋原宋黄庭堅萱草從來占北堂雨露借恩光與菊亂佳色共葵傾太陽人生真苦相物理忌孤芳不及空庭草榮衰可兩忘增金周昻萱草萬里黄萱好風烟接路傍迹疎雖異域心密竟中央染練成初色移瓶得細香客愁無路遣始為看花忘七言律詩増明髙啟萱草幽華獨殿衆芳紅臨砌亭亭發幾叢亂葉離披經宿雨纖莖窈窕擢薰風佳人作佩頻朝採倦蝶尋香幾處通最愛看來憂盡解不須更釀酒多功五言絶句増唐白居易酬夢得比萱草見贈杜康能散悶萱草解忘憂借問萱逢杜何如白見劉原聶夷中遊子吟萱草生堂堦遊子行天涯慈親倚堂門不見萱草花増宋朱子萱草春條擁深翠夏花明夕隂北堂罕悴物獨爾澹冲襟西窓萱草叢昔是何人種移向北堂前諸孫時繞弄王十朋萱草有客看萱草終身悔逺遊向人空自綠無復解忘憂原徐似道題萱草莫訝萱枝小能施宫様妝只緣渲染足絶似杜蘭香七言絶句增唐呉融忘憂花繁紅落盡始凄凉直道忘憂也未忘數朶殷紅似春在春愁特此繫人腸宋梅堯臣萱草人心與草不相同安有樹萱憂自釋若言憂及此能忘乃是人心為物易明李東陽饋萱邃菴太宰侑以一詩雨後宜男色更深采來新自玉堂隂紫葵紅藥標題徧可忍黄花獨苦心原黄省曾清萱到處碧鬖鬖興慶宫前色倍含借問皇家何種此太平天子要宜男詩散句原宋宋祁脩莖無附葉繁萼攢莛首每欲問詩人定得忘憂否劉敞種萱不種蘭自謂憂可忘綠葉何萋萋春愁更茫茫増蘇軾萱草雖微花孤秀能自拔亭亭亂葉中一一芳心插漢李陵願得萱草枝以解饑渇情宋謝惠連積憤成疚痗無萱將如何齊王融思君如萱草一見乃忘憂梁江淹消憂非萱草永懷寄夢寐唐李白忘憂或假草滿院羅叢萱原孟郊萱草兒女花不解壯士憂宋宋祁膩蘤金英撲纖莛玉股抽晏殊若教花有語却解使人愁増石延年移萱樹之背丹霞間縹色蘇轍萱草朝始開谺然黄鵠觜朱喬年穠花夫豈少愛此入風雅陸游根蘇萱出土冰斷水生紋程俱堂萱不吾負芽甲破春雪原唐于鵠胸前空帶宜男草嫁得蕭郎愛逺遊温庭筠宜男漫作後庭草不似櫻桃結子紅増宋陸游簾外微風斜燕影池邊殘照歛萱房唐張九齡萱草憂可樹原李白忘憂當樹萱温庭筠萱草含丹粉増李商隱忘憂碧葉齊杜牧睂㸃萱芽嫩元張昱染裙萱草纔抽綠别錄原種植雨中分勾萌種之初宜稀一年後自然稠密或云用根向上葉向下種之則出苖最盛夏萱固繁秋萱亦不可無葢秋色甚少此品亦庶幾可壯秋色耳宋氏種植書萱有三種單瓣者可食千瓣者食之殺人惟色如蜜者香清葉嫩可充髙齋清供又可作蔬食不可不多種也製用採花作葅甚利胸膈採花入梅醬砂糖可作美菜鮮者積久成多可和雞肉其味勝黄花菜彼則山萱故也増本草東人採萱花跗乾而貨之名為黄花菜野菜箋鹽三分糖霜一錢蔴油半盞和起作拌菜料頭或加搗薑些少又是一製凡花菜採來洗淨滚湯焯起速入水漂一時然後取起搾乾拌料供食其色青翠不變如生且又脆嫩不爛更多風味家菜亦如此法他若炙煿作虀不在此製附錄鹿葱原鹿葱色頗類萱但無香爾鹿喜食之故以命名然葉與花莖皆各自一種萱葉綠而尖長鹿葱葉團而翠綠萱葉與花同茂鹿葱葉枯死而後花萱一莖實心而花五六朶節開鹿葱一莖虚心而花五六朶並開於頂萱六瓣而光鹿葱七八瓣本草注萱云即今之鹿葱誤按嵇含宜男花序云荆楚之土號為鹿葱根苖可以薦于俎世人欲求男者服之尤良也則古人亦以鹿葱為萱花葢一類而二種也集藻五言古詩増梁沈約詠鹿葱野馬不任騎兎絲不任織既非中野花無堪麕䴥食附錄水葱増南方草木狀水葱花葉皆如鹿葱花色有紅黄紫三種出始興婦人懷妊佩其花生男者即此花非鹿葱也交廣人佩之極有驗然其土多男不厭女子故不常佩也按此説又與風土記嵇含序不同未知孰是本草謂亦萱草之類是也蜀葵原與葵菜混合為一今正之原蜀葵一名戎爾雅云菺戎葵注云今蜀葵也似葵花如木槿華疏云戎蜀葢其所自也因以名之一名呉葵爾雅翼作胡葵一名一丈紅草木記云浙中人種葵俗名一丈紅有五色増本草處處人家植之春初種子冬月宿根苖嫩時亦可茹食葉似葵菜而大莖髙五六尺其實大如指頂皮薄而扁内仁如馬兜鈴原肥地勤灌可變至五六十種色有深紅淺紅紫白墨紫深淺桃紅茄子藍數色學圃餘疏云黒者如墨藍者如靛形有千瓣五心重臺重葉單葉翦絨鋸口細瓣圓瓣重瓣數種五月繁華莫過於此庭中籬下無所不宜莖有紫白二種白者為勝増花木記洛陽有翦稜蜀葵九心蜀葵彚考増杜陽雜編處士伊祁元為上種六合葵於殿前色紅而葉類於戎葵始生六莖其上合為一株共生十二葉内出二十四花花如桃花而一朶千葉一葉六影其成實如相思子上自采餌之頗覺神驗鐵圍山叢談王晉卿家舊寳徐處士碧檻蜀葵圖但二幅晉卿每歎闕其半也徽廟一旦訪得之乃從晉卿借半圖晉卿惟命但謂端邸愛而欲得其秘爾徽廟命匠者褾軸成全圖招晉卿以觀因卷以贈一時盛傳人人悚異厥後禁中謂之就日圖者是也花經胡葵九品一命缾花譜千葉戎葵八品二命西墅雜記成化甲午倭人入貢見欄前蜀葵花不識因問之題詩云花如木槿花相似葉比芙蓉葉一般五尺欄杆遮不盡尚留一半與人看外國亦有此能詩者集藻贊増宋顔延之蜀葵贊井維降精岷絡升靈物微氣麗卉草之英渝艶衆葩冠冕羣英䫫麻能直方葵不傾賦増梁王筠蜀葵花賦惟兹竒草遷花西道凌金坂之威夷跨玉津之浩浩值油雲之廣臨屬光風之長掃仰椒屋而敷榮值蘭房而振藻邁衆芳而秀出冠雜卉而當闈既扶疏而雲蔓亦灼爍而星微布濩交加蓊茸紛葩疎莖密葉翠萼丹華原陳虞繁蜀葵賦惟茲珍草懷芬吐榮挺河渭之膏壤吸昴井之𤣥精繞銅爵而疏植映昆明而羅生作妙觀於神州扇令名於東京馳驛命而逺致攢華林而麗庭申脩翹之冉冉播圓葉之青青五言古詩増唐岑參蜀葵花歌昨日一花開今日一花開今日花正好昨日花已老人生不得長少年莫惜牀頭沽酒錢請君有錢向酒家君不見蜀葵花原宋司馬光蜀葵白若繪初斷紅如顔欲酡坐令仙駕嚴幢節紛駢羅物性有常妍人情輕所多菖蒲儻日秀棄擲不吾過明髙啟葵花豔發朱光裏叢依綠䕃邊夕同山蕣落午並海榴燃幽馥流珍簟鮮輝照藻筵羣芳已謝賞孤植轉成憐七言古詩増宋謝翺種葵葡萄下戎葵花種葡萄下年年葉長見花謝葡萄漸密花漸遲開時及見葡萄垂微風搖曵架上枝隂雲凝碧行琉璃天人下飲葡萄露花神夜泣向天訴謝爾葡萄數尺隂不如寸草同此心五言律詩増唐武元衡宜陽所居白蜀葵荅詠柬諸公冉冉衆芳歇亭亭虚室前敷榮時已背幽賞地宜偏紅艶世方重素花徒可憐何當君子願知不競暄妍徐夤蜀葵劒門南面樹移向㑹仙亭錦水饒花艶岷山帶葉青文君慚婉娩神女讓娉婷爛熳紅兼紫飄香入繡扄原宋韓琦蜀葵炎天花盡歇錦繡獨成林不入當時眼其如向日心寳釵知見棄幽蝶或來尋誰許清風下芳醪對一斟七言律詩増元許衡繼人葵花韻戎葵花色耀深濃偏稱脩叢映短叢絳臉有情爭向日錦苞無語細含風舒開九夏天真秀壓倒千年畵史工但恨主人貧且窶不教相對舞衣紅五言絶句増明髙啟白葵花素彩發庭隂凉滋玉露深誰憐白衣者亦有向陽心陸師道蜀葵向日層層折深紅間淺紅無心駐車馬開落任薰風七言絶句増唐陳陶蜀葵詠綠衣宛地紅倡倡薰風似舞諸女郎南隣蕩子婦亡賴錦機春夜成文章陳標蜀葵眼前無奈蜀葵何淺紫深紅數百窠能共牡丹爭幾許得人輕處祗緣多原宋楊巽齋蜀葵紅白青黄弄淺深旌分幢列自成隂但疑承露矜殊色誰識傾陽無二心増金祝簡雜詩榴花嬌欲鬭羅裙石竹開成碎纈文更有戎葵亦堪愛日烘紅臉酒初醺明李東陽蜀葵羞學紅妝媚晩霞祗將忠赤報天家縱教雨黑天隂夜不是南枝不放花别錄原種植實大如指頂皮薄而扁子如蕪荑仁輕虚易種收子以多為貴八九月間鋤地下種冬有雪輙耮之勿令飛去使地保澤無蟲災至春初删其細小餘留在地頻澆水勿缺肥當有變異色者發生滿庭花開最久至七月中尚蕃大風雨後即宜扶起壅根少遲其頭便曲不堪觀矣尋千葉者四五種墻籬向陽處間色種之幹長而直花艶而久勝種鸎粟十倍製用插缾用沸湯以紙塞口則不萎或以石灰蘸過令乾方插花開至頂葉仍如舊鳯仙芙蓉插法同葵花可收乾入香炭塹内引火耐燒葉可收染紙色所謂葵箋是也錦葵原錦葵一名荍爾雅云荍蚍衃注云今荆葵也似葵紫色疏云小草多花少葉葉又翹起一名芘芣詩傳云荍芘芣也叢低葉微厚花如小錢文彩可觀又名錢葵色深紅淺紅淡紫皆單葉開亦耐久詩陳風視爾如荍即此種同蜀葵天葵原天葵一名莃一名莵葵爾雅云莃莵葵葉如錢而厚嫩面青背微紫本草一名雷丸草冦宗奭曰綠葉如黄蜀葵其花似拒霜其形至小如初開單葉蜀葵有檀心色如牡丹姚黄其葉則蜀葵也彚考増岣嶁神書紫背天葵出蜀中靈草也生於水際取自然汁煑汞則堅本草凡丹石之類得此而後能神雷公炮炙論云如要形堅豈忘紫背謂其能堅鈆也附錄旌節花原旌節花髙四五尺花小類茄花俗譌錦茄兒花節節對生紅紫如錦増益部方物畧記脩脩華碧皆層層而擢正類使所持節然故以名見益州圖經彚考増花史唐王處囘家居有道士以花種貽之曰此仙家旌節花也後處囘歴二鎮丹鉛總錄太平廣記引黎州圖經云黎州漢源縣琉璃城有旌節花去地二三尺行行皆如旌節蘇子由詩綠竹琅玕色紅葵旌節花借喻葵形非謂旌節即葵也集藻贊増宋宋祁旌節花擢條亭亭層層紫丹狀若使節方圖實刋五言絶句増宋陸游旌節葵旌節庭下葵鼔吹池中蛙坐令灌園公忽作富貴家詩散句増宋洪咨䕫槍旗漫摘社前雨旌節旋移春後花附錄西番葵原西番葵莖如竹髙丈餘葉似蜀葵而大花托圓二三尺如蓮房而扁花黄色子如萆蔴子而扁孕婦忌經其下能墮胎御定佩文齋廣羣芳譜卷四十六
