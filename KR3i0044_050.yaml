秋色徑可三寸厚半之開最久瓣葉枝幹皆與白西施同初開時數朶淡紅數朶淡黄逈然不類半開時五彩寶色炫爛奪目開徹則皆淡桃紅色矣二色楊妃一名二喬一名金菊對芙蓉多瓣淺紅淡黄二色䨇出如金銀花徑僅二寸其萼黄其瓣如兎耳其葉綠而不澤厚而尖皺而瓦赤金盤一名脂暈黄一名琥珀杯其花初開紅黄而赤金星浮動其後漸作醬色徑可二寸形薄而瓦瓣如杓而尖葉稀綠而澤其末團枝幹紫紅順直而扶疎高可一丈錦丁香花畧似紅翦絨大寸許瓣疎初開黄而紅後紅而黄色易衰葉緑厚而短尖而長檀香菊一名小檀香葉幹似檀香毬花亦相似梅花菊一名試梅菊一名銀丁香一名試梅妝一名壽陽妝一名銀梅每花不過數瓣瓣大如指頂每瓣卷皺密蹙下截深黄上截瑩白重臺彷彿水仙花下垂成穟如梅花清逸開早香甚葉綠大而皺尖而長其亞深葉根多冗其枝幹柔細而扶疎髙可一丈或以為茉莉菊甚謬海棠菊一名錦菊一名海棠春一名海棠嬌一名海棠紅一名小桃紅一名鐵幹紅色類垂絲海棠徑寸有半形薄而瓦瓣短多紋而尖愈開愈竒有寶色中暈赤外暈黄邊暈純白或數色錯出變態不窮葉綠而澤厚而小亞深其枝幹勁直扶疎髙可四五尺蜜西施蜜色千瓣蜜鶴翎蜜色千瓣與金鶴翎埒以為蜜繡毬非是蜜繡毬一名金翅毬一名金鳳團一名蜜西牡丹花蜜色瑩潤徑二寸餘氣香瓣舒開遲其殘也紅而麗葉青而稠大而尖亞深葉根冗枝幹偃蹇髙可四五尺紫絨毬一名紫絲毬一名紫蘇桃蓓蕾圓而綠如小龍眼大其開也碧綠紅紫黄白諸色間雜而紫燄為多瓣細而鑲四面參差茸茸如翦徑僅寸許圓如毬葉類朝天紫小而青尖亞似少葉根清淨枝幹細直而勁髙可四五尺僧衣褐一名緇衣菊深栩子色小刺蝟菊一名栗葉花如兎毛朶團瓣如蝟之刺大如雞卵葉長而尖枝幹勁挺高可三四尺以上異品增劉蒙泉菊譜銀臺深黄萬銀鈴葉有五出而下有䨇紋白葉開之初疑與龍腦菊一種但花形差大且不甚香耳俗謂龍腦菊為小銀臺葢以相似故也枝幹纖柔葉青黄而麤疎近出洛陽水北小民家未多見也范成大菊譜藤菊花密條柔以長如藤蔓可編作屏障亦名棚菊種之坡上則垂下裊數尺如纓絡尤宜池潭之瀕史正志菊譜密友花頭大過折三明黄濶片花瓣形色不在諸品之下初開時長短不齊開極其盛乃齊至于六層其中如抽芽數條短短小心與瓣為一色狀如春間黄密友花窠枝低矮綠葉最繁密見霜則周圍綠葉變紫色沈兢菊譜諸州及禁苑品類有樝子菊花小色黄香如樝子泰州黄黄素馨白素馨蹙線菊鐵脚黄鈴黑葉兒團圓菊柳條菊枝亭菊枝梗甚長用杖子撐之即籬菊一丈黄碧蟬菊青色鈸兒菊一種紫梗開早一種青梗開晩潛山朱新仲菊坡有玉盤盂與金鈴菊相似枇杷菊葉似枇杷花似金盞銀臺而極大却不甚香舒州有蜂兒菊鵝黄色水晶菊花面甚大色白而透明潛江有鋪茸菊色綠其花甚大光如茸二月間開臨安有長沙菊滿堂金壽安真珠俱黄色孩兒白婺州有銷金紫菊紫瓣黄沿銷銀黄菊黄瓣白沿乾紅菊花瓣乾紅四沿黄色即是銷金菊三種乃佛頭菊種也浙有荷菊日開一瓣開足成荷花形衆菊未開不開衆菊已謝不謝金陵有松菊枝葉勁細如松其花如碎金層出于密葉之上史鑄越中菊譜凌風菊黄色見山谷詩柑子菊黄色見后山詩楊妃裙黄色見徐仲車詩蠟梅菊見聞人善言菊卿公暇集周師厚洛陽菊譜紫幹子五色菊黄簇菊柿葉菊青心菊葉紅菊黄窠廷子探白子紅香菊釵頭菊川金菊深色單葉川翦金按原譜雜採劉范沈史諸譜以色分類間有遺逸續錄于此彚考原禮記月令季秋之月菊有黄華唐書李適傳凡天子饗㑹遊豫惟宰相及學士得從秋登慈恩寺浮圖獻菊花酒稱壽增山海經女几之山其草多菊原列仙傳文賔取嫗數十年輙棄之後嫗老年九十餘復見賔年更壯拜泣至正月朝㑹鄉亭西社中賔教令服菊花地膚桑上寄生松子以益氣嫗亦更壯復百餘歲西京雜記戚夫人侍兒賈佩蘭後出為扶風人段儒妻說在宮時九月九日佩茱茰食蓬餌飲菊花酒令人長壽菊華舒時并採莖葉雜黍米釀之至來年九月九日始熟就飲焉故謂之菊花酒神仙傳康風子服甘菊花桐實後得仙神鏡記滎陽郡西有靈源山巖有紫菊荆州記縣北八里有菊水其源旁悉芳菊水極甘馨又中有三十家不復穿井即飲此水上壽百二十三十中壽百餘七十者猶以為夭漢司空王暢太傅袁隗為南陽縣令月送三十餘石飲食澡浴悉用之太尉胡廣久患風羸恒汲飲此水疾遂瘳此菊莖短葩大食之甘美異於餘菊廣又收其實種之京師遂處處傳植之風土記日精治蘠皆菊之花莖别名也生依水邊其花煌煌霜降之節惟此草盛茂九月律中無射俗尚九日候時之草也增拾遺記背明國有紫菊謂之日精一莖一蔓延及數畝味甘食者至老不饑渴原續晉陽秋陶潛九月九日無酒坐宅邊菊叢中採摘盈把望見白衣人至乃王𢎞送酒即便就酌續齊諧記汝南桓景從費長房遊學長房謂之曰九月九日汝南當有大災厄急令家人縫絳囊盛茱茰繫臂上登山飲菊花酒此禍可消景從其言舉家登山夕還雞犬俱暴死長房聞之曰此可代也名山記朱孺子吳末入玉笥山服菊花乗雲升天增歲華紀麗露凝白玉菊散黄金註秋日詩露凝千片玉菊散一叢金又云菊散金風起荷疎玉露圓原輦下歲時記九月宫掖間爭插菊花民俗尤甚增清異錄懿宗賞花歌云長生白久視黄共拜金剛不壞王原九域志鄧州南陽郡土貢白菊三十斤越州圖經菊山在蕭山縣西三里多甘菊歲時雜記盧公範重陽日上五色糕菊花枝茱茰樹茱茰為辟邪翁菊花為延壽客故九日假此二物以消陽九之厄東坡雜記菊黄中之色香味和正花葉根實皆長生藥也北方隨秋之早晩大畧至菊有黄華乃開獨嶺南不然至冬乃盛發嶺南地暖百卉造作無時而菊獨後開考其理菊性介烈不與百卉並盛衰須霜降乃發而嶺南常以冬至微霜故也其天姿髙潔如此宜其通仙靈也增東坡雜記夏小正以物為節如王𤓰苦菜之類驗之畧不差而菊有黄華尤不失毫釐近時都下菊品至多皆人以他草接成不復與時節相應始八月盡十月菊不絶於市亦可怪也李彦平雜錄韓魏公在北門有詩云不羞老圃秋容淡且看黄花晩節香識者知其晩節之髙原東京夢華錄重九都下賞菊菊有數種有黄白色蕊若房曰萬鈴菊粉紅色曰桃紅菊白而檀心曰木香菊黄色而圓曰金鈴菊純白而大曰喜容菊無處無之酒家皆以菊花縛成洞户牧䜿閒談蜀人多種菊以苖可入菜花可入藥園圃悉植之郊野人多採野菊供藥肆頗有大悞真菊延齡野菊㵼人遯齋閒覽南方花較北地常先一月獨菊花開最遲菊性宜冷也東坡嘗言嶺南氣候不常吾謂菊花開時即重陽故在海南藝菊九畹後至冬半始開廼以十一月望日與客泛酒作重九㑹云增西溪叢語楚辭云夕餐秋菊之落英王逸云英華也類篇云英草榮而無實者後漢馮衍賦云食玉芝之茂英言英華之英洪興祖補註楚辭云秋花無自落者讀如我落其實而取其材之落此言為是今秋花亦有落者但菊蕊不落耳若云黄菊飄零滿地金即詩用楚辭之句且宋書符瑞志沈約云英葉也言食秋菊之葉據神農本草菊服之輕身耐老三月採葉玉函方王子喬變白增年方甘菊三月上寅採名曰玉英是英謂之葉晉許詢詩云青松凝素體秋菊落芳英老學庵筆記菊花色雖多種黄者為正月令他卉皆曰始華於菊獨曰菊有黄花正其驗矣種法有九要一曰養胎二曰傳種三曰扶植四曰修葺五曰培䕶六曰幻弄七曰土宜八曰澆灌九曰除害能如此法便堪為松菊主人不減淵明矣三餘贅筆曾端伯以菊花為佳友張敏叔以菊為壽客花經菊四品六命乾淳歲時記都人九月九日飲新酒泛茰簮菊且以菊糕為餽吳興園林記趙氏菊坡園前面大溪為循堤畫橋蓉柳夾岸數百株中島植菊至百種為菊坡原沈競菊譜臨安西馬城園每歲至重陽謂之鬭花各出竒異有八十餘種東平府有溪堂為郡人遊賞之地溪流石崖間至秋州人泛舟溪中採石崖之菊以飲每歲必得一二種新異花増澄懐錄終南五老洞碑記墨菊其色如墨古用其汁以書字原學圃餘疏菊至江隂上海吾州而變態極矣有長丈許者有大如盌者有作異色二色者而皆名麤種其最貴乃各色翦絨各色幢各色西施各色狼牙乃謂之細種種之最難須得地得人燥濕以時蟲蠧日去花須少而大葉須密而鮮不爾便非上乗元馭閣老尤愛種菊京師有一種大紅曰麻葉紅相袍紅元馭為翰林時特命囊之馬首歸今吾地尚有此種然開不能大佳想亦地氣使然菊中有黄白報君知最先開甘菊可作湯寒菊可入冬皆賤種也而皆不可廢又有一種五六月開亦異種也增懸笥瑣探范文穆公至能作菊譜言月令以動植志氣候如桃桐軰直云始華而菊獨云菊有黄華豈以其正色獨立不伍衆草變詞而言之歟予始甚疑之信如譜中所載其色已不勝其多而月令獨云菊有黄華何也及來河南行熊耳錦屏𢎞農崤函諸山正秋草木俱衰謝盡山上下暨水厓籬落皆黄菊大如錢叢生粲然乃悟河南為中州得風氣之正黄為正色而正秋時著花隨地皆有此月令紀候所以獨言之也然則如譜中所載諸品得無人智力變幻所致歟則其見述於月令宜矣缾花譜各色細葉菊一品九命瓶史浴菊宜好古而竒者菊以黄白山茶秋海棠為婢原梧潯雜佩陸公平泉初入史館偶與同館諸公以事謁分宜衆皆競前呈身遂至喧擠公獨逡廵却歩時分宜庭中盛陳盆菊公徐謂曰諸君且從容莫擠壊陶淵明也聞者心媿花史王龜齡十朋取莊園卉目為十八香以菊為冷香吳致堯九疑考古云舂陵舊無菊自元次山始植沈譜云次山作菊圃記云在藥品為良藥為蔬菜是佳蔬本草與千金方皆言菊花有子魏鍾㑹菊花賦有方實離離之言馬伯州菊譜有金箭頭菊花長而末銳枝葉可茹最愈頭風謂之風藥菊冬收而春種之據此二說則菊之為花果有結子者陶隱居與藏器皆言白菊療疾有功本草圖經言今服餌家多用白者抱朴子有言丹法用白菊汁紫菊之名見于孫真人種花法又見于諸譜中此品傳植已久故唐宋詩人稱述亦多蕭穎士菊榮篇紫英黄萼照耀丹墀杜荀鶴詩雨勻紫菊藂藂色趙嘏詩紫艶半開籬菊静夏英公詩落盡西風紫菊花韓忠獻公詩紫菊披香碎曉霞則紫花定是佳品屈原離騷經朝飲木蘭之墜露兮夕餐秋菊之落英王逸註云言旦飲香木之墜露吸正陽之精液暮食芳菊之落華吞正隂之精蕊御定佩文齋廣羣芳譜卷四十八
