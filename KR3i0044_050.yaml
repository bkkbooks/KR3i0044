body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷四十八花譜菊花一原菊一名治蘠一名日精一名節花一名傅公一名周盈一名延年一名更生一名隂成一名朱嬴一名帝女花增本草菊一名女節一名女莖一名金莖蘇頌曰白菊潁人呼為回峯菊汝南名荼苦蒿上黨及建安郡順政郡並名羊歡草河内名地薇蒿原埤雅云菊本作蘜從鞠窮也花事至此而窮盡也宿根在土逐年生芽莖有稜嫩時柔老則硬髙有至丈餘者葉綠形如木槿而大尖長而香花有千葉單葉有心無心有子無子黄白紅紫粉紅間色淺深大小之殊味有甘苦之辨大要以黄為上白次之性喜隂惡水種須髙地初秋烈日尤其所畏本草及千金方皆言菊有子將花之乾者令近濕土不必埋入土明年自有萌芽則有子之驗也味苦甘平無毒昔有謂其能除風熱益肝補隂蓋不知其得金水之精英能益金水二臟也補水所以制火益金所以平木木平則風息火降則熱除用治諸風頭目其旨深微黄者入金水隂分白者入金水陽分紅者行婦人血分皆可入藥久服令人長生明目治頭風安腸胃去目翳除胸中煩熱四肢遊氣久服輕身延年或用之而無効者不得真菊耳增本草陶𢎞景曰菊有兩種一種紫莖黄色氣香味甘為真菊一種青莖而大作蒿艾氣味苦者名苦薏非真菊也葉正相似以甘苦别之又有白菊莖葉都相似惟花白五月取之吳瑞曰花大而香者為甘菊花小而黄者為黄菊花小而氣惡者為野菊李時珍曰無子者謂之牡菊原其類有甘菊一名真菊一名家菊一名茶菊花正黄小如指頂外尖瓣内細蕚柄細而長味甘而辛氣香而烈葉似小金鈴而尖更多亞淺氣味似薄荷枝幹嫩則青老則紫實如葶藶而細種之亦生苖人家種以供蔬茹凡菊葉皆深綠而厚味極苦或有毛惟此葉淡綠柔瑩味微甘咀嚼香味俱勝擷以作羮及泛茶極有風致都勝一名勝金黄一名大金黄一名添色喜容蓓蕾殷紅瓣濶而短花瓣大者皆有䨇畫直紋内外大小重疊相次面黄背紅開時黄暈漸大紅暈漸小突起如傘頂葉綠皺而尖其亞深瘦則如指肥則如掌莖紫而細勁直如鐵瘦矬肥則髙可至六七尺葉常不壞小花中之極美者也九月末開出陳州御愛出京師開以九月末一名笑靨一名喜容淡黄千葉花如小錢大葉有䨇紋齊短而濶葉端皆有兩缺内外鱗次上二三層花色鮮明下層淺色帶微白心十餘縷色明黄葉比諸菊最小而青每葉不過如指面大或云出禁中因得名金芍藥一名金寶相一名賽金蓮一名金牡丹一名金骨朶蓓蕾黄紅花金光愈開愈黄徑可三寸厚稱之氣香瓣濶葉緑而澤稀而弓長而大亞深枝幹順直而扶疎髙可六七尺菊中極品黄鶴翎蓓蕾朱紅如泥金瓣面紅背黄開則外暈黄而中暈紅葉青弓而稀大而長多尖如刺枝幹紫黑勁直如鐵髙可七八尺韻度超脫菊中之仙品也蜜鶴翎久不可見白者次之粉者又次之紫者為下木香菊多葉畧似御衣黄初開淺鵝黄久則淡白花葉尖薄盛開則微卷芳氣最烈一名腦子菊大金黄花頭大如折三錢心瓣黄皆一色其瓣五六層花片亦大一枝之杪多獨生一花枝上更無從蕊綠葉亦大其梗濃紫色小金黄一名明州黄一名疊金黄花頭大如折二錢心瓣黄皆一色開未多日其瓣鱗鱗六層而細態度秀麗經多日則面上短瓣亦長至于整整而齊不止六層葢為狀先後不同也如此狀如笑靨花有富貴氣開早勝金黄花頭大過折二錢明黄瓣青黄心瓣有五六層花片比大金黄差小上有細脉枝杪凡三四花一枝之中有少從蕊顔色鮮明玩之快人心目但條梗纖弱難得團簇作大本須留意扶植乃成黄羅繖花深黄徑可二寸體薄中有頂瓣紋似羅下垂如傘柄長而勁葉綠而稀厚而長亞深枝幹細直勁如鐵高可六七尺報君知一名九日黄一名早黄一名蟹𤓰黄花黄赤而有寶色開于霜降前久而愈艶徑二寸有半氣香瓣末稍岐有尖突起葉青而稀長而大亞深莖紫枝幹勁挺髙可八九尺金鎖口一名黄錦鱗一名錦鱗菊瓣葉莖幹頗類黄鶴翎開亦同時體厚瑩潤絶類西施瓣背深紅面正黄瓣展則外暈黄而内暈紅既徹則一黄菊耳徑可二寸有半沈譜曰深紅千瓣週邊黄色半開時紅黄相雜如錦銀鎖口花初黄後淡週邊白色如銀半開時黄白相雜可愛上二花可為絶品非其他小巧者可比鴛鴦錦一名四面佛一名鸞交鳳友一名孔雀尾初作蓓蕾時每一蔕即迸成三四亦有至五六者其瓣面重黄而背重紅開時奇怪一分為三截下截皆黄中截則紅其頂又紅四面支撑紅黄交雜如錦開徹四面盡露紅背盡隱厚徑二寸餘上尖髙二寸如樓臺氣香葉黑綠澤皺而瓦有稜角其尖最多亞甚深葉根多冗莖紫枝幹勁挺髙可四五尺御袍黄一名瓊英黄一名紫梗御袍黄一名柘袍黄一名大御袍黄花如小錢大初開中赤既開瑩黄徑三寸半瓣濶開早瓣末如有細毛開最久殘則紅葉綠稀而長厚而大亞深葉根青淨莖葉枝幹扶疎髙可一丈狀類御愛但心有大小之分青梗御袍黄一名御衣黄一名淺色御袍黄朶瓣葉幹俱類小御袍黄但瓣疎而莖清耳范譜曰千瓣初開深鵝黄而差疎瘦久則變白側金盞此品類大金黄其大過之有及一寸八分者瓣有四層皆整齊花片亦濶大明黄色深黄心一枝之杪獨生一花枝中更無從蕊名以側金盞者以其花大而重欹側而生也葉綠而大梗淡紫狀元黄一名小金蓮其花焦黄燄燄始終一色瓣疎細而茸作饅頭之形徑二寸許蕚深綠開甚早氣香葉綠而大長而瓦厚而綿似金芍藥而尖葉根清淨莖淡紅枝幹順直扶疎髙七八尺翦金毬一名翦金黄一名金鳳毛一名金樓子一名密翦毬其色瑩黄瓣末細碎如翦頂突有細萼相雜茸茸氣香其殘也紅葉青而綠皺而稠肥而厚濶而短亞深葉根冗甚枝幹勁挺髙可五六尺黄繡毬一名金繡毬一名黄羅衫一名木犀毬一名金毬花深黄葉色稍淡而髙大晩黄毬深黄千瓣開極大十采毬黄千瓣如毬大金毬金黄千瓣瓣反成毬小金毬一名毬子菊一名毬子黄一名金纓菊一名金彈子深黄千瓣中邊一色花較小突起如毬毬子開以九月中深黄千葉尖細重疊皆有倫理一枝之杪叢生百餘花若小毬諸菊黄花最小無過此者然枝青葉碧花色鮮明相映尤好金鈴菊花頭甚小如鈴之圓深黄一色其幹之長與人等或言有髙近一丈者可以上架亦可蟠結為塔故又名塔子菊一枝之上花與葉層層相間有之不獨生于枝頭綠葉尖長七出凡菊葉多五出金萬鈴開以九月末深黄千葉菊以黄為正鈴以金為質是菊正黄色而葉有鐸形則于名寶兩無愧也菊有花密枝偏䨇心貌長者謂之鞍子菊與此花一種特以地脉肥瘠使之然爾又有大黄鈴大金鈴蜂鈴之類或形色不正較之此花大非倫比小金鈴一名饅頭菊花似大金鈴而小外單瓣中筒瓣葉似甘菊而厚大開以十月夏金鈴出西京開以六月深黄千葉與金萬鈴相類而花頭瘦小不甚鮮茂以生非其時故也秋金鈴出西京開以九月中深黄䨇紋重葉花中細蕊皆出小鈴其萼亦如鈴葉但此花葉短廣而青有如蜂鈴狀初出時京師戚里相傳以為愛翫蜂鈴開以九月中千葉深黄花形圓小而中有鈴葉擁聚蜂起細視若有蜂窠之狀大抵似金萬鈴獨以花形差小而尖又有細蕊出鈴葉中以此别爾大金鈴開以九月末深黄有鈴者皆如鐸之形而此花之中實皆五出細花下有大葉承之每葉有䨇紋枝與常菊相似葉大而疎一枝不過十數葉俗名大金鈴以花形似秋萬鈴耳千葉小金錢畧似明州黄花葉中外疊疊整齊心甚大單葉小金錢花心尤大開最早重陽前已爛熳小金錢開早大于小錢明黄瓣深黄心其瓣齊齊三層花瓣展其心則舒而為筩大金錢開遲大僅及折二錢心瓣明黄一色其瓣五層此花不獨生于枝頭乃與葉層層相問而生香色與態度皆勝金錢出西京開以九月末深黄䨇紋重葉似大金菊而花形圓齊頗類滴滴金人未有識者或以為棣棠菊或以為大金鈴但以花葉辨之乃可見荔枝菊花頭大于小錢明黄細瓣層層鱗次不齊中央無心鬚乃簇簇未展小葉至開遍凡十餘層其形頗圓故名荔枝菊香清甚姚江士友云其花黄狀似楊梅金荔枝一名荔枝黄花金黄徑二寸餘厚半之瓣短而尖開遲葉青而稠大而尖其亞淺髙可三四尺荔枝紅一名紅荔枝紅黄千瓣棣棠出西京開以九月末䨇紋多葉自中至外長短相次如千葉棣棠狀凡黄菊類多小花如都勝御愛雖稍大而色皆淺黄其最大者若大金鈴菊則又單葉淺薄無甚佳處惟此花深黄多葉大于諸菊而又枝葉甚青一枝叢生至十餘朶花葉相映顔色鮮好甚可愛也金䭔子花比甘菊差大纖穠酷似棣棠色艶如赤金他花色皆不及葢奇品也葉亦似窠株不甚髙金陵最多開早九煉金一名滲金黄一名銷金菊花似棣棠菊而稍大瓣似荔枝菊而稍禿開于九月前外暈金黄中暈焦黄葉綠狹而尖亞深葉根多冗莖紫而細勁直如鐵髙可一丈黄二色九月末開鵝黄䨇紋多葉一花之間自有深淡兩色然此花甚類薔薇菊惟形差小又近蕊多有亂葉不然亦不辨其異種也橙菊花瓣與諸菊絶異黄色不甚深其瓣成筩排竪生于萼上後乃開作小片婉孌至于成團衆瓣之下又有綂裙一層承之亦猶橙皮之外包也其中無心小御袍黄一名深色御袍黄花全似御袍黄瓣稍細開頗遲心起突色如深鵝黄菊瘦有心不突黄萬卷一名金盤橙其色金黄徑二寸有半厚三之二其外夾瓣其中筩瓣開遲葉青而稠大而瓦其末團其亞深葉根多冗枝幹偃蹇而麤大髙五六尺鄧州黄開以九月末單葉䨇紋深于鵝黄而淺于鬱金中有細葉出鈴萼上形様甚似鄧州白但差小耳按陶隱居云南陽酈縣有黄菊而白者以五月採今人間相傳多以白菊為貴又採以九月頗與古說相異惟黄菊味甘氣香枝幹葉形全類白菊疑𢎞景所說即此金絲菊花頭大過折二錢深黄細瓣凡五層一簇黄心甚小與瓣一色顔色可愛名為金絲者以其花瓣顯然起紋綹也十月方開此花根荄極壯垂絲菊花蕊深黄莖極柔細隨風動搖如垂絲海棠錦牡丹花之紅黄赤黄者多以錦名花之豐碩而矬者多以牡丹名或又名秋牡丹檀香毬色老黄形團瓣圓厚開徹整齊徑幾三寸厚三之二氣香葉幹短蹙麝香黄花心豐腴旁短葉密承之格極髙勝亦有白者大畧似白佛頂而勝之逺甚吳中比年始有黄寒菊花頭大如小錢心瓣皆深黄色瓣有五層甚細開至多日心與瓣并而為一不止五層重數甚多聳突而髙其香與態度皆可愛狀類金鈴菊差大耳薔薇九月末開深黄䨇紋單葉有黄細蕊出小鈴萼中枝幹差細葉有支股而圓又薔薇有紅黄千葉單葉兩種而單葉者差尖人間謂之野薔薇葢以單葉爾鵝毛一名鵝兒黄開以九月淡黄纖如細毛生于花萼上凡菊大率花心皆細葉如下有大葉承之則謂之杔葉今鵝毛花自内至外葉皆一等但長短上下有次爾花形小于萬鈴亦近年花也金孔雀一名金褥菊蓓蕾甚巨初開金黄既開赤黄徑三寸半厚稱之其氣不佳瓣尖而下垂隨開隨悴葉青而濁長大而皺其亞深根冗甚枝幹偃蹇而麤大髙可一丈黄五九菊花鵝黄色外尖瓣一層中瓣茸茸然徑僅如錢夏秋二度開葉青而稠長而多尖其亞深葉根有冗枝幹細而高僅二三尺九日黄大如小錢黄瓣黄心心帶微青瓣有三層狀類小金錢但此花開在金錢之前也開時或有不甚盛者惟地土得宜方盛綠葉甚小枝梗細瘦殿秋黄一名黄芙蓉一名金芙蓉一名近秋黄一名晩節黄一名大蠟瓣花蜜蠟色徑二寸有半瓣濶微皺開于秋末葉青稀厚而瓦大如掌亞深枝幹麤勁如樹髙可八九尺小殿秋黄朶