body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十花譜菊花三集藻七言古詩增梁簡文帝採菊篇日精麗草散秋株洛陽少婦絶妍姝相呼提筐採菊珠朝起露濕霑羅襦東方千騎從驪駒更不下山逢故夫原唐杜甫歎庭前甘菊花庭前甘菊移時晩青蘂重陽不堪摘明日蕭條盡醉醒殘花爛漫開何益籬邊野外多衆芳采擷細瑣升中堂念兹空長大枝葉結根失所纒風霜增宋梅堯臣甘菊世言此解制頹齡便當園蔬春競種到秋猶得泛其英爛醉莫辭官有俸和吳沖卿省中植菊園果已熟實未墜野卉已老葉未瘁菊叢是時方發榮潭上籬邊俱有為一從潭島輔長年一自籬根圖暫醉今將移近省中蘭壅培早與陶潜異黄土肥濃沃井泉朱欄屈曲侵堦地勁風不到何動揺清露能霑誰著意看看重九各登髙金蘂滿頭無所忌及此頻邀同舎歡向來莫羨鍾繇賜我家蓬藋不足云强對嘉章顔起愧歐陽修希真堂東手種菊花十月始開當春種花唯恐遲我獨種菊君勿誚春枝滿園爛張錦風雨須㬰落顛倒看多易厭情不專鬬紫誇紅隨俗好豁然髙秋天地肅百物衰零誰暇弔君看金蘂正芬敷曉日浮霜相照耀後時寧與竹相榮媚世不爭桃李笑煌煌正色秀可餐藹藹清香寒愈峭髙人避喧守幽獨淑女靜容修窈窕方當搖落看轉佳慰我寂寥何以報時攜一樽相就飲如得貧交論久要我從多難壯心衰迹與世人爭靜躁種花勿種兒女花老大安能逐年少曾鞏菊花菊花秋開只一種意逺不隨桃與梅遊人有幾愛孤淡零落野水空巖隈層層露萼間枝葉金靨萬箇圍蒼苔直從陶令酷愛尚始有我見心眼開為憐清香與正色欲搴更惜常徘徊當攜玉軫就花醉一飲不辭三百杯陸游山園草間菊數枝開席地獨酌屋東菊畦蔓草荒痩枝出草三尺長碎金狼籍不堪摘掃地為渠持一觴日斜大醉呌墮幘野花村酒何曾擇君不見詩人跌宕例如此蒼耳林中留太白楊萬里買菊老夫山居花繞屋南齋杏花北齋菊青春二月杏花開抱瓶醉卧錦繡堆凉秋九月菊花發自折寒枝插華髪湘纍落英曾幾何陶令東鄰未是多吾家滿山種秋色黄金為地香為國就中更有一丈黄霜葩月蘂耿出墻飲徒無酒尋不得尋得一身花露香如今小寓咸陽寺有口何曾問花事百錢擔上買一株聊伴詩人發幽意病眼仇寃一束書客舎葭莩菊一株看來看去兩相厭花意蕭條恰似無清曉肩輿過花市陶家全圃移在此千株萬株都不看一枝兩枝誰復遺平地拔起金浮屠瑞光千尺照碧虚乃是結成菊花塔蜜蜂作僧僧作蝶菊花障子更玲瓏翡翠六扇排屏風金錢裝面密如積金鈿滿地無人識先生一見䨇眼開故山三徑何獨懐君不見内前四時有花賣和寧門裏花如海林亦之奉題林稚春菊花枕子歌故人所説菊花枕似把冰九月下飲秋水一䨇明炯炯數在青嚢第一品狂風江上吹蒹葭往往得之嵇阮家閉門誦書二十載眼睛損盡生空花建陽小作箸頭書殘更燈火亂蟲魚石渠文字大如斗塲屋歲月又不偶却來南山青草邊東西盡為菊花田手提長筐向山曲一下收拾三百斛昨者昬迷才起來解把簷頭小字讀乃知妙物通羣仙一切藥囊應棄捐謝枋得菊淵明豈但隱逸人淵明素懐諸葛志清香不獨占秋天菊潭一滴三千歲鄭思肖菊花歌太極之髓日之精生出天地秋風身萬木搖落百草死正色與秋争光明背時獨立抱寂寞心香貞烈透寥廓至死不變英氣多舉頭南山髙嵯峨金宇文虛中白菊西風蕭颯百草黄南齋白菊占秋芳主人好事不專饗擷送客館分幽香幽香清艶兩難得冰雪肌膚龍麝裛悄然坐我蘂珠宮玉斧瑤姬皆舊識仙家藝菊名日精我今號爾為月英月中風露秋夕好感此仙種來曾城慿君傳與金天令月與霜姿駐清景重陽好伴白衣來五柳先生憶三徑元范梈送菊卧病髙秋留海浦明日重陽更風雨杜門不出長蒼苔令我天涯心獨苦籬角黄花親手栽近節如何獨未開含芳閟采亮有以使君昨暮徵詩來凌晨試遣霜根送畚土雖微甚珍重極知無意競秋光任作横窓歲寒供憶我初客天子都西垣植此常千株結花年年應吹帽始信南邦事盡殊願得封培自今日何間朱厓萬家室秋香端不負乾坤但嗔簫管亂儔匹歸去來兮雖得歸念歸政自莫輕違他日采英林下酌誰向清霜望翠微明吳寛過相城為沈陶庵和天全翁賞菊之作菊花開日是重陽坡翁妙語不可當我云但得花之趣何必秋來菊有黄神仙中人壽且康老年見客纔下堂幅巾飄飄映華髪導我直過東籬傍庵居春風定先到已見菊苖三寸長浩歌淵明飲酒章悠然依舊虞山蒼素琴無絃舊有例當春賞菊嗟何妨封題一笑報蘇子為我轉致陶柴桑陳鴻買西園菊至招同社諸人花下小飲因和短歌幾處菊花殘西園餘數畝買來竹忩下折簡會賓友把酒坐花㫄一齊衫袖香春天百卉媚不及此幽芳堦下凉風薄暮起枝枝低拂深杯裏願君盡醉宿我家明日更看西園花五言律詩增唐太宗賦得殘菊階蘭凝曙霜岸菊照晨光露濃晞曉笑風勁淺殘香細葉凋輕翠圓花飛碎黄還持今歲色復結後年芳駱賓王秋菊擢秀三秋晩開芳十歩中分黄俱笑日含翠共搖風碎影涵流動浮香隔岸通金翹徒可泛玉斚竟誰同李嶠詠菊玉律三秋暮金精九日開榮舒洛媛浦香泛野人杯靃靡寒潭側丰茸曉岸隈黄花今日晩無復白衣來原李白感遇可嘆東籬菊莖疎葉且微雖言異蘭蕙亦自有芳菲未泛盈樽酒徒沾清露輝當榮君不採飄落欲何依增盧綸九日奉陪令公登白樓同詠菊瓊樽猶有菊可以獻留侯願比三花秀非同百卉秋金英分藥細玉露結房稠黄雀知恩在銜飛亦上樓朱灣秋夜宴王郎中宅賦得露中菊衆芳春競發寒菊露偏滋受氣何曾異開花獨自遲晩成猶有分欲採未過時忍棄東籬下看隨秋草衰耿湋賦得寒蜂採菊蘂遊颺下晴空尋芳到菊叢帶聲來蘂上連影在香中去住霑餘霧髙低順過風終異蝴蝶不與夢魂通顧非熊萬年厲員外宅賞殘菊纔過重陽後人心已為殘近霜須苦惜帶蝶更宜看色減頻經雨香銷恐漸寒今朝陶令宅不醉却應難姚合病中辱朱諫議惠甘菊藥苗因以詩贈蕭蕭一畝宮種菊十餘叢採摘和芳露封題寄病翁熟移茶鼎裏餐稱石甌中香氣將何比從來味不同李商隱菊暗暗淡淡紫融融冶冶黄陶令籬邊色羅含宅裏香幾時禁重露實是怯殘陽願泛金鸚鵡升君白玉堂許棠白菊所尚雪霜姿非關落帽期香飄風外别影到月中疑發在林彫後繁當露冷時人間稀有此自古乃無詩李建勲採菊簇簇競相鮮一枝開幾番味甘資麴糵香好勝蘭蓀古道風搖逺荒籬露壓繁盈筐時採得服餌近知門蕭彧賦得菊送德林郎中學士赴東府離情折楊柳此别異春哉含露東籬艶汎香南浦杯惜持行次贈留插醉中廻暮齒如能制玉山甘判頹張蠙白菊秋天木葉乾猶有白花殘舉世稀栽得豪家却畫看片苔相應綠諸卉獨宜寒幾度攜佳客登髙欲折難原羅隱詠菊籬落歲云暮數枝聊自芳雪裁纖蘂密金拆小苞香千載白衣酒一生青女霜春叢莫輕薄彼此有行藏增僧無可詠菊東籬搖落後密艶被寒催夾雨驚新拆經霜忽盡開野香盈客袖禁蘂泛天杯不共春蘭並悠揚逺蝶來僧廣宣九日菊花詠應詔可訝東籬菊能知節候芳細枝青玉潤繁蘂碎金香爽氣浮朝露濃滋帶夜霜汎杯傳壽酒應共樂時康宋韓琦菊萬卉趁枯死香金鬬晚葩甘名應得露野色豈如家俗態惜遲暮芳情誰怨嗟重陽樽酒伴不見牡丹花菊觴九日陪嘉客金英泛酒船醱醅時上下浮蟻自周旋香逐榴花發甘嗤柏葉先坐中宜醉挹仙錄載延年重九席上賦金鈴菊黄金綴菊鈴兖地獨馳名細蘂浮杯雅香筩貯露清風休沉夜警雨碎入寒聲自此傳仙種秋芳冠玉京邵雍和張二少卿丈白菊清淡曉凝霜疎枝殿顥商自知能潔白誰念獨芬芳豈為瓊無艶還驚雪有香素英浮玉液一色混瑤觴司馬光和李殿丞倉中對菊髙士寄朝市迥然心迹殊秋風太倉裏黄菊滿庭隅陶令成詩後王公送酒無遙知壓俗事未免强躊躇文案漸消散倉閑吏已稀庭空數蝶下夜靜一螢飛愛賞忽成句淹留時忘歸髙情雖不繫遇此獨依依凉風正蕭瑟朋好復徘徊幽興𣺌不盡芳樽時一開餘英蓋紅葉墜露濕蒼苔從此東籬下應忘歸去來和江鄰幾金鈴菊何處見佳菊秋風汶水陽酒浮金鐸細露汎蜜房香不謂紅塵地相逢君子堂依然故人意不减舊芬芳詠菊瑣瑣南陽菊秋潭歲自開孤根擁紅葉落蘂媚蒼苔正以參靈藥因之植紫臺願兼金掌露同入柏梁杯野菊野菊未嘗種秋花何處來羞隨衆草後故犯早霜開寒蝶舞不去夜蛩吟更哀幽人自移席小摘泛清杯孔平仲對菊有懐郎祖仁庭下金鈴菊花開已十分多情能惠我對景獨思君秀色三秋好清香一室聞扁舟今夜雨何處宿江雲戴昺十日取野菊從酒野徑菊仍好村壚酒亦嘉未應今日蘂便是背時花心在家千里身猶客九華官程難久駐風雨暮山斜金党懐英黄菊集句九月欲將盡鮮鮮金作堆遶籬殘艶密擁鼻細香來五色中偏貴羣花落始開可憐陶靖節共此一傾杯元蒲道源九月十八日黄菊始開時且禁釀漫成示徳衡弟苒苒秋事杪幽叢花始黄直須彫衆卉纔許見孤芳重露洗金質嚴風吹綠裳陶翁如有酒何日不重陽范梈九日諸生攜酒至城東看菊楚楚臨堦菊重陽特地開慰人良有意報汝愧無才巷杵聞雞發鄰觴送蟹來采英吾欲寄悵望倚江臺明髙啓王公子宅五月菊秋英忽夏發宛在阿戎家細認驚初見髙吟喜共誇不依寒竹雨欲映午榴霞我意甘遲暮樽前有此花何景明汝慶宅紅菊紅菊開時暮亭亭冠物華亦知顔色好不是艶陽花羅綺嬌秋日樓臺媚晩霞清香如不改常傍美人家八月二十八日子容過對菊近節逢花放開樽集異鄉乾坤共一笑風雨似重陽誰識暮蟬意獨憐秋樹芳他時益爛熳邀爾醉西堂汝濟夜過同以行對菊花搖落相過地芳菲晩更親酒醺留媚眼燈色笑生春風雨新晴夜江山未老身百年如不醉恐負此花神原李夢陽菊花不隨羣草出能後百花榮氣為凌秋健香緣飲露清細開宜避世獨立毎含情可道蓬蒿地東籬萬代名增陳憲章前菊㑹荒村開紫菊細雨隔蒼梧漂泊逢山鬼歸來覓酒徒佳期賓不赴幽賞子何孤為罰南山老青錢買百壺後菊會餘花留醉客缺月到疎梧我老真違世人生各有徒交遊今日少宇宙此亭孤慣得趨時理千金買一壺後菊會再次李九淵韻黄花憎競賞人事奪幽期長夜來尋醉微霜落滿枝行藏深琖酒風月小囊詩長嘯東軒下蒼髯白接䍦留連杯酒下重疊菊花期熟犬知過客寒蜂亦戀枝溪山廻月色香影入梅詩地窄君休舞傾斜爾接䍦楚雲臺觀民澤所栽菊寄民澤用昨九日韻時民澤還五羊未返當軒玉朶孤植竹翠莖扶香細風初動神清俗本無寒深溪井涸月出山瓢疎何處異鄉客永懐歌茱茰野菊吟寄子長再次前韻野菊生何處尋香杖偶扶孤標猶訝絶佳色舊知無老弄真成獨秋來不作疎金樽誰九日引滿對茱茰吳明府送菊次韻答之黄菊有名花淵明無酒官酒多人自醉花好月同看老未厭人世天教共歲寒未應攜不去髙歩蓬萊山原申時行菊畦誅茆疏野徑種菊擬山家秀擢三秋幹竒分五色葩凌霜留晩節殿歲奪春華為道餐英好東籬興獨賒唐文獻西苑宸遊地東籬菊已花當年誇野色此日艶天葩輕白凌寒露深紅散晩霞秋英疑可茹無復楚人嗟七言律詩增唐白居易酬皇甫郎中對菊花見憶愛菊髙人吟逸韻悲秋病客感衰懐黄花助興方攜酒紅葉添愁正滿堦居士葷腥今已斷仙郎杯杓為誰排愧君相憶東籬下擬廢重陽一日齋李商隱野菊苦竹園南椒塢邊微香冉冉淚涓涓已悲節物同寒鴈忍委芳心與暮蟬細路獨來當此夕清樽相伴省他年紫雲新苑移花處不取霜栽近御筵和馬郎中移白菊見示陶詩只採黄金實郢曲新傳白雪英素色不同籬下發繁花疑自月中生浮杯小摘開雲母帶露旋移綴水精偏稱含香五字客從茲得地始芳榮李山甫劉員外寄移菊秋來緣樹復緣墻怕共平蕪一例荒顔色不能隨地變風流唯解逐人香煙含細葉交加碧露拆寒英次第黄深謝栽培與知賞但慚終歲待重陽皮日休和魯望白菊已過重陽半月天琅華千㸃照寒煙蘂香亦似浮金靨花様還如鏤玉錢玩影馮妃堪比艶鍊形蕭史好爭妍無由摘向牙箱裏飛上方諸贈列仙陸龜蒙幽居有白菊一叢因而成詠呈知己還是延年一種材即將瑤朶冒霜開不如紅艶臨歌扇欲伴黄英入酒杯陶令接䍦堪岸著梁王髙屋好欹來月中若有閑田地為勸姮娥作意栽重憶白菊我憐貞白重寒芳前後叢生夾小堂月朶暮開無絶艶風莖時動有竒香何慙謝雪清才詠不羨劉梅貴主妝更憶幽窓凝一夢夜來村落有微霜鄭璧白菊白艶輕明帶露痕始知佳色重難羣終朝疑笑梁王雪盡日慵飛蜀帝魂燕語似翻瑤渚浪鴈風疑卷玉綃紋瓊妃若會寛裁翦堪作蟾宫夜舞裙司馬都白菊耻共金英一例開素芳須待早霜催遶籬看見成瑤圃汎酒初迷傍玉杯映水好將蘋作伴犯寒疑與雪為媒夫君每尚風流事應為徐妃致此栽張賁白菊雪采冰姿號女華寄聲多是地仙家有時南國和霜立幾處東籬伴月斜謝客瓊枝空貯恨袁郎金鈿不成夸自知終古清香在更出梅妝弄晩霞宋韓琦九日賞菊未開席上次韻答崔象之寺丞誰知九日接賓觴未放寒花拆露房早是生來悲晩節那堪開不在重陽滿頭且應良辰插一夜寧衰淺意香守待金鈴披絶艶共君搴蘂醉餘芳和崔象之紫菊紫菊披風碎曉霞年年霜晩賞竒葩嘉名自合開仙府麗色何妨奪錦砂雨徑蕭疎凌蘚暈露叢芬馥敵蘭芽孤標只取當筵重不似尋常泛酒花八月十九日賞菊春英無不惜開遲秋菊常懐素景悲慣負晩霜甘索寞忽逢先閏促離披欲移庭檻嫌傷早擬泛賔罍未入時自是寒花當守分一違佳節速人嗤王安石和晩菊不得黄花九日吹空看野葉翠葳蕤淵明酩酊知何處子美蕭條向此時委翳似甘終草莽栽培空欲傍藩籬可憐蜂蝶飄零後始有閑人把一枝蘇轍戲題菊花春初種菊助槃蔬秋晩開花插滿壺微物不多分地力終年乃爾任人須天隨七箸幾時輟彭澤樽罍未遽無更擬食根花落後一依本草太傷渠徐積菊花為汝花中開最孤詩翁可惜屢提壺却應有意酬青眼渾似傾心向白鬚擊銅鉢時吟更好擲金錢後醉相娱楊妃只有黄裙在且問風霜留得無劉子翬詠菊青叢馥郁早抽芽金蘂斕斑晩著花秋意祇應宜淡泊化工可是惜鉛華輕煙細雨重陽節曲檻疎籬五柳家暮醉朝吟供採摘更憐寒蝶共生涯楊萬里野菊未與騷人當糗糧况隨流俗作重陽政緣在野有幽色肯為無人減妙香已晩相逢半山碧便忙也折一枝黄花應冷笑東籬族猶向陶翁覓寵光九日菊未花舊説黄楊厄閏年今年併厄菊花天但挼青蘂浮新酒何必黄金鑄小錢半醉嚼香霜月底一枝却老鬢絲邊阿誰會得開遲意暗展重陽十月前九日郡中送白菊未應白菊减于黄金作鈿心玉作裳一夜西風開痩蕾兩年南海伴重陽若言佳節如常日為底寒花分外香挼蘂浮杯莫多著一枝留插鬢邊霜陳傅良和林宗易菊花韻一歲所餘秋有幾重陽偏與老相催每憐白髪能長健雖愛黄花亦懶栽好景游從須好友新詩風味似新醅人生適意無過此恣聽東籬早晏開潘紫巖香名不枉入騷壇最愛霜林耐歲寒切莫逢人嘆遲暮何曾委地有飄殘人如靖節本堪採世欠靈均少得餐甚矣吾衰閉門坐籬邊自折一枝看原方九功露冷江蘋鴈度時蕭蕭黄菊滿疎籬寒枝帶雨開仍艶晩節凌霜賞未遲移傍小簷承綺席縱觀深夜倒金巵摘來冉冉香盈把共泛西風醉莫辭莫惜寒花開太晩孤懐深喜客來䨇疎枝最耐存霜圃晩節偏宜映月窓同調自應蘭是籍濁醪何有玉為缸籬邊無限陶潛興倒著綸巾醉未降增金元好問野菊座主閑閑公命作柴桑人去已千年細菊斑斑也自圓共愛鮮明照秋色争敎狼籍卧疎煙荒畦斷壟新霜後痩蝶寒螿晩景前只恐春叢笑遲暮題詩端為發幽妍晩景蕭疎畫不成晩花作意出繁英鮮明獨向霜露見爛熳却隨蒿艾生南國騷人知有待西風蝴蝶更多情南山正在悠然處安得芳樽與細傾為鮮于彦魯賦十月菊清霜淅淅散銀沙驚見芳叢閲歲華借暖定誰留翠被鍊顔端自有丹砂秋香舊入騷人賦晩節今傳好事家不是西風苦留客衰遲久已避梅花元王惲桃花菊淚灑明妃寄露葩換根非為貯丹砂黄輕白碎空多種碧爛紅鮮自一家騷客賦詩憐晩節野人修譜是頭花九秋霜露無情甚時約行雲䕶彩霞馬祖常䨇頭菊金屈巵邊醉袖垂秋雲如幄貯仙姿寒生小靨廻鸞動香入流蘇睡鴨移結綬巧承西顥曲落鈿羞帶月支睂青霜為我催顦顇銀屋何人怨别離菊枕東籬采采數枝霜包裹西風入夢凉半夜歸心三徑逺一嚢秋色四屏香牀頭未覺黄金盡鏡底難敎白髪長幾度醉來消不得卧收清氣入詩腸明髙啓晩香軒不畏風霜向晩欺獨開衆卉已凋時地荒老圃苔三徑節過重陽雨一籬秋色蒼茫人醉少寒香落寞蝶先知山翁獨念同衰晩坐對幽軒每賦詩原李東陽楊妃菊誰采繁花席上題偶將名姓託唐妃日烘花萼醺時面雨換華清沐後衣隔座似邀秦國語揮毫未放謫仙歸欲從顔色窺生相已落詩家第二機增李東陽月下賞菊柬邃庵太常先生不隨春蝶夢滕王又送秋蟬過綠楊佳客到時非舊雨好花開處亦重陽為園恨少青山地插帽羞看綠鬢郎長對此花還此客縱敎多病也身康十月賞菊體齋席上限韻尋芳何意到君家雨過髙城少暮沙此夜幽歡還月下去年孤館各天涯狂思晩節曾吹帽壽擬春期及進𤓰不是老來詩骨健誰能白髪對黄花後園種菊經月忽見數花用亨父韻并呈城東賞菊諸君幽花種得偶相忘歩轉南簷却背堂但有芳心寧擇地更無佳客亦宜觴登臨憶負重陽雨採掇愁沾昨夜霜滿袖餘香試披拂晩來風力正悠揚九日盆菊盛開將出郭有作買得長安擔上秋南山只在屋西頭花開正好逢佳節身病那堪復逺遊昨夜月明空對酒晩來風急怕登樓多情重有燈前約為報花神作意留周原已席上賦十月菊布袍蕭索不勝凉坐愛芳心共日光何用門前看五柳始知秋後有重陽故園栽處田應熟小市開時藥正香自古交期須歲晩相過不敢避風霜冬月對菊用陳玉汝韻搖落霜空萬木飛一枝無柰賞心微未成老圃應須學若在南山便合歸人道秋香非昨夜天留晩色共斜暉陶翁可是忘機者猶自含情待白衣吳寛原已宅賞菊休從雲外望天香誰似蕭然林下妝嫩蘂漸成黄面老低枝猶比白衣長曾隨枸杞添風味却笑芙蓉住水鄉詩社清忙今又動看花直擬過重陽次韻李士英劉道亨過園居看菊詩人渾不厭貧家閒就荒園看菊花傾倒臘醅瓶未罄品題秋色句争嘉殘英抱節真霜傑本草言功有日華醉後却勞歸騎晩西風烏帽數枝斜陳憲章九日晩對菊次容處士韻是日縣主曹侯二尹邵侯持酒過白沙李九淵容貫各館鄉中未還一年佳節到黄花霜在籬根月在沙今日縣侯親送酒幾時詩客報還家疎枝向晩青如許老鬢逢秋白未涯更欲西良開酒􅊦勝遊堪泛五更槎再用韻焉知老子非元亮請看黄花滿白沙賸有香醪供采采何須蠟屐到家家屢經細雨開花面獨立西風背水涯欲把一株種蟾闕恐驚天女笑乗槎次趙提學十月賞菊韻不論開早與開遲到處逢花把一枝清獻插來紗帽重陶潜醉倒葛巾欹青藜不赴先生召白雪虚傳幼婦詞却對藥欄何意緒江門店酒獨斟時答吳樂善送菊兩莖何處萎霜根路入廬山不問村佳節總非前日月新香猶裊舊龍門氣清天與金行秀色淺人知土德尊今日淵明不能領倒巾簷下弄詩魂何孟春送菊涯翁山徑曾陪九日遊數枝還為一尊留買從逺市聊供節栽向名園合擅秋漸老有人憐客痩乍寒無計替蜂愁多情不用防吹帽短髪猶禁插滿頭熊卓汪司驥席上對菊錦席秋軒流客觴堦除遲菊戀年芳翠條苒苒初經雨青蘂娟娟欲候霜幸為分回供閴寂空然别去夢寒香小車如覓東溪路古屋疎籬是醉鄉喬長史詠醉楊妃菊嬝娜嬌姿不耐霜芳根移得在昭陽帶將春色三分艶散作秋隂滿院香傾日尚疑聞羯鼔臨風猶似舞霓裳祇愁野鹿偸銜去寂寞棃園空斷腸原王世貞貪看晩節傲霜颸淡色幽香冷不辭入坐叵羅爭自引歸來欵叚未須騎推敲月下猶孤語競病風流彼一時若使東籬主人在攢睂那肯和新詩增申時行對菊獨坐髙齋汎羽觴且看叢菊媚重陽繁英乍吐丹霞色冷艶全分白雪香好共清幽矜晩節偏從搖落殿秋光疎花短髪能相倚三徑猶憐歲月長婁東荆石公餉菊賦謝一水能通貫月槎九秋偏贈傲霜花瓊枝濯濯深含露紫艶叢叢細吐霞開傍松軒成晩節分來蓬島是仙葩試論禁苑追陪日何似園林樂事賒茅亭看菊小結茅齋掩蓽門翛然風物似山村一丘髙卧身仍健三徑新鋤菊尚存麗色盈盈開錦障幽香冉冉注清尊誰知搖落風霜候偏荷栽培雨露恩原馬德澄秋深菊圃吹寒風報道阿家花早叢鶯羽半遮西子白鶴翎斜映太真紅參差萬朶霜天曉稠疊千枝煙雨空肯與山樵分秀色移栽不逺過墻東吳執御水浸長天搖砌明亭亭珠玉綻秋英晩香冷秀經霜後淡意疎容與景迎籬下留連非藉酒雨中尋覓最多情飛塵不到莎㕔下愛爾幽香浸骨清五言排律原唐劉禹錫和令狐相公玩白菊家家菊盡黄梁國獨如霜瑩淨真琪樹分明對玉堂仙人披雪氅素女厭紅妝粉蝶來難見麻衣拂更香向風搖羽扇含露滴瓊漿髙艶遮銀井繁枝覆象牀桂叢慙並發梅萼妬先芳一入瑤華詠從茲播樂章增劉禹錫和令狐相公九日對黄白二菊花見懐素萼迎寒秀金英帶露香繁華照旄鉞榮盛對銀黄琮璧交輝映衣裳雜彩章晴雲遙蓋覆秋蝶近悠揚空想逢九日何由陪一觴滿叢佳色在未肯委嚴霜許渾南海使院對菊懐丁卯别墅何處曾移菊溪橋鶴嶺東籬疎還有艶園小亦無叢日晩秋煙裏星繁曉露中影搖金澗水香染玉潭風罷酒慙陶令題詩答謝公朝來數花發身在尉佗宮薛能詠夾徑菊夾徑盡黄英不通人並行幾曾相對綻元自兩行生叢比髙低等香連左右并畔搖風勢斷中夾日華明間隔蛩吟隔交横蝶亂横頻應泛桑落摘處近前楹公乘億賦得秋菊有佳色陶令籬邊菊秋來色轉佳翠攅千片葉金翦一枝花蘂逐蜂鬚亂英隨蝶翅斜帶香飄綠綺和酒上烏紗散漫搖霜彩嬌妍漏日華芳菲彭澤見稱更在誰家鄭谷恩門小諫雨中乞菊栽握蘭將滿歲栽菊伴吟詩老去慵趨世朝廻獨繞籬逓香風細細澆綠水瀰瀰祇共山僧賞何當國士移孤根深有託微雨正相宜更待金英發慿君插一枝宋錢惟演樞密王左丞宅新菊賀燕翻飛地靈芳茂遂時隂連桃李徑潤接鳳凰池夕照揮金葆輕風拂翠蕤露珠清自沍煙素引還披西顥霜雖勁南榮暖更滋擷芳多楚澤得地勝陶籬味可登蘭籍香應奪桂旗願公長却老晏寢奉瓊巵楊億樞密王左丞宅新菊中樞多暇日小圃占秋光雕玉新成檻繁金乍泛觴陶籬侵柳色羅宅掩蘭芳芝影連虚室萱叢接後堂傅巖猶借雨庾嶺未飛霜溫樹偏分䕃芸籤亦鬬香交枝迷露井墜葉㸃横塘桐錄知延壽千齡奉紫皇劉筠樞密王左丞宅新菊東閣留嘉客寒葩艶晩光秋風自蕭瑟台座對熒煌麗奪䨇南價清含九畹香嵰山霜薦味太液鵠分裳已助蜂成蜜還隨蟻泛觴俯臨揮艾綬佩服間茰房節物傳荆俗詩情掩謝塘更期松偃蓋永奉太清方李繼樞宻王左丞宅新菊青規前席暇歸沐興何長北第秋將晩東籬菊正芳幽叢霏薄霧桂色艶輕霜已近黄金印兼臨白玉堂甘疑掩萍實秀肯讓芝房有佞還應指無憂可要忘蘂浮丞相酒氣馥令君香好固松椿壽仙經識祕方元何中移菊僅得林間趣閒尋菊本移人家深竹裏楓葉夕陽時汲井澆畦潤將鉏下手遲䕶叢愁蘂損帶土怕根知毎被歸樵問深憐冷蝶隨寒香生徑術幽事補灣碕斗柄西北落鴈聲霜露垂裴回繞叢畔自笑可能癡五言絶句御製九日對菊不與繁花競寒苞晩更香數莖偏挺秀嘉爾傲風霜增唐陳叔逹詠菊霜間開紫蔕露下發金英但令逢採摘寧辭獨晩榮原杜甫復愁每恨陶彭澤無錢對菊花如今九日至自覺酒須賒增李端和張尹憶東籬菊傳書報劉尹何事憶陶家若為籬邊菊山中有此花王建野菊晩艶出荒籬冷香著秋水憶向山中見伴蛩石壁裏姚合詠新菊黄金色未足摘取且嘗新若待重陽日何曾異衆人原賈島對菊九日不出門十日見黄菊灼灼尚繁英美人無消息增杜牧將赴湖州留題亭菊陶菊手自種楚蘭心有期遙知渡江日正是擷芳時折菊籬東菊徑深折得自孤吟雨中衣半濕擁鼻自知心錢珝江行無題叢菊生堤上此花長後時有人還採掇何必在春期晩菊遶江壘忽如開古屏莫言時節過白日有餘馨潯陽江畔菊應似古來秋為問幽栖客吟時得酒不宋徐鉉詠菊細麗披金彩氛氲散逺馨汎杯頻奉賜緣解制頽齡梅堯臣殘菊零落黄金蘂雖枯不改香深叢隱孤秀猶得奉清觴司馬光晩行後園見菊戲宜甫野菊荒無數斑斑初見花徑須求一醉試遣問東家原楊萬里菊味苦誰能愛香含只自珍長將潭底水普供世間人朱子菊青蘂冒珍叢幽姿含曉露政爾破荒寒詎免傷遲暮王十朋佳節逢吹帽黄金染菊叢淵明何處飲三徑冷香中增金李俊民菊色笑秋光淡香嫌酒力慳東籬在何處客裏見南山明髙啓菊蹊獨行林下路望望南山暮無酒掇英嘗寒香已零露陳憲章題淵明菊籬下花堪把先生有酒不遙看白衣者不復問江州對菊淅淅西風至為秋未有涯江邊聊一醉信手得黄花春事歸桃李西風響未休長官三徑晩丞相一坡秋天地花無數寒花色乃佳古詩拈未出除是長官來原李夢陽白鴈獨横秋黄花伴醉遊眼看風物換愁殺仲宣樓增陳淳菊花清霜下籬落佳色散花枝載詠南山句幽懐不自持原于若瀛菊花冷艶吐金英疎香入玉斚偏宜處士居不種朱門下增王榖祥菊颯颯金風度嫣嫣秋色妍白衣還自至青女更相憐六言絶句増明陳憲章周鎬送白菊乞詩陶令黄金遶舎君家白玉滿園千古清風廬阜幾叢細雨江門微醉不須酩酊半開莫待離披安得季芳與語相思欲寄一枝白菊偏宜素髪青山只對蒼顔嚥罷秋香滿腹風吹不到長安御定佩文齋廣羣芳譜卷五十
