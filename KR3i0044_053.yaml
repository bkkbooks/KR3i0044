body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十一花譜菊花四集藻七言絶句増唐白居易禁中九日對菊花酒憶元九賜酒盈杯誰共持宫花滿把獨相思相思只傍花邊立盡日吟君詠菊詩重陽席上賦白菊滿園花菊鬱金黃中有孤叢色似霜還似今朝歌酒席白頭翁入少年塲原元稹菊花秋叢遶舍似陶家遍繞籬邊日漸斜不是花中偏愛菊此花開盡更無花増鮑溶暮秋與裴居晦宴因見採菊之作菊花低色過重陽似憶王孫白玉觴今日王孫好收採高天已下兩囘霜皮日休軍事院霜菊盛開因書一絶寄崔諫議金華千㸃曉霜凝獨對壺觴又不能已過重陽三十日至今猶自待王𢎞崔璞酬霜菊見贈之什菊花開晩過秋風聞道芳香正滿叢爭奈病夫難强飲應湏速自召車公陸龜蒙和崔諫議先輩霜菊紫莖芳艶照西風祗怕霜華掠斷叢雖伴應劉還强酒路人終要識山公憶白菊稚子書傳白菊開西成相滯未容廻月明階下窓紗薄多少清香透入來司空圖華下對菊清香裛露對高齋泛酒偏能浣旅懷不似春風逞紅艶鏡前空墜玉人釵白菊莫惜西風又起来猶能婀娜傍池臺不辭暫被霜寒挫舞袖招香即却囘為報繁霜且莫催窮秋湏到自低垂横拖長袖招人别只待春風却舞來登高可羨少年塲白菊堆邊鬢似霜益算更希沾上藥今朝第七十重陽原鄭谷十日菊節去蜂愁蝶不知曉庭還遶折殘枝自緣今日人心别未必秋香一夜衰増鄭谷詠菊王孫莫把比荆蒿九日枝枝近鬢毛露濕秋香滿池岸由來不羨瓦松髙日日池邊載酒行黃昬猶自繞黃英重陽過後頻來此甚覺多情勝薄情韓偓和吳子華侍郎令狐昭化舍人歎白菊衰謝之絶正憐香雪披千片勿訝殘霞覆一叢還似妖姬長年後酒酣䨇臉却微紅韋莊庭前菊為憶長安爛漫開我今移爾滿庭栽紅蘭莫笑青青色曾向龍山泛酒來宋韓丕詠菊冷淡花枝寂寞闌只緣開晩少人看若教總似陶潛眼肯向芳春艶牡丹王禹偁池邊菊緣池繞逕幾千栽準擬登高泛酒杯未到重陽歸闕去金英寂寞為誰開韓琦重九菊未盛開席上偶成重九開樽節未寒黃花初發葉皆單待看旬日金鈴綻剰得東籬一醉懽閱古堂前植菊二本九月十八日花猶未開因以小詩嘲之只趁重陽選菊栽當欄殊不及時開風霜日𦂳猶何待甚得迎春見識來原歐陽修菊共坐欄邉日欲斜更將金蕊泛流霞欲知却老延齡藥百草摧時始見花增王安石城東寺菊黃花漠漠弄秋暉無數蜜蜂花上飛不忍獨醒孤爾去慇勤為折一枝歸詠菊補落迦山傳得種閻浮檀水染成花光明一室真金色復似毗耶長者家院落深深數菊叢緣花錯莫兩三峯密房歲晩能多少酒盞重陽自不供蘇軾趙昌寒菊輕肌弱骨散幽葩真是青帬兩髻丫便有佳名配黃菊應緣霜後苦無花蘇轍五月園夫獻紅菊二絶句黄花九月傲清霜百草滿園無此香紅紫無端盗名字試尋本草細商量南陽白菊有竒功潭居人多老翁葉似皤蒿莖似棘未宜放入酒杯中原黄庭堅誰將陶令黃金菊幻作酴醿白玉花小草真成有風味東園添我老生涯呂園未肎輕沽我且寄田家砌下栽他日秋光媚重九清香知是故人來韓駒九日東籬採菊英白衣遥見眼能明而今自有杯中物一叚風流可得成増呂本中謝送菊經旬霖雨足莓苔忽喜䨇盆送菊來已似風霜憔悴損主人云是待晴開范成大菊樓東籬秋色照疎蕪挽結高花不用扶淨洗西風塵土面來看金碧萬浮圖重陽不見菊二絶節物今年事事遲小春全未到東籬可憐短髪空欹㡌欠了黃花一兩枝冷蕊蕭疎蝶懶飛商量何日是花時重陽過後開無害只恐先生不賦詩重陽後菊花二首寂寞東籬濕露華依前金靨照泥沙世情兒女無高韻只看重陽一日花過了重陽菊又新酒徒詩客斷知聞恰如退士懸車後勢利交親不到門陸游九月十二折菊黃菊芬芳絶世竒重陽錯把配萸枝開遲愈見凌霜操堪笑兒童道過時新菊已過重陽十日期菊叢初破兩三枝自憐短鬢蕭蕭白不似黃花驛裏時枯菊翠羽金錢夢已闌空餘殘蕊抱枝乾紛紛輕薄随流水莫與桃花一様看積雪嚴霜轉眼空春囘無處不春風欲知造物無窮妙但看萱根與菊叢嚴州多菊然率過重陽方開或舉東坡先生菊花開時即重陽之語余謂此猶是未忘重陽者恐此花不肎也戲作一絶無人喚醒賦歸翁滿把清香誰與同但辦對花頻舉酒莫横重九在胸中楊萬里詠菊物性從來各一家誰貪寒瘦厭年華菊花自擇風霜國不是春光外菊花黄菊鶯様黃裳錢様栽冷霜凉露濺秋埃比他紅紫開差晩時節來時畢竟開陳傅良沈仲一送菊自言封植之勞欲得詩為報為賦三絶東籬何在菊年年菊視陶詩竟孰賢未必縁詩花更好莫將詩與萬人傳霜螯風味小槽春新様宫衣試麴塵一段秋光誰領此芙蓉凡子桂陳人愁乾手自撘連筒苦雨丁丁􅍻小蓬乞得花開急催客明朝恐已著霜紅高翥菊花四首白白黄黄自歲寒詩翁但作菊花看牡丹茉莉非吾事自是時人被眼瞞親向東籬手自栽夕陽小徑重徘徊花應得似人乖角過了重陽爛漫開愛花千古說淵明肎把秋光不似春我重此花全晩節賸栽三徑伴閑身新分菊本自鉏山手縛枯藤作矮欄比似著書空用力種花猶得一年看原劉克莊菊羞與春花艶冶同殷勤培溉待西風不湏牽引淵明比隨分籬邉要幾叢翁浩堂秋風兩度身為客已見重陽未到家村酒不堪供節事祗將青眼看黄花趙信菴城荒落葉風颼颼淮水茫茫古渡頭白首不堪行樂地黄花㸃㸃是離愁落托山園載酒來江梅含雪倚春臺菊花無藉秋光老猶自離披帶雨開黄花照眼又經秋山自青青江自流多謝龍頭鰲禁客年年把酒對江樓增朱淑真黃花土花能白又能紅晩節由能愛此工寧可抱香枝上老不隨黃葉舞秋風金宋九嘉酴醿風味醺人醉著莫東籬愛酒翁一夜金英全換骨冷香晴雪滿秋風段克巳菊花霜風簾斜揭玉鈎欄端正樓高燭影殘宿酒困人梳洗嬾從教殘粉涴金鈿段成已菊花霜六宮試手學梅妝曾見飛英㸃額旁香粉嚼餘濃不散唾花誤染縷金裳李俊民野菊風露叢中取次芳愁邊過却幾重陽秋光到處多無主不是閑花不肎香晩菊集句白露寒花自繞籬羊士諤從他桃李笑開遲冉宗敏一年秋色吟中過沈彬門外重陽過不知僧齊已元許有孚遶隄種菊酒熟同招隱士看饑來忍把落英餐春風無限閑桃李不似黃花耐歲寒明高啓九月八日對菊預向籬邉把一杯黄花多意已能開不憂風雨明朝阻懶逐時人鬭折來袁凱已未九日對菊大醉戲作老夫愛此黄金蕊兒子湏將白酒賖直到殘陽下天去更添燈火照欹斜李東陽菊花寒影蕭蕭照墨池西園晩色正相宜蒼顔黑髪秋風裏應是陶翁半醉時題戴文進畫菊黄花開滿院前坡醉殺西江計汝和忽見錢塘著色畫不知秋色較誰多陳憲章對菊餐香誰亦到湘濱西埯東籬濫一巾去歲金英曾照我今年玉蕊又驚人秋英如雪照沙濱扳折湏防小侍巾曲檻兩頭門盡掩先生原是惜花人日日狂歌菊澗濱花神應識玉臺巾西風為掃繁華去不遣紅芳近老人花舫誰撐緑渚濱道人醉脫碧方巾東籬不飲江州酒彭澤當年未盡人扁舟何處剡溪濱夜半歸來雪滿巾爭似一瓢秋菊伴漆園風暖蝶疑人我貌不如蘇穎濱秋風華髪已盈巾有錢不買重陽醉籬下黄花也笑人謝九江惠菊誰將此菊種江濵物色當年漉酒巾若道淵明今我是清香還屬隔江人紫菊移來紫水濱白頭對著白綸巾花前酌酒笑未足酒後簮花笑殺人故根迢逓九江濵歲晩相看此道巾不用詩流强分别種花人是賞花人鶴袖披翻野水濱黄花簮破小烏巾腰間我有坡翁帶解與西鄰賣酒人次韻李子長寒菊四尺霜莖一寸葩幽香何只暗浮了借令歲晩無人見不做人間九日花水北一叢含數葩梅梢寒月過籬了茅茨可僦從人愛不賣廬山半畝花五月菊露飲霜餐不記秋黄花三昧室中求區區形色多相似爭得先生為㸃頭小變春紅作淡裝山亭初見一枝黃醉中忽眩東籬眼起視金錢著屐忙二頃南風秫正青督郵未到長官亭眼前雖有黄花在不與陶公管醉醒正月菊春到東籬花亦知紅桃白李更當時東風自領芳菲去也為秋香作意吹廬阜高歌九日杯盡將秋意放花開誰教也向東風裏㸃破千紅萬紫堆對菊因花催酒酒催詩詩酒平生兩不虧秋到若無詩與酒菊花元似不曾知菊逕旁通水背村秋光蕩漾短籬門與儂别様何裝㸃笑插金英滿鬢根映山映水兩三叢移上山亭愛殺儂千古冷香吹不斷長官頭上㡌簷風沈周菊秋滿籬根始見花却從冷淡遇繁華西風門逕含香在除却陶家到我家魏時敏賞菊短籬疎雨正離披淡白深紅朶朶宜自計老年才思减重陽過後不題詩原張本花上清光花下隂素娥惜此萬黄金一杯寒露三更後誰信幽人更苦心靳貴盈盈宫額半塗黄不減花前舊様妝笑殺阿嬌金屋貯香衾寒怯夜來霜越孃初試素羅裳愛向秋風學靚妝一夜不勝瓊佩冷晩香亭館有新霜戴君恩芳叢曄曄殿秋光嬌倚西風學道妝一自義熙人去後冷煙疎雨幾重陽申時行冷艶疎枝擢素秋結茅相對轉清幽摘來自喜簮蓬髩只恐黄花笑白頭于若瀛黄花應不插朱門自合移根老瓦盆露委烟斜看不足呼兒長夜倒芳尊陸氏澹雲微雨暮秋天為愛黄花帶晩烟聞說名園千百種願分秋色到籬邉詩散句増晉陶潛我屋南窓下今生幾叢菊唐孟浩然誰采籬下菊應閑池上樓李白手持一枝菊調笑二千石時過菊潭上摘此黄金花因招白衣人笑酌黄金花攜壺酌流觴搴菊汎寒榮原杜甫愁眼看霜露寒城菊自花羮煮秋蓴滑杯迎露菊新増杜甫晩來高興處揺蕩菊花期庭前有白露暗滿菊花團坐開桑落酒來把菊花枝寒花開已盡菊蕊獨盈枝小驛香醪嫩重巖細菊斑是節東籬菊紛披為誰秀采采黄金花何由滿衣袖韓愈野晴山簇簇霜曉菊鮮鮮霜風破佳菊嘉節廹吹㡌鮮鮮霜中菊既晩何用好楥菊茂新芳逕蘭消晩馤白居易籬菊黄金合窓筠緑玉稠僧皎然九日山僧院東籬菊也黄宋蘇洵粲粲秋菊早卓為霜中英司馬光菊蕊如排粟青青見葉心陸游英英籬下菊秀色獨滿枝原吳潛粲粲黄金裾亭亭白玉膚王潛齋輕霜臨菊月細雨似梅天増金吳激憶看霜菊艶不放酒杯乾明沈周千古陶彭澤籬邊有此花何景明露蕊凄凄放風枝裊裊低原唐杜甫苦遭白髪不相放羞見黄花無數新増杜甫籬邊老却陶潛菊江上徒逢袁紹杯韓愈墻根菊花好沽酒錢帛縱空衣可凖白居易黄菊繁時好客到碧雲合處佳人來杜牧别後東籬數枝菊不知閒醉與誰同宋梅堯臣黄金碎翦千萬層小樹婆娑嘉趣足周必大陶令思歸未得歸黃花想見繞東籬陸游荒庭落葉不可掃惟有叢菊爭先開身閑亦未全無事檢校黄花幾樹開楊萬里菜子已抽蝴蝶翅菊花猶著鬰金裳原徐似道牢裹烏紗莫吹却免教白髪見黃花增祝穆黄花自與淵明别不見閑人直到今徐集孫莫言滿眼無知已耐久黄花是故人湛道山想得東籬黃已徧到家及取未凋零黃溪雲白衣不到東籬伴吟得黄花滿口香沈唯齋不因彭澤休官去未必黄花得許香吳荆谿問花何事人偏愛曾遇淵明把玩來原張芸窓猶作霓裳舞妖態零紅墮粉濕秋痕王滄灣秋風為我語籬菊且耐寒香伴白雲増金王良臣月過初三半梳玉菊迎重九滿籬金路鐸貞姿佳菊秋霜裏真意南山夕鳥邊元馬臻東籬滿地金錢菊多謝西風為翦裁原無名氏眼前景物年年别只有黄花似故人不許秋風常管束競隨春卉鬭芳菲似嫌九月清霜重亦對三春麗日開增晉張協寒花發黃采謝惠連白露滋園菊江淹時菊耀巖阿周明帝霜潭漬晩菊庾信菊寒花