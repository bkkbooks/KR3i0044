水服二錢治酒醉不醒臨飲服方寸匕令人不醉王子喬變白增年方用甘菊三月上寅日采苖曰玉英六月上寅日采葉曰容成九月上寅日采花曰金精十二月上寅日采根莖曰長生並隂乾百日等分成日合搗千杵為末每酒服一錢匕蜜丸桐子大酒服七丸三百日身體輕潤一年髪白變黑二年齒落再生五年八十歲老人變為兒童乗露摘取甘菊去枝梗用淨瓦礶下安白梅一二個放花朶至平口又加白梅將鹽滷汁澆滿浸過花朶以石子壓之密封收藏至明年六七月取花一枝用淨水洗去鹽味同茶末入椀注熱滚湯則茶味愈清而香藹絶勝伴茶收藏不若此法或用淨花拌糖霜搗成膏餅食亦甚清雅或用甘菊曬乾密封收藏間取一撮如烹茶法烹之謂之菊湯暑月大能消渴每煮酒一瓶入甘菊五六朶封嚴乆愈香清花不可多多則味苦或旋採細看心内無蟲者捻碎冲酒服亦妙聖惠方云九月九日取甘菊花曬乾為末每糯米一斗蒸熟入花末五兩加細麫麯搜拌如常造酒法候熟澄清收藏每服一二盞能治頭風頭旋眩暈醫工或知忌野菊而並不識甘菊往往求盆盎中殘朶而用之夫華盛者實衰開殘者氣散是尚可以為藥乎甘菊香烈雖能燥濕袪風亦能助火泄氣宜酌而用之變白延年之說不可貪也以菊作枕者頭痛至不可救徳善譜有戒増花史千金方九月九日菊花末臨飲服方寸匕圭飲酒令人不醉鄭景龍續宋百家詩云本朝孫志舉有訪王主簿同泛菊茶詩云妍暖春風蕩物華初囘午夢頗思茶難尋北苑浮香雪且就東籬擷嫩芽洪景嚴遵和弟景盧邁月臺詩云築臺結閣兩爭華便覺流涎滿麴車戸小難禁竹葉酒睡多湏藉菊苖茶唐釋皎然有九日與陸處士羽飲茶詩云九日山僧院東籬菊也黃俗人多汎酒誰解助茶香陸放翁冬夜與溥菴主說川食詩何時一飽與子同更煎土茗浮甘菊人或有以菊花磨細入于茶中啜之者文保雍菊譜中有小甘菊詩莖細花黄葉又纖清香濃烈味還甘袪風偏重山泉漬自古南陽有菊潭此詩得於陳元靚歲時廣記然所謂保雍之譜恨末之識也治地種菊之處湏在向陽高原宜隂宜日風雨可到之所四傍設籬遮䕶圃内開作幾埂每埂置花幾缸缸之相去一尺五六寸僅容一人往來澆灌捕蟲缸下用磚石砌起以便走水傍設一小所以藏各色器具待花開移賞之後收根原藏此圃庻根苖不失而闗防有地儲種花謝後即翦去上簳止留近根三五寸每缸插籌記認名色或于缸邊記號亦可翦處用泥封口移至向陽處曬之土白燥時將肥水澆一二次天將大雪用亂穰草覆之以避凍損宜稀葢不可過密密則苖黃又法以礱糠燒灰覆之可避寒氣天日晴和用糞搪掗菊本四邊勿著根春苖自旺交立春糞即少用有他處討來名花根接者明年花開必變即以原花枝梗横埋肥地中每節自然出苖收起近中簳者則花本不變可得真種立春後天尚寒且不可輕動仍用草䕶其本則新秧早發壯大至二月内冰雪半消方可撤去覆草遇奇種宜於秋雨梅雨二時修下肥梗插在肥隂之地加意培養亦可傳種種子秋菊枯後將枯花堆放腴土上令畧著土不必埋時以肥沃之明年春初自然出苖收種其花色多變或黃或白或紅紫更變至有變出人所不識名者甚為竒絶分秧春分至榖雨節内看天氣晴明地土滋潤將舊收花本四圍掘出總根輕輕擊開勿損苖芽根鬚擇肥苖單莖不拘根鬚多少如在原本上者湏近原本有節處分以其節中生根方旺也秧根多鬚而土中之莖黄白色者謂之老鬚少而純白者謂之嫩鬚老可分嫩不可分有秃白根者亦可種活但要去其根上浮起白翳一層以乾潤土種之不可雨中分種令濕泥著根則花不茂土湏鉏鬆不可甚肥肥則籠菊頭而不發湏令浄去宿土恐有蟲子之害其地比平地高尺許每尺餘栽一株每穴加糞一杓搪掗如法方可搬秧植之四圍餘土鋤爬壅根高如饅頭様令易㵼水菊根惡水水多必爛周圍留深溝泄水但雨過不拘何月務將溝中水疎通流别處不分在地在盆即以酵熟乾土壅根或用篾箍瓦作盆埋地令一半入土内使地氣相接水不停積雨過便於上盆不傷根不泄元氣大笑及佛頂御愛黄至榖雨時以其枝插於肥地即活至秋亦著花豫章菊多佳者問之園丁云每歲以上已前後數日分種失時則花少而葉多如不分置他處非惟叢不繁茂往往一根數幹一幹之花各自别様所以命名不同菊開過以茅草裹之得春氣則其舊年柯葉復青漸長成樹但次年不著花第二年則接續著花仍不畏霜登盆立夏時菊苖長盛將上盆先數日不可澆灌令其堅老上盆則耐日色每起根上多帶土先將肥土倒鬆填二三分于盆加濃糞一杓後搬菊秧植之再將前土填滿亦如饅頭様種後必隔一日早用河水澆之又要搭棚遮避日色遇雨露揭去如久雨將盆移簷下長高尺許方可用肥仍以紅油細竹插傍用細㯶寛縛以防風雨摧折竹用油可避菊虎用㯶耐風日凡要菊盛花大更無别法只是十一月大小雪中分盆邊旺苖栽之如未發苖有青葉頭白芽者種之遮霜雪要見日色開春花自盛澆灌初種時澆水後得大日色曬三四日候天色晴燥早晩用河蕩水澆一次澆時湏用盆緩緩澆透不透恐下邊土熱葉即發黄天雨不必澆既活長至六七寸長方將宿糞一杓水一桶和匀澆一次隔日又一次澆時湏在雨過後一日若晴久土燥不可澆肥亦不可澆在花根邉令根傷損先將缸内土四邊掘壅根上如高阜様肥灌四周低處量看枝葉緑色深翠即止大約瘦者多澆肥者少澆否則令蕊籠閉青葉勝交芒種節後黄梅久極易傷根大雨時行尤為難看梅天但遇大雨一歇便澆湏少冷糞以扶植之否則無故自瘁若厭澆糞用糞泥於根邊週圍堆壅半寸再雨濕泥功倍於糞且不壞葉六七月内不可用糞用則枝葉皆蛀每晨用河水澆灌若有撏雞鵝毛水停積作冷清或浸蠶沙清水時常澆之尤妙尤湏蓄土以備封培其根復生其本益固自此以後不可澆肥芒種後如苖瘦者止用汙泥水隔三五日一澆以天色晴雨為則六月大暑中每早止用河水澆此月天熱糞燥用糞則傷菊此後至花蕊發如黄豆大方澆清淡糞水一二次花將放時又澆肥一次則花開豐艶可觀此花大率惡水水多則有蟲傷濕爛之患紫金鈴一種忌肥喜隂又不可見水宜大樹下隂處種之畧見日影常令肥潤而已不可令中間頭長腦頭一起即搯一段根下亂頭不可去待亂枝茂根瘦即花盛此種及蜜芍藥金芍藥銀芍藥不宜見糞惟沃以汙泥稀水紫線盤不宜見肥金鈴一種絶妙極難活但置隂處多見水不見肥東籬品彚云澆花以噴壺噴之最良惜花秋時有狂風驟雨每本再揀堅直籬竹綁定用莎草從根縛二三節勿令揺動傷殘菊性畏熱湏傍高籬大樹以避日色花開盛大不可置之日曬雨濯湏放隂處以待夜露天寒有霜移置屋下根縛紙條就盞引水使根長潤而不傷水則花久可觀葉秀可愛黃梅雨久花根浸爛花葉將萎即㧞起翦去爛鬚止留直根重插平濕土内如插花法既可留種亦可有花䕶葉養花易養葉難凡根有枯葉不可摘去去則氣泄其葉自下而上逐漸黃矣根邉用碎瓦或花葢密葢防雨濺泥汚葉或礱糠螺殻亦可葉有泥以清水洗淨各月皆然澆糞澆水慎勿令著葉一著葉隨即黃落欲葉青茂時以韭汁澆根沙缸下用大磚墊高缸底以走積雨則葉不損如此䕶之則枝葉翠茂清晨葉帶露甚脆一觸則落一法以稻草翦作尺許分開縛在四圍根上去根四五寸許周圍分撤如簔衣葢泥亦是䕶葉一法四五月大雨脚葉易壞湏設棚遮葢芟蕊長高尺許芒種節中每枝逐葉上近幹處生出眼一一搯去此眼不搯便生附枝搯時切湏輕手左手䨇指拈梗右手指甲搯蕊勿猛摘猛放葢菊葉甚脆畧一觸即墮矣至結蕊時每株頂心上留一蕊餘則剔去如蕊細用針挑其逐節間或先搯眼不盡至此時又結蕊亦盡去之隨加土平缸庶一枝之力盡歸一蕊開花尤大可徑三四寸惟甘菊寒菊獨梗而有千頭不可去立秋後不論枝長短並不可損蕊至黄豆大隔二三日澆肥一次則花大色濃至霜降花大發矣中有早晩不同開早者先移賞玩後開者又作一番其間不開放并零落者存之作本如欲蕊多至春苖尺許時掇去其顛數日則岐出兩枝又掇之每掇益岐至秋則一幹所出數百千朶婆娑團圞如車葢熏籠人力勤土又膏沃花亦為之屢變菊之本性有易高者醉西施之類是也有原低者紫芍藥之類是也欲其低摘正頭欲其高摘傍頭庶無過不及之患壓插五月梅雨時將摘下肥壯小枝長三五寸者齊節邊截取插入肥腴土内約寸半許以泥埋過節為止以其節能出根故耳移置隂處或用箔簟遮䕶令不見日頻以水澆間用肥水待至盈尺畧見日影至中秋不必遮藏與種菊同開但花畧小耳可移盆中置几上清玩插大芋頭内埋土中亦佳此根收起來年發苖更旺凡菊開花時有苖頭近梗搯下以汚泥猪糞釀肥下花苖頭在内上葢鬆泥此苖即活冬間分得芽頭湏用猪糞釀泥種之凡壅花以頭垢不生莠蟲欲其淨則澆壅捨肥糞而用河泥紫金鈴及蜜芍藥紫牡丹白牡丹秋牡丹金寶相銀寶相紫寶相金邊紫鈴難栽宜多插栽接四月間梅雨時將賤菊本幹肥大者截去苗頭近根止留數寸將他色菊苗頭截下以利刀披削如鴨嘴様將前去苖頭本上以利刀劈開僅可容苗頭削枝插落即用麻線縛定以汚泥塗之再以紙箬包裹至活方去則一本可容三色且至深秋接頭長完無痕可見釀土種菊土力最要埴壤黃壤赤壤為上沙壤磧壤黑壤次之俱在每歲秋冬擇高阜肥地將土挑起潑以濃糞篩過雜以雞鵝糞壤令肥用草薦葢之勿令泄氣正二月内再酵數次候至分菊時仍以細篩篩過用蚌殻搬入盆内五六寸許栽菊遇雨過根露覆以肥土可收雨澤不使根爛菊喜新土大率每年換土分種若舊土恐力不厚花發瘦小初種土培十分之四至黃梅前三二日再培土三分雨後淋去再宜封培至蕊發如菉豆大搯後又培土二分以時消息又一法以肥鬆土用細篩篩入甑蒸二三沸取起倒出曬乾入盆植菊能殺蟲無侵蝕之患蓄水蓄水之法花傍四角設四缸一蓄糞水一蓄汙肥水二蓄河水雨水澆花河水雨水為上洗鮮肉退雞鵝毛水繅絲湯俱佳釀雞鵝毛水法用缸盛貯投韭菜一把或枇杷核則毛盡爛一云先時以死蟹釀水澆花不生莠蟲又能肥花用糞各有次序一次糞二水八越半旬第二次糞三水七再越半月第三次糞水相半又越半旬第四次糞七水三第五次全糞可也救花大肥用野芥菜子滿缸下之以减其力臘月内掘地埋缸積濃糞上葢板填土密固至春渣滓融化止存清水名曰金汁五六月菊黄萎用此澆之足以囘生且開花肥潤捕蟲初種時長至五六寸即有黒小地蠶嚙根早晩宜看除之又生一種細蟲穿葉惟見白頭縈廻可用針刺死之立夏至小滿四五月中防麻雀折枝作窠雨過後或生青寸白蟲食腦葉或生如虱黒莠蟲以指彈梗去之時常湏看芒種後四五月時有黒殻蟲似螢火肚下黃色尾上二鉗名曰菊牛又名菊虎或清晨或將暮或雨過晴時忽來傷葉可疾尋殺之此蟲飛極快遲則不及若花頭垂軟即看四圍鉗處用指甲摘去過傷處一二寸免致傷此一本此蟲一嚙即生子梗上變作蛀蟲從損處劈開中有小蟲可撚殺之黃梅雨中濕熱時候葉底生蟲名象幹蟲青色如蠶食葉上半月在葉根之上幹下半月在葉根之下幹破幹取之旋以紙撚縛住常以水潤之花亦無恙至六七月雨過時又生細細青綿蟲食頭此蟲極難尋見可先看葉下有蟲糞如沙泥即蟲生處覓去之高僅三尺許摘苗之後小暑至秋分時常要看節邉蛀孔有蟲在内用針或鐵線插入孔上半月向上搜下半月向下搜蟲死即好枝上生蠏蟲用桐油圍根上蟲自死癃頭者曰菊蟻以鱉甲置旁引出棄之瘠枝者曰黑蚰以麻裹筋頭輕捋去之無故葉黃色憔悴土内必有蠐螬或蚯蚓食根可用鐵鈎㧓開根下土泥尋蟲殺之或以石灰水灌過以河水解之喜蛛侵腦當去其絲又防節眼内生蟲亦以鐵絲搜殺之蕊將發頭或蕊腦已發上生黑青莠蟲可用棕刷拂去間用茅灰摻蟲或以魚腥水灑之或將洗鮮魚水或死蟹水灑之葉上或種韭薤蔥蒜于菊根傍皆去蟲法也常要除去蜒蚰則苗葉可免傷害菊無染色藍墨二色傳有染法湏先多種一捧雪銀芍藥月下白三種花蕊將開用金墨研濃下油一二㸃或和以乳汁用牙刷濺墨剉入蕊心待露過夜次早又染凡三四遍則花墨色藍用新收青綿夜至露中候濕次早絞綿色水滴蕊中心開時花作藍色一法用磠砂一二釐入水用五色顔料俱可染花極易入瓣但花不耐久即便凋萎真賞者不取或於九月收霜貯瓶埋之土中菊有含蕊調色㸃之透變各色或取黃白二色各披半邉用麻紥合所開花朶半白半黄如欲催花於大蕊時罩龍眼殻先於隔夜澆硫黄水次早去殻花即大開依法留之可至春初馬糞釀水亦可花忌忌燥寒燥熱天色忌大風大雨烈日忌四圍高墻忌地勢汙下忌貪多助長如用礶口硫黄馬勃催放藥物之類忌孤高無傍枝忌四面一齊似燈籠様忌圈縛盤結忌麝臍觸犯附錄繡線菊増史鑄菊譜繡線菊厭草花是也花頭碎紫成簇而生心中吐出素縷如線之大自夏至秋有之俗呼為厭草花或云若人帶此花賭則獲其勝故名之古有厭勝法也附錄藍菊原藍菊花單薄而小其萼黄附錄䨇鸞菊原䨇鸞菊一名鴛鴦菊即烏啄苗花開甚多每朶頭若僧帽拆此帽内露䨇鸞並首形似無二外分二翼一尾春分根種附錄丈菊原丈菊一名西番菊一名迎陽花莖長丈餘幹堅麤如竹葉類蔴多直生雖有傍枝只生一花大如盤盂單瓣色黃心皆作窠如蜂房狀至秋漸紫黑而堅取其子種之甚易生花有毒能墮胎附錄七月菊原七月菊外夾瓣中鑲瓣突起如紫薇花色如茄花徑寸有半厚寸餘其葉似五月翠菊六七月花一株不過數朶高僅一二尺附錄翠菊原翠菊一名佛螺一名夏佛頂蓓蕾重附層疊似海石榴花其花外夾瓣翠而紫中鈴萼而黄徑寸有半開於四五月每雨後及晡時光麗如翠羽開最乆葉青而澤似馬蘭香甚亞深莖毛而紅株幹肥勁高可二三尺八月種子御定佩文齋廣羣芳譜卷五十一
