body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十二花譜雞冠增花史雞冠花俗名波羅奢花碧雞漫志吳蜀雞冠有一種小者髙不過五六寸目曰後庭花原有掃帚雞冠有扇面雞冠有纓絡雞冠有深紫淺紅純白淺黃四色又有一朵而紫黃各半名鴛鴦雞冠又有紫白粉紅三色一朵者又有一種五色者最矮名夀星雞冠扇面者以矮為佳帚樣者以髙為趣今處處有之三月生苗入夏髙者五六尺矮者才數寸其葉青柔頗似白莧菜而窄􅕏有赤脈紅者莖赤黃者白者莖青白或圓或扁有筋起六七月莖端開花穗圓長而尖者如青箱之穗扁卷而平者如雄雞之冠花大有圍一二尺者層層疊卷可愛穗有小筒子在其中黑細光滑與莧實無異花最耐久霜後始蔫苗花子氣味俱同甘寒無毒主治瘡痔及血病止腸風瀉血赤白痢崩中帶下分赤白用子入藥須炒彚考原楓窗小牘雞冠花汴京謂之洗手花中元節前貌童唱賣以供祖先增花經雞冠八品二命花木考蘇黃門詠雞冠花詩後庭花草盛憐汝繫興亡世遂以雞冠為玉樹後庭花不知世説諸書有蒹葭倚玉樹語杜少陵飲中八仙歌復有皎如玉樹臨風前之句玉樹一種斷非草本或又謂花經所載别有後庭豈花名後庭而以玉樹嘉之耶且宋元以來或以為山礬或以為瑒花楊用修王敬美復以為丁香梔子雞冠之説何可盡信也原花史解縉嘗侍上側上命賦雞冠花詩縉曰雞冠本是胭脂染上忽從袖中出白雞冠云是白者縉應聲曰今日如何淺淡妝只為五更貪報曉至今戴却滿頭霜集藻賦增明仲𢎞道雞冠花賦并序百卉以雨露為生簷下則雨露減矣乃雨露減者霜霰亦減當草枯木落之時此花反得因簷下而晚盛嗚呼嗇于此者豐于彼造化生物之盈虧固如是其難料也人奈何以目前之菀枯定將來之榮落邪因作賦以紀之聿觀桃李豔春荷蕖吐夏秋桂霜迎冬梅雪迓夢草開晨睡蓮閉夜候既至而芬芳蘂欲敷而莫假爰有一花在欄之下鸂鶒為羣鴨鳬作亞丹同鶴頂冠非鶡野狀毰毸而不飛類翰音而實啞乃生長于階除托根株于簷厦日光射兮無多雨露霏兮亦寡方其炎蒸甫歇金風乍颸羣株炫采爛焉盈枝爾乃瘦梗寒條較芙蓉而更寂疏根朗葉對籬菊其多思似班姬退處夫長門如苧蘿幽閉乎西施逮夫青霜降兮木落白露瀼兮草萎衆卉兮凋謝爾獨映乎條枚涼飇凛溧兮摧之不能摧風霰飄零兮欺之不可欺爾于是強項獨發傲骨生姿朱紫奮采黃白爭竒瓣如扇而半疊子似綴而分披露盤擎兮五色仙掌搖兮九疑胡前者之偃蹇而後者之陸離余仰而思俯而惟識造物之有定理豈苦樂而無等夷然則前之偃蹇也如寧戚之扣角如百里奚之炊扅又如蘇武之吞氊卧雪王章之涕泣牛衣後之陸離也如唐且華顛而為秦相吕尚皓首而作周師更如張蒼七十而稱漢佐王祥六十八而遇晉知先者未必為幸後者不足云遲苦者乃所釀樂樂者適足增癡物有循環之數人無長盛之時茲一微卉兮且然豈榮枯禍福兮而造化乃有所私五言古詩原宋梅堯臣雞冠神農記百卉五色異甘酸乃有秋花實全如雞幘丹籠煙何聳聳泫露更團團取譬可無意得名殊足觀逼真歸造化任巧即雕剜赤玉書留魏丹砂句誦韓誠能因物比誰謂入時難有客驅辭頴臨風運筆端嘗嗟古吟闕每惜此芳殘揣情苦精妙繼音慚未安增孔平仲雞冠我初種雞冠其小乃毫芒曽未得幾時忽已過我長根株既猥大枝葉亦開張吐花凌朝曦生意殊未央隂風自西來慘淡驅清霜一夜忽變故葉萎花已黃當此繁盛時為爾償壺觴及今乃腐草好玩安可常呼童盡翦拔時恐踐踏傷庭除稍曠濶耳目加清涼竹枝久蒙蔽迥立獨蒼蒼原無名氏雞冠秋至天地閉百芳變枯草愛爾得雄名宛然出陳寶未甘階墀陋肯與時節老赤玉刻縝栗丹芝謝雕稿鮮鮮雲葉卷粲粲鳬翁好由來名實副何必榮華早君看先春花浮浪難自保增元郝經雞冠夷則播新律卉木協秋候綰結流火餘的皪金天宿峩峩列庭除摘摘儼雄秀炎帝朝火官絳幘軒宇宙植立竟不拜離披擁青袖奕葉初類莧吐心漸如豆脈絡引絲起一片珊瑚瘦雲芝茁紅腴紫茵卷翠脰碎顆蹙丹砂肉綻殷血透怒割赤龍耳徑磔還亂糅麻葉薄且聳山字缺乃覆查牙欲成角擁腫下連咮生全餘小穗展盡帶殘皺昂藏偃膺髙突兀出羣驟還將早霞映欲向朝日雊月露終夜栖風雨幾回鬭再礪復自止交退誰與救區區間草花象物與接搆弭兵日觀戰亦是自貽咎垂簾且相忘髙枕卧清晝七言律詩增宋歐陽徹和世弼雞冠花芳名從古號雞冠赭􅀈醒然却一般不語宋窗何足賣難通函谷漫勞看倚風縱有如丹頂遇敵應無似錦翰空費栽培汚庭砌到頭不若植芝蘭原明何棟如詠雞冠花日下飛來孰可儔雲中養就氣偏柔懶施金距當雄敵為戴霞冠慕逺逰獨立莓苔間伴鶴卑栖蘋藻靜羣鷗何如化作幽人夢啼破三湘萬古愁五言絶句增宋范成大題張希賢畫雞冠號名極形似摹寫與真逼聊以畫滑稽慰我秋園寂七言絶句原唐羅鄴雞冠花一枝濃艷對秋光露滴風搖倚砌旁曉景乍看何處似謝家新染紫羅囊宋孔平仲種花口號幽居裝景要多般帶雨移花便得看禁奈久長顔色好繞階更使種雞冠王令白雞冠如飛如舞對瑶臺一頂春雲若翦裁誰教移根蓂莢畔玉雞知應太平來趙企詠雞冠花秋光及物眼猶迷著葉婆娑擬碧雞精采十分佯欲動五更只欠一聲啼楊萬里雞冠花出墻那得丈髙雞只露紅冠隔錦衣却是吳兒工料事會稽真箇不能啼陳倉金碧夜雙斜一隻今栖紀渻家别有飛來矮人國化成玉樹後庭花錢熙雞冠花亭亭髙出竹籬間露滴風吹血未乾學得京城梳洗樣舊羅包却緑雲鬟趙山臺雞冠花木雞不與衆雞同曽逐旌陽上碧空學得仙家餐玉法至今木血不能紅楊巽齋雞冠花擢擢髙花血染猩却憐金距起間爭宋家忩下宜栽此莫問臨風不解鳴增元姚文奐題畫雞冠花何處一聲天下白霜華晚拂絳雲冠五陵鬭罷歸來後獨立秋亭血未乾詩散句原宋百氏集雨餘疑飲啄風動欲飛鳴對立如期鬭初開若欲飛增明沈周髙冠紅突兀獨立似晨雞原宋黃庭堅紫冠黃細網絲窠蝶繞蜂圍奈晚何楊萬里有時風動頭相倚似向階前欲鬬時郭應祥而風吹得一枝生昻首風前不飛去别録原種植清明下種喜肥地用簸箕扇子撒種則成大片髙者宜以竹木架定庶遇風雨不摧折卷曲水仙增長物志水仙六朝人呼為雅蒜南陽詩注此花外白中黃莖幹虛通如蔥本生武當山谷間土人謂之天蔥原水仙叢生下濕地根似蒜頭外有薄赤皮冬生葉如萱草色緑而厚春初于葉中抽一莖莖頭開花數朵大如簪頭色白圓如酒杯上有五尖中承黃心宛然盞樣故有金盞銀臺之名見洛陽花木記其花瑩韻其香清幽一種千葉者花片卷皺下輕黃上淡白不作杯狀世人重之指為真水仙一云單瓣者名水仙千瓣者名玉玲瓏本草云蓋一物二種耳學圃餘疏云以單葉者為貴出嘉定短葉髙花最佳種也亦有紅花者此花不可缺水故名水仙根味苦微辛寒滑無毒治癰腫及魚骨鯁花作香澤塗身理髮去風氣彚考增三餘帖和氣旁薄隂陽得理則配元榮于庭配元即今水仙花也一名儷蘭一曰女星散為配元內觀日疏姚姥住長離橋十一月夜半大寒夢觀星墜于地化為水仙花一叢甚香美摘食之覺而産一女長而令淑有文因以名焉觀星即女史在天柱下故迄今水仙花名女史花又名姚女花集異記薛䕩河東人幼時于窗櫺內窺見一女子素服珠履獨步中庭歎曰良人遊學艱于會面對此風景能無悵然于袖中出畫蘭卷子對之微笑復淚下吟詩其音細亮聞有人聲遂隱于水仙花下忽一男子從叢蘭中出曰娘子久離必應相念阻于跬步不啻萬里亦歌詩二篇歌已仍入叢蘭中䕩苦心強記驚訝久之自此文藻異常一時傳誦謂二花為夫婦花原清冷傳湯夷華隂人服水仙八石為水仙是名河伯增三柳軒雜識水仙為雅客學圃餘疏水仙宜置瓶中前接蠟梅後接江梅真嵗寒友也瓶史水仙神骨清絶織女之梁玉清也瓶花譜水仙一品九命原花史謝公夢一仙女畀水仙花一束明日生謝夫人長而聰慧能吟詠唐元宗賜虢國夫人紅水仙十二盆盆皆金玉七寶所造宋楊仲囦自蕭山致水仙一二百本極盛乃以兩古銅洗萟之學洛神賦體作水仙花賦集藻賦增宋髙似孫水仙花前賦有序水仙花非花也幽楚窈眇脫去埃滓全如近湘君湘夫人離騷大夫與宋玉諸人世無能道花之清明者輒見乎辭天以一而生神坎以習而成元泄沖奧以致潤抱孤貞以成妍禹何知以能海羲何神而開乾際壑氣之無畔壯英心之自仙悲莫悲乎巫咸之鄉哀莫哀乎原胥之淵迅英挺以如濯肯徘徊而自憐至若鮫館截綃而凝霜貝庭含璣而媚川蒼茫乎三島之接霧杳眇乎十洲之滙天雲雨間霽水空澄鮮一色如磨萬波不顛亦有帝女兮泣竹湘君兮鼓絃神妃兮解佩冰夷兮扣舷是皆凝姿約素挺粹含娟以婉自將以淑相宣芳以氣屬妙以辭傳指北渚以將下薄西津而驟旋或搴芳若或采佳荃有蘭可餐有蘋可搴于是樂極忘歸塵空失蠲萬慮俱泯餘情獨筌扣冰娥以勺鮮訪瑶母而潔􅀈挹水星以請命託神祇而垂甄已矣乎超萬劫以自蛻麗一徽而獨涓懷琬琰以成潔抱雪霜以為堅參至道以不死秉至精而長年是蓋苞水德之靈長合五行之自然者乎水仙花後賦有序余既作前水仙賦疑不足以泄余之情者乃依稀洛神賦為後辭尚庶幾乎余從太史遊覽山川泛瀟汨下澧沅摩嶷雲息梧煙嵗莫天寒僕痡車顛爾乃釋鑣乎茝涯進秣乎芝㕓周旋乎荆滸騁望乎湘淵于是神疑目駭心離意惻即之戃恍適焉髣佛覩一美人于水之側乃拊從者而訊之曰汝有識于彼者乎彼何人者甚間且潔也從者進曰僕聞茲水之靈曰湘夫人然則太史公之所遇其或是乎其形維何僕願知之余告之曰其狀也皓如鷗輕朗如鵠停瑩浸玉潔秀含蘭馨清明兮如閬風之翦雪皎淨兮如瑶池之宿月其始來也炯然層冰出蛟壑其徐進也粲然清霜宿瓊枝沈詳弗矜燕婉中度不穠不纖非怨非訴美色含光輕姿約素瓌容雅態芳澤不汚素質窈裊流暉㛹娟抱德貞亮吐心芳蠲婉嫿幽靜志泰神間柔于修辭既丰且鮮飭躬被服稽圖合章峨五采之英珥兮錯九芝之明璫舞碧霓之修帶兮妥英雲之輕裝顔有鍊而如灼體非薰而彌香沐姱容之練練乘清氣之徜徉于是舒懷肆逸且娛且顰羽蓋醫映翠旄繽紛軃金搖之欲墮兮玩晴洲之青蘋余衷耽其靜孌兮黯淡蕩而馳神媒不靈于締歡兮託湘波以通勤暢中靈之胥悟兮捐余璫于水濱懿玉儀之靜莊允約矩而應規輕瑶華而不御兮指二南而揚詩謂皎日之可鑒兮非暗室之自欺數解佩之夙遇兮風嫋嫋而凝思志貞介而言妙兮誓守禮以將之於是靈修竦然嬿婉徘徊拊孤影以欲翥心將飛而仍回褰蓀幬之芳烈燕芷房之玫瑰感幽志之悽激兮喟揚音而彌哀爾乃衆真縹渺並遊嘯侣或濟西澨或臨北渚或采幽蘅或茹芳杜約洛川之神妃會巫隂之竒女清莫清乎姮栖愁莫愁乎牛渚媠輕裾之裔裔泠清飇而雲舉體迅飛鴻俶若輕雲流睇橫波餘芳氤氲其度有則不顛不危優柔靡忒必兢必祇溫乎如玉曄分陸離精采相授羌余其悲于是川后斂飇冰夷却濤龍伯獻珠鮫人貢綃躍三虯以指塗蕤蒼芝而夾御雙螭帖其馴乘儼華斿之布濩鴛鴦嘯而先驅翡翠翼而齊騖于是趨彭蠡過洞庭洗月轂飛星軿流清聲而吐竒誦坤乾之大經畫三靈而不汨潛一意而長醒恍揚袂以如失雪微汍而霑纓拊佳期之不來日冉冉而西征敻微素之孰寄誰其將余英瓊揚清波而微注指潛淵而自驚恍精采之相授迄難陳其餘情于是遊倦思歸路異神留遺思杳眇寤寐好逑蹇悠悠而何之指寒川而薄憩蘭菲菲而襲余睇碧雲而搖曳信心會而神交豈綢繆之未契竦僕夫之警余命速駕乎蘭枻其毋惑于所悅當陳古而為之制元任士林水仙花賦眇伊人之蟬蛻兮宅清泠以為扉越蓬隔弱窅不知其幾千里兮跂余望之忽軒窗之翠碧兮見此綽約之芳姿曳青蔥之華裾兮倚玉薤之披披逍遙清霜之夕徘徊明月之辰佩乞碧霞衣紉緑雲金杯盥雨玉盤承津㪺和注淳斟酌天均于時庭空人靜萬竅不作聲沉步虛之歌奏杳鈞天之樂江妃具俎以進羞海若充賔而酬酢持杜觶而未揚想堂中之歡樂余亦洗盞更酌接芳蕤而為客縱歌頽然不知天河之既落明姚綬水仙花賦伊昔涪翁夙罹謫逐行邁阻修浮水奔陸方歸與以息駕乃燕坐于蔀屋惟是屋也依髙山臨大江影薄髙雲聲飛怒瀧敞宇衡門洞乎八窗式遣懷于吟嘯忽有都乎神娏爾乃乍近乍遙水面微步羅襪生塵綃裳沾露腰纖弱蘭脣冶樊素匪揚桂旗匪踏神魚遽引遽却或疾或徐袖翩翻兮婉娩帶繚繞兮紓舒悵數年之獨往鄙良夜以鰥居矯望延佇掠盻躊躇泛若斷梗浮猶馮虛乃若貼金蓮于玉趾眷茲樂胥于焉邇止瑪瑙坡荒仙王祠圯睇梅兄于嶺頭懷礬弟于澗涘進左右而諗之曰水上步月彼其仙邪惟炫素質不御鉛華中有金蕤輕蒙臂紗衝斥暮雨揮霍朝霞爾或見之而豈吾之過誇邪左右屏息對曰彼之來斯誠類仙子馨香芬芳容光旖旎其綽約也儼藐姑之神其聫娟也齊洛川之子初雖瞻馳終莫摹擬是則主人之所見僕輩之所跂者也于是之時涪翁啞然而作聲彼人泯然而無迹江風惟清江月自白倀倀何之翳翳寢息晨興向明躑躅于庭忽幽花之托根依后土以降靈胡然生之大瘦嵗晏流形宋玉招魂之賦莊周夢蝶之經翁遄作詩調同金石有頃比夕載驗厥迹無被花之懊惱出門一笑而橫大江之空碧五言古詩增宋陳與義詠水仙花五韻仙人緗色裘縞衣以裼之青幌紛委地獨立春風時吹香洞庭暖㺯影清晝遲寂寂籬落隂亭亭與豫期誰知園中客能賦會真詩朱子賦水仙花隆冬凋百卉江梅厲孤芳如何蓬艾底亦有春風香紛敷翠羽帔溫靘白玉相黃冠表獨立淡然水仙裝弱植愧蘭蓀髙標摧冰霜湘君謝遺褋漢水羞捐璫嗟彼世俗人欲火焚𠂻腸徒知慕佳冶詎識懷貞剛淒涼柏舟誓惻愴終風章卓哉有遺烈千載不可忘陳傅良水仙花江梅丈人行嵗寒固天姿蠟梅微著色標致亦背時胡然此柔嘉支本僅自持乃以平地尺氣與松篁夷粹然金玉相承以翠羽儀獨立萬稿中冰膠雪垂垂水仙誰強名相宜未相知刻畫近脂粉而况山谷詩吾聞抱太和未易形似窺當其自英華造物且霽威平生恨剛褊未老齒髮衰掇花置膽瓶吾今得吾師許仲企水仙花定州紅花瓷塊石藝靈苗芳苞茁水仙厥名為玉霄適從閩越來緑綬擁翠條十花冒其顛一一振鷺翹粉蕤間黃白清香從風飄回首天台山更識膽瓶蕉七言古詩原宋黃庭堅王充道送水仙花五十枝凌波仙子生塵襪水上盈盈步微月是誰招此斷腸魂種作寒花寄愁絶含香體素欲傾城山礬是弟梅是兄坐對真成被花惱出門一笑大江橫五言律詩增元錢選水仙花圖帝子不沉湘亭亭絶世妝曉煙橫薄袂秋瀨韻明璫洛浦應求友姚家合讓王殷勤歸水部雅意在分香七言律詩增宋韓維謝到水仙二本黃中秀外幹虛通乃喜嘉名近帝聰密葉暗傳深夜露殘花猶及早春風拒霜已失芙蓉艷出水難留菡蓞紅多謝使君憐寂寞許教綽約伴山翁楊萬里詠千葉水仙花并序世以水仙為金盞銀臺蓋單葉者其中有一酒盞深黃而金色至千葉水仙其中花片捲皺密蹙一片之中下輕黃而上淡白如染一截者與酒杯之狀殊不相似安得以舊日俗名辱之要之單葉者當命以舊名而千葉者乃真水仙云薤葉蔥根兩不差重蕤風味獨清嘉薄揉肪玉圍金鈿細染鵝黃剩素紗臺盞原非千葉種丰容要是小蓮花向來山谷相看日知是他家是當家水仙花生來弱體不禁風匹似蘋花較小豐腦子醲熏衆香國江妃寒損水晶宫銀臺金盞談何俗礬弟梅兄品未公寄語金華老仙伯凌波仙子更凌空原劉克莊水仙花嵗華搖落物蕭然一種清風絶可憐不許淤泥侵皓素全慿風露發幽妍騷魂灑落沉湘客玉色依稀捉月仙却笑浩翁太脂粉誤將髙雅匹嬋娟增元仇逺題趙子固水墨雙鈎水仙卷冰薄沙昏短草枯采香人逺隔湘湖誰留夜月羣仙珮絶勝秋風九畹圖白粲銅盤傾沆瀣青明寶玦碎珊瑚却憐不得同蘭蕙一識清醒楚大夫鄧文原題趙子固水墨雙鈎水仙卷仙子凌波佩陸離文魚先乘殿馮夷積冰斫雪揚靈夜鼓瑟吹竽會舞時海上瑶池春不斷人間金碗事堪疑天寒日暮花無語清淺蓬萊當問誰原明屠隆詠水仙花娟娟湘洛淨如羅幻出芳魂儼素娥夜靜有人來鼓瑟月明何處去凌波蕭疏冷艷冰綃薄綽約風鬟露氣多直是靈根堪度世妖容知不傍池荷梁辰魚詠水仙花幽修開處月微茫秋水凝神黯淡妝繞砌霧濃空見影隔簾風細但聞香瑶壇夜靜黃冠濕小洞秋深玉珮涼一假凌波堪畫處至今詞賦憶陳王五言絶句增宋楊萬里水仙花韻絶香仍絶花清月未清天仙不行地且借水為名開處誰為伴蕭然不可鄰雪宫孤弄影水殿四無人原明于若瀛詠水仙水花垂弱蒂嫋嫋緑雲輕自足壓羣卉誰言梅是兄增王榖祥水仙花仙卉發璚英娟娟不染塵月明江上望疑是弄珠人瑶環月下鳴翠帶風中舉胡然洛浦神胡然漢濵女陳淳水仙玉面嬋娟小檀心馥郁多盈盈仙骨在端欲去凌波荒圃淑氣回寒柯發光澤下有白玉花玲瓏映深碧七言絶句御製見案頭水仙花偶作二首翠帔緗冠白玉珈清姿終不汙泥沙騷人空自吟芳芷未識凌波第一花冰雪為肌玉錬顔亭亭如立藐姑山羣花只在軒忩外那得移來几案間增宋陳搏詠水仙花湘君遺恨付雲來雖墮塵埃不染埃疑是漢家涵德殿金芝相伴玉芝開劉攽水仙花早于桃李晚于梅冰雪肌膚姑射來明月寒霜中夜靜素娥青女共徘徊黃庭堅共郡送水仙花并二大本折送東園粟玉花併移香本到寒家何時持上玉宸殿乞與官梅定等差劉邦直送水仙花得水能仙天與竒寒香寂寞動冰肌仙風道骨今誰有淡掃蛾眉篸一枝錢塘昔聞水仙廟荆州今見水仙花暗香靚色撩詩句宜在林逋處士家次韻中玉水仙花二首借水開花自一竒水沉為骨玉為肌暗香已壓荼䕷倒只此寒梅無好枝􅌎泥已作白蓮藕糞壤能開黃玉花可惜國香天不管隨緣流落野人家張耒賦水仙花宫樣鵝黃緑帶垂中州未省見仙姿只疑湘水綃機女來伴清秋宋玉悲范成大次韻龔養正送水仙花色界香塵付八還正觀不起况邪觀花前猶有詩情在還作凌波步月看楊萬里水仙花江妃虛却蘂珠宫銀漢仙人謫此中偶趁月明波上戲一身冰雪舞東風額間拂煞御袍黃衣上偷將月姊香待倩春風作媒妁西湖嫁與水仙王張孝祥和人詠水仙花二首瘴土風煙那有此只疑姑射是前身仙風道骨難消得付與霜臺衣繡人淨色只應撩處士國香今不落民家江城望斷春消息故遣詩人詠此花朱子用子服韻謝水仙花水中仙子來何處翠袖黃冠白玉英報道幽人被渠惱著詩送與老難兄薑特立水仙六出玉盤金屈巵青瑶叢裏出花枝清香自信髙羣品故與江梅相並時徐似道水仙花二首天然初不事鉛華此是無塵有韻花翠帶詎容縈俗客金杯只合勸詩家林下清風自一家稍親梅竹近蘭芽只緣羞與凡花伍移植名園不肯花遊寒巖水仙花二首金玉其相一兩花遐心空為爾興嗟山礬不用來修敬只許江梅共一家黃琮白璧綴幽花珍重髙人為嘆嗟織女橫河溪月墮杯盤狼籍水仙家來氏水仙花二首瑶池來宴老仙家醉倒風流萼緑華白玉斷笄金暈頂幻成癡絶女兒花花盟平日不曾寒六月曝根髙處安待得秋殘親手種萬姬圍繞雪中看元張伯淳題趙子固水仙圖裙長帶裊寒偏耐玉質金相密更竒見畫如花花似畫西興渡口晚晴時陳旅題水仙花圖莫信陳王賦洛神凌波那得更生塵水香露影空清處留得當年解珮人袁士元水仙醉欄月落金杯側舞倦風翻翠袖長相對了無塵俗態麻姑曽約過潯陽姚文奐題虞瑞巖描水仙花離思如雲賦洛神花容婀娜玉生春凌波襪冷香魂逺環珮珊珊月色新原倪瓉水仙花曉夢盈盈湘水春翠虯白鳯照江濵香魂莫逐冷風散擬學黃初賦洛神增丁鶴年水仙花二首湘雲冉冉月依依翠袖霓裳作隊歸怪底香風吹不斷水晶宫裏宴江妃影娥池上曉涼多羅襪生塵水不波一夜碧雲凝作夢醒來無奈月明何明李東陽題水仙淡墨輕和玉露香水中仙子素衣裳風鬟霧鬢無纒束不是人間富貴妝原文徴眀水仙羅帶無風翠自流晚寒微軃玉搔頭九疑不見蒼梧逺憐取湘江一片愁增杜大中水仙二首玉貌盈盈翠帶輕凌波微步不生塵風流誰是陳思客想像當年洛水人靈雨濛濛幻態輕驚魂想像逝懷傾願將玉珮遙相逐脫骨逍遙水上人張新水仙花玉質金相翠帶圍霜華月色共輝輝江妃方欲凌波去漢女初從解珮歸孫齊之水仙花碧江香和楚雲飛銷盡冰心粉色微乍向月中看素影却疑波上步靈妃鍾惺暮春水仙花偶向殘冬遇洛神孤情只道立先春今從九月過三月疑是前身與後身物值同時妒亦宜梅花今見子離離相逢洞口千紅裏素影當前君不知萬花如焰柳如煙常恐冰綃畏不前曽在水邉衣不濕可知入火不能然每笑梅花太畏喧一身自許厯寒溫春風特念冰霜後邀與春花共慰存詩散句原宋僧船窗如聞交佩解疑是洛妃來朔吹欺羅袖朝霜滋玉臺徐致中薤葉秀且聳蘭香細而幽林洪翠帶拖雲舞金巵照雪斟增鄭清之玉昆相倚帶仙風壁立春前萬卉空錢協碧玉簪長生洞府黃金杯重壓銀臺僧北澗華裾冉冉低香綬柔玉稜稜襯嫩金原徐似道曉風洛浦凌波際夜月江臯解珮時詞增宋趙溍長相思金璞明玉璞明小小杯柈翠袖擎滿將春色盛仙佩鳴玉佩鳴雪月花中過洞庭此時人獨清原盧祖臯卜算子珮解洛波遙弦冷湘江渺月底盈盈誤不歸獨立風塵表窗綺護幽妍瓶玉扶輕裊到後知誰語素心寂寂山寒峭增謝薖菩薩蠻相思一夜庭花發窗前忽誤生塵襪曉起艷寒妝雪肌生暗香佳人纖手摘手與花同色插鬢有誰宜除非潘玉兒原髙觀國菩薩蠻雲嬌雪妒羞相倚凌波共酌春風醉的皪玉壺寒肯教金盞單只疑雙蝶夢翠袖和香擁香外有鴛鴦風流煙水鄉增無名氏菩薩蠻人人盡道黃葵淡儂家解説黃葵艷可喜萬般宜不勞朱粉施摘承金盞酒勸爾千春夀擎作女真冠試伊嬌面看又髙梧葉下秋光晚珍叢花出黃金盞還似去年時傍欄三兩枝人情須耐久花面長依舊莫學蜜蜂兒等間悠揚飛原曾惇朝中措幽芳獨秀在山林不怕曉寒侵應笑錢塘蘇小語嬌終帶吳音乘槎歸去雲濤萬頃誰是知心寫向生綃屏上蕭然伴我寒衾又緑華居處渺雲深不受一塵侵細看宜州新句平生才是知音凌波一去平生夢斷誰最關心惟有青天碧海知渠夜夜孤衾增無名氏偷聲木蘭花景陽樓上鐘聲曉半面啼妝勻未了殘月紛紛斜影幽香暗斷魂玉顔應在昭陽殿却向前村深夜見冰雪肌膚還有斑斑雪點無南歌子翠袖熏龍腦烏雲映玉臺春蔥一簇屬金杯曽記西樓同醉角聲催嫋嫋凌波淺深深步月來隔紗微笑恐郎猜素艷濃香依舊去年開馬莊父天仙子白玉為臺金作盞香是江梅名閬苑年時把酒對君歌歌不斷杯無算花月當樓人意滿翹戴一枝蟬影亂樂事且隨人意換西樓回首月明中花已綻人何逺可惜國香天不管原髙觀國金人捧露盤夢湘雲吟湘月弔湘靈有誰見羅襪塵生凌波步穩背人羞整六銖輕娉娉裊裊暈嬌黃玉色輕明香心靜波心冷琴心怨客心驚怕珮解却返瑶京杯擎清露醉春蘭交與梅兄蒼煙萬頃斷腸是雪冷江清增陳允平念奴嬌漢江露冷是誰將瑶瑟彈向雲中一曲清泠聲漸杳月髙人在珠宫暈額黃輕塗腮粉艷羅帶織青蔥天香吹散珮環猶自丁東回首杜若汀洲金鈿玉鏡何日得相逄獨立飄飄煙浪逺羅襪羞濺春紅渺渺豫懷迢迢良夜三十六陂風九疑何處斷魂飛度千峯周密花犯楚江湄湘娥乍見無言灑清淚淡然春意空獨倚東風芳思誰記凌波路冷秋無際香雲隨步起謾記漢宫仙掌亭亭眀月底冰絃寫怨更多情騷人恨枉賦芳蘭幽芷春思逺誰賞國香風味相將共嵗寒伴侶小窗淨沉煙熏翠被幽夢覺涓涓清露一枝燈影裏趙聞禮水龍吟幾年埋玉藍田緑雲翠水烘春暖衣薰麝馥襪羅塵沁凌波步淺鈿碧搔頭膩黃冰腦參差難翦乍聲沉素瑟天風珮冷蹁躚舞霓裳遍湘浦盈盈月滿抱相思夜寒腸斷含香有恨招魂無路瑶琴寫怨幽韻淒涼暮江空渺數峯清逺粲迎風一笑持花酹酒結南枝伴王沂孫慶宫春明玉擎金纖羅飄帶為君起舞回雪柔影參差幽芳零亂翠圍腰瘦一捻嵗華相誤記前度湘臯怨别哀絃重聽都是淒涼未須彈徹國香到此誰憐煙冷沙昏頓成愁絶花惱難禁酒消欲盡門外冰澌初結試招仙魄怕今夜瑶簮凍折攜盤獨出空想咸陽故宫落月趙雪齋金盞子得水能仙向漢臯遺佩碧波涵月藍玉暖生煙稱縞袂黃冠素姿冰潔亭亭獨立風前奈香多愁絶當時事琴心妙處雖傳有誰堪説嵗晚杳無人更短景繁雲天欲雪瀟湘煙水茫茫但萬里相思寒江空濶殷勤折向梅邉聽玉龍吹徹丁寧道惟願百年兄弟相看晚節原辛棄疾賀新郎雲卧衣裳冷看蕭然風前月下水邉幽影羅襪塵生凌波步湯沐煙波萬頃愛一點嬌黃成暈不記相逢曽解珮甚多情為我香成陳待和淚揾殘粉靈均千古懷沙恨想當初匆匆忘把此花題品煙雨淒迷僝僽損翠袂遙遙誰整謾寫入瑶琴幽憤絃斷招魂無人賦但金杯的皪銀臺潤愁殢酒又還醒别録原種植五月初收根用小便浸一宿曬乾拌濕土懸當火煙所及處八月取出瓣瓣分開用豬糞拌土植之植後不可缺水起時種時若犯鐵器永不開花訣云六月不在土七月不在房栽向東籬下寒花朵朵香又云和土曬半月方種以收陽氣覆以肥土白酒糟和土澆之則茂于若瀛曰水仙江南處處有之惟吳中嘉定種為最花簇葉上他種則隱葉內耳蓄種囊以紗懸于梁間風之未播先以敝草履寸斷雜溲浡浸透俟有生意方入土以入土早晚為花先後金陵即善植者十叢不一二花余每嵗向友人乞三四莖置齋頭香可十日茲十日者縱非風雨亦不易出齋頭也水仙花以精盆植之可供書室雅玩愛護霜重時即搭棚遮蓋以避霜雪向南開一門天晴日暖則開之以承日色北方土寒凡牡丹貼梗海棠皆用此法不特水仙也又法初起葉時以磚壓住不令即透則他日花出葉上杭州近江處園丁種之成林以土近鹹滷故花茂瓶插插瓶用鹽水與梅花同附録􅼡祇增酉陽雜俎􅼡祇出拂林國根大如雞卵葉長三四尺似蒜中心抽條莖端開花六出紅白色花心黃赤不結子冬生夏死取花壓油塗身去風氣本草云據此形狀與水仙髣佛豈外國名謂不同耶附録水仙樹原拘樓國有水仙樹樹腹中有水謂之仙漿飲者七日醉御定佩文齋廣羣芳譜卷五十二
