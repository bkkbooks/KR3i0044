body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十三花譜萬年花增萬年花草本小朵如盞一莖百朵其色粉紅而有紅絲雖經久乾枯及沾泥汙顔色鮮新不變御賜名曰萬年花金蓮增金蓮花出山西五臺山塞外尤多花色金黃七瓣兩層花心亦黃色碎蘂平正有尖小長狹黃瓣環繞其心一莖數朵若蓮而小六月盛開一望遍地金色爛然至秋花乾而不落結子如粟米而黑其葉緑色瘦尖而長五尖或七尖彚考增遼史營衛志道宗每嵗先幸黑山拜聖宗興宗陵賞金蓮乃幸子河避暑洛陽花木記金蓮花出嵩山頂周伯琦上都紀行詩注上都草多異花有名金蓮花者似荷而黃五臺山志山有旱金蓮如真金挺生緑地相傳是文殊聖迹集藻賦御製金蓮花賦侔嘉名于華頂結異質于清涼冠方貢之三品賦正色于中央搴芙蓉而在陸麗菡蓞于崇岡顧柳池之非偶豈蘋澗之可方煥彪炳而成文散栴檀而結燼煙橫鉢裏之香妝沐江干之靚受範公輸之規移芳彭澤之徑田田與芰蓋殊形矯矯並木蘭比徑若夫當融風之拂樹值暑雨之平池面鏡潭而寫色掩玉砌以橫枝葉潤陵晨之霧花含照夜之珠襲輕芬于衣縠映斜月於窗帷本托根于道岸曾何畏乎泥淄爾乃草鋪微緑之區蝶舞輕黃之翅沾芳則土脈流膏落蘂則蜜脾兮饋非桃李而成蹊與鞠衣而同製于是滴珠露以研黃挹金房而瀉翠玉板潤而脂融松腴蒸而雲翳摘珍産于山經表竒芳于幽閟異紅采于巖阿謝朱霞于水曲漏鐫長樂之銅壺燈燦蓬山之銀燭卑五華之仙葩超四照之靈木彼夫緑竹則稱君子青松以擬大夫澤荷載于篇什猗蘭紀于史書惟斯卉之挺秀拔衆彚而標竒感無言于空谷久掩嫮于山陂移土砧于上苑沐日月之光曦化同被于偃草忱獲效乎傾葵詞御製嶺外金蓮盛放可愛寄調柳梢青萬頃金蓮平臨難盡髙眺千般珠蹙移花翠翻帶月無暑神仙俗人莫道輕寒悠雅處餘香滿山嶺外磊落逺方隱者誰似清間茈碧花增山海經罷谷之山洱水出焉而西流注于洛其中有茈碧雲南志浪穹縣西北五里有寧河一名茈碧湖水上有花曰茈碧形如蓬而差小有白者有淺紅錦邉者葉如荷葉花葉本皆長五六丈晝則上浮夜則拳曲入底微風蕩之香氣殊常采以為羮味美于蓴集藻詩散句增明楊慎荒經海圖有往證欲拾茈碧尋靈湫九花樹增要覽九花樹生南嶽雖經霜凝寒必開時人謂之應春花萬連增崔豹古今注萬連葉如鳥翅一名鳥羽一名鳯翼花大者其色多紅緑紅者紫點緑者紺點俗呼為仙人花一名連纈花酉陽雜俎一名烏蓬金䔲花增拾遺記晉武帝為撫軍時府內後堂砌下忽生草三株莖黃葉緑若總金抽翠花條苒弱狀似金䔲有羌人姚馥字世芬充廄養馬妙解隂陽之術云此草以應金德之瑞後以府地賜張華猶有草在故茂先賦云擢九莖于漢庭美三株于兹館貴表祥乎金德比名類乎相亂紅綬花增述異記紅綬花蔓生如綬一般有文采焉優鉢曇花增梁書波斯國傳國中有優鉢曇花鮮華可愛迎輦花增拾遺録洛陽進合蒂迎輦花云得之嵩山塢中人不知名採者異而貢之會帝駕適至因以迎輦名之南部煙花記迎輦花外殷紫內素膩菲芳粉蕊心深紅跗爭兩花枝幹烘翠類通草無刺葉圓長薄其香氣穠芬馥或惹襟袖移日不散嗅之令人不多睡帝令袁寶兒持之號曰司花女金步搖增海録碎事金步搖叢生其花四出皆偶對無風常搖蓋幹弱而枝繁也靈夀花增酉陽雜俎韋絢云湖南有靈夀花數帶簇開視日如槿紅色春秋皆發非作杖者都勝花增酉陽雜俎都勝花紫色兩重心數葉卷上如蘆朵蕊黃葉細無憂花增酉陽雜俎無憂樹女人觸之花方開瘴川花增酉陽雜俎瘴川花差類海榴五朵簇生葉狹長重沓承于花底色中第一蜀色不能及出黎州按轡嶺那伽花增酉陽雜俎那伽花狀如三春無葉花色白心黃六瓣出舶上提羅迦增酉陽雜俎提羅迦樹花見日光即開拘尼陀增酉陽雜俎拘尼陀樹花見月光即開繫白象樹花增酉陽雜俎乾陀國頭河岸有繫白象樹花葉似棗季冬方熟相傳此樹滅佛法亦滅簇蝶花增酉陽雜俎簇蝶花花為朵共簇一蕊蕊如蓮房色如退紅出溫州俱郍衛增酉陽雜俎俱郍衛葉如竹三莖一層莖端分條如貞桐花小類木槲出桂州木蓮增酉陽雜俎木蓮花葉似辛夷花類蓮花色相傍出忠州鳴玉溪卭州亦有益部方物略記木蓮花生峩睂山中諸谷狀若芙蓉香亦類之木幹花夏開枝條茂蔚不為園圃所蒔雲南志木蓮花出大理府境樹髙大葉如枇杷花如蓮有青黃紅白四種彚考原四川志忠州白鶴山佛殿前唐時有木蓮二株其髙數丈其葉堅厚如桂仲夏作花每花坼時聲如破竹增黃山志木蓮花在華嚴堂前其本踰拱髙二丈花如蓮九瓣白色紫縷香如玉蘭葉經霜不雕朱實含苞內苞開實出若珊瑚新琢止慈光寺一本點蒼山記山有木蓮躑躅花樹並髙數丈春日紅白錯雜被于溪谷集藻贊增宋宋祁木蓮贊葩秀木顛狀若芙渠不實而榮馥馥其敷賦增唐無名氏木蓮賦蔽茅珍樹森林綺堂庇根天壤擢秀春光雖違性于舊國終奉恩于此鄉違性何苦主人有勿翦之怙奉恩何其主人有挈瓶之滋君既加我以惠好我亦報君以葳蕤弱其枝圓其葉亂階前之蓂莢跗緑縟萼芊茸狀中浦之芙蓉既因其理又憐其美懷香則十步必聞含笑則千金可市有實雖漏于貢納有隂足延乎憩止此木也誠則不材必姑樹其桃李七言絶句增唐白居易木蓮詩并序木蓮樹生巴峽山谷間巴民亦呼為黃心樹大者髙五丈涉冬不凋身如青楊有白文葉如桂厚大無脊花如蓮香色艷膩皆同獨房蕊有異四月初始開自開逮謝僅二十日忠州西北十里有鳴玉溪生者穠茂尤異惜其遐僻因題三絶句云如折芙蓉栽旱地似拋芍藥挂髙枝雲埋水隔無人識唯有南賔太守知紅似胭脂膩如粉傷心好物不須臾山中風起無時節明日重來得在無已愁花落荒巖底復恨根生亂石間幾度欲移移不得天教拋擲在深山畫木蓮花圖寄元郎中花房膩似紅蓮朵艷色鮮如紫牡丹唯有詩人能解愛丹青寫出與君看詩散句增明吳廷簡龍象天家錫瑶花佛地來池將空作水根以樹為臺宋濂枝懸縞帶垂金彈瓣落蒼苔墜玉杯石蓮增黃山志石蓮花略同木蓮但彼九出此五出為異花時瀰漫山谷盈目皆香雪也集藻五言絶句增唐司空曙石蓮花今逢石上生本自波中有紅艷秋風裏誰憐衆芳後洛如花增雲仙雜記吳興山中有一樹類竹而有實似莢狀鄉人見之以問陸澄澄曰名洛如花郡有文士則生太平瑞聖花增益部方物略記瑞聖花出青城山中幹不條髙者乃尋丈花率秋開四出與桃花類然數十跗共為一花繁密若綴先後相繼新蕊開而舊未萎也蜀人號豐瑞花故程相畫圖以聞更號瑞聖花然有數種其小者號寶仙淺紅者為醉太平白者名玉真成都人競移蒔囿中以為尤玩云劍南詩注天聖中獻至京師仁宗賜名太平瑞聖花集藻贊增宋宋祁瑞聖花贊衆跗聚英爛若一房有守繪圖厥名乃章繁而不豔是異衆芳五言律詩增宋范成大太平瑞聖花雪外捫參嶺煙中濯錦州密攢文杏蕊髙結綵雲毬百世嘉名重三登瑞氣浮挽春同住夏看到火西流七言絶句增宋楊巽齋醉太平花紫芝竒樹謾前聞未若此花叶氣薰種向春臺豈無象望中秀色似卿雲七寶花增益部方物略記七寶花條葉大抵玉蟬花類也其生叢蔚花葉甚茂集藻贊增宋宋祁七寶花贊擢穎挺挺盛夏則榮丹紫合英以寶見名鵝毛玉鳯花增益部方物略記鵝毛玉鳯花本至卑纖蓬如叉股秋開不花而鬢狀似禽故曰鳯色白故曰玉以其分輕故曰毛集藻贊增宋宋祁鵝毛玉鳯花贊華而無采狀類翔鳯么質毛輕翩欲飛動蟬花增益部方物略記蟬花二川山林中皆有之如蟬之不蛻至秋則花生其頭長一二寸黃碧色西溪叢語本草蟬殼謂之蟬花今成都有草名蟬花今有乾者視之乃蟬額裂面抽莖上有花也集藻贊增宋宋祁蟬花贊蟬不能蛻委于林下花生厥首兹謂物化石蟬花增益部方物略記石蟬花始生其苕森擢長二三尺葉如菖蒲紫萼五出與蟬甚類緑葉相側蜀人因名之又白者號玉蟬花集藻贊增宋宋祁石蟬花贊有苕穎然有萼敷然取其肖象莫類于蟬錦帶花增杜詩注錦帶花一名海仙花一名文官花此花出荆楚間有花如錦遂名錦帶花條如郁李春末方開紅白二色益部方物略記錦帶花蜀山中處處有之長蔓柔纖花葉間側如藻帶然因象作名花開者形似飛鳥里人亦號鬢邉嬌萬花谷貢士舉院本故勇技營有花初開白次緑次緋次紫故名為文官花石湖詩注東南甚珍此花峽中漫生山谷集藻五言古詩增宋范成大錦帶花妍紅棠棣粧弱緑薔薇枝小風一再來飄颻隨舞衣吳下嫵芳檻峽中滿荒陂佳人墮空谷皎皎白駒詩七言律詩增宋楊萬里錦帶花天女風梭織錦機碧絲池上茜欒枝何曽繫住春歸腳只解縈長客恨眉節節生花花點點茸茸曬日日遲遲後園初夏無題目小樹微芳也得詩七言絶句增宋王禹稱海仙花詩并序海仙花者世謂之錦帶維揚人傳云初得于海州山谷間其枝長而花密若錦帶然其花未開如海棠既開如木瓜而繁麗嫋弱過之一朵滿頭冠不克荷惜其不香而無子但可鈎壓其條移植他所因以釋草釋木驗之皆無有也近之好事者作花譜以海棠為花中之神仙豫謂此花不在海棠下宜以仙為號目為錦帶俚孰甚焉又取始得之地命曰海仙且賦詩三章以存其名一堆絳雪壓春叢嫋嫋長條弄晚風借問開時何所似似將繡被覆熏籠春憎窈窕教無子天為妖嬈不與香盡日含毫難比並花中應是衛莊薑何年移植在僧家一簇柔條綴綵霞錦帶為名俚且俗為君呼作海仙花楊巽齋錦帶花萬釘簇錦若垂紳圍住東風穩稱身聞道沈腰易寬減何妨留與繫青春鵠袍換緑契初心旋賜銀緋與紫金堪念紛紛名利客對花應自歎侵尋青囊花增五代史胡嶠自契丹亡歸中國略能道其所見云渡黑水至湯城淀地氣最溫多異花一曰青囊如中國金燈而色類藍可愛旱金花增五代史湯城淀地氣最溫多異花一曰旱金大如掌金色爍人上元紅增桂海虞衡志上元紅深紅色絶似紅木瓜花不結實以燈夕前後開故名泡花增桂海虞衡志泡花南人或名柚花春末開蕊圓白如大珠既折則似茶花氣極清芳與茉莉素馨相逼番人采以蒸香風味超勝枸那花增桂海虞衡志枸那花葉瘦長略似楊柳夏開淡紅花一朵數十萼至秋深猶有之水西花增桂海虞衡志水西花葉如萱草花黃夏開象蹄花增桂海虞衡志象蹄花如梔子而葉小夏開至秋深白鶴花增桂海虞衡志白鶴花形如白鶴立春開集藻七言絶句增元劉詵玉笥山中有白鶴花頂翅宛然類鶴王蘭友作詩送至用韻二首縞衣元爪立前除天上人間翦紙糊除却青青三四葉月明滿地却全無千載蘇仙上帝鄉空餘琪草似人長夜涼環珮不知處夢覺滿山風露香望仙花增洛陽花木記望仙亦名箆春集藻七言絶句增宋無名氏望仙花風捲朱簾挂玉鉤彩雲開處望仙儔妍姿不逐東風去日照斜暉上小樓金莖花增仙史元藏幾航海至一島曰滄洲上有金莖花如蛺蝶微風至則搖蕩如飛婦人採之以為首飾曰不帶金莖花不得到仙家滄洲人研花如泥竹簡彩繪與真金無異白菱花增學圃餘疏白菱花純白而雅且開久而繁人云來自閩中豫在閩問之乃無此種始在豫章得之定是嶺南花也花至季冬始盡性亦畏寒花後宜藏室中百日紅與紫薇名同物異增學圃餘疏臭梧桐者吳地野生花色淡無植之者淮揚間成大樹花微者縉紳家植之中庭或云後庭花也獨閩中此花紅鮮異常能開百日名百日紅花作長鬚亦與吳地不同園林中植之灼灼出矮牆上至生深澗中與清泉白石相映斐然奪目永嘉人謂之丁香花山丹與草本山丹名同物異增學圃餘疏初見閩人來賣一花云是紅繡毬倭國中來者後至建寧見縉紳家庭中花簇紅毬儼如翦綵名曰山丹乃閩卉也集藻七言律詩增宋劉克莊山丹偶然避雨過民舍一本山丹恰盛開種久樹身樛似蓋澆頻花面大如杯怪疑朱草非時出驚問紅雲甚處來可惜書生無事力千金移入畫欄栽七言絶句增宋陳傅良山丹軒窗一日粲三英盡室無塵眼倍明閩粵固嘗矜絶美風騷猶未及知名鄭域山丹團欒絳蕊發枝間鉛鼎成丹七返還乞與幽人伴幽壑不妨相對兩朱顔無名氏山丹亭下佳人錦繡衣滿身纓絡綴明璣晚來銷歇無尋處花已飄零露已晞煙紅露緑曉風香燕舞鶯啼春日長誰道使君貧月老繡屏錦帳咽笙簧人間花木眼曽經未識斯花狀與名丹却青山暮春色續他紅樹墜時英金鉢盂增草花譜金鉢盂似娑羅而花小夾瓣如甌紅鮮可愛集藻七言絶句增宋楊巽齋金鉢盂花恰匝枝頭簇絳英朱髹梵器上天成檻邉更插蠻薑葉依約如歸佛手擎繅絲花增草花譜繅絲花葉儼如玫瑰而色淺紫無香枝生刺針時至煮繭花盡開放故名種從根分笑靨花增草花譜笑靨花花細如豆一條千花望之若堆雪然無子可種根窠叢生茂者數十條以原根劈作數墩分種易活紫羅襴增草花譜紫羅襴草本色紫翠如鹿蔥花秋深分本栽種四月發花可愛紫花兒增草花譜紫花兒遍地叢生花亦可愛柔枝嫩葉摘可作蔬春時子種紅麥花增草花譜紅麥花麥種花妙如翦子大于麥數倍色紅可愛米篩花增藥圃同春碎米雪俗名米篩花蕾䔒花增藥圃同春蕾䔒有紅黃白三色開于春月最可扳籬當植于徑悶頭花增東還記程渡灄水至黃滸鋪陌上遍生紫花自根至顛純花少葉色如江南諸葛菜桔梗花數百里內皆有之楚人呼為悶頭花近之輒頭悶不止相戒以為不可嚮邇吳人呼為老鼠花花幹皆入藥春月採而藏之蝎子花增東還記程黔省山谷中多蝎子花龍女花增雲南志龍女花出大理府太和感通寺樹葉全似山茶蘂大而香和山花增雲南志和山花樹髙六七丈其質似桂其花白每朵十二瓣應十二月遇閏輒多一瓣俗以為仙人遺種在大理府上關和山之麓土人因以其地名之雲南娑羅花與四川娑羅花名同物異增雲南志娑羅花在會城土主廟其本類大理府和山花佛日盛開其色白微帶黃意異香芳馥非同凡花臭味中出一蘂如稗穗垂出瓣中每朵十二瓣遇閏輒多一瓣相傳髙僧以二念珠入土一珠出此樹云優曇花增雲南志優曇花在安寧州西北十里曹溪寺右狀如蓮有十二瓣閏月則多一瓣色白氣香種來西域亦娑羅花類也後因兵燹伐去遂無其種今忽一株從根旁發出已及拱矣金梅增大理府志金梅所在叢生花似梅色黃與素馨相類金縷梅增黃山志金縷梅其色金瓣如縷翩翩媕娜有若翔舞春時盛開望去疑為蠟梅撚蠟增黃山志撚蠟似梅而黃一苞具四五朵大者淺碧小者微黃三月開春桂增黃山志春桂經冬不凋枝葉皆似桂惟花五出開以三月與桂不同旌節花與黎州圖經旌節花名同物異增黃山志旌節花色黃幹似老藤一枝綴數十朵成串下垂行行如旌節故名瓔珞花增黃山志瓔珞花非黃非碧幽蒨淡冶光豔離合不定其形垂垂如柳絲其香淡泊而雋永紫雲花增黃山志紫雲花葉尖長花五出深紫色如雲承日光故名紫雲蕡桃增黃山志蕡桃枝葉花色與桃無異但趺先實耳海罽花增黃山志海罽花枝杪叢生十餘朵其瓣如苞中抽緑心遍覆石崖上花不一色淺深相錯如繡黃山故稱雲海至鋪海時花光相映爛若雲錦故有海罽之名蕊珠花增黃山志蕊珠花木未開花一朵五出又有細蕊瑣綴其下素豔多姿略有微香玉鈴花增黃山志玉鈴花髙大蘢蔥五月開白花一枝十數朵排列下垂形如玉鈴有同追琢香氣馥烈異常瑣瑣花增黃山志瑣瑣花矮樹葉尖有丫五月枝杪開細花成叢其香極幽仙都花增黃山志仙都花産仙都峯下古幹屈曲枝盡處始布葉葉長二寸許花出葉上一苞七八朵花七出而瓣不分色淡紫心抽緑絲數莖花謝即復孕三年一開開則葉下垂如相讓然四照花增黃山志四照花樹髙大而葉沈碧盛夏作花四出而鋭其末玉色微酣碧蕊緑跗浮葉上光彩照耀巖谷故名四照覆杯花增黃山志覆杯花空中垂下狀如鏤竹髹朱視之宛然一覆杯也查葡花增黃山志查葡花木有芒刺開小黃花如丁香結實紅如丹砂紫鐸花增黃山志紫鐸花黃山有之花如懸鐸色紫秋日秀出蔓草中傲雲花增黃山志傲雲花髙幹參天花如菡蓞三夏盛開涉秋仍馥實如蓮菂葉亦饒香山叉花增黃山志山叉花形似叉一名碧股花取香山叉莖抽碧股之句開在夏中樹最小而多致絳穎花增黃山志絳穎花樹髙葉尖盛夏開小紫花成叢山中謂之錦毬蠟瓣花增黃山志蠟瓣花葉大于掌花五出長二寸許枝枝下垂深黃滑澤如琢蜜蠟而成疊雪花增黃山志疊雪花一名鶴翎花綴枝頭霏霏如雪中含一壺蘆髙出花外瑩然如刻玉囊環花增黃山志囊環草花也大葉紫莖花形如玉環一雙韜紫綺囊中美人菊增黃山志美人菊花似菊單瓣有紫白二色葉似虞美人柔曼旖旎最為可愛醉春花增黃山志醉春花瘦梗碧葉繁花繽紛類秋海棠而柔縷多姿態産黃山鵝羣花增黃山志鵝羣花藤屬葉尖有丫花形類鵝清秋開時若羣鵝遊于碧波間也海瓊花增黃山志海瓊花産于天海枝盡處大葉生焉花莖三五出葉中未開時垂朵如罌正開則如雕紫玉浮光豔與海雲相映寶網花增黃山志寶網花細白絲縈繞之冬日貯瓶中不水而長豔紫霞杯增黃山志紫霞杯狀如杯色紫無葉止一緑苞如瓢以承之黃花增黃花不知其名一朵四瓣合抱如金盞其色鵝黃出汗帖木兒嶺以北每一莖只一朵翩然獨秀衆草經霜凋萎是花經霜顔色愈覺鮮明馬蹄蘭增馬蹄蘭生平地亂草間葉劍樣如建蘭堅韌不可斷其花翠色可愛秋則結苞成子塞外尤多地椹花增地椹花青紫色花瓣如葵一花八九瓣徑二寸許瓣落盡則花心結子成堆取之可以為漿鸞枝增鸞枝花木本枝幹俱似桃葉有刻缺似棣棠三月附枝開花或著樹身最繁茂瓣多而圓似郁李而大深紅色京師多有之長樂花集藻賦增晉傅元紫華賦并序紫華一名長樂生于蜀其東界特饒中國竒而種之余嘉其華純耐久可厯冬而服故與友生各為之賦有遐方之竒草稟二氣之純精仰紫微之景曜因令色以定名剛莖徑立纖條繁列從回風以搖動紛蘭暢而蕙潔蔚青蔥以增茂並含華而未發于是散緑葉秀紫榮藴若芝草之始敷灼若百枝之在庭獨參差以照耀何光麗之雜形渙渙昱昱而奪人目精下無物以借喻上取象于朝霞妙萬物而比艷莫兹草之可嘉唐蘇頲長樂花賦并序蜀太守庭際有紫華草秋早始繁英露洗冬早尚直本霜封蕪雜大同于衆卉盛衰小異于羣物豫訝而未識吏或告余曰此長虞所賦蜀長樂花也故心賞焉因口授書吏遂墨而成作恨不見古人所為得髣佛其旨爾夫長者以短長之形度其長則至美夫樂者以哀樂之類同其樂則至喜長也樂也吾安得而間之嘉纖植之並用偉令名兮在茲徒見其豐族苯䔿髙標璀璨莖丹外而縞中葉縹分以紅貫綴緑穎之重疊索紫蕤之爛熳迫而象之君子其常或微或章聳危冠兮䙬若綬默退靜其何望逺以意之佳人欲翔炫炫煌煌重羅綺兮撲瑶翠蹇來思而未嘗匪以幽兮自直匪以直兮自藏匪以晚兮自耀匪以耀兮自強文濁露之均灑庇清舒之泛光本無嫌于散地甘有寓于殊方然則太液初滿上林新霽䒠茸灼爍萬品千計搖瑞色而涵芝雜竒葩而轉蕙孰與夫玉堂金閣之偏賞白日青春之特麗嵗不與兮時向闌風蕭蕭兮夜漫漫賔逺鴻于沙塞呌離鶴于江干君曽不見三月華矣盡林間之稿木千霜殞矣亦庭下之枯蘭懿此常度凌于早寒假春期而不彩雖秋令而不殘衝雨霰之飛薄任雲山之險難芳弗珍于靃靡節恆慕于檀欒吾則知樹背之奚托傾心之可安如後凋之可貴罔獨立其誰觀文學掾起而為亂曰白露瀼瀼何草不黃紫華灼灼生君之堂彼不伐兮秋自翳時或珍兮君是惠彤庭赫兮朱草駢交屈軼兮友賔連伊榛莽而荒此君曷為而賦旃優鉢羅花集藻歌增唐岑參優鉢羅花歌并序參嘗讀佛經聞有優鉢羅花目所未見天寶庚申嵗參忝大理評事攝監察御史領伊西北庭度支副使自公多暇乃于府庭內栽樹種藥為山鑿池婆娑乎其間足以寄傲交河小吏有獻此花者云得之于天山之南其狀異于衆草勢巃嵸如冠辨嶷然上聳生不旁引攢花中折駢葉外包異香騰風秀色媚景因賞而嘆曰爾不生于中土僻在遐裔使牡丹價重芙蓉譽髙惜哉夫天地無私隂陽無偏各遂其生自物厥性豈以偏地而不生乎豈以無人而不芳乎適此花不遭小吏終委諸山谷亦何異懷才之士未會明主擯于林藪耶因感而為歌歌曰白山南赤山北其間有花人不識緑莖碧葉好顔色葉六瓣花九房夜掩朝開多異香何不生彼中國兮生西方移根在庭媚我公堂恥與衆草之為伍何亭亭而獨芳何不為人之所賞分深山窮谷委嚴霜吾竊悲陽關道路長曾不得獻于君王戎王子集藻五言律詩增唐杜甫遊何將軍山林萬里戎王子何年别月支異花開絶域滋蔓匝清池漢使徒空到神農竟不知露翻兼雨打開拆日離披冬瑰花集藻五言律詩增唐盧綸和李舍人昆季詠冬瑰花寄贈徐侍郎獨鶴寄煙霜雙鸞思晚芳舊隂依謝宅新艷出蕭牆蝶散搖輕露鶯銜入夕陽雨朝勝濯錦風夜劇焚香斷日千層艷孤霞一片光密來驚葉少動處覺枝長布影期髙賞留春為逺方嘗聞贈瓊玖叨和愧升堂司空曙和李員外與舍人詠冬瑰花寄徐侍郎仙吏紫薇郎竒花共玩芳攢星排緑蒂照眼發紅光暗妒翻階葉遙連直曙香逰枝蜂繞易礙刺鳥銜妨露濕凝衣粉風吹散蘂黃蒙籠珠樹合煥爛錦屏張留客勝看竹思人比愛棠如傳採蘋詠逺思滿瀟湘海紅集藻五言律詩增唐劉長卿夏中崔中丞宅見海紅搖落一花獨開何事一花殘間庭百草闌緑滋經雨發紅艷隔林看竟日餘香在過時獨秀難共憐芳意晚秋露未須漙燕蓊花集藻七言絶句增唐李郢燕蓊花十二街中何限草燕蓊盡欲占殘春黃花撲地無窮極愁殺江南去住人玉燭花集藻七言律詩增唐劉兼玉燭花裊裊香英三四枝亭亭紅艷照階墀正當晚檻初開處却似春闈就試時少女不吹方熠爚東君偏惜未離披夜深斜倚朱欄外擬把鄰光借與誰杏香花集藻五言絶句增宋邵雍杏香花客説何州事經營香味佳訝豫獨無語貪嗅杏香花萬蝶花集藻七言絶句增宋蘇轍萬蝶花誰唱殘春蝶戀花一團粉翅壓枝斜美人欲向叉頭插又恐驚飛鬢裏鴉楊巽齋萬蝶花粉翼紛紛簇幾叢搖風欲趂賣花翁詩眸覽倦方欹枕栩栩猶疑在夢中真珠花集藻七言絶句增宋張舜民真珠花風中的皪月中看解作人間五月寒一似漢宫梳洗了玉瓏蔥壓翠雲冠千璣萬琲照庭除細雨斜風拂座隅莫道長安貧似磬緑階繞砌盡真珠楊巽齋咏真珠花纍纍花發映庭除柳帶榆錢總不如一任春風吹滿地幽人步履自虛徐鷹爪花集藻五言絶句增宋王十朋鷹爪花誰把名鷹爪天然狀不殊無心事搏擊中有鳥相呼闍提花集藻七言絶句增宋鄭域闍提花此花移種自招提借佛為名識者希優鉢曼陀果何似并參香色問因依御帶花集藻七言絶句增宋翁元廣御帶花未放枝頭嫩葉青先開絳蕊照春晴若無顔色宜宫院安得花間御帶名玉手爐花集藻七言絶句增宋翁元廣玉手爐花小院無人春意深凌風傲日出牆隂只因落在山僧手那得王孫為賞音無名氏玉手爐花習習東風二月餘此花宜近玉庭除美人雲鬢不宜插獻與觀音作手爐小黃渠花集藻五言絶句增宋劉允叔小黃蕖花􅉡􅉡碎金英絲絲縷玉莖步搖叉朵見老眼為增明山礬紛似玉黃蘖碎如金二美傳春晚同心契爾音繭漆花集藻七言絶句增宋劉允叔繭漆花清晨步上金雞嶺極目漫山繭漆花雪蕊瓊絲亦堪賞樵童蠶婦帶歸家滿堂春集藻七言絶句增宋楊巽齋滿堂春花發園林晝錦如列仙行綴在蓬壺千金須撇豪家賞一笑春風無向隅御仙花集藻七言絶句增宋楊巽齋御仙花不逐凡花逞艷嬌移根上苑獨清髙君王曽選裝金帶侈錫持荷耀紫袍夀春花集藻七言絶句增宋楊巽齋夀春花花開綴玉碧敷腴香挹南薰景又殊天賦芳姿長不老命名為夀定非誣散水花集藻七言絶句增宋無名氏散水花盈枝點綴雪花鮮環映清流分外妍應是東君歸騎速不知墜下玉絲鞭孩兒花集藻七言絶句增宋無名氏孩兒花纖穠初見似嬌癡鼓舞春風二月時何事自開還自落可憐造化亦兒嬉練春紅集藻七言古詩增元袁桷謝王參議送練春紅二枝玉堂老仙玩幽獨閉户無人似初溽倚闌岸幘領孤芳䔩䔩輕紅冠羣緑化工有意卑凡卉積李崇桃空眩目爭先鬭巧等堪憐已向東風盡驅逐此花精妍淨如洗收拾餘春傲榮辱何郎湯餅徒試妝太真溫泉空賜浴天然生色鑄真態亭午低頭睡初足誰言花后最竒絶我怪酪奴能汗觸嫣然一笑奉清歡莫把金尊歌别鵠并刀妙剪駢頭來珠露淋漓袖新蹙似嫌凡子多京塵却恨髙人付流俗微風淡蕩新雨生強拭愁容吐殘馥擬將色筆寫清意綺語非工那忍瀆裴回中庭月過半翠袖凌風注寒玉長十八集藻七言絶句增元乃賢塞上曲雙鬟小女玉娟娟自卷氊簾出帳前忽見一枝長十八折來簪在帽簷邉波羅花集藻詞增宋毛滂清平樂雲峯秀疊露冷琉璃葉北畔波羅花弄雪香度小橋淡月與君踏月尋花玉人雙捧流霞吸盡杯中花月竹風相送還家疊羅花集藻詞增金黨懷英感皇恩碧玉撚條藍袍裁葉眀艷黃深軟金疊道裝仙子謫墮蕊珠宫為春間管領花時節漢額妝濃楚腰舞怯襞積裙餘舊宫褶東君著意留伴小庭風月任教鶗鴂喚羣芳歇藍雀花增藍雀花其花如雀有身有翼有尾有黃心如兩目或云即茱萸花集藻五言絶句御製山菊藍雀花雨過初涼至山花滿野馨雖無紅紫艷能使屬車停翠蛾眉增翠蛾眉花翠色隨日側映鮮妍有致御定佩文齋廣羣芳譜卷五十三
