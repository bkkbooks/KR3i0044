body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十四果譜梅梅花别見花譜原梅説文作梅一名䕩廣志云蜀名梅為䕩實似杏草木疏云梅杏類也實赤于杏而酸大者如小貌拳小者如彈熟則黃微甘酸可啖生純青酸甚本草云花開于冬而實熟于夏得木之金氣故其味最酸多食泄津液生痰損筋蝕脾傷腎弱齒為脯含之口香造煎堪久子赤者材堅白者材脆種類不一白者有緑萼梅實大五月熟重葉梅結實多雙消梅實甘青止可生啖雖酢甚鬆脆多液無滓花重者實小單者大不宜熟亦不堪煎造冠城梅實甚大五月熟時梅實大五六月熟早梅四月熟冬梅實小十月可用不能熟紅者有鶴頂梅實大而紅鴛鴦梅梅譜云即多葉紅梅也結實必雙凡雙果必雙蒂惟此一蒂而結雙梅尤異雙頭梅或結並蒂小實不堪啖杏梅實扁而斑味似杏異品有冰梅實吐自葉罅不花色如冰玉無核含之自融如冰佳品也增范成大梅譜江梅子小而硬具區志洞庭諸山佳種有吐花酸實小味酸方吐花即可啖脆梅一名時裏梅實圓而大可以蜜漬及蒸製按原譜各果名目雜採諸書間有遺闕續録于後其已見者更不重出原賈思協曰梅實小而酸核有韲文杏實大而甜核無文采梅任調食及韲杏則不任此用世人或不能辨言梅杏為一物失之逺矣彚考原書説命若作和羮爾惟鹽梅傳鹽鹹梅醋羮須鹹醋以和之詩周南摽有梅其實七兮傳摽落也盛極則墮落者梅也尚在樹者七標有梅其實三兮傳在者三也箋此夏鄉晚梅之墮落者差多在者餘三耳摽有梅頃筐暨之傳暨取也箋謂夏已晚頃筐取之于地增禮記內則桃諸梅諸卵鹽注人君燕所食也疏桃諸梅諸卵鹽者言食桃諸梅諸之時以卵鹽和之王肅云諸菹也謂桃菹梅菹即今之藏桃也藏梅也欲藏之時必先稍乾之故周禮謂之乾䕩梅杏注人君燕食所加庶羞也膾獸用梅集説獸用梅以梅和獸也食棗桃李梅弗致于核為恭敬也周禮天官饋食之籩其實乾䕩注乾䕩梅也夏小正五月煮梅為豆實左傳晏子對齊侯曰和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心吳志孫亮傳注亮方食生梅使黃門至中藏取蜜漬梅蜜中有鼠矢召問藏吏藏吏叩頭亮曰黃門從汝求蜜耶吏曰向求實不敢與黃門不服侍中刁元張邠啓黃門藏吏辭語不同請付獄推盡亮曰此易知耳令破鼠矢矢裏燥亮大笑謂元邠曰若矢先在蜜中中外當俱濕裏燥必是黃門所為黃門首服左右莫不驚悚南史栁惲傳惲嘗與琅琊王瞻博射嫌其皮濶乃摘梅帖烏珠之上發必命中觀者驚駭唐書蕭倣傳倣自集賢學士拜嶺南節度使南方珍賄叢夥不以入門家人病取稿梅于厨以和劑倣知趨市還之原五代史趙匡凝傳楊渥方宴食青梅匡凝顧渥曰弗多食發小兒熱諸將以為嫚渥遷匡凝海陵增山海經雲山之上其實乾臘注臘乾梅也淮南子百梅足以為百人酸一梅不足以為一人和世説魏武行役失汲道軍皆渴乃令曰前有大梅林饒子甘酸可以解渴士卒聞之口皆出水乘此得及前源語林范汪能噉梅人嘗致一斛奩留汪食之須臾盡述異記邯鄲有故邯鄲宫基存焉中有趙王之果園梅李至冬而花春得而食筆談吳人多謂梅子為曹公以嘗望梅止渴也又謂鵝為右軍有士人遺醋梅與燖鵝作書云醋浸曹公一甕湯燖右軍兩隻埤雅張協七命云酤以春梅正言春梅者春實尚青味酢故也六帖補前蜀王建判官馮涓好戲時鳯翔遣張郎中通好來晨宴接王慮馮公先語而張子乘之或致失機乃令客將傳逹旦請緘默坐既定而賔主寂然無敢發其語端者馮乃取青梅鏗然一嚼之四座流涎因成大笑峩眉山志山有梅子坡白雲禪師道行偶渴索水不得望前坡有梅樹擬此纍纍梅實可以回津至其地無一梅樹而渴已止矣今建有茶菴後人援以名坡云集藻五言古詩增宋梅堯臣青梅梅葉未藏禽梅子青可摘江南小家女手弄門前劇齒軟莫勝酸棄之曽不惜寧顧馬上郎春風滿行陌蔡襄和吳省副青梅梅花畏髙寒獨向江南發那知汴陽墅青顆摘春月持之矜所無歸思動楚越願君侑清樽行恐新芳歇黃庭堅古風上蘇子瞻江梅有佳實結根桃李場桃李終不言朝露借恩光孤芳已皎潔冰雪空自香古來和鼎實此物升廟廊嵗月生成晚煙雨青已黃得升桃李盤以逺初見嘗終焉不可口擲置官道傍但使本根在棄捐何能傷七言古詩增宋鮑照梅花落中庭雜樹多偏為梅咨嗟問君何獨然念其霜中能作花露中能作實搖蕩春風媚春日念爾零落逐寒風徒有霜花無霜質七言絶句增唐羅隱紅梅天賜胭脂一抹腮盤中磊落笛中哀雖然未得和羮便曽與將軍止渴來宋梅堯臣送紅梅行之有詩依其韻和綴綴紅梅肥似蠟濛濛飛雨灑如絲吳郎齒軟食不得翻憶張公大谷梨黃庭堅戲答朝適道乞消梅青莎徑裏香未乾黃鳥隂中實已圓蒸豆作烏鹽作白屬聞丹杏薦牙盤北客未嘗眉自顰南人誇説齒生津磨錢和蜜誰能許去蒂供鹽亦可人以梅餽朝深道戲贈二首帶葉連枝摘未殘依稀茶塢竹籬間相如病渴應須此莫與文君蹙逺山渴夢吞江起解顔詩成有味齒牙間前身鄴下劉公幹今日江南庾子山楊萬里梅熟小雨風從獨樹忽然來雨去山前逺却廽留許枝間慰愁眼兒童抵死打黃梅元張宏範梅雨輕雲薄薄暗江干幾陳紗窗送嫩寒濃醉呼童新摘得未黃梅子已微酸顧瑛謝靜逺惠蜜梅江南煙雨未全黃誰使青酸墮蜜房嫵媚已能知魏證典刑時復見中郎馬臻西湖即事園丁花木巧杯棬萬紫千紅簇綺筵折得青梅小如豆獻來還索賞金錢詩散句增唐李白郎騎竹馬來繞床弄青梅白居易黃鳥啼欲歇青梅結半成宋陸遊青梅薦煮酒緑樹變鳴禽原白居易食蘗不易食梅難蘗能苦兮梅能酸增宋黃庭堅要知春景深和淺試看青梅大幾分楊萬里峯頭㨂遍低隂處帶葉青梅摘一枝元馬臻午睡醒來春事晚枝頭梅豆已生仁原明王世貞莫言子作書生酸要與君王調鼎實雷思霈不應便雜夭桃杏半點微酸已著枝增梁簡文帝摘梅多繞樹周庾信梅逐雨中黃唐杜甫紅綻雨肥梅四月熟黃梅梅杏半傳黃白居易早梅結青實許渾未臘梅先實韓偓齒軟越梅酸宋蘇軾金盤未薦含酸子朱松冰盤青子渴爭嘗元劉詵紈扇晴嬉墮脆梅詞增宋孫艤菩薩蠻一聲羌笛吹嗚咽玉溪半夜梅翻雪江月正茫茫斷腸流水香含章春欲暮落日千山雨一點著微酸吳姬先齒寒别録原神異經北方荒外有橫公魚夜化為人刺之不入煮之不死以烏梅二十七枚煮之即熟可已邪病增風俗通五月落梅風江淮以為信風風土記夏至霖霪至前為黃梅先時為迎梅雨及時為梅雨後時為送梅雨原抱朴子綺里丹法用鉛百斤煮以雄黃皆成金太剛豬膏煮之太柔梅煮之物類相感志青梅小滿前嫩脆過後則易黃梅子與韶粉同食不酸不軟梅葉尤佳本草梅核能明目益氣不飢種樹書桑上接梅則不酸田家五行梅實少秫亦少諺云樹無梅手無杯製用居家必要取大青梅以鹽漬之日曬夜漬十晝十夜便成白梅調鼎和虀所在任用青梅籃盛突上薰黑即成烏梅用以入藥不任調食以稻灰淋汁潤濕蒸過則肥澤不蠧亦可糖藏蜜煎作果烏梅洗淨搗爛水煮滚入紅糖使酸甘得宜水內泡冷暑月飲甚妙或搗爛加蜜適中調湯微煮飲梅醬熟梅十斤爛蒸去核每肉一斤加鹽三錢攪勻日中曬待紅黑色收起用時加白豆蔲仁檀香些少飴糖調勻服涼水極解渴冰梅丸治喉閉五月五日合青梅二十個鹽十二兩先于初一日􅀈至初五日取梅汁拌白芷羌活防風桔梗各二兩眀礬三兩豬牙皂角三十條俱為細末拌梅磁瓶收貯糖脆梅青梅每百個以刀劃成路將熟冷醋浸一宿取出控乾别用熟醋調沙糖一斤半浸沒入新瓶內以箬扎口仍覆碗藏地深一二尺用泥上蓋過白露節取出換糖浸增北户録嶺南之梅小于江左居人采之雜以朱槿花和鹽曝之梅為槿花所染其色可愛又有選大梅刻鏤瓶罐結帶之類取棹汁漬之亦甚甘脆附録海梅增峩眉山志海梅髙僅三尺冬月開小花結實如櫻桃杏杏花别見花譜原杏一名甜梅江南録云楊行密改杏名甜梅樹大實多形如彈丸有大如梨者生酢熟甜性熱生痰及癰疽不宜多食小兒産婦尤忌增格物叢話杏實味香于梅而酸不及核與肉自相離其仁可入藥原種類不一有金杏圓而黃熟最早味最勝一名漢帝杏謂武帝上林苑遺種也大如梨黃如橘出濟南白杏熟時色青白或微黃味甘淡而不酢出滎陽沙杏甘而多汁即世所稱水杏也梅杏黃而帶酢奈杏青而帶黃出鄴中金剛拳赤大而扁肉厚味甚佳又名肉杏木杏形扁色青黃味酢不堪食山杏肉薄不堪食但可收仁用巴旦杏一名八擔杏出回回地今關西諸處皆有葉差小實小而肉薄核如梅皮薄而仁清甘鮮者尤脆美稱果之佳者又有赤杏黃杏廣志云出鄴中蓬萊杏增述異記句漏縣有縹杏彚考原北周書孝義傳張元性亷潔南鄰有杏兩樹杏熟多落元園中元悉以還主增夏小正四月囿有見杏管子五沃之土其木宜杏原地理志范蠡宅在洞庭湖中有海杏大如拳也元晏春秋衛倫過豫言及于味稱魏故侍中劉子陽食餅知鹽生精味之至也豫曰師曠識勞薪易牙别淄澠子陽今之妙士也定之何難倫因命僕取糧糗以進豫嘗之曰麥也有杏李奈味三果之熟也不同時子焉得兼之倫笑而不言退告人曰士安之識過劉氏吾將來家實多故杏時將發糅以杏汁李奈將發又糅以李奈汁故兼三味祭法夏祠用杏增神仙傳董奉居廬山不種田日為人治病亦不取錢病重愈者使栽杏五株輕者一株如此數年計得十萬餘株鬱然成林乃使山中百禽羣獸逰戲其下卒不生草常如藝治也後杏子大熟于林中作一草倉示時人曰欲買杏者不須報奉但將榖一器置倉中即自往取杏一器去常有人置榖來少而取杏去多者林中羣虎出吼逐之大怖急挈杏走路傍傾覆至家量杏一如榖多少或有人偷杏者虎逐之到家嚙至死家人知其偷杏乃送還奉叩頭謝過乃使却活奉每年貨杏得榖旋以賑救貧乏供給行旅不逮者嵗二萬餘斛潯陽記杏在北嶺上有樹百株今猶稱董先生杏林原荆楚嵗時記孫楚祭介之推云餳一盤醴酪二盂今寒食有杏酪麥粥即其類也南嶽夫人傳仙人有三玄紫杏冀州論魏郡好杏地産不為珍增嵩髙山記嵩山東有牛山其山多杏至五月爛然黃茂百姓皆資此為命人人充飽而杏不盡原朱超石與兄書光武墳邉杏甚美今奉送其核增述異記杏園洲在南海中洲中多杏海上人云仙人種杏處漢時常有人舟行遇風泊此洲五六日食杏故免死又云洲中别有冬杏文昌雜録禮部王員外言昔見朝議大夫李冠卿説楊州所居堂前杏一窠極大花多而不實適有一媒姥見如此笑謂家人曰來春與嫁了此杏冬深忽携酒一樽來云是婚家撞門酒索處子裙一腰繫樹上已而奠酒辭祝再三而去家人莫不笑之至來春此杏結子無數酉陽雜俎杜師仁常賃居庭有巨杏樹鄰居老人每擔水至樹側必歎曰此樹可惜杜詰之老人云某善知木病此樹有疾某請治乃診樹一處曰樹病醋心杜染指于蠧處嘗之味若薄醋老人持小鈎披蠧再三鈎之得一白蟲如蝠乃傅藥于瘡中復戒曰有實自青皮時必摽之十去八九則樹活如其言樹益茂盛矣又嘗見栽植經三卷言木有病醋心者原桂苑叢談馬燧子鬯以第中大杏餽竇文瑒文瑒以進德宗德宗未嘗見頗怪鬯令中使就封其樹鬯懼進宅為奉誠園增文獻通考杏多實不蟲者來年秋禾善五木者五榖之先欲知五榖但視五木故五果分五行所以表五榖也又按五果之義夏之果莫先于杏五時之首寢廟必有薦而此杏適丁夏之時故特取之杏之枝葉華果皆赤故古者鑽燧夏取棗杏之火也學圃餘疏杏花江南雖多實味大不如北其樹易成實易結林中摘食甚佳兖州府志杏山在寧陽上多杏南陽府志杏山即抱朴子種杏處九江府志太乙宫在德化宋名祥符觀即董奉杏林也集藻五言古詩增宋楊萬里折杏子天暖酒易醺春暮花難覓意行到南園杏子半紅碧輕風動髙枝可望不可摘聳肩跂一足偶爾攀翻得攀條初亦喜折條還復惜小苦已自韻未酸正堪喫聊將插鬢歸空樽有餘瀝七言律詩增唐羊士諤州民有獻杏者瑰麗溢目因感花未幾聊以成詠南郭東風賞杏壇幾株芳樹昨留歡却憶落花飄綺席忽驚如實滿雕盤蛾眉半斂千金薄鷤鴂初鳴百草間志士古來悲節換美人啼鳥亦長歎五言排律增唐錢起酬長孫繹藍溪寄杏愛君藍水上種杏近成田拂徑清隂合臨流彩實懸清香和宿雨佳色出晴煙懿此傾筐贈想知懷橘年芳馨來滿袖瓊玖願酬篇把玩情何極雲林若眼前五言絶句增宋梅堯臣詠雙杏子其核亦然子核成雙杏將寄同心人定棲鴛鴦魄為物豈無因蘇軾和子由岐下杏開花送餘寒結子及新火關中幸無梅汝強充鼎和元馬祖常謝人送杏子詩杏子黃金色筠籠出薊丘味甘醒午寢可是督詩郵七言絶句增唐白居易重尋杏園忽憶芳時頻酩酊却尋醉處重徘徊杏花結子春深後誰解多情又獨來元張𢎞範青杏落盡殘紅緑滿技青青如豆釀酸時佳人摘得新嘗怯一點春愁鎖畫眉詩散句增宋歐陽修芳枝結青杏翠葆新奕奕黃庭堅買魚斫膾須論網撲杏供盤不數枚唐王維董奉杏成林宋梅堯臣仙人愛杏令虎守蘇軾花褪殘紅青杏小秦觀董奉栽成杏子丹陳師道里中饋杏得新嘗别録增野人間話翰林辛夤孫頃年在青城山居其居則古先道院在一峯之頂內有塑像黃姑則六代元宗之子也一夕夢見召夤孫謂曰汝可食杏仁令汝聰利老而彌壯心力不倦亦資于年夀矣汝可有道性又不終在此須出山佐理當代夤孫夢中拜請其法則與怡神論中者同元宗孫申天師元有怡神論語卷下卷中有神仙祕方三十首則甘草為首右食杏仁法次之杏仁七個去皮尖早晨盥潄了內于口中久之則盡去其皮又于口中暖之逡巡爛嚼和津液如乳汁乃頓咽但日日如法食之一年必換血令人輕健安泰夤孫遂日日食之至今老而輕健年踰從心猶多著述原製用清異録杏仁新水浸沒生薑甘草丁香蜀椒縮砂白豆蔲鹽花沉檀龍麝皆取末如麵攪拌曬乾候水盡味透更以香藥鋪糝名爽團宿酲未解一枚爽然農桑通訣杏熟時多取爛者盆中研之生布絞取濃汁塗盤中曬乾取下可和水為漿又和麵用本草杏仁能使人血溢少誤之必出血不已或至委頓故近世少有服者杏仁五月採破核去雙仁者自朝蒸之至午便以慢火微烘之七日乃收貯每旦腹空時不拘多少任意噉之積久不止駐顔延年釋名杏可以為油齊民要術杏子仁可以為粥種植桃樹接杏結果紅而且大又耐久不枯桃桃花别見花譜原桃實甘子繁故字從木從兆本草云十億曰兆言其多也性酸甘熱可食多食令人有熱能發丹石毒生桃尤不宜多食有損無益性早實三年便結子五年即老結子便細十年即死以皮緊也若四年後用刀自樹本竪劙其皮至生枝處使膠盡出則多活數年種類頗多有崑崙桃一名王母桃一名仙人桃一名冬桃出洛中味甘美詳見後洛陽伽藍記扁桃出波斯國形扁肉澀不堪食核狀如盒樹髙五六丈圍四五尺葉似桃而濶大三月開白花花落結實如桃彼地名波淡樹仁甘美番人珍之北户録云形如半月狀出占卑國新羅桃子可食性熱方桃形微方餅子桃狀如香餅味甘油桃小于衆桃有赤斑點光如塗油花多子小不堪噉惟取仁出汴中巨核桃詳見後拾遺記金桃形長色黃如金肉黏核多蛀熟遲用柿接者味甘色黃銀桃形圓色青白肉不黏核六月中熟鴛鴦桃結實多雙李桃形圓色青肉不黏核其皮光澤如李一名光桃十月桃形圓色青肉黏核味甘酸十月中成熟一名古冬桃又名雪桃按爾雅云旄冬桃疏云桃子冬熟者不旄當即此也毛桃即爾雅所謂褫桃小而多毛核黏味惡不堪食其仁充滿多脂可入藥水蜜桃獨上海有之而顧尚寶西園所出尤佳其味亞于生荔枝雷震紅張七澤云每雷雨過輒見一紅暈最為難得他如紅桃緗桃白桃烏桃皆以色名五月早桃秋桃霜桃皆以時名胭脂桃絡絲桃皆以形名王敬美有言桃種最多金桃蜜桃灰桃之類多植園中取果夀星桃樹矮而花能結大桃亦竒種可玩桃殊不堪食增西京雜記上林苑有秦桃緗核桃金城桃綺葉桃紫文桃客燕雜記京師中佳果有紅桃白銀桃小桃蟠桃合桃酒紅桃霜下桃肅寧八月桃彚考增詩周南桃之夭夭有蕡其實傳蕡實貌衛風投我以木桃報之以瓊瑶魏風園有桃其實之殽禮記內則桃曰膽之疏桃多毛拭治去毛令色青滑如膽也或曰膽謂苦桃有苦如膽者擇去之周禮饋食之籩其實桃舊唐書太宗紀貞觀十一年唐國獻金桃銀桃詔令置于苑囿神農經玉桃服之長生不死若不得早服之臨終日服之其尸畢天地不朽原夏小正六月煮桃傳桃也者柂桃也柂桃也者山桃也煮以為豆實也增家語六果桃為下祭祀不用不登郊廟晏子春秋公孫捷田開疆古冶子事景公勇而無禮公患之晏子言于公請饋以二桃曰三子計功而食公孫曰吾再搏乳虎功可以食田曰吾仗兵而御三軍者再功可以食古冶子曰吾嘗濟河黿銜左驂冶潛行水底逆流百步從流九里得黿頭功可以食二子曰吾勇不若子功不逮子取桃不讓是貪也然而不死無勇也刎頸而死冶曰二子死之冶獨不逮亦刎頸而死原韓非子彌子瑕有寵于衛君與君逰于果園食桃而甘以其半啖君君曰忠乎忘其口而啖寡人及彌子色衰愛弛得罪于君君曰是故嘗啖我以餘桃孔子侍坐于魯哀公哀公賜之桃與黍孔子先飯黍而後噉桃公曰黍以雪桃也對曰丘知之矣夫黍五榖之長而桃為下君子以賤雪貴不聞以貴雪賤也吕氏春秋子産治鄭桃棗之蔭于街者莫援也增神異經東方有樹髙五十丈葉長八尺名曰桃其子徑三尺二寸和核作羮食之令人益夀食核中仁可以治嗽小桃溫潤咳嗽人食之即止原新序魏文侯見箕季從者食其園之桃箕季禁之文侯曰從者食園桃箕季禁之豈愛桃哉是教我下無侵上也增説苑樹桃李者夏得休息秋得實焉武帝內則七月七日西王母降自設天厨真妙非常豐珍上果芳華百味紫芝萎蕤芬芳填樏清香之酒非地上所有香氣殊絶帝不能名也又命侍女更索桃果須臾以玉盤盛仙桃七顆大如鴨卵形圓青色以呈王母母以四顆與帝三顆自食桃味甘美口有盈味帝食輒收其核王母問帝帝曰欲種之母曰此桃三千年一生實中夏地薄種之不生帝乃止漢武故事東郡獻短人帝呼東方朔朔至短人因指朔謂帝曰西王母種桃三千年一著子此兒不良已三過偷之矣原尹喜內傳老子西逰省太真王母共食碧桃紫梨鍾離意别傳秦吏趙凱以私恨告國民吳且生盜食宗廟御桃且生對曰民不敢食也王曰剖其腹出其桃史記惡而書之曰食桃之肉當有遺核王不知此而剖人腹以求桃非理也增博物志漢武帝時西王母遣使乘白鹿告帝當來乃供帳九華殿以待之七月七日夜漏七刻王母乘紫雲車而至于殿西南面東向頭上戴七種青氣鬱鬱如雲有三青鳥如烏犬使侍母傍時設九微燈帝南面西向王母索七桃大如彈丸以五枚與帝母食二枚惟帝與母對坐其從者皆不得進時東方朔竊從殿南廂朱鳥牖中窺母母顧之謂帝曰此窺牖小兒嘗三來盜吾桃帝乃大怪之由此世人知方朔神仙也原神仙傳張道陵者沛國人也有趙升者就陵受學陵將諸弟子登雲臺絶巖之上下有一桃樹如人臂傍生石壁下臨不測桃大有實陵謂諸弟子曰有人能得此桃實當告以道要于時伏而窺之者二百餘人股戰流汗無敢久臨視之者莫不却退而返謝不能得一人乃升曰神之所護何險之有聖師在此終不使吾死于谷中耳師有教者必是此桃有可得之理故耳乃從上自擲投樹上足不蹉跌取桃滿懷而石壁峭峻無所攀援不能得返于是乃以桃一一擲上正得二百二顆陵得而分賜諸弟子各一陵自食一留一以待升乃以手引升衆視之見陵臂長三二丈引升升忽然來還乃以向所留桃與之增神仙傳董子陽少知長生之道隱博落山中九十餘年但食桃飲石泉拾遺記明帝時恆山獻巨桃核巨桃霜下結花隆暑方熟云仙人所食帝使植于霜林園原元中記木子之大者有積石山之桃實焉大如十斛籠增甄異録譙郡夏侯文規亡後見形經庭前桃樹邉過曰此桃吾昔所種子乃美好其婦曰人言亡者畏桃君何不畏耶曰桃東南枝長二尺八寸向日者憎之我亦不畏也搜神記前周葛由蜀羌人也周成王時好刻木作羊賣之一旦乘木羊入蜀中蜀中王侯貴人追之上綏山綏山多桃在峩眉山西南髙無極也隨之者不復還皆得仙道故里諺曰得綏山一桃雖不能仙亦足以豪山下立祠數十處東陽記龍丘山峯際復有巖穴外如窗牖中有石林巖前有一桃樹其實甚甘非山中自有莫知誰植廣州記廬山有山桃大如檳榔形色黑而味甘酢人時登採拾只得于上飽噉或欲持下迷不得返原荆楚嵗時記正月一日飲桃湯桃者五行之精厭伏邪氣制百鬼也增新論知伯庖人亡炙一筪而即知之韓魏將反而不能知邯鄲子陽園亡一桃而即覺之其自亡也而不能知斯皆鋭情于小而亡大者也述異記磅磄山去扶桑五萬里日所不及其地甚寒有桃樹千圍萬年一實一説日本國有金桃其實重一斤崑崙有玉桃光明潤徹而堅瑩須以玉井泉洗之便軟可食武陵源在吳中山無他木盡生桃李俗呼為桃李源源上有石洞洞中有乳水世傳秦末吳中人于此避難食桃李實皆得仙原幽明録漢明帝永平五年郯縣劉晨阮肇共入天台山取榖皮迷路不得返經十餘日糧盡飢餒殆死遙望山上有一桃大有子實而絶巖環澗永無登路扳緣藤葛然後得上各啖數桃而不飢下山一大溪邉有二女姿質妙絶因要還家敕婢云劉阮二郎向雖得瓊實猶尚虗弊可速作食有胡麻山羊脯甚美遂留半載餘二人懷土求歸女曰宿福所牽何復欲還因指示還路既出無復相識問得七世孫傳聞上世入山迷不得歸增世説桓元素輕桓崖崖在京下有好桃元就連求之遂不得佳者元與殷仲文書以為嗤笑曰德之休明肅慎貢其楛矢如其不爾籬壁間物亦不可得也洛陽伽藍記華林園蓬萊山南有百果園果列作林林各有堂有仙人桃其色赤表裏照徹得嚴霜乃熟云出崑崙山一曰王母桃也元和郡國志綿州彰明縣雲臺山天柱崖下有一桃樹髙五丈餘外皮似桃內心似松張道陵與王長趙升試法于此四百餘年桃逮今不朽有碑記之洽聞記吐谷渾有桃大如一石甕原酉陽雜俎史論在齊州時出獵至一縣界憩蘭若中覺桃香異常訪其僧僧不及隱言近有人施二桃因從經案下取出獻論大如飯碗時飢盡食之核大如雞卵論因詰其所自僧笑向實謬言之此桃去此十餘里道路危險貧道偶行腳見之覺異因掇數枚論曰今去騎從與和尚偕往僧不得已導論北去荒榛中經五里許抵一水僧曰恐中丞不能渡此論志決往乃依僧解衣戴之而浮登岸又經西北涉二小水上山越澗數里至一處竒泉怪石非人境也有桃數百株幹掃地髙二三尺其香破鼻論與僧各食一蒂腹果然矣論解衣將盡力苞之僧曰此或靈境不可多取貧道嘗聼長老説昔日有人亦嘗至此懷五六枚迷不得出論亦疑僧非常取兩個而返僧切戒論不得言論至州使招僧僧已逝矣王母桃洛陽華林園內有之十月始熟形如括蔞俗語曰王母甘桃食之解勞亦名西王母桃長白山相傳古肅然山也峴南有鐘鳴燕世桑門釋惠霄者自廣固至北峴聼鐘聲稍前忽見一寺門宇炳煥遂求中食見一沙彌乃摘一桃與霄須臾又與一桃語霄曰至此已淹留可去矣霄出回頭顧失寺至廣固見弟子言失和尚已二年矣霄始知二桃兆二年也仙桃出郴州蘇耽仙壇有人至心祈之輒落壇上或至五六顆形似石塊赤黃色破之如有核三重研飲之愈衆疾尤治邪氣增會昌解頤録鄴華林苑有勾鼻桃子重三斤或二斤半亦有名梨凡此衆果氣味甘美入口消汁又間有名果季龍作蝦蟆車四廂廣一丈深一丈合土在中植之則無不生也清異録鄴中環桃特異後唐莊宗曰昔人以橘為千頭木奴此不為餘甘尉乎神仙感遇傳咸通中趙僧懷一居雲門寺遇一道流相與入山花木繁茂水石幽勝久之覺飢道流曰此有仙桃千嵗一實可以療飢以一桃授之大如二升器竒香珍味非世所有懷一自此不食海録碎事洋州雲臺山生獼猴桃甚甘酸食之止渴唐貞觀中康居國獻黃桃大如鵝卵其色如金因呼為金桃用柿樹接桃枝亦為金桃早熟者謂之絡絲白晚熟者謂之過雁紅東坡雜記李公擇與客遊天柱寺還過司命祠下道傍見一桃爛熟可愛當往來之衝而不為人之所得疑其為真靈之瑞分食之則不足衆以與公擇公擇不可時蘇徐二客皆有老母七十餘公擇使二公分之歸遺其母人人滿意過于食桃此事不可不識也仇池筆記黃州岐亭有王翊者家富而好善所居後有茂林果木一日有村婦林中見一桃過熟而絶大獨在木杪乃取而食之翊適見大驚婦人食已棄其核翊取而剖之得雄黃一塊如桃仁及研而吞之甚甘美自是斷葷肉齋居一食不復殺生可謂異事也埤雅諺曰白頭種桃又曰桃三李四梅子十二言桃生三嵗便放花果早于梅李故首雖已白其花子之利可待也茅亭客話滕處士昌祐字勝華所居園中有金桃深黃剖之至核紅翠如金味美為桃之最也白玉蟾集寧都金精山係第三十五福地漢初張芒女麗英入山獲二桃得道長沙王吳芮聘焉至洞中見女乘紫雲在半空謂芮曰吾為金星之精降治此山言訖升天而去原五色線咸通中許明奴家嫗入山林採樵于南山見一人坐石上方食桃甚大問嫗曰我許明奴之祖宣平與汝一桃食之不可將出嫗食桃甚美其後增食日漸童顔入山不歸行疾如飛金母降謝自然將桃一枝懸臂上有三十顆碧色大如碗云此猶是小者增長春真人本行碑真人徴赴京師眷遇至渥遣中使賜上林桃師不食菜果者十餘年矣至是取其一啖之重上賜也湧幢小品嘉靖乙卯上夜坐庭中御幄後忽獲一桃左右視或見桃從空中墜上喜曰天賜也修迎恩大典五日明日復有一桃降藜床瀋餘戊辰冬杪偶至靈濟宫遇道人授一桃特大曰與汝有緣故以相贈訝其非常受而啖之味甘美而核甚細杭州府志古記云昔人于天目捕獵沮雨于石城之外見林間有白桃一顆摘入手如冰忽又變紅其熱如湯遂採木葉包之藏于白囊下山捫之猶在及至家惟木葉存集藻表增唐李嶠為納言姚璹等賀瑞桃表伏見內出靈桃四實共同一蒂禁園芳果仙庭竒樹名珍杏奈族茂櫻胡鮮花發于上春佳實成于早夏四而為一表四海之一君異而為同明異才之同貫漢宫留核曽所未窺衛國報瓊何能竊似殊祥靈應疊貺駢臻凡在見聞孰不歡躍臣等謬當樞近纍覿休符喜忭之情實萬恆品賦原晉傅元桃賦有東園之珍果兮承隂陽之靈和結柔根以列樹兮艷長畝而駢羅夏日先熟初進廟堂辛氏踐秋厥味益長花落實結與時剛柔既甘且脆入口消流亦有冬桃冷侔冰霜放神適意恣口所嘗華升御于內庭兮飾佳人之令顔實充虛而療飢兮信功烈之難原嘉放牛于斯林兮悅萬國之乂安望海島而慷慨兮懷度索之靈山何兹樹之獨茂兮條枝紛而麗間根龍虬而雲結兮彌萬里而屈盤禦百鬼之妖慝兮列神荼以司姦辟凶邪而濟正兮豈唯榮美之足言增宋伍緝之園桃賦嗟王母之竒果特華實兮兼副既陶煦以夏成又凌寒而冬就嗟異植兮難拔亦晚枯兮先茂農黃品其味漢帝驚其珍林休反耕之牛宅樹司惡之神景斃勇于不足彌增罪于甘分雖無言兮成蹊叵充肴于魏君時令載始周南申章瞻擇有制藥齊惟良魯拂柩以悔荆楚供弧以事王唐獨孤授蟠桃賦東海神木是曰蟠桃可得聞其廣而未量其髙蓋蒼龍之所臨據白日之所先照結根于凌北之峯稟氣乎衡星之耀其生植也與乾坤始其蟠縈也至三千里上鳴天雞下宅鬱壘徒駭其説莫原其以配若木以相望冠扶桑而特起爾乃煥初陽之杲杲壓巨海之漫漫太皥司方以流昐羲和䇿御而上千傾髙柯而飛鳥罕及隨巨葉而青雲共蟠何帝休之名志豈姑繇而變觀窮海陸以標竒抗蓬瀛而爭聳疑蒸林之相合乃一木之所擁照溟海則攀其若浮升日輪則逺視如捧霜雪莫能以凋換風濤庸得其震傾拂垂雲之修翼蔭吹􅕙之長鯨非有嵗之可紀每先晨之效明拂青桂于隂魄掩白榆于太清信植物之神秀壯元化之曲成木無與儔其誰騁兩鬭之術子不可獲安有被三竊之名是知瑰異之説或處明而若晦區域之心多玩小以疑大天無所不育地無所不載莫出混茫之中咸居耳目之外偉蟠桃之遐絶宜列仙之逰會安得探神物而駐韶顔涉滄海而登朔山驂素虬之夭矯駕綵鳯之回環庶因此以捧日願修條而一攀原宋吳淑桃賦果實多品惟桃可佳夭夭其色灼灼其華或成仙而益夀或制鬼而袪邪或美后妃之德或報瓊瑶之華驚蟄應氣而斯盛農人為候而無差陟雲臺而臨崖布綺逰武陵而夾岸舒霞妬􅎱常聞于武女愛惡潛移于子瑕至若綏山刻木神荼索葦犯上既戒于文侯雪賤復聞于夫子神女嘗食于二郎齊相亦殺乎三士崑崙以霜實稱竒磅磄以寒英表異旄榹異狀而同名侯白殊味而俱美别有綺葉金城之號紫文緗核之名雖云六果之下誠為五木之精髙丘餐膠而輕舉師門食葩而道成復有棓羿之事畏漢之情元冬霜林之茂朱夏豆實之英至于漢皇罷種方朔潛偷僵李傷嗟于見纍土偶哀憐于載浮樊氏競術于靈變蔡誕託詐于仙逰亦有種列三名實盈十斛太清漬花而療疾抱朴服膠而絶榖或呪之而頮面或出之而剖腹豈若饗碧實于西逰標嘉名于仙籙五言古詩增宋孔平仲食桃翦彼十圍木架此百尺梁十圍不加大百尺不加長胡為被錦繡空爾飾文章根斷膚已剝至朽不復昌食桃棄其核下與糞壤藏雨露之所濡發生乃微芒回首枝幹大冉冉出我牆開花又結子意態何煌煌梅堯臣將行與蔡仲謀飲分席上果得桃曽無千嵗人安見千嵗實聊效昔所投瓊瑶報非一七言絶句增唐蔣防元都觀桃舊傳天上千年熟今見人間五日香紅軟滿枝須作意莫教方朔施偷將宋楊萬里嘗桃金桃兩飣照銀杯一是栽花一買來香味比嘗無兩樣人情畢竟愛親栽小桃著子可憐渠疏處全疏無處無併綴一梢三十顆縋枝欲折沒人扶劉克莊桃嵗嵗春風花覆墻摘來紅實亦甘香當時無種瑶池本却恐清河未得嘗詩散句增梁任昉已謝西王苑復揖綏山枝聊逢賞者愛棲趾傍蓮池開紅春灼灼結實夏離離宋文同雨染煙蒸萬實垂丹砂為首玉為衣客疑麗水新陶得人向瓊池舊帶歸原唐溫庭筠夏園桃已熟紅臉點胭脂姚合桃花四散飛桃子壓枝垂增殷璠迎春别賜瑶池宴捧進金盤五色桃曹唐千嵗紅桃香破鼻玉盤盛出與金妃宋宋祁要待花稀見秋實縹肌細肉薦盤珍元柳貫青鳥銜書昨夜來蟠桃如斗核如杯唐杜甫鸚鵡啄金桃白居易紅潤園桃熟沈彬金桃爛熟沒人偷宋秦觀嵗星偷得桃枝碧詞增鄭域壺中天蕊宫仙子愛癡兒不禁三偷家果棄核成根傳漢苑依舊風煙難老養就丹砂長留紅臉點透胭脂顆金盤盛處恍然天上新墮莫厭對此飛觴千年一熟異人間梨棗劉阮塵緣猶未斷却向花間飛過爭似連枝摘來滿把鶯嘴平分破餐霞嚼露鎮長歌醉蓬島别録原南康記南康玉山有石桃故老云古有寒桃生于嶺巔隱淪之士將大取其實因變成石焉增酉陽雜俎蜀後主有桃核兩扇每扇著仁處約盛水五升良久水成酒味醉人更互貯水以供其宴却不知得自何處水部員外郎杜陟嘗見江淮市人以桃核扇量米正容一升言于九嶷山溪中得北户録至德初徐正字凝于海鹽縣白塔沙渚之上得一桃核片可貯一升野人間話蜀文谷好古之士也于中書舍人劉光祚處見桃核杯杯濶尺餘紋綵燦然真蟠桃之實也劉自云少時逰華嶽見一道士以此核酌瀑泉盥潄觀之驚駭道士以半片授之後蜀紀事孟昶二十年十二月中書舍人劉光祚進蟠桃核酒杯云得于華山陳摶賜帛五十匹墨莊漫録有人以桃核半枚獻王黼者中容米三四斗王氏神仙傳咸通中王㻌為王屋令遇東極真人王太虛授以所注黃庭經復與桃核大如數斗器磨而服之身輕無疾宛委餘編洪武乙卯出示元內庫所藏巨桃半核長五寸廣四寸七分前刻西王母賜漢武桃及宣和殿十字塗以金中繪龜鶴雲氣之象後鐫庚子甲申月丁酉日記命學士宋濓為賦原種桃凡種桃淺則出深則不生故其根淺不耐旱而易枯近得老圃所傳云于初結實次年斫去其樹復生又斫又生但覺生虱即斫令復長則其根入地深而盤結固百年猶結實如初增種樹書桃樹接李枝則紅而甘梅樹接桃則脆桃樹接杏則大桃熟時墻面暖處寬深為坑收濕牛糞納坑中收好桃核十數枚尖頭向上坑中糞土蓋厚一尺深春芽生和土移種之原衛桃桃實太繁則多墜以刀橫斫其幹數下乃止又社日舂根下土持石壓樹枝則實不墜桃子蛀者以煮豬首汁冷澆之或以刀疏斫之則穰出而不蛀如生小蟲如蚊俗名蚜蟲雖桐油灑之不能盡除以多年竹燈檠挂懸樹梢間則蟲自落甚驗附録羊桃增爾雅長楚銚芅注今羊桃也或曰鬼桃葉似桃華白子如小麥亦似桃疏陸璣疏云葉長而狹花紫赤色其枝莖弱過一尺引蔓于草上鄭氏曰藤生子赤狀如鼠糞故亦名鼠矢貌童食之本草亦名羊腸一名御弋生山林川谷及田野蜀本圖經子細如棗核苗長弱蔓生不能為樹今呼為細子根似牡丹原羊桃福州産其花五瓣色青黃彚考增詩檜風隰有萇楚猗儺其枝箋銚弋之性始生正直及其長大則其枝猗儺而柔順不妄尋蔓草木御定佩文齋廣羣芳譜卷五十四
