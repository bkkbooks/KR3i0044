body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十五果譜李李花别見花譜原李爾雅翼云李木之多子者故從子本草云木之多子者多矣何獨李稱木子耶按素問言李味酸屬肝果東方果也則李于五屬木故得專稱爾一名嘉慶子韋述兩京記云東都嘉慶坊有美李人稱嘉慶子增本草梵書名居陵迦原李實有離核合核無核之異小時青熟則各色有紅有紫有黃有緑又有外青內白外青內紅者大者如杯如卵小者如彈如櫻其味有甘酸苦澀之殊性耐久樹可得三十年雖枝楛子亦不細種類頗多有麥李麥秀時熟實小有溝肥甜爾雅云痤接慮李注云今之麥李是也南居李解核如杏堪入藥風上記云南居細李四月先熟季春李鄴中記云華林園有春李冬花春熟木李絶大而美御黃李形大而味厚核小而甘香李中佳品也均亭李紫而肥大味甘如蜜南方李此為最擘李熟則自裂糕李肥粘如糕中植李麥前熟趙李無核爾雅云休無實李注云一名趙李是也御李大如櫻桃紅黃色光諸李熟詳見后西溪叢語赤李其實赤爾雅云駁赤李注云子赤是也冬李十月十一月熟離核李似奈有擘裂皆李之特出者他如經李一名老李樹數年即枯杏李味小酸似杏黃扁李夏李名李出南郡縹青李出房陵建黃李出河沂見傅玄賦青皮李赤陵李馬肝李牛心李紫粉李小青李水李扁縫李金李鼠精李詳見好事集合枝李奈李晚李之類未可悉數建寧者甚甘今之李乾皆從此出增西京雜記上林苑李有紫李緑李朱李黃李青綺李青房李同心李含枝李金枝李顔淵李出魯羌李燕李蠻李侯李廣志有車上李述異記杜陵有金李李大者謂之夏李尤小者謂之鼠李客燕雜記京師佳果有麝香李盤山李彚考增詩王風丘中有李彼留之子小雅北山有李大雅投我以桃報之以李原爾雅棗李曰疐之疏謂治棗李皆去其核核者柢也孟子井上有李增晉書王濟傳和嶠性至儉家有好李帝求之不過數十濟候其上直率少年詣園共啖畢伐樹而去王戎傳戎嘗與羣兒戲於道側見李樹多實等輩競趨之戎獨不往或問其故戎曰樹在道邊而多子必苦李也取之信然南史王僧孺傳僧孺幼聰慧有餽其父冬李先以一與之僧孺不受曰大人未見不容先嘗山海經邊春之山岐山孟子之山靈山卑山其上多桃李原管子五沃之土其木宜梅李增春秋運斗樞玉衡星散為李黃帝內傳王母遺帝上清玉文之李原鹽鐵論夫李梅實多者來嵗為之衰洞𡨕記琳國去長安九萬里生玉葉李色如碧玉數千嵗一熟味酸昔韓衆嘗餌此李因名韓衆李漢武內傳李少君謂帝云鍾山之李大如瓶臣以食之遂生竒光增漢武內傳仙藥之上者有員丘紅李風俗通汝南南頓張助於田中種禾見李核意欲持去顧見空桑中有土因殖種以餘漿灌溉後人見桑中反復生李轉相告語有病目痛者息隂下言李君令我目愈謝以一豚目痛小疾亦行自愈逺近翕赫其下車騎常數千百酒肉滂沱間一嵗餘張助逺出來還見之驚曰此有何神乃我所種耳因就斫之抱朴子五原蔡誕入山而還欺其家人云到崑崙山有玉桃玉李形如世間者但光明洞徹而堅以玉井水洗之便軟而可食原神仙傳老子之母適至李樹下而生老子生而能言指李樹曰以此為我姓增孝子傳王祥後母庭中有李始結子使祥晝視鳥雀夜則趨鼠一夜風雨大至祥抱泣至曉母見之惻然搜神記袁紹在冀州有神出河東號度朔君百姓共為立廟兖州有一士姓蘇母病往禱見一客來著白布單衣髙冠冠似魚頭謂度朔君曰昔臨廬山共食白李憶之未久已三千嵗日月易得使人悵然去後謂士曰此南海君也荆州記房陵縣有朱仲者家有好李代所希有述異記瀨鄉老子祠有紅縹李一李二色魏文帝安陽殿前天降朱李八枚啖一枚可數日不食今李種有安陽李大而又甘者即其種也晉暉章殿前有嘉李房陵定山有朱仲李園三十六所潘嶽間居賦防陵朱仲之李李尤果賦云三十六園朱李是也中山有縹李大如拳者呼仙李李尤果賦云如拳之李陸士衡果賦云中山之縹李又云仙李縹而神李紅原世説王戎有好李賣之恐人得其種恆鑽其核語林和嶠性至儉家有好李諸弟往園中食李而皆計核責錢增顔氏家訓齊武成帝子琅琊王嘗朝南殿見鈎盾獻早李還索不得遂大怒詬曰至尊已有我何意無不知分齊率皆如此集真記西王母居龍月城城中産黃中李花開則三影結實則九影花實上皆有黃中二字王母惜之過於蟠桃與紫陽真官博戲則以一二百枚遞分勝負原好事集王侍中家堂前有鼠從地出其穴即生李樹花實俱好此鼠精李也增花木録北齊武帝改芳林園為仙都苑植名果有合歡杏同心李原零陵總記李直方常第果實若貢士以緑李為首雲仙𨿐記崔奉國家有一種李肉厚而無核識者曰天罰乖龍必割其耳血墮地生此李增談苑許州小窑出好李太常少卿劉蒙正有園在焉多植之每遣人負擔歸京師以遺貴要竊得嘗之絶大而味佳所謂曽知己也髙僧傳唐肅宗至德二年返轅指扶風令釋元皎於鳯翔開元寺置御藥師場忽於法會內生一叢李樹有四十九莖元皎等表賀帝喜曰此大瑞應答敕云瑞李繁滋國之興兆生在伽藍之內足知覺樹之榮感此殊祥與師同慶西溪叢語許昌節度使小廳是故魏景福殿魏太祖挾獻帝自洛都許許州有小李子色黃大如櫻桃謂之御李子即獻帝所植至今有焉武夷山記峰山有仙李如小鳥卵長而色赤味亦酸美異林𢎞治甲寅楓樹生李實又嵗丙辰李樹生豆莢苕苕滿枝學圃餘疏李種亦殊多北土盤山麝香紅妙甚江南絶無然亦有一種極大而紅者味可亞之亦有玉黃青翠嘉慶子俱稱佳品今吾圃中僅有粉李一種餘當致之原花史嘉興府城西南地産佳李因名檇李越絶書作就李又云吳王曾醉西施於此號醉李水晶李出天台間間真人曽致元帝集藻表增唐孫逖為宰相賀李樹凌冬結實表臣等伏見劉麟奏南郡李樹凌冬結實并圗及李實者唯此珍樹名應皇族玄元所指用興長發之祥明靈是憑故表非常之瑞已經夏實更發冬榮霜雪而翠葉不凋斯須而朱實皆就仁及草木既叶太平之期道貴生成仍呈久視之應恭惟聖感詎可名言所以彰寶祚之靈長表天枝之碩茂逺踰海嶠來薦闕庭豈三秀之足稱何兩岐之敢喻殊祥洊至品物同歡况在臣等寧勝抃躍無任欣慶之至雜著原晉王羲之帖青李來禽櫻桃日給藤子皆囊盛為佳函封多不生足下所疏云此果佳可為致子當種之此種彼胡桃亦生也吾篤喜種果今在田里惟以此為事故逺及足下致此子者大惠也賦增晉傅元李賦植中州之名果兮結修根於芳園嘉列樹之蔚蔚兮美弱枝之爰爰既乃長條四布密葉重隂夕景廽光傍隂蘭林於是肅肅晨風飄飄落英潛實內結豐彩外盈翠質未變形隨運成清角奏而微酸起大宫動而和甘生既變洽熟五色有章種別類分或朱或黃甘酸得適美逾蜜房浮彩點駁赤者如丹入口流濺逸味難原見之則心悅含之則神安乃有河沂黃建房陵縹青一樹三色異味殊名乃上代之所不睹兮咸升御乎紫庭周萬國之口實兮充薦饗於神靈昔怪古人之感貺乃答之以寶瓊玩斯味之竒瑋兮然後知報之為輕五言古詩增梁王筠答元金紫餉朱李穠華春發彩結實下成蹊潘生詠金谷魏后沉寒溪逢君重妖麗移玩入崇閨慙無瓊玖報徒用萃幽栖沈約麥李青玉冠西海碧石彌外區化為中園實其下成路衢在先良足貴因小邈難逾色潤房陵縹味奪寒水朱摘持欲以獻尚食且踟蹰陳江總詠李嘉樹春風早春風花落新但見成蹊處幾得正冠人當知露井側復與夭桃鄰七言絶句原唐白居易嘉慶李東都緑李萬州栽君手封題我手開把得欲嘗先悵望與渠同别故鄉來宋王十朋詠李長念詩人詠子嗟團欒繞樹日欹斜氷盤行薦炎天實不用東陵學種瓜詩散句原晉張華朱李生東苑甘瓜出西郊增唐于鵠仲夏梅霖發枝頭玉實繁原宋宋祁會見繁英出縹墻更將朱實奉華堂增宋顔延年李下不整冠謝朓夏李沉朱實原唐杜甫朱李沉不冷故索苦李餐韓愈道旁多苦李氷盤夏薦碧實脆宋蘇軾朱李扶疏禽自來紫李黃瓜村路香别録原移栽春月取近根小條栽之離大樹逺者不用待長移之别地性喜開爽宜稀栽南北成行率兩步一株太密聨隂則子小而味不佳樹下勤去草而不可耕耕則樹肥而無實嫁李正月一日或十五日以磚石著李樹岐中則實繁又臘月中以杖微打樹岐間正月晦日復打可令足子又法以煮寒食醴酪火栝著樹間亦良或曰桃樹接李則生子甘紅禁忌李多食腹脹苦澀者忌食服术人不可食不沉水者不可食不可合雀肉食不可合蜜食不可臨水食不可合漿水食製用鹽曝法夏月李黃時摘取以鹽挼去汁合鹽曬萎去核復曬乾用時以湯洗淨薦酒甚佳嘉慶子取朱李蒸熟曬乾又糖藏蜜煎皆可久留保生月録食李能除固熱調中不可多食梨梨花别見花譜原梨爾雅云梨山樆疏云其在山之名則曰樆人植之曰梨本草補遺云梨者利也其性下流利也一名果宗一名快果陶𢎞景别録云梨性冷利多食損人故俗人謂之快果一名玉乳一名蜜父清異録云建業野人種梨者詫其味曰蜜父北地處處有之南方惟宣城為勝二月開花上巳日無風則結梨必佳有二種瓣圓而舒者果甘缺而皺者味酸果圓如榴頂微凹無尖瓣性甘寒無毒潤肺涼心消痰降火解瘡毒酒毒乳梨本草云又名雪梨出宣城皮厚肉實而味長鵝梨本草云又名綿梨出河之南北皮薄漿多味頗短香則過之二梨皆入藥其餘水梨赤梨茅梨禦兒梨本草云即玉乳之訛或云禦兒一作語兒地名也在嘉興縣紫糜梨陽城夏梨秋梨種類非一他如紫梨植瑶光樓前香水梨本草云又名消梨出北地最為上品張公夏梨廣志云出洛陽北邙海內惟有一株廣都梨巨鹿豪梨廣志云重六斤數人分食之巨野梨新豐箭谷梨關西谷中梨廣志云關以西京兆右扶風界諸谷中梨率多供御味色香種種竒絶未可悉數增西京雜記上林苑有青梨實大芳梨實小大谷梨細葉梨縹葉梨金葉梨出琅琊王野家太守王唐所獻瀚海梨出瀚海北耐寒不枮東王梨出海中紫條梨廣志常山真定梨梁國睢陽梨齊都臨淄梨洛陽花木記雨梨濁梨穰梨車寶梨紅鵝梨敷鵝梨紅消梨秦王掐消梨蜜指梨清沙爛本草紫花梨療心熱詳見后耳目記真定御梨詳見后魏文帝詔含消梨漢武嘗種于上苑梨之竒品也詳見后三輔黃圖青皮早穀半斤沙糜諸梨皆粗澀不堪止可蒸煮及切烘為脯原一種桑梨止堪同蜜煮食生食冷中不益人彚考增禮記內則柤梨曰攢之注攢之者鑽治其螙處也原宋書王玄謨傳玄謨營貨利一匹布責人八百梨增南史扶桑國傳扶桑國有赤梨經年不壞北史髙聰傳聰廢於家斷絶人事惟修營園果世稱髙聰梨以為珍異山海經洞庭之山其木多柤梨家語曾參後母遇之無恩供飬不衰其妻以蒸梨不熟因出之人曰非七出也參曰蒸梨小物耳吾欲使熟而不用吾命况大事乎莊子三王五帝之禮義法度不同譬其猶樝梨橘柚耶其味相反而皆可於口韓非子夫樹柤梨橘柚者食之則甘嗅之則香神異經東方有樹焉髙百丈敷張自輔葉長一丈廣六尺其名曰梨如今之樝梨但樹大耳其子徑三尺剖之少瓤白如素和羮食之為地仙衣服不敗辟榖可以入水火注一名木梨原洞𡨕記塗山之背有梨大如升或云如斗紫色千年一花謂之紫輕梨增尹喜內傳老子西遊省太真王母共食碧梨紫梨原漢武內傳太上之藥有玄光梨增三輔黃圗三秦記云漢武帝御宿園出大梨如五升瓶落地則破其取梨先以布囊承之號曰含消雲陽宫記曰雲陽車箱坂下有梨園一頃梨數百株青翠繁密望之如車蓋原魏文帝詔真定郡梨大若拳甘若蜜脆若菱可以解煩釋悁魏書魏武為兖州牧上書曰山陽有美梨謹上三箱增曹瞞傳王自漢中至洛陽起建始殿使工蘇越往徙美梨掘之根盡血出文士傳孔融年四嵗與諸兄食梨輒取其小者人問其故答曰我小兒法當取小者由此宗族竒之神仙傳吳主徴介象至武昌甚尊敬之稱為介君後告言病帝遣左右姬侍以美梨一奩賜象象食之須臾便死乃埋葬之以日中時死晡時已至建業所賜梨付苑吏種之吏後以表聞發棺視之惟一符耳晉令諸宫秩梨守護者吏一人涼州記吕光時燉煌太守宋歆獻同心之梨南康記歸山石城內有梨熟人食其實任意取足持歸家人噉輒病或顛仆失徑亡命味似秋梨永嘉郡記青田村人家多種梨樹名曰官梨子大一圍五寸恆以供獻名為御梨吏司守視土人有未知味者實落至地即融釋幽明録成彪兄喪晝哭夜泣兄提二升酒一盤梨就之引酌相勸原世説道安公嘗集講僧數百人習鑿齒餉十梨公坐中手自剖分梨盡人遍都無偏頗桓南郡每見人不快輒嗔曰君得哀家梨當復不蒸食否注秣陵有哀家梨大如升甚美入口即消增述異記南方有三尺之梨人不得見或見而食之即為地仙洛陽伽藍記報德寺髙祖所立在開陽門外三里周圍有園珍果出焉有梨如承光寺三晉山險記山陽縣北有谷通得驢馬石勒昔在此啖梨生樹今有梨園原廣五行志宋廢帝大始中江南盛傳消梨先無此樹自此百姓爭植之既而後齊蕭氏受禪鄴侯外傳肅宗嘗夜坐召潁王等三弟同於地爐罽毯上坐時李泌絶粒上自燒二梨以賜之潁王恃恩固求上不與曰汝嘗飽肉食先生絶粒何必爭之賜以他果潁王曰先生恩渥如此臣等請聨句以為他年故事上許之潁王曰先生年幾許顔色若童兒信王曰夜抱九仙骨朝披一品衣益王曰不食千鍾粟唯餐兩顆梨既而三王請上成之上曰天生此間氣助我化無為童子通神集房次律弟子金圖十二嵗時次律問以葛洪仙籙中事以水玉數珠手節之凡兩遍三百事次律賞以轉枝梨增酉陽𨿐俎洛陽報德寺梨重六斤曹州及揚州淮口出夏梨洽聞記融峰上有青壇方五丈有燒香行道處古形銅器數種有梨樹髙三十丈子如斗至搖落時但見其汁核無得味者耳目記武宗患心熱青城山邢道士以肘後緑囊中青丹兩粒取梨數枚絞汁進之帝疾尋愈從容問其丹為何物曰赤城山頂有青芝兩株太白南溪有紫花梨一樹臣遊二山偶獲兩寶合錬成丹邢辭去後帝詔示天下有紫花梨即時奏上時恆州節度太尉公王達尚夀春公主即會昌之女弟聞真定李令種梨數株其一紫花梨即遣寺人就加封檢剪其旁樹匝以朱欄寶惜纎枝有同月桂當花發之時防蜂蝶之窺耗每以輕綃紗縠逺加籠罩焉洎及秋實公主必手選而進之比達帝庭十得其六七帝多食此梨雖不及邢氏者亦粗解其煩燥耳是時有李遵來侍御任恆州記室作進梨表云紫花開處擅美春林縹蒂懸時廽光秋浦離離玉潤落落珠圓甘不待嘗脆難勝口表達闕下公卿笑之曰常山公何用進殘梨于天府也蓋以其表有脆難勝口之句有縣宰李尚嘗以守樹不謹曽風折一枝降為冀州典午零陵總記李直方嘗第果實若貢士以楞梨為二原吳越傋史李忭本徐氏湖州安吉人為安吉令先是其家有梨樹云結一實大如升其父異之將獻郡守有謂其父曰此果非常年所有即上獻來年見徵安知復有此物不如勿獻其父然之因會鄰里將共食即席剖之有赤蛇在實中割者大驚投刃於地俄而赤蛇走其母榻下尋之了無所見未幾其母遂孕知誥增湘山野録李建勳丞相出鎮豫章一日與賓僚遊東山忽平田間一茅舍有兒童誦書聲攜䇿就之乃一老叟教數村童叟驚悚離席改容趨謝而翔雅有體氣調瀟灑丞相愛之遂觴於其廬置之客右叟亦不敢輒談李以晚渴連食數梨賔僚有曰此不宜多食號為五臟刀斧叟竊笑丞相曰先生之哂必有異同叟謝曰小子愚賤偶爾失容於鈞重然實無所聞李堅質之仍脅以巨觥曰無説則沃之叟不得已問説者曰敢問刀斧之説有稽乎曰舉世盡云必有所稽叟曰見鶡冠子所謂五臟刀斧者非所食之梨乃離别之離爾蓋言人之别離戕伐胸懷甚若刀斧遂就架取一小册振拂以呈丞相乃鶡冠子也撿之如其説李特加重過庭録邵伯恭侍郎守長安既去久之以書抵親識曰自去長安惟酥梨笋時復繫念其他漫然不復記憶可謂風流矣茅亭客話滕處士昌祐字勝華所居園中有梨名車轂圍一尺摘時先以布囊盛之落地即碎石湖集詩注良鄉燕山屬邑驛中供金粟梨內丘鵝梨為天下第一初熟收藏十一月出汗後方佳園户云梨至易種一接便生可支數十年吾家園者猶聖宋太平時所接劒南集詩注村人謂小梨為梨頭老學庵筆記紹聖中蔡京館遼使李儼蓋泛使者留館頗久一日儼方飲忽持盤中杏曰來未花開如今多幸京即舉梨謂之曰去雖葉落未可輕離原類編一士人狀若有疾懨懨無聊往謁楊吉老楊曰君熱症已極氣血銷鑠此去三年當以疽死士人不樂而去聞茅山有道士醫術通神而不欲人知乃衣僕人衣詣山願執薪水之役道士留置弟子中久之以實白道士診之笑曰汝便下山日日喫好梨一顆如無生梨取乾梨煮熟食滓飲汁疾自當平士人如其戒經一嵗復見楊楊見其顔貌腴澤脈息和平驚曰君必遇異人不然豈有痊理士人告以故吉老具衣冠望茅山設拜自咎其學之未至增雲蕉館紀談廣安出紫梨到口即化者為佳明升取其汁和紫藤粉為糕名雲液紫霜食之能却醉學圃餘疏梨如哀家梨金華紫花梨不可見也今北之秋白梨南之宣州梨皆吾地所不能及也聞西洞庭有一種佳者將熟時以箬就樹包之味不下宣州當覓此種植之亦一快也一統志梨梨洲山在寧波府奉化縣西南六十里舊志孫興公弟承公遊此獲仙梨食之成仙故名集藻頌增晉王讚梨樹頌并序太康十一年梨樹四枝與中枝合生於囿皇太子令侍中頌之嘉木時生瑞我皇祚修幹外揚隆枝內附翼翼皇儲克光其敬神啓其和人隆其盛降自玄圃合體連性時惟令月躬親北林樂在同人如蘭如金木之期應乃同其心同心之生啓自神明在心斯動於言斯形先民有則稱詩表情惟永作歌以休厥靈啓原宋謝朓謝隋王賜紫梨啓味出靈關之隂旨介玉津之澨豈徒真定歸美大谷滋慙將恐帝臺妙棠安期靈棗不得孤擅玉盤獨甘仙席雖秦君得器漢后推餐望古可儔於今誰答梁庾肩吾謝賚梨啓睢陽東苑子圍三尺新豐箭谷枝懸六斤未有生因粉水産自銅丘影連鄧橘林交苑柿逺薦中厨爰頒下室事同靈棗有願還年恐似仙桃無因留核文賦散句增魏何晏九州論真定好梨晉左思蜀都賦紫梨津潤潘嶽間居賦張公大谷之梨傅巽七誨襄陽黃梨五言古詩增梁元帝詠梨大谷常流稱南荒本足珍緑葉已承露紫實復含津沈約詠梨應詔大谷來既重岷山道又難摧折非所吝但令入玉盤周庾信奉梨接枝秋轉脆含消落更香擎置仙人掌應添瑞露漿宋梅堯臣玉汝贈永興氷蜜梨十顆梨傳真定間其甘曰如蜜君得咸陽中味兼氷作質遺之析朝酲亦以蠲煩疾吾兒勿多嗜不比盤中栗江鄰幾學士寄酥梨興平烹瓊乳咸陽摘氷枝秦女點山日張公開谷時刻破玉漿壺泛融金酒巵適從關中寄不見博士卑曽鞏食梨今嵗天旱甚百榖病已久山梨最大樹屬此亦乾朽當春花盛時雪滿山前後常期摘秋實穰穰落吾手忽驚氷玉敗不與膏澤偶清朝起周覽映葉才八九間居問時物此説得溪叟貧齋分寂絶塵抱徒噎嘔寧知蕭條內把握忽先有食新恐非稱分少覺已厚開苞日星動落刃氷雪剖煙潯擇新汲逺負盈素缶英華兩相發光彩生户牖初嘗蜜經齒久嚼泉垂口蠲煩慰諸親愈渴欣衆友肯視故畦瓜寧論濁泥藕嵗晚迫風霜人飢乏藜糗真味雖暫御未許置樽酒楊道山乞梨張果出李園有實大如斗擬須青女熟不奈飛廉吼料因秋草間磊砢驪珠走磨刀垂饞涎佇立待一剖七言古詩增宋邵雍食梨願君莫愛金花梨願君須愛紅消梨金花紅消兩般味一般顔色如胭脂紅消食之甘如飴金花食之顰雙眉似此誤人多少事未審之前宜辨之孔平仲食梨東方早寒雪霜摯新梨十月已滿市削成黃蠟圓且長味甘骨冷體有香芳尊命友先衆果百十磊砢升君堂贈君玉壺層氷之皎潔副以金莖皓露之清涼奈何撥火取煨栗梨雖至美或不嘗顰睂三咽手摩腹謂此發病為第一奪之兒口餳止哭君不記南方無此物五更酒渴喚水時思此千里莫致之及今乃以多見賤南方橘柚東方梨元耶律楚材和陳秀玉綿梨石門九月西風髙綿梨萬樹金垂梢清溪千里攜贈我藤篚乍發香盈包縹葉紫條生拔俗夜光安可同魚目文園消渴正難禁齒嚼寒氷劚香玉五言律詩增唐李嶠詠梨擅美玄光側傳芳瀚海中鳯文踈象郡花影麗新豐色對瑤池紫甘依大谷紅若令逢漢主還冀識張公宋梅堯臣王道損贈永興氷蜜梨四顆名果出西州霜前競以收老嫌氷尉齒渴愛蜜過喉色向瑶盤發甘應蟻酒投仙桃無此比不畏小兒偷程敦厚謝人送梨逺意來佳惠秋筠起翠籃清香殊未散竒品互相參鳯卵辭丹穴龍珠出古潭剖輕刀匕快嚼易齒牙甘七言律詩增宋徐鉉贈陶使君求梨昨宵宴罷醉如泥惟憶張公大谷梨白玉花繁曽綴處黃金色嫩乍成時冷侵肺腑醒偏早香惹衣襟歇倍遲今旦中山方酒渴唯應此物最相宜楊億詠梨繁花如雪早傷春千樹封侯未是貧漢苑漫傳盧橘賦驪山曾識荔支塵九秋青女霜添味五夜方諸月溜津楚客狂酲朝已解水風猶自獵江蘋劉筠詠梨玄光仙樹阻丹梯御宿嘉名近可齊真定早寒霜葉薄樊川初曉露枝低先時櫻熟煩羊酪逺信梅酸損瓠犀宋玉有情終未識蔗漿無奈楚魂迷錢惟演詠梨紫花青蒂壓枝繁秋實離離出上闌東海圓圭無奈碧嵰山甜雪不勝寒已憂仙珮懸珠重更恐金刀切玉難自與相如解消渴何須瓊蘂作朝餐丁謂詠梨搖搖繁實弄秋光曾伴青椑薦武皇元圃雲腴滋紺質上林風馭獵清香尋芳尚憶瓊為樹蠲渴因知玉有漿多少好枝誰最見冒霜丹頰倚鄰墻韓琦壓沙寺梨壓沙千畝敵侯封珍果誠非衆品同自得嘉名過氷蜜誰知精別有雌雄嘗滋沆瀣充肌脆不假胭脂上頰紅四海舉皆推美味任從潘賦紀張公劉子翬詠梨尚想飛花映綺疏離離秋實點塵蕪丹腮曉露香猶薄玉齒寒氷嚼欲無舊有佳名傳大谷誰分靈種下江都柘漿不用傳金碗猶得相如病少蘇楊東山詠梨想像含消與接枝英華集裏脆香詩外飛翠羽中懷玉嚼出清泉上滿池益齒應餐多正好堆盤儘飣老相宜炎蒸時節還能洗不是梨侯更有誰楊萬里詠梨挂冠大谷肯干時飣坐風流特地竒骨裏馨香衣不隔胸中氷雪齒先知賣漿碎搗瓊為汁解甲方憐玉作肌老子醉來渾謝客見渠倒屣只嫌疑朱子食梨珍實渾疑露結成香葩况是雪儲精乍驚磊落堆盤出旋剖輕盈照骨明盧橘謾勞誇夏熟柘漿未許析朝酲啖餘更檢桐君緑快果知非浪得名元劉因醉梨白雪春香洗未殘元霜誰遣凍成團漆封圓果盤增滑蜜和濃漿齒避寒緑蟻從今忘病渴金花無地著餘酸快人風味依然在莫作尋常軟熟看五言排律增唐許渾蒙賔客李相國見示和宣武盧僕射以吏部髙尚書自江南赴闕貺大梨白鷴因贈五言六韻攀和巨實珍吳果馴雛重越禽摘來漁浦上攜在兔園隂霜合凝丹頰風披斂素襟刀分瓊液散籠蔽雪華深虎帳齋中設龍樓洛下吟含消兼受彩應貴冡卿心五言絶句增宋蘇軾和子由岐下詠梨霜降紅梨熟柔柯已不勝未嘗蠲夏渴長見助冬氷七言絶句增宋王安石耿天隲惠梨次韻故人家果獨難忘秋實初成便得嘗直使紫花形味勝豈能終日望咸陽淮浦新隂百畝涼分甘每得助秋嘗張公大谷雖云美誰肯苞苴出晉陽甘滋南北共傳誇栽接還如老圃家誰謂交梨非外奬因君澆灌已萌芽范成大內丘裂園汗後鵝梨爽似氷花身耐久老猶榮園翁指是還三嘆曾共翁身見太平詩散句增梁宣帝緑葉已承露紫實復含津宋曽鞏初嘗蜜經齒久嚼泉垂口陶弼色鮮因曉日聲脆得秋霜晏殊嘉名舊出新豐谷美實今鄰御宿園歐陽修嗟余久苦相如渴却憶氷梨尉齒寒辛寅孫蒙君知重惠瓊實薄起金刀釘玉深嚼處春氷敲齒冷咽時雪液沃心寒宋謝朓環梨懸已紫梁沈約髙梨有繁實庾肩吾梨紅大谷晚周庾信脆梨裁數實唐太宗園梨始帶紅李白山盤薦霜梨杜甫山梨結小紅紅梨迥得霜張梨不外求桞宗元霜重梨棗熟于鵠蒸梨常共竈張籍梨晚漸紅墜宋梅堯臣剖破玉壷漿蘇軾髙樹紅消梨陸遊梨大圍三寸氷梨頳似頰金髙士談北風熟柤梨宋錢惟演紫梨半熟連紅樹黃庭堅漢苑甘寒梨得霜陸遊門前喚擔買梨頭金蕭貢霜添老葉山梨紫别録增南史張敷傳敷小名樝父邵小名梨文帝戲之曰樝何如梨敷答曰梨是百果之宗樝何敢比也原唐書崔逺傳逺有文而風致整峻世慕其為目曰飣坐梨言座所珍也御史本草侍御史為脆梨漸入佳味輶軒絶代語燕代北鄙謂老曰梨言面色如凍梨也邵氏聞見後録錢昭度有食梨詩云西南片月充腸冷二八飛泉繞齒寒豫讀樂府解題井謎云二八三八飛泉仰流蓋二八三八為五八五八四十也四十為井字韻府人勸劉淨翁捨俗出家山谷頌曰掉却甜桃喫酸梨種梨梨熟時埋之經年至春生芽次年分栽溉以肥水至冬葉落附地刈之以炭火燒頭二年即結子若櫓生及種而不栽則結子遲每梨有十餘子惟二子生梨餘皆生杜栽梨春分前十日取旺梨笋如拐樣截其兩頭火燒鐵器烙定津脈卧栽於地即活接梨取棠杜如臂以上者大者接五枝小者二三枝梨葉微動為上時欲開莩為下時先作麻紉纒十數匝以小利鋸截杜令離地五六寸將原幹用利刃貼皮劙開尖竹籖刺入皮木之際令深一寸許預取結梨旺嫩枝向陽者長五六寸削如馬耳名曰梨貼用口含少時以借其氣插入杜樹孔中大小長短削與所刺等拔去竹籖即插梨貼至所探處緊縛勿動搖以綿裹杜樹頂封熟泥於上以土培覆令梨僅出頭仍以土壅四畔當梨上沃水水盡以土覆之務令堅蜜梨枝甚脆培土時須謹愼若著掌則芽折梨貼須去黑皮勿傷青皮傷青皮則不活梨既生杜旁有葉即去之勿分其力月餘自發長即生梨梨生用箬包裹勿為象鼻蟲所傷又云凡接梨園中用旁枝葉得四散庭前用中心取其枝幹直上用根邊小枝樹形可喜五年方結子用鳩根老枝三年即結子但樹醜若逺道取貼根下燒三四寸可行數百里猶生種樹書桑上接梨則脆而甘美藏梨初霜即收多經霜不能至夏於屋下掘深窨坑底無令潤濕收梨在中不須覆蓋便可經夏摘時須好接勿令損傷物類相感志梨與蘿蔔相間收或削梨蒂種於蘿蔔內藏之皆可經年不爛本草就樹上以囊包裹過冬乃摘亦妙製用農桑通訣凡酸梨換水煮熟則甜美不損人西路産梨處取甜梨去皮切作厚片火焙乾謂之梨花允為佳果可充貢增齊民要術梨菹法先作漤用小梨瓶中水漬泥頭自秋至春至冬中須亦可用又云一月日可用將用去皮通體薄切奠之以梨漤汁投少蜜令甜酢以泥封之若卒切梨如上五梨半用苦酒二升湯二升合和之溫令少熱下盛一奠五六片汁沃上至半以篸置柸旁夏停不過五日附録檖增爾雅檖蘿注今陽檖也實似梨而小酢可食陸璣詩疏檖一名赤蘿一名山梨也今人謂之陽檖實如梨但小耳一名鹿梨一名鼠梨今人亦種之極有脆美者亦如梨之美者本草蘇頌曰江寧府信州一種小梨名鹿梨葉如茶根如小栂頭彼人取皮治瘡八月採之近處亦有但采實作乾不知入藥也李時珍曰山梨野梨也處處有之梨大如杏可食其木文細密赤者文急白者文緩彚考增詩秦風隰有樹檖附録樝原樝與柤同又作查本草云酢澀而多渣故謂之樝一名􅀈圓子一名木桃處處有之孟州特多小於木瓜更酢澀色微黃蒂核皆粗核中之子小而圓味劣於梨與木瓜而入蜜煮湯則香美過之去惡心咽酸止酒痰黃水功與木瓜相近增風土記柤梨屬內堅而香彚考增詩衛風投我以木桃報之以瓊瑤禮記內則柤梨薑桂注柤梨之不臧者山海經銅山葛山賈超之山其木多柤甘樝列於崑崙中容之國甘柤所生蓋猶之山其上有甘樝枝幹皆赤黃葉白華黑實有沃之國爰有甘柤神異經南方大荒之中有樹焉名曰柤稼􅣮柤者柤梨也稼者株稼也􅣮親昵也三千嵗作華九千嵗作實其華蘂紫色其實赤色其髙百丈或千丈也敷張自輔東西南北枝各近五十丈葉長七尺廣五尺色如緑青木皮如梓樹理如甘草味飴實長九尺圍如其長而無瓤核以竹刀剖之如凝蜜得實復見實即滅矣言復見後實熟者夀一萬二千嵗宋景文筆記鄭元注禮記謂柤梨之不臧者今樝與梨絶不類恐元所指非今樝也集藻詩散句增周庾信甘查惟一株原唐杜甫樝梨且綴碧别録增續世説張敷從彭城還傅亮下船與别張不起授手著舫户外傅遂不執手熟視張面云查故是梨中不臧者便去附録榅桲原榅桲出關陕沙苑者更佳似樝子而小氣香辟衣魚樹如林檎花白緑色味甘食之宜淨洗去毛恐損肺不宜多食同車螯食發疝氣彚考增述異記江淮南人至北見榅桲以為樝子集藻五言古詩增宋無名氏詠榅桲秦中物專靈榅桲為佳果南枝種府署髙樹立婀娜秋來收新實照日垂萬顆中滋味醴釀外飾素苴裹彥思摘晨露滿合持贈我七言絶句增宋梅堯臣得沙苑榅桲戲酬蒺藜枯枮天馬歸嫩蠟籠黃霜冒幹不比江南楂柚酸槖駝載與吳人看棠梨棠梨花别見花譜原棠梨鄭康成詩注云北人謂之杜梨南人謂之棠梨通志云甘棠謂之棠梨丹鉛總録云楟山梨今棠梨廣志云上黨楟梨小而加甘是也實如小棟子霜後可食其樹接梨甚佳處處有之有甘酢赤白二種陸璣詩疏云白棠甘棠也子多酸美而滑赤棠子澀而酢木理亦赤可作弓材爾雅云杜甘棠注云今之杜梨又云杜赤棠白者棠疏云赤者為杜白者為棠陸璣詩疏云赤棠與白棠同耳但子有赤白美惡本草云或云牝曰杜杜曰棠或云澀者杜甘者棠杜者澀也棠者糖也彚考增詩小雅有杕之杜有晥其實十六國春秋慕容雋觀兵近郊見甘棠于道周從者不識雋曰此詩所謂甘棠甘者味之主也木者春之行也五德屬仁五行屬土春以施生味以飬物色又赤者將有赫赫之慶于中土吾謂國家之盛此其徵也傳曰升髙能賦可以為大夫羣司亦各書其志吾將覽焉于是內外臣僚並上甘棠頌紀異記陕州峽石縣山中有棠一株甚偉古老傳云鳯止棠貞觀初有鳯止此木其後結實猶如合掌狀圑圑婉轉有赤黃之色其馨香脆美乃諸果之王職貢之珍也刺史韋堅為銘刻石集藻賦增晉孫楚枤杜賦并序家弟以虞氏梨賦見示余謂豈以梨有用之為貴杜無用之為賤固無用獲全所以為貴有用獲殘所以為賤故賦云爾惟有枤之為杜齊萬物而並生其質菲薄既不施于器用華葉疏悴靡休隂之茂榮昔在召伯聽訟述職甘棠作頌垂之罔極文散句增漢劉向九歎甘棠枯于豐草兮五言古詩增宋王安石甘棠梨甘棠詩所歌自足誇衆果愛其凌秋霜萬玉懸磊砢園夫盛採摘市賈爭包裹車輸動盈箱舟載輒連舵朝分不知數暮在知幾顆但使甘有餘何傷小而橢主人捐千金飣餖留四坐柑椑與橙栗在口亦云可都城紛華地內熱易生火問客當此時蠲煩孰如我别録增齊民要術棠熟時收種之否則春月移栽八月初天晴時摘葉薄布曬令乾可以染綘成樹之後嵗收絹一匹附録沙棠增山海經崑崙之丘有木焉其狀如棠黃華赤實其味如李而無核名曰沙棠可以禦水食之使人不溺本草今嶺外寧鄉瀧水羅浮山中皆有之彚考增呂氏春秋果之美者沙棠之實拾遺記岱輿山有沙棠豫章之木其長千尋細枝為舟猶長十丈西京雜記上林苑有沙棠青棠述異記漢成帝常與趙飛燕遊太液池以沙棠木為舟其木出崑崙山人食其實入水不溺詩曰安得沙棠木刳以為舟船集藻贊增晉郭璞沙棠贊安得沙棠制為龍舟泛彼滄海眇然遐遊聊以逍遙任彼去留棣棣花别見花譜原棣一名郁李一名鬱李一名爵李一名車下李一名鬱梅一名爵梅山野處處有之花及子並似木李惟子小如櫻桃熟赤色五月熟可食又可入藥增陸璣詩疏許慎曰鬱白棣樹也如李而小正白又有赤棣樹亦似白棣葉如刺榆而嫩圓子正赤原性潔喜暖日和風澆宜清水忌肥核仁氣味甘苦酸平而潤無毒治大腹水腫面目四肢浮腫利小便通水道消宿食下結氣宣大腸氣滯燥澀不通彚考增詩豳風六月食鬱及薁别録原本草按宋史錢乙傳云一乳婦因悸而病既愈目張不得瞑乙令煮郁李酒飲之使醉即愈所以然者目系內連肝膽恐則氣結膽橫不下郁李能去結隨酒入膽結去膽下則目能瞑矣此真得肯綮之妙者也御定佩文齋廣羣芳譜卷五十五
