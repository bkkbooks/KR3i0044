body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十六果譜櫻桃櫻桃花别見花譜原櫻桃本草衍義云以其形肖桃故曰櫻桃綱目云其顆如瓔珠故謂之櫻一名楔一名荆桃爾雅云楔荆桃注云今櫻桃最大而甘者謂之崖蜜一名牛桃一名英桃見博物志一名鸎桃一名含桃説文云鸎桃鸎鳥所含食故又曰含桃一名朱櫻陶𢎞景本草經注云櫻桃即今朱櫻西京雜記列櫻桃含桃為二種處處有之洛中者為勝一枝數十顆圓如珊瑚埤雅云其顆大者如彈丸小者如珠璣生時青及熟色鮮瑩深紅者為朱櫻紫色皮内有細黄㸃者為紫櫻味最珍重又有正黄明者謂之蠟櫻小而紅者謂之櫻珠味皆不及極大者有若彈丸核細而肉厚尤難得増廣志櫻桃有大者有長八分者有白色多肌者凡三種膳夫録大而殷者曰吳櫻桃黄而白者曰櫻桃小而赤者曰水櫻桃原味甘無毒調中益氣美志止洩精水榖痢令人好顔色多食令人吐有暗風及喘𠻳濕熱病人忌食小兒尤忌彚考增禮記月令羞以含桃先薦寢廟疏案月令諸月無薦果之文此獨羞含桃者以此果先成異於餘物故特記之原史記叔孫通列傳孝恵帝曽春出游離宫叔孫生曰古者有春嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上廼許之諸果獻由此興増舊唐書文宗本紀帝性仁孝嘗内園進櫻桃所司啓曰別賜三宫太后帝曰太后宮送物焉得為賜遽取筆改賜為奉中宗本紀上游櫻桃園引中書門下五品以上諸司長官學士等入芳林園嘗櫻桃便令馬上口摘置酒為樂原新唐書李適傳夏宴蒲萄園賜朱櫻蕭頴士傳頴士召為集賢校理宰相李林甫怒其不下已調廣陵叅軍事頴士急中不能堪作伐櫻桃賦曰擢無庸之瑣質蒙本枝以自庇雖先寢而或薦非和羮之正味以譏林甫東觀漢記明帝月夜宴羣臣於照園大官進櫻桃以赤瑛為盤賜羣臣月下視之盤與桃一色羣臣皆笑云是空盤晋晋宮閣名承乾殿前櫻桃二株含章殿前一株華林園二百七十株増洛陽宫殿簿顯陽殿前櫻桃六株徽音殿前乾元殿前並二株原景龍文館記四年夏四月上幸兩儀殿特命侍臣升殿食櫻桃並盛以琉璃和以杏酪飲酴醿酒上與侍臣樹下摘櫻桃恣其食未後大陳宴席奏宫樂至暝人賜朱櫻二籠増隋唐嘉話太宗将致櫻桃於酅公稱奉則以尊言賜又以卑乃問之虞監曰昔梁帝遺齊巴陵王稱餉遂從之竇烈女傳李希烈死其子欲盡誅老将有獻含桃者桂娘為蠟帛書以朱染帛丸如含桃遺陳先竒妻先竒乃率部兵斬希烈妻子異聞録天寳初有范陽盧子在東都春暮遊僧舍僧方開講盧詣之有青衣攜櫻桃一籠因與同餐遂隨之行即夢為御史為相經三十年又逢青衣復到僧舍下馬忽然昬醉講僧云何久不起乃見身著白衫服飾如故問其僕曰日已午矣酉陽雜俎衛公言滑州櫻桃十二枚長一尺道流陳景思說勅使齊日昇飬櫻桃至五月皮皺如鴻柿不落其味數倍人不測其法韓約能作櫻桃餫饠其色不變成式姑壻裴元裕言羣從中有悦憐女者夢女遺二櫻桃食之及覺核墜枕側原零陵總記李直方第諸果以櫻桃為第三增翰林集詩注每嵗初進櫻桃先宣賜學士摭言唐時新進士尤重櫻桃宴乾符四年劉鄴第二子覃及第時状頭已下方議醵率覃潛遣人預購數十樹獨置是宴大㑹公卿時京國櫻桃初出雖貴達未適口而覃山積鋪席復和以糖酪者人享蠻畫一小盎亦不啻數升以至參御軰靡不霑足續世説嚴綬為左僕射司空嘗預百寮堂中食上令中使馬江朝賜櫻桃綬為兩班之首蒨職江朝叙語次不覺屈膝而拜江朝答拜御史大夫髙郢亦從而拜為御史所劾綬出鎮荆南江朝降一官䑕璞東坡橄㰖詩云待得微甘囬齒頬已輸崖蜜十分甜注引杜詩崖蜜松花落本草崖蜜蜂黒色作房於巖崖髙峻處然坡詩與橄㰖對説非真蜜也鬼谷子曰崖蜜櫻桃也他無經見予讀南海志崖蜜子小而黄殻薄味甘増城惠陽山間有之雖不知與櫻桃為一物與否要其類也注坡詩者引小說橄㰖與棗争棗曰待爾回味我已甜特坡公換崖蜜作對耳山谷詠橄㰖云想共餘甘有𤓰葛苦中真味晚方囬坡公取其味相反山谷取其味相投李義山詩紅壁寂寥崖蜜盡此但作蜜用非是誠齋集詩注予舊在奉常孟夏太廟薦櫻桃禮官各分賜四盤金城記黎舉嘗云欲以棖子臣櫻桃但恨不同時耳因樹屋書影白櫻桃生京師西山中微酸不及朱櫻之甘碩也原花史鄜州有櫻桃山上多櫻桃樹帝京景物畧䨇林寺後一土山山前一塔傍多朱櫻集藻表増唐桞宗元為武中丞謝賜櫻桃表臣某言中使某乙至奉宣聖㫖賜臣櫻桃若干者天睠特深時珍洊降寵驚里巷恩溢圎方臣某誠喜誠懼頓首頓首伏以含桃之羞時令攸貴况今採因御苑分自天厨使發九霄集繁星而積耀味調六氣承湛露而不晞盈眥而外被恩光適口而中含渥澤顧慚素食彌切自公豈圖君子所先遂厭小人之腹無任感恩欣躍之至啓原庾肩吾謝賚朱櫻啓成叢殿側猶連製賦之條結實西園非復粘蝉之樹異合浦之歸来疑藏朱實同秦人之逐彈似得金丸賦増梁宣帝櫻桃賦惟櫻桃之為樹先百果而含榮既離離而春就乍苒苒而冬迎異羣龍之无首殊大器之晚成鳥纔食而便墮雨薄灑而皆零未覩紅顔之實空有薦廟之名等橘柚于簷户匹諸薦乎中庭異梧桐之棲鳯愧緑竹之恒貞豈復論其美惡且聳幹乎前櫺葉繁抽而掩日枝長弱而風生且得蔽乎羲赫實當暑之凄清唐張莒紫宸殿前櫻桃樹賦殿紫宸兮足麗木朱櫻兮可嘉扶疎柔弱暈艶芬葩晚移隂于丹楹朝延影于翠華美其固本宸居獻名清廟藹緑含彩攢紅吐耀晴暘斜映將藻井以相輝初月旁臨與璧璫而共照于是𤣥律方變青陽始萌日近易暖天臨早榮通條液潤附節葺生秦文信之著令漢稷嗣之從行莫不勤其時獻旌此嘉名将畫栱以斜界與金華而對明玉輦行低雲旗雜處迎華桂而摇露向朱明而清暑榮得其時摘得其所於方也可尚取類也無匹浄拂璇題逺當温室舊株昔移於漢囿蜜幹今逄於堯日及夫春宿微雨秋含翠烟冬條雪染夏實珠駢垂一枝於萬葉託沃土以延年翫芳誠百花之首充薦乃衆果之先代帷房之錦帳奪首飾於金鈿濟濟多士鏘鏘拜闕拂露華以晨趨染香花而夕謁始凌寒而驚換纔及暖而前發自承恩於攀賞固無憂於翦伐伴穠李以表年笑階蓂之記月元程從龍櫻桃賦并序元至正庚辰舘寓石洑齋舍後蔬圃其中有櫻桃啖而羙之遂為小賦以寓意云繄勾芒之作春何窮奢而極侈既袤野以施翠復因林而設綺一旦代序成功者去捲紅紫以囬轅繫繁珠於佳樹但見的皪兮霰集璀璨兮星聚蝶欲聚而辟易鶯欲啄而驚懼儼翠幄之重重韜至珍於茹圃爰有詩人此焉遊遨感園丁之摘獻俾侑進乎芳醪覩珠顆之勻圓始知其為櫻桃也於是摭火齊於銀盤啖紅香之瓊液玩其精華服其風味爽可以愈沉痾腴可以羙意氣羗理内而益脾信蠲煩而清臆終並功乎丹鼎豈擅譽乎崖蜜唐以之昭寵於新科漢以之均恩於百職廟羞薦天子之忱寵贈旌野人之徳憶金鑾之殊遇壓珠盤之佳色何顯赫之不常乃失身於幽側毎被銷於凡齒歎九重之懸隔在物理而尚然宜人情之通塞感斯果之擅稱聊寄懐於翰墨明錢文薦櫻桃賦并序漢明帝月夜燕羣臣於沼時大官進櫻桃盛桃以盤厥名赤瑛桃盤同色四照空明臣觀諧喜觴酌縱横坐中獻賦異代長卿賦曰何華林之名品兮乃殊異乎恒族先百果而珍竒兮歴九春而成熟錫字肇夫月令兮和中紀於藥録因薦羞其禮隆兮縁頒賚以惠足念朱明之来早兮悲青陽之去速向芳榭而流丹兮入文窗而映緑枝嫋嫋以低亞兮實纍纍其相續料素娥之未攀兮愁黄鳥之先啄幸未傷於風雨兮知有待乎晴旭遙而望之爛若霞彩綴瓊枝廹而就之恍如珊瑚碎金谷既稱名乎樂府亦註譜於仙都姿輝映以擬玉質圓轉而方珠揣火棗之同類恐萍實之不如帶露痕而覺有眩燈暈而疑無爾其寢廟駕返御園㫖宣紛紜馳騎絡繹飛箋聊開秘閣別整華筵就中窈窕沾恩最先乍入脣而脂掩忽籠袖而火然神脉脉以無定歩珊珊其不前亮衷情之有托豈絃管之能傳借嘉物以相比發清歌而自憐歌曰朱實兮離離玉膚兮絳衣傋百和兮含五滋粲皓齒兮色怡朱實兮盈盈玉壺兮紅氷歛䨇眸兮對孤燈墮清淚兮血凝歌罷月輪斜度天河倒㵼徙倚闌邊殷勤露下張樂易歇留情難舍亟起為亂仍歸於雅亂曰谷梨消煩尚𢃄寒兮壺甘釋悁猶含酸兮未若朱實堆玉盤兮食之羙好使人歡兮常恐節移倐彫殘兮安得九轉如金丹兮文賦散句增晋左思蜀都賦朱櫻春就潘岳朱實賦煥若隨珠皎如列星閒居賦三桃表櫻胡之別宋劉義恭謝賜櫻桃啓為樹則多隂百果則先熟原唐蕭潁士伐櫻桃樹賦綴繁英兮霰集駢朱實以星羅故當小鳥之所啄食妖姬之所攀玩五言古詩増梁簡文帝奉答南平王康賚朱櫻倒流映碧叢㸃露擎朱實花茂蝶争飛枝濃鳥相失已麗金釵瓜仍美玉盤橘寜異梅似丸不羨萍如日永植平臺垂長與雲桂宻徒然奉推甘終以愧操筆唐太宗賦得櫻桃華林滿芳景洛陽徧陽春朱顔含逺日翠色影長津喬柯囀嬌鳥低枝映美人昔作園中實今来席上珍白居易有木詩有木名櫻桃得地早滋茂葉宻獨承日花繁偏受露迎風闇揺動引鳥潜来去鳥啄子難成風来枝莫住低軟易攀翫佳人屢廽顧色求桃李饒心向松筠妬好是映墻花本非當軒樹所以姓蕭人曽為伐櫻賦宋楊萬里櫻桃含桃丹更圓輕質觸必碎外有千粒珠中藏半泓水何人弄好手萬顆揚虚脆印成花鈿薄染作氷澌紫此果非不多此味良獨美七言古詩増宋文同朱櫻歌金衣珍禽弄深樾禁籞朱櫻斑若纈上幸離宮促薦新藤籃寳籠貂璫發凝霞作丸珠若軟油露成津蜜初割君王日午坐猗蘭翡翠一盤紅靺鞨五言律詩增唐李商隐深樹見一顆櫻桃尚在髙桃留晚實尋得小庭南矮堕緑雲髻欹危紅玉篸惜堪充鳯食痛已被鶯含越鳥誇香荔齊名亦未甘宋楊億櫻桃團於火色貝燦極月光珠西海瑤池苑曽城寳樹區鳯幘生猶嫩龍晴脱未枯形標與霞彩紫府閟雲腴梅堯臣朱櫻明珠摘本未紅露貯金盤始見侍臣賜已為黄鳥殘味兼羊酪美食厭楚梅酸苑囿東周盛纍纍映葉丹併日得朱表臣酪及櫻桃昨日酪将熟今朝櫻可餐紫蒓休定價黄鳥未新殘甘滑已相羙齒牙仍尚完應知消客熱逺贈盎盈盤戴復古櫻桃緑樹帶朱實驅禽費彈丸獨先諸果熟堪奉五侯餐猩血和瓊液蠙珠走玉盤同時得同賞芍藥滿雕欄明髙啓櫻桃密緑映圓紅枝頭的的同熟迎梅實雨落值栁花風美女名偏稱流鶯啄未空憶曽春薦後捧賜出深宫王叔承荆溪游櫻桃園珠林光萬㸃紅亂野園芳艶奪桃花彩甘驕荔子漿女翻䨇腕白鶯溜一衣黄問是誰家勝江東顧辟疆七言律詩増唐王維勅賜百官櫻桃芙蓉闕下㑹千官紫禁朱櫻出工闌纔是寢園春薦後非闗御苑鳥銜殘歸鞍競帶青絲籠中使頻傾赤玉盤飽食不湏愁内熱大官還有蔗漿寒崔興宗和王維勅賜百官櫻桃未央朝謁正逶迤天上櫻桃錫此時朱實初傳九華殿繁花舊雜萬年枝未勝晏子江南橘莫比潘家大谷梨聞道令人好顔色神農本草自應知原杜甫野人送朱櫻西蜀櫻桃也自紅野人相贈滿筠籠數廽細冩愁仍破萬顆匀圓訝許同憶昨賜霑門下省退朝擎出大明宮金盤玉筯無消息此日嘗新任轉蓬韓愈和水部張員外宣政衙賜百官櫻桃漢家舊種明光殿炎帝還書本草經豈似滿朝承雨露共看傳賜出清𡨕香隨翠籠擎初重色照銀盤㵼未停食罷自知無所報空然慙汗仰皇扃増張籍朝日賜櫻桃仙果人間都未有今朝忽見下天門捧盤小吏初宣勑當殿羣臣共拜恩日色遙分廊下坐露香纔出禁中園毎年從此長先熟願得千春奉至尊白居易吳櫻桃含桃最說出東呉香色鮮穠氣味殊洽恰舉頭千萬顆婆娑拂面兩三株鳥偷飛處銜將火人摘爭時蹋破珠可惜風吹兼雨打明朝後日即應無温庭筠自有扈至京師已後朱櫻之期露圓霞赤數千枝銀籠誰家寄所思秦苑飛禽諳熟早杜陵遊客恨来遲空看翠幄成隂日不見紅珠滿樹時盡日徘徊濃影下祗應重作釣魚期原韓偓湖南絶少含桃偶人以新摘者見恵感事傷懐因成四韻時節雖同氣候殊未知堪薦寢園無合充鳯食留三島不許鶯偷過五湖苦笋恐難回象七酪漿無復瑩蠙珠金盤嵗嵗長宣賜忍淚看天憶帝都盧延讓謝楊尚書恵櫻桃滿合虛紅怕動搖尚書知重賜櫻桃揉藍尚帶新鮮葉潑血猶殘舊折條萬顆真珠輕觸破一團甘露軟含消春來老病尤珍荷併食中腸似火燒増宋梅堯臣夜夢蔡紫微君謨同在閣下食櫻桃蔡云與君及此再食矣夢中感而有賦覺而録之朱櫻再食䨇盤日紫禁重頒四月時滉朗天開雲霧閣依稀身在鳯凰池味兼羊酪何由敵䜴下蒓羮不足宜原廟薦来應已久黄鶯猶在最深枝楊萬里櫻桃櫻桃一雨半凋零更與黄鸝翠羽争計㑹小風留紫脆殷勤落日弄紅明摘來珠顆光如濕走下金盤不待傾天上薦新舊分賜兒童猶觧憶寅清原陳師道謝人送櫻桃開門先得故人書稍喜提攜起覆盂得句有誰知我在嘗新此日頼吾徒傾籃的皪霑朝露出袖熒煌得寳珠㑹薦瑛盤驚一座莧腸藜口未良圖増元牟巘七兒應復與客飲櫻桃園摘新歸以遺親用其詩韻識所感尚記當年薦寢園百官分賜荷恩寛帶青絲籠空餘夢搔白頭人苦不歡詩老誇稱作崖蜜野翁驚看㵼銀盤南山見説紅千樹鳥雀兒童任入闌明袁凱江上櫻桃正盛而予寓所無有忽蘇城友人恵一大盒故賦此野店荒蹊紅滿枝暖烟微雨共離披忽思西蜀勻圓顆正值東呉逺送時老子細看方自訝兒童驚喜欲成癡拾遺門下曽沾賜此日飄蓬也賦詩原黄正色櫻桃塞外含桃五月紅一尊相對晚来風髙情不在羲皇下清夢常牽江水東薦廟久虚支子位承恩敢望大明宮詰朝又值蒲觴㑹湏信人間似轉蓬王士騏櫻桃小鳥枝頭啄欲殘羙人珍惜捲簾看霞烘的的珊瑚碎露洗垂垂琥珀寒素面相逢渾似醉朱唇半吐欲成丹若敎纎手和烟折也勝官家赤玉盤陳繼儒櫻桃藥欄春盡少花開葉底朱櫻若個猜熟後雨彈紅玉破生前烟捧緑珠米唇脂清淺疑無骨風味溫柔别有胎鸚鵡莫教輕啄碎擲他年少滿車囬五言排律増唐孫逖和韻廨署有櫻桃上林天禁裏芳樹有紅櫻江國今来見君門春意生香從花綬轉色繞佩珠明海鳥啣初實吳姬掃落英切將稀取貴羞與衆同榮為此堪攀折芳蹊處處成原白居易與沈楊二舍人閣老同食勑賜櫻桃翫物感恩因成十四韻清曉趨丹禁紅櫻降紫宸驅禽飬得熟和葉摘来新圓轉盤傾玉鮮明籠透銀内園題兩字西掖賜三臣熒惑晶華赤醍醐氣味真如珠未穿孔似火不燒人杏俗難為對桃頑詎可倫肉嫌盧橘厚皮笑荔枝皴瓊液酸甜足金丸大小勻偷湏防曼倩惜莫擲安仁手擘纔離核匙抄半是津甘為舌上露暖作腹中春已懼長尸禄仍驚數食珍最慚恩未報飽餵不才身増杜牧和裴傑秀才新櫻桃新果真瓊液人應宴紫蘭圓疑竊龍頷色已奪雞冠逺火微微辨繁星厯厯看茂先知味好曼倩恨偷難忍用烹騂酪從將翫玉盤流年如可駐何必九華丹宋劉筠櫻桃赤水分珠樹薰風送麥秋蜀都春氣早漢苑夏隂稠廟薦清和候恩頒侍從流楚昭萍已剖韓嫣彈爭投沆瀣滋芳液醍醐助品羞玉盤光宛轉㑹擬付歌喉楊億櫻桃離宮時薦罷樂府艶歌新石髓凝秦洞珠胎剖漢津三桃聊並列百果獨先春清籞来君賜彫盤助席珍甘餘應受和圓極豈能神楚客便羊酪歸期負紫蓴梅堯臣聞學士院試含桃薦寝廟詩擬作交交鳴谷鳥粲粲熟荆桃寢廟此先薦離宮将以遨既同羞俎實且異獻溪毛露顆明朝日朱光逼頳袍戴經傅自久漢令著方髙天子從兹食羣臣賜亦叨五言絶句増唐李商隐嘲櫻桃朱實鳥含盡春樓人未歸南園無限樹獨自葉如幃百果嘲櫻桃珠實雖先熟瓊莩縱早開流鶯猶故在爭得諱含米櫻桃答衆果莫相誚天生名品髙何因古樂府惟有鄭櫻桃宋蘇軾和子由岐下詠櫻桃獨繞櫻桃樹酒醒喉肺乾莫愁枝上露從向口中漙原范成大題櫻桃火齊寳纓絡垂於緑繭絲幽禽都未覺和露折新枝増金張建山中林櫻墮紅珠打著琴上絃山人時一笑愛此聲琅然七言絶句御製櫻桃禁籞朱櫻曉露勻不湏驛騎拂紅塵芙蓉未賜千官㑹寢廟春殘早薦新初夏含桃味早全西山結實弱枝連赤瑛充薦休言過丹色濃濃衆果先原唐李白白櫻桃紅羅袖裏分明見白玉盤中看卻無疑是老僧休念誦腕前推下水晶珠顧况櫻桃曲百舌猶来上苑花遊人獨自憶京華遙知寢廟嘗新後勅賜櫻桃向㡬家増桞宗元摘櫻桃贈元居士時在望仙亭南樓與朱道士同處海上朱櫻贈所思樓居况是望仙時蓬萊羽客如相訪不是偷桃一小兒張祜櫻桃石榴未拆梅猶小愛此山花四五株斜日庭前風裊裊碧油千片漏紅珠韋荘白櫻桃王母堦前種㡬株水晶簾外看如無只應漢武金盤上㵼得珊瑚白露珠陳與義櫻桃四月江南黄鳥肥櫻桃滿市燦朝暉赤瑛盤裏雖殊遇何似筠籠相發揮詩散句増唐韓偓未許鶯偷出漢宮上林初進半金籠蔗漿自透銀杯冷朱實相輝玉椀紅原杜甫赤墀櫻桃枝隠映銀絲籠増宋王禹偁鳥銜紅映觜猿飽滑流唇宋祁林長景星宻枝重串珠繁賞鮮流火動漿熱醉霞温原劉敞磊落火齊珠參差珊瑚叢已驚變濃緑忽更垂繁紅増張俞南國繞春實繁如躑躅然陳師道並蔕隨宜好連心著意紅唐王建白玉窓前起草臣櫻桃初赤賜嘗新元稹心源一種閒如水同醉櫻桃林下春宋蘇轍盤中宛轉明珠滑舌上逡廵絳雪消張俞紅實離離壓彩枝熒煌珠琲粲葳蕤花蕊夫人三月櫻桃乍熟時内人相引看紅枝唐白居易殘櫻落紅珠温庭筠櫻桃千子紅韋荘櫻紅鳥競􅡪宋謝希孟穀雨櫻桃落戴昺櫻熟鳥先窺原唐杜甫朱櫻此日垂朱實増王建分朋閒坐賭櫻桃白居易櫻桃子綴小紅珠温庭筠紅垂果蔕櫻桃重韓偓紅暈櫻桃粉未乾韋荘西園夜雨紅櫻熟紅垂野岸櫻還熟宋劉筠内苑朱櫻兼酪賜陸游蠟櫻桃子酪同時蘇軾櫻桃爛熟滴階紅詞増宋晁補之浣溪沙雨後園亭緑暗時櫻桃紅顆壓枝低緑兼紅好眼中迷荔子天教生處逺風流一種阿誰知最紅深處有黄鸝辛棄疾菩薩蠻香浮乳酪玻瓈椀年年醉裏嘗新慣何物比春風歌唇一㸃紅江湖清夢斷翠籠明光殿萬顆㵼輕勻低頭愧野人李洪浪淘沙上苑又春殘櫻顆如丹明光宮裏水晶盤想得退朝花底散宣賜千官徃事記金鑾荔子難攀多情更有酪漿寒蜀客筠籠相贈處愁憶長安王沂孫三姝媚紅纓懸翠葆漸金鈴枝深瑤堦花少萬顆燕支贈舊情爭奈弄珠人老扇底清歌還記得樊姬嬌小幾度相思紅豆都消碧絲空裊芳意荼䕷開早正夜色瑛盤素蟾低照薦筍同時歎故園春事已無多了貯滿筠籠偏暗觸天涯懐抱謾想青衣初見花隂夢好别録増丹鉛總録唐令狐楚有進金花銀櫻桃籠状云首夏清和含桃香熟毎聞捧擷湏有提攜以其鮮紅宜此潔白原山家清供結實時湏張網以驚鳥雀置葦箔以䕶風雨若經雨則蟲自内生人莫之見用水浸良久則蟲皆出乃可食増本草櫻桃鹽藏蜜煎皆可或同蜜擣作糕食唐人以酪薦食之原種植二三月間分有根枝栽土中糞澆即活仍記隂陽否則不生即生亦不結實附録山櫻桃増本草山櫻桃一名朱桃一名麥櫻一作英一名英豆一名李桃孟詵曰又名柰桃樹如朱櫻但葉尖長不團子小而尖生青熟黄赤亦不光澤而味惡不堪食味辛平無毒楊梅原楊梅一名朹子生江南嶺南山谷間㑹稽産者為天下冠吳中楊梅種類甚多名大葉者最早熟味甚佳次則卞山本出苕溪移植光福山中尤勝又次為青蔕白蔕及大小松子此外味皆不及樹若茘枝葉細青如龍眼及紫瑞香本草云楊梅樹葉冬月不彫二月開花結實形如楮實子肉在核上無皮殻五月熟生白熟則有白紅紫三色紅勝于白紫勝于紅凡楊梅顆大核細為上鹽藏蜜漬糖製火酒浸皆佳可致逺多食令人傷熱食核中仁可觧味酸甘微熱滌腸胃除煩潰惡氣久食損齒及筋發瘡致痰増北户録播州有白色者甜而絶大越郡志㑹稽楊梅為天下之竒顆大核細其色紫建安亦有之彚考増南史任昉傳昉為新安太守郡有蜜嶺多楊梅舊為太守所採昉以冐險多物故即時停絶吏人咸以為百餘年未之有也原孝義傳王虚之庭中楊梅樹隆冬三實人謂孝感所致林邑記邑有楊梅其大如杯椀青時極酸熟則如蜜用以釀酒號為梅香酎博物志地瘴處多生楊梅廣州記廬山頂有湖楊梅山桃繞其際海人時登採拾止得於上飽食不得持下世説梁國楊氏子九嵗甚聰慧孔君平詣其父父不在乃呼兒出為設果果有楊梅孔指以示兒曰此是君家果兒應聲曰未聞孔雀是夫子家禽増雲仙雜記陸展郎中見楊梅歎曰此果恐是日精然若無蜂兒採香誰勝難和之味即以竹絲籃貯千枚并茶花蜜送衡山道士原東坡集客有言閩廣荔枝何物可對者或對西凉葡萄予以為未若呉越楊梅平可正詩云五月楊梅已滿林初疑一顆價千金味方河朔葡萄重色比瀘南荔子深則古人亦有舉而方之者矣増東坡詩註杭州人呼白楊梅為聖僧南越志熙安縣多楊梅揮麈録王嶷字豐父守㑹稽童貫時方用事貫苦脚氣或云楊梅仁可療是疾豐父裒五十石以獻之西湖古跡事實杭州楊梅隖在南山近瑞峯石隖内有一老嫗姓金其家楊梅甚盛俗稱楊梅隖所謂金婆楊梅是也吳興記故章縣北有石槨山上生楊梅常以貢御吳興園林記葉氏石林在卞山之陽一徑産楊梅盛夏之際十餘里間朱實離離不减閩中荔枝也貴耳集閩士赴科吳人赴調各以鄉産自誇閩曰荔枝吳曰楊梅有題壁曰閩鄉玉女含氷雪呉郡星郎駕火雲劔南詩註太白梁園吟云玉盤楊梅為君設吳鹽如花皎白雪不知楊梅酸者乃薦以盬佳品未嘗用也項里鄉俗謂楊梅止曰梅謂選擇楊梅曰作梅原詩話總龜宋時梵天寺有月廊數百間庭前多楊梅盧橘子瞻詩曰夢繞呉山却月廊楊梅盧橘覺猶香増西吳枝乘果實芰藕菱芡皆佳而楊梅殊絶出太子灣者大幾如卵甘不勝口弁山記弁山下楊梅樹以數萬計青翠滿林不减閩之荔枝福建志尤溪縣九仙山有石碁局鄉人林五入樵山中見二人奕從旁觀之二白鶴啄楊梅墮一顆於地奕者令拾之因俛拾以食遽失奕者所在抵家遂辟榖不火食集藻頌増梁江淹楊梅頌寳跨荔枝芳軼木蘭懐蕊挺實涵黄糅丹鏡日繡壑照霞綺巒為我羽翼委君玉盤七言古詩増宋周必大次韻閻刑部才元楊梅炎官傘照濤江紅五月獻果明光宮越人一枝古所重蜀無他楊譜則同𤣥珠更將赤水浴流火呈祥復王屋下伴長安黒彈丸殺吏驚人寒起粟新詩字字含芳鮮大書遺我敦同年請君速訪天竺老食白追繼仇池仙明楊循吉初食楊梅楊梅本是我家果歸来相對歎先作往来南北數十年久不餐汝㡬㤀却憶從年少在吳中食以成傷難療藥年年端午即有之街頭賣折先附郭初間生酸帶青色次見熟從枝上落吳儂好竒不論錢一味纔逢傾倒槖生時熏蒸喜烈日所怕狂風隂雨虐有紅有白紫者佳大如彈丸圓可握生芒刺口易破碎到牙甘露先流齶黄船奉貢晝夜走數枚出賜惟臺閣其餘官小那得預說著江南懐頗惡吳人鹽蜜百計収不知本味終枯涸肉存液去但有名奪以酸甜無可嚼我今到家又遇夏正是髙林雨方濯滿盤新摘恣狂啖十指染丹如茜著細思口實亦小事其来乃以微官博使余不有故山歸安得香鮮列惟錯人生百年有適意忍口勞勞何所樂五言律詩増宋岳珂楊梅渰厯三家市梅垂萬顆酸雲池看火樹嶁室試金丹風露盈籃重氷霜透齒寒他楊應不類留與子雲看七言律詩原宋平可正楊梅五月楊梅已滿林初疑一顆價千金味方河朔葡萄重色比瀘南荔子深飛艇似聞新入貢登盤不見舊供吟詩成欲寄山中友恐起頭陀愛渴心増陸游六峯項里看采楊梅緑隂翳翳連山市丹實纍纍照路隅未愛滿盤堆火齊先驚探頷得驪珠斜簪寳髻看遊舫細織筠籠入上都醉裏自矜豪氣在欲乘風露摘千株方岳詠楊梅五月梅晴暑正袢楊家亦有果堪攀雪融火齊驪珠冷粟起丹砂鶴頂殷併與文園消午渇不禁越女蹙春山畧如荔子仍同姓直恐前身是阿環原楊萬里謝紹興帥丘宗卿恵楊梅越絶諸楊盛一時與儂瓜葛不曽知一夫自歎吾衰矣此客何從夢見之也解過江尋徳祖政縁作尹是丘遲渠伊不是南村𣲖未分先驅事荔枝梅出稽山世少䨇情知風味勝他楊玉肌半醉生紅粟墨暈微深染紫囊火齊堆盤珠徑寸醴泉浸齒蔗為漿故人觧寄吾家果未變蓬莱閣下香増明李東陽賜楊梅官河催載滿船氷五月楊梅入帝京沁齒不知紅露濕到詩偏助玉堂清名從傅鼎遥分𣲖價比隋珠亦稱情再拜文華門外地講筵恩重若為榮五言絶句増宋郭祥正楊梅紅實綴青枝爛漫照前塢不及杏繁時林間有仙果顆顆龍睛濕深深映石門自憐非荔子不得薦堯閽陳景沂楊梅止渇還相似和羮諒亦同不思五和裏均擅一調功明吳寛楊梅五月果初熟枝頭鶴頂丹欲知甘冷好千顆薦氷盤七言絶句増宋蘇軾參寥恵楊梅新居未換一根椽只有楊梅不直錢莫共金家鬭甘苦參寥不是老婆禪陶弼楊梅嶺北土寒無荔子人言形味似楊梅翠條丹實休相學不願紅塵一騎来陸游項里觀楊梅山前五月楊梅市溪上千年項羽祠小繖輕輿不辭逺年年来及貢梅時隔嵗租園不計錢楊梅海裏過年年癡人只競閒名利那信三山是地仙山中户户作梅忙火齊驪珠入帝鄉細織筠籠相映發華清虚説荔枝筐徐似道火齊無光荔實圓未嘗先説齒流涎喚回天竺三年夢參透披雲一味禪方岳楊梅筠籠帶雨摘初殘粟粟生寒鶴頂殷衆口伹便甜似蜜寜知竒處是微酸詩散句増宋蘇軾南村諸楊北村盧白花青葉冬不枯垂紅綴紫烟雨裏特與荔枝為先驅原明徐階三春葉底青丸小五月枝頭赬彈圓折米鶴頂紅猶濕剜破龍睛血未乾増宋張舜民姑射團肌雪祝融留眼睛正愁春酒盡且喜火丹成蘇軾羅浮山下四時春盧橘楊梅次第新陸游今年項里楊梅熟緑李米禽不足言唐孟浩然稚子摘楊梅張泌髙林帶雨楊梅熟宋蘇軾時于㯶裏得楊梅王安石㝠𡨕江雨熟楊梅陸游火齊楊梅已再嘗楊梅線紫開園晚詞増宋陳舜翁南柯子徳祖家珍熟錢塘五月中碧梧桐翠盖筠籠傾向水晶盤内鬭嘗空絳粟成團小清甜笑蜜濃微酸猶觧慘人容最是玉纎撚處染輕紅王觀浪淘沙素手水晶盤疉起仙丸紅綃碾碎却成團安得宻排金粟徧何似雞冠味勝玉漿寒只怕宜酸莫將荔子一般看色淡香消僝僽損纔到長安元張雨燕山亭鶴頂珠圓蝟肌粟聚寳葉揉藍初洗親剪翠柯逺贈筠籠脉脉紅泉流齒骨換丹砂笑尚帶儒酸風味誰記曽問譜西冷緑隂青子君家㡬度樽前摘天上繁星伴人同醉纎手素盤厯亂殷紅浮沉半壺脂水珍果同時惟醉冩米禽青李爭似為越女吳姬染指别錄原種植性宜山地核投糞池中浸六月取出収潤土中二月鋤地種之待長尺許次年移栽三四年後以生子枝接之次年仍移栽山地多留宿土臘月内離根四五尺於髙處開溝灰糞壅之不宜著根毎遇雨肥水滲下則結子大而肥物類相感志云桑樹接楊梅則不酸樹上生癩以甘草釘之則去増墨客揮犀楊梅有雌雄雄者不實鑿木幹作方寸穴取雌木填之乃實學圃餘疏楊梅湏山土吾地沙土非宜種之亦能生但少耳樹極婆娑可愛今當種澹圃髙岡上與山礬相覆䕃原製用糖楊梅以梅三斤為率用鹽一兩醃半日沸湯浸一夜控乾入糖二斤薄荷葉一大把輕手拌勻日暴汁乾収増齊民要術藏楊梅法擇佳完者一石以鹽一斗醃之鹽入肉中仍出爆令乾熇取杬皮二斤煑取汁漬之不加蜜漬梅色如初羙好可堪數嵗清供録楊梅渇水楊梅不計多少掬搦自然汁濾至十分淨入砂石器内慢火熬濃滴入水不散為度若熬不到則生白醭貯以净器用時毎一斤梅汁入蜜三斤腦麝少許冷熱任用如無蜜毬糖四斤入水熬過亦可枇杷花附見原枇杷樹髙丈餘易種肥枝長葉微似栗大如驢耳背有黄毛形似琵琶故名隂宻婆娑可愛四時不凋冬開白花三四月成實簇結有毛大者如雞子小者如龍眼味甜而酢白者為上黄者次之皮肉薄核大如茅栗相傳枇杷秋萌冬花春實夏熟備四時之氣他物無與類者清異録云建業野人種枇把者誇其色曰䗶兄襄漢吳蜀淮揚閩嶺江西湖南北皆有廣志云無核者名焦子出廣州味甘酸平無毒止渇下氣利肺氣止吐逆潤五臓主上焦熱可充果實多食發痰傷脾同炙肉及熟麫食患熱黄疾花治頭風鼻流清涕木白皮止吐逆不下食葉治肺胃病取其下氣氣下則火降痰順而逆嘔欬渇皆愈彚考増周禮地官場人掌國之場圃而樹之果蓏珍異之物註珍異葡萄枇杷之屬唐書徳宗本紀大厯十四年五月癸亥即位閏月戊寅罷山南貢枇杷江南甘橘非供宗廟者西京雜記上林苑枇杷十株晋宮閣名華林園枇杷四株廣州記枇杷若榴參乎京都華山記華山講堂西頭有枇杷園冷齋夜話東坡詩曰客來茶罷空無有盧橘微黄尚帶酸張嘉甫曰盧橘何種果類答曰枇杷是矣又問何以騐之答曰事見相如賦嘉甫曰盧橘夏熟黄甘橙楱枇杷撚柿亭奈厚朴盧橘果枇杷則賦不應四句重用應劭注曰伊尹書曰箕山之東青鳥之所有盧橘常夏熟不據依之何也東坡笑曰意不欲耳三桞軒記枇杷為麤客居山雜志巖下有枇杷一樹已及百年翠葉扶疎可愛集藻賦増宋周祗枇杷賦并序昔魯季孫有嘉樹韓宣子賦譽之屈原離騷亦著橘頌至枇杷樹寒暑無變負雪揚華余植庭圃遂賦之云名同音器質貞松竹四序一采素華冬馥霏雪潤其緑蕤商風理其勁條望之㝠濛即之疎寥謝瞻安成郡庭枇杷樹賦伊南國之嘉木偉邦庭而延樹稟金秋之清條抱東陽之和煦肇寒葩于結霜承炎果乎纎露髙臨甍首傍拂階路五言古詩原唐羊士諤枇杷花珍樹寒始花氤氳九秋月佳期若有待芳意常無絶嫋嫋碧海風濛濛緑枝雪急景有餘妍春禽自流悦宋宋祁枇杷有果産西蜀作花凌早寒樹繁碧玉葉柯疉黄金丸上都不可寄味咀獨長歎増范成大手植枇杷枇杷昔所嗜不問甘與酸黄泥裹餘核散擲籬落間春風拆勾萌樸􅈪如榛菅一株獨成長蒼然齊屋山去年小試花瓏瓏犯氷寒化成黄金彈同登桃李盤大鈞播羣物斡旋不作難樹老人何堪挽鏡覓朱顔領髭爾許長大笑欹巾冠五言律詩原唐司空署衛明府寄枇杷葉傾筐呈緑葉重疉色何鮮詎是秋風裏猶如曉露傳仙方當見重消疾未應便全勝甘蕉葉空披謝氏篇増宋司馬光枇杷洲周官歛珍味漢苑結芳根何意荒洲上猶餘嘉樹存犯寒花已發迎暑實尤繁願逐葡萄使離宫奉至尊蘇軾真覺院賞枇杷緑暗初迎夏紅殘不及春魏花非老伴盧橘是鄉人井落依山盡巖崖發興新嵗寒君記取松雪看蒼鱗原楊萬里詠枇杷大葉聳長耳一梢堪滿盤荔支多與核金橘却無酸雨壓低枝重漿流氷齒寒長卿今在否莫遣作園官七言律詩増宋陸游山園屢種楊梅皆不成枇杷一株獨結實戲作長句楊梅空有樹圑圑却是枇杷觧滿盤難學權門堆火齊且從公子拾金丸枝頭不怕風揺落地上惟憂鳥啄殘清曉呼僮乘露摘任教半熟雜甘酸明李東陽賜枇杷尚方珍果賜新嘗分得江南百顆黄逺道不妨經月暑冷枝疑帶隔年霜龍箋帖罷名初散翠籠開時手亦香歸領君恩薦家廟不禁清淚滿衣裳吳寛紀賜枇杷吳船入貢泝江濤分賜儒臣幸此遭卧病謾思新橘柚退朝休賦舊櫻桃珍竒未惜初加恵淺薄無能莫效勞箬籠曉來傾㵼處金丸錯落駭兒曹于慎行紀賜鮮枇杷嘉名漢苑舊標竒北客由来自不知緑蕚經春開籠日黄金滿樹入筐時江南謾道珍盧橘西蜀休稱薦荔枝千里梯航来不易懐將餘核誌恩私五言絶句増宋梅堯臣隐静遺枇杷五月枇杷實青青味尚酸獮猴定撩亂欲待熟時難七言絶句増宋梅堯臣依韻和行之枇杷時予送紅梅與之五月枇杷黄似橘誰思荔枝同此時嘉名已著上林賦却恨紅梅未有詩明髙啓東丘蘭若見枇杷落葉空林忽有香疎花吹雪過東墻居僧記取南風後留箇金丸待我嘗沈周枇杷誰鑄黄金三百丸彈胎微濕露漙漙從今抵鵲何消玉更有餳漿沁齒寒詩散句増宋周必大昭陽睡起人如玉妝臺對罷䨇蛾緑琉璃葉底黄金簇纎手拈來嗅清馥可人風味少人知把盡春風夏作熟宋張舜民似梅嫌足核如蜜少加酸明沈周數顆黄金彈枝頭駭鳥飛原唐白居易淮山側畔楚江隂五月枇杷正滿林宋劉子翬萬顆金丸綴樹稠遺根漢苑識風流唐杜甫枇杷樹樹香増桞宗元夏首薦枇杷元成廷珪枇杷雪洗青宋趙抃紅嚼山杷口似饞陸游無核枇杷接亦生原元顧瑛枇杷花開如雪白别録増物類相感志枇杷不宜糞學圃餘疏枇杷出東洞庭者大自種者小然却有風味獨核者佳葢他果湏接乃生獨此果直種之亦能生也原田家五行枇杷五月開結主水御定佩文齋廣羣芳譜卷五十六
