body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十七果譜奈原奈一名頻婆與林檎一類而二種江南雖有西土最豐樹與葉皆似林檎而實稍大味酸微帶澀可栽可壓白者為素奈赤者為丹奈亦曰朱奈青者為緑奈皆夏熟西京雜記云上林苑奈三白奈紫奈緑奈廣志云奈有白青赤三種張掖有白奈酒泉有赤奈增本草涼州有冬奈冬熟子帶碧色原性寒多食令人肺寒膨脹病人尤甚彚考增宋書符瑞志晉武帝太始二年六月嘉奈一蒂十實生酒泉北史楊愔傳愔一門四世同居家甚隆盛昆季就學者三十餘人學庭前有奈樹實落地羣兒咸爭之愔頽然獨坐其季父暐適入學館見之大用嗟異顧謂賓客曰此兒恬裕有我家風漢武內傳仙藥之次者有員丘紫奈出永昌漢武故事上握蘭園之金精摘圓丘之紫奈原洞冥記有紫奈大如斗甜如蜜核紫花青研之有汁如漆可染衣其汁著衣不可湔浣亦名暗衣奈增拾遺記須彌山有奈冬生如碧色以玉井水洗食之骨輕柔能騰虛也洛陽伽藍記報德寺多果木奈味甚美冠於京師白馬寺浮圖前奈林實重七斤味殊美冠於中京帝至熟時常詣取之或復賜宫人宫人得之轉餉親戚以為竒味得者不敢輒食乃厯數家河間王琛造迎風館於後園窗户之上列錢青瑣玉鳯銜鈴金龍吐珮素奈朱李枝條入簷伎女樓上坐而摘食述異記漢末楊氏家園中産神奈三株晉宫閣簿秋有白奈真誥夏禹詣鍾山啖紫奈洞仙傳展上公學道於伏龍地乃植奈彌滿所住之上常白諸仙人云昔在華陽下食白奈美憶之未久忽已三千嵗矣郭四朝後來住其處又種五果上公云此地善可種奈所謂福鄉之奈可以除災癘原南嶽夫人傳夫人姓魏名華存性樂神仙季冬夜半有四真人降夫人靜室因設玄室紫奈夫人還王屋山王子喬等並降時夫人與真人為賔主設三玄紫奈增朝野僉載貞觀中頓丘有人於黃河渚上拾菜得一樹栽子大如指持歸蒔之三年乃結子五顆味如奈又似林檎多汁異常酸美送縣縣上州以其竒味乃進之後樹長成漸至三百顆每年進之號曰朱奈至今猶存德貝博等州取其枝接所在豐足人以為從西域浮來礙渚而住矣洽聞記河州鳯林關有靈巖寺每七月十五日溪穴流出聖奈大如盞以為常原酉陽雜俎白奈出涼州野豬澤大如兔頭續仙傳謝玄卿遇神仙設玄洲白奈虎邱山疏虎邱山下三面有春秋二奈燕都韋園記去園里許有奈子古樹婆娑數畝春時花盛開望之如雪三夏葉特繁密列坐其下微雨烈日俱不到被蔭若夏屋公安袁宏道嘗謂戒壇老松顯靈宫柏城南奈子可稱卉木中三絶云集藻詔增魏明帝詔此奈從涼州來道里既逺又東來轉暖故中變色不佳耳表增魏曹植謝賜奈表即夕殿中虎賁宣詔賜臣等冬奈一奩詔賜使溫啖夜非食時而賜見及奈以夏熟今則冬至物以非時為珍恩以絶口為厚非臣等所宜荷之啓增梁劉潛謝始興王賜奈啓酒泉之實稱於王賦瓜州之味記自張文亦有太沖嗟其夏成子建暢其寒熟潘園曜白孫井浮朱並見重於昔時而霑恩於兹日賦散句增漢王逸荔支賦酒泉白奈晉左思蜀都賦素奈夏成潘嶽間居賦二奈曜丹白之色五言古詩原梁禇澐詠奈成都貴素質酒泉稱白麗紅紫奪夏藻芬芳掩春蕙映日照新芳叢林抽晚蒂誰謂重三珠終焉競八桂不讓圜丘中粲潔華庭際謝􅖰和蕭國子詠奈花俱榮上節初獨秀髙秋晚吐緑變衰園舒紅搖落苑不逐竒幻生寧從吹律暖幸同瑤華折為君聊贈逺增宋梅堯臣深夏忽見奈樹上猶存一顆實纍纍後堂奈落盡風雨枝行藥偶散步倚杖聊縱窺林葉隱孤實山鳥曾未知物亦以晦存悟兹身世為詩散句原唐杜甫宿隂繁素奈過雨亂紅渠增宋梅堯臣豈無山石榴獨見庭奈喜明袁宏道終日惜奈花一身苦牽羈原唐杜甫輕籠熟奈香增姚合素奈花開西子面别録增製用釋名奈油搗奈實和以塗繒上燥取而發之形如油也奈脯切奈曝乾之如脯也廣志西方多奈家家收切曝乾作脯十百斛以為蓄積謂之頻婆糧又取熟奈納甕中勿令蠅入六七日待爛以酒醃攪如粥下水再攪濾去皮子良久去清汁傾布上以灰在下引汁盡日乾為末調食物甘酸可食本草今關西人以赤奈楸子取汁塗器中曝乾名果單味甘酸可以饋逺林檎花附見原一名來禽一名蜜果此果味甜能來衆禽於林故有林檎來禽蜜果之號一名文林郎果詳見洽聞記一名冷金丹詳見清異録增元氏長慶集林檎花一名月臨花學圃餘疏花紅即古林檎原生渤海間以奈樹搏接二月開粉紅花子如奈小而差圓六七月熟色淡紅可愛有甜酸二種有金紅水蜜黑五色甜者早熟而味脆美酸者熟差晚須爛方可食黑者色如紫奈有冬月再實者性甘溫下氣消渴多食脹滿或云食多覺膨脹並嚼其核即消一云食其子令人心煩生者食多生瘡癤彚考增宋書符瑞志文帝元嘉十五年二月太子家令劉徴園中林檎連理宋史禮志太宗景祐三年禮官宗正請每嵗夏仲月薦果以瓜以來禽西京雜記初修上林苑羣臣逺方各獻名果異樹有林檎十株原王右軍帖青李來禽子皆囊盛為佳函封多不生增京口記南國多林檎洽聞記永徽中魏郡人王方言拾得樹果以獻刺史紀王慎王貢於髙宗以為朱奈又名五色林檎或謂之聨珠果上重賜王方言文林郎亦號此果為文林郎酉陽雜俎鄆州闞司倉者家在荆州其女乳母鈕氏有一子妻愛之與其子均焉忽一日偶得林檎一蒂戲與已子乳母乃怒曰小娘子成長忘我矣常有物與我子停今何容偏乃齧吻攘臂再三反覆主人之子一家驚怖逐奪之其子狀貌長短正與乳母兒不下也妻知其怪謝之鈕氏復手簸主人之子始如舊矣桂苑叢談王梵志衛州黎陽人也黎陽城東十五里有王德祖者當隋之時家有林檎樹生癭大如斗經三年其癭朽爛德祖見之乃撤其皮遂見一孩兒抱胎而出因收飬之至七嵗能語問曰誰人育我及問姓名德祖具以實告因林木而生曰梵天後改曰志我家長育可姓王也作詩諷人甚有義旨蓋菩薩示化也稽神録光州檢日官蔣舜卿行山中見一人方採林檎以二枚與之食因而不飢家人以為不得食不治將病求醫甚切而不能愈後聞夀春有人善醫令往訪之始行一日宿一所村店有老父問以所患具告之父曰吾能救之無煩逺行也出藥方寸匕使服之吐二林檎如新父收之去舜卿之食如常既歸他日訪之店與父老俱不見矣原東坡集兒子邁幼時嘗作林檎詩云熟顆無風時自脫半腮迎日鬭先紅於等輩中亦號有思致者增三栁軒雜識來禽為靚客花經林檎四品六命賞心樂事禁中五月於艷香館賞林檎史纂馬珏居華陽亭墻外有林檎一株枯已久矣師四月十四日汲水沃之曰純陽來年是日生於此樹之下瓶史林檎頻婆姿媚可人潘生之解愁也集藻啓增梁劉孝威謝賚林檎啓勇聞齊國止錫二桃逺至仙方裁蒙數棗豈如恩豐漢篋賜廣魏奩姹女數而僅通算郎計而方得生於玉井之側出自金膏之地上靈所貴下土希逄庾肩吾謝賚林檎啓丹徒故苑嵗綿長而不見岷山舊植路重阻而來難未有徙核圓丘移根閬阪仙厨始摘猶堆青玉之盤下賤爰頒遂入抽蒲之座賦散句增晉左思蜀都賦其園則有林檎枇杷五言古詩增唐元稹月臨花凌風揚揚花透影朧朧月巫峽隔波雲姑峯漏霞雪鏡勻嬌面粉燈泛髙籠纈夜久清露多啼珠墜還結宋梅堯臣宣城宰郭仲文遺林檎右軍好佳果墨帖求林檎君今忽持贈知有逸少心密枝傳應逺朱頰映已深不愁炎暑劇幸同玉漿斟七言古詩原宋陳與義來禽花來禽花髙不受折滿意清明好時節人間風日不貸春昨夜胭脂今日雪舍東蕪菁滿眼黃蝴蝶飛去專斜陽妍媸都無十日事付與梧桐一夏涼五言律詩增唐鄭谷水林檎花露一朝新簾櫳曉景分艷和蜂蝶動香帶管絃聞笑擬春無力妝濃酒漸醺直疑風起夜飛去替行雲宋梅堯臣八月三日詠原甫庭前林檎花秋蠧無完葉疏叢有瘁莖偶來庭樹下重看露葩榮衆自守常理獨開偏見情從今數霜月結子尚能成七言絶句御製詠林檎野果初來上苑東紫紅鮮品進離宮雖然不及羣珍味也有微誠在此中增宋王庭圭國材姪送林檎嫩紅輕拂女兒臉淺緑深堆瑪瑙盤草木若能成好事年年早寄一枝看原劉子翬林檎花粲粲來禽已著花芳根誰徙向天涯好將青李相遮映風味應同逸少家增明楊慎以來禽果餉煚庵佳果東來濯錦江楚謡萍實亦堪雙王家珍重來禽帖青李櫻桃總受降詩散句原宋蘇軾東坡先生未歸時自種來禽與青李劉子翬東風也作清明意開遍來禽一樹花增陸遊來禽顔色不禁雨楊萬里來禽濃抹日半臉詞原宋史逹祖留春令秀肌豐靨韻多香足緑勻紅注翦取東風入金盤斷不買臨卭賦宮錦機中春富裕勸玉環休妒等得明朝酒消時是間淡雍容處增丘崈洞仙歌豐肌膩體淡雅仍矜貴不與羣芳競姝麗向瓊林珠殿獨占春風仙仗裏曾奉三宫稱燕喜低徊如有恨失意含羞樂事繁華竟誰記應憐我老去無句酬伊吟未就不覺東風又起鎮獨自黃昏怯輕寒這情緒年年共花憔悴别録增物類相感志林檎樹生毛蟲埋蠶蛾於下或以洗魚水澆之即止貴耳集思陵偶持一扇乃祐陵御筆畫林檎花上一鸜鵒原製用清異録林檎百枚蜂蜜浸十日更易蜂蜜五斤細丹砂末二兩攪拌封固一月出之隂乾飯後酒時食一兩枚名冷金丹齊民要術作林檎麨法林檎赤熟時擘破去子心蒂日曬令乾或磨或搗下細絹篩粗者再磨搗以細盡為限以方寸匕投於碗中即成美漿不去蒂則太苦合子則不度夏留心則太酸若乾噉者以林檎麨一升和米麵二升味正適調增南村輟耕録句曲山房熟水法削沉香釘數個插入林檎中置瓶內沃以沸湯密封瓶口久之乃飲其妙莫量清供録林檎渴水林檎微生者不計多少擂碎以滚湯就竹器放定擂碎林檎衝淋下汁滓無味為度以文武火熬常攪勿令煿了熬至滴入水不散然後加腦麝少許檀香末尤佳熟時脯乾研末點湯服甚美原收藏家孰事親林檎每百顆取二十顆捶碎入水同煎候冷納淨甕中浸之密封其口以浸著為度可久留便民圖纂枇杷林檎楊梅等果用臘水同薄荷一握明礬少許入甕內投果於中顔色不變味更涼爽蘋果原蘋果按本草不載蘋果而釋奈云一名頻婆據採蘭雜志學圃餘疏頻婆又當屬此果名蓋與奈一類二種也出北地燕趙者尤佳接用林檎體樹身聳直葉青似林檎而大果如梨而圓滑生青熟則半紅半白或全紅光潔可愛玩香聞數步味甘鬆未熟者食如棉絮過熟又沙爛不堪食惟八九分熟者最美彚考增採蘭雜志燕地有頻婆味雖平淡夜置枕邊微有香氣即佛書所謂頻婆華言相思也昔袁上方時以此致張子由此觀之則當時未必不以為相思也學圃餘疏北土之蘋婆果即花紅一種之變也吳地素無近亦有移植之者載北土以來亦能花能果形味俱減然猶是竒物集藻七言律詩增明曽棨頻婆果異果曾因釋老知喜看嘉實出京師芳腴絶勝仙林杏甘脆全過大谷梨炎帝遺書慙未録長卿多病獨相宜由來南土無人識那得靈根此處移别録原收藏取略熟者收氷窖中至夏月味尤甘美秋月切片曬乾過嵗食亦佳橄欖原橄欖一名青果一名諫果一名忠果詳見齊東野語增陵川詩注南人謂之格覽原生嶺南閩廣諸郡及沿海浦嶼間皆有之樹似木槵而髙大數圍端直可愛枝皆髙聳葉似櫸桞二月開花八月結子狀如長棗色青兩頭皆尖先生者居下後生者漸髙深秋方熟核亦兩頭尖而有稜核內有三竅竅內中有仁可食其類有緑欖色青緑核內無仁亦有乾小烏欖色青黑肉爛而甘取肉捶碎乾自有霜如白鹽謂之欖醬仁最肥大有紋叢疊如海螵蛸色白外有黑皮最甘嫩又有一種波斯橄欖生雍州色類相似但核作兩瓣一種方欖出廣西兩江洞中似橄欖而有三角或四角即波斯橄欖之類也野生者樹峻而子繁蜜漬鹽醃皆可藏久用之致逺作佳果生嚼味苦澀微酸良久乃甘美生食煮汁飲並生津止渴開胃下氣治喉痛消酒毒住泄㵼解一切魚鱉毒及骨鯁閩中尤重其味云咀之口香勝雞舌香彚考增三輔黃圖漢武帝元鼎六年破南越起扶荔宮以植所得竒草異木有橄欖百餘本南方草木狀橄欖吳時嵗貢以賜近侍本朝自泰康後亦如之廣志橄欖大如雞子交州以飲酒金樓子有樹名獨根分為二枝其東向一枝是木威樹南向一枝是橄欖樹歸叟詩話記得小説南人誇橄欖於河東人云此有回味東人云不若我棗比得你回味我已甜久矣學齋呫嗶東坡橄欖詩云紛紛青子落紅盬蓋凡果之生也必青其熟也必變色如梅杏半傳黃朱果爛枝繁是也惟有橄欖雖熟亦青故謂之青子不可他用也齊東野語涪翁在戎州日過蔡次律家小軒外植餘甘子乞名於翁因名之曰味諌軒其後王宣子豫以橄欖送翁翁賦云方懷味諫軒中果忽見金盤橄欖來想與餘甘有瓜葛苦中真味晚方回然則二物可名之為諌果也閩部疏橄欖在芋原上八十里間沿麓樹之蒼鬱可愛集藻跋增宋魏了翁跋胡文靖公晉臣橄欖詩真迹無味之味至味也乃五行之太極也鹹苦酸辛甘則五行之所作也皆五味之一也然其間所謂甘者在天為濕在地為土在色為黃在音為宮則甘於四者猶得為味之中也故荼不如薺也堇不如飴也毒藥不如嘉穀也苦節不如甘節也龍逢比干不如咎夔稷契也然則橄欖之以苦見取何也謂其變之正者也崔嵬諌臣心憂主無一偽世固有持是而不見録者多矣三復是詩而有感焉五言古詩原宋王禹稱橄欖江東多果實橄欖稱珍竒北人將薦酒食之先顰睂皮肉苦且澀厯口復棄遺良久有回味始覺甘如飴我今何所喻喻彼忠臣辭直道逆君耳斥逐投天涯世亂思其言噬臍焉能追寄語採詩者無輕橄欖詩增梅堯臣玉汝遺橄欖南國青青果涉冬知始摘雖咀澀難任竟當甘莫敵來從萬里外或以苦口擲所投同木瓜欲報無瓊璧原歐陽修橄欖五行居四時維火盛南訛炎焦凌木氣橄欖得之多酸苦不相入初爭久方和霜苞入中州萬里來江波幸登君子席得與衆果羅中州衆果佳珠圓玉光瑳愧兹微陋質以逺不見訶餳飴兒女甜遺味久則那良藥不甘口厥功見沉疴忠言初厭之事至悔若何世已無採詩詩成為君哦劉攽橄欖南珍富竒異疇昔頗窮􅒆夷荒無書傳從古陋鉛槧苞封走中上天序異離坎有香已變衰有色多黯譾今君此堂上珍物惟橄欖青膚鏤瓊瑩翠顆森菡蓞苦為幽人貞久見君子淡甘懷彼包羞日新此剛敢清泉薦芳茗臭味獨潛感澡雪清煩酲滌除瑩玄覽靈均採時菊西伯嗜昌歜廟鼎實調梅壯士仍嘗膽由來超俗好諸絶不言慘殷勤謝凡口薤白空三噉增元郝經詠橄欖南果足韻勝北人罕為竒銀盤獻青子愛玩驚見之蓮房飽出蛹棗滑生下枝翠粉苔𡋯新清烈凝松脂齒牙噴艱澀苦硬不可持氣韻久始來靈根瀹天池灑然凌清颷甘露濡仙芝有如宿瘤妻苦節真可期亦如相韓休朕瘠天下肥危辭遽逆耳終自為良規先難阻欲速後得卒莫違默默心語口此樂夫誰知始覺衆果俗橘奴復梨兒海嶺瘴天黑異味翻荼飴雨露存天真颶霧不可滋島嶼出乳泉造化亦若兹元氣舌本甜酸苦歸涕洟本來甘受和衆味相假移居然復其源偽妄焉能欺何當謝世網兀坐忘奔追深山石室空煮石療調飢破鼎煮春芽嚼此吟湘纍翛然沃肺腑看山坐支頤物表有真味載歌采薇詩洪希文嘗新橄欖橄欖如佳士外圓內實剛為味苦且澀其氣清以芳侑酒解酒毒投茶助茶香得鹽即回味消食尤竒方宫商舌底發星宿胸中藏雖云白露降氣味更老蒼山林假嵗月顔色饒風霜以兹調衆口誰敢輕頡頏作此橄欖詩逺繼葑菲章大器當晚成斯言君勿忘七言律詩原明馬德澄謝送橄欖美人抱瑟自姑蘇佳果盈籠贈客需味淡冰桃清較勝色侔玉棗脆偏逾入唇香嫩含雞舌啓齒甘回吐鳯酥更為髙歌聲沸耳相從啜茗啓醍醐七言絶句原宋蘇軾橄欖紛紛青子落紅鹽正味森森苦且嚴待得微甘回齒頰已輸崖蜜十分甜增元郝經橄欖半青來子味難誇宜著山僧點蠟茶若是黨家金帳底只將金橘送流霞詩散句增唐白居易漿酸橄欖新宋孫覿紅鹽著樹落青子詞增宋吳禮之浣溪沙南國風流是故鄉紅鹽落子不因霜於中小底最珍藏薦酒薦茶些子澀透心透頂十分香可人回味越思量黃庭堅好事近瀟灑薦冰盤滿座暗驚香集久後一般風味問幾人知得畫堂飲散已歸來清潤轉更惜留取酒醒時候助茗甌春色别録原採摘嶺表録異橄欖樹有野生者樹峻不可梯緣但刻其根下方寸許內鹽於其中一夕子皆自落增種樹書橄欖將熟以竹釘釘之其實盡落鄰幾雜志橄欖木并花如樗將採其實剝其皮以薑汁塗之則盡落原製用橄欖仁甘平無毒唇吻燥痛研爛傅之橄欖核甘澀溫無毒治魚積魚鯾又治痘瘡倒靨燒研服治下血橄欖枝上狀如黑膠者土人採取爇之甚清烈謂之欖香雜以牛皮膠者即不佳物類相感志栗子與橄欖同食作梅花香橄欖與鹽同食則無苦味延夀書凡食橄欖必去兩頭其性熱也過白露摘食庶不病痁增嶺表録異樹枝節上生脂膏如桃膠南人採之和其皮葉煎之調和黑飴謂之橄欖糖用濯船損乾後牢於膠漆著水益乾堅耳名醫録吳江一富人食鱖魚骨鯁胸中不可下有漁人教以食橄欖時無此果以核為末水調服之而瘳漁者曰橄欖木作取魚棹箆魚觸之即浮出是以知魚畏橄欖也附録木威增本草拾遺生嶺南山谷樹髙丈餘葉似楝子如橄欖而堅亦似棗削去皮可為粽食餘甘子原餘甘子一名菴摩勒見梵書又名摩勒落迦果二廣諸郡閩之泉州及西川戎瀘蠻界山谷皆有之增南方草木狀花黃實似李青黃色核圓作六七稜食之先苦後甘異物志其樹葉如槐葉其枝如柘其子圓大如彈丸有文理如定陶瓜本草木髙一二丈枝條甚軟葉青細密朝開暮斂如夜合而微小春生冬凋三月有花著條而生如粟粒隨即結實作莛每條三兩子至冬而熟連核作五六瓣乾即并核皆裂俗作果子噉之泉州山中亦有狀如川楝子形圓味類橄欖亦可蜜漬鹽藏其木可製器物集藻贊增宋宋祁餘甘子贊黃葩翠葉圓實而澤咀久還甘或號庵勒賦散句增晉左思吳都賦其果則丹橘餘甘五言古詩原宋劉子翬詠餘甘炎方橄欖佳餘甘豈苖裔風姿雖小殊氣韻乃酷似醉顔澀吻餘髣佛清香至侯門收寸長粉骨成珍劑猶聞雜蜜草少轉森嚴味竒材用不專雖用何殊棄端知效苦言逆耳多嫌忌棄果事何傷違言德之纍悅口易逢知感兹發長喟七言絶句增宋張孝祥餘甘子甘言誤我三折臂良藥為洗五年腸欲知苦過味方永請試君家肘後方此老才堪上諫坡南州留滯意如何還將苦口劘英主醫國懸知藥籠多苦愁人意未相諳卒以初嘗廢後甘王氏有詩旌橄欖可憐遺味在巴南詞增宋黃庭堅更漏子菴摩勒西土果霜後明珠顆顆憑玉兔搗香塵稱為席上珍號餘甘爭奈苦臨上馬時分付管回味却思量忠言君試嘗山樝原山樝一作楂其味似楂故名一名棠梂子一名羊梂朹字之誤一名山裏果一名茅樝一名猴樝一名鼠樝本草云生於川原茅林中猴鼠喜食之故有諸名一名朹子一名檕梅爾雅云朹檕梅一名赤瓜子本草云當作赤棗樝狀似赤棗虞衡志有赤棗王璆百一方云山裏紅果俗名酸棗正合此義其類有二種皆生山中一種小者樹髙數尺多枝柯葉有五尖色青背白丫間有刺三月開小白花五出實有赤黃二色九月熟其核狀如牽牛子色微白映紅甚堅一種大者樹髙丈餘花葉皆同但實稍大而色黃緑皮澀肉虛初甚酸澀經霜乃紅可食出滁州青州者佳為消滯要藥語云山樝有爛肉之功小者為棠朹子茅樝猴樝堪入藥肥大者為羊朹子可作果食别録原製用取熟者蒸爛去皮核及內白筋白肉搗爛加入白糖以不酸為度微加白礬末則色更鮮妍入籠蒸至凝定收之作果甚美兼能消食又蒸爛熟去皮核用蜜浸之頻加蜜以不酸為度食之亦佳聞有以此果切作四瓣加薑鹽拌蒸食又一法也入藥者切四瓣去核曬乾收用山樝酒山樝熟時擇擘去蟲洗淨控乾搗半碎每缸用三斗隨添黍米少許亦可以甑蒸半熟取出攤冷入大麯半塊燒酒一斤拌如常法其味甘淡不醉人極消食積枳椇增古今注枳椇子一名樹蜜一名木餳味餳美如餳蜜一名白石一名白實一名木石一名木實本草枳椇一名蜜􅀈音止矩一名蜜屈律皆屈曲不伸之意此樹多枝而曲其子亦拳曲故名一名木蜜因其味也一名木珊瑚一名雞距子一名雞爪子象其形也木名金鈎木一名枅棋一名交加枝言其紐屈也木髙三四丈葉圓大如桑柘夏月開花枝頭結實如雞爪形長寸許紐曲開作兩三岐儼若雞之足距嫩時青色經霜乃黃嚼之味甘如蜜每開岐盡處結一二小子狀如蔓荆子內有扁核赤色如酸棗仁形按今山西甚多俗名拐棗彚考增詩小雅南山有枸陸璣疏枸樹一名枸骨今官園種之謂之木蜜古語曰枳枸來巢言其味甘故飛鳥慕而巢之本從南方米能令酒味薄若以為屋柱則一屋之酒皆薄禮記曲禮婦人之贄椇榛棗脯爾雅翼古者人君燕食所加庶羞凡三十一物椇其一也又為婦人之贄荆楚之俗亦鹽藏荷裹以為冬儲今不以為重賤者食之而已葡萄原葡萄古作蒲桃又作蒲陶一名賜紫櫻桃生隴西五原燉煌山谷今河東及江北皆有之而平陽尤盛苖作藤蔓而極長大盛者一二本綿被山谷間三月開小花成穗黃白色旋著實七八月熟水晶葡萄暈色帶白如著粉形大而長味甚甘西番者更佳馬乳葡萄色紫形大而長味甘紫葡萄黑色有大小二種酸甜二味緑葡萄出蜀中熟時色緑若西畨之緑葡萄名兔睛味勝糖蜜無核則異品也其價甚貴瑣瑣葡萄出西番實小如胡椒今中國亦有種者一架中間生一二穗雲南出者大如棗味尤長唐史波斯國所出大如雞卵也增今塞外有十種葡萄伏地公領孫哈蜜公領孫哈蜜紅葡萄哈蜜緑葡萄哈蜜白葡萄哈蜜黑葡萄哈蜜瑣瑣葡萄馬乳葡萄伏地黑葡萄伏地瑪瑙葡萄原可生食可釀酒最難乾不乾不可收今太原平陽皆製乾貨之四方西北人食之無恙東南食之多病熱其根莖中空相通暮溉其根至朝而水浸其中故俗呼其苖為水通澆以米泔水最良以麝入其皮則葡萄盡作香氣以甘草作針針其根則立死三元延夀書云葡萄架下不可飲酒恐蟲屎傷人彚考增周禮地官場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之注珍異枇杷葡萄之屬原史記大宛傳宛左右以葡萄為酒富人藏酒至萬餘石久者數十嵗不敗俗嗜酒馬嗜苜蓿漢使取其實來於是天子始種苜蓿葡萄肥饒地及天馬多外國使來衆則離宮别館旁盡種葡萄苜蓿極望增漢書西域傳且末國難兜國罽賔國有蒲陶諸果武帝發使十餘輩抵宛西諸國求竒物漢使采蒲陶苜蓿種歸後漢書西域傳栗弋國出葡萄衆果其土水美故葡萄酒特有名焉梁書扶桑國傳地多蒲陶髙昌國傳大同中遣使貢蒲陶等物北齊書李元忠傳元忠曽貢世宗葡萄酒一盤世宗報以百練縑遺其書曰儀同位亞台鉉識懷貞素出藩入侍備經要重而猶家無擔石室如懸磬豈輕財重義奉時愛已故也久相嘉尚嗟咏無極恆思標賞有意無由忽辱蒲桃良深佩戴聊用絹百匹以酬清德也南史夷貊傳髙昌國出蒲桃酒梁大同中遣使獻蒲桃氍㲣原唐書陳叔逹傳嘗賜食得葡萄不舉帝問之對曰臣母病渴求不能致願歸奉之帝流涕曰卿有母遺乎因賜之又賚物百假西域傳大食國嵗獻貴人葡萄大者如雞卵增秦州記秦野多葡萄晉宫閣名華林園葡萄百七十八株原後涼録龜兹國人奢侈家有至千斛葡萄增燉煌張氏家傳扶風孟他以葡萄酒一升遺張讓即擢涼州刺史洛陽伽藍記白馬寺浮圖前葡萄枝葉繁衍實偉於棗味殊美冠於中京帝至熟時常詣取之或復賜宫人宫人得之轉餉親戚以為竒味得者不敢輒食乃歷數家金樓子大月氐國善為葡萄花葉酒或以根及汁醖之其花似丁香而緑榮碧鬚春夏之時萬鬚競發如鸞翼八月中風至吹葉上傷裂有似綾紈故人呼為葡萄風亦名為裂葉風景龍文館記四月上已日上幸司農卿王光輔莊駕還頓後中書侍郎南陽岑羲設茗飲葡萄與學士等討論經史原西域記焉耆國土宜葡萄笯赤建國多葡萄增宣室志晉陽西有童子寺在郊牧之外貞元中有鄧圭者寓居於寺秋夜與朋友數輩會宿忽見一手自牖間入色黃而瘦甚圭開其牖聞有吟嘯之聲訊之曰汝為誰對曰吾隱居山谷有年矣今夕縱風月之遊聞先生在此故來奉謁願得坐牖下聼先生與客談圭許之既坐與客談笑極歡久之告去明夕再來又以手出於牖間圭以緡系其臂牢不可解遂引緡而去明日圭與客窮其迹至寺北百餘步有蒲桃一株甚蕃茂而緡系其枝有葉類人手果牖間所見遂掘其根而焚之原酉陽雜俎貝丘之南有葡萄谷谷中葡萄可就其所食之或有取歸者即失道世言王母葡萄也天寶中沙門曇霄因遊諸嶽至此谷得葡萄食之又見枮蔓堪為杖大如指五尺餘持還本寺植之遂活長髙數仞蔭地幅員十丈仰觀若帷蓋馬其房實磊落紫瑩如墜時人號為草龍珠帳增酉陽雜俎庾信謂魏使尉瑾曰我在鄴遂大得葡萄竒有滋味陳昭曰作何形狀徐君房曰有類軟棗信曰君殊不體物可得言似生荔攴魏肇師曰魏武有言末夏涉秋尚有餘暑酒醉宿酲掩露而食甘而不飴酸而不酢道之固已流涎稱竒況親食之者瑾曰此物實出于大宛張騫所致有黃白黑三種成熟之時子實逼側星編珠聚西域多釀以為酒每米嵗貢在漢西京似亦不少杜陵田五十畝中有葡萄百樹今在京兆非直止禁林也信曰乃園種户植接蔭連架昭曰其味何如橘柚信曰津液竒勝芬芳減之瑾曰金衣素裏見苞作貢向齒自消良應不及零陵總記李直方常第果實若貢士以葡萄為五河東備録楊炎食葡萄曰汝若不澀當以太原尹相授清異録河東葡萄有極大者惟上人得啖之其至京師者百二子紫粉頭而已原南部新書太宗破髙昌收馬乳葡萄種於苑中併得酒法仍自損益造酒成緑色芳香酷烈味若醍醐增蒙泉雜言酉陽雜俎與六帖皆載葡萄由張騫自大宛移植漢宫按本草已具神農九種當塗熄火去騫未逺而魏文之詔實稱中國名果不言西來是唐以前無此論豫嘗以為大宛之種必與中國者異故博望取之假白所載必有所據但失實耳比戍酒泉屢嘗取乾之名曰瑣瑣比中國者差小形圓而色正赤其味甘美非中國者可敵則豫所見庶或得之今此種處處有之獨蒲坂者勝土人乾之以資貿易江南重之稱蕃葡萄曰蕃云者豈承襲瑣瑣之乾與姑識之以俟知者甲申雜記湖南提刑唐秷云其父諲為湖北漕有一道人間與唐漕飲取千里外物不移刻一日唐欲河東葡萄又思峽中新荔子酒數巡則令人就其卧屏間取之皆美新若方折枝者集藻詔原魏文帝詔中國珍果甚多且復為説葡萄當其末夏涉秋尚有餘暑酒醉宿酲掩露而食甘而不䬼脆而不酸冷而不寒味長汁多除煩解渴又釀以為酒甘於麴蘖善醉而易醒道之固已流涎咽唾况親食之耶他方之果寧有匹者贊增宋宋祁緑葡萄贊西南所宜柔蔓紛衍縹穗緑實其甘可薦賦增魏鍾會蒲桃賦并序余植蒲桃於堂前嘉而賦之美乾道之廣覆兮佳陽澤之至淳覽遐方之殊偉兮無斯果之獨珍托靈根於玄圃植崑山之髙垠緑葉翁鬱曖若重隂翳羲和秀房陸離焜若紫英乘素波仰承甘液之靈露下歙豐潤於醴泉總衆和之淑美體至氣於自然珍味允備與物無儔清濁外暢甘旨內遒滋澤膏潤入口散流宋宋祁右史院蒲桃賦癸酉之仲夏豫受詔修書寓於右史院紬繹多暇裴回堂除有蒲桃一本延蔓疏瘠垂實甚寡豫且玩且咀以為省户凝切禁廷敞間人不夭摧禽不棲啄與平原稿壤有間匪灌叢宿莽所干而條悴葉藝不為時珍何耶得非地以所宜為安根以屢徙為危封植浸灌信美非願因為小賦代其臆對云昔炎漢之遣使道西域而始通得蒲桃之異種偕苜蓿以來東矜所從以至逺遂遍植乎離宫去蔥雪之寒鄉托崤函之福地並萬寶以均載厯千古而舒粹玩之可使蠲煩食之足以平志不由甘而取壞乃因少而獲貴鄙柚苞之輕侻賤蔗境之塵滓粵何人斯植我於兹托深嚴之祕署切轇轕之文榱培孤莖以稿壤引柔蔓乎標枝泉石渠以蒙浸露金莖而並滋布涼影於月宮獵重葩於禁颸蔽風廬之岑寂隱肅唱而逶遲彼得地而逢辰宜欣欣以茂遂奚敷華而委質反慘慘而兹瘁乏磊砢於當年讓紛華於此世是必野荄非曾掖之玩菲實異大官之味因枳橘之屢遷歎匏瓜之徒繫亦猶鬱桞有性不願杯棬之華海鳥取容非榮觴酒之饋胡不放之巖際歸之壠隂上敷榮於樛木外結庇於緇林蒙煙沭霧跨野彌岑豐茸大德之谷棲息無檎之禽保深根以庇本誡繁實之披心窮天年以善育奚斧斤之可尋亂曰階藥衒華堂萱爭麗枝以萬年為名木以五衢稱瑞是皆托中涓以進熟荷鈎盾之為地結賞心以自如非孤生之所冀文賦散句增魏荀朂葡萄賦靈運宣流休祥允淑懿彼秋方乾元是畜有葡萄之珍竒應淳和而延育晉左思蜀都賦葡萄亂潰魏都賦葡萄結隂潘嶽間居賦石榴蒲桃之珍磊落蔓衍乎其側五言古詩原唐劉禹錫葡萄歌野田生葡萄纒繞一枝蒿移來碧墀下長苗日日髙分岐浩繁縟修蔓盤詰曲揚翹向庭柯意思如有屬為之立長架布濩當軒緑米液溉其根理疏看滲漉繁葩組綬結懸實珠璣蹙馬乳帶輕霜龍鱗曜初旭有客汾隂至臨堂瞪雙目自言我晉人種此如種玉釀之成美酒令人飲不足為君持一斗往取涼州牧增宋梅堯臣范景仁席中賦葡萄朱盤何纍纍紫乳封霜厚今為馬谷繁昔釀涼州酒乃知西土珍漢使傳應久蘇轍賦園中所有葡萄不禁冬屈盤似無氣春來乘盛陽覆架青綾被龍髯亂無數馬乳垂至地初如早梅酸晚作醲酪味誰能釀為酒為爾架前醉滿斗不與人涼州幾時致元郝經甲子嵗後園葡萄深院荒草長短蔓裂磚縫葡萄本西果南國誰與種插蘆為扶持灌溉甚珍重瘦骨紫節舒龍頭青線控蟠蟠上疏籬蒨蒨將逺縱遭遇雖後時取實望秋仲摘露添俎豆庶間館人供誰知六月旱卉木焦死衆斷秧餘幾花勉強著土擁竟作纒結枯日繞空悼痛肺渴口重乾望梅心欲烘忽憶河隴秋滿地無歇空支離半空架丰茸十里洞拇乳積成岸澒癑接梁棟一𣲖碼瑙漿傾注百千甕往嵗見沙陀回鶻正來貢詔賜琥珀心雪盛瓶盡凍查牙飲流澌氣壓黑馬湩一旦離魏闕五載猶在宋見此復何時鳥道目迎送七言古詩增唐唐彥謙詠葡萄西園晚霽浮嫩涼開尊漫摘葡萄嘗滿架髙撑紫絡索一枝斜嚲金琅璫天風颼颼葉栩栩蝴蝶聲乾作晴雨神蛟清夜蟄寒潭萬片濕雲飛不起石家美人金谷遊羅幃翠幕珊瑚鈎玉盤新薦入華屋珠帳髙懸夜不收勝遊記得當年景清氣逼人毛骨冷笑呼明鏡上遙天醉倚銀牀弄秋影宋楊萬里初食太原生葡萄時十二月二日淮南葡萄八月酸只可生吃不可乾淮北葡萄十月熟縱可作豝也無肉老夫臘裏來都梁飣坐那得馬乳香分明猶帶龍鬚在徑寸玄珠肥十倍太原清霜熬絳餳甘露凍作紫水精隆冬壓架無人摘雪打冰封不曽拆風吹日炙不曾臘玉盤一朵直萬錢與渠傾蓋真忘年君不見道逢麴車口流涎元楊載題溫日觀葡萄老禪嗜酒醉不醒強坐虛櫩寫清影興來擲筆意茫然落葉滿庭秋月冷醉中捉筆兩眼花倚簷架子欹復斜翠藤盤屈那可辨但見滿紙生龍蛇明王九思畫葡萄引漢武唯知貴異物博望常勞使西域大夏康居産富饒胡桐柳桞非竒特獨取葡萄入漢宫遂遣天王親外國當時肉味厭侯王今日霜根遍西北吾家十畝後園裏長條幾架南山側龍鬚時裊水風斜馬乳盡垂秋雨色故園一别驚風雨畫圗相對思鄉土青錢已辦雇河舟白首行看住草樓但願千缸釀春酒未須一斗博涼州僧守仁題溫日觀葡萄次韻龍扃失鑰十二重驪珠迸落鮫人宫鑌刀剪斷紫瓔珞纍纍馬乳垂金風樹根吹火照殘墨冷雨松棚秋鬼哭蔗丸嚼碎流沙氷鴨酒呼來漢江緑鐵削虬藤劎三尺雷梭怒穴陶家璧曇胡醉起面秋巖一索摩尼挂空壁七言律詩增宋黃庭堅景珍太博見示舊唱和葡萄詩因而次韻映日圓光萬顆餘如觀寶藏隔蝦鬚夜愁風起飄星去曉喜天晴綴露珠宫女揀枝模錦繡論師持味比醍醐欲收百斛供春釀放出聲名壓酪奴原楊萬里葡萄才喜盤藤捲葉生又驚壓架暗隂成夏褰涼潤青油幕秋摘甘寒黑水晶近竹猶爭一尺許拋鬚先罥兩三莖今年乞種江西去長使茅齋怯晚晴增元洪希文葡萄走架龍鬚弱不支炎天待月立多時醍醐縱美輸清滑瓔珞雖圓讓陸離珍異曾誇太沖賦纍垂已入退之詩當年若得傳方法博取涼州亦一竒原明馮琦葡萄架暗曖繁隂覆緑苔藤枝蘿蔓共縈回自隨博望仙槎後詔許甘泉别殿栽的的紫房含雨潤疏疏翠幄向風開詞臣病渴沾新釀不羡金莖露一杯一架扶疏碧水潯午涼不散緑雲深芳香未讓醍醐美秀色全滋薜荔隂紫玉含風秋液冷玄珠入夜月華侵莫言西域傳來晚猶及相如賦上林五言排律增唐劉禹錫和令狐相公謝太原李侍中寄蒲桃珍果出西域移根到北方昔年隨漢使今日寄梁王上相芳緘至行臺綺席張魚鱗含宿潤馬乳帶殘霜染指鉛粉膩滿喉甘露香醖成千日酒味敵五雲漿咀嚼停金盞稱嗟響畫堂慚非末至客不得一枝嘗五言絶句增唐唐彥謙葡萄金谷風露涼緑珠醉初醒珠帳夜不收月明墮清影宋王十朋詠葡萄珠帳臨簷挂龍鬚滿架抽也知堪釀酒不要博涼州元劉詵葡萄枯葉展大蝶低枝屈長虯露寒壓成酒無夢到涼州七言絶句原唐韓愈題張十一旅舍葡萄新莖未遍半猶枯髙架支離倒復扶若欲滿盤堆馬乳莫辭添竹引龍鬚增宋張栻題葡萄架君家小圃占春光眼看龍鬚百尺長移向樓邊并春井明年垂實更隂涼王十朋詠葡萄水晶馬乳薦新秋青紫酸甘孰味優只可堆鹽餉韓子不宜釀酒博涼州原楊萬里葡萄乾涼州博酒不勝癡銀海乘槎領得歸玉骨瘦將無一把向來馬乳太輕肥增元傅若金題松菴上人墨葡萄二首漢苑尋常露下時月明髙架影參差上林近日無來使腸斷江南見一枝露顆含香近客衣蜜蜂蝴蝶繞蕂飛夜來應值驪龍睡探得明珠月下歸貢性之墨葡萄酒醒西樓月欲斜滿窗晴影走秋蛇狂夫賸有相如渴一滴涼州未許賖題肅萬邦葡萄憶騎官馬過灤陽馬乳纍纍壓架香釀就瓊漿三百斛胡姬當道喚人嘗鄭氏允端葡萄滿筐圓實驪珠滑入口甘香氷玉寒若使文園知此渴露華應不乞金盤明李東陽葡萄次韻二首采采西林白露圑一時清賞故人歡蕭條四十年前事又向誰家卷裏看西土葡萄别樣圑謫居聊此寫清歡荔支香水誰髙下且與詩人一例看原李夢陽葡萄萬里西風過鴈時緑雲玄玉影參差酒酣試取氷丸嚼不説天南有荔枝增沈周葡萄秋棚昨夜黑風呼鬼淚瀅瀅泣不枯明日擔夫曉街上一筐新味賞明珠詩散句增宋梅堯臣南庭葡萄架萬乳纍將磓張九成葡萄得涼州所求輒復效唐李頎長安春物舊相宜小苑葡萄花滿枝宋張耒葡萄盤屈如秋蛇春來蟄起紆橫斜唐王維葡萄逐漢臣原李白葡萄出漢宫增李白葡萄開景風杜甫一縣葡萄熟姚合筐封紫葡萄張諤昨夜葡萄初上架宋陸遊爛紫葡萄重垂架原元顧阿瑛葡萄玉盞酌西涼詞增宋張鎡眼兒媚玄霜涼夜鑄瑤丹飄落翠藤間西風萬顆明珠巧綴零露漙沾時人那識風流品馬乳喜堆盤玉纎旋摘銀罌分釀莫負清歡鷓鴣天隂隂一架紺雲涼裊裊千絲翠蔓長紫玉乳圓秋結穗水晶珠瑩露凝漿相並熟試新嘗纍纍輕翦粉痕香小槽壓就西涼酒風月無邊是醉鄉别録增記事珠小兒髮初生為小髻十數其父母為兒女相勝之辭曰葡萄髻十穗勝五穗圖繪寶鑑戴進字文進喜作葡萄配以鈎勒竹蟹爪草竒甚胡大年僧曉菴皆工葡萄徐柱字夢節東吳人善寫葡萄農田餘話古人無畫葡萄者吳僧溫日觀夜於月中視葡萄影有悟出新意似飛白書體為之酒酣興發以手潑墨然後揮寫迅於行草收拾散落頃刻而就如神甚竒特也其弟子沈仲華湖州人傳其法亦佳世多見之原種植取肥枝如拇指大者從有孔盆底穿過盤一尺於盆內實以土放原架下時澆之候秋間生根從盆底外截斷另成一架澆用冷肉汁或米泔水增種樹書葡萄欲其肉實當栽於棗樹之旁於春鑽棗樹上作竅子引葡萄枝入竅中透出至二三年其枝既長大塞滿樹竅便可砍去葡萄根托棗根以生便得肉實如棗北地皆如此種法製用清供録葡萄渴水生葡萄不計多少擂碎濾去滓令淨以慢火熬以稠濃為度取出收貯淨磁器中熬時弗犯銅鐵器葡萄熟者不可用止可造酒臨時斟酌入煉過熟蜜及檀香末腦麝少許原收藏北方天寒初冬須以草裹埋地中尺餘俟春分後取出卧置地數日然後架起子生時去其繁葉使霑風露則結子肥大附録野葡萄原野葡萄一名燕薁一名櫻薁説文云薁櫻也廣雅云燕薁櫻薁也一名嬰舌一名山葡萄藤名木龍按詩疏謂之車􅀈藤蔓生苖葉花實與葡萄相似但實小而圓色不甚紫亦堪為酒增草花譜野葡萄生諸山中子細如小豆色紫蓓虆而生狀若葡萄蟠之髙樹懸挂可觀彚考增詩豳風六月食鬱及薁集藻賦散句增漢司馬相如上林賦隱夫薁棣附録蔓胡桃增酉陽雜爼蔓胡桃出南詔大如扁螺兩隔味如胡桃或言蠻中藤子也園林草木疏一作蔓葡萄子甘滑如乳霜風下潰御定佩文齋廣羣芳譜卷五十七
