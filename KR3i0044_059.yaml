body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十七果譜柰原柰一名頻婆與林檎一類而二種江南雖有西土最豐樹與葉皆似林檎而實稍大味酸微帶澀可栽可壓白者為素柰赤者為丹柰亦曰朱柰青者為緑柰皆夏熟西京雜記云上林苑柰三白柰紫柰緑柰廣志云柰有白青赤三種張掖有白柰酒泉有赤柰増本草凉州有冬柰冬熟子帶碧色原性寒多食令人肺寒膨脹病人尤甚彚考増宋書符瑞志晋武帝太始二年六月嘉柰一蔕十實生酒泉北史楊愔傳愔一門四世同居家甚隆盛昆季就學者三十餘人學庭前有柰樹實落地羣兒咸爭之愔頽然獨坐其季父暐適入學館見之大用嗟異顧謂賓客曰此兒恬裕有我家風漢武内傳仙藥之次者有員丘紫柰出永昌漢武故事上握蘭園之金精摘圓丘之紫柰原洞㝠記有紫奈大如斗甜如蜜核紫花青研之有汁如漆可染衣其汁著衣不可湔浣亦名闇衣柰増拾遺記湏彌山有柰冬生如碧色以玉井水洗食之骨輕柔能騰虚也洛陽伽藍記報徳寺多果木柰味甚羙冠於京師白馬寺浮圖前柰林實重七斤味殊羙冠於中京帝至熟時常詣取之或復賜宫人宫人得之轉餉親戚以為竒味得者不敢輙食乃厯數家河間王琛造迎風館於後園窓户之上列錢青瑣玉鳯銜鈴金龍吐珮素柰朱李枝條入簷伎女樓上坐而摘食述異記漢末楊氏家園中産神柰三株晋宫閣簿秋有白柰真誥夏禹詣鍾山啖紫柰洞仙傳展上公學道於伏龍地乃植柰彌滿所住之上常白諸仙人云昔在華陽下食白柰美憶之未久忽已三千嵗矣郭四朝後来住其處又種五果上公云此地善可種柰所謂福鄉之柰可以除災癘原南嶽夫人傳夫人姓魏名華存性樂神仙季冬夜半有四真人降夫人静室因設𤣥室紫柰夫人還王屋山王子喬等並降時夫人與真人為賔主設三𤣥紫柰増朝野僉載貞觀中頓丘有人於黄河渚上拾菜得一樹栽子大如指持歸蒔之三年乃結子五顆味如柰又似林檎多汁異常酸美送縣縣上州以其竒味乃進之後樹長成漸至三百顆每年進之號曰朱柰至今猶存徳貝博等州取其枝接所在豐足人以為從西域浮來礙渚而住矣洽聞記河州鳯林闗有靈巖寺每七月十五日溪穴流出聖柰大如盞以為常原酉陽雜俎白柰出凉州野豬澤大如兎頭續仙傳謝𤣥卿遇神仙設𤣥洲白柰虎邱山疏虎邱山下三面有春秋二柰燕都韋園記去園里許有柰子古樹婆娑數畝春時花盛開望之如雪三夏葉特繁宻列坐其下微雨烈日俱不到被䕃若夏屋公安袁宏道嘗謂戒壇老松顯靈宫栢城南柰子可稱卉木中三絶云集藻詔増魏明帝詔此柰從凉州來道里既逺又東来轉暖故中變色不佳耳表増魏曹植謝賜柰表即夕殿中虎賁宣詔賜臣等冬柰一奩詔賜使温啖夜非食時而賜見及柰以夏熟今則冬至物以非時為珍恩以絶口為厚非臣等所宜荷之啓增梁劉潛謝始興王賜柰啓酒泉之實稱於王賦𤓰州之味記自張文亦有太冲嗟其夏成子建暢其寒熟潘園曜白孫井浮朱並見重於昔時而霑恩於兹日賦散句増漢王逸荔支賦酒泉白柰晋左思蜀都賦素柰夏成潘岳閒居賦二柰曜丹白之色五言古詩原梁禇澐詠柰成都貴素質酒泉稱白麗紅紫奪夏藻芬芳掩春蕙映日照新芳叢林抽晚蔕誰謂重三珠終焉競八桂不讓圜丘中粲潔華庭際謝􅖰和蕭國子詠柰花俱榮上節初獨秀髙秋晚吐緑變衰園舒紅揺落苑不逐竒幻生寜從吹律㬉幸同瑤華折為君聊贈逺増宋梅堯臣深夏忽見柰樹上猶存一顆實纍纍後堂柰落盡風雨枝行藥偶散歩倚杖聊縱窺林葉隐孤實山鳥曾未知物亦以晦存悟兹身世為詩散句原唐杜甫宿隂繁素柰過雨亂紅渠増宋梅堯臣豈無山石榴獨見庭柰喜明袁宏道終日惜柰花一身苦牽羈原唐杜甫輕籠熟柰香増姚合素柰花開西子面别録増製用釋名柰油搗柰實和以塗繒上燥取而發之形如油也柰脯切柰曝乾之如脯也廣志西方多柰家家収切曝乾作脯十百斛以為蓄積謂之頻婆糧又取熟柰納甕中勿令蠅入六七日待爛以酒醃攪如粥下水再攪濾去皮子良久去清汁傾布上以灰在下引汁盡日乾為末調食物甘酸可食本草今闗西人以赤柰楸子取汁塗器中曝乾名果單味甘酸可以饋逺林檎花附見原一名來禽一名蜜果此果味甜能来衆禽於林故有林檎来禽蜜果之號一名文林郎果詳見洽聞記一名冷金丹詳見清異録増元氏長慶集林檎花一名月臨花學圃餘疏花紅即古林檎原生渤海間以柰樹搏接二月開粉紅花子如柰小而差圓六七月熟色淡紅可愛有甜酸二種有金紅水蜜黒五色甜者早熟而味脆羙酸者熟差晚湏爛方可食黒者色如紫柰有冬月再實者性甘温下氣消渇多食脹滿或云食多覺膨脹並嚼其核即消一云食其子令人心煩生者食多生瘡癤彚考増宋書符瑞志文帝元嘉十五年二月太子家令劉徴園中林檎連理宋史禮志太宗景祐三年禮官宗正請每嵗夏仲月薦果以瓜以来禽西京雜記初修上林苑羣臣逺方各獻名果異樹有林檎十株原王右軍帖青李來禽子皆囊盛為佳函封多不生増京口記南國多林檎洽聞記永徽中魏郡人王方言拾得樹果以獻刺史紀王慎王貢於髙宗以為朱柰又名五色林檎或謂之聨珠果上重賜王方言文林郎亦號此果為文林郎酉陽雜俎鄆州闞司倉者家在荆州其女乳母鈕氏有一子妻愛之與其子均焉忽一日偶得林檎一蔕戲與已子乳母乃怒曰小娘子成長㤀我矣常有物與我子停今何容偏乃齧吻攘臂再三反覆主人之子一家驚怖逐奪之其子狀貎長短正與乳母兒不下也妻知其怪謝之鈕氏復手簸主人之子始如舊矣桂苑叢談王梵志衛州黎陽人也黎陽城東十五里有王徳祖者當隋之時家有林檎樹生癭大如斗經三年其癭朽爛徳祖見之乃撤其皮遂見一孩兒抱胎而出因収飬之至七嵗能語問曰誰人育我及問姓名徳祖具以實告因林木而生曰梵天後改曰志我家長育可姓王也作詩諷人甚有義㫖葢菩薩示化也稽神録光州檢日官蔣舜卿行山中見一人方採林檎以二枚與之食因而不饑家人以為不得食不治將病求醫甚切而不能愈後聞夀春有人善醫令往訪之始行一日宿一所村店有老父問以所患具告之父曰吾能救之無煩逺行也出藥方寸匕使服之吐二林檎如新父収之去舜卿之食如常旣歸他日訪之店與父老俱不見矣原東坡集兒子邁幼時嘗作林檎詩云熟顆無風時自脱半腮迎日鬭先紅於等軰中亦號有思致者増三栁軒雜識来禽為靚客花經林檎四品六命賞心樂事禁中五月於艶香館賞林檎史纂馬珏居華陽亭墻外有林檎一株枯已久矣師四月十四日汲水沃之曰純陽来年是日生於此樹之下瓶史林檎頻婆姿媚可人潘生之觧愁也集藻啓増梁劉孝威謝賚林檎啓勇聞齊國止錫二桃逺至仙方裁蒙數棗豈如恩豐漢箧賜廣魏奩姹女數而僅通算郎計而方得生於玉井之側出自金膏之地上靈所貴下土希逄庾肩吾謝賚林檎啓丹徒故苑嵗綿長而不見岷山舊植路重阻而来難未有徙核圓丘移根閬阪仙厨始摘猶堆青玉之盤下賤爰頒遂入抽蒲之座賦散句増晋左思蜀都賦其園則有林檎枇杷五言古詩増唐元稹月臨花凌風颺颺花透影朧朧月巫峽隔波雲姑峯漏霞雪鏡勻嬌面粉燈泛髙籠纈夜久清露多啼珠墜還結宋梅堯臣宣城宰郭仲文遺林檎右軍好佳果墨帖求林檎君今忽持贈知有逸少心宻枝傳應逺朱頬映已深不愁炎暑劇幸同玉漿斟七言古詩原宋陳與義来禽花来禽花髙不受折滿意清明好時節人間風日不貸春昨夜臙脂今日雪舍東蕪菁滿眼黄蝴蝶飛去專斜陽妍媸都無十日事付與梧桐一夏凉五言律詩増唐鄭谷水林檎花露一朝新簾櫳曉景分艶和蜂蝶動香帶管絃聞笑擬春無力妝濃酒漸醺直疑風起夜飛去替行雲宋梅堯臣八月三日詠原甫庭前林檎花秋蠧無完葉疎叢有瘁莖偶来庭樹下重看露葩榮衆自守常理獨開偏見情從今數霜月結子尚能成七言絶句御製詠林檎野果初来上苑東紫紅鮮品進離宮雖然不及羣珍味也有微誠在此中増宋王庭珪國材姪送林檎嫩紅輕拂女兒臉淺緑深堆瑪瑙盤草木若能成好事年年早寄一枝看原劉子翬林檎花粲粲来禽已著花芳根誰徙向天涯好將青李相遮映風味應同逸少家増明楊慎以来禽果餉煚庵佳果東来濯錦江楚謡萍實亦堪䨇王家珍重来禽帖青李櫻桃總受降詩散句原宋蘇軾東坡先生未歸時自種来禽與青李劉子翬東風也作清明意開遍来禽一樹花増陸游来禽顔色不禁雨楊萬里来禽濃抺日半臉詞原宋史逹祖留春令秀肌豐靨韻多香足緑勻紅注翦取東風入金盤斷不買臨卭賦宮錦機中春富裕勸玉環休妒等得明朝酒消時是閒淡雍容處増丘崈洞仙歌豐肌膩體淡雅仍矜貴不與羣芳競姝麗向瓊林珠殿獨占春風仙仗裏曾奉三宫稱燕喜低徊如有恨失意含羞樂事繁華竟誰記應憐我老去無句酬伊吟未就不覺東風又起鎮獨自黄昬怯輕寒這情緒年年共花憔悴别録増物類相感志林檎樹生毛蟲埋蠶蛾於下或以洗魚水澆之即止貴耳集思陵偶持一扇廼祐陵御筆畫林檎花上一鸜鵒原製用清異録林檎百枚蜂蜜浸十日更易蜂蜜五斤細丹砂末二兩攪拌封固一月出之隂乾飯後酒時食一兩枚名冷金丹齊民要術作林檎麨法林檎赤熟時擘破去子心蔕日曬令乾或磨或擣下細絹篩麤者再磨𢷬以細盡為限以方寸匕投於椀中即成羙漿不去蔕則太苦合子則不度夏留心則太酸若乾噉者以林檎麨一升和米麫二升味正適調増南村輟耕録句曲山房熟水法削沉香釘數個挿入林檎中置瓶内沃以沸湯宻封瓶口久之乃飲其妙莫量清供録林檎渴水林檎微生者不計多少擂碎以滚湯就竹器放定擂碎林檎衝淋下汁滓無味為度以文武火熬常攪勿令煿了熬至滴入水不散然後加腦麝少許檀香末尤佳熟時脯乾研末㸃湯服甚羙原収藏家塾事親林檎每百顆取二十顆搥碎入水同煎候冷納凈甕中浸之宻封其口以浸著為度可久留便民圖纂枇杷林檎楊梅等果用臘水同薄荷一握明礬少許入甕内投果於中顔色不變味更凉爽蘋果原蘋果按本草不載蘋果而釋柰云一名頻婆據採蘭雜志學圃餘疏頻婆又當屬此果名葢與柰一類二種也出北地燕趙者尤佳接用林檎體樹身聳直葉青似林檎而大果如梨而圓滑生青熟則半紅半白或全紅光潔可愛玩香聞數歩味甘鬆未熟者食如棉絮過熟又沙爛不堪食惟八九分熟者最美彚考増採蘭雜志燕地有頻婆味雖平淡夜置枕邊微有香氣即佛書所謂頻婆華言相思也昔袁上方時以此致張子由此觀之則當時未必不以為相思也學圃餘疏北土之蘋婆果即花紅一種之變也呉地素無近亦有移植之者載北土以来亦能花能果形味俱减然猶是竒物集藻七言律詩増明曽棨頻婆果異果曾因釋老知喜看嘉實出京師芳腴絶勝仙林杏甘脆全過大谷梨炎帝遺書慙未録長卿多病獨相宜由来南土無人識那得靈根此處移别録原収藏取畧熟者収氷窖中至夏月味尤甘美秋月切片曬乾過嵗食亦佳橄㰖原橄㰖一名青果一名諫果一名忠果詳見齊東野語増陵川詩註南人謂之格覧原生嶺南閩廣諸郡及沿海浦嶼間皆有之樹似木槵而髙大數圍端直可愛枝皆髙聳葉似櫸桞二月開花八月結子状如長棗色青兩頭皆尖先生者居下後生者漸髙深秋方熟核亦兩頭尖而有稜核内有三竅竅内中有仁可食其類有緑㰖色青緑核内無仁亦有乾小烏㰖色青黑肉爛而甘取肉搥碎乾自有霜如白鹽謂之㰖醤仁最肥大有紋叢疊如海螵蛸色白外有黒皮最甘嫩又有一種波斯橄㰖生邕州色類相似但核作兩瓣一種方㰖出廣西兩江峒中似橄㰖而有三角或四角即波斯橄㰖之類也野生者樹峻而子繁蜜漬鹽醃皆可藏久用之致逺作佳果生嚼味苦澀微酸良久乃甘美生食煮汁飲並生津止渴開胃下氣治喉痛消酒毒住泄㵼觧一切魚鱉毒及骨鯁閩中尤重其味云咀之口香勝雞舌香彚考増三輔黄圖漢武帝元鼎六年破南越起扶荔宮以植所得竒草異木有橄㰖百餘本南方草木状橄㰖呉時嵗貢以賜近侍本朝自泰康後亦如之廣志橄㰖大如雞子交州以飲酒金樓子有樹名獨根分為二枝其東向一枝是木威樹南向一枝是橄㰖樹歸叟詩話記得小説南人誇橄㰖於河東人云此有囬味東人云不若我棗比得你囘味我已甜久矣學齋呫嗶東坡橄㰖詩云紛紛青子落紅盬葢凡果之生也必青其熟也必變色如梅杏半傳黄朱果爛枝繁是也惟有橄㰖雖熟亦青故謂之青子不可他用也齊東野語涪翁在戎州日過蔡次律家小軒外植餘甘子乞名於翁因名之曰味諌軒其後王宣子予以橄㰖送翁翁賦云方懐味諫軒中果忽見金盤橄㰖来想與餘甘有瓜葛苦中真味晚方回然則二物可名之為諌果也閩部疏橄㰖在芋原上八十里間沿麓樹之蒼鬱可愛集藻跋増宋魏了翁跋胡文靖公晋臣橄㰖詩真蹟無味之味至味也乃五行之太極也鹹苦酸辛甘則五行之所作也皆五味之一也然其間所謂甘者在天為濕在地為土在色為黄在音為宮則甘於四者猶得為味之中也故荼不如薺也堇不如飴也毒藥不如嘉穀也苦節不如甘節也龍逢比干不如咎䕫稷契也然則橄㰖之以苦見取何也謂其變之正者也崔嵬諌臣心憂主無一偽世固有持是而不見録者多矣三復是詩而有感焉五言古詩原宋王禹偁橄㰖江東多果實橄㰖稱珍竒北人將薦酒食之先顰睂皮肉苦且澀厯口復棄遺良久有囘味始覺甘如飴我今何所喻喻彼忠臣辭直道逆君耳斥逐投天涯世亂思其言噬臍焉能追寄語採詩者無輕橄㰖詩増梅堯臣玉汝遺橄㰖南國青青果渉冬知始摘雖咀澀難任竟當甘莫敵來從萬里外或以苦口擲所投同木瓜欲報無瓊璧原歐陽修橄㰖五行居四時維火盛南訛炎焦凌木氣橄㰖得之多酸苦不相入初爭久方和霜苞入中州萬里来江波幸登君子席得與衆果羅中州衆果佳珠圓玉光瑳媿兹微陋質以逺不見訶餳飴兒女甜遺味久則那良藥不甘口厥功見沉疴忠言初厭之事至悔若何世已無採詩詩成為君哦劉攽橄㰖南珍富竒異疇昔頗窮􅒆夷荒無書傳從古陋鉛槧苞封走中上天序異離坎有香已變衰有色多黯譾今君此堂上珍物惟橄㰖青膚鏤瓊瑩翠顆森菡蓞苦為幽人貞久見君子淡甘懐彼包羞日新此剛敢清泉薦芳茗臭味獨潜感澡雪清煩酲滌除瑩𤣥覽靈均採時菊西伯嗜昌歜廟鼎實調梅壯士仍嘗膽由来超俗好諸絶不言惨殷勤謝凡口薤白空三噉増元郝經詠橄㰖南果足韻勝北人罕為竒銀盤獻青子愛玩驚見之蓮房飽出蛹棗滑生下枝翠粉苔𡋯新清烈凝松脂齒牙噴艱澀苦硬不可持氣韻久始来靈根瀹天池灑然凌清颷甘露濡仙芝有如宿瘤妻苦節真可期亦如相韓休朕瘠天下肥危辭遽逆耳終自為良規先難阻欲速後得卒莫違黙黙心語口此樂夫誰知始覺衆果俗橘奴復梨兒海嶺瘴天黑異味翻荼飴雨露存天真颶霧不可滋島嶼出乳泉造化亦若兹元氣舌本甜酸苦歸涕洟本来甘受和衆味相假移居然復其源偽妄焉能欺何當謝世網兀坐㤀奔追深山石室空煑石療調饑破鼎煑春芽嚼此吟湘纍翛然沃肺腑看山坐支頤物表有真味載歌采薇詩洪希文嘗新橄㰖橄㰖如佳士外圓内實剛為味苦且澀其氣清以芳侑酒觧酒毒投茶助茶香得鹽即囘味消食尤竒方宫商舌底發星宿胸中藏雖云白露降氣味更老蒼山林假嵗月顔色饒風霜以兹調衆口誰敢輕頡頏作此橄㰖詩逺繼葑菲章大器當晚成斯言君勿忘七言律詩原明馬徳澄謝送橄㰖美人抱瑟自姑蘇佳果盈籠贈客需味淡冰桃清較勝色侔玉棗脆偏逾入唇香嫩含雞舌啓齒甘囘吐鳯酥更為髙歌聲沸耳相從啜茗啟醍醐七言絶句原宋蘇軾橄㰖紛紛青子落紅鹽正味森森苦且嚴待得微甘回齒頬已輸崖蜜十分甜増元郝經橄㰖半青来子味難誇宜著山僧㸃蠟茶若是党家金帳底只將金橘送流霞詩散句増唐白居易漿酸橄㰖新宋孫覿紅鹽著樹落青子詞増宋吳禮之浣溪沙南國風流是故鄉紅鹽落子不因霜於中小底最珍藏薦酒薦茶些子澀透心透頂十分香可人囘味越思量黄庭堅好事近瀟灑薦冰盤滿座暗驚香集久後一般風味問㡬人知得畫堂飲散已歸来清潤轉更惜留取酒醒時候助茗甌春色别録原採摘嶺表録異橄㰖樹有野生者樹峻不可梯縁但刻其根下方寸許内鹽於其中一夕子皆自落増種樹書橄㰖將熟以竹釘釘之其實盡落隣幾雜志橄㰖木并花如樗将採其實剝其皮以薑汁塗之則盡落原製用橄㰖仁甘平無毒唇吻燥痛研爛傅之橄㰖核甘澀温無毒治魚積魚鯾又治痘瘡倒靨燒研服治下血橄㰖枝上状如黒膠者土人採取爇之甚清烈謂之㰖香雜以牛皮膠者即不佳物類相感志栗子與橄㰖同食作梅花香橄㰖與鹽同食則無苦味延夀書凡食橄㰖必去兩頭其性熱也過白露摘食庶不病痁増嶺表録異樹枝節上生脂膏如桃膠南人採之和其皮葉煎之調和黑飴謂之橄㰖糖用濯船損乾後牢於膠漆著水益乾堅耳名醫録吳江一富人食鱖魚骨鯁胸中不可下有漁人教以食橄㰖時無此果以核為末水調服之而瘳漁者曰橄㰖木作取魚棹箆魚觸之即浮出是以知魚畏橄㰖也附録木威増本草拾遺生嶺南山谷樹髙丈餘葉似楝子如橄㰖而堅亦似棗削去皮可為粽食餘甘子原餘甘子一名菴摩勒見梵書又名摩勒落迦果二廣諸郡閩之泉州及西川戎瀘蠻界山谷皆有之増南方草木状花黄實似李青黄色核圓作六七稜食之先苦後甘異物志其樹葉如槐葉其枝如柘其子圓大如彈丸有文理如定陶瓜本草木髙一二丈枝條甚軟葉青細宻朝開暮歛如夜合而微小春生冬凋三月有花著條而生如粟粒隨即結實作莛每條三兩子至冬而熟連核作五六瓣乾即并核皆裂俗作果子噉之泉州山中亦有状如川楝子形圓味類橄㰖亦可蜜漬鹽藏其木可製器物集藻贊増宋宋祁餘甘子贊黄葩翠葉圓實而澤咀久還甘或號庵勒賦散句増晋左思吳都賦其果則丹橘餘甘五言古詩原宋劉子翬詠餘甘炎方橄㰖佳餘甘豈苖裔風姿雖小殊氣韻乃酷似醉顔澀吻餘髣髴清香至侯門収寸長粉骨成珍劑猶聞雜蜜草少轉森嚴味竒材用不專雖用何殊棄端知効苦言逆耳多嫌忌棄果事何傷違言徳之累悦口易逢知感兹發長喟七言絶句増宋張孝祥餘甘子甘言悞我三折臂良藥為洗五年腸欲知苦過味方永請試君家肘後方此老才堪上諫坡南州留滯意如何還將苦口劘英主醫國懸知藥籠多苦愁人意未相諳卒以初嘗廢後甘王氏有詩旌橄㰖可憐遺味在巴南詞増宋黄庭堅更漏子菴摩勒西土果霜後明珠顆顆憑玉兎搗香塵稱為席上珍號餘甘爭奈苦臨上馬時分付管回味却思量忠言君試嘗山樝原山樝一作楂其味似楂故名一名棠梂子一名羊梂朹字之誤一名山裏果一名茅樝一名猴樝一名鼠樝本草云生於川原茅林中猴䑕喜食之故有諸名一名朹子一名檕梅爾雅云朹檕梅一名赤瓜子本草云當作赤棗樝状似赤棗虞衡志有赤棗王璆百一方云山裏紅果俗名酸棗正合此義其類有二種皆生山中一種小者樹髙數尺多枝柯葉有五尖色青背白椏間有刺三月開小白花五出實有赤黄二色九月熟其核状如牽牛子色微白映紅甚堅一種大者樹髙丈餘花葉皆同但實稍大而色黄緑皮澀肉虚初甚酸澀經霜乃紅可食出滁州青州者佳為消滯要藥語云山樝有爛肉之功小者為棠朹子茅樝猴樝堪入藥肥大者為羊朹子可作果食别録原製用取熟者蒸爛去皮核及内白筋白肉搗爛加入白糖以不酸為度微加白礬末則色更鮮妍入籠蒸至凝定収之作果甚羙兼能消食又蒸爛熟去皮核用蜜浸之頻加蜜以不酸為度食之亦佳聞有以此果切作四瓣加薑鹽拌蒸食又一法也入藥者切四瓣去核曬乾収用山樝酒山樝熟時擇擘去蟲洗淨控乾搗半碎每缸用三斗隨添黍米少許亦可以甑蒸半熟取出攤冷入大麯半塊燒酒一斤拌如常法其味甘淡不醉人極消食積枳椇増古今注枳椇子一名樹蜜一名木餳味餳美如餳蜜一名白石一名白實一名木石一名木實本草枳椇一名蜜􅀈音止矩一名蜜屈律皆屈曲不伸之意此樹多枝而曲其子亦拳曲故名一名木蜜因其味也一名木珊瑚一名雞距子一名雞爪子象其形也木名金鈎木一名枅棋一名交加枝言其紐屈也木髙三四丈葉圓大如桑柘夏月開花枝頭結實如雞爪形長寸許紐曲開作兩三岐儼若雞之足距嫩時青色經霜乃黄嚼之味甘如蜜每開岐盡處結一二小子状如蔓荆子内有扁核赤色如酸棗仁形按今山西甚多俗名拐棗彚考増詩小雅南山有枸陸璣疏枸樹一名枸骨今官園種之謂之木蜜古語曰枳枸来巢言其味甘故飛鳥慕而巢之本從南方米能令酒味薄若以為屋柱則一屋之酒皆薄禮記曲禮婦人之䞇椇榛棗脯爾雅翼古者人君燕食所加庶羞凡三十一物椇其一也又為婦人之䞇荆楚之俗亦鹽藏荷裹以為冬儲今不以為重賤者食之而已葡萄原葡萄古作蒲桃又作蒲陶一名賜紫櫻桃生隴西五原燉煌山谷今河東及江北皆有之而平陽尤盛苖作藤蔓而極長大盛者一二本綿被山谷間三月開小花成穂黄白色旋著實七八月熟水晶葡萄暈色帶白如著粉形大而長味甚甘西番者更佳馬乳葡萄色紫形大而長味甘紫葡萄黒色有大小二種酸甜二味緑葡萄出蜀中熟時色緑若西畨之緑葡萄名兎睛味勝糖蜜無核則異品也其價甚貴瑣瑣葡萄出西番實小如胡椒今中國亦有種者一架中間生一二穂雲南出者大如棗味尤長唐史波斯國所出大如雞卵也増今塞外有十種葡萄伏地公領孫哈蜜公領孫哈蜜紅葡萄哈蜜緑葡萄哈蜜白葡萄哈蜜黒葡萄哈蜜瑣瑣葡萄馬乳葡萄伏地黒葡萄伏地瑪瑙葡萄原可生食可釀酒最難乾不乾不可収今太原平陽皆製乾貨之四方西北人食之無恙東南食之多病熱其根莖中空相通暮溉其根至朝而水浸其中故俗呼其苖為水通澆以米泔水最良以麝入其皮則葡萄盡作香氣以甘草作針針其根則立死三元延夀書云葡萄架下不可飲酒恐蟲屎傷人彚考増周禮地官場人掌國之場圃而樹之果蓏珍異之物以時歛而藏之注珍異枇杷葡萄之屬原史記大宛傳宛左右以葡萄為酒富人藏酒至萬餘石久者數十嵗不敗俗嗜酒馬嗜苜蓿漢使取其實来於是天子始種苜蓿葡萄肥饒地及天馬多外國使来衆則離宮别館旁盡種葡萄苜蓿極望増漢書西域傳且末國難兜國罽賔國有蒲陶諸果武帝發使十餘軰抵宛西諸國求竒物漢使采蒲陶苜蓿種歸後漢書西域傳栗弋國出葡萄衆果其土水羙故葡萄酒特有名焉梁書扶桑國傳地多蒲陶髙昌國傳大同中遣使貢蒲陶等物北齊書李元忠傳元忠曽貢世宗葡萄酒一盤世宗報以百練縑遺其書曰儀同位亞台鉉識懐貞素出藩入侍備經要重而猶家無擔石室如懸磬豈輕財重義奉時愛已故也久相嘉尚嗟咏無極恒思標賞有意無由忽辱蒲桃良深佩戴聊用絹百匹以酬清徳也南史夷貊傳髙昌國出蒲桃酒梁大同中遣使獻蒲桃氍㲣原唐書陳叔逹傳嘗賜食得葡萄不舉帝問之對曰臣母病渴求不能致願歸奉之帝流涕曰卿有母遺乎因賜之又賚物百叚西域傳大食國嵗獻貴人葡萄大者如雞卵増秦州記秦野多葡萄晋宫閣名華林園葡萄百七十八株原後凉録龜兹國人奢侈家有至千斛葡萄増燉煌張氏家傳扶風孟佗以葡萄酒一升遺張讓即擢凉州刺史洛陽伽藍記白馬寺浮圖前葡萄枝葉繁衍實偉於棗味殊美冠於中京帝至熟時常詣取之或復賜宫人宫人得之轉餉親戚以為竒味得者不敢輙食乃歴數家金樓子大月氐國善為葡萄花葉酒或以根及汁醖之其花似丁香而緑榮碧鬚春夏之時萬鬚競發如鸞翼八月中風至吹葉上傷裂有似綾紈故人呼為葡萄風亦名為裂葉風景龍文館記四月上已日上幸司農卿王光輔荘駕還頓後中書侍郎南陽岑羲設茗飲葡萄與學士等討論經史原西域記焉耆國土宜葡萄笯赤建國多葡萄増宣室志晉陽西有童子寺在郊牧之外貞元中有鄧珪者寓居於寺秋夜與朋友數軰㑹宿忽見一手自牖間入色黄而瘦甚珪開其牖聞有唫嘯之聲訊之曰汝為誰對曰吾隠居山谷有年矣今夕縱風月之遊聞先生在此故来奉謁願得坐牖下聼先生與客談珪許之既坐與客談笑極歡久之告去明夕再来又以手出於牖間珪以緡系其臂牢不可觧遂引緡而去明日珪與客窮其跡至寺北百餘歩有蒲桃一株甚蕃茂而緡系其枝有葉類人手果牖間所見遂掘其根而焚之原酉陽雜俎貝丘之南有葡萄谷谷中葡萄可就其所食之或有取歸者即失道世言王母葡萄也天寳中沙門曇霄因遊諸嶽至此谷得葡萄食之又見枮蔓堪為杖大如指五尺餘持還本寺植之遂活長髙數仞䕃地幅員十丈仰觀若帷葢馬其房實磊落紫瑩如墜時人號為草龍珠帳増酉陽雜俎庾信謂魏使尉瑾曰我在鄴遂大得葡萄竒有滋味陳昭曰作何形状徐君房曰有類軟棗信曰君殊不體物可得言似生荔攴魏肈師曰魏武有言末夏渉秋尚有餘暑酒醉宿酲掩露而食甘而不飴酸而不酢道之固已流涎稱竒況親食之者瑾曰此物實出于大宛張騫所致有黄白黒三種成熟之時子實逼側星編珠聚西域多釀以為酒每米嵗貢在漢西京似亦不少杜陵田五十畝中有葡萄百樹今在京兆非直止禁林也信曰乃園種户植接䕃連架昭曰其味何如橘柚信曰津液竒勝芬芳減之瑾曰金衣素裏見苞作貢向齒自消良應不及零陵總記李直方常第果實若貢士以葡萄為五河東備録楊炎食葡萄曰汝若不澀當以太原尹相授清異録河東葡萄有極大者惟上人得啖之其至京師者百二子紫粉頭而已原南部新書太宗破髙昌収馬乳葡萄種於苑中併得酒法仍自損益造酒成緑色芳香酷烈味若醍醐増蒙泉雜言酉陽雜俎與六帖皆載葡萄由張騫自大宛移植漢宫按本草已具神農九種當塗熄火去騫未逺而魏文之詔實稱中國名果不言西来是唐以前無此論予嘗以為大宛之種必與中國者異故博望取之叚白所載必有所據但失實耳比戍酒泉屢嘗取乾之名曰瑣瑣比中國者差小形圓而色正赤其味甘羙非中國者可敵則予所見庶或得之今此種處處有之獨蒲坂者勝土人乾之以資貿易江南重之稱蕃葡萄曰蕃云者豈承襲瑣瑣之乾與姑識之以俟知者甲申雜記湖南提刑唐秷云其父諲為湖北漕有一道人間與唐漕飲取千里外物不移刻一日唐欲河東葡萄又思峡中新荔子酒數廵則令人就其卧屏間取之皆美新若方折枝者集藻詔原魏文帝詔中國珍果甚多且復為説葡萄當其末夏渉秋尚有餘暑酒醉宿酲掩露而食甘而不䬼脆而不酸冷而不寒味長汁多除煩觧渇又釀以為酒甘於麴蘖善醉而易醒道之固已流涎咽唾况親食之耶他方之果寜有匹者贊増宋宋祁緑葡萄贊西南所宜柔蔓紛衍縹穂緑實其甘可薦賦増魏鍾㑹蒲桃賦并序余植蒲桃於堂前嘉而賦之美乾道之廣覆兮佳陽澤之至淳覽遐方之殊偉兮無斯果之獨珍托靈根於𤣥圃植崑山之髙垠緑葉翁鬱曖若重隂翳羲和秀房陸離焜若紫英乘素波仰承甘液之靈露下歙豐潤於醴泉總衆和之淑美體至氣於自然珍味允備與物無儔清濁外暢甘㫖内遒滋澤膏潤入口散流宋宋祁右史院蒲桃賦癸酉之仲夏予受詔修書寓於右史院紬繹多暇裴囘堂除有蒲桃一本延蔓疎瘠垂實甚寡予且玩且咀以為省户凝切禁廷敞閑人不夭摧禽不棲啄與平原槁壤有間匪灌叢宿莽所干而條悴葉芸不為時珍何耶得非地以所宜為安根以屢徙為危封植浸灌信美非願因為小賦代其臆對云昔炎漢之遣使道西域而始通得蒲桃之異種偕苜蓿以来東矜所從以至逺遂徧植乎離宫去葱雪之寒鄉托崤函之福地並萬寳以均載厯千古而舒粹玩之可使蠲煩食之足以平志不由甘而取壞廼因少而獲貴鄙柚苞之輕侻賤蔗境之塵滓粤何人斯植我於兹托深嚴之秘署切轇轕之文榱培孤莖以槁壤引柔蔓乎標枝泉石渠以蒙浸露金莖而並滋布凉影於月宮獵重葩於禁颸蔽風廬之岑寂隱肅唱而逶遲彼得地而逢辰宜欣欣以茂遂奚敷華而委質反惨慘而兹瘁乏磊砢於當年讓紛華於此世是必野荄非曾掖之玩菲實異大官之味因枳橘之屢遷歎匏𤓰之徒繫亦猶鬱桞有性不願桮棬之華海鳥取容非榮觴酒之饋胡不放之巖際歸之壠隂上敷榮於樛木外結庇於緇林蒙烟沭霧跨野彌岑豐茸大徳之谷棲息無檎之禽保深根以庇本誡繁實之披心窮天年以善育奚斧斤之可尋亂曰堦藥衒華堂萱争麗枝以萬年為名木以五衢稱瑞是皆托中涓以進熟荷鈎盾之為地結賞心以自如非孤生之所冀文賦散句増魏荀朂葡萄賦靈運宣流休祥允淑懿彼秋方乾元是畜有葡萄之珍竒應淳和而延育晋左思蜀都賦葡萄亂潰魏都賦葡萄結隂潘岳閒居賦石榴蒲桃之珍磊落蔓衍乎其側五言古詩原唐劉禹錫葡萄歌野田生葡萄纒繞一枝蒿移来碧墀下長苗日日髙分岐浩繁縟修蔓盤詰曲揚翹向庭柯意思如有屬為之立長架布濩當軒緑米液溉其根理疎看滲漉繁葩組綬結懸實珠璣蹙馬乳帶輕霜龍鱗曜初旭有客汾隂至臨堂瞪䨇目自言我晋人種此如種玉釀之成美酒令人飲不足為君持一斗往取凉州牧増宋梅堯臣范景仁席中賦葡萄朱盤何纍纍紫乳封霜厚今為馬谷繁昔釀凉州酒乃知西土珍漢使傳應久蘓轍賦園中所有葡萄不禁冬屈盤似無氣春来乘盛陽覆架青綾被龍髯亂無數馬乳垂至地初如早梅酸晚作醲酪味誰能釀為酒為爾架前醉滿斗不與人凉州㡬時致元郝經甲子嵗後園葡萄深院荒草長短蔓裂塼縫葡萄本西果南國誰與種挿蘆為扶持灌溉甚珍重瘦骨紫節舒龍頭青線控蟠蟠上疎籬蒨蒨将逺縱遭遇雖後時取實望秋仲摘露添俎豆庶閒館人供誰知六月旱卉木焦死衆斷秧餘㡬花勉强著土擁竟作纒結枯日繞空悼痛肺渇口重乾望梅心欲烘忽憶河隴秋滿地無歇空支離半空架丰茸十里洞拇乳積成岸澒癑接梁棟一𣲖碼碯漿傾注百千甕徃嵗見沙陀囘鶻正来貢詔賜琥珀心雪盛瓶盡凍查牙飲流澌氣壓黒馬湩一旦離魏闕五載猶在宋見此復何時鳥道目迎送七言古詩増唐唐彦謙詠葡萄西園晚霽浮嫩凉開尊漫摘葡萄嘗滿架髙撐紫絡索一枝斜嚲金琅璫天風颼颼葉栩栩蝴蝶聲乾作晴雨神蛟清夜蟄寒潭萬片濕雲飛不𧺫石家美人金谷遊羅幃翠幕珊瑚鈎玉盤新薦入華屋珠帳髙懸夜不収勝遊記得當年景清氣逼人毛骨冷笑呼明鏡上遥天醉倚銀牀弄秋影宋楊萬里初食太原生葡萄時十二月二日淮南葡萄八月酸只可生吃不可乾淮北葡萄十月熟縱可作羓也無肉老夫臘裏来都梁飣坐那得馬乳香分明猶帶龍鬚在徑寸𤣥珠肥十倍太原清霜熬絳餳甘露凍作紫水精隆冬壓架無人摘雪打冰封不曽拆風吹日炙不曾腊玉盤一朶直萬錢與渠傾葢真㤀年君不見道逢麴車口流涎元楊載題温日觀葡萄老禪嗜酒醉不醒强坐虛櫩寫清影興来擲筆意茫然落葉滿庭秋月冷醉中捉筆兩眼花倚檐架子欹復斜翠藤盤屈那可辨但見滿紙生龍蛇明王九思畫葡萄引漢武唯知貴異物博望常勞使西域大夏康居産富饒胡桐檉桞非竒特獨取葡萄入漢宫遂遣天王親外國當時肉味厭侯王今日霜根徧西北吾家十畝後園裏長條㡬架南山側龍鬚時裊水風斜馬乳盡垂秋雨色故園一别驚風雨畫圗相對思鄉土青錢已辦雇河舟白首行看住草樓但願千缸釀春酒未湏一斗博凉州僧守仁題温日觀葡萄次韻龍扃失鑰十二重驪珠迸落鮫人宫鑌刀剪斷紫瓔珞纍纍馬乳垂金風樹根吹火照殘墨冷雨松棚秋鬼哭蔗丸嚼碎流沙氷鴨酒呼来漢江緑鐵削虬藤劎三尺雷梭怒穴陶家璧曇胡醉起面秋巖一索摩尼掛空壁七言律詩増宋黄庭堅景珍太博見示舊唱和葡萄詩因而次韻映日圓光萬顆餘如觀寳藏隔蝦鬚夜愁風起飄星去曉喜天晴綴露珠宫女揀枝模錦繡論師持味比醍醐欲収百斛供春釀放出聲名壓酪奴原楊萬里葡萄纔喜盤藤捲葉生又驚壓架暗隂成夏褰凉潤青油幕秋摘甘寒黑水晶近竹猶爭一尺許抛鬚先罥兩三莖今年乞種江西去長使茅齋怯晚晴増元洪希文葡萄走架龍鬚弱不支炎天待月立多時醍醐縱美輸清滑瓔珞雖圓讓陸離珍異曾誇太冲賦纍垂已入退之詩當年若得傳方法博取凉州亦一竒原明馮琦葡萄架晻曖繁隂覆緑苔藤枝蘿蔓共縈回自隨博望仙槎後詔許甘泉别殿栽的的紫房含雨潤疎疎翠幄向風開詞臣病渇沾新釀不羡金莖露一杯一架扶疎碧水潯午凉不散緑雲深芳香未讓醍醐美秀色全滋薜荔隂紫玉含風秋液冷𤣥珠入夜月華侵莫言西域傳来晚猶及相如賦上林五言排律増唐劉禹錫和令狐相公謝太原李侍中寄蒲桃珍果出西域移根到北方昔年隨漢使今日寄梁王上相芳緘至行臺綺席張魚鱗含宿潤馬乳帶殘霜染指鉛粉膩滿㗋甘露香醖成千日酒味敵五雲漿咀嚼停金盞稱嗟響畫堂慚非末至客不得一枝嘗五言絶句増唐唐彦謙葡萄金谷風露凉緑珠醉初醒珠帳夜不収月明墮清影宋王十朋詠葡萄珠帳臨簷掛龍鬚滿架抽也知堪釀酒不要博凉州元劉詵葡萄枯葉展大蝶低枝屈長虯露寒壓成酒無夢到凉州七言絶句原唐韓愈題張十一旅舍葡萄新莖未徧半猶枯髙架支離倒復扶若欲滿盤堆馬乳莫辭添竹引龍鬚増宋張栻題葡萄架君家小圃占春光眼看龍鬚百尺長移向樓邊并春井明年垂實更隂凉王十朋詠葡萄水晶馬乳薦新秋青紫酸甘孰味優只可堆鹽餉韓子不宜釀酒博凉州原楊萬里葡萄乾凉州博酒不勝癡銀海乘槎領得歸玉骨痩将無一把向来馬乳太輕肥增元傅若金題松菴上人墨葡萄二首漢苑尋常露下時月明髙架影參差上林近日無来使腸斷江南見一枝露顆含香近客衣蜜蜂蝴蝶繞蕂飛夜来應值驪龍睡探得明珠月下歸貢性之墨葡萄酒醒西樓月欲斜滿窓晴影走秋蛇狂夫賸有相如渇一滴凉州未許賖題肅萬邦葡萄憶騎官馬過灤陽馬乳纍纍壓架香釀就瓊漿三百斛胡姬當道喚人嘗鄭氏允端葡萄滿筐圓實驪珠滑入口甘香氷玉寒若使文園知此渇露華應不乞金盤明李東陽葡萄次韻二首采采西林白露圑一時清賞故人歡蕭條四十年前事又向誰家卷裏看西土葡萄别樣圑謫居聊此冩清歡荔支香水誰髙下且與詩人一例看原李夢陽葡萄萬里西風過鴈時緑雲𤣥玉影參差酒酣試取氷丸嚼不説天南有荔枝増沈周葡萄秋棚昨夜黒風呼鬼淚瀅瀅泣不枯明日擔夫曉街上一筐新味賞明珠詩散句増宋梅堯臣南庭葡萄架萬乳纍將磓張九成葡萄得凉州所求輒復効唐李頎長安春物舊相宜小苑葡萄花滿枝宋張耒葡萄盤屈如秋蛇春来蟄起紆横斜唐王維葡萄逐漢臣原李白葡萄出漢宫増李白葡萄開景風杜甫一縣葡萄熟姚合筐封紫葡萄張諤昨夜葡萄初上架宋陸游爛紫葡萄重垂架原元顧阿瑛葡萄玉盞酌西凉詞増宋張鎡眼兒媚𤣥霜凉夜鑄瑤丹飄落翠藤間西風萬顆明珠巧綴零露漙沾時人那識風流品馬乳喜堆盤玉纎旋摘銀罌分釀莫負清懽鷓鴣天隂隂一架紺雲凉裊裊千絲翠蔓長紫玉乳圓秋結穂水晶珠瑩露凝漿相並熟試新嘗纍纍輕翦粉痕香小槽壓就西凉酒風月無邊是醉鄉别録増記事珠小兒髮初生為小髻十數其父母為兒女相勝之辭曰葡萄髻十穂勝五穂圖繪寳鑑戴進字文進喜作葡萄配以鈎勒竹蟹爪草竒甚胡大年僧曉菴皆工葡萄徐柱字夢節東吳人善寫葡萄農田餘話古人無畫葡萄者吳僧温日觀夜於月中視葡萄影有悟出新意似飛白書體為之酒酣興發以手潑墨然後揮寫迅於行草収拾散落頃刻而就如神甚竒特也其弟子沈仲華湖州人傳其法亦佳世多見之原種植取肥枝如拇指大者從有孔盆底穿過盤一尺於盆内實以土放原架下時澆之候秋間生根從盆底外截斷另成一架澆用冷肉汁或米泔水増種樹書葡萄欲其肉實當栽於棗樹之旁於春鑽棗樹上作竅子引葡萄枝入竅中透出至二三年其枝既長大塞滿樹竅便可砍去葡萄根托棗根以生便得肉實如棗北地皆如此種法製用清供録葡萄渇水生葡萄不計多少擂碎濾去滓令净以慢火熬以稠濃為度取出収貯净磁器中熬時弗犯銅鐵器葡萄熟者不可用止可造酒臨時斟酌入煉過熟蜜及檀香末腦麝少許原収藏北方天寒初冬湏以草裹埋地中尺餘俟春分後取出卧置地數日然後架起子生時去其繁葉使霑風露則結子肥大附録野葡萄原野葡萄一名燕薁一名蘡薁説文云薁櫻也廣雅云燕薁櫻薁也一名嬰舌一名山葡萄藤名木龍按詩疏謂之車􅀈藤蔓生苖葉花實與葡萄相似但實小而圓色不甚紫亦堪為酒増草花譜野葡萄生諸山中子細如小豆色紫蓓虆而生状若葡萄蟠之髙樹懸掛可觀彚考増詩豳風六月食鬱及薁集藻賦散句増漢司馬相如上林賦隠夫薁棣附録蔓胡桃增酉陽雜爼蔓胡桃出南詔大如扁螺兩隔味如胡桃或言蠻中藤子也園林草木疏一作蔓葡萄子甘滑如乳霜風下潰御定佩文齋廣羣芳譜卷五十七
