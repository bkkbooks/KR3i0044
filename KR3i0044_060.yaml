body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十八果譜棗原棗埤雅云棘大者棗于文重朿為棗本草云朿性高故重朿棘性卑故並朿朿音次棗棘皆有刺針會意也一名木蜜廣記云本蜜棗也皮粗葉小面深緑色背微白發芽遲五月開小花淡黃色花落即結實生青不堪食漸大漸白至微見紅絲即堪生啖熟則純紅味甚甘甜王禎農書云南北皆有然南棗堅燥不如北棗肥美生于青齊晉絳者尤佳齊民要術云旱潦之地不任稼穡者種棗則任矣種類甚多有壺棗爾雅云棗壺棗注云今江東呼棗大而鋭上者為壺壺猶瓠也鹿盧棗爾雅云邉要棗注云子細腰今謂之鹿盧棗白棗爾雅云擠白棗注云即今棗子白乃熟揚徹齊棗見爾雅注云未詳羊棗爾雅云遵羊棗注云實小而圓紫黑色今俗呼之為羊矢棗大棗爾雅云洗大棗注云今河東猗氏縣出大棗子如雞卵蹶泄棗爾雅云蹶泄苦棗注云子味苦無實棗爾雅云晳無實棗注云不著子者還味棗爾雅云還味捻棗注云還味短味蹙咨棗一名大白核小肌肥榖城紫棗長二寸西王母棗大如李核三月熟在衆果之先夏白棗出洛陽墟棗出汲郡一名安益棗信都大棗梁國夫人棗三星棗駢白棗灌棗狗牙棗雞心棗牛頭棗獮猴棗夕棗﨑廉棗以上十六名並出廣志棠棗玉門棗並出西京雜記樂氏棗齊民要術云出青州豐肌細核多膏肥美為天下第一相傳樂毅破齊時從燕來齊所種也羊角棗詳見後鄴中記御棗味最美出安邑窑坊棗味佳出應天府窑坊門內無核棗實小核僅有形食之不覺出青城縣氐棗木棗丹棗鶴珠棗出天台間間真人以致元帝增爾雅煮填棗未詳西京雜記上林苑有弱枝棗青華棗赤心棗廣志單父棗玄棗圖經水菱棗味極美酉陽雜俎仙人棗晉時華林園有棗長五寸葉如針名仙人棗本草衍義御棗甘美輕脆后衆棗熟而易生蟲今人所謂朴落酥者是也牙棗先衆棗熟亦甘美微酸而尖長二棗皆可噉不堪收曝清異録雞冠棗出睢陽宜作脯醍醐棗宜生噉元柳貫打棗譜棣棗紅棗出山東紅色紫紋棗香棗出哈蜜圓愛棗火棗三寸棗金槌棗鳯眼棗凍棗沙棗出赤斤􅝜嵻棗詳見后洞冥記凡棗溟海棗細核棗天蒸棗乾紅於樹上騩山棗色甚美膠棗南棗團棗美棗匾棗良棗卧棗鹽官棗出海鹽紫色味佳菟棗高尺許實如棗出丹陽七尺棗密雲棗出密雲縣味最甘牙棗先熟亦甘美金城棗形大而虛少脂青州棗赤棗萬嵗棗出三佛齊國山棗狀如棗而圓色青黃而味甘酸出廣州客燕雜記京師佳果有纓絡棗賽梨棗合兒棗原能開胃健脾可久留生熟皆可食多食生熱令人齒黃病齲齒彚考原詩豳風八月剝棗禮記曲禮婦人之摯椇榛脯修棗栗增內則棗栗飴蜜以甘之棗曰新之疏棗易有塵埃恆治拭之使新食棗桃李弗致于核原周禮天官饋食之籩其實棗栗增左傳女贄不過榛栗棗修以告虔也疏棗取其早起也孟子曾晳嗜羊棗曾子不忍食羊棗戰國策蘇秦説燕文侯曰北有棗栗之利民雖不由田作棗栗之實足食於民原史記封禪書李少君曰臣嘗遊海上見安期生食巨棗大如瓜貨殖傳安邑千樹棗其人與千户侯等增漢書王吉傳始吉少時學問居長安東家有大棗樹垂吉庭中吉婦取棗以啖吉吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽婦去東家棗完去婦復還原南史蕭琛傳琛嘗侍宴醉伏上以棗投琛琛乃取栗擲上中面帝動色曰此中有人不得如此豈有説耶琛曰陛下投臣以赤心臣敢不報之以戰栗增魏書奚康生傳徐玄眀以城內附詔遣康生迎接賜細御銀纒槊一張并棗奈果面敕曰果者果如朕心棗者早遂朕意南史王泰傳泰幼敏悟年數嵗時祖母集諸孫姪散棗栗於牀羣兒競之泰獨不取問其故對曰不取自當得賜由是中表異之北史藝術傳綦母懷文云昔在晉陽為監館館中有一蠕蠕客同館胡沙門指語懷文云此人别有異算術仍指庭中一棗樹云令其布算子即知其實數乃試之并辨若干純赤若干赤白相半于是剝數之惟少一子算者曰必不少但更撼之果落一實宋史禮志太宗景祐三年禮官宗正請每嵗秋孟月嘗果嘗穄配以雞果以棗以梨原晏子春秋齊景公謂晏子曰東海之中有水而赤其中有棗華而不實何也晏子曰昔者秦穆公乘龍理天下以黃布裹蒸棗至海而投其布故水赤蒸棗故華而不實公曰吾佯問子耳對曰嬰聞之佯問者亦佯對增晏子春秋楚莊王愛馬噉棗脯鄒子燧人氏夏取棗杏之火原韓非子秦飢應侯謂王曰五苑之棗栗請發與之淮南子桃棗蔭於街者莫有援也增神異經北方荒中有棗林其高五十丈敷張枝條數里餘疾風不能偃雷霆不能摧其子長六七寸圍過其長熟赤如朱乾之不縮氣味潤澤殊於常棗食之可以安軀益於氣力故方書稱之赤松子云北方大棗味有殊既可益氣又安軀武帝內傳列玉門之棗酌蒲萄之醴原尹喜內傳尹喜與老子西遊省大真王母共食玉文之棗其實如瓶東方朔外傳武帝時上林獻棗上以杖擊未央殿前檻呼朔曰叱來叱來先生知此篋中何物朔曰上林之棗四十九枚上曰何以知之朔曰呼朔者上也以杖擊檻兩木林也來來者棗也叱叱者四十九也上大笑賜帛十匹增馬眀生别傳安期生仙人見神女設厨膳安期曰昔與女郎遊息於西海之際食棗異美此間棗小不及之憶此棗未久已二千年矣神女云吾昔與君共食一枚乃不盡此間小棗那可相比耶原洞冥記武帝元鼎元年起招仙閣進􅝜嵻細棗出􅝜嵻山山臨碧海萬年一熟如今之軟棗咋之有膏膏可然燈風俗通鮑焦耕田而食鑿井而飲在山中惟食棗或曰此棗子所植耶遂強吐之枯立而死蔡雍奏事程莫年十四叔父病故莫抱尸悲哀舅哀其羸劣嚼棗肉餔之莫見食歔欷不能吞咽增魏文帝詔南方有龍眼荔枝寧比西國蒲萄石蜜乎酢且不如中國凡棗味之美者莫若安邑御棗也原英雄記孔文舉為東萊賊所攻城欲破治中左承祖請以官棗賦與戰士增南方草木狀海棗樹身無間枝直聳三四十丈樹頂四面共生十餘枝葉如栟櫚五年一實實甚大如杯碗核兩頭不尖雙卷而圓其味極甘美安邑御棗無以加也泰康五年林邑獻百枚祭法春祠用棗原冀州論安平好棗地産不為無珍增神仙傳吳郡沈義為仙人所迎上天云天上見老君賜義棗二枚大如雞子晉宫閣名華林園棗六十二株王母棗十四株廣志周文王時有弱枝之棗甚美禁之不令人取置樹苑中原拾遺記北極有枝峯之隂多棗樹高百尋枝莖皆空實長一尺核細而柔百年一熟增異苑太元中南郡江陵縣有棗樹一年忽生桃李棗三種花子幽眀録太原王仲德年少時遭亂絶粒二日忽有人扶其頭呼云可起啖棗瞥見一小兒長四尺即隱乃有一囊乾棗在前噉之小有氣力便起世説王敦尚武帝舞陽公主如厠見漆箱中盛棗本以塞鼻敦謂厠上下果遂啖之羣婢皆笑述異記北方有七尺之棗凡人不得見或見而食之即為地仙魏世河內冬雨棗洛陽伽藍記華林園蓬萊山南有百果園果列作林林各有堂有仙人棗長五寸把之兩頭俱出核細如針霜降乃熟食之甚美俗傳云出崑崙山一曰西王母棗原鄴中記石虎苑中有西王母棗冬夏有葉九月生花十二月乃成三子一尺又有羊角棗亦生三子一尺增賈氏説林昔有人得安期大棗在大河之南煮三日始熟香聞十里死者生病者起其人食之白日上升故地名煮棗奚囊橘柚糜欽棗出真陵之山食一枚大醉經年不醒東方朔嘗遊其地以一斛歸進上上和諸香作丸大若芥子每集羣臣取一丸入水一石頃刻成酒味逾醇醪謂之糜欽酒又謂之真陵酒又謂之仙薌酒飲者香經月不歇大業拾遺記信都獻仲思棗四百枚棗長四五寸正紫色細文文皺小核味甘勝於青州棗北齊時有仙人仲思得此棗種之因以為名一名仙棗時海內惟有數株宣室志河中永樂縣道淨院居蒲中之勝境蒲中多大棗天下人傳嵗中不過一二無核者侯道華比三年輒得啖之後仙去杜陽雜編處士元藏機大業元年為海使判官遇風浪壞船獨為破木所載忽逹於洲島洲人曰此乃滄洲有碧棗丹栗皆大如梨北夢瑣言河中永樂縣出棗世傳得棗無核者食可度世里有蘇氏女獲而食之不食五榖年五十嫁顔如處子原杜氏新語杜畿為江東守平虜將軍劉勳為太祖所親貴震朝廷常從畿求大棗拒以他故後勳伏法太祖得其書歎曰杜畿可謂不媚竈也清異録百益一損者棗故醫氏目為百益紅或謂棗是聖花兒增寰宇記宣帝時幽州刺史李宣尚范陽公主憶長安於易州築一城象長安城中有棗樹花而不結皆向西南而引俗謂思鄉棗原東坡集朱眀洞在沖虛觀後云是蓬萊第七洞天唐永樂道士侯道華以食鄧天師棗仙去永樂有無核棗人不可得道華得之豫在岐下亦得食一枚云增夢溪筆談棗與棘相聚皆有刺棗獨生高而少橫枝棘列生卑而成林以此為别其文皆從朿音刺木芒刺也朿而相戴立生者棗也朿而相比橫生者棘也畫墁録寧州之南二十里棗社以狄梁公兩為寧州刺史民立祠植棗取兩朿之義樂府集古咄唶歌曰棗下何纂纂榮華各有時棗初欲赤時人從四邉來棗適今日賜誰當仰視之潘安仁笙賦云詠園桃之夭夭歌棗下之纂纂歌曰棗下纂纂朱實離離宛其死矣化為枯枝纂纂棗花也棗之纂纂盛貌實之離離將衰言榮謝之各有時也括異志邢州城東十餘里周世宗之祖莊也門側有井上有大棗二株世宗時柯葉茂盛垂蔭一畝恭帝既禪棗遂枯眀道中枯枿復生一枝長一丈餘蔚然可愛井水中如覆錦繡眀年詔求五代帝王之後柴氏自邢蔡虢等州諸族被甄敘入官者三十餘人井棗之祥亦非空應爾雅翼晉人好食棗其人置之懷袖食無時久之齒皆黃故嵇康養生論云齒居晉而黃謂棗故也原東陽記信安縣有懸室坂晉時有民王質伐木至石室中見童子四人彈琴而歌因倚歌而聽之童子以一物如棗與質含之便不復飢增雲林集袁員外年八十有二顔貌筋力如四五十許人為言甫弱冠遭逢盛眀初宰當塗過九華山道逢神人與棗食之後數見夢寐間若冥感玄遇者千佛山記濟南千佛山多棗樹纍纍如垂珠異林張剌達宋時為華州掾嘗從太守入華山謁陳摶先生一道人至藍袍葛巾探袖出棗三枚顔色各異以白者授先生赤者自食青者投太守太守不悅持以奉掾掾遂啖之道人出太守曰是何道者先生曰此純陽真人也太守悔恨追不能及張公自後得道國初時往往遊人間每顯靈異原花史呂仙亭前棗樹未嘗實一嵗忽有實如瓜太守命小吏採而進小吏私啖之遂仙去集藻啓增陳周𢎞正謝梁元帝賚玉門棗啓安期舊美安息高名臣金馬之榮未獲趨奉方朔之賜遽降洪恩贊增晉郭璞贊因材制義赤心鯁直藹藹卿士亮此衮職建國辨方外朝九棘賦增晉傅玄棗賦有蓬萊之嘉樹植神州之膏壤擢剛莖以排虛誕幽根以滋長北蔭塞門南臨三江或布燕趙或廣河東既乃繁枝四合豐茂蓊鬱斐斐素華離離朱實脆若嚼雪甘如含蜜脆者宜新當夏之珍堅者宜乾薦羞天人有棗若瓜出自海濵全生益氣服之如神陳後主棗賦芳園列幹森梢繁羅蘂餘莖少葉暗枝多復有竒樹風間臨闕二字夜影來未若丹心美實絳質嘉枝重針共暗枝瓠同瑰羞金盤于氷水薦玉案于深杯此歡心之未已方夢腸而屢回文散句增晉潘嶽間居賦周文弱枝之棗五言古詩原後秦趙整諷諫詩北園有棗樹布葉垂重隂外雖多棘刺內實有赤心梁簡文帝棗浮華薺水麗垂彩鄭都竒白英紛靡靡紫實標離離風搖羊角樹日映雞心枝榖城踰石蜜蓬嶽表仙儀已聞安邑美永茂玉門垂增簡文帝棗下何纂纂垂花臨碧澗結翠依丹巘非直入遊宮兼期植靈苑落日芳春暮遊人歌吹晚弱刺引羅衣朱實凌還幰且歡洛浦詞無羡安期遠唐白居易杏園棗樹人言百果中惟棗凡且鄙皮皺似龜手葉小如鼠耳胡為不自知生花此園裏豈宜遇攀玩幸免遭傷毁二月曲江頭雜英紅旖旎棗亦在其間如嫫對西子東風不擇木吹煦長未已眼看欲合抱得盡生生理寄言遊春客乞君一回視君愛繞指柔從君憐柳杞君求悅目豔不敢爭桃李君若作大車輪軸材須此宋梅堯臣亳州李密學寄御棗一篋沛譙有巨棗味甘蜜相差其赤如君心其大如王瓜嘗貢趨國門豈及貧儒家今見待士意下異盧同茶食之無厭飫詠德曾未涯原王安石賦棗種桃昔所傳種棗豫所欲在實為美果論材又良木餘甘入鄰家尚得饞婦逐况豫秋盤中快噉取饜足風苞墮朱繒日顆皺紅玉贄亨古已然豳詩自宜録緬懷青齊間萬樹蔭平陸誰云食之昏匿知乃成俗廣庭觴聖夀以此參肴􅉡願此赤心投皇眀倘豫燭增眀吳寬棗荒園乏佳果棗樹八九株纂纂爭結實大率如琲珠此種味甘脆南方之所無日炙色漸赤兒童已窺覦剝擊盈數斗鄰舍或求須早知實可食何須種柳榆此木頗耐旱地宜土不濡所以齊魯間斬伐充薪芻近復得異種攣拳類人痀曲木未可惡惟天付形軀良材却矯揉不見笏與弧七言古詩增宋梅堯臣烏啄棗樹頭陽烏飢啄棗破紅繞地青蠅老青蠅雨濕驚不飛殘棗入泥人不掃西風落盡鳥亦歸晉客齒黃空懊惱七言律詩增宋歐陽修寄棗人行書贈子履學士秋來紅棗壓枝繁堆向君家白玉盤甘辛楚國赤萍實磊落韓嫣金彈丸聊效詩人投木李敢期佳句報琅玕嗟豫久苦相如渴却憶氷梨尉齒寒眀李東陽若虛夜餽送瓶棗異代神仙事不賖如瓶丹棗勝如瓜多情饋客詩兼遠急腳攜筐步半斜內苑不勞方朔射西鄰還有少陵家白頭正有分甘興先向高堂一薦茶原王象晉詠棗蓐收司契物華新纍纍丹苞日可親漢帝殿前曾鄭重呂仙亭下詫竒珍味逾石蜜甜偏永紅邁朱櫻色莫倫怪道仲思名姓著好同玉李供楓宸五言排律增宋郭祥正咏棗彼美祗園果珍同玉井船後期千嵗熟今日萬珠圓地濶仍依水欄深自帶煙結花雖最晚藏核莫如堅大食移根逺番禺托蒂連舊名稽藥録新實著詩篇甜出諸餳上香居百果前黑腰虛羡爾紅皺豈為然邂逅為公夀婆娑與世延暮鐘催酒散嘶馬引旗旋今作中州瑞元從異國傳何當廣栽植欲以慰飢年五言絶句增宋蘇軾和子由岐下詠棗居人幾番老棗樹未成槎汝長才堪軸吾歸已及瓜詩散句增唐李白親見安期公食棗大如瓜宋趙抃棗熟房櫳暝花妍院落眀金酈權夾道懸新棗荒畦卧晚瓜原唐杜甫庭前八月梨棗熟一日上樹能千回增曹唐等間相别三千嵗長憶水邊分棗時宋蘇轍久聞牛尾何曾識竊比雞頭意未安黃庭堅日顆曝乾紅玉軟風枝牽動緑羅鮮唐杜甫棗熟從人打韓愈紅皺曬簷瓦宋張耒眩日棗裝林金高士談猶青棗未霜唐杜甫堂前撲棗任西鄰李賀出籬火棗垂紅淺薛能棗枝秋赤近高天宋歐陽修紅棗林繁欣嵗熟黃庭堅蓛蓛衣巾落棗花别録增發蒙記甘棗令人不惑酉陽雜俎單雄信幼時學堂前植一棗樹至年十八伐為槍長丈七尺拱圍不合刃重七十斤號為寒骨白原分栽選味佳者留作栽候葉始生取大棗傍條二三尺高者移種棗性硬其生晚芽未出移恐難出三步一行行欲相當如本年芽未出弗遽刪除諺云棗樹三年不算死亦有久而後生者修樹每元旦日未出時反斧斑駁椎之謂之嫁棗不椎則花而不實斫之則子萎而落候大蠶入簇以仗擊其枝間振去狂花則結實多收棗棗全赤即收撼而落之為上半赤而收者肉未充滿乾則色黃而皮皺將赤味亦不佳全赤久不收則皮硬復有鳥雀之患一法將才熟棗乘清晨連上枝葉摘下弗損傷通風處晾去露氣簡新缸無油酒氣者清水刷淨火烘乾待冷取淨稈草曬乾候冷一層草一層棗入缸中封固可至來嵗猶鮮曬棗先治地令淨有草則令棗臭駕箔椽上以無齒木扒聚而散之日二十度乃佳夜不必聚得霜露氣速成如有雨則聚而苫之五六日選其紅軟者上高厨暴之胮爛者去之否則恐壞餘棗其未乾者曬曝如法作乾棗新菰蔣露於庭以草鋪上厚三寸覆以新蔣凡三日撤覆露之畢日曝取乾納房中每一石以酒一升潄著器中密泥之可以經數年不壞棗油取紅軟棗入釡以水僅淹平煮沸漉出研細生布絞取汁塗盤上曬乾其形如油刮下每一匙投湯中即成美漿棗脯切棗曝乾如脯棗米棗煮熟爛將榖微碾去粳和棗勻作一處曬七八分乾石碾碾過再曬極乾收貯聽用臨時石磨磨細可作粥作點心任用純榖黍稷蜀秫麥麵之類俱可作製用十月內取大棗中破之去皮核文武火反覆炙香煮湯飲健脾開胃甚宜人五月五日尉斗燒棗一枚置牀下辟狗蝨附録天棗原天棗在蕭縣天門寺春時吐華結實如酸棗可食每四月七日其實皆熟次日遂空見湧幢小品附録糯棗原糯棗葉如柳實似杏而小味亦甘美見古今注附録酸棗原酸棗一名樲爾雅云樲酸棗增説文撚酸棗也原酸棗小而圓如芡無大樹實生青熟紅皮薄核大仁堪入藥生用令人不眠雙仁者勿用取紅軟者箔上曬乾納釡中水僅掩棗煮一沸即漉出入盆研布絞取濃汁塗器上日曝使乾取為末一碗投方寸匕遠行用以和米炒其味酸甜解飢渴最妙彚考增孟子養其樲棘淮南子伐撚棗以為矜述異記耆舊説周秦時河內雨酸棗遂生野棗今酸棗縣是也附録波斯棗增酉陽雜俎波斯棗出波斯國波斯國呼為窟莽樹長三四丈圍五六尺葉如土藤不凋二月生花狀如蕉花有兩甲漸漸開罅中有十餘房子長二寸黃白色有核熟則紫黑狀類乾棗味甘如餳可食附録千年棗增一統志千年棗出拂菻國附録萬嵗棗增一統志萬嵗棗生大食諸番及三佛齊國􅏄原􅏄説文作楓本草從柿今俗作柿者非赤實果也樹高大枝繁葉大圓而光澤四月開小花黃白色結實青緑色八九月乃熟紅􅏄皮深紅而多核所在皆有黃柿生汴洛諸州朱柿出華山似紅柿而圓小皮薄可愛味更草珍著蓋􅏄蒂下别有一層牛心柿狀如牛心蒸餅􅏄狀如市賣炊餅八稜􅏄大而稍扁南劍尤溪柿處州松陽柿尤為竒品塔􅏄大於諸􅏄去皮挂木上風乾之佳增學圃餘疏海門柿罐􅏄無核皆甘冷可食戒菴漫筆􅏄類大小形狀極多有火盆􅏄大而扁方􅏄四稜六稜乾瓤無核甚佳火珠多核不美原種類甚多大者如楪其次如拳小者如鹿心鴨子雞子生者澀不堪食其核形扁狀如木鱉子而堅根甚固謂之柿盤世傳柿有七絶一多夀二多隂三無鳥巢四無蟲蠧五霜葉可玩六佳實可啖七落葉肥大可以臨書多食引痰日乾者多食動風同蟹食腹痛作瀉食柿飲熱酒令人易醉或心痛欲絶彚考增東觀漢記韋順為東平相賞罰必信有柿樹生屋上徙庭中遂茂順至孝行人以為感於天地而生晉宫閣名華林園柿六十七株暉章殿前柿一株義熙起居注吳令顧修期言縣西鄉有柿樹殊本合條依舊集賀詔停述異記番禺有酸柿甜梅李乂果賦云梅甜柿酸酉陽雜俎慈恩寺中柿樹是法力上人手植爾雅翼柿於經罕見惟內則所加庶羞三十一物中有之在田録高皇微時過剩柴村已經二日不食矣行漸伶仃至一所乃人家故園垣缺樹凋上悲歎久之緩步周視東北隅有一樹霜柿正熟上取食之食十枚便飽又惆悵久之而去乙未夏上拔采石取太平道經於此樹猶在上指樹以前事語左右因下馬以赤袍加之曰封爾為凌霜長者或曰凌霜侯集藻啓增梁簡文帝謝東宫賜柿啓懸霜照采凌冬挺潤甘清玉露味重金液雖復安邑秋獻靈關晚實無以匹此嘉名方兹擅美文散句增梁昭眀太子七啓鴻􅏄若瓜五言古詩增宋孔平仲詠無核紅􅏄林中有丹果壓枝一何稠為􅏄已軟美嗟爾骨亦柔風霜變顔色雨露如膏油大哉造化心于爾何綢繆荆筐載趨市價賤良易求剖心無所有入口頗相投為栗外屈強老者所不收為棗中亦剛飼兒戟其喉衆言咀嚼快惟爾無所憂排羅置前列圓熟當高秋且以悅一時長久豈暇謀咄哉潰爛速棄擲將誰尤七言古詩原唐韓愈遊青龍寺呈崔大補闕秋灰初吹季月管日出卯南暉景短友生招我佛寺行正值萬株紅葉滿光華閃壁見神鬼赫赫炎官張火傘然雲燒樹大實駢金烏下啄赬虬卵魂翻眼倒忘處所赤氣沖融無間斷有如流傳上古時九輪照燭乾坤旱二三道士席其間靈液屢進玻璃碗忽驚顔色變韶稚却信靈仙非怪誕桃源迷路竟茫茫棗下悲歌徒纂纂前年嶺隅鄉思發躑躅成山開不算去嵗羈帆湘水眀霜楓千里隨歸伴猿呼鼯嘯鷓鴣啼側耳酸腸難濯浣思君攜手安能得今日相從敢辭懶由來鈍騃寡參尋况是儒官飽間散惟君與我同懷抱鋤去陵谷置平坦年少得途未要忙時清諫疏尤宜罕何人有酒身無事誰家多竹門可欵須知節候即風寒幸及亭午猶妍暖南山逼冬轉清瘦刻畫圭角出崖窽當憂復被氷雪埋汲汲來窺戒遲緩五言律詩增宋張蘊朱􅏄慈恩分種逺駢實渥如丹垂野華星大然雲火樹寒蟹螯徴有忌猩血訝難摶七絶雖堪賞無勞把核鑽原楊萬里謝人惠􅏄紅葉曽題字烏椑昔擅場凍乾千顆蜜尚帶一林霜核有都無底吾衰喜細嘗暫無瓊玖句報惠不相當五言絶句增唐劉禹錫咏紅􅏄子曉連星影出晚帶日光懸本因遺採掇翻自保天年詩散句增梁庾仲容發葉臨層檻翻英糅花藥風生樹影移露重新枝弱苑朱正蔥翠梁烏未銷鑠原古詩色勝金衣美甘逾玉液清增唐韓愈霜天熟􅏄栗收拾不可遲白居易􅏄樹緑隂合王家庭院寬張籍園紅􅏄葉稀鄭谷􅏄繁和葉紅元成廷圭􅏄因風落早唐皮日休客省蕭條􅏄葉紅宋蘇軾􅏄葉滿庭紅顆秋詞原宋僧仲殊西江月味過華林芳蒂色兼陽井沉朱輕勻綘蠟裹團酥不比人間甘露神鼎十分火棗龍盤二寸紅珠清含氷蜜洗雲腴只恐身輕飛去别録增尚書故實鄭廣文學書而病無紙知慈恩寺有柿葉數間屋遂借僧房居止日取紅葉學書嵗久殆遍後自寫所製詩并畫同為一卷封進玄宗御筆書其尾曰鄭虔三絶原傳燈録溈山禪師與仰山遊行鳥銜紅􅏄葉墜前仰山洗淨與溈山分半增東坡集韓退之青龍寺詩終篇言赤色莫識其故嘗見小説鄭虔寓青龍寺乏紙取􅏄葉書之九月􅏄葉赤色退之詩乃謂此也夢溪筆談木中有文多是􅏄木治平初杭州南新縣民家析􅏄木中有上天大國四字豫親見之書法絶類顔真卿極有筆力國字中間或字仍挑起作尖口全是顔筆知其非偽者其橫畫即是橫理斜畫即是斜理其木直剖偶當天字中分而天字不破上下兩畫并一腳皆橫挺出半指許如木之節以兩木合之如合契焉春渚紀聞晉江尤氏其鄰朱氏圃中有􅏄木高出屋上一夕雷震中裂木身若以濃墨書尤家二字連屬而上不知其數至於木枝細者破視亦隨枝之大小成字尤氏乞得其木作數百假分遺好事字體帶草徑健如王會稽書朱氏後以其圃歸尤氏云種樹書􅏄樹接桃枝則為金桃􅏄子接及三次則全無核原製用烘􅏄用生􅏄置器中自然紅熟澀味盡去其甘如蜜如火烘成非以火烘也醂􅏄置􅏄於水中數日即熟但性冷亦有鹽藏者有毒又有用灰汁澡三四度去汁著器中十餘日即可食但不宜治病烏􅏄火薰乾者􅏄糕用糯米一斗乾􅏄五十同搗成粉如乾煮棗泥和拌之蒸食佳􅏄餅大􅏄去皮捻扁日曬夜露至乾納甕中待生霜取出一名白􅏄又名􅏄花􅏄霜即􅏄餅所出霜也乃􅏄中精液入肺病上焦藥尤佳附録椑􅏄原椑􅏄一名漆􅏄一名緑􅏄一名青椑一名烏椑一名花椑一名赤棠􅏄乃􅏄之小而卑者生江淮宣歙荆襄閩廣諸州雖熟亦深緑色大如杏味甘可生啖服丹石人宜之而人弗之貴搗碎浸汁謂之􅏄漆可染罾扇諸物彚考增廣志梁侯園有烏椑八稜大如酒盞西京雜記上林苑有青椑赤葉椑烏椑宜都出大椑集藻賦散句增晉潘嶽間居賦梁侯烏椑之􅏄宋謝靈運山居賦椑􅏄被實于長浦七言絶句原宋劉子翬秋林黃葉晚霜嚴熟蒂甘香未得兼火傘虬珠浪褒拂風標却似色中黔附録軟􅏄原軟􅏄一名㮕棗本草云千金方作軟棗其形似棗而軟也廣志云㮕棗小􅏄也肌細而厚少核可以供御一名梬棗一名牛奶􅏄古今注云牛奶􅏄即軟棗一名君遷子司馬光名苑云君遷子如馬奶即今牛奶􅏄也一名丁香􅏄一名紅藍棗本草云生海南樹高丈餘子中有汁如乳汁甜美其木類􅏄而葉長但結實小而長乾熟則紫黑色一種小圓如指頭大者味尤美其樹接􅏄甚佳彚考增西京雜記上林苑有梬棗北夢瑣言晉朝趙令公瑩家有㮕棗婆娑異常四遠俱見望氣者曰此家有登宰輔者不在其身在其子孫後令公由太原大拜附録蕃􅏄原蕃􅏄一名六月􅏄莖似蒿高四五尺葉似艾花似榴一枝結五實或三四實一樹二三十實縛作架最堪觀火傘火珠未足為喻草本也來自西蕃故名木瓜花附見原木瓜一名楙爾雅云楙木瓜注云木實如小瓜酢而可食本草云木瓜之名取此義也一名鐵腳梨清異録云木瓜性益下部若腳膝筋骨有疾者必用焉故方家號為鐵腳梨樹如奈叢生枝葉花俱如鐵腳海棠可種可接可以條壓葉光而厚春末開花紅色微帶白作房實如小瓜或似梨稍長皮光色黃上微白如著粉津潤不木者為木瓜香而甘酸不澀食之益人醋浸一日方可食生不堪噉處處有之山隂蘭亭尤多而宣城者為佳本州以充土貢故有宣州花木瓜之稱西洛木瓜味和美至熟青白色入藥絶有功勝宣州者味淡性酸溫無毒去濕和胃強筋骨治腳氣霍亂大吐下轉筋不止枝葉根皮煮汁飲並止霍亂吐下轉筋療腳氣枝作杖利筋脈核治霍亂煩燥氣急花治面黑粉滓彚考原詩衛風投我以木瓜報之以瓊琚增孔叢子孔子曰吾於木瓜見苞苴之禮行晉宫閣名華林園木瓜五株廣志木瓜子可藏枝可為數號一尺百二十節水經注魚復縣多木瓜樹大者如甒三國典略齊孝昭北伐庫莫奚至天池以木瓜灰毒魚眀皇雜記元獻皇后思食酸味眀皇以告張説因進經袖出木瓜以獻妝樓記木瓜粉詩曰良人為漬木瓜粉遮却紅腮交午痕清異録假文昌既貴竭財奉身晚年尤甚以木瓜益腳膝銀稜木瓜胡樣桶濯足蓋用木瓜樹解合為桶也唐語林崔涓守杭州湖上飲餞客有獻木瓜者有中使袖歸曰禁中未嘗有此宜進於上頃之解舟而去守懼得罪欲輟飲官妓作酒紏者白守某度木瓜經宿必委中流也會送者還云果潰爛棄之矣守異其言召問之曰此物芳脆易損必不能入獻守取香錦賚之埤雅諺曰梨百損一益楙百益一損投人之道宜有以益之而報人則欲堅久故詩曰投我以木瓜報之以瓊琚圖經本草宣人種蒔木瓜遍滿山谷始實成則簇紙花黏於上夜露日烘漸變紅色其文如生故有宣州花木瓜之稱花經木瓜七品三命瓶花譜木瓜九品一命方輿勝覽天台石橋梁既峭危下臨絶澗過者心悸石罅有木瓜華時有蛇盤糾至實落供大士乃去號為護聖瓜陵陽集詩注木瓜園入折山數里供進后方敢賣土人取瓜埋其半於沙中以紙鏤花貼上以溪水灑之日曬乃紅集藻賦增宋何承天木瓜賦美中州之佳樹表間冶之麗姿結靈根以誕秀傾朝日以揚輝擢叢柯之冉冉布翠葉而葳蕤惟兹木之在林亦超類而獨劭方朝華而繁實比沙棠而有耀當大夏之方隆愧微幹之纖撓豈隱朴以幸全固呈才而不效離衆用而獲寧永端已以勵操願佳人之豫投思同歸以托好顧衛風之攸珍雖瓊琚而匪報五言古詩增宋梅堯臣次韻和王尚書答贈宣城花木瓜十韻百果各甘酸或由人所植木瓜聞衛詩贈好非玉色投此瓊玖報蓋重車馬飾貴賤今既殊凌紙字翕赩一一如眀珠自得見安格復何備國風庶亦見王澤捧之為重賜誦已乃忘食幸資藥品用少助宣調力南土加文章中州異肥瘠公將和鼎餗微意願尋繹張舜民商州楚地户宛在江漢偏草木已漸苞果實尤可憐木瓜大如甒橙橘家家懸隔崖有宿葉黃紫凝霜煙高秋萬嶂出一望通鄖川都邑雖僻陋來者多名賢七言古詩增宋陸遊或遺木瓜有雙實者香甚戲作宣城繡瓜有竒香偶得並蒂置枕傍六根互用亦何常我以鼻嗅代舌嘗五言律詩增唐劉禹錫令狐相公見示題洋州崔侍郎宅雙木瓜花頃接侍郎同舍陪宴樹下吟玩來什輒成和章金牛蜀路逺玉樹帝城春榮耀登華館逢迎欠主人簾前疑小雪牆外麗行塵來去皆回首情深是德鄰七言律詩增眀丘濬謝送木瓜經霜著雨玉枝疏除却宣城總不如久入神農為藥品曾從孔子見苞苴味涵玉液酸仍澀囊蹙金砂實不虛深感故人相贈與此情何以報瓊琚五言絶句增宋范成大木瓜沉沉黛色濃糝糝金沙絢却笑宣州房競作紅妝面題趙昌木瓜花秋風魏瓠實春雨胭脂花綵筆不可寫滴露勻朝霞七言絶句增唐劉言史看山木瓜花柔枝濕艷亞朱闌暫作庭芳便欲殘深藏數片將歸去紅縷金針繡取看裛露凝氛紫豔新千般婉娜不勝春年年此樹花開日出盡丹陽郭裏人權德輿木瓜花晝漏沉沉倦鎖闈西園東觀閲芳菲繁花滿樹似留客應為主人休浣歸宋張舜民木瓜古言疾癘由卑濕木實能醫見藥書有力與人消患難無心望爾報瓊琚木瓜花簇簇紅葩間緑荄陽和間暇不須催天教爾艷足竒絶不與夭桃次第開元牟巘四安道中所見木瓜已過折山來黃帕封林未敢開想見白沙紅照裏繡紋磊落見竒瑰詩散句增唐李白客心自酸楚况對木瓜山宋梅堯臣大實木瓜熟壓枝常畏風楊萬里天下宣州花木瓜日華沾液繡成花詞增宋王采蝶戀花暈緑抽芽新葉鬬掩映嬌紅脈脈羣芳後京兆畫眉樊素口風姿别是閨房秀新篆題詩霜實就挾得瓊琚心事偏長久應是春來初覺有丹青傳得厭厭瘦别録原種法秋社前後分其條移栽次年便結子勝春栽者製用木瓜性脆可蜜漬為果去子蒸爛搗泥入蜜與薑作煎冬飲尤佳木瓜最療轉筋如病此但呼其名及土上作木瓜字即愈凡使木瓜勿犯鐵器銅刀削去硬皮並子切片曬乾黃牛乳拌蒸從已至未待如膏乃曬用會典中宣州貢烏爛蟲蛀木瓜入御藥局取其陳久無木氣也木瓜不宜多食損齒及骨木桃木李俱可煎可糕羅天益寶鑑云劉太保日食蜜煎木瓜三五枚同伴數人皆病淋以問天益天益曰此食酸所致也但不食則已木瓜醬木瓜十兩去皮細切以湯淋浸加薑片一兩甘草二兩紫蘇四兩鹽一兩每用些少泡湯沉井中俟極冷飲之增齊民要術欲啖者截著熱灰中令萎蔫洗淨以苦酒頭汁蜜之可案酒食蜜封藏百日乃食之甚美先切去皮煮令熟著水中車輪切百瓜用三升鹽蜜一斗漬之晝曝夜內汁中取令乾以餘汁蜜藏之亦同濃粳汁也清供録木瓜渴水木瓜不計多少去皮穰核取淨肉一斤為率切作方寸大薄片先用蜜三斤或四五斤於砂石銀器內慢火熬開濾過次入木瓜片同前如滚起泛沫旋旋掠去煎兩三箇時辰嘗味如酸入蜜須要甜酸得中用匙挑出放冷器內候冷再挑起其蜜稠硬入絲不斷者為度本草衍義木瓜得木之正人以鉛霜或胡粉塗之則失酢味且無滓蓋受金之制也附録榠樝原榠樝一名蠻樝一名瘙樝一名木李一名木梨木葉花酷類木瓜但比木瓜大而色黃李時珍曰乃木瓜之無重蒂者也彚考增詩衛風投我以木李報之以瓊玖爾雅翼齊武帝幸丹陽羣臣宴飲王敬則執榠樝以刀子削之别録增爾雅翼宛陵人植木瓜者亦就樝木上接之得樝之餘氣則澀而不美御定佩文齋廣羣芳譜卷五十八
