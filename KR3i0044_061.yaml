body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十九果譜安石榴榴花别見花譜原安石榴種出安石國故名詳見花譜一名若榴廣雅云若榴石榴也丹實垂垂若贅瘤也一名金罌筆衡云吳越王錢鏐改榴為金罌一名金厖湧幢小品云杭越之間呼石榴為金厖蓋避錢鏐諱也一名天漿酉陽雜爼云李衛公言石榴甜者謂之天漿有甜酸苦三種單葉者旋開花旋結實花杔即榴不結者杔尖小千葉者不結實甜者甘溫澀無毒可食潤燥制三尸蟲理乳石毒但性滯戀膈多食生痰損肺黑齒服食家忌之酸者性溫澀無毒兼收斂之氣只堪入藥陳久更良榴實圓如毬頂有尖瓣大者如杯皮赤色有黑斑點皮中如蜂窠有黃膜隔之子如人齒白者似雪淡紅者似水紅寶石紅者如硃砂淡紅潔白者味甘紅者味酸秋後經霜則實自裂有富陽榴實大者如碗海榴樹僅二尺栽盆中結實亦大直垂至盆堪作美觀黃榴結實甚多最易傳種河隂榴瑣碎録云河隂出榴名三十八中間止有三十八子也增酉陽雜俎南詔石榴皮薄如藤紙味絶于洛中本草水晶榴子白瑩徹如水晶味亦甘苦石榴抱朴子云出積石山或云即山石榴也山石榴形頗類榴而小不作房生青齊間甚多蜜漬以當果甚美彚考原宋書符瑞志晉安帝隆安三年武陵臨沅獻安石榴一蒂六實增宋書張暢傳孝武鎮彭城暢為安北長史魏太武遣求甘蔗安石榴暢曰石榴出自鄴下當非彼所乏北史魏收傳安德王延宗納趙郡李祖收女為妃後帝幸李宅宴而妃母宗氏薦二石榴於帝前問諸人莫知其意帝投之收曰石榴房中多子王新婚妃母欲子孫衆多帝大喜詔收卿還將來仍賜收美錦二匹西京新記上林苑有安石榴十株原祭儀秋嘗果以梨棗奈安石榴增拾遺記吳主以潘夫人遊昭宣臺志意幸愜既盡酣醉唾於玉壺中使侍婢瀉於臺下得火齊指環即挂石榴枝上因其處起臺名曰環榴臺述異記瀨鄉老子祠有紫石榴原洛陽伽藍記白馬寺在西陽門外三里亰師語曰白馬甜榴一實直牛鄴中記石虎苑中有安石榴子大如盂碗其味不酸增酉陽雜俎梁大同中東州後堂石榴皆生雙子大食勿斯離國石榴重五六斤劇談録武宗朝術士金陵許元長善變幻武宗謂之曰先朝眀崇儼取羅浮山甘子萬里往來止於旬日東都當進石榴時已熟矣卿今日當致十顆元長奉詔而出及旦寢殿始開金盤貯石榴致於御榻俄有使奉進亦以所失之數上聞靈驗變通皆如此類北戶録鄭虔云石榴堪作胭脂睿宗女代國公主常為之棄其實於禁中叢生成林海録碎事邵武郡庭有石榴一株士人視所實之數以為登科之信熙寧庚戌歲有雙實於木末者又有附枝而雙實者是嵗葉祖洽上官均名在一二何與京兄弟同榜祖洽有詩曰已分桂葉爭雲路不負榴花結露枝蓋謂此也本草安石榴有酸淡兩種道家謂之三尸酒云三尸得此果則醉澄懷録郭文在山間有石榴楊梅為樵牧所傷文賣簪沽酒以澆花樹人問之曰為二子洗瘡止痛學圃餘疏安石榴無如京師致之南方多不活即活多化為叢狀不若求富陽種種之實大子綻即不甘亦足供玩原花史石崇園有石榴名石崇榴集藻賦增晉潘尼安石榴賦并序安石榴者天下之竒樹九州之名果是以屬文之士或敘而賦之蓋感時而騁思覩物而興辭余遷舊宇爰造新居前臨曠澤却背清渠實有斯樹植於堂隅華實並麗滋味亦殊可以樂志可以充虛朱芳赫奕紅萼參差含英吐秀乍含乍披遙而望之煥若隋珠耀重川詳而察之灼若列宿出雲間湘涯二后漢川遊女攜類命儔逍遙避暑托斯樹以棲遲遡祥風而容與爾乃擢纖手兮舒皓腕羅袖靡兮流芳散披緑葉兮修條綴朱華兮弱幹豈金翠之足珍實兹葩之可玩商秋授氣收華斂實千房同蒂十子如一繽紛磊落垂光耀質滋味浸液馨香流溢張載安石榴賦有若榴之竒樹肇結根於西海仰青春以啓萌晞朱夏以發采揮光垂緑擢幹曜鮮熻若羣翡俱棲爛若百枝並燃煥乎郁郁焜乎煌煌仰映青霄俯燭蘭堂似西極之若木譬東谷之扶桑于是天回節移龍火西夕流風晨激行露朝白紫房既熟頳膚自坼剖之則珠散含之則氷釋張協安石榴賦考草木於方志覽華實於園疇窮陸産於包貢嗟英竒於若榴耀靈葩於三春綴霜滋於九秋爾乃飛龍啓節揚飈扇埃含和澤以滋生鬱敷萌以挺栽傾柯逺擢沉根下盤繁莖篠密豐幹林攢揮長枝以揚緑披翠葉以吐丹流暉俯散回葩仰照爛若百枝並燃爀如烽燧俱燎皎如朝日晃若籠燭晞絳綵於扶桑接朱光於若木爾乃赬萼挺蒂金牙承蕤蔭佳人之玄髻發窈窕之素姿遊女一顧傾城無鹽化為南威于是天漢西流辰角南傾芳實磊落月滿虧盈爰採爰收乃剖乃拆內憐幽以含紫外滴瀝以霞赤柔膚氷潔凝光玉瑩璀如氷碎泫若珠迸含清冷之溫潤信和神以理性應貞安石榴賦并序余往日職在中書時直廬前有安石榴樹枝葉既盛華實甚茂為之作賦挹微露以鮮采承輕風而動葩南拂隂簷北扇陽阿其旁則有大厦崇房重廊髙廡皇籍帝典圖書之府時移節變大火西旋丹葩結秀朱實星懸膚坼理阻爛若珠駢潘嶽河陽庭前安石榴賦仰天路而髙睇顧鄰國以相望位莫微於宰邑館莫陋於河陽雖小縣陋館聊可以遊實有嘉木曰安石榴修條外暢榮幹內樛扶疏偃蹇冉弱紛柔于是暮春告謝孟夏戒初新莖擢潤膏葉垂腴曽華曄以先越含榮鵑其方敷丹暉綴於朱房緗菂點乎紅鬚煌煌煒煒熠爍委纍似琉璃之棲鄧林若珊瑚之映緑水光眀磷爛含丹耀紫味滋芳神色麗瓊蘂遙而望之煥若隨珠耀重淵詳而察之灼若列星出雲間十房同膜千子如一御渴療飢解酲止疾既乃攢乎狹庭載厄載褊土階無等肩牆惟淺壁衣蒼苔瓦被駁蘚處悴而榮在幽彌顯其華可玩其實可珍羞於王公薦於鬼神豈伊仄陋用渝厥真果猶如之而况於人宋梅堯臣矮石榴樹子賦并序襄城縣庭下生矮石榴往來者異之豫為作賦寫其狀因以自勵云有矮石榴其髙倍尺中訟庭儷戒石訪諸走胥云非封植忽此生榮三傳歲歷密葉如蓋繁條如織萎蕤下垂疲軟無力緗苞貯露纍纍仄仄下人俯視顛本可識雀愧卑棲而不肯集兮故啾唧以矯翼偃偃盤盤若屈若鬱紉紉結結非曲非直幹不足攀隂不足息夫何挺質之可惑耶意為異與為妖與人以為異我不知其異曰殊衆人之類類人以為妖我不知其妖曰乖衆木之翹翹然而不生樊圃臺榭遊觀之所産兹堂下其有以警而有以覩因形取義庶將有補當革蔓衍之多枝無若軟柔之不舉勿俾苞苴之流行勿使吏氓之輕侮勿淟涊以自抑勿猶豫而失處勿闒茸以接卑勿上下之不撫夫如是則異也妖也固弗取維戒懼斯主五言古詩增梁元帝咏石榴塗林未應發春暮轉相催燃燈疑夜火連珠勝早梅西域移根至南方釀酒來葉翠如新翦花紅似故栽還憶河陽縣映水珊瑚開王筠摘安石榴贈劉孝威中庭有竒樹當戶發華滋素莖表朱實緑葉厠紅蕤既標太沖賦復見安仁詩宗生仁夀殿族代河陽湄有美清淮北如玉又如龜退書寫蟲篆進對多好辭我家新置側可求不難識相望阻盈盈相思滿胸臆髙枝為君採請寄西飛翼原宋梅堯臣詠石榴榴枝苦多雨過熟拆已半秋雷石罌破曉日丹砂爛任從雕俎薦豈待霜刀判張騫面使時蒟醬同歸漢增梅堯臣陽武王安之寄石榴安榴若拳石中蘊丹砂粒剖之珠落盤不待鮫人泣舊友大河濵作宰實畿邑嚴霜百果熟為贈忽我及始時童稚嬌爭取猴猿集老夫所食微何暇更收拾聊答君意勤作詩恨短澀元朱德潤題石榴雨餘鳴蜩歇衆緑鬱隂翳綃囊蹙紅巾光熖當林麗映日萼先皺臨風葉如綴秋深薦紅實顆裂排皓齒秪應乘槎客天上得先味七言古詩增唐皮日休石榴歌蟬噪秋枝槐葉黃石榴香老愁寒霜流霞包染紫鸚粟黃蠟紙裹紅刳房玉刻氷壺含露濕斕斑似帶湘娥泣蕭娘初嫁嗜甘酸嚼破水精千萬粒莊布石榴歌玳瑁殼皴枝妸娜馬牙硝骨綿敷裹霜風擊破錦香囊鸚鵡啄殘紅豆顆美人擎在金盤腹錯認海螺斑碌碌滿口含嘗瓊液甘一堂齒冷敲寒玉金元格從趙敷道覓石榴仙人囊中五色露得種昔與蒲桃俱猩猩染花開五月已覺秋實懸庭除張園一酸齒欲裂君家兩株蜜不如竹馬兒童厭梨栗緑囊聊為剝紅珠五言律詩增宋鄭獬石榴髙枝重欲折霜老拆丹膚試剖紫金碗滿堆紅玉珠根雖傳大夏種必近仙都題作江南信人應賤橘奴七言律詩增宋楊萬里石榴深著紅藍染暑裳啄成紋玳敵秋霜半含笑裏清氷齒忽綻吟邊古錦囊霧縠作房珠作骨水晶為粒玉為漿劉郎不為文園渴何苦星槎逺取將原方廣德石榴塗林疏樹自離離入眼紅膚總不遺若為連珠過沈約何來新築伴潘尼金房半坼珠駢落霜葉平翻玉並欹還記葡萄槎上種折來那不稱同時五言絶句增宋晏殊石榴開從百花後占斷羣芳色更作琴軫房輕盈瑣窗側蘇軾和子由岐下石榴風流意不盡獨自送殘芳色作裙腰染名隨酒盞狂范成大題石榴日烘古錦囊露浥紅瑪瑙玉池咽清肥三彭迹如掃明王榖祥題石榴榴房拆錦囊珊瑚何齒齒試展畫圖看憑將頌多子陳淳石榴未摘露前實先看雨後花名應出西海顔豈論東家蠟蒂團赬玉文英簇絳綃秋來結佳果珍味不須調七言絶句增唐李商隱石榴榴枝婀娜榴實繁榴膜輕眀榴子鮮可羡瑤池碧桃樹碧桃紅頰一千年原宋劉子翬石榴庭榴結實墊芳叢一夜飛霜染茜容萬子同苞無異質金房玉隔謾重重增陸遊山店賣石榴取以薦酒山色蒼寒雲釀雪旗亭據榻興悠哉麯生正欲相料理喚取風流醋醋來眀沈周石榴張騫帶得西來種中祕千珍及萬珍一箇臭囊藏不盡又從身外覆精神詩散句增宋宋祁不競灼灼花只效離離實眀沈周纍纍枝上實滿腹飽珠璣陳淳結果多佳子甘酸合鼎調宋宋祁煙滋黛葉千條困露裂星房百子均石延年盡日攜樽芳樹下何須佳醖得塗林張舜民人拾鳥銜真可惜皮開子落不論錢陸遊半吐山榴看著子新來梁燕見將雛宋謝朓珠榴拆且紅陳江總庭榴剖朱實唐王維夕雨紅榴拆韓愈味美蔗為漿潛苞絳實拆宋邵雍久雨榴自罅歐陽修晴林紫榴拆黃魯直紅榴罅玉房原唐元稹海榴紅綻錦窠勻增唐韋莊誰家樹壓紅榴拆宋錢惟演蜜房初滿若榴紅陸遊露重榴房初拆罅風拆安榴子滿房别録增梁書海南傳頓遜國有酒樹似安石榴取汁停甕中數日成美酒記事珠李漢碎胡瑪瑙盤盛送王莒曰安石榴莒見之不疑既食乃覺東坡集回先生過湖州東林沈氏飲醉以石榴皮書其東老菴之壁云西鄰已富憂不足東老雖貧樂有餘白酒釀來因好客黃金散盡為收書坡聞而次其韻凄涼雨露三年後髣佛塵埃數字餘至用榴皮緣底事中書君豈不中書志雅堂雜抄凡碾工描玉用石榴皮汁則見水不脫湧幢小品金荆榴樹色如真金密緻而文采盤蹙如美錦細膩而香隋時朱寬征南得數十片作枕及案面沉檀所不及嫁榴石榴不結子者以石塊或枯骨安樹義間或根下則結子不落原藏榴選大者連枝摘下安新瓦缸內以紙十餘重密封蓋之栗增本草栗説文作栗從􅒾音條象花實下垂之狀也佛書名篤迦木髙二三丈極類櫟四月開花青黃色長條似胡桃花實有房彚大者若拳小者若桃李原栗苞生外殼刺如蝟毛其中著實或單或雙或三四少者實大多者實小實有殼紫黑色殼內膜甚薄色微紅黑外毛內光膜內肉外黃內白八九月熟則苞自裂而實墜宣州及北地所産小者為勝陸璣詩疏曰栗五方皆有周秦吳揚特饒惟漁陽及范陽生者甜美味長他方不及本草圖經云兖州宣州最勝燕山栗小而味最甘蜀本圖經云板栗錐栗二樹皆大茅栗似板栗而細如橡子其樹雖小葉亦不殊但春生夏花秋實冬枯為異綱目云即爾雅所謂栭栗也一名栵栗可炒食之衍義云湖北有一種旋栗頂圓末尖即榛栗象榛子形也增西京雜記上林苑栗四侯栗榛栗瑰栗嶧陽栗嶧陽都尉曹龍所獻大如拳唐本草桂陽有莘栗叢生實大如杏仁皮子形色與栗無異但小耳又有奧栗皆與栗同子圓而細惟江湖有之或云即莘也客燕雜記京師佳果栗三霜前栗盤古栗鷹爪栗原栗之為果種類頗多總之味鹹氣溫無毒主益氣厚腸胃補腎氣治腰腳無力破痃癖理血當中一子名栗楔治血更效生則動氣熟則滯氣唯曝乾或火煨汗出食之良百果中最有益者小兒不宜多食難尅化患風水病者忌以味鹹也彚考原詩鄘風樹之榛栗增鄭風東門之栗原秦風隰有栗增小雅山有嘉卉侯栗侯梅禮記內則栗曰撰之疏栗蟲好食數數布陳撰省視之儀禮士冠禮再醮兩籩栗脯聘禮夫人使下大夫勞以二竹簠方玄被纁裏有蓋其實棗蒸栗擇兼執之以進賔受棗大夫二手授栗原論語周人以栗疏凡建邦立社各以其土所宜之木周都豐鎬宜栗增史記蘇秦傳秦説燕文侯曰南有碣石雁門之饒北有棗栗之利民雖不佃作而足於棗栗矣此所謂天府也貨殖傳燕秦千樹栗其人與千户侯等原後漢書馬韓國傳馬韓出大栗如梨宋書劉秀之傳秀之大眀元年徴為右衛將軍眀年遷丹陽尹先是秀之從叔穆之為丹陽尹與子弟於廳事上飲宴秀之亦與焉廳事有一穴穆之謂子弟及秀之曰汝等試以栗遙擲此柱若能入穴後必得此郡諸子並不能中唯秀之獨入焉梁書沈約傳約嘗侍宴豫州獻栗徑寸半帝竒之問曰栗事多少與約各疏所憶約少帝三事出謂人曰此公護前不讓即羞死帝以其言不讓欲抵其罪徐勉固諫乃止王泰傳泰幼敏悟年數歲時祖母集諸孫姪散棗栗于牀羣兒皆競之泰獨不取問其故對曰不取自當得賜由是中表異之增南史蕭琛傳琛經預御筵醉伏上以棗投琛琛乃取栗擲上正中靣時御史中丞在坐帝動色曰此中有人不得如此豈有説耶琛即答曰陛下投臣以赤心臣敢不報以戰栗宋史禮志仁宗景祐三年禮官宗正請每歲冬孟月羞以果以栗蔬以薯藇原宋史孝義傳易延慶奉母至孝母存日喜食栗乃種二栗樹於墓前經年其樹連理三年合抱生栗盈枝人以為孝感所致增遼史蕭韓家奴傳韓家奴先為右通進典南亰栗園後遷天成軍節度使徙彰愍宮使帝與語才之命為詩友嘗從容問曰卿居外有異聞乎韓家奴對曰臣惟知炒栗小者熟則大者必生大者熟則小者必焦使大小均熟始為盡美不知其他帝大笑山海經銅山葛山賈超之山其木多栗夏小正八月栗零傳零也者降也降而後取之也尚書逸篇西社惟栗原范子栗出三輔莊子莊周遊乎雕陵之樊覩一異雀自南方來感周之顙而集於栗林呂氏春秋果之美者有箕山之栗增神異經東方荒中有木名曰栗其殼徑三尺三寸殼刺長丈餘實徑三尺殼亦黃其味甜又東北荒中有木髙四十丈葉長五尺廣三尺名曰栗其實徑三尺二寸其殼赤其肉黃白味甜食之令人短氣而渴原説苑田饒曰果園梨栗後宮婦人托以相摘而士曽不得一嘗增東方朔傳朔曰王公啖兒以丹栗霞漿兒食之既多飽悶幾絶乃飲玄天黃露半合即醒原三輔黃圖三秦記云御宿園出栗十五枚一升會稽先賢傳光武詔嚴遵詣行在蜀郡獻栗橘上使公卿各以手所及取之遵獨不取上問故遵曰君賜臣以禮臣奉君以恭今賜無主臣是以不敢取增盧諶祭法春秋冬祠皆用栗晉宮閣名華林園中栗一株侯栗六株廣志栗有關中侯栗大如雞子梁州獻栗徑寸半越中栗大如拳鄴中記鄴中産巨栗脫其殼可以為杯原豫章古今記宋度拜定陵令縣人杜伯夷清髙不仕度與談論設棗栗而已增水經注汝水灣中有地數頃上有栗園栗小殊不並固安之實也然歲貢三百石以充天府水渚即栗州也樹木髙茂望若屯雲積氣矣林中有栗堂射埻甚間敞牧宰及英彥多所遊薄括地志漢武帝果園栗味甘而小不如三秦記所云固安之栗天下稱之為御栗因有栗園地理志諸暨産如拳之栗華山記西山麓中有栗林藝植以來蕭森繁茂酉陽雜俎李衛公一夕甘子園會客盤中有猴栗無味陳堅處士云虔州南有漸栗形如素核杜陽雜編滄浪洲有碧棗丹栗皆大如拳原續仙傳道人殷七七名文祥能造逡巡酒開頃刻花嘗一官僚召飲取栗散於官妓皆聞異香唯笑七七者栗綴於鼻不可脫但聞臭須臾狂舞粉黛狼籍共為陳謝始墜謝玄卿遇神仙設鳳冠栗增清異録晉王嘗窮追汴師糧運不繼蒸栗以食軍中遂呼栗為河東飯西溪叢語杜甫詩云嘗果栗皺開或作雛字殊不可解集韻皺側尤切革紋蹙也漢上題襟周繇詩云開栗弋之紫皺貫休云新蟬避栗皺又云栗不和皺落即栗蓬也青箱雜記王文正公旦與楊文公億為空門友楊公謫汝州公適當軸每音問不及他事唯談論真諦而已余嘗見楊公親茟與公云山栗一稱聊表村信蓋汝惟産栗而億與王公忘形交以一稱栗遺之斯亦昔人雞黍縞紵之意乎老學菴筆記故都李和煼栗名聞四方他人百計效之終不可及紹興中陳福公及錢上閣出使至燕山忽有兩人持煼栗各十裹來獻三節人亦人得一裹自贊曰李和兒也五色線王可交棹漁舟入江遇一彩舫有道士七人玉冠霞帔侍從十餘人鬃角雲鬟面前各有青玉盤酒器呼可交上舫命與酒喫侍者瀉酒於尊酒再三不出道士曰酒靈物若得入口當換其骨瀉之不出亦命也一人曰與栗出俄取二栗與之其栗青赤光如棗長二寸許囓之有皮非人間之栗肉脆而甘可交食栗之後絶榖􅏒靜若有神助柝津日記遼於南京置栗園司蕭韓家奴為右通進典南京栗園是也元昌平縣亦有栗園徹里傳戰於昌平栗園是也蘇秦謂燕民雖不耕作而足于棗栗唐時范陽以為土貢今燕京市肆及秋則以餳拌雜石子爆之栗比南中差小而味頗甘以御栗名正不以大為貴也集藻賦增漢蔡雍傷故栗賦并序人有折蔡氏祠前栗者故作斯賦樹遐方之嘉木兮于靈宇之前庭通二門以征行兮夾階除而列生彌霜雪而不凋兮當春夏而滋榮因本心以誕節兮凝育蘖之緑英形猗猗以艷茂兮似翠玉之清眀何根莖之豐美兮將蕃熾以悠長適禍賊之災人兮嗟夭折以摧傷陳陸瓊栗賦四時逸盛百果玄芳緑梅春馥紅桃夏香何羣品之浮脆惟此質之久長外刺同夫拱棘內潔甚于氷霜伏南安而來清列御宿而懸房薦羞則椇榛並列加籩則菱芡同行金盤兮麗色玉爼兮鮮光周人以之戰懼大官稱于柏梁啓增梁庾肩吾謝東宮栗啓查或火成鑽以為屑奈稱煎用曝而成糗未若北燕巨實用奪榮枯南國脯山翻成齒決承恩踴躍對聞喜之河念報屏營問知來之鳥雜言增陳陸玢賦得雜言詠栗貨見珍于有漢木取貴于隆周英肇萌于朱夏實方落于素秋委玉盤雜椒糈將象席糅珍羞文賦散句增漢王褒僮約南安拾栗採橘王逸荔枝賦北燕薦朔濵之巨栗晉左思蜀都賦榛栗罅發魏都賦固安之栗盧育冀州論中山好栗地産不為無珍梁昭眀太子七召汶垂蒼栗七契北燕之栗五言古詩增宋梅堯臣尹陽尉耿傳惠新栗金行氣已徑霜實繁林梢尺素走下𨽻一奩來逺郊中黃比玉質外刺同芡苞野人寒齋會山爐夜火炮梨慚小兒嗜茗憶粗官拋此焉真可貺遽爾及衡茅文同天師攜此種至自上饒逺當時十七樹髙幹寄孤巘蒼蓬蒺藜大紫殼檳榔軟蜀都名果中推之為上選七言律詩增宋蘇轍次韻王適食茅栗相從萬里試南餐對案長思苜蓿盤山栗滿籃兼白黑村醪入口半甜酸久聞牛尾何曽試竊比雞頭意未安故國霜蓬如碗大夜來彈劔似馮歡朱子栗熟樹雜椅桐繼國風莫教林下長蒿蓬共期秋實充腸飽不羡春花轉眼空病起數升傳藥録晨興三咽學仙翁櫻桃浪得銀絲薦一笑才堪發面紅元張雨新栗寄雲林朅來常熟嘗新栗黃玉穰分紫殼開果園坊中無買處頂山寺裏為求來囊盛稍共來禽帖酒薦深宜蘸甲杯首奉雲林三百顆也勝酸橘寄書回七言絶句增宋石介栗園遊困歸來訪栗園栗園老樹再生孫莫驚頭上見髮白拾栗兒童長幾番原蘇轍栗老去自添腰腳病山翁服栗舊傳方客來為説晨興晚三咽徐收白玉漿陸遊夜食炒栗有感齒根浮動欲吾衰山栗炮燔療夜飢喚起少年京輦夢和寧門外早朝時詩散句原唐韓愈霜天熟柿栗收拾不妨遲杜甫羞逐長安社中兒赤雞白狗賭梨栗增宋孫覿綈囊丹果十襲包爆栗飛燼石火敲范成大紫爛山梨紅皺棗總輸易栗十分甜陸遊蝟刺坼蓬新栗熟鵝雛弄色凍醅濃周庾信家童掃栗跗秋林栗更肥原唐杜甫穰多栗過拳山家蒸栗暖韋應物採栗玄猿窟增韓翃霜迎栗罅開張籍秋猿守栗林李洞雲深猿拾栗宋張耒園栗炮還美陸遊霜栗大如拳元方回擘黃新栗嫩原唐杜甫盤剝白鴉谷口栗增皮日休野猿偷栗重窺户宋蘇轍山栗似拳應自飽别録增相玉書黃侔蒸栗種樹書採栗時要得披殘明年其枝葉益茂物類相感志栗得橄欖香原收藏藏生栗法霜後取生栗投水中去浮者餘漉出布拭乾曬少時令無水脈為度先將沙炒乾放冷取無油酒器新罈罐裝入一層栗一層沙約八九分滿用箬葉扎緊掃一淨地將器倒覆其上略以黃土封之弗近酒器可至來春不壞又法栗子一石鹽二斤水泡開浸栗一二宿漉出曬乾同芝麻二石拌勻盛荆囤中永逺不壞食之軟美藏乾栗法霜後取沉水栗一斗用鹽一斤調水浸栗令沒經宿漉起朗乾用竹籃或粗麻布袋挂背日少通風處日搖動一二次至來春不損不蛀不壞種藝齊民要術云栗種而不栽栽雖活尋死栗初熟離苞即於屋內埋濕土中埋須深弗令凍路逺者以革囊盛之停三日以上及見風日則不可作種至二月芽生出而種之芽向上乃生根既生數年不用掌近三年內每到十月常須草裹至二月漸解不裹則易至凍死仍用籬圍之其實方而匾者他日結子豐滿樹髙四五尺取生子樹枝接之製用以兩栗蘸油兩栗蘸水置鍋中周圍更排四十七個濕紙搭蓋慢火燒候有爆聲即熟大栗每個殼底以刀十字畫開底向下逐旋排鍋中以鹽一撮繞鍋撒下蓋定發火候熟取用選底平可作對者二枚一枚香油塗濕底一枚白水塗濕底合作一對置鍋底當中取栗逐旋蓋上多亦不妨將鍋蓋嚴燒一飯頃取出俱酥熟且不黏殼又法入油紙撚一條炒不用鐡鍋尤妙栗炒熟搗爛曬乾磨細每六升新糯米粉四升白沙糖半斤蜜水溲之篩置甑中隨畫開蒸粉熟為度火炙為糕栗木作門關可以逺盜增物類相感志喫栗子於生芽處咬破些吹氣一口剝之皮自脫竹葉與栗同食無柤附録石栗增南方草木狀石栗樹與栗同但生於山石罅間花開三年方結實其殼厚而肉少其味似胡桃仁熟或為羣鸚鵡至啄食略盡故彼人多珍貴之出日南附録天師栗增益部方物略記天師栗本草云張天師學道于此所遺故名生青城山中他處無有也似栗味美惟獨房為異久食已風攣集藻贊增宋宋祁天師栗贊栗類尤衆此特殊味專蓬若橡託神以貴棐原棐本草云其木名文木斐然章采故謂之棐一名柀子本草經有彼子唐本草云彼當從木作柀一名赤果一名玉棐日用本草云土人呼為赤果一曰玉棐一名玉山果生永昌以信州玉山者為佳本地人呼為野杉木大者連抱髙數仞其木有雄雌雄者花而雌者實其木形如柏木理似松細軟堪為器用葉似杉冬月開黃圓花結實如棗核大如橄欖無稜而殼薄黃白色其仁肉白外有一層黑粗衣小而心實者尤佳一樹可下數十斛增爾雅翼柀實去皮殼可生食亦𤐧而收之可以經久本草會編有一種粗棐其木與棐相似但理粗色赤其子稍肥大頂圓不尖新安志休寧縣産棐子出黃山者尤佳雲南志棐子出劒川州者良原味甘平澀無毒治五痔去三蟲輕身眀目煮素羮味更甜美同甘蔗食其滓自軟豬脂炒棐黑皮自脫性熱同鵝肉食令人上壅生斷節風同菉豆食殺人忌火氣集藻五言古詩原宋蘇軾送鄭户曹賦席上果得棐子彼美玉山果粲為金槃實瘴霧脫蠻溪清尊奉佳客客行何以贈一語當加璧祝君如此果德膏以自澤驅禳三彭仇已我心腹疾願君如此木凛凛傲霜雪斫為君倚几滑淨不容刮物微興不淺此贈毋輕擲七言古詩增宋劉子翬答人寄棐老坡文中吼闞聲凛凛常如對英峙琅然諷詠興凌雲瞪若追攀顙流泚玉山妙唱久寂寥可與言詩有我子裁箋逺餉風露新坐我千尺黃山底初挼玄殼出氷霜小嚼清香泛窗几已輕魏帝眤蒲萄肯許唐賢魁緑李極知入口無正味苦淡酸甘各矜美不經真識為品題此物初焉幾不齒青青有用拔蒿萊白粲無酬腐粳粃士懷瓌瑞勿自神邂逅飛沉同一理子才超然會曄然外澤中貞期是似味果固已驅煩邪味道更須淪骨髓葉適蜂兒棐歌平林常棐啖俚蠻玉山之産升金盤其中一樹斷崖立石乳蔭根多歲寒形嫌蜂兒尚粗率味嫌蜂兒少標律昔日取急欲髙比今我細論翻下匹世間異物難並兼百年不許贏栽添餘甘何為滿地澀荔子正復漫天甜浮雲變化嗟俯仰靈芝醴泉成獨往後來空向玉山求坐對蜂兒還想像詩散句增宋梅堯臣棐樹移皆活風霜不變青朝補之博士獨能名玉棐别録原收藏以盛茶舊磁甕收之經久不壞欲種以二月下子榛原榛古作亲本草云亲從辛從木俗作莘者誤生遼東山谷樹髙丈餘子如小栗李時珍曰榛樹低小如荆叢生冬末開花如櫟花成條下垂長二三寸二月生葉如初生櫻桃葉多皺文而有細齒及尖其實作苞三五相黏一苞一實實如櫟實上壯下鋭生青熟褐殼厚而堅仁白而圓大如杏仁亦有皮尖然多空者諺曰十榛九空陸璣詩疏云榛有兩種一種大小枝葉皮樹皆如栗而子小形如橡子味亦如栗枝莖可以為燭詩所謂樹之榛栗者也一種髙丈餘枝葉如水蓼子作胡桃味遼代上黨甚多久留亦易油壞種法與栗同味甘平無毒益氣力實腸胃調中不飢健行甚驗遼東榛軍行食之當糧榛之為利亦大矣彚考增詩弼風山有榛鄘風樹之榛栗曹風鳲鳩在桑其子在榛小雅營營青蠅止于榛大雅瞻彼旱麓榛楛濟濟禮記曲禮婦人之贄椇榛脯修棗栗注榛實似栗而小關中鄜坊正多山海經上申之山灌題之山潘侯之山下多榛楛埤雅詩曰營營青蠅止于樊止于棘止于榛者言圃有樊園有棘山有榛明欲逺而止之彌逺也又曰鳲鳩在桑其子在梅其子在棘其子在榛者蓋先實者梅後實者棘先實者棘後實者榛故其序如此亦其榛卑小于棘棘卑小于梅詩以刺之故每况愈下也爾雅翼説者以榛可為贄為文事楛可為矢為武事是蓋不然夫榛楛皆用之武事説文榛木也一曰菆也菆蓋矢之善者春秋傳所謂致師者左射以菆是也女贄用榛者取榛有臻至之義黃花鎮記黃花鎮有禮鼠色如鼦而毛淺冬時聚榛實為糧於穴中作岐穴貯之若倉囷然多至三斗其榛實皆美好價倍於人所收者山氓多掘取之昌平州志榛出北山黃花鎮者良集藻七言絶句增明吳寬謝屠公送新榛七月遼陽已降霜簪頭落地野榛香三年不到燕山下又喜頻將玉顆嘗附録胡榛子增本草一名阿月渾子一名無名子生西國諸番彚考增酉陽雜俎阿月生西國蕃人言與胡榛子同樹一年榛子二年阿月南州記無名木生嶺南山谷其實狀如榛子波斯呼為阿月渾子松子增本草松實狀如豬心疊成鱗砌秋老則子長鱗裂惟遼海及雲南者謂之海松子馬志曰海松子狀如小栗三角其中仁香美當果食之亦代麻腐食之與中國松子不同蘇頌曰松歲久則實繁中原雖有小而不及塞上者佳好也吳瑞曰松子有南松北松華隂松形小殼薄有香新羅者肉甚香美李時珍曰海松子其樹與中國松樹同惟五葉一叢者毬內結子大如巴豆而有三稜一頭尖爾馬志謂似小栗殊失本體廣志千歲老松子色黃白味似栗可食新羅國記松樹大連抱有五粒子形如桃仁而稍小皮硬有人取而食之味如胡桃浸酒療風彚考增神仙傳趙瞿得癩病重家人送置山中忽見三神人以松子松柏脂各五升賜之告瞿曰此不但愈病當長生耳服半可愈愈即弗廢瞿服之未盡病愈身體強健乃歸家更服之二年顔色轉少肌膚光澤走如飛鳥在人間三百餘年常如童子顔色入山不知所之搜神記偓佺者槐山採藥父也好食松實形體生毛長七寸兩目盡方能飛行逐走馬以松子遺堯堯不暇服松者簡松也時受服者皆三百歲異苑漢末宫人小黃門上墓樹上避兵食松柏實遂不復飢舉體生毛長尺許魏武聞而收養還食榖齒落頭白酉陽雜俎成式修竹里私第大堂前有五鬛松兩根大財如碗甲子年結實味與新羅南詔者不别清異録新羅使者每來多鬻松子有數等玉角香重堂卷御家長龍牙子惟玉角香最竒使者亦自珍之集藻七言絶句增金雷思食松子千嵓玉粒盡長松半夜珠璣落雪風休道東遊無所得歲寒梁棟滿胸中詩散句增唐杜甫風落收松子薛能坐石落松子宋林逋秋階響松子司馬光飯炊松粒細林逋雨敲松子落琴牀别録增物類相感志凡雜色羊肉入松子則無毒松子仁帶皮則不油東坡雜記十月以後冬至以前松實結熟而未落折取并萼收之竹器中懸之風道未熟則不生過熟則隨風飛去至春初敲取其實以大鐵鎚入荒茅地中數寸置數粒其中得春雨自生自採實至種皆以不犯手氣為佳松性至堅悍然始生至脆弱多畏日與牛羊故須荒茅地以茅隂障日若白地當雜大麥數十粒種之賴麥隂乃活須護以棘日使人行視三五年乃成五年之後乃可洗其下枝使髙七年之後乃可去其細密者使大大略如此核桃原核桃一名胡桃一名羌桃博物志云張騫使西域還得胡桃種故以胡羌為名本草胡桃梵書名播師羅酉陽雜俎胡桃仁曰蝦蟇樹髙丈許春初生葉長三寸兩兩相對三月開花如栗花穗蒼黃色結實如青桃九月熟時漚爛皮肉取核內仁為果北方多種之以殼薄仁肥者為佳廣志陳倉胡桃薄皮多肌隂平胡桃大而皮脆急促則碎增味甘氣熱皮澀仁潤治痰氣喘嗽醋心及厲風諸病今往往以之下酒則昔人所云食多動風動痰令人惡心脫鬚睂及同酒多食咯血者妄也或素有痰火積熱者不宜多食耳大抵留皮則消滯去皮則養血潤血微和鹽食更佳能通命門利三焦益氣養血與破故紙為補下焦腎命之要藥彚考增外國志大秦國有棗榛胡桃蓮藕雜果西京雜記上林苑有胡桃出西域晉宮閣名華林園胡桃八十四株荀氏春秋祠制常設用胡桃廣五行記後蜀李雄玉衡十二年扶風人韓豹為太史令雄卒子期立以豹為太傅嘗言於期曰臣今老志在田園欲植胡桃願賜其種期不悟俄而李夀自涪率衆南向襲尅成都廢期自立尚書故實王內史書帖中有與蜀郡守朱書求櫻桃來禽日結藤子又曰胡桃種已成矣學圃餘疏核桃北果而宜山種吾地絶少然亦可種文賦散句增漢孔融與諸卿書多惠胡桃深知篤意原晉紐滔母答吳國夫人書胡桃本生西羌外剛朴內柔甘質似古賢欲以奉貢增潘嶽間居賦三桃表櫻胡之别七言律詩原宋楊萬里謝送胡桃三韓萬里半天松方丈蓬萊東復東珠玉鎖成千歲實氷霜吹落九秋風酒邊腷膊牙車響座上須臾漆櫑空新果新嘗正新暑繡衣使者念山翁别録原本草宋洪邁有痰疾因晚對上遣使諭令以胡桃肉三顆生薑三片卧時嚼服即少飲湯又再嚼如前數即靜卧如旨服之旦而痰消嗽止溧陽洪輯幼子病喘醫以危告其妻夜夢大士令服人參胡桃湯試之喘即定眀日去胡桃皮用之喘復作仍連皮用信宿而愈蓋人參定喘連皮胡桃能斂肺也增素園石譜孫漢陽平生好石秋夕夢一冠蓋士送三石其一深碧色紋理如核桃原種植選平日實佳者留樹上弗摘俟其自落青皮自裂又揀殼光紋淺體重者作種掘地二三寸入糞一碗鋪片瓦種一枚覆土踏實水澆之冬月凍裂殼來春自生下用瓦者使無入地直根異日好移栽也收藏便民圖要以粗布袋盛挂風面處則不膩收松子亦用此法增物類相感志收胡桃不可焙焙則油了胡桃能碎錢附録山胡桃原嶺表録山胡桃底平如檳榔皮厚而堅多肉少仁內殼甚厚須椎之方破此南方出者殊不見佳附録蔓胡桃增酉陽雜俎蔓胡桃出南詔大如扁螺兩隔味如胡桃或言蠻中藤子也銀杏原銀杏一名白果一名鴨腳子本草云葉似鴨腳因以為名宋初始入貢改呼銀杏因其形似杏而核色白也今名白果處處皆有以宣城為盛樹髙二三丈或至連抱可作棟梁葉薄縱理儼如鴨掌面緑背淡二月開花成簇青白色二更開旋即卸落人罕見之一枝結子百十狀如小杏經霜乃熟色黃而氣臭爛去肉取核為果其核兩頭尖中圓大而扁三稜為雄二稜為雌其仁嫩時緑色久則黃其樹耐久肌理白膩術家取刻符印云能召使鬼神氣味甘微苦平澀無毒生食解酒降痰消毒殺蟲熟食溫肺益氣定喘嗽搗汁浣衣去油膩食多壅氣臚脹昏頓三元延夀書言白果食滿千顆殺人昔有歲飢以白果代飯食飽者次日皆死小兒食多昏霍發驚引疳同鰻鱺食患軟風彚考增盧氏雜記唐鄭光宴飲把酒曰某改令身上取果子名云膍臍薛保遜還令云腳杏滿座大笑原詩話總龜京師舊無鴨腳駙馬都尉李文和自南方來移植於私第因而著子自後稍稍蕃多不復以南方為貴增春渚紀聞元豐間禁中有果名鴨腳子者四大樹皆合抱其三在翠芳亭之北歲收實至數斛而托地隂翳無可臨玩之所其一在太清樓之東得地顯曠可以就賞而未嘗著一實裕陵嘗指而加歎以謂事有不能適人意者如此戒圃者善視之而已眀年一木遂花而得實數斛裕陵大悅命宴太清以賞之仍分頒侍從墨客揮犀銀杏葉如鴨腳獨窠者不實偶生及叢生者乃實原湧幢小品浦城縣村中有白果一樹世傳以為仙人擲樹枝於上其枝垂生每年果熟時不生於枝節惟於樹身腫成大塊破之可得二三斗多至石餘實視凡果差小味則同增京口記勝果寺禪堂前銀杏一株巨甚僧云宋植也半塘小志銀杏樹在天王殿前可泉上人房之側本大五抱藤繞修條鱗次鬛張儼如龍甲而體無枯瘁當夏有穠隂可庇十乘余題曰龍樹友人太倉王伯翊讀書寺中愛其婆娑芟除蕪穢而置欄楯焉泰山記五廟前銀杏大者圍三仞火空其中獨一面不枯其上枝葉蔽芾如新植學圃餘疏銀杏樹有大合抱而不實人言樹有雌雄聞亦有法治之則生樹長大秋冬葉純黃間楓林中相錯如繡此植圃中岡上即不實可也原崑山縣志龔猗汴人殿中侍御史扈從髙宗南渡道經崑山貞義里折銀杏一株插地祝曰若此枝得活吾於是居其枝長茂後成大樹繁枝樛屈臃腫如癭如乳者凡七十餘顆相傳為其子孫嗣世之數集藻文散句原元王禎農書絳囊貢御玉碗薦酒其初名價豈減于葡萄安石榴哉五言古詩原宋梅堯臣永叔遺李太博家新生鴨腳子北人見鴨腳南人見胡桃識內不識外疑若橡栗韜鴨腳類緑李其名因葉髙吾鄉宣城郡每以此為勞種樹三十年結子防山猱剝核手無膚特置宫省曺今喜生都下薦酒壓葡萄初聞帝苑夸又復主第褒纍纍誰採掇玉碗上金鰲金鰲文章宗分贈我已叨豈無異鄉感感此微物遭一世走塵土鬢顛得霜毛增梅堯臣鴨腳子魏帝迷逺圖于吳求鬬鴨乃為吳人料重玩志已篋江南有嘉樹修聳入天插葉如欄邊迹子剝杏中甲持之奉漢宫百果不相壓非甘復非酸淡苦衆所狎千里競齎貢何異貴爭喋依韻酬永叔謝豫銀杏去年我何有鴨腳逺贈人人將比鵝毛貴多不貴珍雖少未為貴亦以知我貧至交不變舊佳果幸及新窮坑我易滿分餉猶奉親計料失廣大瑣屑且沉淪何用報珠玉千里來殷勤原歐陽修和聖俞李侯家鴨腳子鴨腳生江南名實未相浮絳囊因入貢銀杏貴中州致逺有餘力好竒自賢侯因令江上根結實夷門陬始摘才三四金奩獻凝旒公卿不及識天子百金酬歲久子漸多纍纍枝上稠主人名好客贈我比珠投博望昔所徙葡萄安石榴想其初來時厥價與此侔今已遍中國籬根及牆頭物性久雖在人情逐時流誰當記其始後世知來由是亦史官法豈徒續君謳增歐陽修梅聖俞寄銀杏鵝毛贈千里所重以其人鴨腳雖百箇得之誠可珍豫問得之誰詩老逺且貧霜野摘林實京師寄時新封包雖甚微採掇皆躬親物賤以人貴人賢棄而淪開緘重嗟惜詩以報殷勤五言律詩增宋梅堯臣鴨腳子髙林似吳鴨滿樹蹼金鋪結子繁黃李炮仁瑩翠珠神農本草闕夏禹貢書無遂壓葡萄貴秋來遍上都七言律詩增明吳寬謝濟之送銀杏錯落朱提數百枚洞庭秋色滿盤堆霜餘亂摘連柑子雪裏同煨有芋魁不用盛囊書後寫料非鑽核意無猜却愁佳惠終難繼乞與山中幾樹栽七言絶句原宋楊萬里銀杏深灰淺火略相遭小苦微甘韻最髙未必雞頭如鴨腳不妨銀杏伴金桃詩散句增宋梅堯臣百嵗蟠根地雙隂淨梵居凌雲枝已密似蹼葉非疏張商英鴨腳半熟色猶青紗囊馳寄江陵城城中朱門翰林宅清風六月吹簾旌玉纖雪腕白相照爛銀殼破玻璃眀張舜民何人栽銀杏青條數尺間原朝補之宣城此物常充貢别録增物類相感志用蘆蔔梗同煮銀杏不苦原種植須雌雄同種其樹相望乃結實或雌樹臨水照影亦可或於雌樹鑿一孔納雄樹木一塊以泥之亦結子移栽春分前後先掘深坑水攪成稀泥然後下栽子掘時連土繩縳牢不令散碎則易活採摘熟時以竹篾篐樹本擊篾則銀杏自落御定佩文齋廣羣芳譜卷五十九
