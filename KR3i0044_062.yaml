body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷六十果譜荔支一原荔支一名丹荔一名離支見上林賦扶南記云此木結實時枝弱而蒂牢不可摘取必以刀斧劙取其枝故以為名一名飣坐真人樹高數丈自徑尺至於合抱形團圞如帷蓋葉如冬青緑色蓬蓬四時常茂花青白開於二三月狀如橘又若冠之蕤緌五六月結實喜雙狀如初生松毬核如熟蓮子殼有皺紋如羅生青熟紅肉淡白如肪玉味甘多汁夏至將中翕然俱赤大樹每下子百斛五六月盛熟時彼地皆燕會其下雖多食亦不傷人覺熱以蜜漿解之或以殼浸水飲亦佳初出嶺南及巴中今閩之泉福漳興蜀之嘉蜀渝涪及二廣州郡皆有之以閩中為第一蜀次之嶺南為下其類有陳紫出著作郎陳琦家品為第一譜云其樹晚熟其實廣上而圓下大可徑寸有五分香氣清逺色澤鮮紫殼薄而平瓤厚而瑩膜如桃花紅核如丁杳母剝之凝如水晶食之消如絳雪其味之至不可得而名狀也荔攴以甘為味雖百千樹莫有同者過甘與淡失味之中惟陳紫之於色味香自拔其類此所以為天下第一凡荔支皮膜形色一有類陳紫則已為中品若夫厚皮尖刺肌理黃色附核而赤食之有查食已而澀雖無酢味自亦下等矣大紫種似陳紫實大過之小陳紫實比陳紫差小又時有槱核者因而得名方紅徑可二寸色味俱美歲生一二百顆而已出興化屯田郎中方臻家宋公荔支實如陳紫而小甘美亦如之周家紅初為第一及陳紫方紅出而此為次龍牙長可三四寸灣曲如爪牙無核然不常有遊家紫種出陳紫實大過之水荔支漿多而淡以上俱出興化軍藍家紅泉州第一出都官員外藍承家法石白出法石院色白其大次於藍紅江緑類陳紫差大獨香薄而味少酸以上出泉州一品紅於荔支為極品生在福州堂前大丁香殼厚色紫味微澀出天慶觀緑核頗類冮緑色丹而小荔支核紫而此核獨緑將軍荔支五代時有此官種之因以得名朱柿色朱如柿而大虎皮色紅絶大繞腹有青紋類虎皮牛心以狀名之長二寸餘皮厚肉澀玳瑁紅色紅有黑點類玳瑁出城東硫黃以色類硫黃故名以上出福州何家紅出漳州何氏圓丁香丁香荔支皆旁蒂大而尖鋭此獨圎而香味尤勝十八娘色深紅而細長閩王有女行十八好食此因得名或云物之美少者為十八娘蕙團每朵數十並蒂雙垂叉頭顆顆紅而小可施頭髻珍珠荔支團白如珠無核荔支之最小者粉紅荔支荔支以色紅此為異丁香荔支核小如丁香亦謂之槱核蜜荔支以甘為名然過於甘火山荔支本出南越四月熟味甘酸肉薄閩中近年僅有秋元紅實時最晚因以得名蚶殼殼為深渠如瓦屋焉以狀得名蒲桃荔支一穗至二三百顆以上見蔡襄荔支譜增鄭熊廣中荔支譜玉英子燋核沉香丁香紅羅透骨牂牱僧耆頭水母子蒺藜大將軍小將軍大蠟小蠟松子蛇皮青荔支銀荔支不意子火山野山五色荔支徐􅎾荔支譜一品紅福州産之極品者故名生在州堂前狀元紅顆極大味清甘福州産為第一種在報國寺駝蹄長大甘柔金棕上鋭下方色深黃栗玉似金棕而圎味差勝洞中紅出宿猿洞故名星毬紅枝條生葉葉比他種差厚色紅而不絳扁者如橘圓者如雞子核皆如丁香亦有無核者食之甘脆有韻饅頭皮粗厚味甘大如饅頭磨盤皮粗厚味甘大如雞子近蒂處甚平金線實圎刺尖有金線界其中鳯池超實圎味甘中冠亦呼中觀體圓核小皮光味清熟時香聞數里桂林皮粗厚味甘金鐘形如鐘皮略粗厚色如硃砂味甘勝畫皮厚刺尖味甘肉豐七月熟礦玉皮粗厚味甘濃實似金鐘緑珠一名結緑俗呼緑荔攴實如山榛無核味最清熟時實與葉無辨紅繡鞋實小而尖形如角黍核如丁香味極甘美龍牙色紅長二寸許上下俱方蔡譜所載與此稍異雞引子一朵數十枚大小錯出其大者核小小者無核七月熟天柱樹極高大山中冠實大而圎餘荔將盡此荔始熟味微酸澀馬先白實類海山其熟最早味不甚甘山金鐘實大微長中秋緑色緑味微酸熟最後故名中秋松柏蕾皮厚而粗味澀大如松子勝江萍以味甘得名皮光或呼為勝江陳淨江瓶滿林香實絶類桂林皮微黃味甘其香倍於衆品鵝卵皮光無刺色紅蜜丸味甘肉厚俗呼肉丸鵲卵皮薄實圎斑如鵲卵味微酸白蜜皮粉紅甘如蜜醋甕色微黃味酸將軍帽實如松蕾皮厚肉澀雞肝實扁味甘色紅無核牛膽顆極大一握僅三四枚皺玉郎官紅遊丁香紫璚百步蘭壽香西紫黃香瑞堂紅松紅麝囊紅黃玉玉堂紅延壽紅實比狀元紅差大肉厚核小緑紗一名緑羅袍味甘青甜霞墩荔支實類狀元紅出霞墩蔡宅紅出蔡君謨故居水溜宋家香核小宋公甘傳自者因名黃石紅出榖城山樹髙三十餘大大可十一二圍其蔭十畝傳云即君謨譜中宋公樹也星垂皮紅實如鴨卵荔支之最大者俗呼稱錘七夕紅馬家緑鱉卵皮紅大如鱉卵核如米粒緑衣郎皮緑如瓜皮實如鴨卵味甘澀黑葉皮紅比狀元紅稍大味甘麻餅實如黑葉味甘酸椰鐘顆極大類興化枰錘進貢子其熟最先實如黑葉味甘半中南海陳紅冰團大緑小緑余家緑鄧慶宷荔支譜陳紫遊紫本為同生方紅周紅未甚區别將軍即為天柱野種實是椰鐘七夕何異中元黃玉原乎皺玉鱉卵鵲卵一物異名火山海山均是早熟原有緑色蠟色皆品之竒者本處亦自難得共計三四十種或言姓氏或言州郡皆識其所出或不言姓氏州郡則福泉興漳皆有也王敬美曰荔支以狀元香為最然不如長樂勝畫肉厚而味甘當為種中第一苐乾之不能如狀元香風味楓亭驛荔支甲天下亡論丹實纍纍而樹亦極婆娑可愛在漳泉者四五月熟然肉薄味酸能損齒又云荔支以興化之楓亭驛為最長樂次之性甘微熱止渴益智健氣病齒及火病人最忌彚考增後漢書南胸奴傳漢遣單于使令謁者將送賜綵繒千匹錦四端金十斤大官御食醬及橙橘龍眼荔支賜單于母及諸閼氏原唐書地理志戎州貢荔支煎后妃傳貴妃楊氏嗜荔支必欲生致之乃置騎傳送走數千里味未變已至京師劉崇龜傳崇龜為清海軍節度使姻親或干以財率不答但寫荔支圖與之增唐書南蠻傳婆賄伽盧國以青甓為圓城周百六十里有十二門四隅作浮圖民皆居中鉛錫為瓦荔支為材宋史地理志福州貢荔支原三輔黃圖漢武帝元鼎六年破南越起扶荔宫以植所得竒草異木土木南北異宜歲時多枯瘁荔支自交趾移植百株於庭無一生者連年猶移植不息後數歲偶一株稍茂終無華實帝亦珍惜之一旦萎死守吏坐誅者數十人遂不復蒔矣其實則歲貢焉增西京雜記曹元理明算術嘗過友人陳廣漢廣漢為之取酒鹿脯數片曰有倉卒客無倉卒主人元理曰俎上蒸豚一頭厨中荔支一柈皆可為設廣漢再拜謝罪自入取之盡日為歡原謝承後漢書舊南海獻龍眼荔支十里一置五里一堠和帝時臨武長汝南唐羌以縣接南海乃上書諫曰臣聞上不以滋味為德下不以供膳為功故天子食太牢為尊不以果實為珍伏見交趾七郡獻生龍眼等鳥驚風發南州土地惡蟲猛獸不絶于路至於觸犯死亡之害此二物升殿未必延年益壽帝於是下詔曰逺國珍羞本以薦奉宗廟茍有傷害豈愛民之本其勑大官勿復受獻由是遂省焉增吳録蒼梧多荔支生山中人家亦種之華陽國志江州縣有荔支園至熟二千石常設厨膳命士大夫共會樹下食之搜神記冠先生宋人也釣魚為業居睢水旁百餘年得魚或放或賣或自食之常冠帶好種荔食其葩實焉原影燈記天寶中正月十五夜玄宗於常春殿撒閩江紅錦荔支令宫人拾之國史補楊貴妃生於蜀好食荔支南海所生尤勝蜀者故每歲飛馳以進然方暑而熟經宿則敗後人皆不知之增國史補李直方嘗苐果實名以緑李為首楞梨為副櫻桃為三柑子為四蒲桃為五或薦荔支曰當舉之首杜陽雜編羅浮先生軒轅集年過數百而顔色不老宣宗召入內廷因語京師無豆蔲花及荔支俄頃進二花皆連枝葉各數百鮮明芳潔如才折下原開元天寶遺事明皇令方士以藥傅荔支根得核小宫人呼為丁香子蜀志唐天寶中取涪州荔支自子午谷路進入增清異録嶺南荔支固不逮閩蜀劉鋹每年設紅雲宴正紅荔支熟時閩士赴科臨川人赴詞會京師旗亭各舉鄉産閩士曰我土荔支真壓枝天子釘坐真人天下安有並駕者撫人不識荔支之未臘者故盛主楊梅閩士不忿遂成喧競旁有滑稽子徐為一絶云閩誇玉女含香雪吳美星郎駕火雲草木無情爭底事青明經對赤參軍寰宇記戎州僰道縣有荔支園郡國志云僰住施彜中最賢者古所謂僰僮之富多以荔支為業園植萬株一樹可收一百五十斛又有荔支灘廣州信安縣有連理荔支樹原蔡襄荔支譜興化軍風俗園池勝處惟種荔支當其熟時雖有他果不復見省大重陳紫富室大家歲或不嘗雖别品千計不為滿意陳氏欲採摘必先閉户隔墻入錢度錢與之得者自以為幸不敢較其直之多少也福州種植最多延施原野洪塘水西尤其盛處一家之有至於萬株城中當州署之北鬱為林麓暑雨初霽晚日照耀絳囊翠葉鮮明蔽映數里之間焜如星火非名畫之可傳而精思之可入也觀覽之勝無與為比初著花時商人計林斷之以立劵若後豐寡商人知之不計美惡悉為紅鹽水浮陸轉以入京師外至北戎西夏其東南舟行新羅日本琉球大食之屬莫不愛好重利以酬之故商人販益廣而鄉人種益多一歲之出不知幾千萬億而鄉人得飫食者蓋鮮以其斷林鬻之也增程氏遺書仁宗一日思生荔支有司言已供盡近侍曰有鬻者請買之上曰不可今買來歲必增上供之數流禍百姓無窮東坡雜記僕嘗問荔支何所似或曰似龍眼坐客皆笑其陋荔支實無所似也僕曰荔支似江瑶柱應者皆憮然碧雞漫志荔支香唐史禮樂志云帝幸驪山楊貴妃生日命小部張樂長生殿奏新曲未有名會南方進荔支因名曰荔支香脞説云太真妃好食荔支每歲忠州置急遞上進五日至都天寶四年夏荔支滋甚比開籠時香滿一室供奉李龜年撰此曲進之宣賜甚厚楊妃外傳云明皇在驪山命小部音樂於長生殿奏新曲未有名會南海進荔支因名荔支香三説雖小異要是明皇時曲清瑣高議治平中長沙趙琪作廣東提刑韶州公宇西軒有荔支數本中夏時荔支方熟琪將召刺史賞燕一夕荔支皆空皮核滿地琪深訝之乃開西軒見壁上有詩曰吾儕今日會嘉賓滿酌洪鍾酒數巡遍地狼籍不知曉荔支又是一番新荔支皆積其下二廣人傳異之通志莆田方慎從字惟之宋景德二年進士守嘉州手植荔支於郡圃賦詩有留取清陰傳子孫之句至大觀中曾孫僖以殿中侍御史持節按蜀部學嘉父老擁車誦慎從詩為賀前言若劵原容齋隨筆莆田荔支名品皆出天成雖以其核種之終與其本不相類宋香之後無宋香所存者孫枝爾陳紫之後無陳紫過墻則為小陳紫矣筆談謂焦核荔支令勿生旁枝其核自小里人謂不然此果形狀變態百出不可以理求或似龍牙或類鳯爪叉頭之可簪緑珠之旁綴是豈人力所能加哉初方氏有樹結實數千顆欲重其名以二百顆送蔡忠惠公紿以常歲所産止此公為目之曰方家紅著之於譜印證其妄自後華實雖極繁茂逮至成熟所存者未嘗越二百遂成語纖此假已載遁齋間覽中郡士黃處權復志其詳如此增夷堅志崔倅仕廣州家有乳嫗善為小伎嬉戲一日抱嬰兒戲門前見有持福荔過前兒欲之不得媼曰我别有計乃取小盒子置几上旋發視之則滿盒皆荔崔倅聞而駭異欲窮其術媼笑曰此乃神術官人試觀之拉詣其家酒坊時坊用大釡煮酒媼跳入其中遂不見矣廣異記福建官談微之元符末出郊見一園荔支垂熟微之採食少憩樹下朦朧中夢至一室美人盛服出迎攜手而入飲間吟云妾生原在粵閩間六月南州始薦盤肉嫩色嬌丹鳯髓皮枯稜澀紫雞冠咽殘風味清心渴嚼破天漿沁齒寒却憶當年妃子笑紅塵一騎過長安老學庵筆記余深罷相居福州第中有荔支初實絶大而美名曰亮功紅亮功紅者深家御書閣名也靖康中深謫建昌軍既行荔支不復實明年深歸荔支復如故乃知世間富貴人皆有陰相之者宣和中保和殿下種荔支成實徽廟手摘以賜燕帥王安中且賜以詩曰保和殿下荔支丹文武衣冠被百蠻思與廷臣同此味紅塵飛鞚過燕山豫參成都議幕攝事漢嘉一見荔子熟時凌雲山安樂園皆盛處糾曹何預元立法曹蔡逮肩吾皆佳士相與同樂薛許昌亦嘗以成都幕府來攝郡未久罷去故其荔支詩曰歲杪監州曾見樹時新入座但聞名蓋恨不及時也每與二君誦之張文昌成都曲云錦江近西煙水緑新雨山頭荔支熟萬里橋邊多酒家遊人愛向誰家宿此未嘗至成都者也成都無山亦無荔支蘇黃門詩云蜀中荔支生嘉州其餘及睂半有不蓋睂之彭山縣已無荔支矣况成都乎北方民家吉凶輒有相禮者謂之白席多鄙俚可笑韓魏公自樞密歸鄴赴一姻家禮席偶取盤中一荔支欲啖之白席遽唱言曰資政喫荔支請衆客同喫魏公憎其喋喋因置不復取白席者又曰資政惡發也請衆客放下荔支魏公為一笑惡發猶云怒也方輿勝覽荔支廳在戎州倅廳名曰萬朵紅又一本在尉廳一樹四柯西南一柯獨肉厚而味甘鶴林玉露荔支明皇時一騎紅塵妃子笑者謂瀘戎産也故杜子美有憶向瀘戎摘荔支之句是時閩品未有聞至今則閩品奇妙香味皆可僕視瀘戎矣三山志大中祥符二年歲貢荔支乾六萬顆元豐四年增減價本錢一百七十二緡有奇歲以銀輸左藏庫三年條次貢物如祥符之數元祐元年定為常貢數亦如之崇寧四年增一萬三千顆大觀元年又增三千政和增貢一萬宣和於祥符數外進八萬三千四百七年損抑貢物減政和之半建炎三年罷荔支煎大中祥符二年定額一百三十瓶丁香荔支煎三十瓶元豐三年條次貢物如祥符之數元祐元年名為常貢崇寧四年定歲貢亦如之建炎三年罷圎荔支崇寧四年定歲貢一十萬顆大觀元年增一萬宣和中增十萬六百顆七年減政和歲貢之半建炎三年罷生荔支紹興初始貢至二十四年罷宣和間以小株結實者置瓦器中航海至闕下移植宣和殿錫二府宴賞御製有詩示羣臣時太宰余深有賜比西山藥一丸之句詩話總龜杜牧華清宫一詩尤膾炙人口據唐紀明皇以十月幸驪山至春即還宫是未嘗六月在驪山也荔支盛暑方熟詞意雖美而失事實丹鉛總録漢武帝破南越建扶荔宫以荔支得名也此荔駢生若十八娘之類曰扶荔者亦若扶竹扶桑云左思蜀都賦旁挺龍目側生荔支故張九齡賦荔支云雖觀上國之光而被側生之誚杜子美絶句云側生野岸及江蒲不熟丹宫滿玉壺諱荔支為側生本之左思張九齡然以時事不欲直道也黃山谷題楊妃病齒云多食側生損其左車則特好奇爾原錦湖野談四川某州荔支一株相傳李唐時物也實甚美太真妃最所鍾愛嘉靖中一州守伐作梳櫳數百副至今蜀人傳為話柄梧潯雜佩蘇長公在海外有詩云日啖荔支三百顆不妨長作嶺南人至一歲荔支不熟遂有空寓嶺表之語遐方珍果為昔賢所愛嗜如此余以初夏至涪偶宴客見盤中有鮮荔為之色動試嘗之乃酸澀不可入口意謂浪得名耳忽一日鬱林指揮周宣以急足馳送數百顆色香味俱絶遂得一飽噉因笑曰可無恨於瘴鄉矣增荔支園紀異吳人胡百能為李平叔言其族人居姑蘇有名園當春時縱人遊賞至三月將暮芍藥盛開天氣清和士女羣集叔偶獨行散步至園角小亭最居幽處遙聞其上笑語歡洽就視之見供帳甚齊數黃衣少年共飲侍女六七人顔色殊艷亟趨避之既去百餘步竊意黃衣非士庶所服回望之已無所覩但得荔支殼十數枚其大如鵝卵芬香觸鼻袖之以歸見之非世間物也瀟瀟齋筆談延壽紅乃宋狀元徐公鐸所手植者其樹迄今亭亭獨茂果實豐美非有力者歲不得嘗樹下有井亦徐公所鑿井中橫亘一石其泉左重右輕更為奇異暑月龍噉樹下及井泄浸荔風味倍增蔡宅之墟即蔡端明舊里荔樹冠附郭諸處蔡氏宗祠中緑紗一株歲不多生而色香味殊絶半或無核足稱珍品霞墩之品本是陳紫今半屬林晉伯園林余羣玉山及西巖之荔皆移植於楓亭者自謂於斯果有緣佳味不乏恐五城十二樓中樂或未易誇此也千頃齋集元李京雲南志士獠以採荔支販賣為業則滇南亦有荔支也然蚤摘味酸殊不堪嚼余友鄧汝高視滇學時黔國以餉子道協所嘗啖者或以採荔之枝誤矣徐氏筆精宋福清翁昭文者先儒亢之從子也圃中非時生荔支其母曰豈有嘉客踵門耶頃之莆田林光朝至因名為嘉客紅唐鮑防襄州人天寶末舉進士時明皇詔馬遞進南海荔支七日七夜達亰師防作雜感詩云五月荔支初破顔朝離象郡夕函關雁飛不到桂陽嶺馬走皆從林邑山是知貴妃所食荔支實出南海已見劉昫唐書並防詩蔡君謨譜謂愛嗜涪州荔支歲命驛致羅景綸以為一騎紅塵乃瀘戎之産恐誤矣客惠紀聞惠州荔支味酸樹亦甚少至東莞漸多漸佳五羊黑葉諸品遂與閩産伯仲耳徐􅎾荔支譜梁蕭惠開云南方之珍惟荔支矣其味絶美楊梅盧橘亦可投諸藩溷故東坡詩云南村諸楊北村盧直與荔支為先驅也浪齋便録曰唐世進荔支貢自南方楊妃外傳以貢自南海杜詩亦云南海及炎方惟張君房以為忠州東坡以為涪州未得其真近閲涪州圖經及詢土人云涪州有妃子園荔支故君謨譜曰天寶中妃子尤愛嗜涪州歲命驛致又曰洛陽取於嶺南長安來於巴蜀此實録後人不復置喙矣秣陵武進士孫稚明其父在日家巨富養鶴數十隻中一隻飛去七日不歸及歸口銜鮮荔支一穗共七枚回翔而下視之皆如新摘孫召賓客子孫玩賞纍日以示識者皆云此東粵荔支非閩種也然事亦奇異矣稚明為太湖總練親與豫言時稚明已八九嵗亦啖一枚云宋珏荔支譜食荔清福三十三事開花雨時結實風時次第熟雨初過裛露摘護持無偷摘同好至晚涼新月浴罷簪茉莉拈重碧微醉科頭箕踞佳人剝乳泉浸蜜漿解臨流對鶴樓頭聫騎出觀名品嘗遍檢譜辨核貯白磁盆懸青筠籠著白苧挂帳中殼堆苔上膜浮水面色香味全隔竹聞香土人忽送又食荔黑業三十四事暴雨妬風偷兒先嘗鳥嘴啄蜂蟻蛀蒂烈日中摘斷林剝漬糖蜜無清泉點茶不喜食者在數核啖不得飽溪水浸腥醎解魚肉側殼上有迹醉飽後市販爭價説貴賤惡詠攫博懷藏主人慳鄙忌熱勸莫餐色香稍變白曬焙乾不識品核無釀法松蕾出樹杪如晨星鄧慶寀荔支譜蜀中荔支瀘敘之品為上涪州次之合州又次之涪州徒以妃子園得名其實不如瀘敘耳涪州圖經云州至長安有便路不七日可到昔宋景文作方物略言荔支生嘉戎等州以去長安差近疑為楊妃所取蓋不知涪有妃子園又自有便路也按蜀志補云高都山在梁山縣北山中有古驛路乃天寶貢荔支所經也曹蕃荔支譜狀元香宋元豐間狀元徐鐸所植楓亭薛奕文武兩魁也與鐸結秦晉因得傳其種而楓亭地宜荔彌山被野所産最盛楓亭驛荔支遂甲天下榕城三山志烏石山宿猿洞前舊有荔支樹極佳名曰洞中紅古靈陳襄贈湛俞詩云此去蓬萊峯頂月夢魂應到荔支園一統志荔支軒在閩縣南玊泉寺四川志荔支灘在慶符縣北二十里崖旁多荔支合州學士山麓昔有張氏荔支異本合幹定誇山在敘州府西百里山坡荔支多屬廖氏黃庭堅詩廖致平家緑荔支即此山所出廣西志元豐間橫州大理丞梁世基宅生連理荔支神宗有御製詩賜之曰橫浦江南岸梁家間世賢一枝連理木五月荔支天原夔州府志萬縣西山上有絶塵龕宋郡守馬元穎魯有開於山麓修池種蓮栽荔雜果凡數百本景物清勝為夔路第一集藻狀增宋曾鞏福州擬貢荔支狀右臣竊以禹貢揚州厥包橘柚錫貢則百果之實列於土貢所從來已久二帝三王所未嘗易也荔支於百果為殊絶産閩粵者比巴蜀南海又為殊絶閩粵官舍民廬與僧道士所居自階庭場圃至於山谷無不列植歲取其實不可勝計故閩粵荔支食天下其餘被於四夷而其尤殊絶者閩人著其名至三十餘種然生荔支留五七日輒壞故雖歲貢皆乾而致之然貢蓋為常品相沿已久其尤殊絶者未嘗以獻蓋東漢交趾七郡貢生荔支十里一置五里一候晝夜馳走有毒蠱猛獸之害而唐天寶之間亦自巴蜀驛致實開侈心當陛下之時方以恭儉寡欲為天下先固不可得而議及於此也至於歲貢既乾而致之然顧常品其尤殊絶者則抑於下土使田夫野臾往往屬厭而大官不得獻之於陛下陛下不得獻之於宗廟兩宫使勞人費財如此可也蓋荔支尤殊絶者固不可多致若每種歲貢數百或至千數每州不過用三五步卒使之日行兩驛固不為勤且煩非有勞人費財之患而修貢者不知及此此臣之所未諭也又荔支成實在六七月間雖乾而致之然新者於其甘滋猶未盡失至於經歲則所存者特其滓苴而已而每歲貢入常至冬春夫蠻夷異類贄其方物皆知用其土産之良而不敢慢今邦域之內守藩之臣效其貢職而曾不知出此此臣之所以不敢安也故臣常欲至荔支成實約旁近州各擇其尤殊絶列於名品者差其多少以時上進其領於有司備燕賜之用者自如故事蓋建安貢茶自蔡襄易以小團而茶之絶特者始得獻之天子今荔支復得貢其尤者則閩粵之産選擇而充庭實者始備所以致臣之恭於其貢職此臣之官守也啓增齊孔稚圭謝賜生荔支啓緑葉雲舒朱實星映離離昔聞曄曄今覩信西岻之佳珍諒東鄙之未識角昴興而靈華敷大火中而朱實繁灼灼丹華吐日離離繁星著天序原唐白居易荔支圖序荔支生巴峽間樹影團團如帷蓋葉如桂冬青花如橘春榮實如丹夏熟朵如葡萄核如枇杷殼如紅繒膜如紫綃瓤肉瑩白如冰雪漿液甘酸如醴酪大略如彼其實過之若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣元和十五年夏南賓守樂天命工吏圖而書之蓋為不識者與識而不及一二三日者云宋蔡襄荔支譜序荔支之於天下惟閩粵南粵巴蜀有之漢初南粵王尉他以之備方物於是始通中國司馬相如賦上林云答遝離支蓋夸言之無有是也東京交趾七郡貢生荔支十里一置五里一堠晝夜奔騰有毒蟲猛獸之害臨武長唐羌上書言狀和帝詔大官省之魏文帝有西域蒲桃之比世譏其繆論豈當時南北斷隔所擬出於傳聞耶唐天寶中妃子尤愛嗜涪州歲命驛致時之詞人多所稱詠張九齡賦之以託意白居易刺忠州既形於詩又圖而序之雖髣佛顔色而甘滋之勝莫能著也洛陽取於嶺南長安來於巴蜀雖曰鮮獻而傳置之速腐爛之餘色香味之存者亡幾矣是生荔支中國未始見之也九齡居易雖見新實驗今之廣南州郡與夔梓之間所出大率早熟肌肉薄而味甘酸其精好者僅比東閩之下等是二人者亦未始遇夫真荔支也閩中惟四郡有之福州最多而興化軍最為奇特泉漳時亦知名列品雖高而寂寥無紀將尤異之物昔所未有乎蓋亦有之而未始遇乎人也豫家莆陽再臨泉福二郡十年往還道由鄉國每得其尤者命一寫生萃集既多因而題目以為倡始夫以一木之實生於海瀕巖險之逺而能名徹上亰重於當世是亦有足貴者其於果品卓然第一然性畏高寒不堪移植而又道里遼絶曾不得班盧橘江橙之右少發光彩此所以為之歎惜而不可不述也增明徐􅎾荔支譜序荔支自宋蔡忠惠公譜録而其名益著世代既遐種類日夥騷人韻士題品漸廣然散逸不收則子墨之失職而山林之曠典也維時朱夏側生斯出名題於西川貢珍於南海吾閩所産實冠彼都可謂盧橘慚香楊梅避色者矣爰倣蔡書别搆兹譜狀四郡品目之殊陳生植制用之法旁羅事實雜采詠題品則專取吾閩事則兼收廣蜀物匪舊存品惟今疏深愧聞見未殫筆札荒謬博雅君子將厪挂漏之譏豫小子其何敢辭焉屠本畯荔支譜序荔支者閩廣巴蜀之佳果也實號珍腴樹稱長壽色味不一品類繁滋虞夏商周既不錫於禹貢曾何圖於王會豈非生絶徼者難以充君之庖也自尉他備物相如作賦以來貢盛於漢帝而交趾置堠名傳於唐妃而涪州遣騎其後紅鹽白曬紛馳於趙宋矣明興一切報罷俾英英仙品逺迹廟廊之中灼灼靈根偃息瘴蠻之地人固有之物亦宜然本畯年在孩提從先公總憲嶺南知食而不知味年在稚齒從先公左轄閩中知味而不知品今年逾知非每覽君謨子固之書輒動三山九漈之想萬厯乙未移二閩鹺越明年時惟朱明屆節丹枝離柯翠幄舒張見絳苞之錯落瓊瓤剖迸訝甘液之旁唐齒頰浮香睂宇競爽矣古今人啖之不足故歌詠之歌詠之不足故從而譜之於是宋蔡君謨開美於前明徐興公抉奇於後色香味品悉爾無遺生植採製粲然大備使食者可執品以按圖閲者可披圖而索品矣自蔡公所傳名存於今十而三四徐生所增奇名異品十而六七將五百年間僅二譜焉摛藻固難考索未易其不然歟伊余不慧飽啖是宜客有談楊梅勝於荔支者又有談龍眼可稱伯仲者不慧初啖謂客言為然遞嘗乃知耳食非真身歷為信勒斯荔譜成一家言黃履庚荔支譜序自宋蔡君謨纂荔支譜牒迄今五百餘年閩品號為奇絶古今詞人往往注頰而侈談之晉安徐興公先生更取蔡譜而廣之其攟托富其搜羅博其詞米陸離豫取而讀之覺流膾吻齒間液津津不能止何必箕踞樹下啖三百顆也甬東屠田叔使君來為吾閩農府丞稍為考訂蔡徐通譜授梓焉余從使君署中手擘輕紅因戲語使君閩故以此姬重此姬藉興公寸管殊沾沾而生氣黃郎且檄南宫御女呼十八娘來玉珮珊珊將毋以十二峯之夢酬興公耶使君笑而頷之余獨怪靈均以騷經抒鬱瑶華佳卉舉綴穎端荔支抑何寥寥耶蓋南天獨擅造物者巧閟之以待千載剖抉譜而行之皆吾閩後先諸君子也通譜行為絳衣之稗官為端明之藎臣為南部之勝事矣曹蕃荔支譜序閩中果實推荔支為第一即巴蜀所産能挾一騎紅塵博妃子笑者亦未得與之雁行自蔡君謨學士著譜聲價頓起時運遞遷種植繁衍品格變幻月盛日新閩人士爭哆口而艷談之即永嘉之柑洞庭之楊梅宣州之栗燕地之蘋婆果似俱為荔支壓倒曾不敢與為伍余驟聞其説竊竊致疑遂於今歲暮春之初馳入閩中謂閩人士不佞素惡負虛聲者此來將為荔支定品乃閩人士之言曰閩八郡延建汀邵地屬高寒時降霜霰不堪樹藝漳不及泉泉不及福興君請自試之余遂棲遲於二郡間泛蒲觴渡鵲橋踰兩月矣饔飱稍歇無非咀嚼此果津津乎其有味不敢妄肆譏彈而品遂定一日閩人士造余邸而問曰聞君日啖三百顆曾與荔支評月旦乎余笑曰余今乃知閩人之譽言非誇也緑葉蓬蓬團團如蓋扶疏插天赫曦若避吾愛其樹纍纍丹實槎頭挂星晴光掩映照耀林藪吾愛其色絳囊乍剖蠙珠初薦瓊漿玉液絶勝醍醐吾愛其味濕帶露華寒凝絳雪薰風暗度疑對檀郎吾愛其香幸白長慶之敘事傳神張曲江之賦語如畫此果已蒙九錫産類實非八閩唯端明蔡學士興化軍人也生長於扶荔之鄉聞見既真殿最不爽一經品題遂爾增價但今據譜牒中所載三十二品而索之陳紫江緑鮮矣即彼稱中駟十亦不得二三豈其名號之鼎新抑或今昔之異態余如未及大嚼而漫曰某佳某佳幾於耳食恐宇內爭嘲吳人乃為閩人左袒致楊家果減色余滋愧矣遂僅舉曾嘗試其風味者二十餘種自稱荔支小乘云宋珏荔支譜序荔支之於果仙也佛也實無一物得擬者江瑶柱河豚魚既非其倫塞蒲桃楊家果不堪作奴矣歐陽永叔比之牡丹亦觀場之見耳譬於月以為鈎為鏡為圭皆第二月非月體也蔡君謨亦云其味之至不可得而狀也夫不可得而狀乃深於荔支者矣荔支之在天下以閩四郡為最四郡以興化為最興化又以楓亭為最此人所知者也然不盡然黑葉之入釀未可以粵産輕之莆城外若東埔若霞墩實有可鄒莒視楓亭者人不辨耳余生於莆既幸與此果遇且天賦噉量能日噉一二千顆值熟時自初盛至中晚腹中無慮藏十餘萬而喜别品喜撿譜始以泉浸繼以漿解磁盆筠籠一物不具則寧不噉蘇子瞻云日啖荔支三百顆不妨長作嶺南人又曰我生涉世本為口南來萬里真良圖語雖激亦有味乎言也况余每歲婆娑樹下有十餘萬在腹中又何嫌蠖屈海陬也哉既私喜於荔癖獨擅果然之餘不能自祕自蔡譜及徐氏譜外别著食譜三百餘條未遑詮次適道協以新刻見示因俾之以廣同好亦玉照堂梅品遺意也鄧慶寀荔支通譜序荔支一物種類實繁君謨摘辭簡古列品明備興公採集羣書爭奇扼勝合此二譜誠難贅言不揣末學輒為蛇足者亦有説焉一以君謨墨本與印本之頗異也二以各郡聲稱之不一也三以興公搜採之未盡也四以詩家錫名之未安也五以嶺南品第之當定也六以古人比擬之實逺也七以畫手寫生之失真也輒抒所聞聊為博笑其佐議未敢針徐砭蔡若集録或可步王踵張云爾林古度荔支通譜序荔支一果有天地以來則有之乃至漢唐宋諸名賢始以賦詠譜録表著其名品可見物之遭遇亦自有時也我明徐興公繼蔡忠惠譜宋比玉曹介人復為小譜今鄧道協又合吳啓信為通譜荔支可謂有知已矣夫一果而能名實相稱使千載後人人爭為表著若此豈無故哉即楊貴妃一婦人女子偶甘是物而名為之益彰自唐以後之譜荔者賦詠荔者又莫不借貴妃以為故實道協通譜尤以漢唐宋明人詞賦詩文為侈觀覽豫得佐其托採評訂之勤即戔戔賦詠亦獲附明人作者之末抑何厚幸因歎士人之知遇何異荔子遭逢苐患實不副名耳士之才華人品茍能如荔之色香味俱佳未有不若相如之逢狗監也倘樹名於外而鮮實於內徒與草木同腐朽而已不深愧此木實乎因序荔譜而並以務實為自勉焉説增明周宣荔陰説昔嘗讀蒙泉翁論著曰荔支流品僅可與北之蒲萄比南人不以為然蓋護短也噫翁之意微矣夫荔為果以實重陰不與焉紅繒紫綃龍牙鳯爪之夸詡先後篇牘雖東坡老人於流離遷謫之際猶以日啖三百顆為言若不知其詞之饞焉噫美則美矣亦南方植物之珍耳一騎紅塵千載而下非但人病之荔亦自病之矣翁莆守也安知其意不出於此哉長柯密葉敷蔭席地日交之而翠陰成月交之而金影碎風雪交之不疏不凋荔之陰蓋與徂之松建之榕吳楚之豫章同德而比義者也北人不及知南人有之而不必盡知也御定佩文齋廣羣芳譜卷六十
