body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷六十一果譜荔支二集藻傳増明王褒洪離傳洪離字成林蜀人也鼻祖側生顯於漢厥後種落散處閩中為盛離生而形狀特異鵠首鶴頂牛心虎皮為人華而實確而質内含章美津津可尚以故識與不識咸稱譽之唐天寶間天子聞其名采而致之使者冠蓋交於道猶慮其來之緩也特設驛傳以迎焉既至同盆成子虚水侯上謁時盛暑上坐沉香亭趣而入上笑曰聞卿名有年矣卿來能啓沃朕心乎離從容稽首曰臣逺方賤士也自謂深根固蔕山林間足矣叨以先容獲薦左右然臣起遐陬酸寒鄙陋恐見罪不敢忝居喉舌之位上撫之再四曰名不虚也特命釋褐肌膚潔白上曰玉色英英照人中何物也離俯首對曰特一赤心報陛下耳上大恱錫爵紅陽侯奉朝請賜予數召對無虚日後宫貴人邀而食之開懷欵㑹適其意而後已久之執法大臣謂離弗能裨益治體何徃來屑屑不憚煩也請罷之上用其言由是疏焉後終於蜀孫枝入閩奕葉繁衍遂為巨族有一派居嶺南皆未若閩之大著耳謝肇淛江妃傳江妃者唐𤣥宗皇帝侍妃也小名綠玉其先世家於南越漢武帝時有側生女隨尉佗入貢帝見其美愛幸之為築離官居歳餘無子寵衰聞陳夫人以相如賦復幸亦奉金千鎰求相如作賦賦上不見省卒幽長門中然家世産好女子和帝時詔歳貢采女以備掖庭後用唐羌言罷之妃以開元中生母方姙時夢繁星纍纍從天下已取吞之覺而命筮得離之頤曰銜珠黄鵠生芻一束去其國三歳不復是女也而艶必大其宗果以季夏之望生妃及長有殊色肌理膩白如玊無少疵靨體有異香好製紅繒為襦蹙縠若粟裼以碧衫豐膚内映益增其妍然常自匿翠幄中市里罕見其面時貴妃楊氏寵冠椒房而妃有姊采蘋先入宫得侍帝從容言其女弟鮮姣欲以傾貴妃帝聞心動而先是左丞相張九齡又盛稱妃之美不容口遂遣中使乘傳遽召妃促者絡繹於道以天寶五載六月下旬得幸於華清宫帝大恱制曰朕味道渇賢采華茹實博羅筐筥之媛以佐蘋藻之馨盖有年矣才人江氏徳惟邁種姿擅凝脂國色天香沁吳宫之芬水冰心雪質奪漢掌之金莖今遣大將軍髙力士持節冊封淑妃位貴妃次於戲玉食萬方予豈有愛於喉舌小星三五爾益自固其衾裯食哉以時無廢朕命自是寵遇日隆每食未嘗不侍側然妃小有智數時時以甘言自媚於貴妃浸入肺腑得其驩心貴妃不嫉也一日上與貴妃坐沉香亭擁妃於側時方盛暑上有消渇疾道士羅公逺以術致江陵柑百顆西凉州進葡萄數百斛上謂左右曰爭如我江家並蔕瓊漿風味乎然妃終逼於貴妃不自安常以顔色非故求自疎逺每歳僅一再見上上嬖益渥併賜采蘋號梅妃寵與貴妃埓三人各自矜其色宫人或微問帝帝曰江家妃神仙中人也楊梅尚不堪作奴貴妃采蘋聞之大怒以事捃摭妃暴烈日中又加炮烙曰使老嫗黧面聞者傷之後左拾遺杜甫紫微舍人杜牧忠州刺史白居易皆有詩弔妃妃既敗竄其族於閩廣間然子孫猶美麗稱江家種以比昭君村云徐熥綘嚢生傳綘囊生者名丹别字太白其先祝融氏以火徳王都南離子孫纍纍散處閩越南粤巴蜀間遂以離為姓生其苖裔也生少有異質顔如渥丹肌肉豐瑩性復甘美雖中若刻核而外多模稜未嘗有所譏刺人有督過生者任其指摘生但赬然垂首而已與人交一膜之内洞見肺腑故見者莫不津津漢初時天子求海國異才南粤王尉佗以生入貢十里一置五里一堠得達亰師武帝獵於上林問生於司馬相如相如曰其才在盧郎楊子間甚稱上㫖相如故蜀産雅習生乃以盧楊並稱時論屈之元鼎六年帝建離宫處生其中生素長南方北地苦寒雖沾渥恩顔色枮瘁一旦以計自脫守吏坐誅者數十人生每歳朝亰師所過有司供具甚費臨武長唐羌謂生縻濫廪禄無益於大官請罷之上可其奏生既落職遂學玉液還丹之術衣朱衣肘後常繫絳囊貯金莖露徃來於七閩兩廣䕫梓之地人皆稱為絳囊生云唐天寶中楊貴妃聞其名欲致之時生方結廬於蜀之涪州許擁傳上謁生以一騎馳至顔色自若妃召見沉香亭賜緋一襲丞相曲江張九齡作賦贈生名益顯其後車駕幸蜀生亦遁去襄陽人杜甫避難蜀中其所吟詠多及生元和中太傅白居易出守南賓時與生為臭味交以生美容止命工史繪像為詩贊之未嘗一惜齒牙生族類既繁而閩中尤盛宋端明殿學士蔡襄為作譜牒叙其本枝奕葉甚詳南豐曾鞏知福州為修實録以為有邁種之徳有側生女弟十八娘者容色殊絶與閩王審知少女以紅妝相艶貎與生肖生晩得道常挾黄頭奴號旁挺者先後婆娑於林藪間其後大丹既成遺棄軀殻尸解以去不知所終太史公曰余讀列仙傳及仙人本草皆稱生能蠲渴補髓有功於人非虚語也黄巢之亂幾膏斧鑕以老媼抱泣卒全其天年幸矣端明迄今五百餘載譜牒缺畧然子孫在閩中以朱紫起家者不可勝數語曰桃李不言下自成蹊吾於生亦云黄履康十八娘傳十八娘者開元帝侍兒也姓支名絳玉字曰麗華行十八吾郡人其先若木氏之苖裔子孫散處閩中其居嶺南若交州若瀘戎又其别支也春秋不甚顯漢時族始有聞祖曰丹嘗佐漢國東海後又以丹為氏永元中有從交州聘入宫者以臨武長唐羌言而止傳至唐開元間族益茂其母綠陰氏夢繁星離離墜於懷卜云當得女而麗至夏季姬生膚如冰玊色深紅而體微細長喜著絳羅襦内禓以輕紅絺袷懸水晶環光如瑩當𤣥宗時楊太真與江采蘋并寵擅掖庭一日采蘋侍從容言妾里中十八娘者色麗甚帝心動而太真亦雅艶慕之置騎傳勅中使趣召姬日行千餘里姬去家久心揺揺如懸旌貎亦稍减前而風態猶存姬至帝方擁太真觀蓮太液池即召見光采襲人以水晶盤貯水命姬捧進色與水晶相掩映帝與太真置膝上撫弄移時顧姬笑曰如此風韻不傾城耶姬口極甘善媚人太真妒諸姬侍莫敢進獨與姬歡無厭紫薇舍人聞而嘲之世所傳一騎紅塵妃子笑者指姬也宋端明學士蔡君謨姬里中人為姬家著譜私諡姬為絳衣仙子姬姊姪十有二而宋香者陳紫者江緑者皆以色澤著又有居火齊山者為人寒酸其風韻不及姬逺甚外史氏檢唐書野記得姬事呼毛頴生載之記增明曹學佺石倉園荔支閣記荔支閣介於䨇樹樹因有垣繚之而枝葉扶疎特出垣外作虯龍勢競舞而飲水閣去其梯借徑於菴之别室以梯以橋皆因於樹樹有欹側處人行蹲而避之坐露臺如在綠幄中荔子熟時朱實離離可掇而食不煩假手於攀摘矣謝杰荔支名記荔支者果之牡丹也牡丹盛洛下洛人士珍而譜之荔獨盛閩譜可閩士闕哉鶉火之次炎歊載颺滄澥寥廓丹蕤在望寤寐耿耿懐之好音其詞曰荔有赬而艶瑩而腴甘潤軟香得一可勝百者狀元紅也團若臍簇若稜錦膚而蜜腹百二什二稱東西秦者勝畫也色澤匪殊風格微減並驅中原二乘先登而肩隨者中觀也石中棘表其脰肩肩然神漿雋穎敻爾逸羣别格甄奇不緣貎勝者桂林也砂神玉理既癯且修跂予望之矯若蒲牢在簴者金鐘也蛾睂淡横素馨清婉丹鉛深謝故增妍憐者滿林香也深碧淺紫獨兼二妙風韻彌嘉邈焉寡儔者勝江陳也海山先而酢山枝纖而遲比之羣玉瞠乎後塵苐鵲蛋蜜香歳寒獨秀海山先芳開我後人搜奇君子是之取爾彼碌碌餘子者何以稱焉嗟乎元紅勝畫湼槃之宗色相逓興咸得正果山枝小乘猶𨽻法門海山無奇實沿衣鉢譜而次之儷於花王非過也尺牘増宋蔡襄與七哥制幹熱甚不審尊體起居何如園中荔子新熟分奉四百枚今歳楓亭熟皆晩候有佳品當特獻耳送荔支與昭文相公襄再拜宿來伏惟台候起居萬福閩中荔支唯陳家紫號為第一輙獻左右以伸野芹之誠幸賜收納謹奉手狀上聞不宣歐陽修與蔡端明遂爾大暄不審氣體何似前日瞻企荔支圖已令崔慤傳寫自是一叚佳事蘇軾與歐陽知晦今歳荔子不熟土産早者既酸且少而增城晩者絶不至方有空寓嶺表之歎忽信使至坐有五客人食百枚飽外又以歸遺皆云其香如陳家紫但差小耳二廣未有此異哉異哉又使人健行八百枚無一損者此尤異也黄庭堅答安撫王補之寄餘甘荔子極荷逺意之重荔子雖肉薄甘味亦勝黔中細事㥵髙明辱垂意周旋曷勝愧感再答王補之某所作荔支湯擘生荔支肉别貯其自然汁以水解白沙蜜漸入和合令味相得即并荔支肉上火煑減半以瓷合貯之計客數人一勺又令入湯小半盞煎沸用紗囊盛龍腦先撲熱盞乃注湯謾錄上與曹使君伯達某再拜啓伏承手誨分惠荔子色香動人眼鼻誠與山煙溪露俱來乃知䕫峽荔支已勝嶺南珍重眷與之意無以為喻明王穉登答王侍御懋復用昭誇荔子之美甚盛欲以楊梅敵之乃施使君書云吳兒但解噉朱櫻不太夏蟲我乎一騎紅塵何足驕異時僕得就公案頭日啖三百顆當决楚漢雌雄矣答施觀察荔子之惠太夥召客噉之皆為楊梅左袒詹録君稍誇樹下時風味差勝然大要不相河漢如公云櫻桃者安敢當是欲射干而類芷耶鄧慶寀與黄海鶴徐譜謂常選鮮紅者於竹林中擇巨竹鑿開一竅置荔子節中仍以竹籜裹泥固封其隙藉竹生氣滋潤可藏至冬春色香不變此語頗異閩中不乏好事未嘗見有鮮果至春時也記得阮堅之司理閩日令人以棕包郡庭荔子至冬開視則已枯落作臭夫物至熟時則已蔕落安得久視况此至貴之物能以人力奪之耶徐譜神其說更啓後世之惑徐􅎾與鄧道協足下謂僕藏生荔支於巨竹中神其說啓後世之惑此非僕之臆說也三山元宵最盛而神廟中各出珍奇生荔留至春時徃徃目擊之家兄元夕詞有云閩山廟裏賽靈神水陸珍羞滿案陳最愛鮮紅盤上果荔支如錦色猶新此一證也足下居與閩山最近試詢之鄉長老則知吾言之不誣矣題跋增宋歐陽修書荔支譜後善為物理之論者曰天地任物之自然物生有常理斯之謂至神圎方刻畫不以智造而力給然千狀萬態各極其巧以成其形可謂任之自然矣而其醜好精麤壽夭多少皆有常分不有尸之孰為之限數由是言之又若有為之者是皆不可詰於有無之間故謂之神也牡丹花之絶而無甘實荔支果之絶而非名花昔樂天有感於二物矣是孰尸其賦予邪然斯二者惟不兼萬物之美故各得極其精此於造化不可知而推之至理宜如此也予少遊洛陽花之盛處也因為牡丹作記君謨閩人也故能識荔支而譜之因念昔人嘗有感於二物而吾二人者適各得其一之詳故聊書其所以然而以附君謨譜之末元張師䕫題荔支圖後至正癸卯燕㑹於宋氏之庭庭有古荔樹擅名宋香者世傳舊屬王氏黄巢兵過欲斧薪之王媼抱樹號泣賊憫之斫樹一斧而止荔子迄今核有斧痕蔡端明亦譜其畧時之相去五百餘年樹益向榮根本蟠踞層陰蔽顧㕘政公移席其下慷慨懷古酹以巵酒俾予摹寫詠歌之以紀良集明林環題荔支圖後莆中名産稱荔支為殊品而荔支之尤者惟陳紫宋香為特盛蔡公譜乘謂陳紫種出宋氏則宋香較之陳紫又其尤也樹距作譜時已三百䙫迄今又不知幾代洪武間相繼奪於戎衞之官宋子孫不克復者二十餘載迨永樂初年始返業於宋宋君文用者驟復而喜已又戚然懼其復失也一日持蔡端明墨蹟及張氏師䕫所作畫圖來徴記於余永樂乙未嘉平月書雜著增明徐􅎾紅雲社約清異錄云劉鋹每年於荔支熟時設紅雲宴余恒想其風致吾閩荔子甲於嶺南巴蜀今歳雨暘時若荔子花頭甚繁樹梢結果纍纍欲紅自夏至以及中秋隨早晩有佳品今約諸君餐荔支㑹善啖者許入不喜食者請毋相溷先定勝地名品以告同志平逺臺法雲寺白蜜二樹異品也必先半月向主僧買其樹熟時徃食本宗上人主之西禪中冠甲於城内外馬恭敏賜𦵏之所極繁極美馬季聲主之尚榦滿林香香倍衆品唯林氏有三五樹非至親徃求不得入城陳伯孺所居與林氏至近伯孺主之磨盤大如雞子高景倩東山别業有此種今歳生尤繁盛景倩主之鳯岡中冠為福州第一品必至其地始得選食但路隔一水非舟楫莫至謝在杭主之勝畫出長樂六都更有一種雞引子亦出六都同時而出在杭長樂産也再主之綠玉齋前新植一株楓亭種也今歳結實不甚多食畢足以他品余主之楓亭荔子名甲天下核小香濃一日一夜可達㑹城色香味未變周喬卿莆人也主之桂林一種味極甘美凌晨皆於萬壽橋貨鬻間有挑入城者吳元化鄭孟麟主之㑹只七八人太多則語喧荔約二千顆太少則不飽㑹設清酒白飯苦茗及肴核數器而已不得沉湎濫觴混淆腸胃每㑹必覓清凉之地分題賦詩盡一日之遊願同志者守之謝肇淛紅雲續約余自壬辰離閩丙午始返十有五年未獲噉故園荔子每一思之常津津齒咽間也迨丁未夏無荔即有一二僅慰足音未能果腹越歳戊申荔始大有年而社中諸子鱗次比集因思晉安此品甲於宇内幸而生長其地又幸而十七載始逢其熟也河清難俟髪且種種明年之馬首北矣可虛此日月乎於是社中諸子唱為餐荔㑹而不佞復條所未盡者如左以與同志者共守焉一初出市則新香可愛勿嫌味酸勿憚價貴當集同志一噉以開勝㑹之端一正滿市則光景難虚勿畏性熱勿憚㑹頻當連數日共噉以極行樂之趣一將罷市則殘紅可惜勿厭冷落勿憚搜尋當倒筐筥盡噉以成美事之終一譜志記載甚多㑹城種類有限沿街擔負皆園林採拾之餘村落家藏多耳目罕見之種跬歩所限終無染指之期一品未收已有遺珠之嘆凡我同志幸悉鄙懐或奇植異名傳乘弗載或家傳手蒔羔鴈所遺毋綸逺近各採數顆以廣異聞兼闡幽鬱宋珏雜紀余刻荔支食譜成即治越裝三月十五日也親朋相送北郭指荔子丹為歸期與妻孥别亦曰墻東一樹留以待我若東埔陳紫二樹余每嵗得飽噉者陳六郎書至謂子未歸吾東西樹不摘也無端留滯柘浦至六月既望舟始泊姑蔑城下先一日為寶陀大士現辰莆俗家有荔樹者届辰盡摘供養即在村落亦必滿擔入城雖霞墩楓亭東埔諸名品未盡熟然供養之餘因而飽噉者蓋多至廿日外諸名種次第堪摘過此則松蕾出千樹如晨星矣是一年得噉荔子者自五月晦前後造七月初旬僅可四十日耳無端客姑蔑復十餘日翹首故園數樹如白榆之在天上每與同行翁君譚及輙夜分不能寐翁曰休矣如此說食還能飽否明日傳其語於孫不伐不伐新都人問荔支之狀何若余曰難言也子不讀君謨譜乎亦曰殻薄而平瓤厚而瑩剖之凝如水晶食之消如絳雪又曰暑雨初霽晩日照耀緑葉絳嚢鮮明掩映數里之間焜如星火非名畫之可得而精思之可述然居易常為之圖君謨亦令崔殻寫生無已吾亦貎陳紫宋香以示君於是舟中無事東坡所謂指如懸搥者每畫一枚孫生拍掌大叱以為奇翁亦從傍嘆贊云咄咄逼真余笑謂翁如此饑看亦復飽人耶於是且寫且畫共得四十五枚色澤膚理與生無别但不能有香味耳因憶壬寅夏日客建州僧舍亦不得歸噉荔支偶見新安程孟陽墨寫荔支間以素馨數朶一面書殷司馬坐上飲荔支酒歌畫雖不類而歌奇古有韻堪為荔酒傳神且能以素馨相掩映此其人豈尋常也哉予憐其意口占一歌附方求仲徃今七年矣不知此扇已達孟陽及孟陽見歌以為何如也今既寫圖并録雜詩於左庶幾歸見親朋妻孥藉以解嘲或張之東埔樹下與六郎快讀一過不至移文相誚爾荔社約生閩海者未必皆見此果得見此果熟時得噉噉又得飽飽又得徧嘗名品此直探鮫人之宫入齊奴之室恣取其徑寸晶珠盈丈珊瑚以歸不容易也此吳越好事一聞生荔支者以耳為目復以耳為口涎垂至踵思褰裳濡足而無從也然世不乏好奇客竟未有越千里百里為荔支而至者乃土人耳目所慣恬不知寶晶珠珊瑚視與甘桃甜李無異余故有清福黑業之喻里中同好既稀食量亦罕每欲招數友結為一社如蓮社梅社之類亦復參差不果暮春方次道見過余預及之次道喜曰吾去夏客雲間苦憶此物今當不輕放過遂於六月六日先集林謙伯受伯之雀園約日一舉至荔謝而止夫以希奇靈異之物而能珍惜之留䕶之結以同趣集以嘉辰幕以濃陰浴以冷泉披以快風照以凉月和以重碧解以寒漿徴以徃牒紀以新詞雖跡溷塵壌而景界仙都身坐火城而神遊冰谷寧獨吳越好事遥想不得即白傅劈紫綃於南賔蘇翁薦虯珠於嶺表亦第無佛稱尊不能與我軰作敵明矣頌增明韓上桂荔支頌并序果之美者曰荔支余友鄧道協所著通譜詳矣徃時閩粤各矜其勝余謂兹果何必此兩鄉即瀘戎間固儼然稱南面孤也因憶白香山評語而為之頌頌曰歴稽羣植疇據奇觀果推香荔花侈牡丹或憎炎熱或苦凝寒弗易厥性惟土是安牡丹新聞荔亦晩出風雅罕傳騷篇恨逸迨漢迄唐二物吐色丹賞其葩荔珍其實余長荒嶠未審姚黄撫斯玩斯特嗜瓊漿花僅屑玉果乃稱王星羅霞布蓋擁幬張入掌珠瑩漬牙雪釋乍嚼怡神飽餐資液香味兼妍姿顔最惜櫛比駢聫充盤映席種先南海次數增城龍牙犀角壞瑋咸矜遥聞陳紫閩福尤名一經妃笑瀘産為輕扶荔宫崇側生賦重吾鄉九齡雄詞競諷亦有君謨譜分伯仲道協後興搜羅靡縱既操令品載省豪奴將離旁挺後勁寧孤天然作對白老匪誣置華旌實猗歟盛且龔之祥荔支頌世珍鮮荔曰色味香五日盡去逺曷能詳赬虯卵解白鳯膏結裝車與船奚聞芳澤爰考載籍遡厥本始時損其膚未隕其美二紀而實功成合抱冬夏青青松栢之操火徳離明蟲不敢近待人而採薑桂之性熟私其鄉根不踰域含章可貞匪枳其橘選樹而飽亦得美䕃清和宜人蕉風竹韻㫖口固爾比江瑶柱想格之高豈惟甘故饞者所嗜蝤蜶斫雪詎知微酸偏滋禪恱瀘戎下品猶津女妃矧伊烏石殊族呈奇嬙施之慕能不企而凡可以食鮮可以酒綠兮流液紅乎吾友誰其致之酌以大斗賦原漢王逸荔支賦暧若朝雲之興森如横天之彗湛若大厦之容鬱如峻岳之勢修榦紛錯綠葉蓁蓁灼灼若朝霞之映日離離若繁星之著天皮似丹罽膚如明璫潤侔和璧奇踰石黄仰嘆麗表俯嘗嘉味口含甘液腹受芳氣兼五滋而無常主不知百和之所出卓絶類而無儔超衆果而獨貴唐張九齡荔支賦有序南海郡出荔支焉每至季夏其實乃熟狀甚瓌詭味特甘滋百果之中無一可比余徃在西掖嘗盛稱之諸公莫之知而固未之信唯舍人彭城劉侯弱年遷累經屈南海一聞斯談倍復嘉嘆以為甘㫖之極也又謂龍眼凡果而與荔支齊名魏文帝方引蒲萄及龍眼相比是時二方不通傳聞之大謬也每相顧閑議欲為賦述世務卒卒此志莫就及理郡暇日追叙徃心夫物以不知而輕味以無比而疑逺不可驗終焉永屈况士有未效之用而身在無譽之間茍無深知與彼亦何異也因導揚其實遂作此賦云果之美者厥有荔支雖受氣於震方實禀精於火離乃作酸於此裔爰負陽以從宜蒙休和之所播渉寒暑而匪虧下合圍以擢本傍蔭畆而抱規紫文紺理黛葉緗枝蓊鬱而霮䨴環合而棼纚如蓋之張如帷之垂雲煙沃若孔翠於斯靈根所盤不高不卑陋下澤之沮洳惡層崖之嶮巇彼前志之或妄何側生之見疵爾其勾芒在辰凱風入律肇氣含滋芬敷謐溢綠穗靡靡青英苾苾不豐其華但㫖其實如有意乎敦本故微文而妙質蔕葯房而攢萃皮龍鱗以駢比膚玉英而含津色江蓱以吐日朱苞剖明璫出炯然數寸猶不可匹未玉齒而殆銷雖瓊漿而可軼彼衆味之有五此甘滋之不一伊醇淑之無凖非精言之能悉聞者歡而竦企見者訝而驚仡心恚可以蠲忿口爽可以忘疾且欲神於醴露何比數於甘橘援蒲萄以見擬亦古人之深失若乃華軒洞開嘉賓四㑹時當燠煜客或煩憒而斯果在焉莫不心侈而體泰信琱盤之仙液實玳筵之綺繢有終食於累百愈益氣而理内故無厭於所甘雖不貪而必愛沉李美而莫取浮𤓰甘而自退豈一座之所榮冠四時而為最夫其貴可以薦宗廟珍可以羞王公亭十里而莫致門九重兮曷通山五嶠兮白雲江千里兮青楓何斯美之獨逺嗟爾命之不逢每被誚於凡口罕獲知於貴躬柿何稱乎梁侯棃何幸乎張公亦因地之所遇孰能辨乎其中哉增宋李綱荔支賦并序張曲江嘗賦荔支美則美矣然未盡善也余來閩中始得食其生者因感而賦之其辭曰伊天地之大美種火徳於炎方結荔支之嘉實禀純氣於至陽含滋潤於雨露違嚴凝於雪霜碧葉素榮縹蔕丹房膚如龍鱗顆如裹嚢絳綃為殻白玉為瓤液貯甘露核藏丁香醞難言之妙味吐自然之清香此荔支之大畧也全而觀之亘如丹鳯之方卵而未雛破而窺之瑩如老蚌之既剖而見珠掇而出之粲如姣姬褪紅裳而露玉膚咀而嚼之㫖如瓊醴吸沆瀣而羞醍醐談辯莫及丹青難圖百果退避孰敢爭腴至如厥包橘柚先薦含桃嶺表龍眼西域蒲萄色沮情恧遜美推高矧夫剝棗浮𤓰來禽青李張公大谷之棃梁侯烏椑之柿曾何足以比萬分之一二哉秋夏之交蒸暑歊然畏景馳至薰風入絃著花結實耀日含煙一望萬株列於名園璀璨熒煌若繁星之麗天一食千顆置之華筵勻圓磊落若火齊之堆盤溢甘芳於齒頰實元氣於丹田宿酲可解沈痾可痊若夫色味與香變於三日曝之為乾漬之以蜜汎鯨海之巨航入金張之要室譬之神藥致佳人之尸千金市駿馬之骨氣格精神初不得其髣髴也昔者曲江嘗為之賦寓意卒章惜其不遇殊不知草木之性各安其土玩物喪志亦所不取開元之末妃子最憐萬里驛致來自蜀川死百馬於山谷望一騎而嫣然荔支則遇而天下病焉爰有狷介之士負罪逺謫適丁其時偶得而食不煩傳送之勞以資口腹之適快平生之素願飽珍味而無斁正猶衞懿不可以好鶴而幽人得之適所以増其逸阮籍之徒得全於酒而羲和湎淫乃廢時而亂日且食荔支此非我力荔支後賦并序宣和己亥歳余謫官沙陽次年夏始食荔支嘗為之賦後十二年歳在辛亥寓居長樂於今又四夏矣備嘗佳品究見荔支本末作後賦以訂之其辭曰客謂梁谿病叟曰玉局翁以荔支比江瑶柱與河豚豈其然乎病叟曰否擬人必於其倫惟物亦爾彼河豚與瑶柱在海物而推美厥臭惟腥厥狀惟詭藉薑桂之餘滋薦樽罍之芳㫖快一嚼而稱珍非鼎俎之正味何足以得荔支之髣髴也惟此荔支産於炎方綠蔕團團丹實煌煌香吐芝蘭液凝瓊漿色味兼美自然芬芳宛如佳人麗服靚妝冰肌玉骨錦衣繡裳又如明珠包裹絳嚢煥彩外耀皓質内光其品則有陳紫方紅江綠宋香細若雞舌赩若硫黄虎皮斕斑龍牙銳長蚶殻匾仄玳瑁文章皺玊豐膚星毬照江干類萬族不可殫詳夫豈瑶柱河豚之所能比方也客曰然則何物可以擬之病叟曰建溪臘茗仙草之英採掇以時製作惟精蒼璧忽破素塵乍驚甌汎霏霏之乳花湯候颼颼之松聲滌煩蠲渴愈病析酲此亦天下之至味也洛陽牡丹百卉之王鶴白鞓紅魏紫姚黄嫣然國色郁乎天香豔玉欄之流霞列錦幄之明釭價重千金冠乎椒房此亦天下之至色也相彼二物標格高奇名雖一槩種有多岐挈長度美可並荔支永叔君謨序而譜之如三國之鼎峙各擅據於一陲角力爭勝未可以決其雄雌也客曰臘茗牡丹則吾既得聞命矣敢問百果之中孰與為比魏帝方之蒲萄唐人推於緑李亦有謂乎病叟曰荔支之生厥土惟三西則巴蜀連亘嶠南肉薄漿多酸而不甘與閩粤之所産殆不可同日而談也漢貢南海唐驛西川皆荔支之下駟乃並騖於中原當時所見得其粗焉宜乎品藻之失而議論之偏試使閩粤者進則二果慙恧將遜美以推先而况其凡乎若夫洞庭之柑瓤凝玉雪清香潠手累日不歇苕霅之芡實侔珠璣咀嚼不倦玉池生肥思其次焉亦皆荔支之亞匹也然柑可食而不可多芡療飢而不療渴惟食多之益辦與飢渇之兼解微荔支吾誰與歸方將休影息蹤遺物離人倒冠落佩買山灌園植千種之陸離擇萬顆之勻圓上滋絳宫下灌丹田怡性養壽超然自得以盡吾之天年子能棄世事而從我遊乎客黙然慙逡巡而辭退范成大荔支賦并序紹興丙子夏有自行都餉貢餘新荔子者坐客稱歎窮山所未嘗有呼酒更酌鼔琴以侑之且為之賦時為新安掾吾聞南國之南水激而山蟠鍾具美於一物繄化工之所難撋絳綃以袨服襲蒨桃而中單湛冰明之漼漼粲玉粒之團團蓊生香之令芳泫仙液於微瀾走候置其萬里上玉宸與金鑾顧人間之流落纔千倉之一簞餉江南之病客索孤笑於顰端斥蜂蜜之黄膩謝佛桑之紅乾覺龍目之么麽咍蒲萄之甘酸藉以秋雲之巾薦以水晶之盤羞以燒春之浮醅相以流水之清彈迨風月之溫麗耿星河其未翻予一嚼而三嚥艶玉池之清寒恍醉夣之翾飛掖九天之風翰望涪江與閩嶺麾八極於雷鼾方㝠濛其路暗儵浩蕩其天寛岌芳宫與繡户窈玉聲之闌珊欵荔支之仙人若平生之所歡謂客子其少留紛擘綠而破丹招玉環於東虚御清空之䨇鸞訪長生之舊曲有千載之遺歎悵三山之囘風驚南斗之闌干亂梧竹之滿庭渺雲海之漫漫明胡宗華荔子賦登尉陀之荒臺過無諸之故墟覽山川之奇勝覩草木之瓌殊緋桃朱柿之焜煌江橙盧橘之榮敷或叢生於炎麓或秀發於海區名與味兮駢美香與色兮洵都信南方之異果或可貢於帝居惟荔子之佳品實中國之所無宜馳名於君謨之譜而見序於居易之圖也觀其氣受東震精禀南離陽明内蘊華采外施蟠蒼根於深固抱海氣之淋漓枝凝緗兮交暢葉染黛兮葳蕤逺而望兮如擎天之高蓋邇而矚兮若疊翠之重帷火流大地兮而清寒襲予霜凝絶壑兮而堅剛匪虧材孔大而合抱䕃低垂而從規揚芳聲於海嶼延清景於亭池寶之者無斧斤之及憩之者如雲庇之垂以側生而見毁何或者之罔知當其暴雨既霽凱風微凉花霏霏兮綴密穗實靡靡兮垂青房如韜光以自斂迨有積而後彰林鍾戒辰心星正陽膚凝脂兮皺殻肌斂玉兮含漿如英華之既發雖欲揜而難藏爛如彤雲之合歘如彩鳯之翔燁然疑火珠萬斛照金烏而晝見熻然訝神丹九轉射𤣥圃而流光堆於雕鳯之盤薦於晝錦之堂擘輕綃之絳膜吐明月之圓璫脣未沾而先嗑口既潄而尤香具甘滋之正味食雖餮而靡傷可以充席珍而娛賓客之奉可以薦籩實而格神祖之洋洋彼擬倫於甘橘徒以甜酸而見齒或比議於蒲萄信其謬說之荒唐也惜乎生於炎海之濱植於遐異之方去京華兮萬里瞻天門兮堂堂柳夾道兮江路遥桂倚巖兮天風長固末繇厠宸楓之列尚何能邊班筍之傍繄登薦之有時宜株守以自藏與媚妃嬪之笑兮寧培根枝於深固也與踣飛塵之騎兮寧分清蔭於草堂也務植徳以滋身願托根於南荒沐雨露之嘉澤爛雲霞以成章隨榮瘁之所遇囿生成於𤣥黄幸弗淆於凡草同腐滅於飛霜庶留名於譜牒垂百世而流芳蔣徳璟荔支賦若夫金椶栗玉虎斑龍牙麝囊椰鍾黑葉綠紗蚶殻朱柹星毬雞肝霞墩松蕾金線冰團牛心鵲卵淨瓶蜜丸夫固亞僕乎瀘粤然猶閩囿之下丹也徃者忠惠之書譴於方氏橋二百而為讖竟淪淹於鐸里維鐸及奕誕降嘉蕤延壽是孳祥井是氿移紫度緋法藍心恥流觀夫伏熸秋囘百荔垂瀸黛葆扈雲彤實射暹夜星晝燭圎蓋方陣譬若火烽其木不燼又若琅玕萬斛鳯丸離離芸風氣聞千歩又若洛媛含辭未吐寒泉三尺渫浴天芳又若合徳初出蘭湯廣上圎下皓肪中没又若宜主柔溫無骨霧綃半劈醴津斯皬襲漿斯落又若吉雲露珠一勺昶膜醲英又若水晶槱核焦封又若丁香應啜灰滅又若甜雪留芬射越弛服墜裾又若茵墀流汁入渠故其冬青春榮之性絳襦玉膚之狀駁犖辬艶之妝蠲渇補髓之湩亮羣族之所伏嗟難得而覼况是以釵頭盛鬋䨇髻奉襡王娘鄣袂將軍􅗙鐲服其實者挹膏潄瓤為荔羡偓昔扶荔之宫積草之池金明揺風十不一易若乃洛陽置於嶺南長安盡於巴蜀法部初哇明駝暗䎘撫酸苞而虚憐悵珠靨之已秃悝嬌環之解笑固以瑊玏為結緑忠惠之書􅚹二産汰閩江之􅀈馤未若兹種羃歴乎三十二之外重曰震氣五滋狎獵的纚生代巧兮荅遝蚌胎誰其冠者繄延壽兮元鼎風堠宣和航瓦珍非質兮皇罕連賨願登上林比禹橘兮林古度荔支賦吾閩佳果有荔支焉歴代稱美百莫能先産既炎土生復炎天為樹嘉蔭為花細妍及其成實外赤中鮮纍纍若若紅香滿前其品固貴其質可憐衆彼名號後人强鐫雜沓瑣屑荔不必然荔之為物别有自全勿翦勿伐匪原匪田厥根厥本亦風亦煙不知唐室取媚㛹娟致勞驛騎反以為愆非荔之過由人所牽君子終諒不倚不偏既充甘食亦奉華筵一切種類畢莫能賢雖足珍兮未敢自專世所尚兮桃棗成仙爾表爾裏色味相兼粤酸蜀澀鼎足殊懸三都見侈萬古難捐漢王唐張兩賦爭傳予曷能贊億萬斯年黎遂球荔支賦粤客居吳食其楊梅趨裝度嶺不忘荔支吳儂請留荔脯當貽客謂吳儂譬如蛻尸顔色既變滋味亦非於時設酒銅坑喧相接客為言其故送子得發客曰吾家海上蓼水板橋為園數畝鑿池通潮上植嘉樹外被良苖晴氣如薰宿雨既朝荔支垂垂目圍樹腰於是紅染鸞頸大倍龍目重五小至蒸然盡熟外若火珠内足香玉核不煩鑽無骨皆肉當吾睡起曳屐旋旋手摘目選坐樹似眠幼弟就告似此必甜持以奉母自試果然飽能避穀飫復垂涎晶丸彈脱霞袋蟬連因占朱紱解以形鹽却老還童顔芳色妍相如已渇留侯得仙飼鳥皆肥如花特鮮則有為圃之叟種樹之子異種新得乞鄰掠美提筐出袖匾翠負紫好云更繼急或就採佳必待期異不入市名類匪一有因而起而吾園之所植其名黑葉低枝濃暗土膏屯結實不裹刺色若血珀瓊液内凝綘衣欲裂樽肩壺腹龍鱗龜坼剝而呑之融冰沃雪爾乃吾夢還家北堂之南新得一姬其名玉環體若荔膚紅裁荔衫息氣荔香囓脣荔甘又善選擇手持荔籃長歌娛母祝荔宜男則有麻姑仙女臨渡海水投吾古方餐花不死衆卉可收獨難荔蘂蝶翅如飴蜂醸將醢繞樹䕶持設餳祭醴如妾待年他花則妓又有羅浮仙伯愛吾詩脾來惠丹粒和水噴滋遂令吾樹四時皆宜雪瓣紛郁朱實參差曰予之歸行不虞遲客語未竟吳儂爭言願贈予夢隨歸子園珊瑚小舌寄頰應存四坐聞之涎湧泉源亟賣楊梅贐客以錢文賦散句增漢司馬相如上林賦隱夫薁棣荅遝離支羅乎後宫列乎北園魏文帝詔南方龍眼荔支寧比西國蒲萄石蜜乎晉左思蜀都賦卬竹緣嶺菌桂臨崖旁挺龍目側生荔支布綠葉之萋萋結朱實之離離迎隆冬而不凋常曄曄以猗猗吳都賦其果則丹橘餘甘荔支之林御定佩文齋廣羣芳譜卷六十一
