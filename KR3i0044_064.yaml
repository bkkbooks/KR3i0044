body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷六十二果譜荔支三集藻五言古詩增梁劉霽荔支叔師貴其珍武仲稱斯美良由自逺致含滋不留齒宋梅堯臣和答韓奉禮餉荔支韓盛人所希四海餽名物韓復未疎予分珍曾不一莆陽荔子乾皺殻紅釘宻存甘尚可嘉夲味固已失遥思海樹繁帶露摘初日安得穆王駿能置萬里疾原劉攽荔支南州積炎徳嘉樹凌冬綠薰風海上来丹荔迎夏熟煌煌錦繡林亭亭翡翠屋鵠頭爛晨霞天酒瑩寒玊流聲感華夏採掇如不足開元百馬死漢堠五里促君王玊食間此薦知不辱迨今糟粕餘猶足驚凡目憶初成上林四方㑹竒木使臣得安榴天馬来苜蓿擢身自幽遐託地幸滲漉我欲咎真宰喟兹限荒服將非名實雄百果為羞縮區區化工意聊爾存衆族增文同謝任瀘州師中寄荔支有客来山中云附瀘南信開門得君書歡喜失鄙吝筠籨包荔子四角俱封印童稚瞥聞之羣来立如陣競言此佳果生眼不識認相煎求拆觀顆顆紅且潤衆手攫之去爭奪逓追趂貪多乃為得廉恥曾不論喧閙俄頃間咀嚼一時盡空餘皮與核狼籍入煨燼鄧肅看荔支荔子有佳品乃在府城東我来方秀發紅雲幾萬重遥知香味色已具碎花中凭欄一念足不食意自充人世如夢耳當體色即空謂是為真實便可侑千鍾謂是為非實真飽亦何從虛實兩無有樓髙雨濛濛元林士敏詠宋家香荔支江南有嘉植託根在庭除扶持王母力珍重端眀書君家忠孝門餘澤尚沾濡子孫貴封植慎勿忘厥初明沐璘咏晉安荔支建水夫何如厥土早而熱蠻花開佛桑候禽罷鶗鴂莽雲覆溟濛梅雨滋霠翳接地茂緗枝遮空舒黛葉翠葆霞焜煌錦幄風掀掲香麝忌經過飛鶹防盗竊勁雛赤膚脫肥奢瓊瓤凸明璫怪可餐冰丸訝許嚙真珠堆緑雲玳瑁垂綵纈鳳爪天下竒龍牙衆中傑飽食慚素餐長吟望林樾林垐饋髙宗吕鳳池超荔支夲非凡品類超出鳳池羣自恨所居僻逺在瘴海濆至性耐煩熱丘園絶垢氛中含氷雪姿外纈紅錦文雨沾日已滋林髙爛紫雲龍牙尚莫敵蚶殻徒紛紜禽鳥不敢啄晨夕候之勤起盻草亭前日日来南薰故人邈難見愁思劇如焚縱有一尊酒獨酌未成醺新摘不滿筐持贈将微芹封之吟不就無奈正思君謝肇淛五月十日初嘗火山荔支五月猶未半輕紅已出市磊磊朱葳㽔乍疑晨星墜雖無膏腴肪已勝醇酪味碧玉初破瓜珠胎尚含淚襦薄不禁風肌細還愁穉跫然足谷音始知希者貴鄧道協霧居園噉中冠荔支火山出未乆中冠繼其後裛露蒂猶青緑衫裼紅袖齒頬有餘酸膏腴尚未厚措大性所宜拏攫不停手琴瑟雖未調亦已勝瓦缶酸盡回㣲甘佳境漸入口岸幘發浩歌孤月上髙栁積芳亭噉蜜紅荔支分得藥名袒卧桂枝林紅雲實已羙酸漿猶殢人餘甘遂溢齒寒氷片片飛丹液巨勝爾殘香附筠籠擲地黄間紫劇談幸從容天半夏雲起預知佳味深早當歸故里髙景倩齋頭啖鑛玊荔支賦得漢人名詩夏季布華筵鑛玊陳蕃枝輕黄香四座殷朱浮青絲出井丹液凉雪竇融凝脂楊盧植上苑桃李廣西陂未若三伏生微寒朗侵肌吾曹操彩筆揮霍光陸離餘甘寧可忘向子長相思買莆田陳家紫一日夜直抵㑹城招諸子同賦閩海荔若雲遝荅布山谷列品七十餘陳紫擅其獨末銳廣兩肩核焦埋深緑此種出莆陽祕書閉門鬻寥寥五百載接枝彌蕃育在山豐年玊岀鄉荒年榖六月火雲蒸紅塵勞急足朝採楓亭林暮走馬江瀆旦起日初髙葳㽔爛盈目翠籠未開椷流香已滿屋飛燕雪中膚太真風前浴色味不可名但知果吾腹敗襦委芳草遊蜂尋殘馥中冠慚後塵桂林甘雌伏勝畫浄江瓶三分堪角逐異品固不常勝會亦難續何時從九仙飽噉壺山麓陳价夫髙景倩齋頭啖鑛玊荔支各賦漢人姓名垂楊修竹下歌鍾㑹羣英門杜衆賔進譸張飛兕觥扶疎廣庭樹顆顆垂黄瓊朱李固難並况乃髙堂生在谷永殷繁出郭太縱横楚江乙萍實何足揚雄名徐􅎾五月十日初食火山荔支仲夏氣􅓹蒸輕紅綴荔子厥種名火山早熟差足喜色香雖未全驟食亦清美不患甘傷脾且愛冷沁齒已勝餐来禽猶堪敵青李聊爾為先驅次第飽陳紫欲結林下􅉀請從今日始十七日集鄧道協新居食中冠荔支新居初落成荔子熟已半梢頭覓早紅正品得中冠摘来恱我口彷彿眀星爛始食味尚酸浃背有微汗小者猶若珠大者已如彈嘗新頗不厭錦殻堆几案輕風送晩涼清香廽鼻觀置堠無飛塵不作蘓子歎髙景倩齋中食鑛玉荔子賦得漢人名詩江陳萬年種夏景丹顆垂檀欒布鑛玊香甘始當時千枚乗露摘盆子盛纍纍諦審食其實核焦延夀宜楊盧植太酢青李尋傷頤綺疏受殘照林髙相蔽虧盤桓譚轉劇三伏湛凉颸曹學佺石君亭噉荔嘲俞羡長纍纍荔子實采采動盈抱漫論市上錢詎秘林間寳充兹石君羞展彼山泉澡量腹受幾何百千恣傾倒齒牙沁甘露毛羽生難老嘗聞丹經言効驗良可攷使人美顔色長似少年好為問羡門長何如𤓰大棗七言古詩原宋蘇軾四月十一日初食荔支南村諸楊北村盧白華青葉冬不枯垂黄綴紫烟雨裏特與荔子為先驅海上仙人絳羅襦紅紗中丹白玊膚不須更待妃子笑風骨自是傾城姝不知天公有意無遣此尤物生海隅雲山得伴松檜老霜雪自困楂棃麤先生洗盞酌桂醑氷盤薦此頳虯珠似開江鰩斫玉柱更洗河豚烹腹腴我生渉世本為口一官乆已輕蓴鱸人間何者非夢幻南来萬里真良圗荔支歎十里一置飛塵灰五里一堠兵火催顛坑仆谷相枕藉知是荔支龍眼来飛車跨山鶻横海風枝露葉如新採宫中羙人一破顔驚塵濺血流千載永元荔支来交州天寳嵗貢取之涪至今欲食林甫肉無人舉觴酹伯游我願天公憐赤子莫生尤物為瘡痏雨順風調百榖登民不饑寒為上瑞君不見武夷溪邊粟粒芽前丁後蔡相籠加爭新買寵各出意今年鬬品充官茶吾君所乏豈此物致養口體何陋耶洛陽相君忠孝家可憐亦進姚黄花增蘇轍奉同子瞻荔支歎蜀中荔支止嘉州餘波及眉半有否稲糠宿火却霜霰結子僅與黄金侔近聞閩尹傳種法移種成都出巴峽名園競擷絳紗苞蜜漬瓊膚甘且滑北逰京洛墮紅塵箬籠白曬稱最珍思歸不復為蓴菜欲及炎風朝露勻平居著鞭苦不早東坡南竄嶺南道海邊百物非平生獨數山前荔支好荔支色味巧留人不管年来白髪新得歸便擬尋鄉路棗栗園林不須顧青枝丹實須十株丁寧附書老農圃陳襄荔支歌番禺地僻嵐煙鎖萬樹纍纍産嘉果漢宫墜落金莖露秦城散起驪山火炎炎六月朱明天映日仙枝紅欲燃自古清芬不能遏留得嘉名為椹仙上皇西幸楊妃死巒海迢迢千萬里華清宫闕閴無人南来不見紅塵起至今榮植徧閩州離離朱實繁星稠一日為君空變色千里憑誰速置郵可憐錦幄神仙侣為飲凝漿滌煩暑綺筵不惜十千錢酩酊秦樓桂花醑秦樓女子繡羅裳鳳簫鳴咽流宫商醉歌一曲荔支香席上少年皆斷腸鄧肅風雨損荔子前日雨聲如隕石昨夜風狂退六鷁荔子吐華漫如雲結實定知無十一南来無以慰愁煎端期一飽果中仙山頭看花日千轉黙想香味空流涎事類翻羮慎勿恤風雨在天非人力要及豐年天下同那為海邦私一物原陳與義荔支歎炎精孕秀多靈植荔子佳名聞自昔綘嚢剖雪出琱盤尋常百果無顔色閩天六月雨初晴星火熒熒耀川澤歘如彩鳳戯翺翔爛若彤雲堆翕爀中郎裁品三十二陳紫方紅冠儔匹鹽蒸蜜漬尚絶倫啄瓊空羡南飛翼我聞政和全盛時貢輸不減開元日涪州距雍已云逺况此奔馳来海側繡衣使者動輶車黄紙封林徧阡陌浮航走轍空四郊妙品人間無復得上方供給只纖毫徃徃盡入公侯宅驪山廢苑狐兎静艮嶽新宫鼙鼓急繁華今古共淒凉遶樹行吟悲野客西風刮地黄塵昏一聼悲笳䨇淚滴増朱松江彦允約逰東山作荔支詩次韻天工傾倒不餘力惟有荔支香色君家桃李要争妍腸斷鬢絲禪榻客書生瓮俎天所支煮茗誇妓非良規腹饑衣寒君不忍看詩喚作東山嬉氷盤綘實光照市歸来香滿巫陽袂明日人傳玊蘂仙絶勝空賦青龍柿楊萬里荔支歌粤犬吠雪非差事粤人語冰夏蟲似北人氷雪作生涯氷雪一窖活一家帝城六月日亭午市人如炊汗如雨賣氷一聲隔水来行人未喫心眼開甘霜甜雪如壓蔗年年窨子南山下去年藏氷減工夫山鬼失守嬉西湖北風一夜動地惡盡吹北冰作南雹飛来嶺外荔支梢絳衣朱裳紅錦包三危露珠凍寒泚火傘燒林下成水北人藏氷天奪之却與南人消暑氣王十朋詩史堂荔支歌君不見詩人以来一子美暮年流落來夔子賦詩三百六十篇西瀼東屯客愁裏何人作堂畫遺像收拾光芒榜詩史堂前何有有荔支樹猶未老熟獨遲世人貴早不貴晩倘非我輩誰賞之涪陵昔遇妃子汙萬顆包羞莫能訴瀘戎一經少陵擘至今傳誦輕紅句少陵傷時淚成血一㸃丹心不磨滅散成朱實滿炎方風味如詩兩竒絶樂天曾畫忠州圗自言香味人間無君謨亦作閩中譜陳紫聲名重南土何如詩史堂前株正是一飯孤忠餘人為世重物亦重端如丈人屋上烏巴圗閩譜合避路奚用品第紛錙銖攙先熟者如楊盧但可與之作前驅閩娘十八婢妾爾將軍大樹真慵奴我生四百餘年後来作先生逰處守登堂三嘆荔正丹聊效栁人祠子厚安得先生今復生添賦䕫州歌一首要使荔支之名長不朽詩史堂前荔支晩熟而佳約同官共賞偶成參差摘實分餉用前韻詩史堂前荔支晩尤羙髙壓瀘戎與妃子姓名猶未聞峡中風味惟應似皮裏試將逺况江瑶柱正似騷人擬良史我來嘆息頤屢支殊方爭獻惟恐遲汝今已晚何用好不是少陵誰目之貴妃逰魂遭血汚玊座悲懐何以訴惟有雲安再拜人觧悶夔州兩絶句遺像空存食不血滿目煙霞眀自滅何人種此星幾終一樹團團味竒絶君不見南賔木蓮有華何足圗樂天過慮重看無又不見洛陽牡丹妖艶何足譜六一區區記風土天生此果更此株夏日之時見子餘晝疑炎方張火傘夕訝庭樹栖赤烏䨇頭瑩若玊一㲄細骨輕于錢五銖陳江閥閱如雀盧兹産于閩必爭驅大無中邊甜勝蜜醖釀不假蜂為奴永安宫西郡堂後折簡呼賔老太守時方炎熱㑹苦稀事好乖違意徒厚手摘髙枝贈丹實歌和前篇搔白首嗟一餉之樂兮天亦慳于老朽病中食火山荔支前年䕫州食荔支同僚共賦輕紅詩妃子名園世所貴不似詩史堂前竒去冬分符向南土半月身行荔支圃三州嘉木皆眼見更閱君謨向来譜臨漳一種名火山品雖云下熟則先從今慚入荔佳境陳江未擘先流涎老病餘生怯佳果日㗖那能三百顆殷勤未破綘紗嚢心火驚添火山火劉克莊和南塘食荔歎君欲和詩無匆匆唱首天下文章公今年荔子况倍熟亭亭錦葢髙張空猿偷鴉啄牧童采林間殘顆猶殷紅在昔唐家充嵗貢吟諷何止杜陵翁南窮交州西蜀土快馬䭾送如飛龍絳裳氷肌初照眼玊環一笑恩光濃惟閩以逺幸免涴一顆不到温泉宫自從陳紫無真夲皺玉晚出尤稱雄邇来雞舌擅瑰瑋贊香譽味萬喙同麟臺仙人親題品天為此果開遭逄乃知微物似有數聲價亦與時汙隆列聖儉徳被華戎微如淮白不敢供奈何置驛奉私室安得木鐸觀民風山蹊谷塹日力窮血肩踠足馳筠籠請公移此食荔嘆置在薫風殿閣中楊胐玉泉院荔支軒曾觀荔支圗幾費丹青妝能紅能紫亦能緑不能冩作天然香曾讀荔支譜品品堪第一較量滋味論髙低大抵聞名不聞實我疑真宰推化工安排百果分番紅杏梅桃李不足數先教碌碌随春風錦囊玊液相渾淪百果讓作東南元别有真香與色味一時分付荔支軒元吳莱荔支行寄王善父炎雲六月光陸離人在閩南餐荔支荔支日餐三百顆紅緑亞林欺衆果綘羅繫樹蠟封蔕尚食擎盤獻青瑣涪州嵗貢與此同意欲移根来漢宫天生尤物不用世沾灑䗺雨吹蠻風蠻風䗺雨振林藪西域葡萄秋壓酒勸君莫近楊太真傳說驪山塵汙人眀文徴明新荔篇并序常熟顧氏自閩中移荔支數夲經嵗遂活石田使折枝驗之翠葉芃芃然不敢信也以示閩人良是因作新荔篇命璧同賦錦苞紫膜白雪膚海南生荔天下無鹽蒸蜜漬失真性平生所見唯萎枯相傳尤物不離土畏冷那得来三吳顧家傳来三四株桂林翠幄森森殊逺人無憑未敢信持問閩士咸驚呼還聞纍纍生數子絳綃裹玊分明是未論香色果如何只說形模已珍美千載空流北客涎一朝忽落饞夫齒白圗蔡譜漫誇張文飾寧如親目視飽啖只於鄉里足鮮嘗漸去京師邇不須更作嶺南人只恐又無天下痏朝来自訝還自疑事出非常有如此雖云逺附商船達不謂滋培遂生活始知生物無近逺故應好事能回斡卉物聊占地氣遷造化竟為人事奪仙人本是海山姿從此江鄉亦萌蘖由来沃衍說吾鄉異品珍嘗曾不乏不緣此物便增重無乃人心貴希濶福山楊梅洞庭柑佳名乆已擅東南風情氣味不相下稱絶今兼荔子三黄謙荔支篇江南五月海氣熱南國荔子垂堪折裊裊溪風散麝香𡨕㝠山雨流猩血飛樓清簟留衆賔屠羊貰酒酬芳辰黄頭奴摘登君席四座果核難為鄰朱櫻非貴馬乳非珍頓令玊液生口角何怪驛騎飛紅塵紅塵赤日驪山路天梯石棧年年度但博玊環嬌勝花寧問丁夫汗如注鸞旂西指愁逺天斷腸回首各風煙馬嵬新魂忽寂滅涪州舊樹空駢鮮君不見汴州艮嶽花石岡朝為逰苑暮淒凉朱季和題宋氏荔支蔡公譜張老圖宋香品第世絶殊亭亭嘉植榮且敷巢兵欲斫炊行厨王媪抱樹命與俱尤物幸爾留根株宋氏老人八十餘得之即此營世居五百餘禩枝葉舒清隂如幄垂庭除薰風時来蘭麝如赤日照耀珊瑚珠桃紅籠出白雪膚斧㾗著核留真模異香竒味天下無有孫文用羙且都撫之愛䕶如瓊琚故家喬木多摧枯雲仍世守應無虞林希哲題宋氏荔支吾莆名果鮮荔支君謨有譜世所知陳紫方紅固為貴宋香品彚尤珍竒六月炎歊日正長纍纍緑葉垂絳囊薰風微度疎林晚比鄰猶覺聞清香核上儼若斤斧㾗兹事竒怪難評論云是當年巢冦亂欲代其枝投㸑焚皤皤老嫗以身庇天然幻出斯靈異至今又歴數百年後人培植當留意謝肇淛食火山荔支次王龜齡韻天香國色奪燕支妝鏡臺前哦新詩纖纖素手為君擘翠袖紅繒䨇鬬竒吳中楊梅色如土仙種應須出懸圃冰雪曾看工史圗姓名盡入端明譜四月五月紅滿山未采百鳥不敢先先鋒一出便壓市明珠已引饞龍涎投老菟裘計未果莫惜銅錢沽百顆蘧然一覺心清凉卧㸔疎楊度螢火陳伯孺餉滿林香荔支同賦柏梁體六月七月苦煩蒸袒衣跣足頭鬅鬙病肺消渇同茂陵故人相遺玊壺冰函開未開香騰騰黄衣緑鬟嬌自矜廣顙豐頤薄如繒輕綃初觧脂膚凝甘液沁口不可勝方山此種天下稱浮江百里青絲縢香色雖減猶峻嶒野人雄饕擅絶能斯須劈盡玊山崩敲詩莫厭挑殘燈浮生踪跡殊無恒徐􅎾食火山荔支同用王梅溪韻昨夜聚首餐荔支狂来五字哦新詩今辰翠籠又擎到别有一種尤珍竒根株藝植同一土易熟離離滿園圃本支已識分廣南不待按圗翻舊譜異名嘉實雖滿山定讓此品来争先嘗新既喜早一月氷盤擘啖流饞涎乍食無多腹不果三百青銅沽百顆相期同到鳯凰岡天柱梢頭赤如火再次王梅溪前韻日長竹枕頭懶支飽食細誦龜齡詩四百年中幾人和句法難比前賢竒粤南有種到閩土栽種得宜推老圃笑殺永嘉韓彦直如許木奴亦作譜竊幸閒身居故山得食豈必論後先吾儕愛嗜同沆瀣俗輩忌食寧流涎今兹結盟訂已果更賽瓊丸闘珠顆陳紅江緑熟尚遲莫笑饞夫急如火過在杭積芳亭適伯孺送方山滿林香至積芳亭外將斜舂科頭箕踞當長松敲門傴僂来老農一肩翠籠遥函封葢頭新葉青茸茸此種産自五虎峰纍纍千顆香氣濃剖開瓊液凉心胸桂林鑛玊并金鐘夙稱異品今凡庸嬌如窺簾少女容黄衣縁裏光重重微風披拂林杪衝隔墻悞殺尋花蜂雄饕勇噉皆可供鼓腹不用營朝饔俞安期曹能始荔閣噉荔子歌曹園古荔滿林壑中連䨇樹如團幕間葉紛疑火齊生垂枚定道紅星落主人抗樹起髙閣荔子環如挂瓔珞紺紫纍纍髙下懸朱丹㸃㸃東西錯千枚任摘雕䦨前金盆沃浸青琳泉香觸何知屢嚥唾口饞便覺䨇流涎須叟裂却丹霞殻剖出冰肌皎于玊薄綃淺綘卸中衣滑澤光瑩恣餐足牙後深甘玊女肪喉間不饜楊妃肉一時遽盡三百枚通靈已覺成仙胎毛髄初疑換丹藥羽翰輙欲升瑶臺漳州大橘大如盎甘羙不如何足想吳越楊梅豈之甘較之仙味寧不慙龍眼猶令奴作匹其餘瑣瑣安足述海内如推百果王鮮食荔支終苐一五言律詩增唐鄭谷荔支平昔誰相愛驪山遇貴妃枉教生處逺愁見摘来稀晩奪紅霞色晴欺瘴日威南荒何所戀為爾即忘歸原宋蘇軾食荔支并引惠州太守東堂祠故相陳文惠公堂下有公手植荔支一株郡人謂之將軍樹今嵗大熟嘗噉之餘下逮吏卒其髙不可致者縱猿取之丞相祠堂下将軍大樹傍炎雲駢火實瑞露酌天漿爛紫垂先熟髙紅挂逺揚分甘徧鈴下也到黒衣郎增戴復古謝趙景賢送荔支荔子固多種色香俱不同新来嘗小緑又勝擘輕紅大嚼思千樹分甘僅一籠嘗觀蔡公譜夢想到莆中眀王㳟詠荔支憶昔開元日繁華御裏看玊環天上去無復到長安香沁瓊漿冷紅垂火齊團九重思玊食馳貢未来難陳憲章錢塘荔圃錢塘四月尾荔子正垂丹不異炎方戲無因聖主看微風香井落細雨壓樓闌蔡老應憐汝名家譜可刋求荔支栽貞節堂髙榜近東溟朝光滿北楹欲便清晝睡須待綠隂横名木從誰假幽居頼母成君家多黑葉火急送䨇莖王世貞謝邵都閫惠荔支朝来逄驛騎香色滿䨇函野老慙推食将軍為絶甘瓤㸔澄露瀉枝憶紫雲酣寂寞華清在何人走劍南郭子章荔支四首榕樹環山郭離支列省衙妍姿當六月神品壓三巴露炫金莖爛日融火齊斜誰評紅與緑猶自說江家凌冬還釀秀盛夏轉芳菲艶吐千家色熟㸔百鳥肥珠房朝采郁錦殻曉霞輝惟植炎荒逺徒勞笑貴妃鮮疑排鶴頂燦若謝雞冠詎謂薇垣紫翻羅荔子丹低垂裝翠幌錯落襯金盤瓊漿堪入口頓令頬齒寒雨後光逾碧風中韻自𤣥著隂無隙地飛焰欲横天香沁琴書潤味争醴酪妍忠州圗畫在靈羙詎能傳閔齡啖荔支避暑風軒下金盤劈荔支可憐分寵日至是渥丹時香褪紅衣膩膚凝碧玊脂朱顔難自固中赤向君披陳仲臻荔支果中稱異品色味世間無遇夏香尤盛經冬葉不枯楊梅真作僕龍眼合為奴昔日宣和殿移根植幾株纍纍蒸雨熟顆顆向陽酣錦殻硃慙色清香蜜譲甘防偷揺夹竹分摘貯鈎籃此地無名種猶堪勝嶺南徐􅎾六月四日鏡瀾閣食桂林結夏過髙齋乗凉與客偕會尋扶荔勝品得桂林佳白傅圗珠顆閩娘落繡鞋閒来徴舊事半可續齊諧曹學佺雨中望隔岸荔支驟雨来青嶂千枝蘸碧波却驚流火駛已覺洗紅多沆瀣盤為玊流蘇帳作羅薄言將采采臨眺意如何林叔學詠緑核荔支氷膚藏異質佳品擅江南荳蔲輕霞䕶葡萄片雪含却疑金谷換應使蕚華慙剖出天然色江家映始堪鄭紱詠小陳紫紫夲陳家勝齊名肯易降品雖稱第二質自擅無䨇清馥應欺宋芳姿已壓江冰盤時並薦霞彩射雕窻詠皺玊佳品呈赬璧誰云巧製成痕疑風􅕚細紋受露溥明祗訝沽猶璞非闗琢未瑩仙羣留不住掌上擘時輕七言律詩增唐白居易重寄荔支與楊使君時聞楊使君欲種植故有落句戲之摘来正帶凌晨露寄去湏慿下水船映我緋衫渾不見對公銀印最相鮮香連翠葉真堪畫紅透青籠實可憐聞道萬州方欲種愁君得喫是何年鄭谷荔支樹二京曾見畫圗中數夲芳菲色不同孤棹今来巴徼外一枝煙雨思無窮夜郎城近含香瘴杜宇巢低起暝風腸斷渝瀘霜霰薄不教葉似灞陵紅曹松南海陪鄭司空遊荔園荔支時節出旌斿南國名園盡興逰亂結羅紋照襟袖别含瓊露爽咽喉葉中新火欺寒食樹上丹砂勝錦州他日為霖不將去也須圗畫取風流徐夤荔支二首朱彈星丸燦日光緑瓊枝散小香嚢龍綃殻綻紅紋粟魚目珠涵白膜漿梅熟已過南嶺雨橘酸空待洞庭霜蠻山蹋曉和煙摘拜捧金盤獻越王日日薫風捲瘴煙南園珍果荔支先靈鴉啄破瓊津滴寳器盛来蚌腹圎錦里只聞消醉渇蘂宫惟合贈神仙何人刺出猩猩血深染羅紋徧殻鮮宋徽宗宣和殿荔支宻移造化出閩山禁御新栽荔子丹玊液乍凝仙掌露絳苞初結水晶丸酒酣國艶非朱粉風泛天香轉蕙蘭何必紅塵飛一騎芬芳數夲座中㸔趙抃詠提刑邢夢臣度支連理荔支嘉陽天逺被薰風荔子呈祥郡館中庇夲莫將慈竹校媚時寧與瑞蓮同並柯晝聳煙光動異幹宵空月影通竒木幸逢真賞筆誰誇丹實一庭紅蔡襄和曹殿丞寄荔支荔子凝丹摘曉鮮江南来路與雲連託根曾是三山下結實應歸萬木先鄉國逺攜甘㫖重宴堂分玩色香全清才仍更傳新唱一一驪珠照眼圎興化軍曹殿丞荔支厚葉纎枝新絳囊使君分寄驛人忙彩毫封處曾留意筠籠開時不減香風色甚豪應少損路程差近得分嘗閩州縱有千千樹未抵家園氣味長謝宋評事荔支齋館從容接燕申每臨佳樹走觥廵兵鋒却後知神物年夀髙来况主人並賞昔聞思故友分甘今喜奉慈親豈惟特祝公難老兼欲靈株比大椿原劉攽荔支錦筵火齊滿金盤五月甘漿破齒寒南國已随朱夏熟北人猶指畫圗㸔煙嵐不續丹櫻獻玊座空悲羯鼓殘相見任誇䨇蔕美多情莫唱水晶丸增文同和張推官荔支長嗟珍果滯遐方好種華林奉帝王夏簟滿風羅秀色曉梯乗露摘新香潑霞乍染愁將變烹玉纔凝忍更嘗正在臨卭消渇甚忽蒙佳惠敢相忘蘇軾次韻曽仲錫承議食蜜漬生荔支代北寒虀𢷬韭萍竒苞零落似晨星逢鹽乆已成枯腊得蜜猶應是薄刑欲就左慈求拄杖便随李白跨滄溟攀條與立新名字兒女稱呼恐不經再和曾仲錫荔支栁花著水萬浮萍荔實周天兩嵗星夲自玊肌非鵠浴至今丹殻似猩刑侍郎賦韻窮三峽妃子煙塵動四溟莫遣詩人說功過且随香草附騷經次韻劉燾撫句蜜漬荔支時新滿座聞名字别乆何人記色香葉似楊梅蒸霧雨花如盧橘傲風霜每憐蓴菜下鹽豉肯與葡萄壓酒漿回首驚塵巻飛雪詩情真合與君嘗原黄庭堅廖致平送綠荔支為戎州第一王公權荔支緑酒亦為戎州第一王公權家荔支緑廖致平家緑荔支試傾一杯重碧色快擘千顆輕紅肌潑醅葡萄未足數堆盤馬乳不同時誰能同此勝絶味唯有老杜東樓詩増唐庚和程大夫荔支家在岷峩飽荔支十年逰宦但神馳側生流落今千載入貢稱珍彼一時定自不將凡果比如何偏與瘴煙宜白頭莫作江南客辜負山中故友期曾幾荔子異方風物鬢成斑荔子嘗新得破顔蘭蕙香浮襟觧後雪冰膚在酒酣間絶知髙韻輕瑶柱未覺豐肌病玊環似是看来終不近寄聲龍目儘追攀福帥張淵道送荔支豈無重碧實瓶罍難得輕紅薦一杯千里人從閩嶺出三年公送荔支来玊為肌骨凉無汗霞作衣裳皺不開莫訝闗情向尤物厭看緑李與黄梅劉子翬荔支挺秀窮荒嘆未遭昔賢吟賞著風騷縱班盧橘材非偶不近長安價愈髙煙雨萬株遥若畫塵埃一騎笑徒勞琱盤此日無遺選品格妍媸敢自逃炎蒸午枕夢滄浪落落星苞喜乍嘗筆下丹青千品色釵頭風露一枝香雞冠借喻何輕許馬乳爭名固不量值得當時妃子笑驪山千古事淒凉楊萬里走筆謝吉守趙判院分餉三山荔支吾州五馬住閩山分我三山荔子丹甘露落来雞子大曉風凍作水晶團西川紅錦無此色南海緑羅猶帶酸不是今年天不暑玊膚照得野人寒王十朋拾荔支核欲種之戲成海味正思瑶柱羙夔門又見荔支紅炎方入貢自妃子郡圃欲栽如白公官滿猶為十年計實成須待二星終不須更論何時喫前種後收人我同漳州石教授寄火山荔支炎方摘實走筠籠千顆遥遥寄病翁未啗吾州法石白且嘗鄰郡火山紅攙先趁得楊盧雨珍重來從芹藻宫我欲細論香色味一尊何日廣文同次傅景仁馬家緑荔支二首涪陵妃子謾名園豈是閩南緑一盤最喜色同青玉案不妨功並紫金丹畫㸔紅紫品流俗詩嚼冰霜牙頬寒吟罷閒觀右軍帖来禽青李可同餐平生雅意在丘園行矣歸尋隐者盤此日詩盟共君結明年荔子為誰丹欲移仙種栽中土只恐天資不耐寒定向家鄉想風味江瑶斫柱謾加餐眀楊慎詠荔支萍實楚江浮赤日桃花秦嶺燦紅霞試將海内芳蕤數敢並江陽荔子誇雲液留香凝重錦冰丸映肉捲輕紗羙人釵股䨇䨇綴肯擲潘郎滿鈿車姚鳳岡送荔支荅謝柏府薰風荔子丹雕盤持贈下臺端絳紗囊裏冰肌滑火齊枝頭水玊寒羅帕分珍慚逐客驛塵飛騎憶長安瓊瑶欲報才應盡獨立蒼茫倚曲欄洪遂初詠荔支五月閩南荔子丹摘来宜薦水晶盤色欺鶴頂霞新染光奪龍精露未乾曾得漢皇培上苑又随星騎貢長安紫薇垣裏分嘗處頓覺瓊漿溢齒寒謝杰憶荔支江鄉六月火雲飛萬顆纍纍落翠㣲赤露夜浮赬玉瓮流霞朝染紫羅衣妝成帝女脂猶濕浴罷楊妃乳正肥為報相如消渇甚金莖留待茂陵歸陳輝荔支南州六月荔支丹萬顆纍纍簇更團絳雪艶浮紅錦爛玊壺光瑩水晶寒髙名已許傳新曲芳味曾經薦大官烏府日長霜署静幾株斜覆石闌干陳价鳳岡荔錦千株荔子植前岡五月欣看錦作行翠幄幾重添暮雨絳霞一片絢朝陽冰盤試薦驚心喜雪顆初嘗濺齒香清世更無妃子笑紅塵一騎不須忙張鼎思荔支到處娟娟映日紅綠榕相傍似青楓枝頭含露驅炎瘴籠裏生香入暗風玳瑁已堪誇嶺外葡萄那許說西戎歸時我欲攜千子遮莫中州笑白公任家相荔支嘉樹籠蔥翠盖長炎天如簇蘂珠囊枝枝承露排朱實葉葉吟風襲異香已勝安期餐火棗疑從玊女乞瓊漿含桃何物堪春薦好置郵傳達尚方黄克晦涵虛閣觀摘荔支荔樹隂隂繞水濵入門呼脫白綸巾林中仰面惟看鳥樹杪聞聲始覺人傍手柯條初散彩離枝香色正含新玊盤氷水龍珠滿虛閣髙談不厭頻謝肇淛賦荔支根仙種應從閬苑傳孤根百尺老龍眠紅雲低映輪菌石絶壁深蟠瘴癘煙唐騎未能馳繡嶺漢宫應得傍甘泉春風容易朱顔換閲盡枝頭幾歳年黄香荔支紛紛紅紫闘濃妝正色猶存一樹芳金屋正宜藏玊貌綠衣何用怨黄裳栖枝鶯鳥渾無辨對酒鵞兒别有香若待三秋揺落後千頭羞殺洞庭霜陳价夫賦荔子漿紅綃初卸吸精瑩幾㸃甘泉齒頬生漫向雲英求玊液疑從漢武咽金莖温柔未信雞頭羙芳冽應兼馬乳清一自瀘戎飛騎後不須花露觧餘酲徐􅎾積芳亭噉黄香荔支閩海從来說荔香誰知異品有深黄楚江寒菊初凝露蜀國秋葵乍向陽玊貌隔簾窺賈女金丸滿地憶韓郎洞庭莫詫柑三寸瓊液空含顆顆霜饋在杭䨇髻荔支連理枝頭並蔕殷攣胎合浦蚌珠還月明漢水䨇妃佩花落天台二女鬟玊臂相聨嬌艶態香肩齊嚲闘朱顔新承秦虢夫人寵妒殺華清舊阿環食鵲卵荔支乾鵲填橋碧漢邊栗林遺卵綴蒼煙絳苞抱出星同燦玉乳探来石共圎風動危巢驚彈過月明髙樹儼珠聨莫言三匝無枝繞孕得靈胎木杪懸集髙景倩木山齋食中冠伯孺作水墨荔支圗各賦萬顆纍纍日飽嘗一枝偏帶墨痕蒼生来自有丹砂色冩出還疑黒葉香乍洗臙脂嬌翠袖新添螺黛變紅妝冰肌絶類崑崙女不是王家十八娘詠荔支膜曾向忠州畫裏描臙脂淡掃醉容消盈盈荷瓣風前落片片桃花雨後嬌白玉薄籠妖色映茜裙輕裼暗香飄嫣紅狼藉誰收拾十八閩娘裂紫綃五言排律原唐白居易題郡中荔支十八韻兼寄楊萬州八使君竒果標南土芳林對北堂素華春漠漠丹實夏煌煌葉捧低垂户枝擎重壓墻始因風㺯色漸與日争光夕訝條懸火朝驚樹㸃妝深於紅躑躅大較白㯽榔星綴連心朶珠排耀眼房紫羅裁襯殻白玊裹填瓤早嵗曾聞說今朝始摘嘗嚼疑天上味齅異世間香潤勝蓮生水鮮逾橘得霜燕支掌中顆甘露舌頭漿物少尤珍重天髙苦𣺌茫已教生暑月又使阻遐方粹液靈難駐妍姿嫩易傷近南光景熱向北道途長不得充王賦無由寄帝鄉唯君堪擲贈面白似潘郎宋陶弼荔支五月南游渇欣逢荔子丹殻勻仙鶴頂肉露水晶丸色應離為火甘殊木作酸枝繁恐相染樹重欲成團赤蚌遺珠顆紅犀露角端爽能消内熱潤可濯中乾桂嶺無霜處梅天暴雨殘闕十字一簇氷蠶繭千苞火鳯冠隔瓤銀葉嫩透膜玉漿寒增明謝肇淛噉瀛州荔支見說瀛洲好濃隂十里堤香凝絲籠滿葉簇錦丸齊夾岸雲猶濕浮江日未西肌豐埋􅧎核襦薄裂輕綈不分啇山橘還勝大谷棃紅釘金屈戍白乳玉玻瓈綘雪丹堪餌芳塵路不迷㑹湏乗興往斗酒聼黄鸝祝樹勲荔支閩中新荔熟越客可休糧百谷成珠浦千林綴錦囊裊風湏細摘帶露合多嘗消渇逢甘醴充飢得異漿青英團翡翠丹實炫鵞黄霞臉仍蒸日冰膚倍膩霜建宫遥自漢置驛廣于唐火齊緗枝綴珊瑚黛葉藏品多逾别域名重表炎方飽噉為名士嚬呼十八娘五言絶句原宋張舜民荔支火齊驪龍脫紅綃玊露團謫居深不負沉醉亦何難增明陳憲章乞荔支逢春思種樹垂老笑開齋未厭青紅在從君乞荔栽西良容倫饋荔支非桂州夲色戲以是詩口溢桂州漿眼定西良色我是荔支仙何人漫觧得馬森荔支不逐青陽艶偏妍朱夏時摘来紅瑪瑙擘破白琉璃六言絶句增宋曾幾荔支蕉子定成噲伍梅丸應愧盧前金谷危樓魂斷白州舊井名傳紅皺觧羅襦處清香開玉肌時繡嶺堪憐妃子苧蘿不數西施明鄭繼銘荔支遶屋荔支未熟淡紅淺緑交香莫論楊梅伯仲濃隂若箇争長御定佩文齋廣羣芳譜卷六十二
