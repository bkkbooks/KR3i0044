body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷六十三果譜荔支四集藻七言絶句原唐杜甫解悶憶過瀘戎摘荔支青楓隱映石逶迤京中舊見無顔色紅顆酸甜只自知翠瓜碧李沉玊甃赤梨蒲萄寒露成可憐先不異枝蔓此物娟娟長逺生側生野岸及江蒲不熟丹宫滿玊壺雲壑布衣駘背死勞生害馬翠眉須增戴叔倫荔支紅顆珍珠誠可愛白鬚太守亦何癡十年結子知誰在自向中庭種荔支白居易荔支樓對酒荔支新熟雞冠色燒酒初開琥珀香欲摘一枝傾一盞西樓無客共誰嘗原杜牧華清宫長安回首繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔支來增薛能荔支顆如松子色如櫻未識蹉跎欲半生嵗杪監州曽見樹時新入座久聞名原韓偓荔支三首遐方不許貢珍竒密詔惟教進荔支漢武碧桃爭比得枉令方朔號偷兒封開玊籠雞冠澀葉襯金盤鶴頂鮮想得佳人微啓齒翠叉先取一雙懸巧裁霞片裹神漿崖蜜天然有異香應是仙人金掌露結成氷入蒨羅囊增薛濤憶荔支傳聞象郡隔南荒絳實豐肌不可忘近有青衣連椘水素漿還得類瓊漿原宋王濟宫詞昨日閩中進荔支君王親受幸龍池先將並蒂盛金盒蜜賜修儀盡不知增蔡襄七月二十四日食荔支絳衣仙子過中元别葉空枝去不還應是天人知憶念再生朱實慰衰顔和龎公謝子魚荔支霜鱗分不登枯肆丹實全應勝木奴欲效野芹羞薦去敢期佳什墜驪珠淨衆院嘗荔支霞樹珠林暑後新直疑天意别留春京華百卉爭鮮貴誰識芳根著海濵曽鞏荔支四首剖見隋珠醉眼開丹砂緣手落塵埃誰能有力如黃犢摘盡繁星始下來玊潤氷清不受塵仙衣裁翦絳紗新千門萬户誰曽得只有昭陽第一人絳縠囊收白露團未曽封植向長安昭陽殿裏才聞得已道佳人不奈寒金叉雙捧玊纎纎星宿光芒動寶奩解笑詩人誇博物祗知紅顆味酸甜韓維謝送妃子園荔支年年驛使走紅塵貢入驪宫色尚新妃子園名猶未改一籠丹實寄間人原蘇軾食荔支羅浮山下四時春盧橘楊梅次第新日啖荔支三百顆不辭長作嶺南人增蘇轍毛君惠荔支荔子生紅無奈逺陳家曬白到猶難雖無驛騎紅塵起尚得佳人一笑歡乾荔支含露迎風惜不嘗故將赤日損容光紅消白瘦香猶在想見當年十八娘黃庭堅謝陳正字送荔支三首十年梨棗雪中看想見江城荔子丹贈我甘酸三百顆稍知身作近南官齋餘睡思生湯餅紅顆分甘愜下茶如夢泊船甘柘雨芭蕉林裏有人家橄欖灣南逺歸客煩將嘉果送蓬門紅衣襞積蠻煙潤白曬丁香之子孫次韻任道食荔支有感三首一錢不值程衛尉萬事稱好司馬公白髮永無懷橘日六年惆悵荔支紅今年荔子􅍄南風莫愁留滯太史公五月臨江鴨頭緑六月連山柘枝紅舞女荔支􅍄雖晚臨江照影自惱公天與蹙羅裝寶髻更挼猩血染殷紅郭祥正君儀惠莆田陳紫荔乾即蔡君謨謂之老楊妃者莆田乾荔老楊妃誰在開元得見之却憶沉香亭北畔輕紅曽照赭黃衣荔子二首暑館風沉睡眼醒荔支新􅍄暗香生玊纎為剝紅綃顆甘露初凝濕水晶枝條相軋碧雲濃襯出驪珠落照中未説甘香消酷熱且看纎手擘輕紅范成大涪陵妃子園露葉風枝驛騎傳華清天上一嫣然當時若識陳家紫何處蠻村更有園新荔支四絶荔浦園林瘴霧中戎州沽酒擘輕紅五年食指無占處何意相逢萬壑東海北天西兩鬢蓬閩山猶欠一枝笻鄞船荔子如新摘行腳何須更雪峰甘露凝成一顆氷露穠氷厚更芳馨夜涼將到星河下擬共嫦娥鬭月明趠舶飛來不作難紅塵一騎笑長安孫郎皺玊無消息先破潘郎玳瑁盤陸遊荔子絶句驛騎星馳亦快哉筠籠露濕手親開不應相與無平素曽忝戎州刺史來放翁逰蜀十年回病眼茫茫每懶開怪底酒邉光景别方紅江緑一時來莆陽餉荔子江驛山程日夜馳筠籠初拆露猶滋星毬皺玊雖竒品終憶戎州緑荔支王十朋食荔支荔支初熟飣金盤手擘輕紅子細看風味由來太竒絶不教容易到長安妃子園中荔子竒莫因名號起猜疑清時入座非尤物一洗煙塵賴好詩詩史堂前種幾時輕紅曽入少陵詩殊方競續櫻桃獻萬樹爭先爾獨遲陳紫端眀品第首推陳花裏姚黃是等倫郡圃一株稱小紫故家風味自宜珍皺玊莆中皺玊價傾城品第吾何敢妄評只恐此非真皺玊果然是玊亦虛名大將軍荔支名字太紛紛所見多應不逮聞别有深紅霸羣品郡人呼作大將軍玊堂紅天教尤物産閩中名字深竒自不同顧我素稱田舍子如何敢啖玊堂紅奪先紅閩中荔子説莆中闕下竒包又不同正向鈐齋想風味奪先人送奪先紅七夕紅宅堂荔子無名字自我呼為七夕紅記得去冬初到日家人指樹語衰翁白蜜紛紛蜂采百花歸蜜在枝頭竟不知造物要令甜在後時人莫訝熟何遲戎州荔支錦荔戎州第一竒大如雞子壓枝垂金刀翦下三千顆對客從容把酒巵錦殼中間玊一團樹髙數丈實難攀瀘戎顆顆甜如蜜夔梓纍纍味薄酸劉克莊荔支却貢無因送上天漫山如錦但堪憐羅浮所産真奴𨽻只為曽逢玊局仙十顆千錢品最真北人駘背未濡唇若生京洛豪華土買斷丹林肯算緡輦轂嘗新索價髙土人棄擲等辨髦不嗔園客工偷竊絶喜天工饗老叨原李劉題荔支絳衣搖曵綻氷肌依約華清出浴時何物鴉兒驅不去前身恐是食酥兒增方嶽食荔支風枝露葉走筠籠玊潤氷寒擘皺紅自往胸中評史記久聞格調略相同僧惠洪初至崖州喫荔支口腹平生厭事治上林珍果亦嘗之天公見我流涎甚遣向崖州喫荔支元楊維楨宫詞薰風殿閣日初長南貢新來荔子香西邸阿環方病齒金籠分賜雪衣娘張思亷題畫荔支障知味何人似蔡襄方紅陳紫與誰嘗七閩塵障南來使腸斷薰風十八娘桞應芳荔子曲白玊明肌裹絳囊中含仙露壓璚漿城南多少青絲籠競取王家十八娘眀方孝孺謝蜀王賜荔支涪州丹荔擅時稱翠篚來庭色尚新獻罷未曽登玊案先教頒賜與羣臣翠籠擎出殿門東受賜羣臣喜色同却笑開元恩未廣祇將異味恱深宫屠本畯荔支紀興五月閩天丹荔垂雨餘林日照離離火山松蕾元先熟萬顆新嘗玊滿匙雲張翠幄子櫺星側出枝間曉露零城裏萬家相問遺筠籠爭買淨江瓶瓊瓤甘露法門開湛目青蓮大士來帝網琉璃相映徹天台中觀放參回弱歲曽嘗荔子丹一池香水濯氷丸如今正是朱明日栗玊先堆瑪瑙盤星毬鵲卵大于拳礦玊金鐘品是仙别有桂林將勝畫小姬一見一嫣然蜜丸牛膽兩豐腴碧玊為神顆顆殊兒女不知瓤可啖錯疑耳後大秦珠自汲清泉洗荔支吳娃如意劈胭脂水晶簾下黃香熟錯落瑶光並玊肌結緑如榛小更幽齒牙蕭爽恣冥搜怪來肌骨清涼甚六月如從華頂逰幻出龍牙變態竒晚涼雙髻侍兒持自是拜來新月早非關剖出夜光遲天柱髙凌月窟孤洞中紅艷裊珊瑚飽餐內熱渾忘却已貯氷心在玊壺尚幹鄉中錦作堆鳯池超出越王臺相如渴病今應解不用金莖露一杯絳囊公子緑羅嬌白水真人絳節朝欲向九仙通尺一倘能雲際坐相邀黑葉人傳自五羊最憐江緑出莆陽唐家妃子如相見不命涪州驛騎將可惜生來託瘴鄉瓊姿那得近君王大官食品多如許只有乾枝逹尚方小君初學煎支法乳酪宜浮玊碗看旋瀋荔花蜂釀蜜清香不減蔗漿寒自起開籠㨂荔魁半將白曬半烘焙故鄉朋舊應嘲我不遣紅塵一騎回謝杰狀元紅紫金香貯玊玲瓏點綴薰風上緑叢一種丹蕤三百品路人先看狀元紅勝畫仙姬月下分靈丹乳竇香凝白雪寒倦入絳帷知睡去嬌姿絶勝畫中看中觀一串摩尼湛錦波玊衣童子曵緋羅炎光髙護空中觀添作祗園勝果多金鐘白水真人鍊絳砂金鐘鑄就落誰家定應飛入梨園去催出枝頭萬點霞滿林香素娥嬌弄淡紅妝半幅霞綃照海棠夜合口脂勻玊露曉風吹度滿林香山支秋園涼雨洗林空更向青山枝上紅小結丁香隨錦隊櫻桃擎出大明宫蜜丸赤虯山人蜂作房柘衣輕惹蜜丸香波羅小甕黃金色長貯仙厨白玊漿鵲卵紫姑秋夜臨髙臺瀉下金莖露一杯牛渚橋邉遺鵲卵靈官拾作寶珠廽蔣奕芳荔支枝頭裊裊露初乾絳雪擕來好並看為愛風姿誰得似楊妃沉醉倚闌干紅塵一騎入華清大內遙聞笑語聲倘賜侍臣消渴病不須承露問金莖鄧原嶽荔支曲鳯凰山下荔支園擇日開林市子喧一百銅錢分一擔平明奔進合沙門才交小暑日頻催一夜驚看錦繡堆早起香風遍城郭人人都道荔支來紅如鶴頂大如杯奪取頭籌滿擔回更怕午前日色惡齊將青葉蓋頭來荔支髙樹倒垂簷十丈長竿兩刃尖摘下但憑多少喫飽來還有水晶鹽梢頭狐鼠捷如風夜燕經過樹樹空髙結茅寮敲竹夾曉來添得照山紅麻繩髙弔小筠籠上下盤旋西復東且喜今年風雨少荔支個個不生蟲千株傍水各成行不是豪家郭外莊最好五更乘露摘噉時猶帶露華香金杯瀲灧碧波妍一道霞光照眼鮮何似媫妤初賜浴玊肌三尺浸寒泉萬樹搖風點翠苔不妨對客日千枚城中諸品垂垂盡猶有吳航勝畫來中秋摘盡荔支殘蜜漬鹽醃更曬乾不分側生能損價可知輸却玊漿寒陳價夫詠荔支色千紅萬紫轉葳㽔絳李朱櫻敢並竒繡嶺宫中含笑日承恩不獨為氷肌荔支味剖却紅香列蚌珠薦來玊液與醍醐解酲不用花間露擬物何須塞上酥陳薦夫駝蹄朱實西來驛路長明駝驕蹴滿蹄霜當時也合馳千里不獨涪州馬足忙山中冠衫爭暈緑帔爭紅散盡春風滿六宫自笑朱顔生較晚只應隨分冠山中金線細骨香肌寵幸深華清泉裏玊沉沉絳綃朱袖雖零落一縷難銷舊釧金西紫千株萬樹錦成堆獨自西家衣紫回寄語東君休用妬紅塵元自蜀中來緑核搖曵微風火滿林驪山一顧主恩深胸中已化萇宏血莫訝香肌少赤心皺玉羽騎參差出驛門空持朱實弔香魂阿環墜地今千載猶有斑斑玊上痕一品紅千載瀘戎驛騎飛出山猶著薜蘿衣傳呼野服休朝見敕賜宫中第一緋玳瑁紅顆顆明珠貢嶺南還將玳瑁匣輕函助嬌試插桃花鬢不數平原上客簪洞中紅洞中丹實幾千年愁向長安一騎傳好似紅妝離洞去桃花溪口戀塵緣勝江萍佳名久已動明皇不羡江萍逐椘王料得一般甘似蜜令渠北面是濃香鄭鐸新緑荔支落花才見飄空處結子初看出葉時山鳥啄殘俄委地恍如金谷墜樓姿乍丹荔支萬點青螺未染塵忽看半帶口脂勻羅衣開處肌如雪但少芬香逺襲人正熟荔支朱夏南枝總若霞可憐一顆一丹砂名園百果都難並火棗交梨未足誇摘露荔支園林曉望火燒空摘下清香滿市風簾隔美人梳洗罷纎纎玊指擘輕紅丘惟直詠雙髻枝頭連理散甘香紅錦囊包白玊漿貯向氷盤誰得似昭陽姊妹鬬新妝星毬離離丹實綴如毬燦爛紅光滿樹頭莫是宣和燈火夕鰲山懸挂不曽收百步香六月閩鄉荔子懸緑雲堆裏錦雲連幽香一種天然味不數潘妃步步蓮七夕紅遙望雙星爛碧空一年一度鵲橋中誰知淚落凝成血散作枝頭點點紅延夀紅華清一騎走紅塵中使傳呼笑語頻此物若云延得夀馬嵬山下葬何人桂林緑雲堆裏綴紅綃白玊囊中核子焦只此林間堪賦隱淮南不待小山招勝畫錦雲香露萬枝紅恨不生逢繡嶺宫莫訝崇龜圗未肖千金誰為賂良工火山品質殊生節序同偏誇早熟萬叢中只因一動妖妃笑又惹驪山烈炬紅狀元紅瓊液丹膚白玊肌御筵香透絳羅衣宫袍首賜何曽緑為染霞光近紫薇十八娘棣蕚樓頭風露涼閩娘清曉競紅妝朱唇玊齒桃花臉遍著天孫雲錦裳氷團太液池頭暑漸涼紅塵一騎日南方寒漿不待嚴冬結滿坐齊看六月霜緑核素質生來與衆殊氷肌玊液潤如酥相逢莫訝心無赤祇恐前身是緑珠郭天親荔支詞樹下嘗新帶露濃