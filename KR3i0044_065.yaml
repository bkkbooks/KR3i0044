西江月名與牡丹聨譜南珍獨比江瑶閩山入貢冠南朝露葉風枝裊裊香玉滿苞仙液皺紅圎蹙鮫綃華清宫殿蜀山遙一騎紅塵失笑歐陽修浪淘沙五嶺麥秋殘荔子初丹絳紗囊裏水晶丸可惜天教生處逺不近長安往事憶開元妃子偏憐一從魂散馬嵬關只有紅塵無驛使滿眼驪山黃庭堅浪淘沙憶昔謫巴蠻荔子親攀氷肌照映柘枝冠日擘輕紅三百顆一味甘寒重入鬼門關也似人間一雙和葉插雲鬟賴得清湘燕玊面同倚闌杆增眀謝肇浙浪淘沙異品出吳航翠袖紅妝溫柔何似白雲鄉縱有丹青描不就國色天香􅍭笑解羅襠玊骨瓊漿胭脂無色墨無光祗是紅顔多薄命雨妬風狂又金井碧梧飄殘暑初消桂林中冠兩蕭條獨步此時儂第一質艷香嬌豐肉核仍焦沁齒甘饒丁香輕吐暗魂消人倚小樓春不住滿地紅綃徐熥浪淘沙髙樹錦蒸霞朱實青華一丸寒玊裹紅紗萬顆纍纍閩海上不數三巴西域枉乘槎馬乳休誇剖開瓊液碎丹砂異品即今誰第一猶説江家又丹實滿林馣耀日紅酣由來佳品壓江南漢苑楊梅應避色盧橘香慙沁齒有餘甘玉液中涵叉頭一朵美人簪記得樂天曽有句映我緋衫又十里錦雲鄉傅粉凝妝紅裙爭看緑衣郎黑葉梢頭朱柿小玳瑁丁香延夀品非常尤勝陳江繡鞋一種記閩娘風送瑞堂香百步結緑硫黃又一品狀元紅金線金鍾麝囊吹散桂林風黃玉紫瓊真勝畫江緑叢叢雙髻翠雲鬆蘭夀香濃緑珠魂在玉堂東五嶺三巴無此種獨擅閩中宋蘇軾南鄉子天與畫工知賜得衣裳總是緋每向華堂深處見憐伊兩箇心腸一片兒自小便相隨綺席歌筵不暫離苦恨人人分拆破東西怎得成雙似舊時原韓元吉醉落魄霓裳弄月氷肌不受人間熱分明蜜露枝枝結碧樹珊瑚容易與君折玊環舊事誰能説迢遙驛路香風徹故人莫恨東南别不寄梅花千里寄紅雪增黃庭堅定風波晚歲炎州聞荔支赤英垂墜壓欄枝萬里來逢芳意歇愁絶滿盤空憶去年時澗草山花光照坐春過等間苦李又纍纍辜負寒泉浸紅皺消瘦有人耽病損香肌又凖擬階前摘荔支今年歇盡去年枝莫是春光厮料理無比譬如痎瘧有休時碧甃朱欄情不淺何晚來年枝上報纍纍雨後園林坐清影蘇醒紅裳剝盡看香肌栁永滿庭芳青幄髙張瓊枝巧綴萬顆香染紅殷絳羅衣潤疑是火燃山白玊叉頭試篸黃金帶竒巧工鑽題評處仙家異種分付在人間年年輸帝里歡呼內監裝點金盤况曽得真妃笑臉頻看炎嶺當時奏曲風流命樂府名傳憑誰道移歸禁苑長使近天顔鄭域念奴嬌素肌瑩淨隔鮫綃貼襯猩紅妝束炎􅏛飛空鎔不透一塊玲瓏氷玊破暑當筵褪衣剝帶凝露真珠肉中心些豫向人何太焦縮應恨舊日楊妃塵埃走遍南閩和西蜀困入筠籠消黯攪香色精神愁蹙賴有君謨為傳家譜不棄青黃緑到頭甜口是人都要圎􅍄别録增種植夢溪筆談閩中荔支核有小如丁香者多肉而甘土人亦能為之取荔支木去其宗根仍火燔令焦復種之以大石抵其根但令傍根得生其核乃小種之不復牙徐􅎾荔支譜荔核入土種者氣薄不蕃雖蕃不結實間有成樹者經十餘歲稍稍結顆肉酸澀無味鄉人於清明前後十日內將枝梢刮去外皮一節上加膩土用棕裹之至秋露枝上生根以細齒鋸從根處截下植之他所勿令動搖三嵗結子纍然矣接枝之法取種不佳者截去元樹枝莖以利刃微啓小隙將别枝削針插固隙中皮肉相向用樹皮封繫寬緊得所斟酌裹之凡接枝必待時暄蓋欲藉陽和之氣一經接搏二氣交通則轉惡為美也若近海魚鹽之處斥滷土鹹其味微酸不佳縱奪接之終不能以彼易此也鄧慶寀荔支譜荔子原無用核種者皆用好枝刮去外皮以土包裹待生白根如毛再用土覆一過以臘月鋸下至春遂生新葉他木栽時皆去枝葉獨荔樹要留宿葉承露若葉去露稿則無生機余嘗六七月鋸荔支蘆新根方生無不存活最怕日曬必求稍隂涼處時時灌水方易生葉嘗在水西嶺東黃氏見池塘植山支一顆云係核種土人言山支皆用核種無有鋸蘆者蘆字之義果木非核種者稱蘆蓋福州方言也原護衛荔支性不耐寒最難培植才經繁霜枝葉枯死至春二三月再發新葉初種五七年深冬覆蓋之以護霜霰福州之西三舍曰水口地少加寒已不可植其花春生􅉡􅉡然白色其實多少在風雨時與不時也有間嵗生者謂之歇枝有仍歲生者半生半歇也春花之際傍生新葉其色紅白六七月時色已變緑此明年開花者也今年實者明年歇枝也最忌麝香或遇之花實盡落其熟未更採摘蟲鳥皆不敢近或已取之蝙蝠蜂蟻爭來蠧食園家有名樹旁植四柱小樓夜棲其上以警盜者又破竹五七尺搖之答答然以逐蝙蝠之類增徐􅎾荔支譜荔性宜熱最畏髙寒古樹歷數百年者枝柯詰屈根幹盤旋其隂可蔽數畝此歲久根深縱霜霰侵壓不過葉悴可無損於樹當春仍發新葉開花結實至於新種不歷十數年者樹稚根淺一遇霜霰隨即枯萎眀年不復花實鄉人有愛其樹者當極寒時樹下以稻草煨火溫之寒氣不侵葉無凋損秋冬之際壅壓其根仍伐去枯條不令礙樹逢春尤易發生更有歇枝之樹隔一年而實者蔡譜引列仙傳本草經謂食荔有益於人可以得仙當盛夏時乘曉入林中帶露摘下浸以冷泉則殼脆肉寒色香味俱不變嚼之消如絳雪甘如醍醐沁心入脾蠲渴補髓啖可至數百顆或畏其飽點鹽少許啖之即消鄉民鬻於市者積擔盈筐離其本枝暑氣侵觸香色稍減較之就食林中者味亦不逮非必如白傅所云一日二日三日而後變也鄉人常選鮮紅者於竹林中擇巨竹鑿開一竅置荔節中仍以竹籜裹泥封固其隙藉竹生氣滋潤可藏至冬春色香不變若紅鹽火焙曬煎者俱失其味竟成二物矣原製用本草綱目福唐歲貢白曝荔支蜜煎荔支皆為上方珍果白曝須嘉實乃堪市貨者多用雜色荔支入鹽梅曝成皮色雖紅味覺少酸殊失本真增廣志荔支本性堅重可取為阮咸槽彈棋局蔡襄荔支譜紅鹽之法民間以鹽梅滷浸佛桑花為紅漿投荔支漬之曝乾色紅味甘酸可三四年不蟲修貢與商人皆便之然絶無正味白曬者正爾烈日乾之以核堅為止畜之甕中蜜封百日謂之出汗去汗耐久不然踰歲壞矣福州舊貢紅鹽蜜漬二種慶歷初大官問歲進之狀知州事沈邈以道逺不可致減紅鹽之數而增白曬者兼令漳泉二郡亦均貢焉蜜煎剝生荔支笮去其漿然後蜜煮之豫前知福州用曬及半乾者為煎色黃白而味美可愛其費荔支減常歲十之六七然修貢者皆取于民後之主吏利其多取以責賂曬煎之法不行矣徐􅎾荔支譜曬荔支占風日晴霽時摘下於烈日中朗曬至乾以核實為準風味殊勝於焙用竹籠箬葉蜜封可致久逺若風雨暴至則肌肉潰爛反不如焙矣焙荔支擇空屋一所中燔柴數百斤兩邉用竹䇤各十每䇤盛荔三百斤密圍四壁不令通氣焙至二日一夜荔遂乾過焙傷火則肉焦苦不堪食乾者狀元香最佳鄉人多焙桂林金鐘以其實大美觀尤易於鬻臞仙收乾荔法藏於新磁甕每鋪一層即取鹽梅三五箇箬葉裹如粽子狀置其內密封甕口則不蛀壞誠意伯劉伯溫謂乾荔支變者先於殼上刺十許孔用蜜水浸之以銀盂盛於湯罐頭上蒸透即肉滿可食煎荔支荔初熟時乘露連蒂摘下以黃蠟熬勻封點蒂上勿令脫落盛之罐中將冬蜜煮熟得宜俟蜜冷浸之蜜過於荔始不泄氣藏至來春開視如鮮取蜜當以荔支花釀者為第一臞仙謂臨熟時摘入甕中澆蜜浸之以油紙封固甕口勿令滲水投井中雖久不損荔支漿取荔初􅍄者味帶微酸時榨出白漿將蜜勻煮蜜􅍄為度置之磁瓶箬葉封口完固經月漿蜜結成香膏食之美如醴酪荔肉仍以白蜜緩火熬熟淨磁器收之最忌近鐡又法取生荔曬至一日頻番令勻去殼取肉每一斤白蜜一斤半於砂䂪內慢火熬百千沸又以文武火養一日磁鉢攤於日中曬至蜜濃為度盛於磁瓶宋珏荔支譜嶺南好事作荔支醖頭取荔支肉榨之入酥酪辛辣以合醬又作簽肉以荔支作椰子花與酥酪同炒土人大嗜之順昌雪花火酒以荔支投之浹旬而出濃艷幽沉如西施醉倚玊牀太真溫泉出浴用泥頭封固至隔歲開之滿屋作新荔支香矣附録隈枝增益部方物略記隈枝生卭州山谷中樹髙丈餘枝修弱花白實似荔支肉黃膚味甘可食大若爵卵集藻贊增宋宋祁隈枝贊挺幹既修結花兹白戟外澤中甘可以食附録錦荔支原錦荔支一名癩葡萄元時名紅姑娘即詩所云苦瓜也出南蕃今閩廣江南皆有之蔓生葉如葡萄有微刺蔓上有鬚莖葉皆柔七八月開小黃花五瓣如碗形結瓜有長短二種色青緑􅍄則黃紅皮上磊砢架作屏斑斑如錦紅緑陸離最為可玩瓜味微苦小熟之調以薑醋可為𬞞清痰火和肉煮食亦佳其中肉赤如血味甘美春時種秋結實其子形扁如瓜子亦有痱㿔可入藥彚考增元宫殿記棕毛殿前有野果名紅姑娘外垂絳囊中􅍭赤子如珠甜酸可食盈盈繞砌與翠草同芳亦自可愛原本草仁宗時陳堯佐母入宫太后賜以錦荔支遂連皮食之宫人多訕笑夫人對曰往年夢食此物遂生堯佐後又夢如初遂生堯叟時仁宗尚無皇嗣於是皇后及宫人相率竟食後舉皇子二人增星槎勝覽蘇門答剌國一等瓜皮若荔支未剖時甚臭如爛蒜剖開如囊味如酥香甜可食疑即錦荔支也龍眼原龍眼一名益智廣雅云益智龍眼也一名比目見吳氏本草一名圎眼一名蜜脾一名燕卵一名繡水團一名海珠叢一名川彈子一名亞荔支一名荔支奴南方草木狀云荔支過即龍眼熟故謂之荔支奴增本草一名鮫淚一名木彈原閩廣蜀道出荔支處皆有之樹似荔支髙一二丈枝葉微小葉似林檎凌冬不凋春末夏初開細白花七月實熟大如彈丸肉薄於荔支白而有漿甘如蜜質味殊絶純甜無酸實極繁作穗如葡萄每穗五六十顆殼青黃色性畏寒白露後方可採摘性甘平無毒安志健脾補虛開胃除蠧毒去三蟲久服輕身不老裨益聰明故又名益智非今醫家所用之益智子食品以荔支為貴而資益則龍眼為良蓋荔支性熱而龍眼平和也彚考增吳志士燮傳燮每遣使詣權致異物竒果蕉邪龍眼之屬無歲不至三輔黃圗漢武帝破南越起扶荔宫以植所得竒草異木龍眼荔支皆百餘本原涪翁雜説左太沖蜀都賦云旁挺龍目側生荔支龍眼惟閩中及南越有之太沖自言十年作賦三都所有皆責土物之貢至於言龍目亦不自知其失也農政全書龍眼與荔支齊名味亦甚美登盤俎而充供御稱於魏文之詔詠於左思之賦豈凡果之可比哉梧潯雜佩龍眼自尉陀獻漢髙帝始有名見西京雜記左太沖賦旁挺龍目即此梧潯署中皆有之結實甚繁剖之色瑩白政如水晶丸核映于外味亦甘美但微覺草氣風韻逺遜荔支故謂之荔支奴蘇長公曰閩越人髙荔子而下龍眼吾為平之荔子如食蛑蝤大蟹斫雪流膏一噉可飽龍眼如食彭越石蟹嚼嚙久之了無所得然酒闌口爽饜飽之餘則咂啄之味石蟹有時勝蛑蝤也長公此語足為荔奴解嘲增宋珏荔支譜側生見重於世詩賦歌詠連篇纍牘獨旁挺寥寥何也豈以色香頓殊赤若金丸肉似玻璃核如黑漆補精益髓蠲渴扶飢美顔色潤肌膚種種功效不可枚舉至於寄逺廣販利反倍於荔子則龍目何可貶也至若耳食之夫以荔熱傷人龍目大補反欲昻此輕彼則婢學夫人不覺膝自屈矣荔支淨盡龍目叢生時則玊露流晨金風扇晚緩剝飽餐亦非人世所有譬梅花已殘忽有桃杏牡丹初謝重見芍藥幽蘭乍萎仍生蕙草皆不可無一不能有二者也泉南雜志荔支才已龍眼始行荔支飽味之餘不堪咀嚼如膏梁子弟居常醲膬一旦家落餔薄糜便不適口廣東志澄海縣七夕酒集多用龍眼謂之結星集藻五言古詩原宋蘇軾亷州龍眼質味殊絶可敵荔支龍眼與荔支異出同父祖端如柑與橘未易相可否異哉西海濵琪樹羅元圃纍纍似桃李一一流膏乳坐疑星隕空又恐珠還浦圗經未嘗説玊食逺莫數獨使皴皮生弄色映雕俎蠻荒非汝辱幸免妃子汚增眀宋珏秋日歸故園噉龍眼平昔輕旁挺不堪荔作奴今知奴有等賢蠢亦多途方回及陶侃自比常奴殊外裹黃金飾中懷白玊膚劈破皆走盤顆顆夜光珠更憐核如漆湛湛小兒矑龍目與虎目比喻何其愚但恨荔熟時主在奴不俱安得共盤敦牀頭捉刀夫際此清秋候晶晶空滿盂尼父思伯玊使乎復使乎七言律詩原宋劉子翬龍眼幽姿傍挺緑婆娑啄咂雖微奈美何香割蜜脾知韻勝價輕魚目為生多左思賦詠名初出玉局揄揚論豈頗地極海南秋更暑登盤猶足洗沉痾明王象晉龍眼來從炎徼登雕爼滿案芳馨總莫逾崖蜜縱甘終帶酢江瑶雖美未全瑜騷人賦就芳名逺漢帝移來貝葉敷較烈側生應不忝何緣喚作荔支奴何緣喚作荔支奴艷冶豐滋百果無琬液醇和羞沆瀣金丸的皪賽璣珠好將姑射仙人産供作瑶池王母需應共荔丹稱伯仲况兼益智䇿勳殊七言絶句原宋張栻寄龍眼荔子如今尚典刑秋林圎實著嘉名雖無赬玊南風面却願筠籠千里行手自封題寄故人聊將風味付詩情千年尚憶唐羌疏不汚華清驛騎塵增王十朋龍眼絶品輕紅掃地無紛紛萬木以龍呼實如益智本非藥未比荔支真是奴詞增宋無名氏浣溪沙酒拍胭脂顆顆新丹砂燃火葉精神暑天秋杪錦春生香味已驚櫻實淡絳衣還笑荔支皴美人偏喜破朱唇别録原製用農政全書白露後採用梅滷浸一宿取出曬乾用火焙之以核乾硬為度如荔支法收藏之成朵乾者名龍眼錦附録山龍眼原山龍眼出廣中夏月熟色青肉如龍眼亦龍眼之野生者也見桂海虞衡志增閩部疏山果中有枝葉略似鳳尾蕉者曰山龍眼結實纍纍視龍眼小而味酸山僧取以供佛附録龍荔原龍荔狀如小荔支而肉味似龍眼木之身葉亦似二果故名三月開小白花與荔支同􅍄但可蒸食不可生噉令人發癎見鬼物出嶺南見桂海虞衡志增徐氏筆精交趾有龍荔實如小荔支元陳剛中使安南詩云龍荔綴如珠紀其實也謝在杭百粵風土記載廣西荔支如龍眼豈即交趾之種歟御定佩文齋廣羣芳譜卷六十三
