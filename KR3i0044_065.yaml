body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷六十三果譜荔支四集藻七言絶句原唐杜甫觧悶憶過瀘戎摘荔支青楓隠映石逶迤京中舊見無顔色紅顆酸甜只自知翠𤓰碧李沉玊甃赤棃蒲萄寒露成可憐先不異枝蔓此物娟娟長逺生側生野岸及江蒲不熟丹宫滿玊壺雲壑布衣駘背死勞生害馬翠眉湏増戴叔倫荔支紅顆珍珠誠可愛白鬚太守亦何癡十年結子知誰在自向中庭種荔支白居易荔支樓對酒荔支新熟雞冠色燒酒初開琥珀香欲摘一枝傾一盞西樓無客共誰甞原杜牧華清宫長安回首繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔支来増薛能荔支顆如松子色如櫻未識蹉跎欲半生嵗杪監州曽見樹時新入座久聞名原韓偓荔支三首遐方不許貢珍竒宻詔惟教進荔支漢武碧桃争比得枉令方朔號偷兒封開玊籠雞冠澀葉襯金盤鶴頂鮮想得佳人㣲啓齒翠釵先取一雙懸巧裁霞片裹神漿崖蜜天然有異香應是仙人金掌露結成氷入蒨羅囊増薛濤憶荔支傳聞象郡隔南荒絳實豐肌不可㤀近有青衣連椘水素漿還得類瓊漿原宋王濟宫詞昨日閩中進荔支君王親受幸龍池先将並蒂盛金盒蜜賜修儀盡不知増蔡襄七月二十四日食荔支絳衣仙子過中元别葉空枝去不還應是天人知憶念再生朱實慰衰顔和龎公謝子魚荔支霜鱗分不登枯肆丹實全應勝木奴欲效野芹羞薦去敢期佳什墜驪珠浄衆院嘗荔支霞樹珠林暑後新直疑天意别留春京華百卉争鮮貴誰識芳根著海濵曽鞏荔支四首剖見隋珠醉眼開丹砂縁手落塵埃誰能有力如黄犢摘盡繁星始下来玊潤氷清不受塵仙衣裁翦絳紗新千門萬户誰曽得只有昭陽第一人絳縠囊収白露團未曽封植向長安昭陽殿裏才聞得已道佳人不奈寒金釵雙捧玊纎纎星宿光芒動寳奩觧笑詩人誇博物祗知紅顆味酸甜韓維謝送妃子園荔支年年驛使走紅塵貢入驪宫色尚新妃子園名猶未改一籠丹實寄閒人原蘓軾食荔支羅浮山下四時春盧橘楊梅次第新日啖荔支三百顆不辭長作嶺南人増蘇轍毛君惠荔支荔子生紅無奈逺陳家曬白到猶難雖無驛騎紅塵起尚得佳人一笑歡乾荔支含露迎風惜不嘗故将赤日損容光紅消白瘦香猶在想見當年十八娘黄庭堅謝陳正字送荔支三首十年棃棗雪中看想見江城荔子丹贈我甘酸三百顆稍知身作近南官齋餘睡思生湯餅紅顆分甘惬下茶如夢泊船甘柘雨芭蕉林裏有人家橄欖灣南逺歸客煩将嘉果送蓬門紅衣襞積蠻煙潤白曬丁香之子孫次韻任道食荔支有感三首一錢不值程衛尉萬事稱好司馬公白髪永無懐橘日六年惆悵荔支紅今年荔子􅍄南風莫愁留滯太史公五月臨江鴨頭綠六月連山柘枝紅舞女荔支􅍄雖晚臨江照影自惱公天與蹙羅装寳髻更挼猩血染殷紅郭祥正君儀恵莆田陳紫荔乾即蔡君謨謂之老楊妃者莆田乾荔老楊妃誰在開元得見之却憶沉香亭北畔輕紅曽照赭黄衣荔子二首暑館風沉睡眼醒荔支新􅍄暗香生玊纎為剥紅綃顆甘露初凝濕水晶枝條相軋碧雲濃襯出驪珠落照中未説甘香消酷熱且看纎手擘輕紅范成大涪陵妃子園露葉風枝驛騎傳華清天上一嫣然當時若識陳家紫何處蠻村更有園新荔支四絶荔浦園林瘴霧中戎州沽酒擘輕紅五年食指無占䖏何意相逢萬壑東海北天西兩鬢蓬閩山猶欠一枝笻鄞船荔子如新摘行脚何湏更雪峰甘露凝成一顆氷露穠氷厚更芳馨夜凉將到星河下擬共嫦娥鬭月明趠舶飛来不作難紅塵一騎笑長安孫郎皺玊無消息先破潘郎玳瑁盤陸游荔子絶句驛騎星馳亦快哉筠籠露濕手親開不應相與無平素曽忝戎州刺史来放翁逰蜀十年回病眼茫茫每嬾開怪底酒邉光景别方紅江綠一時来莆陽餉荔子江驛山程日夜馳筠籠初拆露猶滋星毬皺玊雖竒品終憶戎州綠荔支王十朋食荔支荔支初熟飣金盤手擘輕紅子細看風味由来太竒絶不教容易到長安妃子園中荔子竒莫因名號起猜疑清時入座非尤物一洗煙塵頼好詩詩史堂前種㡬時輕紅曽入少陵詩殊方競續櫻桃獻萬樹争先爾獨遲陳紫端眀品第首推陳花裏姚黄是等倫郡圃一株稱小紫故家風味自宜珍皺玊莆中皺玊價傾城品第吾何敢妄評只恐此非真皺玊果然是玊亦虚名大將軍荔支名字太紛紛所見多應不逮聞别有深紅覇羣品郡人呼作大将軍玊堂紅天教尤物産閩中名字深竒自不同顧我素稱田舍子如何敢㗖玊堂紅奪先紅閩中荔子說莆中闕下竒包又不同正向鈐齋想風味奪先人送奪先紅七夕紅宅堂荔子無名字自我呼為七夕紅記得去冬初到日家人指樹語衰翁白蜜紛紛蜂采百花歸蜜在枝頭竟不知造物要令甜在後時人莫訝熟何遲戎州荔支錦荔戎州第一竒大如雞子壓枝垂金刀翦下三千顆對客從容把酒巵錦殻中間玊一團樹髙數丈實難攀瀘戎顆顆甜如蜜䕫梓纍纍味薄酸劉克荘荔支却貢無因送上天漫山如錦但堪憐羅浮所産真奴𨽻只為曽逢玊局仙十顆千錢品最真北人駘背未濡唇若生京洛豪華土買斷丹林肯算緡輦轂嘗新索價髙土人棄擲等弁髦不嗔園客工偷竊絶喜天工饗老饕原李劉題荔支絳衣揺曵綻氷肌依約華清出浴時何物鴉兒驅不去前身恐是食酥兒増方岳食荔支風枝露葉走筠籠玊潤氷寒擘縐紅自徃胸中評史記久聞格調略相同僧恵洪初至崖州喫荔支口腹平生厭事治上林珍果亦甞之天公見我流涎甚遣向崖州喫荔支元楊維楨宫詞薰風殿閣日初長南貢新来荔子香西邸阿環方病齒金籠分賜雪衣娘張思亷題畫荔支障知味何人似蔡襄方紅陳紫與誰甞七閩塵障南来使腸斷薰風十八娘桞應芳荔子曲白玊明肌裹絳囊中含仙露壓璚漿城南多少青絲籠競取王家十八娘眀方孝孺謝蜀王賜荔支涪州丹荔擅時稱翠篚来庭色尚新獻罷未曽登玊案先敎頒賜與羣臣翠籠擎出殿門東受賜羣臣喜色同却笑開元恩未廣祇將異味恱深宫屠本畯荔支紀興五月閩天丹荔垂雨餘林日照離離火山松蕾元先熟萬顆新甞玊滿匙雲張翠幄子欞星側出枝間曉露零城裏萬家相問遺筠籠争買浄江瓶瓊瓤甘露法門開湛目青蓮大士来帝網琉璃相映澈天台中觀放叅囬弱歳曽甞荔子丹一池香水濯氷丸如今正是朱明日栗玊先堆瑪瑙盤星毬鵲卵大扵拳鑛玊金鐘品是仙别有桂林將勝畫小姬一見一嫣然蜜丸牛膽兩豐腴碧玊為神顆顆殊兒女不知瓤可啖錯疑耳後大秦珠自汲清泉洗荔支吳娃如意劈臙脂水晶簾下黄香熟錯落瑶光並玊肌結綠如榛小更幽齒牙蕭爽恣冥搜怪来肌骨清凉甚六月如從華頂逰幻出龍牙變態竒晚凉雙髻侍兒持自是拜来新月早非關剖出夜光遲天柱髙凌月窟孤洞中紅艷裊珊瑚飽餐内熱渾忘却已貯氷心在玊壺尚榦鄉中錦作堆鳯池超出越王䑓相如渇病今應觧不用金莖露一杯絳囊公子綠羅嬌白水真人絳節朝欲向九仙通尺一倘能雲際坐相邀黑葉人傳自五羊最憐江綠出莆陽唐家妃子如相見不命涪州驛騎將可惜生来託瘴鄉瓊姿那得近君王大官食品多如許只有乾枝逹尚方小君初學煎支法乳酪宜浮玊椀看旋瀋荔花蜂釀蜜清香不減蔗漿寒自起開籠㨂荔魁半将白曬半烘焙故鄉朋舊應嘲我不遣紅塵一騎囬謝杰状元紅紫金香貯玊玲瓏㸃綴薰風上綠叢一種丹蕤三百品路人先看状元紅勝畫仙姬月下分靈丹乳竇香凝白雪寒倦入絳帷知睡去嬌姿絶勝畫中看中觀一串摩尼湛錦波玊衣童子曵緋羅炎光髙䕶空中觀添作祗園勝果多金鐘白水真人鍊絳砂金鐘鑄就落誰家定應飛入棃園去催出枝頭萬㸃霞滿林香素娥嬌弄淡紅妝半幅霞綃照海棠夜合口脂勻玊露曉風吹度滿林香山支秋園凉雨洗林空更向青山枝上紅小結丁香隨錦隊櫻桃擎出大明宫蜜丸赤虯山人蜂作房柘衣輕惹蜜丸香波羅小瓮黄金色長貯仙厨白玊漿鵲卵紫姑秋夜臨髙䑓瀉下金莖露一杯牛渚橋邉遺鵲卵靈官拾作寳珠廽蔣奕芳荔支枝頭裊裊露初乾絳雪擕来好並看為爱風姿誰得似楊妃沉醉倚闌干紅塵一騎入華清大内遥聞笑語聲倘賜侍臣消渇病不湏承露問金莖鄧原岳荔支曲鳯凰山下荔支園擇日開林市子喧一百銅錢分一擔平明奔進合沙門纔交小暑日頻催一夜驚看錦繡堆早起香風徧城郭人人都道荔支来紅如鶴頂大如杯奪取頭籌滿擔回更怕午前日色惡齊将青葉盖頭来荔支髙樹倒垂簷十丈長竿兩刃尖摘下但憑多少喫飽来還有水晶鹽梢頭狐䑕㨗如風夜鷰經過樹樹空髙結茅寮敲竹夹曉来添得照山紅麻繩髙弔小筠籠上下盤旋西復東且喜今年風雨少荔支個個不生蟲千株傍水各成行不是豪家郭外荘最好五更乗露摘噉時猶帶露華香金杯㶑灧碧波妍一道霞光照眼鮮何似媫妤初賜浴玊肌三尺浸寒泉萬樹揺風㸃翠苔不妨對客日千枚城中諸品垂垂盡猶有吳航勝畫来中秋摘盡荔支殘蜜漬鹽醃更曬乾不分側生能損價可知輸却玊漿寒陳价夫詠荔支色千紅萬紫轉葳㽔絳李朱櫻敢並竒繡嶺宫中含笑日承恩不獨為氷肌荔支味剖却紅香列蚌珠薦来玊液與醍醐觧酲不用花間露擬物何湏塞上酥陳薦夫駝蹄朱實西来驛路長明駝驕蹴滿蹄霜當時也合馳千里不獨涪州馬足忙山中冠衫争暈綠帔争紅散盡春風滿六宫自笑朱顔生較晚只應隨分冠山中金線細骨香肌寵幸深華清泉裏玊沉沉絳綃朱袖雖零落一縷難銷舊釧金西紫千株萬樹錦成堆獨自西家衣紫囬寄語東君休用妬紅塵元自蜀中来綠核揺曵㣲風火滿林驪山一顧主恩深胸中已化萇宏血莫訝香肌少赤心皺玉羽騎參差出驛門空持朱實弔香魂阿環墜地今千載猶有斑斑玊上痕一品紅千載瀘戎驛騎飛出山猶著薜蘿衣傳呼野服休朝見勅賜宫中第一緋玳瑁紅顆顆明珠貢嶺南還將玳瑁匣輕函助嬌試挿桃花鬢不數平原上客簪洞中紅洞中丹實㡬千年愁向長安一騎傳好似紅妝離洞去桃花溪口戀塵緣勝江萍佳名久已動明皇不羡江萍逐椘王料得一般甘似蜜令渠北面是濃香鄭鐸新綠荔支落花纔見飄空處結子初看出葉時山鳥啄殘俄委地恍如金谷墜樓姿乍丹荔支萬㸃青螺未染塵忽看半帶口脂勻羅衣開䖏肌如雪但少芬香逺襲人正熟荔支朱夏南枝總若霞可憐一顆一丹砂名園百果都難並火棗交棃未足誇摘露荔支園林曉望火燒空摘下清香滿市風簾隔羙人梳洗罷纎纎玊指擘輕紅丘惟直詠雙髻枝頭連理散甘香紅錦囊包白玊漿貯向氷盤誰得似昭陽姊妹鬬新妝星毬離離丹實綴如毬燦爛紅光滿樹頭莫是宣和燈火夕鰲山懸挂不曽收百歩香六月閩鄉荔子懸綠雲堆裏錦雲連幽香一種天然味不數潘妃歩歩蓮七夕紅遥望雙星爛碧空一年一度鵲橋中誰知淚落凝成血散作枝頭㸃㸃紅延夀紅華清一騎走紅塵中使傳呼笑語頻此物若云延得夀馬嵬山下葬何人桂林綠雲堆裏綴紅綃白玊囊中核子焦只此林間堪賦隠淮南不待小山招勝畫錦雲香露萬枝紅恨不生逢繡嶺宫莫訝崇龜圗未肖千金誰為賂良工火山品質殊生節序同偏誇早熟萬叢中只因一動妖妃笑又惹驪山烈炬紅狀元紅瓊液丹膚白玊肌御筵香透絳羅衣宫袍首賜何曽綠為染霞光近紫薇十八娘棣蕚樓頭風露凉閩娘清曉競紅妝朱唇玊齒桃花臉徧著天孫雲錦裳氷團太液池頭暑漸凉紅塵一騎日南方寒漿不待嚴冬結滿坐齊看六月霜綠核素質生来與衆殊氷肌玊液潤如酥相逢莫訝心無赤祇恐前身是綠珠郭天親荔支詞樹下甞新帶露濃羙人珠翠間釵紅却恨當年勞傳舎不敎移入太真宫安國賢詠氷團荔支纍纍初貯水晶盤一啖争禁齒頬寒南土由来饒暑氣誰知六月有氷團董傳策啖荔支鐡榦婆娑落子紅方苞剥出水晶籠炎荒正惹長卿渇却為瓊漿半洗空張爕荔支詞長生殿上紫煙開妃子紅妝映酒杯小部新聲歌未了嶺南飛騎帶香来林叔學荔支花只向閩鄉說荔支荔支花發㡬人知幽香陣陣㣲風裏苞蘂還分雄與雌徐􅎾江家綠芳樹離離徧海涯由来香味壓三巴火雲映出玻瓈綠舊説閩中第一家葡萄穂絶艷穠香滿路飛玊膚輕襯紫羅衣若逢漢代乗槎使不帶凉州馬乳歸雙髻千年枝上並頭春斜結香雲縷縷新相倚明妝誰得似黄陵廟裏兩夫人真珠孕出靈胎箇箇圎林中遥見夜光懸一枝臨水低相向不異鮫人泣月年十八娘先朝舊事說閩王公主曽稱十八娘千載芳魂應化碧佳名猶自記紅香將軍林外森森翠幄髙軍中不用醉葡萄只今十里雲如錦疑是當年舊戰袍釵頭雙雙珠顆錦如霞斜挿金釵貼鬢鵶一種人間可憐色六宫羞殺歩揺花粉紅深紅輕膩壓枝斜貌比桃花更染霞一自承恩天寳後温泉宫裏洗鉛華綠羅袍輕盈初試越羅新不染人間紫陌塵百萬紅妝争結綺隔墻遥看綠衣人勝畫紫膜紅繒白玊膚争誇絳雪出仙都生来自有天然色却笑崇龜浪寫圗白蜜誰遣餘香沁齒牙羙人纎手剖輕霞天生甘味如萍實不待逰蜂釀百花桂林樹色蕭森比桂叢青枝綠葉自芄芃月光夜照花如霰疑是天香落鏡中滿林香十里重林錦繡堆更無驛使惹塵埃微風暗度幽香異韓夀才過賈女来狀元紅素質朱顔太絶倫風流先占曲江春只因賜得宫中錦争看瓊林第一人星毬不待宫娃羯鼓催半空誰滚火星来山禽誤踏雲中墜豈是三郎蹴踘囬七夕紅滿樹渾疑大火流尚餘丹實報新秋繁星遥與雙星映半在佳人乞巧樓雞引子曽食淮南九轉丹幻成仙果赤團團寄言山鳥休輕啄留取猩紅頂上冠金鐘不見蒲牢伏上林紅爐烈火鑄黄金南風吹入蕭蕭葉如聼鈞天大吕音江陳紫說陳家綠説江佳名千載本無雙於今别有酣紅色鼎足三分未肯降天柱天柱巍巍出半空折来猶自綠成叢南風吹動枝頭火還似當年戰祝融大小江綠風捲香塵滿路飛絳綃新裼綠羅衣天生麗質誰堪並婉孌江濵大小妃宋家香綠鬢如雲面似霞氷肌何用鬭鉛華隔墻一道薰風暖吹得餘香過宋家進貢子丹荔何年貢七閩宣和中使徃来頻玊環只識涪江種空走驪山一騎塵延夀紅九轉丹砂貯絳囊剖開甘液勝瓊漿由来此物從延夀恨殺唐𦍑誤漢皇百歩香紫翠隂森映夕陽遥看一片錦雲鄉羙人羅襪凌波過踏碎紅塵滿路香綠紗苧蘿溪水綠如油浣出輕紗翠欲流何代羙人工翦綵結成佳果綴枝頭麝囊紅纍纍丹實似星懸萬綠隂中赤欲然日午餘芬生鼻觀不縁林下麝香眠中秋緑金風玊露仲秋時碩果枝頭落較遲明月一輪流翠影青銅髙照碧琉璃松紅莫以松枝比荔支翠濤聲裏露臙脂忽看琥珀生連理不待千年長兎絲丁香紅粉佳人獨倚樓雨中丹實滿枝頭荔香元與丁香異只結團圓不結愁郎官紅甘液濃香似醁醽傳来佳種近楓亭誰将天上郎官宿散作林中萬㸃星紅繡鞋一片紅香落翠苔羙人林下蹋青回當年若使潘妃見貼地蓮花不敢開綠珠山禽偷取蹋枝翻錯落珍珠綠滿園卧地殘香吹不起月明如照墜樓魂洞中紅烏石山前暮雨凉㡬畨風起散餘香洞中六月紅如錦不但桃花誤阮郎氷團六月閩天見鬱蒸忽驚寒氣座間凝水晶盤貯深紅色白玊壺中映絳氷何家紅炎夏深林雨氣収臙脂片片落梢頭何郎粉向朱衣拭滿面桃花汗欲流鵲卵月明銀漢鵲驚枝風動寒巢欲半欹吹落人間完似卵氷盤髙累不愁危勝江萍纍纍枝上火雲燒甘液真同絳雪消一片紅光如日赤兒童空有椘江謡綠核滿林丹實夏煌煌一道炎風列燧光壯士緋袍都觧却碧苔齊卧綠沉槍火山廽望蒼梧是故鄉紫綃輕颺麥風凉生来自信紅顔薄强向朱明鬭艷妝原王象晉題荔支絳袖氷肌畫本難駢肩含笑倚闌干清霜且莫来相妬聞道佳人不耐寒詩散句原唐杜甫憶昔南海使奔騰獻荔支内分金帶赤恩與荔支青宋蘇軾荔支㡬時熟枝頭花正繁増唐張籍錦江近西水更綠新雨山頭荔支熟原宋程敦厚綠幄翠籠文縠皺絳囊包就寸珠圎汪藻紅錦皺縫包玊液青綃斜翦襯金丸周必大白蓮近揖三千女丹荔遐招十八娘楊萬里臨水釅妝新雨後出墻背向曉風西龍眼初如菉豆肥荔支已似佛螺兒増朱子水精透膜輕含液絳縠離苞未變香唐韓翃山舎荔支繁薛能喧雨荔支深李洞雨濕荔支肥皮日休紅荔懸纓絡原宋黄庭堅蠻果餐蕉荔程敦厚一色鮮猩血増孫覿丹荔擘輕圎范成大綠肥新荔子元馬祖常清香荔子懸原宋劉敞南賔佳實傳名久増蘓軾梅雨翛翛荔子然原晁冲之日落雲生荔子紅増孫覿堆盤丹荔照人光范成大荔子天凉未肯紅湛俞荔支秋映綺筵紅元馬祖常荔支千顆團團小荔支囊蜜嫣嫣紫王逢荔子凝漿赤露香虞集荔子枝頭火齊紅雅琥火齊然雲荔子香詞原宋李芸子搗練子紅粉裏絳金裳一巵仙酒艷晨妝醉温柔别有鄉清暑殿偶風凉雞頭擘破誤君王泣棃花春夢長張孝祥浣溪沙只說閩山錦繡帷忽從團扇得生枝皺紅衫子映豐肌春線應憐壺漏永夜深頻見燭花催塵飛一騎憶来時蘇軾減字木蘭花閩溪珍獻過海雲㠶来似箭玊座金盤不貢竒葩四百年輕紅釃白雅稱佳人纎手擘骨瘦肌香恰似當年十八娘明徐􅎾減字木蘭花吳航異品賜浴金盆氷骨冷紫袷羅襦絶色輕盈未易圗忠州白傅枉把朱顔描竹素沛國崇龜益浪揮毫寫玊肌又紅繒如繭紙上容華應較淺玊液金莖香味從来畫不成梢頭懸火日啖何妨三百顆十八娘紅始信丹青妬入宫宋康與之西江月名與牡丹聨譜南珍獨比江瑶閩山入貢冠南朝露葉風枝裊裊香玉滿苞仙液皺紅圎蹙鮫綃華清宫殿蜀山遥一騎紅塵失笑歐陽修浪淘沙五嶺麥秋殘荔子初丹絳紗囊裏水晶丸可惜天敎生䖏逺不近長安徃事憶開元妃子偏憐一從魂散馬嵬關只有紅塵無驛使滿眼驪山黄庭堅浪淘沙憶昔謫巴蠻荔子親攀氷肌照映柘枝冠日擘輕紅三百顆一味甘寒重入鬼門關也似人間一雙和葉挿雲鬟頼得清湘燕玊面同倚闌杆増眀謝肇淛浪淘沙異品出吳航翠袖紅妝温柔何似白雲鄉縱有丹青描不就國色天香􅍭笑觧羅襠玊骨瓊漿臙脂無色墨無光祗是紅顔多薄命雨妬風狂又金井碧梧飄殘暑初消桂林中冠兩蕭條獨歩此時儂第一質艷香嬌豐肉核仍焦沁齒甘饒丁香輕吐暗魂消人倚小樓春不住滿地紅綃徐熥浪淘沙髙樹錦蒸霞朱實青華一丸寒玊裹紅紗萬顆纍纍閩海上不數三巴西域枉乗槎馬乳休誇剖開瓊液碎丹砂異品即今誰第一猶説江家又丹實滿林馣耀日紅酣由来佳品壓江南漢苑楊梅應避色盧橘香慙沁齒有餘甘玉液中涵釵頭一朶羙人簪記得樂天曽有句映我緋衫又十里錦雲鄉傅粉凝妝紅裙争看綠衣郎黒葉梢頭朱柿小玳瑁丁香延夀品非常尤勝陳江繡鞋一種記閩娘風送瑞堂香百歩結綠硫黄又一品状元紅金線金鍾麝囊吹散桂林風黄玉紫瓊真勝畫江綠叢叢雙髻翠雲鬆蘭夀香濃綠珠魂在玉堂東五嶺三巴無此種獨擅閩中宋蘇軾南鄉子天與畫工知賜得衣裳總是緋每向華堂深處見憐伊兩箇心腸一片兒自小便相隨綺席歌筵不暫離苦恨人人分拆破東西怎得成雙似舊時原韓元吉醉落魄霓裳弄月氷肌不受人間熱分明蜜露枝枝結碧樹珊瑚容易與君折玊環舊事誰能說迢遥驛路香風徹故人莫恨東南别不寄梅花千里寄紅雪増黄庭堅定風波晚歳炎州聞荔支赤英垂墜壓欄枝萬里来逢芳意歇愁絶滿盤空憶去年時澗草山花光照坐春過等閒苦李又纍纍辜負寒泉浸紅皺消瘦有人躭病損香肌又凖擬堦前摘荔支今年歇盡去年枝莫是春光厮料理無比譬如痎瘧有休時碧甃朱欄情不淺何晚来年枝上報纍纍雨後園林坐清影蘇醒紅裳剥盡看香肌栁永滿庭芳青幄髙張瓊枝巧綴萬顆香染紅殷絳羅衣潤疑是火燃山白玊釵頭試篸黄金帶竒巧工鑚題評䖏仙家異種分付在人間年年輸帝里歡呼内監装㸃金盤况曽得真妃笑臉頻看炎嶺當時奏曲風流命樂府名傳憑誰道移歸禁苑長使近天顔鄭域念奴嬌素肌瑩浄隔鮫綃貼襯猩紅妝束炎􅏛飛空鎔不透一塊玲瓏氷玊破暑當筵褪衣剥帶凝露真珠肉中心些予向人何太焦縮應恨舊日楊妃塵埃走徧南閩和西蜀困入筠籠消黯攪香色精神愁蹙賴有君謨為傳家譜不棄青黄綠到頭甜口是人都要圎􅍄别錄増種植夢溪筆談閩中荔支核有小如丁香者多肉而甘土人亦能為之取荔支木去其宗根仍火燔令焦復種之以大石抵其根但令傍根得生其核乃小種之不復牙徐􅎾荔支譜荔核入土種者氣薄不蕃雖蕃不結實間有成樹者經十餘歳稍稍結顆肉酸澀無味鄉人於清明前後十日内將枝梢刮去外皮一節上加膩土用棕裹之至秋露枝上生根以細齒鋸從根處截下植之他所勿令動揺三嵗結子纍然矣接枝之法取種不佳者截去元樹枝莖以利刄微啓小隙将别枝削鍼挿固隙中皮肉相向用樹皮封繫寛𦂳得所斟酌裹之凡接枝必待時暄盖欲藉陽和之氣一經接搏二氣交通則轉惡為羙也若近海魚鹽之處斥滷土鹹其味微酸不佳縱奪接之終不能以彼易此也鄧慶寀荔支譜荔子原無用核種者皆用好枝刮去外皮以土包裹待生白根如毛再用土覆一過以臘月鋸下至春遂生新葉他木栽時皆去枝葉獨荔樹要留宿葉承露若葉去露槁則無生機余嘗六七月鋸荔支蘆新根方生無不存活最怕日曬必求稍隂凉處時時灌水方易生葉甞在水西嶺東黄氏見池塘植山支一顆云係核種土人言山支皆用核種無有鋸蘆者蘆字之義果木非核種者稱蘆盖福州方言也原䕶衛荔支性不耐寒最難培植纔經繁霜枝葉枯死至春二三月再發新葉初種五七年深冬覆盖之以䕶霜霰福州之西三舎曰水口地少加寒已不可植其花春生􅉡􅉡然白色其實多少在風雨時與不時也有間嵗生者謂之歇枝有仍歳生者半生半歇也春花之際傍生新葉其色紅白六七月時色已變綠此明年開花者也今年實者明年歇枝也最忌麝香或遇之花實盡落其熟未更採摘蟲鳥皆不敢近或已取之蝙蝠蜂蟻争来蠧食園家有名樹旁植四柱小樓夜棲其上以警盗者又破竹五七尺揺之答答然以逐蝙蝠之類増徐􅎾荔支譜荔性宜熱最畏髙寒古樹歴數百年者枝柯詰屈根榦盤旋其隂可蔽數畝此歳久根深縱霜霰侵壓不過葉悴可無損於樹當春仍發新葉開花結實至於新種不歴十數年者樹穉根淺一遇霜霰隨即枯萎眀年不復花實鄉人有愛其樹者當極寒時樹下以稻草煨火温之寒氣不侵葉無凋損秋冬之際壅壓其根仍伐去枯條不令礙樹逢春尤易發生更有歇枝之樹隔一年而實者蔡譜引列仙傳本草經謂食荔有益於人可以得仙當盛夏時乗曉入林中帶露摘下浸以冷泉則殻脆肉寒色香味俱不變嚼之消如絳雪甘如醍醐沁心入脾蠲渇補髓啖可至數百顆或畏其飽㸃鹽少許啖之即消鄉民鬻於市者積擔盈筐離其本枝暑氣侵觸香色稍減較之就食林中者味亦不逮非必如白傅所云一日二日三日而後變也鄉人常選鮮紅者於竹林中擇巨竹鑿開一竅置荔節中仍以竹籜裹泥封固其隙藉竹生氣滋潤可藏至冬春色香不變若紅鹽火焙曬煎者俱失其味竟成二物矣原製用本草綱目福唐歳貢白曝荔支蜜煎荔支皆為上方珍果白曝湏嘉實乃堪市貨者多用雜色荔支入鹽梅曝成皮色雖紅味覺少酸殊失本真増廣志荔支本性堅重可取為阮咸槽彈棋局蔡襄荔支譜紅鹽之法民間以鹽梅滷浸佛桑花為紅漿投荔支漬之曝乾色紅味甘酸可三四年不蟲修貢與商人皆便之然絶無正味白曬者正爾烈日乾之以核堅為止畜之瓮中蜜封百日謂之出汗去汗耐乆不然踰歳壊矣福州舊貢紅鹽蜜漬二種慶歴初大官問歳進之狀知州事沈邈以道逺不可致減紅鹽之數而増白曬者兼令漳泉二郡亦均貢焉蜜煎剥生荔支笮去其漿然後蜜煮之予前知福州用曬及半乾者為煎色黄白而味羙可愛其費荔支減常歳十之六七然修貢者皆取扵民後之主吏利其多取以責賂曬煎之法不行矣徐􅎾荔支譜曬荔支占風日晴霽時摘下於烈日中朗曬至乾以核實為準風味殊勝於焙用竹籠箬葉蜜封可致久逺若風雨暴至則肌肉潰爛反不如焙矣焙荔支擇空屋一所中燔柴數百斤兩邉用竹䇤各十每䇤盛荔三百斤密圍四壁不令通氣焙至二日一夜荔遂乾過焙傷火則肉焦苦不堪食乾者狀元香最佳鄉人多焙桂林金鐘以其實大羙觀尤易於鬻臞仙收乾荔法藏於新磁瓮每鋪一層即取鹽梅三五箇箬葉裹如粽子狀置其内密封瓮口則不蛀壞誠意伯劉伯温謂乾荔支變者先於殻上刺十許孔用蜜水浸之以銀盂盛於湯罐頭上蒸透即肉滿可食煎荔支荔初熟時乗露連蔕摘下以黄蠟熬勻封㸃蔕上勿令脫落盛之罐中將冬蜜煮熟得宜俟蜜冷浸之蜜過於荔始不洩氣藏至来春開視如鮮取蜜當以荔支花釀者為第一臞仙謂臨熟時摘入瓮中澆蜜浸之以油紙封固瓮口勿令滲水投井中雖久不損荔支漿取荔初􅍄者味帶㣲酸時榨出白漿將蜜勻煮蜜􅍄為度置之磁瓶箬葉封口完固經月漿蜜結成香膏食之羙如醴酪荔肉仍以白蜜緩火熬熟浄磁器收之最忌近鐡又法取生荔曬至一日頻番令勻去殻取肉每一斤白蜜一斤半於砂䂪内慢火熬百千沸又以文武火養一日磁鉢攤於日中曬至蜜濃為度盛於磁瓶宋珏荔支譜嶺南好事作荔支醖頭取荔支肉榨之入酥酪辛辣以合醤又作簽肉以荔支作椰子花與酥酪同炒土人大嗜之順昌雪花火酒以荔支投之浹旬而出濃艷幽沉如西施醉倚玊牀太真温泉出浴用泥頭封固至隔歳開之滿屋作新荔支香矣附錄隈枝増益部方物略記隈枝生卭州山谷中樹髙丈餘枝修弱花白實似荔支肉黄膚味甘可食大若爵卵集藻贊増宋宋祁隈枝賛挺榦既修結蘤兹白㦸外澤中甘可以食附錄錦荔支原錦荔支一名癩葡萄元時名紅姑娘即詩所云苦𤓰也出南蕃今閩廣江南皆有之蔓生葉如葡萄有㣲刺蔓上有鬚莖葉皆柔七八月開小黄花五瓣如椀形結𤓰有長短二種色青綠􅍄則黄紅皮上磥砢架作屏斑斑如錦紅緑陸離最為可玩𤓰味㣲苦小熟之調以薑醋可為𬞞清痰火和肉煮食亦佳其中肉赤如血味甘羙春時種秋結實其子形扁如𤓰子亦有痱㿔可入藥彚考増元宫殿記棕毛殿前有野果名紅姑娘外垂絳囊中􅍭赤子如珠甜酸可食盈盈繞砌與翠草同芳亦自可愛原本草仁宗時陳堯佐母入宫太后賜以錦荔支遂連皮食之宫人多訕笑夫人對曰徃年夢食此物遂生堯佐後又夢如初遂生堯叟時仁宗尚無皇嗣於是皇后及宫人相率竟食後舉皇子二人増星槎勝覽蘇門荅剌國一等𤓰皮若荔支未剖時甚臭如爛蒜剖開如囊味如酥香甜可食疑即錦荔支也龍眼原龍眼一名益智廣雅云益智龍眼也一名比目見吴氏本草一名圎眼一名蜜脾一名燕卵一名繡水團一名海珠叢一名川彈子一名亞荔支一名荔支奴南方草木狀云荔支過即龍眼熟故謂之荔支奴増本草一名鮫淚一名木彈原閩廣蜀道出荔支處皆有之樹似荔支髙一二丈枝葉微小葉似林檎凌冬不凋春末夏初開細白花七月實熟大如彈丸肉薄於荔支白而有漿甘如蜜質味殊絶純甜無酸實極繁作穂如葡萄每穂五六十顆殻青黄色性畏寒白露後方可採摘性甘平無毒安志健脾補虚開胃除蠧毒去三蟲久服輕身不老裨益聰明故又名益智非今醫家所用之益智子食品以荔支為貴而資益則龍眼為良盖荔支性熱而龍眼平和也彚考増吴志士爕傳爕每遣使詣權致異物竒果蕉邪龍眼之屬無歳不至三輔黄圗漢武帝破南越起扶荔宫以植所得竒草異木龍眼荔支皆百餘本原涪翁雜說左太冲蜀都賦云旁挺龍目側生荔支龍眼惟閩中及南越有之太冲自言十年作賦三都所有皆責土物之貢至於言龍目亦不自知其失也農政全書龍眼與荔支齊名味亦甚羙登盤俎而充供御稱於魏文之詔詠於左思之賦豈凡果之可比哉梧潯雜佩龍眼自尉陀獻漢髙帝始有名見西京雜記左太冲賦旁挺龍目即此梧潯署中皆有之結實甚繁剖之色瑩白政如水晶丸核映扵外味亦甘羙但㣲覺草氣風韻逺遜荔支故謂之荔支奴蘇長公曰閩越人髙荔子而下龍眼吾為平之荔子如食蛑蝤大蟹斫雪流膏一噉可飽龍眼如食彭越石蟹嚼嚙乆之了無所得然酒䦨口爽饜飽之餘則咂啄之味石蟹有時勝蛑蝤也長公此語足為荔奴觧嘲増宋珏荔支譜側生見重於世詩賦歌詠連篇累牘獨旁挺寥寥何也豈以色香頓殊赤若金丸肉似玻瓈核如黒漆補精益髓蠲渇扶飢羙顔色潤肌膚種種功效不可枚舉至於寄逺廣販利反倍於荔子則龍目何可貶也至若耳食之夫以荔熱傷人龍目大補反欲昻此輕彼則婢學夫人不覺膝自屈矣荔支浄盡龍目叢生時則玊露流晨金風扇晚緩剥飽餐亦非人世所有譬梅花已殘忽有桃杏牡丹初謝重見芍藥幽蘭乍萎仍生蕙草皆不可無一不能有二者也泉南雜志荔支才已龍眼始行荔支飽味之餘不堪咀嚼如膏梁子弟居常醲膬一旦家落餔薄糜便不適口廣東志澄海縣七夕酒集多用龍眼謂之結星集藻五言古詩原宋蘇軾亷州龍眼質味殊絶可敵荔支龍眼與荔支異出同父祖端如柑與橘未易相可否異哉西海濵琪樹羅元圃纍纍似桃李一一流膏乳坐疑星隕空又恐珠還浦圗經未甞說玊食逺莫數獨使皴皮生弄色映琱俎蠻荒非汝辱幸免妃子汚増眀宋珏秋日歸故園噉龍眼平昔輕旁挺不堪荔作奴今知奴有等賢蠢亦多途方回及陶侃自比常奴殊外裹黄金餙中懐白玊膚劈破皆走盤顆顆夜光珠更憐核如漆湛湛小兒矑龍目與虎目比喻何其愚但恨荔熟時主在奴不俱安得共盤敦牀頭捉刀夫際此清秋候晶晶空滿盂尼父思伯玊使乎復使乎七言律詩原宋劉子翬龍眼幽姿傍挺綠婆娑啄咂雖㣲奈羙何香割蜜脾知韻勝價輕魚目為生多左思賦詠名初出玉局揄揚論豈頗地極海南秋更暑登盤猶足洗沉痾明王象晉龍眼来從炎徼登琱爼滿案芳馨總莫逾崖蜜縱甘終帶酢江瑶雖羙未全瑜騷人賦就芳名逺漢帝移来貝葉敷較烈側生應不忝何縁喚作荔支奴何縁喚作荔支奴艷冶豐滋百果無琬液醇和羞沆瀣金丸的皪賽璣珠好將姑射仙人産供作瑶池王母需應共荔丹稱伯仲况兼益智䇿勲殊七言絶句原宋張栻寄龍眼荔子如今尚典刑秋林圎實著嘉名雖無赬玊南風面却願筠籠千里行手自封題寄故人聊將風味付詩情千年尚憶唐𦍑疏不汚華清驛騎塵増王十朋龍眼絶品輕紅掃地無紛紛萬木以龍呼實如益智本非藥未比荔支真是奴詞増宋無名氏浣溪沙酒拍臙脂顆顆新丹砂燃火葉精神暑天秋杪錦春生香味已驚櫻實淡絳衣還笑荔支皴羙人偏喜破朱唇别録原製用農政全書白露後採用梅滷浸一宿取出曬乾用火焙之以核乾硬為度如荔支法收藏之成朶乾者名龍眼錦附録山龍眼原山龍眼出廣中夏月熟色青肉如龍眼亦龍眼之野生者也見桂海虞衡志増閩部䟽山果中有枝葉略似鳳尾蕉者曰山龍眼結實纍纍視龍眼小而味酸山僧取以供佛附録龍荔原龍荔狀如小荔支而肉味似龍眼木之身葉亦似二果故名三月開小白花與荔支同􅍄但可蒸食不可生噉令人發癎見鬼物出嶺南見桂海虞衡志増徐氏筆精交趾有龍荔實如小荔支元陳剛中使安南詩云龍荔綴如珠紀其實也謝在杭百粤風土記載廣西荔支如龍眼豈即交趾之種歟御定佩文齋廣羣芳譜巻六十三
