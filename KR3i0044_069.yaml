body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷六十七果譜甜瓜原甜瓜一名甘瓜本草綱目云味甜於諸瓜故得甜甘之稱一名果瓜農書云供果者為果瓜以别於菜瓜也北土中州種蒔甚多二三月下種蔓生葉大數寸五六月花開黄色六七月熟其類甚繁有團者長者尖者扁者大而徑尺者小而一捻者稜之或有或無色之或青或綠或黄斑糝斑白路黄路種種不同甘肅甜瓜大如枕皮瓤皆甘勝於蜜以皮曝乾柔韌甘美而有味浙中一種陰瓜種宜陰處秋熟色黄如金皮膚稍厚藏至春食之如新增廣志瓜之所出以遼東廬江燉煌之種為美有烏瓜魚瓜貍頭瓜蜜筩瓜女臂瓜龍蹄瓜羊髓瓜縑瓜瓜州大瓜如斛御瓜也有靑登瓜大如三斗魁有桂枝瓜長二尺餘蜀地溫良瓜冬熟有春日瓜細小小瓣宜藏正月種三月熟有秋泉瓜秋種十月熟形如羊角色蒼黑農政全書以狀得名則有龍肝虎掌兎頭狸首之稱以色得名則有白團黄瓤白瓤小青大斑之别其味總以甘美為上原凡瓜大曰瓜小曰瓞玊篇云㼎瓞􅀢小瓜也子曰􅀈肉曰瓤玊篇云瓣㼕瓤瓜實也跗曰環農書云謂脱花處也蔕曰㚄農書云謂繫蔓處也其畏麝諸瓜皆同凡食瓜過多但飲酒或水服麝或食鹽花即消化性寒滑無毒少食止渴除煩熱利小便通三焦壅塞夏月不中暑多食動宿冷病破腹手足無力沉水及雙頂雙蔕者有毒不可食彚考原詩豳風七月食瓜大雅緜緜瓜瓞增爾雅瓞瓝其紹瓞注俗呼瓝瓜為瓞紹者瓜蔓緒亦著子但小如瓝原禮記曲禮為天子削瓜者副之巾以絺為國君者華之巾以綌為大夫者累之士㚄之庶人齕之注副析也旣削又四析之乃横斷之而巾覆焉華中裂之不四析也累倮也謂不巾覆也㚄之不中裂横斷去㚄而已齕之不横斷郊特牲天子樹瓜華不歛藏之種也玉藻瓜祭上環注上環橫切之圓如環也夏小正五月乃瓜注乃者急瓜之辭也瓜也者始食瓜也史記蕭相國世家召平者故秦東陵侯秦破為布衣貧種瓜於長安城東瓜美故世俗謂之東陵瓜從召平以為名也前漢書地理志注燉煌杜林以為古瓜州地生美瓜師古曰卽春秋左氏傳所云允姓之戎居於瓜州者也其地今猶出大瓜長者狐入瓜中食之首尾不出晉書孝友傳桑虞有園在宅北數里瓜果初熟有人踰垣盗之虞以園楥多刺恐偷見人驚走而致傷損乃使奴為之開道及偷負瓜將出見道通利知虞使除之乃送所盗瓜叩頭請罪虞乃懽然盡以瓜與之增宋書符瑞志漢安帝元初三年二月東平陵有瓜異處共生八瓜同蔕漢桓帝建和二年七月河東有嘉瓜兩體共蔕晉武帝太康三年六月嘉瓜異體同蔕生河南洛陽輔國將軍王濬園宋孝武帝大明五年五月嘉瓜生建康蔣陵里明帝太始二年八月嘉瓜生南豫州南齊書竟陵王子良傳子良禮才好士傾意賔客天下才學皆遊集焉善立勝事夏月客至為設瓜飮及甘果原南齊書到撝傳宋世上數遊會撝家同從明帝射雉郊野渴倦撝得早青瓜與上對剖食之上懷其舊德意眄良厚孝義傳韓靈敏早孤與兄靈珍並有孝性母尋又亡家貧無以營㐫兄弟共種瓜半畝朝採瓜子暮已復生以此遂辦葬事增陳書儒林傳鄭灼常蔬食講授多苦心熱若瓜時輙偃臥以瓜鎭心起便誦讀其篤志如此魏書宋瓊傳瓊字普賢少以孝行稱母會病季秋之月思瓜不已瓊夢想見之求而遂獲時人稱異原魏書郭祚傳郭祚領太子少師曾從世宗幸東宫肅宗幼弱祚懷一黄㼐出奉焉時人號為黄㼐少師增北齊書蘇瓊傳瓊遷南清河太守郡民趙潁曾為樂陵太守八十致仕歸五月初得新瓜一䨇自來送潁恃年老苦請遂便為留仍致於㕔事梁上竟不剖人遂競貢新果至門聞知潁瓜猶在相顧而去原南史任昉傳昉為新安太守卒於官武帝聞問方食西苑綠沉瓜投之於盤悲不自勝增南史郭祖深傳祖深常服故布襦素木案食不過一肉有姥餉一早青瓜祖深報以匹帛孝義傳郭平原以種瓜為業大明七年大旱瓜瀆不復通船縣令劉僧秀愍其窮老下凟水與之平原曰普天大旱百姓俱困豈可減漑田之水以通運瓜之船乃步從他道往錢塘貨賣北史齊宗室傳蘭陵武王長恭為將躬勤細事每得甘美雖一瓜數果必與將士共之原北史王羆傳羆性儉率不事邊幅客與羆食瓜客削瓜皮侵肉稍厚羆意嫌之及瓜皮落地乃引手就地取而食之客甚愧色唐書杜如晦傳如晦旣塟帝他日食瓜美輟其半奠焉武儒衡傳儒衡遷中書舍人時元稹因宦官知制誥儒衡鄙厭之會公堂食瓜蠅集其上儒衡揮以扇曰適從何處來遂集於此一座皆失色陸贄傳陸贄隨帝幸梁道有獻瓜果者帝嘉其意欲授以試官贄曰爵位天下公器不可輕也今獻瓜一器果一盛則授之彼忘軀命者有以相謂矣曰吾之軀命乃同瓜果瓜果草木也若草木然人何勸哉方技傳四月帝憶瓜明崇儼索百錢須臾以瓜獻曰得之緱氏老人圃中帝召老人問故曰埋一瓜失之土中得百錢西域傳末祿國有尋支瓜大者十人食乃盡春秋元命苞織女星主瓜果龍魚河圖瓜有兩蔕兩鼻者殺人洞㝠記有龍肝瓜長一尺花紅葉素生於冰谷所謂冰谷素葉之瓜仙人瑕丘仲採藥得此瓜食之千歲不渴瓜上恒如霜雪刮嘗如蜜滓及武帝封㤗山從者皆賜冰谷素葉之瓜呉越春秋越王伐呉呉王率羣臣遁去因得生瓜已熟呉王掇而食之謂左右曰何冬而生瓜近道人不食何也左右曰謂糞種之物人不食也呉王曰何謂糞種左右曰盛夏之時人食生瓜起居道傍子復生秋霜惡之故不食漢武外傳西王母告上元夫人曰共造朱火丹陵食靈瓜味甚好憶此未久而已七千歲矣新序梁大夫有宋就者嘗為邊縣令與楚隣界梁之邊亭與楚之邊亭皆種瓜各有數梁之邊亭人劬力數灌其瓜瓜美楚人窳而稀灌其瓜瓜惡楚令因以梁瓜之美怒其亭瓜之惡也楚亭人惡梁亭之賢已因徃夜竊搔梁亭之瓜皆有死焦者矣梁亭覺之因請其尉亦欲竊往報搔楚亭之瓜尉以請宋就就曰人惡亦惡何褊之甚也若我敎子必每暮令人往竊為楚亭夜善灌其瓜弗令知也於是梁亭乃每暮夜竊灌楚亭之瓜楚亭旦而行瓜則又皆以灌矣瓜日以美楚亭怪而察之則乃梁亭也楚令聞之大悅因具以聞楚王楚王曰此梁之隂讓也乃謝以重幣而請交於梁王故梁楚之歡由宋就始列仙傳谿父者南郡甗人居山間間有仙人常止其家從買瓜敎之煉瓜子與桂附枳實共藏而對分食之二十餘年能飛走昇山入水服閭者往來海邊諸祠中見二仙人博賭瓜使擔黄瓜數十頭令瞑目乃上方丈山增博物志人以冷水自漬至膝可頓啖數十枚瓜漬至腰啖轉多至頸可啖百餘枚所漬水皆作瓜氣神仙傳葛元冬中能為客設生瓜夏致氷雪介象常為呉主種瓜菜百果皆立生可食祭法夏祠秋祠皆用瓜搜神記呉時有徐光者常行術於市里從人乞瓜其主勿與便從索瓣杖地種之俄而瓜生蔓延生花成實乃取食之因賜觀者鬻者反視所出賣皆亡耗矣拾遺記漢明帝隂貴人夢食瓜甚美帝使求諸方國時燉煌獻異瓜種瓜名穹隆長三尺而形屈曲味美如飴父老云昔道士從蓬萊山得此瓜云是崆峒靈瓜四刼一實西王母遺於此地世代遐遠其實頗在須彌山有瓜如桂原孝子傳焦華西秦時人父病甚仲冬思瓜求之不得忽夢一人黄冠謂曰聞子父病思瓜故送瓜以助子華拜受之及寤瓜在手馨香非常父食而愈增晉錄咸寧中嘉瓜同蔕生於成都原異苑晉武帝太康八年王濬園生瓜三莖一實孫鍾富春人堅父也與母居至孝篤性種瓜為業忽有三年少容服妍麗詣鍾乞瓜鍾為設食出瓜禮敬慇懃三人臨去曰我等司命郎感君接見之厚欲連世封侯欲數世天子鍾曰數世天子故當所樂因為鍾定墓地出門悉化成白鵠增述異記漢章帝元年上虞縣獻二蔕瓜一實二蔕瓜步在呉中呉人賣瓜於江畔用以名焉呉桓王時會稽生五色瓜今呉中有五色瓜歲充貢伏獻列異傳遼東丁伯昭自說有客字次節旣亡常為本家致奇物試臘月中從索瓜得美瓜數枚原黄庭經注大霍山下有洞臺司命君之府也中有神盤靈瓜食之心通至元增南岳夫人内傳夫人姓魏名華存性樂神仙季冬夜半有眞人至靜室陳元室紫柰絳實靈瓜經行記大食國瓜大者名尋支十餘人食一顆輙亦足越瓜長四尺以上廣異記謝𤣥卿見東華丈人為設空同靈瓜原白帖漢哀帝二年瓜異本同蔕共生一實時以為嘉瓜積石山有瓜三年一實酉陽雜爼瓜惡香香中尤忌麝鄭注太和初赴職河中姬妾百餘盡騎香氣數里逆於人鼻是歲自京至河中所過路瓜盡死一蔕不獲衛國縣西南有瓜穴冬夏常出水望之如練時有瓜葉出焉相傳苻秦時有李班者頗好道術入穴中行可三百歩廓然有宫宇牀榻上有經書見二人對坐鬚髪皓白班前拜於牀下一人顧曰卿可還無宜久住班辭出至穴口有瓜數箇欲取乃化為石尋故道得還至家家人云班去來已經四十年矣增杜陽雜編滄浪洲產分蔕瓜瓜長二尺其色如椹一顆二蔕原清異錄洛南會昌中瓜圃結五六實長幾尺而極大者類蛾綠其上皺文酷似蟬形圃中人連蔓移土檻貢上命之曰御蟬香挹腰緑果中子繁者惟夏瓜冬瓜石榴故嗜果者目瓜為百子甕遼東一處有瓜若澆沃之則以酒代水實成破為十叚每段中止有一子而長數寸食一顆可作十日糧國人珍之名獨子青呉越稱霅上瓜錢氏子弟逃暑取一瓜各言子之的數言定剖觀負者張宴謂之瓜戰瓜最盛者無踰齊趙車擔列市道路濃香故彼人云未至舌交先以鼻選續仙傳馬湘有道術嘗於江南刺史馬植坐上以酒盃盛土種瓜須臾引蔓生實食之甚美增集仙錄花姑女道士黄靈微也昇化之後座中奠瓜數日生蔓結實如桃者二焉國老談苑趙世長以宗正卿北使時九月既宴薦瓜主客謂世長曰此方氣候誠早彼想未也世長對曰本朝來歲季夏此味方盛故知其節物晩也揮麈前錄宣和中蔡居安提舉祕書省夏日會館職於道山食瓜居安令坐上徵瓜事各疏所憶每一條食一片坐客不敢盡言居安所徵為優欲畢校書郎董彦遠連徵數事皆所未聞悉有據依咸歎服之識者謂彦遠必不能安後數日果補外原聞見錄呂文穆蒙正在龍門讀書一日行伊水見賣瓜者意欲得之苦無錢其人遺一枚公悵然食之後作相買園洛城東南下直伊水起亭名饐瓜不忘舊也道學傳褚雅與人共居常取水洒掃夏月種瓜恣人來取明通紀洪武五年六月句容縣民獻嘉瓜二同蔕而生禮部尚書陶凱奏曰禎祥實由聖德上曰朕寡德不敢當且草木之祥生於其土亦惟其土人應之與朕何與若盡天地間時和歲豐乃王者之禎祥也增學圃餘疏甜瓜以香而小者為第一作黄綠二色豈邵平所種五色子母瓜耶今凉州塞外作乾條遺遠人味極甘當是此種帝京景物畧京師七夕以瓜雕刻成花謂之花瓜西湖志杭州月塘皆沙田土宜瓜宋有周姓者善種之號周家瓜集藻啓增梁元帝謝東宫賚瓜啓金榮始薦瓊蘂載珍味奪蔗漿甘踰石蜜表增唐柳宗元禮部賀嘉瓜表臣某等今日内出浙東觀察使賈全所進越州山隂縣移風鄕百姓王獻朝園内産嘉瓜二實同蔕圖示百寮者寳祚維新嘉瑞來應式彰聖德更表天心臣某等誠慶誠賀頓首頓首伏惟皇帝陛下保合太和緝熈庶類德馨上逹神化旁行嘉瓜發祥來自侯服質惟同蔕見車書之永均地則移風知化育之方始雖七月而食豳土歌王業之難五色稱珍東陵咏佳賔之會未聞感通若斯昭著者也臣等遭逢聖運親仰珍圖忭躍之誠倍百恒品賦增魏劉楨瓜賦並序在曹植坐厨人進瓜植命為賦促立成其辭曰布象牙之席薫玳瑁之筵憑彤玊之几酌縹碧之尊三星在隅溫風節暮枕翹於藤流美遠布黄花炳曄潛實獨著豐細異形圓方殊務揚暉發藻九采雜糅厥初作苦終然允甘應時湫熟含蘭吐芳藍皮密理素肌丹瓤乃命圃師貢其最良投諸清流一浮一藏析以金刀四剖三離承之以雕盤羃之以纎絺甘逾蜜房冷亞氷圭晉傅元瓜賦調土下種播之有經應運候時負甲徐生遂日就而月將既成母而盤縈次落莫之密葉兮交逶迤之修莖敷碧緑之純采金華炳其朗明育之以人功養之以六氣黄逾金緗青侔含翠雖貍首之甘美兮未若東門之奇偉舊有蜜筩及青括蔞嘉味溢口鮮類寡儔一齧之頃至三揺頭選美芳園重簡其珍披以呉刀承以朱盤中割而破雖分若完質兼五味氣美芳蘭愈得冷而益甘兮怡神爽而解煩細肌密理多瓤少瓣豐㫖絶異食之不䬼原陸機瓜賦佳哉瓜之為德邈衆果而莫賢殷中和之淳祐播滋榮於甫田背芳春以初載迎朱夏而自延奮修系之莫莫邁秀瓞之綿綿赴廣武以長蔓粲烟接以雲連感嘉時而促節蒙惠露而增鮮若乃紛敷雜錯鬱悦婆娑發彼適此迭相經過熙朗日以熠耀扇和風其如波有葛虆之覃及象椒聊之衆多發金榮於秀翹結玊實於柔柯蔽翠景以自育綴修莖而星羅夫其種族類數則有括蔞定陶黄㼐白摶金文蜜筩小青大斑𤣥骭素椀貍首虎蹯東陵出於秦谷桂髓起於巫山五色比象殊形異端或濟貌以表内或惠心而醜顔或攄文而抱緑或披素而懷丹氣洪細而俱芬體修短而必圓芳郁烈其充堂味窮理而不䬼德𢎞濟於饑渴道殷流乎貴賤若夫濯以寒水淬以夏凌越氣外斂溫液密凝體猶握虚離若剖氷增張載瓜賦羊骹虎掌桂枝蜜筩𤣥表丹裏呈素含紅豐膚外偉緑瓤内醲甘柤夏熟丹柰冬芳朱李零於桂圃蒲萄潰於椒牀雖茲肴之孤起莫斯瓜之允臧超椰子於南海越橘柚於衡陽若乃㯽榔椰實龍眼荔枝徒以希珍難致為竒論實比德孰大於斯嵇含瓜賦世云三芝瓜則處全焉故植根玊巖潤葉飛泉攬之者壽食之者仙是謂雲芝芙蕖振采擢莖元瀬闕二字葩映莫此為最是謂水芝甘瓜普植用薦神祗其名龍膽其味亦奇是謂土芝乃剖甘瓜旣淳且馨荒者饗之忘困解酲流味通其五臟冷氣反其迷精梁張纘瓜賦惟茲瓜之實茂體太素之純精翕元潤於浮霄含皇澤於夏庭於是蒼春發歲天地交和乃啓沃壤是殖是播納佳種於畦畹應時運而芽剖揮萌散蘖㘽葉負柯蓊茸鬱薈苯䔿婆娑晞慶雲以吐㽔仰旭日之敷花朝晞重陽夕承朗月淸露湛而宵降翔風穆以晨發振柯翹之繞若顧惠風以滋悅感靈化而絪縕覩佳實之並結始懷徵而苦發終感宫而甘通信不和而自馨與九鼎乎齊功蔓草是藉密葉是蔽潛湫獨熟墮莖落蔕芬馥酷烈氣暢雲際申狄不能詳其味𨽻首不能為之計昔東陵之甘瓜美顯名於中古彼服閭之攸擔乃衆仙之所睹美人神之同好何厥用之𢎞普惟令實於無窮永可殖於靈圃原唐康子玊瓜賦巫山之岡秦川之陽垂條引蔓布緑敷黄彌臯被野含芬吐芳轉晨風之穆穆湛宵露之瀼瀼花葉則曄曄煒煒文彩則焜焜煌煌錦繡為之失色霞日為之奪光遠而望之粲兮爛繁星列兮曜長漢光色連延遙相暖廹而察之瓞兮緜明璣盈蚌媚重泉大鱗巨介近相連細雨流風每飄颻兮葉上遊蜂戲蝶時歴亂於花前爾其大則三尺二升美則金漿玊實貍頭羊骹之字黄㼐白摶之質感仙貴於孫鍾避世資於歩隲異蔕表於前代同心彰乎曩日旣而横綺席會嘉賓琴樽逸賞海陸具陳香分四座氣雜八珍既取類於母子亦取辨乎君臣猗哉彼美流玩不已何以剖之金錯刀何以澆之玊英水邵平固植以著業阮籍托辭而興巳非但留怨於戌夫抑亦取誡於君子文散句增魏文帝與呉質書浮甘瓜於清泉晉左思蜀都賦瓜疇芋區梁昭明太子七召瓜稱素腕之美唐柳宗元賀嘉瓜表神瓜合形式表綿綿之慶五言古詩增唐張説寄姚司馬共君春種瓜本期清夏暑瓜成人已去失望將誰語裛露滴香園感味懷心許偶逢西風便因之寄鄂渚原杜甫園人送瓜江南雖炎瘴瓜熟亦不早栢公鎭䕫國滯務茲一掃食新先戰士共少及溪老傾筐蒲鴿青滿眼顔色好竹竿接篏竇引注來鳥道沉浮亂水玊愛惜如芝草落刃嚼氷霜開懷慰枯槁許以秋蔕除仍看小童抱東陵跡蕪絶楚漢休征討園人非故侯種此何草草五言律詩原唐李嶠咏瓜欲識東陵味靑門五色瓜龍蹄遠珠履女臂動金花六子方呈瑞三仙實可嘉終期奉絺綌謁帝佇非賒增孟浩然南山下與老圃期種瓜樵牧南山近林閭北郭賖先人留素業老圃作鄰家不種千株橘惟資五色瓜邵平能就我開徑剪蓬麻宋楊萬里謝人餉新瓜病骨那禁暑衰年更作愁有風依舊熱初伏幾時秋瓜葉誰新餉饞涎小忍休金盆井花水且看玊雙浮風露盈籃至甘香隔壁聞緑團甖一揑白裂玊平分蘚甃開氷叚梅山失火雲老夫供晩酌不用辦羶葷七言律詩原宋黄庭堅食瓜有感暑軒無物洗煩蒸百果凡材得我憎蘚井筠籠浸蒼玊金盤碧筯薦寒氷田中誰問不納履坐上適來何處蠅此理一盃分付與我思明哲在東陵增劉子翬謝人送瓜瓜疇暑雨亂花飛美實蠲煩喜及時蘚井筠籠香發越金刀玊手翠離披侯家昔見連阡盛賈肆徒誇厚貌奇珍重故人分送意臨風宛似對奇姿呼兒急走送筠籃敵暑惟應此物堪一握青瑶含秀潤滿襟寒雪沍清甘搔園底用供鄰怨剪棘聊應益盗慚他日倘收遺瓣種離離虎掌遍山南五言絶句原宋范成大題甘瓜圖夏膚粗已皴秋蔕熟將脫不辭抱蔓歸聊慰相如渴增趙山臺甘瓜氷泉浸緑玊霜刃破黄金凉冷消晩暑清甘洗渴心七言絶句原宋劉子翬致中惠瓜成二絶故人夙有分瓜約走送筠籃百里間翠甒瓊罌纔一握極知風味勝黄斑柘漿溜溜香浮玊蘇水沉沉色弄金那似甘瓜能破暑一盤霜雪洗清襟范成大田園雜興晝出耘田夜績麻村莊兒女各當家童孫未解躬耕織也傍桑隂學種瓜增劉宰謝送瓜碧圓到眼舌生津三載深慙拜賜頻莫怪尊前最知味東陵自是種瓜人花蘂夫人宫詞沉香亭子傍池斜夏日廵遊歇翠華簾畔越盆盛淨水玊人手裏剖銀瓜明李東陽畫瓜玊盤秋露水精寒氷齒餘香嚼未殘暑月為君清到骨不知身在畫中看原張楷題畫瓜翠實離離引蔓秋西風凉露滿林丘東陵尚有閒田地千載無人説故侯周良金吾園亦在東門外昨日清明手種瓜不信邵平能五色吾園兼有武陵花詩散句原晉阮籍昔聞東陵瓜近在青門外連畛距阡陌子母相鈎帶五色曜朝日嘉賓四面會陶潛邵生瓜田中寧似東陵時唐杜甫青門種瓜人舊日東陵侯增宋楊萬里獨酌聖賢酒新嘗子母瓜宋李待制清泠氷有味甘潤玊無漿唐王建内園分得溫湯水三月中旬已進瓜曹唐路尋故舊過西谷因得氷園一尺瓜宋楊億銅盤瓊蕊三危露素綆寒漿五色瓜明王寵山田犖确苦多沙學種東陵五色瓜周庾信破壠夕瓜熟甘瓜開蜜筩原唐李嶠破甘霜落瓜增王灣新味瓜初剖蕭潁士隴瓜香早熟原杜甫瓜嚼水晶寒王維金盤五色瓜韓愈瓜畦爛文具秋瓜未落蔕澄澈甘瓜濯柳宗元霜蔓縋寒瓜增白居易晚瓜有餘馨宋王安石破瓜青玊美原唐杜甫青門瓜地新凍裂豈傍青門學種瓜李頎玊盆貯水割甘瓜宋陸游新瓜落刃氷盤裏元耶律楚材午風凉處剖新瓜詞原宋馬莊父靑門引手種團團玊香起日晴初熟金刀錯落曉霜寒十分風味獨向暑天足唐君去後雲空谷異事傳流俗刀圭倘是神仙藥地皮捲盡猶飛肉增鄭域百字令東陵美景有輕烟和月斜風吹雨一種龍鬚隨地轉不學松蘿兒女結實圓青收來掌握猶帶金盤露拍浮金井水花零亂飛舞誰信六月飄霜破開落刃散銀絲金縷冷碧凄香縈齒頰洗我塵襟煩暑杜老吟詩已公留客此興無今古安期非誕世間有棗如許别錄原種植二月上旬為上時三月上旬為中時四月上旬為下時至五六月止可種藏瓜耳預將生數葉便結瓜者為本母子候熟蔕自落取來截去兩頭其中叚子淘淨曝乾收作種臨種時用鹽水洗之取熟糞土種之仍將洗子鹽水澆之得鹽氣則不籠死坑深五寸大如斗納瓜子大豆各四粒瓜生數葉將豆搯去瓜生至初花鋤三四次勿令生草但鋤不可傷根傷根則瓜苦候秧拖時搯去蔓心再用熟糞培根下勤澆灌摘瓜勿令踏蔓及翻覆之踏則瓜爛翻則瓜死若生蟻置骨其旁引而棄之製用瓜蔕一名瓜丁一名苦丁香凡使勿用白瓜蔕要取青緑色團而短者良瓜氣足時其蔕自然落在蔓上采得繫屋東有風處吹乾用本草云乃陽明經除濕熱之藥也西瓜原西瓜一名寒瓜蔓生花如甜瓜葉大多椏缺面深靑背㣲白葉與莖皆有毛如刺㣲細而硬其稜或有或無其色或青或緑或白其形或長或圓或大或小其瓤或白或黄或紅紅者味尤勝其子或黄或紅或黑或白白者味更劣其味或甘或淡或酸酸者為下舊傳種來自西域故名西瓜今處處有之薦福瓜出蘇州城南二十里蔣市瓜牌樓市瓜出太倉州一種陽溪瓜秋生冬熟形畧長扁而大瓤色如胭脂味最美可留至次年云是異人所遺之種味甘淡寒無毒除煩止渴消暑熱療喉痺口瘡解酒毒子取仁可薦茶皮可蜜煎糖煎醬醃食瓜後食其子即不噫瓜氣以瓜劃破曝日中少頃食之頗凉收藏得法可至來年春夏近糯米及酒氣則易爛猫踏之其瓤便沙彚考原梁書孝行傳滕曇恭年五歲母楊氏患熱思食寒瓜土俗所不產曇恭歴訪不能得衘悲哀切俄値一桑門問其故曇恭具以告桑門曰我有兩瓜分一相遺曇恭拜謝因捧瓜還以薦其母舉室驚異尋訪桑門莫知所在增五代史蕭翰北歸有胡嶠為翰掌書記隨入契丹周廣順三年亡歸中國畧能道其所見云自上京東去四十里至眞珠寨始食菜明日東行地勢漸高西望平地松林鬱然數十里遂入平川多草木始食西瓜云契丹破回紇得此種以牛糞覆棚而種大如中國冬瓜而味甘松漠紀聞西瓜形如扁蒲而圓色極青翠經歲則變黄其瓞類甜瓜味甘脆中有汁尤冷洪皓出使攜以歸今禁圃鄉圃皆有亦可留數月但不能經歲仍不變黄色鄱陽有久苦目疾者曝乾服之而愈蓋其性冷故也事物紀原中國初無西瓜洪忠宣使金貶逓隂山得食之其大如斗絶甘冷可蠲暑疾石湖詩註西瓜味淡而多液本燕北種今河南皆種之眞臘風土記蔬菜有西瓜丹鉛總錄余嘗疑本草瓜類中不載西瓜後讀五代郃陽令胡嶠䧟北記云嶠於回紇得瓜種以牛糞種之結實大如斗味甘名曰西瓜是西瓜至五代始入中國也文選浮甘瓜於清泉葢指黄瓜甜瓜也本草陶宏景註瓜蔕云永嘉有寒瓜甚大可藏至春者卽西瓜也則五代之先瓜種已入浙東但無西瓜之名及徧於中國耳瀛厓勝覽蘇門荅刺國有西瓜緑皮紅子長二三尺靺鞨國西瓜甜瓜一枚用二人舉之古里國西瓜四時皆有蜀都雜抄金王予可南云咏西瓜云一片冷裁潭底月六灣斜捲隴頭雲又在元世祖前矣集藻七言律詩增元方䕫食西瓜恨無纎手削駞峰醉嚼寒瓜一百筩縷縷花衫沾唾碧㾗㾗丹血搯膚紅香浮笑語牙生水凉入衣襟骨有風從此安心師老圃青門何處問窮通明李東陽汝賢饋西瓜及檳榔漢使西還道路賖至今中國有靈瓜香浮碧水清先透片逐鸞刀巧更斜飽德未忘蒙正饐為園翻愧老樊家因君解取南閩俗更説檳榔可代茶七言絶句增宋范成大西瓜園碧蔓凌霜臥軟沙年來處處食西瓜形模濩落淡如水未可葡萄苜蓿誇别錄原種植秋月擇其瓜之嘉者留子曬乾收作種欲種瓜地耕熟加牛糞至清明時先以燒酒浸瓜子少時取出漉淨拌灰一宿相離六尺起一淺坑用糞和土瘞之於四周中留鬆土種子其中不得復移瓜易活而甘美栽宜稀澆宜頻糞宜多蔓短時作綿兜每朝取蟲恐食蔓長則已頂蔓長至六七尺則搯其頂心令四旁生蔓欲瓜大者每科揀其端正旺相者止留一瓜餘蔓花皆搯去則實大而味美性畏香尤忌麝麝觸之乃至一顆不收防害紀明齋任汝寧園户獻一瓜甚大公異之園户曰往未有此大公曰吾聞物之異常者有毒令一𨽻往觀之根下有蜈蚣數十遂棄其瓜延壽書云陳逢原避暑食瓜過多至秋忽腰腹痛不能舉動商助教療之乃愈大抵瓜性寒北人秉壯食之無害南人秉弱食之遂成瀉痢寒胃忌之附録北瓜原北瓜形如西瓜而小皮色白甚薄瓤甚紅子亦如西瓜而微小狹長味甚甘美與西瓜同時想亦西瓜别種也附録石瓜原烏徹軍民府土産石瓜樹生堅如石善治心痛增益部方物畧記石瓜生蛾睂山中樹端挺葉肥滑如冬青甚似桑花色淺黄實長不圓殻解而子見以其形似瓜故里人名之煮為液黄能治痺集藻贊增宋宋祁石瓜贊修幹澤葉結實如綴膚解核零可用治痺劉子增爾雅劉劉杙注劉子生山中實如棃酢甜核堅出交趾南方草木狀劉樹子大如李實味酢煮蜜藏之仍自好荆揚異物志劉子樹生交廣武平興古諸郡山中三月著花結實如棃七八月熟色黄味甘酢而核甚堅不周山果增山海經不周之山有嘉果子如棗黄如桃黄花赤樹食之不飢如何樹實增神異經南方大荒有樹焉名曰如何三百歲作華九百歲作實華色朱其實正黄高五十丈敷張如蓋葉長一丈廣二尺餘似菅苧色青厚五分可以絮如厚朴材理如支九子味如飴實有核形如棗子長五尺圍如長金刀剖之則酸蘆刀剖之則辛食之者地仙不畏水火不畏白刃彚考增啓蒙記如何隨刀而改味或曰此卽仙經所謂火棗平仲增漢書注檘平仲木也亦云火槖木一云玊精食其子得為神仙也集藻賦散句增漢司馬相如上林賦華楓檘櫨晉左思呉都賦平仲之木實白如銀詩散句增唐沈佺期芳春平仲緑清夜子規啼繫彌子增廣志繫彌子狀圓而細赤如軟棗其味初苦後甘可食都咸子增南方草木狀都咸樹出日南三月生花仍連著實大如指長三寸七八月熟其色正黑南州記其樹如李子大如指取子及皮葉曝乾作飲極香美本草綱目陳藏器曰子及皮葉氣味甘平無毒主治火乾作飲止渴潤肺去煩除痰李珣曰去傷寒清涕欬逆上氣宜煎服之千歲子增南方草木狀千歲子有藤蔓出土子在根下鬚緑色交加如織其子一苞二百餘顆皮殻青黄色殻中有肉如栗味亦如之乾者肉殻相雜撼之有聲似肉荳蔲出交趾彚考增三輔黄圖漢武帝元鼎六年破南越起扶荔宫以植所得竒草異木龍眼荔支檳榔橄欖千歲子甘橘皆百本人面子增南方草木狀人面子樹似含桃結子如桃實無味核正如人面故以為名以蜜漬之稍可食其核可翫出南海寰宇記人面木春花夏實秋熟皮味甘酸實有核如胡桃兩邊如人面集藻七言絶句增宋楊萬里人面子喜時能笑醉能歌睂映青山眼映波舊日美如潘騎省只今瘦似病維摩夫編子增南方草木狀夫編樹野生三月花仍連著實五六月成子及熟煮投下魚雞鴨羮中好亦中鹽藏出交趾武平五歛子增南方草木狀五歛子大如木瓜黄色皮肉脆軟味極酸上有五稜如刻出南人呼稜為歛故以為名以蜜漬之甘酢而美出南海本草閩中人呼為陽桃形甚詭異其核如柰五月熟一樹可得數石十月再熟蜜漬之美俗亦曬乾以充果食都昆子增南方草木狀都昆樹野生二月花仍連著實八九月熟如雞卵里民取食之皮核滋味酢出九眞交趾椰子增本草椰子一名胥餘司馬相如上林賦作胥餘一作胥耶一名越王頭其核有兩眼故俗謂之越王頭南方草木狀椰樹葉如栟櫚高六七丈無枝條其實大如寒瓜外有粗皮皮次有殻圓而且堅剖之有白膚厚半寸味似胡桃而極肥美有漿飲之得醉寰宇記椰子樹似檳榔而高大葉長一尺無隂結實一房生三十餘子如瓜其殻中有白如熊白内有漿一升清如水甜如蜜飲之愈渴疾殻堪為酒壺皮堪縛船土人多種之本草蘇頌曰椰子嶺南州郡皆有之㓂宗奭曰椰子開之有汁白色如乳如酒極香别是一種氣味强名為酒中有白瓠形圓如栝樓上起細壠亦白色而微虚其紋若婦人裙褶味亦如汁與著殻一層白肉皆可糖煎為果其殻為酒器如酒中有毒則酒沸起或裂破李時珍曰木至斗大方結實大者三四圍高五六丈二月開花成穗出於葉間長二三尺大如五斗器仍連著實一穗數枚六七月熟其殻磨光有斑纈㸃紋横破之可作壺爵縱破之可作瓢杓彚考增唐書南蠻列傳環王取椰葉為席神異經東南荒中有邪木高三十丈或十餘圍或七八尺其枝喬直上不可那也葉如甘瓜二百歲葉落而生花花形如甘瓜花復二百歲落盡而生萼萼下生子三歲而成熟成熟之後不長不減子形如寒瓜長七八寸徑四五尺蕚復覆生頂此不取萬世如故若取子而留蕚蕚復生子如初年月復成熟復二年則成萼而復生子其子如甘瓤少􅀈甘美食之令人身澤不可過三升令人㝠醉半日乃醒木高人取不能得惟木下有多羅之人緣能得之一名無葉世人後生不見葉故謂之無葉也一名倚驕南方草木狀昔林邑王與越王有故怨遣俠客刺得其首懸之於樹俄化為椰子林邑王憤之命剖以為飲器南人至今效之當刺時越王大醉故其漿猶如酒云齊東野語今人以椰子漿為椰子酒而不知椰子花可以釀酒唐殷堯封寄嶺南張明府詩云椰花好為酒誰伴醉如泥廣東志茂名縣高力士宅在縣西力士縣人馮盎之孫故有宅嘗手植枯椰子二株高百尺宋時尚存廣東新語瓊人每以檳榔代茶椰代酒以欵賓客謂椰酒久服可以烏鬚集藻賦散句增漢司馬相如上林賦留落胥餘晉左思呉都賦椰葉無隂五言古詩增宋梅堯臣李獻甫於南海魏侍郎得椰子見遺魏公畨禺歸逢子蕪江口贈以越王頭還同月支首割解為飲器津漿若美酒我獨愧先生饌致崇師友應知愈饑渴况是懐思久張于翔椰子樹矮胡生南方托生碧山崖採擇供貢筐扶杖上天街愧此愿慤姿欲售久未諧道旁麴先生風味固自佳逢渠即傾葢輸寫能開懐刮削出光采規繩去欹窊金玊豈足貴膠漆眞吾儕客來有嘉招二士往必偕婆娑止坐隅共饋煩金釵矮頭雖木强醇德真無涯虚心實其腹居然外形骸微物幸見用棄置理則乖毛頴有封國陶匏薦煙柴大藥起世痾炮燔及根荄願子自洗濯勿受塵埃埋暇日肯相從醉經生高齋五言律詩增唐沈佺期題椰子樹日南椰子樹杳褭出風塵叢生調木首圓實檳榔身玊房九霄露碧葉四時春不及塗林果移根隨漢臣七言絶句增宋黄庭堅椰子漿成乳酒醺人醉肉截鵞肪上客盤有核如匏可雕琢道裝宜作玊人冠詩散句增元何中歸馬駝椰子濩落魏瓠垂絢華殻初剖濯濯膾玊肥宋黄庭堅碩果不食寒林梢剖而器之如懸匏唐張諤椰子日南枝張籍椰葉瘴雲濕别錄增海槎餘錄椰子樹初栽時用鹽一二斗先置根下則易發附録青田核增古今注烏孫國有青田核狀如桃核不知其樹核大如數斗剖之盛水則變酒味甚醇美飲盡隨即注水隨盡隨成但不可久久則苦澁謂之青田酒漢末蜀王劉璋得之酉陽雜爼一名青田壺附錄嚴樹增一統志瓊州有嚴樹搗其皮葉浸以清水和以粳釀或入石榴花葉數日成酒能醉人州樹子增南州記州樹野生二月花連著實如李子五月熟剝核食之味甜出武平國樹子增南州記國樹子如鴈卵野生三月花連著實九月熟曝乾剝殻取食之味似栗出交趾前樹子增南州記前樹野生二月花仍連著實如手指長三寸五六月熟以湯滴之削去核食以糟鹽藏之味辛可食出交趾都桷子按南方草木狀廣志交州記俱作桶子本草拾遺又作構子與楮構之構名同實異增南州記都桷子生廣南山谷樹高丈餘二月開花連著實大如雞卵七月熟魏王花木志都桷樹出九眞交趾野生花赤色子似木瓜里民取食之味酢以鹽酸漚食或蜜藏皆可㯆樹子增南州記㯆樹子如桃實長寸餘二月花連著實五月熟色黄鹽藏味酸似白梅出九眞韶子增廣州記韶葉如栗赤色子大如栗有刺棘破其皮内有肉如猪肪着核不離味甘酢核如荔枝桂海虞衡志山韶子夏熟色紅肉如荔枝藤韶子秋熟大如鳬卵柿五子增廣州記五子樹實如梨裏有五核因名五子白緣子增交州記白緣樹高丈餘實味甘美於胡桃多感子增交州記多感子黄色圍一寸蔗子增交州記蔗子如瓜大亦似柚彌子增交州記彌子圓而細其味初苦後甘梅桃增臨海異物志梅桃子生晉安侯官縣一小樹得數拾石實大三寸可蜜藏之揚揺子增臨海異物志揚搖有七脊子生樹皮中其體雖異味則無奇長四五寸色青黄味甘冬熟增臨海異物志冬熟如指大正赤味甘勝梅猴闥子增臨海異物志猴闥子如指頭大其味小苦可食關桃子增齊民要術關桃子其味酸士翁子增齊民要術士翁子如漆子大熟時甜酸其色青黑枸槽子增齊民要術枸槽子如指頭大正赤其味甘猴總子增齊民要術猴總子如小指頭大與柿相似其味不減於柿多南子增齊民要術多南子如指大其色紫味甘與梅子相似出晉安王壇子增齊民要術王壇子如棗大其味甘出侯官越王祭太乙壇邊有此果無知其名因見生處遂名王壇其形小於龍眼有似木瓜棎子增荆揚異物志棎子樹南越丹陽諸郡山中皆有之其實如梨冬熟味酢本草拾遺棎子似棃生江南左思呉都賦棎榴禦霜是也都念子增大業拾遺錄南海郡送都念子樹一百株勅付西苑十六院内種此樹高一丈許葉如白楊枝柯長細花心金色花葉正赤似蜀葵而大其子小於柿子甘酸至美蜜漬為粽益佳嶺表錄異倒捻子花似蜀葵小而深紫南中婦女多用染色子如軟柹外紫内赤無核頭上有四葉如柿蒂食者必捻其蒂故謂之倒捻子或訛呼都念子今又訛念為撚或又作粘東坡雜記吾謫居南海以五月出陸至滕州自滕至儋野花夾道如芍藥而小紅鮮可愛樸􅈪叢生土人云倒粘子花也至儋則已結子爛紫可食殊甘美中有細核嚼之瑟瑟有聲亦頗苦澁童兒食之使大便難野人夏秋痢下食葉輙已海南無柿剝浸揉撋之以代柿油蓋愈於柿也因名之曰海漆侯騷增酉陽雜爼侯騷蔓生子如雞卵既甘且冷輕身消酒仙樹實增酉陽雜爼祁連山有仙樹實行旅得之止饑渴一名四味木其實如棗以竹刀剖則甘鐵刀剖則苦木刀剖則酸蘆刀剖則辛彚考增西河舊事祁連山有仙樹人行山中以療飢渴者輙得之飽不得持去平居亦不得見蠡齊子增酉陽雜爼蠡齊子如彈丸魏武帝常啖之無石子增酉陽雜爼無石子出波斯國波斯呼為摩賊樹長六七丈圍八九尺葉似桃葉而長三月開花白色花心㣲紅子圓如彈丸初青熟乃黄白蟲食成孔者正熟皮無孔者入藥用其樹一年生無石子一年生䟦屢子大如指長三寸上有殻中仁如栗黄可噉婆羅婆增酉陽雜爼婆羅婆樹其實如甕磐砮穡樹增酉陽雜爼磐砮穡樹出波斯國亦出拂林國拂林呼為羣漢樹長三丈圍四五尺葉如細榕經寒不凋花似橘白色子緑大如酸棗其味甜膩可食西域人壓為油以塗身可去風痒齊􅚐增酉陽雜爼齊􅚐樹出波斯國亦出拂林國拂林呼為齊􅸿樹長二三丈皮青白花似柚極芬香子似楊桃五月熟西域人壓為油以煑餅菓如中國之用巨勝也那核婆增北户錄那核婆果出印度大如冬瓜熟則果赤剖之中有十小果大如雞卵更又破之其汁黄赤其味甘美或在樹枝如衆果之結實或在樹根如茯苓之出土猪肉子增寰宇記端溪縣有樹冬榮其子號曰猪肉子大如杯其肉如肪炙而食之味似猪肉至美故名黎􅰧子增桂海虞衡志黎􅰧子形如大梅復似小橘味極酸彚考增東坡雜記黎錞字希聲為人質木遲緩劉貢父戲之為黎􅰧子以謂指其德不知果木中眞有此也一日聯騎出聞市人有唱是果鬻之者大笑幾落馬櫓罟子增桂海虞衡志櫓罟子大如半升椀諦視之數十房攢聚成毬每房有縫冬生青至夏紅破其瓣食之㣲甘槎檫子增桂海虞衡志槎檫子如錐栗肉甘而微澁火炭子增桂海虞衡志火炭子如烏李部諦子增桂海虞衡志部諦子色黄如大石榴木賴子增桂海虞衡志木賴子如淡黄大李羅晃子增桂海虞衡志羅晃子如橄欖其皮七重古米子增桂海虞衡志古米子殻黄中有肉如米粒殻子增桂海虞衡志殻子如青梅味甘藤核子增桂海虞衡志藤核子生白藤上如小蒲桃木連子增桂海虞衡志木連子如胡桃紫色蘿蒙子增桂海虞衡志蘿蒙子黄如大橙柚特乃子增桂海虞衡志特乃子狀似榧而圓長端正羊矢子增桂海虞衡志羊矢子色狀全似羊矢味亦不佳日頭子增桂海虞衡志日頭子狀如櫻桃纍纍如蒲桃穗秋風子增桂海虞衡志秋風子色狀俱似楝子黄皮子增桂海虞衡志黄皮子如小棗朱圓子增桂海虞衡志朱圓子正圓深紅狀如楝子粉骨子增桂海虞衡志粉骨子皮黄色如粉塔骨子增桂海虞衡志塔骨子匾如大橘皮裏空虚布衲子增桂海虞衡志布衲子似李而黄黄肚子增桂海虞衡志黄肚子如小石榴鹽麩子增本草鹽麩子一名五構一名鹽膚子一名鹽梅子一名鹽梂子一名天鹽生呉蜀山谷蜀人謂之酸桶戎人謂之木鹽樹狀如椿七月子成穗粒如小豆上有鹽似雪可為羮用南人取子為末食之酸醎止渴彚考增山海經槖山多構木注今蜀中有構木七八月中吐穗穗成如有鹽粉著狀可以酢羮胡頺子增本草胡頺子一名雀兒酥雀兒喜食之也越人呼為蒲頺子南人呼為盧都子呉人呼為半含春言早熟也襄漢人呼為黄婆嬭象乳形也樹高丈餘冬不凋葉色白冬花春熟最早小兒食之當果又有一種大相似冬凋春花立夏時熟圓如櫻桃人呼為木半夏呉越人呼為四月子亦曰野櫻桃附錄山茱萸增本草山茱萸一名蜀酸棗一名肉棗一名鬾實一名雞足一名䑕矢樹高丈餘葉似榆花白色子赤色如胡頺子亦可噉與茱萸絶不相類醋林子增本草醋林子生四川卭州山野林箐中木高丈餘枝葉繁茂三月開白花四出九月十月子熟纍纍數十枚成朶生青熟赤畧類櫻桃而帶短土人以鹽醋收藏充果食其葉味醋夷獠人采得入鹽和魚䰼食云勝用醋也蓬薘柰增廣東志蓬薘柰猶言破肚子蓋果實也産於暹羅如大棗而青島人日乾以致遠漬以沸湯其皮自脱圓滿如大李肉潤膩如紅酥甘美可啖抹猛果增雲南志抹猛果樹高丈餘大如掌熟於夏月味甘出元江府枸柰子增盛京志枸柰子味酸色紅而實小俗呼狗嬭子稠棃子增盛京志稠棃子實黑而澁土人珍之間以作麫暑月調水服之云可止瀉桃花水增盛京志桃花水實紅而味甘質輕脆烏喇寧古塔有之法佛哈增盛京志法佛哈實如小杏酸甜寧古塔所出米孫烏什哈增盛京志米孫烏什哈實味酸出寧古塔烏喇柰增烏喇柰塞外紅果也烏喇帶之地尤多一名歐李實似櫻桃而大味甘微酸然不可多食烏沙爾器增烏沙爾器生塞外樹高數尺秋結紅果一枝纍纍千百顆狀如櫻桃而小可食其味酸苦無花果原無花果一名映日果一名優曇鉢一名阿駔酉陽雜爼云波斯人呼為阿駔拂林人呼為底珍樹一名蜜果最易生揷條卽活在處有之三月發葉樹如胡桃葉如楮子生葉間五月内不花而實狀如木饅頭生青熟紫味如柿而無核人家宅園隨地種數百本收實可備荒其利有七實甘可食多食不傷人且有益尤宜老人小兒一也乾之與乾柿無異可供籩實二也六月盡取次成熟至霜降有三月常供佳實不比他果一時採擷都盡三也種樹十年取效桑桃最速亦四五年此果截取大枝扦插本年結實次年成樹四也葉為醫痔勝藥五也霜降後未成熟者採之可作糖蜜煎果六也得土卽活隨地可種廣植之或鮮或乾皆可濟饑以備歉歲七也彚考增倦遊錄木饅頭京師亦有之謂之無花果狀類小棃中空既熟色㣲紅味頗甘酸食之大發瘴嶺南尤多州郡待客多取為茶牀高飣故云公筵多飣木饅頭或謂嶺南諸州刻木作饅頭狀底刻字云大中祥符年一牒造三十隻談者之誤也别錄原扦插春分前取條長二三尺者插土中上下相半常用糞水澆葉生後純用水忌糞恐枝葉大盛易摧折結實後不宜缺水當置瓶其側出以細霤日夜不絶果大如甌製用採青果用鹽漬壓扁日乾可充果實小者用糖煎蜜煎可以久留文光果原文光果形如無花果肉味如栗五月成熟出景州天仙果原天仙果樹高八九尺無花其葉似荔枝而小子如櫻桃纍纍綴枝間六七月熟味至甘集藻贊增宋宋祁天仙果贊有子孫枝不蘤而實薄言采之味埒蜂蜜槃多樹原槃多樹不花而結實實從皮中出自根著子至杪如橘大古度子原古度子樹葉如栗不花而實從枝中出大如石榴與樝子色赤味酸煑為粽食若數日不煑化作飛蟻穿皮飛去出交廣諸州彚考增廣州記熙安縣有孤古度樹俗人無子於祠炙其乳則生男以金帛報之波羅蜜增桂海虞衡志波羅蜜大如冬瓜外膚礧砢如佛髻削其皮食之味極甘本草安南人名曩伽結波斯人名婆那娑拂林人名阿薩軃生交趾南畨諸國今嶺南滇南亦有之樹高五六尺樹類冬青而黑潤倍之葉極光淨冬夏不凋樹至斗大方結實不花而實出於枝間多者十數枚少者五六枚大如冬瓜外有厚皮裹之若栗毬上有軟刺五六月熟時顆重五六觔剝去外皮殻内肉層疊如橘囊食之味至甜美如蜜香氣滿室一實凡數百核核大如棗其中仁如栗黄煑炒食之甚佳果中之大者惟此與椰子而已優曇鉢增一統志優曇鉢出肇慶府似琵琶無花而實無患子增博物志無患子葉似柳核堅正黑可作香纓酉陽雜爼無患木燒之極香辟惡氣一名噤婁一名桓通雅槵子實可去垢核黑如􅀢一名無患子本草無患子一名肥珠子一名油珠子釋家取為經珠謂之菩提子生高山中樹甚高大枝葉皆如椿特其葉對生五六月開白花結實大如彈丸狀如銀杏及苦楝子生青熟黄老則文皺黄時肥如油􅨘之形味辛氣䐈且硬其蔕下有二小子相粘承之實中一核堅黑似肥皂莢之核而正圓如珠殻中有仁如榛子仁亦辛䐈可炒食十月采實煮熟去核搗和麥麫或豆麫作澡藥去垢同於肥皂用洗眞珠甚妙彚考增山海經祑周之山其木多桓崔豹古今注拾櫨木一名無患者昔有神巫名曰寳眊能符劾百鬼得鬼則以此為棒殺之世人相傳以此木為衆鬼所畏競取為器用以却厭邪鬼故號曰無患也九域志象州歲貢槵子念珠十串集藻贊增齊卞敬宗無患枕贊爰兹素朴名為吉始匠人斯製以獻君子五言律詩增唐包何同李郎中淨律院槵子樹木槵稀難識沙門種則生葉殊經寫字子為佛稱名濾水澆新長燃燈暖更榮亭亭無别意只是勸修行菩提子與木譜菩提樹前木槵子名同物異增天台志山有菩提樹相傳西天梵僧遊化遺此種樹如柿花亦大同未結蘂先乃别抽一葉長指半許濶兩指色白而光潤乃結蘂於葉下日則覆子以蔽穢夜則捧子以承露秋社後取子為珠十百中必有一二如羅漢者謂之佛頭他處所生則無之不納子增桂海虞衡志不納子似黄熟小梅絶易爛爛卽破肉附核可為經珠似菩提子鬼見愁增本草鬼見愁出武當山中是樹莢之子其形正如刀豆子而色褐彼人以穿數珠欒華增本草欒華樹葉似木槿而薄細花黄似槐而稍長大子殻似酸漿其中有實如熟豌豆圓黑堅硬堪為數珠五月六月花可收南人以染黄甚鮮明附錄念珠樹增雲南志念珠樹出大理府每穗結實一百八枚文官果原文官果樹高丈餘皮粗多礧砢木理甚細堪作器物葉似榆而尖長周圍鉅齒紋深春開小白花成穗花五瓣每瓣當中微凹有紅筋貫之蔕下有小青托花落結實大者如拳一實中數隔間以白膜仁如馬㯽榔無二裹以白軟皮大如指頂去白皮食其仁甚清美多雨及勤澆則實成者多若遇旱則實粃小而不成增其果一苞中藏多子子多白色紋旋轉如卷蕉味甘香如嫩蓮菂御定佩文齋廣羣芳譜卷六十七
