body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷六十八木譜松一原松百木之長猶公故字從公磊砢多節盤根樛枝皮粗厚望之如龍鱗四時常青不改柯葉三針者為栝子松七針者為果松千歲之松下有茯苓上有兔絲又有赤松白松鹿尾松秉性尤異至如石橋怪松則巉巖陀石所礙鬱不得伸變為偃蹇離奇輪囷非松之性也增廣雅道梓松也酉陽雜爼金松葉似麥門冬葉中一縷如金綖出浙東台州尤多洛中有魚甲松學圃餘疏栝子松俗名剔牙松歲久亦生實彚考原書禹貢岱畎絲枲鉛松怪石詩衛風淇水悠悠檜楫松舟增鄭風山有橋松原小雅如松柏之茂無不爾或承魯頌徂來之松松桷有舄路寢孔碩商頌陟彼景山松柏丸丸松桷有梴旅楹有間寢成孔安禮記禮器其在人也如竹箭之有筠也如松柏之有心也二者居天下之大端矣故貫四時而不改柯易葉周禮夏官河內曰冀州其利松柏左傳培塿無松柏松柏之下其草不殖論語夏后氏以松歲寒然後知松柏之後雕也史記龜策傳松柏為百木長而守門閭晉書山濤傅濤年踰耳順居喪過禮負土成墳手植松柏孫綽傳綽所居齋前種一株松恆自守護鄰人謂之曰松樹子非不楚楚可愛但恐永無棟梁用耳綽答曰楓柳雖復合抱亦何所施耶增晉書孝友傳許孜二親沒建墓於縣之東山列植松柏亘五六里時有鹿犯其松栽孜悲歎曰鹿獨不念我乎明日忽見鹿為猛獸所殺置於所犯栽下孜悵惋不已乃為作塜埋於隧側猛獸即於孜前自撲而死孜益嘆息又取埋之自後樹木滋茂而無犯者石勒載記太興二年大雨霖中山常山尤甚滹沱泛溢衝陷山谷巨松僵拔浮於滹沱東至渤海原隰之間皆如山積宋書符瑞志宋文帝元嘉八年四月東莞莒縣松樹連理原陳書儒林傳後主嘗幸鍾山開善寺召從臣坐於寺西南松林下敕召張譏豎義時索麈尾未至後主敕取松枝手以屬譏曰可代麈尾顧謂羣臣曰此即是張譏後事魏書彭城王協傳高祖幸代都次於上黨之銅鞮山路旁有大松樹十數根時高祖進繖遂行而賦詩令人示協曰吾始作此詩雖不七步亦不言逺汝可作之比至吾所令就之也時協去帝十餘步遂且行且作未至帝所而就詩曰問松林松林經幾冬山川何如昔風雲與古同高祖大笑曰汝此詩亦調責吾耳增劉芳傳芳以社稷無樹上疏曰按論語稱夏后氏以松殷人以柏周人以栗便是世代不同而尚書逸篇則云大社惟松東社惟柏南社惟梓西社惟栗北社惟槐如此便以一代之中而五社各異也愚以為宜植以松何以言之逸書云大社惟松今者植松不慮失禮惟稷無成證稷乃社之細蓋亦不離松也世宗從之原甄琛傳琛喪父於塋兆之內手種松柏隆冬之月負掘水土鄉老哀之咸助加力十餘年中墳成木茂增隋書隱逸傳徐則東海郯人也入天台山絶穀養性所資惟松水而已南史孝義傳庾沙彌母亡晝夜號慟墓在新林忽生旅松百許株枝葉鬱茂有異常松隱逸傳關康之少而篤學姿狀豐偉特進顏延之等當時名士十許人入山候之見其散髮披黃布帊席松葉枕一塊白石而臥了不相盻延之等咨嗟而退顧歡鄉中有學舍貧無以受業於舍壁後倚聽無遺忘者夕則燃松節讀書或燃粳自照陶𢎞景特愛松風庭院皆植松每聞其響欣然為樂原唐書李泌傳泌嘗取松樛枝以隱背名曰養和後得如龍形者因以獻帝四方爭效之增唐書韋表微傳表微授監察御史裏行不樂曰吾將為松菊主人不愧陶淵明云鄭薰傳薰既老號所居為隱巖蒔松於庭號七松處士云隱逸傳王希夷居兗州徂徠餌松柏葉雜華年七十餘筋力柔強原唐書隱逸傳秦系客泉州南安有九日山大松百餘章俗傳東晉時所植系結廬其上穴石為研注老子彌年不出原唐書隱逸傳褚無量廬墓左鹿犯所植松柏無量號訴曰山林不乏忍犯吾塋樹耶自是羣鹿馴擾不復棖觸無量為終身不御其肉列女傳汴女李父母亡廬於墓蓬頭跣足負土以完園塋蒔松數百武后時詔樹闕門閭五代史一行傳鄭遨聞華山有五粒松脂淪入地千歲化為藥能去三尸因徙居華隂欲求之山海經錢來之山其上多松大荒之中有方山上有青松名曰拒格之松日月所出入也穆天子傳天子升長松之隥原莊子受命於地惟松柏獨也在冬夏青青天寒既至霜雪既降吾是以知松柏之茂也荀子松柏經隆冬而不凋蒙霜雪而不變可謂得其貞矣歲不寒無以知松柏事不難無以知君子增吕氏春秋百仞之松本傷於下而末稿於上尸子荆有長松文梓原符子符子與玄子登乎泰山下臨千仞之淵上蔭百仞之松蕭蕭然神王乎一丘矣增漢官儀秦始皇上封泰山遇疾風暴雨賴得抱松樹因封為五大夫原説苑智襄子為室美士茁曰記有之高山峻原不生草木松柏之地其土不肥今土木勝人臣懼其不安人也增神仙傳松者橫也時受服者皆至三百歲焦氏易林溫山松柏鸞鳳以庇禮斗威儀君乘木而王其政升平時則松為常生環氏吳紀孫皓嘗問張尚曰詩云泛彼柏舟惟柏中舟乎尚對曰詩言檜楫松舟則松亦中舟也原玉策記千歲松樹枝葉四邊披起上杪不長望而視之有如偃蓋其中有物或如青牛或如青犬或如人皆壽萬歲抱朴子天陵偃蓋之松大谷倒生之柏皆與天齊其長地等其久增抱朴子成帝時獵者於終南山見一人無衣服身皆生黑毛跳坑越澗如飛乃密伺其所在合圍取得乃是一婦人問之言是秦之宫人關東賊至秦秦王出降驚走入山飢無所食有一老翁教我食松柏葉實初時苦澀後稍便吃遂不復飢冬不寒夏不熱此女是秦人至成帝時三百餘載矣遊四郡記永寧縣界海中有松門西岸及嶼上皆生松故名松門會稽記會稽境特多名山水峰崿隆峻吐納雲霧松栝楓柏摧幹竦條澄壑鏡徹清流瀉注拾遺記始皇起雲明臺窮四方之珍木東得漂檖龍松原聖賢冡墓記東平王歸國思京師後薨葬東平其冡上松柏皆西靡增先聖本紀許由欲觀帝意曰帝坐華堂面雙闕君之榮顧亦得矣余坐華堂森然有松生於户雲生於牖雖面雙闕異乎鸞之榮崑崙余安知其所以取榮哉神境記滎陽郡南有石室室後有孤松千丈常有雙鶴晨必接翮夕輒偶影傳曰昔有夫婦二人俱隱此室年既數百化成雙鶴泰山記岱宗小天門有秦時五大夫松在廬山記石門北巖即松林也有數百樹松大皆連拱長近二十丈攢生絶崖上南臨石門澗澗中仰視之離離如駢麈尾號麈尾松嵩高山記嵩嶽有大松或百歲千歲其精變為青牛或為伏龜採食其實得長生豫章古今記松門在豫章北二百里江水繞山上有松柏則江西第五六重水口也西河舊事祁連山在張掖酒泉二界上東西二百里北百里有松柏五木美水草金陵地記蔣山本少林木東晉令刺史罷還種松百株宋時諸州刺史罷職還者栽松三百株下至郡守各有差洛陽伽藍記景明寺房簷之外皆是山池松竹蘭芷垂列階墀含風團露流香吐馥原水經注贛水又歷白杜西有徐孺子墓吳嘉禾中太守長沙徐熙於墓隧種松徂徠山多松柏詩所謂徂徠之松也鄒山記曰徂徠山在梁甫奉高博三縣界猶有美松金樓子武帝每拜山陵涕淚所灑松為變色增述異記松有兩鬛三鬛七鬛者言如馬鬛形也言粒者非矣香洲在朱崖郡出千年松香聞十里亦謂之十里香高僧傳天台智者院釋行滿居房檻外有巨松橫枝之上寄生小樹每滿出坐其寄生必嫋嫋向側時謂此樹作禮茶頭也初學記後漢方儲丹陽人遭母憂負土成墳種松柏鸞鳥栖其上白兔遊其下録異記婺州永康縣山亭中有枯松樹因斷之誤墮水中化為石取未化者試於水隨亦化焉其所化者枝幹及皮與松無異但堅徑有未化者數假相兼留之以旌異物焉開元天寶遺事明皇鑾輿西幸禁中枯松復生枝葉蔥蒨宛若新植後肅宗平內難重興唐祚枯松再生祥不誣矣大唐新語玄奘法師往西域取經手摩靈巖寺松枝曰吾西去求佛教汝可西長吾歸即東向使吾弟子輩知之既去其枝年年西指一年忽東向弟子曰教主歸矣果還至今謂之摩頂松酉陽雜爼成式修竹里私第大堂前有五鬛松兩根大財如碗甲子年結實味與新羅南詔者不别五鬛松皮不鱗中使仇士良水磑亭子在城東有兩鬛皮不鱗者又有七鬛者不知自何而得俗謂孔雀松三鬛松也松命根遇石則偃蓋不必千年也南康有怪松從前刺史令畫工寫松必數枝衰悴後一客與妓環飲其下經日松枯不空三藏塔前多老松歲旱則官伐其枝為龍骨以祈雨蓋三藏役龍意其木必有靈也零陵總記東華觀在邵州城下江岸有松偃亞數枝凡八面上有一枝中折拾在半樹間復生垂下掃壇遊人以手扳而撼之則千萬枝皆動東野坐事謫居於郡見其魁異賞玩無已因為詩并序云搖一枝則萬枝動看一面則八面同白犬出其根青羊入其腹漢高祖琥珀枕虛真君茯苓人疑其孕也汗漫録司空圖隱於中條山芟松枝為筆管人問之曰幽人筆正當如是記事珠白傅用胡松節支琴原托言鍾輻建山齋手植一松夢朱衣吏曰松圍三尺子當及第後三十年策名松圍果然增聞奇録吕知隱於洞庭山穿一松造草舍而居寶正中徵起鶴氅紗巾見武肅甚奇之雲仙雜記朝真觀九星院有三賢松三株如古君子梁閣老妓以麗水囊貯香遊之不數日松皆半枯原金陵記方山有野人見一使者異服牽一白犬野人問居何地答曰居偃蓋山隨至古松下而沒松形果如偃蓋意使者乃松精犬乃茯苓也增化書澗松所以能凌霜者藏正氣也原清異録張薦明隱山林有古松十餘株謂人曰豫人中之仙此松木中之仙也晉僧法潛隱郯山或問勝友為誰乃指松曰此蒼顔叟增傳載略越中禹志者即高松數十株參天遠望無不見故鄉人謂之禹志也採蘭雜志雷威作琴不必皆桐遇大風雪中獨往峨睂酣飲著蓑笠入深松中聽其聲連延悠揚者伐之斫以為琴妙過於桐有最愛重者以松雪名之文昌雜録元微之詩云松門待制應全遠藥樹監搜可得知蓋有唐宣政殿為正衙殿廷東西有四松松下待制官立班之地舊圖至今猶存洛陽名園記松柏樅杉檜栝皆美木也洛陽獨愛栝而敬松松島數百年松也其東南隅雙松尤奇因話録察院諸廳禮察謂之松廳廳南有古松也曲洧舊聞中嶽頂上松幹如插筆其間數株上巨下細柯似枯槎皮或剝落有半榮者僧指云此是嶽神為圭禪師夜移天將曉其鬼兵懼遽倒植之而去癸辛雜識凡松葉皆雙股故世以為松叉獨栝松每穗三鬚而高麗所産每穗乃五鬛焉今所謂華山松是也李賀有五粒小松歌陸龜蒙詩松齋一夜懷貞白霜外空聞五粒風李義山詩松暄翠粒新劉夢得詩翠粒照清露皆以粒言松也酉陽雜爼云五粒者當言鬛自有一種名五鬛皮無鱗甲而結實多新羅所種云然則所謂粒者鬛也遊茅山録臥龍松根盤如龍枝如覆屋常有道人結庵其下石湖詩注包山松多非種植風吹松子自成謂之飛松三峩山記山有塔松狀似杉而葉圓細亦不能高重重偃蓋如浮圖東齋記事秦始皇下泰山風雨暴至休於樹下因封其樹為五大夫初不言其為何樹也後漢應劭作漢官儀始言為松蓋松柏在泰山之小天門至劭時猶存故知其為松也五大夫蓋秦爵之第九級如曹參賜爵七大夫遷為五大夫是也後人不解遂謂松之封大夫者五故唐人松詩有不羡五株封之句蓋循襲不考之過也紹興上虞縣有村市曰五夫故老云有焦氏墓於此後五子皆位至大夫因而得名近世好事者或異其説曰此秦封松為五大夫之地也紹興間王十朋為郡幕官採訪所聞作會稽風俗賦得此遂以為然故賦中有楓挺千丈松封五夫之句疏於下云上虞有地名五夫始皇封松為五大夫之處蓋越人但知始皇嘗上會稽刻石頌德不知封松乃在泰山時非在會稽時也而十朋復失於致審遂以為實余嘗過其處見道旁古石塔有刻字嘗可讀乃會昌三年余珠所記云草市曰五夫因焦氏立塋於此孝感上聖而為名焉乃知五夫之名實由焦氏惜乎十朋之不見也湖山勝槩甘園內侍甘升園又名湖曲曾經臨幸至今有御愛松老學庵筆記紹興間復古殿供御墨蓋新安墨工戴彥衡所造自禁中降出雙角龍文或云米友仁侍郎所畫也中宫欲於苑中作墨竈取西湖九里松作煤彥衡力持不可曰松當用黃山所産此平地松豈可用人重其有守誠齋詩注筠州人號夾道松為涼繖樹話腴慈溪縣西北有慶安寺寺前有古松夾道綿亘數里望之蒼蒼然其一最巨而奇蜿蜒若龍飛偃如蓋臨池之上寺後有泉出於深谷僧以巨竹連筒引行數里支分於松下石池溢入於溪舒龍圖亶有詩云門前屏障繞潺湲付與林僧夜定還松蓋作雲遮十里竹龍行雨出千山白公香火蓮開後謝氏池塘草夢間我亦鳳凰臺上客圖間却笑未能間其後邑長沈時升有造舟之役睥睨兹松將斧斤焉里士馮文學輗作詩以遺沈賴以不伐松因詩而壽焉詩曰寒松一幹老蒼蒼古寺門前歲月長匠伯偶圖舟楫利禪翁方患斧斤傷得全此日同齊物勿翦他年比召棠可但與君期久遠相將俱列大夫行艮嶽記壽山西半山間樓曰倚翠青松蔽密布於前後號萬松嶺陶朱新録伊陽深山中有黑松山平高四十里其上皆大松有二株尤大一號大將軍一號小將軍大者圍絹三匹小者圍一匹木客取材於此皆祭之以絹圍訖造幡挂其上政和間求明堂柱而邑官以無中程者聞既而有人告發云大松不可出小松可取也乃命告者以官而令佐皆謫已伐之亦不可出告者尋卒今獨大將軍尚在而小者委於山間惜哉山川紀異翊真觀在南昌府城西南觀有二松相去五尺合為一幹號曰義松兩山行記太霄殿前石壇上有大松名升仙樹門右有松高與壇樹等名望仙輟耕録白湛淵先生續演雅詩發揮云灤人薪巨松童山八百里世無奚超勇惆悵度易水者取松煤於灤陽即今上都去上都二百里即古松林千里其大十圍居人薪之將八百里也林慮山記墨竈寺山門有白松皮葉皆異研莊雜記鮮于伯機嘗於廢圃中得怪松一株移置所居齊前呼為支離叟朝夕撫玩以為適西苑記自兩掖洞門而升上有古松三株枝幹槎牙形狀偃蹇如龍奮爪拏空突兀天表遊茅山記夜深宿方丈左室聞窗外聲澎湃淜滂飄忽揚激如秋江怒濤又如大將之師萬馬奔騰千里馳驟豫意是日熱必大雨虞其妨遊攬衣起徐耳之蓋松風云山空人寂境乃如是宜陶貞白之愛聽也霍山記山有古松數株高數丈槎丫詭怪如青幢鐵幹枝皆東向齊雲山記元武觀後古松數十夭矯如虯龍皆數百年物長安客話國子監彞倫堂前古松是元儒許衡手植原雨航記自惠山寺門入西曰聽松松在斷岡上大可十圍奇曲皆虯枝入聽松緣岡皆士大夫家墓隧松楸白楊青沾翠灑其最勝曰邵文莊墓墓上三松大逾聽松者二倍而奇峭不逮增光福記山間蒼松萬餘樓閣臺榭宛然圖畫柏屏蘿幄在在有之天目遊記天目山松形如蓋高不逾數尺一株值萬餘錢遊盤山記崖西一古松頂稠結受日光若絺衣方顧而樂之從東崖得松似更竒朱題曰蒼龍乃折中盤下而觀所謂蒼龍者破石罅中出駢起而中摧怒枝南傾如渴虯之欲攫繞北而西抵環翠亭亭靣山松屏之并東西崖者為三望而第其伯仲焉登岱記十八盤兩峽口各有松數十株蒼翠相掩里人名為對松自峪以上松益老他樹殊不相敵蓋至此則玄雲宿霜孤寒不受春花矣遊梁記密東三里天妃宫地上樹一松圍五人起三枝而上可十丈色如傅粉粉內即緣膚爪之髓出葉如鐵線樛曲詭怪云數千年矣遊岱記峽東西松數百株斜出蒼翠相掩博物志云松本石氣石裂受沙即産松松三千年更化為石泰山多松亦以多石耳玉堂别集京師報國寺有松七八株高不過丈許其頂甚平而枝幹旁出至十餘丈者數百莖夭矯如遊龍寺僧恐其折每一幹以一木支之加丹堊焉好事者攜酒上其頂盤踞羣坐焉五雜俎建州谷道中有數松盤拏蹙縮形勢殊絶余嘗過之歎其生於荒僻無能賞者又十數武石碣表於周道大書曰戰龍松朱晦翁筆也乃知古人識鑒其先得我心若此半塘小志松林在千佛閣後僅存百株風濤鼓之如數部鼓吹晴嵐煙翠映帶閣間儼然宋人圖畫登泰山記御障坪有五大夫松一株亭亭其間於是為五大夫之詩曰一家天下車書同我快秦皇虎視雄用事介丘臨緑海特官虯叟號蒼公雨師泛灑原清道木長絲綸本壽翁虛壑稿槐何足賦龍門琴摯斫蒼桐此詩蓋翻案五大夫秦官名第九爵非五株也而唐之目為五株者誣蓋或後人有舉五以實之者向來二今存其一王屋山志四聖殿後御愛松一株軒轅所憩處枯久尚堅甚不腐原閩志蔡襄為閩部使者夾道種松以避炎歊人至今賴之增福建志侯官縣石松寺宋紹真十年僧天石種松石上故名又自刻詩云偃蓋覆巖石歲寒傲霜雪深根蟠茯苓千古饒風月昆陵志洪邁紹興間與弟適遵讀書外家沈氏白茅山墳廬是歲墓有二松結毬蓋既而兄弟舉博學宏詞亦木之祥也杭州志於潛牧嶺上有古松一本錯盤奇怪嘗有兄弟鬩牆欲訟於有司夜行憩其下遲明辨色相視乃伯仲也遂各悔咎息爭而還因名松為木長官原南昌志建昌冷水觀壽松一株盤屈奇古又名桂劍松相傳許遜故事又府城東北章山上喬松修篁森列交蔭都昌縣志都昌柴棚鎮有古松一株太祖征偽諒時駐蹕其下萬厯甲申知縣王廷策即地建亭掘得白蟹一枚蓄之江又建前亭竪梁有赤鯉從空飛下增台州府志出金松垂條如弱柳結子如碧珠三年子乃一熟每歲生者相續一年上綴於條上璀錯相間黃山志黃山松小者雖數十年百年其長不過三四尺餐雲吸霧天然盤屈每一株成一形無有重復者儘足供盆盎中賞玩而根蟠絶壁過者目戀而無由攫取之若觀音大士石有楊枝灑淨松仙人觀榜石有簪纓松丞相觀棋石有棋枰松其最著也若松之大者則或以形體爭奇或以托地取勝如擾龍松怒蟠於千仞峰巔蒲團松可坐數十人破石松根丈餘穿於石罅倒桂松虛懸峭壁臥龍松橫踞道旁接引松空中當橋迎送松若揖若讓變化離奇不一而足均不可以尋常比矣羅浮志羅浮奉宸橋南有古松七株上凌霄漢仙靈常此憩息鄒葆光有道術宣和中召至凝神殿有七人從之倐不見上問為誰葆光對曰臣居山常習劒術此七人者古松也上異之原唐沙門性至孝母亡墓前忽生松柏十餘株人以為孝感所致元圭法師坐禪於巖阿下忽有嶽神來拜請受正法師付戒畢神曰願展小神通師曰吾東嶺無松此處多松汝能移於東嶺乎神曰敬聽命願勿恐拜辭而去是夜雷雨交至次日見巖前松皆移東嶺支硎山有晉松三十餘章傳為支遁所栽高可巢鶴大可蔽牛土人腰斧入山賴趙凡夫護之射書關使君馬仲良捐俸買脫載樹築石為古公壇葛震父諸君皆有歌集藻傳原明洪璐木公傳木公字貞夫系出伏羲氏世居東莞三代前無顯者或曰黃帝時有業斫輪者為帝作舟車以濟不通商時居景山者事高宗周末居徂徠者事魯僖公俱擅雄材為君柱明堂棟宗廟安於泰山磐石天下之民賴其帡幪而功業𢎞大嬴秦之世族盛於魯始皇封泰山幸其宅值風雨因休息移時以功封大夫命世其爵漢高帝誅秦惡其為秦幸臣勤石禁銅以是木姓皆匿深山窮谷中終漢之世無所聞晉季有孤生與陶元亮居為鄰元亮解印歸日撫孤生詩酒盤桓藉以終餘年其後陶隱居亦招木氏拔萃者數人館庭下為貧賤交暇日葉或播其風聲欣然顧曰君輩可謂善鳴者而假之鳴二姓遂為纍世通家吳有十八公者以占夢知書生丁固大顯貴後果應人皆神之唐德宗朝崔斯立丞藍田有葉姓者日與吟哦韓昌黎為文記之自後知名頗多公先世家蜀父官江南而公生長幹黠色多鬚髯器宇恢宏壯有徑節老而蒼顏癯姿負正氣挺高標炎寒不二與古烈士爭茂簡素垂不朽名惜其習隱不仕龍卧空谷若干年聞衛人蒼庭筠有直名大庾人白先春美丰度乃請結歲寒盟時羣隂用事衆皆屈膝斂容倉卒變萎獨三友堅持凛冽猶陽春人未嘗見其有悴色庭筠雪後節或折輒笑曰君子固窮胡為乎然哉庭筠遂起自持又見先春事粉飾戲之曰吾聞以貌取人失之子羽吾友果君子者乎抑色莊者乎先春慚遽謝曰無傷也前言戲之耳交益固一日有相者見之謂人曰木公材大當晚用上必倚之為廟廊鞏洪基於萬億斯年苐先時不免有戕賊之災公聞之懼遂深自韜晦以保天年云記增宋王十朋巖松記友人有以巖松至梅溪者異質叢生根銜拳石茂焉匪枯森焉匪喬柏葉松身氣象聳焉藏參天覆地之意於盈握間亦草木之英竒者豫頗愛之植以瓦盤置之小室稽古之暇寓陶先生鄭處士之趣焉是日與同舍飲談故事因共覩之咸有欲得之色余曰有能續之以言者豫非敢吝俄而篇章爭先而並至皆佳作也余不暇品第之莫知所贈因徙置於會趣堂與一齋之衆共之且告之曰諸友講於斯食於斯遊息於斯是松也常在眼焉奚必几案間然後為吾物耶明劉基遊松風閣記松風閣在金雞峰下活水源上豫今春始至留再宿皆值雨但聞波濤聲徹晝夜未盡閲其妙也至是往來止閣上凡十餘日因得備悉其變態蓋閣後之峰獨高於羣峰而松又在峰頂仰視如幢葆臨頭上當日正中時有風拂其枝如龍鳳翔舞離褷蜿蜒轇轕徘徊影落簷瓦間金碧相組繡觀之者目為之明有聲如吹塤箎如過雨又如水激崖石或如鐵馬馳驟劒槊相磨戞忽作草蟲鳴切切乍大乍小若遠若近莫可名狀聽之者耳為之聰豫以問上人上人曰不知也我佛以清淨六塵為明心之本凡耳目之入皆虛妄耳豫曰然則上人以是而名其閣何也上人笑曰偶然耳留閣上又三日乃歸原姚綬三松記雲東逸史手植三松於堂倦而就枕夢三丈夫衣碧茸之衣冠鱗皴之冠搖水玉之佩引二髽角于于而來離立而前曰先生其陶隱居之流乎不然何孜孜於吾三人者如此耶抑將如王祐之於三槐乎吾三人者挺歲寒而不移干雲霄而不屈其色蒼蒼不晨改而夕變其聲肅肅不侈蕩而泛濫其勢喬喬不骫骳而促戚何愧於槐彼槐之南柯容蟻為國憧憧往來吾無是也昔丁固十八公事得之於兆先應之於日後視槐何如今先生雖無數仞之勝而有一堂之安遂易退之心得隱居之趣且身親培植無吾子必做之語何其高哉願先生養利器於盤錯保貞心於歲寒衆皆靡靡吾獨挺挺衆皆營營吾獨舒舒衆皆競華敷榮吾獨完貞葆素不炫材力而材力饒不求聞逹而聞逹茂庶先生愛吾三人之意不虛哉逸史方退縮不敢當忽見髽童持姑射之冰蕤搖湘君之翠羽翩翩焉周旋有儀作長虯之舞而歌曰鳥翼飛兔足走寧栽桑莫栽栁栁易凋零末何有吾蜿蜒兮落君手君吾樹兮巨靈守再歌曰仙仙兮山中無山兮有庭窿窿兮容容吾得左盤右轉兮如旋風君之樂兮樂無窮三歌曰鳳鳴朝陽兮鶴鳴在隂於吾和兮知吾心請君為我兮試援所御之瑶琴歌竟悚然驚寤推枕而起但見三樹參差布列堂下時天寒折膠璧月流輝不覺時就夕矣因受柬而為之記説原明王夢澤松説夫夭喬萬類惟松秉異是以後凋之旨著於魯論有心之言垂於戴記榮枯不隨乎冬春霜露莫致其感愛彼蒲柳之姿先秋而萎桃李之芳競春而妍橘柚之質過江而化豈可並日而稱貞齊軌而語雋哉若其永托根之慕則明發於楸梧篤連枝之愛則戀結於棠棣拓一本之恩則滋植於芝蘭茂晚節之貞則桑榆自王裕奕葉之澤則杞梓日倍至於餌滲液以制頽齡悟本性以敦嘉遁幸匠石之不逢冀散木之得永則仙靈之最品隱淪之獲栖矣無名氏愛松説大抵松之為物極地氣不能移歷歲寒不為改大類有道君子顧當其始生困蓬蒿厄牛羊摧折於斧斤者往往而是惟托根深山大壑蘇之以風雨照之以日月籠之以輕煙薄霧而又飽飫雪霜延歷歲時然後翠蕤摩空鐵幹拂漢蚪掀鱗射夭矯扶踈為故國偉觀良亦不易矣愛松者當何如珍護耶題跋增宋周必大盤松贊跋德壽宫苑囿分四地分盤松在其北御製贊如右今大府丞張鎰以遺廬陵曾三異屬臣題其後臣嘗敬觀御製祭土地文為此松也其文云神有百職職各不同典司草木土示是供我遊湖園乃獲奇松植之禁苑百態千容婆娑偃蓋夭矯騰龍翠色凝露清音舞風醉吟間適豫情所鍾壅培封殖久或力窮烏鳥外擾蟻蠧內攻神其勦絶勿使能終精邪竊據盜斧適逢神其呵逐勿使遺蹤常令徑質坐閲隆冬堅踰五柞弱異雙桐歷千萬年鬱鬱蔥蔥椎牢旨酒嗣録汝功併録以遺三異使寶藏之雜著增唐符載植松諭楚國主人嗜材搴異有樹美松於庭者培沃土灌甘澤根柢深固柯葉暢逹居三十年起盈尺挺於纍丈始筳筯大於拱抱高姿傑然若陵重氛主人方凝睇結意曰是可採之矣將行斧焉客有過之者曰噫其甚也是木有戞雲之姿有搆厦之材繩墨太速恐夭其理今植於庭除之間充耳目之玩常見狎近氣色不振若徙於嵩岱之間沆瀣之華注於內日月之光薄於外祥鸞嗷嗷戲其上流泉湯湯鳴其下巖岫重復漠漠然淸淨靈風四起聲掩竽籟是時也當境勝神王拔地千丈根實黃泉枝摩青天則可以柱明堂而棟大厦也豈遐曠之旨捨此而取其榱桷棼橑哉主人曰客言雖濶而無岸然余終能大之矣銘增宋黃庭堅天保松銘有序衡州花光山實衡嶽之南麓有松傑出磅礴雲表晉陵鄒浩嘗以問長老仲仁曰方法堂佛殿鼎新之時他山之木尚入繩墨乃不以為材耶仲仁曰自其合抱以來睥睨於其旁者踵相尋而至豈特吾寺之人哉但以適當天子壽山之前故不敢運斤耳因告之曰若聞天保之名乎其比物以見意止言如南山之壽而以松柏之茂繼焉今山前之松可謂茂矣宜以天保名之仁請著以示後於是乎銘曰山有喬松在南山之陽巧匠觀傍莫之能傷非此以為材可以全生得極其高大惟時太平薄海內外罔不稽首歸美以報如松之茂惟此獨也正能長且久勿伐勿敗祝聖人壽明邵寶松壇銘賢哉五大夫昔聞其語今乃見之古色蒼然挺乎儼而我壇於斯參其離立山空無人仰不可及贊增宋謝惠連松贊松惟靈木擬心雲端迹絶玊除形寄青巒子欲我知求之歲寒庾肅之松讚流潤飛津沈精幽結貞蕤含芳仰拂素雪唐于邵吳使君廳鄭華原壁畫松樹讚貴之者真得之者難松有徑質匠乎筆端森踈空倚挺拔上干如出絶壑若生大寒枝蟠龍變皮折龜攢青蘿若挂白鷺愁看美華原之墨妙能入室而思殫願主人之此壽從君子之靜觀符載江陵府陟屺寺雲上人院壁張璪員外畫雙松讚世人丹青得畫遺迹張公運思與造化敵根如蹲虯枝若交戟離披慘淡寒起素壁高秋古寺僧室虛白至人凝視心境雙寂陸龜蒙怪松圖贊并序有道人自天台來示余怪松圖披之甚駭人目根盤於巖穴之內輪囷逼側而上身大數圍而高不四五尺礧磈然蹙縮然幹不暇枝枝不暇葉有若龍攣虎跛壯士囚縛之狀道人曰是何奇怪之如是耶子能變之乎余曰草木之生安有怪耶茍肥瘠得其中寒暑均於外不為物所凌折未有不挺而茂者也况松柏乎今不幸出於巖穴之內脞脆者則硜然之牙伏屈其下矣何自奮之能為是松也雖稚氣初折而正性不辱及其壯也力與石鬭乘陽之威怒已之軋拔而將升卒不勝其壓擁湧鬱遏坌憤激訐然大醜彰於形質天下指之為怪木吁豈異人乎哉天之賦材之盛者蚤不得用於世則伏而不舒薰蒸沉酣日進其道權擠勢奪卒不勝其厄號呼呶拏發越赴訴然後大奇出於文彩天下指之為怪民嗚呼木病而後怪不怪不能圖其真人病而後奇不奇不能駭於俗非始不幸而終幸者耶道人曰然為吾贊之贊曰松生隂隘巖獄穴械病乎不快卒以為怪擁腫支離神羞鬼疑道人咨嗟筆傳其奇或怪乎形或奇於辭我為怪魁是以贊之宋高宗盤松贊天錫瑞木得自嶔岑枝蟠數萬幹不倍尋怒騰雲勢靜奏琴音凌寒鬱茂當暑隂森封以腴壤邇以碧潯越千萬年以慰我心御定佩文齋廣羣芳譜卷六十八
