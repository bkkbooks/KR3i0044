body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷七十木譜松三集藻七言律詩增唐劉禹錫廟庭偃松詩有序侍中後閣前有小松不特立而偃丞相晉公為賦詩美其猶龍蛇然植於髙簷喬木間上嵌旁軋盤蹙傾亞似不得天和者公以遂物性為意乃加憐焉命畚土以壯其趾使無欹索綯以牽其幹使不仆盥漱之餘以潤之顧盻之輝以照之發於人心感召和氣無復夭閼坐能敷舒嚮之跧蹙化為竒古故雖袤丈而有偃號焉豫嘗詣閣白事公為道所以且示以詩竊感嘉木之逢時斐然成詠勢軋枝偏根已危髙情一見與扶持忽從憔悴有生意卻為離披無俗姿影入巖廊行樂處韻含天籟宿齋時謝公莫道東山去待取成隂滿鳯池李商隱題小松憐君孤秀植庭中細葉輕隂滿座風桃李盛時雖寂寞雪霜多後始青蔥一年幾變枯榮事百尺方資柱石功為謝西園車馬客定悲搖落盡成空趙嘏題橫水驛雙峰院松故園溪上雪中别野館門前雲外逢白髮漸多何事苦清隂長在好相容迎風幾拂朝天騎帶月猶含度嶺鐘更憶葛洪丹井畔數株臨水欲成龍曹唐題子姪書院雙松自種雙松費幾錢頓令院落似秋天能藏此地新晴雨卻惹空山舊燒煙枝壓細風過枕上影籠殘月到忩前莫教取次成間夢使汝悠悠十八年李山甫松地種蒼龍勢抱雲天教青共衆材分孤標百尺雪中見長嘯一聲風裏聞桃李傍他真是佞藤蘿攀爾亦非羣平生相愛應相識誰道修篁勝此君崔塗題淨衆寺古松百尺森踈倚梵臺昔人誰見此初栽故園未有偏堪戀浮世如間即合來天暝豈分蒼翠色嵗寒應識棟梁材清隂可惜不駐得歸去暮城空首回鄭谷松下視垂楊拂路塵雙峯石上覆苔文濃霜滿徑無紅葉晚日髙枝有白雲春砌花飄僧旋掃寒溪子落鶴先聞那湛寂寞悲風起千樹深藏李白墳吳融和陸拾遺題諫院松落落孤松何處尋月華西畔結根深曉含仙掌三清露晚上宫墻百雉隂野鶴不歸應有怨白雲髙去本無心碧巖秋澗休相望捧日原須在禁林韓溉松倚空髙檻冷無塵往事間徴夢欲分翠色本宜霜後見寒聲偏向月中聞啼猿想帶蒼山雨歸鶴應和紫府雲莫向東園競桃李春光還是不容君李中題吉水縣廳前新栽小松劚開幽澗蘚苔斑移得孤根植砌前影小未遮官舍月翠濃猶帶舊山煙羣花解笑香寧久衆木雖髙節不堅輸我婆娑欄檻內晚風蕭颯學幽泉徐夤松澗底青松不染塵未逢良匠競誰分龍盤徑節巖前見鶴唳翠梢天上聞大厦可營誰擇木女蘿相附欲凌雲皇王自有增封日修竹徒勞號此君畫松澗底隂森驗筆精筆間開展覺神清曽當月照還無影若許風吹合有聲枝偃只應玄鶴識根深宜與茯苓生天台道士頻來見説似株株倚赤城炙轂子松寒松聳拔倚蒼岑緑葉扶疏自結隂丁固夢時還有意秦皇封日豈無心常將正節栖孤鶴不遣髙枝宿衆禽好是特凋羣木後護霜凌雪翠逾深宋韓琦和潤倅王太博林畔松鬱鬱山頭翠色攢就中髙格出林端霜凌徑節難摧抑石纒危根任屈盤古鬛自隨仙日老孤風不入俗人看時來匠者須回顧且稟幽姿待歲寒蔡襄古寺偃松古寺無人野蘚滋空庭永日雪風吹橫柯圎若張青蓋老幹孤如植紫芝萬乘未經蟠木器千年終與大椿期須知才短為天幸江上婆娑得所宜安靜堂庭松偏愛堂東砌下松三年瀟灑伴衰翁寒聲淡蕩潮初上疏影孤圎月正中清徹紗帷延晝夢緑涵金盞帶春風自緣多病饒歸思便覺山林野意通王安石古松森森直幹百餘尋髙入青冥不附林萬壑風生成夜響千山月照挂秋隂豈因糞壤栽培力自得乾坤造化心廊廟乏材應見取世無良匠勿相侵次韻董伯懿松聲天機自動豈關情能作人間物外聲暝聒一堂無客夢曉悲千嶂有猿驚廟中奏瑟沈三歎堂下吹簫失九成俚耳紛紛多鄭衛直須聞此始心清蘇軾登州孫氏松堂萬松誰種已摐摐半嶺蒼雲映此邦露重珠瓔蒙翠蓋風來石齒碎寒江浮空兩竹橫南閣倒影扶桑射北窗坐待夕烽傳海嶠重城歸去踏逢逢萬松亭并引麻城縣令張􅐧植萬松於道周以芘行者且以名其亭去未十年而松之存者十不及三四傷來者之不嗣其意也故作是詩十年栽種百年規好德無人助我儀縣令若同倉庾氏亭松應長子孫枝天公不救斧斤厄野火解憐冰雪姿為問幾株能合抱殷勤記取角弓詩劉子翬詠松風韻颼飀逺更清蒼髯瘦甲聳亭亭連根欲鬭巖巒力一蓋常涵雨露情曽映月明留鶴宿近經雷霹帶龍腥衰殘愧我無仙骨願採流膏慰暮齡元謝宗可龍形松夭矯拿雲海上來蜿蜒蛻骨老莓苔紫髯夜濕千山雨鐡甲春生萬壑雷影動欲翻平陸起聲號如捲怒潮回蜷枝冷挂巖前月猶似擎珠照九垓張雨次韻虞公和斷江和尚種松松下微吟愜病悰支離潦倒似支公頂因巢鶴翻成結心為依禪畢竟空陸子壇前春古淡葛洪井上雨青蔥茯苓乞與楊貟外誰復緘詩過浙東原明屠隆詠羅漢松何年蒼叟住禪林百尺婆娑萬壑隂四果總來成佛印一官應不受秦侵靈根歲月跏趺久老幹風霜面壁深謖謖回飇響空谷猶聞清夜海潮音五言排律增唐貟南溟禁中春松鬱鬱貞松樹隂隂在紫宸蔥蘢偏近日青翠更宜春雅韻風來起輕煙霽後新葉深栖語鶴枝亞拂朝臣全節長依地凌雲欲致身山苖蔭不得生植荷陶鈞陸贄禁中春松隂隂清禁裏蒼翠滿春松雨露恩偏近陽和色更濃髙枝分曉日靈韻雜宵鐘嵐助爐煙逺形疑蓋影重願符千載夀不羡五株封倘得回天眷全勝老碧峰周存禁中春松幾歲含貞節青青紫禁中日華留偃蓋雉尾轉東風不為繁霜改那將衆木同千條攢翠色百尺淡晴空影密金莖近花明鳯沼通安知幽澗側獨與散樗叢常沂禁中春松映殿松偏好森森列禁中攢柯沾聖澤疏蓋引皇風晚色連秦苑春香滿漢宫操將貞石固材與直臣同翠影宜青瑣蒼枝秀碧空還知沐天眷千載更蔥蘢李胄文宣王廟古松列植成均裏分行古廟前隂森非一日蒼翠自何年寒影煙霜暗晨光枝葉妍近簷隂更靜臨砌色相鮮每愧聞鐘磬多慚接豆籩更宜教胄子於此學貞堅元稹與楊十二巨源盧十九經濟同遊大安亭各賦二物合為五韻探得石松片石與孤松曽經物外逢月臨栖鶴影雲抱老人峯蜀客君當問秦官我舊封積膏當琥珀新劫長芙蓉待補蒼蒼去樛柯早變龍白居易題遺愛寺前溪松偃亞長松樹侵臨小石溪靜將流水對髙共逺峰齊翠蓋煙籠密花幢雪壓低與僧清影坐借鶴穩枝棲筆寫形難似琴偷韻易迷暑天風槭槭晴夜露凄凄獨憩依為舍間行繞作蹊棟梁君莫採留著伴幽栖鄭浣中書相公任兵部侍郎日後閣植四松逾數年浣沗此官因獻拙作丞相當時植幽襟對此開人知舟楫器天假棟梁材錯落龍鱗出襹褷鶴翅回重隂羅武庫細響靜山臺得地公堂裏移根澗水隈吳臣夢寐逺秦嶽歲年催轉覺飛纓謬何因繼組來幾尋珠履迹願比角弓培柏恱猶依社星髙久照台後凋應共操無復問良媒劉禹錫和兵部鄭侍郎省中四松詩十韻右相歷中臺移松武庫栽紫茸抽組綬青實長玫瑰便有干霄勢看成構厦材數分天柱半影逐日輪回舊賞台階去新知谷口來息隂長仰望玩境幾徘徊翠粒晴懸露蒼鱗雨起苔凝音助瑶瑟飄蘂泛金罍月桂花遙燭星榆葉對開終須似雞樹榮茂近昭回姚合和兵部鄭侍郎省中四松詩十韻四松相對植蒼翠映中臺擢幹凌空去移根劚石開隂陽氣潛照造化手親栽日月滋佳色煙霄長異材清音勝在澗寒影遍生苔靜繞霜霑履間看酒滿杯同榮朱户際永日白雲隈密葉聞風度髙枝見鶴來賞心雖可盡麗什妙難栽此地無因到循墻幾百回李正封貢院樓北新栽小松青蒼初得地華省植來新尚帶山中色猶含洞裏春近樓依北户隱砌淨遊塵鶴夀應成蓋龍形未有鱗為梁資大厦封爵恥嬴秦幸此觀光日清風屢得親白行簡貢院樓北新栽小松華省清霜曙樓隂植小松移根依厚地委質别危峰北户知猶逺東堂幸見容心堅終待鶴枝嫩未成龍夜影看仍薄朝嵐色漸濃山苖不可蔭孤直俟秦封錢衆仲貢院樓北新栽小松愛此凌霜操移來獨占春貞心初得地徑節始依人晚日煙猶薄當軒色轉新枝低無宿羽葉淨不留塵每與芝蘭近常慙雨露均幸因逢顧盻生植及兹辰吳武陵貢院樓北新栽小松拂檻愛貞容移根自逺峯已曾經草沒終不任苔封葉少初凌雪鱗生欲化龍乘春濯雨露得地近垣墉逐吹香微動含煙色漸濃時回日月照為謝小山松劉得仁賦得聽松聲庭際微風動髙松韻自生聽時無物亂盡日覺神清強與幽泉並翻嫌細雨并拂空增鶴唳過牖合琴聲况復當秋暮偏宜在月明不知深澗底蕭瑟有誰驚五言絶句御製戒壇卧松蒼松卧如龍蜿蜒鱗鬛古膚寸起山雲用汝作霖雨詠盆中松歲寒堅後雕秀萼山林性移根黼座傍可託青松柄增唐皇甫冉臺頭寺願上人院古松下有小松栽毫末新生與纖草不辨重其有陵雲干霄之志與趙八員外裴十補闕同賦之細草亦全髙秋豪乍堪比及至干霄日何人復居此元稹題翰林東閣前小松簷礙修鱗亞霜侵簇翠黃唯餘入琴韻終待舜絃張王建小松小松初數尺未有直生枝間即旁邉立看多長却遲假成式竒松二十字杉桂何相踈榆栁方迥屑無人擅談柄一枝不敢折偃蓋入樓妨盤根侵井窄高僧獨惆悵為與澄嵐隔鄭谷乳毛松松格一何髙何人號乳毛霜天寓直夜愧爾伴間曺唐彥謙松托根盤泰華倚幹蝕莓苔誰云山澤間而無梁棟材宋徐鉉松細韻風中逺寒青雪後濃繁隂堪避雨效用待東封蘇軾松強致南山樹來經渭水灘生成未有意鴉鵲莫相干元李俊民松鬱鬱愁無地青青獨有心疑從大夫後傾蓋到如今明李東陽題畫松種樹自何年幽人不知老不愛松色竒只聽松聲好陳憲章畫松為張别駕松乃木之雄公亦人中龍何須看畫本千丈在胸中朱鷺黃山松松無五仭髙矮者二三尺敷枝或橫畝平翠可布席七言絶句御製閲烏稽并序古松林數十里蔭翳無際非午亭夜分不見日月松林黯黯百十里罕境偏為麋鹿遊雨雪飄蕭難到地啼烏野草自春秋原唐杜甫憑韋少府覓松樹子落落出羣非櫸栁青青不朽豈楊梅欲存老蓋千年意為覔霜根數寸栽增白居易松樹白金換得青松樹君既先栽我不栽幸有西風易憑仗夜深偷送好聲來劉商與湛上人畫松水墨乍成巖下樹摧殘半隱洞中雲猷公曽住天台寺隂雨猿聲何處聞章孝標小松爪葉鱗條龍不盤梳風幕翠一庭寒莫言只似人長短須作浮雲向上看僧院小松拋杉背柏冷僧簾鎖月梳風出殿簷還似天台新雨後小峰雲外碧尖尖施肩吾玩手植松却思毫末栽松處青翠才將衆草分今日散材遮不得看看氣色欲凌雲李羣玉書院二小松一雙幽色出凡塵數粒秋煙二尺鱗從此靜忩聞細韻琴聲長伴讀書人崔塗澗松寸寸凌霜長徑條路人猶笑未干霄南園桃李雖堪羡爭奈春殘又寂寥鄭谷傳經院壁畫松危根瘦盡聳孤峰珍重江僧好筆蹤得向遊人多處畫却勝澗底作真松陸希聲松嶺嶺上春松手自栽已能蒼翠映莓苔歲寒本是君家事好送清風月下來曹松題僧院松空山澗畔枯松樹老對禪堂鱗甲身傳是昔朝僧種著下頭應有茯苓神杜荀鶴小松自小刺頭深草裏而今漸覺出蓬蒿時人不識凌雲木直到凌雲始道髙成彥雄松大夫名價古今聞盤屈孤貞更出羣將謂嶺頭間得了夕陽猶挂數枝雲張蠙華山孤松石罅引根非土力冒寒猶助嶽蓮光緑槐生在膏腴地何得無心拒雪霜羅隱小松已有清隂逼座隅愛聲仙客肻過無陵遷谷變須髙莭莫向人間作大夫徐夤詠大夫松五樹旌封許歲寒挽柯攀葉也無端爭如澗底凌霜節不受秦皇號此官僧景雲畫松畫松一似真松樹且待尋思記得無曽在天台山上見石橋南畔第三株僧皎然題松為愛松聲聽不足每逢松樹便忘還翛然此外更何事笑向間雲似我間原宋王安石道旁大松人取以為明龍甲虯髯不可攀亭亭千丈蔭南山應嗟無地逃斤斧豈願爭明爝火間增王安石北山道人栽松陽坡風暖雪初融度谷遙看積翠重磊砢拂天吾所愛他生來此聽樓鐘鄭獬種松髙標不畏雪霜侵狂劚孤根出舊林但恐長安無地種人家桃李自成隂蘇軾豫少年頗知種松手植數萬株皆中梁柱矣都梁山中見杜輿秀才求學其法戲贈二首露宿泥行草棘中十年春雨養􅐖龍如今尺五城南杜欲問東坡學種松君方掃雪收松子我已開榛得茯苓為問何如插楊栁明年飛絮作浮萍黃庭堅題仁上座畫松偃蹇松枝隔煙雨知儂定是歲寒材百年根節要老硬將恐崩崕倒石來戲答陳季常寄黃州山中連理松枝二首故人折松寄千里想聽萬壑風泉音誰言五鬛蒼煙面猶作人間兒女心老松連枝亦偶然紅紫事退獨參天金沙灘頭鎖子骨不妨隨俗暫嬋姢謝薖移松二首古貌蒼髯十八公巍巍獨出衆村中朝來挽致茅堂下為我商量送好風河出昆崙派九州矻然砥柱立中流蒼松若比丘山重豈但回頭費萬牛陸遊雙松東岡夭矯兩蒼龍千尺蟠空黛色濃六十餘年松若此誰知我更老于松楊萬里松七首翠旌緑纛夾車輪龍作長身鐡作鱗莫笑道傍數松樹古來老卻幾官人修塗殘暑僕夫勞午憩茅簷尺許髙忽有涼風颯然起小松呼舞大松號松本無聲風亦無適然相值兩相呼非金非石非絲竹萬頃雲濤殷五湖莫信秦人五大夫一生清苦不敷腴也將青玉雕叉子一一叉頭綴兩株老人手種一川松為棟為梁似未中只合茅齋聽驅使為公六月喚清風夾道松杉半老蒼前賢餘澤未應忘君看直幹連雲起豈但當年蔽芾棠一生著數落人先自愛栽松自可憐待得茯苓堪採掘此翁久已作飛仙謝枋得松喬松磊磊多竒節冬無霜雪夏無熱根頭更有千嵗苓知誰可語長生訣元傅若金題畫松遙憶商顔松色青女蘿枝上醉眠醒自從四皓安劉後嵗莫何人采茯苓僧行端栽松鈍钁橫肩雪未消不辭艱步上岧嶤等間種得靈根活會看春風長緑條明李東陽畫松三首為卜刑部從大題玄雲匝地黯無輝老幹盤空勢不歸疑是葉家堂上見夜深風雨墨龍飛十年不到山中路又見青松畫裏生擬著茅堂最深處石忩涼雨聽秋聲郎官對坐一松孤共識西臺兩大夫十八年中今已半夜來曽夢作公無原陳繼儒曽笑西湖九里松樛枝數尺不成龍只因枯頂時多月照見南髙峰外峰詩散句增晉嵇康遙望山上松隆冬鬱青蔥自遇一何髙獨立迥無雙袁宏森森千丈松磊砢非一節雖無榱桷麗較為棟梁傑唐王績松生北巖下由來人徑絶布葉捎雲煙插根擁巖穴唐扶日射蒼鱗動塵迎翠帚迥回嫩茸含細粉初葉泛新杯宋石延年菌生枝上雨龍起穴中雷怪影漫溪側寒根纒石回晉阮籍澤中生喬松萬世未可期陶潛懷此貞秀姿卓為霜下傑原宋鮑照願君松柏心採照無窮極梁吳均白雲光彩麗青松意氣多增唐孟浩然寥落幽居心颼飀青松樹原李白開花必早落桃李不如松巫山小搖落碧色見松林松柏本孤植難為桃李顔勗君青松心努力保霜雪增李白長松入雲漢逺望不盈尺五峰轉月色百里行松聲錯落千丈松虯龍盤古根杜甫土室延白光松門耿疏影栁宗元日出霧露餘青松如膏沐元稹君看孤松樹左右蘿蔦纒臺下三四松低昂勢前却白居易愛君抱晚節憐君含直文臨風有清韻向日無曲隂衆目悅芳艷松獨守其貞邵謁孤松自有色豈奪衆草榮宋司馬光藏春在何許鬱鬱萬松林蘇軾林中百尺松歲久蒼鱗蹙養此霜雪根遲彼鸞鳯吟黃庭堅青松出澗壑十里聞風聲孫文懿疏影碎夜月寒聲攪秋風金蔡松年髙陵五六松潭水涵清隂元楊載長松蔭泉水四時清如秋原唐李白南窗蕭瑟松風起憑誰一聽清心耳增韓愈山紅澗碧紛爛熳時見松櫪皆十圍白居易有松百尺大十圍生在澗底寒且卑煙葉蔥蘢蒼麂尾霜皮剝落紫龍鱗惟憶夜深新雪後新昌臺上七株松廖匡國曽於西晉封中散又向東吳作大夫原宋石延年影搖千尺龍蛇動聲撼半天風雨寒王令却笑五株喬嶽子肯將直節事嬴秦文同若遇風雷須守護恐生頭角似飛騰蘇軾百年父老知誰在惟有雙松識使君張舜民要有堂堂冠劒叟蒼然千萬甲夫中張商英如障如屏如繡畫似幢似蓋似旌旗增范成大松節焦膏當燭籠凝煙如墨染房櫳金蔡松年老松閲世幾千尺玉骨冷風戰天碧晉左思鬱鬱澗底松劉琨繫馬長松下許詢青松凝素髓湛方生林松冬夏青梁江淹青松挺秀萼唐太宗巖松千丈蓋王績澗松寒轉直王丘松風鳴珮環王維松樹有秦官青松學大夫日色冷青松孟浩然谷轉松翠密李白松寒不改容翠色明雲松松古漸無煙長松鳴夜風原杜甫溪回松風長松門似畫圖看松露滴身增杜甫碧色見松林冬嶺秀孤松青松寒不落原韓愈青鸞倚長松增白居易松張翠傘蓋龍蟠松矯矯澗逺松如畫孟郊青松多夀色萬松無一斜松氣清耳目姚合看月嫌松密李商隱張琴和古松紫閣舞雲松朱慶餘山深松翠冷司空圖松涼夏健人韓偓松長見日多裴説無風松自吟杜荀鶴松頭穿破雲李中清風生古松張蠙松髙影上樓松合徑先秋僧卿雲松徑雨餘香宋錢惟演松疏露下涼余靖松溪千蓋雨司馬光秀直寒松節蘇軾長松度翠蔓陸遊露濃松鬛長戴昺松涼鶴夢清吳警松風六月寒元袁桷松聳翠崚嶒唐王維種松皆作老龍鱗李白枯松倒挂倚絶壁原杜甫新松恨不髙千尺踈松隔水奏笙簧增杜甫松髙擬對阮生論韋應物碧澗蒼松五粒稀白居易寒松縱老風標在秋風拂松疏韻落李商隱青松手植變龍文方干小松出屋和巢長唐球松織香梢古道寒杜荀鶴澗底松搖千尺雨韓偓長松夜落叉千股韋莊松裝粉穗臨窗亞宋蘇軾澗底松根斫雪腴范成大松根當路龍筋瘦金王寂一軒松蔭碧油幢元袁桷松吼龍吟萬壑奔陳樵千歲孤松生緑煙詞增宋陳亮臨江仙五百年前非一日可堪只到今年雲龍欲化艷陽天從來耆舊傳不博地行仙昨夜風聲何處度典型猶在南山自憐不結傍時緣著鞭非我事避路只渠賢水龍吟錢王霸業成時多應是百年遺樹羞將髙古為渠遮映魚鹽調度且向空山趂時多事四垂盤踞算興衰坐閲權竒磊塊世間斤斧又見當天明聖便彈丸也難分土一番整頓舊家草木新來雨露鐡石心腸蚪龍根幹亭亭天柱縱茯苓下結蔦蘿髙際怎堪攀附别録增吳志孫晧傳注初丁固為尚書夢松樹生其腹上謂人曰松字十八公也後十八歲吾其為公乎卒如夢焉唐書儒學傳郎餘令授霍王元軌府參軍事從父知年亦為王友元軌每曰郎家二賢皆入府不意培塿而松柏為林也原唐書回鶻傳拔野古有川曰康干河斷松投之三年輒化為石色蒼緻然節理猶在世謂康干石增世説顧悅與簡文同年而髮早白簡文曰卿何以先白對曰蒲栁之姿望秋而落松柏之質經霜彌茂世目李元禮謖謖如徑松下風嵇康身長七尺八寸風姿特秀見者歎曰蕭蕭肅肅爽朗清舉或云肅肅如松下風髙而徐引山公曰嵇叔夜之為人也巖巖若孤松之獨立其醉也傀俄若玉山之將崩庾子嵩目和嶠森森如千丈松雖磊砢有莭目施之大厦有棟梁之用顔氏家訓齊世有辛毗者清幹之士官至行臺尚書嗤鄙文學嘲劉逖云君輩辭藻譬若朝菌須臾之玩非宏才也豈比吾徒千丈松樹常有風霜不可凋悴矣劉應之曰既有寒木又發春華何如也辛笑曰可矣夢書松為人君夢見松者見人君也杜陽雜編武宗會昌元年夫餘國貢松風石石方一丈瑩徹如玉其中有樹形若古松偃蓋颯颯然而涼飇生于其間至盛夏上令置于殿內稍秋風颼颼即令撤去嶽陽風土記白鶴老松古木精也李觀守賀州有道人陳某自云一百三十六歲因言及吕洞賔曰近在南嶽見之吕云過嶽陽日憩城南古松隂有人自杪而下來相揖曰某非山精木魅故能識先生幸先生哀憐吕因與丹一粒贈之以詩吕舉以示陳陳記其末云惟有城南老樹精分明知道神仙過明日陳行留之不可後年餘李守嶽陽因訪前事果城南有老松以問近寺僧曰先生舊題寺壁久已摧毁但能記其詩曰獨自行來獨自坐無限世人不識我惟有城南老樹精分明知道神仙過後為亭松前曰過仙亭舊松枯稿今復鬱茂得非丹餌之力耶原東坡集元祐元年正月十二日蘇子瞻李伯時為栁仲逺作松石圖仲逺取杜子美詩松根胡僧憩寂寞龎眉皓首無住著偏袒右肩露雙腳葉裏松子僧前落之句復求伯時畫此數句為憩寂圗子由題云東坡自作蒼蒼石留取長松待伯時只有兩人嫌未足兼收前世杜陵詩因次其韻云東坡雖是湖州派竹石風流各一時前世畫師今姓李不妨題作輞川詩文與可嘗云老夫墨竹一派近在徐州吾竹雖不及石似過之此一卷公案不可不令魯直下一句增避暑録話松磊落昂藏似孔北海洞天清録蜀中有石解開自然有小松形或三五十株行列成徑描畫所不及畫史大夫蔣長源作著色山水松頂似荆浩松身似李成葉取真松為之如靈鼠尾大有生意石不甚工作凌霄花纒松亦佳作錢藻字醇老收張璪松一株下有流泉澗松上有八分詩一首斷句云近溪幽濕處全藉墨煙濃圖繪寶鑑畢宏善畫山水作松石圖於左省壁間一時文士有詩稱之其落筆縱橫變易常法意在筆前非繩墨所能制故得生意為多宋迪字復古師李成畫山水運思髙妙筆墨清潤又喜畫松或髙或偃或孤或雙以至於千萬株森森然殊可駭也馬宋英溫州人放達能詩至錢塘遊靜慈寺寫古松於壁題云磨出一錠兩錠墨掃出千年萬年樹月明烏鵲悮飛來踏枝不著空歸去丁大全丞相賞其詩畫急命索之人忌其能閟不令出卒不遇原梧潯雜佩松化石余曽於張雨若清江衙齋見之大小凡五松理而石質云得之古廟中大是竒物雨若繪圖而系以詩好事者咸屬和焉增素園石譜婺州永寧縣松林一夕大風雨忽化為石悉皆新截大者徑二三尺有松節脂脈土人運而為坐且至有小如拳者亦宜置几案間原種藝八月終擇成熟松子柏子同收頓至來年春分時甜水浸十日治畦中下水土糞漫散子於畦內如種菜法或單排點種上覆土厚二指許畦上搭短棚蔽日旱則頻澆常須濕潤至秋後去棚髙四五寸十月中夾薥秸籬以禦北風畦內亂撒麥粳覆樹令梢上厚二三寸止南方宜微蓋至榖雨前後手爬淨澆之次冬封蓋如前二年後於三月帶土移栽先撅坎用糞土相合納坎中水調成稀泥栽於內擁土令坎滿下水塌實不用杵築腳踏次日看有縫處以細土掩之常澆令濕至十月以土覆藏毋使露根春間去土次年不須覆若果松須種於盆仍用水隔勿令蟻傷根移植過冬至三候以後至春社以前松柏杉槐一切樹皆可移栽大樹須廣留土如一丈樹留土二尺逺移者二尺五寸用草繩纒束根土樹大者從下去枝三二層記南北運至栽處深鑿穴先用水足然後下樹加乾土將樹架起搖之令土至根底皆遍實土如舊根四圍築實然後澆水令足俟乾再加土一二寸以防乾裂勿令風入傷根百株百活若欲偃蹇婆娑將大根除去止留四邉鬚根製用清異録却老霜九鍊松枝為之辟穀長生松節松之骨也質堅氣徑筋骨間諸病宜之釀酒已風痺松葉一名松毛除惡疾安五臟生毛去風痛腳痺及風濕瘡松白皮松根下皮也解勞益氣松皮松樹老皮也一名赤龍皮生肌止血斂瘡口治瘡松液火燒松枝溢出者治瘡疥及牛馬瘡附録松花原松樹二三月抽㽔生花長四五寸采其花蘂名松黃彚考原原化書崔希真十月一日遇老父於門獻松花酒老父曰此酒無味乃於懷中取丸藥置酒中味極美後問天師師曰此真人葛洪第三子其藥乃千歲松膠也增老學庵筆記青城山上官道人北人也巢居食松麨年九十矣人有謁之者但粲然一笑耳居山雜志松至三月花以杖叩其枝則紛紛墜落張衣裓盛之囊負而歸調以蜜作餅遺人曰松花餅市無鬻者集藻五言古詩增金張建擬古客從嶽頂來貽我松粉黃為言服之久身輕欲飛翔我嘗淡無味我嗅寂無香還君三太息世方好膏梁七言律詩增唐韋應物紫閣東林居士叔緘賜松英丸碧澗蒼松五粒稀侵雲來去露霑衣夜啓羣仙合靈藥朝思俗侣寄將歸道場齋戒今初服人事葷羶已覺非一望嵐峰拜還使腰間銅印與心違七言絶句增唐姚合採松花擬服松花無處學嵩陽道士忽相教今朝試上髙枝採不覺傾翻仙鶴巢詩散句增宋吳警風急忽驚烏鵲起空階䔩䔩墮松花唐蘇頲三月松作花朱慶餘風起松花散元馬祖常石洞松花落倪瓚階下松粉黃唐白居易腹空先進松花酒張耒山下松花龍甲老方干慣緣險峭收松粉元尹廷髙滿山黃霧落松花𡊮桷松花落徑無人掃附録松脂原松脂松之津液精華也一名松膏一名松香一名松膠一名松肪一名瀝青以通明如薰陸香顆者為勝老松皮內自然聚者為第一勝鑿取及鍊成者根下有傷處不見日月者為隂脂尤佳氣味苦溫無毒潤心肺強筋骨安五臟利耳目除伏熱治瘡瘍消風氣久服輕身不老千年松脂入地化為琥珀又千年為醫狀如黑玉蜜蠟金亦多年琥珀所化屑其末焚之有松香氣彚考增漢武內傳仙之上藥有松柏之膏服之可延年原列仙傳仇生者不知何許人湯時為木正嘗食松脂在尸鄉北山上自作石室周武王幸其室祠之增博物志松脂淪入地中千嵗為茯苓茯苓千年化為琥珀琥珀一名江珠今泰山有茯苓而無琥珀益州永昌出琥珀而無茯苓原抱朴子松樹之三千嵗者其皮中有聚脂狀如龍形名曰飛節芝增燕間録戴石屏詩麥麨朝充食松明夜當燈此是山西本色語深山老松心有油者如蠟山西人多以代燭謂之松明頗不畏風原上黨趙瞿病癩垂死其家棄之山中有仙人見而憐之與以藥服百餘日瘡愈顔色豐悅肌膚玉澤後遇仙人乞其方乃錬過松脂也瞿服久身輕力倍年百餘嵗齒髮如故夜卧忽見屋間有光大如鏡久而一室盡明如晝又見面上有采女戲於口鼻間後入抱犢山中成地仙别録原製用辟榖松脂十斤桑薪灰汁一石煮五七沸撈入冷水中旋復煮凡七遍乃白細研為散每服一二錢粥飲調下日三服至十兩不飢一年以後夜視目明久服延年益夀松脂不拘多少長流水桑柴煮挼三次再以枽灰汁煮七次扯拔更以好酒煮二次仍以長流水煮二次色白不苦為度每斤入九蒸地黃末十兩烏梅末六兩煉蜜丸桐子大每服七十丸用鹽米湯下補中強筋潤肌大能益人取松柏粉帶露採嫩葉搗末當日為之經日則無粉松蘂去赤皮取嫩白者蜜漬之略焙令蜜熟勿太熟則香脆附録艾蒳香增廣志松樹緑衣名艾蒳合衆香燒之其煙回聚清白可愛春風堂隨筆栝柏百年即有白衣如粉本草謂之艾蒳香吾鄉錢鼒先生號艾蒳蓋取諸此趙文敏號松雪乃是一琴名若艾蒳香亦可稱曰松雪附録水松增南方草木狀水松葉如檜而細長出南海土産衆香而此木不大香故彼人無佩服者嶺北人極愛之然其香殊勝在南方時植物無情者也不香于彼而香于此豈屈于不知己而伸于知己者歟物理之難窮如此附録落葉松增落葉松塞外興安嶺多有之五臺亦有其皮蒙古無茶時可以當茶木性最堅其刺有毒入肉即爛入水即沉所以木商不取其幹直挺參天枝葉蔚然恍若九簷羽蓋以塞北髙寒經秋葉脫至春復生松上寄生白脂厚五六寸光潔似玉微軟而堅有用之為靴底者附録杄松增杄松一名白松生塞外汗帖木兒嶺五臺亦有其幹直上枝葉如盤下枝長以上漸短逺望無異浮圖其體最輕商人取之運至通州御定佩文齋廣羣芳譜卷七十
