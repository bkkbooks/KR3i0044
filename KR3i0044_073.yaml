body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷七十一木譜柏原柏一名椈爾雅云柏椈樹聳直皮薄肌膩三月開細𤨏花結實成毬状如小鈴多瓣九月熟霜後瓣裂中有子大如麥芬香可愛六書精藴云柏隂木也木皆屬陽而柏向隂指西盖木之有貞徳者故字從白白西方正色也處處有之古以生泰山者為良今陕州宜州宻州皆佳而乾陵者尤異木之文理大者多為菩薩雲氣人物鳥獸狀態分明徑尺一株可值萬錢川柏亦細膩以為几案光滑恱目増廣雅汁柏柏也地理志華山生文柏一名黄腸廣志柏有續柏彚考原書禹貢杶榦栝柏詩弼風汎彼柏舟魯頌新甫之柏増禮記雜記暢臼以椈杵以梧疏擣鬱鬯用柏臼桐杵者柏香桐潔於神為宜原論語殷人以柏増漢書武帝紀元鼎二年春起柏梁臺註三輔舊事云以香柏為之郊祀志李少君見上上有故銅器問少君少君曰此器齊桓公十年陳於柏寢註以柏木為寢室於臺之上東方朔傳柏者鬼之廷也註言鬼神尚幽闇故以松柏之樹為廷府朱博傳御史府中列柏樹常有野烏數千棲宿其上晨去暮来號曰朝夕烏晉書郭璞傳璞洞五行天文卜筮之術王導深重之甞令作卦璞言公有震厄可命駕西出數十里得一柏樹截斷如身長置常寝處災當可消矣導從其言數日果震柏樹粉碎孝友傳王裒廬於墓側旦夕常至墓所拜跪攀柏悲號涕泣著樹樹為之枯庾衮字叔褒或有斬其墓柏莫知其誰乃召隣人集於墓而自責焉因叩頭泣涕謝祖禰曰徳之不修不能庇先人之樹衮之罪也父老咸亦為之垂泣自後人莫之犯宋書符瑞志王者耆老見敬則柏受甘露原宋書武三王列傳魯郡孔子舊庭有柏樹二十四株經歴漢晉其大連抱有二株先折倒士人崇敬莫之敢犯義㳟悉遣人伐取父老莫不歎息増南齊書髙逸傳伯徐伯珍宅南九里有髙山班固謂之九巖山後漢龍丘萇隠處也山多龍鬚檉柏望之五采世呼為婦人巖伯珍移居之周書齊王憲傳髙祖親圍晉州齊主將兵十萬自来援之永昌公椿屯雞棲原憲宻謂椿曰汝今為營不湏張幕可伐柏為庵示有形勢令兵去之後賊猶致疑也及椿被勅追還率兵夜返齊人果謂柏庵為帳幕也不疑軍退翌日始悟隋書王劭傳劭上表言符命曰陳留老子祠有枯柏世傳云老子将度世云待枯柏生東南枝廻指當有聖人出吾道復行至齊枯柏從下生枝東南上指夜有三童子相與歌曰老子廟前古柏樹東南狀如繖聖主從此去及至尊牧亳州親至祠樹之下自是柏枝廻抱其枯枝漸指西北道教果行原南史王晏傳晏為員外郎齋前柏樹忽變成梧桐論者謂梧桐雖有棲鳯之羙而失後凋之節及晏敗果如之増裴邃傳邃廟在光宅寺西堂宇𢎞敞松柏欝茂范雲廟在三橋蓬蒿不翦梁武帝南郊道經二廟顧而歎曰范為已死裴為更生大同初都下旱蝗四籬門外桐柏凋盡唯邃墓犬牙不入當時異之孝義傳霸城王整之姊嫁為衛敬瑜妻年十六而敬瑜亡手為亡婿種樹數百株墓前柏樹忽成連理一年許還復分散女乃為詩曰墓前一株柏根連復並枝妾心能感木頺城何足竒唐書狄仁傑傳左威衛大将軍權善才右監門中郎將范懐義坐誤斧昭陵柏罪當免髙宗詔誅之仁傑奏不應死帝怒曰是使我為不孝子必殺之仁傑曰漢有盜髙廟玉環文帝欲當之族張釋之廷諍曰假令取長陵一抔土何以加其法於是罪止棄市陛下之法在象魏固有差等犯不至死而致之死何哉今誤伐一柏殺二臣後世謂陛下為何如主帝意解遂免死原方技𫝊桑道茂居有二柏甚茂曰人居而木蕃者去之木盛則土衰土衰則人病乃以鐡數十鈞埋其下増山海經白於之山其上多柏講山其上多柏尚書逸萹東社惟柏原穆天子傳甲申天子升於大北之隥而降休於兩柏之下増三輔黄圖漢文帝霸陵不起山陵稠種柏春秋運斗樞玉衡星精散為柏東觀漢紀李恂邅父母䘮六年躬自負土樹柏常在冡下原謝承後漢書陳留虞延為郡督郵光武廵狩至外黄問延園林柏樹株數延悉曉之由是見知東方朔外傳孝武皇帝時閒居鵲鳴新雨止朔執㦸在殿上呼問之荅曰殿後柏樹有鵲立枯枝上東嚮鳴上遣視如朔言晉宫閣名華林園柏二株抱朴子大谷倒生之柏増神仙傳孔元方鑿水邉㟁作一窟室窟前有一柏樹生道後棘草間委曲隠蔽弟子有急欲詣元方窟室者皆莫能知列士傳延陵季子解寳劒挂徐君墓柏樹三齊略記堯山在廣固城西七里尭廵狩所登遂以為名山頂立祠祠邉有柏樹枯而復生不知幾代樹也拾遺記始皇起雲明臺窮四方之珍木東得葱巒錦柏述征記柏谷谷名也谷中無迴車地夾以髙原柏林䕃藹窮日幽暗弗覩陽景從征記泰山廟中柏皆二十餘圍夹兩堦赤眉嘗斫一樹見血而止今斧創猶在泰山記山南有泰山廟種柏樹千株大者十五六圍長老傳云漢武所種述異記盧氏縣有盧君古塜塜旁柏二株枝條䕃茂二百餘歩樹文𨼆起皆如龜甲根勁如銅石水經注沁水北有華嶽廟廟側有攅柏數百根對郭臨川負岡䕃渚青青彌望竒可翫也陘山子産墳東有廟舊有一枯柏樹其塵根故株之上多生稚柏列秀青青望之竒可嘉矣樊宗師園林記柏曰蒼官酉陽雜爼上座璘公院有穂柏一株衢柯偃覆下坐十餘人太常博士崔碩云汝西有練溪多異柏及暮秋葉上歛俗呼合掌柏海録碎事負霜柏一作宜霜柏寰宇記巴郡有柏柱大可十圍髙二十餘丈乃公孫述時樓柱所斫之處忽生枝而不朽真源縣老子堂前有雙柏樹左階之柏久枯大業十三年忽從根生一枝聳榦三丈三尺枝葉青翠唐武宗二年更生一枝直上五尺横枝兩層枝葉相覆異於常樹東齋紀事武侯廟柏其色若牙然白而光澤尚復生枝葉今纔十丈原東坡集孤山有陳時柏二株其一為人所薪山下老人自為兒已見其枯矣然堅悍如金石愈于未枯者僧志詮作堂于其側名之柏堂予来汝南地平無山清潁之外無以娱予者而地近亳社特宜檜柏自拱把而上輒有樛枝細紋治事堂前二柏與薦福兩檜尤為殊絶孰使予安此寂寞而忘歸者非此君歟増春渚紀聞元豐間朝廷問罪西夏五路舉兵秦鳯路圖上師行營憇形便之次至闗嶺有秦時柏一株雖質榦不枯而枝葉略無存者既標圖間裕陵披圖顧問左右偶以御筆㸃其枝間而歎其閱嵗之久也後郡奏秦朝柏忽復一枝再榮殿中有記當時奏圖歎賞之語私相聳異以為天人筆澤所加便同雨露之施少林集録嵩山漢武帝登封時神人呼萬嵗之所峰之半乃昔嵩陽觀故基有唐天寳年碑刻碑東古柏五株積翠婆娑可愛中有一株尤大五人聮手抱之圍始合下一石刻曰漢武帝封大将軍山川紀異漢陽縣西柏泉寺有古井世傳大禹植柏於大别山其根盤曲直至井底今柏根尚存又大别山陽太平興國寺前亦有古柏俗傳禹治水時所植者化源記柏葉仙人田鸞家居長安常聞道者有長生術遂入華山求問真侣心願懇至至山下數十里見黄冠自山而出鸞遂禮謁祈問隱訣黄冠指柏樹示之曰此即長生藥也何必深逺但問志何如爾鸞遂捜尋仙方云側柏服之久而不已可以長生乃取柏葉曝乾為末服之稍莭葷味心志専一至六七十日未有他益但覺時時煩熱至二年餘病熱頭目如裂舉身生瘡而鸞意終不捨至七八年熱疾益甚其身如火人不可近皆聞柏葉氣諸瘡潰爛黄水遍身如膠忽自云體今小可湏一沐浴遂命置一斛温水於室數人舁卧斛中遂於斛中寝三日方悟呼人起之身上諸瘡皆已掃去光彩明白鬚髮紺緑頓覺耳目鮮明自云初寢夢黄冠數人持旌節導引謁上清遍禮古来列仙皆謂曰柏葉仙人来此遂授以仙術謂曰且止於人世修行後有位次當相召也自此絶榖𨼆於嵩陽年百二十三嵗無疾而終異香滿室空中聞音樂聲乃造青都赴仙約耳原燕談寇萊公知巴東縣手植雙柏於庭民比之甘棠謂之莱公柏後大火柏與公祠俱焚莆陽鄭贛為令悼柏之焚惜公手植不忍翦伐種凌霄花於下使附榦而上以著公之遺徳且慰邦人之去思云増西溪叢語青龍寺老柏院有布衣張在題一絶於院壁云南隣北舍牡丹開年少尋芳去又回唯有君家老柏樹春風来似不曽来元祐中州學教授畢仲愈題跋刻石於平嵐亭上姚氏殘語太祖以柏為界尺謂之隔筆簡避暑録話柏竒峻堅痩似李元膺遯齋閒覽余靖慶歴中知桂州州境窮僻處有林木延袤數十里每至月盈之夕輙有笛聲發於林中甚清逺土人云聞之已數十年終不知其何怪也公遣人尋之見其聲出一大柏樹中乃伐取以為枕聲如期而發公甚寳惜凡數年公之季弟欲窮其怪命工解視但見木之文理正如人在月下吹笛之像雖善畫者莫能及重以膠合之則不復有聲矣玉堂閑話髙祖在襁褓之時母置放其荘柏樹之隂而往餉田比及餉回日斜而樹影不移墨客揮犀壺山有柏木一株長數尺半化為石半猶是堅木蔡君謨見而異焉因運至私第余在莆陽日親見之老學庵筆記真宗御集有苑中賞花詩十首内一首龍柏花李文饒平泉山居草木記有藍田之龍柏宋子京又有真珠龍柏詩劉子儀晁以道朱希真亦皆有此作予長于江南未甞見也或云本出鄜坊間方輿勝覽桔柏渡在昭化縣今昭化驛有古柏土人呼桔柏故名逰武夷山記峰山有仙柏樹古而青翠可賞成都記日就殿以文檉綺柏為材原五色線嵩山天封觀有古柏三株武后封五品大夫䕃百餘歩俗云大小將軍増濟南行記岱岳觀有漢柏柯葉甚茂蜀都雜抄蜀都大抵雨多風少故竹樹皆修聳少陵古柏二千尺人譏其痩長詩固有放言要之蜀産與他逈異謂柏之森森者惟蜀為然所謂喬木如山者亦惟蜀為然逰香山寺記至洪光寺入石門路甚修平可歩古柏夹之外不見林上不見顛枝榦交䕃人行道上蒼翠撲衣日影注射如荇藻凌亂可數百歩復折而上如是者凡十有一每登一折必右俯木末左瞰絶壁壁皆甃石為之嵗久若天造柏從石罅出多類鬼工初登一二盤竒在柏稍上諸山如螺髻自柏外見則又竒至七八盤山盡在下精藍名墅棊布繡錯金碧晃耀目境屢換殆無暇問柏竒矣桐柏山志柏香峰四望隂巖垂磴萬仭上多柏木金陵諸園記東園一曰太傅園兩柏異榦合杪下可出入曰柏門天中記廣漢梁泉縣漢故道縣也龍女山多紫柏華陽志云梁泉有紫柏坂嵩逰記嵩陽宫外有漢武帝封三將軍柏柏膚殻皆脫去獨存肉理色蒼白大者圍六人次四次三人計千百年物矣其最大者南枝一節瘇甚盖木癭也祖庵左一柏云恵能謁祖時從鉢盂中帶至也余為書六祖手植柏五字原湧幢小品髙祖取婺州過蘭溪縣見古柏甚竒駐師其下後剏亭繞之而空其中夜半輒有蒼龍繞伏其上王世懋詩云何年古柏尚青青曽是髙皇玉輦停不信聖恩偏雨露枝枝都作老龍形増七曲山記應夢臺右晉柏二株其形盤踞如虯龍色含蒼翠自晉代傳於今幾三合抱泰山記炳靈殿漢柏三四株皆連理中一株最巨輪囷臃腫狀尤詭異非千年不能有此四川志詹香山綿竹縣人言某寺有古柏一株縣令將伐之造署人莫敢逆者寺有老僧題一絶於樹云定知此去棟梁材無復清隂覆緑苔只恐深山明月夜懼他千里鶴歸来縣令見之惻然而止原崑山縣志南宋時髙麗進隂陽柏二株初僅二尺種之永懐寺殿庭左右久之髙與殿等每左花則右實右花則左實集藻記増宋田況古柏記成都諸葛孔明祠古柏年祀寖逺喬柯鉅圍蟠固凌㧞有足異者杜甫甞作歌叚文昌亦作文摹状瓌竒人多暗誦故老相傳及記事者云自唐季凋瘁歴王孟二偽國蠧槁尤甚然以祠中樹無敢翦伐者皇朝乾徳丁夘嵗仲夏枯柯復生日益敷茂觀者歎聳以為榮枯之變應時治亂武侯光靈如有意於茲者誠為異事因命工圗寫備述本末以貽好事者題䟦増宋陸游䟦古柏圖此圗吾家舊藏余居成都七年屢至漢昭烈恵陵此柏在陵旁廟中忠武侯室之南所謂先主武侯同閟宫者與此略無小異則畫工亦當時名手也贊増宋蘇軾東莞資福堂老柏再生賛生石首肎奘松肘回是心茍真金石為開堂去柏枯其留復生此柏無我誰為枯榮方其枯時不枯者存一枯一榮皆方便門人皆不聞瓦礫說法今聞此柏熾然常說賦原齊蕭鋒修柏賦既殊羣而抗立亦含貞而挺正豈春日之自芳在霜下而為盛衝風不能摧其枝積雪不能改其性雖坎壈於當年庶後凋之可詠増唐魏徴道觀内柏樹賦有序元壇内有柏樹焉封植營護幾乎二紀枝榦扶疎不過數尺籠於衆草之中覆乎藂棘之下雖磊落節目不改本性然而翳薈蒙籠莫能自申達也惜其不生髙峰臨絶壑籠日月帶雲霞而與夫臃腫之徒雜糅兹地此豈所謂方以類聚物以羣分者哉有感於懐喟然而賦其詞曰覽大鈞之播化察草木之殊類雨露清而並榮霜雪茫而俱悴唯丸丸之庭柏禀自然而醇粹渉青陽不増其華歴𤣥英不減其翠原斯木之攸挺植新甫之髙岑干霄漢以上秀絶無地而下臨籠日月以散彩俯雲霞而結隂邁千祀而逾茂秉四時而一心靈根再徙兹庭爰植髙節未彰貞心誰識既雜沓乎衆草又蕪沒乎叢棘匪王孫之見知志耿介其何極若乃春風起於蘋末美景麗乎中園水含苔于曲浦草鋪露於平原成蹊花亂幽谷鶯喧徒耿然而自撫謝桃李而無言至于日窮於紀嵗云暮止飄蓬亂驚愁雲叠起氷凝無際雪飛千里顧衆類之颯然欝亭亭而孤峙貴不移於本性方有儷於君子聊染翰以寫懐庶無虧於善始李徳裕栁柏賦并序夫受天地之正氣者唯松柏而已故聖人稱其有心美其後凋豈無他木莫可儔匹予常歎柏之為物貞若有餘而華滋不足徒植於精舍列於幽庭不得處園池之中與松竹相映獨此郡有栁柏風姿濯濯宛若荑楊而冒霜停雪四時不改斯得謂之具美矣惜其生於遐逺人罕知之偶為此賦以貽親友惟天地之生物均覆載而不私雖草木之殊性皆榮落之有時感松柏兮自得經隆冬兮乃知常集霰於窮節秉心終而不移觀夫竹嬋娟以挺秀松英茂以含滋可䕃蔚於臺榭故封植於園池嗟緑柏之貞苦爰自託乎幽崕或森森於寒壟或肅肅於神祠何炎徼之僻陋忽珍木而在茲齊芊蔚於蘭苕儷真芳於桂枝逺而象之聳榦參差凝翠旌之陸離廹而翫之布葉低垂若孔盖之葳𬎼又似翠列巢以羣棲鸞奮翼而来儀含輕烟於夕景泫零露於朝曦逮秋實之蕃衍綴青珠以纍纍嗟乎材不可備人亦如此斯子張之容雖盛栁惠之貞則虧有長孺之正色無思曼之風姿歎此物之具美以幽深而見遺非企瑶林於塵外方玉樹於前墀望舊國兮無際思故人兮未期曽不得倚樹而泛瑶瑟攀條而獻蘭巵慨路逺而莫致抑毫端而孔悲顧謂稚子起為謡曰楚山側兮湘水源羙斯柏兮託幽根條總翠兮冬轉茂實垂珠兮秋始蕃彼變化兮不測焉知非張緒之精魂五言古詩増北齊魏收庭柏古松圖偃盖新柏寫爐峰凌寒翠不奪迎暄緑更濃茹葉輕沉體咀實化衰容将使中臺麝違山能見從原唐杜甫病柏有柏生崇岡童童狀車盖偃蹙龍虎姿主當風雲㑹神明依正直故老多再拜豈知千年根中路顔色壊出非不得地蟠據亦髙大嵗寒忽無憑日夜柯葉改丹鳯領九雛哀鳴翔其外鴟鴞志意滿養子穿穴内客從何鄉来竚立久吁怪静求元精理浩蕩難倚賴増宋司馬光柏軒凛然凌霜色本自生丘壑徙之君子庭栽培固不薄静夜聲飂飂清晝隂漠漠秀氣逼簷楹翠影通簾箔知君梁棟材大匠偶未度但守歳寒心閑軒亦不惡蘇軾和子由記園中草木種柏待其成柏成人已老不如種叢篲春種秋可倒隂陽不擇物美惡随意造柏生何苦艱似亦費天巧天工巧有幾肎盡為汝耗君㸔藜與藿生意常草草御史臺柏故園多珍木翠柏如蒲葦幽囚無與樂百日㸔不已時来拾流肪未忍踐落子當年誰所種少長與我齒仰視蒼蒼榦所閱固多矣應見李将軍膽落温御史蘇轍㕔前柏穉柏如嬰兒冉冉三尺長移根出澗石植榦對華堂重露恣膏沐清風時抑揚我老不耐寒憐汝堪風霜朝夕望爾長尺寸常度量知非老人伴可入諸孫行想見十年後簷前蔚蒼蒼人来顧汝笑誦我此詩章嵩山天封觀将軍柏肅肅避暑宫石殿秋日冷凛然中庭柏氣壓千夫整風聲荅萬壑雲色通諸嶺材大難為工甘與蓬蒿屛元陳樵雙柏亭亭山上柏柯榦如青桐蒼古㧞俗姿肎作兒女容風霜日揺落萬木為之空爾獨不見摧屹立如老翁乃知歸根妙生意恒内融願乗雷雨興化作雙飛龍明方孝孺栽柏迂拙乖世用每藴無窮思取效非目前逺與千載期翠柏信良材成長計功遲兹晨劚煙雨移種盈尺姿清廟嚴潔地聖靈㑹於斯豈無杞栁輩不足當階墀殷社夙所尚古制非人為先師實殷人植此理固宜但恐枝榦弱不耐風霜欺培護茍無失終見盛大時三年過人長十年齊桷榱百年必合抱根深柯葉滋青霄泊鸞鳯厚土蟠蛟螭豈特傲寒暑将堪閱興衰所托况得所永免斤斧危既膺顧盻榮復與翦伐辭寥寥百世後神物相扶持何必為棟梁乃見才氣施流光若飛翰時代易推移行㸔好古士追說種者誰我生素多病中歳早孱羸待為鶴髮翁見女凌雲枝志士用心者濩落為世嗤何如羣兒巧插槿紛成籬七言古詩原唐杜甫古柏行孔明廟前有老柏柯如青銅根如石霜皮溜雨四十圍黛色參天二千尺君臣已與時際㑹樹木猶為人愛惜雲来氣接巫峡長月出寒通雪山白憶昨路繞錦亭東先主武侯同閟宫崔嵬枝榦郊原古窈窕丹青户牖空落落盤踞雖得地冥冥孤髙多烈風扶持自是神明力正直原因造化功大厦如傾要梁棟萬牛回首邱山重不露文章世已驚未辭翦伐誰能送苦心豈免容螻蟻香葉終經宿鸞鳯志士幽人莫怨嗟古来材大難為用増宋梅堯臣龍柏花非龍香葉非柏獨竊二羙誇芳𬎼苦楝不分顔色近紫荆未甘開謝遲羣公莫以得地貴竟費佳句何足思明李奎古柏行虞山古柏幾千嵗根盤節錯羅星文靈氣常懸白日雨疎枝亂灑青天雲霜柯露榦了不識半是蒼苔半成石石上猶存古鏡光青萍未拭芙蓉色我来八月秋氣濃月明滿地盤虬龍赤脚大呌不忍去長風吹落虞山鐘天生異物詎可測呵護常聞鬼神泣巖壑寜教無此材嵗寒然後知松柏五言律詩増唐岑參使院中新栽柏樹子呈李十五栖筠愛爾青青色移根此地来不曾臺上種留向磧中栽脆葉欺門栁狂花笑院梅不湏愁歳晩霜露豈能摧李徳裕柏聞有三珠樹惟應秘閬風珊瑚不生葉朱草又無叢未若凌雲柏常能終嵗紅晨霞與落日相照在巗中叚成式穂柏聮句一院暑難侵莓苔共影深枝標争息鳥餘吹正開襟柯古宿雨香添色殘陽石在隂乗閒動詩意助静入禪心善繼李洞古柏手植知何代年齊偃盖松結根生别樹吹子落隣峰古榦經龍嗅髙煙過雁衝可佳繁葉盡聲不礙秋鐘宋朱長文多榦柏古柏列重門連枝若弟昆㕘天分直榦得地共靈根月照龍蛇影風摧鐡石痕鸞凰期可宿香葉向春繁明吴寛追和朱樂圃蘇學多榦柏新甫傳遺種吴門見後昆碧霄多直榦黄壤本同根霜雪持髙節莓苔接古㾗三年非榿木十畝自隂繁七言律詩原唐温庭筠晉朝柏樹晉朝名軰此離羣想對濃隂去住分題處尚尋王内史畫時應是顧将軍長廊夜静聲疑雨古殿秋深影勝雲一下南臺到人世曉泉清籟更難聞増宋韓琦刪柏翠柏枝繁鬱未伸我来刪理務躬親孤根得地雖經嵗逸勢参天不在人先易工夫知取舍後凋顔色長精神瓌材自入他年用莫厭因時翦擇頻王安石景福殿前柏香葉由来耐嵗寒幾經真賞駐鳴鑾根通御水龍應蟄枝觸宫雲鶴更盤怪石誤䝉三品號老松先得大夫官知君勁節無榮慕寵辱紛紛一等㸔蘇轍文殊院古柏曽㸔大柏孔明祠行盡天涯未見之此樹湏當稱子行他山只可作孫枝棟梁知是誰家用舟楫唯應海水宜日莫飛鵶集無數青田老鶴未曽知郭祥正柏青幢碧盖儼天成濕翠濛濛滴畫楹禪客自陪千嵗老逰人時抱一樽傾恥隨桃李春風短奪盡松篁夜氣清安得鬼神題巨筆不容左紐獨専名五言排律増唐李商隠武侯廟古柏蜀相階前柏龍蛇捧閟宫隂成江外畔老向惠陵東大樹思馮異甘棠憶召公葉凋湘燕雨枝折海鵬風玉壘經綸逺金刀歴數終誰将出師表一為問昭融五言絶句増唐武平一奉和正旦賜宰臣柏葉應制緑葉迎春緑寒枝歴嵗寒願持柏葉夀長奉萬年歡趙彦昭奉和元日賜羣臣柏葉應制器乏雕梁器材非搆厦材但将千嵗葉常奉萬年杯李乂元日恩賜柏葉應制勁節臨冬勁芳心待嵗芳偏令人益夀非止麝含香七言絶句増唐雍陶武侯廟古柏宿葉四時同一色髙枝千嵗對孤峰此中疑有精靈在為見盤根似臥龍宋司馬光柏紅桃素李競年華周遍長安萬萬家何事青青亭下柏東風吹盡亦無花金完顔璹黄華畫古柏黄華老人畫古柏鐡簡将軍挽大弨意足不求顔色似荔支風味配江瑶詩散句増晉潘岳不見㵎邊柏嵗寒守一度唐杜甫雖當霰雪巖未覺栝柏枯李賀幽幽太華側老柏如建纛宋石延年蛇露根穿嶺龍眠影在潭梅堯臣棐柏移皆活風霜不變青蘇軾蒼龍轉玉骨黑虎抱金柅瘦皮纒鶴骨髙頂轉龍腰蘇轍孤直自新甫何年移禁廷陸游龍吟風雨夕山立雪霜晨唐張籍弱柏倒垂如線蔓簷頭不見有枝柯宋夏竦托植久依山杏宻附枝俄接帝梧榮劉敞南牆雙柏天生直材雖未老心千尺王令不惜以材同失地好留更老共支天强枝抝回信有力髙榦復俯交虬拳蘇軾道人手植幾生前鶴骨龍姿尚宛然周弼更添蒼柏兩三軰相伴髙枝作雨聲金王元粹風吹髙柏影在衣忽驚滿座蛟龍入原唐杜甫翠柏苦猶食増李賀小柏儼重扇薛能春氣柏林香宋司馬光翠色添崖柏金元好問細柏含古春元許有壬翠柏瀉秋聲唐王維柏葉初齊養麝香杜甫錦官城外柏森森宋歐陽修凜凛節竒霜榦柏蘇軾拏龍濯霧屈虬枝吴儆庭柏無心不受誇别録原南史王儉傳儉字仲寳丹陽尹袁粲聞其名及見之曰宰相之門也栝柏豫章雖小已有棟梁氣矣増拾遺記太山下有連理文石髙十二丈狀如柏樹其文彪發似人雕鏤自下而上皆合而中開廣六尺望若真樹也桂海虞衡志石柏生海中一榦極細上有一葉宛似側柏扶疎無小異根所附著如烏藥大抵皆化為石矣行營雜録大中祥符六年緜州彰明縣崇仙觀柏柱上有木文如畫天尊状毛髮眉目衣服履舄纖縷悉備素園石譜黄龍府山中產柏枝瑪瑙石色甚瑩白上如柏枝或黄或黑甚光潤頃年白䝉亨奉使北主遺以一石大如桃上有鴝鵒如豆許棲柏枝上頗竒怪原種植九月中柏子熟採收俟来年二三月間用水淘過取沉水者著濕地二三日淘一次候芽出将劚熟地調成畦水飲足以子勻撒其中覆細土半寸再以水壓下二三日澆一次常使土潤勿太濕太乾既生出土四圍竪矮籬護之恐為蝦蟇所食常澆水亦宜糞俟長髙數尺分栽灌溉性喜曬一年中用曬過糞水澆三四次則青翠蓊欝秋時翦小枝二三尺可插活柏葉色緑不凋夏秋採者良種類非一入藥惟取葉扁而側生者名側柏功効殊别古柏尤竒益州孔明廟中大柏蜀漢時植人多採入藥其味甘香大異常柏他如花柏葉濃郁成朶無子叢柏樹緑色並不入藥製用嫩柏枝洗浄控乾入梅滷曬乾甘草桂心為細末入淨磁器中一層藥一層柏枝𦂳封藏之久不開則上鹽花可玩可食煮汁釀酒去風痺歴節風附録柏實原本草柏實以乾州者為最三月開花九月結子状如小鈴霜後四裂中有數子大如麥粒芬香可愛彚考増列仙傳赤松子好食柏實齒落更生賈氏談録李徳裕平泉荘有珠子柏實皆如珠子簾生葉上香聞數十歩傳燈録僧問趙州和尚祖師西来意趙云庭前柏樹子茅亭客話遂州小溪縣石城鎮仙女埡村民程翁名君友開寳九年春往雲頂山寺遇一道士隨往青城山道士曰爾有仙表得至於此開囊取丹一粒令吞之曰若有饑渇則可嚼柏葉柏實些些君友歸家無饑渇之念遂别止一室不顧家事甞焚柏子柏葉静坐無所營為不飲不食時嚼柏實三五顆而已門外有一柏樹下有一大盤石常偃息於上至九月七日夜如有所待達旦雲霞相映有如五色君友躡空而去集藻詩散句増宋晏殊紫結茱茰實濃薫菡萏香唐皮日休荒徑掃稀堆柏子别録原收子熟時頓採之易得過時則零落又易生蟲製用子熟採蒸曝舂礧取仁用取子之沉者曝乾為末每服方寸匕漸増三五合欲絶榖恣食取飽渇則飲水久服延年附録竹柏増益部方物略記竹柏生峨眉山中葉繁長而籜似竹然其榦大抵類柏而亭直集藻賛増宋宋祁竹柏贊葉與竹類緻理如柏以狀得名亭亭修直檜原檜柏葉松身見爾雅葉尖硬亦謂之栝今人名圎柏以别側柏増爾雅翼又有一種别名檜柏不甚長其枝葉乍檜乍柏一枝之間屢變人家庭宇植之以為玩彚考増書禹貢杶榦栝柏詩衛風檜楫松舟宋史真宗紀大中祥符六年十月甲子亳州太清宮枯檜再生西京雜記上林苑栝十株洛陽伽藍記永寧寺僧房樓觀一千餘間栝椿松柏扶疎拂簷水經注孔子舊廟西北二里有顔母廟廟像猶嚴有修栝五株封氏見聞記兖州曲阜縣文宣廟門内并殿西南各有柏葉松身之樹各髙五六丈枯槁已久相傳夫子手植永嘉三年復枯俗傳千年木療心痛人多竊割削之樹身漸細去地丈餘皆以泥累泥封猶不免焉亦有取為笏者色紫而甚光澤肅宗時二樹猶在幽燕記異幽燕思先驛後有五樹檜忽生藥圎試摘服之往往療疾有驗賈氏談録李徳裕平泉荘有雁翅檜婆娑如鴻雁之翅洛陽名園記董氏東園北鄉入門有栝可十圍實小如松實而甘香過之歸仁園其坊名也園盡此一坊廣輪皆里餘唐丞相牛僧孺園七里檜其故木也避暑録話蘇州白樂天手植檜在州宅後余政和初甞見之已槁瘁髙不滿二丈意非四百年物真偽未知也後為朱冲取獻聞槁死於道中乃以他檜易之禁中多不知又有言華亭悟空禪師塔前檜亦唐物詔冲取之檜大不可越橋梁乃以大舟即華亭泛海出楚州以入汴既行一日張㠶風猛檜枝與帆低昂不可制舟與人皆沒長興大雄寺陳霸先宅庭亦有大檜中空裂為四枝䕃半庭質如金石相傳以為霸先所植又欲取以獻㑹聞悟空檜沉海乃已賢者因物幸託以不朽然此三檜一槁死于道一沉于海一僅以免盖欲為道旁橛株不可得也檜深宻紆盤似管㓜安澠水燕談亳州法相寺矮檜髙纔數尺偃亞蟠屈枝葉繁茂不可圖唐大中年李待價石記云圎䕃三丈餘詎今又三百餘年廣袤五六丈為一郡之珍玩士人目其寺曰矮栝遊茅山録玉晨觀東廊許長史手植檜其圍丈餘西廊左紐檜圍八尺原太清記亳州太清宫有八檜老子手植根株枝榦皆左紐石曼卿集此檜不知年代李唐之盛一枝再生至聖朝復有此異増老學菴筆記海檜有二種海檜夭矯堅痩皆天成又有刻削盤屈而成者名土音杜檜海檜絶難致凡人家所有大抵土檜也亳州太清宫檜至多檜花開時蜜蜂飛集其間不可勝數作蜜極香而味帶微苦謂之檜花蜜真竒物也歐陽公守亳時有詩曰蜂採檜花村落香則亦不獨太清而已話腴宋真宗朝寢殿側有古檜秀茂不羣名御愛檜然横礙殿簷真皇意欲去之一夕風雷轉折其枝時以為瑞中吴紀聞白樂天為蘓州守時恩信及民皆敬而愛之甞植檜數本於郡圃後人目之為白公檜以况甘棠焉湖山勝槩鳯凰山有交枝檜東遊記顔廟中孤檜髙五丈許逰茅山記茅峰之西麓有玉宸觀門外有古檜千餘皆逾抱紋左紐竒怪可畫白馬老君二殿前各檜一株尤古而竒西山逰記碧雲寺殿前二栝松十圍隠千牛焉日出映之山中蓊蓊如青雲起龍鳴山記聽松軒西即韓熙載讀書堂遺址所植檜猶存原梧潯雜佩余甞憩兩廣公署前庭有榕檜二樹駢生蟠根合體互相糾結異枝交䕃蒼翠成帷每婆娑其下玩之不忍去増福建志王審知夢衆僧奕奕有光所至有雙檜并池旦尋而得之池曰浴聖檜曰息聖原曲阜孔廟殿前宣聖手植檜紋皆左紐上聳無枝而不朽每遇一代興或聖君出則發一枝我朝太祖龍興世宗繼統曾兩見真大異事常州烈帝廟有獨孤檜潁州靈壇觀有再生檜集藻賦御製闕里古檜賦并序孔子手植檜在杏壇之側金貞祐間無復存矣元至元三十年再茁故處明宏治間又燬于火今所遺者不枯不榮屹立霜露而秀色獨異撫摩久之乃作賦曰維槎枒之靈質實鈞化之所鍾標扶輿之竒特峙先聖之故宫涵元氣以不朽與至道而俱崇爾其黛榦蒼蒼孤柯濯濯鶴骨初扶霜鱗未作儼茁軋以方舒類洪荒之忽鑿謝縟采于春華完淳風于太樸夭矯拂勃星臨露滴枝無取于樛樛葉全稀于摵摵夕飇度兮弗驚朝旭烘兮如滌伊間氣之潛滋惟神爽之咸集徘徊延却宛轉斷連蟠屈兮若佾羽之在列聳削兮若簨簴之待懸則有築以崇封沃以膏壤方以周䦨角以文磉足縮心歔目給神賞蘿烟奪翠松籟失響于是楷因之而擢潁蓍感之而抽莖争葳㽔于絃誦之里齊扶疎于禮樂之庭朝菌慚兮一旦大椿讓兮千齡上泝真宰之功逺契無為之代均雲行兮雨施等乾始兮坤載疇則出混茫之中而居耳目之外與三才以並植綿歴禩其長在亦有扶桑海表若木山巔東瀛西極掲日摩天迹雖誇于神異植非出于文宣宜瞠乎其後矣邈無得而稱焉増唐温岐再生檜賦檜有再生之瑞天符聖運之興挺松身而鱗皴迥出布柏葉而杳藹相承隋道既窮則沒身于亂土唐朝将建故發徳于休徴原夫日將興而幽暗皆明君應期而纖微必表生于枯朽證受命于敗徳之時長則繁華示寳祚于延慶之兆想夫拔陳根而已茂聳修榦以方妍凌朝而還宜宿露向晩而尤稱新煙以狀而方生荑之枯楊若此以理而喻易葉之僵栁昭然效殊祥以示後願衆瑞而居先嘉其擢本傍榮抽條迥秀歴朱夏而彌盛冒霜雪而不朽應昌業于龍潜之際豈曰無心彰聖徳于虎視之前孰云虚受徒觀夫載光紫府効祉皇家竦亭亭之柯葉擢鬱鬱之輝華可以播之于萬古可以流之于四遐是知歴數歸唐禎祥啓聖何厚地之朽木報上天之明命殘陽未落宫庭之林藪忽生明月初懸玉砌之桂花復盛矧夫貞節獨異髙標自持散芳氣而微風乍動入重隂而宿鳥猶疑盖天所贊也亦神以化之客有生遇明時身䝉至徳窮勝負于朕兆慕休祥于邦國敢獻賦以揚榮遂布之于翰墨元祝堯手植檜賦繄孔庭之喬木兮自夫子之文章象三林以毓秀兮開萬葉以流芳根詩書之正脈兮表吾道之昌長昔闕里之微言兮稱後凋之松柏惟若木之柏葉松身兮固手之而不能釋諒因材以栽培兮在人物以如一元氣㑹乎其根兮集條理而大成日月拂乎其枝兮掲文明而上行映尼山之正色兮紛蒼翠之曽敷承泗波之餘澤兮潤滲漉而不枯雲風歘霍而經庭兮差芳氣之襲予八音噌吰以砰磕兮忽升堂而驚顧鳯飄颻以銜圖兮遥千載以来下麒麟有時而出兮或遲兹而逰豫彼春秋之風雨兮超震凌以自掲後七雄之斬艾兮曾不足動其一髮金石嫓乎其堅剛兮縦百秦而何焚神左右以扶持兮知未䘮於斯文吾聞孔壇之杏兮配斯文以永久何茲檜之鼎峙兮亦茲杏之不朽信聖人之於萬物兮無一物而不仁茍仁心一有所寓兮自當與天地而長春建深根而不㧞兮矻儒家之柱石今将指天地為期兮夀皇圖於箕翼北極建杓而秉持兮奎璧燦然而成行扶桑昭晰以警曄兮條風發乎震方皇覽乎六藝之芳潤兮熙文運以再昌録孔氏之子孫兮攬庭秀而不敢忘訪故家而愛其木兮當百倍乎甘棠命青陽使發敷兮起朱融使楙鬯戒顥收以来殺兮警神冥以孳養謂英材之並育兮待棟梁以為用矧先聖之親植兮誠有土之所重嗟七十子面承挈提兮各抱材而有施何梁木之既壊兮余乃不得與茲檜而同時幸壁藏之亡恙兮瞻牆仭以有基託餘隂以延佇兮結芳條而遐思衣前後之襜如兮恍洋洋而在斯雖朽質之莫雕兮亦求柯而為則喜斯道之有依兮遂游歌而不息歌曰檜之根兮輪囷檜之節兮嶙峋自周及元吾不知其幾春檜之古兮有神檜之今兮有靈維元繼周益將開千萬億載之文明五言古詩増宋梅尭臣和曹光道風㧞三檜飄風西北至樹苦萬繂牽君家三古檜繁根龍地纒其固謂不㧞朱欄擁青塼今同秀林木摧倒誰復憐安得百力士扶持尚可全慎勿伐作薪豈無庭燎然原蘓軾和趙景貺栽檜汝隂多老檜處處屯蒼雲地連丹砂井物化青牛君時有再生枝還作左紐文王孫有古意書室延清芬應憐四孺子不堕凡木羣體備松柏姿氣含芝术薰初扶鶴立骨末出龍纒筋巢根白蟻亂網葉秋虫紛乃知蔽芾初甚要封植勤他年皮三寸狐鼠了不聞増蘇軾王仲至侍郎見恵穉栝種之禮曹北垣下今百餘日矣蔚然有生意喜而作詩翠栝東南美近生神嶽隂惜哉不可致霜根絡雲岑仙風振髙標香實隕平林偶隨樗櫟生不為樵牧侵忽驚黄茒嶺稍出青玉鍼好事雖力取王城少知音豈無換鵞手但知覓来禽髙懐獨夫子一見捐槖金得之喜不寐贈我意殊深公堂開後閤凡木愧華簪栽培一寸根寄子百年心常恐樊籠中摧我鸞鶴衿誰知積雨後寒芒曉森森恨我廹歸老不見汝十尋蒼皮護玉骨旦暮視古今何人風雨夜卧聽饑龍吟郭祥正合肥何公檜部使者楊公潜古命予賦之合肥有老檜得名自何公何公何代人名跡了莫窮髙枝偃羽盖低枝卧蒼龍盤根徹厚地踈影落寒空荏苒九天碧仍為煙霧濛相傳魏武帝解甲休鐡驄甞坐此檜下吞吴未成功至今晦暝夕往往揚英風我公心好古清標聳千峰鑒賞揮巨筆丹青孰為工燦燦發明玉琤琤叩絲桐談笑走兵役垣墻宻泥封拂拭枯折榦一助春風融願回㧞山力移植明光宫原陳師道次韻趙徳麟植檜種木待成林聊為千年事目中趨百里寧同萬牛費植檜三尺强已有凌雲氣生世能幾何擬作千年計衆人笑拍手君子用其意蕭蕭孤竹君忘言黙相契名以金石交椿楊皆奴婢緬懐萬仭巔千丈蔚蒼翠盤根泉石底用意霜雪外寜湏大厦材坐待斧斤至散為風雨聲密作馬牛蔽増金元好問濟南廟中古檜同叔能賦亭亭祠宫檜鬱鬱上雲雨扶持幾来年造物心獨苦青餘玉川潤根入鐡崕古雖含棟梁姿斤斧安得取沇洑地中久駭浪思一鼓天柱屹不移水國奠平土乾坤此神物甲乙存世譜瀨鄊留耳孫闕里傳鼻祖秦松徒自汙蜀柏聊共數㑹待十抱成茲焉重摩拊明吴寬觀孔林手植檜魯宫久已壞孔宅仍如新悠悠二千載手澤嗟猶存所存匪他物竒樹當髙門矯矯歴霜雪青青出埃塵親承時雨化生意常欣欣相傳藉文字烈火經嬴秦而此特萌蘖挺然異其羣羣木繞庭際合抱髙入雲尋常豈得似隠起成旋文端如人索綯徽纆依然分米芾好竒士于道未必聞玩物有述作意與石丈均我来重謁拜欲去歩幾廵維魯多松柏斷度見詩人徂徕與新甫遥瞻失嶙峋沈周七星檜海虞七星檜宜為羣木冠列生老子宫與邑作竒觀廣墀氣蕭森入門凜欲汗久信天地成沃知雨露灌𫝊植從蕭梁其說我恐漫驗斗形叵全七既斃其半三株實聊存難執嵗月算各各具其異形容匪詞翰西體裂多槁豁然敞三判東體活亦裂筋骸互續斷北者蜷而秃袖破舞脫腕葉亦不暇葉榦亦不暇榦左文皮索綯孤蕝頂留繖槎折象齒蹺癭决鬼目爛疏越復叢穴骳骫仍軒岸蛟攣及猊跛努力不得竄矛長及劒短接戰驚楚漢如此紛怪駭聃君不能按知遭幾雷厄還屢兵火難生死付冥然造物反被玩君子重貞固頑醜小人讕緣髙坐吹簫我欲呼鶴鸛從根覓埋丹澆泉覬紅燦長生就其䕃永作婆娑伴鄧韍致道觀七星檜琳宫何岧嶤爽氣凌青蒼中有古檜樹傳植自蕭梁嵗逺四樹存如斗酌天漿東株聳而老慶歴補其亡中株麗瓊壇少日嬉其旁枿動手可撼鐡柱鎻蛟猖今已翦不遺彼蚩盗其香兩株在東南偃盖覆修廊攅枝細而宻葉聚如針芒擁挺析三本糾結連肺腸龍也方出海挟以子母将兩株在西南赤立膚無霜偃蹇捎殿角督力示堅强龍也得雲霧攫騖不復翔六子莫囚鎖帝招遣巫陽北株最怪異不與羣木行質榦盡屈鐡夭矯互低昂辨葉知乃樹尋柯惑其方衆視興怪歎應接不得遑乍疑古蚩尤蓄力抗軒黄拓臂運五兵有徒實跳踉勁者弩脫括彎者弧方張横者奪槊舞堅者操矛鏘何乃大小柯亷脊如斧螳怒虬㧞山出隠霧勢騰驤理斷一絲續膚削流乳肪我語非强聒細視乃知詳四檜皆左紐玉晨逺相望霽晴亦慘黯昏黑常晶光仙真護呵久山鬼憑藉長至今空翠表劒佩時将将蜀廟青銅柏涿郡羽葆桒圗經儼封殖况我桑梓鄉入景星月夜清唳徹虚皇移酒與檜飲風露襲綃裳石田寫東樹髙詞振琳瑯遺墨付好事煙姿漲雲房我詩費摹寫傳之起譸張録詩冠巨圖尚與檜作堂原施顯七星檜琳宫檜森森蟉枝鬱蒼翠植時應斗宿數列三之四龍鱗綴苔圎香葉凝煙細節操歴冰霜大材難小試匠石偶来見錯愕相驚視吴納七星檜仙壇有古檜森列同七星云是梁家種古怪如龍形東蘇護朽骨新枝復青青造化呈竒觀拱衛煩山靈誰栽若此樹閱嵗踰千齡七言古詩原宋蘇轍任氏閱世堂前大檜君家大檜長百尺根如車輪身弦直壯夫連臂不能抱孤鶴髙飛直上立狂風動地舞枝榦大雪翻空洗顔色人言此檜三百年未知昔是何人植君家大夫老不遇一生使氣未甞屈沒身不說歸故里遺愛自知懐舊邑此翁此檜兩相似相與閱世何終極汝南山淺無良材櫟柱棟椽聊障日便令殺身起大厦亦恐衆材無匹敵且留枝葉撓雲霓猶得世人長太息増郭祥正詠蒋公檜淮南亭中有蒼檜仰視團團翠為盖直榦每容鸞鳯棲盤根深壓鯨鰲背北風預作氷陣聲恐取蛟龍斬天外呼童出屋為我窺摩颭清隂月光碎問誰植之前蒋公得地倐經三十載不同種杏上青天正似甘棠有遺愛使華今復見公孫太平事業鍾一門祖朝冠帯漸塵土却嗟此檜春常存孤髙豈忘栽培力秀發兼承造化恩已看枝葉飽霜露終作棟柱扶乾坤新詩編聮盡珠玉光大先烈聽箎塤更憶丹青妙手畫進入明堂逢至尊林景熙雙檜堂為魯聖可行可賦魚頭公子氷雪姿根柢忠信華文辭乃翁手植豈無意貞固已作層霄期氣含芝术體松柏容成山下神仙宅清隂冉冉生庭除緑霧纖纖護琴冊風簷對語如索詩君家伯仲諧塤箎養成材器豐且碩蓄洩雲雨蟠蛟螭黄州謫臣坐詩累杳杳蟄龍空九地蒼根留取千載芳何物醜秦盗名字元謝應芳獨孤公檜詩并序唐獨孤憲公為常州刺史時有手植之檜今見諸郡志等書元末樹毁於兵至此二十餘年為常州民者宜再植以寓思賢之意况有周鍊師為松菊主者乎率爾口占呈乞諸搢紳先生更倡迭和相與賛成亦庶乎厚風俗云憶昔十五六好古尊前賢初問獨孤檜快覩曽争先蒼然一株枿舊根皴皮錯節枝葉蕃適逢夜雨半身濕疑是往年甘露痕孔明廟前柏相似乃在陳司徒廟之後園鄉来陵谷忽變改造化刧灰飛入海神焦鬼爛救不得桐鄊自此無光彩幸存一曲闌干石題公姓字留遺跡石苔斕斑土花碧相伴銅駝非荆棘余從海上避兵歸幾度摩挲長太息懐哉古之人好賢意無窮詠甘棠愛召伯賦菉竹美武公憲公此樹堪比隆後人寜不仰髙風𤣥都道士桃千樹一㑹區區豈難措龍鍾野老及羣英亦媿因循坐遲暮檜乎檜乎重培植風枝相樛霜榦直邦人具瞻仰遺徳見樹猶如見顔色六百二十五年如一昔明孫一元致道觀㸔七星檜樹歌海虞山前突兀見古檜眼中氣勢相盤拏上應七曜分布有神㑹地靈千嵗儲精華皴皮無文盡剝落老根化石吞泥沙據山􅐑峞映􅞛谺身枯溜雨枝黑藏蛇佇立頃刻雲霧遮日落未落山之厓同行觀者皆歎嗟舌捫頸縮無敢譁歸来靈物不可究夜宿撼牀恐龍鬭王叔承震澤普濟寺觀古檜歌沙門老樹驚竒崛四百年来青未歇氣交古佛通精靈命落殘碑題嵗月皮為黛石根為鐡琥珀為枝玉為節曲阿倒紐上下錯尖梢反掬東西掣扶疎入畫畫不成苔痕膩鎖雷神結雨餘細葉浮煙出新枝舊枝宛相齕飛天仙女生緑毛堕地驪龍蛻蒼骨西方薄樹何時分婆娑獨立南江濆寒色虚揺五湖月清隂薄灑諸天雲忽漫星槎過笠澤酣歌樹底流光碧秦亡争笑大夫松蜀破空憐丞相柏信是僧家佛日長貝葉曇花幻今昔昔者火燒闕里檜仲尼寂寞斯文墜今来風擊虞山枝言游慘澹文章廢儒林喬木奈如許野寺孤根聊酹汝五言律詩御製闕里古檜榦聳朱甍外根蟠碧殿阿竒文成左紐元氣挺孤柯瑞與龜龍並傳来嵗月多徘徊㸔手澤不共刼灰磨増宋梅尭臣施景仁邀詠泗州普照王寺古檜来尋淮上寺老檜莫知年刼火已鎔像樛枝寜改煙根拏怪石入節駮蒼苔堅欲問浮波箭空嗟此獨傳朱長文並秀檜盤根幾百齡合榦倚冥冥偃蹇雙虬聳聯翩兩盖青紫鱗霜外躍紺葉雨餘馨左紐憑仙宇何如拱泮亭明吴寬追和朱樂圃蘇學並秀檜講堂前並立霜雪傲𤣥冥此樹今猶在常年不改青雨来添秀色風動散微馨科第能相繼題名下有亭董其昌詠孟檜愛此孟家檜森然見典型沃根洙泗潤含氣嶧山靈閱世消秦篆㕘天鬱魯青方知樗散夀只入列仙經七言律詩増唐劉禹錫謝寺雙檜雙檜蒼然古貌竒含煙吐霧鬱參差晩依禪客當金殿初對将軍映畫旗龍象界中成寳盖鴛鴦瓦上出髙枝長明燈是前朝焰曽照青青年少時原秦韜玉檜樹翠雲交榦痩輪囷嘯雨吟風幾百春深盖屈盤青麈尾老皮張展黒龍鱗唯堆寒色資琴興不放秋聲染俗塵嵗月如波事如夢竟留蒼翠待何人増杜荀鶴題瓦棺寺真上人院矮檜天生仙檜是長材栽檜希逢此最低一似舊山来砌畔幾番凡木與雲齊廻無斜影教僧蹋免有閑枝引鶴棲今日偶題題似著不知題後更誰題宋韓琦得太清小檜植館中仙檜移来近紫壇亭亭将見起毫端纖枝未覺来風韻勁節先知度嵗寒得地最宜儒館種結根湏作棟梁㸔願将軒竹陪蒼翠帯雪開樽助雅歡梅堯臣檜詠文章老重欲追古便作帝宫蒼檜詩青葱玉樹傳楊子盤屈洪桃見左思龍鱗已愛松身直珠實還看柏葉垂秀木艷叢那可擬但将霜雪定堅姿曽鞏庭檜呈蒋穎叔樛枝髙下秀森森曽寄名卿異俗心草舍一時成往事松身千尺見新隂聲清不受笙竽雜氣勁能遺霰雪侵漢節從来縦真賞謝庭蘭玉載芳音元成廷珪陳朝檜千年老檜上青霄三閣花飛不動揺香骨自来盤左紐苦心未忍棄前朝蛟龍並立江雲黑鸞鳯雙啼海霧消想得龜䝉題詠處殿頭風雨正蕭條五言排律増唐吴融三峯府内矮檜擢秀依黄閣移根自碧岑周圍雖合抱直上豈盈尋逺砌行窺頂當庭坐芘隂短堪驚衆目髙已讓他林日轉無長影風廻有細音不容蘿蔦附只耐雪霜侵玉帳籠應匝牙旗倚更禁葉低宜拂席枝褭易抽簪緑㵎支離久朱門揜映深何湏一千丈方有嵗寒心五言絶句増宋蘇軾檜依依古松子鬱鬱緑毛身每長湏成節明年漸庇人明李東陽詠檜雙枝出牆頭亭亭兩髙盖雨色愛青葱天聲聽靈籟七言絶句増唐皮日休重𤣥寺雙矮檜撲地枝徊是翠鈿碧絲籠細不成煙應如天竺難陀寺一對狻猊相枕眠陸龜䝉和重𤣥寺雙矮檜可憐煙刺是青螺如到雙林誤禮多更憶早秋登北固海門蒼翠出晴波宋韓琦小檜小檜新移近曲欄養成隆棟亦非難當軒不是憐蒼翠只要人知耐嵗寒蘇軾塔前古檜當年雙檜是雙童柏樹無言老更恭庭雪到腰埋不死如今化作兩蒼龍王復秀才所居雙檜二首吴王池館遍重城竒草幽花不記名青蓋一歸無覔處只留雙檜待昇平凛然相對敢相欺直榦臨空未要竒根到九泉無曲處世間惟有蟄龍知郭祥正檜花開供蜜葉經霜老柏喬松氣亦降未遇李聃誰愛惜柘塘西院碧油幢元虞集古檜根到深泉石作身踈踈香葉不知春海波不動天風逺千嵗寒蛟作老人詩散句増宋蘇軾團團山上檜歲歲閱榆栁郭祥正嵗老枝葉簡春深香氣新元王惲南山開畫屏髙下蔚萬檜唐張祐髙臨月户秋雲影静入風簷夜雨聲孟郊䕃庾森嶺檜李賀古檜拏雲臂宋歐陽修夜􅋽蒼檜起天風楊萬里老檜如幢翠接連金許古蒼檜四排嚴法界附録樅原樅松葉柏身見爾雅千仭無枝葉與身皆直樅檜樹皆髙丈餘花葉皆同但實稍大而色黄緑肉虚為異耳初甚酸澀經霜乃可食採藥者不收彚考増尸子松柏之鼠不知堂宻之有羙樅西京雜記上林苑樅七株御定佩文齋廣羣芳譜卷七十一
