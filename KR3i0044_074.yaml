body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷七十二木譜杉原杉一名煔爾雅云披煔一名沙一名㯳類松而幹端直大者數圍髙十餘丈文理條直南方人造屋及船多用之葉麤厚微扁附枝生有刺至冬不凋結實如楓有赤白二種赤杉實而多油白杉虚而乾燥有斑紋如雉尾者謂之野雉斑入土不腐燒灰最發火藥彚考増西京雜記太液池西有一池名孤樹池池中有洲洲上煔樹一株大十餘圍望之重重如盖故取為名南方草木狀合浦東二百里有杉一樹漢安帝永初五年春葉落隨風飄入洛陽城其葉大常杉數十倍術士亷盛曰合浦東杉葉也此休徴當出王者帝遣使驗之信然乃以千人伐樹南康記南野巘山有漢太傅陳蕃墓遥望兩杉樹聳柯出嶺垂隂覆谷遊名山志華子岡上紫杉千仭被在崕側金州山西面杉樹偏為白猨所棲竟夕哀鳴行人所惡晁無咎詩注慎思家臨湘豪塘晉陶淡隠此山仙去藏丹於杉今大十餘抱矣避暑録話杉豐腴秀澤似謝安石福建志淳熙二年仙遊縣九座山上古杉木生花其臭如蘭貴州志白雲山在廣順州城東四十里建文帝常遯迹於此上有羅永庵庵外杉二株長可數十尺其一經帝手所摩至杪絶無附枝集藻頌増梁江淹杉頌桐梓舊麗松栝稱竒焉如茲品獨秀青崕羣木斂望雜卉不窺長入烟氛永驂鸞螭五言古詩増唐韋應物郡齋移杉擢榦方數尺幽姿已蒼然結根西山寺来植郡齋前新含野露氣稍静髙窓眠雖為賞心遇豈有巖中縁白居易栽杉勁葉森利㦸孤莖挺端標纔髙四五尺勢若干青霄移栽東窓前愛爾寒不凋病夫卧相對日夕閒蕭蕭昨為山中樹今為簷下條雖然遇賞玩無乃近塵囂猶勝澗谷底埋沒隨衆樵不見欝欝松委質山上苖七言古詩増元范梈古杉行丹陵觀有古杉屹如雙闕當雲門云是鍾君之手植君去此樹餘空邨尾揺翡翠梢八表根結蛇蛟行九原幽邉豈無鬼神䕶深處直形天地恩一方拆裂引穿溜猶是百年燒火痕蒼皮樹裹漸欲合始知草木有道存或云下有丹火仗四時地底皆春温神還復壮此其騐疑是自此無傳喧平生政坐嗜竒古来㸔適值寒冬昬長歌沉思遶其下夜半月髙松露繁飄颻葉縣鳬舄影牢落豐城龍劔魂何當喚起博物者共騎黄鵠凌崐崘傅若金古杉行題陳兵曹所藏李遵道畫靈隠道中二杉圗靈隠道中古杉樹上與雲霧相膠葛李侯一見為寫真霜雪蕭蕭起毫末此杉蒼茫幾百年鬼物扶持人所憐貞心豈容螻蟻蝕老榦或有蛟龍纒山林萬里那得致見者皆驚棟梁器暗壁尋常度雨聲晴窓彷彿生秋氣吾聞大厦衆力持此杉誰能久棄之君見道邉不材木擁腫百圍安所施五言律詩増明吴寬追和朱樂圃蘇學新杉生為松柏類不逐歳寒凋弱質䝉春雨髙情薄紫霄諸生沾賸馥巧匠待長條此日材當大初栽自宋朝七言律詩原宋潘紫巖杉何代移来得許長想渠歴晉復經唐慣於巖畔諳風雪不與人間作棟梁二室七仙同守護千松萬檜自低昂向来諸葛祠前柏此物當為伯仲行五言排律増唐皮日休武丘寺前有古杉一本形狀醜怪圖之不盡况百卉競媚若妬若媢唯此杉死抱竒節髐然闖然不知雨露之可生也風霜之可瘁也乃造化者方外之材乎遂賦三百言以見志種日應逢晉枯来必自隋鰐狂将立處螭鬬未開時卓犖擲槍榦义牙束㦸枝初驚蟉篆活復訝獝狂癡勁質如堯痩貞容學舜黴勢能擒土伯醜可駭山祗虎爪拏巗穏虬身脫浪欹槎頭禿似刷枿觜利於錐突兀方相脛鱗皴夏氏胝根應藏鬼血柯欲漏龍漦抝似神荼怒呀如猰㺄饑朽癰難可吮枯瘇不堪治一炷元雲㧞三尋黑矟竒狼頭㪍窣竪蠆尾掘攣垂目燥那逢爟心開豈中鈹任苔為疥癬從蠧作瘡痍品格齊遼鶴年齡等寳龜将懐縮地力欲負㧞山資未到防風骨初僵負貳屍漆書明古本鐡室抗全師碨礧還無極伶俜又莫持堅應敵駿骨文定寫甝皮蟠屈愁凌刹騰驤恐攫池搶烟寒嶱􅙙披蔦静䙰褷威仰誠難識勾芒恐不知好燒胡律㸔堪共達多期寡色諸芳笑無聲衆籟疑終添八柱位未要一繩維盡日来唯我當春玩更誰他年如入用直搆太平基陸龜䝉和襲羙古杉三十韻衆木盡相遺孤杉獨任竒插天形硉兀當殿勢㩻危恐是夸娥怒教臨嶻嶭衰節穿開耳目根癭坐熊羆世只論榮落人誰問等衰有巔從日上無葉與秋欺虎摶應難動鵰蹲不敢遲戰鋒新缺齾燒岸黑􅀈䵩鬭死龍骸雜争奔鹿角差脂銷洪水腦稜聳梵天眉磔索珊瑚湧森嚴獬豸窺向空分犖指衝浪出鯨鬐楊僕船橦在蚩尤陣纛隳下連金粟固髙用鐡菱披挺若苻堅捶浮於祖納椎崢嶸驚露鶴䟐趣閡雲螭傍宇将支壓撐霄欲抵巇背交蟲臂挶相向鶻拳追格筆差猶立階干卓未麾鬼神應暗畫風雨恐潜移已覺寒松伏偏宜后土疲好邀清嘯傲堪映古茅茨材大應容蝎年深必孕䕫後凋依佛氏初植必僧彌擁腫煩荘辯槎牙費庾詞詠多靈府困捜苦化權卑類既區中寡朋當物外推蟠桃標日域珠草侍仙墀真宰誠求夢春工幸可毉若能嘘嶰竹猶是動華滋七言絶句増宋曾鞏七星杉古杉蒼蒼横斗文其榦十圍隂蔽野應到夜深山月来林色天光迷上下王十朋杉記得先人手自栽森然千尺盡成材翠絲結作思人樹他日兒孫豈忍摧詩散句増宋朱子門前杉徑深屋後杉色竒空山嵗年晩鬱欝凌寒姿梁吴均三秋合浦葉九月洞庭秋唐韓愈夜風一何喧杉檜屢磨颭曺唐雪風更起古杉葉時送歩虚清磬音宋范成大萬杉離立翠雲幢嫋嫋稀聞晚吹香朱子好把穉杉縁徑插待迎凉月㸔清華原唐杜甫杉青延日華増孟郊石根百尺杉皮日休杉葉尖於鏃杜牧杉樹碧為幢宋唐庚杉木翠邉程隋薛道衡杉葉朝飛向京洛宋王阮萬嵗靈杉守百神别録増種植江南宣池歙饒等䖏山廣土肥堪挿杉苖先将地耕過種芝蔴一年来嵗芒種時截嫩苖頭一尺二三寸長先用尖橛一把舂穴勿番轉原土将苖揷下一半築實離四五寸成行排宻則易長每年耘鋤勿雜他木或種榖麦以當耘鋤髙三四尺則不必鋤原種樹書插杉枝用驚蟄前後五日斬新枝鋤開根入枝下泥杵𦂳視天隂則插插了遇雨十分無雨即有分數梓原梓或作杍楸類爾雅云椅梓註云即楸一名木王埤雅云梓木為木王植於林諸木皆内拱造屋有此木則羣材皆不震處處有之木莫良於梓故書以梓材名篇禮以梓人名匠木似桐而葉小花紫陸璣詩䟽謂楸之疏理白色而生子者為梓賈思勰齊民要術以白色有角者為梓似楸有角者名為角楸又名子楸角細如箸長徑尺冬後落葉而角不落其實亦名豫章増齊民要術黄色無子者為栁楸世人見其木黄呼為荆黄楸本草李時珍曰梓木有三種木理白者為梓赤者為楸梓梓之羙文者為椅原梓以白皮者入藥味苦寒無毒治熱毒去三蟲療目疾吐逆反胃及一切温病彚考原書梓材若作梓材既勤樸斲惟其塗丹艧増詩鄘風樹之榛栗椅桐梓漆爰伐琴瑟𫝊椅梓屬也原小雅維桑與梓必恭敬止増齊書髙逸傳徐伯珍宅南九里有髙山班固謂之九岩山伯珍移居之門前生梓樹一年便合抱論者以為隠徳之感山海經虖勺之山其上多梓柟堇理之山其上多美梓雞山其上多羙梓尚書大傳伯禽康叔見周公三見而三笞商子曰南山之陽有木名橋北山之隂有木名梓二子盍往觀焉二子往觀見橋木髙而仰梓木晉而俯反以告商子商子曰橋者父道也梓者子道也二子再見周公入門而趨登堂而跪周公拂其首勞而食之尚書逸篇南社惟梓竹書文王之妃曰太似夢商庭生棘太子發植梓樹於闕間化為松柏棫柞以告文王文王幣率羣臣與發並拜吉夢原尸子荆有長松文梓増禮斗威儀君乗火而王其政和平梓為長生華嶠後漢書應華仲遷東平相賞罰必信吏不敢犯有梓樹生於㕔事室上事後母至孝衆以為孝感之應拾遺記始皇起雲明臺窮四方之珍木東得岏雲之梓北得隂坂文梓南康記梓潭昔有梓樹巨圍葉廣丈餘垂柯數畝吴王伐樹作船使童男女挽之船自飛下𤣥中記秦文公造長安宫面四百里南至終南山山有梓樹大數百圍䕃宫中公惡而伐之連日不剋輙大風雨夜有鬼問梓樹樹曰豈奈吾何鬼曰若使三百人披頭以絲繞樹豈不敗汝樹黙然不應明日人言於秦王王依此言伐之中有青牛逐之入澧水述異記梓樹之精化為青羊生百年而紅五百年而黄又五百年而色蒼又五百年而色白雜五行書舍西種梓楸各五根子孫孝順口舌消滅也雲笈七籖果州開元觀接郡城選立觀額猶闕大殿州司遣工匠及道流採買林木臨行夢有人云朱鳯潭中有木可以足用如此者三一匠曰吾於朱鳯山下江中尋之莫有商筏已到来否即往山下尋求潭水澄澈忽見潭底有木因使善沉者鈎求得梓木千叚構成三尊殿鐘樓經閣山門廊宇咸得周足原海虞王之稷通判貴陽運木渡黄河其最大梓木二忽䧟泥中千人不可出為文祭之乃見夢曰吾三千年為羣木領袖今乃逐逐隨其後終當别去必欲相煩應天子命非巨舟載不可如其言拽而登舟舉纜一呼如躍舟行甚疾絶無阻滯别録増漢武故事衛子夫入宫嵗餘不得見因涕泣請出上曰吾昨夢子夫中庭生梓樹數株豈非天意乎是日幸之有娠種藝齊民要術種梓法秋耕地令熟秋末冬初梓角熟時摘取曝乾打取子耕地作壟漫散即再勞之明年春生有草枝令去勿使荒沒後年正月間劚移之方歩兩歩一樹即無子可於大樹四面掘坑取栽移之一方兩歩一根兩畝一行一行百二十株五行合六百株十年後一樹千錢在外車板盤合樂器所在任用原春月斷其根瘞於土遂能發條取以分種製用博物志桐梓二樹花葉飼猪能肥大且易養附録鼠梓原鼠梓名楰詩所謂南山有楰是也今人謂之苦楸江東人謂之虎梓爾雅云楰䑕梓注云楸屬也今江東有虎梓鼠李亦名鼠梓别是一種漆原漆說文云漆本作桼木汁可以䰍物其字象水滴下之形似榎而大樹髙二三丈餘身如柿皮白葉似椿花似槐子似牛李子木心黄生漢中山谷梁益陜襄歙州皆有金州者最善廣州者性急易燥辛温有小毒乾漆去積滯消淤血殺三蟲通經脉李時珍曰漆性毒而殺蟲降而行血主證雖煩功只在二者彚考増詩鄘風椅桐梓漆唐風山有漆周禮夏官河南曰豫州其利林漆絲枲史記貨殖列傳陳夏千畝漆其人與千户侯等原後漢書樊宏傳宏父重甞欲作器物先種梓漆時人嗤之然積以嵗月皆得其用向之笑者咸求假焉魏志方技傳樊城樊阿從華佗學求可服食益於人者佗授以漆葉青黏散漆葉屑一升青黏屑十四兩以是為率言久服去三蟲利五藏輕體使人頭不白阿從其言夀百餘嵗漆葉處所而有青黏生於豐沛彭城及朝歌云増山海經號山其木多漆㯶英鞮之山上多漆木原荘子桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用也増淮南子蟹見桼而不乾西京雜記上林苑蜀漆樹十株拾遺記始皇起雲明臺窮四方之珍木北得㝠阜乾漆原本草葛洪抱朴子云漆葉青黏凡藪之草也樊阿服之得夀二百嵗而耳目聰明猶能持鍼治病此近代實事史所記注者也洪說猶近於理有言阿年五百嵗者誤也或云青黏即葳㽔集藻七言律詩増宋蕭文山漆樹天以晶華累爾形千夫斂鍔可曽停世間有器䝉鮮澤林下無辜受割刑斫壊孫枝難老大摧殘老幹易凋零退思禹貢周征日未必如春稅不征五言絶句増唐王維漆園古人非傲吏自闕經世務偶寄一微官婆娑數株樹裴廸漆園好閒早成性果此諧宿諾今日漆園遊還同荘叟樂原宋朱子漆園舊聞南華仙作吏漆園裏應悟見割愛嗒然空隠几詩散句増唐杜甫近聞西枝村有谷杉漆稠别録増後漢書雷義傳義舉茂才讓於陳重刺史不聽遂佯狂披髮走不應命鄉里為之語曰膠漆自謂堅不如雷與陳原種植春分前移栽易成一云臘月種製用六月中以剛斧斫皮開以竹管承之汁滴管中則成漆先取其液液滿則樹菑翳一云取於霜降後者更良取時湏荏油㸃破故淳者難得可重重别拭之上等清漆色黑如瑿若鐡石者好黄嫩若蜂窠者不佳試驗稀者以物蘸起細而不斷斷而急收更塗於乾竹上䕃之速乾者佳世重金漆出金州也人多以桐油雜入試訣云微扇光如鏡懸絲急似鈎撼成琥珀色打著有浮漚今廣浙中出一種取漆物黄澤如金即唐書所謂黄漆也入藥當用黒漆入藥用乾漆筒中自然乾者状如蜂房孔孔隔者為佳湏搗碎炒熟不爾損腸胃亦有燒存性者生漆毒烈人以雞子和服之去蟲猶自嚙腸胃者毒發飲鐡漿煎黄櫨汁甘豆湯蠏並可制之因漆氣成瘡腫者杉木湯紫蘇湯漆姑草湯蠏湯浴之良又嚼蜀椒塗口鼻可避漆氣豫樟増本草豫章乃二木名一類二種也原豫章二木生七年乃可辨見淮南子豫一名烏樟一名枕樟又名釣樟通志云釣樟亦樟之類即爾雅所謂棆無疵是也又本草云釣樟即樟之小者莖葉寘門上辟天行樹髙丈餘小葉似柟而尖長背有黄赤茸毛四時不凋夏開細花結小子肌理細膩有紋故名樟可雕刻氣甚芬烈大者數抱西南處處山谷有之可為居室器物又可製船易長根側分小木種之老則出火種勿近人家辛温無毒霍亂及乾霍亂湏吐者樟木屑煎濃汁吐之甚良此物辛烈香竄能去濕氣辟邪惡宿食不消常吐酸臭水酒煮服煎湯浴脚疥癬瘋癢作履除脚氣彚考増晉書王廙傳廙為荆州刺史奏中興賦上疏曰臣郡有枯樟更生宋書符瑞志愍帝建興四年豫章有大樟樹大三十五圍枯死積久永嘉中忽更榮茂景純言是元帝中興之應陳書髙祖紀承聖中議欲營太極殿獨闕一柱至是有樟木大十八圍長四丈五尺流泊陶家後渚監軍鄒子度以聞山海經蛇山其木豫樟玉山其木多豫樟尸子土積則生楩柟豫樟神異經東方荒外有豫樟焉此樹主九州其髙千尺圍百尺本上三百丈本如有條枝敷張如帳枝主一州南北並列面向西南有九力士操斧伐之以占九州吉㐫荆州記山陽縣豫樟木可伐作鼓顙陳留風土傳尉氏章樹生酸棗拾遺記岱輿山北有沙棠豫章之木長千尋細枝為舟猶長十丈述異記漢武帝寳鼎二年立豫章宫於昆明池中作豫章木殿豫章記新淦縣封谿有聶友所用樟木殘柯者遂生為樹今猶存其木合抱始倒植之今枝條皆垂下水經注豫章城之南門曰松陽門門内有樟樹髙七丈五尺大二十五圍枝葉扶踈垂䕃數畝應劭漢官儀曰豫章郡樹生庭中故以名郡矣此樹嘗中枯逮晉永嘉中一旦更茂豐蔚如初咸以中宗之襌也禮斗威儀曰君政訟平豫章常為生大興中元皇果興大業於南故郭景純南郊賦云弊樟擢秀於祖邑是也以宣王祖為豫章故也栝甌勝述栝州白雲山下有麗陽廟其神即以麗陽作姓寝殿二像刻自老樟靈根千年不榮不槁而柯萌時出殿外閩部疏建寜都司後園多大樟皆十許人合抱一樹中空可容五六人坐槎枒下垂儼如巖洞不知為樹也原花史建昌邑人李公懋入朝髙宗問樟公安否李奏枝葉扶疎嵗寒獨秀黄庭堅有記集藻記増宋祝穆南溪樟隠記余卜居南溪上流溪之漘有喬木二盖古之豫章而今俗以樟名者也其夀當三百餘載而大且二十圍團欒偃蹇庇及數畝老根盤踞髙突地面如巨石礧砢余因募工畚土厚培其根使平若一臺可坐數客久焉根入土深得所滋養枝葉益敷暢亭午日不穿漏夏五六月清䕃覆地暑氣不入凉颸時来方春稚緑競秀靄若雲屯及𤣥㝠凍沍此獨挺秀余愛護封殖每為賦甘棠之詩余聞昔商山之老戲於橘中者謂之橘隠後世效山隂之種竹者謂之竹隠慕彭澤之採菊者謂之菊隠擬孤山之詠梅者謂之梅隠余愛此古樟遂名吾廬以南溪樟隠暇日披閱書箧得晦庵朱子所書四大字適契余所命名若有天相亟摹勒掲於㕔之楣即其右闢一小室取朱子所書嵗寒二大字為匾以表古樟之髙致室僅容膝處勢最髙平挹翠嵐下臨緑浸隔㟁擔簦負笈之行人中流披蓑鼓枻之漁父皆可坐見於几席之上市㕓雖近而一塵不侵余盖於此讀書以求聖賢為已之學涵養體察私淑吾身庶幾不負朱子教育之意且日有餘力則編輯古人嘉言善行類成巨帙窮年矻矻皆手自抄録樂而忘疲今一二書行於世者行有揚子雲不以一醬瓿之可為坐久神倦起而欠伸則信手拈取前輩詩文一二帙緩誦微吟戰睡魔而却之此則樟隠之成趣也其西則築小樓四楹與㕔對峙又取南軒張子所書藏書閣三大字掲匾樓上雖余無資聚書不能多視鄴侯插架特泰山之毫芒然余性健忘不可無書舊所讀不獲盡記必藉檢閱積久抽取簡帙散亂則必决其甲乙使如舊序剔去蠧魚燥以風日盖兹樓也檢書則登整書則登曝書則登當此之時窓櫺四敞不妨眺望以舒暢心目至於秋霄爽豁月檻澄鮮朔風怒號雪絮飛舞乗興一登便覺水晶宫闕瓊樓玉宇去人不逺此又樟隠之勝概也噫余晨興而啟吾扉出入而渉吾庭仰而瞻吾巨匾銀鈎鐡畫動有法度則思其人儼若先儒之臨其上顧而見吾古樟龍身虬柯昂霄聳壑則愛其木凛然嵗寒之友在吾側是則吾廬雖甚湫隘卑陋而雄麗偉特之觀固不在於輪奐之美也頌増梁江淹豫章頌伊南有材匪桂匪椒下貫金壤上籠赤霄盤薄廣結捎瑟曽喬七年乃識非曰終朝賦増唐敬括豫章賦東南一方淮海維揚爰有喬木是名豫章根坎窞彗天綱欝四氣煥三光矗縮雲聳離披翼張一擢而其秀頴發七年而其材莫當懿夫倚荆衡連楚越廻合湘沅之浦芬敷吴㑹之闕㸃彭蠡而烟垂汨滄浪而吹發清輝艶艶朝灑陽臺之雲翠影亭亭夕皓巫山之月爾其孤榦直指交莖亂傾紺葉烟緑朱華日明掩蓂靈之光價奪若木之芳榮卉不暇植蔓不及縈總此衆羙疇之與京其下則啼飛猱逐暴武突兀鹿麌爪牙鉤拏盤遊其下盖難勝數其上則陸鴻漸谷鶯遷孔翠曳曵鸞鵠翩翩翼翳日聲聞天巢集其巔動盈百千嗟乎不囷不輪有典有則闕四字其材也直空懐寳以自棄諒斤斧之未識日者龍宫是搆鵲觀云修罄山林之木應榱桷之求何獨不見千金而留為媒紹也闕為出處也幽為爾不任大為賢而致尤今叢木之所忽吾亦為之心憂借如将趙括於上軍秩長卿於下令良驥為鹽車所伏谷松為山苖所映以曼倩而等侏儒尚俳優而輕雅正雖物情之共爾固君子之攸病向若廓君之林池充君之苑囿膏澤既沐鴻休亦覆門栁不可齊華庭梧不能獨秀已矣夫用之則哲抑之則沉隨取捨之攸措何棟梁之所任梓匠之瞻望靡及江潭之嵗月空深誰當徙植天池畔終兾成君桃李隂文散句増梁劉勰新論夫樟木盤根鈎枝癭節蠧皮輪箘擁腫則衆眼不顧匠者採焉製為殿堂塗以丹漆畫為黼藻則百辟卿士莫不頋盻仰視木性猶是也而昔賤今貴者良工為之容也豫樟之植百尺而蒔柯五言古詩増唐白居易寓意詩豫章生深山七年而後知挺髙二百尺本末皆十圍天子建明堂此材獨中規匠人執斤墨采度将有期孟冬草木枯烈火燎山陂疾風吹猛焰從根燒到枝養材三十年方成棟梁姿一朝為灰燼柯葉無孑遺地雖生爾材天不與爾時不如糞土英猶有人掇之已矣勿重陳重陳令人悲不悲焚燒苦但悲采用遲七言絶句増宋祝穆豫章豫章偃蹇兩蒼龍雪榦寜湏匠石逢借重嵗寒雙大字絶勝松拜大夫封詩散句増唐杜甫豫章夹日月嵗久空深根豫章深入地滄海濶無涯元稹千尋豫章幹九萬大鵬歇原杜甫豫章翻風白日動鯨魚跋浪滄溟開増朱慶餘館依髙嶺分樟葉附録樟腦原樟腦樟樹脂也似龍腦色白如雪出韶州漳州辛熱無毒通闗竅利滯氣治中帶邪血寒濕脚氣霍亂心腹痛疥癬風瘙齲齒殺蟲辟蠧别録原修治煎樟腦法新樟木切片井水浸三日三夜入鍋煎之栁木頻絞待汁減半栁上有白霜濾去滓傾汁入新瓦盆經宿自然結成塊鍊樟腦法用銅盆以陳壁土為粉糝之糁樟腦一重又糝壁土如此四五重以薄荷安土上再用一盆覆之黄泥封固火上欵欵炙之湏以意斟酌不可太過不及勿令出氣候冷取出則腦皆升於上盆如此兩三次可充片腦凡用每一兩以二椀合住濕紙糊口文武火㶸之半時許冷定取出用製用燒烟熏衣箧蓆簟能辟壁虱蟲蛀柟原柟生南方故又作楠黔蜀諸山尤多其樹童童若幢盖枝葉森秀不相碍若相避然又名交讓木文潞公所謂移植虞芮者以此本草李時珍曰葉似豫章大如牛耳一頭尖經嵗不凋新陳相換花黄赤色實似丁香色青不可食榦甚端偉髙者十餘丈麤者數十圍氣甚芬芳紋理細緻性堅耐居水中今江南造船皆用之堪為梁棟製器甚佳盖良材也子赤者材堅子白者材脆年深向陽者結成旋紋為鬭柏楠増格古要論骰一作鬭柏楠木出西蜀馬瑚府紋理縦横不直其中有山水人物等花者價髙亦難得又謂之骰子柏楠彚考増史記貨殖傳江南出柟梓薑桂宋史五行志政和四年六月沅陵縣江漲流出楠木二十七可為明堂梁柱山海經揺碧山其木多梓柟西京雜記上林苑柟四株原述異記黄金山有柟樹一年東邉榮西邉枯後年西邊榮東邉枯年年如此張華云交讓樹也增酉陽雜俎武陵郡記白雉山有木名交讓衆木敷榮後方萌芽亦更嵗迭榮也潜確類書真多市有楠木其竅若七星之状李八百妺躡其竅而上仙後立星楠觀原凡楠木最巨者商人採之鑿字號編筏而下既至蕪湖每年清江主事必来選擇買供運舟之用南部又来爭商人甚以為苦剔巨者沈江干俟其去沒水取之常失去一二萬歴癸酉一舟飄沒中有老人素持齋守信義方拍水若有一人扶之至一潭口榜曰木龍府殿上人冕旒甚偉面有黒痕宛然所鑿字號也傳呼曰曽相識否老人頓首曰榜已明矣惟大王死生之又傳呼曰汝善人數尚可延速歸令一人負之而出俄頃抵㟁則身在大木上衣服皆不濡既登㟁一無所見増四州志楠溪在酉陽宣撫司西二百里其溪清淺傍多柟木集藻記増宋蒲咸臨新繁古楠木記周公賦鴟鴞之年大風㧞木乃命邦人起而築之最為異事然大風拔木天也起而築之人也大木所偃因人而起之當無足怪者孔子定書從而記之示訓戒也元祐八年繁江隆道觀玉帝殿庭有古楠二章分列左右如輔如弼一夕風雷大作偃其左偏者邑宰命匠石取之方執柯伐其枝忽聞軋軋聲乃稍稍起立匠石皆在上如猿猱然觀者驚駭邑宰降階俯伏謝罪君子以是知天道之不可誣也較諸金縢兹尤為異盖以不待人力而自起也今五十有一年矣縉紳先生尚能言之若不鑱諸石以永其傳則無以訓戒後代余被命尉兹邑道士詹次淵請書其事因從春秋記異之法月而日之以警不能寅畏上帝者原陸游成都犀浦國寜觀古楠記予在成都甞以事至沉犀過國寜觀有古楠四皆千嵗木也枝擾雲漢聲挟風雨根入地不知幾百尺而隂之所芘車且百輛正晝日不穿漏夏五六月暑氣不至凛如九秋成都固多夀木然莫與四楠比者予盖愛而不能去者彌日有石刻立廡下曰是仙人蘧君手植余歎曰神仙至人手之所觸氣之所呵羸疾者起盲瞶者愈榮茂枯朽而金玉瓦石不難况其親所培植哉久而不槁不死固宜欲為作詩文㑹多事不果甞以語道人蘧昌老真叟以為恨予既去蜀三年而昌老萬里以書屬予曰國寜之楠幾伐以營繕郡人力全之僅乃得免懼卒不免也君為我終昔意予發書且歎且喜夫勿翦憩棠恭敬桑梓愛其人及其木自古已然姑以蜀事言之則唐節度取孔明祠柏一小枝為手版書於圖志今見非詆蒋堂守成都有美政止以築銅壺閣伐江瀆廟一木坐謡言罷亦書國史且王建孟知祥父子専有西南窮土木之侈沉犀近在國城數十里間而四楠不為當時所取彼猶有畏而不敢者况今聖主以恭儉化天下有夏禹卑宫室漢文罷露臺之風専閫方面皆重徳偉人豈其殘滅千嵗遺跡侈大棟宇為王孟之所難哉意者情出於吏胥梓匠欺罔專恣以自為功而已使有以吾文告之者讀未終篇禁令下矣然則其可不書贊増宋宋祁蜀楠賛在土所宜亭擢而上枝枝相避葉葉相讓繁隂可庇羙榦斯仰賦増宋宗澤古柟賦有序巴城之南山有寺曰南龕寺之外有大木曰楠其生甚久唐刺史嚴武御史史俊皆有詩謌刻於巖腹嚴曰臨溪插石盤老根史曰結根幽壑不知嵗自時迄今又數百年邦人謂之古楠宜矣僕到官之三月兩至巖下讀史嚴之清什感是楠之老於巖谷而可憐也因慨然操筆而賦之曰楠之生兮層崕之中巔詢之人兮不知幾何年包堅根而下蟠兮貫頑石而徹沉淵竦修榦以上淩兮並孤岑而參蒼天大枝崛起兮虎豹拏攫小枝回屈兮蛟螭蜿蜒黄葉敷隂白晝沉沉輪廣十畝盖窮百尋衆鳥托宿鄧林非深諸卉仰芘荆雲非隂雨濯瑩兮一塵不染風振響兮海潮同音露下兮鶴唳月明兮猿吟擅此清致亘古迄今有客戾止惻然動中吁嗟斯木之異兮有不遇之窮爾胡不生於泰山之側秦帝東封㑹風雨之是避豈以五大夫之號而封松爾胡不生於周成之宫禁林九重顧親賢之是戲豈以封國之瑞而翦桐爾胡不生於分陕之域舍彼召公未必以甘棠之蔽芾流詠於國風抑亦豈無工師之良識爾材之非常用之為棟梁則足以建九重之明堂用之為舟楫則足以濟巨川之汪洋用為宗廟社稷之器則足以㕘鼎鼐交神明薦至徳之馨香夫何黙黙而甘老於窮山寂寞之鄊徘徊其下恍若夢兮心駭而目眙蒼髯偉人瞋目視曰噫謂子知我乃不吾知吾生於斯長於斯始於毫末至於十圍雨露不吾遺霜雪不吾欺春兮秋兮吾不知代謝之有期漢兮唐兮吾不知興亡之幾時柯葉顔色曽無改移過者千百睥睨焉不以吾為樸􅈪輩待之斧斤之害亦幸不罹吾受天地造化之恩孰有等夷子之不智而乃我悲使子處此復將奚為吾非不知强自取藏器以待時而動老當益壮自任以天下之重儻匠人斲而小之能不浼然而悔痛乃所願比不材之樗同乎無所用若曰不遇自有物主之非吾所能為姑亦付之一夢客聞之釋然悟曰達矣夫斯言可書紳而詠誦原明王煜楠樹賦繄楠之生也含津𤣥㝠托根崐崙氣之所凑殷殷屯屯羌濆浡之歘發觸巨石而塊分得貞剛以為性匪蓊茸之為倫迨夫雨以膏之雷以震之風以撓之霜以嚴之扶疎矗特輪輪囷囷虯枝上聳迥無旁紛凝若木之晶魄翕淑氣之芳芬膚理潤玉體榦堅金繄楠之茂也勢㕘岱華光拍滄溟上懸三光下蟠九地青鸞白鵠朝夕是憩夫豈鷦鷯之敢寄也貞松巨柏戢戢相比夫豈蔓草之敢麗也荘生索之而駭眙匠石過焉而睥睨顧神物之偉竒斧欲揮而終忌是宜棟梁乎清廟為九垓之大庇繄楠之夀也瀋液内盎姿華外妍顓頊不肅祝融不然枝拂常春之霧根漬不涸之泉元龜蟠其下卿雲覆其巔豐隆為之呵護王孫怵而不前望之蒼蒼然叩之砰砰然騰神光兮夜曙播蕃隂兮晝帡老𥅆曽息䕃於髫齔王母於兹表道兮屢焉笑蟠桃之難熟輕銅狄之千年諒𤣥精之丕搆與日月而周旋文散句増晉左思蜀都賦楩柟幽藹於谷底闕交讓所植吴都賦楠榴之木相思之樹五言古詩原唐杜甫枯楠楩楠枯崢嶸鄊黨皆莫記不知幾百歳慘慘無生意上枝摩皇天下根蟠厚地巨圍雷霆坼萬孔蟲蟻萃凍雨落流膠衝風奪佳氣白鵠遂不来天雞為愁思猶含棟梁具無復霄漢志良工古昔少識者出涕淚種榆水中央成長何容易截承金露盤裊裊不自畏七言古詩原唐杜甫楠樹為風雨所㧞歎倚江柟樹草堂前故老相傳二百年誅茅卜居總為此五月髣髴聞寒蝉東南飄風動地至江翻石走流雲氣榦排雷雨猶力争根斷泉源豈天意滄波老樹性所愛浦上童童一青盖野客頻留懼雪霜行人不過聽竽籟虎倒龍顛委榛棘淚痕血㸃垂胸臆我有新詩何處吟草堂自此無顔色嚴武題巴州光福寺楠木楚江長流對楚寺楠木幽生赤崕背臨谿插石盤老根苔色青蒼山雨痕髙枝閙葉鳥不度半掩白雲朝與暮香殿蕭條轉宻隂花龕滴瀝垂清露聞道偏多越水頭烟生霽斂使人愁月明忽憶湘川夜猿呌還思鄂渚秋㸔君幽靄幾千丈寂寞窮山今遇賞亦知鐘梵報黄昏猶卧禪牀戀竒響史俊題巴州光福寺楠木近郭城南山寺深亭亭竒樹出禪林結根幽壑不知嵗聳榦摩天凡幾尋翠色晩将嵐氣合月光時有夜猨吟經行緑葉望成盖宴坐黄花長滿襟此木甞聞生豫章今朝獨秀在巴鄊凌霜不肯讓松柏作宇由来稱棟梁會待良工時一盼應歸法水作慈航五言律詩原唐杜甫髙柟柟樹色㝠㝠江邉一盖青近根開藥圃接葉製茅庭落景隂猶合微風韻可聽尋常絶醉困卧此片時醒七言律詩増宋歐陽修至喜堂新開北軒手植柟木兩株走筆呈元珍表臣為憐碧砌宜佳樹自劚蒼苔選緑叢不向芳菲趁開落直湏霜雪見青葱披條泫轉清晨露響葉蕭騷半夜風時掃濃隂北窓下一枰閒且伴衰翁七言絶句増宋范成大寄題郫縣蘧仙觀四楠沉犀浦上舊仙蹤老木長春翠埽空敢請丹光来萬里為扶雲嶠駕飛鴻詩散句増宋宋祁童童挺十尋一蓋摩空緑孫覿枯柟鬱峥嶸老榦空自表文同佛現寳幢經幾刦天開雲幄待何人唐薛能夜聲柟樹逺石楠増南方記石楠樹野生二月花實如燕卵七八月熟出九真本草石楠一名楓藥蘇頌曰南北有之生於石上株有極髙大者江湖間出者葉如枇杷上有小刺凌冬不凋春生白花成簇秋結細紅實關隴間出者葉似莾草青黄色皆有紫㸃雨多則併生長及二三寸根横細紫色無花實葉至茂宻南北人多移植亭院間隂翳可愛不透日氣冦宗奭曰石楠葉似枇杷葉之小者而背無毛光而不皺正二月間開花冬有二葉為花苞苞既開中有十五餘花大小如椿花甚細碎每一苞約弹許大成一毬一花六葉一朶有七八毬淡白緑色葉末微淡赤色花既開蕋滿花但見蕊不見花花纔罷去年緑葉盡脫落漸生新葉彚考増述異記曲阜古城有顔回墓上石楠樹二株可三四十圍土人云顔子手植太真外傳上發馬嵬行至扶風道道旁有花寺畔見石楠樹團圞愛玩之因呼為端正樹酉陽雜俎衡山石楠花有紫碧白三色花大如牡丹亦有無花者齊雲山志西山有石罅方廣若門盖天造以通逰者門首有石楠一株其大數圍集藻五言古詩増唐孟郊和宣州錢判官使院㕔前石楠樹太朴既一剖衆材争萬殊懿兹南海華来與北壤俱生長如自惜雪霜無凋渝籠籠抱靈秀簇簇抽芳膚寒日吐丹艶赬子流細珠鴛鴦花數重翡翠葉四鋪雨洗新妝色一枝如一姝聳異敷庭際傾妍来坐隅散彩飾几案餘輝盈盤盂髙意因造化常情逐榮枯主公方寸中陶殖在湏臾養此奉君子賞覿日為娛始覺石楠詠價傾賦兩都棠頌庶可比桂詞難以踰因謝丘墟木空採落泥塗時来聞佳姿道去卧枯株争芳無由縁受氣如欝紆抽肝在郢匠歎息何踟蹰五言律詩増宋朱長文石楠昔年曽賞玩移自碧山遥古榦摩文石寒枝熨翠綃雖殊楩梓用終免雪霜凋来者宜珍護毋令困採樵明吴寬追和朱樂圃蘇學石楠泮水根常溉臨池路不遥顧瞻依曲檻愛護障輕綃别種為交讓終年亦後凋有材非㸑用斤斧免山樵七言律詩増唐白居易石楠樹可憐顔色好隂凉葉翦紅牋花撲霜傘盖低垂金翡翠薫籠亂搭繡衣裳春芽細炷千燈焰夏蕊濃薫百和香見說上林無此樹只教桃栁占年芳胡汾石楠樹本自清溪石上生移栽此處稱閒情青雲事盡識珍木白屋人多喚俗名重布緑隂滋蘚色深藏好鳥引雛聲余今一日千廻㸔每度㸔来眼益明七言絶句増唐王建㸔石楠花留得行人望却歸雨中闕一字是石楠枝明朝獨上銅臺路客見花開少許時權徳輿石楠樹石楠紅葉透簾春憶得妝成下錦茵試折一枝含萬恨分明說向夢中人温庭筠重題端正樹路傍佳樹碧雲愁曽侍金輿幸驛樓草木榮枯似人事緑隂寂寞漢陵秋趙嘏詠端正樹一樹繁隂先著名異花竒葉儼天成馬嵬此去無多地祗合楊妃墓上生詩散句増唐李白千千石楠樹萬萬女貞林張籍江臯三月時花發石楠枝司空圖客處偷閒未是閒石楠雖好懶頻攀李白風掃石楠花宋蘓軾孤生有石楠元龔璛紅樹石楠春御定佩文齋廣羣芳譜卷七十二
