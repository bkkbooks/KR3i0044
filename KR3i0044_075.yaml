body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷七十三木譜桐增爾雅翼桐有青赤白三種而青桐又有有實無實之辨原梧桐一名青桐埤雅今以梧桐皮青號曰青桐一名櫬爾雅櫬梧注今梧桐皮青如翠葉缺如花姸雅華淨賞心悅目人家齋閣多種之其木無節直生理細而性緊四月開嫩黃小花如棗花墜下如醭五六月結子莢長三寸許五片合成老則開裂如箕名曰櫜鄂子綴其上多者五六少者二三大如黃豆雲南者更大皮皺淡黃色仁肥嫩可生噉亦可炒食遁甲書云梧桐可知月正閏嵗生十二葉一邊六葉從下數一葉為一月有閏則十三葉視葉小處則知閏何月立秋之日如某時立秋至期一葉先墜故云梧桐一葉落天下盡知秋白桐一名華桐一名泡桐葉三杈大徑尺最易生長皮色粗白木輕虛不生蟲蛀作器物屋柱甚良二月開花如牽牛花而色白華而不實賈協云桐葉華而不實者曰白桐無子冬結似子者乃明年華房爾雅云榮桐木即此華而不實故曰榮桐木也木之榮者多矣獨桐名榮者桐以三月華蔡雍月令曰桐始華桐木之後華者也稚之故曰始周書時訓曰清明之日桐始華桐不華嵗有大寒蓋不華則陽氣微陽氣微則寒可知也造琴瑟以華桐生山間者為樂器則鳴孫枝為琴則音清增桐譜一種文理粗而體性慢葉圓大而尖長光滑而毳稚者三角成條之時葉皆茸毳而嫩皮體清白喜生朝陽之地花先葉開白色心赤內凝紅其實穟先長而大可圍三四寸內為兩房房中有肉肉上細白而黑點者其子也謂之白花桐一種文理細而體性緊葉三角而圓大色青多毳而不光滑葉硬文微赤花亦先葉而開皆紫色而作穟類紫藤花謂之紫花桐二桐皮色皆一類但花葉小異體性緊慢不同彚考增書禹貢嶧陽孤桐傳孤特也嶧山之陽特生桐中琴瑟原詩鄘風椅桐梓漆爰伐琴瑟大雅梧桐生矣于彼朝陽注梧桐不生山岡太平而後生朝陽增禮記月令季春之月桐始華原禮記雜記杵以梧孟子拱把之桐梓人茍欲生之皆知所以養之者增史記晉世家成王與叔虞戲削桐葉為圭以與叔虞曰以此封若史佚因請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言言則史書之禮成之樂歌之于是遂封叔虞于唐後漢書蔡雍傳雍在吳吳人有燒桐以㸑者雍聞火裂之聲知其良木因請而裁為琴果有美音而其尾猶焦故時人名曰焦尾琴焉西南夷傳哀牢夷有梧桐木華績以為布晉書張華傳吳郡臨平岸崩出一石鼓槌之無聲帝以問華華曰可取蜀中桐材刻為魚形扣之則鳴矣于是如其言果聲聞數里原晉書苻堅載記堅以薑宇為前將軍與苻琳率衆三萬擊慕容沖于灞上為沖所敗沖遂據阿房城初長安謠曰鳳凰鳳凰止阿房堅以鳳凰非梧桐不棲非竹實不食乃植桐竹數十萬株于阿房城以待之沖小字鳳凰至是入止阿房城焉增魏書彭城王協傳高祖與侍臣升金墉城顧見堂後梧桐竹曰鳳凰非梧桐不棲非竹實不食今梧桐竹並茂詎能降鳳乎協對曰鳯凰應德而來豈竹梧桐能降高祖曰何以言之協曰昔在虞舜鳳凰來儀周之興也鸑鷟鳴于岐山未聞降桐食竹高祖笑曰朕亦未望降之也後宴侍臣於清徽堂日宴移于流化池芳林之下高祖仰觀桐葉之茂曰其桐其椅其實離離豈弟君子莫不令儀今林下諸賢足敷歌詠遂令黃門侍郎崔光讀暮春羣臣應詔詩北史李元忠傳元忠甚工彈彈桐葉常出一孔擲棗栗而彈之十中八九原唐書李泌傳德宗在奉天召泌赴行在時李懷光叛嵗有蝗旱議者欲赦懷光帝博問羣臣泌破一桐葉附使以進曰陛下與懷光君臣之分不可復合如此葉矣繇是不赦增宋史五行志治平四年六月汀州進桐木板二有文曰天下太平山海經虢山其下多桐椐穆天子傳是日天子鼓道其下而鳴乃樹之桐注桐亦響木管子五沃之土其木宜桐原莊子空門來風桐乳致巢增列子人有枯梧樹者其鄰父言枯梧之樹不祥其鄰人遽而伐之鄰人父請以為薪其人乃不悅曰鄰人之父徒欲為薪而教吾伐之也與我鄰若此其險豈可哉原淮南子梧桐斷角馬氂截玉增淮南子桐木成雲注取十石甕滿以水置桐其中蓋之三四日氣如雲作智者有所不及故桐不可以為弩以巨斧擊桐薪不待利日良時而後破之加斧桐薪之上而無人力之奉雖順招搖刑德而不能破無其勢也新書懸弧之禮東方之弧以梧梧者東方之草春木也風俗通梧桐生于嶧陽山巖石之上采東南孫枝為琴聲清雅伏虔古今注昭帝丹鳳二年馮翊人獻桐枝長六尺九枚枚一葉也楚辭注梧桐春榮陽木也新論神農黃帝削桐為琴論衡李子長為政欲知囚情刻桐象囚形鑿地為坎臥木囚其中囚若正木囚不動若有冤木囚動出蓋人之精誠著木人也原易緯桐枝濡毳而又空中難成易傷須成氣而後華禮斗威儀君乘火而王其政平梧桐為常生瑞應圖王者任用賢良則梧桐生于東廂遁甲書梧桐不生則九州異增西京雜記上林苑桐三椅桐梧桐荆桐五柞宫西有青梧觀觀前有三梧桐樹晉宫閣名華林園青白桐三株廣志驃國有白桐木其葉有白毳取其毳淹漬緝織以為布華陽國志益州有梧桐木其華采如絲人績以為布名曰華布南越志青桐華頗似木綿而輝薰過之安成記府君諱保如令樹梧于苞兩邊柯葉菴藹炎暑為之清涼百姓列宅其間鄒山記鄒山古之嶧陽魯穆公改為鄒今鄒山嶧陽猶多桐樹齊春秋豫章王于郊起山列種桐竹號為桐山武帝幸之置酒為樂齊地記城北十五里有桐臺即桐宫水經注浦陽江自􅖣山東北徑太康湖車騎將軍謝玄田居所在於江曲起樓樓側悉是桐梓森聳可愛居民號為桐亭樓顔氏家訓或有諱桐者呼梧桐樹為白鐵樹便似戲笑耳原異苑句章吳平州門前忽生一株青桐樹上有謠歌之聲平惡而伐之平隨軍北行首尾三載死桐歘自還立於故根上聞聲樹巔空中歌曰死樹今更青吳平尋當歸適聞伐此樹已復有光輝平尋歸如鬼謠述異記梧桐園在吳夫差舊國一名琴川梧園在句容縣傳曰吳王别館有楸梧成林焉古樂府云梧宫秋吳王愁是也增遊山記吹臺有高桐皆百圍嶧陽孤桐方此為劣隋唐嘉話唐初宫中少樹孝仁后命種白楊謂何力曰此樹易長三數年間宫中可得隂映何力一無所應但誦古詩云白楊多悲風蕭蕭愁殺人意謂此是冢墓間木非宫中所宜種孝仁遽令拔去更樹梧桐也尚書故實李汧公取桐孫之精者雜綴為琴謂之百衲琴原酉陽雜俎厯城房家園齊博陵君豹之山池其中雜樹森竦曾有人折其桐枝者公曰何為傷吾鳳條自後人不復敢折增酉陽雜俎大興善寺東廊之南素和尚院庭有青桐四株素之手植元和中卿相多遊此院桐至夏有汗汚人衣如輠脂不可浣昭國東門鄭相常與丞郎數人避暑惡其汗謂素曰弟子為和尚伐此樹各植一松也及暮素戲祝樹曰我種汝二十餘年汝以汗為人所惡來嵗若復有汗我必薪之自是無汗南中桐花有深紅色者臨瀨西北有寺寺僧智通常持法華經入禪每宴坐必求寒林靜境殆非人所至經數年忽夜有人環其院呼智通至曉聲方息厯三夜聲侵户智通不耐應曰汝呼我何事可入來言也有物長六尺餘皂衣青面張目巨吻見僧初亦合手智通熟視良久謂曰爾寒乎就是向火物亦就坐智通但念經至五更物為火所醉因閉目開口據爐而鼾智通覩之乃以香匙舉灰火置其口中物大呼起走至閫若蹶聲其寺背山智通及明視蹶處得大皮一片登山尋之數里見大青桐樹梢已童矣其下凹根若新缺然僧以木皮附之合無蹤隙其半有薪者創成一蹬深六寸餘蓋魅之口灰火滿其中火猶熒熒智通焚之其怪自絶十道志桐廬縣吳黃武四年置以桐溪側有大桐樹垂條偃蓋傍蔭數畝逺望似廬因謂之桐廬原本事詩蜀候繼圖倚大慈寺樓偶飄一大桐葉上有詩云拭翠斂蛾睂為鬱心中事搦管下庭除書作相思字此字不書石此字不書紙書向秋葉上願逐秋風起天下有心人盡解相思死天下負心人不識相思意有心與負心不知落何地後數年繼圖卜任氏為婚始知字出任氏增高僧傳僧瑜幼入釋門擔薪欲焚身以宋孝建中集薪為龕請僧設齋禮别而入火中經三日而瑜房內忽生雙桐樹根枝豐茂鬱翠非常道輩異之號為雙桐沙門原清異録同州郃陽縣劉靖家兄弟同居宅邊榆樹上生桑西廊梧桐上生穀枝明年墳中白楊生檜並鬱茂鄉人號榆為義祖桐為小義楊為義孫縣令出官錢為修三義亭北夢瑣言王義方初拜御史置宅酬直訖數日忽對賔朋指庭中青桐一雙曰此忘酬直召宅主付錢四千搢紳脞説顧况于御溝流水上得一桐葉有詩云一入深宫裏年年不見春聊題一片葉寄與有情人况亦題葉于流泛之後十餘日况又得一詩以答况者集仙傳吕洞賔題汴都峩睂院云明月斜秋風冷今夜故人來不來教人立盡梧桐影揮麈前録自祖宗以來故家以真定韓氏為首忠憲公家也居京師庭有桐木都人以桐樹目之以别相韓焉相韓則魏公家也洞天清録桐木年久木液去盡紫色透裏全無白色更加細密方稱良材龍門山記徐童觀多桐木花其花清香襲人其子碧可染青碧色若移植他處則不活埤雅詩曰湛湛露斯在彼杞棘愷悌君子莫不令德其桐其椅其實離離愷悌君子莫不令儀杞棘剛木故詩以况令德椅桐柔木故詩以况令儀增古琴疏吳叔治夏日納涼門外時聞桐樹下有琴聲後一人請以五百金買此樹叔治曰金欲得耳苐吾自以口就食即見此樹今何忍伐之後叔治出為北海主簿歸已為族人賣去久之其人以二琴至示叔治一曰隂姬一曰陽娃不加少漆斫磨光毫其文宛然各有仙女弄琴之狀云涼天月夜不鼓而自鳴請留其一以一相報叔治不受丹鉛總録凡木本實而末虛惟桐反之試取小枝削之皆堅實如蠟而其本皆虛故世所以貴孫枝者貴其實也原滇南雜記永昌有梧桐子比中州者形頗長大者幾可當蓮實過永昌亦不可得已瘧編張士傑客壽陽被酒厯淮陽濱入龍祠見後帳龍女塑像甚美乃取桐葉題詩投帳中云我是夢中傳彩筆書于葉上寄朝雲忽見一舍有美女士傑徑詣置酒女吟曰落帆且泊小沙灘霜月無波淮上寒若向江湖得消息為傳風水到長安士傑昏醉既醒孤坐于廟門之右小女奴曰娘子傳語還君桐葉勿復置念增一統志桐君山在桐廬縣東二里相傳昔有異人于此山採藥求道結廬于桐木下人問其姓則指桐以示之因號為桐君山集藻記增宋陳翥西山植桐記咸聲子陳翥子翔少漸義方訓涉孤哀淪于季孟惸疾否滯十有餘年蝎蠧木虛根枝不附志願相畔退而治生至慶厯八年戊子冬十有一月于家後西山之南始有地數畝東止陳詡西止柴􅦗凡東西延二十丈有竒南止弟翊北止兄翦凡南北袤十丈有竒自十二月至于皇祐三年辛卯冬澆而植之凡數百株南栽戟榆以纍翊北樹槿籬以分翦餘桐皆布于內靡有列也未植前斫其地有圃者至而問曰將胡為乎余答曰植桐于其中圃者笑曰得利之速植桐不如植桑之博矣余應之曰吾非不知衣食之源為世所急但足而已夫仲尼豈不能明老圃之業乎柳下惠豈不能為盜跖之事乎茍議利而後動誠聖賢之所不取亦吾心之所未能也翌日將植撫而祝之曰爾其材森森直而理敷榮朝陽立而不倚吾將激清風將其聲聽之以為古琴之操焉爾其葉萋萋緑而繁應時開落不為物頑吾將招君子于其下樂之以待靈鳳之棲焉因書以為植桐記贊增晉郭璞梧桐贊桐實嘉木鳳凰所棲爰伐琴瑟八音克諧歌以永言噰噰喈喈宋孝武帝孤桐贊珍無隱德産必有甄資此孤幹獻枝楚山梢星雲界衍葉炎廛名列貢寶器贊虞絃賦御製梧桐賦撫萬彚之生成攬植物之暢茂見藹藹之梧桐為良材之僅覯當綺閣而結柯臨玉階而吐秀既託根以得地亦含靈而迎候扇淑景於春陽振英華於清晝揚蕤瑤樹布葉金鑾碧滋密綴翠纈深攢散澄暉于帷幄濯鮮色於琅玕被光華於日月耀羽儀於鳳鸞乃有醲雲上覆瓊泉下浸長浥潤於丹穹永敷榮於紫禁雨滴疏聲風吹籟鳴乍響回於環珮已樂合於竽笙若夫新條始引清露初流如潔清之士邈焉而寡儔挺節無撓陵虛欲上如謇直之臣介然而不黨菶菶者其隂可以矢卷阿之頌音離離者其實可以廣湛露之雅什韻虞氏之文琴絙軒皇之素瑟信天地之嘉生非凡材之能匹彼夫桃李之佳蔭松柏之貞心甘棠蔽芾於南國玉樹青蔥於上林雖留詠於在昔詎埓美於斯今至於嶧山孤立之姿龍門百尺之幹或擢本於丘樊或漸色於巖畔豈若兹樹之曜穎朝陽植枝霄漢負聳壑之遐標增麗城之榮觀也哉增魏夏侯湛桐賦有南國之陋寢植嘉桐乎前庭闡洪根以誕茂豐修幹以繁生納谷風以疏葉含春雨以濯莖濯莖天天布葉藹藹蔚童童以重茂蔭蒙接而相蓋蔽隂淡之南表覆陽阿之北外于是詰朝之暇步趾前廡春以遊目夏以清暑昔詩人之所稱美厥生之攸竒植匪岡其不滋識非條其不儀晉嵇康琴賦惟椅桐之所生兮託峻嶽之崇岡披重壤以誕載兮參辰極而高驤含天地之醇和兮吸日月之休光鬱紛紜以獨茂兮飛英蕤于昊蒼夕納景于虞淵兮旦晞幹于九陽經千載以待價兮寂神跱而永康且其山川形勢則盤紆隱深崔嵬岑嵒玄嶺巉巖岞崿嶇崟丹巖嶮巘青壁萬尋若乃重巘增起偃蹇雲覆邈隆崇以極壯崛巍巍而特秀蒸靈液以播雲據神淵而吐溜爾乃顚波奔突狂赴爭流觸巖抵隈鬱怒彪休洶湧騰薄奮沫揚濤瀄汨澎湃蜿蟺相糾放肆大川濟乎中州安回徐邁寂爾長浮淡乎洋洋縈抱山丘詳觀其區土之所産育奧宇之所寶殖珍怪琅玕瑤瑾翕赩叢集纍積奐衍于其側若乃春蘭被其東沙棠殖其西涓子宅其陽玉醴湧其前玄雲蔭其上翔鸞集其巔清露潤其膚惠風流其間竦肅肅以靜謐密微微其清間夫所以經營其左右者固以自然神麗而足思願愛樂矣於是遁世之士榮期綺季之儔乃相與登飛梁越幽壑援瓊枝陟峻崿以遊乎其下周旋永望邈若凌飛邪睨崑崙俯闞海湄指蒼梧之迢遞臨回江之威夷寤時俗之多纍仰箕山之餘輝羡斯嶽之𢎞敞心慷慨以忘歸情舒放而遠覽接軒轅之遺音慕老童于騩隅欽泰容之高吟顧茲桐而興慮思假物以託心乃斫孫枝凖量所任至人攄思制為雅琴傅咸梧桐賦美詩人之攸貴兮覽梧桐乎朝陽蔚菶菶以萋萋兮鬱株列而成行夾二門以駢羅作館宇之表章停公子之龍駕息旅人之肩行瞻華實之離離想儀鳳之來翔宋劉義恭桐樹賦伊梧桐之靈材蔚疏林而擢秀玄根通徹于幽泉密葉垂藹而增茂挺修幹蔭朝陽招飛鸞鳴鳳凰甘露灑液于其莖清風流薄乎其枝丹霞赫奕于其上白水浸潤乎其陂袁淑桐賦越衆木之薰徇勝雜樹之藻縟信爽幹以弱枝實裏素而表緑若乃根荑條茂迹曠心沖貞觀于曾山之陽抽景于少澤之東被籍兮煙霞褱珮兮星虹儀丹丘之瑞羽棲清都之仙宫齊蕭子良梧桐賦植椅桐于廣囿嗟倏忽而成林依層楹而吐秀臨平臺而結隂乃抽葉而露始亦結實于星沈聳輕條而麗景涵清風而散音發雅詠于攸昔流素賞之在今必鸞鳳而後集何燕雀之能臨匪伊楚宫側豈獨嶧山岑邈蒿萊之難儷永配道于仙琴王融桐樹賦梧桐生矣于邸岫之曾隈儀龍門而插幹佇鳳羽以抽枝蹤楚宫而留稱藉溜館以翻聲直不繩而特秀圓匪規而天成同嵗草以萎暮共辰物而滋榮豈逺心以自外寧有志于孤貞梁沈約桐賦龍門之桐逺望青蔥專巖擅嶺或孤或叢枝封暮雪葉映晝虹抗蘭橑以棲龍拂雕窗而漙露喧密葉于鳳晨宿高枝于鸞暮合影陽崖標峯東陸俯結玄隂仰成翠屋乍髣佛于行雨時徘徊于丹轂繞齊綵于碧林豈慚光于若木唐崔鎮尚書省梧桐賦惟皇立極建都河洛會府疏庭珍木咸若偉梧桐之嘉遇竟因人以勝託傾鳳翼于朝陽偶鵷行于祕閣貴有常尊靜為躁君花繁翼子幹直謀孫履素至潔體柔常存揭日月以曜穎含雨露以流根豈與夫龍門半死嶧陽孤植齊萬籟而混吹合千巖以共色徑質氷摧而杼人莫識高標風析為樵人所得求知音于㸑燃論分理于繩墨且問之以生死又焉議夫通塞故至人以全身逺害君子以自強不息失其理山林不足以攝生順其道朝市何妨乎育德梧桐生矣自逺而至輕去無何之鄉不居有過之地謂繁華兮國人服媚吾獨後春而翠謂搖落兮物情共棄吾亦先秋以悴不改節以邀利不立名而自異必居常以待終將百慮而一致大年椿幹捎雲豫章箘簵貞徑桂椒信芳百果甲坼于金谷千林花發于河陽實繁者皆折材用者先亡我異于是于何不臧布清隂于仙署棲白雲于帝鄉旁連杞梓俯接琳琅蔚金蟬之氣色耀錦帳之輝光我封我樹無臭無香後天年于社櫟用當代于甘棠得喪齊致語默兩忘吾不知夫支離之德何獨攘而自出蘧瑗之智何獨卷而自藏復有翦刻為圭琢磨成器龍章鳳軫金符玉瑞平君子之心戒王者之戲晉侯得之諸侯麏至子野得之玄鶴來暨雖信美于疇日未若兹辰之佩仁履義我求懿德于是乎在疏相比逺相待以其彚征成而不宰譬諸草木生植有時除惡務本樹德務滋引之斯至權之斯離角弓兮有什枤杜兮陳詩敢告在位如何不思念兹在兹恕事順施茍求夏隂與秋實無拔楊以樹茨宋陳翥桐賦始吾植桐與竹于西山南見誚乎天倫間以謂拙難于生計不如桑柘果實之木有所利吾決而遂其志乃自號桐竹君以固而拒之又作西山桐詩十二首復掇其詩之餘次而為賦所以伸植之之心也其詞曰伊梧桐之柔木生崇絶之高岡盜天地之淳氣吐春冬之竒芳借濡潤于夕陛藉和暖于隂陽綿嵗月之久持森鬱茂而延昌爾其溪臨千仞巖空百丈增巘岌以周列重峯嶪其相向勢崔嵬而峭且峻形崎嶇而不可上巖嶮巇以無土壑增巉而弗敞枝上拔而雖榮根下朵而不長迅雷疾風之所飄擊湧濡飛溜之所滌蕩蒙苦霧而含暝鎖愁雲于寫望霏霜封條而欲折積雪擁根而致強枝蠧則中間節傷則液滿同枌棘以溷殽雜樞榆而蒼莽于是哀狖晨吟飢梟夜啼熊狐傍宿麏麑下蹊悲號呌嘯回惶慘悽勇夫聞之而心碎山鬼尋之而晝迷寒雕啄鷹以之遊集妖烏怪鵬以之安棲蓋人迹罕履故物類來萃材雖具不見用于匠氏根已固故不可以移陟其或春氣和木向榮飛子結孕其柢抽萌條毳毳以嫩聳葉茸茸而緑成水再離而自茂氣猶缺而未英當斯時也吾孤且否人無我諳既支離而不暖始有地于西山之南遂忘刻鋭任情意命钁以剃草向陽以避地列行行之坑坎有鱗鱗之位次庸以梧桐植而異羣類也由是召山叟訪場師披榛棘之叢薄陟峯巒之險危望椅梓以相近求拱把而見移全根本之延蔓擇材幹之珍竒乃等地以森植亦分株而對之侔底道之矢直鄙左右之器欹邁夾道之細柳類通衢之高椅纍嵗時而茂盛發花葉之繁滋土膏泉液以澤乎根春風夏雨以長其枝晨霞暮雨以蔭其幹清露薄霧以潤其肌陽烏舒暖以條布隂兔飛光而影垂佳庭雪之難積噱巖霜之易晞是以其上則鵯鷓鷩鵜之所不敢棲也其下則騰猿飛􅚦之所不獲息也結藤垂蔓莫得而依也奔泉依瀨亡由而及矣故逺而望之如列戟與排矛即而憩之若緑幄與翠裯將以集鸑鷟鳴飄鶹玩之以興詠聽之以消憂于是招直諒之賔命端善之友坐萋萋之隂蔭論詩書之盛否逍遙乎志氣宴樂以文酒賞茲桐之森森玩桑柘之黝黝彼槐歎婆娑樗傷擁腫一則為盡其生意一則嗟無其器用未若葉中藥餌材堪梁棟雲和曾入于周制嶧陽乃隨于禹貢有名實以相副豈虛偽以動衆吾將采東南之孤枝創疏白之雅琴絃以檿桑之絲徽以雙南之金同夔牙以揮鼓並鍾期而側聆追淳風于先德寫太古之遺音非鏗鏘也不足以傾鄙夫之耳有幽靜也自可以悅君子之心桐竹君乃神魂清心志和以道自任孰知其他據高梧以釋俗申素臆以長歌歌曰蒿艾茂郁兮芝蘭不馨柞櫟芬芳兮楩柟不亨茍毁方以趨勢兮雖棫朴而見稱倘容援之云依兮雖楸梓而弗名且斥逺于匠石兮終見委于林衡自樂天以知命兮故無慮而自營歌卒瞬目周玩沉吟自斷後以餘音系而為亂曰貴遠賤近時之宜兮衆咸去朴爭華偽兮花葉不能資耳目兮子實無堪充口腹兮人誰采用到林麓兮雖材還同不材木兮無願終身老林泉兮器與不器居其間兮梓桐放懷事都捐兮優遊共得終天年兮文散句增楚宋玉九辨白露既下百草兮奄離披此梧楸漢枚乘七發龍門之桐百尺無枝其中鬱結輪囷扶疏以分離晉崔綺七蠲爰有梧桐生于玄溪傅根朽壤托險生危張協七命寒山之桐出自大冥含黃鍾以吐幹據蒼岑以孤生四言古詩增宋伏系之詠椅桐亭亭椅桐鬱兹庭圃翠條疏風緑柯蔭宇五言古詩增晉司馬彪與山巨源苕苕椅桐樹寄生於南嶽上陵青雲霓下臨千仞谷處身孤且危於何託余足昔也植朝陽傾枝俟鸞鷟今者絶世用倥傯見迫束班匠不我顧牙曠不我録焉得成琴瑟何由揚妙曲卞和潛幽巖誰能證竒璞冀望神龍來揚光以見燭宋鮑昭山行見孤桐桐生叢石裏根孤地寒隂上倚崩岸勢下帶洞阿深奔泉冬激射霧雨夏霖霪未霜葉已肅不風條自吟昏明積苦思晝夜叫哀禽棄妾望掩淚逐臣對撫心雖以慰單危悲涼不可任幸願見雕斫為君堂上琴齊王融咏梧桐騫鳳影層枝輕虹鏡展緑豈斁龍門幽直慕瑤池曲謝朓遊東堂詠桐孤桐北窗外高枝百尺餘葉生既婀娜葉落更扶疏無華復無實何以贈離居裁為圭與瑞足可命參墟梁簡文帝雙桐生空井季月雙桐井新枝雜舊株晚葉藏棲鳳朝花拂曙烏還看西子照銀床繫轆轤沈約咏梧桐秋還遽已落春曉猶未荑微葉雖可賤一翦或成圭咏孤桐龍門百尺時排雲少孤立分根蔭玉池欲待高鸞集吳均咏庭中桐龍門有竒價自言梧桐枝華暉實掩映細葉能披離不降周王子空待嵗時移嚴風忽交徑遂使無人知王筠奉酬從兄臨川桐樹伊昔擅羽儀待價龍門垂優遊清露點徽穆惠風吹月上隂陽幹雲覆死生枝公子存高尚聊用影華池棲鸞既不重舞鶴復何施方同散木㸑清響竟誰知隋魏彥深咏桐未求裁作瑟何用削成圭願寄華庭裏枝橫待鳳棲陸季覽咏桐搖落依空井生死尚餘心不辭先入㸑惟恨少知音唐戴叔倫梧桐亭亭南軒外貞幹修且直廣葉結青隂繁花連素色天資韶雅性不愧知音識元稹三月二十四日宿曾峯館夜對桐花寄樂天微月照桐花月微花漠漠怨淡不勝情低徊拂簾幕葉新隂影細露重枝條弱夜久春恨多風清暗香薄是夕逺思君思君瘦如削但感事暌違非言官好惡奏書金鑾殿步屣青龍閣我在山館中滿地桐花落雲居寺孤桐一株青玉立千葉緑雲委亭亭五丈餘高意猶未已山僧年九十清淨老不死自云手種時一顆青桐子直從萌茅拔高自毫末始四靣無附枝中心有通理寄言立身者孤直當如此白居易答桐花山木多蓊鬱兹桐獨亭亭葉重碧雲片花簇紫霞英是時三月天春暖山雨晴夜色向月淺暗香隨風輕行者多商賈居者悉黎氓無人解賞愛有客獨屏營手攀花枝立足踏花影行生憐不得所死欲揚其聲截為天子琴刻作古人形云待我成器薦之於穆清誠是君子心恐非草木情胡為愛其華而反傷其生老龜被刳腸不如無神靈雄雞自斷尾不願為犧牲况此好顏色花紫葉青青宜遂天地性忍加刀斧刑我思五丁力拔入九重城當君正殿栽花葉生光晶上對月中桂下覆階前蓂泛拂香爐煙隱映斧藻屏為君布緑隂當暑蔭軒楹沉沉緑滿地桃李不敢爭為君發清韻風來如叩瓊泠泠聲滿耳鄭衛不足聽受君封植力不獨吐芬馨助君行春令開花應晴明受君雨露恩不獨含芳榮戒君無戲言翦葉封弟兄受君嵗月功不獨資生成為君長高枝鳳凰上頭鳴一鳴君萬嵗壽如山不傾再鳴萬人泰泰階為之平如何有此用幽滯在巖坰嵗月不爾駐孤芳坐凋零請向梧枝上為余題姓名待余有勢力移爾獻丹庭桐花春令有常候清明桐始發何此巴峽中桐花開十月豈伊物理變信是土宜别地氣反寒暄天時倒生殺草木堅強物所稟固難奪風候一參差榮枯遂乖剌况吾北人性不耐南方熱強羸壽夭間安得依時節宋歐陽修桐花猗猗井上桐花葉何衰衰下蔭百尺泉上聳凌雲材翠色洗朝露清隂午當階幽蟬自嘒嘒鳴鳥何喈喈日出花照耀飛香動浮埃今朝一雨過狼籍黏青苔斯桐乃誰樹意若銘我齋常聞漢道隆上下相和諧選吏擇孝亷視民嬰與孩政聲如九韶百物絶妖災優優穎川守能致鳳凰來到此幾千載丹山自崔嵬聖君勤治理百郡列賢才嗟爾不自勉鳳凰其來哉司馬光桐軒朝陽升東隅照此庭下桐菶菶復萋萋居然古人風疏柯青玉聳密葉翠羽蒙午景凝餘清夕照留殘紅雨響甍棟外風生户牖中主人政多暇步賞常從容終當致威鳳覽德鳴噰噰又將施五絃解愠歌帝宫曾鞏桐樹棄地瓦礫間兹桐偶誰樹憶見擁西牆俄成劃煙霧得時花葉鮮照影清泉助當軒蔽赤日對卧醒百慮惜哉稟受弱妄使鸞鳳顧商聲動猶微秀色觸已沮泫摧亂繁條逼迫畏清露暄晴辛未闋飄落儻可拒噫號衝飇回激射隂霰聚此勢復何言瞪視空薄暮陳翥西山桐詩桐栽吾有西山桐植之未盈握所得從野人移來出喬嶽節凝葉尚祕根凍土自剝匪為待籬鷃庸將棲鸑鷟異日成茂林論材誰見擢巨則為棟梁微亦任楹桷仍堪雅琴器奏之反淳朴大匠如顧憐委軀願雕斫桐根我有西山桐早鄰桃與李得地自行根受芘踰高壘上濯春雲膏下滋醴泉􅔱盤結侔循環岐分類肢體乘虛肢體大憤漲土脈起扶疏向山壤蔓衍出林址願偕久深固無為伴生死死議大厦材合抱由滋此桐花我有西山桐桐成茂其花香心自蝶戀縹縹帶無遮華白含香色璨如凝瑤華紫者吐芳英爛若舒朝霞素奈未足擬紅香寧相加世但貴丹藥天艷姿驕奢歌管繞庭檻玩賞成今誇倘或求美材為爾長吁嗟桐葉我有西山桐下臨百尺溪布葉雖遲遲庇本亦萋萋密類張翠幄青堪翦封圭滑澤經日久濡毳隨幹躋迎風帶影動墜雨向身低寧隱凡鳥巢自蔽儀鳳棲松柏徒爾頑蒲栁空思齊但有知心時應候常弗迷桐乳吾有西山桐厥實狀如乳含房隱緑葉致巢來翠羽外滑自為穗中犀不可數輕漸曝秋暘重即濡綿雨霜後感氣裂隨風倒煙塢雖非松柏子受命亦于土誰能好琴瑟種之向春圃始知非凡材諸核豈余伍桐孫高梧已繁盛蕭蕭西山隴毳葉竟開展孫枝自森聳擅美惟東南滋榮藉萋菶不能容燕雀只許棲鸞鳳寧入吳人㸑堪隨伯禹貢雨露時加潤霜雪胡為凍况有竒特材足任雅琴用中含太古音可奏清風頌桐風分材植梧桐桐茂成翠林日日來輕風時時自登臨拂幹動微毳吹葉破圓隂虛涼可解慍鼓拂如調琴莫傳獨鵠號願送棲鳳吟豈羞楚襄王蘭臺堪披襟亦陋陶隱居高閣聽松音無為搖落意慰我休間心桐隂枝軟自相交葉榮更分茂所得成清隂仍宜當白晝隂疑翠㡩展翳若繁雲覆日午密影疊風搖碎花漏冷不蔽空井高堪在庭甃吾本間野人受樂忘煢疚亭亭如張蓋翼翼如層搆月夕獨徘徊猶思一重覆桐徑時人羡桃李下自成蹊徑而我愛梧桐亦以成乎性中平端隧道還往非遼敻直入無欹斜橫庭亦徑廷月夕照影碎春暮花光映清朝濛露濕落日隨煙暝不使草蔓滋任從根裂迸堪詣蔣詡徒惟任蓬蒿盛金張建擬古菶菶嶧山桐一樹十二枝枝分十二律所指各不移胡為師襄子獨謂東南竒一律不可闕一枝不可遺誰能以此意説似典樂夔明高啓桐樹晴粉朝英墜涼瓊夏葉舒鳥啼高樹早蟾囀薄疏虛朱絃未薦曲彤管屢題書坐恐銷華澤商吹起前除五言律詩增唐李嶠桐孤秀嶧陽岑亭亭出衆林春光集鳳影秋月㺯圭隂高映龍門迥雙依玉井深不因將入㸑誰為作鳴琴王昌齡假宥廳孤桐鳳凰所宿處月映孤桐寒稿葉零落盡空柯蒼翠殘虛心誰能見直影非無端響發調尚苦清商勞一彈雍陶孤桐疏桐餘一幹風雨日蕭條嵗晚琴材老天寒桂葉凋已悲根半死復恐尾全焦幸在龍門下知音肯寂寥宋司馬光梧桐紫極宫庭濶扶疏四五栽初聞一葉落知是九秋來實滿風前地根添雨後苔羣仙儻來會靈鳳必徘徊王安石孤桐天質自森森孤高幾百尋凌霄不屈已得地本虛心嵗老根彌壯陽驕葉更隂明時思解慍願斫五絃琴朱子次韻擇之咏梧并呈季通永日長梧下清隂小院幽自憐風嫋嫋客賦雨瀏瀏作别今千里相思欲九秋更憐同社友復此誤淹留林景熙桐角田家無律吕聲寄始華桐碧卷春風老清吹野水空客心寒食後牛背夕陽中不惹梅花恨年年送落紅明高啓梧桐井邊雙玉樹高結自生涼影散秋雲薄聲喧夜雨長疏英飄碧簟亂葉響銀牀緑綺誰能斫持將奏鳳凰鍾惺月下新桐喜徐元歎至是物多妨月桐隂殊不然長如晨露引不隔晚涼天緑滿清虛內光生幽獨邊懷新君亦爾到在夕陽先五言小律增唐李頎題僧房雙桐青桐雙拂日傍帶凌霄花緑葉傳僧磬清隂潤井花誰能事音律焦尾蔡雍家七言律詩增唐陳標焦桐樹江上烹魚採野樵鸞枝摧折半曽燒未經良匠材雖散待得知音尾已焦若使琢磨徽白玉須來風律軫青瑤還能萬里傳山水三峽泉聲豈寂寥元黃清老梧桐雨曾將秋信報人知又與西風泣别離病緑滴殘猶有淚題紅流去更無詩舊巢鳳冷朝飛逺古井金寒曉汲遲待得楚臺雲散後却憑琴調寄相思原明施槃桐雲捲清秋畫角悲梧桐滿地月明時斜穿翠葉通金井直透蒼波漾玉池青女莫驚烏鵲夢素娥偏惜鳳凰枝故人千里關情處獨立空階影漸移徐茂吳咏桐綿濡毳桐枝别作葩溫柔香裏玉無瑕氷蠶未擬鮮新絶雪繭還同麗密誇猶勝南中榮吉貝漫教西蜀侈橦華銀牀金井俱搖落誰信回暄更有涯五言絶句增唐韋應物題桐葉參差翦緑綺肅灑覆瓊柯憶在灃東寺偏書此葉多李頻題長孫桐樹一去龍門側千年鳳影移空餘翦圭處無復在孫枝七言絶句御製詠桐老圖賜裕親王丹桂秋香飄碧虛青桐迎露葉扶疏願將花萼樓前老帝子王孫永結廬增唐元稹桐孫詩并序元和五年豫貶掾江陵三月二十四日宿曾峯館山月曉時見桐花滿地因有八韻寄白翰林詩當時草蹙未暇紀題及今六年詔許西歸去時桐樹上孫枝已拱矣豫亦白鬚兩莖而蒼然斑鬢感念前事因題舊詩仍賦桐孫詩一絶又不知幾何年復來商山道中元和十年正月題去日桐花半桐葉别來桐樹老桐孫城中過盡無窮事白髮滿頭歸故園李商隱蜀桐玉壘高桐拂玉繩上含非霧下含氷枉教紫鳳無棲處斫作秋琴彈壞陵宋徐積華州太守花園南園花謝北園開紅拂闌干翠拂苔却是梧桐且栽取丹山相次鳳凰來楊萬里桐花二首春色來時物喜初春光歸日興闌餘更無人餞春行色猶有桐花管領渠老去能逢幾個春今年春事不關人紅千紫百何曾夢壓尾焦桐也俗塵元鄭氏允端梧桐梧桐葉上秋先到索索蕭蕭向樹鳴為報西風莫吹却夜深留取聽秋聲詩散句原魏明帝雙桐生空井枝葉自相加增陳張正見丹山下威鳳來集帝梧中唐孟浩然微雲淡河漢疏雨滴梧桐原李白梧桐落金井一葉飛銀牀增李白寧知鸞鳳意逺托椅桐前四面無附枝中心有通理今兹大火落秋葉黃梧桐原杜甫石欄斜點筆桐葉坐題詩西掖梧桐樹空留一院隂增薛竒童日晚梧桐落微寒入紫垣韋應物高梧一葉下空齋歸思多韓愈空階一片下琤若摧琅玕原元稹隴月上山館紫桐垂好隂增李中門巷涼秋至高梧一葉驚宋蘇軾至今多梧桐合抱如彭聃陳師道林梧自黃殞風過成夜語陸遊井桐殊可念無葉送秋聲吳警庭前兩梧桐濃緑涵清輝金雷琯桐生日已長鳳來殊未央原唐元稹明月滿庭池水緑桐花垂在翠簾前增宋劉敞城角日高春寂寂小庭行遍拾桐花劉小山睡起秋聲無覔處滿階桐葉月明中徐抱獨誰與深春共憔悴隔江一樹紫桐花宋謝靈運桐林帶晨霞齊邢邵桐影傍巖疏梁庾肩吾桐橫棲鳳條山桐迥出城唐太宗舒圭葉翦桐上官儀翠梧臨鳳邸張説隔户共桐隂李白秋色老梧桐原杜甫薰風繞帝梧凄凄把翠梧增杜甫樹暗惜桐孫元稹桐花新雨氣白居易鬱鬱井上桐宋梅堯臣梧桐生靜思陳師道風梧有先聲原唐杜甫清秋幕府井梧寒碧梧棲老鳳凰枝王昌齡金井梧桐秋葉黃增白居易雨滴梧桐山館秋梧桐老去長孫枝李賀窗前植桐青鳳小李商隱桐拂千尋鳳要棲曹唐桐花風軟管絃清韋莊滿院桐花鳥雀喧宋錢惟演秋意先侵玉井桐劉攽秋桐不識春風靣王安石漠漠疏桐日下隂陸遊桐引新枝出粉牆金井梧桐辭故枝元倪瓚井床露淨碧桐花顧瑛梧桐葉大午隂垂别録增祖台之志怪騫保至檀丘塢上北樓宿暮鼓二下有人著黃練單衣白帢將人持炬火上樓保懼藏壁中須臾有二婢上帳使迎一女子上與白帢人入帳宿未明白帢輒先去保因入帳中持女子問向去者誰答曰桐郎道東廟樹是也至暮二更桐郎復來保乃砟取之縛著樓柱明日視之形如人長三尺餘檻送詣丞相度江未半風浪起桐郎得投入水風波乃息大中遺事軒轅先生居羅浮山宣宗召入禁中能以桐竹葉滿手挼之悉成錢錦里新聞成都出小鳥紅翠相間生于桐花中惟飲其汁不食他物五色線葛仙翁憑桐木几于女几山學仙得道後几化為三足白麂時出于山上雲林遺事倪元鎮嘗留客夜榻恐有所穢時出聽之一夕聞有咳嗽聲侵晨令家僮遍覔無所得童慮捶楚偽言窗外梧桐葉有唾痕者元鎮遂令翦葉棄十餘里外蓋宿露所凝訛指為唾以紿之耳清暑筆談琴材以輕鬆脆滑謂之四善取桐木多年者木性都盡液理枮徑則聲易發而清越原羣碎録桐花可敷豬瘡飼豬肥大三倍占候梧桐花初生色赤主旱色白主水種植正二月內以黃土拌巨末少許或盆或地上俱可種上覆土末寸半許時時用水澆灌使土長濕待長尺餘移栽冬間不用苫蓋製用桐子微炒布包少許磚地上輕輕板之簡出仁未破者再板陸續收取附録刺桐原刺桐葉如梧桐其花附幹而生側敷如掌形若金鳳枝幹有刺花色深紅嵇含草木狀云九真有刺桐布葉繁密三月開花赤色照映三五房凋則三五房復發陳翥桐譜云刺桐生山谷中文理細緊而性喜折裂體有巨刺如檔樹其實如楓彚考增投荒雜録刺桐花狀比圖畫者不類其木為材三四月時布葉繁密後有赤花生葉間三五房不得如畫者紅芳滿樹原溫陵郡志溫陵城留從效重加板築植刺桐環繞之其樹高大而枝葉蔚茂初夏開花極鮮紅如葉先萌而花後發主明年五榖豐熟增花經刺桐八品二命南海古迹記泛杯池南有陸公亭故基夾溪種刺桐木綿花開殷盛如畫泉南雜志宋進士吕造詩云閩海雲霞繞刺桐往年城郭為誰封刺桐城今泉州築城時環城皆植刺桐故號桐城天中記彭綱詠刺桐花詩云樹頭樹底花楚楚風吹緑葉翠翩翩露中幾枝紅鸚鵡刺桐花雲南名鸚哥花酷似之彭詩本四句命吏寫刻遺其一句復誦之自覺意足乃不更改集藻七言絶句增唐陳陶泉州刺桐花詠六首兼呈趙使君海曲春深滿郡霞越人多種刺桐花可憐虎竹西樓色錦帳三千阿母家石氏金園無此艷南都舊賦乏靈材只因赤帝宫中樹丹鳳新銜出世來猗猗小艷夾通衢晴日薰風笑越姝只是紅芳移不得刺桐屏障滿中都不勝攀折悵年華紅樹南看見海涯故國春風歸去盡何人堪寄一枝花赤帝嘗聞海上遊三千幢蓋擁炎州今來樹似離宫色紅翠斜欹十二樓髣佛三株植世間風光滿地赤城間無因秉燭看竒樹長伴劉公醉玉山宋丁謂刺桐花聞説鄉人説刺桐花如後發始年豐我今到此憂民切只愛青青不愛紅王十朋刺桐花初見枝頭方緑濃忽驚火􅏛欲燒空花先花後年年雨莫遣時人不愛紅詩散句增唐徐夤歸日捧持明月寶去時期刻刺桐花方干風煙漸近刺桐花宋蘇軾木綿花發刺桐開附録岡桐原岡桐一名油桐一名荏桐其油似荏一名罌子桐一名虎子桐增桐譜枝幹花葉與白桐花相類本草李時珍曰即白桐之紫花者人或謂之紫花桐原樹小長亦遲早春先開淡紅花狀如鼓子花實大而圓每實中二子或四子大如大楓子肉白味甘食之令人吐人多種之取子作桐油入漆及油器物艌船為時所須人多偽為之惟以篾圈撣起如鼓面者為真附録赬桐增桐譜赬桐一名真桐南方草木狀嶺南處處有之自初夏生至秋蓋草也葉如桐其花連枝萼皆深紅色俗呼貞桐花酉陽雜俎貞桐枝端抽赤黃條條復旁對分三層花大如落蘇花作黃色一莖上有五六十朵原身青葉圓大而長高三四尺便有花成朵而繁紅色如火為夏秋榮觀集藻七言律詩增明沈氏天孫赬桐朱萼疑看九月楓繁枝又借嶧陽桐丹鬚吐舌迎風艷絳蠟籠紗照月空西域應分安石紫寢宫可作麥英紅緑珠宴罷歸金谷七尺珊瑚映水中七言絶句增宋方嶽赬桐花二首厥草惟夭簇絳繒新紅初滴尚炎蒸西風坐閲芙蓉老合是花中耐久朋似子圓紅不似花緑叢擎出野人家亦知吟骨今當換火候初成獨體砂詩散句增宋蘇舜欽喚起十年閩嶺夢赬桐花畔見紅蕉附録臭桐原臭桐生南海及雷州近海州郡亦有之葉大如手作三花尖長青不凋皮若梓白而堅韌可作繩入水不爛花細白如丁香而臭味不甚美逺觀可也人家園內多植之皮堪入藥采取無時附録胡桐增前漢書西域傳鄯善國多胡桐注孟康曰胡桐似桑而多曲師古曰胡桐亦似桐不類桑也蟲食其樹而沫出下流者俗名為胡桐淚言似眼淚也可以汗金銀今工匠皆用之附録海梧增南方草木狀海梧樹與中國松同但結實絶大形如小栗三角肥甘有香味亦樽俎間佳果也出林邑附録折桐增洞天清録有花桐春來開花如玉簪而微紅號折桐花御定佩文齋廣羣芳譜卷七十三
