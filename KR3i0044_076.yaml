body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷七十四木譜榆原榆一名零本草云榆莢飄零故曰零榆一一名藲荎爾雅云藲莖註云今之刺榆有數十種今人不能别惟知莢榆白榆刺榆榔榆數種而已莢榆白榆皆大榆也有赤白二種白者名枌爾雅云榆白枌説文云楩山枌榆也木甚高大未葉時枝上先生瘤纍纍成串及開則為榆莢生青熟白形圓如小錢故又名榆錢甚薄中仁有殻榆莢開後方生葉似山茱萸葉而長尖􅕏潤澤增本草大榆二月生莢榔榆八月生莢彚考增詩唐風山有樞隰有榆原禮記内則堇荁枌榆兔薧滫瀡以滑之漢書郊祀志高祖禱豐枌榆社注枌白榆也以此樹為社神因立名也增漢書循吏傳龔遂為渤海大守勸民務農桑令口種一樹榆魏志鄭渾傳渾為山陽魏郡太守以郡下百姓苦乏材木乃課樹榆為籬並益樹五果榆皆成藩五果豐實宋書符瑞志晉孝武帝太元十一年四月壬申琅邪費有榆木異根連理相去四尺九寸魏書昭帝紀帝曾中蠱嘔吐之地仍生榆木參合陂土無榆樹故世人異之至今傳記太祖紀建國三十四年生太祖於參合陂北明年有榆生於埋胞之坎後遂成林南史劉善明傳善明除海陵太守郡境邊海無樹木善明課人種榆檟雜果遂獲其利原唐書陽城傳城隱中條山嵗飢屏跡不過隣里屑榆為粥講論不輟管子五沃之土其榆條長莊子鵲上高城之垝而巢於高榆之巔城壊巢折凌風而起故君子之居世也得時則蟻行失時則鵲起鄒子春取榆栁之火韓詩外傳楚莊王將伐晉令曰敢諫者死孫叔敖諫曰臣園中有榆榆上有蟬方奮翼悲鳴飲清露不知螳螂之在其後也增新論劉子駿信方士虛言謂神仙可學余見其庭下大榆樹久老剝折指謂曰彼樹無情然猶枯蠧人雖欲愛養何能使之不衰春秋元命苞三月榆莢落晉宫閣名華林園榆十九株博物志啖榆則眠不欲覺荆州圖記鄭縣東百歩里名伍伯村有白榆連理樹異根合條高四丈餘土民奉為社原鄴中記襄國鄴路千里之中夾道種榆盛暑之月人行其下增水經注大河在金城北門東流有梁泉注之出縣之南山按耆舊言梁暉字始娥漢大將軍梁冀後冀誅入羌後其祖父為羌所推為渠帥而居此城土荒民亂暉將移居抱罕出頓此山為羣羌圍廹無水暉以所執榆鞭竪地以青羊祈山神泉湧出榆木成林諸次水東逕榆林塞世又謂之榆林山即漢書所謂榆谿舊塞者也自谿西去悉榆林之藪矣縁厯沙陵届龜兹縣西出故謂廣長榆也王恢云樹榆為塞謂此矣酉陽雜俎盧縣東有金榆山昔朗法師令子弟至此採榆莢詣瑕丘市易皆化為金錢幽明録虞晩家有皁莢樹有神隔路有大榆樹古傳曰是雌雄原清異録金鄉路上一老榆往來者就樹下易草屨例以其舊懸而去時人指為鞾鞋樹增爾雅翼秦漢故塞其地皆榆榆北方之木也修眞録昔有女僊喜食衆草日夜恒不卧一日食一樹葉酣卧不欲覺殊愉快因名其樹曰愉後人改以從木即今榆樹也後女僊繞宫種之時與族雪道君會於下使金童講鏐虹寶典原農桑通訣昔豐沛嵗饑以榆皮作屑煑食之民賴以濟集藻文散句增魏應璩與龎惠恭書頻見所上利民之術植濟南之榆栽漢中之漆五言古詩原宋蘇軾御史臺榆我行汴隄上厭見榆隂緑千株不盈畝斬伐同一束及居幽囚中亦復見此木蠧皮溜秋雨病葉埋牆曲誰言霜雪苦生意殊未足坐待春風至飛英覆空屋增明吳寛榆始我種三榆近在亭之左西日待隱蔽隂成客能坐七年長漸高密葉已交鎖生錢聞可食貧者當果蓏其一忽憔悴嚙腹縁蟻蜾持斧欲伐之材未中船舵藤蔓方附麗不伐亦自可古人無棄物守圃常用跛七言古詩增唐僧皎然寓興天上生白榆白榆直上連天根高枝不知幾萬丈世人仰望徒攀援誰能上天採其子種向人間笑桃李因問老仙求種法老仙嗤我愚不荅始知此道終無成還如瞽夫學長生七言絶句增宋孔平仲榆錢鏤雪裁綃箇箇圓日斜風定穩如穿憑誰細與東君説買住青春費幾錢詩散句增唐韓愈狂風簸枯榆狼籍九衢内宋蘇軾可惜凌雲條化作樵夫束原張耒修柯遇雲日老枿千虹霓增唐韓愈榆葉祗能隨柳好等閒撩亂走空園李賀榆莢相催不知數沈郎青錢夾城路雍陶寂寞春風花落盡滿庭榆莢似秋天曹唐欲將心就仙郎説借問榆花早晩秋薛能此日郊亭心乍喜敗榆芳景似還家明李氏玉英柴扉寂寞瑣殘春滿地榆錢不療貧周庾信興雲榆莢雨唐張籍榆葉暗飄蕭原白居易錢穿短貫榆增白居易晴薫榆莢黑薛能榆莢奔風徤韋莊絲錢榆貫重原唐白居易榆葉抛錢栁展睂隔牆榆葉㪚青錢曹唐北斗西風吹白榆薛逢報秋榆葉落征衣金麻九疇村村榆火碧煙新别録增典術北方種榆九根宜蠶桑田穀好夢書榆火君徳至也夢採榆葉受恩賜也夢居樹得貴官也夢其葉滋茂福禄存也原種植榆莢落時收取作畦種之令與草俱長不必去草明年正月附地割除覆以草放火燒之一嵗中可長八九尺不燒則長遲一根數條者止留麤大條直者一株餘悉去之三年後正月移栽早則易曲三年内若採葉戕心則不長宜更燒之則依前茂盛附枝切勿剝性喜肥種宜糞陳屋草亦佳種非叢林則易曲如白土薄地不宜榖者取一方純種榆則易長種榆田畔防鳥雀損榖諸榆性皆扇地其下五榖不植樹影所及東西北三面榖皆不生宜於近北牆處種之增汜勝之書種木無期因地為時三月榆莢雨時高地强土可種木濟民要術種榆法嵗嵗科簡剝治之功指柴雇人十束雇一人無業之人爭來就作賣柴之利已自無貲况諸器物其利十倍砍後復生不勞耕種所謂一勞永逸能種一頃嵗收千疋惟須一人守䕶指揮處分既無牛耕種子人功之費不慮水旱風蟲之災比之榖田勞逸萬倍男女初生各與小樹二十株比至嫁娶悉任車轂一樹三具一具値絹三疋成絹一百八十疋聘財資遣麤得充事原取用三年春莢可賣五年堪作椽十年後可作器用十五年後可作車轂嫩葉煠浸淘淨可食榆錢可羮又可蒸糕餌收至冬可釀酒瀹過曬乾搗羅為末鹽水調匀日中曝曬可作醬即榆仁醬也榆皮去上皺澀乾枯者取嫩白皮剉乾磨粉可作粥備荒採其白皮為麫水調合香劑黏滑勝膠漆榆皮濕搗如糊黏瓦石極有力汴洛以石為碓嘴用此膠之槐原槐虛星之精也見春秋説題辭一名櫰有數種有守宫槐一名紫槐似槐榦弱花紫晝合夜開爾雅翼謂之合昏槐有白槐似柟而葉差小有櫰槐葉大而黑其葉細而色青緑者直謂之槐功用大略相等木有極高大者材實重可作器物有青黄白黑數色黑者為猪屎槐材不堪用四五月開黄花未開時狀如米粒採取曝乾炒過煎水染黄甚鮮其青槐花無色不堪用七八月結實作莢如連珠中有黑子以子多者為好淮南子云槐之生也季春五日而目十日而䑕耳更旬而始規二旬而葉成味苦平無毒久服明目益氣烏鬚固齒催生增神農本草經槐實生河南平澤可作神燭彚考原周禮秋官朝士掌建邦外朝之法面三槐三公位焉州長衆庶在其後註槐之言懐也懐來人於此欲與之謀增爾雅槐棘醜喬疏醜類也喬高也槐棘之類枝皆翹竦晉書殷仲文傳仲文因月朔與衆至大司馬府府中有老槐樹顧之良久而歎曰此樹婆娑無復生意李𤣥盛傳河右不生楸槐柏漆張駿之世取於秦隴而植之終於皆死而酒泉宫之西北隅有槐樹生焉𤣥盛著槐樹賦以寄情蓋歎僻陋遐方立功非所也苻堅載記堅頗留心儒學王猛整齊風俗政理稱舉學校漸興闗隴清晏百姓豐樂自長安至於諸州皆夾路樹槐栁百姓歌之曰長安大街夾樹楊槐下走朱輪上有鸞棲英彥雲集誨我萌黎周書韋孝寛傳孝寛為雍州刺史先是路側一里置一土堠經雨頽毁每須修之自孝寛臨州乃勒部内當堠處植槐樹代之既免修復行旅又得庇䕃周文後見怪問知之曰豈得一州獨爾當令天下同之於是令諸州夾道一里種一樹十里種三樹百里種五樹焉隋書高熲傳熲每坐朝堂北槐樹下以聽事其樹不依行列有司將伐之上特命勿去以示後人其見重如此孝義傳紐囘子士雄少質直孝友其庭前有一槐樹先甚鬱茂及士雄居䘮樹遂枯服闋還宅復榮高祖聞之下詔褒揚唐書吳凑傳凑為京兆尹街樾稀殘有司蒔榆其空凑曰榆非人所䕃玩悉易以槐及槐成而凑已亡行人指樹懐之朱朴傳與朴皆相者孫偓字龍光始家第堂柱生槐枝朞而茂既而偓秉政封樂安縣侯宋史五行志政和四年澤州台州槐木連理山海經首山其木多槐條谷之山其木多槐桐尚書逸篇北社惟槐太公金匱武王問太公曰天下神來甚衆恐有試者何以待之太公請樹槐於王門内有益者入無益者距之穆天子傳天子遂驅升於弇山乃紀丌跡於弇山之石而樹之槐睂曰西王母之山管子五沃之土宜槐晏子春秋齊景公有所愛槐令吏守之令曰犯槐者刑傷槐者死有醉而傷槐者且加刑焉其女告晏子曰妾聞明君不為禽獸傷人民不為草木傷禽獸不為野草傷禾苗今君以樹木之故罪妾父恐鄰國謂君愛樹而賤人也晏子入言之公令罷守槐之役廢傷槐之法出犯槐之囚莊子隂陽錯行則天地大絯於是乎有雷有霆水中有火乃焚大槐註言隂陽氣鬱則雷霆奪擊水中起火而焚大槐槐者東方之木老而生火在人身則謂龍雷之火難以直折是已鄒子秋取槐檀之火原淮南子老槐生火增淮南子夫天之所覆地之所載六合所包隂陽所煦雨露所濡道德所扶此皆生一父母而閲一和也是故槐榆與橘柚合而為兄弟三輔黄圖元始四年起明堂辟雍為博士舍三十區為㑹市但列槐樹數百行諸生朔望㑹此市各持其郡所出物及經書相與賈買雍容揖讓議論槐下侃侃誾誾甘泉谷北岸有槐樹今謂玉樹根榦盤峙三二百年木也楊震闗輔古語云耆老相傳咸以謂此樹即揚雄甘泉賦所謂玉樹青葱也春秋元命苞樹槐聽訟其下註槐之言歸也情見歸實也魏徳論武帝執政日白雀集於庭槐西京雜記上林苑槐六百四十株守宫槐十株抱扑子槐子服之補腦令人髮不白而長生汝南先賢傳新蔡鄭敬字次都為郡功曹都尉高懿㕔事前有槐樹白露類甘露者懿問掾屬皆言是甘露敬獨曰明府政未能致甘露但樹汁耳原顏氏家訓庾肩吾常服槐實年七十餘目看細字鬚髮猶黒天𤣥生物簿老槐生丹增洛陽伽藍記永寧寺四門外樹以青槐亘以緑水京邑行人多庇其下劉賔客嘉話録賈嘉隱年七嵗以神童召見時長孫無忌徐司空勣於朝堂立語徐戲之曰吾所倚何樹嘉隱曰松樹徐曰此槐也何言松嘉隱云以公配木何得非松長孫復問吾所倚何樹曰槐樹公曰汝不能復矯對耶嘉隱曰何煩矯對但取其鬼木耳國史補貞元中度支欲砍取兩京道中槐樹造車更栽小樹先符牒渭南縣尉張造造批其牒曰近奉文牒令伐官槐若欲造車豈無良木恭惟此樹其來久逺東西列植南北成行輝映秦中光臨闗外不惟用資行者抑亦曾䕃學徒㧞本塞源雖有一時之利深根固蒂須存百代之規况神堯入闗先駐此樹𤣥宗幸嶽見立豐碑山川宛然原野未改且召伯所憇尚自保全先皇舊遊寧宜翦伐思人愛樹詩有薄言運斧操斤情所未忍付司具狀牃上度支使仍具奏聞遂罷造尋入臺酉陽雜俎夏州惟一郵有槐樹數株監州或要葉行牒求之相國李石河中永樂里有宅庭槐一本抽三枝直過堂前屋脊一枝不及相國同堂兄弟三人曰石曰程皆登第宰執唯福一人厯七鎮使相而已京西持國寺前有槐樹數株金監買一株令所使巧工解之及入内迴工言木無他異金大嗟惋令膠之曰此不堪矣但使爾知予工也乃别理解之毎片一天王塔㦸成就上都渾瑊宅㦸門内一小槐樹有穴大如錢每夜月霽後有蚓如巨臂長二尺餘白頸紅斑領數百條如索縁樹枝條及曉悉入穴或時衆鳴往往成曲異聞録淳于棼家廣陵郡宅南有大古槐枝榦條密棼與羣豪大飲其下貞元七年因沉醉致疾二友扶之歸卧夢二使曰槐安國王奉邀棼隨二使指古槐驅入穴中題曰大槐安國入見王妻以次女瑤芳號金枝公主有羣女曰華陽姑青溪姑上仙子下仙子輩皆侍從命守南柯郡棼至郡二十餘年使者送出穴遂寤斜日未隱於西垣餘尊尚湛於東牖夢中倐忽若度一世矣因與客尋槐下穴洞然明朗可容一榻有二大蟻素翼朱首長可二寸乃槐安王又窮一穴直上南枝即南柯郡也原盧氏雜説裴晉公度在相位日有人寄槐癭一枚欲削為枕時郎中庾威世稱博物召請别之庾捧玩良久白曰此槐癭是雌樹生者恐不堪用裴曰郎中甲子多少庾曰某與令公同是甲辰生公笑曰郎中便是雌甲辰中朝故事天街兩畔多槐俗號為槐街增傳載白居易云忠州荔枝一株槐一株自忠之南更無槐自忠之北更無荔枝南部新書都堂南門道東古槐垂隂至廣或夜聞絲竹之音則省中有入相者俗謂音聲樹青箱雜記晉陽都城北角有槐木一日三榮三悴名臣言行録王晉公祐事太祖知制誥以魏州節度使符彦卿事坐貶華州祐赴貶時親朋送于都門外謂公曰意公作王溥官職矣以太祖遣使魏州之日許以宰相之職也祐笑曰祐不做皃子二郎必做二郎者文正公也祐素知其必貴因手植三槐於庭曰吾子孫必有為三公者已而果然天下謂之三槐王氏筆録熙寧中吳仲庶知成都一日文明㕔前大槐枝葉皆出煙色青白如焚香至暮方止木如故厯訪儒士莫知其説惟楊損之云隂符經稱火生於木禍發必克疑將有將士作難而不成者後月餘果有告戍卒議亂者皆獲玉堂閒話長安城有孫家宅居之數世堂室甚古其堂前一柱忽生槐枝孫氏初猶障閉之不欲人見朞年之後漸漸滋茂以至柱身通體變易壊其屋上衝秘藏不及衣冠士庶之來觀者車馬塡咽不久偓處巖廊居節制人以為應三槐之朕亦甚異也其孫愇備言之幕府燕閒録吕䝉正方應舉僦舍建隆觀縁事入洛鎻室而去自冬渉春方囘啓户視之床前槐枝叢生高二三尺䝉茸合抱是年登科十年作相五色線審雨堂古槐中蟻穴也盧汾常叩樹有一女子衣青衣出引汾入見㕔堂危豁有堂題曰審雨堂云全唐詩話翁承贊乾寧進士也唐語云槐花黄舉子忙承贊有詩曰雨中􅑽㸃望中黄勾引蟬聲送夕陽憶得當年隨計吏馬蹄終日為君忙嵩遊記少林寺秦封槐風摧二十年矣今寺東一槐亦可數百年黠僧往往謬指以誇遊人泰山記延禧殿唐槐一株中空而半枯集藻銘増宋蘇軾三槐堂銘嗚呼休哉魏公之業與槐俱萌封植之勤必世乃成既相眞宗四方砥平歸視其家槐隂滿庭吾儕小人朝不及夕相時射利皇䘏厥徳庶幾僥倖不種而獲不有君子其何能國王城之東晉公所廬鬱鬱三槐惟徳之符嗚呼休哉明李東陽槐軒銘并序太子太保吏部尚書四明屠公於堂之南軒新闢北户户外抵堂堂之隙僅足容武有一槐適生其間縁户而起其高出屋上可二三丈則布為繁柯覆為重隂方暑盛時南枝透徹清入几格不知赤日之當午也公顧而樂之若恨相見之晩者乃名其軒曰槐軒賦以著志侍郎鄆城佀公姑蘇呉公皆和之出以示諸卿大夫和者因益衆屠公則以銘屬予予昔奉使南都禮部尚書金谿徐公時以學士掌翰林院事指所植三槐謂予曰此樹既枯而復茂意院中有當大用如宋王晉公所徴者屬予𨽻晉軒二大字扁於􅎝際故公是時屬予而屠公見屬者亦以此也惟王氏以忠信仁厚饗功名富貴之盛其祥在物蓋一家之兆也然猶足以被文字傳久逺今兹槐所托顯於官署天下人材所萃集之地其於氣運殆將有徴焉以此例彼宜亦有不得不傳者也且一物之微而顯晦出處繫於時者如此屠公感物用世觸類而取之則凡魁梧博大之材樸茂敦實之器固將掄簡甄拔以為國家天下用彼山林草澤抱徳而隱處者亦豈肯遺逺棄置使之有不遇之歎哉由是觀之則公之名望勲業當不為一家兆也從而為之銘銘曰昔聞其三今見其一彼槐何知倐異今昔昔在相門今在公署彼槐何心實同出處唯天生材氣運使然家運以百國運則千惟曹有銓若藪若淵彼材攸居視厥陶甄材具小大槐其大者若作棟梁此物誰舍或蔽若捐或顯若庸時哉時哉實維其逢公軒則嘉我銘弗工公名之傳與軒無窮頌增晉摯虞連理槐頌東宫正徳之内承華之外槐樹二枝連理而生二榦一心以蕃本根賦增魏文帝槐賦有序文昌殿中槐樹盛暑之時余數遊其下美而賦之王粲直登賢門小閣外亦有槐樹乃就使賦焉有大邦之美樹惟令質之可佳托靈根于豐壤被日月之光華周長廊而開趾夾通門而駢羅承文昌之邃宇望迎風之曲阿修榦紛其璀錯緑葉萋而重隂上幽藹而雲覆下莖立而擢心伊暮春之既替即首夏之初期鴻雁遊而送節凱風翔而迎時天清和而溫潤氣恬淡以安治違隆暑而適體誰謂此之不怡曹植槐賦羡良木之華麗爰獲貴於至尊憑文昌之華殿森列峙乎端門觀朱榱以振條據文陛而結根暢沈隂以溥覆以明后之垂恩在季春以初茂踐朱夏而乃繁覆陽精之炎景散流耀以增鮮王粲槐賦惟中唐之竒樹稟天然之淑姿超疇畝而登殖作階庭之華暉形禕禕以條暢色采采而鮮明豐茂葉之幽藹履中夏而敷榮既立本於殿省植根柢其𢎞深鳥願棲而投翼人望庇而披襟晉摯虞槐賦覽坤元之產植莫兹槐之為貴爰表庭而樹門膺論道而正位爾乃觀其誕狀察其攸居豐融湛䨴蓊鬱扶疎上拂華宇下臨修渠湊以夷徑帶以通衢樂䨇遊之黄鵠嘉别摯之王雎春棲教農之鳥夏憇霮哺之烏若夫龍升南陸火集正陽恢兹鬱陶静暑無方鼓柯命風振葉致凉開明過于八闥兮重隂踰乎九房庾儵大槐賦有序余去許都將歸洛京舎於嵩岳之下而植斯樹焉遂作賦曰有殊世之竒樹生中岳之重阿承蒼昊之純氣吸后土之柔嘉若夫赤松王喬馮夷之倫逍遙茂䕃濯纓其濵望輕霞而增舉垂高暢之清塵若其含眞抱朴曠世所希降夏后之卑室作唐虞之茅茨潔昭儉以矯奢成三王之懿資故能著英聲於來世超羣侣而垂暉仰瞻重榦俯察其隂逸葉横被流枝蕭森下覆靈沼上蔽高岑孤鵠徘徊寡鶴悲吟清風時至惻愴傷心將騁軌以輕運安久留而涕淫五言古詩增魏繁欽槐樹詩嘉樹吐翠葉列在䨇闕涯旖旎隨風動柔色紛陸離唐白居易庭槐南方饒竹樹唯有青槐稀十種七八死縱活亦支離何此郡庭下一株獨華滋䝉䝉碧煙葉嫋嫋黄花枝我家渭水上此樹䕃前墀忽向天涯見憶在故園時人生有情感遇物牽所思樹木猶復爾况見舊親知宋歐陽修寄生槐檜為凌雲材槐實凡木賤奈何柔脆質累此孤高榦龍鱗老蒼蒼䑕耳光燦燦因縁初莫原感吒徒自歎偷生由附託得勢争葱蒨方其榮盛時曾莫見眞贋欲知窮悴節宜試以霜霰萌芽起微蘖辨别乖先見翦除初非難長養遂成患雖然根性殊常恐枝葉亂惟應植者深幸不習而變含容因有害勦絶須明斷惟當慎斤斧去惡無傷善王安石與平甫同賦槐氷雪泊楚岸萬株同飄零春風都城居初見葉青青嵗行如車輪䕃翳忽滿庭秋子今在眼何時動江舲蘇軾御史臺槐憶我初來時草木向衰歇高槐雖經秋晩蟬猶抱葉淹留未云幾離離見疎莢棲鴉寒不去哀呌飢啄雪破巢帶空枝疎影挂殘月豈無兩翅羽伴我此愁絶明呉寛槐東園憶初購糞壤頻掃除牆下古槐樹憔悴色不舒况遭衆攀折高枝且無餘愛䕶至今日濃隂接吾廬數歩已仰視偉哉鉅人如非藉此䕃芘誰結幽亭居立為衆木長奴僕檉與榆七言古詩增宋韓維奉同原甫槐隂行天門觀闕䨇凌霞下有馳道開平沙高槐左右覆朱梐緑隂翠氣相䝉遮朝囘亘雲下寶騎遊散掣電奔香車我慚太學官况冷旦暮出此驅疲騧清風吹凉南就局炎日轉景東還家昏然百事不知省空復春葉零秋華元迺賢孔林瑞槐歌并序先聖墓林古槐一章枝榦偃蹇膚理若鐫刻篆籕龍鳳細如絲髮雖善畫者莫能狀其竒巧襲封衍聖公愈加培植見者咸加敬愛因以紀瑞云闕里隂隂槐樹古百尺長柯挾風雨密葉蟠空擁翠雲深根貫石流瓊乳蒼皮皴蝕紋異常天成篆籕分毫芒游絲縈錯科斗亂雲氣飛動龍鸞翔嬴秦書焚士坑僇幾歎遺經藏壁屋千年聖道復昭明喜見文章出嘉木神明元胄嗣上公雨露滋沐深培封清隂如水石壇靜彈琴樹底歌薫風明李東陽成國公家槐樹歌東平王家足喬木中有老槐寒更緑拔地能穿千丈雲盤空却䕃三重屋憶昔二王初種時高門駟馬相追隨五朝恩露簪纓重四世威聲草木知世間植物因人瑞培植根深乃天意向月長留宿鳳巢排霜故作蟠虯勢舞袖飛花遶北堂屯隂列㦸森成行壁窓雨過看秋霽紗㡌風低坐晩凉古來匠石匪廊廟堂中絲竹應同調馮氏空傳大樹名王公豈待三槐兆木天老朽舊通家樹猶如此我堪嗟願公人好樹亦好長共河山閲嵗華五言律詩增唐李嶠槐暮律移寒火春宫長舊栽葉生馳道側花落鳳庭隈烈士懐忠觸鴻儒訪業來何當赤墀下疎榦擬三台宋朱長文公堂槐五紀栽培後三春長育中靈根蟠故國密葉䕃儒宫患與盤斤逺歌宜魯藻同先儒垂意厚期此出三公明呉寛追和朱樂圃蘇學公堂槐密葉連街上孤根寄學中名揚蘇子記隂覆魯侯宫既久今何在惟喬自不同曾沾時雨化多幸遇朱公七言律詩增唐羅鄴槐花行宫門外陌銅駝兩畔分栽此最多欲到清秋近時節爭開金蕊向闗河層樓寄恨飄珠箔駿馬憐香撼玉珂愁殺江湖隨計者年年為爾剰奔波呉融岐下寓居見槐花落因寄從事纔開便落不勝黄覆著庭莎襯夕陽只共蟬催䨇鬂老可知人已十年忙曉窓須為吟秋興夜枕應敎夢帝鄉蜀國馬卿看從獵肯將閒事入凄凉宋梅堯臣宫槐漢家宫殿䕃長槐嫩色葱葱不染埃天仗龍旂穿影去鈎陳豹尾拂枝來青蟲掛後蜂銜子素月生時桂並栽我意方同杜工部冷淘唯喜葉新開張耒䨇槐晩秀三月一日初見新葉東皇無處著繁華亦復分張到我家他日老蒼悲敗枿今晨嫩緑出新芽禿翁承弁纎纎髮村婦縈鬟草草花桃李蹊中人跡絶緑隂門巷正藏鴉明馬弓陳槐古本凌空百尺過根盤如石鐵為柯濃隂不碍金蓮座虛籟猶傳玉樹謌倦客解衣頻徙倚老禪卓錫定摩挲雲門寺裏梁朝柏身上苔痕想更多五言絶句原唐王維宫槐陌仄徑䕃宫槐幽隂多緑苔譍門但迎掃畏有山僧來裴迪宫槐陌門前宫槐陌是向欹湖道秋來山雨多落葉無人掃增宋蘇軾槐采擷殊未厭忽然已成隂蟬鳴看不見鶴立赴還深楊萬里槐隂作官街緑花開舉子黄公家有三樹猶帶鳳池香明李東陽庭槐去年長比人今嵗高過屋好雨東南來依稀滿庭緑七言絶句增唐鄭谷槐花毿毿金蘂撲晴空舉子魂驚落照中今日老郎猶有恨昔年相謔十秋風宋范成大夏日田園雜興槐葉初匀日氣凉葱葱䑕耳翠成䨇三公只得三株看閒客清隂滿北窓元鄭氏允端庭槐風轉庭槐拂檻開緑隂如染淨無埃婦人不作功名夢閑看南柯蟻往來詩散句增唐李濤落日長安道秋槐滿地花杜甫青青高槐葉采掇付中厨白居易槐花滿田地僅絶人行跡薄暮宅門前槐花深一寸韓愈泥雨城東路夏槐作雲屯宋梅堯臣古縣太行下老槐三四株呉儆僧房因石室蟻穴夢槐安唐韓愈樂游下曯無逺近緑槐萍合不可芟宋司馬光當時秋天落宫槐今此婆娑皆合抱梅堯臣六月御溝馳道間青槐花上夏雲山蘇軾庭槐似識天顏喜舞破清隂作兩龍金高士談數樹高槐㪚乳鴉時於缺處見黄花宋謝莊秋槐響寒音梁劉孝綽青槐秋葉疎周庾信學市舊槐疎細火落空槐唐崔日知霧披槐市靄李嶠槐煙乘曉散凌敬宫槐散緑穂王維槐隂清夏首孟浩然庭槐寒影疎白居易煙槐凝緑姿滿地槐花秋韓愈槐密鶩長䕃孟郊高槐結浮隂朱慶餘雨餘槐穟重顧非熊寒色老槐稀鄭谷高槐蘂半黄宋陸游槐晩纎纎緑元袁桷槐明金瑣碎魏無名氏青槐夾道多塵埃唐韓愈夾道疎槐出老根朱慶餘緑槐花墮御溝邊羅鄴古道槐花滿樹開韋莊臨路槐花七月初宋蘇軾風動槐龍舞交翠細細槐花暖欲零黄庭堅槐催舉子看黄花陸游日長風舞一庭槐呉儆緑槐庭院鎖薫風金蔡珪槐幄隂隂一畝凉麻九疇槐花滿地黄金冷别録原種植收熟槐子曬乾夏至前以水浸生芽和麻子撒當年即與麻齊刈麻留槐别竪木以繩攔定來年復種麻其上守宫槐春月從根側分小本移種製用初生嫩芽煠熟水泡去苦味可薑醋拌食曬乾亦可作飲代茶以槐子和穄黍種畦中至冬放火燒過明年取苖食如取枸杞苖法入土深割上糞澆遍遍如此至秋末常取芽食又且無蟲若根大即劚去併以利鍬鋤深剗遍便上糞待春初雨過種之取一寸槐芽數斤水煮如泥去滓入鹽一升煮乾炒黑空心擦牙白而固終身無齒患庾肩吾服槐實法十月上已日取子去一子及五子者餘納黑牛膽中百日後空心服初一日一粒以後日增一粒至十六日後日減一粒檀原檀善木也其字從亶亶者善也有黄白二種江淮河朔山中皆有葉如槐皮青而澤肌細而膩體重而堅狀與梓榆莢蒾相似材可為車輻及斧鎚諸柯臘月分根傍小枝種江南有一種木至夏不生葉忽然葉開當有大水農人候之以占水旱號為水檀又有一種葉如檀高五六尺生高原四月開花正紫亦名檀樹其根如葛彚考增詩鄭風無折我樹檀魏風坎坎伐檀兮寘之河之干兮漢書註孟康曰攙檀檀别名索隱曰皇覽云孔子墓後有攙檀樹也唐書南蠻傳單單在振州東南多羅磨之西木多白檀山海經鳥危之山其隂多檀楮讙山其木多檀淮南子十月官司馬其樹檀論衡楓桐之樹生而速長故其皮肌不能堅剛樹檀以五月生葉後彼春榮之木其材强勁車以為軸長樂縣志天王寺唐建初有檀木泝江湖而上牧童取之夜中發光里人林錡夢其木謂我北方毗沙門天王遂捨宅為寺别録原製用皮和榆皮為粉食可救荒斷食附録紫檀增古今註紫栴木出扶南色紫亦謂之紫檀格古要論出交趾廣西湖廣性堅新者色紅舊者色紫有蟹𤓰紋新者以水濕浸之色能染物集藻詩㪚句增宋歐陽修紫檀皮軟禦春寒附録檕蒾增陸璣詩疏檕迷一名挈橀爾雅作榽橀爾雅云魄榽橀註云魄大木細葉似檀今河東多有之齊人諺曰上山所檀榽橀先殫鄭註按此俗呼朴樹其木如檀子大如梧桐子而黄本草一名莢迷一名羿先蘇恭曰莢蒾葉似木槿及榆作小樹其子如疏溲兩兩相對而色赤所在山谷有之陳藏器曰生北土山林中皮堪為索附録駮馬增陸璣詩疏駮馬梓榆也其樹皮青白駮犖遙視似駮馬故謂之駮馬崔豹古今註六駮山中有木葉似豫章皮多癬駮爾雅翼今之檀木皮正青而澤與莢蒾及此木相似彚考增詩秦風隰有六駁御定佩文齋廣羣芳譜卷七十四
