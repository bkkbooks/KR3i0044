body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷七十八木譜柳三集藻詞增宋晏幾道浣溪沙二月和風到碧城萬條千縷巧相迎舞煙眠露過清明妝鏡巧眉偷葉樣歌樓妍曲借枝名晚秋霜霰莫無情朱敦儒採桑子人如濯濯春楊柳徹骨風流脫體溫柔牽繫多情卒未休最憐恰似新眠起雲雨初收斜倚瓊樓葉葉眉心一樣愁柳枝江南岸柳枝江北岸柳枝折送行人無盡時恨分離柳枝酒一杯柳枝淚雙垂柳枝君到長安百事迷幾時歸柳枝原吕本中清平樂柳塘新漲艇子操雙槳間倚曲樓成悵望是處春愁一樣傍人幾點飛花夕陽又送棲鴉試問畫樓西畔暮雲恐近天涯增翁元龍醉桃源千絲風雨萬絲晴年年長短亭暗黃看到緑成隂春由他送迎鶯思重燕愁輕如人離别情繞湖煙冷罩波明畫船移玉笙歐陽修朝中措平山欄檻倚晴空山色有無中手種堂前楊柳别來幾度春風文章太守揮毫萬字一飲千鍾行樂直須年少尊前看取衰翁梅堯臣玉樓春天然不比花含粉約月微黃春色嫩小橋低映欲迷人間倚東風無奈困煙姿最與章臺近冉冉千絲誰結恨狂鶯來往戀芳隂不道風流真態盡歐陽修玉樓春黃金㺯色輕於粉濯濯春條如水嫩為緣力薄未禁風不奈嬌多長似困腰柔乍怯人相近眉小未知春有恨勸君著意惜芳菲莫待行人攀折盡僧仲殊虞美人一番雨過年芳淺裊裊心情懶章臺人過馬嘶聲小眉不展恨盈盈怨清明煙柔露軟湖東岸惱亂春風慣一聲鶯是故園鶯及至而今始得聞又多情張先蝶戀花移得緑楊栽後院學舞宫腰二月青猶短不比灞陵多送遠殘絲亂絮東西岸幾葉小眉愁不展莫唱陽關真個人腸斷分付與春春細看條條盡是離人怨賀鑄蝶戀花為問浣溪橋畔柳拂水長條幾贈行人手一樣葉眉偏解皺白綿飛盡因誰瘦今日離亭還對酒唱斷青青好去休回首美蔭向人疏似舊何須更待秋風後原周邦彥蝶戀花愛日輕明新雪後媚眼星星漸欲窺窗牖不待長條傾别酒一枝已入離人手淺淺柔黃輕蠟透過盡氷霜便與春爭秀強對青銅簪白首老來風味難依舊增周邦彥蝶戀花桃蕚新香梅落後葉暗藏鴉冉冉垂亭牖舞困低迷如著酒輕絲偏近遊人手雨過朧朧斜日透客舍青青特地添明秀停話揚鞭回别首渭城荒遠無交舊方千里蝶戀花小閣隂隂人寂後翠幕搴風燭影搖疏牖夜半霜寒初索酒金刀正在柔荑手絲薄粉香光欲透小葉尖新未放雙眉秀記得長條垂鷁首别離情味還依舊元張雨蝶戀花誰道鵝兒黃似酒對酒新鵝得似垂絲柳鉛粉泥金初染就年年春色消時候一縷柔情能斷否雨重煙輕無力縈窗牖試看溪南隂十畝落花都聚紅雲帚宋劉鎮行香子雲葉煙條天與多嬌算風流張緒難消惱人春思正自無聊賴斂愁眉酣醉眼減圍腰風絮還招蝶㺯鶯嘲最關情是短長橋解驂分袂催上蘭橈更緑波平紅日墜碧雲遙李石謝池春煙雨池塘緑影乍添春漲鳯樓髙珠簾捲上金柔玉困舞腰肢相向似玉人瘦時模樣離亭别後試問陽關誰唱對青春翻成悵望重門靜院度香風屏幛吐飛花伴人來往秦觀江城子西城楊柳㺯春柔動離憂淚難收猶記多情曽為繫歸舟碧野畫橋當日事人不見水空流韶華不為少年留恨悠悠幾時休飛絮落花時候一登樓便做春江都是淚流不盡許多愁談宣子江城子嫩黃初染緑初描倚春嬌索春饒燕外鶯邊想見萬絲搖便作無情終軟美天賦與眼眉腰短長亭外短長橋駐金鑣繫蘭橈可愛風流年紀可憐宵辦得重來攀折後煙雨暗不辭遙僧仲殊驀山溪黃金線軟玉露生輕潤青豆破初芽拂煙䀶一枝獨嫩東風著意不放舞時間春漸暖柔無力悠悠怨和困旗亭帶晚又是清明近惹盡别離愁約啼鶯深深與問灞陵傷感那更入陽關攀折處我無心行人自多恨蘇軾洞仙歌江南臘盡早梅花開後分付新春與垂柳細腰肢自有入格風流仍更是骨體清英雅秀永豐坊那畔盡日無人惟見金絲㺯晴晝斷腸是飛絮時緑葉成隂無個事一成消瘦又莫是東風逐君來便吹散眉間一點春皺蔣捷洞仙歌枝枝葉葉受東風調㺯便是鶯穿也微動自鵝黃千縷數到飛綿間無事誰𬋩將春迎送輕柔心性在教得遊人酒舞花吟恣狂縱更誰鸞鏡裏貪學纎蛾移來傍妝樓新種總不道江頭鎖清愁正雨渺煙茫翠隂如夢章謙亨念奴嬌垂楊得地在樓臺側畔無人攀折不似津亭舟繫處只伴客愁離别絲過搖金帶鋪新翠雅稱鶯調舌芳筵相映最宜斜挂殘月却得連日春寒未教輕滚一片庭前雪應恨張郎今老去難比風流時節醉眼渾醒愁眉都展舞困腰肢怯有時微笑把伊綰個雙結元趙文瑞鶴仙緑柳深似雨西湖上舊日愁絲恨縷風流似張緒羡春風依舊年年眉嫵宫腰楚楚倚畫欄曽鬬妙舞想如今似我零落天涯却悔相妬痛絶長秋别後楊白花飛舊腔誰譜年光暗度凄涼孰訴記菩提寺路假家橋水何時重到夢處况柔條老去爭奈繫春不住宋髙觀國解連環露條煙葉惹長亭舊恨幾番風月愛細縷先窣輕黃漸拂水藏鴉翠隂相接纎軟風流眉黛淺三眠初歇奈年華又晚縈絆遊蜂絮飛晴雪依依灞橋怨别正千絲萬縷難禁愁絶悵嵗久應長新條念曽繫花驄屢停蘭楫㺯影搖晴恨間損春風時節隔郵亭故人望斷舞腰瘦怯張景修選冠子嫩水挼藍遙堤影翠半雨半煙橋畔鳴禽㺯舌夢草縈心偏稱謝家池館紅粉墻頭步搖金縷纎柔舞腰低軟被和風搭在欄干終日畫簾髙捲春易老細葉舒眉輕花吐絮漸覺緑隂成幔章臺繫馬灞水維舟誰念鳯城人遠惆悵故國陽關杯酒飄零惹人腸斷恨青青客舍江頭風笛亂雲空晚周邦彥蘭陵王柳隂直煙裏絲絲弄碧隋堤上曽見幾番拂水飄綿送行色登臨望故國誰説京華倦客長亭路年去嵗來因折柔條過千尺間尋舊蹤迹又酒聼哀絃燈照離席梨花榆火催寒食愁一箭風快半篙波暖回頭迢遞便數驛望人在天北悽惻恨堆積漸别浦縈回津堠岑寂斜陽冉冉春無極記月榭携手露橋聞笛沉思前事似夢裏淚暗滴别録增漢書周亞夫傳以河內守亞夫為將軍軍細柳晉書王恭傳恭美姿儀人多愛悅或目之云濯濯如春月柳文苑傳顧愷之尤信小術以為求之必得桓玄嘗以一柳葉紿之曰此蟬所翳葉也取以自蔽人不見已愷之喜引葉自蔽玄就溺焉愷之信其不見已也甚以珍之隋書柳機傳機字匡時初機在周與族人昂俱歷顯要及機昂並為外職楊素時為納言用事因上賜宴素戲機曰二柳俱摧孤楊獨聳坐皆歎笑陳書陸瓊傳瓊第三子從典年十三作柳賦其詞甚美瓊時為東宫管記宫僚並一時俊偉瓊示以此賦咸竒其異才南史徐嗣伯傳時有薛伯宗善徙癰疽公孫泰患背伯宗為氣封之徙置齋前柳樹上明旦癰消樹邊便起一瘤如拳大稍稍長二十餘日瘤大膿爛出黃赤汁斗餘樹為之痿損宣室志盧虔於古宅中遇柳將軍者驗之乃一枯柳樹楚國先賢傳孫敬到洛在太學左右一小屋安止母然後入學編柳為簡以寫經睡則懸頭於梁齊民要術正月元旦取柳枝懸户以驅百邪夢書柳為使者夢當出逰也青瑣詩話韓翃少負才名鄰居有李姓者每將妓柳氏至其居必邀韓同飲既久愈狎柳每以隙壁窺韓所往來語李曰韓秀才甚貧然所與遊皆名人是必不久貧賤李深頷之一日具饌邀韓酒酣謂韓曰秀才當今名士柳氏當今名色以名色配名士不亦可乎遂命柳從坐接韓未幾成名從辟淄青置之都下連三嵗不果迓寄詩曰章臺柳章臺柳往日依依今在否縱使長條似舊垂也應攀折他人手柳答曰楊柳枝芳菲節可恨年年贈離别一葉隨風忽報秋縱使歸來不堪折後果為番將沙吒利所劫翃會入中書道逄之謂永訣矣是日臨淄大校置酒疑翃不樂具告之有虞候將許俊以義烈自許即詐取得之時沙吒利寵殊等翃懼禍欣於侯希逸以事聞諸朝詔柳氏歸翃原酉陽雜俎河陽城南百姓王氏莊有小池池邊巨柳數株開成末葉落池中旋化為魚大小如葉食之無味雲仙雜記李固言未第時行古柳下聞有彈指聲固言問之應曰吾柳神九烈君也已用柳汁染子衣矣科第無疑得藍袍當以棗糕祀我固言許之未幾狀元及第古今詩話樊素善歌小蠻善舞樂天賦詩有曰櫻桃樊素口楊柳小蠻腰至於髙年又賦詩曰失盡白頭伴長成紅粉娃因為楊柳詞以託意云一樹春風萬萬枝嫩于金色軟于絲永豐東角荒園裏盡日無人屬阿誰及宣宗朝國樂唱是詞上問誰詞永豐在何處左右具以對遂因東使命取永豐柳兩枝植於禁中白感上知其名且好尚風雅又為詩云一樹衰殘委泥土雙枝移種植天庭定知此後天文裏柳宿光中見兩星洛下文士無不繼作者增續前定録柳宗元自永州司馬徴至京師意望録用一日詣卜者問命且告以夢曰余柳姓也昨夢柳樹仆地其不祥乎卜者曰無苦但憂遠官耳夫生則柳樹仆則柳木木者牧也其牧柳州乎卒如其言原物類相感志清明柳條可止醬醋潮溢增苕溪漁隱叢話鄭谷柳詩云半煙半雨溪橋畔間杏間桃山路中會得離人無限意千絲萬絮惹春風或戲謂此詩乃柳謎子觀者試一思之方知其善謔也原麗情集柳枝娘洛中里妓也因誦李義山燕臺詩乃折柳結帶贈義山乞詩增論畫瑣言宋人多寫垂柳又有點葉柳垂柳不難畫只要分枝得勢耳點葉柳之妙在樹頭圓鋪處只以汁緑漬出又要森梢有迎風搖揚之意其枝須半明半暗又春三月樹未垂條秋九月柳已衰颯俱不可混設色亦須體此意也原種植正二月皆可栽諺云插柳莫教春知謂宜立春前也百木惟柳易栽易插但宜水濕之地尤盛一法柳栽近根三二寸許鑽一竅用杉木釘拴之出其兩頭各二三寸埋深尺餘杵實永不生刺毛蟲且防偷拔之患先於坑中置蒜一瓣甘草一寸永不生蟲常以水澆必數條俱發留好者三四株削去稍枝必茂其餘皆削去增種樹書種柳取青嫩枝條如臂大長六七尺燒下二三寸埋二尺以上順插為柳倒插為楊附録柳絮原柳春初生柔荑如筋長寸餘開黃花鱗起荑上甚細碎漸次生葉至晚春葉長成花中結細子如粟米大細扁而黑上帶白絮如絨名柳絮又名柳絨隨風飛舞著毛衣即生蟲入池沼隔宿化為浮萍花味苦寒無毒主治風水黃疸四肢攣急膝痛收之貼灸諸瘡甚良絮主治惡瘡金瘡潰癰逐膿血止血療痺柔軟性涼作縟與小兒臥甚佳彚考原晉書列女傳王凝之妻謝氏字道韞安西將軍奕之女也聰識有才辨嘗內集俄而雪驟下叔父安曰何所似也安兄子朗曰散鹽空中差可擬道韞曰未若柳絮因風起安大悅增捫虱新話語曰南人不識雪向道似楊花然南方楊實無花以此知南人不識雪則亦不識楊花矣西溪叢語楊柳二種楊樹葉短柳樹葉長花即初發時黃蕊子為飛絮今絮中有小青子著水泥沙灘上即生小青芽乃柳之苖也東坡謂絮化為浮萍誤矣全唐詩話韋蟾亷問鄂州罷賔僚祖餞蟾曽書文選句云悲莫悲兮生别離登山臨水送將歸以箋毫授賔從請續其句逡巡有妓泫然起曰某不才不敢染翰欲口占兩句韋大驚異令隨念云武昌無限新栽柳不見楊花撲面飛坐客無不嘉歎韋令唱作楊柳枝詞花經楊花五品五命原南部煙花記陳後主與張麗華遊後園有柳絮點衣麗華謂後主曰何能點人衣曰輕薄物誠卿意也麗華笑而不答玄宗幸建章見楊花點妃子衣曰似解人意集藻賦增晉伍緝之柳花賦步江臯兮騁望感春柳之依依垂柯葉而雲布楊零花而雪飛或風回而遊薄或霧亂而飄零野淨穢而同降物均色而齊明五言古詩增唐韋應物歎楊花空濛不自定况值暄風度舊賞逐流年新愁忽盈素才縈下苑曲稍滿東城路人意有悲歡時芳獨如故明髙啓柳絮輕盈易飄泊思逐春雲亂已拂武昌門還縈灞陵岸沙頭雀啄墮水面魚吹散官樹曉茫茫哀歌腸欲斷七言古詩增唐戴叔倫柳花歌送客往桂陽滄浪渡頭柳花發斷續因風飛不絶搖煙拂水積翠間綴雪含霜誰忍攀夾岸紛紛送君去鳴棹孤尋到何處移家深入桂水源種柳新成花更繁定知别後消散盡却憶今朝傷旅魂原楊巨源楊花落北斗南回春欲老紅英落盡緑尚早韶風淡蕩無所依偏惜垂楊作春好此時可憐楊柳花縈盈艷曵滿人家人家女兒出羅幕靜掃玉除待花落寶環纎手捧更飛翠羽輕裙承不著歷厯瑶琴舞袖陳菲紅拂黛憐玉人東園桃李芳已歇猶有楊花嬌暮春增元袁桷楊花曲上都楊柳瘦且堅葉葉不展圓如錢年年飛花作端午遠客乍見心茫然上都飄雪不知數此花與雪相旋舞黃鸝聲絶孤雁鳴萬騎千車互來去手攀短條心欲絶宛轉成毬恨初結寒風飛蓬卷車輪點點相亞隨明滅南鄰蕩子衣夜單曉望出日如黃綿辛勤掇拾不敢棄願刮龜毛同作氊胡天遊楊花吟吳江春水拍天涯江上風吹楊柳花花飛滿空無處所隨風直渡吳江水渡水隨風太有情縈花惹草恣輕盈狂如舞蝶穿花徑細逐流鶯度綺城綺城樓閣連天際楊花飛入千門去飛去飛來稍覺多紛紛如雪奈君何珠簾繡箔深深見舞榭妝樓處處過樓中美人春睡起愁見楊花思蕩子蕩子飄零去不歸楊花嵗嵗點春衣夢魂不識天涯路願作楊花片片飛張憲楊花詞東風吹春春不醒桃花杏花空娉婷萬絲翦緑暗如霧千里相思長短亭亭前女兒十六七手挽柔條背春日六街馬蹄踏黃塵雪花漫天愁殺人明王廷相楊花篇廣陵三月可憐春青青楊柳蘸湖新長條不綰思歸客散作飛花愁殺人浣紗艷艷吳江女拾取香毬連袂舉花點輕狂只欲飛徒欲多情亂心緒吳宫隋苑煙裊裊别有豪華競春早飛璚流雪灑行旌日暮迷却長楊道江頭一樹白離離打陳隨風趁落暉漫天撲地何時住困入滄波却怨誰朱陽仲楊花篇江南二三月楊花競芳華寂寞長條攀折盡緑絲飛來千片花千片飛飛西復東白雪晴雲晝溟濛風吹滿空翳白日散入千家池館中池館樓臺媚春晝珠箔重重散花柳白玉筵中拂畫衣琉璃杯裏沽春酒落日千家春酒闌飛花拂拂玉欄干髙處餘風常不定低邊日氣轉猶寒秦女樓中妝鏡寂王孫道上相思憶詎將春色報深閨還惹遊絲度南陌南陌深閨兩地情惜此飄揚花性輕焉知落地為香土更憐入水作浮萍香土浮萍那堪數虛令春色年年度今年已見柳花殘明年復見楊花吐愁殺龍沙千萬山春來春去損朱顔祗被楊花惱妾睡不教清夢到燕關五言律詩增唐李建勳柳花寄人每愛江城裏青春向盡時一回新雨歇是處好風吹破石黏蟲網髙樓撲酒旗遙知陶令宅五樹正離披吉中孚妻張氏柳絮藹藹芳春朝雪絮起青條或值花同舞不因風自飄過樽浮緑醑拂幌綴紅綃那用持杯玩春懷不自聊宋徐積柳絮二首君看青絲蕊開花便棄捐臨風競離别就地忽團圓孤客正心亂浮雲來馬前灞橋逄杜甫老淚更澘然長條徒自重狂絮去何之禁籞穿花樹春江撲酒旗因風無定意著物有間時謝女何為者深情在雪詩原蔡確楊花楊花二月暮撩亂送春歸盡日間相逐無風亦自飛輕輕攔乳燕故故撲征衣莫上髙樓望徘徊滿落暉增明僧妙聲楊花咏飛飛辭古柳冉冉媚晴空愛爾白於雪况乎兼以風遊絲相上下戲蝶或西東終然太輕薄飄轉委泥中七言律詩增唐劉禹錫柳絮飄揚南陌起東鄰漠漠濛濛好度春花巷暖隨輕舞蝶玉樓晴拂艷妝人縈回謝女題詩筆點綴陶公漉酒巾何處好風偏似雪隋河堤上古江津宋錢惟演柳絮三月江南花漸稀春隂漠漠雪霏霏章臺街裏翻輕吹灞水橋邊送落暉陸凱傳情梅暗落韓慿遺恨蝶爭飛詔書漫道吹綸薄誰見紛紛上客衣楊億柳絮瓊蕊飄英逐吹繁建章飛舞入千門羌人自怨殘梅曲莊叟還迷夢蝶魂漢苑風光隨獵騎洛城花雪撲離樽錦帆蔽日隋堤遠枉逐東流箭浪翻劉筠柳絮半減依依學轉蓬斑騅無奈恣西東平沙千里經春雪廣陌三條盡日風北斗城髙連蠛蠓甘泉樹密蔽青蔥漢家舊苑眠應足豈覺黃金萬縷空韓琦柳絮楊柳生花不戀枝紛紛終日亦何依聚來庭下為毬輥散向空中作雪飛間共落英浮遠水靜和幽蝶舞斜暉見君方惜春難住忍縱輕狂攪擾歸梅堯臣柳絮陶令生涯漉酒巾門前種柳萬條新花今吹作蓬萊雪曲舊得於關塞人應與殘紅間是伴不隨舞蝶去爭春可憐輕質都無定一落銀河莫問津原張舜民柳絮隨風墜露事輕儇巧占人間欲夏天只恐障空飛似雪從教糝徑白如綿末央宫裏黏歌袖楊子江濵惱客船老去強看愁底事昏花滿眼意茫然增金邢安國楊花細點輕團轉復飄隋家堤岸灞陵橋非綿非絮寒無用如雪如霜暖不消狂惹客衣知有恨巧尋禪榻故相撩陂塘回首浮萍滿依舊春風擺翠條元黃清老柳絮風三月韶光天氣清遊絲舒卷太無情微飄簾幕當春晝亂撲亭臺似雪晴醉臉欲吹新燕弱舞腰初軟落花輕江頭點點行人淚相逐離歌灑客程陳基賦楊花巷南巷北晝冥冥搖蕩春風未肯停薄命不禁巫峽雨前身曽化楚江萍已於謝女詩中見更向劉郎曲裏聼腸斷不堪回首處並人飛過短長亭馬臻楊花品題曽入百花名長恨濛濛畫不成灞岸雨餘黏穗濕章臺風暖撲人輕緩隨流水知無力間度髙樓似有情想得山齋清影裏亂和蛛網惹柴荆明朱應辰楊花三月江頭飛送春撲人隨馬斷人魂隔簾撩亂春無影著水亷纎雪有䀶燕帶殘香飛又落魚吹小點吐還吞可憐天性何輕薄化作青萍不托根李東陽糝徑楊花漠漠楊花帶遠天舞如輕雪糝如氊徑當僻處隨人到風向多時著意偏地濕似沾前夜雨日斜猶照隔溪煙春光到此真須惜莫愛床頭沽酒錢五言排律增唐薛能柳花浮生失意頻起絮又飄淪發自誰家樹飛來獨院春朝容縈斷砌晴影過諸鄰亂掩空中蝶繁衝陌上人隨波應到海霑雨或依塵會向慈恩日輕輕對此身金髙廷玉柳絮斷送春歸去紛飛不暫停和風三徑雪微雨一池萍蝶惹依芳草蜂黏過小庭靜宜投隙地狂欲攪青𡨕得得穿朱户時時撲翠屏黃鶯枝上語似與訴飄零五言絶句原隋侯夫人妝成妝成多自惜夢好却成悲不及楊花意春來到處飛唐劉禹錫柳花詞三首開從緑條上散逐香風遠故取花落時悠揚占春晚輕飛不假風輕落不委地撩亂舞晴空發人無限思晴天黯黯雪來送青春暮無意似多情千家萬家去增楊凝柳絮河畔多楊柳追遊盡狹斜春風一回送亂入莫愁家李中柳絮年年二月暮散亂雜飛花雨過微風起狂飄千萬家元朱德潤即事柳絮覺春歸輕盈著處飛東風好收拾莫遣墜征衣傅若金古楊花怨楊花白如雪無事學髙飛莫作浮萍草漂零不肯歸七言絶句增唐韓愈池上絮池上無風有落暉楊花晴後自飛飛為將纎質凌清鏡濕却無窮不得歸白居易柳絮三月盡時頭白日與春老别更依依憑鶯為向楊花道絆惹春風莫放歸張祜楊花散亂隨風處處勻庭前幾日雪花新無端惹著潘郎鬢驚殺緑窗紅粉人吳融楊花不鬬穠華不占紅自飛晴野雪濛濛百花長恨風吹落唯有楊花獨愛風薛濤柳絮二月楊花輕復微春風搖蕩惹人衣他家本是無情物一任南飛又北飛宋韓琦柳絮慣惱東風不定家髙樓長陌奈無涯一春情緒空撩亂不是天生穩重花絮雪紛紛不自持亂愁縈困滿春暉有時穿入花枝過無限蜂兒作隊飛梅堯臣殿中柳絮玉几當中寶作床無端絮惹御袍香羣公唱第魚龍化列侍金階若堵墻原石􅐂柳絮苦無筋力太輕柔何物如君得自由帶雨飄來成墜雪捲春歸去作飛毬王巖叟柳絮銀毬拋出翠煙深聚散髙低不自禁飄去長教迎暖日飛來深院怯春隂汪藻柳絮柳絮顛狂不肯歸等間東去復西飛我身也是無歸著莫教風吹上妾衣增陳與義柳絮柳送腰肢日幾回更教飛絮舞樓臺顛狂忽作髙千丈風力微時穩下來陸遊睡起見楊花滿庭偶書斷香裊裊傍窗紗睡起瞢騰日未斜堪歎一春風雨惡今年四月見楊花原楊萬里柳絮只道垂楊管别離楊花一去不思歸浮蹤浪迹無拘束飛到蛛絲也不飛增樓鑰楊花雨壓輕寒春較遲春深不見柳綿飛忽然飛入間庭院疑是故人何處歸柳綿無數糝枝頭日暖隨風撲畫樓萬象可觀惟有雪喜看晴晝滿空浮為我輕攀緑柳枝帶花低護又擕歸日長深院微風動要著鬆綿當面飛野芳庭草是生涯老去祗宜間在家幾日惜春留不住小鬟為我拾楊花李劉柳絮蝶撲蜂黏發出狂飄然欲上白雲鄉無端却被遊絲攪綰住東風舞幾場原虞詔短長亭外柳依依念我思歸未得歸粉蝶不知行客恨也隨飛絮點征衣孫文叔宫柳垂垂拂苑墻啼鶯驚夢暗心傷起來羞見空中絮也得隨風入御床增金髙士談楊花來時官柳萬絲黃去日飛毬滿路傍我比楊花更飄蕩楊花只是一春忙元張𢎞範柳絮東風殢殺柳梢頭吹去香綿得自由不到池塘成翠靨顛狂飛入酒家樓張昱柳花詞欄馬墻西欲暮春花飛不復過中旬倚天樓閣晴光裏爭撲珠簾不避人滿院長條散緑隂誰家門户碧沉沉地衣不許重簾隔雪白花鋪一寸深楊維楨飛絮春風門巷欲無花絮起晴風落又斜飛入畫簾空惹恨不知楊柳在誰家明劉渙柳花雪點顛狂亂送春穿簾透幕苦相親年年三月西陵渡愁殺輕舟度水人原楊基風送楊花滿繡床飛來紫燕亦成雙間人正在停針處笑嚼殘絨唾碧窗疏疏簾影漾微波庭户無人鳥自過一樹楊花三日雨池塘春水緑萍多吳寬柳絮緑嫩遙看更碧柔非煙非霧曉難收墻髙不使花飛過却似浮萍出御溝詩散句原明王世貞三眠初作絮百和欲成泥旖旎黏輕浪顛狂撲大堤青絲愁綰結紅袖惜分攜增元僧善住未得為萍去先來作雪飛帶花黏燕嘴和雨點人衣原唐韋承慶葉似鏡中眉花如關外雪增孟浩然燕子家家入楊花處處飛李白楊花滿江來疑是龍山雪原劉禹錫晴風吹柳絮新火起厨煙增韓愈柳花還漠漠江燕正飛飛鄭谷楊花滿床席搔首度春隂宋歐陽修落絮風捲盡春歸不留迹原吳潛邂逅一杯酒東風柳絮天賈似道輕袂楊花落遙裝燕子隨增唐杜甫雀啄江頭黃柳花鵁鶄鸂鶒滿晴沙原韓愈楊花榆莢無才思祗解漫天作雪飛增李頻無那楊花起愁思滿天飄落雪紛紛羅鄴處處東風撲晚陽輕輕醉粉落無香司空圖縈愁惹恨奈楊花閉户垂簾亦滿家原孫光憲閶門風暖落花乾飛遍江城雪不寒宋宋祁二月紛紛飛作雪白門啼殺護兒鴉回雪有風嘗借舞落梅無笛可供愁蘇軾為問何如插楊柳明年飛絮作浮萍長恨漫天柳絮輕只將飛舞逐清明增王安石楊花獨得春風意相逐晴空去不歸吕祖謙風絮落花一任􅀢北忩髙臥緑隂初陸遊護雛燕子常更出著雨楊花又懶飛楊花正與人爭路鳩語還催雨點衣原髙翥風前輕薄佳人命天外飄零蕩子身吳潛落花飛絮將春去斷雨零雲入暮寒陳長樂行人自逐楊花去不是楊花肯送人賈似道飛花落絮滿長安飲盡離杯度渺漫孫月鏡莫欺春到荼蘼盡更有楊花落後飛王花洲楊柳若知行客恨不教飛絮撲人衣王太沖惟有楊花思空濶正零落處是開時齊賢良依微謝女吟來雪零落襄王夢裏雲陳景沂賦性太輕難作主飄蹤無著易黏人增朱淑真花邊嬌軟黏蜂翅陌上輕狂趁馬蹄金劉勳小軒無事誰如我臥看楊花點硯池元薩都剌柳花滿地無人掃隔水遙看是白雲唐王維楊花飛上路楊花惹暮春楊花輕易飛原杜甫仰蜂黏落絮春風多柳花增杜甫楊花覆白萍韓愈柳花間度竹原賈島春風生柳絮白居易春隂妨柳絮增吳融柳寒難吐絮李白風吹柳花滿店香原杜甫輕輕柳絮點人衣顛狂柳絮隨風起生憎柳絮白於綿糝徑楊花鋪白氊增孟郊水邊柳絮由春風白居易尋逐春風捉柳花楊柳花飄新白雪溫庭筠陌上無風飄柳花吳融楊花千里雪中行韓偓袖拂楊花去却來韋莊楊花漫染霏霏雨許棠緑楊花撲一溪煙宋韓琦楊花鋪水漲龍涎楊花飛雪滿階前王令柳花風遠聚晴綿吳潛推排春事到楊花元陳基楊柳作花香勝雪方夔漠漠楊花點客氊趙孟俯春隂柳絮不能飛倪瓚柳絮如姻迷晚浦詞增宋周晉柳梢青似霧中花似風前雪似雨餘雲本自無情點萍成緑却又多情西湖南陌東城甚管定年年送春薄幸東風薄情遊子薄命佳人原周邦彥蝶戀花蠢蠢黃金初脫後暖日飛綿取次黏窗牖不見長條低拂酒贈行應已輸先手鶯織金梭飛不透小榭危樓處處添竒秀何日隋堤縈馬首路長人倦空思舊增張孝祥天仙子三月灞橋煙共雨拂拂依依飛到處雪毬輕揚㺯精神撲不住留不住常繫柔腸千萬縷只恐舞風無定據容易著人容易去肯將心事向才郎待擬處終須與作個羅幃收拾取毛滂驀山溪雪堂氊徑撲撲憐飛絮柔弱不勝春任東風吹來吹去墻隂花外一半落誰家葉依依煙鬱鬱依舊如張緒那人拈得吹向叉頭住不定却飛揚滿眼前攪人情愫蜂兒蝶子教得越輕狂隔斜陽點芳草斷送青春暮李邴洞仙歌一團纎軟是將春揉做撩亂隨風到何處自長亭人去後煙草萋迷歸未定妝點離愁無數飄揚無個事剛被縈牽長是黃昏怕微雨記那回深院靜簾幕低垂花隂下霎時留住又只恐伊家忒疏狂更驀地和春帶將歸去周密聲聲慢燕泥沾粉魚浪吹香芳堤十里新晴靜惹遊絲花邊裊裊扶春多憐漂泊記章臺曽挽青青堪愛處是撲簾嬌嫩隨馬輕盈長是河橋三月做一番晴雪惱亂詩魂帶雨沾衣羅襟點點離䀶休綴潘郎鬢影怕緑窗年少人驚捲春去翦東風千縷碎雲原蘇軾水龍吟似花還似飛花也無人惜從教墜拋家傍路思量却是無情有思縈損柔腸困酣嬌眼欲開還閉夢隨風萬里尋郎去處又還被鶯呼起不恨此花飛盡恨西園落紅難綴曉來雨過遺蹤何在一池萍碎春色三分二分塵土一分流水細看來不是楊花點點是離人淚章楶水龍吟燕忙鶯懶芳殘正堤上楊花飄墜輕飛亂舞點畫青林全無才思間趁遊絲靜臨深院日長門閉傍珠簾散漫垂垂欲下依前被風扶起蘭帳玉人睡覺怪春衣雪霑瓊綴繡床漸滿香毬無數才圓却碎時見蜂兒仰黏輕粉魚吞池水望章臺路沓金鞍遊蕩有盈盈淚馬莊父二郎神日髙睡起又却見柳梢飛絮倩誰説與年年相挽却又因他相誤南北東西何時定看碧沼青萍無數念蜀郡風流金陵年少那尋張緒應許雪花比並撲簾堆户更羽綴遊絲氊鋪小徑腸斷鵓鳩喚雨舞態顛狂眠腰輕怯散了幾回重聚空暗想昔日長亭别酒杜鵑催去葉夢得賀新郎睡起流鶯語掩蒼苔房櫳向曉亂紅無數吹盡殘花無人問惟有楊花自舞漸暖靄初回輕暑寶扇重尋明月影暗塵侵尚有乘鸞女驚舊恨鎮如許江南夢斷衡臯渚浪黏天蒲萄漲緑半空煙雨無限樓前滄波意誰採蘋花寄取但悵望蘭舟容與萬里雲帆何時到送孤鴻目斷千山阻誰為我唱金縷别録增唐書南蠻傳訶陵國以柳花椰子為酒飲之輒醉四民月令三月三日以及上除采柳絮可以愈瘡清異録盧文紀有玉枕骨故凡枕之堅實者悉不可用親舊間作楊花枕贈之遂獲安寢自是縫青繒充以柳絮一年一易原嵗時記洛陽人家寒食煮楊花粥增物類相感志冬月令水不冰以楊花鋪硯槽名文房春風膏硯原花史宋憲聖時收楊花為冬日鞋襪氊褥之用附録柳寄生原柳寄生狀類冬青亦似紫藤經冬不凋春夏之間作紫花散落滿地冬月望之雜百樹中榮枯各異出蜀中柳柳增爾雅柳河柳注河旁赤莖小楊疏生水旁皮正赤如絳枝葉如松原柳柳一名雨師一名赤柳本草云天將雨柳先起氣應之負霜不凋乃木之聖故字從聖一名河柳一名人柳一名三眠柳一名觀音柳一名長夀仙人柳即今俗所稱三春柳也幹小枝弱皮赤葉細如絲本草云南齊時益州獻蜀柳條長狀若絲縷即此一年三次作花花穗長二三寸色粉紅如蓼花春前以枝插之易生草木子云大者為炭復入炭汁可點銅成銀酉陽雜俎言涼州有赤白柳王禎農書云河柳白而明則柳又有白者矣彚考增前漢書西域傳鄯善國多葭葦柳柳胡桐白草南齊書祥瑞志永明五年山隂縣孔廣家園柳樹十二層會稽太守隨王子隆獻之種芳林園鳯光殿西三輔故事漢苑中柳狀如人形曰人柳一日三眠三起崔豹古今注赤楊霜降則葉赤材理亦赤也彥周詩話李義山賦云豈如河畔牛星隔年祗聞一過不及苑中人柳終朝剩得三眠集藻頌增梁江淹柳頌木貴冬榮柳實寒色停黛峯頂插翠在側碧葉菴藹赬柯翕赩方陋筠檟遠笑荆棘五言古詩增梁簡文帝柳凌寒競貞節負雪固難虧無慙雲母桂詎減珊瑚枝唐白居易有木詩有木名水柳遠望青童童根株非徑挺柯葉多蒙籠彩翠色如柏鱗皴皮似松為同松柏類得列嘉樹中枝弱不勝雪勢髙常懼風雪壓低還舉風吹西復東柔芳甚楊柳早落先梧桐惟有一堪賞中心無蠧蟲明吳寬柳讀詩識其名誰謂材無用西戎每渡河此木能載重所以人字之豈在作梁棟兩株倚東籬計亦七年種相對垂青絲驀地來二仲七言古詩增李頎魏倉曹東堂柳樹愛君雙柳一樹竒千葉齊生萬葉垂長頭拂石帶煙雨獨立空山人莫知攢青蓄翠隂滿屋紫穗紅英曽斷目洛陽墨客遊雲間若到麻源第三谷詩散句增金雷琯濯濯柳樹枝唐羅鄴滿院皆柳竹期棲鸞鶴羣金髙士談山店柳花落細紅附録櫸柳原櫸柳一名鬼柳本草云其樹髙舉其木如柳故名山人訛為鬼柳郭璞注爾雅作匱柳云似柳皮可煮飲也多生溪澗水側木大者髙四五丈合二三人抱葉似柳非柳似槐非槐材紅紫作箱案之類甚佳鄭樵通志云櫸乃榆類其實亦如榆錢鄉人採其葉為甜茶彚考增孟子告子曰性猶杞柳也注杞柳匱柳也南史康絢傳武帝築淮堰假絢節都督淮上諸軍事并護堰十五年四月堰成其長九里夾之以堤并樹杞柳軍人安堵列居其上荆溪疏瓊樹攑柳也以獨孤常州詩得名擁腫輪囷空腹半死枝葉尚扶蘇垂藤其上如斗附録水楊增爾雅楊蒲柳注可以為箭左傳所謂董澤之蒲本草水楊一名青楊一名蒲楊一名蒲栘一名栘椰一名雚苻音丸蒲原陸璣疏云蒲柳有二種一種皮正青一種皮正白可為矢北土尤多花與柳同蘇頌曰水楊葉圓濶而尖枝條短硬與柳全别彚考增左傳楚熊負羈囚知罃知莊子以其族反之厨武子御下軍之士多從之每射抽矢菆納諸厨子之房厨子怒曰非子之求而蒲之愛董澤之蒲可勝既乎别録增世説顧悅與簡文同年而髮早白簡文曰卿何以先白對曰蒲柳之姿望秋而落松柏之質經霜彌茂種樹書種水楊須先用木樁釘穴方入楊庶不損皮易長臘月二十四日種楊樹不生蟲白楊增本草一名獨搖冦宗奭曰本身似楊微白故名李時珍曰鄭樵通志言白楊一名髙飛與栘楊同名今俗通呼栘楊為白楊且白楊亦因風獨搖故得同名蘇頌曰今處處有之北土尤多株甚髙大葉圓如梨皮白色木似楊李時珍曰葉面青而光背白色有鋸齒木肌細白性堅直與栘楊乃一類二種也原楊有二種一種白楊葉芽時有白毛裹之及盡展似梨葉而稍厚大淡青色背有白茸毛蒂長兩兩相對遇風則􅉡􅉡有聲人多植之墳墓間樹聳直圓整微白色髙者十餘丈大者徑三四尺堪棟梁之任一種青楊樹比白楊較小亦有二種一種梧桐青楊身亦聳直髙數丈大者徑一二尺材可取用葉似杏葉而稍大色青緑其一種身矮多岐枝不堪大用北方材木全用楊槐榆柳四木是以人多種之彚考增南史蕭惠開傳惠開為少府不得志寺內齋前花草甚美悉鏟除别種白楊唐書契苾何力傳龍翔中司稼少卿梁修仁新作大明宫植白楊于庭示何力曰此木易成不數年可庇何力不答但誦白楊多悲風蕭蕭愁殺人之句修仁驚悟更植以桐懸笥瑣探豫初不識白楊及來河南巡行郡邑常經平疇入山谷見多大樹問從者曰白楊也其種易成葉尖圓如杏枝頗徑微風來則葉皆動其聲蕭瑟殊悲慘陜􅉑南山谷尤多髙可二三百尺圓可丈餘修直端美用為寺觀材久則疏裂不如松柏材徑實也集藻詩散句增古樂府白楊初生時乃在豫章山上葉拂青雲下根通黃泉唐李白白楊亦蕭蕭腸斷白楊聲别録原種植白楊伐去大木根在地中者遍發小條候長至栗子核桃粗春月移栽勤澆之栽青楊于春月將欲栽樹地挑溝深一尺五六寸寬一尺長短任意先以水飲透次日將青楊枝如棗栗粗者利刀砍下仍截作二尺長假密排溝內露出溝外二三寸加土與平築實數日後方可澆水候芽長常澆為妙長至五六尺擇其密者刪之既可作柴又使易長種十畝嵗不慮乏柴及長至徑四五寸便可取作屋材用留端正者長為大用每年春月仍可修其冗枝作柴而樹身日益髙大附録栘楊增爾雅唐棣栘注似白楊江東呼夫栘埤雅其花反而後合凡木之花皆先合後開惟此花先開後合爾雅翼栘生江南山谷大十數圍無風葉動崔豹古今注栘楊圓葉弱蒂微風大搖一名髙飛一名獨搖一曰栘楊亦曰蒲楊本草栘楊與白楊是同類二種今南人通呼為白楊御定佩文齋廣羣芳譜卷七十八
