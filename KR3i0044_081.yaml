body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷七十九木譜女貞原女貞楚辭作楨一名貞木一名蠟樹本草云凌冬青翠有貞守之操故以貞女状之近時以放蠟蟲故俗呼為蠟樹處處有之以子種而生最易長樹似冬青葉厚而柔長面青背淡長者四五寸甚茂盛凌冬不凋人亦呼為冬青本草云與冬青同名異物蓋一類二種爾五月開細花青白色花甚繁九月實成似牛李子纍纍滿樹生青熟紫木肌白膩立夏前後取蠟蟲種子褁置枝上半月其蟲化出延縁枝上造成白蠟民間大獲其利女貞實氣味苦平無毒補中明目强隂安五臓養精神健腰膝除百病變白髮乆服令人肥健輕身不老葉除風散血消腫定痛治頭目昏痛諸惡瘡腫彚考原山海經泰山多貞木増典術女貞木者少隂之精故冬不落葉晉宫閣名華林園女貞一株荆州記宜都有喬木叢生名為女貞原琴操魯有處女見女貞木而作歌臨安縣圖經有木名將軍樹今在浄土寺西小橋之側乃女貞木也至今茂盛集藻頌原晋蘇彦女貞頌昔東阿王作楊栁頌辭義慷慨㫖在其中余今為女貞頌雖事異於往作蓋亦以厲冶容之風也女貞之樹一名冬生負霜葱翠振柯凌風故清士欽其質而貞女慕其名或樹之於雲堂或植之於階庭賛増漢鄭氏婚禮謁文賛女貞之樹柯葉冬生寒凉守節險不能傾文散句増漢司馬相如上林賦豫章女貞詩散句増陳江總對幌女貞枝唐李白萬萬女貞林詞増宋張鎡眼兒媚山礬風味木犀魂髙樹緑堆雲水光殿側月華樓畔晴雪紛紛何如且向南湖住深映竹邊門月兒照著風兒吹動香了黄昏别録原辨訛人因女貞冬茂亦呼為冬青不知女貞葉長子黑冬青葉圓子紅枸骨與女貞亦相似女貞即俗呼蠟樹者冬青即俗呼凍青樹者枸骨即俗呼猫兒刺者蓋三樹也種植栽女貞畧如栽桑法縱横相去一丈上下則樹大力厚若相去六七尺太逼湏糞壅極肥嵗耕地一再過有草便鋤之令枝條壯盛即蠟多子亦可種巴蜀擷其子漬淅米水中十餘日搗去膚種之蠟生則近跗伐去發肄再養蠟養一年停一年採蠟必伐木無老榦寄蟲蟲微時白色大如雞虱作蠟及老則赤黑色乃結苞於樹枝初若黍米大入春漸長大如雞頭子紫赤色纍纍抱枝宛若樹之結實蓋蟲將遺卵作房正如雀壅螵蛸之類俗呼為蠟種亦曰蠟子子内皆白卵如細蟣一包數百凡寄子皆於夏前三日内從樹上連枝翦下去餘枝獨留寸許令抱木或三四顆乃至十餘顆作一簇或單顆亦連枝翦之翦訖用稲榖浸水半日許漉取水剥下蟲顆浸水中一刻許取起用竹箬虚包之大者三四顆小者六七顆作一包靭草束之置潔浄瓮中若隂雨頓瓮中可數日天熱其子多迸出宜速寄之寄法取箬包翦去角作孔如小豆大仍用草繫之樹枝間其子多少視枝小大斟酌之枝大如指者可寄枝太細榦太麤者勿寄寄後數日間鳥來啄箬包攫取子勤驅之天漸暖蟲漸出包先縁樹上下行若樹根有草即附草不復上又防蟻食蟲故樹下湏芟刈極浄次行至葉底棲止更數日復下至枝條嚙皮入咂食其脂液因作花狀如凝霜取蠟凡採蠟樹上如凝霜謂之蠟花湏看花老嫩太嫩不成蠟太老不可剥大約處暑後剥取謂之蠟滓剥時或就樹或翦枝俱先灑水潤之則易落次取蠟花投沸湯中融化傾入細嚢漉别鍋中别鍋亦注沸湯漉盡絞去滓乘熱投入䋲套子則凝聚成塊碎之文理如白石膏而瑩徹或以麤布蒙甑口置蠟布上甑内安一器甑下加火蒸化入器中待成塊取之其滓盛以絹嚢投熱油中則蠟盡油可為燭蠟花取時不宜盡留待明年又生子過白露則蠟花黏住難剥蟲白蠟純用作燭勝他燭十倍若以和他油不過百分之一其燭亦不淋為用頗廣多植無害唐宋以前澆燭入藥所用白蠟皆蜜蠟此蟲白蠟自元以來人始知之今則為日用物矣四川湖廣滇南閩嶺吳越東南諸郡皆有之以川滇衡永産者為勝息樹女貞收蠟有二種有自生者有寄子者自生者初時不知蟲何來忽遍樹生白花取用煉蠟明年復生蟲子向後恒自傳生若不曉寄放樹枯則已若觧放者傳寄無窮寄子者取他樹之子寄此樹之上也其法或連年或停年或就樹或伐條若樹盛者連年就樹寄之俟有衰頓即斟酌停年以休其力培壅滋茂仍復寄放即宋氏雜部所謂養一年停一年者也伐條者取樹栽徑寸以上者種之俟盛長寄子生蠟即離根三四尺截去枝榦收蠟隨手下壅冬月再壅明年旁長新枝芽蘖以後恒擇去繁冗令再直達又明年亦復修理恒加培壅第三年可放蠟子更三年仍翦去枝如條桑法如是無窮此所謂經三年停三年者也冬青原冬青一名凍青一名萬年枝女貞别種也樹似枸骨子而極茂盛身大合抱髙丈許木理白細而堅重有文作象齒笏葉似櫨子樹葉而小又似椿葉微窄而頭頗圓光潤經霜不凋堪染緋其嫩芽煠熟水浸去苦味淘淨五味調之可食五月開細白花結子如豆紅色放子收蠟一如女貞子及木與皮氣味甘苦凉無毒去風補虛益肌膚江南冬青葉對生枝葉皆如桂但桂葉硬冬青葉軟稍異豈另一種耶増本草陳藏器曰李邕云冬青出五䑓山似椿子赤如郁李微酸性熱與此小異當是兩種彚考増宋史五行志天聖九年十月公井縣冬青木連理政和三年七月玉華殿萬年枝木連理原晉宫閣名華林園有萬年樹十四株常氏日鈔冬青花闗係水旱其花不落濕地諺云黄梅雨未過冬青花未破冬青花已開黄梅便不來委庵叢談洪武中浙江都司徐司馬令杭城人家植冬青樹於門數年各街市緑隂匝地張輿賦詩云比屋冬青樹人皆隐綺羅春風十年後惟恐緑隂多集藻七言古詩増宋林景熙冬青花冬青花花時一日腸九折隔江風雨清影空五月深山䕶微雪石根雲氣龍所藏尋常螻蟻不敢穴移來此種非人間曽識萬年觴底月蜀魂飛遶百鳥臣夜半一聲山竹裂五言律詩增唐許渾洞靈觀冬青霜霰不凋色兩株交石壇未秋紅實淺經夏緑隂寒露重蟬鳴急風多鳥宿難何如西禁栁晴舞玉䦨干五言排律増唐許稷風動萬年枝瓊樹春偏早光飛處處宜曉浮三殿日暗度萬年枝婀娜揺仙禁繽翻映玉池含芳煙乍合拂砌影初移為近韶陽煦皆先衆卉垂成隂知可待不與衆芳随七言絶句増唐趙嘏宛陵館冬青樹碧樹如煙覆晩波清秋欲盡客重過故園亦有如煙樹鴻雁不來風雨多宋韓駒冬青樹離宫見爾近天墀雨露常私養種時惆悵一枝嵐氣裏無人識是萬年枝楊萬里冬青百子池邊種最竒無人識是萬年枝細花宻葉青青子嘗得披香雨露滋任恭政冬青禁路風清飛早鴉官卑難起紫宸衙了無公事鉤簾坐閒看冬青落細花詩散句原唐杜甫下有冬青林石上走長根宋盧多遜太液池邊看月時好風吹動萬年枝元方䕫老農歇熱藤隂下一樹冬青落細花唐抑所苜蓿齋前萬年樹最宜蔥蒨雪中看宋謝朓風動萬年枝别録増物類相感志冬青樹上接梅則開灑墨梅原宋徽宗試畫院諸生以萬年枝上太平雀為題無中程者或宻扣中貴曰萬年枝冬青樹也種植山居四要臘月下種次春發芽又次年三月移栽長七尺許可放蠟蟲附録水冬青原宋氏樹畜部水冬青葉細利於養蠟子枸骨増本草一名貓兒刺此木肌白如狗之骨葉有五刺如貓之形故名又衛矛亦名枸骨與此同名李時珍曰枸骨樹如女貞肌理甚白葉長二三寸青翠而厚硬有五刺角四時不凋五月開細白花結實如女貞及菝􅀢子九月熟時緋紅色皮薄味甘核有四瓣人采其木皮煎膏以黏鳥雀謂之黏䅻烏臼原烏臼一名鵶臼烏喜食其子因以名之或云其木老則根下黒爛成臼故得此名樹髙數仞葉似小杏葉而微薄淡緑色可染皁五月開細花色黄白實如雞頭初青熟黒分三瓣八九月熟咋之如胡麻子汁味如猪脂壓油燃燈極明南方平澤甚多根皮味苦微溫有毒治頭風通二便慢火炙令脂汁盡黄乾後用子凉無毒壓汁梳頭變白為黑炒作湯下水氣易生易長種之佳者有二曰葡萄臼穗聚子大而穣厚曰鷹爪臼穗散而殻薄臨安人每田十數畝田畔必種臼數株其田主嵗收臼子便可完糧如是者租輕佃户樂種謂之熟田若無此樹於田收糧租額重謂之生田江浙之人凡髙山大道溪邉宅畔無不種亦有全用熟田種者樹大者或收子二三石忌近魚塘令魚黒且傷魚彚考増羅逸長青山記山之麓曰朱村蓋考亭之祖居也自此倚石嘯歌松風上下遥望木葉著霜如渥丹始見怪以為紅花乆之知為烏桕樹也蓬窻續録陸子淵豫章録言饒信間桕樹冬初葉落結子放蠟每顆作十字裂一叢有數顆望之若梅花初綻枝柯詰曲多在野水亂石間遠近成林真可作畫此與柿樹俱穪美䕃園圃植之最宜集藻詩散句増宋陸游烏桕赤於楓園林九月中唐陸龜蒙行歇每依鵶臼影挑頻時見䑕姑心元方䕫烏桕數家村宋陸游烏桕新添落葉紅烏桕猶爭夕照紅别録原製用採臼子在中冬以熟為候採湏連條剥之但留指大以上枝其小者總無子亦宜剥去則明年枝實俱繁盛剥刀長三四寸廣半寸形如却月鉤刄在鈎内以竹木竿為柄令刄向上剥時向上鑱之不傷枝榦剥下枝仍充燎㸑㨂取净子曬乾入臼舂落外白穣篩出蒸熟作餅下榨取油如常法即成白油如蠟以製燭若穣少不滿一榨即作餅入他油餅中雜榨之榨下盛油瓶中置一草帚候油出冷定臼油即凝附草帚不雜他油其篩出黑子石磨麤礲碎簸去殻存下核中仁復磨或碾細蒸熟榨油如常法即成清油燃燈極明塗髪變黒又可入漆可造傘凡製燭每白油十斤加白蠟三錢則不淋蠟多更佳常時肆中賣者白油十斤雜清油十斤白蠟不過一二錢其燭易淋收子一石可得白油十斤浙中一畝之宫但有樹數株生平膏油足用不復市買用油之外其渣仍可壅田可潦㸑可宿火其葉可染皁其木可刻書及雕造器物且樹乆不壊至合抱以上收子愈多故一種即為子孫數世之利接博子種者湏接之乃可樹如杯口大即可接大至一兩圍亦可接但樹小低接樹大髙接耳接湏春分後數日法與雜果同聞之山中老圃云臼樹不湏接博但於春間將樹枝一一捩轉碎其心無傷其膚即生子與接博者同試之良然若地遠無從取佳貼者宜用此法此法農書未載農家未聞恐他樹木亦然宜逐一試之桄榔増本草桄榔一名姑榔木一名麪木一名董㯶一名鐵木廣志木大者四五圍髙五六丈拱直無旁枝巔頂生葉數十似㯶葉其木肌堅斫入數寸得粉赤黄色可食南方草木狀木性如竹紫黒色有文理工人觧之以製奕枰出九真交趾臨海異物志生䍧牱山谷其木剛作鋘鋤利如鐵中石更利唯中蕉根乃致敗耳圖經本草嶺南二廣州郡皆有之其木似栟櫚而堅硬研其内取麪大者至數石食之不飢其皮至堅韌可以作綆其子作穗生木端不拘時月采之海槎餘録桄榔木身直如杉又似㯶櫚椰子檳榔波斯棗古散古散亦木名可為杖又名虎散諸樹而稍異有節似大竹樹杪挺出數枝開花成穗緑色結子如青珠每條不下百顆一樹僅百餘條團團懸挂若傘其木最重色類花梨而多紋番舶用代鐵鎗鋒鋩甚利嶺表録異葉下有鬚如麤馬尾廣人采之以織巾子其鬚尤宜鹽水浸漬即麤脹而韌彼人以縛海舶不用釘線榕城随筆榦似㯶櫚層層向上特節稀於㯶耳其葉類竹而大其榦中空兩分之可為閣溜彚考増後漢書夜郎傳句町縣有桄榔木可以為麪百姓資之中南志梁水興古西平三郡少榖有桄榔木可以作麪以牛酥酪食之水經註盤水又東逕漢興縣山溪之中多生卭竹桄榔樹樹出麪而土人資以自給故蜀都賦曰麪有桄榔北户録洛陽伽藍記云昭儀寺有酒樹麪木得非桄榔乎其心為炙滋腴極美東坡集東坡居士謫于儋耳無地可居偃息于桄榔林中摘葉書銘以記其處廣東志連州北六十里曰桄榔山上多桄榔故名集藻七言絶句増宋楊萬里題桄榔樹化工到得巧窮時東補西移也大竒君看桄榔一窠子竹身杏葉海㯶枝詩散句増唐張九齡里樹桄榔出白居易麪苦桄榔製宋蘇軾雪粉剖桄榔唐于鵠槿籬疎處種桄榔宋黄庭堅日下桄榔羽扇開孫覿桄榔葉底秋聲滿㯶櫚原㯶櫚一名栟櫚廣雅云栟櫚㯶也俗作㯶䰕皮中毛縷如馬之騣䰕故名出嶺南西川今江南亦有種之最難長初生葉如白芨葉長髙二三尺則木端數葉大如扇上聳四散岐裂大者髙一二丈葉有大如車輪者其莖三稜稜邊如刺四時不凋其榦正直無枝近葉莖處有皮裹之每長一層即為一節榦身赤黒皆筋絡宜為鐘杵亦可旋為器物其皮有絲毛錯綜如織剥取縷觧可織衣帽褥椅鍾盂之屬大為時利每嵗必兩三剥之否則樹死或不長也剥之多亦傷樹三月於木端莖中出數黄苞苞中有細子成列乃花之孕也狀如魚腹孕子謂之㯶魚亦曰㯶筍漸長出苞則成花穗黄白色結實纍纍大如豆生黄熟黒甚堅實或云南方此木有兩種一種有皮絲可作繩一種小而無絲惟葉可作帚鄭樵以為王篲者非也按王篲乃落帚之名即地膚子也彚考増梁書處士傳張孝秀性通率不愛浮華常冠穀布巾躡蒲履執栟櫚皮麈尾唐書南蠻傳訶陵在南海中以木為城雖大屋亦覆以栟櫚原山海經石脆之山其木多㯶柟天帝之山上多㯶柟増吴録地理志武陵臨沅縣多栟櫚木生山中晉令其夷民守䕶㯶皮者一身不輸髙士春秋方鎔隐天門山以㯶櫚葉拂書號曰無塵子月以酒脯祭之啓顔錄唐崔行功與敬播相逐播帶櫚木霸刀子行功問播云此是何木播曰栟櫚木行功曰唯問刀子不問佩人原杜詩註杜甫因朝廷以李林甫瑣瑣之材代張九齡為相作㯶櫚拂詩寓意集藻頌原梁江淹栟櫚頌異木之生疑竹疑草攅叢石徑森蓯山道煙岫相珍雲壑共寳不錦不縟何避工巧賦増宋劉敞栟櫚賦圓方相摩純粹精兮剛徤專直交神靈兮馮翼正性栟櫚榮兮中立不倚何亭亭兮受命自天非曲成兮外無附枝匪其旁兮宻葉森森劍㦸鋩兮溫潤可親廉而不傷兮雪霜青青不界僵兮夀比南山邈其無彊兮被髪文身何佯狂兮沐雨櫛風蹇無所妨兮苦身克已用不失職兮摩頂至踵尚禹墨兮黄中通理類有徳兮屹如承天孔武且力兮懔其無華不尚色兮表英衆木如繩墨兮播棄蠻夷反自匿兮遯世無悶曷幽嘿兮明告君子吾將以為則兮賦散句増漢揚雄甘泉賦攅栟櫚與茇葀兮紛被麗其亡鄂五言古詩原唐杜甫枯㯶蜀門多㯶櫚髙者十八九其皮割剥甚雖衆亦易朽徒布如雲葉青青嵗寒後交横集斧斤凋喪先蒲桞傷時苦軍乏一物官盡取嗟爾江漢人生成復何有有同枯㯶木使我沉歎乆死者即已休生者何自守啾啾黄雀啅側見寒蓬走念爾形影乾摧殘没藜莠宋梅堯臣詠宋中道宅㯶櫚青青㯶櫚樹散葉如車輪擁籜交紫髯嵗剥豈非仁用以覆雕輿何憚剋厥身今植公侯第愛惜知㡬春完之固不長只與薺本均幸當勅園吏披割見日新是能去窘束始得物理親劉攽㯶花砍破夜义頭取出仙人掌鮫人滿腹珠􅀈魚新出網七言古詩原宋蘇軾㯶筍并引㯶筍狀如魚剖之得魚子味如苦筍而加甘芳蜀人以饌佛僧甚貴之而南方不知也筍生膚毳中蓋花之方孕者正二月間可剥取過此苦澀不可食矣取之無害于木而宜于飲食法當蒸熟所施畧與筍同蜜煮酢浸可致千里外今以餉殊長老贈君木魚三百尾中有鵞黄子魚子夜义剖癭欲分甘籜龍藏頭敢言美願随蔬果得自用勿使山林空老死問君何事食木魚烹不能鳴固其理五言律詩原宋洪咨䕫㯶櫚舊脱敗蓑亂新添華節髙肅容春尚静俠氣夏方豪黄孕子魚腹青披孔雀凥豐撞如可裂雷動景鐘號明吳寛㯶櫟社異兹種如何身類之竒形豈天賦割剥諒非時磥磈還同癭扶疎不是痿猶能為拂子敢負少陵詩五言絶句増唐徐仲雅詠㯶樹葉似新蒲緑身如亂錦纒任君千度剥意氣自衝天七言絶句増宋劉敞㯶櫚纛影叱挲竿影直雪中霜裏伴松筠可憐憔悴凌雲色還勝昻藏獨立人無名氏秀榦扶疎綵檻新琅玕一束净無塵重苞吐實黄金穗宻葉圍條碧玉輪詩散句増宋宋祁叢撩列蓋端攅旄注旗首曽肇童童雙㯶櫚蔥蒨兩車蓋程金紫孤出亭亭羽蓋髙掌開圓葉臂抽條唐杜甫鑿井六乂㯶葉白居易栟櫚葉戰水風凉原李羣玉㯶櫚葉散夜义頭増宋陸游栟櫚子嫩供香飯别録原筍及子花苦濇有小毒生食㦸人喉主澀腸止瀉痢皮止鼻衂吐血破癥治腸風赤白痢主金瘡疥癬生肌止血附錄櫚木原櫚木性堅紫赤色似紫檀亦有花紋者謂之花櫚木可作器皿床几扇骨諸物俗作花梨者非出安南及南海増格古要論木與降真香相似亦有香其花有鬼面者可愛花麤而色淡者低附錄海㯶増益部方物畧記海㯶大抵㯶類然不皮而榦葉叢於杪至秋乃實似棟子彚考増老學庵筆記老杜海㯶詩在左緜所賦今已不存成都有一株在文明㕔東廊前正與制置司簽㕔門相直簽㕔乃故錦官閤聞潼川尤多予未見也原埤雅廣要蜀錦城之南有海㯶焉榦猶龍鱗枝猶鳯尾髙百餘尺相傳繇李唐來閲千稔矣國朝徙其株于金陵莖葉披萎畧無生意勅還蜀植之䕶以赤欄甃以紋石其枝仍前峻拔秀薄雲漢若不知其徙也邇者榦古顛仆命中貴吳從政視之惜其材初未諳他用既而斵為五十餘琴以進異音清發雖㸑下之桐未可儗也今祕内帑士之嗜音者恒企慕焉集藻賛増宋宋祁海㯶賛㯶皆褫皮此獨自榦攅葉于顛纛首披散秋華而實其値則罕七言古詩原唐杜甫海㯶行左綿公館清江濆海㯶一株髙入雲龍鱗犀甲相錯落蒼稜白皮十抱文自是衆木亂紛紛海㯶焉知身出羣移栽北辰不可得時有西域胡僧識附錄蒲葵増南方草木狀蒲葵似栟櫚而柔薄可為扇笠出龍川本草蒲葵葉與㯶櫚相似許慎説文以為㯶櫚誤也彚考増爾雅翼晉人稱蒲葵扇扇自柄上攅衆骨如㯶葉之狀今宣歙衢信間扇是也西溪叢語李商隐詩云何人書破蒲葵扇記看南塘移樹時蒲葵㯶櫚也晉陽秋謝太傅鄉人有罷中宿縣詣安安問歸資荅曰唯有五萬蒲葵扇安乃取其中者執之其價數倍又王羲之見老姥持六角扇賣之因書其扇各五字老姥初有難色羲之謂曰但云右軍書以求百金姥從之人競買之乃二事誤用也黄楊原黄楊木理細膩枝榦繁多性堅緻難長嵗長一寸閏月年反縮一寸謂之厄閏考之爾雅桐茨菰皆厄閏不獨黄楊葉小而厚色青微黄取此木必于隂晦夜無一星伐之為枕不裂増本草黄楊生諸山野中人家多栽插之枝葉攅簇上聳葉似初生槐葉而青厚不花不實四時不凋其木堅膩作梳剜印最良彚考原酉陽雜俎世重黄楊以無火或曰以水試之沉則無火増艮嶽記増土疊石間留隙穴以栽黄楊曰黄楊巘集藻賦増宋歐陽修黄楊樹子賦并序夷陵山谷間多黄楊樹子江行過絶險處時時從舟中望見之鬱鬱山際有可愛之色獨念此樹生窮僻不得依君子封植備愛賞而樵夫野老又不知甚惜作小賦以歌之若夫漢武之宫叢生五柞景陽之井對植雙桐髙秋羽獵之騎半夜嚴妝之鐘鳯蓋朝拂銀床暮空固已葳蕤近日的皪含風婆娑萬户之側生長深宫之中豈知綠蘚青苔蒼崖翠壁枝蓊鬱以含霧根屈盤而帶石落落非松亭亭似柏上臨千仞之盤薄下有驚湍之濆激澗斷無路林髙暝色偏依最險之處獨立無人之跡江已轉而猶見峰漸囘而稍隔嗟乎日薄雲昏煙霏露滴負勁節以誰賞抱孤心而誰識徒以竇穴風吹隂崖雪積哢山鳥之嘲􅑜裊驚猿之寂歴無遊女兮長攀有行人兮暫息節既晚而愈茂嵗已寒而不易乃知張騫一見湏移海上之根陸凱如逢堪寄隴頭之客五言律詩増宋朱長文百榦黄楊寶榦多材美孤根一氣同春餘花淡薄雪裏葉青蔥蕃衍非人力堅剛禀化工寸枝裁玉軫可助舜南風元華幼武黄楊咫尺黄楊樹婆娑枝幹重葉深團翡翠根古踞虬龍嵗歴風霜乆時霑雨露濃未應逢閏厄堅質比寒松明吳寛追和朱樂圃蘇學百榦黄楊嚴凝霜雪後蕃衍弟兄同帖莫題青李刀難斷寸蔥厄多逄嵗閏材短謝良工桃李紛如許終看立下風傅汝舟聖水峻山多古黄楊樹子為置二珠庵前閏厄無人見山深攜汝囘暮蝉哀不去秋草喜同來梁棟随明世茅茨合短才千年如礙日能記野翁栽詩散句増宋曽肇雖非百尺材嵗晩好顔色婆娑兩佳木生長在岩石蘇軾黄楊生石上堅瘦紋如綺李廌黄樹性堅正枝葉已剛愿原蘇軾園中草木春無數只有黄楊厄閏年樺木増爾雅翼樺木似山桃即今之皮貼弓者又堪為燭取脂燒辟鬼本草樺古作㯸畫工以皮燒煙熏紙作古畫字故名㯸俗省作樺字也李時珍曰樺木生遼東及臨洮河州西北諸地其木色黄有小斑㸃紅色能收肥膩其皮厚而輕虛軟柔皮匠家用襯鞾裏及為刀靶之類謂之暖皮以皮卷蠟可作燭㸃彚考増魏書禮志魏先之居幽都也鑿石為祖宗之廟真君中遣中書侍郎李敞詣石室告祭天地以皇祖先妣配既祭斬樺木立之以置牲體而還後所立樺木生長成林其民益神奉之咸謂魏國感靈祗之應也唐書囘鶻傳黠戞斯古堅昆國也木有松樺榆桞蒲松髙者仰射不能及顛而樺尤多大業拾遺記二年汾州起汾陽宫宫南外平林率是大樺木髙百餘尺行從文武皆剥取皮覆庵舍集藻七言絶句増元袁桷戲題樺皮褐裳新脱玉層層紅葉朱蕉謝不能擬製小冠韜短髪意行雲水一枝藤詩散句増唐白居易風燭樺煙香宋蘇軾送客林中樺燭香别錄増李肇國史補唐正旦曉漏以前三司使大金吾以樺燭擁謂之火城闌天竹原一名大椿一名南天竺或作東天竺一名南天燭榦生年久有髙至丈餘者糯者矮而多子粳者髙而不結子葉如竹小鋭有刻缺梅雨中開碎白花結實枝頭赤紅如珊瑚成穗一穗數十子紅鮮可愛且耐霜雪經乆不脱植之庭中又能辟火性好隂而惡濕栽貴得其地秋後髠其榦留孤根俟春遂長條肄而結子則身低矮子蕃衍可作盆景供書舎清玩澆用冷茶或臭酒糟水或退雞鵞翎水最妙壅以鞋底泥則盛彚考増夢溪筆談南燭草木記傳木草所説多端今少有識者為其作青精飯色黒乃誤用烏臼為之全非也此木類也又似草類故謂之南草木今人謂之南天燭者是也南人多植於庭檻之間莖如朔藋有節髙三四尺廬山有盈丈者葉微似棟而小至秋則實赤如丹南方至多學圃餘疎天竹纍纍朱實扶揺綠葉上雪中視之尤佳人所在種之集藻賦増梁程詧東天竺賦有序中大同元年秋河東桞惲為祕書監詧以散騎為之貳讎校之暇情甚相狎監署西廡有異草數本緑莖疎節葉膏如翦朱實離離炳如渥丹惲為詧言西真書號此為東天竺其説曰軒轅帝鑄鼎南湖百神受職東海少君以是為獻且白帝云女媧用以錬石補天試以拂水水為中斷試以御風風為之息金石水火洞達無閡帝異焉命植於蓬壺之圃此其遺狀也然不復如向時之騐矣詧怪斯言誕而不經因竊歎曰物固有弱而剛微而彰當其時也雷轟而騎翔非其時也穴蟠而泥藏豈特斯草也感而作賦云彤庭赫兮𢎞敞入端闈而延顧粤若望直之都旁開羣玉之府則有芸裛湘素蘭翳軒廡琳琅曵風瓊玫泫雨誠神明之粤壌乃尤物之所處是何弱植之蔑蒙兮榦如剖璞之玉葉碎出藍之緑色含朱膏實正秋熟受中地腴號東天竺蓋女媧補有蒼之缺公孫佩遐升之籙来自西海植之蓬圃飛廉為之輟御馮夷為之止舞於斯時也神農未知藥后稷未播榖蓂莢尚晦萐莆猶伏芝混菌耳苓羣狼毒神禹所未識齊諧所未悉亦既擢質於神皋之苑獻名於通靈之室矣爾乃芳掩茝若氣矜篔簹宻束霞緻駢羅星光菁茅海鳬不足以侔潔薝蔔薫陸不足以襲香璀璨於九闈之上而容與乎三階之旁者也時異事改貌存質昧孰知無用之用而不為斯世之所采畦並稂莠隰兼蒿艾王田植表則有燔芿之酷樵豎載歌則有蒸薪之悔文異溝中之斷音乖㸑下之桐心類飛灰首如飛蓬豈非有意於上林之積翠而禁籞之摛紅者哉天嘉昌明萬物咸覩姬姜在御不棄翹楚王鮪登庖旁徴魴鱮曽是散材托兹邃宇卿雲甘露之所濡白日陽春之所曜天雞晨翔銅枝夜照儻窮年之若斯敢搶攘於往操願黽勉於鴻私蹠青箱而就槁七言絶句増宋楊巽齋南天竺花發朱明雨後天結成紅顆更輕圓人間熱惱誰醫得止要清香淨業縁荆増廣志楚荆也牡荆蔓荆也本草牡荆一名黄荆一名小荆蘇恭日牡荆作樹不為蔓生故稱為牡非無實之謂蔓荆子大牡荆子小故稱小荆李時珍曰處處山野多有樵采為薪年乆不樵者其樹大如盌其枝對生一枝五葉或七葉葉如榆葉長而尖有鋸齒五月杪間開花成穗紅紫色其子大如胡荽子而有白膜皮裹之有青赤二種青者為荆赤者為楛嫩條皆可為筥􅀢古者貧婦以荆為釵即此二木也彚考増詩周南翹翹錯薪言刈其楚王風揚之水不流束楚唐風綢繆束楚秦風交交黄鳥止于楚禮記學記夏楚二物收其威也左傳伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故史記廉頗傳廉頗肉袒負荆因賓客至藺相如門謝罪漢書郊祀志告禱㤗一以牡荆畫幡日月北斗登龍注牡荆作幡柄也南史齊武帝紀上將討戴凱之大饗士卒是日大熱上各令折荆枝自蔽言未終而有雲垂䕃正當㑹所㑹罷乃散北史酷吏傳燕榮嘗按部道次見叢荆堪為笞箠命取之輙以試人人或自陳無咎榮曰後有罪當免及後犯細過將撾之人曰前日被杖許有罪宥之榮曰無過尚爾况有過耶榜捶如舊山海經虖勺之山其下多荆杞東觀漢記尹勤治韓詩事薛漢身牧豕事親至孝無有交游門生荆棘春秋運斗樞玉衡星散為荆孝子傳古有兄弟忽欲分異出門見三荆同株接葉連隂歎曰木猶欣聚况我而殊哉還為雍和南方草木狀荆寧浦有三種金荆可作枕紫荆堪作床白荆堪作履與他處牡荆蔓荆全異又彼境有牡荆指病自愈節不相當者月暈時刻之與病人身齊等置床下雖危困亦愈禮弓矢圖楚弴以荆為之然以灼正以荆者凡木心圓荆心方也文中子子赴洛道於沔池主人不授館子有飢色坐荆棘間讃易不輟也大業拾遺錄五年南方置北景林邑海隂三郡北景在林邑南大海中與海隂接境或云馬援鑄柱尚存地暑熱多大林木髙者數百尋有金荆生于髙山峻阜大者十圍盤屈瘤蹙文如美錦色豔于真金中夏時有于海際得之工人取用甚精妙貴于沉檀登真隐訣註梁天監三年上將合神仙飲奉勅論荆曰荆花白多子子麤大歴歴疎生不過三兩莖多不能圓或𥚹或異或多似竹節葉與餘荆不殊蜂多採牡荆牡荆汁冷而甜餘荆被燒則煙火氣苦牡荆體慢汁實煙火不入其中主治心風第一于時遠近尋覔不得猶用荆葉今之所有者云朝野僉載隋帝令朱寛征留仇國還得金荆瘤數十片木色如真金宻緻而文采盤蹙有如美錦甚香極細可以為枕及案面雖沉檀不能及集藻頌増梁江淹金荆頌江南之山巨嶂連天既抱紫霞亦潄綘煙金荆佳樹涵雲宅仙姱節詎及幽意誰傳文散句増漢東方朔七諌荆棘聚而成林宋顔峻几賛序今上在彭城賜金荆卧几詩散句増唐杜甫為歴雲山問無辭荆棘深晉陸機三荆歡同株别録増神仙傳吳有徐隨居丹徒左慈過隨門下有宿客車六七乘欺慈云徐公不在慈去客皆見牛在楊樹杪車轂中皆生荆木長一二丈客懼入報隨隨曰此左公遣追之客逐慈叩頭謝客還見牛故在地無復荆木也附録楛増陸璣詩疏楛其形似荆而赤莖似蓍上黨人織以為斗筥箱器又屈以為釵故上黨人調曰問婦人欲買赭不謂竈下自有黄土問買釵不謂山中自有楛彚考増書禹貢惟箘簵楛詩大雅瞻彼旱麓榛楛濟濟山海經上申之山下多榛楛棘増爾雅翼棘心赤而外有刺有赤白二種其刺亦有直者鉤者本草白棘一名棘刺一名棘鍼一名赤龍爪花名刺原一名䓆蓂一名馬朐生雍州川谷棘刺花生道旁冬至後一百二十日采之四月采實韓保昇曰切韻云棘小棗也田野間有之叢髙三二尺花葉莖實俱似棗也宼宗奭曰白棘乃酸棗未長大時枝上刺也及至長成其實大其刺亦少故棗取大木棘取小科不必强分别焉彚考増詩弼風凱風自南吹彼棘心魏風園有棘唐風肅肅鴇翼集于苞棘曹風鳲鳩在桑其子在棘小雅湛湛露斯在彼杞棘營營青蠅止于棘周禮秋官朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後註樹棘以為位者取其赤心而外刺象以赤心三刺也左傳桃弧棘矢以共禦王事晉書藝術傳石季龍大饗羣臣於太武前殿佛圖澄吟曰殿乎殿乎棘子成林將壞人衣季龍令發殿石下視之有棘生焉山海經北嶽之山多枳棘剛木竹書文王之妃太姒夢南庭生棘小子發植梓樹於闕間化為松柏棫柞以告文王文王幣率羣臣與發並拜吉夢韓子燕王好微巧衛人曰臣能以棘刺之端為母猴王悦之養以五乘之奉春秋繁露美惡之類各以類應故以龍致雨以扇逐暑軍之所處生以棘楚白虎通景風至棘造實春秋元命苞樹棘聼訟其下者願取其赤實也陳留耆舊傳魏尚繋詔獄有雀集棘樹上占曰夫棘中心赤外有刺象我言有棘而赤心之至誠也水經注夫子墓塋方一里在魯城北六里泗水上弟子各以四方竒木來植故多諸異樹不生棘木㓨草酉陽雜爼衛公言衡山舊無棘彌境草木無有傷者曽彔知江南地本無棘潤州倉庫或要固牆隙植薔薇枝而已埤雅舊云鵲巢中必有棘蓋棘性暖今人養華之法而春以棘數枝置華叢上可以辟霜䕶其華芽也集藻文散句増漢劉向九歎折芳枝與瓊華兮樹枳棘與薪柴藜棘樹于中庭御定佩文齋廣羣芳譜卷七十九
