body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十一木譜君子樹增廣志君子樹似桱松曹爽樹之于庭彚考增晉宫閣記華林園中有君子樹三株集藻詩散句增晉戴皓接越稱交讓連樹名君子不灰木增抱朴子南海蕭丘之上有自生之火春起秋滅丘山純生一種木雖為火所著但小焦黑人或得以為薪者炊熟則灌滅之用之不窮齊地記盧水側有勝火木方俗音曰柳子其木經野火燒死不滅故東方朔云不灰之木者也發蒙記西域有火浣之布東海有不灰之木員生樹增釋典帝釋殿前員生樹梵語波利質多樹髙一百繇旬枝葉覆五百繇旬寶花開時天界自然嚴飾妙好能逆風香諸天夏月于樹下宴息法華經謂之天樹王蘇枋增崔豹古今注蘇枋木出扶南林邑外國細破煮之以染色南方草木狀蘇枋樹類槐花黑子出九真南人以染綘漬以大庾之水則色愈深本草一名蘇木樹似菴羅葉若榆葉而不澀抽條長丈許花黃子生青熟黑翳木增崔豹古今注翳或醫作木出交州色黑而有文亦謂之烏文木也格古要論烏木出海南南番雲南性堅老者純黑色且脆間道者嫩本草一名烏樠木葉似棕櫚體重堅緻可為筯及器物南人多以檕木染色偽之貝多樹增酉陽雜俎貝多出摩伽陀國長六七丈經冬不凋此樹有三種一者多羅娑力義貝多二者多梨婆力義貝多三者部婆力義多羅梨並書其葉部闍一色取其皮書之貝多是梵語漢翻為葉貝多婆力義者漢言葉樹也西域經書用此三種皮葉若能保護亦得五六百年交趾近出貝多枝彈材中第一彚考增廣州記嵩山記曰嵩寺忽有思惟樹即貝多也有人坐貝多樹下思惟因以名焉內典所謂貝多樹下思惟經是也漢世有道士從外國來將子于西山腳下種之有四樹極髙大與衆木異一年三花白色香美漢語翻為貝葉拾遺記洛陽翊津橋通翻經道場東街其道場有婆羅門僧及身毒僧十餘人新翻諸經其所翻經本從外國來用貝多樹葉書貝多葉長一尺五六寸濶五寸許葉形似琵琶而厚大橫作行書隨經多少縫其一邊帖帖然水經注菩薩入石窟時天地大動諸天在空言此非過去當來諸佛成道處去此西南行減半由延貝多樹下是過去當來諸佛成道處諸天導引菩薩起行離樹三十步天授吉祥草菩薩受之復行十五步五百青雀飛來繞菩薩三匝而去菩薩前到貝多樹下敷吉祥草東向而坐寰宇志緬甸在滇南有樹頭棕髙五六尺結實如椰子土人以罐盛麴懸于實下劃其實汁流于罐中以成酒名樹頭酒或不用麴惟取汁熬為白糖其樹即貝樹也緬人取其葉寫書諸寺竒物記寶光寺有西域來貝多婆力義經長可六七寸廣半之葉如細貓竹筍殼而柔膩如芭蕉梵典言貝多出摩伽陀國長六七丈經冬不雕其葉可寫字貝多婆力義此翻葉樹也渤泥入貢記王之所居若樓覆以貝多葉番書無筆札以刀刻貝多葉行之集藻五言排律增唐張喬興善寺貝多樹還應毫末長始見拂丹霄得子從西國成隂見昔朝勢隨雙剎直寒出四牆遙帶月啼春鳥連空噪暝蜩遠根穿古井髙頂起涼飈影動懸燈夜聲繁過雨朝靜遲松桂老堅任雪霜凋永共終南在應隨劫火燒詩散句增唐李白去時應過嵩少間相思為折三花樹鬼目樹增廣州記鬼目樹似棠梨葉如楮皮白樹髙大如木瓜而小邪傾不周正味酢九月熟又有草昧子亦如之可為糝用其草似鬼目南方草木狀鬼木樹大者如李小者如鴨子二月花色似蓮其實色黃以蜜煮之滋味柔嘉交趾武平興古有之䔅母樹增異物志䔅母樹皮有蓋狀似栟櫚但脆不中用用之當裂作三四片廣州記䔅葉六七尺接之當覆屋梓棪增異物志梓棪大十圍材貞徑非利剛截不能剋堪作船其實類棗著枝葉重曝挽垂刻鏤其皮藏味美於諸樹莎樹增廣志莎樹多枝葉葉兩邊行列若飛鳥之狀蜀記莎樹出麵一樹出一石正白而味似桄榔出興古抱木增嶺表録異抱木生江溪中葉細如檜身堅類柏惟根軟不勝刀鋸今潮循人多用其根刳而為履當木濕時刻削易如割瓜木乾之後刀不可理也或油畫或漆其輕如通草暑月著之隔卑濕地氣力如杉木今廣州諸郡牧守初到任皆有油畫抱木履也棹增南方草木狀棹樹幹葉俱似椿以其葉鬻汁漬果呼為棹汁若以棹汁雜彘肉食者即時為雷震死出髙涼郡仙人樹增涼州記祁連山有仙人樹行人山中飢渴者輒食之飽不得持去平居不可見都句增交州記都句樹似栟櫚木中出屑如麵可啖候風木彚考增宋書符瑞志宋元嘉十七年七月武昌崇讓鄉程僧愛家候風木連理酒樹增梁書扶南國傳扶南國有酒樹似安石榴采其花汁停甕中數日成酒影木增拾遺記瀛州有樹名影木日中視之則一葉百影花有光夜如列星萬年一實大如瓜青皮黑瓤食之骨輕上如華蓋羣仙以避風雨燧木增拾遺記燧明國不識四時晝夜有火樹名燧木盤屈萬頃有鳥名鶚來啄樹則燦然火出聖人感焉因取小枝以鑽火號燧人氏夀木增拾遺記渠搜國之西有祈淪之國其俗淳和人夀三百嵗有夀木之林一樹千尋日月為之隱蔽若經憩此木下皆不死不病或有泛海越山來會其國歸懷其葉者則終身不老恆春樹一作長春增拾遺記通霞臺左右種恆春之樹葉如蓮花芬芳如桂花隨四時之色昭王之末仙人貢焉列國咸賀王曰寡人得恆春矣何憂太清不至恆春一名沉生如今之沉香也述異記燕昭王種長春樹春生碧花春盡則落夏生紅花夏末則凋秋生白花秋殘則萎冬生紫花遇雪則謝故號為長春樹播栘樹增林邑記播栘樹柯葉發根下虛中森羅望之似懸髮文衆木增地道記句町有文衆木摩厨增南州異物志木有摩厨生於斯調國其汁肥潤其澤如脂膏馨香馥郁可以煎熬食物香美如中國用油石樓樹增述異記案消山有石樓樹吳太皇元年郡吏伍曜於海際得之枝莖紫色有光南越謂之石連理也􅬎子樹增述異記顧渚山有􅬎子樹其木如玉色渚人採之以為杖大食國樹增述異記大食王國在西海中有一方石石上多樹幹赤葉青枝上總生小兒長六七寸見人皆笑動其手足頭著樹枝使摘一枝小兒便死春浮增水經注波羅奈國在迦維羅衛國南千二百里中間有恆水東南流佛轉法輪處在國北二十里樹名春浮維摩所處也菩提樹增酉陽雜俎菩提樹出摩伽陀國在摩訶菩提寺蓋釋迦如來成道時樹一名思惟樹莖幹黃白枝葉青翠經冬不凋至佛入滅日變色凋落過已還生至此日國王人民大作佛事收葉而歸以為瑞也樹髙四百尺下有銀塔周圍繞之彼國人四時常焚香散花繞樹作禮唐貞觀中頻遣使往于寺設供并施袈裟至顯慶五年于寺立碑以紀聖德此樹梵名有二一曰賔橃梨力義二曰阿濕曷咃婆力義西域記謂之卑鉢羅以佛于其下成道即以道為稱故號菩提婆力義漢翻為樹昔中天無憂王翦伐之令事火婆羅門積薪焚焉熾熖中忽生兩樹王因懺悔號灰菩提樹遂周以石垣至賞設迦王復掘之至泉其根不絶坑火焚之溉以甘蔗汁欲其燋爛後摩竭陀國滿曹王無憂之曽孫也乃以千牛乳澆之信宿樹生如舊更增石垣髙二丈四尺玄奘至西域見樹出垣上二丈餘彚考增洛陽伽藍記疑玄寺塔珠網以銅鑊盛之在塔西北一百步掘地埋之上種樹樹名菩提枝條四布密葉蔽天廣東志菩提樹種出西域大可數圍風搖其葉若雨驟至梁天監元年僧智藥三藏自天竺國持菩提一株航海而來植于廣州光孝寺戒壇之前迄今千餘年茂盛不改婆那娑樹增隋書真臘國傳婆那娑樹無花葉似柿實似冬瓜酉陽雜爼婆那娑樹出波斯國亦出拂林呼為阿蔀嚲樹長五六丈皮色青緑葉極光淨冬夏不凋無花結實其實從樹莖出大如冬瓜有殼裹之殼上有刺瓤至甘甜可食核大如棗一實有數百枚核中仁如栗黃炒食甚美庵羅樹增隋書真臘國傳庵羅樹花葉似棗實似李婆田羅樹增隋書真臘國傳婆田羅樹花葉實並似棗而小異毗野樹增隋書真臘國傳毗野樹花似木瓜葉似杏實似楮歌畢他樹增隋書真臘國傳歌畢他樹花似林檎葉似榆而厚大實似李其大如升嫕彌增玄覽大食西有嫕彌之樹見人善笑摘之則稿酉陽雜爼人木大食西南二千里有國山谷間樹枝上化生人首如花不解語人借問笑而已頻笑輒落咀賴羅增唐書西域傳天竺有樹名咀賴羅葉如梨生窮山崖腹前有巨虺守穴不可到欲取葉者以方鏃矢射枝則落為羣鳥銜去則又射乃得之波羅樹增唐書南蠻傳太和祁鮮而西人不蠶剖波羅樹實狀若絮紐縷而幅之西域傳貞觀二十一年摩揭它始遣使自通于天子獻波羅樹樹類白楊綸木增南越志咸寧縣有穿州基多綸木似榖皮可以為綿勾芒木增寰宇記嶺南容州陸川白石山色潔白四面懸絶上有飛泉瀑布下有勾芒木可以為布俚人斫之新條更生取之績以為布橦樹增廣韻橦花可為布集藻賦散句增左思蜀都賦布有橦華五言古詩增元陳髙種橦花炎方有橦樹衣被代蠶桑舍西得間園種之漫成行苖生初夏時料理晨夕忙揮鋤向烈日灑汗成流漿培根澆灌頻髙者三尺強鮮鮮緑葉茂燦燦金英黃結實成秋繭皎潔如雪霜及時以收斂采采動盈筐緝治入機杼裁翦為衣裳禦寒類挾纊老稚免凄涼豪家植花卉紛紛被垣牆于世竟何補爭先玩芬芳棄取何相異感物增惋傷詩散句增唐王維橦布作衣裳漢女輸橦布榿增益部方物略記民家樹榿不三年材可倍常疾種亟取里人以為利四川志榿木古稱蜀木惟成都最多江干林畔蓊蔚可愛彚考增宋史五行志元符二年九月眉山懸榿木二株異根同幹木枝相附集藻贊增宋宋祁榿木贊厥植易安數嵗輒林民賴其用實代其薪不棟不梁亦被斧斤七言絶句增唐杜甫憑何十一少府雍覓榿木栽草堂塹西無樹林非子誰復見幽心飽聞榿木三年大與致溪邊十畝隂詩散句增元姚燧彼榿有二性生植惟峩岷欒欒干雲姿才與樗散鄰宋范成大疏密榿林整整來别録增齊東野語杜甫乞榿木詩無音或讀作豈而韻書亦無此字集中又有榿林礙日吟風葉鄭氏注曰五來反若然當作呆字余嘗見陳體仁端明云見前輩讀若欹韻頗以為疑後見劒南詩有著書增木品搜句覓榿栽又荆公詩云濯錦江邊木有榿小園封植佇華滋益信欹音為然榿惟蜀有之不才木也或謂即榕云丹鉛録姑蘇王守溪在閣日論杜詩聞知榿木三年大因問先父榿木何音先父曰音欹守溪曰當依韻書作楷先父曰音欹則鄉人農夫皆識之若作楷音不知何木矣因舉王荆公榿木詩曰濯錦江邊木有榿野園封植佇華滋地偏幸免桓魋伐嵗晚還同庾信移王乃悅服琪樹增唐李紳詩序琪樹垂條如弱桞結子如碧珠三年子可一熟每嵗生者相續一年緑二年碧三年者紅綴於條上璀錯相間集藻五言古詩增唐劉駕琪樹下因吟六韻呈先達者舉世愛嘉樹此樹何人識清秋遠山意偶向亭際得竒柯交若鬬珍葉密如織塵中尚青蔥更想塵外色所宜巢三鳥影入瑶池碧移根豈無時一問紫煙客五言律詩增唐李羣玉佳人故居琪樹種樹人何在攀枝空歎嗟人無重見日樹有每年花舊院雀聲暮半庭春色斜東風不知恨滿地落餘霞七言律詩增唐李紳琪樹石橋峯上棲玄鶴碧闕巖邉蔭羽人冰葉萬條垂碧實玉枝千日保青春月中泣露應同色澗底侵雲尚有塵徒使伏根成琥珀不知松老化龍鱗五言絶句增唐羊士諤初移琪樹愛此丘中物煙霜盡日看無窮碧雲意更助緑窗寒蔡隱石石橋琪樹山上天將近人間路漸遙誰當雲裏見知欲渡仙橋鳯首木增杜陽編李輔國有鳯首木髙一尺雕刻鸞鳯之形置之堂中雖嚴冬之際而和煦如春故别名為長春木木龍樹增酉陽雜俎木龍樹徐之髙冡城南有木龍寺寺有三層甎塔髙丈餘塔側生一大樹縈繞至塔頂枝幹交橫上平容十餘人坐枝杪四向下垂如百子帳莫有識此木者僧呼為龍木梁武曽遣人圖寫焉色綾木增酉陽雜爼臺山有色綾木理如綾文百姓取為枕呼為色綾枕倒生木增酉陽雜爼倒生木依山生根在上有人觸則葉翕人去則葉舒出東海黝木增酉陽雜爼黝木節似蟲獸可以為鞭鹿木增酉陽雜爼武陵郡北有鹿木二株馬伏波所種木多節獨梪樹增酉陽雜俎獨梪樹頓丘南應足山有之山上有一樹髙十餘丈皮青滑似流碧枝幹上聳子若五綵囊葉如亡子鏡世名之仙人獨梪樹蜻蜓樹增酉陽雜俎婁約居常山據禪座有一野嫗手持一樹植之于庭言此是蜻蜓樹嵗久芬芳鬱茂有一鳥身赤尾長常止息其上沒樹增酉陽雜俎沒樹出波斯國拂林呼為阿縒長一丈許皮青白色葉似槐葉而長花如橘花而大子黑色大如山茱萸其味酸甜可食阿勃參增酉陽雜俎阿勃參出拂林國長一丈餘皮色青白葉細兩兩相對花似蔓菁正黃子似胡椒赤色斫其枝汁如油以塗疥癬無不瘥者其油極貴價重于金􅺚齊增酉陽雜俎􅺚齊出波斯國拂林呼為頇勃梨咃長一丈餘圍一尺許皮色青薄而極光淨葉似阿魏每三葉生于條端無花實西域人常八月伐之至臘月更抽新條極滋茂若不翦除反枯死七月斷其枝有黃汁其狀如蜜微有香氣入藥療病本草氣味甘平無毒主治骨蒸發熱痰嗽開胃止渴瑞木增酉陽雜俎大歷中成都郭遠因樵獲瑞木一莖理成字曰天下太平詔藏於祕閣紫扉樹增酉陽雜俎紫扉樹出真臘國真臘國呼為勒佉亦出波斯國樹長一丈枝條鬱茂葉似橘經冬不凋三月開花白色不結子天大霧露及雨沾濡其樹枝條即出紫扉波斯國使烏海及沙利深所説並同真臘國使折衝都尉沙門施沙尼拔陀言蟻運土于樹端作窠蟻壤得雨露凝結而成紫扉崑崙國者善波斯國者次之尸利沙樹增酉陽雜俎尸利沙樹足蹈即長羅漢木增石湖詩注翠峰寺在東山雪竇顯老道場山半有悟道井庭下大羅漢木兩株虬屈蟠狀甚竒古思儡木增桂海虞衡志思儡木生兩江州洞堅實漬鹽水中百年不腐胭脂木增桂海虞衡志胭脂木堅緻色如胭脂可鏇作出融州及州洞桂林屬縣亦有之龍骨木增桂海虞衡志龍骨木色翠青狀如枯骨韓木增竹坡詩話潮州韓文公祠有異木世傳文公手植去祠數十步種之輒不生有題文公祠者云韓木有情春谷暖鱷魚無種海潭清是也集藻七言絶句增宋楊萬里題韓庭韓木笑為先生一問天身前身後兩般看亭前樹子關何事也得天公賜姓韓額常增杜詩注額額同常樹無皮出肅慎氏之國聖人在位則木生皮可為衣其國朝貢中國成王時一生之鎖鎖木增輟耕録回紇野馬川有木名鎖鎖燒之其火經年不滅且不作灰彼處婦女取根製帽入火不焚能辟寒欏木增格古要論欏木出湖廣及江西南安萬羊山木色白紋理黃花紋粗亦可愛謂之倭欏不花者多有一等稍堅理直而細謂之草欏俗呼曰梌木鸂鶒木增格古要論鸂鶒木出西番其木一半紫褐色內有蟹爪紋一半純黑色如烏木有距者價髙西番作駱駝鼻中紋子不染肥膩虎斑木增格古要論虎斑木出海南其紋理似虎斑故名之曰虎斑木赤水木增格古要論此木色赤紋理細性稍堅且脆極滑淨人面木增格古要論人面木出鬱林州春花夏實秋熟兩邊似人面故以名之千嵗木增宜都山川記佷山有異木人無見其朽者其名千嵗葉似棗色似桑冬夏青貞強少節強木增彚苑強木不沉水也以之造船木方一寸以百斤巨石縋之終不沒閻浮樹增彚苑閻浮樹須彌山有之月過樹影入月中拘尼他樹增彚苑拘尼他樹其樹花見月光即開稠錫樹增南嶽記南嶽寺有稠錫樹極髙大枝葉與他木絶異相傳唐天寶中有稠錫禪師自桐廬來卓庵演法寺與樹皆其遺迹鐵樹增楊萬里詩注鐵樹葉似蒻而紫幹如密節菖蒲日詢手鏡吳浙間有俗諺見事難成則云須鐵樹花開余在廣西橫之馴象衛殷指揮家見一樹髙可三四尺幹葉皆紫黑色葉小類石榴質理細厚問之曰此鐵樹也每遇丁卯年乃花花四瓣紫白色如瑞香瓣較少圓一開纍月不凋嗅之有草氣乃知鐵樹花開之説有自來矣淨土樹原一統志淨土樹在鄠縣南八里三月開花如桃花八月結實狀如小粟殼中皆黃土俗傳鳩摩羅什憩此覆其屨土中所生黃櫨增本草黃櫨生商洛山谷及四川葉圓木黃可染黃色綟木增本草綟木生林澤山谷木文側戾故曰綟木橉木增本草橉木一名橝木生江南深山大樹有數種性最硬梓人謂之橉筋木染綘用葉亦可釀酒柯樹增本草柯樹一名木奴按廣志云生廣南山谷波斯家用木為船舫虎刺增本草一名伏牛花生蜀地所在皆有葉青細似黃蘗葉而不光莖亦有刺開花淡黃色作穗似杏花而小三月采隂乾不凋木增本草不凋木生太白山巖谷樹髙二三尺葉似槐莖赤有毛如棠梨四時不凋賣子木增本草賣子木出嶺南卭州山谷中其葉似柿髙三七尺徑寸許春生嫩枝條葉尖長一二寸俱青緑色枝梢淡紫色四五月開碎花百十枝圍攢作大朵焦紅色隨花便生子如椒目在花瓣中黑而光潔每株花裁三五大朵爾五月采其枝葉用樬木增本草樬木生江南山谷髙丈餘直上無枝莖上有刺山人折取頭茹食謂之吻頭又謂之鵲不踏以其多刺而無枝故也木麻增本草木麻生江南山谷林澤葉似胡麻相對山人取以釀酒飲大空增本草大空生襄州所在山谷亦有之秦隴人名獨空作小樹抽條髙六七尺葉似楮小圓厚根皮赤色黃葛增峩睂山志嘉樹在羅目縣東南三十里陽山江溉兩樹對植圍各二三尺上引橫枝亘二丈相援連理隂庇百夫其名曰黃葛號嘉樹蘇子由詩子生雖江陽未省到嘉樹即此佛頂青增峩睂山志佛頂青其樹葉碧翠異常生峯頂者尤具光彩椵木增椵木葉最大有類團扇其皮可以當麻取為魚網之綱牢固殊常夜光木增夜光木一名亮木塞外木經久而枯其根不朽蟠迥回連理于土中水漬木根光輝透徹中外一色有類珠樹夜明焰可以燭物取者晝日從朽株中驗其沴濕昏黑往取去其皮而光發則是矣泥沙淨盡竟體晶熒經月水乾光乃漸減集藻賦御製夜亮木賦并序塞上古木夜視有光遇雨益明移置室中即之可以燭物嘉其有異故賦猗嘉木之迥異垂四照之華英蜿輪囷於川壤萃盤錯於柯莖外稟巽德內藴離精煥然夕皎灼爾宵明晼瑞星之初麗炯璧月之漸生既騰輝於山谷亦揚彩於簷楹若乃靈根濯雨榮枝浥露芳澤加鮮澄暉遠布方隱之而彌耀旋即之而如晤洵昭質之無虧何冥行之是懼爾乃金膏灺蘂鶴焰韜光獨飛熛而振采長煜煜以煌煌吐瓊文於赤水懸瑶景於昆岡非朝華而夕謝殆積暗以能彰於是列之桂宫置以椒室流映金鋪近燭緗帙豈浮艷之為容亮靈竒之足述庶含章之可貞雖在野而靡失萬葛樹集藻七言律詩增唐劉兼萬葛樹葉如羽蓋豈堪論百步晴隂鎖緑雲善政已聞思召伯英風偏稱號將軍靜鋪講席麟才潤髙拂闕一字枝兔影分更有嵗寒霜雪操莫將樗櫟擬相羣水清木集藻詩散句增宋夏竦禁中遲日照南榮瑞木聯祥耀國經合幹舊臨宫檻密交枝重茂帝梧青密葉凝華承玉戺附枝交影蔭銀塘藤增爾雅諸慮山櫐注今江東呼櫐為藤似葛而粗大廣雅藟藤也原格物總論藤有大小數種皆依附大木蟠曲而上其綿亘不可以尋丈計所在山谷中多有之增南方草木狀榼藤依樹蔓生如通草藤其子紫黑色一名象豆三年方熟其殼貯藥不壞解諸藥毒生南海按本草云一名榼子一名合子廣州記云角如弓袋子若雞卵取其中仁入藥炙用浮沉藤生子大如韲甌正月華包連著實十月臘月熟色赤生食之甜酢生交址九真簡子藤出合浦生緣樹木正二月花四五月熟實如梨赤如雄雞冠取生食之味淡泊出交址野聚藤出合浦緣樹木二月花包仍連著實五六月熟子大如羮甌味甜酢出蒼梧菽藤生金封山俚人往往賣之其色正赤出興古廣州記膏藤土人伐船為業隨樹所在就以成槽皆去水逺動有數里山生草名膏藤津汁軟滑無比以此導地牽之如流苴藤狀如栟櫚葉疏破皮青多棘刺髙五六丈者如五六寸竹小者如筆管竹類有十許種原臨海異物志鍾藤附樹作根軟弱須緣樹而作藤既纒裹樹便死且有惡汁尤令速朽也藤盛成樹若木自然大者或至十圍萪藤圍數寸重於竹可以為杖篾以縳船及以為席勝於竹也增崔豹古今注酒杯藤出西域大如臂葉似葛花實似梧桐實花堅皆可以酌酒自有文章映徹可愛實大如指味如豆䓻香美消酒土人提酒來至藤下摘花酌酒仍以實銷醒國人寶之不傳中土張騫出大宛得之事出張騫出關志酉陽雜俎人子藤出南安紅色在蔓端有刺其子如人狀崑崙燒之集象南中亦難得本草千金藤陳藏器曰千金藤有數種南北名模不同生北地者根大如指色似漆生南土者黃赤如細辛舒廬間有一種藤似木蓼又有烏虎藤繞樹生冬青亦名千金藤江西林間有草生葉頭有癭子似鶴漆葉似桞亦名千金藤又一種似荷葉只大如錢許亦名千金藤又名古藤又嶺南有陳思岌亦名千金藤黃藤李時珍曰生嶺南狀若防已里人常服此藤飲食有毒亦自然不發白花藤蘇恭曰生嶺南交州廣州平澤苖似野葛葉如女貞莖葉俱無毛而白花其根似葛而骨柔皮厚肉白韓保升曰蔓生白花葉有細毛根似牡丹凌冬不凋解諸毒藥常春藤一名土鼓藤一名龍鱗薜荔陳藏器曰生林薄間作蔓繞草木上其葉頭尖結子正圓熟時如珠碧色扶芳藤一名滂藤陳藏器曰生吳郡藤苖小時如絡石蔓延樹木千嵗藟一名藟蕪一名苣瓜陶𢎞景曰藤生如葡萄葉似鬼桃蔓延木上汁白陳藏器曰冬不凋葉大者盤薄故曰千嵗藟蔓似葛葉下白其子赤幽州人謂之推藟蘇頌曰五月開花七月結實八月采子青黑微赤甘藤一名甜藤一名盛藤李時珍曰又有甘露藤皆此類含水藤一名大瓠藤交州記云生嶺南及北海邊山谷狀若葛葉似枸杞多在路旁行人乏水處便喫此故以為名陳藏器曰藤狀如瓠斷之水出飲之清美李時珍曰顧微廣州記云水藤去地一丈斷之更生根至地水不絶山行口渴斷取汁飲之陳氏所謂大瓠藤蓋即指此物也天仙藤蘇頌曰生江淮及浙東山中春生苗蔓作藤葉似葛葉圓而小有白毛四時不凋根有鬚紫金藤一名山甘草蘇頌曰生福州山中春初單生葉青色至冬凋落其藤似枯條南藤一名石南藤一名丁公藤一名丁公寄一名丁父一名風藤生石間蔓延木上葉細大枝赤莖其大如磧黃有汁蘇頌曰生依南木莖如馬鞭有節紫褐色葉如杏葉而尖李時珍曰江南湖南諸大山有之細藤圓膩紫緑色一節一葉葉深緑色似杏葉而微短厚其莖貼樹處有小紫瘤疣中有小孔四時不凋莖葉皆臭而極辣清風藤一名青藤一名尋風藤蘇頌曰生台州天台山中其苗蔓延木上四時常清百稜藤一名百靈藤蘇頌曰生台州山中春生苗蔓延木上無花葉省藤一名赤藤一名紅藤陳藏器曰生南地深山赤皮大如指堪縳物片片自解也千里及藤陳藏器曰千里及藤生道旁籬落間葉細而厚蘇頌曰千里急生天台山中春生苗秋有花又筠州有千里光生淺山及路旁葉似菊而長背有毛枝幹圓而青春生苗秋有黃花不結實名黃花演海藤廣志云出嶽鄂等州諸山崖花有蘂散落石上人收之謂之沙黃就樹採者輕妙謂之蠟黃今人訛為銅黃李時珍曰今盡家所用藤黃皆經煎煉成者舐之麻人按周達觀真臘記云國有畫黃乃樹脂番人以刀斫樹枝滴下次年收之與郭氏所説不同不知即一物否地龍藤陳藏器曰生天目山樹繞蟠屈如龍故名吳中亦有而小異龍手藤陳藏器曰出安荔浦石上向陽者葉如龍手牛領藤陳藏器曰生嶺南商山形褊如牛領牛妳藤陳藏器曰生深山大如樹牛好食之其中有粉鬼膊藤陳藏器曰生江南林澗邊葉如梨葉子如樝子斑珠藤陳藏器曰生山谷中不凋子如珠而斑息王藤陳藏器曰生嶺南山谷冬月不凋萬一藤陳藏器曰生嶺南蔓如小豆一名萬吉曼遊藤陳藏器曰生無為天門山谷狀如寄生著大樹葉如桞春花色紫蜀人謂之沉花百丈青陳藏器曰生江南林澤藤蔓緊硬葉如薯蕷對生藍藤陳藏器曰生新羅國根如細辛瓜藤蘇頌曰生施州四時有葉無花金稜藤蘇頌曰生施州四時有葉無花含春藤蘇頌曰生台州其苖延木冬夏常青獨用藤蘇頌曰生施州四時有葉無花葉上有倒刺祁婆藤蘇頌曰生天台山中蔓延木上四時常有野豬尾蘇頌曰生施州藤纒大木四時有葉無花石合草蘇頌曰生施州藤纒木上四時有葉無花飛藤陳藏器曰生崑崙國苖似凌霄藤根如青木香安南亦有之名骨路支溫藤陳藏器曰生江南山谷著樹不凋彚考增南史孝義傳解叔謙母有疾夜于庭中稽顙祈福聞空中語云此病得丁公藤為酒便差即訪醫及本草注皆無識者乃求訪至宜都郡遙見山中一老公伐木問其所用答曰此丁公藤療風尤驗叔謙便拜伏流涕具言來意此公愴然以四假與之并示以漬酒法叔謙受之顧視此人不復知處依法為酒母病即差唐書方技傳薑撫自言通仙人不死術開元末召至東都舍集賢院因言服常春藤使白髮還鬒則長生可致藤生太湖最良終南往往有之不及也帝遣使者至太湖多取以賜中朝元老因詔天下使自求之宰相裴耀卿奉觴上千萬嵗夀帝悅御花萼樓宴羣臣出藤百奩遍賜之南蠻傳環王以藤為鎧山海經卑山其上多櫐始興記晉中朝有質子將歸忽有人寄其書告曰吾家在觀亭亭廟石間有懸藤君至叩藤家人自出歸者如其言果有二人出水取書并曰江伯令君前入水見屋舍甚麗今俗咸言觀亭有江伯神也異苑永陽縣有山壁立千仞巖上有石室在路右名為神農窟窟前百藥叢茂莫不畢備又别有異藤花形似菱菜朝紫中緑晡黃暮青夜赤五色迭耀杜陽雜編處士伊祁元為上種萬根藤于殿前一子而生萬根枝葉皆碧鉤連盤屈可蔭一畝其花鮮潔狀類芍藥而蘂色殷紅細如絲髮可長五六寸一朵之內不啻千莖亦謂之綘心藤遊張公洞記其陽有懸巖朱藤纒絡巖上丹花蔌蔌下墜芬香襲人泛舟録湖洑兩岸多朱藤故號罨畫溪原詞話秦少遊詞有醉卧古藤隂下杳不知南北之句後至藤州而卒增吳郡諸山志穹窿山紫藤塢幽深多藤花可掇一統志紫花澗在長興縣西北三十里岸皆叢薄朱藤下垂暮春之月紫花滿澗亦名花瀨澗陸龜蒙詩花瀨濛濛紫氣昏原崑山縣志元衣和庵主蘇州崑山人也隱居雪竇之妙髙峰在千丈巖嶺有藤一枝蜿蜒其上下臨不測乃蟠結成龕為藏修之所故號棲雲集藻説增唐舒元輿悲剡溪古藤説剡溪上綿西五百里多古藤株枿逼土雖春入土脈他植發活獨古藤氣候不覺絶盡生意豫以為本乎地者春到必動此藤亦本於地方春且有死色遂問溪上人人有道者言溪中多紙工持刀斬伐無時擘剝其皮肌以給其業噫藤雖植物者溫而榮寒而枯養而生殘而死亦將似有命於天地間今為紙工斬伐不得發生是天地氣力為人中傷致一物疪癘之若此異日過數十百郡泊東雒西雍歷見言書文者皆以剡紙相夸乃寤曩見剡藤之死職正由此過固不在紙工且今九牧士人自專言能見文章户牖者其數與麻竹相多聼其語其自安重皆不啻握驪龍珠雖茍有曉寤者其倫甚寡不勝衆者亦皆斂手無語勝衆者果自謂天下文章歸我遂輕傲聖人道使周南召南風骨折入於楊白華中言偃卜子夏文學陷入於淫靡放蕩中比肩握管動盈數千百人下筆動數千萬言不知其為謬誤日日以縱自然殘藤之命易甚桑枲波波頺沓未見其止如此則妄言文輩誰非書剡紙者耶紙工嗜利曉夜斬藤以鬻之雖舉天下為剡溪猶不足以給況一剡溪者耶以此恐後之日不復有藤生於剡矣大抵人間費用茍得著其理為不枉之道在則暴耗之過莫由橫及於物物之資人亦有其時時其斬伐不為夭閼豫謂今之錯為文者皆夭閼剡溪藤之説也藤生也有涯而錯為文者無涯世之損物不直於剡藤而已豫所以取剡藤以寄其悲五言古詩增梁簡文帝詠藤纖條寄喬木弱影掣風斜標春抽曉翠出霧挂懸花唐芩參石上藤石上生孤藤弱蔓依石長不逢髙枝引未得凌空上何處堪托身為君長萬丈李白紫藤樹紫藤挂雲木花蔓宜陽春密葉隱歌鳥香風流美人韓愈感春偶坐藤樹下暮春下旬間藤隂已可庇落蘂還漫漫斖斖新葉大瓏瓏晚花乾青天髙寥寥兩蝶飛翻翻時節適當爾懷悲自無端原李德裕思平泉潭上紫藤故鄉春欲盡一嵗芳難再巖樹已青蔥吾廬日堪愛幽溪人未去芳草行應礙遙憶紫藤垂繁英照潭黛增姚合架水藤濛濛紫花藤下復清溪水若遣隨波流不如風飄起風飄或近人隨波千萬里宋梅蕘臣垂澗藤寒松偃澗濵弱蔓垂纓緑波縈翠帶長水濺低花馥終日採蘋人攀條映巖曲朱子垂澗藤寒泉下碧澗古木垂蒼藤蔭此萬里流間花自層層何人賞幽致白髮巖中僧曹冠卿挂樹藤本為獨立難寄彼髙樹枝蔓引數條遠溟濛千朵垂向日助成隂當風藉持危誰言柔可屈坐見蟠蛟螭明吳寬朱藤嫋嫋數尺藤往嵗手親插西庵敞短簷藉爾兩相夾嵗久終蔓延枝葉已交接有花散紅纓有子垂皂莢赤日隔繁隂偃息可移榻但憂風雨甚髙架一朝壓霜雪却不妨忍冬共經臘七言古詩增唐李頎愛敬寺古藤歌古藤池水盤樹根左攫右拏龍虎蹲橫空直上相陵突丰茸離纚若無骨風雷霹靂連黑枝人言其下藏妖魑空庭落葉作開合十月苦寒常倒垂憶昨花飛滿空殿密葉吹香飯僧遍南階雙桐一百尺相與年年老霜霰獨孤及和題藤架䔿䔿葉成幄璀璀花落架花前離心苦愁至無日夜人去藤花千里強藤花無主為誰芳相思歷亂何由盡春日迢迢如線長宋唐庚採藤曲效王建體魯人酒薄邯鄲圍西河度橋南越悲嵗調紅藤百萬計此貢一作無窮時去年採藤藤已乏今年採藤藤轉竭入山十日脫身歸新藤出土拳如蕨淇園取竹况有年越山採藤輸不前今年採藤指黃犢明年輸藤波及屋吾皇養民如養兒鑿空為此謀者誰范成大次韻李器之編修靈石山萬嵗藤歌君不見東林怪蔓之詩三百年字如金繩鐵索相紏纒不如李侯靈石句筆陳壓倒長城堅藤隂詩律兩秀發此假竒事今無前吾聞草木未有不黃落雨荒霜倒相後先綿綿紫藟天所夀風雨不動常蒼然堅姿絶鄰傲一世深本無極融三泉騰虯舞蛟矯欲去流蘇絡帶翩如仙班荆芘藾得吾黨酌泉共吸杯中天詩成一斗屬太白擘箋揮掃如雲煙北門西掖君自有坐擁紅葉然金蓮山腰澗底莫濡滯早晚大風吹蛻蟬五言律詩增唐李嶠詠藤吐葉依松磴舒苖長石臺神農嘗藥罷質子寄書來色映葡萄架花分竹葉杯金隄不見識玉潤幾重開李德裕憶新藤遙聞碧潭上春晚紫藤開水似晨霞照林疑彩鳯來清香凝島嶼繁艷映莓苔金谷如相並應將錦帳回明吳寬藤牆傾何須附尺地幸相容但惜渠何罪髠為城旦舂纒根維石固食葉有蟲攻卭首疑飛躍乘雲欲化龍五言小律增唐儲光羲駕簷藤得從軒墀下如勝松柏林生枝逐駕遠吐葉向門深何許答君子簷間朝暝隂五言排律增唐張蠙和友人許裳題宣平里古藤欲結千年茂生來便近松迸根通井潤交葉覆庭穠蓋密勝丹桂層危類遠峰嫩條懸野鼠枯節呌秋蛩翠老霜難蝕皴多蘚乍封幾家遙共玩何寺不堪容客對忘離榻僧看誤過鐘頃因陪預作終夕繞枝笻七言律詩增金馮延登藤花得春字白白紅紅委暗塵蒼藤次第著花新龍蛇奮起三冬蟄纓絡紛垂百尺身見説紫雲偏得意不知翠幄巧藏春齋厨晚甑清香滿未信侯門有八珍原明王士騏手種藤花大可圍暮春小圃亦芳菲黃鸝隱葉惟聞囀紫蝶尋春不辨飛滿架迎風光眩眼緑溪著雨碧侵衣漫道破除情事盡長條柔蔓轉依依五言絶句增唐錢起古藤引蔓出雲樹垂綸覆巢鶴幽人對酒時苔上間花落顧況石上藤空山無鳥迹何物如人意委曲結繩文離披草書字原明于若瀛藤古結為梁蜒蜿憑雲霧步之時動搖疑駕采虹度七言絶句增唐獨孤及垂花䲧醉後戲題并序莊周臺南十許步有丘一成上有樛藤垂花而蔓草荒之且隔大溝路不可陟道士張太和伐薪為堰封土以壅澮余亦命剃氏治蕪穢而剗宿莽遂闢為登賦之位位廣一席席間足以函尊酒二簋三月戊子及羣英由堰而升焉諸花倒垂下拂杯案紫葩縭縰如叉如旒衆君子瞻弄之不足故秉燭進酒以繼落日欲稱醉而不能也因命其地曰垂花塢堰曰緣花堰亦飾之以詩云紫蔓青條覆酒壺落花時與竹風俱歸時自負花前醉笑向鯈魚問樂無許渾紫藤緑蔓濃隂紫袖低客來留坐小堂西醉中掩瑟無人會家近江南罨畫溪詩散句增唐白居易下如蛇屈盤上若繩縈紆可憐中間樹束縛成枯株原杜甫露浥思藤架煙霏想舊叢杳冥藤上下濃淡樹榮枯迥回策非新岸所攀仍舊藤增韓愈髙木八九株有藤縷絡之宋宋祁虺蔓相結盤虬梢久回曲陸遊老夫維小􅖼半醉摘藤花原唐杜甫不見髙人王右丞藍田丘壑蔓寒藤增宋司馬光山椒迢遞峻無極行挽枯藤踏危石宋謝朓丹藤繞新竹周庾信寒藤抱樹疏婉婉藤倒垂長藤連格徙唐蘇頲藤蔓野人家蕭嵩餘花發紫藤孟浩然藤架引梢長原杜甫庭中藤刺簷藤枝刺眼新對門藤蓋瓦藤蔓曲藏蛇增白居易拂榻藤隂清姚合垂藤壓樹偏李商隱綬藤縈弱蔓蒼崖萬嵗藤皮日休紫藤垂罽珥韋莊藤抽紫蔓肥張蠙蠻藤絡酒瓢袁皓青藤夾岸低宋蘇軾古樹野藤垂陸遊壓架藤花重趙師秀藤深失樹身唐王維藤花欲暗藏猱子白居易緑藤隂下鋪歌席方干醉觸藤花落酒杯姚合春風新上數枝藤宋戴昺輕風滿面落藤花元王逢蔓長鴉藤故故青别録增北户録瓊州出五色藤合子書囊之類細于錦綺亦藤工之妙手也新州作五色藤筌臺皆一時之精絶者梁劉孝儀謝太子五色藤筌蹄一枚云炎州采藤麗窮綺褥得非筌臺與蹄語訛歟瓊州出紅藤簟一呼為笙或謂之籧篨亦謂之行唐其色殷紅瑩而不垢酉陽雜俎松槇即鍾藤也葉大晉安人以為盤避暑録話朝任道自天台來以石橋藤杖二為贈自言親取于懸崖間柔韌而輕堅如束筋余往自許昌歸得天壇藤杖數十外圓實與此不類而中相若紙箋譜范寧教有上紙藤角紙蜀中有藤紙原製用收採藤花擇淨鹽湯灑拌勻晒乾或蒸熟晒乾皆可留作葷素食料女蘿按兔絲非女蘿或以為一物者謬辨見兔絲譜增爾雅蒙玉女注蒙即唐也女蘿别名廣雅女蘿松蘿也本草一名松上寄生爾雅翼女蘿正青而細長無雜蔓長如帶本草别録曰生熊耳山谷松樹上陶𢎞景曰山東甚多生雜樹上而以松上者為真彚考增詩小雅蔦與女蘿施于松柏水經注沅水又東帶緑蘿山頽巖臨水懸蘿釣渚新論碧蘿附于青松以茂凌雲之葉集藻五言古詩增齊王融詠女蘿羃䍥女蘿草蔓衍旁松枝含煙黃且緑因風卷復垂陳劉刪賦松上輕蘿葉繞千年蓋條依百尺枝屬與松風動時將薜影垂學帶非難結為衣或易披山阿若近遠獨有楚人知五言律詩增唐杜牧緑蘿緑蘿縈數匝本在草堂間秋色寄髙樹晝隂籠近山移花疏處過劚藥困時攀日暮微風起難尋舊徑還詩散句增魏曺植緑蘿緣玉樹光耀粲相輝劉楨青青女蘿草上依髙松枝晉郭璞緑蘿結髙林蒙籠蓋一山宋謝靈運想見山阿人薜蘿若在眼伍緝之女蘿依附松終已冠髙枝唐李白緑蘿紛葳𬎼繚繞松柏枝杜甫侍婢賣珠迥回牽蘿補茅屋梁吳均女蘿可代裙王筠風氣入纖蘿唐李白飛蘿搖春煙延蘿結幽居松甫髙蘿成帷幄通林帶女蘿于鵠深蘿月不通朱慶餘秋近碧蘿鮮李頻新隂映緑蘿殷璠髙蘿出石懸宋孫覿蘿牽籬羃翠唐李白緑蘿樹下春風來青蘿嫋嫋挂煙樹白居易煙蘿初合澗新開宋孫覿緑蘿髙張翠羽蓋薜荔增爾雅翼薜荔狀如烏韭而生於石上亦緣木生葉厚實而圓多蔓其實上鋭而下平外青而中􅀈經霜則􅀈紅而甘鳥烏所啄兒童亦食之謂之木饅頭亦曰鬼饅頭嶺外尤多本草一名木蓮李時珍曰四時不凋厚葉堅強大于絡石不花而實實大如杯微似蓮蓬而梢長正如無花果之生者六七月實內空而紅八月後則滿腹細子大如稗子一子一鬚其味微澀其殼虛輕彚考增山海經小華之山其草有薜荔食之已心痛集藻文散句增楚屈原離騷貫薜荔之落蘂九歌薜荔柏兮蕙綢采薜荔兮水中罔薜荔兮為帷被薜荔兮帶女蘿九章令薜荔以為理兮憚舉趾而緣木五言絶句增唐顧況薜荔庵薜荔作禪庵重疊庵邊樹空山徑欲絶也有人知處詩散句增宋梅堯臣春城百花發薜荔上隂階根隨枝蔓生葉侵苔蘚碧唐杜甫青垂薜荔長王縉薜荔成帷晚靄多桞宗元密雨斜侵薜荔牆胡曽蘿荔雨餘山似黛方干窗户涼生薜荔風殷璠淺緑垣牆綿薜荔金髙士談八尺龍蛇薜荔牆絡石增本草絡石一名石鯪一名石龍藤一名懸石一名耐冬一名雲花一名雲英一名雲丹一名石血一名雲珠蘇恭曰生隂濕處冬夏常青實黑而圓其莖蔓延繞樹石側若在石間者葉細厚而圓短繞樹生者葉大而薄韓保升曰葉似細橘葉莖節著處即生根鬚包絡石旁花白子黑六七八月采陳藏器曰與薜荔相似更有石血地錦等十餘種藤皆是其類李時珍曰帖石而生其蔓折之有白汁其葉小如指頭厚于木強面青背淡澀而不光有尖葉圓葉二種蓋一物也御定佩文齋廣羣芳譜卷八十一
