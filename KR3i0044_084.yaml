body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十二竹譜竹一原竹植物也非草非木説文云竹冬生草也竹譜云竹是一族之總名一形之偏稱也植物之中有草木竹猶動品之中有魚鳥獸也耐濕耐寒貫四時而不改柯易葉其操與松柏等第雖喜濕惡燥亦不宜水淹其根根之發生喜向上行本草云其根鞭喜行東南其性又與菊等宜添河泥覆之每至冬月須厚加土為佳每長至四年者即伐去庶不礙新笋而林亦茂盛增格物總論竹中虛白膜外皮青緑色或黃或紫或斑駁文或小或大或長或短種族最多大抵皆自根而莖莖皆有節莖間節處生枝枝每兩之枝亦有節枝間節處生葉葉每三之初出地為笋笋節有籜包之及成莖抽之而籜遂漸次脫落脫落處有粉嵗久而茂茂則成林爾雅簜竹注竹别名疏李巡曰竹節相去一丈曰簜孫炎曰竹濶節者曰簜禹貢篠簜既敷孔安國云簜大竹郭氏曰竹别名無大小之異也莽數節注竹類也節間促桃枝四寸有節注今桃枝節間相去多四寸竹譜云桃枝竹皮赤編之滑徑可以為席余之所見節短者不兼寸長者或踰尺豫章遍有之恐爾雅所載草族自别有桃枝不必是竹郭注取之謬也按四寸有節蓋略言之戴凱之以所見不合而遂疑桃枝之非竹誤矣粼堅中注竹類也其中實簢筡中注言其中空竹類按筍譜云其中耎曰筡可以為席則其內隔耎與常竹不相同也仲無笐注亦竹類未詳篠箭注别二名原戴凱之竹譜云竹之品類六十有一黃魯直以為竹類至多竹譜所載皆不詳欲作竹史不果成今按其種有方竹産澄州體如削成徑挺堪為杖隔州亦出大者數丈東齋記事云武陵桃源山有方竹四面平整如削堅徑可以為杖寧波志云葛仙翁煉丹于定海靈峰植竹筯化為竹而方續竹譜云方竹生嶺外大者如巾筒小者如界方益部方物略記云圎衆方寡故貴方者差小斑竹即吳地稱湘妃竹者其斑如淚痕續竹譜云世傳二妃將沉湘水望蒼梧而泣灑淚染成斑出峽州宜都縣飛魚口大者不過寸鮮美可愛杭産者不如亦有二種出古辣者佳出陶虛山者次之土人裁為筯甚妙亦有大如甌者按筍譜又有一種毛斑竹出蘄州初伐竹即無斑以灰汁洗之即斑見彼人多作簾席或笛管與二妃祠者不同棕竹棕本作棕有三種上曰筯頭梗短葉垂堪置書几次曰短栖可列庭階次曰朴竹節稀葉硬全欠溫雅但可作扇骨料耳性喜隂畏寒風冬月藏不通風處三月方可見天原不見日秋分後可分須出盆視其根鬚不甚牢固處劈開栽盆欲變化多盆則盆大更旺灌用浸豆水極肥舍此俱不堪用貓竹一作茅竹又作毛竹幹大而厚異于衆竹人取以為舟四明洞天記云毛竹叢生澗邉又金庭山洞天皆有續竹譜云毛竹生武夷山李義山詩武夷洞裏生毛竹是也筍譜云出武陵洞口人斫竹隨生土俗云仙人入洞故生此竹以隔浮生也雙竹修篁嫩篠對抽並胤王子敬謂之扶竹猶海上之扶桑也武陵山西雙竹院中産按續竹譜云瑞竹合歡發地尺餘分為兩竿筍譜云合歡竹出南嶽下諸州山溪間彬州最多其筍初生合歡形勢及成竹也或三莖合或兩莖合斷其間有竅竹皮或有斑點文雙梢竹出九疑山第二重麓臺側筍長獨莖及生枝葉即分為兩梢葉密而細亦謂為合歡竹與象扶桑者少同蓋一類而數種也蘄竹出黃州府蘄州以色瑩者為簟節疏者為笛帶鬚者為杖唐韓愈詩蘄州笛竹天下知鄭君所寶尤瓌竒攜來當畫不得卧一府傳看黃琉璃是也慈孝竹生作大叢長幹中聳羣篠外護向陽則茂宜種髙臺柯亭竹生雲夢之南可為管以七月望前生明年七月望前伐過期伐則音滯未期伐則音浮觀音竹每節二三寸産占城國全州志云大覆釡山産掃階竹僅尺許葉密而枝小名觀音竹黃金間碧玉成都古今記云對青竹竹黃而溝青每節若間出浙中亦有之會稽甚多彼人呼黃金間碧玉按筍譜云竹則一邊青一畔紫其色又與此小異龍公竹其大徑七尺一節長丈二尺葉若芭蕉出浮羅山龍孫竹生辰州山谷間髙不盈尺細僅如針徑尺竹可為甑出湖湘四季竹節長而圎中管籥生山石者音清亮月竹每月抽笋狀輕短叢生如箭筍不堪食産嘉定州十二時竹産蘄州其竹繞節凸生子丑寅卯等十二字安福周俊叔得此植之家庭十餘年筍而竹者十之三􅓁簩竹異物志云􅓁簩國出竹可礪指甲新州有此種製成琴樣為礪甲之具用久微滑以酸漿漬之過宿快利如初亦可作箭李商隱所謂􅓁簩弩箭磨青石是也按續竹譜有􅓁竹皮上有文可為錯子錯甲利勝于鐵即此大夫竹其髙凌雲圍三尺幽怪録云鄜延一人伐此竹見內二仙翁相謂平生徑節惜為主人所伐遂騰空去鳳尾竹髙二三尺纖小猗那植盆中可作書室清玩龜文竹崇陽縣寶陀巖産僅一本製扇甚竒聞今亦絶種矣人面竹出剡山竹徑幾寸近本逮二尺節極促四面參差竹皮如魚鱗面凸頗類人面黑竹如藤長丈八尺色理如鐵思摩竹筍自節生筍既成竹至春節中復生筍出交廣無節竹出瓜州大節竹一節一丈出黎母山疏節竹六尺一節通竹直上無節而空洞出溱州匾竹筍譜云匡廬山中多有之其竹匾而長傳云釋慧逺捻此竹為匾竹筍出皆匾藤竹出占城船竹出員丘其竹一節可為船弓竹竹譜云出東垂諸山中長數十丈每節輒曲既長且軟不能自立若遇木乃倚質有文章然要須膏塗火灼然後見之異物志云弓竹筋藤斑駁如玳瑁名玳瑁竹涕竹神異經云南方荒中有涕竹長數百丈圍三丈六尺厚八九寸可以為船其笋甚美食之可以止瘡癘丹青竹葉黃碧丹相間出熊耳山十抱竹出臨賀慈竹內實而節疏性弱形緊而細可代藤一名義竹述異記謂之子母竹益部方物略記云慈竹性叢生根不外引其密間不容笴筍生夏秋閲嵗枝葉乃茂别有數種節間八九寸者曰籠竹一尺者曰苦竹弱梢垂地者曰釣絲竹桂竹竹譜云髙四五丈者二尺圍狀如甘竹而皮赤南康以南所饒也山海經云雲山桂竹傷人必死是桂竹有二種名同實異其形未詳桃竹葉如棕身如竹密莭而實中犀理瘦骨蓋天成拄杖也出巴渝間出豫者細文一節四尺北人呼為桃絲竹續竹譜以為即棕竹按棕竹紋細桃竹紋粗一類而二種也相思竹出廣東兩兩生笋增戴凱之竹譜籦龍竹黃帝使伶倫伐之于崑崙之墟吹以應律聲譜云籦龍大竹此言非大小之謂笛賦云籦龍非也自一竹之名耳所生若是大竹豈中律管與笛􅟳竹細竹也出蜀志薄肌而徑􅟳音衛篁竹堅而促節體圎而質堅皮白如霜粉大者宜作船細者為笛棘竹生交州諸郡叢生有數十莖大者二尺圍肉至厚實中破以為弓枝節皆有刺彼人種以為城卒不可攻萬震異物志所謂種為藩落阻過層墉者也或卒崩根出大如十石物縱橫相承如縿車一名笆竹筍味落人鬚髮按續竹譜有箣竹即此貴州志云箣竹即竻竹又名澀勒單竹大者如腓虛細長爽嶺南人取其筍未及竹者灰煮績以為布其精者如縠焉按續竹譜一作簞竹苦竹有白有紫而味苦齊民要術云竹之醜有四有青苦者白苦者紫苦者黃苦者甘竹似篁而茂葉下節味甘合湯用之此處處亦有按圖經本草云即淡竹也夢溪筆談云淡竹對苦竹為文除苦竹悉謂之淡竹後人不曉于本草內别疏淡竹為物非也一蘇麻竹長數丈大者尺餘圍概莭多枝叢生四枝葉大如履此五嶺左右遍有之篔簹竹最大大者中甑笋亦中射筒薄肌而最長節中貯箭因以為名籃箊竹葉薄而廣越女試劒竹是也尋竹禹殺共工相繇二臣膏流為水其處腥臊不植五榖禹三堙皆沮尋竹生焉在崑崙之北南嶽之山見大荒北經中按玉篇云􅥮竹可為舟即此般腸竹生東郡緣海諸山中其筍最美云與笆竹相似出閩中其形未詳筋竹長二丈許圍數寸至堅利南土以為矛其笋未成竹時堪為弩絃見徐忠南中奏劉淵林云夷人以史葉竹為矛即是筋竹一物而二名者也百葉竹生南垂界甚有毒傷人必死一枝百葉因以為名沈志劉淵林云篣竹有毒以刺虎豹中之輒死或一物二名未詳其同異䈏竹實厚肥孔小幾于實中安成以南有之其味苦䈏音雹性柔弱由衙竹二竹皆大竹也土人用為梁柱交州廣志云亦有生于永昌郡者為物叢生吳郡賦所謂由衙者篁也笻竹髙節實中狀若人剖廣志云出南廣卭都縣張孟陽云出興古盤江縣山海經謂之扶竹郭璞注謂之扶老竹按筍譜云此與扶竹並節者不同􅚠竹筍無味江漢間謂之苦􅚠􅚠音聊􅀢竹二種至似苦竹而細軟肌薄􅀢音禮齒有文理也蓋竹亦大肌薄色白生江南深谷山中不聞人家植之其族類動有頃畝典録賀齊傳云討建安賊洪明于蓋竹蓋竹以名地猶酸棗之名邑豫章之名邦者類是也雞脛竹篁竹之類纖細大者不過如指疏葉黃皮強肌無所堪施笋美青斑色緑沿江山岡所饒也按此一作雞頭竹狗竹生臨海山中節間有毛蘆竹此竹膚是蘆出揚州東垂諸郡箭竹髙者不過一丈節間三尺堅徑中矢江南諸山皆有之會稽所生最精好故爾雅云東南之美者有會稽之竹箭焉箘竹簵竹二竹亦皆中矢皆出雲夢之澤大較是會稽箭類耳皮特黑澀以此為異呂氏春秋云駱越之箘然則南越亦産不但荆也篃竹山海經云其竹名篃生非一處江南山谷所饒也故是箭竹類一尺數節葉大如履可以作篷亦中作矢其筍冬生廣志云魏時漢中太守王圗每冬獻笋謂之䈛笴䈛苦怪反按此亦名䈛竹篠竹篲篠竹中掃帚細竹也特異他篠見廣志至大者不過如箭長者不出一丈根杪條等下節生惟髙隂動有町畝盧山所饒也掃帚之選潯陽人往往取下都貨焉又魯郡鄒山有篠形色不殊質特堅潤宜為笙管諸方莫及笙賦所謂鄒山大竹也又海島有篠大者如筯內實外堅拔之不曲枝葉稀少狀若枯筯赤竹以色名按筍譜云赤竹出閩中大者如椽堪作彈織箔扇也白竹俗曰白鹿竹亦可作簟潯陽呼為白木竹燥時皮肉皆赤武陵溪中是所豐足也按筍譜云連州抱腹山多生白竹莖徑白節心少許緑彼土人出筍後落籜撒梢時採此竹以灰煮水浸作竹布鞋或捶一節作帚謂曰竹拂若貢布一匹只重數兩也筨􅢭竹大如腳指堅厚修直腹中白幕闌隔狀如濕麵生衣將成竹而笋皮未落輒有細蟲囓之隕籜之後蟲囓處往往成赤文頗似繡畫南康所出按梧潯雜佩云滇之新化州山中生細竹長者十餘丈本粗而末細其上有蟲蝕處去之則斑痕如湘竹斷以為箸甚雅當是此竹一類也箛􅀢竹生于漢陽時獻以為輅馬䇿見南郡賦浮竹長者六十尺肉厚而虛軟節濶而亞生水次彭蠡以南大嶺以北遍有之其笋未出時掘取以甜糟藏之極甘脆南人所重􅀢竹見南郡賦䇣竹見蜀都賦僧贊寧筍譜孤竹襄陽薤山下有孤竹三年方生一笋及筍成竹竹母已死矣代謝如春秋焉􅲴竹出溫處建以來竹如苦竹長節而薄可作屋椽木竹今靈隱山出中堅亦通小脈節內若通草中也又韶州有木竹成竹一莖如萬嵗藤一莭長四尺無花而實實如草豆蔲土人鹽之為果實按此當别一種也利竹其竹蔓生若藤蔓屬實中而堅韌雲母竹廣志云大竹也蔓竹廣志云皮青肉白如雪軟韌可為索述異記云岑華山在西海之西有蔓竹為簫管吹之若羣鳳之鳴鏞竹出廣州此竹絶大內空容三升許米交廣以來人將此作升子量出入其出黃可療風疾名天竹黃按黃名天竹言此竹大也相迷竹生廣州以來竹狀與鏞竹少異其洪長亦同內空生黃堪作丸新婦竹出武林山隂其竹圓直韌可為篾白烏竹湘中有此竹見魏曹毗賦魚腸竹其竹細而屈􅹵筒見吳都賦吳越有之􅰣䈝竹竹節疏篻竹其竹實中􅀢屬出韶州莖五六寸中為弓弩服傷竹大者五六寸圍長二丈其中實滿筀竹吳越多生龍牙竹出永嘉大羅山其竹長四五尺稀莭人取必有大風雨雷雹人下山則止檳榔竹見杜臺卿淮賦丹竹出道州瀧中峭壁之上竹每節可一丈或八尺莖不大裊裊搖空粉節上似有丹色拂雲帚竹出盧山莖大如指竹杪細葉密翠如帚彼人採為方物贈人謂之拂雲帚籃竹出襄州卧龍山諸葛亮祠中長百尺只梢上有葉土人作幡竿承落水竹出黔南管內或巖下潭水中生古散竹節似馬鞭葉似桐樹而小皮似栟櫚柔韌鶴膝竹竹狀節下大上小似苦竹閩中土人呼為槌竹堪作拄杖按此即雲南志所謂雞腿竹蓋卭竹類也石􅸝竹一名篻簩生閩中竹似石笋而小三稜竹其狀若棕櫚葉莖柄若三脊然劉美之續竹譜沙摩竹生桂嶺一人止可擎一竿欲種則鈖其苗載二尺許釘入土不踰月而生根葉期年長芽筍不三載而為林紫竹其莖如染出青城蛾眉山可作笙竽蕭管益部方物略記云蜀諸山中尤多園池亦種為玩然生二年色乃變三年而紫貓兒竹長沙有之下豐上細其笋甚甘美大者重十餘斤按毛竹一名貓竹與此各别華陽國志濮竹出永昌郡大竹節相去一丈受一斛許筍譜本草作漢竹疑濮字之訛本草䈽竹堅而促節體圎質徑皮白如霜大者宜刺船細者可為笛取瀝並根葉皆入藥峩眉山志龍竹根有二角髙莭實中可為杖逰山者多採之千嵗竹生山南絶壁間盛以竹籃培以砂石懸之簷前即暢茂夏三月著花壅土則枯死廣東志電斑竹雷州土貢電斑竹婆娑羅竹增城縣東南二十三里曰猊山産婆娑羅竹雲南志黑竹出浪穹色黑可為簫管按此與原譜黑竹異麻竹其質綿軟可為繩為屨巨竹出易門深谷節髙數尺原八月為竹小春竹之萌曰筍竹之節曰箹竹之叢曰筤竹之實曰􅘽竹之得風而體夭屈曰笑竹死曰䈙彚考增易説卦震為蒼筤竹疏竹初生之時色蒼筤取其春生之美也原書禹貢篠簜既敷傳篠竹箭簜大竹水去已布生瑤琨篠簜惟箘簵楛三邦底貢厥名傳箘簵美竹楛中矢幹三物皆出雲夢之澤近澤三國常致貢之其名天下稱善疏鄭云箘簵䉁風也竹有二名或大小異也箘簵是兩種竹增詩衛風籊籊竹竿以釣於淇小雅如竹苞矣傳苞本也箋言時民殷衆如竹之本生矣禮記月令日短至則伐木取竹箭禮器其在人也如竹箭之有筠也如松柏之有心也二者居天下之大端矣故貫四時而不改柯易葉周禮春官孤竹之管冬日至於地上之圜丘奏之注孤竹竹特生者孫竹之管夏日至於澤中之方丘奏之注孫竹竹枝根之末生者隂竹之管於宗廟之中奏之注隂竹生於山北者夏官東南曰揚州其利金錫竹箭史記河渠書天子自臨決河沈白馬玉璧於河令羣臣從官自將軍已下皆負薪置決河是時東流郡燒草以故薪柴少而下淇園之竹以為楗注樹竹塞水決之口稍稍布插接樹之水稍弱補令密原史記貨殖傳渭川千畝竹其人與千户侯等增漢書地理志秦地有鄠杜竹林南山檀柘號稱陸海為九州膏腴原晉書嵇康傳康所與神交者惟陳留阮籍河內山濤豫其流者河內向秀沛國劉伶籍兄子咸琅琊王戎遂為竹林之逰世所謂竹林七賢也增晉書紀瞻傳瞻立宅於烏衣巷館宇崇麗園池竹木有足賞玩焉王徽之傳吳中一士大夫家有好竹徽之欲觀之便出坐輿造竹下諷嘯良久主人灑掃請坐徽之不顧將出主人乃閉門徽之便以此賞之盡歡而去嘗寄居空宅中便令種竹或問其故徽之但嘯詠指竹曰何可一日無此君耶梁書處士傳阮孝緒所居室惟有一鹿牀竹樹環繞南史袁粲傳粲家居負郭每杖䇿逍遙當其意得悠然忘反郡南一家頗有竹石粲率爾步往亦不通主人直造竹所嘯詠自得主人出語笑款然俄而車騎羽儀並至方知是袁尹沈約傳約孫衆字仲興好學頗有文詞仕梁為太子舍人武帝召見於文德殿帝令衆為竹賦賦成奏之手勑答曰卿文體翩翩可謂無忝爾祖北史楊愔傳愔一門四世同居家甚隆盛昆季就學者三十餘人學庭前有奈樹實落地羣兒咸爭之愔頽然獨坐其季父暐適入學館見之大用嗟異宅內有茂竹遂為愔於林邊别葺一室命獨處其中常銅盤具盛饌以飯之因以督厲諸子曰汝輩但如遵彥謹慎自得竹林别室銅盤重肉之食唐書文藝傳王維别墅在輞川有竹里館五代史周臣傳扈載字仲熙少好學善屬文因逰相國寺見庭竹可愛作碧鮮賦題其壁世宗聞之遣小黃門就壁録之覽而稱善宋史五行志太平興國八年十月乙酉蜀州獻瑞竹一本十六節上分兩枝雍熙三年四月睂山縣獻異竹圗淳化二年二月射洪縣安國寺竹二莖同本六月舒州竹連理知州樂史以聞至道元年十一月潭州監軍廨生竹一本長二尺許枝葉萬餘尤為殊異景德三年十二月蓬州上瑞竹圗大中祥符八年四月開元寺桃竹一莖上分十八節皆相對寇準傳準歸葬西京道出京南公安縣人皆設祭哭於路折竹植地挂紙錢逾月視之枯竹盡生筍衆因為立廟嵗時享之山海經英山其陽多箭篃竹山其陽多竹箭踰次之山其下多竹箭翠山其下多竹箭髙山其草多竹京山多竹蟲尾之山其下多竹軒轅之山其下多竹渠豬之山其上多竹蔓渠之山其下多竹牡山其下多竹箭竹篃長石之山其西有谷焉名曰共谷多竹夸父之山其木多竹箭荆山其草多竹大堯之山其草多竹師母之山其草多竹求山其木多篃從山其下多竹雲山有桂竹甚毒傷人必死龜山多扶竹丙山多筀竹大夫之山其草多竹暴山其木多竹箭篃箘附禺之山有丘方圎三百里丘南帝俊竹林在焉大可為舟注俊舜字假借音言舜林中竹一節則可以為船也汲冢周書路人大竹路人東方蠻貢大竹穆天子傳天子西征至於玄池乃樹之竹是曰竹林家語山南之竹不摶自直斬而為箭射達犀革戰國䇿薊丘之植植於汶篁注竹田曰篁索隱云言燕薊丘之植植齊王汶上之竹淮南子竹以水生漢水重安而宜竹丘陵坂險不生五榖者以植竹木禮斗威儀君乘木而王其政太平蔓竹紫脫為之長生孝經河圖少室之山有㸑器竹堪為釡甑三輔黃圖竹宫甘泉祠宫也以竹為宫天子居中三輔舊事竇將軍有青竹田原三輔決録蔣詡舍種竹下開三徑有羊仲裘仲之徒與之遊增博物志堯之二女舜之二妃曰湘夫人舜崩二妃啼以涕揮竹竹盡斑神仙傳蘇仙公者桂陽人漢文帝時得道升雲漢而去後母終鄉人見州東北牛脾山紫雲蓋上有號哭之聲咸知蘇君之神也先生哭處有桂竹兩枝無風自掃其地恆淨風土記陽羡縣有袁君家壇邊有數林大竹並髙二三丈枝皆下披掃壇上常潔淨也拾遺記始皇起雲明臺窮四方之珍木得雲岡素竹蓬萊有浮筠之簳葉青莖紫子大如珠有青鸞集其上下有沙礰細如粉柔風至葉條翻起拂細沙如雲霧仙者來觀而戲焉風吹竹葉聲如鐘磬之音華陽國志有竹王者興於遁水有一女子浣於水濵有三節大竹流入女子足間推之不肯去聞有兒聲取持歸破之得一男兒長養有才武遂以竹為姓捐所破竹於野成竹林今竹王祠竹林是也荆州記臨賀謝休縣東山中有大竹數十圍髙亦數十丈有小竹生其旁皆四五圍下有盤石徑四五丈極方正青如彈碁局兩竹屈垂拂掃石上初無塵穢未至數十里聞風吹此竹如簫管之音天門山角上各生一竹倒垂拂拭謂之天帚廣州記石麻之竹徑而利削以為刀切象皮如切芋湘中記文竹山上有石牀方高一丈四面緑竹扶疏常隨風委拂此牀原永嘉郡記樂城張豸者隱居頤志家有苦竹數十頃在竹中為屋常居其中王右軍聞而造之豸逃避竹中不與相見一郡號為竹中髙士增永嘉郡記陽嶼有仙石山頂上有平石方十餘丈名仙壇壇陬輒有一筋竹凡有四竹葳蕤青翠風來動音自成宮商石上淨潔初無粗籜相傳云曽有却粒者於此羽化故謂之仙石小江緣岸有仙石壇有竹嬋娟青翠風來枝動掃石壇壇上無塵也丹陽記江寧縣南三十里有慈母山積石臨江上生簫管竹王褒洞簫賦所稱即此也其竹圎緻異於餘處自伶倫采竹嶰谷其後唯此簳見珍故歷代常給樂府而俗呼曰鼓吹山今慈湖戌常禁採之東陽記崑山去蕪城山十里山峰嶺髙峻常秀雲表故老傳云嶺上有員池魚鱉具有池邊有竹極大風至垂屈掃地恆淨潔如人掃也南越志博羅縣東蒼州足簟竹銘曰簟竹既大薄且空中節長一丈其長如松異苑建安有篔簹竹節中有人長尺許頭足皆具元嘉四年東陽留道先家筋竹林忽生連理野人無知謂之禍祟欲斫殺之洛陽伽藍記永寧寺僧房樓觀一千餘間翠竹香草布濩階墀述異記東海畔有孤竹焉斬而復生中為管衛有淇園出竹在淇水之上詩云瞻彼淇澳緑竹猗猗是也和州義城郡葭萌縣有玉女房蓋是一大石穴也昔有玉女入此石穴前有竹數莖下有青石壇每因風自掃此壇玉女每遇明月夜即出於壇上間步徘徊復入此房原地道志梁孝王東苑方三百里即兔園也多植竹中有修竹園增髙士春秋王徽之以菖蒲映竹曰菖蒲止以九節為貴而此君面目聳然正當再拜此君而此君亦安得不受之耶述征記山陽縣城東北二十里魏中散大夫嵇康園宅竹林時有遺竹也酉陽雜俎衛公言北都惟童子寺有竹一窠才長數尺其寺綱維每日報竹平安東宮郡漢順帝時屬南海西接髙涼郡又以其地為司諫都尉東有蕪地西鄰大海有長洲多桃枝竹緣岸而生北户録貞元五年畨禺有海户犯禁避罪羅浮山入至第十三嶺遇巨竹百丈萬竿竹圍二十一尺有三十九節節長二丈海户因破之為篾會罷吏捕逐遂挈而歸時有軍人獲一篾以為竒貨後獻於刺史李復復命陸子羽圗而記之澄州産方竹體如削成徑挺堪為拄杖亦不讓張騫笻竹杖也又海晏出蘆堪為拄杖髙潘州出千嵗蕨拄杖之類具多更有疏節竹五六尺一節僧道多以為杖又按王最云溱州通竹直上無節空心也玄山記孟浩然一日周旋竹間喜色可掬又見網師得魚尤甚喜躍友人問之答云吾適得句中有魚竹二物不知竹有幾節魚有幾鱗疑致疏謬今見二物乃釋然矣原開元天寶遺事太液池岸有竹數叢芽筍未嘗相離密密如栽也帝因與諸王間步於竹間謂諸王曰人世父子兄弟尚有離心離意此竹宗本不相疏人有懷二心生離間之意覩此可以為鑑諸王皆唯唯帝因呼為竹義增清異録江湖間有一種野竹其葉糾結如蟲狀山民曰此蚱蜢竹也原續世説杜子美居蜀於浣花里種竹植木結廬枕江縱酒吟詠與田畯野老相狎增獨樂園記沼北橫屋六楹前後多植美竹命之曰種竹齋原東坡集古氏南坡修竹數千竿大者皆七寸圍盛夏不見日蟬鳴鳥呼有山谷氣象竹林之西又有隙地數畝種桃李雜花今年秋冬當作三間一龜頭取雪堂規模東蔭修竹西眺江山若果成此遂為一郡之嘉觀也風篁嶺多竹風韻淒清至此林壑深沉迥出屋表流淙活活自龍井而下四時不絶嶺故叢薄荒密元豐中僧辨才淬治潔椘名曰風篁豫訪辨才龍井送至嶺上左右驚曰逺公過虎溪矣辨才笑曰杜子有云與子成二老來往亦風流遂作亭嶺上名曰過溪亦曰二老作詩記之增夢溪筆談近嵗延州永寧關大河岸崩入地數十尺土下得竹筍一林凡數百莖悉化為石延郡素無竹此入在數十尺土下不知其何代物無乃曠古以前地卑氣濕而宜竹耶嶽陽風土記五月十三日謂之龍生日可種竹齊民要術所謂竹醉日也冷齋夜話鄒志完南遷自號道鄉居士在昭州江上為居室近崇寧寺因閲華嚴經於觀音像前有修竹三根生像之後志完揭茅出之不可乃垂枝覆像有如今世畫寶陀山巖竹今猶在昭人扃瑣之以俟過客逰觀西湖僧清順怡然清苦多佳句嘗賦十竹詩云城中寸土如寸金幽軒種竹只十個春風慎勿長兒孫穿我階前緑苔破洛陽名園記富鄭公園自其第東出探春亭登四景堂則一園之景勝可顧覽而得南渡通津橋上方流亭望紫筠堂而還右旋花木中有百餘步走蔭樾亭賞幽臺抵重波軒而止直北走土筠洞自此入大竹中凡謂之洞者皆斬竹丈許引流穿之而徑其上橫為洞一曰土筠縱為洞三曰水筠曰石筠曰榭筠歷四洞之北有亭五錯列竹中曰叢玉曰披風曰漪嵐曰夾竹曰兼山苖帥園北竹萬餘竿皆大滿二三圍疏筠琅玕如碧玉椽董氏西園有一堂竹環之中有石芙蓉水自其花間湧出開軒窗四面甚敞盛夏燠暑不見畏日清風忽來留而不去幽禽靜鳴各誇得意此山林之景而洛陽城中遂得之武夷山記峰山頗有佳竹多虯屈如龍蛇狀華陽宫記循夀山而西移竹成林復開小徑至百數步竹有同本而異幹者不可紀極皆四方珍貢又雜以對青竹十居八九曰斑竹麓艮嶽記景龍江北岸萬竹蒼翠蓊鬱仰不見天有勝雲庵躡雲臺消間館飛岑亭無雜花異木四面皆竹也避暑録話山林園圃但多種竹不問其他景物望之自使人意瀟然竹之類多尤可喜者筀竹益色深而葉密吾始得此山即散植竹略有三四千竿雜衆色有之意數年後所向皆竹矣戊申己酉間二浙竹皆結花而死俗謂之竹米於是吾所植亦稿盡今所存惟介竹數百竿爾方其初花時老圃輒能識之告吾亟盡伐去存其根則來嵗尚可復生而余終不忍至已稿而後伐則與其根俱朽矣比雖復補種而竹種已難得不能及前五之一然猶更須三五年始可望其干雲蔽日也西溪叢話李義山崇讓宅宴詩風過迥回塘萬竹悲洛陽有崇讓坊有河陽節度使王茂先宅李即茂先之壻韋氏述征記云此坊出大竹及桃却掃編蘇黃門子由南遷既還居許下多杜門不通賓客有鄉人自蜀川來見之伺候于門彌旬不得通宅南有叢竹竹中為小亭遇風日清美或徜徉亭中鄉人既不得見則謀之閽人閽人使待於亭旁如其言後旬日果出鄉人因趨進黃門見之大驚慰勞久之曰子姑待我於此翩然復入逮夜竟不復出西京一僧院後有竹林甚盛僧開軒對之極瀟灑士大夫多逰集其間一日文潞公亦訪焉大愛之僧因具榜乞命名公欣然許之攜榜以歸數月無耗僧往請則曰吾為爾思一佳名未之得也姑少待後半年方送榜還題曰竹軒余觀士大夫立所在亭堂名當理而無疵者極少潞公之語雖質然不可破也研北雜志朱希真常言山隂富水竹有洛陽許下氣象臨漢隱居詩話竹有黑點謂之斑竹非也湘中斑竹方生時每點上苔錢封之甚固土人斫竹浸水中用草穰洗去苔錢則紫暈斕斑可愛此真斑竹也揮麈餘話紹興中趙元鎮為左相一日入朝見自外移竹栽入內奏事畢亟往視之方興工於隙地元鎮詢誰主其事曰內侍黃彥節也元鎮即呼彥節詬責之曰頃嵗艮嶽花石之擾皆出汝曹今將復蹈前轍耶命勒軍令狀日下罷役彥節以聞於上翼日元鎮奏事上諭曰前日偶見禁中有空地因令植竹數十竿非欲以為苑囿然卿能防微杜漸如此可謂盡忠爾後儻有似此等事勿憚以警朕之不逮也邵氏聞見後録仁皇帝嘉祐七年十二月庚子幸天章閣召兩府以下觀瑞物十三種其一為瑞竹一節有二絃並生其中吳興園林記章氏水竹塢章農卿北山别業也有水竹之勝原五色線羅浮第三峰有大竹徑七尺圍節長丈二謂之龍竹常有鸞鳳栖宿東有溪曰羅陽暴漲有竹葉流出大如芭蕉增五色線竹名魚腸梁簡文修竹賦玉潤桃枝之麗魚腸金母之名丹鉛總録竹亦有香人罕知之杜詩風吹細細香李賀詩竹香滿幽寂粉節塗生翠閩部疏延福以南有竹叢生涉冬抽萌慈竹類也而長刺雲大者拱把吳越慈竹迥出其下粉竹舂絲為佳紙料者美於江東白苧荆溪疏金沙寺在湖汊東南一里唐陸希聲舊宅今尚有讀易臺繞寺竹竿可數萬箇居山雜志美竹髙者至數丈其名曰毛竹並山左右皆有之三伏蔭其下無暑氣然獨宜山岡則生移之平陸則弗活其餘竹數甚多無踰此品遊人多愛刻名其上題迹可經數年不壞久之益若蟲書古篆可觀玉堂漫筆衡山後生竹最大名曰南竹土人截取其筒以為甑節處可製盥盆然在深山中人迹不到之處月河梵苑記聚景亭東隙地植竹數挺曰竹塢逰台宕路程玉京洞天前蔭美竹從竹間見晚煙野色甚媚越遊雜記大平菴看竹俱大如汲桶而毛葉離離不啻雲鳳之尾燕都遊覽志駙馬都尉萬公白石莊在白石橋北臺榭數重古木合抱竹色蔥蒨盛夏不知有暑附郭園亭為第一原花史許州有修竹二十餘畝潩水貫其中文彥博為置守桂東萬玉城世傳王曽寓此階砌尚存旁有修竹數竿日夕自仆掃其地而復立增四川志卭州南八里有卭崍山漢張騫奉使西域得髙節竹植于卭山漢竇誼居蜀之峩眉放浪不羈月夜子規啼竹上誼曰竹裂吾可歸峩峰是夕竹裂黎明遁于峩峰武帝三徴不起福建志古田縣有馬山多竹可為楮武彞山白雲巖下為寒巖右為毛竹洞唐李商隱詩武彞洞裏生毛竹老盡曽孫更不來廣東志清逺縣五十里曰峽山相傳黃帝二庶子南採阮俞竹為黃鍾之管與二臣俱隱此山祠在廣慶寺東廡今山上小竹節間長九寸圓徑三分疑此山即阮俞舊志誤為崑崙耳東安縣之東南五里曰雲浮嶺上産異竹貴州志聖婆不知何許人領五男行至鎮逺卭水司岑樓山以竹植地祝云我得地竹當成林果成林時揮涕竹上今霧雨竹有液如涕集藻傳原宋劉子翬此君傳此君之先出自震澤有號蒼筤子者與蒼頡同時頡觀鳥迹制字蒼筤子有記載之功帝皆賜姓命以字為蒼氏蒼筤子生篠禹修方貢以其材也上之其後有國封孤竹君生籊籊逸去釣于衛詩人咏淇澳以美之天下想見其風采籊生篠篠生庭筠母慈氏庭筠在綳褓中已有竒骨濯濯如傅粉然及長清癯玉立七賢六逸皆從之逰王子猷最喜之嘗曰不可一日無此君世以目之不名也此君性強項未嘗折節下人得黃老深根固蒂之術蟠隱林麓間與徂徠十八公新甫柏直臭味之同素相友善帝嘗特起三人俱至上林愛其風操遷直御史府拜十八公為大夫獨此君不受爵帝館于行宮留以自近嘗訪養性之道此君曰虛心直已至道自凝帝欽其言又嘗撫其腹曰此中何有曰空洞無物當容數十百人耳帝為之笑有説之曰君有長材典樂府則簫韶九成直史館則汗青有日入武庫則羽鏃宣威薦宗廟則簠簋甚飾蓋迎刃而解盛篾以加者也時方多難何不捐軀出力掃氛䘲箠四彞以成不朽之名而反韞其楨幹甘與草木俱腐邪此君曰鳳鳥不至吾已矣夫與其排雲呌閶闔披腹呈琅玕孰若樂行憂違確乎不可拔也遂營嶰谷將老焉此君常齋居每嵗惟五月十三日霑醉醉則外其形骸或為人徙至他所不知也故當時為之語曰此君經年常清齋一日不齋醉如泥有時倒載過習池茫然乘墜俱不知晚嵗益枯稿言無枝葉以蘭焚漆割為戒竟保其天年云帝思之命墨工圗其形像以張座隅仍賜號曰靖節處士諸子皆嶄嶄露頭角曰萌最爽美陸沉於世為識者賞味爭挽致之俎豆于諸公之間猶子曰篔苦節肉食者憚之其他支派繁衍青紫曄然居湘中者斑斑以文采稱居渭川者千畝致富時比之封君居武夷者幹弱而毛髯人以為蛻骨仙云明方清清虛居士傳先生姓竹名幹字子直號清虛居士始祖名籦黃帝時避蚩尤亂隱居嶰谷帝平涿鹿治定將作咸池之樂訪律呂材于羣臣伶倫以籦對帝命使持節鉞召之籦甘山谷不肯應詔使者肩曳以行詣闕猶僵仆不起帝慰諭再四乃就斷制敷宣徵角含嚼羽宮樂大成絪縕和羣生樂文鳥巢閣瑞獸逰郊帝竒其功欲封之籦聞而嘆曰寵利居成功非臣之福况以口舌得官乎乃上疏乞骸骨歸嶰谷帝不允留樂府封同姓居嶰谷者以萬計籦卒帝思悼不已蔭其子為湘江侯至有虞舜陟方崩蒼梧野二妃慟哭侯扶持嬛疚身染血淚痕不可洗人嘉其忠號斑氏二妃卒湘人廟于江滸曰湘君侯不自安徙淇澳子孫玉立根盤而固支繁而衍世以清潔自勵耿耿之操直與冰雪爭衡有猗猗子者文學斐然虛懷待物衛武公托為布衣交武公晚年進德皆其切磋事載國風孫枝散處四方皆以籦裔得賜氏不可一一數其尤著者曰山隂氏渭川氏毛氏苦氏淡氏䈽氏爆氏箭氏篠氏至晉有林氏渭川所居延蔓千畝人稱萬户侯山隂孤介寡同獨王子猷延之三徑呼以君而不名毛有名椘者好申韓刑名之學嫉惡如仇名紙者受學蔡倫雅好筆墨官祕書著作郎篠之顯者曰竿曰杖竿好漁隱釣磯杖能扶人之顛危國老多賴之後遇鍊師授刀圭化為龍箭曰矢者有武才能致逺蓋其造詣有的也爆事神荼能以火作霹靂聲驅山魈頗自重今除夕多以楮生代䈽淡苦三子者好軒岐術善療瘋痰渴熱遇病者輒解衣為劑吐液為湯急于救人如此林生于兩晉間清而不隘和而不流士大夫傾慕之山阮康伶輩競為風流蕩廢禮法日就林觴詠風月林不能拒然屹立溪壑未嘗少亂識者知為節介君子也林數傳而為筠孤髙絶俗好空寂之學于潛上人構軒禮之東坡詩云無竹令人俗指筠也竹氏之宗代多聞人如此筠又數傳而生節節生幹是為先生疏暢灑落神采若飛羽儀如鸞鳳欣然而形蒼然而色下實上虛中通外直有君子操拂雲沖霄玉立風塵之表翩翩飄飄真神仙侶也所居或深山窮谷雲溪月徑或困守籬落或飄泊舍宇要之隨寓而安時則臨風而舞掃月而眠意適如也趣向甚正獨好儒者之學率其徒往從方子方子與之處其徒數十人皆衣緑飱風吸露以為食環繞門墻布列階下風雪不退雖夜未嘗就寢煙雨中時或垂頭而睡風觸之輒省擊節微吟聲入枕畔鏘然可愛本根雖固惜枝葉或被纏繞每以篤實語與之幹能虛心聽受輒作點頭狀與徂徠木公孤山梅先生友善一日從容問幹曰梅生木公與子孰優曰含英咀華流芳百世吾不如梅生挺然獨秀壁立萬仞吾不如木公至于有主則虛秉直不回吾於二子亦有微長若乃寧耐嵗寒不以盛衰改此吾三人之所同也願屈至軒下合公為四幸堪嵗寒方子曰梅生有寒酸氣木公自立太峻不免假秦封以驕士孰若吾子徑節凌寒而文采外見清氣襲人今且與子為嵗寒交他日立玉階寸地隨議二子之任使耳幹不豫退乃上書力疏二子材可用推引弗置方子頷之明日命使往孤山梅生辭曰聞江城有玉笛者欲褫吾魄俟少過夏五當往就東閣往徂徠木公辭曰以吾從大夫之後不可徒行也方子惡其迂不復召遂専與幹為忘形交洪璐管若虛傳管若虛字直節號中虛子其先衛人也先世有事軒轅者製律呂協月筒以明君德以通八風天下大服遂為宗廟官世傳其子孫經事歷代功成之君若堯大章舜大韶禹大夏湯大濩文武清廟之樂皆管氏所調也故王者有事太廟必先召之否則衆音殘缺神人弗和衛有居淇上者其人美丰姿多德度蚤與武公同學切磋琢磨以成有斐之德衛人思之其先又有同太公釣隱渭川者族至千餘家當時稱其與千户侯等漢有産鄠杜間者名陸海客蔣氏舍下者名三徑皆渭川人風流瀟灑人鮮及之至晉有曰林者以放曠鳴江左常從嵇康輩七賢遊林弟號此君王子猷深重之髙風清節至今在人耳目此君歷數世至溪居徂徠山薄勢利尚豪邁日設酒肴召李白輩六逸士飲白後入翰林薦之朝名顯于唐後有名龍者官金陵多才幹遷署鎮江因家丹陽宋尹袁粲公餘造宅下與厥子石嘯咏竟日其龍孫曰玉版師少謝塵俗虛心禪理東坡同劉器之參焉因贈以詩其胄歷宋迄元以逮國朝南自閩廣北極幽陵族屬蕃衍若虛性質堅剛姿容美盛自始生已有髙節心無私曲既長吟詠風晨月夕有所激即清吟琳琅聞者嘆曰洋洋乎盈耳哉此管氏子聲詩也誠所謂鏗金戞玉陽春寡和者矣且器宇𢎞敞襟度瀟灑世之避煩熱者多往依之蜀人葉恆盛大庾人白知春素重其節求與之交每接遇二人私語曰有若無實若虛犯而不校管氏子有之吾與若有愧焉若虛聞之益虛已遜碩膚恆盛嘗曰吾慨天下物直而才者多夭折枉而不才者恆保貞固是以椅桐梓漆未嘗成大拱樗櫟桑榖更嵗月而恆存天耶人耶若虛曰不然物之生以天而遇以時顧所養若何耳得其養則無物不長失其養不伐於斧斤害於牛羊者幾希又烏望其才且夀哉今子謂不才而夀才而夭豈其然哉竊試評之狀貌魁梧挺挺大節天下稱才稱夀者莫如恆盛神姿清徹素有丰采則知春獨擅其才惜玉質易衰風韻不耐耳如若虛者翠氛可掬清味婉如用舍隨緣修短安命所謂夭夀不二者吾于二子亦有微長二子服其確論御定佩文齋廣羣芳譜卷八十二
