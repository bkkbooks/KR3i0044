body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十三竹譜竹二集藻記原唐白居易養竹記竹似賢何哉竹本固固以樹徳君子見其本則思善建不㧞者竹性直直以立身君子見其性則思中立不倚者竹心空空以體道君子見其心則思應用虛受者竹節貞貞以立志君子見其節則思砥礪名行夷險一致者夫如是故君子人多樹之為庭實焉貞元十九年春居易以㧞萃選及第授校書郎始於長安求假居䖏得常樂里故闗相國私第之東亭而䖏之明日履及於亭之東南隅見叢竹扵斯枝葉殄瘁無聲無色詢於闗氏之老則曰此相國之手植者自相國捐館他人假居繇是筐篚者斬焉篲帚者刈焉刑餘之材長無尋焉數無百焉又有凡草木雜生其中菶茸薈蔚有無竹之心焉居易惜其嘗經長者之手而見賤俗人之目翦棄若是本性猶存乃芟翳薈除糞壤疏其間封其下不終日而畢於是日出有清隂風来有清聲依依然欣欣然若有情於感遇也嗟乎竹植物也於人何有哉以其有似於賢而人愛惜之封植之况其真賢者乎然則竹之於草木猶賢之於衆庶嗚呼竹不能自異惟人異之賢不能自異惟用賢者異之故作養竹記書於亭之壁以貽其後之居斯者亦欲以聞扵今之用賢者云劉巖夫植竹記秋八月劉氏徙竹凡百餘本列於室之東西軒泉之南北隅克全其根不傷其性載舊土而植新地煙翠靄靄寒聲蕭然適有問者曰樹椅桐可以代琴瑟植樝棃可以代甘實茍愛其堅貞豈無松桂耶何不雜列其間也答曰君子比徳扵竹焉原夫勁本堅節不受雪霜剛也緑葉萋萋翠筠浮浮柔也虚心而直無所隐蔽忠也不孤根以挺聳必相依以林秀義也雖春陽氣王終不與衆木鬭榮謙也四時一貫榮衰不殊常也垂蕡實以遲鳳樂賢也嵗擢笋以成榦進徳也及乎將用則裂為簡牘於是寫詩書彖象之辭留示百代微則聖哲之道墜地而不聞矣後人又何所宗歟至若鏃而箭之挿羽而飛可以征不庭可以除民害此文武之兼用也又劃而破之為篾席敷之扵宗廟可以展孝敬截而穴之為箎為簫為笙為簧吹之成虞韶可以和人神此禮樂之並行也夫此數徳可以配君子故巖夫列之於庭不植他木欲令獨擅其美且無以雜之乎竊懼来者之未諭故書曰劉氏植竹記尚徳也増劉寛夫􅜩竹記右史院邇宸居之正地直日華之東偏俗塵不飛人意自逺閟䆳幽閴似非官曹有竹一叢翠接階㕔其虚中潔外之操䕃坐袪煩之能紫薇郎髙公嘗賦之固已備盡然而嵗月滋久蔓衍浸淫大小相依髙下叢茂俾日光不透隂氣常凝暝色為之早来陽春為之減煦四序不正一庭常昬蚊䖟曹飛雀鷃自遂披圗散帙觀覽不快二年冬侍軒之暇載筆之餘偶步庭除病其蔽翳因命斧斤將治其蕪沉吟積時乃用申誡且謂其徒曰礪爾器用端爾瞻視謹爾操執慎爾區分有其質微而葉環苯䔿者去之從風而不能自正者去之大而倚者去之聚而曲者去之竅而不能備笙簧之用者去之挺而不能栖鸞鳳者去之其有羣居不亂獨立自持振風發屋不為之傾大旱乾物不為之瘁堅可以配松柏勁可以凌雪霜宻可以泊晴煙疎可以漏宵月嬋娟可玩勁挺不廻者爾其保之既而芟翦成功蘩蕪交盡去者存者邪正乃分不浃旬扶疎一林歴歴可觀有清風澡慮之效無蔽日朋奸之譏檀欒風生韻合宫徵君子是以知竹箭之美尚資科别之功即其他不俟言而詳矣或以斯為小可以伸之因紀一時之妙廣而述之原宋王禹偁竹樓記黄岡之地多竹大者如椽竹工破之刳去其節用代陶瓦比屋皆是以其價㢘而工省也予城西北隅雉堞圮毁蓁莽荒穢囙作小樓二間與月波樓通逺吞山光平挹江瀨幽閑遼敻不可具狀夏宜急雨有瀑布聲冬宜宻雪有碎玉聲宜鼓琴琴調虛暢宜詠詩詩韻清絶宜圍棊子聲丁丁然宜投壺矢聲錚錚然皆竹樓之所助也公退之暇披鶴氅戴華陽巾手執周易一卷㷊香黙坐銷遣世慮江山之外苐見風帆沙鳥煙雲竹木而已待其酒力醒茶煙歇送夕陽迎素月亦謫居之勝槩也彼齊雲落星髙則髙矣井榦麗譙華則華矣止扵貯妓女藏歌舞非騷人之事吾所不取吾聞竹工云竹之為瓦僅十稔若重覆之得二十稔噫吾以至道乙未嵗自翰林出滁上丙申移廣陵丁酉又入西掖戊戌嵗除日有齊安之命己亥閏三月到郡四年之間奔走不暇未知眀年又在何䖏豈懼竹樓之易朽乎幸後之人與我同志嗣而葺之庶斯樓之不朽也増蘇軾文與可畫篔簹谷偃竹記竹之始生一寸之萌耳而節葉具焉自蜩蝮蛇蚹以至扵劒拔十尋者生而有之也今畫家乃節節而為之葉葉而累之豈復有竹乎故畫竹必先得成竹扵胸中執筆熟視乃見其所欲畫者急起従之振筆直遂以追其所見如兎起鶻落少縦則逝矣與可之教予如此予不能然也而心識其所以然然而不能然者内外不一心手不相應不學之過也故凡有見扵中而操之不熟者平居自視了然而臨機忽焉喪之豈獨竹乎子由為墨竹賦以遺與可曰庖丁觧牛者也而養生者取之輪扁斵輪者也而讀書者與之今夫夫子之托扵斯竹也而予以為有道者則非耶子由未嘗畫也故得其意而已若予者豈徒得其意并得其法與可畫竹初不自貴重四方之人持縑素以請者足相躡扵其門與可厭之投諸地而罵曰吾將以為韈士大夫傳之以為口實及與可自洋州還而余為徐州與可以書遺予曰近語士大夫吾墨竹一派近在彭城可往求之韈材當萃扵子矣書尾復寫一詩其畧曰擬將一匹鵞溪絹掃取寒梢萬尺長予謂竹長萬尺當用絹二百五十匹知公倦扵筆硯願得此絹而已與可無以答則曰吾言妄矣世豈有萬尺竹也哉余因而實之答其詩曰世間亦有千尋竹月落庭空影許長與可笑曰蘇子辨則辨矣然二百五十匹吾將買田而歸老焉因以所畫篔簹谷偃竹遺予曰此竹數尺耳而有萬尺之勢篔簹谷在洋州與可嘗令予作洋州三十詠篔簹谷其一也予詩云漢川修竹賤如蓬斤斧何曽赦籜龍料得清貧饞太守渭濵千畝在胸中與可是日與其妻逰谷中燒筍晚食發函得詩失笑噴飯滿案元豐二年正月二十日與可殁扵陳州是嵗七月七日余在湖州曝書畫見此竹廢卷而哭失聲昔曹孟徳祭喬公文有車過腹痛之語而余亦載與可疇昔戲笑之言者以見與可與予親厚無間如此也晁補之有竹堂記濟南李文叔為太學正得堂扵經衢之西輸直扵官而居之治其南軒地植竹砌傍而名其堂曰有竹榜諸棟間又為之記扵壁率午歸自太學則坐堂中掃地置筆硯呻吟䇿牘為文章日數百篇不休如繭抽緒如山蒸雲如泉出流如春至草木發須臾盈卷軸門窓几席婢僕犬馬目前之物有一可指無不論説形容强嘲而故評之以致其欣悦而扵竹尤數數也顧其地狭而卑天雨榛穢蜘蛛之織河栁菟葵之所交横而蒙翳人不知其竹也有過者文叔必顧堂下而語之讀壁間記仰棟而指其榜曰吾固詔客矣客囅然而笑曰今夫渭濵之千畝淇園之林與南山之叅天而蔽日者其大若杯若盂若桐梓之軀其膠漆嵌巖之上而臨百仞之淵不特出屋簷而摩墻堵也暮春者春雷隠隐萬笴奮角如犀角作籜觧而出碧一日百尺彌望不可以極於時刀斧之取材度經圍而得之大小齊一西轉巴笮南引江漢浮渭而亂河囷束簰屬而下者為筒為竿為屋椽犍菑千丈之笮徧國之籓籬是賴與竅而比於律呂以悲衷娛耳者聲音滿天地也視其旁之人室廬竹也器用竹也樵而薪者竹也以貿米鹽而出之其鄰境者竹也夫此人豈知竹之愛翛然而喜諄諄然語人而以誇之曰吾居有竹也哉文叔亦輾然而笑曰不然夫物安知有貴賤之所常在玉之美而藍田以抵鵲沈為美木而交趾以為盤石彘白鷴錦雞山中以醯腊而貴人以百金致茗以為粥而外國以為佩夫物固有以多為賤而以少為貴者今夫王城之廣大九塗四達三門十二陌坊之棋置上自王侯至扵百姓庶民宮接而垣比車馬之所騰藉人氣之所蒸漬囂塵百里欲求尺寸之地以休逸而莫之致而貧者置圊無隙况扵其他哉然則環堵不容丈而有竹如吾堂者不知能㡬人也則予所以揭之扵棟而名之書諸壁而記之翛然以喜諄諄然語客以誇之不亦可哉且竹之美昔人以比徳松柏冬夏青青君子之所獨也以夫少猶貴之使得見夫渭川淇園與南山之蒼蔚者而逰其間雖多固不可賤也夫多猶不可賤又况其少哉原明王世貞萬玉山房記司先生顔其讀書之舍曰萬玉山房而屬世貞為之記夫萬玉者萬竹也竹何以稱玉也曰君子比徳扵玉已而比玉扵竹今夫玉中實竹中虚竹磊砢而多節玉渾淪而已胡以比也然玉温潤而澤縝宻以栗竹之質同也玉有禮地之珪曰琅玕之青碧竹之色同也叩之清越以長竹之音同也音之在樂有八而各居其一又同也玉稱君子竹亦稱君子又同也胡弗比也始司先生之問舍扵江陵也謀所樹客或進曰公不聞之腐史江陵千樹橘乎哉苞可噉也市之入與千户侯等先生笑曰不爾吾且樹竹客曰渭濵之千畝入與江陵等歟先生曰非是之謂也吾生平慕君子之佩玉而居貧不可致則有竹在令斥傍舍之隙悉移竹而加培溉焉既成臨風而聽之琮琮琤琤與天籟合悠然若韶濩之入耳過雨而撫之青蔥峭蒨與天並色濯濯若璆琳之寓目暑而就之驕陽翔舞而不敢下枕流而翫之蔚藍之光下上相接吾安知夫竹乎玉乎吾適吾宇而神吾境暢吾五官濯吾心腑而已且去吾舍數百武則悍王之宮也其横行若掃矣又去之則大相之府也其熱可炙手矣又去之故郢都西通巫巴東有雲夢之饒其市囂若蜩螗矣然竟不能越吾所謂萬玉者而䦨入吾之山房交扵吾之視聽而蕩吾志吾豈以渭濵千畝為千户侯計哉不然吾何不因地之宜而樹之橘也司先生居民部以見推擇天官數遷選部郎至容臺卿扵是不得長有兹舍而命工貌其凡恒挟以自隨諸通人名士皆為詩歌詠之而今宗伯徐公子言序之司先生意猶未巳以書屬世貞俾為記世貞治弇中有竹萬个然不能守舍而去之金陵安能為先生記雖然使余能如司先生貌之而又詠歌之序之其亦庶可以無繋於舍矣或曰子之言甚得司先生意其比竹扵玉甚辨不然椘之玉也不且以為周之璞也耶増唐順之竹溪記余嘗㳺於京師侯家富人之園見其所蓄自絶徼海外竒花石無所不致而所不能致者惟竹吾江南人斬竹而薪之其為園亦必購求海外竒花石或千錢買一石百錢買一花不自惜然有竹據其間或芟而去焉曰毋以是占我花石地而京師人茍可致一竹輙不惜數千錢然纔遇霜雪又槁以死以其難致而又多槁死則人益貴之而江南人甚或笑之曰京師人乃寶吾之所薪嗚呼竒花石誠為京師與江南人之所貴然窮其所生之地則絶徼海外之人視之吾意其亦無以甚異於竹之在江以南而絶徼海外或素不産竹之地然使其人一旦見竹吾意其必又有甚扵京師人之寶之者是將不勝笑也語云人去鄉則益賤物去鄉則益貴以此言之世之好醜亦何常之有乎余舅光禄任君治園扵荆溪之上徧植以竹不植他木竹間作一小樓暇則與客吟嘯其中而間謂予曰吾不能與有力者争池亭花石之勝獨此取諸土之所有可以不勞力而蓊然滿園亦足適也因自謂竹溪主人甥其為我記之余以謂君豈真不能與有力者争而漫然取諸其土之所有者無乃獨有所深好扵竹而不欲以告人歟昔人論竹以為絶無聲色臭味可好故其巧怪不如石其妖艶綽約不如花孑孑然有似乎偃蹇孤特之士不可以諧於俗是以自古以来知好竹者絶少且彼京師人亦豈能知而貴之不過欲以此鬭富與竒花石等耳故京師人之貴竹與江南人之不貴竹其為不知竹一也君生長扵紛華而能不溺乎其中裘馬童奴歌舞凡諸富人所酣嗜一切斥去尤挺挺不妄與人交凜然有偃蹇孤特之氣此其扵竹必有自得焉而舉凡萬物可喜可玩固有不能間也歟然則雖使竹非其土之所有君猶將極其力以致之而後快乎其心君之力雖使能致竒花石而其好固有不存也嗟乎竹固可以不出江南而取貴也哉吾重有所感矣跋増宋真徳秀跋陳慧父竹坡詩稿昔王子猷居必種竹曰何可一日無此君而子猷行不副名見謂汙濁然則子猷固愛此君政恐此君不愛子猷耳今竹坡君並溪而廬種竹萬箇而有詩千篇好風凉月長吟其間此君有知亦當欣然為君一笑也建人真某為作歌曰萬玉兮森森清風兮滿林有幽人兮髙蹈時撃節兮長吟長吟兮陸續鳳為起舞兮鸞為度曲羌此樂兮誰知簞瓢兮亦足雜著原晉戴凱之竹譜植物之中有名曰竹不剛不柔非草非木小異空實大同節目或茂沙水或挺巖陸條暢紛敷青翠森肅質雖冬蒨性忌殊寒九河鮮育五嶺實繁萌筍苞籜夏多春鮮根幹將枯花􅘽乃縣䈙必六十復亦六年籦籠之美爰自崑崙員丘帝竹一節為船巨細已聞形名未傳桂實一族同稱異源􅟳尤勁薄博矢之賢篁任篙笛體特堅圎棘竹駢深一叢為林根若推輪節若束鍼亦曰笆竹城固是任篾筍既食鬢髮則侵單體虚長各有所育苦實稱名甘亦無目弓竹如藤其節郄曲生多臥土立則依木髙㡬百尋狀若相續質雖含文須膏乃縟厥族之中蘇麻特竒修榦平節大葉繁枝凌羣獨秀蓊茸紛披篔簹射箇箖箊桃枝長爽纖葉清肌薄皮千百相亂大細有差相繇既戮厥土惟腥三堙斯沮尋竹乃生物尤世逺畧狀傳名般腸實中與笆相類扵用寡宜為筍殊味筋竹為矛稱利海表㨷仍其榦刃即其杪生扵日南别名為篻百葉參差生扵南垂傷人則死醫莫能治亦曰篣竹厥毒若斯彼之同異余所未知䈏與繇衙厥體俱洪圍或累尺䈏實衙空南越之居梁柱是供竹之堪杖莫尚扵笻磥砢不凡狀若人功豈必蜀壤亦産餘邦一曰扶老名實縣同􅚠􅀢二族亦甚相似把髮苦竹促節薄齒束物體柔殆同麻枲蓋竹所生大抵江東上密防露下疎来風連畝接町竦散崗潭雞脛似篁髙而筍脆稀葉梢杪類記黄細狗竹有毛出諸東裔物類衆詭千伯不計有竹象蘆因以為名東甌諸郡縁海所生肌理勻浄筠色潤貞凡今之箎匪茲不鳴㑹稽之箭東南之美古人嘉之因以命矢箘簵載籍貢名荆鄙篃亦箘徒概節而短江漢之間謂之䈛竹根深耐寒茂彼淇苑篲條蒼蒼接町連篁性不卑植必也巖崗踰矢稱大出尋為長物各有用掃之最良又有族類爰挺嶧陽懸根百仞疎榦風生簫笙之選有聲四方質清氣亮衆管莫伉亦有海篠生扵島岑節大盈尺榦不滿尋形枯若筯色黄若金徒為一異㒺知所任赤白二竹還取其色白薄而曲赤厚而直沅澧所豐餘邦鮮植肅肅䈄􅢭畟畟攅植擢筍於秋冬乃成竹無大無小千萬修直􅀢膜内暠繡文外赩箛箛誕節内實外澤作貢漢陽以供輅䇿浮竹亞節虚軟厚肉臨溪覆潦栖雲䕃木供筍滋肥可為㫖蓄厥性異宜各有所育􅀢植扵宛䇣生扵蜀細篠大簜竹之通目互各綂體譬牛扵犢人之所知事生軌躅赤縣之外焉可詳録臆之筆之匪邁伊矚頌増宋黄庭堅覺範師種竹頌并序簡池覺範道人城東道友也今在簡州景徳院其家風十二時似趙州東院西也種竹兩枝扵宴坐軒中山谷老農作頌往在江南住竹山道人兩嵗三来訪聽風聽雨看成龍牛羊折角入朝餉簡州城東刮地寒手種檀欒三兩竿竹成要作無孔笛若有靈龜一任鑚竹頌深根藏器時寸寸抱竒節遭時上風雲故可傲冰雪贊増宋謝莊竹贊瞻彼中唐緑竹猗猗貞而不介弱而不虧杳裊人圃蕭瑟雲崖推名椘潭美質梁池宋祁紫竹贊竹生三嵗色乃變紫伐榦以用西南之美慈竹贊根不他引是得慈名中實外堅筍不時萌末或下垂苒弱縁縈㯶竹贊葉㯶身竹族生不蔓有皮無枝實中而榦方竹贊竹箇皆圓此獨方形厚倍扵竅緗節稜稜蘇軾戒壇院文與可畫墨竹贊風梢雨籜上傲冰雹霜根雪節下貫金鐵誰為此君與可姓文惟其有之是以好之騷原唐劉蜕哀湘竹悵二妃之淚竹圎紅滴滴兮臨乎煙沚竦枝與修榦兮吟哀風之不已搖勁節而錦舒兮垂髙隂而自美招翔鸞之與翠鳳兮緝晴霞之數里繁柯重乎舜祠兮痩影疊乎湘水諒髙節之自任兮匪庭篠之云比鄙衆䕃之延接兮耻凡羽之栖止入清溪之浪聲兮無笙簧之相擬葉翻波兮騷屑之風露滴煙蒙兮濯纓之子悵靈均之節兮依然想貞姿兮千年若此賦御製竹賦并序江南修竹成林森如綠玉見輒愛之昔人所以歌君子也舟行閑暇偶作賦曰攬嘉生之植物美修竹之㛹娟振葳蕤以擢地結蒼翠而叅天吐碧鮮扵原隰含玉潤扵山川拂丹霄以煥采濯晨露以增妍爾其體本貞堅性惟髙孑欵欵虚中亭亭秀越居逺俗以無塵生自然而有列㳺必集扵鵷鸞色不渝扵霜雪抱君子之徳生豈凡姿之可埓至扵汗青為簡截管成聲文章彬郁律呂和鳴流兩間之元化開萬古之菁英亦有蕩材敷布箭括叢生鏃礪作器規矩中程或垂美扵九府或呈能扵五兵斯其為致用之廣逺尤不可以一得名也至若淇澳見稱扵衛國夹池作賦扵梁園詠千畝扵渭上想一葉扵湘潭㒺不絶羣標傑意殊態嚴况爾闕北秋髙江南地潔見衆茂之咸凋知孤貞之自結巨榦凌風修莖映月豈徒覽夫清隂實興感乎勁節何當植根綺殿布影彤庭彩鸞下集丹鳳載鳴將曉餐夫珠實亦暮託扵紺莖廼其峭蒨之容檀欒之美繁條綴青芳筠孕紫散夏景扵瑤林䕃春華扵仙沚戞素籟以風疎被青暉而雲委影入户而窺簷聲含宮而嚼徴亦足以怡情適性娱目賞心徘徊晨夕杼寫髙吟響蕭蕭而隐几飇颯颯以開襟披十重之緗帙鼓五絃之雅琴聊濡毫以成賦寄予思扵遙深増晉江逌竹賦有嘉生之美竹挺純姿扵自然含虚中以象道體圎質以儀天託宗爽塏列族圃田縁崇嶺帶廻川薄循隰行平原故能凌驚風茂寒鄉藉堅冰負雪霜振葳蕤扇芬芳翕幽液以潤本承清露以濯莖拂景雲以容與拊恵風而廻縈齊王儉靈丘竹賦靈丘深沉蔓竹凝隂神根合拱貞榦百尋振芳條乎崑岳敷緑采扵髙岑沿淮海而蔚映帶沮漳而蕭森志東南而擅美在淇衞而流音方靈夀而均茂儀菌桂而成林若乃青春受謝九野舒榮緑蘋齊葉白芷抽萌榦抽蔥而特秀篠擢穎而垂英霜皦鏡扵原隰木衰疏扵郊阡翠葉與飛雪争采貞柯與層冰競鮮梁簡文帝修竹賦有㛹娟之茂篠寄江上而叢生玉澗桃枝之麗魚腸雲母之名日映花靡風動枝輕陳王歡舊小堂佇軸今餞故人亦賦修竹伊嘉賔之獨劭顧余躬而自恧任昉静思堂秋竹賦静思堂連洞房臨曲沼夹修篁竹宮豐麗扵甘泉之右竹殿𢎞敞扵神嘉之傍緑條發丹楹翠葉映雕梁入房掃文石傍簷拂象牀常生偶蘭桂結實值鴛凰逢性與之至道偶斯文之在兹歡柏梁之有賦恨相如之異時江淹靈丘竹賦登﨑嶇之碧巘入朱宮之瓏玲臨曲江之㢠廻盪望南山之蔥青鬱春華扵石岸赩夏彩扵沙汀逺亘紫林祕野近帀玉苑禁坰扵是緑筠繞岫翠篁緜嶺參差黛色陸離紺影上謐謐而留閒下微微而停靖蒙朱霞之丹氣曖白日之素景故非英非蘂非香非馥而珍跨仙草寶踰靈木夹池水而檀欒繞園塘而橚矗既間霜而無凋亦中暑而増肅每冠名扵華戎將擅竒扵水陸况有朝雲之館行雨之宮窓峥嶸而緑色户踟蹰而臨空綺疏蔽而停日朱簾開而留風被箘簵之窈蔚結篠簜之溟濛或産鳷鵲之右或居露寒之東皆金輿之所出入瑤輦之所周通陳顧野王拂崖篠賦詩詠淇水騷美江干崖憐拂石神貴掃壇既来儀扵鳴鳳亦攸集扵翔鸞入翠壁之宵月映沅澧之驚湍帶金風之爽朗雜玉潤之檀欒陪嘉宴扵秋夕等貞節之嵗寒隋蕭大圜竹花賦嗟春色之澄明映陽流之澈清花繞樹而競笑鳥徧野而俱鳴殘陂萍合斜蹊草榮暄條絮滿暖路絲横㳺蜂集而銜蘂戲蝶飛而帶英鵯欲啼而茝歇鴈始去而蘆生别有葳蕤繡簜㛹娟緑筒縹枝承露緗箬来風漢律依節月桂臨叢乍影翻扵樂沼時名留扵瑞宮學應龍扵葛水宿鶠鳳扵方桐洛下七賢湘濵二女傾翠蓋之踟蹰泛蓮舟之容與倜儻傲人便嬛笑語拊嫩筍以含啼顧貞筠而命醑唐許敬宗竹賦惟修竹之勁節偉聖賢之留賞覽山經而逖聽詠周詩而遐想掩寰中而獨秀非庶物之所仰若夫嶰谷著美嵇山見知衞國之稱淇澳梁園之賦夹池山陽之翻宻葉江潭之竦喬枝雖有聞扵在昔諒無得而標竒乃徙植扵廣庭爰移根扵禁苑亘蓂草而界列繞醴泉而右轉修榦横扵松徑低枝拂扵蘭畹對紫殿之初旭臨丹樓而向晚望威鳳而来儀佇化龍之為逺爾乃春光變色夏景開松枝藏戲鳥葉間殘虹上便娟而防露下檀欒而来風散歸雲之掩翳引落日之玲瓏雖復嚴霜曉結驚飇夕扇雪覆層臺寒生複殿惟貞心與勁節隨春冬而不變考衆卉而為言常最髙扵歴選吳筠竹賦惟坤靈之播育何備物之實繁偉兹竹之標挺得造化之清源契道含靈表貞示節葉森散以翠錯莖鮮修而瓊潔爾其和風流暢萬彚昭陳楊葩曄其密苑荑栁藹扵通津不郁馥以啟曜但葳蕤而有筠亦未知為異也至如殺氣淩厲凝霜蕭瑟覽平椘之蒼茫窺衆林其如失冒冰霜之涸沍逾青熒以鬱宻則殊可重焉故詩曰如苞書稱厥貢猗茲淇園美彼雲夢昔在軒后肇官隂陽俾伶倫扵嶰谷伐修竹之珍篁裁六律以協氣調八風而順常然後成竽籥以備樂其聲濫而彌長笙鏞以間鳥獸蹌蹌諒自然之純粹曷羣材之可方若乃渭川千畝山陽數林㑹稽方潤扵碧玉羅浮比色扵黄金上㸃㸃以雲翳下泠泠而鳳吟袪赫曦之燠景納淒凉之清隂王子所以嘯詠嵇生為之幽尋召嘉賔及令友暢緑醖與鳴琴美逰盤之逸趣清寂寞之逺心若乃夹滄江倚丹崿蓄水霧之沉沉揺巖煙之漠漠湘妃有揮涕之感楚謡興防露之作或挺鼓吹之嶔崟或垂天門之磅礴皆鸞鳳之所翔集孔翠之所栖託豈獨嬋娟扵廣漢之壤亦有璀璨扵蓬萊之峰結實珠粒敷花紫茸拂皓絮以飛雪摧紺莖以韻鐘故列仙之攸翫匪吾人之所從也亦有化雉吳國成龍葛陂容人篔簹育蟲桃枝一笋鳴其𦙍嗣三節獲乎嬰兒榮燈纉以感孝茂窓櫺以表竒彗家壇以塵滅環石牀以隂滋皆靈變之譎怪良難得而備知爾其衆彚非一則有篻簩筋射筒箖箊􅀢􅀢箛箠之肅矗龍鍾雲母之扶疎箬箭浮色以縹燠􅀢􅢭綷文而繡攄方志之所遺載山經之所闕書安可得而詳矣靡不勁堅其性蔥蒨厥色不規而圎不操而直故髙皇製冠以守位孝文剖符以表職博望侯傳扵大夏之外穆天子樹扵𤣥池之側推此類以彌廣匪斯文之可極也喬琳慈竹賦維竹稱慈㡬乎有知九族敦敘孝友威儀是竹必滋五服相殘骨肉擕離是竹必衰茍自家而刑國亦觸類而増思苯䔿固䕶檀欒櫛比如束之稠如揷之宻勁節中聳攅根内實聲惟戞風影不透日類宗族之親比同朋友之造膝至若暮嵗窮律霜凝雪霏陶鈞無發生之理松柏有後凋之期是竹也叢篁劈開芽筍怒長紫籜連披青筠紛上有偕老之情感饋親之養如受制扵籬界不旁侵扵土壤雨露之澤謝爾衆芳細葉未吐貞心已長耻髙標而迥出斯褭曲而不揚匪趨時扵律候寧隨韻扵笙簧保無用而以道自將愧不才而與物俱昌苟成隂扵隙地作盛景之清凉重曰夫緜緜𤓰瓞兮知有子母邕邕鴻鴈兮如次弟兄於家則疏附禦侮於國則磐石維城田氏不分庭之荆陳家則應天之星莫不鬱映棠棣急難鶺鴒斯竹也共根連茹一本千莖年深轉宻嵗晩彌榮一可以厚骨肉一可以敦友生扵靈臺而莫非信性彰慈孝而感通神靈李程竹箭有筠賦喻人守禮如竹有筠俾修已以自守同固本而相因操持彰扵嵗暮勤徳貴乎日新所以取彼後彫之色戒夫行道之人將以禦冬且見檀欒而守節比扵藏器詎可須臾而去身若乃清霜翻𤣥律改彼衆卉之具落同受氣於真宰何蓊茸而自異乃㛹娟而有待茍常其性寒竹何患扵時移不易其心志士當懐扵道在豈不以和澤自潤表裏相質竹無筠不能固其節人舍禮曷以法扵時伊先哲之善喻作後代之元龜企扵禮者勤而行之苞本之時已包周身之防疎莖之勢更叶凌雲之期當其冒霰停霜雲披風靡諒青青而斯在何冉冉而居彼是知禮之扵已如我有徒筠之扵竹如我有膚理無特立義必相須堅剛自持雖貫四時而莫改賞翫不足奚可一日而或無嗟乎皮之不存何以具其體心之不固何以謹其禮所以大戴之記足徴相䑕之詩爰啟君子之道斯其象諸示外以固執中而虛閲寒暑之不變齊榮辱之所如天損不侵地利空積包緑籜而未改交翠葉而不易君子察扵此者可學禮而受益髙無際大明西垣竹賦嶰谷修篁移植仙堂左聮溫室之樹前對鳳池之芳一生孤貞四時青蒨不争麗扵夏色不改貞扵秋霰保此嵗寒之容得䕃宰衡之院露羃歴以珠綴風清泠而響繁雜金絲扵北掖對雲嵩扵西垣曉視含煙朝歸捧日挺八桂以獨秀與三槐而交宻若夫制為用也則笙可以下鳳凰笛可以奏宮商筆可以播文章管可以調隂陽信無施而不可若有待而韜光亂曰托根勝地兮擢榦捎雲抱貞節兮蔥鬱氤氳若賞七賢之清曠不可一日無此君也無名氏竹賦總羣籟以擇音歴衆材而簡質惟兹竹之珍勁獨懐貞而守一若洗文濃露濯影華池離離嘉實冉冉纎枝含夕氣而拖翠照晨旭以舒猗淩積霜而莫改因虚心而不虧上横桂暉下拂松蓋抗修莖扵雲表脱輕花扵霞外千仞未極其髙十圍寧申其大既絶羣以標傑亦冠叢而稱最連星影而類珠晩虹挂而猶帶蒙宻柔柯布濩繁葉白日朝映素輪夜接色浄潭深影沉攅疊洎乎層隂結長飇起清徵奏鳴弦理金罍溢而未傾玉山儼而猶峙詆訶六籍咀嚼三史窮𤣥熙之根柢極天地之終始此乃至人勝集七子碌碌則安齒故語其用也則五離十折絲剖毫分縈九華扵紈扇結䨇雉扵簟文乍揺紈袖時拂湘裙掩凝鉛之豔逸籠流麝之氤氳若夫取象制儀激商流雅圎徵有素清亮非假信鳳鳴之可習實龍吟而可寫乃曲絶而和微非韻髙而調下豈知分光綺殿散影華軒淡雲霞之逺色霑雨露之餘恩嘉庭樹之蠲忿跂桃李之無言庶嵗寒而無易常耀節扵梁園無名氏慈竹賦有序廣漢山谷有竹名慈生必向内示不離本修莖巨葉攅根沓柢叢之大者或至百千株焉而縈結踰乎咫步好事君子徙為階庭之翫焉吁嗟非此土所有乃有厭流俗之譏動鄉闗之思者蓋撫髙節而興感覽佳名而思歸遂為賦曰有竹猗猗生扵髙陂左連瑶帶右雜瓊枝恨幽客之方賞嗟君侯之不知徙蔚丹谷遷榮緑池氣凛凜而猶在色蒼蒼而未離屈巖壑之容貌充階庭之羽儀爾其劃地分域駢隂抗趾疊榦龍廻攅根鳳峙防碧落扵霄末翳紅光扵夕始崇柯振而煙靄生繁葉動而風飇起擁涼砌之晨肅屏炎扃之晝滓至若白藏載謝𤣥英肇切塞北河堅江南地裂觀衆茂之咸悴驗貞輝之獨潔抽勁緑以垂霜總嚴青而負雪蓋同類之常稟非殊方之異節若乃宗生族茂天長地久萬柢争盤千株競糾如母子之鈎帶似閨門之悌友恐孤秀而成危每羣居而自守何美名之天屬而和氣之𡨕受嗟乎道之存矣物亦有之不背仁以貪地不藏節以遁時故其貞不自炫用不見疑保夷險之無易哂榮枯之有期我蓬轉扵岷徼遂萍流扵江汜分兄弟扵兩鄉隔晨昏扵萬里撫貞容而骨媿伏嘉號而心死庶因感而長懐遂䇿情而勵已無名氏孤竹賦有斐君子兮將以自怡藝孤篠扵前墀翫以時惬所思且面陛則陽笑猗猗而䖏渭向砌則燠袐青青之在淇問君何事生乎兹嬋娟抱節而無詞借而東南之美㑹稽千里阻江阻河所貴則那至乃柯葉不二嗟吁此地彼其之子賤目貴耳豈知孤者取稀物莫之依含混元之休氣吸太陽之清暉長則尺準大可寸圍有美逰兮㤀其歸更憶朝霞露未晞懸明月而影短帶疎雨而聲微觀乎褭娜容與風生其䖏應知黙定洪鐘律㡬日能令童子悟實方就而孤鳳食来枝或成而一龍飛去天造自然含虚佩堅堅以保名虚以戒盈瞻彼標兮人之程萬類則改千竿森在其在伊何増冰峨峨瞻彼嶙兮不可磨則知天籟竒兮由我起道生一兮得我始得之者非取翫物而已宋蔡襄慈竹賦種植至多强名萬彚物㧞其萃兹乃當天地之正氣有美竹兮特稟夫慈名而榮被豈有懐扵本根兮何千竿蓊然而環侍若夫吳郡名園王家新第逺閣斜欄横塘静水或薫風晝来或秋露宵墜日遲留兮簷外隂移人悽悄兮屏間籟起方且濯峭格而清舉足檀欒之生意或翹而舉者若堂有髙年兮勤素風而講議或亞而側者若家有令子兮聞話言而沉思悵如出門而事逺逰兮滋宿雨之清淚雍如奉巵而介眉夀兮羃春煙而怡醉紫芽蟠聨馨兒季穉去者奔追迎者嬉戲疎者如招並者如倚雖復貫千狀扵巧筆曽莫形其髣髴借如秋晚霜重兮萬木稜稜而僵悴隴榆盡兮塞月髙堤楓丹兮椘江紫此君也束藍田之苗玉刻炎州之稍翠固節虚心兮雖大鈞不能奪其志扵是揖三荆扵堂下結蔓藟扵河涘襲氣同根之豆交驩承萼之棣顧威鳳之時下亦孝烏之来寄設有用扵律筩天聲發兮太和備覩此芳物悲哉逺人昔我從軍兮南之海濵今我辭家兮西逰洛塵悵然扵舊國舊都感莊生之論恭止乎維桑與梓諷周傅之陳指白雲兮天逺採幽蘭而露新嗟碧鮮之得地乃叢茅而相親吾議爾徳豈止乎千畝之渭濵萬石之封君者也黄庭堅對青竹賦有序余椘産也閲東南之竹多矣未嘗聞對青竹者也嘉州僧従之包封見貽蓺之而成乃初識之惟範圍之内有知之物一無窮無知之物一無窮一耳一目不能徧覽也况六合之外者乎感而賦之竹之美扵東南以節不以文也其在椘之西鬱鬱蔥蔥連山繚雲也㑹稽之竒材任矢石蘄春之澤夏簟簫笛沅湘淚血卭崃髙節慈竹相守孝竹冬茁慈姥嶰谷笙竽笆篁長石之山一節可航猶未極其瑰怪不常也故吳椘無竹工非無竹工婦能織緝之器兒能雞鶩之籠也今夫筥筐籯笲榱櫺翰藩巴船百丈下漢為笪貴之則律呂汗簡賤之則箕箒蒸薪惟所逢遭盡扵斧斤美哉斯竹黄質墨章如出杼軸織文自當解甲税枯金碧其相嵗寒在躬又免斮烹彼其文章之種性不可致詰刳心而求之不可得劚根而求之不可得匪人匪天有物有則惟其與蓬蒿共盡而無憾余亦不知白駒之過隙薛士隆種竹賦沔鄂之都牙堂之背乆廢弗治汙萊有穢徙修竹而蒔焉地不改闢堂不改舊蕭蕭然鬱鬱然不移時而有拂雲之意矣方其竹之始生自彼空谷頎然而修猗然而緑葉秀卿雲雲興翠筠直節虚中羗来細風春生凜冬森然萬叢及其應人而出樹之庭陛葳蕤之態困頓美人之春睡灑落之韻謫仙頽乎其尚醉清飇時来振葉淩柯積翠招搖蕭灑交加夜風冽揭朦朧素月瑣碎兮清隂横斜兮錯節吾不知前日之蒼凉與如今之煩熱也若乃天旻得助繁隂變暑䕃之以油雲沐之以時雨翠榦盤根平安爾所稚子承承方流振古斯又類物之攸裁固非人之所䖏也至若淵眀之秫潘岳之花好樂不齊咸宜厥家至人遐觀匪同匪異沈酗清芬各從爾志則夫是竹之清風斯子猷之逺致也王炎竹賦有序小人之情得意則頡頏自髙少不得意則摧折不能守君子反是竹之操甚有似夫君子者感之作賦以自箴其辭曰晦叔讀書南齋之上門巷僻左交㳺日稀環以桑麻之場帶以𤓰芋之區路折西南萬竹蒼然下縁乎曲澗之湄其清可以延風月其髙可以擾雲霓珊珊乎鳴蒼玉之佩搖揺乎舒翠鳳之旗森森乎甲胄之雜峙而切切乎矛㦸之參差其偃蹇挫折者如忠臣節士赴患難而不辭其嬋娟蕭爽者如慈孫孝子侍父祖而不違其挺拔雄勁者氣毅色嚴又如侠客與勇夫其孤髙介特者格清貌古又如騷人與臞儒予雖朝夕吟嘯扵其下曽無以名其美而狀其竒然泛觀宇宙之中萬物均涵育扵一氣而有剛柔堅脆之不齊榮者必悴盛者必衰實繁者易剥色麗者早萎惟松柏之有心及竹箭之有筠足以閲寒暑而貫四時春日載陽山川含滋零露兮宵潤恵風兮曉披或萼或條或茁或荑含英吐華夭夭怡怡竹扵是時清而不腴冬日祁寒天地積威雪慘兮冰堅風饕兮日淒川原千里木脱草枯香盡芳歇掃迹無遺竹扵是時秀而不癯今而後見其含徳之有常特操之不移此吾所以無羡渭川之千畝有取淇澳之猗猗願定交扵金石邀嵗寒以為期否泰兮消長剥復兮乗除秉吾心之堅一視此君乎庶㡬元趙孟頫修竹賦猗猗修竹不卉不蔓非草非木操挺特以髙世姿蕭灑以拔俗葉深翠羽榦森碧玉孤生大山之阿千畝渭川之曲来清飇扵逺岑娛佳人扵空谷觀夫臨曲檻俯清池色侵雲漢影動漣漪蒼雲夏集緑霧朝霏蕭蕭雨沐裊裊風披露鶴長嘯秋蟬獨嘶金石閒作笙竽雜吹若乃良夜明月窮冬積雪掃石上之隂聽林間之折意參太古聲沉寥泬耳目為之開滌神情以之怡悦蓋其嫓秀碧梧託友青松蒲栁慚弱桃李羞容歌籊籊扵衛女詠淇澳於國風故子猷吟嘯扵其下仲宣息宴乎其中七賢同調六逸齊蹤良有以也又况鳴嶰谷之鳳化葛陂之龍者哉至扵虚其心實其節貫四時而不改柯易葉則吾以是觀君子之徳貢師泰小篔簹賦謂木非喬謂草非繇不蔓而夭不葩而條閑庭翳翳宻室翛翛名小篔簹有扁之昭或曰子真以篔簹為小耶則仙標出塵直榦淩囂聲諧鳴鳳影挟翔蛟灑清風之葉葉弄明月之梢梢雖並户而當軒實拂雲而騰霄子以植數少為小耶則兩窓三四一徑五六緗實漂黄錦苞凝緑或開樽而射金或援琴而撃玉雖無千頃之多聊可數竿而足然則小篔簹果何在乎主人曰肩髙扵牆斗大扵室門可旋履居僅容膝修及尋丈廣袤咫尺以溉以種充我餘隙匪谷斯盈匪川斯溢減晉林之七賢少唐溪之六逸異蔣詡之三徑慕子猷之一日况城西幽迥堂北愉惋平安之報維昕與晚遺形尚存先徳不逺則又此心之所以思慕而憂慲也篔簹雖小其義實大謹葺謹培式萌孝愛或曰唯唯子誠是在虚心有容直節無懈庶其茂之勿翦勿敗原楊維楨方竹賦秋孟之夕覺非道人寓宿扵主人之軒見植竹焉外方中堅峭然觚稜扣之如石有聲硜硜予怪其不類衆竹戲若有評曰后皇植物各畀以形洪纖肥瘠莫殫其名毫忽無僭若冶剖型爾竹之産為類實繁寄哀瀟湘託興淇園嶧陽之材聲叶鳴鳳箘簵之堅荆揚效貢黄岡如椽用代陶瓦篲條叢生束之盈把由衙雞脛般腸射筒蘇麻篔簹笆箄鍾龍體柔為􅚠節促為􅀢刃毒為篻依木為弓毳毛為狗扶老為笻名雖萬變莫不示圎扵外而抱虚扵中故能文理縝宻節槩疏通迎刃而觧落籜以從桃笙籧笛織翠生風纜維砥柱力綰艨艟干旄孑孑旌旂蔽空彤管煒煒横出詞鋒簫韶九奏至和攸同他如器使惟適所逢皆所以弼成人用翼賛天工爾之為質外方内塞肌不柔順性復挺特櫽括莫施何堪組織豈非才不適用而名浮其實乎言既而去逡巡就睡夢一𤣥叟頎然而長䨇眉入鬢氅衣無裳頭角峭厲棖立木僵歴階而進出聲琅琅凡今之人喜圎惡方頃聞誚譏顧不敢當予非舍圓而不居蓋亦天賦之有常矧夫方圎不侔自昔為訒豨膏棘軸不能獨運鑿枘異投終底扵吝黯直見疏𢎞詐乃近正論天人江都逺擯詼諧詭竒金馬日進固知鬻圓以自私不若執方以自信也且物生而才罕即安䖏雕龍斵削自致困苦樗櫟擁腫斧斤莫尋桐杉赭野枳棘成林天嗇我才實非我仇以才莫全我獲實優方將勵吾之方堅吾之塞保天之全資地之力長吾兒孫同居夀域邀凉月扵江上疏冷風扵淇澳知我愛我過従成癖敲門竟造不辨主客札瘥奚生逍遙甚適彼以才而用世視予孰得而孰失予驚而寤萬籟俱寂月明入户凉在巾舄惟見此君挺然扵庭粉壁鑄形一塵不驚修柯滴露鏘然成聲予爽然如失惕然而醒乃歌曰圓以智行兮方以義守智或有窮兮義則可乆以虚而通兮以實而塞通或潰决兮惟塞乃格才應時用兮拙為世損用則精弊兮損則神全竹兮竹兮予將謂汝為方兮而不識汝之大圎明桑民懌竹賦有序學圃中種竹數竿不二年蓊然成林日婆娑其間若相㤀者今將秩滿欲與圃别不能㤀情為作賦以表其徳詞曰興趙藏符伐吳成象鸞鳳聲容龍蛇動盪知惟孔子智比辟支一本林立安有二岐直而不窒圎而不倚節操如是可謂君子文賦散句増漢東方朔七諫便娟之修竹兮寄生乎江潭上葳蕤而防露兮下冷冷而来風枚乗梁王兎園賦修竹檀欒夹池水張衡東京賦修竹冬青曹毗湘表賦其竹則篔簹白烏實中紺族濵榮幽渚繁宗隈曲萋蒨陵丘薆逮重谷晉左思吳都賦竹則苞筍抽節往往縈結緑葉翠莖冒霜停雪孫椘登樓賦羡緑竹之茂隂王彪之閩中賦竹則粉苞赤箬縹箭斑弓篔簹函人桃枝育蟲緗箬素笋彤竿緑筒攅岡坻之苯䔿漫原澤之蓊䝉宋謝靈運山居賦竹縁浦以被緑石照澗而映紅其竹則二箭殊葉四苦齊味水石别谷巨細各彚既修竦而便娟亦蕭森而蓊蔚露夕沾而淒隂風朝振而清氣捎𤣥雲以拂杪臨碧潭而挺翠蔑上林與淇澳驗東南之所遺企山陽之㳺踐遲鸞鷖之栖託憶崑岡之悲調慨伶倫之哀籥衛女行而思歸詠椘客放而防露作御定佩文齋廣羣芳譜卷八十三
