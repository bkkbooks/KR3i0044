body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十四竹譜竹三集藻五言古詩御製竹林禪院在潤州城南竹徑數里一徑入深竹數里來上方叢生巖磴密枝拂雲煙長華旗出林際芝蓋停三陽颯颯吹霜風碧葉紛翺翔山齋頗幽寂萬籟含虛光觸物感余懷歌彼淇澳章增齊謝朓秋竹曲㛹娟綺窗北結根未參差從風既裊裊映日頗離離欲求棗下吹别有江南枝但能凌白雪貞心蔭曲池詠竹窗前一叢竹青翠獨言竒南條交北葉新筍雜故枝月光踈已密風來起復垂青扈飛不礙黃口得相窺但恨從風籜根株長别離北齊蕭放詠竹懷風枝轉弱防露影逾濃既來丹穴鳳還作葛陂龍梁元帝賦得竹嶰谷管新抽淇園節復修作龍還葛水為馬向并州柯亭臨絶澗桃枝夾細流冠學芙蓉勢花堪威鳳遊卬王若有獻張騫應拜侯沈約簷前竹萌開籜已垂結葉始成枝繁蔭上蓊茸促節下離離風動露滴􅅹月照影參差得生君户牖不願夾華池吳均緑竹嬋娟鄣綺殿繞弱拂春漪何當逢採拾為君笙與箎劉孝威詠枯葉竹枯楊猶更緑臥栁尚還生勿嫌鳳不至終當待聖明劉孝先詠竹竹生空野外梢雲聳百尋無人賞髙節徒自抱貞心恥染湘妃淚羞入上宫琴誰能製長笛當為吐龍吟虞羲見江邉竹挺此堅貞性來樹朝夕池秋波潄下趾冬雪封上枝葳蕤防曉露蔥蒨集羈雌含風自颯颯負雪亦猗猗金明無異狀玉洞良在斯但恨非嶰谷伶倫未見知江洪和新浦侯齋前竹本生出髙嶺移賞入庭蹊檀欒拂桂橑蓊蔥傍朱閨夜條風析析曉葉露凄凄籜紫春鶯思筠緑寒蛩啼不惜凌雲茂遂聽羣雀棲願抽一莖實試看翔鳳來陳隂鏗侍宴賦得夾池竹夾池一叢竹垂翠不驚寒葉醖宜城酒皮治薛縣冠湘川染别淚衡嶺拂仙壇欲見葳蕤色當來兔苑看張正見賦得風生翠竹裏應教金風起燕觀翠竹夾梁池翻花疑鳳下揚水似龍移帶露依深葉飄寒入徑枝聊因萬籟響詎待伶倫吹賦得山中翠竹修竹映巖垂來風異夾池復澗藏髙節重林隱徑枝雲生龍未上花落鳳將移莫言棲嶰谷伶倫不復吹賀循賦得夾池修竹緑竹影參差葳蕤帶曲池逢秋葉不落經寒色詎移來風韻晚徑集鳳動春枝所欣髙蹈客未待伶倫吹唐虞世南賦得臨池竹蔥翠梢雲質垂彩映清池波泛含風影流搖防露枝龍鱗漾嶰谷鳳翅拂漣漪欲識凌冬性惟有嵗寒知陳子昂修竹篇龍種生南嶽孤翠鬱亭亭峰嶺上崇崒煙雨下微𡨕夜聞鼯鼠叫晝聒泉壑聲春風正淡蕩白露已清泠哀響激金奏密色滋玉英嵗寒霜雪苦含彩獨青青豈不厭凝冽羞比春木榮春木有榮歇此節無凋零始願與金石終古保賢貞不意伶倫子吹之學鳳鳴遂偶雲和瑟張樂奏天庭妙曲方千變簫韶亦九成信蒙雕斫美常願事仙靈驅馳翠虬駕伊鬱紫鸞笙結交嬴臺女吟弄升天行携手登白日逺逰戲赤城低昻玄鶴舞斷續綵雲生永隨衆仙逝三山逰玉京原李白慈姥竹野竹攢石生含煙映江島翠色落波深虛聲帶寒早龍吟曽未聽鳳曲吹應好不學蒲栁凋貞心常自保杜甫營屋我有隂江竹能令朱夏寒隂通積水內髙入浮雲端甚疑鬼物慿不顧翦伐殘東偏若面勢户牖永可安愛惜已六載兹晨去千竿蕭蕭見白日洶洶開奔湍度堂匪華麗養拙異考槃草茅雖剃葺衰疾方少寬洗然順所適此足代加餐寂無斧斤響庶遂憩息歡增韋應物對新篁新緑苞初解嫩氣筍猶香含露漸舒葉抽叢稍自長清晨止亭下獨愛此幽篁戴叔倫竹卷籜正離披新枝復蒙密翛翛月下聞裊裊林際出豈獨對芳菲終年色如一盧綸顔侍御廳叢篁詠送薛存誠玉幹百餘莖生君此堂側拂簾寒雨響擁砌深溪色何事鳳凰雛兹焉理歸翼李益竹磎訪竹越雲崖即林若磎絶寧知修幹下漠漠秋苔潔清光溢空曲茂色臨水徹採摘愧芳鮮奉君嵗暮節張南史竹竹價長東南别種殊草木成林處處雲抽筍年年玉天風起成韻池水涵更緑間臨庾信園數竿心自足栁宗元茅簷下始栽竹瘴茅葺為宇溽暑恆侵肌適有重腿疾蒸鬱寧所宜東鄰幸導我樹竹邀涼颸欣然愜我志荷鍤西巖垂椘壤多怪石墾鑿力已疲江風忽云暮輿曵還相追蕭瑟過極浦旖旎附幽墀貞根期永固貽爾寒泉滋夜窗遂不掩羽扇寧復持清泠集濃露枕簟淒已知網蟲依密葉曉禽棲迥枝豈伊紛囂間重以心慮怡嘉爾亭亭質自逺棄幽期不見野蔓草蓊蔚有華姿諒無凌寒色豈與青山辭巽公院苦竹橋危橋屬幽徑繚繞穿疏林迸籜分苦節輕筠抱虛心俯瞰涓涓流仰聆蕭蕭吟差池下煙日嘲􅑜鳴山禽諒無要津用棲息有餘隂原韓愈題新竹筍添南階竹日日成清閟縹節已儲霜黃苞猶掩翠出欄抽五六當户羅三四髙標陵秋嚴貞色奪春媚稀生巧補林併出疑爭地縱橫乍依行爛漫忽無次風枝未飄吹露粉先含淚何人可携玩清景空瞪視增白居易湓浦竹潯陽十月天天氣仍溫燠有霜不殺草有風不落木玄𡨕氣力薄草木冬猶緑誰肯湓浦頭迥回眼看修竹其有顧盼者持刀斬且束剖劈青琅玕家家蓋牆屋吾聞汾普間竹少重如玉胡為取輕賤生此西江曲題小橋前新竹招客雁齒小紅橋垂簷低白屋橋前何所有苒苒新生竹皮開折褐錦節露抽青玉筠翠如可餐粉霜不忍觸間吟聲未巳幽玩心難足管領好風煙輕欺凡草木誰能有月夜伴我林中宿為君傾一杯狂歌竹枝曲新栽竹佐邑意不適閉門秋草生何以娛野性種竹百餘莖見此溪上色憶得山中情有時公事暇盡日繞闌行勿言根未固勿言隂未成已覺庭宇內稍稍有餘清最愛近窗臥秋風枝有聲東樓竹瀟灑城東樓繞樓多修竹森然一萬竿白粉封青玉卷簾睡初覺欹枕看未足影轉色入樓牀席生浮緑空城絶賔客向夕彌幽獨樓上夜不歸此君留我宿竹窗嘗愛輞川寺竹窗東北廊一别十餘載見竹未曽忘今春二月初卜居在新昌未暇作廄庫且先營一堂開窗不糊紙種竹不依行意取北簷下窗與竹相當繞屋聲淅淅逼人色蒼蒼煙通杳靄氣月透玲瓏光是時三伏天天氣熱如湯獨此竹窗下朝迥回解衣裳輕紗一幅巾小簟六尺牀無客盡日靜有風終夜涼乃知前古人言事頗諳詳清風北窗卧可以傲羲皇洗竹布裘寒擁頸氊履溫承足獨立冰池前久看洗霜竹先除老且病次去纖而曲翦葉猶可憐琅玕十餘束青青復籊籊頗異凡草木依然若有情迥回頭語僮僕小者截魚竿大者編茅屋勿作篲與箕而令糞土辱原元稹種竹並序昔樂天贈豫詩云無波古井水有節秋竹竿豫秋來種竹廳下因而有懷聊書十韻昔公憐我直比之秋竹竿秋來苦相憶種竹廳前看失地顔色改傷根枝葉殘清風猶淅淅髙節空團團鳴蟬聒暮景跳蛙集幽欄塵土復晝夜梢雲良獨難丹丘信云逺安得臨仙壇瘴江冬草緑何人驚嵗寒可憐亭亭幹一一青琅玕孤鳳竟不至坐傷時節闌增元稹寺院新竹寶地琉璃圻紫苞琅玕踴亭亭巧於削一一大如拱冰碧林外寒峰巒眼前聳槎丫矛戟合屹仡龍蛇動煙泛翠光流嵗餘霜彩重風朝竽籟過雨夜鬼神恐佳色有鮮妍修莖無擁腫節髙迷玉鏃籜綴疑花捧詎必太山根本自仙壇種誰令植幽壤復此依間冗居然霄漢姿坐受藩籬壅噪集倦鴟烏炎昏繁蠛蠓未遭伶倫聽非安子猷寵威鳳來有時虛心豈無奉和東川李相公慈竹十二韻慈竹不外長密比青瑶華茅攢有森束玉立無蹉跎纖粉妍膩質細瓊交翠柯亭亭霄漢近靄靄雨露多冰碧寒夜聳簫韶風晝羅煙含朧朧影月泛鱗鱗波鸞鳳一以顧燕雀永不過幽姿媚庭實皓氣凌天涯峻節髙轉露貞筠寒更佳托身仙壇上靈物神所呵時與天籟合日聞陽春歌應憐孤生者摧折成病疴鮑溶雲溪竹園翁硠硠雲溪裏翠竹和雲生古泉積見深竦竦如刻成椘客臥雲老世間無姓名因兹千畝業以代雙牛耕亂林不可留寸莖不可輕風暖鬭出地仰齊故年莖幽室結白苑密葉羅衆清照水寒淡蕩對山緑峥嶸蒼翠含古貌秋桂儼白英相看受天風深夜戞擊聲姚合垣竹種竹愛庭際亦以資玩賞窮秋雨蕭條但見墻垣長宣尼髙數仞固應非土壤渚上竹葉葉新春筠下復清淺流微風屢此來決決復翛翛詩人月下吟月墮吟不休張仲方賦得竹箭有筠東南生緑竹獨美有筠箭枝葉詎曽凋風霜孰云變偏宜林表秀多向嵗寒見碧色乍蔥蘢青光常蒨練皮開鳳彩出節徑龍文現爰此守堅貞含歌屬時彥溫庭筠春盡與友人入裴氏林探漁竿一徑互紆直茅棘亦已繁晴陽入荒竹曖曖如春園倚杖息憩倦徘徊戀微暄厯尋嬋娟節翦破蒼筤根地僻修莖孤林振餘籜翻適心在所好非必尋湘沅皮日休公齋詠新竹笠澤多異竹移之植後楹一架三百本緑沉森𡨕𡨕圎緊珊瑚節釤利翡翠翎儼若青帝仗矗如紫姑屏槭槭微風度漠漠輕靄生如神語鈞天似樂奏洞庭一玩九藏冷再聞百醒有根可以執有􅘽可以馨願稟君子操不敢先凋零陸龜蒙和襲美公齋詠新竹别塢破苔蘚嚴城樹軒楹恭聞稟璇璣化質離青𡨕色可定雞脛實堪招鳳翎立窺五嶺秀坐對三都屏晴月窈窕入曙煙霏微生昔者尚借宅况來處賔庭金罍縱傾倒碧露還鮮醒若非抱苦節何以偶惟馨徐觀稚龍出更賦錦苞零李咸用題友生叢竹菊華寒露濃蘭愁曉霜重指佞不長生蒲萐今無種安如植叢篁他年待棲鳳大則化龍騎小可釣璜用留煙伴獨醒迥回隂冷間夢何妨積雪凌但為清風動乃知子猷心不與常人共陳陶題僧院竹喜逰蛟井寺復見炎州竹杳靄萬丈間嘯風清獨速江南正霜霰吐秀弄顓頊似瑞驚堅貞如魔試金粟筍非孝子泣文異湘靈哭金碧誰與鄰蕭森自成族新聞赤帝種子落毛人谷逺祖賜鷦鵬遺芳遍南陸對煙蘇麻醜夾澗篔簹伏美譽動丹青瓌姿豔秦蜀因緣鹿苑識想像蛇丘斸幾葉别黃茅何年依白足龍樹蟄一花砌瑤掃雲屋色靜曼仙花名髙給孤獨青蔥太子樹灑落觀音目法雨每沾濡玉毫時照燭離居鸞節變住冷金顔縮豈念葛陂榮幸無祖父辱光搖水精串影送蓮花軸江鶩日相尋野鶴時寄宿幽香入茶竈靜翠直碁局肯羡垣上蒿自多籬下菊從來道生一况伴龜藏六棲託詎星迥回檀欒已雲矗霞杯傳縹葉羽管吹紫玉久絶釣竿歌聊裁竹枝曲愧生黃金地千秋為師緑僧皎然寒竹裊裊孤生竹獨立山中雪蒼翠搖徑風嬋娟帶寒月狂風不相似還共凌冬發宋梅堯臣雨中移竹荷鍤冒秋霖匆匆移翠竹欲分溪上隂聊助池邊緑中散林未開子猷心已足青青謝栽培豈愧凡草木紫竹西南産修竹色異東筠緑裁簫映檀唇引枝宜鳳宿移從幾千里不改生幽谷和平叔道傍竹野田有修竹叢疏飽于霜下上乏佳禽左右雜枯桑豈無行路子行路厭榛荒忽見此翠色徘徊未能忘車馬去何疾迥回顧隔山岡和永叔刑部廳看竹蒼蒼庭中竹事莫歎遲速不同欄下草一嵗一迥回緑朝開花照耀暮落風相逐何如飽霜雪冬夏森寒玉誰將種官舍本合近嚴屋不可一日無瀟灑看未足阮生豈其愚林中醉醽醁我當明月時移床來此宿和王景彛省中詠孤竹愛此孤生竹碧葉琅玕柯結根甘泉裏豈必泰山阿曽莫學兔絲徒以附女蘿風迥回掃庭户夜月誰與過擬水西寺詠隂崖竹背嶺斷崖下老竹生扶疏孤根石上引徑節松不如莫言霜雪多終見緑有餘蘄竹腮肥節腦瘦蘄水長笛材洛陽袁氏塢此竹舊移來雪霰飽已久竅星誰為開與君作龍吟吹發江南梅歐陽修初夏劉氏竹林小飲春榮忽已衰夏葉換初秀披荒得深蹊掃緑蔭清晝萬竿交已聳千畝蔚何富驚雷迸狂鞭霧籜舒文繡虛心髙自擢徑節晚愈瘦雖慙桃李妖豈愧松柏後川原湛新霽林麓洗昏霿猗猗色可餐滴滴翠欲溜况兹夏首月景物得嘉候晚蝶舞新黃孤禽弄清咮窺深入窗蒙玩密愛林茂依依帶幽澗隱隱見