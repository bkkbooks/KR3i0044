竹葉及地學書南史齊武帝諸子傳南海王子罕字雲華母樂容華嘗寢疾子罕晝夜祈禱於時以竹為燈纘照夜此纘宿昔枝葉大茂母病亦愈咸以為孝感所致眀僧紹傳齊髙帝賜僧紹竹根如意筍籜冠隠者以為榮焉唐書南蠻傳戰以竹籠頭如兜鍪環王以竹為弓風俗通殺青書可繕寫謹按劉向别録曰殺青者直用青竹簡書耳原神仙傳壺公謝遣費長房以一竹杖與之曰但騎此得到家耳房騎竹杖辭去忽如睡覺已到家所騎竹杖棄葛陂中視之乃青龍耳蘇仙公持一竹杖時人謂曰蘇生竹杖固是龍也増搜神記蔡邕嘗至柯亭以竹為椽邕仰盻之曰良竹也取以為笛發聲遼亮一云邕告吳人曰吾昔嘗經㑹稽髙遷亭見屋東間第十竹椽可為笛取用果有異聲南康記南野縣有漢監匠陳隣其人通靈夜常乘龍還家龍至家輙化青竹杖隣内致戸前母不知因將杖去須臾光影滿堂俄爾飛失杖乃御䨇鵠還異苑晉太元中汝南人入山伐竹見一竹中蛇形巳成上枝葉如故又吴郡桐廬人常伐餘遺竹見一竹竿雉頭頸盡就身猶未變此亦竹為蛇蛇為雉也原南雍州記辛居士名宣仲家貧春月鬻筍充觴酌截竹為罌用充盛置人問其故宣仲曰我惟愛竹好酒欲令二物常相並耳増南部烟花録臨池觀竹既枯后每思其響夜不能寢帝為作薄玉龍數十杖以縷線懸於簷外夜中因風雨相擊聽之與竹無異國史補李舟好事嘗得村舍烟竹截以為笛堅如鐵石遺李牟牟吹笛為天下第一月夜泛江維舟吹之寥亮逸發上徹雲表俄有客獨立於岸呼船請載既至請笛而吹甚為精壯山河可裂牟平生未嘗見及入破呼吸盤擗其笛應聲粉碎客散不知所之舟著記疑其蛟龍也眀皇雜録羅公逺引眀皇遊月宮擲一竹於空中為橋色如白金行數里至一大城闕曰此月宮也異聞實録陳季卿者江南人舉進士至長安十年不歸一日於青龍寺訪僧不值憇於大閣有終南山翁亦候僧偶坐久之壁間有寰瀛圖季卿尋江南路太息曰得此歸不悔無成翁曰此何難乃折堦前竹葉置圖上渭水中謂陳曰注目於此如願矣季卿熟視即渭水波濤洶洶涌一舟甚大恍然登舟其去極速踰旬至家兄弟妻子迎見甚喜信宿乃復進棹倐然復至渭水徑趨青龍寺山翁尚擁褐而坐僧猶未歸在窮記廣南以竹為硯夢書竹為處士夢者當歸隠也常新録宗測樂閒靜好松竹嘗見日篩竹影上窓以筆備描之尚書故實崔魏公說有王修能變竹葉為黄金桂苑叢談太尉朱崖公兩出鎮於浙右前任罷日遊甘露寺因訪别於老僧院啜茗既終將欲辭去公曰昔有客遺笻竹杖一條聊與師贈别亟令求之須臾而至其杖雖竹而方所持向上節眼鬚牙四面對出天生可愛别後不數嵗再領朱方復因到院問前時拄杖何在曰至今寳之公請出觀之則老僧規圓而漆之矣公嗟歎彌日自此不復目其僧矣成都古今記山濤治郫時刳大竹釀酴釄作酒兼旬方開香聞百歩外故蜀人傳其法畫史蘇軾子瞻作墨竹從地一直起至頂余問何不逐節分曰竹生時何嘗逐節生運思清拔出於文同與可自謂與文拈一瓣香以墨深為面淡為背自與可始也作成林竹甚精朝議大夫王之才妻南昌縣君李尚書公擇之妹能臨松竹木石畫與可每作竹貺人一朝士張潛迂疎作謹文作紆竹以贈之如是不一又作横絹丈餘著色偃竹以貺子贍南昌過黄借得以倣臨之後數年㑹余真州求詩非自陳不能辨也余曰偃蹇宜如季揮毫已逼翁衞書無曲妙琰惠有遺工乍覩虬如物初披颯有風顧藏惟謹鑰化去或難窮原東坡集昔時與可墨竹見精練良紙輙奪筆揮灑不能自已坐客爭奪持去與可亦不甚惜後来見人設置筆研即逡廵避去人就求索至終嵗不可得或問其故與可曰吾乃者學道未至意有所不適而無所遣之故一發於墨竹是病也今吾病良已可若何然以予觀之與可之病亦未得為已也獨容有不發乎予將伺其發而掩取之彼方以為病而吾又利其病是吾亦病也嶺南人當有愧於竹食者竹筍庇者竹瓦載者竹筏㸑者竹薪衣者竹皮書者竹紙履者竹鞋真可謂一日不可無此君也耶昔人以海苔為紙今無復有今人以竹為紙亦古所無有也増老學庵筆記北方多石炭南方多木炭而蜀又有竹炭燒巨竹為之易然無烟耐久竒物王荆公於富貴聲色略不動心得耿天隲憲竹根冠愛詠不已拄杖斑竹為上竹欲老瘦而堅勁斑欲微赤而㸃疎賈長江詩云揀得林中最細枝結根石上長身遲莫嫌滴瀝紅斑少恰是湘妃淚盡時善言拄杖者也笻竹杖蜀中無之乃出徼外蠻洞蠻人持至瀘叙間賣之一枝纔四五錢以堅潤細瘦九節而直者為上品酒譜老杜詩云醉倒終同臥竹根葢以竹根為飲杯也原五色線馬均大巧能削竹作人語時天下大旱人皆將酒與此竹人語天下須臾雨也増圖繪寳鑑李夫人西蜀名家未詳世胄善屬文尤工書畫郭崇韜伐蜀得之夫人以崇韜武弁常鬱悒不樂月夕獨坐南軒竹影婆娑可喜即起揮毫濡墨横冩窓紙上眀日視之生意具足自是人間往往效之遂有墨竹宋徽宗作墨竹𦂳細不分濃淡一色焦墨叢密處微露白道自成一家不蹈襲古人端獻王頵越國夫人呉氏以淡墨冩竹整整斜斜曲盡其態見者疑其影落縑素程堂字公眀睂人善畫墨竹宗文湖州好畫鳳尾竹其梢極重作回旋之勢而枝葉不失向背李誕河間人多畫叢竹筍籜鞭節色色畢具此宣和體也莊靖王廼裕孝宗之弟也工墨竹喜作挂屏長竿枝梢旁出如簷底乍見濃墨獵獵頗具掀舞之態艾淑字景孟建寧人號竹坡善畫竹時又有茅汝元號靜齋善墨梅人以艾竹茅梅為稱陳虞之字雲翁號止所作墨竹每見竹折小枝就日影視之皆欲精到羣碎録宋魏之間方言謂簟為笙桃笙以桃竹為簟也雲林遺事元鎮嘗自題其畫竹云以中毎愛予畫竹余之竹聊以冩胸中逸氣耳豈復較其似與非葉之繁與疎枝之斜與直哉或塗抹久之他人視以為麻為蘆僕亦不能强辨為竹真沒柰覽者何但不知以中視為何物耳西吳枝乗管道昇畫傳者絶少在吳興者錯龍殿畫竹耳然志不言管氏作又以為子昂讀書其中所作則真否固未辨也原近世有婦人曹希藴者頗能詩雖格韻不髙然時有巧語嘗作墨竹詩云記得小軒岑寂夜月移疎影上東墻此語甚工文湖州竹生平僅見真跡一帖在横册上乃折竹也其題者二人柯九思題云湖州放筆奪造化此事世人那得知跫然何處見生氣彷彿空庭月落時金粟道人阿瑛題云湖州昔在湖州日日日逢人寫竹枝一段枯梢作三折分眀雪後上窓時移竹先期離竹本一二尺四圍劚斷旁根仍以土覆頻澆水俟雨後移致即活亦不換葉移時須尋其西南根勿劚斷照舊栽植竪架扶之尤妙竹中有樹不須去雖風雪不復欹斜亦一助也若將死猫狗埋其下竹生尤盛埋之邊傍亦能引竹宋時内苑種竹一二年即茂盛詢之園子云只有八字疎種密種淺種深種疎種者謂三四尺方種一顆欲其上虚易於行鞭密種者大其根盤每顆須四五竿一堆欲根密自相維持淺種者入土不甚深深種者種得雖淺即用河泥厚壅之鉏竹園以稻糠或麥糠或河泥皆可壅只用一様勿雜移竹多帶宿土勿踏以足若換葉勿遽拔去又有一法迎陽氣則取季冬順土氣則取雨時連數根種則易生筍一法擇大竹截去上段留近根三四寸通其節以土硫黄末填實倒種之第一年二年生小筍随去之至第三年生如舊竹甚有過之者擇竹志林云竹有雌雄雌者多筍故種竹當擇雌者物不能逃於隂陽也欲識雌雄當自根上第一節觀之䨇枝者為雌宜取西南根栽向東北隅葢竹性西南行西南乃嫩根也其東北老根種亦不茂審時種竹之法要得天時五六月間舊筍已成新根未行此時可移又須醉日宋子京云除地墻隂植翠筠疎枝茂葉與時新賴逢醉日原無損政自得全於酒人五月十三日為竹醉日岳陽風土記謂之龍生日栽之勿用脚踏椎打遇隂雨更妙一云八月初八日又五月二十日為上時遇雨尤佳一云用本命日謂正月一日二月二日三月三日之類一云毎月二十日皆可或云凡七月間栽竹無不活者須記向背諺云種竹無時雨過便移多留宿土記取南枝冬至前後各半月栽竹難活葢天地閉塞無生意也至有謂臘日宜栽竹者至引杜少陵詩云東林竹影薄臘日更宜栽乃栽培之栽即今人冬月加馬糞糠土之意非栽種也忌火日及西南風花木皆同别地凡栽竹須向陽為妙先鋤地令鬆且濶沃以河泥臨時用馬糞拌濕土栽不用作泥漿水最忌猪糞勿用脚踏及鋤杵築實則筍生遲葢土虛鬆則鞭易行也種竹處須當積土令髙於旁地一二尺則雨潦不能浸損錢塘人謂之竹脚用舊茅茨夾土則竹根尋地脉易生伐竹臘月砍竹作器則不蛀一云六月竹要留三去四葢三年者留四年者去諺云公孫不相見母子不相離謂隔年竹可伐也凡竹未經年不堪作器若老竹不去竹亦不茂但伐之有時竹之滋澤春發於枝葉夏藏於幹冬歸於根冬月伐竹經日一裂自首至尾五月以前伐竹則根紅而鞭爛盛夏伐不蛀但於林有損七八月猶可過此不堪用矣如要竹堅而不蛀須盛夏辰日庚午癸卯日血忌日御定佩文齋廣羣芳譜卷八十五
