body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十五竹譜竹譜四集藻七言律詩増唐崔涯竹領得溪風不放廻傍窓緣砌遍庭栽行招野客為鄰住看引山禽入郭來幽院獨驚秋氣早小門深向緑隂開誰憐翠色兼寒影静落茶甌與酒杯令狐楚郡齋左偏栽竹百餘竿炎凉已周青翠不改而為墻垣所蔽有乖愛賞假日命去齋居之東墻由是俯臨軒堦低映帷戸日夕相對頗有翛然之趣齋居栽竹北窓邊素壁新開映碧鮮青藹近當行藥處緑隂深到卧帷前風驚曉葉如聞雨月過春枝似帶烟老子憶山心暫緩退公閑坐對嬋娟劉禹錫和宣武令狐相公郡齋對新竹新竹翛翛韻曉風隔窓依砌尚蒙籠數間素壁初開後一片清光入坐中欹枕閒看知自適含毫朗詠與誰同此君若欲長相見政事堂東有舊叢李紳南庭竹東南舊羙凌霜操五月凝隂入坐寒烟惹翠梢含玉露粉開春籜聳琅玕莫令戲馬童兒見試引為龍道士看知爾結根香實在鳳凰終擬下雲端楊巨源和令狐舍人酬峯上人題山欄孤竹滿院冰姿粉籜殘一莖青翠近簾端離叢自欲親香火抱節何妨共嵗寒能讓繁聲任真籟解將孤影對芳蘭范雲許訪西林寺枝葉須和彩鳳看李逺隣人自金仙觀移竹移居新竹已堪看斸破莓苔得㡬竿圓節不教傷粉籜低枝猶擬拂霜壇墻頭枝壓和烟緑枕上風来送夜寒第一莫教漁父見且從蕭颯滿朱欄方千越州使院竹莫見凌雲飄粉籜須知礙石作盤根細看枝上蟬吟處猶是筍時蟲蝕痕月送緑隂斜上砌露凝寒色濕遮門列仙終日逍遥地鳥雀潛來不敢喧題新竹青苔斸破植貞堅細碧竿排鬱眼鮮小鳳凰聲吹嫩葉短蛟龍尾褭輕烟節環膩色端勻粉根拔秋光暗長鞭怪得入門肌骨冷綴風黏月滿庭前羅鄴竹翠葉纔分細細枝清隂猶未上堦墀蕙蘭雖許相依日桃李還應笑後時抱節不為霜霰改成林終與鳳凰期渭濱若更徵賢相好作漁竿繫釣絲薛能新竹桞營茅土倦麤材因向山家乞翠栽清露便教終夜滴好風疑是故園来欄邊匠去朱猶溼溉後蟲浮穴暗開他日㑹應威鳳至莫辭公府受塵埃秦韜玉題竹削玉森森幽思清阮家髙興尚分眀捲簾隂薄漏山色欹枕韻寒宜雨聲斜對酒缸偏覺好靜籠棊局最多情却驚九陌輪蹄外獨有溪烟數十莖原鄭谷竹宜烟宜雨又宜風拂水藏村復間松移得蕭騷從逺寺洗来疎淨見前峯侵堦蘚折春芽迸繞逕莎微夏䕃濃無賴杏花多意緒數枝穿翠好相容増王貞白洗竹道院竹繁教畧洗鳴琴酌酒看扶疎不圖結實来䨇鳳且要長竿釣巨魚錦籜裁冠添散逸玉芽修饌稱清虛有時記得三天事自向琅玕節下書殷文圭題友人庭竹叢篁蕭瑟拂清隂貴地栽成碧玉林盡待花開添鳳食可憐風擊伏龍吟鈿竿離立霜文靜錦籜飄零粉節深何事子猷偏寄賞此君心似主人心李中詠竹森森移得自山莊植向空庭野興長便有好風来枕簟更無閒夢到瀟湘䕃来砌蘚經疎雨引下溪禽帶夕陽閒約羽人同賞處安排碁局就清凉徐夤詠竹翠染琅玕粉漸開東南移得㑹稽栽游絲挂處漁竿去緑水夾時龍影来風觸有聲含六律露沾如洗絶浮埃王猷舊宅無人到抱却清隂葢緑苔劉兼新竹近窓臥砌兩三叢佐靜添幽别有功影鏤碎金初透月聲𫾣寒玉乍揺風無憑費叟烟波碧莫信湘妃淚㸃紅自是子猷偏愛爾虚心髙節雪霜中宋韓琦次韻和方謹言郎中再觀省中手植竹翠影參差漸拂堦清郎曽此占竒栽辭君昔為蓴羮去戀爾今同菊徑来玉聳勁枝欺暮雪繡殘文籜委寒苔虚心髙節依然在幾見繁英落又開梅堯臣和新栽竹斸破烟叢帶筍移映軒臨檻特為宜龍孫已見多竒節鳳實新生入翠枝不向阮家林下集還思渭北水邊窺一花一草公休詠慣作蘭臺侍從詩孔武仲惜竹詩并引東齋有竹數竿翠蔚可喜其傍衆筍附生漫益深茂最後出者尤若竒特無不應意解籜未盡而為老兵手折之悲夫以干雲蔽日之勢而摧於窓戸之下以凌霜冐雪之姿而失於俄頃之間環歩往来悽愴良久不能忘情因寓之以詩老蘚墻隂夕照間何人折我翠琅玕即之緑葉隨塵化猶有低枝帶露殘不放雲梢侵霰雪因嗟世故足波瀾故園未乏篔簹品十頃繁隂六月寒王安石華蔵院此君亭詠竹一徑森然四座凉殘隂餘韻去何長人憐直節生来瘦自許髙材老更剛曽與蒿藜同雨露終隨松栢到冰霜煩君惜取根株在欲乞伶倫學鳳凰蘇軾次韻劉貢父西省種竹要知西掖承平事記取劉郎種竹初舊徳終呼名字外後生誰續笑談餘成隂障日行當見取筍供庖計已疎白首林間望天上平安待報故人書孤山竹閣海山兠率兩茫然古寺無人竹滿軒白鶴不留歸後語蒼龍猶是種時孫兩叢恰似蕭郎筆千畝空懐渭上村欲把新詩問遺像病維摩詰更無言蘇轍寄題陳憲郎中竹軒家有修篁緑滿軒趨庭詩禮舊忘言凌霜自得良朋友過雨時添好子孫試翦輕筠扶健歩旋收凉葉煑清樽風流共道勝桑梓鄰里何妨種百根次韻劉貢父西掖種竹竹迷誰定知迷否趁取滂沲好雨初栽向鳳池吹律處斸從芸閣殺青餘迎風一笑朝回早弄月相差直宿疎應怪籍咸林下客相看不飲作除書曽鞏南軒竹密竹娟娟數十莖旱天蕭灑有髙情風吹已送煩心醒雨洗還供逺眼清新筍巧穿苔石去碎隂微破粉墻生應須萬物冰霜後来看琅玕色轉眀黄庭堅陳氏園詠竹不問主人来看竹小溪風物似家林春供饋婦幾番筍夏與行人百畝隂直氣雖衝雲漢上髙材終恐斧斤尋截竿可比北溟釣欲贈溪翁誰姓任韓駒次韻何文縝種竹杜陵窮老覓榿栽不似何郎種笛材三徑莫憂荒草合一樽如與故人開未堪急雨枝枝打便有幽禽日日来坐誦東坡食無肉詩腸日午轉饑雷陸游東湖新竹插棘編籬謹䕶持養成寒碧映淪漪清風掠地秋先到赤日行天午不知解籜時聞聲􅉡􅉡放梢初見葉離離官閒我欲頻来此枕簟仍教到處隨楊萬里新竹青士何年入大荒羽儀禁省立如墻錦綳半脫娟娟玉粉節新塗拂拂霜帶雨小酣三日後出墻忽喜一梢長今年秋閏防多暑剰借先生格外凉劉克莊種竹借居未定先栽竹為愛疎聲與薄隂一日暫無能鄙吝數竿雖少亦蕭森窓間對了添詩料郭外移来費俸金自笑眀年何處在虚簷風至且披襟岳珂詠小園䨇竹錦綳玉立紀䨇清瑞牒千年重得名龍竹髙標儼元致熊湘素節凜皇英質同隴麥兩岐秀竒並庭柯連理榮却羡此君尤特立虚心直道不孤生金李獻能丹陽觀竹宮中移賜素士如林侍紫清紫清新許住蓬瀛娟娟粉節霜勻出矗矗烟梢玉削成福地根莖蒙化育中天雨露借恩榮緑章封事朝来奏又聽風前彩鳳鳴原郭長倩義師院叢竹南軒移植自西壇瘐玉亭亭十數竿得法未應輸老柏植根兼得近幽蘭雖無穠艶包春色自許貞心老嵗寒百草千花盡零落請君来向此中看増毛端卿題崞縣郝子玉此君軒桂林名姓一枝新萬竹青青徳有鄰渭上風烟分别𣲖山陽詩酒屬閒人心期已到冰霜窟眼界不知花桞塵萱背從今看輝映嫩香新粉四時春元白珽竹隂占斷人間瀟灑地全身水墨畫篔簹非烟非霧一林碧似雨似晴三徑凉翠袖佳人黯空谷白鬚道士隠南塘數竿醉日君須記移向西軒補夕陽宋旡如鏡伐竹架過墻蒲萄斷竹插地復生枝葉無住序曰瑞竹余以詩贈之為引寒藤延晚翠試栽碧玉動秋根鳳梢依舊生虚籟龍籜相將添逺孫林月過庭窺斷影茶烟潤色到啼痕陽休麗藻題還徧貝葉應多此處繙成廷珪題崔原亨竹深處並序余家有竹數竿人號之居竹軒原亨城西時則有竹亦數竿人號之竹深處余與崔君通家来往所好相同故及之居竹軒中也自寛不愁無地著琅玕文公胸次空千畝李侗門前只一竿天與老夫醫惡俗日憑童子報平安崔家别墅尤髙致遲子歸来守嵗寒貢性之雪竹山房此君節操獨凌寒冰雪叢中更耐看簾幙影迷金瑣碎珮環聲動玉䦨干只疑𤣥圃翻瓊樹錯訝瑤臺舞素鸞白戰㡬時能著我萬竿深處一憑欄倪瓚居竹軒翠竹如雲江水春結茅依竹住江濱階前迸筍從侵逕雨後垂隂欲覆鄰映葉黄鸝還自語傍人白鶴亦能馴遙知靜者忘聲色滿屋清風未覺貧眀髙啟新篁南池雨後見新篁裊裊烟梢漸出墻風度亂翻交籜響露垂微挹粉痕香簾前嫩色初含暝琴畔疎隂已送凉野飯休燒林下筍留添碧玉嫩竿長李東陽雨中種竹石欄沙路雨聲乾為欠蕭蕭一兩竿深𢃄土膏從地底暝移茅屋過江干方於辰日依時種影待晴天拂翠看試倚蓬窓聽疎密布袍沾盡不知寒吳寛竹種處能招鳳鳥来月眀清影拂書堆筍鞭遇石猶斜出花米逢春莫亂開此物似賢今合薦吾宗醫俗舊曽栽若從後圃論髙節棃白桃紅孰取材原文徵眀竹分得亭亭緑玉枝雨餘生意滿階墀凌霄已展疎疎葉䕶粉聊營短短籬肎信移来真是醉不愁俗在未能醫人間此夜頻前席凉月虚窓更自宜申時行竹粉浮筠忽自散琳琅解籜依然抱雪霜應是鳳苞揚素彩非關蝶翅膩瓊芳鉛華半染湘妃淚玉筍微含漢署香不見侍中頻拭面曉来新雨沐蒼筤鄧雲霄竹粉萬竿晴拂渭川烟解籜瓊枝自皛然湘水裙揺珠珮冷葛陂雲䕶玉龍眠看来翻恨何郎妬栽處應將漢署連六月林間猶帶雪可留清韻待羣賢于若瀛竹粉新抽翠篠碧於妝皜質輝輝抱節長操幹未須逢越女解苞疑是試何郎痕銷乍染三湘淚素積猶疑五月霜僕射盤中勞記事未裁斑管已含光五言排律増唐王維沈十四拾遺新竹生讀經處同諸公作閒居日清静修竹自檀欒嫩節留餘籜新叢出舊䦨細枝風響亂疎影月光寒樂府裁龍笛漁家伐釣竿何如道門裏青翠拂仙壇劉長卿同郭叅謀詠崔僕射淮南節度使㕔前竹昔種梁王苑今移漢將壇蒙籠低冕過青翠卷簾看得地移根逺經霜抱節難開花成鳳實嫩筍長漁竿靄靄軍容靜蕭蕭郡宇寛細音和角暮疎影上門寒湘浦何年變山陽㡬處殘不知軒屏側嵗晚對袁安朱放竹青竹何森然沉沉獨曙前出墻同淅􅅹開戸滿嬋娟籜卷初呈粉苔侵亂上錢疎中思水過深處若山連疊夜常棲鷺清朝乍有蟬砌隂迎緩策簷翠對欹眠迸筍䨇分箭繁梢一向偏月過驚散雪風動極聞泉幽谷添詩譜髙人欲製篇蕭蕭意何限不獨住湘川白居易題盧秘書夏日新栽竹二十韻湘竹初封植盧生此考槃久持霜節苦新託露根難等度須當砌疎稠要滿欄買憐分薄俸栽稱作閒官葉翦藍羅碎莖抽玉琯端㡬聲清淅􅅹一簇緑檀欒未夜青嵐入先秋白露漙拂肩揺翡翠熨手弄琅玕韻透窓風起隂鋪砌月殘炎天聞覺冷窄地見疑寛梢動勝揺扇枝低好掛冠碧籠烟羃羃珠灑雨珊珊晚籜晴雲展隂芽蟄虺蟠愛從抽馬策惜未截魚竿松韻徒煩聽桃夭不足觀梁慙當家杏臺陋夲司蘭撐撥詩人興勾牽酒客歡靜連蘆簟滑凉拂葛衣單豈止消時暑應能保嵗寒莫同凡草木一種夏中看王建杜中丞書院新移小竹此地夲無竹逺從山寺移經年求養法隔日記澆時嫩緑卷新葉殘黄收故枝色經寒不動聲與靜相宜愛䕶出常數稀稠看自知貧家緣未有客散獨行遲朱慶餘賦得震為蒼筤竹為擢東方秀翛然異衆筠青葱纔映粉蒙密正含春嫩籜霑㣲雨幽根絶細塵乍憐分徑小偏覺帶烟新結實皆留鳳垂隂似庇人願唯竿在手深水掛赬鱗許晝江南竹江南蕭灑地夲自與君宜固節還同我虛心欲待誰澗泉傍借響山木共含滋粉膩蟲難篆叢疎鳥易窺盡應逢野渡中忽見村祠葉掃秋空靜根横古壍危影迷寒靄裏聲出夜風時客棹深深過人家逺逺移遊邉曽結念到此數題詩莫恨成龍晚成龍㑹有期賈島題鄭常侍㕔前竹緑竹臨詩酒嬋娟思不窮亂枝低積雪繁葉亞寒風蕭颯疑泉過縈廻有徑通侵庭根出土隔壁