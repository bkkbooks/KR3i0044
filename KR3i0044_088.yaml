body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十六竹譜附録筍增爾雅筍竹萌注初生者疏竹初萌生謂之筍凡草木初生謂之萌筍則竹之初生者故曰筍竹萌也可以為菜殽箈箭萌注萌筍屬説文筍竹胎也筍譜筍始冒土者為萌生長挺挺然為筍也筍與笋通或又作箰古文作一名篛竹土內皮中謂之篛也一名竹牙即牙目之牙也一名茁謂竹萌初生茁茁然一名初篁初始也篁竹也一名竹子神異經云􅀢竹子美煮而食之張華注云子筍也其種有笆竹筍八月生盡九月竹與筍俱有刺芒郿竹筍長節深根冬夏皆生箭筍十二月生會稽以來諸山絶多筨􅢭筍自甌越以南七月生至八月盡燕筍錢塘多生其色紫苞當燕至時生故俗謂燕筍天目筍五月生盡六月色黃出天日山端午後方採鬻旱嵗則無竹王林筍其筍密密冒土南地熱多冬生桃竹筍生涪陵相思崖質柔弱有異孤竹筍三年生一筍及筍成竹竹母已枮旋味筍一名苦蒲筍福州南多生苦竹春則生筍土人煮食甚苦而且澀及停久則味還可食故名􅮂竹筍出交趾竹實中有毒筍亦內實桂竹筍見山海經今未詳桂竹狀貌筍亦難識􅓁竹筍生海畔山竹與筍皆有毛傷人則死又有荏筍同此毒􅥮竹筍竹本根長千丈生海畔山其竹萌數丈猶為筍也簩竹筍無肉不可食䇘筍七月生至十月間縉雲以南多出味苦節疏大於箭筍少許山人採剝以灰汁熟煮之都為金色然後可食苦味減而甘食甚佳也􅲴筍出溫處建以來春生可食釣絲竹筍南越多之下廣上鋭味甘可食發病木竹筍今靈隱山中出筍堅可食卭竹筍出蜀中臨卭春生羅浮山記曰此山左右時有之今山有筍生又早時候與蜀不同赤竹筍出閩中無毒衛丘竹筍山海經注衛丘舜林中竹一節可以為船筍可知矣蘆竹筍味苦可食出廬州對青竹筍可食出成都慈母山竹筍江寧縣南慈母山竹其筍圓緻異於餘處三月生可食鍾龍竹筍可食漢竹筍一節可受二三斗味雖甘而澀利竹筍隨竹蔓而生亦實韌也簢筍筍嫩而節耎薄鄰竹筍味同木竹筍雲母筍廣志云大竹也其筍亦相稱箘筍簵筍尚書注箘簵美竹也母既曰美竹厥萌可曰美筍筍皮青而肉晳白少室竹筍長偉堪食渭川筍生晚四月方盛鄠杜竹筍鄠杜多竹而徑小西夏結乾筍豈不是乎鏞竹筍出廣州可療風疾相迷竹筍生廣州減鏞筍小分桃枝竹筍叢生其皮生毛聚蟲蟻而不可食新婦竹筍三月生可食􅀢竹筍可食簟竹筍其竹直二丈猶為筍而可食雞頭竹筍可食堪茹斑竹筍脫殼乃為篛竹方生斑筍不可食篃筍竹葉大如履筍亦不大篔簹筍洪大沛竹筍其味美煮而食之白烏筍湘中有此竹生是筍魚腸竹筍其竹細而屈筍亦可識矣篁筍八月生止十一月皮黑紫色其心實人取細切鹽漬少頃以漿水漬再宿瀝乾瓶藏泥封謂之筍笴挲摩筍南人亦藏之為筍笴箣竹筍叢生羅浮筍甚直雲丘帝筍竹一節可以為船筍大如本匾竹筍匡廬山中多生初冒土便匾薄堪食籃箊筍可食􅹵筒筍吳越有之可食􅰣䈝竹筍可食篻竹筍堅大可食自秋生至於冬末春即不生矣筋竹筍天台圖經云五縣皆有服傷筍至四月已後方出味甚美狗竹筍寧海以來多有三月生可食筀竹筍吳越多生扶竹筍是竹為筍便有合歡貌並出慈竹筍四月生江南人多以灰煮食之又蘄黃生叢竹一叢數竿筍不外進只向裏生五六月長筍明年方成竹其筍不堪食玳瑁竹筍其筍脫殼微有斑文龍牙竹筍出永嘉大羅山春二月生棘竹筍味肥食之落人鬢髮􅺣竹筍無味雞脛竹筍食之肥美檳榔竹筍見杜臺卿淮賦毛竹筍出武陵洞口砍竹隨生篁竹筍無味由梧竹筍澀不可食按竹譜有由衙竹即此方竹筍硬不堪食丹竹筍以色名毛斑竹筍絶不堪食沙麻竹筍或云蘇麻竹或云粗麻竹此疑與斯摩同斯摩筍一人只可擔兩莖亦堪為筍笴白竹筍以色名拂雲帚竹筍大如指雙梢竹筍筍長獨莖及生枝葉即分為兩籃竹筍出襄州卧龍山堪食甚美木竹筍初生時礧磈然不堪食與今吳會間木竹筍食美而甘味不同水竹筍出黔南管內或巖下潭水中生隨水深淺以成節若深一丈則筍出水面為一節蠻蛋採取以為食古散竹筍堪食秋蘆竹筍可食鶴膝竹筍可食石􅸝竹筍生閩中可食紫竹筍不宜食月竹筍每月抽筍筍如箭竹萌人不食也三稜竹筍筍細初抽川中人家竹林中忽有云吉兆也本草竹有雌雄根上第一枝雙生者雌也乃有筍土人於竹根行鞭時掘取嫩者謂之鞭筍江南湖南人冬月掘大竹根下未出土者為冬筍東觀漢記謂之苞筍並可鮮食為珍品南人淡乾者為玉版筍眀筍火筍鹽曝者為鹽筍並可為蔬食諸竹筍氣味甘微寒無毒原筍譜筍利大腸無益于脾俗謂之刮腸箆食者審焉彚考增詩大雅其􅉡維何維筍及蒲周禮天官醢人加豆之實箈菹雁醢筍菹魚醢注箈箭萌南齊書劉懷珍傳懷珍子靈哲字文眀所生母嘗病靈哲躬自祈禱夢見黃衣老公曰可取南山竹筍食之疾立可愈靈哲驚覺如言而疾瘳南史孝義傳郭平原宅上種竹夜有盜其筍者平原遇見之盜者奔走墜溝平原乃於所植竹處溝上立小橋令通又採筍置籬外鄰里慚愧無復取者原南史隱逸傳沈道虔吳興武康人也有人拔屋後大筍令人止之曰惜此筍欲令成林更有佳者相與乃令人買大筍送與之盜者慚不取道虔使置其門內而還增唐書百官志司竹監掌植竹葦供宮中百司簾篚之屬嵗以筍供尚食宋史禮志太宗景祐三年禮官宗正請每嵗春季月薦蔬以筍果以含桃呂氏春秋和之美者越簵之箘注箘竹筍也東觀漢記馬援至荔浦見冬筍名苞上言禹貢厥苞橘柚疑謂是也原笑林漢人有適吳吳人設筍問是何物語曰竹也歸煮其牀簀而不熟乃謂其妻曰吳人轣轆欺我如此增華陽國志何隨人有盜其園筍隨見挈屐而歸恐盜者見也楚國先賢傳孟宗字恭武至孝母好食筍宗入林中哀號方冬為之出因以供養時人皆以為孝感所致述異記周武王時孤竹之國獻瑞筍一株原酉陽雜俎張芬曽為南康親隨行軍常揀向陽巨筍織竹籠之隨長旋培常留寸許度竹籠髙四尺然後放長秋深方去籠伐之一尺十節其色如金增北戶録湘源縣十二月食斑皮竹筍諸筍無以及之叩頭録皮藩去北而復來鄱陽食竹筍曰三年不見羊角哀矣雲仙雜記裴晉公於藍田得一大筍破之有三四眼睛而香美過甚清異録海南島中一類筍極腴厚而甚短島人號平頭筍余為筍效傳休奕作墓志曰邉幼節字脆中晉林琅琊之裔也以湯卒廣政録孟氏有蜀時翰林學士徐光溥劉侍郎義叟分直忽覩庭中筍迸出徐因題之劉性多譏誚徐托土本是蜀人徐詩曰迸出斑犀數十株更添幽景向蓬壺出來似有凌雲勢因作丹梯得也無劉詩曰徐徐出土非人種枝葉難投日月壺為是因緣生此地從來長養譬如無二學士從此不睦筍譜王宣居宇堂前有筍兩莖一日盜折而亡宣顧而不言丁固仕吳性敦孝敬母嘗思筍固遂泣竹生筍齊孝宣陳皇后性嗜筍鴨卵永眀九年詔太廟祭后薦筍鴨卵云木玄虛著四眀山記云雪竇山北巖生石乳其峯非人可升有毛竹銀筍詳其毛竹自生毛筍若銀筍即銀礦如筍或云毛竹筍白如銀唐夏侯彪之上新繁令問吏胥曰筍一莖幾錢曰一錢五莖取十千買五萬莖謂之曰吾未要且寄林中養之至秋竹成一竿十文遂成五十萬沈如琢成都人有孝行母亡負土成墳廬於側白鵠二棲於廬冬筍抽十莖天寶二年詔旌表朱梁髙祖開平二年冬商州進筍以為瑞品詔賜太守幣帛程崇雅者遂州蓬山縣人有孝譽母冬月思筍焚香入林中哭泣感生大筍數株王子猷暫寄人家便令種竹或問暫居何煩子猷笑曰何可一日無此君後代人謂竹都為此君今作譜者可命筍為此君之子也俗聞呼筍為龍孫若然者龍未聞化竹竹化為龍豈宜言龍孫今詳理實竹為龍龍且不生筍故嘉言巧論呼為龍孫耳或問筍有五色章采乎對曰江東黃筀間居賦有青筍閩中賦有素筍錢塘多紫桂筍自餘斑狸緗縹不可勝言大約不過青緑色愚著物類相感志常寄書問天目舊友問山中所出伊僧嗜筍却回詩云山中人事違天眼中修定我本無根株只將筍為命金城記黎舉嘗云欲以芥嫁筍但恨時不同耳原冷齋夜話東坡嘗邀劉器之同參玉版和尚器之每倦山行聞參玉版欣然從之至廉泉寺燒筍而食器之覺筍味勝問此筍何名東坡曰即玉版也此老師善説法要能令人得禪恱之味于是器之乃悟其戲為大笑東坡亦恱作偈曰叢林真百丈嗣法有橫枝不怕石頭路來參玉版師聊憑柏樹子與問籜龍兒瓦礫猶能説此君那不知增冷齋夜話老杜詩曰筍根稚子無人見沙上鳬雛並母眠世或不解稚子無人見何等語唐人食筍詩曰稚子脫錦繃駢頭玉香滑則稚子為筍眀矣贊寧雜志曰竹根有鼠大如貓其色類竹名竹豚亦名稚子豫問韓子蒼子蒼曰筍名稚子老杜之意也不用食筍詩亦可耳西溪叢語杜牧之朱坡詩云小蓮娃欲語幽筍稚相携言筍如稚子與杜甫竹根稚子無人見同意揮麈後録富鄭公晚居西都嘗會客於第中邵康節與焉因食羊肉鄭公顧康節云煮羊惟堂中為勝堯夫所未知也康節云野人豈識堂食之味但林下蔬筍則常喫耳鄭公赧然曰弼失言二老堂詩話紫芝云兩京作斤賣五溪無人採此髙力士詩也魯直作食筍詩云尚想髙將軍五溪無人採是也張文潛作薺羮詩乃云論斤上國何曽飽旅食江城日至前嘗慕藜羮最清好固應加糝愧吾緣則是髙將軍所作乃薺詩耳非筍詩也二公同時而用事不同如此不知其故豫按二詩各因筍薺而借用作斤賣之句初非用事不同紫芝何其拘也老學菴筆記吳人謂杜宇為謝豹杜宇初啼時漁人得蝦曰謝豹蝦市中賣筍曰謝豹筍唐顧况詩曰緑樹村中謝豹啼也齊東野語世傳涪翁喜苦筍嘗從斌老乞苦筍詩云南園苦筍味勝肉又和坡翁春菜詩云公如端為苦筍歸眀日青衫誠可脫坡得詩戲語坐客云吾固不愛做官魯直遂欲以苦筍硬差致仕聞者絶倒嘗賦苦筍云苦而有味如忠諫之可活國放翁又從而奬之云我見魏徵殊嫵媚約束童兒勿多取於是世以諫筍目之殊不知翁嘗自跋云余生長江南里人喜食苦筍試取而嘗之氣苦不堪於鼻味苦不可於口故嘗屏之未始為客一設及來黔中黔人冬掘苦筍萌於土中才一寸許味如蜜蔗初春則不食帷僰道人食苦筍四十餘日出土尺餘味猶甘苦相半以此觀之涪翁所食乃取其甘非貴乎苦也南康簡寂觀有甜苦筍周益公詩云蔬食山間荼亦甘况逢苦筍十分甜君看齒頰留餘味端為森森正且嚴此亦取其甜耳世人慕名忘味甘心荼苦者果何謂哉福建志羅源縣回仙巖一石突起髙數十丈有僧名秀者常見呂洞賔來遊啖以一筍復以手畫石作回仙巖三字回字蓋隱呂字也秀從此絶食飛錫而去福青縣石竺山其産少竹而多筍春夏之交鄉人於此采筍欲多則不可得號濟貧筍南安縣苦竹山有隱君寓石牀石臼存焉隱君好竹至今竹數里瀰漫山中鄉人取筍號曰英筍四川志筍筤山在大渡河西北五十餘里曰前筤又行數十里曰後筤山多筍故名樵蘇者以為衣食之源集藻表增唐李嶠為百寮賀瑞筍表臣某等言伏見舊眀堂前有叢竹抽新筍數莖緑籜含霜紫苞承雪凌九冬而擢穎冒重隂而發翠伏惟陛下仁兼動植化感靈祇故得萌動惟新象珍臺之更始貞堅效質符聖夀之無疆鄰帝座而虛心當嵗寒而抱節一人有慶萬類呈祥凡在見聞孰不欣躍無任慶忭之至尺牘增宋蘇軾與杜孟堅朱守餉筍云潭州來豈所謂貓頭之稚者乎留之必為庖儈所壞盡致之左右饌成分一盤足矣頌增宋黃庭堅和宣叔乞筍頌筍充庖日百尾千角鹿九首虺心生竅渾沌死搜中林撅稚子腹便便老叨耳賦增宋黃庭堅苦筍賦僰道苦筍冠冕兩川甘脆愜當小苦而反成味溫潤縝密多啖而不疾人蓋苦而有味如忠諫之可活國多而不害如舉士而皆得賢是其鍾江山之秀氣故能深雨露而避風煙食肴以之開道酒客為之流涎彼桂斑之夢永又安得與之同年蜀人曰苦筍不可食食之動痼疾令人萎而瘠豫亦未嘗與之言蓋上士不談而喻中士進則若信退若眩焉下士信耳而不信目其頑不可鐫李太白曰但得醉中趣勿為醒者傳文賦散句增漢張衡南都賦春卵夏筍李尤七欵橙醢筍葅晉潘嶽間居賦青筍紫薑左思魏都賦淇洹之筍王彪之閩中賦緗箬素筍彤竿緑筒梁簡文帝七勵澄瓊漿之素色雜金筍之甘葅杜臺卿淮賦緑筒縹箭罕節疏目檳榔之筍盛冬所育五言古詩原唐盧同寄男抱孫竹林吾所惜新筍好看守萬籜抱龍兒攢迸溢林藪籜龍正稱寃莫教入汝口叮嚀囑托汝汝活籜龍否白居易食筍此州乃竹鄉春筍滿山谷山夫折盈把抱來早市鬻物以多為賤雙錢易一束置之炊甑中與飯同時熟紫籜拆故錦素肌擘新玉每日遂加餐經時不思肉久為京洛客此味常不足且食勿踟蹰南風吹作竹增宋蘇軾送筍與公擇久客厭鹵饌枵然思南烹故人知我意千里寄竹萌駢頭玉嬰兒一一脫錦繃庖人應未識旅人眼先眀我家拙厨膳彘肉芼蕪菁送與江南客燒煮配香粳和黃魯直食筍飽食有殘肉飢食無餘菜紛然生喜怒似被狙公賣邇來誰獨覺凛凛白下宰一飯在家僧至樂甘不壞多生味蠧簡食筍乃餘債蕭然映樽俎未肯雜菘芥君看霜雪姿童稚已耿介胡為遭暴橫三嗅不忍嘬朝來忽解籜勢迫風雷噫尚可餉三閭飯筒纒五采黃庭堅食筍十韻洛下斑竹筍花時壓鮭菜一束酬千金掉頭不肯賣我來白下聚此族富庖宰繭栗戴地翻觳觸牆壞􅋾􅋾入中厨如償食竹債甘葅和菌耳辛膳胹薑芥烹鵝雜股掌炮鱉亂裙介小兒哇不美鼠壤有餘嘬可貴生於少古來食共噫尚想髙將軍五溪無人采蕭巽葛敏修二學子和豫食筍詩次韻答之北饌厭羊酪南庖豐筍菜自北初落南幾為兒所賣習知價廉平百態事烹宰鹽稀枯臘瘦蜜漬真味壞就根煨茁美豈念炮烙債咀吞千畝餘胸次不蠆芥二妙各能詩才名動江介論詩多佳句膾炙甘我嘬思君恩養竹萬籟聽秋噫從此繕籓籬下令禁漁采韭黃照春盤菰白媚秋菜惟此蒼竹苗市上三時賣江南家家竹翦伐誰主宰半以苦見疏不言甘易壞葛陂雕龍睡未索兒孫債獺膽能分杯琥珀妙拾芥此物於食殽如客得儐介思入帝鼎烹忍遭飢涎嘬懶牀供翰墨砧杵風號噫每下歎枯枝焚如落樵采胡朝請見和食筍詩輒復次韻人笑庾郎貧滿腹飯寒菜春動食指動筍茁入市賣回首萬錢厨不羡廊廟宰民生暫神竒胞雋伐性壞忍持芭蕉身多負牛羊債籜龍不稱寃易致等拾芥蕭蕭煙雨姿壯士持戈介駢頭沸鼎烹可口垂涎嘬霜叢負後凋玉食香餘噫續詩無全功葑菲儻可采韓駒答蔡伯世食筍蓴絲化鹽豉槐葉資新麵豈知苦竹萌風味常獨擅昔我居錦城屢喫田家飯扶杖自入箐煨此犢角繭後參鶴林禪餽我桑門饌蒸蒸沸鼎中亂下白玉片惟無他物乘始覺真味現三年客東都錦籜寧復見千金洛陽來惟充大官膳前時過君食欣逢故人面那知列仙臞已雜蒯通雋吾寧飽甘肥憤吒那忍咽請歸謂主孟厨人後當諫苦苣雜嘉蔬沉香和甲煎柯亭既誤椽畫障或遭練古來可歎事千載寄眀辨作詩弔籜龍助子當食歎陳與義食筍竹君家多材楚楚皆席珍成行著錦袍玉色映市人惠然集吾字老眼簷光新麯生亦稅駕共慰藜藿貧不待月與影三人亦相親可憐管城子頭禿事苦辛披譜雖同宗聞道隔幾塵詩成聊使寫一笑驚比鄰黃公度謝傅參議彥濟惠筍用山谷韻北方九月霜賔盤無生菜嶺南信地暖窮冬竹萌賣君念庾郎貧繭栗供庖宰中有嵗寒姿真時久不壞前身渭川侯千畝償宿債珍可配天花賤不數石芥早韭與晚菘奴僕望賔介文園酒渴餘想不厭姑嘬預恐吹作竹眀日東風噫急須驅兒童傾筐攜采采張九成食苦筍吾鄉苦筍佳出處惟石屋玉肌膩新酥黃衣緣深緑林深恐人知頭角互出縮煙雨養春姿此物未成熟三月臘酒香開樽媚幽獨烹庖入盤俎點醬真味足未須五鼎牛聊稱一囊粟朅來庾嶺下嵗月去何速經冬又七春未分窮途哭今朝好事者惠我生一束頭秃甲斕斑味惡韻粗俗兒童不慣嘗噦噫驚媪僕老妻念鄉味放箸淚盈目丈夫志有在何事校口腹呼奴更傾酒一笑風生谷七言古詩增唐李頎雙筍歌送李回兼呈劉四並抽新筍色漸緑迥出空林雙碧玉春風解籜雨潤根一枝半葉清露痕為君當面拂雲日孤生四逺何足論再三抱此悵為别嵩洛故人與之説宋梅堯臣韓持國遺洛筍龍孫春吐一尺牙紫錦包玉離泥沙金刀璀錯截嫩節銅駝不與大梁賖特寄韓郎緑蒲束莫令衛女苦思家韓郎才調偏能賦分餉唯思楚景差因之善謔誦淇澳欲學報投無木瓜韓持國再遺洛中斑竹筍牡丹開盡桃花紅斑筍迸林犀角豐兩株逺寄川上鴻韓郎輟口贈楚翁便令剝錦煮荆玉甘脆不道簞瓢空小謝舊城昭亭下侵天筀竹溪西東螳螂生後出芽茁羅列滿地爭強雄是時楚翁所食寡朝飯暮飯唯其充今來得此謂過分一貴一賤物茍同黃庭堅從斌老乞苦筍南園苦筍味勝肉籜龍稱寃莫採録煩君更致蒼玉束眀日風雨吹成竹張舜民謝南軒筍脯使君喜食筍脯味全勝肉祕法不肯傳閉門課私僕君不見金谷饌客本萍虀豪世藉此真成癡但令長鬚日致饋不敢求君帳下兒謝筍脯方筍脯登吾盤可使食無肉鮭腥避三舍棕栮乃從僕書生長有十甕虀却笑虎頭肉相癡得君新法也大竒且復從遊錦繃兒原陸遊苦筍藜藿盤中忽眼眀駢頭脫襁白玉嬰極知耿介種性别苦節乃與生俱生我見魏徵殊媚嫵約束兒童勿多取人才自古要養成放使干霄戰風雨楊萬里記張定叟煮筍經江西毛筍未出尖雪中土膏養新甜先生别得煮簀法丁寧勿用醯與鹽巖下清泉須旋汲熬出霜根生蜜汁寒牙嚼出氷片聲餘瀝仍和月光吸菘羔楮雞浪得名不如來參玉版僧醉裏何須酒解酲此羮一碗爽然醒大都煮菜皆如此淡處當知有真味先生此法未要傳為公作經藏名山增楊萬里謝唐德眀惠筍髙人愛筍如愛玉忍口不餐要添竹云何又遣十輩來昏花兩眼為渠開販夫束縳向市賣外強中乾美安在錦紋猶帶落花泥不論燒煮兩皆竒豬肝纍人真可怍以筍纍公端不惡煮筍金陵竹筍硬如石石猶有髓筍不及嶺南市裏筍如酥筍味清絶酥不如帶雨斸來和籜煮中含柘漿新甘露可虀可膾最可羮繞齒䔩䔩氷雪聲不須咒筍莫成竹頓頓食筍莫食肉元李孝光筍雷公躡跎夜鼓噪驚起龍孫觸旌纛炎沙燒之修尾脫六丁控摶忽顛倒欲落不落虎豹皮錦繃嬰兒籠大帽斧斤幸貸凌雲姿留以觀渠嵗寒操吳鎮筍緑隂晝靜南風來晴梢拂拂煙花開籜龍走地牙角出班班玉立橫蒼苔長鑱穿雲石路滑錦衣脫繃玉版白鳴牙未下氷雪虀開籠先放揚州鶴眀楊基食燒筍留題陳惟寅竹間春雷一聲萬簪玉參差亂迸莓苔緑斬來掃葉當徑燒何異燃萁煮秋菽登盤查牙玉版肥焦尾碎剝蒼龍皮山人大嚼無以報寫作林間燒筍詩嶽岱新筍歌滿林黃鳥不勝啼林下新筍與人齊春風閉門走山兔白晝露滴驚竹雞雨中三日春已過又近石牀添幾箇競將頭角向青雲不管階前緑苔破五言律詩增唐李頎籬筍東園長新筍映日復穿籬迸出依青嶂攢生伴緑池色因林向背行逐地髙卑但恐春將老青青獨爾為宋梅堯臣新筍挑筍春雷後晴坡過雨時何言江外早已比洛陽遲園客自偷賣主人那得知徒令養新竹待與作藩籬洪炎從寶峯長老求貓頭筍不識貓頭筍還思馬祖山庭蘭生舊茁綳錦換新斑藴玉爭懷寶登盤想飫餐分甘須剩劚逺助一瓢簞范成大謝李叔玠送筍墮地錦繃茁解衣溫玉姿來償食竹債大勝伏雌炊少日羮藜子老來煨芋師盤餐登異味指動已先知朱子公濟惠筍次韻新筍因君寄康廬入夢中丹元餘故宅翠竹尚餘風日日來威鳳年年饌籜龍猶嫌有兼味不似一源功七言律詩御製過雲栖憩竹林下令人劚筍劚蘭尋春二月幸雲栖滿目天光入品題密林布蔭樵漁樂幽柏成行蕙芷齊浴手臨泉開籜筍傍巖倚石選蓬藜餘杭風景西湖勝未若山中待竹迷增唐皮日休聞開元寺開筍園寄章上人園鎖開聲駭鹿羣滿林蘚籜水犀文森森競泣林梢雨􅑨􅑨爭穿石上雲並出亦如鵝管合各生還似犬牙分折煙束露如相遺何胤眀朝不茹葷陸龜蒙和開元寺開筍園寄章上人春龍爭地養檀欒况是雙林雨後看迸出似豪當垤㙞孤生如恨倚欄杆凌虛勢欲齊金剎折贈光宜照玉盤更待錦苞零落后粉環髙下挶煙寒徐夤筍鞭笻竹巖邊剔翠苔錦江波冷洗瓊瑰纍纍節轉蒼龍骨寸寸珠連巨蚌胎須向廣場驅駔駿莫從間處撻駑駘寧同晉帝環營日拋賺中途後騎來宋蘇轍食筍林竹抽萌不忍挑誰家盈束伴晨樵籜龍似欲號無罪食客安知惜後凋不願鹽梅調鼎味姑從律呂應簫韶林間老煞雖無用一試冬深雪到腰秦觀次韻范純夫戲答李方叔饋筍兼簡鄧慎思楚山冬筍劚寒空北客長嗟食不重秀色可憐刀切玉清香不斷鼎烹龍論羮未愧蓴千里入貢當隨傳一封薄祿養親甘旨少滿包時賴故人供唐庚長沙竹筍聞於天下大者可十餘斤食之甚甘而不氷脾昔渡湘欲作詩未暇也今日復過之乃酬以此篇地入長沙莫歎卑竹萌徑尺舊相知九重才復金門籍萬里先參玉版師契濶纍年真負口徘徊彌月未妨脾渭川風味那能對中有離騷九辨辭陸遊湖上筍盛出戲作長句􅋾􅋾穿苔玳瑁簪按行日夜待成林養渠百尺干霄氣見我平生及物心剩插藩籬憂玉折豫期風雨聽龍吟眀年又徙囊衣去誰與平安報好音楊萬里都下食筍自十一月至四月戲題竹祖龍孫渭上居供儂樽俎半年餘斑衣戲綵春無價玉版談禪佛不如若怨平生食無肉何如陋巷飯斯蔬不須庾韭元修菜吃到憎時始憶渠方嶽貓筍此君乃有寧馨兒犀角豐盈玉不如老去煙姿元聳壑生來風骨已專車詩腸慣識貓頭筍食指寧知熊掌魚莫遣匆匆萬竿緑一春心事政關渠金孫邦傑燒筍煨茁舊聞山谷語勸耕還憶大蘇詩傳將火候無多訣留得天真又竒未放錦繃開束縛已看玉版證茶毗白麻初拜驚燒尾見此應慙富貴癡眀吳寬答于喬次韻送冬筍西郭清風碁墅開門前俗物敢持來聊供香飯抄雲子為想長鑱劚雪堆空腹冷含金瑣碎壯心未怯玉崔嵬知君能畫非饞守乞與鵝溪絹翦裁于慎行紀賜鮮筍殊錫光生玉筍班曽從青簡賦檀欒蒲筐乍解香盈座錦籜初分緑滿盤一飯疑含仙禁雨三秋猶憶北窗寒慚無鳳實儀千仞祝有龍孫長萬竿五言排律增唐韓愈和侯協律詠筍竹亭人不到新筍滿前軒乍出真堪賞初多未覺煩成行齊婢僕環立比兒孫驗長常攜尺愁乾屢側盆對吟忘膳飲偶坐變朝昏滯雨膏腴濕驕陽氣候溫得時方張王挾勢欲騰騫見角牛羊沒看皮虎豹存攢生猶有隙散布忽無垠詎可持籌算誰能以理言縱橫公占地羅列暗連根狂劇時穿壁羣強幾觸藩深潛如避逐逺去若追奔始訝妨人路還驚入藥園萌牙防寖大覆載莫偏恩已復侵危砌非徒出短垣身寧虞瓦礫計擬掩蘭蓀且歎髙無數庸知上幾番短長終不校先後竟誰論外恨苞藏密中仍節目繁暫須回步履要取助盤飱穰穰疑翻地森森競塞門戈矛頭戢戢蛇虺首掀掀婦懦咨聊揀兒癡謁盡髠侯生來慰意詩句讀驚魂屬和才將竭呻吟至日暾五言絶句增宋朱子和劉秀野新筍翛翛江上林白日暗風雨下有萬玉虯三冬卧寒土筍脯南山春筍多萬里行枯臘不落盤餐中今知緑如簀元范梈看東亭新筍問竹何年有親曽共嵗寒昨傳新筍發扶杖繞林看鄭氏允端筍竹林春雨過瘦筍迸苔長坐待成髙節清標出短牆眀髙啓燒筍幽人嗜燒筍出土不容長林下孤煙起風吹似竹香六言絶句增宋楊萬里看筍筍如滕薛爭長竹似夷齊獨清只愛錦繃滿地暗林忽兩三莖七言絶句原唐杜甫絶句無數春筍滿林生柴門密掩斷人行會須上番看成竹客至從嗔不出迎李賀昌谷北園新筍籜落長竿削玉開君看母竹是龍材更容一夜抽千尺别却園池數寸埃斫取青光寫楚詞膩香春粉墨離離無情有恨何人見露壓煙啼千萬枝家泉石眼兩三莖曉看隂根紫陌生今年水曲春沙上笛管新篁拔玉青李商隱初食筍呈座中嫩籜香苞初出林五陵論價重如金皇都陸海應無數忍翦凌雲一寸心宋蘇軾謝惠貓兒頭筍長沙一日煨邊筍鸚鵡洲前人未知走送煩公助湯餅貓兒突兀鼠穿籬郭祥正休師惠雪筍雪竹生芽玉一簪北人此味豈嘗諳病中得食勝牛乳行矣阿難師勿慙張商英食筍長江縈繞地膏腴風氣相連不甚殊自是舌根分彼此致令苦筍勝宜都陸遊筍絶句列仙閲世獨清癯雪谷氷溪老不枯輸與錦繃孩子輩千金一束入天厨朱松新筍一雷驚起籜龍兒戢戢滿山人未知急喚蒼頭劚煙雨明朝吹作碧參差梅雨冥冥相已齊連雲篁竹暗蠻溪短萌解籜登雕俎錯落黃金騕裊蹄朱子次韻謝劉仲行惠筍二首誰寄寒林新劚筍開奩喜見白差差知君調我酸寒甚不是封侯食肉姿君詩髙處古無師島瘦郊寒詎足差縳得獰龍并寄我句中仍喜見雄姿詩散句增唐杜甫逺傳冬筍味更覺綵衣春白居易幾見林抽筍頻驚燕引雛元稹寶地琉璃折紫苞琅玕踴許渾竹楥晝看筍藥欄春賣花宋梅堯臣便今剝錦煮金玉甘脆不道簟瓢空劉敞龍孫春吐一尺芽紫錦包玉離泥沙黃庭堅氷底斫春生筍束豹文解籜饌寒玉孫覿緑筍遺苞半出籬清溪一曲翠相迷陸遊冬筍生林龍􅋾􅋾寒泉落澗珮珊珊梁簡文帝橫階入細筍周庾信短筍猶埋竹唐張九齡林筍苞青籜孟浩然竹林深筍穊王維嘉蔬緑筍莖杜甫緑垂風折筍舍下筍穿璧司空曙巖筍出叢長白居易紫鮮林筍嫩姚合迸筍搘階起杜牧斑筍新梢短李頻春篁抽筍密方干迸筍入波生司空圖坡暖冬生筍皮日休迸筍支簷楹宋林逋煙崖早筍肥邵雍洗竹留新筍張耒筍深鳴鳥下緑嫌新筍破唐庚翻泥逢暗筍唐杜甫堂西長筍别開門韓愈篔簹競長纎纎筍白居易紫筍齊嘗各鬪新勸我加餐因早筍來鵬筍過東家作竹林宋韓琦竹筍迸階抽兕角蘇軾好竹連山覺筍香飽食不嫌溪筍瘦范成大竹筍漫山鳯尾齊陸遊穿破緑錢多稚筍方嶽霜鞭行茁軟于酥惠洪分外濃甘黃竹筍金吳激一畨瘦筍羽林槍元方回鮮筍紫泥開玉版張雨齋庖得筍是佳蔬吉雅謨丁紅稻供炊筍脯香詞增宋錢惟演玉樓春錦籜參差朱檻曲露濯文犀和粉緑未容濃翠伴桃紅已許纎枝留鳯宿嫩似春荑明似玉一寸芳心誰管束勸君速喫莫踟蹰看被南風吹作竹别録原取筍山谷云根須辰日劚筍看上畨成凡筍一畨兩畨出成竹至第三畨者止可供食不成竹矣故曰筍看上畨成也凡筍蒸煮炮酢惟人所好又可乾藏採筍過一日曰蔫過二日曰箊取宜避露每日出掘深土取之半折取鞭根旋得旋投密竹器中覆以油革見風則觸本堅入水則浸肉硬脫殼煮則失咮生著刃則失氣採而久停非鮮也淨之入水非洗也蒸熟停久非食也如此然後可與語食筍矣此外不足數也製用僧贊寧筍譜云麻油薑皆殺筍毒凡食筍之法譬若治藥修煉之得法則益人反是則損取得以巾拭去土連殼沸湯瀹之煮宜久生必損人苦筍最宜久甘筍出湯後去殼煮筍汁為羮茹味全加美不然蒸最美味全煻灰中煨後入五味尤佳食筍去殼煮熟切片搾乾鹽醃過宿晒乾貯慈竹筍四月生江南人多以灰煮食煮新筍以沸湯煮則易熟而脆味尤美若蔫者少入薄荷煮則不蔫與豬羊肉同煮則不用薄荷增山家清供夏初竹筍盛時掃葉就竹邊煨熟其味甚鮮曰傍林鮮筍取鮮嫩者以料物和簿麵拖油如黃金色甘脆可愛舊好莫友訪霍如菴延早供以筍切作方片和白米煮粥佳甚濟顛筍疏云拖油盤內煿黃金和米鐺中煮白玉二者兼得之矣原筍酢切作片子沸湯瀹過候乾入蔥絲蒔蘿茴香花椒紅麵併鹽拌勻同醃一時增海槎餘録酸筍大如臂摘至用沸湯泡出苦水投冷井水中浸二三日取出縷如絲醋煮可食好事者攜入中州成罕物京師勳戚家會酸筍湯即此物也原筍乾筍肉一百斤用鹽五升水一小桶候沸涌拗出汁候乾旋添筍汁煮熟撈出壓之或用手揉在鍋隔夜則黑熱灑則枯一日晒乾則硬火焙便不軟臨食時取浸筍汁煮筍則有味附録竹實增山海經注竹六十年一易根易根必生花生花必結實結實必枯死實落土又復生彚考增宋史真宗本紀咸平二年江南轉運使言宣歙竹生米民採食之五行志政和四年八月建州境內竹生米數千萬石三年十一月癸酉越州承天寺瑞竹一竿七枝幹相似其葉圓細生花結實詔送祕書省仍拜表賀莊子鵷雛非練實而不食注練實竹實取其潔白也韓詩外傳黃帝時鳯凰棲帝梧桐食帝竹實異苑晉惠帝元康二年巴西郡界竹生花紫色結實如麥外皮青中赤白味甚甘述異記止些山多竹長千仞鳯食其實去九疑萬八千里藝窗私志凝波竹實服之肌滑體輕出區吳山紫枝緑葉堅滑如玉風吹有聲如環珮成帝種於臨池觀更名曰環珮竹花如海榴實如蓮子而小近謝芬蘭庭中忽生此竹人以為瑞而不知為何物其夫讀海外志始知之苐無花實明年出筍如常竹前種亦漸不然人以為積善所致該聞集舊稱竹實為鸞鳯所食今近道竹間時見花開如棗結實如麥江淮間號為竹米以為荒年之兆其竹即死信非鸞鳯之食也近有餘干人來言彼有竹實大如雞子竹葉層層包裹味甘勝蜜食之令人心肺清涼生滿竹林茂密處頃因得之雖日久乾枯而味尚存乃知鸞鳯所食必非常物也原天台山志甘竹實出天台山間間真人以致元帝增福建志紹興十八年侯官縣有竹實如米飢民採食之集藻七言古詩增宋陳造竹米行竹君亢宗擅楚墟一一修聳山澤臞風流秀整與世殊楚俗食息皆爾須薪之籬之且籧篨笲筥箱篚觚籃笯溝瓦厥祖羮其雛隨索斯獲掇諸塗今嵗麥秋旱嵗餘得麥僅足償官租竹君憫農如士夫著花結子千林俱密砌玉粒綴旒珠株株擷取雖錙銖彌頃亘畝無間株磋磨蒸炊勝雕葫鄰里乞索水火如坐令顰蹙興歌呼野叟好事能分吾香清而冽甘而膄此君行能不一書此惠及物旋就枯摩頂放踵忘其軀所學無乃墨者徒老子苟祿天之隅袖手無策蘇􅑱孤投七三歎吾慚渠詩散句增唐李白竹實滿秋圃鳯來何苦飢附録越王竹原嶺表録南海岸邊沙中生沙箸一名越王竹相傳越王棄餘算而生若細荻髙尺餘春吐苗箕心茗骨青而且徑南海人愛其色以為酒籌凡欲采者須輕步向前拔之聞行聲遽縮入沙中不可得附録淡竹葉原淡竹葉一名鴨跖草洛陽花木記云碧鳯花一名鴨腳即此一名芩雞舌草一名碧竹子名竹雞草一名耳環草一名碧蟬花一名藍姑草一名竹葉菜處處平地有之三四月生苗紫莖竹葉嫩時可食四五月開花如蛾形兩葉如翅碧色可愛結角尖曲如鳥喙實在角中大如小豆中有細子採花取汁作畫色及彩羊皮燈青碧如黛彚考增永嘉郡記青田縣有草葉似竹可染碧名為竹青此地所豐草故名青田集藻七言絶句增宋楊巽齋碧蟬花楊葩􅉡􅉡傍疏籬薄翅舒青勢欲飛幾誤佳人將扇撲始知錯認枉心機翁元廣碧蟬花露洗芳容别種青牆頭微弄晚風輕不須強入羣芳社花譜原無汝姓名附録錦竹增宛陵詩注錦竹草也似竹而斑集藻五言古詩增宋梅堯臣錦竹雖作湘竹紋還非楚筠質化龍徒有期待鳯曽無實本與凡草俱偶親君子室附録篇竹增爾雅竹篇蓄注似小藜赤莖節好生道旁可食又殺蟲本草處處有之布地而生節間白花葉細緑人謂之篇竹煮汁與小兒飲療蛔蟲彚考增資暇録詩衛淇澳篇云緑竹漪漪按陸璣草木疏稱郭璞云緑竹王芻也今呼為白腳莎一云即鹿蓐草又云篇竹似小藜赤莖節韓詩作􅗨亦云􅗨篇竹則明知非筍竹矣今為辭賦皆引漪漪入竹事大誤也當時謝莊竹贊云瞻彼中唐緑竹漪漪便襲其謬附録竹菜增齊民要術竹菜生竹林下似芹科而莖葉細生極穊淨洗暫經沸湯速出下冷水中即搦去水細切又胡芹小蒜亦暫經沸湯細切和之與鹽醋拌暮春用至四月御定佩文齋廣羣芳譜卷八十六
