body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十七卉譜芝增説文芝神草也嫏嬛記靈芝名夀潛一名希夷原芝瑞草也爾雅云苬芝注云芝一嵗三華瑞草一名三秀王逸楚辭注云三秀芝草也一名菌蠢神農經所傳五芝云赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黃者如紫金氣和暢王者慈仁則芝草生玉莖紫筍又云聖人休祥有五色神芝含秀而吐榮論衡云芝生於土土氣和故芝生土食之令人眉夀有青雲芝生名山青蓋三重上有雲氣食之夀千嵗能乘雲通天龍仙芝狀似升龍之類葉為鱗其根如蟠龍服一株則夀千嵗金蘭芝生名山之隂金石之間上有水蓋飲其水夀千嵗九曲芝朱草九曲每曲三葉火芝葉赤莖青赤松子所服月精芝秋生山陽石上莖青土赤味辛苦盛以銅器十月服夀萬嵗夜光芝生華陽洞山之隂有五色浮其上酉陽雜俎云一株九實實墜地如七寸鏡視如牛目螢火芝生常良山此物在地如螢火狀葉似草實如豆紫華夜視有光食一枚心中一孔眀食七枚七孔眀可夜書得食四十七枚夀萬年白雲芝雲母芝皆生名山隂白石上白雲覆之秋採食令人身輕商山紫芝四皓避泰入藍田采而食之共入啇洛隱地肺山又轉深入終南山漢祖召之不出九光芝七明芝皆瑞芝實石也狀如盤槎有七孔者名七明九孔者名九光生臨水之高山鳯腦芝仙經言穿地六尺以鐶實一枚種之灌以黃水五合以土堅築之三年生苖如匏實如桃五色名鳯腦芝食其實唾地為鳯乘升太極五德芝狀如車馬莖方其葉五色各具而不雜上如偃蓋中有甘露紫氣起數尺萬年芝令人不老延年九千增抱朴子芝有石芝木芝肉芝菌芝凡數百種石芝石象生於海隅及島嶼之涯肉芝狀如肉附於大石頭尾具有乃生物也光明洞徹如堅氷大者十餘斤小者三四斤菌芝或生深山之中或生大木之下或生泉水之側其狀或如宫室或如車馬或如龍虎或如人形或如飛鳥五色無常凡百二十種木芝松脂淪入地千嵗化為茯苓茯苓萬嵗其上生小木狀如蓮葉名曰木威食之夜視有光持之甚滑燒之不焦龍節芝松樹枝三千嵗者其皮中有聚脂狀如龍形大者重十斤木渠芝寄生大木上狀如蓮花九莖一叢其味甘而辛黃蘖芝黃蘗木下根有如三斛器者去木株一二十餘丈有細根相連狀如縷建木芝生於廣都其皮如纓其實如鸞樊桃芝其木如升龍其花葉如丹羅其實如翠鳥高不過五尺生於名山之隂東流泉水之上千嵗芝生枯木下根如坐人刻之有血已上皆木芝牛角芝生虎夀山及吳坂上狀如蔥特出如牛角長三四尺青色麻女芝似麻而莖赤色花紫色紫珠芝莖黃葉赤實如李而紫色二十四枚輒相連而垂如貫珠朱草芝九曲曲有三葉葉冇三實其莖如針龍御芝常以仲春對生三節十二枝下根如坐人几此草芝有百二十種玉脂芝生於有玉之山常居懸危之處玉膏流出萬年以上則凝而成芝有似鳥獸之形色無常彩多似山水蒼玉亦鮮眀如水晶石蜜芝生少室山石戶中石桂英芝生名山石穴中似桂而實石也髙尺許大徑尺光眀而味辛石腦芝生滑石中初破之其在石中五色光眀而自動石硫黃芝五嶽皆有而箕山為多如此有百二十皆石芝也黃龍芝生於神山之中狀如黃龍味辛甘華芝生於名山之陽及出深山大谷源泉水中赤蓋白莖上有兩葉三實金芝生於金石之中無蓋青莖味甘辛黑芝生於山之隂大谷中白蓋赤莖味甘月芝生於名山之隂崑崙之山大谷源泉金石之中山芝韓衆所食人芝生名山之隂青蓋白莖鬼芝青蓋長莖酉陽雜俎隱辰芝狀如斗以屋為節以莖為剛采芝圖鳳凰芝生名山金玉間黑雲芝生山谷之隂黑蓋赤理黑莖味苦五色龍芝五方芝天芝地芝上芝雷芝甘露芝雲氣芝白虎芝太乙芝原茅君內傳云句曲山有五芝求之者投金環一雙於石間勿顧念必得第一龍仙芝似交龍之相負食之為太極之仙卿第二參成芝赤色有光其枝葉如金石之音折而續之即復如故食之為太極大夫第三燕胎芝其色紫形如葵葉上有燕象光眀洞徹食之為太清龍虎仙君第四夜光洞鼻芝其色青其實正白如李夜視其實如月洞照一室食之為太清仙官第五玉料芝食之為三官真御史或云芝黃色者為善黑色者為惡增瑞應圖芝草常以六月生春青夏紫秋白冬黑本草五芝經云青芝生泰山赤芝生霍山黃芝生嵩山白芝生華山黑芝生常山紫芝生髙夏山谷六芝皆六月八日采芝類甚多亦有花實者以木積濕處用藥傅之即生五色芝原臞仙神隱芝有二種紫白二色形如菌生於朽木根朽壞上者菌也芝則有莖長尺餘與靈芝相似豫章西山最多其靈芝生石上形如石可服秋采之菌芝可種於階前彚考增禮記內則芝栭注人君燕食所加庶羞也疏庾蔚云無華葉而生者曰芝栭盧氏云芝水芝也王肅云無華而實者名栭皆芝屬也庾又云芝栭是一物今春夏生於木可用為葅其有白者不堪食也賀氏云栭軟棗亦云芝木椹也以芝栭為二物非也原漢書武帝本紀元封二年六月詔曰甘泉宫內中産芝九莖連葉上帝博臨不異下房賜朕𢎞休其赦天下賜雲陽都百戶牛酒作芝房之歌宣帝本紀神爵元年三月詔曰金芝九莖産於函德殿銅池中增漢書藝文志黃帝雜子芝菌十八卷注服餌芝菌之法也吳志孫皓傳天紀三年有鬼目菜生工人黃耉家依緣棗樹長丈餘莖廣四寸厚三分東觀案圖名鬼目作芝草遂以耉為侍芝郎銀印青綬晉書許邁傳邁永和二年移入臨安西山登巖茹芝眇爾自得有終焉之志隱逸傳張忠隱於泰山恬靜寡欲清虛服氣餐芝餌石修導養之法宋書符瑞志芝草王者慈仁則生食之令人度世漢眀帝永平十七年春芝生前殿桓帝建和元年四月芝草生中黃藏府宋順帝升平二年宣城山中生紫芝一株在所獲以獻南齊書祥瑞志升眀二年宣城臨成縣於籍山獲紫芝一枝魏書靈徵志世宗景眀三年七月魯陽獻烏芝原舊唐書玄宗夲紀天寶七載三月大同殿柱産玉芝有神光照殿羣臣請加皇帝尊號開元天寶聖文神武應道許之肅宗夲紀上元二年七月延英殿御座梁上生玉芝一莖三花上製玉靈芝詩唐書張九齡傳九齡遷中書侍郎以母喪解毁不勝哀有紫芝産坐側增宋史五行志太平興國五年九月真定府行宮殿梁生芝如荷花知府趙賢進以圖上咸平四年正月濰州獻芝草一夲如佛狀六年五月導江縣民潘矩田生芝三層黃紫色髙五寸許九月相州牧龍坊生芝一莖色紫黃長尺餘分七枝枝如手五指狀其最上枝髏鳳翥知州張鑑以獻大中祥符元年五月辛未以東封遣經度制置使王欽若祭文宣王廟於孔林得芝五株色黃紫如雲色及人戴冠冕之狀詔內侍楊懷玉祭謝復得芝四夲輕黃如雲氣之狀六月瑕丘縣民宋固於堯祠前得黃紫芝九夲連理者四十月復州獻芝草類神仙佛像三年十一月安鄉縣謝山獲芝二十二夲其七狀如珊瑚而色紫慶厯五年八月洪州章江禪院堂柱芝草生髙一尺三寸葉二十一層色白黃有紫暈旁生小芝葉九層上有氣如煙建炎二年九月癸卯權知密州杜彥獻芝草五葉如人指掌色赤而澤宰臣黃潛善奏色符火德形像股肱之瑞髙宗不啓視却之儀衛志紹興二十五年適當郊祀而太廟生靈芝九莖禮部侍郎王珉等請繪之華旗以紀盛美焉金史世宗夲紀大定二十四年正月辛卯徐州進芝草十有八莖五行志大定五年六月戊子河南府進芝草十三夲得於芝田石上甲辰大安殿楹産芝其色如玉淮南子紫芝生於山而不能生於盤石之上神農經山川雲雨五行四時隂陽晝夜之精以生五色神芝皆為聖王休祥焉原尚書大傳王者德先地序則芝草生增十洲記瀛洲在東海中地方四千上生神芝仙草元洲在北海中地方三千里去南岸十萬里上有五芝服此亦得長生方丈洲仙家數十萬耕田種芝草課計頃畝如種稻狀生洲上有仙家數萬天氣安和芝草常生春秋運斗樞瑶光得陵出黑芝孝經援神契德至草木則芝草生善養老則芝草茂瑞應圖王者敬事耆老不失舊故則芝草生漢武內傳西王母之山上藥有大真紅芝草焦氏易林文山紫芝雍梁朱草長生和氣王以為寶原論衡建初三年零陵泉陵縣女子傅宅內生芝五夲長者尺四五寸短者七八寸莖葉紫色蓋紫芝也太守沈鄷遣門下掾奏獻皇帝恱懌賜錢衣詔會公卿郡國上計吏皆以芝草告示天下增東觀漢記光和四年郡國上芝英古今注章帝元和二年芝生沛如人冠又生章武如人抱三子狀建初五年芝出潁川常以六月中生一葉五嵗五重春青夏紫秋白冬黑色十月後黃氣出土尺五寸抱朴子蔡誕求仙三年飢凍還家欺家人云吾為老君守視斑龍與諸仙博戲忽輸此龍為此罪見責送吾付崑崙山下藝鋤芝草三四頃並皆生細石中多荒穢治之勤苦不可論法當十年乃得原會偓佺子王喬諸仙來按行吾守請之並為吾作力且自放歸當更自修理求去蒼山芩石之中赤雲之下狀如人竪竪如連鼓其色如澤以夏采之隂乾食之令人乘雲能上天觀見八極通見神眀延夀萬年行山中見小人乘馬車長七八寸者肉芝生取服即仙真誥羅江大霍有洞臺中有五色隱芝枕中書玉京七寶山五色芝英上有萬二千種拾遺記岱輿山北有王梁千丈駕玄流有七色芝生梁下其色青光輝耀謂之蒼芝崑崙山第九層有芝田蕙圃羣仙種耨焉祥異記漢安帝時有異物生長樂宮東廡柏樹永巷南閨合歡樹識者以為芝草也廣異記仙都有芝圃悉種靈芝或如車騎或如華蓋或如樓閣或如飛鳥五色安城記郡渚江川發源同會落亭石上有芝草下有紫磨金也博物志名山生神芝不死之草上芝為車馬中芝為人形下芝為六畜玉塵集成都朱善存家世寶一劒每生神芝則天下晏清原酉陽雜俎仙藥有三十六芝天寶初臨川人李嘉胤所居柱上生芝草狀如天尊太守張景佚拔柱獻焉大厯八年廬江縣紫芝生髙一丈五尺凡學道三十年不倦天下金翅鳥銜芝至羅門山食石芝得地仙增唐新語崔希喬以孝友稱為鄭縣丞芝草生所居堂一宿而葩蓋盈尺杜陽雜編元和五年內給事張維則自新羅使回云於海上泊洲島間乘月間步約及一二里見花木臺殿金戶銀闕其中有數公子戴章甫冠著紫霞衣命一青衣捧金龜印以授維則曰致意皇帝其篆曰鳳芝龍木受命無疆維則達京師即具以事進上歎異良久但不能喻其文爾是月寢殿前連理樹上生靈芝二株宛如龍鳳上因歎曰鳳芝龍木寧非此驗乎武宗每齋戒沐浴召道士趙歸真已下共探希夷之理由是室內生靈芝二株皆如紅玉尹祁元為上種雙麟芝於殿前色褐一莖兩穗隱隱形如麟頭尾悉具其中有子如瑟瑟焉上自采餌之頗覺神驗原內觀日疏謝幼貞嗜菌庭中忽生一菌狀若飛鳥沈子玉曰此飛禽芝以處女中單覆之則活煮而食可數百嵗謝入取中單有鄰女乞火跨之翩然飛去謝但歎恨清異録杜荀鶴舍前椿樹生芝草眀年及第以漆彩飾之安几硯間號科名草增南豐雜識王平甫熙寧癸丑嵗宿真崇文館夢有人要之至海上見水中宮殿其中樂作笙簫鼓吹之伎甚衆題其宮曰靈芝宮平甫欲與俱往有人在宮側隔水曰時未至且令去他日迎之至此恍惚夢覺時禁中已鐘鳴平甫自是頗負不凡為詩曰萬頃波濤木葉飛笙簫宮殿號靈芝揮毫不是人間世長樂鐘鳴夢覺時邵氏聞見後録仁宗降誕章懿后榻下生靈芝一夲四十二葉以應享國四十二年之瑞云燕翼詒謀録皇祐三年六月丁亥守臣茹孝標奏城內小山生芝三百五十夲悉以上進改名其上曰紫芝山蕞爾一培塿不應一時所産若是之多也上怒曰朕以豐年為瑞賢臣為寶草木蟲魚之異烏足尚哉長編景祐四年有芝生於化成殿柱御製瑞芝詩儒者並獻賦養疴漫筆祥符崇尚道教建立宮觀專尚祥瑞王欽若獻芝草八千一百三十九夲丁謂獻芝草三萬七千餘夲齊東野語王建父子之據蜀也致和隆盛之際地不愛寶所在奏貢芝草者動二三萬夲蘄黃間至有一鋪二十五里之間遍野而出密州山間至彌滿四野有一夲數十葉衆色咸備者太守李文仲採及三十萬夲作一綱進即進職除夲道運使路史黃帝升鴻隄受神芝施黃蓋古今詩話宣和間王將眀賜第既而以梁生芝草為奏車駕臨幸適久雨梅潤芝墜地京師無名子有為十七字詩曰新公新賜第梁上生芝草為甚脫下來膠少湖山勝槩靈芝崇福寺錢王故苑以芝生其間捨以為寺故名靈芝居山雜志吳縣金山雅多靈芝時産地上多碧色山人每采得之弗貴也皇甫汸考芝宮樂曲序考芝宮者嵗乙丑獻廟産芝瑶光映室乃建玉芝宫以時致享昭孝感也原庚巳編今年春長洲漕湖之濵有農婦治田見湖灘一物白如雪趨視之乃一小兒手也連臂約長尺許其下作聲唧唧驚走報其夫夫往看亦甚疑怪掘之其根不可窮乃折而棄之湖嘗讀神仙感遇傳云蘭陵蕭靜之掘地得物類如人手肥潤而紅烹而食之踰月髮再生力壯貌少後值道士顧靜之曰神氣若是必嘗仙藥指其脈曰所食者肉芝也夀等龜鶴矣然則漕湖之物正此類耳乃不幸棄於愚夫之手惜哉增弇山園記含雪樓下承簷溜處産芝已三閲嵗矣每産時其址不雨而潤上有紫氣受日晶熒因名之曰榮芝所原湧幢小品世宗有詔采芝宛平縣民得五夲以獻御醫李果以玄嶽鮮芝四十夲進三十六年九月禮部進千餘夲眀年春鄠縣民聚芝百八十夲為山以獻內有徑一尺八寸者數夲號曰仙應萬年芝山四川巡撫黃光升進芝四十九夲十月禮部進芝一千八百六十四夲四十三年御醫黃金進黃夀香山四座聚芝三百六十夲為之宋政和五年蘄州産芝草遍境計黃芝一萬一千六百夲內一夲色紫九幹尤竒唐太宗貞觀中安禮門御榻産靈芝五莖十七年太子寢室中産紫芝共十四莖並為龍與鳳翥之形肅宗上元二年含暉院生金芝武宗起望仙臺空中生靈芝二株色如紅玉韓思復為滁州刺史有黃芝五株生州署邵君協宰新昌五色靈芝十二枝生便坐之室貞觀中滁州山原遍生芝草浙江烏程縣大中丞潘印川季馴治河有功常築舍於崑山下有芝生於庭始則一本色爛然紫繼乃日盛生至百本扶疏偃仰照耀人目因標之曰芝林萬厯三十年德平葛祥宇宅産芝眀年登科三十一年費縣王左海新城王藎臣宅皆産芝眀春俱得雋曹大章曰芝號無根以其天所特産非人力也然載之圖經芝牒不可勝數諸凡草木芝固貴而産於鐵石者謂之玉芝昔東王父服蓬萊玉芝夀九萬嵗赤松居崑崙嘗授神農服芝法而廣成居崆洞之上亦嘗以授軒轅水經言具茨山有軒轅受芝圖處蓋芝圖自是始也集藻表增唐崔融皇太子賀芝草表伏承某月日芝草生於乾元殿瑞命天來符祥日至煌煌三秀分芰井而攢柯曄曄九光間梅梁而吐葉晉都宮閣何必靈芝之臺洛邑山川居然密芝之地伏惟天皇天臨海內帝有域中兼漢制而宅兩京用堯心而加百姓神精下降洽至道於丘陵靈液旁霑被深仁於草木觀其如蓋如閣如日如星得五方之氣象合四時之景色仙人在上則車馬疑飛神龍居下則風雲不去謂蓬瀛之海列即崑閬之山開魏皇之雙幹莫儔漢帝之九莖為劣可以薦郊廟可以觴公卿臣謬踐儲闈祗膺守國不獲親承左右日覽休徵雖玉脛延齡在神仙而可致而刀圭入膳視朝夕而猶賖是用心馳仁夀之前慶集肅成之後孫逖為宰相賀合鍊院産芝草表臣等伏見道士黃河清等奏興慶宫合錬院內産芝草五色分輝六莖並秀神丹入鍊而轉精禎祥應期以如答覩兹嘉瑞望宣付史官者伏以靈芝所致和氣之精著美仙經標名瑞典陛下深仁契道至德通神鍊液飛丹既啓長年之館敷華有葉遽呈三秀之祥五色有類於卿雲六莖且符於帝樂豈惟動植昭感以表於休徵固亦真仙叶應用彰於聖夀常衮中書門下賀芝草嘉禾表伏見兵部尚書中書門下平章事李抱玉進芝草嘉禾者臣聞王者道洽則靈芝生天下和平則嘉禾應伏惟陛下誕膺景命憂濟生靈合太上之德感元精之氣天地氤氲神眀滋液降此珍物叶於昌期垂蓋連莖三華煥發離根合穎一穗孤秀沐我渥澤扇其祥風衆草之英百穀之長以兆稔嵗以符太平昔周得唐郊之獻列篇於典策漢獲甘泉之祉薦歌於清廟三瑞之極一朝會同長發其祥無疆之慶中書門下賀芝草表今日中使吳承清至宣示宋汴節度使御史大夫田神功所獻芝草一株紫蓋黃莖叢生者天生神物王者嘉瑞竒秀之狀靈篇未書伏惟陛下孝通神眀德至草木和氣所感禎祥屢彰煌煌靈芝郡國來獻垂以金蓋發其瓊葩爛然紫雲之色灼然紅蕖之秀王德斯應皇家永昌固可寫狀圖牒薦於郊廟祗奉天意贊揚鴻休序增宋秦觀俞紫芝字序余昔遊玉笥山周行二十四峯訪蕭子雲故隱道見靈芝焉生乎磐石之上回環而有葉秀澤而不根信天下之異草也竊愛久之留不能去俄有童子朱顔紺髮自松隂中距石輒止撫芝歎曰嘻道人無本其亦如是矣余異而問曰適吾子有緒言不敏未知所謂願終其説童子笑曰子求終乎終之久矣以為未耶沒身無終雖然嘗試為汝言其崖略夫德人以有本為宗道人以無本為宗天下皆知有物所以失已也不知有已所以失已也而德人知之於是內觀無是外觀無彼無是故能以已為物無彼故能以物為巳巳物不二謂之真一夫是謂以有本為宗天下皆知有偽所以喪真也不知有真所以喪真也而道人知之於是前際無捨後際無取無捨故不斷一切偽無取故不住一切真真偽兩忘亦無真一夫是之謂以無本為宗蓋非有本則不能離相而歸空非無本則不能即空而證實有本然後眀心無本然後見性夫子識之人間所謂道德者固不出乎此矣雖然有本無本吾豈能識之哉語未既有老人復杖策自松隂中來顧謂童子曰適何所言童子欲語老人引杖擊之童子走松隂忽然不見還視老人亦已亡矣於是余茫然自失私識其言後九年遊京師遇金華居士俞紫芝請余改字因思昔日玉笥童子之言字曰無本復以其説為序贈焉記增宋王安石芝閣記祥符時封泰山以文天下之平四方以芝來告者萬數其大吏則天子賜書以寵嘉之小吏若民輒錫金帛方是時希世有力之大臣窮搜而逺采山農野老攀緣狙􅍻以上至不測之髙下至澗溪壑谷分崩裂絶幽窮隱伏人迹之所不通往往求焉而芝出於九州四海之間蓋幾於盡矣至今上即位謙讓不德自大臣不敢言封禪詔有司以祥瑞告者皆勿納於是神竒之産銷藏委翳於蒿藜榛莽之間而山農野老不復知其為瑞也則知因一時之好惡而能成天下之風俗况於行先王之治哉太丘陳君學文而好竒芝生於庭能識其為芝惜其可獻而莫售也故閣於其居之東偏掇取而藏之蓋其好竒如此噫芝一也或貴於天子或貴於士或辱於凡民夫豈不以時乎哉士之有道固不役志於貴賤而卒所以貴賤者何以異哉此豫之所以歎也黃庭堅瑞芝亭記晉陵邵君叶為新昌宰視事之三月靈芝五色十二生於便坐之室吏民來觀無不動色相與言曰吾令君殆將有嘉政以福我民乎山川鬼神其與知之矣不然此不蒔而秀不根而成非人力所能致而自至者何也乃相與闢其室四達為亭命曰瑞芝奔走來謁記於豫章黃庭堅曰豫觀神農草木經青芝生泰山赤芝生衡山黃芝生嵩山白芝生華山黑芝生常山皆久食而輕身延年而不老蓋序列養生之藥不言瑞世之符又其傳五芝曰赤者如珊瑚白者如截昉黑者如澤漆青者如翠羽黃者如紫金皆光眀洞徹如堅冰而世之所名芝草不能若是也故常考於信書自先秦之世未有稱述芝草者及漢孝武厭飫四海之富貴求致神仙不死天下騷然元封中乃有芝草九莖連葉生甘泉殿齋房中於是赦天下作芝房之歌孝宣興於民間勵精萬事事無過舉然廟享數有美祥頗甘心焉故復修孝武郊祀以瑞紀年元康中金芝九莖又産函德殿銅池中然此芝不生於五嶽果神農經所謂芝者耶余又竊怪漢世既嘉尚芝草而兩漢循吏之傳未有聞焉何也豈其所居民得其職所去民思其功生則羽儀於朝殁則蒸嘗於社則是民之鳳凰麒麟醴泉芝草也耶抑使民田畝有禾黍則不必芝草生戶庭使民伏臘有雞豚則不必麟鳳在郊陬黠吏不舞文則不必虎北渡河里胥不追擾則不必蝗不入境此其見效優於空文也耶昔者黃霸引上計吏問興化之條有鶡雀來自京兆舍中飛集丞相府上霸以為皇天降下神雀欲圖上奏京兆尹張敞言郡國計吏竊笑丞相之仁厚智略有餘而微信竒怪也恐丞相興化之條或長詐偽以敗風俗天子嘉納焉劉昆為江陵令連年火災昆輒向火叩頭多能反風降雨遷𢎞農太守驛道多虎崤澠不通昆為政三年虎負子渡河乃召入為光祿􅈴詔問昆江陵反風滅火𢎞農虎北渡河行何德政而致是對曰偶然耳左右皆笑其質帝歎曰是乃長者之言由君子觀之張敞之篤論世祖之知言建成之文不如光祿之質也雖然新昌之吏民愛其令君將徼福焉焉可誣也又嘗試論之古之傳者曰上世蓋有屈軼指佞萐蒲扇庖蓂莢紀厯嶰竹生律既不經見後世亦不聞有之則前世之有芝草特未定也邵君家世儒者又能好修求自列於循吏之科故因其氣熖而取之異草來瑞使因是而發政於民勤恤而無倦民得盡力於田士將盡心於學則非常之物而不虛其應且必受賜金增秩之賞用儒術顯於朝廷矣豈獨夸耀下邑而已乎故并書余所論芝草循吏之實使歸刻之吉州西峯院三秀亭記廬院比缺守輒以它吏攝承託宿傳舍吏胥視民為俎豆執鞭者衆羊失其牧嵗嵗仍飢饉夜有枹鼓不治聲聞京師元豐六年春詔用夀春魏侯魏侯有冢法以吏能名一世至則引見官吏問救敞所先下書教民諭以苦語奬拔才能昭勸不勉戒敕宿負聽以功除按行州左右曹三獄纍械至三百餘決其得情引慝釋其點染攀牽唯上請須報逺逮證左與繫輕而捕重者乃付有司其所裁遣蓋去三分之二人氣以和下車之十二日芝草二本産於州院獄門之東其後得一本於郡齋便坐之室而最盛於西峯僧舍之秀野亭一月之間凡産芝二十餘磊落權竒人物象成最後寺僧來獻黃芝異本同穎黃者慶色異本同穎者不爭之祥今郡侯樂士愛民天澤優渥五穀順成鈔盜其將衰息健訟之民且化為慈祥弟友魏侯亦將鴻漸於臺省以受福民之慶則靈芝之生不獨為吉瑞魏侯因改秀野亭以為三秀屬豫章黃庭堅記之魏侯名綸字君俞其嵗之六月甲戍記尺牘增宋蘇軾與鞠持正尺牘文登雖稍逺百事可樂島中出一藥名白石芝者香味初若嚼茶久之甚美聞甚益人不可不白公知也白石芝狀如石耳而有香味惟此為辨祕之祕之題跋增宋陳傅良跋陳籛芝草圖頃桂陽廨中柱去礎三四尺所出芝一本婦子不以為祥掇視余蓋恍然歎芝不遇也眀日故枿復吐三葉紫質黃緣飾見之竒甚但令婦子輩謹視母掇取逾時色爛然不敗今覩陳君繪芝為卷有內相李公宗伯倪公序且頌其所自來不虛得又追歎曩所産芝非特婦子不好事雖豫亦不好事也周必大書安福劉德禮家紫芝詩卷昔安福令歐陽萬五世孫彬實文忠公之曽祖厯仕南京家於安福性至孝兄弟相友愛有紫芝一莖兩葩生於楹鄉人以為孝德所感著為賦頌享年九十四纍贈太師中書令後裔仕宦不絶雜著增宋蔡襄芝草述福州連江縣寧善鄉崇德里保福院産芝一本四月八日癸未令朱定得之詣府質黑而堅葉如側荷其上又出一本離為六莖枝柯聳密中有連理末如燕尾而朱涅之髙可尺許世傳古篆芝字皆枝葉扶疏豈古人象形而作乎而漢齋房歌曰九莖連葉玄氣之精正謂玄芝而有九莖與葉連也芝之為物在處有之大較形類苗檽音軟近無是比儻或有焉而豫未之見也故特書之贊原魏繆襲神芝贊青龍元年神芝産於長平之習陽其色丹紫其質光耀其長尺有八寸五分其本圍三寸有三分上别為三幹分為九枝散為二十六莖圍則一寸九分葉徑二寸七分其幹洪纖連屬有似珊瑚之形其吐柯載葉祥眀蠲潔考圖案牒蓋美乎所聞於前代者矣增無名氏神芝贊古瑞命紀曰王者慈仁則芝生採食之則延年與真人同又神農氏論芝云山川雲雨五行四時隂陽晝夜之精以生五色神芝皆為聖王休祥焉自漢孝武顯宗世號隆盛而元封永平所紀神芝方斯蔑如也且其枝幹條莖本末相承乃協乎天官之數非神眀其孰為此哉推其類象則蓂莢之植階庭萐蒲之生庖厨視匹靈矣乃詔御府匱而藏之且畫其形遂以名圖為之贊曰帝德允臻爰不難致煌煌神芝吐葩揚榮曩披其圖今握其形永章遐紀載之頌聲賦增唐史近漢武帝齋宮産靈芝賦武皇帝慕軒后之風儲思幽通叶珍符於瑞牒産靈芝於齋宫太乙清精元君降衷色奪兼金發靈姿以溫潤質逾美玉浮真氣以蔥蘢原夫帝在華帳儼於仙仗睿思邈以沖寂神心窅其相向髣佛受釐肅其冥貺非煦育之所致乃精神之潛暢挺兹三秀表信乎三元之符擢此九莖示期爾九坻之上異屈軼之致用類朱英之為狀足表天感與地生或揚臣和而君唱是知至精潛運神物昭彰靈液潛通願生乎枯木貞石神心幽贊故出此閟殿神房冠庶草以為貴故有時而發祥信稟質以津澤非本媚乎馨香豈比夫楚水之空嘉萍實仙宫之獨貴玄霜懿夫道心虛淡我則無味以玄感化象貴形我乃無根而效靈是用拔竒瑶砌標異彤庭紫蓋與祥雲允合朱莖將火德相冥秀射猗蘭之室光連雲母之屏煥國典而永昭歌頌徹玄風而丕耀德馨彼丹甑呈豐器車表德潛美巖野挺芳幽側曷比夫耀甲乙之帳赫矣朱榮結天地之精混然剛克異朝菌之為體同夜光之非飾含聖澤以成春體正陽而變色是知人心告虔珍物效焉將會昌於羣帝必功格於上玄且神之符則受此靈草神之會則降彼真仙茍獲符而為約與降質而相懸大寶在乎皇極真居本乎丹田茍溺異以趨怪顧汨沒而表年彼乘嶠而求靜此執迷而徵聖徒有托於齋祈信無裨於性命覩芝宫兮緬爾倐隙駟以奔競庶歸玄化之門小彼炎皇之慶宋王令藏芝賦有序丙申嵗自四月至六月大雨而余之所客天長縣東北皆瀕湖澤地浸以下頗以水為患傷草木多死邑居無薪芻而益貴薪益來自逺以余之所居則薪之自北來者常售於余間而有得若枯華斷穎根梗蒂芥支離擁腫與碩實所異於常草者皆取以戲就其中嘗試視之余得則芝也折傷不完計之於全此當一葉耳不知其他安在也其生雖不知逺近要皆在縣之北以常負薪之所來則芝從可知也示人則不齊有由是而知有芝有由是而信為芝有雖得是而弗之信者然芝之為物不常有而或出可愛者也自古詩之作見於今者凡三百篇其以風賦比興而附見於物若蘋蘩薇蕨荇苞苦藿荑唐葍蓫瓠匏瓜葛鬱薁葵藚葑芹藻莫茅荼蕳苓蓬莠蘋蒿萇蒲萑葦葭菼蕭艾稂荍蓍芑禾麻菽麥黍稷豆菽秬秠穈粟稻梁菅苧卷耳芣苡菁莪莠葽荷華遊龍茹藘芍藥之類雜見並出然此特草耳其多蓋如此而未嘗及芝也自詩而下長辭章而善自托者獨有屈原今其離騷九歌具存而可考然其况意所及自詩人所紀之外復益以江蘺芙蓉杜若薜荔木蘭白蘋災荑揭車蕙芷茝菊芰蘅薋菉葹蕪藥蓀而地所常産目所同識之草盡矣若夫陳忠而直私忿廢而怨逐託於彼而取此以見義此則余之所知至於道則余不得而一也然稱類已衆而芝復獨遺是誠何故邪説者遂以九歌之三秀為芝余以其不眀又其辭曰適山而採之則芝非獨山草蓋未足據信也及觀漢樂歌蓋當時文工槧人緣飾世治以裁主意耳非有如詩人騷客鬱於中而不得言憑於物而後見者皆非余所好也今余得芝而賦之意皆在於賦序故不道也庭勾突萌抽蔚擢秀孰非春兮坯培壅堙播溉軋蒔孰非人兮不為常生時見挺出芝則神兮靈幹不阿衆葉類附不孤有鄰兮生莫時期育無種裔天生德兮芣苡薦庭􅐘蕪薦道退野即兮生無本根拔不滯茹無吝惜兮榮而不華稿而不枯莫損益兮茨萊翳隂髙出下蔽適以取容兮朝菌射干齊長並秀德不校同兮荒原穢壤棄放委廢若將終兮知者謂誰何為來者似不必逢兮困於不知束於薪蘇自信不恥兮摧戕折傷披本斷幹禍不自已兮火炎木焚投置不縮知命有止兮偶於自生不祈見聞吾與爾已兮薛士隆靈芝賦宋興二百有三年封陲載寧狼烽不驚上乃髙揖凝旒棲神泰清天之與子法舜承堯祗載蘷蘷齋栗以朝帝被衮章舁䇿寶列旄麾羅羽葆太師輔前少師保後工瞽登歌奉常贊道有覺彤庭皇拜稽首上天子之父號曰光堯夀聖太上皇帝母曰夀聖太上皇后宮維德夀康夀其堂色養無違儀刑四方二聖相歡用惟其至仰孝俯慈假天準地二氣之精百物之英誕秀靈草乘時挺生隆興惟甲申嵗之陽羲皇御寅斗直東方有茁者芝有粲其房不植不根於殿之梁輪囷扶疏馨香有飶紫色芬蒕交光曄日歘騰龍而翥鳳追金相而玉質煥耀宸居清眀帝闥閲之者神驚瞻之者目奪一本同柯支生十二錯地分州蟠天列次瞻彼日月膺期嗣嵗亦有律呂八音以諧仙館玉樓光於泰階皇帝乃命東觀啓鑰書披瑞命之篇參瑞應之圖驗通儒於白虎稽神契於孝經僉曰王者孝慈則芝茂又曰養老則芝生深仁是加於草木祥應是接於仙靈故肅宗養親而産延英之座孝武嚴帝而秀甘泉之庭於是聖心恱懌稱賀喧譁皇上賦玉華之詩太上發芝房之歌君臣動色室家胥慶被之於服章聲之於謳詠蛋獠以之輸琛海波以之愈靜戴白之叟成黃之兒爰及閨房笑語嬉嬉自慶未始識也若豈天降而人為哉粵有狂生小子樂稱古德喜溢於顔憂形於色謂和氣致祥允天子之慈孝天施地産誠聖人之達德也乃若漢之宣章號稱七制仁民得天休符接至桓靈何道而産中黃之藏有芝英之瑞也由是言之妖祥叵測爾雅離騷乃尋乃繹乃列芝蘭乃識菌芝或云産於嵒阿采於山而有之蓋希出堂殿髙華之所有沾濡鬱結而為曽胡多之可尚青龍之際乃一柯而三十有六支此何敞所稱生庭之怪草崔光以謂蒸氣而生之也乃其竒祥有取蔑聞往古方士多岐有傳漢武逮乎季末諛辭麕至鬼目呈符菌宮賀瑞豈黃精鉤吻有時而亂亦雞蘇豨苓有時而帝也於惟我后秉文之德昊天景貺三辰耀色雖無此芝何損於治生禁之庭亦孔之異此不可不察者誠何足以當上意也悵天居之髙逺羌欲告而誰言聊陳辭而寫志庶有發於塵編亂曰靈芝秀兮爍宮庭春秋易色兮隨月而生神父慈兮君至孝貺珍符兮天之云告我欲排閶闔兮雲路迢遙物怪司閽兮翅折之招爰攄懷兮作賦儻六丁兮下來持去文賦散句增楚屈原九歌採三秀於山間漢東方朔七諌拔搴玄芝兮列樹芋荷王褒九懷北飲兮飛泉南采兮芝英馮衍顯志賦飲六醴之清液食五芝之茂英張衡西京賦浸石菌於重涯濯靈芝以朱柯東京賦芝房菌蠢生其隈思元賦聘王母於銀臺兮羞玉芝以療飢魏曹植九詠尋湘漢之長流採芳岸之靈芝晉何晏景福殿賦靈芝生於邱園孫綽遊天台山賦五芝含氣而晨敷古歌樂章原漢四皓紫芝歌莫莫髙山深谷逶迤曄曄紫芝可以療飢唐虞世遠吾將何歸駟馬髙蓋其憂甚大富貴之畏人兮不如貧賤之肆志增漢書郊祀歌齋房産草九莖連葉宮童效異披圖案牒玄氣之精回復此都蔓蔓日茂芝成靈華班固郊祀靈芝歌因露寢兮産靈芝象三德兮瑞應圖延夀命兮光此都配上帝兮象太微參日月兮揚光輝宋史上尊號樂章曄曄靈芝生於殿闈照映華栱紛敷玉㽔感召元和光符聖期祥篇協吉百嵗咸宜朝會樂章嘉瑞降臨應我皇德曄曄神芝不根而植春秋三秀晝夜一色物播詩歌聲被金石彼茁者芝茂英煌煌敷秀喬嶽實繁其房適符修貢封巒允臧永言登薦抑惟舊章煌煌茂英不根而生蒲茸奪色銅池著名晨敷表異三秀分榮書於瑞典光我文眀五言古詩增梁庾肩吾芝草踟蹰玩芝草淹留攀桂叢桂叢方偃蹇芝葉正玲瓏如龍復如馬成闕復成宮黃金九華發紫蓋六英通隱士蒼山北神仙海穴東隨丹聊變水獨搖不須風宋梅堯臣讀吳季野芝草篇阮生存詠懷美彼曜朱堂一榮不復枯五色異衆芳衆芳發朝露俄以斂夕陽丹莖起瓦礫又匪媚棟梁此稟由至和君子要有常七言古詩原宋蘇軾石芝并引元豐三年五月十一日夜夢遊何人家開堂西門有小園古井井上皆蒼石石上生紫藤如龍蛇枝葉如赤箭主人言此石芝也豫率爾折食一枝衆皆驚笑其味如雞蘇而甘眀日作此詩空堂明月清且新幽人睡息來初勻了然非夢亦非覺有人夜呼祁孔賔披衣相從到何許朱闌碧井開瓊户忽驚石上堆龍蛇玉芝紫筍生無數鏘然敲折青珊瑚味如蜜藕和雞蘇主人相顧一撫掌滿堂坐客皆盧胡亦知洞府嘲輕脫終勝嵇康羡王烈神山一合五百年風吹石髓堅如鐵增蘇軾石芝并引豫昔夢食石芝作詩記之今乃真得石芝於海上子由和前詩見寄豫頃在京師有鑿井得如小兒手以獻者臂指皆具膚理若生豫聞之隱者此肉芝也與子由烹而食之追記其事復次前韻土中一掌嬰兒新爪指良具肌骨勻見之怖走誰敢食天賜我爾不及賔旌陽逺遊同一許長史玉斧皆門戶我家韋布三百年祗有隂功不知數跪陳八簋加六瑚化人視之真塊蘇肉芝烹熟石芝老笑唾熊掌嚬雕胡老蠶作繭何時脫夢想至人空激烈古來大藥不可求真契當如磁石鐵蘇轍次韻石芝并引子瞻昔在黃州夢食石芝起賦八韻記之元祐八年豫與子瞻皆在京師客有至自登州者言海上諸島石向日者多生耳海人謂之石芝食之味如茶久而益甘海上幽人或取服之言甚益人客以一籃遺子瞻遂次前韻雞鳴東海朝日新光蒙洲島霧雨勻一晞石上遍生耳幽子自食無來賓寄書乞取久未許箬籠蕉囊海神戶一掬誰令墮我前無為知我超諸數此身不願清廟瑚但願歸去隨樵蘇龜龍百嵗豈知道養氣千息存其胡塵中學仙定難脫夢裏食芝空酷烈中山軍府得安間更試朝霞磨鏡鐵陸遊丹芝行劒山峩峩插穹蒼千林萬谷嶓其陽大丹九轉古所藏靈芝三秀夜吐光如火非火森有芒朝陽欲升尚煌煌何由斸取換肝腸往駕素虬朝紫皇五言律詩增唐李義府宣正殿芝草眀王敦孝感寶殿秀靈芝色帶朝陽淨光涵雨露滋且標宣德重更引國恩施聖祚今無限微臣樂未移七言律詩增宋蘇轍邵武遊氏老人三清堂紫芝黑龜赤鳳早逢師白髮蒼顔老不衰丹鼎一丸深自祕紫芝三葉却先知煙薰晴日雲容薄色凝秋霜玉性竒何日刀圭救羸病盡芟荆棘種交梨張孝祥廟錫珍符豈偶然雲華再見幾經年詳開二室昭詔燕根托同楹自屬聨上瑞應誠難紹聖宸衷思孝益增虔微臣願考皇天意不厭終童效異篇煌煌瑞彩映金鋪元氣回旋即此都太史連年書盛事近臣更日獻新圖璇穹薦祉寧虛應玉葉流芳已兆符早晚清塵欵原廟臨觀敢請駐前驅原眀王世貞數盡潘園賦衆芳何如神草被昆岡庭中玉露傳三秀木末丹霞散九光出共萐蒲昭聖瑞歸同天韭作仙糧野夫亦有黃公癖地肺何年許並藏七言絶句增宋眺補之舊説廬山有紫芝田百畝人莫得見偶於開光棲賢林中步兩日各得一枝正紫如玉戲成一首千古芝田人不到深林繼日拾瓊瑰從今為記眺夫子曾到芝田百畝來陸遊齋中雜題幽居厭見凡花草紅紫紛紛不復栽自斸蒼苔換黃土南山移得玉芝來玉隆得丹芝何用金丹九轉成手持芝草已身輕祥雲平地擁笙鶴便自西山朝玉京館中營繕方一新而右文殿生芝草甚異丹碧參差盛一時殿楹三秀見金芝漢庭漫道多才傑天馬何勞作頌詩詩散句增魏曹植靈芝生王地朱草被洛濵榮華相晃耀光采曄若神原晉嵇康煌煌靈芝一年三秀增張華西入華隂山求得神芝草原唐杜甫空聞紫芝歌不見杏壇丈但使芝蘭秀何須棟宇鄰知名未足稱局促髙山芝其陽産靈芝其隂宿牛斗吾慕漢初老時清猶茹芝增宋王圭柯同庭柏徑色近御衣深夏竦四眀開奧壤三秀發靈芝黃庭堅不須許斧子辛勤採五芝汪藻齋房輝玉斚岱檢雜金泥菌蠢朝承露熒煌夜吐霓唐李白身騎白鹿得飄颻手翳紫芝笑披拂原杜甫知君此計誠長往芝草琅玕日應長李紳靈根盤錯呈天瑞寶葉蟬聫表地祥增宋黃庭堅卓仙在時養瓊芝深根固蒂活人命陸遊不用采芝驚世俗恐人謗道是神仙魏阮籍芝英耀朱堂晉庾闡層霄映紫芝齊王融五芝多秀色周庾信芝房脆似蓮青泥美熟芝唐孟浩然采秀弄芝草杜甫靈秀冠衆芳張籍分采紫芝苗李商隱紫見地仙芝皮日休盡日嗅金芝宋楊億芝苗晝茹肥梅堯臣芝以保萬夀蘇軾黃公獻紫芝金元好問紫芝僅碗掬魏曹植東上蓬萊采靈芝唐曹唐洞中天地足金芝宋蘇軾枯朽猶能出菌芝元倪瓚赤城霞暖神芝秀别録增抱朴子凡求芝草入名山必以三月九月乃山開出神藥之月必以三輔時出三竒吉門到山須六隂之日眀堂之時帶靈寶符牽白犬抱白雞包白鹽一斗及開山符檄著大石上執吳堂草一把入山山神喜必得見芝須禹步往來采以王相專和支干相生之日刻以骨刀隂乾為末服乃有功效若不致精久齋行穢德薄又不曉入山之術雖得其圗鬼神不以與人終不可得見也冥通記九莖紫菌琅葛芝一斤丹朱玉漿二斗右二物細切芝竟仍以玉漿一斗漬之一宿埋隂垣之陽去垣三寸入土一尺以白瓦器容四斗許盛仍以瓦盤蓋之蠟蜜封之上土令厚二寸以今日午時埋至眀日午時出之持之南行取已所住戶十二步乃置眠床頭按上至眀日午時又以銅器盛煎之令火齊器底勿令火焰出器邊也得三沸見又內玉漿一斗又加火交二十九日見保命云勿犯霧露天台山記峭壁下一石如黑靈芝莖細而房大可愛原花史靈芝仙品也山中采歸以籮盛置飯甑上蒸熟曬乾藏之不壞用錫作管套根插水瓶中伴以竹葉吉祥草則根不朽上盆亦用此法御定佩文齋廣羣芳譜卷八十七
