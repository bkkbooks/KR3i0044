body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十八卉譜蓍原蓍神草也能知吉凶蘇頌云上蔡縣白龜祠旁其生如蒿作叢高五六尺一本一二十莖至多者五十莖生便條直秋後有花出於枝端紅紫色形如菊花結實如艾實增説文蓍蒿屬生千歲三百莖易以為數陸璣詩疏蓍似籟蕭青色科生論衡蓍草七十年生一莖神靈之物故生遲也原史記龜䇿傳云蓍生滿百莖者其下必有神龜守之其上常有青雲覆之易曰聖人幽贊於神明而生蓍又曰蓍之德圎而神天子蓍長九尺諸侯七尺大夫五尺士三尺傳曰天下和平王道得而蓍莖長丈其叢生滿百莖方今取八十莖已上者難得人民好用卦者取滿六十莖已上長滿六尺者即可用博物志云以末大於本為主次蒿次荆皆以月望浴之然則揲卦無蓍亦可以荆蒿代其實苦酸平無毒益氣充肌聰耳明目久服不飢輕身前知彚考增易繫辭探賾索隱鈎深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜詩曹風冽彼下泉浸彼苞蓍左傳蓍短龜長不如從長史記龜䇿列傳能得百莖蓍并得其下龜以卜者百言百當足以決吉凶洪範五行傳蓍之言為耆也百年一本生百莖此草木之夀亦知吉凶者聖人以問鬼神列仙傳老萊子蓍艾為席玉女潭記靈蓍臺臺方三十尺有竒始築臺而蓍生也集藻賦增晉傅玄蓍賦春邁衡德於青陽混百卉而萌生逮朱夏而修茂暨商秋而堅貞雖離霜而未凋與潛龜乎通靈於是原極以道握形以度以類萬物之情以通天下之故豈惟終始於事業乃參天而倚數棄原野之蕭條升雲階而內御運兹莖於掌握爻象形而星布信鈎深而致逺實開物而成務唐康子玉神蓍賦神蓍之用兮誠稟靈於自然惟神也適變之義至惟用也極數之理全鈎深孰云乎筮短藏密彌彰於德圎再三則蒙捨我而懼瀆五十以學由我而樂天揲之而雖隱必索保之而其靜愈專易之重者胡可比焉原夫質稟精純叢分薆薱覆青雲以表竒伏元龜而克配佐爾筮之貞吉觀我生之進退知微知彰而可期何思何慮而或昧於是命彼筮人擇乎上春韞之而必致其用揲之而爰動其神感以洗心遂通端䇿之志執之指掌空嗤握䇿之倫禮事其儀易贊其妙探彼幽賾觀其祕要皆多假爾之能必叶窮神之照將欲觀貞諒無與京乾道變化而悟神明幽贊而生原始要終思盡性於大衍知來數往翼明彖於小成非我無以昭效法之道非我無以稽作易之情於以致百慮於以類萬物象四時四十九數而有常推三才三百六旬而不拂惟蓍之用惟神是聽運不窮而或變通其志而遂寧且提攜而成列有感應而協靈滋而後數布之而可辨生而成象審之而必形何一卉之時育配十朋之天縱恥紅蘭之見鋤鄙白茅之藉用則知夫蓍之可貴也庶類安能而共之哉賦散句增齊卞伯玉蓍賦終風掃於暮節霜露交於杪秋有萋萋之緑薺方滋繁於中丘五言古詩增梁范筠詠蓍數竒不可偶性直誰能紆禎蔡伏靈異祥雲降溫腴附録荓增爾雅荓馬帚疏荓草似蓍今俗謂蓍荓可以為掃彗故一名馬帚蓂莢增帝王世紀堯時有草莢生庭每月朔生一莢至月半則生十五莢至十六日後日落一莢至月晦而盡若月小餘一莢王者以是占歷惟盛德之君應和氣而生以為堯瑞名曰蓂莢一名歷莢一名瑞草又曰仙茆彚考增竹書舜即帝位蓂莢生於階白虎通德至地則蓂莢起日歷得其分度則蓂莢生於階間抱朴子軒皇候鳯鳴以調律唐堯觀蓂莢以知月集藻賦增唐程諫蓂莢賦堯階蓂莢兮實稱休禎蓋歷代而難值至我后而斯呈植之以前墀左墄映之而鏤檻丹楹激薰風而葉轉迎太陽而心傾日往月來深符大小之數時和歷應因見天地之情觀乎榮謝以月德為常卷舒以日數成類隨初吉以增茂暄然自春度既望以漸零翛然如寄體盈虛而方同得道任消息而匪殊有智金波桂樹遠合象於凋榮炎漢芝房近方慚於祥瑞彼朱草與萐莆曷於兹而擬議則知聖作物覩物興由聖聖於赫而克著元亨物效祥而天莫之令然而蓂之為應也博蓂之為瑞也昭贊睿主則太平在邇測隂靈則時變不遙初也則日益一日終也則宵盡一宵弱質浹金莖之露輕姿散玉户之飈或曰麟在郊而合圖諜鳯來儀以聽簫韶雖咸見而可貴於列迹而斯超豈如蒙賁著叢集於厚地焜耀於皇朝吕諲蓂莢賦聖人法天兮無物不成皇天輔聖兮有貺必呈蓂莢之嘉瑞爰乃應乎休禎稟神靈以擢質因堯階而得名抽莖䔿䔿布葉英英二八而落三五而盈隂德自然仰蟾蜍而知晦太陽常近與葵藿而同傾爾乃丕體其祥博考其義所以厚上天之德所以表皇王之瑞其國衰也則植之猶難其國理也則生之孔易惟我后之欽若亦合符而受賜承榮金殿旁沾三露之滋每奉玉階上蔭五雲之施豈無萱草以悅其性豈無靈芝以彰其盛芝擢其秀既以紛綸於策書萱樹於堂曷能彌縫於明聖未若蓂莢生於皇朝與夫髦士來應弓招受成於天諒多聞於國瑞託其得地且有異於山苖竊預談於皇道庶有望於遷喬賦散句增漢張衡東京賦蓋蓂莢為難蒔也故曠世而不覩惟我后能殖之以至和平方將數諸朝階五言排律增唐元稹賦得數蓂將課司天歷先觀近砌蓂一旬開應月五日數從星桂滿叢初合蟾虧影漸零辨時長有素數閏或餘青墜葉推前事新芽察未形堯年始今歲方欲瑞千齡詩散句增梁庾肩吾蓂枝發早叢唐宋之問節晦蓂全落蘇頲七葉仙蓂依月吐華平平一作蘋增宋書符瑞志華平其枝正平王者有德則生德剛則仰德弱則低孝經援神契王者德至於地則華蘋感白虎通華蘋者其枝平王者政令均則生彚考增宋書符瑞志漢章帝元和中華平生郡國萐莆增宋書符瑞志萐莆一名倚扇狀如蓬大枝葉小根根如絲轉而成風殺蠅説文萐莆瑞草也白虎通孝道至則萐莆生其葉大於門扇不搖自扇於飲食清涼助供養也彚考增帝王世紀堯時厨中自生肉脯薄如翣形搖鼓則生風使食物寒而不臰名曰翣朱草增宋書符瑞志朱草草之精也世有聖人之德則生大戴禮朱草日生一葉至十五日生十五葉十六日一葉落終而復始禮斗威儀君乘木而王其政升平則福草生郊福草朱草别名白虎通德至草木朱草生朱草赤草也可以染絳别尊卑也博物志和氣相感則生朱草尚書故實朱草瑞草也長三尺枝葉皆赤莖如珊瑚文命咸得俊乂在官則朱草生郊彚考增宋書符瑞志漢光武建武元年五月京師有赤草生水涯漢章帝元和中朱草生郡國魏文帝初朱草生文昌殿側宋文帝元嘉十一年朱草生蜀郡郫縣王之家拾遺記炎帝教民耒耜百穀滋阜朱草滋於階集藻賦增唐韋模當朱草合朔賦縣官執大法闡大猷道惟行遠化必通幽彼朱草以合朔示皇天之降休月始而生用資乎隂隲月虧而落事契夫冥搜其於作候靡或不由乃知天罔私親神惟輔德茍明智之有務必冥報而無忒或産水涯或生巖側布赤葉之蒨練挺朱柯之翕赩既周復而莫窮與乾坤而不極誰究其義吾知其為美一人之化洽俾萬國而澤被由是節候不疑生榮以時依天聽以叶祉順月魄以呈姿朔告合焉表皇化之無異草名朱也比丹心兮自持較瑞不慚於蓂莢稱珍豈讓夫靈芝觀其光彩妍媚文理密緻資亭毒以榮落泄神祗之奧祕三五之前逐蟾光以潛長二八之後與桂華而暗墜非權量之能侔將漏刻而齊致其氣芬芳其色焜煌聖帝攸感靈仙是常何纎芥之微物遇休明而效祥諒君恩之克播致天意之溥將可以同覩日月共貫隂陽豈止漬玄醴變金漿而已哉懿夫分莖灼爍擢頴超遙候朔自呈詎比夫偶陽而動既望斯殞寧同乎見睍曰消幽玄不測神化孔昭自然澤浸有截化行無外三光並明兩儀交泰於靈草以配歷冠古今而為大賦散句增漢張衡東京賦豐朱草於中庭屈軼增博物志堯時有屈軼草生於庭佞人入朝則屈而指之一名指佞草集藻賦增唐梁肅指佞草賦聖澤濡煦兮動植斯形相彼瑞草兮逢時效靈體嘉生於浩氣秉植道於彤庭昔在堯帝至化惟馨伊屈軼之芳貞協王猷與國經有皇睿后德動杳冥二氣暢而羣生遂百祥來而萬宇寧矧夫佞者小人之道直者為國之寶雖糾正於邦憲實發明於瑞草象恭言偽於是焉去而勿疑葉布莖分何患乎辨之不早若乃一人當寧超黃越虞百辟來朝日臨雲趨風力論道伊咎陳謨嘉草在前疇敢以諛故曰物生於有有生於無感此變化發為禎符不然彼植物之何知乃同功於帝俞天道不言聖人無心寓形闡教其用則深禾頴降於周王芝房發於漢后信呈豐兮告慶并垂美於不朽彼直指以去邪諒於功乎何有我明主所以超三英之躅彼靈草所以為百瑞之首有由然也史魚守直宣父惡佞佞直不分邦家靡定惟草所指惟皇所聽指歸乎一聽戒乎失茍君道之不𢎞徒倚瑞以自必重曰曄彼草兮直而指佞聖之瑞兮時之理頌皇休兮無極已沈封指佞草賦伊嘉卉兮昔生軒庭蓋歷代而莫觀其狀至我后而方覩其形對右平與左墄間朱草與彤庭薰風晝灑湛露宵零所以彰吾君之睿聖所以表吾君之德馨非然何以於昭其異有赫厥靈根莖竦擢枝葉靜好惡夫佞允叶乎聖心作乎祥特異於靈草況今勤施五至克奉三無多忠良之士絶讒佞之夫非斯草之助化何以臻於此乎指佞之為德也廣指佞之為瑞也深逢聖斯生介一人之景福有佞必指俾百寮而革心故能殊衆芳之質標羣瑞之首彼獬豸之觸邪抵罪在法則嚴伊平露之傾葉知方於人何有孰若我應明聖指邪佞昔者輔德告軒后之功成今也呈祥贊吾君之理定一名屈軼千載挺出有佞則指孰云無必豈比夫萐莆空扇於堯厨芝房徒歌於漢室哉足以彰致理薦嘉祉君子在位我則恭默以傾心佞人入朝我則無私以直指信可以美芳聲於雅頌垂不朽於國史鄭轅指佞草賦旒扆肅誠天地降靈藎臣咸造屈軼生庭翠影如植皇心以寧暑屏寒生感萐莆之代謝日來月往異蓂莢之飄零舄奕玄造誕生厥草表忠蹇之不遲懼壬佞之何早宵承湛露密葉如傾晝偃薰風纎莖若掃猗那且都歌詠難模其生也則一其道也乃殊育於軒庭其指或有生於聖代其用則無是靈草之無心以聖人之為心對危行而不侮覿巧言而則侵榮乎砌隂實為龜為鏡肅我皇度式如玉如金冠卉之首綿代曠有茅三脊之可封芝九莖而延夀曷若兹草之盛莫之與並類貂蟬之性潔均獬豸之質徑得詩人之無邪行孔門之逺佞於鑠屈軼邈乎迥出遇唐復生應時作實經百王而影戢歷千祀而宥密如執法之無回奉直道而自必所以野退宵人朝多髦士同魚水之合契絶螮蝀之莫指封思齊於大夫名可比於君子謝有香之蘭蓀惡無言之桃李七言律詩增明申時行堯階屈軼應制聖朝已自登元愷靈卉還能指佞臣自是乾坤扶正氣儼如殿陛立端人觸邪似與神羊並就日常依歷草新倘使漢庭長借爾何須請劔更埋輪延嘉增瑞應圖延嘉王者有德則見王孝道行則延嘉生紫達增瑞應圖紫達王者仁義行則常見吉祥草原吉祥草叢生不拘水土石上俱可種色長青莖柔葉青緑色花紫蓓結小紅子然不易開花候雨過分其根種於隂崖處即活惟得水為佳亦可登盆用以伴孤石靈芝清雅之甚堪作書忩佳玩或云花開則有赦一云花開則家有喜慶事人以其名佳多喜種之或云吉祥草蒼翠若建蘭不藉土而自活涉冬不枯杭人多植瓷盎置几案間今以土栽有岐枝者非是集藻賦增元任士林吉祥草賦并序吉祥草酷似蘭而疏秀海國有其種率云十歲一花然鮮有見者余過僧智傳之室見一本紫莖而花莖才二寸綴花數十似瑞香而斂小近玩之有香氣傳且謂余曰種且十五年矣今才一開感係之餘賦以自廣眷靈姿之幽絶蔓天竺之化城挺纎疏之竒植負吉祥之嘉名孰化滋於下土亶見擢於衲僧方其根移露本盆壅春膏擬紫莖之逞瑞伉蘭蕙於亭臯然而朝培夕溉十有五期春風秋露日以披滋卒深韜而重發何堅忍而舒遲諒得天之獨厚不驟悅於時宜候半世之力深乃舒英而揚暉噫嘻江路微暖野梅漏枝駘蕩未透宫楊綰絲木俟夏而叢緑葉迎秋而飄飛含英之本麗土之支孰不聽造化之鼓舞候氣母之推移肯耐靜於寒暑不跂榮於既萎噫嘻寧越之學請三十年文公之伯十九載而迍邅彼長沙之誼乏寧志於初歲玉樓之賀無靜心於早慧一發泄而輒衰萬不成而敗繼余嘗感人事於河清之期悟城非於鶴歸之世三竊桃而人未知年屢變海而悵其東逝蹇美草之感余起余衷之繆計尚深根以需榮儻來時之未艾諒就木之歎婦又安能訪此花之開閉菖蒲原一名昌陽一名昌歜一名堯韭一名蓀一名水劔草有數種生於池澤蒲葉肥根高二三尺者泥蒲也名白菖生於溪澗蒲葉瘦根髙二三尺者水蒲也名溪蓀生於水石之間葉有劔脊瘦根密節髙尺餘者石菖蒲也養以沙石愈翦愈細髙四五寸葉茸如韭者亦石菖蒲也又有根長二三分葉長寸許置之几案用供清賞者錢蒲也服食入藥石蒲為上餘皆不堪此草新舊相代冬夏長青羅浮山記言山中菖蒲一寸二十節本草載石菖蒲一寸九節者良味辛溫無毒開心補五臟明耳目久服可以烏鬚髮輕身延年經曰菖蒲九節仙家所珍孝經援神契曰菖蒲益聰生石磧者祁寒盛暑凝之以層冰暴之以烈日衆卉枯瘁方且鬱然叢茂是宜服之却老若生下濕之地暑則根虛秋則葉萎與蒲柳何異烏得益人哉種類有虎鬚蒲燈前置一盆可收燈煙不薰眼泉州者不可多備蘇州者種類極粗蓋菖蒲本性見土則粗見石則細蘇州多植土中但取其易活耳法當於四月初旬收緝幾許不論粗細用竹翦淨翦堅瓦敲屑篩去粗頭淘去細垢密密種實深水蓄之不令見日半月後長成粗葉修去秋初再翦一番斯漸纎細至年深月久盤根錯節無塵埃油膩相染無日色相干則自然稠密自然細短或曰四月十四菖蒲生日修翦根葉無踰此時宜積梅水漸滋養之又有龍錢蒲此種盤旋可愛且變化無窮缺水亦活夏初取橫雲山沙土揀去大塊以淘淨粗者先盛半盆取其泄水細者蓋面與盆口相平大窠一可分十小窠一可分二三取圎滿而差大者作主餘則視盆大小旋繞明植大率第一回不過五窠六窠二回倍一三回倍二斯齊整可觀經雨後其根大露以沙再壅之只須置隂處朝夕微微灑水自然榮茂不必盛水養之一月後便成美觀一年後盆無餘地二年儘可分植矣藏法與虎鬚蒲略同此外又有香苗劔脊金錢牛頂臺蒲皆品之佳者常謂化工造物種類殊途靡不藉陽春而發育賴地脈以化生乘景序之推移而榮枯遞變均未足擬卓然自立之君子也乃若石菖蒲之為物不假日色不資寸土不計春秋愈久則愈密愈瘠則愈細可以適情可以養性書齋左右一有此君便覺清趣瀟灑烏可以常品目之哉他如水蒲雖可供葅香蒲雖可採黃均無當於服食視石蒲不啻徑庭矣格物總論菖蒲花水中叢生根長四五尺多節葉長如劒樣二月結花花黃長二三寸粟穗相似但小耳彚考增周禮天官朝事之豆其實昌本麋臡注昌本昌蒲根切之四寸為葅左傳王使周公閲來聘饗有昌歜注昌歜昌蒲葅梁書太祖張皇后傳初后嘗於室內忽見庭前菖蒲生花光彩照灼非世中所有后驚視謂侍者曰汝見不對曰不見后曰嘗聞見者當富貴因遽取吞之是月産高祖原南齊書五行志永元中御刀黃文濟家齋前種菖蒲忽生花光影照壁成五彩其兒見之餘人不見也吕氏春秋冬至後五旬七日菖生菖者百草之先生也於是始耕增吕氏春秋文王嗜菖蒲葅孔子聞而服之縮頞而食之三年然後勝之淮南子昌羊去蚤虱而來蛉窮高誘注昌羊菖蒲三輔黃圖漢武帝元鼎六年破南越起扶荔宫以植所得竒草異木有菖蒲百本春秋運斗樞玉衡星散為菖蒲遠雅頌著倡優則玉衡不明菖蒲冠環風俗通菖蒲放花人得食之長年原典術堯時天降精於庭為韭感百隂為菖蒲神仙傳漢武上嵩山夜忽見有仙人長二丈耳出頭巔垂下至肩禮而問之仙人曰吾九疑之神也聞中嶽石上菖蒲一寸九節可以服之長生故來採耳忽然失神人所在帝顧侍臣曰彼非復學道服食者必中嶽之神以喻朕耳為之採菖蒲服之經二年帝覺悶不快遂止時從官多服然莫能持久惟王興聞仙人教武帝服菖蒲乃採服之不息遂得長生增抱朴子菖蒲石上生一寸九節已上紫花者尤善韓終服之十三年身生毛目視書萬言皆誦之冬袒不寒南方草木狀番禺東有澗生菖蒲皆一寸九節安期生採服仙去但留玉舄焉後魏典略孝文帝南巡至新野臨潭水而見菖蒲花乃歌曰兩菖蒲新野樂遂為建兩菖蒲寺以美之番禺雜記菖蒲澗昔刺史陸胤之所開也至今重之每旦輒傾州連汲以充日用咸安中姚成甫嘗採菊澗側遇一丈夫謂成甫曰此澗菖蒲昔安期生所餌可以忘老於是回翔俯仰倐然不知所終蓋仙者焉高士春秋王徽之以菖蒲映竹曰菖蒲以九節為貴而此君面目聳然菖蒲正當再拜此君而此君亦安得不受耶原海墨徽言僧普寂大好菖蒲房中種之成仙人鸞鳳獅子之狀增清異録宣春太守虞杲郡齋植菖蒲五檻次子夢髯翁自號昌九言願賜保養牧豎間談元稹贈薛濤詩别後相思隔煙水菖蒲花發五雲高薛嘗好種菖蒲故有是句西吳記吳興德清有沈姓者其宅傍有潭水涯忽産蒲葉長幾尋仞俗以為異遇重午爭來斬其葉以辟溫臘其根以入藥遂表蒲以為瑞因名潭為瑞蒲潭繼古叢編周益公校正文苑英華序云以堯韭對舜華非一本草注安知其為菖蒲按梁元帝玄覽賦曰金盤玉豉堯韭舜華論此也余讀他書亦有用者如顔聚載梁太子賚河南菜啓則云堯韭未儔姬歜非喻又以堯韭對姬歜矣固曰堯韭本於本草而不知所以名之之義後見典術曰聖王之仁功濟天下者堯也天星降精於庭為韭感百隂為菖蒲焉今菖蒲是也三柳軒雜識菖蒲花為隱客周顚仙人傳顚者舊裙腰間藏三寸許菖蒲一莖謂曰此物何用對曰細嚼飲水腹無痛疾花史趙隱之母傅氏於山澗中見菖蒲花大如車輪傍有神人守護戒之勿泄享富貴年四十九忽向子孫説之得疾而終集藻傳原無名氏昌陽傳昌陽字子恆一字子仙蜀郡嚴道人也始祖韭在唐帝廷甚見貴重賜姓堯氏既而感百隂貌異常日遂變氏名曰菖蒲遁入山澤間化去世傳其神為列星厥胤皆以為氏蕃布四方至五世孫葅始以滋味干周文王文王悅之時置齒可間俾為膳宰世其官成王時有共豆實為五齊之首者曰本其後有仕魯者曰歜僖公三十年冬王使宰周公閲來聘公備物享之歜與席焉其族人有隱居嵩高者漢武聞其名然不能致也陽龍骨而鳯姿鬚髯戟張秀整拔乎其萃性疏挺高潔不耀其華厯寒燠有常雖凍虐炎爍之不少變容色於世味淡然無一嗜所須惟清泉白石而已平生惟與淇澳先生相敬重每見必交拜謂蘭子江蘺子有芳韻而無高節雖近處不狎也然自其先得引年却老方安期韓衆之流常服之至陽益精韓愈為國子博士以儒鳴猶對諸生稱道之故其名益章徹時憲宗好神仙聞而召之始至望其風度喟然曰是所謂列仙之儒居山澤而形容甚臞者與授太保兼奉御大夫不拜引至别殿詢其方乃臆對皇王仁夀之道纍數百言且謂得其道則不須臣失其道臣雖日供膳無益也上不能強之罷去穆宗即位徴為給事中尋拜侍讀學士上嘗丙夜讀書召陽侍側目益明纍遷侍中爵上洛郡公賜第一區擅池島之勝既貴顯極矣然直容清操不少渝其初自王封戚里官署私第多致泉石以延之為席上珍皆曰見昌公使人塵俗自消至有圖其狀而傳之者其為世所愛重至此久之就封郡以夀終贈太師諡靖節子始生識農耕之候徴為勸農使其孫曾亦皆挺挺有祖風焉頌原梁江淹菖蒲頌藥實靈品爰乃輔性除疴衛福蠲邪養正縹色外妍金光內映草經所珍山圖是詠增宋僧道潛菖蒲頌寒溪之濱沙石之竇産此靈苗蔚然而秀有美君子採持而歸文石相并涵蓄清漪根盤九節霜雪不稿置之幽齋永以為好贊增宋蘇軾石菖蒲贊并序本草菖蒲味辛溫無毒開心補五臟通九竅明耳目久服輕身不忘延年益心智高志不老注云生石磧上概節者良生下濕地大根者乃是昌陽不可服韓退之進學解云訾醫師以昌陽引年欲進其狶苓不知退之即以昌陽為菖蒲耶抑謂其似是而非不可以引年也凡草木之生石上者必須微土以附其根如石韋石斛之類雖不待土然去其本處輒稿死惟石菖蒲並石取之濯去泥土漬以清水置盆中可數十年不枯雖不甚茂而節葉堅瘦根鬚連絡蒼然於几案間久而益可喜也其輕身延年之功既非昌陽之所能及至於忍寒苦安淡泊與清泉白石為侣不待泥土而生者亦豈昌陽之所能倣佛哉余逰慈湖山中得數本以石盆養之置舟中間以文石石英璀璨芬郁意甚愛焉顧恐陸行不能致也乃以遺九江道士胡洞微使善視之余復過此將問其安否因為之贊曰清且泚惟石與水託於一器養非其地瘠而不死夫孰知其理不如此何以輔五臟而堅髮齒賦增宋張耒石菖蒲賦并序歲十月冰霜大寒吾庭之植物無不悴者爰有瓦缶置水斗許間以小石有草鬱然俯窺其根與石相結絡其生意暢遂顔色茂好若夏雨解籜之竹春田時澤之苗問其名曰是為石菖蒲也考諸本草則為養性上藥仙聖之已試者也因賦之云歲寒風霜水落石潔大木百圍偃仆摧折有草於此寸根九節曾是莫傷菶然茂悅若處廣深隱奧密而不知户牖之外平地尺雪也將糜而餌之私其益於我躬則不幾於奪也曷若致之吾前儀之以自修兮庶乎此德之琚玦也王炎石菖蒲賦并序豫書室中有石菖蒲一本鬱然暢茂蓋資水石之清幽以遂其性此物醫經所論可以延年可以成仙第人取而食之蒲喪其生矣然則為人養生者非蒲之願也因讀北山翁集有石菖蒲賦一篇三折四復詞既妙麗而興託高逺乃拾其遺論而賦之曰老石嶙峋金鐵貞兮浮雲所根氣潛蒸兮下潄冽泉玉鏘鳴兮蹙節盤屈託以生兮附堅涵潤密如積兮四時青青不改色兮烈日凝冰無能厄兮潛蓄幽馨如有德兮后土富媪載品彚兮其秀其英拔類萃兮虯髯者松負徑氣兮惟竹虛心古君子兮蘭有國香儕高士兮梅也如玉勝靜女兮得土則繁否則悴兮獨根於石孰如蒲之精粹兮有荇有藻産漣漪兮可薦可修播聲詩兮亦有芙蓉媚芳池兮紅衣素裳美且都兮下視其本著淤泥兮潔淨不汚孰如蒲之清癯兮來自澗谷入吾室兮鑿石瀦水保蓊鬱兮零露宵泫珠的皪兮甘雨時濯緇塵滌兮中心愛之久無斁兮方士者流言可餐兮養心益髓將引年兮一寸九節可登仙兮帝經君籙其言然兮豫乃獻疑進末議兮彭聃最夀終亦逝兮喬松飛升今安在兮屑而餌之蒲何罪兮毁璞雕刻玉不幸兮枯骨抱易龜隕命兮破為犧樽木失性兮彼美維蒲吾良朋兮前有韋編後黃庭兮全真育和共欣榮兮優遊卒歲淡然其忘情兮五言古詩增梁江淹採石上菖蒲瑤琴久蕪沒金鏡廢不看不見空閨裏縱橫愁思端緩步遵汀渚揚枻泛春瀾竇赤煙流綺水緑桂涵丹慿酒意未悅半景方自歎每為憂見及杜若詎能寬冀採石上草得以駐餘顔赤鯉倘可乘雲霧不復還原唐李白嵩山採菖蒲者神仙多古貌雙耳下垂肩嵩嶽逢漢武疑是九疑仙我來採菖蒲服食可長年言終忽不見滅影入雲煙喻帝竟莫悟終歸茂陵田宋蘇軾和子由記園中草木自我來關輔南山得再逰山中亦何有草木媚深幽菖蒲人不識生此亂石溝山高霜雪苦苗葉不得抽下有千歲根蹙縮如蟠虯長為鬼神守德薄安敢偷蘇轍夢中反古菖蒲并引古詩云石上生菖蒲一寸十二節仙人勸我食令我好顔色十一月八日四鼓夢中反之作四韻見一愚公在側借觀示之赩然有愧恨之色石上生菖蒲一寸十二節仙人勸我食再三不忍折一人得飽滿餘人皆不悅已矣勿復言人人好顔色陸遊菖蒲古澗生菖蒲根瘦節蹙密仙人教我服刀七蠲百疾陽狂華隂市顔朱髮如漆歲久功當成夀與天地畢菖蒲古上藥結根已千年聞之安期生采服可以仙斯人非世人兩耳長垂肩松下語未終竦身上青天增裘萬頃菖蒲匡廬入吾懷十載馳夢魂踵門者何人遺余以芳蓀歡然得其趣如對五老言幽姿出巖谷常帶冰雪䀶塵容為一洗兩目不復昏忽思三峽流褰衣涉潺湲因仍一寸石浸潤九節根人言可扶老歲易須其蕃兹理良不誣吾將從綺園元劉詵石菖蒲盆池有靈苗石罅忘逼仄微根亂繁絲疏葉散纎碧苔莓封巉巖沙水明的皪所貴含貞姿終然傲蒼色道人勤養護黃悴輒翦剔常與貝葉書珍愛同几格豫樟燔青冥風雨作霹靂小大固爾殊賦分焉得易相期喬松交歲晚堅九節七言古詩原唐張籍寄菖蒲石上生菖蒲一寸十二節仙人勸我食令我頭青面如雪逢人寄君一絳囊書中不得傳此方君能來作栖霞伴與君同入丹丘鄉宋陸遊菖蒲鴈山菖蒲崑山石陳叟持來慰幽寂寸根蹙密九節瘦一拳突兀千金直清泉碧缶相發揮高僧野人動顔色盆山蒼然日在眼此物一來俱掃迹根盤葉茂看愈好向來恨不相從早所嗟我亦飽風霜養氣無功日衰稿增謝枋得菖蒲歌有石竒峭天琢成有草夭夭冬夏青人言菖蒲非一種上品九節通仙靈異根不帶塵埃氣孤操愛結泉石盟明窗淨几有宿契花林草砌無交情夜深不嫌清露重晨光疑有白雲生嫩如秦時童女登蓬瀛手攜緑玉杖徐行瘦如天台山上聖賢僧休糧絶粒孤鶴形動如五百義士從田橫英氣凜凜摩青冥清如三千弟子立孔庭回琴點瑟天機鳴堂前不入紅粉意席上常聽詩書聲怪石篠簜皆充貢此物舜廟當共登神農多智入本草靈均蔽賢遺騷經幽人耽玩發仙興方士服餌延修齡綵鸞紫鳯琪花苑青虯玉麟芙蓉城上界真人好清淨見此靈苗當大驚我欲攜之朝上帝太清瑤草不敢專芳馨玉皇一笑留香案賜與有道者長生人間千花萬草儘榮艷未必敢與此草爭高名五言律詩增唐李德裕芳蓀楚客重蘭蓀遺芳今未歇葉抽清淺水花照暄妍節紫艷映渠鮮輕香含露潔離君若有贈暫與幽人折宋薑夔菖蒲嶽麓溪毛秀湘濱玉髓香靈苗憐徑直達節著芬芳豈謂盤盂小而忘臭味長拳山并勺水所至未能量七言律詩增宋蘇軾和子由盆中石菖蒲忽生九花青荑秋莢兩須臾神藥人間果有無無鼻何由識薝蔔有花今始信菖蒲芳心未飽兩蛺蝶寒意知鳴幾蟪蛄記取明年十二節小兒休更籋霜鬚蘇轍石盆種菖蒲忽開八九花或言此花夀祥也逺因生日作頌亦為賦此石盆攢石養菖蒲沮洳沙泉韭葉鋪世説花開難值遇天將夀考報勤劬心中本有長生藥根底暗添無限鬚更爾屈蟠增瘦硬他年老病要相扶僧如璧戲乞石菖蒲古澗靈苗不易遭寸根拳石著身牢齊如秧稻刺春水小似神龜負緑毛未與幽人供夀考曾隨遷客賦離騷阿師垂手入鄽去應許珍竒付我曹五言絶句增宋王十朋石菖蒲天上玊衡散結根泉石間要須生九節長為駐紅顔七言絶句增宋秦觀客有遺豫以假山石盆池者聞陳元發有石菖蒲作此詩乞之瑟瑟風漪心為清更窺􅍶崒眼增明可憐一片江山樣只欠菖蒲十數莖曾幾石菖蒲窗明几淨室空虛盡道幽人一事無莫道幽人無一事汲泉承露養菖蒲朱子寄謝劉彥集菖蒲之貺二首君家蘭杜久萋萋近養菖蒲緑未齊乞與幽人伴岑寂小窗風露日低迷泉清石瘦碧纎長秋露懸珠炯夜光箇裏無窮間造化别來誰與共平章謝吳公濟菖蒲翠羽紛披一尺長帶煙和雨過書堂知君别有臞仙種容易難教出洞房方嶽次韻菖蒲瓦盆猶帶澗聲寒亦有詩情几研間抱石小龍鱗甲老夜窗雲氣故斑斑吳菊潭一掬寒泉塊石頭兩三莖葉弄輕柔夢回一霎龍湫雨五月軒窗也帶秋許棐石菖蒲一碧生涯水石濱緌風細雨瘦精神前身恐是巢由輩怕著人間半點塵僧如璧乞石菖蒲香緑茸茸一寸根清泉白石共寒溫道人好事能分我留取斕斑舊蘚䀶原明戚龍淵一拳石上起根苗堪與仙家伴寂寥自恨立身無寸土受人滴水也難消詩散句增宋梅堯臣濺濺澗水底冉冉菖蒲稠菖蒲花已晚菖蒲茸尚柔靈根采九節試共野僧求逡巡能致之衰疾無甚憂金張建石泉何清泠中有九節蒲蒲性本孤潔不受滓穢汚原唐李白爾去掇仙草菖蒲花紫茸增宋蘇軾明年菖蒲根連絡不可解朱子澗底采菖蒲顔色永芳鮮原姚思巖根盤龍節瘦葉聳虎鬚長增金黃鎮成杖藜行藥去九節得菖蒲原宋王曾明朝知是天中節旋刻菖蒲要辟邪增蘇軾斕斑碎石養菖蒲一勺清泉半石盂陸遊今日溪頭慰心處自尋白石養菖蒲周王褒菖蒲九重節唐李嶠菖葉布龍鱗喬知之菖花多艷姿許景先菖蒲葉正齊儲光羲春渚菖蒲登杜甫碧節吐寒蒲曹鄴菖蒲葉葉齊李白菖蒲猶短出平沙宋黃庭堅松根搘鼎煮菖蒲秦觀石上菖蒲三尺長陸遊絡石菖蒲蒙緑髮元袁桷九節菖蒲泛瓊醑倪瓚石上菖蒲開紫茸别録原栽種養盆蒲法種以清泉潔石壅以積年溝中瓦末則葉細畏熱手撫摩及酒氣腥味油膩塵垢汚染若見日及霜雪煙火皆蕤喜雨露遂挾而驕夜息至天明葉端有綴珠宜作綿捲小杖挹去則葉杪不黃愛滌根若留以泥土則肥而粗須常易去水滓取清者續以新水養之久則細短油然蔥蒨水用天雨嚴冬經凍則根浮萎腐九月移置房中不可缺水十一月宜去水藏於無風寒密室中常墐其户遇天日暖少用水澆或以小缸合之則氣水洋溢足以滋生不然便枯死菖蒲極畏春風春末始開置無風處穀雨後則無患矣語云春遲出春分出室且莫見雨夏不惜可翦三次秋水深以天落水養之冬藏密十月後以缸合密又云添水不換水添水使其潤澤換水傷其元氣見天不見日見天挹雨露見日恐粗黃宜翦不宜分頻翦則短細頻分則粗稀浸根不浸葉浸根則滋生浸葉則潰爛又云春初宜早除黃葉夏日長宜滿灌漿秋季更宜沾重露冬宜暖日避風霜又云春分最忌摧花雨夏畏涼漿熱似湯秋畏水䀶生垢膩嚴冬止畏見風霜養石上蒲法藝花譜芒種時種以拳石竒峰清漪翠葉蒙茸亦几案間雅玩也石須上水者為良根宜蓄水而葉不宜近水以木板刻穴架置寬水甕中停隂所則葉向上若室內即向見明處長當更移轉置之武康石浮鬆極易取眼最好扎根一栽便活然此等石甚賤不足為竒品惟崑山巧石為上苐新得深赤色者火性未絶不堪栽種必用酸米泔水浸月餘置庭中日曬雨淋經年後其色純白然後種之篾片抵實深水盛養一月後便扎根比之武康諸石者細而且短羊肚石為次其性最鹹往往不能過冬新得者枯渴亦須浸養期年使其鹹渴盡解然後種之庶可久耳凡石上菖蒲不可時刻缺水尤宜洗根澆以雨水勿見風煙夜移見露日出即收如患葉黃壅以鼠糞或蝙蝠糞用水灑之若欲其直以綿裹筯頭每朝捋之亦可若種炭上炭必有皮者佳菖蒲梅雨種石上則盛而細用土則粗製用五月十二日採根取一寸九節者銅刀刮去黃黑硬節皮一重以嫩桑枝拌蒸熟曝乾銼之以備服食若常用只去毛微炒凡使勿用泥菖夏菖及露根者菖蒲生蠻谷中者尤佳黔蜀人常將隨行以治卒患冷氣心腹痛取一二寸捶碎同吳茱萸煎湯飲或嚼一二寸熱湯或酒下妙至夏抽梗於叢葉中謂之蒲捶黃生其中當欲開時取之歲時雜記端午以菖蒲或縷或屑泛酒章簡公端午帖子菖華泛酒堯樽緑菰葉縈絲楚粽香端午刻菖蒲為小人或葫蘆戴之辟邪書帶草原書帶草叢生葉如韭而更細性柔紉色翠緑鮮妍出山東淄川縣城北􅓺山鄭康成讀書處名康成書帶草藝之盆中蓬蓬四垂頗堪清賞集藻賦原唐陸龜蒙書帶草賦彼碧者草云書帶名先儒既沒後代還生有味非甘莫共三山芝挍無香可媚難將九畹蘭爭叨詞林畔種在經苑中榮翠影臨波恐被芙蓉見鄙貞姿傍砌愁為芍藥相輕發葉抽英因天受性紛稚圭池上之宅拂仲蔚門前之徑不省教施異術安得返魂未嘗輒入明庭何當指佞幾臨寒日幸到青春莎蕊未傳於漁父蒲茸竊詠於詩人霜亦曾霑潘令偏知白薤風常遍起宋生惟道青蘋栽培只倚於賢鄰搴擷長憂乎稚戲出慚無用舒還有異當琴操發伯牙山水之情值儒編動鑿齒陽秋之思敢曰求友寧忘慕義吳娃楫上空羡苔滋魏主帷中惟通蕙氣或乃蘭榮越徼薰茂周原幽搜莫及興詠徒存此則對仲舉蕭疏之室處子山搖落之園不識深宫豈是曾為帝女非侵逺道誰言能憶王孫徒愛其斂疏煙披曉霧弱可攬結勻能布濩蕭蕭而不計榮枯漠漠而何干好惡金燈照灼尚驚秦帝之焚粉蝶留連真謂羽陵之蠧爾乃高推籬菊瑞許階蓂我則惟親志士每聚流螢豈便離蒿萊於隙地希杜若於遙汀倘遇翰林主人之一顧庶幾長保歲寒於青青詩散句增唐李白書帶留青草琴堂羃素塵宋蘇軾庭下已生書帶草使君疑是鄭康成原明王世貞仍栖故壘學庚桑書帶沿街薜荔牆鴛鴦草原鴛鴦草春葉晚生其稚花在葉中兩兩相向如飛鳥對翔集藻贊增宋宋祁鴛鴦草贊翠花對生甚似匹鳥逼而觀之勢若偕矯五言絶句增唐薛濤鴛鴦草緑英滿香砌兩兩鴛鴦小但娛春日長不管秋風早翠雲草原翠雲草性喜隂色蒼翠可愛細葉柔莖重重碎蹙儼若翠鈿其根遇土便生見日則消栽於虎刺芭蕉秋海棠下極佳别録原種植春雨時分其勾萌種於幽崖深谷之間即活老少年原老少年一名鴈來紅增草花譜鴈來紅以鴈來而色嬌紅十樣錦有紅紫黃緑四色老少年至秋深腳葉深紫而頂紅少年老頂黃而葉緑譜云純紅者老少年原紅紫黃緑相兼者名錦西風又名十樣錦又名錦布衲以長竹扶之可以過牆甚壯秋色集藻賦增明楊愼鴈來紅賦蜀城之花與玉蟬而同房漢宫之菊配黃鵠以分裳兹纎莖兮獨異候陽鳥而敷芳盈盈渥赭奕奕鮮粧承景火旻之下委質金神之鄉吳臺草長紅心不同時節楚岸楓愁赤葉逺謝輝煌迎風動彩泫露生光耿夫容兮瀕枉渚雜桂蕊兮侍君堂殘蝶留連而驚豔胡蜂躑躅而疑香矜隕霜之不殺笑何草之不黃脫梧楸兮索索銷蘭蕙兮揚揚琅玕摧兮好樹簫籟響兮長廊柳呈疏兮綺陌荷委蓋兮銀塘矯兮紅花爛然朱芳賞生兮稀有物珍兮非常誤停車之杜牧詫翦綵之隋皇江淹多才擬抽豪而賦詠班姬含怨亦却扇而倣徨亂曰春花紅兮杜宇春草碧兮萇𢎞兹微生兮秋頴乃借榮於春工根伴兮寒螿名託兮霄鴻彼遊龍兮杕杜亦詩人兮為風採佳名於飾羽聊以貽夫雕蟲五言律詩原宋楊萬里鴈來紅開了原無鴈看來不是花若為黃更紫乃借葉為葩藜莧真何擇雞冠却較差未應樨菊輩赤腳也容他七言絶句增宋方嶽鴈來紅是葉青青花片紅翦裁無巧似春風誰將葉作花顔色更與春風迥不同秋入山籬葉正丹老天渾誤作花看不知宋玉今何似鴈欲來時霜正寒原明陸樹聲老少年何事還丹可駐年一枝真作草中仙霜華洗盡朱顔在不學春花巧弄妍霜葉回紅底是春可中朱草對時新衰遲不為矜顔色留與羣芳殿後塵疏疏密密綴新紅庭下看來錦一叢不分芳華易消歇賸將老色借秋風詩散句原宋徐似道葉從秋後變色向晚來紅胡月山記得去年今日别矮籬花滿鴈來紅别録原種植以子種喜肥地正月撒於耨熟肥土上加毛灰蓋之以防蟻食二月中即生亦要加意培植若亂撒花臺則蜉蝣傷葉不生矣藝原藝葉類豌豆生山野作小叢三月開小白花而繁香馥甚逺秋間葉上微白如粉江南極多雜禮圖藝似邪蒿香美可食大率香草花過則已縱有葉香者須採而嗅之方香此草香聞數十步外栽園亭間自春至秋清香不歇絶可玩簪之可以鬆髮置席下去蚤虱置書帙中去蠧古人有以名閣者彚考增禮記月令仲春之月藝始生注藝香草世人種之中庭淮南子藝草可以死復生洛陽宫殿簿顯陽殿前藝香一株徽音殿前藝香二株含英殿前藝香二株晉宫閣名太極殿前藝香四畦式乾殿前藝香八畦原杜陽雜編藝香出于闐國其香潔白如玉入土不朽唐元載造藝暉堂以此為屑塗壁夢溪筆談古人藏書辟蠧用藝香謂之藝草即今之七里香也集藻賦增晉傅咸藝香賦攜昵友以逍遙兮覽偉草之敷英慕君子之𢎞覆兮超託軀於朱庭俯引澤於丹壤兮仰吸潤乎泰清繁兹緑蕊茂此翠莖葉芟蓯以纎折兮枝婀娜以回榮象春松之含曜兮鬱蓊蔚以蔥青原成公綏藝香賦美藝香之修潔稟隂陽之淑精去原野之蕪穢植廣厦之前庭莖類秋竹葉象春柳五言古詩增宋梅堯臣書局後叢莽中得藝香一本有藝如苜蓿生在蓬藋中草盛藝不長馥烈隨微風我來偶見之乃稚彼蘙蒙上當百雉城南接文昌宫借問此何地刪修多巨公天喜書將成不欲有蠧蟲是産兹弱本蒨爾發荒叢黃花三四穗結實植無窮豈料鳯閣人偏憐葵葉紅歐陽修和聖俞唐書局後叢莽中得藝香一本之作用其韻有藝黃其華在彼衆草中清香濯曉露秀色搖春風幸依華堂隂一顧曾不蒙大雅彼君子偶來從學宫文章高一世議論伏羣公多識由博學新篇匪雕蟲唱酬爛衆作光輝發幽叢在物茍有用得時寧久窮可嗟凡草木糞壤自青紅附録牛藝草增爾雅權黃華注今謂牛藝草為黃華華黃葉似􅀢蓿彚考增王氏談録藝香草也舊説為不食今人皆不識文丞相自秦亭得其種分遺公歲種之公家庭砌下有草如苜蓿摘之尤香公曰此乃牛藝爾雅所謂權黃華者校之香烈於藝食與否皆未可試也杜若增爾雅杜土鹵注杜蘅也疏葉似葵形如馬蹄故俗云馬蹄香廣雅楚蘅杜蘅也博物志杜若一名土杏香譜懷香即杜蘅本草一名㺐子薑一名山薑一名白蓮一名白芩爾雅翼杜若苗似山薑花黃赤子赤色大如棘子中似豆蔲本草葉似薑而有文理莖葉皆有長毛李時珍曰杜若人無識者今楚地山中時有之山人亦呼良薑根味辛或以大者為高良薑細者為杜若彚考增山海經天帝之山有草焉狀如葵臭如蘼蕪名曰杜蘅可以走馬大戴禮蘭氏之根槐氏之苞漸之滌夫君子不近庶人不服質非不美也所漸者然也注蘭槐香草名槐又作懷本草云懷即杜蘅也又名蘅薇香隋唐嘉話宋謝朓詩云芳洲多杜若貞觀中醫局求杜若度支郎乃下坊州令貢州判司報云坊州不出杜若應由謝朓詩誤太宗聞之大笑判司改雄州司法度支郎免官集藻序增晉嵇康懷香賦序余以太簇之月登於厯山之陽仰眺崇岡俯察幽坂及覩懷香生蒙楚之間曾見斯草植於廣厦之庭或被帝王之囿怪其遐棄遂遷而樹於中堂華麗則殊采婀娜芳實則可以藏之書又感其棄本高崖委身階庭似傅説顯殷四叟歸漢故因事義賦之頌增梁江淹杜若頌山中杜若嘉爾翠質不竒不俗載華載實同銜夕露共炯朝日夷陂無二沉冥如一贊增齊卞敬宗懷香贊有卉惟翠因實制名濛濛緑葉荏苒弱莖寄芬微風寓秀間庭懷而芳之為玩於情賦增齊謝朓杜若賦馮瑤圃而宣遊臨水木而延佇柳含色於逺岸泉鏡流於枉渚蔭緑竹以淹留藉幽蘭而容與覽兹榮之悅茂蒶為芳於清籞觀夫結根擢色發曜垂英緣春巒以宣布蔭涼潭而影清景奕奕以四照枝靡靡而葉傾冒霜蹊以獨蒨當春郊而徑平搴汀洲以企豫懷石泉於幽情嗟中巖之纎草厠金芝於芳叢夕舒榮於溽露旦發彩於春風承羲陽之光景庶無悲於轉蓬文賦散句增楚屈原離騷雜杜蘅與芳芷九歌采華衣兮若英采芳洲兮杜若將以遺兮下女被石蘭兮帶杜蘅折芳馨兮遺所思山中人兮芳杜若飲石泉兮蔭松柏宋玉風賦獵蕙草離秦衡漢司馬相如上林賦葴持若蓀子虛賦蘅蘭芷若劉向九歎握申椒與杜若兮冠浮雲之峩峩晉何晏景福殿賦藝若充庭五言古詩增梁沈約詠杜若生在窮絶地豈與世相親不願逢采擷本欲芳幽人七言古詩增宋劉圻父採杜若欽州五月土如炊滿山杜若芳菲菲素英緑葉紛可喜徑烈不避炎歊威採之盈掬薦蔬食臧獲失笑庖人譏君不見屈平夕飱賦秋菊魂兮無南盍來歸又不見坡公服食得枲耳扣角自嘆從前非伊子假祿三千石窮比二子猶庶幾餐花嚼蕊有真樂一飽何必謀甘肥尚餘升合漬生蜜從他薏苡生珠璣詩散句增唐白居易洲香杜若抽心短沙暖鴛鴦鋪翅眠周庾信春洲杜若香唐錢起新泉香杜若孟浩然風起遙聞杜若香殷璠緑水滿溝生杜若元錢惟善春雨和香杜若洲别録增李時珍曰杜若乃神農上品治足少隂太陽諸症要藥而世不知用蘇頌曰山薑去皮間風熱可作煠湯又主暴冷及胃中逆冷霍亂腹痛久服益精明目輕身令人不忘蘼蕪根為芎藭别見藥譜增爾雅蘄茝蘪蕪注香草葉小如萎狀疏芎藭苗也一名蘄茝一名薇蕪一名江蘺本草一作蘼蕪蘇恭曰蘼蕪有二種一種似芹葉一種似蛇牀香氣相似李時珍曰嫩苗未結根時則為蘼蕪既結根後乃為芎藭又海中苔髮亦名江蘺而其實不同彚考增管子五沃之土生蘼蕪淮南子亂人者如蛇牀之與蘼蕪廣志薇蕪香草魏武帝以藏衣中字説茝可以養鼻又可以養體芳草譜楚辭江蘺之草屈原幼時所先採蓋自其初度則固已扈江蘺辟芷矣張勃云江蘺出臨海縣海水中正青似亂髮楚辭之於江蘺畦而種之則非水物本草蘼蕪一名江蘺又云被以江蘺揉以蘼蕪又不應是一物也集藻贊增晉郭璞山海經圖贊蘼蕪善草亂之蛇牀不隕其實自别以芳佞人以智巧言如簧文散句增楚屈原離騷扈江蘺與辟芷兮覽椒蘭其若兹兮又況揭車與江蘺九歌秋蘭兮蘼蕪羅生兮堂下緑葉兮素華芳菲菲兮襲豫九章播江蘺與滋菊兮願春日以為糗芳漢司馬相如上林賦糅以蘼蕪雜以留夷東方朔七諫江蘺棄於窮巷兮王褒九懷江蘺兮遺捐晉郭璞江賦繁蔚芳蘺五言古詩增宋蘇籀葉葉秋聲中霏霏早英蓛介特有如松繁華匪慙菊勃蔚襲軒墀薰沾滿衣服情人擢纎指拾蕊動盈掬蘼蕪見離騷苓藿入譜録五言律詩增唐趙嘏蘼蕪葉復齊提筐紅葉下度日採蘼蕪掬翠香盈袖看花憶故夫葉齊誰復見風暖恨偏孤一被春光纍容顔與昔殊詩散句增晉陸機江蘺生幽渚微芳不足宣被蒙風雲會移居華池邊發藻玊臺下垂影滄浪泉霑潤既已渥結根奧且堅古詩上山采蘼蕪下山逢故夫唐李賀沙上蘼蕪花秋風已先發吳融春候侵殘臘江蕪緑已齊宋曾肇蘼蕪有香葉采采乘清旦孟遲蘼蕪自是王孫草莫送春香入客衣元張翥江蘺緑遍汀洲外擬折芳馨寄所思唐錢起片石隱江蘺白芷增本草白芷一作茝一名芳香一名澤芬一名苻蘺一名虈一名藥説文云晉謂之虈齊謂之茝楚謂之蘺又謂之藥一名管葉名蒿麻蘇頌曰所在有之吳地尤多根長尺餘粗細不等白色枝幹去地五寸以上春生葉相對婆娑紫色濶三指許花白微黃入伏後結子立秋後苗枯二月八月采以黃澤者為佳氣味辛溫無毒彚考增禮記內則婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑荀子蘭槐之根是為芷其漸之滫君子不近庶人不服其質非不美也所漸者然也注蘭槐香草也其根是為芷也陶𢎞景云離騷所謂蘭茝也蓋苗名蘭茝根名芷也集藻賦增唐陸龜蒙採藥賦有序藥白芷也香草美人得以比之君子定情屬思聊為賦云日正融冷春歸飾荒覩一時之流恨撫萬古之遺香問人則不屈不宋説地則非瀟非湘搴其榮煙攜而動色擢其體雪挺而騰光諷畔牢愁子雲於焉華皓吟哀時命曼倩由是摧藏情思矜年慵情畏晚胡繩繫晷以難駐曷車載春而不返陋君折楊柳須為送行陋君采芙蓉仍勞贈逺豈如隂晴互出稚艷相迎隈回鳯喜怨盼鴻驚侍笑者青琴作號顧謂者碧玉為名偷襞積競縈盈目斜波而水怯鬢疊葉而雲爭蘭在口以時聞嬌如連瑣蕙牽心而不定飄若懸旌契叩難申融怡自許石能潛遁以求偶山亦浮來而命侣誓不為巖阿竹冉冉孤生誓不為澗底松亭亭獨處於是欺皓本掩縮蕤房紅者自破蒂縹者誰披望懷沙之浦詠遺襟之詞煙分而麝墨猶濕綺斷而龍刀合知只言長信長門年年可恨未必傾城傾國箇箇生悲臨階躑躅以虛徐當户薔薇兮綽約蜂咋葉而先盡鶯踶枝而易落未若北堂公子樹芳草忘憂南國佳人佩生香辟惡露茁煙冶風條翠謔不知海傍之期逺不信人間之命薄休為上計掾空尋寶叉聊作侍中郎且乘金絡别有廬江小吏蜀郡長卿或支離而築恨或調笑以衷情不同乎稟簪裾而霧悄秉禮義以霜明鄭交甫則江邊佩解蕚緑華則席上詩成彼怡神而致問皆護節而含貞竦懼趨前雖陳辭而往訴遷延却立終結抱而難平淚滴堪穿腸回好繫蟲絲織怨以成段象酒蠲愁而判劑江僕射之孤燈向壁不少淒迷張記室之少婦當壚應還細麗景方駘蕩思巳低摧酒疲於子建為使花困於靈均作媒何庶物之相負痛妍華而未回莫與心傷瑤圃從驚鶗鴂如防膽怯空屏宜畫魁堆剩欲追尋徒嗟緬邈杯形連理而終在扇樣合歡而可學若遇劉公伯雅夢亦沉沉如逢王母少兒晝還數數文賦散句增楚屈原離騷扈江蘺與辟芷兮畦留夷與揭車兮雜杜蘅與芳芷既替余以蕙纕兮又申之以攬茝九歌沅有芷兮澧有蘭九章攬大薄之芳茝兮宋玉招魂菉蘋齊葉兮白芷生漢司馬相如子虛賦衡蘭芷若王褒九懷芷閭兮藥房奮搖兮衆芳結榮茝兮逶逝晉張衡思玄賦珍蕭艾於重笥兮謂蕙芷之不香七言絶句增明僧德祥聞芷白芷花開繞屋香一時秋思入江鄉雲多水濶人難見楚竹歌聲動夕陽詩散句增晉嵇康棄此蓀芷襲彼蕭艾唐皮日休艇子小且兀緑湖蕩白芷李白芳馥茝蘭蕤宋蘇軾白芷來江南佩芷襲芳蓀范成大蘋芷迷煙路茅香增本草茅香一名嗢尸羅一名香麻蘇頌曰陜西河東汴東州郡皆有之遼澤州充貢三月生苗似大麥五月開白花亦有黃花者有結實者有無實者並正月二月采根五月采花八月采苗寇宗奭曰茅香根如茅但明潔而長可作浴湯同藁本尤佳仍入印香中合香附子用集藻五言古詩增梁簡文帝香茅銅律與鳴琴俱稱類君子豈若江淮間發葉超衆美珍同自牧歸茅因彚征起豈獨邁秦蘅芳知蔑沅芷蕭祇詠香茅鶗鴂芳不歇霜繁緑更滋擢本同三脊流芳有四時粗根縮酒易結解舞蠶遲終當入楚貢豈羡詠陳詩附録白茅香增本草白茅香生安南如茅根道家用作浴湯李珣曰廣志云生廣南山谷合諸名香甚竒妙尤勝舶上來者李時珍曰此乃南海白茅香亦今排香之類非近道之白茅及北土茅香花也附録排草增桂海虞衡志排草出日南狀如白茅香芬烈如麝香亦用以合香諸草香無及之者本草排草香出交趾今嶺南亦或蒔之草根也白色狀如細柳根人多偽雜之能辟臭去邪惡氣附録瓶香增本草瓶香生南海山谷其狀如瓶燒之辟邪煎湯浴風瘧甚效附録耕香增本草耕香生烏許國莖生細葉食之調中去臭御定佩文齋廣羣芳譜卷八十八
