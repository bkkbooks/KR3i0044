body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十九卉譜紅花原紅花一名紅藍一名黃藍爾雅翼云於春種者花生時但作黃色茸茸然故名黃藍處處有之花色紅黃葉緑似藍有刺春生苗嫩時亦可食夏乃有花花下作梂多刺花出梂上梂中結實白顆如小豆大其花可染真紅又作胭脂為女人唇妝其子搗碎煎汁入醋拌蔬食極肥美又可為車脂及燭花味辛溫無毒行男子血脈通女子經水多則行血少則養血潤燥止痛散腫亦治蠧毒增本草番紅花一名洎夫藍一名撒法即出西畨回回地面及天方國即彼地紅藍花也元時以入食饌用彚考增南史王洪軌傳洪軌為青冀二州刺史頗勵清節先是青州資魚鹽之貨或強借百姓麥地以種紅花多與部下交以祈利益洪軌至一皆斷之宋史地理志興元府貢胭脂紅花中華古今注紅藍花汁凝作胭脂以燕國所生故曰燕脂塗之作桃紅妝北邊備對焉支山焉支今之燕脂也此山産紅藍可為燕脂也集藻書增晉習鑿齒與燕王書山下有紅藍足下先知不北方人採取其花染緋黃挼取其上英鮮者作煙支婦人採捋用為顔色吾少時再三過見煙支今日始視紅藍後當足致其種七言絶句增唐李中詠紅花紅花顔色掩千花任是猩猩血未加染出輕羅莫相貴古人崇儉戒奢華别録原船忩夜話陸曮奉化人以醫術行於時新昌徐氏為婦病産不逺二百里輿致之及門婦已死但胸堂間猶微熱陸入視之良久曰此血悶也能捐紅花數十斤則可以活主人急購如數陸乃為大鍋以煮之候湯沸遂以三木桶盛湯於中取窗格藉婦人寢其上湯氣微又復進之有頃婦人指動半日遂蘇蓋以紅花能活血故也種植地欲熟二月雨後種如種麻法根下須鋤淨勿留草穢五月種晚花春初即留子入五月便種若待新花取子便晚新花熟取子曝乾收若鬱浥即不生收採花生須日日乘涼採盡旋即碓搗熟水淘布袋絞去黃汁更搗以酸粟米清泔又綯又絞去汁青蒿覆一宿曬乾收好勿令浥濕浥濕則色不鮮晚花色更鮮明耐久不黦勝春種者入藥酒洗用附録胭脂增本草胭脂一名􅭤􅫰李時珍曰胭脂有四種一種以紅藍花汁染胡粉而成乃蘇鶚演義所謂胭脂葉似薊花似蒲出西方中國謂之紅藍以染粉為婦人面色者也一種以山胭脂花汁染粉而成乃段公路北户録所謂端州山間有花叢生葉類藍正月開花似蓼土人采含苞者為胭脂粉亦可染帛如紅藍者也一種以山榴花汁作成者鄭虔胡本草中載之一種以紫染綿而成者謂之胡胭脂李珣南海藥譜載之今南人多用紫胭脂俗呼紫梗是也彚考增史記貨殖列傳巴蜀亦沃野地饒巵薑注巵煙支也紫赤色茜草原茜草一名蒨一名茅搜一名茹藘爾雅云茹藘茅搜注云今之蒨也可以染絳一名地血一名牛蔓陸璣詩疏云齊人謂之茜徐州人謂之牛蔓一名染緋草一名血見愁一名過山龍一名風車草增本草一名四補草一名西天王草一名四嶽近陽草一名鐵塔草原十二月生苗蔓延數尺方莖中空有筋外有細刺數寸一節每節五葉葉如烏藥葉而糙澀面青背緑七八月開花結實如小椒中有細子茜根色紅而氣溫味微酸而帶鹹色赤入營氣溫行滯味酸入肝鹹走血手足厥隂血分之藥也專行血活血彚考原詩鄭風茹藘在阪史記貨殖列傳千畝巵茜其人與千戶侯等增説文茅搜人血所生可以染絳述異記洛陽有支茜園漢官儀云染園出支茜供染御服是其處也髙要縣志頂湖山産茜草别録原修治凡使用銅刀於槐砧上銼日乾勿犯鉛鐵器辨訛赤柳草根與茜相似但酸澀誤服患內瘴速服甘草水可解藍原説文藍染青草也增爾雅葴馬藍注今大葉冬藍也疏今為澱者是也爾雅翼菘藍其汁抨為澱堪染青蓼藍苗似蓼而味不辛不堪為澱本草藍凡五種蓼藍葉如蓼五六月開花成穗細小淺紅色子亦如蓼歲可三刈菘藍葉如白菘馬藍葉如苦蕒即郭璞所謂大葉冬藍俗中所謂板藍者二藍花子並如蓼藍吳藍長莖如蒿而花白吳人種之木藍長莖如決明髙者三四尺分枝布葉七月開淡紅花結角長寸許纍纍如小豆角其子亦如馬蹄決明子而微小迥與諸藍不同而作澱則一也别有甘藍可食原大藍葉如萵苣而肥厚微白似擘藍色小藍莖赤葉緑而小槐藍葉如槐葉皆可作靛至於秋月煮熟染衣止用小藍彚考增詩小雅中朝采藍不盈一襜原禮記月令仲夏之月令民毋艾藍以染增荀子青出之於藍而青於藍秦子常聞作人當如園圃之藍不異衆草染而後朗原漢官儀􅀢園供染緑紋綬小藍曰􅀢增續漢書楊震植藍以供母諸生嘗有助種者輒拔更種以拒其後貴州通志永寧州靛山在慕役司水回山轉其中深箐可種藍藍有木藍蓼藍耕久而益有收山箐之中積數百年之枯葉爛柯刀耕火耨土尚暖寒則不生歲必異地以植集藻賦散句增後漢趙岐藍賦余就醫偃師道經陳留此境人皆以種藍染紺為業藍田彌望黍稷不植慨其遺本念末遂作賦曰同丘中之有麻似麥秀之油油唐李程青出於藍賦藍蘊嘉色青出其中行採之際詎盈詩人之襜俯拾之時豈異炎洲之翠五言律詩增唐王季友青出藍芳藍滋匹帛人力半天經浸潤加新氣光輝勝本青還同冰出水不共草為螢翻覆依襟上偏知造化靈吕溫青出藍物有無窮好藍青又出青朱研方比德白受始成形袍襲宜從政襟垂可問經當時不採擷佳色幾飄零詩散句增唐許渾藍塢寒先燒别録原種植四民月令榆莢落時可種藍五月可刈藍六月可種冬藍大藍大藍宜平地耕熟種之爬勻土用荻簾蓋之每早用水灑至生苗去簾長四寸移栽熟肥畦三四莖作一窠行離五寸雨後併力栽勿令地燥白背即急鋤恐土堅也須鋤五遍日灌之如瘦用清糞水澆一二次至七月間收刈作靛今南北所種除大藍小藍槐藍之外又有蓼靛花葉梗莖皆似蓼種法各土農皆能之種小藍宜於舊年秋及臘月臨種時俱各耕地一次爬平撒種後橫直復爬三四次僅生五葉即鋤有草再鋤五月收割留根候長再割一次打靛便民圖纂夏至前後看葉上有皺紋方可收割每五十斤用石灰一斤於大缸內水浸次日變黃色去梗用木杷打轉粉青色變過至紫花色然後去清水成靛染藍小藍每擔用水一擔將葉莖細切鍋內煮數百沸去渣盛汁於缸每熟藍三停用生藍一停摘葉於瓦盆內手揉三次用熟汁澆挼濾相合以淨缸盛用以染衣或緑或藍或沙緑沙藍染工俱於生熟藍汁內斟酌割後仍留藍根七月割候八月開花結子收來春三月種之附録擘藍原擘藍一名芥藍葉色如藍芥屬也南方謂之芥藍葉可擘食故北方謂之擘藍葉大於菘根大於芥薹苗大於白芥子大於蔓菁花淡黃色三月花四月實每畝可收三四石葉可作葅或作乾菜又可作靛染帛勝福青集藻詩散句增宋蘇軾芥藍如菌菌腕黃牙頰香别録原種植種無時收根者須四五月種少長擘其葉漸擘根漸大八九月並根葉取之地須熟耕多用糞土喜虛浮土強者多用灰糞和之疏行則本大而子多每本約相去一尺即乾枯之後根復生葉或並斸去大根稍存入土細根來年亦生經數年不壞製用苗葉根心俱堪為蔬四時皆可食子可壓油食根之菜本皆在土中獨此在土上根剝去皮可煮食或糟藏醬䜴皆可莖葉用麻油煮食並飲汁能散積痰葉及子能消食積解麵毒蔬中佳品也附録鼠尾草增爾雅葝鼠尾注可以染皂疏本草有白華者有赤華者又名陵翹本草一名山陵翹一名烏草一名水青所在下濕地有之黔中人采為藥葉如蒿莖端夏生四五穗穗若車前花有赤白二種附録狼把草增本草狼把草一名郎耶草生山道旁與秋穗子並可染皂高三四尺葉作雁齒如鬼針苗方士言此草即鼠尾草功用亦近之但無的據耳芭蕉原蕉一名甘蕉一名芭苴一名天苴一名緑天一名扇仙草類也葉青色最長大首尾稍尖菊不落花蕉不落葉一葉生一葉焦故謂之芭蕉其莖軟重皮相裹外微青裏白三年以上即著花自心中抽出一莖初生大萼似倒垂菡蓞有十數層層皆作瓣漸大則花出瓣中極繁盛大者一圍餘葉長丈許廣一尺至二尺望之如樹生中土者花苞中積水如蜜名甘露侵晨取食甚香甘止渴延齡不結實生閩廣者結蕉子凡三種未熟時苦澀熟時皆甜而脆一種大如指者長六七寸鋭似羊角兩兩相抱剝其皮黃白色味最甘名羊角蕉性涼去熱一種大如雞卵類牛乳名牛乳蕉味微減一種大如蓮子長四五寸形正方味最劣建安草木狀云芭樹子房相連味甘美可蜜藏根堪作脯發時分其勾萌可别植小者以油簪橫穿其根二眼則不長大可作盆景書忩左右不可無此君此物搗汁治火魚毒甚驗性畏寒冬間刪去葉以柔穰苴之納地窖中勿著霜雪冰凍增南方草木狀甘蕉花大如酒杯形色如芙蓉著莖末百餘子大各為房相連纍甜美根如芋魁大者如車轂實隨花長每花一闔各有六子先後相次子不俱生花不俱落子味似葡萄甜而脆亦療飢格物總論芭蕉叢生根出地面兩三莖成一簇大者二三尺圍葉如扇柄如山芋莖中心抽幹作花盛紅者如火炬謂之紅蕉白者如蠟色謂之水蕉桂海虞衡志芭蕉有數種極大者凌冬不凋中抽幹長數尺節節有花花褪葉根有實去皮取肉軟爛如緑柿味極甘冷四季實土人或以飼小兒云性涼去客熱以梅汁漬曝乾按令扁味甘酸有微霜名芭蕉乾又名牛子蕉雞蕉子小如牛蕉亦四季實牙蕉子小如雞蕉尤香嫩甘美秋初實海槎餘録海南芭蕉常年開花結實有二種板蕉大而味淡佛手蕉小而味甜原美人蕉自東粵來者其花開若蓮而色紅若丹産福建福州府者其花四時皆開深紅照眼經月不謝中心一朵曉生甘露其甜如蜜即常芭蕉亦開黃花至曉瓣中甘露如飴食之止渴産廣西者樹不甚高花瓣尖大紅色如蓮甚美又有一種葉與他蕉同中出紅葉一片亦名美人蕉一種葉瘦類蘆箬花正紅如榴花日拆一兩葉其端一點鮮緑可愛春開至秋盡猶芳亦名美人蕉膽瓶蕉根出土時肥飽狀如膽瓶朱蕉黃蕉牙蕉皆花也色葉似芭蕉而微小花如蓮而繁日放一瓣放後即㽔而結子名蕉黃味甘可食霏雪録云蕉黃如柿味香美勝瓜冬收嚴密春分勾萌一如芭蕉鳳尾蕉一名番蕉能辟火患此蕉産於鐵山如少萎以鐵燒紅穿之即活平常以鐵屑和泥壅之則茂而生子分種易活江西塗州有之水蕉白花不結實取其莖以灰練之解散如絲績以為布謂之蕉葛出交趾彚考增南史隱逸傳徐伯珍少孤貧學書無紙常以竹箭箬葉甘蕉及地上學書唐書南蠻列傳撲子蠻無食器以蕉葉藉之宋史五行志政和五年五月禁中芭蕉連理三輔黃圖漢武帝元鼎六年破南越起扶荔宫以植所得竒草異木有甘蕉十二本晉宫閣名華林園有芭蕉二株南方草木狀水蕉如鹿蔥或紫或黃吳永安中孫休嘗遣使取之花終不可致但圖畫以進原遊名山志赤巖山水石之間唯有甘蕉林高者十丈增酉陽雜俎南中紅蕉花時有紅蝙蝠集花中原清異録南漢貴璫趙純節性唯喜芭蕉凡軒忩館宇咸種之時稱純節為蕉迷懷素居零陵庵東郊治芭蕉亘帶幾數萬取葉代紙而書號其所曰緑天庵曰種紙厥後道州刺史追作緑天銘增益部方物略記紅蕉於芭蕉蓋自一種葉小其花鮮明可喜蜀人語染深紅者謂之蕉紅蓋倣其殷麗云玊堂間話天水之地邇於邊陲土寒不産芭蕉戎帥使人於興元求之植二本於庭臺間每至入冬即連土掘取之埋藏於地窟候春暖即再植之庚午辛未之間有童謡曰花開來裏花謝來裏而又節氣變而不寒冬即和暖夏即毒熱甚於南中芭蕉於是花開秦人不識逺近士女來看者填咽衢路尋而蜀人犯我封疆年年一來不失芭蕉開謝之期五色線涅槃經芭蕉故無心何以聞雷而長如白日摘宜苑石榴宜得石膏糞造化力也楓忩小牘花石綱百卉臻集廣中美人蕉大都不能過霜節唯鄭皇后宅中鮮茂倍常盆盎溢坐不獨過冬更能作花原星槎覽勝南番阿魯諸國無米榖唯種芭蕉椰子取實代糧增庚巳編馮漢字天章居閶門石牌巷口庭前雜植花木瀟灑可愛夏月薄晚浴罷坐齋中榻上忽覩一女子緑衣翠裳映窗而立漢叱問之女子斂袂拜曰兒焦氏也言畢忽然入户熟視之肌體纎妍舉止輕逸真絶色也漢驚疑其非人起挽衣相狎女忙迫截衣而去僅執一裙角以置所臥席下明視之乃蕉葉耳先是漢嘗讀書鄰僧庵中移一本植於庭其葉所斷裂處取所藏者合之不差尺寸原學圃餘疏芭蕉惟福州美人蕉最可愛歷冬春不凋常吐朱蓮如簇吾地種之能生然不花無益也又有一種名金蓮寶相不知所從來葉尖小如美人蕉種之三四嵗或七八歲始一花南都戶部五顯廟各有一株同時作花觀者雲集其花作黃紅色而瓣大於蓮故以名至有圖之者然豫童時見伯父山園有此種不甚異也此却可種以待開時賞之若甘露則無種蕉之老者輒生在泉漳間則為蕉實耳增閩部疏余以盛冬入福州芭蕉葉無凋者廨中美人蕉纈紅鮮甚比出過延平已入春而蕉葉始放乃知二百里外蕉無冬葉矣然吳中蕉三月始抽萌視延津尚遲兩月西湖志杭州玄妙觀中有蕉花一株以盛衰卜休咎元時有羽客題葉云午夜君山玩月回西鄰小圃碧蓮開天風香霧蒼華冷名籍因由問汝來白雪紅鉛立聖胎美金花要十分開好同子往瀛洲看雲在青霄鶴未來識者以為吕洞賓云集藻雜著增梁沈約修竹彈甘蕉文渭川長兼淇園貞幹臣修竹稽首臣聞芟夷藴崇農夫之善法無使滋蔓翦惡之良圖未有蠧苗害稼不加窮伐者也切尋蘇臺前甘蕉一叢宿漸雲露荏苒歲月擢本盈尋垂蔭含丈階緣寵渥銓衡百卉而豫奪乖爽髙下在心每叨天功以為巳力風聞籍聽非復一塗猶謂愛憎異説所以挂乎嚴網今月某日有臺西階澤蘭萱草到園同訴自稱雖慚杞梓頗異蒿蓬陽景所臨由來無隔今月某日巫岫斂雲秦樓開照乾光𢎞普罔幽不矚而甘蕉攢莖布影獨見障蔽雖處臺隅遂同幽谷臣謂偏辭難信敢察以情登攝甘蕉左近杜若江蘺依源辨覆兩草各處異列同欵既有證據羌非風聞切尋甘蕉出自藥草本無芬馥之香柯條之任非有松柏後凋之心蓋闕葵藿傾陽之識慿籍慶會稽絶倫等而得人之譽靡聞稱平之聲寂寞遂使言樹之草忘憂之用莫施無絶之芳當門之弊斯在妨賢敗政孰過於此而不除戮憲章安用請以見事徙根翦葉斥出臺外庶懲彼將來謝此衆屈贊增宋卞敬宗甘蕉贊扶疏似樹質則非木高舒垂蔭異秀延矚厥實唯甘味之無足宋宋祁紅蕉贊蕉無中幹花産葉間緑葉外敷絳質凝殷賦增唐韓偓紅芭蕉賦瞥見紅蕉魂隨魄消陰火與朱華共映神霞將日腳相燒謝家之麗句難窮多烘繭紙洛浦之下裳頻换剩染鮫綃鶴頂儘侔雞冠詎擬蘭受露以殊忝楓經霜而莫比趙合德裙間一點願同白玊唾壺鄧夫人額上微殷却賴水精如意森森􅑨􅑨脈脈亭亭蒨玉之瑳來若指彤雲之翦出如屏鶯舌無端妬夭桃而未咽猩唇易染嬲浮蟻以難醒在物無雙於情可溺橫波映紅臉之艷含貝發朱唇之色僧虔蜜炬爍柱棟以難藏潘嶽金釭蔽繡幃而不隔大凡人之麗者必動物物之尤者必移人不言而信其速如神所以月彩下蠙蛛之水梅酸生鶴嗉之津寧關巧運自合天真有影先知無聲已認體疏而意密迹逺而情近天穿地朽幾人語絶色難逢萬古千秋唯我眷紅英不盡文賦散句增楚屈原九歌傳芭兮代舞梁徐摛冬蕉卷心賦拔殘心於孤翠植晚玩於冬餘枝橫風而悴色葉漬雪而傍枯五言古詩增宋謝靈運芭蕉生分本多端芭蕉知不一含萼不結核敷華何由實至人善取譬無宰誰能律莫昵緣合時當視分散日梁沈約甘蕉抽葉固盈丈擢本信兼圍流甘掩椰實弱縷冠絺衣唐栁宗元紅蕉晚英值窮節緑潤含朱光以兹正陽色窈窕凌清霜逺物世所重旅人心所傷回暉眺林際戚戚無遺芳姚合芭蕉屏芭蕉叢叢生日照參差影數葉大如牆作我門之屏稍稍聞見稀耳目得安靜杜牧芭蕉芭蕉為雨移故向忩前種憐渠點滴聲留得歸鄉夢夢逺莫歸鄉覺來一翻動宋狄遵度詠芭蕉植蕉低簷前雙叢對含雨葉間求丹心一日視百俯胸中數寸赤不惜為君吐心盡腹亦空况復霜雪苦非無後凋意柔脆不足禦明袁凱詠池上芭蕉亭亭虛心植冉冉繁隂布既掩猗蘭砌還覆莓苔路卷舒今自知衰榮隨所寓默契方在兹臨軒挹清醑顧璘蕉石亭怪石如筆格上植蕉葉青蒼然太古色得爾增娉婷欲攜一斗墨葉底書黃庭拂拭坐盤薄風雨秋冥冥七言古詩增宋楊萬里芭蕉雨芭蕉得雨便欣然終夜作聲清更妍細聲巧學蠅觸紙大聲鏗若山落泉三點五點俱可聽萬籟不生秋夕靜芭蕉自喜人自愁不如西風收却雨即休明吳寬芭蕉老卉呈嬌紅破葉留故緑正當零落時對此殊不俗我思石田生秋色填滿腹腹中抑鬱無奈何信手寫之忽盈幅滚滚白露初為霜苔花冷蝕山骨蒼眼昏錯道逢仙子緑絲步障紅綃裳五言律詩增唐錢起芭蕉幸有青絲用寧將衆草同心虛含夕露葉大怯秋風細響安禪後濃隂坐夏中由來何所喻持以問支公七言律詩增宋蘇轍新種芭蕉芭蕉移種未多時濯濯芳莖已數圍畢竟空心何所有欹傾大葉不勝肥蕭騷暮雨鳴山樂狼籍秋霜脫敝衣堂上幽人觀幻久逢人指示此身非明王守仁書庭蕉簷前蕉葉緑成林長夏全無暑氣侵但得雨聲連夜靜何妨月色半牀陰新詩舊葉題將滿老芰疏桐恨轉深莫笑鄭人談訟鹿至今醒夢兩難尋張綖詠芭蕉長葉翩翻緑玉叢植來况是近梧桐美人間立秋風裏羈客孤眠夜雨中情逐舞鸞偏易感事隨夢鹿渺難窮太湖石畔新涼院何處吹簫月滿空五言排律原明徐茂吳根自蘇臺徙陰生蔣徑幽當空炎日障倚檻碧雲流未展心如結微舒葉漸抽瑣窗迷翠黛張幕動青油書借臨池用光分汗簡留流甘掩中土為綌衣南州只益莓苔潤翻令蕙若憂荷風同委露梧葉共鳴秋夢境知誰得人生似爾浮漫勞彈事苦終日傍林丘七言排律增明僧良琦戲題陰涼室階前芭蕉新種芭蕉繞石房清陰早見落書牀根霑零露北山潤葉帶濕雲南澗涼得地初依蒼石瘦抽心欲並緑筠長雨聲夜響巔崖瀑晴碧朝浮海日光樗櫟自慚全夀命楩楠合愧託岩廊觀身政憶維摩語草字寧追懷素狂白晝棲遲吾計拙青霄偃仰汝身強歲寒要使交期在莫畏空山有雪霜五言絶句增宋路德延芭蕉一種靈苗異天然體性虛葉如斜界紙心似倒抽書曾幾芭蕉以此葉陰涼代彼青琅玕但恐本質脆不堪期歲寒吕本中夢斷添惆悵更長轉寂寥如何今夜雨只是滴芭蕉朱子芭蕉芭蕉植秋檻勿云憔悴姿與君障夏日羽扇寧復持紅蕉弱植不自持芳根為誰好雖微九秋幹丹心中自保王十朋芭蕉草木一般雨芭蕉聲獨多主人栽未足其奈客愁何金姚孝錫芭蕉鳳翅搖寒碧虛庭暑不侵何因有恨事常抱未舒心明高啓芭蕉靜繞緑陰行間聽雨聲卧還有感秋詩窗前書葉破題芭蕉叢蕉倚孤石緑映間庭宇客意不驚秋瀟瀟任風雨原邊貢庭際何所有有萱復有芋自聞秋雨聲不種芭蕉樹增皇甫汸題美人蕉帶雨紅妝濕迎風翠袖翻欲知心不卷遲暮獨無言七言絶句增唐李紳紅蕉花紅蕉花樣炎方識瘴水溪邊色最深葉滿叢深殷似火不惟燒眼更燒身徐凝紅蕉紅蕉曾到嶺南看校小芭蕉幾一般差是斜刀翦紅絹卷來開去葉中安徐寅蕉葉緑綺新裁織女機擺風搖日影離披只應青帝行春罷間倚東牆卓翠旗錢珝未展芭蕉冷燭無煙緑蠟乾芳心猶卷怯春寒一緘書札藏何事會被東風暗拆看宋韓琦芭蕉邊俗稀曾識此科南方地暖北寒多孤芳莫念違天性無奈深恩愛育何梅堯臣和行之都官芭蕉詩看取有心常不展亦知隨分坼佳葩無端大葉映蓮幕却笑菖蒲罕見花賀鑄題芭蕉葉十畝荒池漲緑萍南風不見芰荷生隔忩賴有芭蕉葉未負瀟湘夜雨聲王之道芭蕉秋風鳴玉雨疏疏嫩緑臨忩半卷舒似是相知慰牢落朝來看寄一緘書劉子翬芭蕉攪碎芳眠挾雨聲碧叢宜看不宜聽而今一任瀟瀟滴華髮鰥翁一夜醒方嶽自是愁人愁不消非干雨裏聽芭蕉芭蕉易去愁難去移向梧桐轉寂寥曾雲莊炎蒸誰解换清涼扇影搖搖上竹窗凖擬小軒添睡美夢成風雨夜翻江明湯顯祖雨蕉東風吹展半廊青數葉芭蕉未擬聽記得楚江殘雨夜背燈人語醉初醒原俞琬綸宵來輕雨蕉聲送蕉雨流情情欲凍燕領春風窺幾時開簾放出天涯夢增江西女子一葉芭蕉何處移來一葉青似同羅扇鬬輕盈今宵風雨重門靜減却瀟湘幾點聲詩散句增唐白居易隔窗知夜雨芭蕉先有聲宋宋祁雨凋單蓋側風偃半旗開張耒翠旍舒曉日緑錦障西風楊萬里翠蕉自搖扇白羽得暫間元黃潛芭蕉葉間露風過皆成聲原唐何扶芭蕉半捲西池雨日暮門前雙白鷗增王遒秋宵睡足芭蕉雨又是江湖入夢來宋錢希白緑章封事緘初啓青鳳求凰尾四開張愈生涯自笑惟書在旋種芭蕉聽雨聲張栻退食北窗涼意滿卧聽急雨打芭蕉陸遊茅簷三日瀟瀟雨又展芭蕉數尺陰僧北澗自是秋懷易寂寥強將離緒怨芭蕉唐朱慶餘隔竹見紅蕉李商隱芭蕉開緑扇鄭谷驟雨閙芭蕉朱慶餘劒路紅蕉明棧閣皮日休風扯紅蕉仍换葉溫庭筠曉來微雨蕉花紫杜茍鶴風弄紅蕉葉葉聲宋王安石芭蕉一枕西風雨黃庭堅更展芭蕉夏學書范成大窗外三更蕉葉風陸遊乍出芭蕉一寸青金張藥芭蕉葉斜卷舒雨元仇逺輕摘蕉花曉露晞雅琥翠綃卷雨蕉花老詞增宋張鎡菩薩蠻風流不把花為主多情管定煙和雨瀟灑緑衣裳滿身如許涼文箋如許處似索題新句莫倚小欄干月明生夜寒李易安采桑子窗前誰種芭蕉樹隂滿中庭葉葉心心舒卷餘光分外清傷心枕上三更雨點滴霖霪似唤愁人獨擁寒衾不慣聽僧仲殊玉樓春飛香漠漠簾帷暖一線水沈煙未斷紅樓西畔小欄干盡日倚闌人已逺黃梅雨又芭蕉晚鳳尾翠搖雙葉短舊年顔色舊年心留到如今春不管别録增夢溪筆談豫家所藏摩詰畫袁安卧雪圖有雪中芭蕉此乃得心應手意到便成故其理入神迥得天意原製用蕉根有兩種一種黏者為糯蕉可食取作大片灰汁煮令熟去灰汁又以清水煮易水令灰味盡取壓乾以鹽醬蕪荑椒乾薑熟油胡椒等雜物研浥一兩宿出焙乾略捶令軟全類肉味莎根即香附子另見藥譜增爾雅臺夫須疏夫須莎草也薃侯莎其實媞注夏小正曰薃也者莎䔺媞者其實廣雅地毛莎䔺也陸璣草木疏臺草有皮堅細滑緻可為簦笠以禦雨南山多有爾雅翼莎草可為衣以禦雨今人謂之蓑衣名曰夫須蓋匹夫所須本草莎葉如老韭葉而硬光澤有劒脊稜五六月中抽一莖三稜中空莖端復出數葉開青花成穗如黍中有細子其根有鬚鬚下結子一二枚轉相延生子上有細黑毛大者如羊棗而兩頭尖彚考增詩小雅南山有臺疏臺可為蓑笠都人士云臺笠緇撮周書豆盧寧傳寧善騎射嘗與梁企定遇於平涼州相與肄射乃於百步懸莎草以射之七發五中定服其能春明退朝録河中府有緑莎廳集藻記增宋晏殊庭莎記介清思堂中宴亭之間隙地其縱十八步其橫南八步北十步以人迹之罕踐有莎生焉守護之卒皆疲癃者芟剃之役勞於夏畦蓋是草耐水旱樂延蔓雖拔心隕葉弗之絶也余既恱草之蕃廡而又憫卒之勤瘁思唐人賦詠間多有種莎之説且兹地宛在崇堞車馬不至弦匏不設柔木佳卉難於豐茂非是草也無所宜焉於是傍西墉畫修徑布武之外悉為莎場分命騶人散取增殖凡三日乃備楥之以丹楯溉之以甘井光風四泛纖塵不驚嗟夫萬彚之多萬情之廣大含元氣細入無間罔不稟和罔不期適因乘而晦用其次區别而顯仁措置有規生成有術失之則斁獲之則康兹一物也從可知矣乃今遂二性之域去兩傷之患偃藉吟諷無施不諧然而人所好尚世多同異平津客館尋為馬廏東漢學舍間充園蔬彼經濟所先而汚隆匪一矧茲近玩庸冀永年是用刋辭琬珉庶通賢君子知所留意儻與我同好庶幾不翦也賦增唐蕭穎士庭莎賦并序天寶十載豫以史臣推擇待詔闕下僻直多忤連歲不偶未選敘求參河南府軍事廳階之下蹊有莎草故參軍宋之問徙於伊川而植焉結根五紀綿羃庭際廣纍萬步髙樹十餘間以雜果隂蔽其上俗吏往來必凌踐之歎其稟山野之姿而托非其所以就窘迫因而賦曰厭公門之窘束玩纖草於兹亭奚卑弱之斯極豈雨露之愆靈尚含和以順時隨春夏之凄清軒房洞啓廣階修直槐楊蔽虧桃李對植橫層隂之冥密綴繁英之翕赩既髙低以異姿亦濃淡而殊色胥徒牒訴雜沓乎其側遊塵浮煙蒙翳而不息雖蕭颯以自得亦喧卑而見逼宜夫坐莽浪之野帶江湖之涘託根山阿搖穎緑水芊綿靃靡連亘乎十數里何推遷而連會繆産蒔於庭隅憂好尚之傾奪見芟夷於難除既無心於寵辱又奚議於親疏承斚瀝之甘潤蔽衣襟之曳婁雖為幸於斯日諒稟性之云殊聞哲王之布澤逮蕭葦而霑鋪茍一類而失所猶納隍之在豫矧皇穹之播氣陶庶彚於靈樞曷兹卉之攸託慘終年而莫舒吾將徴宰物之至理聿歸問於玄虛者焉五言律詩增宋宋白庭莎何事牽憂思空庭對野莎青青衝野步落日拄笻過色與莓苔近隂藏蟋蟀多間思舊山下蕭颯遍煙蘿五言排律增唐唐彥謙移莎移從杜城曲置在小齋東正是髙秋裏仍兼細雨中結根妨迸竹疏蔭託髙桐苒苒齊芳草飄飄笑斷蓬片時留靜者一夜響鳴蛩野露通宵滴溪煙盡日蒙試才卑庾薤求味笑周菘只此霜栽好他時贈伯翁詩散句增唐姚合閉門常不出惟覺長庭莎孟浩然炎炎暑退豫齋靜階下叢莎有露光秦敏老樹雨陰渾脫葉緑莎霜後半摧尖李賀老莎如短鏃張籍新雨徑莎肥白居易岸莎青靡靡李咸用莎城緑當山姚合砌莎留宿露許渾城帶晚莎緑皮日休破砌頑莎緑韋莊庭莎緑不芟宋林逋石莎無雨瘦唐李白青莎白石長江邊張籍閉門秋雨濕牆莎白居易青莎臺上起書樓許渾自翦青莎織雨衣杜荀鶴門徑緑莎細接溪薛能地濕莎青雨後天宋張商英細細煙莎遍燒痕茅增爾雅藗牡茅注白茅屬疏茅之不實者也白華野菅注菅茅屬疏菅似茅而滑澤無毛根下五寸中有白粉者柔韌宜為索漚乃尤善吳録地理志桂陽郴縣有青茅可染布零陵有香茅古貢之縮酒格物總論茅叢生荒野間野人刈以覆屋江淮間生者一莖三脊曰菁茅本草白茅根名茹根一名蘭根一名地筋茅葉如矛故謂之茅其根牽連故謂之茹夏花者為茅秋花者為菅一物而名謂不同蘇頌曰處處有之春生芽布地如針俗謂之茅針亦可噉夏生白花茸茸然至秋而枯其根至潔白六月采李時珍曰茅有白茅菅茅黃茅香茅芭茅數種葉皆相似白茅短小三四月開白花成穗結細實其根甚長白軟如筋而有節味甘俗呼絲茅其根乾之夜視有光故腐則變為螢火菅茅只生山上似白茅而長入秋抽莖開花成穗如荻花結實尖黑長分許黏衣刺人其根短硬如細竹根無節而微甘黃茅似菅茅而莖上開葉根頭有毛根亦短而細硬無節秋深開花穗如菅可為索綯古名黃菅香茅一名菁茅一名瓊茅生湖南及江淮間芭茅叢生葉大如蒲長六七尺有二種即芒也彚考增易泰卦初九拔茅茹以其彚征吉注茅之為物拔其根而相牽引者也茹相牽引之貌也大過初六藉用白茅無咎疏薦藉於物用潔白之茅言以潔素之道奉事於上也繫辭夫茅之為物薄而用可重也尚書禹貢包匭菁茅注匭匣也菁以為葅茅以藉酒詩召南野有死麕白茅包之豳風晝爾于茅宵爾索綯小雅白華菅兮白茅束兮禮記郊特牲縮酌用茅明酌也周禮天官甸師祭祀供蕭茅左傳爾貢包茅不入王祭不共無以縮酒寡人是徴注茅菁茅也史記封禪書管仲曰古之封禪江淮之間一茅三脊所以為藉也晉書藝術傳單道開徙臨漳昭德寺於房內造重閣髙八九尺於上編菅為禪室常坐其中南史宋宗室傳江夏文獻王義恭每有祥瑞輒上賦頌大明元年有三脊茅生石頭西岸又勸封禪上甚恱六韜吕尚坐茅而漁管子農趨時就功首戴蒲茅莊子小巫見大巫拔茅而棄此其所以終身弗如黃帝築特室席白茅尹文子堯為天子土階三尺茅茨不翦拾遺記宵明國有焦茅髙五丈燃之成灰以水灌之復成茅也謂之靈茅集藻賦增唐吕巖説靈茅賦有靈茅之繁育稟堪輿之粹精間叢薄以孕彩候韶陽之發生與百卉而同氣擅三脊而異名糅纎條以為族枝連茹以彚征蔓延亭臯鋪敷原陸白華霜淨翠莖雲沃雜春澗之長松亂寒潭之明菊不翦彰帝堯之儉緼袍識子騫之服若乃薈蔚匝地低昻順風或結根於江漢之澳或蓄苗於嶺南之中挺芳心兮䔿䔿吐修葉兮叢叢煙霰之所蕩拂昆蟲之所翳蒙納日月之光照資露雨之霑融東市驗左生之術南征紀周王之功嘉此物之為用蓋今昔之攸同至若錫履於齊俾侯於魯頌容衛之所藉實禮儀之攸覩純束美夫詩人縮酒貢其任土宜有意於遺芳諒無替於終古茅之為物也賤尚見采於先王士之所貴者道豈敢昧於文章慕朝宗之涓滴對辭林而抑揚若邦國之是賴希寄心於棟梁獨孤授江淮獻三脊茅賦茅有衆靈名之為盛雖百代以呈質終三脊以居正每彰封禪之期如受鬼神之命生於古既光七十之君獻於今更表千里之聖出於淮甸來彼江潭使馳於北星流於南捧執而有嚴有異緘縢而再四再三及夫覩至尊呈大國致於金華之上啓於瑤池之側施陳而百瑞慚容撫玩而千官變色美其出有常地生必舊形非成野鹿之禮寧假澄酒之馨超常倫而薦闕殊衆品而實庭理盡三分似叶通三之化體皆一類欲明得一之靈隱見之時吉蠲中禮獨標珍草之狀悉皆兄弟之體整齊而玊匣遙傳潔淨而瓊華新啓應盛禮而居首表常度而為後道未格也雖有采而必無嶽可封焉縱不求而自有觀王者之得失知禮事之臧否且夫玊帛廣矣何尚於茅豈不以貴稱三脊重載六爻始彚征於吳楚終遍藉於陶匏奉上之時且報云亭之兆升中之後因知天地之交吾皇由是命太史詔宗伯議封山謀勒石備文物與禮器修玊函與金策使聖功登於九天靈茅光於三脊使臣稽首稱萬夀以旋役路蕩拔茅賦披大易而探賾偉玄言之杳冥惟乾坤之交泰獲品物之流形惟卦也泰之義廣惟卉也茅之性靈其用也潔身而白當春也應候而青或茂江國或生楚郊三脊之異是稱靈茅刺其無禮詩人引之於純束責其不入諸侯終貢於厥包不然者草則多矣胡著之於繫爻哉故可比君子喻物類惟人也能同其地人易心則兩苦茅分族則雙悴當連茹以相依夫何往而不利是則傳其潔守其貞榮落惟運窮通曷情道或屯蒙滋雨露而育質時逢振拔與連類而共征確乎莫移以保貞吉用之錫命既著之夏典將以縮酒又薦於周室異芝蘭之稟性不用其香等葵藿之有心常思向日歲聿云暮霜風慘栗願當蕪沒之時不棄輕微之質無名氏徴苞茅賦猗彼菁茅挺生不雜縮醪醴以致潔與清明而相合荆人是識將有體其精誠王澤不流遂無聞於賦納故小白仗義夾輔衰周言念彤弓玄矢實征九伯五侯惟苞茅之有闕乃伊人之所羞爾貢或愆於先職王祭誠非於異求有命是遵雖云我疆理無思不服孰云風馬牛於是戒徒無譁命衆以律顧爾心之有二諒我德之惟一楚子承擯以請罪夷吾將事而靡失陳師鞠旅見旌斾之翩翩伏軾致辭想德音之秩秩且曰祭有百籩縮酒為先類生芻而比潔同有藇以告虔職貢斯已爾則不共於命馨香罔薦我將謫見於天豈可狃爾車徒恃乃封守慢上則君臣異等黷兵則齊楚非偶議乎品列我則齒兄弟之二三揆以疆場我則吞荆蠻之八九是以來求獻捷豈敢定居如憂連茹而亡禍之大者乃將任土作貢禮可忽諸於以止戈寰區折衝盞斚侔潔白於粢醍肅君臣於上下太壇之禮成彼菁菁者茅問罪之師罔倦悠悠於野然彼率職四方用賓於王信耀德於千祀豈矜功以一匡異魯隱觀魚以犯憲笑晉文將狩以亂常曷若返行葦之積德遵方物之舊章美哉無私之舉也將歷代而彌光文散句增楚屈原離騷索藑茅以筵篿兮命靈氛為余占之蘭芷變而不芬兮荃蕙化而為茅五言律詩增唐李嶠茅楚甸供王日衡陽入貢年鹿包青野外鴟嘯綺楹前堯帝成茨罷殷湯祭雨旋方期大君錫不懼小巫捐詩散句增唐杜甫荒郊蔓草茅宋林逋茅叢夾舊槎唐唐球風動茅花月滿壇薛逢風茅向暖抽書帶宋陸遊茅葉翻翻帶宿雨别録增南方草木狀芒茅枯時瘴疫大作交廣皆爾也土人呼曰黃茅瘴又曰黃芒瘴拾遺記員嶠山之南有移池國人長三大夀萬歲以茅為衣服皆長裾大袖因風以升煙霞若鳥用羽毛也孫堅母妊堅之時夢一童女負之繞吳閶門外又授以芳茅一莖語曰此吉祥也必生才雄之子兼明書禹貢包匭菁茅即三脊之茅也菁者茅之狀貌菁菁然也三脊之茅諸土不生故楚人特貢之也孔安國云菁可為葅是謂菁為蔓菁也且蔓菁常物所在皆生何必須事楚國匣盛而貢之哉故知孔失之矣埤雅茅體柔而理直又潔白故先王用之以藉亦以縮酒桐柏山志玊霄峰在縣北三十五里産香茅溪蠻叢笑左傳包茅不入包茅山在麻陽茅生脊孟康云靈茅揚雄曰璚茅三脊也爾雅謂藐廣雅謂之茈䓞本草云生楚地三月采隂乾徭人以社前者為佳名鴉御草附録盂增爾雅盂狼尾疏草似茅者一名盂一名狼尾今人亦以覆屋蓬增爾雅齧雕蓬薦黍蓬疏蓬蒿也草之不理者種類非一故有齧雕蓬薦黍蓬埤雅其葉散生如蓬末大於本遇風輒拔而旋彚考增詩召南彼茁者蓬衛風首如飛蓬禮記內則射人以桑弧蓬矢六射天地四方疏蓬是禦亂之草儒行蓬户甕牖疏蓬户謂編蓬為户宋書禮志上古聖人見轉蓬始為輪管子無儀法程式蜚搖而無所定謂之蜚蓬之問蜚蓬之問明主不聽也家語蓬生麻中不扶自直商子今夫飛蓬飄風而行千里乘風之勢也淮南子見飛蓬轉而知為車説苑秋蓬惡於根本而美於枝葉秋風一起根且拔矣列仙傳老萊子蓬蒿為室東觀漢記栗駭蓬轉因遇際會三輔決録張仲蔚與魏景卿俱隱不仕所居蓬蒿至於沒人拾遺記條陽山出神蓬如蒿長十丈周初國人獻之周以為宫柱所謂蒿宫也步里客談古人多用轉蓬竟不知何物外祖林公使遼見蓬花枝葉相屬團圞在地遇風即轉問之云轉蓬也賦增唐蔣防轉蓬賦彼茁者蓬其生苯䔿因驚風之動地遂離根而去本委順而往異愚夫之守株任運則行叶髙人之嘉遁摧弱質絶陳根始遲遲而徐轉俄忽忽而駿奔體以圓而疾質以弱而存凌寒後凋雖有慙於松柏近秋俱敗亦無愧於蘭蓀時也玊露為霜金風應律歎芳菲而難久覩搖落之不一初宛轉以孤翻漸邐迤而連出度平原而暫見映層皋而還失徘徊未巳同風葉之辭枝漂蕩不停甚水萍之委質若乃慘淡雲晚悠揚日短嵗云秋矣莖弱者先衰風以動之根危者易斷徒觀其委地離披縈吹參差既忘懷於近逺寧繫迹於高卑觸物何情類虛舟而自泛善行無迹於野馬而相隨豈不以生無固蒂轉有長風象車輪未始有極如循環莫知所終遊子感而忘歸歎飄居陌上小人見而懷土憶生在麻中矧夫依物暫停遇風復舉乍飄揚以歷亂或回旋而容與青蘋之末不起聊可以躊躇黃埃之中自飛孰知其處所客有因時結念寓物屬詞觀其衰兮懼老將至矣觀其轉也嗟行靡不之撫懷抱起心有之誡驚鬢髮增首如之悲儻陽春之可待亦何恨飄飄於此時文賦散句增漢東方朔七諫蓬艾親入於床第兮馬蘭踸踔而日加桓寬鹽鐵論秋蓬被霜遭風則零落晉嵇康答難養生論昌容以蓬虆易顔宋鮑昭蕪城賦稜稜霜氣䔩䔩風威孤蓬自振驚砂坐飛五言古詩增魏曹植雜詩轉蓬離本根飄颻隨長風何意回飈舉吹我入雲中髙髙上無極天路安可窮類此遊客子捐軀逺從戎毛褐不掩形薇藿常不充去去莫復道沈憂令人老晉司馬彪雜詩百草應節生含氣有深淺秋蓬獨何辜飄颻隨風轉長飈一飛蕩吹我之四逺搔首望故株邈然無由返五言絶句增唐王績入長安詠秋蓬示辛學士遇坎聊知止逢風或未歸孤根何處斷輕葉強能飛辛學士答王績詠秋蓬見示託根雖異所飄葉早相依因風若有便更共入雲飛詩散句增唐李賀西郊寒蓬葉如刺皇天親栽養神驥杜甫孤蓬轉霜根蓬生非無根轉蓬行地逺青蒿增本草青蒿一名草蒿一名方潰一名菣音牽去聲爾雅云蒿菣注云今人呼青蒿香中炙啖者為菣孫炎云荆楚之間謂蒿為菣一名􅀈蒿為其氣息似􅀈一名香蒿夢溪筆談青蒿一類自有二種有黃色者有青色者謂之青蒿陜西綏銀之間蒿叢中時有一兩窠迥然青色土人謂之香蒿莖葉與常蒿亦同但常蒿色緑此蒿色青翠如松檜色至深餘蒿並黃此蒿猶青其氣芬芳本草李時珍曰二月生苗莖粗如指而肥軟莖葉色並深青其葉微似茵陳面背俱青其根白硬七八月間開細黃花頗香結實大如麻子中有細子彚考增詩小雅呦呦鹿鳴食野之蒿後漢書獨行傳向栩拜趙相到官略不視文書舍中生蒿萊博物志周德隆草木茂盛蒿堪為宫柱名曰蒿宫桂海虞衡志大蒿容梧道中久無霜雪處年深滋長大者可作屋柱小亦中肩輿之扛集藻七言絶句增明李東陽拔蒿二絶示諸生委巷回風多暮塵階前老蒿長刺人呼童荷鍤相料理忽見庭花放錦新拔去庭蒿庭始寬向來茅塞本無端誰道人心不如此塞時容易拔時難詩散句增晉嵇康斥鷃擅蒿林附録荻蒿增爾雅蕭荻注即蒿疏今人所謂荻蒿也或曰牛尾蒿似白蒿白葉莖粗科生多者數十莖可作燭有香氣故祭祀以脂爇之為香本草李時珍云曰藾曰蕭曰荻皆老蒿之通名象秋氣肅殺之意彚考增詩鄭風彼采蕭兮一日不見如三秋兮曹風冽彼小泉浸彼苞蕭小雅蓼彼蕭斯零露湑兮大雅取蕭祭脂禮記祭義燔燎羶薌見以蕭光以報氣也附録馬先蒿增本草馬先蒿一名馬新蒿一名馬矢蒿蒿氣如馬矢故名馬先乃矢字之訛馬新又馬先之訛也一名練石草一名爛石草一名虎麻其葉大如茺蔚花紅白色二月始生七月開花似胡麻花而紫赤八月生角似小豆角鋭而長附録黃花蒿增本草黃花蒿一名臭蒿一名草蒿與青蒿相似但此蒿色深帶淡黃氣辛臭不可食附録角蒿增本草角蒿似白蒿花如瞿麥紅赤可愛子似王不留行黑色作角長二寸許微彎葉似蛇床青蒿子角似蔓青青黑而細秋熟附録茵陳蒿原茵陳蒿唐本草云此雖蒿類經冬不死更因舊苗而生故名因陳後加蒿字耳按廣雅作因塵生泰山及丘陵坡岸上近道亦生不如泰山者佳春初生苗髙三五寸葉似青蒿而緊細背白五月七月采莖葉隂乾性苦平微寒無毒治風溼寒熱邪氣熱結黃疸江南所用者莖葉皆似家茵陳而大髙三四尺氣極芬香味甘辛吳中所用乃石香葇也誤作解脾藥服大令人煩山茵陳二月生苗其莖如艾葉如淡青蒿背白葉岐緊細而匾整九月開細黃花結實大如艾子亦有無花實者集藻賦散句增宋洪舜俞老圃賦酣糟紫薑之掌沐醯青陳之絲詩散句原明王世貞坐來薜荔時添潤齋罷茵陳尚送香别録原製用蔞蒿菜蔞蒿即茵陳嫩苗以沸湯瀹過浸於漿水則成虀如以清水或石灰水礬水拔之去其猛氣曬乾可留製食醃焙乾極香美蔞蒿根醃曬乾或仍蒸曬皆可御定佩文齋廣羣芳譜卷八十九
