body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九十卉譜菰原菰一名茭草江南人呼菰為茭以其根交結也一名蔣草蒲類也根生水中江湖陂池中皆有之江南兩浙最多葉如蔗荻春末生白芽如筍名菰菜又名茭白一名蘧蔬爾雅云出隧蘧蔬注云蘧蔬似土茵生茭草中味清脆生熟皆可啖其中心白薹如小兒臂軟白中有黑脈名菰手作首者非本草云菰手小者擘之内有黒灰如墨者名烏鬱八月開花如葦莖硬者謂之菰蔣草至秋結彫胡米廣雅云蔣菰也其米謂之彫胡一名茭米一名雕蓬一名彫苽一名蔣長寸許霜後採大如芽針皮褐色米白而滑膩嵗饑人以當糧作飯香脆氣味甘冷滑無毒利五臟邪氣治心胸浮熱除腸胃熱痛解酒皶面赤白癩􅊓痬去煩止渇一種不結實惟堪作薦故爾雅云齧雕蓬薦黍蓬黍蓬即茭之不結實者楊升庵巵言謂黍蓬乃旱蓬青科結實如黍羌人食之今松州有之恐另是一種増本草蘇頌曰其根相結而生久則并生浮於水上謂之菰葑刈去其葉便可耕蒔又名葑田彚考増禮記曲禮稻曰嘉蔬注稻菰蔬之屬也内則食蝸醢而苽食雉羮注苽雕胡也疏以蝸為醢以苽米為飯以雉為羮三者味相宜周禮天官魚宜苽宋史禮志太宗景祐三年禮官宗正請每嵗秋仲月嘗酒嘗稻蔬以茭筍西京雜記太液池邊皆是彫胡紫蘀綠節之類菰之有米者長安人謂為彫胡葭蘆之未解葉者謂之紫蘀菰之有首者謂之綠節㑹稽人顧翺少失父事母至孝母好食彫胡飯常帥子女躬自採擷還家導水鑿川自種供養每有贏儲家亦近太湖湖中後自生彫胡無復餘草蟲鳥不敢至焉遂得以為養郡縣表其閭舍世説張季鷹在洛見秋風起因思吳中菰菜羮鱸魚膾曰人生貴得適意爾何能羈宦數千里以要名爵遂命駕便歸丹鉛縂録説文彫苽一名蔣徐鉉曰彫苽西京雜記及古詩多作雕胡内則注作雕胡亦作安胡枚乗七發安胡之飯注今所食茭苗是也宋玊賦主人之女炊雕胡之飯爾雅齧雕蓬孫炎云米茭也米可作飯古人以為五飯之一周禮魚宜苽干寳云苽米飯膳以魚同水物也其米色黑管子謂之雁膳杜詩波漂菰米沈雲黑也學圃餘疏茭白以秋生吳中一種春生者曰吕公茭以非時為美集藻文賦散句増楚屈原大招設菰粱只漢司馬相如子虚賦東蘠彫胡上林賦蔣苧青薠張衡七辨㑹稽之菰晉郭璞江賦泛之以游蔣五言古詩増梁沈約詠菰結根布洲渚垂葉滿臯澤匹彼露葵羮可以留上客五言絶句増宋劉子翬茭筍秋風吹拆碧削玉茹芳根應傍鵝池發中懐灑墨痕朱子茭筍寒茭翳秋塘風葉自長短刳心一飽餘并得牀敷軟七言絶句增宋陸游鄰人送菰菜張蒼飲乳元難學綺季餐芝未免饑稻飯似珠菰似玊老農此味有誰知詩散句増唐王維青菰臨水映白鳥向山翻杜甫滑憶彫胡飯香聞錦帶羮秋菰為黑穗精鑿成白粲宋蘇軾水木漸幽茂菰蒲雜游龍原唐張泌空江浩蕩景蕭然盡日菰蒲泊釣船増宋陸游二升菰米晨炊飯一椀松燈夜讀書原明孫齊之留得博山爐内火待君今日進雕胡増晉張載春菰牙露翠唐王維香飯青菰米楚人菰米肥李白菰蔣生綠池原杜甫白蔣風飈脆增杜甫彫胡炊屢新飯抄雲子白朱慶餘菰葉寒塘晩宋陸游粥鐺菰米滑元王逢細雨菰生米唐張籍茫茫菰草平如地羅隠道傍菰葉碎羅巾韋莊繞陂煙雨種菰蔣宋陸游秋菰出水白於玉别録原種植榖雨時於水邊深栽則筍肥大盛野生者増種樹書茭白根逐年移動生者不灰原製用彫胡米合粟為粥可食其葉可作薦刈以秣馬甚肥增齊民要術菰米飯法菰榖盛常囊中擣瓷器為屑勿令作末内常囊中令滿板上揉之取末一作可用升半炊如稻米真臘風土記有茭漿酒葢有一等茭末生於水濱其漿可以釀酒原禁忌菰之種類皆極冷不可過食性滑發冷氣令人下焦寒同蜜食發痼疾服巴豆人忌食蒲增爾雅莞苻蘺其上蒚注今西方人呼蒲為莞蒲蒚謂其頭臺首也今江東謂之苻蘺西方亦名蒲中莖為蒚用之為蓆史記索隠蒲是草之美者故禮有蒲璧格物縂論蒲草叢生多種於田間莖長者可六七尺三脊無葉如薤二三月生苗八九月收可為蓆彚考原詩王風揚之水不流束蒲陳風彼澤之陂有蒲與荷增詩小雅下莞上簟乃安斯寢箋莞小蒲之席也魚在在藻依于其蒲大雅維筍及蒲箋蒲深蒲也深蒲謂蒲蒻入水深醢人注云深蒲蒲始生水中是也左傳仲尼曰臧文仲下展禽廢六闗妾織蒲三不仁也晏子曰澤之􅍉蒲舟鮫守之漢書路温舒傳溫舒父為里監門使溫舒牧羊溫舒取澤中蒲截以為牒用寫書東方朔傳朔曰孝文皇帝莞蒲為席注莞夫離也今謂之葱蒲以莞及蒲為席尚質也晉書忠義傳王育少孤貧為人傭牧羊每過小學必歔欷流涕時有暇即折蒲學書石季龍載記季龍下書曰解西山之禁蒲葦魚鹽除嵗供之外皆無所固公侯卿牧不得規占山澤奪百姓之利山海經孟于之山其草多菌蒲洞㝠記帝起俯月臺眺月亦曰眺蟾臺酌雲菹酒菹以𤣥草黑蕨金蒲甜蓼秦記苻洪之先居武都家生蒲長五丈狀如竹咸異之謂之蒲家因以氏焉洪後以䜟文草付應王遂改姓苻氏三秦略記鬲城東南有蒲臺秦始皇東遊海上於臺上蟠蒲繋馬至今歳蒲生縈委若有繋狀似水楊可以為箭酉陽雜俎婚禮納采有九子蒲朱葦蒲葦為心可屈可伸也集藻五言古詩增晉無名氏拔蒲青蒲銜紫茸長葉復從風與君同舟去拔蒲五湖中朝發桂蘭渚晝息桑榆下與君同拔蒲竟日不成把宋謝朓蒲生行蒲生廣湖邊託身洪波側春露惠我澤秋霜縟我色根葉從風浪常恐不永植攝生各有命豈云智與力安得遊雲上與爾同羽翼詠蒲離離水上蒲結水散為珠閒厠秋菡蓞出入春鳬雛初萌實雕俎暮蕊雜椒塗所悲塘上曲遂鑠黄金軀梁元帝賦得蒲生我池中池中種蒲葉葉影蔭池濱未好中宫薦行堪隱士輪為書聊可截匹栁復宜春瑞葉生苻苑縷碧獻周人唐李白魯東門觀刈蒲魯國寒事早初霜刈渚蒲揮鎌若轉月拂水生連珠此草最可珍何必貴龍鬚織作玊床席欣承清夜娛羅衣能再拂不畏素塵蕪韓愈青青水中蒲三首青青水中蒲下有一雙魚君今上隴去我在與誰居青青水中蒲長在水中居寄語浮萍草相隨我不如青青水中蒲葉短不出水婦人不下堂行子在萬里明薛蕙詠蒲昔聞詠塘上今見翫池中紫茸含細蕊緑帶舞輕叢蜻蜓髙下逐翡翠徃來通徘徊桂蘭渚竟日與君同七言古詩増宋徐似道觀蒲圎蒲相將結僧夏荷葉蒲茸緑相亞浮花浪葉自飄零小院迴廊正瀟灑葉如青幄花成茵細腰起舞來送春紙光如銀墨如漆落筆四座驚有神輕衫短帽付餘子花前醉倒輸閑人七言律詩増唐徐寅詠蒲濯秀盤根在碧流紫英含露向晴抽編為細履隨君步織作輕帆送客愁疎葉稍為投餌釣密叢還礙採蓮舟鴛鴦鸂鶒多情甚日日雙雙遶傍游五言絶句増宋王安石蒲葉蒲葉清淺水杏花和暖風地偏縁底緑人老為誰紅七言絶句增唐陸龜䝉種蒲杜若溪邉手自移旋抽煙劒碧參差何時織得孤帆去懸向秋風訪所思詩散句増魏甄后蒲生我池中其葉何離離唐王維清淺白石灘緑蒲向堪把韓愈我有一池水蒲葦生其間白居易澹澹春水暖東風生緑蒲金蔡珪籬落半流水茁茁青蒲芽原晉謝靈運新蒲含紫茸増梁簡文帝日照蒲心暖周庾信水蒲開晩結原唐李白鴛鴦緑蒲上杜甫風斷青蒲節碧節吐寒蒲增韓愈水漲減蒲芽張籍紫蒲生濕岸李賀河蒲聚紫茸朱慶餘潭清蒲遶岸許渾紫蒲低水檻宋陸游秋聲滿緑蒲朱子戢戢澗中蒲唐孟郊池中春蒲葉如帶朱慶餘青蒲映水疎還密羅隱緑蒲低雨釣魚歸韋莊蒲生岸脚青刀利元趙孟頫雨足蒲芽緑更肥别録原周禮春官子執穀璧男執蒲璧增漢書儒林傳趙綰王臧請立明堂以朝諸侯不能就其事乃言師申公於是上使使束帛加璧安車以蒲裹輪駕駟迎申公唐書李密傳密以蒲韉乗牛挂漢書一帙角上行且讀東觀漢記劉寛遷南陽太守温仁多恕吏民有過但用蒲鞭罰之示辱而已齊民要術詩義疏曰蒲深蒲也周禮以為菹謂蒲始生取其中心入地者蒻大如匕柄正白生噉之甘脆又煮以苦酒受之如食筍法大美今吳人以為菹又以為酢埤雅蒲穀璧禮圖悉作草稼之象今人發古冡得蒲璧乃刻文蓬蓬如蒲花敷時穀璧如粟粒爾澄懐錄山齋之用采蒲花如栁絮者熟鞭貯以方青囊作坐褥或卧褥春則暴收甚温燠木棉不及也附録香蒲增本草香蒲一名甘蒲一名醮石埤雅云叢生水厓似莞而褊有脊蘇頌曰春初生嫩葉出水時紅白色茸茸然至夏抽梗於叢葉中花抱梗端俗謂之蒲槌亦曰蒲萼花其蒲黄即花中蕊屑也細如金粉當欲開時便取之李時珍曰八九月收葉以為蓆亦可作扇軟滑而温附録蘱増爾雅蘱薡蕫疏狀似蒲而細可為屩亦可為綯以為索蘆按蘆荻二物相類而異種蘆大而中空凡曰葭曰葦曰華曰䒒一物五名皆蘆也荻小而中實凡曰萑曰藡曰菼曰鵻曰薍曰鳥蓲曰馬尾一物八名皆荻也増本草蘆有數種其長丈許中空皮薄色白者葭也蘆也葦也短小於葦而中空皮厚色有清蒼者菼也薍也荻也荏也其最短小而中實者蒹也薕也皆以初生已成得名原蘆一名葦爾雅云葦醜䒒疏云葦即蘆之成者其類皆有䒒秀一名葭爾雅云葭華註云即今蘆也葭蘆註云葦也詩正義云葦之初生其名為葭稍大為蘆長成乃名為華花名蓬蕽筍名虇生下濕地處處有之葉四向而垂中心抽幹長丈許中虚皮薄色青老則白莖中有白膚較竹紙更薄身有節如竹葉隨節生若箬葉下半裹其莖無旁枝花白作穗若茅花根若竹根而節疎堪入藥取水底味甘辛者去鬚節及黄赤皮其露出水外及浮水中者不堪用荻一名菼一名薍一名雈詩正義云初生為菼長大為薍成則為萑一名鵻江東呼為鳥蓲或謂之藡至秋堅成謂之荻其初生三月中其心挺出其下本大如箸上銳而細揚州人謂之馬尾蒹一名薕埤雅云今人以為薕箔因此為名似雈而細髙數尺中實是數者皆蘆類也其花皆名䒒其萌名虇堪食如筍可煮食亦可鹽淹致逺又有名􅀢者亦蘆之一種用以被屋可數十年增丹鉛錄所謂蘆葦通一物也所謂蒹今作薕者是也所謂菼人以當薪爨者也今人罕能别蒹菼與蘆葦又北人以蘆與葦為二物水傍下濕所生者為葦其細不及指人家園池間所植者為蘆其幹差大深碧色者為碧蘆亦難得彚考増易説卦震為雈葦疏雈葦竹之類也詩召南彼茁者葭衛風葭菼掲掲誰謂河廣一葦杭之秦風蒹葭蒼蒼白露為霜豳風八月雈葦小雅有漼者淵雈葦淠淠大雅敦彼行葦牛羊勿踐履方苞方體維葉泥泥疏言周之先王忠厚之至見敦敦然道旁之葦乃禁牧者爾所牧牛羊勿得踐履折傷之何則此葦方欲茂盛方欲成體維其葉泥泥然少而美好以其將為人用故愛惜之禮記月令季夏之月命澤人納材葦周禮地官以土㑹之法辨五地之物生五曰原隰其動物宜羸物其植物宜叢物註叢物雈葦之屬晉書文苑傳羅含轉州别駕以廨舍諠擾於城西池小洲上立茅屋伐木為材織葦為席而居南史隱逸傳陶𢎞景年四五歲恒以荻為筆畫灰中學書唐書藩鎮傳李全忠范陽人仕為棣州司馬有蘆生其室一尺三節怪之以問别駕張建建曰蘆茅類生於澤公茅土兆也傳節者其三世乎穆天子傳珠澤之藪方三十里爰有雚葦莞蒲茅萯蒹葽淮南子雁銜蘆而翔以避繒繳蘆苻之厚通於無㙬而復反於敦龎髙誘注厚猶薄也蘆葦苻蘆之中白苻言其薄柯則歸於葦故曰反於敦龎也㙬音垠列仙傳老萊子楚人逃世耕於䝉山之陽莞葭為牆蓬蒿為室樹木為牀蓍艾為席葅芰為食原吴越春秋伍員奔吳至江江中有漁父乗船從下方泝水而上子胥呼之謂曰漁父渡我如是者再漁父欲渡之適㑹旁有人窺之因而歌曰日月昭昭乎侵已馳與子期乎蘆之漪子胥即止蘆之漪漁父又歌曰日已夕兮予心憂悲月已馳兮何不渡為事寖急兮當奈何子胥入船漁父知其意也乃渡之千潯之津子胥既渡漁父乃視之有甚飢色乃謂曰子俟我此樹下為子取餉漁父去後子胥疑之乃潛身於深葦之中有頃父來持麥飯鮑魚羮盎漿求之樹下不見因歌而呼之曰蘆中人蘆中人豈非窮士乎如是至再子胥乃出蘆中而應增崔豹古今注傳曰萑葦有叢吕氏春秋湯始得伊尹祓之於廟薫以萑葦周禮卿大夫之子名曰門子論語誰能出不由户故用葦者欲人子孫蕃殖不失其類有如萑葦西京雜記太液池邊皆是彫胡紫蘀緑節之類葭蘆之未解葉者長安人謂之紫蘀抱朴子吳世有姚光者有火術吳主身臨試之積荻數千束光居其上又以數千束荻累之因猛風燔之火盡光端坐灰中振衣而起汝南先賢傳鄭敬居千蟻陂之陽以漁釣自娱彈琴咏詩常方坐於陂側以蒹葭為席常隨杞栁之陰水經注沔水又東逕豬蘭橋橋本名荻蘭橋橋之左右豐蒿荻拾遺記蓬萊山有葭紅色可編為席溫柔如罽毳焉顔氏家訓梁世彭城劉綺早孤家貧燈燭難辦常買荻尺寸折之燃明夜讀酉陽雜俎仙藥有青津碧荻清異錄蘆之為物大類此君但霜雪侵陵改素為愧耳故好事君子號蘆為蕭寒郡假節侯余銜命渡淮入廣陵界維舟野次縱步至一村圃有碧蘆方數畆中隱小室榜曰秋聲館時甚愛之不知誰家之别墅意主人亦雅士也吴船録蜀州郡圃内西湖極廣蘆花甚盛燕都游覽志韋中貴别業四圍多水荻花蘆葉寒雁秋風令人作江鄉之想花史青浦周士亨江有年相友善一日九月中偕徃渭塘舟次塘東泊一樓下其樓不甚髙樓上二女一白面一紅顔倚忩笑語兩生仰視漫賦一詩曰夙有烟霞癖翛然興不羣秋聲飛過雁水面洞行雲逸思乗時發詩名到處聞扁舟涉方社更喜挹清芬葢其詩直寫心懐初不謂二女也樓上乃大聲曰舟中有詩樓上豈無詩乎遂朗吟一韻兩生側耳聽之一女吟曰湖天秋色物凋殘花吐黄芽葉未乾夜月一灘霜皎皎西風兩岸雪漫漫為毡却羡漁翁樂充絮誰憐孝子單忘在孤舟叢裡宿曉來誤作玊濤看一女吟曰金風稜稜澤國秋馬蘭花發滿汀洲富春山下連漁屋采石江頭映酒樓夜月光䝉銀露浴夕陽陰暗錦鱗浮王孫醉起應聲怪鋪著黄絲毯不收吟畢共笑乃以蓮房藕梢俯擲兩生舟兩生共起上岸大呼欲登樓尋之恍惚間不聞女聲樓亦不見兩生大駭返舟四顧但見蘆花白蓼花紅耳士亨遂更號蘆汀漁叟有年更號蓼塘居士以識其異云原代州志雁門山嶺髙峻鳥飛不越惟有一缺雁來徃向此中過號雁門山中多鷹雁至此皆相待兩兩隨行銜蘆一枝鷹懼蘆不敢捉増福州府志荻蘆峽在連江縣秦始皇以東南有王氣鑿山至此荻蘆根長數丈朝開夕合夢神人曰可夕置畚鍤於此根可立斷也旦如其言果斷為峽亷州府志轆轤山在靈山縣山勢髙大四時雲霧不散山多蘆竹故曰綠蘆集藻文散句増漢王逸九思雚葦兮仟眠五言古詩増梁元帝賦得春荻翠菼玊池前遙映江南蓮非秋無有眊未曉不生烟宋司馬光咏葦索索夕風遒瀼瀼朝露裛啅雀裊寒枝宿螢依敗葉𦕈然秋興長坐與江湖接蘇軾和子由記園中草木蘆筍初似竹稍開葉如蒲方春節抱甲漸老根生鬚不愛當夏緑愛此及秋枯黄葉倒風雨白花搖江湖江湖不可到移植苦勤劬安得雙野鴨飛來成畫圖蘇轍賦園中所有蘆生井欄上蕭騷大如竹移來種堂下何爾短局促莖青甲未解枯葉已可束蘆根愛溪水餘潤長鮮綠强移性不遂灌水惱僮僕晡日下西山汲者汗盈掬明吳寛蘆江湖渺無際彌望皆髙蘆蘆本水濱物久疑平陸無移根偶種植溝淺土不汚縱横忽遍地葉捲多葭莩白花可為絮長幹須人扶每當風雨夕蕭蕭亦江湖宛如扁舟過榜人共歌呼浩然發歸興豈為思蓴鱸七言古詩原明陳繼儒蘆花歌蘆花作主我作客蘆花㸃頭我拍膝白鷗銜住緑蓑衣使我欲行行不得我醉欲倩蘆花扶蘆花太嬾可奈何不如呼出青天月大家躍入金葫蘆五言律詩原唐杜甫蒹葭摧折不自守秋風吹若何暫時花戴雪幾處葉沈波體弱春苗早叢長夜露多江湖後搖落亦恐嵗蹉跎増姚合種葦欲種數莖葦出門來徃頻近坡收本土選地問幽人靜看惟思長初移未覺匀坐中尋竹客將去更逡巡薛能使院栽葦戞戞復差差一叢千萬枝格如僧住處栽得吏閑時笋自㕔中出根從府外移從軍無宿例空想夜風吹曹松友人池上詠蘆秋聲誰種得蕭瑟在池欄葉澁栖蟬穏叢疎宿鷺難歛烟宜闕字下颯吹省先寒此物生蒼島令人憶釣竿顧少府池亭葦池上分行種公庭覺少塵根離潮水岸韻爽判曹人正午迴魚影方昏息鷺身無時不動咏滄海島思頻張蠙叢葦叢叢寒水邊曾折釣魚船忽與亭臺近翻嫌島嶼偏花明無月夜聲急正秋天遙憶巴陵渡殘陽一望煙宋邵雍答人乞碧蘆草有可嘉者莫將蕭艾儔扶疎全類竹蒼翠特宜秋風雨聲初入江湖思莫收無功濟天下藉此一淹留原楊萬里咏蘆避世水雲國卜隣鷗鷺家風前揮玉麈霜後幻楊花骨相縁詩瘦秋聲訴月華欲招盧處士歸去作生涯増金吳激蘆花天接蒼蒼渚江涵裊裊花秋聲風似雨夜色月如沙澤國幾千里漁村三兩家翻思杏園路鞭裊帽簷斜七言律詩增唐張祜咏蘆鑿地栽蘆貯碧流臨軒一望似汀洲蔥瓏好映淮南樹疎雨偏宜海上鷗歴歴迎風欹枕曉蕭蕭和雨捲簾秋君看范蠡功成後不道烟波無去舟李商隠出闗宿盤豆館對叢蘆有感蘆葉梢梢夏景深郵亭暫欲灑塵襟昔年曾是江南客此日初為闗外心思子臺邊風自急玉娘湖上月應沈清聲不逐行人去一任荒城伴夜砧羅鄴蘆花如練如霜乾復輕西風處處拂江城長垂釣叟看不足暫泊王孫愁亦生好傍翠樓妝月色枉隨紅葉舞秋聲最宜羣鷺斜陽裏閑捕纎鱗傍爾行宋蕭天山蘆筍江客因貧識荻芽一清塵退雜魚蝦燒成味挾濠邊雨掘得身離雁外沙春饌且供行釡菜秋江莫管釣船花食根思到蕭騷葉痛感邊聲咽戍笳朱松蘆檻手斸脩蘆著檻栽使君公退幾徘徊想當風雨翻叢急疑卷江湖入座來未辦松忩眠緑浦且將屐齒印蒼苔種成桃李人間滿應念孤根首屢囘元吳景奎蘆花褥搖落蒹葭白露霜冰綃覆䕶帶幬張瓊臺積雪和烟凝銀浦流雲入夢香失紖曾憐衣冷落吐茵空染酒淋浪雁聲彷彿瀟湘夜起坐俄驚月一牀明徐􅎾蘆花江畔洲前白渺茫蕭蕭摵摵鬭秋光輕風亂播漫天雪斜月微添隔岸霜半夜雁羣清避影數聲漁笛淡吹香瓊枝玊樹分明見愁絶懐人水一方五言排律増唐王貞白蘆葦髙士想江湖閒庭徧植蘆清風時有至緑竹興何殊嫩喜日光薄疎憂雨㸃麤驚蛙跳得過鬭雀裊如無未織巴籬䕶幾擡卭竹扶惹煙輕弱栁蘸水潄清蒲溉灌情偏重琴尊賞不孤穿花思釣叟吹葉少羌雛寒色暮天映秋聲逺籟俱朗吟應有趣瀟灑十餘株李中庭葦品格清於竹詩家景最幽從栽向池沼長似在汀洲玩好招溪叟棲堪待野鷗影疎當夕照花亂正深秋韻細堪清耳根牢好繫舟故溪髙岸上冷澹有誰遊宋司馬光和人葦花葭菼迷河曲髙秋一畨榮齊紈張野白楚練照川明不夜月長皎踰時雪未晴萬仙霓帔合千畝玊苗生漠漠波瀾偃茫茫砂磧平際空鹽海竭垂地塞雲横日暖鷗無色風高鶴有聲逢君得嘲賦豈愧束薪并五言絶句増宋蘇轍和文與可荻蒲離披寒露下蕭索微風觸摧折有餘音縱横未須束寒蘆港蘆深可藏人下有扁舟泊正似洞庭風日暮孤帆落原潘女郎園亭當水中兩岸蘆花雪夜深人未眠碧水蕩秋月七言絶句增唐朱長文吴興送梁補闕歸朝賦得荻花栁家汀洲孟冬月雲寒水清荻花發一枝持贈朝天人願比蓬萊殿前雪宋宋祁詠蘆裊娜脩莖青玊攢鳬翁睡罷翠痕乾湘君直寄江湖樂要作風汀雨瀨看原蘇軾和文與可洋州園池荻浦雨折霜乾不耐秋白花黄葉使人愁月明小艇湖邊宿疑是江南鸚鵡洲增蘇軾和文與可洋州園池寒蘆港溶溶晴港漾春暉蘆筍生時栁絮飛還有江南風物否桃花流水鮆魚肥詩散句増元姚燧瀕江不可禾歲惟葭葦茁青林無端倪永與江水匹原古詩銜蘆過岱嶺日望鴛鴦洲唐王昌齡出塞復入塞處處黄蘆草李白一一銜蘆枝散落天地間増李白西望白鷺洲蘆花似朝霜杜甫蒹葭離披去天水相與永白居易蕭蕭蘆葉裏風起釣絲斜錢起風晩冷颼颼蘆花已白頭人居蘆葦岸終夜動秋聲原姚合無竹栽蘆看思山疊石為増宋石延年葉嫩藏脩節苞遺出紺膚劉敞蕭蕭江上葦夏生叢已深故移蘆葦叢粗慰江湖趣唐杜甫請看石上藤蘿月已映洲前蘆荻花杜荀鶴秋風忽起溪浪白零落岸邉蘆荻花原張蠙十年九陌寒風夜夢掃蘆花絮客衣宋林逋最愛蘆花經雨後一蓬煙浪飲漁船張載歸雁羈鴻共斷魂荻花楓葉泊孤村蘇庠白蘋滿棹歸來晩秋著蘆花一夜霜增陸游最是平生㑹心事蘆花千頃月明中文天祥滄洲棹影荻花凉欵乃一聲江水長原張一齋忘却蘆花叢裡宿起來誤作雪天吟趙訥軒門外酒帘風未定櫓聲搖玉出蘆花白鳥一雙簾外去蘆花風靜釣舟閒増金劉著八月邊城山未雪蘆花籍籍已漫天原明董其昌葦花平岸帶霜容縂似窗前書帶叢增梁劉孝綽荻苗抽故叢唐儲光羲蘆花白雪飛原杜甫渚秀蘆筍緑增杜甫蘆花留客晩荻岸如秋水李嘉祐荻花寒漫漫司空曙冰霜葭菼變顧非熊疎葦秋前渚張籍洲白蘆花吐白居易紫笋折新蘆錢珝穿蘆覺渚幽羅隠細雨翻蘆葉宋歐陽修春洲生荻芽元馬祖常横浦荻飛綿唐孟浩然月明全見蘆花白李嘉祐楚地蒹葭連海迴陶峴鷺立蘆花秋水明栁宗元蒹葭淅瀝含秋露朱慶餘蘆葦聲多雁滿陂温庭筠夜船聞雨滴蘆花杜荀鶴葦花零落向秋深羅隠短蘆冒土初生筍吴融葦花深處睡秋聲薛濤水國蒹葭夜有霜宋夏竦萍汀殘雨老蒹葭司馬光荻迸短芽淝水暖陸游葦花漠漠弄斜暉朱子兩岸蒹葭秋色裏詞增宋方岳齊天樂孤篷夜傍低叢宿蕭蕭雨聲悲切一片霜痕半山烟色愁到沙頭枯葉淡雲没滅黯吹老西風滿汀新雪天豈無情離筵黙送歸客歸去來兮怎得儘鷺翹鷗倚乍寒時節秋晚山川夕陽浦溆贏得别膓千結濤翻浪疊那得似西來一笻横絶搔首江南雁銜千里月别録増比齊書方伎傳信都芳少明筭術有巧思祖珽謂芳曰律管吹灰術甚微妙絶來既久吾思所不至卿試思之芳遂留意十數日便云我得之矣然終須河内葭灰後得河内葭莩用其術應節便飛餘灰即不動也不為時所重竟不行故此法遂絶云原荆楚歲時記元日懸葦索於門百鬼畏之孝子傳閔子騫事親孝後母生二子衣之絮衣騫以蘆花父察知欲出後母騫告父曰母在一子寒母去三子單遂不出其母亦化而慈増集異記元和中故都尉韋宥出牧温州忽忽不怡江波脩永舟船燠熱一日晩凉乃跨馬登岸依舟而行忽逢淺沙亂流蘆葦青翠因縱轡飲馬而蘆枝有拂鞭者宥因閑援熟視忽見新絲箏絃周纒蘆心宥即援蘆伸絃其長倍尋則試縱之應手復結宥竒駭因寘於懐行次江館即付箏妓曰我於蘆心得之頗甚新緊然沙洲江徼是物何自而來吾甚異之試施於器以聴其音妓將安之更無少異惟絶二三寸耳方饌妓即置之赴食隨置復紉及食罷就視則已蜿蜒舒展蠕蠕搖動妓乃驚告衆來競觀而雙眸瞭然宥駭曰得非龍乎遽命衣冠焚香致敬盛諸盂水之内而投於江纔及中流風浪皆作蒸雲走電咫尺昏晦俄有白龍長百丈挐攫昇天衆咸視之良久乃滅歸田錄先公四歲而孤家貧無資太夫人以荻畫地教以書字畫史余收易元吉逸色筆作蘆如真上一鸜鵒活動晉卿借去不歸埤雅舊云蘆灰缺而月暈移説者以為取蘆草灰隨牖下月光中令圖畫缺其一面則月暈亦缺於上也歐陽𤣥貫雲石神道碑雲石嘗過梁山濼見漁父織蘆花絮為被愛之以綢易被漁父見其貴易賤異其為人陽曰君欲吾被當更賦詩公援筆立成竟持被徃詩傅人間號蘆花道人公自錢塘因以自號羣碎録葭莩之親葭莩蘆管中白衣至薄者也原種植春時取其勾萌種淺水河濡地即生有收其花絮沾濕地即成蘆體縂不如成株者横埋濕地内隨節生株最易長成箬増本草箬一作篛一名􅀢葉生南方平澤其根與莖皆似小竹其節籜與葉皆似蘆荻而葉之面青背淡柔而韌新舊相代四時常青荇原荇一名莕菜一名鳬葵一名水葵一名莕公鬚一名荇絲菜一名水鏡草一名䖂一名屏風一名靨子菜一名金蓮子爾雅翼云花黄色日出照之如金故名一名接余爾雅云莕接余其葉苻處處池澤有之葉紫赤色形似蓴而微尖長徑寸餘浮在水面莖白色根大如釵股長短隨水淺深夏月開黄花亦有白花者實大如棠梨中有細子氣味甘冷無毒治小渇利小便去諸熱毒火丹遊腫彚考増詩周南參差荇菜左右流之洞冥記旦露池西有靈池方四百步有連錢荇荇如錢紋顔氏家訓詩云參差荇菜爾雅云荇接余也字或為莕先儒解釋皆云水草圓葉細莖隨水淺深今是水悉有之黄花似蓴江南俗亦呼為猪蓴或呼為荇菜劉芳具有注釋而河北俗人多不識之博士皆以參差者是莧菜呼人莧為人荇亦可笑之甚原埤雅詩曰參差荇菜左右流之三相參為參兩相差為差參差言其出之無類左右言其求之無方王文公曰接余惟后妃可比焉其德行如此可以比接余草矣若蘋蘩藻所謂餘草舊説藻華白荇花黄顔氏家訓云今荇菜是水有之黄花似蓴是也夫后妃祭荇夫人祭蘩大夫妻祭蘋藻至於盛之湘之奠之無所不為焉亦其位彌髙者其事彌畧之証也又后妃言河夫人大夫妻言澗后妃言洲夫人言沼言沚大夫妻言濱言潦亦言之殺也且蘋蘩蕰藻溪澗沼沚之毛也而荇則異矣故后妃采荇詩傳以為夫人執蘩菜以助祭神饗德與信不求備焉沼沚溪澗之草猶可以薦后妃則荇菜也據此荇菜厚於蘋藻故曰后妃有闗睢之徳乃能共荇菜備庶物以事宗廟荇之言行也蘋言賓藻言澡蘩言盛然則荇菜言采言芼是亦共之而已故教成之祭芼用蘋藻以成婦順増名山記武夷山神人八月十五日㑹村人酒行命食或云㲨即水苔也或云緗即荇也集藻文散句增楚宋玊招魂紫莖屏風五言律詩増宋梅堯臣荇荇葉光於水鉤牽入逺汀淺黄雙蛺蝶五色小蜻蜓老去懐江女飄浮笑楚萍西風莫苦急孤蘂有餘馨詩散句原唐杜甫春光淡沲秦東亭渚蒲芽白水荇青原明彭紹賢泉分石竇瀉珠光坐挹磯邉水荇香增晉張載水荇葉連香宋謝脁魚戲亂水荇梁劉孝威風荇散餘香唐儲光羲淺渚荇花繁宋錢惟演緑荇溢魚防原唐杜甫水荇牽風翠帶長増曹唐迎風細荇傳香粉崔櫓荇花初没舸行時元戴帥初甃塹水温初荇葉别録原製用莖葉根花並可伏硫煮砂制礬用苦酒浸其白莖肥美可以案酒巖棲幽事吾鄉荇菜爛煮之其味如蜜名曰荇酥郡志不載遂為漁人野夫所食此見於農田餘話俟秋明水清時載菊汎泖膾鱸擣橙并試前法同與蓴絲薦酒梧潯雜佩荇菜首見於三百篇吾鄉陂澤中多有之農田餘話謂熟煮其味如蜜名曰荇酥然知之者絶少蘋原蘋説文作薲一名芣菜一名四葉菜一名田字草葉浮水面根連水底莖細於蓴莕葉大如指頂面青背紫有細紋頗似馬蹄决明之葉四葉合成中折十字夏秋開小白花故稱白蘋其葉攢簇如萍故爾雅謂大者為蘋也本草云其葉徑一二寸有一缺而形圓如馬蹄者蓴也似蓴而稍尖長者莕也其花並有黄白二色葉徑四五寸如小荷葉而黄花結實如小黍角者萍蓬草也楚王所得萍實乃此萍之實也四葉合成一葉如田字形者蘋也増本草俗呼破銅錢項氏言白蘋生水中青蘋生陸地按田字草有水陸二種陸生者多在稻田沮洳之處其葉四片合一與白蘋一様但莖生地上髙三四寸不可食謂之水田翁項氏所謂青蘋即此原氣味甘寒滑無毒主治暴熱下水彚考増詩召南于以采蘋南澗之濱禮記昏義芼之以蘋藻周禮春官春入學舍采合舞註采讀為菜蘋藻之屬左傳蘋蘩蕰藻之菜可薦於鬼神可羞於王公酉陽雜俎太原晉祠冬有水底蘋不死食之甚美吴興志白蘋洲在霅溪東南一里乃越女采蘋處梁栁惲為守時賦詩云汀洲採白蘋日暮江南春因以得名集藻文散句増楚屈原九歌鳥何萃兮蘋中五言古詩増魏劉楨贈從弟汎汎東流水磷磷水中石蘋藻生其涯華葉紛擾溺采之薦宗廟可以羞嘉客豈無園中葵懿此出深澤宋梅堯臣孤汀蘋瀟湘歸去人正值江南春始願逢拾羽今乃見採蘋寄語栁使君莫恨日已曛五言律詩増宋徐鉉秋日汎舟賦蘋花素艶擁行舟清香覆碧流逺煙分的的輕浪汎悠悠雨歇平湖滿風涼運瀆秋今朝流咏處即是白蘋洲韓琦長生蘋竒種定仙草長生晉水蘋採芳曾著詠薦潔可供神萬卉衰何速三冬色自新大年如欲較吾豈愧莊椿五言絶句増唐張仲素春江曲搖漾越江春相將採白蘋歸時不覺夜山浦月隨人七言絶句原唐于鵠江南曲偶向江邊採白蘋還隨女伴賽江神衆中不敢分明語暗擲金錢卜逺人明陳繼儒秋老蘋花貼岸開雪鷗一㸃夜飛來逢人盡道游烟雨月白何曾獨上臺詩散句増唐趙冬曦江天千里望惟見緑蘋齊李白淥水明秋月南湖採白蘋原杜甫聞道通舟地江潭隠白蘋増張籍渡口過新雨夜來生白蘋于鄴二月烟波暖南風生綠蘋李羣玉沅湘寂寂春歸盡水綠蘋香人自愁晉張華白蘋開素葉唐劉希夷蘋花日自新夕採弄風蘋王勃風生蘋浦葉徐皓蘋早猶藏葉孟郊白蘋多清風白居易池幽綠蘋合許渾蘋花繞郭香皮日休蘋花染衣白宋司馬光魚驚動蘋葉唐李康成風光搖蕩緑蘋齊白居易細砌池心緑蘋合姚合春風繞郭白蘋生張喬蒹葭浦際叢青蘋皮日休盆池有鷺窺蘋沫宋范成大緑蘋葉齊春漲生御定佩文齋廣羣芳譜卷九十
