body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九十一卉譜萍原萍一名水花一名水白一名水簾一名薸爾雅云萍蓱注云水中浮萍江東謂之薸字説云以與水平故名萍以無定性隨風漂流故名薸處處池沼中有之季春始生楊花入水所化一葉經宿即生數葉葉下有微鬚即其根也浮於流水則不生浮於止水則一夕生九子故名九子萍無根而浮常與水平有大小二種小者面背俱青為萍大者面青背紫為薸一名紫萍今薸有麻薸異種長可指許葉相對聨綴不似萍之點點清輕也增唐夲草萍有三種大者曰蘋中者曰荇小者即水上浮萍原萍乃隂物靜以承陽故曝之不死惟七月中採取揀淨以竹篩攤曬盆水在下承之即枯死曬乾為末可驅蚊蟲味辛寒能療暴熱身癢下水氣勝酒長鬚髮久服身輕善治瘋疾彚考原禮記月令季春萍始生周禮秋官萍氏掌國之水禁注以不沉溺取名增後漢書方術傳華他嘗行道見有病咽塞者因語之曰向來道隅有賣餅人萍虀甚酸可取三升飲之病自當去即如他言立吐一蛇汲冡周書榖雨一日萍始生萍不生隂氣增盈家語楚昭王渡江江中有物大如斗圓而赤直觸王舟舟人取之王大怪之遍問羣臣莫之能識使使聘于魯問于孔子孔子曰此所謂萍實者也可剖而食之吉祥也唯霸者為能獲焉使者返王遂食之大美久之使來以告魯大夫大夫因子遊問曰夫子何以知其然曰吾昔之鄭過乎陳之野聞童謡曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此是楚王之應也吾是以知之范子水萍出三輔色青者善原淮南子萍樹根於水木樹根於土增淮南子海閭生屈龍屈龍生容華容華生蔈蔈生萍藻萍藻生浮草凡浮生不根苃者生於萍藻注海閭浮草之先也屈龍遊龍容華芙蓉草花蔈流也無根水中草淮南畢萬術老血變為萍呂氏春秋菜之美者崑崙之萍渚宮故事宋文帝為宜都王臨川人獻王萍實六子大者如升小者如鶴卵圓而赤初莫有識者以問長史王華曰此萍實也宣尼所謂王者之應雲林異景志浮光多美鴨太原少尹樊千里買百隻置後池載數車浮萍入池使為鴨作茵褥酉陽雜俎臨邑縣北有華公墓尋失唯趺龜存焉石趙世此龜夜常負碑入水至曉方出其上常有萍藻楚辭芳草譜天問曰靡萍九衢言其枝葉分為衢道猶今言花五出六出也南濠詩話魏仲先詩名巨鹿東觀集有咏盆池萍云莫嫌生處波瀾小免得漂然逐衆流真隱者之話言也原江右萍鄉縣相傳楚王得萍實於此邑因以名而范石湖以為去大江遠非是然萍實因渡江而得非謂得之大江中傳聞必有所自未可遽疑其説集藻贊增晉郭璞萍贊蘋之在水猶卉植地靡見其布漠爾鱗被物有常託孰知所自賦增晉夏侯湛浮萍賦步長渠以遊目兮覽隨波之微草紛漂潎以澄茂兮羌孤生於靈沼因纎根以自滋兮乃逸蕩乎波表散圓葉以舒形兮發翠緑以含縹蔭修魚之華鱗兮翳蘭池之清潦既淡淡以順流兮又雍容以隨風有纒薄於岸側兮或回滯乎湍中紛上下其靡常兮漂往來其無窮仰熙陽曜俯憑緑水渟不安處行無定軌流息則寧濤擾則動浮輕善移勢危易蕩似孤臣之介立隨排擠之所往內一志以奉朝兮外結心以絶黨萍出水而立枯兮士失據而身枉覩斯草而慷慨兮固知直道之難爽蘇彥浮萍賦余嘗泛舟遊觀鼓楫川湖覩浮萍之飄浪乃觸水而自居體任適以應會亦隨遇而靡拘伊弱卉之無心合至理之冥符唐常衮浮萍賦居洪泉而不根植者惟浮萍而已矣不懷芳以賈害不衒色以標美動不忤物卑以安已乘流則遊得坻則止如識變而知時似委命而順理故能無幽不涉無逺不尋隨長汀而自泛值驚浪而不沉既不遷其清濁亦可避乎淺深可以明逍遙之意可以警滯著之心然而推移河海凌歷隈澳溜緩則去遲水急則浮速秋遇楓浦與墜葉而齊奔春渡桃源共落花而相逐披拂丹草搖演青蘋出入經其潭洞高下歸其奫淪擇利而行有似見機之士不常厥所同乎漂梗之人歌曰大江之水東西流别有孤萍朝夕浮莫言此中長泛泛終當結實觸王舟趙昻浮萍賦泛泛者萍乘流匪寧殊源比影異沼均形初苒弱兮崎岸乍連延兮廣汀映池兮草色同翠照日兮苔光共青霞凝兮片片成玉月上兮處處疑星入門自媚穠李徒矜其妖艷取足為樂行潦豈小於滄溟觀其枯華有時動靜無必習坎斯止遇亨則逸安卑取順契君子之用心揚波隨流豈漁翁之能詰每托鄰於藻荇不混迹於蓬蓽與菡蓞而相鮮向莓苔而如失實幽賞之可嘉何寓遊之足匹夫物之云云糾纒誰分茨處牆兮或不才而見棄蘭生幽也終以香而自焚惟兹萍矣獨擅其美謙能居下知則樂水鑒攬芳於楚客寧見羞於彝簋象虛舟而不繫或倐往而忽來類至人之無心更出生而入死噫歟植匪深根長無固蒂將舍之而不芟翦豈見用而能種藝鄙朝菌之暫榮笑匏瓜之長繫空慙雨露之恩竊愧陶鈞之惠願同蒹葭比玉而見珍託陋質於池塘之際原明楊雲鶴浮萍賦嗟楊花之漠漠紛辭樹而綿綿乍飄颻於幕底忽蕩漾於池邊雨過易質浸久移妍根無寸蒂葉吐雙駢傍汀蘭而戢戢映岸草之芊芊魚驚跳而忽破風漪斂而還連委柔姿兮曉漲寄弱質兮春田流潦凝兮並止歸波逝兮均遷商羊舞兮保世以滋大肥􅖆見兮聚族而纎旃有似乎邊塞征人關河客子去國辭家流行坎止意忽忽以何之惟蒼蒼之默使感兹萍質悵此萍蹤慨他鄉之萍梗憐知巳之萍逢有如一枝暫棲兩心密契不約而聨無根而蒂始宛轉而密依忽參商而遙逝知宛在兮水中恨長波之靡際嗟嗟每生有識我輩鍾情欣繇合起恨以離生雖離合之皆幻終悵怏而難平若夫合不心醉離不骨驚齊悲愈於一致反寄羡無識之浮萍夏茂卿浮萍賦有序夫萍為風約起滅不常水草中至鮮小瑣細物也顧萍氏掌禁於秋官萍生紀日於月令燕饗則樂嘉賔於魚藻朝會則示周行於鹿蘋萍之時義大矣成都楊令公年方二十視篆梁溪甫下車輒以浮萍一賦見視清華流麗騞然大家夫相如子雲之在蜀都也翩翩皆以賦鳴吐鳳凌雲噴薄西京之上即我明用修楊子靈心作賦秀拔峩睂公豈其苗裔耶遂率爾效顰而抽辭以擬之其詞曰粵萬卉之布彚稟一氣之陶鈞紛紛綸綸職職藝藝育彼池面貼於波紋既曰楊花之轉蛻復云老血之為精巧隨浪以開合逐流水以低平兆翔鴻之始見應榖雨而萌生采芳馨於雷澤擷異美於昆明一名水簾亦呼薸蘋西河之側南澗之濵羌乍斟而止渴朅久服而身輕漢昆明池翠網橫披於曲岸楚昭王渡赤斗直觸於江濆周穆巡方則取摘湖頭以資鶴唼太原吏隱則數車捆載而為鴨茵漂潎連綿馥郁葐蒕可以羞王公可以薦鬼神若夫不根不蒂時合時張江妃題字漢女搴芳翠蓋覆而蛟龍匿影青雷破而明月舒光重疊侵沙開暮春之煙景參差委岸宣大塊之文章紫葉帶流快題詩於李白秋風春草喜琢句於劉商色映菰蒲似罽賔之鋪寶㲲而斜臨曲渚光分杜若如洛姝之遺翠鈿而亂矗橫塘若乃波翻浪急雨驕風妬自西自東曷馮歸路孤標冷淡兮埒孝子之履霜時危震蕩兮恍羈臣之莫訴至若良朋愴别執友臨岐臭蘭偶契金石遽違玉玦遙分於塞外寶叉劃斷於中閨是何異萍水之相遭而瞥焉轉化於天涯胡然而散胡然而聚消息盈虛浮萍莫喻生馬生人倏忽為帝即乾坤亦水上之萍抑蜾螺螟蛉之一致有酒既清有肴既馨太虛為御久鑿奚爭萬期須臾晱㬦電驚毋掘泥以揚波疇皆醉而獨醒縱心浩然何慮何營吾將濯足萬里􅑷身蓬閬而戞長嘯於青冥文賦散句增楚宋玊風賦起於青蘋之末晉劉伶酒德頌俯觀萬物擾擾焉如水之載浮萍郭璞江賦萍實時出而漂泳五言古詩原南齊劉繪咏萍可憐池內萍葐蒕紫復青巧隨浪開合能逐水低平微根無所綴細葉詎須莖飄蕩終難測流連如有情增梁庾肩吾賦得池萍風翻乍青紫浪起時疏密木欲歎無根還驚能有實魏馮元興浮萍詩有草生碧池無根水上蕩脆弱惡風波危微苦驚浪唐李德裕感遇幽澗生蕙若幽渚老江蘺榮落人不見芳香徒爾為不及緑萍草生君紅蓮池左右美人弄朝夕春風吹葉洗玉泉水珠清湛露滋心亦願如此託君君不知宋謝翺萍間稚荷效王司馬體初萍半含絮頃刻開數畝荷生浮其間風雨足解后百年遊子心欲作千歲久昔為浮萍根今為稚荷藕荷高刺已深魚遊觸其首離離荷下萍吹向白魚口明楊基賦得萍贈陳久中浮蹤散寒星一夕生無數魚跳翠乍開漚過青還聚微風和影去急雨連根露惆悵别君時楊花滿衣絮薛蕙咏萍參差如霰布的皪似星出魚戲影初開鳥散文仍密幸因雲雨會且免風波失無裨江海流徒謝芳菲質五言律詩增唐李嶠萍二月虹初見三春蟻正浮青萍含吹轉紫葉帶波流屢逐明神薦恆隨旅客遊既能甜似蜜還繞楚王舟李覯萍盡日看流萍誰原造化情可憐無用物偏解及時生泥滓根萌淺風波性質輕晚來堆岸曲猶得護蛙鳴七言律詩增唐徐夤咏萍為實隨流瑞色新泛風縈草護遊鱗密行碧水澄涵月澀滯輕橈去採蘋比物何名腰下劍無根堪並鏡中身平湖春渚知何限撥破間投獨繭綸明日本貢使咏萍錦鱗密砌不容針只為根兒做不深曽與白雲爭水面豈容明月下波心幾翻浪打應難滅數陳風吹不復沉多少魚龍藏在底漁翁無處下鈎尋五言絶句增唐王維萍池春池深且廣會待輕舟回靡靡緑萍合垂楊掃復開元宋旡萍風波長不定浪迹在天涯莫怨生輕薄前身是柳花七言絶句原唐劉商醉後青月秋風老此身一瓢長醉任家貧醒來還愛浮萍草飄寄官河不屬人增皮日休木蘭後池浮萍嫩似金脂揚似煙多情渾欲擁紅蓮明朝擬附南風信寄與湘妃作翠鈿原陸龜蒙和木蘭後池浮萍晚來風約半池明重疊侵沙緑罽成不用臨池更相笑最無根蒂是浮名原僧可齋咏萍盆池本不種青萍春杪無根也自生人道一宵生九葉不知誰數得分明宋文同可笑口號可笑庭前小兒女栽盆貯水種浮萍不知何處聞人説一夜一根生七莖原劉師邵乍因輕浪疊晴沙又趂回風擁釣槎莫怪狂蹤易飄泊前身不合是楊花乩仙點點青青浮野塘不容明月照滄浪風吹雨逐沙泥上燕子銜來繞畫梁詩散句增魏文帝泛泛緑池中有浮萍寄身流波隨風靡傾宋謝翺浮萍隨漲水上到荷葉端水退不得下猶黏花萼間魏曹植浮萍寄清水隨風東西流晉司馬彪泛泛江漢萍飄蕩永無根何晏願為浮萍草託身寄清池傅玄浮萍無根本非水將何依原唐杜甫萍泛無休日桃隂想舊蹊增宋林景熙栁花滚雪春冥冥溪風一夜吹為萍原乩仙見説楊花能變化是他種子亦輕浮增齊王儉萍開欲半池梁王筠萍生雁鶩池謝朓新萍時合水邢邵新萍巳冒沼唐太宗萍間日影亂原杜甫萍泛若夤緣增劉禹錫風小悲流萍韓愈萍蓋汙池淨風約半池萍白居易紫浮萍泛泛姚合萍任連池緑溫庭筠萍皺風來後萍多釣下遲李中萍嫩鋪波面唐白居易南潭萍開水沉沉姚合浮萍重疊水團圓薛能水風初見緑萍隂逺舸衝開一路萍原宋張先浮萍破處見山影陸遊覆水青萍錦一方别録原製用取浮萍重五午時投厠中絶青蠅五日午時取浮萍隂乾加雄黃作紙纒香燒之能袪蚊蟲七月七日取赤浮萍乾為末遇冬雪寒水調二盞服又用漢椒末拌浮萍末擦身不畏寒藻增博雅夌菜藻也原藻水草也有二種水藻葉長二三寸兩兩相對生即馬藻也聚藻葉細如絲節節連生即水薀也俗名鰓草又名牛尾薀爾雅云莙牛藻細葉蓬茸如絲可愛一節長數寸長者二三十節氣味甘大寒滑無毒去暴熱熱痢止渴凡天下極冷無過藻菜荆揚人遇歲飢以葉當榖食彚考增詩召南于以采藻于彼行潦小雅魚在在藻魯頌思樂泮水薄采其藻左傳蘋蘩薀藻之菜薀藻聚藻也博物志歲欲惡惡草先生惡草者水藻也洞冥記旦露池西有靈池方四百步有倒枝藻枝橫倒水中長九尺餘如結網有野鴨秋鳬及鷗鷖來翔水上入此草中皆不得出如繒網也亦名水網藻酉陽雜俎仙藥有神吾黃藻原埤雅藻水草之有文者出於水下其字從澡言自潔如澡也書曰藻火粉米藻取其清火取其明也山節藻棁蓋非特為取其文亦以禳火今屋上覆橑謂之藻井取象於此亦曰綺井又謂之覆海亦或謂之罳頂風俗通曰殿堂室象東井形刻作荷菱荷菱水草也所以厭火與此同類詩魚在在藻有頒其首王在在鎬豈樂飲酒魚在在藻有莘其尾王在在鎬飲酒樂豈蓋魚性食藻王者德至淵泉則藻茂而魚肥故以頒首莘尾為得其性誥傳曰士卒鳬藻言其和睦歡悅如鳬之戲於水藻也增名勝志青田溪生蕰藻冬天水熱如湯衆魚歸之名曰魚倉集藻解增明李東陽藻軒解青華主人建閥南輿高居江渺搆材為亭甃石為沼層瀾碧皺衆卉雲繞擷芳潄潔名之曰藻客有過者難之曰萬彚藂茁羣植並分巨者為楩櫲秀者為篁筠堅者為檜柏芬者為蘭蓀山苞水葩莫可具陳彼藻之細何足以云主人曰君子設佩聖人取物匪名則嘉惟義斯擇品不必富類不必僻泥形為迂執象為惑子坐聽我言藻之德夫藻者氣孕天秀根含地靈內秉柔質外敷素英不雕而華匪馞其馨順時生者為孫命與物徙者為和光寧負潔以自濯亦何心於行藏客曰可得聞邪主人曰窮海之裔荒溪之涯舟楫之所不至人迹之所不加以汗漫為方以波濤為家雖溷迹於草莽寧委情於泥沙客曰媺哉善藏其用子既出矣請言乎動主人曰或載衣襟或登筐篚滌以甘泉薦以方簋陋末迹於芻蕘耻遺瑕於葑菲繪形則與火齊光比德則與鑑為軌功雖著而不知其勞用非奢而莫閟其美客曰韙哉君子之斐主人曰嘻物貴實用禮戒彌文弗玩其華而采其根楚佩江茝周歌澗蘩桃李薇蕨維葛與蘋匏瓜行葦列國所陳繄藻之德於吾則均朝爾吾居夕爾吾羣匪藻吾軒亦藻吾身下雪民隱上華國勳惟夙夜是存以無負於吾軒客起再拜斂容棘吻君門巍巍矇者莫瞬君行濯濯瑕莫可捃包荒納汙辭不我擯鄙人何知敢謝不敏主人不答莞爾而哂賦增唐郭元超水藻賦遊子行邁登晉山之孤嶽翠溪皛以淪漣紅嶂赫兮崩駁爾其雲崖委溜風壑鳴泉苔彬彪以冒石藻漫莽兮盈川于以采藻于彼行潦沼沚之毛汙潭之草靃靃靡靡泛泛悠悠乍夤緣於春水或羃䍥於春洲觀其往往縈散離離無畔㛹娟島嶼暐曄江漢碎流月於澄波隱孤雲於斷岸生不擇所長亦無叢不資潤於微露不懼威於徑風纎莖璀璀密葉茸茸宿銀塘之白鷺矯清水之文虹則知乘流則遊遇坻則植柔而能全弱而能直其為隱也不居高而處卑其為謙也常韜光而晦色嗟茂族之無托願貞芳之見移生君之銅沼泛君之瑶池雜青蓮與翠荇偶杜若與江蘺生於水兮人不知歲歲年年幽澗垂賦散句增漢司馬相如上林賦唼菁藻詩散句增晉嵇康俯唼緑藻託身洪流唐杜甫北風起寒文弱藻舒翠縷張籍藻密行舟澀金吳激微流帶文藻唐白居易翠藻蔓長孔雀尾緑藻潭中繫釣舟别録原製用二藻皆可食煮熟挼去腥氣米麵糝蒸為茹甚滑美入藥以馬藻為勝附録海藻增爾雅􅙛海薻注一名海蘿夲草一名落首一名藫生海島上黑色如亂髮而大少許葉大都如藻葉陳藏器曰此有二種馬尾藻生淺水中如短馬尾細黑色大葉藻生深海中新羅國葉如水藻而大海人以繩繫腰沒水取之海帶增夲草海帶出東海水中石上似海藻而粗柔韌而長今登州人乾之以束器物綸增爾雅綸似綸組似組東海有之注綸今有秩嗇夫所帶糾青絲綸組組綬也海中草生彩理有象之者因以名云夲草一名昆布生南海葉如手大似蓴紫赤色可搓為索蔛草增夲草蔛草一名蔛菜一名蔛榮所在有之生水旁似澤瀉而小花青白色亦堪蒸啖江南人用蒸魚食甚美五六月采莖暴乾用氣味甘寒無毒主治暴熱喘息小兒丹腫苔原苔一名緑苔一名品藻一名品菭以形如品字也一名澤葵一名緑錢一名重錢一名圓蘚一名垢草增古今注一名緑蘚述異記苔錢一名連錢一名青膚原空庭幽室隂翳無人行則生苔蘚色既青翠氣復幽香花鉢拳峯頗堪清賞欲石上生苔以茭泥馬糞和勻塗潤濕處不久即生增夲草苔衣之類有五在水曰陟釐在石曰石濡在瓦曰屋遊在牆曰垣衣在地曰地衣其蒙翠而長數寸者亦有五在石曰烏韭在屋曰瓦松在牆曰土馬騣在山曰卷柏在水曰藫格物總論苔生於地之隂濕處隂濕氣所生也初生其處漸青成暈斑斑點點久則堆積漸厚如塵埃然又久則微有根葉又能傍緣樹木階砌磚瓦柱礎而上彚考增莊子得水土之際則為蛙濵之衣注青苔也淮南子窮谷之汚生青苔原拾遺記祖梁國獻蔓金苔色如黃金若縈聚之大如雞卵投之水中蔓延於波瀾之上光出照日皆如火生水上也乃於宮中穿池廣百步時觀此苔以樂宮人宮人有幸者以金苔賜之置漆盤中照耀滿室名曰夜明苔著衣襟則如火光增拾遺記岱輿山北有玉梁千丈駕元流之上紫苔覆漫味甘而柔滑食者千歲不飢原宋略王微太保𢎞弟子也吏部尚書江湛舉為吏部郎辭不受與湛書告絶足不踰閫十餘年棲遲環堵之室苔草沒階增遊名山志石簣山緣崖而上高百許丈裏悉青苔無别草木酉陽雜俎慈恩寺唐三藏院後簷階開成末有苔狀如苦苣初生磚上色如鹽緑輕嫩可愛原耕桑偶記石崇砌上就苔蘚刻成百花飾以金玉曰壺中之景不過如是增三峩山記山高多風木不能長枝悉下垂古苔如亂髮鬖挂木上垂至地長數丈彥周詩話東坡梅花詩云憑仗幽人收艾蒳國香和雨入莓苔艾蒳香名正松上莓苔也出本草及沈氏香譜原雲林遺事倪元鎮閣前置梧石日令人洗拭及苔蘚盈庭不留水迹緑縟可坐每遇墜葉輒令童子以針綴杖頭刺出之不使點壞花史王彥章葺園亭疊牆種花急欲苔蘚少助野意而經年不生顧弟子曰叵耐這緑拗兒鞠國在拔野古東北五百里六日行至其國有樹無草但有苔集藻增梁江淹青苔賦有序余鑿山楹為室有苔焉意之所之故為是作云嗟青苔之依依兮無色類而可方必居間而就寂似幽意之深傷故其處石則松栝交隂泉雨長注絶澗俯視崩壁仰顧悲凹􅕑兮唯流水而馳騖遂能﨑屈上生斑駮下布異人貴其貞精道士悅其迥趣咀松屑以高想捧丹經而永慕若其在水則鏡帶湖沼錦匝池林春塘秀色陽鳥好音青郊未謝兮白日照路貫千里兮緑草深乃生水而搖蕩遂出波而沈淫假青條兮總翠借黃華兮舒金遊梁之客徒馬疲而不能去園之女雖蠶飢而不自禁原唐王勃青苔賦并序吾之旅遊數月矣憩乎荒澗覩青苔焉緣巖而上乃喟而歎曰嗟乎苔之生於林塘也為幽客之賞苔之生於軒庭也為居人之怨斯擇地而處無纍于物也愛憎從而生遂作賦曰若夫桂洲含潤松巖祕液繞江曲之寒沙抱巖幽之古石泛回塘而積翠縈修樹而凝碧契山客之寄情諧野人之妙適及其瑶房有寂瓊室無光霏微君子之砌蔓延君侯之堂引浮青而泛露散輕緑而承霜起金鈿之舊感驚玉箸之新行若夫弱質綿羃纎姿布濩措形不用之境托迹無人之路望夷險而齊歸在高深而委遇惟愛憎之未染何悲歡之詭赴宜其背陽就隂違喧處靜不根不蒂無華無影耻桃李之暫芳笑蘭桂之非永故順時而不競每乘幽而自整增楊炯青苔賦粵若稽古聖皇重暉月光開博望之苑闢思賢之堂華館三襲雕軒四下地則經省而書坊人則後車而先馬相彼草木兮或有足言者吁嗟青苔今可得而聞也借如靈山偃蹇巨壁崔嵬畫千峯而錦照圖萬壑而霞開王孫遊兮山之隈披薜荔兮踐莓苔悵容與兮徘徊一去千年兮時不復來至若圓潭寫鏡方流聚玉苔何水而不清水何苔而不緑漁夫遊兮漢川曲歌滄浪兮濯吾足桂舟橫兮蘭枻觸浦漵邅迥回兮心斷續别有崇臺廣厦粉壁椒塗梁木蘭兮椽玳瑁草離合兮樹珊瑚白露下蒼苔蕪暗瑶砌澀瓊鋪有美人兮向隅應門閉兮踟蹰心震蕩兮意不愈顔如玉兮淚如珠請循其本也見商羊兮鼓舞召風伯兮電赴占顧兮離畢星雷闐闐兮雨冥冥皓兮蕩兮見潢汙之滿庭倐兮忽兮視苔蘚之青青爾其為狀也羃䍥綿密浸淫布濩彬駮兮長廊夤緣兮古樹肅兮若逺山之松柏泛兮若平郊之煙霧春淡蕩兮景物華承芳卉兮藉落花歲崢嶸兮日云暮迫寒霜兮犯危露觸類而長其生也蕃莫不文階兮鏤瓦碧地兮青垣别生分類西京南越則烏韭兮緑錢金苔兮石髮苔之為物也賤苔之為德也深夫其為讓也每違燥而居濕其為謙也常背陽而即隂重扃祕宇兮不以為顯幽山窮谷兮不以為沉有達人卷舒之意君子行藏之心惟天地之大德匪豫情之所任賦散句增晉郭璞江賦緑苔鬖髿乎研上孫綽遊天台山賦踐莓苔之滑石五言古詩增梁沈約詠青苔緣階已漠漠泛水復綿綿微根如欲斷輕絲似更聨長風隱細草深堂沒綺錢縈鬱無人贈葳蕤徒可憐庾肩吾新苔隨潮染岸石逐沫聚浮查徒令阿谷麗停筐不汰沙唐李益與僧法振同賦應門照緑苔宮上何年月應門何歲苔青光一似照白露共徘徊珠履久行絶玉房重未開妾心正如此昭陽歌吹來姚合題金州西園苔階茅堂階豈高數寸是苔蘚只恐秋雨中窗户亦不濺眼前無此物我情何由遣宋梅堯臣水次蘚花秋雨日霏霏碧花生疊疊水邊有神女妝去遺翠靨岸側小家婦不知所宜愜采得未還人自將渾面帖古壁苔隂壁流暗泉古苔長自好不改春與秋何如路傍草空山正幽藹淨緑無人掃七言古詩增唐顧雲苔歌檻前溪奪秋空色百丈潭心數砂礫松筠條條長碧苔苔色碧于秋水碧波迥回梳開孔雀尾根細貼著盤陀石撥浪輕拈出少時一髻濃煙三四尺山光日華亂相射靜縷藍鬐勻襞積試把臨流抖擻看琉璃珠子淚雙滴如看玉女洗頭處解破雲鬟收未得即是仙宮欲製六銖衣染絲未倩鮫人織採之不敢盈篚篋苦把龍神河伯惜瓊蘇玉鹽爛熳煮咽入丹田續靈液會待功成插翅飛蓬萊頂上尋仙客五言律詩增唐包何同舍弟佶班韋二員外對秋苔成詠每看苔蘚色如向簿書間幽思纒芳樹高情寄逺山雨痕連地緑日色出林斑却要興公賦臨危滑石間李咸用苔幾年風雨迹疊在石孱顔生處景長靜看來情儘間吟亭侵壞壁藥院掩空關每憶東行徑移笻獨自還原明于若瀛詠苔一雨生無蒂孤茵濕欲寒被階藏石瘦席徑受花安易作夤緣想難拈空色看紋全如側理有意鳥書殘七言律詩增唐徐夤詠苔印留麋鹿野禽蹤巖壑漁磯是處逢金谷曉凝花影重章華春映栁隂濃石橋羽客遺前迹陳閣才人沒舊容歸去掃除階砌下蘚痕殘緑一重重宋趙企詠苔斑斑染黛色差勻個個微圓類緑萍不比榆錢鋪砌白未饒荷葉點溪青陶鎔盡出春工力磨就多應雨夜零好與詩人買風月何妨積貯滿空庭明朱謀晉苔布葉如錢個個青不爭要路占間庭風前印鶴移罡步雨後留蝸作篆形生閣久縈詞客恨入碑多蝕古人名紅英墮地交相映小屐跫然未忍停原徐茂吳詠苔寂歷空庭綴綺錢緣階依砌更蟬連長門底是生金輦芳徑無從認翠鈿宜藉落花相掩映肯教新草獨芊眠違喧只合幽人侶怪得江淹怨思偏瑤砌瓊鋪紫翠勻高臺曲榭淨無塵停雲斐亹沿階緑經雨葳蕤澀浪新側理成時無汗簡文茵爛處絶車輪徑開二仲逢迎少鎮日荒荒覆碧筠點地斑斑積翠平年年和草玉階生石家砌上鏤春卉晉帝宮中號夜明乍訝緑筠經雨長不因白露減秋清坐時隨意妨行滑幾日空庭斷屐聲五言排律原明于若瀛詠苔研上碧于染鬖髿滿緑錢根微踏未斷絲細勢相聨每向重隂合偏逢雨過鮮綿綿緣閣上漠漠沒階前滋石隨潮長浮查逐沫纎江淹曽有賦無用總堪憐五言絶句原唐王維鹿柴空山不見人但聞人語響返景入深林復照青苔上增錢起藍田溪咏石上苔靜與溪色連幽宜松露滴誰知古石上不染世人迹宋梅堯臣苔徑林間夏雨滋復有斜陽照緑淨不搖風從教春草笑明高啓階前苔莫掃雨餘緑任滿間階路留藉落來花春泥免相汙李東陽苔徑豈不愛佳客客來殘我苔西園十日雨三徑不曽開七言絶句增唐白居易石上苔漠漠斑斑石上苔幽芳靜緑絶纎埃路傍凡草榮遭遇曽得七香車輾來原鄭谷苔錢春紅秋紫繞池臺箇箇圓如濟世財雨後無端滿窮巷買花不得買愁來增李中春苔春霖催得鎖煙濃竹院莎齊徑小通誰愛落花風味處莫愁門巷襯殘紅詩散句增梁劉孝威石岸生寒蘚沉根漬水苔宋沈約賔階緑錢滿客位紫苔生唐楊炯百果珠為竇羣峯錦作苔薛稷陽林花已紅寒澗苔未緑王維坐看蒼苔色欲上人衣來原李白門前遲行迹一一生緑苔杜甫興來無灑掃隨意坐莓苔雨拋金鎖甲苔臥緑沉槍李嘉祐苔色侵衣桁潮痕上井闌白居易雲覆莓苔封蒼然無處覓黛潤霑新雨斑明點古苔冷滑無人迹苔點如花箋上官昭容石苔凌几杖空翠撲肌膚石畫裝苔色風梭織水紋增宋梅堯臣濕翠連澗隂淨緑繞巖坎司馬光森沉殿瓦碧羃歷井苔蒼原唐杜牧莫厭瀟湘少人處水多菰米岸莓苔陸龜蒙澄溪水過苔還淨深樹雲來鳥不知間窗雨過苔花潤小簟風來薤葉涼增韓偓釣磯自别經秋雨長得莓苔更幾重宋梅堯臣庭下隂苔未教掃榴花紅落點青蒼王安石人傳湫水未嘗枯滿底蒼苔亂髮粗陸遊柴門雖設不曽開為怕人行損緑苔晉陸機青苔暗階除原齊謝朓蒼苔依砌上梁江淹青苔日夜黃增唐太宗緑沼翠新苔崔善為石苔終歲青張九齡苔益山文古孟浩然苔壁饒古意王維屐齒印苔深緑髮莓苔地原杜甫蟲書玉佩蘚歸休步紫苔苔移玉座春苔錢似錦萍苔徑臨江竹玉殿莓苔春劉長卿蒼苔緑竹徑增韋應物新苔侵履濕司空曙苔色遍春石雨滌莓苔緑李益漠漠秋苔潔孟郊白苔浮水錢張籍石苔生紫點白居易苔斑錢剝落苔壁錦漫糊朱慶餘積潤苔紋厚姚合古苔寒更翠苔文翻古篆苔蘚疏塵色薛能地燥春苔裂溫庭筠紫苔侵壁潤羅隱水梳苔髮直鄭谷染岸蒼苔古皮日休苔染渾成綺苔髮紅鬇鬡韋莊壁峻苔如畫李中蘚色花隂濶濺石苔花潤宋林逋雨壁上苔衣王安石青苔挾雨驕苔侵垂磴蔓陸遊雲蒸蒼蘚平戴復古苔生石徑斑金李獻能苔花錦斕斑元好問苔滑水無聲元方回苔紋深翠毯唐王維青苔日厚自無塵岑參雨滋苔蘚侵階緑原杜甫石田茅屋荒蒼苔蒼苔濁酒林中靜苔蘚蝕破沙濤痕增韓翃雨後青苔散點牆姚合塵靜寒霜覆緑苔白居易青苔地上消殘暑溫庭筠砌因流水長秋苔杜荀鶴石榻人稀蘚色交原陸龜蒙顚倒青苔落綘英皮日休破扉開澀染苔花吳仁壁為惜苔錢妨換砌吳融水籠沙淺露莓苔韋莊禁城煙暖蒸青苔宋錢惟演碧鮮初圓亂縹牆增歐陽修青苔雨後深紅點原司馬光雨岸莓苔舒繡斑增蘇軾研竹穿花破緑苔金蔡松年雨餘巖石古苔青附録水苔原水苔一名石髮一名石衣一名藫爾雅云藫石衣注云水苔也一名水衣增夲草水苔一名陟釐一名側梨一名水綿按石髮有二生水中者為陟釐生陸地者為烏韭原生石上色青緑蒙茸如髮初生嫩者擇去蟲石以石壓乾入鹽油醬薑椒切韭芽同拌食亦可油醬炒食集藻五言律詩增宋梅堯臣水苔深苔何所若苦詠費毫尖繞繞水仙髮茸茸蛟客髯緑縈秋石淨嫩值翠篙黏尚芼參差荇薄言無此嫌七言絶句增宋司馬光石髮萬古風濤浸石巖老苔垂足細䰐鬖傳聞海底珠無數何事從來散不簪金闕銀城仙客居欲傳消息問麻姑蓬萊無物堪為信翦寄蒼龍一握鬚詩散句增唐皮日休水苔青髬髵别録原拾遺記張華撰博物志奏于武帝帝詔芟截浮疑分為十卷即于御前賜側理紙萬番此南越所獻後人言陟里與側理相亂南人以海苔為紙其理縱橫斜側因以為名垣衣增夲草垣衣一名垣嬴一名天韭一名鼠韭一名昔邪此乃磚牆城垣上苔衣也生屋瓦上者即為屋遊集藻五言律詩增唐李益賦得垣衣漠漠復霏霏為君垣上衣昭陽輦下草應笑此生非掩靄青春去蒼茫白露晞猶勝萍逐水流浪不相依詩散句增梁簡文帝緣階覆緑綺依簷映昔邪齊王融垣衣不可裳附録屋遊原屋遊一名瓦衣一名瓦苔一名瓦蘚一名博邪一名昨葉一名蘭香此瓦屋上苔衣也生久屋之瓦木氣泄則生其長數寸葉圓而肥嫩長寸餘頂生小白花名瓦松甘寒無毒治浮熱在皮膚往來寒熱時氣煩悶小兒癎熱附録瓦松增夲草瓦松一名昨葉何草一名瓦花一名向天草赤者名鐵腳婆羅門草一名天王鐵塔草如松子作層故名蘇恭曰初生高尺餘逺望如松栽馬志曰處處有之生年久瓦屋上六月七月采苗日乾彚考增夢溪筆談崔融為瓦松賦云謂之木也訪山客而未詳謂之草也驗農皇而罕記假成式難之曰崔公博學無不該悉豈不知瓦松已有著説引梁簡文詩依簷映昔邪成式以昔邪為瓦松殊不知昔邪乃是垣衣瓦松自名昨葉何成式亦自不識集藻增唐崔融瓦松賦崇文館瓦松者産於屋霤之上千株萬莖開花吐葉高不及尺下才如寸不載于仙經靡題于藥録謂之為木也訪山客而未詳謂之為草也驗農皇而罕記豈不以在人無用在物無成乎俗以其形似松生必依瓦故曰瓦松楊炯謂余曰此中草木咸可為賦其詞曰賔館兮沉沉明月高兮重海深試一望兮上棟下宇開陽闔隂彼美嘉族依于夏屋煌煌特秀狀金芝兮産霤歷歷空懸若星榆而種天苯䔿丰茸青冥芊眠葩條郁育根柢連拳間青苔而裛露陵碧瓦而含煙春風搖兮鬱起冬雪糅兮蒼然詎充採掇罕任雕鐫桐君莫賞梓匠難甄用匪適于時要必濫聞于俗傳慚魏宮之烏韭恧漢官之紅蓮觀其衆開榮列虛心獨潔高寧我慕無木禾之五尋卑以自安類石蒲之九節進不必媚居不求利芳不為人生不因地其質也菲無忝于天然其隂也薄才足以自庇望之常見其表尋之罔得其祕肅穆承華堂皇不賒繩懸麥穗户刻菱花竹蒼筤而衆色樹連理而相加芙蓉發池兮照爛日及懸霤兮紛葩彼懷寶以遇賞此不材而見嗟雖有慕於階闥亦無混于泥沙已矣哉不學懸蘿附柏直蓬倚麻固將含美惡以同貫齊是非于一家亂曰少陽之地兮於何不春博望之苑兮莫匪正人纎根弱植兮生君之館荷施霑恩兮為人所玩物不謝生不知其榮惟願聖皇千萬壽但知傾葉向時明無名氏瓦松賦式觀圖籍幽山窮野聞卉木之名焉考神農之嘗者根莖可驗洪纎不捨惟瓦松兮闕書何昔人兮智寡原其所托高而又雅抽形先寄于鶴樓聳質更資于鴛瓦旖旎芬葩含風接霞既當春而吐葉亦凌秋而點花異山苗之極秀狀澗松兮抽芽高居壤霤匪雜泥沙向朝陽兮發榮經夕露兮增華常在危簷心必直詎欲牽風影暫斜小大殊品高卑異盼離離兮若星榆之照灼煜煜兮疑石蒲之蔥蒨既乏棟梁之用寧怯鐫雕之變豈比夫桂山上蘭谷中長幽隱兮銷馥為芬芳兮敗叢奚若兹物之獨茂無憂患兮養蒙五言排律增唐李華尚書都堂瓦松華省祕仙蹤高堂露瓦松葉因春後長花為雨來濃影混鴛鴦色光含翡翠容天然斯所寄地勢太無從接棟臨雙闕連甍近九重寧知深澗底霜雪歲兼封詩散句增宋張耒别來秋意苦但見瓦松長唐韓偓睡起牆隂下藥欄瓦松花白閉柴關宋陸遊屋老瓦松長唐白居易牆有衣兮瓦有松仙人縚增酉陽雜俎仙人絛出衡嶽無根蒂生石上狀如同心帶三股色緑亦不常有益部方物記仙人縚生大山中與苔同種但巖隂石隈多鮮翠長二三尺叢垂若縚或言深谷有長丈餘者集藻贊增宋宋祁仙人縚贊附陽而生垂若文縚大槩苔類土石所交附録羅漢絛增湖湘故事羅漢後洞有草蔓結如帶長丈餘附木而生相傳謂之羅漢絛集藻七言絶句增宋畢向羅漢絛五百移棲絶洞深空留轍迹杳難尋緑絲絛帶何人施長到春來挂滿林御定佩文齋廣羣芳譜卷九十一
