body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九十二卉譜祝餘增山海經招搖之山有草焉其狀如韭而青花其名曰祝餘食之不飢注或作桂荼條二種同名增山海經符禺之山其草多條狀如葵而赤花黃實如嬰兒舌食之使人不惑石脆之山其草多條其狀如韭而白花黑實食之已疥黃雚增山海經竹山有草焉其名曰黃雚其狀如樗其葉如麻白花而赤實其狀如赭浴之已疥又可以已胕蓇蓉增山海經嶓冡之山有草焉其葉如蕙其夲如桔梗黑華而不實名曰蓇蓉食之使人無子無條二種同名增山海經臯塗之山有草焉其狀如稿苃其葉如葵而赤背名曰無條可以毒鼠苦山有草焉圓葉而無莖赤華而不實名曰無條服之不癭薲草增山海經崑崙之丘有草焉名曰薲草其狀如葵其味如蔥食之已勞籜增山海經甘棗之山有草焉葵本而杏葉黃華而莢實名曰籜可以已瞢植楮增山海經脫扈之山有草焉其狀如葵葉而赤華莢實實如棕莢名曰植楮可以已癙食之不眯鬼草增山海經牛首之山有草焉名曰鬼草其葉如葵而赤莖其秀如禾服之不憂集藻贊增晉郭璞鬼草讚焉得鬼草是樹是藝服之不憂樂天遺世如波滚舟任波流滯榮草增山海經鼓鐙之山有草焉名曰榮草其葉如栁其本如雞卵食之已風荀草增山海經青要之山有草焉其狀如葌而方莖黃華赤實其本如藁本名曰荀草服之美人色集藻贊增晉郭璞荀草讚荀草赤實厥狀如菅婦人服之練色易顔夏姬是豔厥媚三遷葶寧增山海經熊耳之山有草焉其狀如蘇而赤華名曰葶寧可以毒魚薰草增山海經浮山有草焉名曰薰草麻葉而方莖赤華而黑實臭如蘼蕪佩之可以已癘風條增山海經休與之山有草焉其狀如蓍赤葉而夲叢生名曰風條可以為簳焉酸增山海經鼓鐘之山有草焉方莖而黃華員葉而三成其名曰焉酸可以為毒䔄草二種同名增山海經姑媱之山帝女化為䔄草其葉胥成其華黃其實如菟丘服之媚於人泰室之山有草焉其狀如􅙥白華黑實澤如櫻薁其名曰䔄草服之不昧集藻贊增晉郭璞䔄草贊䔄草黃華實如菟絲君子是佩人服媚之帝女所化其理難思嘉榮增山海經半石之山其上有草焉生而秀其高丈餘赤葉赤華華而不實其名曰嘉榮服之者不霆蛇山其草多嘉榮集藻贊增晉郭璞嘉榮贊霆維天精動心駭目曷以禦之嘉榮是服所正者神用口腸腹􅞒草增山海經少陘之山有草焉名曰􅞒草葉狀如葵而赤莖白華實如櫻薁食之不愚集藻贊增晉郭璞􅞒草贊􅞒草赤莖實如櫻薁食之益智忽不自覺殆齊生知功竒於學梨草增山海經太山有草焉名曰梨其葉狀如荻而赤華可以已疽􅚄草增山海經大騩之山有草焉其狀如蓍而毛青華而白實其名曰􅚄服之不夭可以為腹病集藻贊增晉郭璞􅚄草贊大騩之山爰有蘋草青華白實食之無夭雖不增齡可以窮老高梁山草增山海經高梁之山有草焉狀如葵而赤華莢實白柎可以走馬雞穀增山海經牀之山其草多雞榖其本如雞卵其味酸甘食者利于人嫗山其草多雞穀苕饒增陸璣詩疏苕苕饒也幽州人謂之翹饒蔓生莖如勞豆而細葉似蒺藜而青其莖葉緑色可生食如小豆藿也彚考增詩陳風卭有旨苕虉增爾雅虉綬注小草有雜色似綬彚考增詩陳風卭有旨鷊疏鷊綬草也莫增陸璣詩疏莫莖大如箸赤節節一葉似栁葉厚而長有毛刺今人繅以取繭緒其味酢而滑始生可以為羮又可生食五方通謂之酸迷冀州人謂之乾絳河汾之間謂之莫彚考增詩魏風彼汾沮洳言采其莫葍增爾雅葍葍注大葉白華根如指正白可啖疏幽州人謂之燕葍其根可著熱灰中溫啖之飢荒之歲可蒸以禦飢也葍藑茅注葍華有赤者為藑藑葍一種耳亦猶蓤苕華黃白異名彚考增詩小雅我行其野言采其葍芑增陸璣詩疏芑菜似苦菜也莖青白色摘其葉有白汁出脆可生食亦可蒸為茹青州人謂之芑西河鴈門芑尤美彚考增詩小雅薄言采芑于彼新田于此災畝大雅豐水有芑藬增爾雅藬牛蘈注今江東呼為牛蘈者高尺餘許方莖葉長而鋭有穗穗間有華華紫縹色可淋以為飲結縷增爾雅傳橫目注一名結縷俗謂之鼓箏草前漢書注師古曰結縷蔓生著地之處皆生細根如線相結故名結縷今俗呼鼓箏草者兩幼童對銜之手鼓中央則聲如箏也蔖增爾雅蓾蔖注作履苴草疏即蒯類也中作履底搖車增爾雅柱夫搖車注蔓生細葉紫華可食今俗呼曰翹搖車疏華翹起搖動因名綿馬增爾雅綿馬羊齒注草細葉葉羅生而毛有似羊齒今江東呼為鴈齒繅者以取繭緒瓝增爾雅瓝九葉注今江東有草五葉共叢生一莖俗因名為五葉即此類也雞腸草增爾雅蔜􅭚􅘚注今蘩􅘚也或曰雞腸草疏本草云蘩􅘚味辛多生下濕坑渠之側人家園庭亦有此草蕕一作莤增爾雅莤蔓于注多生水中一名軒于江東呼莤本草一名馬唐一名馬飯一名羊麻一名羊粟節節有根著土如結縷草堪飼馬彚考增左傳一薰一蕕十年尚猶有臭藒車增爾雅藒車芞輿注藒車香草廣志藒車味辛生彭城高數尺重葉白花海藥本草生海南山谷凡諸樹蟲蛀者煎此香冷淋之即辟也又辟惡氣薰衣佳集藻文賦散句增楚屈原離騷畦留夷與揭車兮漢司馬相如上林賦揭車衡蘭蘮蒘增爾雅蘮蒘竊衣注似芹可食子大如麥兩兩相合有毛著人衣疏俗名鬼麥玉紅草增尸子赤縣洲為崑崙之墟其東則滷水島左右玉紅之草生焉食其一實醉臥三百歲留夷增楚詞注留夷文選作蒥荑張揖曰留夷辛夷顔師古曰留夷香草非辛夷辛夷乃樹耳集藻文賦散句增楚屈原離騷畦留夷與揭車兮漢司馬相如上林賦雜以留夷不死草增十洲記祖洲上有不死之草草形如菰苗長三四尺人已死三日者以草覆之皆當時活也服之令人長生秦始皇時有鳥如烏狀銜此草來遣使者齎草以問北郭鬼谷先生云此草是東海祖洲上不死之草生瓊田中或名為養神芝其葉似菰苗叢生一株可活一人始皇乃使使者徐福發童男童女入海採之明莖草增東方朔别傳天漢二年帝升蒼龍館思仙術召諸方士言逺國遐鄉之事唯朔下席操筆疏曰臣遊北極至鏡火山日月初不照有龍銜火以照山四極亦有園囿池苑皆植異草木有明莖草如金燈折為燭照見鬼物形仙人寧封嘗以此草然為夜照見腹內外有光亦名洞腹草帝銼此草為蘇以塗明雲之觀夜坐此觀即不加燭亦名照魅草採以藉足則入水不沉吉雲草增洞冥記東方朔曰臣有吉雲草十種種於九景山東二千歲一花明年應生臣走請刈之得以秣馬馬終不飢神精香草增洞冥記波祗國亦名波弋國獻神精香草亦名荃蘼一名春蕪一根百條其間如竹節柔軟其皮如絲可為布所謂春蕪布亦名香荃布堅密如紈氷也握一片滿室皆香婦人帶之彌月芬馥夢草增洞冥記有夢草似蒲色紅晝縮入地夜則出懷其葉則知夢之吉凶立驗也武帝思李夫人之容不可得朔乃獻一枝帝懷之夜果夢夫人因改曰懷夢草拾遺記背明國有夢草葉如蒲莖如蓍採之以占吉凶萬不遺一却睡草增洞冥記有五味草初生味甘花時味酸食之使人不眠名曰却睡草武帝時末多國獻此草瑶琨碧草增洞冥記瑶琨去玉門九萬里有碧草如麥割之以釀酒則味如醇酎飲一合三旬不醒但飲甜水隨飲而醒地日草增洞冥記武帝末年彌好仙術與東方朔狎昵帝曰朕所好者不老其可得乎朔曰臣能使少者不老帝曰服何藥耶朔曰東北有地日之草西南有春生之草帝曰何以知之朔曰三足烏數下地食此草羲和馭之以手掩烏目不聽下也食草能不老他鳥獸食此草則美悶不能動矣帝曰子何以知乎朔曰臣小時掘井陷落地下數十年無所託寄有人引臣欲往此草中隔紅泉不得渡其人以一隻屐與臣臣泛紅泉得至此草之處臣采而食之鳳葵草增洞冥記有鳳葵草色丹葉長四寸味甘久食令人身輕肌滑赤松子餌之三歲乘黃蛇入水得黃珠一枚色如真金或言是黃蛇之卵躡空草增洞冥記鳥哀國有掌中芥葉如松子取其子置掌中吹之而生一吹長一尺至三尺而止然後可移于地上若不經掌中吹則不生食之能空中孤立足不躡地亦名躡空草壽榮草增典術壽榮草出少室金山丘下服之令人不老取葉服之可通百神迷迭增廣志迷迭出西域魏略迷迭香出大秦國夲草其草修幹柔莖細枝弱根繁花結實嚴霜弗凋收采去枝葉入袋佩之芳香甚烈主去惡氣令人衣香燒之去鬼集藻賦增魏文帝迷迭賦坐中堂以遊觀兮覽芳草之樹庭重妙葉于纎枝兮揚修幹而結莖承靈露以潤根兮嘉日月而敷榮隨回風以搖動兮吐芳氣之穆清薄西夷之穢俗兮越萬里而來征豈衆卉之足方兮信希世而特生曹植迷迭香賦播西都之麗草兮應青春而凝暉流翠葉于纎柯兮結微根于丹墀信繁華之速實兮弗見雕于嚴霜方暮秋之幽蘭兮麗崑崙之芝英既經時而收採兮遂幽殺以增芳去枝葉而特御兮入綃縠之霧裳附玉體以行止兮順微風而舒光王粲迷迭賦惟遐方之珍草兮産崑崙之極幽受中和之正氣兮承隂陽之靈休揚豐馨于西裔兮布和種于中州去原野之側陋兮植高宇之外庭布萋萋之茂葉兮挺苒苒之柔莖色光潤而采發兮似孔翠之揚精陳琳迷迭賦立碧莖之婀娜鋪綵條之蜿蟺下扶疏以布濩上綺錯而交紛匪荀方之可樂實來儀之麗間動容飾而發微穆斐斐以承顔應㻛迷迭賦列中堂之嚴宇跨階序而駢羅建茂莖以竦立擢修幹而承阿燭白日之炎隂承翠碧之繁柯朝敷條以誕節夕結秀而垂華振纎枝之翠粲動采葉之莓莓舒芳香之酷烈乘清風以徘徊詩散句增樂府氍毹㲮􅚊五木香迷迭艾蒳及都梁龍鬚草增夲草石龍芻一名龍鬚一名龍修一名龍華一名龍珠一名懸莞一名草續斷一名縉雲草一名方賓一名西王母簪叢生狀如粽心草及鳬茈苗直上夏月莖端生小穗花結細實並無枝葉今吳人多栽蒔織席他處自生者不多彚考增山海經賈超之山多龍修注龍鬚也似莞而細生山石穴中莖倒垂可為席崔豹古今注孫興公問曰世稱黃帝鍊丹于鑿硯山乃得仙乘龍上天羣臣援龍鬚鬚墜而生草曰龍鬚有之乎答曰無也有龍鬚草一名縉雲草故世人為之妄傳至如今有虎鬚草江東亦織以為席號曰西王母席可復是西王母乘虎而墮其鬚也水經注自洮嵹南北三百里中地草遍是龍鬚而無樵柴福建志武平縣梁山分十二面寄峻疊出昔鄉民採茗誤至一巖見龍鬚草蒙幕垂門披而入見佛像經帙鐘磬幢蓋如新造設後再往遂迷所在集藻詩散句增唐李白莫捲龍鬚席從他生網絲附録龍常草增本草龍常草一名粽心草生河水旁狀如龍芻冬夏生按爾雅云􅀢鼠莞郭璞云纎細似龍鬚可為席蜀中出好者恐即此龍常也虹草增拾遺記背明國有草名虹草枝長一丈葉如車輪根大如轂花似朝虹之色昔齊桓公伐山戎國人獻其種乃植於庭曰霸者之瑞也宵明草增拾遺記背明國有宵明草夜視如列燭晝則無光自消滅也黃渠草增拾遺記背明國有黃渠草映日如火其堅韌若金食者焚身不熱聞遐草增拾遺記背明國有聞遐草服者耳聰香如桂莖如蘭合歡草增拾遺記魏明帝時有合歡草狀如蓍一株百莖晝則衆條扶疏夜則合為一莖萬不遺一謂之神草濡姧草增拾遺記方丈山有草名濡姧葉色如紺莖色如漆細軟可縈海人織以為席薦卷之不盈一手舒之則列坐方國之賓娑羅草增拾遺記方丈山有娑羅草細大如髮一莖百尋柔軟香滑羣仙以為龍首之轡遙香草增拾遺記岱輿山北有遙香草其花如丹光耀入目葉細長而白如忘憂之草其花葉俱香扇馥數里故名遙香草其子如薏中實甘香食之纍日不飢渴體如草之香久食延齡萬歲仙人常採食之莽煌增拾遺記岱輿山有草名莽煌葉圓如荷去之十步炙人衣則燋刈之為席方冬彌溫以枝相摩則火出矣藝苗草增拾遺記瀛洲有草名藝苗狀如菖蒲食葉則醉餌根則醒藝蓬草增拾遺記員嶠山有草名藝蓬色白如雪一枝二丈夜視有白光可以為杖銅鼓草增桂海虞衡志銅鼓草其實如瓜療瘡瘍毒珊瑚鞭增黃山志珊瑚鞭澗壑中草也叢生葉深緑初秋拔莖長二三尺遍莖布小花花色殷似珊瑚更紅俗名金線海棠又名狀元鞭紅席草增南史梁武帝紀海中浮鵠山去餘姚岸可千餘里上有女人年三百歲有女官道士四五百人年並出百但在山學道遣使獻紅席云此草常有紅鳥居下故以為名觀其圖狀則鸞鳥也鹹草增南史扶桑傳扶桑東千餘里有女國食鹹草如禽獸鹹草葉如邪蒿而氣香味鹹千步香草增述異記南海山出千步香佩之香聞於千步也今海隅有千步草是其種也葉似杜若而紅碧雜貢籍曰南郡貢千步香睡草增述異記桂林有睡草見之則令人睡一名醉草亦呼懶婦針又出南海地記龍芻增述異記東海島龍川穆天子養八駿處也島中有草名龍芻馬食之一日千里古語云一株龍芻化為龍駒席具草增述異記席具草一名塞路生北方古詩云千里席具草相思草增述異記秦趙間有相思草狀如石竹而節節相續一名斷腸草又名愁婦草亦名霜草人呼寮莎活人草增述異記漢武帝時西方日支國有獻活人草三莖有人死者將草覆面即活麝香草增述異記紫述香一名紅蘭香一名金桂香亦名麝香草出蒼梧桂林上郡界今吳中有麝香草似紅藍而甚芳香懸腸草增述異記懸腸草一名思子蔓南中呼為離别草宮人草增述異記楚中有宮人草狀如金䔲而甚氛氳花色紅翠護門草增酉陽雜俎護門草出常山北置諸門上夜有人過輒叱之物類相感志一名百靈草集藻詩散句增梁王筠霜被守宮槐風驚護門草金光草增廣異記謝元卿至東嶽夫人所居有異草葉如芭蕉花正黃色光可以鑑曰此金光草也食之化形靈元壽與天齊集藻詩散句增唐李白願餐金光草壽與天齊傾元鹿草增道籥元鹿之草生於名山人迹不到處烹而食之壽二千歲鶴子草增北户録鶴子草蔓花也當夏開南人云是媚草甚神可比懷子夢芝采之曝乾以代面靨形如飛鶴狀翅羽嘴距無不畢備亦草之竒者草蔓延春生雙蟲常食其葉土人收於奩粉間餉之如養蠶諸蟲老不食而蛻為蝶女子佩之如細鳥皮號為細蝶醒醉草增開元天寶遺事興慶池南岸有草數叢葉紫而心殷有一人醉過於草傍不覺失其酒態後有醉者摘草嗅之卒然醒悟故目為醒醉草變晝草增杜陽雜編順宗即位拘彌國貢變晝草有類芭蕉可長三尺而一莖千葉樹之則百步內昏黑如夜始藏於百寶匣中上見而怒曰背明向暗之物何貴并匣焚之迎涼草增酉陽雜俎迎涼草碧色簳似苦竹葉細如杉雖若乾枯而未嘗凋落盛暑挂之窗户間則涼風自生集藻詩散句增宋章得象已持犀避暑更乞草迎涼左行草增酉陽雜俎左行草使人無情范陽長貢青草槐增酉陽雜俎龍陽縣裨牛山南有青草槐叢生高尺餘花若金燈仲夏發花一夲云迄千秋野狐絲增酉陽雜俎野狐絲庭中草蔓生色白花微紅大如栗秦人呼為狐絲望舒草增酉陽雜俎望舒草出扶支國草紅色葉如蓮葉月出則舒月沒則卷蜜草增酉陽雜俎北天竺國出蜜草蔓生大葉秋冬不死因受霜露遂成蜜如塞上蓬鹽本草交河沙中有草頭上有毛毛中生蜜名為給勃羅高昌有草名羊刺其上生蜜西番撒馬兒罕地有小草葉細如藍秋露凝其上味甘如蜜老鴉瓜籬增酉陽雜俎老鴉瓜籬葉如牛蒡而美子熟時色黑狀如瓜籬鴨舌草增酉陽雜俎鴨舌草生水中似蓴俗呼為鴨舌草銅匙草增酉陽雜俎銅匙草生水中葉如翦刀水耐冬增酉陽雜俎水耐冬經冬在水不死成式於城南村墅池中有之天芊增酉陽雜俎天芊生終南山中葉如荷而厚油點草增酉陽雜俎油點草葉似莙薘每葉上有黑點相對三賴草增酉陽雜俎三賴草如金色生於高崖老子弩射之魅藥中最切金盤草增唐王周詩注金盤草生寧江巫山南陵林木中其根一年生一節人採而服可解毒也集藻五言古詩增唐王周金盤草詩今春從南陵得草名金盤金盤有仁性生在林木端根節歲一節食之甘而酸風俗競採掇俾人防急難巴中蛇虺毒解之如走丸巨葉展六出軟幹分長竿搖搖緑玉活裊裊香荷寒世云暑酷月鬱有神物看天之産於此意欲生民安今之為政者何不反此觀知彼苛且猛愼勿虐而殘一物茍失所萬金惟可歎莫並蒿與萊豈羡芝及蘭勤渠護根本栽植富庭欄寄言好生者休説神仙丹蕪荑增五代史胡嶠自契丹亡歸中國略能道其所見云自裊潭入大山行十餘日而出過一大林長二三里皆蕪荑枝葉有芒刺如箭羽其地皆無草息雞草增五代史胡嶠自契丹亡歸中國略能道其所見云自上京東行至裊潭水草豐美有息雞草尤美而本大馬食不過十本而飽千金草增寰宇記廣州草有大千金小千金守房郎千里迥回萬里憶金星草增益部方物略記金星草生峩睂青城山葉似萱草其背有點雙行相偶黃澤類金星人號金星草亦云金釧草皆以肖似取之今醫家以傅疽創甚良嘉祐本草金星草喜生背隂石上淨處及竹箐中少日色處或生大木下及背隂古瓦屋上初出深緑色葉長一二尺至深冬背生黃星點子兩兩相對色如金因得金星之名無花實凌冬不凋其根盤屈如竹根而細折之有筋如豬馬騣集藻贊增宋宋祁金星草贊長葉叢生背點星布高醫近識傅疽可愈石長生增本草經石長生一名丹草一名丹沙草花紫色南中多生石巖下葉似蕨而細如龍鬚黑如光漆高尺餘不與餘草雜也益部方物略記長生草山隂蕨地多有之修莖茸葉色似檜柏而澤經冬不凋損故號長生集藻贊增宋宋祁長生草贊色與柏類苒苒其莖冬不甚黃故謂長生集藻七言律詩增宋樓鑰長生草玻璃擢葉玉蟠根千里提攜寄海濱雨澤不霑仍自潤土膏無著自長春歲寒秀色鎮依舊日暖素英能一新我欲餌之求久視恐君靈已不靈人附録紅茂草增圖經本草紅茂草一名地沒藥一名長生草生施州四季枝葉繁故有長生之名通泉草增庚辛玉册通泉草一名長生草多生古道丘壟荒蕪之地葉似地丁中心抽一莖開黃白花如雪又似麥飯摘下經年不稿根入地至泉故名通泉俗呼禿瘡花女香增奚囊橘柚女香草出繁繢婦女佩之則香聞數里男子佩之則臭昔海上有丈夫拾得此香嫌其臭棄之有女子拾去其人迹之香甚欲奪之女子疾走其人逐之不及乃止故語曰欲知女子強轉臭得成香呂氏春秋云海上有逐臭之夫疑即此事鼠麴草增本草鼠麴草一名米麴一名鼠耳一名佛耳草一名無心草一名香茅一名黃蒿一名茸母原野間甚多二月生苗莖葉柔軟葉長寸許白茸如鼠耳之毛開小黃花成穗結細子馬鞭草增本草馬鞭草一名龍牙草一名鳳頸草下地甚多春月生苗方莖葉似益母對生夏秋開細紫花作穗如車前穗子如蓬蒿子而細根白而小附録蛇含增本草蛇含一名蛇銜一名威蛇一名小龍牙一名紫背龍牙處處有之有兩種並生石上亦生黃土地一莖五葉或七葉根名女青八月採隂乾又有一種藤生葉似蘿摩亦名女青石帆增夲草石帆生海嶼石上草類也無葉高尺許其花離樓相貫連根如漆色至梢上漸軟作交羅紋人以飾作珊瑚裝佛甲草增夲草佛甲草生筠州二月生苗成叢髙四五寸脆莖細葉柔澤如馬齒莧尖長而小夏開黃花經霜則枯人多栽于石山瓦牆上呼為佛指甲虎耳草增夲草虎耳草一名石荷葉生隂濕處人亦栽于石上莖髙五六寸有細毛一莖一葉如荷蓋狀人呼為石荷葉葉大如錢狀似初生小葵葉及虎之耳形夏開小花淡紅色離鬲草增夲草離鬲草生人家階庭濕處高三二寸苗葉似幕罨江東有之北土所無仙人草增本草仙人草生階庭間高二三寸葉有鴈齒似離鬲草北地不生集藻贊增宋謝惠連仙人草贊并序余之中園有仙人草焉春穎其苗夏秀其英秋有貞實冬無凋色可謂貫四時而不改者也既嘉其名而美其質染筆作詠庶以攄述云園有佳草名曰仙人煜煜煒煒莫莫臻臻穎發炎暑苗秀和春竒爾靈質乃植中林宜南草增夲草宜南草生廣南山谷有莢長二尺許內有薄片似紙大小如蟬翼小男女以緋絹袋盛佩之臂上辟惡止驚此草生南方故名仙人掌增本草仙人掌草生合州筠州多于石上貼壁而生如人掌形故名葉細而長春生至冬猶有四時采之集藻賦增明黃佐仙人掌賦并序仙人掌者竒草也多貼石壁而生惟羅浮黃龍金沙洞有之葉徑而長若齟齬狀發苞時外類芋魁內攢瓣如翠毬各擎子珠如掌然青赤轉黃而有重殼剖之厚者在外如小椰可為匕勺薄者在裏如銀杏衣而裹圓肉煨食之味兼芡栗可補諸虛久服輕身延年俗呼為千歲子云移植惟宜沙土粵州書院精舍中庭後圃皆有之子以其竒賦焉其詞曰有仙人之瑶草惟龍洞之嘉生育金沙於后土承日景於朱明植深根而擢穎謝修幹以敷榮展青鸞之羽葉攢威鳳之毬英爾乃玄覽啓其前圃叢隂映乎松篁霑騫林之瑞露翕神霄之寶光子珠擎於翠掌青赤綦乎中黃傲冬雪而奮起迎凱風以翺翔諒抗時而耀質遙作對乎男貞補桐君之遺録起葛令之丹經盍朋簪而萃止盈傾筐以胥慶同服食以霞舉集瑶池而濯纓萍蓬草增本草萍蓬草一名水粟一名水栗子生南方池澤三月出水莖大如指葉大如荇花亦黃未開時狀如算袋其根如藕飢年可以當榖雞足草增五臺山志山有異草二雞足草瞢草知風草增一統志知風草廣東出叢生若藤蔓土人視其節以占一歲風候每一節則一風無節則無風扁擔草增盛京通志扁擔草似黍葉稍窄有穗有粒多生田中可以飼馬嬌草增盛京通志嬌草似香蒲可以飼馬馬房增盛京通志馬房節節相生無葉可以飼馬星星草增盛京通志星星草葉如韭有穗星星故名亦可飼馬黃背草增盛京通志黃背草層層有節細葉乾之可代茅結屋塔子頭增盛京通志塔子頭窪地叢生其根能裹土上壅成堆如塔故名久則根與土糾結堅不可破俗呼塔子頭可雕琢為木器水稗草增盛京通志水稗草葉似稗子中多汁故名可飼馬鳳尾草增盛京通志鳳尾草葉莖如鳳尾故名多生山隂近水處稠粳增新津縣志稠粳山有草名稠粳服之可以長生琉璃草增始興縣志縣南十里曰玲瓏巖有草名琉璃食之可已風蝎子草增蝎子草塞外多有之高四五尺叢生亂草間其葉最毒人誤觸之立即紅瘇如蝎子所螫故名馬亦不敢近之唯駝能食與蕁相類特勒蘇草增特勒蘇草塞外叢生蔥翠挺拔經秋霜則變而為白取之組織為涼帽光皎異常恆春草集藻五言古詩增唐梁鍠方士進恆春草東吳有靈草生彼剡溪傍既亂莓苔色仍連菡蓞香掇之稱逺士持以奉明王北闕顔彌駐南山壽更長金膏徒騁妙石髓莫矜良倘使沾涓滴還遊不死方附録煙草增食物本草煙草一名煙酒味辛溫有毒治風寒濕痺滯氣停痰解山嵐瘴氣多食則火氣薰灼耗血損年閩産者佳燕次之春種夏花秋日取葉曝乾切葉形如細髮草頂數葉名曰蓋露御定佩文齋廣羣芳譜卷九十二
