body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九十三藥譜甘草原甘草甘古作苷一名國老一名靈通一名美草一名蜜草一名蜜甘一名落草生陜西河東州郡青州間亦有之春生青苗高三四尺枝葉悉如槐葉端微尖而糙濇似有白毛七月開紫花冬結實作角子熟時角拆子扁如小豆極堅根長者三四尺麤細不定皮赤上有横梁梁下皆細根採得去蘆頭及赤皮隂乾用以堅實斷理者為佳謂之粉草其輕虚縱理及細靭者不堪用味甘平無毒最為衆藥之主治七十二種乳石毒觧一千二百般草木毒調和衆藥故有國老之號生用瀉火熱熟用散表寒其性能緩能急而又協和諸藥使之不爭惟中滿嘔吐嗜酒者忌用昔有中烏頭巴豆毒者甘草入腹即定加大豆其驗竒應嶺南觧蠱毒凡飲食先取炙甘草一寸嚼之嚥汁若中毒随吐出仍以炙甘草三兩生薑四兩水六升煮二升日三服常帯數寸随身備用若含甘草食物而不吐是無毒者也頭生用能行足厥隂陽明二經汙濁之血消癰疽腫痛之毒宜入吐藥梢生用治胸中積熱去莖中痛加酒煮𤣥胡索苦楝子尤佳彚考增梁書宕昌國傳天監四年王梁彌博來獻甘草當歸詔以為使持節都督河凉二州軍事安西將軍東羌校尉河梁二州刺史隴西公宕昌王酉陽雜爼秀才權同休元和中下第旅遊蘇湖間遇疾貧窘走使者本村野人僱已一年矣疾中思甘豆湯令其市甘草僱者久而不去但具火湯水秀才且意其怠於祗承復見折樹枝盈握仍再三搓之微近火上忽成甘草良久取麤沙數掊挼捘已成豆矣及湯成與甘豆無異疾亦漸瘥夢溪筆談本草注引爾雅云蘦大苦注甘草也蔓延生葉似荷青莖赤此乃黄藥也其味極苦謂之大苦非甘草也甘草枝葉悉如槐髙五六尺但葉端微尖而糙澀似有白毛實作角生如相思角作一本生熟則角拆子如小扁豆極堅齒嚙不破霏雪錄西土甘草大者如柱土人以架屋唐愚士西遊親見之集藻五言律詩增宋梅堯臣司馬君實遺甘草杖美草將為杖孤生馬嶺危難從荷蓧叟寧入化龍陂去與秦人採來扶楚客衰藥中稱國老我懶豈能醫别錄原炙法長流水蘸濕炙透為熟刮去赤皮或用漿水有云用酒及酥炙者非也黄耆原黄耆本草綱目云耆長也色黄為百藥之長故名今俗通作茋或作蓍者非一名芰草一名蜀脂一名百本一名獨椹一名戴椹一名戴糝葉扶踈作羊齒狀似槐葉而微尖小又似蒺藜而微濶大青白色開黄紫花大如槐花結小尖角長寸許獨莖或作叢生枝榦去地二三寸根長二三尺以緊實如箭簳者良味甘微溫無毒隴西者溫補白水者冷補赤色者作膏消癰腫其皮折之如綿出綿上故名綿黄耆綿上山西沁州有白水耆白水陜西同州赤水耆赤水鄉屬隴西木耆功用並同而力不及白水者木耆短而理横今人多以苜蓿根假作者苜蓿根堅而脆亦名土黄茋能令人瘦黄茋柔靭皮微黄褐色肉白能令人肥宜辨黄耆之功有五補諸虚不足一也益元氣二也壯脾胃三也去肌熱四也排膿止痛活血生血内托隂疽為瘡家聖藥五也治氣虛盗汗自汗及膚痛是皮表之藥治咯血柔脾胃是中州之藥治傷寒尺脈不至補腎臟元氣乃上中下内外三焦之藥也苖嫩時亦可煠淘作茹食收其子十月種如種菜法彚考增梁書鄧至國傳國居西凉州界天監元年詔以鄧至王象舒彭為督西凉州諸軍事號安北將軍五年舒彭遣使獻黃耆四百斤馬四匹原本草衍義唐許𦙍宗初仕陳為新蔡王外兵叅軍時柳太后病風不能言脈沉而口噤𦙍宗曰既不能下藥宜湯氣蒸之藥入腠裏周時可瘥乃造黃耆防風湯數斛置於牀下氣如煙霧其夕便得語也集藻詩散句増金王特起但說今年秋雨多黄茋滿谷無人采别錄原製用凡使勿用木耆草形相似但葉短根横綿耆則否須去頭上皺皮槌扁蜜水塗炙數次以透為度人參原人參古作薓又作蔘本草綱目云年深漸浸長成者根如人形故名陶𢎞景别錄云一名人微微乃薓字之訛一名血參一名黃參色黄屬土而補脾胃生隂血故有二名一名神草其根如人形有神故名神草一名地精廣雅云地精人薓也一名土精見異苑一名人銜其成有階級故名人銜一名鬼盖其草背陽向隂故名鬼蓋一名海腴一名皺面還丹舊以上黨為佳今不復采邇來所用皆遼參髙麗參别錄云生上黨山谷及遼東呉氏本草云或生邯郸本草注云生百濟髙麗蜀本草云沁州遼州澤州箕州平州易州檀州幽州媯州并州并出唐本草云潞州紫團山所出者謂之紫團參圖經云河東諸州及泰山皆有之又有河北及閩中來者名新羅參蒙筌云紫團參紫色稍扁百濟參白堅且圎名白條參俗名羊角參遼東參黄潤纖長有鬚俗名黄參獨勝髙麗參近紫體虚新羅參亞黄味薄綱目云上黨今潞州民以人參為地方累不復采取今所用者皆是遼參其髙麗百濟新羅三國皆屬於朝鮮其參猶來中國互市大抵人參春生苖多於深山背隂椵漆樹下潤濕處初生小者三四寸許一椏五葉四五年後兩椏五葉未有花莖十年後生三椏年深者生四椏各五葉中心生一莖俗名百尺杵三四月有花細小如粟蕊如絲紫白色秋後結子七八枚如大豆生青熟紅自落泰山出者葉榦青根白江淮出者形味皆如桔梗欲試上黨參使二人急走三五里一含參一空口其含參者不喘乃真也遼參連皮者黄潤纖長色如防風去皮者堅白如粉秋冬采者堅實春夏采者虚軟髙麗參類雞腿者力大偽者皆以沙參薺苨桔梗造作亂之沙參體虚無心而味淡薺苨體虚無心桔梗體堅有心而味苦人參體實有心而味甘微帶苦自有餘味俗名金井玉闌干者是也性微寒無毒别錄云微溫調中開胃補五臟安精神定魂魄止驚悸通血脈主五勞七傷男婦一切虚損痰弱虚促短氣止渴生津及胎前産後諸病開心益智久服輕身延年其有手足面目似人形者更神效謂之孩兒參而假偽者尤多彚考增晉書石勒載記勒居武鄉北原山下草木皆有鐵騎之象家園中生人參花葉甚茂悉成人狀南史隠逸傳阮孝緒母王氏有疾合藥須得生人參舊傳鍾山所出孝緒躬歴幽險累日不逢忽見一鹿前行孝緒感而随後至一所遂滅就視果獲此草原隋書五行志髙祖時上黨有人宅後每夜有人呼聲求之不得去宅一里所但見人參一本枝葉峻茂因掘去之其根五尺餘具體人狀呼聲遂絶春秋運斗樞揺光星散而為人參人君廢山瀆之利則揺光不明人參不生禮斗威儀下有人參上有紫氣增異苑人參一名土精生上黨者佳人形皆具能作兒啼昔有人掘之始下鏵便聞土中呻吟聲尋音而取果得人參卓異記駱瓊採藥北山月夜見紫衣童子歌曰山涓涓兮樹蒙䝉明月愁兮當夜空煙茂宻兮垂枯松遂於古松下得參一本食之而壽海藥本草新羅國所貢人參有手足狀如人形長尺餘以杉木夾定紅絲纒飾之本草衍義上黨參有長及一尺餘者或十岐者其價與銀等稍為難得土人得一窠則置板上以新綵絨飾之夢溪筆談王荆公病喘藥用紫團山人參不可得時薛師政自河東還適有之贈公數兩不受人有勸公曰公之疾非此藥不可治疾可憂藥不足辭公曰平生無紫團參亦活到今日竟不受集藻贊增髙麗人人參贊三椏五葉背陽向隂欲來求我椵樹相尋五言古詩增宋蘇軾紫團參寄王定國谽谺土門口突兀太行頂豈惟團紫雲實自俯倒景剛風被草木真氣入苕穎舊聞人銜芝生此羊腸嶺纖攕虎豹鬛蹙縮龍蛇癭蠶頭試小嚼龜息變方騁矧予明真子已造浮玉境清宵月挂户半夜珠落井灰心寧復然汗喘久已靜東坡猶故目北藥致遺秉欲持三椏根徃侑七轉鼎為予置齒頰豈不賢酒茗小圃人參上黨天下脊遼東真井底𤣥泉傾海腴白露灑天醴靈苖此孕毓肩股或具體移根到羅浮越水灌清泚地殊風雨隔臭味終祖禰青椏綴紫萼圎實墮紅米窮年生意足黄土手自啓上藥無炮炙齕齧盡根柢開心定魂魄憂恚何足洗麋身輔吾軀既食首重稽七言律詩增唐皮日休友人以人參見恵因以詩謝之神草延年出道家是誰披露記三椏開時的定涵雲液劚後還應帯石花名士寄來消酒渴野人煎處撇泉華從今湯劑如相續不用金山焙上茶陸龜䝉和襲美謝友人恵人參五葉初成椵樹隂紫團峰外即雞林名參鬼蓋須難見材似人形不可尋品第已聞升碧簡攜持應合重黄金殷勤潤取相如肺封禪書成動帝心宋楊萬里謝人寄紫團參新羅上黨各宗枝有兩曽參果是非入手截來花暈紫聞香已覺玉池肥舊傳飲子安心妙新擣珠塵看雪飛珍重故人相問意為言老矣共思歸七言絶句增唐叚成式與周為憲求人參少賦令才猶强作衆醫多識不能呼九莖仙草真難得五葉靈根許恵無周繇以人參遺叚柯古人形上品傳方志我得真英白紫團慚非叔子空持藥更請伯言審細看詩散句增唐韓翃佳期别在春山裏應是人參五葉齊别錄原種植子熟時收取於十月下種一如種菜法若春初生苖時移根種之亦可活收藏人參易蛀見風日尤易蛀惟納新器中密封可經年不壞又盛過麻油磁器泡淨烘乾入華隂細辛相間收之可久又用淋過竈灰曬乾罐收亦可製用正旦未明佩紫赤囊中盛人參木香如豆様時時嚼吞日出乃止號迎年佩沙參原沙參一名羊乳一名羊婆奶一名苦心本草綱目云宜于沙地故名沙參其根多白汁故俚人呼為羊婆奶即别録所謂羊乳此物無心味淡而别錄一名苦心又與知母同名不知所謂也一名文希一名識美增本草一名白參以其色白也一名鈴兒草象花形也一名志取原色白味淡種宜沙地二月生苖葉如初生小葵葉而圓扁不光莖髙一二尺葉尖長如枸杞葉而小有細齒秋月葉間開小紫花如鈴五出白蕊亦有白花者結實如冬青實中有細子霜後苖枯根生沙地者長尺餘大一虎口黄土地者短而小根莖皆有白汁八九月採者白而實春採者微黄而虚味苦微寒無毒人參專補脾胃元氣因而益肺與腎内傷元氣者宜之沙參專補肺氣因而益脾與腎金受火尅者宜之一補陽而生隂一補隂而制陽薺苨原薺苨爾雅云苨菧苨注云薺苨一名杏參一名杏葉沙參一名茋苨一名甜桔梗本草綱目云根如沙參而葉如杏故河南人呼為杏葉沙參圖經杏參即此俗謂之甜桔梗一名白麫根苖名隠忍苖髙一二尺莖青白葉似杏葉小而微尖背白邊有叉牙杪間開五瓣白盌子花根如野葫蘿蔔頗肥皮色灰黝中間白毛亦有開碧花者嫩苖煠熟水淘可油鹽拌食根換水煮亦可食又可蜜煎味甘寒無毒觧百藥毒殺蠱毒壓丹石發動罯毒箭治蛇咬辟沙蝨短狐毒寒而利肺甘而觧毒藥中良品也語云薺苨亂人參故詳著之桔梗原桔梗一名梗草一名白藥一名薺苨本草綱目云桔梗薺苨乃一類有甜苦二種故本經桔梗一名薺苨而今俗呼薺苨為甜桔梗也一名利如一名符扈一名房圖見呉普本草生嵩髙山谷及寃句今處處有之二三月生苖嫩時可煮食根如指大黄白色莖髙尺餘葉似杏葉而長四葉對生夏開小花紫碧色頗類牽牛花秋後結子八月採根關中所出根黄其皮似蜀葵根莖細青色葉小而青似菊葉性辛微溫有小毒治心腹脹痛胸脇痛如刀刺腸鳴血積痰涏𠻳逆口舌生瘡赤目腫痛清肺氣利咽喉破癥瘕治鼻塞除腹中冷痛小兒驚癎為肺部引經之藥與甘草同用為藥中舟楫有承載之功别錄原辨訛凡使勿用木梗木梗真似桔梗只是咬之腥澀不堪桔梗薺苨葉有差互者亦有葉三四對者皆一莖直上葉既相亂惟根有心者桔梗無心者薺苨此足為别耳製用雷斆炮炙論云凡用桔梗須去頭上尖二三分並兩畔附枝於槐砧上細剉用生百合搗膏投水中浸一伏時濾出緩火熬乾每桔梗四兩用百合二兩五錢李時珍曰今但刮去浮皮米泔水浸一夜切片微炒用桔梗煎先以米泔水浸去皮及爛者次以井水煮畢取入蜜煎盡添蜜曬至蜜乾再添蜜收貯長松增本草綱目長松一名仙茅其葉如松服之長年功如松脂及仙茅故有二名生古松下根色如薺苨長三五寸味甘微苦類人參清香可愛并代間土人多以長松雜甘草山藥為湯煎甚佳氣味甘溫無毒温中去風又觧諸蠱毒補益長年彚考增無盡居士集僧普明居五臺山患大風睂髪俱墮衰苦不堪忽異人教服長松示其形狀明采服之旬餘毛髪俱生顔色如故東坡集上黨鴈門出一草藥名長松治大風氣味芳烈亦可作湯常服近嵗河東人多以為餉集藻七言絶句増宋蘇軾謝王澤州寄長松兼簡張天覺二首莫道長松浪得名能教覆額兩睂青便將徑寸同千尺知有竒功似茯苓慿君說與埋輪使速寄長松作解嘲無復青黏和漆葉枉將鍾乳敵仙茅詞増宋黄庭堅鷓鴣天湯泛氷甆一坐春長松林下得靈根吉祥老子親拈出箇箇教成百歲人燈焰焰酒醺醺壑源曾未破醒魂與君更把長生盌略為清歌駐白雲黄精原黄精一名黄芝一名玉芝草一名戊巳芝羊公服黃精法云黄精芝草之精也五符經云黄精獲天地之精淳故名為戊巳芝一名兔竹一名鹿竹本草綱目云葉似竹而鹿兔喜食之也一名龍銜廣雅云龍銜黄精也一名雞格一名米餔九蒸九曝可以代糧故名一名重樓一名野生薑以其根嫩薑也一名救窮草本草拾遺作救荒草一名仙人餘糧以其功名也増本草綱目黄精一名葳蕤根似葳蕤故亦有此名一名日及一名茍格一名馬箭一名垂珠以子形也原南方皆有嵩山茅山者佳根苖花實皆可食三月生苖髙一二尺葉如竹而短兩兩相對本草拾遺云葉不對者名偏精功用不如正精嫩苖采為茹名筆管菜甚美莖梗柔脆頗似桃枝本黄末赤四月開青白花如小豆花結子白如黍米粒亦有無子者根如嫩生薑而黄肥地者大如拳薄地僅如拇指純得土之冲氣而秉乎季春之令味甘平無毒補中益氣除風濕安五臟久服輕身延年不饑彚考増博物志黄帝問天老曰天地所生豈有食之令人不死者乎天老曰太陽之草名曰黄精餌而食之可以長生太隂之草名曰鉤吻不可食入口立死人信鉤吻之殺人不信黄精之益壽不亦惑乎髙士傳陸通字接輿與妻俱隠峩睂諸名山食菌櫨實服黄精子俗傳以為仙神仙傳尹軌學道常服黃精華日三合計年数百歲後到太和山中仙去王烈常服黄精及鈆年三百三十八歲猶有少容登山歴險行歩如飛原稽神錄臨川有士人唐遇虐其所使婢婢不堪其毒乃逃入山中久之糧盡饑甚坐水邉見野草枝葉可愛即㧞取濯水中連根食之甚美自是恒食久之遂不饑而更輕健夜息大樹下聞草中獸走以為虎而懼因念得上樹杪乃生也正爾念之而身已在樹杪矣及曉又念當下平地又歘然而下自是意有所之身輙飄然而去或自一峰之一峰頂若飛鳥焉數嵗其家人伐薪見之以告其主使捕之不得一日遇其在絶壁下即以網三面圍之俄而騰上山頂其主亦駭異必欲致之或曰此婢也安有仙骨不過得靈草餌之爾試以盛饌多其味令甚香美致其徃來之路觀其食否果如其言常來就食食訖不復能遠去遂為所擒具述其故問其所食草之形狀即黄精也復使尋之遂不能得増福地記武當縣石堦山西北角有大松樹樹下生草名救窮日食三寸絶榖不饑久之度世陶先生謂之西岳佐命是也原梧潯雜佩顧况紀秦時建阿房宫采木者偶食黄精天蒜不覺竦身飛上就山下人家裁詩云酒盡君莫酤壺傾我當發城市多囂塵還山弄明月今平樂志所載縈山木客事葢附㑹此說余昔在昭州嘗詢之陶偉西明府云少時聞父老云曾有人見之今久不聞矣峩睂山志黄精峩山産者甚佳宿進游峩詩云拾得黄精須爛煮飯儂明日上峩睂集藻五言古詩増宋鮑照遇銅山掘黄精土肪閟中經水芝韜内策寳餌緩童年命藥駐衰厯矧蓄終古情重拾煙霧迹羊角栖斷雲榼口流隘石銅谿晝森沉乳竇夜涓滴既類風門磴復像天井壁蹀蹀寒葉離灇灇秋水積松色随野深月露依草白空守江海思豈懐梁鄭客得仁古無怨順道今何惜唐韋應物餌黄精靈藥出西山服食採其根九蒸換凡骨經著上世言候火起中夜馨香滿南軒齋居感衆靈藥術啓妙門自懐物外心豈與俗士論終期脫印綬永與天壤存宋韓維荅象之謝恵黄精之什仙經著靈藥兹品上不刋服之歲月久衰羸反童顔巖居有幽子乘時劚蒼山溪泉濯之潔秋陽暴而乾九蒸達晨夜候火不敢安持之落城市誰復著眼看富貴無所嗜口腹窮甘酸貧賤固不暇錐刀乃其干坐使至靈物委棄同草菅惟君冲曠士敦然守髙閑食之易為力天和中自完故以此為餽其容幾一簟報我三百言浩浩馳波瀾何以諭珍重如獲不死丹方當煩燠時把玩毛骨寒他年靈氣成與子驂䨇鸞元吾丘衍張伯雨贈黄精山中有靈草乃云太陽精况聞天老言餌之可長生故人赤松意分贈慰我情玉津比靈芝采采三秀英我願服此久飄然出蓬瀛綠髪無秋霜身如羽翰輕舉臂入霄漢丹臺列髙名手把金芙蓉與君遊太清七言古詩増宋朱弁蘇子翼送黄精酒仙經何物堪却老較功無如太陽草龍銜雞銜名雖異兎公羊公事可考蘇君真是神仙裔橘井隂功貫穹昊雲笈書成數萬言銀闕珠宫用心早獨知此物有竒效福地名山為儲寳不憚林泉新劚掘斥去杵臼謝篩擣况從髙士論麴糜更課公田收秫稻一朝靈液浮瓮盎三冬浩氣生襟抱且欣輭飽得澆腸漫說逆流上補腦眼碧那憂散黑花髪白故應還翠葆賈傅只嫌松醥陋劉墮敢誇桑落好直須五斗論解酲寧待三杯乃通道誰知萬里落旄人亦許匏尊自傾倒為君喚廻雪窖春八載羇愁供一掃七言絶句增唐張籍寄王奉御愛君紫閣峰前好新作書堂藥竈成見欲移居相近住有田多與種黄精詩散句原唐杜甫三春劚黄精一餐生毛羽增白居易丹竈燒煙熅黄精花丰茸宋蘇軾聞道黄精草叢生綠玉篸原唐杜甫掃除白髪黄精在君看他年氷雪容增宋蘇軾詩人空腹待黄精生事只看長柄械唐姚合饒籬栽杏種黄精宋王安石雪底黄精興不踈孫覿連筒自灌黄精圃别錄原種植三月間劈根長二寸稀種膏腴地一年後極稠子亦可種冬取其根製用凡採得以溪水洗淨蒸之從巳至子薄切曬乾春深採根九蒸九曝搗如飴可作果實服食根一石細切水二石五斗煮去苦味漉入絹袋壓汁澄之再煎如膏以炒黑豆黄為末作餅約二寸大可供客臞仙神隠書黄精細切一石用水二石五斗自旦煮至夕候冷以手挼碎布袋榨取汁煎之渣曬乾為末同入釜中煎熬為丸如雞子大每服一丸日三服絶粮除百病身輕不老渴則飲水聖惠方黄精根莖不拘多少細剉隂乾搗末每日水調多少任服一年内變老為少久久成地仙同桑椹漆葉何首烏茅山术作丸餌可變白久之殺三蟲能使足溫而不寒同术久服可輕身陟險不饑同地黄天門冬釀酒可去風益血附錄黄獨増明道雜志老杜同谷詩有黄精無苖山雪盛後人所改也其舊乃黄獨也讀者不知其義因改為精其實黄獨自一物也本處謂之土芋其根唯一顆而色黄故名黄獨饑歲土人掘食以充糧故老杜云耳葳蕤增爾雅熒委萎按本草即今葳蕤也酉陽雜俎葳蕤草一名麗草亦呼為女草江湖中呼為娃草美女曰娃故以為名本草綱目葳蕤一名女萎見本經當是爾雅委萎二字之訛一名萎蕤一名萎䔟一名萎香一名玉竹一名地節按古今韻會云葳蕤草木葉垂之貌此草根長多鬚如冠纓下垂之緌而有威儀故以名之别錄作萎蕤有文也說文作萎䔟音相近也其葉象竹其根多節故又有玉竹地節諸名呉普本草又有烏女蟲蝉之名宋本一名馬薰即烏萎之訛者也蘇頌曰莖根強直似竹箭榦有節葉狹而長表白裏青亦類黄精而多鬚大如指長一二尺三月開青花結圓實李時珍曰處處山中有之其根横生黄白色性柔其葉如竹兩兩相值亦可采根種之極易繁嫩葉及根并可煮淘食茹氣味甘平無毒用代參耆不寒不燥大有殊功彚考増瑞應圖葳蕤者禮備至則生一曰王者愛人命則生一名葳綏也集藻詩散句增唐韓愈葳蕤綴藍瑛别錄增本草凡使勿用黄精並鉤吻二物相似萎蕤節上有鬚毛莖斑葉尖有小黄㸃為不同采得以竹刀刮去節皮洗浄以蜜水浸一宿蒸了焙乾用知母増爾雅􅙛莐藩注生山上葉如韭一名蝭母䟽藥草知母也本草綱目知母一名蚳母蚳說文作茋一名連母一名貨母一名地參一名水參一名水須一名水浚一名苦心一名兒草一名兒踵草一名女雷一名女理一名鹿列一名韭逢一名東根一名野蓼一名昌支李時珍曰宿根之旁初生子根如蚳蝱之状故謂之蚳母後訛為知母蝭母也餘多未詳陶宏景曰形似菖蒲而柔潤葉至難死掘出随生須枯燥乃止蘇頌曰四月開青花如韭花八月結實氣味苦寒無毒張元素曰氣寒味大辛苦氣味俱厚沉而降隂也又云隂中微陽腎經本藥入足陽明經手太隂經氣分李杲曰其用有四瀉無根之腎火療有汗之骨蒸止虚勞之熱滋化源之隂别錄增炮炙論凡使先於槐砧上挫細焙乾木臼杵搗勿犯鐵器本草凡用揀肥潤裏白者去毛切引經上行則用酒浸焙乾下行則用鹽水潤焙肉蓯蓉原肉蓯蓉本草綱目云此物補而不峻故有從容之號從容和緩也一名肉松容一名黑司命出肅州福祿縣沙中今陜西州郡多有之然不及西𦍑界中來者肉厚而力𦂳三四月掘根長尺餘切取中央好者三四寸䋲穿隂乾八月始好别錄云五月五日采隂乾吳氏本草云二月至八月采圖經云八月采恐老不堪故多三月采之皮有松子鱗甲性甘微溫無毒補五勞七傷益精髓悅顔色飬五臟延年輕身令人多子别錄原辨訛朱震寧曰河西混一之後方識其真形何嘗有所謂鱗甲者蓋蓯蓉罕得人多以金蓮根用鹽盆製而為之又或以草蓯蓉充之陳嘉謨曰今人以嫩松梢鹽漬偽為之製用清酒浸一宿以棕刷去沙土浮甲劈破中心去白膜一層如竹絲草様有此能隔人心前氣不散令人上氣以甑蒸之從午至酉取出再用酥炙得所西人刮去鱗甲酒浸洗去黑汁薄切合山芋羊肉作羮極益人勝服補藥列當原列當一名草蓯蓉一名花蓯蓉一名栗當秦州原州渭州靈州皆有之暮春抽苖四月中旬采取長五六寸至一尺莖圓白色采取壓扁日乾以其功劣於肉蓯蓉故謂之列當性甘溫無毒治男子五勞七傷補腰腎令人有子煮酒浸酒服之大補益人鎖陽增本草綱目鎖陽出肅州其形如笋上豐下儉鱗甲櫛比筋脈連絡即肉蓯蓉之類氣味甘溫無毒大補隂氣益精血可代蓯蓉煮粥彌佳天麻增本草綱目天麻即赤箭根一名赤箭芝以狀而名一名獨揺芝一名定風草陶𢎞景曰赤箭有風不動無風自揺一名離母一名合離草蘇頌曰仙方有合離草一名獨搖芝一名離母所以謂之合離離母者此草下根如芋魁有游子十二枚周環之以倣十二辰去大魁數尺皆有紉根如白髪雖相須而實不相連但以氣相屬耳按西京雜記云終南山多離合草葉似江蘺而紅綠相間莖皆紫色亦與此草相類一名神草一名鬼督郵與徐長卿同名以功而言也馬志曰生鄆州利州太山勞山諸處葉似芍藥而小當中抽一莖直上如箭榦莖端結實狀若續隨子至葉枯時子黄熟其根連一十二枚猶如天門冬之類形如黄𤓰亦如蘆菔大小不定蘇恭曰是芝類莖似箭榦赤色端有花葉赤色遠看如箭有羽四月開花結實似枯苦楝子核作五六稜中有肉如麫日暴則枯萎蘇頌曰春生苖獨抽一莖莖中空依半以上貼莖微有尖小葉梢頭生成穂開花結子如豆粒大其子至夏不落即透虚入莖中潛生土内俗名還筒子根形如黄𤓰連生一二十枚大者至重半斤或五六兩皮黄白色名曰龍皮肉名天麻初得乗潤刮去皮沸湯略煮過暴乾收之嵩山衡山人或取生者蜜煎作果食甚珍之李時珍曰暴乾肉色堅白如羊角色呼羊角天麻蒸過黄皺如乾𤓰者俗名醤𤓰天麻皆可用一種形尖而空薄如𤣥參狀者不堪用根莖氣味並辛溫無毒彚考增抱朴子獨揺芝生髙山深谷其生左右無草根有大魁如斗細者如雞子十二枚繞之人得大者服之延年夢溪筆談赤箭即今之天麻也後人既誤出天麻一條遂指赤箭别為一物既無此物不得已又取天麻苖為之兹為不然本草明稱採根隂乾安得以苖為之草藥上味除五芝之外赤箭為第一此神仙補理飬生上藥世人惑於天麻之說遂止用之治風良可惜哉以謂其莖如箭既言赤箭疑當用莖此尤不然至如鳶尾牛膝之類皆謂莖葉有所似則用根耳何足疑哉集藻詩散句增唐白居易赤箭一甌湯别錄増本草陳藏器曰天麻生平澤似馬鞭草節節生紫花中有子如青箱子性寒李時珍曰此一種天麻草是益母草之類也嘉祐本草誤引入天麻耳术原术一作􅙥有兩種本草云古方二术通用後人方有蒼白之分白术枹薊也爾雅云揚枹薊注云似薊而肥大本草云揚州之域多種白术其状如枹故有枹薊之名今人謂之呉术是也一名天薊一名山薑一名山芥本草云以其葉似薊而味似薑芥也一名山連一名馬薊増本草西域謂之乞力伽蘇頌曰白术生杭越舒宣州髙山崗上葉葉相對上有毛方莖莖端生花淡紫碧紅数色根作椏生二三月八九月采暴乾用以大塊紫花為勝原吳越有之嫩苖可茹葉梢大而有毛根如指大狀如鼓槌亦有大如拳者彼人剖開曝乾謂之削术亦曰片术白而肥者為浙术俗名雲頭术其力勝歙术俗曰狗頭术甚燥白勝於浙术痩而黄者為幕阜山术其力劣味苦而甘性溫厚氣薄除濕益燥溫中補氣强脾胃生津液止胃中及肌膚熱解四肢困倦佐黄岑安胎清熱在氣主氣在血主血有汗則止無汗則發蒼术山薊也爾雅云术山薊注云术似薊一名山精一名仙术一名赤术處處山中有之苖髙二三尺其葉抱莖而生葉似棠梨葉其脚下葉有三五叉皆有鋸齒小刺根如老薑蒼黑色肉白有油膏以茅山嵩山者為佳味甘而辛烈性溫而燥除濕發汗健脾安胃治濕痰留飲驅災沴邪氣消痃癖氣塊婦人冷氣癥瘕山嵐瘴氣瘟疾總之二术所治大略相近除濕解鬱發汗驅邪蒼术為要補中焦益胎元健脾胃消濕痰益脾白术為良彚考増晋書許邁傳邁初採藥於桐廬縣之桓山餌术渉三年時欲斷穀南史劉虬傳虬宋㤗始中仕至晉平王驃騎記室當陽令罷官歸家靜處常服鹿皮袷斷穀餌术及胡麻山海經首山其草多术莞女几之山其草多术淮南畢萬術术草者山之精也結隂陽精氣服之令人長生絶穀致神仙故神農藥經曰子欲長生當服山精子欲輕翔當服山薑列仙傳涓子餌术栟食其精三百年乃見於齊南方草木狀藥有乞力伽术也瀕海所産一根有至數斤者劉涓子取以作煎令可丸餌之長生神仙傳漢武帝東廵狩見老翁鉏于道旁頭上白光高數尺怪而問之對曰臣年八十五時頭白齒落遇有道者教臣絶穀但服术飲水並作神枕臣行之轉老為少黑髪更生齒落復出日行三百里臣今一百八十歲矣帝受其方賜玉帛老父後入岱山中每十年五年時還鄉里三百餘年乃不復還葛𤣥字孝先從左元放受九丹金液仙經未及合作常服餌术後尸解去陳子皇得餌术要方服之得仙去霍山妻疲病其壻用餌术法服之病自愈安壽一百七十歲登山取术重檐而歸不息不極顔色氣力如二十許人原抱朴子南陽文氏漢末逃難華山中饑困欲死有人教之食术遂不饑數十年乃還鄉里顔色更少氣力轉勝増建康記建康出精术廣州記彰平縣偏饒术顔氏家訓爾雅云术山薊案木葉其體似薊近世文士遂讀薊為筋肉之筋以耦地骨用之恐失其義原吐納經紫微夫人术序云吾察草木之精速益於巳者並不及术之多驗也可以長生久視逺而更靈山林隠逸得服术者五岳比肩增洛陽要記陳宛盛其居止厠上以术湯盥手清異錄潛山産善术以其盤結醜怪有獸之形因號為獅子术東坡雜記黄州山中蒼术甚多就野買一斤數錢爾此長生藥也人以為易得不復貴重至以熏蚊子此亦可為太息舒州白术莖葉亦甚相似特華紫耳然甚難得三百一兩其效止於和胃去游風非神仙上藥也原氣類編越民髙氏妻病恍惚譫語亡夫之鬼慿之其家燒蒼术鬼遽求去夷堅志江西一士為女妖所染其鬼將别曰君為隂氣所侵必當暴泄但多服平胃散為良中有蒼术能去邪也増水南翰記范文正公所居宅必先浚井納青术數斤於其中以辟瘟氣集藻啓増梁庾肩吾荅陶隠居賚术煎啓竊以綠葉抽條生於首峰之側紫花標色出自鄭巖之下百邪外禦六府内充山精見書華神在籙木熒火謝盡采擷之難啓旦移申窮淋漉之劑故能競爽雲珠爭竒冰玉自非身疲掌硯役倦攀桃豈可立致還年坐生羽翼臨洮丹井方覺可捐酈縣菊泉無勞復汲庶得遨遊海岸追涓子之塵馳騖霍山共陳生為侶謠俗輕施尚曰難酬出世鴻塵寧知上報荅陶隐居賚术蒸啓味重金漿芳踰玉液足使芝慙明麗丹愧芙蓉坐致延生伏深銘戴五言古詩增唐栁宗元種术守閑事服餌採术東山阿東山幽且阻疲薾煩經過戒徒劚靈根封植閟天和違爾澗底石徹我庭中莎土膏滋𤣥液松露墜繁柯東南自成畆繚繞紛相羅晨歩佳色媚夜眠幽氣多離憂茍可怡孰能知其他㸑竹茹芳葉寧慮瘵與瘥留連樹蕙辭婉娩采薇歌悟拙甘自足激清愧同波單豹且理内高門復如何宋梅堯臣採白术吳山霧露清羣草多秀發白术結靈根持鋤採秋月歸来濯寒澗香氣流不歇夜火煮石泉朝煙編巖窟千歲扶玉顔終年固𤣥髪曾非首陽人敢慕食薇蕨范成大次韻謝施進之恵紫芝术山精媒長生仙理信可詰棃棗本寓言杞菊亦凡質幽人愛臞儒藥鼎薦珍物絶粒謝煙火耘苖換肌骨摩挱萊蕪甑塵生不須拂七言絶句增明邵寳以蜜术問南沙醫家白术重天台郡守曾將蜜浸來嚼罷不知香滿室桃花流水夢瑤臺詩散句增宋張耒南畆稻粮仍歲熟舊山芝术入秋肥髙似孫一筯术絲仙有分依然只作秘書香唐溫庭筠衣濕术花雨宋林逋蒸术拾鄰梢陸游土潤术苖肥别錄原種植取其根栽之一年即稠製用白术以米泔浸一宿入藥一法東壁土炒用蒼术性燥須糯米泔浸洗再換泔浸二日浸去油去粗皮切片焙乾用亦有用脂麻同炒以制其燥者以术作飲甚甘香狗脊增本草綱目狗脊一名强膂一名扶筋一名百枝一名狗青蘇恭曰根如狗脊而色青故名李時珍曰强膂扶筋以功名也别錄又名扶蓋乃扶筋之誤本經一名百枝而呉普謂百枝為萆薢誤也蘇頌曰今太行山淄溫諸州有之苖尖細碎青色髙一尺無花其莖葉似貫衆而細其根黑色長三四寸多岐似狗之脊骨大有兩指許其肉青綠色春秋采根暴乾李時珍曰狗脊有二種一種根黑色如狗脊骨一種有金黄毛如狗形皆可入藥其莖細而葉花兩兩對生正似大葉蕨比貫衆葉有齒面背皆光其根大如拇指有硬黑鬚簇之氣味苦平無毒治風痺益腰膝續筋骨强肝腎别錄增炮炙論凡修治火燎去鬚細剉丁酒浸一夜蒸之從巳至申取出曬乾用本草今人惟剉炒去毛鬚用貫衆増爾雅濼貫衆注葉圎銳莖毛黑布地冬不死一名貫渠廣雅云貫節疏藥草名也本草云一名百頭一名虎卷一名萹苻一名伯萍一名藥藻此謂鴟頭陶注云葉如大蕨形色毛芒全似老鴟頭因名之本草綱目一名黑狗脊一名鳳尾草李時珍曰此草莖葉如鳳尾其根一本而衆枝貫之故草名鳯尾根名貫衆貫節貫渠渠者魁也呉普本草作貫中俗名貫仲管仲者皆謬稱也别錄名伯萍藥藻皆字訛也呉普曰四月開花白七月實黑聚相連卷旁生蘇頌曰春生苖赤葉大如蕨莖榦三稜葉綠色似雞翎其根紫黑色形如大𤓰下有黑鬚李時珍曰多生山隂近水處數根叢生一根數莖莖大如筯其涎滑葉兩兩相對似狗脊之葉而無鋸齒青黄色面深背淺其根曲而有尖嘴黑鬚叢簇亦似狗脊根而大氣味苦微寒有毒治腹中邪熱諸毒殺三蟲破癥瘕除頭風止金瘡止鼻血解骨哽治婦人血氣巴㦸天増本草綱目巴㦸天一名不凋草一名三蔓草别錄曰生巴郡及下邳山谷陶宏景曰今亦用建平宜都者根狀如牡丹而細外赤内黑蘇恭曰其葉似茗經冬不枯根如連珠宿根青色嫩根白紫用之亦同以連珠多肉厚者為勝蘇頌曰今江淮河東州郡亦有但不及蜀州者佳多生山林内内地生者葉似麥門冬而厚大至秋結實今方家多以紫色為良蜀人云都無紫色者采時或用黑豆同煮欲其色紫殊失氣味又有一種山葎根正似巴㦸但色白土人采得用醋水煮之乃以雜巴㦸莫能辨也但擊破視之中紫而鮮潔者偽也其中雖紫又有微白糝有粉色而理小暗者真也氣味辛甘微溫無毒治風邪强筋骨安五臟補中增志益氣補五勞療水脹補血海别錄增炮炙論凡使須用枸杞子湯浸一宿待稍軟漉出再酒浸一伏時漉出同菊花熬焦黄去菊花以布拭乾用本草今法惟以酒浸一宿剉焙入藥若急用只以溫水浸軟去心也遠志増爾雅葽繞蕀蒬廣雅蕀蒬逺志也其上謂之小草本草綱目逺志苖名小草一名細草一名醒心杖此草能益智强志故有逺志之稱記事珠謂之醒心杖也蘇頌曰河洛陕西州郡有之根形如蒿根黄色苖似麻黄而青又如畢豆葉亦有似大青而小者三月開白花根長及一尺泗州出者花紅根葉俱大於他處商州出者根又黑色俗傳夷門出者最佳四月采根曬乾古方通用遠志小草今醫但用逺志稀用小草氣味苦溫無毒治欬逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘强志倍力益精定心氣安魂魄長肌肉助筋骨治一切癰疽久服輕身不老彚考増抱朴子陵陽子仲服逺志二十年有子三十七人能坐在立忘也世說謝公始有東山之志後嚴命屢臻勢不獲已始就桓公司馬於時人有餉桓公藥草中有逺志公取以問謝此藥又名小草何一物而有二稱謝未即荅時郝隆在坐應聲荅曰此甚易解處則為遠志出則為小草謝甚有愧色桓公目謝而笑曰郝叅軍此過乃不惡亦極有㑹百脉根増本草綱目蘇恭曰百脉根出肅州巴西一似苜蓿花黄根如遠志二月八月采根曬乾李時珍曰按唐書作栢脉根肅州歲貢之千金外臺大方中亦時用之今不復聞此或者名稱又不同也氣味苦微寒無毒下氣止渴去熱除虚勞補不足滛羊藿原滛羊藿本草經云西川北部有滛羊常食此藿故名綱目云豆葉曰藿此葉似之故亦曰藿一名仙靈脾脾柳集作毗人臍曰毗此物補下于理尤通一名放杖草一名棄杖草一名千兩金一名剛前皆言其功也一名乾雞筋一名黄連祖一名三枝九葉草皆言其形也江東陕西㤗山漢中湖湘間皆有之生大山中一根數莖莖麤如線髙一二尺一莖二椏一椏三葉長二三寸青似杏葉及豆葉面光背淡甚薄而細齒邉有刺根紫色有鬚四月中開白花亦有紫花者碎小獨頭子五月採葉曬乾根如黄連根葉俱堪用生處不聞水聲者良性辛寒無毒補腰膝强心志益氣力堅筋骨治老人昏耄中年健忘一切冷風筋骨攣急四肢不仁久服令人有子集藻五言古詩増唐柳宗元種仙靈毗窮陋闕自飬癘氣劇囂煩隆冬乏霜霰日夕南風溫杖藜下庭際曵踵不及門門有野田吏慰我飄零魂乃言有靈藥近在湘西原服之不盈旬蹩􅍷皆騰鶱笑抃前即吏為我擢其根蔚蔚遂充庭英翹忽巳繁晨起自採曝杵臼通夜喧靈和理内藏攻疾貴自源擁覆逃積霧伸舒委餘暄竒功茍可徵寧復資蘭蓀我聞畸人術一氣中夜存能令深深息呼吸還歸跟疎放固難效且以藥餌論痿者不忘起窮者寧復言神哉輔吾足幸及兒女奔别錄原製用凡使時呼仙靈脾以夹刀夹去四邉花枝每一斤羊脂四兩拌炒以脂盡為度真陽不足者宜之療治仙靈脾酒用滛羊藿一斤酒一斗浸三日逐時飲之御定佩文齋廣羣芳譜卷九十三
