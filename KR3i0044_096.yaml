body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九十四藥譜仙茅原仙茅海藥本草云其葉似茅久服輕身故名梵音呼為河輪勒陀一名獨茅圖經本草云其根獨生故名一名茅爪子一名婆羅門參詳見後圖經本草初出西域今大庾嶺蜀川江湖兩浙諸州亦皆有之葉青如茅而軟且畧濶面有縱紋又似初生㯶櫚秧高尺許至冬盡枯春初乃生四五月間抽莖開小花深黃色六出不結實其根獨莖直大如小指下有短細肉根相附外皮稍麤褐色内肉黃白色二月八月採根曝乾衡山出者花碧五月結黑子處處大山中皆有人惟取梅嶺者用性辛溫有小熱小毒治心腹冷氣不能食腰脚風冷攣痺不能行丈夫虚勞無子久服通神强記益顔色健筋骨長肌膚助精神明耳目填骨髓許真君書云仙茅久服長生其味甘能養肉辛能養節苦能養氣鹹能養骨滑能養膚酸能養筋宜和苦酒服必効集藻七言絶句增宋范成大玉虚觀去宜春二十五里許君上昇時飛白茅數葉以賜王長史王以宅為觀觀旁至今有仙茅極異常草備五味尤辛辣云久食可仙道士煮湯以設客白雲堆裏白茅飛香味芳辛勝五芝揉葉煮泉摩腹去全勝石髓畏風吹别錄原圖經本草開元中婆羅門僧進此藥明皇服之有効禁方不外傳天寶之末方書流散上都僧不空三藏傳司徒李勉尚書路嗣供僕射張建封給事齊抗服之皆有効路公久服金石無効得此藥其益百倍齊給事生平少氣力風疹繼作服之遂愈五代唐王顔著續傳信方編錄服仙茅方當時盛行云十斤乳石不及一斤仙茅本草會編五臺山有仙茅患大風者服之多瘥本草綱目按范成大虞衡志云廣西英州多仙茅其羊食之舉體悉化為筋不復有血肉食之補人名乳羊沈括筆談云夏文莊公禀賦異於人但睡則身冷如逝者既覺須令人溫之良久乃能動常服仙茅鍾乳硫黃莫知紀極觀此則仙茅蓋亦性熱補三焦命門之藥也惟賦禀素怯者宜之若體狀火盛者服之反能動火按張果醫說云一人中仙茅毒舌脹出口漸大與肩齊因以小刀𠢐之隨破隨合𠢐至百數始有血一㸃出曰可救矣煮大黃朴硝與服以藥摻之應時消縮此皆火盛性淫之人過服之害也宏治間東海張弼梅嶺仙茅詩有使君昨日纔持去今日人來乞墓銘之句皆不知服食之理惟藉藥縱恣以速其生者於仙茅何尤製用清水洗刮去皮槐砧上用銅刀切豆許大生稀布袋盛黑豆水内浸一宿取出酒拌濕蒸從已至亥取出曝乾勿犯鐵器及牛乳斑人鬢鬚彭祖單服法竹刀刮切糯米泔浸去赤汁出毒後無妨損元參原元參一名黑參以色名也本草註云其莖微似人參故得參名一名鹿腸一名馥草開寶本草云合香家用之故俗呼馥草一名元臺一名重臺一名正馬一名逐馬一名鬼藏一名野芝麻宿根二月生苗葉似脂麻對生又如槐柳而尖長有鋸齒細莖青紫色七月開花青碧色八月結子黑色又有白花者莖方大紫赤色而有細毛有節若竹者高五六尺一根五七枚微有腥氣地蠶喜食之故其中空味苦微寒無毒治胸中氤氲之氣無根之火與地黃同功其消瘰癧解斑毒亦以散火之故别錄增炮炙論凡采得後須用蒲草重重相隔入甑蒸兩伏時曬乾用勿犯銅器餌之噎人喉喪人目地榆原地榆一名玉豉本草註云其葉似榆初生布地故名其子紫黑色如豉故又名玉豉一名玉札一名酸赭蘄州呼為酸棗綱目云外丹方地榆一名酸赭以其味酸其色赭故也俗又訛赭為棗處處平原川澤皆有之宿根三月内生苗初生布地獨莖直上高三四尺對分出葉葉似榆葉而稍狹細長似鋸齒狀青色七月開花如椹子紫黑色根外黑裏紅似柳根味苦微寒無毒消酒止渴補腦明目止膿血除惡肉療金瘡此草霧而不濡太陽氣盛也燒作灰能鑠金爛石故道家煮石方用之炙其根作飲若茗取其汁釀酒治風痺采其葉作飲亦好又可煠食彚考原東華真人煮石經昔西域真人王屋山人王常言何以得長夀何不食石用玉豉玉豉者即地榆也昔尹公度聞孟綽子董子固共相與言曰寧得一斤地榆安用明月寶珠丹參原丹參一名赤參以色名也一名山參一名郗蟬草一名木羊乳一名逐馬一名奔馬草四聲本草云丹參治風軟脚可及奔馬故名二月生苖高一尺許莖方有稜青色一枝五葉相對如薄荷而有毛三月至九月開花紅紫似蘇花成穗如蛾形中有細子根大者如指長尺餘一苗數根皮丹而肉紫味苦微寒無毒破宿血補新血安生胎落息胎破癰除瘕排膿止痛定精養神定志通利關脈婦人明理論云四物湯冶婦人諸病調婦人經脈皆可通用一味丹參散與之同功紫參原紫參一名牡蒙與王孫同名一名童腸一名馬行一名衆戎一名五鳥花以形得名苗長一二尺莖青而細葉青似槐葉亦有似羊蹄者五月開花白色絶似蔥花亦有紅紫而似水葒者根淡紫黑色如地黃狀肉紅白色肉淺而皮深三月採根火炙紫色用范子計然云紫參出三輔有三色以青赤色為上味苦寒無毒治諸血病及心腹積聚寒熱瘧痢癰腫積塊之屬集藻七言古詩增錢起紫參歌并序紫參幽芳也五葩連萼狀飛禽羽舉俗名之五鳥花起故山道人蘭若尤豐此藥校書劉公詠歌之俾予繼組遠公林下滿青苔春藥偏宜間石開往往幽人尋水見時時仙蝶隔雲來隂陽雕刻花如鳥對鳯連雞一何小春風宛轉虎溪傍紫翼紅翹翻霽光貝葉經前無住色蓮花會裏暫留香蓬山才子憐幽性白雪陽春動新詠應知仙卉老煙霞莫賞夭桃滿蹊逕王孫增本草綱目王孫一名牡蒙與紫參同名一名黃孫一名黃昏陶𢎞景曰今方家皆呼為黃昏云牡蒙市人少識者一名旱藕其根如藕吳普曰楚名王孫齊名長孫又名海孫吳名白功草又名蔓延赤文整延相當蘇恭曰葉似及已而大根長尺餘皮肉皆紫色李時珍曰葉生頂上似紫河車葉氣味苦平無毒治五臟邪氣寒濕痺四肢疼酸膝冷痛療百病益氣長生不飢黑毛髮彚考增唐書方技傳開元末姜撫言終南有旱藕餌之延年狀類葛粉帝作湯餅賜大臣右驍衛將軍甘守誠能識藥石曰旱藕牡蒙也方家久不用撫易名以神之紫草原紫草一名紫丹一名紫芙一名茈䓞廣雅云茈䓞紫草也一名藐爾雅云藐茈草一名地血一名鴉銜草本草云猺獞呼之云爾生碭山山谷南陽新野及楚地苗似蘭香莖赤節青二月開花紫白色結實亦白色秋月熟根色紫可以染紫味甘鹹氣寒無毒補中益氣利九竅入心包絡及汗經血分凉血和血利大小腸故痘疹欲出未出血熱毒盛大便閉澀者宜用得木香白术佐之尤妙已出而紫黑閉者亦可用若出而紅活者及白陷大便利者切忌蓋脾氣實者可用脾氣虚反能作瀉古方惟用茸取其初得陽氣以類觸類所以用發痘瘡今人不達此理一概用之則非矣一切惡瘡瘑癬腫毒亦可用彚考增山海經勞山多茈草敦薨之山其下多茈草隅陽之山其草多茈博物志平氏山之陽紫草特好廣志隴西紫草紫之上者集藻樂曲增宋無名氏讀曲歌紫草生湖邊誤落芙蓉裏色分都未獲空中染蓮子别錄原種植宜黃白輭良之地青沙地亦善開荒黍穄下大佳性不耐水必須高田秋耕深細耮平不深不細易生草穢至春又轉耕之三月種之耬耩地逐隴手下子良田一畝用子二升半薄田三升下訖耮之或以輕砒碾過地潔淨為佳隴底草手拔之用鋤恐傷根不茂此草嬌嫩也刈穫九月中子熟刈之候燥聚打取子收草宜速竟為良濕打則子浥鬱不速恐遇雨損草一把隨以茅束之擘葛尤善四把為一束當日斬齊一顛一倒十層許為長行置堅平地上板石壓之令稨兩三宿䜿頭置日中曝之令浥浥然不壓難售太乾則碎帶濕為良不曬鬱黑太燥碎折五十頭作一洪著屋下隂凉處棚棧上洪十字大頭向外以葛纒縳之棚下勿有驢馬糞及人溺又忌煙皆令草失色其利勝藍若欲久停者入五月内著屋中閉門塞向密泥勿使風入漏氣過立秋然後開出草色不黑若經夏在棚棧上草便變黑不復任用矣製用秋深子熟傍去其土連根取就地鋪齊少乾輕振其土以茅策束切去虚梢以之染紫其色殊美增炮炙論凡使每一斤用蠟二兩鎔水拌蒸之待水乾取去頭并兩畔髭細挫用白頭翁增本草綱目白頭翁陶宏景曰近根處有白茸狀似白頭老翁故以為名一名野丈人一名胡王使者一名柰何草李時珍曰皆狀老翁之意蘇頌曰所在有之正月生苗作叢生狀似白薇而柔細梢長葉生莖頭如杏葉上有細白毛而不滑澤近根有白茸根紫色深如蔓青其苗有風則靜無風而揺與赤箭獨活同也氣味苦溫無毒李杲曰氣厚味薄可升可降治瘧痢狂􅀈寒熱瘕癥癭氣逐血止諸痛療金瘡鼻衂明目治一切風氣大明曰花子莖葉氣味并同集藻五言律詩增唐李白見野草中有白頭翁者醉入田家去行歌荒野中如何青草裏亦有白頭翁折取對明鏡宛將衰鬢同微芳似相誚留恨向東風白及增本草綱目一名連及草一名甘根一名白給李時珍曰其根白色連及而生故曰白及連及其味苦而曰甘根反言也吳普作白根其根有白亦通金光明經謂之罔達羅喝悉多别錄作白給韓保昇曰葉似初生㯶苗葉及藜蘆三四月抽出一薹開紫花七月實熟黃黑色冬凋根似菱有三角白色角頭生芽八月采根用李時珍曰一科止抽一莖開花長寸許紅紫色中心如舌其根如菱米有臍如鳬茈之臍又如扁螺旋紋性難乾三七原三七一名山漆一名金不換本草云彼人言其葉左三右四故名三七蓋恐不然或云本名山漆謂其能合金瘡如漆黏物也此說近之金不換貴重之稱也生廣西南丹諸州番峒深山中采根曝乾黃黑色團結者狀畧似白及長者如老薑地黃有節味微甘而苦頗似人參之味氣溫無毒止血散血亦主吐血衂血下血血痢崩中不止産後惡血不下血暈血痛赤目癰腫虎咬蛇傷諸病治金瘡箭傷跌撲杖瘡血出不止嚼爛塗或為末摻之血立止青腫者即消若受杖時先服一二錢則血不衝心杖後尤宜服産後服亦良乃陽明厥隂血分之藥故能治一切血病忌鐵器與騏驎竭紫釧相同試法以末摻猪血中血化為水者乃真其葉功効畧同本草綱目云近傳一種草春生苗夏高三四尺葉似菊艾而勁厚有岐尖莖有赤稜夏秋間開黃花蘂如金絲盤紐可愛而氣不香花乾成絮如苦蕒絮根葉味甘治金瘡折傷出血及上下血病甚効云是三七而根大如牛蒡根與南中來者不類恐是劉寄奴之屬甚易繁衍黃連原黃連一名王連一名支連本草綱目云其根連珠而色黃故名江湖荆夔皆有而以宣城九節堅重相擊有聲者為勝施黔者次之東陽歙州處州者又次之苗高尺許叢生一莖三葉葉似甘菊凌冬不凋四月開花黃色六月結實似芹子色亦黃江左者根黃節高若連珠葉如小雉尾草正月開花作細穗淡黃白色六七月根𦂳始堪采蘇恭云蜀道者麤大味極濃苦療渴為最江東者節如連珠療痢大善澧州者更勝李時珍云今雖吳蜀皆有惟以雅州眉州者為良大抵有二種一種根麤無毛有珠如鷹雞爪形色深黃而堅實一種無珠多毛黃色稍淡而中虚味苦寒無毒止消渴厚腸胃利骨益膽降火療口瘡其用有六瀉心臟火一也去中焦濕熱二也諸瘡必用三也除風濕四也治赤眼暴發五也止中部見血六也彚考增宋史地理志施州貢黃連神仙傳封衡字君達隴西人也幼學道通老莊學勤訪真訣初服黃連五十年後入鳥獸山採藥又服术百餘年還鄉里如二十許人原異林𢎞治乙卯長沙大旱黃連上生王𤓰集藻贊原宋王微黃連贊黃連味苦左右相因斷凉滌暑闡命輕身縉雲昔御飛踔上旻不行而至吾聞其人頌原梁江淹黃連頌黃連上草丹砂之次禦孽辟妖長靈久視驂龍行天馴鳯匝地鴻飛以儀順道則利書增宋秦觀與喬希聖論黃連書某比聞公以眼疾餌黃連至數十兩猶不已不知果然否審如所聞殆不可也某頃年血氣未定頗好方術之說讀醫經數年嘗記釋者云服黃連苦參久而反熱甚以為不然後乃信之蓋五味入胃各歸其所喜故酸先歸肝苦先歸心甘先歸脾辛先歸肺鹹先歸腎入肝則為溫入心則為熱入肺則為清入腎則為寒入脾則為至隂而血氣兼之皆謂增其氣不已則臟氣有所偏勝有所偏勝則必有所偏絶黃連苦參性雖大寒然其味至苦入胃則先歸於心久而不已則心火之氣勝火勝則熱乃其理也眼疾之生本於肝之熱肝與心為子母夫心為子肝為母心火也肝亦火也腎孤臟也人嘗患一水不勝二火今病本於肝而久餌苦藥使心有所偏勝是所謂以火救火命之曰益多其不可亦明矣夫藥所以療疾其過也適所以為疾聞比初作時十已損其七八正宜節藥慎䕶飲食以俟其自平非如決疣潰癰可以忽然一朝去也輙具以進惟留意而聽之無忽五言古詩增明吳寛黃連花細山桂然階下不堪嗅野人劚其根根長節應九苦節不可貞服食可資壽其功利於病有客嫌苦口戒予勿種兹味苦和難受豈不見甘草百藥無不有五言絶句增明僧智舷黃山黃連黃山有黃連甘美類蘋果不是性味移頭陀能忘苦詩散句增宋蘇軾蜂閙黃連采蜜花别錄原本草綱目本經别錄並無黃連久服長生之說惟陶宏景言道方服食長生竊謂黃連大苦大寒之藥用之降火燥濕中病即當止豈可久服使肅殺之令常行而伐其生發冲和之氣乎荆端王素多火病醫令服金花丸乃芩連梔柏四味服至數年其火愈熾遂至内障喪明觀此則寒苦之藥不但使人不能長生久則氣增偏勝速夭之由矣陶氏道書之說皆謬談也製用布拭去毛漿水浸半日時漉出柳木火焙乾用黃連入手少隂心經為治火主藥治本臟火生用治肝膽實火猪膽汁浸炒治肝膽虚火醋浸炒治上焦火酒炒治中焦火薑汁炒治下焦火鹽水或朴硝炒治氣分濕熱之火茱萸湯浸炒治血分塊中伏火乾漆水炒治食積之火黃土炒不獨為之引導蓋辛熱能制其苦寒酸寒能制其燥性用者詳酌之附錄胡黃連原胡黃連一名割孤露澤本草綱目云其性味功用似黃連故名割孤露澤梵語也生波斯國海畔陸地今南海秦隴間亦有之初生似蘆苗若夏枯草根頭似烏嘴乾則似楊柳枯枝心黑外黃折之内似鸜鵒眼塵出如煙者良八月上旬採氣味苦平無毒治骨蒸勞熱三消五心煩熱婦人胎蒸虚驚冷熱洩痢厚腸胃益顔色黃芩原黃芩本草綱目云芩說文作菳謂其色黃也或云芩者黔也黔乃黃黒之色也一名經芩一名空腸一名腐腸一名内虚一名黃文一名印頭一名妬婦一名苦督郵内實者名子芩一名條芩一名㹠尾芩一名䑕尾芩本草註云圓者名子芩破者名宿芩其腹中皆爛故名腐腸綱目云宿芩乃舊根多中空外黃内黒即今所謂片芩故又有腐腸妬婦諸名妬婦心黯故以比之子芩乃新根多内實即今所謂條芩或云西芩多中空而色黔北芩多内實而深黃川蜀河東陜西近郡皆有之苗長尺餘莖麤如筯葉從地四面作叢生類紫草高一尺許亦有獨莖者葉細長青色兩兩相對六月開紫花根如知母長四五寸二月八月采根曝乾氣寒味微苦而甘氣厚味薄得酒上行得猪膽汁除肝膽火得柴胡退寒熱得厚朴黃連止腹痛得芍藥止下痢得桑白皮瀉肺火得五味子牡蠣令人有子得白术安胎得黃茋白斂赤小豆療䑕瘻李時珍曰黃芩氣寒味苦色黃帶綠苦入心寒勝熱瀉心火治脾之濕熱一則金不受刑一則胃火不流入肺即所以救肺也肺虚不宜者苦寒傷脾胃損其母也少陽之證寒熱胸脇痞滿實兼心肺上焦之邪心煩喜嘔黙黙不欲飲食又兼脾胃中焦之證宜用黃芩以治手足少陽相火黃芩亦少陽本經藥也别錄增物類相感志磨黃芩寫字在紙上以水沉去紙則字畫脫在水面上本草綱目予年二十時因感冒咳𠻳既久且犯戒遂病骨蒸發熱膚如火燎每日吐痰盌許暑月煩渴寢食既廢六脈浮洪遍服柴胡麥門冬荆瀝諸藥月餘益劇皆以為必死矣先君偶思李杲治肺熱如火燎煩燥引飲而晝盛者氣分熱宜一味黃芩湯以瀉肺經氣分之火遂按方用片芩一兩水二鍾煎一鍾頓服次日身熱盡退而痰𠻳皆愈藥中肯綮如鼓應桴醫中之妙有如此哉秦艽增本草綱目秦艽一名秦䊵一名秦𤓰蘇恭云俗作秦膠本名秦䊵與糾同李時珍曰出秦中以根作羅紋交糾者佳故名蘇頌曰河陜州郡多有之其根土黃色而相交糾長一尺以來麤細不等枝榦高五六寸葉婆娑連莖梗俱青色如萵苣葉六月中開花紫色似葛花當月結子每於春秋采根隂乾李時珍曰以左文者為良氣味苦平無毒治寒熱邪氣寒濕風痺肢節痛骨蒸疳及時氣療黃疸解酒毒去頭風瀉血養血榮筋益膽氣治胃熱手足陽明經也兼入肝膽柴胡增本草綱目柴胡柴舊作茈蘇恭曰茈古柴字一名地薰一名芸蒿一名山菜一名茹草李時珍曰嫩則可茹老則采而為柴故有芸蒿諸名而根名柴胡也蘇頌曰關陜江湖間近道皆有之以銀州者為勝二月生苗甚香莖青紫堅硬微有細線葉似竹葉而梢𦂳小亦有似斜蒿者亦有似麥門冬葉而短者七月開黃花根淡赤色似前胡而强生丹州者結青子與他處者不類其根似蘆頭有赤毛如䑕尾獨窠長者好李時珍曰銀州即今延安府神木縣所産柴胡長尺餘而微白且軟不易得也北地所産者亦如前胡而軟今人謂之北柴胡是也入藥亦良南土所産者不似前胡正如蒿根强硬不堪使用其苗有如韭葉者竹葉者以竹葉者為勝其如邪蒿者最下也近時有一種根似桔梗沙參白色而大市人以偽充銀柴胡殊無氣味不可不辨氣味苦平無毒治心腹腸胃中結氣飲食積聚寒熱邪氣五勞七傷頭痛目昏耳鳴諸瘧婦人産前産後諸熱小兒痘疹時疾内外熱不解單煮服之良彚考增戰國䇿今求柴胡桔梗於沮澤則累世不得一焉及之睪黍梁父之隂則郄車而載耳炮炙論茈胡出銀州銀縣西畔生處多有白鶴綠鶴於此飛翔是茈胡香直上雲間若有過往聞者皆氣爽也别錄增炮炙論凡采得銀州柴胡去鬚及頭用銀刀削去赤薄皮少許以麤布拭凈剉用勿令犯火立便無効前胡增本草綱目前胡孫愐唐韻作湔胡蘇頌曰陜西梁漢江淮荆襄州郡及相州孟州皆有之春生苗青白色似邪蒿初出時有白芽長三四寸味甚香美又似芸蒿七月内開白花與蔥花相類八月結實根青紫色今鄜延將來者大與柴胡相似但柴胡赤色而脆前胡黃色而柔軟為不同耳一說今諸方所用前胡皆不同汴京北地者色黃白枯脆絶無氣味江東乃有三四種一種類當歸皮斑黑肌黃而脂潤氣味濃烈一種色理黃白似人參而細短香味都微一種如草烏頭者膚赤而堅有兩三岐為一本皆非真前胡也今最上者出吳中又壽春生者皆類柴胡而大氣芳烈味亦濃苦李時珍曰前胡有數種惟以苗高一二尺色似邪蒿葉如野菊而細痩嫩時可食秋月開黲白花類蛇牀子花其根皮黑肉白有香氣為真大抵北地者為勝故方書稱北前胡云氣味苦微寒無毒治一切氣破癥結開胃下食通五臟主霍亂轉筋骨節煩悶反胃嘔逆氣喘咳𠻳安胎小兒一切疳氣清肺熱化痰熱散風邪别錄增炮炙論凡修治先用刀刮去蒼黑皮並髭細剉以甜竹瀝浸令潤日中曬乾用防風原防風一名屏風一名回芸一名回草一名銅芸一名蕳根一名百枝一名百蜚本草綱目云防者禦也其功療風最要故名屏風者防風隱語也曰芸曰茴曰蕳者其花如茴香其氣如芸蒿蕳蘭也出齊州龍山最善淄青兖者亦佳今汴東淮浙皆有之莖葉俱青綠色莖深而葉淡似青蒿而短小春初嫩時紫紅色采作菜茹極爽口五月開細白花中心攢聚作大房似蒔蘿花實似胡荽子而大根土黃色與蜀葵根相類二月十月采關中生者三月六月采然輕虚不及齊州者良氣溫味辛而甘治三十六種風男子一切勞劣補中益神通利五臟心煩體重羸痩盗汗散頭目中滯氣經絡中留濕得蔥白能行週身又有石防風出河中府根如蒿根而黃葉青花白五月開花六月采根曝乾亦療頭風彚考增博物志太原晉陽以北生屏風草酉陽雜俎香州防風子可亂畢撥原金鑾密記白居易在翰林賜防風粥一甌剔取防風得五合餘食之口香七日别錄原製用江淮所産多是石防風生于山石之間二月采嫩苗作菜辛甘而香呼為珊瑚菜其根麤醜子亦可種入藥以黃色脂潤頭節堅如蚯蚓頭者為好白者多沙條不堪用禁忌义頭者令人發狂义尾者發人痼疾獨活增本草綱目一獨活一名羌活一名羌青一名獨揺草一名䕶羌使者一名胡王使者一名長生草陶𢎞景曰一莖直上不為風揺故曰獨活别錄曰此草得風不揺無風自動故名獨揺草李時珍曰獨活以羌中來者為良故有羌活胡王使者諸名蘇頌曰獨活羌活出蜀漢者佳春生苗葉如青麻六月開花作叢或黃或紫結實時葉黃者是夾石上所生葉青者是土脈中所生本經云二物同一類今人以紫色而節密者為羌活黃色而作塊者為獨活而陶隱居言獨活色微白形虚大用與羌活相似今蜀中乃有大獨活類桔梗而大氣味亦不與羌活相類用之微寒而少効今又有獨活亦自蜀中來類羌活微黃而極大收時寸解乾之氣味亦芳烈小類羌活又有槐葉氣者今京下多用之極効驗意此為真者大抵此物有兩種西蜀者黃色香如蜜隴西者紫色秦隴人呼為山前獨活李時珍曰獨活羌活乃一類二種以中國者為獨活西羌者為羌活按王貺易簡方云羌活須用紫色有蠶頭鞭節者獨活是極大羌活有白如鬼眼者尋常皆以老宿前胡為獨活者非也氣味甘平無毒治風寒金瘡癎痓疝瘕療諸賊風百節痛風五勞七傷利五臟及伏梁水氣彚考增文系唐劉師貞之兄病風夢神人曰但取胡王使者浸酒服便愈師貞訪問皆不曉復夢其母曰胡王使者羌活也求而用之兄病遂愈别錄增炮炙論采得細剉以淫羊藿拌挹二日暴乾去藿用免煩人心土當歸增本草綱目近時江淮山中出一種土當歸長近尺許白肉黑皮氣芬香如白芷人亦謂之水白芷用充獨活氣味辛溫無毒除風和血煎酒服之閃抝手足同荆芥蔥白煎湯淋洗之都管草增圖經本草都管草生宜州田野根似羌活頭歲長一節苗高一尺許葉似土當歸有重臺二月八月采根隂乾施州生者作蔓又名香毬蔓長丈餘赤色秋結紅實四時皆有采其根枝淋洗風毒瘡腫桂海虞衡志都管草一莖六葉解蜈蚣毒升麻增本草綱目升麻一名周麻李時珍曰其葉似麻其性上升故名按張揖廣雅吳普本草并云升麻一名周升麻則或指周地如今人呼川升麻之義今别錄作周麻非省文即脫誤也陶𢎞景曰舊出寧州者第一形細而黒極堅實今惟出益州好者細削皮青綠色謂之雞骨升麻北部亦有而形虚大黃色建平亦有而形大味薄不堪用蘇頌曰蜀漢陜西淮南州郡皆有之以蜀川者為勝春生苗高三尺以來葉似麻葉並青色四五月著花似粟穗白色六月以後結實黑色根如蒿根紫黑色多鬚氣味甘苦平微寒無毒解百毒辟瘟疫瘴癘邪鬼蠱毒治陽明頭痛補脾胃去風邪療癰腫能發浮汗消斑疹行瘀血彚考增前漢書地理志益州郡縣有牧靡註李奇曰靡音麻即升麻殺毒藥所出也博物志牧靡草可以解毒鳥多誤食中毒必急飛往牧靡山啄牧靡草以解之水經注涂水出建寧郡之牧靡縣南山縣山並即草以立名山在縣東北焉句山南五百里山生牧靡可以解毒百世方盛别錄增炮炙論采得刮去麤皮用黃精自然汁浸一宿暴乾剉蒸再暴用本草綱目今人惟取裏白外黑而𦂳實者謂之鬼臉升麻去鬚及頭蘆剉用苦參增本草綱目苦參一名苦􅀢與蔬部苦􅀢同名異物一名苦骨一名地槐一名水槐一名菟槐一名驕槐一名野槐一名白莖别錄又名芩莖綠白陵郎虎麻李時珍曰苦以味名參以功名槐以葉形名也蘇頌曰其根黃色長五七寸許兩指麤細三五莖並生苗高三四尺以來葉碎青色極似槐葉春生冬凋其花黃白色七月結實如小豆子河北生者無花子五六月十月采根暴乾李時珍曰七八月結角如蘿蔔子角内有子二三粒如小豆而堅氣味苦寒無毒治心腹結氣癥瘕積聚黃疸逐水補中明目養肝膽氣安五臟平胃輕身定志利九竅除風熱止渴殺蟲療癰腫瘡疹瀉血熱痢彚考增夢溪筆談予嘗苦腰重久坐則旅距十餘歩然後能行有一將佐見予曰得無用苦參潔齒否予時以病齒用苦參數年矣曰此病由也苦參入齒其氣傷腎能使人腰重後有太常少卿舒昭亮用苦參揩齒歲久亦病腰自後悉不用苦參腰病皆愈别錄增炮炙論采根用糯米濃泔汁浸一宿其腥穢氣并浮在水面上湏重重淘過即蒸之從巳至申取曬切用白鮮增本草綱目白鮮一名白羶一名白羊鮮一名地羊鮮一名金雀兒椒陶𢎞景曰俗呼為白羊鮮氣息正似羊羶故又名白羶李時珍曰鮮者羊之氣也此草根白色作羊羶氣其子纍纍如椒故有諸名陶宏景曰近道處處有以蜀中者為良蘇頌曰今河中江寧府滁州潤州皆有之苗高尺餘莖青梢白如槐亦似茱萸四月開花淡紫色似小蜀葵花根似小蔓青皮黃白而心實山人采嫩苗為菜茹氣味苦寒無毒治一切風熱瘡癬時疾黃疸風痺欬逆小兒驚癎通關節利九竅及血脈其花同功延胡索增本草綱目延胡索一名元胡索陳藏器曰延胡索生奚國從安東來根如半夏李時珍曰今二茅山西上龍洞種之每年寒露後栽立春後生苗葉如竹葉樣三月長三寸高根叢生如芋卵樣立夏掘起氣味辛温無毒治婦人諸血病除風治氣暖腰膝破癥癖撲損瘀血專治一身上下諸痛用之中的妙不可言蓋能活血化氣第一品藥也貝母增爾雅􅔾貝母註根如小貝圓而白華葉似韭陸璣詩疏蝱今藥草母也其葉如栝樓而細小其子在根下如芋子正白四方連累相著有分解也本草綱目貝母一名勤母一名苦菜一名苦花一名空草一名藥實陶𢎞景曰形似聚貝子故云貝母蘇頌曰河中江陵府郢壽隨鄭蔡潤滁州皆有之二月生苗莖細青色葉亦青似蕎麥葉隨苗出七八月開花碧綠色形如鼓子花八月采根根有瓣子黃白色有數種陸璣詩疏所云今近道出者正類此郭璞爾雅註所云罕復見之雷斆曰貝母中有獨顆圓不作兩瓣無皺者號曰丹龍精不入藥用誤服令人筋脈永不收惟以黃精小藍汁服之立解氣味辛平無毒治傷寒煩熱邪氣疝瘕喉痺乳難金瘡風痙療結胸欬𠻳上氣止煩熱渴出汗安五臟和骨髓消痰潤心肺治時疾黃疸散心胸鬱結之氣研末㸃目去膚瞖燒灰傅人畜惡瘡彚考增詩鄘風陟彼阿丘言采其蝱酉陽雜爼許卑山人言江左數十年前有商人左膊上有瘡如人面亦無他苦商人戲滴酒口中其面亦赤以物食之凡物必食食多覺膞内肉脹起疑胃中也或不食之則一臂痺也有善醫者教其歴試諸藥金石草木悉與之至貝母其瘡乃聚眉閉口商人喜曰此藥必治也因以小葦筒毁其口灌之數日成痂遂愈石蒜增本草綱目石蒜一名烏蒜一名老鴉蒜一名蒜頭草一名㜑㜑酸一名一枝箭一名水麻蒜以根狀名箭以莖狀名李時珍曰處處下濕地有之春初生葉如蒜秧及山慈姑葉背有劍脊四散布地七月苗枯乃于平地抽出一莖如箭簳長尺許莖端開花四五朶六出紅色如山丹花狀而瓣長黃蘂紅鬚其根狀如蒜皮色紫赤肉白色此有小毒而救荒本草言其可熟水浸過食蓋為救荒爾一種葉如大韭四五月抽莖開花如小萱花黃白色者謂之鐵色箭功與此同二物並抽莖開花後乃生葉葉花不相見氣味辛甘溫有小毒治腫毒疔瘡惡核可水煎服取汗及擣傅之又中溪毒者酒煎半升服取吐良龍膽增本草綱目龍膽一名陵游馬志曰葉如龍葵味苦如膽因以為名陶宏景曰出近道以吳興者為勝根狀似牛膝其味甚苦蘇頌曰宿根黃白色下抽根十餘條類牛膝而短直上生苗高尺餘四月生葉如嫩蒜細莖如小竹枝七月開花如牽牛花作鈴鐸狀青碧色冬後結子苗便枯俗呼草龍膽又有山龍膽味苦濇其葉經霜雪不凋山人用治四肢疼痛與此同類而别種也氣味苦濇大寒無毒治骨間寒熱驚癎邪氣續絶傷定五臟殺蠱毒除胃中伏熱時氣溫熱熱泄下痢去腸中小蟲益肝膽氣久服益智不忘輕身耐老明目止煩治瘡疥癰腫咽喉痛風熱盗汗别錄增炮炙論采得隂乾用時銅刀切去鬚上頭子剉細甘草湯浸一宿漉出暴乾用細辛增本草綱目細辛一名小辛一名少辛蘇頌曰根細而味極辛故名李時珍曰小辛少辛皆此義也别錄曰生華隂山谷二月八月采根隂乾陶𢎞景曰今用東陽臨海者形段乃好而辛烈不及華隂高麗者冦宗奭曰細辛葉如葵赤黑色一根一葉相連非此則杜衡也李時珍曰柔莖細根直而色紫味極辛氣溫無毒治欬逆上氣頭痛腦動百節拘攣風濕痺痛明目利九竅輕身長年溫中下氣破痰利水道開胸中滯結除喉痺癰鼻風癎癲疾下乳結汗不出血不行安五臟益肝膽通精氣除齒痛治口舌生瘡治督脈為病脊强而厥凡使細辛切去頭子以𤓰水浸一宿暴乾用須揀去雙葉者服之害人彚考增山海經浮戲之山多少辛管子五沃之土羣藥生少辛博物志杜衡亂細辛夢溪筆談東方南方所用細辛皆杜衡也又謂之馬蹄香也黃白拳局而脆乾則作團非細辛也細辛出華山極細而直深紫色味極辛嚼之習習如椒其辛更甚於椒故本草云細辛水漬令直是以杜衡偽為之也襄漢間又有一種細辛極細而直色黃白乃是鬼督郵亦非細辛也集藻賦散句增宋謝靈運撰征賦摭曾嶺之細辛附錄木細辛增本草拾遺木細辛生終南山冬月不凋苗如大㦸根似細辛味苦温有毒主腹内結聚癥瘕推陳去新破冷氣未可輕服令人利下至困附錄及己增本草綱目及己一名獐耳細辛李時珍曰及己名義未詳葉如獐耳根如細辛故名獐耳細辛蘇恭曰生山谷隂虚軟地其草一莖莖頭四葉隙著白花根似細辛而黑今人以當杜衡非也二月采根日乾氣味苦平有毒入口使人吐血治諸惡瘡可煎汁研末傅之鬼督郵增本草綱目鬼督郵一名獨揺草李時珍曰此草獨莖而葉攢其端無風自動故曰鬼獨揺草後人訛為鬼督郵耳因其專治鬼病猶司鬼之督郵也徐長卿赤箭皆治鬼病故並有鬼督郵之名名同而物異蘇恭曰鬼督郵所在有之有必叢生苗惟一莖莖端生葉若繖狀根如牛膝而細黑今人以徐長卿代之非也韓保昇曰莖似細箭簳高二尺以下葉生莖端花生葉心黃白色根橫生而無鬚二月八月采根氣味苦平有小毒治鬼疰卒忤中惡心腹邪氣百精毒温瘧疫氣强腰脚益膂力别錄增炮炙論凡采得細剉用生甘草水煮一伏時日乾用徐長卿增本草綱目徐長卿一名鬼督郵一名别仙蹤李時珍曰徐長卿人名也常以此藥治邪病人遂以名之吳普本草一名石下長卿石間生者為良也蘇頌曰淄齊淮泗間謂之别仙蹤蘇恭曰所在川澤有之葉似柳兩葉相當有光澤根如細辛微麤長黃色而有臊氣今俗以代鬼督郵非也韓保昇曰三月苗青七月八月著子似蘿藦子而小九月苗黃十月凋八月采根日乾氣味辛温有毒治鬼物百精蠱毒疫疾邪惡氣温瘧久服强悍輕身益氣延年别錄增炮炙論凡采得麤杵拌少蜜令遍以瓷器盛蒸三伏時日乾用白微增爾雅葞春草註一名芒草疏藥草也今俗呼為菵草也按本草即今白薇也本草綱目白微一名白幕一名骨美李時珍曰微細也其根細而白也按爾雅曰葞微葞音相近則白微又葞音之轉也蘇頌曰陜西諸郡及舒滁潤遼州皆有之莖葉俱青頗類柳葉六七月開紅花八月結實其根黃白色類牛膝而短小今人八月采之氣味苦醎平無毒治暴中風狂惑邪氣温瘧痓病鬼魅療傷中淋露下水氣利隂氣益精久服利人别錄增炮炙論凡采得以糯米泔汁浸一宿取出去髭于槐砧上細挫蒸之從申至巳曬乾用白前增本草綱目白前一名石藍一名𠻳藥陶宏景曰氣𠻳方多用之蘇恭曰苗高尺許其葉似柳或似芫花根長于細辛白色生洲渚沙磧之上馬志曰根似白微牛膝輩二月八月采隂乾氣味甘微温無毒治胸脇逆氣欬𠻳上氣一切氣肺氣煩悶賁豚腎氣降氣下痰别錄增炮炙論凡用以生甘草水浸一伏時漉出去頭鬚了焙乾收用草犀增廣州記草犀生嶺南及海中獨莖對葉而生如燈臺草本草綱目草犀李時珍曰其解毒之功如犀角故曰草犀陳藏器曰生衢婺洪饒間苗高二三尺獨生根如細辛生水中者名水犀氣味辛平無毒解一切毒氣并燒研服之臨危者亦得活治天行瘧瘴寒熱欬𠻳痰壅飛尸喉痺瘡腫丹毒中惡注忤痢血等病煮汁服之釵子股增本草綱目釵子股一名金釵股李時珍曰石斛名金釵花此草狀似之故名陳藏器曰生嶺南及南海山谷根如細辛每莖三四十根李珣曰忠州萬州者亦佳草莖功力相似緣嶺南多毒家家貯之氣味苦平無毒解諸藥毒蠱毒治瘧瘴天行喉痺癰疽吉利草原南方草木狀吉利草其莖如金釵股形類石斛根類芍藥交廣俚俗多蓄蠱毒惟此草解之極驗吳黃武中江夏李俁以罪徙合浦始入境遇毒其奴吉利者偶得是草與俁服遂解吉利即遁去不知所之俁因此濟人不知其數遂以吉利為名良耀草增南方草木狀良耀草枝葉如麻黃秋結子如小栗煨食之解毒功不亞於吉利始者有得是藥者梁氏之子耀因以為名梁轉為良爾花白似牛李出高凉硃砂根增本草綱目硃砂根生深山中今惟太和山人采之苗高尺許葉似冬青葉背甚赤夏月長茂根大如筯赤色與百兩金相髣髴氣味苦凉無毒治咽喉腫痺磨水或醋嚥之甚良辟虺雷增本草綱目辟虺雷一名辟蛇雷此物辟蛇虺有威故以雷名之蘇恭曰狀如麤塊蒼术節中有眼李時珍曰今川中峨眉鶴鳴諸山皆有之根狀如蒼术大者如拳彼人以充方物氣味苦大寒無毒解百毒消痰袪大熱頭痛辟瘟疫治咽喉痛痺解蛇虺毒錦地羅增本草綱目錦地羅出廣西慶遠山巖間鎮安歸順柳州皆有之根似萆薢及栝樓根狀彼人頗重之以充方物氣味微苦平無毒治山嵐瘴毒瘡毒並中諸毒以根研生酒服一錢匕即解紫金牛增圖經本草紫金牛生福州葉如荼葉上綠下紫結實圓紅色如丹朱根微紫色八月采根去心暴乾頗似巴㦸氣味辛平無毒治時疾膈氣去風疾拳參增圖經本草拳參生淄州田野葉如羊蹏根似海蝦黑色土人五月采之為末淋渫腫氣鐵線草增圖經本草鐵線草生饒州三月采根隂乾氣味苦平無毒療風消腫毒有效金絲草增本草綱目金絲草出慶陽山谷氣味苦寒無毒治諸血病解瘴氣諸藥毒療癰疽惡瘡凉血散熱御定佩文齋廣羣芳譜卷九十四
