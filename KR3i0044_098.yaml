body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九十六藥譜續斷增本草綱目續斷一名屬折一名接骨一名龍豆一名南草續斷屬折接骨皆以功命名也蘇頌曰今陕西河中興元舒越晉絳諸州皆有之三月以後生苖幹四稜似苧麻葉兩兩相對而生四月開花紅白色似益母花根如大薊赤黃色按范汪方云續斷即是馬薊與小薊葉相似但大於小薊爾葉似旁翁菜而小厚兩邉有刺刺人其花紫色與今越州所圖者相類而市之貨者亦有數種少能辨其粗良醫人但以節節斷皮黃皺者為真李時珍曰今人所用以中州來色赤而瘦折之有煙塵起者為良氣味苦微溫無毒治傷寒補不足金瘡癰瘍折跌續筋骨助氣補五勞七傷破癥結瘀血消腫毒治婦人乳難胎漏産後一切病胎久服益氣力去諸溫毒通宣血脈鉤芺增爾雅鉤芺注大如拇指中空莖頭有臺似薊初生可食説文芺味苦江南食以下氣本草綱目苦芺一名鉤芺一名苦板凡物稚曰芺此物嫩時可食故以名之浙東人清明節采其嫩苖食之云一年不生瘡疥亦搗汁和米為食其色青久留不敗造化指南云苦芺大者名苦藉葉如地黃味苦初生有白毛入夏抽莖有毛開白花甚繁結細實其無花實者名地膽草汁苦如膽也處處濕地有之入爐火家用氣味苦微寒無毒下氣解熱燒灰傅漆瘡療金瘡治丹毒煎湯洗痔甚驗漏盧增本草綱目漏盧一名野蘭一名莢蒿一名鬼油麻屋之西北黑處謂之漏凡物黑色謂之盧此草秋後即黑異於衆草故有漏盧之稱唐韻仵萹其莢如麻故俗呼為鬼油麻云蘇頌曰汴東州郡及奉海州皆有之舊説莖葉似白蒿花黃白莢莖若筯大房類油麻而小今諸郡所圖上惟單州者差相類沂州者花葉頗似牡丹秦州者花似單葉寒菊海州者如單葉蓮花三州所生花雖别而葉頗相類但秦海州者葉更作鋸齒狀當依舊説以單州出者為勝氣味鹹寒無毒治膚熱毒惡瘡疽痔金瘡濕痺下乳汁殺蟲止血排膿補血長肉通經脈久服輕身益氣耳目聰明不老延年飛廉增本草綱目飛廉一名漏蘆一名木禾一名飛雉一名飛輕一名伏兔一名伏豬一名天薺飛廉神禽之名也其狀鹿身豹文雀頭蛇尾有角能致風氣此草附莖有皮如箭羽復療風邪故有飛廉飛雉飛輕諸名陶宏景曰處處有之極似苦芺惟葉多刻缺葉下附莖輕有皮起似箭羽其花紫色俗方殆無用而道家服其枝莖可得長生又入神枕方蘇恭曰此有兩種一種生平澤中是陶氏所説者一種生山岡上者葉頗相似而無刻缺且多毛其莖赤無羽其根直下更無旁枝生則肉白皮黑中有黑脈日乾則黑如玄參用莖葉及根療疳蝕殺蟲與平澤者俱有驗蘇頌曰今秦州所圖漏蘆花似單葉寒菊紫色五七枝同一幹海州所圖漏蘆花紫碧色如單葉蓮花花萼下及根旁有白茸裹之根黑色如蔓菁而細又類蔥本淮甸人呼為老翁花與陶蘇所説飛廉相近李時珍曰蘇頌圖經疑海州所圖之漏蘆是飛廉沈存中筆談亦言今方家所用漏蘆乃飛廉也苖似苦芺根如牛蒡而綿頭古方漏蘆散下云用有白茸者則是有白茸者飛廉無疑矣氣味苦平無毒治骨節熱脛重酸疼頭眩頂重皮間邪風熱瘡癰疽痔濕痺止風邪咳嗽下乳汁療疳蝕殺蟲小兒疳痢大青增本草綱目大青其莖葉皆深青故名處處有之髙二三尺莖圓葉長三四寸面青背淡對節而生八月開小花紅色成簇結青實大如椒九月色赤氣味苦大寒無毒治時氣頭痛大熱口瘡除時行熱毒治溫疫寒熱熱毒痢黃疸喉痺解金石藥毒小青增圖經本草小青生福州三月生花彼土人當三月采葉用之生搗傅癰腫瘡癤甚效胡盧巴增本草綱目胡盧巴一名苦豆掌禹錫曰出廣州并黔州春生苖夏結子子作細莢至秋采今人多用嶺南者蘇頌曰或云種出海南諸番蓋其國蘆蔔子也舶客將種蒔於嶺外亦生不及番中來者真好氣味苦大溫無毒治元臟虛冷氣疝瘕寒濕腳氣益右腎暖丹田右腎命門藥也元陽不足冷氣潛伏不能歸元者宜之蠡實增本草綱目蠡實一名荔實一名馬藺子一名馬棟子一名馬薤一名馬帚一名鐵掃帚一名劇草一名旱蒲一名豕首一名三堅蘇恭曰此即馬藺子也月令仲冬荔挺出鄭元注云荔馬薤也通俗文云一名馬藺本草謂之荔實蘇頌曰馬藺子北人訛為馬棟子廣雅云馬薤荔也髙誘云荔挺出荔草挺出也講禮者不識呼為荔挺又作馬莧並誤矣馬莧亦名豕耳即馬齒也李時珍曰爾雅云茾音瓶馬帚也即此荔草謂其可為馬刷故名今河南北人呼為鐵掃帚是也蘇頌曰陜西諸郡及鼎澧州皆有之近汴尤多葉似薤而長厚三月開紫碧花五月結實作角子如麻大而赤色有稜根細長通黃色人取以為刷三月開花五月采實並隂乾用李時珍曰生荒野中就地叢生一本二三十莖苖髙三四尺葉中抽莖開花結實氣味甘平無毒治皮膚寒熱胃中熱氣風寒濕痺堅筋骨令人嗜食久服輕身止心煩滿利大小便長肌膚療金瘡血內流癰腫有效消酒毒治黃病殺菌毒傅蛇蟲咬治小腹疝痛腹內冷積水痢諸病花實及根葉去白蟲療喉痺癰疽惡瘡牛蒡增本草綱目牛蒡一名惡實一名鼠黏一名大力子一名蒡翁菜一名便牽牛一名蝙蝠刺其實狀惡而多刺鉤故名惡實其根葉皆可食人呼為牛菜術人隱之呼為大力也俚人謂之便牽牛河南人呼為夜義頭蘇頌曰實殼多刺鼠過之則綴惹不可脫故謂之鼠黏子蘇頌曰處處有之葉大如芋葉而長實似葡萄核而褐色外殼似栗梂而小如指頭多刺根有極大者作菜茹益人秋後采子入藥李時珍曰古人種子以肥壤栽之翦苖汋淘為蔬取根煮曝為脯云甚益人今人亦罕食之三月生苖起莖髙者三四尺四月開花成叢淡紫色結實如楓梂而小萼上細刺百十攢簇之一梂有子數十顆其根大者如臂長者近尺其色灰黲七月采子氣味辛平無毒明目補中除風傷風毒腫諸瘻去丹石毒利腰腳散諸結節筋骨煩熱毒潤肺散氣利咽膈去皮膚風通十二經消斑疹毒十月采根氣味苦寒無毒治傷寒寒熱汗出中風面腫消渴熱中逐水療牙痛勞瘧諸風腳緩弱風毒癰疽咳嗽傷肺肺癰疝瘕冷氣積血傅杖瘡金瘡通十二經脈洗五臟惡氣可常作菜食令人身輕菤耳增爾雅菤耳苓耳注廣雅云枲耳也亦曰胡枲江東呼為常枲形如鼠耳叢生如盤陸璣詩疏今或謂之耳璫草鄭康成謂是白胡荽幽州人呼爵耳爾雅翼幽冀謂之袒菜雒下謂之常思菜本草綱目葈耳一名蒼耳一名豬耳一名地葵一名葹一名羊負來一名道人頭一名進賢菜一名喝起菜一名野茄一名縑絲草蘇頌曰博物志云洛中有人驅羊入蜀胡葈子多刺黏綴羊毛遂至中國故名羊負來俗呼為道人頭李時珍曰葉形如葈麻又如茄故有葈耳及野茄諸名味滑如葵故名地葵蘇頌曰處處有之其葉青白似胡荽白華細莖蔓生可煮為茹滑而少味四月中生子正如婦人耳璫周憲王本草蒼耳葉青白類黏糊菜葉秋間結實比桑椹短小而多刺嫩苖煠熟水浸淘拌食其子炒去皮研為麵亦可熬油氣味甘溫有小毒治頭風寒痛風濕周痺拘攣一切風氣填髓暖腰腳治瘰癧瘡疥及瘙癢莖葉治溪毒中風傷寒頭痛大風癲癎頭風濕痺毒在骨髓腰膝風毒狂犬咬毒彚考增詩周南采采卷耳不盈頃筐四民月令伏後二十日為麯至七月七日乾之覆以胡葈埤雅舊説千嵗之龜巢於蓮葉遊於卷耳東坡雜記藥至賤而為世要用無若蒼耳者他藥雖賤或地有不産惟此藥不問南北夷夏山澤斥鹵泥土沙石但有地則産其花葉根實皆可食食之則如藥治病無毒生熟丸散無適不可愈食愈善乃使人骨髓滿肌如玉長生藥也主療風痺癰緩癃瘧瘡癢不可勝言尤治癭金瘡海南無藥惟此藥生舍下遷客之幸也集藻文散句增楚屈原離騷薋菉葹以盈室兮五言古詩增唐李白尋魯城北范居士失道落蒼耳中見范置酒摘蒼耳作鴈度秋色逺日靜無雲時客心不自得浩漫將何之忽憶范野人間園飬幽姿茫然起逸興但恐行來遲城壕失往路馬首迷荒陂不惜翠雲裘遂為蒼耳欺入門且一笑把臂君為誰酒客愛秋蔬山盤薦霜梨他筵不下筯此席忘朝飢酸棗垂北郭寒瓜蔓東籬還傾四五酌自詠猛虎詞近作十日歡逺為千載期風流自簸蕩謔浪偏相宜酣來馬上去却笑髙陽池原杜甫驅豎子摘蒼耳江上秋已分林中瘴猶劇畦丁告勞苦無以供日夕蓬莠獨不焦野蔬暗泉石卷耳况療風童兒且時摘侵星驅之去爛漫任逺適放筐亭午際洗剝相蒙羃登牀半生熟下筯還小益加點瓜薤間依稀橘奴迹亂世誅求急黎民粳籺窄飽食復何心荒哉膏梁客富家厨肉臭戰地骸骨白寄語惡少年黃金且休擲七言律詩增元成廷圭寄周平叔先生就求蒼耳子周侯久不通書問夜夜滄江入夢頻五月采來蒼耳子幾時分送白頭人沙頭酒熟田毛足港上船來海錯新南北相望千百里老來幽獨倍傷神詩散句增唐李白贈君卷葹草心斷更何言地菘增爾雅茢薽豕首注本草曰彘顱一名蟾蜍蘭今江東呼豨首疏茢薽藥草名一名天名精一名麥句薑一名蝦蟇藍一名天門精一名玉門精一名天蔓菁南人呼為地菘味甘辛故有薑稱狀如藍故名蝦蟇藍香似蘭故名蟾蜍蘭本草綱目天名精一名蚵蚾草一名活鹿草一名劉􅖓草詳見酉陽雜爼一名皺面草一名母豬芥根名杜牛膝見集效方實名鶴蝨詳見夢溪筆談嫩苖緑色似皺葉菘芥微有狐氣長則起莖開小黃花如小野菊花結實如同蒿子相似最黏人衣服狐氣尤甚炒熟則香其根白色如短牛膝根葉氣味甘寒無毒子苦辛有小毒其功大抵只是吐痰止血殺蟲解毒治乳蛾喉腫及小兒急慢驚風牙疼諸病尤有效彚考增酉陽雜爼天名精一名鹿活草昔青州劉􅖓宋元嘉中射一鹿剖五臟以此草塞之蹶然而起􅖓怪而拔草復倒如此三度􅖓密録此草種之多主傷折俗呼為劉􅖓草夢溪筆談地菘即天名精也世人既不識天名精又妄認地菘為火蘞本草又出鶴蝨一條都成紛亂今按地菘即天名精蓋其葉似菘又似名精故有二名鶴蝨即其實世間有單服火蘞法乃是服地菘耳不當用火蘞豨蘞原豨蘞豨音喜蘞音杴一名希仙一名火杴草一名虎膏一名豬膏母一名狗膏一名黏糊菜本草綱目云楚人呼豬為豨呼草之氣味辛毒為蘞豬膏虎膏狗膏皆因其氣似及治虎狗傷也火杴當作火蘞俗音訛爾近人復訛豨蘞為希仙矣救荒本草言其嫩苖煠熟油鹽調食故俗謂之黏糊菜素莖有直稜兼有斑點葉似蒼耳微長似地菘而稍薄對節生莖葉皆有細毛肥壤一株分枝數十八九月開深黃小花子如同蒿子外萼有細刺黏人氣味苦寒有小毒治金瘡止痛斷血生肉除諸惡瘡浮腫治久瘧痰癊風氣麻痺骨痛膝弱風濕傅虎傷狗咬及諸蟲毒集藻表原唐成訥進豨蘞丸方表臣有弟訮年二十一中風伏枕五年百醫不瘥有道人鍾針因覩此患曰可餌豨蘞丸必愈其草多生沃壤髙三尺許節葉相對當夏五月以來收之每去地五寸翦刈以溫水洗去土摘葉及枝頭凡九蒸九暴不必太燥但以取足為度仍熬搗為末煉蜜丸如梧子大空心溫酒或米飲下二三十丸服至二千丸所患愈加不得憂慮是藥攻之力服至四千丸必得復至五千丸當復須喫飯三五匙壓之五月五日采者佳宋張詠進豨蘞丸表竊以飱食飲水可作充腸之饌餌松含柏亦成救病之功是以療飢者不在於羞珍愈病者何煩於異術倘獲濟時之藥輒陳鄙物之形不恥管窺輒干天聽臣因換龍興觀掘得一碑內説修飬氣術并藥方二件依方差人訪問采覓其草頗有異金稜銀線素莖紫荄對節而生蜀號火杴莖葉頗同蒼耳不費登髙歷險每常求少獲多急采非難廣收甚易倘勤久服旋見神功誰知至賤之中乃有殊常之效臣自喫至百服眼目清明即至千服髭鬚烏黑筋力輕健效驗多端臣本州有郡押衙羅守一曾因中風墜馬失音不語臣與十服其病立瘥又和尚智嚴年七十忽患偏風口眼喎斜時時吐涏臣與十服亦便得痊今合一百劑差職貢史元奏進七言絶句增宋黃庭堅一夕風雨花藥都盡惟有豨蘞一叢濯濯得意戲題紅葉山丹逐曉風春榮分到豨蘞叢朱顔頗欲辭鏡去煮葉掘根儻見功别録原修治五月五日六月六日九月九日采葉去根莖花實洗淨曝乾入甑中層層灑酒與蜜蒸之又曝如此九遍則氣味香美熬搗篩末蜜丸服之辨訛李時珍云沈括筆談云世人妄認地菘為火杴按地菘莖青圓而無稜無斑毛葉皺似菘芥不對節與成訥張詠進豨蘞丸表所説不同蘇恭謂葉似酸漿乃龍葵非豨蘞蓋誤認爾蘘荷原蘘荷一名􅀢苴古今注云其紫者曰葍苴白者曰蘘荷一名覆葅一名猼苴博雅謂之蓴苴楚辭謂之苴蓴一名嘉草似芭蕉而白色花生根中花未敗時可食久則消爛根似薑而肥葉似初生甘蔗宜隂翳地依蔭而生樹隂下最妙二月種一種永生不須鋤耘但加糞耳八月初踏其苖令死則根滋茂九月初取其傍生根為葅亦可醃貯以備蔬果有赤白二種製食赤者為勝入藥白者為良其葉冬枯十月中以粳厚覆其根免致凍死氣味辛溫有小毒治諸惡瘡及蟲毒葉名蘘草氣味苦甘寒無毒治溫瘧寒熱酸嘶邪氣辟不祥彚考增搜神記蔣士先有傭客得疾下血醫以中蠱乃密以蘘荷根布席下不使知乃狂言曰食我蠱者乃張小小也乃呼小小亡去今世攻蠱多用蘘荷根往往驗蘘荷或謂嘉草丹鉛録丘文莊羣書抄方載中蠱毒用白蘘荷引栁子厚詩云云且曰子厚在栁州種之其地必有此種仕于茲土者其物色之蓋亦不知為何物也余謂丘公之博洽而不識世之識者亦罕矣按松江志引急就章注曰白蘘荷即今甘露考之本草其形性正同集藻文賦散句增楚屈原大招膾苴􅀢只漢司馬相如上林賦茈薑蘘荷馬融廣成頌芝荋堇荁蘘荷芋渠張衡南都賦蓼蕺蘘荷五言古詩增唐栁宗元種白蘘荷皿蟲化為癘夷俗多所神銜猜每臘毒謀富不為仁蔬果自逺至杯酒盈肆陳言甘中必苦何用知其真華潔事外飾尤病中州人錢刀恐賈害飢至益逡巡竄伏常戰栗懷故愈悲辛庶民有嘉草攻禬事久泯炎帝垂靈編言此殊足珍崎嶇乃有得託以全余身紛敷碧樹隂眄睞心所親别録原修治凡使白蘘荷以銅刀刮去粗皮一層細切入砂鍋中研如膏取自然汁煉作煎新器攤冷如乾膠狀刮取用辨訛凡使勿用革牛草其形真相似麻黃原麻黃一名龍沙廣雅云龍沙麻黃也狗骨麻黃根也一名卑相一名卑鹽近汴京多有之以出滎陽中牟者為勝春生苖至五月則長及一尺莖端開花小而黃簇結實如皂角子味甜微有麻黃氣外皮黃裏仁黑根皮色赤黃長者近尺俗説有雌雄二種雌者三四月開花六月結子雄者無花不結子微苦而辛性熱而輕揚治中風傷寒頭痛溫瘧發表出汗去邪熱止咳逆除寒熱破癥瘕去營中寒邪泄衛中風熱療傷寒解肌第一藥也過用泄真氣别録原修治立秋後收莖隂乾去節及根水煮十餘沸竹片掠去沫沫令人煩節能止汗木賊增本草綱目木賊此草有節面􅀈澀治木骨者用之磋擦則光淨猶云木之賊也叢叢直上長者二三尺狀似鳬茈苖及粽心草而中空寸寸有節又似麻黃莖而稍粗無枝葉凌冬不凋氣味甘微苦無毒治目疾退翳膜消積塊益肝膽療喉痺胎動不安腸風止痢及婦人崩帶解肌止淚止血去風濕疝痛燈心草增本草綱目燈心草一名虎鬚草一名碧玉草馬志曰生江南澤地叢生莖圓細而長直人捋為席寇宗奭曰陜西亦有之蒸熟待乾折取中心白穰燃燈者是謂熟草又有不蒸者但生乾剝取為生草入藥宜用生草李時珍曰吳人栽蒔之取瓤為燈炷以草織席及蓑他處野生者不多外丹家以之伏硫砂氣味甘寒無毒瀉肺降心火止血通氣行水散腫止渴治濕熱黃疸燒灰治急喉痺塗乳上飼小兒止夜啼地黃原地黃一名地髓一名芐爾雅云芐地黃注云江東呼為芐一名芑蔬穀皆有芑與此同名一名牛奶子本草衍義云北人謂之牛奶子一名婆婆奶本草綱目云俗呼其苗為婆婆奶處處有之河南懷慶者佳二月生莖有細短白毛葉布地深青色似小芥葉而厚不叉丫上有皺文毛澀不光髙者尺餘低者三四寸摘其傍葉作菜甚益人開小筒子花似油麻花但有斑點紅紫色亦有黃者實作房如連翹子如小麥褐色根黃如胡蘿蔔粗細長短不一根入土即生宜肥地虛則根大而多汁正九月採根生地曝乾熟地蒸曬忌銅鐵器令人腎消髮白男損營女損衛薑汁浸則不泥膈又宜酒製鮮用則寒初出土者乾用則涼即今生地生地生血熟地飬血生者以水浸之沉者為地黃半沉者為人黃浮者為天黃入藥沉者佳半沉者次之浮者不堪彚考原抱朴子楚文子服地黃八年夜視有光增抱朴子韓子治用地黃苖喂五十嵗老馬生三駒又一百三十嵗乃死朝野僉載雉被鷹傷銜地黃葉點之即愈集藻尺牘增宋蘇軾與翟東玉尺牘藥之膏油者莫如地黃啖老馬皆復為駒樂天採地黃詩云與君啖老馬可使照地光今人不復知此法吾晚學道血氣衰耗如老馬矣欲多食生地黃而不可常致近見人言循州興寧令歐叔向於縣圃中多種此藥意欲作書干求而未敢君與叔向故人可為致此意否此藥以二八月採者良如許以此時寄惠為幸欲烹為煎也賦散句增宋謝靈運撰征賦採石上之地黃五言古詩增唐白居易采地黃者麥死春不雨禾損秋早霜嵗晏無口食田中采地黃采之將何用持以易餱糧凌晨荷鋤去薄暮不盈筐攜來朱門家賣與白面郎與君啖肥馬可使照地光願易馬殘粟救此苦飢腸宋蘇軾小圃地黃地黃飼老馬可使光鑒人吾聞樂天語喻馬施之身我衰正伏櫪垂耳氣不振移栽附沃壤蕃茂爭新春沉水得稚根重湯飬陳薪投以東阿清和以北海醇崖蜜助甘冷山薑發芳辛融為寒食餳咽作瑞露珍丹田自宿火渴肺還生津願餉內熱子一洗胸中塵陸遊夢有餉地黃者味甘如蜜戲作數語記之有客餉珍草發奩驚絶竒正爾取嚼齕炮製不暇施異香透崑崙清水生玉池至味不可名何止甘如飴兒稚喜語翁雪頷生黑絲老病失所在便欲棄杖馳晨雞喚夢覺齒頰餘甘滋寄聲山中友安用求金芝别録原種植宜沙軟地先於十二月耕熟至正月細耙三四遍然後作溝濶二尺兩溝作一畦濶四尺其畦微髙而平硬甚不受水三月初種苖未生時得水即爛畦中又撥作溝深三寸取地黃切長二寸種於溝內以熟糞土蓋厚三寸許每一畝用根五十斤蓋土訖即取經冬爛草覆之候芽稍出以火燒其草令燒去其苖冉生葉肥茂根益牡自春至秋凡五六耘不得鋤一年後滿畦宿根採訖還生八月堪採根若不採其根太盛春二月宜出之若秋採訖至春不復更種其生者猶得三四年但採訖比至明年耨耘而已神隱云參驗古法此為最良按本草二八月採殊未窮物性也不如冬月採妙又蒸曬相宜也欲食其葉但露散後摘取傍葉勿損中心正葉秋收其花可充冬用製用掘出洗淨肥大沉水者簡出將簡下瘦小者搗汁入好酒並縮砂仁末拌勻浸肥地令透用砂鍋栁甑蒸令氣透朗乾冉浸冉蒸如此九次蓋地黃性泥得砂仁之香而竄合和五臟沖和之氣歸宿丹田故無泥膈之患增東坡雜記肥嫩地黃一二寸截去薄紙裹兩頭以生豬腦塗其膚周匝置小盤中挂通風處十餘日自乾抖數之出細黃粉其膚獨一一如鵝管狀其粉沸湯點或謂之金粉湯牛膝原牛膝本草注云其莖有節似牛膝故以為名一名牛脛見廣雅一名百倍一名山莧菜一名對節菜本草綱目云百倍隱語也言其滋補之功如牛之多力也其葉似莧其節對生故俗有山莧對節之稱江淮閩越關中皆有以懷慶為真以人栽蒔者為良春生苖髙二三尺方莖粗節葉皆對生頗似莧菜而長且尖􅕏秋月開花作穗結子狀如小鼠負蟲有澀毛皆貼莖倒生九月採根貨賣者多用水泡去皮裹扎曝乾白直可貴但其汁既去入藥力減終不如留皮者力大氣味苦酸平無毒主治寒濕痿痺四肢拘攣膝痛不可屈伸補中續絶益精利隂氣填骨髓除腰脊痛治久瘧寒熱惡瘡折傷喉痺口瘡齒痛孕婦忌用别録原種植秋收子至春種肥地深耕土鬆易長耙土平方下種水糞澆翦苖食如翦韭法旱則鋤耘荒則澆水秋中亦可種修治凡使去蘆頭以酒浸洗欲下行則生用滋補則焙用或酒拌蒸用紫菀原紫菀本草綱目云其根色紫而柔宛故名一名青菀一名紫蒨一名茈菀一名還魂草一名夜牽牛處處有之以牢山所出根如北細辛者為良三月內布地生苖五六月開花色黃白紫數種結黑子本有白毛根甚柔細二月採根隂乾今人多以車前旋覆根紫土染過偽為之紫菀肺病要藥肺本自亡津液又服走津液藥為害滋甚不可不愼又有類紫菀而有白如練色者名曰羊鬚草亦宜辨别録原修治凡使先去鬚頭及土東流水洗淨以蜜浸一宿至明火上焙乾每一兩用蜜二分製用連根葉採之醋浸入少鹽收藏作菜辛香號名仙菜鹽不宜多易腐附録女菀原女菀本草綱目云其根似女體柔婉故名一名白菀本草經注云紫菀白者名白菀一名茆一名女復一名織女菀生漢中山谷正二月採隂乾蘇恭云功與紫菀相似氣味辛溫無毒李時珍云葛洪肘後方治人面黑令白方用女菀三分丹鉛一分則紫菀治手太隂血分白菀手太隂氣分藥也肺氣熱則面紫黑清則面白三十以後肺氣漸減不可服麥門冬原麥門冬本草注云根似穬麥故謂之麥門冬一名虋冬虋音門一名忍冬一名忍凌一名禹韭齊名愛韭秦名烏韭爾雅疏作羊韭楚名馬韭越名羊韭爾雅疏作羊蓍一名禹葭見爾雅疏一名禹餘糧述異記云今藥中有禹餘糧者世傳昔禹治水棄其所餘糧于江中生為藥也一名不死草本草綱目云麥鬚曰虋此草根似麥而有鬚其葉如韭凌冬不凋故謂麥虋冬及有禹韭忍冬諸名可以服食斷穀故又有餘糧不死之稱一名階前草一名僕壘一名隨脂見吳氏本草所在有之葉大小有三四種功用相似其色青長及尺餘大者如鹿蔥小者如韭四季不凋浙中者良多縱紋且堅韌根黃白色有鬚在根如連珠四月開淡紅花如紅蓼花實碧而圓如珠吳地者勝性甘平無毒治肺中伏火補心不足療身黃目黃虛勞客熱口乾燥渴止嘔吐安魂魄定肺痿吐膿止嗽治時疾熱狂頭痛令人肥健美顔色有子集藻五言絶句增宋范成大霜後紀園中草木門冬如佳𨽻長年護階除生兒乃不凡磊落玻璃珠七言絶句增宋蘇軾睡起聞米元章冒熱到東園送麥門冬飲子一枕清風值萬錢無人肻買北窗眠開心暖胃門冬飲知是東坡手自煎别録原種植四月初採根于黑壤肥沙地栽之每年六月九月十一月三次上糞及耘灌夏至前一日取根洗曬收之其子亦可種但成遲爾修治凡入湯液以滚水潤濕少頃抽去心或以瓦焙軟乘熱去心若入丸散須瓦焙熱即于風中吹冷如此三四次即易燥且不損藥力或以湯浸搗膏和藥亦可滋補藥則以酒浸擂之製用寇宗奭曰治心肺虛熱及虛勞與地黃阿膠麻仁同為潤經益血復脈通經之劑與五味子枸杞子同為生脈之劑張元素曰治肺中伏火脈氣欲絶者加五味子人參三味為生脈散補肺中元氣不足李杲曰六七月間濕熱方旺人病骨乏無力身重氣短頭旋眼黑甚則痿軟故孫真人以生脈散補其天元真氣脈者人之元氣也人參之甘寒瀉熱火而益元氣麥門冬之苦寒滋燥金而清水源五味子之酸溫瀉丙火而補庚金兼益五臟之氣也趙繼宗儒醫精要云麥門冬以地黃為使服之令人頭不白補髓通腎氣定喘促令人肌體滑澤除身上一切惡氣不潔之疾蓋有君而有使也若有君無使是獨行而無功矣此方惟火盛氣壯之人服之相宜若氣弱胃寒者必不可餌增圖經本草麥門冬煎補中益心悅顔色安神益氣令人肥健其力甚駛取新麥門冬根去心搗熟絞汁和白蜜銀器中重湯煮攪不停手候如飴及成溫酒日日化服之酸漿增爾雅葴寒漿注今酸漿草江東呼曰苦葴疏案本草酸漿一名醋漿陶注云處處人家多有葉亦可食子作房房中有子如梅李大皆黃赤色古今注苦葴一名苦蘵子有裹形如皮辨始生青熟則赤裹有實正圓如珠亦隨裹青赤長安兒童謂為洛神珠一曰王母珠一曰皮辨草本草拾遺苦葴小者為苦蘵亦呼為小苦耽本草綱目酸漿一名燈籠草一名天泡草酸漿以子之味名也苦葴苦耽以苖之味名也燈籠皮辨以角之形名也王母洛神珠以子之形名也寇宗奭曰天下有之苖如天茄子開小白花結青殼熟則深紅殼中子大如櫻亦紅色中復有細子如落蘇之子食之有青草氣李時珍曰五月開小花黃白色紫心白蘂其花如杯狀無瓣但有五尖結一鈴殼凡五稜一枝一顆下懸如燈籠之狀殼中一子狀如龍葵子苖葉莖根並苦寒無毒能利濕除熱治嗽化痰搗汁服治黃病去蠱毒子酸平無毒治黃病尤益小兒難産吞之立産蜀羊泉增本草綱目蜀羊泉一名羊泉一名羊飴一名漆姑草諸名莫解能治漆病故曰漆姑蘇恭曰葉似菊花紫色子類枸杞子根如逺志無心有糝所在平澤有之生隂濕地三月四月採苖葉隂乾氣味苦微寒無毒治瘡疥痂癬漆瘡黃疸鹿蹄草增本草綱目鹿蹄草一名小秦王草一名秦王試劍草鹿蹄象葉形能合金瘡故名試劍草按軒轅述寶藏論云鹿蹄多生江廣平陸及寺院荒處淮北絶少川陜亦有出似堇菜而葉頗大背紫色春生紫花結青實如天茄子可制雌黃丹砂治金瘡一切蛇蟲犬咬毒敗醬增本草綱目敗醬一名苦菜一名苦蘵一名澤敗一名鹿腸一名鹿首一名馬草陶宏景曰根作陳敗豆醬氣故以為名李時珍曰南人採嫩者暴蒸作菜食味微苦而有陳醬氣故又名苦菜與苦蕒龍葵同名亦名苦蘵與酸醬同名苖形則不同也蘇恭曰此藥多生岡嶺間葉似水莨及薇䕔叢生花黃根紫作陳醬色李時珍曰處處原野有之俗名苦菜野人食之江東人每采收儲焉春初生苖深冬始凋初時葉布地生似菘菜葉而狹長有鋸齒緑色面深背淺夏秋莖髙二三尺而柔弱數寸一節節間生葉四散如繖顛頂開白花成簇如芹花蛇牀子花狀結小實成簇其根白紫頗似柴胡氣味苦平無毒治瘡腫風熱破血排膿催生治産後諸病欵冬增爾雅菟奚顆凍注欵冬也紫赤花生水中疏案本草一名槖吾一名虎鬚陶注云形如宿蓴未舒者其腹裏有絲其花乃似大菊花唐本注云葉似葵而大叢生花出根下是也本草綱目一名欵凍一名氏冬一名鑽凍李時珍曰冬生氷下故名顆凍後人訛為欵冬欵者至也至冬而花也寇宗奭曰百草中惟此不顧氷雪最先春也故世謂之鑽凍蘇頌曰根紫色葉似萆薢十二月開花黃青紫萼去土一二寸初出如菊花萼通直而肥實無子又有紅花者葉如荷而斗直大者容一升小者容數合俗呼蜂斗葉又名水斗葉氣味辛溫無毒治咳逆上氣善喘喉痺諸驚癎寒熱邪氣彚考增范子欵冬花出三輔述征記洛水至嵗末凝厲則欵冬花茂悅層氷之中丹鉛録欵冬花即爾雅所稱菟奚顆凍者紫赤華生水中十二月雪中出花佛經云朱炎鑠石不靡蕭丘之木凝氷慘栗不凋欵冬之花乃知唐詩僧房逢著欵冬花正十二街頭春雪時也詩人之興於時物如此集藻贊增晉郭璞欵冬贊吹萬不同陽煦隂蒸欵冬之生擢穎堅氷物體所安焉知渙凝賦增晉傅咸欵冬花賦并序余曾逐禽登於北山於時仲冬之月也氷凌盈谷積雪被崖顧見欵冬煒然始敷賦曰惟兹竒卉欵冬而生原厥物之載育稟純粹之至精用能托體固隂利此堅貞惡朱紫之相奪患居衆之易傾在萬物之並作故韜華而弗逞逮皆死以枯稿獨保質而全形華艷春暉既麗且殊以堅氷為膏壤吸霜雪以自濡非天然之真貴曷能彌寒暑而不渝文散句增漢王褒九懷欵冬而生兮凋彼葉柯決明原決明杜詩注云食之能決去眼昏以益其明有二種馬蹄決明莖髙三四尺葉大於苜蓿而本小末奢晝開夜合兩兩相貼秋開淡黃花五出結角如初生細豇豆長五六寸子數十粒參差相連狀如馬蹄青緑色入眼藥最良一種茳芒決明即山扁豆苖莖似馬蹄決明但葉本小末尖似槐葉夜亦不合秋開深黃花五出結角如小指長二寸許子成數列如黃葵子而扁色褐味甘滑二種苖葉皆可作酒麯俗呼為獨占缸但茳芒嫩苖及花角皆可瀹為茹及點茶食而馬蹄決明苖角皆韌苦不可食也其子鹹平無毒治目中諸病助肝益精作枕治頭風明目勝黑豆有決明處蛇不敢入外有草決明石決明皆能明目草決明即青葙子又有茳芒另是一種生道旁葉小於決明炙作飲甚香除痰止渴令人不睡隋稠禪師作五色飲以進隋帝者是也彚考增霏雪録陳白雲家籬落有植決明家人摘以下茶生三女皆短而跛而三女甥亦跛豫皆識之又會稽民朱氏一子亦然其家亦嘗種之悉拔去集藻五言古詩增宋黃庭堅種決明后皇富嘉種決明注方術耘鋤一席地時至觀茂密縹葉資芼羮緗花馬蹄實霜叢風雨餘篩簸場功畢枕囊代曲肱甘寢聽芬苾老眼願力餘讀書真成癖明吳寬決明黃花隱緑藥雨過仍離披不為杜老歎未是涼風時服食治目眚吾將采掇之不須更買藥園丁是醫師七言古詩增唐杜甫秋雨歎雨中百草秋爛死階下決明顔色鮮著葉滿枝翠羽蓋開花無數黃金錢涼風蕭蕭吹汝急恐汝後時難獨立堂上書生空白頭臨風一嗅馨香泣七言律詩增明吳寬濟之送決明畦間香霧正氤氲童子清晨荷鍤興不惜離披垂翠羽端然搖落動黃雲藥名早得宣公注書帶休從鄭老分病目向來俱有賴涼風吹汝莫紛紛七言絶句增宋蘇轍蜀人舊食決明花耳頴州夏秋少菜崇寧老僧教人并食其葉有鄉人西歸使為父老言之戲作秋蔬舊採決明花三嗅馨香每歎嗟西寺衲僧并食葉因君説與故人家地膚原譜誤作藜今從本草訂正原地膚一名掃帚一名獨帚一名王蔧一名落帚一名王帚爾雅云葥王蔧注云王帚也似藜其樹可以為掃帚江東呼之曰落帚一名地麥一名地葵一名白地草一名涏衣草一名鴨舌草一名千頭子一名千心妓女一名益明本草綱目云地膚地麥因其子形似也地葵因其苖味似也鴨舌因其葉形似也妓女因其枝繁而頭多也益明因其子功能明目也春間可種處處有之一本叢生每窠約二三十莖團團直上有赤有黃七月開黃花子色青似一眠起蠶沙之狀最繁嫩苖可作蔬茹至八月而秸幹成可採子落則老八月以草束其腰九月刈以石壓扁可為帚性苦寒無毒治膀胱熱利小便補中益精氣久服耳目聰明輕身耐老可作湯沐浴王不留行增本草綱目王不留行一名禁宫花一名翦金花一名金盞銀臺此物性走而不住雖有王命不能留其行故名多生麥地中苖髙者一二尺三四月開小花如鐸鈴狀紅白色結實如燈籠草子殼有五稜殼內包一實大如豆實內細子大如菘子生白熟黑正圓如細珠可愛氣味苦平無毒止血除風治金瘡鼻衄癰疽惡瘻乳婦人難産下乳汁出竹木刺彚考增世説衛江州在潯陽有知舊人投之都不料理唯餉王不留行一斤此人得餉便命駕李𢎞範聞之曰家舅刻薄乃復驅使草木葶藶增爾雅蕇亭藶注實葉皆似芥一名狗薺廣雅云本草一名丁歷一名大室一名大適圖經本草葶藶汴東陜西河北州郡皆有之曹州者尤佳初春生苖葉髙六七寸似薺根白色枝莖俱青三月開花微黃結角子扁小如黍粒微長黃色月令孟夏之月靡草死許愼鄭玄注皆云靡草薺葶藶之屬是也一説葶藶單莖向上葉端出角粗且短又有一種狗芥草葉近根下作岐生角細長取時必須分别此二種也氣味辛寒無毒治癥瘕積聚結氣飲食寒熱破堅逐邪通利水道療中風肺壅上氣咳嗽止喘促除胸中痰飲車前原車前一名芣苡一名馬舄一名蝦蟇衣爾雅云芣苡馬舄車前注云江東呼為蝦蟇衣一名當道一名牛舌陸璣詩疏云喜在牛迹中生故曰車前當道也幽州人謂之牛舌草一名地衣神仙服食經云一名地衣雷之精也一名羽化一名牛遺一名車輪菜與當道諸名義同處處有之開州者勝春初生苖葉布地如匙面纍年者長及尺餘中抽數莖作長穗如鼠尾花青色微赤甚細密結實如葶藶赤黑色五月採苖八九月採實人家園圃或種之味甘寒無毒飬肺益精除濕痺利水道治産難壓丹石毒去心胸煩熱久服輕身明目耐老令人有子彚考增詩周南采采芣苡薄言采之集藻贊增晉郭璞芣苡贊車前之草别名芣苡王會之云其實如李名之相亂在乎疑似七言絶句原唐張籍答開州韋使君寄車前子開州午日車前子作藥人皆道有神慙愧使君憐病眼二千里外寄間人詩散句增唐白居易芣苡春來盈女手别録原修治凡用須以水淘洗去泥沙曬乾入湯液炒過用入丸散酒浸一宿蒸熟研爛作餅曬乾焙研製用陸璣言嫩苖作茹大滑王旻山居録有種車前翦苖食法昔人常以為蔬矣今野人猶採食之本草綱目歐陽公常得暴下病國醫不能治夫人買市人藥一帖進之而愈力叩其方則車前子一味為末米飲服二錢匕云此藥利水道而不動氣水道利則清濁分而穀藏自正矣狗舌草增唐本草狗舌生渠塹濕地春生葉似車前而無文理抽莖開花黃白色四月五月採莖暴乾氣味苦寒有小毒治蟲疥瘙瘡殺小蟲塗之即瘥鱧腸增本草綱目鱧腸一名蓮子草一名旱蓮草一名金陵草一名墨煙草一名墨頭草一名墨菜一名猢孫頭一名豬牙草鱧烏頭也其腸亦烏此草柔莖斷之有墨汁出故名俗呼墨菜是也細實頗如蓮房故得蓮名蘇頌曰處處有之南方尤多此有二種一種葉似栁而光澤莖似馬齒莧髙二三尺開花細而白其實若小蓮房一種苖梗枯瘦頗似蓮花而黃色實亦作房而圓南人謂之連翹者二種折其苖皆有汁出須臾而黑俗謂之旱蓮子李時珍曰旱蓮有二種一種苖似旋覆而花白細者是鱧腸一種花黃紫而結房如蓮房者乃是小連翹也爐火家亦用之氣味甘酸平無毒烏鬚固齒止血排膿傅一切瘡繫臂截瘧連翹增爾雅連異翹注一名連苕又名連草疏案本草連翹一名蘭華一名折根一名軹一名三廉圖經本草近汴京及河中江寧潤淄澤兗鼎嶽利諸州南康軍皆有之有大小二種大翹生下濕地或山岡上青葉狹長如榆葉水蘇輩莖赤色髙三四尺獨莖梢間開花黃色秋結實似蓮內作房瓣根黃如蒿根八月採房其小翹生岡原之上花葉實皆似大翹而細南方生者葉狹而小莖短才髙一二尺花亦黃實房黃黑內含黑子如粟粒亦名旱蓮南人用花葉今南方醫家説云連翹有兩種一種似椿實之未開者殼小堅而外完無跗萼剖之則中解氣甚芳馥其實才乾振之皆落不著莖也一種乃如菡萏殼柔外有跗萼抱之而無解脈亦無香氣乾之雖久著莖不脫此甚相異此種江南下澤間極多如椿實者乃自蜀中來入用勝似江南者據本草則亦以蜀中者為勝然未見其莖葉也氣味苦平無毒珍珠囊連翹之用有三瀉心經客熱一也去上焦諸熱二也為瘡家聖藥三也蒴藋增本草綱目蒴藋一名接骨草蘇恭曰即陸英也蘇頌曰陸英當是蒴藋花也陶𢎞景曰生田野所在有之春抽苖莖有節節間生枝葉大似水芹春夏採葉秋冬採根莖寇宗奭曰花白子初青如緑豆顆每朵如盞面大又平生有一二百子十月方熟紅李時珍曰每枝五葉氣味酸溫有毒風瘙癮疹身癢濕痺可作浴湯止瘧破癥塊治丹毒水英增圖經本草水英生永陽池澤及河海邊臨汝人呼為牛葒草河北信都人名水節河內連內黃呼為水棘劍南遂寧等郡名龍移草淮南諸郡名海荏嶺南亦有土地尤宜莖葉肥大名海精木亦名魚津草蜀人採其花合面藥骨風疾不宜針灸及服藥唯取此草煮浸即瘥海根增本草拾遺海根生會稽海畔山谷莖赤葉似馬蓼根似菝葜而小番人蒸而用之氣味苦小溫無毒治霍亂中惡鬼氣疰忤喉痺蠱毒癰疽遊疹蛇毒火炭母草增圖經本草火炭母草生恩州原野中莖赤而柔似細蓼葉端尖近梗形方夏有白花秋實如椒青黑色味甘可食氣味酸平有毒去皮膚風熱流注骨節癰腫疼痛搗爛以鹽酒炒傅腫痛處三白草增本草綱目三白草陳藏器曰此草初生無白入夏葉端半白如粉農人候之蒔田三葉白則草便莠故謂之三白生田澤畔八月生苖髙二三尺莖如蓼葉如章陸及青葙四月其顛三葉面上三次變作白色餘葉仍青不變俗云一葉白食小麥二葉白食梅杏三葉白食黍子五月開花成穗如蓼花狀而色白微香結細實根長白虛軟有節鬚狀如泥菖蒲根氣味甘辛寒有小毒治水腫腳氣消痰破癖除積聚消丁腫搗汁服除瘧及熱痰小兒痞滿根療腳氣風毒煎湯洗癬瘡蠶繭草增本草拾遺蠶繭草生濕地如蓼大莖赤花白東土亦有之氣味辛平無毒治諸蟲咬毒煮服之亦搗傅諸瘡蛇繭草增本草拾遺蛇繭草生平地葉似苦枝而小節赤髙一二尺種之辟蛇搗傅蛇虺毒蟲等螫又一種草莖圓似芊亦傅蛇毒虎杖增爾雅蒤虎杖注似紅草而粗大有細刺可以染赤本草綱目虎杖一名苦杖一名大蟲杖一名斑杖一名酸杖杖言其莖虎言其斑也蘇頌曰今出汾州越州滁州處處有之三月生苖莖如竹筍狀上有赤斑點初生便分枝子葉似小杏葉七月開花九月結實南中出者無花根皮黑色破開即黃似栁根亦有髙丈餘者寇宗奭曰大率皆似寒菊然花葉莖蕊差大為異仍莖葉淡黑斑六七月旋旋開花至九月中方已花片四出其色如桃花差大而外微深陜西山麓水次甚多李時珍曰其莖似葒蓼其葉圓似杏其枝黃似栁其花狀似菊色似桃氣味微溫無毒通經破留血癥結治風在骨節大熱煩躁五淋腸痔燒灰貼諸惡瘡蒺藜原蒺藜一名茨爾雅云蒺藜楚辭作薋本草綱目云蒺疾也藜利也茨刺也其刺傷人甚疾而利也一名升推一名旁通一名休羽一名屈人一名止行皆因其傷人也多生道旁及牆頭葉四布莖淡紅色旁出細莖一莖五七葉排兩旁如初生小皂莢葉圓整可愛開小黃花結實每一朵蒺藜五六枚圑砌如扣每一蒺藜子如赤根菜子及小菱三角四刺子有仁味苦無毒治惡血破積聚消風下氣健筋益精堅牢牙齒久服長肌肉明目輕身炒黃去刺磨麵或蒸食可以救荒彚考原易據于蒺藜疏蒺藜之草有刺而不可踐也詩鄘風牆有茨不可掃也增詩小雅楚楚者茨韓詩外傳春植蒺藜夏不得采其葉秋得其刺焉博物志歲欲旱旱草先生旱草謂蒺藜也集藻文散句增楚屈原離騷薋菉葹以盈室兮漢東方朔七諫蒺藜蔓乎東廂詩散句增唐栁宗元古道饒蒺藜縈回古城曲别録增爾雅翼鐵蒺藜菱角等起於隋時征遼為之然六韜中已有此物鼂錯傳謂之渠答諸葛亮卒於五丈原魏人追之長史楊儀多布鐵蒺藜則其來已久埤雅兵家鑄鐵為之以梗敵路亦呼蒺藜原修治凡使揀淨從午蒸至酉曬乾木臼舂令刺盡酒拌冉蒸從午至酉曬乾用炒去刺亦可不計丸散用皆去刺服食神仙祕旨蒺藜子七八月熟時收取一石日乾舂去刺杵為末每服二錢新汲水調下日三勿令中絶斷榖長生服之一年以後冬不寒夏不熱二年老者復少髮白復黑齒落更生服之三年身輕長生本地蒺藜候八九月將熟時收取根莖花實不拘多少洗淨水熬數沸以爛為度大盆內木杓碾爛濾淨汁鍋內冉熬至稀稠調勻每一斤入蜂蜜四兩冉熬一沸裝入磁罐埋土內去火毒每空心溫酒調下一兩大有補益附録沙苑蒺藜原沙苑蒺藜按本草謂之白蒺藜出陜西同州沙苑牧馬草地近道亦有之細蔓緑葉綿布沙上七月開花黃紫色如豌豆花而小九月結莢長寸許形扁縫在腹背與他莢異中有子似羊內腎大如黍粒褐緑色味甘溫無毒微腥補腎治腰痛虛損勞乏穀精草原穀精草本草綱目云榖田餘氣所生故曰榖精一名文星草一名戴星草一名流星草開寶本草云白花似星故有戴田諸名處處有之收穀後生荒田中一科叢生葉似嫩穀秧抽細莖髙四五寸莖頭有小白花點點如亂星九月採花隂乾氣味辛溫無毒治頭風痛目盲翳膜痘後生翳目中諸病加而用之良明目退翳功在菊花上餧馬令肥主蟲顙毛焦病又有一種莖硬長有節根微赤出秦隴海金沙增本草綱目海金沙一名竹園荽其色黃如細沙也謂之海者神異之也俗名竹園荽象葉形也江浙湖湘川陜皆有之生山林下莖細如線引於竹木上髙尺許其葉細如園荽葉而甚薄背面皆青上多皺文皺處有沙子狀如蒲黃粉黃赤色不開花細莖堅強其沙及草皆可入藥氣味甘寒無毒通利小腸療傷寒熱狂治濕熱腫滿五淋解熱毒氣地楊梅增本草拾遺地楊梅生江東濕地苖如沙草四五月有子似楊梅氣味辛平無毒治赤白痢取莖子煎湯服水楊梅增本草綱目水楊梅一名地椒生水邊條葉甚多生子如楊梅狀庚辛玉册云地椒一名水楊梅多生近道隂濕處荒田野中亦有之叢生苖葉似菊莖端開黃花實類椒而不赤可結伏三黃白礬制丹砂粉霜氣味辛溫無毒治疔瘡腫毒地蜈蚣草增本草綱目地蜈蚣草生村落塍野間左蔓延右右蔓延左其葉密而對生如蜈蚣形其穗亦長俗呼過路蜈蚣其延上樹者呼飛天蜈蚣根苖皆可用氣味苦寒無毒半邊蓮增本草綱目半邊蓮小草也生隂濕塍塹邊就地細梗引蔓節節而生細葉秋開小花淡紅紫色止有半邊如蓮花狀故名又呼急解索氣味辛平無毒治蛇蛔傷搗汁飲以滓圍塗之又治寒齁氣喘及瘧疾紫花地丁增本草綱目紫花地丁一名箭頭草一名獨行虎一名羊角子一名米布袋處處有之其葉似栁而微細夏開紫花結角平地生者起莖溝壑邊生者起蔓普濟方云鄉村籬落生者夏秋開小白花如鈴兒倒垂葉微似木香花之葉此與紫花者相戾恐别一種也氣味苦辛寒無毒治一切癰疽發背疔腫瘰癧無名腫毒惡瘡鬼針草增唐本草鬼針草生池畔方莖葉有丫子作叉腳著人衣如針北人謂之鬼針南人謂之鬼叉氣味苦平無毒治蜘蛛蛇咬杵汁服併傅之獨用將軍增唐本草獨用將軍生林野中節節穿葉心生苖不時采根葉用氣味辛無毒治毒腫乳癰解毒破惡血附録留軍待增唐本草留軍待生劍州山谷葉似楠而細長采無時味辛溫無毒主肢節風痛折傷瘀血五緩攣痛見腫消增圖經本草見腫消生筠州春生苖葉莖紫色髙一二尺葉似桑而光面青紫赤色采無時氣味酸澀有微毒消癰腫及狗咬搗葉貼之攀倒甑增本草綱目攀倒甑生宜州郊野莖葉如薄荷一名斑杖一名接骨氣味苦寒無毒解利風熱煩渴狂躁搗汁服水甘草增圖經本草水甘草生筠州多在水旁春生苖莖青葉如栁無花土人十月八月採單用不入衆藥氣味甘寒無毒治小兒風熱丹毒同甘草煎飲御定佩文齋廣羣芳譜卷九十六
