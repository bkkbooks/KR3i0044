body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九十七藥譜大黃增本草綱目大黃一名黃良一名將軍一名火參一名膚如陶𢎞景曰大黃其色也將軍之號當取其駿快也吳普曰生蜀郡北郡或隴西二月卷生黃赤其葉四面相當莖高三尺許三月花黃五月實黑八月采根根有黃汁蘇恭曰葉子莖並似羊蹄但莖高六七尺而脆味酸堪生啖葉粗長而厚根紅者亦似宿羊蹄大者如碗長二尺出宕州涼州西羌蜀地者皆佳幽并以北者漸細氣力不及蜀中者蘇頌曰今蜀州河東陜西州郡皆有之以蜀川錦文者佳其次秦隴來者謂之土番大黃正月內生青葉似萞麻大者如扇根如芋大者如碗細根如牛蒡小者亦如芋四月開黃花亦有青紅似蕎麥花者莖青紫色形如竹二八月采根去黑皮切作橫片火乾蜀大黃乃作緊片如牛舌形謂之牛舌大黃二者功用相等江淮出者曰土大黃二月開花結細實李時珍曰宋祁益部方物略記云大黃蜀大山中多有之藥市所見大者治之為枕紫地錦文今人以莊浪出者為最莊浪即古涇原隴西地也氣味苦寒無毒下瘀血破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水榖調中化食安和五臟宣通一切氣集藻贊增宋宋祁大黃贊葉大莖赤根若巨皿治疾則多方家所詺七言絶句增宋范成大大黃花大芋高荷半畝隂玉英危綴碧瑤簪誰知一葉蓮花面中有將軍劒戟心别録增炮炙論凡使細切以文如水旋斑緊重者銼片蒸之從己至未曬乾又灑臘水蒸之從未至亥如此凡七次曬乾却灑淡蜜水再蒸一伏時其大黃必如烏膏樣乃曬乾用商陸原商陸一名蓫薚音逐湯一名馬尾一名當陸爾雅云蓫􅛅馬尾注云廣雅曰馬尾商陸本草云别名薚今關西亦呼為薚江東為當陸一名章柳本草綱目云商陸北音訛為章柳兼明書云一名章陸一名烏椹一名六甲父母一名白昌一名夜呼所在有之人家園圃亦種為蔬春生苗高三四尺青葉如牛舌而長莖青赤至柔脆夏秋開紅紫花作朵根如蘿葡而長八九月採氣味辛平有毒通大小腸瀉十種水病及蠱毒墮胎㶸腫毒傅惡瘡殺鬼精物彚考增易莧陸夬夬注莧陸草之柔脆者也疏子夏傳云莧陸木根草莖剛上柔下也馬融鄭玄王肅皆云莧陸一名商陸皆以莧陸為一董遇云莧人莧也陸商陸也以莧陸為二金門歲節裴度除夜歎老逮曉不寐爐中商陸火凡數添也别録增炮炙論取白花者根銅刀刮去皮薄切以東流水浸兩宿漉出架甑蒸以黑豆葉一重商陸一重如此蒸之從午至亥取出去豆葉暴乾銼用無豆葉以豆代之本草綱目取白根及紫色者擘破作畦栽之亦可種子根苗莖並可洗蒸食或用灰汁煮過亦良其赤與黃色者有毒不可食狼毒增開寶本草狼毒葉似商陸及大黃莖葉上有毛根皮黃肉白以實重者為良輕者為力劣氣味辛平有大毒治咳逆上氣破積聚飲食寒熱水氣惡瘡鼠瘻疽蝕鬼精蠱毒殺飛鳥走獸抱朴子合野葛納耳中治聾防葵增本草綱目防葵一名房苑一名梨蓋一名利茹吳普本草又名爵離方蓋農果蘇恭曰根葉似葵花子根香味似防風故名防葵蘇頌曰出襄陽地其葉似葵每莖三葉一本十數莖中發一幹其端開花如蔥花景天輩而色白六月開花即結實根似防風香味亦如之依時采者乃沉水今乃用枯朽狼毒當之極謬氣味辛寒無毒治疝瘕腸泄膀胱熱結咳逆濕瘖癲癎驚邪狂走鬼瘧百邪狼牙增本草綱目狼牙一名牙子一名狼齒一名狼子一名犬牙一名抱牙一名支蘭陶𢎞景曰其牙似獸之齒牙故有諸名韓保升曰所在有之苗似蛇莓而厚大深緑色根黑若獸之牙三月八月采根日乾氣味苦寒有毒治邪氣熱氣疥瘙惡瘍瘡痔去白蟲䕡茹增本草綱目䕡茹一名離婁一名掘據䕡茹本作藘蕠其根牽引之貌掘據當作拮據拮據手口共作之狀也蘇頌曰河陽淄齊州皆有之二月生苗葉似大戟而花黃色根如蘿蔔皮赤黃肉白斷時汁出凝黑如漆三月開淺紅花亦淡黃色不著子又一種草䕡茹色白李時珍曰范子計然云藘茹出武都黃色者善草䕡茹出建康白色今亦處處有之生山原中春初生苗高二三尺根長大如蘿蔔蔓菁狀或有岐出者皮黃赤肉白色破之有黃漿汁莖葉如大戟而葉長微濶不甚尖折之有白汁抱莖有短葉相對團而出尖葉中出莖莖中分二三小枝二三月開細紫花結實如豆大一顆三粒相合生青熟黑中有白仁如續隨子狀氣味辛寒有小毒治蝕惡肉敗瘡死肌殺疥蟲排膿惡血除大風熱氣善忘不寐破癥瘕除息肉大戟增爾雅蕎卭巨注今藥草大戟也本草網目大戟一名下馬仙其根辛苦戟人咽喉故名大戟今俚人呼為下馬仙言利人甚速也蘇頌曰近道多有之春生紅芽漸長叢高一尺以來葉似初生楊柳小團三月四月開黃紫花團圓似杏花又似蕪荑根似細苦參秋冬采根隂乾淮甸出者莖圓高三四尺葉黃莖至心亦如百合苗江南生者葉似芍藥李時珍曰大戟生平澤甚多直莖高二三尺中空折之有白漿葉長狹如柳葉而不團其梢葉密攢而上杭州紫大戟為上江南土大戟次之北方綿大戟色白其根皮柔韌如綿甚峻利能傷人弱者服之或至吐血氣味苦寒有小毒治蠱毒十二水腹滿急痛積聚中風皮膚疼痛吐逆瀉毒藥泄天行黃病溫瘧破癥結下惡血治隱疹澤漆增本草綱目澤漆一名漆莖一名貓兒眼睛草一名緑葉緑花草一名五鳯草考土宿本草及寶藏論云江湖原澤平陸多有之春生苗一科分枝成叢柔莖如馬齒莧緑葉如苜蓿葉葉圓而黃緑頗似貓睛故名貓兒眼莖頭凡五葉中分中抽小莖五枝每枝開細花青緑色復有小葉承之齊整如一故又名五鳯草緑葉緑花草掐莖有白汁黏人其根白色有硬骨或以此為大戟苗者誤也氣味苦微寒無毒治皮膚熱利水消腫丈夫隂氣不足利大小腸解蠱毒止瘧疾消痰退熱甘遂增本草綱目甘遂一名甘藁一名陵藁一名陵澤一名甘澤一名重澤一名苦澤一名白澤一名主田一名鬼醜蘇頌曰陜西江東有之苗似澤漆莖短小而葉有汁根皮赤肉白作連珠大如指頭氣味苦寒有毒治疝瘕腹滿浮腫留飲宿食破癥堅積聚痰迷癲癎噎膈痞塞利水榖道瀉十二種水疾續隨子增本草綱目續隨子一名千金子一名千兩金一名菩薩豆一名拒冬一名聨步蘇頌曰葉中出葉數數相續而生故名冬月始長故又名拒冬馬志曰生蜀郡處處亦有之苗如大戟蘇頌曰今南中多有北土産少苗如大戟初生一莖莖端生葉葉中復出葉花亦類大戟自葉中抽幹而生實青有殼人家園亭中多種以為飾秋種冬長春秀秋實李時珍曰莖中亦有白汁可結水銀子去殼取色白者以紙包壓去油取霜用氣味辛溫有毒治瘀血癥瘕疾癖除蠱毒鬼疰心腹痛冷氣脹滿利大小腸下惡滯物宣一切宿滯治肺氣水氣塗疥癬瘡莨菪增本草綱目莨菪一名天仙子一名橫唐一名行唐莨菪一作藺薚其子服之令人狂狼放宕故名蘇頌曰處處有之苖莖髙二三尺葉似地黃王不留行紅藍等而濶如三指四月開花紫色莖莢有白毛五月結實有殼作罌子狀如小石榴房中子至細青白色如粟米粒氣味苦寒有毒治齒痛出蟲肉痺拘急久服輕身使人健行走及奔馬強志益力通神見鬼多食令人狂走以甘草汁解之療癲狂風癎顛倒拘攣安心定志聰明耳目除邪逐風根氣味苦辛有毒治邪瘧疥癬殺蟲雲實增本草綱目雲實一名員實一名雲英一名天豆一名馬豆一名羊石子苗名草雲母一名臭草一名黏刺員亦音雲其義未詳豆以子形名羊石當作羊矢其子肖之故也蘇恭曰大如黍及大麻子等黃黑似豆叢生澤旁高五六尺葉如細槐亦如苜蓿枝間有微刺韓保升曰所在平澤有之葉似細槐花黃白色其莢如豆其實青黃色大若麻子五月六月采實李時珍曰此草山原甚多俗名枯刺赤莖中空有刺高者如蔓其葉如槐三月開黃花纍然滿枝莢長三寸許狀如肥皂莢內有子五六粒正如鵲豆兩頭微尖有黃黑斑紋厚殼白仁咬之極堅重有腥氣氣味辛溫無毒治泄痢腸澼殺蟲蠱毒去邪惡結氣止痛除寒熱消渴治瘧花治見鬼精多食令人狂走根治骨哽及咽喉痛研汁咽之萞麻原萞麻蘇頌曰葉似大麻子形宛如牛蜱故名李時珍曰萞亦作螕螕牛虱也其子有麻點故名萞麻處處有之夏生苖莖中空有節色或赤或白葉如瓠葉凡五尖夏秋間丫中抽出花穗纍纍黃色每枝結實數十顆上有軟刺如蝟毛一顆三四子熟時破殼子大如豆皮有白黑紋亦有白紫紋者形微長而末圓頭上小白點遠視之儼如牛螕皮中有仁色嬌白甘辛平有小毒氣味頗近巴豆善走能利人通諸竅經絡下水氣治偏風失音口禁口目喎邪頭風七竅諸病止諸痛消腫追膿拔毒催生下胞衣下有形諸物無刺者良有刺者毒此藥外用有竒功但內服不可輕易凡服萞麻終身不得食炒豆犯之脹死其油服丹砂粉霜或言搗膏以筯點六畜舌根下即不能食點肛內即下血死今北方人種之田邊牛馬過者不食其毒可知集藻七言絶句增明陳憲章種萞麻六首山渠面面擁萞麻鎖盡春風一院花江上行人迷指顧老夫於此煉丹砂短檠他夜照書牀一􅊦萞麻也借光老去圖書收拾盡只慿香几對羲皇紅朵青條擺弄同人間無地不春風莫輕此輩萞麻子也在先生藥圃中萞麻得雨緑成畦如此風光亦老黎飲後小庵搜句坐山禽啼近竹門西萞麻繞竹徑通雲雲裏樵歌隔竹聞手把長鑱種春雨風光吾與老黎分種了萞麻合種瓜青山周折兩三家老夫來構茅茨畢别種秋風一徑花附録博落回原博落回生江南山谷莖葉如萞麻莖空吹之作聲折之有黃汁大毒不可入口藥人立死治惡瘡癭瘤瘜肉瘡瘻白癜風此藥和百丈青雞桑灰等分為末傅之蠱毒精魅當别有法附録黑天赤利子原黑天赤利子似萞麻緣在地蔞上是顆兩頭尖有毒常山增本草綱目常山一名恆山一名互草一名雞尿草一名鴨尿草一名蜀漆李時珍曰恆亦常也恆山乃北嶽名在今定州常山乃郡名亦今真定豈此藥始産于此得名歟蜀漆乃常山苗功用相同陶𢎞景曰出宜都建平細實黃者呼為雞骨常山用之最勝蘇恭曰生山谷間莖圓有節高者不過三四尺葉似茗而狹長兩兩相當二月生白花青萼五月結實青圓三子為房其草暴燥色青白堪用若隂乾便黑爛鬱壞矣蘇頌曰今汴西淮浙湖南州郡亦有之而海州出者葉似楸葉八月有花紅白色子碧色似山棟子而小今天台山出一種草名土常山苖葉極甘人用為飲甘味如蜜又名蜜香草性涼益人非此常山也氣味苦寒有毒治傷寒寒熱熱發溫瘧鬼毒胸中痰結吐逆療鬼蠱水脹鼠瘻瘤癭蜀漆氣味辛平有毒截瘧治咳逆寒熱癥痞積聚邪氣蠱毒鬼疰破血劫痰别録增炮炙論采時連根苗收如用莖葉臨時去根以甘草細銼同水拌濕蒸之臨時去甘草取蜀漆細銼又拌甘草水勻蒸日乾用凡用根以酒浸一宿漉出日乾熬搗用附録杜莖山增圖經本草杜莖山莖高四五尺葉似苦蕒菜秋有花冬作實如枸杞子大而白葉味苦寒主溫瘴寒熱作止不定煩渴頭痛心燥杵爛新酒浸絞汁服吐出惡涎甚效附録土紅山增圖經本草土紅山生南恩州山野中大者高七八尺葉似枇杷而小無毛秋生白花如粟粒不實福州生者作細藤似芙蓉葉其葉上青下白根如葛頭土人取根米泔浸一宿以清水再浸一宿炒黃為末生薑煎服治勞瘴甚效葉味甘微寒無毒治骨節疼痛勞熱瘴瘧藜蘆增本草綱目藜蘆一名山蔥一名蔥苒一名蔥菼一名蔥葵一名豐蘆一名憨蔥一名鹿蔥黑色曰黎其蘆有黑皮裹之故名根際似蔥俗名蔥管藜蘆是矣北人謂之憨蔥南人謂之鹿蔥蘇頌曰陜西山南東西州郡皆有之遼州均州解州者尤佳三月生苖葉似初出棕心又似車前莖似蔥白青紫色高五六寸上有黑皮裹莖似棕皮有花肉紅色根似馬腸根長四五寸許黃白色二月三月采根隂乾此有二種一種水藜蘆莖葉大同只是生在近水溪澗石上根鬚百餘莖不中藥用今用者名蔥白藜蘆根鬚甚少只是三二十莖生高山者為佳均州土俗亦呼為鹿蔥氣味辛寒有毒治蠱毒咳逆泄痢腸澼頭瘍疥瘙惡瘡殺諸蟲毒去死肌療噦逆喉痺鼻中息肉吐上膈風涎暗風癎病小兒􅀈齁痰疾末治馬疥癬附録山慈石增名醫别録山慈石生山之陽正月生葉如藜蘆莖有衣一名爰茈氣味苦平無毒主女子帶下附録參果根增名醫别録參果根生百餘根根有衣裹莖三月三日采根一名百連一名烏蓼一名鼠莖一名鹿蒲味苦有毒治鼠瘻附録馬腸根增圖經本草馬腸根生秦州葉似桑三月采葉五月六月采根苦辛寒有毒治蠱除風葉療瘡疥水藜蘆增本草綱目水藜蘆一名黃藜蘆一名鹿驪鹿驪俚人呼為黃藜蘆小樹也葉如櫻桃葉狹而長多皺紋四月開細黃花五月結小長子如小豆大氣味苦辛溫有毒治疥癬殺蟲附子增廣雅𧂒蒵毒附子也一歲為萴子二歲為烏喙三歲為附子四歲為烏頭五歲為天雄本草綱目正者為烏頭多岐者為烏喙細長三四寸者為天雄根旁如芋散生者為附子旁連生者為側子五物同出而異名蘇頌曰五者今並出蜀土苗高三四尺莖作四稜葉如艾其花紫碧色作穗其實細小如桑椹狀黑色本只種附子一物成熟後乃有四物以長二三寸為天雄割削附子旁尖角為側子附子之絶小者亦名側子元種者為烏頭其餘大小者皆為附子以八角者為上李時珍曰烏頭有兩種出彰明者即附子之母今人謂之川烏頭春未生子故春采為烏頭冬則生子已成故冬采為附子其天雄烏喙側子皆是生子多者因象命名附子氣味辛溫有大毒治風寒咳逆邪氣寒濕踒躃拘攣破癥堅積聚血瘕金瘡腰脊風寒心腹冷痛霍亂溫中暖脾胃除脾濕腎寒補下焦陽虛除臟腑沉寒三陽厥逆治三隂傷寒中風痰厥氣厥柔痓癲癎暴瀉脫陽久痢寒瘧瘴氣久病嘔噦反胃噎膈烏頭助陽退隂功同附子而稍緩彚考增詩大雅堇荼如飴國語置堇於肉注賈逵曰堇烏頭也淮南子天下之物莫凶於雞毒然而良醫槖而藏之有所用也注雞毒烏頭也博物志烏頭天雄附子一物春秋冬夏採各異也明皇十七事玄宗好神仙往往詔郡國徵奇士有張果者所為變怪不測上謂力士曰吾聞奇士至人外物不能敗其中試飲以堇汁不死者乃奇士也會天寒甚乃使以汁進果果遂飲盡二巵醇然如醉者顧曰非佳酒也藥譜川烏頭别名昌明童子瑣碎録滑臺風土極寒民啖附子如啖芋栗益部方物略記陶𢎞景以天雄烏頭附子皆出建平謂之三建癸辛雜識三建湯用附子川烏天雄而莫曉其命名之義因觀謝靈運山居賦曰三建異形而同出蓋三物皆一種類是知古藥命名皆有所本祖也明會典四川成都府歲貢天雄二十對附子五十對烏頭五十對漏藍二十斤集藻記增宋楊天惠彰明附子記綿州故廣漢地領縣八惟彰明出附子彰明領鄉二十惟赤水廉水會昌昌明宜附子總四鄉之地為田五百二十頃有奇然稅稻之田五菽粟之田三而附子之田止居其二焉合四鄉之産得附子一十六萬斤已上然赤水為多廉水次之而會昌昌明所出微甚凡上農夫歲以善田代處前期輒空田一再耕之蒔薺麥若巢糜其中比苖稍壯并根葉耨覆土下後耕如初乃布種每畝用牛十耦用糞五十斛七寸為壠五寸為符終畝為符二十為壠千二百壠從無衡深亦如之又以其餘為溝為塗春陽憤盈丁壯畢出疏整符壠以需風雨雨過輒振拂而駢持之既又挽草為援以御短日其用工力比他田十倍然其歲獲亦倍稱成之凡四鄉度用種千斛以上出龍安及龍州齊歸木間青捶小平者良其播種以冬盡十一月止采擷以秋冬九月止其莖類野艾而澤其葉類地麻而厚其花紫葉黃蕤長苞而圓其蓋其實之美惡視功之勤窳以故富室之入常美貧者雖接畛或不盡然又有七月采者謂之旱水拳縮而小蓋附子之未成者然此物謂畏惡猥多不能常熟或種美而苖不茂或苖秀而不充或以釀而腐或以暴而攣若有物焉隂為之故園人將采常禱於神或目為藥妖云其釀法用醢醅安密室淹覆彌月乃發以時暴涼久乾定方出釀時其大有如拳者已定不輒盈握故及兩者極難得蓋附子之品有七實本同而末異其初種之小者為烏頭附烏頭而傍生者為附子又左右附而偶生者為鬲子又附而長者為天雄又附而尖者為天錐又附而上者為側子又附而散者為漏藍子皆脈絡連貫如子附母而附子以貴故獨專附名自餘不得與焉凡種一而子六七以上則其實皆小種一而子二三則其實稍大種一而子特生則其實特大此其凡也附子之形以蹲坐正節角少為上有節多鼠乳者次之形不正而傷缺風皺者為下附子之色以花白為上鐵色次之青緑為下天雄烏頭天錐以豐實盈握為勝而漏藍側子園人以乞役夫不足數也大率蜀人餌附子者少惟陜輔閩浙宜之陜輔之賈才市其下者閩浙之賈才市其中者其上品皆士大夫求之蓋貴人金多喜奇故非得大者不厭然土人有知藥者云小者固難用要知半兩以上皆良不必及兩乃可此言近之按本經及志載附子出犍為山谷及在山南嵩高齊魯間以今考之皆無有誤矣又曰春採為烏頭冬採為附子大謬又云附子八角者良其角為側子愈大謬與余所聞絶異豈所謂盡信書則不如無書者類耶贊增宋宋祁附子贊附堇而生翠莖紫蕤生蜀者良三建則非七言絶句增宋林景熙越州陶山附子岡洞霞疑接台峰近石棧空歌蜀道難一種靈苖人不識半山霜露夜痕乾别録增本草綱目韓保升曰附子烏頭天雄側子烏喙采得以生熟湯浸半日勿令滅氣出以白灰裛之數易使乾又法以米粥及糟麯等淹之並不及前法蘇頌曰五物收時一處造釀其法先於六月內造大小麵麴未采前半月用大麥煮成粥以麴造醋候熟去糟其醋不用大酸酸則以水解之將附子去根鬚於新甕內淹七日日攪一遍撈出以疏篩攤之令生白衣乃向慢風日中曬之百十日以透乾為度若猛日則皺而皮不附肉陶宏景曰凡用附子烏頭天雄皆熱灰微炮令拆勿過焦惟薑附湯生用之俗方每用附子須甘草人參生薑相配者正制其毒故也雷斆曰凡使烏頭宜文武火中炮令皴拆擘破用若用附子須底平有九角如鐵色一箇重一兩者即是氣全勿用雜木火只以柳木灰火中炮令皴拆以刀刮去上孕子并去底火擘破於屋下平地上掘一土坑安之一宿取出焙乾用若隂制者生去皮尖底薄切以東流水并黑豆浸五日夜漉出日中􅴲用朱震亨曰凡烏附天雄須用童子小便浸透煮過以殺其毒并助下行之力入鹽少許尤好或以小便浸二七日揀去壞者以竹刀每箇切作四片井水淘淨逐日換水再浸七日曬乾用李時珍曰附子生用則發散熟用則峻補生用者須如隂制之法去皮臍入藥熟用者以水浸過炮令發拆去皮臍乘熟切片再炒令內外俱黃去火毒入藥又法每一箇用甘草二錢鹽水薑汁童便各半盞同煮熟出火毒一夜用之則毒去也烏頭增爾雅芨堇草注即烏頭也江東呼為堇本草綱目烏頭一名烏喙一名草烏頭按藥譜别名小昌明一名土附子一名奚毒一名耿子一名毒公一名金鴉苗名莨一名獨白草一名鴛鴦菊汁煎名射罔此即烏頭之野生于他處者俗謂之草烏頭亦曰竹節烏頭出江北者曰淮烏頭日華子所謂土附子者是也烏喙即偶生兩岐者今俗呼為兩頭尖因形而名其實乃一物也附子天雄之偶生兩岐者亦謂之烏喙非此烏頭也草烏頭取汁曬為毒藥射禽獸故有射罔之稱吳普曰正月始生葉厚莖方中空葉四四相當與蒿相似陶宏景曰今采用四月亦以八月采搗莖汁煎為射罔獵人以傅箭射禽獸十步即倒中人亦死宜速解之李時珍曰處處有之根苗實並與川烏頭相同但此係野生又無釀造之法其根外黑內白皺而枯燥為異爾然毒則甚焉氣味辛溫治中風除寒濕痺咳逆上氣破積聚寒熱消冷痰痃癖治頭風喉痺癰腫疔毒乃至毒之藥非風頑急疾不可輕投白附子增本草綱目白附子因與附子相似故名實非附子類也蘇恭曰本出高麗今出涼州以西生砂磧下濕地獨莖似鼠尾草細葉周匝生於穗間根形似天雄李珣曰徐表南州異物記云生東海新羅國及遼東苗與子相似李時珍曰根正如草烏頭之小者長寸許乾者皺紋有節氣味辛甘大溫有小毒治心痛血痺行藥勢中風失音一切冷風氣面皯瘢疵彚考增楚國先賢傳孔休傷頰有瘢王莽賜玉屑白附子香與之消瘢酉陽雜俎藥草異號章陽羽白附子也天南星增本草綱目天南星一名虎掌一名虎膏一名鬼蒟蒻蘇頌曰天南星即虎掌小者名由跋李時珍曰虎掌因葉形似之天南星因根圓白如老人星狀故名蘇頌曰虎掌河北州郡有之初生根如豆大漸長大似半夏而扁年久者根圓及寸大者如雞卵周匝生圓牙三四枚或五六枚三四月生苖髙尺餘獨莖上有葉如爪五六出分布尖而圓一窠生七八莖時出一莖作穗直上如鼠尾中生一葉如匙裹莖作房旁開一口上下尖中有花微青褐色結實如麻子大熟即白色自落布地一子生一窠九月苖殘取根又曰天南星處處平澤有之二月生苗似荷梗其莖高一尺以來葉如蒟蒻兩枝相抱五月花似蛇頭黃色七月結子作穗似石榴子紅色二月八月采根似芋而圓扁氣味苦溫有大毒治心痛寒熱結氣積聚伏梁傷筋痿拘緩利水道除隂下濕風眩疝瘕傷寒時疾中風麻痺除痰下氣利胸膈攻堅積消癰腫傅金瘡疥癬蛇蟲咬傷彚考增藥譜天南星别名半夏精文房寶飾以竹梢甘露和天南星漬紙一宿裁之刀去如飛附録虎掌草增圖經本草江州一種草葉大如掌面青背紫四畔有牙如虎掌生三四葉為一本冬青不結花實治心疼寒熱積氣蒟蒻增本草綱目蒟蒻一名蒻頭一名鬼芋出蜀中施州亦有之呼為鬼頭閩中人亦種之宜樹隂下掘坑積糞春時生苖至五月移之長一二尺與南星苖相似但多斑點宿根亦自生苖經二年者根大如碗及芋魁其外理白味亦麻人秋後采根須淨擦或搗或片假以釅灰汁煮十餘沸以水淘洗換水更煮五六遍即成凍子切片以苦酒五味淹食不以灰汁則不成也切作細絲沸湯汋過五味調食狀如水母絲馬志言其苗似半夏楊慎丹鉛録言蒟醬即此者皆誤也氣味辛寒有毒磨傅癰腫風毒製食主消渴附録菩薩草增圖經本草菩薩草生江浙州郡凌冬不凋秋冬有花直出赤子如蒻頭冬月采根用味苦無毒酒研服治諸毒搗傅諸蟲傷婦人妊娠咳嗽蜜丸服半夏原半夏一名水玉一名守田一名地文本草綱目云禮記月令五月半夏生蓋當夏之半也故名守田會意水玉象形也一名和姑在處有之齊州者為良二月生苗一莖莖端三葉淺緑色頗似竹葉三三相偶而生江南者似芍藥白花圓上生平澤者甚小名羊眼半夏圓白為勝五月採則虛小八月乃實大陳久更佳氣味辛平有毒生微寒令人吐熟溫令人下射干柴胡為之使忌羊血海藻飴糖惡皂角畏雄黃秦皮龜甲反烏頭消痰熱滿結咳嗽上氣心下急痛時氣嘔逆除腹脹目不得瞑集藻五言古詩增宋孔平仲常父寄半夏齊州多半夏採自鵲山陽纍纍圓且白千里遠寄將新婦初解包諸子喜若狂皆云已法製無滑可以嘗大兒強占據端坐斥四旁次女出其腋一攫已半亡小兒作蟹行乳媼代與攘分頭各咀嚼方愛有所忘須臾被辛螫棄餘不復藏競以手捫舌啼噪滿中堂父至笑且驚亟使啖以薑中宵方稍定久此燈燭光大鈞播萬物不擇窳與良虎掌出深谷鳶頭蔽高岡春草善殺魚野葛挽人腸各以類自蕃敢問孰主張水玉名雖佳神農録之方其外則皎潔其中慕堅剛奈何蘊毒性入口有所傷老兄好服食似此亦可防急難我輩事感惕成此章七言絶句增唐王建寄劉蕡問疾年少病多應為酒誰家將息過今春賒來半夏重薰盡投著山中舊主人别録原修治洗去皮垢以湯泡浸七日逐日換湯朗乾切片薑汁拌焙入藥或研為末以薑汁入湯浸澄三日瀝去涎水曬乾用謂之半夏粉或研末以薑汁和作餅子日乾用謂之半夏餅或研末以薑汁白礬湯和作餅楮葉包置籃中待生黃衣日乾用謂之半夏麯白飛霞醫通云痰分之病半夏為主造而為麯尤佳治濕痰以薑汁白礬湯和之治風痰以薑汁及皂莢煮汁和之治火痰以薑汁竹瀝或荆瀝和之治寒痰以薑汁礬湯入白芥子末和之此皆造麯妙法也辨訛江南半夏大乃徑寸葉似芍藥根下相重上大下小皮黃肉白南人特重之用之始知其異此乃由跋類半夏而苗不同誤以為半夏也白傍􅀢子絶似半夏但咀之微酸不堪入藥蚤休增本草綱目蚤休一名蚩休一名螫休一名紫河車一名重臺一名重樓金線一名三層草一名七葉一枝花一名草甘遂一名白甘遂蟲蛇之毒得此治之即休故有蚤休螫休諸名重臺三層因其葉狀也金線重樓因其花狀也甘遂因其根狀也紫河車因其功用也處處有之生于深山隂濕之地一莖獨上莖當葉心葉緑色似芍藥凡二三層每一層七葉莖頭夏月開花一花七瓣有金絲蕊長三四寸王屋山産者至五七層根如鬼臼蒼术狀外紫中白有黏糯二種外丹家采制三黃砂汞入藥洗切焙用俗諺云七葉一枝花深山是我家癰疽如遇者一似手拈拿是也氣味苦微寒有毒治驚癎搖頭弄舌熱氣在腹中癲疾癰瘡除蝕下三蟲去蛇毒治胎風手足搐能吐泄瘰癧去瘧疾寒熱集藻五言古詩增宋范成大紫荷車緑英吐弱線翠葉抱修莖矗如青旄節草中立亭亭根有却老藥鱗皺友松苓長生不暇學聊冀病身輕别録增服食經紫河車根以竹刀刮去皮切作骰子大塊麵裹入瓷瓶中水煮候浮漉出凝冷入新布袋中懸風處待乾每服三丸五更初面東念咒井水下連進三服即能休糧若要飲食先以黑豆煎湯飲之次以藥丸煮稀粥漸漸食之咒曰天朗氣清金雞鳴吾今服藥欲長生吾今不飢復不渴賴得神仙草有靈鬼臼增本草綱目鬼臼一名九臼一名天臼一名鬼藥一名解毒一名爵犀一名馬目毒公一名害母草一名羞天花詳見益部方物略記一名术律草一名璚田草詳見山谷詩注一名獨腳蓮一名獨荷草一名山荷葉一名旱荷一名八角盤一名唐婆鏡此物有毒而臼如馬眼故名馬目毒公殺蠱解毒故有犀名其葉如鏡如盤如荷而新苗生則舊苗死故有鏡盤荷蓮害母諸名蘇頌曰今江寧府滁舒商齊杭襄峽州荆門軍皆有之花生莖間赤色三月開花後結實一説鬼臼生深山隂地葉六出或五出如鴈掌莖端一葉如繖旦時東向及暮則西傾蓋隨日出沒也花紅紫如荔枝正在葉下常為葉所蔽未常見日一年生一莖既枯則生一臼及八九年則八九臼矣然一年一臼生而一臼腐蓋陳新相易也李時珍曰考鄭樵通志云鬼臼葉如小荷形如鳥掌年長一莖莖枯則根為一臼亦名八角盤以其葉似之也據此則是今人所謂獨腳蓮者也南方處處深山隂密處有之北方惟龍門山王屋山有之一莖獨上莖生葉心而中空一莖七葉圓如初生小荷葉面青背紫揉其葉作瓜李香開花在葉下亦有無花者其根全似蒼术紫河車丹爐家采根制三黃砂汞或云其葉八角者更靈或云其根如紫河車一樣但以白色者為河車赤色者為鬼臼恐亦不然而庚辛玉册謂蚤休陽草旱荷隂草亦有分别陶宏景以馬目毒公與鬼臼為二物殊不知正是一物而有二種也又唐獨孤滔丹房鏡源云术律車有二種根皆似南星赤莖直上莖端生葉一種葉凡七瓣一種葉作數層葉似萞麻面青背紫而有細毛葉下附莖開一花狀如鈴鐸倒垂青白色黃蕊中空結黃子風吹不動無風自搖可制砂汞按此即鬼臼之二種也其説形狀甚明氣味辛溫有毒殺蟲毒鬼疰精物辟惡氣不祥逐邪解百毒治風疾邪瘧癰疽下息胎彚考增益部方物略記羞寒花蜀地處處有之不為人所愛根莖綴花蔽葉自隱俗曰羞天花豫易為羞寒花山谷詩注子瞻詩所記胡道士玉芝一名瓊田草者俗號其葉為唐婆鏡葉底開花故號羞天花以豫考之其實本草之鬼臼也歲生一臼如黃精而堅瘦滿十二歲可為藥就土中生根取一臼勿令大本知也煮麵如餫飩皮裹一臼吞之數日不飢啖三臼可辟榖也黃龍山老僧多採而斷食令人體臞而神王今方家所用鬼臼乃鬼燈檠耳如蜀人用鬼箭但用一草根不知何物也鎮陽趙州間道傍叢生三羽者真鬼箭俗醫用藥如此而責古方不治病可勝歎哉因論玉芝故并記之集藻贊增宋宋祁羞寒花贊冒寒而茂莖修葉廣附莖作花葉蔽其上以其自蔽若有羞狀七言古詩增宋黃庭堅瓊芝軒卓仙在時養瓊芝深根固蒂活人命憧憧來問此何草但告渠是唐婆鏡射干增廣雅鳶尾射干也本草綱目射干一名烏扇一名烏翣一名烏吹一名烏蒲一名鳯翼一名鬼扇一名扁竹一名仙人掌一名紫金牛一名野萱花一名草薑一名黃遠蘇頌曰莖梗疏長正如射之長竿之狀故名李時珍曰其葉叢生橫鋪一面如烏翅及扇之狀故有烏扇諸名俗呼扁竹謂其葉扁生而根如竹也根葉又如蠻薑故曰草薑蘇恭曰鳶尾葉都似射干而花紫碧色不抽高莖根似高良薑而肉白名鳶頭陳藏器曰射干鳶尾二物相似人多不分射干即人間所種為花草名鳯翼者葉如烏翅秋生紅花赤點鳶尾亦人間所種苗低下於射干狀如鳶尾夏生紫碧花者是也蘇頌曰今在處有之人家種之春生苗高一二尺葉大類蠻薑而狹長橫張疏如翅羽狀故名烏翣葉中抽莖似萱草莖而強硬六月開花黃紅色瓣上有細文秋結實作房中子黑色李時珍曰射干即今扁竹也今人所種多是紫花者呼為紫蝴蝶其花三四月開六出大如萱花結房大如拇指頗似泡桐子一房四隔一隔十餘子子大如楜椒而色紫極硬咬之不破七月始枯陶𢎞景謂射干鳶尾是一種蘇恭陳藏器謂紫碧花者是鳶尾紅花者是射干韓保升謂黃花者是射干蘇頌謂花紅黃者是射干白花者亦其類朱震亨謂紫花者是射干紅花者非按土宿真君本草云射干即扁竹葉扁生如側手掌形莖亦如之青緑色一種紫花一種黃花一種碧花多生江南湖廣川浙平陸間八月取汁煮雄黃伏雌黃制丹砂能拒火據此則鳶尾射干本是一類但花色不同正如牡丹芍藥菊花之類其色各異皆是同屬也大抵入藥功不相遠氣味苦平有毒治咳逆上氣喉痺咽痛散結氣腹中邪逆食飲大熱消痰破癥結水蠱消結核利大腸治瘧母摩塗毒腫彚考增夏小正十一月廣莫風至則蘭射干生圖經本草射干多生山崖之間其莖雖細小亦類木故荀子云西方有木名曰射干莖長四寸生于高山之上易通卦驗冬至射干生集藻文賦散句增漢司馬相如上林賦藁本射干劉向九歎掘荃蕙與射干兮坐拏草增圖經本草坐拏草生江西及滁州六月開紫花結實采其苗入藥甚易得後因人用有效今頗貴重氣味辛熱有毒治風痺壯筋骨兼治打撲傷損押不蘆增癸辛雜識回回地方有草名押不蘆土人以少許磨酒飲即通身麻痺而死加以刀斧亦不知至三日則以少藥投之即活御藥院中亦儲之湛淵集詩注漠北有草名押不蘆食其汁立死以他藥解之即蘇華陀洗腸胃攻疾疑先服此滇載記押不蘆北方起死回生草也集藻五言絶句增元白珽續演雅草食押不蘆雖死元不死未見滌腸人先聞棄簀子芫花增本草綱目芫花一名杜芫一名赤芫一名去水一名毒魚一名痛頭花一名兒草一名敗華根名黃大戟一名蜀桑芫或作杬義未詳去水言其功毒魚言其性大戟言其似也俗人因其氣惡呼為頭痛花韓保升曰近道處處有之苗高二三尺葉似白前及柳葉根皮黃似桑根正月二月花發紫碧色葉未生時收采日乾葉生花落即不堪用也蘇頌曰在處有之宿根舊枝莖紫長一二尺根入土深三五寸白色似榆根春生苗葉小而尖似楊柳枝葉二月開紫花頗似紫荆而作穗又似藤花而細今絳州出者花黃謂之黃芫花氣味辛溫有小毒治咳逆上氣喉鳴喘咽腫短氣蟲毒鬼瘧疝瘕癰腫殺蟲魚去水利痰通利血脈治惡瘡風痺一切毒風四肢攣急别録增本草綱目芫花留數年陳久者良用時以好醋煮十數沸去醋以水浸一宿曬乾用則毒滅也或以醋炒者次之蕘花增本草綱目蕘花蕘者饒也其花繁饒也蘇恭曰苗似胡荽莖無刺花細黃色四月五月收韓保升曰所在有之以雍州者為好生岡原上苗高二尺許李時珍曰按蘇頌圖經言絳州所出芫花黃色謂之黃芫花其圖小株花成簇生恐即此蕘花也生時色黃乾則如白故陶氏言細白也氣味苦寒有毒治傷寒溫瘧下十二水破積聚大堅癥瘕蕩滌胸中留癖飲食寒熱邪氣利水道療痰飲咳逆上氣喉中腫滿疰氣蠱毒醉魚草增本草綱目醉魚草一名閙魚花一名魚尾草一名樚本南方處處有之多在塹岸邊作小株生高者三四尺根狀如枸杞莖似黃荆有微稜外有薄黃皮枝易繁衍葉似水楊對節而生經冬不凋七八月開花成穗紅紫色儼如芫花一樣結細子漁人采花及葉以毒魚盡圉圉而死呼為醉魚兒草池沼邊不可種之此花色狀氣味並如芫花毒魚亦同但花開不同時為異爾氣味辛苦溫有小毒治痰飲解魚毒化魚骨鯁莽草增本草綱目莽草一名菵草一名芒草一名鼠莽陶𢎞景曰莽本作菵字俗訛呼爾李時珍曰此物有毒食之令人迷罔故名山人以毒鼠謂之鼠莽陶𢎞景曰今東間處處皆有葉青辛烈者良又用搗以和陳粟米粉納水中魚吞即死浮出人取食之無妨蘇頌曰今南中州郡及蜀川皆有之木若石楠而葉稀無花實五月七月采葉隂乾一説藤生繞木石間既謂之草乃藤生者是也寇宗奭曰莽草諸家皆謂之草而本草居木部今世所用皆木葉如石楠葉枝硬乾則皺揉之其臭如椒氣味辛溫有毒治風頭癰腫乳癰疝瘕喉痺瘰癧除結氣疥瘙殺蟲魚彚考增周禮秋官翦氏掌除蠧物以攻禜攻之以莽草薰之范子計然莽草出三輔青色者善茵芋增本草綱目茵芋一名莞草一名卑共陶𢎞景曰好者出彭城今近道亦有莖葉狀似莽草而細軟連細莖采之方用甚稀惟合療風酒大明曰出自海鹽形似石楠樹生葉厚五六七月采蘇頌曰今雍州絳州華州杭州亦有之春生苖高三四尺莖赤葉似石榴而短厚又似石楠葉四月開細白花五月結實三月四月七月采莖葉日乾氣味苦溫有毒治五臟邪氣心腹寒熱羸瘦如瘧狀發作有時諸關節風濕痺痛苦堇增爾雅齧苦堇注今堇葵也葉似柳子如米汋食之滑疏本草唐本注云此菜野生非人所種俗謂之堇菜葉似蕺紫花本草云味甘而此云苦者古人語倒猶甘草謂之苦也本草綱目苦堇一名石龍芮一名地椹一名天豆一名石能一名魯果能一名水堇一名楜椒菜一名彭根陶𢎞景曰生于石上其葉芮芮短小故名石龍芮蘇恭曰實如桑椹故名地椹李時珍曰芮芮細貌其椹之子細芮故名地椹以下皆子名也水堇以下皆苗名也苗作蔬食味辛而滑故有椒葵之名蘇恭曰水堇苗似附子實如桑椹生下濕地五月熟葉子皆味辛山南者粒大如葵子關中河北者細如葶藶氣力劣於山南者蘇頌曰今惟出兖州一叢數莖莖青紫色每莖三葉其葉短小多刻缺子如葶藶而色黃李時珍曰水堇處處有之多生近水下濕地高者尺許其根如薺三月生苗叢生圓莖分枝一枝三葉葉青而光滑有三尖多細缺江淮人三四月采苗瀹過曬蒸黑色為蔬四五月開細黃花結小實大如豆狀如初生桑椹青緑色槎散則子甚細如葶藶子即石龍芮也宜半老時采之氣味苦平無毒治風寒濕痺心腹邪氣利關節止煩滿久服輕身明目不老莖葉氣味甘寒無毒搗汁洗馬毒塗蛇蝎毒及癰腫彚考增禮記內則堇荁枌榆免薧滫瀡以滑之晉書孝義傳劉殷祖母王氏冬月思堇殷時年九歲乃於澤中慟哭聲不絶者半日忽若有人云止止殷收淚視地有堇生焉因得斛餘以供食范子計然石龍芮出三輔色黃者善毛莨增本草綱目毛莨一名毛建草一名水莨一名毛堇一名天炙一名自炙一名猴蒜李時珍曰莨乃草烏頭之苗此草形狀及毒皆似之故名肘後方謂之水莨又名毛建亦莨字音訛也俗名毛堇似水堇而有毛也山人截瘧采葉挼貼寸口一夜作泡如火燎故呼為天炙自炙下濕處多有春生苗高者尺餘一枝三葉葉有三尖及細缺與石龍芮莖葉一樣但有細毛為别四五月開小黃花五出甚光艷結實狀加欲綻青桑椹如有尖峭與石龍芮子不同人以為鵝不食草者大誤也方士取汁煮砂伏硫沈存中筆談所謂石龍芮有兩種水生者葉光而末圓陸生者葉毛而末鋭此即葉毛者氣味辛溫有毒治惡瘡癰腫未潰者搗葉傅之不得入瘡令肉爛葛洪百一方云水莨生水旁有毒蟹多食之人誤食之狂亂如中風狀或吐血以甘草汁解之海薑增本草經注海薑生海中赤色狀如石龍芮有大毒隂命增本草經注隂命生海中赤色著木懸其子有大毒牛扁增本草綱目牛扁一名扁特一名扁毒蘇恭曰田野人名為牛扁療牛虱甚效太常名扁特或名扁毒蘇恭曰此藥似堇草石龍芮輩根如秦芃而細蘇頌曰今潞州一種便特六月有花八月結實采其根苖搗末油調殺蟣虱主療大都相似疑即扁特也但聲近而字訛耳氣味苦微寒無毒治身皮瘡熱氣可作浴湯殺牛虱小蟲又療牛病附録虱建草增本草拾遺虱建草生山足濕地發葉似山丹微赤高一二尺味苦無毒主蟣虱挼汁沐頭虱盡死人有誤吞虱成病者搗汁服一小合亦主諸蟲瘡又有水竹葉生水中葉如竹葉而短小可生食亦去蟣虱蕁麻增本草綱目蕁麻一名毛蕁川黔諸處甚多其莖有刺高二三尺葉似花蘂或青或紫背紫者入藥上有毛芒可畏觸人如蜂蠆螫蠚以人溺濯之即解有花無實冒冬不凋挼投水中能毒魚氣味辛苦寒有大毒吐利人不止治蛇毒搗塗之彚考增杜詩注除草去蕁草也東坡集杜甫有除蕁詩言草有害於人然治風疹擇最先者以此草點之一身皆失去葉背紫者入藥據此説蕁亦能療疾棄瑕録用可也集藻五言古詩增唐杜甫除草詩草有害於人曾何生阻修其毒甚蜂蠆其多彌道周清晨步前林江色未散憂芒刺在我眼焉能待高秋霜露一霑凝蕙葉亦難留荷鋤先童稚日入仍討求轉致水中央豈無雙釣舟頑根易滋蔓敢使依舊丘自兹藩籬曠更覺松竹幽芟夷不可闕疾惡信如讐格注草增唐本草格注草出齊魯山澤間葉似蕨根紫色若紫草根一株有二十許二月八月采根五月六月采苗日乾用氣味辛苦溫有大毒治蠱疰諸毒疼痛海芋增益部方物略記海芋生不高四五尺葉似芋而有根幹根皮不可食方家號隔河仙云可變金或云能止瘧本草綱目海芋一名觀音蓮一名羞天草一名天荷生蜀中今亦處處有之春生苗高四五尺夏秋間抽莖開花如一瓣蓮花碧色花中有蕊長作穗如觀音像在圓光之狀故俗呼為觀音蓮其根似芋魁大者如升碗長六七寸蓋野芋之類也庚辛玉册云羞天草隂草也生江廣深谷澗邊其葉極大可以禦雨葉背紫色花如蓮花根葉皆有大毒可煆粉霜硃砂小者名野芋氣味辛有大毒治瘧瘴毒腫風癩集藻贊增宋宋祁海芋贊木幹芋葉擁踵盤戾農經弗載不用治厲鉤吻增博物志鉤吻草與荇華相似南方草木狀野葛蔓生葉如羅勒光而厚一名胡蔓草人以雜生蔬中毒人半日輒死酉陽雜俎胡蔓草生雍容間叢生花扁如支子稍大不成朵色黃白葉稍黑誤食之數日卒飲白鵝鴨血則解或以一物投之祝曰我買你食之則立死本草綱目鉤吻一名野葛一名毒根一名胡蔓草一名斷腸草一名黃藤一名火把花陶𢎞景曰言其入口則鉤人喉吻也或言吻當作挽字牽挽人腸而絶之也李時珍曰此草雖名野葛非葛根之野者也或作冶葛王充論衡云冶地名也在東南廣人謂之胡蔓草亦曰斷腸草入人畜腹內即黏腸上半日則黑爛又名爛腸草滇人謂之火把花因其花紅而性熱如火也嶽州謂之黃藤生傅高山谷及會稽東野折之青煙出者名固活吳普云秦鉤吻一名除辛蘇恭曰野葛生桂州以南村墟閭巷間皆有彼人通名鉤吻亦謂苖為鉤吻根名野葛蔓生其葉如柿其根新采者皮白骨黃宿根似地骨嫩根如漢防己皮節斷者良正與白藤相類新者折之無塵氣經年以後則有塵起從骨之細孔出人食其葉立死李時珍曰南人云鉤吻即胡蔓草今人謂之斷腸草是也蔓生葉圓而光春夏嫩苖毒甚秋冬枯老稍緩五六月開花似櫸柳花數十朵作蕙生嶺南者花黃生滇南者花紅氣味辛溫有大毒陳藏器曰蕹菜搗汁解野葛毒取汁滴野葛即萎死南人先食蕹菜後食野葛二物相伏自然無苦李時珍曰葛洪肘後方云凡中野葛毒口不可開者取大竹筒洞節以頭拄其兩脅及臍中灌冷水入筒中數易水須臾口開乃可下藥解之惟多飲甘草汁人屎汁白鴨或白鵝斷頭瀝血入口中或羊血灌之嶺南衛生方云即時取雞卵抱未成雛者研爛和麻油灌之吐出毒物乃生稍遲即死也彚考增三國志注魏太祖習噉野葛至一尺博物志太隂之草名曰鉤吻不可食入口即死神農經曰藥物有大毒不可入口鼻耳目者即殺人一曰鉤吻盧氏曰隂地黃精不相連根苗獨生者是也集藻五言古詩增唐白居易有木詩有木香苒苒山頭生一蕟主人不知名移種近軒闥愛其有芳味因以調麴糵前後曾飲者十人無一活豈徒悔封植兼亦誤采掇試問識藥人始知名野葛年深已滋蔓刀斧不可伐何時猛風來為我連根拔透山根增本草綱目按岣嶁神書云透山根生蜀中山谷草類蘼蕪可以點鐵成金昔有人采藥誤斫此草刀忽黃軟成金也又庚辛玉册云透山根出武都取汁點鐵立成黃金有大毒人誤食之化為紫水又有金英草亦生蜀中狀如馬齒莧而色紅摸鐵成金亦有大毒入口殺人須臾為紫水也又何遠春渚紀聞云劉均父吏部罷官歸成都有水銀一篋過峽篋漏急取渡旁叢草塞之久而開視盡成黃金矣宋初有軍士在澤州澤中割馬草歸鐮皆成金以草燃釡亦成黃金又臨安僧法堅言有客過於濳山中見一蛇腹脹嚙一草以腹磨之而消念此草必能消脹取置篋中夜宿旅館聞鄰房有人病腹脹呻吟以釡煎藥一杯與服頃之不復聞聲念已安矣至旦視之其人血肉俱化為水獨骸骨在牀爾視其釡則通體成金矣觀何氏所載即是透山根乃金英草之類如此毒草不可不知故備載之耳御定佩文齋廣羣芳譜卷九十七
