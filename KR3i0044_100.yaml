body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九十八藥譜兔絲女蘿别見木譜原兔絲一名兔縷一名兔虆一名兔蘆一名兔丘廣雅云兔丘兔絲也一名女蘿埤雅云在木為女蘿在草為兔絲一名赤網一名玉女爾雅云蒙玉女注云即唐也一名唐蒙爾雅云唐蒙女蘿女蘿兔絲一名火焰草庚辛玉册云火焰云即兔絲子一名野狐絲一名金線草蔓生處處有之以寃句者為勝生懷孟林中及黑豆上者入藥更良夏生苗色紅黃如金細絲遍地不能自起得草梗則纒繞而生其子入地初生有根及長延草物其根自斷無葉有花白色微紅香亦襲人結實如粃豆而細色黃生於梗上味辛甘平無毒主續絶傷補不足益氣力肥健人堅筋骨添精益髓飬肌去腰痛膝冷久服明目輕身延年去面皯悅顔色彚考原詩小雅蔦與女蘿施于松柏增史記龜策傳下有茯苓上有兔絲吕氏春秋或謂兔絲無根也其根不屬地茯苓是也淮南子兔絲無根而生茯苓抽兔絲死博物志女蘿寄生兔絲兔絲寄生木上生根不著地抱朴子兔絲之草下有伏兔之根無此兔在下則絲不得生於上然實不屬也兔絲初生之根其形似兔掘取剖其血以和丹服之立變化任意所作酉陽雜俎兔絲子多近棘及藋山居者疑二草之氣類也集藻五言古詩原宋謝朓詠兔絲輕絲既難理細縷竟無織爛漫已萬條連綿復一色安根不可知縈心終不測所貴能卷舒伊用蓬生直唐李白古意君為女蘿草妾作兔絲花輕條不自引為逐春風斜百丈託遠松纒綿成一家誰言會面易各在青山崖女蘿發馨香兔絲斷人腸枝枝相糾結葉葉竟飄揚生子不知根因誰共芬芳中巢雙翡翠上宿紫鴛鴦若識二草心海潮亦可量元稹兔絲人生莫依倚依倚事不成君看兔絲蔓依倚榛與荆荆榛易蒙密百鳥撩亂鳴下有狐兔穴奔走亦縱橫樵童斫將去柔蔓與之并翳薈生可恥束縳死無名桂樹月中出珊瑚石上生俊鶻渡海食應龍升天行靈物本特達不復相纒縈纏縈竟何者荆棘與飛莖增明薛蕙兔絲根株不自立枝蔓為誰飾偶同雜俎文未比朱絃直園客何由整天女詎堪織暫附松柏枝終辭霜露色詩散句原古詩十九首兔絲附女蘿梁江淹兔絲及水萍所寄終不移增金雷琯綿綿兔絲草唐喬知之南山羃羃兔絲花陸龜蒙教疏兔縷金絃亂别録原修治凡用以溫水淘去沙泥酒浸一宿曝乾搗之不盡者再浸曝搗須臾悉細又法酒浸四五日蒸曝四五次研作餅焙乾再研末或云曝乾時入紙條數枚同搗即刻成粉且省力也辨訛勿使天碧草子真相似但味酸澀并黏也服食抱朴子仙方單服法兔絲子一斗酒一斗浸曝乾再浸又曝酒盡乃止搗篩為末每酒服二錢日二服治腰膝去風明目久服令人光澤老變為少十日外飲啖如湯沃雪五味子增爾雅菋荎藸注五味也疏按本草五味子一名會及一名玄及唐本注云五味皮肉甘酸核中辛苦都有鹹味此則五味具也圖經本草五味春初生苖引赤蔓於髙木其長六七尺葉尖圓似杏葉三四月開黃白花類蓮花狀七月成實叢生莖端如豌豆許大生青熟紅紫入藥生曝不去子今有數種大抵相近雷斆言小顆皮皺泡者有白撲鹽霜一重其味酸鹹苦辛甘皆全者為真也本草綱目南産者色紅北産者色黑氣味酸溫無毒益氣治咳逆上氣勞傷羸瘦補不足飬五臟除熱生肌治中下氣止嘔逆補虛勞令人體悅澤明目暖水臟壯筋骨治風消食治反胃霍亂轉筋痃癖奔豚冷氣消水腫心腹氣脹止渴除煩熱解酒毒生津止渴治㵼痢補元氣不足收耗散之氣彚考增抱朴子五味者五行之精其子有五味淮南公羡門子服之十六年面色如玉女入水不霑入火不灼覆盆子原覆盆子李氏藥録云子似覆盆之形故名一名缺盆一名茥爾雅云茥缺葐注云覆盆也一名插田藨一名烏藨子一名大麥莓一名栽秧藨本草綱目云五月子熟其色烏赤故有諸名一名西國草一名畢楞伽見海上集驗方一名馬瘻一名陸荆見藥性本草處處有之秦吳尤多藤蔓莖有鈎刺一枝五葉葉小面青背微白光薄無毛開白花四五月實成子小於蓬虆而稀疏味酸甘外如荔支大如指頂軟紅可愛生青黃熟烏赤山中人及時采賣少遲則就枝生蛆食之五六分熟便采烈日曝乾不爾易爛氣味甘平無毒益氣輕身補虛續絶益腎明目悅澤肌膚安和五臟彚考原夷堅志潭州趙太尉母病爛弦疳眼二十年有老嫗云此中有蟲吾當除之入山取草蔓葉咀嚼留汁入筒中還以皂紗蒙眼滴汁漬下弦轉盻間蟲從紗上出數日下弦乾復如法滴上弦又得蟲數日而愈後以治人多驗乃覆盆子葉也蓋治眼妙品集藻五言古詩增宋王右丞覆盆子靈根茂永夏幽磴羅深叢晶華發鮮澤葉實分青紅搜尋犯晨露採摘勤村童籍以煙筍籜貯之霜筠籠别録原修治采得揀淨搗作薄餅曬乾密貯臨時酒拌蒸用采時不見水取汁作煎為果著水則不堪煎蓬藟增本草綱目一名覆盆一名陵藟一名隂藟一名寒莓李時珍曰蓬藟與覆盆同類故别録謂一名覆盆此種生於丘陵之間藤葉繁衍蓬蓬藟藟異於覆盆故曰蓬藟陵藟即藤也原藤蔓繁衍莖有倒刺逐節生葉大如掌狀類小葵葉面青背白厚而有毛六七月開小白花就蒂結實三四十顆成簇生則青黃熟則紫黯微有黑毛形如熟椹而扁冬月苗葉不凋者俗名割田藨氣味酸平無毒安五臟益精氣令人有子益顔色長髮久服輕身不老一種蔓小於蓬藟一枝三葉葉面青背淡白而微有毛開小白花四月實熟其色紅如櫻桃者俗名薅田藨即爾雅所謂藨者也故郭璞注云藨即莓也子似覆盆而大赤色酢甜可食此種不入藥懸鈎子增爾雅葥山莓注今之木莓也實似藨莓而大亦可食本草綱目懸鈎子一名沿鈎子一名山莓一名樹莓陳藏器曰莖上有刺如懸鈎故名懸鈎樹生高四五尺其莖白色有倒刺其葉有細齒青色無毛背後淡青頗似櫻桃葉而狹長又似地棠花葉四月開小白花結實色紅今人亦通呼為藨子氣味酸平無毒醒酒止渴除痰去酒毒搗汁服解射工沙虱毒蛇莓增本草綱目蛇莓一名蛇藨一名地莓一名蠶莓汪機曰近地而生故曰地莓吳瑞曰蠶老時熟紅於地其中空者為蠶莓中實極紅者為蛇殘莓人不噉之恐有蛇殘也就地引細蔓節節生根每枝三葉葉有齒刻四五月開小黃花五出結實鮮紅狀似覆盆氣味甘酸大寒有毒治胸腹火熱不止傷寒大熱及溪毒射工毒甚良通經協瘡腫傅蛇傷湯火傷使君子原使君子一名留求子開寶本草云俗傳潘州郭使君療小兒多是獨用此物故號為使君子本草綱目云按南方草木狀謂之留求子療嬰孺之疾則自魏晉已用但名異耳其莖作藤生如手指大如葛繞樹而上葉青如五加葉五月開五瓣花一簇一二十葩初淡紅久乃深紅色輕盈如海棠作架植之蔓延若錦實長寸許五瓣合成有稜初時半黃熟則紫黑其中仁白上有薄黑皮如棐子仁而嫩味如栗七月采久者油黑不可用氣味甘溫無毒治小兒五疳健脾胃除虛熱殺蟲療㵼痢小兒百病瘡癬皆治凡服使君子忌飲熱茶犯之即㵼集藻七言絶句原宋無名氏使君子花竹籬茅舍趁溪斜白白紅紅牆外花浪得佳名使君子初無君子到君家木鱉子增本草綱目木鱉子一名木蟹馬志曰其核似鱉蟹狀故以為名蘇頌曰春生苗作藤生葉有五丫狀如山藥青色面光四月生黃花六月結實似栝樓而極大生青熟紅黃色肉上有軟刺每一實有核三四十枚其狀扁而如鱉八九月采之嶺南人取嫩實及苗葉作茹蒸食李時珍曰木鱉核形扁礧砢大如圍碁子其仁青緑色氣味甘溫無毒治折傷消結腫惡瘡生肌止腰痛除粉刺皯􅍍婦人乳癰治疳積痞塊利大腸㵼痢痔瘤瘰癧番木鱉增本草綱目番木鱉一名馬錢子一名苦實把豆一名火失刻把都狀似馬之連錢故云馬錢蔓生夏開黃花七八月結實如栝樓生青熟赤亦如木鱉其核小於木鱉而色白彼人言治一百二十種病或云以豆腐制過用之良或云能毒狗至死氣味苦寒無毒治傷寒熱病咽喉痺痛消痞塊並含之咽汁或磨水噙咽馬兜鈴增本草綱目馬兜鈴一名都淋藤一名獨行根一名土青木香一名三百兩銀藥根名雲南根寇宗奭曰蔓生附木而上葉脫時其實尚垂狀如馬頂之鈴故得名也李時珍曰其根吐利人微有香氣故有獨行木香之名嶺南人用治蠱隱其名為三百兩銀藥蘇頌曰春生苖作蔓繞樹而生葉如山蕷葉而厚大背白六月開黃紫花頗類枸杞花七月結實如大棗狀似鈴作四五瓣根微似木香大如小指赤黃色氣味苦寒無毒治肺熱咳嗽痰結喘促血痔瘻瘡肺氣上急解蛇蠱毒根氣味辛苦冷有毒治鬼疰積聚諸毒熱腫取汁服吐蠱毒治五種蟲毒預知子增本草綱目預知子一名聖知子一名聖先子一名盍合子一名仙沼子馬志曰相傳取子二枚綴衣領上遇有蠱毒則聞其有聲當預知之故有諸名蘇頌曰作蔓生依大木上葉緑有三角面深背淺七月八月有實作房生青熟深紅色每房有子五七枚如皂莢子斑褐色光潤如飛蛾其根治蠱功勝於子山民目為聖無憂子仁氣味苦寒無毒治殺蟲療蠱治諸毒痃癖氣塊消宿食止煩悶利小便催生中惡失音髮落天行溫疾塗一切蛇蟲蠶咬治一切病牽牛原牽牛本草注云此藥始出田野人牽牛謝藥故以名焉一名盆甑草酉陽雜俎云盆甑草即牽牛子也結實後斷之狀如盆甑其中有子似龜一名黑丑白丑一名草金鈴一名狗耳草本草綱目云近人隱其名為黑丑白者為白丑蓋以丑屬牛也金鈴象子形狗耳象葉形處處有之有黑白二種黑者野生尤多二月種子三月生苗作藤蔓繞籬墻高者或二三丈蔓有白毛斷之有白汁其葉青有三尖如楓葉花不作瓣如旋花而大碧色其實有蒂裹之生青枯白核與棠梂子核相似但深黑耳白者蔓微紅無毛有柔刺斷之有濃汁葉團有斜尖並如山藥莖葉花淺碧蒂紅色核白色稍粗其嫩實蜜煎為果名天茄氣味苦寒有毒治水氣在肺喘滿腫脹下焦鬱遏腰背脹腫大腸氣祕風祕卓有竒功但病在血分及脾胃虛弱而痞滿者則不可取快一時及常服致傷元氣集藻五言古詩增宋梅堯臣牽牛楚女霧露中籬上摘牽牛花蔓相連延星宿光未收采之一何早日出顔色收持置梅窗間染薑奉盤羞爛如珊瑚枝惱翁齒牙柔齒牙不能餐梁肉坐為仇牆東有冬瓜費盡滋溉力牽牛獨得志抽走無尋尺既上我屋壁復罥我籬落遊藤僅細緌逐節分豆葉未欲揮鋤斤且與妝秋色任他繞屋去度表幽人宅蘇軾賦園中所有牽牛非佳花走蔓入荒榛開花荒榛上不見細蔓身誰翦薄素紗浸之青藍盆水淺浸不盡下餘一寸銀嗟爾脆弱草豈能凌霜晨物性有稟受安問秋與春元郝經甲子歲後園牽牛野花照天星星中花亦盛長夏蔓草深疏籬掩斜徑幽庭日無事森寂淡相映繚繞絲亂垂點綴葉相並金風一披拂零露光彩競參差碧玉簪綰插滑欲迸霜絲吐冰同容色好娟淨堂隂青錦張牆背紫苔瑩時方鵲橋成佳節當秋孟織女能翦裁天河洗尤稱女以秋為期郎將花作證風雨開雲屏鸞皇鏘月鏡處處乞巧筵家家喜相慶五年江館客萬事成墮甑不能致龍節空自悲虎穽永日鏖炎蒸中暑甘卧病對花淚盈目坐起不覺瞑雲漢見雙星回頭看斗柄遙憐小兒女婚嫁俱未竟中流虞風波相見何日更明吳寬牽牛本草載藥品草部見牽牛薰風籬落間蔓生甚綢繆誰琢紫玉簪葉密花仍稠日高即揫斂豈是朝菌儔隂氣得獨盛下劑斯見收便須作花庵誰與迂叟謀五言律詩增宋邵雍花庵多牽牛清晨始開日出已瘁花雖甚美而不能留賞望逺雲凝岫妝餘黛散鈿縹囊承曉露翠蓋拂秋煙嚮慕非葵比雕零在槿先才供少頃玩空廢日高眠葉閙深如幄花繁翠似鈿瀼瀼零曉露羃羃蔽晴煙謝既成番次開仍有後先主人凝佇看長是廢朝眠趙蔗境牽牛西風樵子谷藤蔓絡柴關名在星河上花開曉露間秋空同碧色曉日轉紅顔若挂青松頂翛然不可攀五言絶句增宋文同牽牛花柔條長百尺秀萼包千葉不惜作高架為君相引接七言絶句增宋楊萬里牽牛花素羅笠頂碧羅簷曉卸藍裳著茜衫望見竹籬心獨喜翩然飛上翠雲篸莫笑渠儂不服箱天孫為織錦雲裳浪言偷得星橋巧只解冰盤染紫薑曉思歡欣晚思愁繞籬縈架大嬌柔木犀未發芙蓉老買斷西風恣意秋薑夔詠牽牛青花緑葉上疏籬别有長條竹尾垂老覺殘妝差有味滿身秋露立多時不見青青繞竹生西風籬落抱枯藤道人一任空花過愁殺山隂覔句僧楊巽齋牽牛青青柔蔓繞修篁刷翠成花著處芳應是折從河鼓手天孫斜插鬢雲香施東洲牽牛一泓天水染朱衣生怕紅埃透日飛急整離離蒼玉珮曉雲光裏渡河歸林逋山牽牛圎似流泉碧剪紗墻頭藤蔓自交加天孫滴下相思淚長向秋深結此花詩散句增宋蘇軾牽牛獨何畏詰曲自牙蘖走尋荆與榛如有宿昔約秦觀籬落秋暑中碧花蔓牽牛趙山臺秋來難得花成染間引牽牛上短籬盧贊元紅芭蕉映黑牽牛金髙士談風動牽牛晚花碧别録原修治凡采得子曬乾水淘去浮者再曬拌酒蒸從巳至未曬乾收之臨用舂去黑皮今多只碾取頭末去皮麩不用亦有半生半熟用者栝樓原栝樓一名果裸一名瓜蔞一名天瓜一名黃瓜一名地樓一名澤姑爾雅云果裸之實栝樓注云今齊人呼之為天瓜本草綱目云裸與蓏同許慎云木上曰果地下曰蓏此物蔓生附木故得兼名栝樓即果裸二字音轉也亦作􅌝􅌣後人又轉為瓜蔞古者瓜姑同音故有澤姑之名所在有之三四月生苖引藤蔓葉如甜瓜葉而窄作義有細毛七月開花似壺蘆花淺黃色結實在花下如拳生青至九月熟黃赤色形有圎者圎者色黃皮厚蒂小為雌陽人服有鋭而長者長者皮赤蒂粗為雄隂人服內有扁子大如絲瓜子殼色褐子色緑多脂作青氣根一名白藥一名瑞雪一名天花粉直下生年久者長數尺大二三圍秋後掘者有粉夏月者有筋無粉不堪用氣味甘寒無毒治胸痺潤肺燥治咳嗽滌痰結利咽喉止消渴利大腸消癰腫瘡毒降上焦之火使痰氣下降不犯胃氣子性同補虛勞潤心肺治吐血腸風下血赤白痢手面皺口乾根甘酸微苦寒製為粉潔白美好大宜虛熱人解煩渴行津液除腸胃中痼熱治熱狂時疾通小腸消腫毒乳癰發背痔瘻瘡癤排膿生肌消撲損瘀血莖葉味酸生津止渴潤枯降火彚考增雞肋編燕地女子冬月用苦蔞塗面謂之佛妝但皆傅而不洗至春暖方滌去久不為風日所侵故潔白如玉也别録原修治凡使皮子莖根其效各别古方全用後乃分别各用用實者去殼皮革膜及油用根者澄粉作天花粉法秋冬采根大二三圍者去皮寸切水浸逐日換水五日後取出搗泥以絹衣濾過澄粉曬乾每服方寸匕水化下亦可入粥及乳酪中食善治消渴王瓜原王瓜一名土瓜一名野甜瓜一名馬匏瓜一名赤雹子一名老鴉瓜一名師姑草俚人名公公鬚一名鉤􅕕爾雅云鉤藈姑注云鉤􅕕也一名王瓜本草注云王瓜即今土瓜鄭玄注月令王瓜生以為菝葜殊謬圖經本草云月令王瓜生即此均房間人呼為老鴉瓜亦曰菟瓜按爾雅曰蔩菟瓜郭璞注云似土瓜又曰芴菲亦謂之土瓜皆别是一物非此土瓜也本草綱目云土瓜其根作土氣其實似瓜也或云根味如瓜故名瓜似雹子熟則色赤鴉喜食之故俗名赤雹子老鴉瓜一葉之下一鬚故俚人呼為公公鬚王瓜不知何義按兼明書以栝樓為王瓜謂其大于土瓜故以王字别之誤也四月生苗其蔓多鬚嫩時可茹葉圓如馬蹄而有尖面青背淡澀而不光五六月開小黃花成簇花下結子纍纍如彈丸其殼徑寸長二寸許上微圓下尖長生青七八月熟赤紅色皮粗澀根如栝樓根之小者用須深掘二三尺乃得正根江西人栽以沃土取根作蔬食如山藥南北二種微有不同若療黃疸破血南者大勝根苦平無毒治天行熱疾酒黃心胸煩熱消瘀血破癥瘕治面黑面瘡落胎子酸苦平無毒生用潤心肺治黃病炒用治肺痿吐血腸風㵼血赤白痢反胃吐食蠱毒黃環增本草綱目黃環一名凌泉一名大就一名就葛一名生芻一名根韭實名狼跋子一名度榖此物葉黃而圓故名黃環亦是葛類故巴西人謂之就葛跋乃狼足名其莢似之故曰狼跋子吳普曰二月生苗正赤高二尺葉黃圓端大葉有汁黃白五月實圓三月采根黃色從理如車輻解根氣味苦平有毒治蠱毒鬼疰鬼魅邪氣除咳逆寒熱上氣急百邪痰嗽消水腫子氣味苦寒有小毒治惡瘡蝸疥殺蟲魚塗瘡疥天門冬原天門冬一名虋冬一名滿冬爾雅云蘠蘼虋冬注云門冬一名滿冬一名天棘一名顛棘一名地門冬一名筵門冬一名萬嵗藤抱朴子云在東嶽名淫羊藿在西嶽名菅松在南嶽名百部在北嶽名無不愈在中嶽名天門冬在京陸山阜名顛勒在越人名浣草名雖異其實一也本草綱目云草之茂者名虋此草茂而功同麥冬故名天門冬或云天棘爾雅云髦顛棘也因其葉細如髦有細棘也顛天音相近也按救荒本草云俗呼萬嵗藤又名婆羅樹其形與治肺之功頗同百部故亦名百部蘠蘼乃營實苗而爾雅指為門冬或古書錯簡也處處有之春生藤蔓大如叉股高至丈餘葉如茴香極尖細而疏滑莖間有逆刺亦有澀而無刺者其葉如絲杉而細散夏生細白花亦有黃色紫色者秋結黑子在其根枝旁入伏後無花暗結子其根一科數十枚大如手指圓實而長黃紫色肉白以大者為佳中有心如麥冬心而稍粗性苦平無毒潤燥滋隂清金降火保肺氣通腎氣飬肌膚止消渴治濕疥除身上一切惡氣不潔之疾久服令人肌體滑澤潔白李時珍云天門冬清金降火益水之上源故能下通腎氣入滋補方合羣藥用之有效若脾胃虛寒人單餌既久必病腸滑反成痼疾此物性寒而潤能利大腸故也服天門冬忌鯉魚誤食中毒者搗萍汁服之可解彚考增宋史地理志順慶府貢天門冬普州貢天門冬山海經條谷之山其草多虋冬鮮山其草多虋冬列仙傳赤松子服天門冬齒落更生細髮復出神仙傳甘始者太原人也善行氣不飲食又服天門冬在世百餘歲入王屋山仙去抱朴子入山便可以天門冬蒸煮啖之取足以斷榖若有力可餌之或作散酒服或搗汁作液膏服至百日丁壯兼倍駛於术及黃精也二百日強筋髓駐顔色與煉成松脂同蜜丸服尤善杜紫微服之御八十妾有子百四十人日行三百里名山記鬱山出天門冬建康記建康出天門冬極精妙彥周詩話天棘蔓青絲洪覺範硬差天棘作顛柳高秀實云天棘天門冬也當以秀實之言為正顛天聲相近又酷似青絲又江南徐鉉家本云天棘蔓青絲若蔓生如青絲尤見是天門冬丹鉛録山海經小徑之山有草名􅞒赤莖白華如顛冬也顛冬天門冬也集藻啓增梁簡文帝謝勑賚益州天門冬啓逮自星橋見珍玉壘本草稱其輕身延夀實為上藥姬晉之重丹桂曹丕之愛落英一蒙恩錫竊幸往代五言絶句增宋朱子天門冬高蘿引蔓長插楥垂碧絲西窗夜來雨無人領幽姿别録原種植正二月取苗種肥地中每根相去二尺餘不得稠不久其根甚茂若取根則留一分小者却栽時常上糞有草即耘此物甚難種若都摘了恐不活種子即成亦晚修治二三七八月採根雖曝乾猶脂潤難搗必須去皮心用柳木甑及柳木柴蒸一伏時灑酒令遍更添火蒸作小架去地二三尺攤於上曝乾用服食聖化經云以天門冬茯苓等分為末日服方寸匕則不畏寒大寒時單衣汗出也孫真人枕中記云八九月採天門冬根曝乾為末每服方寸匕日三服久服補中益氣治虛勞絶傷年老衰損偏枯不隨風濕不仁冷痺惡瘡癰疽癩疾鼻柱敗爛者服之皮脫蟲出釀酒服去癥病積聚風痰顛狂三蟲伏尸除濕痺輕身益氣令人不飢百日還童耐老釀酒初熟微酸久停則香美諸酒不及也臞仙神隱云用乾天門冬十斤杏仁一斤搗末蜜漬每服寸匕名仙人糧一法天門冬二斤熟地黃一斤為末煉蜜丸彈子大每服溫酒化三丸日三服居山遠行辟榖良服至十日身輕目明二十日百病愈顔色如花三十日髮白更黑齒落重生五十日行及奔馬百日延年又法天門冬搗汁微火煎取五斗入白蜜一斗胡麻炒末二升合煎至可丸即止火下大豆黃末和作餅徑三寸厚半寸一服一餅一日三服百日以上有益又法天門冬末一升松脂末一升蠟蜜一升和煎丸如梧子大每日早午晚各服三十丸天門冬酒補五臟調六腑令人無病天門冬三十斤去心搗碎以水二石煮汁一石糯米一斗細麯十斤如常炊釀酒熟日飲三杯天門冬膏去積聚風痰補肺療咳嗽失血潤五臟殺三蟲伏尸除瘟疫輕身益氣令人不飢以天門冬流水泡過去皮心搗爛取汁砂鍋文武炭火煮勿令太沸以十斤為率熬至三斤却入蜜四兩熬至滴水不散瓶盛埋土中一七去火毒每日早晚白湯調服一匙若勤大便以酒服之百部原百部本草綱目云其根多者百十連屬如部伍故名一名野天門冬一名婆婦草山野處處有之春生苖作藤蔓葉大而尖長頗似竹葉面青而光亦有細葉如茴香者莖青微嫩時亦可煮食莖多者五六十長尖內虛根數十相連似天門冬而苦根長者近尺黃白色鮮時亦肥實乾則虛瘦無脂潤性甘微溫無毒清肺熱潤肺治寒嗽上氣傳尸骨蒸勞疳殺蛔蟲寸白蟯蟲種法與百合同宜山地别録原修治凡採得以竹刀劈去心皮花作數十條懸簷下風乾却用酒浸一宿漉出焙乾銼用或一窠八十三條者號曰地仙苖若修治餌之可千歲也九真一種最長大懸火上令乾取四五寸切短夜含咽汁勿令人知治暴嗽甚良何首烏原何首烏一名交藤一名交莖一名夜合一名地精一名赤葛一名瘡帚一名紅內消一名九真藤一名桃柳藤一名馬肝石一名陳知白一名野苖圖經本草云此藥本名交藤因何首烏服而得名也唐元和七年僧文象遇茅山老人遂傳此事日華本草云其藥本草無名因何首烏見藤夜交便即採食有功因以採人為名耳李時珍曰馬肝石能治人髮后人隱此名亦曰馬肝石赤者能消腫毒外科呼為瘡帚紅內消斗門方云取根若獲九數者服之乃仙故名九真藤處處有之以西洛嵩山及柏城縣者為勝有形如鳥獸山川者尤佳春生苖蔓延竹木墻壁間莖紫色葉葉相對如薯蕷而不光澤夏秋開黃白花如葛勒花結子有稜似蕎麥而雜小才如粟秋冬取根大者如拳連珠有赤白二種赤者雄黃色黃白白者雌黃色黃赤根遠不過三尺夜則苖蔓相交或隱化不見性苦澀微溫無毒白者入氣分赤者入血分腎主閉藏肝主疏泄此物氣溫味苦澀苦補腎溫補肝能收斂精氣所以能飬血益肝固精益腎健筋骨烏髭鬚治五痔腰膝之病冷氣心痛積年勞瘦痰癖風虛敗劣壯氣駐顔延年益夀功難盡述茯苓為使忌諸血無鱗魚鐵器犯之令藥無功此藥不寒不燥功在地黃天冬諸藥之上凡服藥用偶日二四六八日服訖以衣覆汗出導引尤良彚考增彥周詩話古詩云上山採交藤交藤何首烏也服之令人多欲生子有采采芣苡之意原李遠附録何首烏以出南河縣及嶺南恩州韶州潮州賀州廣州潘州四會縣者為上雍州桂州康州春州高州勒州循州晉興縣出者次之真仙草也五十年者如拳大號山奴服之一年髮髭青黑一百年者如碗大號山哥服之一年顔色紅悅一百五十年者如盆大號山伯服之一年齒落更生二百年者如斗栲栳大號山翁服之一年顔如童子行及奔馬三百年者如二斗栲栳大號山精純陽之體久服成地仙本草綱目宋懷州知州李治與一武臣同官怪其年七十餘而輕健面如渥丹能飲食叩其術則服何首烏丸也乃傳其方後治得病盛暑中半體無汗已二年竊自憂之造丸服至年餘汗遂浹體此藥流傳雖久服者尚寡嘉靖初邵應節真人以七寶美髯丹方上進服餌有效連生皇嗣於是何首烏之方天下大行矣集藻尺牘增宋蘇軾與歐陽知晦尺牘聞公服何首烏是否此藥溫厚無毒李習之傳正爾啖之無炮製今人用棗或黑豆之類蒸熟皆損其力僕亦服此但採得隂乾便杵羅為末棗肉或煉蜜為丸入水臼中萬杵乃丸服極有力無毒恐未得此法故以奉白雜著原唐李翺何首烏録僧文象好養生術元和七年三月十八日朝茅山遇老人於華陽洞口告僧曰汝有仙相吾授汝祕方有何首烏者順州南河縣人祖能嗣本名田兒天生閹嗜酒年五十八因醉夜歸臥野中及醒見田中有藤兩本相遠三尺苖蔓相交久乃解解合三四心異之遂掘根持問村野人無能名曝而乾之有鄉人袁良戲而曰汝閹也汝老無子此藤異而後以合其神藥汝盍餌之田兒乃篩末酒服經七宿忽思人道纍旬力輕健欲不制遂娶寡婦曾氏田兒因常餌之七百餘日舊疾皆愈反有少容鄉人異之十年生數男俱號為藥告田兒曰此交藤也服之可夀百六十歲古方草不載吾傳於師亦得之於南河吾服之遂有子吾本好靜以此藥害於靜因絶不服女偶餌之乃天幸因為田兒盡記其功而改田兒名能嗣焉嗣年百六十歲乃卒男女一十九人子庭服亦年百六十歲男女三十人子首烏服之年百三十歲男女二十一人老人言訖遂别去其行如疾風浙東知院殿中孟侍御識何首烏嘗餌其藥言其功如所傳南人因呼為何首烏焉贊原無名氏何首烏贊神效勝道著在仙書雌雄相交夜合晝疏服之去榖日居月諸返老還少變安病軀有緣者遇朂爾自如五言古詩增宋文同寄何首烏丸與友人此草有奇效嘗聞於習之陵陽亦舊産其地尤所宜翠蔓走巖壁芳叢蔚參差下有根如拳赤白相雄雌斸之高秋後氣味乃不虧斷以苦竹刀蒸曝凡九為夾羅下香屑石蜜相和治入臼杵萬過盈盤走纍纍日進豈厭屢初若無所滋漸久覺膚革鮮潤如凝脂既已鬚髮換白者無一絲耳目固聰明步履欲走馳十年親友别忽見皆生疑問胡得爾術容貌曾莫衰為之講靈苖不為世俗知蓋以多見賤蓬藋同一虧君如聽豫服此語不敢欺勿信柳子厚但誇仙靈毗詩散句增宋梅堯臣試採上陽何首烏刮切仍致苦竹刀别録原修治春夏秋采其根雌雄並用乘濕以布拭去土曝乾臨時以竹刀切米泔浸經宿曝乾木杵臼搗之忌鐵器新採者去皮銅刀切薄片入甑內瓷鍋蒸之旋以熱水從上淋下勿令滿溢候無氣息取出曝乾用近時治法用何首烏赤白各一片竹刀刮去粗皮米泔浸一夜切片用黑豆三斗分九分每次用一分以水泡過砂鍋內鋪豆一層首烏一層重重鋪盡蒸之豆熟取出去豆將何首烏曬乾再以豆蒸如此九蒸九曬乃用萆薢增本草綱目萆薢一名赤節一名百枝一名竹木一名白菝葜蘇頌曰作蔓生苖葉俱青葉作三乂似山薯又有緑豆葉花有黃紅白數種亦有無花結白子者根黃白色多節三指許大春秋采根曝乾今成德軍所産者根亦如山薯而體硬其苖引蔓葉似蕎麥子三稜不拘時月采根利刀切片曝乾用氣味苦平無毒治腰脊痛強骨節風寒濕周痺惡瘡不瘳熱氣癎疾中風補水臟堅筋骨益精明目菝葜增本草綱目菝葜葜一作􅀢一名金剛根一名鐵菱角一名王瓜草菝􅀢猶􅀈䂒也􅀈䂒短也此草莖蔓強堅短小故名菝􅀢而江浙人謂之金剛根楚人謂之鐵菱角皆狀其堅而有尖也鄭樵通志云其葉頗近土瓜故名王瓜草山野中甚多其莖似蔓而堅強直生有刺其葉團大狀如馬蹄光澤似柿葉秋開黃花結紅子其根甚硬有硬鬚如刺其葉煎飲酸澀野人采其根葉入染家用氣味甘酸平無毒治腰背寒痛風痺益血氣治時疾瘟瘴消渴肝經風虛集藻五言古詩增宋張耒菝葜江鄉有奇蔬本草寄菝葜驅風利頑痺解疫補體節春深土膏肥紫筍迸上裂烹之芼薑橘盡取無可掇應同玉井蓮已過苖頭茁異時中州去買子攜根撥免令食蔬人區區羡薇蕨土茯苓增本草綱目土茯苓一名土萆薢一名刺豬苓一名山豬糞一名草禹餘糧一名仙遺糧一名冷飯團一名硬飯一名山地栗按陶𢎞景注禹餘糧云南中平澤有一種藤根作塊有節似菝葜而色赤味如薯蕷亦名禹餘糧即今土茯苓也故今尚有仙遺糧冷飯團之名陳藏器本草草禹餘糧蘇頌圖經刺豬苓皆此物土茯苓刺豬苓山地栗皆象形也俗又名過岡龍蔓生如蓴莖有細點其葉不對狀頗類大竹葉而質厚滑如瑞香葉而長五六寸其根狀如菝葜而圓其大若雞鴨子連綴而生遠者離尺許近或數寸其內軟可生啖有赤白二種入藥用白者良氣味甘淡平無毒食之當榖不飢調中止泄健行不睡健脾胃強筋骨去風濕利關節止泄㵼治拘攣骨痛惡瘡癰腫解汞粉銀朱毒白斂增本草綱目白斂一名白草一名白根一名兔核一名貓兒卵一名崑崙寇宗奭曰斂瘡方多用之故名白斂李時珍曰兔核貓兒卵皆象形也崑崙言其皮黑也蘇頌曰二月生苖多在林中作蔓赤莖葉如小桑五月開花七月結實根如雞鴨卵而長三五枚同一窠皮黑肉白一種赤斂花實功用皆同但表裏俱赤氣味苦平無毒治癰腫疽瘡散結氣止痛除熱目中赤小兒驚癎溫瘧殺火毒刀箭瘡撲損解狼毒毒女萎增唐本草女萎葉似白斂蔓生花白子細亦名蔓楚氣味辛溫無毒治風寒霍亂泄痢腸鳴遊氣上下無常驚癎寒熱百病出汗赭魁增本草綱目赭魁其根如魁有汗如赭故名魁乃酒器名韓保升曰苗蔓延生葉似蘿藦根若菝葜皮紫黑肉黃赤大者輪囷如升小者如拳李時珍曰按沈括筆談云今南中極多膚黑肌赤似何首烏切破中有赤理如檳榔有汁赤如赭彼人以染皮製靴閩人謂之餘糧氣味甘平無毒治心腹積聚除三蟲鵝抱增圖經本草鵝抱生宜州山林下附石而生作蔓似大豆其根形似萊蔔大者如三升器小者如拳氣味苦寒無毒治風熱上壅咽喉腫痛及解蠻箭藥毒亦消風熱結毒伏雞子增本草拾遺伏雞子根一名承露仙蔓延生葉圓薄似錢根似鳥形者良氣味苦寒無毒解百藥毒治諸熱煩悶急黃天行黃疸瘧瘴中惡寒熱頭痛疽瘡馬黃牛瘡亦傅癰腫附録仰盆增本草拾遺仰盆苗似承露仙根圓如仰盆狀大如雞卵味辛溫有小毒治蠱毒飛尸喉痺磨傅皮膚惡腫附録人肝藤增本草拾遺人肝藤引蔓而生葉有三丫花紫色與伏雞子同名承露仙而伏雞子葉圓解諸藥毒遊風手腳軟痺九仙子增本草綱目九仙子一名仙女嬌一根連綴九枚大者如雞子小者如半夏白色二月生苖蔓高六七尺莖細而光葉如烏桕葉而短扁不圓每葉丫生子枝或一或二裊裊下垂六七月開碎青黃色花隨即結實碎子叢簇如榖精草子狀九月采根氣味苦涼無毒治咽痛喉痺散血山豆根增本草綱目山豆根一名解毒一名黃結一名中藥其蔓如大豆因以為名蘇頌曰苖蔓如豆葉青經冬不凋八月采根廣南者如小槐高尺餘氣味甘寒無毒解諸藥毒止痛消瘡腫毒發熱咳嗽治人及馬急黃殺小蟲解咽喉腫毒治腹脹喘滿女人血氣腹脹又下寸白諸蟲止下痢卒患熱厥心腹痛五種痔痛研汁塗諸熱腫秃瘡蛇狗蜘蛛傷黃藥子增本草綱目黃藥子一名木藥子一名大苦一名赤藥一名紅藥子按沈括筆談云本草注引郭璞注爾雅云蘦大若者云即甘草也蔓生葉似薄荷而色青黃莖赤有節節有枝相當此乃黃藥也其味極苦故曰大苦非甘草也今處處人栽之其莖高二三尺柔而有節似藤葉大如拳長三寸許其根長者尺許大者圍二三寸外褐內黃亦有黃赤色者肉色頗似羊蹄根冬枯春生開碎花無實氣味苦平無毒治諸惡腫瘡瘻喉痺蛇犬咬毒涼血降火消癭解毒解毒子增圖經本草解毒子一名地不容出戎州蔓生葉青如杏葉而大厚硬凌冬不凋無花實根黃白色外皮微粗褐纍纍相連如藥實而圓大采無時又開州興元府出苦藥子大抵與黃藥相類春采根暴乾亦入馬藥用氣味苦大寒無毒解蠱毒止煩熱辟瘴癘利喉閉及痰毒治五臟邪氣清肺壓熱消痰降火利咽喉退目赤附録奴會子增海藥本草奴會子生西國諸戎大小如苦藥子味辛平無毒主小兒冷疳虛渴脫肛骨立瘦損附録海藥實增本草綱目海藥實一名連木蘇恭曰蕃名那疏樹生葉似杏花紅白色子肉味酸李時珍曰此藥子似黃藥苦藥子而稍有不同二藥子不結子此則樹之子也去皮取中仁用味辛溫無毒治邪氣諸痺疼酸續絶傷補骨髓破血止痢消腫除蠱疰蛇毒白藥子增本草綱目蘇恭曰白藥子三月生苗葉似苦苣四月抽赤莖長似壺盧蔓六月開白花八月結子亦名瓜蔞九月葉落枝折根皮黃色氣味辛溫無毒治金瘡生肌消腫毒喉痺消痰止嗽治渴并吐血喉痺咽痛解野葛生金巴豆藥毒傅刀斧折傷能止血痛散血降火消痰解毒附録陳家白藥增嶺表録陳家白藥善解毒封州康州有種之者廣府每歲充土貢本草綱目陳家白藥出蒼梧陳家蔓及根並似土瓜葉如錢根似防己緊小者良味苦寒無毒主解諸藥毒亦去心胸煩熱天行瘟瘴附録甘家白藥增本草拾遺甘家白藥出龔州以南生隂處葉似車前根如半夏其汁飲之如蜜味苦大寒有小毒解諸藥毒與陳家白藥功相似附録會州白藥增本草拾遺會州白藥葉如白斂傅金瘡生膚止血附録衝洞根增海藥本草衝洞根苗蔓如土瓜根亦相似本草拾遺衝洞根味苦平無毒主熱毒蛇犬蟲癰瘡等毒附録突厥白增開寶本草突厥白根黃白色狀似茯苓而虛軟苖高三四尺春夏葉如薄荷花似牽牛而紫上有白稜二八月采根味苦治金瘡生血止血補腰續筋威靈仙增本草綱目威靈仙威言其性猛也靈仙言其功神也蘇頌曰陜西及河東河北汴東江湖州郡皆有之初生作蔓莖如叉股七月內生花六出淺紫或碧白色作穗似莆薹子亦有似菊花頭者實青色根稠密多鬚似榖李時珍曰其根每年旁引年深轉茂一根叢鬚數百條長者二尺許初時黃黑色乾則深黑俗稱鐵腳威靈仙别有數種根鬚皆一樣色或黃或白皆不可用氣味苦溫無毒治諸風宣通五臟去腹內冷滯心膈痰水久積瘕癥痃癖氣塊腰膝疼療折傷散風邪久服無有溫瘧疾彚考增圖經本草唐貞元中周君巢作威靈仙傳云商州有人病手足不遂不履地者數十年良醫殫技莫能療所親置之道旁以求救者遇一新羅僧見之告曰此疾一藥可活但不知此土有否因為之入山求索果得乃威靈也使服之數日能步履山人鄧思齊知之遂傳其事别録增志林服威靈仙有二法其一淨洗隂乾搗羅為末酒浸牛膝末或蜜丸或為散酒調牛膝之多少視臟腑之虛實而增減之此睂山一親知患腳氣至重依此服半年遂永除其一法取此藥粗細得中者寸截之七十寸作一貼每歲作三百六十貼置牀頭五更初面東細嚼一貼候津液滿口咽下此牢山一僧年百餘歲上下山如飛云得此藥方二法皆以得真為要真者有五驗一味極苦二色深翠三折之脆而不韌四折之有微塵如胡黃連狀五斷處有白暈謂之鴝鵒眼無此五驗則藁本根之細者耳又須忌茶以槐角皂角牙之嫩者依造草茶法作或只取外臺祕要代茶飲子方常合服乃可翦草增本草綱目陳藏器曰翦草生山澤間葉如茗而細李時珍曰狀如茜草又如細辛氣味苦涼無毒治諸惡瘡疥癬風瘙瘻蝕有蟲一切失血防己增本草綱目防己一名解離一名石解李杲云防己知險健之人幸災樂禍能首為亂階若善用之亦可禦敵其名或取此義解離因其紋解也蘇頌曰漢中出者破之文作車輻解黃實而香莖梗甚嫩苖葉小類牽牛折其莖一頭吹之氣從中貫如木通然他處者青白虛軟又有腥氣皮皺上有丁足子名木防己氣味辛平無毒治風寒溫瘧熱氣諸癎除邪療水腫風腫去膀胱熱傷寒熱邪氣中風手腳攣急通腠理利九竅止泄散癰腫惡結諸瘑疥癬蟲瘡散留痰肺氣喘嗽木防己治男子肢節中風毒風不語散結氣擁腫溫瘧風水腫去膀胱熱木通增本草綱目通草一名木通其莖中通故名通草即今所謂木通今之通草乃通脫木也一名附支一名丁翁一名萬年藤子名燕覆蘇恭曰南人謂為燕覆子或名鳥覆子陳藏器云江東人呼為畜葍子江西人呼為拏子陶宏景曰繞樹藤生汁白莖有細孔兩頭皆通含一頭吹之則氣出彼頭者良蘇頌曰蔓大如指其莖幹大者徑三寸一枝五葉頗類石韋又似芍藥二葉相對夏秋開紫花亦有白花者結實如小木瓜食之甘美即陳士良本草所謂桴棪子也李時珍曰有紫白二色紫者皮厚味辛白者皮薄味淡治除脾胃寒熱通利九竅血脈關節令人不忘去惡蟲療脾疸噦噫散癰腫諸結不消及金瘡惡瘡鼠瘻踒折齆鼻息肉利諸經脈寒熱不通之氣理風熱安心除煩止渴退熱明耳目下水排膿止痛催生下胞治天行時疾頭痛目眩羸劣乳結喉痺咽痛導小腸火通脫木增爾雅離南活莌注草生江南高丈許大葉莖中有瓤正白零陵人祖日貫之為樹本草綱目通脫木一名通草蘇頌曰爾雅活莌即通脫也山海經名冦脫又名倚商李杲曰能通竅利水固有通草之名與木通同功陳嘉謨曰白瓤中藏脫木得之故名通脫陳藏器曰生山側葉似萞麻其莖空心中有白瓤輕白可愛女人取以飾物俗名通草蘇頌曰今園圃有種蒔者或作蜜煎充果食之甘美氣味甘淡寒無毒利隂竅治五淋除水腫癃閉㵼肺解諸毒蟲痛明目退熱下乳催生花上粉治諸蟲瘻惡瘡痔疾瘰癧及胸中伏氣攻胃咽彚考增山海經升山其草多冦脫注冦脫草生南方高丈許似荷葉而莖中有瓤正白零桂人植而日灌之以為樹也熊山下其草多冦脫附録天壽根增圖經本草天壽根出台州每歲土貢其性涼治胸膈煩熱金銀藤原金銀藤一名忍冬一名通靈草一名鴛鴦藤一名左纒藤一名蜜捅藤一名鷺鷥藤一名老翁鬚一名金叉股本草注云凌冬不凋故名忍冬綱目云其花長瓣垂鬚黃白相間而藤左纏故有金銀諸名金叉股貴其功也土宿真君云蜜捅藤取汁能伏硫制汞故有通靈之稱處處有之附樹延蔓莖微紫色有薄皮膜之其嫩莖色青有毛對節生葉葉如薜荔而青有澀毛三四月後開花不絶花長寸許一蒂兩花二瓣一大一小長蕊初開者蕊瓣俱白經三二日則變黃新舊相參黃白相映故呼金銀花氣甚清芬四月采花藤葉不拘時采俱隂乾氣味甘寒無毒功用皆同治風除脹解痢逐尸消腫散毒療癰疽疥癬發背楊梅諸惡瘡皆為要藥集藻五言古詩增金假克已同封仲堅采鷺鷥藤因而成詠寄家弟誠之有藤名鷺鷥天生匪人育金花間銀蕊翠蔓自成簇褰裳涉春溪采之漸盈掬藥物時所需非為事口腹牛溲與馬渤良醫猶並蓄况此香色奇兩通鼻與目尤喜療瘡瘍先賢講之熟世俗不知愛棄置在空谷作詩與題評使異凡草木假成已和鷺鷥藤詩并序吾兄同仲堅采鷺鷥藤於午芹之東溪因詠詩見示前代詩人未嘗聞賦此者此花長於田野籬落間人視之與草芥無異是詩一出好事者將知所貴矣感歎之餘敬次其韻有與我同志繼而述之不亦懿乎微雨灑郊坰百卉欣並育幽花發溪側間錯金珠簇徐看是鷺藤香味濃可掬忍飢出新句大笑負此腹遺落榛莽間采擷誰見蓄情知無俗姿安能悅衆目先生日來往東溪路應熟一經品題餘名字耀巖谷遇合良有時不才異山木鈎藤增本草綱目鈎藤陶宏景曰出建平亦作弔藤李時珍曰其刺曲如釣鈎故名今人呼為鈎藤冦宗奭曰藤長八九尺或一二丈大如拇指其中空李時珍曰狀如葡萄藤而有鈎紫色古方多用皮後世多用鈎氣味甘微寒無毒治小兒寒熱十二驚癎小兒驚啼瘛瘲熱擁客忤胎風大人頭旋目眩平肝風除心熱小兒內釣腹痛發斑疹附録倒挂藤增本草拾遺倒挂藤生深山有逆刺如懸鈎倒挂於樹葉尖而長味苦無毒主一切老血及産後諸疾結痛血上欲死煮汁服之白兔藿增本草綱目白兔藿蘇恭曰山南人謂之白葛苖似蘿藦圓厚莖有白毛與衆草異韓保升曰蔓生葉圓似蓴五月六月采苖氣味苦平無毒治蛇虺蜂蠆猘狗菜肉蠱毒鬼疰風疰諸大毒白英增本草綱目白英一名縠菜一名白幕一名排風子名鬼目白英謂其花色縠菜象其葉文排風言其功用鬼目象其子形蘇恭曰蔓生葉似王瓜小長而五丫實圓似龍葵子生青熟紫黑東人謂之白草李時珍曰正月生苖白色可食秋開小白花根苖氣味甘寒無毒治寒熱入疸消渴補中益氣久服輕身延年葉作羮飲甚療勞煩熱風疹丹毒瘴瘧寒熱小兒結熱子酸平無毒主明目芄蘭增爾雅雚丸蘭注芄蘭蔓生斷之有白汁可啖陸璣詩疏芄蘭一名蘿摩幽州人謂之雀瓢本草綱目蘿摩一名白環藤實名雀瓢一名斫合子一名羊婆奶一名婆婆針線包陳藏器曰漢高帝用子傅軍士金瘡故名斫合子李時珍曰白環即芄字之訛其實嫩時有漿裂時如瓢故有雀瓢羊婆奶之稱其中一子有一條白絨長二寸許故俗呼婆婆針線包又名婆婆針袋兒也陶宏景曰蘿摩作藤生摘之有白乳汁人家多種之葉厚而大可生啖亦蒸煮食之李時珍曰三月生苖蔓延籬垣極易繁衍其根白軟其葉長而後大前尖根與莖葉斷之皆有白乳如構汁六七月開小長花如鈴狀紫白色結實長二三寸大如馬兜鈴一頭尖其殼青軟中有白絨及漿霜後枯裂則子飛其子輕薄亦如兜鈴子氣味甘辛溫無毒治虛勞補益精氣強隂葉煮食功同子搗子傅金瘡生膚止血搗葉傅腫毒取汁傅丹毒赤腫及蛇蟲毒彚考增詩衛風芄蘭之支赤地利增本草綱目赤地利一名赤薜荔一名五毒草一名五蕺一名蛇菵一名山蕎麥蘇頌曰春夏生苖作蔓繞木上莖赤葉青似蕎麥葉七月開白花亦如蕎麥結子青色根若菝葜皮紫赤肉黃赤八月采根曬乾收氣味苦平無毒治赤白冷熱諸痢斷血破血生肌肉主癰疽惡瘡毒腫赤白遊疹醋磨傅蟲蠶蛇犬咬亦搗莖葉傅之恐毒入腹煮汁飲紫葛增唐本草紫葛生山谷中苖似葡萄長丈許根紫色大者徑二三寸氣味甘苦寒無毒主傅癰腫惡瘡烏蘝莓增爾雅拔龍葛注似葛蔓生有節江東呼為龍尾亦謂之虎葛細葉赤莖本草綱目烏蘝莓一名五葉莓一名蘢草一名赤葛一名五爪龍一名赤潑藤即爾雅拔龍葛也五葉如白蘝故曰烏蘝俗名五爪龍曰龍尾曰虎葛並取蔓形赤潑與赤葛及拔音相近蘇恭曰蔓生平澤葉似白蘝韓保升曰莖端五葉開花青白色李時珍曰其藤柔而有稜一枝一鬚凡五葉葉長而光有疏齒面青背淡七八月結苞成簇青白色花大如粟黃色四出結實大如龍葵子生青熟紫內有細子其根白色大者如指長一二尺搗之多涎滑氣味酸苦寒無毒傅癰癤瘡腫蟲咬風毒熱腫遊丹涼血解毒利小便消癤腫葎草增本草綱目葎草一名勒草一名葛勒蔓一名來莓草此草莖有細刺善勒人膚故名勒草訛為葎草又訛為來莓皆方音也二月生苖莖有細刺葉對節生一葉五尖微似萞麻而有細齒八九月開細紫花成簇結子狀如黃麻子氣味甘苦寒無毒治瘀血止精益盛氣療五淋利小便止水痢除瘧虛熱渴治傷寒汗後虛熱疥癩潤三焦消五榖益五臟除九蟲辟溫疫傅蛇蠍傷澤㵼增爾雅蕍蕮注今澤㵼疏即藥草澤㵼也本草一名水㵼一名及㵼一名芒芋一名鵠㵼本草綱目澤㵼一名禹孫去水曰㵼如澤水之㵼也禹能治水故名禹孫蘇頌曰山東河陜江淮皆有之漢中者為佳春生苖多在淺水中葉似牛舌獨莖而長秋時開白花作叢似榖精草秋末采根曝乾氣味甘寒無毒治風寒濕痺乳難養五臟益氣力肥健消水治痞滿五淋消腫脹滲泄止渴滲濕熱行痰飲止嘔吐㵼痢羊蹄增陸璣詩疏遂牛蘈揚州謂之羊蹄似蘆蔔而莖赤可瀹為茹滑而美也多啖令人下氣幽州人謂之蓫本草綱目羊蹄一名蓄一名秃菜一名敗毒菜一名牛舌菜一名羊蹄大黃一名鬼目一名東方宿一名連蟲陸一名水黃芹子名金蕎麥陶𢎞景曰今人呼為禿菜即蓄字音訛也李時珍曰羊蹄以根名牛舌以葉形名秃菜以治秃瘡名也金蕎麥以相似名也近水及濕地極多葉長尺餘似牛舌之形不似波稜入夏起薹開花結子花葉一色夏至即枯秋深即生凌冬不死根長近尺赤黃色如大黃胡蘿蔔形氣味苦寒無毒治頭秃疥瘙浸淫疽痔腫毒殺蟲療蠱毒治癬殺一切蟲治産後風袐葉甘滑寒無毒治小兒疳蟲腸痔㵼血殺河豚魚毒作菜多食滑大腑酸模增爾雅須薞蕪注薞蕪似羊蹄葉細酢可食本草綱目酸模一名山羊蹄一名山大黃一名酸母一名蓚一名當藥即爾雅薞蕪也薞蕪乃酸模之音轉酸模又酸母之轉皆以味而名與三葉酸母草同名掌禹錫以薞蕪為蔓菁菜誤矣大明曰狀似羊蹄葉而小黃莖葉俱細節間生子若茺蔚李時珍曰根葉花形並同羊蹄但葉小味酸為異其根赤黃色連根葉取汁煉霜可制雄汞氣味酸寒無毒治暴熱腹脹殺皮膚小蟲治疥療痢去汗斑龍舌草增本草綱目龍舌葉如大葉菘菜及芣苡狀根生水底抽莖出水開白花根似胡蘿蔔根而香杵汁能軟鵝鴨卵方家用煮丹砂煆白礬制三黃氣味甘鹹寒無毒搗塗癰疽湯火灼傷麕舌增名醫别録麕舌生小水中五月五日采乾以治霍亂甚良味辛微溫無毒主腹痛吐逆心煩又有牛舌實一名豕首生水中澤旁大葉長尺五月采實今東土人呼水中大葉如牛耳者為牛耳菜味鹹溫無毒主輕身益氣石斛增本草綱目石斛一名石蓫一名金叉一名禁生一名林蘭一名杜蘭石斛石蓫未詳其莖狀如金叉之股故古有金叉石斛之稱今蜀人栽之呼為金叉花林蘭杜蘭與木部木蘭同名恐誤蘇恭曰有二種一種似大麥纍纍相連頭生一葉而性冷名麥斛一種莖大如雀髀葉在莖頭名雀髀斛其他斛如竹而節間生葉也蘇頌曰多在山谷中五月生苖莖似小竹節節間出碎葉七月開花十月結實其根細長黃色惟生石上者為勝李時珍曰石斛叢生石上其根紏結甚繁乾則白軟其莖葉生皆青色乾則黃色開紅花節上自生根鬚人亦折下以砂石栽之或以物盛挂屋下頻澆以水經年不死俗稱為千年潤石斛短而中實木斛長而中虛處處有之以蜀中者為勝氣味甘平無毒治傷中除痺下氣補五臟虛勞羸瘦久服厚腸胃補內絶不足平胃氣長肌肉逐皮膚邪熱痱氣腳膝疼冷痺弱定志除驚輕身延年益智清氣骨碎補增本草綱目骨碎補一名猴薑一名胡猻薑一名石毛薑一名石菴䕡陳藏器曰骨碎補本名猴薑開元皇帝以其主傷折補骨碎故命此名或作骨碎布訛矣江西人呼為胡猻薑象形也李時珍曰菴䕡主折傷破血此物功同故有菴䕡之名蘇頌曰淮浙陜西夔路州郡皆有之生木或石上多在背隂處引根成條上有黃赤毛及短葉附之抽大葉成枝葉面青緑有青黃點背青白色有赤紫點春生葉至冬乾黃無花實采根入藥李時珍曰其根扁長略似薑形其葉有丫缺頗似貫衆葉氣味苦溫無毒破血止血補傷折骨中毒氣風血疼痛五勞惡疾蝕爛肉殺蟲石韋增本草綱目石韋一名石䩾一名石皮一名石蘭陶𢎞景曰蔓延石上生葉如皮故名石韋李時珍曰柔皮曰韋䩾亦皮也蘇恭曰此物叢生石旁隂處其生古瓦屋上者名瓦韋蘇頌曰今晉絳滁海福州江寧皆有之叢生石上葉如柳背有毛而斑點如皮福州别有一種石皮三月有毛采作浴湯治風李時珍曰多生隂崖險罅處其葉長者近尺濶寸餘柔韌如皮背有黃毛凌冬不凋又一種如杏葉者亦生石上其性相同氣味辛平無毒治勞熱邪氣五癃閉不通利小便水道止煩下氣通膀胱滿補五勞安五臟去惡風益精氣治淋瀝發背主崩漏金瘡清肺氣石莧增圖經本草石莧生筠州多附河岸沙石上春生苖莖青高一尺以來葉如水柳而短八九月土人采之氣味辛苦有小毒同甘草煎服主齁䶎又吐風涎附録石垂增圖經本草石垂生福州山中三月花四月采子生搗為末丸服治蠱毒景天原一名慎火本草注云栽之可救火故曰慎火一名戒火一名護火一名辟火一名救火一名火母人多種於石山上二月生苖脆莖微帶赤黃色高一二尺折之有汁葉淡緑色光澤柔厚狀似長匙頭及胡豆葉而不尖夏開小白花結實如連翹而小中有黑子如粟粒其葉味苦平無毒治大熱火瘡諸蠱寒熱療金瘡止血除熱狂赤眼頭痛寒熱遊風可煆硃砂苖葉花並可用葉煮熟水淘可食南北皆有人家多種於中庭或盆栽置屋上以防火極易生折枝置土中澆灌旬日便活彚考增南越志廣州有樹可以禦火山北謂之慎火或謂之戒火多種屋上以防火也南中無霜雪故成樹倦遊録慎火即龍骨樹也集藻五言古詩增梁范筠詠慎火草兹卉信叢叢微榮未足奇何期糅香草遂得繞花池忘憂雖無用止焰或有施早得建章立幸爇柏梁垂五言絶句增宋王十朋慎火草禁殿安蚩尾騷人逐畢方何如栽此草有火自能妨石胡荽增本草綱目石胡荽一名天胡荽一名野園荽一名鵝不食草一名雞腸草生石縫及隂濕處小草也高二三寸冬月生苖細莖小葉形狀宛如嫩胡荽其氣辛薰不堪食鵝亦不食之夏開細花黃色結細子極易繁衍僻地則鋪滿也氣味辛寒無毒通鼻氣利九竅吐風痰去目翳療痔病解毒明目治耳聾頭痛腦酸痰瘧齁䶎鼻窒不通散瘡腫螺厴草增本草拾遺螺厴草一名鏡面草蔓生石上葉狀似螺厴微帶赤色而光如鏡背有少毛小草也味辛治癰腫風疹腳氣腫酢漿草增本草綱目酢漿草一名酸漿一名三葉酸一名三角酸一名酸母一名醋母一名酸箕一名鳩酸一名雀兒酸一名雀林草一名小酸茅一名赤孫施此小草三葉酸也其味如醋與燈籠草之酸漿名同物異鄭樵通志言福人謂之孫施李時珍曰苗高一二寸叢生布地極易繁衍一枝三葉一葉兩片至晚自合帖整整如一四月開小黃花結小角長一二分內有細子冬亦不凋方士采制砂汞􅚑礬砒石氣味酸寒無毒殺諸小蟲治惡瘡瘑瘻諸淋赤白帶塗湯火蛇蝎傷附録酸草增名醫别録酸草生名山醴泉上隂崖莖有五葉青澤根赤黃可以消玉一名醜草主輕身延年附録三葉增名醫别録三葉生田中莖小黑白高三尺根黑三月采隂乾一名三石一名當田一名赴魚味辛治寒熱蛇蜂螫人地錦增本草綱目地錦一名地朕一名地噤一名夜光一名承夜一名草血竭一名血見愁一名血風草一名馬蟻草一名雀兒臥單一名醬瓣草一名猢猻頭草赤莖布地故曰地錦專治血病故俗稱為血竭血見愁馬蟻雀兒喜聚之故有馬蟻雀單之名醬瓣猢猻頭象花葉形也掌禹錫曰莖葉細弱蔓延於地莖赤葉青紫色夏中茂盛六月開紅花結細實取苗子用之李時珍曰田野寺院及階砌間皆有之就地而生赤莖黃花黑實狀如蒺藜之朵斷莖有汁方士秋月采煮雌雄丹砂硫黃氣味辛平無毒通流血脈治癰腫惡瘡金刃撲損出血血痢下血崩中能散血止血附録金瘡小草增本草拾遺金瘡小草生江南村落田野間下濕地高一二寸許如薺而葉短春夏間有淺紫花長一粳米許味甘平無毒主金瘡止血長肌斷鼻中衄血血瘀及卒下血崖棕增圖經本草崖棕生施州石崖上苖高一尺以來其狀如棕四季有葉無花土人采根去粗皮入藥氣味甘辛溫無毒治婦人血氣並五勞七傷同雞翁藤半天回野蘭根洗焙為末溫酒服附録雞翁藤增圖經本草雞翁藤生施州蔓延大木上有葉無花味辛性溫無毒采無時附録半天回增圖經本草半天回生施州春生苖高二尺以來赤斑色至冬苖枯土人夏月采根味苦澀性溫無毒附録野蘭根增圖經本草野蘭根生施州叢生高二尺以來四時有葉無花其根味微苦性溫無毒采無時紫背金盤增本草綱目蘇頌曰紫背金盤生施州苖高一尺以來葉背紫無花土人采根用李時珍曰湖湘水石處皆有之名金盤藤似醋筒草而葉小背微紫軟莖引蔓似黃絲槎之即斷無汁可見方士用以制汞他處少有氣味辛澀熱無毒治婦人血氣痛孕婦勿服能消胎氣附録醋筒草增本草綱目醋筒草葉似木芙蓉而偏莖空而脆味酸開白花廣人以鹽醋淹食之白龍鬚增本草綱目白龍鬚生近水旁有石處寄生搜風樹節乃樹之餘精也細如棕絲直起無枝葉最難得真者一種萬纒草生於白線樹根細絲相類但有枝莖稍粗為異氣味平無毒治男子婦人風濕腰腿疼痛左癱右瘓口目喎斜及産後氣血流散惟虛勞癱痿不可服馬勃增本草綱目馬勃一名馬疕一名馬􅀢一名灰菰一名牛屎菰陶𢎞景曰紫色虛軟狀如狗肝彈之粉出冦宗奭曰生濕地及腐木上夏秋采之有大如斗者小亦如升杓氣味辛平無毒治惡瘡馬疥傅諸瘡治喉痺咽疼清肺散血熱解毒御定佩文齋廣羣芳譜卷九十八
