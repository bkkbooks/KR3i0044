body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷一天時譜春増禮記鄉飲酒義東方者春春之為言蠢也産萬物者聖也注蠢動生之貌也聖之為言生也疏東方産育萬物故為春為聖爾雅春為青陽注氣青而温陽春為發生公羊傳春者何嵗之始也注春者天地開闢之端養生之首管子東方曰嵗星其時曰春其氣曰風風生木梁元帝纂要春曰陽春青春芳春三春九春風曰陽風春風暄風柔風惠風景曰媚景時曰良時嘉時芳時辰曰良辰嘉辰芳辰節曰華節芳節嘉節良節韶節淑節草曰弱草芳草芳卉木曰華木華樹芳樹陽樹林曰茂林芳林彚考原詩小雅春日遲遲卉木萋萋倉庚喈喈采繁祁祁増詩正義周成王太平之時于春時親耕籍田以勸農桑又祈求社稷使年豐周禮天官内宰上春詔王后帥六宫之人而生穜稑之種而獻之于王注先種後熟曰穜後種先熟曰稑史記叔孫通傳孝惠帝曾春出遊離宮叔孫生曰古者有春嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上許之諸果獻由此興原前漢書文帝紀元年三月詔曰方春和時草木羣生之物皆有以自樂増律厯志少陽者東方東動也陽氣動物于時為春春蠢也物蠢生乃動運後漢書明帝紀永平三年春詔曰夫春者嵗之始也始得其正則三時有成有司其勉順時氣勸督農桑章帝紀元和二年詔曰方春生養萬物莩甲宜助萌陽以育時物郎覬傳方春東作布德之元陽氣開發養導萬物逸周書禹禁春三月山林不登斧以成草木之長管子日至六十日而陽凍釋七十日而隂凍釋隂凍釋而萟稷故春事二十五日之内耳莊子春雨日時草木怒生銚鎒于是乎始修草木之到植者過半而不知其然尸子春為忠也東方而春春動也是故鳥獸孕榮華生萬物遂忠之至也呂氏春秋冬至後五旬七日菖蒲生乃耕菖者百草之先生者也于是始耕淮南子春風至則甘雨降生育萬物草木榮華莫見其為者而功既成矣春秋繁露木者春生之性農之本也原劉向别録鄒衍居燕燕有谷地美而春不生黍稷衍吹律暖氣乃至草木乃生至今名黍谷増焦氏易林百草嘉卉萌芽將出昆蟲扶戸陽明所得谷風布氣萬物出生萌庶長養華葉茂盛春秋元命苞春者神明推移精華結紐注神明猶隂陽也相推使物精華結成紐結要也春秋文耀鉤春致其時華實乃榮洛陽伽藍記法雲寺北有臨淮王彧宅彧性愛山林又重賔客至于春風扇揚花樹如錦晨食南館夜逰後園僚宷成羣俊民滿席絲桐發響羽觴流行詩賦并陳清言乍起莫不領其𤣥奥忘其褊恡焉是以入彧室者謂登仙也荆州秀才張裴裳常為五言有句云異林花共色别樹鳥同聲彧以蛟龍錦賜之史畧北齊盧士深妻崔氏有才學春日以桃花和雪與兒靧面云取紅花取白雪與兒洗面作光悦取白雪取紅花與兒洗面作妍華取雪白取花紅與兒洗面作華容國史補曲江大㑹先牒教坊請奏上御紫雲樓垂簾觀焉時或擬作樂則為之移日故曹松詩云追遊若遇三清樂行從應妨一日春勅下後人置皮袋例以圗障酒器錢絹入其中逢花即飲故張籍詩云無人不借花園宿到處皆携酒器行原曲江春宴録長安貴家遊賞翦百花􅑽成獅子互相送遺獅子有小連環欲送以蜀錦流蘇牽之曰春光且莫去留與醉人看虞松方春謂握月擔風且留後日吞花臥酒不可過時玉麈集穆宗宫中花開以重頂帳蒙蔽置惜春御史號曰括春開元天寳遺事學士許愼選放曠不拘小節多與親友結宴于花圃中未嘗具帷幄設坐具使童僕輩聚落花鋪于坐下曰吾自有花裀何消坐具楊國忠子弟毎春至之時求名花異木植於檻中以板為底以木為輪使牽之自轉所至之處檻在目前而便即歡賞目之為移春檻長安貴遊子弟每至春時遊宴供帳于園囿中隨行載以油幕或遇隂雨以幕覆之盡驩而歸長安侠少每至春時結朋聨黨各乘矮馬飾以錦韀金絡竝轡于花樹下徃来使僕從執酒皿而隨之遇好囿則駐馬而飲長安士女春時鬭花戴插以竒花多者為勝皆用千金市名花植于庭苑中以偹春時之鬭也長安士女遊春野歩遇名花則設席藉草以紅裙逓相插挂以為宴幄寕王春時于後園中紉紅絲為繩密綴金鈴繫于花梢之上每有烏鵲翔集則令園吏掣鈴索以驚之盖惜花之故也増六一詩話梅聖俞嘗與范希文席上賦河豚詩春洲生荻芽春岸飛楊花河豚當是時貴不數魚蝦河豚常出於春暮羣游水上食絮而肥南人多與荻芽為羮云最美温公詩話先朝春月多召兩府兩制三館於後苑賞花釣魚賦詩嘉祐末仁宗復修故事羣臣和御製詩是日微隂寒韓魏公時為首相詩卒章云輕雲閣雨迎天仗寒色留春入壽杯二十年前曽侍宴台司今日喜重陪東坡集吳越王妃每嵗春必歸臨安王遺書曰陌上花開可緩緩歸矣吳人用其語為歌嵗時雜記一月二氣六候自小寒至榖雨四月八氣二十四候每候五日以一花之風信應之小寒一候梅花二候山茶三候水仙大寒一候瑞香二候蘭花三候山礬立春一候迎春二候櫻桃三候望春雨水一候菜花二候杏花三候李花驚蟄一候桃花二候棠梨三候薔薇春分一候海棠二候梨花三候木蘭清明一候桐花二候麥花三候柳花榖雨一候牡丹二候酴醿三候楝花楝花竟則立夏曲洧舊聞范蜀公居許作長嘯堂前有荼䕷架春時宴客花落酒杯中飲以大白舉坐無遺謂之飛英㑹東臯雜録花信風梅花風最先楝花風最後凡廿四番以為寒絶後唐人詩云楝花開後風光好梅子黄時雨意濃徐師川詩云一百五日寒食雨二十四番花信風又古詩云早禾秧雨初晴後苦楝花風吹日長蓬忩續録曲江宴唐進士㑹同年於此豪客園戸争以名花布道上進士乗馬盛服鮮製推同年俊少者為探花使白居易詩春風得意馬蹄疾一日看徧長安花道山清話哲宗御講筵手折一栁枝翫程頤為講官奏曰方春萬物發生之時不可非時毁折哲宗亟擲于地漁隐叢話蔡繁卿守揚州春時作萬花㑹用花十餘萬枝原遯齋閑覧河朔春時多大風飛塵撼木數日一作二三日方止以訪左右對曰不得是風且無年名曰吹花擘柳風草木百榖皆藉之増乾淳嵗時記禁中賞花非一先期後苑及修内司分任排辦凡諸苑亭榭花木妝㸃一新錦簾綃幕飛梭繡毬以至茵褥設放器玩盆窠珍禽異物各務竒麗起自梅堂賞梅芳春堂賞杏花桃源觀桃粲錦堂金林檎照妝亭海棠蘭亭修禊至于鍾美堂大花為極盛堂前三面皆以花石為臺各植名品臺後分植玉蘭繡毬數百株儼如鏤玉屏堂内左右各列三層雕花彩檻䕶以彩色牡丹畫衣間列碾玉水晶金壺及大食玻璃官窑等瓶各簮竒品如姚魏御衣黄照殿紅之類㡬千朶至于梁棟忩戸間亦以湘筒貯花鱗次簇插何翅萬朶自中殿妃嬪以至内官賞賜有差下至伶官樂部應奉人等亦霑恩賜謂之隨花賞至暮春則稽古㑹瀛堂賞瓊花静侶亭紫笑淨香亭采蘭挑筍則春事已在緑隂芳草間矣蔣苑使有小圃不滿二畝而花木匼匝亭榭竒巧春時悉以所有書畫玩器羅列滿前閙竿花藍之類悉皆縷絲金玉為之且立標竿射垜及鞦韆梭門闘雞蹴踘諸戲事以娛遊客衣冠士女至者招邀杯酒徃往禁煙乃已謂之放春湖山勝槩豐樂樓舊為衆樂亭又改聳翠樓政和中改今名淳祐間趙京尹重建宏麗為湖山冠又甃月池立秋千梭門植花木構數亭春時遊人繁盛清閒供春時晨起㸃梅花湯課奚奴灑掃䕶階苔取薔薇露浣手薫玉蕤香讀古赤文緑字書晌午採筍蕨供胡麻汲泉試新茗午後乗欵叚馬執翦水鞭携斗酒䨇柑往聴黄鸝日晡坐柳風前裂五色牋集錦嚢佳句薄暮遶徑灌花花史漢武帝嘗以吸花絲所織錦賜麗娟命作舞衣春暮宴于花下舞時故以䄂拂落花滿身都著舞態愈媚謂之百花舞宗測春逰山谷間見竒花異草則繫於𢃄上歸而圗其形狀名聚芳圗百花𢃄人多效之武陵儒生苖形事園池以接賓客有野春亭雜植山花五色錯列平湖上有龍湫山花爛熳不可枚舉近寺茅簷草舎皆繞植桃李春遊士女輻湊杯盤狼籍無不手撚花枝醉呼潦倒者西湖志杭州壽安坊俗稱官巷宋時謂之花市亦曰花圑盖汴京壽安山下多花園春時賞宴争華競侈錦簇繡圍移都後以花市比之故稱壽安坊今兩岸多賣花之家亦其遺俗也集藻賦御製春雨賦神籥絪緼化機和煦元氣上融醲膏下聚首五行者曰水潤萬物者惟雨于時蒼祗蒞節青鳥司晨餘寒未歛禁火方新風輕颺以習習雲密布而鱗鱗垂九霄之嘉澍飛四野之甘津始觸石以吐液旋彌空而散澤初曵縷以吹絲繼縁霤而滴墀乍密還疎欲斷又續拂宇披檐挹川注谷既磅礴而淋漓亦瀰漫而滲漉戞綺埓之明璣流銅池之文縠木欣欣以向榮草萋萋而如沐若夫徂畛徂隰是蓘是穮塍麥漸秀田禾始苖廣地道之發育資土脈之沃饒雖霑體而塗足幸渥葉而濡條况乃灌溉神州濊汪赤縣無逺弗届靡幽不徧灑郊牧而歡呼浃寰瀛而舞忭慶玉燭之長調喜豐年之屢見夫惟天地之德廣大無私春生夏長雲行雨施寓栽培于無意普美利于不知植品物以咸若含細大而莫遺所以觧澤徬徨湛恩深厚覆被民生惠鮮隴畝興有渰于三陽敷仙霖於千耦世並享夫豐亨俗咸登於仁壽洋洋乎造物之𢎞功予一人乎何有増晉夏侯湛春可樂賦春可樂兮樂東作之良時嘉新田之啟菜悦中疇之發菑桑冉冉以奮條麥遂遂以揚秀澤苖翳渚原卉耀阜春可樂兮樂崇陸之可娱登夷岡以迥眺超矯駕乎山隅綴雜花以為盖集繁蕤以餙裳散風衣之馥氣納戢懷之潜芳鶯交交以弄音翠翾翾以輕翔招君子以偕樂携淑人以微行周庾信春賦宜春苑中春已歸披香殿裏作春衣新年鳥聲千種囀二月楊花滿路飛河陽一縣併是花金谷從来滿園樹一叢香草足礙人數尺游絲即横路開上林而競入擁河橋而争度出麗華之金屋下飛燕之蘭宫釵朶多而訝重髻鬟高而畏風眉將柳而争緑面共桃而競紅影来池裏花落衫中苔始緑而藏魚麥纔青而覆雉吹簫弄玉之臺鳴佩凌波之水移戚里而家富入新豐而酒美石榴聊泛蒲桃醱醅芙蓉玉盎蓮子金杯新芽竹筍細核楊梅緑珠捧琴至文君送酒来玉管初調鳴絃暫撫陽春緑水之曲對鳯廻鸞之舞更炙笙簧還移筝柱月入歌扇花承節鼓協律都尉射雉中郎停車小苑連騎長楊金鞍始被柘弓新張拂塵看馬埓分朋入射堂馬是天池之龍種帯乃荆山之玉梁艶錦安天鹿新綾織鳯皇三日曲水向河津日晚河邉多觧神樹下流杯客沙頭度水人鏤薄窄衫䄂穿珠帖領巾百丈山頭日欲斜三晡未醉莫還家池中水影懸勝鏡屋裏衣香不如花文賦㪚句増晉𫝊𤣥陽春賦乾坤絪緼冲氣穆清幽蟄蠢動萬物樂生依依楊柳翩翩浮萍桃之夭夭灼灼其榮繁華􅁮而燿野煒芬葩而揚英湛方生懷春賦麥芃芃而含秀桑藹藹而敷榮華照灼以爛林葉婀娜以媚莖王廙春可樂賦春可樂兮樂孟月之初陽冰泮渙以微流土冐橛而觧剛野暄卉以揮緑山蔥蒨以發蒼李顒四時賦平臯眇莽中林蔥青野馬飛澗晨虹垂旌陽燕南徂隂鴈北征青華皓皓丹秀熒熒謝萬春遊賦青陽司候勾芒御辰陳條灌以摧枯初莖蔚其曜新羃豐葉而為幄靡翠草而成茵宋劉義恭感春賦天晻曖而流寒日隂翳而淪精風淑穆而吹蘭雨濛濛而洗莖草承澤而擢秀花順氣而飛馨梁元帝春賦洛陽小苑之西長安大道之東苔染池而盡緑桃含山而併紅露霑枝而重葉網縈花而曵風隋蕭慤春賦落花無限數飛鳥排花度禁苑玉饒風吹花春滿路唐王勃春思賦蜀川風候隔秦川今年節物異常年霜前柳葉銜霜翠雪裏梅花犯雪妍霜前雪裏知春早看栁看梅覺春好思萬里之佳期憶三秦之逺道澹蕩春色悠揚懷抱野何樹而無花水何隄而無草原宋之問春宴韋曲莊序萬株果樹色雜雲霞千畝竹林氣含煙霧激樊川而縈碧瀬浸以成波望太乙而鄰少微森然逼座鋪落花以為藉結垂楊而代幄霽景含日晩霞五彩而丹青韶光卷雲春臯一色而凝黛李邕春賦楊廻曲沼李雜芳園條煙濃而曵地花錦縟而當軒李白春夜宴桃李園序幽賞未已高談轉清開瓊筵以坐花飛羽觴而醉月惜餘春賦平原萋兮綺色愛芳草兮如翦惜餘春之將䦨每為恨而不淺五言古詩御製春旭日含新淑春光覆滿屋東皇轉嵗華融氣雜山谷増晉郭璞春青陽暢和氣谷風穆以温英茝􅁮林薈昆蟲咸啟門髙臺臨迅流四座列王孫羽盖停雲隂翠欝映玉樽齊謝朓新渚宛洛佳遨遊春色滿皇州結軫青郊路㢠瞰蒼江流日華川上動風光草際浮桃李成蹊徑桑榆䕃道周東都已俶載言歸望緑疇梁簡文帝春日年還樂應滿春歸思復生桃含可憐紫桞發斷腸青落花随燕入遊絲𢃄蝶驚邯鄲歌管地見許欲留情晩日後堂幔隂通碧砌日影度城隅岸柳垂長葉忩桃落細跗花留蛱蝶粉竹翳蜻蜓珠賞心無與共染翰獨踟蹰元帝春日新鶯隐葉囀新燕向忩飛柳絮時依酒梅花乍入衣玉珂逐風度金鞍映日暉無令春色晩獨望行人歸望春葉濃知柳密花盡覺梅踈蘭生未可握蒲小不堪書江淹當春四韻雷萌山中草雲煦江上花流煙漾璇景輕風泛凌霞我有幽蘭念銜意矚望斜友人殊未還獨慰檐前華虞羲春郊光風轉蕙畮香霧欝蘭津暄遲蝶弄蘤景麗鳥和春樵歌喧隴暮漁枻亂江晨山中芳杜若依依獨思人王筠春遊叢蘭已飛蝶楊柳未藏鴉物色相煎蕩微歩出東家既同翡翠翼復如桃李花欲以千金笑廻君流水車鮑泉春日新燕始新歸新蝶復新飛新花滿新樹新月麗新暉新光新氣早新望新盈抱新水新緑浮新禽新聴好新景自新還新葉復新攀新枝雖可結新愁詎觧顔蕭瑱春日貽劉孝綽澗水初流碧山櫻早發紅新禽争弄響落蕊亂從風拂檐多軟幹映户悉花叢誰云相去逺垂柳對髙桐聞人蒨春日髙䑓動春色清池映日華緑葵向光轉翠柳逐風斜林有鳴心鳥園多奪目花相與咸知節嘆子獨離家陳徐陵春日岸烟起暮色岸水𢃄斜暉徑狭横枝度簾揺驚燕飛落花承歩履流澗寫行衣何殊九枝盖薄暮洞庭歸周庾信詠春逍遙遊桂苑寂絶想桃源狭石分花徑長橋映水門管聲驚百鳥人衣香一園定知歡未足横琴坐樹根楊師道春朝閒歩休沐乗閒豫清晨歩百林池塘藉芳草蘭芷襲幽衿霧中分曉日花裏弄春禽野徑香恒滿山堦筍屡侵何須命輕盖桃李自成隂原唐李白春思燕草如碧絲秦桑低緑枝當君懷歸日是妾斷腸時春風不相識何事入羅幃増張子容春江花月夜林花發岸口氣色動江新此夜江中月流光花上春分明石潭裏宜照浣紗人王維贈裴十廸風景日夕佳與君賦新詩澹然望逺空如意方支頤春風動百草蘭蕙生我籬曖曖日暖閨田家来致詞欣欣春還臯淡淡水生陂桃李雖未開荑蕚滿芳枝請君理還䇿敢告将農時韓愈感春偶坐藤樹下暮春下旬間藤隂已可庇落蕊還漫漫亹亹新葉大瓏瓏晩花乾青天髙寥寥兩蝶飛翻翻時節適當爾懷悲自無端孟郊長安早春旭日朱樓光東風不驚塵公子醉未起美人争探春探春不為桑探春不為麥日日出西園祗望花柳色乃知田家春不入五侯宅獨孤及山中春思獺祭川水大人家春日長獨謠晝不暮搔首慚年芳靡草知節換含葩向新陽不嫌三徑深為我生池塘亭午井竈閒雀聲響空倉花落沒屐齒風動羣木香歸路雲水外天涯杳茫茫獨卷萬里心深入山鳥行芳景勿相廹春愁未遽忘權德輿春日戲題江春好游衍處處芳菲積綵舫入花津香車依柳陌緑楊煙褭褭紅蕊鶯寂寂如何愁思人獨與風光隔宋曽鞏和張友直城東春日東流抱孤城雨洗見春色風吹百草根道路千里碧莫盡溪漫漫波瀾散無跡遙林缺見山冉冉蒼藹積沙禽有行蹤文字不可識青松對桃李桃紅李花白紅白勢方競青青守巖側君意無不諧研談欲俱得賦詩多所陳炳若觀龜拆城東不待到衆物已歴歴朱子春日言懷春至草木變郊園猶掩扉兹晨與心㑹覧物徧芳菲桃蕚破淺紅時禽悦朝暉泉谷暖方融原田水初肥東作興庶甿嵗功始在兹端居適自慰世事復有期終然心所向農畝還當歸元吴師道徳興開化道中春晨氣澄穆雜卉香滿路百舌鳴髙林墟煙淡如霧農夫啟門出在野各有務行人獨何為憧憧自来去兩崖蒼石間湍水激清瀉山桃爛紅芳光影連上下春風忽怒起意乃媚行者飛花撲人来攬之欲盈把倪瓉春日雲林齋居池泉春漲深徑苔夕隂滿諷詠紫霞篇馳情華陽館晴嵐拂書幌飛花浮茗盌階下松粉黄忩間雲氣暖石梁蘿蔦垂翳翳行蹤斷非與世相違㝠栖乆忘返七言古詩増陳賀循庭中有竒樹三春節物始芳菲遊絲細草動春暉香風飄舞花間度好鳥和鳴枝上飛臨池間竹偏増緑依堦映雪紛如玉温室庭前竟不言鼓吹樓中能作曲曽聞逺别舊難思攀折㑹取贈佳期長條本自堪為𢃄密葉由来好作幃星稀漢轉月輪明徘徊夜鵲屡相驚欲識幽人蘭杜徑山忩芳桂復叢生唐文德后遊春曲上苑杏花朝日明蘭閨艶妾動春情井上新花偷面色簷前嫩柳效身輕花中去来看蝶舞樹上長短聴流鶯林下何湏逺借問出衆風流舊有名温庭筠陽春曲雲母空窓曉煙薄香昬龍氣凝暉閣霏霏霧雨杏花天簾外春威著羅幕曲䦨伏檻金麒麟沙苑芳郊連翠茵廐馬何能齧芳草路人不敢隨流塵惜春詞百舌問花花不語低回似恨横塘雨蜂争粉蕊蝶分香不似垂楊惜金縷願君留得長妖韶莫逐東風還蕩揺秦女含嚬向煙月愁紅𢃄露空迢迢原宋宼準江南春波渺𣺌栁依依孤村芳樹逺斜日杏花飛江南春