水春風無浪春天半雨半晴紅粉相随南浦晚幾含情宋張槃浣溪沙習習輕風破海棠鞦韆移影上廽廊晝長蝴蜨為誰忙度柳早鶯分暖綠過花小蝶𢃄春香滿庭芳草又斜陽髙觀國菩薩蠻春風吹綠湖邉草春光依舊湖邉道玉勒錦障泥少年遊冶時煙明花似繡且醉旗亭酒斜日照花西歸鴉花外啼程垓菩薩蠻畫橋泊泊春江綠行人正在春江曲花潤接平川有人花底眠東風原自好只怕催花老安得萬垂楊繋教春日長周密謁金門芳事晩數㸃杏鈿香淺惻惻輕寒風翦翦錦屏春夢逺穉栁拖煙嬌軟花影暗藏深院初試輕衫并畫扇牡丹紅未展李之儀好事近春到雨初晴正在小樓時節栁眼向人微笑傍䦨干堪折暮山濃淡瑣煙霏梅杏半明滅玉斚莫辭沉醉判歸時斜月唐歐陽炯清平樂春来階砌春雨如絲細春徑滿飄紅杏蔕春燕舞随風勢春幡細縷春繒春閨一㸃春燈自是春心撩亂非關春夢無憑宋王安國清平樂留春不住費盡鶯兒語滿地殘紅宫錦汚昨夜南園風雨小憐初上琵琶曉来思繞天涯不肯畫堂朱戸春風自在楊花王安中清平樂花時微雨未減春分數占取簾疎花密處把酒聴歌金縷斜風輕度濃香閒情正與春長向晩紅燈入坐嘗新青杏随觴盧祖臯西江月燕掠晴絲裊裊魚吹水葉􅉿􅉿禁街微雨灑芳塵寒食清明相近謾著宫羅試暖閒呼社酒酬春晚風簾幕悄無人二十四番花信毛滂西江月煙雨半藏楊柳風花初著桃花玉人細細酌流霞醉裏将春留下柳外鴛鴦作伴花邉蝴蝶為家醉翁醉也且由他月在栁橋花下周密西江月波影暖浮玉甃柳隂深鎖金鋪湘桃花褪燕調雛又是一番春暮碧桂情深鳯怨雲屏夢淺鶯呼繡忩人倦冷薫爐簾影揺揺亭午吴潜南柯子池水凝新碧欄花駐老紅有人獨倚橋東手把一枝楊桞繫春風鵲伴遊絲堕蜂黏落蕊空秋千庭院小簾櫳多少閒情閒緒雨聲中楊无咎於中好墻頭艶杏花初試繞珍叢細挼紅蕊欲知占盡春明媚悄無意看桃李持杯準擬花間醉一葉兩葉飛墮晚来旋旋深無地更聴得東風起毛滂蹋莎行階影紅遲柳苞黄徧纎雲弄日隂晴半重簾不捲篆香横小花初破春叢淺鳳繡猶重鴨爐長暖屛山翠入江南逺醉輕夢短枕閒欹綠忩窈窕風光轉元何可視蝶戀花金井啼鴉深院曉颺盡東風柳絮吹難了燕子多情相識早杏梁依舊䨇䨇到一縷沉煙簾幕悄滿眼飛花祗攪人懷抱十二玉樓春樹杪天涯不斷青青草宋俞國寳風入松一春長費買花錢日日醉湖邉玉驄慣識西湖路驕嘶􅂈沽酒樓前紅杏香中歌舞緑楊影裏秋千暖風十里麗人天花壓髩雲偏畫船載得春歸去餘情付湖水湖煙明日重扶殘醉来㝷陌上花鈿栁永木蘭花慢坼桐花爛熳乍疎雨洗清明正豔杏燒林緗桃繡野芳景如屛傾城盡尋勝賞驟雕鞍紺􅚫出郊坰風暖繁絃脆管萬家競奏新聲盈盈闘草蹋青人艶冶逓逢迎向路旁徃往遺簮墜珥珠翠縱横歡情對佳麗地任金罍罄竭玉山傾􅍆却明朝永日畫堂一枕春酲黄機喜遷鶯平湖百畆種滿湖蓮葉繞堤楊栁冉冉波光輝輝煙影空翠濕霑襟䄂静惬鄰雞啼午暖逼沙鷗眠晝西園路更紅塵不斷蝶酣蜂痩知否堪畫處野薺蕪菁罥地鋪茵繡桃李隂邉桑麻叢裏斜矗酒帘誇酒竹寺小依山趾茅店平窺津口春又晚正香風有客倚䦨搔首别録増汜勝之書栽樹正月為上時二月為中時三月為下時然棗鷄口槐兎目桑蝦蟇眼榆負瘤散其餘雜木䑕耳􅀢趄各其時凡種栽并插皆用此等形象本草凡採根物多以春月採者謂春初津潤始萌未衝枝葉勢力淳濃也春月移栽各樹宜上半月前則茂而結實移栽松柏槐柳桑柘橙橘各色樹皆可御定佩文齋廣羣芳譜卷一
