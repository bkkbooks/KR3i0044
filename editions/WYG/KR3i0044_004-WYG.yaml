body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷二天時譜正月立春雨水元日人日上元附見増禮記月令孟春之月日在營室昏參中旦尾中註日月㑹於娵訾而斗建寅之辰也是月也天氣下降地氣上騰天地和同草木萌動王命布農事命田舎東郊皆修封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教道民必躬親之田事既飭先定凖直農乃不惑梁元帝纂要正月孟春亦曰孟陽孟陬上春初春開春發春獻春首春首嵗初嵗開嵗發嵗獻嵗肇嵗芳嵗華嵗原花月令是月也迎春生櫻桃胎望春盈眸蘭蕙芳李能白杏花飾其靨増瓶史月表正月花盟主梅花寳珠茶花客卿山茶鐵幹海棠花使令瑞香報春木𤓰花歴正月瑞香烈徑草緑百花萌動彚考増詩豳風三之日于耜疏三之日三陽之月夏之正月也于耜徃修田器也禮記月令是月也天子乃以元日祈榖於上帝乃擇元辰天子親載耒耜措之于参保介之御間帥三公九卿諸侯大夫躬耕帝籍天子三推三公五推卿諸侯九推周禮天官上春詔王后帥六宫之人而生穜稑之種而獻之於王夏小正正月柳稊註稊也者發莩也梅杏杝桃則華註杝桃山桃也大戴禮孟春百草權輿國語太史順時􅓊土農祥晨正土乃脈發註農祥天駟即房星也晨正中也謂正月初也管子正月令農始作服於公田農耕及雪釋耕始焉芸卒焉原西京雜記戚夫人侍髙帝常以正月上辰出池邊盥濯食蓬餌以祓妖邪酉陽雜俎北朝婦人正月進箕帚長生花夢溪筆談正月陽氣始建兆乎萬物故曰登明續明道雜志紹聖戊寅嵗余在黄州見上元沽酒人頭已簪麥穗土人言當年不爾賞心樂事正月玉照堂賞梅叢奎閣賞山茶湖山尋梅攬月橋看新柳嵗華紀麗正月二十三日聖壽寺前蠶市張公詠始即寺為㑹使民鬻農器立春増禮記月令先立春三日太史謁之天子曰某日立春盛德在木天子乃齋立春之日天子親帥三公九卿諸侯大夫以迎春於東郊後漢書禮儀志立春日夜漏未盡五刻京師百官皆衣青衣郡國縣道官下至斗食令史皆服青幘立春旛施土牛耕人於門外以示兆民易通卦驗立春條風至冰觧楊柳津要覽列子御風常以立春歸於八荒是風至則草木發生玉泉記立春日取𢎞農冝陽金門山竹為管河内葭草為灰以候陽氣摭遺東晉李鄂立春日命以蘆菔芹芽為菜盤相餽貺四時寳鏡立春日春餅生菜號春盤景龍文館記正月八日立春内出綵花賜近臣武平一應制云鸞輅青旂下帝臺東郊上苑望春來黄鶯未觧林間囀紅蘂先從殿裏開畫閣條風初變柳銀塘曲水半含苔欣逢睿藻光韶律更促霞觴畏景催是日中宗手勅批云平一年雖最少文甚警新悦紅蘂之先開訝黄鶯之未囀循還吟咀賞嘆兼懷今更賜花一枝以彰其美所賜學士花竝令插在頭上後所賜者平一左右交插因舞蹈拜謝時崔日用乘酣飲欲奪平一所賜花上於簾下見之謂平一曰日用何為奪卿花平一跪奏曰讀書萬卷從日用滿口虚張賜花一枝學平一終身不獲上及侍臣大笑因更賜酒一杯當時嘆美齊人月令立春日食生菜取迎新之意東京夢華録立春日自郎官御史以上皆賜春旛勝入賀訖戴歸私第又士大夫家翦綵為春旛或綴於花枝之下或翦為春蝶春錢春勝以為戲東坡立春日亦簪旛勝過子由諸子姪笑指云伯伯老人亦簪花勝耶原摭言安定郡王立春日作五辛盤増修眞秘言立春日清朝北望有紫緑白雲者為三元君三素飛雲也蘇魏公作春帖子詞萬年枝上看春色三素雲中望玉宸熙朝樂事立春舉酒縷切粉皮雜以七種生菜供奉筵間盖古人辛盤之遺意焉雨水増孝經緯立春後十五日斗指寅為雨水七修類稿雨水正月中天一生水春始屬木然生木者必水也元日増舊唐書姚璹傳長壽二年元日大雪上謂羣臣曰元日雪百榖豐此語有何故實璹曰汜勝之書雪是五榖之精四民月令梅花酒元日服之却老風土記元日食五辛以煉形以助五臟原裴𤣥新語正旦縣官殺羊懸其頭於門又磔雞以疈之俗説以厭厲氣𤣥以問河南伏君伏君曰是月土氣上升草木萌動羊嚙百草雞啄五榖故殺之以助生氣荆楚嵗時記正月一日進椒栢酒飲桃湯進屠蘇酒膠牙餳下五辛盤造桃版著户謂之仙木按四民月令云􅂈臘一日謂之小嵗拜賀君親進椒酒椒是玉衡星精服之令人身輕耐老栢是仙藥成公子安椒花銘則曰肇惟嵗首月正元日厥味惟珍蠲除百疾是知小嵗則用之漢朝元正則行之桃者五行之精厭伏邪氣制百鬼也董勛云俗有嵗首用椒酒椒花芬香故采花以貢樽風俗記正旦楚人上松柏頌周庾信有柏葉銘清異録咸通後士風尚於正旦未明佩紫赤嚢中盛人参木香如豆樣時時傾出嚼吞之至日出乃止號迎年佩石湖詩註成都元日滴酥為花熬芋為栁葉三夕張燈如上元熙朝樂事正月朔日簽柏枝於柿餅以大橘承之謂之百事大吉人日増景龍文館記景龍四年七日宴大明殿賜王公以下綵縷人勝李嶠應制詩桂吐半輪迎此夜蓂開七葉應今朝蘇頲詩七葉仙蓂承月吐千林御栁拂烟開崔日用詩曲江苔色冰前液上苑梅香雪裡飄荆楚嵗時記正月七日為人日以七種菜為羮翦綵為人或鏤金箔為人以貼屏風亦戴之頭鬢又造花勝以相遺登髙賦詩上元増明皇雜録唐上元夜宫人以黄羅包柑遺近臣謂之傳柑宴原影燈記洛陽人家造芋郎君食之宜男女荆楚嵗時記正月望日作豆糜以祀門戸先以栁枝插門随枝所指以酒脯飲食及豆粥插箸而祭聞見近録紹聖二年上元幸集禧觀出宫花賜從駕臣僚各數十枝時人榮之集藻原梁昭明太子錦𢃄書北斗周天送𤣥𡨕之故節東風拂地啟青陽之芳辰梅花舒兩嵗之装柏葉汎三光之酒増宋張耒人日飲酒賦嵗後七日其名曰人愛此嘉名飲酒歡欣豈竹木之始和生庶彚而施仁明倪謙早春賦漏暖信於梅枝兮見天心之来復窺韶光于栁眼兮騐百卉之囬緑顧起元元夕賦霧漵風隄乍旖旎以醒柳霜墟冰嶠尚参差而落梅五言古詩増梁沈約初春夹道覔陽春相将共携手草色猶自腓林中都未有無事逐梅花空教信楊柳且復歸去来含情寄杯酒周宗懔蚤春昨暝春風起今朝春氣来鶯鳴一兩轉花樹數重開散粉成初蝶翦綵作新梅遊客三千里無暇上髙䑓隋薛道衡人日入春纔七日離家已二年人歸落鴈後思發在花前唐白居易立春後五日立春後五日春態紛婀娜白日斜漸長碧雲低欲墮殘冰折玉片新萼排紅顆遇物盡欣欣愛春非獨我迎芳後園立就暖前簷坐還有惆悵心欲别紅爐火七言古詩増唐李賀正月樂詞上樓迎春新春歸暗黄著栁宮漏遲薄薄淡靄弄野姿寒緑幽風生短絲錦牀曉臥玉肌冷露臉未開對朝暝官街栁帯不堪折早晩菖蒲勝綰結五言律詩御製元夜與諸王宴飲乾清宫今夕丹帷宴聨翩集懿親傳柑宜令節行葦樂芳春香泛紅螺重光揺絳蠟新不須歌湛露明月足留人増唐虞世南奉和獻嵗讌宫臣履端初啓節長苑命髙筵肆夏喧金奏重潤響朱絃春光催栁色日彩泛槐烟微臣同濫吹謬得仰鈞天盧照鄰元日述懷筮仕無中秩歸耕有外臣人歌小嵗酒花舞大唐春草色迷三徑風光動四鄰願得長如此年年物候新髙紹晦日宴髙氏林亭嘯侣入山家臨春翫物華葛絲調緑水桂醑酌丹霞岸柳開新葉庭梅落早花興洽林亭晩方還倒載車嚴維晦日宴遊晦日湔裾俗春樓致酒時山公還已醉謝客舊能詩溪栁薫晴淺巖花待閠遲為邦乆無事比屋自熙熙白居易新居早春静巷無来客深居不出門鋪沙蓋苔面掃雪擁松根漸暖宜閒歩初晴愛小園見花都未有唯覺樹枝繁曹松立春春日一杯酒便吟春日詩木梢寒未覺地脈暖先知鳥轉星沉後山分雪薄時寕無翦花手贈與最芳枝宋呂夷簡江南立春灰律何時應江春昨夜来細風先動柳殘雪不藏梅餘冷迷清管微和發凍醅閉門無客到樽俎為誰開宋伯仁嵗旦居閒無賀客早起但如常桃版随人換梅花隔嵗香春風回笑語雲氣卜豐穰柏酒何勞勸心康壽自長元趙孟頫早春谿上春無賴清晨坐水亭草芽随意緑柳眼向人青初日收濃霧微波亂小星誰歌採蘋曲愁絶不堪聼七言律詩増唐韋元旦奉和立春遊苑迎春應制㶚涘長安恒近日殷正臘月早迎新池魚戯葉仍含凍宫女裁花已作春向苑雲疑承翠幄入林風若起青蘋年年斗柄東無限願挹瓊觴壽北辰馬懷素奉和立春遊苑迎春應制元籥飛灰出洞房青郊迎氣肇初陽仙輿暫下宜春苑御醴行開薦壽觴映水輕苔猶隐緑緣隄弱栁未輸黄惟有裁花飾簪鬢恒随聖藻狎年光杜甫立春春日春盤細生菜忽憶兩京梅發時盤出髙門行白玉菜傳纎手送青絲巫峡寒江那對眼杜陵遠客不勝悲此身未知歸定處呼兒覔紙一題詩戴叔倫和汴州李相公勉人日喜春年来日日春光好今日春光好更新獨獻菜羮憐應節遍傳金勝喜逢人烟添柳色看猶淺鳥踏梅花落已頻東閣此時聞一曲翻令和者不勝春原韋莊立春青帝東來日馭遲暖烟輕逐曉風吹罽袍公子樽前覺錦帳佳人夢裏知雪圃乍開紅菜甲綵幡新翦緑楊絲殷勤為作宜春曲題向花牋貼繡楣増宋韓琦至和乙未元日立春元日難逢是立春普天誰不喜佳辰一年氣候均諸節萬卉芳菲實九旬柏葉始傾為壽酒土牛随示力耕人故隂盡革無餘臘端朔陽来慶共新蘇軾正月二十日往岐亭郡人潘古郭三人送予於女王城東禪莊院十日春寒不出門不知江桞已揺村稍聞決決流冰谷盡放青青沒燒㾗數畆荒園留我住半瓶濁酒待君温去年今日關山路細雨梅花正斷魂范成大立春日郊行竹擁溪橋麥葢坡土牛行處亦笙歌麴塵欲暗垂垂栁醅面初眀淺淺波日滿縣前春市合潮平浦口暮帆多春来不飲兼無句奈此金旛綵勝何陸游立春前一日作開年化日已舒長漸見風和鳥變吭冒土萱芽穿嫩緑拂橋栁色弄輕黄重温壽酒屠蘇釅探借春盤餅餌香不入城門今㡬嵗遥知車馬正怱忙立春日日出風和宿醉醒山家樂事滿餘齡年豐臘雪經三白地暖春郊已遍青菜細簇花宜薄餅酒香浮螘瀉長瓶湖村好景吟難盡乞與侯家作畫屏朱淑眞立春停杯不飲待春来和氣先春動六街生菜乍挑宜捲餅羅幡旋翦稱聨釵休論殘臘千重恨管入新年百事諧從此對花并對景盡拘風月入詩懷元程鉅夫和王寅夫郎中元日立春馬蹄塵裏度芳辰𢃄得陽和到七閩山翠倚天迎好客風光滿地屬吟身髙情古桞仍青眼時態夭桃自絳脣從此不憂江海逺春官䄂有十分春楊維楨嬉春體今朝立春好天氣况是太平朝野時走向南隣覔酒伴還從西墅買花枝陶令乆辭彭澤縣山公祗愛習家池宜春帖子題贈爾日日春遊日日宜西子湖頭春色濃望湖樓下水連空栁條千樹僧眼碧桃花一株人面紅天氣渾如曲江節野人正是杜陵翁得錢沽酒勿復較如此好懷誰與同五言排律増唐冷朝陽立春玉律傳佳節青陽應北辰土牛呈嵗稔綵燕表年春臘盡星廻次寒餘月建寅風光行處好雲物望中新流水初銷凍潛魚欲振鱗梅花将柳色偏思越鄉人明吳兆元旦書事閩中風景麗元旦百花開有岸皆縈草無波不染苔樹光揺粉堞雲彩照金罍濃黛新年㸃春衣隔嵗裁夜爐藏宿火曉燭翦殘灰䄂裏分餘蕙釵邉罥落梅松枝當户插淑氣拂窓来正好隨懽笑那知客思催五言絶句御製春盤小摘園中露新香糁作羮嵗和欣有兆甘莱已春生増唐杜甫瀼西果園正月喧鶯未兹辰放鷁初雪籬梅可折風樹桞微舒李中早春一種和風至千花未散妍草心竝栁眼長是被恩先儲嗣宗早春野樹花初發空山獨見時踟蹰歴陽道鄉思滿南枝宋朱子立春前一日