日水重則其月雨多輕則少初一五鼓束髙長草把燒之名照庭火伺燒将過看向何方倒所向之方其年必熟乃以大椽重舉抛丢聴其聲則衆和曰一跌田禾盛茂二跌五榖滿倉三跌六畜成羣四跌人口和平如此随口説不拘㡬跌元日牛俱卧則苖難立半卧半起嵗中平俱立則五榖熟臞仙神隐立春天隂無風民安蠶麥十倍東風吉人民安果榖盛種植大麥杏豌豆芋移栽棣棠梔子木香紫薇白薇玫瑰銀杏櫻桃錦𢃄金雀木蘭榆柏柳松槐貼接蠟梅黄薔薇梅插壓木樨杜鵑培壅石榴梨海棠澆灌桃瑞香杏李整頓燒荒田耕禾地燒苜蓿根理蔬畦壟瓜畦整農具修花圃糞田畆修樹諸果樹修去低小亂枝勿分木力則結子肥大元旦五鼓以斧斫諸果樹則結子繁而不落辰日亦可李樹石榴以石安丫中堆根下則結子繁元旦雞鳴時以火照諸樹無蟲此時蟲尚未出凡聚葉腐枝皆蟲所穴宜去之收採絡石菊根田忌天火子地火戌糞忌未九焦辰荒蕪巳二月驚蟄春分春社中和節花朝附見増禮記月令仲春之月日在奎昏弧中旦建星中註日月㑹於降婁而斗建卯之辰也始雨水桃始華是月也耕者少舎乃修闔扇寢廟畢備毋作大事以妨農之事梁元帝纂要是月曰仲春亦曰仲陽花月令是月也桃夭棣棠奮薔薇登架海棠嬌梨花溶木蘭競秀瓶史月表二月花盟主西府海棠玉蘭緋桃花客卿繡絿杏花花使令寳相花種田紅木桃李花月季花翦春羅花厯玉蘭觧紫荆繁彚考増詩豳風四之日舉趾同我婦子饁彼南畆田畯至喜四之日其蚤獻羔祭韭夏小正二月徃耰黍禪傳禪禪也榮堇采蘩傳榮堇菜也采蘩蘩由胡由胡者繁母也皆豆實也榮芸時有見稊始收傳有見稊而後始收是小正序也晉書樂志二月之管名為夾鐘者夾佐也謂時物尚未盡出隂德佐陽而出物也淮南子二月官倉其樹杏注二月興農播榖故官倉也白虎通援神契曰仲春獲禾報社祭稷以三牲何重功故也原説文卯冒也二月萬物冒地而出象開門之形故二月為天門増羯鼓録𤣥宗嘗遇二月初詰旦巾櫛方畢時當宿雨初晴景色明麗小殿内庭栁杏将吐覩而歎曰對此景物豈得不與他判斷之乎左右相目将命偹酒獨髙力士遣取羯鼓上旋命之臨軒縱擊一曲曲名春光好神思自得及顧栁杏皆已發拆上指而笑謂嬪御曰此一事不喚我作天公可乎嬪御侍官皆呼萬嵗夢溪筆談二月物生根魁故曰天魁晁氏客話望杏而耕以杏花時為耕候也成都古今記二月有花市暇日記二月白蘋水風土記浙風俗言春序正中百花競放乃逰賞之時宋制守土官於花朝日出郊勸農賞心樂事二月現樂堂瑞香玉照堂西湘梅南湖挑菜玉照堂紅梅餐霞軒櫻桃花杏花荘杏花綺互亭千葉茶花驚蟄増易解卦天地解而雷雨作雷雨作而百果草木皆甲拆前漢書五行志雷出地則長養華實發揚隐伏宣盛陽之德論衡雷二月出地百八十日雷出則萬物出春分増淮南子天地之氣莫大扵和和者隂陽調日夜分而生物春分而生秋分而成生之與成必得和之精白虎通眀庶風春分至王者正封疆修田疇農家諺二月昏參星夕杏花盛桑葉白荆楚嵗時記春分日民竝種戒火草扵屋上有鳥如烏先雞而鳴架架格格民候此鳥則入田以為候風俗記鼓者春分之音以助萬物發生王褒僮約二月春分被隄杜疆落桑披㯶種𤓰作瓠别茄披蔥原集韻鶗鴂鳥名春分鳴則衆芳生秋分鳴則衆芳歇社原禮記月令擇元日命民社注社后土也使民祀焉神其農業也増禮記祭法共工氏之覇九州也其子曰后土能平九州故祀以為社周禮疏春社以祈膏雨望五榖豐熟原北史李士謙傳士謙宗族豪盛二社㑹宴飲醉喧嘩至士謙所盛饌盈前先設黍曰孔子稱黍為榖之長荀卿亦云食先黍稷寕可違乎少長肅然退相謂曰既見君子乃覺吾徒不德增臞仙神隐社日祭五榖之神提要錄社翁祈雨不食舊水故社日必有雨謂之社翁雨陸龜蒙詩㡬㸃社翁雨一番花信風中和節増舊唐書德宗夲紀詔曰四序嘉辰歴代増置漢崇上已晉紀重陽朕以春方發生候及仲月勾萌畢達天地和同俾其昭蘇宜助暢茂自今宜以二月一日為中和節内外官司休假一日貞元六年二月百寮㑹宴曲江亭上賦中和節羣臣賜宴七韻是日進兆人夲業三卷司農獻黍粟各一斗新唐書李泌傳帝以前世上巳九日皆大宴集而寒食多與上巳同時欲以三月名節自我為古若何而可泌請廢正月晦以二月朔為中和節因賜大臣戚里尺謂之裁度民間以青嚢盛百榖瓜果種相問遺號為獻生子里閭醸宜春酒以祭勾芒神祈豐年百官進農書以示務夲帝悦乃著令與上巳九日為三令節中外皆賜緍錢燕㑹花朝増提要録二月十五日為花朝翰墨記洛陽風俗以二月二日為花朝節士庶遊玩又為挑菜節秦中嵗時記二月二日曲江采菜士民遊觀極盛誠齋詩話東京二月十二日曰花朝為撲蝶㑹乾淳嵗時記二月二日宫中排辦挑菜御宴先是預偹朱綠花斛下以羅帛作小卷書品目於上繫以紅絲上植生菜薺花諸品俟宴酧樂作自中殿以次各以金箆挑之后妃皇子貴主媫妤及都知等皆有賞無罰以次每斛十號五紅字為賞五黒字為罰上賞則成號真珠玉盃金器北珠箆環珠翠領抹次亦鋌銀酒器冠鋜翠花叚帛龍涎御扇筆墨官窑定器之類罰則舞唱吟詩念佛飲冷水吃生薑之類用此以資戯笑王宫貴邸亦多傚之熙朝樂事二月二日士女皆𢃄蓬葉諺云蓬開先百草戴了春不老二月十五為花朝節盖花朝月夕世俗恒言二八兩月為春秋之中故以二月為花朝八月為月夕也原成都志二月十五為花朝為撲蝶㑹蜀人又以是日鬻蠶於市因作樂縱觀謂之蠶市壺中贅録閩中以二月二日為踏青節蜀中以為踏草節宣府志宣府花朝節村民以五榖𤓰果種相遺謂之獻生城中婦女翦綵為花插之鬢髻以為應節集藻文賦㪚句増漢張衡歸田賦仲春令月時和氣清原隰鬱茂百草滋榮魏曹植節遊賦仲春之月百卉叢生萋萋藹藹翠葉朱莖竹林青蔥珍果含榮感氣運之和順樂時澤之有成原梁昭明太子錦𢃄書節應佳辰時登令月和風拂迥淑氣浮空走野馬於桃源飛少女于李徑花明麗日光浮竇氏之機鳥弄芳園韻響王喬之管増唐侯喜中和節賦我后令節中和孔嘉凍已全解桃仍欲華慶賞之多宴樂既均于九有播植之始教化爰貞于四遐四言古詩原隋牛𢎞春祈稷歌粒食興教播厥有先尊神致潔報本惟䖍瞻榆束耒望杏開田用憑戬榖式詠豐年五言古詩増唐德宗中和節日宴百寮賜詩韶華啓仲序初吉諧良辰肇兹中和節式慶天地春􅂬酣朝野同生德區宇均雲開灑膏露草疏芳河津嵗華方載陽東作方肆勤慚非薫風唱曷用慰吾人東風變梅柳萬彚生春光中和紀月令方與天地長耽樂豈予尚懿兹時景良庶遂亭育恩同致寰海康君臣永終始交泰符隂陽曲沼水新碧華林桃稍芳勝賞信多􅂬戒之在無荒五言律詩増唐王勃仲春郊外東園垂柳徑西堰落花津物色連三月風光絶四鄰鳥飛村覺曙魚戲水知春初晴山院裏何處染囂塵白居易春村二月村園暖桑間戴勝飛農夫舂舊榖蠶妾擣新衣牛馬因風逺雞豚過社稀黄昏林下路鼓笛賽神歸宋徐鉉春分日仲春初四日春色正中分緑野裴回月晴天斷續雲燕飛猶箇箇花落已紛紛思婦髙樓晩歌聲不可聞邵雍二月吟林下故無知唯知二月期酒嘗新熟後花賞半開時只有醺酣趣殊無爛熳悲誰能将此景長貯在心脾張栻仲春過陽江亭子亭古危臨岸林幽巧近城煙容随雨住花片著溪清春事已如許客懷誰與傾庭前㡬株樹滿意欲敷榮戴復古社日今朝當社日明日是花朝佳節惟宜飲東池適見招緑深楊栁重紅透海棠嬌自笑鬢邉雪多年不肯消原柳州月泉東風生意閙農圃正宜勤稲種開包曬菊苖依譜分疇西曉耕雨舎北暮鉏雲莫待荒三徑歸歟陶令君明張祥鳶天氣近寒食村居逺市朝翠低新栁弱紅潤穉花嬌聴鳥頻移榻看雲偶􅂈橋隔村春社至㑹赴野人招七言律詩増唐李商隐二月二日二月二日江上行東風日暖聞吹笙花鬚栁眼各無賴紫蝶黄蜂俱有情萬里憶歸元亮井三年從事亞夫營新春莫悟遊人意更作風簷夜雨聲原宋李公麟千尋古櫟笑聲中此日春風屬社公開眼已憐花壓帽放懷聊喜酒治聾携刀割肉餘風在卜瓦傳神俚俗同聞説已栽桃李徑隔溪遥認淺深紅増元洪希文春半採花芳菲著雨便成苔問訊東君㡬日囬閠月不曽花下去今朝偶到樹邉来㡬何間濶鸎偏老如此生疎蝶也猜流水時光容易􅂈舉頭枝上已青梅方太古社日出遊村村社鼓隔溪聞賽祀歸来客半醺水緩山舒逢日暖花明栁暗貎春分平田白洫流新雨絶壁青楓挂斷雲䇿杖提壺随所適野夫何不可同羣明曹大章二月郊南桞色春淡雲晴靄動芳辰霏霏花氣偏随酒嫋嫋鶯歌觧和人野舫醉乗明月渡芳洲情與白鷗馴武陵溪水深㡬許笑逐桃花欲問津七言絶句原唐韓愈賽神白布長衫紫領巾差科未動是閑人麥苗含穗桑生葚共向田頭樂社神増白居易二月二日二月二日新雨晴草芽菜甲一時生輕衫細馬春年少十字津頭一字行原張籍吳楚歌詞庭前春鳥啄林聲紅夹羅􅃭縫未成今朝社日停針線起向朱櫻樹下行張演社日村居鵞湖山下稲粱肥㹠穽雞棲對掩扉桑柘影斜春社散家家扶得醉人歸宋王安石南浦南浦東岡二月時物華撩我有新詩含風鴨緑􅉿􅉿起弄日鵞黄裊裊垂黄庭堅觀化竹笋纔生黄犢角蕨芽初長小兒拳試㝷野菜炊香飯便是江南二月天范成大春日田園雜興社下燒錢鼓似雷日斜扶得醉翁廻青枝滿地花狼籍知是兒孫鬪草来増范成大社日獨坐海棠雨後沁臙脂楊柳風前撚緑絲香篆結雲深院静去年今日燕来時方岳社日燕子今年掯社來翠瓶猶有去年梅丁寜莫管杏花俗付與春風一道開金完顔璹春半喜晴隂寒二月雪含雲両日開晴淑景新借問海棠紅㡬許杏花楊柳不曾春原明陸樹聲熙熙麗日開青野漠漠平疇散碧波山鳥一聲催布榖緑楊隂裏聼農歌増王衡花朝晴煙膏露若為容躑躅香苞望曉紅莫怨五更風色惡開花原是落花風原曹勲羅綺生香散隐霞春光不譲五侯家東風二月蘇隄路樹樹桃花間柳花詩㪚句増宋謝靈運山桃發紅蕚野蕨漸紫苞唐德宗東風變梅栁萬彚生春光周庾信新年鳥聲千種囀二月楊花滿路飛原唐唐彦謙二月雲煙迷栁色九衢風土𢃄花香寒郊二月初離别獨倚寒林嗅野梅増鄭谷和暖又逢挑菜日寂寥未是探花人宋邵雍年年二月凭髙處不見人家只見花陸游數㸃霏㣲社公雨兩叢濃淡女郎花元趙孟頫二月江南鸎亂飛百花滿樹栁依依葉顒燕子不来春又半一簾花雨海棠時明吳稼證三春花事終難負二月風光半未􅂈唐杜甫社雨報豐年釋皎然二月湖南春草遍宋陳與義二月山城未見花别録原占候十二日晴則百果實十五日為勸農日晴主年豐又為花朝晴則百果實春分日風從震来榖熟麥賤人安年豐青雲嵗豐前後一日内有雷主嵗稔原種植榖黍稷薥秫韭椒蔥夏蘿蔔梨瓠子王瓜絲瓜菠菜苦蕒莧山藥萵苣稍瓜茼蒿生菜茄冬瓜紫蘇四月芥西瓜香芋銀杏十様錦落花生芝蔴藕枸杞翦春羅黄精决眀松萱草山丹蜀葵罌粟荼䕷柏桑椹紅花麗春黄葵金錢翦秋羅金鳯絡蔴老少年移栽萆蔴映山紅茄萵苣各色藤菜甘露雪梅堆栗百合苦蕒薤石榴十姊妹慈菰木瓜茱茰甘菊松梧桐葡萄薄荷黄精牛蒡槐紫荆木槿芙蓉萱花凌霄杜鵑桑海棠山茶玉簮迎春玫瑰菊石竹望江南苧蔴芭蕉貼接桃李梨花紅梅杏柑海棠丁香柿栗桑插壓石榴芙蓉梔子梨葡萄瑞香木槿薔薇壅培木樨灌溉櫻桃芍藥牡丹瑞香橙橘收採蔞蒿蕨芽板蕎蕎筆管菜白芨薺菜百合馬蘭頭蠶豆苖甘遂薯蕷王不留行黄精榆皮人参枸杞蒲公英黄蘗雲母薹菜白石英石葦葉白芷白蘞甘草紫石英狼毒根麝香猪苓地黄金銀花麥門冬白术當歸知母天門冬苧根牛膝香附茯苓茯神黄連狗脊藳夲茅香根升麻黄芩紫苑萆薢金雀花前胡防己大黄巴㦸天秦皮地榆天雄杜仲丁香柴胡楝實蓬蒿桂皮虎杖整頓去樹裹架葡萄田忌天火夘地火酉九焦丑糞忌戌荒蕪酉御定佩文齋廣羣芳譜卷二
