body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜巻三天時譜三月寒食清明上巳榖雨附見增禮記月令季春之月日在胃昏七星中旦牽牛中註日月會於大梁而斗建辰之辰也桐始華萍始生乃為麥祈實是月也生氣方盛陽氣發泄勾者畢出萌者盡逹不可以内命野虞毋伐桑柘鳴鳩拂其羽戴勝降于桑註蠶將生之候也具曲植籧筐后妃齋戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事梁元帝纂要三月曰季春亦曰暮春末春晚春原花月令是月也白桐榮荼䕷條逹牡丹始繁麥吐華楝花應候楊入大水為萍增瓶史月表三月花盟主牡丹滇茶蘭花碧桃花客卿川鵑梨花木香紫荆花使令木筆薔薇謝豹丁香七姊妹郁李長春花歴三月木筆書空棣蕚韡韡海棠睡繡毬落彚考增詩豳風蠶月條桑取彼斧斨以伐逺揚周頌嗟嗟保介維暮之春亦又何求如何新畬於皇來牟將受厥明註暮春斗柄建辰夏正之三月也夏小正三月參則伏攝桑萎楊傳攝桑攝而記之急桑也萎楊楊則花而後記之采識傳識草也祈麥實傳麥者五榖之先見者故急祈而記之也拂桐芭傳拂也者桐芭之時也或曰言桐芭始生貎拂拂然也淮南子三月官鄉其樹李昏張中則務種榖汜勝之書三月榆莢舒四民月令三月杏花盛可菑白沙輕土之田風土記三月雨謂之迎梅初學記三月雨曰榆莢雨夢溪筆談三月華葉從根而生故曰從魁賞心樂事三月花院月丹花院桃柳蒼寒堂西緋碧桃滿霜亭北棣棠碧宇觀筍芳草亭觀草鬬春堂牡丹芍藥宜雨堂千葉海棠艷香館林檎花院紫牡丹宜雨堂北黄薔薇瀛巒勝處山花經寮鬭茶羣仙繪幅樓芍藥聞見近錄故事季春上池賜生花自上至從臣皆簮花而歸演繁露三月花開時風名花信風初汎觀則似謂此風來報花之消息耳按吕氏春秋曰春之得風風不信則其花不成乃知花信風者風應花期其來有信也寒食原四民月令齊人呼寒食為冷節寒食以麫為蒸餅様團棗附之名曰棗餻鄴中記并州俗冬至後百五日為介子推斷火冷食三日荆楚嵗時記去冬至一百五日即有疾風甚雨謂之寒食增玉燭寳典寒食為大麥粥研杏仁為酪引餳沃之酉陽雜俎寒食賜近臣麥粥帖綵毬鏤鷄子原零陽總記蜀人遇寒食用楊桐葉并細冬青葉染飯色青而有光食之資陽氣道家謂之青精乾䭀食今俗以夾麥青草搗汁和糯米作青粉團烏桕葉染烏飯作糕是此遺意金門嵗節洛陽人家寒食日裝萬花輿煮桃花粥增揮麈後錄朱新仲少仕江寧在王彦昭幕中有代彦昭春日留客致語云寒食止數日間才晴又雨牡丹蓋數種枝欲拆又芳皆魯公帖與牡丹譜中全語也乾淳嵗時記清明前三日為寒食節都城人家皆插柳滿簷雖小坊幽曲亦青青可愛大家則加棗䭅於柳上然多取之湖堤有詩云莫把青青都折盡明朝更有出城人熙朝樂事清明前兩日謂之寒食人家插柳滿簷青蒨可愛男女亦咸戴之諺云清明不戴柳紅顔成皓首清明原素問清明次五日牡丹華四民月令清明節令蠶妾理蠶室是月也杏花盛種百榖志林東坡在黄州夢參寥誦所作新詩覺而記兩句云寒食清明都過了石泉槐火一時新夢中曰火固新矣泉何故新荅曰俗以清明日淘井春明退朝錄周禮四時變火唐惟清明取榆柳火以賜近臣戚里宋朝惟賜大臣順陽氣也增提要錄清明雨為杏花雨嵗時雜記清明湖州進紫筍茶東京夢華錄清明日都人出郊徃徃就芳樹之下或園囿之間羅列杯盤互相勸酬抵暮而歸各擕名花異果山亭戲具謂之門外土儀轎子即以楊柳雜花裝簇頂上四垂遮映緩入都門斜楊御柳醉歸院落明月梨花最為盛景是月季春萬花爛熳牡丹芍藥棣棠木香種種上市賣花者歌呌之聲清竒可聽榖雨孝經緯清明後十五日斗指辰為榖雨言雨生百榖也牡丹譜洛陽以榖雨為牡丹開候而一百五者長至一百五日開最先溫公文集註洛陽人謂榖雨為牡丹厄居家宜忌榖雨日採茶炒藏能治痰𠻳及療百病熱疾上巳原後漢書禮儀志三月上巳日官民皆禊於東流水上宋書禮志魏以後但用三日不復用已韓詩外傳鄭國之俗上巳於溱洧之上招魂續魄秉蘭草祓除不祥荆楚嵗時記上巳日取鼠麴汁蜜和粉謂之龍舌䉽以厭時氣千金月令三月三日上踏青履增洛陽圖經上巳日婦女以薺花㸃油祝而灑之水上若成龍鳳花卉之狀則吉謂之油花卜酉陽雜爼唐中宗三月三日賜侍臣細柳圈言帶之免䘍毒原賞心樂事三月三日男女皆戴薺花諺云三春戴薺花桃李羞繁華五色線荆楚嵗時記三月三日四民踏百草今人因有鬭百草之戲鄭谷詩云何如鬬百草賭取鳳凰釵集藻文賦散句原梁昭明太子錦帶書景逼徂春時臨變節啼鶯出谷争傳求友之音翔蘂飛林競散佳人之靨晉張協洛禊賦夫何三春之令月嘉天氣之氤氲和風穆以布暢百卉􅁮而敷芬阮瞻上巳賦臨清川而嘉讌聊假日以遊娛䕃朝雲而為蓋托茂樹以為廬好修林之蓊鬱樂草莽之扶疎列肆筵而設席祈吉祥于斯塗增􅂤文帝晚春賦待餘春于北閤藉髙讌于南陂水篩空而照底風入樹而香枝嗟時序之廻斡歎物候之推移望初篁之傍嶺愛新荷之發池石憑波而倒植林隐日而横垂蕭子範家園三日賦懽兹嘉月恱此時良庭散花蘂傍插筠篁灑𤣥醪于沼沚浮絳棗于泱泱觀翠淪之出沒戲青舸之低昻周庾信三日華林園馬射賦于時𤣥鳥司歴蒼龍馭行羔獻氷開桐華萍合皇帝幸于華林之園千乘雷動萬騎雲屯落花與芝蓋同飛楊柳共春旗一色原唐王勃三月上巳祓禊序遲遲風景出沒媚於郊原片片仙雲逺近生於林薄雜花争發非止桃蹊羣鳥亂飛有踰鶯谷王孫春草處處争鮮仲阮芳園家家竝翠於是􅂝㫖酒列芳筵先祓禊於長洲却申交於促席王維暮春逍遙谷讌集序巖谷先曙羲和不能信其時芳卉後春勾芒不能一其令桃徑窈窕蘅臯超忽驂御延佇于叢薄珮玉升降于蒼翠蕭頴士蓬池禊飲序禊逸禮也鄭風有之蓋取諸勾萌發逹陽景敷煦握芳蘭臨清川乘和蠲絜用徼介祉厥義存矣四言古詩增晉張華三月三日後園會暮春元日陽氣清明祁祁甘雨膏澤流盈習習祥風啟滯導生禽鳥翔逸卉木滋榮纎條被綠翠華合英五言古詩御製時廵近郊憫農事有作芳郊景物麗淑氣扇暮春靈雨應良節光風薄佳辰省耕已届候夙駕方來廵前驅列式道羽衛羅鈎陳時有田間子荷耒披車塵譏訶勿頻數疾苦當咨詢千耦幸終畆二鬴猶懸囷穮蓘爾勤動痌瘝予隠親賙賜出泉府拊循屬官臣行潦有挹器冽井無枯津所恵良未徧嗛嗛愧斯人增宋謝恵連三月三日曲水集四時著平分三春禀融爍遲遲和景婉夭夭園桃灼攜朋適郊野昧爽辭㕓郭斐雲興翠嶺芳飊起華薄解轡偃崇丘藉草遶廻壑際渚羅時􅉡託波汎輕爵宋鮑照三日氣暄動心思栁青起春懷時艷憐花藥服浄俛登臺提觴野中飲愛心烟未開露包染春草泉源潔氷苔泥泥濡露條嫋嫋承風栽鳬雛掇苦薺黄鳥銜櫻梅解衿欣景預臨流競覆杯美人竟何在浮心空自摧原梁􅂤文帝三日侍宴林光殿曲水詩芳年多美色麗景復妍遙握蘭惟是旦採艾亦今朝廻沙溜碧水曲岫散桃夭綺花非一種風絲亂百條雲起相思觀日照飛虹橋繁華炫姝色燕趙艷妍妖金鞍汗血馬寳髻珊瑚翹蘭馨起縠袖蓮錦束瓊腰相㸔隐綠樹見人還自嬌玉桂鳴羅薦渠枕泛廻潮洛濵非拾羽滿握詎貽椒晚春紫蘭葉初滿黄鶯哢不稀石蹲還似獸蘿長更如衣水曲文魚聚林暝雅鳥飛渚蒲變新節巖桐長舊圍風花落未已山齋開夜扉沈約三日率爾成篇麗日屬元巳年芳具在斯開花已匝樹流鶯復滿枝洛陽繁華子長安輕薄兒東出千金堰西臨鴈騖陂清晨戲伊水薄暮宿蘭池寧憶春蠶起日暮桑欲萎增庾肩吾三日侍蘭亭曲水宴策星依夜動鑾駕總朝遊旌門臨苑樹相風出鳳樓春生露泥泥天覆雲油油桃花舒玉澗柳葉暗金溝禊川分曲沼帳殿掩芳洲踴躍頳魚出參差絳棗浮百戲俱臨水千鍾共逐流隋蕭慤春晚春庭聊縱望樓臺自相隐窓梅落晚花池竹開新筍泉鳴知水急雲來覺山近不愁花不飛到畏花飛盡唐白居易寒食洛下宴遊贈馮李二少尹豐年寒食節美景洛陽城三尹皆强健七日盡晴明東郊蹋青草南園攀紫荆風折海榴艷露墜木蘭英假開春未老宴合日屢傾珠翠混花影管絃藏水聲佳會不易得良辰亦難并聽吟歌暫輟㸔舞杯徐行米價賤如土酒味濃於餳此時不盡醉但恐負平生殷勤二曹長各捧一銀觥崔䕶郡齋三月下旬作春事日巳歇池塘曠幽尋殘紅披獨墜嫩綠間淺深偃仰捲芳褥顧歩愛新隂謀春未及竟初夏遽見侵溫庭筠寒食節日寄楚望芳蘭無意綠弱柳何窮縷心斷入淮山夢長穿楚雨繁花如二八好月當三五愁碧竟平臯韶紅換幽圃流鶯隐員樹乳燕喧餘哺曠望戀層臺離憂集環堵當年不自遣晚得終何補鄭谷有樵蘇歸來要腰斧宋歐陽修暮春幽憂無以銷春日静愈長薰風入花骨花枝午低昻徃來採花蜂清蜜未滿房春事已爛熳落英漸飄揚蛺蝶無所為飛飛助其忙啼鳥亦屢變新音巧調簧遊絲最無事百尺拖晴光天工施造化萬物感春陽陸游春晚書齋壁海棠已成雪桃李不足言纎纎麥被野鬱鬱桑連村穉蠶細如螘杜宇號朝昏展墓秫餌美坐社黍酒渾早筍漸上市青韭初出園老夫下箸喜盡屏鷄與豚幽居亦何樂且洗兩耳喧呼兒燒柏子悠然坐東軒原明文徴明妍英弄芳意麗色含春姿物華浩無涯駘蕩東風吹東風日已熙草色日已滋青春萬里道遊子有所思浮雲漏白日宿露朝已晞攀條惜婉麗忽得瑛瓊枝芳踪未有托暮景已西馳菁華難復恃結蘤聊自怡七言古詩增唐宋之問寒食陸渾别業洛陽城裏花如雪陸渾山中今始發旦别河橋楊柳風夕卧伊川桃李月伊川桃李正芳新寒食山中酒復春野老不知堯舜力酣歌一曲太平人王維寒食城東即事清谿一道穿桃李演漾綠蒲涵白芷谿上人家凡㡬家落花半落東流水蹴踘屢過飛鳥上鞦韆競出垂楊裏少年分日作遨遊不用清明兼上巳李賀三月樂詞東方風來滿眼春花城栁暗愁殺人複宫深殿竹風起新翠舞衿浄如水光風轉蕙百餘里暖霧驅雲撲天地軍裝宫妓掃蛾淺搖搖錦城夾城暖曲水飄香去不歸梨花落盡成秋苑宋邵雍三月吟滿城盡日行春去言念行春還有數真宰何曾不發生遊人其奈無憑據梨花著雨漫成啼柳絮因風争肻住一片清明好意多奈何意好難分付明楊基清明㸔花吉祥寺裏千堆錦綠髪仙人對花飲腰鼔金盤五色藍醉歸猶帶花枝寢東風壬子㡬清明三百年來寺已傾沙河塘上癡兒女猶頌錢塘太守名㸔花我亦逢壬子况是清明非偶爾莫論南浦與西湖楚水吳山正相似青蓮居士識前因金粟如來見後身總不能知塵外劫也須曾是會中人原何景明長安三月百花殘滿城飛絮何漫漫千門萬戸東風起陌上河邊春色闌美人髙樓鎻深院白花濛濛落如霰晴窓窈窕朝日遲亂入簾櫳趂䨇燕遊絲相牽時裊裊委地飄廊不須掃君不見江頭綠葉吹香綿隨波化作浮萍草五言律詩御製春日内苑賜宴詩并序己未三月律應姑洗望日之吉賜内閣大臣及侍衛宴於内苑時乃玩花於絳雪玉樹含風浮杯於西齋金池漾月飲酒樂甚因率題四韻以示羣臣春深内苑裏珍席宴羣臣蝶向雙檐舞花飛複閣新和羮期上佐調鼎協洪鈞簫鼓歡無極芳年醉此辰增唐李益春晚賦得餘花落留春春竟去春去花如此蝶舞遶應稀鳥驚飛詎已衰紅辭故蕚繁綠扶凋蘂自委不勝愁庭風那更起原栁中庸寒食春暮越江邊春隂寒食天杏花香麥粥柳絮伴鞦韆酒是芳菲節人當桃李年不知何處恨已解入筝弦張又新三月五日泛長沙東湖上巳餘風景芳辰集逺坰湖光迷翡翠草色醉蜻蜓鳥弄桐花日魚翻榖雨萍從今留勝會誰㸔畫蘭亭增項斯晚春花隂洞日光薄花開不及時當春無半樹經燒足空枝踈與香風會細將泉影移此中人到少開盡㡬人知原唐彦謙上巳寄韓八上巳接寒食鶯花寥落晨微微潑火雨草草踏青人涼似三秋景清無九陌塵與余同病者對此合傷神增宋余靖暮春草帶全鋪翠花房半墜紅農家榆莢雨江國鯉魚風堤柳綿争撲山櫻火共烘長安少年客不信有衰翁蘇軾雨晴散歩雨過浮萍合蛙聲滿四隣海棠真一夢梅子欲嘗新拄杖間挑菜鞦韆不見人殷勤木芍藥獨自殿餘春張九成晚春即事幽事晚山色幽齋春雨餘亂紅欹澗水浮綠漲郊墟北牖迸新筍西園生野蔬槿籬遶茅屋已分老樵漁范成大寒食郊行隴麥欣欣綠山桃寂寂紅帆邊魚蕝浪木末酒旗風信歩隨芳草迷途問小童賞心添脚力呼渡過溪東陸游山家暮春遶屋清隂合緣堤綠草纎起蠶初放食新麥已磨鎌苦筍先調醬青梅小蘸鹽佳時幸無事酒盡更湏添戴昺次韻春事海棠紅未了又近牡丹時送日多忙事酬春欠好詩暖風吹麥早晴晷轉花遲不盡清遊興重為上巳期陳與義寒食草草隨時事蕭蕭傍水門濃隂花照野寒食柳圍村客袂空佳節鶯聲忽故園不知何處笛吹恨滿清尊僧契嵩山亭晚春小庭晚來静林石自巉巉犬去吠人語花飛恣鳥銜晴煙熏茂草照日藹髙杉更喜圑圎月清光下碧巖明李禎三月四日即景忽忽春將暮俄過三月三草誰憐益母花自媚宜男乍到尋巢燕初眠上箔蠶新茶與穉筍鄉味憶江南七言律詩增唐皇甫冉三月三日義興李明府後亭泛舟江南烟景復如何聞道新亭更可過處處藝蘭春浦綠萋萋藉草逺山多壺觴須就陶彭澤風俗猶傳晉永和更使輕橈徐轉去微風落日水增波杜牧殘春獨來南亭因寄張祐暖雲如粉草如茵獨歩長堤不見人一嶺桃花紅錦黦半溪山水碧羅新髙枝百舌猶欺鳥帶葉梨花獨送春仲蔚欲知何處在苦吟林下拂詩塵溫庭筠寒食日作紅深綠暗逕相交抱暖含芳披紫袍綵索平時牆婉娩輕毬落處晚寥梢窓中草色妬鷄卵盤上芹泥憎燕巢自有玉樓芳意在不能騎馬度煙郊原李山甫寒食柳帶東風一向斜春隂淡淡蔽人家有時三㸃兩㸃雨到處十枝五枝花萬井樓臺疑繡畫九原珠翠似烟霞年年今日誰相問獨卧長安泣嵗華來鵬清明日與友人遊玉粒塘莊㡬度春山共陸郎清明時節好風光細穿綠荇船頭滑碎踏殘花屐齒香風急嶺雲飄迥野雨餘田水落芳塘不堪吟罷東回首滿耳蛙聲正夕陽寒食山館書情獨把一杯山館中每經時節恨飄蓬侵堦草色連朝雨滿地梨花昨夜風蜀魄啼來春寂寞楚魂吟後月䑃朧分明記得還家夢徐孺宅前湖水東增韓偓春盡日樹頭初日照西簷樹底蔫花夜雨霑外院池亭聞動鎻後堂闌檻見垂簾栁腰入戸風斜倚榆莢堆牆水半淹把酒送春惆悵在年年三月病厭厭原韋莊長安清明早是傷春暮雨天可憐芳草更芊芊内官初賜清明火上相閑分白打錢紫陌亂嘶紅叱撥綠楊髙映畫鞦韆遊人記得承平事暗喜風光似昔年增宋王禹偁寒食今年寒食在商山山裏風光亦可憐稚子就花拈蛺蝶人家依樹繋鞦韆郊原曉綠初經雨巷陌春隂乍禁烟副使官閑莫惆悵酒錢猶有撰碑錢韓琦上巳瓊林苑賜筵春光濃簇寳津樓樓下新波漲鴨頭嘉節難逢真上巳賜筵榮入小瀛洲仙園雨過花遺靨御陌風長絮作毬褉飲不須辭巨白清明來日尚歸休蔡襄上巳日杭州東園地上多于枝上花東樓凝望惜年華潮頭正對伍員廟燕子争歸百姓家粉籜漸髙山徑筍綠旗初展石巖茶流芳自與人兼老尊酒相逢莫重嗟原歐陽修清明賜新火魚鑰侵晨放九門天街一騎走紅塵桐花應候催佳節榆火推恩忝侍臣多病正愁餳粥冷清香但愛蠟烟新自憐慣識金蓮燭翰院曾經七見春曹組寒食輦下海棠時節又清明塵歛烟收雨乍晴㡬處青帘沽酒市一竿紅日賣花聲綵毬時向梭門過繡轂遥隨輦路行日暮人人醉歸去熙熙春物見昇平范成大上巳日萬嵗池呈程詠之濃春酒暖絳烟霏漲水天平雪浪遲綠岸翻鷗如北渚紅塵躍馬似西池麥苖翦翦嘗新麫梅子雙雙帶折枝試比長安水邊景祇無饑客為題詩陸游春晚雨足人家插稻秧蠶生隣女採桑黄萬花掃迹春將暮百草吹香日正長間覓啼鶯穿北崦戲隨飛蝶過東岡飄然且喜身强健不怪兒曹笑老彊楊萬里寒食雨作雙燕衝簾報禁烟喚驚晝夢聳詩肩晚寒正與花為地曉雨能令水作天桃李海棠聫病眼清明寒食又經年老來不辦雕新句報荅風光且一篇三月十日纔㸔桃李錦城圍忽便園林綠作堆逺草將人䨇眼去飛花引蝶過牆來簿書節裏無多著懷抱朝來得好開已是七分春去了何須鳥語苦相催吳龍翰春晚郊行芒鞋竹杖出柴闗簡㸃園林脚不閒翠幄初張花作局錦棚成列筍為班烟波鷗鷺春風外桑柘牛羊夕照間野興不湏邀客共芳樽濁酒對黄山許月卿三月三月春如年少時了知造化最兒嬉智行無事柳飛絮道發自然花滿枝錦繡園林添富貴神仙院落鬭清竒老天長似春三月游戲人間不皺睂元王惲清明日錦隄行樂浪說蘭亭禊事修年年春好錦隄遊花翻舞袖驚歌板柳隔髙城暗酒樓綠樹恐應春事老金鞭重為使君留竹西路晚歸時醉何處珠簾半上鈎李孝光次晚春韻燕幕沉沉春晝永間敲碁子小闌東拍天漲緑連朝雨滿地殘紅昨夜風草際夢回詩有債柳邊寒薄絮無功韶光暗換千年事莫遣閒愁著鬢中明楊基江村寒食預折楊枝插繞簷荳糜香軟麥餳甜春衣未染新絲織午篆猶分舊火添小雨送春青見萼輕雷催筍碧抽尖不因人逺傷離别那得春愁上短髯沈周上巳日漫作和風晴日正宜春碧柳紅桃得得新老謝祓除何故事健追行樂有間身鄰翁採薺分家小遊女揉花打路人不限長安水邊好太平隨地總堯民五言排律増唐白居易春末間出乘輕屐徐行踏軟沙觀魚傍湓浦㸔竹入楊家林迸穿籬筍藤飄落水花雨埋釣舟小風颺酒旗斜嫰剥青菱角濃煎白茗茶淹留不知夕城樹欲棲鴉五言絶句御製途次逢寒食何處來春風淡蕩開晴旭不見杏花紅纔逢柳梢緑増唐嚴維江南三月江南季春天蓴菜細如弦湖邊草作逕湖上葉如船原劉禹錫春晚思悠哉花葉自相催漠漠空中去何時天際來増崔道融春晚三月寒食時日色濃于酒落盡牆頭花鶯聲隔原柳寒食夜滿地梨花白風吹碎月明大家寒食夜獨貯望鄉情七言絶句御製清明巳日纔從江岸行舟中還復度清明上林聞道花遲發留與歸時聽早鶯清明登玉泉山寒食登髙芳草青泉聲映柳覆春亭心中懷得天然處對對沙鷗樂野汀原唐沈佺期上巳日祓禊渭濵應制寳馬香車清渭濵紅桃碧柳禊堂春皇情尚憶垂竿佐天祚先呈捧劍人増錢起暮春歸故山草堂谷口殘春黄鳥啼辛夷花盡杏花飛始憐幽竹山窓下不改清隂待我歸原韓翃寒食日即事春城無處不飛花寒食東風御柳斜日暮漢宫傳蠟燭輕烟散入五侯家增竇鞏襄陽寒食寄宇文籍烟水初銷見萬家東風吹柳萬條斜大隄欲上誰相伴馬踏春泥半是花武元衡陌上暮春青青南陌柳如絲柳色鶯聲晚日遲何處最傷游客思春風三月落花時韓愈晚春草樹知春不久歸百般紅紫鬬芳菲楊花榆莢無才思惟解漫天作雪飛杜牧春晚題韋家亭子擁鼻侵襟花草香髙臺春去恨茫茫蔫紅半落平池晚曲渚飄成錦一張溫庭筠三月十八日雪中作芍藥薔薇語早梅不知誰是艷陽才今朝領得東風意不復饒君雪裏開方干寒食日百花香氣傍行人花底垂鞭日易曛野父不知寒食節穿林轉壑自燒雲成彦雄暮春日宴溪亭寒食尋芳遊不足溪亭還醉綠楊烟誰家花落臨流樹數片殘紅到檻前宋邵雍禁烟題錦屏山下二首寒食風烟錦屏下凭髙把酒興何如滿川桃李風妍􅆺不忍重為風破除無涯桃李待清明經嵗方能開得成不念化工曾著力狂風何故苦相陵秦觀三月晦日節物相催各自新癡心兒女挽留春芳菲歇去何湏恨夏木隂隂正可人張来晚春睡足髙簷春日斜碾聲初破小龍茶樓邊緑樹飛紅盡春色牆隂老薺花范成大三月四日驟暖日脚融晴晚氣暄睡餘初覺薄羅便如何柳絮沾泥處暖似槐隂轉午天春晚客去鈎窓詠小詩遊絲撩亂柳花稀微風盡日吹芳草蝴蝶䨇䨇貼地飛夕陽槐影上簾鈎一枕清風夢昔遊夢見錢塘春盡處碧桃花謝水西流楊萬里三月廿七日送春只餘三日便清和儘放春歸莫恨他落盡千花飛盡絮留春不住欲如何王鎡深春夾泥花上舊巢邊翠箔桑空蠶又眠天氣乍晴風候别坐㸔盆藕出䨇錢燕子來時春又休暖風吹緑上枝頭繡簾不隔荼䕷月香影無人自入樓僧道潜春晚曉風池沼水瀾翻春盡淮南麥秀寒院落無人日停午柳花如雪滿闌干金髙士談寒食燕泥半落烏衣巷柳色全添綠綺窓且伴丁香過寒食弄晴蝴蝶一䨇䨇元宋褧春詞嬌春楊柳暗藏鴉掩映文窓一樹花寒食清明都過了悄無車馬問儂家詩散句增齊邢子才芳春時欲遽覽物惜將移新萍已冒沼餘花尚滿枝唐王維年光三月裏宫殿百花中李嘉祐清明桑葉小度雨杏花飛韋應物晴明寒食好春園百卉開原賈島晴風吹柳絮新月起厨烟白居易三月草萋萋黄鶯歇又啼增溫庭筠晚風楊葉社寒食杏花村司空圖人家寒食月花影午時天宋徐鉉東風不好事吹落滿庭花韓琦春寒芳意晚未見柳飛綿楊萬里荔子園園花寒食日日雨原唐李白江邊石上誰知處綠戰紅酣别是春杜甫落花遊絲白日静鳴鳩乳燕青春深劉禹錫草色淺深圍幄幕花枝上下逐鞦韆胡曾金絡馬銜原上草玉釵人折路傍花崔魯杏酪漸香隣舍粥榆烟欲變舊爐灰韓偓惻惻輕寒翦翦風杏花飄雪小桃紅張泌青草浪髙三月渡綠楊花撲一溪烟弱柳未勝寒食雨好花争奈夕陽天韋莊錦江風散霏霏雨花市香飄漠漠塵宋韓琦白楊花落眠蠶老紅杏枝殘笑靨圓興慶池頭三月三柳如拖綬草如衫晏殊夾道桃花新過雨馬蹄無處避殘紅蘇舜欽春隂垂野草青青時有幽花一樹明歐陽修杯盤餳粥春風冷池館榆錢夜雨新九門寒食多遊騎三月春隂正養花王安石已著單衣猶禁火海棠花下怯黄昏蕭蕭三月閉柴荆綠葉隂隂忽滿城蘇軾北城寒食烟火微落花蝴蝶作團飛藍尾忽驚新火後遨頭要及浣花前謝逸㸃㸃花飛春事晚青青芳草暮愁生增范成大桃杏滿村春似錦踏歌椎鼔過清明石門柳綠清明市洞口桃花上巳山元龔繡今年石湖好清明每樹梨花香雪晴周權杜宇青山三月暮桃花流水一溪雲馬臻潑火雨晴餳粥冷落花風暖筍輿輕原唐劉禹錫楚香寒食橘花時陸羽人買山茶先榖雨李商隐粥香餳白杏花天增宋徽宗茸母初生識禁烟邵雍三月初三花正開上巳觀花花意濃原蘇軾火冷餳稀杏粥稠詞増宋謝懋憶少年池塘綠遍王孫芳草依依斜日遊絲捲晴晝繋東風無力蜨趁幽香蜂釀蜜秋千外卧紅堆碧心情費消遣更梨花寒食劉克莊憶秦娥逰人絶緑隂滿野芳菲歇芳菲歇養蠶天氣采茶時節枝頭杜宇啼成血陌頭楊栁吹成雪吹成雪淡烟疎雨江南三月趙長卿畫堂春小亭烟柳水溶溶野花白白紅紅惱人池上晚來風吹損春容又是清明天氣當年小院相逢凭欄幽思㡬千重殘杏香中原賀鑄柳梢青子規啼血可憐又是春歸時節滿院春風海棠鋪繡梨花飛雪丁香露泣殘枝悄未比愁腸寸結自是休文多情多感不干風月李清照怨王孫帝里春晩重門深院草綠堦前暮天鴈斷樓上逺信誰傳恨綿綿多情自是多沾惹難􅂸捨又是寒食也鞦韆巷陌人静皎月初斜浸梨花明王世貞玉樓春是誰約勒東君去枝上曉聲寒杜宇柔綠猶能抵死留妖紅不解逡廵住灞陵一陣飄香雨宛轉玉驄蹄下土記他含蘂拆苞時總有千金無贖處宋趙令畤蝶戀花欲減羅衣寒未去不捲珠簾人在深深處紅杏枝頭花㡬許啼痕止恨清明雨盡日水沉香一縷宿酒醒遲惱破春情緒飛燕又將歸信誤小屏風上西江路增趙善扛十拍子柳絮飛時綠暗荼䕷開後春酣花外青帘迷酒思陌上晴光收翠嵐佳辰三月三解佩人逢㳺女踏青草鬭宜男醉倚畫欄欄檻北夢繞清江江水南飛鸞與共驂原明葉道卿鳳凰閣遍園林綠暗渾如昨翠幄下無一片是花萼可恨狂風横雨忒煞情薄盡底把韶華送却楊花無奈是處穿簾透幕豈知人意正蕭索春去也這般愁沒處安著怎奈何黄昏院落王世貞青玉案鴨頭波染濃于酎風起處紅香青皺乳燕䨇䨇簾幙透梨花未雪緑楊猶絮蠶飽桑隂瘦無端釀出清明候忽憶城南乍分手十二闌干寒更陡踏青人逺鬭茶時近滋味如中酒宋辛棄疾祝英臺近寳釵分桃葉渡烟柳暗南浦陌上層樓十日九風雨斷腸㸃㸃飛紅都無人管倩誰喚流鶯聲住鬢邊覻試把花卜歸期纔簮又重數羅帳燈昏哽咽夢中語是他春帶愁來春歸何處又不解帶將愁去滿江紅家住江南又過了清明寒食花徑裏一畨風雨一畨狼籍紅粉暗隨流水去園林漸覺清隂宻算年年落盡刺桐花寒無力庭院静空相憶無處說閒愁極怕流鶯乳燕得知消息尺素如今何處也綠雲依舊無踪跡謾教人羞去上層樓平蕪碧增李琳六么令淡煙疎雨香逕渺啼鴂新晴畫簾閑卷燕外寒尤力依約天涯芳草染得春風碧人間陳迹斜陽今古㡬縷逰絲趁飛蝶誰向尊前起舞又覺春如客翠袖折取蔫紅笑與簮華髮回首青山一㸃簷外寒雲疉梨花著雨柳花飛絮夢繞闌干滿園雪施岳曲逰春畫鼔西泠路占栁隂花影芳意如織小楫衝波度麯塵扇底粉香簾隙岸轉斜陽隔又過盡别船簫笛傍斷橋翠繞紅圍相對半篙晴色頃刻千家暮碧向沽酒樓前猶繫金勒乘月歸來正梨花夜縞海棠烟幕院宇明寒食醉乍醒一庭春寂任滿身露濕東風欲眠未得别錄原占候三月有三卯宜豆無則麥不收月内有暴水謂之桃花水主多梅雨無則無清明有水而渾主髙低田大熟雨水調朔日值清明草木茂值榖雨主年豐上巳聽蛙聲上晝呌上鄊熟下晝呌下鄉熟終日呌上下齊熟聲啞低田熟聲響低田澇種植榖黍芝蔴薏苡黑豆御麥棉花白扁豆蠶豆刀豆紅豆葫蘆茄豇豆落花生生菜菠菜菘菜茼蒿葱山藥穄瓠子茭筍稍𤓰香芋蘿蔔韭王𤓰南𤓰冬𤓰菜𤓰蘘荷茴香薑大豆銀杏葡萄薤土𤓰荸薺芋香菜櫻桃枸杞椒紫蘇白蘇天茄望江南梨菊牛旁鳳仙薄荷玫瑰十様錦藕栗百合雞冠山丹紅花紫草薇獨帚萆麻子石竹罌粟商陸葵决明麻移植石榴地黄楊梅木瓜梧桐柑橘夜合冬青寳相檜桑海棠橙菱木槿麗春玉簮杉槐芙蓉薔薇秋海棠芭蕉楮梔子木香醒頭香紫萼貼接柑柚橙橘玉蘭棗香櫞柿接桃桐接栗杏接梅收採筆管菜藤花椿芽蔞蒿蒲公英槐芽菊芽金雀花薺菜黄楝芽牛膝蕨芽葵菜藜菜㸔麥娘黄連芽葛花灰莧薇菜斜蒿老鸛嘴蓬蒿芽水苔紫草車前葉牛舌科厚朴紫花王瓜鈎藤天笳苖鴈兒腸狗􅆃土瓜荆芥碎米薺天門冬芫花白附子澤蘭川芎芽紫參根防葵榖精草艾紫葛根皮紫背浮萍夏枯草蕪荑實白术青葙莖葉澤漆莖葉羊躑躅白薇根𤣥參小水萍桑寄生黄芩防風芽射干根整頓開溝渠犁秧田理花棚浸稻出菖蒲鋤蒜㧞蓬製用千金月令三月三日採艾挂户風乾以備醫藥四時纂要三月三日取桃花片至七月七日和烏雞血塗面與身萬花谷三月三日宜沐枸杞湯便民要纂三月採夏枯草煎汁熬膏治逺年損傷田忌天火午地火申九焦戌荒蕪丑糞忌辰御定佩文齋廣羣芳譜卷三
