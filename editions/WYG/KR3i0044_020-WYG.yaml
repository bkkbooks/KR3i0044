body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷十八茶譜茶一原茶鶴山集云茶之始其字為荼玉篇云荼除加切一名檟一名茗一名荈爾雅云檟苦荼注云早采者為茶晚取者為茗一名荈蜀人名之苦荼一名蔎方言云蜀西南人謂荼曰蔎樹如𤓰蘆葉如梔子花如白薔薇而黄心清香隱然實如栟櫚蔕如丁香根如胡桃有髙一尺者有二尺者有數丈者有兩人合抱者出巴山峽川有建州大小龍團始於丁謂成於蔡君謨宋太平興國二年始造龍鳯茶龍鳯茶餅上飾以龍鳯紋也供御者以金装成咸平中丁為福建漕監造御茶進龍鳯團慶厯中蔡端眀為漕始造小龍團茶歐陽永叔聞之曰君謨士人也何至作此事自後熈寧末有㫖下建州製蜜雲龍一品尤為竒絶蜀州雀舌鳥嘴麥顆蓋嫩芽所造似之又有片甲者早春黄芽葉相抱如片甲也蟬翼葉輭薄如蟬翼也洪州鶴嶺茶其味極妙蜀之雅州蒙山頂有露芽穀芽皆云火前者言採造於禁火之前也火後者次之一云雅州蒙頂茶其生最晚在春夏之交常有雲霧覆其上若有神物䕶持之又有五花茶者其片作五出花雲脚出袁州界橋其名甚著不若湖州之研膏紫筍烹之有緑脚垂下又紫筍者其色紫而似筍唐徳宗每賜同昌公主饌其茶有緑花紫英之號草茶盛於兩浙日注第一自景祐以來洪州雙井白芽製作尤精逺在日注之上遂為草茶第一宜興㴩湖出含膏宣城縣有丫山形如小方餅横鋪茗芽産其上其山東為朝日所燭號曰陽坡其茶最勝太守薦之京洛人士題曰丫山陽坡横文茶一名瑞草魁又有建州北苑先春洪州西山白露安吉州顧渚紫筍常州宜興紫筍陽羡春池陽鳯嶺睦州鳩坑劒南石花露鋑芽籛芽南康雲居峡州小江園碧澗􅀢眀月􅀢芳蘂􅀢茱萸􅀢東川神泉小團昌眀獸目福州方山露芽夔州香山江陵楠木湖南衡蘄州蘄門團黄夀州霍山黄芽六安州小峴春皆茶之極品玉壘關外寳唐山有茶樹産懸崖筍長三寸五寸方有一葉兩葉太和山騫林茶初泡極苦澀至三四泡清香特異人以為茶寳涪州出三般茶最上賓化製於早春其次白馬最下涪陵收茶在四月嫩則益人粗則損人真者用箬煙燻過氣味尤佳増茶經茶之出山南以峽州上峽州生逺安宜都夷陵三縣山谷襄州荆州次襄州生南鄣縣山谷荆州生江陵縣山谷衡州下生衡山茶陵二縣山谷金州梁州又下金州生西城安康二縣山谷梁州生襄城金牛二縣山谷淮南以光州上生光山縣黄頭港者與峡州同義陽郡舒州次生義陽縣鍾山者與襄州同舒州生太湖縣潛山者與荆州同壽州下盛唐縣生霍山者與衡山同也蘄州黄州又下蘄州生黄梅縣山谷黄州生麻城縣山谷並與荆州梁州同也浙西以湖州上湖州生長興縣顧渚山谷與峽州光州同生山桑儒師二寺白茅山懸脚嶺與襄州荆南義陽郡同生鳯亭山伏翼閣飛雲曲水二寺啄木嶺與夀州常州同生安吉武康二縣山谷與金州梁州同常州次常州義興縣生君山懸脚嶺北峯下與荆州義陽郡同生圈嶺善權寺石亭山與舒州同宣州杭州睦州歙州下宣州生宣城縣雅山與蘄州同太平縣生上睦臨睦與黄州同杭州臨安於潛二縣生天目山與舒州同錢塘生天竺靈隱二寺睦州生桐廬縣山谷歙州生婺源山谷與衡州同潤州蘇州又下潤州江寧縣生傲山蘇州長洲縣生洞庭山與金州梁州蘄州同劒南以彭州上生九隴縣馬鞍山至徳寺棚口與襄州同緜州蜀州次緜州龍安縣生松嶺關與荆州同其西昌昌眀神泉縣西山者并佳有過松嶺者不堪採蜀州青城縣生丈人山與緜州同青城有散茶木茶卬州次雅州瀘州下雅州百丈山名山瀘州瀘川者與金州同也睂州漢州又下睂州丹挍縣生鐵山者漢州緜竹縣生竹山者與潤州同浙東以越州上餘姚縣生瀑布泉嶺曰仙茗大者殊異小者與襄縣同眀州婺州次眀州鄞縣生榆莢村婺州東陽縣生東目山與荆州同台州下台州曹縣生赤城者與歙州同黔中生恩州播州費州夷州江南生鄂州袁州吉州嶺南生福州建州韶州象州福州生閩方山山隂縣也茶譜卬州有火井思安建州有先春龍焙渠江有薄片巴東有真香福州有柏巖常之陽羡婺之舉巖丫山之陽坡龍安之騎火黔陽之都濡瀘州之納溪梅嶺之數者其名皆著大觀茶論白茶自為一種與常茶不同其條敷闡其葉瑩薄崖林之間偶然生出非人力所可致有者不過四五家生者不過一二株所造止於二三銙而已芽英不多尤難蒸焙湯火一失則已變而為常品湏製造精微運度得宜則表裏昭徹如玉之在璞它無與倫也東溪試茶録白葉茶民間大重出於近歲園焙時有之地不以山川逺近發不以社之先後芽葉如紙民間以為茶瑞柑葉茶樹髙丈餘徑頭七八寸葉厚而圎狀類柑橘之葉其芽發即肥乳長二寸許為食茶之上品早茶亦類柑葉發常先春民間採製為試焙者也細葉茶葉比柑葉細薄樹髙五六尺芽短而不乳今生沙溪山中蓋土薄而不茂也稽茶葉細而厚密芽晚而青黄晚茶蓋稽茶之類發比諸茶晚生於社後叢茶亦曰蘖茶叢生髙不數尺一歲之間發者數四貧民取以為利宣和北苑貢茶録南唐采茶北苑初造硏膏繼造蠟面既又製其佳者號曰京鋌太平興國初特置龍鳯模造團茶又一種茶叢生石崖枝葉尤茂至道初造之别號石乳又一號的乳又一種號白乳慶厯中蔡君謨創小龍團元豐間造密雲龍紹聖間改為瑞雲翔龍至大觀初白茶遂為第一既又製三色細茶及試新銙貢新銙凡茶芽數品最上曰小芽如雀舌鷹爪號芽茶次曰揀芽一芽帶一葉號一鎗一旗次曰中芽一芽帶兩葉號一鎗兩旗宣和庚子始創銀線水芽將已揀熟芽再剔去取其心一縷用珍器貯清泉漬之光眀瑩潔若銀線以制方寸新銙有小龍蜿蜒其上號龍團勝雪白茶勝雪以次厥名實繁今列於左貢新銙試新銙白茶龍團勝雪御苑玉芽萬夀龍芽上林第一乙夜清供承平雅玩龍鳯英華玉除清賞啓沃承恩雪英雲葉蜀葵金錢玉華寸金無比夀芽萬春銀葉宜年寳玉玉清慶雲無疆夀龍玉葉長春瑞雲翔龍長夀玉圭興國巖銙香口焙銙上品揀芽新收揀芽太平嘉瑞龍苑報春南山應瑞興國巖揀芽興國巖小龍興國巖小鳯以上號細色揀芽小龍小鳯大龍大鳯以上號粗色又有瓊林毓料浴雪呈祥壑源供季篚推先價倍南金暘谷先春夀巖却勝延平石乳清白可鑒風韻甚髙凡十色文獻通考凡茶有二類曰片曰散片茶蒸造實棬模中串之惟建劒則既蒸而研編竹為格置焙室中最為精潔其名有龍鳯石乳的乳白乳頭金蠟面頭骨次骨末骨麤骨山挺十二等龍鳯皆團片石乳頭乳皆狭片名曰京的乳亦有濶片者乳以下皆濶片餘州片茶有進寳䨇勝寶山兩府出興國軍仙芝嫩蘂福合禄合運合慶合指合出饒池州泥片出䖍州緑英金片出袁州玉津出臨江軍靈川福州先春早春華英來泉勝金出歙州獨行靈草緑芽片金金茗出潭州大拓枕出江陵大小巴陵開勝開捲小捲生黄翎毛出岳州䨇上緑芽大小方出岳辰澧州東首淺山薄側出光州總二十六名散茶有太湖龍溪次號末號出淮南岳麓草子楊樹雨前雨後出荆湖清口出歸州茗子出江南總十一名茶箋天池青翠芳馨可稱仙品陽羡俗名羅岕浙之長興者佳荆溪稍下細者其價兩倍天池六安品亦精入藥最效龍井不過十數畝外此有茶皆不及天目為天池龍井之次地志云山中寒氣早嚴茶之萌芽較晚原七修彚藁洪武二十四年詔天下産茶之地歲有定額以建寧為上茶名有四探春先春次春紫笋不得碾揉為大小龍團増茶譜通考南康之雲居彭州之仙崖石花建安之青鳯髓岳陽之含膏冷劒南之緑昌眀品茶要録補婺州之舉崖碧貌宣城之陽坡横紋涪州之賓化建安之石崖白茶事拾遺潭州有鐵色夷陵有壓磚硏北雜志交趾茶如緑苔味辛名之曰登桐柏山志瀑布山一名紫凝山産大葉茶黄山志蓮花菴旁就石縫養茶多輕香冷韻襲人齗齶謂之黄山雲霧茶杭州府志寶雲山産者名寶雲茶下天竺香林洞者名香林茶上天竺白雲峰者名白雲茶雲南志太華山在雲南府西産茶色味俱似松蘿名曰太華茶普洱山在車里軍民宣慰司北其上産茶性温味香名曰普洱茶孟通山在灣甸州境産細茶味最勝名曰灣甸茶大理府志感通寺在㸃蒼山聖應峰麓舊名蕩山又名上山有三十六院皆産茶樹髙一丈性味不減陽羡名曰感通茶彚考増吳志韋曜傳孫皓每饗宴無不竟日坐席無能否率以七升為限雖不悉入口皆澆灌取盡曜素飲酒不過二升皓初禮異時常為裁減或密賜茶荈以代酒唐書令狐楚傳先是鄭注奏建𣙜茶使王涯又議官自治園植茶人不便楚請廢使如舊法從之鄭注傳帝問富人術注以𣙜茶對其法欲置茶官籍民圃而給其直工自擷暴則利悉之官帝始詔王涯為𣙜茶使李珏傳鹽鐵使王播増茶稅十之五以佐用度珏上疏謂𣙜率本濟軍興而稅茶自貞元以來有之方天下無事忽厚歛以傷國體一不可茗為人飲與鹽粟同資若重稅之售必髙其弊先及貧下二不可山澤之産無定數程斤論稅以售多為利若價騰踴則市者稀其稅幾何三不可裴休傳休領諸道鹽鐵轉運使立稅茶十二法人以為便劉建鋒傳髙郁敎馬殷收茗算募髙户置邸閣居茗號八牀主人原唐書隱逸傳陸羽字鴻漸有文學嗜茶著茶經三篇言茶之原之法之具尤備天下益知飲茶矣常伯熊因羽論復廣著茶之功御史大夫李季卿宣慰江南次臨淮知伯熊善煮茶召之伯熊執器前季卿為再舉杯至江南又有薦羽者召之羽衣野服挈具而入季卿不為禮羽愧之更著毁茶論陸龜蒙嗜茶置園顧渚山下歲取茶租自判品第不喜與流俗交雖造門不見升舟設蓬席齎束茶竈筆牀釣具徃來時謂江湖散人増宋史兵志熈寧三年熙河運司以歲計不足乞以官茶博糴每茶三觔易粟一斛其利甚溥朝廷謂茶馬司本以博馬不可以博糴於茶馬司歲額外増買川茶兩倍茶朝廷别出錢二百萬給之令提刑司封樁又令茶馬官程之邵兼轉運使由是數歲邊用粗足晏子春秋嬰相齊景公時食脫粟之飯炙三戈五卵茗菜而已晉中興書陸納為吳興太守時衛將軍謝安常欲詣納納兄子俶怪納無所備不敢問之乃私蓄數十人饌安既至所設惟茶果而已俶遂陳盛饌珍差畢具及安去納杖俶四十云汝既不能光益叔父奈何穢吾素業原世說晉王濛好飲茶客至輙飲之士大夫甚以為苦每欲徃候濛者必云今日有水厄増世說任瞻字育長少時有令名自過江失志既下飲問人云此為茶為茗覺人有怪色乃自申眀云向問飲為熱為冷耳原廣陵耆舊傳晉元帝時有老姥每旦獨提一器茗徃市鬻之市人競買自旦至暮其器不減所得錢盡散路傍孤貧乞人人或異之州法曹縶之於獄至夜老姥執所鬻茗器從獄牖中飛出續搜神記桓宣武有一督將因病後虛熱便能飲複茗必以一斛二斗乃飽後有客造之更進五升乃吐出一物如升大有口形質縮縐壯如牛䐗客乃令置盆中以斛二斗複茗澆之此物噏之都盡而腹中覺小脹又増進五升便悉混然從口中涌出既吐此物病遂瘥或問此何病答曰此病名茗瘕一名斛二瘕増續搜神記晉武帝時宣城人秦精常入武昌山採茗遇一毛人長丈餘引精至山下示以叢茗而去俄而復還乃探懐中橘以遺精精怖負茗而歸荆州記武陵七縣通出茶最好原神異記餘姚人虞洪入山採茗遇一道士牽三青牛引洪至瀑布山曰予丹丘子也聞子善具飲常思見惠山中有大茗可以相給子他日有甌犧之餘乞相遺也洪因設奠祀之後常令家人入山獲大茗焉異苑剡縣陳務妻少寡與二子同居好飲茶茗以宅中有古塜每飲輙先祀之二子患之曰古塚何知徒以勞意欲掘去之母苦禁而止其夜夢一人云吾止此塜三百餘年卿二子恒欲見毁賴相保䕶又烹吾佳茗雖潛身朽壤豈忘翳桑之報及曉於庭中獲錢十萬似久埋者惟貫新耳増宋録新安王子鸞豫章王子尚詣曇濟道人於八公山道人設茶茗子尚味之曰此甘露也何言茶茗洛陽伽藍記王肅初入國不食羊肉及酪漿等常飯鯽魚羮渇飲茗汁京師士子見肅一飲一斗號為漏巵經數年已後肅與髙祖殿㑹食羊肉酪粥甚多髙祖怪之謂肅曰羊肉何如魚羮茗飲何如酪漿肅對曰羊者是陸産之最魚者是水族之長所好不同並各稱珍以味言之是有優劣羊比齊魯大邦魚比邾莒小國惟茗不中與酪作奴髙祖大笑彭城王謂肅曰卿不重齊魯大邦而愛邾莒小國肅對曰鄉曲所美不得不好王重謂曰卿眀日顧我為卿設邾莒之食亦有酪奴因此復號茗飲為酪奴時給事中劉鎬慕肅之風専習茗飲彭城王謂鎬曰卿不慕王侯八珍好蒼頭水厄海上有逐臭之夫里内有學顰之婦以卿言之即是也自是朝貴燕㑹雖設茗飲皆耻不復食後西豐侯蕭正徳歸降時元乂欲為設茗先問卿於水厄多少正徳不曉義意答曰下官雖生於水鄉而立身以來未遭陽侯之難元乂與舉座之客大笑焉原權紓文隋文帝微時夢神人易其腦骨自爾腦痛忽遇一僧云山中有茗草煮而飲之當愈帝服之有効繇是人競採掇乃為之讚其畧曰窮春秋演河圖不如載茗一車増括地圖臨遂縣東一百四十里有茶溪吳興記烏程縣西二十里有温山出御荈夷陵圖經黄牛荆門女觀望州等山茶茗出焉永嘉圖經永嘉縣東三百里有白茶山淮隂圖經山陽縣南二十里有茶坡茶陵圖經茶陵者所謂陵谷生茶茗焉坤元録辰州漵浦縣西北三百五十里無射山多茶樹記事珠建人謂鬬茶為茗戰原唐新記唐右補闕綦母炅性不飲茶著伐茶飲序其畧曰釋滯消壅一日之利暫佳瘠氣耗精終身之害斯大獲益則歸功茶力貽患則不謂茶災増開元天寶遺事逸人王休居太白山下日與僧道異人徃還每至冬時取溪氷敲其精瑩者煮建茗共賓客飲之原蠻甌志白樂天方齋劉禹錫正病酒禹錫乃饋菊苗虀蘆菔酢換取樂天六斑茶二囊炙以醒酒覺林僧志崇收茶三等待客以驚雷莢自奉以萱草帶供佛以紫茸香赴茶者以油囊盛餘瀝歸増茶經鮑照妹令暉著香茗賦中朝故事李徳裕有親知授舒州牧李曰到郡日天柱峰茶可惠三四角其人輙獻數觔李却之眀年罷郡用意精求獲數角投之贊皇閱而受之曰此茶可消酒肉毒乃命烹一甌沃於肉食以銀合閉之詰旦開視其肉已化為水矣衆服其廣識國史補常魯公使西畨烹茶帳中贊普問曰此為何物魯公曰滌煩療渇所謂茶也贊普曰我此亦有遂命出之以指曰此夀州者此舒州者此顧渚者此蘄門者此昌眀者此灉湖者鞏縣陶者多為甆偶人號陸鴻漸買數十茶器得一鴻漸市人沽茗不利輙灌注之原南部新書胡生者以釘鉸為業居近白蘋洲傍有古墳每茶飲必奠酹之忽夢一人謂曰吾姓栁平生善為詩而嗜茶感子苦茗之惠無以為報欲教子以詩胡生辭以不能栁强之曰但率子意為之當有致矣生後遂工詩時人謂之胡釘鉸詩増南部新書大中三年東都進一僧年一百三十嵗宣宗問服何藥致然對曰臣少也賤不知藥性本好茶至處惟茶是求或飲百椀不厭因賜茶五十觔令居保夀寺義興舊志南岳寺有真珠泉稠錫禪師嘗飲之清甘可口曰得此泉烹桐廬茶不亦稱乎未幾有白蛇銜茶子墜寺前由此滋蔓茶味頗佳號曰蛇種原茶譜湖州長興縣啄木嶺金沙泉即每歲造茶之所也湖常二郡接界於此厥土有境㑹亭每茶時二牧畢至此泉處沙中居常無水將造茶太守具儀注犧牲拜勅祭泉頃之發源水甚清溢造供御者畢水即微減供堂者畢水已半之太守造畢即涸矣太守或還斾稽期則示風雷之變或見鷙獸毒蛇水魅暘睒之類焉蜀之雅州有蒙山山上有五頂頂有茶園其中頂曰上清峰昔有僧病冷且久嘗遇一老父謂曰蒙之中頂茶嘗以春分之先後多搆人力俟雷之發聲併手採摘以多為貴三日而止若獲一兩以本處水煎服即能袪宿疾二兩當眼前無疾三兩因以換骨四雨即為地仙僧因之中頂築室以候及期獲一兩餘服未竟而疾瘥年至八十餘氣力不衰時到城市人觀其容貌常若三十餘睂髮紺緑後入青城山不知所終今四頂茶園不廢惟中頂草木繁茂重雲積霧蔽虧日月鷙獸時出人跡罕到矣増紀異録有積師者嗜茶久非漸兒煎侍不鄉口羽出逰江湖師絶於茶味代宗召入供奉命宮人善茶者餉師一啜而罷訪羽召入賜師齋俾羽煎茗一舉而盡曰有若漸兒所為也於是出羽見之原金鑾密記故例翰林當直學士每春晚人困則日賜成象殿茶清異録開寶中竇儀以新茶飲予味極美奩面標云龍陂仙子茶龍陂是顧渚山之别境偽閩甘露堂前兩株茶鬱茂婆娑宫人呼為清人樹每春初嬪嬙戲摘新芽堂中設傾筐㑹顯徳初大理徐恪見貽卿信鋌子茶茶面印文曰玉蟬膏又一種曰清風使恪建人也孫樵送茶焦刑部書晚甘侯十五人遣侍齋閣此徒皆乗雷而摘拜水而和蓋建陽丹山碧水之鄉月澗雲龕之品慎勿賤用之䨇林大士自徃蒙頂結茅種茶凡三年得絶佳者號聖楊花吉祥蘂共五觔持歸供獻増清異録和凝在朝率同列逓日以茶相飲味劣者有罰號為湯社有得建州茶膏取作耐重兒八枚膠以金縷獻於閩王曦吳僧文了善烹茶逰荆南髙保勉洎子季興延置紫雲菴日試其藝保勉父子呼為湯神奏授華定水大師上人目曰乳妖符昭逺不喜茶嘗為御史同列㑹茶歎曰此物面目嚴冷了無和美之態可謂冷面草也飯餘嚼佛眼芎以甘菊湯送之亦可爽神豹革為囊風神呼吸之具也煑茶啜之可以滌滯思而起清風每引此義稱茶為水豹囊皮光業最躭茗事一日中表請嘗新柑筵具殊豐簪紱叢集纔至未顧尊罍而呼茶甚急徑進一巨甌題曰未見甘心氏先迎苦口師衆噱曰此師固清髙而難以療飢也浪樓雜記大成四年度支奏朝臣乞假省覲者欲量賜茶藥文班自左右常侍至侍郎宜各賜蜀茶三觔蠟面茶二觔武班官各有差談苑建州陸羽茶經尚未知之但言福建等十二州未詳徃徃得之其味極佳江左近日方有蠟面之號李氏别令取其乳作片或號曰京挺的乳及骨子等每嵗不過五六萬觔訖今歲出三十餘萬觔凡十品曰龍鳯茶京挺的乳石乳白乳頭金蠟面頭骨次骨龍茶以供乗輿及賜執政親王長主餘皇族學士將帥皆得鳯茶舍人近臣賜京挺的乳館閣白乳龍鳯石乳茶皆太宗令罷江左乃有研膏茶供御即龍茶之品也丁謂北苑茶録三卷備載造茶之法今行於世類苑世傳陶穀買得党太尉故妓取雪水煎團茶謂妓曰党家應不識此妓曰彼粗人安得有此但能銷金帳下淺斟低唱飲羊羔兒酒爾陶愧其言宛陵詩注揚州歲貢蜀岡茶似蒙頂茶能除疾延年嘉祐雜志蘇才翁嘗與蔡君謨鬬茶蔡用惠山泉蘇茶小劣改用竹瀝水煎遂能取勝夢溪筆談茶芽古人謂之雀舌麥顆言其至嫩也今茶之美者其質素良而所植之木又美則新芽一發便長寸餘其細如鍼唯芽長為上品以其質幹土力皆有餘故也如雀舌麥顆者極下材爾古人論茶唯言陽羡顧渚天柱蒙頂之類都未言建溪然唐人重串茶粘黒者則已近乎建餅矣建茶皆喬木吳蜀淮南唯叢茇而已品自居下建溪勝處曰郝源曾坑其間又岔根山頂二品尤勝李氏時號為北苑置使領之澠水燕談建茶盛於江南近歲製作尤精龍鳯團茶最為上品一觔八餅慶厯中蔡君謨為福州轉運使始造小團以充歲貢一觔二十餅所謂上品龍茶者也原東坡集僕在黄州參寥自吳中來訪館之東坡一日夢見參寥所作詩覺而記其兩句云寒食清眀都過了石泉槐火一時新後七年僕出守錢塘而㕘寥始卜居西湖智果院院有泉出石縫間甘冷宜茶寒食之眀日僕與客泛湖自孤山來謁㕘寥汲泉鑽火烹黄蘖茶忽悟所夣詩兆於七年之前衆客皆驚嘆知傳記所載非虛語也予去此十七年復與彭城張聖途丹陽陳輔之同來院僧梵英葺治堂宇比舊加嚴潔茗飲芳烈問此新茶耶英曰茶性新舊交則香味復予嘗見知琴者言琴不百年則桐之生意不盡緩急清濁常與雨暘寒暑相應此理與茶相近故并記之増黔南行紀陸羽茶經紀黄牛峡茶可飲因令舟人求之有媪賣新茶一籠與草葉無異山中無好事者故爾初余在峡州問士大夫黄陵茶皆云觕澀不可飲試問小吏云唯僧茶味善試令求之得十餅價甚平也攜至黄牛峡置風爐清樾間身候湯手㧫得味既以享黄牛神且酌元眀堯夫云不減江南茶味也乃知夷陵士大夫但以貌取之爾燕翼貽謀録國初沿江置務收茶名曰𣙜貨務給賣客旅如鹽貨然人不以為便淳化四年二月癸亥詔廢沿江八處應茶商並許於出茶處市之未幾有司恐課額有虧復請於上六月戊戌詔復舊制六飛南渡後官不能運致茶貨而𣙜貨務只賣茶引矣姚氏殘語紹興進茶自范文虎始王氏談録公言茶品髙而年多者必稍陳遇有茶處春初取新芽輕炙雜而烹之氣味自復在襄陽試作甚佳嘗語君謨亦以為然甲申雜記仁宗朝春試進士集英殿后妃御太清樓觀之慈聖光獻出餅角子以賜進士出七寶茶以賜考試官初貢團茶及白羊酒惟見任兩府方賜之仁宗朝及前宰臣歲賜茶一觔酒二壺後以為例隨手雜録子瞻在杭時一日中使至密謂子瞻曰某出京師辭官家官家曰辭了娘娘來某辭太后殿復到官家處引某至一櫃子旁出此一角宻語曰賜與蘇軾不得令人知遂出所賜乃茶一觔封題皆御筆子瞻具劄子附進稱謝潘中散适為處州守一日作醮其茶百二十盞皆乳華内一盞如墨詰之則酌酒人誤酌茶盞中潘焚香再拜謝過即成乳華僚吏皆驚歎春渚紀聞東坡先生一日與魯直文潛諸人㑹飯既食骨䭔兒血羮客有須薄茶者因就取所碾龍團徧啜坐人或曰使龍茶能言當湏稱屈先生撫掌久之曰是亦可為一題因援筆戲作律賦一首以俾薦血羮龍團稱屈為韻山谷擊節稱詠不能己巳無藏本聞關子開能誦今亡矣惜哉雞肋編米芾作文狂怪嘗作詩云飯白雲留子茶甘露有兄人不省露兄故嘗叩之乃曰只是甘露哥哥爾原因話録察院諸㕔兵察常主院中茶茶必市蜀之佳者貯於陶器以防暑濕御史躬自緘啓故謂之茶甌㕔苕溪詩話北苑官焙也漕司歲貢為上壑源私焙也土人亦以入貢為次二焙相去三四里間若沙溪外焙也與二焙絶逺為下故黄魯直詩莫遣沙溪來亂真是也官焙造茶常在驚蟄後増避暑録話裴晉公詩云飽食緩行初睡覺一甌新茗侍兒煎脫巾斜倚䋲牀坐風送水聲來耳邊公為此詩必自以為得志然吾山居七年享此多矣今歲新茶適佳夏初作小池導安樂泉注之得常熟破山重臺白蓮植其間葉已覆水雖無淙潺之聲然亦澄澈可喜此晉公之所誦詠而吾得之可不為幸乎北苑茶正所産為曾坑謂之正焙非曾坑為沙溪謂之外焙二地相去不逺而茶種懸絶沙溪色白過於曾坑但味短而微澀識茶者一啜如别涇渭也余始疑地氣土宜不應頓異如此及來山中每開闢徑路刳治巖竇有尋丈之間土色各殊肥瘠𦂳緩燥潤亦從而不同並植兩木於數步之間封培灌溉畧等而生死豐瘁如二物者然後知事不經見不可必信也草茶極品惟䨇井顧渚亦不過各有數畝䨇井在分寧縣其地屬黄氏魯直家也元祐間魯直力推賞於京師族人交致之然歲僅得一二觔爾顧渚在長興縣所謂吉祥寺也其半為今劉侍郎希范家所有兩地所産歲亦止五六觔近歲寺僧求之者多不暇精擇不及劉氏逺甚余歲求於劉氏過半觔則不復佳蓋茶味雖均其精者在嫩芽取其初萌如雀舌者謂之槍稍敷而為葉者謂之旗旗非所貴不得已取一槍一旗猶可過是則老矣此所以為難得也九華山録至化城寺謁金地藏塔僧祖瑛獻土産茶味敵北苑名臣言行録張詠令崇陽民以茶為業公曰茶利厚官將𣙜之命㧞茶而植桑民以為苦其後𣙜茶他縣皆失業而崇陽之桑已成其為政知所先後如此盧溪詩注䨇井老人以青紗蠟紙裹細茶寄人不過二兩岳陽風土記灉湖諸山舊出茶謂之灉湖茶李肇所謂岳州灉湖之含膏也唐人極重之見於篇什今人不甚種植唯白鶴僧園有千餘本土地頗類北苑所出茶一歲不過一二十兩土人謂之白鶴茶味極甘香非他處草茶可比並茶園地色亦相類但土人不甚植爾品茶要録茶即古荼字也周詩記荼苦春秋書齊荼漢志書荼陵至陸羽茶經玉川茶歌趙贊茶禁以後遂以茶易荼延福宫曲宴記宣和二年十二月癸巳召宰執親王學士曲宴於延福宫命近侍取茶具親手注湯擊沸少頃白乳浮盞面如疎星淡月顧諸臣曰此自烹茶飲畢皆頓首謝謝氏詩源昔有客過茅君時當大暑茅君於手巾内觧茶葉人與一葉客飲之五内清涼茅君曰此蓬萊山穆陀樹葉衆仙食之以當食又有寶文之蘂服之不飢謝幼貞詩摘寶文之初蘂拾穆陀之墜葉蔡寛夫詩話湖州紫笋入貢每歲以清眀日貢到先薦宗廟賜近臣紫笋生顧渚在湖常二州之間以其萌茁紫而似笋五色線龍安有騎火茶最上不在火前不在火後故也清眀改火故曰騎火茶苕溪漁隱叢話歐公和劉原父揚州時㑹堂絶句云積雪猶封蒙頂樹驚雷未發建溪春中州地暖萌芽早入貢宜先百物新注云時㑹堂造貢茶所也余以陸羽茶經考之不言揚州出茶惟毛文錫茶譜云揚州禪智寺隋之故宫寺傍蜀岡其茶甘香味如蒙頂焉苐不知入貢之因起於何時故不得而誌之也唐義興縣重修茶舍記云義興貢茶非舊也前此御史大夫李栖筠實典是邦山僧有獻佳茗者㑹客嘗之野人陸羽以為芬香甘辣冠於他境可薦於上栖筠從之始進萬兩厥後因之遂為任土之貢與常賦之邦侔矣故玉川子詩云天子湏嘗陽羡茶百草不敢先開花正謂此也乾淳歲時記仲春上旬福建漕司進第一綱茶名北苑試新方寸小夸進御止百夸䕶以黄羅輭盝藉以青篛裹以黄羅夾複臣封朱印外用朱漆小匣鍍金鎖又以細竹絲織笈貯之凡數重此乃雀舌水芽所造一夸之直四十萬僅可供數甌之啜爾或以一二賜外邸則以生線分觧轉遺好事以為竒玩青瑣詩話大丞相李公昉嘗言當時目外鎮為麤官有學士遺外鎮官茶外鎮有詩謝云麤官乞與真虛擲賴有詩情合得嘗夢餘録東坡以茶性寒故平生不飲惟飯後濃茶滌齒而已然大中三年東都進一僧百三十歲宣宗問服何藥云性惟好茶飲至百椀少猶四五十椀以坡言律之必且損夀反得長年則又何也丹鉛録宻雲龍茶名極為甘馨宋廖正一字眀畧晚登蘇門子瞻大竒之時黄秦張晁號蘇門四學士子瞻待之甚厚每來必令侍妾朝雲取宻雲龍家人以此知之一日又命取密雲龍家人謂是四學士窺之乃眀畧也山谷有矞雲龍亦茶名快雪堂漫録李于鱗為吾浙按察副使徐子與以岕茶最精者餉之比看子與昭慶寺問及則已賞皁後矣蓋岕茶葉大多梗于鱗北士不遇宜矣西吳枝乗湖人於茗不數顧渚而數羅岕然顧渚之佳者其風味已逺出龍井下岕稍清雋然葉粗而作草氣丁長孺嘗以半角見餉且教余烹煎之法迨試之殊類羊公鶴此余有觧有未觧也余嘗品茗以武夷虎丘第一淡而逺也松蘿龍井次之香而艶也天池又次之常而不厭也餘子瑣瑣勿置齒喙茶事拾遺錢起字仲文與趙莒為茶宴又嘗過長孫宅與朗上人作茶㑹蔡襄善别茶建安能仁院有茶生石縫間蓋精品也僧採造得茶十餅號石巖白以四餅遺蔡以四餅宻遣人走京師遺王内翰禹玉歲餘蔡被召還闕訪禹玉禹玉命子弟於茶筒中選精品碾以待蔡蔡捧甌未嘗輙曰此極似能仁寺石巖白公何以得之禹玉未信索帖騐之乃服張芸叟云有唐茶品以陽羡為上建溪北苑未著也貞元中常衮為建州刺史始蒸焙而硏之謂之硏膏茶無垢居士張九成子韶設心六度不為子孫計因取華嚴善知識日供其二回食以飯緇流嘗供十六大天而諸位茶杯悉變為乳指月録有僧到趙州從諗禪師問新到曾到此間麽曰曾到師曰喫茶去又問僧僧曰不曾到師曰喫茶去後院主問曰為甚麽曽到也云喫茶去不曾到也云喫茶去師召院主主應喏師曰喫茶去天池記土人以茶為業隙地皆種茶滇行紀略城外石馬井水無異惠泉感通寺茶不下天池伏龍特此中人不善焙製爾徽州松蘿茶舊亦無聞偶虎丘有一僧徃松蘿菴如虎丘法焙製遂見嗜於天下恨此泉不逢陸鴻漸此茶不逢虎丘僧也武夷雜記武夷茶賞自蔡君謨始謂其味過北苑龍團周右文極仰之蓋縁山中不曉製焙法一味計多狥利之過也余試採少許製以松蘿法汲虎嘯巖下語兒泉烹之三徳俱備帶雲石而復有甘輭氣乃分數百葉寄右文令茶吐氣復酹一杯報君謨於地下爾名勝志鵶山在文脊山北産茶充貢茶經云味與蘄州同梅洵有茶煑鵶山雪滿甌之句枕譚古傳注茶樹初採為茶老為茗再老為荈今槩稱茗當是錯用事也煑泉小品唐人以對花啜茶為殺風景故王介甫詩金谷千花莫漫煎其意在花非在茶也余則以為金谷花前信不宜矣若把一甌對山花啜之當更助風景又何必羔兒酒也茶董周韶好蓄竒茗嘗與蔡君謨鬬勝題品風味君謨屈焉朱桃椎嘗織芒屩置道上見者為鬻米茗易之胡嵩飛龍澗飲茶詩沾牙舊姓餘甘氏破睡當封不夜侯陶穀愛其新竒令猶子彝和之應聲曰生涼好喚雞蘇佛回味宜稱橄欖仙彝時年十二顔清臣作張志和傳碑漁童捧釣收綸蘆中鼓枻樵青蘇蘭薪桂竹裏煎茶宣城何子華邀客於剖金堂酒半出嘉陽嚴峻畫陸羽像子華因言前代惑駿逸者為馬癖泥貫索者為錢癖愛子者有譽兒癖耽書者有左傳癖若此叟溺於茗事何以名其癖楊粹仲曰茶雖珍未離草也宜追目陸氏為甘草癖西域僧金地藏所植名金地茶出煙霞雲霧之中與地上産者其味夐絶黄魯直以小龍團半鋌題詩贈晁无咎曲几蒲團聽煑湯煎成車聲繞羊腸雞蘇胡麻留渇羌不應亂我官焙香東坡見之曰黄九恁地怎得不窮學林新編茶之佳者造在社前其次火前謂寒食前也其下則雨前謂穀雨前也唐僧齊已詩髙人愛惜藏巖裏白甀封題寄火前茶皆言火前蓋未知社前之為佳也靳門團黄有一旗一鎗之號言一葉一芽也歐公詩共約試新茶旗鎗幾時緑王荆公送元厚之詩新茗齋中試一旗世謂茶始生而嫩者為一鎗寖大而開為一旗宋蔡襄進龍茶二篇上篇論茶色茶香茶味炙茶碾茶羅茶候湯熁盞㸃茶下篇論茶焙茶籠砧椎茶鈴茶碾茶羅茶盞茶匙湯瓶御定佩文齋廣羣芳譜卷十八
