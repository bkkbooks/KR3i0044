body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷二十三花譜梅花二集藻五言律詩御製鄧尉山鄧尉知名乆看梅及早春豈因躭勝賞本是重時廵野靄朝來散山容雨後新繽紛開萬樹相對愜佳辰増唐楊烱梅花落窓外一株梅寒花五出開影隨朝日逺香逐便風來泣對銅鈎障愁看玉鏡䑓行人斷消息春恨幾徘徊李嶠詠梅大庾歛寒光南枝獨早芳雪含朝暝色風引去來香妆面廻青鏡歌塵起畫梁若能逢止渴何假泛瓊漿張九齡庭梅咏芳意何能早孤榮亦自危更憐花蔕弱不受歳寒移朔雪那相妬隂風已屢吹馨香雖尚爾飄蕩復誰知孫逖咏後庭梅聞唱梅花落江南春意深更傳千里外來入越人吟弱榦紅妝倚繁香翠羽尋庭中自公日歌舞向芳隂梅院重門掩遥遙歌吹邊庭深人不見春至曲能傳花落彈碁處香來薦枕前使君停五馬行樂此中偏杜甫江梅梅蕊臘前破梅花年後多絶知春意早最奈客愁何雪樹元同色江風亦自波故園不可見巫岫鬱嵯峨錢起山路梅莫言山路僻還被好風催行客淒凉過村籬冷落開晩溪寒水照晴日數蜂來重憶江南酒何因把一杯朱慶餘早梅天然根性異萬物盡難陪自古承春早嚴冬鬭雪開艶寒宜雨露香冷隔塵埃堪把依松竹良途一處栽杜牧梅輕盈照溪水掩歛下瑶臺妬雪聊相比欺春不逐來偶同佳客見似為凍醪開若在秦樓畔堪為弄玉媒許渾看早梅澗梅寒正發莫信笛中吹素艶雪凝樹清香風滿枝折驚山鳥散􅂝任野蜂隨今日從公醉何人倒接䍦鄭谷江梅江梅且緩飛前輩有歌詞莫惜黄金縷難忘白雪枝吟看歸不得醉嗅立如癡和雨和烟折含情寄所思韋蟾梅髙樹臨溪艶低枝隔竹繁何須是桃李然後欲忘言擬折魂先斷須看眼更昏誰知南陌草却解望王孫釋齊已早梅萬木凍欲折孤根暖獨回前村深雪裏昨夜一枝開風送幽香出禽窺素艶來明年如應律先發映春臺宋王珪梅花冷香疑到骨瓊艶幾堪餐半醉臨風折清吟拂曉觀贈春無限意和雪不知寒桃李有慚色枯枝託並欄晁端友探得早梅嶺梅何處早雪裏看芳菲北陸寒猶在南枝春已歸曉妝初見妬殘角未成飛引我江頭夢清香憶滿衣文同梅寒梅引舊枝映竹復臨池朶露深開處香聞瞥過時凌兢侵臘雪散漫入春詩贈我歳寒色憐君冰玊姿蘇軾中隠堂二月驚梅晩幽香此地無依依慰遠客皎皎似吳姝不恨故園隔空嗟芳歳徂春深桃李亂笑汝益羈孤次韻陳四雪中賞梅臘酒詩催熟寒梅雪鬭新杜陵休歎老韋曲已先春獨秀驚凡目遺英臥逸民髙歌對三白遲暮慰安仁楊時早梅楚國春歸早寒梅處處開月和清艶宿天與靚妝來東閣詩懐動南枝歳律回蕭然冰雪態無處不輕埃朱子早梅今日清江路寒梅第一枝不愁風嫋嫋正奈雪垂垂暖熱惟須酒平章却要詩他年千里夢誰與寫相思楊萬里和羅巨濟山居園花皆手植梅蘂獨禁寒色與香無價飛和雪作團數枝横翠竹一夜遶朱欄不惜吟邊苦收将句裏看陳亮梅花疎枝横玉痩小蕚㸃珠光一朶忽先變百花皆後香欲傳春信息不怕雪埋藏玉笛休三弄東君正主張戴昺探梅踏破登山屐來尋傍水叢眼明千樹底春在數花中格瘦詩難寫香寒酒易空狂歌歸秉燭驚怪走兒童葛長庚梅忩南窓屋數楹一㸃陽和生枝上雪装瘦墻頭風作清霜天酒自䐘月夜夢難成何處人吹笛黄昬送幾聲原眀申時行築圃䨇林畔看花百卉先含春俱綽約綴雪暫清妍景弄孤山月香分庾嶺天任敎催白髪索笑自年年増王穉登銅坑看梅人似梅花瘦舟如蓮葉長青山十畝白流水一春香種密人難入開齊夜有光苔枝容我折野老不嗔狂橋外花開日分眀雪作圖不将他樹襍未有一家無多處干青嶂香時過太湖濁醪原易得市逺亦須沽原陳繼儒潦倒鹿裘寒探梅草未乾拈花先命酒釣雪戲投竿客去鳥聲碎山髙屐齒刪不辭松底臥一任老袁安七言律詩原唐杜甫和裴廸登蜀州東亭送客逄早梅相憶見寄東閣官梅動詩興還如何遜在揚州此時對雪遥相憶送客逄春可自由幸不折來傷歳暮若為看去亂鄉愁江邊一樹垂垂發朝夕催人自白頭増李商隠酬崔八早梅知訪寒梅過野塘乆留金勒為廻腸謝郎衣袖初翻雪荀令熏爐更換香何處拂胸資蜨粉幾時塗額藉蜂黄維摩一室雖多病亦要天花作道塲原羅隠梅吳王醉處十餘里照夜拂衣今正繁經雨不隨山鳥散倚風如共路人言愁憐粉艶飄歌席静愛寒香撲酒尊欲寄所思無好信為君惆悵又黄昬増崔魯梅含情含態一枝枝斜壓漁家短短籬惹袖尚憐香半日向人如訴雨多時初開偏稱雕梁畫未落先愁玊笛吹行客見來無去意解帆煙浦為題詩原宋林逋山園小梅衆芳揺落獨暄妍占盡風情向小園疎影横斜水清淺暗香浮動月黄昬霜禽欲下先偸眼粉蝶如知合斷魂幸有微吟可相狎不湏檀板共金樽増林逋山園小梅剪綃零碎㸃酥乾向背稀稠畫亦難日薄縱甘春至晩霜深應怯夜來寒澄鮮祗共鄰僧惜冷落猶嫌俗客看憶著江南舊行路酒旗斜拂墮吟鞍又咏小梅數年閑作園林主未有新詩到小梅摘索又開三两朶團欒空遶百千㢠廻荒鄰獨映山初静晩景相禁雪欲來寄語清香少愁結為君吟罷一銜杯梅花小園煙景正淒迷陣陣寒香壓麝臍池水倒窺疎影動屋簷斜入一枝低畫名空向閑時看詩客休徴故事題慙媿黄鸝與蝴蝶祗知春色在桃溪孤根何事在柴荆村色仍将臘候幷横隔片煙爭向静半黏殘雪不勝清等閒題咏誰為愧子細相看似有情搔首夀陽千載後可堪青草雜芳英趙抃素芳亭賞梅花素蕚清香並酒巵主人勤意嘱留詩為逄蜀國新開日却憶江南舊賞時春早未通桃李信臘殘都放雪霜姿先公舊植亭欄外肯構重來見本枝王安石梅花漢宮嬌額半塗黄粉色凌寒透薄妝好借月魂來映燭恐隨春夢去飛揚風亭把盞酬孤艶雪徑回輿認暗香不為調羮應結子直湏留此占年芳結子非貪鼎鼐嘗偶先紅杏占年芳從敎臘雪埋藏骨却怕春風漏泄香不御鉛華知國色祇裁雲縷想仙裳少陵為爾牽詩興可是無心賦海棠淺淺池塘短短墻年年為爾惜流芳向人自有無言意傾國天敎抵死香鬚裊黄金危欲墮蒂團紅蠟巧能装嬋娟一種如冰雪依倚春風笑野棠陳師道梅花百卉前頭第一芳低臨粉水浸寒光卷簾初認雲猶凍逆鼻渾疑雪亦香鼎實自期終有待天真不假更勻装江南望斷無來使且伴詩翁入醉鄉劉子翬梅花玉骨綃裳韻太孤天教飛雪伴清癯林寒疎蕊半開落野㢠暗香疑有無庾嶺風光仍似舊漢宫鉛粉莫相汚驚心不必傷空樹一白流空春便徂朱子前村玊立寒煙寂寞濵仙姿瀟灑淨無塵千林揺落今如許一樹横斜獨可人真與雪霜娛晩景任從桃柳殿殘春綠隂青子眀年事衆口驚嗟鼎味新次韻早梅可愛紅芳愛素芳多情珍重老劉郎疎英的皪尊中影微月黄昬句裏香胸次自憐真玉雪人間何處有冰霜廵簷説盡心期事肯醉佳人錦瑟傍原陸游梅花家是江南友是蘭水邊月底怯新寒畫圖省識驚春早玉笛孤吹怨夜殘冷淡合教閑處著清癯難遣俗人看相逄剩作樽前恨索笑情懐老漸䦨月地雲堦暗斷腸知心誰解賞孤芳相逄只怪影亦好歸去始驚身染香渡口耐寒窺淨綠橋邊凝怨立昬黄與卿俱是江南客剩欲樽前説故鄉増陸游十二月初一日得梅一枝絶竒戲作長句髙標已壓萬花羣尚恐嬌春習氣存月兎𢷬霜供換骨湘娥鼓瑟為招魂孤城小驛初飛雪斷角殘鐘半掩門盡意端相終有恨夜寒皴玊倩誰溫浣花賞梅老子人間自在身插梅不惜損烏巾春回積雪層冰裏香動荒山野水濱𢃄月一枝低弄影背風千片逺隨人石家樓上貪吹笛肯放朝朝玉樹新山亭觀梅與梅歳歳有幽期忘却如今兩鬢絲乘淡月時和雪看斸蒼苔地𢃄花移先春瘦損應多恨静夜香來更一竒醉倒欄邊君勿笑明朝紅蕚綴空枝射的山觀梅凌厲冰霜節愈堅人間乃有此癯仙坐收國士無䨇價獨立東皇太乙前此去幽尋應盡日向來别恨動經年花中竟是誰流輩欲許芳蘭恐未然楊萬里普明寺見梅城中忙失探梅期初見僧窓一兩枝猶喜相看那恨晩故應更好半開時今冬不雪何關事作伴孤芳却欠伊月落山空正幽獨慰存無酒且新詩梅花下小飲今年春在臘前回怪底空山早見梅數㸃有情吹面過一花無賴背人開為􅂝竹葉澆瓊樹旋折冰葩浸玊盃近節雨晴誰料得明朝無興也重來徐璣梅花是誰曽種白玻璃夐絶寒荒一㸃竒不厭隴頭千萬樹最憐忩下兩三枝幽深真是離騷句枯健猶如賈島詩吟到月斜渾未已蕭蕭髩影有風吹梅坡淺水低坡幾樹苔冷光揺動玊塵埃横斜直似安排得古怪多應折損來潔白要從侵夜看飄零却是被春催閒行立斷清風影一片飛香落酒杯劉克莊落梅一片能教一斷腸可堪平砌更堆墻飄如遷客來過嶺墜似騷人去赴湘亂㸃莓苔多莫數偶粘衣袖乆仍香東風謬掌花權柄却忌孤髙不主張昨夜尖風幾陣寒心知清物乆留難枝疎似被金刀剪片細疑經玉杵殘痛叱山童持帚去苛留野客坐苔看月中徙倚慿空樹也勝吳兒賞牡丹裘萬頃次洪内相梅亭人間多是梅開後旋踵東籬事故常那得紅簾捲朱户細看素質傲清霜一生寄興雲山外幾度搔頭江路傍咫尺名園身未到夜窓羞對返魂香次王成之韻咏梅誰遣冰魂照夕陽揺揺一任北風凉眼前共有幾多蕊鼻觀胡為如此香佳實㑹須歸列鼎孤標已自壓羣芳濡毫我欲從君賦未害平生鐡石腸戴復古梅孤標粲粲壓羣葩獨占春風管歳華幾樹參差江上路數枝装㸃野人家冰池照眼何湏月雪岸聞香不見花絶似林間隠君子自從幽處作生涯靈洲梅花穿林傍水幾平章合有春風到草堂自入冬來多是暖無尋花處只聞香枝南枝北一輪月山後山前兩屐霜直看過年開未了醉吟且放老夫狂林景熙漁舍觀梅冷雲漠漠䕶籬隂瀟灑苔枝出竹林影落寒磯和雪釣香浮老甕帶春斟幾慿水驛傳芳信祗許沙鷗識素心回首西湖千樹逺扁舟寂寞夢中尋金劉著文季侍郎得緑蕚香梅子文待制有詩輙亦同賦一枝綠蕚冠羣芳瀟灑猶疑楚岸傍香骨瘦來冰蕊細夢魂清處月波凉賡酬便合成千首醒醉寜湏計百觴横玊呌雲吹不盡只教今古洗離腸劉迎梅花誰道江梅驛信遲碧琅玕裏見横枝為尋疎影暗香處獨立嫩寒清曉時嚼蕊不妨浮白飲認桃休賦比紅詩平生東閣風流在何遜而今鬢欲絲周昻和路宣叔梅月底眀肌粲壽陽道人呼入竹西堂安排臘味千鍾酒消破春風萬斛香花鳥有情應見惜蛾眉傾國故難藏西湖骨朽東坡逺又為君詩惱一塲李獻能上清宫梅壓住盧家白玊堂琳宮瀟灑占年芳光生琪樹風霜古影占銀潢月露凉物外根株本仙種世間紅紫避嚴妝遨頭詞伯今何遜一笑詩成字字香范墀梅花春風也自惜流光只放寒梅一樹芳玉粉更装前夜雪口脂猶注昔年香江湖昨夢同誰寄詩酒風流豈易忘東閣何郎未全老花枝休笑鬢絲長元仇逺梅二首為怕緇塵著素衣凍痕封蕊放香遲月來忽送闌干影春到不分南北枝啼夢翠禽依樹宿斷魂玊笛隔花吹從他萬片隨風去湏有青青葉底時夢想幽芳無處尋相逄依舊歳寒心要看月底玲瓏玊休折枝頭蓓蕾金清曉風霜和艶冷黄昏庭院覺香深揚州一樹春多少殢得何郎瘦不禁劉清叟梅四首休説逋仙兩句工冰甌滌筆别形容清標騷客風前立素面仙姝月下逄山店霜寒香撲馬溪橋水淺影如龍千枝盡是寒凝結金鼎無鹽味更濃破荒玊雪粲煙村倚竹無言獨斷魂三弄直湏琴對越一寒安用酒溫存家風巢許堪同社心事夷齊可共論應出繽紛幾紅紫一枝開處自乾坤除香除影賦梅花方許詩中擅作家