春來幽谷水潺潺的皪梅花草棘間一夜東風吹石裂半隨飛雪度關山何人把酒慰深幽開自無聊落更愁幸有清溪三百曲不辭相送到黄州次韻楊公濟奉議梅花梅梢春色弄微和作意南枝剪刻多月黑林間逄縞袂霸陵醉尉誤誰何相逄月下是瑶䑓藉草清樽連夜開明日酒醒應滿地空令飢鶴啄莓苔緑髪尋春湖畔回萬松嶺上一枝開而今縱老霜根在得見劉郎又獨來月地雲堦漫一樽玊奴終不負東昬臨春結綺荒荆棘誰信幽香是返魂日出冰壺散水花野梅官柳漸欹斜西郊欲就詩人飲黄四娘東子美家君知早落坐先開莫著新詩句句催嶺北霜枝最多思忍寒留待使君來冰盤未薦含酸子雪嶺先看耐凍枝應笑春風木芍藥豐肌弱骨要人醫寒雀喧喧凍不飛遶林空啅未開枝多情好與風流伴不到䨇䨇燕語時鮫綃剪碎玊簪輕檀暈妝成雪月明肯伴老人春一醉懸知欲落更多情縞裙練帨玉川家肝膽清新冷不邪穠李爭春猶辦此更教踏雪看梅花再和楊公濟梅花韻一枝風物便清和看盡千林未覺多結習已空從著袂不湏天女問云何天教桃李作輿臺故遣寒梅第一開慿仗幽人收艾納國香和雨入青苔白髪思家萬里回小軒臨木為花開故應剩作詩千首知是多情得得來人去殘英滿酒樽不堪細雨濕黄昬夜寒那得穿花蝶知是風流楚客魂春入西湖到處花裙腰芳草抱山斜盈盈觧佩臨煙浦脉脉當壚傍酒家莫向霜晨怨未開白頭朝夕自相催斬新一朶含風露恰似西廂待月來洗盡鉛華見雪肌要将真色鬭生枝檀心已作龍涎吐玊頰何勞獺髓醫湖面初驚片片飛樽前吹折最繁枝何人㑹得春風意怕見黄梅雨細時長恨漫天柳絮輕只将飛舞占清明寒梅似與春相避未解無私造物情北客南來豈是家醉看參月半横斜他年欲識吳姫面秉燭三更對此花曽鞏憶越中梅浣紗亭北小山梅蘭渚移來手自栽今日舊林冰雪地冷香幽艶向誰開陳與義水墨梅巧畫無鹽醜不除此花風韻更清殊從教變白能為墨桃李依然是僕奴粲粲江南萬玉妃别來幾度見春歸相逄京洛渾依舊惟恐緇塵染素衣自讀西湖處士詩年年臨水看幽姿晴窓畫出横斜影絶勝前村夜雪時唐庚春日雜興愛梅長恐著花遲日禱東風莫後期及得見梅還冷淡東風全在小桃枝孫覿梅花北風剪水玊花飛翠袖凌寒不自持脉脉含情無一語水邊籬落立多時纎纎蘿蔓牽茅屋細細苔花㸃石缸要斷酒醒山月吐一枝疎影臥東窓范成大梅為雪所禁凍蕊粘枝瘦欲乾新年猶未有春看雪花祗欲欺紅紫不道梅花也怕寒雨後排岸司報梅開雨入南枝玊蕊皴合江雲冷凍芳塵司花好事相邀勒不著笙歌不肯春原陸游梅花幽香淡淡影疎疎雪虐風饕只自如正是花中巢許輩人間富貴不關渠聞道梅花坼曉風雪堆徧滿四山中何方可化身千億一樹梅前一放翁増陸游梅花亂篸桐㡌花如雪斜挂驢鞍酒滿壺安得丹青如顧陸慿渠畫我夜歸圖江上尋梅小園風月不多寛一樹梅花開未殘剥啄敲門嫌特地緩拖藤杖隔籬看鐘殘小院欲消魂漠漠幽香伴月痕江上人家應勝此明朝更出小南門折梅花折得梅花媿滿顔文書堆案正如山輸君覺翛然夢長在清泉白石間湖上梅花手自移小橋風月最相宜主人歳歳常為客莫怪幽香怨不知梅花當年走馬錦城西曽為梅花醉似泥二十里中香不斷青陽宫到浣花溪觀梅春暖山中雲作堆放翁艇子出尋梅不湏問信道傍叟但覓梅花多處來雪後尋梅䨇鵲飛來噪午晴一枝梅影向窓横幽人宿醉閒欹枕不待聞香已觧酲竹籬曲曲水邊村月淡霜清欲斷魂商約前身是飛燕玉肌無粟立黄昬朱子墨梅夢裏清江醉墨香蕊寒枝瘦凜冰霜如今白黒渾休問且作人間時世装梅花幽壑潺湲小水通茅茨煙雨竹籬空梅花亂發籬邊樹似倚寒枝恨朔風楊萬里池亭䨇樹梅花開盡梅花半欲殘兩枝晴雪作䨇寒團欒遶樹元無見只合池亭隔水看南齋梅花朝來早起挂南窓要看梅花試曉妝兩樹相挨前後發老夫一月不燒香瓶裏梅花膽様銀瓶玉様梅北枝折得未全開為憐落寞空山裏喚入詩人凡案來雪凍霜封稍欲殘殷勤折向坐中看綺忩深閉珠簾密不遣花梢半㸃寒探梅山間幽歩不勝竒正是深寒淺暮時一樹梅花開一朶惱人偏在最髙枝西歸見梅官路桐江西復西野梅千樹壓疎籬昨來都下筠籃底三百青錢買一枝梅影上有寒雀來徃梅花寒雀不湏摹日影描窓作畫圖寒雀觧飛花解舞君看此畫古今無昌英知縣叔作嵗坐上賦瓶裏梅花時坐上九人銷冰作水旋成家猶似江頭竹外斜試問坐中還幾客九人而已更梅花慶長叔招飲花下長廊盡處繞梅行過盡風聲得雪聲醉裏不愁飄濕面自舒翠袖㸃瓊英道傍梅花一行誰栽十里梅下臨溪水恰齊開此行便是無官事只為梅花也合來吳龍翰久客買舟西還萬里煙波興渺然愁心繫住灞橋邊歸装詩少不成載自折梅花凑滿船水邊早梅數花黯淡帶寒煙漏洩春光矮屋邊㑹被清池寫疎影一枝分作兩枝姸宋伯仁兀坐對坐清清一穗香悄無人語日偏長硯盤數㸃梅花片暗引遊蜂度粉墻謝枋得武夷山中十年無夢得還家獨立青峰野水涯天地寂寥山雨歇幾生修得到梅花方逄辰題吳氏梅堂聞君家在雪邊住靠盡闌干索盡詩只怕梅花應冷笑清香元不要人知元吉夜坐森森夜氣落寒櫩閒把離騷酒正酣忽憶梅花不成語夢中風雪在江南趙信庵梅花夜深梅印横忩月紙帳魂清夢亦香莫謂道人無一事也隨疎影伴寒光金劉仲尹窓外梅蕾細蕾初看柳麥肥春風得得遶窓扉道人方作玉溪夢石塢竹橋風雪飛墨梅生憎施粉與施朱換骨𤣥都亦自殊疎影冷香題不到夢驚煙雨暗西湖史學晩梅孤根春半恰春回剛逐夭桃艶杏開蝶子蜂兒應有語東風元不為渠來楊邦基墨梅粉蝶如知合斷魂啼妝先自怨黄昬華光筆底春風老寥寞嶺南煙雨痕李俊民梅朝來一雪羃晴沙行到前村始見花驛使便将春色去暗香今夜落誰家馮子振詠緑蕚蕊珠宫裏小仙娃暫别椒房柳翠華底事塵緣猶未斷謫來人世列名花叚克己憶梅姑射仙人冰雪膚昔年伴我向西湖别來幾度春風換標格而今似舊無夢梅天仙邀我醉瑶䑓春向飛瓊笑裏回為報棃花縁已斷休将雲雨下山來尋梅風流誰似李三郎不記仙姿委路傍天上人間無覓處風流羅羃只聞香探梅虢國夫人約素身不教脂粉涴天真一班曽向春前見顔色如今更可人乞梅寄語詩人林隠君水西千樹要平分玉顔絳領堪娛老御史何勞覓紫雲折梅白玉堂深夜色寒玉兒和月倚蓬山髙情不似章臺柳也許餘人取次攀嗅梅手撚冰蕤歩月華暗香先已透垂𤓰壽陽畢竟無才思但臥含章拂落花浸梅玉骨渾将山麝薰冰肌得水更精神凌波微歩東風軟羞殺當年洛浦人浴梅脉脉晴天翠幕張玉環月底按霓裳却嫌塵汚香羅襪故著溫泉為洗妝惜梅窈窕銀屛掩畫堂為嫌玉瘦怯昬黄落英猶可為香爇不學翾風老退房叚成已乘興杖屨山麓值梅始華徘徊久之因折數枝置几側燈下漫成二首戲蝶遊蜂總未知小忩低亞兩三枝夜闌燈下横疎影渾似西湖月上時幽香不許俗人知纔是東風第一枝誤認文君新睡起讀書窓下立多時憶梅初謁瓊漿記昔年迎門一笑想嫣然夜來雪暗前村路恨滿東風意不傳夢梅神女塵縁久未忘飄然隨月到髙唐歡情未接還驚覺雲雨陽䑓空斷腸尋梅玉想形容霞想裾雲英自與世姬殊幾年來往藍橋路搗盡𤣥霜得見無探梅未嘗親到謝家堂風韻何由識謝娘説與選花場上客湏知林下勝閨房乞梅漏洩春光洛水傍紫雲名字襲人香可能惠我黄昬伴休笑分司御史狂齅梅玉骨那堪瘴霧傷好将經卷伴南荒坡仙鼻孔清如水老覺朝雲道氣長浸梅洛浦飄颻信有神凌波忽覩一枝春摩挲老眼看微歩旎旎香生羅襪塵浴梅洗盡鉛華見玉環肌膚冰雪照人寒臨風脉脉嬌無力輕裛香羅半未乾惜梅襟袂翛然風味酸北人誰識蔡姫賢可憐抛却清伊月埋没邊沙二十年元趙孟頫梅花瀟灑江梅似玉人倚風無語澹生春曲中桃葉元非侶夢裏棃花恐未真許楨月下觀梅老樹清溪映白沙可人竹外一枝斜黄昬信歩前村去香到松林賣酒家虞集留宿上方觀燈前自了讀殘經風入疎簾月入櫺坐到夜深誰是伴數枝梅蕚一銅瓶洪希文二月梅花奪得冰姿過歳華逺離塵垢迥堪誇即今年少多脂粉只恐春光不稱花黄鎮成梅花吟徧蕭疎霜後村江頭千樹欲黄昬等閒又被春風覺添得寒梢月一痕王冕墨梅我家洗硯池邊樹朶朶花開淡墨痕不要人誇好顏色只留清氣滿乾坤梅花六首月眀海底夜無煙恰似西湖雪後天清氣逼人禁不得玉簫吹上大樓船海雲初破月團團獨鶴歸來夜未闌一片笙歌湖水上玊妃無語倚闌干三月東風吹雪消湖南山色翠如澆一聲羌管無人見無數梅花落野橋和靖門前雪作堆多年積得滿身苔疎花箇箇團冰雪羌笛吹他不下來馬跡山前萬樹梅千花萬花如雪開滿載揚州秋露白玉簫吹過太湖來斷雲流水孤山路看得春風幾樹花騎馬歸來城郭是月明簫管起誰家劉永之題墨梅二首茅屋蒼苔野水濵歳寒冰雪乆相親江湖後夜扁舟夢猶記尊前對玉人仙館曽逄玉𢃄姿夢中要作曉寒詞於今相對情如水唯有清霜繞鬢絲貢性之梅眼中誰識歳寒交只有梅花伴寂寥明月滿天天似水酒醒聽徹玉人簫丁鶴年題梅花池館春深看牡丹五陵車馬隘長安誰知凜凜冰霜際却是梅花守歳寒顧瑛新安梅寳地生春玉氣新苔煙如霧翠光勻山僧分得維摩供三素雲中别有春僧眀本評梅月旦花前豈乏人風霜齒頰𢃄陽春江南野史餘芳論絶世清如古逸民翦梅破玉幷刀試手溫香凝䨇股斷芳魂花隨燕尾輕分去不𢃄春風爪甲痕苔梅古貎蒼然鶴膝枝唾花生暈䕶春機玊堂試看青袍客莫忘江南有白衣月梅數枝姑射鬭嬋娟疎影分眀不夜天散却廣寒宮裏桂春光長滿玉堂前風梅花間少女翦春寒粲粲霓裳舞隊仙月夜遥看環佩冷莫教吹落玊花鈿煙梅夢隔棃雲近曉天苔枝浮翠逗春寒不嫌玊質籠輕素留與詩人冷澹看疎梅依稀殘雪浸寒波桃李漫山奈俗何瀟灑最宜三二㸃好花清影不湏多隔簾梅庭花映箔眩吟眸一片湘雲鎖莫愁風卷黄昬疎影動珊瑚枝上月如鈎紙帳梅春融剡雪道人家素幅凝香四面遮眀月滿牀清夢覺白雲堆裏見疎花明卓敬栽梅風流東閣題詩客瀟灑西湖處士家雪冷江深無夢到自鋤眀月種梅花李東陽泥金梅棃花如雪桞如金俗眼猶将較淺深爭似能黄更能白兩般顔色一般心原羅倫禁中梅花一叚清香藹禁闈幾枝疎影照寒輝玉堂不讓孤山趣雪骨氷肌對紫薇王世貞空庭一樹影横斜玉瘦香寒領歳華觧道廣平心似鐡古來先已賦梅花張新臘破春從碧海回人人爭愛説花魁如何費盡平章力不道人間有緑梅王菉猗不受塵埃半㸃侵竹籬茅舍自甘心只因誤識林和靖惹得詩人説到今劉文光玊手纎纎捧玉杯仙郎南去幾時回天涯到處生芳草湏記凌寒雪裏梅陳繼儒梅村邊楊桞已拖黄一路雲深舊講堂偶向梅花村裏度芒鞵到處雪痕香詩散句増唐李白送君遊梅湖應見梅花發有使寄我來無令紅芳歇宋韓駒空山有美人寒林弄孤芳曉分天女白夜奪嫦娥光謝逸梅清不受塵日淨本無垢微風更觧事排遣香入牖曽鞏海邊憔悴多情客想見一枝寒玊色願君攀折贈餘香勿使隨風自狼籍周必大忽逄緑衣鬢如雲歌舞醉人睡昬昬覺來但有風相襲夢斷初無香返魂陸游冰崖雪谷木未芽造物破荒開此花神全形枯近有道意荘色正知無邪元僧眀本荒溪獨照山初静寒影相持雪亦塵毎惜半檐風露重起披玊毳伴瓊春梁元帝早煙籠玉䁔凍雨浴時凝何遜銜霜當路發映雪擬寒開唐李商隠匝路亭亭艶非時裛裛香溫庭皓雪繁鸎不識風裊蝶空廻宋司馬光色如虚室白香似玊人清劉敞俠骨香經浴冰膚冷照鄰晁冲之影寒垂積雪枝薄帶春冰楊萬里花眀不是月夜静偶聞香霧質雲為屋瓊膚玉作囊元許有壬晩香傳遠樹春雪避南枝廼賢夜深憐雪落香動覺春廻唐杜甫廵簷索共梅花笑冷蕊疎枝半不禁韓愈相思一夜梅花發忽到窓前疑是君韓偓風雖狂暴翻添思雪欲侵陵更助香崔魯强半瘦因前夜雪數枝愁向晩來天宋王禹偁風月精神珠玊骨冰雪簪珥瓊瑶璫邵雍角中飄去淒於骨笛裏拈來妙入神司馬光臺前日暖分三色林下風清共一香原王安石額黄映日明飛燕肌粉含風冷太真増石延年月中欲與人爭瘦雪後偷慿笛訴寒蘇軾數枝殘緑風吹盡一㸃芳心雀啅開舒亶短笛樓頭三弄夜前村雪裏一枝春張耒月娥服御無非素玉女精神不尚妝陳克愁眼不供千樹雪醉頭猶柰一枝春王十朋仙客風中飄素袂玉妃月下試新妝陸游淺寒籬落清霜後疎影池塘淡月中梅瘦有情横淡月雲輕無力䕶清霜朱子美人邂逅一笑粲倒影的皪疎枝横故山風雪深寒夜只有梅花獨自香楊萬里寒入玊衣燈下薄春撩雪骨酒邊香徐致中石畔長來枝易老竹間瘦得蕚全清戴復古蜂黄塗額半含蕊鶴膝翹空疎帶花秦敏徐妃半面粉包蕚荀令一爐香裊枝趙正泓收回疎影月初墜約住寒香雪正深陸蒼三寫真妙絶横窓影傲骨清香透水枝劉翰小窓細嚼梅花蕊吐出新詩字字香釋道潛一樹輕眀侵晩岸數枝清瘦映疎籬惠洪梢横波面月揺影花落樽前酒帶香元謝宗可鐘殘角斷愁多少月落參横夢有無楊維楨萬花敢向雪中出一樹獨先天下春葉顒一徑梅香雲滿地半窓花影月籠紗僧明本半牀素被鋪寒玉一幅生綃畫美人斜照忩紗斜照水半隨風信半隨塵梁簡文帝風吹梅蕊香唐李白林香雨落梅杜甫雪片叢梅發元稹露梅飄暗香宋蘇軾梅雪耿黄昬陳師道梅寒釀雪花陸游梅花無賴香疎梅畫作屏畢仲游梅花萬里春朱子梅疎却耐寒元張伯淳冬深梅不寒黄庚梅瘦似詩人唐杜審言梅花落處疑殘雪杜甫山意衝寒欲放梅宋陸游江北江南萬樹梅春近野梅香欲動穿簾細細野梅香斷橋煙雨梅花瘦梅花忽報一枝春落梅黏袖上漁舟金馮子翼釀梅天氣不多寒李俊民一枝瀟灑隴頭香元趙孟頫梅花庭院雪飄香陳樵春廻隴首梅先覺謝宗可髙臥梅花月半牀御定佩文齋廣羣芳譜巻二十三
