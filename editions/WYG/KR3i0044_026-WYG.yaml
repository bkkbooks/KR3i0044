body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜巻二十四花譜梅花三集藻詞増宋王十朋㸃絳唇雪逕深深北枝貪睡南枝醒暗香疎影孤壓羣芳頂玉艶氷姿妝㸃園林景凴欄詠月明溪静憶昔林和靖王藻霜天曉角疎明瘦直不受東皇識留取伴春應肎萬紅裏怎著得夜色何處笛曉寒無奈力若在夀陽宮殿一㸃㸃有人惜蕭泰來霜天曉角千霜萬雪受盡寒磨折頼是生來瘦硬渾不怕角吹徹清絶影也别知心惟有月元沒春風情性如何共海棠説林逋霜天曉角氷清霜結昨夜梅花發甚處玉龍三弄聲揺動枝頭月夢絶金獸熱曉寒蘭燼㓕要捲珠簾清賞且莫掃階前雪樓槃霜天曉角月淡風輕黄昬未是清吟到十分清處也不啻二三更曉鐘天未明曉霜人未行只有城頭殘角説得盡我平生又翦雪裁氷有人嫌太清又有人嫌太瘦都不是我知音誰是我知音孤山人姓林一自西湖别後辜負我到如今蘇軾菩薩蠻濕雲不動溪橋冷嫩寒初透東風影橋下水聲長一枝和月香人憐花似舊花比人應痩莫凴小欄干夜深花正寒又回文雪花飛暖融香頰頰香融暖飛花雪欺雪任單衣衣單任雪欺别時梅子結結子梅時别歸不恨開遲遲開恨不歸賀鑄减字木蘭花簪花照鏡客鬂蕭蕭都不凖擬倩東君化作尊前入夢雲風香月影信是瑶臺清夜永深閉重門牽絆劉郎别後魂周邦彦采桑子肌膚綽約真仙子來伴氷霜洗盡鉛黄素面初無一㸃妝尋花不用持銀燭暗裏聞香零落池塘分付餘妍與夀陽向子諲卜算子竹裏一枝梅雨洗娟娟静疑是佳人日暮來綽約風前影新恨有誰知徃事那能省夢繞陽臺寂寞囬沾袖餘香冷朱雍好事近春色為誰來枝上半留殘雪恰近小園香逕對霜林寒月危欄凄斷笛聲長吹到偏嗚咽􅇰好短亭歸路有行人先折金李俊民謁金門金的皪猶𢃄枝頭寒色休道北人渾未識自然梅有格初見花時摘索再見花時狼籍詩句眼前拈不出惱人樓上笛又頻㸃撿依舊雪肌清减似恨海東花使濫不教么鳳探休笑詩人冷淡道盡影疎香暗桃杏雖然無藻鑑承當應不敢又全不讓占了百花頭上沒個知音人共賞陶潛無處望也有江湖酒量也有風騷詩将休道花前無伎倆疎狂些子放又偷造化秀出含章簷下為問花中誰可嫁海棠開已罷占了十分閑雅占了十分瀟灑若使畫工能此畫九方臯相馬又花譜内莫作等閒看待鬭草吴王無可對有他西子在好在一枝竹外影也教人堪愛未免世間兒女態折來頭上戴又春一半留與大家同看覓個溫柔林下伴北枝猶未暖縱有姮娥照管可惜羅浮夢短斷嶺不能遮望眼幾時魂却返又多少恨不見舊時風韻浪蘂浮花都懶問江頭春有信誇甚夀陽妝鏡説甚揚州詩興雲去月來堪弄影世間無此景又随健歩已過市橋江路費盡江湖多少句暗香留不住銷得黄昬幾度又是天寒日暮枕上吟魂無著處化為蝴蝶去宋張孝祥清平樂吹香嚼蕊獨立東風裏雪凍雲嬌天似水羞殺夭桃穠李如今見説䦨干不禁月冷風寒嶺上驛程人逺城頭戍角聲乾朱敦儒憶秦娥霜風急江南路上梅花白梅花白寒溪殘月冷村深雪洛陽醉裏曽同滴水西竹外常相憶常相憶寳釵䨇鳳鬢邉春色張孝祥憶秦娥梅花發寒梢掛在瑶臺月瑶臺月和羮心事履霜時節斷橋流水聲嗚咽行人立馬空愁絶空愁絶為誰凝竚為誰攀折無名氏憶少年疎疎整整斜斜淡淡盈盈脉脉徒憐暗香句笑梨花顔色覊馬蕭蕭行又急空回首水寒沙白天涯倦牢落忽一聲羗笛蘇軾阮郎歸暗香浮動月黄昬堂前一樹春東風何事入西鄰児家常閉門雪肌冷玉容真香腮粉未勻折花欲寄隴頭人江南日欲曛陸游朝中措幽姿不入少年塲無語只凄凉一個飄零身世十分冷淡心腸江頭月底新詩舊夢孤恨清香任是春風不管也曽先識東皇楊補之栁梢青傲雪凌霜愛他梅蘂攙借春光歩繞西湖興餘東閣可奈詩腸娟娟月轉廻廊悄無人處安排暗香一夜相思幾枝疎影落在寒忩又雪艶煙痕又要春光來到芳尊憶昨年時月移清影人立黄昬一畨幽思誰論但永夜空迷夢魂繞遍江南繚墻深院水郭山邨又月堕霜飛隔忩疎痩㣲見横枝不道寒香解随羗管吹到簾幃個中風味誰知睡乍起烏雲任欹嚼蕊唼英淺顰低笑湏半醒時又月轉墻東幾枝寒影一㸃香風清不成眠醉憑詩興起繞珍叢平生祗合情鍾慚老矣無愁可供最是難忘倚樓人在横笛聲中又玉骨氷肌為誰偏好特地相宜一叚風㣲廣平休賦和靖無詩綺忩睡起春遲困無力菱花笑窺嚼蕊吹香眉心㸃字鬢畔簪時又水曲山傍寒稍冷蕊隐映􅁱篁細細吹香疎疎沈影惱亂㢠廻腸為誰駐馬横塘漫立盡烟邨夕陽空裊吟鞭幾多詩句不斷思量蘇軾西江月玉骨那愁瘴霧氷肌自有仙風海仙時遣探芳叢倒掛緑毛么鳳素面常嫌粉涴洗妝不褪唇紅髙情已逐曉雲空不與梨花同夢魏杞虞美人氷膚玉面孤山裔􅈕到人間世天然不與百花同却恨無情輕付與東風麗譙三弄江梅曉立馬溪橋小只應明月最相思曽見幽香一㸃未開時黄庭堅虞美人天涯也有江南信梅破知春近夜闌風細得香遲不道曉來開遍向南枝玉臺弄粉花應妬飄到眉心住平生個裏飲杯深去國十年老盡少年心向子諲虞美人江頭苦被梅花惱一夜霜鬢老誰将氷玉比精神除是凌風却月見天真情髙意逺仍多思只有人相似滿城桃李不能春獨向雪花深處露花身范成大玉樓春佳人無對甘幽獨竹雨松風相澡浴山深翠袖自生寒夜久玉肌元不粟却尋千樹煙江曲道骨仙風終絶俗絳裙縞袂各朝元只有散香名萼緑馬荘父玉樓春南枝又覺芳心動愁我相思情味重隴頭何處寄将書香發有時疑是夢誰家横笛成三弄吹倒幽香和夢送覺來知不是梅花落寞嵗寒誰與共丘崈錦帳春翠竹如屏淺山如畫小池面危橋一跨著㯶亭臨水宛然郊野竹籬茅舍好是天寒倍添妍雅正雪意垂垂欲下更䑃朧月影弄晴初夜梅花動也蘇軾南鄉子寒雀滿疎籬争抱寒枝看玉􅅋忽見客來花下坐驚飛踏散芳英落酒巵痛飲又能詩坐客無氊醉不知花謝酒闌春到也離離一㸃㣲酸已著枝辛棄疾臨江仙老去惜花心已懶愛梅猶遶江村一枝先破玉溪春更無花態度全是雪精神勝向空山餐秀色為渠著句清新竹根流水帯溪雲醉來渾不記歸去月黄昬劉光祖江城子一分雪意却成霜暮雲黄月㣲茫只有梅花依舊吐幽芳還喜無邉春信至疎影下覓浮香才情端是紫㣲郎别鴛行憶宮墻夜半何為人與月交相君合召歸吾老矣月随去照㢠廻廊髙觀國金人捧露盤念瑶姬翻瑶佩下瑶池冷香夢吹上南枝羅浮路杳憶曽清晚見仙姿天寒翠袖可憐是倚竹依依溪痕淺雲痕凍月痕淡粉痕㣲江頭怨一笛休吹芳香待寄玉堂煙驛雨凄迷新愁萬斛為春痩却怕春知朱敦儒驀山溪玉真姊妹只這梅花是乗醉下瑶臺粉燕脂何曽梳洗氷姿素艶壓羣芳獨自笑有時愁一㸃心誰寄雲添蕊佩霜䕶盈盈淚塵世悔重來夢凄凉玉樓十二敎些香去説與惜花人雲黯淡月䑃朧今夕誰同睡辛棄疾最髙樓花知否花一似何郎又似沈東陽痩稜稜地天然白冷清清地許多香笑東君還又向北枝忙著一陣霎時間底雪更一個缺些児底月山下路水邉墻清香怕有人知處影児守定竹傍廂且饒他桃李趁少年塲李之儀早梅芳雪初消頓覺寒将變已報梅稍暖日邉霜外迤􅆔枝條自柔軟嫩苞勻㸃綴緑萼輕裁翦隐深心未許清香散漸融和開欲遍宻處疑無間天然標韻不與羣花鬭深淺夕陽波似動曲水風猶懶最銷魂弄影無人見朱敦儒洞仙歌何人不愛是江梅初綻野雪寒空凍雲晩看清溪綽約粉艶春風包絳萼姑射氷肌自暖上林花萬品都借風流國色天香任歆羡共素娥青女一笑相逢人不見悄悄霜宮月殿想乗雲長徃玉皇前粲蕊佩月璫侍清都宴金李俊民洞仙歌隴頭瀟灑辜負尋芳眼浪蘂浮花問名懶縱看看驛使帯得春來祇恐怕緑葉成隂子滿暗香無恙否月落參横惆悵羅浮夢短賴故人情重不减西湖花一月分我黄昬一半更選甚南枝與北枝是一種春風待争寒煖宋栁永江城梅花引年年江上探春梅為誰開暗香來疑是月宮仙子下瑶臺冷艶一枝香在手故人逺相思切寄與誰恨極怨極嗅香蕊念此情家萬里暮霞散綺楚天碧數片輕飛為我多情特地㸃征衣花易飄零人易老正心碎那堪塞管吹元張雨雪獅児含香弄粉便勾引遊騎尋芳城南城北别有西邨斷港氷凘㣲緑孤山路熟伴老鶴晩先尋宿怕凍損三花兩蕊寒泉幽谷幾番花影濯足記歸來醉臥雪深平屋春夢無憑鬢底閙蛾争撲不如圖畵相對展官奴風竹燒黄燭自聼瓶笙調曲宋劉克荘滿江紅赤日黄埃夢不到清溪翠􅅢空健羡君家别墅幾株幽獨骨冷肌清偏要月天寒日暮尤宜竹想主人杖履繞千回山南北寧委澗嫌金屋寧傲雪羞銀燭笑出塵風韻背時妝束競愛東隣姬傅粉誰憐空谷人如玉笑林逋何遜謾成詩無人讀姜夔暗香舊時月色算幾番照我梅邉吹笛喚起玉人不管清寒與攀折何遜而今漸老都忘却春風詞筆但怪得竹外疎花香冷入瑶席江國正寂寂欲寄與路遥夜雪初積翠尊易泣紅萼無言耿相憶長記曽攜手處千樹壓西湖寒碧又片片吹盡也幾時見得趙彦端醉蓬萊向蓬萊雲渺姑射山深有春長好香滿枝南笑人間驚早試問寒柯鏤氷裁玉費化工多少東閣詩成西湖夢覺幾番清曉好是羅幃麝温屏暖却恨烟邨雨愁風惱一一清芬為東君傾倒待得明年緑隂青子䕃鳳凰池沼更把陽和從頭付與繁花芳草趙以夫孤鸞江頭春早問江上寒梅占春多少自照疎星冷祗許春風到幽香不知甚處但迢迢滿河煙草囬首誰家竹外有一枝斜好記當年曽共花前笑念玉雪襟期有誰知道喚起羅浮夢正參横月小凄凉更吹寒管謾相思鬢毛驚老待覓西湖半曲對霜天清曉朱子念奴嬌臨風一笑問羣芳誰是真香純白獨立無朋算來有姑射山頭仙客絶艶誰憐真心自保邈與塵縁隔天然殊勝不闗風露氷雪應笑俗桃麤李無言翻引狂蜂亂蝶争似黄昬閑弄影清淺一溪霜月畵角初殘瑶臺夢斷直下成休歇緑隂青子莫教容易摧折吳文英髙陽臺宮粉彫痕仙雲堕影無人野水荒灣古石埋香金沙銷骨連環南樓不恨吹横笛恨曉風千里關山半飄零庭上黄昬月冷闌干夀陽宮裏愁鸞鏡問誰調玉髓暗補香瘢細雨歸鴻孤山無限春寒離魂難倩招清些夢縞衣解佩溪邉最愁人啼鳥晴明葉底清圓元張翥東風第一枝老樹渾苔横枝未葉青春􅈕誤芳約背隂未返氷魂陽稍已含紅萼佳人寒怯誰驚起曉來梳掠是月斜花外么禽霜冷竹間幽鶴雲淡淡粉痕漸薄風細細凍香又落叩門喜伴金尊倚欄怕聼畵角依稀夢裏記半面淺窺朱箔甚時得重寫鸞箋去訪舊遊東閣宋吳文英解語花門横皺碧路入蒼煙春近江南岸暮寒如翦臨溪影一一半斜清淺飛英弄晩蕩千里暗香平逺端正看瓊樹三枝總似蘭昌見酥映雲容夜暖伴蘭翹清痩簫鳳柔婉冷雲荒翠幽棲乆無語暗申春怨東風半面料凖擬何郎詩巻歡未闌烟雨青黄宜晝隂庭館周邦彦花犯粉墻低梅花照眼依然舊風味露痕輕綴浄洗鉛華無限清麗去年勝賞曽孤倚氷盤同燕喜更可惜雪中髙樹香篝熏素被今年對花太匆匆相逢似有恨依依愁悴凝望中蒼苔上旋看飛墜相将脆丸薦酒人正在空江烟浪裏但夢想一枝瀟灑黄昬斜照水元張翥木蘭花慢愛西湖千樹曽幾度為􅂝尊向栁外停橈苔邉待鶴酒熱詩溫瀛洲舊時月色悵荒凉惟有數枝存天上梨花成夢江南桃葉移根如今憔悴客愁邨難返暗香魂甚嵗晚春遲角寒笛曉雪暗雲昬登臨不堪寄目但青山隐隐月紛紛再約與君同醉從他啄木敲門宋朱敦儒壷中天見梅驚笑問經年何處收香藏白似語如愁還笑我何苦紅塵久客觀裏栽桃仙家種杏到處成疎隔千林無伴淡然獨傲霜雪且與管領春回孤標争􅈕逐雄蜂雌蝶豈是無情知他受了多少凄凉風月寄隴程遥和羮心在忍使芳塵歇東風寂寞可憐誰為攀折辛棄疾瑞鶴仙雁霜寒透幙正䕶月雲輕嫩氷猶薄溪奩照梳掠想含章弄粉艶妝誰學玉肌痩弱更重重龍綃襯著倚東風一笑嫣然轉盻萬花羞落寂寞家山何在雪後園林水邉樓閣瑶池舊約鱗鴻更復誰託粉蝶兒只解尋花覓栁開遍南枝未覺但傷心冷落黄昬數聲畵角周宻臺城路東風又入江南岸年年漢宮春早寳屑無痕生香有韻消得何郎花惱孤山夢繞記路隔金沙那回曽到夜月相思翠尊誰共飲香醥天寒宫怨贈逺水邉憑為問春到多少竹外凝情墻隂照影誰見嫣然一笑冷香未了怕玉管西樓一聲霜曉花自多情看花人自老晁端禮水龍吟夜來深雪前邨路應是早梅初綻故人贈我江頭春信南枝向暖疎影横斜暗香浮動月明深淺向亭前驛畔行人立馬頻回首空腸斷别有玉溪仙館夀陽人初勻粉面天教占了百花頭上和羮未晚最是關情處髙樓上一聲羗管仗何人説與東君留取倚䦨干看劉燾花心動偏憶江梅有塵表丰儀世外標格低傍小橋斜出疎籬似向隴頭曽識暗香孤韻氷霜裏初不怕春寒要勒問桃李盈門怎生向前争得省共蕭娘去摘玉纎映瓊枝照人一色淡粉暈酥多少飛來到得夀陽宫額再三留待東君管都将那别花不惜但只恐髙樓又三弄笛元黄子行西湖月初弦月挂林梢又一度西園探梅消息粉墻朱戸苔枝露蘂淡勻輕餙玉児應有恨為悵望東昬相記憶便解珮飛入雲階長伴此花傾國還嗟痩損幽人記立馬攀條倚欄横笛少年風味拈花弄蕊愛香憐色揚州何遜在試㸃染吟箋留醉墨漫贏得疎影寒窓夜深孤寂宋趙以夫角招曉寒薄苔枝上翦成萬㸃氷萼暗香無處著立馬斷魂晴雪籬落溪畧彴悵寄驛音書遼邈夢繞揚州東閣風流舊日何郎想依然林壑離索引杯自酌相看冷淡一笑人如削水雲寒漠漠底處羣仙飛來霜鶴芳姿綽約正月滿瑶臺珠箔徙倚闌干寂寞盡分付許多愁城頭角王沂孫望梅畵欄人寂喜輕盈照水犯寒先坼裊數枝雲縷鮫綃露淺淺塗黄漢宮嬌額翦玉裁氷已占斷江南春色恨風前素艶雪裏暗香偶成抛擲如今眼穿故國待拈花弄蕊時話思憶想隴頭依約飄零甚千里芳心杳無消息粉怯珠愁又只恐吹殘羌笛正斜飛半窓曉月夢回隴驛一萼紅思飄颻擁仙姝獨歩明月照蒼翹花候猶遲庭隂不掃門掩山意蕭條抱芳恨佳人分薄似未許芳魄化春嬌雨澀風慳霧輕波細湘夢迢迢誰伴碧尊雕俎喚瓊姬皎皎緑髮蕭蕭青鳳啼空玉龍舞夜遥盼河漢光揺未湏賦疎香淡影且同倚枯蘚聼吹簫聼久餘音欲絶寒透鮫綃張炎疎影黄昬片月似滿地碎隂還更清絶枝北枝南疑有疑無幾度背燈難折依稀倩女離魂處緩歩出前邨時節看夜深竹外横斜應妬過雲明滅窺鏡蛾眉淡掃為容不在貎獨抱孤潔莫是花光描取春痕不怕麗譙吹徹還驚海上燃犀去照水底珊瑚疑活做弄得酒醒天寒空對一庭香雪姜䕫疎影苔枝綴玉有翠禽小小枝上同宿客裏相逢籬角黄昬無言自倚修竹昭君不慣胡沙逺但暗憶江南江北想珮環月下歸來化作此花幽獨猶記深宮舊事那人正睡裏飛近蛾緑莫似春風不管盈盈早與安排金屋還敎一片随波去又却怨玉龍哀曲等恁時重覓幽香已入小窓横幅方岳沁園春有美人兮鐵石心腸寄春一枝喜蘚生龍甲那因雪痩月横鶴膝不受寒欺雲臥空山夢回孤驛生怕渠嗔未敢詩江頭路問銷魂幾許索笑何時賦成字字明璣君莫倚家山舊解題歎水曺安在飄然欲去道山已矣其誰與歸烟雨愁予江山老我畢竟嵗寒然後知微酸在儘危譙斜倚殘角孤吹髙觀國賀新郎月冷霜袍擁見一枝年華又晚粉愁香凍雲隔溪橋人不度的皪春心未縱清影怕寒波揺動更沒纎毫塵俗態倚髙情預得春風寵沉凍蜨挂么鳳一杯正要吳姬捧想見那柔酥弄白暗香偷送囬首羅浮今在否寂寞烟迷翠壠又争奈桓伊三弄開遍西湖春意爛算羣花正作江山夢吟思怯暮雲重劉克荘賀新郎鵲報千林喜還猛省謝家池館早寒天氣要與瑶姬叙離索草草杯盤藉地悵减盡何郎才思不願玉堂并金屋願年年嵗嵗花間醉餐秀色挹髙􅆀西園飛盖東山妓問何如半山雪裏孤山煙外管甚夜深風露冷人與長瓶共睡任翠羽枝頭多事老子平生無他過為梅花愛取風流罪簪向髮莫教墜俞國寳賀新郎夢裏驂鸞鶴覺三山不逺依然被海風吹落浮到五湖煙水上剛被梅花醉著粲玉樹輕明疎薄十萬瓊琚天女隊捧氷壷玉液琉璃杓來伴我薦清酌恍然夢斷殊非昨問溪邉竹外新來為誰開却無限氷壷招不得擬把離騷喚覺待抖擻紅塵䨇脚萬里瑶臺終一到想玉奴不負東風約留此恨寄殘角别録増東方朔外傳朔門生三人俱行乃見一鳩一生曰今當有酒一生曰其酒必酸一生曰雖得酒不得飲也三生皆到湏臾主人出酒即安樽於地而覆之訖不得飲朔乃問其故曰出門見鳩飲水故知得酒鳩飛集梅樹故知酒酸鳩飛去所集枝折故知不得飲之桂陽先賢傳蘇耽後園梅樹下種藥可治百病二老堂詩話政和中廬陵太守程祁學有淵源尤工詩在郡六年郡人叚子冲字謙叔學問過人自號潛叟郡以遺逸八行薦力辭與程唱酬梅花絶句展轉千首識者已嘆其博近嵗有同年陳從古字希顔裒古梅花詩八百篇一一次韻其自序云在漢晉未之或聞自宋鮑照以下僅得十七人共二十一首唐詩人最盛杜少陵二首白樂天四首元㣲之韓退之栁子厚劉夢得杜牧之各一首自餘不過一二如李翰林韋蘇州孟東野皮日休諸人則又寂無一篇至夲朝方盛行而予日積月累酬和千篇云許彦周詩話林和靖梅詩云疎影横斜水清淺暗香浮動月黄昬大為歐陽文忠公稱賞大凡和靖集中梅詩最好梅花詩中此二句尤竒麗東坡和少游梅詩云西湖處士骨應槁只有此詩君壓倒僕意東坡亦有微意也竹坡詩話林和靖賦梅花詩有疎影横斜水清淺暗香浮動月黄昬之語膾炙天下殆二百年東坡晚年在惠州作梅花詩云紛紛初疑月挂樹耿耿獨與參横昬此語一出和靖之氣遂索然矣張文潛云調鼎當年終有實論花天下更無香此雖未及東坡髙妙然猶可使和靖作衙官政和間余見胡份司業和曽公衮梅花詩云絶艶更無花得似暗香惟有月明知亦自竒絶使醉翁見之未必専賞和靖也西湖志餘馬浩瀾評梅詩林和靖疎影横斜水清淺暗香浮動月黄昬冩梅之風韻髙季廸雪滿山中髙士臥月明林下美人來狀梅之精神楊廉夫萬花敢向雪中出一樹獨先天下春道梅之氣節林和靖疎影暗香之聫歐陽文忠極賞之王晉卿顧謂此兩句杏與桃李皆可用蘇東坡云可則可但恐杏桃李不敢當耳黄魯直則愛雪後園林纔半樹水邉籬落忽横枝謂勝前句王直方則謂池水倒窺疎影動屋簷斜入一枝低可與前句伯仲餘冬序録宣和中陳與義以賦墨梅詩受知徽宗遂登册府而序其集者遂有詩能逹人之説山家清供梅花湯餅泉之紫帽山有髙人常作此供初浸白梅檀香末水和麵作餛飩皮毎一叠用五出鐵鑿如梅花様者鑿取之候煑熟乃過於雞清汁内毎客上二百餘花一食亦不忘梅也蜜漬梅花楊誠齋詩云甕澄雪水釀春寒蜜㸃梅花𢃄露餐句裏畧無烟火氣更教獨上少陵壇剥白肉少許浸雪水梅花温釀之露一宿取去蜜漬之可薦酒較之敲雪煎茶風味不殊也湯綻梅十月後用竹刀取欲開梅蕊上蘸以蠟投尊缶中夏月以熱湯就盞泡之花即綻香可愛也梅粥梅落英浄洗用雪水煑候白粥熟同煑楊誠齋詩云纔看臘後得春饒愁見風前作雪飄脫蕊收将熬粥吃落英仍好當香燒梅花脯山栗橄㰖薄切同食有梅花風韻名梅花脯山家清事梅花紙帳用獨床傍植四黑漆柱各掛錫瓶挿梅数枝後設黑漆板約二尺自地及頂欲靠以清坐左右設横木亦可掛衣角安斑竹書貯蔵書掛白麈上作大方目用細白楮作帳罩之中安小荷葉鼎燃紫藤香用布單楮衾菊枕蒲褥乃相稱原多能鄙事梅将開時清旦摘半開花頭𢃄蒂置瓶中毎一両用炒鹽一兩灑之不可以手觸壊以厚紙數重密封置隂處次年取時先置蜜於盞内然後取花二三朶滚湯一泡花頭自開香美異常増梅樑述異記㑹稽山禹廟中有梅樑忽一春而生枝葉四明圖經大梅山在鄞縣東七十里盖漢梅子真舊隐也山頂有大梅木其上則伐為會稽禹廟之樑其下則為它山堰之梁禹廟之梁張僧繇畵龍於其上夜或風雨飛入鏡湖與龍鬭後人見梁上水淋漓而萍藻滿焉始駭異之乃以鐵索鎖於柱具區志梅梁湖在夫椒山東吳時進梅梁至此舟沉失梁後毎至春首則水面生花花史晉孝武太元三年僕射謝安作新宮太極殿欠一梁有梅木流至石頭城下取用之畵梅花於梁上表瑞因名梅梁殿梅杖元劉因東齋諸物有梅杖詩云鐵石心腸氷玉姿掌中潛得嵗寒枝天教一握藏春密風覓餘香就手吹雪月吟懐随歩履溪山髙興入支頤玉堂若要扶持用説與東君也不知又謝宗可梅杖詩江路䇿雲香在手溪橋挑月影随人畵梅癸辛雜識趙孟堅字子固善墨􅃧於水仙尤得意晚畵梅自成一家嘗作梅譜詩頗盡源委畵梅譜華光道人方丈植梅數夲毎花放時輒移床其下吟詠終日莫知其意偶月夜未寝見窓間疎影横斜蕭然可愛遂以筆規其狀凌晨視之殊有月下之思因此好冩得其三昧標名於世黄魯直觀之曰如嫩寒春晚行孤山水邉籬落間但欠香耳有枯梅新梅繁梅山梅疎梅野梅宮梅江梅園梅盤梅其法不同不可無别詩曰十種梅花木湏憑墨色分莫令無辨别冩作一般春梅之有象由制氣也花屬陽而象天木屬隂而象地而其故各有五所以别奇偶而成變化蒂者花之所自生象以太極故有一丁房者花之所自彰象以三才故有三㸃萼者花之所自出象以五行故有五葉鬚者花之所自成象以七政故有七莖謝者花之所自䆒復以極數故有九變此花之所自皆陽而成數皆竒也根者梅之所自始象以二儀故有二體木者梅之所自放象以四時故有四向枝者梅之所自成象以六爻故有六成稍者梅之所自備象以八卦故有八結樹者梅之所自全象以足數故有十種此木之所自皆隂而成數皆偶也若作臨崖傍水枝怪花疎只欲半開若作梳風洗雨枝閑花茂只看離披爛漫若作披煙𢃄霧枝嫩花茂只要含笑盈枝若作臨風𢃄雪幹老枝疎只要墨撥淡蕩花間若作停霜映日森空峭直只要花細香舒葉湏圓而不類杏枝欲痩而不類栁似竹之清如松之實斯成梅矣復齋日記㑹稽王冕元章有髙才其墨梅冠絶古今斷縑殘楮人争寳之其畵梅多自題有云我家洗硯池頭樹個個花開淡墨痕不用人誇好顔色只留清氣滿乾坤樂平程楷初發棹北上赴㑹試是夕夢人有攜扇面畵梅枝一楷題云誰把枯枝紙上栽瓊花錯落𢃄晴開天公預報春消息占斷江南第一魁覺而喜明年果中禮部第一楊允孚灤京雜詠試問窓間九九圖餘寒消盡暖囘初梅花㸃遍無餘白看到今朝是杏株註冬至後貼梅花一枝於窓間佳人曉妝時以臙脂日圖一圏八十一圈既足變作杏花即暖囘矣西湖志梅花泉在栢家園左平地出泉浮漚作梅花辦毎聚五為一若可掇拾桂海虞衡志石梅生海中一叢數枝横斜痩硬形色真枯梅也雖巧工造作所不能及根所附著如覆菌原花史太和山有榔梅相傳真武折梅寄榔樹上誓曰吾道若成開花結果竟如其言増一統志嚴州府梅花峰淳安望之若梅花五出貴州都匀府梅花洞白石齒齒逺望若梅花瓶史浴梅宜隐士梅花以迎春瑞香山茶為婢原瓶插煑鯽魚湯可插梅増缾花譜梅花初折宜火燒折處固滲以泥冬間别無嘉卉僅有蠟梅梅花水仙數種此時極宜敞口古尊罍插貯湏用錫作替管盛水可免破裂之患若欲用小磁噐瓶必投以硫黄少許一法用淡肉汁去浮油入瓶插花則花悉開而瓶畧無損原眉公秘笈癸辛雜志云折梅花挿鹽中花開酷有肥態試之良然乙未正月十四日舟過鍾賈山大雪探梅僧院僧出酒相餉因論前事僧言以醃豕滚汁熱貯瓶梅却能放葉結子余始知古人鹽梅和羮故自同調接法春分後接用桃杏體杏更耐久移種去其枝梢大其根盤沃以溝泥即活衣物為梅雨所裛梅葉煎湯洗清水揉梅葉洗焦葛衣經夏不脆附録紅梅増范成大梅譜紅梅標格猶是梅而繁宻則如杏香亦類杏有鶴頂梅千葉紅梅其種來自閩湘故有福州紅潭州紅邵武紅等號花鏡鴛鴦梅花艶輕盈重葉數層䨇頭紅梅重葉並蒂單瓣紅梅杏梅花色淡紅臙脂梅朱梅較千葉紅梅色更深而艶彚考増西京雜記漢初􅁱上林苑逺方各獻名果異樹有朱梅臙脂梅石湖詩註新安絶少紅梅唯倅㕔特盛通判朝議召幕僚賞之坐皆有詩梅譜紅梅與江梅同開紅白相間園林初春絶景也石延年詩云認桃無緑葉辨杏有青枝當時以為著題東坡詩云詩老不知梅格在更看緑葉與青枝盖謂其不韻為紅梅解嘲云承平時此花獨盛於姑蘇晏元獻云始移梅西岡圃中一日貴遊賂園吏得一枝分接由是都下有二夲王琪君玉時守吳郡以詩遺公曰館娃宮北發精神粉痩􅌦寒露葉新園吏無端偷折去鳯城從此有䨇身當時罕得如此比年展轉移接殆不可勝數矣世傳吳下紅梅詩甚多惟方子通一篇絶唱有紫府與丹來換骨春風吹酒上凝脂之句埤雅天下之美有不得而兼者梅花優於香桃花優於色梅花早而白杏花晚而紅總龜云紅梅清艶両絶晏殊特珍賞之原雜志南唐苑中有紅羅亭四面専植紅梅摭遺蜀州有紅梅數夲郡侯建閣扃鑰遊人莫得見忽有兩婦人髙髻大袖凭欄語笑郡侯啟鑰閴不見人唯東壁有詩曰南枝向暖北枝寒一種春風有兩般憑仗髙樓莫吹笛大家留取倚闌干學圃餘疏南中梅都於臘月前便開吾地稍遲紅梅最先發元日有開者此花故當首植性多蟲易敗宜時時去之閩中有深淺二種可致其淺者増事詞類奇常州水田寺有紅梅閣相傳一禪師住寺中黄冠薛道光訪之相約出神同徃廣陵觀伽藍㑹見紅梅甚開各執一枝歸薛道光即從袖中取出禪師則不能盖師所出者隂神道光所出者陽神也後人遂以是名其閣云集藻五言古詩増宋梅堯臣吳正仲求紅梅接頭君家梅溪上但見梅花白我家梅樹紅求枝寄歸客翦接如交情夲末不相隔明年舉酒時醉頰生㣲赤程致道紅梅春風日浩蕩醉色囘氷肌所恨培雪根向來嵗寒枝差池弄芳晚坐令顔色移顔色固嫵媚清香無故時元劉詵元日賦紅梅紅梅夲遲暮冬暖遂争先亂蕊額黄澹細蘤丹沙圓雖加㸃染工風致終自然懐哉生意具欲折還復憐物理且如此吾生寧怨天七言古詩増宋梅堯臣紅梅篇昨夜輕雷起風雨芍藥紅牙竹欄土南庭梅花如杏花東家殘朱塗頰䩉萼為裳衣蕊為組枝為髙居榦為戸蛺蝶未生蜂未來赤身掩斂無金縷終然有心當助傳説羮落亦不學飛燕皇后廽風舞此意又笑麻姑與王母勾引何人擗麟脯是非方朔謾漢武只知此桃不知語樹不著口數而今言之已莫補放我渾丹鳳凰羽王十朋紅梅似桃非桃杏非杏獨與江梅相早晚天姿約畧𢃄春醒便覺花容太柔婉霞觴㶑灔玉妃醉應悞劉郎來閬苑㑹湏參作比紅詩莫學墻頭等閒見范成大紅梅華燈收盡江梅落别有横枝照林薄天敎閬苑染芳根小住山城慰蕭索騰騰醉後酒紅醺淡淡妝成笑靨新斟酌東君已傾倒為渠都費十分春别乗胸懐有風月催喚新尊洗愁絶花知主客得不凡一夜光風融綘雪樓頭煙暝吹單于花梢掛星光有無歸來境熟落春夢夢入鎖香紅綺疏嶺上紅梅霧雨臙脂照松竹江南春風一枝足滿城桃李各嫣然寂寞傾城在空谷城中誰解惜娉婷遊子路傍空復情花不能言客無語日暮清愁相對生元郝經賞紅梅汴梁宮中綘綃梅移向汴河堤上栽青條團掿杏花顆瑣細向陽才半開張公小隊呼我飲風色偃髯寒氣凜玉銜徑踏黄河氷貂㡌颯簷掀紫錦金鞍細馬歌舞人雪壓小橋不動塵入門下馬簇花宴紅蓮舊府花正新玉川金波碧香酒折花遍插分素手春透寒梢未全綻風流正要臙脂痩賞梅不用歌落梅緩歌却著銀笙催愛香細擷生霞蕊浮動雲腴嚼一杯夲是前邨冷澹花不稱王侯将相家明朝更向明月底藉雪凍吟疎影裏謝應芳薦福寺紅梅紅梅閣下紅梅樹陵谷移時風拔去堯峯老禪歸故山覓得孤根栽舊處年年春到花時節一枝五出臙脂雪春風笑面嵗寒心光塵混融風韻别老禪道服忘妍醜品題假我扶犁手黄州定慧海棠花可與齊名傳不朽月香水影象王宮雜花世界将無同幾度拈花有人笑吾将請問瞿曇翁五言律詩増宋石延年紅梅梅好惟傷白今紅是絶奇認桃無緑葉辨杏有青枝烘笑從人贈酡顔任笛吹未應嬌意急發赤怒春遲梅堯臣紅梅家住寒溪曲梅先雜煖春學妝如小女聚笑發丹唇野杏堪同舍山櫻莫與隣休吹江上笛留伴庾園人朱子和宋丈韻紅梅聞説寒梅盡尋芳去已遲冷香無宿蕊穠艶有繁枝正復非同調何妨讀舊詩廣平偏嫵媚鐵石誤心期葛長庚紅梅人賦紅梅少予詩為補遺霞融姑射面酒沁夀陽肌太潔遭時妬獨醒為衆疑漫随春色媚自保嵗寒姿七言律詩原宋蘇軾紅梅怕愁貪睡獨開遲自恐氷容不入時故作小紅桃杏色尚餘孤痩雪霜姿寒心未􅈕随春態酒暈無端上玉肌詩老不知梅格在更看緑葉與青枝雪裏開花却是遲何如獨占上春時也知造物含深意故與施朱發妙姿細雨裛殘千顆淚輕寒痩損一分肌不應便雜夭桃杏半㸃㣲酸已著枝増蘇軾紅梅幽人自恨探春遲不見檀心未吐時丹鼎奪貽那是寳玉人頩頰更多姿抱叢暗蕊初含子落盞濃香已透肌乞與徐熙畫新様竹間璀璨出斜枝范成大次韻元夕賞倅㕔紅梅三首春入林梢一再風破寒勻染費天工雖然媚蕩新妝别只與横斜舊格同午枕乍醒鉛粉退曉奩初罷臘脂融後來顔色休論似夾路漫山取次紅真色生香絶世逢煙光池面兩溶溶楚隣不待施朱好虢國翻嫌傅粉濃晴日曖雲春照耀温風霽月夜舂容酒闌且駐紗籠看慢破團團一壁龍司花一笑為誰開知道朱幡得得來疎影有情當洞户蔫香無語堕空杯風生翰墨留連看月入笙歌次第催來嵗如今翻舊唱五雲叢裏望三台韓元吉紅梅不随羣艶競年芳獨自施朱對雪霜越女謾誇天下白夀陽還作醉時妝半依修竹餘真態錯認夭桃有暗香月底瑶臺清夢到霓裳新換舞衣長金叚克已紅梅用誠之弟韻梅花香裏滿蒲團萬事人間總不干醉夢毎憐春意淺詩魂長遶夜枝寒記曽上苑溪頭見又向前村雪裏看回首青􅅋已如豆齒牙衰朽怯微酸小梅初破月團團戲蝶遊蜂未敢干醉臉不禁經宿雨芳心似欲訴朝寒乍驚别後容華換更與尊前仔細看便好栽培近東閣免教風味一生酸叚成已紅梅誰㸃氷綃綘雪團黄昬和月倚闌干差随桃李争春意要伴松筠傲嵗寒冷艶只宜寒處著淺妝難入俗人看天心固惜調羮便空抱枝頭一㸃酸元元淮立春賞紅梅昨夜東風轉斗杓陌頭楊桞雪纔消曉來一樹如繁杏開向孤邨隔小橋應是化工嫌粉痩故将顔色助花嬌青枝緑葉何湏辨萬卉叢中奪錦標謝宗可紅梅梨雲無夢倚黄昬薄倩朱鉛蝕淚痕宿酒破寒薰玉骨仙丹偷暖返氷魂茜裙影露羅衣巻霞佩香封縞袂温回首孤山斜照外尋真誤入杏花邨鴛鴦梅兩兩魁春簇錦機文衾夢覺月分輝枝頭交頸棲香暖花底同心結子肥金殿鎖煙妝粉額玉堂環水浴紅衣有情一種随流去莫被風飄各自飛袁桷觀紅梅雲閣香温睡覺遲不堪殘角曉鐘時玉妃瓊屑難為從青女鉛華敢弄姿可怪鮫綃能幻色誰将猩血解填肌團團似就廻文錦薄暮凝愁下翠枝楊載紅梅玉人中酒殢芳華盡壓東風百種花襆被冬深裁異錦篝燈夜永障輕紗纎􅅋露沁蜂腰蠟密蕊雲蒸鶴頂砂為問閬風何處在相期髙舉籋晨霞原明雷思霈紅梅似是梨枝靠杏芽又飛栁絮裹桃花嵰山紺雪仙娥頰玉座丹砂道士家豈為穠香非素質故将氷蕊當鉛華廣平心事堅如鐵作賦何妨嫵媚奢五言絶句増宋王安石紅梅春半花纔發多應不耐寒北人初不識渾作杏花看范成大紅梅酒力欺朝寒潮紅上妝面桃李漫同時輸了春風半元王冕紅梅深院春無限香風吹緑漪玉妃清夢醒花雨落臙脂明黄肅紅梅隴頭人未來江南春幾許惆悵玉簫聲吹落臙脂雨七言絶句増宋蘇軾謝送紅梅栽年年芳信負紅梅江畔垂垂又欲開珍重多情關令尹直和根撥送春來原毛滂紅梅何處曽臨阿母池深将絳雪㸃寒枝東墻羞頰逢人笑南國酡顔強自持増陸游紅梅雪裏溪頭已占春小園又試晚妝新放翁老去風情在惱得梅花醉似人原楊平州誰将醉裏春風面換却平生玉雪身賴得月明留痩影苦心氷骨見天真徐介軒寒香冷艶綴輕枝誤認夭桃未放時盛餙霓裳陪越女不施粉黛抹臙脂輕盈弄月醉霞觴嬌軟酡顔褪晚妝縞素叢中紅一㸃好花終是不尋常桂水集紫府移來詫早芳玉容寂寞試紅妝花含曉雨臙脂濕枝繞春風絳雪凉増金麻九疇紅梅一種氷魂物已尤朱唇㸃綴更風流嵗寒未許東風管澹抹濃妝得自由元日能紅梅天上紅光白玉肌吳妝約畧更相宜認桃辨杏由君眼自有溪風山月知元王冕紅梅四首彩鳳穿花啄石苔玉窓瓊户紫煙開山人不説羅浮夢却憶𤣥都觀裏栽玉妃歩月影毿毿宴罷瑶池酒正酣半夜不知香露冷春風吹夢過江南昭陽殿裏醉春風香隔瓊簾映淺紅翠袖擁雲扶不起玉簫吹過小樓東爛醉西湖處士家酒痕吹上水邉花東風蛺蝶迷香夢一樹珊瑚月影斜楊維楨紅梅羅浮仙子宴璚宫海色生春醉靨紅十二闌干明月夜九霞帳暖睡東風丁鶴年紅梅姑射仙人鍊玉砂丹光晴貫洞中霞無端半夜東風起吹作江南第一花明李東陽題延平劉郎中廷信所藏紅梅三首美人家住越江城翠袖紅顔最有情猶是江南無雪地雪中看得更分明莫種西湖淺水濵水清花艶各傷神春光不與花相妬花到開時却妬春𤣥都寂寞花無主劒浦芳菲樹亦香顔色似同風格異劉郎非是舊劉郎原王世貞小苑紅梅刺眼新一枝分作峽江春長安驛騎知何限天上於今少故人謝文爵近水穿籬壓衆芳檀心一㸃漏春光世情多厭氷霜面故作東風冶艶妝増僧徳輝題紅梅三百年來處士家酒旗風裏一枝斜叚橋荒蘚無人問顔色如今問杏花詩􅄆句増元虞集醉來紅袖近歌罷彩雲消唐杜甫沙邨白雪仍含凍江院紅梅已放春宋晏殊若使開遲二三月北人應作杏花看張舜民小園寂寞鎖春風初見梅花一抹紅王十朋梅花精神杏花色春入蓮洲初破萼鄭安晚堅白雅占南枝先淺紅尤待北人識徐􅆀中要知此花清絶處端如醉面讀離騷釋道潛月浸繁枝香冉冉露浮紅萼曉團團元許謙梅花照眼送寒色酒暈著臉生春和詞原宋蘇軾菩薩蠻嶠南江淺紅梅小小梅紅淺江南嶠窺我向疎籬籬疎向我窺老人行即到到即行人老離别惜殘枝枝殘惜别離髙觀國留春令玉妃春醉夜寒吹堕江南風月一自情留館娃宮在竹外尤清絶貪睡開遲風韻别向杏花休説角冷黄昬艶歌殘拍驚落胭脂雪毛滂木蘭花當日嶺頭相見處玉骨氷肌元淡素近來因甚要濃妝不管滿城桃杏妬酒暈臉霞春態度認是東君偏管顧生羅衣褪為誰羞香冷薰爐都不覷真徳秀蝶戀花兩岸月橋花半吐紅透肌香暗把遊人誤盡道武陵溪上路不知迷入江南去先自氷霜真態度何事枝頭㸃㸃胭脂汚莫是東君嫌澹素問花花又嬌無語蘇軾定風波好睡慵開莫厭遲自憐氷臉不時宜偶作小紅桃杏色閑雅尚餘孤痩雪霜姿休把閒心随物態何事酒生㣲暈沁瑶肌詩老不知梅格在吟詠更看緑葉與青枝杜安世折紅梅喜輕凘初綻㣲和漸入郊原時節春消息夜來陡覺紅梅數枝争發玉溪珍舘不似個尋常標格化工别與一種風情似勻㸃胭脂染成香雪重吟細閲比繁杏夭桃品流終别可惜彩雲易散冷落謝池風月憑誰向説三弄處龍吟休咽大家覓取時倚闌干聞有花堪折勸君湏折别録増北戸録嶺南之梅小於江左居人採之雜以朱槿花和鹽曝之梅為槿花所染其色可愛東坡紅梅詩註楚辭逺遊篇玉色頩以艶顔兮精神粹而始壯頩怒色玉人怒則頰紅故以比紅梅也事文類聚東坡云石曼卿紅梅詩認桃無緑葉辨杏有青枝此邨學堂中語也原花史洪覺範用皂角膠畫紅梅於生絹扇上燈月下映之宛然疎影附録茶梅花原茶梅花開十一月中正諸花彫謝之候花如鵝眼錢而色粉紅心黄開且耐乆望之雅素無此則子月虚度矣増類林新羅國多海紅即淺紅山茶而差小自十二月開至二月與梅同時故名茶梅集藻七言絶句増劉仕亨詠茶梅花小院猶寒未暖時海紅花發晝遲遲半深半淺東風裏好是徐熙𢃄雪枝御定佩文齋廣羣芳譜卷二十四
