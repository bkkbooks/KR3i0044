body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷二十五花譜杏花杏實别見果譜原杏樹大花多根最淺以大石壓根則花盛葉似梅差大色㣲紅圓而有尖花二月開未開色純紅開時色白㣲𢃄紅至落則純白矣花五出其六出者必䨇仁有毒千葉者不結實増格物叢話杏有黄花者真絶品也彚考増山海經靈山之下其木多杏原莊子孔子遊緇帷之林坐杏壇之上弟子讀書孔子弦歌鼓琴典術杏者東方嵗星之精西京雜記上林苑有蓬萊杏又有文杏謂其樹有文彩也東海都尉于台獻杏一株花雜五色六出云仙人所食増晉宮闕記明光殿杏八株原洛陽宮殿簿乾陽殿前杏六株含章殿前杏四株述異記賴鄉老子祠前有縹杏天台山有杏花六出而五色號仙人杏摭言唐進士杏花園初會謂之探花宴擇少俊二人為探花使徧遊名園若他人先折得花二人皆受罰異景録裴晉公午橋莊有文杏百株其處立碎錦坊増東坡雜記僕在徐州王子立子敏皆館於官舍而蜀人張師厚來過二生方年少吹洞簫飲酒杏花下眀年余謫黄州對月獨飲嘗有詩云去年花落在徐州對月酣歌美清夜今日黄州見花發小院閉門風露下盖憶與二王飲時也全唐詩話叚文昌客遊成都韋南康與奏釋褐為賔從後劉闢逐佐外邑髙崇文收蜀召復舊職指其椅曰此猶不足與君坐文昌遽請歸闕至興元西鵠鳴驛有僧倚巴山者有前識謂文昌曰去日既逢梅蕊綻來時應見杏花開至京屢升擢自相位拜劒南節度西至鵠鳴杏花方盛原詩話徐州古豐縣朱陳村有杏花一百二十里近有人為徳慶户曺過此村花尚無恙増三栁軒雜識余嘗評花以為杏有閨門之態花經杏四品六命宋濂遊荆塗二山記禹廟前杏樹一章大可蔽二牛二柏參差左右樹東置小甕杏柯之水時津津其中廟史云當晨霧四集水愈多其來如泉可代井沈守正遊香山寺記自廻廊復東為來青軒羣山拱楫蒼蒨刺人目下見陂陀髙下杏樹可十萬株此香山之第一勝處也原學圃餘疏杏花無奇多種成林則佳城中朱氏園中百株偃仰水傍予嘗攜榼賞之今當於廣圃荒池别置一林増閩部疏閩地最饒花獨杏花絶産亦一異也屠隆小輞川記池西有榭臨澗澗前植杏樹數十株顔曰文杏館王衡遊香山記臥佛寺面面皆杏花而一緋杏據西園上者大可盈抱且殊麗宿於靈光寺信歩得一杏園可百餘樹屏以翠柏而山臨之憶吾鄉絶少杏花僅朱氏園有三十樹較此直春薺爾而余毎花期必提紅酒一罌與二三子婆娑醉舞其下豈謂天壤間自有杏花谷哉花史五果為五榖之祥而杏華又候農時四民月令曰三月杏花盛可菑白沙輕土之田又曰三月昬參夕杏花盛桑椹赤可種大豆謂之上時原揚州府志太平園中有杏數十株毎至爛開太守大張宴一株命一妓倚其傍立館曰争春開元中宴罷或聞花有嘆息之聲池州府志銅陵杏山昔𫝊葛仙翁嘗留此種杏下有溪落英飛堰上名花堰増池州府志府城秀山門外杏花村杜牧詩牧童遥指杏花村即此集藻五言古詩原周庾信杏花春色方盈野枝枝綻翠英依稀映村塢爛漫開山城好折待賔客金盤襯紅瓊増宋王安石杏花石梁度空曠茅屋臨清炯俯窺嬌嬈杏未覺身勝影嫣如景陽妃含笑堕宮井怊悵有㣲波殘妝壊難整原蘇軾三月二十日多葉杏開零露泫月蕊温風散晴葩天工了不睡連夜開此花芳心誰翦刻天質自清華惱客香有無弄妝影横斜中山古戰國殺氣浮髙牙叢臺餘袨服易水雜悲笳自從此花開玉肌洗塵沙坐令遊俠窟化作温柔家我老念江海不飲空咨嗟劉郎歸何日紅桃爍殘霞明年花開時舉酒望三巴増陸游江路見杏花我行浣花村紅杏紅于染數樹照南陂一林藏北崦雖慙嶺梅髙繁麗豈易貶雨絲飛復止雲葉低未斂似嫌風日𦂳䕶此臙脂㸃身閒得縱觀無語吾所歉元范梈二杏北鄰杏一株身作龍盤拏直上青天中虚空髙結花南鄰杏更好枝榦相交加三月二月時匝地堆紅霞自我來京城寄居諸公家其地僻且阻茂樹繞牕紗亦有桃與李盛節争豪奢雖富無可人紛紛亂如麻晚遇此二杏突兀超塵沙常時好客來立斾遥咨嗟欲去復顧戀徃徃至日斜我昔直詞館羸馬道路賒晨徃昬黑歸無由領其嘉今我已投散終日猶枯查朝暮出見之百匝虚簷牙而我又将去何繇報繁葩誓将適南郡辟地江之涯種此一萬樹漫漫被荒遐花成實給食收拾嵗盈車此事亦易集但恐君疑誇明袁凱杏塢窈窕石徑深參差繁英滿發采已云奇生香殊未斷依依午橋路粲粲朱陳坂月色散疎影時時坐横管七言古詩原唐韓愈杏花居鄰北郭古寺空杏花兩株能白紅曲江滿園不可到看此寧避雨與風二年流􅇡出嶺外所見草木多異同冬寒不嚴地恒泄陽氣發亂無全功浮花浪蕊鎮常有纔開還落瘴霧中山榴躑躅少意思照耀黄紫徒為叢鷓鴣鈎輈猿呌歇杳靄深谷攢青楓豈如此樹一來翫若在京國情何窮今旦胡為忽惆悵萬片飄泊随西東明年花發應更好道人莫忘鄰家翁増宋歐陽修鎮陽殘杏鎮陽二月春苦寒東風力弱氷雪頑北潭跬歩病不到何暇騎馬尋郊原鵰丘新晴暖已動砌下流水來潺潺但聞簷間鳥語變不覺桃杏開已闌人生一世浪自苦盛衰桃李開落間西亭昨日偶獨到猶有一樹當南軒殘芳爛漫看更好皓若春雪團枝繁無風已恐自零落長條可愛不可攀猶堪攜酒醉其下誰肯伴我頽巾冠原蘇軾月夜與客飲酒杏花下杏花飛簾散餘春明月入户尋幽人褰衣歩月踏花影炯如流水涵青蘋花間置酒清香發争挽長條落香雪山城薄酒不堪飲勸君且吸盃中月洞簫聲斷月明中惟憂月落酒杯空明朝卷地東風惡但見緑葉棲殘紅増金元好問荆棘中杏花墻東荒蹊抱村斜荆棘狼籍盤根芽何年丹杏此留種小紅濈濈争春華野人慣見漫不省獨有詩客來咨嗟天真不到鉛粉筆富艶自是宮闈花曲池芳徑非夙昔蒼苔濁酒同天涯京師惜花如惜玉曉擔賣徹東西家杏花看紅不看白十日忙殺遊春車誰家園亭有此樹鄭重已著重幃遮阿嬌新寵貯金屋明妃逺嫁愁清笳落花縈簾拂牀席亦有飄泊沾泥沙天公無心物自物得意未用相凌誇黄昬人歸花不語惟有落月啼棲鴉紀子正杏園宴集紀翁種杏城西垠千株萬株紅􅃩新今年寒食好天色曉氣鬱鬱含芳津天公自愛此花好朝薰暮染煩花神融霞暈雪一傾倒非烟非霧非卿雲未開何所似乳兒粉妝深綘唇能啼能笑癡復騃畫出百子元非真半開何所似里中處女東家鄰陽和入骨春思動欲語不語時輕顰就中爛漫尤更好五家合隊虢與秦曲江江頭看車馬十里羅綺争紅塵陽平一邑多詩豪主人買酒邀衆賔花時有成約恨少楊子張吾軍落花著衣紅繽紛四座慘淡傷精魂花開花落十日耳對花不飲花應嗔愛花常苦得花晚争教行樂無閒身芳苞一破不更合且看錦樹烘殘春元袁桷㶟陽張節婦瓶中杏枝著花因賦陶人妙合隂陽機凍壺頃刻廻芳菲盈盈緑房綴氷蕊玉蝶婀娜穿帷飛佳人蓬鬢不下堂手繡孤鳳横匡牀寳刀翦繒試春色翠袖慘澹顔無光烏頭可白珠九曲造物深知憐不足故應試此一枝春㸃綴扶疎驚衆目五言律詩増唐温憲杏花團雪上晴梢紅明映碧寥店香風起夜村白雨休朝静落頻沾蔕繁開正蔽條澹然閒賞乆無以破妖嬈張籍古苑杏花廢苑杏花在行人愁到時獨開新塹底半露舊燒枝晚色連荒轍低隂覆折碑茫茫古陵下春盡又誰知原鄭谷杏花不學梅欺雪輕紅照碧池小桃新謝後䨇燕却來時香屬登龍客烟籠宿蝶枝臨軒湏貎取風雨易離披増宋梅堯臣依韻和王幾道途次杏花有感馬上逢丹杏芳條拂眼過可憐芳徑少不道故園多艶萼粘紅蠟仙葩縐薄羅客心知易感路逺奈愁何原明申時行詠適適圃杏垣坊開裴墅錦花發董林株望欲迷瓊苑栽疑近白榆㣲風舒露臉小雨濕烟鬚春意枝頭閙從敎醉玉壺五言小律原唐吳融杏花春物競相妒杏花應最嬌紅輕欲愁殺粉薄似啼消願作南華夢翩翩繞此條七言律詩増唐温庭筠杏花紅花初綻雪花繁重疉髙低滿小園正見盛時猶悵望豈堪開處已繽翻情為世累詩千首醉是吾鄉酒一樽杳杳艶歌春日午出墻何處隔朱門吳融途中見杏花一枝紅杏出墻頭墻外人行正獨愁長得看來猶有恨可堪逢處更難留林空色曙鶯先到春淺香寒蝶未遊更憶帝鄉千萬樹淡烟籠日暗神州杏花粉薄紅輕揜斂羞花中占斷得風流軟非因醉都無力凝不成歌亦自愁獨照影時臨水畔最含情處出墻頭徘徊盡日難成别更待黄昬對酒樓羅隐杏花暖觸衣襟漠漠香間梅遮栁不勝芳數枝艶拂文君酒半里紅欹宋玉墻盡日無人疑悵望有時經雨乍凄凉舊山山下還如此回首東風一斷腸原宋林逋杏花蓓蕾枝梢血㸃乾粉紅腮頰露春寒不禁烟雨輕欺著祗好亭臺愛惜看偎栁傍桃斜欲墜等鶯期蝶猛成團京城巷陌新晴後買得風流更一般韓琦次韻和崔公孺國博黄杏花顆顆裝成藥竈牙日邉開處近彤霞真宜相閣栽培物更是仙人種植花髙行出羣猶仰慕香名超格合洪誇諸賢繼有尋芳會欲奉歡遊决自差増司馬光和道矩送客汾西村舍杏花盛開置酒其下田家繁杏壓枝紅逺勝桃夭與李穠何事偏宜閒處植無端復向别時逢林間暫繫黄金勒花下聊飛碼碯鍾會待重來醉嘉樹只愁風雨不相容楊萬里郡圃杏花二首小樹嫣然一兩枝晴薰雨醉總相宜纔憐欲白仍紅處政是㣲開半吐時得幸東風無忌對主張春色更還誰海棠穠麗梅花淡匹似渠儂别様奇迥出千花合受降不然受拜亦何妨行穿小樹尋晴朶自挽芳條嗅暖香却恨來時差已晚不如清曉看新妝朗吟清露温風句惱殺詩翁只斷腸金毛麾和思逹兄杏花碎翦明霞役化工曉園香散暖烟中羞逢栁眼三眠白分得桃腮一笑紅上苑繁華迷故國曲江顦顇老春風欲傳此恨花無語強對芳時作醉翁元好問杏花二首芳樹春融綘蠟凝春風寂寞掩柴荆畫眉盧女嬌無奈齲齒孫娘笑不成已怕宿妝添蝶粉更堪暖蕊鬭蜂聲一般疎影黄昬月獨愛寒梅恐未平一穗蘆鞭一穗塵西園紅艶眼中新帽簷分去家家喜酒面飛來片片春梅栁幾曽同故事櫻桃纔得綴芳辰荒城此日腸堪斷老却探花筵上人杏花落後分韻得歸字獺髓能醫病頰肥鸞膠無那片紅飛殘陽澹澹不肯下流水溶溶何處歸煮酒青林寒食過明妝髙燭賞心違寫生正有徐熙在漢苑招魂果是非張村杏花昨日櫻桃綘蠟痕今朝紅袖已迎門只應芳樹知人意留著殘妝伴酒尊穠李尚湏羞粉艶寒梅空自怨黄昬詩家元白無今古從此張村即趙村元吳師道見杏花曲江二十年前㑹回首芳菲似夢中老去京華度寒食閑來野水看東風樹頭絳雪飛還白花外青天映更紅聞説琳宮更佳絶明朝攜酒訪城東錢惟善杏花等鶯期燕引遊蜂知隔垂楊第幾重壇近緇帷忘晝永宮催羯鼓助春濃絳烟輕潤香鬚裛紅雪乾團粉淚鎔寂寞曲江人不見貞元朝士憶時雍明楊基杏花當時庭館醉春風客裏相逢意轉濃只恐臙脂吹漸白最憐春水照能紅一枝争買珠簾外千樹遥看小店中惆悵先生歸去後江南烟雨又濛濛吳寛清明日園中見杏花初開疎花寂歴似殘紅病眼摩挲望欲空已恨浥開無細雨却愁吹落有狂風物華又報清明節人世真成白髮翁為語天工湏索性剰将春色慰人濃黄姬水息園賞杏花平津舊闢招賢館乗興來尋愜賞期南陌青旂蘸甲酒東風小苑斷腸枝遊絲日暖即横路舞燕泥香故掠池見説醉花宜及晝可能辜負艶陽時朱謀㬜杏花二月燒林發綘英六街初有賣花聲黄鸝立亞髙枝雨紫燕飛來小樹晴村僻深藏沽酒斾樓髙全露約簾旌年年開