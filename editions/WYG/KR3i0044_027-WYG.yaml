不變可謂得其性矣増十洲記東海有山名度索山有大桃樹屈盤數千里曰蟠桃拾遺記扶桑東五萬里有磅磄山上有桃樹百圍其花色青黑萬嵗一實原神仙傳樊夫人與夫劉剛俱學道術各自言勝中庭有兩大桃樹夫妻各咒其一桃便相鬭擊良乆剛所咒者樹走出籬外増晉宮閣名華林園桃七百三十八株白桃三株侯桃三株妬記武厯陽女嫁阮宣武絶忌家有一桃樹華葉灼燿宣歎美之即便大怒使婢取刀斫樹摧折其華原史畧北齊盧士深妻崔林義之女有才學春日以桃花和雪靧兒面咒曰取紅花取白雪與兒洗面作光悦取白雪取紅花與兒洗面作妍華取花紅取雪白與兒洗面作光澤取雪白取花紅與兒洗面作華容増景龍文館記景龍四年春上宴於桃花園羣臣畢從學士李嶠等各獻桃花詩上令宮女歌之辭既清婉歌仍妙絶獻詩者舞蹈稱萬嵗上勅太常簡二十篇入樂府號曰桃花行原開元天寳遺事御苑新有千葉桃花帝親折一枝插於妃子寳冠上曰此箇花尤能助嬌態也明皇禁苑中初有千葉桃盛開帝與貴妃日宴於樹下帝曰不獨萱草忘憂此花亦能銷恨増北户録桑苧翁謂李復云天寳末有韋長史虗舟寓于廬山瀑布泉時夏月多雨見瀑布之中流出一桃葉濶五寸長一尺二寸原劇談録武宗朝術士王瓊妙於化物無所不能方冬以藥栽培桃杏數株一夕繁英盡發芳蕊濃艶月餘方謝夲事詩唐崔䕶舉進士不第清明獨遊都城南得村居花木叢萃叩門乆之有女子自門隙問對曰尋春獨行酒渇求飲女子啟關以盂水至獨倚小桃柯佇立而屬意殊厚崔辭起送至門如不勝情而入後絶不復至及來嵗清明徑徃尋之門庭如故而扃矣因題詩於左扉云去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風後數日復徃聞其中哭聲䕶叩門有老父出曰君非崔䕶耶曰然曰君殺我女吾女笄年未嫁自去年以來常恍惚如有所失比日與之出歸見左扉字入門遂病絶食數日而死崔大感慟請入哭之尚儼然在牀崔舉女首枕以股大呼曰䕶在斯䕶在斯湏㬰開目半日復活老父大喜以女歸之増清異録江南後主同氣宜春王從謙嘗春日與妃侍遊宮中後圃妃侍覩桃花爛開意欲折而條髙小黄門取綵梯獻時從謙正乗駿馬擊毬乃引鞚至花底痛採芳菲顧謂嬪妾曰吾之緑耳梯何如外史檮杌蜀孟知祥僭位召百官宴芳林園賞紅桃花其葉六出彦周詩話春時穠麗無過桃栁桃之夭夭楊栁依依詩人言之也老杜云顛狂栁絮随風舞輕薄桃花逐水流不知縁誰而波及桃花與楊栁矣原埤雅桃性早華又華於仲春故周南以興女之年時俱富也雞肋編范純仁女孫病狂嘗閉於室中窓外有大桃樹一株花適盛開一夕斷櫺登木食桃花幾盡自是遂愈孫公談圃石曼卿通判海州以山嶺髙峻人路不通畧無花卉㸃綴照映使人以泥裹桃核抛擲于山嶺上不數年間花發滿山爛如錦繡増老學庵筆記歐陽公梅宛陵王文恭集皆有小桃詩歐詩云雪裏花開人未知摘來相顧共驚疑便湏索酒花前醉初見今年第一枝初但謂桃花有一種早開者耳及游成都始識所謂小桃者上元前後即著花狀如垂絲海棠曽子固雜識云正月二十開天章閣賞小桃正謂此也全唐詩話劉禹錫元和十年自朗州召至京戲贈看花君子云紫陌紅塵拂面來無人不道看花回𤣥都觀裏桃千樹盡是劉郎去後栽再游𤣥都觀絶句并序云余貞元二十一年為屯田郎時此觀未有花是嵗出牧連州貶朗州司馬居十年召至京師人人皆言有道士手植仙桃滿觀如紅霞遂有前篇以志一時之事旋又出牧今十有四年復為主客郎中重遊𤣥都蕩然無復一樹惟兎葵燕麥動揺春風耳因再題二十八字以俟後游時太和二年三月也詩云百畝庭中半是苔桃花净盡菜花開種桃道士歸何處前度劉郎今又來鄭志道劉阮洞記鳴玉澗之東有塢植桃數畦花光射目落英繽紛㸃綴芳草流紅縹緲随水而下此昔人食桃輕舉之地也遂名曰桃花塢六朝事迹桃花塢在蒋山寳公塔之西北舊有桃花甚盛今不復存霹靂溝在城東五里王荆公詩云霹靂溝西路柴荆四五家憶曽騎欵叚随意入桃花花經碧桃千葉桃三品七命緋桃花五品五命王維楨游石城山記茅公嘗與余遊石城山中其時三月矣而桃尚未華茅公訝之而問故余謂草木期雖至猶湏日曝之乃發耳今四面連峰雲霧恒發其上見日最難桃華能乎故得日茍先梅常侵臘得日茍後桃乃失春斯未足訝也王叔承茅山記夜次毘陵桃花園桃花數十畝映月如朝霞忽忽身在華陽夢中也聞鴈齋筆談桃之品無慮數十絳碧夭緋總堪極目然夭者故是正色耶至于人面桃則桃之變極矣瑩白如雪光浮白外素者故艷不艶于此方之梅花則今古雅俗正復迥然藉使敷蘤一時堪作梅嬖夭夭者雲從可也香宇詩談今花始開曰試花張司業新桃行植之三年餘今夏初試花月令桃始華亦讀如試王立程天台山記桃源洞即漢永平中劉晨阮肇遇仙處澗之東塢有桃數畦春時花光射目紅雨㸃綴芳草如踏錦茵江郎山志山多緋桃華而不實黄山志桃花峰下有桃花源桃花溪處處皆桃花武􅆥雜記春山霽時滿鼻皆新緑香訪鼓樓坑十里桃花杖䇿獨行随流折步春意尤閒西湖志包家山多桃花宋時有匾曰蒸霞二月遊人最盛號小桃源董嗣杲詩綺霞蒸日透林梢一簇南山尚姓包冷水峪邉苔色老冲雲樓下樹隂髙園鄰古道傳耕籍臺倚青城想拜郊欲趁桃花尋隐去關門無鎖不湏敲西湖棲霞嶺以嶺上桃花爛漫色如凝霞故名原𤣥中記寧波府城東舊傳劉阮采藥於此春月桃花萬樹儼若桃源花史茅山乾元觀道士姜麻子閻蓬頭弟子也從揚州乞爛桃核數石空山月明中種之不避豺虎自茶庵至觀中有桃花五里餘志勤禪師在溈山因桃花悟道偈曰自從一見桃花後三十年來更不疑簡州天水一碧放目無際春月桃花甚繁潘岳為河陽令栽桃李號河陽滿縣花劉公幹居鄴下一日桃李爛漫值諸公子延賞久之方去公幹問僕曰損花乎僕曰無但愛賞而已公幹曰珍重輕薄子不損折使老夫酒興不空也遂飲花下錢伸仲于錫山所居作芳美亭種桃數千百株蔡載作詩曰髙人不惜地自種無邉春莫随流水去恐汙世間塵古田縣黄蘖山多桃樹下有桃塢桃湖桃洲春月不減武陵桃溪在黄蘖山下春風㣲和夭桃夾岸亦勝境也漵浦一名華蓋山昔人嘗種桃千樹至今呼桃花圃増一統志平樂府仙巖富州口多桃花旁有碧潭游魚可掬集藻記原晉陶潛桃花源記晉太元中武陵人捕魚為業縁溪行忘路之逺近忽逢桃花林夾岸數百步中無雜樹芳草鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源便得一山山有小口髣髴若有光便舍船從口入初極狹纔通人復行數十步豁然開朗土地平曠屋舍儼然有良田美池桑竹之屬阡陌交通雞犬相聞其中徃來種作男女衣著悉如外人黄髮垂髫並怡然自樂見漁人乃大驚問所從來具答之便要還家設酒殺雞作食村中聞有此人咸來問訊自云先世避秦時亂率妻子邑人來此絶境不復出焉遂與外人間隔問今是何世乃不知有漢毋論魏晉此人一一為具言所聞皆歎惋餘人各復延至其家皆出酒食停數日辭去此中人語云不足為外人道也既出得其船便扶向路處處志之及郡下詣太守説如此太守即遣人随其徃尋向所志遂迷不復得路南陽劉子驥髙尚士也聞之欣然規徃未果尋病終後遂無問津者增明王衡東門觀桃花記盖今人多偽為雅而吾吳尤甚蘭菊幾家置一譜焉次則君竹而友松第而至桃花極矣廼余性獨深愛桃花毎春未嘗不游游必徧今年二月之十七日余與汝増約使人徃探城四隅問花之所止而之焉具報東門好則步出東門踏菜花行望見一邨居小有花栁可觀則酒鎗與蒲席已次第設矣其居在小溪中桃花左右溪約有三四十株甚嫩美既又移至吳氏莊莊宅與池相遶畧同前而廣五倍之花碩大且繁中一緋色據水上者特異長楊數章立池外如偉丈夫衣冠拱手而䕶少女于内桃花亦醉面垂垂傍水洗妝不輕見頭額也飲樹下留連乆之顧日尚未晡廼復信步尋花其在水濵者墻角橋畔者菜花栁樹叢中者輙灑水施茵曰與而延客或遇之矮簷下及坑塹竈突之間則含酒滿舌噀之曰為汝浣衣席暖更移酒盡復買忘其去城之遂逺也汝增曰夫桃價不堪與牡丹作奴人且以市娼辱之子何好之甚余笑曰子品花乎品價乎夫價則百十桃者有之然皆如口脂面粉不粘人意刻畫綵繢人能盗天夫桃也逺而睇之光浮浮然近而即之若有暖暈然盖頌桃徳者夭夭近之灼灼則已下矣擬之于春殆㢲女乎陽出震而得梅桃與梅其得氣獨完故於香味色中具有别韻即刻畫綵繢者巧愈不似似愈不真子舍是而貴夫盆盎拳握之觀何歟且夫天下之貴賤失所久矣餖飣貴而梁肉賤土偶貴而人物賤品題貴而考課賤桃之賤于子無惑也汝増無以對遂以筆誌其語頌増梁江淹桃頌惟園有桃惟山有叢丹葩擎露紫葉繞風引霧如電映烟成虹伊春之秀乃華之宗賦増陳張正見衰桃賦巖巖秀峰吐桂榮松獨夭桃之灼灼輕擢采於寒蹤爾乃萬株成錦千林似翼苔畫波文花然樹色發秦源而逸氣飄漢綬而流芳譬蘭釭之夜炷似明鏡之朝妝成蹊列徑光崖􅃩氾間真定之蒼棃雜房陵之縹李紛芳難歇照曜無儔舒若霞光欲起散似電采将收既而風落新枝霜飛故葉歎垂釣之妖童怨傾城之麗妾原唐皮日休桃花賦并序余嘗慕宋廣平之為相貞姿勁質剛態毅狀疑其鐵腸與石心不解吐婉媚辭然覩其文而有梅花賦清便富艶得南朝徐庾體殊不類其為人也後蘓相味道得而稱之廣平之名遂振嗚呼夫廣平之才未為是賦則蘇公果暇知其人哉将廣平困于窮阨于躓強為是文耶日休于文尚矣狀花卉體風物非有所諷輙抑而不發因感廣平之所作復為桃花賦其辭曰伊祁氏之作春也有􅃩外之􅃩華中之華衆木不得融為桃花厥花伊何其美實多臺𨽻衆芳縁餙陽和開破嫩萼壓低柔柯其色則不淡不深若素練輕茜玉顔半酡若夫美景姸時春含曉滋密如不幹繁若蕪枝妦妦婉婉夭夭怡怡或俛者若想或閉者如癡或向者如步或倚者如疲或温黁而可薰或婑媠而莫持或幽柔而旁午或撦冶而倒披或翹矣如望或凝然若思或奕偞以作態或窈窕而騁姿日将明兮似喜天将慘兮若悲近榆錢兮妝翠靨映楊栁兮顰愁眉輕紅拖裳動則裊香宛若鄭袖初見楚王夜景皎㓗閧然秀發又若嫦娥欲奔明月蝶散蜂寂當閨脉脉又若妲已未聞裂帛或開故楚􅃩􅃩春曙又若息媯含情不語或臨金塘或交綺井又若西子浣紗見影玉露厭浥妖紅墜濕又若驪姬将譛而泣或在水濵或臨江浦又若神女見鄭交甫或臨廣筵或當髙㑹又若韓娥将歌斂態㣲動輕風婆娑暖紅又若飛燕舞于掌中半霑斜吹或動或止又若文姬将賦而思丰茸旖旎互交逓倚又若麗華侍讌初醉狂風猛雨一陣紅去又若褒姒初随戎虜滿地春色階前砌側又若戚姬死于鞫域花品之中此花最異以衆為繁以多見鄙自是物情非關春意若氏族之斥素流品秩之卑寒士他目則目他耳則耳或以昵而稱珍或以疎而見貴或有實而花乖或有花而實悴其花可以暢君之心目其實可以充君之口腹匪乎兹花他則碌碌我欲脩花品以此花為第一懼俗情之横議我曰不然為之則已我目吾目我耳吾耳姸媸决于心取舍斷于志豈惟草木之品獨然信為國兮如此御定佩文齋廣羣芳譜卷二十五
