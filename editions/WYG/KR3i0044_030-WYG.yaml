body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷二十八花譜棠棃花棠棃别見果譜原棠棃野棃也爾雅所謂杜甘棠也詳見果譜樹如棃而小葉似蒼术亦有圓者三义者邉皆有鋸齒色黲白二月開白花可煠食曬乾磨麺作燒餅可濟饑葉味㣲苦嫩時煠熟水浸淘浄油鹽調食或蒸曬代茶彚考原詩召南蔽芾甘棠勿翦勿伐召伯所茇唐風有杕之杜生于道左有杕之杜其葉湑湑増史記燕召公世家召公巡行鄉邑有棠樹决獄政事其下自侯伯至庶人各得其所無失職者召公卒而民人思召公之政懷棠樹不敢伐歌詠之作甘棠之詩南齊書祥瑞志昇明二年四月昌國縣徐萬年門下棠樹連理宋史五行志元豐十年十二月泌陽縣甘棠木連理原韓詩外傳召伯在朝有司請召民伯曰不勞一身而勞百姓非吾先君之志也於是舎於棠下聼訟百姓大悦詩人歌焉増酉陽雜俎建中四年趙州寜晉縣沙河北有大棠棃樹百姓常祈禱忽有羣蛇數十自東南来渡北岸集棠棃樹下為二積俄見三龜徑寸繞行積傍積蛇盡死乃各登其積視蛇腹各有瘡若矢所中刺史康日知圖甘棠奉三龜以獻曲江縣志縣東九十里有棃溪岸多棠棃故名集藻七言古詩増元王冕棠棃白練圖芙蓉香冷簫聲杳月淡煙清楚宫曉仙禽不語雪衣輕相逢却恨秋風早土花翠淺霜露蒙山棃小結丹砂紅玉人醉倒不知處夢回故苑朝雲濃五言排律増唐吴融追詠棠棃花蜀地從来勝棠棃第一花更應無輭弱别自有妍華不貴綃為霧難降綺作霞移湏歸紫府駐合餌丹砂宻映彈琴宅深藏賣酒家夜宜紅蠟照春稱錦筵遮連廟魂栖望飄江字遶巴未饒酥㸃薄兼妬雪飛斜舊賞三年斷新期萬樹賒長安如種得誰定牡丹誇七言絶句増唐薛濤棠棃花和李太尉吴均蕙圃移嘉木正及東溪春雨時日晩鶯啼何所為淺深紅膩壓繁枝宋蔡襄正月十八日甘棠院三首上元纔過去尋春紅白山花粲粲新似喜使君初病起隔欄相向笑迎人天氣和柔酒更醇緩歌花底正初春狂花有意憐狂客撩亂飛紅滿一身無奈閒情著物歡更愁花草便䦨珊夭紅嫩翠宜燈燭放散笙歌静裏看原孟淑卿春歸落盡棠棃水拍堤凄凄芳草望中迷無情最是枝頭鳥不管人愁只管啼増明陸樹聲滿樹棠梨錦作團雙栖啼鳥鬭争妍邉徐生色依然好贏得東風嵗嵗看詩散句増唐白居易風吹棠棃花啼鳥時一聲鏡湖水逺何由汎棠樹枝髙不易攀薛逢野花似雪落何處棠棃樹下香風来李郢鳥聲亂啼人未逺野風吹散白棠棃白居易棠棃間葉黄元程文海霜暈棠棃臉宋司馬光甘棠前後雨隂濃金􅉝愿棠棃妥雪霑新雨元倪瓉野棠花落過清明别録増丹鉛雜録孝子傳尹伯竒採楟花以為食注楟花山棃也今棠棃其花春開採之日乾瀹可充蔬常棣花棣實别見果譜棠按名物疏云唐棣常棣是二種爾雅云棣栘本草謂之扶栘白楊類也又云常棣棣乃小雅所謂常棣之花也原譜混合為一又誤以常棣為棣棠今分常棣棣棠為二譜唐棣别載木譜増爾雅常棣棣洛陽花木記白郁李千葉一名玉𢃄原常棣有郁李諸名詳果譜花正白亦或赤花蕚上承下覆有親愛之義故以喻兄弟周公所謂賦常棣也彚考原詩秦風山有苞棣増詩小雅常棣之華鄂不韡韡傳常棣棣也鄂猶鄂鄂然言外發也韡韡光明也箋承華者曰鄂不當作拊拊鄂足也鄂足得華之光明則韡韡然盛興者喻弟以敬事兄兄以榮覆弟恩榮之顯亦韡韡然原小雅彼爾維何維常之華傳常常棣也増宋景文茟記莒公言詩有常棣之華逸詩有唐棣之華世人多誤以常棣為唐棣於兄弟用因唐誤常且常棣棣也唐棣栘也栘開而反合者也此兩物不相親三栁軒雜識姚氏殘語以常棣為俗客兄弟之義不可稱俗今改為和客花經郁李七品三命集藻賦増唐陸龜蒙郁李花賦試問山翁得郁李之春叢移来砌下出自山中長霑澗雨迥灑巖風曽不得次玉堂而展低艶承畫閣而逞㣲紅虚在芳菲之數徒干造化之功弱植欹危繁梢襞積一枝上能萬其膚蕚一蕚中自参其丹白且桃以夭而蕣以華芍藥為贈兮芙蓉可嘉誰為翦緗綺碎眀霞􅃫苞葱蘢于水殿霓襟掩苒于雲車静倚庭檻徐飄蘂氣落幽閨怨别之夣寫空谷遺榮之思初侍東陵聖母冶態嫣妍近辭北燭仙人愁容倭堕嗟其結莓苔之地抱林麓之姿蝶善舞而相掠鶯能言而見欺香憐墜少蔕戀飄遲當杯者不顧守道者應知請看嵇康髙士傳莫信長安輕薄兒五言古詩増唐白居易惜栯李花樹小花鮮妍香繁條輭弱髙低二三尺重疉千萬蕚朝艶藹霏霏夕凋紛漠漠辭枝朱粉細覆地紅綃薄由来好顔色常苦易銷爍不見莨蕩花狂風吹不落宋梅堯臣劉仲更於唐書局中種郁李冷局少風景買花栽作春前時櫻桃過今日雀李新搦條紅蓓蕾婀娜含雨勻舊来薔薇叢饒借與近鄰始移棣蕚密不慚車下榛日暮綴書罷暫賞舉杯踆七言絶句増宋趙抃次韻郁李花花縣逢春對曉暉朱朱白白綴繁枝梅先菊後何湏較好似人生各有時詩散句増唐李白棣華儻不接甘與秋草同駱賔王棠晚落疎花白居易隂繁棠布葉别録増花史郁李花性喜向暖日和風澆用清水以性潔故也櫻桃花櫻桃别見果譜原櫻桃木多隂不甚髙春初開白花繁英如雪香如蜜葉圓有尖及細齒増花鏡櫻桃花有千葉者其實少彚考原晋宫閣名式乾殿前櫻桃二株含章殿前櫻桃一株華林園櫻桃二百七十株増花經櫻桃四品六命弇山園記小罨畫溪之西種含桃含桃成嵗得一解饞花亦足飽目其左方種如之俱曰含桃塢原花史張茂卿頗事聲妓一日櫻桃花開携酒其下曰紅粉風流無踰此君悉屏妓妾一統志鄜州有櫻桃山上多櫻桃樹集藻五言古詩増唐劉禹錫和樂天讌李羙周中丞宅賞櫻桃花櫻桃千萬枝照耀如雪天王孫讌其下隔水疑神仙宿露發清香初陽動暄妍妖姬滿鬂挿酒客折枝傳同此賞芳月幾人有華筵杯行勿遽辭好醉逸三年孟郊南陽公請東櫻桃亭子春讌萬木皆未秀一林先含春此地獨何力我公布深仁霜葉日舒卷風枝逺埃塵初英濯紫霞飛雨流清津賞異出囂雜折芳積歡忻文心茲焉重俗尚安能珍碧玉妝粉比飛瓊穠艶均鴛鴦七十二花態併相新常恐遺秀志迨茲廣讌陳芳菲争勝引歌詠竟良辰方知戲馬會永謝登龍賔白居易櫻桃花下有感而作藹藹羙周宅櫻繁春日斜一為洛下客十見池上花爛漫豈無意為君占年華風光饒此樹歌舞勝諸家失盡白頭伴長成紅粉娃停杯兩相顧堪喜亦堪嗟七言古詩増唐白居易履信池櫻桃島上醉後走筆送别舒員外兼寄宗正李卿考功崔郎中櫻桃島前春去春花萬枝忽憶與宗卿閒飲日又憶與考功狂醉時嵗晚無花空有葉風吹滿地乾重疉蹋葉悲秋復憶春池邉樹下重殷勤今朝一酌臨寒水此地三回别故人櫻桃花来春千萬朶来春共誰花下坐不論崔李上青雲明日舒三亦抛我五言律詩増唐白居易同諸客擕酒早看櫻桃花曉報櫻桃發春携酒客過綠餳粘盞杓紅雪壓枝柯天色晴明少人生事故多停杯替花語不醉擬如何原李徳裕櫻桃花皎日照芳菲鮮葩含素輝愁人惜春夜達曉想巖扉風静隂盈砌露濃香入衣恨無金谷妓為我奏思歸増温庭筠二月十五日櫻桃盛開曉覺籠烟重春深染雪輕静應留得蝶繁欲不勝鶯影亂晨飇急香多夜雨晴似将千萬恨西北為卿卿宋歐陽修春日獨遊上林院後亭見櫻桃花奉寄希深聖俞昔日尋春地今来感嵗華人行已荒􅈳花發半枯槎髙榭林端出殘陽水外斜聊持一樽酒徙倚憶天涯明吴國倫櫻桃花御苑含桃樹花開作雪看誰移荒署裏偏助早春寒逞素愁金谷垂珠遲玉盤不知蕭頴士何意獨相殘七言律詩増宋梅堯臣和永叔同遊上林院後亭見櫻桃花悉已披謝去年君到見春遲今日尋芳是夙期祗道朱櫻纔弄蘂及来幽圃已殘枝飄英尚有遊蜂戀著子唯應谷鳥知把酒聊能慰餘景乘歡不厭夕陽時七言絶句増唐張籍和裴僕射看櫻桃花昨日南園新雨後櫻桃花發舊枝柯天眀不待人同看繞樹重重履跡多白居易酬韓侍郎張博士雨後遊曲江見寄小園新種紅櫻樹閒繞花枝便當逰何必更隨鞍馬隊衝泥蹋雨曲江頭題東樓前李使君所種櫻桃花身入青雲無見日手栽紅樹又逢春惟留花向樓前看故故抛愁與後人元稹折枝花贈行櫻桃花下送君時一寸春心逐折枝别後相思最多處千株萬片繞林垂劉言史山寺看櫻桃花題僧壁楚寺春風臘盡時含桃先拆一千枝老僧不語傍邉坐花發人来總不知李商隠櫻桃花下流鶯舞蝶兩相欺不取花芳正結時他日未開今日謝嘉辰長短是参差李羣玉題櫻桃春初携酒此花間幾度臨風倒玉山今日葉深黄滿樹再来惆悵不能攀吴融買𢃄花櫻桃粉紅輕淺靚妝新和露和烟别近鄰萬一有情兼有恨一年榮落兩家春陸希聲含桃圃小圃初晴風露光含桃花發滿山香看花對酒心無事倍覺春来白日長韋荘櫻桃樹記得花開雪滿枝和蜂和蝶𢃄花移如今花落逰蜂去空作主人惆悵詩宋范成大櫻桃花借暖衝寒不用媒匀朱匀粉最先来玉樓一見憐癡小教向傍邉自在開原楊萬里櫻桃花櫻桃花發滿晴柯不賭嬌嬈祇賭多落盡江梅餘半朶依然風韻合還他増元方回櫻桃花淺淺花開料峭風苦無妖色畫難工十分不肯精神露留與他時著子紅詩散句原宋王僧達緗葉未開蕊紅葩已發光宋文同嫩葉藏輕緑繁葩露淺紅明于若瀛三月雨聲細櫻花疑杏花唐李白别来幾嵗未還家玉窗五見櫻桃花李賀背人不語向何處下堦自折櫻桃花増白居易櫻桃㕔院春偏好石井欄堂夜更幽慢牽欲傍櫻桃泊借問誰家花最紅殷璠昨日小樓㣲雨過櫻桃花落晚風晴詞原宋毛滂浣溪沙小圃春光不待邀蚤通消耗與含桃晚来芳意半含梢𢃄笑不言春淡淡試妝未徧雨瀟瀟東君少女可憐嬌陳繼儒攤破浣溪沙曉来露井看櫻桃羅䄂迎風不柰飄轉向碧窗還小立再吹簫簫咽春愁愁正劇自拈香在博山燒日暮闌干楊栁外落紅敲石榴花榴實别見果譜原石榴一名丹若本草云若木乃扶桑之名榴花丹頰似之故亦有丹若之稱本出塗林安石國漢張騫使西域得其種以歸故名安石榴今處處有之樹不甚髙大枝柯附榦自地便生作叢孫枝甚多種極易息或以子種或折其條盤土中便生葉緑狭而長梗紅五月開花有大紅粉紅黄白四色有海榴來自海外樹髙二尺黄榴色㣲黄𢃄白花比常榴差大四季榴四時開花秋結實實方綻旋復開花火石榴其花如火樹甚小栽之盆頗可玩又有細葉一種亦佳餅子榴花大不結實畨花榴出山東花大於餅子移之别省終不若在彼大而華麗葢地氣異也燕中有千瓣白千瓣粉紅千瓣黄千瓣大紅單瓣者比别處不同中心花瓣如起樓臺謂之重臺石榴花頭頗大而色更深紅増花鏡石榴有竝蔕花者又有紅花白緣白花紅緣者亦異品也彚考原宋史五行志紹興間漢陽軍有挿榴枝於石罅秀茂成隂嵗有華寔者初郡獄有誣服孝婦殺姑婦不能自明屬行刑者插髻上華於石隙曰生則可以驗吾寃行刑者如其言後果生増酉陽雜俎衡山祝融峰下法華寺有石榴花春秋皆發博異記天寳中處士崔元徽春夜遇女伴十餘人有緑裳者前曰某姓楊又指一人曰李氏又指一人曰陶氏又指緋衣小女曰姓石名阿措又有封家十八姨来諸人命酒各歌以送之至十八姨持盞性頗輕佻翻酒汚阿措衣阿措作色曰諸人即奉求吾不奉畏耳拂衣而起緋衣名阿措安石榴也封家姨乃風神也原方輿勝覽閩縣東山有榴花洞唐永泰中樵者藍超遇白鹿逐之渡水入石門始極窄忽豁然有雞犬人家主翁謂曰吾避秦人也留卿可乎超曰欲與親舊訣乃来與榴花一枝而出恍然若夢中再徃竟不知所在増方輿勝覽合肥浮槎山俗傳自海上浮来梁武帝女為尼於此山建道林寺寺有榴花根榦偉茂即帝女手植花經石榴五品五命瓶花譜各色千葉榴四品四命原王直方詩話王荆公作内相翰苑有石榴一叢枝葉繁茂只發一花時荆公有詩云萬緑叢中紅一㸃動人春色不湏多予每以不見全篇為恨遯齋閑覽以為唐人詩非也洪氏雜俎温湯七聖殿繞殿石榴皆太真所植學圃餘疏石榴本外國来者獨京師為勝盆中有植榦數十年髙不盈二尺而垂實纍纍皮子之紅白一隨其花花而不實者曰餅子深紅淡紅二種皆山亭之珍也吾地不宜盆中移歸不二年壊矣本地餅子紅榴稍佳而樹大非几案前物單葉有黄白淺深紅四種存以標異可也増瓶史浴榴宜艶色婢石榴以紫薇大紅千葉木槿為婢集藻頌増梁江淹石榴頌羙木艶樹誰望誰待縹葉翠蕚紅華綘采炤烈泉石芬披山海竒麗不移霜雪空改賦増晋夏侯湛石榴賦覽華圃之嘉樹兮羡石榴之竒生滋𤣥根于􅆥壤兮擢繁榦于蘭庭霑靈液之粹色兮含渥霧以深榮若乃時雨新稀㣲風扇物藹萋萋以鮮茂兮紛扶輿以蓊鬱枝掺稔以環柔兮葉鱗次以周宻纖條参差以窈窕兮洪柯流離以相拂于是乎青陽之末朱明之初翕㣲煥以摛采兮的窟㻧以揚敷接翠蕚于緑蔕兮冐紅牙以丹鬚赩然含蕤璀爾散珠若乃叢紈始裹聚葩方離潜輝蜿艶綠采未披照灼攅列熒熒𤣥垂雪酲解䬼怡神實氣冠百品以竒仰邁衆果而特貴傅𤣥石榴賦鳥宿中而纖條結龍辰升而丹華繁其在晨也灼若旭日栖扶桑其在昬也赩若燭龍吐潜光苞𤣥黄之烈輝緑煒曄而焜煌發朱榮于緑葉時從風而飄揚庾鯈石榴賦緑葉翠條紛乎蔥青丹華照爛曄曄熒熒逺而望之繁若摛繢被山阿廹而察之赫若龍燭耀緑波唐吕令問府庭雙石榴賦公府洞豁羣木羅生歴衆芳而鮮妙得雙榴之羙名擢質森聳垂隂凄清掃危堦之數級䕃閑庭之四平夾砌駢羅則東西表賔主之位與時消息則寒暑任榮枯之情故其異影同庇分芳對出夏景焯而開花秋氣結而成實剖之則珠彩輝掌捧之則金光照日其生也雖雜居幽徑之蘭其用也亦間若雕盤之栗若乃當公務之總偶訟庭之要爰趨爰揖或長或少皆指而稱曰彼石榴之所生何托根之至妙俯環廊之廻合拂危簷之窈窱類甘棠之勿翦人縦去而猶思若李樹之無言蹊自成而不召是以固其根榦羙其華耀乍開軒而翠彩重合甫褰帷而紅榮四照也或曰物惡近以招累事貴逺而克全空遁幽以獨羙抱甘香而自捐豈比夫善生者托仁以逺害能夀者輔道以延年是以象君子之恵渥故終保夫自然五言古詩原梁沈約詠山榴靈囿同嘉稱幽山有竒質停采久彌鮮含華豈期實長願㣲名隠無使孤株出増隋魏澹詠石榴分根金谷裏移植廣庭中新枝含淺緑曉蕚散輕紅影入環階水香隨度隙風路逺無由寄徒念春閨空唐宋之問翫郡齋海榴澤國韶氣早開簾延霽天野禽宵未囀山蜚晝仍眠目兹海榴發列映巖楹前熠爚禦風静葳蕤含景鮮清晨緑堪佩亭午丹欲然昔黍金閨籍嘗見玉池蓮未若宗族地更逢榮耀全南金雖自貴賀賞詎能遷撫躬萬里絶豈染一朝妍徒緣滯遐郡常是惜流年越俗鄙章甫捫心空自憐原李白詠鄰女東窗海石榴魯女東窗下海榴世所稀珊瑚映緑水未足比光輝清香隨風發落日好鳥歸願為東南枝低舉拂羅衣無由共攀折引領望金扉栁宗元新植海石榴弱植不盈尺逺意駐蓬瀛月寒空堦曙幽夢綵雲生糞壤擢珠樹莓苔插瓊英芳根閟顔色徂嵗為誰榮増宋蘓轍賦園中所有堂後病石榴及時亦開花身病花不齊火候漸已差芳心竟未已新蕚綴枯槎誰言石榴病乃久占年華鄰家花最盛早發豈容遮殘紅已零落婀娜子如𤓰原陳與義庭前石榴庭前安榴樹花稀更可憐青旌擁絳節伴我作神仙遲日耿不暮㣲隂眩彌鮮一尊兼百慮心賞覺悠然劉克荘十月榴花炎州氣序異十月榴始華是誰初植此石罅抽根斜緑隂蔽朝曦朱艶奪暮霞始猶一二枝俄已千百葩染人不能就畫史無以加洛陽擅牡丹久矣埋塵沙蜀州誇海棠邈然隔䕫巴安知籬壁間亦有尤物耶坐令農圃室化為金張家詩人好摹擬凍蕊并寒槎斯篇儻令見無乃譏吾奢増明吴寛榴花團團復亭亭園子巧相競都下朝千盆花市此為盛我獨解其縳髙枝遂其性参差花更繁緋緑雜相映安石名已蒙休從謝公姓七言古詩増金元格榴花山茶赤黄桃絳白戎葵米囊不入格庭中忽見安石榴歎息花中有真色生紅一撮掌中看模寫雖工更覺難詩到黄州隔千里畫家辛苦費鉛丹明李東陽借榴一首贈方石桃溪老人愛花樹家在萬花溪上住白頭重入紫薇垣官舍今無種花處買花不識城市途園中看花非我徒畫圖翦綵盡成幻空有愛花猶故吾吾家海榴四五株意欲借之如借書自言花借不在好僅取數尺青扶疎墻根老枝不盈掬欲借真慚少装束風披雨浥漸成隂縦遣無花看亦足城西官陌無塵埃呼童把送休遲囬花根嵗暮幸勿返還我詩逋十韻来五言律詩増唐孫逖詠樓前海石榴二首客自新亭郡朝来數物華傳君妓樓好初落海榴花露色珠簾映香風粉壁遮更宜林下雨日晚逐行車海上移珍木樓前詠所思遙聞下車日正在落花時舊緑香行葢新紅灑歩綦從来寒不易終見久逾滋溫庭筠海榴海榴開似火先解報春風葉亂裁牋綠花宜插髻紅蠟珠攅作葉緗綵翦成叢鄭驛多歸思相期一笑同七言律詩増唐白居易石榴樹可憐顔色好隂凉葉翦紅牋花撲霜傘葢低垂金翡翠薫籠亂搭繡衣裳春芽細炷千燈㷔夏蕊濃焚百和香見説上林無此樹只教桃李占年芳杜牧見穆三十中庭海榴花謝矜紅掩素似多才不待櫻桃不逐梅春到未曽逢宴賞雨餘争解免低徊巧窮南國千般艶趂得東風二月開堪恨王孫浪逰去落英狼籍始歸来方干海石榴亭際夭妍日日看每朝顔色一般般滿枝猶待春風力數朶先欺臘雪寒舞蝶自隨歌拍轉逰人只怕酒杯乾久長年少應難得忍不叢邊到夜觀原皮日休庭際海石榴花盛發有寄一夜春光綻綘囊碧油枝上晝煌煌風匀衹似調紅露日暖惟憂化赤霜火齊滿枝燒夜月金津含蕊滳朝陽不知桂樹知情否無限同遊阻陸郎増陸龜蒙和襲美海石榴花發見寄次韻紫府真人餉露囊猗蘭燈燭未熒煌丹華乞曙先侵日金㷔欺寒却照霜誰與佳名從海曲祇應芳裔出河陽那堪謝氏庭前見一段清香染郄郎宋歐陽修西園石榴盛開荒䑓野徑共躋攀正見榴花出短垣緑葉晩鶯啼䖏宻紅房初日照時繁最憐夏景鋪珍簟尤愛晴香入睡軒乘興便當携酒去不湏旌騎擁車轅原方九功海榴花春花落盡海榴開竒種誰分寶地栽斜日捲簾深色映晚風隔座暗香来披襟更擬頻燒燭把臂何妨數舉杯最愛芳時看不去繁枝折向月中廻五言排律原唐元稹感石榴二十韻何年安石國萬里貢榴花迢逓河源道因依漢使槎酸􅉝犯蔥嶺憔悴渉龍沙初到標珍木多来比亂麻深抛故園裏少種貴人家惟我荆州見憐君胡地賒從教當路長兼恣入簷斜緑葉裁煙翠紅英動日華新簾裙透影疎牖燭籠紗委作金爐㷔飄成玉砌瑕乍驚珠綴密終誤繡幃奢琥珀烘梳碎燕支嬾頰搽風翻一樹火電轉五雲車絳帳迎宵日芙蓉綻早牙淺深俱隠映前後各分葩宿露低蓮臉朝光借綺霞暗虹徒繳繞濯錦莫周遮俗態能嫌舊芳姿尚可嘉非尃愛顔色同恨阻幽遐滿眼思鄉淚相嗟亦自嗟宋陳師道和黄充實詠榴花春去花隨盡紅榴暖欲然後時何所恨處獨不祈憐葉葉自相偶重重久更鮮流珠沾暑雨改色淡朝煙著子專寒酒移根擅化權愧非無價手刻畫竟難傳五言絶句御製榴花未結千房實先開五月花紅綃簾户下疑似漢時槎丹誠映白日艶色喜清幽嫩緑疎櫺外開時傍翠樓増唐孔紹安侍宴詠石榴可惜庭中樹移根逐漢臣只為来時晚花開不及春皇甫冉同張侍御詠興寜寺經藏院海石榴花嫩葉生初茂殘花少更鮮結根龍藏側故欲競青蓮宋蘇軾石榴風流意不盡獨自送殘芳色作裙腰染名隨酒盞狂朱子榴花窈窕安榴花乃是西鄰樹墜蕚可憐人風吹落幽户元楊維楨詠石榴花密幄千重碧疎巾一桚紅花時隨早晚不必嫁春風明髙啓榴花日炙態常醺香生若自焚夜来端午宴淡却羙人裙李東陽榴花未摘霜前實先看雨後花名應出西海顔豈論東家七言絶句御製盆景榴花髙有數寸開花一朶小樹枝頭一㸃紅嫣然六月雜荷風攅青葉裏珊瑚朶疑是移根金碧叢増唐李嘉祐題韋潤州後亭海榴江上年年小雪遲年光獨報海榴知寂寂山城風日暖謝公含笑向南枝權徳輿韋使君亭海榴詠淮陽卧理有清風臘月榴花𢃄雪紅閉閣寂寥常對此江湖心在數枝中原韓愈詠張十一旅舍榴花五月榴花照眼眀枝間時見子初成可憐此地無車馬顛倒青苔落綘英栁宗元始見白髮題所植海石榴幾年封植愛芳叢韶艶朱顔竟不同從此休論上春事看成古木對衰翁増劉言史山寺看海榴花琉璃地上紺宫前潑翠凝紅幾十年夜久月明人去盡火光霞燄逓相燃黄㴞奉和文堯對庭前千葉石榴一朶千英綻曉枝綵霞堪與别為期移根若在芙蓉苑豈向當年有醒時宋歐陽修榴花絮亂絲繁不自持蜂黄燕紫蝶參差榴花自恨来時晚惆悵春期獨後期梅堯臣石榴花春花開盡見深紅夏葉始繁明淺緑祇知結子熟秋霖不識来時有笻竹原陳師道詠榴五月榴花忽見春白頭還喜一畨新可能畧不解春意只有尋枝問葉人陸游初見石榴花吳中四月尚餘寒細雨霏霏怯倚䦨老子真成興不淺榴花折得一枝看楊萬里詠榴待闕南風欲炷香東風折併住西堂石榴已著乾紅蕾却問春歸為底忙蒨羅皺薄翦薫風已自開花蔕亦同不肯染時輕著色却将密緑䕶深紅増元張𢎞範榴花猩血誰教染絳囊綠雲堆裏潤生香遊蜂錯認枝頭火忙駕薫風過短墻馬祖常趙中丞折枝石榴乘槎使者海西来移得珊瑚漢苑栽只待緑隂芳樹合蘂珠如火一時開明陳憲章宿倪麟所石榴花秋開老蟾半影秋如水曙角一聲霜滿街白髮山人到城府石榴花下借眠来原魏鵬紅綿拭鏡照宫紗畫就雙眉八字斜蓮歩輕移何處去堦前笑折石榴花張新日向午臨疑噴火雨從晨洗欲流脂酡顔賸照雙眸醉珠腹還成百子竒王象晉翠䄂参差瑞色新稜嶒老幹擁祥雲無邉生意包涵厚滿腹珠璣取次陳詩散句原宋宋祁都緣賦色淺遂不趁春繁司馬光畏日助殷紅過雨滌濃翠増蘇軾可憐病石榴花如破紅襟應憐百花盡綠葉暗紅榴石榴有正色玉樹真虚名陸游殘榴重結蕊新燕續生雛原李廸日烘麗蕚紅縈火雨過柔條綠噴煙劉敞薫風四月濃芳歇紅玉燒枝拂露華蘇軾安石榴花開最遲綘裙深樹出幽扉許景樊瑤堦飛盡石榴花日轉晶簾影欲斜増梁簡文帝安榴拆晩紅江總池紅照海榴原唐張説榴開𢃄酒紅増白居易醉為海榴開原宋楊億鮮葩猩血染増王安石榴花次第開陸㳺榴殘續續紅元方回榴靨競紅妝馬祖常園紅榴火鍊原唐李賀石榴花發滿溪津増李洞官亭池碧海榴殷韋荘紅榴初綻拂簷低宋晁以道映户丹榴故後開原謝薖臙脂新染薄羅裳戴復古短墻半露石榴紅詞増元劉鉉烏夜啼垂楊影裏殘紅甚匆匆只有榴花全不怨東風暮雨急曉霞濕緑玲瓏比似茜裙初染一般同原無名氏阮郎歸深庭邃館鎖清風榴花芳艶濃陽光染就欲燒空誰能窺化工觀物外喻聲中靈砂别有功若将一粒比花容金丹色又紅南歌子紫陌尋春去紅塵拂面来無人不道看花囬惟見石榴新蕊一枝開冰簟堆雲髻金樽灔玉醅綠隂青子莫相催留取紅巾千㸃照池臺増宋王沂孫慶清朝玉局歌殘金陵句絶年年負却薫風西鄰窈窕獨憐入户飛紅前度緑隂載酒枝頭色比似裙同何湏擬蠟珠作蔕湘彩成叢誰在舊家殿閣自太真仙去掃地春空朱旛䕶取如今應誤花工顛倒綘英滿􅈳想無車馬到山中西風後尚餘數㸃還勝春濃原蘇軾賀新郎乳燕飛華屋悄無人槐隂轉午晩凉新浴手弄生綃白團扇扇手一時似玉漸困倚孤眠清熟簾外誰来推繡户枉教人夢斷瑶䑓曲又却是風敲竹石榴半吐紅巾蹙待浮花浪蕋都盡伴君幽獨濃艶一枝細看取芳心千重似束又恐被西風驚綠若待得君来至此向花前對酒将花觸共粉淚兩􅉡􅉡别錄原扦挿三月初取指大嫩枝長尺有半八九枝共為一窠燒下頭二寸勿使瀋失先掘圓坑深尺七寸廣􅈳尺竪枝坑畔環布令匀置殭石枯骨於枝間一層土一層骨石築實之令沒枝頭寸許以水澆之常令潤澤既生之後復以骨石布其根下十月天寒以藁裹之一云葉生時折挿肥土用水頻澆自然生根又葉未生時從鶴膝處用脱果法候生根截下栽之開花結實與大樹無異種子石榴熟時于樹上留數枚記定上下南北霜降後摘下用稀布逐箇袋之照樹上朝向懸通風隂處先于六七月間取土之鬆而羙者敲細篩去瓦石攤浄地上澆潑濃糞晒乾再潑再曬如此五六次仍敲極細篩過收藏缸内勿經雨次年二月初取家用火盆以所製土鋪盆内厚三寸許數寸按一淺潭取榴子去肉每潭種三四粒用土葢半寸許灑水令㣲濕置有風露向陽處每日灑水勿令乾候長寸許每潭止留一大株日澆肥水候長分種極小盆内不宜深放有風露向陽處每日用肥水澆三四徧日午最要澆每一盆做一木葢破兩片中剜一竅如樹大中髙四面低遇有雨葢盆面免致淋去肥味至七八月滿樹皆花甚大又明年換畧大盆依前法澆妙不可言或云盆根多則無花三四月間便上盆則根不長只湏浸曬得法冬間霜下收回南簷土乾畧将水潤至春深氣暖可放石上翦去嫩苖勿令髙大盛夏日中曬屋上免近地氣致令根長及為蚓蟻所穴每朝用米泔沉沒花榦浸約半時取出日曬如覺土乾又復浸殆良法也澆灌性喜肥濃糞澆之無忌當午澆花更茂盛蠶沙壅之佳又雞鴨毛浸水中加皮屑去毛以水澆之毛不肥故也増物類相感志石榴樹以麻餅水澆則花多原修製凡使榴皮根葉弗犯鐡器不計乾濕皆以水漿浸一夜取出用之水如墨汁花隂乾為末和鐡丹服一年白髮變黒千葉者治心熱吐血研末吹鼻止衂血又傅金瘡出血皮及根用酸者東行者止目淚下蚘蟲止瀉痢下血方輿勝覽崖州婦人以安石榴花著釜中經旬即成酒其味香羙増居家宜忌病目者以紅絹盛榴花拭目棄之謂代其病御定佩文齋廣羣芳譜卷二十八
