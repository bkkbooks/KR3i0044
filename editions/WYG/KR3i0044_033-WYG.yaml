􅁛王者雨筆露箋勻彩畫日爐風炭熏蘭麝天與多情絲一把誰厮惹千條萬縷縈心下又粉蘂丹青描不得金鍼線線功難敵誰􅅖暗香輕採摘風淅淅船頭觸散雙鸂鶒夜雨染成天水碧朝陽借出臙脂色欲落又開人共惜秋氣逼盤中已見新荷菂又幽鷺漫来窺品格雙魚豈解傳消息緑柄嫩香頻採摘心似織條條不斷誰牽役珠淚暗和清露滴羅衣染盡秋江色對面不言情脉脉烟水隔無人說似長相憶又楚國細腰元自痩文君膩臉誰描就日夜鼓聲催箭漏昬復晝紅顔豈得長如舊醉折嫩房紅蘂嗅夭絲不斷清香透郤􅅖小欄凝望乆風滿袖西池月上人歸後髙觀國祝英臺近擁紅粧翻翠盖花影暗南浦波面澄霞蘭艇採香去有人水濺湘裙相招晩醉正月上凉生風露兩凝佇别後歌斷雲間嬌姿黯無語魂夢西風端的此心苦遥想芳臉輕顰凌波微步鎮輸與沙邉鷗鷺原晁補之新荷葉雨過囘塘圎荷嫩緑新抽越女輕盈畫橈穏送蘭舟波光艶粉紅相間脉脉嬌羞菱歌隠隠漸遥依約凝眸堤上郎心波間妝影遲留不覺歸時暮天碧月如鈎風蟬噪晚餘霞映㡬㸃沙鷗漁歌不到有人獨倚危樓増鄭斗焕新荷葉乳鴨池塘晴波漾緑鱗鱗宿藕根香夏来生意還新蚨錢小鈿花貼翠相間萍星一畨雨過一畨暗展圎青魚戲龜㳺看来猶未勝情因憶年時垂釣曽約輕盈玉人何䖏關情是半捲芳心簾風一棹鴛鴦催起歌聲金趙可驀山溪雲房西下天共滄波逺走馬記狂逰正芙蕖平鋪鏡面浮空欄檻招我倒芳尊看花醉把花歸扶路清香滿水楓舊曲應逐歌塵散時節又新凉料開徧横湖清淺冰姿好在莫道總無情殘月下曉風前有恨何人見原宋劉光祖洞仙歌晚風收暑小池塘荷净獨倚胡牀酒初醒起徘徊時有香氣吹来雲藻亂葉底㳺魚動影空擎承露蓋不見冰容惆悵眀妝曉鸞鏡後夜月凉時月淡花低幽夢覺欲慿誰省且應記臨流凭欄干便遥想江南紅酣千頃康與之洞仙歌若耶溪路别岸花無數欲歛嬌紅向人語與緑荷相倚恨囘首西風波淼淼三十六陂煙雨新妝眀照水汀渚生香不嫁東風被誰誤遣踟蹰騷客意千里綿綿仙浪逺何䖏凌波㣲步想南浦潮生畫橈歸正月曉風清斷膓凝佇増姜䕫惜紅衣枕簟邀凉琴書换日睡餘無力細灑冰泉并刀破甘碧墻頭喚酒誰問訊城南詩客岑寂髙樹晚蟬說西風消息虹梁水陌魚浪吹香紅衣半狼籍維舟試望故國渺天北可惜渚邉沙外不共美人逰厯問甚時同賦三十六陂秋色張炎紅情無邉香色記涉江自採錦亭雲密翦翦紅衣學舞波心舊曽識一見依然自語流水逺㡬囘空憶動倒影取次窺妝玉潤露痕濕閒立翠屏側愛向人弄芳背酣斜日料應太液三十六宮土花碧清興凌風更爽正無數滿汀如昔泛片葉烟波裏卧横紫笛周密緑葢舞風輕玉立照新妝翠盖亭亭凌波步秋漪真色生香明璫揺淡月舞袖斜倚耿耿芳心柰千縷晴絲縈繫恨開遲不嫁東風顰怨嬌蘂花底漫卜幽期素手採珠房粉艷初洗雨濕鉛腮碧雲深暗聚軟綃清淚訪藕尋蓮楚江逺相思誰寄棹歌囘衣露滿身花氣原姜䕫念奴嬌閙紅一舸記年時常與鴛鴦為侶三十六陂人未到水佩風裳無數翠葉吹凉玉容銷酒更灑菰蒲雨嫣然揺動冷香飛上詩句日暮青葢亭亭情人不見争忍凌波去只恐舞衣寒易落愁入西風南浦髙栁垂隂老魚吹浪留我花間住田田多少㡬廻沙際歸路僧仲殊念奴嬌水楓葉下乍湖光清淺凉生商素西帝宸逰羅翠盖擁出三千宮女絳采嬌春鉛華掩晝占斷鴛鴦浦歌聲揺曵浣紗人在何䖏應笑桂蘂一枝廣寒宮殿冷落凄愁苦雪艶冰肌羞淡泊偷把臙脂勻注媚臉籠霞芳心泣露不肯為雲雨金波影裏為誰長恁凝竚増趙以夫憶舊逰望紅蕖影裏冉冉斜陽十里沙平喚起江湖夢向沙鷗住䖏細說前盟水鄉六月無暑寒玉散青冰笑老去心情也將醉眼鎮為花青亭亭步明鏡似月浸華清人在秋庭照夜銀河落想粉香濕露恩澤初承十洲縹緲何許風引綵舟行尚憶得西施餘情裊裊烟水汀呂同老水龍吟冰肌不汚天真曉来玉立瑶池裏亭亭翠盖盈盈素靨時妝净洗太液波翻霓裳舞罷斷魂流水甚依然舊日濃香淡粉花不似人憔悴欲喚凌波仙子泛扁舟浩波十里只愁囘首冰奩半掩眀璫亂墜月影淒迷露華零落小欄誰倚共芳盟猶有雙栖雪鷺夜寒驚起張炎水龍吟仙人掌上芙蓉涓涓猶滴金盤露輕妝照水纎裳玉立飄颻似舞㡬度消凝滿湖烟月一汀鷗鷺記小舟夜悄波眀香逺渾不見花開䖏應是浣紗人妬褪紅衣被誰輕誤閒情雅澹冶姿清潤慿嬌待語隔浦相逢偶然傾盖似傳心素怕湘臯珮解緑雲十里卷西風去李居仁水龍吟蘂仙羣擁宸逰素肌似怯波心冷霜裳縞夜冰壺凝露紅塵洗盡弄玉輕盈飛瓊綽約淡妝臨鏡更多情一片碧雲不捲籠嬌面囘清影菱唱數聲乍聴載名娃藕絲縈艇雪鷗沙鷺夜来同夢曉風吹醒酒暈全消粉痕微漬色眀香瑩問此花曷貯瑶池應未許繁紅並趙汝鈉水龍吟露華洗盡凡妝玉妃来侍瑶池宴風裳水佩冰肌雪艶清凉不汗解語情多凌波步穏酒容消散想温泉浴罷天然真態渾疑是宮妝淺暗想淒愁别岸粉痕消香腮凝腕雪空水冷此情誰許鷺知鷗見羽扇微揺翠帷低擁清凉亭院待夜深月上䦨干更邀取姮娥伴周密水龍吟素鸞飛下青㝠舞衣半惹凉雲碎藍田種玉緑房迎曉一奩秋意擎露盤深憶君凉夜暗傾鉛水想鴛鴦正結梨雲好夢西風冷還驚起應是飛瓊仙㑹倚凉飇碧簮斜墜輕妝鬬白眀璫照影紅衣羞避霽月三更粉香千㸃静聞十里聴湘絃奏徹冰綃偷翦聚相思淚練恕可水龍吟素姬初宴瑶池珮環誤落雲深䖏分香華井洗妝湘渚天姿淡泞碧盖吹凉玉冠迎曉盈盈笑語記當時乍識江眀夜净只愁被嬋娟誤㡬㸃沙邉飛鷺舊盟寒逺迷烟雨相思未盡纎羅曵水清鉛泣露玉鏡臺空銀瓶綆絶斷魂何許待今宵試採中流一葉共凌波去王易簡水龍吟翠裳微䕶冰肌夜深暗濕瑶臺露芳容淡泞風神蕭散凌波晚步西子殘妝環兒初起未須勻注看眀璫素襪相逢憔悴當應被薰風誤十里雲愁雪妬抱淒凉盻嬌無語當時姊妺朱顔褪酒紅衣按舞别浦重尋舊盟惟有一行鷗鷺伴玉顔月曉盈盈冷艶洗人間暑唐鈺水龍吟淡妝人更嬋娟晚奩净洗鉛華膩泠泠月色蕭蕭風度嬌紅欲避太液池空霓裳舞倦不堪重記歎冰魂猶在翠輿難駐玉簮為誰輕墜别有凌空一葉泛清寒素波千里珠房淚濕眀璫恨逺舊逰夢裏羽扇生秋瓊樓不夜尚遺仙意柰香雲易散綃衣半脫露凉如水無名氏緑意碧圎自潔向淺洲逺浦亭亭清絶猶有遺簮不展秋心能卷㡬多炎熱鴛鴦密語同傾盖且莫與浣紗人說怨歌忽斷花風碎却翠雲千叠囘首當年漢舞怕飛去漫縐留仙裙褶戀戀青衫猶染枯香還笑鬢絲飄雪盤心清露如鉛水又一夜西風聴折喜净看匹練秋光倒瀉半湖眀月劉辰翁沁園春淺碧芙蓉素艶亭亭前身阿嬌記湘浦露冷酥容倍潔華清水滑酒暈全消瑶翦豐肌雲翻碎萼白羽鮮眀時自揺風流䖏是古香幽韻時度鮮飇瓊枝璧月清標對千朶嬋娟傾翠瓢况水晶臺榭低迷净渌冰霜詞調隠約輕橈細認金房種竒朶秀已覺青衿横素腰西風晚看花開十丈玉井非遥元張翥摸魚兒問西湖舊家兒女香魂還又連理多情欲賦雙蕖怨閑却滿奩秋意嬌旖旎愛照影紅妝一樣新梳洗王孫正擬喚翠袖輕歌玉筝低按凉夜為花醉鴛鴦浦淒斷凌波夢裏空憐心苦絲脆吴娃小艇應偷採一道緑萍猶碎君試記還怕是西風吹作行雲起䦨干漫倚待載酒重来尋芳已晚餘恨渺煙水别録増南史羊侃傳侃性豪侈善音律自造採蓮棹歌兩曲甚有新致原庾杲之傳庾杲之字景行王儉用為衞将軍長史安陸侯蕭緬與儉書曰盛府元僚實難其選庾景行汎渌水依芙蓉何其麗也時人以入儉府為蓮花池増周書薛憕傳魏文帝造一欹器為二荷同䖏一盤相去盈尺中有蓮下垂器上以水注荷則出於蓮而盈乎器為鳬鴈蟾蜍以飾之謂之水芝欹器唐書令狐綯傳綯為翰林承㫖夜對禁中燭盡帝以乗輿金蓮華炬送還院西京雜記卓文君臉際常若芙蓉拾遺記洹流如沙塵足踐則䧟其深難測大風吹沙如霧有石蕖青色堅而甚輕從風靡靡覆其波上一莖百葉千年一花荆州記衡山有三峰極秀一峰名芙蓉峰最為竦桀自非清霽素朝不可望見世說顔延之甞問鮑眀逺已詩與謝康樂優劣鮑曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡亦雕繪滿眼蓮社髙賢傳釋恵安患山中無刻漏乃於水上立十二葉芙蓉因波隨轉分定晝夜以為行道之節謂之蓮花漏原捜神記王敦在武昌鈴下儀仗生蓮華五六日而落増九華山記青陽縣有九子山髙數千丈上九峰如蓮花北山録徐陵浴佛以蓮葉露清異録郭進家能作蓮花餅饀有十五隔者每隔有一折枝蓮花作十五色隋宦者劉繼銓得芙蓉鷗二十四隻以獻毛色如芙蓉原成都記唐𤣥宗以芙蓉花汁調香粉作御墨曰龍香劑増畫品菡蓞圗趙昌作昌善畫花設色明潤筆跡柔美有名于蜀士大夫舊云徐熙畫花傳花神趙昌畫花寫花形然比之徐熙則差劣其後鐔宏王友之輩皆弗逮也荷花生泥汙之中出于水而不著水昌此花標韻清逺能識此意爾緯畧顔延之碧芙蓉頌曰澤芝芳艶擅竒水屬水屬二字全未見人用劉孝威謝藕啓曰凡厥水羞莫敢相輩水羞二字亦新續骫骳說參寥子甞在臨平道中作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數亂汀洲東坡一見為寫而刻諸石宗婦曹夫人善丹青作臨平藕花圗人争影寫葢不獨寳其畫也陳輔之詩話唐人牡丹詩云紅開西子妝樓曉翠掲麻姑水殿春改春作秋全是蓮花詩老學庵筆記吴幾先甞言參寥詩云五月臨平山下路藕花無數滿汀洲五月非荷花盛時不當云無數滿汀洲廉宣仲云此但取句美若云六月臨平山下路便不佳矣㡬先云只是君記得熟故以五月為勝不然只云六月亦豈不佳哉五色線劉交居若耶溪忽聞有人採蓮喧笑聲交以溪左右無人居甚訝之乃斷栁枝蔽身視之忽見十餘女子從一華林而出皆衣青緑年十六七入叢蓮相對而歌交乃棹舟以逼之諸女皆化為龜入水致虚雜爼六月廿有四日謝文君獨䖏無侶命沈君攸製采蓮之曲以解其悲愁之思援筆便成曰平川映晚霞蓮舟泛浪花衣香隨岸逺荷影向流斜度手牽長柄轉楫避踈花還船不畏滿歸路詎嫌賖謝賛嘆乆之圗繪寳鑑于青年毗陵人嘉定間專畫荷花草蟲世號于荷馮大有自號怡齋寓居吴門専畫蓮荷精巧入格僧希白善白描荷花丹鉛雜録左傳注楚有茄人城張楫音茄曰荷古樂府鷺何食食茄下西京賦蔕倒茄于藻井披紅葩之狎獵注茄藕莖也異林𢎞治乙夘苦蕒菜開蓮花七日而謝又嵗丙辰三月叙州楠樹生蓮花五十餘朶避暑漫抄有神降于鄭絳家吟詩曰忽然湖上片雲飛不覺舟中雨濕衣折得蓮花渾忘却空将荷葉蓋頭歸林泉隨筆周子愛蓮說一篇僅百餘字形容蓮之可愛宛然如在目前盖不必求太極於梅枝而全體呈露矣原釵小志歐公知潁州有官妓盧媚兒姿貌端秀口中常作芙蕖花香有蜀僧云此人前身為尼誦法華經二十年花史唐冀國夫人任氏女少奉釋教一日有僧持衣求浣女欣然濯之溪邉每一漂衣蓮花應手而出驚異求僧不知所在因識其䖏為百花潭房夀六月召客搗蓮花製碧芳酒賈似道在揚州時有道人求見問其所能曰善畫蓮秋壑館之于小金山放鶴亭索絹四幅閉門不容觀者逾五六日似道自徃觀之僅畫一葉傾露珠滴滴流下滴於石上復散滴於地秋壑見精妙令了之道人辭去約再来秋壑挂於壁上毎風起則荷葉動露珠傾盡已而復然道人不可復索方知神仙也昇元閣梁朝故物髙二百四十尺今名瓦棺寺西晉時地産青蓮兩朶聞之所司掘得瓦棺開見一老僧花從舌根頂顱出詢及父老曰昔有僧誦法華經萬餘卷臨卒遺言以瓦棺葬之此地法華山樵夫得青蓮一枝掘地有石匣藏一童子舌根不壊花自舌出西湖志仙姥餘杭人嫁於西湖農家能醸百花酒王方平常沽飲是後羣仙時降因授藥一丸以償酒價姥服化去後十餘年有人見姥於洞庭仍賣百花酒云今杭州北山有仙姥墩王安石詩云緑漪堂前湖水緑歸来正復有荷花花前若見餘杭姥為道仙人憶酒家増黄山志雲谷禪院因營造伐木登擲鉢峰見半壁有龕牖間生石蓮花一朶以斧截斷視之色若琥珀紅光耀目原贑州府志大龍山在信豐縣南一百二十里層巒叠嶂遇夜或紅光燭天産異花如白蓮増泉州府志蓮花峰在南安縣西北其山聳峙上開八石若蓮花然台州府志芙蓉山在府城東二百里出海口望之如紅蓮始開原栽種春分前栽則花出葉上先将好壯河泥乾者少半瓮築實隔以蘆蓆上用河泥半尺築平有雨盖之俟泥曬微裂方種盖藕根上行遇實始生花也次将藕壯大三節無損者順鋪在上大者一枝小者二枝頭向南芽朝上用硫黄研碎紙撚簮柄粗纒藕節一二道再用翦碎猪毛少許安在藕節再用肥河泥次第填四寸厚藕芽勿露日中灑淤泥迸裂方可少加河水先加水止可四指深候擎荷大發再加河水交夏水方可深如此種當年有花且茂盛管子曰五沃之土生蓮故栽宜壯土然不可多加壯糞反至發熱壊藕挿瓶瓶注温湯盖以紙削尖花桿隨手急挿或去根少許封以蠟或亂髮密纒折䖏仍以泥封固其竅先挿瓶中後注水或将竹釘十字扦蘂使出白汁方挿瓶如此則耐乆製用常氏日録七月七日采蓮花七分八月八日采藕根八分九月九日采蓮實九分隂乾搗細煉蜜為九服之令人不老長生蓮華服之鎮心輕身駐顔附録山蓮原百丈山有草花如蓮花附録西番蓮原西番蓮花淡雅似菊之月下西施自春至秋相繼不絶亦花中佳品春間将藤壓地自生根隔年鑿斷分栽附録鐵線蓮原鐵線蓮花葉俱似西畨花心黒如鐵線附録朝日蓮増益部方物畧記朝日蓮花色或黄或白葉浮水上翠厚而澤形如菱花差大開則隨日所在日入輙歛而自藏於葉下若葵藿傾太陽之比集藻賛増宋宋祁朝日蓮賛素花碧葉浮秀波面日中則向日入還歛御定佩文齋廣羣芳譜卷三十一
