body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷三十二花譜牡丹一原牡丹一名鹿韭一名䑕姑一名百兩金一名木芍藥通志云牡丹初無名依芍藥得名故其初曰木芍藥本草又云以其花似芍藥而宿幹似木也秦漢以前無考自謝康樂始言永嘉水際竹間多牡丹而劉賔客嘉話録謂北齊楊子華有畫牡丹則此花之從来舊矣唐開元中天下太平牡丹始盛于長安逮宋惟洛陽之花為天下冠一時名人髙士如邵康節范堯夫司馬君實歐陽永叔諸公尤加崇尚往往見之詠歌洛陽之俗大都好花閱洛陽風土記可考鏡也天彭號小西京以其好花有京洛之遺風焉大抵洛陽之花以姚魏為冠姚黄未出牛黄第一牛黄未出魏花第一魏花未出左花苐一左花之前惟有蘇家紅賀家紅林家紅之類花皆單葉惟洛陽者千葉故名曰洛陽花自洛陽花盛而諸花詘矣嗣是嵗益培接競出新竒固不特前所稱諸品已也性宜寒畏熱喜燥惡濕得新土則根旺栽向陽則性舒隂晴相半謂之養花天栽接剔治謂之弄花最忌烈風炎日若隂晴燥濕得中栽接種植有法花可開至七百葉面可徑尺善種花者須擇種之佳者種之若事事合法時時著意則花必盛茂間變異品此則以人力奪天工者也増廣雅白􅙥牡丹也本草李時珍曰牡丹以色丹者為上雖結子而根上生苗故謂之牡丹蘇恭曰生漢中劒南苗似羊桃夏生白花秋實圎緑冬實赤色凌冬不凋根似芍藥長安謂之吴牡丹蘇頌曰今丹延青越滁和州山中皆有花有黄紫紅白數色此是山牡丹二月於梗上生苗葉三月開花花葉與人家所種者相似但花瓣止五六葉五月結子黑色根黄白色長五七尺近世人多貴重欲其花之詭異皆秋冬移接培以壌土至春盛開其狀百變原花有姚黄花千葉出民姚氏家一嵗不過數朶禁院黄姚黄别品閒淡髙秀可亞姚黄慶雲黄花葉重複郁然輪囷以故得名甘草黄單葉色如甘草洛人善别花見其樹知為竒花其葉嚼之不腥牛黄千葉出民牛氏家比姚黄差小瑪瑙盤赤黄色五瓣樹髙二三尺葉頗短蹙黄氣毬淡黄檀心花葉圎正間背相承敷腴可愛御衣黄千葉色似黄葵淡鵞黄初開微黄如新鵞兒平頭後漸白不甚大太平樓閣千葉類以上黄魏花千葉肉紅畧有粉梢出魏丞相仁溥之家樹髙不過四尺花髙五六寸濶三四寸葉至七百餘錢思公甞曰人謂牡丹花王今姚花真可為王魏乃后也一名寳樓臺石榴紅千葉摟子類王家紅曹縣狀元紅成樹宜隂映日紅細瓣宜陽王家大紅紅而長尖微曲宜陽大紅西𤓰瓤宜陽大紅舞青猊胎微短花微小中出五青瓣宜隂七寳冠難開又名七寳旋心醉臙脂莖長每開頭垂下宜陽大葉桃紅宜隂殿春芳開遲美人紅蓮蕊紅瓣似蓮花翠紅妝難開宜隂陳州紅硃砂紅花葉甚鮮向日視之如猩血宜隂錦袍紅古名潜溪緋深紅比寳樓臺微小而鮮粗樹髙五六尺但枝弱開時須以杖扶恐為風雨所折枝葉踈濶棗芽小彎皺葉桃紅葉圎而皺難開宜隂桃紅西𤓰瓤胎紅而長宜陽子以上俱千葉樓大紅翦絨千葉並頭其瓣如翦羊血紅易開錦袍紅石家紅葉稀甚𦂳不夀春紅痩小宜陽彩霞紅海天霞大如盤宜陽頭以上俱千葉平小葉大紅千葉難開鶴翎紅醉仙桃外白内紅難開宜隂梅紅平頭深桃紅西子紅圎如毬宜隂麤葉壽安紅肉紅中有黄蕊花出夀安縣錦屏山細葉者尤佳丹州延州紅海雲紅色如霞桃紅線桃紅鳯頭花髙大獻来紅花大淺紅歛瓣如撮顔色鮮眀樹髙三四尺葉團張僕射居洛人有獻者故名祥雲紅淺紅花妖艶多態而花葉最多如朶雲狀淺嬌紅大桃紅外瓣微紅而深嬌徑過五寸葉似粗葉夀安頗捲皺葱緑色嬌紅樓臺淺桃紅宜隂輕羅紅淺紅嬌嬌紅葉緑可愛開最早花紅繡毬細瓣開圎如毬花紅平頭銀紅色銀紅毬外白内紅色極嬌圎如毬醉嬌紅微紅出莖紅桃大尺餘其莖長二尺西子開圎如毬宜隂以上俱千葉大紅繡毬花類王家紅葉微小罌粟紅茜花鮮粗開瓣合櫳深檀心葉如西施而尖長花中之烜煥者壽安紅平頭黄心葉粗細二種粗者香鞓紅單葉深紅張僕射齊賢自青州以駱駝䭾其種遂傳洛中因色類腰𢃄鞓故名亦名青州紅勝鞓紅樹髙二尺葉尖長花紅赤煥然五葉鶴翎紅多瓣花末白而本肉紅如鴻鵠羽毛細葉蓮花萼多葉紅花青趺三重如蓮萼一尺紅深紅頗近紫花面大㡬尺文公紅出西京潞公園亦花之麗者迎日紅醉西施同類深紅開最早妖麗奪目彩霞其色光麗爛然如霞梅紅樓子嬌紅色如魏紅不甚大紹興春祥雲子花也花尤富大者徑尺紹興中始傳金腰樓玉腰樓皆粉紅花而起樓子黄白間之如金玉色與胭脂同類政和春淺粉紅花有絲頭政和中始出疉羅中間𤨏碎如叠羅紋勝疉羅差大於叠羅瑞露蟬亦粉紅花中抽碧心如合蟬狀乾花分蟬旋轉其花亦大大千葉小千葉皆粉紅花之傑者大千葉無碎花小千葉則花萼𤨏碎桃紅西番頭難開宜隂四面鏡有旋葉類以上紅慶天香千葉樓子髙五六寸香而清初開單葉五七年則千葉矣年逺者樹髙八九尺肉西千葉樓子水紅毬千葉叢生宜隂合歡花一莖兩朶觀音面開𦂳不甚大叢生宜隂粉娥嬌大淡粉紅花如椀大開盛者飽滿如饅頭樣中外一色惟瓣根微有深紅葉與樹如天香髙四五尺諸花開後方開清香耐乆以上俱千葉醉楊妃二種一千葉樓子宜陽名醉春容一平頭極大不耐日色赤玉盤千葉平頭外白内紅宜隂囘囘粉西細瓣樓子外紅内粉紅醉西施粉白花中間紅暈狀如酡顔西天香開早初甚嬌三四日則白矣百葉仙人粉以上紅類玉芙蓉千葉樓子成樹宜隂素鸞嬌宜隂緑邉白每瓣上有緑色玉重樓宜隂羊脂玉大瓣白舞青猊中出五青瓣醉玉樓千以上俱葉樓子白剪絨千葉平頭瓣上如鋸齒又名白纓絡難開玉盤盂大瓣蓮香白瓣如蓮花香亦如之以上俱千葉平頭粉西施千葉甚大宜隂玉樓春多雨盛開類玉蒸餅而髙有樓子之狀萬卷書花瓣皆卷筒又名波斯頭又名玉玲瓏一種千葉桃紅亦同名無瑕玉水晶毬慶天香玉天仙素鸞玉仙妝檀心玉鳳瓣中有深檀色玉繡毬青心白心青伏家白鳳尾白金絲白平頭白盛者大尺許難開宜隂遲来白紫玉白瓣中有紅絲紋大尺許以上俱千葉醉春容色似王芙蓉開頭差小玉板白單葉長如拍板色如玉深檀心玉樓子白花起樓髙標逸韻自是風塵外物劉師哥白花𢃄微紅多至數百葉纎妍可愛玉覆盆一名玉炊餅圎頭白華碧花正一品花淺碧而開最晚一名歐碧玉盌白單葉花大如盌玉天香單葉大白深黄蕊開徑一尺雖無千葉而丰韻異常一百五多葉白花大如盌瓣長三寸許黄蕊深檀心枝葉髙大亦如天香而葉大尖長洛花以榖雨為開候而此花常至一百五日開最先古名燈籠以上白類海雲紅千葉樓子西紫深紫中有黄蕊樹生枯燥古鐵色葉尖長九月内棗芽鮮眀紅潤剪其葉逺望若珊瑚然即墨子色類墨葵丁香紫茄花紫又名藕絲紫姑仙大瓣淡藕絲如吴中所染藕色緑胎紫莖花瓣中一淺紅絲相界宜隂以上俱千葉樓子左花千葉紫花出民左氏家葉密齊如截亦謂之平頭紫紫舞青猊中出五青瓣紫樓子瑞香紫大瓣平頭紫大徑尺一名真紫徐家紫花大紫羅袍又名茄色樓紫重樓難開紫紅芳煙籠紫色淺淡葉以上俱千紫金荷花大盤而紫赤色五六瓣中有黄蕊花平如荷葉狀開時側立翩然鹿胎多葉紫花有白㸃如鹿胎紫繡毬一名新紫花魏花之别品也花如綉毬狀亦有起摟者為天彭紫花之冠乾道紫色稍淡而暈紅潑墨紫新紫花之子也單葉深黒如墨葛巾紫花圎正而富麗如世人所戴葛巾狀福嚴紫重葉紫花葉少如紫繡毬謂之舊紫朝天紫色正紫如金紫夫人之服色今作子非也三學士錦團緑樹髙二尺亂生成叢葉齊小短厚如寳樓臺花千葉粉紫色合紐如撮瓣細紋多媚而欠香根傍易生古名波斯又名獅子頭滚繡毬包金紫花大而深紫鮮粗一枝僅十四五瓣中有黄蕊大紅如核桃又似僧持銅擊子樹髙三四尺葉髣髴天香而圎多葉紫深紫花止七八瓣中有大黄蕊樹髙四五尺花大如盌葉尖長紫雲芳大紫千葉樓子葉髣髴天香雖不及寳樓臺而紫容深迥自是一樣清致耐久而欠清香蓬莱相公紫以上類青心黄花原一本或正圎如毬或層起成樓子亦異品也狀元紅重葉深紅花其色與鞓紅潛緋相類天姿富貴天彭人以冠花品金花狀元紅大瓣平頭微紫毎瓣上有黄鬚宜陽金絲大紅平頭不甚大瓣上有金絲毫一名金線紅臙脂樓深淺相間如臙脂染成重叠纍萼狀如樓觀倒暈檀心多葉紅花凡花近萼色深至末漸淺此花自外深色近萼反淺白而深檀㸃其心尤可愛九蕊珍珠紅千葉紅花葉上有一㸃白如珠葉密蹙其蕊九叢添色紅多葉花始開色白經日漸紅至落乃類深紅此造化之尤巧者雙頭紅並蒂駢萼色尤鮮眀養之得地則嵗嵗皆雙此花之絶異者也鹿胎紅鶴翎紅子花也色微𢃄黄上有白㸃如鹿胎極化工之妙潛溪緋千葉緋花出潛溪寺本紫花忽于叢中特出緋者一二朶眀年移在他枝洛陽謂之轉枝花一捻紅多葉淺紅葉杪深紅一㸃如人以二指捻之舊傳貴妃勻面餘脂印花上来嵗花開上有指印紅迹帝命今名富貴紅花葉圎正而厚色若新染他花皆卸獨此抱枝而槁亦花之異者桃紅舞青猊千葉樓子中五青瓣一名睡緑蟬宜陽玉兎天香青紅胎其花粉色銀紅二種一早開頭微小一晚開頭極大中出二瓣如兎耳蕚緑華千葉樓子大瓣羣花卸後始開毎瓣上有緑色一名佛頭青一名鴨蛋青一名緑蝴蝶得自永寜王宮中葉底紫千葉其色如墨亦謂墨紫花在叢中旁心生一大枝引葉覆其上其開比他花可延十日豈造物者亦惜之耶唐末有中官為觀軍容者花出其家亦謂之軍容紫腰金紫千葉腰有黄鬚一團駝褐裘千葉樓子大瓣色類褐衣宜隂蜜嬌樹如樗髙三四尺葉尖長頗濶厚花五瓣色如蜜蠟中有蕊根檀心以上間色大凡紅白者多香紫者香烈而欠清樓子髙千葉多者其葉尖岐多而圎厚紅者葉深緑紫者葉黒緑惟白花與淡紅者畧同此花須殷勤照管酌量澆灌仔細培養花若開盛主人必有大喜忌栽宅内天井中増鄞江周氏洛陽牡丹記勝姚黄靳黄千葉黄花也有深紫檀心開頭可八九寸許色雖深於姚然精采未易勝也但頻年有花洛人所以貴之出靳氏之圃因姓得名皆在姚黄之前洛人貴之皆不減姚花但鮮潔不及姚而無青心之異焉可以亞姚而居丹州黄之上矣千心黄千葉黄花也大率類丹州黄而近瓶碎蘂特盛異扵衆花故謂之千心黄閔黄千葉黄花也色類甘草黄而無檀心出于閔氏之圃因此得名其品第盖甘草黄之比歟女真黄千葉淺黄色花也元豐中出于洛陽銀李氏園中李以為異獻于大尹潞公公見心愛之命曰女真黄其開頭可八九寸許色類丹州黄而微𢃄紅温潤勻榮其狀色端整類劉師閣而黄諸名圃皆未有然亦甘草黄之比歟絲頭黄千葉黄花也色類丹州黄外有大葉如盤中有碎葉一簇可百餘分碎葉之心有黄絲數十莖聳起而特立髙出于花葉之上故目之為絲頭黄唯天黄寺僧房中一本特佳他圃未之有也御袍黄千葉黄花也色與開頭大率類女真黄元豐時應天院神御花圃中植山箆數百忽于其中變此一種因目之為御袍黄狀元紅千葉深紅花也色類丹砂而淺葉杪微淡近萼漸深有紫檀心開頭可七八寸其色甚美迥出衆花之上故洛人以狀元呼之惜乎開頭差小于魏花而色深過之逺甚其花出于安國寺張氏家熙寕初方有之俗謂之張八花今流傳諸譜甚盛龍嵗有此花又特可貴也勝魏都勝勝魏似魏花而微深都勝似魏花而差大葉微𢃄紫紅色意其種皆魏花所變歟豈寓于紅花本者其子變而為勝魏寓于紫花本者其子變而為都勝耶瑞雲紅千葉肉紅花也開頭大尺餘色類魏花微深然碎葉差大不若魏花之繁密也葉杪微卷如雲氣狀故以瑞雲目之然與魏花迭為盛衰魏花多則瑞雲少瑞雲多則魏花少岳山紅千葉肉紅花也本出嵩岳因此得名色深于瑞雲淺于狀元紅有紫檀心鮮潔可愛花唇微淡近萼漸深開頭可八九寸間金千葉紅花也微𢃄紫而類金繫腰開頭可八九寸許葉間有黄蕊故以間金目之其花盖黄蕊之所變也金繫腰千葉黄花也類間金而無蕊毎葉上有金線一道横于半花上故目之為金繫腰其花本出于緱氏山中九蕚紅千葉粉紅花也莖葉極髙大其苞有青跗九重苞未拆時特異于衆花花開必先青拆數日然後色變紅花葉多鈹蹙有類揉草然多不成就偶有成者開頭盈尺劉師閣千葉淺紅花也開頭可八九寸許無檀心本出長安劉氏尼之閣下因此得名微𢃄紅黄色如美人肌肉瑩白温潤花亦端整然不常開率數年乃一見花耳洗妝紅千葉肉紅花也元豐中忽生于銀李圃山箆中大率似夀安而小異劉公伯夀見而愛之謂如美婦人洗去脂粉而見其天真之肌瑩潔温潤因命今名其品第盖壽安劉師閣之比歟蹙金毬千葉淺紅花也色類間金而葉杪鈹蹙間有黄稜斷續于其間因此得名然不知所出之因今安勝寺及諸園皆有之探春毬千葉肉紅花也開時在穀雨前與一百五相次開故曰探春毬其花大率類夀安紅以其開早故得今名二色紅千葉紅花也元豐中出于銀李園中于接頭一本上岐分為二色一淺一深深者類間金淺者類瑞雲始以為有兩接頭詳細視之實一本也豈一氣之所鍾而有淺深厚薄之不齊歟大尹潞公見而賞異之因命今名蹙金樓子千葉紅花也類金繫腰下有大葉如盤盤中碎葉繁密聳起而圎整特髙于衆花碎葉鈹蹙互相粘綴中有黄蕊間雜于其間然葉之多雖魏花不及也元豐中生于袁氏之圃碎金紅千葉粉紅花也色類間金每葉上有黄㸃數星如黍粟大故謂之碎金紅越山紅樓子千葉粉紅花也本出于會稽不知到洛之因近心有長葉數十片聳起而特立狀類重臺蓮故有樓子之名彤雲紅千葉紅花也類狀元紅微𢃄緋色開頭大者㡬盈尺花唇微白近萼漸深檀心之中皆瑩白類御袍花本出于月波堤之福嚴寺司馬公見而愛之目之為彤雲紅也紫絲旋心千葉粉紅花也外有大葉十數重如盤盤中有碎葉百許簇于瓶心之外如旋心芍藥然上有紫粉數十莖髙出于碎葉之表故謂之曰紫粉旋心元豐中生于銀李圃中富貴紅不暈紅壽妝紅玉盤妝皆千葉粉紅花也大率類夀安而有小異富貴紅色差深而𢃄緋紫色不暈紅次之壽妝紅又次之玉盤妝最淺淡者也大葉微白碎葉粉紅故得玉盤妝之號雙頭紅雙頭紫皆千葉花也二花皆並蒂而生如鞍子而不相連属者也惟應天院神御花圃中有之亦有多葉者盖地勢有肥瘠故有多葉之變耳培壅得地力有簇五者然開頭愈多則花愈小矣紫繡毬千葉紫花也色深而瑩澤葉密而圎整因得繡毬之名然難得見花大率類左紫云但葉杪色白不如左紫之唇白也比之陳州紫袁家紫皆大同而小異耳安勝紫紫花也開頭徑尺餘本出于城中千葉安勝院因此得名延嵗左紫與繡毬皆難得花唯安勝紫與大宋紫特盛嵗嵗皆有故名圃中傳接甚多大宋紫千葉紫花也本出于永寕縣大宋川豪民李氏之圃因謂大宋紫開頭極盛徑尺餘衆花無比其大者其色大率類安勝紫云順聖千葉花也色深類陳州紫毎葉上有白縷數道自唇至萼紫白相間深淺同開頭可八九寸許熙寜中方有陳州紫袁家紫一色花皆千葉大率類紫繡毬而圎整不及也玉千葉白花無檀心瑩白如玉温潤可愛景祐中開于苑上書宅山箆中細葉繁密類魏花而白今傳接于洛中雖多然難得花不嵗成千葉也玉蒸餅千葉白花也本出延州及流傳到洛而繁盛過于延州時花頭大于玉千葉杪瑩白近萼微紅開頭可盈尺毎至盛開枝多低亦謂之軟條花云承露紅多葉紅花也毎朶各有二葉毎葉之近萼䖏各成一箇鼓子花樸凡有十二箇惟葉杪折展與衆花不同其下玲瓏不相倚著望之如雕鏤可愛凌晨如有甘露盈箇其香益更旖旎與承露紫大率相類唯其色異耳玉樓紅多葉花也色類彤雲紅每葉上有白縷數道若雕鏤者然故以玉樓紅目之薛鳳翔亳州牡丹史天香一品圎胎能成樹宜隂其花平頭大葉色如猩血出賈立家子生故一名賈立紅萬花一品色若㨨實花房𦂳密挿架層起而色麗眀媚有如丹􅎖浮圗嬌容三變初綻紫色及開桃紅經日漸至梅紅至落乃更深紅諸花色久漸褪惟此愈進故曰三變隂䖏陽䖏開者各不相類其色之變亦不止于三也歐記中有添色紅疑即其種袁石公記為芙蓉三變其本原出方氏赤朱衣舊名奪翠得自許州花房鱗次而起𦂳實小巧體態婉孌顔如渥赭凡花于一葉間色有深淺帷此花内外一如流丹近復得奪錦一種大瓣深紅浮光凝潤尤過于奪翠覺紅此花乃蜀僧居亳所種以僧名覺人遂呼為覺紅又謂佛土所産而紅色無出其右者一名無上紅其胎紅尖花放平頭大葉房亦簇滿約有數層而艶過一品稍恨其單葉時多大黄緑胎最宜向隂養之愈久愈妙其花大瓣易開初開微黄垂殘愈黄簮瓶中經宿則色可等秋葵花小黄緑胎花之膚理輕皺弱于淵綃周有托瓣𤓰瓤黄質過大黄殊柔膩靡曼但一房不過四五層而近萼䖏微𢃄紫故少遜耳金玉交輝緑胎長幹其花大瓣黄蕊若貫珠皆出房外層葉最多至殘時開放尚有餘力勝于鋪錦此曹州所出為第一品八艶妝盖八種花也亳州僅得雲秀妝洛妃妝堯英妝三種雲秀為最更有緑花一種色如豆緑大葉千層起樓出自鄧氏真為異品萬疊雪峰千葉白花黄絨鋪錦此花細葉卷如絨縷下有四五葉差濶連綴承之上有黄鬚布滿若種金粟銀紅嬌其花大瓣丰姿綽約如綘雪繞枝繡衣紅肉紅胎花開平頭大葉亦梅紅色花瓣相映渾然有黄氣如琥珀光眀徹可鑒以夏侍御所出名繡衣云軟瓣銀紅幹長胎圎花瓣若蟬翼輕薄無礙其色等繡衣紅而上之碧紗籠出張氏向陽易開頭甚豐盈其色淺紅如秋雲羅帕實丹砂其中望之隠隠緑趺遮䕶更如翠幕故又名叠翠新紅嬌艷花乃梅紅之深重者艶質嬌麗如朝霞藏日光彩陸離又若新染未乾故名新紅極勝始成千葉尤出一品上縁嵗多單葉乃其病也方氏一種新紅繡毬趙氏一種新紅竒觀皆麗色動人然所傳多贋盖以天香一品亂之宮錦此品碎瓣梅紅色開時必俟花房滿實方為大放然後漸成纈暈花紅繡毬紅胎圎小花開房𦂳葉繁周有托瓣易開且早綢繆布濩如叠碎霞命名繡毬者以其形圎聚也銀紅繡毬花微小而色輕楊妃繡毬妬嬌紅色俱類花紅繡毬而體勢不同花紅萃盤紅胎枝上緑葉窄小條亦頗短房外有托瓣深桃紅色緑趺重蕚天機圎錦青胎開花小而圎滿朱房嵌枝絢如翦綵銀紅犯有二種一紅艷過天香一品開花最難一色視一品稍淺易開俱長條大葉圎胎其花𦂳滿開期最後飛燕妝有三種一出方氏長枝長葉此花黄紅一出馬氏者雖深紅起樓逺不及方一出張氏者乃白花類象牙色差勝于馬飛燕紅妝一名花紅楊妃細瓣修長得自曹縣方家海棠紅喜陽易開緑葉細長常多秋發諸花皆以紅極􅁛佳獨此品通體金黄兼有紅彩人謂似鐵梗海棠而活色香艶皆過之盛時則房中四五葉參差突出其胎本紅在隂䖏則緑春来亦復紅也大都花胎多四時變易耳海棠魂謂得其神也亦石氏自許州移至新銀紅毬方家銀紅二種色態頗類苐樹頭緑葉稍别其色光彩動揺碎瓣無瑕玉緑胎枝上葉圎宜陽乃白花中之最上乘又一種如芹葉者不及此青心無瑕玉豐偉悅人又一種葉幹類大黄者亦名無瑕玉梅州紅性喜隂圎葉圎胎花瓣長短有序踈密合宜色近海棠紅但近萼䖏稍紫出曹縣王氏别號梅州云勝嬌容深紅色最耐殘如一莖有兩胎者必剪其一即不剪亦獨一胎能花花大可五六圍髙可六七寸醉玉環方顯仁所種乃醉楊妃子花花房倒綴故以醉志之胎體圎緑其花下承五六大葉濶三寸許圍擁周匝如盆盂盛花狀質本白而間以藕色輕紅輕藍相錯成繡其母醉楊妃作深藕色妬榴紅胎圎如豆樹葉如菊最易成樹早開應時苐不耐炎日久之色褪榴花紅色近榴花花紅疊萃尖胎花身魁岸其下大葉五六層腰間襞積細瓣鬈曲碎聚頂上復出一層大葉花在緑樹之顛秋水妝肉紅圎胎枝葉秀長其花平頭易開花葉叢萃質本白而内含淺紺外則隐隐叢紅緑之氣夏侍御初得之方氏謂其爽氣侵人如秋水浴洛神遂命今名老銀紅毬花本深紅亦有水紅時而邉如施粉中如布朱其胎青紅楊妃深醉胎長花質酷似勝嬌容名深醉者謂其色深也花紅神品花葉之末色微微入紅漸紅漸黄蓋得自太康花紅平頭緑胎其花平頭濶葉色如火羣花中紅而照耀者獨此為冠世傳為曹縣石榴紅韓氏重貲得之邇来㡬絶王氏田間藏一本購歸凉暑園但頂少涣散中露檀心又一種千瓣者南里園有之凡花稱平頭謂其齊如截也花紅舞青猊宜隂老銀紅毬子花色亦似之開時結繡從花中抽五六青葉如翠羽雙翹花紅魁出張氏萬花魁出李氏西萬花魁巨麗尤甚方氏别有銀紅魁絳紗籠胎小花瓣有紫色一線分其中質紅如燭杜鵑紅短莖緑胎樹葉尖厚花作深梅紅色細葉稠叠𦂳實如赤玉碎雕而成大素小素易開宜隂小素一名劉六白二花平頭房小初開結繡一叢常發數頭如素白樓子玉𢃄白皎潔更出其上玉玲瓏碧玉樓如瓊樓玉宇玉簮白謂白如玉簮花鸚鵡白謂類鸚鵡頂上毛賽羊絨謂細瓣環曲如絨白鶴頂色甚白而鶴頂殷紅取名不類可怪沈家白緑珠墜玉樓長胎花色皚然葉半有緑㸃如珠其色類佛頭青而體異也界破玉此花如白練花瓣中擘一畫如桃紅絲繅宛如約素片片皆同舊品中有桃紅線者乃淺紅花又非此種夏侍御新出一種類界破玉謂之紅線線外微似雜色組花膏紅梗胎俱紅其花大葉若胭脂㸃成光瑩如鏡但微恨其花房多散漫耳鳳尾花紅尖胎平頭内外葉有數層名鳳尾者以葉似耳縐葉桃紅花瓣尖細層層密聚如簇絳綃苐色澤少暗嘉隆間最重之一時並出者更有大葉桃花其花稍不及縐葉太真晚妝此花千層小葉花房實滿葉葉相従次第漸髙其色微紅而鮮潔如太真涙結紅冰因其晚開故名曹縣一種名忍濟紅色相近忍濟者王氏齋名平實紅此花大瓣桃紅花面徑過一尺花之大無過于此亦得自曹州銀紅錦繡宜隂花形開法俱似三變其色微紅淺深得宜宛然若繡烟粉樓色同魏紅而易開張氏子種花也褰幕嬌紅即縮項嬌紅長胎栁緑長葉因其莖短花在葉底其色梅紅起樓如千葉桃别有縮項一種葉單花紅翦絨花瓣纎細叢聚𦂳滿類文縠剪成大都與花紅纓絡同致花紅纓絡長枝大葉其花易開叠瓣穠密外衞以五六大片念奴嬌有二種俱緑胎能成樹出張氏者深銀紅色大而姣好出韓氏者色桃紅大次之漢宮春紅胎硬莖必獨本成樹方嵗嵗有花花葉直竦而立其色深紅出張氏墨葵大瓣平頭油紅髙聳起樓與墨葵俱眀如㸃漆黒擬松烟最為異色墨翦絨碎瓣柔軟墨繡毬圎滿𦂳聚中秋月緑胎尖小花房嵯峨瑩白無瑕琉瓶灌朱樹葉微圎朱房攅密類隔琉璃而盛丹漿微嫌葉單根紫遇千葉時亦自妙品藕絲平頭花葉微濶繁可數層又藕絲繡毬好叢生易開而花小又藕絲樓子花大而房垂三種惟平頭為上繡毬次之樓子不逮逺甚桃紅萬卷書細瓣如砌枝不禁花垂垂向下喬家西𤓰瓤尖胎枝葉青長宜陽出自曹縣花如𤓰中紅肉色類軟瓣銀紅進宮袍緑胎易開謂色如宮中所賜茜袍也其體質當以輕絨赤綃目之嬌紅樓臺胎莖似王家紅體似花紅繡毬色似宮袍紅而神彩充足銀紅樓䑓色有深淺花實與之表裏倚新妝緑胎脩幹花面盈尺大類緋桃色出自曹縣合歡嬌深桃紅色一胎二花托蒂偶亞微有大小轉枝一莖二花紅白對開記其方向眀嵗紅白互異其䖏二花出鄢陵劉水山太守家亳中亦僅有矣鄢陵尚有萬卉含羞靧面嬌南園鶴翎紅枝上忽開一花二色紅白中分紅如脂膏白如膩粉時郡大夫嚴公造賞呼為太極圗余因六朝有取紅花取白雪與兒靧面作光潔之詞乃易其名觀音現白花中微露銀紅舊有觀音面好叢生色深花差大苐平頂而散為其疵耳非霞胎長花房髙峙層層漸起葉在柯端花棲葉下色淺紅醉西紅胎青葉圎大成樹易開色作粉紅勝西施花大盈尺色粉白暈紅又一種香西施色亦相類花中香氣郁烈繡芙蓉與玉芙蓉相類出仝氏添色喜容緑胎栁緑葉宜陽易開花微小有托瓣房以内色深外微暈又一種青葉者名大添色喜容花瓣參差色亦不逮玉樓春雪花大如斗又一種玉樓春老色類鶴翎紅臙脂界粉粉葉朱絲文理交錯金精雪浪白花黄萼互相照映花瓣微濶而厚硬近蕊稍紫常以此亂黄絨鋪錦玉美人大葉色白如勻粉白蓮花出自許州其中黄心如線寸許儼如蓮蕊珊瑚樓莖短胎長宜陽色如珊瑚蒨膏紅即如膏紅胎紅尖長此品亦梅紅色盛則花葉互峙弱則平頭大火珠緑胎色深紅内外掩映若燃光熖瑩流火齊紅其花邉白内赤太真冠長胎開早花瓣勁健外白内紅倚欄嬌肉紅胎淺桃紅色花頭長大又一種滿池嬌千瓣成樹色澤過之大嬌紅向陽易開色如銀紅嬌苐葉單又一種嬌紅色如魏紅花微小而難接五雲樓花圎聚如毬稍長開則結繡頂有五旋葉邉有黄緑相間玉樓觀音現花白難開開時如水月樓臺迥出塵外花與中秋月小異喬紅有二種皆紅胎色深重近木紅俱出沈氏潔白出朱氏舊有紫玉者花最大白瓣中紛布紅絲盤錯如繡睡鶴仙色淡紅宜隂其大如倚新妝花心出二葉脫紫留朱先紫而後深紅又花紅寳樓臺者亦然醉猩猩沈氏首出之花易開色深紅中微𢃄檀紫亞于花紅平頭𦂳密䖏却勝灑金桃紅黄鬚滿房皆布葉顛㸃㸃有度羅如星斗桃紅樓子小葉大紅皆起樓老僧㡌一花五葉兩葉相參而立傍兩葉佐之一葉遶其後最下者如陳州紅臙脂紅大紅寳樓臺殿春魁平頭勝天香粉繡毬粉重樓膩粉紅有托瓣勝緋桃茄皮紫紫纓絡白纓絡出嘴白汴城白茄色樓藕色獅子頭縷金衣産自許州房髙莖長碎瓣綺錯其色紅極無類可方可為神品之冠花紅獨勝魚鱗小瓣層層相承又一種花紅無敵小葉聚集重樓巍然色亦相類五陵春竒色映目二花大葉蘢蓯樓臺盤欝閨艷絨瓣纎細金屋嬌層分碎葉斐叠若樓艶陽嬌小瓣梅紅嬌白無雙楚素君白屋公卿連城玉皆千層大瓣黄白繡毬玉潤白賽玉魁冰清白碧天一色皆碎瓣起樓瑤臺玉露絨葉𦂳聚雪素葉繁蕊香王家大白大過諸花藕絲霓裳面徑八寸許三春魁多葉桃紅房出樹表銀紅妙品銀紅艶妝銀紅絶唱俱下布數片大葉中間細瑣堆積又一種銀紅上乗大瓣簇滿其色皆如其名采霞綃千層大葉珊瑚鳳頭房間大瓣名按原譜全載歐陽修牡丹花釋陸㳺天彭牡丹記參用周氏牡丹記薛鳳翔牡丹史其未經採擇者續此彚考増宋史五行志雍熙二年八月刑部尚書宋琪家牡丹三華素問清明次五日田䑕化為鴽牡丹華海記隋帝闢地二百里為西苑詔天下進花卉易州進二十箱牡丹有頳紅鞓紅飛来紅袁家紅醉顔紅雲紅天外紅一拂黄軟條黄延安黄先春紅顫風嬌等名原龍城録洛人宋單父字仲孺善吟詩亦能種藝術凡牡丹變易千種紅白鬭色人不能知其術上皇召至驪山植花萬本色樣各不同賜金千餘兩内人皆呼為花師亦幻世之絶藝也開元天寳遺事初有木芍藥植于沉香亭前其花一日忽開一枝兩頭朝則深紅午則深碧暮則深黄夜則粉白晝夜之間香艶各異帝曰此花木之妖不足訝也眀皇與貴妃幸華清宮因宿酒初醒凭妃子肩同看木芍藥上親折一枝與妃子逓嗅其艷曰不惟萱草忘憂此花香艶尤能醒酒上賜楊國忠木芍藥數本植于家國忠以百寳裝飾欄楯雖帝宮之内不能及也楊妃外傳開元中禁中初重木芍藥即今牡丹也得數本紅紫淺紅通白者上因移植于興慶池東沉香亭前㑹花方繁開上乘照夜白妃以步輦􅀙詔棃園弟子李龜年手捧檀板押衆樂前将欲歌上曰賞名花對妃子焉用舊樂辭為遽命龜年持金花箋宣賜翰林學士李白進清平調辭三章白欣承詔㫖猶苦宿酲未解援筆賦云雲想衣裳花想容春風拂檻露華濃若非羣玉山頭見㑹向瑶臺月下逢一枝紅艷露凝香雲雨巫山枉斷膓借問漢宮誰得似可憐飛燕倚新妝名花傾國兩相歡長得君王𢃄笑看解釋春風無限恨沉香亭北倚欄干龜年捧詞進上命棃園弟子約畧詞調撫絲竹遂促龜年以歌妃持頗黎七寳盃酌西凉州葡萄酒笑領歌意甚厚摭異記太和開成中有程修己者以善畫得進謁㑹暮春内殿賞牡丹花上頗好詩因問修己曰今京邑傳唱牡丹詩誰為首出修己對曰甞聞公卿間多吟賞中書舍人李正封詩曰國色朝酣酒天香夜染衣上聞之嗟賞移時笑謂賢妃曰汝妝鏡臺前飲一紫金盞酒則正封之詩可見矣増國史補長安貴逰尚牡丹三十餘年每春暮車馬若狂以不就觀為耻人種以求利一本有直數萬者杜陽雜編穆宗皇帝殿前種千葉牡丹花始開香氣襲人一朶千葉大而且紅上每覩芳盛嘆曰人間未有自是宮中每夜即有黄白蛺蝶數萬飛集於花間輝光照耀逹曉方去上令張羅於空中遂得數百於殿内縱嬪御追捉以為娱樂遲眀視之則皆金玉也其狀工巧無以為比而内人爭用絳縷絆其脚以為首餙夜則光起妝奩中其後開寳厨覩金錢玉屑之内有蠕蠕者有為蝶者宮中方覺焉文宗於内殿前看牡丹翹足凭欄忽吟舒元輿牡丹賦云俯者如愁仰者如語含者如咽吟罷方省元輿辭不覺歎息原酉陽雜俎東都尊賢坊田令宅中門内有紫牡丹成樹發花千朶花盛時每月夜有小人五六長尺餘逰于花上如此七八年人将掩之輙失所在増酉陽雜俎撿隋朝種植法七十卷中初不記說牡丹則知隋朝花藥所無也開元末裴士淹為郎官奉使幽冀囘至汾州衆香寺得白牡丹一窠植於長安私第天寳中為都下竒賞至徳中馬僕射又得紅紫二色者移於城中元和初猶少今與戎葵角多少矣衞公言貞元中牡丹已貴栁渾詩言近来無奈牡丹何數十千錢買一顆今朝始得分眀見也共戎葵較㡬多成式又甞見衛公園中有馮紹正雞圗當時已畫牡丹矣韓愈侍郎有疎􅀙子姪自江淮来年甚少韓為街西假僧院令讀書經旬寺主綱訴其狂率韓遽令歸且責曰市肆賤類營衣食尚有一長䖏汝所為如此竟作何物姪拜謝徐曰某有一藝恨叔不知因指堦前牡丹曰叔要此花青紫黄赤惟命也韓大竒之遂給所須試之乃竪箔曲尺遮牡丹叢不令人窺掘窠四面深及其根寛容人坐唯賫紫鑛輕粉朱紅旦暮治其根凡七日乃填坑白其叔曰恨校遲一月時冬初也牡丹本紫及花發色白紅歴緑每朶有一聨詩字色分眀乃是韓出關時詩一韻曰雲横秦嶺家何在雪擁藍關馬不前十四字韓大驚異姪且辭歸江淮竟不願仕興唐寺有牡丹一窠元和中著花一千二百朶其色有正暈倒暈淺紅淺紫深紫黄白檀等獨無深紅又有花葉中無抹心者重臺花者其花面徑七八寸興善寺素師院牡丹色絶佳元和末一枝花合歡雲溪友議白樂天初為杭州刺史令訪牡丹花獨開元寺僧惠澄近於京師得之始植於庭䦨圍甚密他䖏未之有也時春景方深惠澄設油幕覆牡丹自此東越分而種之矣㑹徐凝自富春来不知而先題詩云此花南地知難種慚愧僧閒用意栽海燕解憐頻睥睨胡蜂未識更徘徊虚生芍藥徒勞妬羞殺玫瑰不敢開惟有數苞紅幞在含芳只待舍人来白尋到寺看花命酒同醉而歸原劇譚録朔方節度使李進賢豪侈奉身雅好賔客有中朝宿徳常話在名塲日失意邉逰進賢接納甚至其後京華相遇時亦造其門屬牡丹盛開因以賞花為名及期而往㕔事備陳飲饌宴席之間已非尋常舉杯數廵復引衆賔入内室宇華麗楹柱皆設錦繡列筵甚廣器用皆是黄金堦前有花數叢覆以錦幄妓妾俱服紈綺執絲簧善歌舞者至多客之左右皆有女僕雙鬟者二人所須無不畢至承接之意常日指使者不如芳酒綺肴窮極水陸至於僕乘供給靡不豐盛自午迄於眀晨不覩杯盤狼籍京國花卉之辰尤以牡丹為上至於佛宇道觀逰覽者罕不經歴慈恩浴堂院有花兩叢每開及五六百朶繁艶芬馥近少倫比有僧思振常話㑹昌中朝士數人尋芳徧詣僧室時東廊院有白花可愛相與傾酒而坐因云牡丹之盛盖亦竒矣然世之所玩者但淺紅深紫而已竟未識紅之深者院主老僧微笑曰安得無之但諸賢未見爾於是從而詰之經宿不去云上人向来之言當是曽有所覩必希相引寓目春逰之願足矣僧但云曽於他䖏一逢盖非輦轂所見及旦求之不已僧方露言曰衆君子好尚如此貧道又安得藏之今欲同看此花但未知不泄于人否朝士作禮而誓云終身不復言僧乃自開一房其間施設幡像有板壁遮以舊幕幕下啓門而入至一院有小堂兩間頗甚華潔軒廡欄楹皆是柏材有殷紅牡丹一窠婆娑㡬及千朶初旭纔照露華半晞濃姿半開炫燿心目朝士驚賞留戀及暮而去信宿有權要子弟與親友數人同来入寺至有花僧院􅀙容良乆引僧至曲江閒步将出門令小僕寄安茶笈裹以黄帕于曲江岸藉草而坐忽有弟子奔走而来云有數十人入院掘花禁之不止僧俛首無言唯自吁嘆坐中皆相盼而笑既而却歸至寺門見以大畚盛花舁而去取花者謂僧曰竊知貴院舊有名花宅中咸欲一看不敢預告恐難于見捨適所寄籠子中有金三十兩蜀茶二斤以為酬贈清異録南漢地狭力貧不自揣度有欺四方傲中國之志每見北人盛誇嶺海之強世宗遣使入嶺館接者遺茉莉文其名曰小南強及鋹面縛到闕見洛陽牡丹大駭有縉紳謂曰此名大北勝諸葛穎精於數晉王廣引為參軍甚見親重一日共坐王曰吾卧内牡丹盛開試為一筭穎布策度一二子曰開七十九朶王入掩户去左右數之政合其數有二蕊将開故倚欄看傳記伺之不數十行二蕊大發乃出謂穎曰君算得無左乎穎再挑一二子曰過矣乃八十一朶也王告以實盡歡而退韓宏罷宣武節度歸長安私第有牡丹雜花命劚去之曰吾豈效兒女輩耶當時為牡丹包羞洛陽大内臨芳殿廼莊宗所建殿前有牡丹千餘本如百藥仙人月宮花小黄嬌雪夫人粉奴香蓬莱相公卵心黄御衣紅紫龍杯三雲紫等増僧仲殊越中牡丹花品序越之好尚惟牡丹其絶麗者三十二種始乎郡齋豪家名族梵宇道宮池臺水榭植之無間来賞花者不問親疎謂之看花局澤國此月多有輕雲微雨謂之養花天南部新書長安三月五日看牡丹奔走車馬慈恩寺元果院白牡丹遲半月開故裴兵部璘題詩于佛殿壁上曰長安豪貴惜春殘争賞先開紫牡丹别有玉杯承露冷無人肯向月中看太和中敬宗自夾城出芙蓉園因幸此寺見所題詩吟玩久之因令宮嬪諷念及暮此詩滿六宮矣洞微志中軍都虞侯金治所居堂東植牡丹一本著花三百朶其色如血謂之金含稜每瓶子頂上有碎金絲如自然蛺蝶之狀一城以為殊異原異人録唐髙宗宴羣臣賞雙頭牡丹賦詩上官昭容云勢如聨璧友心似臭蘭人張茂卿好事園有一樓四圍列植竒花接牡丹於椿樹之杪花盛開時延賔客推樓玩賞事物紀原武后詔逰後苑百花俱開牡丹獨遲遂貶於洛陽故洛陽牡丹冠天下是不特芳姿艷質足壓羣葩而勁骨剛心尤髙出萬卉安得以富貴一語概之復齋漫録孟蜀時禮部尚書李昊每将牡丹花數枝分遺朋友以興平酥同贈曰俟花凋謝即以酥煎食之無棄濃艷其風流貴重如此増王文正遺事上於後苑曲宴步于檻中自翦牡丹兩朶召公親戴有中貴人白公言此花昨日上選賜相公已于别叢擇下花請相公躬進公乃取花因酌一巵同獻上大喜引滿以杯示公從臣皆榮焉盛事美談晁文元公迥在翰林以文章徳行為仁宗所優異曲宴宜春殿出牡丹百餘盤千葉者纔十餘朶所賜止親王宰臣真宗顧文元及錢文禧各賜一朶墨荘漫録兩京牡丹聞于天下花盛時太守作萬花㑹宴集之所以花為屏帳至梁棟柱栱悉以竹筒貯水簮花釘挂舉目皆花也洛中花工宣和中以藥壅培白牡丹如玉千葉一百五玉樓春等根下次年花作淺碧色號歐家碧嵗貢禁府價在姚黄上原聞見録錢惟演為留守始置驛貢洛花識者鄙之李泰伯携酒賞牡丹乘醉取筆蘸酒圗之眀晨嗅枝上花皆作酒氣富鄭公留守西京府園牡丹盛開召文潞公司馬端眀邵康節先生諸人共賞客曰此花有數乎請先生筮之既畢曰凡若干朶使人數之如先生言及問此花㡬時開盡先生再揲筮良久曰此花盡来日午時坐客皆不答鄭公因曰来日食後可㑹于此以驗先生之言次日食畢花尚無恙洎烹茶之際忽羣馬逸出與客馬相踶嚙奔花叢中既定花盡毁折于是洛中愈重先生増東坡集看牡丹法當在午前過午則離披矣成都記彭城牡丹在蜀為第一故有小洛陽之􅁛天彭謂之花州牛心山下謂之花村原童䝉訓王簡卿甞赴張無功鎡牡丹㑹云衆賔既集一堂寂無所有俄問左右云香發未答曰已發命捲簾則異香自内出郁然滿座羣妓以酒肴絲竹次第而至别有名姬十輩皆衣白凡首餙衣領皆牡丹首戴照殿紅一妓執板奏歌侑觴歌罷樂作乃退復垂簾談論自如良乆香起捲簾如前别十姬易服與花而出大抵簮白花則衣紫紫花則衣鵞黄黄花則衣紅如是十杯衣與花凡十易所謳者皆前輩牡丹名詞酒竟歌樂無慮數百十人列行送客燭光香霧歌吹雜作客皆恍然如仙逰康節訪趙郎中與章子厚同㑹子厚議論縦横因及洛中牡丹之盛趙曰邵先生洛人也知花甚詳康節因言洛人以見根撥而知花之髙下者上也見枝葉而知髙下者次也見蓓蕾而知髙下者下也如公所說乃知花之下也章黙然増廣客談吴逸谿名性諠檇李人家貧力學明春秋甞中江浙延祐丁巳鄉舉先是所居城廬手植牡丹一本多年未花是嵗前臘月忽作一花顔色鮮美無異暮春時士大夫相率来觀者其門如市初亦未卜其休咎来秋八月吴公領鄉薦邦人榮之以為此花之徴貴耳集慈寜殿賞牡丹時椒房受册三殿極歡上洞逹音律自製曲賜名舞楊花停觴命小臣賦詞俾貴人歌以侑玉巵為壽左右皆呼萬嵗乾淳起居注淳熙六年三月車駕過宮恭請太上太后幸聚景園遂至錦壁賞大花三面漫坡牡丹約千餘叢各有牙牌金字上張碧油絹幕又别翦好色樣一千朶安頓花架並是水晶玻瓈天青汝窑金瓶就中間沉香卓兒一隻安頓白玉碾花商尊約髙二尺徑二尺三寸獨挿照殿紅十五枝進酒三杯應隨駕宮人内官並賜兩面翠葉滴金牡丹一枝翠葉牡丹沉香柄金絲御書扇各一把輟耕録陳隨應宋南渡行宮記云後苑植牡丹扁曰伊洛傳芳原湧幢小品青城山有牡丹樹髙十丈花甲一週始一作花永樂中適當花開蜀獻王遣使視之取花以回陸成之宅牡丹一株百餘年矣朶朶茂盛顔色鮮眀有李氏者欲得之既移其花朶朶皆面牆強之向人不能也未㡬凋殘零落無復前觀増吴寛詩注家有牡丹一株花後有二瓣稍張人名鳳尾花木考宋髙宗紹興三十一年饒州鄱陽縣民家籬竹間生重萼牡丹正統四年閏二月十六日天香圃牡丹一品變成緑色凡開三朶憲宗畫其形色咏之以詩崑崙山元陽觀後有牡丹花根株連抱問植者誰曰王仙所遺也原花史錫山安氏圃牡丹最盛天順中老僕徐奎聞圃中嘆聲呝呝諦聴之聲出牡丹中云我等䝉主翁灌溉有年未獲善已来日厄又至奈何羣花咸若哽咽奎叱之乃止翼日主翁邀客携酒詣圃奎以告客皆異之一惡少獨嗔其妄竟閱姣且大者折以去増花史陳郡謝翺舉進士能七字詩寓居長安昇道里庭中多植牡丹一日有美人年十六七色絶代乘金車来謂翺曰聞此地有名花故来與君一醉耳即設饌同翺食復請翺賦詩曰陽臺後㑹已無期碧樹烟深玉漏遲半夜香風滿庭月花前竟發楚王悲美人亦和云相思無路莫相思風裏花開只片時惆悵金閨却歸䖏曉鶯啼斷緑楊枝遂揮淚别去不復見帝京景物畧右安門外草橋其北土近泉居人以種花為業冬則温火暄之十月中旬牡丹已進御矣都城牡丹時無不往觀恵安園者園在嘉興觀西二里堂前牡丹數百畝燕都逰覽志太傅惠安伯張公園牡丹花時主人製小竹兠以供逰客行花塍中武清侯别業額曰清華園廣十里園中牡丹多異種以緑蝴蝶為第一開時足􅁛花海五雜俎朝廷進御常有不時之花然皆藏土窖中四周以火逼之故隆冬時即有牡丹花計其工力一本至數十金原如臯志宋淳熙三年春如臯縣孝里荘園牡丹一本無種自生眀年花盛開乃紫牡丹也杭州推官某見花甚愛欲移分一株掘土尺許見一石如劒長二尺題曰此花瓊島飛来種只許人間老眼看遂不敢移以是鄉老誕日值花開時必往宴為夀李嵩三月八日生自八十看花至一百九嵗集藻序原宋歐陽修洛陽牡丹花品序牡丹出丹州延州東出青州南亦出越州而出洛陽者今為天下第一雒陽所謂丹州花延州紅青州紅皆彼土之尤傑者然来洛陽纔得備衆花之一種列第不出三以下不能獨立與洛花敵而越花以逺罕識不見齒然雖越人亦不敢自譽以與洛陽争髙下是洛陽者果天下之第一也洛陽亦有黄芍藥緋桃瑞蓮千葉李紅郁李之類皆不減他出者而洛陽人不甚惜謂之果子花曰某花某花至牡丹則不名直曰花其意謂天下真花獨牡丹其名之著不假曰牡丹而可知也其愛重之如此說者多言洛陽居三河間古善地昔周公以尺寸考日出没則知寒暑風雨乖與順於此取正此盖天地之中草木之華得中和之氣者多故獨與他方異余甚以為不然夫洛陽於周所有之土四方入貢道里均乃九州之中在天地崑崙磅礴之間未必中也又况天地之和氣宜徧被四方上下不宜限其中以自私夫中與和者有常之氣其推於物也亦宜為有常之形物之常者不甚美亦不甚惡及元氣之病也美惡隔并而不相和故物有極美與極惡者皆得於氣之偏也花之鍾其美與夫癭木擁腫之鍾其惡醜好雖異而得分氣之偏病則均洛陽城圍數十里而諸縣之花莫及城中者出其境則不可植焉豈又偏氣之美者獨聚此數十里之地乎此又天地之大不可考也已凡物不常有而為害乎人者曰災不常有而徒可怪駭不為害者曰妖語曰天反時為災地反物為妖此亦草木之妖而萬物之一怪也然比夫癭木擁腫者竊獨鍾其美而見幸於人焉余在洛陽四見春天聖九年三月始至洛其至也晚見其晩者眀年㑹與友人梅聖俞㳺嵩山少室緱氏嶺石唐山紫雲洞既還不及見又眀年有悼亡之戚不暇見又眀年以留守推官嵗滿解去只見其早者是未甞見其極盛時然目之所矚已不勝其麗焉余居府中時嘗謁錢思公於雙桂樓下見一小屏立座後細書字滿其上思公指之曰欲作花品此是牡丹名凡九十餘種余時不暇讀之然余所經見而今人多稱者纔三十許種不知思公何從而得之多也計其餘雖有名而不著未必佳也故今所録但取其特著者而次第之増蘇軾牡丹記序熙寜五年三月二十三日余從太守沈公觀花於吉祥寺僧守璘之圃圃中花千本其品以百數酒酣樂作州人大集金槃綵籃以獻於坐者五十有三人飲酒樂甚素不飲者皆醉自輿臺皁𨽻皆插花以從觀者數萬人眀日公出所集牡丹記十卷以示客凡牡丹之見於傳記與栽植培養剥治之方古今詠歌詩賦下至怪竒小說皆在余既觀花之極盛與州人共㳺之樂又得觀此書之精究博備以為三者皆可紀而公又求余文以冠於篇盖此花見重於世三百餘年窮妖極麗以擅天下之觀美而近嵗尤復變態百出務為新竒以追逐時好者不可勝紀此草木之智巧便佞者也今公自耆老重徳而余又愚蠢迂濶舉世莫與為比則其於此書無乃皆非其人乎然鹿門子嘗怪宋廣平之為人意其鐵石心膓而為梅花賦則清便艷發得南朝徐庾體今以余觀之凡託於椎陋以眩世者又豈足信哉余雖非其人強為公記之公家書二萬卷博覽彊記遇事成書非獨牡丹也陸㳺天彭牡丹花品序牡丹在中州洛陽為第一在蜀天彭為第一天彭之花皆不詳其所自出土人云曩時永寜院有僧種花最盛俗謂之牡丹院春時賞花者多集於此其後花稍衰人亦不復至崇寜中州民宋氏張氏蔡氏宣和中石子灘楊氏皆嘗買洛中新花以歸自是洛花散於人間花户始盛皆以接花為業大家好事者皆竭其力以養花而天彭之花遂冠兩川今惟三井李氏劉村毋氏城中蘇氏城西李氏花特盛又有餘力治亭館以故最得名至花户連畛相望莫得而姓氏也天彭三邑皆有花惟城西沙橋上下花尤超絶由沙橋至堋口崇寜之間亦多佳品自城東抵濛陽則絶少矣大抵花品近百種然著者不過四十而紅花最多紫花黄花白花各不過數品碧花一二而已今自狀元紅至歐碧以類次苐之所未詳者姑列其名於後以待好事者傳原眀李珮姚黄傳髙陽國王諱黄字時重姓姚氏舜八十一代孫先世居諸馮之姚墟舜子商均出娥皇數傳至中央而王於漢至晉子姓蕃衍富者貴者馨名上苑名園五傳而黄生思本娥皇易皇為黄重出也黄為天下正色祖中央也黄美丰姿肌體膩潤拔類絶倫㳺西京術者相之謂其有一萬八千年富貴楊勉見而竒之曰此皇王之胄竒種也開元初薦為先春館上賔上以黄先朝富貴勲舊不敢易之命同㳺沉香亭時曉日倚欄東風拂翠上與黄酣樂見其冶容浥露檀口呼風愛幸特至命李白賦詩美之所謂解釋東風無限恨沉香亭北倚䦨干盖實録云又召金臺御史紫霞仙官洪狀元佐飲於亭擊羯鼓為樂黄毎飲正色不迷得元吉風其醉而酣變幻萬狀向時如迎背時如訣忻時如語含時如咽時俯而愁如時仰而恱如時側而跌如而曲之時則折如也凡作止動中規矩識者云豈獨風流冠西洛只疑富貴是東皇金臺御史連章上薦以為富貴為衆所宗宜膺爵土遂受封為髙陽郡公娶魏國公女紫英相傳魏本丹朱後名紫者從朱也當時有姚黄魏紫奕葉重華之䜟黄出入禁苑紫車翠葆髙牙大纛並擬王者安禄山嫉之謂其為㛰同姓上章極論楊勉為表申解其畧曰舜堯同祖姚祁異姓此堯所以以二女觀舜也况數百代以降聖人易姓遺教彰人耳目于婚奚尤上從勉言置不問尋命黄就封之郡久之衆推戴日深尊為髙陽國王傳國甚逺記増宋歐陽修風俗記洛陽之俗大抵好花春時城中無貴賤皆插花雖負擔者亦然花開時士庶競為㳺遨往往於古寺廢宅有池臺䖏為市井張幄帟笙歌之聲相聞最盛於月陂堤張家園棠棣坊長夀寺東街與郭令宅至花落乃罷洛陽至東京六驛舊不進花自今徐州李相廸為留守時始進御嵗遣牙校一貟乘驛馬一日一夕至京師所進不過姚黄魏花三數朶以菜葉實竹籠子藉覆之使馬上不動揺以蠟封花蒂乃數日不落大抵洛人家家有花而少大樹者盖其不接則不佳春初時洛人於夀安山中斵小栽子賣城中謂之山箆子人家治地為畦塍種之至秋乃接接花工尤著者一人謂之門園子豪家無不邀之姚黄一接頭直錢五千秋時立劵買之至春見花乃歸其直洛人甚惜此花不欲傳有權貴求其接頭者或以湯中蘸殺與之魏花初出時接頭亦直錢五千今尚直一千接時須用社後重陽前過此不堪矣花之木去地五七寸許截之乃接以泥封裹用軟土擁之以篛葉作庵子罩之不令見風日唯南向留一小户以達氣至春乃去其覆此接花之法也種花必擇善地盡去舊土以細土用白歛末一斤和之盖牡丹根甜多引蟲食白歛能殺蟲此種花之法也澆花亦自有時或日未出或日西時九月旬日一澆十月十一月三日二日一澆正月隔日一澆二月一日一澆此澆花之法也一本發數朶者擇其小者去之只留一二朶謂之打剥懼分其脉也花纔落便翦其枝勿令結子懼其易老也春初既去篛庵便以棘數枝置花叢上棘氣暖可以辟霜不損花芽他大樹亦然此養花之法也花開漸小於舊者盖有蠧蟲損之必尋其穴以硫黄簮之其㫄又有小穴如鍼孔乃蟲所藏䖏花工謂之氣窓以大鍼㸃琉黄末鍼之蟲乃死花復盛此醫花之法也烏賊魚骨用以鍼花樹入其膚花輙死此花之忌也周氏洛陽花木記余少時聞洛陽花卉之盛甲于天下嘗恨未能盡觀其繁盛妍麗竊有憾焉熙寜中長兄倅絳因自東都謁告往省親三月過洛始得逰精藍名圃賞及牡丹然後信向之所聞為不虚矣㑹迫於官期不得從容㳺覽元豐四年余蒞官於洛吏事之暇因得博求譜録得唐李衞公平泉花木記范尚書歐陽參政二譜按名尋討十得見其七八焉然范公所述五十二品可考者纔三十八歐之所録者二篇而已其叙錢思公雙桂樓下小屏中所録九十餘種但槩言其畧耳至於花之名品則莫得而見焉因以余耳目之所聞見及近世所出新花參校三賢所録者凡百餘品其亦殫於此乎李廌洛陽名園記洛陽花甚多種而獨名牡丹曰花凡園皆植牡丹而獨名此曰花園子蓋無他池亭獨有牡丹數十萬本凡城中頼花以生者畢家于此至花時張幙幄列市肆管絃其中城中士女絶烟火逰之過花時則復為丘墟破垣遺竈相望矣今牡丹嵗益滋而姚黄魏紫一枝千錢姚黄無賣者原胡元質牡丹記大中祥符辛亥春府尹任公中正宴客大慈精舍州民王氏獻一合歡牡丹公即命圗之士庶創觀闐咽終日蜀自李唐後未有此花凡圗畫者惟名洛陽偽蜀王氏號其苑曰宣華權相勲臣競起第宅窮極奢麗皆無牡丹惟徐延瓊聞秦州董成村僧院有牡丹一株遂厚以金帛厯三千里取至蜀植于新宅至孟氏于宣華苑廣加栽植名之曰牡丹苑廣政五年牡丹雙開者十黄者白者三紅白相間者四後主宴苑中賞之花至盛矣有深紅淺紅深紫淺紫淡黄鏂黄潔白正暈倒暈金含稜銀含稜傍枝副搏合歡重臺至五十葉蜀平花散落民間小東門外有張百花李百花之號皆培子分根種以求利每一本或獲數萬錢宋景文公初帥蜀彭州守朱君綽始取彭州園花凡十品以獻公在蜀四年每花時按其名往取彭州送花遂成故事公於十種花尤愛重錦被堆嘗為之賦盖他園所無也牡丹之性不利燥濕彭州丘壌既得燥濕之中又土人種蒔偏得法花開有至七百葉面可徑尺以上今品類㡬五十種有一種色淡紅枝頭絶大者舍人程公厚倅是州目之為祥雲其花結子可種餘花多取單葉花本以千葉花接之千葉花来自洛京土人謂之京花單葉時號川花朱彭州牡丹詩有蹄金㸃鬢密璋玉縷跗紅香惜持来逺春應摘後空之句今西樓花數欄不甚多而彭州所供率下品錢公成大時以錢買之始得名花提刑程公沂預㑹歎曰自離洛陽今始見花爾程公故洛陽人也増張邦基陳州牡丹記洛陽牡丹之品見於花譜然未若陳州之盛且多也園户植花如種黍粟動以頃計政和壬辰春予侍親在郡時園户牛氏家忽開一枝色如鵞雛而淡其面一尺三四寸髙尺許柔葩重叠約千百葉其本姚黄也而於葩英之端有金粉一暈縷之其心紫蕊亦金粉縷之牛氏乃以縷金黄名之以籧篨作棚屋圍幛復張青帟䕶之于門首遣人約止逰人人輸千錢乃得入觀十日間其家數百千余亦獲見之郡守聞之欲翦以進於内府衆園户皆不可曰此花之變易者不可為常他時復来索此品何以應之又欲移其根亦以此為辭乃已眀年花開果如舊品矣原陸㳺天彭風俗記天彭號小西京以其俗好花有京洛之遺風大家至千本花時自太守而下徃往即花盛䖏張飲帟幕車馬歌吹相屬最盛於清眀寒食時在寒食前者謂之火前花其開稍大火後花則易落最喜隂晴相半時謂之養花天栽接剔治各有其法謂之弄花其俗有弄花一年看花十日之語故大家例惜花可就觀不敢輕翦盖翦花則次年花絶少惟花户則多植花以謀利雙頭紅初出時一本花取直至三十千祥雲初出亦直七八千今尚兩千州家嵗常以花餉諸臺及㫄郡蠟蒂筠籃㫄午於道余客成都六年嵗常得餉然不能絶佳淳熙己酉嵗成都帥以善價私售于花户得數百苞馳驛取之至成都露猶未晞其大徑尺夜宴西樓下燭焰與花相映發影揺酒中繁麗動人嗟乎天彭之花要不可望洛中而其盛已如此使異時復兩京王公将相築園亭以相誇尚余幸得與觀焉其動心盪目又宜何如也増眀袁宏道張園看牡丹記四月初四日李長卿邀余及顧升伯湯嘉賔鄭太初出平則門看牡丹主人為恵安伯張公元善皓髪赬顔伺客甚謹時牡丹繁盛約開五千餘平頭紫大如盤者甚夥西𤓰瓤舞青猊之類徧畦有之一種為芙蓉三變尤佳曉起白如珂雪已後作嫩黄色午間紅暈一㸃如腮霞花之極妖異者主人自言經營四十餘年精神筋力強半疲於此花每見人間花實即採而歸種之二年芽始茁十五年始花久則變而為異種有單瓣而樓子者有始常而終冶麗者已老不復花則芟其枝時殘紅在海棠猶三千餘本中設緋幕絲肉逓作自籬落以至門屏無非牡丹可謂極花之觀最後一空亭甚敞亭周遭皆芍藥密如韭畦墻外有隙地十餘畝種亦如之約以開時復来廿六日偕升伯長卿及友人李本石龍君超丘長孺陶孝若胡仲修十弟寓庸時小修亦自密雲至遂同往觀紅者已開殘惟空亭周遭數十畝如積雪約十餘萬本是日来者多髙户遂大醉而歸雜著増眀夏之臣評亳州牡丹吾亳牡丹年来浸盛嬌容三變猶在季孟之間等此而上有天香一品妬榴紅勝嬌容宮袍紅琉璃貫珠新紅種類不一惟雜紅最後出頗􅁛難得又有大黄一種輕膩可愛不減三變初開拳曲結銹不甚舒展須大開時方到極妙䖏為一病耳至如佛頭青為白花第一此時極多無難致大抵紅色以花子紅銀紅桃紅為上如紫色或如木紅則卑卑不足數矣吾亳土脉頗宜花毋論園丁地主但好事者皆能以子種或就根分移其㨗徑者惟取方寸之芽于下品牡丹全根上如法接之當年盛者長一尺餘即著花一二朶二三年轉盛如上三變之類皆以此法接之其種類異者其種子之忽變者也其種類繁者其栽接之㨗徑者也此其所以盛也他䖏好事者目擊千葉大紅即以為至寳不遑深辨而上色上品即吾亳好事之家惟有力者能得之予向于牡丹亦止浮慕近且精其伎倆園丁好事之家窮捜而厚遺之故所得名品頗多草堂數武之地種蒔殆徧率以兩色併作一叢紅白異狀錯綜其間又以平頭紫慶天香先春紅三色插入花叢間雜而成文章他時盛開爛然若錦㸃綴春光亦一竒也御定佩文齋廣羣芳譜卷三十二
