body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷三十三花譜牡丹二集藻賦增唐李徳裕牡丹賦余觀前賢之賦草木者多矣靡不言託植之幽深採斸之莫致風景之妍麗追賞之歡愉至於體物良有未盡惟牡丹未有賦者聊以狀之曰青陽既暮鶡鴠已鳴念蘭若之方歇歎桃李之隂成惟翠華之艶爚傾百卉之光英抽翠柯以布素粲紅芳而發榮其始也碧海霄澄驪珠躍出深波曉霽丹梓吐實煥神龍之銜燭皎若木之並日其盛也若紫芝連葉鴛雛比翼奪珠樹之鮮輝掩非烟之竒色倐忽摛錦紛葩似織其落也明艶未褫紅衣如脫朱草柯折珊瑚枝碎霞既皪而轉姸紅欲消而猶綷爾乃獨含芳意幽怨殘春将獨立而傾國雖不言兮似人觀其露彩猶泫日華初照曄其晨葩情若微笑色雖美而自􅃩類河汾之窈窕逮乎的皪含景􅄐披向風鉛華春而思蕩蘭澤晩而光融情放縦以自得凝若煥之冶容既而華豔恍惚繁華遽畢驚寳雉之乍迴想江妃而復出望獻璫之玉俄以蔽光感懐珮之川悵然如失客顧余曰勿謂淑美難乆徂芳不留彼姸華之閱世非人夀之可儔君不見龍驤閈宏池臺御溝堂挹山林峯連翠樓有百嵗之芳叢無昔日之通侯豈暇當飛藿之時始嗟零落且欲同樹萱之意聊自㤀憂原舒元輿牡丹賦并序古人言花者牡丹未甞與焉葢遁乎深山自幽而芳不為貴重所知花則何遇焉天后之鄉西河也精舎下有牡丹其花特異天后歎上苑之有缺因命移植焉由此京國牡丹日月寖盛今則自禁闥洎官署外延士庶之家瀰漫如四瀆之流不知其止息之地每暮春之月遨遊之士如狂焉亦上國繁華之一事也近代文士為􅁔詩以詠其形容未有能賦之者余獨賦之以極其美曰圎𤣥瑞精有星而景有雲而卿其光下垂遇物流形草木得之發為紅英英之甚紅鍾乎牡丹㧞類邁倫國香欺蘭我研物情次第而觀暮春氣極綠苞如珠清露宵偃韶光曉驅動盪支節如解凝結百脉融暢氣不可遏兀然盛怒如将憤洩淑日披開照耀酷烈美膚膩體萬状皆絶赤者如日白者如月淡者如赭殷者如血向者如迎背者如訣忻者如語含者如咽俯者如愁仰者如恱褭者如舞側者如跌亞者如醉曲者如折宻者如織踈者如缺鮮者如濯慘者如别初朧朧而下上次鱗鱗而重疊錦衾相覆繡帳連接晴籠晝薰宿露宵裛或的的騰秀或亭亭露竒或颭然如招或儼然如思或帶風如吟或泫露如悲或垂然如縋或爛然如披或迎日擁砌或照影臨池或山雞已馴或威鳳将飛其態萬萬胡可立辨不窺天府孰得而見乍疑孫武來此教戰其戰謂何揺揺纎柯玉欄滿風流霞成波歴堦重臺萬朶千窠西子南威洛神湘娥或倚或扶朱顔色酡各衒紅缸争顰翠蛾灼灼夭夭逶逶迤迤漢宫三千艶列星河我見其少孰云其多弄彩呈姸壓景駢肩席發銀燭爐升絳烟洞府真人會於羣仙晶瑩徃來金缸列錢凝睇相㸔曾不晤言未及行雨先驚旱蓮公室侯家列之如麻咳唾萬金買此繁華遑恤終日以言相誇列幄庭中歩障開霞曲廡重梁松篁交加如貯深閨似隔絳紗髣髴息媯依稀館娃我來觀之如乗仙槎脉脉不語遲遲日斜九衢遊人駿馬香車有酒如澠萬坐笙􅁔一醉是競莫知其他我按花品此花第一脫落羣類獨占春日其大盈尺其香滿室葉如翠羽擁抱櫛比蕊如金屑妝飾淑質玫瑰羞死芍藥自失夭桃斂迹穠李慙出躑躅宵潰木蘭濳逸朱槿灰心紫薇屈膝皆讓其先敢懐憤嫉煥乎美乎后土之産物也使其花如此而偉乎何前代寂寞而不聞今則昌然而大來豈草木之命亦有時而塞亦有時而開吾欲問汝曷為而生哉汝且不言徒留玩以徘徊增宋蔡襄季秋牡丹賦并序爽秋渉杪扶欄間有牡丹舊枿輒吐芳桋亭亭上擢發紅葩一大可徑咫扶欄當彩翠亭之右亭屹縣圃之西北隅圃直縣堂之背縣介大江之南葢漢元朔中江都易王上封其子敢為丹陽侯邑于蕪湖此其地歟今為太平州筦時河間凌公尹之行再期矣政休賦集又所瀕江英游雅故受署齎代被召将命者憧憧然率道其疆故觴詠之娱相因無缺及此珍卉馨茂公有異時之貴趣張具髙會于其側所謂彩翠亭者酒三行濟陽蔡某釂舉而言曰公走文章聲二紀于兹顛葆㡬華位不過禁省二丞官不過萬户長吏而善禦外物居頗休閒獨以浩博記書稱道聖明為事今是花也韜英和緒揭麗蕭辰時雖後而且大盛意者公其日寖亨會才慮将有所售乎昔騷人取香草美人以嫓忠潔之士牡丹者亦其類歟請為公賦之其詞曰朔羽南翔建杓西宅霜天一清露草皆白悲哉轉凉葉于亭臯兮悵穠華之閴寂均百草之不能秋兮何此花天姿之的的使人觀之若披大暑兮臨清湘剝層霾兮仰白日厥初槁壤潜春扶欄向夕芳枝舉以融怡絳蕊局兮羃䍥寳霧宵籠鮮風曉坼麗或中人香可專國刻紅炬以烘燄綴彤霞而薦色鬰茀誰語丰葺自持非倚瑟之神女抑善賦之文姬俯清都而時下簸晴陽以孤嬉霄灝瀚兮排金扉氣砊碭兮張寳帷霓􅁮煜兮掲朱旗雲曈曨兮披纁衣􅒫綠跗兮矉修眉姹鮮萼兮伸微辭沛怡愉兮新相知𦕈悽惻兮送将歸桃有援兮溪之曲蓮為媒兮澤之湄羗此物之善逺亶夫君之後時君不聞佳麗皇州喧繁戚里清籞迢迢名園亹亹綺櫳曉兮金鑷聲繡墻明兮雨苔紫嚴霰纔歸光風半起于是萬蒂駢紅交柯結翠宻顔紆餘斜袂輕綺文鴛羣飛鶴錦横被縓葢攀聨緹裳積委則有姝姝玉人翩翩卿子寳韉過兮飛電珠幰來兮流水擁翫佳辰笑語成市彼瓊㽔美英縹葉新蘤羞不得借其餘光矧標揚乎意氣今何為兮江之干地之卑兮嵗将䦨荆蕪比兮霜月寒望下苑兮思上蘭嘉夲擢兮靈根盤泊淮波兮鮮楚山是知元冶一陶昌生萬育無左右先容者淪乎朽株當匠伯不顧者被之散木譬此花之賦命兮亦節暮而葩獨然貴賤反衍禍福倚伏其暮也何遽不為貴其獨也庸知不為福噫化工物情吾以此卜原明徐渭牡丹賦何名花之盛美稱洛陽為無雙東青州而南越曾不足以頡頑兹上代之無聞始絶盛乎皇唐爾其月陂堤上長夀街東張家園裏汾陽宅中當春光之既和藹亭榭之載營天宇曠霽兮絲遊景物招人而事起彼公子兮王孫蹙遊龍于流水遶兹葩而宻坐藉芳草而芉芉感盛年之若斯傷代謝之能㡬爾則粉承日華朱含霧雨羣蒂如翔交柯如拒凌晨併妝對客不語衛尉出婢子於羅幃鄂君擁翠被于江渚當其百蕊千芽照耀朱霞緑葉紛紜望之轉賒若儒生之授學列女樂于絳紗迨夫背户迎窓上下甍簷二三作隊矯矯愈鮮飛燕進女弟于逺條夫人挟三國而朝天錦瓣重捲檀心飛屑柔鬚夜殷怒苞曉决宛婦姑之反唇似相稽而無說則有若盛時合㳫諸娣從韓姞以同歸颯顔凋衰漢主放宫人而憎别風薦小爽雨委微温楚姝舞歇于章臺陳后泣罷于長門亦有細加巨上慎妃横逼座之勢紫侍黄側班姬抗同輦之尊或勁而昂媫妤當逸熊于上殿或翹而望處子窺宋玉于東垠既離以披亦競而駢近不極態逺不盡姸夫彷彿乎佳麗意所想而隨存奚㧞引之數姝可罄比而殫論五言古詩增唐白居易和錢學士白牡丹城中㸔花客旦暮去營營素華人不顧亦占牡丹名開在深寺中車馬無來聲惟有錢學士盡日繞叢行憐此皓然質無人自芳馨衆嫌我獨賞移植在中庭留景夜不暝迎晨􅍼先明對之心亦静虚白相向生唐昌玉蕊花攀玩衆所争折來比顔色一種如瑶瓊彼因稀見貴此以多為輕始知無正色愛􅁖隨人情豈惟花獨爾理與人事并君㸔入時者紫豔與紅英秋題牡丹叢晩叢白露夕衰葉凉風朝紅豔乆已歇碧芳今亦銷幽人坐相對心事共蕭條原白居易西明寺牡丹花時憶元九前年題名處今日㸔花來一作芸香吏三見牡丹開豈獨花堪惜方知老暗催何况尋花伴東都去未回詎知紅芳側春盡思悠哉買花帝城春欲暮喧喧車馬度共道牡丹時相隨買花去貴賤無常價酬値㸔花數灼灼百朶紅戔戔五束素上張幄幕庇㫄織芭籬䕶水灑復泥封移來色如故家家習為俗人人迷不悟有一田舎翁偶來買花處低頭獨長歎此歎無人喻一叢深色花十户中人賦增元稹和白樂天秋題牡丹叢敝宅艶山卉别來長歎息吟君晩叢詠似見催隤色欲識别後容勤過晩叢側永夀寺㸔牡丹曉入白蓮宫琉璃花界淨開敷多喻草凌亂被幽徑壓砌錦地鋪當霞日輪映蝶舞香暫飄蜂牽蕊難正籠處彩雲合露湛紅珠瑩結葉影自交揺風光不定繁華有時節安得保全盛色見盡浮榮希君了真性李端鮮于少府宅木芍藥謝家能植藥萬簇相縈倚爛熳綠苔前嬋娟青草裏垂䦨復照户暎竹仍臨水驟雨發芳香迴風舒錦綺孤光雜新故衆色更重累散碧出踈荂分黄成細蕊遊蜂髙更下驚蝶坐還起玊貎對應慙霞標方不似春隂憐弱蔓夏日同短晷迴落報衰榮交闗鬬紅紫花信可未䦨詩情詎能止上客屢移仗幽僧勞凭几初命雖薄劣幸得陪君子致謝賢主人何庸樹桃李原宋蘓軾雨中㸔牡丹霧雨不成㸃暎空疑有無時於花上見的皪走明珠秀色洗紅粉暗香生雪膚黄昏更蕭索頭重欲相扶明日雨當止晨光在松枝清香入花骨肅肅初自持午景發濃豔一笑當及時依然暮還斂每似惜幽姿幽姿不可惜後日東風起酒醒何所見含粉抱青子千花與百草共盡無姸鄙未忍汚泥沙牛酥煎落蕊增張耒與潘仲達淮揚牡丹花盛不如京雒姚黄一枝開衆豔氣如削亭亭風塵裏獨立朝百萼誰知臨老眼得到美葵藿明李東陽鏡川先生宅賞白牡丹玊堂天上清玊版天下白幸從清切地見此純正色露苞春始凝脂萼曉新坼檀深藹薫心絳淺微近積終焉保貞素不涴脂與澤先生無物玩聊以物自適澹哉君子懐富貴安可易臨軒撫流景愛此不忍摘我亦惜春心逢花作花客先生顧客笑偶此非宿昔客去花未䦨嫣然共今夕七言古詩增唐權徳輿慈㤙寺清上人院牡丹􅁔澹蕩韶光三月中牡丹偏自占春風時過寳地尋香徑已見新花出故叢曲水亭西杏園北穠芳深院紅霞色擢秀全勝珠樹林結根幸在青蓮域艶蕊鮮房次第開含烟洗露照蒼苔龎眉倚杖禪僧起輕翅縈枝舞蝶來獨坐南臺時共美間行古刹情何已花開一曲奏陽春應為芬芳比君子原白居易牡丹芳牡丹芳牡丹芳黄金蕊綻紅玊房千片赤英霞爛爛百枝絳㸃燈煌煌照地初開錦繡叚當風不結蘭麝嚢仙人琪樹白無色王母蟠桃小不香宿露輕盈泛紫艶朝陽照耀生紅光紅紫二色間深淺向背萬態隨低昂暎葉多情隠羞面卧叢無力含醉妝低嬌笑容疑掩口凝思怨人如斷膓穠姿貴彩信竒絶雜卉亂花無比方石竹金錢何細碎芙蓉芍藥苦尋常遂使王公與卿士遊花冠葢日相望庳車軟輦貴公主香衫細馬豪家郎衛公宅静閉東院西明寺深開北廊戲蝶雙舞㸔人乆殘鶯一聲春日長共愁日照芳難駐仍張帷幕垂隂凉花開花落二十日一城之人皆若狂三代以還文勝質人心重華不務實重華直至牡丹芳其來有漸非今日元和天子憂農桑䘏下動天天降祥去年嘉禾生九穗田中寂寞無人至今年瑞麥分兩岐君心獨喜無人知無人知可歎息我願暫求造化力減却牡丹妖艶色少迴卿士愛花心同似吾君憂稼穡增李賀牡丹種曲蓮枝未長秦蘅老走馬駝金劚春草水灌香泥却月盆一夜綠房迎白曉美人醉語園中烟晩華已散蝶又闌梁王老去羅衣在拂袖風吹蜀國絃歸霞帔拖蜀帳昬嫣紅落粉罷承㤙檀郎謝女眠何䖏樓臺月明燕夜語李咸用逺公亭牡丹雁門禪客吟春亭牡丹獨逞花中英雙成膩臉偎雲屏百般姿態因風生延年不敢歌傾城朝暮雲雨愁娉婷蕊繁蟻脚粘不行蝶迷蜂醉飛無聲廬山根脚含精靈發姸吐秀藂君庭湓江太守多閒情欄朱繞絳㽞輕盈潺潺醁醴當風傾平頭奴子啾銀笙紅葩艶艶交童星左文右武憐君榮白銅堤上慙清明原宋歐陽修洛陽牡丹圗洛陽地脉花最冝牡丹尤為天下竒我昔所記數十種于今十年半㤀之開圗若見故人面其間數種昔未窺客言近嵗花特異徃徃變出呈新枝洛人驚誇立名字買種不復論家貲比新較舊難優劣争先擅價各一時當時絶品可數者魏紅窈窕姚黄肥夀安細葉開尚少朱砂玊版人未知傳聞千葉昔未有只從左紫名初馳四十年間花百變最後最好􅇓溪緋今花雖新我未識未信與舊誰姸媸當時所見已云絶豈有更好此可疑古稱天下無正色似恐世好隨時移鞓紅鶴翎豈不美斂色如避新來姬何况逺說蘓與賀有類後世誇嬙施造化無情疑一槩偏此著意何其私又疑人心愈巧偽天欲鬬巧窮精微不然元化樸散乆豈特近嵗尤澆漓争新鬭麗若不已更後百載知何為但令新花日愈好惟有我老年年衰增歐陽修謝觀文王尚書恵西京牡丹京師輕薄兒意氣多豪俠争誇朱顔事年少肎慰白髪将花插尚書好事與俗殊憐我霜毛苦蕭颯贈以洛陽花滿盤鬭麗争竒紅紫雜兩京相去五百里㡬日馳來足何㨗紫檀金粉香未吐緑萼紅苞露猶浥謂我甞為洛陽客頗向此花曾渉獵憶昔進士初登科始事相公沿吏牒河南官屬盡賢俊洛城池籞相連接我時年纔二十餘每到花開如蛺蝶姚黄魏紫腰帶鞓潑墨齊頭藏綠葉鶴翎添色又其次此外雖妍猶婢妾爾来不覺三十年嵗月纔如熟羊胛無情草木不改色多難人生自摧拉見花了了雖舊識感物依依㡬抆睫念昔逢花必沽酒起坐驩呼屢傾榼而今得酒復何為愛花繞之空百匝心衰力懶難勉强與昔一何殊勇怯感公意厚不知報墨筆淋漓口徒囁梅聖俞牡丹洛陽牡丹名品多自謂天下無能過及來江南花亦好絳紫淺紅如舞蛾竹隂水照增顔色春服貼妥裁輕羅時結遊朋去尋玩香吹酒面生紅波粉英不忿付狂蝶白髪強插成悲歌明年更開余已去風雨摧殘可奈何韓欽聖問西洛牡丹之盛韓君問我洛陽花争新較舊無窮已今年誇好方絶倫明年好更還相比君疑造化特著意果乃區區可羞恥甞聞都邑有勝意既不鍾人必鍾此由是其中立品名紅紫葉繁矜色美萌芽始見長蒿萊氣熖旋㸔壓桃李乃知得地偶增異遂出羣葩號竒偉亦如廣陵多芍藥閭井荒殘無可齒淮山􅃉秀付草樹不産髦英産佳卉人於天地亦一物固與萬類同生死天意無私任自然損益推遷定有彼彼盛此衰皆一時豈闗覆幬為偏委呼兒持紙書此說為我緘之報韓子原蘓軾惜花吉祥寺中錦千堆前年買花真盛哉道人勸我清明來腰皷百面如春雷打徹凉州花自開沙河塘上戴花回醉倒不覺吴兒咍豈知如今雙鬢催城西古寺沒蒿萊有僧閉門手自栽千枝萬葉巧翦裁就中一叢何所似碼碯盤盛金縷杯而我食菜方清齋對花不飲花應猜夜來雨雹如李梅紅殘綠暗吁可哀楊萬里題周益公天香堂牡丹君不見沉香亭北専東風謫仙作頌天無功又不見君王殿後春第一領袖衆芳捧堯日此花同春轉化鈞一風一雨萬物春十分整頓春光了收黄拾紫歸江表天香染就山龍裳餘芬却染水雲鄊青原白鷺萬松竹被渠染作天上香人間何曾識姚魏相公新移洛陽裔呼酒先招野客㸔不醉花前為誰醉增元張養浩毛良卿送牡丹三年野䖏雲水俱逢春未始襟顔舒故人持贈木芍藥慰我意重明月珠入門神彩射人倒荒邨争㸔傾城姝急呼瓶水浴紅翠明窓浄几相依於自言私第惟此夲每開蹏轂窮朝晡樹髙丈許花數十紫雲滿院春扶踈栽培直訝天上種熏染不類人間株有時風蕩香四出舉國皆若蘭為裾貧家蔀屋僅數椽照耀無異華堂居天葩如此忍輕負轉首夢斷巫山孤明當灑掃遲鳧舄未審肎踵荒寒無余聞感徳良勤劬乆習懶散倦世途深藏非是徳公傲索居莫哂儀曺愚禁厨一臠味已得類推固可知其餘君持詩去為花誦蜂蝶應亦相歡娱宋褧朝元宫白牡丹瑶圃廓落崑崙髙霓旌豹節凌旋飈東門偷種來塵囂開雲鏤月百千瓣雪痕氷璺辭鎪琱重臺複榭玊版白濕露擁出青霞嬌瓊娥愛春受春足香腴酥膩愁風消人間洛陽紅紫妖紫霞灔灔吹秦簫青鸞望極何當招原明桑恱白牡丹一春無計消繁華坐香傍色餐流霞妖桃穠李俱小器揩目晩㸔花大家素質盈盈美無度何年謫下瑶臺路精神飛入銀河篇體態都歸洛神賦神樂觀主容臺卿空花壓眼真無情吾儕放浪為無事東風斗酒消春晴曽聞二夲歸天上㡬度重瞳轉相向内園㸃綴黄金屋禁苑安排紫絲帳朅來此種㽞人間託根洞府非塵寰隨時窮達花不識天遊何必乗青鸞萬事到頭俱瑣瑣大觀萬物皆無我半醉題詩謝主人名花可鑄傳千古沈周吴瑞卿染墨牡丹雨晴風晴日杲杲趂此㸔花花更好澆紅要盡三百觴請客不湏辭量小野僧栽花要客到急掃風軒破清曉知渠色相夲来空未必真成被花惱吴生又與花傳神紙上生涯春不老青春展卷無時無姚家魏家何足道唐順之同院僚觀閣中牡丹作西掖衡連翡翠城籠烟䙚霧百花明祗謂紫薇方吐萼忽言紅藥已敷英紅藥葳㽔艶盛陽萬年春色在文昌寜同鄴下芙蓉苑詎比洛陽桃李場裁成異瓣千般錦纈就同心一様黄金閣披時渾是畫綺樓凝處并疑妝濯枝故向鳳池上裛露偏依仙掌傍仙掌嶙峋對鳳池詞郎侍直鷺鴛齊玲瓏玊佩花間映飄曵羅衫葉下迷花間葉下情無極含笑含嬌似相識羞将雞舌鬭馨香欲􅂑䴊冠並顔色翠幙分㸔態轉新朱欄斜倚不勝春未採孫根助靈液聊持芳蕊贈佳人王世貞季園賞白牡丹三月一出遊季園千竒萬麗攅雕欄紛紛紅紫盡辟易中有一株白牡丹初疑龍池晏罷舞雙成盤又似洗頭盆暫缷天女冠姑射寒生雪膚粟鬰儀風細霓裳單河宗攻玉乍成斗鮫室淚珠叢作團優鉢曇名亦浪語璚花么麽何足觀太真霞臉帶醉色覩此亦學江妃酸舉觴酬季郎化工在手汝不難得非揚州觀頭逢七七又何必善和坊裏延端端即使宋人琢此瓣百嵗那得兹花㸔老夫乆寂寞為爾暫為歡冄進金叵羅屬客莫留殘日落不落天闌干欲去不去心盤桓皎然秀色轉可餐他年倘許蕊珠會别跨長螭勝紫鸞增陸師道昌公房㸔牡丹􅁔甞聞樂府牡丹芳春來一城人若狂我今日日被花惱毋乃花􅁋如洛陽吴中三月花如綺百品千名鬭竒靡名園徃徃平泉莊禪宫處處西明寺我今曵杖登武丘昌公精舎花枝柔動如迎笑静若醉頰白腮紅名玉樓此花初移得春淺六寸圎開天女面對花一飲三百杯醉裏題詩寫花片沈家白花湼不緇三花相亞玊交枝何郎膩粉拭香汗虢國新妝淡掃眉主人開筵浮大白為花傳神贈賔客輕綃颯颯欲飄香琪樹盈盈轉生色酣酒為言興未已邀㸔石佛千頭紫衣色相鮮繡佛前天芬似入祇林裏初来一朶如傾杯坐乆數花相次開花神好客向客笑不用臨風羯鼓催三日㸔花花轉靚未似潘園稱最盛中庭一樹丈五髙碧瓦雕簷錦叢映西齋亦是玊樓春數之二百花色勻夀安紅與細葉紫更有異種誇東隣越羅蜀錦㸔不足艶裹明妝貯金屋身如遊蜂繞花戲月明還向花房宿也知天意自憐人但令到䖏花枝新况逢晴景與佳侣狂吟爛醉今經旬人生歡樂􅀎㡬許百病千愁更風雨安得年年似此遊作歌且紀千花譜五言律詩御製詠各種牡丹晨葩吐禁苑花蒔就新晴玊版叅仙蕊金絲雜緑英色含潑墨發氣逐彩雲生莫訝清平調天香自有情原唐王建題所賃宅牡丹花賃宅得花饒初開恐是妖粉光深紫膩肉色退紅嬌且願風留著惟愁日炙燋可憐零落蕊收􅂑作香燒李商隱僧院牡丹葉薄風才倚枝輕霧不勝開先如避客色淺為依僧粉壁正蕩水緗幃初卷燈傾城唯待笑要裂㡬多繒增温庭筠牡丹輕隂隔翠幃宿雨泣晴暉醉後佳期在歌餘舊意非蝶繁輕粉住蜂重抱香歸莫惜熏爐夜因風到舞衣韓琮咏牡丹未開者殘花何䖏藏盡在牡丹房嫩蕊包金粉重葩結繡囊雲凝巫峡夢簾閉景陽妝應恨年華促遲遲待日長李咸用牡丹少見南人識識來嗟復驚始知春有色不信爾無情恐是天地媚暫隨雲雨生縁何絶尤物更可比姸明王貞白白牡丹榖雨洗纎素裁為白牡丹異香開玊合輕粉泥銀盤時貯露華濕宵傾月魄寒佳人淡妝罷無語倚朱欄裴說牡丹數朶欲傾城安同桃李榮未曽貧䖏見不似地中生此物疑無價當春獨有名遊蜂與蝴蝶來徃自多情原宋梅堯臣延羲閣牡丹花中第一品天上見應難近署多紅藥層城有射干生雖由地勢開不許人㸔天子何時賞宫娥捧玉盤范鎮牡丹自古成都勝開花不似今徑圍三尺大顔色㡬重深未放香噴雪仍藏蕊散金要知空相諭聊見主人心增韓絳次韻徑尺千餘朶矜誇古復今錦城春物異粉面瑞雲深賞愛難㤀酒珍竒不貴金應知空色理夢幻即惟心韓維次韻勝事常歸蜀竒葩又騐今仙冠裁様巧彩筆費功深白豈容拖粉紅湏陋間金不嗟珍賞異千里見君心原范純仁次韻牡丹開蜀國盈尺豈如今姸麗色殊衆栽培功倍深矜誇傳萬里圗寫費千金難就朱闌賞徒揺逺客心元王惲和仲常牡丹詩漢殿承㤙早金盤薦露新色酣中省樂香重錦窠春儘殿羣芳後誰辭載酒頻清如司馬相也作插花人曺伯啟陪馬克修治書謁天㳺孫真人方丈堦前牡丹盛開巵酒同玩座中范提㸃索詩拉友尋佳致琳宫引興長服膺思酒聖拭目待花王逝水年華急行雲世態忙無因駐清景春色又斜陽原明桑恱牡丹尤物開何晩餘香貯小亭繁華愁日暮富貴自天成花合隋時寵根疑宋末生拂衣尋古色屋角老松青申時行適適園牡丹亭洛中移小景亭北倚新妝題䖏皆名品開時正艶陽露凝酣酒色風度返魂香解道稱姚魏繁華壓衆芳眭石詠牡丹繡幄擁花王穠姿鬭艶陽枝枝承日彩片片引天香托植依餘地含清逐後行獨憐春殿裏歌舞侍瑶觴七言律詩增唐韓愈戲題牡丹幸自同開俱隠約何湏相倚鬭輕盈凌晨并作新妝面對客偏含不語情雙燕無機還拂掠遊蜂多思正經營長年是事皆抛盡今日欄邉暫眼明原李商隱牡丹錦幃初卷衛夫人繡被猶堆越鄂君垂手亂翻雕玊珮折腰争舞鬰金裙石家蠟燭何曽翦荀令香爐可待熏我是夢中傳彩筆欲書花葉寄朝雲增李商隠回中牡丹為雨所敗二首下苑他年未可追西州今日忽相期水亭暮雨寒猶在羅薦春香暖不知舞蝶􅇻勤收落蕊佳人惆悵卧空幃章臺街裏芳菲伴且問宫腰損㡬枝浪笑榴花不及春先期零落更愁人玊盤迸淚傷心數錦瑟驚絃破夢頻萬里重隂非舊圃一年生意屬流塵前溪舞罷君回顧并覺今朝粉態新温庭筠牡丹水漾晴紅壓叠波曉來金粉覆庭莎裁成艶思偏應巧分得春光最數多欲綻似含䨇靨笑正繁疑有一聲歌華堂客散簾垂地想凭闌干斂翠蛾方干牡丹借問庭前早晩栽座中疑是畫屏開花分淺淺臙脂臉葉墮􅇻􅇻膩粉腮紅砌不湏誇芍藥白蘋何用逞重臺殷勤為報㸔花客莫學遊蜂日日來不逢盛暑不衝寒種子成叢用法難醉眼莫為抛去得狂心更擬折來㸔凌霜烈火吹無熖裛露隂霞曬不乾莫道嬌紅怕風雨經時猶自未凋殘原韓琮牡丹桃時杏日不争濃葉帳隂成始放紅曉艶逺分金掌露暮香深惹玊堂風名遺蘭杜千年後貴擅聲歌百醉中如夢如仙忽零落暮霞何䖏緑屏空增李山甫牡丹邀勒春風不早開衆芳飄後上樓臺數苞仙艶火中出一片異香天上來曉露精神妖欲動暮烟情態恨成堆知君也解相輕薄斜凭䦨干首重迴薛能牡丹去年零落暮春時淚濕紅箋怨别詩常恐便同巫峡散何因重有武陵期傳情每向馨香得不語還應彼此知見欲闌邉安枕席夜深閒共說相思牡丹愁為牡丹饑自惜多情欲瘦羸穠艶冷香初葢後好花甘雨正開時吟蜂徧坐無閒蕊醉客曽偷有折枝京國别來誰占玩此花光景屬吾詩秦韜玉牡丹折妖放艶有誰催疑就山中旋折來圗把一春皆占斷故留三月始教開壓枝金蕊香如撲逐朶檀心巧勝裁好是酒闌絲竹罷倚風含笑向樓臺唐彦謙牡丹真宰多情巧思新故将能事送殘春為雲為雨徒虚語傾國傾城不在人開日綺霞應失色落時青帝合傷神嫦娥􅄔女曽相送留下鴉黄作蕊塵吴融紅白牡丹不必繁絃不必歌静中相對更情多􅇻鮮一半霞分綺潔澈傍邉月颭波㸔乆願成莊叟夢惜留湏倩魯陽戈重來應共今來别風墮香殘襯緑莎僧院白牡丹二首膩若裁雲薄綴霜春殘獨自殿羣芳梅妝向日霏霏暖紈扇揺風閃閃光月魄照來空見影露華凝後更多香天生潔白冝清浄何必􅇻紅映洞房侯家萬朶簇霞丹若並雙林素艶難合影只應天際月分香多是畹中蘭雖饒百卉争先發還在三春向後殘想得恵休凭此檻􅈕将榮落意來㸔殷文圭趙侍郎宅㸔紅白牡丹因寄楊状頭贊圗遲開都為讓羣芳貴地栽成對玉堂紅艶褭􅃄疑欲語素華映月祗聞香翦裁偏得東風意淡薄如矜西子妝雅稱花中為首冠年年長占斷春光李建勲晩春送牡丹携觴邀客繞朱欄膓斷殘春送牡丹風雨數來留不得􅄐披将謝忍重㸔氛氤蘭麝香初减零落雲霞色漸乾借問少年能㡬許不湏堆酒壓杯盤殘牡丹膓斷題詩如執别芳茵愁更繞闌鋪風飄金蕊㸔全落露滴檀英又暫蘓失意媫妤妝漸薄背身妃子病教扶迴㸔池館春歸也又是迢迢㸔畫圗李中柴司徒宅牡丹暮春䦨檻有佳期公子開顔乍拆時翠幄宻籠鶯未識好香難揜蝶先知願陪妓女争調樂欲賞賔朋預課詩只恐却隨雲雨去隔年還是動相思張蠙觀江南牡丹北地花開南地風寄根還與客心同羣芳盡怯千般態㡬醉能消一畨紅舉世祗将華勝實真禪原喻色為空近年明主思王道不許移栽滿六宫原羅隠牡丹似共東風别有因絳羅髙捲不勝春若教觧語應傾國任是無情亦動人芍藥與君為近侍芙蓉何䖏避芳塵可憐韓令功成後辜負穠華過此身增徐夤牡丹萬萬花中第一流殘霞輕染嫩銀甌能狂紫陌千金子也惑朱門萬户侯朝日照開携酒㸔暮風吹落繞闌收詩書滿架塵埃撲盡日無人略舉頭尚書座上賦牡丹花其花自越中移植流蘓凝作瑞花精仙閣開時麗日晴霜月冷銷銀燭熖寳甌圎印彩雲英嬌含嫩臉春妝薄紅蘸香綃艶色輕早晩有人天上去寄他将贈董雙成依韻和尚書冄贈牡丹花爛銀基地薄紅妝羞殺千花百卉芳紫陌昔曽遊寺㸔朱門今冄繞闌望龍分夜雨資嬌態天與春風發好香多著黄金何䖏買輕橈揺過鏡湖光白牡丹蓓蕾抽開素練囊瓊葩熏出白龍香裁分楚女朝雲片翦破姮娥夜月光雪句豈湏徵桞絮粉腮應恨帖梅妝檻邉㡬笑東籬菊冷折金風待降霜憶牡丹綠樹多和雪霰栽長安一别十年來王孫買得價偏重桃李落殘花始開宋玊鄰邉腮正嫩文君罏畔錦初裁滄州春夢空腸斷㸔盡猶将勸酒杯惜牡丹今日狂風掲錦筵預愁吹落夕陽天閒㸔紅艶只湏醉漫借黄金豈是賢南國好偷誇粉態漢宫冝摘贈神仙良時誰作鶯花主白馬王孫恰少年劉兼冄㸔光福寺牡丹去年曾㸔牡丹花蛱蝶迎人傍彩霞今日冄遊光福寺春風吹我入仙家當筵芬馥􅁔唇動倚檻嬌羞醉眼斜來嵗未朝京闕去依前和露載歸衙釋歸仁牡丹三春堪惜牡丹竒半倚朱闌欲綻時天下更無花勝此人閒偏得貴相宜偷香墨蟻斜穿葉窺蝶黄鶯倒挂枝除却解禪心不動筭應狂殺五陵兒原魚𤣥機賣殘牡丹臨風興歎落花頻芳意潜消又一春應為價髙人不問却縁香甚蝶難親紅英只稱生宫裏翠葉那堪染露塵及至移根上林苑王孫方恨買無因增宋冦凖應制賦牡丹栽培終得近天家獨有芳名出衆花香逓暖風飄御座葉籠輕靄襯明霞縱吟冝把紅牋擘留賞惟張翠幄遮深覺侍臣千載幸許隨仙仗㸔穠華韓琦晝錦堂賞牡丹從來三月賞芳妍開晩今逢首夏天料得東君私此老且留西子乆當筵桞絲偷學傷春緒榆莢争飛買笑錢我是至和親植者雨中相見似澘然再賞牡丹錦堂重賞牡丹紅不惜殘英數日空嘉艶豈無來嵗好清歡難得故人同誰言山下曾為雨只恐身輕去逐風且共對花開口笑莫持姚左較雌雄趙抃禁省牡丹校文春殿籥天闗内籞千葩放牡丹風捲異香來幕帟日披濃艶出闌干芳菲喜向禁中見憔悴憶曾江外㸔翦賜從臣君意重數枝和露入金盤胡宿憶薦福寺牡丹十日春風隔翠岑祗應繁朶月成隂樽前可要人頺玉樹底遥知地側金花界三千春𣺌𣺌銅槃十二夜沉沉雕盤分篸何由得空作西州擁鼻吟蔡襄陪提刑郎中吉祥院㸔牡丹節候初臨榖雨期滿天風日助芳菲生來已占妙香國開䖏全烘直指衣攪照儘教烏帽重放歌湏遣羽觴飛前騶不用𫝊呼急待與遊人一路歸蘓軾常潤道中有懐錢塘寄述古國色夭嬈酒半酣去年同賞寄僧檐但云撲撲晴香軟誰見森森曉態嚴榖雨共驚無㡬日蜜蜂未許輒先甜應湏火急回征棹一片辭枝可得黏杭州牡丹開時周令作詩見寄次其韻羞歸應為負花期已見成隂結子時與物寡情憐我老遣春無恨頼君詩玊臺不見朝酣酒金縷猶􅁔空折枝從此年年定相見欲師老圃問樊遲朱長文淮南牡丹竒姿湏賴接花工未必妖華限洛中應是春皇偏與色却教仙女媿乗風朱欄共約他年賞翠幙休嗟數日空誰就東吴為品第清晨仔細閲芳叢陸㳺牡丹吾國名花天下知園林盡日敞朱扉蝶穿宻葉常相失蜂戀繁香不記歸欲過每愁風蕩漾半開却要雨霏微良辰樂事真當勉莫遣匆匆一片飛原楊萬里謝張公父送牡丹病眼㸔書痛不勝洛花千朶喚雙明淺紅醲紫各深様雪白鶴黄非舊名擡舉精神微雨過留連消息嫩寒生蠟封水養松窓底未似雕欄倚半酲詠重臺九心淡紫牡丹紫玊盤盛碎紫綃碎綃擁出九嬌嬈都将些子鬰金粉亂㸃中央花片梢葉葉鮮明還互照亭亭丰韻不勝妖折來細雨輕寒裏正是東風拆半苞增楊萬里賦周益公平園白花青緣牡丹東皇封作萬花王更賜珍華出上方白玊杯将青玊緣碧羅領襯翠羅裳古來洛口元無種今去天心别作香塗改歐家記文㸔此花未出說姚黄立春檢牡丹牡丹又欲試春妝忙得閒人也作忙新舊年頭将替換去留花眼費商量東風從我袖中出小蕾已含天上香只道開時恐膓斷未開先自斷人膓春半雨寒牡丹殊無消息今嵗芳菲儘未忙去年二月牡丹香寒暄不定春光晩榮落儘遲花命長纔一兩朝晴炫野又三四陣雨鳴廊對江魏紫拳如蕨而况姚家進御黄金蔡珪和彦及牡丹時方北趨薊門情見乎辭舊年京國賞春濃千朶曾開共一叢好事祗今歸北圃知音誰與醉東風臨觴笑我官程逺賦物輸君句法工却笑燕城花更晩直應趁得馬家紅郝俣應制状元紅仙苑竒葩别曉叢緋衣香拂御爐風巧移傾國無雙艶應費司花第一功天上異㤙深雨露世間凡卉謾鉛紅情知不逐春歸去常在君王顧盻中劉仲尹西溪牡丹為雲為雨定成虚醉臉籠嬌試粉初舉國春風避姚魏換胎天質到黄徐百年金谷憑闌袖三月揚州載酒車我欲禪居浄餘習湖灘枕石㸔㳺魚党懐英應制粉紅雙頭牡丹卿雲分瑞兩嫣然鏡裏妝成穀雨天曉日倚闌閒妬艶春風拾翠偶駢肩水南水北何曾見桃葉桃根夲自仙夢想沉香亭北檻畧修花譜記芳妍春意應嫌芍藥遲一枝分秀伴雙蕤並肩翠袖初酣酒對鏡紅妝欲鬭竒上苑風烟工獻巧中天雨露夲無私更㸔散作人間瑞萬里黄雲麥兩岐趙秉文五月牡丹應制好事天工養露芽陽和趁及六龍車天香䕶日迎朱輦國色留春待翠華榖雨曾霑青帝澤熏風又捲赤城霞金盤薦瑞休嗟晩猶是人間第一花元好問紫牡丹金粉輕黏蝶翅勻丹砂濃抹鶴翎新儘饒姚魏知名早未放徐黄下筆親映日定應珠有淚凌波長恐襪生塵如何借得司花手偏與人間作好春天上真妃玊鏡臺醉中遺下紫霞杯已從香國偏薰染更怕花神巧翦裁微度麝熏時約畧驚移鸞影却低回洗妝正要春風句寄謝詩人莫浪來元吴澄次韻楊司業牡丹誰是舊時姚魏家喜從官舎得竒葩風前月下妖嬈態天上人間富貴花化魄他年鎖子骨㸃唇何䖏箭頭砂後庭玉樹聞􅁔曲羞殺陳宫說麗華公詩態度靄祥雲綺語天香一樣新楮葉雕鎪空費力楊花輕薄不勝春老成此日名園主俊乂同時上國賔樂事賞心涵造化撥根未遜洛中人袁桷單臺牡丹暖風吹雨佐花開送我灤陽第四回内院賜曾傳側帶江南畫不數重臺迴黄抱紫傳真訣嫓白抽青陋小才自是妖紅居第一他年折桂莫驚猜虞集謝吴宗師送牡丹輕風紫陌少塵沙忽見金盤送好花雲氣自隨仙掌動天香不許世人誇青春有態當窓近白髪多情插帽斜最愛尚書才思别觧吟蝴蝶出東家貢師㤗吴景文居牡丹韶光天遣屬君家猶是東京第一花金鼎夜寒團絳雪錦機春暖簇紅霞倚風忽作纒頭舞避日還将便面遮遮莫䦨干同醉倚却憐孤客髩先華李孝光牡丹富貴風流㧞䒭倫百花低首拜芳塵畫欄繡幄圍紅玊雲錦霞裳蹋翠裀天上有香􅀎葢世國中無色可為鄰名花也自難培植合費天公萬斛春胡天㳺牡丹相逢盡道㸔花歸慙媿尋芳獨後時北海已傾新醸酒東風猶鏁半開枝掃空紅紫真無敵㸔到雲仍未可知但願倚闌人不老為公長賦謫仙詩吴志淳和李别駕賞牡丹絳羅宻幄䕶風沙莫遣牛酥汙落花蝶夢不知春已暮鶴翎還似暖生霞詩呈金字懐仙客手印紅脂出内家獨羨沉香李供奉清平一曲度韶華明錢洪賞牡丹國色天香映畫堂荼䕷芍藥避芬芳日熏絳幄春酣酒露洗金盤曉試妝三月繁華傾洛下千年紅艶怨沉香㸔花判泥花神醉莫惹春愁㸃髩霜張淮牡丹緑雲堆裏露精神依約如羞認未真開落後天皆有數品題先漢却無人金鈴送響多驚鳥翠幄圍嬌不受塵何䖏托根偏得地年年獨讓魏家春一捻殘脂暗有神至今猩血印來真蓮清誤得稱君子梅瘦虚曾化美人六曲䦨前凝倦態五紋茵上委芳塵若為得有韓湘術四序常逢富貴春紛紛畫史筆通神誰與花王寫得眞臨水似窺捐珮女倚風如畫墮樓人芙蓉只合稱凡品芍藥端教接後塵興慶池東誰更賞冷風凄雨不禁春深深著色淺浮神恍惚麻姑舊日真似爾衒嬌寜有敵如儂鍾愛恐無人條風吹破當三月榖雨過來又一塵如此名花如此景可容孤負玊缸春誰道元輿賦有神個中風味語難真半庭遲日情熏骨四座香風曖襲人枝弱不勝霞朶重葉疎難蔽露房塵浩歌日日宜歡賞積玊如山莫買春碧池光裏巧傳神上下相輝一様真黠蟻根頭行識路狂蜂葉底去隨人飄來不冷臙脂雪落盡猶香錦繡塵更把清平舊時調翻成一闋沁園春百味狂香三昧神就中誰解獨知真開臨玊女窺窓䖏賞許金貂換酒人鶴頂映來猶尚色馬蹄踏去易為塵徧凭十二闌干曲一曲䦨干一曲春司花未省是何神不合教渠盡領真方半吐時偏惬意到全開日便愁人紅雲冷惨枝間露緑霧香流葉底塵一曲山香莫輕舞臨軒方欲賞長春回文華浮月夜静飛神妙出天工畫奪真斜葉趁風揺翅蝶艶姿嫌酒病心人霞翻麗質晴烘日露浥微香暖涴塵家世古稱應獨魏花飄未盡占芳春吴寛吏部後園牡丹嫣然國色眼中來紅玉分明簇一堆最愛倚欄如欲語縁知舉酒特先開洛中舊譜頭須接吴下新居手自栽若向花間求匹配揚州瓊樹是仙材東園送白牡丹故園兩嵗夢鞓紅鳳尾花新百種空錦幄未能如富室瓦盆亦足慰衰翁一枝争賣金錢滿三朶齊開玊盞同獨恨春深無暇賞暮歸吹落又狂風王世貞佛頭青百寳欄前百艶明虢家眉淡轉輕盈狂蜂採去初疑葉么鳳藏來祗辨聲自是色香堪絶世不煩紅粉也傾城江南新様誇天水調笑春風倍有情原申時行小園初植牡丹結亭垂就忽放一花時逼長至新除藥圃結亭臺傾國竒葩忽自開霜後著花還傲菊春前破萼􅈕輸梅韶華豈為三冬借陽氣真從九地迴敢謂青皇私緑野名園桃李暗相猜增董其昌牡丹名園占領艶陽多未以沉㝠廢嘯􅁔坐竹興仍修禊後㸔花愁奈送春何窓前散綺揺書帶臺畔凝香亂鉢羅莫向花叢問姚魏年來蝶夢不曾過原馬氏牡丹翠霧紅雲䕶短墻豪華端稱作花王洛陽宫裏楊妃醉吴國臺前西子妝芳露淡勻腮粉膩暖風輕度口脂香開時亦自知珍重静鎮東風白晝長御定佩文齋廣羣芳譜卷三十三
