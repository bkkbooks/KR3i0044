顇困塵沙他年爛熳如西蜀我欲從君㸔綺霞見市上有賣海棠者悵然有感連年蹤跡滯江鄉長憶吾廬萬海棠想得春來增絶麗無因歸去賞芬芳偶然擔上逢人賣猶記尊前為爾狂何日故園修舊好賸燒銀燭照紅妝陸游海棠誰道名花獨故宫東城盛麗足争雄横陳錦幛闌干外盡吸紅雲酒盞中貪㸔不辭持夜燭倚狂直欲擅春風拾遺舊詠悲零落瘦損腰圍擬未工夜宴賞海棠醉書便便癡腹夲來寛不是天涯强作歡燕子歸來新社雨海棠開後却春寒醉誇落紙詩千首歌費纒頭錦百端深院不聞傳夜漏忽驚蠟淚已堆盤懐成都海棠碧雞坊裏海棠時彌月兼旬醉不知馬上難尋前夢境樽前誰記舊歌辭目窮落日横千嶂膓斷春光把一枝說與故人應不信茶􅃄禪榻鬂成絲原楊萬里垂絲海棠垂絲别得一風光誰道全輸蜀海棠風攪玊皇紅世界日烘青帝紫衣裳懶無氣力仍春醉睡起精神欲曉妝舉似老夫新句子㸔渠桃李敢承當增楊萬里海棠二首小園不到負今晨晩喚嬌紅伴老身落日争明那肯暮艶妝一出更無春樹間露坐㸔揺影酒底花光併入唇銀燭不燒渠不睡梢頭恰恰挂氷輪競艶嬌紅最是他教人嫌少不嫌多初酣曉日紅千滴晩笑東風澹一渦自是花中無國色非闗格外占春窠開時慳與渠儂醉却恨飄零可若何徐儉海棠子美無詩到海棠酒邉游戲畧平章日烘不睡却成睡風暖無香亦自香花事一畨勞應接春光強半被分張速来窠上尋徐老同醉花前作楚狂方岳海棠盛開而雨閉門十日雨淋漓洗盡紅香了未知纔一霽晴齊睡去㡬何人見半開時世無解語玉條脫春欲負予金屈巵自是晦明天不定非干工部欠渠詩金蔡松年黄海棠清隂不歎晚晴芳縹緲緗雲翠袖長萼綠江花輸帶葉醉紅蜀艶恨無香南州氣味連三月東晉風流共一觴老眼寒來易愁絶温柔乞與醉中鄉梁持勝海棠野杏山桃委路塵芳菲都屬錦城春只縁造物偏留意任使無香亦可人粉白漫誇宫様巧臙脂難染睡痕新沉香亭子勾欄畔消得君王比太真元牟巘和劉朔齋海棠人物當今第一流以花為屋玉為舟曉妝未許搴帷㸔夜醉何妨秉燭遊錦里宣華思舊夢杭州定慧起新愁何如歸伴徐公飲稳結一巢花上頭王惲海棠桃李無光分落英海棠姿色占春榮雲鬟綠擁妝初罷醉臉紅匀睡未醒任使無香真可意故教千葉更多情光風流轉都無㡬莫惜沙頭倒玉瓶張昱鄰園海棠自家池館乆荒凉却過鄰園㸔海棠日色未嫣紅錦被露華猶濕紫羅囊掌中飛燕還能舞夢裏朝雲自有香銀燭莫辭深夜照㡬多佳麗負春光顧瑛絳雪亭秋日海棠花怪底海棠能狡獪今年當暑著花鮮露黏粉蝶生珠汗日炙猩紅上紫綿夢斷馬嵬春信逺神遊金谷晩妝妍獨憐向嵗題詩者不見燒燈花樹前明楊基祁陽道中見海棠桂陽江口望祁陽疉疉􅃄雲入𣺌茫髙樹綠隂千嶂濕野棠疎雨一籬香縦無春在猶回首况有鵑啼合斷膓惆悵東湖堤上栁暖風輕絮正悠揚原吴國倫海棠仙署名花海國移半開風雨倍含姿紅妝向客寒猶膩翠幔留春艶不支欹側漫同妃子醉婆娑觧乞沈郎詩梁園多少青陽景妒煞君家赤玊枝張祥鳶海棠花朝曽與故人期夜敞柴闗遲所思小閣憶君同倚處曲欄憐我獨凭時望中落日青絲騎夢裏東風瓊樹枝可是海棠如有待春分猶自著花遲御定佩文齋廣羣芳譜卷三十五
