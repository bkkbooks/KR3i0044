body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷三十九花譜杜鵑増本草杜鵑花一名紅躑躅一名山石榴一名映山紅一名山躑躅處處山谷有之高者四五尺低者一二尺春生苗葉淺綠色枝少而花繁一枝數萼二月始開花如羊躑躅而蔕如石榴花有紅者紫者五出者千葉者小兒食其花味酸無毒湧幢小品杜鵑花以二三月杜鵑鳴時開有二種其一先敷葉後著花者色丹如血其一先著花後敷葉者色差淡人多結縛為盤盂翔鳳之狀嘉泰志云近時又謂先敷葉後著花者為石巖以别之然前人但謂之紅躑躅不知石巖之名起于何時今江南在在皆稱石巖學圃餘疏花之紅者曰杜鵑葉細花小色鮮瓣密者曰石巖草花譜杜鵑花出蜀中者佳謂之川鵑花内十數層色紅甚出四明者花可二三層色淡雲南志杜鵑有五色雙瓣者永昌蒙化多至二十餘種彚考増續仙傳鶴林寺在潤州有杜鵑花高丈餘毎至春月爛漫僧相傳云貞元中有僧自天台移栽之其後有殷七七字文祥周寶舊識之及移鎮浙西營飾其花院鎻閉時或窺見有二女子共游林下俗傳花神也寶一日謂七七曰鶴林之花天下竒絶嘗聞能作非時花今重九將近能開此花以副此日乎七七乃前一日往鶴林焉中夜女子來謂七七曰妾為上帝所命司此花今與道者開之然此花不久歸閬苑矣于是女子瞥然不見及九日爛漫如春寶驚異遊賞累日俄不見其後兵火焚寺樹失根株信歸閬苑矣平泉草木記已未嵗得稽山之四時杜鵑容齋隨筆物以希見者為珍不必異種也潤州鶴林寺杜鵑乃今映山紅又名紅躑躅在江東彌山亘野殆與榛莽相似而鶴林之花至以為外國僧鉢盂中所移上帝命玉女下司之已踰百年終歸閬苑是不特土俗罕見雖神仙亦不識也王建宮詞云大儀前日暖房來囑向昭陽乞藥栽勑賜一窠紅躑躅謝恩未了奏花開其重如此則宫禁中亦鮮之三桞軒雜識杜鵑為仙客花經杜鵑八品二命躑躅七品三命閩部疏閩中大都氣暖春花皆先時放方二月下旬已見躑躅越中雜記五泄多穠花異草紅白青綠燦爛如錦映山紅有高七八尺者與他山絶異草花譜映山紅若生滿山頂其年豐稔人競採之黄山志雲外峯上有杜鵑花繞峯而生集藻五言古詩増宋梅堯臣九月十八日山中見杜鵑花復開山中泉壑暖幽木寒更華春鳥各噤口遊子未還家云誰未及還對此重興嗟何必因啼血顔色勝曙霞七言古詩増唐元稹紫躑躅紫躑躅滅紫櫳裙倚山腹文君新寡乍歸來羞怨春風不能哭我從相識便相憐但是花叢不廻目去年春别湘水頭今年夏見青山曲迢迢逺在青山上山高水濶難容足願為朝日早相暾願作輕風暗相觸紫躑躅我向通川爾幽獨可憐今夜宿青山何年却向青山宿山花漸暗月漸明月照空山滿山綠山空月午夜無人何處知我顔如玉白居易山石榴寄元九山石榴一名山躑躅一名杜鵑花杜鵑啼時花撲撲九江三月杜鵑來一聲催得一枝開江城上佐閒無事山下斸得㕔前栽爛漫一欄十八樹根株有數花無數千房萬葉一時新嫩紫殷紅鮮麴塵淚痕裛損臙脂臉翦刀裁破紅綃巾謫仙初墮愁在世姹女新嫁嬌泥春日射血珠將滴地風翻燄火欲燒人閒折兩枝持在手細㸔不似人間有花中此物是西施芙蓉芍藥皆嫫母竒芳絶艶别者誰通州遷客元拾遺拾遺初貶江陵去去時正值青春暮商山秦嶺愁殺人山石榴花紅夾路題詩報我何所云若云色似石榴裙當時叢畔唯思我今日欄前只憶君憶君不見坐銷落日西風起紅紛紛五言律詩増唐孟郊酬鄭毗躑躅詠不似人手致豈闗地勢偏孤光裊餘翠獨影舞多妍迸火燒閒地紅星墮逺天忽驚物表物嘉客為留連方干杜鵑花未問移栽日先愁落地時疎中從間葉密處莫燒枝郢客教誰探胡蜂見自知周廻兩三歩常有醉鄉期成彥雄杜鵑花杜鵑花與鳥怨艶兩何賒疑是口中血滴成枝上花一聲寒食夜數朶野僧家謝豹出不出日遲遲又斜七言律詩増唐白居易喜山石榴花開忠州州裏今日花廬山山頭去年樹已憐根損斬新栽還喜花開依舊數赤玉何人少琴軫紅纈誰家合羅袴但知爛漫恣情開莫怕南賔桃李妬題山石榴花一叢千朶壓欄干翦碎紅綃却作團風嫋舞腰香不盡露消妝臉淚新乾薔薇帶刺攀應懶菡蓞生泥翫亦難爭及此花簷户下任人採弄盡人㸔玉泉寺南三里澗下多深紅躑躅繁艶殊常感惜題詩以示遊者玉泉南澗花竒怪不似花叢似火堆今日多情唯我到毎年無故為誰開寧辭辛苦行三里更與留連飲兩杯猶有一般辜負事不將歌舞管絃來李咸用題僧院杜鵑花若比衆芳應有在難同上品是中春牡丹為性疎南國朱槿操心不滿旬留得却緣真達者見來寧作獨醒人鶴林太盛今空地莫放枝條出四隣宋真山民杜鵑花愁鎖巴雲往事空只將遺恨寄芳叢歸心千古終難白啼血萬山都是紅枝帶翠烟深夜月魂飛錦水舊東風至今染出懐鄉恨長掛行人望眼中七言小律増唐白居易題孤山寺山石榴花山榴花似結紅巾容艶新妍占斷春色相故闗行道地香塵擬觸坐禪人瞿曇弟子君知否恐是天魔女化身五言排律増唐白居易山石榴花曄曄復煌煌花中無比方艶夭宜小院條短稱低廊本是山頭物今為砌下芳千叢相向背萬朶互低昂照灼連朱檻玲瓏映粉墻風來添意態日出助晶光漸綻燕支萼猶含琴軫房離披亂翦綵斑駁未勻妝絳熖燈千炷紅裙妓一行此時逢國色何處覓天香恐合栽金闕思將獻玉皇好差青鳥使封作百花王五言絶句増唐曹松寒食日題杜鵑花一朶復一朶併開寒食時誰家不禁火總在此花枝七言絶句御製詠杜鵑花賜高士竒石巖如火本天台秀質丹心日月催移根禁苑清詩句朱夏山林惜茂才増唐李白宣城見杜鵑花蜀國曽聞子規鳥宣城還見杜鵑花一呌一廻腸一斷三春三月憶三巴張籍寄李渤五度溪頭躑躅紅嵩陽寺裏講時鐘春山處處行應好一月㸔花到幾峰白居易戲問山石榴小樹山榴近砌栽半含紅萼帶花來爭知司馬夫人妬移到庭前便不開杜牧山石榴似火山榴映小山繁中能薄艶中閒一朶佳人玉釵上祗疑燒却翠雲鬟雍陶歎靈鷲寺山石榴水蝶巖蜂俱不知露桃凝艶數千枝山深春晩無人賞即是杜鵑催落時吴融送杜鵑花春紅始謝又秋紅息國亡來入楚宫應是蜀寃啼不盡更憑顔色訴西風韓偓淨興寺杜鵑花一園紅艶醉坡陀自地連梢簇蒨羅蜀魄未歸長滴血祗應偏滴此叢多宋劉敞杜鵑花嫩紅輕紫仙姿貴合是山中寂寞開九陌風塵肯相顧可憐空使下山來蘇軾趙昌躑躅楓林翠壁楚江邊躑躅千層不忍㸔開卷便知歸客路劔南樵叟為施丹楊萬里杜鵑花二首泣露啼紅作麽生開時偏值杜鵑聲杜鵑口血能多少恐是征人滴淚成何須名苑㸔春風一路山花不負儂日日錦江呈錦様清溪倒照映山紅趙成徳白杜鵑花三首雲樹重重和淚冷故宫遺廟有知音秦吳萬里皆芳草染到山花恨最深春山未有杜鵑啼花發杜鵑知不知寄語催歸儘哀怨莫將啼血汚仙姿冰肌玉骨擅無雙不與山花鬭艶妆欲染啼紅寃杜宇爭如傅粉伴何郎楊巽齋杜鵑花鮮紅滴滴映霞明盡是寃禽血染成羈客有家歸未得對花無語兩含情易寓言杜鵑花輕翦梢頭薄薄羅子規湔血恨難磨園林莫道香飛盡嫩綠枝頭不用多僧北澗杜鵑花露凝丹臉粲芳肌不御鉛華亦自竒强學海棠春睡足如何學得未醒時元郯韶李雲山畫杜鵑花金井西頭萼綠仙霞裾風帔影翩翩隴西才子多清思漫把春雲染杜鵑明張獻翼杜鵑花花花葉葉正含芳麗景朝朝夜夜長何事江南春去盡子規聲裏駐年光詩散句増宋張俞夏園無雜英灼灼山榴開落日杜鵑苦花仍萎蒼苔唐韓愈三月崧少歩躑躅紅千層李白杜鵑花開春已䦨歸向陵陽釣魚晩李紳澗底紅花奪火然揺風有毒愁行客韓愈前年嶺隅鄉思發躑躅成山開不算山榴躑躅少意思照耀黄紫徒為叢司空圖莫怪行人頻悵望杜鵑不是故鄉花宋蘇軾當時只道鶴林仙能遣秋光放杜鵑南漪杜鵑天下無披香殿上紅􅉊毺王十朋造物私我小園林此花大勝金腰帶徐似道牧童出捲烏鹽角越女歸簪謝豹花陳錦山一聲杜宇啼春風明朝緋挂千山叢吳仲孚梨花痩盡東風嬾商畧平生到杜鵑唐白居易杜鵑花落杜鵑啼晩葉尚開紅躑躅韋荘杜鵑花發鷓鴣啼宋㓂凖杜鵑啼處花成血王安石躑躅江頭挽醉紅躑躅萬樹紅相圍詞増宋高觀國浪淘沙啼魄一天涯怨入芳華可憐零血染烟霞記得西風秋露冷曽凂司花明月滿窓紗倦客思家故宫春事與愁賒冉冉斷魂招不得翠冷紅斜辛棄疾定風波百紫千紅過了春杜鵑聲苦不堪聞却解啼教春小住風雨空山招得海棠魂一似蜀宫當日女無數猩猩血染赭羅巾畢竟花開誰作主記取大都花屬惜花人别錄増花鏡杜鵑性最喜隂而惡肥毎早以河水澆置之樹隂之下則葉青翠可觀亦有黄白二色者春鵑亦有長丈餘者須種以山黄泥澆以羊糞水方茂若用映山紅接者花不甚佳切忌糞水宜豆汁澆附錄黄杜鵑増本草黄杜鵑一名黄躑躅一名老虎花一名驚羊花一名羊不食草一名玉枝一名羊躑躅一名閙羊花陶𢎞景曰羊食其葉躑躅而死故名閙當作惱惱亂也韓保昇曰小樹高二尺葉似桃葉花黄似𤓰花蘇頌曰所在有之春生苗似鹿葱葉似紅花莖高三四尺夏開花似凌霄花山石榴輩正黄色李時珍曰其花五出蕊瓣皆黄氣味皆惡有毒附錄山枇杷増李紳文集駱谷多山枇杷毒能殺人其花明艶與杜鵑花相似樵者識之集藻七言古詩原唐元稹山枇杷山枇杷花似牡丹殷潑血往年乘傳過青山正值山花好時節壓枝凝艶已全開映葉香苞纔半裂𦂳摶紅袖欲支頤慢解絳嚢初破結金線叢飄繁蕊亂珊瑚朶重纖莖折因風旋落裙片飛帶日斜㸔目精熱亞水依巖半傾側籠雲隠霧多愁絶綠珠語盡身欲投漢武眼穿神漸滅穠姿秀色人皆愛怨媚羞容我偏别説向閒人人不聼曽向樂天時一説昨來谷口先相問及到山前已消歇左降通州十日遲又與幽花一年别山枇杷爾託深山何太拙天高萬里㸔不精帝在九重聲不徹園中杏樹良人醉陌上桞枝年少折因爾幽芳喻昔賢磻溪冷坐權門咽七言律詩増唐白居易山枇杷深山老去惜年華况對東谿野枇杷火樹風來翻絳燄瓊枝日出曬紅紗回㸔桃李都無色映得芙蓉不是花爭奈結根深石底無因移得到人家七言絶句増唐白居易山枇杷花二首萬重青嶂蜀門口一樹紅花山頂頭春盡憶家歸未得低紅如解替君愁葉如裙色碧綃淺花似芙蓉紅粉輕若使此花兼解語推囚御史定違程木槿原木槿一名椵一名櫬白曰椵紅曰櫬一名日及一名王蒸爾雅云椵木槿櫬木槿註云别二名也或呼日及亦曰王蒸一名蕣本作舜取僅榮一瞬之義一名朝菌見莊子一名朱槿一名赤槿一名朝開暮落花木如李高五六尺多岐枝色微白可種可揷葉繁密如桑葉光而厚末尖而有椏齒花小而艶有深紅粉紅白色單葉千葉之殊五月始開朝開暮落結實輕虚大如指頂秋深自裂其中子如榆莢馬兠鈴之仁嫩葉可茹作飲代茶味平滑無毒潤燥活血除濕熱小兒忌弄令病瘧俗名瘧子花増酉陽雜俎那提槿花紫色兩重葉外重葉卷心心中抽莖高寸餘葉端分五瓣如蔕瓣中紫蕊莖上黄葉彚考原詩鄭風有女同車顔如舜華有女同行顔如舜英傳英猶華也禮記月令仲夏之月木槿榮増宋書樂志雨水方降木槿榮莊子朝菌不知晦朔註朝菌亦名日及淮南子莊生貴支離悲木槿原抱朴子木槿楊桞斷殖之更生倒之亦生横之亦生生之易者莫過斯木然埋之既淺又未得久乍刻乍剝或揺或拔雖壅以高壌浸以春澤猶不脱於枯瘁者以其根荄不固不暇吐其萌芽津液不得遂結其生氣也増晉宮閣名華林園有木槿三株外國圖君子之國多木槿之花人民食之去瑯琊三萬里原羯鼓錄汝陽王璡寧王子也姿容妍美秀出藩邸嘗戴砑絹㡌打曲上自摘紅槿花一朶置於㡌上笡處二物皆極滑久之方安遂奏舞山香一曲而花不墜落上大喜笑賜璡金器一厨因誇曰花奴資質明瑩肌髪光細非人間人必神仙謫墮也埤雅詩曰顔如舜華又曰顔如舜英顔如舜華則言不可與久也顔如舜英則愈不可與久矣葢榮而不實者謂之英増爾雅翼木槿仲夏夜隂而榮月令取之以為候詩云有女同車顔如舜華舜乃華之甚茂者又枝葉相當有同車之象花經木槿九品一命三桞軒雜識姚氏殘語以木槿為時客今改為莊客集藻序原晉潘尼朝菌賦序朝菌者葢朝華而暮落世謂之木槿或謂之日及詩人以為舜華莊周以為朝菌其物向晨而結建明而布見陽而盛終日而殞不亦異乎何名之多也稽含朝生暮落樹賦序草木春榮秋悴此樹朝生暮落増蘇彥舜華詩序其為花也色甚鮮麗迎晨而榮日中則衰至夕而零荘周載朝菌不知晦朔况此朝不及夕者乎苟映采於一朝燿穎於當時焉識夭夀之所在哉余既翫其葩而歎其榮不終日成公綏日及賦序日及者華甚鮮茂榮於仲夏訖於孟秋頌増宋顏延之赤槿頌日御北至夏徳南宣玉蒸榮心氣動上𤣥華繅間物受色朱天是謂珍樹含艶丹間賦原晉盧諶朝華賦覽庭隅之嘉木慕朝華之可玩俯浸潤之泉壤仰晞影於雲漢増羊徽木槿賦有木槿之初榮藻衆林而間色在青春而資氣逮中夏以呈飾挹宵露以舒采暉神景而吸赩夏侯湛朝華賦咨神樹之修異實積陽之純精蜿潛根以誕節據川壤以擢莖皎日升而朝華𤣥景逝而夕零逮明晨而繁沸若靜夜之衆星長莖攢起柔條列布擢靈柯於時雨滋逸采於豐露灼煌煌以煒煒獨崇朝而達暮於是茂樹蒼蒼纖枝翩翩潛光玉朗綠葉翠鮮傅咸舜華賦覽中唐之竒樹稟冲粹之至清應青春而敷櫱逮朱夏而誕英布夭夭之纖枝發灼灼之殊榮紅葩紫蔕翠葉素莖含暉吐曜爛若列星朝陽照灼以舒暉逸藻采粲而光明罄天壌而莫儷何菱華之足榮原陳江總南越木槿賦日及多名㽔賔肇生東方記乎夕死郭璞贊以朝榮潘文體其夏盛稽賦閔其秋零此則京華之麗木非干越之舜英南中羣草衆花之寶雅什未名騷人失藻雨來翠潤露歇紅燥疊萼疑擎低莖若倒朝霞映日殊未妍珊瑚照水定非鮮千葉芙蓉詎相似百枝燈花復羞然暫欲寄根對滄海大願移華厠綺錢井上桃蟲難可雜庭中桂蠧豈見憐乃為歌曰啼眉梁冀婦紅妝蕩子家若持花並笑宜笑不勝花趙女垂金珥燕姬挿寶珈誰知紅槿艶無因寄狹邪徒令萬里道攀折自咨嗟文散句増漢東方朔與公孫𢎞借車馬書木槿夕死朝榮士亦不長貧也晉傅𤣥朝華賦序朝華麗木也五言古詩増唐李白詠槿一首園花笑芳年池草艶春色猶不如槿花嬋娟玉階側芬榮何夭促零落在瞬息豈若瓊樹枝終嵗長翕赩白居易秋槿風露颯已冷天色亦黄昬中庭有槿花榮落同一晨秋開已寂寞夕隕何紛紜正憐少顔色復歎不逡廵感此因念彼懐哉聊一陳男兒老富貴女子晩㛰姻頭白始得志色衰方事人後時不獲已安得如青春元劉詵白木槿數花出籬楥耿耿照夜闌月寒客獨起恍若山雪殘天風泠然來坐久身欲翰夢酌瓊宫漿薦以雕玉盤羣妃霓裳冷夭姣環青鸞世言朝暮落耐此十日㸔始知潔白姿頗勝施朱丹大鈞縱萬物爾本羞蕙蘭同類偶自别亦復得賞歎朂哉勵貞節相期在嵗寒舒頔白槿花素質不自媚開花向秋前澹然超羣芳不與春爭妍涼夜弄清影縞衣照嬋娟佳人分寂寞零落祗自憐鮮鮮碧雲樹皎皎萬玉懸朝開暮還落物理乃自然嗤彼擁腫木徒爾全天年木槿愛花朝朝開憐花暮即落顔色雖可人賦質無乃薄亭亭映清池風動亦綽約彷彿芙蓉花依稀木芍藥炎天衆芳彫而此獨凌鑠慰目聊娱情蒼松在巖壑明吳寛槿南方徧短籬木槿毎當路北地少為貴翻編短籬䕶要知一物耳貴賤以地故夏末蕊纍纍生意含曉露花開亦可觀别種更相妬獨憐一夕間顔色已非素蕊多固應爾此理真自悟不見萱草花開落只朝暮五言律詩原唐楊凌詠槿花羣玉開雙槿丹榮對絳紗含烟疑出火隔雨怪舒霞向晩爭辭蕊迎朝鬭發花非闗後桃李為欲繼年華増羊士諤玩槿花何乃詩人興妍詞屬舜華風流感異代窈窕比同車凝艶垂清露驚秋隔絳紗蟬鳴復蟲思惆悵竹隂斜李商隱槿花二首燕體傷風力雞香積露文殷鮮一相雜啼笑兩難分月裏寧無姊雲中亦有君三清與仙島何事亦離羣珠館熏然久玉房梳掃餘燒蘭才作燭襞錦不成書本以亭亭逺翻嫌脉脉疎廻頭問殘照殘照更空虚朱槿花蓮後紅何患梅先白莫誇纔飛建章火又落赤城霞不卷錦歩障未登油壁車日西相對罷休澣向天涯勇多侵露去恨有礙燈還嗅自微微白㸔成沓沓殷坐忘疑物外歸去有簾間君問傷春句千詞不可刪宋楊億槿花宿霧初披縠晨霞暫照梁千金輕換笑七駕未成章塵暗神妃襪衣殘侍史香深情傳寶瑟終古怨清湘錢惟演槿花綺霞初結處珠露未晞時寶樹寧三尺華燈更九枝亭亭方自喜黯黯却成悲欲作非烟散猶憐反照遲劉隲槿花虢國妝初罷高唐夢始廻霓裳猶未解繡被已成堆赤帝宫簾捲華陽洞户開神仙有良㑹清唱在瑶臺謝翺槿樹白犬吠行人西風杵臼新洗香澄宿水曝髪向秋隣野草依溝盡宫花入帽頻人家小門徑憐爾獨相親七言律詩原宋楊萬里木槿夾路疎籬錦作堆朝開暮落復朝開抽苞粔籹輕拖糝近蔕臙脂釅抹顋占破半年猶道少何曽一日不芳來花中却是渠長命換舊添新底用催明陸深白木槿曾聞鄭女詠同車更愛丰標澹有華欲傍莓苔横野渡似將鉛粉鬭朝霞品題從此添高價物色仍煩築短沙漫道春來李能白秋風一種玉無瑕五言絶句増唐劉庭琦詠木槿樹題武進文明府㕔物情良可見人事不勝悲莫恃朝榮好君㸔暮落時原楊凌槿花綠樹競扶疎紅姿相照灼不學桃李花亂向春風落増崔道融槿花槿花不見夕一日一回新東風吹桃李須到明年春白居易和微之歎槿花朝榮殊可惜暮落實堪嗟若向花中比猶應勝眼花元劉詵白木槿潔比何郎白浄如寶兒憨秋風竹籬逕日暮道人菴明張以寧木槿花朝昬㸔開落一笑小窓中别種蟠桃子千年一度紅七言絶句増唐戎昱題槿花自用金錢買槿栽二年方始得花開鮮紅未許佳人見蝴蝶爭知早到來紅槿花花自深紅葉麴塵不將桃李共爭春今日驚秋自憐客折來持贈少年人原白居易白槿花秋蕣晩英無艶色何因栽種在人家使君自别羅敷面爭解囘頭愛白花李商隱槿花風露凄凄秋景繁可憐榮落任朝昬未央宫裏三千女但保紅顔莫保恩宋張俞木槿朝菌一生迷晦朔靈蓂千嵗換春秋如何槿艶無終日獨倚䦨干為爾羞張登甲子雖推小雪天刺桐猶緑槿花然陽和長飬無時歇却是炎州雨露偏陸壑野槿扶疎當縳籬山深不用掩山扉客來踏破松梢月鶴向主人頭上飛僧紹隆朱槿朱槿移栽釋梵中老僧非是愛花紅朝開暮落闗何事祗要人知色是空詩散句増宋楊萬里曉艶欲開孫武陣晩風爭墜綠珠樓來如急電無因駐去似驚鴻不可收唐楊炯綠琪千嵗樹黄槿四時花韓偓揷槿作籓籬叢生覆小池宋劉筠紫霧函燈檠彤霞逼綺寮原黄庭堅吾聞調羮槿異味及枌榆唐竇鞏籬外涓涓澗水流槿花半照夕陽愁宋秦觀槿籬䕶藥紅遮徑竹筧通泉白徧邨増晉阮籍木槿耀采華唐上官儀槿散凌風縟凌敬日槿落青跗于鵠槿籬生白花原白居易蕭條槿花風槿枝無宿花増杜牧槿墮初開艶皮日休籬疎從綠槿宋王安石薄槿臙脂染范成大槿花紅未落槿心傾穠露元龔璛花繞槿籬秋唐王維山中習靜觀朝槿原白居易槿花一日自為榮増張籍紅槿開當宴客亭蟬聲滿樹槿花疎金張庭玉蝴蝶穿花木槿開别錄原扞揷二三月間新芽初發時截作叚長一二尺如揷木芙蓉法即活若欲揷籬須一連揷去若少住手便不相接取用湖南北多植為籬障花與枝兩用皮及根甘平滑無毒作飲服令人能睡花作湯飲治風皮治瘡癬川中者色紅氣厚力優尤效扶桑増本草扶桑一名佛桑一名朱槿一名赤槿一名日及東海日出處有扶桑樹此花光艶照日其葉如桑因以比之後人訛為佛桑乃木槿别種故日及諸名亦與之同原高四五尺產南方枝葉婆娑葉深綠色光而厚微濇如桑花有紅黄白三色紅者尤貴呼為朱槿葉及花性甘平無毒増稽含草木狀扶桑出南凉郡花深紅色五出大如蜀葵重敷柔澤有蕊一條長如花葉上綴金屑日光所爍疑若熖生一叢之上日開數百朶朝開暮落自五月始至中冬乃歇揷樹即活清漳志佛桑比朱槿頗耐久葢二種也臨漳志花似槿四時常開婦人簪帶之集藻七言律詩原宋蔡襄耕園驛佛桑花詩并序明道中予為漳州軍事判官晩秋嘗至州西耕園驛驛庭有佛桑數十株開花繁盛念其寒月窮山方自媚好乃作耕園驛佛桑花詩一首既而乘桴東下又作溪行一首慶厯七年予使本路明年夏四月自汀來漳復至是驛花尚仍舊追感昔游因紀前事併載舊篇龕於西壁云溪館初寒似早春寒花相倚媚行人可憐萬木凋零盡獨見繁枝爛漫新清艶夜沾雲表露幽香時過轍中塵名園不肯爭顔色灼灼夭桃野水濵使軺迢遞到天涯候館遷延感嵗華白髪却攀臨砌樹青條猶放過墻花悲來惟有金城桞醉後曽乘海客槎欲問昔游無處所晩烟生水日沉沙明桑悦詠佛桑南無麗卉鬭猩紅浄土門傳到此中欲供如來嫌色重謂藏宣聖訝枝同葉深似有慈雲擁蕊坼偏驚慧日烘賞玩何妨三宿戀只愁燒破太虚空詩散句原宋蔡襄野人家家熖燒紅有扶桑蘇軾熖熖燒空紅佛桑増楊萬里佛桑解吐四時艶别錄増荔支譜荔支以鹽梅滷浸佛桑花為紅漿漬之曝乾色紅而甘酸合驩原合驩一名合昬一名夜合一名青棠或作裳增本草合驩一名萌葛一名烏賴樹金光明經名為尸利灑樹俗呼馬纓花原處處有之枝甚柔弱葉纖密圓而綠似槐而小相對生至暮而合枝葉互相交結風來輙改不相牽綴五月開花色如蘸暈線下半白上半肉紅散垂如絲至秋而實作莢子極薄細花中異品也根側分條藝之子亦可種主安和五臟利心志令人驩樂于若瀛曰夜合生宛朐及荆山花俯垂有姿鬚端紫㸃手拈之即脱才破萼香氣襲人金陵盆植者無根而花花後不堪留即留亦無能再花彚考増崔豹古今注欲蠲人之忿則贈之青棠青棠一名合懽合懽則忘忿合歡樹之階庭使人不忿稽康種之舍前原晉宫閣名晉華林園有合歡四株女紅餘志杜羔妻趙氏毎端午取夜合花置枕中羔稍不樂輙取少許入酒令婢送飲便覺歡然増槁簡贅筆閑花野草亦隨時輕重唐人詩中多言夜合石竹如遼陽春盡無消息夜合花前日又西山花揷寶髻石竹繡羅衣是也至今唐畫宫殿池臺多作二花自然有富貴氣今人絶不知重矣花經夜合七品三命缾花譜夜合四品六命集藻文賦散句原晉嵇康養生論合歡蠲忿萱草忘憂宋陸倕刻漏銘合昬暮捲蓂莢朝開五言古詩原晉楊芳合歡詩南鄰有竒樹乘春挺素華豐翹被長條綠葉蔽朱柯因風吐徽音芳氣入紫霞我心羡此木願徙著余家夕得游其下朝得弄其葩爾根深且固余宅淺且洿移植良無期歎息將如何宋韓琦夜合俗人之愛花重色不重香吾今得真賞似矯時之常所愛夜合花清芬踰衆芳葉葉自相對開斂隨隂陽不慙厯草滋獨擅堯階祥得此合歡名憂忿誠可忘茸茸紅白姿百和從風颺沉水燎庭檻薰陸紛纓裳彌月固未歇况兹夏景長凡目不我貴馥烈徒自將仲尼失滅明史遷疑子房以貎不以行舉世同悲傷予欲先馨徳羣艶孰可方直饒妖牡丹須遜花中王増元吳師道合歡木合歡愛嘉名矧復知昬旦淮土產特多葱蘢䕃溝岸離離青葉解冉冉紅茸散静和宿露卷動與微風戀物意豈悦人和樂自堪玩蹇予寡所諧觸事多忿悁亦擬學稽生植根向庭畔五言律詩原唐白居易對晩開夜合花贈皇甫郎中移晩校一月花遲過半年紅開杪秋日翠合欲昬天白露滴未死凉風吹更鮮後時誰肯顧惟我與君憐元稹夜合綺樹滿朝陽融融有露光雨多疑濯錦風散似分妝葉密烟蒙火枝低繡拂墻更憐當暑見留詠日偏長増元稹感小株夜合纖榦未盈把高條纔過眉不禁風苦動偏受露先萎不分秋同盡深嗟小便衰傷心落殘葉猶識合昬期七言律詩増元袁桷題玉堂合歡花初開一樹高花冠玉堂知時舒卷欲雲翔馬嘶不動游纓聳雉尾初開翠扇張舊渇未須餐玉屑嘉名端合紀青裳雲窓霧冷文書靜留取餘清散逺香五言小律増唐李頎題合歡開花復卷葉艶眼又驚心蝶遶西枝露風披東榦隂黄衫漂細蕊時拂女郎砧五言絶句原明于若瀛夜合花一莖兩三花低垂泫朝露開簾弄幽色時有香風度七言絶句増唐白居易東墻夜合樹去秋為風雨所摧今年花時悵然有感碧荑紅縷今何在風雨飄將去不回惆悵去年墻下地今春惟有薺花開原宋韓琦中書東㕔夜合合昬枝老拂簷牙紅白開成蘸暈花最是清香合蠲忿累旬風送入窓紗増明李東陽夜合花二絶夜合枝頭别有春坐含風露入清晨任他明月能相照斂盡芳心不向人袂掩芳塵欲避春羞將月夕換風晨向來花品㸔應熟不待開時已可人陸師道題夜合花夜合花開香滿庭翠枝拂檻玉娉婷詩人賸有高陽興相對泠然宿酒醒原王野逺遊消息斷天涯燕子空能到妾家春色不知人獨自庭前開遍合歡花陳繼儒梅雨晴時處處蛙尋常家釀不須賒老親醉後盤餐散瓶裏初開夜合花詩散句原唐杜甫合歡尚知時鴛鴦不獨宿増宋蘇軾可憐夜合花青枝散紅茸原明申時行隙地不栽無果樹中庭那有合歡花王誼碧紗籠裏銀缸影照見深宫夜合花古詩消忿贈合歡増梁沈約合歡葉暮卷宋韓琦合歡香影拂西齋别錄増詩話心胸填錯取合歡掌大一枝水煑服之故後山詩云探嚢一試合昬湯普濟方髪落不生合歡木灰二合墻衣五合鉄精一合水萍末二合生油調塗百一選方撲損折骨取合歡皮去粗皮炒黑色四兩芥菜子炒一兩為末毎服二錢温酒卧時服以滓傅之接骨甚妙子母秘錄小兒撮口夜合花枝濃煎汁拭口中并洗之附錄有情樹原花史遜頓國有樹晝開夜合名曰夜合亦云有情樹若各自種則無花木芙蓉原木芙蓉一名木蓮一名華木一名拒霜花一名杹木一名地芙蓉本草云此花艶如荷花故有芙蓉木蓮之名八九月始開故名拒霜俗呼為杹皮樹相如賦謂之華木註云皮可為索也有數種惟大紅千瓣白千瓣半白半桃紅千瓣醉芙蓉朝白午桃紅晩大紅者佳甚黄色者種貴難得又有四靣花轉觀花紅白相間八九月間次第開謝深淺敷榮最耐寒而不落不結子總之此花清姿雅質獨殿衆芳秋江寂寞不怨東風可稱俟命之君子矣欲染别色以水調靛紙蘸花蕊上仍裹其尖開花碧色五色皆可染種池塘邊暎水益妍氣味辛平無毒清肺凉血散熱解毒消腫毒惡瘡排膿止痛有殊効俗傳葉能爛獺毛彚考増平泉草木記己未嵗得㑹稽之百葉木芙蓉又得鍾陵之同心木芙蓉清異錄錢俶以弟信鎮湖州後圃芙蓉枝上穿一黄玉玦枝梢交雜不知從何而穿也信截榦取玦以獻人謂真仙來遊留此以驚世耳益部方物畧記添色拒霜花生彭漢蜀州花常多葉始開白色明日稍紅又明日則若桃花然原歸田錄石曼卿去世後其故人有見之者云我今為仙主芙蓉城欲呼故人共游不諾忿然騎一素驢而去石林燕語慶厯中有朝士將曉赴朝見羙女三十餘人靚妝麗服兩兩並馬而行觀文丁度按轡於其後朝士驚曰丁素儉約何姬之衆耶有一人最後行朝士問曰觀文將宅眷何往曰非也諸女御迎芙蓉館主耳俄聞丁卒増東坡集九月十日君猷置酒秋香亭有拒霜獨向君猷開坐客喜笑以為非使君莫可當此故作詩詞以記之原成都記孟後主於成都城上遍種芙蓉毎至秋四十里如錦繡高下相照因名錦城以花染繒為帳名芙蓉帳増二老堂詩話唐人裒劉禹錫嘉話云進士陳標詠黄蜀葵詩云能共牡丹爭幾許得人憎處只緣多予嘗語客花多固取輕於人何憎嫌之有因論木芙蓉全似芍藥但患無兩平字易牡丹字欲改此句作得人輕處只緣多衆以為善且謂移芍藥二字在句首則可矣予以失全句為疑或云本草芍藥一名餘容因綴一絶云花如人靣映秋波拒傲清霜色更和能共餘容爭幾許得人輕處只緣多白樂天和錢學士白牡丹詩云唐昌玉蕊花攀玩衆所爭折來比顔色一樹如瑶瓊彼因稀見貴此以多為輕固知輕字為勝吳興園林記端肅和王家後臨顔魯公池依城曲折亂植拒霜號芙蓉城見聞後錄李太白詩云昔作芙蓉花今為斷腸草按陶𢎞景仙方注云斷腸草不可食其花美好名芙蓉錦里新聞錦城因錦江之水濯錦而名人又謂蜀王衍命蜀城遍栽芙蓉花得名亦新花經芙蓉九品一命缾花譜芙蓉六品四命蜀都雜抄蜀城謂之芙蓉城傳自孟氏今城上聞栽有數株兩嵗著花予適閲視見之皆淺紅一色花亦凋瘵殊不若吳中之爛然數色也泉南雜志芙蓉有産於山者余廨後手揷一枝未半載扶疎出墻名曰木芙蓉花最繁盛不下數百大如甌其色有朝紅暮白者此則惟粉紅一色耳弇山園記蓮池東西可七丈許南北半之長夏醉而臨池不茗而醒游客毎徙倚其地輙詫謂予此何必減王衞軍芙蓉池也余謝不敢當而㑹吾鄉有從廢圃下得一石刻曰芙蓉渚是開元古𨽻或云范石湖家物因樹之池右池從南得小溝宛轉與後溪合傍皆紅白木芙蓉環之蓋亦不偶云原學圃餘疏芙蓉特宜水際種類不同先後開故當雜植之大紅最貴最先開次淺紅常種也白最後開有曰三醉者一日間凡三換色亦竒客言曽見有黄者芙蓉入江西俱成大樹人從樓上觀吾地如榛荆狀故須三年一斫却花史温州江心寺文丞相祠中有木芙蓉盛開其本高二丈幹圍四尺花幾萬餘暢茂散漫芙蓉有二種出於水者謂之草芙蓉出於陸者謂之木芙蓉又名木蓮樂天詩曰水蓮開盡木蓮開謂此邛州有弄色木芙蓉一日白二日淺紅三日黄四日深紅比落色紫人號為文官花許智老為長沙有木芙蓉二株可庇畝餘一日盛開賔客盈溢坐中有王子懐者言花朶不踰萬數若過之願受罰智老許之子懐因指所攜妓賈三英胡錦鼎文帔以酬直智老乃命厮僕羣採凡一萬三千餘朶子懐褫帔納主人而遁集藻頌増梁江淹木蓮頌迸采泉壑騰光淵丘緗麗碧巘紅艶桂洲山人結侣靈俗共遊時至不採為子淹留贊増宋宋祁添色拒霜花贊自濃而淡花之常態今顧反之亦不之怪五言古詩増唐桞宗元湘岸移木芙蓉植龍興精舍有羙不自蔽安能守孤根盈盈湘西岸秋至風露繁麗影别寒水穠芳委前軒芰荷諒難雜反此生高原巽公院芙蓉亭新亭俯朱檻嘉木開芙蓉清香晨風逺縟彩寒露濃瀟灑出人世低昂多異容嘗聞色空喻造物誰為工流連秋月晏迢遞來山鐘原宋歐陽修拒霜花芳菲能幾時顔色如自愛鮮鮮弄霜曉裊裊含風態蕙蘭殞秋香桃李媚春醉時節雖不同盛衰終一致莫笑黄菊花籬根守憔悴増司馬光未開木芙蓉木末采芙蓉騷人歌所無何言霜花艶不與水芝殊香苞麝臍結茂葉桐隂敷豈若龜巢類飄零老五湖蘇軾王伯􅆒所藏趙昌芙蓉清飈已拂林積水漸收潦溪邊野芙蓉花木相媚好坐㸔池蓮盡獨伴霜菊槁幽姿强一笑暮景廹摧倒凄凉似貧女嫁晩驚衰早誰寫少年容樵人劔南老陳與義拒霜拒霜花已吐吾宇不凄凉天地雖肅殺草木有芬芳道人宴坐處侍女古時妝濃露濕丹臉西風吹綠裳范成大羔羊齋小池兩涘木芙蓉盛開有懐故園洞户掩秋深畫橋横晩静嫋嫋芙蓉風池光弄花影懐我白鷗邊錦障繚千頃明湖拍岸平紅綠染天鏡釣船無畔岸收拾入簿領牆籓束院落寒窘令人癭楊萬里山寺觀木芙蓉初約山寺遊端為怪竒石􅄼知雲水鄉化作錦繡國入門徑深深過眼秋寂寂隔竹小亭明稠紅滿疎碧山僧引幽踐絶巘恣往陟三歩綺為障十歩霞作壁四圍盡芙蓉山僧所手植秋英例臞淡此花獨腴澤却憶補外時朝士作祖席是間萬株梅冷射千崖白舊遊不可尋雪枝半榛棘金党懐英西湖芙蓉林飈振危柯野露委荒蔓孤芳為誰妍一笑聊自獻明妝炫朝麗醉態羞晩困脉脉懐春情悄悄驚秋怨豈無桃李媒不嫁惜嬋媛悠哉清霜暮共抱蘭菊恨元朱徳潤題芙蓉花屏夾城遺芳栽揺落及千年芙蓉發靚妝絶艶秋江邊臨風拂羅幃紅裳擁三千素抱拒霜質亭亭赤城仙曽攜一枝去生綃記餘妍五言律詩原唐韓愈木芙蓉新開寒露叢逺比水間紅艶色寧相妬嘉名偶自同採江官渡晩搴木古祠空須得勤來㸔無令便逐風増宋梅堯臣詠王宗説園黄木芙蓉水中兼木末相擬有嘉花玉蕊坼蒸粟金房落晩霞渉江從楚女采菊聼陶家事與離騷異吾將搴以誇陶弼木芙蓉孤芳託寒木一曉一番新春色不為主天香勤動人丹楓見流落黄菊坐因循莫訝偏相愛衰遲似我身原明申時行芙蓉沜羣芳揺落後秋色在林塘艶態偏臨水幽姿獨拒霜漢臯霞作佩湘曲錦為裳白首滄江上相㸔醉夕陽七言律詩増唐劉兼詠木芙蓉素靈失律詐風流强把芳菲半載偷是葉葳㽔霜照夜此花爛漫火燒秋謝蓮色淡爭堪種陶菊香濃亦合羞誰道金風能肅物因何厚薄不相侔宋徐鉉題殷舍人宅木芙蓉憐君庭下木芙蓉嫋嫋纖枝淡淡紅曉吐芳心零宿露晩揺嬌影媚清風似含情態悲秋雨暗减馨香借菊叢黙飲數杯應未稱不知歌管與誰同范成大攜家石湖賞拒霜水上晴雲綵蝀横許多蜂蝶趁船行漁樵引入新花塢兒女扶登小錦城艶粉發妝朝日麗濕紅浮影晩波清誰知揺落霜林畔一叚韶光畫不成原楊萬里拒霜花木蕖何似水芙蕖同個聲名各自都風露商量借膏沐臙脂深淺入肌膚喚回春色秋光裏饒得紅妝翠葢無字曰拒霜渾不惡却愁霜重要人扶方岳木芙蓉綠裳丹臉水仙容不謂佳名偶自同一朶方酣初日色千枝應發去年叢莫驚墜露添新紫更待微霜暈淺紅却笑牡丹猶淺俗但將濃艶醉春風増元蒲道源紅芙蓉豐肌弱骨與秋宜宿酒酣來不自持豈為嚴霜成槁質要憑初日發妍姿燕姬入畫猶嫌陋蜀錦團窠未足竒獨對芳叢寄幽興子高真是遇仙時轉觀芙蓉露凉風冷見温柔誰挽春還九月秋午醉未醒全帶艶晨妝初罷尚含羞未甘白紵居寒素也著緋衣入品流若信牡丹南靣貴此花應自合封侯明袁凱浦上木芙蓉盛開約黄鶴山人共觀江浦芙蓉色正深青霜㸃染更沉沉孤舟向日曽親見短褐於今欲逺尋已擬攜尊同野客不妨展席對沙禽明年臂痛應全愈移遍東園野木隂原申時行小園㸔芙蓉西園試詠鄴中詞正及朱華冒綠池綽約偏多臨水態逍遥獨抱拒霜姿吴姬曉鏡臨妝早楚客霞裳集錦遲最愛秋江留晩色儘教白首醉瓊巵五言絶句原宋宋祁木芙蓉皓露侵緗蕊尖風獵絳英繁霜不可拒切弗受空名江南江北樹秋至僅成叢向晩誰爭艶酡顔淺作紅増梅堯臣拒霜木杪芙蓉花開非紅艶早常畏晩霜寒朱華競衰草原石延年木芙蓉深淺霜前後應同舊渚紅羣芳坐衰歇聊自舞秋風朱子木芙蓉紅芳曉露濃綠樹秋風冷共喜巧囘春不妨閑弄影楊萬里木芙蓉染露金風裏宜霜玉水濵莫嫌開最晩元自不爭春七言絶句増唐李嘉祐秋朝木芙蓉水面芙蓉秋已衰繁條倒是著花時平明露滴垂紅臉似有朝開暮落悲白居易木芙蓉下招客飲晩凉思飲兩三杯召得江頭酒客來莫怕秋無伴醉物水蓮花盡木蓮開黄滔木芙蓉三首黄鳥啼烟二月朝若教開即牡丹饒天嫌青帝恩光盛留與秋風雪寂寥却假青腰女翦成綠羅嚢綻綵霞呈誰憐不及黄花菊只遇陶潛便得名須到露寒方有態為經霜裛稍無香移根若在秦宫裏多少佳人泣曉妝原宋歐陽修木芙蓉種處雪消春始動開時霜落雁初過誰栽金菊叢相近織出新番蜀錦窠増司馬光和秉國芙蓉五章清曉霜華漫自濃獨憑佳日養殘紅勸君秉燭須勤賞閶闔難禁一夜風北方稀見誠竒物筆界輕絲指捻紅楚蜀可憐人不賞牆根屋角數無窮平昔低頭避桃李英華今發嵗云秋盛時已過渾如我醉舞狂歌揷滿頭後時獨立誠難事猶賴堦庭有菊叢綽約霜前弄姿態非如羣木萬林紅但見渉江求水際豈知緣木采霜中微紅未肯全衰歇正似􅋳顔鶴髪翁原王安石木芙蓉水邊無數木芙蓉露染臙脂色未濃正似羙人初醉著强擡青鏡欲妝慵拒霜花落盡羣花獨自芳紅英渾欲拒嚴霜開元天子千秋節戚里人家承露嚢増文同芙蓉蜀國芙蓉名二色重陽前後始盈枝畫調粉筆分班處繡引金針閑刺時原蘇軾和述古拒霜花千林掃作一番黄只有芙蓉獨自芳喚作拒霜知未稱細思却是最宜霜増張耒芙蓉今年古寺摘芙蓉憔悴真成澤畔翁聊把一枝閒照水明年何處對霜紅范成大窓前木芙蓉辛苦孤花破小寒花心應似客心酸更憑青女留連得未必愁紅怨綠㸔題羔羊齋外木芙蓉慵妝酣酒夕陽濃洗盡霜痕㸔綺叢綠地團花紅錦障不知庭院有西風陸游拒霜滿庭黄葉舞西風天地方收肅殺功何事獨蒙青女力牆頭催放數苞紅原劉珵木芙蓉翠幄臨流結絳嚢多情常伴菊花芳誰憐冷落清秋後能把柔姿獨拒霜劉克莊芙蓉二絶湖上秋風起櫂歌萬株映桞更依荷老來不作繁華夢一樹池邊已覺多池上秋開一兩叢未妨冷淡伴詩翁而今縱有㸔花意不愛深紅愛淺紅増劉圻父木芙蓉曉妝如玉暮如霞濃淡分秋染此花終日獨酲干底事晩知爛醉是生涯陳經國木芙蓉紫茸排萼露微紅不比春花對日烘冷落半秋誰是侣可憐妖艶嫁西風原鄭域木芙蓉妖紅弄色絢池臺不作匆匆一夜開若遇春時占春榜牡丹未必作花魁増元虞集木芙蓉九月襄王宴渚宫霓旍翠羽度雲中滿汀山雨衣裳濕宋玉愁多賦未工宋褧長安驛道中觀芙蓉寄嘲伯循玉溪橋畔淡朝霞照景紅妝泫露華説似分司才御史水邉花勝驛中花盧琦題錢舜舉木芙蓉紅妝初映酒杯酣斜倚西風轉不堪霜後池塘秋欲盡令人惆悵憶江南明徐賁雨後慰池上芙蓉池上新晴偶獨過芙蓉寂寞照寒波相㸔莫厭秋情薄若在春風怨更多原謝遷芙蓉傍水施朱意自真幽棲非是避芳塵已呼晩菊為兄弟更為秋江作主人増吳孔嘉木芙蓉半臨秋水照新妝澹靜丰神冷艶裳堪與菊英稱晩節愛他含雨拒清霜僧文湛題畫芙蓉江邉誰種木芙蓉寂寞芳姿照水紅莫怪秋來更多怨年年不得見春風詩散句原宋歐陽修湖上野芙蓉含思秋脉脉娟娟如靜女不肯傍阡陌詩人杳未來幽艶冷難宅李覯甚疑牡丹叢但病皮骨老不宜入水㸔只可隔水眺増唐韓愈四隅芙蓉樹擢艶皆猗猗原宋宋祁麴塵輕抱蕊宫纈巧装叢梅堯臣託根地雖卑凌霜花亦茂増文同何人露秋纈不管著秋霜許棐霜樹不知醜葉與花爭紅明沈周秋風吹冷艶晨露濕新妝原唐高幨芙蓉生在秋江上不向東風怨未開増宋宋祁情知邊地風霜惡不肯將花剩占秋文同落晩自憐窺露沼忍寒誰念倚霜籬秦觀芙蓉露濃紅壓枝幽禽感秋花畔啼黄庭堅霜花留得紅妝面酌盡齋中竹葉瓶客興不辜春竹葉年華全屬拒霜叢原韓駒舊時憶在延真館玉作芙蓉院院明増楊萬里亂翦素羅妝一樹畧將敗朶㸃臙脂徐似道一帶拒霜三十里又催簫鼔作秋聲張俞待敎滿地妖紅落獨與秋風作主人原戴復古就中一種芙蓉别只染鵝黄學道妝翁卷芙蓉不分秋蕭索鬭拆繁紅滿樹頭詞増葉夢得卜算子曉雨洗新妝艶艶驚衰眼不趁東風取次開待得清霜晩曲港照囘流影亂微波淺作態低昂好自持江濶烟村逺原范成大菩薩蠻冰明玉潤天然色凄凉拚作西風客不肯嫁東風殷勤霜露中綠窓梳洗晩笑把琉璃盞斜日上妝臺酒紅和困來高觀國菩薩蠻紅雲半壓秋波急艶妝泣露嬌啼色佳夢入仙城風流石曼卿宫袍呼醉醒休捲西風錦明日粉香殘六橋烟水寒晏殊少年遊霜華滿樹蘭凋蕙慘秋艶入芙蓉臙脂嫩臉黄金輕蕊猶自怨春風前歡往事當歌對酒無限到心中更凭朱檻憶芳容腸斷一枝紅増蘇軾定風波兩兩輕紅半暈腮依依獨為使君囘若道使君無此意何為雙花不向别人開但看低昂烟雨裏不已勸君休訴十分杯更問尊前狂副使來嵗花開時節與誰來别錄原種植十月花謝後截老條長尺許卧置窖内無風處覆以乾壤及土候來春有萌芽時先以硬棒打洞入糞及河泥漿水灌滿然後揷入上露寸餘遮以爛草即活當年即花若不先打洞傷其皮即死製用皮柔靱連條風戾之至春漚于池以糾綆索甚能勝水多種之嵗可髠用御定佩文齋廣羣芳譜卷三十九
