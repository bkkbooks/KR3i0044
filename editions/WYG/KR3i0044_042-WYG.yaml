body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷四十花譜巖桂按牡桂箘桂入藥巖桂不入藥原合為一載入藥譜今分巖桂入花譜牡桂箘桂别見藥譜原巖桂似箘桂而稍異葉有有鋸齒如枇杷葉而麤澀者有無鋸齒如梔子葉而光潔者叢生巖嶺間謂之巖桂俗呼為木犀紋理如犀故名木犀其花有白者名銀桂黄者名金桂紅者名丹桂有秋花者春花者四季花者逐月花者花四出或重臺徑二三分瓣小而圓皮薄而不辣不堪入藥花可入茶酒浸鹽蜜作香茶及面藥澤髪之類犬竺桂即今閩粤浙中山桂台州天竺最多生子如蓮實或二或三離離下垂天竺僧稱為月桂其花時常不絶枝頭葉底依稀數㸃亦異種也彚考増晉書陸機傳論蘭植中塗必無經時之翠桂生幽壑終保彌年之丹原唐書五行志垂拱四年三月雨桂子於台州旬餘乃止増唐書后妃傳太宗賢妃徐恵八嵗自曉屬文父孝徳嘗試使擬離騷為小山篇曰仰幽巖而流盻撫桂枝以凝想將千齡兮此遇荃何為兮獨往孝徳大驚知不可掩于是所論著遂盛傳太宗聞之召為才人山海經招揺之山其上多桂臯塗之山上多桂木吕氏春秋物之羙者招揺之桂禮斗威儀君乘金而王其政訟平芳桂常生原天地運度經泰山北有桂樹七十株天神青腰玉女三千人守之其實赤如橘人食之一年仙官迎之常有九色飛鳳寶光珠雀鳴集於此三輔黄圖甘泉宫南有昆明池中有靈波殿以桂為柱風來自香洞㝠記有逺飛雞夕則還依人曉則絶飛四海嘗銜桂實歸於南土増西京雜記上林苑􅀈桂十株拾遺記岱輿山北有玉梁十丈駕𤣥流之上傍有丹桂紫桂白桂皆直上百尋可為舟航謂之文桂之舟王母與燕昭王遊於燧林之下説炎帝鑽火之術取綠桂之膏燃以照夜忽有飛蛾銜火狀如丹雀來拂於桂膏之上宣帝元鳳二年於琳池之南起桂臺以望逺氣東引太液之水有一連理桂樹上枝跨于渠水下枝隔岸而南生與上枝同一株金樓子桂花不實玉巵不當原廬山記山有三石梁廣不盈尺俯盻杳然無底吴猛將弟子過此梁見老翁坐桂樹下以玉杯盛甘露與猛増平泉山居草木記有剡溪之紅桂鍾山之月桂曲阿之山桂永嘉之紫桂剡中之真紅桂酉陽雜俎舊言月中有桂有蟾蜍故異書言月桂髙五百丈下有一人常斫之樹創隨合人姓吳名剛西河人學仙有過謫令伐樹釋氏書言須彌山南面有閻扶樹月過樹影入月中或言月中蟾桂地影也空處水影也此語差近國史補南中有山洞一泉往往有桂葉流出好事者因目為流桂泉原本草拾遺江東諸處每至四五月後嘗於衢路拾得桂子大如貍豆破之辛香故老相傳是月中下也北方獨無者非月路也増南部烟花記陳主為張麗華造桂宫於光昭殿後作圓門如月障以水晶後庭設素粉罘罳庭中空洞無他物惟植一株桂樹樹下置藥杵臼使麗華恒馴一白兎時獨歩於中謂之月宫清異錄韓恭叟離合巖桂二字為嚴山圭木南部新書杭州靈隠山多桂寺僧曰月中種也至今中秋夜往往子墜寺僧亦曽拾得招賢寺僧植桂香紫可愛郡守白公號紫陽花原東坡詩注天竺昔有梵僧云此山自天竺鷲山飛來八月十五夜嘗有桂子落羅湖野錄黄公魯直館黄龍山從晦堂和尚遊晦堂因語次舉孔子謂弟子以我為隠乎吾無隠乎爾請公詮釋而至於再晦堂不然其説公怒形於色沈黙久之時當暑退凉生秋香滿院晦堂乃曰聞木犀香乎公曰聞晦堂曰吾無隠乎爾公欣然領解増彥周詩話先伯父熙寧九年四月二十七日夜夢至一處牓曰清香館東邉有别院東壁有詩牌云題冀公功徳院山東李白其詩曰秋風吹桂子只在此山中待得春風起還應生桂叢桂叢日已滿清香何時斷只為愛清香故號清香館伯父自作記夢一篇書之甚詳老學庵筆記張子韶對策有桂子飄香之語趙明誠妻李氏嘲之曰露花倒影桞三變桂子飄香張九成原話腴明之象山士子史本有木犀忽變紅色異香因接本獻闕下髙廟雅愛之畫為扇面仍製詩以賜從臣云月宫移向日宫栽引得輕紅入面來好向烟霄承雨露丹心一㸃為君開又云秋入幽巖桂影團香深粟粟照林丹應隨王母瑶池宴染得朝霞下廣寒自是四方爭傳其本嵗接數百史氏由此昌焉一卉之微香色稍異能動至尊入品題且昌其主可以人而不如木乎増學齋呫嗶花中惟巖桂四出余謂土之生物其數皆五故草木花皆五惟桂乃月中之木居西方地四乃西方金之成數故花四出而金色且開於秋云此桂之在離騷以喻君也先師魏鶴山巖桂詩云虎頭㸃㸃開金粟犀首纍纍佩印章自注云顧虎頭善畫金粟佛公孫衍佩五國相印真善借喻而體物矣余亦嘗賦巖桂云四出花中異三開格外芳名髙評月品韻勝霸秋香或者頗許之以為弗可移賦他花木也澄懐錄韓熙載云對花焚香木犀宜龍腦三餘贅筆曾端伯以巖桂為仙友張敏叔以桂為仙客客座新聞衡神祠其徑綿亘四十餘里夾道皆合抱松桂相間連雲蔽日人行空翠中而秋來香聞十里計其數云一萬七千株真神幻佳境弇山園記芙蓉池之西北度有小橋崇阜若馬脊皆植桂凡數十百樹曰金粟嶺原學圃餘疏木犀吾地為盛天香無比然須種早黄毬子二種不惟早黄七月中開毬子花密為勝即香亦馥郁異常丹桂香减矣以色稍存之餘皆勿植又有一種四季開花而結實者此真桂也閩中最多常以春中盛開吾地亦間有之宜植以備一種花之四季開者蘭桂而外有月桂長春菊月桂閩種為佳増閩部疏延平多桂亦能多瘴福南四郡桂皆四季花而反盛於冬凡桂四季者有子唐詩所云桂子月中落此真桂也江南桂八九月盛開無子此木犀也湧幢小品蘭溪髙子章先世封樹之地兩桂當庭取東坡何氏讀書堂語扁曰香入雲杜端父為之賦曰縁曽分月種故發入雲香子章曰似矣請更散語端父再屬長篇云山麓有庭存古意不種凡花惟種桂苔封蘚剝迸鱗皴雪勁霜頑聳蒼翠栽培豈解一日成愛惜至今尤不易來人不必問典刑對此儼然前軰是樹前翁仲不可求樹下子孫能幾世子孫立竹滿庭除前人於此見心事近年喬木幾家存是中林壑何隂翳前人種樹愛讀書種時已喻書中義後人讀書念前人對樹類能歌蔽芾八月九月秋風髙金丹變化乘飄飄朝元顧祖歸寒殿仙香直入干雲霄老兎癡蟾開鼻孔奏徹虛皇應得寵虛皇錫賚萬瓊瑶賞君愛䕶月中種紹定間舒岳祥讀書館中中秋月色皎然聞瓦上聲如撒雹甚怪之其祖拙齋啓門視之乃曰此月中桂子也我嘗得之天台山中呼童子就西庭中拾得二升大如豫章子無皮色白如玉有紋如雀卵其中有仁嚼之作芝麻氣味嚢之雜菊花作枕清芬襲人其收拾不盡散落甎隙者旬輙出樹子葉柔長經冬猶秀尋徙植盆中久之失其所在瓶史浴木犀宜清慧兒木犀以芙蓉為婢七曲山記文昌殿後為桂香殿丹粟秋飄一邑盡染彌月猶馥原杭州府志月桂峯在武林山宋僧遵式序云天聖辛卯秋八月十五夜月有濃華雲無纖翳天降靈實其繁如雨其大如豆其圓如珠其色有白者黄者黑者殻如芡實味辛識者曰此月中桂子好事者播種林下一種即活張君房為錢塘令夜宿月輪山寺僧報曰桂子下塔遽起望之紛如烟露囘旋成穂散墜如牽牛子黄白相間咀之無味花史無瑕嘗著素裳折桂明年開花潔白如玉女伴折取簪髻號無瑕玉花集藻騷原漢淮南小山招隠士桂樹叢生兮山之幽偃蹇連蜷兮枝相繚山氣巃嵸兮石嵯峨谿谷嶄巖兮水層波猨狖羣嘯兮虎豹嘷攀援桂枝兮聊淹留王孫遊兮不歸春草生兮萋萋嵗暮兮不自聊蟪蛄鳴兮啾啾坱兮軋山曲􅔍心淹留兮洞荒忽罔兮沕憭兮栗虎豹岤叢薄深林兮人上慄􅋂崯碕礒兮碅磳磈硊樹輪相糺兮林木茇骪青莎雜樹兮薠草靃靡白鹿麏麚兮或騰㦯倚狀貎崯崯兮峩峩淒淒兮漇漇獮猴兮熊羆慕類兮以悲攀援桂枝兮聊淹留虎豹鬬兮熊羆咆禽獸駭兮亡其曹王孫兮歸來山中兮不可以久留賦増唐崔琪桂林一枝賦倬彼衆木者其桂林一枝淮南擢秀月上標竒光雨露之新沐拂香風以徐吹故能使顥氣凌空孤隂耀質心既丹而不二花又白而純一凝霜隕而色鮮嚴景凋而葉密若然者固將與大椿而爭長豈徒挺小山而間出至如孫𢎞已落郄詵未第沮塵色與灰心然粒玉而燼桂孰謂連卷銜半死之質特達承再生之恵淹留君之庭芳郁君之砌惜矣哉向使便辭仙客永棄幽林委根不用之境滅影空山之隂又焉能擅崑玉之髙價吐嵗寒之宿心彼徒見零落焦梧再斲恩深于既往殊不知摧殘朽桂一枝重遇于當今趙蕃月中桂樹賦圓月如霜有仙桂兮宛在中央映澄澈之素彩逗葳㽔之冷光杳杳低枝拂孤輪而挺秀依依密樹侵滿魄而含芳觀其皓爾方凝翛然不改隨升沉而自若貫盈缺而長在夐冪冪而臨空杳萋萋而發彩同蟾蜍之片影似濯瑶池異珊瑚之幽叢徒生滄海埃􅅽初歇關山正秋空泬寥而逾浄色冉弱而彌幽謂扇花薄如珪玷浮望玉露之初垂遥疑滴瀝聼金風之乍起逺若颼飀皎皎孤懸亭亭相向纔分杳靄之質微辨輪囷之狀諒攀援而莫及寧欲淹留歎音塵之未期空勞曠望嘉其竦本無地分輝有餘轉低影於穹碧擢幽姿于顥初訝姮娥之繪成文逾靃靡並秦鏡之照出勢自蕭疎斯所以亘雲路委天衢弱質中植纖條外扶亂彩時揺起飛飛之驚鵲澄波靡隔掩歴歴之髙榆是故邈彼輕霄呈兹永夕紛敷逺瑩偃蹇旁射夾餘霞而暫丹經斜漢而彌白臨紫極而天香不散指北斗而仙花可摘况其逺象膧朧桂子㝠空惜迢遞而遐想况嬋娟而内融素色不彫自挺霜雪之外清隂廻互頻移霄漢之中何必詠招隠卧幽叢庶髙枝兮可折願逍遥于蟾宫楊真𢎞月中桂樹賦月滿于東桂芳其中因澄輝之皎潔見幽茂之玲瓏炫凝冷于清夜寫濃纖于碧空逺莫致之詎攀折以盈手光可鑒也覺清明之在躬夫擢本隂靈流形永夕禀玉燭之和氣潤金泥之滋液枝徘徊而若垂葉靃靡以如積同作繢于團扇想孚尹于尺璧悠悠歴歴宜乎凜秋滿虚輪而挺秀瑩白暈以含幽天邊無風孕香氣而不散草上有露泛花光而若浮異夫髙謝地靈妙融真宰籠𤣥兎以不動映素娥而如在太陽讓美收若木之餘暉列宿懐慙掩白榆而沉彩既寒暑無變亦古今不殊是知托其所終乃異顛而不扶二氣初分誰見栽生之質三光不息斯無朽蠧之虞與燃薪而殊患同瑞草之共舒事相傳于摭實勢終類于憑虛樓上含華映網軒而列耀園中委照益嘉木之蕭疎千里共瞻九霄之上冬春無清淨之景朒脁闕婆娑之狀及素秋之節信謂逢時當明徳之年何憂掩望耻片玉以齊價笑三珠之可尚彼叢生因地森挺凌霜驗植物之斯羙杳神功之可量垂䕃何方乃傳天之下界結根何處宛在月之中央又安能較其小大齊其短長冀一枝兮可得敢驤首以觀光宋楊萬里木犀花賦秋氣已末秋日已夕楊子觴客客醉欲出偶雲物之淨盡吐霽月之半璧楊子鼻觀若有觸焉澹空山之何有驚妙香之郁然急謂客曰是必有異吾與子盍小觀之行而求之無物可即也舍而不求又不能自息也天風忽來其香浩蕩楊子乃凝神而從之忽欣然而獨往葢吾履未出於柴門之裏吾身已超於廣寒之上矣水國湛湛不足以為其空明而深靚也雪宫皚皚不足以為其髙寒而迥映也玉階之前有團其隂蔚乎瑠璃之葉槭乎琴瑟之音天葩芬敷匪玉匪金細不逾粟香滿天地蓋向者之所聞乃於茲其良是摩挲玉蟾蜍而問焉亦不知其名而字之曰桂吾甚愛之欲求其裔將刈其枝以修身之玉斧瀹其根於銀河之秋水移之以歸藝我庭砌羿妃頩然而不悦曰余將白之於帝楊子聳然而寤月尚未午客亦未去顧而見木犀之始花宛其若天上之所覩笑而問客曰吾之茲遊夢邪醉邪惘然不知其處文賦散句原楚屈原九歌羙要眇兮宜修沛吾乘兮桂舟桂櫂兮蘭枻桂棟兮蘭橑結桂枝兮延佇羗愈思兮愁人援北斗兮酌桂漿辛夷車兮結桂旗逺遊嘉南州之炎徳兮麗桂樹之冬榮大招茝蘭桂樹鬱彌路只東方朔七諫登巒山而逺望兮好桂樹之冬榮飲箘若之朝露構桂木而為室増王襃九懐歩驟桂林兮超驤卷阿劉向九歎結桂樹之旖旎兮紉荃蕙與辛夷原王逸九思桂樹列兮紛敷吐紫華兮布條増晉左思吳都賦丹桂灌叢五言古詩増梁庾肩吾詠桂新叢入望苑舊幹别層城請視今移處何如月裏生周王襃詠永定寺桂樹嵗餘凋晩葉年至長新圍月輪三五映烏生八九飛原唐王績春桂問答二首問春桂桃李正芳華年光隨處滿何事獨無花春桂答春花詎能久風霜揺落時獨秀君知否増王績古意桂樹何蒼蒼秋光花更芳自言嵗寒性不知露與霜幽人重其徳徙植臨前堂連拳八九樹偃蹇二三行枝枝自相糾葉葉還相當去來雙鴻鵠棲息兩鴛鴦榮䕃誠不厚斧斤亦勿傷赤心許君時此意那可忘原李白詠桂世人種桃李皆在金張門攀折爭㨗徑及此春風暄一朝天霜下榮耀難久存安知南山桂綠葉垂芳根清隂亦可託何惜植君園増桞宗元自衡陽移桂十餘本植零陵所住精舍謫官去南裔清湘繞靈岳晨登蒹葭岸霜景霽紛濁離披得幽桂芳木欣盈握火耕困烟燼薪採久摧剝道傍且不顧岑嶺况悠邈傾筐擁故壤棲息期鸞鷟路逺清凉宫一雨悟無學南人始珍重微我誰先覺芳意不可傳丹心徒自渥李徳裕紅桂樹昔聞紅桂樹獨秀龍門側越叟移數株周人未嘗識平生愛此樹攀翫無由得君子知我心因之為羽翼豈煩嘉客譽且就清隂息來自天姥岑長疑翠嵐色芳芬世所絶偃蹇枝漸直瓊葉潤不凋珠英粲如織猶疑翡翠宿想待鵷鸞食寧止暫淹留終當更封殖白居易有木詩有木名丹桂四時香馥馥花團夜雪明葉翦春雲綠風影清似水霜枝冷如玉獨占小山幽不容凡鳥宿匠人愛芳直裁截為厦屋幹細力未成用之君自速重任雖大過直心終不曲縱非梁棟材猶勝尋常木廬山桂偃蹇月中桂結根依青天天風繞月起吹子下人間飄零委何處乃落匡廬山生為石上桂葉如翦碧鮮枝幹日長大根荄日牢堅不歸天上月空老山中年廬山去咸陽道里三四千無人為移植得入上林園不及紅花樹長栽温室前皮日休詠公齋小桂一子落天上生此青璧枝歘從山之幽斸斷雲根移勁挺隠珪質盤珊緹油姿葉彩碧髓融花狀白毫蕤稜層立翠節偃蹇樛青螭影澹雪霽後香汎風和時吾祖在月竁孤貞能見怡願老君子地不敢辭喧卑陸龜蒙和襲羙詠公齋小桂諷賦輕八植擅名方一枝才髙不滿意更自寒山移宛宛别雲態蒼蒼出塵姿烟歸助華杪雪㸃迎芳蕤青條坐可結白日如奔螭諒無􅞑翦憂即是蕭森時洛浦雖有䕃騷人聊自怡終為濟川檝豈在論髙卑宋梅堯臣和韓子華桂花莫以天下桂皆為月中物猶言月有兎野豈無狡窟空山桂花多艶色粲然發樵客不知貴奈何薪㸑屈臨軒桂山楹無惡木但有綠桂叢幽芳尚未歇飛鳥銜殘紅不見離騷人憔悴吟秋風奉和永叔得辛判官伊陽所寄山桂數本封殖之後遂成雅韻以見貺團團緑桂叢本自幽巖得恵好知不忘青葱寧改色香生蓮幕間花白萱堂側月露夜偏滋瓊枝相翕赩原歐陽修謝人寄雙桂樹子有客賞芳叢移根在幽谷為懐山中趣愛此巖下緑曉露秋暉浮清隂藥䦨曲更待繁華白邀君弄芳馥曾肇詠桂團團桂叢孤枝葉寒更媚託根庭宇間自有幽人致何必問嫦娥青雲借餘地劉子翬木犀古風化工吝幽香斑斑被花木氤氲寒巖桂髙韻葢羣馥無人盡日芳守志何幽獨士介恥求知女貞慚自鬻凄凉楚山秋樛枝吐金粟淺水映輕明微飈發含蓄樓端静忽聞馬上遥相逐踟蹰為延佇但見林巒綠缾罌誰折贈清芬閟廬屋久處不自知乍至彌鬱郁客悲芳嵗暮夢遶寒溪曲長吟小山詞古意恐難復増朱松月桂花窓前小桂叢著花無曠月月行晦朔周一再開復歇初如醉肌紅忽作絳裙色誰人相料理耿耿自開落有如貧家女信美乏風格春風木芍藥穠艶傾一國芳根雖無恙嵗晩但枯枿陸游寄題廬陵王晉輔先軰桂堂楚人記草木桂在椒蘭中我懐小山句妙絶窮化工唐人作山水亦以桂配松丹葩間綠葉錦繡相疊重不知始何時巖桂開秋風楚人所稱者委棄等蒿蓬嗚呼各有時士豈怨不逢我作桂堂詩廣子雲夢胸張孝祥桂花天心不重金富媪不復藏居然土同價散作草木芳英英園中葵一心傾太陽采采籬下菊令汝夀命康惟此木中犀更貯萬斛香雄姿傲霜雪鱗甲森青蒼三賢鼎足立正色凜相望豈比桃李徒紅紫紛披昌聊息貪者心未上君子堂嵗晩從我游窴汝兄弟行金酈權木犀菊小未堪摘荒池悴芙蕖窮秋不慰眼幽獨將焉如殷勤蕊宫子種桂庭之除乘閒㺯餘花散落荒山隅從兹雲月裔漂泊生江湖娟娟耐凍枝便與羣芳殊琉璃翦芳葆蛾黄拂仙裾唾袖花㸃碧潄金粟生膚好風一披拂九里香縈紆蘭蕙不敢友荃蓀正僮奴妄意此尤物化工異吹嘘不然九天香安得獨付渠託物寄深緼古今一三閭收攬名草木自比君子徒惟茲不挂口無乃聖不居抑夫古簡編斷絶秦火餘君㸔齊魯臣史筆逸其書惜哉不可曉臨風為嗟吁尤憐元祐前不及附歐蘇末路益可惜例進宣和初仙根豈易致百死不一甦昔遊汴離宫識此傾城姝摩挲三品石尚想狎客娱却後十五年微霜半黏鬚一枝再經眼相對憐覊孤不知苦何事玉骨乃爾癯故人憐我老尺書逺招呼要趁秋香濃共此碧玉壺遥知嬋娟客與我一笑俱明陳憲章和陶飲酒木犀冷於菊更後十日開清風吹芳香芳香襲人懐千回嚥入腹五内無一乖雖靡鸞鳳吟亦有鷦鷯棲昔者東籬飲百榼醉如泥那知此日花復與此酒諧一曲盡一杯酩酊花間迷赤脚歩明月酒盡吾當囘王寵飲錢二孔周宅桂花下嘉樹䕃團團團團露華白本自招揺山植君青霞宅不意凌寒姿占此瑶墀隙髙枝挂珠網卑條敷綺席萋萋布葉隂茸茸吐花積風飄逺近香月映盈虧魄既集佳麗人亦招隱淪客幸承金樽薦親勞玉腕摘歌曲出玲瓏舞袖隨寛窄條繁每罥釵花落常㸃額戲羽必成雙棲禽無單隻及此芳菲時荷君千金惜不醉且淹留㸔朱已成碧七言古詩増唐陳陶殿前生桂樹仙娥玉宫秋夜明桂枝拂檻參差瓊香風下天漏丁丁牛渚翠梁横淺清羽帳不眠恨吹笙棲鳥暗驚仙子落歩月鬃雲墮金雀蕙樓凉簟翠波空銀縷香寒鳳凰薄東海即為郎斟酌綺疏長懸七星杓原宋毛滂桂花歌玉階桂影秋綽約天空為捲浮雲幕嬋娟醉眠水晶殿老蟾不守餘花落蒼苔忽生霜月裔仙芬凄冷真珠萼娟娟石畔為誰妍香霧著人清入膜夜深醉月寒相就荼䕷却作傷心痩弄雲仙女淡紵衣烟裙不著鴛鴦繡眼中寒香誰同惜冷吟徑召梅花魄小蠻為洗玻瓈杯晩來秋甕蒲桃碧増謝翺後桂花引脩月仙人飯玉屑瑶鴨騰騰何處熱呉剛生愁樹合創毫飄玉斧髙枝折此時待罪扣帝庭素娥騎蟾涕淚零月中落子如雨星至今收拾無六丁元顧瑛玉山亭館分題得金粟影飛軒下瞰芙蓉渚檻外幽花月中吐天風寂寂吹古香清露冷冷濕秋圃雲梯萬丈手可攀居然夢落清虛府庭中擣藥玉兎愁樹下乘鸞素娥舞瓊楼玉殿千娉婷中有癯仙淡眉宇問我西湖舊風月何似東華軟塵土寒光倒落影娥池的皪明珠承翠羽但見山河影動揺獨有清輝照今古覺來作詩思茫然金粟霏霏下如雨明楊基宜秋軒桂宜秋軒東一株桂香葉婆娑擁寒翠秋堂夜静風滿簾時覺幽芳來拂鼻清晨曵履訪幽獨一徑青苔雙户閉離離嫩蕊罥蟲絲蓛蓛輕花落深砌麩金泫露濃更密苞粟凝珠疎復細半粒能含萬斛香一枝解奪千姝媚當年此地競攀折月户雲窓敞秋霽金尊灔泛緑色酒翠袖凉簪寶妝髻西風幾度人跡絶獨有幽花能㸃綴村荒地僻霜露繁摧折紅蘭凋紫蕙瞥然一見衆憂失不意孤懐得佳麗更深月出擬再來明日紛紛嗟滿篲陳憲章擬移木犀於上游黄雲示民澤木犀金粟散天香在秋之季廬山陽湛生期我上游莊移根千丈黄雲岡萬丈黄雲千丈山金粟花開不等閒金粟氤氲塞兩間吁嗟乎金粟丈人與爾同嵗䦨五言律詩原唐李嶠詠桂花未植蟾宫裏寧移玉殿幽枝生無限月花滿自然秋俠客條為馬仙人葉作舟願君期道術攀折可淹留増李徳裕紅桂樹欲求塵外物此樹是瑶林後素含餘絢如丹見本心妍姿無㸃辱芳意托幽深願以鮮葩色凌霜照碧潯月桂何年霜夜月桂子落寒山翠幹生巖下金英在世間幽崖空自老清漢未知還惟有凉秋夜嫦娥來暫攀山桂吾愛山中樹繁英滿目鮮臨風飄碎錦映日亂飛烟影入春渾底香凝月榭前豈知幽獨客賴此當朱絃于武陵山中桂日暖上山路鳥啼知已春忽逢幽隠樹如見獨醒人石冷開常晩風多落亦頻樵夫應不識嵗久伐為薪宋曽幾巖桂粟玉黏枝細青雲翦葉齊團團巖下桂表表木中犀江樹風蕭瑟園花氣􅃤凄濃薰不如此何以慰幽棲劉子翬巖桂凉飈振逺村寂寞度清芬山路不知處月窓時夜聞孤根寒抱石落子半飄雲袖手空延佇無才可賦君原朱子巖桂山中綠玉樹瀟灑向秋深小閣芬微度書帷氣欲侵披懐清露曉遇賞夕嵐隂珍重王孫意天涯淚滿襟亭亭巖下桂嵗晩獨芬芳葉密千層綠花開萬㸃黄天香生淨想雲影䕶仙妝誰識王孫意空吟招隠章増朱子詠巖桂露浥黄金蕊風生碧玉枝千株向揺落此樹獨華滋木末難同調籬邉不並時攀援香滿袖歎息共心期原方九功巖桂西墅絶喧􅅝秋梧葉亂飄獨憐青桂樹金粟綴柔條泛酒香偏細入詩景更饒小山風可仰招隠此逍遥増元倪瓚桂花桂花留晩色簾影淡秋光靡靡風還落菲菲夜未央玉繩低缺月金鴨罷焚香忽起故園想泠然歸夢長原明申時行詠適適圃桂林巖壑同棲處風霜獨秀時暗飄靈隠粟髙擢廣寒枝露氣侵衣袂天香撲酒巵桂叢吾自密不負小山期郭鯤溟詠桂西嶺千年桂隂森入翠微瓊枝雲外綠金粟雨中肥影落浮杯酒香飄襲客衣當年和露折曽向廣寒歸七言律詩増唐劉禹錫酬令狐相公使宅别齋初栽桂樹見懐之作清淮南岸家山樹黑水東邉第一栽影近畫梁迎曉日香隨緑酒入金杯根留本土依江潤葉起寒稜映月開早晩隂成比梧竹九霄還放綵雛來原宋蘇軾八月十七日天竺山送桂花分贈元素月缺霜濃細蕊乾此花原屬桂堂仙驚峯子落驚前夜蟾窟枝空記昔年破祴山僧憐耿介練裙溪女鬭清妍願公採擷紉幽佩莫遣孤芳老澗邉増羅從彦和延年巖桂幾樹芬芳氣欲沉枝枝若占郄家林風揺已認飄殘菊日照渾疑綴散金仙窟移來成美景東堂分去結清隂我今不願蟾宫折待到秋宵把酒吟范成大次韻王浚明詠新居木犀月窟移來有貴名一簾金碧照東榮鼻端入妙睡魔醒眼底㑹真詩句生日氣瓏璁無奈醉露華凌亂不勝清君家傾國何時見淡掃蛾眉撚夕英陸游嘉陽絶無木犀偶得一枝戲作久客紅塵不自憐眼明初見廣寒仙只饒籬菊同時出尚占紅梅一著先重露濕香幽徑曉斜陽烘蕊小窓妍何人更與蒸沉水金鴨華燈惱醉眠原楊萬里巖桂塵世何曽識桂林花仙夜入廣寒深移將天上衆香國寄在梢頭一粟金露下風髙月當户夢回酒醒客聞砧詩情惱得渾無那不為龍涎與水沉増楊萬里栽桂分得吴剛斫處林鵝兒酒色不須深系從犀首名干木𣲖列黄香字子金衣濺薔薇兼水麝韻和月杵應霜砧餘芬熏入旃檀骨從此人間有桂沉昨日訪子上不遇裴回庭砌觀木犀而歸再以七言乞