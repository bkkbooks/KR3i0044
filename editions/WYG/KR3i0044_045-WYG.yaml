body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷四十三花譜玫瑰原玫瑰名徘徊花灌生細葉多刺類薔薇莖短花亦類薔薇色淡紫青槖黄蘂瓣末白嬌艶芬馥有香有色堪入茶入酒入蜜栽宜肥土常加澆灌性好潔最忌人溺溺澆即萎燕中有黄花者稍小於紫嵩山深處有碧色者增巖栖幽事天台有白玫瑰彚考增西京雜記樂遊苑中有自生玫瑰樹䑕璞玫瑰叢有似薔薇而異其花葉稍大者時人謂之枚櫰實語訛强名也當呼為梅槐在灰部韻音回案江陵記云洪亭村下有梅槐樹嘗因梅與槐合生遂以名之今似薔薇者得非分枝條而演𦙍哉至今葉形尚處梅槐之間取此為證不乃近乎且未見枚櫰之義也直使便為玫瑰字豈百花中獨珍是耶取象於玫瑰耶瑰亦音回不音瓌其瑰字音瓌者是瓊瑰音回者是玫瑰字書亦有證也花經玫瑰七品三命瓶花譜玫瑰五品五命原學圃餘疏玫瑰非竒卉也然色媚而香甚旖旎可食可佩園林中宜多種南海諺云虵珠千枚不及玫瑰玫瑰美珠也今花中亦有玫瑰蓋貴之因以為名集藻五言律詩原唐唐彦謙玫瑰麝炷騰清燎鮫紗覆綠蒙宫妝臨曉日錦叚落東風無力春煙裏多愁暮雨中不知何事意深淺兩般紅七言律詩增唐徐夤司直廵官無諸移到玫瑰花芳菲移自越王臺最似薔薇好並栽穠艶盡憐勝綵繪嘉名誰贈作玫瑰春成錦繡風吹折天染瓊瑶日照開為報朱衣早邀客莫教零落委蒼苔原宋楊萬里紅玫瑰非關月季姓名同不與薔薇譜牒通接葉連枝千萬綠一花兩色淺深紅風流各自臙脂格雨露何私造化工别有國香收不得詩人薫入水沉中五言絶句增明陳淳玫瑰色與香同賦江鄉種亦稀鄰家走兒女錯認是薔薇詩散句增宋宋祁寒光欲衝斗迥秀難藏葉誰碎辟邪香氤氲飛作蝶明陳淳清香疑紫玊何必數薔薇唐温庭筠玫瑰拂地紅别錄原種植株傍生小條不可久存即宜截斷另植既得滋生又不妨舊叢不則大本必枯瘁夏間生嫩枝時有黒翅黄腹飛蟲名鐫花娘子以臀入枝生子三五日出小蟲黒嘴青身傷枝食葉大則又變前蟲薔薇月季亦生此蟲俱宜捉去製用採初開花去其槖蘂並白色者取純紫花瓣搗成膏白梅水浸少時順硏細布絞去濇汁加白糖再硏極勻磁器收貯任用最香甜亦可印作餅曬乾收用全花白梅水浸去濇汁蜜煎亦可食刺䕷原刺䕷灌生莖多刺葉圎細而靑花重葉狀似玫瑰而大艶麗可愛惜無香耳春時分根旁小株種之亦易活學圃餘疏有紅黄刺䕷二種絶似玫瑰而無香黄者出京師集藻五言古詩增明吳寛刺䕷荼䕷有數種同名而異字花開欲折難鋸鉤如棘刺白者榦獨長紅者香更膩種之小徑傍所恨罥衣袂插竹加編縛歩障差可類石家金谷園恐乏此佳致月季花原月季花一名長春花一名月月紅一名鬬雪紅一名勝春一名痩客灌生處處有人家多栽插之青莖長蔓葉小於薔薇莖與葉俱有刺花有紅白及淡紅三色白者須植不見日處見日則變而紅逐月一開四時不絶花千葉厚瓣亦薔薇之類也性甘温無毒主活血消腫傅毒集藻贊增宋宋祁月季花贊花亘四時月一披秀寒暑不改似固常守五言古詩原宋宋祁月季花羣花各分榮此花冠時序聊披淺深艶不易冬春慮真宰竟何言予將造形悟蘇軾次韻子由月季花再生幽芳本長春暫瘁如蝕月且當付造物未易料枯枿也知宿根深便作紫笋茁乘時出婉娩為我暖栗冽先生早貴重廟論推英拔而今城東𤓰不記召南茇陋居有逺寄小圃無濶躡還為乆處計坐待行年匝臘果綴梅枝春杯浮竹葉誰言一萌動已覺萬木活聊將玉蘂新插向綸巾折蘇轍所寓堂後月季再生客背有芳叢開花不遺月何人縱斤斧害意肯留枿偶乗秋雨滋冐土見微茁猗猗抽條穎頗欲傲寒冽勢窮雖云病根大未容拔我行天涯遠幸此城南茇小堂劣容臥幽閣粗可躡中無一尋空外有四鄰匝窺墻數柚實隔屋看椰葉蔥蒨獨此苖愍愍待其活及春見開敷三嗅何忍折五言律詩增明劉繪月季花綠刺含煙鬱紅苞逐月開朝華抽曲沼夕蘂壓芳臺能鬬霜前菊還迎雪裏梅蹋歌春岸上㡬度醉金杯七言律詩增宋徐積長春花五首誰言造物無偏處獨遣春光住此中葉裏深藏雲外碧枝頭常借日邉紅曾陪桃李開時雨仍伴梧桐落後風費盡主人歌與酒不教閑却賣花翁一從春色入花來便把春陽不放囘雪圃未容梅獨占霜籬初約菊同開長生洞裏神仙種萬歲樓前錦繡堆過盡白駒都不管綠楊紅杏自相催一謝芳菲更不還誰何嬌歩獨盤桓雖於物態為難有却是時情總易闌日曬香肌難避暑雪濡粉面亦禁寒等閑莫使人知處長與詩家醉後看誰與猩猩血染紅重重疊疊費春工應無暴物侵和氣自有深根藏暖風每見靈芝三秀了囘看凡艶一時空如環光景循將徧又到江南梅信通兩枝上疎疎花啓房輕綃重錦迭為裳更分深淺兩般色不作尋常一面妝蕣有紅華須鬬艶蘭雖清節亦交香吟翁未暢先投筆為與東君詠海棠原楊萬里月季花只道花無十日紅此花無日不春風一尖已剝臙脂筆四破猶包翡翠茸别有香超桃李外更同梅鬬雪霜中折來喜作新年看忘却今晨是季冬五言絶句增宋陳與義月季花月季花上雨春歸一憑闌東西南北客更得㡬囘看紅襟映肉色薄暮無乃寒園中如許多獨覺賦詩難范成大題長春花染根得靈藥無時不春風倚䦨與挂壁相伴歳寒中七言絶句原宋韓琦東㕔月季牡丹殊絶委春風露菊蕭疎怨晩叢何似此花榮艶足四時長放淺深紅增朱淑真長春花一枝才謝一枝妍自是春上不與閒縱使牡丹稱絶艶到頭榮悴片時間原明張新月季花一番花信一番新半屬東風半屬塵惟有此花開不厭一年長占四時春詩散句增宋蘇軾長春如穉女飄揺倚輕颸卯酒暈玉顔紅綃卷生衣楊巽齋自有嬌紅間蒼葉不隨凡卉待春囘原百氏集花落花開無間斷春來春去不相關牡丹最貴惟春晩芍藥雖繁只夏初張舜民四時花不絶百氏集人間不老春張耒月季祇應天上物陳參政天下風流月季花百氏集春色四時常在目但看花開日日紅詞原宋王冠卿採桑子牡丹不好長春好有箇因依一兩三枝但是風光總屬伊當初只為嫦娥種月正明時敎恁芳菲伴著團圓十二囘增舒亶一落索葉底枝頭紅小天然窈窕後園桃李漫成蹊能占得春多少不管雪消霜曉朱顔長好年年若許醉花間待􅂸了花間老原趙坦庵朝中措開隨律琯度芳辰鮮艶見天真不比浮花浪蘂天教月月常新薔薇顔色玫瑰態度寳相精神休教歲時月季仙家欄檻長春别錄原種植春前翦其枝培肥土中時時灌之俟生根移種輔以屏架花謝結子即摘去花恒不絶或云人家住宅内不宜種此花附録四季原四季花一名接骨草葉細花小色白自三月開至九月午開子落九月内剖根分種木香原木香灌生條長有刺如薔薇有三種花開於四月惟紫心白花者為最香馥清逺高架萬條望若香雪他如黄花紅花白細朶花白中朶花白大朶花皆不及集藻七言古詩增唐邵楚萇題馬侍中燧木香亭春日遲遲木香閣窈窕佳人褰繡幕淋漓玉露滴紫蕤緜蠻黄鳥窺朱萼横漢碧雲歌處斷滿地花鈿舞時落樹影參差斜入簷風動玲瓏水晶箔七言律詩增宋晁詠之木香朱簾髙檻俯幽芳露浥煙霏欲褪妝月冷素娥偏有態夜寒青女不禁香從教春事年年晩要使詩人日日狂替取秋蘭紉佩好忍隨風雨受淒凉七言絶句増宋劉敞木香粉刺叢叢鬬野芳春風搖曵不成行只因愛學宫妝樣分得梅花一半香徐積詠慎郎中園木香仙子霓裳曵紺霞瓊姬仍坐碧雲車誰知十日春歸去獨有春風在慎家張舜民木香庭前一架已離披莫折長枝折短枝要待明年春盡後臨風三嗅寄相思廣寒宫闕王樓臺露裏移根月裏栽品格雖同香氣俗如何却共牡丹開元郝經夢遊木香洞府月窓青錦麝塵寒夢遶煙條露蘂看但覺身輕似蝴蝶種香風物似槐安詩散句增宋張舜民青春逐流水素質獨輕微晁詠之喚將梅蘂要同韻羞殺棃花不觧香王庭珪莫惜金錢買玊英檐前春老過清明别錄原種植四月中扳條入土泥壅一叚俟月餘根長自本生枝翦斷移栽可活若翦條扞插多難活荼䕷等同此法棣棠按郁李名常棣與此迥别原譜誤合為一今正之原棣棠花若金黄一葉一蘂生甚延蔓春深與薔薇同開可助一色有單葉者名金盌性喜水增花鏡藤本叢生葉如荼䕷多尖而小邊如鋸齒三月開花圎如小毬繁而不香其枝比薔薇更弱必延蔓屏樹間集藻七言律詩原宋梅堯臣棣棠花更衣入侍宮中貴韡韡芸黄殿後花鬬色長宜日光近生輝尤喜樹隂斜依稀􅀈服開風袂約畧仙盤裛露華不與艶桃偷結子漫天飛去作朝霞七言絶句增宋范成大道傍棣棠花乍晴芳草競懐新誰種幽花隔路塵綠地縷金羅結𢃄為誰開放可憐春詩散句原宋宋祁佛輪千輻細公𢃄萬釘圓詞增宋王采蝶戀花花為年年春易改待放柔條繫取長春在宫樣妝成還可愛鬢邊斜作拖枝戴每到無情風雨大檢㸃羣芳却是深叢耐揺曵綠蘿金縷帶丹青傳得妖嬈態茉莉原茉莉一名抹厲見洛陽名園記一名没利見王梅溪集一名末利見朱子集一名末麗見洪景盧集名抹麗謂能掩衆花也本草云末利本梵語無正字隨人㑹意而已佛書名鬘華謂堪以飾鬘原出波斯移植南海丹鉛録北土名柰晉書都人簪柰花是也則此花入中國乆矣弱莖繁枝葉如茶而大綠色團尖夏秋開小白花花皆暮開其香清婉柔淑風味殊勝花有草本者有木本者有重葉者惟寳珠小荷花最貴此花出自暖地性畏寒喜肥壅以雞糞灌以燖猪湯或雞鵞毛湯或米泔開花不絶六月六日以治魚水一灌愈茂故曰清蘭花濁茉莉勿安牀頭恐引蜈蚣一種紅者色甚艶但無香耳又有朱茉莉其色粉紅有千葉者初開花時心如珠出自四川增廣東志雷瓊二州有綠茉莉本如蔦蘿有黄茉莉名黄馨原花氣味辛熱無毒蒸液作面脂頭澤長髪潤燥香肌根氣味熱有毒彚考原南越行紀南越之境五穀無味百花不香惟茉莉那悉茗二花特芳香不隨水土而變與夫橘北為枳者異矣彼處女子用綵絲穿花心以為首餙增南方草木狀末利花似薔薇之白者香愈於那悉茗清異錄南漢地狹力貧不自揣度有欺四方傲中國之志每見北人盛誇嶺海之强世宗遣使入嶺館接者遺以茉莉文其名曰小南强東坡集東坡謫儋耳見黎女競簪茉莉含㯽榔戲書几間云暗麝著人簪茉莉紅潮登頰醉㯽榔花經茉莉二品八命三栁軒雜識茉莉花為狎客捫蝨新話南中花木有北地所無者茉莉花含笑花闍提花渠那異花之類以性皆畏寒故茉莉惟六月六日種者尤盛市中婦女喜簪茉莉東坡所謂暗麝著人者也製龍涎香者無素馨花多以茉莉代之原鄭松窓詩注廣州城西九里曰花田盡栽茉莉及素馨乾淳歲時記禁中避暑多御復古選德等殿及翠寒堂納凉置茉莉素馨等南花數百盆於廣庭鼓以風輪清芬滿殿增丹鉛縂錄茉莉花見􅄞含南方草木狀稱其芳香酷烈此花嶺外海濵物自宣和中名著艮嶽列芳草八此居一焉八芳者金蛾玉蟬虎耳鳳毛素馨渠那茉莉含笑也泉南雜志余廨東所植茉莉其髙及檐嘗於暑夜設木榻坐其下清芬郁烈可沾眉髪其地易生如吳中插槿也三餘贅筆曾端伯以茉莉為雅友張敏叔以茉莉為逺客集藻七言古詩原宋楊萬里江梅去去木樨晩芝草石榴刺人眼茉莉獨立更幽佳龍涎避香雪避花朝來無熱夜凉甚急走山僮問花信一枝𢃄雨折来歸走送詩人覔好詩增樓鑰次韻胡元甫茉莉花殘暑未盡秋欲来玊刻萬葉瓊英開孤標雅韻一枝足江上紫翠空成堆素娥常與明月約青女細把輕綃裁主人好事趁時買買寘此地真宜哉墻間閒地方丈所㡬年累甓裝層臺春花秋卉方互發胡葵芍藥參徘徊眼明忽見此竒絶弟畜素馨兄事梅夜深飛香性幽獨未許蜂蝶來相陪糖甖封餘有閩玊㑹須掃取添花栽吾聞閩山千萬木人或視此齊蒿萊何如航海上天闕玉色照映琉璃杯新凉徙倚看不足坐見日影欹庭槐五言律詩原宋劉子翬茉莉花翠葉光如沃冰葩淡不妝一番秋早秀徹日坐旁香色照祇園静清囘瘴海凉倘堪紉作佩老子欲浮湘朱子茉莉曠然塵慮盡為對夕花明密葉低層幄冰蕤亂玊英不因秋露濕詎識此香清預恐芳菲盡㣲吟繞砌行奉酬圭父茉莉之作玊蘂琅玕樹天香知見薫露寒清透骨風定逺含芬爽致銷煩暑髙情謝曉雲遥憐河朔飲那得醉時聞七言律詩增宋鄭剛中茉莉小鍤移根帶蘚苔暑中相對亦佳哉素英吐處祗如玉清思牽人全似梅淺綠翦羅和葉看真香擣麝逐風来觀君可與酴醿並髙士寕容俗子陪羅願奉簡李叔勤覓茉莉花栽鄆令風流太史家早知茉莉有竒葩生嫌衆色空塵滓徧閲餘香見等差多謝珠璣來座右好將根葉到天涯蜀江紅紫紛披後初看東南第一花五言絶句增明皇甫汸題茉莉二首萼密聊承葉藤輕易繞枝素華堪飾鬘争趁晩妝時香慣臨風細花偏映日生若將人試擬小玉定齊名陳淳茉莉花浴起月到楹柔枝方可折薫風如有情吹簾散香雪七言絶句增宋王庭珪茉莉花三絶句纖雲捲盡日西流人在瑶臺宴未休王母欲歸香滿路曉風吹下玉搔頭火雲燒野葉聲乾歴眼誰知玊蘂寒疑是羣仙來下降夜深時聼珮珊珊逆鼻清香小不分冰肌一洗瘴江昬嶺頭未負春消息恐是梅花欲返魂鄭剛中茉莉真香入玉初無信香欲尋人玉始開不是滿枝生綠葉端須認作嶺頭梅范成大謝袁起巖知府送茉莉二檻千里移根自海隅風㠶破浪走天吳散花忽到毘邪室似欲横機試病夫燕寢香中暑氣清更煩雲鬢插瓊英明妝暗麝俱傾國莫與礬仙品弟兄再賦二首薰蒸沉水意微茫全樹飛来爛漫香休向寒鴉看日影祇今飛燕侍昭陽憶曾把酒泛湘灕茉莉毬邊擘荔枝一笑相逢䨇玊樹花香如夢鬢如絲原王十朋茉莉茉莉名佳花亦佳逺從佛國到中華老来耻逐蠅頭利故向禪房覓此花增方岳茉莉閩雨揉香摘未稀鈎簾頓覺暑風㣲只應雪外梅花笑自與兒曹入枕幃原許棐茉莉荔枝鄉裏玲瓏雪來助長安一夏凉情味於人最濃處夢囬猶覺鬢邊香葉廷珪茉莉露華洗出通身白沉水薫成換骨香近説根苖移上苑休慚系出本南荒鄭域詠茉莉玉搓蓮子作尖丸龍腦薰香簇滿冠好是瑩無紅一㸃若敎紅却不堪看江奎茉莉靈種傳聞出越裳何人提挈上蠻航他年我若修花史列作人間第一香雖無艶態驚羣目幸有清香壓九秋應是仙娥宴歸去醉来掉下玉搔頭劉克莊茉莉一卉能薫一室香炎天猶覺玉肌凉野人不敢煩天女自折瓊枝置枕傍增徐千里茉莉炎州綠女雪為肌十二朱欄月未移香逼簟紋眠不得為渠醒過打鐘時原趙福元茉莉刻玉雕瓊作小葩清姿原不受鉛華西風偷得餘香去分與秋城無限花楊巽齋臍麝龍涎韻不侔薫風移種自南州誰家浴罷臨妝女愛把閑花插滿頭王右丞欹煙裛露暗香濃曾記瑶臺月下逢萬里春囬人寂寞玉顔知復為誰容香嚴童子沉薫鼻姑射仙人雪作膚誰向天涯收落蘂發君顔色四時朱百氏集風流不肯逐春光削玉團酥素淡妝疑是化人天上至毘那一夜滿城香明唐寅春困無端壓黛眉梳成鬆鬢出簾遲手拈茉莉猩紅朶欲插逢人問可宜增陳淳茉莉花茉莉開時香滿枝鈿花狼籍玉參差茗杯初歇香煙燼此味黄昬我獨知沈氏宜修茉莉花如許閒宵似廣寒翠叢倒影浸冰團梅花宜冷君宜熱一樣香魂両樣看詩散句原宋謝景初萼趺琲珠圓碎簇柔梢垂蔫然經月餘艶色愈不衰始疑神功化火結丹砂為許仲啓火令行南國彤雲間丹霞之子方熱中濯濯冰雪花植根郤月盆趣駕七香車鄭域風韻傳天竺隨經入漢京香飄山麝馥露染雪衣輕增陶弼海客園林珠樹木水仙賔從玊簪裳錦挑每作紅絲縷蜂採須成白蜜房重譯新離越裳國一枝都掩桂林香養成崖谷黄蜂蜜羞死江湖白藕房原許野雪自是天上冰雪種占盡人間富貴香不煩鼻觀偷馥郁解使心地俱清凉蔣之竒佛香紅茉莉番供碧玻璃王十朋西域名花最孤潔東山芳友更清幽葉廷珪名字惟應佛書見根苖應逐賈胡來戴復古香薫茉莉毬鄭域九里花田地王十朋日暮園人獻寳珠增湛俞茉莉曉迷瓊檻白原王右丞尋得天花伴衆芳詞增宋周密朝中措綵繩朱乗駕濤雲親見許飛瓊多定梅魂纔返香瘢半掐秋㾗枕函釵縷薰篝芳焙兒女心情尚有第三花在不妨留待凉生原韓元吉南柯子五月炎州路千叢撲地開只疑標韻是江梅不道薰風庭院雪成堆寳髻瓊瑤綴仙衣翡翠裁一枝長伴荔枝來甘與玉人和笑插鸞釵張孝祥鵲橋仙北窓凉透南窓月冷浴罷滿懐風露不知何處有花來但怪底清香無數炎州珍産吳人未識天與人間獨歩冰肌玉骨歲寒時倩閒止堂中留住張鎡驀山溪撫蓮吟就薝蔔還曾賦相伴更無花倦爐熏日長難度柔桑葉裏玉碾小芙蕖生竺國長閩山移向玊城住池亭竹院宴坐冰圍處綠繞百千叢夜將䦨爭開迎露煞曾評論嬌媚勝江梅香稱月韻宜風消盡人間暑盧祖臯洞仙歌玉肌翠袖較似荼䕷瘦㡬度熏醒夜窓酒問炎洲何事得許清凉塵不到一叚冰壺翦就晩來庭户悄暗數流光細摘芳英黯囬首念日暮江東偏為魂銷人易老幽韻清標似舊正紋簟如波帳如煙更奈向月明露濃時候增施岳歩月玉宇薰風寳堦明月翠叢萬㸃晴雪凍霜不就散廣寒霏屑采珠蓓綠萼露滋嗔銀艶小蓮冰潔花魂在纖指嫩㾗素英重結枝頭香未絶還是過中秋丹桂時節醉鄉冷境怕翻成消歇玩芳味春焙旋薰貯穠韻水沉頻爇堪憐處輸與夜凉睡蝶别錄原扦插梅雨時取新發嫩枝從節折斷將折處劈開入大麥一粒亂髪纒之插肥土隂濕即活與扦瑞香法同收藏霜時移北房簷下見日不見霜大寒移入暖處圍以草薦盆中任其自乾至乾極畧用河水盞許澆其根僅活其命枝葉上有白色小蟲刮去不然即黄萎十月入窖中枝頭入地尺許地上加柴柴上加土尺許封蓋嚴密不透風氣為佳春分後朝南開一孔通氣立夏後方可出窖見春風早即枯槁出窖後葉落無妨先放簷下見日色處漸移之日中去上面及周圍舊土一層再加新土培之二三年後取出全換舊土莫傷根換土後只澆清水不宜太肥至葉稍大方可澆肥翦去枯枝梅雨不絶移置簷下若南方冬月只於朝南屋内掘一淺坑將盆放下以篾籠罩花口傍以泥築實無隙通風或用綿花子覆根五寸許亦以篾罩罩之用紙封罩五六日一次將花核取開用冷茶澆之仍以花核壅之立夏前方可去罩盆中周圍去土一層以肥土塡上用水澆之大約入夏後三日方可移出露天最怕春風清明前尤怕風芽發方可灌以糞次年和根取起換土栽過無不活者如此收藏多年可延于若瀛曰茉莉自首夏至秋杪皆花開必薄暮半放冉冉作竒香次晨則香減霜後猶生朶但漸小耳經大寒無不萎者向余得一本根下有鐵少許蓋鬻者利其必萎彼鑽核者又何足異余去其鐵易土而植之灌以腥汁開甚盛遇大寒藏之暖室歴三歲猶花但榦老花疎總之風氣不宜也金陵易得每歳購二三本霜後輙棄之儲土每日屋下掃聚塵土堆積於閑静空屋俟發熱過篩細用製用每晩採花取井花水半杯用物架花其上離水一二分厚紙密封次日花既可簪以水㸃茶清香撲鼻甚妙花史云聞老人言飲之得肚腹虚飽之症香能散氣老人氣虚理或有之昔人有異香含異毒之語養老者愼之增香譜今多採茉莉蒸取其液以代薔薇王右丞詩注茉莉花作末和面藥甚竒經歳其香不歇清供錄茉莉湯用蜜一兩甘草一分生薑自然汁一滴同研令極匀調塗在椀中心抹匀不令洋流每於凌晨採摘茉莉花三十朶將放藥椀盖其花取香氣薫之午間乃可以㸃用快雪堂漫錄用三白酒或雪酒色味佳者不滿瓶上虚二三寸編竹為十字或井字障瓶口不令有餘不足新摘茉莉數十朶線繫其蔕懸竹下離酒一指許用紙封固旬日香透矣野䔩品茉莉花初發嫩葉采洗淨同豆腐熝食絶品附錄雪瓣原雪瓣一名狗牙似茉莉而瓣大其香清絶出海南附錄紫茉莉增草花譜紫茉莉草本春間下子早開午收一名臙脂花可以㸃唇子有白粉可傅面亦有黄白二色者素馨原素馨一名那悉茗花一名野悉蜜花來自西域枝榦裊娜似茉莉而小葉纖而綠花四瓣細痩有黄白二色須屏架扶起不然不克自竪雨中嫵態亦自媚人南方草木狀那悉茗花與茉莉花皆自西域移植南海南人愛其芳香競植之彚考原龜山志昔劉王有侍女名素馨冡上生此花因以得名増升庵詩注陸賈南中行紀云南中遊女以綵絲貫素馨為餙事載南方草木狀貫花繞髻至今猶然瓶花譜素馨六品四命原學圃餘疏素馨出閩黄者不甚香亦間攜至吾地白者香勝於茉莉但彼中亦未之見增廣州志城西九里曰花田彌望皆素馨花南征錄云南海劉隱時有美人葬於此至今花香異於他處花田人以種素馨為業其神為南漢美人故采摘必以婦女而彼中婦女多不簪戴有詠者曰花田女兒不愛花縈絲結縷餉他家貧者穿花富者戴明珠十斛似泥沙花渡頭在五羊門南岸花販每日分載素馨至城從此上舟故名集藻説原明陳憲章素馨説草木之精氣下發於上為英華率謂之花然水陸所産妍媸高下美惡之等蓋萬不齊焉而人於其中擇而愛之凡欲其有益於事非愛之而溺焉者也産於此邦曰素馨者香清而體白郁郁盈盈可掬可佩貫四時而不凋供一賞而有餘亦花之佳者也好事者致於予予既愛之遂益究其用取花之蓓蕾者與茗之佳者雜貯陶瓶中經宿以俟茗飲之入焉然則是花之用雖不若麻縷之與菽粟然蓋亦不為無用也人之資於麻縷為其可以温也資於菽粟為其可以飽也得之則生不得則死今是花也吾取焉始以其能郁郁盈盈少裨於茗耳雖不汲汲可也不汲汲由用之可已也使是花之於人如麻縷之與菽粟然又安可已哉可已而已不可已而不已引而伸之觸類而長之於道其庶幾乎治國其庻幾乎賦增明黎遂球素馨賦登羊城以西望見綠草之田田匪織雨而含珠乃浮香以如煙弔美人於黄土照明鏡於青天惟斯花之可認感今昔而相憐爾乃向午如粟薄暮放蘂望通衢之凝雪列七門而成市得人氣而轉馥在晩妝之初洗圍寳髻之盤盤貫玉屑而齒齒果並擲於車前香可分於袖底雜寒具而芬郁蘸琉璃之露水則有青樓姊妹烏衣兒郎綴流蘇如夾纈挂斗帳之四方鈎珊瑚之横枝枕琥珀而低昂如香稲之飼鸚鵡等竹實之供鳳凰羡同心之可結羌觧佩而垂璫於是重五之晝䨇七之宵或張翠幄於龍舫或方蘭舟為鵲橋晝則艾虎纍纍朱符飄飄飛八張如比翼馳千舸若聨鑣蹋歌珠寺燕客西壕買花齊喚餘錢亂抛量三斛之蒼璣疑乍泣乎老鮫與歌聲兮同貫侵酒氣兮如消宵則芳蕤作幄新月如鈎海上載求仙之童女水際排乞巧之髙樓燦明燈於重簷儼列冕之垂旒何玲瓏之雕玉覆火齊而作舟總貫蘂之所為若鏤冰而籠篝布經緯以如意象禽魚之優游恒有香以避暑縱無聲而知秋復有三五之夕月出䑃朧巫壇禮斗神絃舞風白麟雪獅翠鳳玉龍覆官街以列帳峙重臺而罩櫳咸當門以結綵聨比户於帡幪被華鬘與纓絡見瓊島之銀宮齊觀燈而連袂或駕橋而成虹譬遊蜂之出房若舞蝶之鑽叢聆梵吹於香國見閭巷皆花封乃若愽雅髙士道古名家知為那悉之茗用代陽羡之茶或云當與楞嚴同至或傳載自博望之槎比石榴而有馨較菩提而擅花又烏能起􅃩質而問之夫是以賦芳草於天涯七言古詩增宋鄭剛中或問茉莉素馨孰優予曰素馨與茉莉香比肩但素馨葉似薔薇而碎枝似酴醿而短大率類草花比茉莉體質閑雅不及也茉莉夭姿如麗人肌理細膩骨肉均衆葉薿薿開緑雲小蘂大花意淑貞素馨於時亦呈新蓄香便未甘後塵獨恨雷五雖清潔珠璣綺縠終坐貧七言絶句增宋蔡襄寄南海李龍圖求素馨含笑花二草曾觀嶺外圖開時嘗與暑風俱使君已自憐清福分得新條過海無原陳與義素馨羞將姿媚隨花譜愛伴孤髙上月評獨恨遇寒成弱植色香殊不避梅兄鄭域素馨妙香真色自天然羞御鉛華學女妍只向温柔鄉裏活怕寒不許上林傳傅大諫素馨昔日雲鬟鎖翠屏只今煙冡伴荒城香銷韻斷無人問空有幽花獨擅名明楊慎素馨花金碧佳人墮馬妝鷓鴣林裏鬬芬芳穿花貫縷盤香雪曾把風流惱陸郎詩散句原宋祝穆細花穿弱縷盤向綠雲鬟明林鴻素馨花發暗香飄一朶斜簪近翠翹詞原宋張鎡菩薩蠻層層細翦冰花小新隨荔子雲帆到一露一番開玊人催買栽愛花心未已摘放冠兒裏輕浸水晶凉一窩雲影香增史逹祖風入松素馨跗萼太寒生多翦春冰夜深綠霧侵凉月照晶晶花葉分明人臥碧紗㡡淨香吹雪練衣輕頻伽銜得墮南薰不受纖塵若隨荔子華清去定空埋身外芳名借重玊爐沉炷起予石鼎湯聲原劉鎮念奴嬌調冰弄雪想花神清夢徘徊南土一夏天香收不起付與蘂仙無語秀入精神凉生肌骨銷盡人間暑稼軒愁絶惜花還勝兒女長記歌酒䦨珊開時向晩笑絶金莖露月浸闌干天似水誰伴秋孃窓户困殢雲鬟醉欹風㡌總是牽情處返魂何在玉川風味如許尹煥霓裳中序第一靑顰粲素靨海國仙人偏耐熱餐盡風香露屑便萬里凌空肯慿蓮葉盈盈歩月悄似憐輕去瑶闕何人在憶渠癡小㸃㸃愛輕㨗愁絶舊遊輕别忍重看鎖香金篋淒凉清夜簟茀悵杳杳詩魂真化風蝶冷香清到骨夢十里梅花霽雪歸來也厭厭心事自共素娥説别錄增廣東新語珠江南岸有村曰莊頭周里許悉種素馨亦曰花田率以昧爽往摘以天未明見花而不見葉其稍白者則是其日當開者也旣摘覆以濕布毋使見日其已開者則置之花客渉江買以歸一時穿燈者作串與瓔珞者數百人城内外買者萬家富者以斗斛貧者以升其量花若量珠然花宜夜乗夜乃開上人頭髻乃開見月而益光艶得人氣而益馥竟夕氤氲至曉萎猶有餘味懐之辟暑吸之清肺氣又宜作燈雕玉鏤冰玲瓏四照遊冶者以導車馬故楊用修云粤中素馨燈天下之至艶者也兒女以花蒸油取液為面脂頭澤謂能長髪潤肌其為龍涎香餅香串者治以素馨則韻味愈逺隆冬花少曰雪花摘經數日乃開夏月花多瓊英狼籍入夜滿城如雪觸處皆香廣中七月七日多為素馨花艇遊泛海珠及西濠香浦秋冬作火清蘸則千門萬户皆挂素馨燈結為鸞鳳諸形或作流蘇寳帶葳蕤間以朱槿以供神或當宴㑹酒酣出素馨毬以獻客客聞寒香而沉醉以醒以挂複斗帳中雖盛夏能除炎熱枕簟為之生凉諺曰㯽榔辟寒素馨辟暑故粤人以二物為貴獻客者先以㯽榔次以素馨含笑原本草含笑出海南有紫白二種遯齋閑覽南方花木北地所無者大含笑小含笑其花常若菡蓞之未敷者故有含笑之名草花譜含笑花開不滿若含笑然捫蝨新話含笑有大小小含笑香尤酷烈有四時花惟夏中最盛又有紫含笑茉莉含笑皆以日西入稍隂則花開初開香尤撲鼻予山居無事毎晚凉坐山亭中忽聞香風一陣滿室郁然知是含笑開矣彚考增東坡廣州蒲澗寺詩注山中多含笑花花經含笑花二品八命澄懐錄韓熙載云對花焚香含笑宜麝集藻賦增宋李綱含笑花賦有序南方花木之美者莫若含笑綠葉素榮其香郁然是花也方䝉㤙而入幸價重一時故感而為之賦其辭曰夫何嘉木之姝嫮兮藹芬馥之芳容結孤根於暖地兮披素􅃩於幽叢炫麗景之遲遲兮浥零露之濃濃黙凝情而不語兮獨含笑於春空其笑伊何粲兮巧倩洞户初啓曲欄乍見驚鄰女之窺牆疑寵姬之教戰鄙妖姿之齲齒謝啼妝之半面態有餘情忽焉改觀國香無敵秀色可餐抱貞潔之雅志舒婉孌之歡顔寧解頥而啓齒方墮珥而攲冠苞温潤以如玉吐芬芳其若蘭俯者如羞仰者如喜嚮日嫣然臨風莞爾豈褰幃而觀跛將忘懐於射雉輕可買之千金重廻眸之百媚拔類邁倫孰與為比汎㶑酷烈綽約嬋娟翠葉擁鬢綠萼承顴嗅之彌馨察之愈妍信色香之俱美何扈芷而握荃若夫萱草忘憂合歡蠲忿採杜若於洲中搴芙蓉於澤畔藝菊百畦滋蕙九畹挈長度美固不可一槩而論也方將移自南國置之玉堂違霜雪之淒冷依日月之末光慿雕檻而凝彩度芝閣而飄香破顔一笑掩乎羣芳誠可以承天寵而植椒房者乎七言律詩增宋楊萬里含笑花菖蒲節序芰荷時翠羽衣裳白玊肌暗折花房須日暮遥將香氣報人知半開微吐長懐寳欲説還休竟俛眉樹脆枝柔惟葉健不消更畫只消詩許仲啓含笑花一㸃𤓰香破醉眠誤他詩客枉流涎如何滴露牛心李化作垂頭玉井蓮初喜曉光將莞爾竟羞嬌影不嫣然忽看吐下金櫻核䔩䔩聲乾暮葉邊五言絶句增宋徐致中含笑花𤓰香濃欲爛蓮莟碧初匀含笑如何處低頭似愧人歲寒集薄薄沉薫骨英英玉煉煙惱人風味别斗帳夢中間七言絶句增宋楊萬里含笑花二首秋來二笑再芬芳紫笑何如白笑强只有此花偷不得無人知處忽然香薰風破曉碧蓮含密意猶低白玊顔一粲不曾容易發清香何自徧人間陸游聞傅氏莊紫笑花開急棹小舟觀之日長無奈清愁處醉裏來尋紫笑香漫道閒人無一事逢春也作蜜蜂忙劉克莊含笑花春風滿面喜津津縱有癡拳不忍嗔竊恐意觀安注脚笑他何事與何人許仲啓含笑花獻笑佳人絶可憐姿姿靨輔巧承顴一枝不用千金買雨洗風吹却粲然蕭文仙含笑肥樣雕成玊色仙碧瑶幢裏粲嬋娟道渠觧笑何曾笑只合更名小白蓮金施宜生含笑花百歩清香透玉肌滿堂皓齒轉明眉搴帷彼客相迎處射雉春風得意時詩散句增宋鄧潤甫自有嫣然態風前欲笑人涓涓朝泣露盎盎夜生春劉濤未嘗逢露齒只恐欲傾城丁謂草觧忘憂􅁯底事花名含笑笑何人蘇軾而今只有花含笑笑道秦皇欲學仙百氏集試問嫣然如可買㑹須一笑與千金深情厚意知多少盡在嫣然一笑中蘇軾涓涓滴露紫含笑花非識面常含笑詞增宋無名氏楊栁枝綠蠟芳趺雪一包綻瓊梢清香却暑賞堂㘭晩風飄笑靨含羞藏碧葉為誰嬌長隨茉莉展輕綃伴良宵指甲花增南方草木狀指甲花其樹高五六尺枝條柔弱葉如嫩榆與那悉茗末利花皆雪白而香不相上下亦自大秦國移植於南海而此花極繁細纔如半米粒許彼人多折置襟袖間盖資其芳馥爾一名散沫花北户錄指甲花花細白絶芳香番人種之未詳其名波斯移植中夏如金錢花也本出外國大同二年始來中土草花譜指甲花生杭之諸山中花小如蜜色而香甚用山土移歸土盆中亦可供玩原指甲花夏月開香似木樨可染指甲過於鳯仙花有黄白二色集藻七言絶句増宋鄭剛中題異香花俗呼指甲花小比木犀無醖藉輕黄碎蘂亂交加邦人不觧稱誰説一地稱為指甲花凌霄花原凌霄花一名紫葳本草云俗謂赤艷曰紫葳葳此花赤艶故名一名陵苕爾雅云苕陵苕黄華蔈白華茇注云一名陵時華色異名亦不同疏云黄華名蔈白華名茇别花色之名也詩小雅鄭箋云陵苕之華紫赤而繁而此云黄白者盖就紫色之中有黄紫白紫耳一名女葳一名茇華一名武威一名瞿陵一名鬼目處處皆有多生山中人家園圃亦栽之野生者蔓纔數尺得木而上即髙數丈蔓間鬚如蝎虎足附樹上甚堅牢乆者藤大如杯春初生枝一枝數葉尖長有齒深青色開花一枝十餘朶大如牽牛花頭開五瓣赬黄色有數㸃夏中乃盈深秋更赤八月結莢如豆角長三寸許子輕薄如榆仁如馬兠鈴仁根長亦如兠鈴根秋深采之隂乾花及根甘酸微寒無毒治婦人産乳餘疾崩中癥瘕血閉寒熱羸痩莖葉苦平無毒主治熱風身癢遊風風疹瘀血喉痺熱痛凉血生肌彚考增詩小雅苕之華芸其黄矣傳苕陵苕也將落則黄苕之華其葉靑靑傳華落葉靑靑然老學庵筆記凌霄花未有不依木而能生者惟西京富鄭公園中一株挺然獨立高四丈圍三尺餘花大如杯旁無所附宣和初景華苑成移植於芳林殿前畫圖進御三栁軒雜識凌霄花為勢客花經凌霄花六品四命原本事集西湖藏春塢門前有二古松各有凌霄花絡其上詩僧清順常晝臥其下子瞻為郡一日屏騎從過之松風搔然順指落花覓句子瞻為作木蘭花詞增嵩山記初祖庵前有三花樹盖凌霄藤附檜而生者也花正開深紅可愛自逹磨未至時有之原學圃餘疏凌霄花纒竒石老樹作花可觀大都與春時紫藤皆園林中不可少者花史富鄭公居洛其家圃中凌霄花無所因附而特起歳乆遂成大樹髙數尋亭亭可愛朱弁曰是花豈非草木中豪傑乎所謂不待文王而猶興者也集藻賦增宋梅堯臣凌宵花賦厥草惟天厥木惟喬草有柔蔓木有繁條緣根兮附蔕布葉兮敷苖朱華粲兮下覆本榦蔽兮不昭嗟兮此木幾歳幾年而至於合抱夫何此草一旦一夕而遂曰凌霄是使藜藿蒿艾慕髙􅃩而仰翹翹也安知蘋藻自潔蕙蘭自芳芙蓉出汙而自麗芝菌不根而自長或紉佩帶或采頃筐或製裳於騷客或登歌於樂章故得為馨為薦為嘉為祥皆無附著亦以名揚奚必託危柯而後昌吾謂木老多枯風髙必折當是時將恐摧為朽荄不復萌蘖豈得與百卉並列也邪五言古詩增唐白居易有木詩有木名凌霄擢秀非孤標偶依一株樹遂抽百尺條託根附樹身開花寄樹梢自謂得其勢無因有動揺一旦樹摧倒獨立暫飄颻疾風從東起吹折不終朝朝為拂雲花暮為委地樵寄言立身者勿學柔弱苖原宋梅堯臣凌宵花草木不觧行隨生自有理觀此引蔓柔必慿髙樹起氣類固有合縈纒豈由已仰見蒼虯枝上發彤霞蘂層霄不易凌樵斧者誰子一日摧作薪此物當共萎曾肇凌霄花凌霄體纖柔枝葉工託麗靑靑亂松樹直榦遭蒙蔽不有嚴霜威焉能辨堅脆增范浚凌霄花栽松待成隂種漆擬作器人皆笑艱拙往往得後利君看植凌霄百尺蔓柔翠新花鬱煌煌照日吐妍媚風霜忽揺落大木亦凋瘁視爾託根生枯莖無殘蔕先榮疾蕭瑟物理固難恃凌霄亟芳華衰歇亦容易明髙啓瞻木軒并序道士李𤣥修所居庭有凌霄花依樹而生近樹伐而凌霄獨存因以名室求予賦詩凌霄託髙樹引蔓日已長纒緜共春榮幽花藹敷芳髙樹忽見伐無依向風霜亭亭還自持柔姿喜能強君子貴獨立倚附非端良覽物成感歎為君賦新章七言古詩增宋陸游凌宵花庭中青松四無鄰凌霄百尺依松身髙花風墮赤玊盞老蔓煙濕蒼龍鱗古来豪傑少人知昂霄聳壑寧自期抱才委地固多矣今我撫事心傷悲七言絶句增唐歐陽炯凌霄花凌霄多半繞棕櫚深染梔黄色不如滿樹㣲風吹細葉一條龍甲颭清虚原宋楊繪凌霄花直饒枝榦凌霄去猶有根原與地平不道花依他樹發强攀紅日鬭妍明賈昌朝凌霄花披雲似有凌雲志向日寧無捧日心珍重青松好依託直從平地起千尋増范成大壽櫟堂前小山峰凌霄花盛開蔥蒨如畫因名之曰凌霄峰天風揺曳寳花垂花下仙人住翠微一夜新枝香焙暖旋薰金縷綠羅衣山容花意各翔空題作凌霄第一峰門外輪蹄塵撲地呼來借與一枝笻陸游遊彌牟菩提院庭下有凌霄藤附古楠其髙數丈花已零落滿地絳英翠蔓亦佳哉零亂空庭碼碯杯徧雨新花天有意定知閒客欲閒來原趙汝囘凌霄花嫋嫋枯藤淺淺葩夤緣直上照殘霞老僧不作因依想將謂青松自有花詩散句原宋曾鞏固知臭味非相類其柰縈纒不自由蔣梅邊引蔓閒花欲透雲托身下倚老松根唐杜甫古苕生迮地詞原宋蘇軾減字木蘭花雙龍對起白甲蒼髯煙雨裏疎影微香下有幽人晝夢長湖風清輭䨇鵲飛来爭噪晩翠颭紅輕時墮凌霄百尺英别錄原禁忌凌霄花用以蟠繡大石殊可觀玩但鼻聞傷腦花上露入目令人曚孕婦經花下能墮胎不可不愼御定佩文齋廣羣芳譜卷四十三
