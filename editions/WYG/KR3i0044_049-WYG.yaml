body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷四十七花譜百合花原列果譜今從全芳備祖移入於此増本草百合一名􅭹玉篇云􅭹百合蒜一名强瞿此物花葉根皆四向故曰强瞿凡物旁生謂之瞿陶𢎞景曰俗人呼為强仇仇即瞿也聲之訛耳一名蒜腦藷其根如大蒜其味如山藷一名重箱一名中逢花一名重邁一名中庭原百合一名摩羅春生苖髙二三尺榦麤如箭葉生四面如雞距又似栁葉青色近莖微紫莖端碧白四五月開花甚大有麝香珍珠二種麝香花微黄甚香珍珠花紅有黑㸃莖葉中有紫珠按李時珍本草云百合葉似短竹葉不似栁葉五六月莖端開大白花長五寸六出四垂向下色亦不紅紅者葉似栁乃山丹也又云紅花帶黄而四垂上有黒斑㸃其子先結在枝葉間者卷丹也蓋一種三類根似蒜而大重疊生二三十瓣爾雅翼云小者如大蒜大者如椀數十片相累狀如白蓮花故名百合言百片合成也味甘平無毒主治邪氣腹脹心痛喉痺補中益氣定心志殺蠱毒療癰腫止顛狂涕淚産後血病蒸煑食之擣粉作麫食最益人和肉更佳彚考増酉陽雜俎元和末海陵夏侯乙庭前生百合花大於常數倍異之因發其下得甓匣十三重各匣一鏡第七者光不蝕照日光環一丈其餘規銅而已原集異記兖州徂徠山寺曰光化客有習儒業者堅志栖焉夏日因閱畫壁於廊序忽逢白衣美女年十五六姿貌絶異因誘至於室情欵甚密及去以白玉指環遺之因上寺門樓隠身目送白衣行計百歩許奄然不見乃識其處尋見百合苖一枝白花絶偉客因劚之根本如拱瑰異不類常者及歸乃啓其重跗百疊既盡白玉指環宛在其内増老學庵筆記蜀孟氏時苑中忽生百合花一本數百房皆並蔕圖其狀於聖壽寺門樓之東頰壁間謂之瑞花圖至今尚存原都波國無稼穡以百合為糧集藻賦原唐王勔百合花賦荷春光之餘煦託陽山之峻趾比蓂莢之能連引芝芳而自擬固其布葉相從潛根必重示不孤於日用欣有叶於時雍嗤五葉之非偶陋三花之未穠亦藐兮不可長辰兮不可逢恐鶗鴂吟兮衆芳晩幸左右之先容五言古詩原梁宣帝百合接葉有多種開花無異色含露或低垂從風時偃抑宋王右丞百合少陵晩﨑嶇託命在黄獨天隨自寂寞療饑惟杞菊古來淪放人餘馨被草木我客漢東城鄰曲見未熟不應惱鵞鴨更忍累口腹過從首三張伯仲肩二陸赬膚分子薑雲茁饋萌竹㝠搜到百合真使當重肉軟温甚蹲鴟瑩淨豈鴻鵠食之儻有助蓋昔先所服詩腸貯微潤茗椀爭餘馥果堪止淚無欲縱望鄉目七言絶句増宋陸游窓前作小土山蓺蘭及玉簪最後得香百合併種之戲作芳蘭移取徧中林餘地何妨種玉簪更乞兩叢香百合老翁七十尚童心詩散句増明陳淳夜深香滿屋疑是酒醒時别録原種植秋分節取其瓣分種之五寸一科宜雞糞宜肥地頻澆則花開爛熳清香滿庭春分不可移二年一分不可枯死山丹原山丹一名紅百合一名連珠一名川强瞿一名紅花菜本草云燕齊人采其花跗未開者乾而食之名紅花菜根似百合體小而瓣少莖亦短小葉狹長而尖頗似栁葉與百合迥别四月開紅花六瓣不四垂亦結小子根氣味甘平無毒一種髙四五尺如萱花花大如椀紅斑黑㸃瓣俱反捲一葉生一子名囘頭見子花又名番山丹根似百合不堪食按此即本草所云卷丹也一種髙尺許花紅如硃砂茂者一榦兩三花花小於百合無香一名中庭花其性與百合同色可觀根同百合可食味少苦按此即花疏所云渥丹也原譜既列於此又附於後者誤今併合為一集藻五言古詩増宋蘇轍西軒種山丹淮揚千葉花到此三百里城中衆名園栽接比桃李吾廬適新成西有數畦地乗秋種山丹得雨生可喜山丹非佳花老圃有深意宿根已得土絶品皆可寄明年春陽升盈尺爛如綺居然盗天功信矣斯人智根苖相因依非真亦非偽客來但一笑勿問所從致朱子山丹昔遊嶺海間幾見巒卉拆素英溥夕露朱葩爛晴日歸來今幾年晤對祗寒碧因君賦山丹怳復見顔色五言律詩増宋蘇轍種花築室力已盡種花功尚疎山丹得春雨艶色照庭除末品何曽數羣芳自不如今秋接千葉試取洛人餘七言律詩増宋楊萬里山丹花春去無芳可得尋山丹最晚出幽林柹紅一色明羅袖金粉羣蟲集寳簪花似鹿蔥還耐久葉如芍藥不多深香泥瓦斛移山蘤聊著書窓伴小吟詩散句増宋蘇軾堂前種山丹錯落瑪瑙盤陳傅良山丹吹出青藜火金蝶窺叢何婀娜别録原種植一年一起春時分種取其大者供食小者用肥土如種蒜法以雞糞壅之則茂増番山丹花須每年八九月分種方盛鳯仙原鳯仙一名海蒳一名旱珍珠一名小桃紅一名染指甲草本草云女人采其花及葉包染指甲其實狀如小桃故有指甲小桃諸名宋光宗李后諱鳯宫中呼為好女兒花張宛邱呼為菊婢韋君呼為羽客人家多種之極易生二月下子隨時可再種即冬月嚴寒種之火坑亦生苖髙二三尺莖有紅白二色肥者大如拇指中空而脆葉長而尖似桃栁葉有鋸齒故又有夾竹桃之名椏間開花頭翅尾足俱翹然如鳯狀故又有金鳯之名色紅紫黄白碧及雜色善變易有灑金者白瓣上紅色數㸃又變之異者自夏初至秋盡開卸相續結實纍纍大如櫻桃形微長有尖色如毛桃生青熟黄觸之即自裂皮卷如拳故又有急性之名苞中有子似蘿蔔子而小褐色氣味微苦温有小毒治産難積塊噎膈下骨哽透骨通竅葉甘温滑無毒活血消積根苦甘辛有小毒散血通經軟堅透骨治誤吞銅鐵此草不生蟲蠱蜂蝶亦多不近恐不能無毒花卸即去其蔕不使結子則花益茂彚考増三柳軒雜識鳯仙為􅆺客花經金鳯七品三命平園詩注金鳯木犀二花殆是的對原花史謝長裾見鳯仙花命侍兒進葉公金膏以麈尾稍染膏灑之折一枝插倒影山側明年此花金色不去至今有斑㸃大小不同若灑金名倒影花李玉英秋日採鳯仙花染指甲後於月中調絃或比之落花流水鳯仙五月開花主水集藻五言古詩原宋劉圻父金鳯花天霜彫九陵梧桐日枯槁鳯徳何其衰驚飛下幽草九苞空髣髴衆彩各自好黄中獨含章見晩更傾倒託根幔亭峰弱質深自保便翾金翅短淡泊乃幾道俗眼迷是非人間迹如掃七言古詩原宋文同金鳯花花有金鳯為小叢秋色已深方盛發英英秀質實具體文采爛然無少闕纖莖翩翩翠影動紅白紛亂如㸃纈誰云脆弱易飄墮自卵至翼亦數月鋪茸翦綵轉難似只把長條恣穿結常疑一似小兒花性命所繋不忍折君不見昨夜雨今朝風一隊驚飛返丹穴五言絶句原宋徐致中金鳯花鮮鮮金鳯花得時亦自􅆺物生無貴賤罕見乃為貴増明王氏美君詠鳯仙花鳯鳥久不至花枝空復名何如學葵蘂開即向陽傾七言絶句増唐呉仁璧鳯仙花香紅嫩緑正開時冷蝶饑蜂兩不知此際最宜何處看朝陽初上碧梧枝原宋晏殊金鳯花九苞顔色春霞萃丹穴威儀秀氣殫題品直須名最上昻昻驤首倚朱欄歐陽修金鳯花憶繞朱欄手自栽緑叢髙下幾番開中庭雨過無人迹狼籍深紅㸃緑苔楊萬里金鳯花細看金鳯小花叢費盡司花染作工雪色白邊袍色紫更饒深淺四般紅増僧北澗金鳯花小似釵頭縷粟金不將紅淺笑紅深虛名冗利閒花草寂寞朝陽采羽瘖詩散句原宋劉敞緑葉紛映階紅芳爛盈眼輝輝丹穴禽矯矯翅翎展張耒金鳯乃婢妾紅紫徒相鮮増明劉基庭前金鳯花向晩爭嫵􅆺原宋僧北澗飛花只合秦樓去莫與金釵壓翠蟬元楊維楨夜搗守宫金鳯蘂十尖盡換紅鴉嘴明徐階金鳯花開色最鮮佳人染得指頭丹金盤和露搗仙葩解使纖纖玉有瑕詞原明夏樹芳女冠子秋花姝麗疑是虞庭集毳爛霞開不向丹山植還從蘂闕來飛來金屈戍添上玉搔頭暗撥求凰操韻聲幽増宋陳景沂水龍吟階前砌下新凉嫩姿弱質婆娑小仙家甚處鳯雛飛下化成窈窕尖葉參差柔枝裊娜體將玉造自川葵放後堂萱謝了是園苑無花草自恨西風太早逞芳容紫團緋繞管裏低昻箆頭約掠空成懊惱圓胎結就小鈴垂下直開臨闕二字凡間謫墮不知西帝曽關宸抱别録原製用采肥莖汋醃可為葅花酒浸一宿可食取紅花搗爛煑犀杯色如蠟可充舊犀初煑出忌見風見風即裂庖人烹魚肉難卒爛投子數粒同山查即易爛女人采紅花同白礬搗爛先以蒜擦指甲以花傅上葉包裹次日紅鮮可愛數月不退能損齒服者不可著牙多用亦㦸人喉插瓶用沸水或石灰入湯可開半月増物類相感志枳實煑魚則骨軟或用鳯仙花子野䔩品鳯仙花梗採頭芽湯焯少加鹽曬乾可留年餘以芝蔴拌供新者可入茶最宜炒麫觔食佳熝豆腐素菜無一不可金錢増酉陽雜俎金錢花一名毘尸沙原金錢花一名子午花格物叢話云花以金錢名言其形之似也惟欠稜廓耳花史云午開子落故名子午花一名夜落金錢花予改為金榜及第花花秋開黄色朶如錢緑葉柔枝㛹娟可愛園林草木疏云梁大同中進自外國今在處有之栽磁盆中副以小竹架亦書室中雅翫也又有銀錢一種七月開以子種彚考原酉陽雜俎梁豫州掾屬以䨇陸賭金錢錢盡以金錢花相足魚𢎞謂得花勝得錢増花經金錢花七品三命原花史鄭榮嘗作金錢花詩未就夢一紅裳女子擲錢與之曰為君潤筆及覺探懷中得花數朶遂戲呼為潤筆花集藻五言律詩増宋劉攽金錢花披沙百鍊貴濟世五銖圜侔色都疑似頒形適自然蕭蕭秋意蚤采采露華鮮貧謝侏儒甚煩君慰眼前七言絶句増唐盧肇金錢花輪郭休誇四字書紅窠寫出對庭除時時買得佳人笑本色金錢却不如原來鵬金錢花也無輪郭也無神露洗還同鑄出新青帝若教花裏用牡丹應是得錢人皮日休金錢花隂陽為炭地為爐鑄出金錢不用模謾向人前逞顔色不知還解濟貧無増呉仁璧金錢花淺絳濃香幾蘂勻日鎔金鑄萬家新堪疑劉寵遺芳在不許山隂父老貧羅隠金錢花占得佳名繞樹芳依依相伴向秋光若教此物堪收貯應被豪家盡劚將原宋石􅐂金錢花名貴已居三品上價髙仍在五銖先春來買斷深紅色燒得人心似火燃章藝齋金錢花巧冶都由造化罏風磨雨洗好形模花神果有神通力買斷春光用得無詩散句原宋百氏集能買三秋景難供九府輸厚重圓殊秦半兩輕飄薄似漢三分蘇軾金錢色傍秋别録増酉陽雜俎衛公言金錢花損眼滴滴金原滴滴金一名夏菊一名艾菊一名旋覆花本草云花圓而覆下故名一名疊羅金増本草旋覆一名盗庚爾雅云蕧盗庚注云旋覆似菊本草云庚者金也謂其夏開黄花盗竊金氣也一名戴椹花史一名金錢菊本草亦名金錢花原莖青而香葉青而長尖而無椏髙僅二三尺花色金黄千瓣最細凡二三層明黄色心乃深黄中有一㸃微緑者巧小如錢亦有大如折二錢者所産之地不同也自六月開至八月苖初生自陳根出既則徧地生苖繇花梢頭露滴入土即生新根故名滴滴金嘗斸地驗其根果無聯屬集藻七言絶句原宋陶弼九秋瑞露滴成芽不是榆花即桂花星女月娥宫不鎖天風吹落野人家増謝薖滴滴金滿庭黄色抑何深一滴梅霖一滴金莫使貪夫來見此聞名亦起覬覦心原百花新詠秋來蔓草莫相侵露滴花梢滿地金若入仙人丹竈裏還如松柏歲寒心玉簪原玉簪漢武帝寵李夫人取玉簪搔頭後宫人皆效之玉簪花之名取此一名白蕚一名白鶴仙一名季女白蕚象其色白鶴象其形季女象其卦處處有之有宿根二月生苖成叢髙尺餘柔莖如白菘菜葉大如掌團而有尖面青背白紋如車前頗嬌瑩六七月叢中抽一莖莖上有細葉十餘每葉出花一朶長二三寸本小末大未開時正如白玉搔頭簪形開時微綻四出中吐黄蘂七鬚環列一鬚獨長甚香而清朝開暮卷間有結子者圓如豌豆生青熟黑其根連生如鬼臼射干之類有鬚毛舊莖死則根有一臼新根生則舊根腐亦有紫花者學圃餘疏云紫者名紫鶴葉微狹花小於白者葉上黄緑相間名間道花又有一種小紫五月開花小白葉石緑色此物損牙齒不可著牙根性甘辛寒有毒解毒塗腫下骨葉性同根解蛇虺毒彚考増春渚紀聞酒成碧後方堪飲花到白來原自香此趙丈徳麟賦玉簪花詩也歴數花品白而香者十花八九香也集藻賦増明田藝蘅玉簪花賦白花六出碧莖森森緑苞敷豔翠葉叢隂皜絲垂鬚黄檀綴心色美如玉形肖惟簪曰貴且重名比南金方其根萎嚴霜英抽湛露酷暑既徂凉飈初度拂拂翻榮亭亭挺素皓雪凝條明冰挂樹山梔為之抱慚水仙見而増妒縱玉井之蓮花亦同行而却歩廼若微雨乍沐淡然晩妝洗盡鉛華月映霓裳插瑤笄於緑鬢解瓊珮於華堂獨持雅潔以壓羣芳鄙芙蓉之多態笑蕙蘭其不香當百卉之搖落聳孤秀於清商故得列君階除逺彼塵坌舞媛致疑而反銜逸士欲投而長遯采下體而不遺入麗藻之粲論茍能刈蓍而不忘寧辭磨石而終鈍感徳輝於三秋媿草心之徑寸幸朝束於華冠雖夕隕而何恨五言古詩増金元好問同白兄賦瓶中玉簪畏景衆芳歇仙葩此夷猶冰姿出新沐娟娟倚清秋昨夢今見之風鬟玉搔頭誰言閨房秀髙情渺林丘碧筵古銅壺一室香四周懷人成獨詠逺思徒悠悠元劉因玉簪堂隂秋氣集幽花獨清新臨風玉一簪含情待何人含情不自展未展情更真徘徊明月光汎汎如相親因之欲有託風鬟渺冰輪七言律詩増元劉因玉簪花花中冰雪避秋陽月底隂隂鎖暗香玉瘦每憂和露滴心清惟恨有絲長且留宛轉圍沈水莫遣聯翩入粉囊只許幽人太相似蒼苔疎雨北窓凉原方廣徳玉簪不信搔頭花底重數莖秋濯露溶溶腰憎荆玉生前折影比崔娘月裏逢摘去何人憐素腕插來是處映秋容薄愁莫減冰霜骨十二金釵好向從七言絶句原唐羅隠玉簪雪魄冰姿俗不侵阿誰移植小窓隂若非月姊黄金釧難買天孫白玉簪宋王安石玉簪瑤池仙子宴流霞醉裏遺簪幻作花萬斛濃香山麝馥隨風吹落到君家黄庭堅玉簪宴罷瑤池阿母家嫩瓊飛上紫雲車玉簪墮地無人拾化作江南第一花鄭修玉簪花玉色瓷盆綠柄深夜凉移向小窓隂兒童莫訝心難展未展心時正似簪呉震齋玉簪花素娥昔日宴仙家醉裏從他寳髻斜遺下玉簪無覓處如今化作一枝花增明李東陽玉簪昨夜花神出蘂宫綠雲裊裊不禁風妝成試照池邊影祇恐搔頭落水中詩散句増金史肅玉簪香好在墻角幾枝開原孫鐸披拂西風如有待徘徊凉月更多情増劉龍山一瓶秋水玉簪香元趙雍淡然相對玉簪香明呉寛玉削簪頭露濯開詞増金黄庭筠謁金門秋蕭索燈火新凉簾幕翠被不禁臨曉薄南樓聞畫角想見玉壺冰蕚一夜西風開却夢覺烏嗁殘月落幽香無處著張雨滿江紅玉導纖長頓化作雲英香莢風弄影綠鬟撩亂搔頭斜插璞小還思釵燕並叢幽略比蕉心狹看柔鬚㸃綴半開時微烘蠟冰筯瘦瓊林滑芳徑底誰偷掐怕夜凉消得錦圍紅帀鵞管不禁仙露重蜜脾勝借清香發待使君絶妙好詞成須彈壓張翥露華瀛洲種玉總付與花神月底深斸琢就瑤笄光映鬢雲斜矗幾度借取搔頭别試漢宫裝束風露冷幽香半襟淡竚欄曲亭亭雪艶愁獨愛粉沁冰䇶鬚撚金粟石上那囘磨斷爭忍輕觸一自楚客歸來珠履舊遊誰續秋夢起殘妝半簪墜綠張雨東風第一枝清淚如鉛綠房迎曉寳階低擁雲葉蜻蜓飛上搔頭依前艶香未歇西窓夜雨怪簾底參差凉月正一叢深倚琅玕石上只愁磨折問瑤草應憐短髪曽醉墮無聲膩滑羞他金雀鈿蟬髙似水仙羅襪芳心斷絶誰與贈江臯瓊玦試折花擲作銀橋看舞素鸞囘雪别錄原種植春初雨後分其勾萌種以肥土勤澆灌即活分時忌鐵器花瓣拖麫香油煠過入少糖霜香清味淡可充清供取未開者裝鉛粉在内以線縛口久之婦女用以傅面經歲尚香増崆峒子骨鯁以玉簪花根汁滴之則化秋葵原秋葵與葵相似故名秋葵朝夕傾陽此葵是也本草作黄蜀葵宼宗奭云與蜀葵别種非蜀葵中黄者也一名側金盞莖髙六七尺葉如芙蓉深綠色開岐叉有五尖如人爪形狹而多缺六月放花大如椀鵞黄色紫心六瓣而側雅淡堪玩朝開午收暮落隨即結角大如拇指長二寸許本大末尖六稜有毛老則黑色其稜自綻内有六房子纍纍在房内狀如􅔾麻子色黑秋盡收二月種以手髙撒梗亦長大花子及根氣味並甘寒滑無毒為催生妙藥子宜浸油治瘡塗湯火傷彚考原説文黄葵常傾葉向日不令照其根増彦周詩話寫生之句取其形似故辭多迂弱趙昌畫黄蜀葵東坡作詩云檀心紫成暈翠葉森有芒揣摸刻骨造語壯麗後世莫及花經葵花九品一命瓶花譜秋葵八品二命集藻賦増唐韓偓黄蜀葵賦色配中央心傾太陽布葉近臨於玉砌移根逺自於銅梁蕚綠華未遇楊羲冠簪駊騀杜蘭香喜逢張碩巾帔飄揚銀漢之星機欲曙金臺之漏箭初長動人妖艶馥鼻生香千里鵠鶵濫得名於太液三秋菊蘂虚長價於柴桑向日微困迎風欲翔周昉神疲吮筆而深慚思拙江淹色沮擘牋而所恨才荒蝶翅堪憎蜂鬚可妒幾多之金粉遭竊一㸃之檀心被汚何須逼視漢夫人之鴛寢多羞不待含情晉天子之羊車自駐激電寒暄跳丸烏兎得不淹留深勞顧慕懊恨張京兆唯將桂葉添睂悵望齊東昬却把蓮花襯歩騷人易老絶色多愁曷忍在綺窓側畔唯當居繡户前頭目斷猶駐魂消未收映葉而似擎歌扇偎欄而若墮妝樓感荀粲之殷勤誓無緘著怨謝鯤之强暴未近風流清旦鶯嗁黄昬客散鶴頸兮長引猿腸兮屢斷攀條立處林烏應笑於後栖欹枕看時梁燕或聞於長嘆已而已而唯有醉眠於叢畔五言古詩増唐戴叔倫嘆葵花今日見花落明日見花開花開能向日花落委蒼苔自不同凡卉看時幾日廻原宋蘇軾題王伯􅆒所藏趙昌畫黄葵弱質困夏永竒姿蘇晩凉低昻黄金杯照耀初日光檀心自成暈翠葉森有芒古來寫生人妙絶誰似昌晨妝與午醉真態含隂陽君看此花枝中有風露香増梁棟黄葵乾坤有正氣間色皆為臣名葩據中央紅紫誰敢隣傾日不忘君衛足恐傷身㝠然無知識忠孝出本真林林天地間戴履而為人明靈秀萬物孰不尊君親嗟嗟叔季後利欲冺天倫邈哉望帝國産此瑞世珍九夏不趨炎三月不爭春髙秋風露冷孤標出清塵背時還獨立攬芳淚沾巾七言古詩増金元好問甲辰秋洛陽得黄葵子種之南庵明年夏六月作花佛經所謂閻浮檀金明淨柔軟令人愛樂者此花可以當之因為賦長韻芳蕤浥露嬌黄濕五疉湘裙輕襞積晨妝午醉一日間白白紅紅總狼籍上陽宫女要頭冠摹寫雖工破的難看來明淨復柔軟花中乃有閻浮檀千里移根洛陽陌主人不飲誰看客乞與金杯自傾側明年為渠當舉白五言律詩増唐崔涯黄蜀葵野欄秋景晩疎散兩三枝嫩蘂淺輕態幽香閑澹姿露傾金盞小風引道冠欹獨立悄無語清愁人詎知七言律詩原唐韋莊使院黄葵花薄妝新著淡黄衣對捧金爐侍醮遲向月似矜傾國貌倚風如唱歩虚詞乍開檀炷疑聞語試與雲和必解吹為報同人看來好不禁秋露即離披五言絶句増宋文同秋葵錦江何日别漆水今朝見清露繞顔色秋鵞一分淺范成大霜後紀園中草木種葵如種麥隔歲已下子僅成一榦花浪備四時氣金姚孝錫黄蜀葵傾心知向日布葉解承隂空側黄金盞誰人與對斟元趙孟頫黄葵詞仙掌鬱金衣朝陽風露晞可憐蜂與蝶祗解弄春暉明髙啓黄葵春晩獨餘芳風囘帶酒香美人偏愛看因似御衣裳王榖祥秋葵玉兒本來潔新妝不愛濃秋風羅袖薄飄颻若為容陳淳秋葵月上墻東阿秋光照庭户幽葩向人明泫似冷冷露素質倚秋風向人渾欲語春風莫相笑丹心自能許七言絶句原唐李渉黄葵此花莫遣俗人看新染鵞黄色未乾好逐秋風天上去紫陽宫女要頭冠増張祐黄蜀葵花名花八葉嫩黄金色照書窓透竹林無柰美人閒把嗅直疑檀口印中心薛能黄蜀葵嬌黄新嫩欲題詩盡日含毫有所思記得玉人春病較道家裝束厭禳時唐彦謙秋葵月瓣團圞翦赬羅長條排蘂綴鳴珂傾陽一㸃丹心在承得中天雨露多原宋劉攽黄葵白露清風催八月紫蘭紅藥共淒凉黄花冷淡無人看獨自傾心向太陽宋祁黄葵黄葵貴麗不夭饒一朶新晴松外髙還似邇英臨黼座曈曨曉日照天袍増陸游黄蜀葵開時閒淡歛時愁蘭菊應容預勝流剰欲持杯相領略一庭風雨不禁秋原王立美黄葵昔年南國看黄葵雲鬢金釵向後垂今日村家籬落下秋風寂寞兩三枝增元袁易題畫黄葵憶昔戎葵花下飲金杯春灔綠鬟欹祗今花似金杯側獨對西風詠折枝明李東陽黄葵不隨紅紫鬭芬華别有風流出畫家誰解人間真正色秋來交付與黄花沈周秋葵誰道紅葩夏日芳獨留黄種吐秋光五尺竹欄關不住還將一半露宫妝陸師道秋葵炎豔秋來故改妝薄羅閒淡試鵞黄傾城别有檀心在依倚西風送夕陽陳淳秋葵長門秋晩露淒淒䨇袖輕翻舊賜衣自笑不如桃與李春風吹向上林飛詩散句増元馬祖常紫暈成丹景黄敷綴綠幢郭鈺蠟光膩粉花正開翠袖捧出黄金杯原宋陳司封秋來似學金丹術戲把硫黄製酒杯潘徳久一樹黄葵金盞側勸人相對醉西風詞原宋晏殊菩薩蠻秋花最是黄葵好天然嫩態迎春早染得道家衣淡妝梳洗時晩來清露滴一一金杯側插向綠雲鬟便隨王母仙别録原製用曬黄葵須破其蘂則不腐花開盡帶青收其稭勿令枯槁水中浸一二日取皮為縷可織布及作繩用増物類相感志紙被舊而毛起者將破用黄蜀葵梗五七根搥碎水浸刷之則如新曼陀羅花増本草曼陀羅花一名風茄兒一名山茄子法華經言佛説法時天雨曼陀羅花又道家北斗有陀羅使者手執此花故後人因以為名曼陀羅梵言雜色也茄乃因葉形爾生北土人家亦栽之春生夏長獨莖直上髙四五尺生不旁引綠莖碧葉葉如茄葉八月開白花凡六瓣狀如牽牛花而大攢花中折駢葉外包而朝開夜合結實圓而有丁拐中有小子八月采花九月采實氣味辛温有毒洛陽花木記有千葉曼陀羅花層臺曼陀羅花集藻五言古詩増宋陳與義曼陀羅我圃殊不俗翠蕤敷玉房秋風不敢吹謂是天上香煙迷金錢夢露醉木蕖妝同時不同調曉月照低昻蓼花原蓼花其類甚多有青蓼香蓼葉小狹而薄紫蓼赤蓼葉相似而厚馬蓼本草綱目云馬蓼一名墨記草俗呼大蓼是也水蓼開寳本草云生於淺水澤中故名水蓼按爾雅薔虞蓼注云虞蓼澤蓼也即此葉濶大上有黑㸃木蓼一名天蓼蔓生葉似柘六蓼花皆紅白子皆大如胡麻赤黑而尖扁惟木蓼花黄白子皮生青熟黑人所堪食者三種一青蓼葉有圓有尖圓者勝一紫蓼相似而色紫一香蓼相似而香並不甚辛可食諸蓼春苖夏茂秋始花花開蓓虆而細長二寸枝枝下垂色粉紅可觀水邊甚多故又名水葒花名醫别録云馬蓼最大者名蘢薣即水葒也本草拾遺云天蓼即水葒本草綱目云葒草一名鴻􅀢一名蘢古一名游龍一名石龍一名大蓼身髙者丈餘節生如竹秋間爛熳可愛一種叢生髙僅二尺許細莖弱葉似栁其味香辣人名辣蓼並冬死唯香蓼宿根重生可為生菜青蓼可入藥古人用蓼和羮後世飲食不復用人亦鮮種藝今但以平澤所生香青紫三蓼為良崔豹古今注云青色者蓼紫色者荼性辛温無毒實主明目温中耐風寒下水氣去癧瘍止霍亂去面浮腫療小兒頭瘡苖葉除大小腸邪氣利中益智彚考増詩鄭風隰有游龍傳龍紅草也箋游龍猶放縱也正義此草直名龍耳而言游龍知謂枝葉放縱也周頌予又集於蓼疏蓼辛苦之菜其鎛斯趙以薅荼蓼傳趙刺也蓼水草也禮記内則蝸醢而苽食雉羮麥食脯羮雞羮折稌犬羮兎羮和糝不蓼疏和糝不蓼者此等之羮宜以五味調和米屑為糝不需加蓼也濡豚包苦實蓼濡雞醢醬實蓼濡魚卵醬實蓼濡鼈醢醬實蓼疏凡言實蓼者皇氏云謂破開其腹實蓼於其腹中更縫而合之也膾秋用蓼鶉羮雞羮鴽釀之蓼注釀謂切雜之也魴鱮烝雛燒雉薌無蓼疏薌無蓼者薌謂蘇荏之屬言三者調和唯以蘇荏之屬無用蓼也戰國䇿魏文子曰蓼蟲在蓼則生在芥則死非蓼仁而芥賊也本不可失呉越春秋越王念呉欲復怨非一旦也苦思勞心夜以接日臥則攻之以蓼述異記長沙定王故宫有蓼園真定王故園也爾雅翼淮南言水草之始海閭生屈龍屈龍生容華容華生蔈蔈生萍藻萍藻生浮草凡浮生不根茇者生於藻屈龍豈亦此龍草耶歛為屈縱為游是或一道也楚辭芳草譜蓼生水澤楚辭曰蓼蟲不知徙乎葵菜言蓼辛葵甘蟲各安其故不知遷也集藻賦原漢孔臧蓼蟲賦季夏既望暑往凉還逍遙諷誦遂居東園周旋覽觀憇乎南藩覩茲茂蓼紛葩吐榮猗那隨風綠葉厲莖爰有蠕蟲厥狀似螟群聚其間食之以生於是寤物託事推况乎人幼長斯蓼莫或知辛膏梁之子豈曰不云茍非徳義不以為家安逸無心如禽獸何五言古詩増元郝經甲子歲後園野蓼窞池蓮蒲短久旱餘淺淤墻隈積餘埃玉鳯秋不翥野蓼根莖堅幸得浸沮洳節葉瘦且赤蘼蕪交翠箸細蘂亦鮮潔粉米糅丹素獨窣裊輕穗離披滴清露水花淡晩色幽窅足真趣忽憶過夢澤千里渺煙樹蘆花與蓼花露錦蕩雪絮深入芙蕖藪逺映蒹葭渡舉鞭問飛鴻駐馬嚼佳句乃今四壁中浩渺隔煙霧日斜對幽叢聊以慰遲暮大似辛苦蟲無復風標鷺來因援沉溺底事極幽錮屢上刳腸書無地瀝血訴嗟嗟好花草焉用生此處祗因為詩人故故獨不去嘗膽如啖蔗食蓼猶饍御仰首但有天志節久愈著明袁凱蓼灘衍迤近横塘陂陀間幽渚輕穗含夕霏叢條偃秋雨縱横覆魚隊􅔚寂來鷗侶杖䇿時一臨逍遙更延佇五言律詩原唐鄭谷蓼花簇簇復悠悠年年拂漫流差池伴黄菊冷淡過清秋晩帶鳴蟲急寒藏宿鷺愁故溪歸不得憑仗繫漁舟増宋梅堯臣水葒灼灼有芳艶本生江漢濵臨風輕笑久隔浦淡妝新白鷺煙中客紅蕖水上鄰無香結珠穗秋露浥羅巾五言絶句増宋宋祁蓼花夏砌綠莖秀秋檐紅穗繁終然體不媚無那對虞翻文同蓼花紅芳宵露清翠節晩窓迎雨後曬殘日秋容滿檻亭蘇轍和文與可蓼嶼風髙蓮欲衰霜重蓼初發㑹使此池中秋芳未嘗歇七言絶句増宋梅堯臣和石昌言學士官舍水葒江天淡淡江水平江岸有花紅作穗今日特向都城開畫時只合銜魚翠蘇軾和文與可蓼嶼秋歸南浦蟪蛄鳴霜落横湖沙水清臥雨幽花無限思抱叢寒蝶不勝情范成大道見蓼花秋風裊裊露華鮮去歲如今刺釣船歙縣門西見紅蓼此身曽在白鷗前劉克莊水葒分紅間白汀洲晩拜雨揖風江漢秋看誰耐得清霜去却恐蘆花先白頭詩散句原宋張詠紅穗已沾巫峽雨綠痕猶帶錦江泥狂吟不覺驚鷗夢坐困翻疑在舊溪増唐栁宗元蓼花被隄岸陂水寒更淥錢珝難將垂岸蓼盈把當江蘺原宋石延年羣芳坐衰歇聊自舞秋風蘇軾叢蓼雖可喜輕紅隨秋薄唐羅鄴暮天新鴈起汀洲紅蓼花開水國愁宋宋祁花穗迎秋結晩紅園林清淡更西風林逋簇簇菰蒲映蓼花水痕天影蘸秋霞陸游老作漁翁猶喜事數枝紅蓼醉清秋唐韓愈蓼雜芳菲疇許渾池連秋蓼紅宋鄭獬鹽豉薦芹蓼陸游雪晴蓼甲紅唐白居易水蓼冷花紅簇簇温庭筠雨濕蓼花千穗紅詞原宋王詵行香子金井先秋梧葉飄黄幾囘驚覺夢初長雨微煙淡疎栁池塘漸蓼花明菱花冷藕花凉幽人已慣衾單枕冷任商飇催換年光問誰相伴終日清狂有竹間風樽中酒水邊牀増元張翥水龍吟芙蓉老去妝殘露華滴盡珠盤淚水天瀟灑秋容冷淡憑誰㸃綴瘦葦黄邊疎蘋白外滿汀煙穟把餘妍分與西風染就猶堪愛紅芳媚幾度臨流送逺向花前偏驚客意船窓雨後數枝低入香零粉碎不見當年秦淮花月竹西歌吹但此時此處叢叢滿眼伴離人醉别録原製用春初以壺盧盛水浸蓼子髙挂火上使暖生紅芽以備五辛盤與大麥麫相宜御定佩文齋廣羣芳譜卷四十七
