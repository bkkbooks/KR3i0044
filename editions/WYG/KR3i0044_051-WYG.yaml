body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷四十九花譜菊花二集藻序增唐駱賔王冒雨尋菊序白帝徂秋黄金勝友辭塵成契冒雨相邀問凉燠則鴻鴈在天敘交遊則芝蘭滿室砌花舒菊還同載酒之園岸葉低松直泛維舟之浦參差逺岫斷雲將野鶴俱飛滴瀝空庭竹響共雨聲相亂抑折巾於書閣行閱飄麰揖雅步於琴臺坐聞流水字中科斗競落文河筆下蛟龍爭投學海珠簾映水風生曵露之濤錦石封泥苔濕印龜之岸泛蘭英於戸牖座接雞談下木葉於中池厨烹野鴈墜白花於濕桂落紫蔕於疎藤雖物序足悲而人風可愛留姓名於金谷不謝季倫混心迹於玉山無慚叔夜云爾原宋劉蒙泉菊譜序草木之有花浮冶而易壞凡天下輕脆難久之物皆以花比之宜非正人逹士之所好然予觀屈原之為文香草龍鳯以比忠正而菊與菌桂荃蕙蘭芷同為所取松者天下堅正之木也陶淵明乃以松配菊連語而稱之夫屈原淵明實皆正人逹士其於菊貴重之如此是菊雖以花為名固與浮冶易壞之物不可同年而語也且菊固有異於物者凡花皆以春盛而實皆以秋成菊獨以秋花恱茂於風霜揺落之時此其得時者異也有葉者花未必可食而康風子乃以食菊仙此其花異也花可食者根葉未必可食而陸龜蒙云春苖恣肥得以採擷供左右杯案又本草云以正月取根此其根葉異也夫以一草之微自本至末有功於人如此加以色香態度纖妙閑雅可為丘壑燕靜之娛然則古人取以比徳而配以歳寒之松夫豈徒然而已哉洛陽風俗大抵好花菊品比他州為盛劉原孫伯紹者隱居伊洛廣植諸菊朝夕嘯詠其側盖已有意譜之而未暇也崇寕甲申九月余為龍門之遊得至君居顧而樂之相與訂論因隨其名品論序於左以列諸譜之次史正志菊譜前序菊草屬也以黄為正所以概稱黄花漢俗九日飲菊酒以祓除不祥盖九月律中無射而數九俗尚九日而用時之草也南陽酈縣有菊潭飲其水者皆壽神仙傳有康生服其花而成仙菊有黄花北方用以準節令大畧黄花開時節候不差江南地暖百卉造作無時而菊獨不然考其理菊性介烈高潔不與百卉同其盛衰必待霜降草木黄落而花始開嶺南冬至始有微霜故也本草一名日精一名周盈一名傅延年所宜貴者菊苖可以採花可以藥囊可以枕釀可以飲所以高人隱士籬落畦圃之間不可一日無此花也陶淵明植於三徑采於東籬裛露掇英汎以忘憂鍾會賦以五美謂圓華高懸準天極也純黄不雜后土色也早植晩發君子徳也冒霜吐穎象勁直也杯中體輕神仙食也其為所重如此然品類有數十種而白菊一二年多有變黄者余在三水植白菊百餘株次年盡變為黄花今以色之黄白及雜色品類可見於吳門者二十有七種大小顔色殊異而不同自昔好事者為牡丹芍藥海棠竹筍作譜記者多矣獨菊花未有為之譜者殆亦菊花之闕文也余始以所見為之若夫耳目之未接品類之未備更俟博雅君子與我同志者續之增史正志菊譜後序菊之開也既黄白淺深之不同而花有落者有不落者蓋花瓣結密者不落盛開之後淺黄者轉白而白色者漸轉紅枯於枝上花瓣扶疎者多落盛開之後漸覺離披遇風雨撼之則飄散滿地矣王介甫武夷詩云黄昬風雨打園林殘菊飄零滿地金歐陽永叔見之戲介甫曰秋花不比春花落為報詩人子細吟介甫聞之笑曰歐陽九不學之過也豈不見楚辭云夕餐秋菊之落英東坡歐公門人也其詩亦有欲伴騷人賦落英與夫却繞東籬嗅落英亦用楚辭語耳王彦賔言古人之言有不必盡循者如楚辭言秋菊落英之語余謂詩人所以多識草木之名蓋為是也歐王二公文章擅一世而左右佩紉彼此相笑豈非於草木之名猶有未盡識之而不知有落有不落者耶王彦賔之徒又從而為之贅疣蓋益逺矣若夫可餐者乃菊之初開芳馨可愛耳若夫衰謝而後落豈復有可餐之味楚辭之過乃在於此或云詩之訪落落訓始也意落英之落蓋謂始開之花耳然則介甫之引證殆亦未之思歟或者之說不為無據余學為老圃而頗識草木者因併書於菊譜之後范成大范村菊譜序山林好事者或以菊比君子其說以為歳華晼晩草木變衰乃獨煜然秀發傲睨風露此幽人逸士之操雖寂寥荒寒而味道之腴不改其樂者也神農書以菊為養生上藥能輕身延年南陽人飲其潭水皆壽百歳使夫人者有為於當世醫國惠民亦猶是而已菊於君子之道誠有臭味哉月令以動植志氣候如桃桐華直云始華至菊獨曰菊有黄華豈以正色獨立不伍衆草變詞而言之歟故名勝之士未有不愛菊者至淵明尤甚愛之而菊名益重又其花時秋暑始退歲事既登天氣高明人情舒閒騷人飲流亦以菊為時花移檻列斛輦致觴詠間謂之重九節物此非深知菊者要亦不可謂不愛菊也愛者既多種者日廣吳下老圃伺春苖尺許時掇去其顛數日則岐出兩枝又掇之每掇益岐至秋則一榦所出數千百朶婆娑團植如車蓋熏籠矣人力勤土又膏沃花亦為之屢變頃見東陽人家菊圖多至七十種淳熙丙午范村所植止得三十六種悉為譜之明年將益訪求他品為後譜云書增魏文帝與鍾繇九日送菊書歲往月來忽逢九月九日九為陽數而日月並應俗嘉其名以為宜於長久故以享宴高㑹是月律中無射言羣木百草無有射地而生惟芳菊紛然獨榮非夫含乾坤之純和體芬芳之淑氣孰能如此故屈平悲冉冉之將老思餐秋菊之落英輔體延年莫斯之貴謹奉一束以助彭祖之術傳原元楊維楨黄華傳先生姓黄字華其先有日精者初生筮之繇曰煜煜煌煌綠衣黄裳徳與坤協數用九彰九九相仍俾爾壽昌佐用炎皇啓於兌方世為中黄夫中五數也寄旺四時九九重陽數也兌秋方也雖寄旺四時而盛必於秋乎陶氏旺春劉氏旺夏陶劉氏謝而中黄氏其昌乎後日精以養生術佐農皇氏壽登一百二十餘歲嘉其功封之雍州之土為壽鄉公賜姓中黄氏後有治蘠者注姬公旦爾雅旦上其名綴衣薦服於帝帝服之喜特賜御愛黄至孫英其祚始落三湘與屈原同夕餐英子為華西入秦遇陽翟大賈衒金爭價咸陽市華文備五色名次月令至今夏小正以華之善記節名為節華後入漢以服餌法干上出入宮禁后妃侍兒咸與之飲酒乞其祝辭曰長壽長壽宣帝時華以外國肥甘進上嘗之喜曰金盞銀柈真神仙食也吾不能效武帝食露盤矣華嘗以氣岸髙自標置曰予圜冠準天純色準地當贊天地開八荒壽域黄中通理獨暢四支非予前聞人佐農皇志也時陽九厄矣遂入平蓋山鍊九華大藥時時與好事者出沽酒市中見者咸呼為九華先生彭澤令陶潛方棄官柴桑聞先生名特延致之後徙宅東潛不敢名惟以九華呼之潛當九月九日無酒與先生口講服餌法語之曰南山朝來致有佳氣耳少時江州刺史王𢎞送酒至潛以酒讓先生飲先生憙曰吾得拍浮此足矣潛平日交惟兩人先生與五鬛大夫也五鬛在先生上先生戲與五鬛較短長曰汝雖長遭斧創我雖短升中堂又以其能相殿最曰吾茹能使饑人辟糧汝能乎曰能吾飲能使癃殘人康寜壽考汝能乎曰能曰吾一出能使時王知正氣一灰迹能使諸蟈族吞其譟而不聲汝能乎曰不能矣曰不能何以上吾也五鬛亦曰吾一出能棟天子明堂一灰迹能染歴代之文章子能乎曰不能也曰此吾所以上子也潛聞而笑曰九華既失五鬛亦未為得也二三子黜徳滅巧將太上從太上無名功故無窮於是二人者相與持酒懽甚潛頹然醉醉則遣客而二人者侍門下至蒙霜露不去先自譜其族凡一百六十三黜其冒姓名者曰滴金馬蘭童萬錢覆等凡六種題曰九華壽譜藏於家云題跋增宋劉克莊題建陽馬君菊譜菊之名著於周官詠於詩騷植物中可方蘭桂人中惟靈均淵明似之後漢胡廣貴壽偶然耳乃托菊水以自神糞土之評萬古不磨嗚呼非廣之辱菊之辱也至忠獻韓公始有晩香之句膾炙人口近時番禺崔公辭相印不拜自號菊坡俱為本朝佳話嗚呼非二公之榮菊之榮也建陽馬君譜菊得百種各為之詠其嗜好清絶可喜亦幸君未為人爵所縻林下趣專獲與菊相周旋如此未知君他日官逹將為伯始乎抑為韓為崔乎將以榮是菊乎抑以辱是菊乎君其謹之勿使菊有遺憾明李東陽周原已席上題十月賞菊卷東籬掃徑慨花事之將䦨西社傳書念𤓰期之未晩百年易過九日重遭惟菊為隱逸之稱而冬乃閉藏之令挺孤芳於獨茂脫衆屣於羣紛視蒲柳之望誰先比松柏之凋尤後神農嘗藥著靈品於方書屈子餐英播遺芬於辭苑物非逺取類實羣分闢地成田八世守柴桑之業揮毫作賦一鄉傳甫里之風君惟有之是以似之我則知者不如樂者敢將幽意用託微馨懷彼隰之皇皇詠初筵之秩秩貯之以數仞之華屋得其所哉佩之以五色之錦囊永為好也念菲葑之無下愧糠粃之在前未揭齋眉先題簡首雜著原宋劉蒙泉定品或問菊奚先曰色與香而後態色奚先曰黄者中之色土王季月而菊以九月花金土之應相生而相得者也其次莫若白西方金氣之應菊以秋開則其氣鍾焉陳藏器云白菊生平澤花紫者白之變紅者紫之變也此紫所以為白之次而紅所以為紫之次云有色矣而又有香有香矣而復有態是花之尤者也或曰花以艶媚為悅而子以態為後歟曰吾嘗聞於古人矣妍卉繁花為小人松竹蘭菊為君子安有君子而以態為悅乎至於具香與色而又有態是君子而有威儀者也菊有名龍腦者具色與香而態不足者也菊有名都勝者具態與色而香不足者也菊之黄者未必皆勝而置於前者重其色也菊之白者未必皆劣而列於中者次其色也雜羅香毬玉鈴之類則以瓌異而升焉至於順聖楊妃之類轉紅受色不正故雖有芬香態度不得與諸花爭也然余獨以龍腦為諸花之冠是故君子貴其質焉後之視此譜者觸類而求之則意可見矣說疑或謂菊與薏有兩種而陶隱居日華子所記皆無千葉花疑今譜中或有非菊者然余嘗讀隱居之說謂莖紫色青作蒿艾氣為苦薏今余所記菊中雖有莖青者然而氣香味甘枝葉纖少或有味苦者而紫色細莖亦無蒿艾之氣又今人間相傳為菊其已乆矣故未能輕取舊說而棄之也凡植物之見取於人者栽培灌溉不失其宜則枝葉華實無不猥大至其氣之所聚乃有連理合穎䨇葉並蔕之瑞而况於花有變而千葉者乎日華子曰花大者為甘菊花小而苦者為野菊若種園圃肥沃之處復同一體是小可變為甘也如是則單葉變為千葉亦有之矣牡丹芍藥皆為藥中所用隱居等但記花之紅白亦不云有千葉者今二花生於山野類皆單葉小花至於園圃肥沃之地栽鋤糞養皆為千葉大花變態百出奚獨至於菊而疑之唐杜甫秋雨嘆曰雨中百草秋爛死堦下决明顔色鮮著葉滿枝翠羽蓋花開無數黄金錢說者以為即本草决明子此物乃七月作花形如白匾豆葉極稀疎焉有翠羽蓋與黄金錢也彼蓋不知甘菊一名石决為其明目去翳與石决明同功故吳越間呼為石决子美所嘆正此花耳而杜趙二公妄引本草以為决明子疎矣銘增晉王淑之蘭菊銘蘭既春敷菊又秋榮芳薫百草色艶羣英孰是芳質在幽愈馨嵇含菊花銘煌煌丹菊暮秋彌榮葳蕤圓秀翠葉紫莖詵詵神仙徒餐落英頌原晉成公綏菊頌先民有作詠茲秋菊綠葉黄華菲菲彧彧芳踰蘭蕙茂過松柏其莖可玩其葩可服味之不已喬松等福傅統妻莘氏菊花頌英英麗草稟氣靈和春茂翠葉秋曜金華布濩高原蔓衍陵阿揚芳吐馥載芬載葩爰採爰拾投之醇酒御於王公以介睂壽服之延年佩之黄耉文園賔客乃用不朽贊增晉郭璞菊贊菊名日精布華𤣥月仙客薄采何憂華髪賦御製菊賦當金飈之蕭摵正珠露之飄零睹百卉之具腓感菀枯之逓更疇晩序而挺節矯氣化而敷榮爰有紫蔕含芳黄華逞茂擢苕穎於春初曜丰容於霜後先梅萼而吐芬繼蘭叢而擅秀既勁操之彌堅實寒香之可嗅爾其密葉蒙茸繁英歴琭霞蔚雲蒸煙披雨沐色徴土徳之純氣禀金行之肅舞燈影而紛披傍籬根而芳馥似幽人之相依豈世情之共逐是以丘園逸叟山澤癯儒植而供玩擷以當蔬存真味於淡泊協潛徳以敷腴亦有餐霞御氣乘雲握符盤飣桐杞囊繫茱茰或年壽之永延或災患之潛袪斯其著效於仙靈之籙尤不可以耳目拘也至若賦餐英於楚客傳送酒於晉賢泛甘馨於南郡準節令於渾天罔不貞操卓爾高韻悠然宜名流之競羨亦譜籍之長編矧茲北闕秋深西山氣爽餘桕葉之參差剰楓林之莽蒼蝶揚揚而媚秋鴈􅗳􅗳而流響寒漠漠而侵階月溶溶而度幌爾乃横逸態以寡儔吐層蘤而直上種類間錯名品紛羅映小山之叢桂覆潭水之澄波低昂兮如紫衣之垂袖璀璨兮如白貝之編珂禀黄中之通理知中美之孔多蓋與松筠而共勁亦視桃李而殊科彼夫揚霜傑於詩人誇日精於本草藉滋培於寒雨綻鮮華於清曉咸以孤潔方幽人之貞高逸擬君子之道茍其歴歲寒而長存何恨乎挺生之不早增魏鍾㑹菊花賦何秋菊之可奇兮獨華茂乎凝霜挺葳蕤於蒼春兮表壯觀乎金商延蔓蓊鬱緣阪被岡縹榦緑葉青柯紅芒芳實離離暉藻煌煌微風扇動照曜垂光於是季秋九月九日數并置酒華堂高㑹娛情百卉彫瘁芳菊始榮紛葩韡曄或黄或青乃有毛嬙西施荆姬秦嬴妍姿妖艶一顧傾城擢纖纖之素手雪皓腕而露形仰撫雲髻俯弄芳榮晉孫楚菊花賦彼芳菊之為草兮禀自然之醇精當青春而潛翳兮迄素秋而敷榮於是和樂公子雍容無為翺翔華林駿足交馳薄言采之手折纖枝飛金英以浮旨酒拂翠葉以振羽儀偉茲物之珍麗兮超庶類而神竒潘岳秋菊賦垂采煒於芙蓉流芳越乎蘭林遊女望榮而巧笑鵷雛遙集而弄音若乃真人採其實王母接其葩或充虚而養氣或增妖而揚蛾既延期以永壽又蠲疾而弭痾齊卞伯玉菊賦佇寒丘以彌望覿中霜之嫩菊肇三春而懐芬凌九秋以愈馥不履苦而淪操不在同而表淑傷衆花之飄落嘉茲卉之能靈振勁翮以揚綠含凝露而吐英唐楊炯庭菊賦庭菊美貞芳也天子幸於東都皇儲監守於武徳之殿以門下内省為左春坊今庶子裴公所居即黄門侍郎之㕔事也其庭有菊焉中令薛公昔拜瑣闥此焉遊處今兼左庶子止於東㕔甍宇連接洞門相向每罷朝之後未嘗不游於斯詠於斯覽叢菊於斯歎其君子之徳命學士為之賦是日也薛愷以親賢為洗馬田巖以幽貞為學士高元思張師徳以至孝托後車顔强學沈尊行以博聞兼侍讀周琮李憲王祖英曹叔文以儒術進崔融徐彦伯劉知柔石抱忠以文章顯徳行則許子豐耆舊則權無二駱縯則古訓之前識張相則老莊之後英並承高命咸窮體物小子託於吹竽之末敢闕其辭哉遂作賦云日之貞矣於彼重陽菊之榮矣於彼華坊含天地之精氣吸日月之淳光雲布霧合箕舒翼張鬱兮蔓衍郁兮芬芳珉枝金萼翠葉紅芒其在夕也言庭燎之晳晳其向晨也謂明星之煌煌爾其萬里年華九州春色花的爍兮如錦草綿連兮似織當此時也和其光同其塵應春光而早殖及夫秋星下照金氣上騰風蕭蕭兮瑟瑟霜刺刺兮稜稜當此時也弱其志强其骨獨歲寒而晩登雨還風去天長地久純黄象於后土故採桑而菊衣輕體御於神仙故登山而菊酒文賔採之而羽化康公服之而不朽東極於是長存南陽以之睂壽胡太尉之允誠光輔漢庭萬機理三階平及暮年華髪垂肩秋菊長英蠲邪滌瘵於焉永貞鍾太尉之聲實彛倫魏室道合鹽梅功成輔弼降文屋之命修彭祖之術保性和神此焉終吉君章請老歲久懸車秋風生兮北園夕白露濕兮前階虚佇閑庭之曠邈對凉菊之扶疎人生行樂孰知其餘淵明解印退歸田野山鬱律兮萬里天蒼莽兮四下憑南軒以長嘯出東籬而盈把歸去來兮夫何為者若夫窈窕重闈亘青瑣兮接皇扉深沉大壯通肅成兮連博望乃有􅘌鄉貴族薛縣名家共汾河之鼎氣同庶子之春華朝遊夕處徘徊顧慕難揺落於三秋偉貞芳於十步伊纖莖之菲薄荷君子之恩遇不羡池水之芙蓉願比瑶山之桂樹歲如何其歲已秋叢菊芳兮庭之幽君子至止悵容與而淹留歲如何其歲將逝叢菊芳兮庭之際君子至此聊從容以卒歲原陸龜蒙杞菊賦天隨生宅荒少墻屋多隙地著圖書所前後皆樹以杞菊春苖恣肥得以採擷供左右杯案及夏五月枝葉老硬氣味苦澀旦暮猶責兒童輩掇拾不已人或歎曰千乗之邑非無好事之家日欲擊鮮為具以飽君者多矣君獨閉闗不出率空腸貯古聖賢道徳言語何自苦如此生笑曰我幾年來忍饑誦經豈不知屠沽兒有酒食耶退而作杞菊賦以自廣云惟杞惟菊偕寒互緑或穎或苕煙披雨沐我衣敗綈我飯脫粟羞慚齒牙茍且粱肉蔓延駢羅其生實多爾杞未棘爾菊未莎其如予何其如予何增宋蘇軾後杞菊賦并序天隨生自言常食杞菊及夏五月枝葉老硬氣味苦澀猶食不已因作賦以自廣始余嘗疑之以為士不遇窮約可也至於饑餓嚼囓草木則過矣而余仕宦十有九年家日益貧衣食之奉殆不如昔者及移守膠西意且一飽而齋厨索然不堪其憂日與通守劉君廷式循古城廢圃求杞菊食之捫腹而笑然後知天隨之言可信不謬作後杞菊賦以自嘲且解之云吁嗟先生誰使汝坐堂上稱太守前賔客之造請後掾屬之趨走朝衙逹午夕坐過酉曾杯酒之不設攬草木以誑口對案顰蹙舉箸噎嘔昔隂將軍設麥飯與蔥葉井丹推去而不齅怪先生之眷眷豈故山之無有先生听然而笑曰人生一世如屈伸肘何者為貧何者為富何者為美何者為陋或糠覈而瓠肥或梁肉而墨瘦何侯方丈庾郎三九較豐約於夢寐卒同歸於一朽吾方以杞為糧以菊為糗春食苖夏食葉秋食花實而冬食根庶幾乎西河南陽之壽張栻續杞菊賦張子為江陵之數月時方中春草木敷榮經行郡圃意有所欣非花柳之是問眷杞菊之青青爰命采掇付之庖人汲清泉以細烹屏五味而不親甘脆可口蔚其芬馨蓋日為之加飯而他物幾不足以前陳飯已捫腹得意嘔吟客有問者曰異哉先生之嗜此也乎蘇公之在膠西值黨禁之方興歎齋厨之蕭條乃覽乎草木之英今先生當無事之時據方伯之位校吏奔走頤指如意廣厦延賔毬場享士清酒百壺鼎臑爼胾宰夫奏刀各獻其技顧無求而弗獲雖醉飽其何忌而乃樂從夫野人之餐豈亦下取乎葑菲不然得無近於矯激有同於脫粟布被者乎張子應之曰天壤之間孰為正味厚或腊毒淡乃其至猩唇豹胎旋取詭異山鮮海錯紛糾莫計茍滋味之或偏在六府而成贅極口腹之欲初何出於一美惟杞與菊中和所萃謂勁不苦滑甘靡滯非若他蔬善嘔走水既瞭目而安神復沃煩而滌穢驗南陽於西河又頽齡之可制此其為功曷可殫紀况於膏粱之習貧賤則廢雋永之求不得則恚兹隨寓之必有雖約居而足恃殆將與之終身又可貽夫同志子獨不見吾納湖之隂乎雪銷壤肥其茸葳蕤與子婆娑薄言掇之石銚瓦盌啜汁咀虀高論唐虞詠歌書詩嗟乎微斯物孰同先生之歸於是相屬而歌殆日晏以忘饑元郝經牡丹菊賦有序初入新館客將宋日新致硃砂紅牡丹菊一本祗三四花慘悴萎暗不以為竒遂植之穿廊西之隙地今歲忽茂逹成叢高六七尺及秋而放數百花所未見也適王甫書狀生朝而其花尤盛故作賦以寓感其辭曰西風悄兮幽扄木葉下兮空庭忽異卉之呈芳乃示予以不情郁霞腴之春姿敷玉瀣之秋英蹙綘綃於青苞翦翠羅於綠莛拆緗桃與紫薇訝鞓紅與鶴翎高層層以奕奕重裊裊以盈盈結膩黄以為心抹沉粉而含馨凝夜氣以夸晝姹斜陽而嚲晴仍牡丹之花王彊將菊以為名嗚呼噫嘻時哉匪時造化則奪形色不移雖反常而似妖顧真宰豈予欺寓國色於羇孤謝凡品之芬菲掞金氣於西陸吐霜葩於東籬鄙傾城之鄭袖期佩蘭之湘纍獨超出於羣倫不繫累於等夷特以秋而為春乃竒花之出竒彼自為一時殆非後時也且持杯而浥露更嚼句以待月儘吳江之飛霜甚窮海之饕雪與後凋之姚魏共終全於晩節明何景明白菊賦有序甲子九月十四日馮侍御宴集出白菊詠賞屬予賦之蓋以奉賔主之歡洽耳豈有望於榮觀哉辭曰繄季秋之將望予恤夫序次之易代既無暇於遊覽亦索處而寡類接芳鄰之招引誠欽志於雅誨厪主人之投轄肅羣俊而弭蓋廼陳秋卉以侑觴冀逸興之可貸咸式燕以延賞異過時而尚愛喜幽玩以怡情追佳節之莫待豈無得於物觀實有感於斯㑹猥受簡以抒思庶形狀之具載爾其葳紫莖而上擢麃竒荄以孤植葉萋萋其微靄萼栗栗以寒色申纖縞以自貞羞組綵之外飾承危朶而不傾挺柔枝而益力香冉冉而不繁豔娟娟而稍抑態屢覿而愈妍意凝想而彌極始嚴整而莫䙝終溫郁而可即華不露而已章思欲語而復黙神超有而入無豈髣髴之遽得廼若閒館重深高幕虚凉簷蕭蕭以下月庭藹藹而降霜燦灼爍以映夕紛委綴而明廊素娥兮聯裙青女兮駢妝縹輕鬢以雲鬚皎靚質而雪光驂連蜷兮鸞鶴服陸離兮珮璫信雕容之可赧嗤效顰之不量於是賔徙倚而久竚若耿耿其懷傷釭滅影兮續膏夜就深兮移牀馳留歎於永謝結華思於餘芳允思美之所遇亦既隱而復揚乃歲律之甫遷慨金氣之何速鳥栖栖而斂翮飇颯颯以驚木怳窮莽於廣隰班紛薄於修陸衆已謝於塲野獨宛轉於寒谷甘苦心於螻蟻等末幹於樸􅈪雖曠絶以自持胡偃蹇而下伏夕淹雨而泣素朝披煙而委綠羌守操以堅冰徒有容之若玉儻衣袖之是將亦絃琴而可錄吾觀夫懷逹人之隱徳抱貞女之幽衷詎嬰情於豐華奚移志於始終桃早秀而先萎槿晨敷而暮空茍清白之為尚曷􅇗菲之足崇嗟予之不淑兮撫年運而興悲覩兹植之所由懼修名之失時彼斯人之同志吾何俗之不隨廼孑孑以矯激羡草木之所為偉夫君之超越幸方圓之有持矧諸公之奮竒俱發蹤之可師顧㑹合之不偶常寡歡而多離指孤芳而締好創遊燕以為嬉誠後期之不忘或有徴於微辭後白菊賦有序菊有白色者超越他品予嘗賦之矣丙寅之秋京師桃李皆花予庭是種生意淒然久而不敷至十月始盛開色益鮮麗予感焉復作後賦大運荒乎何停隂陽奄以代謝究動植之所由嗟何物之弗化時維孟冬金虎兮屏舍白帝兮徂駕氣厲厲兮始嚴景曶曶兮將下值抱疴以閒居循周除而蕩思庭葉委以陳翳階蘚穢而不治覽庶草之先零撫茲根之獨遲彼桃李之非令亦競榮而呈姿􅁮丹華以鬱鬱冒緑林而萋萋胡衆人之好陊班紛慕其芳菲朝絲吹兮填闉夕車馬兮成蹊咎𤣥樞之舛訛諒人事之尤違矧天道之無逺或省予而弗知繄予植之雖晩實鄙志之所欣賤羣穠之溷濁恥雜敷之糾紛俱並進以取姸表孤花以見珍寧他卉之我先甘避迹而弗羣乃其蘊金氣以内凝標皜質而外映蔓不踰垣繁不被徑葉塗塗其自沃枝矯矯而獨勁宛含意其孰語若鍾情而未定女幽房而專情士窮巷而寡行服縞組以修容珮珩璜以昭令寄岑寂以怡心襲馨香以飾性無良朋以修好憾邪妁之干正又如下國之擯臣離宫之斥嬪心怦怦以濳惻懷耿耿而苦辛緬中宵以前席念昔日之下陳慨微欵之莫宣若有怨而弗伸分孤蹇以終畢羌孰予兮幸親結柔條而三嗅重延佇而欽心寂􅔚館以容與散塵營以滌襟鑒微月之曖曖步列星之森森天窈窈以條革疾風起而夕隂念冱寒之已逼慘獨悲夫衆林茍操性之殊軌豈華色之遽沉内惝悢以懷顧怳屏營以咨嗟覩日月之減毁恐霜雪之增加抱孤英以自明悵情親之我遐慮寒香之終匱俾予身之蹉跎負大塊以馮生豈惟是乎獨嘉物何盛而弗衰亦何枯而弗華夫芝焚而柏薪皆菸顔而殞葩伊桃李之既零亦奚異乎泥沙委常運以流轉復胡戚而胡夸誠予衷之不爽彼夸戚兮如何亂曰有美一人揚清芬兮縞袖合沓囘素雲兮被服文徽皓繽紛兮令儀襜襜斂玉手兮傾城獨立世不有兮時無蹇修誰則覯兮谷逶迤兮雪霰來兮衆芳萎兮嗟伊人兮秉志不囘兮徐氏園菊賦晨步小園一望疎林白雲縹緲黄葉紛紜風蕭蕭而異響寒凛凛而侵人驚天道已殘秋覺霜氣之稜稜鴈嘹嚦而南還蛩啾唧而哀吟值時景之荒凉菊方華於後庭何其晩也是造物之無知乎善爾碧枝㸃翠嫩萼噴金無桃李之妖艶抱松柏之堅心雖素雅之非凡柰何生乎不辰寄寸根於塵世胡為乎不遇乎陽春及其華也不獲寵而鮮妍兮懷淒楚於秋霜隂雲慘淡以蔽天兮日色薄而無光日色既薄而苦短兮惜乎金英之徒芳遭風欺而雨妒兮獨㷀㷀而不變其常吁嗟佳哉細觀其高世出塵之姿幽黙徘徊之態嬾隨俗以富貴愛清冷而盤桓似有為而不見用於時者也似抱道而隱逸者也順天而安分者也豈習俗之能知邪重曰聊植疎籬清且幽兮天運閉塞隱而潛兮隱而潛兮霜淒雨霏兮百草罷綠爾猶存兮困苦自持時窮見操兮行比幽人素位履貞兮文賦散句增晉傅𤣥菊花賦布濩河洛縱横齊秦掇以纖手承以輕巾揉以玉英納以朱脣服之者長壽食之者通神盧諶菊花賦綠葉雲布黄蘂星羅陶潛歸去來辭三徑就荒松菊猶存梁吳均與顧章書幸富菊花偏饒竹實山谷所資于斯已辦四言古詩原唐蕭穎士菊榮一篇五章采采者菊芬其榮斯紫英黄萼照灼丹墀愷悌君子佩服攸宜王國是維大君是毘貽爾子孫百祿萃之采采者菊于邑之城舊根新莖布葉垂英彼美淑人應家之禎有絃既鳴我政則平宜爾棟崇必復其慶采采者菊于邦之府隂槐翳柳邇楹近宇彼勞者子喧卑是處慨其莫知蘊結誰語企彼高人色斯遐舉采采者菊于賓之館既低其枝又弱其幹有匪君子是焉披翫良辰㫖酒宴飲無算愴其仳别終然永歎歲方晏矣霜露殘促誰其榮斯有英者菊豈微春華懿此貞色人之侮我混于薪棘詩人有言好是正直五言古詩原晉袁山松詠菊靈菊植幽崖擢穎陵寒飇春露不染色秋霜不改條陶潛飲酒結廬在人境而無車馬喧問君何能爾心逺地自偏採菊東籬下悠然見南山山氣日夕佳飛鳥相與還此中有真意欲辨已忘言秋菊有佳色裛露掇其英汎此忘憂物逺我遺世情一觴雖獨進杯盡壺自傾日入羣動息歸鳥趨林鳴嘯傲東軒下聊復得此生和郭主簿和澤周三春清凉素秋節露凝無遊氛天高風景澈陵岑聳逸峰遥瞻皆竒絶芳菊開林耀青松冠巖列懷此貞秀姿卓為霜下傑銜觴念幽人千載撫爾訣檢素不復展厭厭竟良月增梁王筠摘園菊贈謝僕射舉靈茅挺三脊神芝曜九明菊花偏可憙碧葉媚金英重九惟嘉節抱一應元貞泛酌宜長久聊薦野人誠唐韋應物效陶彭澤霜露悴百草時菊獨妍華物性有如此寒暑其奈何掇英泛濁醪日入㑹田家盡醉茅簷下一生豈在多韓愈晩菊少年飲酒時踊躍見菊花今來不復飲每見恒咨嗟佇立摘滿手行行把歸家此時無與語棄置奈悲何白居易東園翫菊少年昨已去芳歲今又䦨如何寂寞意復此荒凉園園中獨立久日淡風露寒秋蔬盡蕪没好樹亦凋殘唯有數叢菊新開籬落間攜觴聊就酌為爾一留連憶我少小日易為興所牽見酒無時節未飲心欣然近從年長來漸覺取樂難常恐更衰老強飲亦無歡顧謂爾菊花後時何獨鮮誠知不為我借爾暫開顔和錢員外早冬翫禁中新菊禁署寒氣遲孟冬菊初坼新黄間繁綠爛若金照碧仙郎卜隱日心似陶彭澤秋憐潭上看日慣籬邊摘今來此地賞野意潛自適金馬門内花玉山峰下客寒芳引清句吟翫煙景夕賜酒色偏宜握蘭香不敵淒淒百卉死歲晩冰霜積唯有此花開殷勤助君惜席夔霜菊時令忽已變行看被霜菊可憐後時秀當此凛風肅淅瀝翠枝翻淒清金蘂馥凝姿節堪重澄艶景非淑寧袪青女威願盈君子掬持來汎樽酒永以照幽獨宋蘇舜欽和聖俞庭菊不謂花草稀實愛菊色好先時自封殖坐待秋氣老類裝翠羽枝已喜金靨小嚴霜發層英益見化匠巧揺疑光艶落折恐叢薄少一日三四吟一吟三四遶賞專情自迷美極語難肖得君所賦詩爛熳惬懐抱朗詠償此心清尊為之倒梅堯臣舟上採菊泯泯平慢流行當季秋月演漾過汀洲汀洲芳杜歇白露夜正霏黄菊寒更發采以泛酒巵不獨映華髪和劉原甫省中新菊華省切星斗沉沉嚴燕房秋風茂陵孫種菊爛生光天晴蝴蝶飛上下舞䨇黄劉郎才筆豪移榻吟在傍日晩吏已散殘景上粉墻有酒無飲伴掇英襟裾香還思陶淵明棄官歸柴桑東籬獨此物盈把恨無觴賴有白衣來好事遺壺漿適意各一時豈乏同舍郎謹和相國屋上菊叢屋上有叢菊結根深瓦縫既無地勢美又乏土力擁乃因塗明生不因人所種亦能應節開焉取入公用公來步廣庭聞鴈目始縱忽見粲然英降植合常從賔僚席其傍詠翫意已重物莫厭僻逺會遇良可頌依韻和通判把菊有寄湖邊草樹多蠧葉已少色唯菊不畏霜淡艶如有徳自與蘭並生非因人所植愛貴曾未厭秋日短苦逼朋好各相望採持空嘆息臨杯不能飲對案不能食借問君何憂節物感人極歐陽修西齋手植菊花過節始開偶書奉呈聖俞秋風吹浮雲寒雨灑清曉鮮鮮墻下菊顔色一何好好色豈能常得時仍不早文章損精神何用覻天巧四時悲代謝萬物惜凋槁豈知寒鑑中兩髩甚秋草東城彼詩翁學問同少小風塵世事多日月良㑹少我有一樽酒念君思共倒上浮黄金蘂送以清歌裊為君發朱顔可以却君老原蘇洵菊騷人足竒思香草比君子况此霜下傑清芬絶蘭茝氣禀金行秀徳備黄中美古來鶴髪翁餐英飲其水但恐蓬藋傷課童加料理增司馬光秋原菊高原向揺落叢菊始滋榮草際浮金碧照人䨇目明何湏夭生理玉斚泛餘英王安石黄菊有至性團團城上日秋至少光輝積隂欲滔天况乃草木微黄菊有至性孤芳犯寒威采采霜露間亦足慰朝饑原蘇軾詠甘菊越山春始寒霜菊晩愈好朝來出細粟稍覺芳歲老孤根䕃長松獨秀無衆草晨光雖照耀秋雨半摧倒先生臥不出黄葉紛可掃無人送酒壺空腹嚼珠寳香風入牙頬楚些發天藻新荑蔚已滿宿根寒不槁揚揚弄芳蝶生死何足道頗訝昌黎公恨爾生不早增蘇軾贈朱遜之詩并引元祐六年九月與朱遜之㑹議於穎或言洛人善接花歳出新枝而菊品尤多遜之曰菊當以黄為正餘可鄙也昔叔向聞鬷蔑一言知其為人予於遜之亦云黄花候秋節逺自夏小正坤裳有正色鞠衣亦令名一從人偽勝遂與天力爭易姓寓非族改顔隨所令新竒既易售粹駮宜相傾疾惡逢伯厚識真似淵明君言我所印世論豈敢評願君為霜風一掃紫與赬和子由記園中草木野菊生秋澗芳心空自知無人驚歲晩惟有暗蛩悲花開澗水上花落澗水湄菊衰蛩亦蟄與汝歲相期楚客方多感秋風詠江蘺落英不滿掬何以慰朝饑陳與義菊黄花不負秋與秋作光輝夜霜為作祟朝日為解圍今晨豈重九節意入幽菲孤芳擅天地衆卉亦已微殷勤黄金靨照耀白板扉沽酒欲壽花孔方與我違靜坐絶省事未覺此計非夕英豈不腴騷人自難肥書懷示友蕭蕭十月菊耿耿照白草開窓逢一笑未覺徐娘老風霜要飽更獨立晩更好韓公真躁人顧用憂懷抱范成大寄題向撫州采菊亭一葉起秋色衆綠凋歲華耿耿霜露側餘此黄金葩西風滿天地孤芳照塵沙殷勤開小築花氣日夕嘉落英楚纍手東籬陶令家兩窮偶寓意豈必真愛花不如亭中人一笑了天涯采采勿虚度門前欲高牙陸游陶淵明云三徑就荒松菊猶存蓋以菊配松也余讀而感之因賦此詩菊花如端人獨立凌氷霜名紀先秦書功標列仙方紛紛零落中見此數枝黄高情守幽貞大節凛介剛乃知淵明意不為汎酒觴折嗅三歎息歲晩彌芬芳小飯賞菊菊得霜乃榮性與凡草殊我病得霜健每却稚子扶豈與菊同性故能老不枯今朝喚父老采菊陳酒壺舉袖舞翩躚擊缶歌嗚嗚秋晩遇佳日一醉詎可無晩菊蒲柳如懦夫望秋已凋黄菊花如志士過時有餘香眷言東籬下數株弄秋光粲粲滋夕露英英傲晨霜高人寄幽情采以泛酒觴投分真耐久歲晩歸枕囊陳篔窓詠菊花手種黄金花摩挲待其成朝來風雨過萬彚秋竛竮起問花知否獨立長亭亭嘗於清霜下退然得此生南山與東籬我亦學淵明久落塵網中叫花花不應韓竹坡采菊擷我百結衣為君采東籬半日不盈掬明朝還滿枝悠然何處是千古正如斯金党懷英西湖晩菊重湖滙城曲佳菊被水涯高寒逼素秋無人自芳菲鮮飇散幽馥晴露隨餘滋蹊荒綠苔合采采嘆後時古瓶貯清泚芳樽湔塵霏逺懐淵明賢獨往誰與期徘徊東籬月歲晏有餘悲元郝經野菊乾坤入消數萬物呈晩節秋晏菊始華荒叢翳林樾野迥幽姿清岡斷寒艶接絲蟲􅇢青苞啼螿抱枯葉瀼露積玉華層層擁金屑我欲摘以杯飲之濯中熱霜栽郁髙標胡與荒穢列嗟爾夷惠儔玉質難變滅不謂無人看便使幽香歇安得老瓦盆坐對澆古月何中菊二首我耕不半畝黄花列千叢蕭條變衰時一夕萬里風立孤不作難英英異風骨君看牆東客夜寒步霜月菊花如幽人梅花如烈士同居冰雪中標格不相似道路阻荒寒故人萬里餘菊枝儻可折持以寄逺書吳景奎采菊爽氣浮西山風煙澹原隰悠然出衡門佳節逢九日衆草萋以青黄菊正秋色采之不盈把妙意良自得謂能制頽齡可泛忘憂物驩言命壺觴萬事付酣適永懐東籬人俛仰已陳迹王翰題菊我憶故園時繞籬種佳菊交葉長青蔥餘英吐芳馥别年二十載粲粲抱幽獨豈無桃李顔歲晩同草木及茲覩餘芳使我淚盈掬離披已欲摧瀟灑猶在目雨露豈所偏歲月不可復歸去來南山餐英坐空谷戴良對菊聯句翡翠翦秋葉金瓊鏤寒英良駢枝競戢戢植􅆬紛亭亭翰逞芳固的皪鬬媚益晶熒璜幽姿匪人造逸態諒天成轅傍芽萌庶孽乳萼孕懷綳溫螫虎縮逗翳㾕蚝枯梮莖良遲倩飇陣颯疾役雷輥輷翰挐楹互雜沓跂檻逓紛爭璜秋榮姿􅛭婐春粲失嫈嫇轅瑩奪鵝肪膩飛攘鷗毳輕溫韻冽帖疎穴迹祕慰羇傖良魏書奉延輔酈水滋甘馨翰締芳笑蘭友論雅傲梅兄璜摵摵感餘鎩采采憐孤撐轅譜之已百品詠之復千名溫或繁若朝弁或潔若藍瑛良或密若飄霰或粲若羅星翰或赴若輻輳或屹若峩屏璜或散若㽅豆或聚若輜軿轅或潤若璜佩或麗若金籯溫或鮮如鷺振或悴如魴赬良或斥如僕𨽻或積如雲仍翰或翩如春蝶或熠如宵螢璜或偃如膂傴或昻如氣盈轅或揚如袂舉或側如杯傾溫或盛喜若笑或哀憂若酲良或即階陛立或俱盆盎升翰或儕處士逸或儷節婦貞璜或翔疑孔翥或峙訝鸞停轅或詫天姥巧或覘地媼靈溫朝采有元亮夕餐有屈平良用酬我嘉節來踐爾佳盟翰餖容交錯飣巵許逡廵行璜摘鮮盛棃栗傾濁饒醁􅌬轅起酬足蹂躪坐嚥腹膨脝溫陸味萃南品海腥極東烹良已暢一朝樂復哦千古情溫句竒嫓犖确韻古鏗韶韺良馳驟門接武格鬬掀鏖兵翰味辛薑桂性語險魅魈驚溫怯敵迹屢屏懾敗眼頻瞠良籍湜走且躓郊島弛復獰翰尊卑異川岳清濁分渭涇璜遐思時踸胃凝睇靡瞤睛轅顧慚駑駘力莫抗騏驥衡溫四美已云具二難亦既并翰愁去踰激矢歡來劇抽絣璜即此成放曠何用困拘儜良永緝婀娜佩庶濯塵垢纓翰僧宗衍對菊有感百草競春色惟菊有秋芳豈不涉寒暑本性自有常疾風吹髙林木落天雨霜誰知籬落間弱質懷剛腸不怨歳月暝所悲廹新陽永歌歸去來此意不能忘明胡翰維南有佳鞠維南有佳鞠風露發清妍離離碧玉樹燦燦黄金錢色含坤裳美質抱日精圓藴靈自女几滋布瀰樊川既入神后品還充仙子餐中壽登百歲上壽延千年千年與百歲何異瞬息間獨有幽貞節可比金石堅托以奉君子歲晏期弗諼王芾題秋菊軒九月霜露零秋氣已云肅草木盡凋悴而有籬下菊燦燦如有情盈盈抱幽獨我欲餐其英采之不盈掬呼兒具雞黍白酒正可漉素心二三人于焉叙心曲陶然付一醉萬事亦已足詠歌柴桑詩千載有餘馥李東陽墨菊二首白霜被原隰黃菊秋始花餘馨引遥袂采掇初還家秀色雖可玩玩久不復華入畫清且古為詩正而葩幽懐託揮寫庶用傳無涯持此問真幻無言空自嗟畫菊不畫香香空詎堪掬畫菊不畫色色似花已俗都無色香在安用此為菊登堂見孤標入手宜可觸自非識菊者但看桃李足古色今不知世人空有目王問涇上觀菊涇上一老人愛菊如愛稼踏葉到林丘散襟茅茨下清歌吐芳音采采漸盈把睠言五色姿陽春似相假晩節良可親予懐自舒冩有物茍㑹心那辭在荒野歲晏不可留柴車夙云駕奕奕車馬客誰解閑行者董其昌盆菊衆芳豈不妍秋英自清絶意與幽人會標名霜下傑容以桃李顔艶彼茱茰節翩翩五陵子佳色紛相悅積紫照朱茵堆黄象金埒賞韻一以乖籬堵寧辭拙亭亭盆中菊偏承美人擷香分甘谷幽色借冰壺潔對此讀離騷心魂生瑩徹悠然見西山孤峰正嶔櫱御定佩文齋廣羣芳譜卷四十九
