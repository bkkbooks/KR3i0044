body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十二花譜雞冠増花史雞冠花俗名波羅奢花碧雞漫志吴蜀雞冠有一種小者髙不過五六寸目曰後庭花原有掃帚雞冠有扇面雞冠有纓絡雞冠有深紫淺紅純白淺黄四色又有一朶而紫黄各半名鴛鴦雞冠又有紫白粉紅三色一朶者又有一種五色者最矮名夀星雞冠扇面者以矮為佳帚様者以髙為趣今處處有之三月生苗入夏髙者五六尺矮者纔數寸其葉青柔頗似白莧菜而窄􅕏有赤脉紅者莖赤黄者白者莖青白或圓或扁有筋起六七月莖端開花穂圓長而尖者如青箱之穂扁卷而平者如雄雞之冠花大有圍一二尺者層層疊卷可愛穂有小筒子在其中黒細光滑與莧實無異花最耐久霜後始蔫苗花子氣味俱同甘寒無毒主治瘡痔及血病止腸風瀉血赤白痢崩中帶下分赤白用子入藥湏炒彚考原楓牕小牘雞冠花汴京謂之洗手花中元節前皃童唱賣以供祖先増花經雞冠八品二命花木考蘇黄門詠雞冠花詩後庭花草盛憐汝繫興亡世遂以雞冠為玉樹後庭花不知世説諸書有蒹葭倚玉樹語杜少陵飲中八仙歌復有皎如玉樹臨風前之句玉樹一種㫁非草本或又謂花經所載别有後庭豈花名後庭而以玉樹嘉之耶且宋元以来或以為山礬或以為瑒花楊用修王敬美復以為丁香梔子雞冠之說何可盡信也原花史解縉嘗侍上側上命賦雞冠花詩縉曰雞冠本是臙脂染上忽從袖中出白雞冠云是白者縉應聲曰今日如何淺淡妝只為五更貪報曉至今戴却滿頭霜集藻賦増明仲𢎞道雞冠花賦并序百卉以雨露為生簷下則雨露減矣乃雨露減者霜霰亦減當草枯木落之時此花反得因簷下而晩盛嗚呼嗇扵此者豐扵彼造化生物之盈虧固如是其難料也人奈何以目前之菀枯定將来之榮落邪因作賦以紀之聿觀桃李豔春荷蕖吐夏秋桂霜迎冬梅雪迓夢草開晨睡蓮閉夜候既至而芬芳蘂欲敷而莫假爰有一蘤在欄之下鸂􅈑為羣鴨鳬作亞丹同鶴頂冠非鶡野狀毰毸而不飛類翰音而實啞乃生長扵階除托根株扵簷厦日光射兮無多雨露霏兮亦寡方其炎蒸甫歇金風乍颸羣株炫采爛焉盈枝爾乃痩梗寒條較芙蓉而更寂疎根朗葉對籬菊其多思似班姬退處夫長門如苧蘿幽閉乎西施迨夫青霜降兮木落白露瀼兮草萎衆卉兮凋謝爾獨映乎條枚凉飇凛凓兮摧之不能摧風霰飄零兮欺之不可欺爾扵是强項獨發傲骨生姿朱紫奮采黄白争竒瓣如扇而半疊子似綴而分披露盤擎兮五色仙掌揺兮九疑胡前者之偃蹇而後者之陸離余仰而思俯而惟識造物之有定理豈苦樂而無等夷然則前之偃蹇也如甯戚之扣角如百里奚之炊扅又如蘓武之吞氊卧雪王章之涕泣牛衣後之陸離也如唐且華顛而為秦相吕尚皓首而作周師更如張蒼七十而稱漢佐王祥六十八而遇晉知先者未必為幸後者不足云遅苦者乃所醸樂樂者適足増癡物有循環之數人無長盛之時茲一微卉兮且然豈榮枯禍福兮而造化乃有所私五言古詩原宋梅堯臣雞冠神農記百卉五色異甘酸乃有秋花實全如雞幘丹籠煙何聳聳泫露更團團取譬可無意得名殊足觀逼真歸造化任巧即雕剜赤玉書留魏丹砂句誦韓誠能因物比誰謂入時難有客驅辭頴臨風運筆端嘗嗟古吟闕毎惜此芳殘揣情苦精妙繼音慚未安増孔平仲雞冠我初種雞冠其小乃毫芒曽未得㡬時忽已過我長根株既猥大枝葉亦開張吐花凌朝曦生意殊未央隂風自西来慘淡驅清霜一夜忽變故葉萎花已黄當此繁盛時為爾償壺觴及今乃腐草好翫安可常呼童盡翦㧞時恐踐蹋傷庭除稍曠濶耳目加清凉竹枝久蒙蔽迥立獨蒼蒼原無名氏雞冠秋至天地閉百芳變枯草愛爾得雄名宛然出陳寳未甘階墀陋肯與時節老赤玉刻縝栗丹芝謝彫槁鮮鮮雲葉卷粲粲鳬翁好由来名實副何必榮華早君看先春花浮浪難自保増元郝經雞冠夷則播新律卉木協秋候綰結流火餘的皪金天宿峩峩列庭除摘摘儼雄秀炎帝朝火官絳幘軒宇宙植立竟不拜離披擁青袖奕葉初類莧吐心漸如豆脉絡引絲起一片珊瑚痩雲芝茁紅腴紫茵卷翠脰碎顆蹙丹砂肉綻殷血透怒割赤龍耳勁磔還亂糅麻葉薄且聳山字缺乃覆查牙欲成角擁腫下連咮生全餘小穂展盡帶殘皺昂藏偃膺髙突兀出羣驟還將早霞映欲向朝日雊月露終夜栖風雨㡬回鬭再礪復自止交退誰與救區區閒草花象物與接搆弭兵日觀戰亦是自貽咎垂簾且相忘髙枕卧清晝七言律詩増宋歐陽澈和世弼雞冠花芳名從古號雞冠赭􅀈醒然却一般不語宋牕何足賣難通圅谷漫勞㸔倚風縱有如丹頂遇敵應無似錦翰空費栽培汚庭砌到頭不若植芝蘭原明何棟如詠雞冠花日下飛来孰可儔雲中養就氣偏柔懶施金距當雄敵為戴霞冠慕逺逰獨立莓苔閒伴鶴卑栖蘋藻静羣鷗何如化作幽人夢嗁破三湘萬古愁五言絶句増宋范成大題張希賢畫雞冠號名極形似摹冩與真逼聊以畫滑稽慰我秋園寂七言絶句原唐羅鄴雞冠花一枝濃艶對秋光露滴風揺倚砌旁曉景乍㸔何處似謝家新染紫羅嚢宋孔平仲種花口號幽居裝景要多般帶雨移花便得看禁柰久長顔色好繞堦更使種雞冠王令白雞冠如飛如舞對瑶臺一頂春雲若翦裁誰教移根蓂莢畔玉雞知應太平来趙企詠雞冠花秋光及物眼猶迷著葉婆娑擬碧雞精采十分佯欲動五更只欠一聲嗁楊萬里雞冠花出墻那得丈髙雞只露紅冠隔錦衣却是吴兒工料事㑹稽真箇不能嗁陳倉金碧夜䨇斜一隻今栖紀渻家别有飛来矮人國化成玉樹後庭花錢熙雞冠花亭亭髙出竹籬間露滴風吹血未乾學得京城梳洗樣舊羅包却緑雲鬟趙山臺雞冠花木雞不與衆雞同曽逐旌陽上碧空學得仙家餐玉法至今木血不能紅楊㢲齋雞冠花擢擢髙花血染猩却憐金距起閒争宋家忩下宜栽此莫問臨風不解鳴増元姚文奐題畫雞冠花何處一聲天下白霜華晩拂絳雲冠五陵鬭罷歸来後獨立秋亭血未乾詩散句原宋百氏集雨餘疑飲啄風動欲飛鳴對立如期鬭初開若欲飛増明沈周髙冠紅突兀獨立似晨雞原宋黄庭堅紫冠黄細網絲窠蝶繞蜂圍奈晩何楊萬里有時風動頭相倚似向階前欲鬬時郭應祥而風吹得一枝生昻首風前不飛去别録原種植清明下種喜肥地用簸箕扇子撒種則成大片髙者宜以竹木架定庶遇風雨不摧折卷曲水仙増長物志水仙六朝人呼為雅蒜南陽詩注此花外白中黄莖幹虛通如蔥本生武當山谷間土人謂之天蔥原水仙叢生下濕地根似蒜頭外有薄赤皮冬生葉如萱草色緑而厚春初扵葉中抽一莖莖頭開花數朶大如簪頭色白圓如酒杯上有五尖中承黄心宛然盞様故有金盞銀臺之名見洛陽花木記其花瑩韻其香清幽一種千葉者花片卷皺下輕黄上淡白不作杯狀世人重之指為真水仙一云單瓣者名水仙千瓣者名玉玲瓏本草云盖一物二種耳學圃餘疏云以單葉者為貴出嘉定短葉髙花最佳種也亦有紅花者此花不可缺水故名水仙根味苦微辛寒滑無毒治癰腫及魚骨鯁花作香澤塗身理髪去風氣彚考増三餘帖和氣旁薄隂陽得理則配元榮扵庭配元即今水仙花也一名儷蘭一曰女星散為配元内觀日疏姚姥住長離橋十一月夜半大寒夢觀星墜扵地化為水仙花一叢甚香美摘食之覺而産一女長而令淑有文因以名焉觀星即女史在天柱下故迄今水仙花名女史花又名姚女花集異記薛䕩河東人幼時扵窓櫺内窺見一女子素服珠履獨歩中庭歎曰良人㳺學艱扵㑹面對此風景能無悵然扵袖中出畫蘭卷子對之微笑復涙下吟詩其音細亮聞有人聲遂隐扵水仙花下忽一男子從叢蘭中出曰娘子久離必應相念阻扵跬歩不啻萬里亦歌詩二篇歌已仍入叢蘭中䕩苦心强記驚訝久之自此文藻異常一時𫝊誦謂二花為夫婦花原清冷傳湯夷華隂人服水仙八石為水仙是名河伯増三柳軒雜識水仙為雅客學圃餘疏水仙宜置瓶中前接蠟梅後接江梅真嵗寒友也瓶史水仙神骨清絶織女之梁玉清也瓶花譜水仙一品九命原花史謝公夢一仙女畀水仙花一束明日生謝夫人長而聰慧能吟詠唐元宗賜虢國夫人紅水仙十二盆盆皆金玉七寳所造宋楊仲囦自蕭山致水仙一二百本極盛乃以兩古銅洗萟之學洛神賦體作水仙花賦集藻賦増宋髙似孫水仙花前賦有序水仙花非花也幽楚窈𦕈脫去埃滓全如近湘君湘夫人離騷大夫與宋玉諸人世無能道花之清明者輙見乎辭天以一而生神坎以習而成元渫沖奥以致潤抱孤貞以成妍禹何知以能海羲何神而開乾際壑炁之無畔壯英心之自仙悲莫悲乎巫咸之鄉哀莫哀乎原胥之淵迅英挺以如濯肯徘徊而自憐至若鮫館截綃而凝霜貝庭含璣而媚川蒼茫乎三島之接霧杳𦕈乎十洲之滙天雲雨閑霽水空澄鮮一色如磨萬波不顛亦有帝女兮泣竹湘君兮鼓絃神妃兮解佩冰夷兮扣舷是皆凝姿約素挺粹含娟以婉自將以淑相宣芳以氣屬妙以辭傳指北渚以將下薄西津而驟旋或搴芳若或采佳荃有蘭可餐有蘋可搴扵是樂極忘歸塵空失蠲萬慮俱泯餘情獨筌扣冰娥以勺尠訪瑶母而潔􅀈挹水星以請命託神祇而垂甄已矣乎超萬刼以自蛻麗一徽而獨涓懐琬琰以成潔抱雪霜以為堅參至道以不死秉至精而長年是蓋苞水徳之靈長合五行之自然者乎水仙花後賦有序余既作前水仙賦疑不足以渫余之情者乃依稀洛神賦為後辭尚庶㡬乎余從太史㳺覽山川汎瀟汨下澧沅摩嶷雲息梧煙嵗莫天寒僕痡車顛爾乃釋鑣乎茝涯進秣乎芝㕓周旋乎荆滸騁望乎湘淵扵是神疑目駭心離意惻即之戃怳適焉髣髴覩一羙人扵水之側乃拊從者而訊之曰汝有識扵彼者乎彼何人者甚閑且潔也從者進曰僕聞茲水之靈曰湘夫人然則太史公之所遇其或是乎其形維何僕願知之余告之曰其狀也皓如鷗輕朗如鵠停瑩浸玉潔秀含蘭馨清明兮如閬風之翦雪皎浄兮如瑶池之宿月其始来也炯然層冰出蛟壑其徐進也粲然清霜宿瓊枝沈詳弗矜燕婉中度不穠不纖非怨非訴美色含光輕姿約素瓌容雅態芳澤不汚素質窈裊流暉㛹娟抱徳貞亮吐心芳蠲婉嫿幽静志㤗神閑柔扵修辭既丰且鮮飭躬被服稽圖合章峨五采之英珥兮錯九芝之明璫舞碧霓之修帶兮妥英雲之輕装顔有鍊而如灼體非薫而彌香沐姱容之練練乗清氣之徜徉扵是舒懐肆逸且娱且顰羽盖醫映翠旄繽紛軃金揺之欲堕兮玩晴洲之青蘋余衷耽其静孌兮黯淡蕩而馳神媒不靈扵締歡兮託湘波以通勤暢中靈之胥悟兮捐余璫扵水濱懿玉儀之静荘允約矩而應規輕瑶華而不御兮指二南而揚詩謂皎日之可鑒兮非暗室之自欺數解佩之夙遇兮風嫋嫋而凝思志貞介而言妙兮誓守禮以將之於是靈修竦然嬿婉徘徊拊孤影以欲翥心將飛而仍回褰蓀幬之芳烈燕芷房之玫瑰感幽志之悽激兮喟揚音而彌哀爾乃衆真縹渺並㳺嘯侣或濟西澨或臨北渚或采幽蘅或茹芳杜約洛川之神妃㑹巫隂之竒女清莫清乎姮栖愁莫愁乎牛渚媠輕裾之裔裔泠清飇而雲舉體迅飛鴻俶若輕雲流睇横波餘芳氤氲其度有則不顛不危優柔靡忒必兢必祇温乎如玉􅁮分陸離精采相授羌余其悲扵是川后斂飇冰夷却濤龍伯獻珠鮫人貢綃躍三虯以指塗蕤蒼芝而夾御䨇螭帖其馴乗儼華斿之布濩鴛鴦嘯而先驅翡翠翼而齊騖扵是趨彭蠡過洞庭洗月轂飛星軿流清聲而吐竒誦坤乾之大經畫三靈而不汨潛一意而長醒恍揚袂以如失雪微汍而霑纓拊佳期之不来日冉冉而西征夐微素之孰寄誰其將余英瓊揚清波而微注指潛淵而自驚恍精采之相授迄難陳其餘情扵是㳺倦思歸路異神留遺思杳𦕈寤寐好逑蹇悠悠而何之指寒川而薄憩蘭菲菲而襲余睇碧雲而揺曳信心㑹而神交豈綢繆之未契竦僕夫之儆余命速駕乎蘭枻其毋惑扵所悦當陳古而為之制元任士林水仙花賦眇伊人之蟬蛻兮宅清泠以為扉越蓬隔弱窅不知其㡬千里兮跂余望之忽軒窓之翠碧兮見此綽約之芳姿曳青蔥之華裾兮倚玉薤之披披逍遥清霜之夕徘徊明月之辰佩乞碧霞衣紉緑雲金杯盥雨玉盤承津􅆽和注淳斟酌天均扵時庭空人静萬竅不作聲沉歩虛之歌奏杳鈞天之樂江妃具俎以進羞海若充賔而酬酢持杜觶而未揚想堂中之歡樂余亦洗醆更酌接芳蕤而為客縱歌頽然不知天河之既落明姚綬水仙花賦伊昔涪翁夙罹謫逐行邁阻修浮水奔陸方歸與以息駕乃燕坐扵蔀屋惟是屋也依髙山臨大江影薄髙雲聲飛怒瀧敞宇衡門洞乎八窓式遣懐扵吟嘯忽有都乎神娏爾乃乍近乍遥水面微歩羅韤生塵綃裳沾露腰纖弱蘭脣冶樊素匪揚桂旗匪蹋神魚遽引遽却或疾或徐袖翩翻兮婉娩帶繚繞兮紓舒悵數年之獨往鄙良夜以鰥居矯望延佇掠盻躊躇汎若㫁梗浮猶馮虚乃若貼金蓮扵玉趾眷茲樂胥扵焉邇止瑪瑙坡荒仙王祠圯睇梅兄扵嶺頭懐礬弟扵澗涘進左右而諗之曰水上歩月彼其仙邪惟炫素質不御鉛華中有金蕤輕蒙臂紗衝斥暮雨揮霍朝霞爾或見之而豈吾之過誇邪左右屏息對曰彼之来斯誠類仙子馨香芬芳容光旖旎其綽約也儼藐姑之神其聫娟也齊洛川之子初雖瞻馳終莫摹擬是則主人之所見僕輩之所跂者也扵是之時涪翁啞然而作聲彼人泯然而無迹江風惟清江月自白倀倀何之翳翳寢息晨興向明躑躅扵庭忽幽花之托根依后土以降靈胡然生之大痩嵗晏流形宋玉招魂之賦莊周夢蝶之經翁遄作詩調同金石有頃比夕載驗厥跡無被花之懊惱出門一笑而横大江之空碧五言古詩増宋陳與義詠水仙花五韻仙人緗色裘縞衣以裼之青幌紛委地獨立春風時吹香洞庭暖㺯影清晝遅寂寂籬落隂亭亭與予期誰知園中客能賦㑹真詩朱子賦水仙花隆冬凋百卉江梅厲孤芳如何蓬艾底亦有春風香紛敷翠羽帔温靘白玉相黄冠表獨立淡然水仙裝弱植愧蘭蓀髙標摧冰霜湘君謝遺褋漢水羞捐璫嗟彼世俗人欲火焚𠂻腸徒知慕佳冶詎識懐貞剛淒凉柏舟誓惻愴終風章卓哉有遺烈千載不可忘陳傅良水仙花江梅丈人行嵗寒固天姿蠟梅微著色標致亦背時胡然此柔嘉支本僅自持廼以平地尺氣與松篁夷粹然金玉相承以翠羽儀獨立萬槁中冰膠雪垂垂水仙誰强名相宜未相知刻畫近脂粉而况山谷詩吾聞抱太和未易形似窺當其自英華造物且霽威平生恨剛褊未老齒髪衰掇花寘膽瓶吾今得吾師許仲企水仙花定州紅花甆塊石藝靈苗芳苞茁水仙厥名為玉霄適從閩越来緑綬擁翠條十花冒其顛一一振鷺翹粉蕤間黄白清香從風飄回首天台山更識膽瓶蕉七言古詩原宋黄庭堅王充道送水仙花五十枝凌波仙子生塵襪水上盈盈歩微月是誰招此斷腸魂種作寒花寄愁絶含香體素欲傾城山礬是弟梅是兄坐對真成被花惱出門一笑大江横五言律詩増元錢選水仙花圖帝子不沉湘亭亭絶世妝曉煙横薄袂秋瀬韻明璫洛浦應求友姚家合譲王殷勤歸水部雅意在分香七言律詩増宋韓維謝到水仙二本黄中秀外榦虛通乃喜嘉名近帝聰密葉暗傳深夜露殘花猶及早春風拒霜已失芙蓉艶出水難留菡蓞紅多謝使君憐寂寞許教綽約伴山翁楊萬里詠千葉水仙花并序世以水仙為金盞銀臺盖單葉者其中有一酒盞深黄而金色至千葉水仙其中花片捲皺宻蹙一片之中下輕黄而上淡白如染一截者與酒杯之狀殊不相似安得以舊日俗名辱之要之單葉者當命以舊名而千葉者乃真水仙云薤葉蔥根兩不差重蕤風味獨清嘉薄揉肪玉圍金鈿細染鵞黄剰素紗臺琖原非千葉種丰容要是小蓮花向来山谷相看日知是他家是當家水仙花生来弱體不禁風匹似蘋花較小豊腦子醲熏衆香國江妃寒損水晶宫銀臺金盞談何俗礬弟梅兄品未公寄語金華老仙伯凌波仙子更凌空原劉克荘水仙花嵗華揺落物蕭然一種清風絶可憐不許淤泥侵皓素全慿風露發幽妍騷䰟灑落沉湘客玉色依稀捉月仙却笑浩翁太脂粉誤將髙雅匹嬋娟増元仇逺題趙子固水墨雙鈎水仙卷冰薄沙昬短草枯采香人逺隔湘湖誰留夜月羣仙珮絶勝秋風九畹圖白粲銅盤傾沆瀣青明寳玦碎珊瑚却憐不得同蘭蕙一識清醒楚大夫鄧文原題趙子固水墨雙鈎水仙卷仙子凌波佩陸離文魚先乗殿馮夷積冰斵雪揚靈夜鼓瑟吹竽㑹舞時海上瑶池春不斷人間金盌事堪疑天寒日暮花無語清淺蓬莱當問誰原明屠隆詠水仙花娟娟湘洛浄如羅幻出芳䰟儼素娥夜静有人来鼓瑟月明何處去凌波蕭疎冷艶冰綃薄綽約風鬟露氣多直是靈根堪度世妖容知不傍池荷梁辰魚詠水仙花幽修開處月微茫秋水凝神黯淡妝繞砌霧濃空見影隔簾風細但聞香瑶壇夜静黄冠濕小洞秋深玉珮凉一叚凌波堪畫處至今詞賦憶陳王五言絶句増宋楊萬里水仙花韻絶香仍絶花清月未清天仙不行地且借水為名開處誰為伴蕭然不可鄰雪宫孤弄影水殿四無人原明于若瀛詠水仙水花垂弱蔕嫋嫋緑雲輕自足壓羣卉誰言梅是兄増王榖祥水仙花仙卉發璚英娟娟不染塵月明江上望疑是弄珠人瑶環月下鳴翠帶風中舉胡然洛浦神胡然漢濵女陳淳水仙玉面嬋娟小檀心馥郁多盈盈仙骨在端欲去凌波荒圃淑氣回寒柯發光澤下有白玉花玲瓏映深碧七言絶句御製見案頭水仙花偶作二首翠帔緗冠白玉珈清姿終不汙泥沙騷人空自吟芳芷未識凌波第一花冰雪為肌玉錬顔亭亭如立藐姑山羣花只在軒忩外那得移来几案間増宋陳搏詠水仙花湘君遺恨付雲来雖墮塵埃不染埃疑是漢家􅇽徳殿金芝相伴玉芝開劉攽水仙花早扵桃李晩扵梅冰雪肌膚姑射来明月寒霜中夜静素娥青女共徘徊黄庭堅共郡送水仙花并二大本折送東園粟玉花併移香本到寒家何時持上玉宸殿乞與官梅定等差劉邦直送水仙花得水能仙天與竒寒香寂寞動冰肌仙風道骨今誰有淡掃蛾眉篸一枝錢塘昔聞水仙廟荆州今見水仙花暗香靚色撩詩句宜在林逋處士家次韻中玉水仙花二首借水開花自一竒水沉為骨玉為肌暗香已壓荼䕷倒只此寒梅無好枝􅌎泥已作白蓮藕糞壌能開黄玉花可惜國香天不管随縁流落野人家張耒賦水仙花宫樣鵞黄緑帶垂中州未省見仙姿只疑湘水綃機女来伴清秋宋玉悲范成大次韻龔養正送水仙花色界香塵付八還正觀不起况邪觀花前猶有詩情在還作凌波歩月看楊萬里水仙花江妃虛却蘂珠宫銀漢仙人謫此中偶趁月明波上戲一身冰雪舞東風額間拂煞御袍黄衣上偷將月姊香待倩春風作媒妁西湖嫁與水仙王張孝祥和人詠水仙花二首瘴土風煙那有此只疑姑射是前身仙風道骨難消得付與霜臺衣繡人浄色只應撩處士國香今不落民家江城望㫁春消息故遣詩人詠此花朱子用子服韻謝水仙花水中仙子来何處翠袖黄冠白玉英報道幽人被渠惱著詩送與老難兄姜特立水仙六出玉盤金屈巵青瑶叢裏出花枝清香自信髙羣品故與江梅相並時徐似道水仙花二首天然初不事鉛華此是無塵有韻花翠帶詎容縈俗客金杯只合勸詩家林下清風自一家稍親梅竹近蘭芽只縁羞與凡花伍移植名園不肯花㳺寒巖水仙花二首金玉其相一兩花遐心空為爾興嗟山礬不用来修敬只許江梅共一家黄琮白璧綴幽花珍重髙人為嘆嗟織女横河溪月堕杯盤狼籍水仙家来氏水仙花二首瑶池来宴老仙家醉倒風流萼緑華白玉㫁笄金暈頂幻成癡絶女兒花花盟平日不曾寒六月曝根髙處安待得秋殘親手種萬姬圍繞雪中看元張伯淳題趙子固水仙圖裙長帶裊寒偏耐玉質金相宻更竒見畫如花花似畫西興渡口晩晴時陳旅題水仙花圖莫信陳王賦洛神凌波那得更生塵水香露影空清處留得當年解珮人袁士元水仙醉欄月落金杯側舞倦風翻翠袖長相對了無塵俗態麻姑曽約過潯陽姚文奐題虞瑞巖描水仙花離思如雲賦洛神花容婀娜玉生春凌波韈冷香䰟逺環珮珊珊月色新原倪瓉水仙花曉夢盈盈湘水春翠虯白鳯照江濵香䰟莫逐冷風散擬學黄初賦洛神増丁鶴年水仙花二首湘雲冉冉月依依翠袖霓裳作隊歸怪底香風吹不㫁水晶宫裏宴江妃影娥池上曉凉多羅襪生塵水不波一夜碧雲凝作夢醒来無奈月明何明李東陽題水仙澹墨輕和玉露香水中仙子素衣裳風鬟霧髩無纒束不是人間富貴妝原文徴眀水仙羅帶無風翠自流晩寒微軃玉搔頭九疑不見蒼梧逺憐取湘江一片愁増杜大中水仙二首玉貎盈盈翠帶輕凌波微歩不生塵風流誰是陳思客想像當年洛水人靈雨濛濛幻態輕驚魂想像逝懐傾願將玉珮遙相逐脱骨逍遥水上人張新水仙花玉質金相翠帶圍霜華月色共輝輝江妃方欲凌波去漢女初從解珮歸孫齊之水仙花碧江香和楚雲飛銷盡冰心粉色微乍向月中看素影却疑波上歩靈妃鍾惺暮春水仙花偶向殘冬遇洛神孤情只道立先春今從九月過三月疑是前身與後身物值同時妒亦宜梅花今見子離離相逢洞口千紅裏素影當前君不知萬花如燄柳如煙常恐冰綃畏不前曽在水邉衣不濕可知入火不能然毎笑梅花太畏喧一身自許厯寒温春風特念冰霜後邀與春花共慰存詩散句原宋僧船窻如聞交佩解疑是洛妃来朔吹欺羅袖朝霜滋玉臺徐致中薤葉秀且聳蘭香細而幽林洪翠帶拖雲舞金巵照雪斟増鄭清之玉昆相倚帶仙風壁立春前萬卉空錢勰碧玉簪長生洞府黄金杯重壓銀臺僧北澗華裾冉冉低香綬柔玉稜稜襯嫩金原徐似道曉風洛浦凌波際夜月江臯解珮時詞増宋趙溍長相思金璞明玉璞明小小杯柈翠袖擎滿將春色盛仙佩鳴玉佩鳴雪月花中過洞庭此時人獨清原盧祖臯卜算子珮解洛波遥弦冷湘江渺月底盈盈誤不歸獨立風塵表窗綺䕶幽妍瓶玉扶輕裊到後知誰語素心寂寂山寒峭増謝薖菩薩蠻相思一夜庭花發窗前忽誤生塵襪曉起艶寒妝雪肌生暗香佳人纖手摘手與花同色插鬢有誰宜除非潘玉兒原髙觀國菩薩蠻雲嬌雪妒羞相倚凌波共酌春風醉的皪玉壺寒肯教金琖單只疑䨇蝶夢翠袖和香擁香外有鴛鴦風流煙水鄉増無名氏菩薩蠻人人盡道黄葵淡儂家解説黄葵艶可喜萬般宜不勞朱粉施摘承金盞酒勸爾千春夀擎作女真冠試伊嬌面看又髙梧葉下秋光晩珍叢花出黄金盞還似去年時傍欄三兩枝人情湏耐久花面長依舊莫學蜜蜂兒等閒悠颺飛原曾惇朝中措幽芳獨秀在山林不怕曉寒侵應笑錢塘蘓小語嬌終帶吳音乗槎歸去雲濤萬頃誰是知心寫向生綃屏上蕭然伴我寒衾又緑華居處𣺌雲深不受一塵侵細看宜州新句平生纔是知音凌波一去平生夢㫁誰最闗心惟有青天碧海知渠夜夜孤衾増無名氏偷聲木蘭花景陽樓上鐘聲曉半面嗁妝勻未了殘月紛紛斜影幽香暗㫁䰟玉顔應在昭陽殿却向前村深夜見冰雪肌膚還有斑斑雪㸃無南歌子翠袖熏龍腦烏雲映玉臺春蔥一簇屬金杯曽記西樓同醉角聲催嫋嫋凌波淺深深歩月来隔紗微笑恐郎猜素艶濃香依舊去年開馬荘父天仙子白玉為臺金作盞香是江梅名閬苑年時把酒對君歌歌不㫁杯無算花月當樓人意滿翹戴一枝蟬影亂樂事且随人意換西樓回首月明中花已綻人何逺可惜國香天不管原髙觀國金人捧露盤夢湘雲吟湘月弔湘靈有誰見羅襪塵生凌波歩稳背人羞整六銖輕娉娉裊裊暈嬌黄玉色輕明香心静波心冷琴心怨客心驚怕珮解却返瑶京杯擎清露醉春蘭交與梅兄蒼煙萬頃㫁腸是雪冷江清増陳允平念奴嬌漢江露冷是誰將瑶瑟彈向雲中一曲清泠聲漸杳月髙人在珠宫暈額黄輕塗腮粉艶羅帶織青蔥天香吹散珮環猶自丁東回首杜若汀洲金鈿玉鏡何日得相逄獨立飃飄煙浪逺羅襪羞濺春紅𣺌𣺌予懐迢迢良夜三十六陂風九疑何處㫁䰟飛度千峯周宻花犯楚江湄湘娥乍見無言灑清淚淡然春意空獨倚東風芳思誰記凌波路冷秋無際香雲随歩起謾記漢宫仙掌亭亭眀月底冰絃寫怨更多情騷人恨枉賦芳蘭幽芷春思逺誰賞國香風味相將共嵗寒伴侶小窓浄沉煙熏翠被幽夢覺涓涓清露一枝燈影裏趙聞禮水龍吟㡬年埋玉藍田緑雲翠水烘春暖衣薰麝馥韈羅塵沁凌波歩淺鈿碧搔頭膩黄冰腦參差難翦乍聲沉素瑟天風珮冷蹁躚舞霓裳徧湘浦盈盈月滿抱相思夜寒腸㫁含香有恨招䰟無路瑶琴寫怨幽韻淒凉暮江空𣺌數峯清逺粲迎風一笑持花酹酒結南枝伴王沂孫慶宫春明玉擎金纖羅飄帶為君起舞回雪柔影參差幽芳零亂翠圍腰痩一捻嵗華相誤記前度湘臯怨别哀絃重聽都是淒凉未湏彈徹國香到此誰憐煙冷沙昬頓成愁絶花惱難禁酒消欲盡門外冰澌初結試招仙􅅎怕今夜瑶簮凍折攜盤獨出空想咸陽故宫落月趙雪齋金盞子得水能仙向漢臯遺佩碧波􅇽月藍玉暖生煙稱縞袂黄冠素姿冰潔亭亭獨立風前柰香多愁絶當時事琴心妙處雖𫝊有誰堪説嵗晩杳無人更短景繁雲天欲雪瀟湘烟水茫茫但萬里相思寒江空濶殷勤折向梅邉聴玉龍吹徹丁寜道惟願百年兄弟相看晚節原辛棄疾賀新郎雲卧衣裳冷看蕭然風前月下水邉幽影羅襪塵生凌波歩湯沐煙波萬頃愛一㸃嬌黄成暈不記相逢曽解珮甚多情為我香成陣待和淚揾殘粉靈均千古懐沙恨想當初悤悤忘把此花題品煙雨淒迷僝僽損翠袂遥遥誰整謾寫入瑶琴幽憤絃㫁招䰟無人賦但金杯的皪銀臺潤愁殢酒又還醒别録原種植五月初收根用小便浸一宿曬乾拌濕土懸當火煙所及處八月取出瓣瓣分開用猪糞拌土植之植後不可缺水起時種時若犯鐵器永不開花訣云六月不在土七月不在房栽向東籬下寒花朶朶香又云和土曬半月方種以收陽氣覆以肥土白酒糟和土澆之則茂于若瀛曰水仙江南處處有之惟吴中嘉定種為最花簇葉上他種則隐葉内耳蓄種嚢以紗懸扵梁間風之未播先以敝草履寸㫁雜溲浡浸透俟有生意方入土以入土早晚為花先後金陵即善植者十叢不一二花余每嵗向友人乞三四莖置齋頭香可十日茲十日者縱非風雨亦不易出齋頭也水仙花以精盆植之可供書室雅翫愛䕶霜重時即搭棚遮盖以避霜雪向南開一門天晴日暖則開之以承日色北方土寒凡牡丹貼梗海棠皆用此法不特水仙也又法初起葉時以磚壓住不令即透則他日花出葉上杭州近江處園丁種之成林以土近鹹滷故花茂瓶插插瓶用鹽水與梅花同附録􅼡祇増酉陽雜俎􅼡祇出拂林國根大如雞卵葉長三四尺似蒜中心抽條莖端開花六出紅白色花心黄赤不結子冬生夏死取花壓油塗身去風氣本草云據此形狀與水仙髣髴豈外國名謂不同耶附録水仙樹原拘樓國有水仙樹樹腹中有水謂之仙漿飲者七日醉御定佩文齋廣羣芳譜卷五十二
