body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷五十三花譜萬年花増萬年花草本小朶如盞一莖百朶其色粉紅而有紅絲雖經久乾枯及沾泥汙顔色鮮新不變御賜名曰萬年花金蓮増金蓮花出山西五臺山塞外尤多花色金黄七瓣兩層花心亦黄色碎蘂平正有尖小長狹黄瓣環繞其心一莖數朶若蓮而小六月盛開一望徧地金色爛然至秋花乾而不落結子如粟米而黑其葉緑色痩尖而長五尖或七尖彚考増􅈙史營衞志道宗毎嵗先幸黑山拜聖宗興宗陵賞金蓮乃幸子河避暑洛陽花木記金蓮花出嵩山頂周伯琦上都紀行詩註上都草多異花有名金蓮花者似荷而黄五臺山志山有旱金蓮如真金挺生緑地相傳是文殊聖蹟集藻賦御製金蓮花賦侔嘉名扵華頂結異質扵清涼冠方貢之三品賦正色扵中央搴芙蓉而在陸麗菡蓞扵崇岡顧柳池之非偶豈蘋澗之可方煥彪炳而成文散栴檀而結燼烟横鉢裏之香妝沐江干之靚受範公輸之規移芳彭澤之徑田田與芰盖殊形矯矯並木蘭比勁若夫當融風之拂樹值暑雨之平池面鏡潭而寫色掩玉砌以横枝葉潤陵晨之霧花含照夜之珠襲輕芬扵衣縠映斜月於牕帷本托根扵道岸曾何畏乎泥淄爾乃草鋪微緑之區蝶舞輕黄之翅沾芳則土脈流膏落蘂則蜜脾􅀆饋非桃李而成蹊與鞠衣而同製扵是滴珠露以研黄挹金房而瀉翠玉板潤而脂融松腴蒸而雲翳摘珍産扵山經表竒芳扵幽閟異紅采扵巖阿謝朱霞扵水曲漏鐫長樂之銅壺燈燦蓬山之銀燭卑五華之仙葩超四照之靈木彼夫綠竹則稱君子青松以儗大夫澤荷載扵篇什猗蘭紀扵史書惟斯卉之挺秀拔衆彚而標竒感無言扵空谷久掩嫮于山陂移土碪扵上苑沐日月之光曦化同被扵偃草忱獲效乎傾葵詞御製嶺外金蓮盛放可愛寄調柳梢青萬頃金蓮平臨難盡髙眺千般珠蹙移花翠翻帶月無暑神仙俗人莫道輕寒悠雅處餘香滿山嶺外磊落逺方隐者誰似清閒茈碧花増山海經罷谷之山洱水出焉而西流注扵洛其中有茈碧雲南志浪穹縣西北五里有寜河一名茈碧湖水上有花曰茈碧形如􅅫而差小有白者有淺紅錦邉者葉如荷葉花葉本皆長五六丈晝則上浮夜則拳曲入底微風蕩之香氣殊常采以為羮味羙扵蓴集藻詩散句増明楊慎荒經海圖有往證欲拾茈碧尋靈湫九花樹増要覽九花樹生南岳雖經霜凝寒必開時人謂之應春花萬連増崔豹古今注萬連葉如鳥翅一名鳥羽一名鳯翼花大者其色多紅緑紅者紫㸃緑者紺㸃俗呼為仙人花一名連纈花酉陽雜俎一名烏􅅫金䔲花増拾遺記晉武帝為撫軍時府内後堂砌下忽生草三株莖黄葉緑若總金抽翠花條苒弱狀似金䔲有羌人姚馥字世芬充廐養馬妙解隂陽之術云此草以應金徳之瑞後以府地賜張華猶有草在故茂先賦云擢九莖扵漢庭美三株扵兹館貴表祥乎金徳比名類乎相亂紅綬花増述異記紅綬花蔓生如綬一般有文采焉優鉢曇花増梁書波斯國傳國中有優鉢曇花鮮華可愛迎輦花増拾遺錄洛陽進合蒂迎輦花云得之嵩山塢中人不知名採者異而貢之㑹帝駕適至因以迎輦名之南部烟花記迎輦花外殷紫内素膩菲芳粉蕊心深紅跗爭兩花枝榦烘翠類通草無刺葉圓長薄其香氣穠芬馥或惹襟袖移日不散嗅之令人不多睡帝令袁寳兒持之號曰司花女金歩揺増海錄碎事金歩揺叢生其花四出皆偶對無風常揺盖榦弱而枝繁也靈夀花増酉陽雜俎韋絢云湖南有靈夀花數帶簇開視日如槿紅色春秋皆發非作杖者都勝花増酉陽雜俎都勝花紫色兩重心數葉卷上如蘆朶蕊黄葉細無憂花増酉陽雜俎無憂樹女人觸之花方開瘴川花増酉陽雜俎瘴川花差類海榴五朶簇生葉狹長重沓承扵花底色中第一蜀色不能及出黎州按轡嶺那伽花増酉陽雜俎那伽花狀如三春無葉花色白心黄六瓣出舶上提羅迦増酉陽雜俎提羅迦樹花見日光即開拘尼陁増酉陽雜俎拘尼陁樹花見月光即開繫白象樹花増酉陽雜俎乾陀國頭河岸有繫白象樹花葉似棗季冬方熟相傳此樹滅佛法亦滅簇蝶花増酉陽雜俎簇蝶花花為朶共簇一蕊蕊如蓮房色如退紅出温州俱郍衞増酉陽雜俎俱郍衞葉如竹三莖一層莖端分條如貞桐花小類木槲出桂州木蓮増酉陽雜俎木蓮花葉似辛夷花類蓮花色相傍出忠州鳴玉溪卭州亦有益部方物畧記木蓮花生峩睂山中諸谷狀若芙蓉香亦類之木幹花夏開枝條茂蔚不為園圃所蒔雲南志木蓮花出大理府境樹髙大葉如枇杷花如蓮有青黄紅白四種彚考原四川志忠州白鶴山佛殿前唐時有木蓮二株其髙數丈其葉堅厚如桂仲夏作花毎花坼時聲如破竹増黄山志木蓮花在華嚴堂前其本踰拱髙二丈花如蓮九瓣白色紫縷香如玉蘭葉經霜不彫朱實含苞内苞開實出若珊瑚新琢止慈光寺一本㸃蒼山記山有木蓮躑躅花樹並髙數丈春日紅白錯雜被扵谿谷集藻賛増宋宋祁木蓮賛葩秀木顛狀若芙渠不實而榮馥馥其敷賦増唐無名氏木蓮賦蔽茅珍樹森林綺堂庇根天壌擢秀春光雖違性扵舊國終奉恩扵此鄉違性何苦主人有勿翦之怙奉恩何其主人有挈瓶之滋君既加我以恵好我亦報君以葳蕤弱其枝圓其葉亂階前之蓂莢跗綠縟萼芊茸狀中浦之芙蓉既因其理又憐其美懐香則十歩必聞含笑則千金可市有實雖漏扵貢納有隂足延乎憩止此木也誠則不材必姑樹其桃李七言絶句増唐白居易木蓮詩并序木蓮樹生巴峽山谷間巴民亦呼為黄心樹大者髙五丈渉冬不凋身如青楊有白文葉如桂厚大無脊花如蓮香色艶膩皆同獨房蕊有異四月初始開自開迨謝僅二十日忠州西北十里有鳴玉谿生者穠茂尤異惜其遐僻因題三絶句云如折芙蓉栽旱地似抛芍藥挂髙枝雲埋水隔無人識唯有南賔太守知紅似臙脂膩如粉傷心好物不湏臾山中風起無時節明日重来得在無已愁花落荒巖底復恨根生亂石間㡬度欲移移不得天教抛擲在深山畫木蓮花圖寄元郎中花房膩似紅蓮朶艶色鮮如紫牡丹唯有詩人能解愛丹青寫出與君看詩散句増明吴廷簡龍象天家錫瑶花佛地来池將空作水根以樹為臺宋濂枝懸縞帶垂金彈瓣落蒼苔墜玉杯石蓮増黄山志石蓮花畧同木蓮但彼九出此五出為異花時瀰漫山谷盈目皆香雪也集藻五言絶句増唐司空曙石蓮花今逢石上生本自波中有紅艶秋風裏誰憐衆芳後洛如花増雲仙雜記吴興山中有一樹類竹而有實似莢狀鄉人見之以問陸澄澄曰名洛如花郡有文士則生太平瑞聖花増益部方物畧記瑞聖花出青城山中榦不條髙者乃尋丈花率秋開四出與桃花類然數十跗共為一花繁宻若綴先後相繼新蕊開而舊未萎也蜀人號豐瑞花故程相畫圖以聞更號瑞聖花然有數種其小者號寳仙淺紅者為醉太平白者名玉真成都人競移蒔囿中以為尤玩云劍南詩注天聖中獻至京師仁宗賜名太平瑞聖花集藻賛増宋宋祁瑞聖花賛衆跗聚英爛若一房有守繪圖厥名乃章繁而不豔是異衆芳五言律詩増宋范成大太平瑞聖花雪外捫参嶺烟中濯錦州宻攅文杏蕊髙結綵雲毬百世嘉名重三登瑞氣浮挽春同住夏㸔到火西流七言絶句増宋楊巽齋醉太平花紫芝竒樹謾前聞未若此花叶氣薫種向春臺豈無象望中秀色似卿雲七寶花増益部方物畧記七寶花條葉大抵玉蟬花類也其生叢蔚花葉甚茂集藻賛増宋宋祁七寶花賛擢穎挺挺盛夏則榮丹紫合英以寶見名鵞毛玉鳯花増益部方物畧記鵞毛玉鳯花本至卑纖􅅫如釵股秋開不蘤而鬢狀似禽故曰鳯色白故曰玉以其分輕故曰毛集藻賛増宋宋祁鵞毛玉鳯花賛華而無采狀類翔鳯么質毛輕翩欲飛動蟬花増益部方物畧記蟬花二川山林中皆有之如蟬之不蜕至秋則花生其頭長一二寸黄碧色西溪叢語本草蟬殻謂之蟬花今成都有草名蟬花今有乾者視之乃蟬額裂面抽莖上有花也集藻賛増宋宋祁蟬花賛蟬不能蛻委扵林下花生厥首兹謂物化石蟬花増益部方物畧記石蟬花始生其苕森擢長二三尺葉如菖蒲紫萼五出與蟬甚類綠葉相側蜀人因名之又白者號玉蟬花集藻賛増宋宋祁石蟬花賛有苕穎然有萼敷然取其肖象莫類扵蟬錦帶花増杜詩注錦帶花一名海仙花一名文官花此花出荆楚間有花如錦遂名錦帶花條如郁李春末方開紅白二色益部方物畧記錦帶花蜀山中處處有之長蔓柔纖花葉間側如藻帶然因象作名花開者形似飛鳥里人亦號鬢邉嬌萬花谷貢士舉院本故勇技營有花初開白次緑次緋次紫故名為文官花石湖詩注東南甚珍此花峽中漫生山谷集藻五言古詩増宋范成大錦帶花妍紅棠棣粧弱綠薔薇枝小風一再来飃䬙随舞衣吴下嫵芳檻峽中滿荒陂佳人墮空谷皎皎白駒詩七言律詩増宋楊萬里錦帶花天女風梭織錦機碧絲池上茜欒枝何曽繫住春歸脚只觧縈長客恨眉節節生花花㸃㸃茸茸曬日日遅遅後園初夏無題目小樹微芳也得詩七言絶句増宋王禹偁海仙花詩并序海仙花者世謂之錦帶維揚人傳云初得扵海州山谷間其枝長而花宻若錦帶然其花未開如海棠既開如木𤓰而繁麗嫋弱過之一朶滿頭冠不克荷惜其不香而無子但可鈎壓其條移植他所因以釋草釋木驗之皆無有也近之好事者作花譜以海棠為花中之神仙予謂此花不在海棠下宜以仙為號目為錦帶俚孰甚焉又取始得之地命曰海仙且賦詩三章以存其名一堆絳雪壓春叢嫋嫋長條弄晚風借問開時何所似似將繡被覆熏籠春憎窈窕教無子天為妖嬈不與香盡日含毫難比並花中應是衞莊姜何年移植在僧家一簇柔條綴綵霞錦帶為名俚且俗為君呼作海仙花楊㢲齋錦帶花萬釘簇錦若垂紳圍住東風稳稱身聞道沈腰易寛減何妨留與繫青春鵠袍換緑契初心旋賜銀緋與紫金堪念紛紛名利客對花應自歎侵尋青嚢花増五代史胡嶠自契丹亡歸中國畧􅀎道其所見云渡黑水至湯城淀地氣最温多異花一曰青嚢如中國金燈而色類藍可愛旱金花増五代史湯城淀地氣最温多異花一曰旱金大如掌金色爍人上元紅増桂海虞衡志上元紅深紅色絶似紅木𤓰花不結實以燈夕前後開故名泡花増桂海虞衡志泡花南人或名柚花春末開蕊圓白如大珠既折則似茶花氣極清芳與茉莉素馨相逼番人采以蒸香風味超勝枸那花増桂海虞衡志枸那花葉痩長畧似楊柳夏開淡紅花一朶數十萼至秋深猶有之水西花増桂海虞衡志水西花葉如萱草花黄夏開象蹄花増桂海虞衡志象蹄花如梔子而葉小夏開至秋深白鶴花増桂海虞衡志白鶴花形如白鶴立春開集藻七言絶句増元劉詵玉笥山中有白鶴花頂翅宛然類鶴王蘭友作詩送至用韻二首縞衣元爪立前除天上人間翦紙糊除却青青三四葉月明滿地却全無千載蘇仙上帝鄉空餘琪草似人長夜凉環珮不知處夢覺滿山風露香望仙花増洛陽花木記望仙亦名箆春集藻七言絶句増宋無名氏望仙花風捲朱簾挂玉鉤彩雲開處望仙儔妍姿不逐東風去日照斜暉上小樓金莖花増仙史元藏㡬航海至一島曰滄洲上有金莖花如蛺蝶㣲風至則揺蕩如飛婦人採之以為首飾曰不帶金莖花不得到仙家滄洲人研花如泥竹簡彩繪與真金無異白菱花増學圃餘疏白菱花純白而雅且開久而繁人云来自閩中予在閩問之乃無此種始在豫章得之定是嶺南花也花至季冬始盡性亦畏寒花後宜藏室中百日紅與紫薇名同物異増學圃餘疏臭梧桐者吴地野生花色淡無植之者淮揚間成大樹花微者縉紳家植之中庭或云後庭花也獨閩中此花紅鮮異常