苞如瓢以承之黄花増黄花不知其名一朶四瓣合抱如金盞其色鵞黄出汗帖木兒嶺以北每一莖只一朶翩然獨秀衆草經霜凋萎是花經霜顔色愈覺鮮明馬蹄蘭増馬蹄蘭生平地亂草間葉劍樣如建蘭堅韌不可斷其花翠色可愛秋則結苞成子塞外尤多地椹花増地椹花青紫色花瓣如葵一花八九瓣徑二寸許瓣落盡則花心結子成堆取之可以為漿鸞枝増鸞枝花木本枝榦俱似桃葉有刻缺似棣棠三月附枝開花或著樹身最繁茂瓣多而圓似郁李而大深紅色京師多有之長樂花集藻賦増晉傅元紫華賦并序紫華一名長樂生扵蜀其東界特饒中國竒而種之余嘉其華純耐久可厯冬而服故與友生各為之賦有遐方之竒草禀二氣之純精仰紫微之景曜因令色以定名剛莖勁立纖條繁列從回風以揺動紛蘭暢而􅈍潔蔚青葱以增茂並含華而未發扵是散緑葉秀紫榮藴若芝草之始敷灼若百枝之在庭獨參差以照燿何光麗之雜形渙渙昱昱而奪人目精下無物以借喻上取象扵朝霞妙萬物而比艶莫兹草之可嘉唐蘇頲長樂花賦并序蜀太守庭際有紫華草秋早始繁英露洗冬早尚直本霜封蕪雜大同扵衆卉盛衰小異扵羣物予訝而未識吏或告余曰此長虞所賦蜀長樂花也故心賞焉因口授書吏遂墨而成作恨不見古人所為得髣髴其㫖爾夫長者以短長之形度其長則至美夫樂者以哀樂之類同其樂則至喜長也樂也吾安得而閒之嘉纖植之並用偉令名兮在茲徒見其豐族苯䔿髙標璀璨莖丹外而縞中葉縹分以紅貫綴緑穎之重疊索紫蕤之爛熳廹而象之君子其常或㣲或章聳危冠兮䙬若綬默退静其何望逺以意之佳人欲翔炫炫煌煌重羅綺兮撲瑶翠蹇来思而未嘗匪以幽兮自直匪以直兮自蔵匪以晚兮自耀匪以耀兮自强文濁露之均灑庇清舒之泛光本無嫌扵散地甘有寓扵殊方然則太液初滿上林新霽䒠茸灼爍萬品千計揺瑞色而涵芝雜竒葩而轉蕙孰與夫玉堂金閣之偏賞白日青春之特麗嵗不與兮時向闌風蕭蕭兮夜漫漫賔逺鴻扵沙塞呌離鶴扵江干君曽不見三月華矣盡林間之槁木千霜殞矣亦庭下之枯蘭懿此常度凌扵早寒假春期而不彩雖秋令而不殘衝雨霰之飛薄任雲山之險難芳弗珍扵靃靡節恒慕扵檀欒吾則知樹背之奚托傾心之可安如後凋之可貴㒺獨立其誰觀文學掾起而為亂曰白露瀼瀼何草不黄紫華灼灼生君之堂彼不伐兮秋自翳時或珍兮君是恵彤庭赫兮朱草駢交屈軼兮友賔連伊榛莽而荒此君曷為而賦㫋優鉢羅花集藻歌増唐岑參優鉢羅花歌并序參甞讀佛經聞有優鉢羅花目所未見天寶庚申嵗參忝大理評事攝監察御史領伊西北庭度支副使自公多暇乃扵府庭内栽樹種藥為山鑿池婆娑乎其間足以寄傲交河小吏有獻此花者云得之扵天山之南其狀異扵衆草勢巃嵸如冠弁嶷然上聳生不㫄引攅花中折駢葉外包異香騰風秀色媚景因賞而嘆曰爾不生扵中土僻在遐裔使牡丹價重芙蓉譽髙惜哉夫天地無私隂陽無偏各遂其生自物厥性豈以偏地而不生乎豈以無人而不芳乎適此花不遭小吏終委諸山谷亦何異懐才之士未㑹明主擯扵林藪耶因感而為歌歌曰白山南赤山北其間有花人不識緑莖碧葉好顔色葉六瓣花九房夜掩朝開多異香何不生彼中國兮生西方移根在庭媚我公堂恥與衆艸之為伍何亭亭而獨芳何不為人之所賞分㴱山窮谷委嚴霜吾竊悲陽闗道路長曾不得獻扵君王戎王子集藻五言律詩増唐杜甫㳺何將軍山林萬里戎王子何年别月支異花開絶域滋蔓匝清池漢使徒空到神農竟不知露翻兼雨打開拆日離披冬瑰花集藻五言律詩増唐盧綸和李舍人昆季詠冬瑰花寄贈徐侍郎獨鶴寄烟霜雙鸞思晚芳舊隂依謝宅新艶出蕭牆蝶散揺輕露鶯銜入夕陽雨朝勝濯錦風夜劇焚香㫁日千層艶孤霞一片光宻来驚葉少動處覺枝長布影期髙賞留春為逺方嘗聞贈瓊玖叨和愧升堂司空曙和李員外與舍人詠冬瑰花寄徐侍郎仙吏紫薇郎竒花共翫芳攅星排緑蔕照眼發紅光暗妒翻堦葉遥連直曙香逰枝蜂繞易礙刺鳥銜妨露濕凝衣粉風吹散蘂黄蒙籠珠樹合煥爛錦屏張留客勝㸔竹思人比愛棠如傳採蘋詠逺思滿瀟湘海紅集藻五言律詩増唐劉長卿夏中崔中丞宅見海紅揺落一花獨開何事一花殘閑庭百艸闌緑滋經雨發紅艶隔林看竟日餘香在過時獨秀難共憐芳意晚秋露未湏漙燕蓊花集藻七言絶句増唐李郢燕蓊花十二街中何限草燕蓊盡欲占殘春黄花撲地無窮極愁殺江南去住人玉燭花集藻七言律詩増唐劉兼玉燭花裊裊香英三四枝亭亭紅艶照堦墀正當晚檻初開處却似春闈就試時少女不吹方熠爚東君偏惜未離披夜深斜倚朱欄外擬把鄰光借與誰杏香花集藻五言絶句増宋邵雍杏香花客説何州事經營香味佳訝予獨無語貪嗅杏香花萬蝶花集藻七言絶句増宋蘇轍萬蝶花誰唱殘春蝶戀花一團粉翅壓枝斜美人欲向釵頭插又恐驚飛鬢裏鴉楊巽齋萬蝶花粉翼紛紛簇㡬叢揺風欲趂賣花翁詩眸覽倦方欹枕栩栩猶疑在夢中真珠花集藻七言絶句増宋張舜民真珠花風中的皪月中看觧作人間五月寒一似漢宫梳洗了玉瓏葱壓翠雲冠千璣萬琲照庭除細雨斜風拂座隅莫道長安貧似磬緑堦遶砌盡真珠楊巽齋咏真珠花纍纍花發映庭除柳帶榆錢總不如一任春風吹滿地幽人歩履自虛徐鷹爪花集藻五言絶句増宋王十朋鷹爪花誰把名鷹爪天然狀不殊無心事搏擊中有鳥相呼闍提花集藻七言絶句増宋鄭域闍提花此花移種自招提借佛為名識者希優鉢曼陁果何似并参香色問因依御帶花集藻七言絶句増宋翁元廣御帶花未放枝頭嫩葉青先開絳蕊照春晴若無顔色宜宫院安得花間御帶名玉手爐花集藻七言絶句増宋翁元廣玉手爐花小院無人春意深凌風傲日出牆隂只因落在山僧手那得王孫為賞音無名氏玉手爐花習習東風二月餘此花宜近玉庭除美人雲鬢不宜插獻與觀音作手爐小黄渠花集藻五言絶句増宋劉允叔小黄蕖花􅉡􅉡碎金英絲絲縷玉莖歩揺釵朶見老眼為増明山礬紛似玉黄蘖碎如金二美傳春晚同心契爾音繭漆花集藻七言絶句増宋劉允叔繭漆花清晨歩上金鷄嶺極目漫山繭漆花雪蕊瓊絲亦堪賞樵童蠶婦帶歸家滿堂春集藻七言絶句増宋楊㢲齋滿堂春花發園林晝錦如列仙行綴在蓬壺千金湏撇豪家賞一笑春風無向隅御仙花集藻七言絶句増宋楊㢲齋御仙花不逐凡花逞艶嬌移根上苑獨清髙君王曽選装金帶侈錫持荷耀紫袍夀春花集藻七言絶句増宋楊巽齋夀春花花開綴玉碧敷腴香挹南薰景又殊天賦芳姿長不老命名為夀定非誣散水花集藻七言絶句増宋無名氏散水花盈枝㸃綴雪花鮮環映清流分外妍應是東君歸騎速不知墜下玉絲鞭孩兒花集藻七言絶句増宋無名氏孩兒花纖穠初見似嬌癡鼓舞春風二月時何事自開還自落可憐造化亦兒嬉練春紅集藻七言古詩増元袁桷謝王參議送練春紅二枝玉堂老仙玩幽獨閉户無人似初溽倚闌岸幘領孤芳䔩䔩輕紅冠羣緑化工有意卑凡卉積李崇桃空眩目争先鬭巧等堪憐已向東風盡驅逐此花精妍浄如洗收拾餘春傲榮辱何郎湯餅徒試妝太真温泉空賜浴天然生色鑄真態亭午低頭睡初足誰言花后最竒絶我怪酪奴能汗觸嫣然一笑奉清歡莫把金尊歌别鵠并刀妙剪駢頭来珠露淋漓袖新蹙似嫌凡子多京塵却恨髙人付流俗微風澹蕩新雨生强拭愁容吐殘馥擬將色筆寫清意綺語非工那忍凟裵回中庭月過半翠䄂凌風注寒玉長十八集藻七言絶句増元廼賢塞上曲雙鬟小女玉娟娟自卷氊簾出帳前忽見一枝長十八折来簪在㡌簷邉波羅花集藻詞増宋毛滂清平樂雲峯秀疊露冷琉璃葉北畔波羅花弄雪香度小橋淡月與君踏月尋花玉人雙捧流霞吸盡杯中花月竹風相送還家疊羅花集藻詞増金党懐英感皇恩碧玉撚條藍袍裁葉眀艶黄深軟金疊道装仙子謫墮蕊珠宫為春閒管領花時節漢額妝濃楚腰舞怯襞積裙餘舊宫褶東君著意留伴小庭風月任教鶗鴂喚羣芳歇藍雀花増藍雀花其花如雀有身有翼有尾有黄心如兩目或云即茱萸花集藻五言絶句御製山菊藍雀花雨過初凉至山花滿野馨雖無紅紫艶能使屬車停翠蛾眉増翠蛾眉花翠色随日側映鮮妍有致御定佩文齋廣羣芳譜卷五十三
