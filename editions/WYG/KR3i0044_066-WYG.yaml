body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜巻六十四果譜橘花附見原橘本草云橘從矞音鷸諧聲也又雲五色為慶二色為矞矞雲外赤内黄非煙非霧郁郁紛紛之象橘實外赤内黄剖之香霧紛郁有似乎矞雲橘之從矞又取此意也一名木奴詳見後襄陽耆舊傳樹高丈許枝多刺生莖間葉兩頭尖緑色光面濶寸餘長二寸許四月生小白花清香可人結實如柚而小至冬黄熟大者如杯包中有瓣瓣中有核實小於柑味甘微酸種類不一有蜜橘其味最甘黄橘扁小多香霧橘之上品緑橘紺碧可愛不待霜後色味已佳隆冬采之生意如新朱橘實小色赤如火塌橘狀大而扁外緑心紅巨瓣多液經春熟乃甘美包橘外薄内盈其脈瓣隔皮可數綿橘微小極輭美可愛而不多結沙橘細小甘美凍橘八月開花冬結春采早黄橘秋半已丹穿心橘實大皮光心虛可穿荔枝橘膚理皺宻儼如荔枝出衡陽乳橘狀似乳柑皮堅瓤多味絶酸芳油橘皮似油飾中堅外黑橘之下品自然橘他橘與柑必以枝接之惟此則以橘子下種故名自然味甚美出蘇州台州西出荆州南出閩廣撫州皆不如温州者為上也王敬美曰閩中柑橘以漳州為最福州次之樹多接成惟種成者氣味尤勝橘肉生痰聚飲不益人若煎以蜜充果食甚佳或蜜或薰作餅尤妙亦可醬淹作葅花以之蒸茶向為龍虎山進御絶品園中宜多種多收核葉皆苦平無毒可入藥彚考增書禹貢厥包橘柚錫貢傳小曰橘大曰柚疏橘柚二果其種本别以實相比則柚大橘小原史記貨殖列傳蜀漢江陵千樹橘其人與千戸侯等謝承後漢書沛國桓嚴避地居揚州從事屈豫室中中庭有橘一株遇其實熟數垂室内嚴以竹藩樹四面風吹兩實墜地以繩縛繫樹枝吳志陸績傳績年六嵗於九江見袁術術出橘績懐三枚去拜辭墜地術謂曰陸郎作賔客而懐橘乎績跪答曰欲歸遺母術大竒之增宋書符瑞志晉成帝咸和六年鎮西將軍庾亮獻嘉橘一蔕十二實孝武帝大明元年二月壬寅華林園䨇橘樹連理原南齊書虞愿傳愿字士恭㑹稽餘姚人也祖賚中庭橘樹冬熟子孫競來取之愿年數嵗獨不取賚及家人皆異之增梁書元帝本紀大寳元年正月辛亥朔左衞將軍王僧辯獲橘三十子共蔕以獻南史孝義傳王虛之居喪二十五年鹽酢不入口墓上橘樹一冬再實時人咸以為孝感所致原舊唐書徳宗本紀大厯十四年五月癸亥即位閏月戊寅詔江南甘橘嵗一貢以供宗廟餘貢皆停增唐書地理志蘇州杭州温州土貢柑橘撫州土貢朱橘柳玭傳玭為嶺南節度副使廨中橘熟既食乃納直於官薛戎傳戎遷浙東觀察使所部橘未貢先鬻者死戎弛其禁宋史五行志明道元年八月黄州橘木及柿木連枝山海經荆山銅山葛山賈超之山洞庭之山其木多橘櫾原春秋運斗樞璇樞星散為橘晏子春秋晏子使楚楚王進橘置削晏子併食不剖王曰橘當剖對曰臣聞賜人主前者瓜桃不削橘柚不剖今者萬乘無教故不敢剖臣非不知也莊子樝棃橘柚其味相反而皆可於口韓非子夫樹橘柚者食之則美嗅之則香增吕氏春秋果之美者有江浦之橘原淮南子橘柚有鄉橘凋於北徙榴鬱於東移增神異經東方裔外有建山其上多橘柚崔寔正論橘柚之實堯舜不常御鹽鐵論匹夫莫乘堅良而民厭橘柚橘柚生于江南而民皆甘之于口者味同也三輔黄圖扶荔宫有甘橘百餘本原吳志吳王餽魏文帝大橘帝詔羣臣曰南方有橘酢正裂人牙時有甜耳增吳録朱光禄為建安郡中庭有橘冬月于樹上覆裹之至明年春夏色變青黑味尤美原益都耆舊傳楊由為成都文學掾少治易曉占候忽有風起太守問由答曰南方有薦木實者色黄赤頃之五官掾獻橘數苞襄陽耆舊傳吳李衡漢末為丹陽太守每欲治家事妻英習不聽後宻遣客十人往武陵龍陽泛洲上作宅種橘千株臨死勅兒曰汝母每怒吾治家事故窮如是然吾州里有千頭木奴不責汝食嵗上匹絹亦當足用爾南方草木狀漢武帝時交趾有橘官置長一人秩二百石主嵗貢御橘吳黄武中交趾太守士爕獻橘十七實同一蔕以為瑞異羣臣稱賀神仙傳蘇仙公者桂陽人也漢文帝時得道當仙母曰汝去之後使我如何存活先生曰明年天下疾疫庭中井水簷邊橘樹可以代養井水一升橘葉一枚可療一人來年果有疾疫逺近悉求母療之皆以水及橘葉無不愈者增廣州記羅浮山有橘夏熟實大如李剝皮噉則酢合食極甘南中八郡志交趾特出好橘大且甘而不可多噉令人下痢拾遺記條陽山中有白橘花色翠而實白大如𤓰香聞數里原後搜神記㑹稽􅀈縣東野有女子姓吳字望子路忽見一貴人儼然端坐即蔣侯像也因擲兩橘與之數數形見遂隆情好晉孝武世宣城人秦精常入武昌山中採茗忽遇一人長丈餘徧體皆毛從山北來探懐中二十枚橘與精甘美異常增述異記勾漏縣有緑橘青柑漢章帝元年上虞縣獻玊色橘越多橘柚園越人嵗出橘税謂之橙橘户亦曰橘籍吳闞澤表曰請除臣之橘籍水經注劉先主時巴郡結舫水居者五百家縣有橘官夏至則熟二千石常設厨膳命士大夫共㑹樹下原幽怪録巴卬橘園中霜後見橘如缶剖開中有二老叟象戲一叟曰橘中之樂不減商山但不得深根固蔕爾一叟取龍脯食之食訖餘脯化為龍衆乘之而去增異聞録柳毅見龍君叩海岸橘樹名橘社三吳志孔安國閑宅忽有二人來云自帝庭來一衣緑曰藤子一衣黄曰黄子語呉大帝時事厯厯可聽及去遣人尋之入未央宫庭中衣緑者入於藤下衣黄者入於橘下原風土記唐于蓬萊殿九月九日賜羣臣橘江淮異人録陳允升好道術撫州危全諷迎寘郡中危夜坐謂之曰豐城橘美頗思之允升曰方有一船泊豐城港今為取之港去城十五里少選即還攜一布囊有橘數百枚增稽神録偽吳兵部賈潭言其所知為嶺南節度獲一橘其大如升將表獻之監軍中使以為非常物不可輕進因取鍼㣲刺其葉下乃有蠕蠕而動者因破之中有一小赤蛇長數寸南唐近事鍾傅鎮江西日客有以覆射之法求謁傅以厯日包一橘致袖中使射之客口占一歌以揭之云太嵗當頭立諸神莫敢當其中有一物常帶洞庭香原廣記劉晏在江淮名橘珍柑常與本道分貢競欲先至雖封山斷道以禁前發晏毎厚貲致之為諸道冠增嘉祐雜志橘樹直竦枝葉不相妨蜀人謂之讓木東坡楚頌帖吾性好種植能手自接果木尤好栽橘陽羡在洞庭上柑橘栽至易得當買一小園種柑橘三百本屈原作橘頌吾園若成當作一亭名之曰楚頌文昌雜録國子朱司業言南方柑橘雖多然亦畏霜每霜時亦不甚收惟洞庭霜雖多仍無所損詢彼人云洞庭四面皆水也水氣上騰尤能辟霜所以洞庭柑橘最佳嵗收不耗止為此爾後山詩話韋蘇州詩云憐君臥病思新橘試摘纔酸亦未黄書後欲題三百顆洞庭須待滿林霜余往以為蓋用右軍帖中贈子黄甘三百者比見右軍一帖云奉橘三百枚霜未降未可多得蘇州蓋取諸此曲洧舊聞果中結實遲者莫如橘諺云立不踰膝好種橘言其不可待也行都紀事橘園亭在豐樂橋未建都之時此地皆種橘高宗欲親廵就此乘舟創亭其上前臨大河故至今街市傳為橘園亭益公平園集洞庭楚之巨浸而山在震澤中其產橘柚皆足以冠天下世謂地脈潛通宜哉三桞軒雜識橘花為雋客武夷山志峰山有仙橘小者如彈丸其皮可食大者如雞卵味尤甘原蘇州府志太湖中洞庭山一名包山道書第九洞天蘇子美記有峰七十二惟洞庭稱雄其間民俗淳樸以橘柚為常產每秋高霜餘丹葩朱實與長松茂竹相映巖壑望之若圖畫嚴州府志城南十里有山險峻不易登上有羅浮橘一株熟時風飄墮地得者訛為仙人橘增長沙府志橘洲在善化縣産橘常徳府志橘洲長二十里即李衡種橘處泉州府志宋寧宗嘉定間永春縣樂山之東有橘一株隨人所食不得持歸或竊懐之則袖中變為蛇蝮延平府志南平縣衍仙山中產橘止可就食或欲攜歸即迷道不得出莆田縣志䂬溪上有仙人巖巖上野橘其實無時得者為瑞宋元祐間方亞夫薛蕃皆以九日遊巖人得一橘並登第集藻表增唐劉禹錫為武中丞謝新橘表臣某言中使某至奉宣聖㫖賜臣新橘若干顆特降恩光猥頒慶賜珍踰百果榮比兼金臣伏以丹實初成苞貢爰至芳馨味重方列於御筵雨露恩深忽霑於賤品感同推食事等絶甘豈惟適口為珍實冀捐軀上答臣無任感戴之至啟增梁簡文帝謝勅賚城邊橘啓結根壟首垂隂陽壍甘踰石蜜味重金衣暉章縹李豈止稱於晉世上林美棗非獨高於漢日劉潛謝東宫賜城傍橘啓多置守民晉為厚秩坐入縑素漢譬封君固以仰匹穰橙俯聯楚柚寧似魏瓜借清泉而得冷豈如蜀食待飴蜜而成甜重以倒影陽池垂華金堞信可珍石榴於式乾貴葡萄於别館劉峻送橘啓南中橙橘青鳥所食始霜之旦採之風味照座劈之香霧噀人皮薄而味珍脈不粘膚食不留滓甘踰萍實冷亞冰壺可以熏神可以芼鮮可以漬蜜羶鄉之果寧有此耶庾肩吾謝賚橘啓光分璇宿影接銅峰去青鳥之迢遞服朱闉之爽塏楚原洪筆頌記不遷陳王麗藻賦稱遙植雜著原唐陸龜䝉蠧化橘之蠧大如小指首負特角身蹙蹙然類蝤蠐而青翳葉仰齧如饑蠶之速不相上下人或棖觸之輙奮角而怒氣色桀驁一旦視之凝然弗食弗動明日復往則蜕為蝴蝶矣力力拘拘其翎未舒襜黑韝蒼分朱間黄腹填而撱緌纖且長久醉方寤羸枝不揚又明日往則倚薄風露攀縁草樹聳空翅輕瞥然而去或隐蕙隙或留篁端翩旋軒虛颺曳紛拂甚可愛也須臾犯蝥網而膠之引絲環纒牢若拲梏人雖甚憐不可解而縱矣噫秀其外類有文也黙其中類有德也不朋而游類潔也無嗜而食類亷也向使前不知為橘之蠧後不見觸蝥之網人謂之鈞天帝居而來今復還矣天下大橘也名位大羽化也封畧大蕙篁也茍滅德忘公崇浮飾傲榮其外而枯其内害其本而窒其源得不為大蝥網而膠之乎觀吾之蠧化者可以惕已樂仲子曰吾昔好種橘吾種輙前春而植私竊懼晩也種而遂者十不得二焉訊之老圃圃曰橘不可以前春種也盍後之吾從而後之植而遂者十嘗得八九焉又訊老圃圃曰冬榮之木其氣外周外周者非陽盛不可活也冬謝之木其氣内固内固者雖陽未盛活也推此則百種百活矣仲子俯然嘆曰吾益信枝葩繁者本根隳周公曰冬日之閉凍也不固則春夏之長草木也不茂天地不能常侈費而况於人乎是故君子貴斂其真不隳其根萬類以生頌原楚屈原橘頌后皇嘉樹橘徠服兮受命不遷生南國兮深固難徙更壹志兮緑葉素榮紛其可喜兮曾枝剡棘圓果摶兮青黄雜揉文章爛兮精色内白類可任兮紛緼宜修姱而不醜兮嗟爾幼志有以異兮獨立不遷豈不可喜兮深固難徙廓其無求兮蘇世獨立横而不流兮閉心自慎不終失過兮秉德無私參天地兮願嵗並謝與長友兮淑離不淫梗其有理兮年嵗雖少可師長兮行比伯夷置以為像兮增宋孝武帝芳春琴堂橘連理頌列訪神祕詳觀瑞䇿通柯竦秀實靈所錫雜條别榦淹一榮戚道彼遐方承我正厯贊增晉郭璞橘櫾贊厥包橘櫾竒者維甘朱實金輝葉蒨翠藍靈均是詠以為美談賦增魏曹植橘賦有朱橘之珍樹於鶉火之遐鄉禀太陽之烈氣嘉杲日之休光體天然之素分不遷徙於殊方播萬里而遙植列銅雀之園庭背江洲之暖氣處𤣥朔之肅清邦換壤殊爰用喪生處彼不凋在此先零朱實不御焉得素榮惜寒暑之不均嗟華實之永乖仰凱風以傾葉冀炎氣之可懐颺鳴條以流響希越鳥之來栖夫靈徳之所感物無㣲而不和神蓋幽而易激信天道之不訛既萌根而弗榦諒結葉而不華漸𤣥化而不變非彰德於邦家附微條以歎息哀草木之難化晉潘岳橘賦并序余齋前橘樹冬夏再熟聊為賦云爾嗟嘉卉之芳華信氤氲而芬馥既蓊茸而葳蕤且參差而橚矗已鬱鬱而冬茂亦離離而夏熟至如廣命賔客厯覽遊觀三清既設百味星爛炫熀乎玊案照耀於金盤故成都美其家園江陵重其千樹既見稱於陸言亦標名乎馬賦宋謝惠連橘賦園有嘉樹橘柚煌煌圓丹可翫清氣芬芳受以玊盤升君子堂味既滋而事美實厥包之最良梁吳均橘賦增枝之木既稱英於緑地金衣之果亦委體於玊盤見雲夢之千樹笑江陵之十蘭葉葉之雲共琉璃而並碧枝枝之日與金輪而共丹若乃秋夜初露長郊欲素風賫寒而北來鴈衝霜而南度方散藻於年深遂凝貞於冬暮唐可頻瑜洞庭獻新橘賦洞庭之逺兮亘全楚而連巨呉路悠悠以窮塞波淼淼而平湖逺國之奥壤中華之外區風土所宜兮四方各異珍果斯出兮諸夏或無至於白商謝𤣥律改風落瑤林寒生窮海枇杷落而將盡荔枝摘而不待然後浮香外散美味中成照斜暉而金色帶曉潤而霜清圓甚垂珠琪樹方而孰可味能適口玊果比而全輕在禹貢非它於周制則那充厥包於林下發使者於江沱穰橙不得而雜楚柚不得而和所獻者皆歎其美所貴者不以其多嵗峥嶸而已晩路﨑嶇而自逺齊萬物以坌入離本枝而不返其價可重其味可珍固緑蔕而未變施素錦而猶新兹夕發於南國已朝奉於北辰匪雕飾以自媚實羽翼以因人獻芹者既非其匹敵獻桃者何足以等倫豈比夫江北則枳江陵則洲隨樝棃而莫遂備職貢而無由同碩果而已矣望君門兮阻修美哉植物斯多結實者衆斯橘也栽則隔乎淮浦生則主乎雲夢獨專美於當年及嵗時而入貢仲子陵洞庭獻新橘賦皇帝垂衣裳而洽萬國舞干戚而來九區包之橘柚至自江湖嵗以為常知方物之咸有時而後獻表庭實之何無本其來則風秋洞庭霜落寰海元侯布教下吏旁採碧林冬生大小異名已去霜蔕初辭緑莖然後盛以瀟湘之竹束以江淮之菁背楚塞以西走望秦雲而北征上方端想𤣥默深居穆清扇鴻鈞而不宰張大樂而無聲閲彼要荒之貢得斯華實之英乃明四目乃停九歌朱紱方來以彰其道泰碩果可食以表其時和時和在乎務本道泰在乎柔逺一果熟知百果之不荒一方來知萬方之未晩橘之名也則珍橘之熟也惟新越彼千里獻於一人丹其實體南方之正酸其味含木德之純足以附荔枝於末葉遺檳榔於後塵然出自荒陬升聞莫由煙波無已嵗月空流豈知夫湮沉可逹職貢可修辭草澤以孤往入金門而見收物之因人也其則以衆人之象物也豈不或中儻草木之可儔希成名於入貢李徳裕瑞橘賦并序清霜始降聖上命中使賜宰臣等朱橘各三枚蓋靈囿之所植也臣伏以渡淮爲枳由地氣而不遷吹谷生黍信陽和之有感昔漢武致石榴於異國靈根遐布此西域柔服之應也魏武植朱橘於雀園華實不就乃呉人未格之兆也考於前史昭晰可知豈非天地同和羣物效祉去蠻邦之陋獲近太陽感王化之威更承膏露草木尚爾况乎人心漢宣帝宫館山澤意有所感必使近臣賦之臣幼學為文忝列樞近敢稽首而獻賦曰美南州之嘉樹受烈氣於炎德固一志於殊方遂不遷於上國貞枝凝碧蔚湘岸之夕隂華實變黄動江潭之秋色雜丹楓於溪畔映緑篠於巖側翡翠以之列巢鵷雛於焉栖息雖同霑於雨露竊自得於雕飾終獲譽於皇明豈因人之羽翼感大鈞之獨運輸造化之𤣥力思六合以同風採孤根而移植播元氣以茂育諒英靈之不測逮乎霜飛文囿風落秦川金莖炫熀於朝日玊樹菁蔥於霽天峩方壺之翠島列靈沼之清漣上蔚檉松下秀蓀荃赩朱草與屈軼曄紫芝與賓連靈卉必植而嘉橘在焉碧葉獨潤金衣更鮮天漢之華星焜燿閬風之珠樹粲然香若團於野露色疑炫於江煙既而大官獻新竒果列筵非厥包之自逺何菲陋之莫傳樹隐方塘比丹萍之初實盤映皎月與赤瑛而共妍東鄙孤臣謬塵三事既乏和羮之用猶霑可口之味并食不割竊愧晏嬰之知捧之以拜重感桓榮之賜庶不朽於雪霜永酬恩於天地文賦散句增漢東方朔七諫斬伐橘柚兮列樹苦桃司馬相如上林賦橘柚芬芳張衡南都賦穰橙鄧橘李尤七歎金衣素裏斑理内充徳陽殿賦橘柚含桃百果成叢晉杜預七規庶羞既異五味代臻糅以丹橘雜以芳鱗左思蜀都賦户有橘柚之園傅㢲七誨閩山朱橘陳周𢎞讓答王褒書江南燠熱橘柚冬青五言古詩增漢無名氏古詩橘柚垂華實乃在深山側聞君好我甘竊獨自雕餙委身玊盤中厯年冀見食芳菲不相投青黄忽改色人儻欲我知因君為羽翼晉張華橘橘生湘水側菲陋人莫傳逢君金華宴得在玊几前梁簡文帝詠橘萎蕤映庭樹枝葉凌秋芳故條雜新實金翠共含霜攀枝折縹榦甘㫖若瓊漿無假存雕飾玊盤余自嘗沈約園橘緑葉迎露滋朱苞待霜潤但令入玊柈金衣非所恡范雲園橘芳條結寒翠圓實變霜朱徙根楚洲上來覆廣庭隅徐摛詠橘麗樹臨江浦結翠似芳蘭焜煌玊衡㪚照耀金衣丹愧以無雕餙徒然登玊盤虞羲橘衝颷發隴首朔雪度炎洲摧折江南桂離披漢北揪獨有凌霜橘榮麗在中州從來自有節嵗暮將何憂隋李孝貞詠橘樹嘉樹出巫隂分根徙上林白華如㪚雪朱實似懸金布影臨丹地飛香度玊岑自有凌冬質能守嵗寒心唐孟浩然庭橘明發覽羣物萬木何隂森凝霜漸漸水庭橘似懸金女伴爭攀摘摘窺礙葉深並生憐共蔕相示感同心骨刺紅羅被香黏翠羽簪擎來玊盤裏全勝在幽林原杜甫病橘羣橘少生意雖多亦奚為惜哉結實小酸澀如棠棃剖之盡蠧蝕採掇爽所宜紛然不適口豈止存其皮蕭蕭半死葉未忍别故枝𤣥冬霜雪積况乃囘風吹嘗聞蓬萊殿羅列瀟湘姿此物嵗不稔玊食失光輝寇盗尚慿陵當君減膳時汝病是天意吾諗罪有司憶昔南海使奔騰獻荔枝百馬死山谷到今耆舊悲增桞宗元南中榮橘柚橘柚懐貞質受命此炎方宻林耀朱緑晩嵗有餘芳殊風限清漢飛雪滯故鄉攀條何所歎北望熊與湘宋范成大手植綠橘十年不花緑橘生西山得自髯翁家云此接活根是嵗當著花俛仰乃十霜垂蠧紛相遮芳意竟寂寞枯枝謾槎牙風土諒非宜翁言豈予夸㑹令返故山髙深謝汚邪石液滋舊根山英擢新葩黄團挂霜實大如崆峒瓜當有四老人來駐七香車橘園橘中有佳人招客果下遊胡牀到何許坐我金碧洲沉沉翦綵山垂垂萬星球竒采日中麗生香風外浮折贈黄團䨇珍逾桃李投拆開甘露囊快吸冰泉甌熱惱散五濁豈止沉疴瘳未知商山樂能如洞庭否元楊載橘中篇竝海無山林莽莽皆平疇君家擇地利即此營莵裘雜樹作藩屏青紅間綢繆其中植橘柚擁蔽枝葉稠盛夏開白華朱實懸高秋飛霜虐萬物寒風助颼飀凌晨察變候䇿杖廵維陬是何黄金多暴露宜藏收採摘資衆力轉輸及他州子長傳貨殖謂此同列侯上充國家賦下貽篚筥謀千縑可坐致何必龍陽洲原明孫齊之謝送橘美人有嘉樹結實如黄金㣲霜降秋節芬芳滿中林采采不盈篋嵗暮逺相尋緘以尺素書致以瑤華音開緘讀素書字字瑯與琳把玩不去手置我高堂隂恍行洞庭上秋色瀟湘深况此東南美橘頌歩高吟橘柚匪芬芳荷君芬芳心七言古詩增宋李綱食橘洞庭一夜天雨霜橘林緑苞朝已黄逺題書後三百顆入手便覺秋風香黄金為膚白玊瓤沆瀣深貯甘且芳雕盤初擘噀清露冰齒乍嚼流瓊漿色香氣味紛可喜下視衆果皆茫茫嗟余平生愛種此木奴千樹梁谿傍只今蒿艾已埋没豈敢向日争熒煌蓬萊雲氣久寂寞漢殿無復羅瀟湘厥包縱有盡酸澀剖之蠧朽安足嘗乃知汝病是天意坐使玊食無輝光荒山乃爾飫佳品安得騕褭置錦堂君不見杜陵野老歌病橘蕭蕭半死誠可傷范成大清江道中橘園正夥芳林不斷清江曲側影入江江水緑未論萬户比封君瓦屋人家衣食足暑風汎花蘭芷香秋日籬落明青黄客舟來遲佳景盡但見碧樹愁春霜金党懐英題大理評事王元老䨇橘堂朱橘復朱橘傳分包貢實煌煌中堂榜奇畫照公堂前蘐草碧公今致養豐禄食更取蠻珍奉顔色舉觴一笑三千秋坐㸔諸孫索梨栗元謝應芳洞庭胡敬之以余父執之交嵗饋新橘凡十有餘年感無以報是用作歌湖山清氣鍾而翁生兒亦有古人風年年送橘拜牀下甚愧我非龎徳公今年霜落洞庭早橘熟先於葑田稻青衣童子黄金丸橘頭摘來霜未乾儂家食指百三十分甘喜得皆波及嬌癡堪笑兩曾孫手弄金丸口欲吞阿翁老饕三嚥畢已敎食之還自喫一枝一枝復一枝翁有笑聲孫亦咍枯腸久似長卿渴甘露適從仙掌來楚江萍實不可得華峰藕亦無人識冷比雪霜甘比蜜此句眞可題此橘韓子之詩今代無借作報章揮我筆懐哉故人家洞庭七十二峰環翠屏洛陽秋風塵滿城莫能汚爾䨇鞵青南山不爛黄河清正須坐閲三千齡山中舊識諸耆英煩道老夫多寄聲五言律詩增唐李嶠詠橘萬里盤根植千株布葉繁既榮潘子賦方重陸生言玊蘤含霜動金衣逐吹翻願辭湘水曲長茂上林園原宋楊萬里橘花花静何須艶林深不隔香初聞何處覓小摘莫令長春落秋仍發梅兼雪未強縹瓷汲寒砌淺浸一枝凉不夜非闗月無風也自香著花能許細落子不多長玊糝開猶半金鬚撚更長解愁何必醉遇暑却生凉增明吳寛玊汝席上詠橘來從馬上郎猶帶洞庭霜香霧騰金斚清冰貯赤囊曾聞書後寫宜向醉中嘗愛此非陳紫能留客滿堂申時行楚頌亭為憐湘浦色聊借洞庭株有地容嘉樹無心利木奴緑苞含露潤朱實帶霜腴嵗晩留芳潔還疑挹左徒七言律詩增唐李紳橘園江城霧斂輕霜早園橘千株欲變金朱實摘時天路近素英飄處海雲深懼同枳棘愁遷徙每抱馨香委照臨憐爾結根宜自保不随寒暑換貞心白居易揀貢橘書情洞庭貢橘揀宜精太守勤王請自行珠顆形容随日長瓊漿氣味得霜成登山敢惜駑駘力望闕難伸螻蟻情疎賤無由親跪獻願慿朱實表丹誠張彤和揀貢橘凌霜逺渉太湖深䨇卷朱旗望橘林樹樹籠煙疑帶火山山照日似懸金行看採掇方盈手暗覺馨香已滿襟揀選封題皆盡力無人不感近臣心周元範和揀貢橘離離朱實緑叢中似火燒山處處紅影下寒林沈緑水光搖高樹照晴空銀章自竭人臣力玊液誰知造化功看取明朝船發後餘香猶尚逐仁風皮日休早春以橘子寄魯望箇箇和枝葉捧鮮彩疑猶帶洞庭煙不為韓嫣金丸重直是周王玊果圓剖似日魂初破後弄如星髓未銷前知君多病仍中聖盡送寒苞向枕邊陸龜蒙襲美以春橘見惠兼之雅篇因次韻酬謝到春猶作九秋鮮應是親封白帝煙良玊有漿須讓味明珠無類亦羞圓堪居漢苑霜棃上合在仙家火棗前珍重更過三十子不堪分付野人邊原宋劉克莊橘花一種靈根有異芬初開尤勝結丹蕢白於薝蔔林中見清似㫋檀國裏聞淡月珠胎明璀璨㣲風玊屑撼繽紛平生荀令薫衣癖露坐花間至夜分五言絶句增宋梅堯臣前以柑子詩酬行之既食乃緑橘也頃年襄陽人遺柑子辨是緑橘今反自笑之昔辨荆州悮今為越叟迷黄柑與緑橘正似珷玞圭七言絶句御製盆中橘實甚繁詠此厥包禹貢自揚州作頌騷人楚澤留爭似青條朱實好移來滿樹洞庭秋增宋韓琦次韻答滑州梅龍圖惠鼎州甘橘芳訊欣隨客鯉開雅篇共付木奴來病翁逢酒惟憂過更使湘包下滑杯曾鞏橘剖見隋珠醉眼開丹砂縁手落塵埃誰能有力如黄犢盡摘繁星始下來原范成大田園雜興新霜徹曉報秋深染盡青林作纈林惟有橘園風景異碧叢叢裏萬黄金朱子次韻吕季克橘堤君家池上幾時栽千樹玲瓏亦富哉荷盡菊殘秋欲老一年佳處眼中來增葉適橘枝詞蜜滿房中金作皮人家短日挂疎籬判霜翦露裝船去不唱楊枝唱橘枝金劉著伯堅惠緑橘黄苞猶帶洞庭霜翠袖傳看緑葉香何待封題三百顆只今詩思滿江鄉原明沈懋孝洞庭秋水接三江正美鱸魚橘柚香絲管家家明月夜儂今何事不還鄉陳繼儒睡起難禁酒力加醉時随臥白鷗沙草堂位置新籬落蕉葉西邊橘試花詩散句增唐張九齡江南有丹橘經冬猶緑林杜甫青惜峰巒過黄知橘柚來此邦千樹橘不見比封君張籍野路臨西浦門前有橘花白居易江陵橘似珠宜城酒如餳宋劉敞磊落蠟珠圓參差金壺裏頌聲騷客誤錫貢禹書遲李覯嫩橘摘千苞肥魚斫千尾司馬光楚岸橘花香扁舟泛𣺌茫張舜民彼美出南國闗山不常有晁冲之荆州持大橘亦名作黄柑程敦厚春飛白雪花秋吐黄金實香散風前麝漿寒霜後蜜陸游西窓夕陽暖摘橘薦新醅金吳激天南家萬里江上橘千頭唐杜甫秋日野亭千橘香玉杯錦席高雲凉原白居易楓林橘樹丹青合複道崇樓錦繡懸增白居易掩映橘林千㸃火泓澄潭水一盆油浸月冷波千頃練苞霜新橘萬株金劉禹錫秋風門外旌旗動曉露庭中橘柚香曹唐閒依碧海攀鸞駕笑就蘇君覓橘嘗張泌千里晩霞雲夢北一洲霜橘洞庭南宋丁謂香於梔子細於梅柳絮棃花向後開劉敞江南碧木映霜秋丹實秋香破客愁李覯水仙坐下魚鱗赤龍女門前橘樹香曾鞏入苞豈數橘柚賤芼鼎始足鹽梅和原王珪黄欺晩菊垂金砌圓並明珠落翠盤增王安石浥霜火齊纍纍熟噀露金苞冉冉香蘇軾春夢屢尋湖十頃家書新報橘千頭水底笙歌蛙兩部山中奴婢橘千頭孫覿酒傾白墮杯行玊橘破黄苞坐飣金徐似道那堪富有千頭橘便可稱為四老人陸游麴米舂香雖可醉瀼西新橘尚餘酸元李孝光池上小風花樹午夜深疎雨橘林秋周庾信甘橘萬頭奴唐張九齡數處橘為洲周瑀寒深包晩橘孫逖霜多山橘熟孟浩然金子耀霜橘岑參新橘香官舍庭樹純栽橘李白巖種朗公橘人煙寒橘柚原杜甫橘井尚高騫天寒橘柚垂荒庭垂橘柚白居易橘苞從自結果擘洞庭橘劉禹錫星懸橘柚村桞宗元橘柚當家僮韓翃縣道橘花裏衣香楚山橘孟郊橙橘金蓋檻李商隐青辭木奴橘鄧橘未全黄喜客常留橘許渾寒橘帶霜甘韓偓手香江橘嫩宋劉筠三江橘帶霜江橘富霜秋林疎丹橘迥王珩彥霜重橘奴肥孫覿橘圃聚千奴陸游橘包霜後美唐杜甫橘洲田土仍甘腴張籍江南人家多橘樹韓翃把手閑歌香橘下姚合橘村籬落香潛度杜牧楚香寒食橘花時方干橘枝亞路黄苞重薛能疉果盤餐丹橘地秦韜玊橘香深處釣船横皮日休千株橘樹唯沽酒橘為風多玊腦鮮韋莊滿岸秋風吹枳橘宋梅堯臣緑橘黄柑帶葉收蘇軾不容朱橘更論錢一㸃黄金鑄秋橘黄庭堅君家秋實羅浮種張耒清園一洗黄金團元周權洞庭霜橘包黄銀倪瓚山園細路橘花香顧瑛橘摘並蔕黄金重詞增宋蘇軾浣溪沙菊暗荷枯一夜霜新苞緑葉照林光竹籬茅舍出青黄香霧噴人驚半破清泉流齒怯初嘗吳姬三日手猶香李璧清平樂西江霜後萬㸃暄晴晝璀璨寄來光欲溜正值文君病酒畫屏斜倚窓紗睡痕猶帶朝霞為問清香絶韻何如欲語梅花西江月昨夜十分霜重曉來千里書傳吳山秀處洞庭邊不夜星垂初徧好事寄來禪侣多情將送琴仙為憐佳果稱嬋娟一笑聊同清宴别録增新論士有大趣不修容儀不惜小檢而謂之棄人是見朱橘一子蠧因翦樹而棄之覩縟錦一寸㸃乃全匹而燔之古今注蛺蝶大如蝙蝠者或黑色或青斑名為鳳子一名鬼車生江南柑橘園中寰宇記蒼梧土諺曰郡中甘橘多被黑蟻所食人家買黄蟻投樹上因相鬬黑蟻死甘橘遂成原日用本草橘實同螃蟹食令人患輭癰日華本草口渴吐酒橘瓤上筋膜炒熟煎湯飲甚效種植種子及栽皆可以枳樹截接或貼接尤易成宜肥地至冬須以大糞壅培則來年花實俱茂遇旱以米泔灌溉則實不損落根下埋死䑕則結實加倍物類相感志云橘見尸而實繁湼槃經云如橘見䑕其果實多增避暑録話橘極難種吾居山十年凡三種而三槁其初移栽皆三四尺餘一嵗便結實纍然可愛未幾偶嵗大寒多雪即立槁雖厚以苫覆草擁不能救也蓋性極畏寒而吾居在山之半又面北多北風與平地氣候絶不同今吳中橘亦惟洞庭東西兩山最盛他處好事者園圃僅有之不若洞庭人以為業也凡橘一畝比田一畝利數倍而培治之功亦數倍於田橘下之土幾於用篩未嘗少以瓦甓雜之田自種至刈不過一二耘而橘終嵗耘無時不使見纖草地必面南為屬級次第使受日每嵗大寒則於上風焚糞壤以溫之吾不如老圃信有之矣學圃餘疏柑橘產於洞庭然終不如浙溫之乳柑閩漳之朱橘有種紅而大者云傳種自閩而香味徑庭矣余家東海上又不如洞庭之宜橘乃土産蜕花甜蜜橘二種却不啻勝之橘性畏寒值冬霜雪稍盛輙死植地須北藩多竹霜時以草裹之又虞春枝不發原灌培多能鄙事茅灰及羊矢壅之多生實十一月内將橘樹根寛作盤澆大糞三次至春用水澆二次花實必茂鋪乾松毛中不近酒處多不壞收藏便民圖纂十月後將金橘安錫器内或芝蔴雜之經久不壊若橙橘之類藏菉豆中極妙弗近米邊見米即爛增橘録有人用糖熬橘者謂之藥橘入蒻灰於鼎間色乃黑可以將逺又橘㣲損則去皮以肉瓣安竈間用火薫之曰薫橘置之糖蜜中味亦佳物類相感志收湘橘用煑湯錫瓶收之經年不壊山家清供舊遊東嘉時在水心先生席上邊浄居僧送饐至如錢大各合橘葉清香靄然如在洞庭左右先生詩曰不待滿林霜後熟蒸來便作洞庭香因謁寺僧曰采蓮與橘葉搗汁加蜜和米粉作饐各各以葉蒸之市有賣者特差大耳附録橘皮原橘皮一名陳皮一名紅皮去白者名橘紅未熟而色青者名青皮凡使勿用柚皮柑子皮誤用有害橘皮乃六陳之一日用所需不可不慎擇橘皮紋細色紅而薄内多筋脈其味苦辛温柑皮紋粗色黄而厚内多白膜其味辛甘柚皮最厚而虛紋更粗色黄内多膜無筋其味甘多辛少橘皮性溫柑柚皮性冷柚皮更不可用橘皮治百病總是取其理氣燥濕之功苦能泄能燥辛能散温能和同補藥則補同瀉藥則瀉同升藥則升同降藥則降寛膈利氣消痰極有殊功他藥貴新惟此貴陳又能治魚腥可作食料去白者以白酒入鹽洗潤透刮去筋膜曬乾用青皮色青氣烈味苦而辛治之以醋所謂肝欲散急食辛以散之以酸瀉之以苦降之也陳皮浮而升入脾肺氣分青皮沉而降入肝膽氣分一體而二用青皮最能發汗有汗者忌用二皮合用推陳致新大益人忌多用久服能損元氣御定佩文齋廣羣芳譜卷六十四
