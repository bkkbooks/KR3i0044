body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷六十五果譜柑原柑古作甘開寶本草云柑未經霜時猶酸霜後甚甜故名柑子梅溪詩注云他果非無甘者惟柑從甘言最甘也一名瑞聖奴詳見后清異録生江南及嶺南閩廣温台蘇撫荆爲盛川蜀次之樹似橘少刺實亦似橘而圓大霜後始熟味甘甜皮色生青熟黄比橘稍厚理稍粗而味不苦惟乳柑山柑皮可入藥橘實可久留柑實易腐敗柑樹畏冰雪橘樹畧可耐此柑橘之異也乳柑出溫州泥山為最其味似乳酪故名其木婆娑其葉纖長其花香韻其實圓正其膚理如澤蠟其大六七寸其皮薄而味珍脈不黏瓣食不留滓一顆僅二三核亦有全無者擘之香霧噀人為柑中絶品海紅柑樹小而實極大有圍及尺者皮厚色紅可久藏今獅頭柑亦其類洞庭柑出洞庭山皮細味美其色如丹其熟最蚤甜柑類洞庭而大毎顆八瓣未霜先黄比他柑加甜饅頭柑近蔕如饅頭尖味香美生枝柑色青膚粗味似石榴㣲酸可耐久霜時留之枝間俟味變甘帶葉而折新美可愛平蔕柑出成都大如升色蒼黄朱柑類洞庭而大色嫣紅味多酸以刀破之漬以鹽始可食木柑膚理堅頑瓣大而乏膏外疆中乾故名以木又有白柑沙柑之類增廣志黄柑出珠崖止一核北户録變柑出新州有苞大於升者其皮薄如洞庭之橘餘柑之所弗及傳云移植不百里形味俱變因以為名雲南志獅頭柑狀如獅頭而色黄其大如椀味最甘美衡州志沅江出佛頭柑霜柑益部方物畧記柑生果渠嘉等州結實埓於江南味亦差為薄云原橘録柑别種有八橘别種為十四橙别種為五凡其類合二十有七而乳柑推第一故溫人謂乳柑為眞柑謂他皆若假設者而獨眞柑為柑爾且溫數邑俱種柑而出泥山者又傑然推第一增全芳備祖韓彥直橘録但知乳柑出於泥山獨不知出於天台之黄巖出於泥山者固竒出於黄巖者尤天下竒也榕城隨筆漳南産柑橘其種不一而顆皆碩大蘆柑為最紅柑次之蘆柑色稍黄紅柑則正赤皆佳種也三衢所產似亦當稍讓連江一種差小而味亦甘當在武陵蜜橘之列原性大寒治腸胃熱毒解丹石止異渴多食令人脾冷生痰發痼癖皮調中下氣核可作塗面藥彚考原謝承後漢書丹陽張磐字子石為廬江太守潯陽令嘗餉一奩甘其小男年七嵗就取一枚磐奪其甘外卒以兩枚與之磐奪兒甘鞭卒曰何故行賂於吾子增宋書符瑞志宋文帝元嘉十二年二月南郡江陵庾和園柑樹連理原宋書彭城王義康傳義康輔政四方獻饋皆以上品薦義康而以次者供御上嘗冬月噉甘嘆其形味并劣義康在坐曰今年甘殊有佳者遣人還東府取甘大供御者三寸梁書吕僧珍傳僧珍有大勲任總心膂恩遇隆密莫與為比性甚恭慎每侍御座屏氣鞠躬果食未嘗舉箸嘗醉後取一柑食之高祖笑謂曰便是大有所進增南史張暢傳孝武鎮彭城暢為安北長史魏太武求酒及甘橘暢宣孝武㫖并致螺杯雜粽太武遣送氊及九種鹽并胡䜴又求黄甘答曰知更須黄甘誠非所吝但㑹不足周彼一軍向給魏主未應便乏故不復重付唐書地理志蘇州湖州溫州台州洪州土貢乳柑原唐書蕭嵩傳荆州進黄柑帝以紫帉包賜之增宋史五行志康定元年十月始興縣柑兩本連理南方草木狀交趾人以席囊貯蟻鬻於市者其窠如薄絮囊皆連枝葉蟻在其中並窠而賣蟻赤黄色大於常蟻南方柑樹若無此蟻則其實皆為羣蠧所傷無復一完者矣今華林園有柑二株遇結實上命羣臣宴飲於旁摘而分賜焉原搜神記南康郡南東望山有三人入山見山頂有果樹衆果畢植行列齊整如人行甘子正熟三人共食至飽乃懐二枚欲出示人廻旋半日迷不得歸聞空中語云催放䨇甘乃聽汝去荆州記枝江有宜都舊都江北有甘園名宜都甘湘州記州故大城内有陶侃廟其地是賈誼故宅誼時種甘猶有存者世説王丞相儉節帳下甘果盈溢不㪚渉春爛敗都督白之公令舍去曰慎不可令大郎知五代新説隋文帝嗜柑蜀中摘黄柑皆以蠟封蔕獻日久猶鮮大唐新語益州嵗進柑子皆以紙裹之他時長史嫌不敬代以細布既而恐柑子為布所損每常憂懼俄有御史甘子布至長吏以為推布裹柑事懼曰果為所推及子布到驛長吏叙以布裹柑子為敬子布初不知之久而方悟聞者莫不大笑增酉陽雜俎嶺南有蟻大於秦中馬蟻結窠於甘樹甘實時常循其上故甘皮薄而滑往往甘實在其窠中冬深取之味數倍於常者原南越志開元中有神仙持羅浮柑子種於南樓寺其後常資進獻至幸蜀幸奉天之嵗皆不結實零陵總記李直方常第果實若貢士以柑爲四異聞録宣宗時董元素自江南來上召見留於翰林中宿夜召與語曰聞公頗有神術今南中柑橘正熟公能致之否對曰請安一合於榻前數刻忽有微風入簾啓合柑滿其中奏云此江陵支縣柑也他處恐來遲上嘗之驚嘆開元天寶遺事明皇食柑千餘枚皆缺一瓣問進柑使者云途中有道士嗅之蓋羅公逺也增清異録天寶年内中柑樹結實帝日與貴妃賞御呼為瑞聖奴太眞外傳開元末江陵進乳柑上以十枚種於蓬萊宫天寶十載九月結實宣賜宰臣曰朕於宫中種柑子數株今秋結實一百五十顆乃與江南及蜀道所進無别亦可謂稍異者乃頒賜大臣外有一合歡實上與妃子互相持翫上曰此果似知人意朕與卿固同一體所以合歡於是促坐同食焉因令畫圖傳之於後宰臣賀表云雨露所均混天區而齊被草木有性憑地氣而潛通故得兹江外之珍果為禁中之華實云云續仙傳唐宣宗嘗食柑子軒轅集曰臣羅浮山下所植味踰於此上歎曰朕無縁得之集取御前碧玊甌覆以寶盤頃得柑上食而甘之歸田録韋臯鎮西蜀有黄柑一樹方熟衆實皆落惟樹杪一蔕獨存其大如椀枝葉滋茂韋曰此竒果也令去蔕尺餘折之其實蔕自落有善醫咎殷曰凡木實未過時蔕自落乃實之病也請鍼驗之乃引鍼就蔕刺之其實應手而轉殷則連下一刺血濺盈袖韋大驚披之則兩頭蛇也燕翼貽謀録承平時温州鼎州廣州皆貢柑子尚方多不過千少或百數其後州郡苞苴權要負擔者絡繹又以易腐多其數以備揀擇重為人害天聖六年四月庚戌詔三州不得以貢饋為名餉遺近臣犯者有罰然終不能禁也今惟溫有嵗貢嵗饋鼎廣不復有之矣春渚紀聞章申公父銀青公俞年七十集賓親為慶會有餉柑者味甘而實極瑰大既食之嘉其種即令收核種之後圃後更食柑十年邵氏聞見後録柑橘二物草木書各為一條安定郡王以黄柑釀酒曰洞庭春色東坡之賦皆用橘事豈以橘條下云其類有朱柑乳柑黄柑石柑乎夫柑無故事名洞庭春色亦橘也原詩話唐上元夜宫人以黄羅包柑遺近臣謂之傳柑宴集藻表增唐劉禹錫代武中丞謝新柑表臣某言中使至奉宣聖㫖賜臣新柑若干顆猥降殊私再頒名果自逺稱貴以新為榮伏以果實既成南方有貴瓊茅合貢中禁為珍方外貢來人間未覩黄苞輝穎雕俎增華芬芳初佐於天庖慶賜忽霑於凡口甘踰萍實剖食既同於楚謠寒比柘漿析酲何慙於漢史恩光斯重尺素彌彰誓當捐軀以申上答無任感戴之至啓增梁劉潛謝晉安王賜甘啓削彼金衣咽茲玊液甘踰萍實冷亞冰壺立消煩䬼頓除酩酊追嗤齊相進不剖之實逺笑魏君逢裂牙之味原庾肩吾謝湘東王賚甘啓名傳地里逺自武陵之洲族茂神經遙聞建春之嶺王逸為賦取對荔枝張衡製辭用連石蜜足使萍實非甜葡萄猶䬼傳原宋蘇軾黄甘陸吉傳黄甘陸吉者楚之二高士也黄隱於泥山陸隱於蕭山楚王聞其名遣使召之陸吉先至賜爵左庶長封洞庭君尊寵在羣臣右久之黄甘始來一見拜溫尹平陽侯班視令尹吉起隱士與甘齊名入朝久尊貴用事一旦甘位居上吉心銜之羣臣皆疑之㑹秦遣蘇軫鍾離意使楚楚召燕章華臺羣臣皆與甘坐上坐吉咈然謂之曰請與子論事甘曰唯唯吉曰齊楚約西擊秦吾引兵踰闗身犯霜露與枳棘最下者同甘苦率家奴千人戰李洲之上拓地至漢南而歸子功孰與甘曰不如也曰神農氏之有天下也吾剝膚剖肝怡顔下氣以固蔕之術獻上上喜之命注記官陶𢎞景狀其方畧以付國史出為九江守宣上德澤使童兒亦懐之子才孰與甘曰不如也吉曰是二者皆居吾下而位吾上何也甘徐應之曰君何見之晩也每嵗太守勸駕乘傳入金門上玊堂與虞荔申梠梅福棗嵩之徒列侍上前使數子者口呿舌縮不復上齒牙間當此之時屬之於子乎屬之於我乎吉黙然良久曰屬之於子矣甘曰此吾之所以居子之上也於是羣臣皆服嵗終吉以疾免更封甘子為穰侯吉之子為下邳侯穰侯遂廢不顯下邳以美湯藥官至陳州治中雜著原明劉基賣柑者言杭有賣果者善藏柑渉寒暑不潰出之􅂱然玊質而金色置於市價十倍人爭鬻之予貿得其一剖之如有煙撲口鼻視其中則乾若敗絮予怪而問之曰若所市於人者將以實籩豆奉祭祀供賓客乎將衒外以惑愚瞽也甚矣哉為欺也賣者笑曰吾業是有年矣吾業賴是以食吾軀吾售之人取之未嘗有言而獨不足子所乎世之為欺者不寡矣而獨我也乎吾子未之思也今夫佩虎符坐臯比者洸洸乎干城之具也果能授孫呉之畧耶峩大冠拖長紳者昻昻乎廟堂之器也果能建伊臯之業耶盗起而不知禦民困而不知救吏姦而不知禁法斁而不知理坐糜廪粟而不知恥觀其坐高堂騎大馬醉醇醴而飫肥鮮者孰不巍巍乎可畏赫赫乎可象也又何往而不金玊其外敗絮其中也哉今子是之不察而以察吾柑予黙然無以應退而思其言類東方生滑稽之流豈其憤世疾邪者耶而託於柑以諷耶頌增梁宗炳甘頌煌煌嘉實磊如景星南金其色隋珠其形贊增晉王升之甘橘贊節重履險操貴有恒二樹保榮四運齊能在質惟美於味斯𢎞異分南域北則枳橙宋宋祁柑贊碧葉素葩厥包之珍丹裏既披香液飴津賦增晉胡濟黄甘賦惟江南之竒果資天地之正陽生殊方之妙域植朱島之遐鄉處漢之南背江之隂左協蘭臯右接桂林帶激水之清流向崇山之高岑三秋迭運初寒履霜照耀原隰䕃映林荒若菱華之繡綺井燭龍之銜金璫劉瑾甘樹賦伊㝠造之綿綿兮纚成象於成遇嗟卉草之森秀兮將歸美於甘樹誕寄生於南楚兮播萬里而東布浸冷泉以搖根兮竦逸條以承露結密葉以舒䕃兮滌纖塵以開素仰清氣以旭晨兮流惠飇於薄暮雖飛榮於園沼兮契巒松之貞趣時屢遷而彌貞兮凌寒暑而一度宋謝惠連甘賦嘉寒園之麗木美獨有此貞芳質葳蕤而懐風性耿介而凌霜擬夕霞以表色指朝景以齊圓侔萍實乎江介超玊果於崑山傾子節兮湘之區承君玩兮堂之隅濯雨兮冐霜長無絶兮芬敷宋蘇軾洞庭春色賦并序安定郡王以黄柑釀酒名之曰洞庭春色其猶子德麟得之以餉予戲作賦曰吾聞橘中之樂不減商山豈霜餘之不食而四老人者游戲於其間悟此世之泡幻藏千里於一斑舉棗葉之有餘納芥子其何艱宜賢王之逹觀寄逸想於人寰嫋嫋兮秋風泛天宇兮清閒吹洞庭之白浪漲北渚之蒼灣攜佳人而往游勒霧鬢與風鬟命黄頭之千奴卷震澤而與俱還糅以二米之禾藉以三脊之管忽雲蒸而冰解旋珠零而涕澘翠勺銀罌紫絡青綸隨屬車之鴟夷欵木門之銅環分帝觴之餘瀝幸公子之破慳我洗盞而起嘗散腰足之痺頑盡三江於一吸吞魚龍之神姦五言古詩增陳徐陵詠柑朱實挺江南苞品擅珍淑上林雜嘉樹江潭間修竹萬室擬封侯千株挺荆國緑葉萋以布素榮芬且郁得陳終宴歡良垂雲雨育原唐杜甫阻雨不得歸瀼西甘林三伏適已過驕陽化為霖欲歸瀼西宅阻此江浦深壊舟百板坼峻岸復萬尋篙工初一棄恐泥勞寸心佇立東城隅悵望高飛禽草堂亂𤣥圃不隔崑崙岑昬渾衣裳外曠絶同層隂園柑長成時三寸如黄金諸侯舊上計厥貢傾千林邦人不足重所廹豪吏侵客居暫封殖日夜偶瑤琴虛徐五株態側塞煩胸襟焉得輟兩足杖藜出嶇嶔條流數翠實偃息歸碧潯拂拭烏皮几喜聞樵牧音令兒快搔背脱我頭上簪宋梅堯臣近有謝師厚寄襄陽柑子乃呉人所謂緑橘耳今王徳言遺姑蘇者十枚此眞物也因以詩答荆州特大橘亦自名黄柑忽得洞庭美氣味何可參遂生呉洲思恨不羽翼南和正月六日沈文通學士遺溫柑禹貢書厥包未知黄柑美競傳洞庭熟又莫永嘉比適觀隱侯詩獲此良可喜誦句擘露囊香甘冷熨齒明朝鎖禮闈何暇醉鄰里增陸游過林黄中食柑子有感學宛陵先生體博士得黄柑甚愛不忍擘持獻太夫人逺附海上舶故山饒氛霧可使酒杯窄豈無荔枝好饜飫恐不摘相去三千里無異娛旁側乃知母子意更逺未嘗隔我昨往見君從容弄書册藥分臘劑香茶泛春芽白主意顧未厭筐筥自搜索敢謂甘㫖餘亦及此下客霜包纔三四氣可厭千百重是慈孝物不敢吐其核甘寒雖遶齒悲感已横臆半生無歡娛初不為湮阨七言古詩增宋梅堯臣呉太博遺柑子太學先生欺緑橘呉興才士與黄柑黄柑似日勝崖蜜帶葉初擎翠竹籃還料楚王曾未識徒將萍實詫江南五言律詩原唐杜甫樹間岑寂䨇甘樹婆娑一院香交柯低几杖垂實礙衣裳滿嵗如松碧同時待菊黄幾囘霑葉露乘月坐胡牀甘園春日晴江岸千柑二頃園青雲羞葉密白雪避花繁結子隨邊使開筒近至尊後于桃李熟終得獻金門增宋司馬光黄柑黄金綴縹蔕搖落楚江涯采助杯盤勝羞將橘柚偕時移香不變物逺味尤佳欲種滄洲樹何年此意諧七言律詩原唐栁宗元栁州城西北隅種甘樹手種黄柑二百株春來新葉徧城隅方同楚客憐皇樹不學荆州利木奴幾嵗開花聞噴雪何人摘實見垂珠若教坐待成林日滋味還堪養老夫增宋楊億慎大詹以呉柑見貺龍陽休説木奴洲震澤黄柑占上流承露玊漿仙掌曙亞霜金顆洞庭秋香黏素手呉娃麗冷滌朝酲楚客愁應似荔支催入貢隨河飛鳥逐鳴騶韓維襄柑分惠景仁以詩將之荆州解綬十經春廻夢青林遶漢濱霜氣輕寒催紺實渚波餘潤作甘津僧園採掇寧論數客路奔馳竟占新雪意垂收高㑹缺分金聊助席間珍梅堯臣李廷老祠部寄荆柑子蹋雪衝風馳小吏帶霜連葉寄黄柑擘包欲咀牙全動舉盞逢衰酒易酣書尾自題知逺意筆頭親答厭多談故人莫覓新詩卷都似嵇康七不堪蘇舜欽師黯以彭甘五子為寄因懐四明園中此果甚多偶成長句以為謝憶向江東太守園猗猗甘樹蔽前軒風搖玊蘂霏㣲落霜發金衣委墜繁枕畔冷香通醉夢齒邊餘味滌吟魂天彭路逺無因得猶賴君心記舊恩原蘇軾食甘一䨇羅帕未分珍林下先嘗愧逐臣露葉霜枝翦寒碧金盤玊指破芳辛清泉䔩䔩先流齒香霧霏霏欲噀人坐客殷勤為收子千奴一掬柰吾貧曾幾謝人分餉洞庭柑黄柑分似得嘗新坐我松江震澤濵想見霜林三百顆夢成羅帕一䨇珍流雲噀霧眞成酒帶葉連枝絶可人莫向君家樊素口瓠犀微齼逺山顰明陳憲章元眞送柑溪園十月摘黄柑嵗月將窮致小籃繞膝癡孫高起舞百年乳酒正開罈色香本出棃之右風味眞無嶺以南不惜霜根傳藥圃白頭還解荷長鑱五言排律增宋韓琦召赴天章閣觀新柑雲閣崇先重霜柑薦瑞新臨觀紆法從趨召獨臣鄰晩實開天意重榮浹上人不隨淮枳變自此禹包珍廟獻宸心格親頒聖寵均從兹魁衆果仙府占長春王十朋薛士昭寄新柑分贈知宗提舶知宗有詩次韻書後誰題字鄉人逺寄柑薦新思起孝知味戒生貪羅帕分猶未金門獻正堪命名聊别偽在果獨稱甘白雪初盈樹黄金忽滿籃霜天欣始熟茅舍飽相諳客重開須請兒癡食更婪栁詩吟不厭謝賦讀常耽若蜜萍難比如拳栗有慙公家安定法想見日酣酣知宗柑詩用韻頗險予既和之復取所未用之韻續賦一首三十韻書閲揚州貢功觀禹化覃香苞分橘柚秋色動江潭破暑花凝雪凌寒葉染藍金衣丹日照珠實碧波涵未上諸侯計曾聞四皓談顏歡陸績母業世李衡男送客愈吟桂記時坡詠儋洞庭誇浙右溫郡冠江南節物清霜重家山緑蔕含青黄出籬落朱緑耀林嵐昔貢千金顆遙馳萬里函新宜薦寢廟香可供瞿曇䕫子那能比羅浮未許參何人傳黄陸端類列非聃在品寧為四蒙恩或賜三鄉情寄初熟旅况憶幽探嘉拜親開合珍藏淨洗甔行將解印綬歸種當田蠶根向横陽覓泥尋斥鹵擔荒蕪耘徑草封植半溪枏不用千頭富聊資一餉湛茅齋闢杜甫仙井汲蘇躭佳境妙餐蔗閒庭勝蒔苷鴈行三峽荔奴視四明蚶欲繼花為譜應同栁駐驂禦偷籬著棘愁凍灌添泔掩映青雲葉光華碧玊篸釀成浮甕蟻蒸辟蠧書蟫䕶蔕期存乳留皮欲去痰恨無親可遺松慘白巖庵七言排律原唐杜甫寒雨朝行視園樹柴門雜樹向千株丹橘黄柑此地無江上今朝寒雨歇籬中秀色畫屏紆桃蹊李徑年雖古梔子紅椒艶復殊鏁石藤梢元自落倚天松骨見來枯林香出實垂將盡葉蔕辭枝不重蘇愛日恩光蒙借貸清霜殺氣得憂虞衰顏動覓藜牀坐緩歩仍須竹杖扶㪚騎未知雲閣處猿嗁僻在楚山隅七言絶句增宋梅堯臣贈裴直講水棃二顆言太尠答呉甘三顆以為多走筆呈之緑橘似甘來太學大棃如水出咸陽莫將多少為輕重試擘霜包幾瓣香原蘇軾戲答王都尉傳柑侍史傳柑玊座傍人間草木盡天漿寄與維摩三十顆不知薝蔔是餘香增蘇轍毛君惠温柑楚山黄橘彈丸小未識洞庭三寸柑不有風流吳越客誰令千里送江南黄庭堅王揚康園君家秋實羅浮種已是纍纍半拂墻莫敎兒童酸打盡要看霜後十分黄從人求柑色深林裏風霜下香著尊前指爪間書後合題三百顆頻隨驛使未應慳花蘂夫人宫詞内人承寵賜新房紅紙泥窓繞畫廊種得海柑纔結子乞求自進與君王詩㪚句增宋張耒逢君金華宴正味百花先蘇軾歸來一㸃殘燈在猶有傳柑遺細君黄庭堅燕南異事眞堪紀三寸黄柑劈永嘉陳師道磊落金盤薦糟蟹纖柔玊指破霜柑陸游黄甘磊落圍三寸赤蟹輪囷可一斤何限人間堪恨事黄柑丹荔不同時唐杜甫白露團甘子甘子隂凉葉登俎黄甘重破甘霜落爪李頎柑實萬家香張籍夜月紅柑樹宋司馬光四郭柑垂䕃蘇軾留客薦霜柑孫覿黄甘破芳辛唐韋莊露和香蔕摘黄柑宋蘇軾聞道黄柑常抵鵲米芾玊破鱸魚霜破柑孫覿飣坐黄甘噀手香香霧噀手披黄苞劉克莊柑花似雪鬬芳新詞增宋晁補之洞仙歌江陵種橘尚比封侯貴何况江濤轉千里帶天香含洞乳宜入春盤紅荔子馳驛風流僅比齒疎潘令老怯咀冰霜十顆金苞漫分遺記觴前須細認别有餘甘從此去枉却栽桃種李想相如酒渴對文君迥不是人間等閒風味又溫江異果惟有泥山貴驛送江南數千里半含霜輕噀霧曾憶呉姬親贈我緑橘黄柑怎比䨇親雲水外遊子空懐惆悵無人可歸遺報周郎須念我物少情多春酒醉獨勝甜桃醋李况燈火樓臺近元宵渾不減當年袖中風味别録增橘録嵗當重陽色未黄採之名曰摘青及經霜之二三夕遇天氣晴霽羣以小翦就枝間平蔕斷之輕置筐筥䕶之必謹懼其香霧之裂則易壊尤不便酒香凡採者竟日不敢飲柑橘宜斥鹵之地種時高者畦壟溝以泄水每株相去七八尺嵗四鋤冬月以泥壅根夏時以糞溉之物類相感志藏柑子以盆盛用乾潮沙蓋之梅溪詩注柑橘花蒸之為香可辟衣書之蠧附録佛手柑增藝海泂酌佛手柑一名飛穰晉鈕滔母與呉國夫人書云此中果有飛穰出自南州原佛手柑本草云取象也木似朱欒而葉尖長枝間有刺植之近水乃生其實狀如人手有指有尺餘者皮如橙柚而厚皺而光澤其色如𤓰生緑熟黄其核細味不甚佳而清香襲人置衣笥中雖形乾而香不歇本草云南人雕鏤花鳥作蜜煎果食置之几案可供玩賞若安芋片於蔕而以濕紙圍䕶經久不􅂒或擣蒜罨其蔕上則香更充溢切片用滚湯衝飲極香美第二遍更佳浸汁洗葛紵絶勝酸漿橙原橙埤雅云橙柚屬可登而成故字從登又諧聲也一名金毬一名鵠見韓愈孟郊城南聯句樹似橘有刺實似柚而香晩熟耐久大者如盌經霜始熟葉大有兩刻缺如兩叚皮厚蹙衂如沸香氣馥郁可薰衣可芼鮮可和葅醢可為醬虀可蜜煎可糖製為橙丁可蜜製為橙膏可合湯待賔客可解宿酒速醒唐鄧間皆有江南尤多栽植與橘同多食傷肝氣發虛熱同獱肉食發頭旋惡心洗去瓤中酸汁和鹽蜜煎成貯食止惡心能去胃中浮氣惡氣皮消食下氣去胃中浮氣和鹽貯食止惡心彚考增西京雜記上林苑有橙十株石湖集詩注燕城外遇數車載新橙云修貢種之汴京擷芳園也集藻文賦散句增漢張衡南都賦穰橙鄧橘晉張協七命燀以秋橙庾闡揚都賦黄柑朱橙七言古詩增唐李頎照公院䨇橙種橙夾階生得地細葉隔簾見䨇翠抽條向長未及肩泉水遶根日三四青青何必楚人家帶雨凝煙新著花永願香爐灑甘露夕陽時映東枝斜南庭黄竹爾不敵借問何時堪挂錫宋曾鞏橙子家林香橙有兩樹根纒鐵鈕凌坡陀鮮明百數見秋實錯綴衆葉傾霜柯翠羽流蘓出天仗黄金戲毬相蕩摩入包豈數橘柚賤芼鼎始足鹽梅和江湖苦遭俗眼慢禁籞尚覺凡木多誰能出口獻天子一致大樹凌滄波七言律詩原宋梅堯臣食橙寄謝舍人洞庭朱橘未弄色襄水錦橙已變黄玊臼搗虀憐鱠美金盤按酒助杯香雖生南土名猶重未信中州客厭嘗欲寄百苞慿驛去只應佳味怯風霜五言絶句增宋蘇轍和文與可洋州園亭金橙徑葉如石楠堅實比霜柑大穿徑得新苞令公憶鱸鱠七言絶句原宋宋祁春日故鄉寒食荼䕷發百合香醲邸舍深漂泊江南春欲盡山橙髣髴慰人心歐陽修橙子嘉樹團團俯可攀壓枝秋實漸斕斑朱欄碧瓦清霜曉粲粲繁星緑葉間蘇軾贈景文荷盡已無擎雨蓋菊殘猶有傲霜枝一年好景君須記正是橙黄橘緑時和文與可洋州園亭金橙徑金橙縱復里人知不見鱸魚價自低須是松江煙雨裏小船燒薤擣香虀黄庭堅鄒松滋寄橙麴天將金闕眞黄色借與洞庭霜後橙松滋解作逡廵麯壓倒江南好事僧劉子翬食橙橙橘甘酸各效能南包錫貢不同升果中亦抱遺才嘆有客攀條氣拂膺常懐細雨初移日著子已見清霜澘絶憐面有貴人色偶致吾儕樽俎間橙虀細縷風韻勝我不痛飲那知音何如金丸走衾枕三月夢遊薝葡林自從天籞守吏散老樹零落煙雲淒今朝我為作知已小摘秋風黄欲齊花瓷泛蜜小劑供極有痛快鏖邪功生枝滋味雖可口流品故應甘下風詩㪚句增唐李白青橙拂户牖白水流園池宋蘇軾西風初作十分凉喜見新橙透甲香陸游臥聽牀頭壓酒聲起行籬下摘新橙原唐杜甫細雨更移橙霜橙壓香橘增孟郊鵠攢􅅛橙張籍溪寺黄橙熟張蠙别島垂橙實宋張耒霜橙共我鄉戴復古搓橙滿袖香元周霆震園霜未破橙宋陸游雨餘橙子已堪搓醉歸懐袖有新橙明李夢陽玊圃新橙摘早霜詞增宋史逹祖齊天樂庫紋隱隱鶯黄嫩籬落翠深偷見細雨重移新霜試摘佳處一年秋晩荆江未逺想橘友荒凉木奴嗟怨就説風流草泥來趁蟹螯健并刀寒映素手醉魂沉夜飲曾倩排遣沆瀣含酸金罌裹玊􅉡􅉡吳鹽輕㸃瑤姬齒輭待借取圑圓莫敎分散入手温存帕羅香自滿别録增山家清供橙大者截頂去穰留少液以蟹膏納其内仍以帶枝頂覆之入甑用酒醋水蒸熟加苦酒入鹽既香而鮮使人有新酒菊花香橙螃蟹之興因記危㢲齋積贊蟹云黄中通理美在其中暢於四肢美之至也此本諸易而與蟹得之矣今於橙蟹又得之矣附録香櫞原香櫞一名枸櫞柑橘之屬嶺南閩廣江西皆有之實大如小𤓰皮若橙而光澤可愛肉甚厚白如蘿蔔而鬆虛雖味短而香芬大勝置衣笥中經旬猶香古作五和糝用之彚考增南方草木狀枸櫞子肉甚厚白如蘆菔女工競雕鏤花鳥漬以蜂蜜㸃以燕檀巧麗妙絶無與為比泰康五年大秦貢十缶帝以三缶賜王愷助其珍味夸示於石崇學圃餘疏香櫞花酷烈甚於山礬結實大而香山亭前及㕔事兩墀皆可植香櫞雖味酸濺齒以為湯則大佳置實盤中盈室俱香實佳品也别録增物類相感志香圓去蔕以大蒜搗爛醢蔕上則滿室香更以濕紙圍蓋上香櫞蔕上安芋片則不􅂒養疴漫筆治𠻳方甚多余得一方甚簡但用香櫞去核薄切作細片以時酒同入砂瓶内煮令熟爛自昬至五更為度用蜜拌匀當睡中喚起用匙挑服甚效山家清供謝益齋奕禮不嗜酒嘗自不飲但能看客之醉一日晝餘琴罷命左右剖香圓二杯刻以花溫上所賜酒以勸客清芬靄然使人覺金樽玊斚皆埃􅅽矣金橘花附見原金橘一名金柑橘録云金柑在他柑特小大者如錢小者如龍目色似金一名盧橘本草云此橘生時青盧色黄熟則如金故有金橘盧橘之名盧黑色也或云盧酒器之名其形肖之故也一名夏橘本草云此橘冬夏相繼廣州志謂之夏橘一名山橘嶺表録云山橘子大如土𤓰次如彈丸金色薄皮而味酸一名給客橙本草云香芬如橙可供給客也魏王花木志云蜀有給客橙似橘而非若柚而香亦名盧橘一名小木奴見元稹詩生呉越江浙川廣間出營道者為冠江浙者皮甘肉酸次之樹似橘不甚高大五月開白花結實秋冬黄熟大者徑寸小者如指頭形長而皮堅肌理細潤生則深緑熟乃黄如金味酸甘而芳香可愛糖造蜜煎皆佳廣人連枝藏之入膾醋尤香美彚考增伊尹書箕山之東青鳥之所有盧橘夏熟原歸田録金橘產於江西以逺難致都人初不識明道景祐中始至京師香清味美置之樽俎光采的皪如金彈丸溫成皇后好食之由是價重京師增涪翁雜説司馬相如上林賦曰黄甘橙楱玊藻曰君入門上介拂橙楱音太簇之簇武陵有一種小橘名楱疑即今之金橘玊堂雜記東閣西偏植金橘逼城根株不能大花開時香滿院結實雖小而甘浙中未易得也南村輟耕録世人多用盧橘以稱枇杷按司馬相如游獵賦云盧橘夏熟黄柑橙楱枇杷撚􅏄夫盧橘與枇杷並列則盧橘非枇杷明矣郭璞注蜀中有給客橙冬夏花實相繼通嵗食之謂即盧橘也意者橙橘惟熟於冬而盧橘夏亦熟故舉以為重歟集藻雜著增漢李尤七欵竒宫閒館㢠廻洞庭門井幹廣望重閣柘因夏屋渠渠嵯峨合連前連都街後據流川梁王青黎盧橘是生白華緑葉扶疎冬榮與時代序孰不墮零黄景炫炫眩林曜封金衣素裏斑白内充滋味偉異淫樂無窮副以芋柘豐𢎞誕節纖液玊津㫖於飲蜜五言古詩增宋梅堯臣宋次道得廣南金橘為餉且有詩因和酬越橘如金丸爛然已盈篋誰傳嶺外信尚帶霜前葉莫嫌道路逺得與樽俎接主人無吝心懐歸予敢輙七言古詩增宋周必大曾無疑以長韻送金橘時已暮春次韻荼䕷殿春枝滿霜盧橘熟夏今乃黄彈丸煌煌照坐光老叟驚詫見未嘗客言採果孟冬月剖竹為符帶蒼雪包之赫蹏滿貯中纒以絲枲外合節或藏緑豆飲醉翁或雜寸稾仍緘封三説未識將誰從但覺色香新摘同分甘安能與衆樂祕方何惜都傳却已誇指下石化金仙指併求君勿噱楊萬里十月四日同諸弟訪三十二叔祖於蓬萊酌酒摘金橘小集誠齋老子不耐静偶拄烏藤出苔徑獨遊無伴却成愁羣從同遊還起興每過一家添一人須臾保社如煙雲褰裳渉溪溪水淺著履渡橋橋柱新蓬萊一㸃出塵外南溪裹在千花裏芙蓉照波上下紅琅玕繞屋東西翠槿籬竹石重復重雞鳴犬吠青霞中蓬萊老仙出迎客朱顏緑髪仍方瞳餐菊為糧露為醑染霧作巾雲作屨欣然領客到仙家幾盡蓬萊日未斜更傾山瓢酌仙酒酒外瓢邊亦何有偶看小樹䨇團欒碧琉璃葉黄金丸主人忍喫不忍摘笑道未霜猶帶酸小童隨我勇過我不管仙翁惜仙果手撓風枝揀霜顆爭獻滿盤來飣坐隔水蓬萊看絶竒蓬萊看水海如池主人勸客對絶境不飲令儂坐生癭何如寄下未盡瓢留待早梅伴疎影五言律詩增宋梅堯臣劉元忠遺金橘南方生美果具體橘包㣲韓彈有輕薄楚萍知是非甘香奉華俎咀嚼破明璣欲破虀鹽腹盈奩忽我歸周必大内直以金橘送七兄晝臥玊堂殿眼看金彈丸禹包經嵗月鄭驛助杯盤黄帶霜前緑甘移醉後酸江湖有兄弟此日憶團圞七言律詩增宋李清臣和賜後苑金橘苑臣初摘置琱盤口勅宣恩賜近官氣味豈同淮枳變皮膚不作楚梅酸參差翠葉藏珠琲錯落黄金鑄彈丸安得一株擎雨露畫圖傳與世人看七言絶句增唐王建宫詞叢叢洗手繞金盆旋拭紅巾入殿門衆裏遙抛金橘子在前收得便承恩宋司馬光席君從於洛城種金橘今秋始結六實以其四獻開府太師招三客以賞之留守相公賦詩紀事依韻繼成五章宜春果結洛陽枝正遇耆朋㑹客時更引輕舟倚蘆岸香秔鮮鱠雅相宜圓小香黄珠顆垂結成洛邑重霜時相公和氣陶羣物不是寒温變土宜君從好事不知疲種子成林凡幾時橘獻帝師三取二自嘗兩顆且隨宜物不須多且賞竒禦寒想見結菴時江南江北徒虚語盡信前書是不宜敝居橘亦自南移愛䕶栽培費嵗時前此實成酸苦甚應由與徳不相宜黄庭堅歐陽從道許寄金橘以詩督之禪客入秋無氣息想依紅袖醉毰毸霜枝搖落黄金彈許送筠籠殊未來范成大燕堂後盧橘一株冬前先開極香盧橘花殘細細飛滿枝晴日閙蜂兒霜餘有此香無柰合與稱題賦小詩楊萬里詠蜜金橘風餐露飲橘中仙胸次清於月様圓仙客偶移金彈子蜂王撚作菊花鈿王十朋金橘黄柑緑橘未分珍瑣碎登盤輙獻新正可呼為木奴子不知誰是鑄金人詩㪚句增唐元稹金丸小木奴宋梅堯臣霜苞𤓰瓣香元馬祖常秋高盧橘熟盧橘團金顆顆黄别録原歸田録金橘若欲久蓄須於菉豆中藏之可經時不變蓋橘性熱菉豆性凉故也便民纂要金橘將枳棘接之八月移栽肥地灌以糞水附録金豆原金豆一名山金柑一名山金橘增橘録生山徑間比金柑更小形色頗類結實繁多肉瓣不可分止一核味酸不可食惟宜植之欄檻中園丁種之以鬻於市原木高尺許實如櫻桃生青熟黄形圓而光溜皮甜可食味清而香美可蜜漬柚花附見原柚與櫾同古作櫾博雅又謂之七候反一名條爾雅云條柚注云似橙實酢一名壺甘本草云狀如卣故名壺象形也古今注云甘實形如石榴者謂之壺甘一名臭橙桂海虞衡志又謂之臭柑爾雅謂之櫠又曰椵爾雅云櫠椵注云柚屬也大如盂廣雅謂之鐳柚本草云鐳亦壺也廣州記云鐳柚實大如斗柚實大而粗柑橘中下品也三月開花竒大香甚馥郁實亦如橘有甘有酸皮厚而臭樹葉皆類橙實有大小二種小者如柑如橙俗呼為蜜筩大者如升如𤓰俗呼為朱欒有圍及尺餘者俗呼為香欒閩中嶺外江南皆有之南人種其核云長成以接柑橘甚良又有名文蛋名仁崽者亦柚類也彚考原列子呉越之國有大木焉其名為櫾樹碧而冬生實丹而味酸食其皮汁已憤厥之疾渡淮而北化而為枳焉吕氏春秋果之美者有雲夢之柚增廣志成都有柚大如斗集藻五言古詩原宋朱子柚花春融百卉茂素榮敷緑枝淑郁麗芳逺悠颺風自遲南國富嘉樹騷人留恨詞空齋對日夕愁絶鬢成絲詩㪚句增宋范成大横煙裊處雞豚社落日濃邊橘柚山楊萬里瓶裏柚花偷觸鼻忽然將謂是燒香别録增橘録朱欒作花比柑橘絶大而香就樹採之用箋香細作片以錫為甑入花一重則實香一重使花多於香仍竅甑旁以溜汗液用器盛之炊畢去花以液浸香再蒸凡三換花始暴乾入甆器蜜盛之他時焚之如在柑林中凡柑橘并金柑皆可切瓣壓去核漬之以蜜金柑著蜜尤勝他品取朱欒核洗浄下土中一年而長名曰柑明年移而疏之又一年木大如小兒拳遇春月乃接取諸柑之佳與橘之美者經年向陽之枝以為貼去地尺餘細鋸截之剔其皮兩枝對接掬土實其中以防水蒻䕶其外麻束之過時而不接則花實復為朱欒矣桂海虞衡志廣南臭柚皮甚厚染墨打碑可代氊刷且不損紙枳花附見增本草枳木如橘而小高五七尺葉如橙多刺春生白花至秋成實七八月采為實九月十月采者為殻今醫家以皮厚而小者為枳實完大者為枳殻草花譜枳殻花細而香聞之破鬱結籬傍種之實可入藥彚考增周禮考工記橘踰淮而北為枳博物志橘渡江而北化為枳今之江東甚有枳橘洛陽伽藍記正始寺衆僧房前高林對牖青松青檉連枝交映多有枳樹而不中食集藻五言古詩增唐白居易有木詩有木秋不凋青青在江北謂為洞庭橘美人自移植上受顧盻恩下勤澆灌力實成乃是枳臭苦不堪食物有似是者眞偽何由識美人黙無言對之長歎息中含害物意外矯凌霜色仍向枝葉間潛生刺如棘七言絶句增唐朱慶餘商州王中丞留喫枳殻方物就中名最逺只應愈疾味偏佳若敎盡乞人人與采盡商山枳殻花明陳憲章枳殻花蓓蕾枝頭春意長臥看蜂蝶往來忙不知今日開多少熏得先生枕席香詩散句增唐雍陶村園門巷多相似處處春風枳殻花宋陸游傍籬叢枳寒猶緑遶舍流泉夜有聲老枳垂藤晝尚黑雛鶯聲作嬰皃嗁唐温庭筠枳花明驛墻李商隱枳嫩栖鸞葉宋陸游門邊枳竹籬元叚成已竒花開芳枳王逢楓葉殷紅枳實肥附録枸橘增本草枸橘處處有之樹葉並與橘同但幹多刺三月開白花青蘂不香結實大如彈丸形如枳實而殻薄不香橘録色青氣烈小者似枳實大者似枳殻近時難得枳實人多植枸橘於籬落間收其實剖乾之以之和藥味與商州之枳幾逼眞矣御定佩文齋廣羣芳譜卷六十五
