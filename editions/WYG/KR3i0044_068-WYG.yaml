body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷六十六果譜蓮荷花别見花譜增爾雅荷芙蕖其實蓮註謂房也其中菂註蓮中子也菂中薏註中心苦疏蓮青皮裏白子爲菂菂中有青爲薏味甚苦菂薂註即蓮實本草一名藕實一名澤芝埤雅花時即有實始而黄黄而青青而緑綠而黑中肉白内青心二三分為苦薏原蓮房成菂菂在房如蜂子在窠六七月采嫩者生食脆美至秋房枯收之去黑殻謂之蓮肉黑而沉水者其堅如石謂之石蓮子其房大者謂之百子蓮味甘平濇無毒交心腎厚腸胃固精氣强筋骨補虛損利耳目除寒熱治諸血病熟食良切碎可作粥飯生動氣易脹宜去心彚考原拾遺記周穆王時西王母來共玊帳高㑹進崐流素蓮素蓮者一房百子凌冬而茂增宋録元嘉十九年揚州王濬州治後池有兩蓮駢生䨇房分體太始二年嘉蓮䨇葩並實合跗同莖生豫州鯉湖豫章志豫章雩都縣有瑞蓮池池產異蓮其葉曰䨇捲劍脊其花曰䨇頭丫髻三萼二十四葉其實曰覆鐘金鋌移之他處輙類常種俗傳雩山倒影所致原酉陽雜俎厯城北二里有蓮子湖魏袁翻曾在湖醼集參軍張伯瑜諮公言向為血羮頻不能就公曰取洛水必成也遂如公語果成時清河王怪而異焉乃諮公未審何義得爾公曰可思湖目清河笑而然之而實未解坐散語主簿房叔道曰湖目之事吾實未曉叔道對曰藕能散血湖目蓮子故令公思清河歎曰人不讀書其猶夜行二毛之叟不如白面書生增酉陽雜俎相傳橡子落水為蓮雲仙雜記三堂使宅有鉤仙池一種蓮子一嵗再結實子十䨇其花時香兼桃梅萸菊郡人傳分香蓮不論錢原續世説後唐馬郁為祕監時張承業權貴任事與客宴集陳列珍果客無敢先嘗者郁食之必盡承業私戒主者他日郁至惟以乾蓮子置前郁知不可啖鞾中出一鐵槌撾碎食之承業大笑速為易之曰勿敗吾案增楊氏六帖補僧齊已與塑匠蔡蟠曾于廬山瀑布見一蓮房房已乾其大如笠原花史陳豐嘗以青蓮子十枚寄葛勃勃㗖未竟墜一子於盆水中明晨有並蒂花開于水面大如梅花勃取置几間數日方謝剖其房各得實五枚如豐來數國初金箔張嘗於臘月索乾石蓮子亂撒池中頃刻花開滿池香􅃩可愛翦紙為舫置水中踏而登焉鼓棹放歌往來花叢俄失所在集藻賦㪚句增漢王逸魯靈光殿賦圜淵方井反植荷蕖發秀吐榮菡蓞紛敷緑房紫菂窋䆛垂珠五言古詩原宋黄庭堅贑上食蓮有感蓮實大如指分甘念母慈共房頭􅋾􅋾更深兄弟思實中有薏荷拳如小兒手令我憶諸雛迎門索棃棗蓮心政自苦食苦何能甘甘飡恐腊毒素食則懐慙蓮生淤泥中不與泥同調食蓮誰不甘知味良獨少吾家䨇井塘十里秋風香安得同袍子歸製芙蓉裳明高啟蓮房聨句與宋璲張孟兼同作露冷鏡湖秋璲波凉練塘曉盤翻緑雪稠兼錦破朱霞少新苞顆微綻啓餘葩莖尚嫋瘦繭綴寒蠶璲尖喙啄青鳥下惟玊龍眠兼中有瓊絲裊擎重柄欲折啓含深睛尚窅璲孤懸類覆杯兼䨇立疑擢表啓初成欣雨滋兼漸老怯風掉啓多子同根榮啓獨婦專房悄璲妝缷失娉婷啓歌來逢窈窕璲剖心效諫忠兼並頭呈瑞兆啓褭蹄密竅剜璲魚目微光皎珠珥落盤多啓瑤軫貯囊小璲空實外莫辨甘苦中自了剝殘香滿地采盡香餘沼啓雕筵飣戢戢玊蟲攢擾擾送看出小艇薦喜對清醥兼新嘗勝江芡遠覔迷水蓼搴芳想夏初啓感物傷秋杪聊兹發呉詠一覽煙水𣺌璲七言古詩增唐張籍採蓮曲秋江岸邊蓮子多採蓮女兒並船歌青房實圓齊戢戢爭前競折漾微波試牽緑莖下尋藕斷處絲多刺傷手白練束腰袖半卷不插玉釵妝梳淺船中未滿渡前洲借問誰家家住逺歸時共待暮潮上自弄芙蓉還蕩槳鮑溶采蓮曲弄舟朅來南塘水蓮葉映身摘蓮子暑衣鮮浄鴛鴦喜作浪舞花驚不起殷勤䕶惜纖纖指水菱初熟多新刺五言律詩增宋司馬光蓮房蓮房前後熟供噉不須齊肉嫩山蜂子稜深天馬蹄尚憐餘蕊在深映緑荷低脆美如新採近根猶帶泥七言律詩增金張檝蓮實水妃擎出紺珠囊玊笋雕槃喜乍嘗膚白已攙新藕嫩心清猶帶小荷香鬭餘翠鳥零珍羽飛盡黄蜂露蜜房口腹累人良可笑此身便欲老江鄉五言絶句增元宋无羅嗊曲玊井荷花碧中藏偶意深緑房千萬菂多少可憐心七言絶句增宋黄庭堅鄒松滋寄蓮子湯新收千百秋蓮菂剝盡紅衣搗玊霜不假泰同成氣味跳珠椀裏緑荷香無名氏蓮實城中擔上賣蓮房未抵西湖泛野航旋折荷花剥蓮子露為風味月為香緑玊蜂房白玊蟬折來帶露復含烟玻瓈盆面氷漿底醉嚼新蓮一百圓蜂不禁人採蜜忙荷花蕊裏作蜂房不知玊蛹甘於蜜又被詩人嚼作霜山蜂愁雨損蜂兒葉底安巢更倒垂只有荷蜂不愁雨蠟房仰臥萬花枝蜂兒來自宛溪中兩翅雖無已是蟲不是荷花窠裏蜜方成玊蛹未成蜂明徐賁折蓮子落盡紅衣見緑房折來猶帶水雲香柔絲零落芳心苦未及秋風已斷腸原孟淑卿題采蓮美人圖緑牕蟬静日偏長嬾爇金爐百和香莫摘池中蓮子看个中多半是空房詩㪚句增宋黄庭堅欲煩春筍手聊為剥蓮蓬唐王適湛湛江水見底清荷花蓮子傍江生宋僧雲隱刺分玉蛹堆盤脆嚼破氷丸繞齒凉晉陸雲綠房含青實唐李正封池蓮折秋房白居易味苦蓮心小温庭筠採蓮蓮有子曹鄴蓮子房房嫩宋王琪蠶寒氷繭瘦孫覿蓮房駢百子唐杜甫露冷蓮房墜粉紅宋蘓軾半脱蓮房露壓欹詞增金王茂孫㸃絳唇折斷烟㾗翠蓬初離鴛鴦浦玊纖相妒翻被專房悞乍脱青衣猶著輕羅䕶多情處芳心一縷都為相思苦宋晏幾道漁家傲粉筆丹青描未得金鍼綵線功難敵誰傍暗叢輕採摘風淅淅船頭觸散䨇鸂􅈃夜雨染成天水質朝陽烘出胭脂色又落又開人共惜秋風逼盤中已見新蓮菂别録原種植種蓮子法八九月取堅黒蓮子瓦上磨尖頭令皮薄取墐土作熟泥封三指長令蔕頭泥多而重磨頭泥少而尖種時擲至池中重頭向下自能周正薄皮在上易生數日即出不磨者卒不可生又一法雞子一枚開一小孔去青黄將蓮子塡滿紙糊孔三四層令雞抱之候小雞出取放煖處不拘時用天門冬末硫黄同肥泥或酒罈泥安盆底栽之仍用酒和水澆勿令乾自然生葉開花如錢可愛蓮子磨薄尖頭浸靛缸中明年清明取種開青蓮花製用酉陽雜俎石蓮入水必沉惟煎鹽滷能浮之本草拾遺石蓮子居山石間經百年不壊者人得食之令髮黑不老食療本草諸鳥猿猴取得石蓮子不食藏之石室内人得三百年者食之永不老又雁食之糞於田野山巖之中不逢隂雨經久不壊人得之每旦空腹食十枚身輕能登髙渉逺服食不饑石蓮肉蒸熟去心為末煉蜜丸桐子大日服三十丸此仙家方也本草衍義清心寧神用石蓮子肉於砂盆中擦去赤皮留心同為末入龍腦㸃湯服之本草綱目蓮之味甘氣温而性濇禀清芳之氣得稼穡之味乃脾之果也脾者黄宫所以交媾水火㑹合木金者也土為元氣之母母氣既和津液相成神乃自生久視耐老此其權輿也昔人治心腎不交有清心蓮子飲補心腎益精血有瑞蓮丸皆得此理清供録取嫩蓮房去蔕又去皮用井新水入灰煮浥一如芭蕉脯法焙乾以石壓令匾作片收之蓮蘂鬚一名佛座鬚花開時采取隂乾亦可充果食增陸璣詩疏蓮菂可磨以為飯如粟也輕身益氣令人强健又可為糜幽州揚豫取備饑年藕增爾雅荷芙蕖其本蔤其根藕註蔤乃莖下白蒻在泥中者陸璣詩疏幽州謂之光旁為光如牛角埤雅其生應月月生一節遇閏輙益一節本草綱目蓮藕荆揚益豫諸處湖澤陂池皆有之以蓮子種者生遲以藕芽種者最易發其芽穿泥成白蒻即蔤也長者至丈餘五六月嫩時没水取之可作蔬茹俗呼藕絲菜節生二莖一為藕荷其葉貼水其下旁行生藕一為芰荷其葉出水其旁莖生花冬月至春掘藕食之藕白有孔有絲大者如肱臂長六七尺凡五六節大抵野生及紅花者蓮多藕劣種植及白花者蓮少藕佳白花藕大而孔扁生食味甘煮則不美紅花及野藕生食味澀蒸煮則佳物類相感志云以鹽水供食則不損口同油煠麫米果食則無渣氣味甘平無毒消食解渴散血生肌蒸食開胃補五臟實下焦擣浸澄粉服食輕身益年與蜜同食令人腹臟肥不生蟲亦可休糧彚考原北史羊敦傳敦為衞將軍廣平太守雅性清儉屬嵗饑家餽未至使人外尋陂澤採藕根食之朝廷以其清白賜榖一千斛絹一百匹增拾遺記周穆王時西王母來共玊帳高㑹進千常碧藕鬱水在磅磄山東其水小流在大陂之下所謂沉流亦名重泉生碧藕長千常七尺為常也洛陽伽藍記光寳寺在西陽門外園中有一海號咸池葭芙被岸菱荷覆水青松翠竹羅生其傍京邑士子至於良辰美景來遊此寺雲車接軫羽蓋成隂或置酒林泉題詩花圃折藕浮𤓰以為興適原國史補蘓州進藕其最上者名曰傷荷藕或云葉甘為蟲所傷又云欲長其根則故傷其葉近多重臺荷花花上復生一花藕乃實中亦異也有生花異而其藕不變者酉陽雜俎大厯中高郵百姓張存以踏藕為業嘗於陂中見旱藕梢大如臂遂并力掘之深二丈大至合抱以不可窮乃斷之中得一劍長二尺色青無刃存不知寶邑人有知者以十束薪獲焉其藕無絲增樹萱録有碧衣女子詠詩曰藕隱玲瓏玉清異録北方蓮實狀長少味出藕頗佳然止三孔漢語轉譯其名曰省事三崔逺家墅在長安城南就中禊池產巨藕貴重一時相傳為禊寶又曰玊臂龍續仙傳羅公逺謂中使輔仙玉曰主上列月華之藕集仙録花姑女道士黄靈徹也居石井山有野象中箭來投花姑姑為拔之其後每齋則衘蓮藕以獻孫氏談圃張舜民芸叟責郴州税郴多碧蓮根大如椀張嘗以墨印於詩稿上以詫北人養痾漫筆孝宗嘗患痢衆醫不效徳壽憂之過宫偶見小藥肆遣中使詢之曰汝能治痢否對曰專科遂宣之至問得病之由語以食湖蟹多故致此疾遂令診脈曰此冷痢也其法用新采藕節細研以熱酒調服如其法杵細酒調數服即愈徳夀大喜就以杵藥金杵臼賜之至今呼為金杵臼嚴防禦家可謂不世之遇集藻啓增梁劉孝威謝東宫賚藕啓色華玉樹味奪瓊漿根出楊池聞之僮約子為靈㪚得自莊篇楚后江萍秦公海棗凡厥水羞莫敢相軰賦㪚句增漢司馬相如上林賦咀嚼菱藕子虚賦其卑濕則生蓮藕觚盧五言古詩增宋胡致隆山谷坐上分題賦藕平生氷雪姿七星羅心胸豈無有絲毫上裨天子聰而不自薦達胡為乎泥中沉疴正無賴安得君從容其子亦可憐風味如乃翁謝薖食藕人憐淤泥上出此萬朶蓮須知淤泥中有藕大如椽本清凝氷雪末艶方嬋娟玲瓏衆竅通蚴蟉數節連甘寒固不數却暑最所便髯奴來城市負籠至我前開緘尚帶泥未嚼先垂涎霍霍摩霜刀霤霤挹水泉切玊墮冷冽已覺沉痾痊芰實鬭角紫鴻頭剝珠圓秋盤薦此果頓使二物捐念此湼不緇餘品莫爭妍而能豁憂思令我心歡然奇功更耐老合作飛行仙七言古詩原唐韓愈古意太華􅄘頭玊井蓮開花十丈藕如船冷比雪霜甘比蜜一片入口沉痾痊我欲求之不憚逺青壁無路難夤縁安得長梯上摘實下種七澤根株連增宋王安石過食新城藕他年過食新城藕枕籍船中載親友今年却到經行處獨坐昏烟對舞栁甘酸向口無所適牢落盤餐與尊酒氷房玊節漫自好欲御還休涕垂手曾參官學居常近陽城離别初不久人間此願兩未能西風落日共回首五言律詩增宋蘇轍踏藕春湖栁色黄宿藕凍猶僵翻沼龍蛇動撑船牙角長清泉浴泥滓粲齒碎氷霜莫使新梢盡炎風翠蓋凉七言律詩增宋劉克荘憶藕昔過臨平邵伯時小舟就買藕尤竒如拈玊麈凉䨇手似瀉金莖嚥上池好事染紅無意思癡人蒸熟減風姿炎州地狹陂塘少渴殺相如欠藥醫元周霆震氷盤雪藕清澈氷盤壓蔗漿酒酣雪藕近華堂凝寒色映瑤華脆眞白絲連翠袖香金掌曾聞承玊露瓊臺忽見擣𤣥霜文園近日眞消渴莫種蓮根引恨長明李東陽賜藕祇向名花看畫圖忽驚仙骨在泥塗輕同握雪愁先碎細比餐氷聽却無郭北芳菲懐故里江南風味憶西湖渴塵此夜消應盡未羨金莖與玉壺于慎行紀賜鮮藕芙蓉别殿曉風凉玊井靈根出水香薦熟方聞開寝廟賜鮮已見布朝堂氷絲欲斷鮫人縷瓊液疑含閬苑霜憶昨金鰲橋上望紅衣翠蓋滿銀塘五言排律增唐趙嘏秋日吳中觀貢藕野艇幾西東清汵映碧空褰衣來水上捧玊出泥中葉亂田田緑蓮餘片片紅激波纔入選就日已生風御潔玲瓏膳人懐拔擢功梯山漫多品不與世流同原宋陶弼藕萬頃金沙裏誰將玊節栽絲應鮫乞與珠是蚌分來盤貯氷猶結刀侵雪易摧防風骨外折混沌竅中開月寺僧家鉢風亭酒客杯胸中秋氣入牙角雨聲囘自媿塵泥賤得䝉樽俎陪與君消酷暑𤓰李莫相猜五言絶句増宋楊萬里詠藕比雪猶繄在無絲可得飄輕拈愁欲碎未嚼已先消七言絶句增宋楊萬里藕荷衣芰製雪為容家住雲烟太華峯外面看來眞璞玊胸中雕出許玲瓏詩㪚句增唐杜甫公子調氷水佳人雪藕絲李賀藕花凉露濕花缺藕根澀宋蘇軾永懐江陽叟種藕春滿湖宋祁自是天姿不汚著水深泥濁奈君何陶弼緑房翠子暗相失紅藕白絲空自纒宋謝脁秋藕折輕絲隋殷黄藕絲牽作縷唐白居易暖踏泥中藕宋范成大呉藕鏤氷寒唐來鵬藕穿平地生荷葉宋楊萬里水藕初凝雪一梢别録原製用蜜煎藕初秋取新嫩者淖半熟去皮切條或片每斤用白梅四兩以沸湯一大碗浸一時撈控乾以蜜六兩煎去水另取好蜜十兩慢火煎如琥珀色放冷入罐收之糖煎藕每大藕五斤切碎日曬出水氣沙糖五斤金櫻末一兩蜜一斤同入磁器内泥封閉慢火煮一伏時待冷開用製藕粉取麤藕不限多少浄洗截斷浸三宿數換水看極潔淨撈出碓中搗碎以新布絞取汁重搗以汁盡為度又以密布澄去麤惡物如稠難澄以水攪之看水清即瀉去一如造米粉法製藕虀嫩藕梢隨意切作方塊如骰子大就蟹眼湯内快手淖上取牽牛花揉汁淹染片時投冷熟水中滌過控乾以馬芹鹽花泡湯入少醋加蜜作虀澄冷澆供之煮藕老藕每節切作兩叚竪鍋中下水一盞鹽少許蓋燒之以熟為度嫩藕搗碎鹽醋拌勻可以醒酒菉荳粉調沙糖孔中細紙扎定勿夾佳煮熟用切藕須斜片則不脱收藏好肥白嫩藕埋隂濕地可經久如新欲致逺以泥裹之則不壊蔗原甘蔗齊民要術云案書傳或為芉蔗或干蔗或􅦠􅀈或都蔗所在不同叢生莖似竹内實直理有節無枝長者六七尺短者三四尺根下節密以漸而疎葉如蘆而大聚頂上扶疎四垂八九月收莖可留至來年春夏王灼糖霜譜云有數種曰杜蔗即竹蔗緑嫩薄皮味極醇厚專用作霜曰白蔗一名荻蔗一名芳蔗一名蠟蔗可作糖曰西蔗作霜色淺曰紅蔗亦名紫蔗即崑崙蔗也止可生啖不堪作糖江東為勝今江浙閩廣蜀川湖南所生大者圍數寸高丈許又扶風蔗一丈三節見日即消遇風則折交趾蔗特醇厚木末無厚薄其味至均圍數寸長丈餘取汁曝之數日成飴入口即消彼人謂之石蜜多食蔗衂血燒其滓煙入目則眼暗彚考原晉書文苑傳顧愷之每食甘蔗恒自尾至本人或怪之云漸入佳境增宋書張暢傳世祖鎮彭城跖跋燾南侵至小市門曰魏主致意安北逺來疲乏若有甘蔗及酒可見分世祖遣人荅曰知行路多乏今付酒二器甘蔗百挺原南史宜都王鏗傳鏗善射常以堋的太濶曰終日射侯何難之有乃取甘蔗插地百歩射之十發十中增南史范雲傳永明十年雲使魏魏使李彪宣命至雲所甚見稱美彪為設甘蔗黄甘粽隨盡絶益彪笑謂曰范散騎小復儉之一盡不可復得孝義傳庾僧彌母劉好食甘蔗母亡僧彌遂不食焉唐書南蠻傳闍婆有蔗大如脛神異經南方有􅦠􅀈之林其高百丈圍三尺八寸促節多汁甜如蜜咋嚙其汁令人潤澤可以節蚘蟲人腹中蚘蟲其狀如蚓此消榖蟲也多則傷人少則榖不消是甘蔗能減多益少凡蔗亦然典論嘗與奮威將軍鄧展共飲論劍良久謂言將軍法非也余顧嘗好之又得善術因求與余對時酒酣耳熱方食芊蔗便以為杖下殿數交三中其臂原江表傳孫亮使黄門以銀椀并蓋就中藏吏取交州所獻甘蔗餳黄門先恨藏吏以䑕矢投餳中啓言吏不謹亮呼吏持餳器入問曰此器既蓋無縁有此若矢先在餳中當濕今矢中燥黄門將有恨於汝耶吏叩頭曰嘗從某求宫中莞蓆宫席有數不敢與亮曰必是此也覆問黄門具首服增齊民要術雩都縣土壤肥沃偏宜甘蔗味及采色餘縣所無一節數寸長郡以獻御原清異録湖南馬氏有雞狗坊卒長能種子母蔗增清異録丘鵬南出甘蔗啖朝友云黄金顙談藪甄龍友雲卿永嘉人滑稽辨㨗為近世之冠樓宣獻自西掖出守以首春觴客甄預坐席間謂公曰今年春氣一何太盛公問其故甄曰以果奩甘蔗知之根在公前而末已至此公為罰掌吏衆訾其猥率原野史盧絳中痁疾疲瘵夢一白衣婦人謂之曰子之疾食蔗即愈詰朝見鬻蔗者揣囊中無一鏹惟有唐韻一册請易之其人曰吾負販者將此安用哀君欲之遂貽數挺絳食之旦而疾愈糖霜譜唐大厯間有僧號鄒和尚跨白驢登繖山結茅以居須鹽米薪菜之屬書寸紙繫錢緡遣驢負至市人知為鄒也取平値挂物於鞍縱歸一日驢犯山下黄氏蔗苖黄請償於鄒鄒曰汝未知因蔗糖為霜利當十倍吾語汝塞責可乎試之果信自此流傳其法至末年北走通泉縣靈鷲山龕中其徒追及但見一文殊石像始知為大士化身而白驢者乃獅子也增容齋隨筆甘蔗只生於南方北人嗜之而不可得魏太武至彭城遣人求酒及蔗於武陵王郭汾陽在汾上代宗賜甘蔗二十條子虛賦所云諸柘也原羣碎録宋神宗問吕惠卿曰蔗字從庶何也曰凡草木種之俱正生蔗獨横生蓋庶出也故從庶增瀛厓勝覽𤓰哇國有甘蔗麤大長可二三丈泉南雜志甘蔗榦小而長居民磨以煮糖泛海售商其地為稻利薄蔗利厚往往有改稻田種蔗者故稻米益乏集藻賦增魏文帝感物賦并序南征荆州還過鄉里種諸蔗於中庭渉夏厯秋先盛後衰悟興廢之無常慨然永歎乃作斯賦云伊陽春之㪚節悟乾坤之交靈瞻𤣥雲之蓊翳仰沉隂之杳冥降甘雨之豐霈垂長淄之泠泠掘中堂而為圃植諸蔗於前庭渉炎夏而既盛迄凛秋而將衰豈在斯之獨然信人物其有之晉張協都蔗賦若乃九秋良期𤣥酎初出黄華浮觴酣飲累日挫斯蔗而療渴共潄醴而含蜜清津滋於紫棃流液豐於朱橘擇蘓妙而不逮何况沙棠與椰實文賦㪚句增司馬相如子虛賦諸柘巴苴張衡南都賦藷蔗薑䪤晉左思蜀都賦甘蔗辛薑陽蓲隂敷梁昭明太子七召蔗有盈丈之名七言古詩原宋舒亶詠甘蔗瑤池宴罷王母還九芝飛入三仙山空餘絳節留人間雲封露洗無時閑節旄落盡何斕斑野翁提攜出茅菅吳刀戞戞鳴䨇環截斷寒氷何潺潺相如賦就空上林倦遊渴病長相侵劉伶愛酒眞荒淫狂來欲倒滄溟深此時一嚼輕千金壚邊何用文君琴五斗一石安足斟坐想毛髮生青隂蕭瑟甘滋欲誰讓柤棃橘柚紛殊狀冷氣相射杯盤上顧郎不見休惆悵佳境到頭還不妄詩成雖愧陽春唱全勝乞與將軍杖詩㪚句原晉張載江南都蔗釀液豐沛唐杜甫茗飲蔗漿攜所有瓷甖無謝玉為缸春雨餘甘蔗偶然存蔗芉增韋應物薑蔗滂湖田韓愈初味猶噉蔗原元稹甘蔗消殘醉增白居易漿甜蔗節調薛能壓春甘蔗冷宋錢惟演蔗漿銷内熱原唐王維大官還有蔗漿寒增韓翃醒酒猶憐甘蔗熟宋陸游蔗漿那解破餘酲金龎鑄蔗蜜漿寒氷皎皎原元顧瑛蔗漿玊椀氷泠泠别録原種植榖雨内於沃土横種之節間生苖去其繁冗至七月取土封壅其根加以糞穢俟長成收取雖常灌水但俾水勢流滿潤濕則已不宜久蓄製用石蜜即白沙糖凝結作塊如石者輕白如霜者為糖霜堅白如氷者為氷糖以白糖煎化印成人物之形者為饗糖以石蜜和牛乳酥酪作成餅塊為乳糖以石蜜和諸色果融成塊為糖纒糖煎總之皆自甘蔗出也蔗糖以蜀及嶺南者為勝江東雖有劣於蜀產㑹稽所作乳糖視蜀更勝容齋隨筆糖霜之名唐以前無所見自古食蔗者始為蔗漿宋玊招魂所謂胹鼈炮羔有柘漿些是也其後為蔗餳江表傳孫亮使黄門就中藏吏取交州所獻甘蔗餳是也後又為石蜜南史郡志云榨甘蔗汁曝成飴謂之石蜜本草亦云煉糖如乳為石蜜是也後又為蔗酒唐書赤土國用甘蔗作酒雜以紫𤓰根是也唐太宗遣至摩揭它國取熬糖法即詔揚州上諸蔗榨瀋如其劑色味愈西域逺甚然只是今之沙糖蔗之用盡于是不言作霜然則糖霜非古也厯世詩人模竒寫異亦無一章一句言之惟東坡公過金山寺作詩送遂寧僧圓寶云涪江與中泠共此一味水氷盤薦琥珀何似糖霜美黄魯直在戎州作頌荅梓州雍熙長老寄糖霜云逺寄蔗霜知有味勝於崔子水晶鹽正宗掃地從誰説我舌猶能及鼻尖則遂寧糖霜見於文字者實始二公甘蔗所在皆植獨福塘四明番禺廣漢遂寧有糖氷而遂寧為冠四郡所產甚微而顆碎色淺味薄纔比遂之最下者亦皆起於近世唐大厯中有鄒和尚者始來小溪之繖山教民黄氏以造霜之法繖山在縣北二十里山前後為蔗田者十之四糖霜户十之三蔗有四色紅蔗止堪生噉艻蔗可作砂糖西蔗可作霜色淺不甚貴杜蔗緑嫩味極厚專用作霜凡蔗最困地力今年為蔗田者明年改種五榖以滋息之霜户器用曰蔗削曰蔗鎌曰蔗凳曰蔗碾曰榨斗曰黍甕各有制度凡霜一甕中品色亦自不同堆叠如假山者為上團枝次之甕鑑次之小顆塊次之沙脚為下紫為上深琥珀次之淺黄又次之淺白為下宣和初王黼創應奉司遂寧常貢外嵗别進數千斤牆壁成方寸是時所產益竒應奉司罷乃不再見遂寧王灼作糖霜譜七篇具載其説予採取之以廣聞見蔆原蔆一作䔖又作菱一名芰爾雅云蔆蕨攗註云今水中芰禮記疏云蔆芰也屈到嗜芰即菱角者也武陵記云兩角者蔆三角四角者芰本草綱目云其葉支散故字從芰其角稜峭故謂之蔆而俗呼為蔆角楊愼以芰為雞頭者誤也一名水栗見風俗通一名沙角見本草一名薢茩説文云楚謂之芰秦謂之薢茩生水澤處處有之落泥中最易生種陂塘者為家菱葉實俱大野生者小皆三月生蔓延浮水上葉扁而有尖光面如鏡葉下之莖有股如蝦股一莖一葉兩兩相差如蝶翅狀五六月開花黄白色實更肥美有無角者其色嫩青老黑又有皮嫩而紫色者謂之浮菱食之尤美李時珍曰其實或三角四角兩角無角家蔆角軟而脆亦有兩角彎卷如弓形者其色有青有紅有紫嫩時剥食皮脆肉美老則殻黑而硬墜入水中謂之烏蔆冬月取之風乾為果生熟皆佳野蔆其角堅直刺人其色嫩青老黑嫩時剥食甘美老則蒸煮食之野人曝乾刴米為飰為粥為糕為果皆可代糧其莖亦可暴收和米作飰以救荒歉蓋澤農有利之物也此物最不治病生食性冷利多食傷臟腑損陽氣痿莖生燒蟲若過食腹脹㬉服薑酒即消含吳茱萸咽津亦可李惟熙言蔆芡皆水物芡花開向日菱花開背日埤雅云其花晝合宵炕隨月轉移猶葵之向日也故芡㬉而菱寒彚考原周禮天官加籩之實蔆芡㮚脯蔆芡㮚脯註重言之者以四物為八簋國語屈到嗜芰有疾召宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之曰夫子不以私欲干國之典也增漢書循吏傳龔遂為渤海太守秋冬課收斂益畜果實菱芡南齊書孝義傳㑹稽人陳氏有三女無男祖父母年八九十老耄無所知父篤癃病母不安其室值嵗饑三女相率於西湖採菱蓴更日至市貨賣未嘗虧怠鄉里稱為義門多欲取為婦原南史魚𢎞傳𢎞為湘東王鎮西司馬述職西上道中乏食緣路採菱作菱米飯給所部𢎞度之所經人覔一菱不得列子杜厲叔事莒敖公自以為不知己者居海上夏日則食菱芰冬日則食橡栗洞冥記旦露池西有靈池方四百歩有浮根菱根出水上葉沉波下實細薄皮甘香葉半青半黄霜降彌美因名青氷菱也有𤣥都翠水水中有菱碧色狀如雞飛名翔雞菱仙人鳬伯子常游翠水之涯採菱而食之令骨輕舉身生毛羽也增列仙傳老萊子葅芰為食拾遺記昭帝元始元年穿菱池中有倒生菱莖如亂絲一花千葉根浮水上實沉泥中名紫菱食之不老廣志鉅野大菱大於常菱淮漢之南凶年以芰為蔬太康地記武昌南湖通江夏有水冬則涸於時靡所產植陶太尉立塘以遏水常自不竭因取瑯琊郡隔湖魚菱以著湖内菱甚甘美異於他所續豫章記王鄰隐西山頂菱角巾又嘗就人買菱脱頂巾貯之歎曰此巾名實相副矣酉陽雜俎𤓰州紅菱今人但言菱芰諸解草木書亦不分别惟王安貧武陵記言四角三角曰芰兩角曰菱今蘓州折腰菱多兩脚成式曾于荆州有僧遺一斗郢城菱三角而無傷可以節莎廬陵詩註京師賣五岳宫菱後山詩話某守與客行林下曰栢花十字裂顧客對其倅晩食菱方得對云菱角兩頭尖皆俗諺全語也石湖詩註蜀中無菱至蜀州西湖始見之老學庵筆記芰菱也今人謂卷荷為伎荷伎立也卷荷出水面亭亭植立故謂之伎荷或作芰非是白樂天池上早秋詩云荷芰緑參差新秋水滿池乃是言荷菱二物耳三柳軒雜識菱花為水客楚辭芳草譜製芰荷以為衣兮集芙蓉以為裳蓋芰葉雜遝荷葉博大有為衣之象而芙蓉若可緝者也白嶽行記九月九日由謝村取餘杭道曲溪淺渚被水皆菱角有深淺紅及慘碧三色舟行掬手可取而不設塍塹僻地淳俗此亦可見余酒渴思解奴子康素工掠食偶一命之甚資咀嚼平生恥為不義此其愧心者也原杭州志東坡知杭州募民種菱於西湖收其利以備修隄集藻啓增梁庾肩吾謝賚菱啓上林紫水雜薀藻而俱浮雲夢清池間芙蓉而外發珍踰百味來薦畫盤恩重千金遂沾菲席凌霜朱橘愧此開顏含露蒲桃慙其不䬼論增晉孫楚屈建論加籩之品菱芡存焉楚多陂塘菱芡所生父自嗜之而抑按宰祝既毁就養無方之禮又失奉死如生之義奪乎素欲建何忍焉辨增明楊慎菱芰辨武陵記四角三角曰芰兩角曰菱其字不一説文作蔆注曰楚謂之芰秦謂之薢茩芰菱也果也薢茩决明也菜也殊已混淆相如賦外發芙蓉䔖華則芡實也又相如凡物篇云蔆从遴字作􅀢爾雅蔆蕨攗即决明也爾雅注作决光馬大年嬾眞子録誤作英光史繩祖已辨之黄公紹云許慎所注合是菜也又國語屈到嗜芰蓋决明之菜非水中芰也審矣爾雅既以水中之芰釋菜説文又以菜釋水中之芰由蔆名不一所以致惑今按菱今之菱角芰今之鷄頭楚辭緝芰荷以為衣若是菱葉不可為衣也縁楚人名菱為芰所以致後世解二物不分又以决明參之愈益淆亂楚人名菱為芰見爾雅疏得此一解可破前數説之紛紛矣文賦㪚句增漢司馬相如上林賦咀嚼菱藕魏曹植九詠遇遊女于水裔探菱花而結詞晉左思蜀都賦緑菱紅蓮郭璞江賦鱗被菱荷攢布水蓏翹莖瀵蘂濯欵散裹流光潛映景炎露火五言古詩原梁簡文帝採菱曲菱花落復含桑女罷新蠶桂棹浮星艇徘徊蓮葉南增劉孝綽詠小児採菱採菱非採菉日暮且盈舠踟蹰未敢進畏欲比殘桃陸罩採菱曲參差雜荇枝田田競荷密轉葉任香風舒花影流日戲鳥波中蕩遊魚菱下出不與文王嗜羞持比萍實原江洪和湘東王采菱曲風生緑葉聚波動紫莖開含花復含實正待佳人來七言古詩原唐劉禹錫採菱行白馬湖平秋日光紫菱如錦綵鴛翔盪舟游女滿中央採菱不顧馬上郎争多逐勝紛相向時轉蘭橈破輕浪長鬟弱袂動參差釵影釧文浮蕩漾笑語哇哇顧晩暉蓼花縁岸扣舷歸歸來共到市橋歩野蔓繫船萍滿衣家家竹樓臨廣陌下有連檣多估客攜觴薦芰夜經過醉踏大隄相應歌屈平祠下沅江水月照寒波白煙起一曲南音此地聞長安北望三千里明王鴻漸題菱科圖采菱科采菱科小舟日日臨清波采得菱來餘幾何竟無人唱采菱歌風流無復越溪女但采菱科救饑餒五言律詩原唐李嶠咏菱鉅野韶光暮東平春溜通影搖江浦月香引棹歌風日色翻池上潭花發鏡中五湖多賞樂千里望難窮增宋蘇轍食菱野沼漲清泉烏菱不直錢蟹肥螯正滿石破髓方堅節物秋風早樽罍夜月偏令人思淮上小舫藕如椽七言律詩增宋楊萬里食菱鷄頭吾弟藕吾兄頭角嶄然也不争白璧中藏煙水晦紅裳左袒雪花明一生子木非知己千載靈均是主盟每到炎官張火傘西山未當聖之清五言絶句增唐錢起江行無題細竹漁家路晴陽看結罾喜來邀客坐分與折腰菱原宋梅堯臣和資政侍郎採菱紫角菱實肥青銅菱葉老孤根未能定不及寒塘草七言絶句原唐白居易看採菱菱池如鏡淨無波白㸃花稀青角多時唱一聲新水調謾人道是采菱歌增宋范成大采菱户采菱辛苦似天刑刺手朱殷鬼質青休問揚荷渉江曲只堪聊誦楚詞聽田園雜興采菱辛苦廢犁鉏血指流丹鬼質枯無力買田聊種水近來湖面亦收租原楊萬里食老菱有感幸自江湖可避人懐珠韜玊冷無塵何須抵死露頭角荇葉荷花老此身菱沼柄似蟾蜍股樣肥葉如蝴蝶翼相差蟾蜍翹立蝶飛起便是菱花著子時詩㪚句增梁江淹相攜及嘉月採菱渡北渚徐勉紫菱亦可採聊以緩愁年原費昶妾家五湖口采菱五湖側唐儲光羲濁水菱葉肥清水菱葉鮮增李白郎聽採菱女一道夜歌歸杜甫况資菱芡足庶結茅茨迴錢起渚禽菱芡足不向稻梁争劉禹錫艶歌呈幾曲江畔采新菱原宋陶弼轉葉香隨風舒花影凌日梁武帝江南稚女珠腕繩桂棹容與歌採菱唐李賀瀉酒木蘭椒葉蓋病容扶起種菱絲宋陳堯佐堆盤菱熟胭脂角藉藻鱸鮮淡墨鱗林逋含機緑錦翻新葉滿篋青銅瑩古花陸游何時却泛耶溪路臨聽菱歌四面聲增唐儲光羲深潭菱葉疎王維菱蔓弱難定原杜甫隔沼連香芰增杜甫水果剝菱芡採菱寒刺土韓愈菱葉故穿萍孟郊菱翻紫角利栁宗元朶頤進芰實張籍翻芰紫角稠李益菱花覆碧渚李賀菱科映青罩白居易菱風香㪚漫宋司馬光光翻芰葉齊楊萬里新菱剥釅紅唐萬齊融垂菱布藻如妝鏡薛逢日中漸見菱花舒韋荘十畝菱花晩鏡清曹唐碧花菱角滿潭秋宋王安石菱角蜻蜓翠蔓深陸游深紅菱角密覆水元薩都剌酒渴氷盤破紫菱詞原宋張鎡鵲橋仙連汀接漵縈蒲帶藻萬鏡香浮光滿濕煙吹霽木蘭輕照波底紅嬌翠婉玊纖採處銀籠攜去一曲山長水遠彩鴛䨇慣貼人飛恨南浦離多夢短别録增風俗通殿堂東井形刻為荷菱荷菱皆水物所以厭火也埤雅羣説鏡謂之蔆花以其面平光影所成如此庾信鏡賦云照壁而蔆華自生是也爾雅翼昔人取菱花六觚之象以為鏡原種植秋間取熟黑者撒池中來春自生增製用物類相感志菱煮過以礬湯綽之紅緑如生煮菱要青用石灰水拌過先洗去灰煮則青芡原芡一名雞頭古今注云芡雞頭也一名芰方言云北燕謂之䓈青徐淮泗之間謂之芡南楚江湘之間謂之雞頭或謂之烏頭埤雅云其蓬似雞首故曰雞頭一名雁喙一名雁頭一名鴻頭爾雅翼云葉有芒刺兼有觜若雞雁之頭故有諸名一名雞壅見莊子一名卵蔆見管子一名蔿子本草經註云芡實即今蒍子也圖經云其莖嫩者名蒍亦名䓈菜一名水硫黄孫公談圃云芡甘滑可食名為水硫黄詳見東坡雜記生水澤中處處有之三月生葉貼水大於荷葉皺文如縠蹙衂如沸面青背紫俗名雞頭盤莖葉皆有刺莖長丈餘有孔有絲嫩者剥皮可作蔬茹五六月開紫花結苞外有刺如蝟花在苞頂如雞喙内有斑駁軟肉裹子纍纍如珠璣殻内白米狀如魚目薏苡大味甘平濇無毒補中强志聰耳明目開胃助氣止渴益腎除溼痺腰脊膝痛久服身輕不飢耐老莖止煩渴除虛熱生熟皆宜根狀如三稜煮熟如芋可食治心痛氣結病彚考增周禮地官大司徒以土㑹之法辨五地之物生二曰川澤其植物宜膏物註𤣥謂膏當為櫜字之誤也蓮芡之實有櫜韜疏蓮芡之實有櫜韜者以其是川澤所生故知是蓮芡之實皆有外皮櫜韜其實者也宋史禮志太宗景祐三年禮官宗正請每嵗夏季月薦果以芡以菱荘子藥也其實堇也桔梗也鷄㢕也豕零也是時為帝者也何可勝言注㢕或作壅司馬云雞􅀢即雞頭也淮南子雞頭已瘻注瘻頸腫疾雞頭水中芡東坡雜記呉子野云芡實蓋温平爾本不能大益人然俗謂之水硫黄何也人之食芡也必枚嚙而細嚼之未有多嘬而亟嚥者也舌頰唇齒終日囁嚅而芡無五味腴而不膩足以致上池之水故食芡者能使人華液通流轉相挹注積其力雖過乳石可也集藻七言古詩原唐無名氏雞頭湖浪參差叠寒玊水仙曉轉鉢盤緑淡黄根老栗皺圓染青刺短金罌熟紫羅小囊光𦂳蹙一掬眞珠藏蝟腹叢叢引觜傍蓮洲滿川恐作天雞哭宋歐陽修初食雞頭有感六月京師暑雨多夜夜南風吹芡嘴凝祥池鎖㑹靈園僕射荒陂安可擬爭先園客採新苞剖蚌得珠從海底都城百物貴新鮮厥價難酬與珠比金盤磊落何所薦滑臺潑醅如玊醴自慚竊食萬錢厨萬口飄浮嗟病齒却思年少在江湖野艇高歌菱荇裏香新味全手自摘玊潔沙磨軟還美一瓢固不羡五鼎萬事適情為可喜何時遂買穎東田歸去結茅臨野水文同采芡芡盤圓圓開碧輪城東濠中如叠鱗漢南父老舊不識日日岸上多少人駢頭鬅鬆露秋熟緑刺紅鍼割寒玊提籠當筵破紫苞老蚌一開珠一掬吹臺北下凝祥池圃田東邊僕射陂如今兩處盡湮没異日此地名應馳物貴新成味尤美可惜飄零還入水料得明年轉更多一匝清波流珠子蘇轍食雞頭芡葉初生縐如縠南風吹開輪脱轂紫苞青刺攢蝟毛水面放花波底熟森然赤手初莫近誰料明珠藏滿腹剖開膏液尚糢糊大盎磨聲風雨速清泉活火曾未久滿堂坐客分升掬紛然咀噍惟恐遲勢若羣雛方脱粟東都每憶㑹靈沼南國陂塘種尤足東遊塵土未應嫌此物秋來日常食五言律詩增宋陶弼雞頭三伏池塘沸雞頭美可烹香囊聨錦破玊指剝珠明葉皺非蓮蓋根甘似竹萌不應徒適口炎帝亦曾名七言律詩增宋蘇轍食雞頭風開芡嘴鐵為鬚斧砍沙磨旋付厨細嚼兼收上池水徐嚥還成滄海珠佳客滿堂須一斗閑居賴我近平湖多年不到㑹靈沼氣味宛然初不殊原楊萬里食雞頭江妃有訣煮眞珠菰飰牛酥軟不如手擘雞顋金五色盤傾驪頷琲千餘夜光明月供朝嚼水府靈宫恐夕虛好與藍田飡玉法編歸辟榖赤松書三危瑞露凍成珠九轉丹砂鍊不如鼻觀溫芳炊桂歇齒根軟熟剝胎餘半甌鷹爪中秋近一炷龍涎丈室虚却憶吾廬野塘畔滿山柿葉正堪書五言絶句增宋姜特立芡實芡實徧方塘明珠截錦囊風流薫麝氣包裹借荷香七言絶句增宋陸游建州絶無芡頗思之戲作鄉國雞頭買早秋緑荷紅縷最風流建州城裏西風冷白棗堆盤看却愁原楊萬里雞頭龍宫失曉惱江妃也養鳴雞報早暉要啄稻粱無半粒只教滿頷飽珠璣詩㪚句增唐溫庭筠繡頷金鬚盪倒光團圓皺緑雞頭葉宋陳堯佐風開黄觜鐵為鬚斧斫砂磨旋出厨宋祁磨沙漉水莩殻滑斫桂煮釡風波聲原梅堯臣吳雞鬬罷絳幘碎海蚌捧出眞珠明王巖叟水晶冷浸碧玊叢琉璃湧出青毛蝟鄭清之玊質欲藏如許脆鐵芒何苦太尖生增唐韓愈平池散芡盤風能拆芡觜孟郊鴻頭排刺芡原宋黄庭堅剝芡珠走盤增陸游芡觜拆秋風元馬祖常沼緑芡盤鋪宋黄庭堅千頭剖蚌明珠熟明珠論斗煮雞頭原陸游雞頭纍纍如大珠港種雞頭來滿船明王象明雞頭新劈驪頷顆詞原宋昭順老人浣溪沙的皪堪為席上珍銀鐺百沸麝臍熏蕭娘欲餌意中人拈處玉纖籠蚌顆剝時瓊齒嚼香津仙郎入口即身輕别録原種植秋間熟時取實之老者以蒲包包之浸水中三月間撒淺水内待葉浮水面移栽淺水每科離二尺許先以麻餅或豆餅拌勻河泥種時以蘆記其根十餘日後毎科用河泥三四碗壅之製用蒸熟烈日中曝裂取仁亦可舂取粉用新者煮食良連殻一斗防風四兩煎湯浸用甚軟美經久不壊葧臍原葧臍一名芍一名鳬茈爾雅云芍鳬茈爾雅翼云名爲鳬茈當是鳬好食之一名鳬茨本草綱目云鳬茈音訛也一名黒三稜一名地栗皆形似也日用本草云小者為葧臍大者為地栗舊名烏芋以形似芋而色烏也今皆名葧臍又鳬茨音訛也生淺水中其苗三四月出土一莖直上無枝葉狀如龍鬚色正青肥田生者麤似細葱高二三尺其本白蒻秋後結根大者如山查栗子臍有聚毛纍纍下生入泥底野生者黑而小食之多滓種出者皮薄色淡紫肉白而大軟脆可食增本草衍義皮厚色黒肉硬而白者謂之豬葧臍皮薄澤色淡紫肉軟而脆者謂之羊葧臍原味甘微寒滑無毒治消渴除胸實熱氣作粉食厚膓胃療膈氣消宿食黄疸治血痢下血血崩辟蠱毒消誤吞銅鐵種宜榖雨日集藻七言古詩增明王鴻漸題野荸薺圖野荸薺生稻畦苦薅不盡心力疲造物有意防民饑年來水患絶五榖爾獨結實何纍纍五言絶句增明呉寛題荸薺畫册纍纍滿筐盛上帶葑門土咀嚼味還佳地栗何足數别録增物類相感志荸薺煮銅則軟慈姑原慈姑或作茨菰一嵗根生十二子如慈姑之乳衆子故名爾雅翼云嵗有閏則生十三子一名藉姑一名水萍一名河鳬茈一名白地栗根苗似鳬茈故有二名苗名翦刀草一名翦搭草一名燕尾草一名槎了草本草綱目云象葉形也莖榦似嫩蒲又似三稜苗甚軟其色深青綠每叢十餘莖内抽出一兩莖上分枝開小白花四瓣蘂深黄色根大者如杏小者如栗色白而瑩滑五六七月采葉正二月采根煮熟味甘甜時人以作果集藻七言律詩增宋楊東山茨菰花折來趂得未晨光清露晞風帶月凉長葉翦刀亷不割小花茉莉淡無香稀疏畧糝瑤臺雪升降常涵翠管漿恰恨山中窮到骨茨菰也遣入詩囊詩㪚句增唐元稹小片慈姑白别録原種植慈姑豫於臘月間折取嫩芽種於水田來年四月盡如種秧法種之離尺許田最宜肥每顆花挺一枝上開數十朶色香俱無惟根至秋冬取食甚佳增製用本草嫩莖可煠食取汁可製粉霜雌黄御定佩文齋廣羣芳譜卷六十六
