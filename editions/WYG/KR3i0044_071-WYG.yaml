body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷六十九木譜松二集藻賦御製松賦猗歟喬松鍾靈上苑柯百尺以如搴蓋千年而欲偃散積秀於蓮峯䕃孤芳於蘭畹標豔冶之不矜抗風塵其獨遠若夫盤根泰岱聳榦􅋌廬涵貞溫岫映彩嵩衢比德則質符君子授秩則名榮大夫三眠遜其勁節百木讓為仙株爾其綠玉抽鍼黛蛾攢葉夭矯虬鱗騰趠龍鬛謖謖離羣森森爽􅊿碧駕嶧桐翠增堯莢至十圍蓊鬱連抱巃嵸濤乍驚而疑雨聲既遠而猶風宏景聞之於牖北陶潛撫彼於籬東更若招柏為朋呼筠偕響白兔頻遊青牛時往蘿蔦旁牽芝苓暗長落氛霧於瓊階藹青蔥於書幌或俯垂紫磴或斜倚清池鷺獨鶱而啄實鶴載舞而巢枝日騰照兮光蔚薈月流素兮隂紛披繄符丘之神王𦍑偓佺所心怡是以茂姿式詠於雅詩貞修表揚於戴禮箕山則棟欲生雲石室則脂堪作餌非幽品之可懷曷詳美於圖史至若皁衣迎氣白草迷烟雪霏千里冰凝萬川橘柚罷色杞梓藏妍獨斯樹之不改歴歲寒而蒼然涼飇至弗移其操沍隂積彌著其堅信國家之楨榦而表德者所取焉增齊王儉和蕭子良高松賦山有喬松峻極青蔥既抽榮於岱嶽亦擢穎於荆峯受靈命於后土方虞舜以齊蹤貫四時而不改超五玊之嘉容上拂天而獨遠下流雲而自重重隂微微漏景含暉日既升而猶晦時方中而未晞通霄漢而隱影集鸞皇之翻飛偓佺食和而輔性墨翟昌言於宋圍想周穆之長坂念東平之思歸若乃朔窮於紀歲亦暮止隆冰峩峩飛雪千里􅒆三秀而靡遺望九山其相似翔鴈哀廻於天津振鷺驚鳴於川涘嗟萬有之必衰獨貞華之無已積皓霰而爭先延㣲飇而響起謝脁和蕭子良高松賦閲品物於幽記訪叢育於祕經廵紀林之彌望識斯松之最靈挺於巖以羣茂臨於水而宗生豈榆栁之比性指冥椿而等齡若夫修榦垂䕃喬柯飛穎望肅肅而旣閒卽微微而方靜懐風音而送聲當月露而留影旣芊眠於廣隰亦迢逓於孤嶺集九仙之羽儀棲五鳳之光景固總木之為選貫山川而自永爾乃靑春爰謝雲物含明江臯綠草曖然已平紛弱葉而凝照競新藻而抽英陵翠山其如剪施懸蘿而共輕至於星廻窮紀沙鴈相飛同雲泱其無色陽光沉而減暉卷風飇之歘吸積霰雪之嚴霏豈彫貞於歲暮不受令於霜威若乃體同器制質兼上材夏書稱其岱畎周篇咏其徂徠乃屈已以𢎞用構大壯於雲臺幸為玩於君子留神心而顧懐君王乃徙讌蘭室解佩明椒搴幽蘭於夕隂詠聳榦於琴朝陵高丘以致思御風景而逍遥夷黻冕之隆貴懐汾陽之寂寥邈道勝於千禩藴神理而自超夫江海之為大實涓澮之所歸瞻衡恒之峻極不讓壤於塵微嗟孤陋之無取幸聞道於清徽理弱羽於九萬愧不能兮奮飛梁沈約高松賦鬱彼高松棲根得地託北園於上邸依平臺而養翠若夫蟠株聳榦之懿含星漏月之竒經千霜而得拱仰百仞而方枝朝吐輕烟薄霧夜宿迷鳥覊雌露雖滋而不潤風未動而先知既捎雲於淸漢亦倒景於華池輕隂䝉密喬柯布濩葉斷禽蹤枝通猨路聽騷騷於既曉望隱隱於將暮曖平湖而漾靑緑拂繒綺而籠丹素於時風急壟首寒浮塞天流蓬不息明月孤懸檀欒之竹可詠鄒枚之客存焉清都之念方遠姑射之想悠然擢柔情於蕙圃涌寶思於珠泉豈徒為善之小樂離繳之短篇若此而已乎原唐王勃澗底寒松賦并序歲八月壬子旅遊於蜀尋茅谿之澗深溪絶磴人跡罕到爰有松焉冒霜停雪蒼然百丈雖崇柯俊穎不能踰其崖嗚呼斯松託非其所出羣之器何以别乎蓋有殊類而合情士因感而成興遂作賦曰惟松之植於澗之幽盤柯跨嶮㳫柢憑流寓天地兮何日霑雨露兮幾秋見時華之屢變知俗態之多浮故其磊落殊狀森梢峻節紫葉吟風蒼條振雪嗟英覽之希遇保貞容之未缺攀翠崿而形疲指丹霄而望絶已矣哉蓋用輕則資衆器完則施寡信棟梁之已成非榱桷之相假徒志遠而心屈遂才高而位下斯在物而有焉余何為而悲者增謝偃高松賦登靈嶽以遊目極千里兮周睇盡山川之重㳫容雲物之詭怪何茲松之挺茂擢修幹於孤林映丹霄而有葉凌青霞而矯心前絶萬仞却倚千尋俯崢嶸之深谷仰迢逓之層岑霏夕烟而曖景度神飇而流音若乃月起陽爻歲窮隂律匝地冰厚周空霧密雪積巖而逾峻風乘林而轉疾結晻霮之愁雲黯蒼茫之寒日於是衆草零羣木墜千巖槁萬嶺悴獨潔固而不渝常猗猗而結翠始見貞而表潔乃以叢而辨類夫其深山遂性委液流津感天地之粹質禀隂陽之精純根含冰而彌固枝負雪而更新既無懼於𤣥月寧有悦乎芳春含奇文而養勁收高節而自珍恥取嫓於稽子嗤受封於亡秦本絶希於雕刻詎有憂於斧斤若乃流膏可咀嘉實可薦香有四飛味逾九轉延促齡於度隟駐生涯於流電故餌之者目改服之者容變紛羽衣而上騰排紫虚於高扇起九垓而憩息周四海而顧盻信神經而最品實祕錄而精選嗟美材之無用悲側路之嶮巇動跬步而致阻投一足而必危傷拙目之衆毁慨名工之獨知仰徑寸而靡及屈百尺而自卑縈白雲以舒蓋接丹桂而變枝凝暉遠而澹景纖羅挂而輕颸窮萬祀而不異歴千秋而不萎豈茲木之足歎亦前賢之所規何吾生之命舛懐丹誠而莫披心炳朗而無報情蕩滌而不覊任儻來之否泰委𤣥運之遭隨戢輕翮而未舉踠逸足而莫馳實未榮而先怠寧泛駕而致疲誠責躬而咎已豈藏瑕而掩疵恒怯進而勇退每知雄而守雌庶比兹以自朂履貞固而不虧李紳寒松賦松之生也於巖之側流俗不顧匠人未識無地勢以􅃷容有天機而作色徒觀其貞枝肅矗直榦芊眠倚層巒則捎雲蔽景據幽澗則蓄霧藏烟穹石盤薄而埋根凡經幾載古藤聯緣而抱節莫記何年於是白露零涼風至林野慘慄山原愁悴彼衆盡於𤣥黄斯獨茂於蒼翠然後知落落高勁亭亭孤絶其為質也不易葉而改柯其為心也甘冒霜而停雪叶幽人之雅趣明君子之竒節若乃確乎不拔物莫與隆寒暑不能變其性雨露所以資其豐擢影後彫一千年而作蓋流形入夢十八載而為公不學春開之桃李秋落之梧桐辭曰負棟梁兮時不知冒霜雪兮空自奇諒可用而不用固斯焉而取斯李德裕金松賦並序廣陵東南有顔太師猶子舊宅其地則孔北海故臺余因晩春夕景命駕遊眺忽睹竒木植於庭除枝似檉松葉如瞿麥廹而察之則翠葉金貫燦然有光訪其名曰金松訊其所來曰得於台嶺乃就主人求得一本列於平泉今聞封植得地枝葉益茂敘其所自作此賦焉青春已暮白日將夕經顏子之陋巷訪孔子之舊宅美珍木之在庭得嘉名於樵客曩擢本於台嶺近徙根於簷隙其柯肅肅自比於真松其葉纖纖實侔於瞿麥風入葉而成韻露垂柯而流液不受命於嚴霜諒同心於寒柏含春藹而葱蒨映夕陽而的皪疑翠尾之羣翔若金潭之旁射雜爽籟於篁竹混晶光於瑶碧琪樹以垂珠而擅名金松以潛光而莫覿亦由處子在於隱淪竒才遺於草野我有衡宇依山岑寂類仲長之清曠如蕭宰之窮僻植根此地似在崖壁殊橘柚之不遷同甘棠之可惜庶封殖於園林永愛翫而無斁無名氏幽松賦惟天地之覆載屬日月之貞明幸雲雨之廣潤及草木之滋榮代何材而不用材何代而不生若乃地勢卑而路修逈有孤山曲澗之幽松挺百尺而敷其狀聳千仞而擢其容柯榦夭矯花葉芊茸枝横棲鶴蓋偃盤龍蹙皮膚而文疊峗宏磊砢而谷深重伐人之所未見匠者之所未逢抱雅操兮積年載持槪節兮佇時雍梢森乎巖之畔扶疎兮山之足禀二儀而自清居四時而常緑其孤高也則排煙而蕩霧其貞堅也則超代而越俗偏睹日而疏隂􅃉自然而孤直起喻有叔夜之材入夢表丁君之職澗底幸左思之詠歲寒䝉孔丘之識偉哉盛矣屬時代兮多杞梓其用無隔窺幽澗兮茂松柏梓待構而見須松堪棟兮希擇其文理也奇絶可以雕楹架梲其雅操也昂藏可以振雪淩霜向日貞心擢臨風足氣揚深谷如䝉顧此地有材良王爾經過而歎曰帝德咸亨此松挺生公輸俯仰而顧曰王道利貞大厦用成希皇鑒之留盻感鬱鬱之餘情者也宋王曾矮松賦有序齊城西南隅矮松園自昔之閒館北邦之勝概二松對植卑枝四出高不倍尋周且百尺輪囷偃亞觀者駭目蓋莫知其年祀亦靡記夫本源眞造化竒詭之絶品也曾咸平中忝鄉薦登甲科蒙被寵靈踐歴清顯幾三十載前歲秋始罷冢司出守青社下車之後省閭里訪故舊則曩之耆耋悉淪逝童冠皆壯老邑居風物觸目變遷惟彼珍樹依然故態竊謂是松也匪獨以後凋克固歲寒抑由擁腫支離不為世用故能宅兹臯壤免於斤斧若向負構厦之材竦凌雲之榦將為棟梁戕伐無餘又安得保其天年全其生理哉感物興歎聊為賦云惟中齊之舊國乃東夏之奥區有囿游之勝致直廛閉之坤隅偉茂松之駢植軼衆木而特殊上輪囷以夭矯旁翳薈而紛敷廣庭廡之可蔽高尋常之不踰枝擁閼兮横亘根蹙縮兮盤紆徒觀其前瞻林嶺却枕康衢宅寶勢兮葱鬱據右地兮膏腴類蟠蟄兮神蜧訝騰倚兮虎貙將挐攫兮未奮忽伏竄兮爭趨色鬭鮮兮欲滴形詭俗兮難圖遠而望之蔚兮若摶鵬之出滄海廹而察之黕兮若方輿之承寶蓋矗洞口之歸雲堆嵓阿之宿靄談揮麈兮何多被集翠兮增汰度朔吹兮颼飀含陽暉兮晻藹吾不知其幾千歲起毫末而碩大昔去里兮離邦攀緑條兮彷徨今剖符兮臨郡識竒樹兮青蒼怵光景兮遄邁嘉歲寒兮益彰葉毿毿兮不改情眷眷兮難忘異古人之歎栁協予志之恭桑信矣夫卑以自牧終然允臧效先哲之俯僂法幽經之伏藏願跼影於澗底厭爭榮於豫章鄙直木兮先伐懼秀林兮見傷幸高梧之垂䕃愧修竹之聯芳鸞乍迷於枳棘鷃每悞於榆枋嫓周雅之蹐地符羲易之巽牀既交讓以屈節復善下而同方自儲精於甘實不受命於繁霜客有系而稱曰材之良兮梓匠之攸貴生之全兮蒙莊之所美茍入用於鉤繩寧委迹於塵滓俾其天性而稱珍曷若存身而受祉紛異趣兮誰與歸當去彼而取此元任士林蟠松賦渺堪輿之神氣孕東海之平蠻紛百昌之甲宅儼孤松之結蟠根半蝕以秀出枝萬折而囘環允神物之附靈時矯首而盤桓瞰然鱗甲之四縱傑出頭角而巑岏霧市暝合雲衣晝飛非鞭霆而欲駕則既雨而初歸爾則童豎俛仰恍然劉累之馴擾風雨吟哦又似夫葉公解衣盤礴雷電至而飇馳也噫嘻龍為物靈不離鱗甲蕩日月撼山淵不崇朝而雨六合何其神也桎梏禹宫之梁斲削雷澤之梭劒津之吏照水夜驚長房之竹騰波自駕象罔求而不得雲霧集而時化又何其幻也而况乎青髪君之盤蹝秦大夫之舂容妙蜿蜒於氣母抱不化之神蹤龍不知其為松松不知其為龍人不承澤螻蟻為宫龍乎松乎出冡間之雷車走隴上之雨工松乎龍乎撫亭曲以一嘯山四立而長風文賦散句增楚屈原九歌山中人兮芳杜若飲石泉兮䕃松柏原漢賈山至言秦為馳道於天下廣五十步三丈而樹厚築於外隱以金椎樹以靑松晉曹毘對儒文松以負霜稱雋陶潛歸去來辭三徑就荒松菊猶存撫孤松而盤桓齊孔稚珪北山移文青松落隂白雲誰侶梁劉峻廣絶交論援青松以示心指白水而旌信唐韓愈藍田縣丞㕔壁記斯立對樹二松日哦其間有問者輙對曰余方有公事子姑去柳宗元送崔羣序貞松產於巖嶺高直聳秀條暢碩茂粹然立於千仞之表和氣之發也禀和氣之至者必合以正性於是有貞心勁質用固其本禦攘冰霜以貫歲寒故君子儀之杜牧晚晴賦松數千枝切切交峙如冠劍大臣國有疑難廷立而議宋白玉蟾文太微宫中奎星之精化而為松矯矯鬱鬱然於嚴霜積雪之間五言古詩增魏劉楨贈從弟亭亭山上松瑟瑟谷中風風聲一何盛松枝一何勁冰霜正慘悽終歲恒端正豈不罹凝寒松柏有本性晉張華擬古松上隴阪上百尺下無枝東南望河尾西北隱崑崖剛風振山籟朋鳥夜驚離悲涼貫年節葱翠恒若斯安得草木心不怨寒暑移陶潛飲酒青松在東園衆草沒其姿凝霜殄異類卓然見高枝連林人不見獨樹衆乃奇提壺挂寒柯遠望時復為吾生夢幻間何事紲塵羈謝道韞擬嵇中散咏松遙望山上松隆冬不能凋願想遊下憇瞻彼萬仞條騰躍未能升頓足俟王喬時哉不我與大運所飄颻無名氏長松標落落千丈松晝夜對長風歲暮霜雪時寒苦與誰䨇梁沈約寒松梢聳振寒聲青葱標暮色疎葉望嶺齊喬幹凌雲直范雲咏寒松修條拂層漢密葉障天潯凌風知勁節負雪見貞心呉均詠慈姥磯石上松根為石所蟠枝為風所碎賴我有貞心終凌細草輩隋李德林咏松樹結根生上苑擢秀邇華池歲寒無改色年長有倒枝露自金盤灑風從玊樹吹寄言謝霜雪貞心自不移唐劉希夷孤松篇蠶月桑葉青鶯時栁花白澹豔烟雨姿敷芬陽春陌如何秋風起零落從此始獨有南澗松不歎東流水𤣥陰天地冥皓雪朝夜零豈不罹寒暑為君留青青青青好顏色落落任孤直羣樹遙相望衆草不敢逼靈龜卜眞隱仙鳥宜棲息恥受秦帝封願言唐侯食寒山夜月明山冷氣清清凄兮歸風集吹之作琴聲松子臥仙岑寂聽疑野心清泠有眞曲樵採無知音美人何時來幽徑委綠苔吁嗟深澗㡳捐棄廣厦材宋之問題張老松樹歲晚東岩下周顧何悽惻日落西山隂衆草起寒色中有喬松樹使我長歎息百尺無寸枝一生自孤直張宣明山行見孤松成詠孤松鬱山椒肅爽凌清霄既挺千丈榦亦生百尺條青青恒一色落落非一朝大厦今已搆惜哉無人招寒霜十二月枝葉獨不凋儲光羲石子松盤石青巖下松生盤石中冬春無異色朝暮有清風五鬛何人採西山舊兩童原李白南軒松南軒有孤松柯葉自綿羃清風無閑時瀟灑終日夕隂生古苔緑色染秋烟碧何當凌雲霄直上數千尺增李白與南陵常贊府遊五松山安石泛溟渤獨嘯長風還逸韻動海上高情出人間靈異可竝迹淡然與世閑我來五松下置酒竆躋攀徵古絶遺老因名五松山五松何清幽勝境美沃州蕭颯鳴洞壑終年風雨秋響入百泉去聽如三峽流翦竹掃天花且從傲吏遊龍堂若可憇吾欲掃精修贈韋侍御黄裳太華生長松亭亭凌霜雪天與百尺高豈為微飇折桃李賣陽豔路人行且迷春光掃地盡碧葉成黄泥願君學長松愼勿作桃李受屈不改心然後知君子原杜甫四松四松初移時大抵三尺强别來忽三載離立如人長會看根不拔莫計枝凋傷幽色幸秀發疎柯亦昂藏所插小籓籬本亦有隄防終然振撥損得恡千葉黄敢為故林主黎庶猶未康避賊今始歸春草滿空堂覽物歎衰謝及兹慰凄涼清風為我起灑面若微霜足以送老姿聊待偃蓋張我生無根蔕配爾亦茫茫有情且賦詩事迹可兩忘勿矜千載後慘淡蟠穹蒼增顧况蕭寺偃松淒淒百卉病亭亭䨇松迥直上古寺深横拂秋殿冷輕響入龜息片隂棲鶴頂山中多好樹可憐無比竝盧綸孤松吟酬渾贊善深山荒松枝雪壓半離披朱門青松樹萬葉乘清露露重色逾鮮吟風似遠泉天寒香自發日麗影長圓隂郊一夜雪榆柳皆枯折廻首望君家翠蓋滿瓊花捧君青松曲自顧同衰木曲罷不相親深山頭白人柳宗元酬賈鵬山人郡内新栽松寓興見贈二首芳朽自為别無心乃𤣥功夭夭日放花榮耀將安竆青松遺澗底擢蒔兹庭中積雪表明秀寒花助葱蘢幽貞夙有慕持以延清風無能常閉閤偶以靜見名奇姿來遠山忽似人家生勁色不改舊芳心與誰榮喧卑豈所安任物非我情清韻動竽瑟諧此風中聲商山臨路有孤松往來斫以為明好事者憐之編竹成楥遂其生植感而賦詩孤松停翠蓋託根臨廣路不以險自防遂為明所悞幸逢仁惠意重此藩籬䕶猶有半心存時將承雨露原孟郊寓言誰言碧山曲不廢青松直誰言濁水泥不汙明月色我有松月心仍騁風霜力貞明既如此摧折安可得衰松近世交道衰青松落顏色人心忌孤直本性隨改易旣摧棲日榦未展擎天力終是君子材還思君子識增孟郊品松追悲謝靈運不得殊常封縱然孔與顏亦莫及此松此松天格高聳異千萬重抓拏巨靈手擘裂少室峯擘裂風雨獰抓拏指爪􅀈道入難抱心學生易墮蹤時時數㸃仙嫋嫋一線龍霏微嵐浪際遊戲顥興濃品松徒高高雌鳴詎噰噰賞異尚可貴賞潛詎能容名華非典實翦棄徒纖茸刻削大雅文所以不敢慵元稹松樹華山高幢幢上有高高松株株遥各各葉葉相重重槐樹夾道植枝葉俱㝠䝉旣無貞直榦復有罥挂蟲何不種松樹使之揺清風秦時已曾種顦顇種不供可憐孤松意不與槐樹同閒在高山頂樛盤虬與龍屈為大厦棟庇䕃侯與公不肻作行伍俱在塵土中畫松張璪畫古松往往得神骨翠帚掃春風枯龍戞寒月流傳畫師輩奇態盡埋沒纖枝無瀟灑頑榦空突兀乃悟塵埃心難狀煙霄質我去淅陽山深山看眞物西齋小松二首松樹短於我清風亦已多况乃枝上雪動揺微月波幽姿得閒地詎感歲蹉跎但恐厦終構藉君當奈何簇簇枝新黄纖纖攢素指柔苙漸依條短莎還半委清風日夜高凌雲竟何已千歲盤老龍修鱗自兹始白居易和松樹亭亭山上松一一生朝陽森聳上參天柯條百尺長漠漠塵中槐兩兩夾康莊婆娑低覆地枝榦亦尋常八月白露降槐葉次第黄歲暮滿山雪松色鬱青蒼彼如君子心秉操貫氷霜此如小人面變態隨炎涼共知松勝槐誠欲栽道傍糞土種瑶草瑶草終不芳尚可以斧斤伐之為棟梁殺身獲其所為君構明堂不能終天年老死在南岡不願亞枝葉低隨槐樹行松聲月好好獨坐䨇松在前軒西南微風來潛入枝葉間蕭寥發為聲半夜明月前寒山颯颯雨秋琴泠泠絃一聞滌炎暑再聽破昏煩竟夕遂不寐心體俱翛然南陌車馬動西鄰歌吹繁誰知茲簷下滿耳不為喧寄題盭厔㕔前䨇松憶昨為吏日折腰多苦辛歸家不自適無計慰心神手栽兩樹松聊以當嘉賔乘春日一往生意漸欣欣清韻度秋在綠茸隨日新始憐澗底色不憶城中春有時晝掩關䨇影對一身盡日不寂寞意中如三人忽奉宣室詔徵為文苑臣閒來一惆悵長似别交親早知煙翠前攀翫不逡廵悔從白雲裏移爾落囂塵贈賣松者一束蒼蒼色知從澗底來劚掘經幾日枝葉滿塵埃不買非他意城中無地栽庭松堂下何所有十松當我階亂立無行次高下亦不齊高者三丈長下者十尺低有如野生物不知何人栽接以青瓦屋承之白沙臺朝昏有風月燥濕無塵泥疎韻秋槭槭涼隂夏凄凄春深微雨夕滿葉珠蓑蓑歲暮大雪天壓枝玉皚皚四時各有趣萬木非其儕去年買此宅多為人所咍一家二十口移轉就松來移來有何得但得煩襟開即此是益友豈必交賢才顧我猶俗士冠帶走塵埃未稱為松主時時一愧懐栽松小松未盈尺心愛手自移蒼然澗底色雲濕煙霏霏栽植我年晚長成君性遲如何過四十種此數寸枝得見成隂否人生七十稀姚合松壇盤盤松上蓋下覆青石壇月中零露垂日出露上漙山翁稱絶境海嶠無所觀皮日休小松婆娑只三尺移來白雲徑亭亭向空意已解凌遼敻葉健似虬鬚枝脆如鶴脛清音猶未成紺彩空不定隂圓小芝蓋鱗澀修荷柄先然被鷃搶預恐遭蝸病結根幸得地且免離離映磥砢不難遇在保晚成性一日造明堂為君當畢命陸龜䝉小松擢秀逋客巖遺根飛鳥徑因求飾清閟遂得辭危敻貞同栢有心立若珠無脛枝形短未怪鬛數差難定況密三天風方遵四時柄那興培塿歎免荅鄰里病微霜靜可分片月疎堪映奇當虎頭筆韻叶通明性會拂陽烏胸掄材膺帝命宋王安石前日石上松前日石上松劚移沙水際青青折釵股俯映幽人砌蟠根今鬯茂落子還蒼翠三年一楮葉世事眞期費蘇軾種松得徠字春風吹榆林亂莢飛作堆荒園一雨過戢戢千萬栽青松種不生百株望一枚一枚已有餘氣壓千畝槐野人易斗粟云自魯徂徠魯人不知貴萬竈飛青煤束縛同一車胡為乎來哉泫然解其縛清泉洗浮埃枝傷葉尚困生意未肻囘山僧老無子養䕶如嬰孩坐待走龍蛇清隂滿南臺孤根裂山石直榦排風雷我今百日客養此千歲材茯苓無消息䨇鬢日夜摧古今一俛仰作詩寄餘哀戲作種松我昔少年日種松滿東岡初移一寸隂瑣細如插秧二年黄茅下一一攢麥芒三年出蓬艾滿山散牛羊不見十年餘想作龍蛇長夜風波浪碎朝露珠璣香我欲食其膏已伐百本桑人事多乖迕神藥竟渺茫朅來齊安野夾路鬚髯蒼會開龜蛇窟不惜斤斧瘡縱未得茯苓且當食流肪金盎百出入皎然散飛霜槁死三彭仇澡換五穀腸青骨凝緑髓丹田發幽光白髪何足道要使䨇瞳方却後五百年騎鶴還故鄉曾鞏高松高松高干雲衆木安可到湯湯鳴寒溪偃偃倚翠纛側聽心神醒仰視目睛眊風雨天地動一葉不欹倒豈同澗中萍上下逐流潦豈同牆根槐卷卷秋可掃鳳凰引衆禽此木隂可燾君求百常柱星日此可造般匠世有無方鍾野人好孔平仲詠道上松長松高落落積雪白皚皚鱗鬛凍且僵鬱結久不開觀其纒壓意直使同枯荄鴈帶寒光去鳥傳春信來微陽入直榦生意忽已囘豁若醉初醒整頓出塵埃秀色􅆺山腹孤標摩斗魁時至自當復安得長摧頽若非根本壯何能異草萊黄庭堅道中聞松聲蟠空作風雨發地鳴鼓吹日晴四無人聲在高林際伊優兒女語蹇淺市井議我欲抱七絃寫此以卒歲秦觀題䨇松寄陳季常遙聞連理松託根黄麻城枝枝相鉤帶葉葉同死生雖云金石姿未免兒女情想應風月夕滿庭合歡聲陸游秋夕大風松聲甚壯戲作短歌人生不自憐坐受外物械榮華難把玩俄頃皆變壞山棲亦何有耳目差曠快秋郊多烈風夜壑起松籟初聞尚蕭瑟彷彿聽嚴瀨忽如倒巨浸便欲翻大塊又疑楚漢戰澒洞更勝敗不然六月雨雷電奔百怪三更勢稍斂鐵馬歸入塞孰能從吾游洗汝胸次隘楊萬里小松小松如小兒能坐未能立亂髪覆地皮勁氣排雪汁誰將救暍手種此青戢戢秋陽暴行人清䕃何時及裘萬頃題余仲祥松齋芳妍桃李塲紛趨飇成蹊長松坐偃蹇遂爾不見知平生異時人不與俗轉移蕭然塵埃中擅此丘壑奇窓空境逾清四壁風來吹抱琴揖蒼髯喜氣掀兩眉臭味旣與同相親不相違直期閲歲寒可但忘朝飢金党懐英和張德遠伐松之什社櫟賦散財乃遭匠石嗤高梧中宫徵不能保孫枝全傷隨用否理固不可移堂堂十八公端勁出天姿蟠根借餘潤茂鬱清溪湄雨師夜失律偶此遺神螭煙鱗漬寒雨霧鬛明朝曦騰拏困愈壯偃蹇僵不疲未能走沆漭聊與草木嬉長風動頭角吟嘯舒鬱伊塵埃詎能久雷電會有時昨宵卧溪月老影閒横欹天明竟不舉俯仰益怪奇拏拳攀半崖渴喙吞清漪希珍價不售復病樵柯危材高輒爾耳咄彼造化兒樛枝飽霜雪遽與蓬蒿衰孤標挽萬牛未為廊廟知窈窕桃李春奈爾千歲期枯桑豈自賈取敗以老龜茲非㸑下材梁棟終見施長短歸自然勿為鳬鶴悲酈權竹林寺矮松蒼烟靄山曲囘溪抱修筠中藏古佛宫荒僻無四鄰靈松插殿脚偃蹇今幾春何年霹靂雨抉石搜潛鱗謫重飛舉難墮此蜿蜒身聯拳縮爪股氣屈不得伸卧枝老無力支撐藉樵薪無風自悲吟失水固不神安知才不才禍福了已分南山聳千嶂直榦排風雲正以中繩墨中道遭斧斤豈知無用資千歲保其貞何必求先容養此老囷輪我亦愛奇節歲晏守賤貧他時來汝伴露頂挂葛巾馮璧同希顔怪松崧高地氣靈花木競妍秀玊峯西南趾有松獨怪陋偃蹇如蟠螭奮迅如攫獸葉勁鬚髯張皮古鱗甲皺菌蠢藤癭怒支離笻節瘦月上虬影揺風度雨聲驟子落慰枯禪枝樛礙飛鼬盤根萬乘器平蓋千歲壽樵斤幸免尋厦匠矧肻構龍化會有時天旱期汝救麻九疇樂山松樂山一何崇上有千歲松清孤月露底秀拔天地中蒲柳抱常質桃李開芳容爭如十八公笑傲冰霜風居然喜避世不肻汙秦封蟠如北海螭伏如南陽龍紛紛過者多匠石終不逢明堂幾時構喚起蒼髯翁雷淵會善寺怪松物生自有常怪特物之病嗟嗟此老蒼怪怪生魁柄侏儒蹙髀股宿瘤擁腮頸蜿蜒蛟龍戲騰擲貙虎競鬚髯喜張磔意氣怒狂迸匠石求棟楹節目足譏評芻蕘急薪槱堅悍空盼瞪靜言觀倚伏未易相弔慶雖違時世用顧免斧斤横陽秋莫榮悴歲月何究竟盤盤曲則全挺挺獨也正小草悞掃迹伏神還守性儻隨天中景廣宇共庥映元劉詵賦小松樹何時始移根今日已映坐沐露欲五寸出草先幾箇林深帶宿潤湑湑垂白唾欣然千丈意鬱勃不可挫我無定居地此計恐成蹉他年欲待隂日月當已過桑麻要生養文字廹寒餓柳傳未可學氾書眞足課如何抱空疎矧復習癡惰嗜飲此山水五歲飽高卧君看重來時風雨夜相和馬祖常禮部合化堂前後栽小松買松栽兩階緑髪已可梳恐是女元君截鬚生地腴遲爾千尺長下產黄琥珀服以安心神飛身作仙客明劉基題趙文敏公畫松呉興昔王孫能畫世莫及觀其二松圖矯若龍出蟄蟠根破坤輿拔萃滃原隰膠加各軒翥崱屴相倚立鼉鱗撐空青豕鬛振颯飁高藏日月氣清滴雲霧汁垂釣者何人短棹非妄集五湖多風濤蛟蜃頭角􅟲不如洿澤間取足鰿與鰼倦眠松影下百竅清涼入愼勿驚松枝天寒衣袂濕張羽戴山石上聽松溷耳俗諠久茲晨一清聽長松逓解飇哀壑互相應奔騰駭濤瀨窈渺韻笙磬至音不假器始覺自然勝緣觸故成聲動極還歸靜此時憩石坐黙然待其定乃知棄瓢者未悟聞中性七言古詩增唐張説遙同蔡起居偃松篇清都衆木總榮紛傳道孤松最出羣名接天庭長光景氣連宫闕借氛氳懸池滴滴停華露偃蓋重重拂瑞雲不借流膏助仙鼎願將楨榦奉明君莫比冥靈楚南樹朽老江邊代不聞王維新秦郡松樹歌青青山上松數里不見今又逢不見君心相憶此心向君君應識為君顏色高且閑亭亭逈出浮雲間原杜甫戲為䨇松圖歌天下幾人畫古松畢宏已老韋偃少絶筆長風起纖末滿堂動色嗟神妙兩株慘裂苔蘚皮屈鐵交錯廻高枝白摧朽骨龍虎死黑入太隂雷雨垂松根胡僧憇寂寞龎眉皓首無住著偏袒右肩露䨇脚葉裏松子僧前落韋侯韋侯數相見我有一匹好東絹重之不減錦繡叚已令拂拭光凌亂請公放筆為直榦增杜甫題李尊師松樹障子歌老夫清晨梳白頭𤣥都道士來相訪握髪呼兒延入户手提新畫青松障障子松林靜杳冥憑軒忽若無丹青隂崖却承霜雪榦偃蓋反走虬龍形老夫平生好奇古對此興與精靈聚已知仙客意相親更覺良工心獨苦松下丈人巾屨同偶坐似是商山翁悵望聊歌紫芝曲時危慘淡來悲風李賀五粒小松歌虵子虵孫鱗蜿蜿新香幾粒洪崖飯緑波浸葉滿濃光細束龍髯鉸刀翦主人壁上鋪州圖主人堂前多俗儒月明白露秋淚滴石筍溪雲肻寄書李咸用小松歌幽人不喜凡草生秋鋤劚得寒青青庭閑土瘦根脚獰風揺雨拂精神醒短影月斜不滿尺清聲細入鳴蛩翼天人戲翦蒼龍髯參差簇在瑶階側金精水鬼欺不得長與東皇逞顔色勁節暫因君子移貞心不為麻中直盧士衡靈溪老松歌靈溪古觀壇西角千尺鱗皴棟梁樸横出一枝戞樓閣直上一枝掃寥廓白石蒼苔擁根脚月明風撼寒光落有時風雨晦暝擺撼若黑龍之騰躍合生於象外峯巒枉滯乎人間山嶽安得巨靈授請託拔向青桂白榆邊安著宋蔡襄聖泉寺松徑詩青松苒苒門前道根底堅牢顔色好鳴籟蕭森風雨生紫鱗開動龍蛇老天若有意别留種百年其下無纖草雷霆時繞雪霜重勁節支扶不顚倒野姿峭拔已背時肻要藤花彊纒抱南方赤夏苦蒸濕萬木無聲就僵槁忽經密䕃少休息肌骨便驚秋氣早寄言匠者勿復顧留作清涼除熱惱蘇轍種松城郭人家歲寒木檜柏森森映華屋青松介僻不入城野性特嫌塵土辱中庭冉冉盈尺苖條榦雖短風霜足培根不用糞壤厚插竹預防雞犬觸他年期汝三丈高獨立仙翁毛髪緑老人自分不及見子孫見汝知遺直徐積大松東海有物天下雄萬靈戮力生奇松天精地粹萃其下滄溟百道來相通一根直去穿九泉一根斜插鯨魚淵遠者壓折巨鼇背近者倒纒山根偏小枝可就千鈞弓大枝可挂萬斛鍾惟有老榦苦難狀呂光營外堆𤣥龍身披北帝雄犀甲虎賁連臂圍不匝無計都將大地遮有心盡把浮雲刷樛枝入地旋復上怪怪奇奇非一狀谷陵相變任古今土木兩行專王相列幟空遺渭川壘犒師留得楊隋帳𤣥駒來撼亭亭蓋淥魚飛入蒼蒼浪最是半霄風雨聲山妖走盡川魅驚十萬爭揮鐵槊騎百千齊闞黑旗兵有時海面波濤小一部仙韶下蓬島殘聲逐水散鳴琴遺響穿雲聚啼鳥混沌死來凡幾朝清氣濁氣㾗未消獨葉聳來新蓋鳳䨇柯合處舊藏蛟其本既異其事殊德若有容材有餘大鵬斥鷃皆可居相忘有似江湖魚美哉此木眞不凡能以智免斧斤間過盡工師無所用莊周應作不材看大松小松如此奇方輿圓蓋不可知隂陽山海氣合離不然神物相䕶持金李純甫怪松謠阿誰栽汝來幾時輪囷擁腫蒼虬姿鱗皴百怪雄牙髭拏空夭矯蟠枯枝疑是祕魔嵓中老慵物旱火燒天鞭不出睡中失却照海珠羞入黄泉蛻其骨石鉗沙錮汗且僵埋頭卧角政摧藏試與摩挲定何似怒我棖觸􅂡髯張壯士囚縳不得住神物世間無著處隄防夜半雷破山尾血淋漓飛却去元傅若金奉題仇工部壁間古松圖歌蒼松在山自奇古灌木翳之人不驚忽然圖向堂上壁滿坐歎息長風生交柯崛走森晝晦其下將疑鬼神會霧雨寒霏虎豹毛雷霆怒折蛟鼉背乃知巨筆老且神力斡造化雄千鈞皇天不夭棟梁具后土潛囘霜雪春爾松已為人愛惜見爾為爾生顔色山中豈無材木倚絶壁未逢匠石嗟何益王冕題夏廸䨇松圖我昔曾上五老峯白雲盡處看青松中有兩樹如飛龍正與夏廸畫者同夏廸畫松得松趣箇箇乃是廊廟具貞固不特凌雪霜偃蹇猶能吐烟霧蒼髯獵獵如有聲鐵甲半掩苔花青六月七日炎火生對此似覺形神清丈人兀坐誠有道豈比商山采芝皓有琴有琴不須彈而今世上知音少孤松歎孤松倚雲青亭亭故老謂是蒼龍精古苔無花䕶鐵甲五月忽聽秋風聲幽人恐爾斧斤辱獨􅅖孤根結茅屋月明喜看清影揺雪凍却愁梢尾秃昨夜飛霜下南海山林草木無光彩起來摩挲屋上松顔色如常心不改幽人盤桓重慨慷此物乃是眞棟梁嗚呼既是真棟梁天子何不用是扶明堂楊維楨題履元陳君萬松圖紫芝道人天思精南來新畫青松障東家畫水西家山積棄陳縑忽如忘突然槎牙生肺肝元氣淋漓廹神王亟呼圓瓦倒墨汁盡寫髯官立成仗羣爭十丈百丈身氣敵千人萬人將交柯玉鎖混鱗甲屈鐵金繩殊骨相石鬭雷霆白日傾雨走蛡龍青天上前身要是僧擇仁五百蜿蜒見情狀天台老林亦畫松三株五株成冗長我家東越大松岡五鬛蒼蒼鬱相望門前兩箇赤婆娑上有𤣥禽語相向雕龍梓客朝取材伏虎將軍夜偷餉安得射洪好絹百尺强令泫隂森移疊嶂鼓以軒轅之瑟五十絃共寫江聲入悲壯明髙啓偃松行龍門西岡魏公祠祠前有松多古枝長身蜿蜒横數畝巨石作枕相撐搘春泥半封朽死骨凍蘚全聚雛生皮無心昂聳上霄漢偃仰獨向荒山陲蟄雷振嶽撼不動千載一夢醒何遲政如卧龍未起日深意有待風雲期太湖月出照夜魄天峯雪積埋寒姿濤聲時吼若鼾息野老驚起山僧疑左仰右屈各異態天自出巧非人為畫師安能把筆寫樵子豈敢操斤窺杜陵枯柟已憔悴蜀相老柏非瑰奇何如此樹怪且壽呵衛定想煩靈祗不知己閲幾人代遊客過盡今存誰明堂屢興不見取得全正愛同支離我嘗來觀忍遽返醉卧其上高吟詩葛陂笻竹亦騰化神物終去可久羈何當一叱使飛起載我萬里遊天池他年還訪舊城郭正是白鶴歸來時陳憲章戲題張千户畫松張侯畫松人不識松不畫横惟畫直上干青霄下盤石倒卷蒼龍二千尺神物安可留屋壁變化虚空了無迹不然恐遭雷斧劈左手執弓右持㦸所勝無過萬人敵侯莫畫松費筆力原馮琦齋前松樹不盈咫亭亭車蓋層雲似虬枝婉婉世所希嗟爾勁節乃如此豈無凌霄姿一旦成繞指雷雨方排未敢爭龍蛇將蟄何當起展轉空向人詰曲誰相理直木從來忌先伐曲榦猶存愈於死問君曲直安可為大道委蛇誰則知請君看取歲寒色猶自青青似舊時陳繼儒羣松合抱支硎側十里濃隂半山黑村翁記松不記年依稀傳是支公植支公曾向松之下調鶴調鷹復調馬皮皴甲蜕化髯龍誰知復有屠龍者使君買松欲製亭煙姿雪榦仍青青一朝頓脫傖父厄要知樹老多精靈夜靜空林覺人語大松小松共爾汝願以長生報使君結得茯苓如斗許老松作牆茆作瓦道人來自天台者不煑黄精不劚苓張口如箕坐松下一片松濤勝古冰細咀飽嚼風稜稜吾將礪齒齒已折只恐松枯化為石五言律詩增唐李嶠松鬱鬱高巖表森森幽澗陲鶴棲君子樹風拂大夫枝百尺條隂合千年蓋影披歲寒終不改勁節幸君知杜甫嚴鄭公堦下新松弱質豈自負移根方爾瞻細聲聞玊帳疎翠近珠簾未見紫煙集虚䝉清露霑何當一百丈欹蓋擁高簷錢起詠門上畫松上元王杜三相公昔聞生澗底今見起豪端衆草此時沒何人知歲寒豈能裨棟宇且欲出門闌只在丹青筆凌雲也不難李德裕金松台嶺生竒樹佳名世未知纖纖疑大菊落落是松枝照日含金晰籠煙淡翠滋勿言人去晚猶有歲寒期陸肱松雪霜知勁質今古占嘉名斷砌盤根遠疎陰偃蓋清鶴棲何代色僧老四時聲鬱鬱心彌久煙高萬井生李商隱高松高松出衆木伴我向天涯客散初晴後僧來不語時有風傳雅韻無雪試幽姿上藥終相待他年訪伏龜喻鳬廣德官舍二松楊公休簿領二木日堅牢直甚彰吾節清宜庇爾曹幽隂月裏細冷樹雪中高誰見干霄後枝飄白鶴毛項斯和李用夫栽小松移來未换葉已勝在空山靜對心標直遥吟境助閑影侵殘雪際聲透小牕間即聳凌空榦翛翛豈易攀于武陵友人亭松俛仰不能去如逢舊友同曾因春雪散見在華山中何處有明月訪君聽遠風相將歸未得各占石巖東張喬和薛監察題興善寺古松種種近王城前朝古寺名瘦根盤地遠香吹入雲清鶴動池臺影僧禪雨雪聲看來人旋老因此歎浮生題小松松子落何年纖枝長水邊劚開深澗雪移出遠林煙帶月棲幽鳥兼花灌冷泉㣲風動清韻閑聽罷琴眠許棠和薛侍御題興善寺松何年劚到城滿國響高名半寺隂常匝鄰坊景亦清伐多無巧勢風定有餘聲自得天然狀非同澗底生崔塗題興善寺隋松與人期不至青青伊澗松移植在蓮宮蘚色前朝雨秋聲半夜風長閒應未得暫賞亦難同不及禪棲者相看老此中王貞白述松遠谷呈材榦何由入棟梁歲寒虚勝竹功績不如桑秋老落乾子春深裛嫩黄雖䝉匠者顧樵採日難防曹松僧院松此木韻彌全秋宵學瑟絃空知百餘尺未定幾多年古甲磨雲拆孤根捉地堅何當抛一榦作蓋道塲前謝仲宣賦松送德林少尹員外送人多折柳唯我獨吟松若保歲寒在何妨霜雪重森梢逢靜境廓落見孤峯還似君高節亭亭尠繼蹤杜荀鶴題唐興寺小松雖小天然别難將衆木同侵僧半牕月向客滿襟風枝拂行苔鶴聲分呌砌蟲如今未堪看須是雪霜中張蠙鄭轂補闕山松心將積雪欺根與白雲離遠寄僧猶憶高看鶴未知影交新長葉皴匝舊生枝多少同時種深山不得移僧無可松枝怪榦鱗皴煙梢出澗新屈盤高極目蒼翠遠驚人待鶴移隂過聽風落子頻青青寒木外自與九霄鄰宋司馬光古松摧頹巖壑間磊落得天頑香葉低漸水餘根倒挂山白猿窺子落黄鶴認巢還不久應為石莓苔舊已斑郭祥正松風夜寂松風度魂清客枕寒琴聲傳不盡詩句寫應難驟雨傾瑤砌眞珠落玉盤隱居如可訪吾欲跨翔鸞林景熙古松獨占寛閒地不知揺落天山林猶古色風雪自窮年龜伏靈根壽禽巢絶頂仙棟梁非所屑幾見海成田金周昂望山中松地險蟠根古人稀小徑消雨皴開白雪風響入青霄未畏斧斤逼惟愁霹靂燒解鞍那避遠冷色故相招原明申時行松岡宛轉循高阜青葱結茂林團雲低蓋影挾雨送濤音節抱風霜苦根盤歲月深亦知𢎞景意山閣助清吟御定佩文齋廣羣芳譜卷六十九
