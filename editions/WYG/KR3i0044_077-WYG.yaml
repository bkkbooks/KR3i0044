body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷七十五木譜楸原楸與萩同漢書注云萩即楸也生山谷間今處處有之與梓樹本同末異本草李時珍云即梓之赤者也周憲王曰楸有二種一種刺楸樹高大皮色蒼白上有黄白斑㸃枝間多大刺葉薄埤雅云楸有行列莖幹喬聳凌雲高華可愛至秋垂條如線謂之楸線其木濕時脆燥則堅良木也白皮及葉味苦小寒無毒主治吐逆殺三蟲及皮膚蟲傅惡瘡疽癰腫除膿血生肌膚長筋骨有拔毒排膿之功為外科要藥彚考增史記貨殖傳淮北常山以南河濟之間千樹萩其人與千户侯等莊子宋有荆氏者宜楸柏桑其拱把而上者求狙猿之杙者斬之三圍四圍求高名之麗者斬之七圍八圍貴人富商之家求樿傍者斬之故未終其天年而中道之夭於斧斤此材之患也洛陽伽藍記修梵寺北有永和里里中皆高門華屋齋館敞麗楸槐䕃途桐楊夾植當世名為貴里述異記中山有楸户掌楸木者楸可為什器菊坡叢語汝州楸樹極多富鄭公知州時手植數百本於後圃中原埤雅董子曰木名三時草命一嵗若椿從春榎從夏楸從秋所謂木名三時也芓從子蔩從寅茆從卯莤從酉艼從丁茂從戊芑從已莘從辛葵從癸之類命以一嵗支干故曰草命一嵗也集藻五言古詩增唐韓愈庭楸庭楸止五株共生十歩間各有藤繞之上各相鈎聨下葉各垂地樹巔各雲連朝日出其東我常坐西偏夕日在其西我常坐東邊當晝日在上我在中央間仰視何青青上不見纖穿朝暮無日時我且八九旋濯濯晨露香明珠何聨聨夜月來照之蒨蒨自生烟我已自頑鈍重遭五楸牽客來尚不見肯到權門前權門衆所趨有客動百千九牛亡一毛未在多少間往既無可顧不往自可憐宋梅堯臣和王仲儀楸花十二韻春陽發草木美好一同時桃李雜山櫻紅白開繁枝楸英獨娬􅆺淡紫相參差大葉與勁榦簇萼密自宜圖出帝宫樹聳向白玉墀高絶不近俗直許天人窺今植郡庭中根逺未可移但欣東風來不恨和煦遲山禽勿蹙踏蜂蝶休掇之昔聞韓吏部為爾作好詩愛隂無纖穿就影東西隨公今亦牽此端坐曾莫疑七言絶句原唐杜甫楸樹楸樹馨香倚釣磯斬新花蕊未應飛不如醉裏風吹盡可忍醒時雨打稀韓愈楸樹青幢紫葢立童童細雨浮烟作綵籠不得畫師來貌取定知難見一生中楸樹二首幾嵗生成為大樹一朝纒繞困長藤誰人與脱青羅帔看吐高花萬萬層幸自枝條能樹立可煩蘿蔓作交加傍人不解尋根本却道新花勝舊花增金元格楸樹道邊楸樹老龍形社酒澆來漸有靈只恐等閒風雨夜怒隨雷電上青㝠元叚克已楸花楸樹馨香見未曾牆西碧葢聳孤稜㑹須雨洗塵埃盡看吐高花一萬層詩散句增宋劉敞中庭長楸百尺餘翠掩藹葉當四隅魏曹植走馬長楸間宋陸游搖搖楸線風初𦂳别録增典術西方種楸九根延年百病除原製用周憲王本草木可作棋枰葉味甘嫩時取以煠熟水淘浄拌食附録榎原榎檟也亦楸屬爾雅註云楸細葉者為榎楸葉大而早脱故謂之楸榎葉小而早秀故謂之榎爾雅云小而皵音鵲榎小而皮麤皵者為榎大而皵楸老而皮麤皵者為楸附録山楸增爾雅槄山榎疏槄今山楸也亦如下田楸耳皮葉白色亦白材理好宜為車板能濕宜陽共北山多有之楓原楓一名香楓一名靈楓一名攝攝爾雅云楓攝攝漢書注云天風則鳴故曰攝江南及關陜甚多樹高大似白楊枝葉修聳木最堅有赤白二種白者木理細膩葉圓而作岐有三角而香霜後丹二月開白花旋著實成毬有柔刺大如鴨卵八九月熟曝乾可燒彚考增爾雅疏楓生江南有寄生枝高三四尺生毛一名楓子鬼天旱以泥泥之即雨南齊書祥瑞志建元二年九月有司奏上虞縣楓樹連理兩根相去九尺䨇枝均聳去地九尺合成一榦周書武帝紀天和二年七月辛丑梁州上言鳳凰集於楓樹羣鳥列侍以萬數宋史五行志政和三年南雄州楓木連理原山海經有宋山者木生山上名曰楓木楓木蚩尤所棄其桎梏是為楓木增西京雜記上林苑楓四株晉宫閣名華林園楓香三株拾遺記頻斯國有大楓木成林高六七十里善算者以里計之雷電常出樹之半其枝交䕃於上蔽不見日月之光其下平浄掃灑雨霧不能入焉南方草木狀五嶺之間多楓木嵗久則生癭瘤一夕遇暴雷驟雨其樹贅暗長三五尺謂之楓人越巫取之作術有通神之驗取之不以法則能化去異苑烏傷程氏有女未醮著屐遙上大楓樹顛了無危閡顧曰我應為神今便長去惟左蒼右黄當暫歸爾家人悉出見舉手辭訣於是飄聳輕越極睇乃没既不了蒼黄之意每春輙以蒼狗秋黄犬設祀於樹下原述異記南中有楓子鬼楓木之老者為人形亦呼為靈楓化書老楓化為羽人朽麥化為蝴蝶自無情而之有情也説文解字楓木厚葉弱枝善搖漢宫殿中多植之至霜後葉丹可愛故稱楓宸增物類相感志楓木無風自動天雨則止埤雅兵法曰楓天棗地置之槽則馬駭置之轍則車覆舊説楓之有癭者風神居之故造式以為葢又以大霆擊棗木載之所謂楓天棗地葢以風雷之靈在焉故能使馬駭車覆也楓尊棗卑故式覆以風楓載以雷棗丹鉛縂録張文成太卜判有楓天棗地之語唐六典三式云六壬卦局以楓木為天棗心為地原異林𢎞治乙卯長沙大旱楓樹生李實集藻記增明鍾人傑過楓林記楓林在城西南隅枕岡帶郭境頗幽迥際秋老霜新之後悠然一往㑹心正不在遠也嵗辛未重九後二日晨起霜風肅然日氣爽潔不知何從忽動登眺之興欲出郭念無可與遊者遂獨登候潮城循雉而西因山起伏不復規規罋整委蛇旋折足可送逺目適遊履也將近楓林女牆竟與人家菜畦坦接穿籬度莽轉一抝則楓木千本障天蔽野了無雜樹時夕照已轉林腰横射葉上光彩如潑丹砂者正坐吟逺上寒山之句希微間踽踽影動定視之乃一野衲掃落葉爾廹晩風景蒼凉凜不可留望龕燈明處亟投漸聞石磬乃三茅福地遂由石徑出而歸文賦散句增楚宋玉招魂湛湛江水兮上有楓晉何晏景福殿賦槐楓被宸五言古詩增梁簡文帝詠疏楓萎緑映葭青疏紅分浪白花葉灑行舟仍持送逺客唐姚合楓林堰森森楓樹林䕶此石門堰杏堤數里餘楓影覆亦徧鸕鷀與釣童質異同所願宋劉儗楓樹楓葉不耐冷露下臙脂紅無復戀本枝槭槭隨驚風向來樹頭蟬去盡不見蹤日落秋水寒哀哀鳴征鴻七言古詩增宋楊萬里䨇楓一松相後前可憐老翁依少年少年翡翠新衫子老翁得衣青布被更有秋風清露時少年再換輕紅衣莫教一夜霜雪落少年赤立無衣著老翁深衣却不惡朱湛廬鳳山高兮上有楓青女染葉猩血紅莫辭老紅嫁西風一夜憔悴成秃翁五言律詩增唐杜甫䨇楓浦輟棹青楓浦䨇楓舊已摧自驚衰謝力不道棟梁材浪足浮紗㡌皮須截錦苔江邊地有主蹔借上天廻七言律詩增明李東陽諸生有作紅葉詩者愛其未句戲為補之碧樹凋餘老更紅强將顔色慰飄蓬濃霜未著愁先醉返照初囘望欲空唐苑情多何足問吳江句好更誰工晩來蟻穴無歸路應恨蕭蕭匝地風原徐渭紅葉纔見芳華照眼新又看紅葉㸃衣頻只言春色能嬌物不道秋霜解􅆺人宫水正寒愁字字呉江初冷錦鱗鱗更餘一種閒風景醉雜黄花野老巾林若撫紅葉花發炎方想刺桐誰知秋葉幻春紅朝華忽㪚朝陽後晩艶都迷晩燒中凋謝未應隨玉露翦裁元自出金風若教題就能飛去不待流波意已通七言排律原明于若瀛禁城玉露漸秋深楓色凄凄滿上林萬片作霞延日麗幾株含露苦霜吟斜連䨇闕輝青瑣倒影平津映碧潯岐葉著飇聲瑟瑟殷紅過雨色沉沉雜黄間緑紛成錦委砌飄檐埓作金向夕轉深嬌落照因風㪚響怖棲禽城頭廻接青岑逺殿角寒生繡幄隂幾度朝昬勞悵望徘徊故苑倍蕭森五言絶句增唐錢起江行逺岸無行樹經霜有伴紅停船披好句題葉贈江楓成彥雄江上楓江楓自蓊鬱不競松筠力一葉落漁家斜陽帶秋色七言絶句增唐杜牧山行逺上寒山石徑斜白雲深處有人家停車坐愛楓林晩霜葉紅於二月花宋趙成德黄紅紫緑巖巒上逺近高低松竹間山色未應秋後老靈楓方為駐童顏原明朱静庵女郎江空木落雁聲悲霜入丹楓百草萎蝴蝶不知身是夢又隨春色上寒枝詩散句增古詩長楓千餘丈肅肅臨澗水晉阮籍湛湛長江水上有楓樹林唐李白帝子隔洞庭青楓滿瀟湘霜落江始寒楓葉緑未脱原杜甫獨歎楓香林春時好顏色使者雖光彩青楓滿地愁囘首過津口而多楓樹林宋郭祥正一塢藏深林楓葉翻蜀錦明馮琦萬里江楓夜相思秋已深唐杜甫含風翠壁孤雲細背日丹楓萬木凋增韓愈去嵗羈帆湘水明霜楓千里隨歸伴李嘉祐青楓獨映搖前浦白鷺閒飛過逺村原魚𤣥機楓葉千枝復萬枝江橋掩映暮帆時宋朱行中遙看一樹凌霜葉好似衰顏醉裏紅明唐文獻苑外鴻聲連畫角帆前樹色半丹楓增宋謝靈運曉霜楓葉丹梁庾肩吾江楓拂岸遊唐張九齡兩邊楓作岸王維楓攢赤岸村孟浩然目極楓樹林原李白楓葉疊青岑杜甫雨急青楓暮門巷散丹楓丹楓不為霜增李商隐神䕶青楓岸李咸用秋楓紅蝶散宋王安石江楓湛湛青元馬祖常光山楓製錦原唐杜甫赤葉楓林百舌鳴江石决裂青楓催玉露凋傷楓樹林增嚴武江頭赤葉楓愁客韓偓楓葉微紅近有霜宋陸㳺楓葉欲殘看愈好金王鬱江林楓葉秋容醉元郭鈺落日楓林紅葉明詞增宋張炎綺羅香萬里飛霜千山落木寒艶不招春妬楓冷吳江獨客又吟愁句正船􅋈流水孤村似花繞斜陽芳樹甚荒溝一片凄凉載情不去載愁去長安誰問倦旅羞見衰顏借酒飄零如許謾倚新妝不入洛陽花譜為囘風起舞樽前盡化作斷霞千縷記隂隂緑遍江南夜窓聽暗雨别録增唐書崔信明傳信明蹇亢以門望自負嘗矜其文謂過李百藥議者不許揚州録事叅軍鄭世翼者亦驁倨數佻輕忤物遇信明江中謂曰聞公有楓落吳江冷願見其餘信明欣然多出衆篇世翼覽未終曰所見不逮所聞投諸水引舟去原顔魯公集唐金華張遊朝妻劉氏夢楓生腹上後生子名志和立性孤峻篤志隱淪不可得而親疎自號𤣥貞子結茅㑹稽東郭以豹皮為蓆㯶皮為屩隱素木几酌斑螺杯鳴榔拏杖隨意取適垂釣去餌意不在魚竟陵子陸羽問與何人往來荅曰太虛作室而共居明月為燈以同照與四海諸公未嘗離别有何往來增湘山野錄餘杭能萬卷者浮圖之眞儒介然持古人風節有奥學著典類一百二十卷其居延慶寺在大慈塢時儒皆抱經受業師居常喜閲唐韻諸生長竊笑一日出題於法堂曰楓為虎賦其韻曰脂入於地千年成虎諸生皆不諭固請之不説凡月餘檢經史殆百家㑹萃小説俱無見者閣筆以聽教師曰聞諸君笑老僧酷嗜唐韻兹事止在東字韻第二版請詳閲諸生檢之果見楓字註中云黄帝殺蚩尤棄其桎梏變為楓木脂入地千年化為虎魄後諸生始敬此書附録楓香增爾雅注楓樹有脂而香今之楓香是本草金光明經謂其香為須薩折羅婆香原楓脂為白膠香五月斫為坎十一月採之氣辛味苦平無毒治一切癮􅇙瘋癢癰疽瘡疥金瘡吐衂咯血活血生肌止痛解毒燒過揩牙永無齒疾近世多以松脂之清瑩者為楓香又以楓香松脂為乳香總之二物功雖次於乳香諒亦彷彿不逺别録原製用取楓脂入虀水煮二十沸又冷水中揉扯數十次曬乾用附録槭增説文槭木可作大車輮蕭穎士詩序二室之間有槭樹焉與江南楓形胥類集藻詩散句增唐蕭穎士山有槭其葉漠漠榕增南方草木狀榕樹南海桂林多植之葉如木麻實如冬青枝榦拳曲其本稜理而深燒之無熖其䕃十畝枝條既繁葉又茂細軟條如藤垂下漸漸及地藤梢入地便生根節或一大株有根四五處而横枝及鄰樹即連理南人以為常不謂之瑞木南州異物志榕木初生少時縁搏他樹如外方扶芳藤形不能自立根本縁繞他木傍作連結如羅網相絡然彼理連合鬱茂扶疎高六七尺彚考增後山談叢蔡州壺公觀有大木四垂旁出人莫能知張戣閩人嘗至蔡為余言乃榕木也南軒集昔山谷南遷維舟榕下後人為作榕溪閣丹鉛録福建龍泉菴有榕木其中亦可盤坐五六人枝梢寄生大可數十圍方廣巖有木自深坑出直至巖頂寺僧自巔垂絙縋下度之得三十丈云而榦不甚巨半巖視之殊不覺其長也泉南雜志衞西榕樹榦大如一間屋枝上有纚纚垂下者謂是根也其高參天枝葉䕃可三十餘丈相傳韓少卿國華為郡誕魏公日樹杪為吐烟靄又云榕樹千年者其上生伽楠香閩部疏布政司在山上堂後一大樹是榕樟二樹相樛結而生鬱然干雲因為堂以嘉樹顏之榕城隨筆閩中多榕樹因號榕城閩以北無此其在江南則冬青之屬也而枝榦柔脆榦既生枝枝又生根垂垂若流蘇少著物即縈繫或就本榦自相依附若七八樹叢生者多至數十百條合並為一􅠠蜷樛結柯葉䕃茂其偶成章者垂若偃葢曲若虬龍似亦可觀廣西志榕樹門即古南門相傅為唐時所築門上植榕一株嵗久根蔕生跨門外盤錯至地若天成焉因得今名元至正間其樹忽憔悴平章唐元公祭之旬餘枝葉復茂集藻記増明呉寛榕江記木之產於地者曰松曰柏曰栝曰檜曰豫章曰桐梓皆良材也其用于世大者為棟為梁小者為桷為棁各隨其材以為用夫以材之良不用於什器而於宫室亦不枉其材矣然而數木也其生徧於天下而亦足天下之用惟五嶺之南有木曰榕臃腫離竒偃蹇蓊鬱横柯曲榦間有絲焉垂地輙復為根嵗久叢生成林其高且大過松柏栝檜豫章其不黄落而凋桐梓所不及也榕既偏生一隅中原之人初不之識故詩三百多草木之名而篇皆不載後世如郭璞陸佃之博物著書復遺之僅一見於栁子厚之詩而已余嘗讀子厚之詩而識其名詢之土人而知其狀曰此可取以譬乎人矣葢榕之材雖不若松柏之類之堅可用之於宫室而其高大不黄落而凋足以䕃庇乎人嶺南春夏之交日氣酷烈行旅負載之徒跋履勞苦爭息其下或風雨暴至就而避之亦何異夏屋之帡幪也故雖不為宫室之用而其功與宫室等豈不猶鄉里巨人厭爵禄謝民社而浮沉乎閭井之間一旦里之人有急焉投之無不周䘏者豈惟僅全其身以自足而已潮陽隱士陳孔誠甫淳朴恭謹兼通隂陽樹藝之説家邑之華里村宅前有榕數十株數邀賓友攜子弟往遊其間彈瑟賦詩意甚樂也有水自西山來折而東環其宅又東注於海而榕適際水水日夜漱其根濯其條更茂密可愛孔誠或坐盤石投竿而釣悠然有㑹於心因自號榕江或謂之曰子其終老於是而忘斯世耶則對曰吾已有子出而仕矣於是使其子吳江教諭顥來乞余記所謂榕江者葢孔誠託此以自譬者意實有在豈惟追凉風弄明月以為供賓友子弟之樂之計耶且江之廣不足以為負舟然抱甕者即之亦可以灌畦孰謂孔誠無意於此江本出岷山禹貢所謂岷山導江是也此亦曰江南人指水之急流者多借以名之爾賦增宋薛士隆大榕賦越甌而南嶺山東麓有七閩之㑹焉厥都維福福都中閩城山塹水修逵孔直麗譙南指粤有喬木根乎此堂青葱映帶經五門而之合江夾經途者凡十有五里其為根也盤桓詰曲勢浮平陸隱丘陵斡坤軸如山如坻崟岑蔽虧列岫竒峯幻然黙為蜿蜒糾紛虵蟠鹿奔卷舒連蜷油如出雲樹無全株萬本同植縈連擁腫鑽堅露隙儔引儔縁自陵空碧和氣鬱贅疣生衆醜備百怪形岌如神山冬無落木蒼蒼九夏森其翠幄枝柯離􅀈横從出竒翕如其合判如其離嗟如其往歘如其來夭蟜驪龍摩天切空雛翼雲垂扶搖下風輪囷無心隨之有本孔綜根元誰分混沌軒然而大厦成蚴然而怪螭怒駢爪紛拏矗其八柱飛鳥千羣而咸棲有所綢繆束薪不堪以火盤根錯節而摧斤缺斧其圓也不中乎規不成乎矩樵夫視而弗斫大匠行而弗顧以無堪而保其天斯所以邇乎人而壽莫之數也若夫景升之牛主人之雁不善其鳴服箱孔屯以不才而烹者何哉蓋豐肌而蠧夫人之芻豢也斯榕木則不然承天之施得生於地不假乎人不離乎類不以直節為高不以孤生為異淩寒而不改其操連理而不稱其瑞無庸而庸無尚焉為其全虛愚之義也至於交柯旁薄分根合枝異生同命縈繚相維倚天成蓋蔽野成帷迷雲而零雨不下畏日而炎天改色邑人之依行人之得不才而才無似焉斯其為大通之德也夫惟有大通之徳全虛愚之義守不才之位處無庸之地為物而物固莫之陵比人而人適當其意其事也無施其生乃克遂是生乎通邑大都之間尚亦躐千齡而幾萬嵗也走嘗聞諸西方之人曰尼俱律陀之木其子芥三之一及其成材䕃車將五百乗所榕木者不幾於是乎今夫閩中之木榕為大其萌也微物莫之害有蕞其芽蓊然天蓋走不知命之者誰耶庸以劣其形而不文其内無文於内將或容於外而以成其大李綱榕木賦有序閩廣之閒多榕木其材大而無用然枝葉扶疎芘䕃數畝清隂人寔賴之故得不為斧斤之所翦伐蓋所謂無用之用也感而為之賦其辭曰南有巨木其名曰榕下蟠據於厚地上盪摩於高穹雨露之所霶潤雷霆之所震聳日月之所照燭乾坤之所含容與衆木均夫何賦形稟氣之獨不同也爾其擢榦敷條輪囷離竒結根植本拳曲擁腫口鼻百圍之竅穴龍蛇千尺而飛動仰視俯察何規矩繩墨之不中也高明之麗非棟梁之資斲削之工非俎豆之奉以為舟檝則速沉以為棺槨則速腐以為門户則液以為楹柱則蠧薪之弗熖無㸑鼎之功燎之弗明無爝火之用蓋枵然之散木徒萬牛之嗟重宜匠石之不顧同櫟社而見夢然而脩枝翼布密葉雲濃芘結駟之千乗象青蓋之童童夏日方永畏景馳空垂一方之美䕃來萬里之清風靚如帷幄肅如房櫳為行人之所依歸咸休影乎其中故能不夭斧斤棓擊是免雖不材而無用乃用大而效顯異文木之必折類甘棠之勿翦立乎無何有之鄉配靈椿而獨逺不然則雁以不鳴而烹漆以有用而割犀象以齒角而斃樗櫟以惡木而伐處夫材與不材之間殆未易議其優劣也五言古詩增宋唐庚䨇榕水東䨇榕間有叟時出遊清風衣屨古白雪鬚髯虬吟哦明月夕簸弄寒江秋驚傳里中児不泊岸下舟君看鬼趣中有此風味否安知非黄石但恨無留侯此生鋤犁手誤入簮紳流無功折毫髮負罪平山丘政爾求澡濯聞之歎綢繆摳衣倘可親跪履安敢羞得聞半偈語一解終身憂性不喜伐國兵書非所求張栻榕溪寒溪淡容與老木枝相樛其誰合二美名此景物幽太師昔南騖於焉曾少休想當下榻時清與耳目謀品題得要領亦有翰墨留我來訪遺地密竹鳴鈎輈稍令舊觀復還與佳客遊樹影㪚香篆水光泛茶甌市聲不到耳永日風颼颼所喜簿書隙有此足夷猶平生丘壑願如痼不可瘳雖知等喧寂終覺静理優更思濯滄浪榕根浮小舟五言律詩增明傅汝舟南峯菴菴徑有古榕樹懸枝對峙宛若關門古樹上危根依天巧出門雲飛不在外虎過定消魂野客逢迎少山僧出入尊朋遊坐不厭葉落滿金樽七言絶句增唐栁宗元栁州二月榕葉落盡偶題宦情羈思共悽悽春半如秋意轉迷山城過雨百花盡榕葉滿庭鸎亂啼宋劉克莊榕溪閣榕聲竹影一溪風遷客曾來繫短蓬我與竹君俱晩出兩榕猶及識涪翁詩散句增宋蘇軾忽此榕林中跨空飛栱枅急雨蕭蕭作晩凉臥聞榕葉響長廊楊萬里斜陽碎入高榕葉翻作青天覆作金數枝連碧眞成菌一脛空肥總是筋劉克莊拔地高標如鐵色拂天老樹作寒聲唐許渾榕根架緑隂楮原楮一名榖一名榖桑陸璣詩疏云幽人謂之榖桑或日楮桑荆揚交廣謂之榖中州人謂之楮有二種本草曰楮本作柠楮辨雌雄雄者皮斑而葉無椏又謂之斑榖今人用皮為冠者三月開花成長穗如栁花狀不結實雌者皮白無花葉有椏又似葡萄葉開碎花結實如楊梅用時但取葉有椏又有子者為佳其實初夏生大如彈丸青緑色六七月成熟漸深紅八九月采實名楮桃一名榖實甘寒無毒治水腫壯筋骨補虛勞益顏色健腰滕充肌明目久服輕身不饑不老增崔豹古今注楮實為任陸璣詩疏江南人績其皮以為布又擣以為紙謂之榖皮紙其葉初生可以為茹彚考增詩小雅樂彼之園爰有樹檀其下維榖注榖楮也漢書郊祀志帝太戊有桑榖生於廷一暮大拱注榖即今之楮樹也山海經霍山其木多榖管子五沃之土宜榖抱朴子柠實赤者餌之一年老者還少酉陽雜俎榖田久廢必生構葉有瓣曰楮無曰構澄懐録永徽中定州僧寫華嚴經先以沉香種楮樹取以造紙集藻傳原明閔文振楮待制傳楮待制初名藤及長為世用更名知白㑹稽剡溪人先世索居山林無所聞於世厯前漢有楮先生始以名顯和帝時中常侍蔡倫有文思善造就人材辟召遍天下使者見楮氏歸以告倫倫亟聘之得楮皮者俱來倫曰眞良材也一變化則就章程於是刮劑浸漬漸見㫪容延館簾内知白聞而歎曰以皮之陋且沾掄選吾可終老林藪乎既至倫揭簾見之嘖嘖歎賞曰文明之化其在君矣引見帝帝嘉賞恨相得之晩超拜秘書省萬字令尋擢秘閣待制日承任使自書契既造竹氏帛氏貴重於世者既數千年及知白用二氏遂廢凡經史術藝百家九流之説皆托以行天下當代注記册籍臣民文移簡札非知白不達也帝益加􅃂待每中書令毛穎松滋侯陳𤣥萬石君羅文侍左右必召知白至展其邊幅有諮議須令省記帝嘉其潔白戲語陳𤣥曰江漢以濯秋陽以暴若知白者殆孔氏之徒與卿與之反何哉𤣥曰知其白守其黑臣得自全之道皦皦者易汙臣懼知白之不終也帝笑曰卿不加汙誰復汙之𤣥頓首謝一日知白侍經筵屬微風神思飄亂不定帝曰朕固知卿體薄不耐風今加節鎮俾邊都䕶領之知白叩謝臣辱荷厚恩敢不竭方正之節捐軀以報士有以文辭投知白者頗渉謬惡知白怒㑹召因愬帝曰臣精白一心仰叨任使者數十年毎願得嘉言醇文推明義理以淑人心翊世教利益國家今狂生淺夫任情謬惡臣一被汙辱欲雪無由願陛下一申文字乖謬之禁帝從其言且惜其䝉辱命儒臣撰悲剡藤文以舒其憤知白才博而通推其餘雨暘可葢風露可障竪可屏揮可扇觀美可圖畫夫子所稱不器庶幾近之晩年就閒族子曰麻曰桑曰竹曰繭曰敝布曰魚網並出蔡氏陶鑄繼知白大用於世傳嗣不絶其他銀光陟釐羅文玉版蠟牋烏絲襴以至間雜五采尤為世所愛重云五言古詩增宋蘇軾宥老楮我牆東北隅張王維老榖樹先樗櫟大葉等桑柘沃流膏馬乳漲墮子楊梅熟胡為尋丈地養此不材木蹶之得輿薪規以種松菊静言求其用略數得五六膚為蔡侯紙子入桐君録黄繒練成素黝面頮作玉灌灑蒸生菌腐餘光吐燭雖無傲霜節幸免狂酲毒孤根信微陋生理有倚伏投斧為賦詩徳怨聊相贖五言絶句增宋王安石詠榖可憐臺上榖轉目已隂繁不解詩人意何為樂彼園七言絶句增宋無名氏楮楮樹婆娑覆小齋更無日影午窓開一端能敗幽人意夜夜牆西碍月來别録增列子宋人有為其君以玉為楮葉者三年而成鋒殺莖柯毫芒繁澤亂之楮葉中而不可别也此人遂以巧食宋國子列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣故聖人恃道化而不恃智巧齊民要術楮宜澗谷間種之地欲極良秋上楮子熟時多收淨淘曝令燥耕地令熟二月耬耩之和麻子漫㪚之即勞秋冬仍留麻勿刈為楮作煖明年正月初附地芟殺放火燒之一嵗即没人三年便中斫斫法十二月為上四月次之每嵗正月常放火燒二月中間斫去惡根移栽者二月蒔之亦三年一斫指地賣者省功而利少煮剥賣皮者雖勞而大自能造紙其利又多種三十畝者嵗斫十畝三年一遍嵗收絹三百疋物類相感志楮膠可以團丹砂水南翰記凡接紙縫如一線日久不脱用楮樹汁白麪白芨末調為糊原種植熟時取子淘浄曬乾同麻子種熟地至冬留麻取暖明春放火燒芟之三年可斫其皮抄紙斫以臘月為上四月次之非此月損其樹本服食八月後采實水浸去皮穰甲子日隂乾為末每水服二錢久之乃效椿按香者名椿臭者名樗二木形榦相類椿木實而葉香樗木疎而葉臭無花木身大其榦端直者為椿有花木身小榦多迂矮者為樗乃一類二種也原椿集韻作櫄夏書作杶左傳作橁今俗名香椿本草陳藏器云俗呼為猪椿易長而有壽南北皆有之木身大而實其榦端直紋理細膩肌色赤皮有縱紋易起葉自發芽及嫩時皆香甘生熟鹽醃皆可茹世皆尚之無花莢葉苦温無毒多食動風壅經絡令人神昬和猪肉熱麪頻食則中滿椿用葉彚考增書禹貢杶榦栝柏山海經成侯之山其上多櫄木原莊子上古有大椿者以八千嵗為春八千嵗為秋鳳池篇盧攜夢人贈句曰若問登庸日庭椿不染風初不解其言後數年攜拜相庭下古椿一株雖狂風驟雨不濕不搖宦遊紀聞涿州有靈椿寺寺中椿木一本大不可量枝榦繁盛凡樹影皆隨日月升沉以為邪正而椿影早暮未常少移湧幢小品福州之壺江在海上多烈風白崖之巔有椿一枝翠葢亭亭榕葉槐身經年無鳥跡雖風作不脱片葉三年一結子如紅豆一道士夜半月明見樹頂霞裳羽衣者數人隨以鶴鹿盤桓其上隱隱有笙簧聲雞初號乃散集藻賦增元任士林庭椿賦燕山之陽南㝠之濵有大木焉其名曰椿蓋抗嵗時而聳立揭造化之蹲蹲者與相彼竒亭夷庚掌平迺睠􅀢村甍椽列星維陋巷之蕭蕭兀幽人之柴扃有椿喬然闞乎中庭𤣥雲構其堂宇秀色結乎軒楹觀其崇根碩本挺柯稠葉蓊蓊焉䔿䔿焉青㝠黯黯皮溜雨而胼胝榦拂霓而冗還篲日月之氛隂控雪霜之飄颯千尋引而表端萬鳥棲而影接蓋根柢之擁腫性也豈不美乎莊生之櫟枝葉之榮暢時也又何歆乎王氏之槐耶盼老人之豫章訪嵗寒之松柏或輪囷以為竒或偃蹇以為傑孰與夫謝萬牛而崔嵬却匠石而鬱茀者乎爾則稚竹株連弱松肺附結緒根於地軸藉沫濡於雨露想其簇榦帡幪列萬間之厦屋不足以喻宗條鱗輳雖千社之枌榆又何足以同年而語耶於是天翊其貞地隆其植寒暑節其凉溫鬼神呵其峻特醴泉夜注而人不能挹以草木之滋卿雲晨覆而人不能衣以青黄朱緑之絲人不足以扶持而終風不移人不足以悦懌而陽春色怡此所以俯視君遷傲睨平仲而永為斯庭之瞻依也耶彼尋常之喬梓亦何足以與乎斯五言絶句原宋晏殊峩峩楚南樹杳杳含風韻何用八千秋騰凌詫朝菌七言絶句原宋劉敞椿野人獨愛靈椿館館西靈椿聳危榦風揉雨煉三月餘奕奕中庭䕃華傘詩散句原宋蘇軾從今八百嵗合抱是靈椿增後周馮道靈椿一株老唐張蠙靈椿還向細枝條金元好問溪童相對采椿芽别録增花木考採椿芽食之以當蔬亦有㸃茶者其初茁時甚珍之既老則葅而蓄之樗原樗亦椿類氣臭俗名臭椿一名虎目樹一名大眼桐皮麤肌虛而白其葉臭惡荒年人亦采食膳夫采取瀹熟另用冷水浸去氣息亦可油醋拌食但無味耳有花者無莢有莢者無花藥中用根及莢葉增本草北人呼為山椿江東呼為虎眼謂葉脱處有㾗如虎之眼目又如樗蒲子故得此名彚考增詩豳風采荼薪樗小雅我行其野蔽芾其樗注樗惡木也山海經丹熏之山其上多樗柏灌題之山其上多樗柘槖山其木多樗原莊子惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠者不顧今子之言大而無用衆所同去也莊子曰子有大樹患其無用何不樹之於無何有之鄉廣莫之野彷徨乎無為其側逍遙乎寢臥其下不夭斤斧物無害者無所可用安所困苦哉增河洛記洛陽北山謂之邙山其上無大樹都城之北嶺上有古樗樹不知其來早晩婆娑周廻四五畝與伊闕山正南相當越公等將建都城之日據此樹以為南北定準嫌樗木名惡號曰婆娑羅樹矣集藻五言古詩增宋梅堯臣尹師魯治第伐樗伊人利營構思欲新其居匠築經舊址簷楹礙高樗且云忍不伐何以成吾廬人言此樹古百怪所憑依獨秉一定議自將羣俗違乃俾執柯者丁丁霜刃揮殲殞條百尺横仆株數圍從兹朝夕間不聞鳥雀喧既能考子室而復高其門周也昔騁辯後以不材論工今誠匪度茍害安可存舟檝且非藉薪㸑聊用燔莫比溝中斷區區望犧樽五言絶句增宋蘇軾樗自昔為神樹空聞蜩鵙鳴社公煩見輟為爾致羊羮七言絶句增唐白居易林下樗香檀文桂苦雕鐫生理何曾得自全知我無材老樗否一枝不損盡天年附録山樗原栲山樗也似樗色小白葉差狹吳人取以為茗木虚大梓人亦或用之然爪之腐朽故古人以為不材之木增爾雅注栲類漆樹疏俗云櫄樗栲漆相似如一草木疏山樗與下田樗略無異葉似差狹耳本草李時珍曰椿樗栲一木三種也栲木即樗之生山中者櫟櫟實附見增爾雅栩杼疏今柞櫟也徐州人謂櫟為杼或謂之為栩其子為皂或言皂斗其殻為汁可以染皂櫟其實梂注有梂彚自裹疏櫟似樗之木也梂盛實之房也孫炎曰櫟實橡也圖經柞櫟也杼也栩也皆橡櫟之通名本草櫟有二種一種不結實者其名曰棫其木心赤一種結實者其名曰栩其實為橡二者樹小則聳枝大則偃蹇其葉如櫧葉而文理皆斜鈎四五月開花如栗花黄色結實如荔支核而有尖其蔕有斗包其半截其仁如老蓮子肉可以為飯或擣浸取粉其嫩葉可煎飲高者二三丈堅實而重有斑文大者可作柱棟小者可為薪炭櫟實一名橡斗一名柞子一名杼古今注東海及徐州謂之木蓮梂子八月中成搏以為燭明如胡麻燭研以為羮肥如胡麻羮彚考增詩唐風集于苞栩秦風山有苞櫟疏秦人謂柞為櫟小雅陟彼高岡析其柞薪析其柞薪其葉湑兮維柞之枝其葉蓬蓬大雅柞棫拔矣瑟彼柞棫民所燎矣周禮地官一曰山林其植物宜皂物注柞栗之屬後漢書李恂傳恂徙居新安闗下拾橡實以自資晉書摯虞傅虞從惠帝幸長安流離鄠杜之間轉入南山中糧絶饑甚拾橡實而食之宋書符瑞志宋文帝元嘉二十二年七月南頓櫟連理唐書文藝傳杜甫客秦州負薪采橡栗自給山海經白於之山下多櫟檀原莊子狙公賦芧曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆悦名實未虧而喜怒為用亦因是也增莊子匠石之齊至乎曲轅見櫟社樹其大蔽牛絜之百圍其高臨山十仞而後有枝其可以為舟者旁十數觀者如市匠伯不顧遂行不輟弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肯視行不輟何耶曰㪚木也以爲舟則沉以為棺槨則速腐以為器則速毁以為門户則液樠以為柱則蠧是不材之木也無所可用故能若是之壽匠石歸櫟社見夢曰予求無所可用久矣幾死乃今得之使予也而有用且得有此大也耶古者獸多人少皆巢居以避之晝食橡栗夜棲樹上故曰有巢氏列子杜厲叔居海上夏日則食菱芡冬日則食橡栗淮南子十二月其樹櫟注可以為車轂木不出火惟櫟為然亦應隂氣也三輔黄圖五柞宫漢之離宫也在扶風盩厔宫中有五柞樹因以為名五柞皆連抱上枝覆隂數畝風土記史記曰舜耕於厯山而始寧郯二縣界上舜所耕田在於山下多柞樹吳越之間名柞為􅌴故曰厯山水經注堯陵東城西五十餘歩中山夫人祠堯妃也石壁堦墀仍舊南西北三面長櫟聨䕃扶疎里餘濏濏水出西谿東流水上有連理樹其柞櫟也南北對生凌空交合谿水厯二樹之間若邪谿上有一櫟樹謝靈運與從弟惠連常遊之作連句題刻樹側孝友傳庾衮與邑人入山拾橡分夷嶮序長幼推易居難禮無違者輿地志鍾山最高峰有五願樹樹柞木也元嘉中百姓祈禱率有驗夢溪筆談江南有小栗謂之茅栗以予觀之此正所謂茅也則莊子所謂狙公賦茅者此文相近之誤也誠齋雜記桂陽張碩為神女杜蘭香所降出薯橡子三枚大如雞子云食此令君不畏風波辟寒濕集藻詩散句原唐皮日休秋深橡子熟㪚落榛蕪岡宋張耒野俎飽貆脯山罏煑橡麋唐杜甫呼鷹皂櫟林孟郊翻翻橡葉鳴李嘉祐千峯櫟樹林皮日休橡實養山禽張蠙齋厨惟有橡杜荀鶴霜後巖猿拾橡忙方干嵗計有時添橡實宋唐庚橡實炊食如剝栗御定佩文齋廣羣芳譜卷七十五
