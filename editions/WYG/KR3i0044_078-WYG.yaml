長縈砌乍飛還乍舞撲池如雪又如霜莫令岐路頻攀折漸擬垂隂到畫堂增顧雲柳帶露含烟處處黄綻黄揺緑嫩參差長堤未見風飄絮廣陌初憐日映絲斜傍畫筵偷舞態低臨妝閣學愁眉離亭不放到春暮折盡拂簷千萬枝韓偓宫柳莫道秋來芳意違宫娃猶自妬蛾眉幸當玉輦經過處不怕金風浩蕩時草色長承垂地葉日華先動映樓枝澗松亦有凌雲分爭似移根太液池原唐彥謙柳春思春愁一萬枝遠村遥岸寄相思西園有雨和苔長南内無人拂檻垂遊客寂寥緘遠恨暮鶯啼叫惜芳時晩來飛絮如霜鬢恐為多情管别離増李咸用詠柳日近烟饒還有意東垣西掖幾千株牽仍别恨知難盡誇衒春光恐更無觧得人情常婉約巧随風勢强盤紆天應繡出繁華景處處茸絲惹路衢羅紹威柳裝㸃青春更有誰青春常許占先知亞夫營畔風輕處元亮門前日暖時花密宛如飄六出葉繁何惜借䨇眉交情别緒論多少好向行人贈一枝徐夤柳漠漠金條引線微年年先翠報春歸觧籠飛靄延芳景不逐亂花飄夕暉啼鳥噪蟬堪悵望舞烟揺水自因依五株名顯陶家後見説辭榮種者稀僧慕幽柳今古憑君一贈行幾回折盡復重生五株斜傍淵明宅千樹低垂太尉營臨水帶烟藏翡翠倚風兼雨宿流鶯隋皇堤上依依在􅈕惹當時歌吹聲宋歐陽修去思堂手植䨇柳今歳成隂因而有感曲欄髙柳拂層簷却憶初栽映碧潭人昔共逰今孰在樹猶如此我何堪壮心無復身從老世事都消酒半酣後日更來知有幾攀條莫惜駐征驂詠柳緑樹低昂不自持河橋風雨弄春絲殘黄淺約眉䨇歛欲舞先誇手小垂快馬折鞭催遠道落梅横笛共餘悲長亭送客兼迎雨費盡春條贈别離陶弼詠柳揚子江頭流水湄長安陌上暖風吹黄金瓔珞雪晴後碧玉玲瓏春盡時端的園林俱不及等閒臺榭便相宜思量也是多情物占與人間贈别離邵雍垂柳短吟臨溪拂水正依依更被狂風來往吹薄暮不勝烟羃羃深春無奈日遲遲誰家縹緲青羅被何處蹁躚金縷衣猶恐離人腸未斷滿天仍著亂花飛王十朋詠柳東君于此最鍾情装㸃村村入畫屏向我無言眉自展與人非故眼猶青縈牽别恨絲千尺斷送春光絮一亭葉底黄鸝音更好隔溪烟雨醉時聼元張𢎞範風柳澹澹池塘近楚宫緑腰裊娜學盤中亂揺芳草飛輕白細搭朱䦨拂落紅枝上嬌鶯啼恰恰樹邊舞蝶意悤悤東君應著吹嘘力莫把真愁一埽空明興獻王楊柳金絲縷縷是誰搓時見流鶯為擲梭春暮絮飛清影薄夏初蟬噪緑隂多依依弱態愁青女裊裊柔情戀碧波惆悵路岐行客衆長條折盡欲如何楊基新柳濃如烟草淡如金濯濯姿容裊裊隂漸軟已無憔悴色未長先有别離心風來東面知春淺月到梢頭覺夜深惆悵呉宫千萬樹亂鴉疎雨正沉沉李楨柳含烟裊露自青青愛近官橋與驛亭春滿章臺偏婀娜秋深隋岸最凋零長從蘇小門前折幾向龜年笛裏聼絶勝東風桃李樹飛花猶鮮化浮萍石珤宫柳内裏垂楊自不同萬條柔翠拂瓊宫葉含華蕚樓前雨枝帶朝元閣上風望入畫眉情正切囀來黄鳥語初工一般㶚水橋頭緑日日行人惆悵中謝榛春柳黄鸝時復喚春逰陌上楊花漫不休幾向離筵揺落日莫教長笛動清秋輕烟直接都門外細雨低臨㶚水頭漫繫王孫金絡馬萋萋緑草有人愁李言恭柳千株楊柳翠逶迤裊裊烟絲風細搓鶯囀市橋牽客思馬嘶官道促驪歌水邊膩欲堆金縷花外輕堪度玉梭漢苑隋宫俱寂寞古堤草滿夕陽多李奎詠湖上新柳依依弱柳不勝春裊裊垂條向水濵奈可輕盈愁少婦豈堪攀折贈離人烟消翡翠眠初起風折鴉黄舞乍新猶喜芳心未成絮肎將眉黛向人顰原張祥鳶柳東風宛轉柳條新攀折初榮贈玉人眉翠正逄三月望絲長能繫百年春輕撩燕子昭陽舞低拂桃花洛水神唱罷新翻芳樹曲半遮歌扇一含顰申時行烟柳拂地長翻綺陌塵㺯晴偏學黛眉顰三眠弱縷深如羃一抹輕綃黯未匀嘶入紫騮難辨影坐來黄鳥易藏身千條青瑣還能記御氣氤氲曉色新淺緑輕黄半吐姿長堤曲沼萬垂絲纔消凍水先窺眼乍著條風已放眉陌上折來偏弄色樓頭望去轉縈思一年一報芳菲節漫向河橋怨别離范景文春柳春晴乍被柳相挑費盡支持不自聊作意將來㸔眼媚關情偏可惹魂消痩猶含態驕梅格暖故拖寒帶雪條漫較疎黄與深緑好風吹綻㸔明朝鄭之文詠柳㶚橋無恙綰離憂忽見揚鞭紫陌頭學舞腰肢防妾妬含顰眉黛為君愁藏鴉門外條空結繫馬堤邊葉正柔古道羗城慣吹笛懸知心已在封侯徐桂新柳條風一夜乍回枯黛色和烟半有無𤣥㶚柔條堪繫馬白門疎影不藏烏樓頭寒映羅衣薄曲裏風驚紫塞孤春水渌波春草碧等閒芳嵗莫教徂増康彥登詠柳照影盈盈拂自垂受風縷縷弱還吹關山笛裏思歸引㶚水橋邊恨别枝翠黛莫因春去損纎腰乍向月明移可憐空傍章臺老欲惜凋零更有誰朱謀㬜柳二十八星中有名千枝萬樹綰離情暖風拂地條初弱寒雨連空葉漸生半倚紅亭江北岸低藏粉堞漢南城緑隂髙處春光暮吹送新蟬四五聲陳繼儒詠柳泥融沙漲雪㾗消到處芳菲著舊條隔水半藏青雀舫迎風斜倚赤欄橋樓頭人醉初横笛㶚口春隂不上潮陶令柴桑歸去久五株門外已飄揺翠條金穗舞娉婷野渡津頭驛外亭啼鳥踏來枝太怯春風扶起態沉㝠黄河冰破初回緑紫塞沙寒不放青此日深閨逰子婦只愁飄泊逐浮萍東風淡蕩影徘徊歛態凝愁傍落梅疎翠䕶枝披早霰綻黄黏凍候輕雷此時稽鍜隂全薄幾夜羗吹花不開依舊西京春月色何人走馬過章臺僧智舷秋柳悵望依依南浦南春絲爭吐似呉蠶一枝一葉俱無恙秋雨秋風也不堪蚤識愁催青眼變肎將顰與翠眉含明年縱使連堤緑能忍清霜滿樹酣僧大遂柳沐雨梳烟千萬枝春風挽住定何時青窺鏡裏愁人眼翠染機中織女絲柔舞難容鶯坐穏輕揺易惹燕飛遲可憐嵗嵗章臺路腸斷忘歸遊俠兒御定佩文齋廣羣芳譜卷七十六
