body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷七十六木譜柳一増本草桞一名小楊一名楊柳陳藏器曰江東人通名楊柳北人都不言楊楊樹枝葉短柳樹枝葉長李時珍曰楊枝硬而揚起故謂之楊柳枝弱而垂流故謂之柳葢一物二種也原柳易生之木也埤雅云柳與楊同類雖縱横顛倒植之皆生性柔脆北土最多枝條長軟葉青而狹長其長條數尺或丈餘嬝嬝下垂者名垂柳木理最細膩唐曲江池畔多柳號為柳衙謂成行列如排衙也栁條柔弱嬝娜故言細腰娬媚者謂之柳腰彚考増易枯楊生稊注稊者楊之秀也疏稊者楊柳之穗故云楊之秀也原詩齊風折柳樊圃陳風東門之楊其葉牂牂東門之楊其葉肺肺増小雅昔我往矣楊柳依依原小雅菀彼柳斯増周禮地官司徒以土㑹之法辨五地之物生二曰川澤其動物宜鱗物其植物宜膏物注膏物謂楊柳之屬原大戴禮正月柳稊稊者發孚也増戰國策田需貴於魏王惠子曰子必善左右今夫楊横樹之則生倒樹之則生折而樹之又生然使十人樹楊一人拔之則無生楊矣楚有養由基者善射去柳葉百歩而射之百發百中原漢書五行志昭帝時上林苑種大柳樹斷仆地一朝起立生枝葉有蟲食其葉成文字曰公孫病已立増漢書地理志信都國扶柳注師古曰闞駰云其地有扶澤澤中多柳故曰扶柳晉書嵇康傳康性絶巧而好鍜宅中有一柳樹甚茂乃激水圜之每夏月居其下以鍜原晉書陶侃傳侃性纎密好問頗類趙廣漢常課諸營種柳都尉夏施盗官柳植之於已門侃後見駐車問曰此是武昌西門前柳何因盗來此種施惶怖謝罪桓温傳温自江陵北伐行經金城見少為瑯琊時所種柳皆已十圍慨然曰木猶如此人何以堪増晉書苻堅載記王猛整齊風俗自長安至於諸州皆夾路樹槐柳百姓歌之曰長安大街夾樹楊槐下走朱輪上有鸞棲英彦雲集誨我萌黎原南齊書王敬則傳敬則初為散騎使北於北館種楊柳後員外郎虞長耀北使還敬則問我昔曽種楊柳樹今若大小長耀曰北人以為甘棠敬則笑而不答隋書髙熲傳熲少明敏有器局畧渉書史尤善詞令初孩孺時家有柳樹髙百許尺亭亭如葢里中父老曰此家當出貴人南史張緒傳緒吐納風流聼者皆忘飢疲見者肅然如在宗廟雖終日與居莫能測焉劉悛之為益州獻蜀柳數株枝條甚長状若絲縷時舊宫芳林苑始成武帝以植於太昌靈和殿前常賞玩咨嗟曰此楊柳風流可愛似張緒當年時其見賞愛如此増南史陸慧曉傳慧曉與張融並宅其間有池池上有二株楊柳何㸃歎曰此池便是醴泉此木便是交讓劉瓛傳瓛晉丹陽尹惔六世孫篤志好學丹陽尹袁粲於後堂夜集聞而請之指㕔事前古柳樹謂瓛曰人謂此是劉尹時樹每想髙風今復見卿清徳可謂不衰矣隱逸傳陶潛少有髙趣宅邊有五柳樹嘗著五柳先生傳舊唐書范希朝傳希朝除振武節度使單于城中舊少樹希朝于他處市柳子命軍人種之俄遂成林居人賴之唐書吕渭傳貞元中渭累遷禮部侍郎始中書省有古柳建中末枯死徳宗自梁還復榮茂人以為瑞柳渭令貢士賦之文藝傳王維别墅在輞川有柳浪宋史五行志天聖元年二月河陽柳二本連理辛仲甫傳乾徳五年入拜右補闕出知光州六年移知彭州先是州少種樹暑無所休仲甫課民栽柳䕃行路郡人徳之名為補闕柳遼史禮志遼國行瑟瑟儀若天旱前期置百柱天棚乃射柳皇帝再射親王宰執以次各一射中柳者質誌柳者冠服不中者以冠服質之不勝者進飲於勝者然後各歸其冠服又翼日植柳天棚之東南巫以酒醴黍稷薦植柳祝之皇帝皇后􅀕東方畢子弟射柳皇族國舅羣臣與禮者賜禮物有差既三日雨則賜敵烈麻都馬四匹衣四襲否則以水沃之山海經廆山之西有谷焉名曰雚谷其木多柳鳳伯之山熊山真陵之山木多柳平丘山爰有楊柳沃民之國有白柳原管子五沃之土其木宜柳増淮南子注展禽之家有柳樹身行惠徳因號柳下惠一曰邑名三輔黄圖細柳觀在長安西北三輔舊事云漢文帝大将軍周亞夫軍於細柳今呼古徼是也長安御溝謂之楊溝謂植髙楊于其上也荆州記縁城隄邊悉植細柳緑條散風青隂交陌秦州記上邽縣北有利山川中平地有土堆髙五丈生二楊樹大數十圍百姓祀之孔氏志怪會稽盛逸嘗晨興路未有行人見門内柳樹上有一人長二尺衣朱衣冠冕俯以舌䑛樹上露良久忽見逸神意如驚遽即隱不見開河記大業中開汴渠兩堤上栽垂柳詔民間有柳一株賞一縑百姓競植之鄴侯家傳泌賦詩譏楊國忠曰青青東門柳歳晏復憔悴國忠訴於明皇上曰賦柳為譏卿則賦李為譏朕可乎酉陽雜俎肅宗将至靈武一驛黄昬有婦人長大擕䨇鯉咤於營門曰皇帝何在衆謂風狂遽白上潛視舉止婦人言已止大樹下軍人有逼視見其臂上有鱗俄天黒失所在及上即位歸京闕虢州刺史王竒光奏女媧墳云天寶十三載大雨晦㝠忽沉今月一日夜河上有人覺風雷聲曉見其墳湧出上生䨇柳樹髙丈餘下有巨石兼畫圖進上初克復使祝史就其所􅀕之至是而見衆疑向婦人其神也原清異録新栽柳樹必用泥封其頭頗類比丘頂元伯玉宅前插柳初春吐芽伯玉曰喜得漏春和尚一一無恙葢取杜子羙漏泄春光有柳條之句孔帖韋維初為省郎時蒔柳於庭及其子虚心兄弟居郎省對之歛容増冷齋夜話王仲正言老杜詩江蓮揺白羽天棘蔓青絲天棘非煙雨自是一種物曽見於一小説今忘之髙秀實曰天棘天門冬也天門冬一名顛棘非天棘也王元之詩曰水芝臥玉腕天棘舞金絲則天棘葢柳也西朝寶訓真宗賦御溝柳詩令宰相兩省和進陳執中詩曰一度春來一度新翠光長得照龍津君王自愛天然態恨殺昭陽學舞人其詩最尤者原古今詩話漢張敞為京兆尹走馬章臺街街有柳終唐世曰章臺柳故杜詩京兆空柳色増暇日記孟伯饒説宋用臣種柳睿思殿用常柳五株批開急合為一取圜直麻縷繫牛矢泥固深栽之一年有三年力白玉蟾集太微宫中箕宿之精化而為柳垂垂裊裊然于淡雲疎雨之間其間則有五柳先生古人之所以隱於柳者葢欲彰其温柔謙遜之志也墨荘漫録揚州蜀岡上大明寺平山堂前歐陽文忠手植柳一株謂之歐公柳公詞所謂手植堂前楊柳别來幾度春風者薛嗣昌作守相對亦種一株自榜曰薛公柳人莫不嗤之髙僧傳西域尼拘律陀樹即東夏之楊柳西域人來止稱尼拘方輿勝覽建康有鳯州柳蜀主與江南結㛰求得其種鳳州出手柳酒曽極詩云蜀主函封遣使時芳根原自鳯州移柔荑醽醁今安得惟有青絲拂地垂湖山勝槩叚橋又名叚家橋萬柳如雲望如裙帶白樂天詩云誰開湖寺西南路草緑裙腰一道斜髙梁橋記髙梁橋在西直門外京師最勝地也兩水夾堤垂楊十餘里小輞川記藍田别墅前有池淳泓一碧左右垂柳交䕃顔曰水木清華小崑山記紅菱渡之東板橋横焉左右多垂楊曰楊柳橋閩部疏閩部最少楊柳福州城中士大夫園池邊間有一兩株作長條拂地不能拱把西浮籍皖城之東垂楊撲江隂􅇈數里帆影盡緑淮南記南門三里許有池曼衍碧瀾映底菰􅃽菱蒲互相凌亂柳樹百株籠煙拂風架木為橋濶可並騎度橋及洲洲上築天妃宫堂楹精楚庭除清䕃亦柳為翳景也宫旁二百歩又為板橋小渚渚有亭亭有柳澄懷味象𣺌然盡陂澤山林之思西湖志西湖北山有柳洲亭覽勝志引元史云南渡後自湧金至錢塘沿城五里堤岸徧插垂柳故名嘉興志五柳橋在嘉興縣治西宋張堯同詩為懷陶靖節無復見其人惟種橋邊柳猶含舊日春漢中府志金絲柳出鳯縣宋元豐間有㫖下鳯州取金絲柳一百根墨客揮犀云鳯州妓女手皆纎白州境内生柳翠色可愛與他處不同又公庫多羙醖故世言鳯州有三出淳熙初太守傅子平作詩云珍珠不見小槽紅遐想柔荑剥嫩葱惟有萬條羅帶緑年年依舊舞春風原太原府志柳溪在府城西太守陳堯佐築堤植柳數萬有亭有閣率郡僚上已泛舟於此平凉府志柳湖在府城北三十里宋守蔡挺建湖畔柳數千株緑䕃平堤湖光可挹慶陽府志寕州治後圃宋建蓮池柳巷花嶼蘭臯一郡勝地也予師帶溪曲公自西粤左轄入覲為予言西粤無柳僅藩司一株毎吐葉則司中設席請三司賞柳以為竒觀後以質之予同年唐兄抱一唐云豈止此某鄉紳園中仍有一株夫柳中土林立而粤西至比之異卉竒葩然則物之貴賤豈有定哉集藻序原魏曹植柳頌序余以閒暇駕言出逰過友人楊徳祖之家視其屋宇寥廓庭中有一柳樹聊戲刋其枝葉故著斯文表之遺翰遂因辭勢以譏當今之士賦原漢枚乗忘憂舘柳賦忘憂之館垂條之木枝逶迤而含紫葉萋萋而吐緑出入風雲去來羽族既上下而好音亦黄衣而絳足蜩螗厲響蜘蛛吐絲階草漠漠白日遲遲於嗟細柳流亂輕絲君王淵穆其度御羣英而翫之小臣瞽瞶於此陳辭於嗟樂兮於是罇盈縹玉之酒爵獻金漿之醪庶羞千族盈滿六庖弱絲清管與風霜而共雕鎗鍠啾唧蕭條寂寥雋乂英髦列襟聫袍小臣莫效於鴻毛空銜鮮而𠻳醪雖復河清海竭無増景於邊橑増魏文帝柳賦並序昔建安五年上與袁紹戰於官渡時余始植斯柳自彼迄今十有五載矣感物傷懷乃作斯賦曰伊中域之偉木兮瑰姿妙其可珍稟靈祗之篤施兮與造化乎相因四時邁而代運兮去冬節而渉春彼庶卉之未動兮固肇萌而先辰盛徳遷而南移兮星鳥正而司分應隆時而繁育兮揚翠葉之青純修幹偃蹇以虹指兮柔條婀娜而􅉬伸上扶疎而施散兮下交錯而龍鱗在余年之二七植斯柳乎中庭始圍寸而髙尺今連拱而九成嗟日月之逝邁忽亹亹以遄征昔周遊而處此今倐忽而弗形感遺物而懷故俛惆悵以傷情於是曜靈次乎鶉首兮景風扇而増暖豐𢎞隂而博覆兮躬愷悌而弗倦四馬望而傾葢兮行旅仰而廻睠秉至徳而不伐兮豈簡卑而擇賤含精靈而寄生兮保休體之豐衍惟尺斷而能植兮信永貞而可羡王粲柳賦昔吾君之定武致天届而徂征元子從而撫軍植嘉木於兹庭歴春秋以逾紀行復出於斯鄉覽兹樹之豐茂紛旖旎以修長枝扶疎而覃布莖森梢以奮揚人情感於舊物心惆悵以増慮行㳺目而廣望覩城壘之故處悟元正之話言信思難而存懼嘉甘棠之不伐畏取累於此樹茍遠跡而退之豈駕辭而不屢應瑒楊柳賦赴陽春之和節植纎柳以承凉攄豐節而廣布紛鬱勃以敷陽三春倐其奄過景日赫其垂光振横條而遠翳廻雲葢於中唐繁欽柳賦有寄生之孤柳託余寝之南隅順肇陽以吐芽因春風以楊敷交緑葉而重葩轉紛錯以扶疎鬱青青以暢茂紛冉冉以陸離浸朝露之清液曜華采之猗猗晉𫝊𤣥柳賦羙允靈之鑠氣兮嘉木徳之在春何兹柳之珍樹兮禀二儀之清純受大角之禎祥兮生濛汜之遐濵參剛柔而定體兮應中和以屈伸長莖舒而増茂兮密葉布而重隂夾通塗與廣庭兮環清沼而成林于是𤣥雲被岳素景含暉泰液渥流朝露未晞是精靈之所鍾兮蔚鬱鬱以依依居者觀而弭思兮行者樂而忘歸夫其結根建本則固於㤗山兼覆廣施則均於昊天雖尺斷而逾兹兮配生生於自然無邦壤而不植兮象乾道之屢遷紛猗靡以從風兮若將往而復旋若乃豐葩茂樹長枝夭夭婀娜四垂凱風振條同志來逰擕手逍遥成公綏柳賦宅京宇之西偏濵犢鼻之清渠啟横門於大路臨九達之通衢愍行旅之靡休樹䨇柳於道隅彌年載而成隂紛嬋娟而扶疎唐郭炯西掖瑞柳賦乾坤至誠草木無情神靈乗化而致理枯朽効祥而發生當聖澤未沾故兀然枯瘁及天光廻照遂藹爾敷榮因萬物以咸遂與百祥而畢呈故得垂隂瑣闥之中固本鳳池之側始孤標而頴拔乍苒弱而條直長􅂶西掖之佳翫迥奪東門之秀色芬敷自異永垂不朽之名變化無常用表好生之徳懿其荑生漸蔚幹聳惟條拂瑞景而増麗褭祥風而獨揺可以彰聖主之𤣥感可以見昊天之孔昭舒卷以時陋梧桐之半死榮枯順理鄙松栢之後凋且春布發生之慶秋行肅殺之令於天地而不失其常在金木而各得其性衆皆畢出盡達我則向日而衰衆皆黄落萎腓我則感時而盛不然何知至徳之動天運神功而瑞聖者矣翠色牂牂異酒泉嘉奈之祥輕隂澹澹同鄱郡枯梓之感烟銷雨霽霏素雪於宸居日晏春深雜繁花於睿覽青翠葳蕤垂軒拂墀在日月偏臨之處當鴛鴦集苑之時至矣哉天降靈貺聖為明證既得地而不雜衆流常托根而獨標羙稱是知天聼自人而應者也陳詡西掖瑞柳賦柳羙西掖瑞彰聖時感廵逰之未至失榮落於先期雨露所均常比中園之鬱鬱宫闈暫閉若無春日之遲遲所以望車塵之行幸慰都人之怨思物或有憑神固難宰生植不易地而殊榮孤影忽同秋而異色豈上天之降鑒俾下民之是則于以激忠臣之心于以彰大君之徳初斯柳之失常人未知其為祥秦原之烟景明媚漢苑之草樹芬芳獨孤彫而槁瘁似永隔於風光無絮花之似雪意膏露之凝霜及夫天廻舊歩木得其性千官捧日以輸忠萬騎從龍而翊聖彼衆芳之已歇我得秋而始盛豈固異於常材實願貞乎景命偉夫瑞發匪遥成天意之孔昭徳惟可覽結人心之幽感不然柳且無情曷枯而生其枯也當烟塵之晦其生也表氛沴之清與時不偶叶聖斯呈政或可持疾風始知夫草勁節無所立歳寒徒稱乎柏貞宜其俯鳯池而灑潤接雞樹以連榮儒有因物比興屬詞揣稱聞瑞柳於春宫遂揄揚於天應敬括枯楊生稊賦柔得乎剛則變化無方故能令老者以安分使衰者而再芳不然爻之均奚獨殊其棟橈木之衆奚獨舉其枯楊徒觀其枝葉滋潤色帶韶光發枯槁擢豪芒直幹森梢歘浮於青翠髙柯偃蹇漸變於蒼黄豈比夫顛木貴枿瓌材稱良而已哉至如和風稍吹遲日久照淡清烟而羃䍥合晚靄而凝耀茍非懷蠧状雖死而猶生忽應鳴禽類先號而後笑是知心動於内氣變於形以類相感因時則𡨕或叢生落落或孤峙亭亭映平林而迥秀倚長空而半青爰有翰林墨客懿此維新覩物生興與時為春在陽當榮於枯木理代實資於哲人遂稽大道將期小伸相長楊以體物希百中於兹辰五言古詩増梁簡文帝折楊柳楊柳亂成絲攀折上春時葉密鳥飛礙風輕花落遲城髙短簫發林空畫角悲曲中無别意並是為相思和湘東王陽雲樓簷柳曖曖陽雲臺春柳發新梅柳枝無極軟春風隨意來潭沲青帷閉玲瓏朱扇開佳人有所望車聲非是雷詠柳垂隂滿上路結翠早知春花絮時隨鳥風枝屢拂塵欲散依依采時要歌吹人元帝詠陽雲樓簷柳楊柳非花樹依樓自覺春枝邊通粉色隙裏映紅巾帶日交簾影因吹掃窓塵拂簷應有意偏宜桃李人緑柳長條垂拂地輕花上逐風露霑疑染緑葉小未障空沈約翫庭柳輕隂拂建章夾道連未央因風結復觧霑露柔且長楚妃思欲絶班女淚成行遊人未應去為此還故鄉呉均詠柳細柳生堂北長風發雁門秋霜常振葉春露詎濡根朝作離蟬宇暮成宿鳥園不為君所愛摧折當何言陳張正見折汾柳楊柳未垂空裊裊上春中枝疎董澤箭葉翠楚臣弓色映長河水花飛髙樹風莫言限宫掖不閉長楊宫賦得垂柳映斜谿千􅌇清溪險三陽弱柳垂葉細臨湍合根空帶石危風翻夾浦絮雨濯倚流枝不分梅花落還同横笛吹祖孫登詠柳馳道藏烏日鬱鬱正翻風抽翠爭連影飛綿亂上空髙葉臨秦塞長枝拂漢宫欲騐傷攀折三春横笛中王瑳折楊柳塞外無春色上林柳已黄枝影侵雲暗葉彩亂星光陌頭藏戲鳥樓上掩新妝攀折思為贈心期别路長隋杜之松和衛尉于􅀸詠柳漢將本屯營遼河有戍城大夫曽取姓先生曽得名髙枝拂遠雁疎影度遥星不辭攀折苦為入管絃聲唐盧照隣折楊柳倡樓啓曙扉楊柳正依依鶯啼知歳隔條變識春歸露葉凝秋黛風花亂舞衣攀折將安寄軍中音信稀韋承慶折楊柳萬里邊城地三春楊柳節葉似鏡中眉花如關外雪征人遠鄉思娼婦髙樓别不忍擲年華含情寄攀折鄭愔折楊柳青柳映紅顔黄雲蔽紫關忽聞邊使出枝葉為君攀舞腰愁欲斷春心望不還風花滚成雪羅綺亂斑斑李白折楊柳垂楊拂渌水揺艶東風年花明玉關雪葉暖金忩烟羙人結長想對此心悽然攀條折春色遠寄龍庭前金陵白下亭留别驛亭三楊樹正當白下門呉烟􅊕長條漢水齧古根向來送行處廻首阻笑言别後若見之為余一攀翻姚係庭柳裊裊楊柳枝當軒雜佩垂交隂總共密分條各自宜因依似永久􅄃結更傷離愛此陽春色秋風莫遽吹皇甫冉崔十四宅各賦一物得簷柳官渡老風烟潯陽媚雲日漢將營前見胡笳曲中出復在此簷端垂隂仲長室韋應物西澗種柳宰邑􅆾所願僶俛愧昔人聊將休暇日種柳西澗濵置鍤息微倦臨流睇歸雲封壤自人力生條在陽春成隂豈自取為茂屬他辰延詠留佳賞山水變夕曛孟郊揺柳弱弱本易驚看看勢難定因風似醉舞盡日不能正時邀詠花女笑輟春妝鏡宇文秀才齋中海柳詠玉縷青葳蕤結為芳樹姿忽驚明月鈎鈎出珊瑚枝灼灼不死花䝉䝉長生絲飲柏况仙味詠蘭擬古詞霜風清颼颼與君長相思白居易有木詩有木名弱柳結根近清池風烟借顔色雨露助華滋峩峩白雪花嫋嫋青絲枝漸宻隂自庇轉髙梢四垂截枝扶為杖軟弱不自持折條用樊圃柔脆非其宜為樹信可翫論材何所施可惜金隄地栽之徒爾為東溪種柳野性愛栽植植柳水中坻乗春持斧砍裁截而樹之長短既不一髙下隨所宜倚岸埋大幹臨流插小枝松柏不可待楩柟固難移不如種此樹此樹易榮滋無根亦可活成隂况非遲