body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷七十七木譜柳二集藻五言排律増唐張昔小苑春望宫池柳色小苑春初至皇衢日更清遥分萬條柳迥出九重城隱映龍池潤參差鳯闕明影宜宫雪曙色帶禁煙晴深淺殘陽變髙低曉吹輕年光正堪折欲寄一枝榮黎逄小苑春望宫池柳色上宫新柳變小苑暮天晴始見和煙密遥憐拂水輕色乗陽氣重隂助御樓清不厭随風嫋仍宜向月明客中愁羙景池上仰光榮漸到依依處思聞出谷鶯丁位小苑春望宫池柳色小苑宜春望宫池柳色輕低昂含曉景縈轉帶新晴似蓋芳初合如絲䕃漸成依依連水暗嫋嫋出牆明雖以陽和發能令旅思生他時花滿路從此接遷鶯元友直小苑春望宫池柳色柳色新池徧春光御苑晴葉依青閣密條向碧流傾路暗隂初重波揺影轉清風從垂處度煙就望中生斷續遊􅉕聚飄颻戲蝶輕怡然變芳節願及一枝榮楊系小苑春望宫池柳色勝逰從小苑宫柳望春晴拂地青絲嫩縈風緑帶輕光含煙色遠影透水紋清玉笛吟何得金閨畫豈成皇風吹欲斷聖日映逾明願駐髙枝上還同出谷鶯楊凌小苑春望宫池柳色上苑閑遊早東風柳色輕儲胥遥掩映池水隔微明春至條偏弱寒餘葉未成和煙變濃淡轉日異隂晴不獨芳菲好還因雨露榮行人望攀折遠翠暮愁生崔績小苑春望宫池柳色帝京春氣早御柳已先榮嫩葉随風散浮光向日明悠揚生别意斷續引芳聲積翠連馳道飄花出禁城柔條依水弱遠色帶煙輕南望龍池畔斜光照曉晴裴逹小苑春望宫池柳色勝遊經小苑閑望上春城御路韶光發宫池柳色輕乍濃含雨潤微澹帶雲晴羃䍥殘煙歛揺揚落照明幾條垂廣殿數樹影髙旌獨有風塵客思同雨露榮張季略小苑春望宫池柳色韶光歸漢苑柳色發秦城半見離宫出纔分遠水明青蔥當淑景隱映媚新晴積翠煙初合微黄葉未生迎春㸔尚嫩照日見先榮倘得辭幽谷髙枝寄一鳴沈廻小苑春望宫池柳色今來遊上苑春染拂條輕濯濯方含色依依若有情分行臨曲沼先發媚重城拂水枝偏弱揺風絲已生變黄随淑景吐翠逐新晴佇立徒延首徘徊欲寄誠賈稜御溝新柳御苑陽和早章溝柳色新託根偏近日布葉乍迎春秀質方含翠清隂欲庇人輕雲度斜景多露滴行塵裊裊堪離贈依依獨望頻王孫如可賞攀折在芳辰陳羽御溝新柳宛宛如絲柳含黄一望新未成溝上暗且向日邊春嫋娜方遮水低迷欲醉人託空芳鬱鬱逐溜影鱗鱗㺯色滋宵露垂枝染夕塵夾堤連太液還似映天津歐陽詹御溝新柳東風韶景至垂柳御溝新媚作千門秀連為一道春柔荑生女指嫩葉長龍鱗舞絮廻青岸輕煙拂緑蘋王孫初命賞楚客欲傷神芳意堪相贈一枝先遠人馮宿御溝新柳夾道天衢遠垂絲御柳新千條宜向日萬户共迎春輕翠含烟發㣲音逐吹頻靜㸔思渡口廻望憶江濵褭褭分遊騎依依駐旅人陽和如可及攀折在茲辰李觀御溝新柳御溝廻廣陌芳柳對行人翠色枝枝滿年光樹樹新畏逄攀折客愁見别離辰近映章臺騎遥分禁苑春嫩隂初覆水髙影漸離塵莫入邊城笛還令淚濕巾劉遵古御溝新柳韶光先禁柳幾處覆溝新映水疑分翠含煙欲占春悠悠遲日晚裊裊好風頻吐節茸猶嫩通條澤稍均遠和瑶草色暗拂玉樓塵願假騫飛便歸栖及此辰李啇隠垂柳垂柳碧髯茸樓昬雨帶容思量成夜夢未久發春慵梳洗慿張敞乘騎笑稚恭碧虚随轉笠紅燭近髙舂怨目明秋水愁眉淡遠峰小闌花盡蝶靜院醉醒蛩舊作琴臺鳯今為藥店龍寶奩抛擲久一任景陽鐘温庭筠原隰荑緑柳迥野韶光早晴川柳滿堤拂塵生嫩緑披雪見柔荑碧玉牙猶短黄金縷未齊腰支弄寒吹眉意入春閨預恐狂夫折迎牽逸客迷新鶯將出谷應借一枝栖杜荀鶴御溝柳律到御溝春溝邊柳色新細籠穿禁水輕拂入朝人日近韶光早天低聖澤匀谷鶯棲未穏宫女畫難真楚國空揺浪隋堤暗惹塵何如帝城裏先得覆龍津元許有孚柳巷種柳圭塘路行行便向榮雨晴羞眼澀煙暖細眉横色比金猶嫩枝㸔翠易盈林疎無繫馬葉接有啼鶯線亂柔條裊氊鋪落絮平尋詩常獨往送客或同行歸院塵難到還家月每明上通陶令宅下接亞夫營京兆時非昔平康夢自驚陽關休疉曲司馬易傷情但恐春回馭何將酒觧酲托根因勝境由徑得嘉名莫訝公休吏詩成句未精明僧廣潤賦得新月柳初月生明夜嬋娟映柳時幽暉凝露葉淡影㺯風枝寫黛將開鏡停梭未理絲絃調銀指甲珮曵翠腰肢顧兎眠還起驚烏舞乍攲一㾗青眼媚萬縷素心知濯濯俱盈手纎纎互鬬眉攀條悲往事流彩誤佳期偏照深閨夢長牽故國思關山正愁絶莫向笛中吹五言絶句増唐太宗賦得臨池柳岸曲絲隂聚波移帶影疎還將眉裏翠來就鏡中舒原王維輞川柳浪分行接綺樹倒影入清漪不學御溝上春風傷别離裴廸輞川柳浪映池同一色逐吹散如絲結隂既得地何謝陶家時増岑參題平陽郡汾陽橋邊柳樹此地曽居住今來宛似歸可憐汾上柳相見也依依王之渙送别楊柳東風樹青青夾御河近來攀折苦應為别離多皇甫冉問柳接影武昌城分行漢南道何事閒門外空對青山老戴叔倫堤上柳垂柳萬條絲春來識别離行人攀折處閨妾斷腸時司空曙新柳全欺芳蕙晚似妒寒梅疾撩亂發春條春風來幾日韓愈和虢州劉給事使君柳溪柳樹誰人種行行夾岸髙莫將條繫䌫到處有蟬號柳巷柳巷還飛絮春餘幾許時吏人休報事公作送春詩白居易勤政樓老柳半朽臨風樹多情立馬人開元一株樹長慶二年春雨中題衰柳濕屈青條折寒飄黄葉多不知秋雨意更欲遣如何杜牧獨柳含煙一株柳拂地揺風久佳人不忍折悵望廻纎手李啇隠巴江柳巴江可惜柳柳色緑侵江好向金鑾殿移隂入綺窓柳下暗記無奈巴南柳千條傍吹臺更將黄映白擬作杏花媒李中途中柳翠色晴來近長亭路去遥無人折煙縷落日拂溪橋宋晏殊河柳河柳擅佳名青條發紅穗因愁百卉嬌强作芳菲意王安石五柳五柳柴桑宅三楊白下亭往來無一事長得見青青蘇軾和子由岐下柳今年手自栽問我何年去他年我復來揺落傷人思朱子丘子野郊園詠柳欲識淵明家離離疎柳下中有白雲人良非遯世者元楊維楨楊柳詞楊柳董家橋鵞黄萬萬條行人莫到此春色易相撩明袁凱新柳淺色初含雨輕隂未過池黄昬畫樓畔最是斷腸時胡奎江邊柳朝送木蘭船暮迎征馬鞭非關離别苦生長在江邊原孫蕡折柳人言折柳惡儂言折柳好倘向柳邊行識君去時道七言絶句御製苑西新柳二首岸草青回太液池春來又見柳垂絲東風小苑三眠後最愛鵞黄蘸水枝輕煙漠漠柳青青半拂虹橋半水亭嗁鳥數聲春晝永博山香裊隔簾聼新柳畿内柳絲未出黄江南柳色已成行鬱金枝上嗁鶯早積翠河邊待夕陽柳條邊望月雨過髙天霽晚虹關山迢逓月明中春風寂寂吹楊柳揺曵寒光度遠空原唐賀知章詠柳碧玉妝成一樹髙萬條垂下緑絲縧不知細葉誰裁出二月春風似翦刀増張旭柳濯濯煙條拂地垂城邊樓畔結春思請君細㸔風流意未減靈和殿裏時原王昌齡閨怨閨中少婦不知愁春日凝妝上翠樓忽見陌頭楊柳色悔教夫婿覓封侯杜甫漫興隔溪楊柳弱嫋嫋恰似十五女兒腰誰謂朝來不作意狂風挽斷最長條劉方平春怨朝日殘鶯伴妾嗁開簾只見草萋萋庭前時有東風入楊柳千條盡向西増皇甫松楊柳枝詞爛漫春環水國時呉王宫殿柳絲垂緑鶯長叫香閨畔西子無因更得知劉禹錫楊柳枝詞塞北梅花羗笛吹淮南桂樹小山詞請君莫奏前朝曲聼唱新翻楊柳枝南陌東城春早時相逄何處不依依桃紅李白皆誇好湏得垂楊相發揮鳯闕輕遮翡翠闈龍池遥望麴塵絲御溝春水相輝映狂殺長安年少兒金谷園中鶯亂飛銅駝陌上好風吹城中桃李湏臾盡爭似垂楊無限時花蕚樓前初種時羙人樓上鬬腰支如今抛擲長街裏露葉如嗁欲恨誰御陌青門拂地垂千條金縷萬條絲如今綰作同心結將贈行人知不知城外春風吹酒旗行人揮袂日西時長安陌上無窮樹唯有垂楊管别離輕盈嬝娜占年華舞榭妝樓處處遮春盡絮飛留不得随風好去落誰家楊枝詞迎得春光先到來淺黄輕緑映樓臺只縁嬝娜多情思更被東風長挫摧巫峽巫山楊柳多朝雲暮雨遠相和因想陽臺無限事為君回唱竹枝歌原楊巨源和練師素秀才楊柳水邊楊柳麴塵絲立馬煩君折一枝惟有春風最相惜殷勤更向手中吹賦得㶚岸柳留辭鄭員外楊柳含煙㶚岸春年年攀折為行人好風倘借低枝便莫遣青絲掃路塵増李紳楊柳千條楊柳拂金絲日暖牽風葉學眉愁見花狂飛不定還同輕薄五陵兒陶令門前􅇢接䍦亞夫營裏拂朱旗人事推移無舊物年年春至緑垂絲王建華清宫前柳楊柳宫前忽地春在先驚動探春人曉來唯欠驪山雨洗却枝頭緑上塵白居易楊柳枝詞八首六么水調家家唱白雪梅花處處吹古歌舊曲君休聼聼取新翻楊柳枝陶令門前四五樹亞夫營裏百千條何似東都正二月黄金枝映洛陽橋依依嫋嫋復青青勾引春風無限情白雪花繁空撲地絲絲條弱不勝鶯紅板江橋青酒旗館娃宫暖日斜時可憐雨歇東風定萬樹千條各自垂蘇州楊柳任君誇更有錢塘勝館娃若觧多情㝷小小緑楊深處是蘇家蘇家小女舊知名楊柳風前别有情剥條盤作銀環様卷葉吹為玉笛聲葉含濃露如嗁眼枝嫋輕風似舞腰小樹不禁攀折苦乞君留取兩三條人言柳葉似愁眉更有愁腸似柳絲柳絲挽斷腸牽斷彼此應無續得期憶江柳曽栽楊柳江南岸一别江南兩度春遥憶青青江岸上不知攀折是何人青門柳青青一樹傷心色曽入幾人離恨中為近都門多送别長條折盡減春風元稹第三歳日詠春風慿楊員外寄長安柳三日春風已有情拂人頭面稍憐輕殷勤為報長安柳莫惜枝條動輭聲野狐泉柳林去日野狐泉上柳紫芽初綻拂眉低秋來寥落驚風雨葉滿空林蹋作泥姚合楊柳枝詞五首黄金絲挂粉墻頭動似顛狂靜似愁遊客見時心自醉無因得見謝家樓葉葉如眉翠色濃黄鶯偏戀語從容橋邊陌上無人識雨濕煙和思萬重江上東西離别饒舊條折盡折新條亦知春色人將去猶勝狂風取次飄二月楊花觸處飛悠悠漠漠自東西謝家詠雪徒相比吹落庭前便作泥江亭楊柳折還垂月照深黄幾樹絲見説隋堤枯已盡年年行客怪春遲杜牧柳絶句數樹新開翠影齊倚風情態被春迷依依故國樊川恨半掩村橋半掩溪隋堤柳夾岸垂楊三百里祗因圖畫最相宜自嫌流落西歸疾不見東風二月時李啇隱詠柳柳映江潭底有情望中頻遣客心驚巴雷隱隱千山外更作章臺走馬聲曽逐東風拂舞筵樂遊春苑斷腸天如何肯到清秋日已帶斜陽又帶蟬為有橋邊拂面香何曽敢自占年光後庭玉樹承恩澤不信年華有斷腸離亭賦得折楊柳含煙惹霧毎依依萬緒千條拂落暉為報行人休盡折半留相送半迎歸關門柳永定河邊一行柳依依長發故年春東來西去人情薄不為清隂減路塵温庭筠楊柳枝八首宜春苑外最長條閒裊春風伴舞腰正是玉人腸斷處一渠春水赤欄橋南内墻東御路傍預知春色柳絲黄杏花未肯無情思何事行人最斷腸蘇小門前柳萬條毿毿金線拂平橋黄鶯不語東風起深閉朱門伴細腰金縷毿毿碧瓦溝六宫眉黛惹春愁曉來更帶龍池雨半拂䦨干半入樓館娃宫外鄴城西遠映征帆近拂堤繫得王孫歸思切不關春草緑萋萋兩兩黄鸝色似金裊枝啼露動芳音春來幸自長如線可惜牽纒蕩子心御柳如絲映九重鳯凰窓柱繡芙蓉景陽樓畔千條露一面新妝待曉鐘織錦機邊鶯語頻停梭垂淚憶征人塞門三月猶蕭索縱有垂楊未覺春叚成式折楊柳玉樓煙薄不勝芳金屋寒輕翠帶長公子驊騮往何處緑隂堪繫紫遊韁微黄纔綻未成隂繡户朱簾相映深長恨早梅無賴極先將春色出前林陌上河邊千萬枝怕寒愁雨盡低垂黄金穟短人多折已恨東風不展眉趙嘏東亭柳拂水斜煙一萬條幾随春色倚河橋不知别後誰攀折猶自風流勝舞腰韓琮題柳和白樂天詔取永豐柳植上苑折柳歌中得翠條遠移金殿種青霄上陽宫女吞聲送不忍先歸學舞腰楊柳枝詞枝鬬纎腰葉鬭眉春來無處不如絲㶚陵橋上多離别少有長條拂地垂汪遵楊柳亞夫營畔柳濛濛隋主堤邊四路通攀折贈君還有意翠眉輕嫩怕春風李山甫柳十首㶚岸江頭臘雪消東風偷輭入纎條春來不忍登樓望萬架金絲著地嬌受盡風霜得到春一條條是逐年新尋常送别無餘事爭忍攀將過與人長恨陽和也世情把香和艶與紅英家家只是栽桃李獨自無根到處生只為遮樓又拂橋被人摧折好枝條假饒張緒如今在湏把風流暗裏銷弱帶低垂可自由傍他門户倚他樓金風不觧相擡舉露壓煙欺直到秋終日堂前學畫眉幾人曽道勝花枝試㸔三月春殘後門外清隂是阿誰也曽飛絮謝家庭從此風流别有名不是向人無用處一枝愁殺别離情從來只是愛花人楊柳何曽占得春多向客亭門外立與他迎送往來塵强扶柔態酒難醒漠漠春風别有情公子王孫且相伴與君俱得幾時榮無賴秋風斗覺寒萬條煙􅇁一時乾遊人若要春消息直向江頭臘後㸔薛能折楊柳八首華清髙樹出離宫南陌柔條帶暖風誰見輕隂是良夜瀑泉聲畔月明中洛橋晴影覆江船羗笛秋聲濕塞煙閒想習池公宴罷水蒲風絮夕陽天嫩緑輕懸似綴旒路人遥見隔宫樓誰能更近丹墀種觧播皇風入九州暖風晴日斷浮埃廢路新條發釣臺處處輕隂可惆悵後人攀處古人栽潭上江邊嫋嫋垂日髙風静絮相随青樓一樹無人見正是女郎眠覺時窓外齊垂旭日初樓邊輕裊暖風徐遊人莫道栽無益桃李清隂却不如衆木猶寒獨早青御溝橋畔曲江亭陶家舊日應如此一院春條緑遶㕔帳偃纓垂細復繁令人心想石家園風條月影皆堪重何事侯門愛樹萱柳枝二首縣依陶令想嫌迂營伴將軍即大麤此日與君除萬恨數篇風調更應無狂似纎腰嫩勝綿自多情態竟誰憐遊人不折還堪恨抛向橋邊與路邊楊柳詞四首朝陽晴照緑楊煙一别通波十七年應有舊枝無處覓萬株風裏卓旌旃晴垂芳態吐芽新雨擺輕條濕面春别有出墻髙數尺不知揺動是何人暖梳簮朶事登樓因挂垂楊立地愁牽斷緑絲攀不及半空懸著玉搔頭西園髙樹後庭根處處尋芳有折㾗終憶我遊桃葉舎一株斜映竹籬門顧雲枯柳閑花野草總爭新眉皺絲乾獨不匀乞與東風殘氣力莫教虚度一年春陸龜䝉冬柳柳汀斜對野人窓零落衰條傍曉江正是霜風飄斷處寒鷗驚起一䨇䨇司空圖楊柳枝夀杯詞十首撼晚梳空不自持與君同折上樓時春風還有常情處繫得人心免别離偶然樓上捲珠簾往往長條拂枕函恰值小娥初學舞擬偷金縷押春衫客淚休沾漢水濵舞腰羞殺漢宫人狂風更與回煙箒掃盡繁花獨占春遊人莫嘆易凋衰長樂榮枯自有期㸔取明年春意動更於何處最先知絮惹輕枝雪未飄小溪煙束帶危橋鄰家女伴頻攀折不覺回身􅇢翠翹處處縈空百萬枝一枝枝好更題詩隔城遠岫招行客便與朱樓當酒旗錦城分得映金溝兩岸年年引勝遊若似松篁湏帶雪人間何處認風流日暖津頭絮已飛㸔㸔還是送春歸莫言萬緒牽愁思緝取長繩繫落暉大堤時節近清明霞襯煙籠遶郡城好是棃花相映處更勝松雪日初晴聖主千年樂未央御溝金翠滿垂楊年年織作昇平字髙映南山獻夀觴楊柳枝數枝珍重蘸滄浪無限塵心暫免忙煩暑若和煙露裛便同佛手灑清凉柳二首誰家按舞傍池塘已見繁枝嫩眼黄漫説早梅先得意不知春力暗分張似擬凌寒妒早梅無端㺯色傍髙臺折來未有新枝長莫遣佳人更折來韓偓詠柳褭雨拖風不自持全身無力向人垂玉纎折得遥相贈便似觀音手裏時一籠金線拂彎橋幾被兒童損細腰無奈靈和標格在春來依舊褭長條唐彥謙詠柳絆惹春風别有情世間誰敢鬬輕盈楚王江畔無端種餓損宫腰學不成裴説柳髙拂危樓低拂塵㶚橋攀折一何頻思量却是無情樹不觧迎人只送人孫魴楊柳枝詞四首靈和風暖太昌春舞線揺絲向昔人何似曉來江雨後一行如畫隔遥津彭澤初栽五樹時只應閑著一枝垂不知天意風流處要與佳人學畫眉暖傍離亭静拂橋入流穿檻緑隂揺不知落日誰相送魂斷千條與萬條春來緑樹徧天涯未見垂楊未可誇晴日萬株煙一陣閑坊兼是莫愁家成彦雄柳枝詞九首輕籠小徑近誰家玉馬追風翠影斜愛把長條惱公子惹他頭上海棠花鵞黄翦出小花鈿綴上芳枝色轉鮮飲散無人收拾得月明堦下伴鞦韆東君愛惜與先春草澤無人處也新委囑露華並細雨莫教遲日惹風塵勾踐初迎西子年琉璃為帚掃溪煙至今不改當時色留與王孫繫酒船緑楊移傍小亭栽便擁濃煙潑不開誰把金刀為刪掠放教明月入窓來遠接關河髙接雲雨餘西出半天津牡丹不用相輕薄自有清隂覆得人掩映鶯花媚有餘風流才調比應無朝朝奉御臨池上不羡青松拜大夫王孫宴罷曲江池折取春光伴醉歸怪得羙人爭鬬乞要他穠翠染羅衣殘照林梢裊數枝能招醉客上金堤馬驕如練纓如火瑟瑟隂中歩歩嘶李中柳春來無樹不青青似共東風别有情閒憶舊居湓水畔數枝煙雨屬啼鶯最愛青青水國中莫愁門外間花紅纎纎無力勝春色撼起啼鶯恨晚風牛嶠楊柳枝五首觧凍風來末上青觧垂羅袖拜􅀸􅀸無端褭娜臨官路舞送行人過一生呉王宫裏色偏深一簇纎條萬縷金不憤錢塘蘇小小引郎松下結同心橋北橋南千萬條恨伊張緒不相饒金羈白馬臨風望認得羊家静婉腰狂雪随風撲馬飛惹煙無力被春欺莫教移入靈和殿宫女三千又妒伊褭翠籠煙拂暖波舞裙新染麴塵羅章華臺畔隋堤上傍得春風爾許多歐陽炯楊柳輭碧揺煙似送人映花時把翠眉顰青青自是風流主慢颯金絲待洛神羅隠柳一簇青煙鎖玉樓半垂欄畔半垂溝明年更有新條在繞亂春風卒未休㶚岸晴來送别頻相偎相倚不勝春自家飛絮猶無定爭觧垂絲絆路人孫光憲楊柳枝詞三首閶門風暖落花乾飛徧江城雪不寒獨有晚來臨水驛閑人多凭赤䦨干有池有榭即濛濛浸潤翻成長養功恰似有人長㸃檢著行排立向春風根柢雖然傍濁河無妨終日近笙歌毿毿金帶誰堪比還共黄鶯不較多崔道融楊柳枝詞霧撚煙搓一索春年年長似染來新應湏喚作風流線繫得東西南北人宋徐鉉柳枝詞應制金馬詞臣賦小詩棃園子弟唱新詞君恩還似東風意先入靈和蜀柳枝百草千花共待春緑楊顔色最驚人天邊雨露朝朝在上苑芳華歳歳新長愛龍池二月時毿毿金線㺯春姿假饒葉落枝空後更有棃園笛裏吹緑水成紋柳帶揺春風初到不鳴條龍舟欲過偏留戀萬縷輕絲拂御橋百尺長條涴麯塵詩題不盡畫難真慿君折向人間種還似君恩處處春風暖雲開晚照明翠條深映鳯凰城人間欲識靈和態聼取新詩玉管聲醉折垂楊唱柳枝金城三月走金羇年年為愛新條好不學蒼華也似絲新春花柳競芳姿偏愛垂楊拂地枝天子徧教詞客賦宫中要唱洞簫詞凝碧池頭蘸翠漣鳯凰樓畔簇晴煙新詩欲詠知難詠説與䨇成入管絃侍從甘泉與未央移舟偏要近垂楊櫻桃未綻梅花老折得柔條百尺長柳枝詞九首把酒慿君唱柳枝也從絲管遽相随逄春只合朝朝醉記取秋風葉落時夾岸朱顔柳映樓緑波平漫帶花流歌聲不出長條密忽地風回見綵舟老大逄春總恨春緑楊隂裏最愁人舊遊一别無消息嫩葉如眉處處新濛濛堤岸柳含煙疑是陽和二月天醉裏不知時節改漫随兒女打鞦韆水閣春來乍減寒曉妝初罷倚䦨干長條亂拂春波動不許佳人照影㸔柳岸煙昬醉裏歸不知深處有芳菲重來已見花飄盡惟有黄鶯囀樹飛此去仙源不是遥垂楊深處有朱橋共君同過朱橋去密映垂楊聼洞簫仙樂春來按舞腰清聲偏似傍嬌嬈應縁鸎舌多無賴長向䨇成説翠條鳯笙臨檻不能吹舞袖當筵亦自疑唯有羙人多意緒觧衣芳態畫䨇眉宼凖柳曉帶輕煙間杏花晚凝深翠拂平沙長條别有風流處密映錢塘蘇小家种放柳白雲溪畔種還生風擺長條拂水輕應為繁華壓金谷依依終日是無情韓琦新柳二闋弄黄含緑葉開眉最有春來次第知生計任随栽者意却嗤松柏不禁移驛路行人東復西等閑攀折損芳枝有生自是無根物恐向東風贈别離再賦柳枝詞二闋曲江風暖曉隂斜翠色相宜拂鈿車自是春眠慵未起日髙人困又飛花葉葉新長約黛蛾絲絲輕輭任風梭啼鶯便學歌喉囀知是春來舞意多垂柳東君於此最多情先與黄金撚畫成何似亞夫堅壁地因人千古得嘉名和春􅀸學士柳枝詞四闋樓前輕雪未全銷偷得春光入嫩條似向東風猶旅拒可能渾忘舞時腰陌閑宫古緑煙迷惹盡春愁困拂堤却為多情足離恨故教溝水亦東西章街風曉起新眠寒食輕隂未雨天無限青絲拂遊騎一生芳意負金鞭淡煙輕日簇誰家微出青旗一帶斜對景似嫌春意老更揺疎影掃殘花趙抃柳軒動入和風靜惹煙翠條疎處露池蓮林中盡是能吟物春有黄鸝夏有蟬原曽鞏詠柳亂條猶未變初黄倚得東風勢更狂觧把飛花䝉日月不知天地有清霜増司馬光垂柳天意清和二月初春風不動整如梳陶潜宅外如無此想更蕭條不易居二月六日初見待漏房前柳色微緑欣然成詠宫城映出絲絲緑頓覺皇州春意回從此不辭驅痩馬六街終日蹋塵埃王安石御柳御柳新黄已迸條宫溝薄凍未全銷人間今日春多少祗㸔東風北斗杓移柳移柳當門何啻五穿松作徑適成三臨流遇興還能賦自比淵明或未慙原張耒柳永豐坊裏舊腰支曽見青青初種時看盡道邊離别恨爭教風絮不狂飛謝逸門前柳門前楊柳暗沙汀雨濕東風未放晴㸃㸃落花春事晚青青芳草暮愁生吕本中柳含煙帶雨過平橋嫋嫋千絲復萬條張令當年成底事風流纔似女兒腰増陸游柳橋村路初晴雪作泥經旬不到小橋西出來頻覺春來早柳染輕黄已蘸溪柳楊柳春風緑萬條慿鞍一望已魂銷當年鳯集城邊路曽愛纎纎拂畫橋西園雨打杏花稀便面章臺事已非只恐無情堤上柳又將風絮送春歸春來無處不春風偏在湖橋柳色中㸔得淺黄成嫩緑始知造物有全功徐照柳葉詞嫩葉吹風不自持淺黄㣲緑映清池玉人未識分離恨折向堂前學畫眉宋正父詠柳絲絲煙雨㺯輕柔偏稱黄鸝與白鷗纔著一蟬嘶晚日西風容易便成秋顔頤仲詠柳柳漸成隂萬縷斜舞腰柔弱㺯韶華一庭春色無人管簷雨聲中飛盡花陳北山臘雪逄春次第消等閑著脚上溪橋柳條畢竟帶兒女一夜東風眼便嬌任斯菴嫋嫋呉興柳滿城春光濃處白蘋亭來時金縷黄猶淺㸔得枝枝葉葉青王漫翁春到枝枝是緑絲秋來葉葉似愁眉㶚橋何限經行者不記㝷花繫馬時薛獨菴一撮嬌黄染不成藏鴉未穏早藏鶯行人自謂傷離别枉折無情贈有情朱淑真詠柳萬縷千絲織暖風絆煙留露市橋東砌成幽恨斜陽裏供斷閒愁細雨中金施宜生柳魏王堤暗雨垂垂還似春殘欲别時傳語西風且停待黛殘黄淺不禁吹劉昂客亭折盡官橋楊柳枝春風依舊緑絲絲啼鶯為向行人道離别何時是盡時吕中孚柳風外絲絲裊緑煙輕花初破不成緜却嫌官路逄寒食惱亂離愁似去年趙逹夫柳楊柳攙春不耐秋十分憔悴儘風流水邊沙際風煙冷收拾殘陽合暮愁元元淮南園新柳萬縷依依帶嫩黄斜穿紅杏㺯疎狂晝長舞得東風困半倚鞦韆半拂墻許有壬都門柳都門四十里青青幾度迎人幾送行老子有言來致柳只煩相送莫相迎蒲道源賦柳枯樹生荑色已嬌低垂江岸映溪橋東君不惜黄金縷散作春風十萬條張伯淳楊柳村千絲萬縷拂章臺陌上行人幾去來何事結根荒寂處東風青眼為誰開王士熙上都柳枝詞曽見上都楊柳枝龍江女兒好腰肢西錦纒頭急催酒舞到秋來人去時惹雪和煙復帶霜小東門外萬條長君王夜過五花殿曽與龍駒繫紫韁來時垂葉嫩青青歸去西風又飄零願得儂身長似柳年年天上作飛星儂在南都見柳花花紅柳緑有人家如今四月猶飛絮沙磧蕭蕭映草芽雪色驊騮窈窕騎宫羅窄袖袂能垂駐向山前折楊柳戲撚柔條作笛吹偏嶺前頭樹樹逄輕於蒼檜短於松急風卷絮悲游子永日留隂送去儂合門嶺上雪淒淒小樹雲深望欲迷何日汶陽尋故里緑隂隂裏聼鶯啼郭翼柳塘春隂隂覆地十餘畆嫋嫋廻塘二月風雨過鷗眠沙色裏花飛鶯亂水聲中貢性之湧金門見柳湧金門外柳垂金三日不來成緑隂折取一枝入城去使人知道已春深張昱柳枝詞尊前不棄小腰身爭欲攙先上舞茵多謝東風好擡舉盡情分付畫眉人春光領略不勝嬌揺蕩東風千萬條悔盡江州白司馬一生空詠小蠻腰明髙啓秋柳欲挽長條已不堪都門無復舊毿毿此時愁殺桓司馬暮雨秋風滿漢南李楨楊柳枝參差幾樹瞰長河樹樹垂金拂緑波不是秋來易零落自縁人世别離多細葉如眉緑未匀修眉渾似帶愁顰輸他桃杏東風裏不管南遊北去人陳憲章河橋柳色廬阜清風長官宅渭城朝雨王維詩東西緑徧河橋路長與離人照酒巵看柳淺塘低竹小坭村黄土墻扄白板門望見西頭楊柳樹行人都訝是桃源原薛蕙詠柳閑倚䦨干看柳條可憐渾似董嬌嬈東風何處吹桃李空費心情學舞腰曹大章柳立盡東風草色青鵑啼日落暮愁生江流不斷春雲合一樹垂楊萬里情于若瀛詠柳秦淮柳色弱於絲十里煙花澹蕩時明月一灣開水閣何人吹徹玉參差増董其昌題畫柳摸索芳菲度畫檐煙絲嬝嬝雨毿毿幽人無復靈和夢太守風流自漢南原晏鐸詠柳河橋楊柳半無枝多為行人贈别離羗客不知蕭索盡月明猶向笛中吹陳饒詠柳春歸禁柳緑參差葉葉含煙樹樹垂怕有長條迷鳯輦臨風折盡向南枝増僧木公恕自種柳䨇楊初種幾經春始見長條已拂塵萬里緑隂堪作帳一枝不許贈行人僧永瑛柳塘千樹垂絲兩岸煙緑波春雨白鷗天江鄉不近章臺路留得長條繫釣船僧徳祥柳詞莫折東風楊柳枝枝間葉葉是愁眉游人不省愁何事曽向東風笛裏吹詩散句増唐戎昱江柳斷腸色黄絲垂未齊人看幾重恨鳥入一枝低孟郊楊柳多短枝短枝多别離贈遠屢攀折柔條安得垂枝疎縁别苦曲怨為年多花驚燕地雪葉映楚池波李商隠娉婷小苑中婀娜曲池東朝佩皆垂地仙衣盡帶風韓溉雪盡青門㺯影微暖風遲日早鶯啼如慿細葉留春色湏把長條繫落暉太宗還將眉裏翠來就鏡中舒陳叔逹水岸銜堦轉風條出柳斜喬侃登髙一遊目始覺柳條新原韋承慶花裀低擁砌柳幔近當樓増宋璟園亭若有送楊柳最依依崔顥柳垂金屋暖花發玉樓春王維深巷斜暉盡閑門髙柳疎孟浩然垂柳金堤合平沙翠幕連岑參官柳葉尚小長安春未濃原李白暫出東門前楊柳可藏鴉咸陽二三月宫柳黄金枝緑楊已可折攀取最長枝杜甫野花随處發官柳著行新退朝花底散歸院柳邊迷冉冉柳枝碧娟娟花蘂紅白花簷外朶青柳檻前梢増韓愈溝聲通苑急柳色壓城匀柳枝弱而細懸樹垂百尺張籍客亭門外柳折盡向南枝白居易柳色早黄淺水紋新緑㣲柳眼黄絲纈花房絳蠟珠杜牧無端千樹柳更拂一條溪許渾溪亭四面山横柳半溪灣李頻年年送别處楊柳少垂條宋宋祁濯濯索春晚依依帶暝饒細栽煙外葉繁並暖前枝梅堯臣柳重宫腰弱花肥粉頰豐折取東橋柳青青向故人王安石稍見青青色還從柳上歸岸迥重重柳川低渺渺河蘇轍如羙婦正立櫛髮長在地孫覿紅輕花似肉緑細柳如繰陸游柳弱風驚絮花殘雨漬香金劉鐸煙柳千家曉風花百里春秦略淺情墻外柳新緑已依依元朱徳潤柳絲繰十丈蘸水緑條鮮明髙啓池柳疎含吹江雲薄䕶霜何景明花飛御溝水葉傍漢宫煙秋風來上苑楊柳落金溝徐禎卿春風三月柳吹暗大同城原王世貞柳條恒撲岸花氣欲薫舟馮琦芳草連山碧垂楊近水多増唐崔液江南日暖鴻始來柳條初碧葉半開許景先春樓初日照南隅柔條垂緑掃金鋪原王維渭城朝雨裛輕塵客舎青青柳色新李白長安白日照春空緑楊結煙垂裊風増韓愈慿君先到江頭㸔柳色如今深未深洛陽東風幾時來川波岸柳春全廻白居易何處未春先有思柳條無力魏王堤鴛鴦蕩漾䨇䨇翅楊柳交枝萬萬條葉含濃露如啼眼枝嫋輕風似舞腰李山甫多謝㶚陵堤上柳與人頭上拂塵埃韓溉如慿細葉留春色湏把長條繫落暉無名氏一把柳絲收不住和風搭在玉䦨干原宋錢惟演章臺街裏翻輕吹㶚水橋邊送落暉増張詠但見低垂長衛足更無疎聳直參天夏竦燈背翠簾人欲别月斜煙柳馬頻嘶原宋祁回雪有風嘗借舞落梅無笛可供愁不知張緒當年少得似長條濯濯時増劉敞不識日髙眠起處何如風定舞餘時王安石水底舊波吹嵗換柳梢新葉卷春回斜倚水開花有思暖随風轉柳如癡陳師道白下官楊小㺯黄騎臺南路緑無央陸游湖光漲緑分煙浦柳色揺金映市樓㶚橋煙柳知何限誰念行人寄一枝方岳粥香餳白清明近鬬挽柔條插畫簷陳卓山門外莫栽楊柳樹得春多處恨春多僧北澗初無惱亂春風意却是春風惱亂他金呉激遥憶東郊亭畔柳歸時相見亦依依劉昂折盡官橋楊柳枝春風依舊緑絲絲劉中柳含煙翠絲千尺水寫天容玉一尋元好問垂楊也被多情惱痩損春風十萬條元趙雍閑倚䦨干㸔新柳不知誰為染鵞黄原晉潘岳弱柳䕃修衢増宋謝脁垂楊䕃御溝梁簡文帝岸柳垂長葉柳枝無極輭沈約楊柳亂如絲髙楊拂地垂庾肩吾春塘細柳懸徐陵緑柳三春暗周庾信官渡柳應春岸柳被青絲王褒垂楊夾浦絲隋薛道衡簷隂翻細柳唐太宗殘柳散雕櫳拂浪堤垂柳初風飄帶柳蘇頲仙仗柳交枝趙冬曦柳翠垂堪結李嶠細柳龍鱗映韓仲宣柳處雲疑葉崔知賢柳揺風處色武三思柳發龍鱗出儲光羲清川楊柳垂疎柳映新塘王維林薄媚新柳柳色春山映孟浩然㸔柳訝春遲柳色半春天岑參江暖柳條黄原李白柳色黄金嫩増李白春思結垂楊疎楊挂緑絲原杜甫市橋官柳細清秋凋碧柳増杜甫髙柳半天青塞柳半疎翠柳影含雲幕張謂柳枝經雨重張均垂柳拂煙波章應物柳意不勝春司空曙柳絲遮緑浪風柳入江樓李嘉祐柳暗白田春孟郊緑煙柳際垂楊凝水添楊柳色白居易院柳煙婀娜金絲刷柳條春染柳梢黄杜牧楚岸柳何窮李啇隠煙輕惟潤柳柳暗將翻巷温庭筠堤柳雨中春柳占三春色公乘億緑揺宫柳散崔塗緑楊無舊隂韓偓柳密藏煙易溪長柳似帷鄭谷翠低孤嶼柳韋荘緑擺楊枝嫩宋司馬光柳隂濃不斷弱柳周遭合邵雍微風挼楊柳風柳散如梳蘇軾柳老半書蟲陳師道緑暗連村柳陸游柳色新如染元黄庚絲柳緑繰煙趙孟頫楊柳半溪隂唐崔日用淑氣依遲柳色青蘇頲楊柳青青宛地垂千株御柳拂煙開沈佺期天津御柳碧遥遥王維柳條拂地不湏折楊柳青青渡水人孟浩然緑岸毿毿楊柳垂岑參千門柳色連青瑣賈至日長風暖柳青青李白陌頭楊柳黄金色河堤弱柳鬱金枝原杜甫曉鶯啼斷緑楊枝天晴宫柳暗長春増杜甫漏洩春光有柳條歐陽詹新柳揺門青翡翠孟郊萬里春風動江柳張籍閶門柳色煙中遠白居易柳絲嫋嫋風繰出色濃柳最占春多李啇隠風柳誇腰住水村温庭筠絲飄弱柳平橋晚雍陶煙柳風絲拂岸斜方干楊柳斜牽一岸風薛逄楊柳初迷渡口煙薛能朝陽晴照緑楊煙章碣暖著柳絲金蘂重韓偓緑搓楊柳綿初輭柳帶似眉全展緑李咸用絲垂楊柳當風輭杜荀鶴絶岸柳絲懸細雨韋荘嫩緑誰家柳眼開嫩煙輕染柳絲黄羅隠髙柳偷風已㺯條宋劉筠客館春輕柳未眠拂波宫柳漫垂隂林逋春色半歸湖岸柳歐陽修晴明風日家家柳邵雍煙柳嫩垂低更緑司馬光長春宫柳遠扶疎曲堤風暖柳絲長王安石雨壓春風暗柳條禁柳萬條金細撚蘇軾東風弱柳萬絲垂溪柳自揺沙水清范成大亂蟬髙柳滿斜陽陸游墻頭楊柳知秋早金趙渢楊柳似將煙染成任詢風裏垂楊學舞腰叚成已青絲歩障柳千樹元好問楊柳無風緑綫齊元黄庚細柳雨中垂緑重袁桷門當楊柳灣灣碧馬祖常官橋無柳不拖金貢奎玉禁春深柳染衣許有孚風吹楊柳回鸞舞周權緑染春風柳拂煙郭鈺清明煙散柳枝斜華幼武城頭楊柳緑如雲顧瑛楊柳葉落帶煙青御定佩文齋廣羣芳譜卷七十七
