body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十木譜檀香原檀香一名旃檀一名直檀出廣州雲南及占城真臘諸國今嶺南諸地亦皆有之樹葉皆似荔枝皮青色而滑澤有三種黄檀皮實色黄白檀皮潔色白紫檀皮腐色紫其木並堅重清香而白檀黄檀尤盛宜以紙封固則不洩氣紫檀新者色紅舊者色紫有􅈉爪文白檀辛温氣分之藥故能理胃氣調脾肺利胸膈紫檀鹹寒血分之藥故能和營氣消腫毒治金瘡中土所産之檀亦檀香之類但不香則地氣使然也彚考増清異録同光中有舶上檀香色正白號雪檀長六尺人買為僧坊刹竿僧繼顒住五臺山手執香如意紫檀鏤成芬馨滿室繼元時在潜邸以金易致毎接僧則項㡌具三衣假比丘秉此揮談名為握君别録原種植臘月分木傍小珠種之降真香原䧏真香一名紫藤香一名鷄骨香生南海及大秦國今兩廣雲南皆有不甚佳舶上來名番䧏紫而潤者良焚之氣勁而遠可以䧏神故名䧏真増南方草木狀紫藤葉細長莖如竹根堅實重重有皮花白子黒置酒中歴二三十年亦不腐敗其莖截置􅃄炱中經時成紫香可以降神彚考増輟耕錄道家者流為人典行醮事曰髙功其有行業精白者則必移檄南岳魏夫人請借仙鶴或二隻或四隻青鸞導衛翔騖澄空昭揚道妙往往親見之偶讀本草有云䧏真香出黔南伴和諸雜香燒煙直上天召鶴得盤旋于上注按仙傳云燒之或引鶴䧏醮星辰燒之甚為第一度籙燒之功力極騐若然則鶴之來香所致也非歟蜜香樹増南方草木狀交趾有蜜香樹榦似柜桞其花白而繁其葉如橘欲取香伐之經年其根榦枝節各有别色也木心與節堅黒沉水者為沉香與水面平者為鷄骨香其根為黄熟香其榦為􅑘香細枝緊實未爛者為青桂香其根節輕而大者為馬蹄香其花不香成實乃香為雞舌香珍異之木也香譜唐本草注云沉香出天竺單于二國與青桂雞骨馢香同是一樹葉似橘經冬不凋夏生花白而圓細秋結實如檳榔色紫似葚而味辛療風水毒腫去惡氣樹皮青色木似櫸桞重實黒色沉水者是今復有生黄而沉水者謂之蠟沉又不沉者謂之生結倦遊雜録沉香木嶺南諸郡悉有之瀕海諸州尤多交榦連枝岡嶺相接數千里不絶葉如冬青大者合數人抱木性虛韌山民或以搆茅廬或以為橋梁為飯甑尤善有香者百無一二葢木得水方結香多在折枝枯榦中或為沉或為煎或為黄熟自枯者謂之木盤香今南恩髙竇等州惟産生結香蓋山民入山見香木之曲榦邪枝必以刀斫之成坎經年見雨水所漬結香復以鋸取之刮去白木其香結為斑㸃亦名鷓鴣斑燔之甚佳沉之良者惟在瓊崖等州俗謂角沉乃生水中取者宜用薫㐮黄沉乃枯木中得之宜入藥用依木皮而結者謂之青桂氣尤清在土中嵗乆不待刓剔而精者謂之龍鱗亦有削之自卷咀之柔韌者謂之黄臘沉尤難得彚考增梁書林邑傳林邑國出沉木香土人斫斷之積以嵗年朽爛而心節獨在置水中則沉故名沉香次不沉不浮者曰􅑘香也唐書宗室傳敬宗侈宫室舶賈獻沉香亭材帝受之漢諫曰以沉香為亭何異瑶臺瓊室乎三輔黄圖漢武帝元鼎六年破南越起扶荔宫以植所得竒草異木有蜜香百本清異錄海舶來有一沉香翁剜鏤若鬼工髙尺餘以上吳越王王目為清門處士發源於心清聞妙香也髙麗舶主王大世選沉水近千斤疊為旖旎山象衡岳七十二峯錢俶許黄金五百兩竟不售沉水帶斑㸃者名鷓鴣沉華山道士蘇志恬偶獲尺許修為界尺寓簡草木之最香者如沉水旃檀龍腦蘇合薫陸鬱金薝蔔薔薇素馨末利雞舌之屬皆産于嶺表海南南遷集云雷化已南山多苓苓藿香芬芳襲人動或數里予嘗推其理火盛於南方實能生土土味性甘而臭香其在南方乘火之王得其所養英華發外是以草木皆香此實理性之自然者而前此説香自范蔚宗以下未嘗有及此也黄帝書言五􅂔香􅂔凑脾古人固知之矣楞嚴云純燒沉水無令見火此自佛以來燒香妙方也南海古蹟記晉吳隐之北歸家人􅂝沉香一斤覺投香江中越中雜記青口兩山夾天如綫山石峭削一壁上有古木一株土人云是沉香樹一年一花集藻賦増宋蘇軾沉香山子賦古者以芸為香以蘭為芬以鬱鬯為祼以脂蕭為焚以椒為塗以蕙為薫杜蘅帶屈葛蒲薦文麝多忌而本羶蘇合若薌而實葷嗟吾知之㡬何為方入之所分方根塵之起滅常顛倒其天君每求似于髣髴或鼻勞而妄聞獨沉水為近正可以配薝蔔而並云矧儋崖之異産實超然而不羣既金堅而玉潤亦鶴骨而龍筋惟膏液之内足故把握而兼斤顧占城之枯朽宜㸑釡而燎蚊宛彼小山巉然可欣如太華之倚天象小孤之插雲往夀子之生朝以寫我之老懃子方面壁以終日豈亦歸田而自耘幸置此于几席養幽芳于帨帉無一往之發烈有無窮之氤氲蓋非獨以飲東坡之夀亦取以食􅀺人之芹也别録増南方草木狀蜜香帋以蜜香樹皮葉作之微褐色有紋如魚子極香而堅韌水漬之不潰爛㤗康五年大秦獻三萬幅常以萬幅賜當陽侯杜預令寫所撰春秋釋例及經傳集觧清異錄有賈至林邑舎一翁姥家日食其飯濃香滿室賈亦不喻偶見甑則沉香所剜也龍腦香増酉陽雜俎龍腦香樹出婆利國婆利呼為固不婆律亦出波斯國樹髙八九丈大可六七圍葉圓而背白無花實其樹有肥有瘦痩者有婆律膏香一曰痩者出龍腦香肥者出婆律膏也在木心中斷其樹劈取之膏于樹端流出斫樹作坎而承之入藥用别有法香譜形似松脂作杉木氣乾脂謂之龍腦香清脂謂之波律膏子似豆䓻皮有甲錯海藥本草云味苦辛微温無毒主内外障眼去三蟲療五痔明目鎮心祕精安息香樹増酉陽襍爼安息香樹出波斯國波斯呼為辟邪樹髙三丈皮色黄黒葉有四角經冬不凋二月開花黄色花心微碧不結實刻其樹皮其膠如飴名安息香六七月堅凝乃取之燒通神明辟衆惡麝香木増清異録江南山谷間有一種竒木曰麝香樹其老根焚之亦清烈號䬣􅨋香􆆝布羅香増西域記其樹松身異葉花果亦别初採既濕尚未有香木乾之後循理而折之其中有香木乾之後色如氷雪亦龍腦香櫰香増本草櫰香一名兜婁婆香江淮湖嶺山中有之木大者近丈許小者多被樵采葉青而長有鉅齒狀如小薊葉而香對節生其根狀如枸杞根而大煨之甚香必栗香増本草必栗香一名花木香一名詹香生髙山中葉如老椿擣置上流魚悉暴腮而死木為書軸白魚不損書靈夀木増爾雅椐樻注腫節可以為杖鄭注此木似藤節目相對陸璣詩疏木節中腫似扶老今人以為馬鞭及杖𢎞農郡北山有之漢書注木似竹有枝節長不過八九尺圍三四寸自然有合杖制不湏削治也本草一名扶老杖陳藏噐曰生劍南山谷圓長皮紫作杖令人延年益夀彚考増漢書孔光傳光稱疾辭位太后詔賜靈夀杖山海經廣都之野靈夀實華水經注巴鄉村側有谿谿中多靈夀木集藻銘増漢李尤靈夀杖銘亭亭竒榦實曰靈夀甘泉潤根清露流莖乃制為杖扶危定傾既憑其實亦貴其名五言古詩増唐桞宗元植靈夀木白華鑒寒水怡我適野情前趨問長老重復欣嘉名蹇連易衰朽方剛謝經營敢期齒杖賜聊且移孤莖叢萼中競秀分房外舒英柔條乍反植勁節常對生循玩足忘疲稍覺歩武輕安能事翦伐持用資徒行五言律詩増宋張浮休曲木天然性叨名席上珍節髙工碍手倚壁快扶人莫問西來意終為竈下薪他時俘頡利拜賜敢忘身詩散句増宋曽肇林下搘來供燕息省中攜去寵師儒蘓軾靈夀扶來似孔光娑羅木増通雅娑羅外國之交譲木也葉似柟皮如玉蘭色葱白最潔鳥不棲蟲不生子能下氣益部方物畧記生峨睂山中類枇杷數葩合房春開葉在表花在中或言根不可徙吳舩錄木葉如海桐又似楊梅花紅白色春夏間開茅亭客話花苞大如拳葉凡二十餘葉相沓捧苞類桐花一簇三十餘朶經月方謝彚考増南史扶南國傳梁天監十八年遣使送天竺旃檀瑞像娑羅樹葉荆南記晉永康元年巴陵顯安寺僧房床下忽生一樹随伐隨生如是非一樹生愈疾衆共異之置而不翦旬日之間枝柯極棟遂移房避之自爾已後樹長漸遲但極晩秀夏中方有花葉枝莖與衆木不殊多歴年稔人莫識也後外國僧見之攀而流涕曰此娑羅樹也佛處其下湼槃吾思本事所以泣耳而花開細白不足觀採元嘉十一年忽生一花形色如芙蓉樹今見在此亦一方之竒蹟也翻譯南印建那補羅國北不遠有多羅樹林三十餘里其葉長廣其色光潤諸國書寫莫不采用酉陽雜俎慈恩寺殿庭大莎羅樹大歴中安西所進其木樁賜此寺四橛大徳行逢自種之一株不活洛陽名園記苗帥園故有七葉二樹對峙髙百尺春夏望之如山然今剏堂其北韓雍賜遊西苑記橋南有娑羅樹人所罕見長安客話臥佛寺内娑羅樹二株子如橡栗可療心疾名山記天台山有娑羅樹花一名鶴翎出華頂峯以多經風霜樹不髙大樹數百枝枝十餘頭頭六七葉經冬不凋花如芍藥香如茉莉按蜀都賦雅州瓦屋山産娑羅花有五色照映山谷與此相類花史昌化千頃山側娑羅一株每初夏花開香聞十里相傳為許由故居雲南志娑羅花在㑹城土主廟其本類大理和山花佛日盛開其色白微帯黄意異香芬馥非同凡花臭味中出一蕊如稗穗垂出瓣中毎朶十二瓣遇閏輒多一瓣相傳髙僧以二念珠入土一珠出樹不知大理所傳仙人遺種者又出何典故且不獨和山有之也俗傳娑羅樹炙之能却病土人有疾者度其髙下以艾灼焉今樹枯集藻狀増唐安西道進娑羅枝狀臣所管四鎮有拔汗那最為宻近水有娑羅樹特為竒絶不庇凡草不止惡禽聳榦無慙于松栝成隂不愧于桃李近差官拔汗那使令採得前件樹枝二百莖如得托根長樂擢穎建章布葉垂隂隣月中之丹桂連枝接影對天上之白榆碑増唐李邕楚州淮隂縣娑羅樹碑并序觀厥好徳存樹愛人及烏有情不忘雖小可作夫施及者也則有宗廟加敬墟墓増悲覩物可懷比事斯廣此觸類者也矧乃通感靈變𤣥符聖迹根柢浄土碩茂佛時燭金山之景彰聨玉豪之殊相至若泥日法㑹荼毘應身妙有雙樹之間光覆僧祗之衆安可混曜散木比列清林議上茅之挺生喻堅固之神造者也娑羅樹者非中夏物土所宜有者已婆娑十畝暎蔚千人密幄足以綴飛飇髙蓋足以却流景惡禽翔而不集好鳥止而不巢有以多矣然深識者雖徘􅆦仰止而莫知㝠植博物者雖沉吟稱引而莫辨嘉名華葉自竒榮枯嘗異隨所方面頗徴靈應東瘁則青郊苦而嵗不稔西茂則白藏㤗而秋有成唯南匪他自北常爾或季春肇發或仲夏萌生早先豐隨晩暮儉若且槁莖後吐芬條前秀差池旬日奄忽齊同無今昔可殊非物理所測古老多怪時俗毎驚巫者占於鬼謀議者惑于神樹證聖載有三藏義浄還自西域逮兹中休信宿因依齋戒瞻嘆演夫本處徴之舊聞源其始也榮灼道成之際䆒其末也摧藏薪盡之餘或森列四方或合并二體常清不壞應現分榮變白有終不滅同盡昔與釋迦䕃首今為羣生立縁夫佛病從人大慈感故樹萎因物深悲理然化能分身半枯即是心有合相後茂還齊宜其表正聖神靈貺品彚以變見一攝而稱讃十方者也淮隂縣者江海通津淮椘巨防彌越走蜀㑹閩驛吳七發枚乘之丘三傑楚王之窟勝引飛轡商旅接艫毎至同雲冐山終風振壑宦子惕息槁工疚懷魚貫迤其萬艘霧集坌於曽渚莫不膜拜圍遶焚香䕶持復悔多尤廻祈景福於是風水相借物色同和挂帆啓行方舳駿邁浮山崛起而疏巘慶雲亂飛而比峯雖電影施鞭夸父杖策罔可喻其神速曷云状其豁快者哉州牧宗子名仲康廣孝惟家大忠形國播清政以主郡儀古式以在人知微知彰有禮有樂别駕扶風竇公名誡盈盛門貴仕懿徳令名利用以厚生明畧以營道上交不諂下交不黷司馬宗子名景虚受賢交榦用柔克退遂中律先後自公且觀麟定之詩未𢎞驥子之任邑宰清河張公名松質藐自雉節忽乎博聞始于能賦而彰中于成器而立牧人通急狥物合權威肅懾于神明慈惠安其父母豈伊政理自有才名莫不淨慮一乘追攀八樹嘆徙植而多感惟化生而永懷大啓上縁率心檀施碩徳道暉寺主道𤣥上座道絢都維那曇一等皆妙覺圓常釋門上首痛金棺而既往駭堅林而在兹鄉望司徒𤣥簡戴𤣥景王𤣥珪張仁藝王懷儼劉元隐沈信詳等夙悟大師深入真際勤行進力䕶供莊嚴揚州東大雲寺法師希𤣥廣派法流固祗徳本戒行有以鎮浮俗利言有以誨蒙求既憑藉于衆心亦謀明于獨得是摽靈跡乃建豐碑其詞曰政化之理兮甘棠猶存寳乘之妙兮娑羅是敦欽厥道成兮八相克尊感乎示迹兮一歸可門與佛合縁兮榮落同時歘爾化生兮感變誰思休徴咎徴兮伺察不欺流俗莫識兮綿曠驚疑上人西還兮覯止増悲發皇靈應兮堅固在兹方國傳聞兮想象悽其廻首正信兮頂禮䕶持優曇千年兮曷足議之賛増宋宋祁娑羅木賛聚葩共房葉附花外根不得徙見偉斯世歌御製娑羅樹歌娑羅珍木不易得此樹惟應月中植想見初從西域移山中有人多未識海桐結蕊松栝形千花散盡七葉青山禽廻翔不敢集虚堂落子風泠泠椘州遺碑今已偃峨睂雪外雙林遠未若兹山近可遊靈根終古蟠層巘繁隂亭午轉團圞回睇精藍路㡬盤憑教紫府仙山樹寫入披香殿裏看七言古詩増元郭翼題娑羅室娑羅樹下幽人室山氣因之與秋碧古色猶棲竺國雲絶頂仰見扶桑日太隂垂地風雨㑹百尺撐空鬼神力醉呼北海起九原為爾重鐫青石壁五言排律増宋歐陽修定力院七葉木伊洛多佳木娑羅舊得名常於佛家見宜在月中生暗砌隂鋪静虛堂子落聲夜風疑雨過朝露炫霞明車馬王都盛樓䑓梵宇閎惟應静者樂時聼野禽鳴七言絶句増宋梅堯臣娑羅樹桫欏古樹常占嵗在昔曽看北海碑今日四方俱大稔不知榮悴向何枝扶木増山海經大荒之中有山名曰孽揺頵羝上有扶木柱三百里其葉如芥注扶木即扶桑湯谷上有扶木一日方至一日方出皆載于烏十洲記扶桑在碧海之中地方萬里多林木葉皆如桑又有椹樹長者數千丈大二千餘圍樹兩兩同根偶生更相依倚是以名為扶桑仙人食其椹而一體皆作金光色飛翔空中其樹雖大其椹故如中夏之桑也但椹稀而色赤九千嵗一生實耳彚考増梁書扶桑國傳扶桑國地在中國之東其土多扶桑木故以為名扶桑葉似桐而初生如筍國人食之實如梨而赤績其皮為布以為衣亦以為綿作板屋無城郭有文字以扶桑皮為紙原淮南子扶木在揚州日之所曊増拾遺記瀛州有扶桑萬嵗一枯其人視之如旦暮也原寰中記天下之髙者扶桑無枝葉上至于天下通三泉集藻賦増唐朱鄴扶桑賦木臨大壑名曰扶桑厭洪波之萬里在青帝之一方受浩氣以生成那倫衆木挺仙材之秀麗能戴朝陽塵外風吟天涯雨泣山晴而瑞氣初動海晩而潮痕乍濕㡬千嵗月標下界之無雙廻拔榮枯依髙空而獨立霧折煙融孤光在東長迎旭日先得春風吾將原太極之意考真宰之功不産竒異安分混同物欲明焉我則與三才並起田云化矣我則與大朴無窮卓出古今莫逾貞固當乾坤之上位瞰魚龍之要路至若玉漏聲殘銀蟾影度收人間之暝色未遍羣山聳海底之紅輪先經此樹露戢雲驚珠懸焰生雖凌厥熾寕奪兹榮豈若常材隨大匠之雕刻自如良輔契吾君之聖明巢之者不可得其窺蠧之者不可得其噬陽烏象擇木之狀晴虹作挂弓之勢名大天下身髙水際掩彩翠於蟠桃病虧盈于月桂非海也不足以容其大非日也不足以升其髙葉茂而雲垂霽景根深而龍撼驚濤卑沃焦於尺土微鄧林以秋毫巨影倒空而漠漠寒聲吹夜以飇飈靈境難尋人寰罕測性欺霜雪心藏正直故能齊衆甫而擬滄浪永佐東君之徳五言古詩増晉陶潜讀山海經逍遥蕪臯上杳然望扶木洪柯百萬尋森散覆暘谷靈人侍丹池朝朝為日浴神景一登天何幽不見燭若木原山海經洞野之山上有赤樹青葉赤華名曰若木南海之内黒水青水之間有木名曰若木彚考増淮南子若木在建木西上有十日其華照下地水經註若木之生非一所也黒水之間厥木所植水出其下故木受其稱焉集藻賛増晉郭璞若木賛若木之生崑山是濵朱華電照碧葉玉津食之靈智為力為神文散句増楚屈原離騷折若木以拂日兮􅂓逍遥以相羊天問羲和之未揚若華何光詩散句増唐李白西海栽若木東溟植扶桑别來幾多時枝葉萬里長揮手折若木拂此西日光丹木二種同名増山海經峚山其上多丹木圓葉而赤莖黄花而赤實其味如飴食之不饑丹木有玉膏以灌丹水崦嵫之山其上多丹木其葉如榖其實大如𤓰赤跗而黒理食之已痺可以禦火集藻賛増晉郭璞丹木賛爰有丹木生彼淆盤厥實如𤓰其味甘酸蠲疴辟火用竒桂蘭丹桂曄曄沸沸玉膏黄軒是服遂攀龍豪五言古詩増晉陶潜詩丹木生何許廼在峚山陽黄花復朱實食之夀命長白玉凝素液瑾瑜發竒光豈伊君子寳見重我軒黄建木二種同名増山海經有九丘以水絡之有木青葉紫英𤣥華黄實名曰建木百仞無枝有九欘下有九枸其實如麻其葉如芒有木狀如牛引之有皮若纓黄蛇其葉如羅其實如欒其木如蓲其名曰建木在窫窳西弱水上注建木青葉紫莖黒花黄實其下聲無響立無影也彚考増淮南子建木在廣都天帝所從上下處此木日中無影集藻賛増晉郭璞建木賛爰有建木黄實紫柯皮如蛇纓葉有素羅絶䕃弱水義人則過賦増唐無名氏建木賦廣都有建木焉大五千圍生不知始髙八千尺仰不見巔過雷電遺雲煙倚白日摩青天靡蟠桃於度朔之上毫若木於滄海之邊斯未足竒者天牧寸雲日在午位明白宇宙光􅌢燭秘枝枝攅太虛外青葉葉積元氣間翠無一㸃之影落之於地故自當玉京之要得天下之中左右仙翁前後玉童潤璚露飀祥風五雲翼之而斐亹八景含之而玲瓏帝或自天而䧏天寕假羽翼帝或自地而還地不乘虛空以我有飛陸之力以我有㤗階之功必我之由忽乎遂通如此見其真宰之意生巨材而不易上帝之心寄巨材而亦深不然奚至是哉俗人生代重疊詭譎其或不聞聞之或不信境之絶信之或不往往之或不到智之劣自非天付洞微神與明哲樹杳杳而何在身紛紛而已滅士有以廣都為帝王之宅以建木為台階之臣自謂未達仰慕斯人髣髴雲霄徘􅆦風塵若巨材之一見希謁帝之有因賦散句増晉孫綽天台賦建木滅影于千尋琪樹璀璨而成珠迷榖増山海經招揺之山有木焉其狀如榖而黒理其花四照其名曰迷榖佩之不迷集藻賛増晉郭璞迷榖賛爰有竒樹産自招揺厥華流光上映重霄佩之不惑潜有靈標棪木増山海經堂庭之山多棪木注别名連其子似柰而赤可食白䓘増山海經侖者之山有木焉其狀如榖而赤理其汗如􅃮其味如飴食者不饑可以釋勞其名曰白䓘可以血玉注或作睪蘇集藻賛増晉郭璞白䓘賛白䓘睪蘇其汁如飴食之辟榖味有餘滋逍遥忘勞窮生盡期文莖増山海經符禺之山有木焉名曰文莖其實如棗可以已聾杻木増山海經英山其上多杻橿注杻似棣而細葉一名土橿橿木中車材甘棗之山其上多杻木盼木増山海經浮山多盼木枳葉而無傷木蟲居之稷木増山海經庅陽之山其木多稷柟豫章注稷似松有刺細理崇吾山木増山海經崇吾之山有木焉員葉而白柎赤華而黒理其實如枳食之宜子孫榣木増山海經槐江之山其隂多榣木之有若注榣木大木也言其上復生若木大木之竒靈者為若集藻賛増晉郭璞榣木賛榣惟靈樹爰生若木重根増駕流光㫄燭食之靈化榮名仙録櫰木槐一名櫰與此木名同物異増山海經中曲之山有木焉其狀如棠而員葉赤實實大如木瓜名曰櫰木食之多力集藻賛増晉郭璞櫰木賛櫰之為木厥形似槤若能長服拔樹排山力則有之夀則宜然机木増山海經單狐之山多机木注机木似榆可燒以糞稻田出蜀中北號山木増山海經北號之山有木焉其狀如楊赤華其實如棗而無核其味酸甘食之不瘧芑木増山海經東始之山有木焉其狀如楊而赤理其汁如血不實其名曰芑可以服馬集藻賛増晉郭璞芑木賛馬維剛駿塗之芑汁不勞孫陽自然閒習厥術無方理有潜執櫔木増山海經歴兒之山其上多櫔木是木也方莖而圓葉黄華而毛其實如棟服之不忘彫棠増山海經隂山多彫棠其葉如榆葉而方其實如赤菽食之已聾茇増山海經柄山有木焉其狀如樗其葉如桐而莢實其名曰茇可以毒魚黄棘増山海經苦山有木焉名曰黄棘黄華而圓葉其實如蘭服之不字天楄増山海經堵山有木焉名曰天楄方莖而葵狀服者不㖶􅂪木増山海經放臯之山有木焉其葉如槐黄華而不實其名曰蒙木服之不惑帝休増山海經少室之山其上有木焉其名曰帝休葉狀如楊其枝五衢黄華黒實服者不怒集藻賛増晉郭璞帝休賛帝休之樹厥枝交對竦本少室曽隂雲䨴君子服之匪怒伊愛栯木増山海經泰室之山其上有木焉葉狀如梨而赤理其名曰栯木服者不妬集藻賛増晉郭璞栯木賛爰有嘉樹厥名曰栯薄言采之窈窕是服君子維歡家無反目帝屋増山海經講山有木焉名曰帝屋葉狀如椒反傷赤實可以禦㐫注反傷刺下勾也亢木増山海經浮戲之山有木焉葉狀如樗而赤實名曰亢木食之不蠱葪栢増山海經敏山上有木焉其狀如荆白華而赤實名曰葪栢服者不寒集藻賛増晉郭璞葪栢賛葪栢白華厥子如丹實肥變氣食之忘寒物随所染墨子所歎三珠樹増山海經三珠樹在厭火北生赤水上其為樹如栢葉皆為珠一曰其為樹若彗集藻賛増晉郭璞三珠樹賛三珠所生素水之際翹葉栢竦美壯若彗濯彩丹波自相霞映雄常樹増山海經肅慎之國有樹名曰雄常先入代帝於此取之注其俗無衣服中國有聖帝代立者則此木生皮可衣也欒増山海經雲雨之山有木名曰欒禹攻雲南有赤石焉生欒黄木赤枝青葉羣帝焉取藥甘柤増山海經蓋猶之山上有甘柤枝榦皆赤黄葉白華黒實甘華増山海經蓋猶之上有甘華枝榦皆赤黄葉朱木増山海經蓋山之國有樹赤皮枝榦青葉名曰朱木注或作朱威木也尋木増山海經尋木長千里在勾纓南生河上西北集藻賛増晉郭璞尋木賛眇眇尋木生于河邊疎枝千里上干雲天垂隂四極下蓋虞淵文玉樹増山海經開明北有珠樹文玉樹玗琪樹注玗琪赤玉屬也吳天璽元年臨海郡吏伍曜在海水際得石樹髙二尺餘莖葉紫色詰曲傾靡有光彩即玉樹之類也彚考増淮南子崑崙上有珠樹玉樹璇樹不死樹在其西沙棠琅玕在其東綘樹在其南碧樹瑶樹在其北隋唐嘉話雲陽縣界多漢離宫故地地有似槐而葉細土人謂之玉樹揚子雲甘泉賦云玉樹青葱後左思以雄為假稱珍怪不詳也集藻賛増晉郭璞文玉玗琪樹賛文玉玗琪方以類叢翠葉猗萎丹柯玲瓏玉光争煥彩􅃩火龍不死樹増山海經開明北有不死樹注言長生也博物志負丘山上有不死樹食之乃夀集藻賛増晉郭璞不死樹賛萬物暫見人生如寄不死之樹夀敝天地請藥西姥烏得如羿賦散句増漢張衡思𤣥賦登閬風之層城兮搆不死而為床聖木増山海經開明北有甘水聖木注食之令人智聖也集藻賛増晉郭璞甘水聖木賛醴泉睿木養齡盡性増􅂔之和袪神之㝠何必生知然後為聖服常琅玕樹増山海經服常樹其上有三頭人伺琅玕樹注服常木未詳琅玕子似珠爾雅曰西北之美者有崑崙之琅玕焉莊周曰有人頭遞卧遞起以伺琅玕與玕琪子謂此人也彚考増續仙傳謝𤣥卿遇神仙見丹柯碧葉微風時叩五音相節云此琅玕樹也集藻賛増晉郭璞服常琅玕樹賛服常琅玕崑山竒樹丹實珠離緑葉碧布三頭是伺遞望遞顧櫧増山海經前山其木多櫧注或作儲似柞子可食冬夏生作屋柱難腐本草櫧木處處山谷有之大者數抱髙二三丈葉長大如栗葉稍尖而厚堅光澤鋸齒峭利凌冬不凋三四月開白花廣穗如栗花結實大如槲子外有小苞霜後苞裂子墜子圓褐而有尖大如菩提子内仁如杏仁生食苦澀煑炒乃帶甘亦可磨粉集藻五言絶句増唐朱景𤣥雙櫧亭連簷對雙樹冬翠夏無塵未肯慙桃李成隂不待春槲増爾雅􅈪樸心注槲􅈪别名疏樸􅈪一名心有心能濕江淮間以作柱詩召南林有樸􅈪此作樸􅈪文雖别其實一也本草一名大葉櫟一名櫟橿子蘇頌曰槲處處山林有之木髙丈餘與櫟相類亦有斗但小不中用耳李時珍曰槲有二種一種叢生小者名枹一種髙者名大葉櫟葉樹俱似栗長大麤厚冬月凋落三四月開花亦如栗八九月結實似橡子而稍短小僵澀味惡荒嵗人亦食之彚考増詩召南林有樸􅈪唐書后妃傳后封嵩山禪少室封壇南有大槲赦日置雞其杪賜號金雞樹集藻七言絶句増唐桞宗元種木槲花上苑年年占物華飄零今日在天涯祗因長作龍城守剰種庭前木槲花詩散句増唐李賀侵侵槲葉香木花滯寒雨元王惲闖首槲樹間􅂔自太古練宋陸游三峯二室煙塵静要試霜天槲葉衣唐朱慶餘山橋槲葉暗許渾古木髙生槲宋陸游掃園收槲葉杻増爾雅杻檍注似棣細葉葉新生可飼牛材中車輞闗西呼杻子一名土橿疏陸機云葉似杏而尖白色皮正赤為木多曲少直枝葉茂好二月中葉疎華如練而細蕊正白蓋柎今官園種之正名曰萬嵗既取名於億萬其葉又好故種之共汲山下人或謂之牛筋彚考増詩唐風隰有杻山海經崌崍之山其木多楢杻丹鉛雜録謝眺詩云風動萬年枝唐詩青松忽似萬年枝三體詩註以為冬青非也草木疏云檍木枝葉可愛二月花白子似杏今官園種之取億萬之義改名萬嵗樹即此也桋増爾雅桋赤梀白者梀注赤梀樹葉細而岐鋭皮理錯戾好叢生山中中為車輞白梀葉圓而岐為大木疏陸璣云梀葉如柞皮薄而白其木理赤者為赤梀一名桋白者為梀其木皆堅韌今人以為車轂彚考増詩小雅隰有杞桋棫増爾雅棫白桵注桵小木叢生有刺實如耳璫紫赤可啖疏陸璣云王蒼説棫即柞也其材理全白無赤心者為白桵直理易破可為櫝車輻又可為矛㦸矜今人謂之白捄或曰白柘此二説不同未知孰是彚考増詩大雅柞棫拔矣芃芃棫樸薪之槱之山海經羭次之山多棫橿杬増爾雅杬魚毒注杬大木子似栗生南方皮厚汁赤中藏卵果橋増尚書大傳伯禽康叔見周公三見而三笞商子曰南山之陽有木名橋北山之隂有木名梓二子盍往觀焉二子往觀見橋木髙而仰梓木晉而俯反以告商子商子曰橋者父道也梓者子道也二子再見周公入門而趨登堂而跪周公拂其首勞而食之㝠靈増莊子楚之南有㝠靈者以五百嵗為春五百嵗為秋注㝠靈木名撚支増離騷注撚支草也支一作枝相如賦云枇杷橪支其字從木郭璞云橪支木也集藻文散句増楚辭采橪支于中洲赤木増吕氏春秋括姑之東中容之國有赤木之葉焉仁夀木増吕氏春秋木之美者有仁夀之華焉彚考増拾遺記晉文公焚林以求介之推有白鵶繞煙而噪或集之推之側火不能焚晉人嘉之起一髙䑓名曰思煙䑓種仁夀木木似栢而枝長柔軟其花堪食模木増淮南草木譜模木生周公塜上其葉春青夏赤秋白冬黑以色得其正也楷木増淮南草木譜楷木生孔子塜上其榦枝疎而不屈以質得其直也酉陽雜俎蜀中有木類柞衆木榮時枯枿隆冬方萌芽布隂蜀人呼為楷木别録増元郝經詩序金源以來進士登第例授楷笏無則以槐代之不盡木増神異經南荒外有火山其中生不盡之木晝夜火燃得暴風不猛猛雨不滅南荒之外有火山長四十里廣五十里其中皆生不燼之木火鼠生其中柤稼􅣮増神異經南方大荒之中有樹焉名曰柤稼􅣮柤者柤棃也稼者株稼也􅣮親暱也三千嵗作華九千嵗作實其華蘂紫色其實赤色其髙百丈或千丈也敷張自輔東西南北方枝各近五十丈葉長七尺廣五尺色如緑青木皮如梓樹理如甘草味飴實長九尺圍如其長而無瓤核以竹刀剖之如凝蜜得食復見實即滅矣言復見後實熟者夀一萬二千嵗返魂樹増十洲記聚窟洲上有大山名為神鳥山山多大樹與楓木相類而花葉香聞數百里名為返魂樹扣其樹亦能自作聲聲如羣牛吼聞之者皆心驚神駭伐其木根心于玉釡中煑取汁更微火煎如黑餳狀令可丸之名為驚精香或名之為震靈丸或名之為震檀香或名之為人鳥精或名之為却死香一種六名斯靈物也香􅂔聞數百里死者在地聞香氣乃却活不復亡也博物志武帝時西域月支國度弱水貢此香三枚大如燕卵黑如桑椹値長安大疫西使謂燒一枚辟之當中病者聞之即起香聞百里數日不歇疫死未三日者熏之皆活乃返生神藥也聲風木増東方朔外傳太初二年朔從西那邪國還得聲風木十枝以獻帝長九尺大如指此木出因洹之水則禹貢所謂因桓是來即其源也出甜波上有紫燕黄鵠集其間實如細珠風吹枝如玉聲因以為名帝以遍賜羣臣年百嵗者指星木増東方朔外傳武帝常見彗星朔折指星木以授帝帝指彗星應時星没時人莫之測也平露増宋書符瑞志平露如蓋以察四方之政其國不平則隨方而傾白虎通賢不肖位不相踰則平露生于庭一名平慮瑞應圖一名平兩集藻賦増唐無名氏平露賦惟唐累慶唯天眷命植平露之殊祥表吾君之睿聖不窺於牖可以辨百寮之賢不下於堂可以觀四方之政其儀可尚其義可覈平也者所以表太平之時露也者所以彰雨露之澤以此知庶類光賛神功昭格也希代以出曠古而無空嘗覩於青史獨有騐於祥圖借如嘉禾合穗且生於隴畝萐蒲扇食未遠於庖􅌮孰與夫薦祉於彤庭之際含榮於紫殿之前亭亭莖擢的的規圓屬乾坤交㤗風烈昭宣是以執正自守居中不偏偶香階之蓂莢對玉户之賔連以承君顧盻以奉君周旋非夫聖哲首出英賢在位君臣同心上下一致五帝可以六三王可以四亦曷能感於兹瑞如或政有所缺道有未光則柢枝傾蓋應是知方寕兹物兮自爾信有神兮所將似能存於炯誡豈獨效於禎祥客有聞之而嘆曰於戲哉莫瑞匪靈匪聖莫丁偉兹平露卓爾祥經物之咸若國之康寕覩珍符之有炳敢不頌乎徳馨頌曰官為賢兮政無失君與臣兮徳惟一伊平露兮應時出彰聖代兮光史筆賦散句増漢張衡東京賦植華平於春圃賔連増瑞應圖賔連一名賔達一名賔連濶白虎通繼嗣平明則賔連生於房户賔連者木名連累相承故在於房户象繼嗣也垂龍木增洞㝠記元光中帝起夀靈壇壇上列植垂龍之木似青梧髙十丈有朱露色如丹汁灑其葉地皆成珠其樹似龍之倒垂亦曰珍枝樹女香樹増洞㝠記影娥池有女香樹細枝葉婦人帶之香終年不減青樝木増洞㝠記青樝木有膏如淳漆削置噐中以蠟和之塗布燃照數里發日樹増洞㝠記胥池寒國有發日樹言日從雲出雲來掩日風吹樹枝拂雲開日光也亦名開日樹樹有汁滴如松脂也生金樹増洞㝠記影娥池北作鳴禽之苑有生金樹破之皮間有屑如金而色青亦名青金樹長生樹増鄴中記金華殿後有皇后浴室種雙長生樹枝條交於棟上團團車蓋形冬日不凋葉大如掌至八九月乃生華華色白子赤大如橡子不中啖也世人謂之西王母長生樹彚考増西京雜記上林苑千年長生樹十株萬年長生樹十株洛陽宫殿簿明光殿前長生二株含章殿前長生一株晉宫閣名華林園長生六株萬年殿前長生二株集藻賦増晉嵇含長生樹賦有序余嬰丁閔㐫靡所定居老母垂聖善之訓以為生事愛敬没則無改宜居墓次瞻奉威靈兼覧藝文可以不隕先軌祗奉慈令遂家于墳左掃除壇封種植松栢松栢之下不滋非類之草猥有長生育于域内豈老母至行表徴于嘉木哉辭曰美我親之仁孝固徴瑞之必招降祖宗之遺徳振竒木之青條結根擢榦載生無漸弱莖猗猗緑華冉冉處隂冬而愈茂豈莖葉之有㸃感自然以旌賢諒有道之不掩丹青樹増西京雜記終南山有樹直上百丈無枝上結藂條如車蓋葉一青一赤望之斑駮如錦繡長安謂之丹青樹亦云華蓋樹亦生熊耳山述異記辰州嵩溪有丹青樹上有五色葉圓如華盖俗謂之五采樹文木彚考増西京雜記魯恭王得文木一枚伐以為器意甚玩之中山王為賦曰麗木離披生彼髙崖拂天河而布葉横日路而摧枝幼雛羸鷇單雄寡雌紛紜翔集嘈嗷鳴啼載重雪而捎勁風將等嵗于二儀巧匠不識王子見知乃命班爾載斧伐斯隐若天崩豁如地裂花葉分披條枝摧折既剥既刋見其文章或如龍蟠虎踞復似鸞集鳯翔青緺紫綬環璧珪璋重山累嶂連波疊浪奔電屯雲薄霧濃雰䴥宗驥旅雞族雉羣蠋繡鴦錦蓮藻芰文色比金而有裕質参玉而無分裁為用噐曲直舒卷修竹映池髙松植巘制為樂噐婉轉蟠紆鳯將九子龍導五駒制為屏風鬱岪穹窿制為杖几極麗窮美制為枕案文章璀璨彪炳渙汗制為盤盂采玩踟蹰猗歟君子其樂只且恭王大悦顧盻而笑賜駿馬二匹上林苑樹彚考増西京雜記初修上林苑羣臣遠方各獻名異樹亦有製為美名以標竒麗白銀樹十株黄銀樹十株扶老木十株金明樹二十株揺風樹十株鳴風樹十株琉璃樹七株離婁樹十株御定佩文齋廣羣芳譜卷八十
