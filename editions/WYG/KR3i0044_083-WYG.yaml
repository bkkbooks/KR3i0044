body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十一木譜君子樹增廣志君子樹似桱松曹爽樹之于庭彚考増晉宫閣記華林園中有君子樹三株集藻詩散句増晉戴暠接越稱交譲連樹名君子不灰木増抱朴子南海蕭丘之上有自生之火春起秋滅丘山純生一種木雖為火所著但小焦黒人或得以為薪者炊熟則灌滅之用之不窮齊地記盧水側有勝火木方俗音曰檉子其木經野火燒死不滅故東方朔云不灰之木者也發蒙記西域有火浣之布東海有不灰之木員生樹増釋典帝釋殿前員生樹梵語波利質多樹髙一百繇旬枝葉覆五百繇旬寳花開時天界自然嚴飾妙好能逆風香諸天夏月于樹下宴息法華經謂之天樹王蘇枋増崔豹古今注蘇枋木出扶南林邑外國細破煑之以染色南方草木狀蘇枋樹類槐花黒子出九真南人以染綘漬以大庾之水則色愈深本草一名蘇木樹似菴羅葉若榆葉而不澀抽條長丈許花黄子生青熟黒翳木増崔豹古今注翳或毉作木出交州色黑而有文亦謂之烏文木也格古要論烏木出海南南番雲南性堅老者純黒色且脆間道者嫩本草一名烏樠木葉似椶櫚體重堅緻可為筯及噐物南人多以檕木染色偽之貝多樹増酉陽雜俎貝多出摩伽陀國長六七丈經冬不凋此樹有三種一者多羅娑力义貝多二者多梨婆力义貝多三者部婆力义多羅梨並書其葉部闍一色取其皮書之貝多是梵語漢翻為葉貝多婆力义者漢言葉樹也西域經書用此三種皮葉若能保䕶亦得五六百年交趾近出貝多枝彈材中第一彚考增廣州記嵩山記曰嵩寺忽有思惟樹即貝多也有人坐貝多樹下思惟因以名焉内典所謂貝多樹下思惟經是也漢世有道士從外國來將子于西山脚下種之有四樹極髙大與衆木異一年三花白色香美漢語翻為貝葉拾遺記洛陽翊津橋通翻經道場東街其道塲有婆羅門僧及身毒僧十餘人新翻諸經其所翻經本從外國來用貝多樹葉書貝多葉長一尺五六寸濶五寸許葉形似琵琶而厚大横作行書隨經多少縫其一邊帖帖然水經注菩薩入石窟時天地大動諸天在空言此非過去當來諸佛成道處去此西南行減半由延貝多樹下是過去當來諸佛成道處諸天導引菩薩起行離樹三十歩天授吉祥草菩薩受之復行十五歩五百青雀飛來繞菩薩三匝而去菩薩前到貝多樹下敷吉祥草東向而坐寰宇志緬甸在滇南有樹頭椶髙五六尺結實如椰子土人以鑵盛麴懸于實下劃其實汁流于鑵中以成酒名樹頭酒或不用麴惟取汁熬為白糖其樹即貝樹也緬人取其葉寫書諸寺竒物記寳光寺有西域來貝多婆力义經長可六七寸廣半之葉如細猫竹筍殻而柔膩如芭蕉梵典言貝多出摩伽陀國長六七丈經冬不彫其葉可寫字貝多婆力义此翻葉樹也渤泥入貢記王之所居若樓覆以貝多葉番書無筆札以刀刻貝多葉行之集藻五言排律増唐張喬興善寺貝多樹還應毫末長始見拂丹霄得子從西國成隂見昔朝勢隨雙刹直寒出四牆遥帶月啼春鳥連空噪暝蜩遠根穿古井髙頂起凉飈影動懸燈夜聲繁過雨朝静遲松桂老堅任雪霜凋永共終南在應隨刼火燒詩散句増唐李白去時應過嵩少間相思為折三花樹鬼目樹増廣州記鬼目樹似棠梨葉如楮皮白樹髙大如木瓜而小邪傾不周正味酢九月熟又有草昧子亦如之可為糁用其草似鬼目南方草木狀鬼木樹大者如李小者如鴨子二月花色似蓮其實色黄以蜜煑之滋味柔嘉交趾武平興古有之䔅母樹増異物志䔅母樹皮有蓋狀似栟櫚但脆不中用用之當裂作三四片廣州記䔅葉六七尺接之當覆屋梓棪増異物志梓棪大十圍材貞勁非利剛截不能剋堪作船其實類棗著枝葉重曝挽垂刻鏤其皮藏味美於諸樹莎樹増廣志莎樹多枝葉葉兩邊行列若飛鳥之狀蜀記莎樹出麪一樹出一石正白而味似桄榔出興古抱木増嶺表録異抱木生江溪中葉細如檜身堅類柏惟根軟不勝刀鋸今潮循人多用其根刳而為履當木濕時刻削易如割瓜木乾之後刀不可理也或油畫或漆其輕如通草暑月著之隔卑濕地氣力如杉木今廣州諸郡牧守初到任皆有油畫抱木履也棹増南方草木狀棹樹榦葉俱似椿以其葉鬻汁漬果呼為棹汁若以棹汁雜彘肉食者即時為雷震死出髙凉郡仙人樹増凉州記祁連山有仙人樹行人山中饑渴者輙食之飽不得持去平居不可見都句増交州記都句樹似栟櫚木中出屑如麪可啖候風木彚考増宋書符瑞志宋元嘉十七年七月武昌崇譲鄉程僧愛家候風木連理酒樹増梁書扶南國傳扶南國有酒樹似安石榴采其花汁停瓮中數日成酒影木増拾遺記瀛州有樹名影木日中視之則一葉百影花有光夜如列星萬年一實大如瓜青皮黒瓤食之骨輕上如華蓋羣仙以避風雨燧木増拾遺記燧明國不識四時晝夜有火樹名燧木盤屈萬頃有鳥名鶚來啄樹則燦然火出聖人感焉因取小枝以鑚火號燧人氏夀木増拾遺記渠搜國之西有祈淪之國其俗淳和人夀三百嵗有夀木之林一樹千尋日月為之隐蔽若經憩此木下皆不死不病或有泛海越山來㑹其國歸懐其葉者則終身不老恒春樹一作長春増拾遺記通霞臺左右種恒春之樹葉如蓮花芬芳如桂花隨四時之色昭王之末仙人貢焉列國咸賀王曰寡人得恒春矣何憂太清不至恒春一名沉生如今之沉香也述異記燕昭王種長春樹春生碧花春盡則落夏生紅花夏末則凋秋生白花秋殘則萎冬生紫花遇雪則謝故號為長春樹播栘樹増林邑記播栘樹柯葉發根下虛中森羅望之似懸髮文衆木増地道記句町有文衆木摩㕑増南州異物志木有摩㕑生於斯調國其汁肥潤其澤如脂膏馨香馥郁可以煎熬食物香美如中國用油石樓樹増述異記案消山有石樓樹吳太皇元年郡吏伍曜於海際得之枝莖紫色有光南越謂之石連理也􅬎子樹増述異記顧渚山有􅬎子樹其木如玉色渚人採之以為杖大食國樹増述異記大食王國在西海中有一方石石上多樹榦赤葉青枝上總生小兒長六七寸見人皆笑動其手足頭著樹枝使摘一枝小兒便死春浮増水經注波羅奈國在迦維羅衛國南千二百里中間有恒水東南流佛轉法輪處在國北二十里樹名春浮維摩所處也菩提樹増酉陽雜俎菩提樹出摩伽陀國在摩訶菩提寺蓋釋迦如來成道時樹一名思惟樹莖榦黄白枝葉青翠經冬不凋至佛入滅日變色凋落過已還生至此日國王人民大作佛事收葉而歸以為瑞也樹髙四百尺下有銀塔周圍繞之彼國人四時常焚香散花繞樹作禮唐貞觀中頻遣使往于寺設供并施袈裟至顯慶五年于寺立碑以紀聖徳此樹梵名有二一曰賔橃梨力义二曰阿濕曷咃婆力义西域記謂之卑鉢羅以佛于其下成道即以道為稱故號菩提婆力义漢翻為樹昔中天無憂王翦伐之令事火婆羅門積薪焚焉熾熖中忽生兩樹王因懺悔號灰菩提樹遂周以石垣至賞設迦王復掘之至泉其根不絶坑火焚之溉以甘蔗汁欲其燋爛後摩竭陁國滿曹王無憂之曽孫也乃以千牛乳澆之信宿樹生如舊更増石垣髙二丈四尺𤣥奘至西域見樹出垣上二丈餘彚考増洛陽伽藍記疑𤣥寺塔珠網以銅鑊盛之在塔西北一百歩掘地埋之上種樹樹名菩提枝條四布密葉蔽天廣東志菩提樹種出西域大可數圍風揺其葉若雨驟至梁天監元年僧智藥三藏自天竺國持菩提一株航海而來植于廣州光孝寺戒壇之前迄今千餘年茂盛不改婆那娑樹増隋書真臘國傳婆那娑樹無花葉似柿實似冬瓜酉陽雜爼婆那娑樹出波斯國亦出拂林呼為阿蔀嚲樹長五六丈皮色青緑葉極光浄冬夏不凋無花結實其實從樹莖出大如冬瓜有殻裹之殻上有刺瓤至甘甜可食核大如棗一實有數百枚核中仁如栗黄炒食甚美庵羅樹増隋書真臘國傳庵羅樹花葉似棗實似李婆田羅樹増隋書真臘國傳婆田羅樹花葉實並似棗而小異毗野樹増隋書真臘國傳毗野樹花似木瓜葉似杏實似楮歌畢佗樹増隋書真臘國傳歌畢佗樹花似林檎葉似榆而厚大實似李其大如升嫛彌増𤣥覽大食西有嫛彌之樹見人善笑摘之則槁酉陽雜爼人木大食西南二千里有國山谷間樹枝上化生人首如花不觧語人借問笑而已頻笑輙落咀賴羅増唐書西域傳天竺有樹名咀賴羅葉如梨生窮山崖腹前有巨虺守穴不可到欲取葉者以方鏃矢射枝則落為羣鳥銜去則又射乃得之波羅樹増唐書南蠻傳太和祁鮮而西人不蠶剖波羅樹實狀若絮紐縷而幅之西域傳貞觀二十一年摩掲它始遣使自通于天子獻波羅樹樹類白楊綸木増南越志咸寕縣有穿州基多綸木似榖皮可以為綿勾芒木増寰宇記嶺南容州陸川白石山色潔白四面懸絶上有飛泉瀑布下有勾芒木可以為布俚人斫之新條更生取之績以為布橦樹増廣韻橦花可為布集藻賦散句増左思蜀都賦布有橦華五言古詩増元陳髙種橦花炎方有橦樹衣被代蠶桑舍西得閒園種之漫成行苖生初夏時料理晨夕忙揮鋤向烈日灑汗成流漿培根澆灌頻髙者三尺强鮮鮮緑葉茂燦燦金英黄結實成秋繭皎潔如雪霜及時以收歛采采動盈筐緝治入機杼裁翦為衣裳禦寒類挾纊老稚免凄凉豪家植花卉紛紛被垣牆于世竟何補争先玩芬芳棄取何相異感物増惋傷詩散句増唐王維橦布作衣裳漢女輸橦布榿増益部方物畧記民家樹榿不三年材可倍常疾種亟取里人以為利四川志榿木古稱蜀木惟成都最多江干林畔蓊蔚可愛彚考増宋史五行志元符二年九月眉山懸榿木二株異根同榦木枝相附集藻賛増宋宋祁榿木賛厥植易安數嵗輙林民賴其用實代其薪不棟不梁亦被斧斤七言絶句増唐杜甫憑何十一少府邕覓榿木栽草堂塹西無樹林非子誰復見幽心飽聞榿木三年大與致溪邊十畝隂詩散句増元姚燧彼榿有二性生植惟峩岷栾栾干雲姿才與樗散鄰宋范成大疎密榿林整整來别録増齊東野語杜甫乞榿木詩無音或讀作豈而韻書亦無此字集中又有榿林礙日吟風葉鄭氏注曰五來反若然當作獃字余嘗見陳體仁端明云見前輩讀若欹韻頗以為疑後見劒南詩有著書増木品搜句覓榿栽又荆公詩云濯錦江邊木有榿小園封植佇華滋益信欹音為然榿惟蜀有之不才木也或謂即榕云丹鉛録姑蘇王守溪在閣日論杜詩聞知榿木三年大因問先父榿木何音先父曰音欹守溪曰當依韻書作楷先父曰音欹則鄉人農夫皆識之若作楷音不知何木矣因舉王荆公榿木詩曰濯錦江邊木有榿野園封植佇華滋地偏幸免桓魋伐嵗晩還同庾信移王乃悦服琪樹增唐李紳詩序琪樹垂條如弱桞結子如碧珠三年子可一熟毎嵗生者相續一年緑二年碧三年者紅綴於條上璀錯相間集藻五言古詩増唐劉駕琪樹下因吟六韻呈先達者舉世愛嘉樹此樹何人識清秋遠山意偶向亭際得竒柯交若鬬珍葉密如織塵中尚青蔥更想塵外色所宜巢三鳥影入瑶池碧移根豈無時一問紫煙客五言律詩増唐李羣玉佳人故居琪樹種樹人何在攀枝空歎嗟人無重見日樹有每年花舊院雀聲暮半庭春色斜東風不知恨滿地落餘霞七言律詩増唐李紳琪樹石橋峯上棲𤣥鶴碧闕巖邉䕃羽人冰葉萬條垂碧實玉枝千日保青春月中泣露應同色澗底侵雲尚有塵徒使伏根成琥珀不知松老化龍鱗五言絶句増唐羊士諤初移琪樹愛此丘中物煙霜盡日看無窮碧雲意更助緑窻寒蔡隐石石橋琪樹山上天將近人間路漸遥誰當雲裏見知欲渡仙橋鳯首木増杜陽編李輔國有鳯首木髙一尺雕刻鸞鳯之形置之堂中雖嚴冬之際而和煦如春故别名為長春木木龍樹増酉陽雜俎木龍樹徐之髙冡城南有木龍寺寺有三層甎塔髙丈餘塔側生一大樹縈繞至塔頂枝榦交横上平容十餘人坐枝杪四向下垂如百子帳莫有識此木者僧呼為龍木梁武曽遣人圖寫焉色綾木増酉陽雜爼䑓山有色綾木理如綾文百姓取為枕呼為色綾枕倒生木増酉陽雜爼倒生木依山生根在上有人觸則葉翕人去則葉舒出東海黝木増酉陽雜爼黝木節似蟲獸可以為鞭鹿木増酉陽雜爼武陵郡北有鹿木二株馬伏波所種木多節獨梪樹増酉陽雜俎獨梪樹頓丘南應足山有之山上有一樹髙十餘丈皮青滑似流碧枝榦上聳子若五綵嚢葉如亾子鏡世名之仙人獨梪樹蜻蜓樹増酉陽雜俎婁約居常山据禪座有一野嫗手持一樹植之于庭言此是蜻蜓樹嵗乆芬芳鬱茂有一鳥身赤尾長常止息其上没樹増酉陽雜俎没樹出波斯國拂林呼為阿縒長一丈許皮青白色葉似槐葉而長花如橘花而大子黑色大如山茱萸其味酸甜可食阿勃参増酉陽雜俎阿勃参出拂林國長一丈餘皮色青白葉細兩兩相對花似蔓菁正黄子似胡椒赤色斫其枝汁如油以塗疥癬無不瘥者其油極貴價重于金􅺚齊増酉陽雜俎􅺚齊出波斯國拂林呼為頇勃梨咃長一丈餘圍一尺許皮色青薄而極光浄葉似阿魏每三葉生于條端無花實西域人常八月伐之至臘月更抽新條極滋茂若不翦除反枯死七月斷其枝有黄汁其狀如蜜微有香氣入藥療病本草氣味甘平無毒主治骨蒸發熱痰𠻳開胃止渴瑞木増酉陽雜俎大歴中成都郭遠因樵獲瑞木一莖理成字曰天下太平詔藏於秘閣紫䤵樹増酉陽雜俎紫䤵樹出真臘國真臘國呼為勒佉亦出波斯國樹長一丈枝條􅊊茂葉似橘經冬不凋三月開花白色不結子天大霧露及雨沾濡其樹枝條即出紫䤵波斯國使烏海及沙利深所説並同真臘國使折衝都尉沙門施沙尼拔陀言蟻運土于樹端作窠蟻壌得雨露凝結而成紫䤵崑崙國者善波斯國者次之尸利沙樹増酉陽雜俎尸利沙樹足蹈即長羅漢木増石湖詩注翠峰寺在東山雪竇顯老道塲山半有悟道井庭下大羅漢木両株虬屈蟠状甚竒古思儡木増桂海虞衡志思儡木生兩江州洞堅實漬鹽水中百年不腐臙脂木増桂海虞衡志臙脂木堅緻色如臙脂可鏇作出融州及州洞桂林屬縣亦有之龍骨木増桂海虞衡志龍骨木色翠青狀如枯骨韓木増竹坡詩話潮州韓文公祠有異木世傳文公手植去祠數十歩種之輙不生有題文公祠者云韓木有情春谷暖鱷魚無種海潭清是也集藻七言絶句増宋楊萬里題韓庭韓木笑為先生一問天身前身後兩般看亭前樹子闗何事也得天公賜姓韓􅋕常増杜詩註􅋕額同常樹無皮出肅慎氏之國聖人在位則木生皮可為衣其國朝貢中國成王時一生之鎖鎖木増輟耕録囘紇野馬川有木名鎖鎖燒之其火經年不滅且不作灰彼處婦女取根製㡌入火不焚能辟寒欏木増格古要論欏木出湖廣及江西南安萬羊山木色白紋理黄花紋麤亦可愛謂之倭欏不花者多有一等稍堅理直而細謂之草欏俗呼曰梌木鸂􅈑木増格古要論鸂􅈑木出西番其木一半紫褐色内有蟹爪紋一半純黑色如烏木有距者價髙西番作駱駞鼻中紋子不染肥膩虎斑木増格古要論虎斑木出海南其紋理似虎斑故名之曰虎斑木赤水木増格古要論此木色赤紋理細性稍堅且脆極滑浄人面木増格古要論人面木出鬱林州春花夏實秋熟兩邊似人面故以名之千嵗木増宜都山川記佷山有異木人無見其朽者其名千嵗葉似棗色似桑冬夏青貞强少節强木増彚苑强木不沉水也以之造船木方一寸以百觔巨石縋之終不没閻浮樹増彚苑閻浮樹湏彌山有之月過樹影入月中拘尼佗樹増彚苑拘尼佗樹其樹花見月光即開稠錫樹増南嶽記南岳寺有稠錫樹極髙大枝葉與他木絶異相傳唐天寳中有稠錫禪師自桐廬來卓庵演法寺與樹皆其遺跡鐵樹増楊萬里詩注鐵樹葉似蒻而紫榦如密節菖蒲日詢手鏡吳浙間有俗諺見事難成則云湏鐵樹花開余在廣西横之馴象衛殷指揮家見一樹髙可三四尺榦葉皆紫黒色葉小類石榴質理細厚問之曰此鐵樹也每遇丁卯年乃花花四瓣紫白色如瑞香瓣較少圓一開累月不凋嗅之有草氣乃知鐵樹花開之説有自來矣淨土樹原一統志浄土樹在鄠縣南八里三月開花如桃花八月結實狀如小粟殻中皆黄土俗傳鳩摩羅什憩此覆其屨土中所生黄櫨増本草黄櫨生商洛山谷及四川葉圓木黄可染黄色綟木増本草綟木生林澤山谷木文側戾故曰綟木橉木増本草橉木一名橝木生江南深山大樹有數種性最硬梓人謂之橉筋木染綘用葉亦可醸酒柯樹増本草柯樹一名木奴按廣志云生廣南山谷波斯家用木為船舫虎刺増本草一名伏牛花生蜀地所在皆有葉青細似黄蘗葉而不光莖亦有㓨開花淡黄色作穗似杏花而小三月采隂乾不凋木増本草不凋木生太白山巖谷樹髙二三尺葉似槐莖赤有毛如棠梨四時不凋賣子木増本草賣子木出嶺南卭州山谷中其葉似柿髙三七尺徑寸許春生嫩枝條葉尖長一二寸俱青緑色枝梢淡紫色四五月開碎花百十枝圍攅作大朶焦紅色隨花便生子如椒目在花瓣中黑而光潔每株花裁三五大朶爾五月采其枝葉用樬木増本草樬木生江南山谷髙丈餘直上無枝莖上有㓨山人折取頭茹食謂之吻頭又謂之鵲不踏以其多㓨而無枝故也木麻増本草木麻生江南山谷林澤葉似胡麻相對山人取以醸酒飲大空増本草大空生㐮州所在山谷亦有之秦隴人名獨空作小樹抽條髙六七尺葉似楮小圓厚根皮赤色黄葛増峩睂山志嘉樹在羅目縣東南三十里陽山江溉兩樹對植圍各二三尺上引横枝亘二丈相援連理隂庇百夫其名曰黄葛號嘉樹蘇子由詩子生雖江陽未省到嘉樹即此佛頂青増峩睂山志佛頂青其樹葉碧翠異常生峯頂者尤具光彩椵木増椵木葉最大有類團扇其皮可以當麻取為魚網之綱牢固殊常夜光木増夜光木一名亮木塞外木經乆而枯其根不朽蟠㢠廻連理于土中水漬木根光輝透徹中外一色有類珠樹夜明燄可以燭物取者晝日從朽株中騐其沴濕昏黒往取去其皮而光發則是矣泥沙浄盡竟體晶熒經月水乾光乃漸減集藻賦御製夜亮木賦并序塞上古木夜視有光遇雨益明移置室中即之可以燭物嘉其有異故賦猗嘉木之迥異垂四照之華英蜿輪囷於川壌萃盤錯於柯莖外禀㢲德内藴離精煥然夕皎灼爾宵明晼瑞星之初麗炯璧月之漸生既騰輝於山谷亦揚彩於檐楹若乃靈根濯雨榮枝浥露芳澤加鮮澄暉遠布方隐之而彌耀旋即之而如晤洵昭質之無虧何㝠行之是懼爾廼金膏灺蘂鶴燄韜光獨飛熛而振采長煜煜以煌煌吐瓊文於赤水懸瑶景於昆岡非朝華而夕謝殆積闇以能彰於是列之桂宫置以椒室流映金鋪近燭緗帙豈浮艶之為容亮靈竒之足述庻含章之可貞雖在野而靡失萬葛樹集藻七言律詩増唐劉兼萬葛樹葉如羽蓋豈堪論百歩晴隂鎖緑雲善政已聞思召伯英風偏稱號將軍静鋪講席麟纔潤髙拂闕一字枝兔影分更有嵗寒霜雪操莫將樗櫟擬相羣水清木集藻詩散句増宋夏竦禁中遲日照南榮瑞木聯祥耀國經合榦舊臨宫檻密交枝重茂帝梧青密葉凝華承玉戺附枝交影䕃銀塘藤増爾雅諸慮山櫐註今江東呼櫐為藤似葛而麤大廣雅藟藤也原格物總論藤有大小數種皆依附大木蟠曲而上其緜亘不可以尋丈計所在山谷中多有之増南方草木狀榼藤依樹蔓生如通草藤其子紫黒色一名象豆三年方熟其殻貯藥不壞觧諸藥毒生南海按本草云一名榼子一名合子廣州記云角如弓袋子若雞卵取其中仁入藥炙用浮沉藤生子大如韲甌正月華包連著實十月臘月熟色赤生食之甜酢生交阯九真簡子藤出合浦生緣樹木正二月花四五月熟實如梨赤如雄雞冠取生食之味淡泊出交阯野聚藤出合浦縁樹木二月花包仍連著實五六月熟子大如羮甌味甜酢出蒼梧菽藤生金封山俚人往往賣之其色正赤出興古廣州記膏藤土人伐船為業隨樹所在就以成槽皆去水逺動有數里山生草名膏藤津汁軟滑無比以此導地牽之如流苴藤狀如栟櫚葉疎破皮青多棘刺髙五六丈者如五六寸竹小者如筆管竹類有十許種原臨海異物志鍾藤附樹作根軟弱湏緣樹而作藤既纒裹樹便死且有惡汁尤令速朽也藤盛成樹若木自然大者或至十圍萪藤圍數寸重於竹可以為杖􅑪以縳船及以為席勝於竹也増崔豹古今注酒杯藤出西域大如臂葉似葛花實似梧桐實花堅皆可以酌酒自有文章映徹可愛實大如指味如豆䓻香美消酒土人提酒來至藤下摘花酌酒仍以實銷醒國人寳之不傳中土張騫出大宛得之事出張騫出闗志酉陽雜俎人子藤出南安紅色在蔓端有㓨其子如人狀崑崙燒之集象南中亦難得本草千金藤陳藏器曰千金藤有數種南北名模不同生北地者根大如指色似漆生南土者黄赤如細辛舒廬間有一種藤似木蓼又有烏虎藤繞樹生冬青亦名千金藤江西林間有草生葉頭有癭子似鶴漆葉似桞亦名千金藤又一種似荷葉只大如錢許亦名千金藤又名古藤又嶺南有陳思岌亦名千金藤黄藤李時珍曰生嶺南狀若防已里人常服此藤飲食有毒亦自然不發白花藤蘇恭曰生嶺南交州廣州平澤苖似野葛葉如女貞莖葉俱無毛而白花其根似葛而骨柔皮厚肉白韓保昇曰蔓生白花葉有細毛根似牡丹凌冬不凋觧諸毒藥常春藤一名土鼓藤一名龍鱗薜荔陳藏器曰生林薄間作蔓繞草木上其葉頭尖結子正圓熟時如珠碧色扶芳藤一名滂藤陳藏器曰生吴郡藤苖小時如絡石蔓延樹木千嵗蘽一名蘽蕪一名苣𤓰陶𢎞景曰藤生如葡萄葉似鬼桃蔓延木上汁白陳藏噐曰冬不凋葉大者盤薄故曰千嵗蘽蔓似葛葉下白其子赤幽州人謂之推蘽蘇頌曰五月開花七月結實八月采子青黒微赤甘藤一名甜藤一名盛藤李時珍曰又有甘露藤皆此類含水藤一名大瓠藤交州記云生嶺南及北海邊山谷狀若葛葉似枸杞多在路旁行人乏水處便喫此故以為名陳藏噐曰藤狀如瓠斷之水出飲之清美李時珍曰顧微廣州記云水藤去地一丈斷之更生根至地水不絶山行口渴斷取汁飲之陳氏所謂大瓠藤蓋即指此物也天仙藤蘇頌曰生江淮及浙東山中春生苗蔓作藤葉似葛葉圓而小有白毛四時不凋根有鬚紫金藤一名山甘草蘇頌曰生福州山中春初單生葉青色至冬凋落其藤似枯條南藤一名石南藤一名丁公藤一名丁公寄一名丁父一名風藤生石間蔓延木上葉細大枝赤莖其大如磧黄有汁蘇頌曰生依南木莖如馬鞭有節紫褐色葉如杏葉而尖李時珍曰江南湖南諸大山有之細藤圓膩紫緑色一節一葉葉深緑色似杏葉而微短厚其莖貼樹處有小紫瘤疣中有小孔四時不凋莖葉皆臭而極辣清風藤一名青藤一名尋風藤蘇頌曰生台州天台山中其苗蔓延木上四時常清百稜藤一名百靈藤蘇頌曰生台州山中春生苗蔓延木上無花葉省藤一名赤藤一名紅藤陳藏噐曰生南地深山赤皮大如指堪縳物片片自觧也千里及藤陳藏噐曰千里及藤生道旁籬落間葉細而厚蘇頌曰千里急生天台山中春生苗秋有花又筠州有千里光生淺山及路旁葉似菊而長背有毛枝榦圓而青春生苗秋有黄花不結實名黄花演海藤廣志云出岳鄂等州諸山崖花有蘂散落石上人收之謂之沙黄就樹採者輕妙謂之蠟黄今人訛為銅黄李時珍曰今盡家所用藤黄皆經煎煉成者䑛之麻人按周達觀真臘記云國有畵黄乃樹脂番人以刀斫樹枝滴下次年收之與郭氏所説不同不知即一物否地龍藤陳藏噐曰生天目山樹繞蟠屈如龍故名吳中亦有而小異龍手藤陳藏噐曰出安荔浦石上向陽者葉如龍手牛領藤陳藏噐曰生嶺南商山形褊如牛領牛妳藤陳藏噐曰生深山大如樹牛好食之其中有粉鬼膊藤陳藏噐曰生江南林澗邊葉如梨葉子如樝子斑珠藤陳藏噐曰生山谷中不凋子如珠而斑息王藤陳藏噐曰生嶺南山谷冬月不凋萬一藤陳藏噐曰生嶺南蔓如小豆一名萬吉曼遊藤陳藏噐曰生無為天門山谷狀如寄生著大樹葉如桞春花色紫蜀人謂之沉蘤百丈青陳藏噐曰生江南林澤藤蔓𦂳硬葉如薯蕷對生藍藤陳藏噐曰生新羅國根如細辛𤓰藤蘇頌曰生施州四時有葉無花金稜藤蘇頌曰生施州四時有葉無花含春藤蘇頌曰生台州其苖延木冬夏常青獨用藤蘇頌曰生施州四時有葉無花葉上有倒刺祁婆藤蘇頌曰生天台山中蔓延木上四時常有野猪尾蘇頌曰生施州藤纒大木四時有葉無花石合草蘇頌曰生施州藤纒木上四時有葉無花飛藤陳藏器曰生崑崙國苖似凌霄藤根如青木香安南亦有之名骨路支溫藤陳藏噐曰生江南山谷著樹不凋彚考增南史孝義傳觧叔謙母有疾夜于庭中稽顙祈福聞空中語云此病得丁公藤為酒便差即訪醫及本草註皆無識者乃求訪至宜都郡遥見山中一老公伐木問其所用荅曰此丁公藤療風尤騐叔謙便拜伏流涕具言來意此公愴然以四叚與之并示以漬酒法叔謙受之顧視此人不復知處依法為酒母病即差唐書方技傳姜撫自言通仙人不死術開元末召至東都舎集賢院因言服常春藤使白髮還鬒則長生可致藤生太湖最良終南往往有之不及也帝遣使者至太湖多取以賜中朝元老因詔天下使自求之宰相裴耀卿奉觴上千萬嵗夀帝悦御花萼樓宴羣臣出藤百奩徧賜之南蠻傳環王以藤為鎧山海經卑山其上多櫐始興記晉中朝有質子將歸忽有人寄其書告曰吾家在觀亭亭廟石間有懸藤君至叩藤家人自出歸者如其言果有二人出水取書并曰江伯令君前入水見屋舎甚麗今俗咸言觀亭有江伯神也異苑永陽縣有山壁立千仞巖上有石室在路右名為神農窟窟前百藥叢茂莫不畢備又别有異藤花形似菱菜朝紫中緑晡黄暮青夜赤五色迭耀杜陽雜編處士伊祁元為上種萬根藤于殿前一子而生萬根枝葉皆碧鉤連盤屈可䕃一畝其花鮮潔狀類芍藥而蘂色殷紅細如絲髮可長五六寸一朶之内不啻千莖亦謂之綘心藤遊張公洞記其陽有懸巖朱藤纒絡巖上丹花蔌蔌下墜芬香襲人汎舟録湖洑兩岸多朱藤故號罨畵溪原詞話秦少游詞有醉卧古藤隂下杳不知南北之句後至藤州而卒増吳郡諸山志穹窿山紫藤塢幽深多藤花可掇一綂志紫花澗在長興縣西北三十里岸皆叢薄朱藤下垂暮春之月紫花滿澗亦名花瀨澗陸龜蒙詩花瀨濛濛紫氣昏原崑山縣志元衣和庵主蘇州崑山人也隐居雪竇之妙髙峰在千丈巖嶺有藤一枝蜿蜒其上下臨不測乃蟠結成龕為藏修之所故號棲雲集藻説増唐舒元輿悲剡溪古藤説剡溪上綿西五百里多古藤株枿逼土雖春入土脉他植發活獨古藤氣候不覺絶盡生意予以為本乎地者春到必動此藤亦本於地方春且有死色遂問溪上人人有道者言溪中多紙工持刀斬伐無時擘剥其皮肌以給其業噫藤雖植物者溫而榮寒而枯養而生殘而死亦將似有命於天地間今為紙工斬伐不得發生是天地氣力為人中傷致一物疪癘之若此異日過數十百郡泊東雒西雍歴見言書文者皆以剡紙相夸乃寤曩見剡藤之死職正由此過固不在紙工且今九牧士人自專言能見文章户牖者其數與麻竹相多聼其語其自安重皆不啻握驪龍珠雖茍有曉寤者其倫甚寡不勝衆者亦皆歛手無語勝衆者果自謂天下文章歸我遂輕傲聖人道使周南召南風骨折入於楊白華中言偃卜子夏文學䧟入於滛靡放蕩中比肩握管動盈數千百人下筆動數千萬言不知其為謬誤日日以縱自然殘藤之命易甚桑枲波波頺沓未見其止如此則妄言文輩誰非書剡紙者耶紙工嗜利曉夜斬藤以鬻之雖舉天下為剡溪猶不足以給況一剡溪者耶以此恐後之日不復有藤生於剡矣大抵人間費用茍得著其理為不枉之道在則暴耗之過莫由横及於物物之資人亦有其時時其斬伐不為夭閼予謂今之錯為文者皆夭閼剡溪藤之説也藤生也有涯而錯為文者無涯世之損物不直於剡藤而已予所以取剡藤以寄其悲五言古詩増梁簡文帝詠藤纖條寄喬木弱影掣風斜標春抽曉翠出霧掛懸花唐芩参石上藤石上生孤藤弱蔓依石長不逢髙枝引未得凌空上何處堪托身為君長萬丈李白紫藤樹紫藤掛雲木花蔓宜陽春密葉隐歌鳥香風流美人韓愈感春偶坐藤樹下暮春下旬間藤隂已可庇落蘂還漫漫斖斖新葉大瓏瓏晩花乾青天髙寥寥兩蝶飛翻翻時節適當爾懐悲自無端原李徳裕思平泉潭上紫藤故鄉春欲盡一嵗芳難再巖樹已青蔥吾廬日堪愛幽溪人未去芳草行應礙遥憶紫藤垂繁英照潭黛増姚合架水藤濛濛紫花藤下復清谿水若遣隨波流不如風飄起風飄或近人隨波千萬里宋梅蕘臣垂澗藤寒松偃澗濵弱蔓垂纓緑波縈翠帶長水濺低花馥終日採蘋人攀條映巖曲朱子垂澗藤寒泉下碧澗古木垂蒼藤䕃此萬里流閒花自層層何人賞幽致白髮巖中僧曹冠卿挂樹藤本為獨立難寄彼髙樹枝蔓引數條遠溟濛千朶垂向日助成隂當風藉持危誰言柔可屈坐見蟠蛟螭明吳寛朱藤嫋嫋數尺藤往嵗手親插西庵敞短簷藉爾兩相夾嵗乆終蔓延枝葉已交接有花散紅纓有子垂皂莢赤日隔繁隂偃息可移榻但憂風雨甚髙架一朝壓霜雪却不妨忍冬共經臘七言古詩増唐李頎愛敬寺古藤歌古藤池水盤樹根左攫右拏龍虎蹲横空直上相陵突丰茸離纚若無骨風雷霹靂連黒枝人言其下藏妖魑空庭落葉作開合十月苦寒常倒垂憶昨花飛滿空殿密葉吹香飯僧遍南階䨇桐一百尺相與年年老霜霰獨孤及和題藤架䔿䔿葉成幄璀璀花落架花前離心苦愁至無日夜人去藤花千里强藤花無主為誰芳相思歴亂何由盡春日迢迢如線長宋唐庚採藤曲效王建體魯人酒薄邯郸圍西河度橋南越悲嵗調紅藤百萬計此貢一作無窮時去年採藤藤已乏今年採藤藤轉竭入山十日脱身歸新藤出土拳如蕨淇園取竹况有年越山採藤輸不前今年採藤指黄犢明年輸藤波及屋吾皇養民如養兒鑿空為此謀者誰范成大次韻李噐之編修靈石山萬嵗藤歌君不見東林怪蔓之詩三百年字如金繩鐵索相紏纒不如李侯靈石句筆陣壓倒長城堅藤隂詩律兩秀發此叚竒事今無前吾聞草木未有不黄落雨荒霜倒相後先緜緜紫藟天所夀風雨不動常蒼然堅姿絶鄰傲一世深本無極融三泉騰虯舞蛟矯欲去流蘇絡帶翩如仙班荆芘藾得吾黨酌泉共吸杯中天詩成一斗屬太白擘牋揮掃如雲烟北門西掖君自有坐擁紅葉然金蓮山腰澗底莫濡滯早晩大風吹蜕蟬五言律詩増唐李嶠詠藤吐葉依松磴舒苖長石䑓神農嘗藥罷質子寄書來色映葡萄架花分竹葉杯金隄不見識玉潤幾重開李徳裕憶新藤遥聞碧潭上春晩紫藤開水似晨霞照林疑彩鳯來清香凝島嶼繁艶映莓苔金谷如相並應將錦帳囘明吴寛藤牆傾何湏附尺地幸相容但惜渠何罪髠為城旦舂纒根維石固食葉有蟲攻卭首疑飛躍乗雲欲化龍五言小律増唐儲光羲駕簷藤得從軒墀下如勝松栢林生枝逐駕遠吐葉向門深何許荅君子簷間朝暝隂五言排律増唐張蠙和友人許裳題宣平里古藤欲結千年茂生來便近松迸根通井潤交葉覆庭穠蓋密勝丹桂層危類遠峰嫩條懸野鼠枯節呌秋蛩翠老霜難蝕皴多蘚乍封幾家遥共翫何寺不堪容客對忘離榻僧看誤過鐘頃因陪預作終夕遶枝笻七言律詩増金馮延登藤花得春字白白紅紅委暗塵蒼藤次第著花新龍蛇奮起三冬蟄纓絡紛垂百尺身見説紫雲偏得意不知翠幄巧藏春齋㕑晩甑清香滿未信侯門有八珍原明王士騏手種藤花大可圍暮春小圃亦芳菲黄鸝隐葉惟聞囀紫蝶尋春不辨飛滿架迎風光眩眼緑溪著雨碧侵衣漫道破除情事盡長條柔蔓轉依依五言絶句増唐錢起古藤引蔓出雲樹垂綸覆巢鶴幽人對酒時苔上閒花落顧況石上藤空山無鳥跡何物如人意委曲結繩文離披草書字原明于若瀛藤古結為梁蜒蜿憑雲霧歩之時動揺疑駕采虹度七言絶句増唐獨孤及垂花䲧醉後戲題并序莊周䑓南十許歩有丘一成上有樛藤垂花而蔓草荒之且隔大溝路不可陟道士張太和伐薪為堰封土以壅澮余亦命薙氏治蕪穢而剗宿莽遂闢為登賦之位位廣一席席間足以凾尊酒二簋三月戊子及羣英由堰而升焉諸花倒垂下拂杯案紫葩縭縰如釵如旒衆君子瞻弄之不足故秉燭進酒以繼落日欲稱醉而不能也因命其地曰垂花塢堰曰緣花堰亦飾之以詩云紫蔓青條覆酒壺落花時與竹風俱歸時自負花前醉笑向鯈魚問樂無許渾紫藤緑蔓濃隂紫袖低客來㽞坐小堂西醉中掩瑟無人㑹家近江南罨畵溪詩散句増唐白居易下如蛇屈盤上若繩縈紆可憐中間樹束縛成枯株原杜甫露浥思藤架􅃄霏想舊叢杳冥藤上下濃淡樹榮枯㢠廻策非新岸所攀仍舊藤増韓愈髙木八九株有藤縷絡之宋宋祁虺蔓相結盤虬梢乆囘曲陸游老夫維小􅖼半醉摘藤花原唐杜甫不見髙人王右丞藍田丘壑蔓寒藤増宋司馬光山椒迢逓峻無極行挽枯藤踏危石宋謝朓丹藤繞新竹周庾信寒藤抱樹疎婉婉藤倒垂長藤連格徙唐蘇頲藤蔓野人家蕭嵩餘花發紫藤孟浩然藤架引梢長原杜甫庭中藤刺簷藤枝㓨眼新對門藤蓋瓦藤蔓曲藏蛇増白居易拂榻藤隂清姚合垂藤壓樹偏李商隐綬藤縈弱蔓蒼崖萬嵗藤皮日休紫藤垂罽珥韋莊藤抽紫蔓肥張蠙蠻藤絡酒瓢袁皓青藤夾岸低宋蘇軾古樹野藤垂陸游壓架藤花重趙師秀藤深失樹身唐王維藤花欲暗藏猱子白居易緑藤隂下鋪歌席方干醉觸藤花落酒杯姚合春風新上數枝藤宋戴昺輕風滿面落藤花元王逢蔓長鴉藤故故青别録増北户録瓊州出五色藤合子書嚢之類細于錦綺亦藤工之妙手也新州作五色藤筌䑓皆一時之精絶者梁劉孝儀謝太子五色藤筌蹄一枚云炎州采藤麗窮綺褥得非筌臺與蹄語訛歟瓊州出紅藤簟一呼為笙或謂之籧篨亦謂之行唐其色殷紅瑩而不垢酉陽雜俎松槙即鍾藤也葉大晉安人以為盤避暑録話晁任道自天台來以石橋藤杖二為贈自言親取于懸崖間柔韌而輕堅如束筋余往自許昌歸得天壇藤杖數十外圓實與此不類而中相若紙箋譜范寗教有上紙藤角紙蜀中有藤紙原製用收採藤花擇浄鹽湯洒拌匀晒乾或蒸熟晒乾皆可留作葷素食料女蘿按兔絲非女蘿或以為一物者謬辨見兔絲譜増爾雅蒙玉女注蒙即唐也女蘿别名廣雅女蘿松蘿也本草一名松上寄生爾雅翼女蘿正青而細長無雜蔓長如帶本草别録曰生熊耳山谷松樹上陶𢎞景曰山東甚多生雜樹上而以松上者為真彚考増詩小雅蔦與女蘿施于松栢水經注沅水又東帶緑蘿山頹巖臨水懸蘿釣渚新論碧蘿附于青松以茂凌雲之葉集藻五言古詩増齊王融詠女蘿羃䍥女蘿草蔓衍旁松枝含煙黄且緑因風卷復垂陳劉刪賦松上輕蘿葉繞千年蓋條依百尺枝屬與松風動時將薜影垂學帶非難結為衣或易披山阿若近遠獨有楚人知五言律詩増唐杜牧緑蘿緑蘿縈數匝本在草堂間秋色寄髙樹晝隂籠近山移花疎處過劚藥困時攀日暮微風起難尋舊徑還詩散句増魏曺植緑蘿緣玉樹光耀粲相輝劉楨青青女蘿草上依髙松枝晉郭璞緑蘿結髙林蒙籠葢一山宋謝靈運想見山阿人薜蘿若在眼伍緝之女蘿依附松終已冠髙枝唐李白緑蘿紛葳􅅋繚繞松柏枝杜甫侍婢賣珠㢠廻牽蘿補茅屋梁吴均女蘿可代裙王筠風氣入纖蘿唐李白飛蘿揺春煙延蘿結幽居松甫髙蘿成帷幄通林帶女蘿于鵠深蘿月不通朱慶餘秋近碧蘿鮮李頻新隂映緑蘿殷璠髙蘿出石懸宋孫覿蘿牽籬羃翠唐李白緑蘿樹下春風來青蘿嫋嫋掛煙樹白居易煙蘿初合澗新開宋孫覿緑蘿髙張翠羽蓋薜荔増爾雅翼薜荔狀如烏韭而生於石上亦緣木生葉厚寔而圓多蔓其寔上鋭而下平外青而中􅀈經霜則􅀈紅而甘鳥烏所啄兒童亦食之謂之木饅頭亦曰鬼饅頭嶺外尤多本草一名木蓮李時珍曰四時不凋厚葉堅强大于絡石不花而實實大如杯微似蓮蓬而梢長正如無花果之生者六七月實内空而紅八月後則滿腹細子大如稗子一子一鬚其味㣲濇其殻虛輕彚考増山海經小華之山其草有薜荔食之已心痛集藻文散句増楚屈原離騷貫薜荔之落蘂九􅁔薜荔柏兮蕙綢采薜荔兮水中罔薜荔兮為帷被薜荔兮帶女蘿九章令薜荔以為理兮憚舉趾而縁木五言絶句増唐顧況薜荔庵薜荔作禪庵重疊庵邊樹空山徑欲絶也有人知處詩散句増宋梅堯臣春城百花發薜荔上隂階根隨枝蔓生葉侵苔蘚碧唐杜甫青垂薜荔長王縉薜荔成帷晚靄多桞宗元宻雨斜侵薜荔牆胡曽蘿荔雨餘山似黛方干窻户凉生薜荔風殷璠淺緑垣牆綿薜荔金髙士談八尺龍蛇薜荔牆絡石増本草絡石一名石鯪一名石龍藤一名懸石一名耐冬一名雲花一名雲英一名雲丹一名石血一名雲珠蘇恭曰生隂濕處冬夏常青實黑而圓其莖蔓延繞樹石側若在石間者葉細厚而圓短繞樹生者葉大而薄韓保昇曰葉似細橘葉莖節著處即生根鬚包絡石旁花白子黑六七八月采陳藏噐曰與薜荔相似更有石血地錦等十餘種藤皆是其類李時珍曰帖石而生其蔓折之有白汁其葉小如指頭厚于木强面青背淡濇而不光有尖葉圓葉二種蓋一物也御定佩文齋廣羣芳譜卷八十一
