製律截筒来自崑崙谷江心蟠石桃竹枝斬根剥皮誇紫玉何如蓬莱宮中竹雨露偏多生意足盤根固節千萬年逺勝猗猗淇水澳上林花木熈青春靈芝瑞草争芳芬愛此蒼蒼太古色竹邊㡬度停逰輪世云鳳凰食竹實又云鳳凰棲竹枝鳳笙九奏太平曲鳳兮凰兮今来儀予將拭目而觀之髙啟愛竹軒為陳維寅賦匡山老客何清真自繞園屋栽蒼筠年来無肉雖苦痩家有萬玉誰言貧一竿䕶惜不忍翦何以持釣横江鱗僮来掃葉自可喜客至踏筍長遭嗔􅚗輈啼罷結逺夢碧雲忽墮湘南春凉隂翛翛潤琴硯落翠冉冉沾衣巾詩成時向節下寫醉墨㸃破烟痕新風来清嘯與相答若聽金奏怡我神知無顔色媚兒女自古相愛惟幽人洛陽陌上花易過歌鐘競賞勞車輪何如此君最耐久嵗晚結托同情親亂聲朝送簾外雨疎影夜拂窓前塵我嘗種此欲免俗即今伐盡惟荆榛故園咫尺未􅀎去移家幸得為子鄰往来儻許如二仲敲門借㸔毋嫌頻王紱過華叔端草堂寫晴竹於壁上我愛君家逺城郭繞簷竹色侵簾幙醉中揮翰寫晴梢湘雲一翦春隂薄㸔来頓覺風氣清耳邊恍若聞秋聲嘯歌到晚不歸去髙卧翠隂呼月明又雨竹髙軒置酒延夕曛眼前知己無如君枯腸醉後有芒角手揮髙節凌青雲圖成自覺精靈聚素壁俄然儀鳳羽擬得秋深直造来翦燭連床聽風雨王佐畫竹瀟湘緑玉崑崙石移向髙堂之素壁四座凉風帶雪吹半窓疎雨和烟滴九疑夢斷瑶瑟寒貼雲影落䨇飛鸞霓旌冉冉欲歸去美人持贈青琅玕也曽拂拭蒼苔色坐弄參差椘天碧曲終日暮山鳥啼自寫幽情寄相憶原王世貞題竹軒吾宗雅語世所聞何可一日無此君汝今卜居但種竹凡草不敢驕相羣籜龍個個迸春雨鳳尾枝枝干碧雲晨呼阿段汲溪潤洗出瀟湘䨇淚文慎莫學辟疆驅大令又莫學張鷹逃右軍扁舟但過醫俗士把臂相將醉夕曛題畫竹野夫䇿杖村南復村北䖏䖏東君恡消息瞥然縞素一枝横又見琳琅數竿碧一枝春之先數竿冬之後俯仰天地間與爾成三友衡門掩臥不一旬淇園太痩無精神樵青已侵翠鳳尾颶母吹散玉龍鱗賴得吳鎮及王冕前與二友傳其真虚堂展㸔僅盈尺二友居然侍吾側問之不言對以臆眉宇肅肅吐佳色吾不䏻學范詹事西遣闗中使却寄江南春消芳悴粉何足論吾不􅀎學家騎曹不可一日無所至植此君封籬䕶籜何紛紜二友寓吾簏儼若洛下東西兩頭屋一頭翦得瀟湘雲一頭小貯羅浮玉鎮也九烟吐吸天漿腴冕亦磊砢節目非凡夫扶輿清氣合此圗快矣乎快矣乎此圗此友吾不孤馮琦題畫竹何人寫此青琅玕滿堂爽颯生秋寒居然坐我三徑下數莖不動風珊珊柏溪先生隐扵酒戲拈秃筆大如帚一幅淋漓竹亦醉醉竹合與先生友矗矗三株狀殊絶迥若蒼虬立烟雪别有一枝秀且長青鸞整翮従風翔葛陂化龍去已乆至今屏幛生輝光我觀此圗懐耿耿墨花亂落團圞影素節偏宜君子堂虚中獨立尚書省尚書華省鳳池隅新長孫枝引鳳雛夔龍禮樂方大􅇱伶倫之管公所須此君何可一日無五言律詩増唐李嶠竹髙簳椘江濆嬋娟􅅤曙氛白花搖鳳影青節動龍文葉掃東南日枝梢西北雲誰知湘水上流淚獨思君張九齡和黄門盧侍郎詠竹清切紫庭垂葳蕤防露枝色無𤣥月變聲有惠風吹髙節人相重虚心世所知鳳凰佳可食一去一来儀蔣渙奉和徐侍郎中書叢篠韻中禁夕沈沈幽篁别作林色連雞樹近影落鳳池深為重凌霜節􅀎虚應物心年年承雨露長對紫庭隂原杜甫苦竹青𡨕亦自守軟弱强扶持味苦夏蟲避叢卑春鳥疑軒墀曽不重翦伐欲無辭幸近幽人屋霜根結在兹嚴鄭公宅同詠竹緑竹半􅅤籜新梢纔出牆色侵書帙晚隂過酒樽凉雨洗娟娟浄風吹細細香但令無剪伐㑹見拂雲長増劉長卿斑竹岩蒼梧在何䖏斑竹自成林㸃㸃留殘淚枝枝寄此心寒山響易滿秋水影偏深欲覓樵人路蒙籠不可尋郎士元和王相公題中書叢竹寄上元相公多時仙徑裏色並翠琅玕幽意􅅤烟月清隂庇蕙蘭枝繁宜露重葉老愛天寒竟日䨇鸞止孤吟為一㸔李益竹窓聞風寄苗發司空曙微風驚暮坐臨牖思悠哉開門復動竹疑是故人来時滴枝上露稍沾階下苔何當一入幌為拂緑琴埃楊巨源池上竹一叢嬋娟色四面清冷波氣潤晚烟重光閒秋露多翠筠入疎栁清影拂圎荷嵗晏琅玕實心期有鳳過元稹新竹新篁纔觧籜寒色已青葱冉冉偏凝粉蕭蕭漸引風扶疎多透日寥落未成叢唯有團團節堅貞大小同山竹枝深院虎溪竹逺公身自栽多慙折君節扶我出山来貴托安危步難將混俗材還投輞川水從作老龍囘姚合竹裏徑微徑嬋娟裏唯同静者知跡深苔長䖏步狭筍生時髙是連幽樹窮應到曲池紗巾靈夀杖行樂復相宜李賀竹入水文光動抽空緑影春露華生筍徑苔色拂霜根織可承香汁裁堪釣錦鱗三梁曽入用一節奉王孫李德裕竹逕野竹自成逕繞溪三里餘檀欒被層阜蕭瑟映清渠日落見林静風行知谷虚田家故人少誰肎共㷊魚杜牧栽竹本因遮日種却似為溪移歴歴羽林影疎疎烟露姿蕭騷寒雨夜敲戞晚風時故國何年到塵冠挂一枝題劉秀才新竹數莖幽玉色曉夕翠烟分聲破寒窓夢根穿緑蘚紋漸籠當檻日欲礙入簾雲不是山隂客何人愛此君許渾秋日白沙館對竹蕭蕭凌雪霜濃翠異三湘疎影月移壁寒聲風滿堂卷簾秋更早髙枕夜偏長忽憶南溪路萬竿今正凉方干方著作畫竹叠葉與髙節俱從毫末生流傳千古譽研錬十年情向月本無影臨風疑有聲吾家釣臺畔似此兩三莖劉得仁昊天觀新栽竹清風枝葉上山鳥已棲来根别古溝岸影生秋觀苔遍思諸草木惟此出塵埃為恨移君晚空庭更擬栽薛􅀎竹逕盤逕入依依旋驚幽鳥飛尋多苔色古踏碎籜聲微鞭節横妨户枝梢動拂衣前溪聞到䖏應接釣魚磯碧鮮庭春題竹竹少竹更重碧鮮强更名有䦨常凭立無徑獨穿行夕月隂何亂春風葉盡輕已聞圖畫客兼寫薛先生李咸用庭竹嫩緑與老碧森然庭砌中坐消三伏景吟起數竿風葉影重還宻梢聲逺或通更期春共㸔桃映小花紅杜荀鶴新栽竹斸破蒼苔色因栽十數莖窓風従此冷詩思當時清酒入杯中影碁添局上聲不同桃與李瀟灑伴書生孫峴賦竹送徳林少尹貟外萬物中瀟灑修篁獨逸羣貞姿曽冒雪髙節欲凌雲細韻風初發濃烟日正曛因題偏惜别不可暫無君李中庭竹偶自山僧院移歸傍砌栽好風終日起幽鳥有時来篩月牽詩興籠烟伴酒杯南窓睡新起蕭颯雨聲㢠廻張蠙新竹新鞭暗入庭初長兩三莖不是他山少無如此地生垂梢叢上出柔葉籜間成何用髙唐峡風枝掃月明王周碧鮮亭飋飋籠清籟蕭蕭鏁翠隂向髙思盡節従直美虛心㢠砌滋蒼蘚幽窓伴素琴公餘時引步一徑静中深薛濤酬人雨後翫竹南天春雨時那鑒雪霜姿衆類亦云茂虚心寧自持多留晉賢醉早伴舜妃悲晚嵗君􅀎賞蒼蒼勁節竒宋王禹偁對鄰家竹東隣誰種竹偏稱長官心月上分清影風来恵好音低枝疑見接迸筍似相尋多謝此君意墻頭誘我吟韓琦長安府舍竹徑北榭層基下森森竹徑幽枝繁低拂葢根宻僅通流勁節輕環粉狂鞭怒走虬風霜胡可動松栢乃吾儔梅堯臣縣署叢竹裊裊幽亭竹團團自結叢寒生緑罇上影入翠屏中陶栁應慚弱潘花只競紅方持雪霜操不敢倚春風翠竹亭種竹㡬千個結亭三四椽逰人多寂静啼鳥亦留連酒有陶公愛林希阮氏賢我来歸路逺躍馬古城邊細竹森森漢宮竹託本異孤生玉砌縁根迸朱欄與筍平朝烟生宻翠晩影漏斜明應待女媧采參差鳳琯清司馬光䨇竹詩有引草木類同而種殊者竹為多杭州廣巖寺有䨇竹相比而生舉林皆然其尤異者生枯樹腹中自其頂出森然駢竦樹如龍蛇相縈矯首砑然予見而賦之䨇幹標孤腹青青凡㡬霜龍騰䨇角直鯨噴兩鬚長詎欲尋支遁安􅀎問辟疆屢来非别意未與此君忘蘇軾次韻子由緑筠堂愛竹􅀎延客求詩剰掛牆風梢千纛亂月影萬夫長谷鳥驚碁響山蜂識酒香只應陶靖節㑹聽北窓凉蘇軾和孔武仲金陵華蔵寺此君亭緑竹不可數孤亭一倍幽色分岩石潤梢出澗松修雪節寒方見春萌早不抽故山多此物長恨未歸林次韻荅人檻竹猗猗元自直落落不須扶宻節風吹展清隂月共鋪叢長傲霜雪根瘦恥泥塗更種愁無地應須翦碧蘆詠竹湖濵宜草木修竹可三尋㕓居多野思移種近墻隂及爾迷未醒方予熱正侵無嫌不逮本地薄肎成林南隣竹正茂門巷不容賔懸印君當往囊金我患貧翠旌梢亂起犀角筍初勻不惜圖書賣端来作主人移竹墻隂竹蒙宻板築念相妨欲補東園缺欣乗雨後凉三年生筍遍一徑引風長但恐翁彌老笻枝懶復將黄庭堅和師厚栽竹大隐在城市此君真友生根須辰日斸筍要上畨成龍化葛陂去鳳吹阿閣鳴草荒三徑斷嵗晚見交情朱子次韻擇之詠竹竹隖深深䖏檀欒繞舍青暑風成慘淡寒月助清泠客去空塵榻詩來拓采櫺此君同一笑午夢頓􅀎醒黄希旦詠竹生涯何所有滿砌植琳琅痩影碎秋月健梢横曉霜且従喧鳥雀終待集鸞凰吟遶都㤀却誰知此興長元黄庚對竹門對南鄰竹青青玉萬竿雖然無地種且得隔籬㸔露葉晴猶濕風枝夏亦寒但教休翦伐何用報平安杜本寄題竹軒緑竹翛翛䖏華軒椘椘深暮留雛鳳宿曉聽蟄龍吟月進窓櫺影雲移几席隂居然淇澳趣莫使俗塵侵僧善住盆竹瓦缶不多土娟娟枝葉蕃豈知么鳳尾元是古龍孫蒼雪灑禪榻細香浮酒尊王猷来此見應亦為銷魂明袁凱聞張䖏士竹林甚盛欲觀未􅀎兼簡王一秀才聞道南村竹春来接逺坡色侵沽酒斾聲送濯纓歌甚欲敲門㸔須慿拄杖過餘隂過西沼應覆右軍鵞李東陽竹坡種竹前坡滿其如秋興何迥􅅤山氣爽低礙夕陽多有地留冰雪無心鬬綺羅錦衣歸稚子洗耳聽鳴珂種竹種竹幽堂下凉生暑氣微愛長過我屋㸔緑上人衣坐久月初出夢囘風漸稀一竿如可釣吾欲問漁磯剰買城中地多應為此君凉生别院雨緑補後溪雲秋至不改色夢醒時一聞㕓居或未免聊爾洗塵氛陳憲章雨中栽竹心被清虛引非闗索竹㸔檐前纔數箇淇上已千竿微雨土初覆北風天正寒昆丘有孤鳳何䖏啄琅玕原申時行竹徑欲借淇園勝凌霜挺萬竿月来金影碎風動玉聲寒障暑隂堪息停雲秀可餐相過惟二仲盡日倚琅玕于若瀛詠竹緑筍半􅅤籜新梢纔作林色連梧井近根入槿籬深雅有凌寒操􅀎虚應世心拂雲不須待常對小庭隂戈汕題竹有竹見庭好當杯意轉親清聲風間出文影日斜陳檻近迎根直天空寫葉真知君杜寒暑長伴痩吟身嵗暮㸔吾輩蕭疎賴此君横枝馴怪石直節藐寒雲松傲低為伴梅清艶不羣有時當積雪秉燭倚霄分王徳操詠竹幽居思伴侶惟有此君宜蕭颯既同我清空亦可師吟時聲應和步䖏影追隨不作人間態炎凉意便移増僧源際偶題竹上冷翠何𡨕宻幽尋獨坐時扉開流水過風静到雲遲嬾性知終棄虚心幸自持偶然吟未稳清響動髙枝御定佩文齋廣羣芳譜卷八十四
