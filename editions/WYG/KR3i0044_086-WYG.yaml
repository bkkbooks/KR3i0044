body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十四竹譜竹三集藻五言古詩御製竹林禪院在潤州城南竹逕數里一逕入深竹數里来上方叢生巖磴宻枝拂雲烟長華旗出林際芝葢停三陽颯颯吹霜風碧葉紛翺翔山齋頗幽寂萬籟􅅤虛光觸物感余懐歌彼淇澳章増齊謝脁秋竹曲㛹娟綺窓北結根未參差従風既裊裊映日頗離離欲求棗下吹别有江南枝但􅀎凌白雪貞心䕃曲池詠竹窓前一叢竹青翠獨言竒南條交北葉新筍雜故枝月光踈已宻風来起復垂青扈飛不礙黄口得相窺但恨従風籜根株長别離北齊蕭放詠竹懐風枝轉弱防露影逾濃既来丹穴鳳還作葛陂龍梁元帝賦得竹嶰谷管新抽淇園節復修作龍還葛水為馬向并州柯亭臨絶澗桃枝夹細流冠學芙蓉勢花堪威鳳㳺卬王若有獻張騫應拜侯沈約簷前竹萌開籜已垂結葉始成枝繁䕃上蓊茸促節下離離風動露滴􅅹月照影參差得生君户牖不願夹華池吳均緑竹嬋娟鄣綺殿繞弱拂春漪何當逢採拾為君笙與箎劉孝威詠枯葉竹枯楊猶更緑臥栁尚還生勿嫌鳳不至終當待聖明劉孝先詠竹竹生空野外梢雲聳百尋無人賞髙節徒自抱貞心恥染湘妃淚羞入上宫琴誰􅀎製長笛當為吐龍吟虞羲見江邉竹挺此堅貞性来樹朝夕池秋波潄下趾冬雪封上枝葳蕤防曉露葱蒨集羈雌􅅤風自颯颯負雪亦猗猗金明無異狀玉洞良在斯但恨非嶰谷伶倫未見知江洪和新浦侯齋前竹本生出髙嶺移賞入庭蹊檀欒拂桂橑蓊葱傍朱閨夜條風析析曉葉露凄凄籜紫春鶯思筠緑寒蛩啼不惜凌雲茂遂聽羣雀棲願抽一莖實試㸔翔鳳来陳隂鏗侍宴賦得夹池竹夹池一叢竹垂翠不驚寒葉醖宜城酒皮治薛縣冠湘川染别淚衡嶺拂仙壇欲見葳蕤色當来兎苑㸔張正見賦得風生翠竹裏應教金風起燕觀翠竹夹梁池翻花疑鳳下颺水似龍移帶露依深葉飄寒入勁枝聊因萬籟響詎待伶倫吹賦得山中翠竹修竹映巖垂来風異夹池複澗藏髙節重林隠勁枝雲生龍未上花落鳳將移莫言棲嶰谷伶倫不復吹賀循賦得夹池修竹緑竹影參差葳蕤帶曲池逢秋葉不落經寒色詎移来風韻晚逕集鳳動春枝所欣髙蹈客未待伶倫吹唐虞世南賦得臨池竹葱翠梢雲質垂彩映清池波泛􅅤風影流揺防露枝龍鱗漾嶰谷鳳翅拂漣漪欲識凌冬性惟有嵗寒知陳子昂修竹篇龍種生南嶽孤翠鬱亭亭峰嶺上崇崒烟雨下微𡨕夜聞鼯䑕叫晝聒泉壑聲春風正澹蕩白露已清泠哀響激金奏宻色滋玉英嵗寒霜雪苦􅅤彩獨青青豈不厭凝冽羞比春木榮春木有榮歇此節無凋零始願與金石終古保賢貞不意伶倫子吹之學鳳鳴遂偶雲和瑟張樂奏天庭妙曲方千變簫韶亦九成信蒙雕斵美常願事仙靈驅馳翠虬駕伊鬱紫鸞笙結交嬴臺女吟弄升天行携手登白日逺逰戲赤城低昻𤣥鶴舞斷續綵雲生永隨衆仙逝三山逰玉京原李白慈姥竹野竹攅石生􅅤烟映江島翠色落波深虚聲帶寒早龍吟曽未聽鳳曲吹應好不學蒲栁凋貞心常自保杜甫營屋我有隂江竹􅀎令朱夏寒隂通積水内髙入浮雲端甚疑鬼物慿不顧翦伐殘東偏若面勢户牖永可安愛惜已六載兹晨去千竿蕭蕭見白日洶洶開奔湍度堂匪華麗養拙異考槃草茅雖薙葺衰疾方少寛洗然順所適此足代加餐寂無斧斤響庶遂憇息歡増韋應物對新篁新緑苞初觧嫩氣筍猶香􅅤露漸舒葉抽叢稍自長清晨止亭下獨愛此幽篁戴叔倫竹卷籜正離披新枝復􅂪宻翛翛月下聞褭褭林際出豈獨對芳菲終年色如一盧綸顔侍御㕔叢篁詠送薛存誠玉榦百餘莖生君此堂側拂簾寒雨響擁砌深溪色何事鳳凰雛兹焉理歸翼李益竹磎訪竹越雲崖即林若磎絶寧知修榦下漠漠秋苔潔清光溢空曲茂色臨水澈採摘愧芳鮮奉君嵗暮節張南史竹竹價長東南别種殊草木成林䖏䖏雲抽筍年年玉天風起成韻池水涵更緑閒臨庾信園數竿心自足栁宗元茅簷下始栽竹瘴茅葺為宇溽暑恒侵肌適有重腿疾蒸鬱寧所宜東鄰幸導我樹竹邀凉颸欣然惬我志荷鍤西巖垂椘壤多怪石墾鑿力已疲江風忽云暮輿曵還相追蕭瑟過極浦旖旎附幽墀貞根期永固貽爾寒泉滋夜窓遂不掩羽扇寧復持清泠集濃露枕簟淒已知網蟲依宻葉曉禽棲迥枝豈伊紛囂閒重以心慮怡嘉爾亭亭質自逺棄幽期不見野蔓草蓊蔚有華姿諒無凌寒色豈與青山辭巽公院苦竹橋危橋屬幽逕繚繞穿疎林迸籜分苦節輕筠抱虚心俯瞰涓涓流仰聆蕭蕭吟差池下烟日嘲􅑜鳴山禽諒無要津用棲息有餘隂原韓愈題新竹筍添南堦竹日日成清閟縹節已儲霜黄苞猶揜翠出欄抽五六當户羅三四髙標陵秋嚴貞色奪春媚稀生巧補林併出疑争地縦横乍依行爛漫忽無次風枝未飄吹露粉先􅅤淚何人可携玩清景空瞪視増白居易湓浦竹潯陽十月天天氣仍溫燠有霜不殺草有風不落木𤣥𡨕氣力薄草木冬猶緑誰􅈕湓浦頭㢠廻眼㸔修竹其有顧盼者持刀斬且束剖劈青琅玕家家葢牆屋吾聞汾普間竹少重如玉胡為取輕賤生此西江曲題小橋前新竹招客雁齒小紅橋垂簷低白屋橋前何所有苒苒新生竹皮開折褐錦節露抽青玉筠翠如可餐粉霜不忍觸閒吟聲未巳幽翫心難足管領好風烟輕欺凡草木誰􅀎有月夜伴我林中宿為君傾一杯狂歌竹枝曲新栽竹佐邑意不適閉門秋草生何以娛野性種竹百餘莖見此溪上色憶得山中情有時公事暇盡日繞闌行勿言根未固勿言隂未成已覺庭宇内稍稍有餘清最愛近窓臥秋風枝有聲東樓竹瀟灑城東樓繞樓多修竹森然一萬竿白粉封青玉卷簾睡初覺欹枕㸔未足影轉色入樓牀席生浮緑空城絶賔客向夕彌幽獨樓上夜不歸此君留我宿竹窓嘗愛輞川寺竹窓東北廊一别十餘載見竹未曽㤀今春二月初卜居在新昌未暇作廐庫且先營一堂開窓不糊紙種竹不依行意取北簷下窓與竹相當遶屋聲淅淅逼人色蒼蒼烟通杳靄氣月透玲瓏光是時三伏天天氣熱如湯獨此竹窓下朝㢠廻觧衣裳輕紗一幅巾小簟六尺牀無客盡日静有風終夜凉乃知前古人言事頗諳詳清風北窓卧可以傲羲皇洗竹布裘寒擁頸氊履溫承足獨立冰池前久看洗霜竹先除老且病次去纖而曲翦葉猶可憐琅玕十餘束青青復籊籊頗異凡草木依然若有情㢠廻頭語僮僕小者截魚竿大者編茅屋勿作篲與箕而令糞土辱原元稹種竹並序昔樂天贈予詩云無波古井水有節秋竹竿予秋来種竹㕔下因而有懐聊書十韻昔公憐我直比之秋竹竿秋来苦相憶種竹㕔前㸔失地顔色改傷根枝葉殘清風猶淅淅髙節空團團鳴蟬聒暮景跳蛙集幽欄塵土復晝夜梢雲良獨難丹丘信云逺安得臨仙壇瘴江冬草緑何人驚嵗寒可憐亭亭幹一一青琅玕孤鳳竟不至坐傷時節闌増元稹寺院新竹寶地琉璃圻紫苞琅玕踴亭亭巧於削一一大如拱冰碧林外寒峰巒眼前聳槎枒矛㦸合屹仡龍蛇動烟泛翠光流嵗餘霜彩重風朝竽籟過雨夜鬼神恐佳色有鮮妍修莖無擁腫節髙迷玉鏃籜綴疑花捧詎必太山根本自仙壇種誰令植幽壤復此依閒冗居然霄漢姿坐受藩籬壅噪集勌鴟烏炎昬繁蠛蠓未遭伶倫聽非安子猷寵威鳳来有時虚心豈無奉和東川李相公慈竹十二韻慈竹不外長宻比青瑶華茅攅有森束玉立無蹉跎纖粉妍膩質細瓊交翠柯亭亭霄漢近靄靄雨露多冰碧寒夜聳簫韶風晝羅烟􅅤朧朧影月泛鱗鱗波鸞鳳一以顧燕雀永不過幽姿媚庭實顥氣凌天涯峻節髙轉露貞筠寒更佳托身仙壇上靈物神所呵時與天籟合日聞陽春歌應憐孤生者摧折成病疴鮑溶雲溪竹園翁硠硠雲溪裏翠竹和雲生古泉積見深竦竦如刻成椘客臥雲老世間無姓名因兹千畝業以代䨇牛耕亂林不可留寸莖不可輕風暖鬭出地仰齊故年莖幽室結白􅈋宻葉羅衆清照水寒澹蕩對山緑峥嶸蒼翠􅅤古貎秋桂儼白英相㸔受天風深夜戞撃聲姚合垣竹種竹愛庭際亦以資翫賞窮秋雨蕭條但見墻垣長宣尼髙數仞固應非土壤渚上竹葉葉新春筠下復清淺流微風屢此来决决復翛翛詩人月下吟月墮吟不休張仲方賦得竹箭有筠東南生緑竹獨美有筠箭枝葉詎曽凋風霜孰云變偏宜林表秀多向嵗寒見碧色乍葱蘢青光常蒨練皮開鳳彩出節勁龍文現爰此守堅貞􅅤歌屬時彦溫庭筠春盡與友人入裴氏林探漁竿一逕互紆直茅棘亦已繁晴陽入荒竹曖曖如春園倚杖息憇倦徘徊戀微暄厯尋嬋娟節翦破蒼筤根地僻修莖孤林振餘籜翻適心在所好非必尋湘沅皮日休公齋詠新竹笠澤多異竹移之植後楹一架三百本緑沉森𡨕𡨕圎緊珊瑚節釤利翡翠翎儼若青帝仗矗如紫姑屏槭槭微風度漠漠輕靄生如神語鈞天似樂奏洞庭一翫九藏冷再聞百醒有根可以執有􅘽可以馨願稟君子操不敢先凋零陸龜蒙和襲美公齋詠新竹别隖破苔蘚嚴城樹軒楹恭聞稟璇璣化質離青𡨕色可定雞脛實堪招鳳翎立窺五嶺秀坐對三都屏晴月窈窕入曙烟霏微生昔者尚借宅况来䖏賔庭金罍縦傾倒碧露還鮮醒若非抱苦節何以偶惟馨徐觀穉龍出更賦錦苞零李咸用題友生叢竹菊華寒露濃蘭愁曉霜重指佞不長生蒲萐今無種安如植叢篁他年待棲鳳大則化龍騎小可釣璜用留烟伴獨醒㢠廻隂冷閒夢何妨積雪凌但為清風動乃知子猷心不與常人共陳陶題僧院竹喜逰蛟井寺復見炎州竹杳靄萬丈間嘯風清獨速江南正霜霰吐秀弄顓頊似瑞驚堅貞如魔試金粟筍非孝子泣文異湘靈哭金碧誰與隣蕭森自成族新聞赤帝種子落毛人谷逺祖賜鷦鵬遺芳遍南陸對烟蘇麻醜夹澗篔簹伏美譽動丹青􅅛姿􅃩秦蜀因縁鹿苑識想像虵丘斸㡬葉别黄茅何年依白足龍樹蟄一花砌瑤埽雲屋色静曼仙花名髙給孤獨青葱太子樹灑落觀音目法雨每沾濡玉毫時照燭離居鸞節變住冷金顔縮豈念葛陂榮幸無祖父辱光揺水精串影送蓮花軸江鶩日相尋野鶴時寄宿幽香入茶竈静翠直碁局肎羡垣上蒿自多籬下菊從来道生一况伴龜藏六棲託詎星㢠廻檀欒已雲矗霞杯𫝊縹葉羽管吹紫玉久絶釣竿歌聊裁竹枝曲媿生黄金地千秋為師緑僧皎然寒竹裊裊孤生竹獨立山中雪蒼翠揺勁風嬋娟帶寒月狂風不相似還共凌冬發宋梅堯臣雨中移竹荷鍤冒秋霖匆匆移翠竹欲分溪上隂聊助池邊緑中散林未開子猷心已足青青謝栽培豈媿凡草木紫竹西南産修竹色異東筠緑裁簫映檀唇引枝宜鳳宿移従㡬千里不改生幽谷和平叔道傍竹野田有修竹叢疎飽扵霜下上乏佳禽左右雜枯桑豈無行路子行路厭榛荒忽見此翠色徘徊未􅀎㤀車馬去何疾㢠廻顧隔山岡和永叔刑部㕔看竹蒼蒼庭中竹事莫歎遲速不同欄下草一嵗一㢠廻緑朝開花照耀暮落風相逐何如飽霜雪冬夏森寒玉誰將種官舍本合近嚴屋不可一日無瀟灑㸔未足阮生豈其愚林中醉醽醁我當明月時移床来此宿和王景彛省中詠孤竹愛此孤生竹碧葉琅玕柯結根甘泉裏豈必泰山阿曽莫學兎絲徒以附女蘿風㢠廻掃庭户夜月誰與過擬水西寺詠隂崖竹背嶺斷崖下老竹生扶疎孤根石上引勁節松不如莫言霜雪多終見緑有餘蘄竹顋肥節腦瘦蘄水長笛材洛陽袁氏塢此竹舊移来雪霰飽已久竅星誰為開與君作龍吟吹發江南梅歐陽修初夏劉氏竹林小飲春榮忽已衰夏葉換初秀披荒得深蹊掃緑䕃清晝萬竿交已聳千畝蔚何富驚雷迸狂鞭霧籜舒文繡虚心髙自擢勁節晚愈痩雖慙桃李妖豈愧松柏後川原湛新霽林麓洗昬霿猗猗色可餐滴滴翠欲溜况兹夏首月景物得嘉候晚蝶舞新黄孤禽弄清咮窺深入窓蒙玩宻愛林茂依依帶幽澗隐隐見孤岫林蓀縟堪眠野汲冷可潄鳴琴瀉山風髙瀨發仙奏暑却自蠲渴心閒疑愈疚杯盤雜芬芳圗籍羅左右怡然㤀簪組釋若出羈廐矧予懐一丘未得觧黄綬官事偶多閒郊扉須屢叩新篁漸添林晚筍堪薦豆誰邀接䍦公有酒幸相就劉敞詠庭前箭竹冉冉東南美託根那在兹鳳凰不可待嵗月方屢移非復山林意空餘霜霰姿清風有時至獨與幽人期原司馬光題鮮于子駿竹軒兹軒最灑落歴歴種琅玕正晝薄雲稀蕭蕭風雨寒翠隂凉晏坐疎韻成清歡錦籜裁夏扇玉筍供春盤晴蝸潛葉底􅊕雀投林端幽興遇物惬髙懐隨䖏安且免一日無何須千畝寛増司馬光種竹齋吾愛王子猷借宅亦種竹一日不可無瀟灑常在目雪霜徒自白柯葉不改緑殊勝石季倫珊瑚滿金谷種竹種竹南墻隂竹生皆北嚮茍非陽在北竹性安可强乃知就陽意草木皆有情園葵最柔弱獨取傾心名蘇軾和子由記園中草木官舍有叢竹結根問囚㕔下為人所徑土宻不容釘慇懃戒吏卒插棘䕶中庭繞砌忽墳裂走鞭瘦竛竮我常携枕簟来此䕃寒青日暮不􅀎去臥聽窓風泠御史臺竹今日南風来吹亂庭前竹低昂中音㑹甲刃紛相觸蕭然風雪意可折不可辱風霽竹亦囘猗猗散青玉故山今何有秋雨荒籬菊此君知健否歸歸南軒緑蘇轍賦園中所有寒地竹不生雖生常若病斸根種幽砌開葉何已猛嬋娟冰雪姿散亂風日影繁華見孤淡一個敵千頃令人憶江上森聳縁岸勁無風籜自飄䇿䇿鳴荒逕和鮮于子駿益昌官舍竹軒幽軒離紛華惟有一叢竹纎梢起餘寒紫筍散輕馥擢幹春雨餘挺節秋霜足不知嵗時改守此娟娟緑上有吟風蟬空腹未嘗食翦伐非所辭不受塵土辱次韻子瞻御史臺竹故園今何有猶有百竿竹春雷起新萌不放牛羊觸雖無朱欄擁不見紅塵辱清風時一過交戞響鳴玉淵明避紛紜歸嗔東籬菊嗟我獨何為棄此北窓緑養竹病竹養經年生筍大如母初番放出林末番任供口欲求五寸圍更聽三年後蕭疎盡椽桷無復堪作帚吾廬適營葺便可開户牖秀色到衣冠清風盪塵垢物生恨失養養至無不厚斧斤日摧剥隂陽日難救閑居玩草木農圃即師友養人如養竹舉目皆孝秀黄庭堅和甫得竹數本扵周翰喜而作詩和之初侯一畝宮風雨到卧席前日築短垣昨日始封植平生嵗寒心樂見嵗寒色翩翩佳公子為􅃱一窓碧憶公来相居筮吉龜墨食人言陋如何我自適其適白眼對俗徒醉帽坐欹側人知愛酒爾不觧心自得阿堵絶往還此君是賔客清風吹月来驩甚折齒屐有節似見聖無言諒知黙數囘長者車猶恨地未僻隂雨打葉時曲肱自宴息心㳺萬物初何䖏尋轍迹従来修竹林乃是逸民國秦觀次韻曽存之嘯竹軒翩翩曾公子子猷定前身嗜好準疇昔了然不緇磷寄食平準官植竹當比鄰朝與竹相對暮與竹相親安可一日無此君真可人晁補之秋竹秋風多煩寃竹是嵗寒物朝寒堦玲瓏暮寒堦䘏勿翻然下一葉未覺痩􅒞崒豈無陳根旁寂寞衆頭屈何時雷填填㸔爾射地出朱子新竹春雷殷岩際幽草齊發生我種南窓竹戢戢已抽萌坐獲幽林賞端居無俗情元虞集髙竹臨水上髙竹臨水上幽花在崖隂以彼貞女姿當此君子心春陽不自媚夕露忽已深湘妃昔鼔瑟悵望蒼梧岑傅若金寒竹篇寒竹依澗阿竹生何磊磊滋息因厚地生成藉𤣥宰春陽散華景枝葉被光彩及兹芳嵗䦨使吾憂心痗遽悲凛節變但恐驚塵凂寒燠既異宜遲暮復焉悔淇園䕃未息嶰谷音猶在君子夙相好深懐邈雲海竹性諒靡遷人心懼中改願言卒封植勿使傷樵采王士熙江上竹蕭蕭江上竹依依徧山麓晨霞屑眀金夕月擁寒玉梢梢緑鳳翼葉葉青鸞足深叢疑立壁髙節折垂纛荒凉􅅤雨露歴亂同草木不求筍煑羮不求椽架屋搴條作長笛吹我平調曲丁復竹山離離鳳食幹綿互亘修巒君子懐静儀虚貞媚蒼寒靈厓發潛穎崇苞閟幽盤筮鄰從蔣詡永結求羊歡明楊基湘竹朝行湘竹下暮宿湘竹中雲情與雨態萬變俄不同宻宻深翳日疎疎細􅅤風新梢露裊裊花節烟濛濛紛如千靈妃從以萬青童幡幢列縹緲環珮搖丁東来従蔚藍天步入東華宮悵望不可即翩然若驚鴻夭矯喜而笑低囘俯乃恭質堅本外直性潔縁中空籊爾中弦矢揉之可彤弓冰雪誓不易肎與時汚隆今朝揭春晴更覺翠色濃戢戢琅玕叢忽見桃花紅直疑路不逺便與桃源通我欲捐輕舟褰衣入崆峒春禽迎我啼音響諧孤桐終當聽山雨自號蒼筤翁李東陽懐竹三年不種竹得竹如得玉十日不見竹一日腸九曲初聞平安報舊葉舒更緑忽聽歡笑聲新筍抽五六兒童亦觧事知我性無欲平生愛孤澹不厭食無肉慿將垂老身醫此未盡俗倉皇欲傾倒愁病相縛束昨夜偶夢之清風灑心目呼童汲泉水日夕勤灌沃吳寛竹翛然數君子落落俱長身東家每借㸔步去不嫌頻移栽幸許我已自前年春自我得此輩園居豈為貧但憂積雨霽日暴少精神終然勤灌溉枝葉還如新因兹悟為學黽勉在斯晨七言古詩增陳張正見賦得階前嫩竹翠竹梢雲自結叢輕花嫩筍欲凌空砌曲横枝屢觧籜階前疎葉强来風欲知抱節成龍䖏當扵山路葛陂中唐宋之問緑竹引青溪緑潭潭水側修竹嬋娟同一色徒生仙實鳳不逰老在空山人詎識妙年秉願逃俗紛歸臥嵩丘弄白雲􅅤情傲睨慰心目何可一日無此君岑參范公叢竹歌並序職方郎中兼侍御史范公乃扵陕西使院内種竹新製叢竹詩以見示美范公之清致雅操遂為歌以和之世人見竹不觧愛知君種竹府庭内此君托根幸得地種来㡬時聞已大盛暑翛翛叢色寒閒宵槭槭葉聲乾􅀎清案牘簾下見宜對琴書窓外㸔為君成隂將蔽日迸筍穿堦踏還出守節偏凌御史霜虚心願比郎官筆君莫愛南山松樹枝竹色四時也不移寒天草木黄落盡猶自青青君始知原白居易畫竹歌并引協律郎