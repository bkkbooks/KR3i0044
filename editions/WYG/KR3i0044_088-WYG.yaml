body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷八十六竹譜附録筍増爾雅筍竹􅎯註初生者疏竹初􅎯生謂之筍凡草木初生謂之􅎯筍則竹之初生者故曰筍竹􅎯也可以為菜殽䈚箭􅎯註􅎯筍屬說文筍竹胎也筍譜筍始冒土者為􅎯生長挺挺然為筍也筍與笋通或又作箰古文作一名篛竹土内皮中謂之篛也一名竹牙即牙目之牙也一名茁謂竹􅎯初生茁茁然一名初篁初始也篁竹也一名竹子神異經云􅀢竹子羙煮而食之張華注云子筍也其種有笆竹筍八月生盡九月竹與筍俱有刺芒郿竹筍長節深根冬夏皆生箭筍十二月生㑹稽以來諸山絶多䈄􅢭筍自甌越以南七月生至八月盡鷰筍錢塘多生其色紫苞當鷰至時生故俗謂鷰筍天目筍五月生盡六月色黄出天日山端午後方採鬻旱嵗則無竹王林筍其筍密密冒土南地熱多冬生桃竹筍生涪陵相思崖質柔弱有異孤竹筍三年生一筍及筍成竹竹母已枮旋味筍一名苦蒲筍福州南多生苦竹春則生筍土人煑食甚苦而且澀及停久則味還可食故名􅮂竹筍出交趾竹實中有毒筍亦内實桂竹筍見山海經今未詳桂竹狀貌筍亦難識􅓁竹筍生海畔山竹與筍皆有毛傷人則死又有荏筍同此毒􅥮竹筍竹本根長千丈生海畔山其竹􅎯數丈猶為筍也簩竹筍無肉不可食䇘筍七月生至十月間縉雲以南多出味苦節疎大於箭筍少許山人採剥以灰汁熟煑之都為金色然後可食苦味減而甘食甚佳也􅲴筍出温處建以來春生可食釣絲竹筍南越多之下廣上銳味甘可食發病木竹筍今靈隠山中出筍堅可食卭竹筍出蜀中臨卭春生羅浮山記曰此山左右時有之今山有筍生又早時候與蜀不同赤竹筍出閩中無毒衞丘竹筍山海經註衞丘舜林中竹一節可以為船筍可知矣蘆竹筍味苦可食出廬州對青竹筍可食出成都慈母山竹筍江寧縣南慈母山竹其筍圓緻異於餘處三月生可食鍾龍竹筍可食漢竹筍一節可受二三斗味雖甘而澀利竹筍随竹蔓而生亦實韌也簢筍筍嫩而節耎薄鄰竹筍味同木竹筍雲母筍廣志云大竹也其筍亦相稱箘筍簵筍尚書注箘簵美竹也母既曰美竹厥萌可曰美筍筍皮青而肉晳白少室竹筍長偉堪食渭川筍生晚四月方盛鄠杜竹筍鄠杜多竹而勁小西夏結乾筍豈不是乎鏞竹筍出廣州可療風疾相迷竹筍生廣州減鏞筍小分桃枝竹筍叢生其皮生毛聚蟲蟻而不可食新婦竹筍三月生可食􅀢竹筍可食簟竹筍其竹直二丈猶為筍而可食雞頭竹筍可食堪茹斑竹筍脫殻乃為篛竹方生斑筍不可食篃筍竹葉大如履筍亦不大篔簹筍洪大沛竹筍其味羙煑而食之白烏筍湘中有此竹生是筍魚腸竹筍其竹細而屈筍亦可識矣篁筍八月生止十一月皮黒紫色其心實人取細切鹽漬少頃以漿水漬再宿瀝乾缾藏泥封謂之筍笴挲摩筍南人亦藏之為筍笴箣竹筍叢生羅浮筍甚直雲丘帝筍竹一節可以為船筍大如本匾竹筍匡廬山中多生初冒土便匾薄堪食箖箊筍可食􅹵筒筍呉越有之可食􅰣䈝竹筍可食篻竹筍堅大可食自秋生至於冬末春即不生矣䈥竹筍天台圖經云五縣皆有服傷筍至四月已後方出味甚羙狗竹筍寧海以来多有三月生可食筀竹筍吳越多生扶竹筍是竹為筍便有合歡貌並出慈竹筍四月生江南人多以灰煑食之又蘄黄生叢竹一叢數竿筍不外进只向裏生五六月長筍明年方成竹其筍不堪食玳瑁竹筍其筍脫殻微有斑文龍牙竹筍出永嘉大羅山春二月生棘竹筍味肥食之落人鬢髮􅺣竹筍無味雞脛竹筍食之肥羙㯽榔竹筍見杜臺􅀸淮賦毛竹筍出武陵洞口砍竹随生篁竹筍無味由梧竹筍澀不可食按竹譜有由衙竹即此方竹筍硬不堪食丹竹筍以色名毛斑竹筍絶不堪食沙麻竹筍或云蘇麻竹或云麤麻竹此疑與斯摩同斯摩筍一人只可擔兩莖亦堪為筍笴白竹筍以色名拂雲箒竹筍大如指䨇梢竹筍筍長獨莖及生枝葉即分為兩箖竹筍出襄州卧龍山堪食甚羙木竹筍初生時礧磈然不堪食與今吳㑹間木竹筍食美而甘味不同水竹筍出黔南管内或巖下潭水中生隨水深淺以成節若深一丈則筍出水面為一節蠻䗺採取以為食古散竹筍堪食秋蘆竹筍可食鶴膝竹筍可食石􅸝竹筍生閩中可食紫竹筍不宜食月竹筍每月抽筍筍如箭竹􅎯人不食也三稜竹筍筍細初抽川中人家竹林中忽有云吉兆也本草竹有雌雄根上第一枝䨇生者雌也乃有筍土人於竹根行鞭時掘取嫩者謂之鞭筍江南湖南人冬月掘大竹根下未出土者為冬筍東觀漢記謂之苞筍並可鮮食為珍品南人淡乾者為玉版筍眀筍火筍鹽曝者為鹽筍並可為蔬食諸竹筍氣味甘微寒無毒原筍譜筍利大腸無益于脾俗謂之刮腸箆食者審焉彚考増詩大雅其􅉡維何維筍及蒲周禮天官醢人加豆之實箈菹雁醢筍菹魚醢注箈箭􅎯南齊書劉懐珍傳懐珍子靈哲字文眀所生母嘗病靈哲躬自祈禱夢見黄衣老公曰可取南山竹筍食之疾立可愈靈哲驚覺如言而疾瘳南史孝義傳郭平原宅上種竹夜有盜其筍者平原遇見之盜者奔走墜溝平原乃於所植竹處溝上立小橋令通又採筍置籬外隣里慚愧無復取者原南史隠逸傳沈道䖍吳興武康人也有人拔屋後大筍令人止之曰惜此筍欲令成林更有佳者相與乃令人買大筍送與之盜者慚不取道䖍使置其門内而還増唐書百官志司竹監掌植竹葦供宮中百司簾篚之屬嵗以筍供尚食宋史禮志太宗景祐三年禮官宗正請每嵗春季月薦蔬以筍果以含桃呂氏春秋和之羙者越簵之箘註箘竹筍也東觀漢記馬援至荔浦見冬筍名苞上言禹貢厥苞橘柚疑謂是也原笑林漢人有適吳吳人設筍問是何物語曰竹也歸煑其牀簀而不熟乃謂其妻曰吳人轣轆欺我如此増華陽國志何隨人有盜其園筍隨見挈屐而歸恐盜者見也楚國先賢傳孟宗字恭武至孝母好食筍宗入林中哀號方冬為之出因以供養時人皆以為孝感所致述異記周武王時孤竹之國獻瑞筍一株原酉陽雜俎張芬曽為南康親随行軍常揀向陽巨筍織竹籠之隨長旋培常留寸許度竹籠髙四尺然後放長秋深方去籠伐之一尺十節其色如金増北戸録湘源縣十二月食斑皮竹筍諸筍無以及之叩頭録皮藩去北而復來鄱陽食竹筍曰三年不見羊角哀矣雲仙雜記裴晉公於藍田得一大筍破之有三四眼睛而香羙過甚清異録海南島中一類筍極腴厚而甚短島人號平頭筍余為筍效傳休奕作墓誌曰邉幼節字脆中晉林瑯琊之裔也以湯卒廣政録孟氏有蜀時翰林學士徐光溥劉侍郎義叟分直忽覩庭中筍迸出徐因題之劉性多譏誚徐托土本是蜀人徐詩曰迸出斑犀數十株更添幽景向蓬壺出來似有凌雲勢因作丹梯得也無劉詩曰徐徐出土非人種枝葉難投日月壺為是因緣生此地從來長養譬如無二學士從此不睦筍譜王宣居宇堂前有筍兩莖一日盜折而亡宣顧而不言丁固仕吳性敦孝敬母嘗思筍固遂泣竹生筍齊孝宣陳皇后性嗜筍鴨卵永眀九年詔太廟祭后薦筍鴨卵云木𤣥虚著四眀山記云雪竇山北巖生石乳其峯非人可升有毛竹銀筍詳其毛竹自生毛筍若銀筍即銀鑛如筍或云毛竹筍白如銀唐夏侯彪之上新繁令問吏胥曰筍一莖㡬錢曰一錢五莖取十千買五萬莖謂之曰吾未要且寄林中養之至秋竹成一竿十文遂成五十萬沈如琢成都人有孝行母亡負土成墳廬於側白鵠二棲於廬冬筍抽十莖天寳二年詔旌表朱梁髙祖開平二年冬商州進筍以為瑞品詔賜太守幣帛程崇雅者遂州蓬山縣人有孝譽母冬月思筍焚香入林中哭泣感生大筍數株王子猷暫寄人家便令種竹或問暫居何煩子猷笑曰何可一日無此君後代人謂竹都為此君今作譜者可命筍為此君之子也俗聞呼筍為龍孫若然者龍未聞化竹竹化為龍豈宜言龍孫今詳理實竹為龍龍且不生筍故嘉言巧論呼為龍孫耳或問筍有五色章采乎對曰江東黄筀閑居賦有青筍閩中賦有素筍錢塘多紫桂筍自餘斑狸緗縹不可勝言大約不過青緑色愚著物類相感志常寄書問天目舊友問山中所出伊僧嗜筍却回詩云山中人事違天眼中修定我本無根株只將筍為命金城記黎舉嘗云欲以芥嫁筍但恨時不同耳原冷齋夜話東坡嘗邀劉器之同叅玉版和尚器之每倦山行聞叅玉版欣然從之至廉泉寺燒筍而食器之覺筍味勝問此筍何名東坡曰即玉版也此老師善說法要能令人得禪恱之味于是器之乃悟其戲為大笑東坡亦恱作偈曰叢林真百丈嗣法有横枝不怕石頭路來叅玉版師聊憑柏樹子與問籜龍兒瓦礫猶能說此君那不知増冷齋夜話老杜詩曰筍根稚子無人見沙上鳬雛並母眠世或不解稚子無人見何等語唐人食筍詩曰稚子脫錦䙀駢頭玉香滑則稚子為筍眀矣贊寧雜志曰竹根有䑕大如猫其色類竹名竹豚亦名稚子予問韓子蒼子蒼曰筍名稚子老杜之意也不用食筍詩亦可耳西溪叢語杜牧之朱坡詩云小蓮娃欲語幽筍穉相携言筍如穉子與杜甫竹根穉子無人見同意揮麈後録富鄭公晚居西都嘗㑹客於第中邵康節與焉因食羊肉鄭公顧康節云煑羊惟堂中為勝堯夫所未知也康節云野人豈識堂食之味但林下蔬筍則常喫耳鄭公赧然曰弼失言二老堂詩話紫芝云兩京作斤賣五溪無人採此髙力士詩也魯直作食筍詩云尚想髙將軍五溪無人採是也張文潛作薺羮詩乃云論斤上國何曽飽旅食江城日至前嘗慕藜羮最清好固應加糝愧吾緣則是髙將軍所作乃薺詩耳非筍詩也二公同時而用事不同如此不知其故予按二詩各因筍薺而借用作斤賣之句初非用事不同紫芝何其拘也老學菴筆記吴人謂杜宇為謝豹杜宇初啼時漁人得蝦曰謝豹蝦市中賣筍曰謝豹筍唐顧况詩曰緑樹村中謝豹啼也齊東野語世傳涪翁喜苦筍嘗從斌老乞苦筍詩云南園苦筍味勝肉又和坡翁春菜詩云公如端為苦筍歸眀日青衫誠可脫坡得詩戲語坐客云吾固不愛做官魯直遂欲以苦筍硬差致仕聞者絶倒嘗賦苦筍云苦而有味如忠諫之可活國放翁又從而奬之云我見魏徵殊嫵媚約束童兒勿多取於是世以諫筍目之殊不知翁嘗自跋云余生長江南里人喜食苦筍試取而嘗之氣苦不堪於鼻味苦不可於口故嘗屏之未始為客一設及來黔中黔人冬掘苦筍萌於土中才一寸許味如蜜蔗初春則不食帷僰道人食苦筍四十餘日出土尺餘味猶甘苦相半以此觀之涪翁所食乃取其甘非貴乎苦也南康簡寂觀有甜苦筍周益公詩云蔬食山間荼亦甘况逢苦筍十分甜君看齒頰留餘味端為森森正且嚴此亦取其甜耳世人慕名忘味甘心荼苦者果何謂哉福建志羅源縣回仙巖一石突起髙數十丈有僧名秀者常見呂洞賔來遊啖以一筍復以手畫石作回仙巖三字回字蓋隠呂字也秀從此絶食飛錫而去福青縣石竺山其産少竹而多筍春夏之交鄉人於此采筍欲多則不可得號濟貧筍南安縣苦竹山有隠君寓石牀石臼存焉隠君好竹至今竹數里瀰漫山中鄉人取筍號曰英筍四川志筍筤山在大渡河西北五十餘里曰前筤又行數十里曰後筤山多筍故名樵蘇者以為衣食之源集藻表増唐李嶠為百寮賀瑞筍表臣某等言伏見舊眀堂前有叢竹抽新筍數莖緑籜含霜紫苞承雪凌九冬而擢穎冒重隂而發翠伏惟陛下仁兼動植化感靈祇故得􅎯動惟新象珍臺之更始貞堅效質符聖夀之無疆隣帝座而虚心當嵗寒而抱節一人有慶萬類呈祥凡在見聞孰不欣躍無任慶忭之至尺牘増宋蘇軾與杜孟堅朱守餉筍云潭州來豈所謂猫頭之穉者乎留之必為庖儈所壊盡致之左右饌成分一盤足矣頌増宋黄庭堅和宣叔乞筍頌筍充庖日百尾千角鹿九首虺心生竅渾沌死搜中林撅稚子腹便便老饕耳賦増宋黄庭堅苦筍賦僰道苦筍冠冕兩川甘脆愜當小苦而反成味温潤縝密多啖而不疾人蓋苦而有味如忠諫之可活國多而不害如舉士而皆得賢是其鍾江山之秀氣故能深雨露而避風烟食肴以之開道酒客為之流涎彼桂斑之夢永又安得與之同年蜀人曰苦筍不可食食之動痼疾令人萎而瘠予亦未嘗與之言蓋上士不談而喻中士進則若信退若眩焉下士信耳而不信目其頑不可鐫李太白曰但得醉中趣勿為醒者傳文賦散句増漢張衡南都賦春卵夏筍李尤七欵橙醢筍葅晉潘岳閑居賦青筍紫薑左思魏都賦淇洹之筍王彪之閩中賦緗箬素筍彤竿緑筒梁簡文帝七勵澄瓊漿之素色雜金筍之甘葅杜臺卿淮賦緑筒縹箭罕節疎目㯽榔之筍盛冬所育五言古詩原唐盧仝寄男抱孫竹林吾所惜新筍好看守萬籜抱龍兒攅迸溢林藪籜龍正稱寃莫敎入汝口叮嚀囑托汝汝活籜龍否白居易食筍此州乃竹鄉春筍滿山谷山夫折盈把抱来早市鬻物以多為賤䨇錢易一束置之炊甑中與飯同時熟紫籜拆故錦素肌擘新玉每日遂加飡經時不思肉久為京洛客此味常不足且食勿踟蹰南風吹作竹増宋蘇軾送筍與公擇久客厭鹵饌枵然思南烹故人知我意千里寄竹􅎯駢頭玉嬰兒一一脫錦䙀庖人應未識旅人眼先眀我家拙厨膳彘肉芼蕪菁送與江南客燒煑配香稉和黄魯直食筍飽食有殘肉饑食無餘菜紛然生喜怒似被狙公賣邇來誰獨覺凛凛白下宰一飯在家僧至樂甘不壊多生味蠧簡食筍乃餘債蕭然映樽俎未肯雜菘芥君看霜雪姿童穉已耿介胡為遭暴横三嗅不忍嘬朝來忽解籜勢迫風雷噫尚可餉三閭飯筒纒五采黄庭堅食筍十韻洛下斑竹筍花時壓鮭菜一束酬千金掉頭不肯賣我來白下聚此族富庖宰蠒栗戴地翻觳觸牆壊􅋾􅋾入中厨如償食竹債甘葅和菌耳辛膳胹薑芥烹鵝雜股掌炮鱉亂裠介小兒哇不羙䑕壤有餘嘬可貴生於少古來食共噫尚想髙將軍五溪無人采蕭巽葛敏修二學子和予食筍詩次韻荅之北饌厭羊酪南庖豐筍菜自北初落南㡬為兒所賣習知價廉平百態事烹宰鹽稀枯腊瘦蜜漬真味壊就根煨茁羙豈念炮烙債咀吞千畝餘胸次不蠆芥二妙各能詩才名動江介論詩多佳句膾炙甘我嘬思君恩養竹萬籟聽秋噫從此繕籓籬下令禁漁采韭黄照春盤菰白􅆺秋菜惟此蒼竹苗市上三時賣江南家家竹翦伐誰主宰半以苦見疎不言甘易壊葛陂雕龍睡未索兒孫債獺膽能分杯琥珀妙拾芥此物於食殽如客得儐介思入帝鼎烹忍遭饑涎嘬懶牀供翰墨碪杵風號噫每下歎枯枝焚如落樵采胡朝請見和食筍詩輙復次韻人笑庾郎貧滿腹飯寒菜春動食指動筍茁入市賣回首萬錢厨不羨廊廟宰民生暫神竒胞雋伐性壊忍持芭蕉身多負牛羊債籜龍不稱寃易致等拾芥蕭蕭煙雨姿壯士持戈介駢頭沸鼎烹可口垂涎嘬霜叢負後凋玉食香餘噫續詩無全功葑菲儻可采韓駒荅蔡伯世食筍蓴絲化鹽豉槐葉資新麫豈知苦竹􅎯風味常獨擅昔我居錦城屢喫田家飯扶杖自入箐煨此犢角蠒後叅鶴林禪餽我桑門饌烝烝沸鼎中亂下白玉片惟無他物乗始覺真味現三年客東都錦籜寧復見千金洛陽來惟􅂶大官膳前時過君食欣逢故人面那知列仙臞已雜蒯通雋吾寧飽甘肥憤吒那忍嚥請歸謂主孟厨人後當諫苦苣雜嘉蔬沉香和甲煎柯亭既誤椽畫障或遭練古來可歎事千載寄眀辨作詩弔籜龍助子當食歎陳與義食筍竹君家多材楚楚皆席珍成行著錦袍玉色映市人惠然集吾字老眼簷光新麯生亦稅駕共慰藜藿貧不待月與影三人亦相親可憐管城子頭禿事苦辛披譜雖同宗聞道隔幾塵詩成聊使寫一笑驚比隣黄公度謝傅參議彦濟惠筍用山谷韻北方九月霜賔盤無生菜嶺南信地暖窮冬竹􅎯賣君念庾郎貧蠒栗供庖宰中有嵗寒姿真時久不壊前身渭川侯千畝償宿債珍可配天花賤不數石芥早韭與晚菘奴僕望賔介文園酒渴餘想不厭姑嘬預恐吹作竹眀日東風噫急須驅兒童傾筐攜采采張九成食苦筍吾鄉苦筍佳出處惟石屋玉肌膩新酥黄衣緣深緑林深恐人知頭角互出縮烟雨養春姿此物未成熟三月臘酒香開罇􅆺幽獨烹庖入盤俎㸃醬真味足未須五鼎牛聊稱一囊粟朅来庾嶺下嵗月去何速經冬又七春未分窮途哭今朝好事者惠我生一束頭秃甲斕斑味惡韻麄俗兒童不慣嘗噦噫驚媪僕老妻念鄉味放箸淚盈目丈夫志有在何事校口腹呼奴更傾酒一笑風生谷七言古詩増唐李頎䨇筍歌送李回兼呈劉四並抽新筍色漸緑迥出空林䨇碧玉春風解籜雨潤根一枝半葉清露痕為君當面拂雲日孤生四逺何足論再三抱此悵為别嵩洛故人與之說宋梅堯臣韓持國遺洛筍龍孫春吐一尺牙紫錦包玉離泥沙金刀璀錯截嫩節銅駞不與大梁賖特寄韓郎緑蒲束莫令衞女苦思家韓郎才調偏能賦分餉唯思楚景差因之善謔誦淇澳欲學報投無木𤓰韓持國再遺洛中斑竹筍牡丹開盡桃花紅斑筍迸林犀角豐兩株逺寄川上鴻韓郎輟口贈楚翁便令剥錦煑荆玉甘脆不道簞瓢空小謝舊城昭亭下侵天筀竹谿西東螗螂生後出芽茁羅列滿地爭强雄是時楚翁所食寡朝飯暮飯唯其充今來得此謂過分一貴一賤物茍同黄庭堅從斌老乞苦筍南園苦筍味勝肉籜龍稱寃莫採録煩君更致蒼玉束眀日風雨吹成竹張舜民謝南軒筍脯使君喜食筍脯味全勝肉祕法不肯傳閉門課私僕君不見金谷饌客本萍虀豪世藉此真成癡但令長鬚日致饋不敢求君帳下兒謝筍脯方筍脯登吾盤可使食無肉鮭腥避三舍棕栮乃從僕書生長有十甕虀却笑虎頭肉相癡得君新法也大竒且復從遊錦䙀兒原陸游苦筍藜藿盤中忽眼眀駢頭脫襁白玉嬰極知耿介種性别苦節乃與生俱生我見魏徵殊媚嫵約束兒童勿多取人才自古要養成放使干霄戰風雨楊萬里記張定叟煑筍經江西毛筍未出尖雪中土膏養新甜先生别得煑簀法丁寧勿用醯與鹽巖下清泉須旋汲熬出霜根生蜜汁寒牙嚼出氷片聲餘瀝仍和月光吸菘羔楮雞浪得名不如來叅玉版僧醉裏何須酒解酲此羮一碗爽然醒大都煑菜皆如此淡處當知有真味先生此法未要傳為公作經藏名山増楊萬里謝唐德眀惠筍髙人愛筍如愛玉忍口不餐要添竹云何又遣十輩來昏花兩眼為渠開販夫束縳向市賣外强中乾美安在錦紋猶帶落花泥不論燒煑兩皆竒猪肝累人真可怍以筍累公端不惡煑筍金陵竹筍硬如石石猶有髓筍不及嶺南市裏筍如酥筍味清絶酥不如帶雨斸來和籜煑中含柘漿新甘露可虀可膾最可羮繞齒䔩䔩氷雪聲不須咒筍莫成竹頓頓食筍莫食肉元李孝光筍雷公躡跎夜皷噪驚起龍孫觸旌纛炎沙燒之修尾脫六丁控摶忽顛倒欲落不落虎豹皮錦䙀嬰兒籠大㡌斧斤幸貸凌雲姿留以觀渠嵗寒操吳鎮筍緑隂晝靜南風來晴梢拂拂烟花開籜龍走地牙角出班班玉立横蒼苔長鑱穿雲石路滑錦衣脫䙀玉版白鳴牙未下氷雪虀開籠先放揚州鶴眀楊基食燒筍留題陳惟寅竹間春雷一聲萬簪玉參差亂迸莓苔緑斬來掃葉當徑燒何異燃萁煑秋菽登盤查牙玉版肥焦尾碎剥蒼龍皮山人大嚼無以報寫作林間燒筍詩岳岱新筍歌滿林黄鳥不勝啼林下新筍與人齊春風閉門走山兔白晝露滴驚竹雞雨中三日春已過又近石牀添㡬箇競將頭角向青雲不管堦前緑苔破五言律詩増唐李頎籬筍東園長新筍映日復穿籬迸出依青嶂攢生伴緑池色因林向背行逐地髙卑但恐春將老青青獨爾為宋梅堯臣新筍挑筍春雷後晴坡過雨時何言江外早已比洛陽遲園客自偷賣主人那得知徒令養新竹待與作藩籬洪炎從寳峯長老求猫頭筍不識猫頭筍還思馬祖山庭蘭生舊茁綳錦換新斑藴玉爭懐寳登盤想飫餐分甘須剩劚逺助一瓢簞范成大謝李叔玠送筍墮地錦䙀茁解衣温玉姿來償食竹債大勝伏雌炊少日羮藜子老来煨芋師盤餐登異味指動已先知朱子公濟惠筍次韻新筍因君寄康廬入夢中丹元餘故宅翠竹尚餘風日日来威鳳年年饌籜龍猶嫌有兼味不似一源功七言律詩御製過雲栖憩竹林下令人劚筍劚蘭尋春二月幸雲栖滿目天光入品題密林布䕃樵漁樂幽栢成行蕙芷齊浴手臨泉開籜筍傍巖倚石選蓬藜餘杭風景西湖勝未若山中待竹迷増唐皮日休聞開元寺開筍園寄章上人園鎖開聲駭鹿羣滿林蘚籜水犀文森森競泣林梢雨􅑨􅑨爭穿石上雲並出亦如鵞管合各生還似犬牙分折烟束露如相遺何𦙍眀朝不茹葷陸龜蒙和開元寺開筍園寄章上人春龍爭地養檀欒况是䨇林雨後看迸出似豪當垤㙞孤生如恨倚欄杆凌虚勢欲齊金刹折贈光宜照玉盤更待錦苞零落后粉環髙下挶煙寒徐夤筍鞭笻竹巖邊剔翠苔錦江波冷洗瓊瑰纍纍節轉蒼龍骨寸寸珠連巨蚌胎須向廣塲驅駔駿莫從閑處撻駑駘寧同晉帝環營日抛賺中途後騎來宋蘇轍食筍林竹抽􅎯不忍挑誰家盈束伴晨樵籜龍似欲號無罪食客安知惜後凋不願鹽梅調鼎味姑從律呂應簫韶林間老煞雖無用一試冬深雪到腰秦觀次韻范純夫戲荅李方叔饋筍兼簡鄧慎思楚山冬筍劚寒空北客長嗟食不重秀色可憐刀切玉清香不斷鼎烹龍論羮未愧蓴千里入貢當隨傳一封薄禄養親甘㫖少滿包時賴故人供唐庚長沙竹筍聞於天下大者可十餘斤食之甚甘而不氷脾昔渡湘欲作詩未暇也今日復過之乃酬以此篇地入長沙莫歎卑竹􅎯徑尺舊相知九重纔復金門籍萬里先叅玉版師契濶累年真負口徘徊彌月未妨脾渭川風味那能對中有離騷九辨辭陸游湖上筍盛出戲作長句􅋾􅋾穿苔瑇瑁簪按行日夜待成林養渠百尺干霄氣見我平生及物心剩插藩籬憂玉折豫期風雨聽龍吟眀年又徙囊衣去誰與平安報好音楊萬里都下食筍自十一月至四月戲題竹祖龍孫渭上居供儂樽俎半年餘斑衣戲綵春無價玉版談禪佛不如若怨平生食無肉何如陋巷飯斯蔬不須庾韭元修菜吃到憎時始憶渠方岳猫筍此君乃有寧馨兒犀角豐盈玉不如老去烟姿元聳壑生來風骨已專車詩腸慣識猫頭筍食指寧知熊掌魚莫遣匆匆萬竿緑一春心事政闗渠金孫邦傑燒筍煨茁舊聞山谷語勸耕還憶大蘇詩傳將火候無多訣留得天真又竒未放錦䙀開束縛已看玉版證茶毘白麻初拜驚燒尾見此應慙富貴癡眀吳寛荅于喬次韻送冬筍西郭清風碁墅開門前俗物敢持來聊供香飯抄雲子為想長鑱劚雪堆空腹冷含金瑣碎壯心未怯玉崔嵬知君能畫非饞守乞與鵝溪絹翦裁于慎行紀賜鮮筍殊錫光生玉筍班曽從青簡賦檀欒蒲筐乍解香盈座錦籜初分緑滿盤一飯疑含仙禁雨三秋猶憶北牕寒慚無鳳實儀千仞祝有龍孫長萬竿五言排律増唐韓愈和侯協律詠筍竹亭人不到新筍滿前軒乍出真堪賞初多未覺煩成行齊婢僕環立比兒孫驗長常攜尺愁乾屢側盆對吟忘膳飲偶坐變朝昏滯雨膏腴濕驕陽氣候温得時方張王挾勢欲騰騫見角牛羊沒看皮虎豹存攢生猶有隙散布忽無垠詎可持籌算誰能以理言縱横公占地羅列暗連根狂劇時穿壁羣强幾觸藩深潛如避逐逺去若追奔始訝妨人路還驚入藥園􅎯牙防寖大覆載莫偏恩已復侵危砌非徒出短垣身寧虞瓦礫計擬揜蘭蓀且歎髙無數庸知上幾番短長終不校先後竟誰論外恨苞藏密中仍節目繁暫須廻歩履要取助盤飱穰穰疑翻地森森競塞門戈矛頭戢戢蛇虺首掀掀婦懦咨聊揀兒癡謁盡髠侯生來慰意詩句讀驚魂屬和才將竭呻吟至日暾五言絶句増宋朱子和劉秀野新筍翛翛江上林白日暗風雨下有萬玉虯三冬卧寒土筍脯南山春筍多萬里行枯腊不落盤餐中今知緑如簀元范梈看東亭新筍問竹何年有親曽共嵗寒昨傳新筍發扶杖繞林看鄭氏允端筍竹林春雨過瘦筍迸苔長坐待成髙節清標出短牆眀髙啓燒筍幽人嗜燒筍出土不容長林下孤煙起風吹似竹香六言絶句増宋楊萬里看筍筍如滕薛爭長竹似夷齊獨清只愛錦䙀滿地暗林忽兩三莖七言絶句原唐杜甫絶句無數春筍滿林生柴門密揜斷人行㑹須上番看成竹客至從嗔不出迎李賀昌谷北園新筍籜落長竿削玉開君看母竹是龍材更容一夜抽千尺别却園池數寸埃斫取青光寫楚詞膩香春粉墨離離無情有恨何人見露壓烟啼千萬枝家泉石眼兩三莖曉看隂根紫陌生今年水曲春沙上笛管新篁拔玉青李商隠初食筍呈座中嫩籜香苞初出林五陵論價重如金皇都陸海應無數忍翦凌雲一寸心宋蘇軾謝惠猫兒頭筍長沙一日煨邊筍鸚鵡洲前人未知走送煩公助湯餅猫兒突兀䑕穿籬郭祥正休師惠雪筍雪竹生芽玉一簪北人此味豈嘗諳病中得食勝牛乳行矣阿難師勿慙張商英食筍長江縈繞地膏腴風氣相連不甚殊自是舌根分彼此致令苦筍勝宜都陸游筍絶句列仙閲世獨清癯雪谷氷谿老不枯輸與錦䙀孩子軰千金一束入天厨朱松新筍一雷驚起籜龍兒戢戢滿山人未知急喚蒼頭劚烟雨明朝吹作碧參差梅雨㝠㝠相已齊連雲篁竹暗蠻溪短萌解籜登雕俎錯落黄金騕裊蹏朱子次韻謝劉仲行恵筍二首誰寄寒林新劚筍開奩喜見白差差知君調我酸寒甚不是封侯食肉姿君詩髙䖏古無師島瘦郊寒詎足差縳得獰龍并寄我句中仍喜見雄姿詩散句増唐杜甫逺傳冬筍味更覺綵衣春白居易幾見林抽筍頻驚燕引雛元稹寳地琉璃折紫苞琅玕踴許渾竹楥晝看筍藥欄春賣花宋梅堯臣便今剝錦煑金玉甘脆不道簟瓢空劉敞龍孫春吐一尺芽紫錦包玉離泥沙黄庭堅氷底斵春生筍束豹文解籜饌寒玉孫覿緑筍遺苞半出籬清溪一曲翠相迷陸游冬筍生林龍􅋾􅋾寒泉落磵珮珊珊梁簡文帝横堦入細筍周庾信短筍猶埋竹唐張九齡林筍苞青籜孟浩然竹林深筍穊王維嘉蔬緑筍莖杜甫緑垂風折筍舎下筍穿璧司空曙巖筍出叢長白居易紫鮮林筍嫩姚合迸筍搘堦起杜牧斑筍新梢短李頻春篁抽筍密方干迸筍入波生司空圖坡暖冬生筍皮日休迸筍支檐楹宋林逋煙崖早筍肥邵雍洗竹留新筍張耒筍深鳴鳥下緑嫌新筍破唐庚翻泥逢暗筍唐杜甫堂西長筍别開門韓愈篔簹競長纎纎筍白居易紫筍齊嘗各闘新勸我加餐因早筍來鵬筍過東家作竹林宋韓琦竹筍迸堦抽兕角蘇軾好竹連山覺筍香飽食不嫌谿筍痩范成大竹筍漫山鳯尾齊陸游穿破緑錢多穉筍方岳霜鞭行茁軟于酥惠洪分外濃甘黄竹筍金吳激一畨痩筍羽林槍元方回鮮筍紫泥開玉版張雨齋庖得筍是佳蔬吉雅謨丁紅稻供炊筍脯香詞増宋錢惟演玉樓春錦籜參差朱檻曲露濯文犀和粉緑未容濃翠伴桃紅已許纎枝㽞鳯宿嫩似春荑明似玉一寸芳心誰管束勸君速喫莫踟蹰看被南風吹作竹别録原取筍山谷云根湏辰日劚筍看上畨成凡筍一畨兩畨出成竹至第三畨者止可供食不成竹矣故曰筍看上畨成也凡筍蒸煑炰酢惟人所好又可乾藏採筍過一日曰蔫過二日曰箊取宜避露每日出掘深土取之半折取鞭根旋得旋投密竹器中覆以油革見風則觸本堅入水則浸肉硬脱殻煑則失咮生著刃則失氣採而乆停非鮮也淨之入水非洗也蒸熟停乆非食也如此然後可與語食筍矣此外不足數也製用僧贊寧筍譜云麻油姜皆殺筍毒凡食筍之法譬若治藥修煉之得法則益人反是則損取得以巾拭去土連殻沸湯瀹之煑宜乆生必損人苦筍最宜乆甘筍出湯後去殻煑筍汁為羮茹味全加美不然蒸最美味全煻灰中煨後入五味尤佳食筍去殻煑熟切片搾乾鹽醃過宿晒乾貯慈竹筍四月生江南人多以灰煑食煑新筍以沸湯煑則易熟而脆味尤美若蔫者少入薄荷煑則不蔫與猪羊肉同煑則不用薄荷増山家清供夏初竹筍盛時掃葉就竹邊煨熟其味甚鮮曰傍林鮮筍取鮮嫩者以料物和簿麫拖油如黄金色甘脆可愛舊好莫友訪霍如菴延早供以筍切作方片和白米煑粥佳甚濟顛筍疏云拖油盤内煿黄金和米鐺中煑白玉二者兼得之矣原筍酢切作片子沸湯瀹過候乾入葱絲蒔蘿茴香花椒紅麫併鹽拌勻同醃一時増海槎餘録酸筍大如臂摘至用沸湯泡出苦水投冷井水中浸二三日取出縷如絲醋煑可食好事者攜入中州成罕物京師勲戚家㑹酸筍湯即此物也原筍乾筍肉一百斤用鹽五升水一小桶候沸涌抝出汁候乾旋添筍汁煑熟撈出壓之或用手揉在鍋隔夜則黑熱洒則枯一日晒乾則硬火焙便不軟臨食時取浸筍汁煑筍則有味附録竹實増山海經注竹六十年一易根易根必生花生花必結實結實必枯死實落土又復生彚考増宋史真宗本紀咸平二年江南轉運使言宣歙竹生米民採食之五行志政和四年八月建州境内竹生米數千萬石三年十一月癸酉越州承天寺瑞竹一竿七枝幹相似其葉圓細生花結實詔送祕書省仍拜表賀莊子鵷雛非練實而不食注練實竹實取其潔白也韓詩外傳黄帝時鳯凰棲帝梧桐食帝竹實異苑晉惠帝元康二年巴西郡界竹生花紫色結實如麥外皮青中赤白味甚甘述異記止些山多竹長千仞鳯食其實去九疑萬八千里芸牕私志凝波竹實服之肌滑體輕出區吴山紫枝緑葉堅滑如玉風吹有聲如環珮成帝種於臨池觀更名曰環珮竹花如海榴實如蓮子而小近謝芬蘭庭中忽生此竹人以為瑞而不知為何物其夫讀海外志始知之苐無花實明年出筍如常竹前種亦漸不然人以為積善所致該聞集舊稱竹實為鸞鳯所食今近道竹間時見花開如棗結實如麥江淮間號為竹米以為荒年之兆其竹即死信非鸞鳯之食也近有餘干人來言彼有竹實大如雞子竹葉層層包裹味甘勝蜜食之令人心肺清凉生滿竹林茂密䖏頃因得之雖日乆乾枯而味尚存乃知鸞鳯所食必非常物也原天台山志甘竹實出天台山閑閑真人以致元帝増福建志紹興十八年侯官縣有竹實如米饑民採食之集藻七言古詩増宋陳造竹米行竹君亢宗擅楚墟一一修聳山澤臞風流秀整與世殊楚俗食息皆爾湏薪之籬之且籧篨笲筥箱篚䉉籃笯溝瓦厥祖羮其雛随索斯獲掇諸塗今嵗麥秋旱嵗餘得麥僅足償官租竹君憫農如士夫著花結子千林俱密砌玉粒綴旒珠株株擷取雖錙銖彌頃亘畝無閒株磋磨蒸炊勝雕葫鄰里乞索水火如坐令顰蹙興歌呼野叟好事能分吾香清而冽甘而膄此君行能不一書此惠及物旋就枯摩頂放踵忘其軀所學無乃墨者徒老子苟禄天之隅䄂手無策蘇􅑱孤投七三歎吾慚渠詩散句増唐李白竹實滿秋圃鳯來何苦飢附録越王竹原嶺表録南海岸邊沙中生沙箸一名越王竹相傳越王棄餘算而生若細荻髙尺餘春吐苗箕心茗骨青而且勁南海人愛其色以為酒籌凡欲采者湏輕歩向前拔之聞行聲遽縮入沙中不可得附録淡竹葉原淡竹葉一名鴨跖草洛陽花木記云碧鳯花一名鴨脚即此一名芩鷄舌草一名碧竹子名竹鷄草一名耳環草一名碧蟬花一名藍姑草一名竹葉菜處處平地有之三四月生苗紫莖竹葉嫩時可食四五月開花如蛾形兩葉如翅碧色可愛結角尖曲如鳥喙實在角中大如小豆中有細子採花取汁作畫色及彩羊皮燈青碧如黛彚考増永嘉郡記青田縣有草葉似竹可染碧名為竹青此地所豐草故名青田集藻七言絶句増宋楊巽齋碧蟬花楊葩􅉡􅉡傍疎籬薄翅舒青勢欲飛㡬誤佳人將扇撲始知錯認枉心機翁元廣碧蟬花露洗芳容别種青牆頭微弄晩風輕不湏强入羣芳社花譜原無汝姓名附録錦竹増宛陵詩註錦竹草也似竹而斑集藻五言古詩増宋梅堯臣錦竹雖作湘竹紋還非楚筠質化龍徒有期待鳯曽無實本與凡草俱偶親君子室附録篇竹増爾雅竹篇蓄注似小藜赤莖節好生道旁可食又殺蟲本草處處有之布地而生節間白花葉細緑人謂之篇竹煑汁與小兒飲療蚘蟲彚考増資暇録詩衛淇澳篇云緑竹漪漪按陸璣草木疏稱郭璞云緑竹王芻也今呼為白脚莎一云即鹿蓐草又云篇竹似小藜赤莖節韓詩作􅗨亦云􅗨篇竹則明知非筍竹矣今為辭賦皆引漪漪入竹事大誤也當時謝莊竹贊云瞻彼中唐緑竹漪漪便襲其謬附録竹菜増齊民要術竹菜生竹林下似芹科而莖葉細生極穊淨洗暫經沸湯速出下冷水中即搦去水細切又胡芹小蒜亦暫經沸湯細切和之與鹽醋拌暮春用至四月御定佩文齋廣羣芳譜卷八十六
