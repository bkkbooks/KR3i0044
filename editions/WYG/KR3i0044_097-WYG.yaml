body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九十五藥譜當歸原當歸一名文無古今注云相招召贈之以文無文無亦名當歸也一名乾歸一名山蘄一名白蘄爾雅云薜山蘄又云薜白蘄說文云蘄草也生山中者一名薜一名山蘄色白者名白蘄廣雅云山蘄當歸也本草云蘄古芹字以花葉似芹故得芹名春生苗葉綠有三稜七八月開花似蒔蘿淺紫色根黑黃色以肉厚不枯者為勝今秦蜀諸處多栽蒔貨賣其頭圓尾多色紫氣香肥潤者秦産也名馬尾歸最勝唐本草云似大葉芎藭者名馬尾當歸今人多用似細葉芎藭者名蠶頭當歸不堪用他處者頭大尾多色白堅枯名鑱頭歸止宜入發散藥氣味苦温無毒凡血病宜用之治姙婦産後能使氣血各有所歸當歸之名宜取諸此治上當用頭治中當用身治下當用尾通治則全用此一定之理也惡濕麪䕡茄畏菖蒲海藻牡蒙生薑制雄黃彚考原孫盛雜記初姜維詣諸葛亮與母相失復得母書令求當歸維曰良田百頃不在一畝但有遠志不在當歸也增雲仙雜記虢州别駕竇淝以當歸為地仙圓曰使血海增光續仙傳羅公遠鄂人元宗學其術不肯盡怒殺之後有使者入蜀見公遠自道姓名以蜀當歸為寄比元宗入蜀始悟當歸之意集藻詩散句增元陳樵當歸葉長映芭蕉别錄原修治凡用去蘆頭水洗去土酒浸一宿日乾或火乾切片如收藏曬乾乗熱紙封甕不蛀芎藭原芎藭博雅云苗曰江蘺根曰芎藭一名香果以氣香也一名山鞠藭詳見左傳增本草芎藭一名胡藭以戎地者為佳故名古人因其根節狀如馬銜謂之馬銜芎藭後世因其狀如雀腦謂之雀腦芎其出關中者呼為京芎亦曰西芎出蜀中者為川芎出天台者為台芎出江南者為蕪藭皆因地而名也金光明經謂之闍莫迦原清明後宿根生苗分而橫埋之宜鬆肥土節節生根澆宜退牲水葉香似芹而微細窄有丫义文似白芷葉而細又似胡荽葉而微壯叢生細莖七八月間開碎白花如蛇牀子花根下始結芎藭堅痩黃黑色關中出者形塊重實為雀腦芎最有力九月十月採者佳三四月虚惡不堪用凡用以塊大内中色白不油嚼之微辛甘者佳他種不入藥止可為末煎湯沐浴耳味辛温無毒治中風入腦頭痛寒痺除腦中冷痛面上油風一切風氣勞損血病止瀉痢燥濕行氣開鬱今人用此最多頭面風不可缺須以他藥佐之不可單服彚考增左傳楚子伐蕭還無社與司馬卯言號申叔展叔展曰有麥麴乎曰無有山鞠藭乎曰無註麥麴鞠藭所以禦濕欲使無社逃泥水中無社不解故曰無疏本草有芎藭者是藥草之名觀傳文欲使無社逃於泥水中而問有此物否以知是禦濕所用山海經號山其草多芎藭繡山其草多芎藭洞庭之山其草多芎藭淮南子夫亂人者若芎藭之與藁本益部方物畧記芎蜀中處處有之成都九月九日藥市芎與大黃如積香溢千㕓或言其大若胡桃者不可用多蒔於園檻葉落時可用作羮蜀少寒莖葉不萎今醫家最貴川芎川大黃云集藻贊增宋宋祁川芎贊柔葉美根冬不殞零采而掇之可糝於羮賦散句增漢揚雄甘泉賦排玉戸而颺金鋪兮發蘭蕙與􅀢藭五言古詩增宋蘇軾和子由記園中草木芎藭生蜀道白芷來江南漂流到關輔猶不失芳甘濯濯翠莖滿愔愔清露涵及其未花實可以資筐籃秋節忽已老苦寒非所堪斸根取其實對此微物慙七言絶句增宋韓琦中書㕔芎藭蘼蕪嘉樹列羣芳禦濕前推藥品良時摘嫩苗烹賜茗更從雲脚發清香詩散句增宋陸游泉潔煑芎苗蘇軾穿林閒覔野芎苗蛇牀增爾雅盱虺牀註蛇牀也廣雅虺牀馬牀也本草經蛇牀一名蛇米一名思益一名繩毒一名棗棘一曰牆蘼註近道田野墟落間甚多花葉正似蘼蕪本草綱目韓保昇曰生下濕地所在皆有以揚州襄州者為良蘇頌曰三月生苗高三二尺葉青碎作叢似蒿枝每枝上有花頭百餘結同一窠似馬芹類四五月乃開白色又似繖狀子黃褐色如黍米至輕虚李時珍曰其花如碎米攢簇其子兩片合成似蒔蘿子而細亦有細稜氣味苦平無毒治男子婦人風濕痺毒小兒驚癎温中下氣暖丈夫陽氣女子隂氣久服輕身好顔色令人有子别錄增炮炙論凡使須用濃藍汁并百部草根自然汁同浸一伏時漉出日乾却用生地黃汁相拌蒸之從巳至亥取出日乾用日華本草凡服食即挼去皮殻取仁微炒殺毒即不辣也作湯洗浴則生用之藁本增本草綱目藁本蘇恭曰根上苗下似禾藁故名一名藁茇出山海經一名鬼卿一名鬼新一名微莖蘇頌曰西川河東州郡及兖州杭州皆有之葉似白芷香又似芎藭但芎藭似水芹而大藁本葉細五月有白花七八月結子根紫色氣味辛温無毒張元素曰乃太陽經風藥其氣雄壯寒氣鬱于本經頭痛必用之藥與木香同用治霧露之清邪中于上焦與白芷同作面脂既治風又去濕亦各從其類也彚考増王氏談錄公云京師市藥須當精别市中藁本多雜以葳靈仙不可稱辨往往誤售入藥遂不為効藁本蓋柔細而芳香者是邵氏聞見錄夏英公病泄太醫以虚治不効霍翁曰風客于胃也飲以藁本湯而止附錄徐黃增名醫别錄徐黃生澤中大莖細葉香如藁本味辛平無毒主心腹積瘕莖主惡瘡蜘蛛香增本草綱目蜘蛛香出蜀西茂州松潘山中草根也黑色有麤鬚狀如蜘蛛及藁本芎藭氣味芳香彼人亦重之或云貓喜食之味辛氣温無毒辟瘟疫中惡邪精鬼氣尸疰木香增本草綱目木香一名蜜香一名青木香一名五木香一名南木香李時珍曰木香草類也本名蜜香因其香氣如蜜也緣沉香中有蜜香遂訛此為木香昔人謂之青木香后人因呼馬兜鈴為青木香乃呼此為南木香廣木香以别之今人又呼一種薔薇為木香愈亂真矣三洞珠囊云五香者五木香也一株五根一莖五枝一枝五葉葉間五節故名五香燒之能上徹九天金光明經謂之矩琵佗香别錄曰生永昌山谷陶𢎞景曰永昌今不復貢今皆從外國舶上來乃云出大秦國今皆以合香不入藥用蘇恭曰此有二種當以崑崙來者為佳西湖來者不善葉似羊蹄而長大花如菊花結實黃黑所在亦有之功用極多甄權曰出天竺是草根狀如甘草也蘇頌曰今惟廣州舶上來他無所出根窠大類茄子葉似羊蹄而長大亦有如山藥而根大開紫花者不拘時采根芽為藥以其形如枯骨味苦黏牙者為良江淮亦有此種名土青木香不堪藥用蜀本草言孟昶苑中亦嘗種之云苗高三四尺葉長八九寸皺軟而有毛開黃花恐亦是土木香種也雷斆曰其香是蘆蔓根條左盤旋采得二十九日方硬如朽骨其有蘆頭丁蓋子色青者是木香神也冦宗奭曰常自岷州出塞得青木香持歸西洛葉如牛蒡但狹長莖高二三尺花黃一如金錢其根即香也李時珍曰南番諸國皆有一統志云葉類絲𤓰冬月取根曬乾味辛温無毒乃三焦氣分之藥能升降諸氣諸氣膹鬱皆屬于肺故上焦氣滯者用之乃金鬱則泄之也中氣不運皆屬于脾故中焦氣滯者宜之脾胃喜芳香也大腸氣滯則後重膀胱氣滯則癃淋肝氣鬱則為痛故下焦氣滯者宜之乃塞者通之也彚考增隋書樊子蓋傳大業五年車駕西廵將入吐谷渾子蓋以彼多瘴氣獻青木香以禦霧露甘松香增廣志甘松出姑臧涼州諸山細葉引蔓叢生可合諸香及裛衣本草綱目甘松香産于川西松州其味甘故名金光明經謂之苦彌哆蘇頌曰黔蜀州郡及遼州皆有之叢生山野葉細如茅草根極繁密八月采之作湯浴令人身香治惡氣卒心腹痛滿下氣理元氣去氣鬱山柰增本草綱目山柰一名山辣俗訛為三柰又訛為三賴或云本名山辣南人舌音呼山為三呼柰如賴故致謬誤生廣中人家栽之根葉皆如生薑作樟木香氣土人食其根如食薑切斷暴乾則皮赤黃色肉白色古之所謂廉薑恐其類也氣味辛温無毒暖中辟瘴癘惡氣治心腹冷氣痛寒濕霍亂風蟲牙痛入合諸香用廉薑增本草綱目廉薑一名薑彚一名蔟葰陳藏器曰似薑生嶺南劍南李時珍曰生沙石中似薑大如蠃氣猛近于臭南人以為虀其法陳皮以黑梅及鹽汁漬之乃成也鄭樵云似山薑而根大氣味辛熱無毒治胃冷温中下氣消食益智山薑增嶺表錄異山薑莖葉皆薑也但根不堪食亦與豆􅅳花相似而微小爾花生葉間作穗如麥粒醃藏入甜糟中經冬如琥珀色辛香可愛用為鱠無以加矣又以鹽殺治暴乾者煎湯服之極除冷氣本草綱目山薑與杜若同名一名美草陶宏景曰東人呼為山薑南人呼為美草蘇頌曰生九真交趾今閩廣皆有之李時珍曰生南方葉似薑花赤色甚辛子似草豆􅅳根如杜若及高良薑今人以其子偽充草豆􅅳然其氣甚猛烈氣味辛熱無毒治腹中冷痛辟榖止飢去惡氣温中止霍亂功用如薑花及子辛温無毒調中下氣破冷氣滑食殺酒毒集藻五言古詩增唐劉禹錫崔元受少府自貶所還遺山薑花以詩荅之故人博羅尉遺我山薑花採從碧海上來自謫仙家雲濤潤孤根隂火照晨葩靜揺扶桑日􅃩對瀛洲霞世人受苦辛搴擷忘幽遐傳名入帝里飛騎辭天涯王濟本尚味石崇方鬬奢雕盤多不識綺席乃增華驛馬損筋骨貴人滋齒牙顧予藜藿士持此重咨嗟五言律詩增唐劉禹錫奉和鄭相公以寄考功十弟山薑花俯賜篇詠採擷黃薑蘂封題青瑣闈共聞調膳日正是退朝歸響為纎筵發情隨綠翰飛故將天下寶萬里與光輝豆􅅳增海藥本草紅豆􅅳生南海諸谷高良薑子也其苗如蘆其葉如薑花作穗嫩葉卷之而生微帶紅色嫩者入鹽纍纍作朶不散落須以朱槿花染令色深善醒醉解酒毒桂海虞衡志紅豆􅅳花叢生葉痩如碧蘆春末發初開花抽一榦有大籜包之籜解花見一穗十蘂淡紅鮮妍如桃杏花色蘂重則下垂如葡萄又如火齊纓絡及翦綵鸞枝之狀每蘂心有兩瓣人謂之比目連理云本草綱目高良薑一名蠻薑陶宏景言此薑始出高良郡故名按高良即今高州漢為高凉縣吳改為郡則高良當作高凉也氣味辛大温無毒治胃中冷逆霍亂腹痛止痢治風破氣健脾胃寛噎膈破冷癖除瘴瘧子名紅豆蔲氣味主治畧同酉陽雜爼白豆蔲出迦古羅國呼為多骨形如芭蕉葉似杜若長八九尺冬夏不凋花淺黃色子作朶如葡萄初出微青熟則變白七月採本草綱目白豆􅅳子圓大如白牽牛子其殻白厚其仁如縮砂仁氣味辛大温無毒治積冷氣止吐逆反胃消榖下氣散肺中滯氣治噎膈除瘧疾解酒毒桂海虞衡志草豆蔲入梅汁鹽漬令色紅暴乾以薦酒曰紅鹽草果鸚􅛥舌即紅鹽草果之珍者實始結即頻取紅鹽乾之纔如小舌本草綱目草豆􅅳南方異物志謂之漏蔲通志謂之草果金光明經謂之蘇乞迷羅納蘇頌曰嶺南皆有之苗如蘆葉似山薑杜若根似高良薑二月間花作穗房生於莖下嫩葉卷之而生初如芙蓉花微紅穗頭深紅色其葉漸廣花漸出而色漸淡亦有黃白色者結實若龍眼子而銳皮無鱗甲皮中子如石榴瓣夏月熟時采之暴乾氣味辛温濇無毒温中治心腹痛嘔吐下氣止霍亂一切冷氣消酒毒調中補胃健脾消食治瘴瘧噎膈反胃痞滿痰飲積聚開鬱破氣殺魚肉毒制丹砂彚考增宋史地理志慶遠府貢生豆蔲草豆蔲五代史䍧牱蠻天成二年貢草豆蔲二萬箇環氏吳記黃初二年魏求豆蔲南方草木狀舊說紅豆蔲花食之破氣消痰進酒增倍泰康二年交州貢一篚上試之有驗以賜近臣集仙傳軒轅集不知何許人唐宣宗召見時京師素無豆蔲荔支花上因語及集袖中出之二花各數百朶皆連枝葉鮮明芳潔如新折者西溪叢語杜牧之詩云娉娉嫋嫋十三餘豆蔲梢頭二月初不解豆蔲之義閱本草豆蔲花生葉間南人取其未大開者謂之含胎花言尚小如姙身也花經豆蔲花四品六命集藻賦散句增晉左思蜀都賦草則藿蒳豆蔲五言律詩增宋范成大詠紅豆蔲花詩綠葉蕉心展紅苞竹籜披貫珠垂寶絡翦綵倒鸞枝且入花欄品休論藥裹宜南方草木狀為爾首題詩詩散句增唐李渉瘴山江上重相見醉裏同看豆蔲花韓翃春生豆蔲枝梁簡文帝江南豆蔲生連枝縮砂蔤增圖經本草縮砂蔤嶺南山澤間有之苗莖似高良薑高三四尺葉長八九寸濶半寸以來三月四月開花在根下五六月成實五七十枚作一穗狀似益智而圓皮𦂳厚而皺有粟紋外有細刺黃赤色皮間細子一團八隔可四十餘粒如大黍米外微黑色内白而香似白豆蔲仁七月八月採之辛香可調食味及蜜煎糖纒用本草綱目縮砂蔤仁氣味辛温濇無毒治一切氣消食和中止痛安胎補肺醒脾養胃益腎理元氣通滯氣散寒飲脹痞噎膈嘔吐除咽喉口齒浮熱化銅鐵骨硬益智增南方草木狀益智子如筆毫長七八分二月花色若蓮著實五六月熟味辛雜五味中芬芳亦可鹽曝出交阯合浦廣州記葉如蘘荷長丈餘其根上有小枝高八九寸無花萼莖如竹箭子從心中出一枝有十子叢生大如小棗其中核黑而皮白核小者佳含之攝涎穢四破去核取外皮蜜煑為粽食味辛異物志益智子類薏苡長寸許如枳椇子味辛辣香如豆蔲本草綱目今之益智子形如棗核而皮及仁皆似草豆蔲氣味辛温無毒益氣安神補不足利三焦調諸氣益脾胃理元氣補腎虚治冷氣腹痛彚考增南方草木狀建安八年交州刺史張津常以益智子粽餉魏武帝二十六國春秋安帝元年盧循為廣州刺史遺劉裕益智粽裕乃荅以續命湯廬山記山果有益智蒲萄東坡雜記海南産益智花實皆作長穗而分三節其實熟否以候歲之豐歉其下節以候蠶禾中上亦如之大凶之歲則皆不實蓋罕有三節並熟者其為藥治氣止水而無益於智智豈求之於藥其得此名者豈以知歲耶集藻書增宋僧慧遠荅盧循書捐餉六種深抱情至益智乃是一方異味即於僧中行之五言古詩增梁劉孝勝詠益智挺芳銅嶺上擢穎石門端連叢去本葉雜和委雕盤寧推不迷草詎識聰明丸儻逢公子宴方厭永夜歡蓽茇增南方草木狀蒟醬生于蕃國者大而紫謂之蓽茇酉陽雜爼蓽撥出摩伽陁國呼為蓽撥梨拂林國呼為阿梨訶咃苗長三四尺莖細如箸葉似蕺葉子似桑椹八月採圖經本草嶺南特有之多生竹林内正月發苗作叢高三四尺其莖如筯葉青圓如蕺菜濶二三寸如桑面光而厚三月開花白色在表七月結子如小指大長二寸以來青黒色類椹子而長九月收米曬曝乾南人愛其辛香或取葉生茹之復有舶上來者更辛香本草綱目蓽撥草木狀作蓽茇陳藏器本草作畢勃扶南傳作逼撥大明㑹典作畢蕟氣味辛大温無毒温中下氣補腰脚殺腥氣消食除胃冷治霍亂心痛嘔逆醋心臟腑虛冷别錄增炮炙論凡使去挺用頭以醋浸一宿焙乾以刀刮去皮粟子令淨乃用免傷人肺令人上氣蒟醬增南方草木狀蒟醬生于番禺可以為食故謂之醬焉交趾九真人家多種蔓生益部方物畧記蒟出渝瀘茂威等州即漢唐䝉所得者葉如王𤓰厚而澤實若桑椹緣木而蔓子熟時外黑中白長三四寸以蜜藏而食之辛香能温五臟或用作醬善和食味或言即南方所謂浮留藤取葉合㯽榔食之本草綱目蒟子一名土蓽茇苗名蔞藤一名扶留藤劉歆期交州記云扶留有三種一名穫留其根香美一名扶留其藤味亦辛一名南扶留其葉青味辛氣温無毒下氣温中破痰治欬逆上氣心腹蟲痛胃弱虚瀉霍亂吐逆解酒食味散結氣消榖解瘴癘去胸中惡邪氣温脾燥熱彚考增漢書西南夷傳大行王恢使番陽令唐蒙風曉南粤南粤食蒙蜀枸醬蒙問所從來曰道西北牂牁江江廣數里出番禺城下蒙歸至長安問蜀賈人獨蜀出枸醬多持竊出市夜郎夜郎者臨牂牁江江廣百餘歩足以行船南粤以財物役屬夜郎西至桐師然亦不能臣使也集藻贊增宋宋祁蒟醬贊蔓附木生實若椹纍或曰浮留南人謂之和以為醬五味告宜五言絶句增宋朱子扶留根節含露辛苕穎扶楥綠蠻中靈草多夏永清隂足别錄增炮炙論凡采得後以刀刮去麤皮擣細每五錢用生薑自然汁五兩拌之蒸一日曝乾用肉豆􅅳增本草綱目肉豆􅅳一名肉果一名迦拘勒冦宗奭曰肉豆蔲對草豆蔲為名李時珍曰花實皆似豆蔲而無核故名蘇頌曰嶺南人家種之春生苗夏抽莖開花結實似豆蔲六月七月采之李時珍曰花實雖似草豆蔲而皮肉之顆則不同顆外有皺紋而内有斑纈紋如㯽榔紋最易生蛀惟烘乾密封則稍可留氣味辛温無毒温中消食止洩治積冷心腹脹痛霍亂中惡鬼氣冷疰嘔沫小兒乳霍調中下氣開胃解酒毒治痰飲心腹蟲痛脾胃虚冷氣赤白痢别錄增炮炙論凡使須以糯米粉湯捜裹豆蔲于煻灰火中煨熟去粉用勿令犯鐵補骨脂增本草綱目補骨脂一名破故紙一名婆固脂一名胡韭子補骨脂言其功也番人呼為婆固脂而俗訛為破故紙也胡韭子因其子之狀相似也馬志曰生嶺南諸州及波斯國蘇頌曰今嶺外山坂間多有之四川合州亦有皆不及番舶者佳莖高三四尺葉小似薄荷花微紫色實如麻子圓扁而黑九月采氣味辛大温無毒治五勞七傷風虚冷骨髓傷敗腎冷及婦人血氣墮胎男子腰疼膝冷逐諸冷痺頑通命門暖丹田歛精神别錄增炮炙論此藥燥毒須用酒浸一宿漉出以東流水浸三日夜蒸之從巳至申日乾用一法以鹽同炒過曝乾薑黃增本草綱目薑黃一名蒁一名寶鼎香蘇恭曰薑黃根葉都似鬱金其花春生於根與苗並出入夏花爛無子蘇頌曰今江廣蜀川多有之葉青綠長一二尺許濶三四寸有斜文如紅蕉葉而小花紅白色至中秋漸凋春末方生其花先生次方生葉不結實根盤屈黃色類生薑而圓有節八月采根片切暴乾蜀人以治氣脹及産後敗血攻心甚驗蠻人生噉云可袪邪辟惡李時珍曰近時以扁如乾薑形者為片子薑黃圓如蟬腹形者為蟬肚鬱金並可浸水染色根氣味辛苦大寒無毒治心腹結積疰忤下氣破血除風熱消癰腫治癥瘕血塊通經治撲損瘀血止暴風痛冷氣下食袪邪辟惡鬱金二種同名增本草綱目鬱金一名馬蒁朱震亨曰鬱金無香而性輕揚能致達酒氣於高遠古人用治鬱遏不能升者恐命名因此也李時珍曰酒和鬱鬯昔人言是大秦國所産鬱金花香惟鄭樵通志言即是此鬱金其大秦三代時未通中國安得有此草羅願爾雅翼亦云是此根和酒令黃如金故謂之黃流其說並通此根形狀皆似莪蒁而醫馬病故名馬蒁蘇恭曰鬱金生蜀地及西戎苗似薑黃花白質紅末秋出莖心而無實其根黃赤取四畔子根去皮火乾馬藥用之破血而補番人謂之馬蒁嶺南者有實似小豆不堪噉李時珍曰其苗如薑其根大小如指頭長者寸許體圓有橫紋如蟬腹狀外黃内赤人以浸水染色亦微有香氣氣味辛苦寒無毒治血積下氣生肌止血破惡血治女人宿血氣心痛冷氣結聚失心顛狂蠱毒鬱金香一名鬱香一名紅藍花一名紫述香一名草麝香一名茶矩摩蘇頌曰說文解字云鬱芳草鬱鬯乃百草之英合而釀酒以降神乃遠方鬱人所貢故謂之鬱鬱今鬱林郡也李時珍曰漢鬱林郡即今廣西貴州潯柳邕賔諸州之地一統志惟載柳州羅城縣出鬱金香即此也金光明經謂之茶矩摩香陳藏器曰鬱金香生大秦國二月三月有花狀如紅藍四月五月采花即香也氣味苦温無毒治蠱野諸毒心腹間惡氣鬼疰鵶鶻等一切臭入諸香藥用彚考增詩大雅釐爾圭瓚秬鬯一卣告于文人傳秬黒黍也鬯香草也築煑合而鬱之曰鬯疏正義曰禮有鬱鬯者築鬱金之草而煑之以和秬黍之酒使之芬香條鬯故謂之鬱鬯鬯非草名而此傳言鬯草者蓋亦謂鬱為鬯草何者禮緯有秬鬯之草中候有鬯草生郊皆謂鬱金之草也以其可和秬鬯故謂之鬯草毛言鬯草蓋有然也梁書海南傳鬱金獨出罽賔國華色正黃而細與芙蓉華裹被蓮者相似國人先取以上佛寺積日香槁乃糞去之唐書西域傳天竺國貨有金剛旃檀鬱金與大秦扶南交趾相貿易烏茶國産鬱金東安國開元中遣使獻鬱金香石蜜等大勃律國地宜鬱金箇失蜜地出鬱金詩含神霧鬱金十葉為貫百二十貫采以煑之為鬯合芳物釀之以降神水經注秦桂林郡漢武帝元鼎六年更名鬱林郡王莽以為鬱平郡矣應劭地理風俗記曰周禮鬱人掌探器凡祭祀賔客之探事和鬱鬯以實樽彝鬱芳草也百草之華煑以合釀黑黍以降神者也或說今鬱金香是也一曰鬱人所貢因氏郡矣唐紀太宗時伽毘國獻鬱金香葉似麥門冬九月開花狀似芙蓉其色紫碧香聞數十歩花而不實欲種者取根妝樓記鬱金芳草也染婦人衣最鮮明然不奈日炙染成衣則微有鬱金之氣集藻頌增晉左九嬪鬱金頌伊此奇草名曰鬱金越自殊域厥珍來尋芬香酷烈悅目欣心明徳維馨淑人是欽窈窕妃媛服之褵衿永重名實曠世弗沉賦增漢朱公叔鬱金賦歲朱明之首月兮歩南園以迥眺覽草木之紛葩兮美斯華之英妙布綠葉而挺心吐芳榮而發曜衆華爛以俱發鬱金邈其無雙比光榮於秋菊齊英茂乎春松遠而望之粲若羅星出雲垂近而觀之煜若丹桂曜湘涯赫乎扈扈萋兮猗猗清風逍遥芳越景移上灼朝日下映蘭池覩兹榮之瑰異副歡情之所望折英華以飾首曜靜女之儀光瞻百草之青青羌朝榮而夕零美鬱金之純偉獨彌日而久停晨露未晞微風肅清增妙容之美麗發朱顔之熒熒作椒房之珍玩超衆葩之獨靈晉傅元鬱金賦葉萋萋兮翠青英藴藴而金黃樹晻藹以成䕃氣芬馥而含芳凌蘇合之殊珍豈艾納之足方榮曜帝㝢香播紫宫吐芬揚烈萬里望風詩散句增唐叚成式鬱金種得花茸細添入春衫領裏香蓬莪荗增本草綱目蓬莪荗一名蒁藥馬志曰生西戎及廣南諸州葉似蘘荷子似乾椹荗在根下並生一好一惡惡者有毒西人取之先放羊食羊不食者棄之蘇頌曰今浙江或有之三月生苗在田野中其莖如錢大高二三尺葉青白色長一二尺大五寸以來頗類蘘荷五月有花作穗黃色頭微紫根如生薑而荗在根下似雞鴨卵大小不常九月采削去麤皮蒸熟暴乾用氣味苦辛温無毒治心腹痛中惡疰忤鬼氣霍亂冷氣吐酸水解毒療婦人血氣結積丈夫奔豚破痃癖治一切氣開胃消食通經消瘀血止撲損痛下血及内損惡血别錄增炮炙論凡使于砂盆中以醋磨令盡然後于火畔㶸乾重篩過用本草綱目今人多以醋炒或煑熟入藥取其引入血分也荆三稜增本草綱目荆三稜蘇頌曰三稜草有三稜也生荆楚地故名荆三稜開寶本草作京者誤矣陳藏器曰三稜總有三四種京三稜黃色體重狀若鯽魚而小又有黒三稜狀如烏梅而稍大體輕有鬚相連蔓延作漆色蜀人以織為器一名䔷蘇頌曰今荆襄江淮濟南河陜間皆有之多生淺水旁及陂澤中春生苗葉似莎草極長高三四尺又似茭蒲葉而有三稜五六月抽莖高四五尺大如人指有三稜如削成莖端開花大體皆如莎草而大黃紫色苗下即魁初生成塊如附子大或有扁者其旁有根橫貫一根則連數魁魁上亦出苗其魁皆扁長如小鯽魚體重者三稜也其根末將盡一魁未發苗小圓如烏梅者黑三稜也又根之端鈎曲如爪者雞爪三稜也皆皮黑肌白而至輕或云不出苗只生細根者謂之雞爪三稜又不生細根者謂之黑三稜大小不常其色黑去皮即白三者本一種但力有剛柔各適其用因其形為名又河中府有石三稜根黃白色形如釵股葉綠如蒲苗高及尺亦有三稜四月開花白色如蓼葒花五月采根亦消積氣李時珍曰三稜多生荒廢陂池濕地春時叢生夏秋抽高莖莖端復生數葉開花六七枝花皆細碎成穗黃紫色中有細子其葉莖花實俱有三稜並與香附苗葉花實一樣但長大爾其莖光滑三稜如㯶之葉莖莖中有白穰剖之織物柔靭如藤吕忱字林云䔷草生水中根可緣器即此草莖非根也抱朴子言䔷根化鱓亦是此草其根多黃黑鬚削去鬚皮乃如鯽狀非本根似鯽也氣味苦平無毒治老癖癥瘕積聚結塊調血破氣治婦産後諸病療瘡腫下乳汁須用醋浸一日炒或煑熟焙乾入藥乃良香附子苗為莎草别見卉譜原香附子莎草根也一名草附子一名莎結一名水香稜一名續根草一名地藾根一名水巴㦸上古謂之雀頭香本草綱目云其根相附連續而生可以合香故謂之香附子古謂之雀頭香其葉似三稜及巴㦸而生下濕地故有水三稜水巴㦸之名俗人呼為雷公頭金光明經謂之月萃哆記事珠謂之抱靈居士生田野在處有之葉如老韭葉而硬光澤有劍脊稜五六月中抽一莖三稜中空莖端出數葉開青花成穗如黍中有細子其根有鬚鬚下結子一二枚轉相延生子上有細黑毛大者如羊棗而兩頭尖采得燎去毛曝乾氣味辛微苦甘平無毒足厥隂手少陽藥也兼行十二經八脈氣分散時氣寒疫利三焦解六鬱消飲食積聚痰飲痞滿胕腫腹脹脚氣止心腹肢體頭目齒耳諸痛癰疽瘡瘍吐血下血婦人崩帶經閉胎前産後百病為女科要藥其功能推陳致新故諸書皆云益氣而俗有耗氣之說又謂宜於女人不宜於男子者非矣蓋婦人以血用事氣行則血行無疾老人精枯血閉惟氣是資小兒氣日充則形乃日固大凡病則氣滯而餒香附於氣分為君藥世所罕知臣以參茋佐以甘草治虚怯甚速彚考原江表傳魏文帝遣使於吳求雀頭香增清異錄香附子湖湘人謂之回頭青言就地剗去轉首已青也别錄原修治凡采得曝乾火燎去毛童便浸透洗曬搗用或生或炒或酒醋鹽水浸各從本方稻草煑之味不苦香附之氣平而不寒香而能竄其味辛能散微苦能降微甘能和乃足厥隂肝手少陽三焦氣分主藥而通下二經氣分生則上行胸膈外達皮膚熟則下走兩腎外徹腰足炒黑則止血得童溲浸炒則入血分而補虚鹽水浸炒則入血分而潤燥青鹽炒則補腎氣酒浸炒則行經絡醋浸炒則消積聚薑汁炒則化痰飲得參术則補氣得歸苄則補血得木香則流滯和中得檀香則理氣醒脾得沉香則升降諸氣得芎藭蒼术則總解諸鬱得梔子黃連則能降火熱得伏神則交濟心腎得茴香破故紙則引氣歸元得厚朴半夏則决壅消脹得紫蘇蔥白則解散邪氣得三稜莪荗則消磨積塊得艾葉則治血氣㬉子宫乃氣病之總司女科之主帥也艾納香增開寶本草廣志云艾納出西國似細艾又有松樹皮上綠衣亦名艾納與此不同其氣味甘温平無毒治惡氣殺蟲主腹冷洩痢傷寒五洩心腹注氣止腸鳴下寸白燒之辟瘟疫合蜂窠浴脚氣治癬辟蛇兜納香增海藥本草案廣志云兜納香出西海剽國諸山魏畧云出大秦國草類也氣味辛平無毒温中除暴冷惡瘡腫瘻止痛生肌並入膏用燒之辟遠近惡氣帶之夜行壯膽安神與茅香柳枝煎湯浴小兒易長藿香增南州異物志藿香出海邊國形如都梁可著衣服中交州記藿香似蘇合本草綱目藿香豆葉曰藿其葉似之故名楞嚴經謂之兜婁婆香法華經謂之多摩羅跋香金光明經謂之鉢怛羅香湼槃又謂之迦算香蘇頌曰嶺南多有之人家亦多種二月生苗莖梗甚密作叢葉似桑而小薄六七月采之須黃色乃可收李時珍曰莖方有節中虚葉微似茄葉氣味辛微温無毒治風水毒腫去惡氣止霍亂心腹痛吐逆開胃温中快氣香口彚考增吳外國傳都昆在扶南南三千餘里出藿香夢溪筆談酉陽雜爼記事多誕如云一木五香根旃檀節沉香花雞舌葉藿膠薰陸此尤謬旃檀與沉香兩木元異雞舌即今丁香耳藿香自是章葉南方至多薰陸小木而大葉海南亦有薰陸乃其膠也今謂之乳頭香五物迥殊原非同類王氏談錄公言蘭蕙二草今人蓋無識者或云藿香為蕙草集藻頌增梁江淹藿香頌桂以過烈麝以太芬摧沮天壽夭抑人文誰及藿香微馥微薰攝靈百仞養氣青雰附錄藿山草增廣東志肇慶府徳慶州東北五里曰藿山峰巒鬱秀上有草如藿香麻伯增名醫别錄麻伯一名君莒一名衍草一名道止一名自死生平陵如蘭葉厚白裹莖實赤黑九月采根味酸無毒主益氣出汗相鳥增名醫别錄相鳥一名鳥葵如蘭香赤莖生山陽五月十五日采隂乾味苦治隂痿天雄草增名醫别錄天雄草生山澤中狀如蘭實如大豆赤色味甘温無毒主益氣益妳草增本草拾遺益妳草生永嘉山谷葉如澤蘭莖赤高二三尺味苦平無毒治五痔止血炙令香浸酒服香薷原香薷一名香茸一名香菜一名蜜蜂草本草綱目云薷本葇玉篇云葇菜蘇之類是也其氣香其葉柔故以名之草初生曰茸食療本草作香戎者非俗呼蜜蜂草象其花房也中州人呼為香菜以充蔬品所在皆種但北土差少有野生者有家蒔者方莖尖葉有刻缺似黃荆葉而小九月開紫花成穗有細子汴洛作圃種之暑月作蔬生茹十月采取乾之圖經本草云又有一種石香葇生石上莖葉更細色黃而辛香彌甚本草綱目云一名石蘇高僅數寸葉如落帚葉與香薷同一物也但隨所生而名爾氣味辛微温無毒下氣除煩熱療霍亂腹痛嘔逆冷氣脚氣寒熱解暑治水李時珍云世醫治暑病以香薷飲為首藥不知中暑有頭痛發熱惡寒煩燥口渴或瀉或吐或霍亂者宜用有大熱大渴汗泄如雨煩燥喘促或瀉或吐乃勞倦内傷之症宜瀉火益元若用香薷是重虚其表而益之熱矣别錄原修治八九月開花著穗時采取去根苗葉隂乾勿犯火氣服至十兩一生不得食白山桃爵牀增本草綱目爵牀一名爵麻一名香蘇蘇恭曰此草生平澤熟田近道旁似香葇葉長而大或如荏且細俗名赤眼老母草李時珍曰原野甚多方莖對節與大葉香薷一樣但香薷搓之氣香而爵牀搓之不香微臭以此為别氣味鹹寒無毒治腰脊痛不得搘牀俛仰艱難除熱可作浴湯療血脹下氣治杖瘡赤車使者增本草綱目赤車使者一名小錦枝蘇恭曰苗似香葇蘭香葉莖赤根紫赤色八月九月采日乾韓保昇曰生荆州襄州根紫如蒨根二月八月采李時珍曰此與爵牀相類但以根色紫赤為别爾氣味辛苦温有毒治風冷邪疰蠱毒癥瘕五臟積氣治惡風冷氣服之悅澤肌皮好顔色假蘇增本草綱目假蘇一名薑芥一名荆芥一名鼠蓂蘇恭曰此即荆芥也薑芥聲訛爾曰蘇曰薑曰芥皆因氣味辛香如蘇如薑如芥也蘇頌曰處處有之葉似落藜而細初生香辛可噉人取作生菜古方稀用近世醫家為要藥並取花實成穗者曝乾入藥又有胡荆芥俗呼新羅荆芥又有石荆芥生山石間體性相近入藥亦同李時珍曰荆芥原是野生今為世用遂多栽蒔二月布子生苗炒食辛香方莖細葉似獨帚葉而狹小淡黃綠色八月開小花作穗成房房如紫蘇房内有細子如葶藶子狀黃赤色連穗收采用之氣味辛温無毒治寒熱鼠瘻瘰癧生瘡破結聚氣下瘀血除濕疸去邪除勞渴冷風出汗傅丁腫腫毒作菜生熟皆可食并煎茶飲之散風熱清頭目利咽喉消瘡腫袪風邪消瘡毒薄荷原薄荷一名菝􅀢一名蕃荷菜一名南薄荷一名吳菝􅀢一名金錢薄荷本草綱目云薄荷食性本草作菝􅀢音跋活甘泉賦作茇葀字林作茇䒷俗訛為薄荷千金方作蕃荷又方音之訛也以蘇州者為勝故謂之吳菝􅀢以别於胡菝􅀢也衍義云世稱此為南薄荷以别於龍腦薄荷㑹編云金錢薄荷謂其葉小頗圓如錢也二月宿根生苗清明前後分栽方莖赤色葉對生初生形長而頭圓及長則尖人家多栽之吳越川湖多以代茶蘇州所蒔者莖小而氣芳尤以産儒學前者為佳江西者稍麤川蜀者更麤氣味辛凉無毒利咽喉口齒諸病治瘰癧瘡疥風瘙癮疹去舌胎語澀止衂血塗蜂螫蛇傷療小兒驚熱集藻七言絶句原宋陸游題畫薄荷扇薄荷花開蝶翅翻風枝露葉弄秋妍自憐不及貍奴黠爛醉籬邊不用錢一枝香草出幽叢雙蝶紛飛戲晚風莫恨邨居相識晩知名元向楚辭中别錄增晉束晳發蒙記猫以薄荷為酒謂飲之即醉也物類相感志薄荷去魚腥原收採凡收薄荷須隔夜以糞水澆之雨後刈收則性凉不爾不凉製用可生食同薤作虀相宜病薄荷勿食令人虚汗不止痩弱人久食動消渴病地錢增酉陽雜爼地錢葉圓莖細有蔓生溪澗邊一曰積雪草亦曰連錢草本草綱目積雪草一名胡薄荷一名海蘇陶𢎞景曰積雪草方藥不用想此草以寒凉得名耳蘇恭曰此草葉圓如錢荆楚人謂為地錢草蘇頌曰處處有之八九月采苗葉隂乾用按天寶單行方云連錢草生咸陽下濕地亦生臨淄郡濟陽郡池澤中甚香俗間或云圓葉似薄荷江東吳越丹陽郡極多彼人常充生菜食之河北柳城郡盡呼為海蘇好近水生經冬不死咸陽洛陽亦有之或名胡薄荷冦宗奭曰南方多有生隂濕地不必荆楚形如水荇而小面亦光潔微尖為異葉葉各生今人謂之連錢草蓋取象也蘇頌圖經云胡薄荷與薄荷相類但味少甘生江浙間彼人多以作茶飲俗呼為新羅薄荷天寶方所用連錢草是也氣味苦寒無毒治大熱惡瘡癰疽傅熱腫丹毒治瘰癧鼠漏寒熱男女血病紫蘇原紫蘇一名赤蘇本草綱目云蘇性舒暢行氣和血故謂之蘇曰紫曰赤以色名也一名桂荏爾雅云蘇桂荏註云蘇荏類故名桂荏又一種白蘇皆二三月下種或宿子在地自生莖方葉圓而有尖四圍有鉅齒肥地者面背皆紫瘠地背紫面青其面背皆白即白蘇乃荏也紫蘇五六月連根收採以火煨其根隂乾則經久葉不落八月開細紫花成穗作房如荆芥穗九月半枯時收子子細如芥子而色黃赤又有一種花紫蘇其葉細齒密紐如翦成狀香色莖子並無異者人稱回回蘇莖葉子俱辛温無毒氣辛入氣分色紫入血分解肌發表行氣寛中消痰利肺和血温中止痛定喘開胃安胎散風寒解魚蟹毒治蛇犬傷為近世要藥彚考增沙州記吉魯爾之地不種五榖惟食蘇子集藻五言古詩增宋劉敞採紫蘇歲暮有秋望帶經且親鋤今兹五月交盛陽精已徂養生寄空瓢雖乏未可虚止以營一飲形骸如此劬别錄原製用葉生採作羮殺一切魚肉毒嫩時採葉和蔬茹之或鹽及梅滷作葅食甚香夏月作熟湯飲之務本新書田畔近道可種蘇以遮六畜收子打油燃燈甚明或熬之以油器物丹房鏡源蘇子油能柔五金八石宋氏種植書子與葉同功發散風氣用葉清利上下用子香紫蘇採蘇嫩心長三寸許勿見水約三斤用鹽二兩醃一宿梅滷浸三日曬乾入甘草甘松白芷末拌勻摻收之製細酸紫蘇葉同茭白青梅作絲入白糖曝乾細酸平時取咀嚥之利瘕結消五鬲雲南紫蘇頭葉入梅醬醃一日取出用糖浸可作佳蔬其子醋浸甚爽酒白蘇子乾收炒熟最香入糖煎拌芝蔴均為佳品禁忌宋仁宗命翰林院定湯飲以紫蘇熱水為第一取其能下胸膈浮氣也不知久則瀉人真氣水蘇增本草綱目水蘇一名雞蘇一名香蘇一名龍腦薄荷一名芥蒩一名芥苴此草似蘇而好生水旁故名水蘇其葉辛香可以煑雞故有龍腦香蘇雞蘇諸名芥蒩芥苴當作芥蘇以其味辛如芥故名三月生苗方莖中虚葉似蘇葉而微長密齒面皺色青對節生氣甚辛烈六七月開花成穗如蘇穗水紅色穗中有細子狀如荆芥子可種易生宿根二月生沃地者苗高四五尺氣味辛微温無毒理血下氣清肺消榖除飲食辟口臭去邪毒辟惡氣久服通神明輕身耐老薺薴增本草綱目薺薴一名臭蘇一名青白蘇云其形似水蘇而臭似白蘇而青故有二名處處平地有之葉似野蘇而稍長有毛氣臭山人茹之味不甚佳氣味辛温無毒治冷氣洩痢生食除胸間酸水挼碎傅蟻瘻附錄石薺薴增本草拾遺石薺薴生山石間細葉紫花高一二尺山人用之味辛温無毒治風冷氣瘡疥瘙痒痔瘻下血煑汁服之菴䕡增本草綱目菴䕡一名覆閭菴草屋也閭里門也此草乃蒿屬者莖可以蓋覆菴閭故以名之貞元廣利方謂之菴䕡蒿葉似菊葉而薄多細丫面背皆青高者四五尺其莖白色如艾莖而麤八九月開細花淡黃色結細實如艾實中有細子極易繁衍藝花者以之接菊子氣味苦微寒無毒治五臟瘀血腹中水氣臚脹留熱風寒濕痺身體諸痛久服輕身延年不老療心下堅隔中寒熱周痺通經消食眀目駏驉食之神仙附錄對廬增名醫别錄對廬似菴䕡八月采味苦寒無毒主疥瘡久不瘳生肌除大熱煑汁洗之艾原艾一名醫草一名氷臺一名艾蒿爾雅云艾氷臺注云今艾蒿一名黃草處處有之宋時以湯隂複道者為佳近代湯隂者謂之北艾四明者謂之海艾自成化以來惟以蘄州者為勝謂之蘄艾相傳蘄州白家山産艾置寸板上炙之氣徹於背他山艾徹五分湯隂艾僅三分以故世皆重之此草宿根二月生苗成叢莖白色直上高四五尺葉四布狀如蒿分五尖椏上復有小尖面青背白有茸而柔厚味苦而辛生則温熟則熱七八月葉間出穗如車前穗細花結實纍纍盈枝中有細子霜後始枯皆以五月五日連莖刈取曝乾收葉以炙百病凡用艾陳久者良治令細軟謂之熟艾若生艾炙火傷入肌脈作煎治諸血病温中逐冷除濕搗汁服止傷血殺蚘蟲治心腹一切冷氣鬼氣其莖乾之染麻油引火㸃炙炷滋潤炙瘡至愈不痛又可代蓍策作燭心彚考增詩王風彼采艾兮一日不見如三歲兮原孟子猶七年之病求三年之艾也增隋書酷吏傳屈突蓋為武候驃騎嚴刻長安為之語曰寧茹三升艾不逢屈突蓋唐書南蠻傳婆利者直環王東南多火珠大者如雞卵圓白照數尺日中以艾藉珠輙火出師曠占艾先生則歲多病四民月令三月可採艾漢武内傳西王母神仙次藥有靈叢艾博物志削氷令圓舉以向日以艾於後承其影則得火原荆楚歲時記五月五日採艾以為人懸門戸上以禳毒氣按宗則字文度嘗以五月五日雞未鳴時採艾見似人處攬而取之增老學庵筆記祖母楚國夫人病累月醫藥莫効一日有老道人狀貌甚古探囊出少艾取一甎炙之祖母方卧忽覺腹間痛甚如火灼道人徑去疾馳不可及祖母病遂愈獨醒雜志樞密孫公抃生數日患臍風已不救家人乃盛以盤合將棄諸江道遇老媪曰兒可活即與俱歸以艾炙臍下遂活原外國記安南艾山上有仙艾每春仲開花雨後落水面羣魚吞之化為龍者十九集藻贊增齊孔璠之艾贊論藹靈艾蔚彼修坂混區羣卉理深用遠明李言聞艾贊産于山陽采以端午治病炙疾功非小補賦增齊孔璠之艾賦良藥弗達妙針莫宣奇艾急病靡身挺煙治匪君臣得用神火振淹固於一爛氣絶息乎無假淳建投而招祟鉗椒擣而貽禍伊兹艾之淑粹仍索質於中野嗟乎貞灰與邪燼迭御芳煙與苦蘭競薰是以艾正而賤蘭妖而珍故言堯則桀對舉蘭則艾因文賦散句增楚屈原離騷扈服艾以盈腰兮謂幽蘭其不可佩漢張衡思元賦寶蕭艾于重篋兮謂蘭蕙之不香唐陳章艾人賦採彼艾兮及此佳辰標至靈以衞物因善救以成人詩散句原宋章得象艾葉成人後榴花結子初增梁沈約艾葉彌南浦庾肩吾漢艾凌波出唐孟浩然采艾值幽人附錄千年艾增本草綱目千年艾出武當太和山中小莖高尺許其根如蓬蒿其葉長寸餘無尖椏面青背白秋開黃花如野菊而小結實如青珠丹顆之狀三伏日采葉曝乾葉不似艾而作艾香搓之即碎不似艾葉成茸也氣味辛微苦温無毒治男子虚寒婦人血氣諸痛隂地厥增圖經本草隂地厥生鄧州順陽縣内鄉山谷葉似青蒿莖青紫色花作小穗微黃根似細辛七月采根用氣味甘苦微寒無毒治腫毒風熱九牛草增圖經本草九牛草生筠州山岡上二月生苗獨莖高一尺葉似艾葉圓而長背有白毛面青五月采苗用氣味微苦有小毒解風勞治身體痛與甘草同煎服不入衆藥用益母草原益母草一名雈一名蓷一名茺蔚一名貞蔚一名益明一名野天麻一名火杴一名猪麻一名苦低草一名夏枯草一名土質汗一名鬱臭草爾雅云雈蓷註云今茺蔚也廣雅名益母本草綱目云此草及子皆茺盛密蔚故名茺蔚其功宜於婦人及明目益精故有益母益明之稱其莖方類麻故謂之野天麻俗呼為猪麻猪喜食之也夏至後即枯故亦有夏枯之名近効方謂之土質汗質汗出西番治金瘡折傷益母亦治折傷故名劉歆云蓷臭穢也拾遺云田野間人呼為鬱臭草埤雅又謂之蔚臭處處有之春初生苗如嫩蒿入夏長三四尺莖方如黃麻莖葉青如艾葉而背青一梗三葉有尖岐寸許一節節間花苞叢簇抱莖四五月開小花紅紫色每萼内子數粒大如同蒿子有三稜褐色其草生時有臭氣夏至後即枯根白色味甘微辛氣温無毒和血行氣有助隂之功治婦女一切諸病能明目益精久服令人有子治手足厥隂血分風熱及女人諸病單用子若治腫毒瘡瘍消水行血胎産諸病則根莖花葉並用蓋根莖花葉専於行而子則行中有補也彚考增詩王風中谷有蓷註蓷鵻也即今益母草也别錄原修治凡用益母根莖切以竹刀忌鐵器用子微炒香或砂鍋蒸熟曝乾舂取仁用辨訛按閨閤事宜爾雅陳藏器皆以白花者為益母紫花者為野天麻返魂丹註以紫花者為益母白花者不是千金方以為一物二種凡花皆有赤白如牡丹芍藥菊花之類李時珍以二色花皆益母白花者主氣分紫花者主血分分别而用之可也製用唐天后澤面法五月五日采根苗具者勿著土曬乾搗羅以水和成團雞子大再曝乾作一爐四旁開竅上下置火安藥中央大火燒一炊久去大火留小火養之勿令火絶經一伏時取出瓷器中研極細收用如澡豆法日用一方每十兩加滑石一兩胭脂一錢鏨菜增圖經本草鏨菜生江南隂地似益母方莖對節白花李時珍曰此即益母之白花者乃一物二種故亦主血病與益母功同嫩苗可食故謂之菜氣味辛平無毒破血治産後腹痛煑汁服薇䘖增本草綱目薇䘖一名糜䘖一名鹿䘖一名吳風草一名無心一名無顛一名承膏一名承􅡌蘇恭曰南人謂之吳風草一名鹿䘖草言鹿有疾䘖此草即瘥李時珍曰據蘇說則薇䘖糜䘖當作麋䘖也鹿麋一類也按酈道元水經注云魏興錫義山多生薇䘖草有風不偃無風獨揺則吳風亦當作無風乃通陳藏器曰一名無心草非草之無心者方藥少用别錄曰薇䘖生漢中川澤及寃句邯鄲七月采莖葉隂乾蘇恭曰此草叢生似茺蔚及白頭翁其葉有毛赤莖又有大小二種楚人謂大者為大吳風草小者為小吳風草韓保昇曰葉似茺蔚叢生有毛其花黃色其根赤黑色氣味苦平無毒治風濕痺歴節痛驚癎吐舌悸氣賊風䑕瘻癰腫暴癥逐水療痿躄久服輕身明目夏枯草增本草綱目夏枯草一名夕句一名乃東一名燕面一名鐵色草朱震亨曰此草夏至後即枯蓋禀純陽之氣得隂氣則枯故有是名蘇恭曰處處有之生平澤冬至後生葉似旋覆三月四月開花作穗紫白色似丹參花結子亦作穗五月便枯四月采之李時珍曰原野間甚多苗高一二尺許其莖微方葉對節生似旋覆葉而長大有細齒背白多故莖端作穗長一二寸穗中開淡紫小花一穗有細子四粒嫩苗瀹過浸去苦味油鹽拌之可食氣味苦辛寒無毒治寒熱瘰癧䑕瘻頭瘡破癥散癭結氣脚腫濕痺輕身劉寄奴草增本草綱目劉寄奴草詳見述異記一名金寄奴一名烏藤菜鄭樵通志云江南人因漢時謂劉為卯金刀乃呼劉為金是以又有金寄奴之名江東人謂之烏藤菜云一莖直上葉似蒼术尖長糙澀面深背淡九月莖端分開數枝一枝攢簇十朶小花白瓣黃蘂如小菊花狀花罷有白絮如苦買花之絮其子細長亦如苦蕒子氣味苦温無毒破血下脹下血止痛治産後餘疾止金瘡血極効多服令人下痢彚考增述異記宋武帝微時伐荻於新洲見大蛇長數丈遂射之傷明日復往觀之聞杵臼聲覘見數青衣童子搗藥問其故答曰我王為劉寄奴所射今合藥傅之帝曰何神也童子不答帝叱之皆散收得藥人因名此草為劉寄奴曲節草增本草綱目曲節草一名六月凌一名六月霜一名綠豆青一名蛇藍此草性寒故有凌霜綠豆之名蘇頌曰生均州四月生苗莖方色青有節葉似劉寄奴而青軟七八月著花似薄荷結子無用五月六月采莖葉隂乾氣味甘平無毒治發背瘡消癰腫拔毒同甘草作末米汁調服麗春草與花譜麗春名同物異增圖經本草麗春草生檀嵎山川谷檀嵎山在高密界河南淮陽郡潁川及譙郡汝南郡等並呼為龍羊草河北近山鄴郡汲郡並名叢蘭艾上黨紫團山亦有名定參草又名仙女蒿花及根並治癊黃黃疸青葙增本草綱目青葙一名草蒿一名萋蒿一名崑崙草一名野雞冠一名雞冠莧子名草决明青葙名義未詳胡麻葉亦名青蘘此草又多生於胡麻地中與之同名豈以其相似而然耶青蒿亦名草蒿其功相似名亦相同其子明目與决明子同功故有草决明之名其花葉似雞冠嫩苗似莧故謂之雞冠莧陳藏器曰荆襄人謂之崑崙草生田野間嫩苗可食長則高三四尺苗葉花實與雞冠花一樣無别但雞冠花穗或有大而扁或團者此則梢間出花穗尖長四五寸狀如兔尾水紅色亦有黃白色者子在穗中與雞冠子及莧子一樣難辨莖葉氣味苦微寒無毒治邪氣皮膚中熱風瘙身癢殺三蟲惡瘡疥蝨痔蝕䘌瘡擣汁服療温癘止金瘡血子氣味苦微寒無毒治唇口青五臟邪氣益腦髓鎮肝明耳目堅筋骨去風寒濕痺治肝臟熱毒衝眼赤障青盲翳腫惡瘡疥瘡附錄桃朱術增本草綱目蕭炳曰青葙一種花黃者名陶朱術苗相似陳藏器曰桃朱術生園中細如芹花紫子作角以鏡向旁敲之則子自發五月五日乃收子帶之令婦人為夫所愛附錄天靈草增土宿真君本草天靈草狀如雞冠花葉亦如之折之有液如乳生江湖荆南陂池間五月取汁可制雄硫煑雌煉砂附錄思蓂子增炮炙論思蓂子鼠細子二件真似青葙子只是味不同思蓂子味苦煎之有涎大薊增本草綱目大薊一名虎薊陶𢎞景曰大薊是虎薊小薊是貓薊葉並多刺相似一名馬薊一名刺薊一名山牛蒡一名雞項草一名千針草一名野紅花薊猶髻也其花如髻也曰虎曰貓因其苗狀猙獰也曰馬者大也牛蒡因其根似牛蒡根也雞項因其莖似雞之項千針紅花皆其花狀也鄭樵通志謂爾雅之蘩曰狗毒者即此未知是否陳藏器曰薊門以多薊得名當以北方者為勝也蘇恭曰大小薊葉雖相似功力有殊大薊生山谷根療癰腫小薊生平澤不能消腫而俱能破血蘇頌曰小薊處處有之俗名青刺薊二月生苗二三寸時併根作菜茹食甚美四月高尺餘多刺心中出花頭如紅藍花而青紫色北人呼為千針草四月采苗九月采根並隂乾用大薊苗根與此相似但肥大爾冦宗奭曰大小薊皆相似花如髻但大薊高三四尺葉皺小薊高一尺許葉不皺以此為異作菜雖有微芒不害人大薊根氣味甘温無毒安胎止吐血鼻衂令人肥健葉治腸癰腹臟瘀血作暈撲損惡瘡疥癬小薊根氣味甘温無毒養精血破宿血生新血合金瘡治蜘蛛蛇蝎毒熱毒風并胸膈煩悶開胃下食退熱補虚損苗去煩熱作菜食除風熱御定佩文齋廣羣芳譜卷九十五
