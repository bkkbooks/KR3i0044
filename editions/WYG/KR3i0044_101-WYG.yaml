body:
  text: 欽定四庫全書御定佩文齋廣羣芳譜卷九十九藥譜屈草増本草經屈草味苦微寒無毒主胸脇下痛邪氣腸間熱隂痺乆服輕身益氣耐老别羇増本草經别羇味苦微温無毒主風寒濕痺身重四肢疼酸寒厯節痛名醫别録别羇一名别枝生藍田川谷二月八月采離樓草増名醫别録離樓草味鹹平無毒主益氣力多子輕身長年生常山七月八月采實黄護草増名醫别録黄護草無毒主痺益氣令人嗜食生隴西雀醫草増名醫别録雀醫草味苦無毒主輕身益氣洗爛瘡療風水一名白氣春生秋花白冬實黑木甘草増名醫别録木甘草主療癰腫盛熱煮洗之生木間三月生大葉如蛇牀四四相值但折枝種之便生五月花白實核赤三月三日采之益決草増名醫别録益決草味辛温無毒主欬肺傷生山隂根如細辛九熟草増名醫别録九熟草味甘温無毒主出汗止洩療悶一名鳥粟一名雀粟生人家庭中葉如棗一嵗九熟七月采兌草増名醫别録兌草味酸平無毒主輕身益氣長年冬生蔓草木上葉黄有毛異草増名醫别録異草味甘無毒主痿痺寒熱去黑子生籬木上葉如葵莖旁有角汁白灌草増名醫别録灌草一名鼠肝葉滑汁白主癰腫䒻草増名醫别録䒻草味辛無毒主傷金瘡莘草増名醫别録莘草味甘無毒主盛傷痺腫生山澤如蒲黄葉如芥英草華増名醫别録英草華味辛平無毒主痺氣療女勞疸觧煩堅筋骨療風頭可作沐藥生蔓木上一名鹿英九月采隂乾封華増名醫别録封華味甘有毒主疥瘡養肌去惡肉夏至日采㥏華増名醫别録㥏華味甘無毒主上氣觧煩堅筋骨節草増名醫别録節草味苦無毒主傷中痿痺􅀈腫皮主脾中客熱氣一名山節一名逹節一名通漆十月采暴乾讓實増名醫别録讓實味酸主㗋痺止洩痢十月采隂乾羊實増名醫别録羊實味苦寒主頭秃惡瘡疥瘙痂㿅生蜀郡桑莖實増名醫别録桑莖實味酸温無毒主乳孕餘病輕身益氣一名草王葉如荏方莖大葉生園中十月采可聚實増名醫别録可聚實味甘温無毒主輕身益氣眀目一名長夀生山野道中穂如麥葉如艾五月采滿陰實増名醫别録滿隂實味酸平無毒主益氣除熱止渴利小便長年生深山及園中莖如芥葉小實如櫻桃七月成馬顛増名醫别録馬顛味甘有毒療浮腫不可多食馬逄増名醫别録馬逄味辛無毒主癬蟲棗増名醫别録棗味酸無毒主輕身益氣生丹陽陵地髙尺許實如棗鹿良増名醫别録鹿良味鹹臭主小兒驚癎賁豚瘛瘲大人痓五月采雞湼増名醫别録雞湼味甘平無毒主眀目中寒風諸不足水腫邪氣補中止洩痢療女子白沃一名陰洛生雞山采無時犀洛増名醫别録犀洛味甘無毒主癃疾一名星洛一名泥洛雀梅増名醫别録雀梅味酸寒有毒主蝕惡瘡一名干雀生海水石谷間燕齒増名醫别録燕齒主小兒癎寒熱五月五日采土齒増名醫别録土齒味甘平無毒主輕身益氣長年生山陵地中狀如馬牙金莖増名醫别録金莖味苦平無毒主金瘡内漏一名葉金草生澤中髙處白背増名醫别録白背味苦平無毒主寒熱洗惡瘡疥生山陵根似紫葳葉如燕盧采無時青雌増名醫别録青雌味甘主惡瘡秃敗瘡火氣殺三蟲一名蟲損一名孟推生方山山谷白辛増名醫别録白辛味辛有毒主寒熱一名脱尾一名羊草生楚山三月采根白而香赤舉増名醫别録赤舉味甘無毒主腹痛一名羊飴一名陵渴生山隂二月花繞蔓草上五月實黑中有核三月三日采葉隂乾赤湼増名醫别録赤湼味甘無毒主疰崩中止血益氣生蜀郡山石隂地濕處采無時赤赫増名醫别録赤赫味苦寒有毒主痂瘍惡敗瘡除三蟲邪氣生益州川谷二月八月采黄秫増名醫别録黄秫味苦無毒主心煩止汗出形如桐根黄辨増名醫别録黄辨味甘平無毒主心腹疝瘕口瘡臍傷一名經辯紫給増名醫别録紫給味鹹主毒風頭洩注一名野葵生髙陵下地三月三日采根根如烏頭紫藍増名醫别録紫藍味鹹無毒主食肉得毒能消除之糞藍増名醫别録糞藍味苦主身痒瘡白禿漆瘡洗之生房陵巴朱増名醫别録巴朱味甘無毒主寒上血帶下生雒陽柴紫増名醫别録柴紫味苦主小腹痛利小腹破積聚長肌肉久服輕身長年生􅁈句二月七月采文石増名醫别録文石味甘主寒熱心煩一名黍石生東郡山澤中水下五色有汁潤澤路石増名醫别録路石味甘酸無毒主心腹止汗生肌酒痂益氣耐寒實骨髓一名陵石生草石上天雨獨乾日出獨濡花黄莖赤黑三嵗一實赤如麻五月十月采莖葉隂乾曠石増名醫别録曠石味甘平無毒主益氣養神除熱止渴生江南如石草敗石増名醫别録敗石味苦無毒主渴痺石劇増名醫别録石劇味甘無毒止消渴石芸増名醫别録石芸味甘無毒主目痛淋露寒熱溢血一名螫烈一名顧啄三月五月采莖葉陰乾竹付増名醫别録竹付味甘無毒止痛除血祕惡増名醫别録祕惡味酸無毒主療肝邪氣一名杜逢盧精増名醫别録盧精味平治蠱毒生益州唐夷増名醫别録唐夷味苦無毒主療踒折知杖増名醫别録知杖味甘無毒療疝河煎増名醫别録河煎味酸主結氣癰在㗋頸者生海中八月九月采區余増名醫别録區余味辛無毒主心腹熱癃王眀増名醫别録王眀味苦主身熱邪氣小兒身熱以浴之生山谷一名王草師系増名醫别録師系味甘無毒主癰腫惡瘡煮洗之一名臣堯一名巨骨一名鬼芭生平澤八月采并苦増名醫别録并苦主欬逆上氣益肺氣安五臓一名􅀢音或薰一名玉荆三月采隂乾索千増名醫别録索千味苦無毒主易耳一名馬耳良逹増名醫别録良達主齒痛止渴輕身生山隂莖蔓延大如葵子滑小戈共増名醫别録戈共味苦寒無毒主驚氣傷寒腹痛羸瘦皮中有邪氣手足寒無色生益州山谷惡蜚亷舩虹増名醫别録舩虹味酸無毒主下氣止煩渴可作浴湯藥色黄生蜀郡立秋取姑活増名醫别録姑活味甘温無毒主大風邪氣濕痺寒痛久服輕身益氣耐老一名冬葵子生河東唐本草姑活一名雞精白女腸増名醫别録白女膓味辛寒無毒主洩痢膓澼療心痛破疝瘕生深山谷葉如藍實赤赤女膓同白扇根増名醫别録白扇根味苦寒無毒主瘧皮膚寒熱出汗令人變黄白支増名醫别録黄白支生山陵三月四月采根暴乾父陛根増名醫别録父陛根味辛有毒以熨癰腫膚脹一名膏魚一名梓藻疥拍腹増名醫别録疥拍腹味辛温無毒主輕身療痺五月采隂乾五母麻増名醫别録五母麻味苦有毒主痿痺不便下痢一名鹿麻一名歸澤麻一名天麻一名若草生田野五月采五色符増名醫别録五色符味苦微温主欬逆五臓邪氣調中益氣眀目殺蟲青符白符赤符黑符黄符各隨色補其臓白符一名女木生巴山谷救赦人者増名醫别録救赦人者味甘有毒主疝痺通氣諸不足生人家宮室五月十月采暴乾常吏之生増名醫别録常吏之生味苦平無毒主眀目實有刺大如稻粱載増名醫别録載味酸無毒主諸惡氣慶増名醫别録慶味苦無毒主欬𠻳腂増名醫别録腂味甘無毒主益氣延年生山谷中白順理十月采芥増名醫别録芥味苦寒無毒主消渴止血婦人痰除痺一名梨葉如大青鴆鳥漿増本草拾遺鴆鳥漿生江南林木下髙一二尺葉陰紫色冬不凋有赤子如珠味甘温無毒能觧諸毒故名山人浸酒服主風血羸老􅁻祥草與草譜􅁻祥草名同物異増本草拾遺􅁻祥草生西國味甘温無毒主眀目强記補心力雞脚草増本草拾遺雞脚草生澤畔赤莖對葉如百合苖味苦平無毒主赤白久痢成疳肝草増本草拾遺肝草初生細葉軟似肝一名雞肝味甘平無毒主金瘡止血生肉觧丹石發熱斷鑵草増本草拾遺斷鑵草主疔瘡千金䥶増本草拾遺千金䥶生江南髙二三尺主傅蛇蝎蟲咬毒土落草増本草拾遺土落草生嶺南山谷葉細長味甘温無毒主腹冷氣痛痃癖倚待草増本草拾遺倚待草生桂州如安山谷葉圓髙二三尺八月采味甘温無毒主血氣虚勞腰膝疼弱風緩羸瘦無顔色絶陽無子婦人老血浸酒服逐病極速故名倚待藥王草増本草拾遺藥王草苖莖青色摘之有汁味甘平無毒觧一切毒止鼻衂吐血袪煩躁筋子根増本草拾遺筋子根生四眀山苖髙尺餘葉圓厚光潤冬不凋根大如指亦名根子味苦温無毒主心腹痛不問冷熱逺近惡鬼氣注刺痛霍亂蠱毒暴下血廅藥増本草拾遺廅藥生蕃國似乾茅黄赤色味鹹温無毒主折傷内損瘀血生膚止痛治五臓除邪氣補虚損産後血病無風獨揺草與羗活天麻鬼臼名同物異増海藥本草無風獨揺草生大秦國及嶺南五月五日采諸山野亦徃徃有之頭若彈子尾若鳥尾兩片開合見人自動故曰獨揺性平温無毒主頭骨逰風遍身癢本草拾遺獨揺草帶之令夫相愛陀得花増開寳本草陀得花味甘平無毒主一切風血生西國蕃人將来蕃人采此花以釀酒呼為三勒漿建水草増圖經本草建水草生福州枝葉似桑四時常有土人取葉治走注風痛百藥祖増圖經本草百藥祖生天台山中冬夏常青土人采葉治風催風使與五加皮名同物異増圖經本草催風使生天台山中冬夏常青土人采葉治風刺虎増圖經本草刺虎生睦州凌冬不凋采根葉枝入藥味甘主一切腫痛風疾石逍遥増圗經本草石逍遥生常州冬夏常有無花實味苦微寒無毒主癱瘓諸風手足不遂久服益氣輕身黄寮郎増圖經本草黄寮郎生天台山中冬夏常青土人采根治風醫學正傳黄寮郎俗名倒摘刺治㗋痛黄花了増圖經本草黄花了生信州春生青葉三月開花似辣菜花黄色秋中結實采無時治咽㗋口齒病百兩金増圖經本草百兩金生戎州河中府雲安軍苖髙二三尺有榦如木凌冬不凋葉似荔枝初生背面俱青秋後背紫面青初秋開花青碧色結實如豆大生青熟赤無時采根去心用味苦性平無毒治壅熱咽㗋腫痛其河中出者根赤如蔓菁莖細青色四月開碎黄花似星宿花五月采根曬乾用治風涎地茄子増圖經本草地茄子生商州三月開花結子五六月采陰乾味微辛温有小毒主中風痰涎麻痺下熱毒氣破堅積利膈消癰腫瘡癤散血堕胎田母草増圖經本草田母草生臨江軍無花實三月采根性涼主煩熱及小兒風熱田麻増圖經本草田麻生信州田野及溝澗旁春夏生青葉八月中生小莢冬月采葉治癰癤腫毒芥心草増圖經本草芥心草生淄州引蔓白色根黄色四月采苖葉治瘡疥苦芥子増圖經本草苦芥子生秦州苖長一尺餘莖青葉如栁開白花似榆葉其子黑色味苦大寒無毒眀目治血風煩躁布里草増圖經本草布里草生南恩州原野中莖髙三四尺葉似李而大至夏不花而實食之㵼人采根皮焙為末味甘寒有小毒治瘡疥殺蟲茆質汙増圖經本草茆質汙生信州葉青花白七月采根治風腫行血胡堇草増圖經本草胡堇草生密州東武山田中枝葉似小堇菜花紫色似翹軺花一枝七葉花出兩三莖春采苖味辛滑無毒止痛散血治打撲損傷筋骨惡癰腫搗汁塗金瘡小兒羣増圖經本草小兒羣生施州叢髙一尺以來春夏生苖葉無花冬枯其根味辛性涼無毒治淋疾獨脚仙増圖經本草獨脚仙生福州山林旁陰泉處多有之春生苗葉圓落下紫脚長三四寸秋冬葉落夏連根葉采焙為末治婦人血塊撮石合草増圖經本草撮石合草生眉州平田中莖髙二尺以来葉似榖葉十二月萌芽二月有花不結實其苖味甘無毒療金瘡露筋草増圖經本草露筋草生施州株髙三尺以来春生苖隨即開花結子碧緑色四時不凋其根味辛濇性涼無毒主蜘蛛蜈蚣傷九龍草増本草綱目九龍草一名金釵草生平澤中紅子狀如楊梅其苖觧諸毒治㗋痛折傷骨筋蛇虺傷㗋風重舌牙闗𦂳