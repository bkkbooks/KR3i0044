桐節如斑竹下本不大上枝不小調直亭亭千萬若一森秀無柯端頂有葉葉似甘蕉條𣲖開破仰望如挿叢蕉於竹杪風至獨動似舉羽扇之掃天葉下繫數房房綴數十實實大如桃李天生棘重累其下所以禦衛其實也味苦􅉣剖其皮煮其膚堅如乾棗作雞心狀破皮作錦文者為佳以扶留藤古賁灰并食則滑美下氣消榖名醫别録㯽榔生南海氣味苦辛温􅉣無毒消榖逐水除痰澼三蟲伏尸寸白藥性本草味甘性寒宣利五臓六腑壅滯破胸中氣唐本草除一切風下一切氣通闗節利九竅徤脾調中除煩破瘕結鶴林玉露嶺南人以檳榔代茶禦瘴其功有四一曰醒能使之醉蓋食之久則熏然頰赤若飲酒然二曰醉能使之醒蓋酒後嚼之則寛氣下痰餘酲頓觧三曰飢能使之飽四曰飽能使之飢蓋空腹食之則充然氣盛如飽飽後食之則飲食快然易消又且賦性䟽通而不洩氣稟味嚴正而更有餘甘有是徳故有是功也彚考増梁書海南傳于陁利國出檳榔特精好為諸國之極南史劉穆之傳穆之少時家貧誕節嗜酒食不脩拘檢好徃妻兄家乞食多見辱不以為耻其妻江嗣女甚明識毎禁不令徃江氏後有慶㑹屬令勿來穆之猶徃食畢求檳榔江氏兄弟戯之曰檳榔消食君乃常飢何忽須此妻復截髪市餚饌為其兄弟以餉穆之自此不對穆之梳沐及穆之為丹陽尹將召妻兄弟妻泣而稽顙以致謝穆之曰本不匿怨無所致憂及至醉穆之乃令厨人以金柈貯檳榔一斛以進之任昉傳昉父遥本性重檳榔以為常餌臨終常求之剖百許口不得好者昉亦所嗜好深以為恨遂終身不嘗檳榔唐書南蠻傳環王國取檳榔瀋為酒哥羅國凡嫁娶納檳榔為禮多至二百盤真臘國客至屑檳榔龍腦香蛤以進婆賄伽盧國土熱衢路植椰子檳榔仰不見日宋史地理志瓊州貢檳榔三輔黄圗漢武帝元鼎六年破南越起扶荔宮以植所得奇草異木有檳榔百餘本風俗記王髙麗年十四五時四月八日在彭城佛寺中謝混見而以檳榔贈之執王手謂曰王郎謝叔源可與周旋否南中八郡志檳榔土人以為貴婚族欵客輙先進此物若邂逅不設用相嫌恨三國典略齊命通直散騎常侍辛徳源聘于陳陳遣主客蔡佞宴酬因談謔手㺯檳榔乃曰頃聞北間有人為噉檳榔獲罪人間遂禁此物定爾否徳源答曰此是天保初王尚書罪狀故耳猶如李固被責云胡粉飾面搔首弄姿不聞漢世頓禁胡粉酉陽雜俎檳榔枝苗可以忘憂嶺表録異安南自嫩及老採檳榔實啖之自云交州地温不食此無以袪其瘴癘廣州亦噉檳榔然不甚於安南也西溪叢語閩廣人食檳榔每切作片蘸蠣灰以荖葉裹嚼之荖音老又音蒲口切初食微覺似醉面赤故東坡詩云紅潮登頬醉檳榔宋類苑南海地氣暑濕人多患胸中痞滯故常㗖檳榔數十口加以勃蔞藤洎蜆灰同咀之液如朱色程思孟知畨禺凡左右侍史啖檳榔者悉杖之或問其故曰惡其口唇如潄血耳海槎餘録㯽榔産於海南惟萬崖瓊山㑹同樂㑹諸州縣為多他處則少每親朋㑹合互相擎送以為禮至於議姻不用年帖只送㯽榔而已瀛涯勝覽𤓰哇國人㯽榔不離口寘飯於盤酥澆之餐則𠻳去榔屑向盤掬而食食既水飲待賔以㯽榔集藻牋増晉俞益期與韓康伯牋惟㯽榔樹最南㳺之可觀子既非常木亦特異余在交州時度之大者三圍髙者九丈餘葉聚樹端房棲葉下花秀房中子結房外其擢穂似黍其綴實似榖其皮似桐而厚其節似竹而穊其中空其外勁其屈如覆虹其伸如縋繩本不大末不小上不傾下不斜稠直亭亭千百若一歩其林則寥朗庇其蔭則蕭條信可以長吟可以逺想矣但性不耐霜不得北植必當遐樹海南遼然萬里弗遇長者之目自令人深恨啓増梁庾肩吾謝東宮賚㯽榔啓無勞朱實兼荔支之五滋能發紅顔類芙蓉之十酒登玉案而上陳出珠盤而下逮澤深温柰恩均含棗謝賚㯽榔啓形均緑竹詎掃山壇色譬青桐不生空井事踰紫柰用兼芳菊方為口實永以蠲痾王僧孺謝賜于佗利所獻㯽榔啓竊以文軌一覃充仭斯及入侍請朔航海梯山獻琛奉貢充庖盈府故其取題任賦多述俞書萍實非甘荔葩慙美賦増眀黎遂球㯽榔賦有序㯽榔生於海外予粤人喜雜蔞葉蜆灰嚼之婚姻之約以表結言客粤者每不諳食且資嘲笑然攷食檳榔不惟予粤人也晉劉穆之微時嘗造妻家已食畢求檳榔妻兄弟曰君嘗苦飢何用此物及任丹陽尹召妻兄弟以金盤貯㯽榔一斛贈之然則徃故吳俗所貴何以云然予讀書之暇作賦争之美嘉實之貞烈含文采於炎方榦亭亭而直上枝扶舉而踈張渉南海以流望見團盖之彷徉摘鮫人之明珠猶什襲而錦裝牽異草而薦葉朋翡翠於越裳凖削𤓰以成瓣㦯如錢而擲筐疑獺髓與玉屑並資嚼而得漿擬潄石而礪齒勝含脂以為容於是集良耦邀上賔進鯉尾獻猩唇調甘選脆嘉澹雪醇龍華代燭雞人遲更觴羽倦而既醉徳味飽乎大烹却易牙而不顧視杜康以逡廵並牽裾與捧袂見微誠於華巾結方勝以象物翅則蜨而首螓香儼含乎雞舌液半飲而霞蒸酌腑臓之損益導元氣以降升是以靡俗不珍無時不宜托吉士以為友比白茅而包之指摽梅以興感佇斯焉之相遺陳𤓰果以穿鍼懸艾虎而續絲匪一端以調笑即懐袖以寄怡在凝寒而擁背㦯立月而露滋忽温靄而如醺惟丹丸之馥頥彼嚙唇與唼舌樂並枕於低帷暢同心之蘭言相吞吐而氣佳笑貞士之苦節采松實而縁阿分藜藿之我安適晚食而婆娑詠素餐以不怍歌無酒而可酡從樂飢於衡門亦囘味以㫖多况鼎養之羅列侑退食而委蛇五言古詩増梁劉孝綽有人乞牛舌乳不付因餉㯽榔陳乳何能貴爛舌不成珍空持渝皓齒非但汙丹脣别有無枝實曾要湛上人差比朱櫻熟詎易紫梨津莫言蔕中久當看心裏新微芳雖不足含咀願相親周庾信忽見㯽榔緑芳千子熟紫穂百花開莫言行萬里曾經相識来宋蘇軾食㯽榔月照無枝林夜棟立萬礎𣺌𣺌雲間扇蔭此九月暑上有垂房子下繞絳刺禦風欺紫鳳卵雨暗蒼龍乳裂包一堕地還以皮自煮北客初未諳勸食俗難阻中虚畏泄氣始嚼忽半吐吸津得微甘著齒隨亦苦面目太嚴冷滋味絶媚嫵誅彭勲可䇿推轂勇宜賈瘴風作堅頑導利時有補藥儲固可爾果録詎用許先生失膏粱便腹委敗鼓日噉過一粒膓胃為所侮蟄雷殷臍腎藜藿腐亭午書燈看膏盡鉦漏歴歴數老眼怕少睡竟使赤眥努渴思梅林嚥饑念黄獨舉奈何農經中收此困羇旅牛舌不餉人一斛肎多與乃知見本偏但可酬惡語戴復古泉南即事寄跡小園中自笑客異鄉東家送㯽榔西家送㯽榔咀嚼脣齒赤亦能醉我腸南人愛敬客以此當茶湯慇懃謝其来此意不可忘眀劉基初食㯽榔㯽榔紅白文色似青扶留驛吏勸我食可已瘴癘憂初驚刺生頰漸若㦸在㗋紛紛花滿眼岑岑暈蒙頭將疑悮腊毒復想致無由稍稍熱上靣輕汗如珠流清涼徹肺腑麤穢無纎留信知殷王語瞑眩疾乃瘳三復増永歎書之遺朋儔五言律詩増宋朱子㯽榔憶昔南遊日初嘗靣發紅藥嚢知有用茗盌詎能同蠲疾收殊效修真録異功三彭如不避糜爛七非中五言排律増宋李綱㯽榔踈林滄海上結實已纍纍煙濕頳虬卵風揺翠羽旗飛翔金鸑鷟掩映籜龍兒濩落咍椰子勻圓訝荔枝當茶消瘴速如酒醉人遲蔞葉偏相稱蠣灰亦漫為乍餐顔愧渥頻嚼齒愁疲飲啄隨風土端憂化島黎七言絶句増宋黄庭堅幾道復覔㯽榔蠻烟雨裏紅千樹逐水排痰肘後方莫笑忍饑窮縣令煩君一斛寄㯽榔朱子㯽榔五絶卒章戲簡及之主簿暮年藥裹闗身切此外翛然百不貪薏苡載来縁下氣檳榔收得為祛痰錦文縷切勸加餐蜃炭扶留共一盤食罷有時求不得英雄邂逅亦飢寒向来試吏著南冠馬甲蠔山得飫餐却藉芳辛来觧穢雞心磊落看堆盤箇中有味要君參螫吻舂㗋久不甘珍重人心亦如此莫將寒苦換春酣髙士沉迷簿領書有時紅糁綴𤣥鬚定知不著金盤貯兒女心情本自無詩散句増唐李白何如黄金盤一斛薦㯽榔宋唐庚織貝流肌滑㯽榔入頰紅元張翥㯽榔新善啖一斛宿酲空宋蘇軾不用長愁挂月村㯽榔生子竹生孫唐曹鄴㯽榔自無柯宋鄭域㯽榔共聘幣戴復古紅吐㯽榔唾附録山㯽榔増羅浮山䟽山㯽榔一名蒳子生日南樹似栟櫚而小與㯽榔同狀一叢十餘榦一榦十餘房一房數百子子長寸餘五月采之味近甘苦大腹子増本草綱目大腹子一名大腹㯽榔出嶺表滇南㯽中一種腹大形扁而味􅉣者不似㯽榔尖長味良甘者所謂猪㯽榔也雲南記云大腹㯽榔每枝有二三百顆青時以一片蔞葉及蛤粉卷和食之即減􅉣味與㯽榔可通用但力稍劣耳皮味辛微温無毒治冷熱氣攻心腹大腸蠱毒痰膈醋心下一切氣止霍亂通大小腸健脾開胃消肌膚中水氣壅逆瘴瘧痞滿胎氣惡阻脹悶馬㯽榔原馬㯽榔俗譌為馬金囊一名馬金南一名紫㯽榔結實紫色内有核而殻薄去殻其仁色白盤轉與北方文官果無異第文官果乾久食之刺㗋馬㯽榔雖乾嚼之軟美嚼完以新汲水送下其清甜香美凡果無與為比味甘寒無毒出雲南金齒沅江諸夷地核仁氣味苦甘寒無毒治産難傷寒熱病惡瘡腫毒俱以冷水嚼服數枚集藻五言古詩増眀吳寛馬㯽榔有樹吾不識人云馬㯽榔㯽榔産南海結實因瘴鄉平生冐其名豈亦如丁香白花細而密實甘翻可甞其葉與麻同沃若澤且光麻馬音㦯譌欲問郭駝亡茱萸二種同類増本草綱目吳茱萸陳藏器曰茱萸南北總有入藥以吴地者為好所以有吳之名也處處有之江淮蜀漢尤多木髙丈餘皮青緑色葉似椿而濶厚紫色三月開紅紫細花七八月結實似椒子嫩時微黄至熟則深紫李時珍曰枝柔而肥葉長而皺其實結於梢頭纍纍成簇而無核一種粒大一種粒小小者入藥為勝氣味辛温有小毒温中下氣止痛除濕逐風邪開腠理治欬逆寒熱利五臟去痰冷逆氣治飲食不消心腹諸冷絞痛中惡心腹痛霍亂吐瀉􅍙痺刺痛腰脚軟弱利大腸壅氣膓風痔疾殺三蟲鬼疰治腎氣通闗節健脾厚腸胃開鬱化滯食茱萸一名藙一名榝一名艾子一名辣子一名越椒一名欓子陶𢎞景曰禮記名藙而俗呼為榝子當是不識藙子也蘇恭曰爾雅云椒榝醜莍陸璣詩䟽云椒榝屬也並有榝名李時珍曰此即欓子也蜀人呼為艾子楚人謂之辣古人謂之藙及榝子因其辣蜇口惨腹有殺毅黨然之狀故有諸名曹憲博雅云欓子越椒茱萸也鄭樵通志云欓子一名食茱萸以别吳茱萸也蘇頌曰南北皆有之其木甚高大有長及百尺者枝莖青黄莖間有刺上有小白㸃葉類油麻其花黄色子宜入食羮中能發辛香李時珍曰髙木長葉黄花緑子叢簇枝上味辛而苦土人八月採搗濾取汁入石灰攪成名曰艾油亦曰辣米味辛辣入食物中用主治功同吴茱萸但力少劣耳彚考増禮記内則三牲用藙註藙煎茱萸也漢律㑹稽獻焉爾雅謂之榝䟽賀氏云今蜀郡作之九月九日取茱萸折其枝連其實廣長四五寸一升實可和十升膏名為藙也南齊書祥瑞志始興郡本無欓樹調味有闕世祖在郡堂屋後忽生一株唐書文藝傳王維别墅在輞川有茱萸沜詩含神霧茱萸耐老淮南畢萬術井上宜種茱萸茱萸葉落井中飲此水者無瘟病懸茱萸于屋内鬼畏不入雜五行書舎東種白楊茱萸三根増年益夀除患害也搜神記永嘉六年正月無錫縣歘有四枝茱萸樹相樛而生狀若連理發蒙記蛇以茱萸為酒謂飲之即醉也異苑晉新野庾紹字道遐與南陽宋協中表之親情好綢繆桓𤣥時庾為湘東太守病亡義熙中忽見形詣協求酒協時時餌茱萸酒因為設之酒至執杯還置云有茱萸氣恊云卿惡之耶紹云上官皆畏之非獨我也風土記俗尚九月九日謂之上九茱萸到此日氣烈熟色赤可折其房以挿頭云辟惡氣禦冬易洞林郭璞避難至新息有人以茱萸令璞射之璞曰子如小鈴含𤣥珠按文言之是茱萸續齊諧記汝南桓景隨費長房遊學長房謂之曰九月九日汝南當有大災戹急令家人縫囊盛茱萸繫臂上登山飲菊花酒此禍可消景如言舉家登山夕還見雞犬牛羊一時暴死長房問之曰此可代矣今世人九日登髙飲酒帶茱萸囊蓋始於此成都古今記蜀人每進酒輙以艾子一粒投之少頃香滿盂醆福建志建寧府重陽日登髙飲茱萸酒名茱萸為辟邪翁集藻贊増宋宋祁艾子贊緑實若萸味辛香苾投粒羮臛椒桂之匹賦増晉孫楚茱萸賦有茱萸之嘉木植茅茨之前庭歴漢女而始育閱百嵗而長生森蔓延以盛興布緑葉於紫莖鶉火西徂白藏授節零露既凝鷹隼飄厲攀紫房於纎阿綴朱實之酷烈應神農之本草療生民之疢疾文散句増楚屈原離騷榝又欲充夫佩幃五言古詩増梁簡文帝茱萸女茱萸生狹邪結子復銜花遇逄纎手摘濫得映鉛華雜與鬟簪插偶逐鬢鈿斜東西争贈玉縱横来問家不無夫婿馬空駐使君車唐萬楚茱萸女山隂栁家女九日采茱萸復得東隣伴䨇為陌上姝插枝著髙髻結子置長裾忤性常遲緩非闗詫丈夫平眀折林樾日入返城隅俠客要羅袖行人挑短書蛾眉自有主年少莫踟蹰五言律詩増宋徐鉉奉御扎賦茱萸萬物慶西成茱萸獨擅名房排紅結小香透夾衣輕宿霧霑猶重朝陽照更眀長和菊花酒髙宴奉西清七言律詩増宋徐鉉奉和御製茱萸臺畔西風御果新芳香精彩麗蕭辰柔條細葉妝治好紫蔕紅芳㸃綴勻㡬朶得陪天上宴千株長作洞中春今朝聖藻偏流詠黄菊無由更敢隣五言絶句増唐王維茱萸沜結實紅且緑復如花更開山中儻留客置此芙蓉杯山茱萸朱實山下開清香寒更發幸與叢桂花窻前向秋月裴廸茱萸沜飄香亂椒桂布葉開檀欒雲日雖囘照森沉猶自寒七言絶句増唐武元衡寄題江南所居茱萸樹手種茱萸舊井傍㡬回春露又秋霜今来獨向秦中見攀折無時不斷腸詩散句増唐孟浩然茱萸正可佩折取寄情親司空曙强向衰叢見芳意茱萸紅實是繁花張說茱囊繫牧童李白九日茱萸熟李益茱萸滴露房宋司馬光萸房近令節唐王昌齡茱萸插鬢花宜夀王維徧插茱萸少一人杜甫醉把茱萸仔細看盧綸茱萸一朶映華簮權徳輿酒泛茱萸晚易曛白居易舞鬟擺落茱萸房茱萸色淺未經霜元稹茱萸暗綻紅珠蘂崔櫓茱萸冷吹溪口香無名氏茱萸蘂綻蠅頭赤别録増齊民要術食茱萸二月栽之宜固城隄冡髙燥之處候實開便收之挂著屋裏壁上令隂乾勿使煙薰用時去中黒子炮炙論凡使吳茱萸去葉梗每十兩以鹽二兩投東流水四斗分作一百度洗之自然無涎日乾入丸散用之若用醋煮者每十兩用醋一鎰煮三十沸後入茱萸曬乾用桂巖桂别見花譜増爾雅梫木桂註今南人呼桂厚皮者為木桂桂樹葉似枇杷而大白華華而不著子叢生巖嶺枝葉冬夏常青桂海虞衡志桂南方竒木上藥也桂林以地名地實不産而出於賓宜州凡木葉心皆一縱理獨桂有兩紋形如圭製字者意或出此葉味辛甘與皮無别而加芳美人喜咀嚼之南方草木狀桂出合浦生必以髙山之巔冬夏常青其類自為林間無雜樹交趾置桂園桂有三種葉如柏葉皮丹者為丹桂葉似柿葉者為菌桂葉似枇杷葉者為牡桂酉陽雜俎牡桂葉大如苦竹葉葉中一脈如筆跡花蔕葉三瓣瓣端分為兩岐其表色淺黄近岐淺紅色花六瓣色白心凸起如荔枝其色紫出婺州山中唐本草牡桂乃爾雅所云梫木桂也葉長尺許花子與菌桂同大小枝皮俱名牡桂但大枝皮肉理麤虛如木而肉少味薄名曰木桂亦云大桂不及小嫩枝皮肉多而半卷中必皺起其味辛美一名肉桂亦名桂枝一名桂心出邕州桂州交州甚良其菌桂葉似柿葉中有縱文三道表裏無毛而光澤肌理𦂳薄如竹大枝小枝皮俱是筒其大枝無肉老皮堅板不能重卷味極淡薄不入藥用小枝薄而卷及二三重者良或云筒桂陶氏云小桂是也今惟出韶州本草綱目牡桂葉長如枇杷葉堅硬有毛及鋸齒其花白色其皮多脂菌桂葉如柿葉而尖狹光净有三縱文而無鋸齒其花有黄有白其皮薄而卷今商人所貨皆此二種别録單名桂者即肉桂李杲云桂之細薄者為枝厚脂者為肉去皮與裏當其中者為桂心桂肉氣味甘辛有小毒利肝肺氣心腹寒熱冷痰霍亂轉筋頭痛腰痛出汗温中堅筋骨通血脈理䟽不足宣導百藥治沈寒痼冷之病去營衛中風寒表虚自汗桂心苦辛無毒治九種心痛腹内冷痛欬逆結氣壅脾脚痺不仁止痢破血殺三蟲治一切風氣補五勞七傷通九竅利闗節益精眀目暖腰膝治風痺骨節攣縮續筋骨生肌肉消瘀血破痃癖癥瘕殺草木毒治風癖失音陽虚失血内托癰疽痘瘡觧蛇蝮毒牡桂即木桂其最薄者為桂枝枝之嫩小者為栁桂氣味辛温無毒治上氣欬逆結氣㗋痺吐吸利闗節補中益氣治心痛脇痛温筋通脉止煩發汗去冷風疼痛菌桂氣味辛温無毒治百病養精神和顔色為諸藥先聘通久服輕身不老靣生光華媚好常如童子昔人所服食者蓋此類也彚考増戰國䇿蘇秦曰楚國之食貴於玉薪貴於桂山海經桂林八樹在賁隅東註八樹成林言其大也莊子桂可食故伐之列仙傳范蠡好食桂飲水賣藥人間世世見之說文桂江南木百藥之長原地理志桂陽郡有桂嶺開花遍樹林嶺盡香増捜神記彭祖者殷時大夫也姓籛名鏗帝顓頊之孫陸終氏之中子歴夏而生商末號七百嵗常食芝桂抱朴子趙佗子服桂二十年足下生毛日行五百里力舉千斤廣州記桂父常食桂葉見知其神人尊事之一旦與鄉曲别飄然入雲拾遺記闇河之北有紫桂成林其實如棗羣仙餌焉韓終採藥四言詩曰闇河紫桂實大如棗得而食之後天而老臨海記郡東南有白石山望之如雪山有湖傳云金鵞之所集八桂之所植水經注林邑城隍塹之外林棘荒蔓榛梗冥鬱縢槃等秀参錯際天其中香桂成林氣清澄煙桂父象人也棲居此林服桂得道羅浮山記山頂有桂山海經所謂賁禺之桂一品集李徳裕平泉莊有東陽之牡桂酉陽雜俎大凢木脈皆一脊唯桂葉三脊孫公談苑南唐後主嘗召徐鍇至清暑閣前地經雨草生磚縫中薙去復生鍇曰呂氏春秋云桂枝之下無雜木味辛故也後主令取桂屑數斗勻布縫中經宿盡死夢溪筆談呂氏春秋云桂枝之下無雜木蓋桂枝味辛螫故也然桂之殺草木自是其性不為辛螫也雷公炮炙論云以桂為丁以釘木中其木即死一丁至微未必能螫大木自是其性相制耳避暑録話蘇子瞻在恵州作桂酒嘗問其二子邁過云一試之而止大抵氣味似屠蘇酒二子語及亦自撫掌大笑劉禹鍚傳信方有桂漿法善造者暑月極快美凡酒用藥未有不奪其味况桂之烈楚人所謂桂酒椒漿者安知其為美酒但土俗所尚今欲因其名以求美亦過矣集藻贊増晉郭璞桂贊桂生南裔拔萃岑嶺廣莫熈葩凌霜津穎氣王百藥森然雲挺文賦散句増楚屈原離騷雜申椒與菌桂兮豈維紉夫􅈍茝漢司馬相如上林賦桂椒木蘭晉孫綽天台賦八桂森挺以凌霜五言古詩原周庾信詠桂南中有八桂繁華無四時不識風霜苦安知零落期増唐顔真卿謝陸處士杼山折青桂花見寄之什羣子遊杼山山寒桂花白緑荑含素萼采折自逋客忽枉巖中詩芳香潤金石全髙南越蠧豈謝東堂策㑹惬名山期從君恣幽覿詩散句増唐李白何以折相贈白花青桂枝孟浩然青桂春再榮白雲暮來變白居昜身倚白石崖手攀青桂樹晉張恊尺燼重㝷桂梁庾肩吾八桂動芳枝原唐李白青桂隠遥月増姚合辛香發桂叢李賀山頭老桂吹古香别録原漢書南越傳尉陀獻桂蠧一器註師古曰此蟲食桂故味辛而漬之以蜜食之也御定佩文齋廣羣芳譜卷九十九
